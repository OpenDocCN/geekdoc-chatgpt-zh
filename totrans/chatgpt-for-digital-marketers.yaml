  prefs: []
  type: TYPE_NORMAL
  zh: 3.1. Google广告结构
- en: 'ChatGPT can help define the structure of an effective Google ad: ● Ad Title:
    Create optimized titles to capture users'' attention. ● Description: Develop descriptions
    that include relevant keywords. ● Visible URLs: Suggestions for user-friendly
    and optimized URLs.'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助定义一个有效的Google广告结构：● 广告标题：创建吸引用户注意的优化标题。 ● 描述：开发包含相关关键词的描述。 ● 可见网址：关于用户友好和优化的网址建议。
- en: '○ Example prompts:'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "Create an optimized title for a Google ad about a business consulting service."
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “为关于商业咨询服务的Google广告创建一个优化的标题。”
