  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: ● 关键词识别：为产品或服务提供相关关键词的建议。
- en: '● Trend Analysis: Identification of search trends for better ad targeting.
    ○ Example prompts:'
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: ● 趋势分析：识别搜索趋势以更好地定位广告。 ○ 示例提示：
- en: ■ "Suggest keywords for a Google ad for accounting software."
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “为会计软件的Google广告建议关键词。”
- en: ■ "What are the current search trends for the health and wellness sector?"
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "当前健康与福祉领域的搜索趋势是什么？"
- en: 3.3\. Ad Copywriting
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 3.3\. 广告文案
- en: 'Use ChatGPT to write effective ad copy for Google:'
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT为谷歌撰写有效的广告文案：
- en: '● Title: Create titles that include keywords and are attractive. ● Description:
    Develop descriptions that clearly explain the benefits of the product or service.'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: ● 标题：创建包含关键词且吸引人的标题。● 描述：开发清晰解释产品或服务优势的描述。
- en: '○ Example prompts:'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "Write the title for a Google ad about a healthy meal delivery service."
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "为健康餐食配送服务撰写谷歌广告的标题。"
- en: ■ "Create a description for a web development course ad."
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "为网页开发课程广告创建描述。"
- en: 4\. Ad Testing and Optimization with ChatGPT
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 使用ChatGPT进行广告测试和优化
- en: 4.1\. A/B Testing
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 4.1\. A/B测试
- en: 'Conduct A/B tests with the help of ChatGPT to identify best practices:'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT的帮助下进行A/B测试以确定最佳实践：
- en: '● Test Configuration: Suggestions on which elements of the ad to test.'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: ● 测试配置：关于广告中哪些元素需要测试的建议。
- en: '● Result Analysis: Interpretation of A/B test results and improvement recommendations.'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: ● 结果分析：对A/B测试结果进行解读和改进建议。
- en: '○ Example prompts:'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "What elements should I test in a Facebook A/B ad?" ■ "Analyze the A/B test
    results and suggest improvements to increase click-through rates."
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "在Facebook A/B广告中我应该测试哪些元素？" ■ "分析A/B测试结果并提出提高点击率的改进建议。"
