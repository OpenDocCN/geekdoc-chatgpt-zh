  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 5.1. 技术博客日期帖子标题作者状态
- en: 01/07/2024 Innovations in Artificial Intelligence
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 01/07/2024 人工智能创新
- en: John Doe Completed
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: John Doe 完成
- en: 05/07/2024 Cybersecurity Trends Jane Smith In Progress
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 05/07/2024 网络安全趋势 Jane Smith 进行中
- en: 5.2. Social Media for Fashion Date Platform Content Type Responsible Status
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 5.2. 时尚社交媒体日期平台内容类型负责人状态
- en: 02/07/2024 Instagram Engagement Post
