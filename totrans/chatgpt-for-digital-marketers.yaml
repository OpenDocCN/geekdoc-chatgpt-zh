  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT监控和分析您的广告活动绩效：
- en: '● Performance Metrics: Identification of key metrics to monitor, such as CPC,
    CTR, and CPA.'
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: ● 绩效指标：确定要监控的关键指标，如CPC、CTR和CPA。
- en: '● Performance Reports: Generation of detailed reports on campaign performance.'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: ● 绩效报告：生成关于广告活动绩效的详细报告。
- en: '○ Example prompts:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "What metrics should I monitor to evaluate the success of my Google ad campaigns?"
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: '■ "我应该监控哪些指标来评估我的谷歌广告活动的成功？" '
- en: ■ "Create a performance report for last month's ad campaign."
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "为上个月的广告活动创建一份绩效报告。"
