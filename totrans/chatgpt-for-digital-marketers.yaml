  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT撰写引人入胜且有效的电子邮件：
- en: '● Email Subjects: Create captivating subject lines that increase open rates.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: ● 电子邮件主题：创建吸引人的主题行以增加打开率。
- en: '● Email Body: Develop persuasive and engaging content for the email body.'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: ● 电子邮件正文：为电子邮件正文开发有说服力和吸引力的内容。
- en: '○ Example prompts:'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "Write a subject line for a promotional email about a new tech product."
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "为关于新科技产品的促销电子邮件撰写一个主题行。"
- en: ■ "Create an email body to announce a 50% discount store-wide sale."
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "创建一个全店50%折扣的促销电子邮件正文。"
