  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 利用 ChatGPT 创建高级个性化分段策略：
- en: '● Dynamic Content: Develop content that adapts to different customer profiles.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: ● 动态内容：开发适应不同客户档案的内容。
- en: '● Intelligent Segmentation: Use ChatGPT to identify audience segments based
    on behavior and preferences.'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: ● 智能分段：使用 ChatGPT 根据行为和偏好识别受众细分。
- en: '○ Example prompts:'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "How can I use ChatGPT to create dynamic content in emails?"
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “我如何使用 ChatGPT 在电子邮件中创建动态内容？”
- en: ■ "Suggest an intelligent segmentation strategy for a customer reactivation
    campaign."
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “为一次客户重新激活活动建议一个智能分段策略。”
