  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 3.2. 关键词研究
- en: 'Use ChatGPT to conduct keyword research for Google ads:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行Google广告的关键词研究：
- en: '● Keyword Identification: Suggestions for relevant keywords for the product
