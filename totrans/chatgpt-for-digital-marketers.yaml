    and drop-off points.'
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: ● 识别瓶颈：分析漏斗阶段以识别瓶颈和流失点。
- en: '● Improvement Recommendations: Suggestions for improvements to increase funnel
    efficiency.'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: ● 改进建议：提高漏斗效率的改进建议。
- en: '○ Example prompts:'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "Identify bottlenecks in my current traffic funnel." ■ "Suggest improvements
    to increase conversion rates in the middle of the funnel."
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "识别我当前流量漏斗中的瓶颈。" ■ "在漏斗中间提出改进建议以提高转化率。”
