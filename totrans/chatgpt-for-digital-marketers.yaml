  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: ● 性能指标：确定关键指标以监控，如打开率、点击和转化。
- en: '● Performance Reports: Generation of detailed reports on email campaign performance.'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: ● 性能报告：生成关于电子邮件活动表现的详细报告。
- en: '○ Example prompts:'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "What metrics should I monitor to evaluate the success of my email campaigns?"
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “我应该监控哪些指标来评估我的电子邮件活动的成功？”
- en: ■ "Create a performance report for last month's email campaign."
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: ■ “为上个月的电子邮件活动创建一个性能报告。”
- en: 4\. Support Tools for Email Marketing with ChatGPT
  id: totrans-691
  prefs: []
