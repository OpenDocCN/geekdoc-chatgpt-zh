  type: TYPE_NORMAL
  zh: ● 性能报告：生成关于漏斗性能的详细报告。
- en: '○ Example prompts:'
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例提示：
- en: ■ "What metrics should I monitor to evaluate the success of my traffic funnel?"
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: ■ "我应该监控哪些指标来评估我的流量漏斗的成功？”
