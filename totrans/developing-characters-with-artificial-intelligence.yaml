- en: Chapter 22
  prefs: []
  type: TYPE_NORMAL
- en: Character Author Questions and Template
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: These prompts can be used to delve deeply into each aspect of your characters,
    guiding you in your thought process. Adapt these prompts based on the specific
    needs of your characters and plot.
  prefs: []
  type: TYPE_NORMAL
- en: Generalized Character Development Prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Backstory
  prefs: []
  type: TYPE_NORMAL
- en: Create a backstory for [Character Name]. Focus on their history, upbringing,
    past experiences, and significant events that have shaped their personality. How
    do these elements influence their current actions and decisions?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Motivation and Goals
  prefs: []
  type: TYPE_NORMAL
- en: Define the primary motivations and goals for [Character Name]. What drives them
    in the story? This could range from grand ambitions like saving the world to personal
    quests like seeking redemption.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Personality Traits
  prefs: []
  type: TYPE_NORMAL
- en: List the key personality traits of [Character Name]. Include a mix of strengths,
    weaknesses, quirks, and habits. How do these traits make them relatable and memorable?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Growth and Change
  prefs: []
  type: TYPE_NORMAL
- en: Outline how [Character Name] will grow or change throughout the novel. What
    changes in beliefs, attitudes, or behavior will they exhibit, and how will these
    changes reflect their response to the story’s events?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consistency
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that while [Character Name] evolves, their core traits remain consistent.
    Identify these core traits and describe how they will persist even as the character
    undergoes development.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conflict and Challenge
  prefs: []
  type: TYPE_NORMAL
- en: Describe the conflicts or challenges that [Character Name] will face. How will
    these conflicts reveal their true nature and contribute to their development?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Relationships and Interactions
  prefs: []
  type: TYPE_NORMAL
- en: Detail the key relationships and interactions of [Character Name] with other
    characters. How do these relationships and interactions reveal different facets
    of their personality?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Voice and Dialogue
  prefs: []
  type: TYPE_NORMAL
- en: Craft a distinctive voice and style of dialogue for [Character Name]. How does
    their way of speaking reflect their background, personality, and current state
    of mind?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Physical Description
  prefs: []
  type: TYPE_NORMAL
- en: Provide a physical description of [Character Name]. How does their appearance
    contribute to the story and help readers form a mental image of them?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Internal Conflict
  prefs: []
  type: TYPE_NORMAL
- en: Identify an internal conflict for [Character Name]. This could be doubts, fears,
    moral dilemmas, or struggles between contrasting desires or beliefs. How does
    this conflict influence their behavior?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reactions to Situations
  prefs: []
  type: TYPE_NORMAL
- en: Describe how [Character Name] reacts to different situations, particularly under
    pressure. What do these reactions reveal about their character beyond their stated
    intentions or beliefs?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Layered Complexity
  prefs: []
  type: TYPE_NORMAL
- en: Incorporate elements of gray areas and moral ambiguities in [Character Name].
    Avoid making them simply good or bad. How does this complexity make them more
    realistic and intriguing?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
