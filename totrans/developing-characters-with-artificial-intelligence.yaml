  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Exercises
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Core Values Test: Put your character in a situation where their core values
    are tested.'
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
