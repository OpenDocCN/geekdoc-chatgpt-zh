  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Overcoming Fear: Create a scenario where a character confronts and overcomes
    a fear.'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Adapting to Change: Show how a major life change (e.g., a new job, a move)
    affects a character’s outlook or behavior.'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Learning from Mistakes: Write about a character who learns a valuable lesson
    from a significant mistake.'
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
- en: Prompts
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
- en: 1\. How would a selfish billionaire change after a life-altering event?
