- en: Chapter 24
  prefs: []
  type: TYPE_NORMAL
- en: Mega-Prompt
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This mega-prompt is an alternative to the JSON format. You can adapt the depth
    and focus of each section to suit the specific needs of your story and characters,
    adding in any specifics you want the AI to consider and wrap into the output.
  prefs: []
  type: TYPE_NORMAL
- en: Comprehensive Character Development Mega-Prompt
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Create a detailed profile for [Character Name]. Begin with their Backstory,
    outlining their history, upbringing, and key events that shaped them. What past
    experiences have defined their current motivations and goals? Moving on to Motivation
    and Goals, define what drives them in the story, from large-scale ambitions to
    personal quests.
  prefs: []
  type: TYPE_NORMAL
- en: Next, list their Personality Traits, including strengths, weaknesses, quirks,
    and habits, and consider how these traits make them both relatable and memorable.
    Describe how the character will experience Growth and Change throughout the novel,
    showing evolution in beliefs, attitudes, or behavior while maintaining Consistency
    in their core traits.
  prefs: []
  type: TYPE_NORMAL
- en: Identify the primary Conflicts and Challenges they will face and how these will
    reveal and develop their character. Detail their significant Relationships and
    Interactions with other characters, and how these dynamics reveal different aspects
    of their personality.
  prefs: []
  type: TYPE_NORMAL
- en: Craft a unique Voice and Dialogue style for them, reflecting their background,
    personality, and emotional state. Provide a vivid Physical Description to help
    visualize them. Explore an Internal Conflict they grapple with, such as doubts,
    fears, moral dilemmas, or internal struggles, and describe how this conflict influences
    their actions and decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, detail their Reactions to Situations, especially under pressure, to
    reveal more about them than their stated intentions or beliefs. Ensure to include
    Layered Complexity in their character, incorporating moral ambiguities and gray
    areas to avoid making them one-dimensional. How does each of these elements serve
    their purpose in the story and contribute to driving the plot forward, creating
    conflict, or aiding the growth of other characters?
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 25
  prefs: []
  type: TYPE_NORMAL
- en: Enhanced Prompts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Backstory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Generate a comprehensive and vivid backstory for [Character Name].
    Include a variety of key childhood events, such as transformative experiences,
    significant milestones, and influential encounters. Detail the family dynamics,
    including relationships with parents, siblings, and other family members, and
    how these relationships impacted their development. Describe pivotal moments,
    both positive and challenging, that played a crucial role in shaping [Character
    Name]''s personality, beliefs, and aspirations. Additionally, incorporate cultural,
    social, and economic factors that influenced their upbringing and early life experiences.'
  prefs: []
  type: TYPE_NORMAL
- en: Motivation and Goals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Develop intricate motivations and multifaceted goals for [Character
    Name], encompassing both internal desires and external objectives. Delve into
    deep-seated aspirations, such as personal fulfillment, overcoming past traumas,
    or achieving self-discovery. Also, include external ambitions like career success,
    societal change, or adventure-seeking. Highlight how these motivations are interconnected
    with [Character Name]''s backstory, and how they actively influence their decisions
    and actions within the story''s context. Address any evolving goals that change
    in response to the story''s progression, and how these shifts reflect [Character
    Name]''s development.'
  prefs: []
  type: TYPE_NORMAL
- en: Personality Traits
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Construct a detailed and layered personality profile for [Character
    Name]. Include a balanced mix of strengths, like resilience or empathy, and weaknesses,
    such as impulsiveness or a tendency to worry. Incorporate unique quirks that set
    them apart, like unusual hobbies, peculiar speech patterns, or distinct behavioral
    tendencies. Highlight habitual actions or routines that are indicative of their
    personality, such as morning rituals, consistent reactions to stress, or social
    interaction styles. Ensure these traits are reflective of their backstory and
    influence how they navigate the world and interact with other characters.'
  prefs: []
  type: TYPE_NORMAL
- en: Growth and Change
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Craft a dynamic and detailed development arc for [Character Name],
    focusing on the transformation they undergo in the story. Identify key events
    or experiences that act as catalysts for change in their beliefs, attitudes, or
    behavior. Describe how these changes unfold gradually, highlighting pivotal moments
    of realization, decision, or change. Explore the internal and external factors
    influencing this evolution, such as personal challenges, interactions with other
    characters, or major plot developments. Illustrate the progression from their
    initial state to their transformed state, ensuring that this growth is realistic
    and aligns with the narrative''s overall theme and direction.'
  prefs: []
  type: TYPE_NORMAL
- en: Consistency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Develop a clear outline of enduring core traits for [Character Name]
    that persist throughout the novel, despite their growth and experiences. Highlight
    traits that form the bedrock of their personality, such as inherent moral values,
    deep-seated beliefs, or fundamental aspects of their temperament. Explain how
    these traits manifest in various situations across the story, and how they influence
    [Character Name]''s reactions and decisions. Additionally, illustrate the consistency
    of these traits in relation to the character''s evolving circumstances, ensuring
    that they provide a sense of continuity and authenticity to [Character Name]''s
    journey.'
  prefs: []
  type: TYPE_NORMAL
- en: Conflict and Challenge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Elaborate on a variety of significant conflicts and challenges that
    [Character Name] encounters throughout the story. Include both external conflicts,
    such as antagonistic forces, societal pressures, or physical obstacles, and internal
    conflicts, like emotional struggles, ethical dilemmas, or personal fears. Describe
    how each conflict or challenge is intricately linked to [Character Name]''s motivations,
    backstory, and goals. Highlight how overcoming or facing these challenges contributes
    to [Character Name]''s growth, shaping their personality, beliefs, and future
    actions. Additionally, explore the consequences of these conflicts on [Character
    Name]''s relationships and their role in the broader narrative.'
  prefs: []
  type: TYPE_NORMAL
- en: Relationships and Interactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Develop a comprehensive analysis of [Character Name]''s key relationships
    and interactions, including those with family members, friends, romantic partners,
    adversaries, and mentors. For each relationship, describe the nature of the bond,
    the history behind it, and the significant moments that define it. Explain how
    these relationships influence [Character Name]''s behavior, decisions, and emotional
    responses. Highlight the nuances in these interactions, such as moments of conflict,
    support, misunderstanding, and reconciliation. Explore how each relationship brings
    out different facets of [Character Name]''s personality, including hidden traits
    or qualities that are not evident in other aspects of their life. Additionally,
    discuss how these interactions contribute to [Character Name]''s overall character
    development within the story.'
  prefs: []
  type: TYPE_NORMAL
- en: Voice and Dialogue
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Construct a distinctive voice and dialogue style for [Character Name],
    ensuring it resonates with their background, cultural context, experiences, and
    current emotional and psychological state. Integrate elements like vocabulary
    choice, speech patterns, rhythm, and tone that are unique to their character.
    Reflect on how their dialogue varies in different situations and with different
    characters, such as formal vs. informal settings, or when interacting with close
    friends vs. strangers. Include idiosyncrasies in their speech, like specific phrases
    or words they favor, or a particular way of structuring sentences. Additionally,
    consider how their dialogue evolves throughout the story, mirroring their development
    and the changes they undergo.'
  prefs: []
  type: TYPE_NORMAL
- en: Physical Description
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Develop an in-depth physical description for [Character Name], encompassing
    not only basic attributes like height, build, hair and eye color, but also distinctive
    features such as scars, birthmarks, or style of dress. Describe how their appearance
    has been shaped by their lifestyle, profession, or cultural background. Elaborate
    on how certain aspects of their look, like a commanding presence or a demure demeanor,
    impact their daily interactions, relationships, and how others perceive them.
    Discuss how [Character Name] feels about their own appearance, including any insecurities,
    pride, or indifference they might have, and how this self-perception influences
    their behavior and choices. Additionally, consider how their appearance might
    change or remain constant throughout the story, and what these changes or consistencies
    signify about their character journey.'
  prefs: []
  type: TYPE_NORMAL
- en: Internal Conflict
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Devise a complex internal conflict for [Character Name] that is deeply
    rooted in their backstory, personality, or current circumstances. Focus on conflicts
    arising from internal doubts, fears, unresolved past traumas, ethical dilemmas,
    or struggles between contrasting desires and beliefs. Describe how this conflict
    is not just a fleeting thought but a significant struggle that affects their decision-making,
    relationships, and actions throughout the story. Explore how the conflict influences
    their emotional state, creates tension in their interactions, and drives key plot
    points. Additionally, consider how this internal conflict might evolve or find
    resolution as the story progresses, and what impact this resolution or lack thereof
    has on [Character Name]''s overall character arc.'
  prefs: []
  type: TYPE_NORMAL
- en: Reactions to Situations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Elaborate on [Character Name]''s diverse range of reactions to a variety
    of situations, from everyday occurrences to high-stress or unexpected scenarios.
    Describe their initial emotional responses, coping mechanisms, and decision-making
    processes. Focus on how their reactions are influenced by their past experiences,
    core beliefs, and personality traits. Include how they handle conflict, adversity,
    success, and change. Reflect on how their reactions might differ when interacting
    with various characters or in different environments, such as in private versus
    public settings, or with friends versus authority figures. Additionally, consider
    how their responses evolve throughout the story, indicating growth, regression,
    or a shift in perspective.'
  prefs: []
  type: TYPE_NORMAL
- en: Layered Complexity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Construct detailed aspects of [Character Name]''s personality that
    embody a spectrum of moral complexities and ethical ambiguities. Explore traits,
    decisions, and actions that challenge binary notions of good and bad. Delve into
    their motivations, justifications, and rationales behind actions that may appear
    contradictory or morally complex. Highlight scenarios where [Character Name] faces
    ethical dilemmas, and describe how they navigate these situations, including the
    internal and external conflicts they experience. Consider how their cultural background,
    personal experiences, and the influence of significant relationships contribute
    to their moral framework. Also, reflect on how these gray areas add depth to their
    character, making them more relatable and intriguing to the reader. Finally, illustrate
    how this complexity influences their arc in the story, affecting their interactions,
    choices, and the overall narrative outcome.'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 26
  prefs: []
  type: TYPE_NORMAL
- en: AI and The Author
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Here are two versions of a series of prompts to guide character development
    and story arcs. Each version of the prompt is designed to walk you through the
    stages of character and story development, with the first engaging you - the author
    - directly in the creative process, and the second tailored for an AI to generate
    character ideas.
  prefs: []
  type: TYPE_NORMAL
- en: AI Prompts the Author
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Introduce Your Character: Begin by describing your character''s basic information:
    name, age, occupation, and role in the story.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Backstory Development: What pivotal events from their past shaped who they
    are today? Consider their family dynamics, education, and key life experiences.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Motivations and Goals: What drives your character? Are they seeking revenge,
    love, power, redemption, or something else?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Personality Traits: List their strengths, weaknesses, quirks, and habits. How
    do these traits influence their interactions with others?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Growth and Change: How will your character evolve throughout the story? What
    events will challenge their beliefs and attitudes?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Consistency in Traits: Despite their growth, what core aspects of their personality
    remain unchanged? How do these traits anchor their identity?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conflict and Challenge: What external and internal conflicts will they face?
    How will these shape their journey?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Relationships and Interactions: Who are the key figures in your character''s
    life, and how do these relationships affect them?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Voice and Dialogue: What is unique about the way they speak? Consider their
    background and personality in crafting their dialogue.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Physical Description: How does their appearance reflect their personality and
    background? How does it change over the story?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Internal Conflict: What internal struggles will they grapple with? How do these
    conflicts drive their actions?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Reactions to Situations: How does your character respond to success, failure,
    love, betrayal, or crisis?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Layered Complexity: Explore the moral ambiguities and gray areas in their character.
    What difficult choices will they face?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Author Prompts the AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Character Introduction: Generate an introduction for [Character Name] including
    basic attributes like age, occupation, and role in the story.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Backstory Creation: Craft a detailed backstory for [Character Name], focusing
    on childhood, formative experiences, and family dynamics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Motivations and Goals Development: Define [Character Name]''s motivations and
    goals, both personal and professional, that drive the character''s actions in
    the story.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Personality Traits Outline: List [Character Name]''s personality traits, including
    strengths, weaknesses, quirks, and habits, and how these influence their relationships.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Character Growth and Change Mapping: Describe the evolution of [Character Name]''s
    beliefs, attitudes, and behaviors in response to the story''s events.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Consistency in Character: Identify core traits of [Character Name] that remain
    consistent throughout the story, providing continuity and depth.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Conflict and Challenge Description: Detail the internal and external conflicts
    [Character Name] encounters and how these contribute to their development.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Relationships and Interactions Analysis: Examine [Character Name]''s key relationships
    and how they reveal different aspects of their personality.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Voice and Dialogue Style: Develop a unique voice and dialogue style for [Character
    Name] that reflects their background and personality.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Physical Description: Provide a physical description of [Character Name] and
    how their appearance affects their journey and self-perception.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Internal Conflict Exploration: Create a narrative exploring [Character Name]''s
    internal conflicts, focusing on their doubts, fears, and moral dilemmas.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Reaction to Situations: Describe how [Character Name] reacts to different scenarios,
    showcasing their character through their responses.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Layered Complexity Development: Build aspects of [Character Name]''s character
    that show moral ambiguities and ethical challenges they face.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Chapter 27
  prefs: []
  type: TYPE_NORMAL
- en: Character Image Prompts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Here are five prompts you can use to request the creation of images for your
    story characters. These prompts are structured to provide clear and detailed descriptions,
    allowing for the creation of images that closely match the vision of your characters.
    As always, adjust as needed.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Hero Character: Create an image of the protagonist of my story,
    [Hero''s Name]. They are a [describe age, occupation, and general appearance].
    Key features include [specific physical attributes like hair color, eye color,
    notable scars, or tattoos]. They often wear [typical clothing style]. The setting
    is [describe the environment if relevant, like a futuristic city, a medieval village,
    or a magical forest].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Villain Character: I need an image of the antagonist in my novel,
    [Villain''s Name]. They have a [describe menacing or unique appearance, including
    stature, face, and expressions]. Their attire should reflect [specific style or
    theme, like dystopian overlord, elegant but dark wizard, corporate tycoon]. Include
    [any significant props or symbols, like a scepter, a technological gadget, or
    a distinctive piece of jewelry].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Fantasy Creature: Can you create a fantasy creature that''s central
    to my story? It''s called a [Creature''s Name or Type] and resembles a [basic
    form, like dragon, unicorn, etc.], with unique features such as [specific traits
    like scales, wings, fur pattern]. The color scheme is [describe color and texture].
    It should be set in [type of landscape or environment].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Supporting Character: I''d like an image of a key supporting character,
    [Character''s Name]. They are [describe age and role in the story]. Important
    characteristics include [distinctive features like hairstyle, eye color, body
    build]. Their clothing style is [describe - modern, historical, armor, casual,
    etc.], and they typically carry [an item like a book, weapon, musical instrument].'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Sci-Fi Character: Please create an image of a sci-fi character
    from my book, named [Character''s Name]. They should look [describe age, any alien
    features, or technological enhancements]. Their attire is [describe - futuristic
    armor, space suit, casual wear with tech gadgets]. The background should be [describe
    - spaceship interior, alien planet landscape, cyberpunk cityscape].'
  prefs: []
  type: TYPE_NORMAL
- en: Unknown Characteristics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What about when you are still exploring how your characters might look? These
    prompts are intended to assist you in visualizing characters when specific details
    are not yet decided, providing a starting point that can spark your imagination.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for an Undetermined Hero: Create an image of a protagonist whose appearance
    isn''t fully defined yet. Imagine a character with a heroic demeanor in a setting
    that complements their unknown journey – perhaps standing at the edge of a cityscape,
    a forest, or a mystical land. Include elements that suggest courage and resilience,
    like a confident posture or a gaze towards the horizon.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Mysterious Villain: I need an image of a villain whose features
    are not yet clear. Picture a figure shrouded in mystery, with shadows partially
    concealing their face, hinting at a menacing presence. The background should be
    something that implies danger or darkness, like a dimly lit room or a stormy landscape.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Fantasy Sidekick: Create an image of a whimsical sidekick character
    in a fantasy setting. Imagine a creature or person that could be a blend of various
    animals or mythical beings, set in an enchanting forest or ancient ruins. The
    character should exude a sense of loyalty and playfulness.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for an Ambiguous Supporting Character: Visualize a supporting character
    whose details are not yet finalized. This character could be anyone – a friend,
    a mentor, or a rival. Place them in a neutral setting like a café, a park, or
    a city street. Add elements that suggest a supportive but complex personality,
    like a thoughtful expression or an intriguing accessory.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt for a Sci-Fi Character of Unknown Origin: Generate an image of a sci-fi
    character whose origins and appearance are open-ended. Think of a figure in a
    futuristic or intergalactic setting, perhaps wearing technology-enhanced clothing
    or gear, with a face that''s partially obscured or not fully detailed. The environment
    could be a spacecraft, a distant planet, or a high-tech city, leaving room for
    imagination about their role in the story.'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 28
  prefs: []
  type: TYPE_NORMAL
- en: Genre-Specific Character Images
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Each genre offers unique thematic elements and settings that can inspire distinct
    character traits and appearances, providing a rich canvas for authors to develop
    their story's characters. Here are two prompts for each genre – one for authors
    with defined character details and another for those still exploring their character's
    appearance.
  prefs: []
  type: TYPE_NORMAL
- en: Fantasy Genre
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Defined Character: Create an image of a fantasy character named [Character''s
    Name]. They are a [describe role - elf, wizard, warrior]. Key features include
    [specific attributes like hair color, attire, magical items]. The setting is [describe
    - enchanted forest, ancient castle].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Undefined Character: Visualize a fantasy character whose details are open.
    Imagine a being that could fit into a world of magic and myth, like a mysterious
    sorcerer or a mythical creature, in a setting that''s rich in fantasy elements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Science Fiction Genre
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Defined Character: Generate an image of a sci-fi character named [Character''s
    Name], a [role - space explorer, alien, scientist]. Include specific features
    like [futuristic outfit, any technological enhancements, alien characteristics].
    Set them in [space station, alien landscape].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Undefined Character: Create an image of an undefined sci-fi character. Think
    of a figure that could belong to a distant future or an advanced alien civilization,
    with a setting that complements their potential role in a sci-fi narrative.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Mystery Genre
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Defined Character: Craft an image of a mystery character named [Character''s
    Name]. They are a [detective, suspect, informant]. Detail their appearance with
    [detective attire, suspicious features, etc.]. The background could be [crime
    scene, shadowy alley, detective''s office].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Undefined Character: Envision a mysterious figure whose details are not yet
    clear. Place them in a setting that evokes intrigue and suspense, like a foggy
    street or a dimly lit room, with elements that suggest a mystery to be solved.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Romance Genre
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Defined Character: Create an image of a romantic character named [Character''s
    Name]. They are a [type of romantic lead]. Include features like [charming smile,
    elegant dress, casual attire]. The setting should be something that evokes romance,
    like a cozy café or a beautiful garden.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Undefined Character: Imagine a character in a romantic setting who could be
    part of a love story. The details are open-ended – think of a figure that exudes
    romantic potential, perhaps caught in a moment of contemplation or a glance towards
    someone unseen.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Horror Genre
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Defined Character: Generate an image of a horror character named [Character''s
    Name], a [monster, ghost, haunted individual]. Their key features are [terrifying
    appearance, ghostly aura, signs of possession]. The setting is [abandoned house,
    creepy forest, haunted asylum].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Undefined Character: Visualize a horror character whose specifics are not yet
    determined. Consider a figure that embodies fear and suspense, set in an environment
    that amplifies a sense of dread, like a shadowy corridor or an eerie, moonlit
    field.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adventure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Defined Character: Craft an image of an adventure character named [Character''s
    Name], a [role - explorer, treasure hunter, adventurer]. They are equipped with
    [gear like a backpack, map, compass] and dressed for [jungle exploration, mountain
    climbing].'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
