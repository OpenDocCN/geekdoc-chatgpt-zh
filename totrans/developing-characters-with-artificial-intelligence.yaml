- en: This JSON template wraps up all of the above and can be given to ChatGPT or
    Claude for it to quickly give you some starting points for your character and
    their development throughout the story.
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
- en: If you have story specifics, include that in the chat when you upload this template.
    If you don’t have a story and just want ideas for a character, copying this template
    directly into Chat is all you need to do. I do recommend minimum guidance of at
    least telling the AI what genre you will be writing.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
- en: You can adjust the “main character” wording to reflect any other character instead
    - villain, secondary character, love interest, etc.
