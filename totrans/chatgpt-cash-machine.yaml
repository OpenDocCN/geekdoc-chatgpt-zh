  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 汤姆通过他的博客直接销售关于高级生存技能的下载式电子书和户外冒险的可打印清单。
- en: 'o Result: The eBook became a hit with his audience, bringing in even more revenue.'
  id: totrans-350
