  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: “Identify if [ticker] is forming a double top or double bottom pattern over
    the past month.”
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
