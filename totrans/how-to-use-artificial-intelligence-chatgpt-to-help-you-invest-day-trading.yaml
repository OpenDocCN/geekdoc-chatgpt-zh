  id: totrans-2072
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将人工智能见解与人类判断相结合将导致更明智的投资决策。
- en: 'Example: Traders using AI to validate strategies before executing trades.'
