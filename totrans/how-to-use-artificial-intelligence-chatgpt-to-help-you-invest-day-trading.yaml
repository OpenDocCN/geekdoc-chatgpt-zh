  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能工具将进一步简化机构的投资组合管理和交易，提高效率并降低成本。
- en: 'Example: Automated portfolio rebalancing and risk management systems.'
  id: totrans-2070
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：自动化的投资组合再平衡和风险管理系统。
