  type: TYPE_NORMAL
- en: 'Why It’s Important:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Protects against losses in any single asset or sector.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Provides more stable and predictable returns over time.
  prefs:
  - PREF_IND
