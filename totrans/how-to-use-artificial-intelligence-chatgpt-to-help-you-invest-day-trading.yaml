  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: “Analyze the moving averages from TradingView data to validate my
    trading strategy.”'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Use Specific Prompts:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Clearly define the data source and the type of analysis needed.
