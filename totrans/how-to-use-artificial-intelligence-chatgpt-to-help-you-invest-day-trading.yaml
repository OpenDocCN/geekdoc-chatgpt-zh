- en: 'Personalization: How to adapt ChatGPT to your specific investing style:'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个性化：如何调整ChatGPT以适应您的特定投资风格：
- en: 'For day trading: Prompts for real-time market updates and technical indicators.'
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于日内交易：实时市场更新和技术指标的提示。
- en: 'For swing trading: Prompts for mid-term trend analysis and chart patterns.'
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于波段交易：中期趋势分析和图表模式的提示。
- en: 'For long-term investing: Prompts for fundamental analysis and sector growth
    trends.'
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于长期投资：基本分析和行业增长趋势的提示。
- en: 'Building a Prompt Library:'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建提示库：
- en: Creating a set of reusable, optimized prompts to save time.
  id: totrans-173
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一组可重复使用的、优化的提示以节省时间。
- en: 'Examples:'
  id: totrans-174
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: “Identify three undervalued stocks with a P/E ratio below 15 in the healthcare
    sector.”
  id: totrans-175
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “在医疗保健领域，识别三个市盈率低于15的估值股票。”
- en: “List top-performing ETFs tracking renewable energy.”
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “列出跟踪可再生能源表现最佳的ETF。”
