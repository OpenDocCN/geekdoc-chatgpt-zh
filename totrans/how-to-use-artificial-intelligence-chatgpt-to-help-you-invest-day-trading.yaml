  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: “Does a current ratio of 0.8 for [company] signal liquidity concerns?”
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
