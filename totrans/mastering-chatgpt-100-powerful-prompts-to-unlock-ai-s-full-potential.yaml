- en: '"Revenge is central to Hamlet. The protagonist, Prince Hamlet, seeks to avenge
    his father’s murder by killing King Claudius. However, Hamlet''s hesitation reflects
    the moral and psychological complexities of vengeance. While other characters,
    like Laertes, act impulsively, Hamlet’s deliberation ultimately leads to tragedy,
    highlighting how revenge can consume individuals and lead to unintended consequences."'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: “复仇是《哈姆雷特》的核心。主角，王子哈姆雷特，通过杀死克劳狄斯国王来为父亲的谋杀复仇。然而，哈姆雷特的犹豫反映了复仇的道德和心理复杂性。而其他角色，如莱尔提斯，则行动冲动，哈姆雷特的深思熟虑最终导致了悲剧，突显了复仇如何吞噬个人并导致意想不到的后果。”
