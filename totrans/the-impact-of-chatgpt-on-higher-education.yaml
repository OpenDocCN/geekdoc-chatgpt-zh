  type: TYPE_NORMAL
- en: Chapter 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Exploring ChatGPT's Impact on Higher Education – A Case Study
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Revolutionary Impact of AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Throughout the ages, technological advancements have disrupted traditional practices,
    necessitating individuals to adjust and weigh the potential advantages and disadvantages
    of emerging technologies. From the printing press to the blackboard, from the
    computer to the internet, each new innovation has shaped the way we teach and
    learn. And artificial intelligence (AI) is set to be the next catalytic jump forwards.
    Although AI has been around since the mid-1950s, it is only in recent times that
    data mining, advanced algorithms and powerful computers with vast memory have
    been developed, thus making AI increasingly relevant. From problem-solving in
    the 1950s to the simulation of human reasoning in the 1960s, from early mapping
    projects in the 1970s to the development of intelligent assistants in the 2000s,
    AI has made impressive strides. Today, AI manifests in household personal assistants
    like Siri and Alexa, self-driving cars and automated legal assistants. It has
    also spawned AI-assisted stores, AI-enabled hospitals and the ubiquitous Internet
    of Things. In the realm of higher education, the integration of AI technologies
    holds transformative potential for traditional teaching and learning practices.
    However, a new era has now arrived with the emergence of ChatGPT, the game-changing
    AI chatbot. So what is ChatGPT?
  prefs: []
  type: TYPE_NORMAL
- en: The Arrival of Chat Generative Pre-trained Transformer (ChatGPT)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT, an influential AI chatbot developed by OpenAI, has emerged as a game-changer
    in education, offering students dynamic and human-like conversations through natural
    language processing (NLP). Since its launch on 30 November 2022, ChatGPT has revolutionised
    the educational landscape, providing students with immediate access to information,
    personalised recommendations and continuous support throughout their academic
    journey. However, its implementation has also raised concerns about academic integrity,
    leading some institutions to ban its usage or adopt stricter assessment methods
    to combat AI-based cheating. This has sparked global discussions among educators,
    debating whether ChatGPT represents an opportunity or a threat.
  prefs: []
  type: TYPE_NORMAL
- en: At its core, ChatGPT operates by harnessing the power of NLP to comprehend and
    respond to human queries in a conversational manner. Through advanced algorithms
    and machine learning techniques, ChatGPT has been trained on vast datasets to
    generate human-like responses, making it an indispensable tool for engaging with
    students. The interactive and personalised nature of ChatGPT's conversations makes
    it highly valuable in the educational landscape. Students can instantly access
    answers to their questions, relevant resources and tailored recommendations based
    on their learning needs. Whether seeking clarifications, additional information
    or guidance, ChatGPT serves as a reliable and readily available support system
    throughout their academic journey. Furthermore, instructors can leverage ChatGPT
    to streamline administrative tasks and enhance the learning experience. By automating
    routine administrative processes, such as addressing frequently asked questions
    and providing course-related information, instructors have more time to focus
    on meaningful interactions with students. Additionally, ChatGPT can offer timely
    and personalised feedback, providing students with real-time guidance and support.
    Integrating ChatGPT into the educational environment can lead to a more engaging
    and interactive learning experience. Students benefit from immediate assistance,
    personalised guidance and a supportive learning environment, while instructors
    can optimise their teaching practices and facilitate more meaningful interactions.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the potential of ChatGPT in higher education is promising. However,
    it is essential to recognise the caveats that accompany it. To begin with, addressing
    the ethical considerations and limitations surrounding ChatGPT is crucial. These
    encompass concerns about its reliance on heuristics, lack of transparency in internal
    workings, issues with capability versus alignment, limitations in helpfulness,
    interpretability challenges, issues of bias and fairness, factual accuracy and
    truthfulness, as well as ethical concerns regarding data privacy and cybersecurity.
    Moreover, the impact of ChatGPT on industries, including higher education, necessitates
    thorough investigation. The integration of AI technologies like ChatGPT brings
    transformative effects on job markets, resulting in the elimination and transformation
    of positions, requiring a re-evaluation of traditional work models. Within education,
    institutions and companies face disruptive challenges as ChatGPT alters job roles,
    posing questions about the value of human expertise and critical thinking skills.
    Additionally, financial implications and the costs associated with implementation
    and ongoing support require careful consideration. Furthermore, the concentration
    of AI power and the potential for corporate dominance are critical factors to
    explore. The risk of a few dominant companies controlling and influencing AI raises
    concerns about limited diversity, choice and fair competition, emphasising the
    need to address data ownership, privacy and the possibility of monopolistic practices.
    Establishing comprehensive policies and regulations becomes essential to ensure
    ethical use, responsible deployment and accountability in the integration of ChatGPT
    and similar technologies. Lastly, the scarcity of research on the specific impact
    of ChatGPT in teaching, learning and higher education institutions underlines
    the significance of investigation. The limited availability of case studies, insufficient
    student perspectives and inadequate understanding of necessary adaptations in
    educational objectives and practices create a substantial knowledge gap. It is
    therefore crucial that investigations of ChatGPT in higher education are undertaken,
    due to its potential as well as its associated caveats.
  prefs: []
  type: TYPE_NORMAL
- en: In the wake of the COVID-19 pandemic, educational approaches underwent a significant
    shift. However, compared to the emergence of ChatGPT, the impact of the pandemic
    may appear relatively small. While instructors and institutions had the option
    to revert to traditional educational methods as the pandemic receded, the same
    cannot be said for ChatGPT and AI chatbots. In fact, one could argue that ChatGPT
    represents a new kind of ‘pandemic’ in the educational landscape. So, how should
    this be addressed?
  prefs: []
  type: TYPE_NORMAL
- en: MEF University's Response to ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MEF University, a pioneering non-profit private institution located in Istanbul,
    Turkey, has been at the forefront of embracing innovative educational methodologies
    since its inception. Founded by Dr İbrahim Arıkan, the university envisions revolutionising
    higher education by equipping students with the skills necessary for future careers
    and addressing the dynamic demands of contemporary industries and society. By
    strategically investing in infrastructure and cutting-edge technology, MEF has
    solidified its reputation as a forward-thinking institution. Since its establishment
    in 2014, MEF became a trailblazer by fully embracing the flipped learning approach
    across its entire campus. This pedagogical model emphasises student-centred learning
    and the cultivation of critical thinking skills. Under this framework, students
    engage with course content outside of class, while in-class time is dedicated
    to the practical application of these principles. Instructors adopt roles as facilitators
    or coaches, delivering personalised support and feedback. However, MEF University's
    commitment to enhancing the learning experience and embracing innovation did not
    stop there. In 2019, the institution phased out traditional final exams in favour
    of project-based and product-focused assessments, fostering active learning and
    tangible application of acquired knowledge. Additionally, digital platforms and
    adaptive learning technologies were seamlessly integrated into programmes, providing
    interactive resources and tailoring the learning journey to each student's unique
    needs. The integration of Massive Open Online Courses (MOOCs) further expanded
    self-directed learning opportunities, culminating in the development of the Flipped,
    Adaptive, Digital and Active Learning (FADAL) model (Şahin & Fell Kurban, 2019).
    This model proved its worth when the COVID-19 pandemic struck in 2020\. While
    conventional institutions grappled with the transition to online learning, MEF
    University's FADAL approach facilitated a seamless shift. The institution's emphasis
    on technology, active learning and personalised education ensured a smooth transition
    to remote learning. Accolades, including being recognised as Turkey's top university
    for effectively navigating the pandemic through national student satisfaction
    surveys and receiving the 2020 Blackboard Catalyst Award for Teaching and Learning,
    underscored MEF's successful adaptation to the new educational landscape. Building
    on this foundation, the institution introduced an AI minor programme, Data Science
    and AI, in 2021\. This programme equips students across all departments with comprehensive
    skills in data management, analytics, machine learning and deep learning, preparing
    them for real-world applications. Through these strategic initiatives, MEF University's
    commitment to disruptive innovation and investment in new technologies have positioned
    it as a leader in preparing students to meet the evolving demands of industries
    and society.
  prefs: []
  type: TYPE_NORMAL
- en: The public launch of ChatGPT on 30 November 2022 sparked robust discussions
    at MEF University about the potential opportunities and challenges it introduces
    to higher education. In response, three individuals at the university volunteered
    to undertake an initial experiment spanning from December 2022 to January 2023\.
    This experiment involved integrating ChatGPT into course design, classroom activities
    and evaluating its impact on assessments and exams. The findings from this experiment
    catalysed a faculty meeting in January 2023\. During this meeting, the origins
    and potential implications of ChatGPT were presented, and the volunteers shared
    concrete examples of its incorporation in various educational contexts. The diverse
    array of perspectives expressed during the meeting underscored the necessity for
    an in-depth institutional case study to comprehensively explore ChatGPT's impact
    on education within MEF University. Specifically, the university aimed to understand
    how ChatGPT could potentially reshape the roles of students, instructors and higher
    education institutions. Recognising the gravity of the situation and the imperative
    for further exploration, the concept for the research project outlined in this
    book was conceived.
  prefs: []
  type: TYPE_NORMAL
- en: The core objectives of our research project encompass a thorough exploration
    of ChatGPT's potential impact on students and instructors within the realm of
    higher education. By immersing ourselves in the implementation of this transformative
    technology, our study aims to unearth potential challenges and barriers that may
    emerge. This endeavour offers invaluable insights into the transformative role
    AI chatbots like ChatGPT can play in reshaping the teaching and learning landscape.
    Our overarching mission is to delve into how the integration of ChatGPT might
    redefine the roles of students, instructors and higher education institutions.
    Through this inquiry, we aspire to gain a profound understanding of how AI chatbots
    might reshape dynamics and responsibilities within the educational sphere. By
    scrutinising these shifts, we seek insights into the implications for educators,
    learners and universities as a whole. Furthermore, our research aims to contribute
    to the broader discourse surrounding the integration of AI technologies in higher
    education. Guided by three pivotal research questions that structure our investigation,
    namely, ‘How may ChatGPT affect the role of the student?’; ‘How may ChatGPT affect
    the role of the instructor?’; and ‘'How may ChatGPT affect the role of institutions
    of higher education?’, our study aims to offer valuable insights that will inform
    educational practices, guide policy formulation and shape the future integration
    of AI technologies in higher education institutions. Ultimately, our research
    endeavours aim to contribute to a deeper understanding of the potential benefits
    and considerations associated with ChatGPT, ensuring its effective and responsible
    integration within the realm of higher education.
  prefs: []
  type: TYPE_NORMAL
- en: Purpose and Scope of the Book
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This book aims to provide a comprehensive analysis of MEF University's exploratory
    case study, delving into the potential impacts of ChatGPT on various stakeholders.
    Drawing from diverse perspectives, experiences and anecdotes, our objective is
    to offer a profound understanding of the transformative shifts occurring within
    our institution. By delving into these findings, we intend to contribute meaningfully
    to the broader discourse on ChatGPT's implications in higher education and offer
    valuable insights to institutions facing similar inquiries.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this opening chapter, we introduced ChatGPT and highlighted the significance
    of investigating its role in higher education. We established our research context,
    reasons for conducting this study, research objectives and research questions.
    Chapter 2 delves into the emergence of chatbots, shedding light on their limitations
    and ethical considerations. Additionally, we explore ChatGPT''s profound impact
    on employment and education, as well as scrutinising evolving educational policies
    in response to these changes. We conclude this chapter by discussing the need
    for robust policies to address potential risks associated with AI. Chapter 3 constructs
    a theoretical framework by incorporating critical theory and phenomenology. This
    framework enables us to comprehensively examine ChatGPT''s impact, encompassing
    power dynamics, social structures, subjective experiences and consciousness, thereby
    providing deeper insights into its relevance and broader implications. In Chapter
    4, we present a literature review of ChatGPT in higher education, identifying
    valuable insights and specific gaps, while explaining how our study addresses
    these gaps and advances understanding. Chapter 5 introduces the research methodology,
    employing a qualitative exploratory case study approach at MEF. We utilise interviews,
    observations, research diaries and surveys for data collection. Thematic analysis
    aids in interpreting the data, leading to the identification of themes, including:
    Input Quality and Output Effectiveness of ChatGPT, Limitations and Challenges
    of ChatGPT, Human-like Interactions with ChatGPT; the Personal Aide/Tutor Role
    of ChatGPT; Impact of ChatGPT on User Learning and Limitations of Generalised
    Bots for Educational Context. Chapter 6 offers an interpretation of these themes,
    linking them to the research questions, data, literature review and theoretical
    framework. The book then transitions to discussing the practical implications
    derived from the findings and interpretation. In Chapter 7, we delve into the
    ethical implications, including critiquing AI detection tools, scrutinising current
    AI referencing systems, the need to rethink plagiarism in the AI age, the need
    to cultivate proficiency in AI ethics and the importance of enhancing university
    ethics committees'' roles. Chapter 8 delves into product implications, emphasising
    the necessity of fair access to AI bots for all students, the importance of fostering
    industry collaboration to understand AI developments, how we should approach decision-making
    regarding specialised bots and the importance of integrating prompt engineering
    courses into programmes. Chapter 9 explores educational implications, discussing
    the impact of AI on foundational learning, how we can navigate AI challenges through
    flipped learning, how we can design AI-resilient assessment and instruction strategies,
    and the importance of fostering AI literacy in students and instructors. In Chapter
    10, we highlight our study''s contributions to knowledge and research. Beginning
    with an overview of our research structure, the chapter delves into key insights
    and findings, revisiting essential themes. Our theoretical framework is discussed
    for advancing AI discourse by blending philosophy and technology in educational
    research. We explore practical implications for higher education institutions.
    Moreover, we advocate that universities bear a moral duty to actively engage in
    the global AI conversation. Addressing research limitations, we outline how we
    plan to overcome them in future studies. Recommendations for additional relevant
    research areas are also presented to further explore AI in higher education. The
    chapter concludes by underscoring our role as authors of the AI narrative, with
    the power to shape AI technologies in alignment with our shared values and aspirations.'
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, this book provides a comprehensive exploration of the implications
    of ChatGPT within both our institution and higher education at large. Our in-depth
    case study yields profound insights into the transformative power of AI tools
    like ChatGPT. By sharing these insights and their broader implications, our goal
    is to foster meaningful discussions, critical engagement and purposeful initiatives
    in the field. Our endeavour offers valuable guidance to other institutions, allows
    us to reflect on our experiences and envisions a future where education thrives
    in an AI-enhanced environment. We extend a warm invitation to educators, university
    leaders and institutions to join us in responsibly harnessing AI's potential,
    thereby shaping a more promising horizon for education.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Navigating the Landscape of AI Chatbots
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Emergence and Growth of Chatbots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Artificial intelligence (AI) has transformed human existence by processing vast
    data and performing tasks resembling human capabilities (Anyoha, 2017). Early
    AI faced challenges, but the breakthrough Logic Theorist showcased its potential
    (Anyoha, 2017). Thriving in the 1990s and 2000s, AI achieved landmark goals despite
    funding hurdles (Anyoha, 2017). The development of conversational AI systems progressed
    significantly, with milestones like ELIZA, ALICE and SmarterChild (Adamopoulou
    & Moussiades, 2020; Shum et al., 2018). In November 2022, OpenAI unleashed Chat
    Generative Pre-trained Transformer (ChatGPT), a powerful natural language processing
    (NLP) model with 175 billion parameters, rapidly gaining one million users. GPT-3.5,
    developed in 2020, marked a significant advancement in language models, capable
    of learning from any text and performing various tasks (Rudolph et al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: In 2022, OpenAI unveiled ChatGPT-3.5, followed by GPT-4 in 2023. Notably, companies
    like Microsoft seamlessly integrated ChatGPT into their products (Milmo, 2023a;
    Waugh, 2023). The rising popularity of ChatGPT has ignited discussions about the
    future of search engines, particularly concerning Google (Paleja, 2023b). In response,
    Google introduced its own chatbot technologies, including LaMDA and Apprentice
    Bard (Milmo, 2023a). Sundar Pichai, CEO of Alphabet, voiced strong confidence
    in Google's AI capabilities (Milmo, 2023a) and revealed plans to seamlessly integrate
    chatbots into their product offerings. Furthermore, other companies have also
    entered the AI chatbot arena. In April 2023, Elon Musk, CEO of Twitter (now renamed
    as X), playfully proposed the idea of ‘TruthGPT’ in response to ChatGPT's reluctance
    to address controversial topics. Musk highlighted the need for an AI system free
    from such constraints, leading to the inception of a cryptocurrency-based project
    to tackle this challenge (Sabarwal, 2023). Later, in July 2023, Meta introduced
    its advanced AI system, ‘Llama 2’. Mark Zuckerberg proudly announced its collaboration
    with Microsoft and the availability of this AI for research and commercial purposes
    (Sankaran, 2023). Thus, industry has now taken the lead in machine learning model
    development, surpassing academia. This is the current situation. However, what
    lies ahead?
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI states that its long-term goal is to create ‘artificial general intelligence’
    (AGI) (Brockman & Sutskever, 2015). AGI refers to AI systems that possess the
    ability to understand, learn and apply knowledge in a way that's comparable to
    human intelligence. AGI would be capable of performing a wide range of tasks and
    adapting to new situations without being explicitly programmed for each specific
    task, making it a higher level of AI than the specialised, narrow AI systems currently
    available. Tech entrepreneur, Siqi Chen, claims that GPT-5 will achieve AGI by
    the end of 2023, generating excitement in the AI community (Tamim, 2023). Chen's
    claim, while not widely held at OpenAI, suggests that generative AI is making
    significant strides (Tamim, 2023). Sam Altman, the CEO of OpenAI, goes one step
    further, hinting at the potential for AI systems to far surpass even AGI (Sharma,
    2023). He believes that AI's current trajectory indicates remarkable potential
    for unprecedented levels of capability and impact in the near future (Sharma,
    2023). In summary, AI's transformative impact on human existence, coupled with
    the rapid advancement of chatbots like ChatGPT, highlights the potential for significant
    changes in various industries and the field of AI as a whole. However, this does
    come with caveats.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges and Ethical Considerations in AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As AI chatbots like ChatGPT continue to evolve and become more prevalent in
    our daily lives, we are starting to understand more about their limitations. One
    of the biggest questions surrounding ChatGPT is how it works, and even the creators
    themselves do not fully understand it. They attempted to use AI to explain the
    model, but encountered challenges due to the ‘black box’ phenomenon present in
    large language models like GPT (Griffin, 2023). This lack of transparency raises
    concerns about biases and the dissemination of inaccurate information to users.
    Researchers are exploring ‘interpretability research’ to understand the inner
    workings of AI models (Griffin, 2023). One approach involves studying individual
    ‘neurons’ within the system, but the complexity of billions of parameters makes
    manual inspection impractical. To address this, OpenAI researchers employed GPT-4
    to automate the examination of system behaviour (Griffin, 2023). Despite limitations
    in providing human-like explanations, the researchers remain optimistic about
    AI technology's potential for self-explanation with continued research (Griffin,
    2023). However, further work is needed to overcome the challenges in this field,
    including describing the system's functioning using everyday language and considering
    the overall impact of individual neuron functionality (Griffin, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: At the core of ChatGPT lies language processing, encompassing various aspects
    like grammar, vocabulary and cultural context. While it can perform numerous language-related
    tasks, its understanding is limited to learnt patterns from training data. Unlike
    humans, ChatGPT lacks actual consciousness or self-awareness, relying on heuristics,
    which are rules of thumb used to make efficient decisions in complex situations
    (Kahneman, 2011). In language processing, heuristics help parse sentences, recognise
    patterns and infer meanings based on context. ChatGPT uses deep learning algorithms
    trained on extensive text data to generate relevant and coherent responses (Sánchez-Adame
    et al., 2021). However, language's constant evolution and complexity still present
    limitations for AI chatbots.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT also has some limitations that lead to gaps in its knowledge base and
    issues with generating accurate responses (Johnson, 2022; Rudolph et al., 2023).
    It can frequently repeat phrases, reject questions or provide answers to slightly
    modified versions of questions (Johnson, 2022). Additionally, some chatbots, including
    ChatGPT, have been observed using language that is misogynistic, racist and spreading
    false information (Johnson, 2022). These issues stem from the challenge of aligning
    the model''s behaviour with human values and expectations (Ramponi, 2022). Large
    language models like ChatGPT are trained to optimise their objective function,
    which may not always align with human values when generating text (Ramponi, 2022).
    This misalignment can hinder the practical applications of chatbots in systems
    that require reliability and trust, impacting human experience (Ramponi, 2022).
    This is often seen in the following ways (Ramponi, 2022):'
  prefs: []
  type: TYPE_NORMAL
- en: '*Lack of Helpfulness*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where a language model fails to accurately understand and execute the specific
    instructions provided by the user.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Hallucinations*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the model generates fictitious or incorrect information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Lack of Interpretability*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When it is hard for humans to comprehend the process by which the model arrived
    at a particular decision or prediction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Generating Biased or Toxic Output*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When a model generates output that reproduces such biases or toxicity (due to
    being trained on biased or toxic data) even if it was not intentionally programmed
    to do so.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But why does this happen? Language models like transformers are trained using
    next-token-prediction and masked-language-modelling techniques to learn the statistical
    structure of language (Ramponi, 2022). However, these techniques may cause issues
    as the model cannot differentiate between significant and insignificant errors,
    leading to misalignment for more complex tasks (Ramponi, 2022). OpenAI plans to
    address these limitations through its release of a limited version of ChatGPT,
    (ChatGPT-3.5) and gradually increasing its capabilities using a combination of
    supervised learning and reinforcement learning, including reinforcement learning
    from human feedback, to fine-tune the model and reduce harmful outputs (Ramponi,
    2022). This involves three steps, although steps two and three can be iterated
    continuously.
  prefs: []
  type: TYPE_NORMAL
- en: '*Stage One*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuning a pre-trained language model on labelled data to create a supervised
    policy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Stage Two*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating a comparison dataset by having labellers vote on the policy model's
    outputs and training a new reward model on these data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Stage Three*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Further fine-tuning and improving the supervised policy using the reward model
    through proximal policy optimisation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (Ramponi, 2022)
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI employs a moderation application programming interface (API), an AI-based
    system, to detect violations of their content policy and ensure that harmful language,
    such as misogyny and false news, is avoided (Johnson, 2022). However, the system
    is not perfect and has flaws, as seen when a Twitter user bypassed it to share
    inappropriate content (Johnson, 2022). OpenAI acknowledges the challenges and
    limitations of their language models, including ChatGPT-4, which may produce harmful
    or inaccurate content despite its advanced capabilities (Waugh, 2023). While they
    are actively working to improve the system through supervised and reinforcement
    learning, as well as collaborating with external researchers, challenges related
    to interpretability and hallucinations remain unresolved (Waugh, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: AI ethics is a rapidly evolving field, especially with the rise of generative
    AI systems (GAI), making fairness, bias and ethical considerations crucial (Maslej
    et al., 2023). The 2023 Artificial Intelligence Index Report highlights the presence
    of unfairness and bias in AI systems, leading to potential harms such as allocative
    and representation harm (Maslej et al., 2023). Emily Bender, a University of Washington
    computational linguist, warns that language models can carry biases due to their
    training data, leading to problematic outcomes (Grove, 2023). Instances of AI-related
    ethical issues are on the rise, as demonstrated by the Algorithmic and Automation
    Incidents and Controversies Repository (Maslej et al., 2023). For instance, the
    use of AI in US prisons raised concerns about discrimination, while the Gang Violence
    Matrix in London faced criticism for bias (Maslej et al., 2023). Midjourney's
    AI-generated images also raised ethical concerns (Maslej et al., 2023). Fair algorithms
    are essential to prevent such issues, but currently, AI incidents and controversies
    are on the rise, highlighting the need for continuous ethical vigilance (Maslej
    et al., 2023). To address issues of bias in AI, various applications are being
    utilised. The perspective API by Alphabet's Jigsaw assesses toxicity in language,
    with its use increasing by 106% due to growing AI deployment (Maslej et al., 2023).
    SuperGLUE's Winogender Task measures gender bias in AI systems related to occupations,
    evaluating the use of stereotypical pronouns (Maslej et al., 2023). Instruction-tuned
    models, fine-tuned on instructional datasets, have shown improved performance,
    but they may rely on stereotypes (Maslej et al., 2023). The BBQ and HELM benchmarks
    assess bias and fairness in question-answering systems, highlighting trade-offs
    between accuracy and bias metrics (Maslej et al., 2023). Additionally, machine
    translation models struggle with gendered pronouns, leading to mistranslations
    and potential dehumanisation (Maslej et al., 2023). Despite these challenges,
    these applications are valuable tools to mitigate bias and promote ethical AI
    practices.
  prefs: []
  type: TYPE_NORMAL
- en: Conversational AI raises ethical concerns as well. Researchers from Luleå University
    found that 37% of analysed chatbots were female gendered, and 62.5% of popular
    commercial chatbots defaulted to female, potentially reinforcing biases (Maslej
    et al., 2023). Moreover, dialogue systems may be overly anthropomorphised, making
    users uncomfortable, and many examples in dialogue datasets were rated impossible
    or uncomfortable for machines to output (Maslej et al., 2023). Clear policy interventions
    and awareness of limitations are crucial to address these issues and foster better
    communication with users. Text-to-image models face biases too. Meta researchers
    found Instagram-trained models to be less biased than previous ImageNet-trained
    models (Maslej et al., 2023). And the socially, environmentally and ethically
    responsible (SEER) model showed fairer representations of people (Maslej et al.,
    2023). However, using public data without user awareness for AI training may be
    unethical. A study comparing pre-trained vision-language models revealed gender
    bias in larger models, with contrastive language-image pre-training (CLIP) having
    more bias but higher relevance (Maslej et al., 2023). Stable Diffusion and DALL-E
    2 exhibited biases, as did Midjourney, generating images reinforcing stereotypes
    (Maslej et al., 2023). For example, ‘CEO’ prompted images of men in suits (Maslej
    et al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: AI ethics research is experiencing significant growth and attention in conferences
    and publications. Fairness, Accountability, and Transparency (FAccT), an interdisciplinary
    conference, is a prominent platform for research on algorithmic fairness and transparency,
    witnessing a tenfold increase in submissions since 2018 (Maslej et al., 2023).
    The interest in AI ethics is shared by industry and government-affiliated actors,
    indicating its relevance for policymakers, practitioners and researchers (Maslej
    et al., 2023). European contributions to the field are also on the rise, although
    the majority of authors are still from North America and Western countries (Maslej
    et al., 2023). In recent years, workshops on fairness and bias in AI have emerged,
    with NeurIPS hosting its first workshop on fairness, accountability and transparency
    in 2014 (Maslej et al., 2023). Certain topics, like ‘AI for Science’ and ‘AI for
    Climate’, have gained popularity and transitioned from workshops to the main track,
    reflecting the surge in AI applications in healthcare and climate research (Maslej
    et al., 2023). NeurIPS has seen a rise in papers focused on interpretability and
    explainability, particularly in the main track (Maslej et al., 2023). Additionally,
    statistical methods such as causal inference are being used to address fairness
    and bias concerns, leading to a significant increase in papers submitted on causal
    inference and counterfactual analysis at NeurIPS (Maslej et al., 2023). Privacy
    in machine learning has also become a mainstream concern, with NeurIPS hosting
    workshops and privacy discussions moving into the main track (Maslej et al., 2023).
    The conference now requires authors to submit broader impact statements addressing
    ethical and societal consequences, indicating a growing emphasis on ethical considerations
    (Maslej et al., 2023). The surge in the number of papers on fairness and bias,
    as well as the increase in workshop acceptances, reflects the growing interest
    and importance of this topic for researchers and practitioners (Maslej et al.,
    2023).
  prefs: []
  type: TYPE_NORMAL
- en: AI algorithms also face challenges in factuality and truthfulness. This had
    led to the development of AI for fact-checking and combating misinformation using
    fact-checking datasets (Maslej et al., 2023). However, research on natural language
    fact-checking seems to have shifted, with a plateau in citations of widely-used
    fact-checking benchmarks like FEVER, LIAR and Truth of Varying Shades (Maslej
    et al., 2023). Automated fact-checking systems have limitations, as they assume
    availability of contradicting evidence for new false claims and some datasets
    lack sufficient evidence or use impractical fact-checking articles as evidence
    (Maslej et al., 2023). To address these challenges, the development of the TruthfulQA
    benchmark evaluates the truthfulness of language models on question answering,
    testing misconceptions across various categories (Maslej et al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: AI interfaces like chatbots have practical benefits but raise privacy concerns
    due to their potential for intrusive data collection (O'Flaherty, 2023). Unlike
    search engines, chatbots' conversational nature can catch users off guard, leading
    them to reveal more personal information (O'Flaherty, 2023). Chatbots can collect
    various data types, including text, voice, device, location and social media activity,
    potentially enabling targeted advertising (O'Flaherty, 2023). Microsoft's consideration
    of adding advertisements to Bing Chat and Google's privacy policy permitting targeted
    advertising using user data raise further concerns (O'Flaherty, 2023). However,
    ChatGPT's privacy policy is believed to prioritise personal data protection and
    prohibit commercial exploitation (Moscona, as cited in O'Flaherty, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: In response to data privacy, cybersecurity concerns, some countries and companies
    initially imposed bans on the usage of generative AI technology like ChatGPT.
    For instance, Italy passed a decree banning the use of such technology for processing
    personal data, citing potential threats to data privacy (Paleja, 2023c). However,
    the ban was later lifted after OpenAI addressed regulatory requirements (Robertson,
    2023). Others issued warnings to staff. Companies like JP Morgan and Amazon restricted
    employee use of ChatGPT (O'Flaherty, 2023). Data consultancy firm Covelent advises
    caution, recommending adherence to security policies and refraining from sharing
    sensitive information (O'Flaherty, 2023). Even chatbot companies like ChatGPT
    and Microsoft warn against sharing sensitive data in conversations (O'Flaherty,
    2023). These actions highlight the serious data privacy threats associated with
    AI chatbots.
  prefs: []
  type: TYPE_NORMAL
- en: There are also concerns that AI interfaces, like ChatGPT, have the potential
    to facilitate fraud, spread misinformation and enable cybersecurity attacks, posing
    existential risks (O'Flaherty, 2023). Experts warn that advanced phishing emails
    could be created using chatbots due to their ability to generate content in multiple
    languages with impeccable language skills (O'Flaherty, 2023). Moreover, chatbots
    might spread misinformation, assist in creating realistic deepfake videos and
    contribute to the dissemination of harmful propaganda on social media platforms
    (Tamim, 2023). These risks are already evident, with chatbots being used for malicious
    purposes, such as generating fake news (Moran, 2023). Additionally, AI presents
    security risks, aiding cybercriminals in conducting more convincing and efficient
    cyberattacks (O'Flaherty, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: There are also ethical concerns that surround the potential exploitation of
    African workers in content moderation for AI engines like ChatGPT (Schamus, 2023).
    Earning less than $2 a day, these workers handle distressing online content to
    train AI engines, raising questions about the sustainability and fairness of their
    efforts (Schamus, 2023). The utilisation of African labour for data mining and
    cleansing by a US organisation underscores the ethical predicament of relying
    on underpaid individuals from less economically advantaged regions to benefit
    those in more affluent areas. Consequently, addressing these ethical concerns
    is crucial for the responsible development of AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: Meredith Whitaker, an AI researcher and ethicist, highlights that generative
    AI heavily relies on vast amounts of surveillance data scraped from the web (Bhuiyan,
    2023). However, the specific sources of these data, obtained from writers, journalists,
    artists and musicians, remain undisclosed by proprietary companies like OpenAI
    (Bhuiyan, 2023). This raises concerns about potential copyright violations and
    lack of fair compensation for content creators. When asked about compensation
    for creators, OpenAI's CEO, Sam Altman, mentioned ongoing discussions but did
    not provide a definitive answer (Bhuiyan, 2023). The impact on local news publications,
    whose content is used for training AI models, is also a concern, and Altman expressed
    hope for supporting journalists while considering possible actions (Bhuiyan, 2023).
    Nonetheless, the necessity for external regulation to address these issues is
    evident (Bhuiyan, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: The environmental impact of AI technology, particularly large language models,
    is a growing concern. Data centres, hosting power-hungry servers for AI models
    like ChatGPT, significantly contribute to carbon emissions (McLean, 2023). The
    power source, whether coal or renewable energy, further affects emission levels
    (McLean, 2023). Moreover, the water footprint of AI models is substantial; for
    example, Microsoft's data centres used around 700,000 litres of freshwater during
    GPT-3's training, equivalent to the water needed for hundreds of vehicles (McLean,
    2023). Hence, it's vital to tackle these environmental concerns and imperative
    to discover sustainable solutions as these models continue their expansion (McLean,
    2023).
  prefs: []
  type: TYPE_NORMAL
- en: AI's Impact on the Job Market
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'AI is no longer just a futuristic concept that we see in movies; it''s now
    a reality in our everyday lives – from individuals to organisations, and from
    businesses to governments. Advancements in AI technology have led to its rapid
    deployment, but with great power comes great responsibility. Historian Yuval Noah
    Harari (2018) suggests that to comprehend the nature of these technological challenges,
    we should start by asking questions about the job market: What will the job market
    look like in 2050? Will AI impact all industries, and if so, how and when? Could
    billions of people become economically redundant within the next decade or two?
    Or will automation continue to create new jobs and greater prosperity for all
    in the long run? Will this mirror the positives that happened due to the industrial
    revolution or is this time different? Given the ongoing debate and lack of consensus
    among experts, this section aims to provide some answers to the aforementioned
    questions.'
  prefs: []
  type: TYPE_NORMAL
- en: We are now starting to hear a lot more mainstream conversation regarding the
    social and economic impact that AI and AI chatbots will have on society and industry.
    According to the 2023 Artificial Intelligence Index Report, bar agriculture, forestry,
    fishing and hunting, the demand for AI-related skills is rapidly increasing in
    nearly all sectors of the American economy. The report highlights that between
    2021 and 2022, the number of AI-related job postings increased on average from
    1.7% to 1.9% (Maslej et al., 2023). According to Business Insider, AI technology
    like ChatGPT could drastically change jobs in various industries, such as finance,
    customer service, media, software engineering, law and teaching, including potential
    gains and losses (Mok & Zinkula, 2023). This may happen in the following ways.
  prefs: []
  type: TYPE_NORMAL
- en: In finance, it is thought likely that very soon AI-powered bots will handle
    complicated financial questions, allowing advisors and CFOs to make real-time
    decisions by tapping into AI's knowledge. They will also be able to perform information
    analysis, pattern detection and forecasting. Moreover, ChatGPT will save time
    for marketers in finance by analysing data and providing insights into customer
    behaviour as well as organising information and generating marketing materials
    (*How Will ChatGPT & AI Impact The Financial Industry?*, 2023). In addition, ChatGPT
    has the potential to disrupt jobs across various industries on Wall Street, including
    trading and investment banking. This is because ChatGPT can automate some of the
    tasks that knowledge workers perform today. One advantage of this is that it will
    enable them to concentrate on higher-value tasks. However, it also means that
    AI could do certain jobs that recent college graduates are currently doing at
    investment banks (Mok & Zinkula, 2023). This may lead to the elimination of low-level
    or entry jobs.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to customer service and engagement, according to Forbes, conversational
    AI, such as ChatGPT, has the potential to revolutionise customer service by providing
    human-like conversations that address each user's concerns. Unlike traditional
    chatbots, which follow predetermined paths and lack flexibility, conversational
    AI can automate the upfront work needed for customer service agents to focus on
    high-value customers and complex cases requiring human interaction (Fowler, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: And what about the creative arts? Forbes predicts that ChatGPT is expected to
    have a significant impact on jobs in advertising, content creation, copywriting,
    copy editing and journalism (Fowler, 2023). Furthermore, due to the AI's ability
    to analyse and understand text, it is likely that ChatGPT will transform jobs
    related to media, including enabling tasks such as article writing, editing and
    fact-checking, script-writing for content creators and copywriting for social
    media posts and advertisements (Fowler, 2023). In fact, we are already seeing
    chatbots drafting screenplays (Stern, 2023), writing speeches (Karp, 2023), writing
    novels (Bensinger, 2023) and being used by public relations companies to ‘research,
    develop, identify customer values or changing trends, and strategize optimal campaigns
    for… clients in a matter of seconds’ (Martinez, 2023). There is already a visible
    response from affected employees in response to these developments. In Los Angeles
    in early May 2023, a strike was initiated involving thousands of film and television
    writers, later joined by actors and other members of the film community, with
    the aim not only to address financial matters but also to establish rules preventing
    studios from using AI to generate scripts, excluding human involvement in the
    creative process (Hinsliff, 2023). This shift is also being seen in Buzzfeed,
    which is one of many publishers that have started to use AI-generated content
    to create articles and social media posts, with the aim of increasing efficiency
    and output (Tarantola, 2023). However, the quality of the content generated by
    AI is still a concern for many (Tarantola, 2023). Another area which is being
    affected is fashion, where AI is being used for everything from analysing data
    to create designs for upcoming collections to generating a variety of styles from
    sketches and details from creative directors (Harreis, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to engineering, while ChatGPT may be able to aid engineers in
    their work by generating answers for engineering calculations and providing information
    on general engineering knowledge, it will not be able to replace the knowledge,
    expertise and innovation that engineers bring to the design and product development
    process (Brown-Siebenaler, 2023). However, regarding software engineering, there
    may be many changes. Software engineering involves a lot of manual work and attention
    to detail. However, ChatGPT can generate code much faster than humans which will
    lead to improved efficiency, bug identification and increased code generation
    speed, while also cutting resource costs (Mok & Zinkula, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: With regard to healthcare, Harari (2018) gives the following example by comparing
    what doctors do to what nurses do. Doctors mainly process medical information,
    whereas nurses require not only cognitive but also motor and emotional skills
    to carry out their duties. Harari believes this makes it more likely that we will
    have an AI family doctor on our smartphones before we have a reliable nurse robot.
    Therefore, he expects the human care industry to remain a field dominated by humans
    for a long time and, due to an ageing population, this is likely to be a growing
    industry. And there is now evidence coming out to support Harari's claims. A recent
    study conducted by the University of California San Diego looking at a comparison
    between written responses from doctors and ChatGPT to real-world health queries,
    the panel of healthcare professionals preferred ChatGPT's responses 79% of the
    time (Tilley, 2023). They also found ChatGPT's answers to be of higher quality
    in terms of information provided and perceived empathy, without knowing which
    responses came from the AI system (Tilley, 2023). Furthermore, ChatGPT has even
    demonstrated the ability to pass the rigorous medical licencing exam in the United
    States, scoring between 52.4 and 75% (Tilley, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: According to a recent Goldman Sachs report, generative AI may also have a profound
    impact on legal workers, since language-oriented jobs, such as paralegals and
    legal assistants, are susceptible to automation. These jobs are responsible for
    consuming large amounts of information, synthesising what they learnt, and making
    it digestible through a legal brief or opinion. Once again, these tend to be low-level
    or entry jobs. However, AI will not completely automate these jobs since it requires
    human judgement to understand what a client or employer wants (Mok & Zinkula,
    2023). We are already starting to see examples of AI being used in the legal field.
    DoNotPay, founded in 2015 is a bot that helps individuals fight against large
    organisations for acts such as applying wrong fees, robocalling and parking tickets
    (Paleja, 2023a). In February 2023, DoNotPay was used to help a defendant contest
    a speeding ticket in a US court, with the programme running on a smartphone and
    providing appropriate responses to the defendant through an earpiece (Paleja,
    2023a). In addition, AI judges are already being used in Estonia to settle small
    contract disputes, allowing human judges more time for complex cases (Hunt, 2022).
    Furthermore, a joint research project in Australia is currently examining the
    benefits and challenges of AI in courts (Hunt, 2022). Overall, we are seeing AI
    becoming more popular in courts worldwide. And this is certainly the case in China.
    In March 2021, China's National People's Congress approved the 14th Five-Year
    Plan which aimed to continue the country's judicial reform, including the implementation
    of ‘smart courts’ to digitalise the judicial system (Cousineau, 2021). ChatGPT
    is also demonstrating its ability to excel in legal exams. The latest iteration
    of the AI programme, GPT-4, recently surpassed the threshold set by Arizona on
    the uniform bar examination (Cassens Weiss, 2023). With a combined score of 297,
    it achieved a significant margin of success which, notably, places ChatGPT's performance
    close to the 90th percentile of test takers (Cassens Weiss, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: Just like other industries, the emergence of ChatGPT has compelled education
    companies to reassess and re-examine their business models. According to Times
    Higher Education writers, Tom Williams and Jack Grove, the CEO of education technology
    firm Chegg, Dan Rosensweig, attributes a decline in new sign ups for their textbook
    and coursework assistance services to ChatGPT, believing that as midterms and
    finals approached, many potential customers opted to seek AI-based help instead
    (2023). Williams and Grove believe this shift in consumer behaviour serves as
    a ‘harbinger’ of how the rise of generative AI will disrupt education enterprises
    and is prompting companies to hastily adapt and future-proof their offerings (2023).
    They give the example of Turnitin, which has expedited the introduction of an
    AI detector, and Duolingo, which has incorporated GPT-4 to assist language learners
    in evaluating their language skills (2023). Williams and Grove also note that,
    simultaneously, a wave of newly established start-ups has emerged, offering a
    wide range of services, including personalised tutoring chatbots and proprietary
    AI detectors, each with varying levels of accuracy (2023). They quote Mike Sharples,
    an emeritus professor at the Open University's Institute of Educational Technology,
    saying that it is the larger companies that are successfully integrating AI into
    their existing and well-established products that are thriving. Conversely, Sharples
    cautions that others run the risk of becoming like the ‘Kodak of the late 1990s’,
    unable to adapt swiftly or effectively enough to thrive in a competitive market
    (Williams & Grove, 2023). Sharples goes on to say that he anticipates that numerous
    companies in the education field, particularly distance-learning institutions,
    will face significant challenges in their survival, as students may perceive AI
    as capable of performing their tasks better; however, he cautions that whether
    or not that is the case remains to be seen (Williams & Grove, 2023). Williams
    and Grove also quote Rose Luckin, professor of learner-centred design at University
    College London Knowledge Lab. Luckin describes the advantages of platforms like
    ChatGPT, such as being able to effortlessly generate textbooks and course materials;
    however, she warns that there will be a great need for quality control to address
    errors (Williams & Grove, 2023). However, she points out that this is significantly
    more cost-effective than producing the materials from scratch (Williams & Grove,
    2023). Williams and Grove therefore conclude that the publishing and educational
    technology sectors are going to undergo significant transformations due to these
    developments and stress that companies must recognise these changes and assess
    how student demands and industry requirements are evolving. This will eventually
    help them in identifying the areas where ChatGPT falls short, after which they
    can work to fill those gaps effectively (2023).
  prefs: []
  type: TYPE_NORMAL
- en: As we have seen, AI is leading to major changes in the job market, including
    job gains and job losses. However, what is interesting is that ChatGPT may not
    only be changing jobs but also creating jobs. In fact, OpenAI cofounder, Greg
    Brockman, expressed that concerns about AI tools taking away human jobs were exaggerated,
    and that AI would enable people to concentrate on essential work. Brockman believes
    that the key to the future will be more elevated skills, such as discernment and
    the ability to determine when to delve into details, and that AI will enhance
    what humans can accomplish (Waugh, 2023). According to Fiona Jackson, technology
    writer, some remote workers are already secretly using AI to complete multiple
    jobs at the same time, referring to themselves as ‘overemployed’ because ChatGPT
    helps them finish each job's workload in record time (2023). She reports that
    they are using the tool to produce high-quality written content, which may include
    anything from writing marketing materials to articles to blog posts, and are therefore
    able to work multiple full-time jobs without their employers knowing (Jackson,
    2023). She notes that the inception of such remote work can be traced back to
    the advent of the pandemic, which compelled many employees to assume additional
    jobs to sustain themselves in the wake of economic instability. Built upon this,
    she notes that the emergence of ChatGPT appears to have provided workers with
    an even more advanced online tool that is augmenting their remote work capabilities,
    helping them to effectively manage multiple roles at the same time (Jackson, 2023).
    However, Jackson points out that ChatGPT-generated text often contains errors,
    which some workers see as a positive, as it means their expertise is still required
    to check the AI's work (Jackson, 2023). Jackson further reports that many workers
    who use ChatGPT to supplement their income are living in fear of losing their
    jobs. These professionals recognise the possibility that the rapid advancements
    in AI could ultimately make their positions obsolete (Jackson, 2023). Apparently,
    one worker even likened the impact of AI on the workforce to the historical shift
    from weavers to a single loom operator in the textile industry (Jackson, 2023).
    Therefore, it seems that while AI can be a helpful tool, it also comes with some
    significant risks for those who rely on traditional employment. But what about
    non-traditional employment? What about the new jobs emerging?
  prefs: []
  type: TYPE_NORMAL
- en: We are even seeing that the advent of ChatGPT has led to the creation of a new
    job market where companies are actively seeking prompt engineers to harness the
    bot's potential; a job that involves enhancing the performance of ChatGPT and
    educating the company's staff on how to make the most of this technology (Tonkin,
    2023). Often referred to as ‘AI whisperers’, prompt engineers specialise in crafting
    prompts for AI bots such as ChatGPT, and frequently come from backgrounds in history,
    philosophy or English language, where a mastery of language and wordplay is essential
    (Tonkin, 2023). And we are currently seeing a strong demand for prompt engineers,
    with Google-backed start-up Anthropic advertising a lucrative salary of up to
    $335,000 for a ‘Prompt Engineer and Librarian’ position in San Francisco; a role
    which involves curating a library of prompts and prompt chains and creating tutorials
    for customers (Tonkin, 2023). Additionally, another job posting offers a salary
    of $230,000 for a machine learning engineer with experience in prompt engineering
    to produce optimal AI output (Tonkin, 2023). Interestingly, the job postings encourage
    candidates to apply even if they don't meet all the qualifications. Sam Altman
    is currently emphasising the significance of prompt engineers, stating that ‘writing
    a really great prompt for a chatbot persona is an amazingly high-leverage skill’
    (Tonkin, 2023). Thus, a new job market has opened. But why is this happening so
    quickly and seamlessly? And why are people who did not meet all the qualifications
    being asked to apply? It all comes down to unlocking the potential of capability
    overhang.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the reasons prompt engineers do not have to have a background in computer
    science or machine learning is related to the concept of capability overhang.
    In his article ‘ChatGPT proves AI is finally mainstream – and things are only
    going to get weirder’, James Vincent highlights the concept of ‘capability overhang’
    in AI, which refers to the untapped potential of AI systems, including latent
    skills and abilities that researchers have yet to explore (2022). The potential
    of AI remains largely untapped due to the complexity of its models, which are
    referred to as ‘black boxes’. This complexity makes it challenging to understand
    how AI functions and arrives at specific results. However, this lack of understanding
    opens up vast possibilities for future AI advancements (Vincent, 2022). Vincent
    quotes Jack Clark, an AI policy expert, who describes the concept of capability
    overhang as follows: ‘Today''s models are much more capable than we think, and
    the techniques we have to explore them are very immature. What about all the abilities
    we are unaware of because we have not yet tested for them?’ (Vincent, 2022). Vincent
    highlights ChatGPT as a prime example of how accessibility has impeded the progress
    of AI. Although ChatGPT is built on GPT-3.5, an improved version of GPT-3, it
    was not until OpenAI made it available on the web that its potential to reach
    a wider audience was fully realised. Furthermore, as it was released free of charge,
    this further increased its accessibility. Moreover, despite the extensive research
    and innovation in exploring the capabilities and limitations of AI models, the
    vast and complex intelligence of the internet remains unparalleled. Now, with
    the sudden accessibility of AI capabilities to the general public, according to
    Vincent, the potential overhang may be within reach (2022).'
  prefs: []
  type: TYPE_NORMAL
- en: So, what do the experts have to say about the potential impact of AI on the
    job market? Sam Altman holds an optimistic viewpoint, acknowledging that while
    technology will undoubtedly influence the job market, he believes there will be
    even greater job opportunities emerging as a result. Altman emphasises the importance
    of recognising AI tools like GPT as tools, not autonomous entities (Bhuiyan, 2023).
    In Altman's perspective, GPT-4 and similar tools are poised to excel at specific
    tasks rather than completely supplanting entire jobs (Bhuiyan, 2023). He envisions
    GPT-4 automating certain tasks while concurrently giving rise to novel, improved
    job roles (Bhuiyan, 2023). However, Altman's optimism contrasts with the outlook
    of Sir Patrick Vallance, the departing scientific adviser to the UK government
    (Milmo, 2023c). Vallance adopts a more cautious stance, predicting that AI will
    instigate profound societal and economic shifts, with its impact on employment
    potentially rivalling that of the Industrial Revolution (Milmo, 2023c). Moreover,
    the Organisation for Economic Co-operation and Development (OECD) contends that
    major economies stand on the brink of an AI revolution, which could lead to job
    losses in skilled professions such as law, medicine and finance. According to
    the OECD, approximately 27% of employment across its 38 member countries, including
    the United Kingdom, United States and Canada, comprises highly skilled jobs vulnerable
    to AI-driven automation. The OECD specifically highlights roles in sectors like
    finance, medicine and legal activities, which require extensive education and
    accumulated experience, as suddenly susceptible to AI-driven automation (Milmo,
    2023e). In fact, these predictions are already starting to materialise. In May
    2023, IBM's CEO announced a temporary halt in hiring for positions that could
    potentially be replaced by AI, estimating that around one-third of the company's
    non-customer facing roles, approximately 7,800 positions, could be affected (Milmo,
    2023c). The influence of AI has also reached the stock markets, as evidenced by
    the significant decline in the share price of UK education company Pearson following
    revised financial projections by US-based provider Chegg, attributing the impact
    to ChatGPT and its effect on customer growth (Milmo, 2023c). Therefore we can
    see that the negative influence of AI is already here, it is already happening.
  prefs: []
  type: TYPE_NORMAL
- en: AI's Impact on Education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In 2023, Felten et al. conducted a study to evaluate the degree to which advancements
    in AI language modelling capabilities could affect various occupations. Their
    findings indicate that the education sector is going to be hit particularly hard.
    Out of the 20 professions they identified as being most at risk, 85% of these
    projected job losses were in the field of education. Starting with those with
    the highest risk, these include: psychology teachers; communications teachers;
    political scientists; cultural studies teachers; geography teachers; library science
    teachers; clinical, counselling and school psychologists; social work teachers;
    English language and literature teachers; foreign language and literature teachers;
    history teachers; law teachers; philosophy and religion teachers; sociology teachers;
    political science teachers; criminal justice and law enforcement teachers and
    sociologists (Felten et al., 2023).'
  prefs: []
  type: TYPE_NORMAL
- en: We are also starting to see a shift in how graduates are being affected. According
    to the 2023 Artificial Intelligence Report, the percentage of new computer science
    PhD graduates from US universities specialising in AI has been increasing steadily
    over the years. In 2021, 19.1% of new graduates specialised in AI, up from 14.9%
    in 2020 and 10.2% in 2010 (Maslej et al., 2023). The trend is shifting towards
    AI PhDs choosing industry over academia. In 2011, a similar number of AI PhD graduates
    took jobs in industry (40.9%) and academia (41.6%). However, since then, a majority
    of AI PhDs are choosing industry, with 65.4% taking jobs in industry in 2021,
    which is more than double the 28.2% who chose academia (Maslej et al., 2023).
    In addition, the number of new North American faculty hires in computer science,
    computer engineering and information fields have remained relatively stagnant
    over the past decade (Maslej et al., 2023). In 2021, a total of 710 new hires
    were made, which is slightly lower than the 733 hires made in 2012\. Furthermore,
    the number of tenure-track hires also saw a peak in 2019 with 422 hires, but then
    dropped to 324 in 2021 (Maslej et al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: There is also a growing difference in external research funding between private
    and public American computer science departments. A decade ago, the median total
    expenditure from external sources for computing research was similar for private
    and public computer science departments in the United States. However, the gap
    has widened over time, with private universities receiving millions more in funding
    than public ones (Maslej et al., 2023). As of 2021, private universities had a
    median expenditure of $9.7 million, while public universities had a median expenditure
    of $5.7 million (Maslej et al., 2023). In response to these changes, universities
    are taking various actions to adapt. They are focusing on several key areas, including
    their infrastructure, programme offerings, faculty recruitment and faculty retention.
    Inside Higher Ed's Susan D'Agostino's May 2023 article provides recent information
    regarding how universities are reacting. Regarding universities' increased investments
    in AI faculty and infrastructure, she gives the following examples. The University
    at Albany, Purdue University and Emory University are currently actively hiring
    a substantial number of AI faculty members, while the University of Southern California
    is investing $1 billion in AI, to recruit 90 new faculty members and establish
    a dedicated AI school (D'Agostino, 2023). Similarly, the University of Florida
    is creating the Artificial Intelligence Academic Initiative Centre, while Oregon
    State University is building an advanced AI research centre with cutting-edge
    facilities (D'Agostino, 2023). In support of these efforts, the National Science
    Foundation is committing $140 million to establish seven national AI research
    institutes at US universities, each with a specific focus area (D'Agostino, 2023).
    However, D'Agostino quotes Victor Lee, an associate professor at Stanford's Graduate
    School of Education, as emphasising the importance of extending AI initiatives
    beyond computer science departments, suggesting that integrating diverse disciplines
    such as writing, arts, philosophy and humanities to foster a range of perspectives
    and critical thinking necessary for AI's development and understanding (2023).
    According to D'Agostino, colleges are also establishing new academic programmes
    in AI. For example, Houston Community College will introduce four-year degree
    programmes in applied technology for AI and robotics, as well as applied science
    in healthcare management, and Rochester Institute of Technology plans to offer
    an interdisciplinary graduate degree in AI (D'Agostino, 2023). Furthermore, the
    New Jersey Institute of Technology will launch two AI graduate programmes, and
    Georgia Tech will lead a statewide AI initiative with a $65 million investment,
    transforming a facility into an AI Manufacturing Pilot Facility (D'Agostino, 2023).
    In addition, Palm Beach State College is introducing an AI programme and aims
    to establish a graduate school offering AI courses (D'Agostino, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: 'As can be seen, many universities are actively expanding their infrastructure
    and programmes to accommodate the growing interest in AI. However, these efforts
    are not without challenges, especially when it comes to recruiting AI faculty
    members. And this is further exacerbated by the existing shortage of computer
    scientists. In fact, these challenges predate the widespread public awareness
    of AI''s potential, as American colleges have long struggled to meet the high
    demand for computer science courses while grappling with a shortage of qualified
    faculty (D''Agostino, 2023). D''Agostino quotes Kentaro Toyama, a professor at
    the University of Michigan, who acknowledges that institutions planning to hire
    a significant number of faculty members may struggle to find individuals with
    the necessary teaching skills for these specialised classes (2023). Therefore,
    it is evident that universities are facing difficulties in recruiting faculty
    members at a pace that meets the demand. However, even if they can manage to hire
    new faculty, there is the additional challenge of retaining these new members
    due to their high demand in the industry. D''Agostino quotes Ishwar K. Puri, Senior
    Vice President of Research and Innovation at Southern California, who says that
    universities should carefully consider the difficulty of retaining computer scientists
    once they are hired (2023). This is because as faculty members gain expertise
    and establish themselves, they become highly sought-after by the private sector,
    which offers salaries that universities are unable to match. Furthermore, Puri
    points out that universities cannot provide the same opportunities for groundbreaking
    work in AI that is currently available in the AI corporations, which may be another
    reason academics choose to leave universities in favour of industry (D''Agostino,
    2023). In order to address this issue, D''Agostino quotes Ravi Bellamkonda, provost
    and executive vice president for academic affairs at Emory University, who suggests
    the following: make starting salaries in computer science departments higher compared
    to other departments, even though it may potentially lead to other challenges
    within the university; and offer unconventional incentives (2023). One example
    he gives of an unconventional incentive is allowing faculty members to consult
    one day a week, thereby blurring the line between academia and industry (D''Agostino,
    2023). As such, Emory University is now supporting collaborations with companies
    such as Google or Amazon, and many faculty members are already engaging in these
    collaborations or choosing to spend their sabbatical at a company instead of another
    academic institution (D''Agostino, 2023).'
  prefs: []
  type: TYPE_NORMAL
- en: 'There are also reports coming out regarding concerns that schools in the United
    Kingdom are having due to the overwhelming pace of AI development and a lack of
    trust in technology companies'' ability to protect students and educational institutions
    (Milmo, 2023d). To address these concerns, a group of headteachers has launched
    a body aimed at advising and safeguarding schools from the risks associated with
    AI (Milmo, 2023d). However, their worries go beyond AI-powered chatbots simply
    facilitating cheating and are expanded to encompass the potential impact on children''s
    well-being as well as the teaching profession itself (2023d). These concerns were
    expressed in a letter to *The Times*, highlighting the ‘very real and present
    hazards and dangers’ posed by AI, particularly in generative AI breakthroughs
    that can produce realistic text, images and voice impersonations (Milmo, 2023d).
    Led by Sir Anthony Seldon, the head of Epsom College, a fee-paying school, the
    group consists of heads from various private and state schools (Milmo, 2023d).
    The primary goal of the group is to provide secure guidance to schools amidst
    the rapidly evolving AI landscape, fuelled by scepticism towards large digital
    companies'' ability to self-regulate in the best interests of students and schools
    (Milmo, 2023d). Their letter also criticises the government for insufficiently
    regulating AI. Therefore, to tackle these challenges, the group plans to establish
    a cross-sector body comprising leading teachers and independent digital and AI
    experts. This body will offer guidance on AI developments and assist schools in
    deciding which technologies to embrace or avoid. The United Nations Educational,
    Scientific and Cultural Organization (UNESCO) resonates with these concerns, amplifying
    them through their *Global Education Monitoring Report* (2023). The report spotlights
    inadequate oversight within the education technology sector, placing children''s
    well-being at risk. Although they note that education technology oversight exists
    in 82% of countries, challenges arise from private actors. Thus, the report underscores
    the necessity to regulate privacy, safety and well-being. Moreover, the report
    unveils that out of 163 education technology products recommended during the pandemic,
    89% collect children''s information. However, just 16% of countries ensure data
    privacy in education. The report also raises the issue of AI algorithms deepening
    inequality, specifically affecting indigenous groups in the United States. Additionally,
    it highlights the surge in cyberattacks targeting education, with incidents doubling
    in 45 US districts between 2021 and 2022\. Another concern in the report lies
    in the adverse effects of excessive screen time on children''s well-being, noting
    that US children spend up to nine hours daily on screens. Yet, despite this, the
    report notes that there are limited regulations for screen time and most countries
    do not ban phones in schools. To address these challenges, UNESCO suggests that
    countries need to adopt comprehensive and tailored data protection laws and standards
    for children and that policymakers should consider the voices of children to protect
    their rights during online activities. They call for sound education technology
    and data governance to ensure equitable and high-quality technology benefits while
    safeguarding children''s rights to privacy and education. They also call for clear
    frameworks, effective regulations and oversight mechanisms to protect the rights
    of children in a world where data exchange is widespread (*Global Education Monitoring
    Report 2023: Technology in Education – A Tool on Whose Terms?* 2023).'
  prefs: []
  type: TYPE_NORMAL
- en: AI's Impact on the World
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'So far in this chapter, we have examined various aspects of AI, including the
    emergence and growth of chatbots, challenges and ethical considerations in AI,
    AI''s influence on the job market and its effect on education. Yet, a more overarching
    inquiry remains: What will be the impact of AI on the world? To delve into this
    question more deeply, we investigate the viewpoints of experts in the field. We
    start by considering opinions expressed before ChatGPT was publicly introduced
    and then transition to perspectives shared after its unveiling.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In 2017, prior to ChatGPT''s introduction, Max Tegmark, a physicist and cosmologist
    renowned for his work in theoretical physics and AI, released ‘Life 3.0: Being
    Human in the Age of Artificial Intelligence’ (Tegmark, 2017). In this book, Tegmark
    navigates the potential influence of AI on human society and envisions the potential
    futures that AI''s advancement could unfold. In particular, he looks into the
    realm of Artificial General Intelligence (AGI), analysing the potential pros and
    cons, which he believes span from the potential positives – such as advancements
    in science, medicine and technology – to the potential negatives, which encompass
    ethical dilemmas and existential risks. Tegmark also puts forward an array of
    hypothetical scenarios that could transpire as AGI evolves, including the prospects
    of utopian outcomes, dystopian visions and a middle ground where human and AI
    coexistence is harmonious. He further investigates the societal implications of
    AGI, including its potential impact on the job market, economy and governance.
    Based on this, he stresses the importance of ethical considerations and conscientious
    development to ensure that AGI ultimately serves the collective benefit of all
    humanity. In 2019, following Tegmark''s book, Gary Marcus, a Cognitive Scientist
    and Computer Scientist, and Ernest Davis, a Professor of Computer Science, published
    ‘*Rebooting AI: Building Artificial Intelligence We Can Trust*’, in which they
    investigate critical aspects and challenges within the AI field, specifically
    focusing on the limitations and deficiencies prevalent in current AI systems.
    Through doing so, they raise critical questions about the trajectory of AI advancement.
    Marcus and Davis contend that, despite notable advancements in AI technology,
    fundamental constraints persist, hindering the development of genuinely intelligent
    and reliable AI systems. They underscore the lack of common sense reasoning, robustness
    and a profound understanding of the world in many contemporary AI systems – qualities
    inherent to human cognition. Based on this, they argue that prevailing AI development
    approaches, often centred on deep learning and neural networks, fall short in
    achieving human-level intelligence and true understanding. Within their work,
    Marcus and Davis place transparency, interpretability and accountability as prominent
    themes, emphasising the significance of rendering AI systems transparent and interpretable,
    particularly in domains where their decisions impact human lives. They assert
    that these considerations are crucial, especially in fields such as healthcare,
    finance and law, where comprehending how AI arrives at its decisions is vital
    for ensuring ethical and equitable decision-making (Marcus & Davis, 2019). Another
    publication in 2019 was ‘*Human Compatible: Artificial Intelligence and the Problem
    of Control*’ by Stuart Russell, a computer scientist and professor at the University
    of California, Berkeley. Russell is widely acclaimed for his significant contributions
    to the field of AI, particularly in machine learning, decision theory and the
    intricate issue of control within AI systems. In his book, Russell explores a
    critical concern in AI advancement: the imperative to ensure that AI systems act
    in harmony with human values and aspirations. The central theme of his work is
    control, addressing the intricate challenge of designing AI systems that benefit
    humanity without entailing risks or unforeseen outcomes. Russell argues that the
    prevailing trajectory of AI development, which focuses on maximising specific
    objectives without sufficient regard for human values, could lead to AI systems
    that are difficult to manage and potentially harmful. As a result, he emphasises
    the paramount importance of early alignment between AI systems and human values
    and advocates for establishing a framework that enables the regulation of AI behaviour
    (Russell, 2019).'
  prefs: []
  type: TYPE_NORMAL
- en: 'As we can see, even before the public release of ChatGPT in November 2022,
    experts were engaged in discussions regarding concerns about the development of
    AI. But what is being said now that AI, such as ChatGPT, has been released to
    the public? It would appear that feelings are mixed. Some view it as an existential
    threat, while others argue that the risk is too distant to warrant concern. Some
    hail it as ‘the most important innovation of our time’ (Liberatore & Smith, 2023),
    while others caution that it ‘poses a profound risk to society and humanity’ (Smith,
    2023). But what is the stance of AI companies themselves? Bill Gates, Sundar Pichai
    and Ray Kurzweil champion ChatGPT, highlighting its potential in addressing climate
    change, finding cancer cures and enhancing productivity (Liberatore & Smith, 2023).
    In contrast, Elon Musk, Steve Wozniak and a group of 2,500 individuals express
    reservations about large language models. In March 2023, they issued an open letter
    urging a pause in their development due to potential risks and societal implications
    (*Pause Giant AI Experiments: An Open Letter*, 2023). Moreover, in May 2023, Dr
    Geoffrey Hinton, a prominent figure in the field of AI, stepped down from his
    position at Google, citing apprehensions about misinformation, disruptions in
    employment and the existential threats posed by AI (Taylor & Hern, 2023). In particular,
    he is concerned about the potential for AI to exceed human intelligence and become
    susceptible to misuse (Taylor & Hern, 2023). Although Gates holds favourable opinions
    about AI, he supports enhanced regulation for augmented AI, especially due to
    issues such as misinformation and deepfakes (Gates, 2023). In a similar vein,
    Sundar Pichai stresses the necessity for AI regulation and is against the advancement
    of autonomous weapons (Milmo, 2023b). Additionally, technology experts, including
    the CEOs of DeepMind, OpenAI and Anthropic, are actively advocating for regulation
    to tackle existential concerns (Abdul, 2023). But are these calls for regulation
    being heeded?'
  prefs: []
  type: TYPE_NORMAL
- en: Navigating the Shifting Landscape of AI Policies and Actions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Emerging worldwide, the landscape of AI policies is undergoing a notable expansion,
    marked by a surge in legal measures and legislative activities that mention ‘artificial
    intelligence’ (Maslej et al., 2023). In the United Kingdom, the Competition and
    Markets Authority (CMA) is actively engaged in a thorough review of AI, with a
    specific focus on addressing concerns surrounding misinformation and potential
    job disruptions (Milmo, 2023c). This comprehensive evaluation by the CMA is squarely
    directed at foundational models such as ChatGPT, aiming to foster healthy competition
    and ensure the protection of consumer interests (Milmo, 2023c). Ministers have
    tasked the CMA with a multifaceted mandate, encompassing safety, transparency,
    fairness, accountability and the potential for emerging players to challenge established
    AI entities (Milmo, 2023c). These initiatives underscore the mounting pressure
    on regulatory bodies to intensify their scrutiny of AI technologies. Simultaneously,
    the UK government is actively working on updating AI regulations to address potential
    risks (Stacey & Mason, 2023). On the other side of the Atlantic, the Vice President
    of the United States convened discussions with AI CEOs at the White House in May
    2023, with the primary focus on safety considerations (Milmo, 2023c). In parallel,
    both the Federal Trade Commission and the White House are conducting investigations
    into the far-reaching impacts of AI (Milmo, 2023c) (*Blueprint for an AI Bill
    of Rights*, n.d.). At a broader international level, the EU''s AI Act introduces
    a comprehensive and structured regulatory framework (‘EU AI Act: First Regulation
    on Artificial Intelligence’, 2023). This framework categorises AI applications
    according to varying levels of risk and seeks to establish itself as a global
    standard for promoting responsible AI practices (‘EU AI Act: First Regulation
    on Artificial Intelligence’, 2023). In July 2023, building upon the initiatives
    outlined earlier, a consortium of prominent technology firms, including OpenAI,
    Anthropic, Microsoft and Google (DeepMind''s owner), introduced the Frontier Model
    Forum (Milmo, 2023f). The forum claims that its primary objective is to stimulate
    AI safety research, establish benchmarks for model evaluation, advocate for the
    conscientious deployment of advanced AI, foster dialogue with policymakers and
    academics on trust and safety concerns and explore favourable applications of
    AI, such as combating climate change and detecting cancer (Milmo, 2023f). The
    Forum acknowledges that it has built upon the significant contributions of entities
    such as the UK government and the European Union in the realm of AI safety (Milmo,
    2023f). Additionally, it''s noteworthy that tech companies, particularly those
    leading the Frontier Model Forum, have recently reached agreements on new AI safeguards
    through conversations with the White House; these safeguards encompass initiatives
    such as watermarking AI content to identify deceptive materials like deepfakes
    and enabling independent experts to evaluate AI models (Milmo, 2023f). Indeed,
    it appears that developments are taking place within the realm of tech companies.
    However, the question that arises is whether we can have confidence in their commitment
    to fulfilling their pledges. Doubts persist among some. And this is not surprising
    given some of the things we have seen AI companies and individuals do and say.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, in October 2022, preceding the launch of ChatGPT, it was reported
    that Microsoft made a notable reduction in the size of its ethics and society
    team (Bellan, 2023). According to insider accounts, growing pressure from the
    CTO and CEO may have played a role in this decision, with the aim of getting the
    latest OpenAI models to customers as soon as possible (Bellan, 2023). Subsequently,
    in March 2023, it was reported that Microsoft decided to lay off the remaining
    members of this team (Bellan, 2023). Those within the team expressed a shared
    belief that these layoffs were likely influenced by Microsoft's intensified focus
    on rapidly releasing AI products to gain an edge over competitors, potentially
    leading to a reduced emphasis on long-term, socially responsible deliberations
    (Bellan, 2023). Despite this, it's important to note that Microsoft has retained
    its Office of Responsible AI, which carries the responsibility of setting ethical
    AI guidelines through governance and public policy initiatives (Bellan, 2023).
    Nevertheless, the action of dismantling the ethics and society team raises valid
    questions about the extent of Microsoft's commitment to authentically infusing
    ethical AI principles into its product design. Another instance emerged directly
    from the mouth of OpenAI CEO Sam Altman, who, just days after advocating for AI
    regulation in the US Congress voiced apprehension about the EU's efforts to regulate
    artificial intelligence (Ray, 2023). Altman expressed his belief that the EU AI
    Act's draft was excessive in its regulations and warned that OpenAI might withdraw
    its services from the region if compliance proved too challenging (Ray, 2023).
    This shift in stance was both sudden and significant, highlighting the considerable
    influence one individual can wield.
  prefs: []
  type: TYPE_NORMAL
- en: It is precisely these instances of power and actions that raise concerns for
    Rumman Chowdhury, a notable figure in the AI domain. Chowdhury recognises recurring
    patterns in the AI industry, akin to the cases mentioned above, which she considers
    as warning signals (Aceves, 2023). One of the key issues she highlights is the
    common practice of entities calling for regulation while simultaneously using
    significant resources to lobby against regulatory laws, exerting control over
    the narrative (Aceves, 2023). This paradoxical approach hinders the development
    of robust and comprehensive regulatory frameworks that could ensure the responsible
    use of AI technologies. Moreover, Chowdhury emphasises that the lack of accountability
    is a fundamental issue in AI development and deployment (Aceves, 2023). She points
    out how internal risk analysis within companies often neglects moral considerations,
    focusing primarily on assessing risks and willingness to take them (Aceves, 2023),
    as we saw with Microsoft. When the potential for failure or reputational damage
    becomes significant, the playing field is manipulated to favour specific parties,
    providing them with an advantage due to their available resources (Aceves, 2023).
    This raises concerns about the concentration of power in the hands of a few, leading
    to potential bias and adverse consequences for the wider population. Chowdhury
    further highlights that unlike machines, individuals possess diverse and indefinite
    priorities and motivations, making it challenging to categorise them as inherently
    good or bad (Aceves, 2023). Therefore, to drive meaningful change, she advocates
    leveraging incentive structures and redistributing power sources in AI governance
    (Aceves, 2023). This would involve fostering collaboration among various stakeholders,
    including governments, industries, academia and civil society, to collectively
    address complex AI-related issues, promote cooperation and reach compromises on
    a large scale (Aceves, 2023). By doing so, she believes we can ensure that AI
    technologies are developed and deployed in a way that benefits society as a whole,
    rather than serving the interests of a select few. In addition to Chowdhury's
    concerns, Karen Hao, senior AI editor at MIT Technology Review, expresses serious
    reservations about the interconnection between advanced AI and the world's biggest
    corporations (Hao, 2020). She points out that, as the most sophisticated AI methods
    demand vast computational resources, only the wealthiest companies can afford
    to invest in and control such technologies and consequently, tech giants have
    significant influence not just on the direction of AI research but also on the
    creation and management of algorithms that impact our daily lives (Hao, 2020).
    These concerns highlight the critical importance of transparency, inclusivity
    and multi-stakeholder collaboration in shaping AI policies and regulations. The
    dialogue and actions surrounding AI governance must involve a diverse range of
    voices and perspectives to ensure that AI technologies are ethically developed,
    responsibly deployed and serve the collective interests of humanity. We return
    to these concerns later in this book. However, for now, our focus turns to the
    creation of a theoretical framework that will empower us to delve deeper into
    the complexities of AI.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Theoretical Framework for Investigating ChatGPT's Role in Higher Education
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Exploring the Need for a Theoretical Framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In our research study, we undertake an exploratory case study to investigate
    the potential impact of Chat Generative Pre-trained Transformer (ChatGPT) on the
    roles of students, instructors and institutions of higher education. This type
    of live experiment provides valuable real-life insights and allows us to validate
    theoretical considerations. However, before delving into the study, it is essential
    to establish our theoretical framework. Theoretical frameworks, grounded in philosophy,
    are commonly employed in postmodern qualitative research to examine diverse perspectives
    and interpretations of a phenomenon. They help align the research with its objectives,
    consider the influence of social and cultural factors on our understanding of
    reality and provide valuable insights from a critical standpoint. In our study,
    we have chosen the qualitative research paradigm to explore the subjective experiences
    and meanings associated with ChatGPT, aiming to understand its impact on various
    stakeholders within our institution. Based on this, we needed to choose theoretical
    frameworks that would comprehensively address both the sociopolitical implications
    and the personal lived experiences associated with ChatGPT's integration in higher
    education. To achieve this, we decided to adopt the theoretical frameworks of
    critical theory and phenomenology. Critical theory, with its focus on societal
    structures and power dynamics, offers a lens through which we can critically interrogate
    the larger implications of technology in educational settings. On the other hand,
    phenomenology, rooted in understanding human experiences, provides an avenue to
    delve into the individual and collective consciousness of stakeholders interacting
    with ChatGPT. The combined strength of both frameworks allows us to present a
    balanced and holistic view, capturing not only the macro-level impacts on institutional
    dynamics but also the micro-level nuances of personal experiences and interpretations.
    As our research advances, we employ these lenses to delve deeper into each theme
    as it emerges. This enables us to shed light on the broader implications of our
    research topic, gaining a comprehensive understanding of its significance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Critical Theory and ChatGPT: Unpacking Power Dynamics and Social Structures'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Critical theory serves as a powerful theoretical framework that delves into
    power dynamics, social structures and ideologies to scrutinise and challenge prevailing
    systems of inequality and oppression. This approach aims to uncover the underlying
    social and political factors that shape our perception of reality, with the ultimate
    goal of empowering marginalised groups (Tyson, 2023). When considering the impact
    of ChatGPT on the various stakeholders within a university, critical theory becomes
    invaluable for several compelling reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Examining Power Dynamics*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Critical theory facilitates an exploration of how ChatGPT could either disrupt
    or reinforce power dynamics within educational environments. It provides a lens
    through which to uncover potential inequalities that might arise from technology's
    utilisation and encourages a thoughtful analysis of how these dynamics could influence
    the landscape of teaching and learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Redefining Instructor Roles*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The transformative potential of ChatGPT extends to reshaping the roles of instructors
    by offering automated responses and student assistance. Within this context, critical
    theory proves instrumental in dissecting how this shift might impact the authority,
    expertise and interaction dynamics between instructors and students. By prompting
    a critical examination, it opens the door to probing the implications and repercussions
    of such changes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Reassessing Student Roles*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As students increasingly engage with artificial intelligence (AI)-powered tools
    like ChatGPT, their roles in the learning process are likely to evolve. Critical
    theory provides a framework for scrutinising how this transformation influences
    student agency, critical thinking and the development of independent learning
    skills. It invites an exploration of whether students become passive consumers
    of information or active participants in shaping their educational journey.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Institutional Implications*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Critical theory's lens extends to encompass the broader landscape of higher
    education institutions as they integrate ChatGPT. It encourages a rigorous analysis
    of how institutional policies, structures and practices need to be reconsidered
    during the adoption of AI technologies. This introspection is vital for understanding
    how these changes may either reinforce or challenge existing power structures
    and inequalities within the educational ecosystem.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In order to enhance our understanding further, we decided to look into the
    works of renowned theorists in the field of critical theory: Clayton Christensen,
    Pierre Bourdieu and Karl Marx.'
  prefs: []
  type: TYPE_NORMAL
- en: Christensen's Disruptive Innovation and the Transformative Potential of ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'At the forefront of business strategy theory is Clayton Christensen''s seminal
    work, ‘*The Innovator''s Dilemma*’ (Christensen, 1997). Here, he introduces the
    world to ‘disruptive innovation’, a phenomenon where smaller companies with limited
    resources rise to challenge and eventually overtake well-established industry
    giants. Though their products might start in niche markets and initially appear
    inferior, they stand out because of their affordability and accessibility. Over
    time, these innovations gain traction, appealing to larger demographic and destabilising
    dominant market players. While Christensen''s disruptive innovation and critical
    theory might initially seem unconnected, a closer examination reveals intricate
    intersections. Central to disruptive innovation is the shift in power dynamics:
    start-ups not only challenge but occasionally dethrone established giants. This
    movement mirrors the principles of critical theory, which is deeply invested in
    studying power relations. Furthermore, disruptive innovations are characterised
    by their democratising potential. They transform products and services, once seen
    as exclusive luxuries, into accessible necessities. When viewed through critical
    theory, this democratisation process becomes even more compelling, offering insights
    into societal access and equity. Beyond market disruptions, Christensen, in collaboration
    with his colleagues, offers another analytical tool: the Theory of Jobs to be
    Done (Christensen et al., 2016). They suggest that consumers do not simply buy
    products or services for their features; they ‘hire’ them to perform specific
    tasks or ‘jobs’. These jobs can be functional, like using a phone to call, social,
    such as buying a luxury car to denote status or emotional, akin to purchasing
    a fitness tracker for the satisfaction it provides. By comprehending these jobs,
    companies can design better, more targeted products. However, staying relevant
    requires continual monitoring and adaptation, as these jobs can evolve.'
  prefs: []
  type: TYPE_NORMAL
- en: Applying Christensen's Theory of Jobs to be Done to investigate the impact of
    ChatGPT on various educational roles can provide valuable insights into the specific
    needs and motivations of stakeholders. By understanding the ‘jobs’ that ChatGPT
    may fulfil for each role, we can better analyse the potential effects on students,
    instructors and institutions of higher education. Regarding the role of the student,
    Christensen's theory can help us uncover the jobs that students aim to fulfil
    in their educational journey. ChatGPT may support students in researching and
    accessing information (functional job), promoting collaborative learning and peer
    interaction (social job) or enhancing their motivation and self-confidence (emotional
    job). Examining these jobs can shed light on how ChatGPT may influence students'
    learning experiences and outcomes. When it comes to the instructor, by applying
    the Theory of Jobs to be Done, we can examine the specific tasks and goals that
    instructors seek to accomplish in their role. ChatGPT may assist instructors in
    automating administrative tasks (functional job), facilitating student engagement
    and interaction (social job) or fostering creativity in lesson planning (emotional
    job). This understanding can guide the exploration of how ChatGPT may augment
    or transform the instructor's responsibilities. By analysing the jobs that institutions
    of higher education aim to fulfil, we can gain insights into how ChatGPT may impact
    their operations. This can include tasks such as enhancing accessibility and inclusivity
    (functional job), fostering innovation and collaboration across departments (social
    job) or adapting to evolving educational demands (emotional job). Understanding
    these jobs can inform strategic decisions regarding the integration and utilisation
    of ChatGPT within educational institutions. Therefore, we believe that melding
    Christensen's disruptive innovation with critical theory presents a multi-dimensional
    framework, as it allows for a comprehensive exploration of technologies, like
    ChatGPT, not just as tools but as potential game-changers in industry and society.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Through Bourdieu's Societal Lens
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our second theorist, Pierre Bourdieu, was a sociologist and philosopher whose
    work focused on the relationship between social structures, cultural practices
    and individuals'' behaviours. His theories of habitus, field and cultural capital
    provide a lens for understanding how social structures shape human behaviour and
    how individuals navigate these structures to achieve success (Webb et al., 2002).
    Bourdieu''s habitus theory posits that an individual''s environment shapes their
    habits, which unconsciously guide their thoughts, actions and preferences (Webb
    et al., 2002). These habits perpetuate social structures and contribute to the
    development and maintenance of power in social groups. His field theory emphasises
    the interplay between social structures and human agency, arguing that social
    reality is composed of various fields, each with its own set of rules and power
    relations (Webb et al., 2002). Bourdieu''s theory of capital suggests that social
    class is determined not only by economic factors but also by cultural and symbolic
    capital. He identifies three forms of capital: economic, cultural and social,
    which individuals in different social classes possess to maintain or improve their
    social status (Webb et al., 2002). Bourdieu (1982) argues that cultural capital,
    in its external form, appears as a self-contained and consistent entity. Although
    it has roots in historical actions, it follows its own distinct rules, overriding
    individual desires. This idea is clearly exemplified by language, which does not
    solely belong to any one individual or collective. Importantly, cultural capital
    is not just a theoretical construct; it has real-world, symbolic and tangible
    power. This power becomes evident when people harness and employ it in diverse
    cultural domains, from arts to sciences. In these fields, individuals'' success
    is often proportional to their understanding of this external form of capital
    and their inherent cultural resources. Regarding language, Pierre Bourdieu understood
    language as being not just a tool for communication but a form of capital he termed
    ‘linguistic capital’. Central to this notion is the interplay between ‘linguistic
    habitus’ and the ‘linguistic market’, which Bourdieu puts forward in the following
    formula:'
  prefs: []
  type: TYPE_NORMAL
- en: Linguistic habitus + linguistic market = linguistic expression, speech
  prefs: []
  type: TYPE_NORMAL
- en: At its core, Bourdieu's linguistic habitus reflects an individual's social history
    and is innate, being embodied within the individual (Bourdieu, 1986). This habitus,
    a product of societal conditions, dictates utterances tailored to specific social
    situations or markets. While one might be tempted to believe that knowledge of
    a language ensures effective communication, Bourdieu postulates that the actual
    execution of speech is governed by the situation's intrinsic rules – rules encompassing
    levels of formality and interlocutors' expectations (Bourdieu, 1978). This brings
    us to his concept of the ‘linguistic market’. Bourdieu believes it is not enough
    to simply speak a language correctly, one must also understand the sociolinguistic
    nuances of where and to whom one speaks (Bourdieu, 1978). This market is both
    tangible and elusive. At its most concrete, it involves familiar social rituals
    and a clear understanding of one's place in a social hierarchy. However, its abstract
    nature lies in the constantly evolving linguistic norms and the subconscious factors
    that influence our speech. Bourdieu's ‘linguistic capital’ encapsulates the tangible
    benefits that specific speakers can accrue (Bourdieu, 1978). Bourdieu's perspective
    accounts for scenarios where speech exists without genuine communication. Consider
    the ‘voice of authority’, where a speaker, backed by societal and institutional
    support, may say much while conveying little (Bourdieu, 1978, p. 80). Bourdieu
    believes linguistic capital is intrinsically tied to power dynamics. It shapes
    value judgements, allowing certain speakers to exploit language to their advantage.
    ‘Every act of interaction, every linguistic communication, even between two people,
    two friends, boy and girl, all linguistic interactions, are in a sense micro-markets
    which always remain dominated by the overall structures’ (Bourdieu, 1978, p. 83).
    Building on Bourdieu's insights, Webb et al. (2002) underscore language's role
    as a mechanism of power that is moulded by an individual's social standing. Interactions,
    verbal or otherwise, are reflective of the participants' societal positions. Bourdieu's
    emphasis on language as a reservoir of social capital is especially poignant.
    When perceived as a resource, language functions as a blend of cultural capital.
    This fusion can be leveraged to forge potent relationships, granting the speaker
    access to invaluable resources within communities or institutions (Webb et al.,
    2002). Bourdieu's cultural reproduction theory, or legacy theory, suggests that
    social inequalities persist from one generation to the next through the transmission
    of cultural values and practices (Webb et al., 2002). This transmission takes
    place through family upbringing, education and socialisation in different institutions.
    Bourdieu argues that the cultural practices and beliefs of the dominant class
    are legitimised and reinforced through the educational system, which acts as a
    significant tool for social reproduction (Webb et al., 2002).
  prefs: []
  type: TYPE_NORMAL
- en: Applying Bourdieu's theory to investigate the impact of ChatGPT on various educational
    roles allows us to examine how social structures, cultural practices and individuals'
    behaviours intersect with the integration of this technology. Bourdieu's concepts
    of habitus, field, cultural capital and cultural reproduction can provide insights
    into the dynamics and potential consequences of ChatGPT regarding the role of
    students, instructors and institutions of higher education. Regarding the role
    of the student, with the introduction of ChatGPT, students may experience changes
    in their habitus and cultural capital. The technology may affect their learning
    practices, as well as their access to and utilisation of knowledge. ChatGPT's
    influence on language interactions and communication may shape the way students
    express themselves, engage with course materials and collaborate with peers. It
    may also impact students' relationship to authority and expertise, potentially
    challenging traditional hierarchies and sources of knowledge. ChatGPT's integration
    can impact the power dynamics within the educational field, as instructors navigate
    the interplay between their own habitus, cultural capital and the expectations
    and demands of using ChatGPT. The technology may alter the distribution of symbolic
    capital and redefine what knowledge and expertise are valued in the teaching profession.
    Instructors may need to negotiate their position and authority in relation to
    ChatGPT, potentially leading to a reconfiguration of the instructor's role and
    the skills required to be an effective educator. And finally, regarding the role
    of institutions of higher education, Bourdieu's theory suggests that the integration
    of ChatGPT may contribute to the cultural reproduction within institutions of
    higher education. It may perpetuate existing power structures by privileging certain
    forms of knowledge and communication. The use of ChatGPT may impact institutional
    practices, curriculum development and assessment methods. Therefore, institutions
    need to critically consider the potential consequences of adopting ChatGPT, and
    how it aligns with their educational goals, values and commitment to social equity.
  prefs: []
  type: TYPE_NORMAL
- en: Marx's Theory of Alienation in the Context of ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Karl Marx, the renowned German philosopher, economist, sociologist and revolutionary
    socialist, stands as a pivotal figure in history. At the heart of his philosophy
    and social thought lies the concept of communism, an alternative socio-economic
    system advocating for collective ownership of property and resources, as opposed
    to private ownership (Elster, 1986). Being a revolutionary socialist, Marx believed
    in the need for a radical, profound change in the system through revolutionary
    means, rather than incremental reforms. Challenging static ideas of human nature,
    Marx proposed that it is continually moulded by historical and social circumstances
    (Elster, 1986). He placed labour at the forefront of societal structures, asserting
    it as the primary generator of all wealth (Elster, 1986). Marx pinpointed a critical
    concern of capitalism: the capital owners exploit workers by taking the surplus
    value produced by their labour (Elster, 1986). This exploitation seeds class struggle,
    primarily between the bourgeoisie, the capitalist class and the proletariat, the
    working class (Elster, 1986). He envisioned a future where the proletariat would
    overthrow the bourgeoisie, paving the way for a socialist society, with collective
    ownership and control of production means (Elster, 1986). While Marx''s theories
    highlighted the working class'' misbelief that their interests are aligned with
    the ruling class, a notion often termed ‘false consciousness’, it''s crucial to
    acknowledge that Marx never directly used this term (Althusser, 1971). Marx aimed
    his critique of political economy at uncovering the contradictions within capitalism,
    emphasising the role of material conditions, especially economic relationships,
    in crafting history (Elster, 1986). Capitalism, for Marx, was a phase in historical
    development, destined to transition to socialism and, ultimately, to communism
    (Elster, 1986). A significant pillar of Marx''s critique was the theory of alienation.
    He detailed how individuals under capitalism become distanced from the products
    of their labour, the labour process, their fellow humans and their innate creative
    potential (Mészáros, 2005). Workers, in the capitalist machinery, are stripped
    of control over production means, leading them to sell their labour for wages.
    Marx distinguished four alienation types: alienation from the created products,
    which become commodities controlled by the exploiting capitalists; alienation
    from the labour process, which becomes monotonous under the profit-driven motivations
    of capitalists; alienation from fellow workers, as capitalism promotes competition
    and individualism and alienation from one''s inherent creative essence, as the
    capitalist system reduces individuals to mere production tools (Mészáros, 2005).
    These facets of alienation give rise to societal issues such as inequality, exploitation
    and the breakdown of genuine human connections (Mészáros, 2005). To address these
    deep-rooted problems, Marx championed the abolition of private ownership of production
    means and the dawn of a classless society, where collective control empowers individuals
    to shape their work and its outcomes (Mészáros, 2005). In conclusion, Marx''s
    ideas paint a landscape deeply concerned with the intricate ties between economic
    mechanisms and societal interactions. His theories have had enduring impacts,
    resonating in various sociopolitical movements and analyses even in contemporary
    times. But how do these relate to ChatGPT?'
  prefs: []
  type: TYPE_NORMAL
- en: Karl Marx's framework on alienation underscores the relationship between workers
    and the essence of their labour. By applying this theory to the modern context
    of higher education, we can ascertain the potential consequences and implications
    of technologies like ChatGPT on students, instructors and institutions. For Marx,
    education could be considered a type of labour, where students invest effort to
    gain knowledge and skills. Introducing ChatGPT could reshape this dynamic, altering
    the student's relationship with their educational labour. While ChatGPT might
    grant swift access to information, which might be an advantage for collaborative
    research or independent study, an over-reliance could stifle students' critical
    thinking abilities and reduce active engagement in the learning process. And,
    although ChatGPT has the potential to democratise access to information, there's
    a growing concern that education could further become a commodity, exacerbating
    the gulf between economically diverse student groups, especially if quality educational
    tools become stratified based on purchasing power. Extending Marx's perspective
    to instructors, educators might feel estranged from their professional essence
    if ChatGPT or similar technologies encroach too deeply into their domain. Though
    ChatGPT could automate certain pedagogical tasks, potentially elevating the quality
    of education by allowing educators to concentrate on nuanced, human-centric aspects
    of teaching, there's a risk. If institutions prioritise technology over educators,
    it could lead to a form of professional alienation, relegating educators to secondary
    roles and potentially diminishing their perceived value in the educational process.
    Through a Marxist lens, the capitalist tendencies of institutions could be amplified
    with technologies like ChatGPT. These tools might be seen less as educational
    enhancements and more as cost-saving or profit-driving mechanisms. This could
    shift priorities from holistic education to market-driven objectives, echoing
    Marx's concerns about capitalist structures overshadowing true value. However,
    this does not have to happen. Ethical, student-centric integration of ChatGPT
    could lead to enriched collaborative experiences, blending traditional pedagogy
    with modern techniques. In essence, while ChatGPT and similar AI technologies
    hold vast potential for reshaping higher education, Marx's theory of alienation
    cautions us to think about the caveats. The challenge lies in ethically integrating
    these tools, focusing on augmenting human capabilities rather than sidelining
    them. It underscores the importance of continually reassessing institutional policies,
    emphasising the human aspect of education and ensuring that advancements in technology
    truly serve their primary stakeholders – the students, instructors and the broader
    educational community.
  prefs: []
  type: TYPE_NORMAL
- en: 'Phenomenology: Unveiling Insights into ChatGPT'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Phenomenology, as a theoretical framework, centres on comprehending the subjective
    experiences and the significances that individuals ascribe to them. It delves
    into the lived encounters of individuals, striving to unveil the core nature of
    phenomena as perceived by those engaged (Patton, 2002). In the context of examining
    the influence of ChatGPT on the roles of diverse stakeholders within a university,
    phenomenology offers a valuable theoretical approach with the following implications:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Exploration of Subjective Experiences*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Phenomenology allows researchers to delve into the subjective experiences of
    individuals involved in teaching and learning with ChatGPT. It helps uncover the
    lived experiences, perceptions and emotions of students and teachers in relation
    to the technology.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Understanding the Meaning-Making Process*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Phenomenology seeks to understand how individuals make sense of their experiences
    and the meanings they attach to them. In the context of ChatGPT, it can shed light
    on how students and teachers interpret and understand the technology's impact
    on their roles and the educational process as a whole.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Examination of Changes in Teaching and Learning*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Phenomenology can help researchers explore how ChatGPT may affect the roles
    of teaching and learning by investigating possible required shifts in pedagogical
    practices and instructional strategies. It provides insights into the ways in
    which the technology may influence the interaction between students and instructors
    and the overall educational experience.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Uncovering New Possibilities and Constraints*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Phenomenology enables researchers to identify both the opportunities and limitations
    presented by ChatGPT in education. It allows for an exploration of the potential
    benefits, such as increased access to information or personalised learning experiences,
    as well as the challenges, such as the potential reduction of human interaction
    surrounding AI technology.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Emphasis on the Lived Experience*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Phenomenology places emphasis on the first-person perspective and the experiential
    knowledge of individuals. This focus aligns with the aim of understanding the
    lived experiences of students and instructors as they navigate the integration
    of ChatGPT.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To enhance our understanding further, we looked into the works of one of the
    most famous theorists in phenomenological research, Martin Heidegger.
  prefs: []
  type: TYPE_NORMAL
- en: 'Heideggerian Reflections: AI and the Essence of Being'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Heidegger, a German philosopher, made significant contributions to phenomenology,
    hermeneutics and existentialism. Despite criticism for his affiliation with the
    Nazi Party, his philosophy offers valuable insights into the impact of technology
    on human relationships and our sense of authenticity and connectedness to the
    world (Inwood, 2019). At the core of Heidegger's philosophy is the concept of
    Dasein, which refers to human existence and its unique ability to question its
    own being (Girdher, 2019). Heidegger's philosophy emphasises the pre-existing
    understanding of the world that shapes human existence, known as ‘being-in-the-world’
    (Girdher, 2019). Heidegger's inquiry into the meaning of being revolves around
    what makes beings intelligible as beings. He distinguishes between ontical and
    ontological aspects, where ontical pertains to specific beings and ontological
    focuses on the underlying meaning of entities, referred to as the ‘Ontological
    Difference’ (Inwood, 2019). This distinction forms the basis of Fundamental Ontology,
    which aims to comprehend the meaning of being itself. Time is a crucial aspect
    of Heidegger's philosophy, not simply a linear sequence of events, but a fundamental
    aspect of all existence, shaping our understanding of the world and our place
    within it (Inwood, 2019). In Heidegger's philosophy, technology is seen as fundamentally
    transforming our relationship with the world, revealing and ordering it in a particular
    way, referred to as the ‘enframing’ or ‘challenging-forth’ nature of technology
    (Inwood, 2019). This perspective leads to a mode of being called ‘standing reserve’,
    where everything, including humans, is objectified and reduced to a means to an
    end (Inwood, 2019). He cautioned that this way of being obscures our authentic
    relationship with the world and disconnects us from our true nature (Inwood, 2019).
    However, Heidegger also acknowledged technology's potential for positive transformation,
    proposing a different approach characterised as ‘poetic dwelling’ or ‘releasement’
    (Bida, 2018). He introduced the concept of ‘readiness-to-hand’, describing our
    seamless interaction with tools and objects in everyday life, where tools become
    extensions of ourselves, allowing for a sense of flow and efficiency (Inwood,
    2019). In this view, technology should foster openness, attentiveness and a deeper
    connection with the world, revealing and enabling our engagement with it (Bida,
    2018). Heidegger's philosophy of technology significantly influences contemporary
    discussions on the ethical and existential dimensions of technology. It prompts
    us to reflect on the effects of technology on our lives, question the assumptions
    underlying our technological worldview, and explore alternative ways of relating
    to technology for a more meaningful and sustainable existence.
  prefs: []
  type: TYPE_NORMAL
- en: When considering the role of students, Heidegger's philosophy underscores their
    unique capacity to question their own being and the temporal nature of their existence.
    The presence of ChatGPT in education raises questions about students' relationship
    with knowledge. ChatGPT, as a tool for accessing information, may enhance the
    readiness-to-hand experience for students. By providing immediate and relevant
    responses to queries, ChatGPT can simplify the process of obtaining information,
    reducing cognitive load and enabling students to focus more on understanding and
    applying knowledge. However, with this comes a risk that excessive reliance on
    ChatGPT might lead to passive learning, diminishing students' inclination for
    exploration and critical thinking. To prevent this, students may need to reflect
    on the role of technology in their learning process and actively participate in
    shaping their understanding of being-in-the-world. In relation to instructors,
    Heidegger's concept of being-in-the-world suggests that their role is intertwined
    with their existence and understanding of the world. The introduction of ChatGPT
    may challenge their traditional role as the primary source of knowledge. This
    technology can assist them in preparing course materials, offering timely feedback
    and addressing common questions from students. However, it also raises questions
    about the readiness-to-hand experience of teaching. Instructors should be mindful
    of how their reliance on AI assistance might impact their authentic engagement
    with students and the learning process. Therefore, instructors may need to navigate
    the integration of technology in their teaching practices, re-evaluating their
    own relationship to knowledge and the facilitation of authentic learning experiences.
    As a result, the instructor's role may shift towards guiding students in their
    engagement with technology, fostering critical reflection and assisting students
    in uncovering their own understanding of being. The introduction of ChatGPT also
    prompts a re-evaluation of the temporal dimension of education for institutions
    of higher education. Institutions should critically assess how this technology
    aligns with their educational values and goals. They must reflect on the balance
    between efficiency and the time needed for meaningful learning experiences. This
    integration of AI technology could impact institutional structures, curriculum
    design and the overall educational environment. By integrating ChatGPT into higher
    education institutions, access to information and resources can be streamlined,
    potentially increasing efficiency and reducing administrative burdens. However,
    caution is necessary to avoid over-reliance on AI technology. Institutions must
    carefully consider the balance between efficiency and the temporal space required
    for genuine learning experiences. Additionally, they should ensure that AI integration
    preserves the readiness-to-hand experience for both students and instructors while
    also aligning with their educational values and objectives. This will help maintain
    a holistic and effective learning environment while embracing the advantages of
    AI technology. Therefore, in summary, by applying Heidegger's philosophy to the
    examination of ChatGPT in education, we can gain a deeper understanding of the
    potential implications for students, instructors and institutions. It prompts
    us to reflect on the existential and temporal dimensions of education, encouraging
    a critical evaluation of how technology can shape our relationship with knowledge,
    authenticity and our sense of being-in-the-world.
  prefs: []
  type: TYPE_NORMAL
- en: 'Within this chapter, we have constructed a theoretical foundation to facilitate
    the examination of ChatGPT and similar AI technologies. Our framework encompasses
    two key components: critical theory, which delves into power dynamics, social
    disparities and cultural conventions; and phenomenology, enabling an understanding
    of conscious experiences as perceived directly by individuals. In Chapter 6, we
    revisit these theories, using them as a guide to conduct a comprehensive analysis
    of our findings.'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Exploring ChatGPT''s Role in Higher Education: A Literature Review'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Defining the Scope of the Literature Review
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this chapter, we present our literature review conducted in early April
    2023, where we utilised Google Scholar to search for articles focusing on ChatGPT''s
    impact on students, instructors and higher education. Our primary goal was to
    identify case studies exploring ChatGPT''s integration in educational settings
    to gain valuable insights into its practical implications. As ChatGPT had only
    been publicly released on 30 November 2022, just over 4 months before our literature
    review began, we expected a scarcity of case studies due to limited time for in-depth
    research and analysis. As anticipated, our search revealed limited literature
    related to actual case studies involving ChatGPT. However, what we did discover
    was an emerging trend in content and document analysis studies examining secondary
    sources like media releases and social media discussions. Additionally, we identified
    meta-literature reviews synthesising the growing body of research around ChatGPT,
    often including preprints due to its recent public appearance and the limited
    time for peer-reviewed publications on this topic. Furthermore, we found several
    user case studies focusing on the individual experiences of instructors and researchers
    experimenting with aspects of ChatGPT. Considering that we were particularly interested
    in the implementation of ChatGPT in educational settings, we limited our scope
    to papers released following its public launch on 30 November 2022, concentrating
    on the 4-month period leading up to the commencement of our research. After conducting
    our initial review, we selected nine papers that we deemed most relevant to our
    research questions. These papers were categorised into three groups: content and
    document analysis papers (three papers), literature review papers (two papers)
    and case studies focusing on user experiences (four papers). An overview of these
    is provided below.'
  prefs: []
  type: TYPE_NORMAL
- en: Content and Document Analysis Papers on ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Analysing the Role of ChatGPT in Improving Student Productivity in Higher Education
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In their study, ‘Analysing the Role of ChatGPT in Improving Student Productivity
    in Higher Education’, Fauzi et al. (2023) aimed to explore the impact of ChatGPT
    on student productivity in higher education settings. Employing a qualitative
    research methodology, the researchers adopted a desk research approach and relied
    on secondary sources of information for data collection. By consulting various
    reference materials, including online media and journal databases, they guaranteed
    comprehensive coverage of relevant information related to ChatGPT's role in enhancing
    student productivity. During the data collection process, Fauzi et al. (2023)
    recorded relevant information, which they subsequently analysed using data reduction
    and data presentation techniques. Through simplifying, classifying and eliminating
    irrelevant data, they gained insights into ChatGPT's potential impact on student
    productivity. Their data presentation involved systematically organising it and
    using written discourse in the form of field notes to facilitate understanding
    and support the process of drawing conclusions. The study's findings revealed
    that ChatGPT holds the potential to contribute to various aspects of student productivity
    in higher education. Notably, ChatGPT provided valuable assistance to students
    by offering relevant information and resources for their assignments and projects.
    ChatGPT also assisted students in improving their language skills, grammar, vocabulary
    and writing style. Moreover, ChatGPT fostered collaboration among students, enabling
    effective communication, idea exchange and project collaboration. Additionally,
    it contributed to time efficiency and effectiveness by helping students organise
    their schedules, assignment due dates and task lists. Beyond that, ChatGPT served
    as a source of support and motivation for students, offering guidance on stress
    management and time and task management strategies. Based on their findings, Fauzi
    et al. (2023) propose several recommendations. Firstly, they suggest that students
    should use ChatGPT judiciously and critically evaluate the credibility of the
    information it provides. Secondly, they emphasise that educators and educational
    institutions should consider integrating ChatGPT into learning processes to enhance
    student productivity, while also maintaining a balanced approach that values human
    interaction and student engagement. Thirdly, they recommended that technology
    companies continue advancing and refining language models like ChatGPT to further
    contribute to the improvement of student productivity and online learning. Fauzi
    et al.'s (2023) study sheds light on the positive implications of ChatGPT in higher
    education, particularly its potential to enhance student productivity. However,
    it is essential to address the study's weaknesses, such as the heavy reliance
    on secondary sources and the limited exploration of other aspects of ChatGPT's
    impact on education. To strengthen the validity and reliability of findings, it
    is suggested that future research should consider incorporating primary research
    methods and conducting broader investigations.
  prefs: []
  type: TYPE_NORMAL
- en: Fauzi et al.’s (2023) paper is of significant importance to our study, as it
    directly addresses our research topic on how ChatGPT may affect the roles of students,
    instructors and institutions of higher education. This paper adds value to our
    understanding of the research topic in several key ways.
  prefs: []
  type: TYPE_NORMAL
- en: '*Focus on Student Productivity*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The paper provides a specific examination of the impact of ChatGPT on student
    productivity in higher education. It offers relevant insights into the role of
    ChatGPT in influencing student learning outcomes and academic performance through
    various means of support.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Practical Recommendations*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The study's recommendations offer valuable guidance for educators and institutions
    seeking to effectively integrate ChatGPT into learning processes while maintaining
    a balance with human interaction and personalised instruction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Broader Implications*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While focusing on student productivity, the study indirectly informs our research
    on the roles of instructors and higher education institutions. It illustrates
    how students' interactions with ChatGPT may influence instructors' teaching practices
    and institutional approaches to supporting student learning and academic success.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall, Fauzi et al.’s (2023) findings and recommendations offer valuable guidance
    for navigating the integration of ChatGPT effectively, while also raising important
    considerations for examining the roles of instructors and higher education institutions
    in the context of artificial intelligence (AI)-driven technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Open AI in Education, the Responsible and Ethical Use of ChatGPT Towards Lifelong
    Learning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'David Mhlanga''s 2023 article, ‘Open AI in Education: The Responsible and Ethical
    Use of ChatGPT Towards Lifelong Learning’, employs document analysis, reviewing
    various sources, including news outlets, blog posts, published journal articles
    and books (Mhlanga, 2023). For the research, Mhlanga conducted a global search
    to identify papers that investigated OpenAI, the principles of responsible AI
    use in education and the ethical implications of AI in education (Mhlanga, 2023).
    From this search, he selected 23 publications that served as his primary sources,
    from which he derived a number of key themes. One of these key themes revolves
    around the challenges associated with using ChatGPT in education, in which he
    warns against the use of ChatGPT for grading written tasks, as it may threaten
    conventional methods of assessment, such as essays. Additionally, he raises concerns
    that students might outsource their work to ChatGPT, making it harder to detect
    instances of plagiarism. Despite these challenges, Mhlanga believes that a blanket
    ban on ChatGPT might not be the best approach. Instead, he urges educators and
    policymakers to address these challenges thoughtfully while considering the potential
    benefits of ChatGPT in education. Despite his concerns, Mhlanga also highlights
    various opportunities that ChatGPT brings, suggesting that the ability of ChatGPT
    to generate essays and written content can be a powerful tool to enhance learning.
    In addition, he suggests it can be used to improve assessment procedures, foster
    student collaboration and engagement and facilitate experiential learning. While
    Mhlanga acknowledges that ChatGPT can be disruptive, he also opines that it presents
    an excellent opportunity to modernise and revolutionise education (Mhlanga, 2023).
    However, if implementing ChatGPT in educational settings, Mhlanga emphasises the
    importance of adhering to responsible and ethical practices, noting that protecting
    the privacy of users'' data is paramount, and students must be informed about
    data collection, usage and security measures. Similarly, he warns that the responsible
    use of ChatGPT requires addressing potential biases and ensuring fairness and
    non-discrimination, particularly in grading and evaluation. Mhlanga also underscores
    that ChatGPT should not be viewed as a replacement for human teachers but rather
    as a supplement to classroom instruction. This is because he believes human instructors
    play a crucial role in understanding students'' unique needs, fostering creativity
    and providing hands-on experiences that ChatGPT cannot replicate (Mhlanga, 2023).
    Furthermore, Mhlanga points out some of the limitations of ChatGPT, such as its
    inability to comprehend the context surrounding students, such as their culture
    and background. He believes this limitation makes ChatGPT unsuitable for providing
    personalised and experiential education, which, he notes, is essential for students''
    holistic learning. Therefore, he suggests that educators must educate their students
    about ChatGPT''s limitations and encourage them to critically evaluate its output
    (Mhlanga, 2023). To ensure ethical AI use in education, Mhlanga suggests that
    transparency is crucial. Therefore, he suggests offering open forums, workshops
    and discussion groups for students and teachers to understand how ChatGPT functions
    and its capabilities. For Mhlanga, transparency should include informing students
    about the algorithms and data sources used and potential biases in the technology.
    He also believes it is essential to prioritise the adoption of open-source or
    transparent AI technology to provide access to the source code and underlying
    data. He believes that by educating students about AI''s limitations and potential
    biases, we can empower them to use the technology responsibly (Mhlanga, 2023).
    Additionally, Mhlanga emphasises the significance of accuracy in education, noting
    that ensuring AI-generated content is accurate and reliable is essential to prevent
    misconceptions and misinformation among students. Therefore, he states that critical
    thinking and fact-checking must be encouraged when using AI tools in the educational
    process (Mhlanga, 2023).'
  prefs: []
  type: TYPE_NORMAL
- en: Mhlanga's findings highlight the challenges and opportunities associated with
    using AI in educational settings and emphasise the importance of responsible and
    transparent practices. The study underscores the need to educate students and
    instructors about AI's limitations and potential biases and stresses the irreplaceable
    role of human teachers in the learning process. Overall, Mhlanga's research offers
    valuable insights into the impact of ChatGPT on students, instructors and higher
    education institutions, addressing key aspects of our research question. However,
    it is suggested that further research be conducted to expand the sample size as
    well as considering AI's broader applications in education.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mhlanga''s (2023) study is relevant to our research in the following ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Challenges and Opportunities for Education*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mhlanga's research identifies both challenges and opportunities in using ChatGPT
    for education. Understanding these aspects can help inform how students and instructors
    should approach and leverage ChatGPT in educational settings. The concerns about
    potential plagiarism and the need for educators to adapt their assessment methods
    highlight the challenges institutions may face while implementing AI tools. Conversely,
    the opportunities presented by ChatGPT, such as improved assessment procedures
    and innovative teaching approaches, can inspire educators to explore its integration
    in a responsible manner.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Complementing Human Instructors*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mhlanga's findings suggest that ChatGPT should not replace human teachers but
    rather supplement their efforts. This aligns well with our research question about
    the roles of students and instructors in the AI-driven educational landscape.
    Gaining insights into how ChatGPT can facilitate and improve human instruction
    can provide valuable guidance for instructors to adjust their teaching approaches
    and for students to effectively engage with AI technologies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Limitations and Awareness*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mhlanga's research underscores the importance of educating students about the
    limitations of ChatGPT. Understanding AI's capabilities and limitations is essential
    for students to critically evaluate AI-generated content and use the technology
    effectively. This aspect is highly relevant to our research regarding how students
    may interact with and perceive AI tools like ChatGPT.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Integration and Adaptation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mhlanga's (2023) study's focus on challenges and opportunities for integrating
    ChatGPT in education can inform how higher education institutions adapt to the
    AI-driven landscape. Understanding the potential disruptions and benefits can
    help institutions make informed decisions about adopting AI technologies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Scope for Further Research*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mhlanga's article encourages further research and debate on the responsible
    use of AI in education. This aligns with our research goal of exploring the broader
    implications of AI on students, instructors and educational institutions. Our
    research can expand on Mhlanga's findings and delve into specific use cases and
    best practices for AI integration in education.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In conclusion, David Mhlanga's 2023 article is highly relevant to our research,
    as it provides valuable insights into the responsible and ethical implementation
    of ChatGPT in education. The study addresses key aspects of how ChatGPT affects
    students, instructors and higher education institutions, offering relevant perspectives
    on challenges, opportunities, ethical considerations and potential future directions.
    It serves as a foundation for understanding the implications of AI in education
    and can guide institutions in navigating the AI-driven educational landscape responsibly.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT in Higher Education: Considerations for Academic Integrity and Student
    Learning'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Sullivan et al.''s (2023) article titled ‘ChatGPT in higher education: Considerations
    for academic integrity and student learning’ presents an investigation into the
    disruptive effects of ChatGPT on higher education. Their study focuses on two
    main areas: analysing key themes in news articles related to ChatGPT in the context
    of higher education and assessing whether ChatGPT is portrayed as a potential
    learning tool or an academic integrity risk. Their research methodology involved
    conducting a content analysis of 100 media articles from Australia, New Zealand,
    the United States and the United Kingdom using specific search terms, which were
    then imported into EndNote and subsequently Nvivo for analysis. The authors followed
    a content analysis guidebook, refining a preliminary codebook and coding the articles
    based on identified themes. They also examined how various stakeholders, including
    university staff, students and ChatGPT, were represented in the media. To assess
    sentiment and word usage, they employed Nvivo''s Sentiment Analysis and Query.
    Overall, a number of themes emerged from the analysis. The authors found that
    the articles mainly focused on concerns related to academic integrity, particularly
    regarding cheating, academic dishonesty and misuse facilitated by AI, such as
    ChatGPT. Instances of using ChatGPT for cheating on university entrance exams
    were also identified. Educating students about AI''s impact on academic integrity
    and setting clear guidelines was highlighted as crucial. The articles also explored
    universities'' efforts to detect AI use in assignments, mentioning various tools
    like OpenAI''s Open Text Classifier, Turnitin, GPTZero, Packback, HuggingFace
    and AICheatCheck. However, some scepticism was expressed about the accuracy and
    sophistication of these detection technologies, with academics relying on their
    familiarity with students'' work and detecting shifts in tone to identify AI-generated
    content. In their study, Sullivan et al. (2023) also identified a significant
    theme concerning strategies to discourage the use of ChatGPT in education. Many
    articles discussed universities adjusting their courses, syllabi or assignments
    to minimise susceptibility to ChatGPT-generated content, often opting for invigilated
    examinations. However, some argued against relying solely on exams, suggesting
    task redesign to promote authenticity and assess critical thinking. The analysis
    also highlighted concerns about ChatGPT''s proneness to errors, limitations and
    its impact on learning outcomes. Additionally, articles raised copyright, privacy
    and security concerns related to student data. Interestingly, some articles emphasised
    the inherent connection between learning and writing, underscoring the role of
    writing in exploring and solidifying thoughts on various subjects. Other concerns
    included the potential decline in critical thinking skills due to overreliance
    on AI for coursework completion, which may undermine genuine educational growth.
    In addition, Sullivan et al. (2023) found that a higher number of articles made
    references to institutions or departments that had imposed bans on ChatGPT compared
    to those allowing its use. However, they observed that the most commonly discussed
    response was the indecisiveness of certain universities regarding their policies.
    These universities were described as ‘updating’, ‘reviewing’ and ‘considering’
    their policies, reflecting a cautious approach due to the rapidly evolving nature
    of the situation. In the absence of official institutional policies, several articles
    mentioned that individual academic staff members would develop revised policies
    on a course-by-course basis. The researchers also noted that universities that
    had chosen to prohibit the use of ChatGPT had already updated their academic integrity
    policy or honour code, or they believed that AI use was already prohibited based
    on existing definitions of contract cheating. On the other hand, in cases where
    universities permitted the use of ChatGPT, it often came with the requirement
    to adhere to strict rules, including the disclosure or acknowledgement of its
    use in assignments. Additionally, the researchers highlighted that two articles
    clarified that while a specific university did not impose a ban on ChatGPT, individual
    academic staff members still had the discretion to prohibit its use in certain
    assessments or units. Furthermore, Sullivan et al. (2023) found that a significant
    portion of the analysed articles discussed integrating ChatGPT into teaching practices.
    These articles advocated for meaningful integration of AI in teaching and suggested
    specific ways to incorporate ChatGPT into assignment tasks, such as idea generation
    and feedback on student work. Various applications for ChatGPT in the learning
    experience were proposed, including personalised assignments, code debugging assistance,
    generating drafts, providing exemplar assignments and more. The articles acknowledged
    the difficulties of banning ChatGPT and recognised its relevance in future workplaces.
    Enforcing a complete ban was deemed impractical, leading to debates on investing
    in AI detection systems. ChatGPT was likened to calculators or Wikipedia, highlighting
    its disruptive nature. However, specific ways AI would be employed in the workplace
    were not extensively explored. The researchers noted a lack of focus on using
    ChatGPT to enhance equity outcomes for students. Few articles discussed mitigating
    anxiety or supporting accessibility challenges on campus. They also highlight
    that there was limited mention of ChatGPT''s potential to improve writing skills
    for non-native speakers and promote a more equitable learning environment. They
    note that only one article touched briefly on disability-related considerations
    and AI''s potential to empower individuals with disabilities. Regarding voices,
    Sullivan et al. (2023) found that university figures, including leaders, coordinators,
    researchers and staff, were extensively quoted in the media, with nearly half
    of the articles citing three or more representatives from respective institutions.
    In contrast, student voices were relatively underrepresented, appearing in only
    30 articles, and only seven of those included quotes from more than three students.
    Some articles focused on Edward Tien, the student behind ChatGPT Zero, while others
    used survey data to represent the collective student voice.'
  prefs: []
  type: TYPE_NORMAL
- en: Based on their research, Sullivan et al. (2023) urge for a more balanced examination
    of the risks and opportunities of ChatGPT in university teaching and learning,
    as they believe media emphasis on cheating may influence readers' perceptions
    of education's value and student views on its appropriate use. Sullivan et al.
    (2023), therefore, suggest redesigning assessment tasks to reduce susceptibility
    to AI tools through personalised and reflective tasks. However, they acknowledge
    disagreements on the most effective adaptation strategies and the evolving nature
    of ChatGPT and detection software, potentially making some discussions in the
    articles outdated. They note that the need for policy revisions regarding AI tools
    and academic integrity is emphasised in the articles, but specific implementation
    details are lacking. They suggest that clearer policy positions are expected later
    in 2023\. They also believe establishing explicit guidelines for ethical AI tool
    use is crucial, considering accessibility, sophistication and widespread adoption
    across industries. They deem an outright ban on AI tool usage impractical given
    student access. Sullivan et al. (2023) emphasise the need for clear guidelines
    for ChatGPT use, including acknowledging its limitations and biases. They highlight
    potential benefits for student learning, simplifying complex concepts and aiding
    test preparation. They believe incorporating ChatGPT into workflows could enhance
    employability, but that critical thinking skills to analyse AI outputs are essential.
    They also suggest more industry input is needed in workplace discussions and educators
    must foster unique skills for students to stay competitive in the job market.
    In addition, Sullivan et al. (2023) emphasise ChatGPT's potential to enhance academic
    success for diverse equity groups, but note limited attention in existing literature.
    They believe ChatGPT can support non-traditional students, non-native English
    speakers and students with accessibility needs. However, they caution about potential
    inaccuracies and biases. The authors report that they find the opportunities promising
    and look forward to AI's development in accessibility and inclusion in the future.
    Sullivan et al. (2023) acknowledge the media's predominant focus on academic and
    institutional perspectives regarding ChatGPT, neglecting student views. They stress
    the need for a more constructive and student-led discussion, involving all stakeholders
    for an inclusive discourse on AI. They advocate for student associations and partnerships
    to collaborate with university staff, enhancing student engagement and institutional
    approaches to AI.
  prefs: []
  type: TYPE_NORMAL
- en: Sullivan et al. (2023) acknowledge the limitations of their study, focusing
    on mainstream news databases and a relatively small number of articles, and we
    are inclined to agree with them. They emphasise the importance of considering
    alternative sources like social media platforms and education blogs for a more
    comprehensive understanding of ChatGPT discourse. They also recommend expanding
    the sample size, exploring diverse cultural contexts and investigating the sources
    shaping media coverage to address existing biases. To address these limitations,
    Sullivan et al. (2023) propose future research opportunities, including exploring
    non-Western sources, conducting surveys and focus groups with students and investigating
    academic staff perspectives on ChatGPT. They emphasise the potential for AI tools
    to enhance student learning and access, highlighting the need for a more inclusive
    student perspective in discussions. The authors stress the importance of media
    framing and its impact on public perceptions of academic integrity and university
    responses to ChatGPT. The authors conclude that their findings emphasise the necessity
    for further research and dialogue concerning the implications of AI tools, highlighting
    the need to explore ethical use, innovative teaching and learning practices and
    the promotion of equitable access to educational opportunities. Finally, they
    assert that as AI technologies continue to evolve, it is crucial for universities
    to adapt and embrace their utilisation in a manner that supports student learning
    and prepares them for the challenges of an increasingly digital world.
  prefs: []
  type: TYPE_NORMAL
- en: Sullivan et al.'s (2023) investigation is relevant to our study in the following
    ways.
  prefs: []
  type: TYPE_NORMAL
- en: '*Academic Integrity Concerns*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sullivan et al. highlight that media articles predominantly focus on concerns
    related to academic integrity, such as cheating and academic dishonesty facilitated
    by ChatGPT. This finding underscores the importance of addressing these integrity
    concerns and developing clear guidelines for students to ensure ethical use of
    AI tools in our study.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Task Redesign and Avoidance Strategies*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The study reveals that universities are adopting strategies to discourage the
    use of ChatGPT, including task redesign and opting for invigilated examinations.
    These findings can inform our research on how institutions are adapting to the
    challenges posed by AI tools and maintaining the integrity of assessments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Policy Challenges*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sullivan et al. report on the indecisiveness of certain universities regarding
    their policies on ChatGPT usage. This aspect is particularly relevant to our study,
    as it emphasises the need for institutions to develop explicit guidelines and
    policies for the ethical use of AI tools while ensuring academic integrity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Embracing ChatGPT in Teaching*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Despite concerns, the study highlights that some media articles advocate for
    meaningful integration of ChatGPT in teaching practices. This finding is significant
    for our research, as it provides insights into potential opportunities and benefits
    of incorporating AI tools in educational settings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Equity and Accessibility Considerations*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The study touches on the potential benefits of ChatGPT for equity and accessibility,
    such as assisting non-native speakers and students with disabilities. These considerations
    align with our research focus on understanding how AI tools can support all of
    our students, especially considering that the majority of our students are non-native
    speakers studying in an English-medium environment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Student Engagement*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Their study reveals that student voices are relatively underrepresented in media
    articles. This aspect is directly relevant to our research, emphasising the importance
    of involving students in the discussion and decision-making processes concerning
    AI integration in education.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In conclusion, Sullivan et al.'s (2023) investigation holds substantial relevance
    to our research, as it illuminates critical aspects essential for understanding
    the implications of integrating ChatGPT in the educational landscape. Their findings
    concerning academic integrity concerns, task redesign strategies, policy challenges,
    embracing ChatGPT in teaching, equity and accessibility considerations, media
    perception and student engagement provide valuable groundwork for our study to
    explore the responsible and effective integration of AI tools in our educational
    context.
  prefs: []
  type: TYPE_NORMAL
- en: Literature Review Papers on ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '‘We Need To Talk About ChatGPT’: The Future of AI and Higher Education'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In their 2023 paper titled ‘We Need To Talk About ChatGPT’: The Future of AI
    and Higher Education, Neumann et al. emphasise the diverse applications of ChatGPT
    for software engineering students. These applications include assessment preparation,
    translation and generating specific source code as well summarising literature
    and paraphrasing text in scientific writing. This prompted them to write a position
    paper with the aim of initiating a discussion regarding potential strategies to
    integrate ChatGPT into higher education. They, therefore, decided to investigate
    articles that explore the impact of ChatGPT on higher education, specifically
    in the fields of software engineering and scientific writing, with the aim of
    asking ‘Are there lessons to be learned from the research community?’ (Neumann
    et al., 2023). However, since ChatGPT had only recently been released, similar
    to our own situation, they observed a lack of peer-reviewed articles addressing
    this topic at the time of their writing. Therefore, they decided to conduct a
    structured grey literature review using Google Scholar to identify preprints of
    primary studies. A total of 5 preprints out of 55 were selected by the researchers
    for their analysis. Additionally, they engaged in informal discussions and conversations
    with lecturers and researchers, as well as examining their own test results from
    experimenting with ChatGPT. Through their examination of these preprints, Neumann
    et al. identified emerging challenges and opportunities that demanded attention
    (2023). The four areas in higher education, where they contend these challenges
    and opportunities are applicable are teaching, papers, curricula and regulations.
    In the context of teaching, Neumann et al. emphasise the importance of early introduction
    to foundational concepts, such as programming fundamentals, while specifying the
    appropriate use of ChatGPT (2023). They highlight the need for transparency, ensuring
    students are aware of ChatGPT''s functionalities and limitations. They suggest
    adapting existing guidelines or handouts, coordinating among teachers to avoid
    redundancy, and integrating ChatGPT into teaching activities. They also recommend
    that students practise using the tool for specific use cases, exploring both its
    possibilities and limitations. In addition, they note the potential integration
    of ChatGPT into modern teaching approaches like problem-based learning or flipped
    learning. Furthermore, they propose inviting practitioners to provide insights
    on integrating ChatGPT into practical work during courses. Overall, their recommendations
    aim to foster practice-based learning and enhance transparency. Regarding papers,
    according to Neumann et al., integrating ChatGPT into higher education presents
    challenges in scientific writing, especially in sections involving existing knowledge
    (2023). They suggest using a combination of plagiarism checkers and AI detection
    tools, with manual examination as a backup. Thorough reference checks and validation
    are emphasised as crucial. They also highlight identifiable characteristics of
    ChatGPT using GPT-3, such as referencing non-existent literature, which can assist
    in detection. They propose the use of additional oral examinations or documentation
    as additional measures. Furthermore, they recommend placing greater emphasis on
    research design and results sections to enhance scientific education. According
    to Neumann et al., adjusting a curriculum is a complex process that requires careful
    consideration of the impact on other courses and compliance with regulations (2023).
    However, they expect substantial discussions among lecturers due to varying opinions
    on integrating ChatGPT into lectures. Nonetheless, they believe these discussions
    will be valuable as they will provide an opportunity for mutual learning and the
    development of solutions to address the challenges that arise. In the context
    of regulations, the authors emphasise the importance of evaluating official regulatory
    documents, such as examination regulations (2023). They also highlight the need
    to consider various legal aspects, such as copyright and data protection, when
    integrating ChatGPT into teaching. To ensure consistency, the authors recommend
    re-evaluating existing examination regulations and establishing clear guidelines
    for students. Additionally, they stress the significance of thorough discussions
    among lecturers within a study programme to identify adoption opportunities by
    aligning course objectives, theoretical foundations and examination types. By
    addressing these areas, they believe successful integration of ChatGPT into university
    teaching can be achieved, leading to reduced uncertainties and a focus on innovative
    education. Neumann et al. summarise their study by stating that their findings
    highlight the transformative impact of AI-based chatbots like ChatGPT on higher
    education, particularly in the realm of scientific writing (2023). However, they
    acknowledge the presence of several unresolved questions that require further
    investigation: Is text generated by ChatGPT a suspected plagiarism case? How should
    one reference text generated by ChatGPT? and What proportion of text generated
    with ChatGPT in relation to the total scope is acceptable? However, they acknowledge
    that numerous additional questions are likely to arise. To conclude, they highlight
    that as educators shape the future experts, it is important to equip our students
    with the essential skills for responsible use of ChatGPT. They, therefore, emphasise
    the need to address the integration of AI tools in higher education and acknowledge
    their work as a stepping stone towards initiating further inquiries, fostering
    discussions and discovering solutions.'
  prefs: []
  type: TYPE_NORMAL
- en: Neumann et al.’s (2023) study's strengths lie in its focus on emerging AI technology's
    impact on higher education and its comprehensive exploration of various aspects
    of integration. The researchers incorporated informal discussions and practical
    experimentation with ChatGPT to supplement their findings, enhancing the study's
    insights. However, there are notable weaknesses and limitations to consider. The
    study's reliance on preprints and informal discussions may introduce potential
    biases and limit the generalisability of the findings. The small sample size of
    preprints (only 5 out of 55) might not fully represent the breadth of research
    on the topic, and the lack of peer-reviewed articles may affect the study's credibility.
    Additionally, the study's emphasis on software engineering and scientific writing
    may not fully capture ChatGPT's impact on other academic disciplines. Moreover,
    the authors acknowledge the presence of unresolved questions, indicating that
    certain aspects of ChatGPT's integration into higher education remain unaddressed.
    Furthermore, the study primarily explores the researchers' perspectives. Incorporating
    more diverse perspectives, including practitioners from different disciplines
    and institutions, could enhance the validity and reliability of the findings.
    In conclusion, Neumann et al.'s study provides valuable insights into the integration
    of ChatGPT into higher education, but it faces limitations related to sample size,
    representation and focus. Despite these limitations, the study serves as a starting
    point for further inquiries and discussions on the responsible and effective use
    of AI tools in the educational landscape.
  prefs: []
  type: TYPE_NORMAL
- en: 'We believe Neumann et al.''s (2023) study has important implications for our
    research in the following areas:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Teaching Strategies and Early Introduction*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The study emphasises the importance of early introduction to foundational concepts
    and transparent use of ChatGPT in teaching. Their recommendations for coordinating
    among instructors and integrating ChatGPT into teaching activities provide insights
    into how instructors may incorporate AI tools in their pedagogical approaches.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Curricular Adaptation and Regulations*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The study identifies the need for discussions among lecturers to adjust curricula
    and comply with regulations when integrating ChatGPT. This insight informs our
    research on how institutions may need to adjust to accommodate AI tools.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Unresolved Questions and Further Inquiries*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The study acknowledges unresolved questions related to ChatGPT's usage in academic
    settings. This serves as a guide for our research in which we may explore these
    unanswered aspects, such as how to reference AI-generated text.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Despite the limitations of Neumann et al.'s study, such as the small sample
    size and potential biases, their comprehensive exploration of AI technology's
    impact on higher education offers valuable insights. By building upon their work
    and conducting our own research, we can contribute to evidence-based practices
    and informed discussions on the responsible and effective integration of ChatGPT
    in higher education, thereby preparing students for the future AI-driven landscape.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT: Bullshit Spewer or the End of Traditional Assessments in Higher Education?'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In their 2023 paper titled ‘ChatGPT: Bullshit spewer or the end of traditional
    assessments in higher education?’ Rudolph et al. conduct a comprehensive literature
    review and experimental analysis of ChatGPT. Their literature review stands out
    as one of the pioneering peer-reviewed academic journal articles to explore the
    relevance of ChatGPT in higher education to date, specifically in assessment,
    learning and teaching. Rudolph et al.''s paper primarily examines the implications
    of this technology for higher education and delves into the future of learning,
    teaching and assessment in the context of AI chatbots like ChatGPT. They contextualise
    ChatGPT within the realm of current research on Artificial Intelligence in Education
    (AIEd), discussing its applications for students, teachers and educational systems.
    The authors analyse the opportunities and threats posed by ChatGPT and conclude
    the article with recommendations targeted towards students, teachers and higher
    education institutions, with a particular focus on assessment. For their research,
    Rudolph et al. utilised a desktop analysis approach. They conducted Google Scholar
    searches, examined reference lists and explored embedded references in non-academic
    articles to conduct their literature review. However, due to the novelty of the
    topic, once again, similar to our own situation, they discovered there were only
    a limited number of relevant scholarly resources. As of 18 January 2023, the researchers
    found two peer-reviewed journal articles and eight preprints on ChatGPT''s application
    in higher education, with a particular focus on assessment, learning and teaching.
    Based on their literature review, Rudolph et al. (2023) put forward the following
    implications of ChatGPT for education.'
  prefs: []
  type: TYPE_NORMAL
- en: Rudolph et al. (2023) highlight that AIEd presents a unique opportunity for
    exploring diverse tools and applications in educational technology. Drawing from
    Baker and Smith's (2019) framework, they categorise educational contexts into
    student-facing, teacher-facing and system-facing dimensions, which they found
    valuable in their understanding of AI's utilisation in education. Regarding student-facing
    AI applications, Rudolph et al. emphasise the potential of AI applications like
    Intelligent Tutoring Systems (ITS) in personalising student learning through tailored
    instruction. They highlight ITS's ability to simulate human tutoring and provide
    personalised assistance in problem-solving. Additionally, they discuss the possibilities
    of personalised adaptive learning (PAL) facilitated by advancements in big data
    technology and learning analytics. While acknowledging ChatGPT's promise in enhancing
    tasks like language translation and question answering, they also point out its
    limitations in deeply comprehending subject matter. The authors say they find
    it ironic that concerns about AI-powered writing applications exist, as they believe
    ChatGPT can greatly benefit teachers in fostering innovative teaching and learning
    approaches. Regarding teacher-facing applications, Rudolph et al. (2023) emphasise
    how teacher-facing AIEd systems reduce teachers' workload by automating tasks
    like assessment, plagiarism detection and feedback. They also note that AI-powered
    applications can provide valuable insights into students' learning progress, enabling
    targeted guidance and support. Their research explores AI-powered assessment methods,
    including Automated Essay Scoring (AES) systems, which offer students prompts
    to revise answers, extending assessment beyond multiple-choice tests. They conclude
    that AI-powered essay ratings generally align with human ratings, with some concerns
    persisting. Rudolph et al. also highlight the importance of combining AES with
    AI-enabled automatic feedback systems to enhance effectiveness. The adaptive evaluation
    of the feedback system ensures appropriate answers based on Bloom's cognitive
    levels and can recommend additional learning resources and challenges to students.
    They acknowledge the well-documented effectiveness of AI-powered grading applications
    for essays. However, they raise concerns about ChatGPT's potential disruption
    in the emerging subfield of AI-powered applications supporting students' writing
    skill development. Furthermore, they highlight various AI-based writing tools
    developed before ChatGPT, aiming to enhance writing skills and facilitate the
    writing process through automated feedback and assessment. The authors also emphasise
    AI-powered writing applications like Grammarly and Wordtune as valuable additions
    to the writing curriculum, noting that Grammarly offers immediate feedback and
    revision suggestions, effectively improving writing engagement through automated
    corrective feedback, and Wordtune, using natural language processing (NLP), assists
    English as a Foreign Language (EFL) students in formulating ideas and enhancing
    their writing quality. They note that research underscores the positive impact
    of AI-based interventions on students' self-efficacy and academic emotions in
    EFL contexts, supporting independent learning and improvement. They also suggest
    that ChatGPT should be analysed within the same category of AIEd tools. Regarding
    system-facing applications, Rudolph et al. (2023) point out that system-facing
    AI-powered applications receive less attention in the literature compared to student-facing
    and teacher-facing applications. Despite this, they emphasise the importance of
    a holistic approach when developing strategies to leverage ChatGPT for innovation
    in education, taking cues from Microsoft's incorporation of ChatGPT into its products.
    They also mention that, since ChatGPT is a new product in the market, there is
    limited empirical research on its implications for education. Therefore, they
    suggest a discussion on the opportunities and challenges that ChatGPT may present
    for educational practitioners, policymakers and researchers is necessary (Rudolph
    et al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: Rudolph et al. (2023) highlight concerns about ChatGPT threatening the traditional
    essay assessment method, noting that instructors worry that students might outsource
    their assignments to ChatGPT, generating passable prose undetected by plagiarism
    tools. They believe these concerns may partly stem from instructors' resistance
    to adapting to new assessment methods, as written assignments are sometimes criticised
    for being ineffective in assessing students' learning. Rudolph et al. (2023) also
    express concerns about ChatGPT's limitations in understanding and evaluating information
    shared, as it is merely a text-generating machine. They believe this concern might
    prompt institutions to blacklist the AI application. However, with the potential
    integration of ChatGPT's technology into Microsoft products, they suggest a pragmatic
    approach to managing the challenges posed by the widespread use of ChatGPT in
    the future. From their research, Rudolph et al. (2023) note that language models
    offer a wide range of beneficial applications for society, such as code and writing
    autocompletion, grammar assistance, game narrative generation, improving search
    engine responses and answering questions. However, they also acknowledge the potential
    harmful applications of these models, saying that GPT-3, in particular, stands
    out for its enhanced text generation quality and adaptability, making it challenging
    to differentiate synthetic text from human-written text. Thus, they believe this
    advancement in language models presents both opportunities and risks, and that,
    in this context, the focus should be on exploring the potential harms of improved
    language models, not to imply that the harms outweigh the benefits, but to encourage
    research and efforts to address and mitigate potential risks. Rudolph et al. (2023)
    summarise by saying that introduction of disruptive education technologies in
    the classroom often brings forth various challenges in teaching and learning.
    As a result, education practitioners and policymakers are tasked with managing
    these situations to ensure that inadequate pedagogical practices are avoided.
  prefs: []
  type: TYPE_NORMAL
- en: Based on their research, Rudolph et al. (2023) discovered that ChatGPT's ability
    to generate essays presents challenges for educators, but that some are enthusiastic
    about the potential for innovation in teaching and learning brought by this disruptive
    AI application. They reference literature suggesting that tools like ChatGPT may
    become as prevalent in writing as calculators and computers are in mathematics
    and science. Additionally, they note that some authors propose involving students
    and instructors in shaping and utilising AI tools to support learning instead
    of limiting their use. From their research, they also note that while ChatGPT
    is often seen as posing a threat to traditional essay assessments, they believe
    it also presents an opportunity for educators to introduce innovative assessment
    methods. They note that typically, assessments are used by instructors to evaluate
    students' learning, but opine that many instructors may lack the skills to use
    assessments for both learning and as a means of learning. They, therefore, believe
    that institutions should capitalise on this opportunity to enhance instructors'
    assessment skills and leverage disruptive AI applications like ChatGPT to enhance
    students' learning. Rudolph et al. (2023) highlight another opportunity for instructors
    to enhance their teaching strategies by leveraging ChatGPT. For instance, they
    suggest adopting a flipped learning approach where crucial classwork is completed
    during in-person sessions, allowing more emphasis on multimedia assignments and
    oral presentations rather than traditional assignments. Moreover, they believe
    this would enable instructors to dedicate more time to providing feedback and
    revising students' work. According to Rudolph et al. (2023), another significant
    advantage of ChatGPT is its potential to facilitate experiential learning. Based
    on their literature review, they propose that students should explore various
    strategies and problem-solving approaches through game-based learning and other
    student-centred pedagogies by utilising ChatGPT. Additionally, they believe that
    students who prefer hands-on, experiential learning will particularly benefit
    from using ChatGPT as a learning tool. According to the authors, ChatGPT can be
    effectively employed to promote collaboration and teamwork among participants
    through appropriate instructional strategies. They propose the incorporation of
    student-centred learning activities that can be conducted in groups. For instance,
    the ChatGPT application can generate diverse scenarios that encourage students
    to collaborate in problem-solving and achieving goals. They believe this will
    foster a sense of community, allowing students to learn from and support each
    other. Therefore, Rudolph et al. (2023) assert that instead of viewing ChatGPT
    as a disruptive force in the teaching and learning process, it should be seen
    as a significant opportunity for learning innovators to revolutionise education.
  prefs: []
  type: TYPE_NORMAL
- en: Rudolph et al. (2023) conclude that AI, represented by tools like ChatGPT, is
    becoming increasingly mainstream, and its impact on higher education is still
    unfolding. While they note there are concerns about the potential implications
    of artificial intelligence on employment, they caution against alarmist reporting.
    However, they do emphasise the importance of monitoring and engaging with this
    rapidly developing space and the need to adjust teaching and assessment approaches
    in higher education. Additionally, they highlight that ChatGPT's work was not
    detected by their random testing with anti-plagiarism software, raising concerns
    about its potential to evade plagiarism checkers like Grammarly's professional
    version. Moreover, they observe that ChatGPT can be utilised to manipulate user
    input sentences to deceive anti-plagiarism software from reporting low originality
    scores. They reflect on the irony that anti-plagiarism software, which relies
    on AI, can be bypassed by other AI tools within seconds. They even point out that
    GPT-3 is capable of writing a review of a student's AI-generated assignment, leaving
    humans with minimal involvement and questioning the true value of the learning
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: Based on their findings, Rudolph et al. (2023) offer general recommendations
    for dealing with ChatGPT in higher education. They suggest moving away from a
    policing approach that focuses on detecting academic misconduct and instead advocate
    for building trusting relationships with students through student-centric pedagogy
    and assessments for and as learning. They also emphasise the importance of constructive
    alignment, where learning objectives, teaching and assessments are all aligned.
    Their recommendations for faculty, students and higher education institutions
    are as follows. Regarding recommendations for higher education faculty, Rudolph
    et al. (2023) suggest exploring alternative assessment methods, such as physical
    closed-book exams with pen and paper or online exams with proctoring/surveillance
    software, but also caution against over-reliance on such traditional assessments.
    To combat the use of text generators like ChatGPT, they propose designing writing
    assignments that these AI systems are currently not proficient at handling, focusing
    on specific and niche topics, personal experiences and original arguments. The
    authors acknowledge that ChatGPT's current limitation is its lack of in-text referencing
    and reference lists, but anticipate the emergence of tools like WebGPT that can
    access web browsing for improved information retrieval. They also highlight the
    availability of text generator detection software to address academic integrity
    concerns. The authors encourage faculty to foster creative and critical thinking
    in assessments, utilising authentic assessments and embracing students' interests
    and voices. They believe that involving students in peer evaluations and 'teach-back'
    exercises can further enhance learning experiences. The authors also emphasise
    the importance of creating an atmosphere where students are actively engaged in
    their learning and demonstrate the value of human writing while incorporating
    AI tools responsibly to nurture creativity and critical thinking (Rudolph et al.,
    2023). Regarding recommendations for students, Rudolph et al. (2023) note that,
    as digital natives, students often possess an inherent familiarity with technology,
    giving them a unique advantage in incorporating AI into their academic journey.
    Therefore, the authors stress the importance of understanding academic integrity
    policies and the potential consequences of academic misconduct. They believe that
    to fully harness the potential of AI, students should be encouraged to enhance
    their digital literacy and master AI tools like ChatGPT, as this proficiency could
    significantly boost their employability in the modern job market. However, they
    also caution against using AI as a mere shortcut for assignments, advocating instead
    for its use as a valuable set of tools to improve writing skills and generate
    original ideas. They also warn that it is essential to avoid plagiarism and prioritise
    high-quality sources, as well as remain vigilant against misinformation and disinformation
    when conducting research. To foster critical thinking, Rudolph et al. (2023) suggest
    that we should urge students to read widely, broadening their perspectives and
    enhancing their creative abilities. Furthermore, they suggest that students should
    be encouraged to explore the application of AI language tools like ChatGPT to
    write and debug code, providing additional opportunities for skill development.
    Ultimately, Rudolph et al. encourage students to actively practise using AI language
    tools to address real-world challenges and expand their problem-solving capabilities,
    and believe that by embracing AI responsibly and thoughtfully, students can seize
    its transformative potential and propel their educational journey to new heights
    (Rudolph et al., 2023). Regarding recommendations for higher education institutions,
    Rudolph et al. (2023) emphasise the critical importance of digital literacy education,
    advocating for the inclusion of AI tools like ChatGPT in the curriculum. They
    suggest that to equip faculty with the necessary skills, training on AI tools,
    particularly ChatGPT, is essential. Simultaneously, they recommend that students
    should also receive training on academic integrity to promote responsible AI tool
    usage. Furthermore, they recommend that curricula and courses should be thoughtfully
    designed to be meaningful and relevant to students, reducing the likelihood of
    resorting to cheating. They believe that addressing the use of AI tools, institutions
    should update academic integrity policies and develop clear, easy-to-understand
    guidelines, and that these guidelines should define appropriate usage and outline
    the consequences for cheating. They also highlight that encouraging research on
    the effects of AI tools on learning and teaching is crucial to better understand
    their impact and foster informed decision-making. They believe that by adopting
    these recommendations, higher education institutions can navigate the evolving
    landscape of AI tools, creating an environment that supports responsible and innovative
    learning practices (Rudolph et al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: Rudolph et al.'s (2023) study explores ChatGPT's relevance in higher education,
    particularly in assessment, learning and teaching. However, the study has some
    limitations. The scarcity of scholarly resources on ChatGPT's application in higher
    education may have affected the depth of analysis. Additionally, relying on desktop
    analysis and lacking empirical evidence could impact the study's validity. Furthermore,
    a more comparative analysis of other AI writing tools' implications would provide
    a broader understanding of AI's impact on education. The study's positive view
    of AI's benefits may introduce bias, and a balanced assessment of risks and benefits
    would enhance objectivity.
  prefs: []
  type: TYPE_NORMAL
- en: 'The implications of Rudolph et al.''s (2023) study for our research on how
