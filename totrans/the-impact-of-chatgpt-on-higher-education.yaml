- en: (2)End-of-Course Performance Task – Configuring an AI Chatbot for Personal Use
    (40%)
  prefs: []
  type: TYPE_NORMAL
- en: 'The objective of the end-of-course performance task is to personalise an existing
    AI chatbot to your specific needs. You will step into the role of an AI enthusiast,
    customising an existing AI chatbot to work for you. By adjusting interactions,
    responses and functionalities, you will demonstrate your ability to adapt AI technology
    effectively. This task embodies the course''s key concepts, providing a hands-on
    opportunity to apply acquired knowledge in a practical scenario. Ultimately, you
    will create a personalised AI assistant aligned with your interests and requirements.
    The assessment standards are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Functionality and Customisation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The configured AI chatbot demonstrates a clear understanding of the chosen scenario
    or context. The interactions and responses of the chatbot are relevant and aligned
    with the specific needs of the scenario. The chatbot effectively handles a variety
    of user inputs and provides appropriate responses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Tools and Platforms Proficiency*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The student has effectively utilised a variety of tools and platforms to configure
    the chatbot. There is evidence of technical proficiency in setting up and integrating
    the chatbot with relevant technologies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Rationale for Design Decisions*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The design decisions made in configuring the chatbot are clearly explained.
    The student justifies the choice of chatbot functionalities, responses and interactions
    based on the scenario's requirements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Consideration of User Experience*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The chatbot provides a user-friendly and seamless experience for interacting
    with users. Provisions are made for handling user queries effectively, maintaining
    context and providing appropriate assistance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Ethical Considerations*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Potential ethical concerns related to the chatbot's interactions and responses
    are addressed. Safeguards are in place to prevent the chatbot from providing misleading,
    harmful or biased information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Adaptability and Future Improvements*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The student discusses how the chatbot could be further improved or adapted in
    the future. Suggestions are provided for refining the chatbot's functionalities
    based on potential user feedback or changing requirements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Documentation and Explanation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clear documentation of the chatbot's configuration process, including tools
    used and setup steps, is provided. An informative explanation of the chatbot's
    functionalities, purpose and intended user experience is included.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
