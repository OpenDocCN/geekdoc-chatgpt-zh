- en: 'Similarly, different prompts can be used for each of the four domains of knowledge.
    This is useful when aiming to enhance learning and understanding in various subjects
    or disciplines. Examples include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Metacognitive Knowledge:*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Strategic knowledge:'
