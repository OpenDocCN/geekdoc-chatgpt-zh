  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'While the examples we have given above are generic and can be used across all
    disciplines, we believe that the development of discipline specific prompt banks
    will be more effective. As a result, one of the initiatives planned at MEF for
    the upcoming academic year is to have each department create their own prompt
    banks, customised to their specific disciplines and unique needs. This approach
    aims to enhance students'' experiences by offering prompts that align closely
    with their academic areas, ensuring more relevant and tailored interactions with
    ChatGPT. However, there is an alternative option: individuals can craft their
    own personalised prompt banks. Indeed, this is precisely the approach adopted
    by the authors during the book-writing process.'
  prefs: []
  type: TYPE_NORMAL
- en: Creating a personal prompt bank offers numerous advantages to users within AI-driven
    education and learning contexts. Through the creation and curation of their own
    prompts, users can tailor their learning experiences to align with their unique
    goals, interests and areas of focus. This personalised approach not only fosters
    a deeper sense of engagement but also allows for a more meaningful and relevant
    interaction with AI systems. One of the key benefits is the opportunity for users
    to customise their learning journey. By selecting prompts that cater to their
    specific learning needs, they can address areas of confusion, challenge themselves
    and explore subjects in greater depth. The act of curating a personal prompt bank
    can itself be a motivational endeavour, as users become actively invested in shaping
    their learning content. Furthermore, a personal prompt bank serves as a dynamic
    tool for ongoing learning and practice. Users can revisit prompts related to challenging
    concepts, reinforcing their understanding over time. As they interact with AI
    systems using their curated prompts, they can refine and adapt their bank based
    on the responses received, leading to improved interactions and learning outcomes.
    This process encourages users to actively participate in their learning journey
    and engage with AI technology. It nurtures skills like digital literacy and adaptability,
    which are increasingly valuable in an AI-centric world. Beyond immediate benefits,
    a well-curated prompt bank evolves into a valuable resource, adaptable to changing
    learning needs over the long term. In essence, the creation of a personal prompt
    bank empowers users with autonomy and agency, facilitating a customised and enriching
    learning experience. It enables users to actively shape their education, aligning
    it with their preferences and needs while deepening their understanding and engagement
    with AI-powered learning environments.
  prefs: []
  type: TYPE_NORMAL
- en: Fostering AI Literacy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our research has clearly underscored the urgent need for AI literacy training
    among both students and instructors. However, what exactly does AI literacy entail?
    In essence, AI literacy expands beyond digital literacy and encompasses the ability
    to comprehend, apply, monitor and critically reflect on AI applications, even
    without the expertise to develop AI models. It surpasses mere understanding of
    AI capabilities; it involves being open to harnessing AI for educational purposes.
    Equipping educators and students with the confidence and responsibility to effectively
    use AI tools makes AI literacy an indispensable skill. However, when promoting
    AI literacy, two primary objectives must be taken into account. Firstly, a comprehensive
    exploration of how users can adeptly wield ChatGPT as a valuable educational tool
    is essential. Secondly, providing instructors with guidance on seamlessly integrating
    ChatGPT into their educational practices while maintaining the integrity of their
    curricula, assessments and instruction is pivotal. This ensures that students
    do not bypass the essential learning process and neglect foundational knowledge.
    AI literacy training within universities should be customised differently for
    students and instructors, however, there will be a certain amount of crossover.
    For students, it is imperative that they grasp the fundamental concepts of AI,
    its applications, and its potential impacts across various fields. This knowledge
    will empower them to make informed decisions and actively engage with AI technologies.
    Furthermore, it is crucial that we equip our students with an understanding of
    the ethical implications of AI, including biases, privacy concerns and accountability.
    They need to comprehend how AI technologies can shape society and cultivate responsible
    usage. AI literacy should focus on nurturing students'' critical thinking skills,
    as this will enable them to assess AI-generated content, differentiate between
    human and AI contributions and evaluate the reliability of information produced
    by AI. Regarding training for instructors, instructors should acquire the proficiency
    to seamlessly integrate AI tools into their teaching methods. This involves understanding
    AI''s potential in enhancing learning experiences, automating administrative tasks
    and providing personalised feedback to students. Instructors also need to stay
    updated about AI-driven research tools, including data analysis and natural language
    processing tools. This knowledge will ensure they remain abreast of the latest
    advancements in their respective fields. Furthermore, instructors need to play
    a pivotal role in responsibly guiding students'' use of AI tools for academic
    purposes. This will include fostering originality, steering clear of plagiarism
    or unethical practices and ensuring a constructive learning experience. While
    the core concepts of AI literacy might share similarities, the emphasis and depth
    of training need to be customised differently. Students require a comprehensive
    understanding to effectively navigate AI-driven landscapes, while instructors
    necessitate a deeper focus on integrating AI into their teaching and research
    methodologies. The approach to achieving this will vary based on each university''s
    specific requirements and available technological resources. To offer some guidance,
    we present the framework for the AI literacy training courses that are currently
    in development at MEF, which can be found in the appendices. These encompass the
    following: An AI literacy training programme for instructors (Appendix A); an
    AI literacy training programme for students (Appendix B); as well as a proposed
    semester-long AI literacy course for students (Appendix C).'
  prefs: []
  type: TYPE_NORMAL
- en: In summary, this chapter has discussed crucial themes concerning the integration
    of AI in education. We have explored the impact of AI on foundational learning,
    navigated challenges through the use of flipped learning and developed a framework
    for designing future-ready curricula. We have discussed resilient assessment strategies
    and the significance of adapting instruction for the AI era. The utilisation of
    AI prompt banks has been emphasised, along with the need to foster student and
    instructor AI literacy. This brings us to our final chapter, in which we discuss
    the contributions our study has made to knowledge and research within the realm
    of AI in higher education.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Contributions to Knowledge and Research
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Review of Research Scope and Methodology
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'During our research, we thoroughly examined the impact of ChatGPT and artificial
    intelligence (AI) chatbots on higher education. MEF University in Istanbul served
    as our research site, renowned for its integration of AI and innovative educational
    approaches. Through experiments and faculty discussions, we initiated this project
    to investigate how ChatGPT may affect higher education institutions, students
    and instructors. Our objectives were to understand the changes in dynamics caused
    by these technologies. We framed our research questions around the roles of students,
    instructors and institutions of higher education in the presence of ChatGPT. By
    exploring these questions, our aim was to gain insights into the transformative
    impact of AI chatbots in education and provide guidance for successful integration.
    To understand the big picture, we conducted an exploration of AI and ChatGPT,
    including its historical development and addressing ethical concerns like privacy,
    bias and transparency. We emphasised the limitations of ChatGPT, including its
    potential for generating misleading information and the challenge of addressing
    its shortcomings. Furthermore, we discussed the broader implications of AI on
    the future of work and education. We also touched upon the growing concerns about
    the threat that AI may pose and discussed how national and international policies
    are starting to be developed to mitigate such threats. To deepen our understanding,
    we explored theoretical perspectives such as critical theory and phenomenology,
    allowing us to examine power dynamics, social structures and subjective experiences
    related to ChatGPT. Then, in our literature review, we analysed various scholarly
    papers on integrating ChatGPT in education, including document and content analysis,
    meta-literature reviews and user case studies, conducted within a 4-month timeframe.
    This review helped us identify recurring themes, gaps in the existing literature
    and areas that required further research. Our research methodology adopted a qualitative
    approach, exploring subjective experiences and meanings associated with interactions
    with ChatGPT. Through a case study approach, we collected data from multiple sources,
    including critical incidents, researcher diaries, interviews, observations and
    student projects and reflections. From thematic analysis, we identified six themes:
    Input Quality and Output Effectiveness of ChatGPT, Limitations and Challenges
    of ChatGPT, Human-like Interactions with ChatGPT, Personal Aide/Tutor Role of
    ChatGPT, Impact of ChatGPT on User Learning and Limitations of a Generalised Bot
    for Educational Context. By examining each theme in relation to our research questions,
    the data, the literature and our theoretical framework, we gained a comprehensive
    understanding of the implications and significance of our findings.'
  prefs: []
  type: TYPE_NORMAL
- en: Key Insights and Findings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What we discovered is that while ChatGPT proves highly useful across various
    applications, its efficacy depends on input quality and specificity. Clear prompts
    lead to accurate responses, but multiple iterations and modifications may be necessary
    for desired outcomes. ChatGPT operates predictively, lacking a full grasp of context,
    which poses a limitation. Challenges in application include the absence of a standardised
    referencing guide, potential generation of incorrect responses and inherent biases.
    Users perceive ChatGPT as human-like, blurring the lines between human and AI
    interaction, necessitating the promotion of critical thinking and information
    literacy skills. In education, ChatGPT shows versatility and practicality, but
    concerns arise that overreliance may hinder critical thinking and independent
    knowledge acquisition. In addition, its generalised approach exhibits limitations
    regarding disciplines and cultural setting.
  prefs: []
  type: TYPE_NORMAL
- en: Based on these findings, it is clear that the integration of AI is poised to
    bring about significant transformations in the roles of students, instructors
    and higher education institutions. This transformation unfolds in several ways.
    Drawing upon Christensen's theory, students are now presented with the option
    to leverage ChatGPT for specific educational tasks, ushering in an era of AI-supported
    time optimisation. However, this shift also implicates Bourdieu's concepts of
    cultural and social capital, as an excessive reliance on AI could result in the
    replication of knowledge without genuine comprehension, potentially affecting
    students' educational habitus shaped by their socio-cultural backgrounds. When
    examined through a Marxist lens, this phenomenon might signify an instance of
    technological determinism reshaping educational dynamics for students, possibly
    leading to a decline in critical thinking and reduced engagement with the learning
    process. Moreover, the act of referencing AI-generated information introduces
    unique challenges, reflective of a technological framing of knowledge. Consequently,
    students are entrusted with the active navigation of their technological interaction,
    fostering authentic understanding and shifting them from passive recipients to
    active participants in their educational journey. Shifting focus to instructors,
    as proposed by Christensen's Theory of Jobs to be Done, educators now have the
    option to utilise ChatGPT to automate routine tasks and generate educational materials,
    freeing up time for a more refined teaching approach. However, it is vital for
    instructors to validate ChatGPT's outputs, revealing areas where AI technologies
    require fine-tuning. Through a Bourdieusian lens, instructors' roles are poised
    to evolve as they navigate AI's integration into pedagogy, encompassing an embodiment
    of cultural capital. To counteract potential bypassing of learning and preserve
    authenticity, teaching methodologies must evolve accordingly. Approaching this
    from a Marxist perspective, AI automation's introduction could signify a form
    of commodification. Nonetheless, instructors' ongoing need to validate outputs
    and create effective assignments serves as a countermeasure against complete alienation.
    Viewing this interplay through a Heideggerian framework, instructors assume the
    responsibility of guiding students in the judicious use of AI, ensuring technology
    serves as a conduit for truth revelation rather than mere knowledge framing. As
    such, instructors play a pivotal role in cultivating an educational environment
    characterised by authenticity and thoughtful engagement, even amid technological
    advancements. Broadening the perspective to encompass higher education institutions,
    the integration of ChatGPT offers universities an avenue to heighten productivity
    and streamline educational processes. However, the challenge lies in aligning
    this technological leap with the needs of both students and faculty members. This
    alignment closely aligns with Bourdieu's notions of capital and social structure,
    necessitating updates to institutional policies, enhancements in assessment methodologies
    and robust training initiatives. Through the lens of Bourdieu, ChatGPT emerges
    as a novel form of cultural capital, enhancing institutions' prestige and credibility.
    Nevertheless, upholding equitable access and addressing biases remains pivotal
    to prevent the perpetuation of societal disparities. Through a Marxist perspective,
    the inclusion of ChatGPT might be construed as a form of education commodification.
    However, safeguarding equitable access and nurturing critical engagement upholds
    the enduring value of human oversight within the realm of education. As seen through
    a Heideggerian framework, institutions shoulder the task of balancing the interplay
    between students, instructors and the intrinsic essence of technology. Thus, institutions
    must employ AI in a manner that uncovers truth and amplifies comprehension, all
    while preserving the core role of human elements in education.
  prefs: []
  type: TYPE_NORMAL
- en: Theoretical Advancements
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The integration of the theoretical frameworks of critical theory and phenomenology
    into our research study on the impact of ChatGPT on higher education represents
    a significant stride towards advancing the theoretical discourse within the field.
    By employing these philosophical lenses, our research transcends mere examination
    and enters the realm of deep understanding, nuanced analysis and holistic exploration.
    Through the combination of critical theory and phenomenology, our research embraces
    a multidimensional understanding of the impact of ChatGPT. Rather than analysing
    this integration from a singular perspective, our approach delves into power dynamics,
    subjective experiences, existential dimensions and authenticity. This comprehensive
    exploration offers a deeper grasp of the technology's effects on students, educators
    and institutions. Critical theory's focus on power dynamics exposes hidden inequalities
    and systemic structures. By applying this lens, our research uncovers potential
    disparities in the adoption and utilisation of ChatGPT, shedding light on how
    technology can either perpetuate or challenge existing hierarchies. This unveiling
    of hidden dynamics enriches the discourse around technology's transformative potential
    within higher education. Phenomenology's emphasis on subjective experiences empowers
    our research to transcend the superficial layer of technological implementation.
    By delving into the conscious experiences of stakeholders, our study elevates
    the conversation beyond technical functionalities to explore the nuances of how
    individuals perceive, adapt to and interact with ChatGPT. This human-centred exploration
    adds depth and authenticity to the theoretical advancements we are making. Heideggerian
    philosophy introduces an existential layer to our research, urging a contemplation
    of the essence of being and the profound implications of technology on human existence.
    This philosophical lens elevates the conversation to a level of introspection
    which is not often found in empirical studies. It invites researchers, educators
    and policymakers to consider the philosophical underpinnings of their choices
    and decisions regarding technology integration. The amalgamation of these frameworks
    encourages a holistic consideration of the ethical, social and personal dimensions
    of technology integration. Thus, our research doesn't solely focus on the functionality
    of ChatGPT but rather its consequences on power structures, pedagogical relationships
    and the authentic experiences of those involved. This comprehensive analysis contributes
    to the theoretical advancement by promoting well-rounded and informed decision-making.
    By paving the way for an in-depth exploration of ChatGPT's impact, our research
    sets a precedent for future investigations. Our approach demonstrates the value
    of intertwining philosophy and technology in educational research. Researchers
    interested in the interplay between emerging technologies and education may find
    inspiration in our study's philosophical underpinnings, further advancing the
    theoretical discourse.
  prefs: []
  type: TYPE_NORMAL
- en: Implications for Higher Education Institutions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Overall, the implications of AI for institutions of higher education are broad
    and profound, affecting various aspects of academia. These implications span across
    ethical considerations, product-related adjustments and significant shifts in
    educational approaches, all of which necessitate careful examination and adaptation.
    In the realm of ethical considerations, we strongly recommend refraining from
    the utilisation of AI detection systems. This perspective stems from the intrinsic
    opacity, inaccuracies and potential biases associated with these systems. Moreover,
    we extensively assess existing recommendations for AI referencing systems, ultimately
    concluding their impracticality and inefficiency. A significant portion of our
    discourse centres on the re-evaluation of plagiarism within the AI era, a challenge
    magnified by emerging technologies that challenge traditional norms. This complexity
    deepens when AI is involved, given its absence of identifiable authorship, leading
    to the intriguing notion that AI''s mere existence could be likened to plagiarism.
    Amid these intricate challenges, we underscore the imperative of fostering proficiency
    in AI ethics among students, educators and institutions. This not only entails
    comprehending the ethical ramifications of AI but also ensuring its responsible
    and informed integration within academic settings. Thus, we assert that universities''
    ethics committees should play a pivotal role in driving this transformation. With
    the increasing prevalence of AI-generated content, institutions must grapple with
    redefining plagiarism and attributing credit in this AI-infused age. This endeavour
    will necessitate a nuanced understanding of how AI interfaces with established
    academic standards. When considering the implications on product development,
    we firmly advocate for universities to prioritise achieving an equitable distribution
    of AI bots. This can be achieved through the establishment of institutional agreements
    that grant bot access to all instructors and students, thus ensuring universal
    availability or by directing students towards readily available open sources.
    As AI becomes an integral part of the educational landscape, it becomes increasingly
    crucial to address product-related considerations. Ensuring fair and equal access
    to AI bots becomes paramount in order to prevent any potential disparities in
    resource allocation among students. Moreover, we underline the significance of
    universities forging strong partnerships with industries. Recognising the influence
    of AI on these sectors and identifying the skill sets that employers are seeking
    in graduates will serve as valuable insights for curriculum refinement within
    universities. This collaborative effort with industries becomes essential to synchronise
    educational offerings with the ever-changing requirements of the job market. Such
    collaboration is pivotal in ensuring that students are adequately equipped with
    the essential AI-related competencies to excel in industries increasingly shaped
    by AI technologies. Furthermore, by fostering collaboration, universities can
    gain insights into the evolving utilisation of AI within specific industries.
    This valuable information can subsequently inform the creation or acquisition
    of specialised bots that align with industry trends. This focused approach will
    adeptly address the limitations of generalised bots within the educational sphere.
    The idea of discipline-specific AI bots introduces a pioneering pathway for tailored
    learning experiences, offering the capacity to precisely address the unique requirements
    of diverse departments and thus enhancing the integration of AI across various
    academic domains. Furthermore, we strongly advocate that universities immediately
    introduce courses in prompt engineering to students, either by developing their
    own courses or by providing access to existing MOOC courses. This proactive measure
    will empower students with indispensable skills in navigating the swiftly changing
    technological terrain. Simultaneously, the provision of prompt engineering courses
    will significantly bolster students'' AI proficiency and deepen their comprehension
    of optimal AI-interaction strategies. Within the realm of educational implications,
    we strongly emphasise the imperative for institutions to thoroughly assess the
    potential influence of AI on students'' foundational learning. The conventional
    concept of foundational learning faces new challenges as AI introduces novel methods
    and tools. Manoeuvring through these obstacles necessitates a modification of
    instructional approaches that foster critical thinking, problem-solving and creativity
    – skills that AI struggles to replicate as effectively as humans. In this context,
    we propose the adoption of the flipped learning approach as an effective framework
    to address these issues. Embracing this approach harnesses AI tools to enrich
    pre-class engagement, allowing class time to be utilised for interactive discussions,
    collaborative projects and hands-on application. Furthermore, the development
    of curricula that prepare students for the AI-dominated world becomes imperative.
    In light of AI advancements, there may be a need to reconsider certain existing
    course learning outcomes. Therefore, we propose that instructors collaborate with
    industry to conduct a job analysis, aiming to assess AI''s influence on the real
    world. Following this assessment, appropriate adjustments can be made to the learning
    outcomes to ensure their continued relevance. To evaluate students'' content knowledge
    and AI literacy skills effectively, AI-resilient assessment strategies are paramount.
    These strategies must mirror the AI-influenced reality, requiring students to
    possess not only subject expertise but also the capability to interact adeptly
    with AI technologies. Similar strategies should be implemented in in-class activities
    to bolster their AI resilience and prevent potential learning gaps. To provide
    practical guidance on these aspects, we present a comprehensive framework accompanied
    by flowcharts featuring relevant questions. These questions are designed to assist
    instructors in crafting future-ready curricula, formulating assessment methods
    that can withstand the impact of AI and adapting teaching methodologies to align
    with the AI era. Furthermore, we highlight the vital role of creating prompt banks
    as an invaluable resource to enhance the optimal utilisation of AI. The creation
    of prompt banks holds considerable significance in maximising the effectiveness
    of AI systems. These banks comprise a collection of well-crafted and diverse prompts
    strategically designed to guide interactions with AI platforms like ChatGPT. Acting
    as initial cues, these prompts stimulate AI-generated responses, suggestions or
    solutions. We propose the development of discipline-specific prompt banks tailored
    to the unique needs of various academic departments within universities. Alongside
    this, we advocate for encouraging students and instructors to curate their personalised
    prompt banks, catering to their individual preferences and requirements. Furthermore,
    we emphasise the significance of fostering AI literacy among both students and
    instructors, albeit with distinct aims. Students should become adept at effectively
    utilising ChatGPT, while instructors should seamlessly incorporate it into their
    teaching methods. Tailored training is essential: students should grasp AI fundamentals,
    applications, ethics and critical thinking, while instructors should excel in
    AI tool integration and ethical guidance. Consequently, training depth should
    vary, addressing students'' AI navigation and instructors'' integration expertise.
    The approach will be contingent upon each university''s unique requisites and
    available resources. To facilitate this, we have provided recommendations for
    training programs and courses in the appendices, equipping both instructors and
    students with the essential skills for proficient AI utilisation. In essence,
    the integration of AI in higher education marks a transformative phase. Institutions
    must navigate the ethical, product-related and educational implications thoughtfully
    to ensure that students are prepared for a future shaped by AI technologies. This
    journey requires a delicate balance between embracing technological advancements
    and upholding the core values of education. However, we believe the role of universities
    goes beyond just what is discussed here. There is a much bigger picture that needs
    to be addressed.'
  prefs: []
  type: TYPE_NORMAL
- en: Global Action and Collaboration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Within the realm of AI, a wide array of concerns currently exists, spanning
    various dimensions. As AI technology continues to progress, more and more ethical
    dilemmas are emerging, raising questions about its alignment with human values
    and its potential for undesirable outcomes. We are currently seeing that AI systems
    exhibit a number of limitations in critical aspects, such as common sense reasoning,
    robustness and a comprehensive grasp of the world. This hinders the creation of
    genuinely intelligent and dependable systems. Additionally, transparency, interpretability
    and accountability are posing serious challenges, especially in areas like healthcare,
    finance and law, where they can have a significant impact on human lives. At times,
    the ongoing trajectory of AI development would appear to be prioritising specific
    objectives without due consideration for human values, thereby introducing the
    risk of unanticipated challenges and management complexities. Furthermore, there
    are also growing concerns surrounding the potential impact of AI on job markets,
    the economy, governance and societal welfare, which stem from the potential of
    AI to worsen prevailing inequalities and biases. Notably, certain experts perceive
    AI as posing an existential threat, citing its ability to surpass human intelligence
    and consequently posing significant risks to society and humanity. This global
    scenario has prompted experts, governments and even AI companies to call for regulations,
    and we are now starting to see the emergence of such regulatory policies. The
    United Kingdom''s Competition and Markets Authority is engaged in a thorough review
    of AI, centring on concerns like misinformation and job disruptions. Concurrently,
    the UK government is revising AI regulations to tackle associated risks. In the
    United States, White House deliberations have involved discussions with AI CEOs
    regarding safety and security, and the Federal Trade Commission is also actively
    involved in investigating AI''s impact. In addition, the European Union''s AI
    Act is in the process of developing a framework to categorise AI applications
    by risk and are advocating for responsible AI practices. Moreover, tech giants
    OpenAI, Anthropic, Microsoft and Google have collaboratively introduced the Frontier
    Model Forum, dedicated to AI safety, policy discussions and constructive applications,
    which builds upon contributions from the UK government and the European Union,
    aligning with White House conversations and indicating an ongoing evolution within
    the tech industry. Hence, it becomes evident that steps are being taken. However,
    a pivotal question remains: will these regulatory efforts result in impactful
    actions that effectively address potential issues and foster responsible AI advancement?
    It would seem not.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Currently, there are worrying indications pointing towards potential negative
    outcomes, exemplified by the reduction in Microsoft''s ethics team and Sam Altman''s
    reservations regarding EU AI regulations. These instances underscore the substantial
    influence wielded by companies and even individual figures. This echoes the very
    concern voiced by Rumman Chowdhury, who has highlighted an industry trend where
    entities paradoxically advocate for regulation while concurrently lobbying against
    it, often prioritising risk assessment over ethical considerations. However, this
    concentration of power driven by resources could lead to biases and adverse outcomes
    if not vigilantly managed. Hence, Chowdhury proposes a redistribution of power
    through collaborative stakeholder engagement. Karen Hao echoes these sentiments,
    expressing apprehension about tech giants'' influence over advanced AI technologies.
    She calls for transparent and inclusive AI policy shaping that involves a diverse
    range of stakeholders, underlining the essential role of varied perspectives in
    promoting responsible AI development. Harari also conveys concerns about potential
    challenges associated with technological advancement (2018). He asserts that sociologists,
    philosophers and historians have a crucial role in raising awareness and addressing
    the self-promotion frequently presented by corporations and entrepreneurs in regard
    to their technological innovations. He underscores the urgency of swift decision-making
    to effectively regulate the impact of these technologies, guarding against their
    imposition on society by market forces. This matter holds utmost significance
    at present, given the swift progress of ChatGPT in the AI industry, which is catalysing
    a competition among other companies to adopt and cultivate extensive language
    models and generative AI. This rapid course may surpass the responsiveness of
    government policies in addressing these advancements promptly. This brings us
    back to our AI experts: Max Tegmark, Gary Marcus, Ernest Davis and Stuart Russell.
    In his 2017 book *Life 3.0: Being Human in the Age of Artificial Intelligence*,
    Tegmark lays out frameworks for responsible AI governance, stressing the importance
    of AI conforming to ethical principles that prioritise human values, well-being
    and societal advancement. He highlights the significance of transparency and explainability
    in ensuring humans understand AI''s decision-making process. To this end, he proposes
    aligning Artificial General Intelligence (AGI) objectives with human values and
    establishing oversight mechanisms. Tegmark envisions a collaborative approach
    involving a diverse range of stakeholders, including experts and policymakers,
    to collectively shape AGI regulations, with a strong emphasis on international
    cooperation (Tegmark, 2017). He advocates for adaptable governance frameworks
    that can keep pace with the evolving AI landscape. Tegmark''s overarching goal
    is to harmonise AI with human values, preventing misuse and fostering societal
    progress, all while recognising the continuous need for interdisciplinary discourse
    and fine-tuning in AI governance (Tegmark, 2017). Marcus and Davis advocate for
    a comprehensive re-evaluation of the AI research trajectory, suggesting an interdisciplinary
    path that addresses the limitations inherent in current AI systems (Marcus & Davis,
    2019). Their approach involves integrating insights from various fields like cognitive
    science, psychology and linguistics, aiming to create AI systems that better align
    with human cognitive processes. They introduce a significant concept – the ‘hybrid’
    approach to AI advancement, which combines rule-based systems and statistical
    methodologies (Marcus & Davis, 2019). This fusion aims to harness the strengths
    of both approaches while mitigating their weaknesses. Their vision is that such
    a hybrid methodology could yield more intelligent and reliable AI systems capable
    of effectively handling complex real-world scenarios (Marcus & Davis, 2019). Russell
    introduces the concept of value alignment theory, a fundamental aspect of AI ethics
    (Russell, 2019). This theory centres on the vital objective of aligning AI systems
    with human values and goals. It underscores the necessity of designing AI systems
    to reflect human intentions and desires, preventing potential negative outcomes
    and ensuring their ethical operation (Russell, 2019). At its core, value alignment
    theory seeks to ensure that AI systems not only achieve their designated objectives
    but also consider the broader context of human values and ethics; it acknowledges
    the potential for AI systems, particularly as they gain autonomy, to pursue goals
    in ways that may conflict with human intentions (Russell, 2019). Russell''s work
    advocates for AI systems that comprehend and honour human values by incorporating
    mechanisms for learning from human interaction and feedback. This approach also
    emphasises transparency and interpretability, allowing humans to understand AI
    decision-making processes and intervene if needed. Russell''s focus on value alignment
    aims to avert scenarios where AI systems act contrary to human values, fostering
    a human-centric approach to AI development that amplifies human capabilities while
    upholding ethical standards (Russell, 2019). So, based on these proposed solutions
    by the AI experts to the issues inherent in AI, what role should universities
    play?'
  prefs: []
  type: TYPE_NORMAL
- en: We believe universities have a critical role to play in the context of responsible
    AI development and governance, if not a moral obligation, and suggest that they
    contribute to solutions in the following ways. First, universities can act as
    hubs of research and education, contributing to the advancement of AI technologies
    while also instilling ethical considerations. They can offer interdisciplinary
    programmes that merge computer science, ethics, cognitive science, psychology
    and other relevant fields, encouraging students to think critically about the
    societal impacts of AI. In line with Tegmark's ideas, universities can facilitate
    collaborative efforts by bringing together experts, policymakers and various stakeholders
    to discuss and formulate regulations for AI governance. They can host conferences,
    seminars and workshops that promote international cooperation and the exchange
    of ideas to shape adaptable governance frameworks, addressing the evolving landscape
    of AI. Marcus and Davis' call for an interdisciplinary approach aligns with universities'
    ability to foster collaboration between different departments and faculties. Universities
    can encourage joint research initiatives that combine AI expertise with insights
    from fields such as psychology and linguistics to create AI systems that better
    emulate human cognitive processes. Universities can also play a pivotal role in
    advancing value alignment theory, as proposed by Russell. They can contribute
    to research and education around the ethical dimensions of AI, training future
    AI developers and researchers to prioritise human values and societal well-being.
    Furthermore, universities can provide platforms for discussions on the moral implications
    of AI, fostering a culture of transparency and accountability in AI development.
    Overall, universities have a responsibility to serve as knowledge centres, promoting
    interdisciplinary research, ethical considerations, international cooperation
    and transparency. We believe their role should expand beyond technical expertise
    alone, encompassing the broader aspects of holistic development and responsible
    governance of AI technologies. This is our call to action.
  prefs: []
  type: TYPE_NORMAL
- en: Addressing Limitations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While our study's findings proved pertinent and resulted in the development
    of strategies for implementing ChatGPT at our institution, it is essential to
    acknowledge and address certain research limitations. The study took place at
    a specific English-medium non-profit private university in Turkey, renowned for
    its flipped learning approach. While the insights gained are valuable, it's crucial
    to recognise that the unique context may limit the generalisability of the results
    to other educational settings. One notable limitation encountered during the research
    process was the limited availability of literature on ChatGPT at the study's time.
    This scarcity can be attributed to the recent public launch of ChatGPT and the
    restricted time frame for conducting the literature review. As a result, the review
    partially relied on grey literature, including pre-prints, potentially affecting
    the comprehensiveness and depth of the analysis. The study also employed intentionally
    broad and open-ended research questions to facilitate an exploratory investigation.
    While this approach allowed for a comprehensive exploration, it's vital to acknowledge
    the potential for bias in interpreting the findings due to the dual role of the
    principal investigator, serving as both the researcher and instructor. Additionally,
    the study's reliance on a small sample size of 12 students from an elective humanities
    class focused on forensic linguistics poses a limitation. It's essential to recognise
    that outcomes may have varied in larger classes or different disciplines. Furthermore,
    the sampling of other voices, including instructors and administrators, was relatively
    random, based on critical incidents, emails, workshops and ad hoc interactions.
    Finally, it's worth noting that the research was conducted over a single semester,
    which may restrict the longitudinal analysis of ChatGPT's impact on education.
    To address these limitations in future studies, we will make the following adaptations.
    Firstly, to make our findings more applicable across diverse educational settings,
    we will include a broader range of academic disciplines. To ensure a strong theoretical
    foundation, we will continuously monitor reputable sources for the latest research
    on ChatGPT and related AI technologies, updating our literature review accordingly.
    By combining quantitative and qualitative approaches, we will gain a more holistic
    understanding of ChatGPT's impact. Integrating numerical data with rich narratives
    from students, instructors and administrators will provide a comprehensive view
    of the technology's effectiveness and challenges. To maintain objectivity, we
    will look to include more reflexivity during data collection and analysis by involving
    multiple researchers and use triangulation methods to validate and cross-check
    findings from these different perspectives. Strengthening the study's validity
    and representativeness can be achieved by including a larger and more diverse
    participant pool, encompassing students from various disciplines and academic
    levels, educators and decision-makers. Gaining deeper insights into ChatGPT's
    effects over time can be achieved through long-term investigations. Observing
    changes, adaptations and potential challenges will provide a nuanced understanding
    of the technology's long-term implications. The exploration of our suggested pedagogical
    strategies for effectively integrating ChatGPT in education is of utmost importance.
    By investigating how these proposed changes will impact teaching and learning,
    we can gain valuable insights for further practical implementation. By incorporating
    these improvements into our future research, we can enrich our understanding of
    ChatGPT's impact in education and offer valuable insights for educators and institutions
    seeking to effectively utilise AI technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Recommendations for Further Research
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our study has opened the door to various avenues for further exploration and
    investigation into AI chatbots in higher education. Here, we present potential
    research directions that could extend the scope of our findings and offer valuable
    insights to fellow researchers.
  prefs: []
  type: TYPE_NORMAL
- en: '*Address Ethical Implications*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is an urgent need to investigate the ethical implications of AI integration
    in education, including data privacy, student consent, algorithmic bias and social-cultural
    impacts. Therefore, investigations should be extended to explore challenges faced
    by instructors and institutions when using AI chatbots and ensuring ethical practices
    in data privacy and bias mitigation for responsible AI use in education.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Long-Term Effects of AI Integration*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It would be pertinent to investigate the long-term effects of AI integration
    in education, understanding how the use of AI chatbots evolves over time and its
    impact on student learning outcomes and instructor practices. A mixed methods
    approach could provide a comprehensive perspective, combining quantitative data
    on outcomes with qualitative insights on user experiences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Cultural Variations in Bots*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another potential area for future research would involve examining how the cultural
    nuances present in various AI bot databases should be considered by institutions
    when selecting systems. Such a study would offer valuable insights into how different
    AI bots might fit within diverse cultural contexts, thus influencing their effectiveness
    in educational settings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Application in Other University Areas*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is room to investigate the potential applications of ChatGPT beyond education,
    such as in customer service or administrative tasks within the university. This
    could involve assessing the benefits, challenges and impact of integrating AI
    technologies in these areas, which could lead to increased efficiency and improved
    user experiences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Investigating the Integration of AI Bots into Digital Platforms*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Digital platform companies, such as Pearson, are actively working on integrating
    AI chatbots into their platforms. Exploring the potential benefits and challenges
    of this integration for teaching and learning would be valuable once these new
    versions of the platforms have been released.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Impact on Instructors'' Roles and Career Development*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The long-term impact of AI integration on the roles and responsibilities of
    instructors should be assessed to investigate how this may affect career development
    and job satisfaction in the academic field. This research could provide insights
    into potential opportunities for professional growth and adaptation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Collaborative Functionality of ChatGPT and AI Chatbots*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We believe it would be pertinent to explore the collaborative functionality
    of ChatGPT and other AI chatbots that allow sharing chats among multiple individuals.
    This could involve an investigation into its application by students, instructors,
    researchers and institutions for collaborative learning, knowledge sharing and
    collective problem-solving within educational contexts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Effects of ChatGPT and AI Chatbots on Language Learning*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We believe it is imperative to investigate the potential effects of ChatGPT
    and AI chatbots on language learning. Given their capabilities in translation,
    summarisation, improving writing and acting as conversational partners, further
    research is recommended to understand the positive and negative impacts on language
    acquisition and proficiency.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Investigating the AI-Human Communication Interface*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another avenue for future research that we believe holds particular interest
    and significance would be an exploration of how the integration of AI and technology,
    such as chatbots, in education aligns with Heidegger's theory on technology and
    the essence of being. Investigating how human–chatbot relationships impact student
    learning outcomes could shed light on the extent to which technology's ‘enframing’
    tendency affects authentic human interactions and understanding. Additionally,
    delving into the application of communication and symbolic interaction theories
    within the context of AI-mediated interactions, as discussed by Tlili et al. (2023)
    and Firaina and Sulisworo (2023), could offer insights into how technology shapes
    our perception of communication. Furthermore, an examination of media theory in
    education, also raised by Firaina and Sulisworo (2023), could provide a deeper
    understanding of how technology, as a form of media, influences interactions and
    the acquisition of information. Lastly, aligning educational priorities, as advocated
    by Zhai (2022), with Heidegger's concerns about technology's impact on human essence
    could offer insights into how to strike a balance between enhancing skills and
    preserving the authentic human experience in the era of AI-driven education. This
    future research direction has the potential to contribute to a comprehensive understanding
    of the implications of AI integration in education, both from a technological
    and philosophical perspective.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By pursuing these future research directions, we believe the field can gain
    a more comprehensive understanding of AI's influence in education and develop
    strategies for harnessing AI's potential while safeguarding the core values of
    quality education and human-centric learning.
  prefs: []
  type: TYPE_NORMAL
- en: Final Reflections and Concluding Remarks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our research, centring on the implications of AI with a particular focus on
    AI chatbots like ChatGPT, has provided meaningful insights into the pervasive
    impact of AI on our educational institutions, industries and societies. As we
    have seen, AI acts as both a tool and a transformative element, reshaping traditional
    learning environments, redefining roles and challenging established norms. However,
    our findings extend beyond the confines of academia, addressing broader global
    dialogues on AI''s wide-ranging effects. We''ve investigated the challenges and
    opportunities arising from AI''s rapid development, from potential job displacement
    to the restructuring of power dynamics. Emphasising the importance of pre-emptive
    governance, inclusive decision-making and strong adherence to ethical principles,
    we''ve outlined crucial considerations for shaping AI''s future trajectory. We
    applied the theories of Christensen, Bourdieu, Marx and Heidegger as guides to
    dissect AI''s transformative potential, its influence on power structures and
    the profound existential questions it prompts. This theoretical approach equipped
    us to navigate the complex landscape of AI''s rapid evolution, providing a useful
    framework for others who seek to understand and engage with these issues. We identified
    universities as key players in these critical discussions. Their influential role
    in shaping knowledge and driving innovation positions them as leaders in responsible
    AI adoption and governance. They have the potential to direct AI''s trajectory
    in a way that promotes collective interests, empowers individuals and enhances
    societal well-being. As we all grapple with these changes – students, educators,
    researchers, policymakers and society as a whole – we must remember the key message
    of this research: AI is not just a tool to be used but a significant force to
    be reckoned with, demanding our understanding, engagement and responsible navigation.
    As we look to the future, we must remember that we are the authors of the AI narrative.
    We have the capacity to ensure that AI technologies are shaped to reflect our
    shared values and aspirations. The importance of our research lies in its call
    for a conscious and intentional approach to AI integration. It''s a call to envision
    and actively work towards a future where AI promotes greater equity, understanding
    and shared prosperity. This research is a starting point, a guide that we hope
    will assist future endeavours towards responsible AI governance and a future where
    AI is integrated beneficially into all facets of our lives.'
  prefs: []
  type: TYPE_NORMAL
- en: Appendices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Appendix A: AI Literacy Training for Instructors'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Based on our research, we suggest the following AI literacy programme for instructors.
  prefs: []
  type: TYPE_NORMAL
- en: Course Name
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Mastering AI Literacy for Teaching and Learning
  prefs: []
  type: TYPE_NORMAL
- en: Overall Educational Objective
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: By the end of the course, you will have gained the comprehensive knowledge and
    skills to effectively integrate AI chatbots into your educational setting for
    effective learning and teaching.
  prefs: []
  type: TYPE_NORMAL
- en: Course Format
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This course will be delivered as an asynchronous online programme, providing
    educators with the flexibility to engage with the content at their own pace. The
    course materials will be accessible through the university's learning management
    system, allowing participants to learn, reflect and practice in a self-directed
    manner. To enhance engagement and interaction, live workshops will be conducted
    throughout the semester, focusing on each aspect of the course content. These
    workshops will provide an opportunity for participants to ask questions, engage
    in discussions and receive real-time guidance.
  prefs: []
  type: TYPE_NORMAL
- en: Course Description
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This is a dynamic and immersive course that equips educators with a deep understanding
    of AI chatbot technology and its ethical implications in educational contexts.
    From foundational concepts to advanced strategies, this course takes educators
    on a transformative journey through the world of AI chatbots. Participants will
    explore how AI chatbots are reshaping the education landscape, from personalised
    learning experiences to efficient administrative support. The course delves into
    the ethical dimensions of AI integration, addressing concerns like privacy, bias
    and accountability. Educators will gain practical insights into how AI can amplify
    teaching methodologies, enhance student engagement and revolutionise assessment
    strategies. This course is designed to empower educators to seamlessly integrate
    AI chatbots into their teaching practices while ensuring ethical considerations
    remain at the forefront. Participants will engage in interactive units that cover
    the emergence and growth of AI chatbots, their potential to enhance instructional
    efficiency and the ethical implications of AI-driven education. Real-world examples
    will illuminate the challenges and solutions associated with AI ethics. By the
    end of the course, educators will be equipped with the skills to foster responsible
    AI integration, design future-ready curricula and leverage AI tools for impactful
    instruction.
  prefs: []
  type: TYPE_NORMAL
