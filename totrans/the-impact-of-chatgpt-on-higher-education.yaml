  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Useful in other areas of life
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ChatGPT can have practical applications and benefits beyond just educational
    use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The process of refining codes into coherent themes involved several cycles
    of careful evaluation. We began by generating initial codes and then organising
    them into meaningful themes. Thorough exploration of various groupings and potential
    themes ensured their accuracy and validity. To validate these themes, we meticulously
    cross-referenced them with the coded data extracts and the entire dataset. Additional
    data, such as critical incidents observed during conferences and workshop discussions,
    posed a challenge as they emerged after we had established our codes and completed
    the thematic analysis. However, since these incidents contained relevant new data
    that could enrich our analysis, we revisited the coding and thematic analysis
    process three times to integrate these additional data. This iterative approach
    resulted in more robust codes and themes. Collaborative discussions further led
    to the formulation of concise and informative names for each theme. Through this
    iterative approach, we attained data saturation, indicating that no further new
    information or themes were coming to light. The final themes that were collectively
    agreed upon and their respective codes are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Input Quality and Output Effectiveness*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Need for giving a clear context, input determines output quality, requires multiple
    iterations to get what you want
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Limitations and Challenges of ChatGPT*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lack of standard referencing guide for ChatGPT, gives incorrect information,
    lack of response relevance, occurrences of refusal or reprimand by ChatGPT, gender
    bias in pronoun usage, need to fact-check
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Human-Like Interactions with ChatGPT*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interactivity of communication, perceived human-like interactions with ChatGPT,
    people perceive ChatGPT as providing opinions rather than predictions, unquestioning
    trust in information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Personal Aide/Tutor Role of ChatGPT*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enriches the user's ideas, speeds up the process, reduces cognitive load, useful
    in other areas of life, ability to translate, reviews work and gives suggestions
    for improvement, text register modification, imparts specific knowledge, skills,
    concepts to users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Impact on User Learning*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ChatGPT demonstrates competency in completing assigned student tasks, inhibits
    user learning process, ChatGPT unable to perform assigned student tasks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Limitations of a Generalised Bot for Educational Context*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gaps in knowledge, disciplinary context limitations, culturally specific database
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To facilitate the mapping and analysis of the themes, the researchers utilised
    a Google Sheet for each theme, incorporating the following sections: code, code
    definition, examples from the extant literature, examples from the literature
    review and supporting examples from the data. This comprehensive framework allowed
    for a systematic examination of each of the themes in relation to our research
    questions. From this, the following interconnectivity of the themes was derived
    ([Fig. 1](#978-1-83797-647-820241005.xhtml#fig1)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/f05-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.Interconnectivity of Themes.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout this study, obtaining informed consent from all participants, including
    interviewees, instructors, and students, was a top priority. Participants were
    fully informed about the research purpose, procedures, potential risks, and benefits,
    with the freedom to decline or withdraw without consequences. Our communication
    with participants remained transparent and clear, ensuring data privacy and confidentiality.
    Ethical review and approval were obtained from the university's ethics committee
    to comply with guidelines and protect participants' rights. To mitigate bias,
    the researcher remained mindful of personal biases during data collection and
    analysis. However, during the research process, an ethical issue emerged concerning
    consent related to the research diaries, which served as a hidden form of data
    collection. The researcher began to perceive every interaction and event as potential
    data, while participants may not have viewed them in the same light (Hammersley
    & Atkinson, 1995). This raised concerns about ensuring proper consent for the
    use of information gathered through such situations. As, on most occasions, the
    researcher did not recognise the relevance of these incidents to the investigation
    until after they occurred, this meant the researcher had not explicitly communicated
    to participants that the content of the interactions could be used in the research.
    Therefore, to protect the confidentiality of the individuals involved and respect
    their privacy, the researcher took measures to provide anonymity when referencing
    extracts from the research diaries in the writing.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we present our findings and interpretations of the data,
    encompassing a thorough analysis and derivation of insights from our outcomes.
    This chapter systematically provides an overview of the collected data, aligning
    it with the extant literature and the literature review. Subsequently, we interpret
    these findings within the framework of our theoretical approach. Employing this
    information, we re-examine our research questions, specifically exploring the
    potential impacts of ChatGPT on students, instructors, and higher education institutions.
    Through this process, we convert our raw data into valuable insights, enriching
    our understanding of the subject.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Findings and Interpretation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Input Quality and Output Effectiveness of ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The theme of ‘Input Quality and Output Effectiveness’ underscores the crucial
    role of input in determining the quality and effectiveness of ChatGPT's output.
    Large language models like ChatGPT can generate human-like text, but their outputs
    may not always align with human values due to their focus on predicting the next
    word rather than understanding broader context. This misalignment can result in
    challenges related to reliability and trust, such as a lack of helpfulness when
    the model fails to accurately comprehend and execute specific user instructions.
    In order to overcome this, users need to provide ChatGPT with a clear context,
    quality input and undergo multiple iterations to get the desired output. This
    was seen in the following ways.
  prefs: []
  type: TYPE_NORMAL
- en: Need for Giving a Clear Context
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: According to the researcher (the principal investigator in her research role),
    ‘You have to input your own ideas, personal experiences, and reflections first
    in order for ChatGPT to come up with research questions relevant to your situation’
    (RFD). The instructor (the principal investigator in her teaching role) noted
    that ‘ChatGPT helps write enduring understandings. These can be tricky to word.
    By getting it to define enduring understandings first and then telling it about
    your course, it can help with the wording’ (TFD). Similarly, when it comes to
    writing a course aim, the instructor highlighted the need to input clear information
    about students, department, and institution to receive accurate suggestions from
    ChatGPT (TFD). The instructor also emphasised the importance of providing a lot
    of specific information about the course and students to obtain useful learning
    outcomes (TFD). Additionally, ChatGPT's ability to generate suggestions for lesson
    plans depended on knowing the context of the class (TFD). Furthermore, inputting
    the text or video text from the pre-class activity allowed ChatGPT to provide
    suggestions for pre-class quizzes, provided that the teacher specified the type
    of quiz questions they wanted (TFD).
  prefs: []
  type: TYPE_NORMAL
- en: The literature review supports the finding that providing a clear context is
    crucial when interacting with ChatGPT. Mhlanga (2023) highlights that ChatGPT,
    being a machine, lacks the ability to comprehend contextual factors such as culture,
    background and experiences in the same way as human educators. This aligns with
    the fact that ChatGPT's outputs may not align with human values because its focus
    is on predicting the next word rather than understanding the broader context.
    Similarly, Alshater (2022) observes that language models like ChatGPT can generate
    unrelated or generic responses due to their lack of contextual understanding.
    In addition, Sullivan et al.’s (2023) study highlighted the limitations of ChatGPT's
    contextual understanding, as evidenced by the generation of unrelated or generic
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: Looking at the importance of giving a clear context through the lens of Christensen's
    Theory of Jobs to be Done highlights the importance of users understanding their
    specific needs and desired outcomes when hiring ChatGPT. Users must clearly articulate
    their requirements and objectives in order to effectively utilise ChatGPT's capabilities.
    This involves providing a clear and specific context for ChatGPT to generate accurate
    and relevant responses. Bourdieu's social theory sheds light on the power dynamics
    and social structures that influence the interaction with ChatGPT. It emphasises
    the need to consider linguistic norms, cultural capital and social dynamics that
    shape communication with the artificial intelligence (AI) system. Instructors
    must navigate these factors when engaging with ChatGPT to ensure meaningful and
    appropriate responses. Heidegger's Theory on Being highlights the distinction
    between ChatGPT's predictive nature and the broader contextual understanding of
    human educators. Users must recognise that ChatGPT's focus is on predicting the
    next word rather than comprehending the broader context.
  prefs: []
  type: TYPE_NORMAL
- en: Input Determines Output Quality
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: When students were asked to create a SWOT analysis regarding ChatGPT and the
    law, the quality of the response varied based on the quality of the input data.
    As observed by the instructor, ‘If they gave it good quality data, it created
    an effective chart; however, if they just asked it to do it for them, they did
    not end up with such a good result’ (TFD). This was also seen by a teacher in
    a workshop who commented, ‘When you give the right prompts, it gives you the lesson
    plan immediately. You don't really need to do anything’ (SYFD). ChatGPT also showcased
    its effectiveness in generating research ideas and suggesting methodologies and
    codes, contingent upon the user providing pertinent and precise information. According
    to the researcher, ‘ChatGPT was good for generating ideas for my research, but
    only if relevant and accurate information about the study was input first’ (RFD).
    The researcher also mentioned, ‘It was relatively easy for me to identify a research
    methodology based on previous experience and existing knowledge. However, asking
    ChatGPT for suggestions led to a broader array of suggestions that enriched my
    choice. But, this only works well if you have input your precise research problem
    and questions’ (RFD). Additionally, ChatGPT's capability to suggest codes from
    textual data was noted by the researcher, who stated, ‘ChatGPT can come up with
    suggested codes from textual data rather well, as long as the textual data is
    well-written in the first place’ (RFD). This sentiment was echoed by a teacher's
    remarks during a workshop, ‘The questions designed do not always meet the prompts
    or the specifications we provided if they are not mentioned precisely’ (SYFD).
    ChatGPT also proved useful for coming up with rubrics for evaluation, but again,
    this was dependent on the clarity of input given by the user. The instructor mentioned,
    ‘Once an assessment has been written, ChatGPT can easily come up with a suggested
    rubric for evaluation, but only if the assessment task is written precisely’ (TFD).
  prefs: []
  type: TYPE_NORMAL
- en: The need for quality input into ChatGPT was also supported by the literature.
    In their 2023 research, Firaina and Sulisworo emphasise the significance of selecting
    relevant commands to determine the usefulness of the obtained information. This
    aligns with our understanding that the quality of input plays a critical role
    in achieving desired outcomes when working with ChatGPT. Therefore, focusing on
    improving quality of input is crucial for obtaining optimal results and maximising
    the value derived from ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Requires Multiple Iterations to Get What You Want
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Users often found it necessary to refine their prompts or requests for satisfactory
    results. The researcher shared their experience, stating, ‘I made several revisions
    with ChatGPT before achieving the desired outcome’ (RFD). Similarly, a student
    reflected on their use of ChatGPT, noting the need for multiple revisions when
    creating the closing argument for the Unabomber case (SFD). These instances demonstrate
    the iterative nature of the process, where multiple iterations and modifications
    were crucial to achieving the desired outcomes. The importance of refining prompts
    and engaging in multiple interactions is further highlighted by the researcher''s
    comment: ‘If you are not happy with the wording, you can provide ChatGPT with
    prompts until it generates better-worded questions’ (RFD). Echoing this sentiment,
    a teacher in a workshop said, ‘It is important to review and regenerate responses
    until they align with your needs’ (SYFD). Additionally, the researcher mentioned
    how ChatGPT''s capabilities can be leveraged in an iterative manner for refining
    codes and themes: ‘It can… group the codes and suggest themes. This can be done
    iteratively until you are happy with the outcome’ (RFD). These examples emphasise
    the iterative nature of working with ChatGPT, where multiple iterations, prompts
    and revisions are often necessary to fine-tune the generated output and meet the
    user''s specific needs and expectations.'
  prefs: []
  type: TYPE_NORMAL
- en: This finding is supported by Sullivan et al.’s (2023) study, which emphasised
    the value of the iterative refinement process in working with ChatGPT, underscoring
    the importance of developing information literacy skills to successfully engage
    with ChatGPT and other AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: The iterative nature of engagement and the importance of context and interpretation
    align with Heidegger's concept of ‘being-in-the-world’. Achieving the desired
    outcome from ChatGPT may require multiple iterations and an ongoing process of
    refining our understanding of both the technology and our own existence. The existential
    engagement with ChatGPT involves adapting and refining our understanding to foster
    desired outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: How ChatGPT May Affect the Roles of Stakeholders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: From our analysis, we believe the role of the student will change in the following
    ways.
  prefs: []
  type: TYPE_NORMAL
- en: The student's role will involve providing clear and specific input to ChatGPT
    to ensure accurate and relevant responses. They will also need to understand the
    limitations of ChatGPT's output and critically evaluate its responses to ensure
    alignment with their own goals. Moreover, students will need to develop information
    literacy skills and engage in iterative refinement, continuously refining their
    input to optimise the effectiveness of ChatGPT's responses.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding the role of the instructor, instructors can leverage ChatGPT to assist
    with tasks such as writing enduring understandings, course aims, learning outcomes,
    lesson plans and pre-class quizzes. However, the effectiveness of ChatGPT in these
    tasks will depend on the provision of specific information. Instructors will need
    to input clear details about the course, students and institution to receive accurate
    suggestions from ChatGPT. They will also need to consider the context of the class
    and provide relevant information for ChatGPT to generate valuable suggestions.
    Additionally, instructors will play a crucial role in guiding and refining the
    use of ChatGPT by students. They will need to ensure that students understand
    the importance of input quality and help them navigate the iterative nature of
    working with ChatGPT. Instructors will also contribute their expertise in evaluating
    and contextualising ChatGPT's output, bridging the gap between AI-generated responses
    and the creativity, originality and hands-on opportunities that human teachers
    bring to the educational experience.
  prefs: []
  type: TYPE_NORMAL
- en: Institutions of higher education will need to provide the necessary resources
    and support for instructors and students to effectively use ChatGPT. This may
    include offering training programmes on how to leverage ChatGPT in educational
    tasks and promoting information literacy skills development. Moreover, institutions
    must foster a culture of continuous learning and adaptation, encouraging instructors
    and students to embrace the iterative refinement process when working with ChatGPT.
    By recognising the multifaceted implications of AI in education, institutions
    can actively shape the integration of ChatGPT and other AI tools to align with
    their educational goals and values.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, our analysis reveals key insights on ChatGPT's impact, emphasising
    the significance of clear input, iterative refinement, contextual awareness and
    user engagement. Ensuring high-quality input by training both students and instructors
    to effectively use ChatGPT in academic endeavours will maximise its benefits in
    education.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations and Challenges of ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT undoubtedly brings numerous benefits and opportunities to users in various
    domains. However, it is essential to recognise that ChatGPT is not without its
    limitations and challenges. In this theme, we investigate the potential shortcomings
    and difficulties that users may encounter when interacting with ChatGPT, shedding
    light on the critical areas where considerations are necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Lack of Standard Referencing Guide for ChatGPT
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Users in academic contexts may encounter a significant challenge due to the
    lack of a standard referencing guide for ChatGPT. This issue encompasses two crucial
    areas: the absence of references provided by ChatGPT for the sources it uses and
    the lack of established guidelines for users to reference ChatGPT-generated information.
    As we have discussed, the reliance of generative AI on data from undisclosed sources
    raises concerns regarding copyright infringement and fair compensation for creators.
    Altman''s acknowledgement of these concerns without providing definitive answers
    suggests that ChatGPT may not adopt a referencing model for its sources. Consequently,
    users face the difficulty of determining the origins of ChatGPT''s information
    and referencing it appropriately. Data examples highlight these challenges: ‘When
    we asked it, ChatGPT gave some suggestions for how we should reference it, but
    there is currently no standard referencing guide for using ChatGPT’ (TFD); ‘If
    the students are getting information directly from ChatGPT, they are unable to
    reference the source as we don''t know where the data has come from’ (TFD); ‘ChatGPT
    hasn''t done a very good job of what evidence to use and how’ (SFD); ‘The system
    told me that it cannot do the references itself and that I should look for expert
    opinions and academic papers on this subject. So therefore I checked what ChatGPT
    said through academic papers on the internet… I think it would be much better
    if the system itself indicated where it gets the information it uses’ (SFD). Furthermore,
    without clear guidelines and standards in place, users face challenges in citing
    and referencing information derived from ChatGPT. The absence of a standard referencing
    guide raises concerns about the transparency and traceability of sources used
    in academic and research outputs incorporating ChatGPT-generated content.'
  prefs: []
  type: TYPE_NORMAL
- en: To address this challenge, the instructor in this case study collaborated with
    Dr Thomas Menella, a senior research fellow for the Academy of Active Learning
    Arts and Sciences, to devise a referencing system for students for the spring
    2023 semester. The students were instructed to quote all content from ChatGPT
    and provide in-text citations with chronological numbering, like ‘Lorem ipsum
    dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt
    ut labore et dolore magna aliqua’ (ChatGPT, 1). Failure to comply would be considered
    plagiarism. Additionally, they were required to create a separate ‘ChatGPT Citations’
    page after the references section, including the date of ChatGPT content generation,
    corresponding prompts used and at least one source for fact-checking validation.
    The students were warned that ChatGPT-generated content couldn't be deemed accurate
    until verified, and they were accountable for thoroughly fact-checking the content
    they included in their assignments, regardless of authorship. So what was the
    feedback on this system? The instructor said, ‘I asked my students to reference
    when they have used ChatGPT following the system Tom and I developed. However,
    it is not ideal, a better referencing system is required’ (TFD). Additional comments
    were, ‘I think the referencing system is not described well in the document. It
    should be more clear how I should do my referencing. I took most of my time since
    I didn't understand for a long time’ (SFD); ‘More guidance and examples on how
    to use it properly and consistently would help’ (SFD); ‘The document helped me,
    but it was very detailed and this caused confusion in my opinion, the document
    should be more general and details that cause confusion should be removed’ (SFD);
    ‘It was a bit difficult and complicated to reference ChatGPT. It can be made simpler’
    (SFD). In summary, the students requested clearer instructions, more guidance
    and a simpler approach to referencing to avoid confusion.
  prefs: []
  type: TYPE_NORMAL
- en: These challenges were also seen in the literature. Neumann et al. (2023) highlight
    that when integrating ChatGPT into higher education, particularly in scientific
    writing tasks, sections that involve existing knowledge can pose difficulties.
    This is because ChatGPT may generate text that references non-existent literature
    or fails to provide accurate and reliable references. Rudolph et al. (2023) also
    raise this issue, pointing out that ChatGPT has a limitation in providing sources
    and quotations, which is essential for academic assignments. However, they note
    that there are promising developments to address this limitation, such as the
    prototype WebGPT, which is being developed with web browsing capabilities, allowing
    it to access recent information, verified sources and quotations. Additionally,
    they point out that AI research assistants like Elicit offer assistance in finding
    academic articles and providing summaries from a vast scholarly paper repository.
    They believe these advancements will enhance the quality and credibility of academic
    work by incorporating up-to-date information and reliable sources (Rudolph et
    al., 2023).
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, users in academic contexts are trying to ‘hire’
    ChatGPT to fulfil the job of generating accurate and reliable information for
    their academic work. However, due to the lack of a standard referencing guide,
    ChatGPT may not be effectively fulfilling this job. Users encounter difficulties
    in determining the origins of ChatGPT's information and referencing it appropriately,
    hindering their ability to rely on ChatGPT as a trustworthy source. This unfulfilled
    job highlights the need for a solution that provides clear guidelines and standards
    for referencing ChatGPT-generated information, enabling users to confidently incorporate
    its content into their academic work. From a Bourdieusian perspective, the absence
    of a standard referencing guide for ChatGPT reflects the power dynamics and struggles
    over legitimacy in the academic field. The lack of clear guidelines puts users
    at a disadvantage, as they are unable to conform to the established norms of referencing
    and may face criticism for not adhering to the traditional referencing practices.
    This situation reinforces the dominant position of established sources and conventional
    referencing systems, which may hinder the recognition and acceptance of ChatGPT-generated
    information within academic discourse. ChatGPT relies on surveillance data from
    undisclosed sources, which raises concerns about copyright infringement and fair
    compensation for creators. The absence of clear guidelines for referencing ChatGPT-generated
    content further exacerbates the commodification of information and the devaluation
    of labour in the production of academic knowledge. Users are left grappling with
    the challenge of appropriately citing and referencing information derived from
    ChatGPT while the sources remain undisclosed and uncompensated. From Heidegger's
    perspective, the lack of a standard referencing guide can be seen as a consequence
    of the instrumentalisation of technology in the academic context. The focus on
    efficiency and productivity in using ChatGPT as a tool for generating content
    overlooks the essential nature of referencing as a means of acknowledging the
    origins and authenticity of knowledge. The absence of clear guidelines reflects
    a reduction of referencing to a technical task, neglecting its ontological significance
    in preserving the integrity and transparency of academic work.
  prefs: []
  type: TYPE_NORMAL
- en: Gives Incorrect Information/Lack of Response Relevance
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The extant literature highlighted that ChatGPT may generate inaccurate information,
    which is due to limitations in its capabilities and training techniques. Examples
    from the data illustrate this. ‘Sometimes ChatGPT cites sources that are not there’
    (SFD); ‘What I have found is that it is really bad with giving credible sources.
    They are often non-existent’ (SFD); ‘When asked about transgender pronouns in
    Turkey, ChatGPT said that there was an issue with transgender pronouns in Turkey.
    However, this information was completely wrong. There is no gender in pronouns
    in Turkish’ (TFD); ‘At a conference, a professor from a university was giving
    a presentation about a new initiative that was about to be released in 2023\.
    One of the participants on my table used ChatGPT to look up information about
    the university and the initiative and was incorrectly given information that the
    initiative started in 2019’ (SYFD). Other examples are as follows: ‘It made suggestions
    for future improvements and research directions, but I don''t think it''s relevant
    to my project because I don''t think my project should mention future developments’
    (SFD); as commented on by a teacher in a workshop, ‘What ChatGPT prepares might
    not be what you want or may not be relevant to your students'' needs and interests’
    (SYFD); ‘ChatGPT generated jokes, but the jokes weren''t particularly funny or
    didn''t seem to make much sense’ (SFD); ‘Sometimes it gives answers that are not
    quite related to the topic you are asking about’ (SFD).'
  prefs: []
  type: TYPE_NORMAL
- en: The literature also supports these concerns. Instructors, as highlighted in
    Rudolph et al.’s 2023 paper, raised significant concerns about ChatGPT's limitations
    in understanding and evaluating the relevance or accuracy of the information it
    produces, saying that while ChatGPT can generate text that appears passable, it
    lacks a deep comprehension of the subject matter. In addition, according to Tlili
    et al.'s (2023) study, participants generally found the dialogue quality and accuracy
    of information provided by ChatGPT to be satisfactory. However, they also acknowledged
    that ChatGPT is prone to occasional errors and limited information, noting that
    while responses from ChatGPT were generally considered reasonable and reliable,
    there were instances where misleading information was present alongside the answers.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, users of ChatGPT are hiring it to provide accurate
    and reliable information. However, the examples from the data demonstrate that
    ChatGPT often fails to fulfil this job, as it generates inaccurate information
    or lacks relevance in its response. This misalignment between users' expectations
    and the actual performance of ChatGPT indicates a gap in fulfilling the job it
    is hired for. Bourdieu's sociological perspective emphasises the role of social
    structures and cultural capital in shaping individuals' actions and preferences.
    In the case of ChatGPT, instructors, as highlighted by Rudolph et al. (2023),
    express concerns about its limitations in understanding and evaluating information.
    These concerns are influenced by the instructors' position as experts in the educational
    field, where accuracy and relevance of information are highly valued cultural
    capital. The instructors' scepticism towards ChatGPT's ability to fulfil this
    role reflects their reliance on established knowledge and expertise, and it is
    this concern that is reflected in their evaluation of the technology. Through
    a Marxist lens, the limitations and inaccuracies in ChatGPT's performance may
    be attributed to the inherent contradictions and dynamics of capitalist production,
    where the pursuit of efficiency and profit often takes precedence over ensuring
    comprehensive and accurate information. The potential biases and shortcomings
    of ChatGPT may be seen as by-products of the capitalist system's influence on
    technological development. Through Heidegger's lens, ChatGPT's ability to generate
    text that appears passable but lacks deep comprehension of the subject matter
    raises existential concerns. Heidegger argues that technology can lead to a mode
    of being characterised by instrumental rationality, where human activities become
    reduced to mere means to an end. In the context of education, ChatGPT's limitations
    in grasping and assessing information raise questions about its impact on the
    genuine understanding and critical thinking skills of students. It highlights
    the need to reflect on the role of technology in shaping educational practices
    and the nature of knowledge acquisition.
  prefs: []
  type: TYPE_NORMAL
- en: Occurrences of Refusal or Reprimand by ChatGPT
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Instances of refusal or reprimand by ChatGPT occur when the system declines
    to provide a response or admonishes the user for specific inputs or queries. This
    behaviour is likely a result of OpenAI's implementation of the Moderation API,
    the AI-based system aimed at detecting language violations and ensuring compliance
    with their content policy, which targets misogyny, racist remarks and false news.
    However, it is important to acknowledge that this system is not flawless. As mentioned
    in the extant literature, there have been instances where users have managed to
    bypass the moderation system, leading to the generation of inappropriate content
    by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Notably, our data indicate that ChatGPT may have been overly reliant on the
    moderation system, resulting in instances of refusal or even what could be interpreted
    as reprimand. For example, one student reported, ‘ChatGPT does not use slang words
    and does not respond when asked questions using slang words’ (SFD). The instructor
    said, ‘We were inputting terms that were used by the Unabomber and that ultimately
    led to him being identified, so they were an important part of the case. However,
    ChatGPT refused to discuss some of the slang items as they were considered derogatory
    and it even reprimanded us for asking about these terms’ (TFD). Similarly, when
    asking about the suicide of Kurt Cobain and certain words in one of the notes,
    the instructor noted, ‘ChatGPT refused to discuss the topic, deeming it inappropriate,
    and it also refused to discuss some of the words, such as “bitch,” considering
    them derogatory language’ (TFD). Furthermore, students in the study discovered
    that ChatGPT does not use swear words (SFD). Interestingly, occurrences of refusal
    or reprimand did not come up in the literature.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, users of ChatGPT expect it to provide accurate and
    reliable information. However, the instances of refusal or reprimand indicate
    a misalignment between users' expectations and the actual performance of ChatGPT.
    Users may have specific tasks or queries in mind that they want ChatGPT to fulfil,
    but the system's limitations and reliance on the moderation system can lead to
    frustrating experiences for users who are unable to get the desired responses.
    These instances of refusal or reprimand by ChatGPT may also be viewed through
    the lens of Bourdieu's cultural capital, where the system is programmed to avoid
    language violations and promote compliance with the content policy. The instructors'
    experiences, where they were reprimanded for discussing certain topics or using
    specific language, reflect the clash between their expertise and established knowledge
    and the system's limitations in understanding the context and nuances of their
    queries. The pursuit of efficiency and profit may prioritise the moderation system's
    effectiveness in addressing language violations, but it may fall short in fully
    understanding and addressing the complexity of user queries and intentions. Taking
    a Heideggerian stance, ChatGPT's reliance on the moderation system and instances
    of refusal or reprimand raises existential concerns. Users may question the role
    of technology in shaping their interactions and limiting their freedom to engage
    in certain discussions or use specific language. It raises broader questions about
    the impact of AI systems like ChatGPT on genuine understanding, critical thinking
    skills and the nature of knowledge acquisition in educational settings.
  prefs: []
  type: TYPE_NORMAL
- en: Gender Bias in Pronoun Usage
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'ChatGPT tended to default to male pronouns unless specifically instructed otherwise.
    As seen in the extant literature, gender bias in AI systems, including ChatGPT,
    is a well-documented issue. This may be because the training data are predominantly
    created by men, which then introduces biases into the system that perpetuate stereotypes
    and reinforce power imbalances, resulting in allocative and representation harm.
    Examples of this were seen in our data: ‘When using ChatGPT to craft a letter
    including reference to the president and vice provost at George Washington university,
    ChatGPT defaulted to using male pronouns, even though one of the people I was
    referring to was female’ (SYFD); ‘When I asked ChatGPT to summarise a text about
    the researcher - in reference to myself, a female - it automatically defaulted
    to he/him’ (RFD).'
  prefs: []
  type: TYPE_NORMAL
- en: This was also seen in the literature. Mhlanga (2023) drew attention to potential
    bias in ChatGPT arising from its training data and cautioned against AI algorithms
    exacerbating biases and discrimination, leading to the further marginalisation
    of under-represented groups. In line with promoting fairness and impartiality,
    Alshater (2022) emphasised the need to prioritise equitable treatment and avoid
    any form of discrimination when developing and utilising ChatGPT and similar technologies.
    He underscored the significance of acknowledging and addressing potential biases
    or discriminatory consequences that may arise from these technologies. Additionally,
    Alshater drew attention to the training process of ChatGPT and similar technologies,
    specifically noting the potential biases or inaccuracies that can arise from extensive
    datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, the job that ChatGPT is being hired to do is the
    accurate and unbiased usage of pronouns in AI systems like ChatGPT. Customers
    expect these systems to understand and respect gender identities and use appropriate
    pronouns. The gender bias observed in ChatGPT's defaulting to male pronouns reflects
    a failure to adequately fulfil this job, as it overlooks the diverse gender identities
    and perpetuates stereotypes. Through the lens of Bourdieu, the training data of
    AI systems like ChatGPT, which is predominantly created by men, reflect the power
    dynamics and social structures that exist in society. This leads to the reproduction
    of biases and power imbalances, reinforcing the dominant social norms and marginalising
    under-represented groups. The gender bias in pronoun usage can be seen as a manifestation
    of the symbolic power wielded by certain groups in shaping AI systems and perpetuating
    unequal social relations. From a Marxist perspective, the issue of gender bias
    in pronoun usage can be understood as a reflection of the broader class struggle
    and exploitation within capitalist societies. The dominance of young white men
    in creating the training data for AI systems like ChatGPT is a result of the power
    dynamics and economic structures that prioritise certain groups over others. The
    gender bias in pronoun usage reinforces the existing power imbalances by marginalising
    and excluding under-represented groups, thereby perpetuating their subordination
    within the capitalist system. In the context of gender bias in pronoun usage,
    Heidegger's notion of technology as a mode of revealing can be applied. ChatGPT's
    defaulting to male pronouns reveals the underlying biases and assumptions embedded
    in its programming and training data. It highlights how technology can reinforce
    and perpetuate societal norms and power structures, limiting the possibilities
    for authentic and inclusive interactions. By recognising and addressing this bias,
    individuals and society can strive for a more open and inclusive understanding
    of gender and language.
  prefs: []
  type: TYPE_NORMAL
- en: Need to Fact-Check
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The importance of fact-checking is highlighted by the following examples from
    the data: ‘To fact-check the information from ChatGPT, I did my own research and
    double-checked it. For instance, when ChatGPT mentioned the title of the Unabomber''s
    manifesto as “Industrial Society and Its Future,” I made sure to check it myself
    before using it in my conclusion’ (SFD); ‘I think ChatGPT is useful for research,
    but you need to check the information against other sources to make sure it is
    giving the correct information’ (SFD); ‘I did the homework with ChatGPT but I
    checked the information it gave me with another source’ (SFD); ‘We can''t rely
    on the accuracy of all the information it gives us. We need to check it by researching
    it ourselves’ (SFD); ‘ChatGPT was very poor at generating real and relevant literature…
    Therefore, always fact-check what it is saying’ (RFD); ‘I found it a useful starting
    point to get ChatGPT to generate ideas about gaps in the literature, but felt
    it was more accurate to rely on my own identification of gaps from reading all
    the papers’ (RFD). In addition, the instructor made the following observation:
    ‘Students used ChatGPT as a search engine to ask about the Unabomber case. However,
    we didn''t know where any of the information came from. We thought there were
    two problems with this. The first is that if you use this information, you are
    not giving any credit to the original author. The second is that ChatGPT is a
    secondary source and should not be treated as a primary source, therefore we agreed
    that everything taken from ChatGPT should be fact-checked against a reliable source’
    (TFD).'
  prefs: []
  type: TYPE_NORMAL
- en: This was also seen in the literature. Mhlanga (2023) emphasised the importance
    of critically evaluating the information generated by ChatGPT and discerning between
    reliable and unreliable sources. In line with this, Firaina and Sulisworo (2023)
    recognised the benefits of using ChatGPT to enhance productivity and efficiency
    in learning, but they also emphasised the need to maintain a critical approach
    and verify the information obtained. They stressed the importance of fact-checking
    the information generated by ChatGPT to ensure its accuracy and reliability. Similarly,
    Alshater's (2022) research underscored the importance of fact-checking and verifying
    the information produced by these technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, we can observe that users hire ChatGPT for specific
    purposes such as generating information, assisting with research tasks and improving
    productivity and efficiency in learning. However, as we saw, due to limitations
    within the system, users also recognise the need for fact-checking as a crucial
    task when utilising ChatGPT. Fact-checking allows users to ensure the accuracy
    and reliability of the generated information, fulfilling their goal of obtaining
    trustworthy and verified knowledge. This aligns with the principle of Christensen's
    theory, where users seek solutions that help them accomplish their desired outcomes
    effectively. Through the lens of Bourdieu, we can view the emphasis on fact-checking
    as a manifestation of individuals' cultural capital and critical thinking skills.
    Users demonstrate their ability to engage in informed decision-making by recognising
    the importance of critically evaluating information and distinguishing between
    reliable and unreliable sources. In terms of Marx's theory, the focus on fact-checking
    reflects the power dynamics between humans and AI systems. Users exert their power
    by independently verifying information, reducing the potential influence of AI
    systems on their knowledge and decision-making processes. Fact-checking can be
    seen as a way for individuals to assert their agency in the face of technological
    advancements. Considering Heidegger's philosophy, fact-checking represents the
    individual's active engagement with the information provided by ChatGPT and their
    critical interpretation of its accuracy. Users understand that AI-generated information
    is fallible and recognise the importance of their own engagement and interpretation
    to arrive at a reliable understanding of the world.
  prefs: []
  type: TYPE_NORMAL
- en: How ChatGPT May Affect the Roles of Stakeholders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The challenges posed by ChatGPT will require students to navigate the lack of
    a standard referencing guide, which can make it difficult for them to appropriately
    reference the information generated by the system. This challenge raises concerns
    about the transparency and traceability of sources used in academic and research
    outputs that incorporate ChatGPT-generated content. Students will need to develop
    strategies to verify the origins and credibility of the information provided by
    ChatGPT and integrate it effectively into their academic work. Instructors will
    need to address the limitations and challenges associated with ChatGPT. These
    include its potential for providing incorrect or irrelevant information, which
    may affect instructors' reliance on the system for academic purposes.
  prefs: []
  type: TYPE_NORMAL
- en: Instructors will have to be cautious and verify the accuracy of the information
    generated by ChatGPT before incorporating it into their lessons or assignments.
    They may also need to guide and assist students in critically evaluating and fact-checking
    ChatGPT-generated content to ensure the reliability and validity of the information
    used in their coursework. This reliance on fact-checking will place a greater
    emphasis on critical evaluation skills and information literacy among students.
    Instructors and institutions may need to incorporate fact-checking strategies
    and promote a culture of critical inquiry to ensure that students are equipped
    to evaluate and validate the information they obtain from ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, our analysis highlights key insights regarding ChatGPT's limitations
    and challenges. It lacks a standardised referencing guide, demanding fact-checking
    for accuracy. The moderation API restricts user engagement, and gender bias in
    defaulting to male pronouns needs addressing. To overcome these issues, comprehensive
    AI literacy training and ethical policies are essential for responsible AI integration
    in academia.
  prefs: []
  type: TYPE_NORMAL
- en: Human-like Interactions with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This theme explores the nature of communication and the perceived human-like
    interactions that users experience when interacting with ChatGPT. By exploring
    the theme of human-like interactions in users' engagement with ChatGPT, encompassing
    interactivity, perception and trust, we can gain valuable insights into the social
    and psychological dimensions of utilising this AI system.
  prefs: []
  type: TYPE_NORMAL
- en: Interactivity of Communication/Perceived Human-like Interactions with ChatGPT
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The interactivity of communication, highlighting the dynamic and responsive
    nature of the interaction between users and ChatGPT, becomes evident as users
    perceive or experience ChatGPT exhibiting human-like qualities despite its artificial
    nature. This phenomenon was observed in the data, with students describing their
    collaboration and engagement with ChatGPT as a mutual interaction. One student
    expressed the impact of this interaction on their learning and project development,
    stating, ‘ChatGPT definitely helped me learn and develop in my project. The most
    important effect of this was that it analysed the incident for me and gave me
    an example to give me an idea about the incident. For example, we analysed the
    article Industrial Society and Its Future together’ (SFD). The sense of connecting
    with a human was also highlighted by students who emphasised ChatGPT's ability
    to provide advice and make research more conversational. They described feeling
    a connection with ChatGPT, stating, ‘ChatGPT can give advice to people who apply
    to them like a lawyer’ (SFD) and ‘I can chat with it as if I were talking to a
    human being’ (SFD). These experiences were not limited to academic contexts but
    extended to personal interactions as well. The researcher shared their experience
    of setting up custom personas for different theorists and engaging in discussions
    through those personas, highlighting the interactive nature of the communication
    process (RFD). Furthermore, the principal investigator's daughter also demonstrated
    the human-like perception of ChatGPT, creating a custom persona and engaging in
    conversations about her life, seeking recommendations and treating the bot as
    a companion (RFD).
  prefs: []
  type: TYPE_NORMAL
- en: In Tlili et al.’s (2023) study, many participants were impressed by the smoothness
    of their conversations with ChatGPT, describing the interactions as exciting and
    enjoyable. However, it was noted that ChatGPT, being limited to a textual interface,
    lacked the ability to detect physical cues or emotions from users. This led participants
    to express the need for improving the human-like qualities of ChatGPT, particularly
    in terms of enhancing its social role.
  prefs: []
  type: TYPE_NORMAL
- en: Through the lens of Christensen, the findings show that users perceive ChatGPT
    as fulfilling the job of providing interactive and human-like communication. Users
    express the experience of collaborating and engaging with ChatGPT as a mutual
    interaction, indicating that they see it as a tool that enables productive and
    engaging conversations. They describe how ChatGPT helps them in their learning
    and project development by analysing incidents and providing examples, thus assisting
    them in their educational tasks. Users also highlight the role of ChatGPT in providing
    advice and making research more conversational, suggesting that it fulfils the
    job of facilitating advisory and conversational interactions. From a Bourdieusian
    perspective, the interactions with ChatGPT can be understood in terms of the social
    and cultural capital embedded within them. Users attribute value and significance
    to their interactions with ChatGPT, perceiving it as a resource that enhances
    their learning and project development. They describe a sense of connection and
    treat ChatGPT as a companion, suggesting that it holds symbolic value and contributes
    to their social experiences. From a Marxian standpoint, the findings imply a potential
    shift in labour dynamics. ChatGPT is described as providing advice and engaging
    in conversational interactions, which traditionally might have required human
    professionals such as lawyers. This raises questions about the displacement of
    certain job roles and the impact of technology on labour markets. Additionally,
    the smoothness and enjoyable nature of interactions with ChatGPT might contribute
    to users' satisfaction and well-being, reflecting the potential for technology
    to shape individuals' experiences in a capitalist society. Through a Heideggerian
    lens, the findings indicate that users perceive ChatGPT as a tool that bridges
    the gap between artificial and human intelligence, providing a sense of connection
    and mutual understanding. Users describe engaging in discussions and even developing
    custom personas to interact with ChatGPT, highlighting the existential significance
    of these interactions as a means of relating to the world and others. It suggests
    that ChatGPT, despite its artificial nature, becomes part of users' lived experiences
    and influences their sense of self and social interactions.
  prefs: []
  type: TYPE_NORMAL
- en: People Perceive ChatGPT as Providing Opinions Rather Than Predictions/Unquestioning
    Trust in Information
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: People's perception of ChatGPT often leads them to view it as a source of personal
    opinions rather than predictions. Furthermore, users' unquestioning trust in the
    information provided by ChatGPT, even when it is incorrect, underscores the importance
    of critically evaluating and approaching AI-generated content with scepticism.
    This was seen in the data in the following ways. The instructor stated, ‘In a
    lesson on the use of transgender pronouns, ChatGPT put forward ideas about transgender
    rights, even though it was not prompted to. This was perceived by the students
    as ChatGPT giving an opinion. This led to a discussion about how ChatGPT is not
    human and is based on text prediction from its database and cannot, therefore,
    give an opinion, even though it sounds like it is giving an opinion’ (TFD). Furthermore,
    the researcher recounted, ‘At a conference, a professor from a university was
    giving a presentation about a new initiative that was about to be released in
    2023\. One of the participants on my table used ChatGPT to look up information
    about the university and the initiative and was incorrectly given information
    that the initiative started in 2019\. His immediate reaction was that there was
    an error in the presentation, not with the information from ChatGPT. He was instantly
    willing to believe ChatGPT over the presenter’ (SYFD). These examples highlight
    instances where users' perceptions and unwavering trust in ChatGPT's information
    influenced their interactions and decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: This was also seen in the literature review. According to Mhlanga (2023), teachers
    must play a crucial role in helping students develop a critical and informed perspective
    on the application of AI in the classroom by encouraging students to question
    and analyse the output of ChatGPT and other AI systems, promoting a deeper understanding
    of how these technologies work and their potential shortcomings. As accuracy is
    essential in education, Mhlanga underscores the importance of critical thinking
    for both teachers and students when using ChatGPT, urging them to verify information
    from reliable sources to ensure its accuracy. This highlights the responsibility
    of educators to guide students in discerning reliable information and avoiding
    blind trust in the output of AI systems. Sullivan et al. (2023) emphasised the
    need to establish clear conditions, acknowledge potential inaccuracies and biases
    in ChatGPT's outputs and promote critical thinking and information literacy skills
    among students. The authors cautioned against blindly trusting the information
    provided by AI systems like ChatGPT, emphasising the importance of critically
    evaluating and verifying it. By developing these skills, they believe students
    can become discerning consumers of information and make informed decisions when
    engaging with AI tools. According to Rudolph et al. (2023), ChatGPT, being an
    AI language model, lacks true comprehension and knowledge of the world. It simply
    generates text based on patterns and examples from its training data, without
    genuine understanding of the content or context. As a result, there is a potential
    risk that ChatGPT may produce responses that sound intelligent and plausible but
    are not factually accurate or contextually appropriate. Rudolph et al. (2023)
    also point out that while ChatGPT may be perceived as giving opinions, it is only
    providing text predictions based on statistical patterns in the training data,
    which can include both accurate and inaccurate information. Thus, they highlight
    the importance of educators and institutions being aware of this limitation and
    ensuring that students are equipped with the necessary critical thinking and information
    literacy skills to effectively engage with and evaluate the outputs of ChatGPT.
    They highlight that it is crucial to emphasise the importance of verifying information
    from reliable sources and not solely relying on ChatGPT for accurate and trustworthy
    information to avoid the propagation of inaccuracies or misleading information
    in educational settings.
  prefs: []
  type: TYPE_NORMAL
- en: Viewed through Christensen's perspective, users' perception of ChatGPT as a
    source of personal opinions rather than predictions suggests a desire for not
    just accurate information but also a sense of personal validation or perspective.
    This implies that users might seek affirmation or information that aligns with
    their existing beliefs or opinions. However, it is essential for users to recognise
    that ChatGPT's main function is to provide text predictions based on statistical
    patterns, not to offer personal opinions. Bourdieu's theory of social reproduction
    and cultural capital provides a deeper understanding of why some users unquestioningly
    trust the information from ChatGPT, even when it's incorrect. According to Bourdieu,
    users' habitus, shaped by their social and cultural backgrounds, significantly
    influences this behaviour. Those with lower cultural capital or limited exposure
    to critical thinking may be more susceptible to blindly trusting ChatGPT. In contrast,
    individuals with higher cultural capital approach it with scepticism, critically
    evaluating its outputs. This perspective emphasises the importance of fostering
    information literacy and critical thinking, especially among users with limited
    cultural capital, to prevent the spread of inaccuracies and misleading information
    through blind trust in ChatGPT. Bourdieu's ‘voice of authority’ theory further
    supports this alignment, where users with limited exposure to critical thinking
    may accept ChatGPT's information as authoritative, even when incorrect. On the
    other hand, users with higher cultural capital can easily critically assess ChatGPT's
    output. Symbolic power associated with reputable institutions reinforces the perception
    of ChatGPT as an authoritative source. Hence, promoting digital literacy and critical
    thinking is crucial for more informed engagement with AI technologies like ChatGPT.
    Marx's theory of alienation becomes relevant in the context of users' unwavering
    trust in ChatGPT's information, shaping their interactions and decision-making.
    This blind trust can be interpreted as a form of alienation, where users rely
    on an external entity (ChatGPT) for information and decision-making, foregoing
    their own critical thinking and access to diverse sources of knowledge. Such dependency
    on ChatGPT reinforces power dynamics between users and the technology, as users
    surrender their agency to the AI system. Through a Heideggerian lens, as ChatGPT
    operates based on patterns and examples in its training data without a deep understanding
    of the content or context, this raises existential questions about the nature
    of AI and its role in providing meaningful and reliable information. Users' blind
    trust in ChatGPT's output can be seen as a result of the technological framing,
    where users perceive AI as all-knowing or infallible, despite its inherent limitations.
  prefs: []
  type: TYPE_NORMAL
- en: How ChatGPT May Affect the Roles of Stakeholders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: With its ability to generate human-like conversations and coherent responses,
    students perceive ChatGPT as a tool for mutual interaction, collaborating on projects,
    analysing incidents and receiving advice. This blurs the boundary between human
    and AI interaction and has the potential to make their learning more conversational
    and connected. However, this comes with caveats. It is essential for students
    to develop critical thinking skills to discern between opinions and predictions.
    They should also learn to verify information from reliable sources to avoid blind
    trust in ChatGPT's output and ensure the accuracy and reliability of the information
    they receive.
  prefs: []
  type: TYPE_NORMAL
- en: Instructors will need to play a crucial role in guiding students' interactions
    with ChatGPT. They need to educate students about the limitations of AI systems
    like ChatGPT and encourage them to question and analyse the output critically.
    By promoting critical thinking and information literacy skills, instructors can
    help students develop a discerning approach to AI-generated content. It is also
    important for instructors to stay updated with advancements in AI and adapt their
    teaching methodologies to incorporate ChatGPT effectively into the learning process.
    They should provide guidance on responsible and ethical use of AI, acknowledging
    potential inaccuracies and biases in ChatGPT's outputs. By establishing clear
    conditions for its use and integrating information literacy into the curriculum,
    instructors can ensure that students are equipped with the necessary skills to
    effectively engage with ChatGPT and make informed decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Institutions of higher education have a responsibility to integrate AI literacy
    and critical thinking skills into the curriculum and provide resources and support
    for students and instructors towards this. Institutions should also establish
    clear guidelines for the ethical use of AI in education, considering the limitations
    of ChatGPT and other AI systems. By doing so, institutions can ensure that students
    are aware of the potential risks of unquestioning trust in AI-generated content
    and promote responsible and ethical engagement with AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, users perceive ChatGPT as more than just an AI language model, fostering
    a sense of connection. However, this perception can lead to unquestioning trust
    in its information, emphasising the need for critical thinking and information
    literacy training. Thus, educators must address sociocultural factors and power
    dynamics influencing user trust. Practical actions, including AI literacy training,
    promoting critical thinking and implementing ethical guidelines, are essential
    for responsible engagement with AI technologies like ChatGPT in education.
  prefs: []
  type: TYPE_NORMAL
- en: Personal Aide/Tutor Role of ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the theme, ‘A Personal Aide/Tutor’, the focus is on exploring the diverse
    advantages and capabilities of ChatGPT as a personal tutor or aide. It encompasses
    codes such as enriching the user's ideas, speeding up the process, reducing cognitive
    load, usefulness in other areas of life, ability to translate, reviewing work,
    giving suggestions for improvement, text register modification and imparting specific
    knowledge, skills and concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Enriches the User's Ideas
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The capacity of ChatGPT to enrich users' ideas is evident in the data. The researcher
    stated, ‘It was relatively easy for me to identify a research methodology based
    on my previous experience and existing knowledge. However, asking ChatGPT for
    suggestions led to a broader array of suggestions that enriched my choice. This
    was also the same when it came to data collection ideas and research methods’
    (RFD). The researcher further commented, ‘ChatGPT was excellent at identifying
    limitations, implications, and conclusions as well as ideas for further research
    from my text. It even made suggestions that I had not thought of’ (RFD). Similarly,
    the instructor stated, ‘ChatGPT very rapidly suggested cases for the forensic
    linguistics course. Some of these were cases I had not heard of before’ (TFD).
    She also noted that ChatGPT provided numerous ideas for activities to add variety
    to lessons, enhancing the teaching experience (TFD). Additionally, students used
    ChatGPT to generate ideas for their final projects (SFD).
  prefs: []
  type: TYPE_NORMAL
- en: These findings align with the literature. According to Sullivan et al. (2023),
    ChatGPT can help users overcome writer's block and provide prompts for writing,
    offering new perspectives and alternative approaches to stimulate creativity.
    Neumann et al. (2023) also discussed ChatGPT's potential to provide fresh ideas
    for activities and assignments, highlighting its innovative potential in primary
    tasks. Rudolph et al. (2023) mentioned ChatGPT's ability to generate ideas and
    suggestions for students' writing tasks, contributing to the enrichment of their
    ideas. They also noted that exposure to well-written examples generated by ChatGPT
    can improve students' understanding of effective writing styles. Tlili et al.
    (2023) found that ChatGPT enhances educational success by providing comprehensive
    knowledge on various topics, potentially sparking new ideas and facilitating deeper
    learning. They also noted that instructors found ChatGPT useful in generating
    specific and relevant learning content, enhancing understanding and inspiring
    new ideas. In addition, they discovered that ChatGPT also prompts teachers to
    explore new teaching philosophies and assessment methods that promote critical
    thinking and idea generation. Similarly, Firaina and Sulisworo (2023) found that
    ChatGPT serves as a communication channel for users, providing access to fresh
    information and ideas, facilitating the development of new knowledge and skills.
    Furthermore, Alshater (2022) highlighted ChatGPT's flexibility in addressing a
    wide range of research questions, such as generating realistic scenarios for financial
    modelling or simulating complex economic systems, stating that this flexibility
    allows researchers to explore new ideas and perspectives. In the pilot study by
    Zhai (2022), ChatGPT generated coherent and insightful writing for an academic
    paper on the topic of ‘Artificial Intelligence for Education’. ChatGPT's responses
    guided the author in organising the paper, developing a clear outline and providing
    valuable information on the history, potential and challenges of AI in education.
    ChatGPT also provided detailed descriptions and use cases, enriching the understanding
    of AI concepts and their applications in education.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, in the context of ChatGPT enriching users' ideas,
    individuals are seeking a solution to enhance their creative and intellectual
    endeavours. ChatGPT serves as a tool that assists users in generating ideas and
    expanding their knowledge base. By providing prompts, alternative perspectives
    and well-written examples, ChatGPT fulfils the job of stimulating creativity and
    facilitating idea generation. Bourdieu argues that individuals' actions and preferences
    are influenced by their social position and access to cultural, social and economic
    capital. In the context of ChatGPT, its usage and accessibility may be influenced
    by factors such as educational background, institutional support and economic
    resources. Users with greater access to education and resources may be more likely
    to benefit from ChatGPT's idea-enriching capabilities, while others with limited
    access may face barriers in fully utilising the tool. Marx highlights the commodification
    of knowledge and labour in capitalist societies, where intellectual and creative
    work is often undervalued or exploited. In the case of ChatGPT, it serves as a
    tool that can potentially replace certain tasks performed by educators and researchers.
    This raises questions about the impact on labour dynamics and the potential devaluation
    of human expertise. While ChatGPT can enhance idea generation and support research,
    it is essential to consider the broader socioeconomic implications and ensure
    that the tool's use does not lead to the erosion of human labour or exacerbate
    inequalities. Heidegger argues that technology can shape human experience and
    understanding, often leading to a loss of authenticity and a distancing from our
    essential being. In the context of ChatGPT enriching users' ideas, Heidegger's
    perspective prompts us to reflect on the impact of relying on AI-driven tools
    for intellectual and creative pursuits. While ChatGPT offers valuable assistance,
    it is crucial to maintain a critical awareness of its limitations and not allow
    it to replace the role of human creativity, interpretation and critical thinking.
    Balancing the use of technology like ChatGPT with human agency and reflection
    is essential to preserve the authenticity of our intellectual endeavours.
  prefs: []
  type: TYPE_NORMAL
- en: Speeds Up the Process
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'ChatGPT offers the advantage of speeding up various tasks or processes when
    compared to conventional methods. The students commented: ‘It is very useful for
    the learning part, because when you are researching on your own you are very likely
    to get wrong information. It also takes much longer… Another example is that I
    was able to finish a project that would normally take much longer in a shorter
    time’ (SFD); ‘ChatGPT helped me learn. It enabled me to learn effectively in a
    short time’ (SFD); ‘When I ask it for information, I do it to shorten the time
    I spend researching’ (SFD); ‘ChatGPT has improved my ability to access resources
    and my academic speed’ (SFD). One student also commented, ‘ChatGPT is very easy
    for new generation people… people catch the information very easily. Therefore,
    learning new information is very easy, cheap, and fast for people’ (SFD). In a
    workshop, one teacher commented: ‘I think it is really useful for preparing authentic
    lesson contents for teachers. The teachers don''t need to waste their time and
    energy creating new materials, but they can save more time for their students''
    specific needs’ (SYFD). Another teacher commented, ‘I think it works like an assistant
    which shows you the best options according to what you want from it. It is very
    useful and saves you time’ (SYFD). The phenomenon of speeding up the process was
    captured beautifully in a comment made in a meeting with a ChatGPT think tank,
    with one participant saying, ‘ChatGPT is like having a superpower, I can lift
    more (intellectually) than I could ever lift before, I can do everything ten times
    faster than I could do before’ (SYFD). The researcher made the following comments:
    ‘Using ChatGPT to quickly summarise literature sped up the process of identifying
    which literature was most relevant’ (RFD), and ‘Asking ChatGPT for suggestions
    led to a broader array of suggestions that enriched my choice. It also sped up
    the process’ (RFD). The researcher also commented, ‘Using ChatGPT as a tool for
    developing the research design really sped up the process’ (RFD); ‘Getting ChatGPT
    to generate surveys and interview questions was extremely efficient, it saved
    a lot of time’ (RFD); ‘ChatGPT can very quickly combine documents, saving a lot
    of time’ (RFD). The instructor commented: ‘ChatGPT very rapidly suggested cases
    for the forensic linguistics course. Some of these were cases I had not heard
    of before… This process was much faster than my original way of scouring the internet’
    (TFD), and ‘ChatGPT can very quickly come up with scripts for pre-class videos
    as well as suggesting images and visuals that can be used in the video’ (TFD).
    The instructor also said, ‘ChatGPT was very good at coming up with ideas for in-class
    assessments. This certainly saved me time’ (TFD). From observations during lessons,
    the instructor noted that: ‘Students wrote down traditional gendered pronouns
    in English and then tried to research online contemporary genders in English.
    They then tried the same through ChatGPT. ChatGPT was more efficient at this activity,
    thus saving the students time’ (TFD).'
  prefs: []
  type: TYPE_NORMAL
- en: In the literature, Fauzi et al. (2023) emphasised that students can optimise
    their time management by leveraging ChatGPT's features, such as storing and organising
    class schedules, assignment due dates and task lists. This functionality enables
    students to efficiently manage their time, reducing the risk of overlooking important
    assignments or missing deadlines. Similarly, Firaina and Sulisworo (2023) reported
    that using ChatGPT had a positive impact on the quicker understanding of material.
    According to the lecturers interviewed in their study, ChatGPT facilitated a quicker
    understanding by providing access to new information and ideas. Alshater (2022)
    reported that ChatGPT and similar advanced chatbots can automate specific tasks
    and processes, such as extracting and analysing data from financial documents
    or generating reports and research summaries, concluding that by automating these
    tasks, ChatGPT saves researchers’ time and expedites the research process. Alshater
    also noted that the ability of ChatGPT to swiftly analyse large volumes of data
    and generate reports and research summaries contributes to the accelerated speed
    of research (2022). Zhai (2022) utilised ChatGPT in his study to compose an academic
    paper and was able to complete the paper within 2–3 hours. This demonstrates how
    ChatGPT expedites the writing process and enables efficient completion of tasks.
    Zhai further observed that ChatGPT exhibited efficient information processing
    capabilities, swiftly finding the required information and facilitating the completion
    of tasks within a short timeframe. These findings highlight the central focus
    on enhancing productivity, time management, understanding complex topics and expediting
    processes.
  prefs: []
  type: TYPE_NORMAL
- en: This aligns with Christensen's theory by recognising how users are hiring ChatGPT
    to complete these productivity and learning-related tasks. Through a Bourdieusian
    lens, the use of ChatGPT can be viewed as a means to acquire additional social
    and cultural capital. Students and researchers can leverage ChatGPT to gain access
    to information, knowledge and efficient tools, thereby enhancing their learning
    outcomes and research productivity. Through a Marxist lens, the potential of ChatGPT
    and similar technologies to automate tasks, save time and expedite processes raises
    concerns about the impact on labour and employment. While ChatGPT improves efficiency
    for individuals, there are implications regarding job displacement and the concentration
    of power and resources among those who control and develop these technologies.
    Heidegger's perspective prompts critical reflection on the consequences of heavy
    reliance on AI technologies like ChatGPT for tasks traditionally performed by
    humans. While ChatGPT offers convenience and efficiency, it raises questions about
    the potential loss of human connection, critical thinking and creativity. This
    invites us to contemplate the role of technology in shaping our understanding,
    relationships and overall existence in the world.
  prefs: []
  type: TYPE_NORMAL
- en: Reduces Cognitive Load
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'ChatGPT emerged as a powerful tool to alleviate cognitive load and reduce mental
    effort by providing valuable assistance and performing tasks on behalf of users.
    The data highlight the diverse ways in which ChatGPT achieves this objective.
    For instance, the instructor commented, ‘We used ChatGPT to create mnemonics as
    a memory guide. This was a great activity because the students could focus on
    using the mnemonic instead of using their cognitive load to come up with one in
    the first place’ (TFD). And, ‘We got ChatGPT to summarise long articles in class.
    This was very useful for the students to get a rough idea of the article and decide
    on its relevance before reading for more detail. This is useful in reducing the
    cognitive load of students if they have a lot to read’ (TFD). Moreover, students
    found value in using ChatGPT to swiftly obtain accurate definitions for complex
    terms. Students asked ChatGPT to give them definitions for the words semantics
    and pragmatics (TFD). Students also reported that ChatGPT helped them reduce the
    mental effort required for specific tasks: ‘It helped me a lot in doing my homework.
    I made the titles in my homework according to the rubric and planned my work accordingly,
    so I didn''t have to think about these parts too much’ (SFD); ‘ChatGPT helped
    me learn effectively in a short time. It made it easier for me to answer questions
    in class activities’ (SFD). Furthermore, in a workshop, one teacher commented
    ‘Using ChatGPT as a research buddy, with this way of use, students'' cognitive
    load will reduce and also they''ll learn more about the relevant subject’ (SYFD).'
  prefs: []
  type: TYPE_NORMAL
- en: Rudolph et al. (2023) highlighted the potential of AI-powered writing assistants,
    like Grammarly, in facilitating English writing practices and enhancing skills
    by providing real-time feedback, detecting errors and motivating students to revise
    their writing. Although not explicitly mentioning reducing cognitive load, the
    broader discussion suggested that AI chatbots and writing assistants can alleviate
    cognitive load by assisting students in the writing process and promoting self-directed
    learning. According to Tlili et al.'s (2023) study, participants recognised ChatGPT's
    effectiveness in enhancing educational success by simplifying learning and reducing
    cognitive load for students. The users found ChatGPT valuable for providing baseline
    knowledge on various topics to teachers and students, as well as offering a comprehensive
    understanding of complex subjects in easy-to-understand language across different
    disciplines. Their study also highlighted the potential for ChatGPT to automate
    feedback and lessen the instructional workload for teachers. In Firaina and Sulisworo's
    (2023) study, they found that ChatGPT served as a communication channel for accessing
    fresh information and ideas, alleviating the cognitive load associated with searching
    for them. Their interviews revealed that using ChatGPT positively impacted productivity
    and learning effectiveness, facilitating quicker understanding of material and
    saving time in searching for resources, thus reducing the cognitive load in learning.
    This was also suggested in Alshater's (2022) study, where he observed that AI
    chatbots can enhance productivity by automating tasks and improving research efficiency
    as well as contributing to improved accuracy by identifying and rectifying errors
    in data or analysis and ensuring consistency in research processes by following
    standardised procedures and protocols. He believes this helps researchers focus
    on the content and interpretation of their work, thus alleviating cognitive load.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding Christensen's Theory of Jobs to be Done, ChatGPT can be hired to simplify
    and streamline tasks, allowing users to offload cognitive effort onto the AI chatbot.
    By providing assistance, such as generating mnemonics, summarising articles and
    offering quick and accurate definitions, ChatGPT enables users to focus on higher
    level cognitive processes rather than the more mundane aspects of their work.
    Through Bourdieu's lens, ChatGPT can be viewed as a tool that bridges knowledge
    gaps and reduces cognitive load by providing access to information that might
    be otherwise challenging to obtain. By acting as a communication channel between
    users and knowledge, ChatGPT facilitates the acquisition of fresh ideas and information,
    potentially levelling the playing field for individuals with varying cultural
    capital. However, it is essential to recognise how habitus shapes users' interactions
    with ChatGPT, with some relying heavily on it without critical evaluation. While
    ChatGPT's role in reducing cognitive load can empower learning, fostering critical
    thinking remains crucial to assess the reliability of its outputs. Understanding
    users' interactions within the context of cultural capital and habitus is vital
    to evaluate ChatGPT's impact on equitable information access. Once again, Marxism
    sheds light on the potential impact of AI chatbots like ChatGPT on the workforce.
    While ChatGPT's ability to automate tasks and enhance productivity is beneficial
    for users, once again, it raises concerns about the displacement of human labour.
    The introduction of AI chatbots in education, as highlighted by the studies, may
    reduce the cognitive load on students and teachers. However, it is essential to
    consider the broader societal implications and ensure that the implementation
    of AI technologies aligns with principles of equity and fair distribution of opportunities.
    Heidegger's philosophy emphasises the concept of ‘being-in-the-world’, which suggests
    that our existence and understanding of the world are interconnected. In the context
    of ChatGPT reducing cognitive load, we can relate this idea to the notion that
    ChatGPT functions as a tool or technology that enhances our ability to engage
    with the world. Thus, ChatGPT can be seen as an extension of our cognitive capacities,
    enabling us to access and process information more efficiently. It acts as a mediator
    between our ‘Being’ and the world of knowledge, allowing us to navigate complex
    topics and reduce the mental effort required to search for information. Additionally,
    Heidegger's concept of ‘readiness-to-hand’ comes into play when considering ChatGPT's
    role in reducing cognitive load. According to Heidegger, tools become seamlessly
    integrated into our everyday existence when they are ready-to-hand. In the context
    of ChatGPT, it becomes a ready-to-hand technology that we can effortlessly use
    to acquire knowledge. However, it is essential to be mindful of Heidegger's concerns
    about technology's potential to distract us from our authentic understanding of
    the world. While ChatGPT can reduce cognitive load and streamline information
    access, it is crucial to retain critical thinking and not overly rely on it as
    the sole source of knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Useful in Other Areas of Life
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'ChatGPT''s usefulness extends beyond its intended context, offering practical
    applications and benefits in various areas of life. This was seen in the data
    through first-hand observations. The researcher stated, ‘ChatGPT can very quickly
    combine documents, saving a lot of time. You can also get it to peer review your
    ethics application against the criteria and make suggestions for anything that
    has been missed or can be improved upon. Since discovering this, I have also used
    the same process to write a job reference, by inputting all aspects of the job,
    questions asked, and the potential employees CV. This came up with the basic reference
    which then had to be checked and personalised’ (RFD). The instructor also made
    observations: ‘Students input text message abbreviations from the case into ChatGPT
    and asked it to turn it into normal text. It did this much more successfully than
    the students had done without it. This made us realise it would be a useful tool
    for students to use outside the classroom as well if they needed to understand
    abbreviations’ (TFD), and ‘Students used ChatGPT to change the register of text
    from formal to informal, etc. This is a useful tool they will be able to use outside
    the classroom as well. For example, if they need to change their letter into a
    more formal letter’ (TFD). Students also expressed their diverse usage of ChatGPT.
    One student said, ‘I asked about the earthquake history of Turkey’ (SFD). Another
    student mentioned seeking relationship advice from ChatGPT (SFD). Another said,
    ‘I asked ChatGPT to write songs for my friends, had character analysis of my favourite
    TV series, asked about chess moves, and got investment advice’ (SFD). Yet another
    student mentioned, ‘Using the AI system has become a habit for me. I now use ChatGPT
    to access the right information about anything I am curious about’ (SFD). One
    student based their final project on ChatGPT, stating, ‘I was preparing to move
    abroad for a year for an Erasmus exchange programme. I used ChatGPT to find out
    about the university I was going to, the town I would be living in and questions
    about the culture and history in order to prepare for my trip. I also used it
    to help me learn basic phrases I would need to know’ (SFD).'
  prefs: []
  type: TYPE_NORMAL
- en: Although the existing literature provides limited information about the usefulness
    of ChatGPT in areas beyond education, Fauzi et al.'s (2023) study highlighted
    its significant role in enhancing language skills, suggesting that ChatGPT can
    assist students in improving their language proficiency by offering valuable resources,
    and that students can use it to refine their grammar, expand their vocabulary
    and enhance their writing style.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's Theory of Jobs to be Done, we can see that users can hire
    ChatGPT as a valuable tool to accomplish tasks like combining documents, peer
    review ethics applications, writing job references and converting text message
    abbreviations. These real-life examples showcase ChatGPT's efficiency, time-saving
    capabilities and enhanced productivity for users. The varied usage of ChatGPT
    by users exemplifies how the tool aligns with Bourdieu's theory of social capital
    and skill acquisition, serving as a platform through which users can access a
    wide range of information and knowledge, leveraging their social capital to explore
    various domains. Additionally, the process of interacting with ChatGPT involves
    skill acquisition, as users develop the ability to navigate and evaluate the information
    provided, further contributing to their understanding and learning. Once again,
    Marx's theory of social class and labour sheds light on ChatGPT's impact on work.
    Observations from the instructor and students show ChatGPT's effectiveness in
    tasks like modifying text and generating content. This raises questions about
    its implications for traditional job roles and the division of labour, potentially
    automating or augmenting tasks previously done by humans. Heidegger's theories
    underscore the transformative nature of technology and its impact on revealing
    the world. As a tool, ChatGPT enables individuals to achieve specific tasks and
    goals across different domains. In professional settings, ChatGPT streamlines
    work processes by aiding in tasks like drafting emails, generating reports and
    providing quick access to information, aligning with Heidegger's concept of ‘readiness-to-hand’.
    Similarly, in personal interactions, it acts as an assistant for scheduling appointments,
    setting reminders, offering recommendations and becoming an extension of our capabilities,
    as per Heidegger's idea of tools becoming transparent mediums. Furthermore, ChatGPT's
    creative applications involve assisting in writing tasks, suggesting ideas and
    enhancing language usage, which aligns with Heidegger's ‘poetic dwelling’ approach,
    fostering openness and deeper connection with the world through technology. However,
    Heidegger's cautionary note reminds us to reflect on technology's impact and its
    potential to disconnect us from authentic experiences. While ChatGPT proves valuable,
    we must be mindful of its pervasive use and the implications it holds for our
    relationship with the world.
  prefs: []
  type: TYPE_NORMAL
- en: Ability to Translate
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Despite ChatGPT's remarkable ability to translate between languages, there are
    occasional downsides. For instance, machine translation models may encounter challenges
    with gendered pronouns, resulting in mistranslations like using ‘it’ instead of
    ‘he’ and ‘she’, potentially leading to dehumanisation (Maslej et al., 2023). However,
    despite these issues, the data also revealed many positives. The researcher noted,
    ‘ChatGPT can translate interviews, surveys, etc., from one language to another,
    saving me time in the research process’ (RFD). Similarly, the instructor remarked,
    ‘As my students are all non-native speakers, being able to translate the readings
    into Turkish first to grasp the main ideas, and then reading again in English,
    helped reduce cognitive load, allowing them to focus more on the content’ (TFD).
  prefs: []
  type: TYPE_NORMAL
- en: While the literature had limited information regarding ChatGPT's translation
    abilities, Firaina and Sulisworo's paper noted that respondents used ChatGPT to
    aid in translating scientific articles into English, which proved particularly
    beneficial for those with limitations in English proficiency (2023).
  prefs: []
  type: TYPE_NORMAL
- en: From the perspective of Christensen, ChatGPT's ability to translate enables
    users to hire it to overcome language barriers and access information in different
    languages. For example, the instructor mentioned how students benefited from translating
    readings into Turkish to better understand the content. ChatGPT's translation
    feature addresses the functional job of language comprehension and information
    access. Through the lens of Bourdieu, ChatGPT's translation ability can be seen
    as a form of cultural capital that helps individuals with limited English proficiency
    overcome language-related barriers. By providing access to translated scientific
    articles, ChatGPT contributes to levelling the playing field and reducing language-based
    inequalities in academic settings. Analysing ChatGPT's translation capabilities
    from a Marxian perspective reveals insights into the labour dynamics in language
    services. ChatGPT's automated translations can improve efficiency and accessibility
    but may also lead to job displacement and potential exploitation of human translators.
    The automation of translation tasks raises ethical concerns about labour devaluation
    and compromises in translation quality. Balancing the benefits and challenges
    of AI-driven translation requires careful consideration of fair labour practices
    and ensuring the preservation of translation quality. Heidegger's theory views
    technology as an enabler that shapes human existence and relationships. In the
    context of ChatGPT's translation ability, it can be seen as a technological tool
    that mediates language interactions. While it facilitates access to information
    and communication across languages, it also alters the nature of language interaction
    itself. Therefore, the reliance on machine translation may influence how individuals
    engage with language and potentially affect language learning and cultural understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Reviews Work and Gives Suggestions for Improvement
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ChatGPT's ability to analyse and provide feedback on presented work or content,
    offering suggestions for improvement, was evident in the data through various
    student comments. One student noted, ‘ChatGPT provided very useful feedback, giving
    a detailed and orderly explanation’ (SFD). Another student said, ‘I was having
    problems with how to do (an assignment). ChatGPT tells me the steps to follow’
    (SFD). The students recognised the usefulness of ChatGPT's feedback, with one
    of them mentioning, ‘It informs about where it thinks things are missing and provides
    detailed feedback by evaluating the project step by step’ (SFD). In terms of peer
    review, ChatGPT played a significant role. One student said, ‘I asked ChatGPT
    for feedback on my essay and this is what it said. “The essay effectively addresses
    the issue of fake news, its impact, and proposed solutions. By addressing the
    suggestions provided above, the essay can be further improved”’ (SFD). They appreciated
    the specific feedback provided by ChatGPT on the structure, clarity and development
    of ideas in their essay. Another student said, ‘ChatGPT provided useful feedback
    for me. It helped me to make the rubric at the beginning’ (SFD). One student acknowledged
    the accuracy of ChatGPT's analysis, saying, ‘If I consider the ChatGPT assessment,
    I think it is obvious that he has made a correct analysis’ (SFD). Overall, they
    found ChatGPT's suggestions helpful in identifying missing points and strengthening
    their arguments. The researcher also found ChatGPT to be a useful tool for their
    writing and study, highlighting its capabilities in tasks such as paraphrasing
    articles, shortening text, suggesting titles and headings and generating introductions
    and conclusions based on data input (RFD). They also emphasised that ChatGPT's
    utility extends beyond research papers, stating, ‘This can be used for any type
    of writing whether for a research paper or anything else’ (RFD).
  prefs: []
  type: TYPE_NORMAL
- en: The literature also highlights ChatGPT's ability to review a user's work and
    provide feedback. According to Fauzi et al. (2023), ChatGPT's capacity to answer
    specific questions caters to individual learning needs, allowing students to seek
    clarification and detailed explanations on specific concepts, theories or subjects.
    They believe this personalised assistance greatly enhances students' understanding,
    comprehension and overall learning experience. In a similar vein, Rudolph et al.
    (2023) discussed the effectiveness of AI-powered digital writing assistants, such
    as Grammarly, in reviewing a student's work and providing feedback. They noted
    that research suggests that utilising Grammarly as an intervention effectively
    improves students' writing engagement through automated written corrective feedback,
    as, with its immediate feedback and revision, it motivates them to revise their
    writing by indicating the location of the error and assigning a technology score.
    When students adapt their writing, an increase in the score corresponds to a reduction
    in errors, encouraging them to continue improving their writing tasks. Rudolph
    et al. (2023) also noted that AI interventions have been effective in enhancing
    self-efficacy and academic emotions in English as a Foreign Language (EFL) students.
    They say this is because intelligent feedback, in the absence of human assistance,
    can reinforce students' writing autonomy by helping them to recognise writing
    errors, identify incorrect patterns and reformulate their writing accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: Through the lens of Christensen, we may say that ChatGPT's ability to analyse
    and provide personalised feedback and guidance on a student's work addresses the
    job of enhancing their learning experience and improving their academic performance.
    Students value the detailed and orderly explanations provided by ChatGPT, as it
    helps them understand concepts, follow steps and improve their assignments. Through
    the lens of Bourdieu, the students' recognition of the usefulness of ChatGPT's
    feedback indicates that it possesses a form of cultural capital – an esteemed
    knowledge and resource that can improve their academic performance. By utilising
    ChatGPT, students gain access to valuable feedback that strengthens their arguments,
    enhances the structure and clarity of their essays and helps them create rubrics.
    This access to cultural capital can potentially contribute to social distinctions
    and academic success. Through a Marxist lens, ChatGPT's ability to analyse and
    provide feedback on students' work automates tasks that would traditionally require
    human labour, such as reviewing and providing feedback on essays. By performing
    these tasks, ChatGPT reduces the workload on teachers or peers, allowing for more
    efficient and scalable feedback processes. ChatGPT's capabilities align with Heidegger's
    view of technology as an enabler and tool that transforms how individuals engage
    with the world. By offering assistance in tasks like paraphrasing, shortening
    text, suggesting titles and generating introductions and conclusions, ChatGPT
    changes the way users approach writing and study. It expands their possibilities
    and interactions with technology, enhancing their engagement and potentially influencing
    their writing practices.
  prefs: []
  type: TYPE_NORMAL
- en: Text Register Modification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The data uncovered ChatGPT's versatility in adjusting the register of text,
    as evident from the instructor's comments, ‘You can ask it to change the register(of
    the university course information form) so that the final document is more student-friendly’
    (TFD). She also noted, ‘Students identified that they could use this as a tool
    outside the classroom to help achieve the correct register for letters, emails,
    etc.’ (TFD). One student stated, ‘ChatGPT can transform my informal writing into
    formal writing’ (SFD). The instructor further added, ‘This is a valuable tool
    the students can use beyond the classroom, such as when they need to convert a
    letter into a more formal style’ (TFD). Moreover, ChatGPT demonstrated its capacity
    to identify linguistic mannerisms in texts attributed to famous individuals, with
    the instructor saying, ‘ChatGPT was quite successful at giving a descriptive profile
    of the person who may have said this, leading us to a discussion about catfishing’
    (TFD). Additionally, the instructor said, ‘ChatGPT was able to change British
    English into American English and vice versa’ (TFD). The researcher described
    ChatGPT as being, ‘like a hall of mirrors. I can develop my thoughts and then
    ask it to rewrite them through the lens of structuralism, poststructuralism, feminism,
    etc. I found this transformational. I think it will take research much further
    forwards and much faster’ (RFD).
  prefs: []
  type: TYPE_NORMAL
- en: In Rudolph et al.’s (2023) paper, while they did not specifically address ChatGPT's
    ability to change the register of a text, they did discuss the potential misuse
    and challenges associated with ChatGPT's text generation capabilities, raising
    concerns about students outsourcing their written assignments to ChatGPT, as it
    can produce passable prose without triggering plagiarism detectors. They stated
    that they believe this poses integrity concerns for assessment methods which will
    prompt instructors to make adaptations. They also noted the irony of using AI-powered
    anti-plagiarism software while AI, like ChatGPT, can potentially bypass plagiarism
    detection by modifying sentences to reduce the originality index score. Rudolph
    et al. suggest a student-centric approach to address challenges with AI tools
    in education, whereby faculty should design challenging assignments and use text
    generator detection software, and students should be guided to understand AI limitations,
    practice problem-solving with AI tools and develop digital literacy skills. They
    also recommended that higher education institutions provide digital literacy education,
    train faculty, update policies and integrate AI tools to navigate the evolving
    landscape. Similarly, Tlili et al. (2023) identified concerns related to cheating
    and manipulation with ChatGPT, finding that ChatGPT can assist students in writing
    essays and answering exam questions, potentially facilitating cheating, while
    also manipulating the system to evade detection by output detector models.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, ChatGPT's ability to change the register of a text
    enables individuals to hire the tool to help them achieve the desired register
    for various purposes, such as academic assignments or professional communication.
    From a Bourdieusian perspective, the ability of ChatGPT to mimic the writing styles
    of individuals, including famous figures, raises questions about the reproduction
    and authenticity of language, whereby language can be deceptively used to manipulate
    others. Looking at the situation from a Marxist perspective, the potential negative
    uses of ChatGPT, such as using it to complete assignments and evade plagiarism
    detection, raise important questions about the impact of technology on education.
    These concerns are in line with Marxist critiques of capitalism and the exploitation
    of labour, as they highlight the transformation of education into a commodity
    and the potential devaluation of human labour in the face of content generated
    by AI. From a Heideggerian standpoint, ChatGPT's transformative capabilities in
    rewriting thoughts through different lenses, such as structuralism or feminism,
    reflect the transformative potential of AI tools in the realm of research and
    academia. However, it also raises questions about the nature of authorship, originality
    and the essence of human creativity when such tasks can be delegated to AI.
  prefs: []
  type: TYPE_NORMAL
- en: Imparts Specific Knowledge, Skills and Concepts to Users
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The data revealed how ChatGPT provides users with specific information, skills
    or concepts through its responses, as expressed by students. One student remarked,
    ‘Firstly, I used ChatGPT to research and gather information on the Unabomber case,
    including the forensic linguistic evidence that was presented in court. Secondly,
    I used ChatGPT to generate and improve my ideas and arguments for the closing
    speech. For example, I put in a draft of my speech, and it suggested alternative
    word choices, phrasing, or provided additional information to support my argument’
    (SFD). Another student highlighted the knowledge gained through ChatGPT, stating,
    ‘I believe that ChatGPT gives me extra knowledge. For instance, ChatGPT clearly
    explained how professionals studied the Unabomber's writing style, spelling, syntax,
    and linguistic qualities to work out his age, origin, and other characteristics
    when I questioned it about the forensic linguistic evidence used to identify him.
    This really helped my understanding of the relevance of the linguistic evidence
    and its role in the case’ (SFD). Regarding the writing process, one student noted,
    ‘When I was writing the closing argument for the prosecution, I asked ChatGPT
    a question like “Suppose you were the prosecutor in the Unabomber case, how would
    you write the closing argument?” Then I pasted the rubric (that the instructor
    had) provided and asked it to reorganise the writing using that rubric. It sent
    me the answer, and finally I asked it to illustrate that writing by suggesting
    pictures’ (SFD). Another student stated, ‘ChatGPT helped me to learn effectively
    in a short time. It made it easier for me to answer questions. I was able to do
    in-class exercises much more easily with ChatGPT’ (SFD). The instructor also commented
    on ChatGPT's effectiveness for helping students learn, saying, ‘ChatGPT was excellent
    for students to learn punctuation rules. It was also useful when students input
    the same sentences with different punctuation, and it told them the difference
    in meaning’ (TFD). The instructor also highlighted ChatGPT's ability to quickly
    provide students with rules for the use of definite and indefinite articles and
    the use of ‘then’ in narrative justifications when asked (TFD). Additionally,
    the instructor mentioned, ‘Students used ChatGPT's MadLib function to create vocabulary
    quizzes for each other. This gave us the idea that students could use it to create
    their own revision materials to use to revise the course concepts’ (TFD). This
    positive feedback was reinforced by a student who stated, ‘I wanted ChatGPT to
    prepare practice for me while preparing for my exams. These give me an advantage
    for preparing for exams and assignments’ (SFD).
  prefs: []
  type: TYPE_NORMAL
- en: These findings are supported by Fauzi et al. (2023), who found that ChatGPT
    was a valuable resource for students, offering useful information and resources,
    retrieving relevant information from the internet, recommending books and articles
    and assisting in refining grammar, expanding vocabulary and enhancing writing
    style, all of which led to an overall improvement in academic work and language
    skills. Neumann et al. (2023) also observed that ChatGPT could help students prepare
    for assessments by generating specific source code and summarising literature,
    and that they could utilise it to generate relevant code snippets for their assignments
    or projects, contributing to their knowledge and understanding of software engineering
    concepts. Similarly, Zhai (2022) found ChatGPT useful in composing an academic
    paper that only required minor adjustments for organisation.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, we can see that students are hiring ChatGPT to gather
    information, improve their ideas and arguments, enhance their writing and learn
    more effectively. From a Bourdieusian perspective, ChatGPT enhances users' social
    and cultural capital regarding access to resources and opportunities. From a Marxist
    viewpoint, students can use ChatGPT to enhance their productivity and efficiency
    in tasks such as writing, research and exam preparation, thereby acting as a form
    of technological capital that empowers students to accomplish their academic work
    more effectively, potentially reducing their dependence on traditional labour-intensive
    approaches. However, it should be noted that this technological capital is only
    available if there is equitable access to the tool. Through a Heideggerian lens,
    ChatGPT redefines the relationship between humans and technology in the educational
    context, by expanding the possibilities of information retrieval, language refinement
    and knowledge generation. Through interactions with ChatGPT, students can engage
    in a new mode of learning and communication that is mediated by technology. This
    interaction will influence their perception and understanding of specific knowledge,
    skills and concepts.
  prefs: []
  type: TYPE_NORMAL
- en: How ChatGPT May Affect the Roles of Stakeholders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ChatGPT can empower students by providing them with access to valuable resources
    and tools. It can assist in tasks such as generating ideas, improving writing,
    providing feedback and enhancing language skills. This can potentially enhance
    students' learning experience and academic performance. However, there are concerns
    about potential misuse and the impact on academic integrity. Students may be tempted
    to outsource their assignments to ChatGPT or use it to bypass plagiarism detection.
    This raises questions about the authenticity of their work and the development
    of critical thinking and writing skills.
  prefs: []
  type: TYPE_NORMAL
- en: Institutions and instructors will need to address these challenges and establish
    responsible policies for the use of AI tools in education. ChatGPT can augment
    the role of instructors by automating certain tasks and providing support in reviewing
    and providing feedback on students' work. It can save instructors’ time by offering
    suggestions for improvement, detecting errors and helping with language-related
    issues. However, there is a need for instructors to adapt to these changes and
    find new ways to engage with students. The role of instructors may shift towards
    facilitating discussions, guiding students in utilising AI tools effectively and
    designing assignments that cannot be easily outsourced or automated. Instructors
    should also be aware of the limitations of AI tools and help students develop
    critical thinking skills alongside their use of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Institutions need to recognise the potential of AI tools like ChatGPT and their
    impact on teaching and learning. They should provide digital literacy education
    and training for faculty and students, update academic integrity policies and
    support research on the effects of AI tools on learning and teaching. Additionally,
    institutions should consider the implications for equitable access to educational
    resources. While ChatGPT can provide valuable support, it also raises concerns
    about the digital divide and disparities in access to technology. Institutions
    should ensure that all students have equal opportunities to benefit from AI tools
    and take steps to bridge any existing gaps.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, ChatGPT's versatile and practical nature in education enhances the
    learning experience, offering personalised feedback and guidance to students.
    However, concerns arise about its impact on labour dynamics, academic integrity
    and societal ethics. To address these, responsible policies and digital literacy
    training are essential.
  prefs: []
  type: TYPE_NORMAL
- en: Impact of ChatGPT on User Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Within this theme, we explore the influence of ChatGPT on user learning, specifically
    examining its effectiveness in accomplishing assigned student tasks and the overall
    impact it has on the learning process.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Demonstrates Competency in Completing Assigned Student Tasks/Inhibits
    User Learning Process
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'From our findings, we discovered that ChatGPT demonstrates proficiency in accomplishing
    assigned tasks. However, due to this, it can have a detrimental impact on the
    learning process, hindering active engagement and independent knowledge acquisition.
    Students'' perspectives shed light on this matter. In the initial phase of the
    course, the instructor asked students to assess ChatGPT''s ability to complete
    in-class activities in their other courses. 57.1% affirmed ChatGPT''s total capability
    in this task, while 28.6% acknowledged its partial capability. The activities
    mentioned by students that could be done by ChatGPT included article writing and
    answering questions. Similarly, students were asked about ChatGPT''s potential
    to complete assignments or projects in their other courses. 71.4% responded that
    it could do them completely, with 14.3% saying it could partially complete them.
    One student stated, ‘Generally ChatGPT knows everything. This is very dangerous
    for students because students generally choose the easy way to work. If ChatGPT
    improves itself, students will use it a lot, and that''s why when instructors
    give grades, you will use ChatGPT to get the points’ (SFD). Another said, ‘The
    possibility of students having their homework done by ChatGPT will raise doubts
    in teachers, which may have consequences’ (SFD). The students also recognised
    that the impact of ChatGPT depends on its usage. One student remarked, ‘Actually,
    it is connected with your usage type. If you use it to check your assignments
    and help, it helps you learn. But if you give the assignment to ChatGPT, it skips
    the learning’ (SFD). They further commented, ‘It''s like taking it easy. It helped
    me lots with doing my homework, but I feel like it reduced my thinking process
    and developing my own ideas’ (SFD). Another student said, ‘Of course, it helped
    me a lot, but it also made me a little lazy, I guess. But still, I think it should
    stay in our lives’ (SFD). A further student said, ‘It certainly skips some part
    of the learning process. When I ask it for information, I do it to shorten the
    time I spend researching. If I spent time researching by myself, I think I would
    have more detailed information and would form more complex ideas’ (SFD). According
    to the instructor, ChatGPT was good at generating ideas for the final assessment,
    but there were caveats: ‘ChatGPT was excellent at coming up with ideas for the
    final assessment following GRASPS and came up with better ideas than my own. However,
    some of its ideas for assessment could easily be done by ChatGPT itself. Therefore,
    these suggestions would need to be rewritten to avoid this’ (TFD). The instructor
    also made observations about ChatGPT''s ability to create rubrics: ‘Once an assessment
    has been written, ChatGPT can easily come up with a suggested rubric for evaluation,
    but only if the assessment task is written precisely. However, the weighting in
    the rubrics should be adapted by the instructor to reflect the parts that ChatGPT
    can do and the parts it can''t’ (TFD). Additionally, the instructor highlighted
    that ChatGPT could provide suggestions for pre-class quizzes based on the text
    or video input; however, they cautioned that if the cases used in the quizzes
    were present in ChatGPT''s database, students might opt to use the AI for quizzes
    instead of engaging with the assigned text or video (TFD). Furthermore, regarding
    in-class activities, the instructor noted, ‘When students got ChatGPT to categorise
    vocabulary under headings, they did it fast, but it skipped the learning process
    aim of this activity. It did not help them to review the vocabulary. This may
    therefore have implications for how I construct my vocabulary review activities
    in the future’ (TFD). Issues with ChatGPT being able to complete student activities
    were also raised in a workshop, where one teacher said, ‘I realised that ChatGPT
    could do the lesson planning assignment for my (teacher candidate) students, so
    I changed the weighting of the rubric to adapt to this’ (SYFD). Similarly, another
    teacher said, ‘ChatGPT can easily find the answers with this activity, and students
    would not need to do the reading’ (SYFD). A different teacher stated, ‘ChatGPT
    does not enable a person to learn from the process. With this way, ChatGPT only
    gives a result; it does not provide help for the process. As you know, learning
    takes place within the process, not solely the result’ (SYFD).'
  prefs: []
  type: TYPE_NORMAL
- en: So what did the literature have to say about this? In Mhlanga's (2023) study,
    instructors expressed concerns that ChatGPT may disrupt traditional assessment
    methods like essays and make plagiarism detection more difficult. However, Mhlanga
    stated that he believes this opens doors to innovative educational practices and
    suggests that AI technologies like ChatGPT can be used to enhance assessment procedures,
    teaching approaches, student participation, collaboration and hands-on learning
    experiences, thus modernising the educational system. Neumann et al. (2023) also
    explored ChatGPT's competence in completing assigned student tasks and its implications
    for the learning process. They highlighted various applications in software engineering,
    including assessment preparation, translation, source code generation, literature
    summarisation and text paraphrasing. However, while they noted that ChatGPT could
    offer fresh ideas for lecture preparation and assignments, they stressed the need
    for further research and understanding so that transparency is emphasised, ensuring
    students are aware of ChatGPT's capabilities and limitations. They proposed integrating
    ChatGPT into teaching activities, exploring specific use cases and adapting guidelines,
    as well as potential integration into modern teaching approaches like problem-based
    and flipped learning, with an emphasis on curriculum adjustments and compliance
    with regulations. Rudolph et al. (2023) raised multiple concerns regarding ChatGPT's
    impact on students' learning process and assessment authenticity. They highlighted
    potential issues with students outsourcing written assignments, which they believe
    could challenge traditional evaluation methods. Additionally, they expressed worries
    about ChatGPT hindering active engagement and critical thinking skills due to
    its competence in completing tasks without students fully engaging with the material.
    Tlili et al.'s (2023) study focused on potential misuse of ChatGPT, such as facilitating
    cheating in tasks like essay writing or exam answers. Effective detection and
    prevention of cheating were highlighted as important considerations. Similarly,
    they raised concerns about the impact of ChatGPT on students' critical thinking
    skills, believing that excessive reliance on ChatGPT may diminish students' ability
    to think innovatively and independently, potentially leading to a lack of deep
    understanding and problem-solving skills. Due to these issues, Zhai (2022) proposed
    a re-evaluation of literacy requirements in education, suggesting that the emphasis
    should shift from the ability to generate accurate sentences to effectively utilising
    AI language tools, believing that incorporating AI tools into subject-based learning
    tasks may be a way to enhance students' creativity and critical thinking. Zhai
    also suggested that this should be accompanied by a shift in assessment practices,
    focussing on critical thinking and creativity and, thus, recommended exploring
    innovative assessment formats that effectively measure these skills (2022).
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, ChatGPT can be seen as a tool that students can
    hire to accomplish specific jobs or tasks in their educational journey. However,
    this raises concerns about the potential negative impact on active engagement,
    independent knowledge acquisition, critical thinking and the overall learning
    process. Therefore, there is a need for a balanced approach to avoid the drawbacks
    associated with its use. Through Bourdieu's theory of social reproduction, we
    can gain insights into the social and educational ramifications of ChatGPT. Students'
    concerns about the ease of relying on ChatGPT for completing assignments and the
    potential consequences, including doubts from teachers and reduced critical thinking,
    resonate with Bourdieu's emphasis on the reproduction of social structures. This
    highlights the possibility of ChatGPT perpetuating educational inequality by offering
    shortcuts that hinder deeper learning and critical engagement. Students' comments
    about the impact of ChatGPT on the learning process reflect elements of Marx's
    theory of alienation. While ChatGPT offers convenience and assistance in completing
    tasks, students expressed concerns about the reduction of their active involvement,
    thinking process and personal idea development. This detachment from the learning
    process can be seen as a form of alienation, where students feel disconnected
    from the educational experience and become dependent on an external tool to accomplish
    their tasks. Heidegger's perspective on technology as a means of revealing and
    shaping our understanding of the world can also be applied here. ChatGPT is a
    technological tool that transforms the educational landscape, revealing new possibilities
    by generating ideas, providing assistance and automating certain tasks. However,
    the concerns raised by students and instructors point to the potential danger
    of technology shaping the learning process in ways that bypass essential aspects
    of education, such as critical thinking, personal engagement and deep understanding.
    Once again, this highlights the need for a thoughtful and intentional integration
    of technology in education to ensure its alignment with educational goals.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Unable to Perform Assigned Student Tasks
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In exploring the limitations of ChatGPT in completing tasks or assignments,
    the instructor stated, ‘I showed students how to pick up information from the
    final assessment rubric and put it into ChatGPT to see how much of the project
    it could do. Then I got them to look at the weighting in the rubric and identify
    areas in which chatgpt could either not do what was asked e.g. providing visuals,
    or was inefficient e.g. giving very limited information about the forensic linguistics
    of the case, not providing primary source references’ (TFD). In another example,
    the instructor said, ‘Students read articles on advice for writing closing speeches,
    they also asked chatgpt to give advice and cross-referenced it. They made a list
    of this advice. Then they watched two videos of closing speeches, one for the
    prosecution and one for the defence and wrote examples from these speeches matched
    against their advice list. This activity proved to be ChatGPT-proof as they were
    having to write down examples they had heard from a video’ (TFD). Furthermore,
    the instructor recounted, ‘Students had read a paper about how intoxication can
    be detected by acoustic-phonetic analyses and made a list of the main points.
    They then watched a video of Johnny Depp giving an award speech while drunk and
    had to write examples of what he said next to the list of acoustic-phonetic factors
    from the paper. Due to them having to listen to a video to do this, the activity
    was ChatGPT-proof’ (TFD). Furthermore, the instructor commented, ‘Students created
    their projects in any form they wished (poster, video, interview). They used ChatGPT
    to review their work against their rubric. This could only be done if their final
    project had text that could be input. If they used a different medium, this was
    not possible’ (TFD). They also observed that, ‘ChatGPT was unable to do an analysis
    of handwriting from two suicide notes related to Kurt Cobain’ (TFD).
  prefs: []
  type: TYPE_NORMAL
- en: From Christensen's perspective, the limitations of ChatGPT can be seen as its
    inability to fulfil specific jobs or tasks that users are hiring it to do, such
    as providing visuals, detailed data on cases and primary source references. They
    were also unable to hire it to assist with tasks that involved the use of different
    media, such as answering questions related to videos or poster presentations.
    These limitations hindered the users' ability to accomplish their desired goals
    and tasks effectively with the tool. From a Bourdieusian perspective, the limitations
    of ChatGPT may reflect the unequal distribution of cultural capital among users.
    The ability to effectively navigate and utilise ChatGPT's capabilities, such as
    cross-referencing information or critically assessing its outputs, is influenced
    by the possession of cultural capital. Students who have been exposed to educational
    resources and have developed the necessary skills may benefit more from using
    ChatGPT, while those lacking cultural capital may struggle to fully utilise its
    potential. This highlights the role of social inequalities and the reproduction
    of advantage in educational settings. From a Marxist perspective, ChatGPT, as
    a technological tool, may be seen as being shaped by the profit-driven logic of
    capitalism. Its limitations may arise from cost considerations, efficiency requirements
    or the prioritisation of certain tasks over others. These limitations reflect
    the broader dynamics of capitalist technology, where the pursuit of profit and
    market demands may compromise the quality, accuracy and comprehensiveness of the
    outputs. Regarding Heidegger's theories on technology, the limitations of ChatGPT
    reveal the essence of technology as an instrument or tool that has its own limitations
    and cannot replace human capabilities fully. ChatGPT's inability to analyse handwriting
    or handle tasks that require human senses and context demonstrates the importance
    of human presence, interpretation and understanding in certain educational contexts.
  prefs: []
  type: TYPE_NORMAL
- en: How ChatGPT May Affect the Roles of Stakeholders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Students' experiences with ChatGPT encompassed both advantages and disadvantages.
    On the one hand, it demonstrated proficiency in completing tasks and offered convenience.
    However, concerns arise about its potential to hinder active engagement, critical
    thinking and independent knowledge acquisition. Some students expressed worries
    about overreliance on ChatGPT, which could discourage them from engaging in the
    learning process and developing their own ideas. Additionally, concerns about
    potential misuse, such as outsourcing assignments or facilitating cheating, underscore
    the importance of maintaining assessment authenticity and fostering critical thinking
    skills.
  prefs: []
  type: TYPE_NORMAL
- en: For instructors, integrating ChatGPT presents new challenges and considerations.
    While it can generate ideas, suggest rubrics and assist in various tasks, careful
    adaptation of assessments is necessary to avoid redundancy and ensure alignment
    with ChatGPT's capabilities. The impact of ChatGPT on in-class activities is also
    a concern, as it may bypass the learning process and hinder effective teaching.
    To address this, instructors need to rethink their approach to in-class activities
    and actively manage ChatGPT's use to ensure students are actively learning and
    not solely relying on the AI tool.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, institutions of higher education must carefully consider the broader
    implications of ChatGPT integration. This will involve re-evaluating literacy
    requirements and assessment practices, with a focus on critical thinking and creativity.
    The successful integration of ChatGPT will require transparency, adaptation and
    AI-proofing activities. Institutions will also need to establish clear policies
    on assessment and plagiarism detection. Balancing AI integration will be essential
    in order to harness its benefits without undermining student learning experiences.
    Therefore, institutions will need to provide proper training to instructors to
    encourage and enable them to embrace new teaching approaches in this AI-driven
    landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of a Generalised Bot for Educational Context
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The theme ‘Limitations of a Generalised Bot for Educational Context’ explores
    the challenges and shortcomings of using a general-purpose bot in education, including
    gaps in knowledge, disciplinary context limitations and culturally specific database
    issues.
  prefs: []
  type: TYPE_NORMAL
- en: Gaps in Knowledge
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: One significant caveat of ChatGPT is its reliance on pre-September-2021 knowledge,
    as it does not crawl the web like traditional search engines. This was observed
    in the following instances. The instructor stated, ‘I asked my students to ask
    ChatGPT about the implications for AI and court cases. After this, I gave them
    some recent articles to read about the implications of AI for court cases and
    asked them to make notes. They then compared their notes to ChatGPT's answers.
    The students felt the notes they had made about the implications were more relevant
    than ChatGPT's responses. This may have been because the articles I provided them
    with had been published in late 2022 or early 2023, whereas ChatGPT's database
    only goes up to 2021’ (TFD). In a similar vein, the researcher said, ‘I was interested
    in analysing some of my findings against the PICRAT matrix that I was familiar
    with but has only recently been developed. I asked ChatGPT about this. Three times
    it gave me incorrect information until I challenged it, whereupon it eventually
    responded that it did not know about PICRAT’ (RFD). Interestingly, the concept
    of gaps in knowledge did not emerge prominently in the literature review; therefore,
    we turn to our theorists.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, ChatGPT's limitations in knowledge can hinder its
    ability to adequately serve the job of providing accurate and up-to-date information.
    Users hiring ChatGPT for information-related tasks may find its outdated knowledge
    base unsatisfactory in meeting their needs. This is therefore a constraint on
    ChatGPT's ability to effectively perform the job it is being hired for. The reliance
    on outdated information may reflect the prioritisation of cost-effectiveness and
    efficiency in the development of ChatGPT. Analysing ChatGPT's gaps in knowledge
    through a Heideggerian lens highlights the essence of technology as a human creation
    and the limitations it inherits. ChatGPT, as a technological tool, is bound by
    its programming and training data, which define its knowledge base and capabilities.
    The gaps in knowledge arise from the inherent limitations of the technology itself,
    which cannot transcend the boundaries of its design and training. This perspective
    prompts reflection on the human–technology relationship and raises questions about
    the extent to which AI systems can genuinely meet the needs of the complexities
    of human knowledge and understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Disciplinary Context Limitations
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A prominent finding from the data is ChatGPT's limitations in understanding
    specific disciplinary contexts or possessing specialised knowledge in certain
    fields. One student pointed out that ChatGPT's AI might not make judgements in
    the same way a human judge can, given the availability of evidence, which could
    lead to questionable decisions (SFD). Similarly, another student expressed that
    without access to proper sources, a judge, in this case ChatGPT, might struggle
    to make accurate judgements (SFD).
  prefs: []
  type: TYPE_NORMAL
- en: Alshater (2022) also raised the concern that ChatGPT and similar chatbots may
    lack extensive domain knowledge, particularly in economics and finance. He pointed
    out that, due to the training data used to develop ChatGPT, it might not possess
    deep expertise in specific domains (in his case, economics and finance), which
    therefore limits its ability to accurately analyse and interpret data in these
    areas. Consequently, he warned that using ChatGPT for tasks like data analysis
    or research interpretation in fields where ChatGPT is lacking may lead to errors
    and incomplete analyses. To address this limitation, Alshater suggested users
    should be cautious, employ additional resources or expert knowledge and have human
    oversight to ensure accurate outputs (2022). However, he remains optimistic about
    ongoing advancements in natural language processing and machine learning, which
    he believes could enhance the domain-specific expertise of AI systems like ChatGPT
    in the future.
  prefs: []
  type: TYPE_NORMAL
- en: Through Christensen's lens, ChatGPT fails to adequately address the needs of
    users seeking accurate judgments and in-depth expertise in certain domains. Users
    desire a tool that can effectively analyse and interpret data in these areas,
    but ChatGPT falls short in meeting this specific job to be done. Bourdieu's theory
    is evident in the way students express concerns about the limitations of ChatGPT.
    The possession of specialised knowledge in specific fields is seen as a form of
    cultural capital. Students recognise that relying solely on ChatGPT for complex
    judgments and analyses might not lead to desirable outcomes. Through a Marxist
    lens, the limitations of ChatGPT in certain domains may perpetuate existing social
    structures, wherein expertise and knowledge in these areas are valued and rewarded.
    Reliance on AI systems like ChatGPT for complex tasks could also potentially lead
    to the devaluation of human labour and expertise in these fields. Through a Heideggerian
    lens, the limitations observed in ChatGPT's understanding and domain knowledge
    are rooted in its programming and training data, defining its capabilities. As
    a tool, ChatGPT can only operate within the boundaries of its design and training,
    leading to insufficiencies in human usage.
  prefs: []
  type: TYPE_NORMAL
- en: Culturally Specific Database
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The concept of a culturally specific database in ChatGPT refers to its access
    or training on a database specific to a particular culture or cultural context.
    This can potentially limit its relevance to the individual needs of users. A 2020
    study by the Massachusetts Institute of Technology warns about this, as there
    is the possibility of encoding biases into the technology if the training data
    is overly hegemonic (Grove, 2023). While it is difficult to determine the exact
    composition of ChatGPT's database, it is worth noting that OpenAI and Google (now
    Alphabet Inc.) are based in California, and Microsoft is headquartered in Washington.
    Thus, the involvement of these companies in developing and utilising AI suggests
    a strong connection to American culture and potentially a Western perspective.
    As a result, the cultural context and perspectives of these companies may influence
    the development and training of the AI model.
  prefs: []
  type: TYPE_NORMAL
- en: This concern about cultural specificity was also evident in the data provided
    by the students. One student cautioned against relying on ChatGPT in legal education,
    noting that laws differ across countries and it may not be appropriate to expect
    ChatGPT to provide accurate assistance in such matters (SFD). Another student
    expressed doubts about ChatGPT's ability to offer reliable judgements, citing
    an example where applying English case law to Turkish legal matters led to incorrect
    conclusions (SFD). This issue was also observed in a previously described example
    concerning transgender pronouns in Turkey, where ChatGPT demonstrated a limited
    understanding of the Turkish language and provided incorrect information.
  prefs: []
  type: TYPE_NORMAL
- en: Surprisingly, the literature did not explicitly address these concerns about
    cultural databases. However, Sullivan et al.'s (2023) study did highlight the
    cultural limitations of their research, which focused on news articles from Australia,
    New Zealand, the United States and the United Kingdom. They pointed out the imbalance
    in academic studies that predominantly analyse Western news, particularly from
    the United States. They warn that this imbalance raises cautionary flags about
    relying solely on Western voices and perspectives when discussing ChatGPT and
    similar technologies. We believe their concerns can also be extrapolated to ChatGPT's
    database.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to looking at this issue through the lens of Christensen, the
    concerns raised by the students regarding the cultural specificity of ChatGPT's
    database highlight the potential mismatch between the job they are hiring it to
    do and the capabilities of ChatGPT itself. This misalignment indicates the need
    for improvements in addressing specific user needs and cultural contexts. From
    a Bourdieusian viewpoint, the involvement of AI companies, such as OpenAI, Microsoft
    and Google, primarily based in the United States, suggests a connection to American
    culture and a Western perspective. This cultural capital and habitus shape the
    training and implementation of AI models, potentially encoding biases and limitations
    into the technology. The concerns about the accuracy and relevance of ChatGPT's
    responses in different cultural contexts reflect the influence of cultural capital
    on the AI system's performance. Through a Marxist lens, the concentration of power
    in these companies, along with their Western cultural context, may result in biased
    or limited representations of knowledge and perspectives. Furthermore, Heidegger's
    views on technology prompt us to question the very essence and impact of AI systems
    like ChatGPT. The concerns about cultural specificity and resulting limitations
    raise existential questions about the role and responsibility of AI in human activities.
    Moreover, the constraints posed by ChatGPT's database and potential biases call
    for critical reflection on the essence of AI, its impact on human knowledge and
    decision-making and the ethical considerations surrounding its development and
    use.
  prefs: []
  type: TYPE_NORMAL
- en: How ChatGPT May Affect the Roles of Stakeholders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For students, ChatGPT's gaps in knowledge and disciplinary context limitations
    may impact their reliance on the AI system for accurate information and analysis.
    The examples provided by the instructor and researcher demonstrate instances where
    students found their own notes or domain-specific knowledge more relevant than
    ChatGPT's responses. This suggests that students may need to critically evaluate
    and supplement the information provided by ChatGPT with their own expertise or
    additional resources. It also highlights the importance of cultivating their own
    knowledge and critical thinking skills rather than solely relying on AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Instructors may need to adapt their teaching approaches and guide students in
    effectively using ChatGPT while being aware of its limitations. They can encourage
    students to question and critically evaluate the information provided by the AI
    system, promoting a deeper understanding of the subject matter. Instructors may
    also need to provide up-to-date resources and incorporate discussions on the limitations
    of AI technologies to enhance students' awareness and discernment.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, this means that institutions of higher education have an important
    role to play in shaping the integration of AI systems like ChatGPT into their
    educational settings, providing guidelines and ethical frameworks for the responsible
    use of AI in education, to ensure that their students are aware of the limitations
    and biases associated with these technologies. Institutions should also foster
    interdisciplinary collaborations and partnerships with industry to address the
    disciplinary context limitations of ChatGPT, facilitating the development of AI
    systems with domain-specific expertise. Additionally, the concerns raised about
    cultural specificity and biases in ChatGPT's database highlight the need for institutions
    to promote cultural diversity and inclusivity in AI purchasing, development and
    utilisation. By incorporating diverse cultural systems, perspectives and datasets,
    institutions can help mitigate the potential biases and limitations, ensuring
    that they better serve the needs of students from various cultural backgrounds.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we have taken a deep dive into the influence of ChatGPT on
    students, instructors and higher education institutions within the scope of our
    key themes. Throughout our discussion, we have discerned the necessary actions
    that universities should undertake. These encompass ethical considerations, such
    as evaluating AI detection tools, critically assessing AI referencing systems,
    redefining plagiarism within the AI era, fostering expertise in AI ethics and
    bolstering the role of university ethics committees. They also encompass product-related
    matters, including ensuring equitable access to AI bots for all students, fostering
    collaborations with industries, obtaining or developing specialised bots and offering
    prompt engineering courses. Additionally, there are educational ramifications,
    like addressing AI's impact on foundational learning, proposing flipped learning
    as a strategy to navigate these challenges, reimagining curricula to align with
    the AI-driven future, advocating for AI-resilient assessment approaches, adapting
    instructional methods, harnessing the potential of prompt banks and promoting
    AI literacy. Moving forward, in the next three chapters, we discuss the practical
    implications of these findings, grouping them into ethical, product-related and
    educational implications. Thus, while this chapter has outlined the essential
    steps that must be undertaken, the following three chapters present pragmatic
    approaches for putting these actions into practice.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ethical Implications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Assessing Artificial Intelligence (AI) Detection Tools
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The ongoing debate in current discourse, as illuminated within the literature
    review, revolves around the incorporation of AI detection tools by universities
    to counteract plagiarism. Sullivan et al. (2023) discussed a variety of available
    tools for this purpose, encompassing OpenAI''s Open Text Classifier, Turnitin,
    GPTZero, Packback, HuggingFace.co, and AICheatCheck. However, reservations were
    expressed concerning the precision and sophistication of these detection mechanisms.
    Rudolph et al. (2023) shed light on the paradoxical nature of utilising AI-powered
    anti-plagiarism software while AI models, such as Chat Generative Pre-trained
    Transformer (ChatGPT), could potentially evade plagiarism detection through sentence
    modifications that lower originality index scores. Similarly, Tlili et al. (2023)
    acknowledged concerns tied to cheating and manipulation with ChatGPT, uncovering
    its role in assisting students with essays and exam responses, which could facilitate
    cheating and circumvent detection. Consequently, a scenario could emerge where
    students are tempted to delegate assignments to ChatGPT or employ it to sidestep
    plagiarism checks, thereby raising questions about the authenticity of their work.
    Given this context, educational institutions and educators are confronted with
    the urgent responsibility of addressing these challenges and devising guidelines
    to regulate the utilisation of AI tools in education. The necessity for robust
    measures to counteract cheating and ensure prevention has become a central concern.
    However, a crucial question arises: Can this be feasibly achieved using the existing
    AI detection tools? Recent research appears to suggest otherwise. A study released
    in June by researchers from European universities brought forward the assertion
    that the existing detection tools lack precision and dependability, displaying
    a predominant inclination to categorise content as human-written rather than detecting
    AI-generated text (Williams, 2023). Prior to this, another study highlighted the
    disproportionate disadvantage faced by non-native English speakers, as their narrower
    vocabularies resulted in elevated penalties compared to native speakers (Williams,
    2023). Furthermore, a separate investigation conducted by scholars from the University
    of Maryland underscored the issue of inaccuracy and demonstrated that detectors
    could be readily circumvented by students employing paraphrasing tools to rephrase
    text initially created by large language models (Williams, 2023). So where does
    this leave universities?'
  prefs: []
  type: TYPE_NORMAL
- en: 'To explore this matter further, at our institution, the director of the library
    extended invitations to AI detection tool companies, enabling them to deliver
    presentations on their products. This platform allowed them to demonstrate their
    upgraded tools, followed by interactive question and answer sessions aimed at
    obtaining more profound insights. According to the companies'' claims, they have
    incorporated AI writing detection capabilities into their tools, aiming to assist
    educators in maintaining academic integrity and fairness among students. These
    capabilities include an AI writing indicator that is integrated within the originality
    reports. This indicator provides an overall percentage indicating the likelihood
    of AI-generated content, such as text produced by ChatGPT. Additionally, it generates
    a report highlighting specific segments predicted to be authored by AI. The companies
    emphasise that the AI writing indicator is intended to provide educators with
    data for decision-making based on academic and institutional policies, rather
    than making definitive determinations of misconduct, and caution against solely
    relying on the indicator''s percentage for taking action or as a definitive grading
    measure. Now, the question remains: How do these AI detectors actually work?'
  prefs: []
  type: TYPE_NORMAL
- en: AI writing detection tools operate by segmenting submitted papers into text
    segments and assessing the probability of each sentence being written by a human
    or generated by AI, providing an overall estimation of the amount of AI-generated
    text. However, unlike traditional plagiarism detection tools that employ text-matching
    software to compare essays against a vast database of existing sources and highlight
    specific matches, AI plagiarism detection tools offer probabilities or likelihoods
    of content being AI-generated, based on characteristics and patterns associated
    with AI-generated text. The proprietary nature of these AI detection systems often
    limits transparency, making it challenging for instructors and institutions to
    verify the accuracy and reliability of what is purported to be AI-generated content.
    This lack of concrete evidence has significant implications, particularly in cases
    where students face plagiarism accusations and legal action, as it becomes more
    difficult to substantiate claims and defend against accusations without explicit
    evidence of the sources.
  prefs: []
  type: TYPE_NORMAL
- en: Two recent cases at the University of California Davis shed light on the challenges
    universities encounter with AI detection software. One case involved William Quarterman,
    a student who received a cheating accusation from his professor after the professor
    used the AI-powered tool GPTZero to analyse Quarterman's history exam for plagiarism
    (Jiminez, 2023). Despite Quarterman's adamant denial, the software supported the
    professor's claim, resulting in a failing grade and a referral for academic dishonesty.
    The subsequent honour court hearing caused significant distress to Quarterman,
    who ultimately proved his innocence and was exonerated. In a similar incident,
    Louise Stivers, a graduating senior, was falsely accused of plagiarism (Klee,
    2023). The investigation revealed a significant limitation in the AI plagiarism
    detection software used at UC Davis – the software had been trained on a narrow
    dataset that failed to account for the diverse writing styles and cultural backgrounds
    of the student body. This highlighted the issue of cultural bias in AI algorithms
    and emphasised the need for more inclusive AI development. As a result of being
    wrongfully accused, Stivers actively collaborated with the university to enhance
    the software's inclusivity and accuracy. Her contribution aimed to foster a fairer
    approach to AI technology in academic settings, ensuring that it better accommodates
    the diverse student population and provides accurate results in detecting plagiarism
    (Klee, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: Thus, the decision to use AI detection tools in universities is a topic of concern
    and discussion. Kayla Jiminez (2023) of *USA Today* highlights the advice of educational
    technology experts, cautioning educators about the rapidly evolving nature of
    cheating detection software. Instead of immediately resorting to disciplinary
    action, experts suggest asking students to show their work before accusing them
    of using AI for assignments. Neumann et al. (2023) support this approach and recommend
    a combination of plagiarism checkers and AI detection tools, with manual examination
    as a backup. They stress the importance of thorough reference checks and identifying
    characteristics of AI-generated content. Rudolph et al. (2023) also acknowledge
    the limitations of anti-plagiarism software in detecting ChatGPT-generated text
    and propose building trusting relationships with students and adopting student-centric
    pedagogies and assessments. They discourage a policing approach and emphasise
    assessments for and as learning. At MEF, we concur with this perspective. Based
    on our investigations, we believe that current AI detection tools are not suitable
    for their intended purpose. Instead of relying solely on such tools, we suggest
    implementing alternative supports for assessing students' work, such as one-to-one
    discussions or moving away from written assessments altogether. We believe the
    solution is to ban AI detection tools but not AI itself.
  prefs: []
  type: TYPE_NORMAL
- en: Scrutinising AI Referencing Systems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The absence of a standard referencing guide for ChatGPT poses significant challenges
    for users in academic contexts, including the lack of provided references and
    established guidelines for referencing ChatGPT-generated information. However,
    we can break down these challenges into three key issues. Firstly, ChatGPT itself
    does not cite the sources it has used. Secondly, users may treat ChatGPT as a
    search engine, requiring them to cite it, but no standard referencing systems
    currently exist. Thirdly, ChatGPT can be used as a tool to develop ideas and improve
    writing, raising the question of whether a referencing system should be used at
    all in such instances.
  prefs: []
  type: TYPE_NORMAL
- en: In addressing the first concern, researchers have been working on developing
    a system for ChatGPT to identify the sources of its information. Rudolph et al.
    (2023) highlight significant progress in this area, such as the creation of the
    prototype WebGPT, providing access to recent and verified sources. Additionally,
    AI research assistants like Elicit assist in locating academic articles and summarising
    scholarly papers from repositories. At our institution, we also tested the beta
    plugin for ChatGPT-4 called ScholarAI, which yielded promising results. ScholarAI
    grants users access to a database of peer-reviewed articles and academic research
    by linking the large language models (LLMs) powering ChatGPT to open access Springer-Nature
    articles. This integration allows direct queries to relevant peer-reviewed studies.
    These advancements aim to bolster the quality and credibility of academic work
    by incorporating up-to-date information and reliable sources. Consequently, we
    believe the responsibility for implementing a source identification system lies
    with the developers, while the responsibility of institutions of higher education
    is to remain updated on these developments.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding the second concern, which revolves around the absence of a referencing
    model for using ChatGPT as a source of information, it is important to note that
    this issue currently remains unresolved. At the time of writing, there are no
    standard referencing systems specifically designed for ChatGPT or similar AI chatbots.
    However, teams like American Psychological Association (APA) and Modern Language
    Association (MLA) are actively engaged in developing guidelines that address the
    citation and appropriate usage of generative AI tools. In spring 2023, they provided
    interim guidance and examples to offer initial direction. However, before delving
    into the specific efforts of teams like APA and MLA, let's first understand the
    fundamental purpose of referencing sources in an academic paper. Referencing sources
    in an academic paper serves several crucial purposes. Firstly, it allows you to
    give credit to the original authors or creators of the work, acknowledging their
    contributions and ideas. By doing so, you demonstrate that you have engaged with
    existing research and built upon it in your own work. Secondly, referencing supports
    your claims and arguments by providing evidence from reputable sources. This adds
    credibility to your paper and shows that your ideas are well-founded and supported
    by existing literature. Moreover, proper referencing enables readers to verify
    the accuracy and reliability of your information. By following the references
    to the original sources, they can ensure the integrity of your work and establish
    trust in your findings. By citing sources, you showcase your research skills and
    ability to identify relevant and reliable information. It reflects your understanding
    of the field and your contribution to the broader scholarly conversation. Referencing
    also plays a crucial role in avoiding unintentional plagiarism. By properly attributing
    the sources you have used, you demonstrate that you have built upon existing knowledge
    rather than presenting it as your own. Additionally, citing sources contributes
    to the academic community by establishing connections between your work and that
    of others in the field. It fosters an ongoing scholarly discussion and helps shape
    the future of research. Overall, referencing is an integral part of academic integrity,
    ensuring that a paper is well-researched, credible and part of the larger academic
    conversation.
  prefs: []
  type: TYPE_NORMAL
- en: With this in mind, let's take a look at what one of the leading citation and
    referencing organisations is suggesting. APA suggests that when incorporating
    text generated by ChatGPT or other AI tools in your research paper, you should
    follow certain guidelines (McAdoo, 2023). They suggest that if you have used ChatGPT
    or a similar AI tool in your research, you should explain its utilisation in the
    method section or a relevant part of your paper. For literature reviews, essays,
    response papers or reaction papers, they suggest describing the tool's usage in
    the introduction and that, in your paper, you should provide the prompt you used
    and include the relevant portion of the text that ChatGPT generated in response.
    However, they warn that it is important to note that the results of a ChatGPT
    ‘chat’ cannot be retrieved by other readers and that, while in APA Style papers,
    non-retrievable data or quotations are typically cited as personal communications,
    ChatGPT-generated text does not involve communication with a person (McAdoo, 2023).
    Therefore, when quoting ChatGPT's text from a chat session, they point out that
    it is more akin to sharing the output of an algorithm. They therefore suggest
    that in such cases, you should credit the author of the algorithm with a reference
    list entry and the corresponding in text citation. They give the following example.
  prefs: []
  type: TYPE_NORMAL
- en: When prompted with “Is the left brain right brain divide real or a metaphor?”
    the ChatGPT-generated text indicated that although the two brain hemispheres are
    somewhat specialised, “the notation that people can be characterised as ‘left-brained’
    or ‘right-brained’ is considered to be an oversimplification and a popular myth”
    (OpenAI, 2023).
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI. (2023). ChatGPT (Mar 14 version) [Large language model]. https://chat.openai.com/chat
  prefs: []
  type: TYPE_NORMAL
- en: 'They also suggest that in an APA Style paper, you have the option to include
    the full text of lengthy responses from ChatGPT in an appendix or online supplemental
    materials. They say that ensures that readers can access the precise text that
    was generated, however, they note that it is crucial to document the exact text
    as ChatGPT will produce unique responses in different chat sessions, even with
    the same prompt (McAdoo, 2023). Therefore, they suggest that if you choose to
    create appendices or supplemental materials, you should remember to reference
    each of them at least once in the main body of your paper. They give the following
    example:'
  prefs: []
  type: TYPE_NORMAL
- en: When given a follow-up prompt of “What is a more accurate representation?” the
    ChatGPT-generated text indicated that “different brain regions work together to
    support various cognitive processes” and “the functional specialisation of different
    regions can change in response to experience and environmental factors” (OpenAI,
    2023; see Appendix A for the full transcript).
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI. (2023). ChatGPT (Mar 14 version) [Large language model]. https://chat.openai.com/chat
  prefs: []
  type: TYPE_NORMAL
- en: 'APA also suggests that when referencing ChatGPT or other AI models and software,
    you can follow the guidelines provided in Section 10.10 of the Publication Manual
    (American Psychological Association, 2020, Chapter 10) (McAdoo, 2023). They note
    that these guidelines are primarily designed for software references and suggest
    these can be adapted to acknowledge the use of other large language models, algorithms
    or similar software. They suggest that reference and in text citations for ChatGPT
    should be formatted as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI. (2023). ChatGPT (Mar 14 version) [Large language model]. https://chat.openai.com/chat
  prefs: []
  type: TYPE_NORMAL
- en: 'Parenthetical citation: (OpenAI, 2023)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Narrative citation: OpenAI (2023)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let''s examine APA''s suggestions and critique them based on the fundamental
    purpose of referencing sources in an academic paper: giving credit, supporting
    arguments and claims, enabling verification of source accuracy and demonstrating
    proper research skills. We can do this by posing questions.'
  prefs: []
  type: TYPE_NORMAL
- en: '*When using ChatGPT, is it possible to give credit to the original authors
    or creators by referencing sources in an academic paper?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No, ChatGPT itself cannot give credit to original authors or creators in an
    academic paper. As a language model, it lacks the capability to identify or reference
    external sources. Hence, it becomes the researcher's responsibility to ensure
    proper attribution of credit to the original authors or creators of the information
    used in a paper.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Is it possible to use ChatGPT to support arguments and claims with evidence
    by citing reputable sources?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No. ChatGPT can provide responses based on the input it receives, which may
    include references to information or data. However, ChatGPT generates text based
    on the patterns it has learnt from the data it was trained on and does not have
    the ability to verify the credibility or reliability of the sources it may refer
    to. Therefore, researchers should independently verify and cite reputable sources
    to support their arguments and claims.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Is it possible to use ChatGPT to enable verification of the accuracy and reliability
    of information by providing references to the original sources?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No, ChatGPT does not have the capability to provide references to original sources.
    If information generated by ChatGPT is used in research, it is the researcher's
    responsibility to find and cite the original sources from which the information
    is derived.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Can ChatGPT be used to demonstrate research skills by properly referencing
    relevant and reliable sources?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No. As a language model, ChatGPT does not have the ability to demonstrate research
    skills or properly reference sources. Therefore, the responsibility for conducting
    thorough research and citing relevant and reliable sources lies with the researcher.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Can ChatGPT be used to avoid unintentional plagiarism by citing sources and
    giving credit where it is due?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No. While ChatGPT may provide responses based on the input it receives, it is
    not equipped to identify or prevent unintentional plagiarism. Therefore, it is
    the researcher's responsibility to ensure that they properly cite and give credit
    to the original sources of information to avoid plagiarism.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Can ChatGPT be used to contribute to the academic community by citing existing
    research and establishing connections between a researcher''s work and the work
    of others in the field?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No. While ChatGPT can provide information based on the input it receives, it
    is not capable of contributing to the academic community by citing existing research
    or establishing connections between works. Therefore, researchers should independently
    conduct literature reviews and cite relevant works to contribute to the academic
    discourse.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The resounding answer to all the questions we posed above is a definitive ‘no’.
    While we acknowledge APA's well-intentioned efforts to address academic integrity
    concerns by suggesting ways to cite ChatGPT, we find their recommendations unfit
    for purpose. If the goal of referencing is to enable readers to access and verify
    primary sources, APA's suggestions do not align with this objective. They merely
    indicate that ChatGPT was utilised, which demonstrates the writer's academic integrity
    but does not provide any practical value to the reader. In fact, based on this,
    we believe that ChatGPT, in its current form, should be likened to Wikipedia –
    a useful tool as a starting point for research, but not to be used as a valid
    source for research. Therefore, we believe that to ensure the validity of the
    research, ChatGPT should be seen as a springboard for generating ideas, from which
    the researcher can then seek out primary sources to support their ideas and writing.
    Hence, it would be more beneficial for researchers to simply cite the sources
    they have fact-checked, as this approach provides valuable information to the
    reader.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let''s address our third area of concern, which revolves around ChatGPT
    being used as a tool for idea development and writing enhancement. This raises
    the question of whether a referencing system is applicable in such instances.
    To shed light on this matter, we explore MLA''s suggestions on how to reference
    ChatGPT when it serves as a writing tool. MLA suggests that you should: ‘cite
    a generative AI tool whenever you paraphrase, quote, or incorporate into your
    own work any content (whether text, image, data, or other) that was created by
    it; acknowledge all functional uses of the tool (like editing your prose or translating
    words) in a note, your text, or another suitable location; take care to vet the
    secondary sources it cites’ (*How Do I Cite Generative AI in MLA Style?*, n.d.).
    In our previous discussion, we have already addressed the third point. If you
    need to verify the secondary sources cited by ChatGPT, why not simply use those
    vetted sources in your citation and referencing, as this is more helpful for the
    reader. However, we still need to explore the other aspects concerning the recommendation
    to cite an AI generative tool. For instance, when paraphrasing or using the tool
    for functional purposes like editing prose or translating words, how should this
    be implemented in practice? In order to do this, let''s explore how ChatGPT has
    been utilised in the writing of this book. Notably, ChatGPT was not used as a
    search engine, evident from the majority of our referenced articles and papers
    being published after September 2021, which is ChatGPT''s cutoff for new information.
    However, it played a significant role in the research process, as documented in
    the researcher-facing diary and integrated into the write up of this book. While
    we''ve already discussed its role in the research methodology and through examples
    in the findings and interpretation chapter, we now focus specifically on how ChatGPT
    contributed to the writing process of this book. To illustrate the full scope
    of its assistance, we revisit Bloom''s Taxonomy, which provides a useful framework
    for mapping the most commonly used phrases we employed with ChatGPT during the
    writing phase.'
  prefs: []
  type: TYPE_NORMAL
- en: Remembering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Reword this paragraph to improve its coherence.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Slightly shorten this section to enhance readability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Summarise the key arguments presented in this article.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Explain the main ideas in this text using simpler language.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Paraphrase the content of this article.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Shorten this text but keep its core concepts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analysing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Evaluate the strengths and weaknesses of this theory and propose ways to reinforce
    its main points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Analyse this text through the lens of (this theorist).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Assess the effectiveness of this argument and suggest improvements to make
    it more impactful.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluating
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Critically assess the clarity of this text and rephrase it for better comprehension.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Evaluate the impact of this section and propose a shorter version that retains
    its persuasive strength.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Provide a more concise version of this text while retaining its core meaning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: –Summarise this chapter in a concise manner while retaining its key findings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have we referenced all instances of the examples above? No. And there are reasons
    for this. As discussed in the findings, it's crucial to go through multiple iterations
    when using ChatGPT. This raises the question of whether we should reference all
    the iterations or only the final one. Additionally, ChatGPT was a constant tool
    throughout the writing of this book. If we were to reference every instance, following
    MLA's suggestion, the book would likely become five times longer and mostly consist
    of references, which would not be beneficial to the reader. Considering that one
    of the purposes of referencing is to aid the reader, MLA's suggestions seem unsuitable
    for this purpose. Indeed, referencing every instance of ChatGPT use would be akin
    to a mathematician citing each time they used a calculator, rendering the referencing
    of it impractical. Similarly, other writing tools like Grammarly have not been
    subject to such exhaustive referencing expectations. Following on from our mathematics
    example, it should be noted that AI chatbots, including ChatGPT, have been likened
    to calculators for words. However, we find this view a little simplistic. Unlike
    calculators, AI chatbots have advanced capabilities that extend beyond basic tasks,
    reaching higher levels of Bloom's Taxonomy, such as applying, analysing, evaluating
    and creating, thereby fulfilling tasks that are usually considered to part and
    parcel of what it means to be a writer. This leads us to ask, what does it mean
    to be a writer in the days of AI?
  prefs: []
  type: TYPE_NORMAL
- en: In the era of AI, the role of a writer takes on a whole new dimension, with
    AI models now capable of performing tasks that were traditionally considered the
    sole domain of human writers. This blurs the lines between human creativity and
    AI assistance, raising concerns about potential loss of human agency in the writing
    process, as evidenced in the Hollywood script writers strike, which also highlights
    the risk of significant job losses. One of the key challenges of relying solely
    on AI for writing is that it heavily relies on previous input, potentially stifling
    new thoughts, developments and creativity. To avoid these issues, we believe being
    a writer in the AI era requires embracing a collaborative approach between human
    intellect and AI technology. Instead of replacing human writers, AI can be harnessed
    as a supportive tool. Writers now have the opportunity to utilise AI tools to
    enhance various aspects of the writing process, such as idea generation, content
    organisation and language refinement. By offloading repetitive and time-consuming
    tasks to AI, writers can dedicate more attention to crafting compelling narratives,
    conducting in-depth analyses and expressing unique perspectives. They should also
    actively maintain their critical thinking abilities and originality, ensuring
    that AI assistance complements and augments their creative expression, rather
    than replacing it. We believe that, ultimately, being a writer in the AI era involves
    striking a balance between leveraging the opportunities AI technology provides
    and preserving the essential human aspects of creativity and originality in the
    writing process. This is exactly what we have done in this book. However, finding
    this equilibrium between human writers and AI remains a significant challenge
    and will shape the future landscape of writing in ways that are yet to be fully
    realised.
  prefs: []
  type: TYPE_NORMAL
- en: Rethinking Plagiarism in the Age of AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Throughout this chapter, our exploration has centred on AI detector tools, revealing
    their inability to meet intended expectations. Additionally, we've examined the
    emerging guidelines for referencing AI chatbots, such as ChatGPT, and determined
    their inadequacy. This, therefore, raises questions about how we deal with plagiarism
    in light of these new challenges. However, it's important to acknowledge that
    the new challenge posed by plagiarism in the AI era is not unfamiliar in academia.
    Over the years, with the advent of new technologies, similar situations have arisen,
    most notably following the launch of Wikipedia in 2001, followed by the rise of
    contract cheating sites. These events required institutions to recalibrate their
    understanding of academic work and research paradigms. Today, as work produced
    by AI becomes a fact of life, universities find themselves faced with the task
    of adjusting their regulations, expectations and perspectives to accommodate these
    technological breakthroughs. But before we proceed further in this discussion,
    it's crucial to understand the core concept of plagiarism.
  prefs: []
  type: TYPE_NORMAL
- en: Plagiarism constitutes the act of using another's work or ideas without giving
    them appropriate recognition, often with the aim to present it as one's own creation.
    This could involve directly copying and pasting text from a source without citation,
    closely paraphrasing another's work or even submitting someone else's entire work
    as your own. Many sectors, including academia and journalism, view plagiarism
    as a severe ethical breach. However, plagiarism is not always a deliberate act.
    It can occur accidentally, particularly if there is a lack of due diligence or
    understanding about what constitutes plagiarism, how to cite correctly or the
    correct way to paraphrase and reference. Until now, students have had clear guidelines
    on how to cite and reference sources. They have also had the option to utilise
    plagiarism detectors to review their work and make necessary modifications. However,
    the advent of AI chatbots has complicated the situation. There are currently no
    universally accepted referencing guidelines for citing AI, and the reliability
    of AI-based detector tools is questionable. And if plagiarism is defined as the
    act of utilising another's work or ideas without giving them due acknowledgement,
    how does this definition evolve when the work in question is created by an AI
    and not a human? This paradigm shift blurs the traditional understanding of plagiarism
    and introduces the concept of ‘appropriating’ work from an AI, which, unlike humans,
    doesn't possess identifiable authorship or an individual identity. Interestingly,
    it could be posited that the AI chatbots themselves could be seen as ‘appropriating’
    all the information they generate without crediting the original authors. Thus,
    a conundrum emerges where students may be using AI in an unethical manner without
    referencing it, whilst the AI itself is using information without appropriate
    citation. It is this very conundrum that leads to the multitude of challenges
    we are currently grappling with, concerning how we can even cite and reference
    AI. So, the question arises, where does this new reality place students and academics?
  prefs: []
  type: TYPE_NORMAL
- en: Neumann et al. in their 2023 study, acknowledged the existence of several pending
    inquiries that need further exploration, such as, ‘Should text generated by ChatGPT
    be considered a potential case of plagiarism?’, ‘How ought one to reference text
    produced by ChatGPT?’ and ‘What is an acceptable ratio of ChatGPT-generated text
    relative to the overall content?’. However, they also recognised that numerous
    other questions will inevitably emerge. Despite these considerations, given the
    current circumstances, especially the inherent issues with AI, namely their lack
    of citation for their own sources, these queries appear somewhat naive. Perhaps
    it would be more beneficial to explore alternative strategies. This could potentially
    involve designing assignments in a way that circumvents the plagiarism issue,
    a topic we discuss later in Chapter 9\. Alternatively, we may need to concentrate
    our efforts on fostering AI ethical literacy, a promising emerging field.
  prefs: []
  type: TYPE_NORMAL
- en: Cultivating Proficiency in AI Ethics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Academic integrity lies at the core of ethical academic practice. It is composed
    of a set of guiding principles and conduct that nurtures honesty and ethical behaviour
    within the academic community. This moral compass or ethical code of academia
    embodies values such as honesty, trust, fairness, respect and responsibility.
    From a practical perspective, academic integrity manifests when both students
    and faculty members refrain from dishonest activities such as plagiarism, cheating
    and fabrication or falsification of data. They are anticipated to own their work,
    acknowledge others for their contributions, and treat all academic community members
    with respect. The goal of upholding academic integrity is to cultivate an environment
    that fosters intellectual curiosity and growth while ensuring that everyone's
    work is acknowledged and valued. It holds a crucial role in affirming the quality
    and reliability of the educational system and the research it generates. However,
    as discussed above, the incorporation of new advancements in AI into this environment
    presents complex challenges. As such, it appears imperative that the notion of
    academic integrity advances in parallel with these breakthroughs in AI, with numerous
    voices, including Sullivan et al. (2023) advocating for an amplified emphasis
    on AI ethics literacy. This would mean reshaping the tenets of academic integrity
    to cater to the unique challenges and opportunities presented by this game-changing
    technology. But what exactly is AI ethics literacy?
  prefs: []
  type: TYPE_NORMAL
- en: AI ethics literacy encapsulates the ability of users to apply ethical considerations
    and principles in the utilisation of AI technologies. This concept underlines
    the importance of understanding the intricacies of AI systems, their strengths
    and limitations, in order to make informed decisions. Simultaneously, it requires
    the awareness of potential ethical concerns that can stem from AI usage, such
    as bias, transparency issues, privacy breaches and accountability. The essence
    of AI ethics literacy is embedded in the critical thinking process, which pushes
    individuals to question the usage, benefits, potential harm and the inequities
    that may arise from AI implementation. It underscores the necessity of utilising
    AI responsibly, respecting individuals' rights and privacy, and discerning scenarios
    where AI application may be detrimental or unethical. Furthermore, it invites
    an element of advocacy and activism, championing for ethically sound AI practices
    and regulations, while actively opposing harmful AI implementations. As AI technologies
    continue to evolve and permeate various domains, cultivating AI ethics literacy
    grows increasingly crucial. It serves as a conduit to ensure AI technologies are
    wielded in an ethical and responsible manner, upholding human rights while advocating
    for fairness and transparency. We delve deeper into this topic later in Chapter
    9, where we discuss the importance of AI literacy training for both students and
    educators. However, the most logical starting point to address these concerns
    is likely through established university ethics committees.
  prefs: []
  type: TYPE_NORMAL
- en: Enhancing the Role of University Ethics Committees
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Chapter 2 delved into the rapid evolution of AI ethics, highlighting how the
    rise of generative AI systems has spurred urgency in addressing issues like fairness,
    bias, and ethics. Heightened concerns about discrimination and bias, particularly
    in conversational AI and image models, have prompted ethical inquiries. Nevertheless,
    as we have seen, proactive measures are being taken, with increased research,
    industry involvement and a surge of conferences and workshops focusing on fairness
    and bias, with concepts such as interpretability and causal inference gaining
    prominence in these discussions. At the same time, privacy issues linked to AI
    have initiated discussions on privacy safeguards. Furthermore, worries about how
    generative AI uses opaque surveillance data have also emerged, raising copyright
    and creator-related concerns. This intricate ethical landscape is expanding as
    AI becomes more ingrained in society, necessitating careful oversight beyond technical
    aspects. In light of this complexity, we advocate for an expanded role for university
    ethics committees. Traditionally focused on human research and medical ethics,
    we believe these committees should expand their remit to encompass various dimensions
    related to AI adoption in education. We believe this should entail evaluating
    issues such as student data privacy, algorithmic biases, transparency and human-AI
    interactions. We believe ethics committees should also be working towards ensuring
    AI systems' transparency in educational contexts, assessing the inclusivity of
    AI-generated content and facilitating informed consent for student data use. They
    should also be leading research into AI's ethical implications in education, including
    AI-supported learning, content biases and overall student impact. Beyond academia,
    broader ethical concerns encompass privacy, consent and intellectual property.
    Using AI tools for student work requires compliance with regulations, such as
    the EU's General Data Protection Regulations (GDPR). Ethical dilemmas also arise
    from researchers' and students' use of AI, raising questions about academic integrity
    and ownership of AI-generated outcomes. Ownership rights regarding information
    in AI systems, especially in innovative areas like product development or patent
    creation, present complex challenges. These intricate ethical considerations underscore
    the essential role of university ethics committees in navigating AI's integration
    in education and research. Their expanded responsibilities will demand vigilance,
    adaptability and robust ethical guidelines to ensure AI's ethical advancement
    while upholding values of privacy, fairness and intellectual ownership.
  prefs: []
  type: TYPE_NORMAL
- en: Within this chapter, we have explored several ethical ramifications associated
    with AI chatbots. These include concerns with AI detection tools, complications
    regarding AI ChatGPT referencing, redefining plagiarism in the AI era, fostering
    AI ethics literacy and the expansion of university ethics committees. Looking
    ahead, the next chapter delves into the implications regarding products.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Product Implications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ensuring Fair Access to Bots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ensuring equitable access to artificial intelligence (AI) bots within universities
    is a crucial consideration to prevent creating a digital divide among students.
    At MEF, we have effectively addressed similar concerns with other applications
    like digital platforms and massive open online courses (MOOCs). Our strategy involves
    procuring institutional licences that encompass all students. This approach has
    proven successful in achieving fair access. Presently, we are aiming to extend
    this approach to AI chatbots. However, it's worth noting that at the moment, specific
    institutional agreements tailored for Chat Generative Pre-trained Transformer
    (ChatGPT) are not available, leading us to explore alternative avenues. One potential
    solution we are actively considering is obtaining ChatGPT-4 licences for each
    instructor. This strategy would empower instructors to share links to specific
    chat interactions within the tool, enhancing classroom engagement during lessons.
    Nonetheless, an existing constraint with GPT-4 pertains to its hourly completion
    capacity for requests, which might impact its overall utility in certain contexts.
    While procuring individual licences for instructors to access specific AI chatbots
    may not be an ideal permanent solution, it serves as a temporary measure until
    institutional licences become available or until we consider acquiring or developing
    specialised bots for each department.
  prefs: []
  type: TYPE_NORMAL
- en: We are also in the process of exploring Microsoft Bing, which has integrated
    AI into its Edge browser and Bing search engine. This technology draws on the
    same foundation as OpenAI's ChatGPT, offering an AI-powered experience accessible
    through mobile applications and voice commands. Similar to ChatGPT, Bing Chat
    enables users to interact naturally and receive human-like responses from the
    expansive language model. Although Bing Chat features have been progressively
    introduced and are now widely available, our institution's preference for Google
    services makes a Google-based solution more fitting. Google offers Bard, an experimental
    AI chatbot similar to ChatGPT. However, Bard stands out by gathering information
    from the web. It can handle coding, maths problems and writing assistance. Bard
    was launched in February 2023 and is powered by Google's PaLM 2 language model.
    While it initially used LaMDA, Google's dialogue model, it switched to PaLM 2
    later for better performance. Bard is multilingual and has the ability to include
    images in its responses. Despite these features, Bard faced criticism upon release.
    Users found it sometimes gave incorrect information and was not as good as competitors
    like ChatGPT and Bing Chat. To address these issues, Google shifted from LaMDA
    to PaLM 2\. PaLM 2 is an improved version of Google's language model, built upon
    the lessons learnt from earlier models like LaMDA. It incorporates advancements
    in training techniques and model architecture, leading to better overall performance
    in understanding and generating language. We have now activated Google Bard at
    MEF so it is active for all of our students and instructors, and, at the time
    of writing, are now evaluating it as a possible solution.
  prefs: []
  type: TYPE_NORMAL
- en: In our ongoing efforts to secure institutional agreements with major large language
    model companies, and while we are trialling the effectiveness of Bard, it's important
    to acknowledge that if this endeavour does not come to fruition by the start of
    the upcoming academic year, a contingency plan will be activated. In this scenario,
    instructors could launch a survey at the beginning of a course to identify students
    who have registered with AI chatbots and tools and are willing to share them with
    peers. By grouping students with tool access alongside those without, the principle
    of equitable classroom utilisation would be upheld. This approach carries further
    benefits. If our educational focus is to foster collaborative engagement within
    student-centred classes, encouraging students to share tools would circumvent
    the isolation that arises when each student interacts individually with their
    bot. Instead, this practice of shared tool usage would promote collective involvement
    and cooperative learning. It is also worth keeping in mind there will always be
    open-source alternatives available. These currently include OpenAI's GPT-3, BERT,
    T5, XLNet and RoBERTa.
  prefs: []
  type: TYPE_NORMAL
- en: Fostering Collaboration with Industries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To address the significant challenge of preparing students for an AI-dominated
    world, we believe universities should adopt a proactive approach by reverse-engineering
    ChatGPT and AI chatbot opportunities through industry collaborations, as this
    will enable them to gain valuable insights into the evolving skill demands and
    job requirements driven by AI advancements. Based on their findings, universities
    will be able to reassess existing programmes and curricula to align them with
    the changing needs of the job market. This process should involve identifying
    crucial AI-related skills and considering their integration into various disciplines.
    Additionally, universities can develop new programmes that specifically address
    the emerging opportunities created by AI technologies. Ideally, such courses should
    be developed by incorporating real-world industry problems at their core, allowing
    students to work towards finding solutions by the end of the course as part of
    their assessment. This has been done at the University of South Florida where
    they co-created a programme with industry partners, the success of which led to
    high graduate job placement and salaries (Higher Education That Works, 2023).
    This type of collaborative approach also paves the way for more students to undertake
    internships with these companies. Furthermore, through their research, by identifying
    the types of AI bots industries are currently using, universities can make informed
    decisions on whether to purchase or develop discipline-specific bots for their
    departments. This will ensure that graduates are equipped with the specialised
    knowledge and skills of the AI bots relevant to their chosen fields, better preparing
    them for the AI-driven job market. However, it should be noted that adopting this
    reverse engineering approach needs to be an ongoing effort. Universities must
    continuously assess industry trends, collaborate closely with industry partners
    and engage AI experts to ensure their programmes and their AI tools remain up
    to date and responsive to technological advancements.
  prefs: []
  type: TYPE_NORMAL
- en: Acquiring or Developing Specialised AI Bots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While we have discussed how currently, we are actively seeking solutions to
    ensure equitable access to a generic AI chatbot for all our students, it is crucial
    to acknowledge that this is an interim measure. Our research revealed that generic
    AI bots may not fully align with our requirements, mainly due to their limitations
    in disciplinary knowledge and cultural databases. Therefore, universities are
    left with two viable choices. They can either invest in a ready-made discipline-specific
    bot that caters to their specific needs, also known as ‘walled gardens’, or they
    opt for an empty bot that can be customised with relevant content tailored to
    their department and locale. Each approach offers distinct advantages and should
    be carefully considered based on the unique requirements and preferences of the
    university and department. Let's start by looking at walled gardens.
  prefs: []
  type: TYPE_NORMAL
- en: 'Walled garden AI represents a distinctive strand of AI, characterised by its
    focused training on curated datasets. Unlike broader AI models, which draw from
    extensive internet data, walled garden AI thrives on limited, carefully selected
    information (Klein, 2023). This specialised AI variant has found relevance in
    education due to its potential to yield more trustworthy and dependable AI tools
    for both educators and students (Klein, 2023). Notably, walled garden AI underpins
    the creation of chatbots capable of delivering precise and current educational
    insights. The advantages of walled garden AI within the education sphere are manifold:
    its restricted dataset cultivates reliability by minimising the risk of generating
    incorrect or misleading responses; the involvement of reputable organisations
    in its development establishes a foundation of trust for educators and students,
    ensuring accuracy and dependability; and walled garden AI''s malleability allows
    for personalised interactions, accommodating unique educational needs (Klein,
    2023). However, this approach is not without challenges: the focused development
    of walled garden AI may result in higher costs compared to more generalised models;
    the accuracy of its responses is contingent on the quality of its training data;
    and potential biases stemming from the training data must be addressed to ensure
    equitable outcomes (Klein, 2023). Therefore, while walled garden AI possesses
    significant potential as an educational tool, a nuanced understanding of its development
    and deployment is vital, as its advantages must be weighed against the inherent
    challenges and considerations it entails (Klein, 2023). BioBERT, SciBERT, ClinicalBERT,
    FinanceBERT, MedBERT, PubChemAI, PatentBERT and LegalBERT are all examples of
    walled garden AI, each being tailored to specific domains. These models are meticulously
    trained on curated datasets that are tightly aligned with their respective domains.
    As a consequence, they excel in comprehending and generating content that pertains
    to the distinct subject matter they specialise in. By catering to unique domains
    such as biomedicine, scientific research, clinical literature, finance, medicine,
    chemistry, drug discovery, patent analysis and legal matters, these models can
    offer professionals and researchers an invaluable tool for tasks that demand a
    profound understanding of subject-specific information. However, it is worth noting
    that this specialisation comes with both strengths and limitations, as these models
    might not perform optimally when handling tasks that require a more expansive
    and diverse knowledge base.'
  prefs: []
  type: TYPE_NORMAL
- en: Instead of purchasing specialised bots, an alternative approach is to acquire
    an ‘empty bot’ or a pre-trained language model and conduct fine-tuning specific
    to your discipline. Fine-tuning involves training a pre-trained language model
    on a domain-specific data set, enabling it to better comprehend the requirements
    of your field. This process saves time and resources compared to training a language
    model from scratch since pre-trained models already possess a solid foundation
    of language understanding. Fine-tuning builds upon this foundation, making the
    model more suitable for specialised tasks within your domain. However, successful
    fine-tuning relies on the availability and quality of your domain-specific dataset,
    requiring expertise in machine learning and natural language processing for optimal
    results. Several open-source pre-trained language models serve as starting points
    for fine-tuning discipline-specific bots. Popular models like BERT, GPT, RoBERTa,
    XLNet, ALBERT and T5 have been developed by leading organisations and can be fine-tuned
    for various natural language processing tasks. These models form robust foundations,
    which can be adapted to your domain by fine-tuning them with relevant datasets.
    Nevertheless, considering the rapid advancements in the field, it is imperative
    that universities continuously explore the latest developments to find the most
    up to date open-source language models suitable for their purposes.
  prefs: []
  type: TYPE_NORMAL
- en: When considering the adoption of AI bots in universities, the decision-making
    process should involve discussions with each faculty and department. Whether opting
    for an institutional generic bot, purchasing a pre-trained discipline-specific
    bot or acquiring an empty bot for fine-tuning, it is crucial to involve relevant
    stakeholders in the decision-making process. As previously discussed, departments
    should proactively explore the industry landscape to identify the bots used in
    their respective fields and then reverse engineer from those insights to determine
    the most suitable bot type for their department. However, we understand that not
    all institutions may have the financial resources to afford such endeavours. In
    such cases, as a viable backup option, we recommend universities to explore free
    and open-source tools available for equal access to bots for all students. The
    open-source community is committed to promoting equality of access and ensures
    that tools are accessible to everyone. By leveraging these open-source options,
    universities can still offer students equal opportunities to engage with AI bots,
    even when budget constraints exist. The key is to foster a collaborative approach
    that aligns with the institution's values and goals, ultimately enhancing the
    learning experience for all students.
  prefs: []
  type: TYPE_NORMAL
- en: Providing Prompt Engineering Courses
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In response to the significant growth of the prompt engineering job market,
    universities should proactively offer prompt engineering courses to all students.
    Prompt engineering is an intricate process that revolves around creating effective
    prompts to elicit desired responses from language models, such as ChatGPT. This
    practice necessitates a comprehensive comprehension of the model's capabilities
    and limitations, enabling the creation of prompts tailored for specific applications
    like content generation and code completion. Engaging in prompt engineering requires
    a firm grasp of the architecture of AI language models, a deep understanding of
    their mechanisms for processing text and an awareness of their inherent constraints.
    Armed with this foundational knowledge, prompts can be strategically constructed
    to yield outputs that are both accurate and contextually relevant. This multifaceted
    process encompasses various elements. One aspect involves becoming adept at generating
    text using pre-trained models and refining them to suit specific tasks. This proficiency
    aids in selecting prompts that yield the desired content effectively. Furthermore,
    creating prompts that lead to coherent and pertinent responses is a nuanced endeavour.
    It involves accounting for contextual nuances, specificity, phrasing intricacies
    and the management of multi-turn conversations. Moreover, exerting control over
    model output is crucial. This is achieved through techniques like providing explicit
    instructions, employing system messages and conditioning responses based on specific
    keywords. These techniques serve as navigational tools for steering the model's
    output in a desired direction. Prompts that effectively minimise biases or sensitivities
    in responses are integral to responsible AI interactions. This ethical dimension
    of prompt engineering ensures that the generated content aligns with fair and
    unbiased communication. The iterative nature of prompt engineering involves a
    process of experimentation, result evaluation and prompt refinement. This dynamic
    cycle is instrumental in achieving intended outcomes, fine-tuning prompts for
    optimal performance. Additionally, adapting prompt engineering to various tasks,
    such as content creation, code generation, summarisation and translation, necessitates
    tailoring prompts to align with the unique context of each task. This adaptability
    ensures that the prompts are finely tuned to yield contextually relevant and accurate
    outputs. In essence, prompt engineering is a comprehensive approach that harmonises
    technical expertise with linguistic finesse. It optimises interactions with language
    models, yielding responses that are not only accurate but also seamlessly aligned
    with the intended context and purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the importance of providing prompt engineering courses to students,
    at MEF University, beginning in September 2023, we will be offering the Coursera-hosted
    course ‘Prompt Engineering for ChatGPT’ by Vanderbilt University (White, 2023),
    providing access to all our students through our MOOC-based programme offerings.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we have extensively examined critical dimensions of integrating
    AI chatbots in education. This exploration encompassed the imperative of ensuring
    fair access to these bots, the collaborative efforts universities should engage
    in with industries to comprehend the skills and tools required of graduates, the
    strategic decision-making regarding the acquisition or development of specialised
    AI botsand the significance of providing prompt engineering courses for students.
    Looking ahead, the next chapter dives deeper into the educational consequences
    stemming from the integration of AI chatbots.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Educational Implications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Impact of AI on Foundational Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this chapter, we delve into the importance of adapting curricula, assessment
    methods, and instructional strategies to the artificial intelligence (AI) era.
    A central concern here is the potential impact on foundational learning, as highlighted
    both in our research findings and Sullivan et al.''s (2023) literature. As with
    any technology, Chat Generative Pre-trained Transformer’s (ChatGPT''s) influence
    on student learning holds both positive and negative aspects. However, our primary
    focus is on its significant effect on foundational learning. Within this context,
    several noteworthy considerations arise regarding potential downsides, as observed
    through our research. A key concern is the potential over-reliance on ChatGPT
    for generating content, answers and ideas. This dependency has the potential to
    hinder critical thinking and problem-solving skills, potentially leading to reduced
    originality in student work and a diminished ability to effectively synthesise
    information. Additionally, if students routinely turn to ChatGPT to complete assignments,
    their motivation to autonomously comprehend and research subjects may wane, potentially
    resulting in surface-level learning and a limited grasp of essential concepts.
    Another crucial aspect is the potential downside of excessive dependence on ChatGPT,
    which could diminish authentic interactions with peers and instructors. Such interactions
    play a crucial role in fostering deep learning and developing important social
    skills. Furthermore, ongoing reliance on AI for communication might negatively
    impact language and communication proficiency. Prolonged exposure to AI-generated
    content might compromise students'' ability to express ideas coherently and engage
    in meaningful conversations. Moreover, using ChatGPT for content creation without
    proper attribution could undermine students'' ability to formulate original arguments
    and ideas. An over-reliance on AI for creative tasks like writing or problem-solving
    might suppress inherent creativity as students become more accustomed to AI-generated
    patterns and concepts. At this point, we believe it is essential to point out
    that writing is pivotal not only in creation but also in learning – an approach
    often referred to as ‘writing-to-learn’ (Nelson, 2001). Rooted in constructivist
    theory, this notion underscores the evolution of human knowledge and communication.
    Whether viewed from individual cognitive perspectives or broader social viewpoints,
    the dynamic relationship between writing and learning involves selection, organisation
    and connection (Nelson, 2001). Nelson''s work ‘Writing as a Learning Tool’ (2001)
    examines four dimensions of writing''s connective nature: interlinking ideas,
    texts, authors and disciplines. She identifies two primary rationales for the
    writing-to-learn approach: the authority rationale, focusing on mastering subjects
    through writing and the authenticity rationale, asserting that learning content
    and writing conventions go hand in hand within academic fields. This reinforces
    the essential role of writing in learning. Sullivan et al.''s (2023) study similarly
    emphasises the link between learning and writing, highlighting writing''s role
    in clarifying ideas. Consequently, writing becomes a potent tool for reinforcing
    knowledge. Summarising, paraphrasing or explaining concepts in one''s own words
    enhances comprehension and retention. Writing nurtures critical thinking as students
    analyse, evaluate and synthesise information, refining their ability to structure
    coherent thoughts and support arguments with evidence. Writing also encourages
    introspection and self-assessment, enabling students to review learning experiences,
    identify strengths and set improvement goals. This self-evaluation assists in
    pinpointing gaps and areas for further exploration. Moreover, writing fosters
    creativity and expression, providing a platform for learners to delve into ideas
    and emotions, establishing a profound connection with the subject matter. Across
    disciplines, writing drives problem-solving, research and analysis, as students
    engage in research papers, case studies and essays, refining their capability
    to construct solutions and present well-structured arguments. Writing also enhances
    communication skills, enabling learners to express thoughts proficiently across
    various domains. Additionally, writing bolsters long-term information retention.
    Taking notes, creating study guides and practising writing consolidate memory.
    Integrating writing with other learning methods – such as diagrams and multimedia
    – promotes diverse learning, enhancing comprehension through multiple avenues.
    Writing also fosters metacognition, empowering students to monitor thought processes,
    evaluate decisions and explore alternative perspectives. Furthermore, it positively
    influences language proficiency, improving grammar, vocabulary and sentence structure
    through regular writing practice. Considering the pivotal role of writing in the
    learning process, concerns arise over the implications of AI tools that support
    writers in these aspects. Over-reliance on AI-generated content might undermine
    students'' critical thinking abilities. Depending solely on AI suggestions and
    feedback could hinder thorough engagement with material and the development of
    independent analytical skills. While AI tools excel in producing structured content,
    they could stifle creativity and originality, resulting in standardised and repetitive
    writing. Overemphasis on grammatical accuracy and adherence to rules might discourage
    experimentation and risk-taking in writing, inhibiting students from exploring
    their unique writing style. Furthermore, heavy reliance on AI tools might foster
    technological dependency, diminishing students'' self-reliance in problem-solving
    and learning. Ultimately, focusing exclusively on producing well-structured written
    content using AI tools could overshadow the learning process itself. Learning
    encompasses not just the final outcome but also cognitive engagement, exploration
    and growth throughout the educational journey. This prompts the question: what
    implications arise if such a scenario unfolds?'
  prefs: []
  type: TYPE_NORMAL
- en: The implications of losing foundational learning are significant and far-reaching.
    This formative phase forms the bedrock for acquiring advanced knowledge and skills,
    and its absence can reverberate across various aspects of students' academic journey
    and future prospects. For instance, foundational learning provides the fundamental
    principles necessary for understanding complex subjects. Without a robust foundation,
    students may struggle to comprehend advanced concepts, leading to a surface-level
    grasp of subjects. Higher-level courses typically build upon foundational knowledge;
    lacking this grounding can impede success in higher education and overwhelm students
    with coursework. Furthermore, foundational learning nurtures critical thinking,
    analytical skills and effective problem-solving. A dearth of exposure to this
    phase might hinder students' ability to analyse information, make informed decisions
    and effectively tackle intricate issues. A solid foundation also promotes adaptability
    to new information and changing contexts, which becomes challenging without this
    grounding. Furthermore, most professional roles require a firm grasp of foundational
    concepts. Without this understanding, students might encounter difficulties during
    job interviews, work tasks and career advancement. In addition, over-reliance
    on AI tools like ChatGPT may hinder independent and critical thinking, ultimately
    suppressing creativity, problem-solving and originality. Language development,
    communication skills and coherent expression of ideas are also nurtured during
    foundational learning. These skills are essential for effective communication
    in both written and spoken forms. An absence of foundational learning could lead
    to a widening knowledge gap that erodes confidence and motivation to learn. Foundational
    learning also cultivates research skills and the ability to gather credible information.
    Students without these skills might struggle to locate and evaluate reliable sources
    independently. Beyond academics, education contributes to personal growth, intellectual
    curiosity and a well-rounded perspective. The lack of foundational learning may
    deprive students of these holistic experiences. To prevent these adverse outcomes,
    the prioritisation of robust foundational learning is crucial. This underscores
    the significance of creating curricula, assessments and instruction that are resilient
    to the influence of AI. But how can we do this?
  prefs: []
  type: TYPE_NORMAL
- en: Navigating AI Challenges Through Flipped Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To address concerns about students losing foundational learning due to ChatGPT,
    we believe we should turn to contemporary learning methods, such as flipped learning.
    Neumann et al. (2023) and Rudolph et al. (2023) suggested that an effective way
    to deal with AI would be to incorporate it into modern teaching approaches, specifically
    highlighting flipped learning as being a suitable approach. Rudolph et al. proposed
    the use of flipped learning, as the essential classwork (the part that supports
    the development of foundational learning) can occur in-person, emphasising multimedia
    assignments and oral presentations over traditional tasks (2023). They believe
    taking this approach will enhance feedback and revision opportunities, which will
    support foundational learning. Rudolph et al. also note that ChatGPT can support
    experiential learning, which is a key aspect of flipped learning. They suggest
    that students should explore diverse problem-solving approaches through game-based
    learning and student-centred pedagogies using ChatGPT (2023). Additionally, Rudolph
    et al. highlight ChatGPT's potential to promote collaboration and teamwork, another
    aspect inherent in flipped learning. They recommend incorporating group activities
    in which ChatGPT generates scenarios encouraging collaborative problem-solving,
    as this approach will foster a sense of community and mutual support among students.
    Therefore, instead of seeing ChatGPT as disruptive, Rudolph et al. emphasise its
    potential to transform education, but that this should take place through contemporary
    teaching methods, such as flipped learning (2023). Therefore, based on our experience,
    and supported by the literature, we believe flipped learning provides a useful
    starting point for the creation of curricula, assessments and instruction that
    are resilient to the influence of AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the research context section of our research methodology chapter, we presented
    the recommended stages for instructors at MEF to prepare their flipped courses.
    This involves starting with understanding by design (UbD) and integrating Bloom''s
    taxonomy, Assessment For, As, and Of Learning and Gagne''s Nine Events of Instruction
    reordered for flipped learning. In that section, we described how, through combining
    these frameworks, we can establish cohesion between curriculum, assessment and
    instruction, resulting in effective learning. But what happens when AI is involved?
    In UbD, instructors follow three stages: Stage 1 – identify desired results (curriculum);
    Stage 2 – determine acceptable evidence (assessment) and Stage 3 – create the
    learning plans (instruction). Therefore, in addressing how to make teaching and
    learning AI-resilient, we go through each of these stages, putting forward questions
    which can be asked at each stage to guide the decision-making process in how and
    when AI should be integrated.'
  prefs: []
  type: TYPE_NORMAL
- en: Future-ready Curricula in the Age of AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In our recommended flipped learning approach to planning, we start with Stage
    1 of the UbD framework – identify desired results. Although we detailed Stage
    1 in the research methodology chapter, we revisit it briefly here for clarity.
    During Stage 1, instructors establish course objectives and formulate enduring
    understandings capturing essential, lasting concepts. Essential questions are
    then created to guide student exploration, fostering critical thinking and problem-solving
    skills. These questions can be overarching or topical, aligning with broader or
    specific subjects. Once course objectives, enduring understandings and essential
    questions are set, the next step involves designing learning outcomes. This is
    done using Bloom's taxonomy as a guide, ranging from lower to higher cognitive
    levels, as required. This structured process ensures the development of effective
    learning outcomes that deepen understanding and guide meaningful instruction.
    However, in light of the emergence of AI chatbots, such as ChatGPT, we believe
    it is important that we look at each of the aspects of Stage 1 to assess if they
    may be affected in any way.
  prefs: []
  type: TYPE_NORMAL
- en: Enduring understandings, representing core knowledge with lasting value, are
    unlikely to change due to AI advancements. Similarly, essential questions, designed
    to nurture critical thinking, will likely remain consistent despite AI's influence.
    However, the evolving AI landscape prompts a closer look at learning outcomes,
    prompting us to ask whether the learning outcomes we have devised remain relevant
    in an AI-driven world. To investigate this further, let's consider the learning
    outcome ‘Compose a mock closing argument on a specific aspect of language in a
    real-life case and justify your argument’ that was at the heart of the end-of-course
    performance task on the forensic linguistics course. When the rubric was input
    into ChatGPT, ChatGPT was instantly able to complete much of this task and, in
    doing so, achieved the learning outcome with hardly any input from the students.
    Consequently, this outcome, once valuable in real-world situations, might have
    lost its significance due to AI's capabilities. In their future careers, students,
    no doubt, will be using such tools to help them write closing arguments, and ChatGPT
    will prove a useful tool for this purpose. Nonetheless, in the legal sphere, delivering
    and justifying a closing argument verbally remains crucial. This underscores the
    fact that perhaps we should focus more on the verbal delivery as a learning outcome,
    rather than just the written presentation, and that perhaps the learning outcome
    may be better worded as ‘Compose and deliver a mock closing argument on a specific
    aspect of language in a real-life case and justify your argument to a live audience’.
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on this example, we propose that numerous learning outcomes in existing
    courses may require re-evaluation in light of AI''s abilities. Therefore, to assess
    the ongoing relevance of a learning outcome, we suggest posing a pivotal question:
    ‘Is the learning outcome still relevant in an AI-driven real world?’ If the answer
    is ‘yes’, we believe the learning outcome should remain the same. If the answer
    is ‘no’, we recommend the instructor re-evaluate the inclusion of that learning
    outcome. In such situations, we suggest the instructor should conduct a job analysis
    in collaboration with industry to assess how the real world has been influenced
    by AI, as was discussed in the previous chapter, and then adjust the learning
    outcome accordingly.'
  prefs: []
  type: TYPE_NORMAL
- en: To further comprehend the connections and implications associated with Stage
    1, we present the following flowchart ([Fig. 2](#978-1-83797-647-820241009.xhtml#fig1)).
    This illustrates the interplay between enduring understandings, essential questions,
    learning outcomes and the emergence of AI. Its purpose is to guide us in making
    informed decisions regarding AI's impact.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/f09-01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 2.Decision-Making Process for Reassessing Learning Outcomes in an AI Environment.
  prefs: []
  type: TYPE_NORMAL
- en: AI-Resilient Assessment Strategies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As discussed in the literature review, during the ChatGPT era, certain universities
    are opting for conventional exams to circumvent problems related to ChatGPT-generated
    content. However, Sullivan et al. (2023) oppose the exclusive reliance on exams.
    They propose a shift in assessment tasks to decrease susceptibility to AI tools,
    advocating for personalised assignments that assess critical thinking. Given our
    support for the modern assessment approaches inherent in flipped learning, we
    concur with their standpoint. Thus, this leads us to Stage 2 of our flipped learning
    design. Stage 2 involves the instructor determining assessment evidence to determine
    what students know and can do. This involves instructors asking: How will we know
    if students have achieved the desired results? What will we accept as evidence
    of student understanding and their ability to use (transfer) their learning in
    new situations? and how will we evaluate student performance in fair and consistent
    ways? (Wiggins & McTighe, 1998). In Stage 2, there are two main types of assessment:
    performance tasks and other evidence. Performance tasks ask students to use what
    they have learnt in new and real situations to see if they really understand and
    can use their learning. These tasks are not for everyday lessons; they are like
    final assessments for a unit or a course and should include all three elements
    of AoL, AfL and AaL throughout the semester while following the Goal, Role, Audience,
    Situation, Product-Performance-Purpose, Standards (GRASPS) mnemonic. Alongside
    performance tasks, Stage 2 includes other evidence, such as quizzes, tests, observations
    and work samples (AfL) and reflections (AaL) to find out what students know and
    can do. While we observed that some issues may arise in Stage 1 regarding learning
    outcomes in relation to AI''s abilities, in Stage 2 we start to see more concerning
    issues. Let''s begin by examining end-of-course performance tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: End-of-course Performance Tasks
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The primary goal of end-of-course performance tasks is to offer an overall snapshot
    of a student's performance at a specific point in time. While this evaluation
    can occur periodically during a course, it typically takes place at the end of
    the course. However, the emergence of AI, particularly ChatGPT, has raised a significant
    consideration. In instances where AI can proficiently complete these assessments
    – as we've observed it can often do with ease – instructors may encounter challenges
    in accurately measuring a student's true learning accomplishment. The potential
    consequence of this is the inability to determine whether students have reached
    the requisite level to advance to the next class or academic year. This can subsequently
    have a cascading impact. If the reliability of students' grades as indicators
    for prospective employers and graduate schools is compromised, it can erode trust
    in the university system itself and lead to the depreciation of degrees and, ultimately,
    the demise of universities. So what to do? Do we discourage the use of ChatGPT?
    Do we crack down on cheating? We believe the answer to both of these is ‘no’.
    Therefore, how can we deal with this? In order to answer this question, let's
    return to our case study example from the forensic linguistics course.
  prefs: []
  type: TYPE_NORMAL
- en: 'In previous courses, prior to the launch of ChatGPT, using the recommended
    MEF course planning approach in line with flipped learning, the instructor applied
    the GRASPs mnemonic to create the end-of-course performance task with the aim
    of assessing achievement of the learning outcome ‘Compose a mock closing argument
    on a specific aspect of language in a real-life case and justify your argument’.
    Based on this, she set the following task:'
  prefs: []
  type: TYPE_NORMAL
- en: 'For this task, you will take on the role of either the defence or prosecution,
    with the goal of getting the defendant acquitted or convicted in one of the cases.
    Your audience will be the judge and jury. The situation entails making a closing
    argument at the end of a trial. As the product/performance, you are required to
    create a closing argument presented both in writing and as a recorded speech.
    The standards for assessment include: providing a review of the case, a review
    of the evidence, stories and analogies, arguments to get the jury on your client’s
    side, arguments attacking the opposition’s position, concluding comments to summarise
    your argument, and visual evidence from the case.'
  prefs: []
  type: TYPE_NORMAL
- en: In the rubric that the instructor created for this assessment, each of the criteria
    was evenly weighted. To see how ChatGPT-resilient this original assessment was,
    as described in the research methodology chapter, the instructor copied and pasted
    the rubric into ChatGPT, in relation to specific cases, to see what it could do.
    What came out was astounding. ChatGPT swiftly generated the majority of the speech
    for each of the cases, including nearly all of the aspects required in the rubric.
    However, she observed that its weakness lay in providing detailed evidence related
    to forensic linguistics and, while it couldn't create specific visuals pertaining
    to the case, it could make suggestions for images. While this initially seemed
    to render much of the existing assessment redundant, the instructor realised the
    exciting potential of ChatGPT as a useful tool for students' future careers. She
    therefore decided to retain ChatGPT as a feature in the assessment but needed
    to address the fact that it could handle the majority of the task. To do this,
    the instructor adapted the rubric by adjusting the weighting, giving more importance
    to the parts ChatGPT could not handle and reducing its weighting in areas where
    it excelled. This involved assigning greater weight to the review of evidence,
    including emphasising the importance of referencing primary sources rather than
    solely relying on ChatGPT, as well as increasing the weighting for the provision
    of visual evidence. She also realised that, in relation to the learning outcome
    ‘Compose a mock closing argument on a specific aspect of language in a real-life
    case and justify your argument’, she was relying on written evidence for students
    to justify their argument instead of a more real-life scenario whereby they would
    verbally have to justify their argument in a live setting. Therefore, she decided
    to add a question and answer session after the videos were presented for which
    students would be evaluated on both the questions they asked of other students
    and their ability to answer the questions posed to them. This also was given a
    much higher weighting than the parts that ChatGPT was able to do. In reflecting
    on the outcomes of the redesigned assessment/rubric with the Spring 2022–2023
    class, the instructor was pleased with the assessments the students produced.
    However, a recurring observation was that most students defaulted to directly
    reading from their prepared scripts during the video presentations – a tactic
    that would not translate well to real-world scenarios. Consequently, the instructor
    has planned to conduct live (synchronous, online) presentations in the subsequent
    semester to bolster the students' public speaking skills and remove the reliance
    on reading from partially AI-generated scripts. At this point, it should be noted
    that if, as suggested in Stage 1, above, the instructor had carefully analysed
    her learning outcomes via the decision-making process for evaluating learning
    outcomes in an AI environment flowchart, this issue would not have arisen.
  prefs: []
  type: TYPE_NORMAL
- en: Another crucial factor to consider in the design of an end-of-course performance
    task, not explored in the example from our case study, is the potential involvement
    of AI, like ChatGPT, in performing certain elements of the task that could prove
    beneficial in students' future careers but, through doing so, would compromise
    the student's foundational learning. In such scenarios, how should educators proceed?
    In such situations, we suggest creating a closed environment where the use of
    ChatGPT or similar AI chatbots is neither allowed nor possible. This might involve
    conducting assessments in tightly controlled settings or blocking the use of internet
    access. This is particularly important if the assessment takes the form of writing.
    Even better, instructors should opt for assessments emphasising hands-on skills,
    practical experiments, and tactile tasks – areas where AI, even advanced systems
    like ChatGPT, faces inherent limitations. These evaluations require physical presence
    and direct manipulation, rendering them resistant to AI interference. Consequently,
    such assessment methods become AI-resilient, promoting authentic understanding
    and practical application of knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Based on our discussions above, we propose the following flowchart to assist
    with the decision-making process involved in designing end-of-course performance
    tasks in an AI environment ([Fig. 3](#978-1-83797-647-820241009.xhtml#fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/f09-02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 3.Decision-Making Process for Designing End-of-Course Performance Tasks
    in an AI Environment.
  prefs: []
  type: TYPE_NORMAL
- en: When considering the creation of end-of-course performance tasks, we have suggested
    using the GRASPS mnemonic from UbD. We believe this approach is valuable as it
    incorporates real-world contexts into assessments, which is particularly important
    as it equips students with essential skills for their future careers. However,
    an even more advantageous approach would involve centring the assessment around
    a genuine industry problem, which can be ascertained by collaborating with industry,
    as outlined in the previous chapter. This approach will not only enhance authenticity
    but also equip students to tackle real-world challenges in various industries,
    thereby enhancing their job readiness. Our main aim as educators is to provide
    students with the tools needed to tackle the challenges they will face in life.
    By addressing future issues, our students will be better prepared for upcoming
    job opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Pre-class Quizzes
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In the preceding section, we explored the design of end-of-course performance
    tasks in the context of AI. However, Stage 2 of UbD planning also involves the
    process of determining other evidence to assess students' learning. Within the
    framework of flipped learning, a significant aspect of this involves pre-class
    quizzes (AfL). Therefore, we briefly revisit the steps for implementing this process
    here. During the pre-class or online phase, each unit commences with an overview
    and introduction of key terms. Students then engage in a prior knowledge activity
    to gauge their comprehension. Following this, concepts are introduced through
    videos or articles, with accountability ensured via AfL, often in the form of
    brief quizzes offering automated feedback. This approach guarantees that students
    possess the requisite knowledge before attending class. Our experience indicates
    that grading pre-class quizzes heightens student engagement with pre-class materials.
    However, with ChatGPT's ability to provide quick responses, a challenge arises
    regarding pre-class quizzes, as students might solely rely on it without engaging
    with the pre-class resources. This gives rise to two challenges. Firstly, if students
    take this shortcut, they are circumventing the learning process. Secondly, the
    outcomes of the pre-class quizzes are essential tools for instructors to assess
    their students' grasp of concepts before the class. This insight reveals what
    students comprehend, identifies misconceptions and highlights areas of confusion.
    Consequently, it empowers instructors to tailor their teaching approach using
    ‘just-in-time’ instruction to address these gaps. However, this adaptive teaching
    strategy becomes pointless if students have not completed the pre-class quizzes
    themselves. So, how should this issue be approached?
  prefs: []
  type: TYPE_NORMAL
- en: To address this, we believe modifying question types becomes essential. Instead
    of closed-answer questions, instructors can prompt students to describe real-life
    applications of what they have learnt. Alternatively, integrating online interactive
    elements like group discussions or debates in the pre-class assessments can promote
    collaboration and sharing of perspectives, which ChatGPT cannot replicate. This
    personalisation fosters higher-order thinking and discourages over-reliance on
    ChatGPT. Nonetheless, this approach requires manual grading by instructors, as
    automated systems can often only handle closed-ended questions. Consequently,
    it increases the instructor's workload, which might be challenging for classes
    with large student sizes. Striking a balance between personalised assessments
    and feasible grading strategies is crucial to maintain the benefits of active
    engagement while managing the workload efficiently. Another way to address this
    challenge is by shifting the pre-class quizzes from an online setting to the classroom
    at the start of each lesson. In this approach, students need to engage with the
    pre-class material and take notes before class, which they will then use to answer
    quiz questions in class. To ensure that ChatGPT cannot easily complete these quizzes,
    instructors could introduce time constraints by implementing interactive quiz
    tools like Kahoot or Mentimeter. These tools are useful as they not only encourage
    quick information processing but also provide valuable data for the instructor
    to apply grades based on each student's responses. Another effective approach
    is to have students create visuals to demonstrate their understanding of the pre-class
    content. For instance, students can develop mind maps, flowcharts, concept maps,
    timelines, Venn diagrams, bar charts, infographics, storyboards or labelled diagrams.
    These activities are useful, as they promote recall and comprehension of the subject
    matter while fostering visual representation, which enhances students' overall
    understanding. Moreover, engaging in these activities gives students a strong
    incentive to interact with the pre-class materials before attending the lesson.
    The advantage of incorporating such activities lies in the meaningful engagement
    of students with the pre-class materials, as they actively utilise the creation
    of visuals to enhance their comprehension. Additionally, instructors can collect
    the visuals from students at the beginning of the class, after completing the
    activities and use them to assign grades. In an online setting, students can take
    photographs of their hand-drawn visuals and submit them to the instructor for
    evaluation. This way, assessment becomes more holistic, encouraging both deep
    learning and creative expression. Nonetheless, it's important to recognise a drawback
    if conducting pre-class quizzes during the class session. This approach shortens
    the window for instructors to identify students' comprehension gaps before the
    class starts and limits the time available to plan for ‘just-in-time’ teaching.
    In this scenario, adaptation would need to occur in real-time during the class.
    To demonstrate the decision-making process that an instructor should go through
    to decide how to set pre-class quizzes, we propose the following flowchart ([Fig.
    4](#978-1-83797-647-820241009.xhtml#fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/f09-03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 4.Decision-making Process for Designing Pre-class Quizzes in an AI Environment.
  prefs: []
  type: TYPE_NORMAL
- en: Assessment As Learning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In addition to planning for the end-of-course performance task and pre-class
    quizzes, Stage 2 of UbD also encompasses planning for assessment as learning.
    Therefore, let's briefly revisit what this entails. AaL in education focuses on
    enhancing the learning process through assessment. Unlike traditional post-instruction
    assessments, AaL integrates assessments into learning, actively engaging students.
    AaL underscores students' active participation in learning. Self-assessment and
    reflection develop awareness of strengths and areas for improvement. Students
    take ownership of their learning, set goals and adapt strategies based on self-assessment.
    AaL employs tools like goal setting or personal reflections. These activities
    aid students in gauging understanding, identifying confusion and linking new knowledge
    with prior understanding. This cycle nurtures metacognition, crucial for independent
    learning. AaL brings benefits like active engagement, self-regulation and motivation.
    It cultivates proactive learners who address learning gaps and fosters a growth
    mindset that sees challenges as growth opportunities. AaL empowers students, enriches
    comprehension and instils lifelong learning skills. But how does the emergence
    of ChatGPT influence this?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT's real-time feedback offers a potential advantage, promptly aiding students
    in identifying their weaknesses. Yet, solely relying on AI-generated feedback
    might lead to surface-level self-assessment, where students adopt suggestions
    without grasping deeper nuances. Similarly, in terms of taking ownership of learning
    and goal setting, ChatGPT's input could be valuable. It can guide personalised
    goal setting and strategies based on self-assessment outcomes. However, overreliance
    on ChatGPT may disregard individual learning journeys, limiting goal personalisation.
    ChatGPT's thoughtful questions can stimulate deep reflections, yet relying solely
    on AI-generated reflections might hinder authentic self-reflection growth. Addressing
    these concerns involves a balanced approach, capitalising on AI's strengths while
    fostering essential skills. For instance, ChatGPT's real-time feedback aids timely
    self-assessment, but students should critically analyse and complement AI-generated
    insights for deeper self-awareness. While ChatGPT supports goal setting, maintaining
    students' autonomy in shaping goals is vital. Balancing AI-generated and personal
    reflections is required to preserve authenticity. In summary, when navigating
    the interplay between AaL and the emerging influence of ChatGPT, it becomes evident
    that a balanced integration of AI's advantages along with the nurturing of essential
    skills is essential for fostering holistic student development.
  prefs: []
  type: TYPE_NORMAL
- en: As we wrap up our examination of establishing AI-resilient assessment in the
    ChatGPT era, we maintain a strong conviction in the efficacy of our proposed strategies.
    However, we also believe these strategies offer added benefits. By spreading assessments
    across the semester, we can reduce end-of-semester rush, discourage shortcuts
    like copying or plagiarism, and inspire students to create original, meaningful
    work. This lighter assessment load can boost student confidence and encourage
    meaningful learning. Additionally, distributing assessments throughout the semester
    enhances the feedback loop. Consistent guidance from instructors empowers students
    to track progress, spot areas for improvement and align with their goals – something
    often missing in relying only on mid-term and final exams. Our method smoothly
    integrates feedback into learning, encouraging continuous improvement and deep
    understanding through repeated learning cycles, leading to effective learning.
    Moreover, we believe taking this approach will prepare our graduates for the challenges
    of the modern world, whereas neglecting adaptation could leave them unprepared
    for a rapidly changing world. Interestingly, education experts have been advocating
    for this for years, and we believe ChatGPT might just be the push needed to make
    this change. However, we would be remiss if we did not acknowledge that the implementation
    of these changes often lags behind in university entrance exams, accrediting bodies
    and higher education ministries. Therefore, we contend that universities have
    a vital role to play in assuming leadership to advocate for these reforms, ensuring
    that we collectively empower our students for triumph in a world dominated by
    AI.
  prefs: []
  type: TYPE_NORMAL
- en: Adapting Instruction for the AI Era
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Transitioning to the next phase, Stage 3 – Instruction, let''s briefly recap
    the context to aid understanding. This stage in UbD centres on designing learning
    experiences that align with the objectives set in Stage 1\. The following key
    questions guide this stage: How will we support learners as they come to understand
    important ideas and processes? How will we prepare them to autonomously transfer
    their learning? What enabling knowledge and skills will students need to perform
    effectively and achieve desired results? What activities, sequence and resources
    are best suited to accomplish our goals? (Wiggins & McTighe, 1998). Starting with
    the end-of-course performance task, the instructor identifies key concepts and
    skills, then breaks these down into units to guide the students. After that, thoughtful
    instructional events are designed within each unit, utilising Gagne''s Nine Events
    of Instruction for effective learning. Therefore, at this point, we revisit Gagne''s
    Nine Events of Instruction that we have reordered to suit the flipped learning
    approach. Our approach involves the following elements. In the pre-class online
    stage, there should be: a unit overview; an introduction to key terms; a prior
    knowledge activity; an introduction to the key concepts (via video, article);
    and pre-class quizzes for accountability. In the in-class stage, there should
    be: a start-of-class/bridging activity to review pre-class concept; structured
    student-centred practice; semi-structured student-centred practice; freer student-centred
    practice; and self-reflection (AaL at end of lesson/unit, in/out of class).'
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we closely examine each of these components in relation to
    the potential influence of ChatGPT and the measures we can implement to prevent
    any adverse impact on learning outcomes. However, since we have already discussed
    the pre-class element of AfL in the context of AI-proofing assessment in the section
    above, our focus now shifts to exploring in-class activities. Within our flipped
    learning approach, the instructor starts the class by getting the students to
    review pre-class concepts by participating in start-of-class review activities
    to reinforce comprehension. After that, the emphasis moves to student-centred
    activities, enabling active practice and application of the learnt concepts. Therefore,
    we now take a more detailed look at each of these stages.
  prefs: []
  type: TYPE_NORMAL
- en: Start-of-class Review Activities
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Start-of-class review activities, also known as bridging activities, play a
    crucial role in the instructional strategies of flipped learning. Implemented
    at the beginning of a class session, they serve as a seamless connection between
    the pre-class content and the current lesson. Their primary objective is to activate
    students' prior knowledge, refresh their memory on essential concepts covered
    in the pre-class activities and prepare them for the upcoming lesson. By engaging
    students in a brief, interactive review of the pre-class material, instructors
    can enhance retention and understanding, ensuring a smoother and more effective
    transition to new content. To achieve this, instructors have various options for
    these review activities. For instance, setting paper-based short quizzes or questions
    related to the pre-class key concepts can assess retention. Asking students to
    create concept maps or diagrams to visualise the connections between the concepts
    presented prior to class can foster deeper understanding. Instructors can utilise
    one-minute paper prompts for students to write brief summaries of the main points
    from the pre-class materials in one minute, encouraging quick recall. Additionally,
    Think-Pair-Share activities can be used to prompt students to individually recall
    and discuss key points in pairs or small groups. Further options include interactive
    memory games or flashcards for reviewing important terms or concepts, mini-recap
    presentations where students summarise the main points of pre-class materials,
    or quiz bowl-style activities with questions based on the pre-class material.
    The choice of activity can vary based on subject matter, class size and teaching
    style, ensuring flexibility and engagement. The examples we have suggested here
    are designed in a manner that ensures students cannot effectively utilise ChatGPT
    to complete them, rendering these activities ChatGPT-resilient as they currently
    exist. However, it is during the subsequent in-class activities that certain challenges
    begin to surface.
  prefs: []
  type: TYPE_NORMAL
- en: Structured/Semi-structured Activities
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In the context of flipped learning, the primary objective of in-class activities
    is to allow students to apply the knowledge gained from pre-class materials. Maximising
    the effectiveness of this process entails the careful implementation of scaffolded
    in-class activities. Scaffolding in pedagogy involves furnishing learners with
    temporary assistance, guidance and support while they engage in learning tasks
    or exercises. The overarching aim is to facilitate the gradual development of
    students'' skills and comprehension, equipping them to independently tackle tasks
    while progressively reducing the level of assistance as their competence and confidence
    expand. Consequently, the most optimal approach to orchestrating in-class activities
    follows a sequence: initiating with structured activities, advancing to semi-structured
    tasks and ultimately culminating in freer activities.'
  prefs: []
  type: TYPE_NORMAL
- en: Based on the insights gained from our exploratory case study, it becomes evident
    that the stages involving structured and semi-structured activities are where
    ChatGPT can pose the greatest hindrance to effective learning. Consequently, it
    holds immense importance for instructors to try out their structured activities
    in ChatGPT beforehand. If ChatGPT is found capable of fully completing a task,
    instructors should either alter the task or devise an approach that necessitates
    student engagement without relying on ChatGPT. In instances where ChatGPT can
    perform certain parts of a task, instructors should seek ways to modify the activity,
    directing more attention towards the aspects that ChatGPT cannot accomplish. However,
    we are aware that this is easier said than done. Hence, we circle back to instances
    from the Forensic Linguistics course to examine the challenges that emerged and
    how the instructor effectively addressed them.
  prefs: []
  type: TYPE_NORMAL
- en: '*Vocabulary Grouping Activities*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Given that the students in the course were non-native speakers, a portion of
    each class was dedicated to reviewing essential vocabulary from the week's case.
    This practice not only aided students in revisiting the cases but also ensured
    they were familiar with the key terms. Typically, this involved providing students
    with the crucial vocabulary items and tasking them with categorising these terms
    into pre-designated groups. Subsequently, they were required to write a sentence
    with each word in relation to the case. However, since ChatGPT could easily perform
    these tasks, the instructor modified the activity as follows. Working in groups,
    students were given the words but not the categories, and their task was to sort
    the words into appropriate groups. They then compared their categorisations with
    those suggested by ChatGPT and engaged in a class discussion about which groupings
    best encapsulated the case's core vocabulary. Instead of constructing sentences,
    the instructor described some of the words verbally, and students had to deduce
    the respective words. After that, individual students described the words to the
    group for them to guess. Through this approach, ChatGPT assumed the role of a
    tool in vocabulary review rather than a direct substitute for the learning process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Drawing Timelines*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To recap on the important aspects of each case, students were asked to create
    timelines using Padlet's timeline feature. While ChatGPT could not create visual
    content, it could make a list of the case's main points. Students could easily
    copy these into the timeline without thinking deeply, thus making the activity
    pointless. To address this, the instructor used a two-step approach. First, students
    made their timelines from memory. Then, they asked ChatGPT to do the same. This
    helped students see if they missed anything and make changes or to identify areas
    where ChatGPT was incorrect. Next, a verbal discussion was added. Students talked
    about how the events on the timeline were connected. They were asked questions
    about how certain events led to others. In this way, ChatGPT was used by the students
    to check their work, not complete it. The oral task prompted students to contemplate
    the sequence of events and their interconnections more profoundly, an additional
    approach the instructor had not employed before. An additional advantage was that
    this turned out to enrich the learning process, contributing value to the activity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*SWOT Analysis*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In one class session, students were assigned the task of conducting a SWOT analysis
    on the impact of ChatGPT on the legal industry. However, ChatGPT's ability to
    swiftly generate a SWOT analysis chart posed a challenge, as students did not
    need to engage in critical thinking to get a result. To address this, the instructor
    employed the following approach. Firstly, students individually completed a SWOT
    analysis without relying on ChatGPT. They then shared their findings with peers
    and consolidated their insights into a unified chart. Secondly, students were
    provided with up-to-date videos and readings discussing ChatGPT's impact on the
    legal industry, which were not present in ChatGPT's database. Using these new
    resources, students refined their charts. Only after this stage did they consult
    ChatGPT to create a SWOT analysis chart. Comparing their own chart with ChatGPT's,
    they sought additional ideas and evaluated ChatGPT's chart against their current
    readings, pinpointing any outdated information and thus critiquing ChatGPT's limitations.
    This led to a discussion on ChatGPT's constraints. The interactive process enhanced
    students' critical thinking and extended their learning beyond ChatGPT's capabilities.
    This was further reinforced through role-playing scenarios, where students assumed
    various roles like law firm partners, discussing ChatGPT's potential impact on
    their business. This role-playing exercise introduced complexity and context,
    augmenting the SWOT analysis with nuances beyond ChatGPT's scope. By structuring
    the SWOT analysis process in a way that went beyond ChatGPT simply producing the
    chart, the instructor managed to ensure that the students derived valuable insights
    and skills that ChatGPT could not easily replicate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*SPRE Reports*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the original course, the students had been tasked with writing a situation,
    problem, response, evaluation report (SPRE) to summarise each case. However, if
    the cases were in ChatGPT's database, ChatGPT could do this instantly, thereby
    bypassing the learning process. Therefore, the instructor took the following approach.
    First, the students used ChatGPT to create a SPRE report of the case. Then the
    instructor provided the students with a set of detailed questions to guide students
    through each component of the SPRE analysis that ChatGPT had produced. This encouraged
    the students to critique ChatGPT's output and to add any information that was
    missing, thus fostering deeper analysis and interpretation. Where possible, the
    instructor provided the students with a similar case based on the same forensic
    linguistics point (e.g., emoji) that was recent, and therefore not in ChatGPT's
    database. However, this involved scouring the internet for relevant recent cases
    and was not always possible. The students then created a SPRE report for the new
    case and compared the two cases to see if any changes in decisions or law were
    made between the two. This required them to identify patterns, contrasts and trends
    that involved higher-order thinking. The students then worked in groups, imagining
    they were either the prosecution or defence for the original case and created
    short notes about the forensic linguistic points from the case. They were then
    mixed and conducted role plays in which they argued for or against the linguistic
    point in question. This added complexity and depth to the original SPRE analysis,
    making it more robust than what ChatGPT could generate alone.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So, based on these examples, what have we learnt about how to make structured
    or semi-structured in-class activities ChatGPT-enhanced or ChatGPT-resilient?
    We propose that instructors do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Critically Analyse ChatGPT''s Outputs*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encourage students to evaluate ChatGPT's suggestions critically, identifying
    gaps, limitations, errors and potential improvements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Integrate External Resources*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have students incorporate additional materials to expand their learning beyond
    ChatGPT's database.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Initiate Discussions and Role-Playing*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Promote interactive discussions that compare ChatGPT's insights with their own,
    allowing multifaceted exploration through role-playing scenarios.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Conduct Comparative Analysis*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Guide students to compare their work with ChatGPT's outputs, pinpointing discrepancies
    and assessing accuracy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Evaluate Independently*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encourage students to assess ChatGPT's suggestions against their understanding,
    fostering independent judgement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Synthesise Insights*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Blend ChatGPT's insights with their findings to achieve a comprehensive understanding
    of the subject matter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Explore Case Studies and Holistic Learning*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Challenge students with recent case studies not in ChatGPT's database, while
    also engaging in verbal discussions, comparisons and interactions for a well-rounded
    perspective.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Contextualise and Iterate*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encourage students to consider real-world contexts, implications and industry
    changes while refining their work through iterative feedback that integrates ChatGPT's
    insights as well as their independent understanding.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To summarise, while ChatGPT served as a valuable tool in aiding specific aspects
    of the activities described above, our refinements and enhancements extend their
    scope beyond ChatGPT's capabilities. These activities are designed to foster students'
    capacity to synthesise, evaluate and apply knowledge in real-world contexts. Furthermore,
    they encompass discussions and scenarios that surpass ChatGPT's individual capabilities.
    Hence, the activities outlined here are not entirely immune to ChatGPT's influence,
    but rather, they are enhanced by it. In essence, our belief is that integrating
    such activities will stimulate active learning, profound comprehension and the
    development of skills that AI text generators like ChatGPT are unable to duplicate.
    This now brings us to freer activities. And this is where we believe AI chatbots
    like ChatGPT can really be used effectively to enhance learning.
  prefs: []
  type: TYPE_NORMAL
- en: Freer Activities
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let's begin by understanding the concept of freer activities and their significance.
    These activities encourage students to creatively and independently apply their
    learning, cultivating higher-order thinking and problem-solving skills. They encompass
    tasks like open-ended prompts, debates, projects, role-playing and real-world
    scenarios, granting students the authenticity to express themselves. The objectives
    encompass practical knowledge application, critical thinking, creativity, effective
    communication, language fluency, autonomy, real-world applicability and heightened
    engagement. Ultimately, these activities empower students to become confident,
    active learners proficient in navigating diverse challenges and contexts. In light
    of our previous discussion, it's worth noting that ChatGPT may be capable of performing
    many parts of these activities. And while, as we have seen, it can serve as a
    tool to enhance learning, we believe that with strategic utilisation, it holds
    even more potential; the potential to truly transform the learning experience.
    With this in mind, let's take a look at two examples from our case study to illustrate
    this.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the students on the Forensic Linguistics course had been accepted on
    an Erasmus programme at a Polish law school for the upcoming semester. For his
    final project, he decided to use ChatGPT to prepare for his trip, and then shared
    his insights during the final presentations. His aims were diverse: learning about
    the university, his courses, the town and local culture to be well-prepared. ChatGPT
    proved extremely useful in assisting with this. However, what truly stood out
    was his innovative use of ChatGPT for language learning. Wanting to learn basic
    Polish phrases, he sought advice and practised conversations with ChatGPT. This
    proved highly useful for his learning, as ChatGPT served as a free and easily
    accessible Polish conversation partner – a distinct advantage considering challenges
    in finding such practice partners in Istanbul. He described this experience as
    really significantly improving his ability to learn some Polish before his visit.
    This was one example of how ChatGPT was used to really transform learning. However,
    the principal investigator, herself, had also found a similar use during the analysis
    part of the research process. During this investigation, the researcher referred
    to the insights of the four theorists to create a theoretical framework for analysing
    the findings. Even though the researcher already had a good grounding in these
    theories, she wanted to enhance the analysis stage. To do this, she created custom
    personas for each theorist using Forefront AI (Forefront AI, n.d.). Having developed
    these personalised chatbots, she used them to have discussions about her evolving
    analysis, somewhat akin to conversing with the actual theorists themselves. This
    had a transformative impact, pushing her thinking beyond what she could have achieved
    alone. While it might have been possible to do this without the support of AI
    chatbots, it would have been difficult and time-consuming to find peers with the
    time and expertise to engage in these discussions. Consequently, in both these
    instances, ChatGPT emerged as a transformative learning tool, showcasing its unique
    ability to facilitate learning experiences that would be challenging to achieve
    without the aid of AI. It went beyond mere enhancement and truly revolutionised
    the learning process.'
  prefs: []
  type: TYPE_NORMAL
- en: So what can we conclude from this? We believe ChatGPT shows a lot of promise
    as a tool for education. It can make various in-class teaching methods better
    and improve how students learn. However, we urge caution with when it is used.
    This is especially important when foundational learning is involved. Therefore,
    during such activities, we recommend that ChatGPT is not used, and AI-free approaches
    are used instead. However, when it comes to structured and semi-structured in-class
    activities, we believe ChatGPT should take on a pivotal role. During these types
    of activities, we believe ChatGPT can provide the role of a guiding partner, enriching
    student engagement and understanding without taking over the main learning process.
    In addition, integrating ChatGPT into these types of activities can heighten student
    interest and involvement, leading to distinct and interactive learning journeys.
    Moreover, it significantly aids in critical thinking, prompting students to meticulously
    review its responses, identify gaps and engage in discussions that further enhance
    their cognitive involvement. However, we believe ChatGPT's greatest potential
    lies in freer activities where ChatGPT can act as a transformative force, enabling
    students to gain access to external insights, resources and perspectives that
    lie outside the boundaries of traditional learning materials. In conclusion, to
    accomplish learning objectives successfully when planning for instruction, we
    believe instructors should take into account the following factors. Begin by avoiding
    AI integration in foundational learning, such as start-of-class reviews. However,
    after that, move on to structured activities that use ChatGPT but require careful
    assessment of ChatGPT's outputs. Next, progress to semi-structured tasks, encouraging
    students to interact with and expand upon AI-generated ideas. Conclude with freer
    activities where ChatGPT becomes a transformative tool for in-depth exploration
    and analysis. To assist in making these decisions, we suggest the following chart
    ([Table 1](#978-1-83797-647-820241009.xhtml#tbl1)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 1\. Decision-Making Chart for Designing Instructional Activities in an
    AI Environment.
  prefs: []
  type: TYPE_NORMAL
- en: '| Stage 3: Instruction – Plan Learning Experiences and Instruction |'
  prefs: []
  type: TYPE_TB
- en: '| --- |'
  prefs: []
  type: TYPE_TB
- en: '| **Foundational learning activity** | Avoid AI integration | AI-free zone
    |'
  prefs: []
  type: TYPE_TB
- en: '| **Structured activity** | Use AI with careful consideration |  AI-enhanced
    zone |'
  prefs: []
  type: TYPE_TB
- en: '| **Semi-structured activity** | Interact with AI-generated ideas |'
  prefs: []
  type: TYPE_TB
- en: '| **Freer activity** | Use AI for in-depth exploration | AI-transformation
    zone |'
  prefs: []
  type: TYPE_TB
- en: While we have confidence in the effectiveness of our strategies, they will obviously
    need to be tested in the upcoming academic year. Despite our strategies, the possibility
    of students using ChatGPT in unintended ways, like during the AI-free zone, still
    exists. To address this concern, it is crucial to secure students' support by
    demonstrating how ChatGPT might undermine their learning journey, potentially
    leading to struggles later in their academic or professional careers. To tackle
    this, we propose that instructors devote time to emphasise the significance of
    foundational learning, as highlighted earlier in this chapter. Subsequently, instructors
    can guide students through the provided flowchart of questions, illustrating the
    reasoning behind when and how AI can complement their learning. It is important,
    however, that the assessments and learning activities offered in the courses align
    with the recommendations outlined in flowcharts for this approach to be effective.
    This is even more important in online courses where instructors lack direct supervision
    over students' ChatGPT usage. By engaging students in comprehending the potential
    drawbacks of relying solely on AI tools, we can secure their cooperation and safeguard
    the integrity of the learning process. These aspects, therefore, should be integrated
    into AI literacy training programmes, which we address later in this chapter.
    However, before we delve into the details of AI literacy training, we believe
    it is essential to examine the significance of prompt banks, as these will play
    a vital role in the training programme.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging AI Prompt Banks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Based on our research, it is evident that the input you provide to ChatGPT directly
    influences the output you receive. Without a clear context, you may not get the
    desired response, and if your requests lack quality, the output may also be subpar.
    Furthermore, to achieve the best results, multiple iterations are often necessary
    to refine your queries. However, too often, users resort to one-shot requests.
    A one-shot request in ChatGPT is a single input prompt without any follow up interactions.
    It is a standalone query where the model generates a response based solely on
    that initial prompt, without prior context or conversation. One-shot requests
    are useful for specific tasks or quick information retrieval but have limitations
    in context and continuity. For more interactive conversations, multi-turn interactions
    are preferred, enabling the model to maintain context and provide accurate and
    coherent responses based on prior interactions. However, users are often unaware
    of this. So how can we rectify this? We believe the answer lies in providing or
    developing user prompt banks.
  prefs: []
  type: TYPE_NORMAL
- en: A user prompt bank is a pre-prepared collection of prompts or example queries
    that users can refer to while interacting with the AI language model. The prompt
    bank is designed to guide users in formulating their questions or input in a way
    that elicits more accurate and relevant responses from ChatGPT. The purpose of
    a prompt bank is to provide users with helpful examples and suggestions on how
    to structure their queries effectively. It can cover a variety of topics, scenarios
    or styles of interaction that users may encounter when using ChatGPT. By having
    access to a prompt bank, users can gain insights into the type of input that yields
    better outcomes and enhances their overall experience with the AI model. For instance,
    a prompt bank for ChatGPT might include sample prompts for seeking information,
    creative writing, problem-solving, language translation and more. Users can refer
    to these examples and adapt them to their specific needs, enabling them to get
    the desired responses from ChatGPT more efficiently. By utilising a prompt bank,
    users can feel more confident in their interactions with ChatGPT and improve the
    quality of the AI's output by providing clear and contextually relevant input.
    It serves as a valuable resource for users to explore the capabilities of the
    language model and maximise the benefits of using ChatGPT in various tasks and
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'While we are still in the process of developing user prompt banks at our university,
    we offer some examples below. In drawing up these prompts, once again we have
    drawn upon Bloom''s taxonomy. This is because by working through Bloom''s taxonomy,
    the user can start with lower-level knowledge questions and gradually move to
    higher-level analysis, as this can lead to more meaningful and insightful responses.
    Our suggestions are broken down into initial prompts and modifying prompts. We
    break our prompts down into two groups: initial prompts and modifying prompts.
    Below, we provide examples of initial prompts following Bloom''s.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Knowledge:'
