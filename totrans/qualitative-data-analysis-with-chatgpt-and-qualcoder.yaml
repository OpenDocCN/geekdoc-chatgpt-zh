  - PREF_OL
  type: TYPE_NORMAL
- en: Refer to the provided themes and sub-themes as a guide for your analysis.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Identify Relevant Codes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each theme and sub-theme, identify codes that are evident in the transcript.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Codes should be concise phrases that capture key ideas or concepts related to
    the themes.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Extract Exact Quotes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For every identified code, find and extract the exact quote(s) from the transcript
    that illustrate it.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure that the quotes are accurate and include any relevant context.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Organize Your Findings:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Present your results in a structured format, organized by theme and sub-theme.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Under each sub-theme, list the identified codes followed by their supporting
    quotes.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Ensure Accuracy and Relevance:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Make sure all codes and quotes directly relate to the themes and sub-themes.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoid introducing new themes not included in the predefined framework.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
