- en: Group related codes into broader themes, use ChatGPT for suggestions, and refine
    themes within QualCoder.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summarize codes and excerpts, create advanced prompts to explore patterns, run
    analyses, refine themes, and document AI-generated insights.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compare AI-generated codes with manual coding for consistency, and triangulate
    findings with other methods or data sources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use QualCoder’s tools to create code trees and visualizations, document insights
