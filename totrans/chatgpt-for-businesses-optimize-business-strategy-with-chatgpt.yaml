- en: -　Brainstorming　Sessions:　Generating　a　wide　range　of　ideas　and　perspectives　during　ideation　meetings.
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: -　头脑风暴会议：在创意会议中产生广泛的想法和观点。
- en: -　Ideation　Workshops:　Facilitating　creative　thinking　exercises　and　workshops　to　explore　new　concepts.
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: -　创意研讨会：促进创意思维练习和工作坊，探索新的概念。
- en: -　Problem-Solving　Simulations:　Creating　scenarios　and　simulations　to　test　different　solutions　to　complex　problems.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: -　问题解决模拟：创建场景和模拟来测试解决复杂问题的不同方案。
- en: -　Scenario　Planning:　Helping　teams　envision　various　future　scenarios　and　develop　strategic　responses.
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: -　情景规划：帮助团队设想各种未来场景并制定战略响应。
