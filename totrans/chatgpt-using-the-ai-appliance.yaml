- en: Introduction
  id: totrans-125
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: ChatGPT simplifies access to powerful AI technology, making it available to
    almost anyone. This book embraces a “Start with Simplicity” approach to help you
    leverage ChatGPT effectively.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT简化了对强大人工智能技术的访问，使其几乎对任何人都可以使用。这本书采用“从简单开始”的方法，帮助你有效地利用ChatGPT。
- en: Think of ChatGPT as an AI appliance. Like any appliance, it requires some basic
    understanding to use effectively. While ChatGPT is not an Artificial General Intelligence
    (AGI), it can solve specific problems with impressive efficiency.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT视为一个AI设备。就像任何设备一样，它需要一些基本理解才能有效使用。虽然ChatGPT不是通用人工智能（AGI），但它可以以令人印象深刻的高效解决特定问题。
- en: The key to using ChatGPT successfully lies in adopting a “Black-box Mindset”.
    This approach allows you to focus on the inputs and outputs you can control, without
    needing to understand the complex inner workings of the AI. By concentrating on
    what you can control, you can achieve better results and improve your skills over
    time.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT成功的关键在于采用“黑盒心态”。这种方法允许你专注于你可以控制的输入和输出，而不需要理解AI复杂的内部运作。通过专注于你可以控制的内容，你可以取得更好的结果，并在一段时间内提高你的技能。
- en: 'In this book, you’ll learn how to:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，你将学习如何：
- en: Approach ChatGPT with a black box mindset.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以黑盒心态接近ChatGPT。
- en: Start with simple techniques and add complexity as needed.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从简单的技术开始，并在需要时增加复杂性。
- en: Identify the best problems for ChatGPT to solve.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定ChatGPT最适合解决的问题。
- en: Our goal is to help you use ChatGPT effectively without getting lost in AI jargon.
    Let’s begin your journey to mastering ChatGPT with simplicity.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目的是帮助你有效地使用ChatGPT，而不会迷失在AI术语中。让我们从简单开始，开始你的ChatGPT掌握之旅。
- en: How to Read This Book
  id: totrans-134
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何阅读这本书
- en: I’ve attempted to make the content in this book a logical journey through the
    exciting but often confusing—and frustrating–world of using ChatGPT. Please review
    the book outline below, and then consider the content that you can use after you’ve
    finished the book.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图使本书的内容成为一次逻辑之旅，穿越ChatGPT使用的激动人心但常常令人困惑——甚至令人沮丧——的世界。请查看以下书籍大纲，并在你阅读完本书后考虑你可以使用的内容。
- en: Outline of this Book
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本书概要
- en: This section gives you the top-level narrative of the book, and a summary of
    the key propositions / takeaways
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 本节为你提供了本书的顶层叙述和关键论点/收获的总结。
- en: 'The first chapter, "Artificial Intelligence: The New Generic Application",
    outlines the “AI Tipping Point” and why that is critical to your understanding
    of ChatGPT, introduces the concept of a “AI Appliance” and how it is the foundation
    for the Black-box Mindset, which I then introduce in concept, setting the scene
    for the next chapter.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章“人工智能：新的通用应用”，概述了“AI转折点”及其对你理解ChatGPT的重要性，介绍了“AI电器”的概念以及它是黑盒思维模式的基础，然后我在概念上介绍了它，为下一章做了铺垫。
- en: The second chapter, "Unpacking the ChatGPT Black Box Mindset", describes the
    Black-box Mindset in more detail, and unpacks the six components that provide
    you an end-to-end view of the entire ChatGPT interaction landscape. These include
    understanding the key strengths of ChatGPT, the over-arching constraints of how
    ChatGPT works, the things that you as a user can control.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章“拆解ChatGPT黑盒思维模式”，更详细地描述了黑盒思维模式，并拆解了六个组成部分，为你提供了一个对整个ChatGPT互动景观的端到端视角。这包括理解ChatGPT的关键优势、ChatGPT工作的总体约束以及作为用户你可以控制的事情。
- en: The third chapter, "Interacting with ChatGPT", outlines additional material
    that will help you apply the Black-box Mindset of interacting with ChatGPT, including
    a shallow view of ChatGPT operation, busting some myths about ChatGPT and the
    main area that you can control.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章“与ChatGPT互动”，概述了帮助你应用与ChatGPT互动的黑盒思维模式的额外材料，包括对ChatGPT操作的浅层看法，打破一些关于ChatGPT的神话以及你可以控制的主要领域。
- en: These three chapters will give you a full, end-to-end slice through the application
    of ChatGPT to your particular problem area, and provide you with conceptual frameworks
    and tools to analyse and discuss how you should approach using ChatGPT.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这三章将为你提供对ChatGPT在你特定问题领域应用的全面、端到端的切片，并提供概念框架和工具来分析和讨论你应该如何使用ChatGPT。
- en: They will set you on up to not only apply ChatGPT productively right now, but
    to access more advanced knowledge about ChatGPT application areas.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将帮助你不仅能够现在就有效地使用ChatGPT，还能获取更多关于ChatGPT应用领域的先进知识。
- en: Where to from here?
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来是什么？
- en: After you’ve finished this book, you’ll have more useful and practical knowledge
    than the average ChatGPT user. You can continue this journey by reading more advanced
    content. For example, check out the following titles. You can find these on my
    [Leanpub Profile Page](https://leanpub.com/u/adamonprojects).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在你完成这本书后，你将比普通ChatGPT用户拥有更多有用和实用的知识。你可以通过阅读更多高级内容继续这段旅程。例如，查看以下标题。你可以在我的[Leanpub个人资料页面](https://leanpub.com/u/adamonprojects)找到这些内容。
- en: '[“Advanced ChatGPT Application Primer”](https://bjl.ink/GptAP): a complete
    and detailed description of everything you need to know about ChatGPT and applying
    it to your problem domain.'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[“高级ChatGPT应用入门”](https://bjl.ink/GptAP)：关于ChatGPT及其在你问题领域应用所需了解的一切的完整和详细描述。'
- en: 'Adam on: Advanced ChatGPT for Agile Project Managers: Extends the “Black Box”
    approach to the practice of Agile Project Management.'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 亚当：适用于敏捷项目经理的高级ChatGPT：将“黑盒”方法扩展到敏捷项目管理实践。
- en: 'Artificial Intelligence: The New Generic Application'
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能：新的通用应用
- en: '![](image_rsrc1G2.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc1G2.jpg)'
- en: “AI is the new electricity”—Andrew Ng, AI Researcher, Entrepreneur and Thought
    Leader
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: “AI是新的电力”——安德鲁·吴，AI研究员、企业家和思想领袖
- en: Andrew Ng argues that Artificial Intelligence is a general-purpose technology,
    meaning that it is not useful for just one thing, but useful for many things.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 安德鲁·吴认为人工智能是一种通用技术，这意味着它不仅仅对一件事情有用，对许多事情都有用。
- en: In this chapter I want to give you a flavour of this powerful capability and
    propose a different way that we should think of applications like ChatGPT.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我想让你体验这种强大功能的风味，并提出我们应该如何思考像ChatGPT这样的应用的不同方式。
- en: I argue that the analogy for ChatGPT is an appliance that uses the AI electricity.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为ChatGPT的类比是一个使用AI电力的电器。
- en: Start with simplicity
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从简单开始
- en: '![Perfection](image_rsrc1G3.jpg)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![完美](image_rsrc1G3.jpg)'
- en: Figure 1\. Perfection
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 完美
- en: The proposition of this book is that successfully using ChatGPT is an exercise
    in uncovering the practical simplicity in our interactions with ChatGPT. If you
    read articles about ChatGPT online you’ll be bombarded with multiple messages
    that obscure this practical simplicity. Either the statements are over-simplistic
    in making claims about what ChatGPT can do by leaving out critical and non-trivial
    integration concerns. Or the messages are incredibly complex and dive deep into
    the internals of the GPT AI engine.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的论点是，成功使用ChatGPT是一种揭示我们与ChatGPT互动中实际简单性的练习。如果你在网上阅读关于ChatGPT的文章，你会被多个模糊这一实际简单性的信息所淹没。要么是陈述过于简单化，在描述ChatGPT能做什么时忽略了关键的和非平凡的集成问题。要么信息极其复杂，深入到GPT
    AI引擎的内部。
- en: 'I believe that practical use of ChatGPT can avoid the latter: you don’t really
    need to know much about GPT internals. First, because you don’t need to know them
    to make effective use of the tool and second because much of the information you
    read is misleading, wrong or poorly explained.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为ChatGPT的实际使用可以避免后者：你实际上并不需要了解GPT内部的信息。首先，因为你不需要了解它们来有效地使用这个工具；其次，因为你所读到的许多信息都是误导性的、错误的或解释得不好。
- en: On the other hand, you do need to know just the right about about the practical
    integration of ChatGPT into your work processes. What I mean by “just the right
    amount” is that the information must be balanced against the simplicity or complexity
    of your use cases. In the early stages of your ChatGPT experience, you need to
    know no more than is related to the tools and data that you use.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，你确实需要了解如何恰当地将ChatGPT整合到你的工作流程中。我所说的“恰如其分”是指信息必须与你的用例的简单性或复杂性相平衡。在你使用ChatGPT的早期阶段，你只需要了解与你所使用的工具和数据相关的信息。
- en: The Artificial Intelligence “Tipping Point”
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能“转折点”
- en: Artificial Intelligence has been around for decades but has sped up out of sight
    these short months since OpenAI released ChatGPT.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经存在了几十年，但自从OpenAI发布了ChatGPT，这些短短的几个月里，它的发展速度已经超出了人们的视线。
- en: Use of ChatGPT and its competitors is exploding. And so, it seems, is its misuse.
    People are flocking to use it based on vague claims, assumptions, prejudices,
    and false expectations. Whilst many people are surprised and pleased by the value
    that ChatGPT helps them create, others find their expectations are not met.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT及其竞争对手的使用正在爆炸式增长。因此，其误用似乎也在增加。人们基于模糊的声明、假设、偏见和错误的期望纷纷涌向使用它。虽然许多人惊讶并高兴于ChatGPT帮助他们创造的价值观，但其他人发现他们的期望没有得到满足。
- en: The release of ChatGPT in November 2022 was a “tipping point” in AI enablement,
    after which consumers’ engagement with AI capabilities changes materially. The
    ChatGPT browser-based interface made AI technology available to anyone interested
    and attracted enormous interest.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年11月ChatGPT的发布是AI赋能的“转折点”，在此之后，消费者对AI功能的参与发生了实质性变化。基于浏览器的ChatGPT界面使得AI技术对任何感兴趣的人开放，并吸引了巨大的关注。
- en: “And the more you look, the more you see what has changed with this model —
    and why it seems like a tipping point. … ChatGPT, now open to everyone, has made
    an important transition.”—Ethan Mollick in “[ChatGPT Is a Tipping Point for AI”
    (hbr.org 14th December 2022)](https://hbr.org/2022/12/chatgpt-is-a-tipping-point-for-ai).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: “而且你看得越多，你就越能看到这个模型发生了哪些变化——以及为什么它似乎是一个转折点。…现在对所有人开放的ChatGPT已经完成了一个重要的转变。”——伊桑·莫利克在“[ChatGPT是AI的转折点](https://hbr.org/2022/12/chatgpt-is-a-tipping-point-for-ai)”（hbr.org
    2022年12月14日）。
- en: What is the Tipping Point?
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是转折点？
- en: The Tipping Point Unpacked
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 转折点解析
- en: 'Prior to the “Tipping Point” the use of AI in any business or technology are
    was limited by at least one (and usually two) non-trivial enablers:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在“转折点”之前，任何商业或技术中对AI的使用至少受到一个（通常是两个）非平凡促进因素的制约：
- en: Development of an AI software solution
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能软件解决方案的开发
- en: Training of the AI model
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能模型的训练
- en: At the “Tipping Point” of AI these factors were turn on their heads.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI的“转折点”上，这些因素发生了逆转。
- en: Cost of Implementation
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 实施成本
- en: 'The cost of AI solutions includes many factors, for example:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能解决方案的成本包括许多因素，例如：
- en: Developer cost to design, code, and test the solution. This varies with the
    platform and integration environment, which progressively have provided more built-in
    capabilities and therefore less custom code.
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发者成本用于设计、编码和测试解决方案。这取决于平台和集成环境，它们逐渐提供了更多的内置功能，因此需要更少的自定义代码。
- en: 'Cost of the platform: some are open source and some proprietary, but as we
    all know “open source” doesn’t mean “no cost”.'
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平台成本：有些是开源的，有些是专有的，但众所周知，“开源”并不意味着“无成本”。
- en: 'Infrastructure cost: the non-trivial cost of computing infrastructure, whether
    physical or virtualised.'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基础设施成本：无论是物理的还是虚拟化的，计算基础设施的非平凡成本。
- en: 'Time to market: time is a cost, not the least of which includes the overhead
    burden that someone must carry while the solution is developed. There can also
    be huge costs if market windows are missed.'
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 市场时间：时间是成本，其中最不重要的是在解决方案开发期间必须承担的额外负担。如果错过了市场窗口，也可能产生巨大的成本。
- en: 'Model training: the cost of training the model: data licence costs, infrastructure
    costs, and people costs are the big three.'
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型训练：训练模型的成本：数据许可成本、基础设施成本和人力成本是三大成本。
- en: Model Training
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练
- en: All Machine Learning (“ML”) solutions require training on data that covers the
    intended use of the solution.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 所有机器学习（“ML”）解决方案都需要在覆盖解决方案预期用途的数据上进行训练。
- en: Before the “Tipping Point”, solution developers or specialised customer personnel
    trained AI models on the data that was directly related to the use case an organisation
    was trying to solve with the AI solution.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在“临界点”之前，解决方案开发者或专门的客户人员会在与组织试图用AI解决方案解决的问题直接相关的数据上训练AI模型。
- en: If the AI integration platform chosen was a product, the development process
    would have involved conducting model training. However, whether the situation
    permitted the trained models to be made available or not relied on the specific
    circumstances.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 如果选择的AI集成平台是一个产品，那么开发过程将包括进行模型训练。然而，是否允许提供训练好的模型取决于具体情况。
- en: What OpenAI and other GenAI platform vendors did was to train their models on
    increasingly massive amounts of data from a broad range of sources without any
    specific application use case in mind. Or, if they perhaps had reference use cases
    in mind, it was a very broad set.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI和其他通用人工智能平台供应商所做的是，在没有任何具体应用用例的情况下，在来自广泛来源的大量数据上训练他们的模型。或者，如果他们可能想到了参考用例，那么这个集合非常广泛。
- en: This model “pre-training” involves training of the model the vendor performs
    on the AI platform before release. For example, OpenAI say they trained GPT on
    all the Wikipedia data, which includes millions of pages and hundreds of thousands
    of categories and links.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型的“预训练”涉及供应商在发布前在AI平台上进行的模型训练。例如，OpenAI表示他们在所有维基百科数据上训练了GPT，这包括数百万页和数十万个类别和链接。
- en: The result of the massive pre-training is that the product is available for
    immediate use by anyone, at least in theory. Andrew Ng provided an interesting
    quantification of this below.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 大量预训练的结果是，产品可以立即供任何人使用，至少在理论上是这样。Andrew Ng在下面提供了一个有趣的量化。
- en: Massive Reductions in Costs and Time to Deliver
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本和时间的大幅降低
- en: 'After the “Tipping Point” there was a massive reduction in time-to-deliver
    for AI solutions, as you can see in the chart below (derived from Andrew Ng’s
    video presentation “[Opportunities in AI](https://youtu.be/5p248yoa3oE)”), the
    value propositions are compelling: when applied to the right kind of problem.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在“临界点”之后，AI解决方案的交付时间大幅减少，如图下所示（来自Andrew Ng的视频演示“[AI的机会](https://youtu.be/5p248yoa3oE)”），其价值主张非常有吸引力：当应用于正确类型的问题时。
- en: For example, Andrew Ng reported that ChatGPT reduced the cost of developing
    and deploying an AI application by at least two (2) orders of magnitude, from,
    for example, 140 working days to 1-2 days, as shown in the figure below.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Andrew Ng报告说，ChatGPT将开发和部署AI应用的成本至少降低了两个数量级，例如，从140个工作日减少到1-2天，如图下所示。
- en: '![Comparative AI Application Deployment Speeds (adapted from Andrew Ng)](image_rsrc1G4.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![比较人工智能应用部署速度（改编自Andrew Ng）](image_rsrc1G4.jpg)'
- en: Figure 2\. Comparative AI Application Deployment Speeds (adapted from Andrew
    Ng)
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 比较人工智能应用部署速度（改编自Andrew Ng）
- en: But where is the “sweet spot” for application development? I’m sure Andrew Ng
    meant software development, but is that all? How do you figure out what applications
    have the greatest affinity for appliances like ChatGPT? How many ways can consumer
    users of OpenAI’s ChatGPT apply it to their problem domains?
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 但应用开发的“甜蜜点”在哪里？我确信Andrew Ng指的是软件开发，但仅仅是这些吗？你如何确定哪些应用与ChatGPT等设备有最大的亲和力？OpenAI
    ChatGPT的消费者用户有多少种方式将其应用于他们的问题领域？
- en: The tool is not without its downsides, but the barrier to entry is effectively
    zero, and the barriers there may be largely in the knowledge and perception of
    the product rather than technical or inherent to the product.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 工具并非没有缺点，但入门门槛实际上是零，障碍可能主要在于对产品的知识和感知，而不是技术或产品本身的固有属性。
- en: OpenAI rode (drove?) these two curves along their natural evolutionary trajectories
    to achieve the “tipping point”, where the pre-training massively outstripped the
    probable scope of interest of any one individual or team, and reduced the cost
    of implementation to almost zero.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI沿着这两条曲线的自然进化轨迹推动了它们，实现了“转折点”，在这个点上，预训练远远超过了任何个人或团队可能感兴趣的范围，并将实施成本降低到几乎为零。
- en: '![AI Tipping Point Visualised](image_rsrc1G5.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![AI转折点可视化](image_rsrc1G5.jpg)'
- en: Figure 3\. AI Tipping Point Visualised
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. AI转折点可视化
- en: Note that those evolutionary curves are for illustrative purposes only. There
    are no specific units on the y-axis and you can’t generate a trendline. The only
    objective fact in the chart is the date of ChatGPT release.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这些进化曲线仅用于说明目的。y轴上没有具体单位，也无法生成趋势线。图表中唯一的事实是ChatGPT的发布日期。
- en: Conclusion
  id: totrans-195
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论
- en: The transition marked by the release of ChatGPT signifies a fundamental shift
    in AI technology, from specialised, narrow applications to versatile, highly capable
    systems. This “tipping point” has made AI more accessible, powerful, and integrated
    into everyday business and personal tasks, shaping the future landscape of technology
    and human interaction.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 由ChatGPT的发布标志的过渡标志着人工智能技术的基本转变，从专业、狭窄的应用到多才多艺、高度强大的系统。这个“转折点”使人工智能更加易于访问、强大，并融入日常商业和个人任务中，塑造了技术未来和人类互动的格局。
- en: 'ChatGPT: The AI Appliance for Everyone'
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT：面向每个人的AI设备
- en: OpenAI’s ChatGPT has dramatically increased public access to artificial intelligence
    (AI). It simplifies AI interaction, offering both opportunities and challenges,
    and can be thought of as an AI appliance accessible to anyone via the internet.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT显著提高了公众对人工智能（AI）的访问。它简化了AI的交互，提供了机遇和挑战，并且可以被视为任何通过互联网都能访问的AI设备。
- en: The Complexity and Opacity of GPT
  id: totrans-199
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPT的复杂性和模糊性
- en: GPT (Generative Pre-trained Transformer) is a sophisticated and complex machine.
    While some aspects of its architecture and functionality are transparent, a significant
    portion remains proprietary and opaque.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: GPT（生成式预训练转换器）是一个复杂且精密的机器。尽管其架构和功能的一些方面是透明的，但很大一部分仍然是专有的和模糊的。
- en: Many existing articles and papers that try to explain ChatGPT either become
    too technical or rely on superficial explanations. These pieces often end up confusing
    the user rather than clarifying how ChatGPT works. Even when experts do attempt
    to unpack the technology, like Stephen Wolfram’s detailed analysis, the depth
    and complexity make it difficult for the average user to grasp.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 许多试图解释ChatGPT的文章和论文要么过于技术化，要么依赖于肤浅的解释。这些作品往往最终让用户感到困惑，而不是阐明ChatGPT的工作原理。即使专家尝试深入分析这项技术，如Stephen
    Wolfram的详细分析，其深度和复杂性也使得普通用户难以理解。
- en: There’s a high level of misunderstanding about what ChatGPT can and cannot do.
    This is partly because explanations often mix up answers to multiple questions,
    like “How does ChatGPT work?”, “How was it built?”, and “What is Artificial Intelligence?”.
    Marketing factors also contribute to this confusion.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ChatGPT能做什么和不能做什么存在很高的误解。这部分是因为解释往往混淆了多个问题的答案，比如“ChatGPT是如何工作的？”，“它是如何构建的？”，以及“什么是人工智能？”。营销因素也加剧了这种混淆。
- en: Just like a household appliance, ChatGPT has a simplified user interface and
    specific functionalities. It’s designed for a broad user base and hides its internal
    complexities.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 就像家用电器一样，ChatGPT拥有简化的用户界面和特定的功能。它旨在面向广泛的用户群体，并隐藏其内部复杂性。
- en: Characteristics of an Appliance
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设备的特征
- en: 'Specific Functional Profile: It does what it claims to do.'
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体功能配置：它做它声称要做的事情。
- en: 'Simplified User Interface: Only essential controls are exposed.'
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化的用户界面：仅暴露必要控件。
- en: 'Hidden Internal Technology: What’s “under the hood” remains largely concealed.'
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏的内部技术：引擎盖下的内容仍然在很大程度上被隐藏。
- en: 'Target Audience: Aimed at the public, not just tech-savvy users.'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标受众：面向公众，而不仅仅是技术熟练的用户。
- en: However, ChatGPT is not a perfect appliance because of its probabilistic nature
    and sometimes incorrect responses. Despite the marketing and user interfaces simplifying
    the experience, the range of its functionalities remains limited.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于ChatGPT的概率性质和有时不正确的响应，它并不是一个完美的工具。尽管营销和用户界面简化了体验，但其功能范围仍然有限。
- en: Knowing the inner workings of ChatGPT is mostly irrelevant for users. What matters
    more is understanding what it does well and how to maximise its utility for your
    specific needs.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 了解ChatGPT的内部运作对用户来说大多无关紧要。更重要的是理解它擅长做什么以及如何最大化其满足你特定需求的效用。
- en: Crossing the Skills Bootstrapping Chasm
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 跨越技能自举鸿沟
- en: We all start out as novices at anything we do. And when we start out, we all
    “suck” at it. But with the proper practice and help, we get better. Kathy Sierra
    describes this as starting in the “Suck Zone”. I’ve extended this idea to ChatGPT
    and call this process “Skills Bootstrapping”, because much of what we learn with
    ChatGPT emerges from the interaction cycle. We use the experience of recent interactions
    to bootstrap our skills for upcoming cycles. The problem is that without direction
    it can be a random activity.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在从事任何事情时都是从新手开始的。当我们开始时，我们都在这个领域“糟糕”。但通过适当的练习和帮助，我们会变得更好。凯西·西拉将这个过程描述为从“糟糕区域”开始。我将这个想法扩展到ChatGPT，并称之为“技能自举”，因为我们在ChatGPT中学到的大部分知识都来自于交互周期。我们使用最近交互的经验来为即将到来的周期自举我们的技能。问题是，如果没有方向，这可能会变成一种随机活动。
- en: '![Skills Bootstrapping (Adapted from Kathy Sierra)](image_rsrc1G6.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![技能自举（改编自凯西·西拉）](image_rsrc1G6.jpg)'
- en: Figure 4\. Skills Bootstrapping (Adapted from Kathy Sierra)
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 技能自举（改编自凯西·西拉）
- en: 'You can see that Kathy loosely divides ability (aka expertise) into three zones:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到凯西·西拉将能力（即专业知识）大致分为三个区域：
- en: '“Suck” Zone: beginners and others who generally “suck” at the skill.'
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “糟糕”区域：新手和其他在这个技能上通常“糟糕”的人。
- en: '“Competent” Zone: people who have overcome the “Suck Threshold” and become
    confident and productive.'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “胜任”区域：克服了“糟糕阈值”并变得自信和高效的人。
- en: '“Badass” Zone: someone highly proficient — “world-class” at this skill.'
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “坏小子”区域：在技能上非常熟练的人——“世界级”的技能。
- en: '“Along the way they’ll hit many milestones, some more crucial than others.
    But of all points on the curve, the two most important are crossing the Suck Threshold
    and crossing the Badass Threshold.” in “Badass: Making Users Awesome” (p. 67).
    O’Reilly Media. Kindle Edition.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在《坏小子：让用户变得出色》（第67页）中提到：“在旅途中，他们会遇到许多里程碑，其中一些比其他更重要。但在这条曲线上的所有点上，最重要的两个是跨越糟糕阈值和跨越坏小子阈值。”
    奥莱利媒体。Kindle版。
- en: The emphasis here is on the word “right”. Using the tool won’t help you escape
    what Kathy Sierra calls “The Suck Zone”. Try different learning strategies to
    make the progress shown in the above diagram.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这里强调的是“正确”这个词。使用这个工具并不能帮助你逃离凯西·西拉所说的“糟糕区域”。尝试不同的学习策略，以实现上图所示的增长。
- en: If we don’t have some help with our approach to progressive development of ChatGPT
    skills, then we risk being blocked by the “chasm” - the vast gap between very
    basic skills and getting out of the “suck zone”.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们没有一些帮助来改进ChatGPT技能的渐进式发展方法，那么我们可能会被“鸿沟”——在非常基础技能和走出“糟糕区域”之间的大差距所阻挡。
- en: '![The Skills Boostrapping Chasm](image_rsrc1G7.jpg)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![技能自举鸿沟](image_rsrc1G7.jpg)'
- en: Figure 5\. The Skills Boostrapping Chasm
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. 技能自举鸿沟
- en: 'The Skills Boostrapping Chasm gap is a transitional blocker that most people
    experience: we have just enough skills to make ChatGPT “work” - to input prompts
    and get results, but we don’t have enough skills to prevent poor use or even mis-use.
    In other words we know enough to get ourselves into trouble but not enough to
    get out of trouble.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 技能自举鸿沟是一个过渡性障碍，大多数人都会经历：我们刚刚有足够的技能让ChatGPT“工作”——输入提示并获取结果，但我们没有足够的技能来防止不良使用甚至误用。换句话说，我们了解得足够多，可以让自己陷入麻烦，但不足以摆脱麻烦。
- en: 'This chasm is caused as much by frustration as by lack of skill. This is particularly
    the case if people try to get too far ahead with their knowledge of ChatGPT internals
    or by attempting to learn Prompt Engineering too soon. Another way is to buy lists
    of prompts: it’s fine if they work but if they need tweaking to work in your environment
    or particular use case, perhaps you don’t have the skill to make the change effectively.'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 这种鸿沟既是由挫折感造成的，也是由于技能不足。尤其是当人们试图通过了解ChatGPT的内部知识或过早地学习提示工程来取得过大的进步时，这种情况尤为明显。另一种方法是购买提示列表：如果它们有效，那很好；但如果它们需要在你的环境或特定用例中调整才能工作，可能你并没有足够的技能来有效地进行更改。
- en: The result of not “Crossing the Chasm” is being stuck in the “Suck Zone” because
    the frustration and poor results outweigh the time and effort you’re prepared
    to put in.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 不“跨越鸿沟”的结果是困在“糟糕区域”，因为挫折和糟糕的结果超过了你愿意投入的时间和精力。
- en: The way across the skills bootstrapping chasm is by getting help that is targeted
    and appropriate to the precise stage and circumstances of each user. This includes
    such things as coaches or mentors, high-quality courses, and, of course, high-quality
    books like this one.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 跨越技能自举鸿沟的方法是获得针对每个用户精确阶段和情况的针对性帮助。这包括诸如教练或导师、高质量课程，当然还有这本书这样的高质量书籍。
- en: '![Stuck in the “Suck Zone” (Adapted from Kathy Sierra)](image_rsrc1G8.jpg)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![困在“糟糕区域”（改编自Kathy Sierra）](image_rsrc1G8.jpg)'
- en: Figure 6\. Stuck in the “Suck Zone” (Adapted from Kathy Sierra)
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. 困在“糟糕区域”（改编自Kathy Sierra）
- en: The ChatGPT Black Box Mindset
  id: totrans-230
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT黑盒思维
- en: A “black box” is a system whose internal operations are not understood by the
    user. Users only interact with it through its inputs and outputs.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: “黑盒”是一个用户不了解其内部操作的系统。用户仅通过其输入和输出与之交互。
- en: Adopting a “black box” mindset with ChatGPT has several advantages. It frees
    us from misconceptions, allows us to focus on what we can control, and facilitates
    a better understanding of ChatGPT’s strengths and weaknesses.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 采用ChatGPT的“黑盒思维”有几个优点。它使我们摆脱了误解，让我们专注于我们能控制的事情，并有助于更好地理解ChatGPT的优势和劣势。
- en: 'This is a very simple concept, but it can be a double-edged sword, introducing
    downsides as well as upsides:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常简单的概念，但它可以是双刃剑，带来利弊：
- en: It opens a market for people wanting to explain the internals, even if they
    themselves don’t fully understand it.
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它为想要解释内部结构的人打开了市场，即使他们自己并不完全理解。
- en: It leads to user-generated myths and misunderstandings about what’s happening
    inside the box.
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这导致了用户对盒内发生事情产生的神话和误解。
- en: It opens up the potential for “Cargo Cult AI,” where people form incorrect theories
    about what’s happening inside the box.
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它开启了“货船崇拜AI”的潜力，人们会形成关于盒内发生事情的错误理论。
- en: The first step to use ChatGPT effectively is to accept its complexity as a unit
    and embrace it as a black box. This enables us to focus on the inputs and outputs,
    which are within our control.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的有效第一步是将其复杂性视为一个单元，并把它当作一个黑盒来接受。这使我们能够专注于输入和输出，这些都在我们的控制范围内。
- en: A substantial part of the current market offerings for ChatGPT revolves around
    prompts. However, these often ignore guidelines about evaluating the outputs or
    understanding the variations in responses due to ChatGPT’s probabilistic nature.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 当前市场上针对ChatGPT的提供物很大一部分围绕着提示词。然而，这些往往忽略了评估输出或理解由于ChatGPT的概率性质导致的响应变化的相关指南。
- en: Understanding how to better control inputs and evaluate outputs is crucial for
    optimising ChatGPT’s utility. It’s not just about making the process seem “plug-and-play.”
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 了解如何更好地控制输入和评估输出对于优化ChatGPT的效用至关重要。这不仅仅是让过程看起来“即插即用”。
- en: 'While you can pursue a deeper understanding of how GPT, AI, and ML work, such
    knowledge isn’t necessary for the practical use of ChatGPT as an AI appliance.
    A “black box” approach can often be more beneficial, helping you focus on what
    you can control: the inputs and the outputs.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可以追求更深入地理解GPT、AI和ML的工作原理，但这种知识对于ChatGPT作为AI设备的实际使用并不是必要的。采用“黑盒”方法通常更有益，帮助你专注于你能控制的事情：输入和输出。
- en: I will unpack the components of the ChatGPT “Black-box Mindset” in the next
    section.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下一节中拆解ChatGPT的“黑盒思维”的组成部分。
- en: Unpacking the ChatGPT Black Box Mindset
  id: totrans-242
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 拆解ChatGPT黑盒思维
- en: We can describe the Black Box Mindset to the ChatGPT AI Appliance as comprising
    six factors.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将黑盒思维描述为ChatGPT AI设备的六个因素。
- en: This chapter gives an overview and then unpacks each of these factors in more
    detail.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了这些因素，然后更详细地拆解了每一个。
- en: For a more advanced dive into the six factors, including practical hints and
    prompt examples, please refer to my book [“Advanced ChatGPT Application Primer”](https://bjl.ink/GptAP).
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 想要更深入地了解六个因素，包括实用提示和提示示例，请参阅我的书籍[《高级ChatGPT应用入门》](https://bjl.ink/GptAP)。
- en: Six Components Enable One Mindset
  id: totrans-246
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 六个组成部分促成一种思维模式
- en: 'The Black Box ChatGPT Interaction Framework guides users in effectively leveraging
    ChatGPT’s capabilities while addressing inherent limitations and ensuring responsible
    usage within organisations. This framework encompasses six key components that
    collectively enable users to interact with ChatGPT in a productive, ethical and
    informed manner. The six components are: Engage the Black-Box Interface, Play
    to ChatGPT Strengths, Understand Critical ChatGPT Constraints, Focus on What the
    User Can Control, Adopt Curious Abundance, and Implement Black-Box Governance.
    The figure below summarises these components.'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒 ChatGPT 互动框架指导用户有效地利用 ChatGPT 的能力，同时解决固有的限制，并在组织内确保负责任的用法。该框架包括六个关键组成部分，共同使用户能够以富有成效、道德和知情的方式与
    ChatGPT 互动。这六个组成部分是：互动黑盒界面、发挥 ChatGPT 的优势、理解 ChatGPT 的关键限制、关注用户可以控制的内容、采用好奇的丰富性和实施黑盒治理。下面的图示总结了这些组成部分。
- en: '![GPT Black-box Mindset - Summary](image_rsrc1G9.jpg)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![GPT 黑盒思维 - 概述](image_rsrc1G9.jpg)'
- en: Figure 7\. GPT Black-box Mindset - Summary
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7. GPT 黑盒思维 - 概述
- en: 1\. Engage the Black-Box Interface
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 互动黑盒界面
- en: 'The “GPT Black-box Interface” is the GPT equivalent of the Turing Test, which
    I wrote about in GPT Doctrine #2\. Your interaction with GPT is based only on
    your inputs and GPT’s outputs. You ignore (or perhaps suppress) what happens on
    the other side of the interface. It could be a person, a troop of monkeys, or
    an alien mother-ship. You don’t care. You care about what you get as output for
    its use and to inform your future inputs. The Black-Box interface is the ultimate
    in empiricism.'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '“GPT 黑盒界面”是 GPT 对应图灵测试的版本，我在 GPT 教义 #2 中提到了这一点。您与 GPT 的互动仅基于您的输入和 GPT 的输出。您忽略（或可能抑制）界面另一侧发生的事情。那可能是一个人、一群猴子，或者一艘外星母船。您不在乎。您关心的是您得到的输出，以及它如何用于您的使用和告知您未来的输入。黑盒界面是经验主义的极致。'
- en: 2\. Play to ChatGPT Strengths
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 发挥 ChatGPT 的优势
- en: To harness ChatGPT’s full potential, users must play to its strengths. ChatGPT
    excels in natural language processing, human-like interactions, and self-improving
    capabilities. By focusing on these strengths, users can effectively use the model
    for various applications, such as content creation, customer support, and data
    analysis. Recognising and leveraging these strengths ensures that interactions
    with ChatGPT are both efficient and effective. ChatGPT’s strengths are as amazing
    as its weaknesses are surprising. We must not mistake a strength at a superficial
    level as being an indication of underlying capability that just doesn’t exist.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分发挥 ChatGPT 的潜力，用户必须发挥其优势。ChatGPT 在自然语言处理、类似人类的交互和自我改进能力方面表现出色。通过专注于这些优势，用户可以有效地将模型应用于各种应用，例如内容创作、客户支持和数据分析。认识和利用这些优势确保与
    ChatGPT 的互动既高效又有效。ChatGPT 的优势就像其弱点一样令人惊讶。我们不应该将表面上的优势误认为是潜在能力的指示，而这种能力实际上并不存在。
- en: 3\. Understand Critical ChatGPT Constraints
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 理解 ChatGPT 的关键限制
- en: 'Just was we must be aware of GPT’s strengths and not kid ourselves of their
    origins, we must also be objective and mindful of GPT’s significant weaknesses.
    I call them ‘constraints’ because they are indicators of where not to use ChatGPT
    - guidelines to avoid certain kins of problems lest we get blocked with substandard
    results. In the “Black-box Mindset”, we understand four critical sets of constraints
    that you must keep in mind when structuring your use of GPT. These constraints
    are 1) No Sentient Knowledge, 2) Non-deterministic responses, 3) Response Limitations
    and 4) Errors in Plain Sight (e.g. Bias and Non-explainability). (I’ll expand
    on these in a later yarn). More recently, we can probably add a fifth constraint:
    infrastructure performance and availability. Since DevDay in 2023, the OpenAI
    platform has been highly variable in its performance. (That’s a neutral way of
    saying, some days it sucks!) One day, I’ll ask GPT to process a mass of data and
    get almost an instant response. On other days, it’s unusable on even simple tasks.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们必须认识到 GPT 的优势并不要对自己其起源产生错觉一样，我们也必须客观并关注 GPT 的显著弱点。我把它们称为“限制”，因为它们是表明在哪里不要使用
    ChatGPT 的指标——避免某些类型问题的指南，以免我们因结果不达标而受阻。在“黑盒思维模式”中，我们理解了在使用 GPT 时必须牢记的四个关键限制集。这些限制是
    1) 无感知知识，2) 非确定性响应，3) 响应限制和 4) 明显的错误（例如偏见和非可解释性）。（我将在以后的叙述中详细说明）。最近，我们可能还可以增加第五个限制：基础设施性能和可用性。自
    2023 年 DevDay 以来，OpenAI 平台的性能一直波动很大。（这可以说是一种中性的说法，有些日子真的很糟糕！）有一天，我会要求 GPT 处理大量数据并几乎立即得到响应。而在其他日子里，即使是简单的任务也无法使用。
- en: 4\. Focus on What the User Can Control
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 专注于用户可以控制的内容
- en: There are three factors that you, as a user, have complete control over when
    using GPT. These are 1) Problem Selection, 2) Prompt Structure and Content and
    3) How you use the responses. Everything else is built into the GPT architecture
    or under the control of OpenAI or, more recently, other software partners such
    as plugin builders and GPTs developers. The “Black-box Mindset” helps you understand
    the three things you have control over, and leverage them for your best outcomes.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 当你作为用户使用 GPT 时，有三个因素是你完全控制的。这些是 1) 问题选择，2) 提示结构和内容，以及 3) 你如何使用响应。其他所有东西都内置在
    GPT 架构中，或在 OpenAI 或，更近期的，其他软件合作伙伴（如插件构建者和 GPT 开发者）的控制之下。黑盒思维模式帮助你理解你可以控制的三个因素，并利用它们获得最佳结果。
- en: 5\. Adopt Curious Abundance
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 采用好奇的丰富性
- en: 'The “Black-box Mindset” includes a curious questioning openness to the fact
    that GPT is constantly evolving and that we don’t always know everything about
    what it does or how it does it. “Curious Abundance” underscores the almost magical
    nature of GPT: we can never say with any certainty that we know everything about
    its capabilities. Not only is OpenAI continually tweaking the models and developing
    new capabilities, but there is evidence of a “Ghost in the Machine” that surprises
    us with things we never expected.'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: “黑盒思维模式”包括对 GPT 持续演变的事实持好奇的提问态度，以及我们并不总是了解其做什么或如何做的所有事情。这种“好奇的丰富性”强调了 GPT 几乎神奇的本质：我们永远不能肯定地说我们了解其所有功能。不仅
    OpenAI 不断调整模型并开发新的功能，而且有证据表明存在一个“机器中的幽灵”，它会用我们从未预料到的事情来惊吓我们。
- en: 6\. Implement Black-Box Governance
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 实施黑盒治理
- en: Where GPT is used in enterprise environments of any sort, we need to consider
    some level of governance. Governance is — broadly speaking — the set of policies,
    procedures, and tools that help organisations protect themselves from negative
    events, such as security breaches. The term “Black-box Governance” is almost a
    contradiction because governance is ultimately about risk management (RM), and
    with RM, you want to know as much about the risk parameters as possible. But we
    play with the cards OpenAI deals us. Some things are improving, but some things,
    like “Explainability”, are unlikely ever to be addressed in GPT because of architectural
    constraints.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何类型的商业环境中使用 GPT 时，我们需要考虑一定程度的治理。治理——广义上讲——是一套政策、程序和工具，帮助组织保护自己免受负面事件的影响，例如安全漏洞。术语“黑盒治理”几乎是一种矛盾，因为治理最终是关于风险管理（RM），而在风险管理中，你希望尽可能多地了解风险参数。但我们只能玩
    OpenAI 给我们的牌。有些事情正在改善，但有些事情，如“可解释性”，由于架构限制，在 GPT 中可能永远无法解决。
- en: Conclusion
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The Black Box ChatGPT Interaction Framework provides a comprehensive approach
    to engaging with ChatGPT. By addressing each of the six key components, users
    and organisations can enhance the effectiveness, reliability, and ethical use
    of ChatGPT. This framework empowers users to navigate the complexities of interacting
    with a black-box AI model, ensuring their use of ChatGPT is innovative and responsible.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒ChatGPT交互框架提供了一个全面的方法来与ChatGPT交互。通过解决六个关键组成部分中的每一个，用户和组织可以增强ChatGPT的有效性、可靠性和道德使用。这个框架赋予用户导航与黑盒AI模型交互的复杂性的能力，确保他们使用ChatGPT的创新性和责任感。
- en: Engage the Black-Box Interface
  id: totrans-264
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交互黑盒接口
- en: In this section, we cover the first component of the ChatGPT “Black-box” Mindset.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们介绍了ChatGPT“黑盒”思维的第一部分。
- en: '![Black-box Mindset #1](image_rsrc1GA.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![黑盒思维 #1](image_rsrc1GA.jpg)'
- en: 'Figure 8\. Black-box Mindset #1'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: '图8. 黑盒思维 #1'
- en: The Human-ChatGPT Black-box Interface
  id: totrans-268
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人-ChatGPT黑盒接口
- en: The “Black-box interface” is a concept that simplifies Human-ChatGPT interaction
    by focusing on inputs and outputs while disregarding the GPT engine’s complex
    internals. This empirical approach helps users leverage ChatGPT’s strengths effectively
    and objectively. The Black-box Interface is the ChatGPT extension of the “Imitation
    Game” conceived by Alan Turing.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: “黑盒接口”是一个通过关注输入和输出而忽略GPT引擎复杂内部结构的简化人-ChatGPT交互的概念。这种经验方法帮助用户有效地利用ChatGPT的优势，并客观地使用它。黑盒接口是艾伦·图灵构想的“模仿游戏”在ChatGPT中的扩展。
- en: In the original “Imitation Game”, also called the “Turing Test”, the concept
    was for a person (C) to interact with something on the other side of a wall, by
    sending written messages back and forth through a slot. The challenge was for
    the person (C) to determine whether another person (B) was on the other side of
    the wall, or it was a computer (A).
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 在原始的“模仿游戏”，也称为“图灵测试”中，概念是一个人（C）通过在墙的另一边发送书面信息来回通过一个槽位与某物交互。挑战是让这个人（C）确定墙的另一边是另一个人（B），还是一台计算机（A）。
- en: '![Original Turing Test](image_rsrc1GB.jpg)'
  id: totrans-271
  prefs: []
  type: TYPE_IMG
  zh: '![原始图灵测试](image_rsrc1GB.jpg)'
- en: Figure 9\. Original Turing Test
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. 原始图灵测试
- en: 'Image Credit: [Juan Alberto Sánchez Margallo - File:Test_de_Turing.jpg, CC
    BY 2.5](https://commons.wikimedia.org/w/index.php?curid=57298943).'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来源：[Juan Alberto Sánchez Margallo - 文件：Test_de_Turing.jpg, CC BY 2.5](https://commons.wikimedia.org/w/index.php?curid=57298943).
- en: The Black-box interface is the natural extension of this, because we don’t care
    what’s on the other side of the wall. Our purpose is to solve problems or perform
    other functions based on the responses we receive.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒接口是这一点的自然扩展，因为我们不关心墙的另一边是什么。我们的目的是根据我们收到的响应解决问题或执行其他功能。
- en: '![ChatGPT Black-box Interface](image_rsrc1GC.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![ChatGPT黑盒接口](image_rsrc1GC.jpg)'
- en: Figure 10\. ChatGPT Black-box Interface
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 图10. ChatGPT黑盒接口
- en: Engaging with ChatGPT via the Black-box interface involves understanding the
    model’s operational dynamics without necessarily knowing its internal workings.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 通过黑盒接口与ChatGPT交互涉及理解模型的运行动态，而不必了解其内部工作原理。
- en: So, we end up with the simplest of interaction concepts for ChatGPT, one which
    ignores what goes on “inside the box”.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们最终得到了ChatGPT最简单的交互概念，一个忽略“盒子内部”发生的事情的概念。
- en: '![Simplest ChatGPT Interaction Concept](image_rsrc1GD.jpg)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![最简单的ChatGPT交互概念](image_rsrc1GD.jpg)'
- en: Figure 11\. Simplest ChatGPT Interaction Concept
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图11. 最简单的ChatGPT交互概念
- en: 'This topic is covered in greater detail in the chapter “Advanced Black-box
    Mindset #1 - Engaging with the Black-box Interface” in the book [“Advanced ChatGPT
    Application and Operations Guide”](https://bjl.ink/GptAP).'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '在书籍《“高级ChatGPT应用与操作指南”》的“高级黑盒思维 #1 - 交互黑盒接口”章节中，对此主题进行了更详细的介绍。[“高级ChatGPT应用与操作指南”](https://bjl.ink/GptAP).'
- en: ChatGPT Characteristics
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT的特点
- en: Let’s review the key characteristics of ChatGPT that sit behind the fluff and
    hyperbole. What really makes it tick?
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下ChatGPT背后的关键特征，这些特征隐藏在浮夸和夸张之下。真正让它运转的是什么？
- en: '![Engage Black Box Interface Functions](image_rsrc1GE.jpg)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![交互黑盒接口功能](image_rsrc1GE.jpg)'
- en: Figure 12\. Engage Black Box Interface Functions
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 图12. 交互黑盒接口功能
- en: ChatGPT is just a SaaS
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT只是一个SaaS
- en: 'On the other side of the ChatGPT interface is just a computer program, delivered
    in a “Software as a Service” model. Sure it’s powerful, but it’s just a SaaS:
    it has features and feature gaps; it has distinct strengths and weaknesses. The
    platform has bugs and outages. Its developers and operators are humans who mostly
    do awesome things but also make mistakes. We’ve lived with SaaS products for decades,
    and ChatGPT is not much different in that respect. In some ways, it is potentially
    more vulnerable than other because it has grown so fast.'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 界面的另一边只是一个计算机程序，以“软件即服务”的模式提供。当然，它很强大，但仅仅是一个 SaaS：它有功能和功能差距；它有明显的优势和劣势。该平台有漏洞和故障。它的开发者和运营商是人类，他们大多数时候都做得很好，但也会犯错误。我们已经与
    SaaS 产品共存了几十年，ChatGPT 在这方面并没有太大的不同。在某些方面，它可能比其他产品更容易受到威胁，因为它发展得太快了。
- en: SaaS is Incredibly Powerful and Complex and New
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: SaaS 极其强大且复杂且新颖
- en: The GPT technology stack is enormously complex system that took many months
    and gazillions of dollars to build. Only a few people in the world truly understand
    how it works, although many think they do—a sort of LLM Dunning-Kruger effect.
    Many of the ideas and opinions about ChatGPT capabilities are based on Artificial
    Intelligence and computing concepts from before the [AI “Tipping Point”](#part0009.xhtml#a18V)
    and so are potentially incorrect, misleading or flat-out unhelpful.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 技术栈是一个极其复杂的系统，需要花费数月时间和数亿美元来构建。世界上真正理解它是如何工作的人寥寥无几，尽管许多人认为他们了解——这是一种 LLM
    Dunning-Kruger 效应。关于 ChatGPT 功能的许多想法和观点都是基于 AI 和计算概念，这些概念在 [AI “临界点”](#part0009.xhtml#a18V)
    之前，因此可能是错误的、误导性的或完全无用的。
- en: ChatGPT SaaS provides almost Zero guidance on use
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT SaaS 几乎没有提供使用指导
- en: The user interface to the ChatGPT client is beautifully simple—it’s just a text
    box into which we type natural language. There’s no real vendor guidance on how
    to use it, just a bunch of highly technical descriptions of the internals and
    a limited description of capabilities. There are gazillions of information sources
    all over the world. These sources of information often lack accuracy and quality
    production, with many full of hype and unvalidated assertions. It seems there
    is an assumption that using natural language for an interface requires less guidance
    – folks will just “figure it out”.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 客户端的用户界面非常简单——它只是一个我们输入自然语言的文本框。实际上并没有真正的供应商指导如何使用它，只有一些高度技术性的内部描述和功能描述的有限说明。全世界有无数的信息来源。这些信息来源往往缺乏准确性和质量生产，其中许多充满了炒作和未经证实的断言。似乎有一种假设，即使用自然语言作为界面需要较少的指导——人们会“自己弄明白”。
- en: We’re Seduced by Natural Language
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 我们被自然语言所吸引
- en: By tapping into natural language, ChatGPT taps into something primal in our
    brains, which probably makes ChatGPT seem far more intelligent and capable than
    it is. How humans structure language maps directly into how we think (or at least
    how we think we think). Society has conditioned us to associate excellent language
    use with intelligence and other positive attributes. It’s difficult to avoid this
    reaction when we encounter machine responses even moderately eloquent. Language
    is also culture, so ChatGPT also taps into our cultural sense of belonging. Through
    the magic of natural language, ChatGPT both persuades us that it is highly intelligent
    and taps into our anthropomorphic tendencies.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用自然语言，ChatGPT 激活了我们大脑中的某种原始能力，这可能使得 ChatGPT 看起来比实际上更智能和更有能力。人类如何构建语言直接映射到我们的思维方式（至少是我们认为的思维方式）。社会已经让我们将出色的语言使用与智力和其他积极属性联系起来。当我们遇到甚至稍微有点流畅的机器响应时，很难避免这种反应。语言也是文化，因此
    ChatGPT 也触动了我们的文化归属感。通过自然语言的魔力，ChatGPT 说服我们它非常智能，并触动了我们的拟人化倾向。
- en: Conclusion
  id: totrans-294
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: ChatGPT is no doubt extremely powerful, but its design sings us a siren song
    towards misunderstanding the product and misapplication of our efforts. Engaging
    with ChatGPT via the Black-box interface will help us avoid the siren call.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 无疑非常强大，但它的设计却像海妖之歌一样，容易让我们误解产品，误用我们的努力。通过黑盒界面与 ChatGPT 互动将帮助我们避免这种诱惑。
- en: Play to ChatGPT Strengths
  id: totrans-296
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发挥 ChatGPT 的优势
- en: To harness ChatGPT’s full potential, users must play to its strengths. ChatGPT
    excels in natural language processing, human-like interactions, and self-improving
    capabilities. By focusing on these strengths, users can effectively use the model
    for various applications, such as content creation, customer support, and data
    analysis. Recognising and leveraging these strengths ensures that interactions
    with ChatGPT are both efficient and effective.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分发挥ChatGPT的潜力，用户必须发挥其优势。ChatGPT在自然语言处理、类似人类的交互和自我改进能力方面表现出色。通过关注这些优势，用户可以有效地将模型用于各种应用，如内容创作、客户支持和数据分析。认识和利用这些优势确保与ChatGPT的交互既高效又有效。
- en: The diagram below illustrates the key strengths and capabilities of GPT (Generative
    Pre-trained Transformer) models, emphasising their multifaceted proficiency in
    handling natural language tasks.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表展示了GPT（生成预训练变换器）模型的关键优势和功能，强调了它们在处理自然语言任务方面的多方面专业能力。
- en: '![GPT Strengths Summary](image_rsrc1GF.jpg)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![GPT优势总结](image_rsrc1GF.jpg)'
- en: Figure 13\. GPT Strengths Summary
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 图13. GPT优势总结
- en: 'This topic is covered in greater detail in the chapter “Advanced Black-box
    Interface #2 - Play to ChatGPT Strengths” in the book [“Advanced ChatGPT Application
    and Operations Guide”](https://bjl.ink/GptAP).'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 这个主题在《高级黑盒界面#2 - 发挥ChatGPT优势》这一章节中进行了更详细的介绍，该章节收录于书籍《“高级ChatGPT应用与操作指南”》中[“Advanced
    ChatGPT Application and Operations Guide”](https://bjl.ink/GptAP)。
- en: GPT Key Strengths
  id: totrans-302
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPT关键优势
- en: Natural Language Processing
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理
- en: GPT-4 exhibits a remarkable understanding of human language. It can generate
    human-like text that is contextually relevant, grammatically correct, and coherent
    over long passages. This makes it a powerful tool for a variety of tasks, such
    as drafting project documentation, generating code, and facilitating communication
    among stakeholders.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4展现出对人类语言的非凡理解能力。它可以生成上下文相关、语法正确且连贯的长篇文本。这使得它成为各种任务的有力工具，如起草项目文档、生成代码和促进利益相关者之间的沟通。
- en: 'Natural Language Processing includes four key functions: Prompt Language Parsing,
    Separation of Concerns, Content Completion & Transformation, and Output Language
    Moderation.'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理包括四个关键功能：提示语言解析、关注点分离、内容完成与转换以及输出语言调节。
- en: '![NLP Functions](image_rsrc1GG.jpg)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![NLP功能](image_rsrc1GG.jpg)'
- en: Figure 14\. NLP Functions
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 图14. NLP功能
- en: Human-like Interactions
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 类似人类的交互
- en: GPT models can simulate interactions that are coherent, contextually relevant,
    and personalised. The key aspects include the ability to interact with Plausible
    conversations, Personalised responses, and Real-time generation.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: GPT模型可以模拟连贯、上下文相关和个性化的交互。关键方面包括与合理对话互动、个性化回复和实时生成。
- en: 'Plausible: GPT models generate responses that are plausible and contextually
    appropriate.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 合理性：GPT模型生成的回复是合理且上下文适当的。
- en: 'Personalised: Personalisation is a critical aspect of human-like interactions.
    GPT models can tailor responses based on user preferences, previous interactions,
    and specific contextual information.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化：个性化是类似人类交互的关键方面。GPT模型可以根据用户偏好、先前交互和特定上下文信息定制回复。
- en: 'Real-time: The ability to generate responses in real-time is essential for
    maintaining the flow of conversation.'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 实时性：实时生成回复的能力对于保持对话的流畅性至关重要。
- en: The ChatGPT responses are not “canned” - they are generated directly in response
    to the inputs each user provides over the course of a conversation.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复不是“预先设定的”——它们是直接针对用户在对话过程中提供的每个输入生成的。
- en: Much of this “humanity” is down to the strengths of NLP, as I described in the
    section on Engaging the Black-box Interface [We’re Seduced by Natural Language](#part0010.xhtml#a195).
    If ChatGPT responds erratically, we often interpret this in a human context, such
    as “it’s lying” or “it’s having a bad day”.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分“人性”很大程度上归功于自然语言处理的优点，正如我在“参与黑盒界面”部分所描述的[我们被自然语言所吸引](#part0010.xhtml#a195)。如果ChatGPT的回复不稳定，我们通常会从人类的角度来解释，比如“它在撒谎”或“它今天心情不好”。
- en: Self-improving Capability
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 自我改进能力
- en: 'This capability is essential for maintaining and improving the quality and
    relevance of the outputs generated by the model. The key components of this capability
    include: Self-learning, Model updates, and In-session improvement.'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这种能力对于维护和提升模型生成的输出质量和相关性至关重要。这一能力的关键组成部分包括：自我学习、模型更新和会话内改进。
- en: 'Self-learning: GPT models can learn from interactions and experiences.'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 自我学习：GPT模型可以从交互和经验中学习。
- en: 'Model Updates: Periodic updates to the model are crucial for its improvement.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 模型更新：定期更新模型对于其改进至关重要。
- en: 'In-session Improvement: In-session improvement refers to the model’s ability
    to enhance its performance within a single interaction session.'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 会话内改进：会话内改进指的是模型在单个交互会话中提升其性能的能力。
- en: Conclusion
  id: totrans-320
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: ChatGPT users will get better results by ensuring that your use of ChatGPT plays
    to these strengths, and not the limitations and weaknesses that we will outline
    in the next section.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 通过确保您的 ChatGPT 使用发挥其优势，而不是我们在下一节中概述的局限性和弱点，ChatGPT 用户将获得更好的结果。
- en: Understand Critical ChatGPT Constraints
  id: totrans-322
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解 ChatGPT 的关键限制
- en: Despite its strengths, GPT-4 has certain limitations that users need to be aware
    of. In the figure below, we observe an overview of the critical constraints associated
    with GPT models.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管具有优势，GPT-4 仍存在用户需要了解的某些局限性。在下图中，我们可以观察到与 GPT 模型相关的关键限制概述。
- en: '![GPT Critical Constraints: Summary](image_rsrc1GH.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![GPT 关键限制：总结](image_rsrc1GH.jpg)'
- en: 'Figure 15\. GPT Critical Constraints: Summary'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15. GPT 关键限制：总结
- en: 'These limitations are summarised below. This topic is covered in greater detail
    in the chapter “Advanced Black-box Interface #3 - Avoid ChatGPT Constraints” in
    the book [“Advanced ChatGPT Application and Operations Guide”](https://bjl.ink/GptAP).'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: '这些局限性总结如下。该主题在《“高级 ChatGPT 应用与操作指南”》一书的“高级黑盒接口 #3 - 避免ChatGPT限制”章节中有更详细的介绍。'
- en: No Sentient Knowledge
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 没有感知知识
- en: 'This constraint is fundamental to understanding the boundaries of what GPT
    models can and cannot do, including:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 这一限制是理解 GPT 模型能做什么和不能做什么的基础，包括：
- en: Messages Have No Semantic Meaning
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消息没有语义意义
- en: GPT is Not Generic AI or AGI
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT 不是通用人工智能或 AGI
- en: Understanding the “No Sentient Knowledge” constraint is crucial for effectively
    using ChatGPT. While the model excels in generating human-like text, users must
    be aware of its limitations and exercise caution in applications requiring deep
    understanding or critical decision-making. This awareness helps set realistic
    expectations and ensures responsible use of the technology.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 理解“没有感知知识”的限制对于有效地使用 ChatGPT 至关重要。虽然该模型在生成类似人类的文本方面表现出色，但用户必须意识到其局限性，并在需要深入理解或关键决策的应用中谨慎行事。这种意识有助于设定现实的期望并确保技术的负责任使用。
- en: Response Variability
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 响应变异性
- en: 'This constraint highlights the nature of the model’s output, which can be influenced
    by various factors leading to inconsistent or varied responses. Understanding
    this variability is crucial for users to set expectations and leverage the model
    effectively, including:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 这一限制突出了模型输出的本质，它可能受到各种因素的影响，导致不一致或不同的响应。理解这种变异性对于用户设定期望并有效地利用模型至关重要，包括：
- en: Responses are Probabilistic, Not Logic-driven
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应是概率性的，而非逻辑驱动的
- en: The Same Prompt Will Not Always Generate the Same Result
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同一个提示不会总是产生相同的结果
- en: Recognising and managing response variability is essential for effectively using
    ChatGPT. While this characteristic can introduce challenges, it also offers creative
    and dynamic content generation opportunities. By understanding the factors that
    contribute to variability and implementing appropriate strategies, users can harness
    the strengths of ChatGPT while mitigating potential drawbacks.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 识别和管理响应变异性对于有效地使用 ChatGPT 至关重要。虽然这一特性可能带来挑战，但也提供了创造性和动态的内容生成机会。通过理解导致变异性因素并实施适当的策略，用户可以发挥
    ChatGPT 的优势，同时减轻潜在的缺点。
- en: Limited Depth Responses
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 深度有限响应
- en: 'This limitation affects the model’s performance, particularly in specialised
    or highly technical fields. Understanding this constraint helps users set realistic
    expectations and develop strategies to address or mitigate its impact, including:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 这一限制影响了模型的表现，尤其是在专业或高度技术领域。理解这一限制有助于用户设定现实的期望并制定策略来应对或减轻其影响，包括：
- en: Lack of Deep-level Expert Responses
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏深度专家级响应
- en: Responses “Converge” at Mid-level Skill
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应在中等技能水平上“收敛”
- en: While GPT models excel in generating human-like text and providing general information,
    their limited depth in specialised responses is a critical constraint. By understanding
    and addressing this limitation, users can effectively leverage GPT’s strengths
    while ensuring the accuracy and comprehensiveness of the information in specialised
    or technical contexts.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 GPT 模型在生成类似人类的文本和提供一般信息方面表现出色，但它们在特定响应方面的深度有限是一个关键限制。通过理解和解决这一限制，用户可以有效地利用
    GPT 的优势，同时确保在特定或技术环境中信息的准确性和全面性。
- en: Platform Limits
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 平台限制
- en: 'These limits affect the model’s performance and usability in various applications.
    Understanding these platform constraints is essential for effectively using GPT
    models while managing expectations regarding their capabilities and limitations,
    including:'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 这些限制会影响模型在各种应用中的性能和可用性。理解这些平台约束对于有效地使用 GPT 模型以及管理对其能力和局限性的期望至关重要，包括：
- en: Limited Context Window (Conversational Span)**
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有限的上下文窗口（对话跨度）**
- en: Limited Data Size
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据量有限
- en: Recognising and managing the platform limits of GPT models is essential for
    leveraging their capabilities effectively. By understanding the constraints related
    to the context window and data size, users can develop strategies to mitigate
    their impact, ensuring more coherent and useful interactions. These strategies
    enable the effective application of GPT models across various use cases despite
    the inherent platform limitations.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 认识和管理 GPT 模型的平台限制对于有效地利用其能力至关重要。通过理解与上下文窗口和数据大小相关的约束，用户可以制定策略来减轻其影响，确保更连贯和有用的交互。这些策略使得
    GPT 模型能够在各种用例中有效应用，尽管存在固有的平台限制。
- en: Limited Built-in External Integration
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 有限的内置外部集成
- en: 'This constraint has significant implications for how GPT models can be used
    in real-world applications, especially those requiring interaction with external
    data sources and services, including:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 此约束对 GPT 模型在现实世界应用中的使用方式有重大影响，特别是那些需要与外部数据源和服务交互的应用，包括：
- en: Limited Connectivity
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接性有限
- en: Manual Integration
  id: totrans-350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动集成
- en: 'With the release of GPT-4o, significant advancements have been made to address
    the limited built-in external integration capabilities. Notably, GPT-4o introduces
    the ability to connect to popular cloud storage services such as Google Drive
    and Microsoft OneDrive. These recent additions substantially enhance the model’s
    ability to interact with external systems and data sources, including:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 GPT-4o 的发布，针对有限的内置外部集成能力进行了重大改进。值得注意的是，GPT-4o 引入了连接到流行的云存储服务，如 Google Drive
    和 Microsoft OneDrive 的能力。这些最新的添加显著增强了模型与外部系统和数据源交互的能力，包括：
- en: Google Drive Integration
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Google Drive 集成
- en: Microsoft OneDrive Integration
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft OneDrive 集成
- en: The limited built-in external integration has been a significant constraint
    for GPT models, impacting their ability to interact with external systems and
    data sources. However, these limitations are being addressed with the advancements
    introduced in GPT-4o, including integrations with Google Drive and Microsoft OneDrive.
    These improvements enhance the model’s functionality, simplify development processes,
    and expand its applicability in various real-world scenarios.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 有限的内置外部集成一直是 GPT 模型的重大限制，影响了它们与外部系统和数据源交互的能力。然而，这些限制正在通过 GPT-4o 中引入的进步得到解决，包括与
    Google Drive 和 Microsoft OneDrive 的集成。这些改进增强了模型的功能，简化了开发过程，并扩大了其在各种现实场景中的应用范围。
- en: GPT Contingent Weaknesses
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 模型的潜在弱点
- en: 'These weaknesses may not be inherent to the model itself but are consequences
    of integrating ChatGPT into various workflows and processes. Understanding these
    contingent weaknesses is essential for effectively managing and mitigating their
    impact on productivity and overall system performance, including:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 这些弱点可能并非模型本身的固有属性，而是将 ChatGPT 集成到各种工作流程和过程中的后果。理解这些潜在弱点对于有效地管理和减轻其对生产力和整体系统性能的影响至关重要，包括：
- en: Additional Overhead of verifying responses
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证响应的额外开销
- en: Unclear Security Policies
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不明确的网络安全策略
- en: Bias and Ethical Considerations
  id: totrans-359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏见和伦理考量
- en: Dependency on Model Updates
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 依赖模型更新
- en: User Training and Adaptation
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户培训和适应
- en: Recognising and managing GPT contingent weaknesses is crucial for effectively
    integrating ChatGPT into workflows and business processes.. While the model offers
    significant advantages in generating human-like text and automating tasks, the
    indirect consequences, such as additional overhead, unclear security policies,
    and the need for bias mitigation, must be addressed. By understanding these contingent
    weaknesses and implementing appropriate strategies, organisations can maximise
    the benefits of ChatGPT while minimising potential risks and inefficiencies.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 认识和管理GPT的潜在弱点对于有效地将ChatGPT集成到工作流程和业务流程中至关重要。虽然该模型在生成类似人类的文本和自动化任务方面提供了显著的优势，但其间接后果，如额外的开销、不明确的安全政策和需要减轻偏见，必须得到解决。通过理解这些潜在弱点并实施适当的策略，组织可以最大限度地发挥ChatGPT的益处，同时最大限度地减少潜在的风险和低效。
- en: Other ChatGPT Weaknesses
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 其他ChatGPT弱点
- en: 'These weaknesses are diverse and can influence various aspects of its performance,
    usability, and integration into broader systems and workflows, including:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 这些弱点多种多样，可能影响其性能、可用性和集成到更广泛系统和工作流程的各个方面，包括：
- en: Non-linear Dependency on Input
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对输入的非线性依赖
- en: Other Bias
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他偏见
- en: Non-autonomous Processing
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非自主处理
- en: Repetitive Responses
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复性响应
- en: Overly Generalised Responses
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于泛化的响应
- en: Data Loss/Security Issues
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据丢失/安全问题
- en: Verbose Responses
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 繁琐的响应
- en: Over-dependence on AI
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度依赖AI
- en: Early Stage of Product Evolution
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品进化早期阶段
- en: No Doctrine or Usage Guidelines
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有教条或使用指南
- en: No Explainability / Audit
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无可解释性/审计
- en: Addressing these additional weaknesses is essential for maximising the effectiveness
    of ChatGPT. By understanding and managing these limitations, users can better
    integrate the model into their workflows, ensure data security, mitigate bias,
    and maintain human oversight. As the technology evolves, ongoing efforts to improve
    transparency, develop usage guidelines, and enhance the model’s capabilities will
    be crucial for its continued success and reliability.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这些额外的弱点对于最大化ChatGPT的有效性至关重要。通过理解和管理这些限制，用户可以更好地将模型集成到他们的工作流程中，确保数据安全，减轻偏见，并保持人工监督。随着技术的不断发展，持续努力提高透明度、制定使用指南和增强模型功能对于其持续成功和可靠性至关重要。
- en: Focus on What the User can Control
  id: totrans-377
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关注用户可以控制的内容
- en: 'In this section, we cover the fourth component of the ChatGPT “Black-box” Mindset.
    This topic is covered in greater detail in the chapter “Advanced Black-box Interface
    #4 - Focus on what the user can control” in the book [“Advanced ChatGPT Application
    and Operations Guide”](https://bjl.ink/GptAP).'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: '在本节中，我们讨论了ChatGPT“黑盒”思维的第四个组成部分。这一主题在《“高级ChatGPT应用与操作指南”》一书的“高级黑盒界面 #4 - 关注用户可以控制的内容”章节中有更详细的介绍。[“高级ChatGPT应用与操作指南”](https://bjl.ink/GptAP)。'
- en: '![Black-box Mindset #4](image_rsrc1GJ.jpg)'
  id: totrans-379
  prefs: []
  type: TYPE_IMG
  zh: '![黑盒思维 #4](image_rsrc1GJ.jpg)'
- en: 'Figure 16\. Black-box Mindset #4'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: '图16. 黑盒思维 #4'
- en: Despite ChatGPT’s black-box nature, users have significant control over their
    interactions with the model. This component highlights the importance of user
    control in strategy formulation, attitude and expectations, prompt structure and
    content, interaction use cases, and response use. By focusing on these controllable
    elements, users can optimise their interactions and derive maximum value from
    ChatGPT.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT具有黑盒性质，但用户对其与模型的交互拥有显著的控制权。这一部分强调了在策略制定、态度和期望、提示结构及内容、交互用例和响应使用等方面用户控制的重要性。通过关注这些可控元素，用户可以优化他们的交互并从ChatGPT中获得最大价值。
- en: In this section, we will explore the various aspects of ChatGPT that users can
    control to optimise their interactions and achieve desired outcomes. Understanding
    these elements allows users to leverage the full potential of ChatGPT while managing
    its limitations effectively. The key areas of user control are outlined in the
    figure below and include strategy, attitude, and expectations, prompt structure
    and content, GPT interaction, and the use of responses.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨用户可以控制的ChatGPT的各个方面，以优化他们的交互并实现期望的结果。理解这些元素使用户能够充分利用ChatGPT的潜力，同时有效地管理其限制。以下图示概述了用户控制的关键领域，包括策略、态度和期望、提示结构及内容、GPT交互和响应的使用。
- en: '![GPT What the user can control- Summary](image_rsrc1GK.jpg)'
  id: totrans-383
  prefs: []
  type: TYPE_IMG
  zh: '![用户可以控制的内容-总结](image_rsrc1GK.jpg)'
- en: Figure 17\. GPT What the user can control- Summary
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 图17. 用户可以控制的内容-总结
- en: Deciding on the Strategy for ChatGPT Use in a User’s Problem Domain
  id: totrans-385
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在用户问题域中决定ChatGPT的使用策略
- en: 'When integrating ChatGPT into a specific problem domain, it is essential to
    develop a clear and effective strategy. Three key components should guide this
    strategy: defining the objective, selecting the problem, and formulating an operational
    strategy. Each of these components plays a critical role in ensuring that the
    use of ChatGPT aligns with the user’s goals and delivers meaningful results.'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 当将ChatGPT集成到特定的问题领域时，制定一个明确和有效的策略至关重要。以下三个关键组成部分应指导这一策略：定义目标、选择问题以及制定操作策略。这些组成部分中的每一个都在确保ChatGPT的使用与用户的目标一致并产生有意义的结果方面发挥着关键作用。
- en: What is the Objective?
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是什么？
- en: 'The first step in developing a strategy for using ChatGPT is clearly defining
    the objective. To establish a clear objective, users should consider the following:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 制定使用ChatGPT的策略的第一步是明确定义目标。为了建立明确的目标，用户应考虑以下因素：
- en: 'SMART Goals: Ensure that the objectives are Specific, Measurable, Achievable,
    Relevant, and Time-bound.'
  id: totrans-389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SMART目标：确保目标具有具体性、可衡量性、可实现性、相关性和时限性。
- en: 'What is Enabled?: Understand the capabilities and limitations of ChatGPT in
    the context of the problem domain.'
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么被启用？：了解ChatGPT在问题领域中的能力和局限性。
- en: By clearly defining the objective, users can create a focused roadmap for integrating
    ChatGPT into their workflows.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 通过明确定义目标，用户可以为将ChatGPT集成到他们的工作流程中创建一个专注的路线图。
- en: Problem Selection
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 问题选择
- en: 'Select the specific problems or tasks where ChatGPT can be effectively applied.
    This involves identifying areas within the problem domain that can benefit most
    from ChatGPT’s capabilities. To select the right problems, consider the following:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 选择ChatGPT可以有效应用的特定问题或任务。这涉及到识别问题领域内最能从ChatGPT的能力中受益的领域。为了选择正确的问题，考虑以下因素：
- en: 'Assessing Relevance and Impact: Evaluate which problems are most relevant to
    the objectives and will have the greatest impact if solved.'
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估相关性和影响：评估哪些问题与目标最为相关，如果解决将产生最大的影响。
- en: 'Feasibility Analysis: Determine the feasibility of applying ChatGPT to the
    selected problems.'
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可行性分析：确定将ChatGPT应用于所选问题的可行性。
- en: By carefully selecting problems that align with the objectives and are feasible
    to tackle, users can ensure that their efforts are both effective and efficient.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仔细选择与目标一致且可行的难题，用户可以确保他们的努力既有效又高效。
- en: Operational Strategy
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 操作策略
- en: 'Once the objectives and problems are defined, the final step is to develop
    an operational strategy. A robust operational strategy ensures that the use of
    ChatGPT is systematic and well-coordinated. Key aspects of an operational strategy
    include:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了目标和问题，最后一步是制定操作策略。一个稳健的操作策略确保ChatGPT的使用是系统化和协调良好的。操作策略的关键方面包括：
- en: 'Implementation Plan: Develop a detailed plan for integrating ChatGPT into the
    workflows.'
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施计划：制定将ChatGPT集成到工作流程中的详细计划。
- en: 'Monitoring and Evaluation: Establish mechanisms for monitoring the performance
    of ChatGPT and evaluating its impact.'
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控与评估：建立监控ChatGPT性能和评估其影响的机制。
- en: 'Risk Management: Identify potential risks and develop strategies to mitigate
    them.'
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险管理：识别潜在风险并制定缓解策略。
- en: By developing a comprehensive operational strategy, users can ensure that the
    integration of ChatGPT is well-executed and delivers the desired outcomes.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 通过制定全面的操作策略，用户可以确保ChatGPT的集成得到良好执行并产生预期的结果。
- en: Conclusion
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Deciding on the strategy for using ChatGPT in a user’s problem domain involves
    a systematic approach to defining objectives, selecting problems, and developing
    an operational strategy.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 决定在用户的问题领域中如何使用ChatGPT的策略涉及定义目标、选择问题和制定操作策略的系统方法。
- en: User Attitude & Expectations of ChatGPT
  id: totrans-405
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户对ChatGPT的态度与期望
- en: 'The success of integrating ChatGPT into various workflows heavily depends on
    the user’s attitude and expectations. Properly managing these factors can significantly
    enhance the effectiveness of interactions with the model. The topic breakdown
    in the figure below highlights four critical areas that influence user attitude
    and expectations: Accuracy, Relevance, Anthropomorphism, and Knowledge Scope.
    Understanding and addressing these areas helps users set realistic expectations
    and interact with ChatGPT more effectively.'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT集成到各种工作流程中的成功很大程度上取决于用户的态度和期望。正确管理这些因素可以显著提高与模型互动的有效性。下面图表中的主题分解突出了影响用户态度和期望的四个关键领域：准确性、相关性、人格化和知识范围。理解和解决这些领域有助于用户设定合理的期望并更有效地与ChatGPT互动。
- en: Accuracy
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性
- en: 'Accuracy refers to the correctness and reliability of the responses generated
    by ChatGPT. Users should be aware of the following aspects:'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性指的是ChatGPT生成的回答的正确性和可靠性。用户应了解以下方面：
- en: 'Expectation Management: Users need to understand that while ChatGPT is highly
    capable, it is not infallible.'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期望管理：用户需要了解，尽管ChatGPT能力很强，但它并非完美无缺。
- en: 'Verification: It is essential to verify the information provided by ChatGPT,
    especially for tasks requiring high precision or involving sensitive data.'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证：对于需要高精度或涉及敏感数据的任务，验证ChatGPT提供的信息至关重要。
- en: Relevance
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性
- en: 'Relevance pertains to how well ChatGPT’s responses align with the user’s needs
    and context. Key considerations include:'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性涉及ChatGPT的回答与用户需求和上下文的一致性。关键考虑因素包括：
- en: 'Contextual Prompts: Providing clear and specific prompts increases the relevance
    of ChatGPT’s responses.'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文提示：提供清晰和具体的提示可以提高ChatGPT回答的相关性。
- en: 'Iterative Refinement: Users may need to refine their prompts and interact iteratively
    with ChatGPT to achieve the desired relevance.'
  id: totrans-414
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代优化：用户可能需要优化他们的提示，并迭代地与ChatGPT互动以达到所需的关联性。
- en: Anthropomorphism
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 人格化
- en: 'Anthropomorphism is the attribution of human characteristics to ChatGPT, which
    can influence user expectations and interactions:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 人格化是将人类特征归因于ChatGPT，这可能会影响用户期望和互动：
- en: 'Understanding Limitations: Users should recognise that ChatGPT, despite its
    human-like text generation, is not sentient and does not possess human understanding
    or emotions.'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解局限性：用户应认识到，尽管ChatGPT具有类似人类的文本生成能力，但它并不具有意识，也不具备人类理解和情感。
- en: 'Interaction Style: While users may interact with ChatGPT conversationally,
    they should remember that the model’s responses are generated through statistical
    patterns rather than genuine comprehension.'
  id: totrans-418
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交互风格：虽然用户可以以对话方式与ChatGPT互动，但他们应该记住，该模型的回答是通过统计模式生成的，而不是真正的理解。
- en: Knowledge Scope
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 知识范围
- en: 'The scope of ChatGPT’s knowledge is another critical factor influencing user
    expectations:'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT知识范围是影响用户期望的另一个关键因素：
- en: 'Training Data Boundaries: ChatGPT’s knowledge is based on its training data,
    which includes information available until a certain point.'
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据边界：ChatGPT的知识基于其训练数据，这包括直到某个时间点可用的信息。
- en: 'Domain Expertise: While ChatGPT can provide valuable insights across various
    domains, it is not a substitute for domain-specific experts.'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 领域专业知识：虽然ChatGPT可以在各个领域提供有价值的见解，但它不能替代特定领域的专家。
- en: Conclusion
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Managing user attitude and expectations is crucial for effectively using ChatGPT.
    By understanding the model’s accuracy, ensuring relevance through contextual prompts,
    recognising the limitations of anthropomorphism, and being aware of the knowledge
    scope, users can set realistic expectations and interact with ChatGPT more effectively.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 管理用户态度和期望对于有效地使用ChatGPT至关重要。通过理解模型的准确性，通过上下文提示确保相关性，认识到人格化的局限性，以及了解知识范围，用户可以设定合理的期望并更有效地与ChatGPT互动。
- en: Prompt Structure and Content
  id: totrans-425
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示结构和内容
- en: 'The structure and content of prompts are critical components of user control
    in interactions with ChatGPT. Well-crafted prompts can significantly enhance the
    quality and relevance of the responses generated by the model. By understanding
    and effectively using various elements of prompt design, users can optimise their
    interactions with ChatGPT. The figure below breaks down the key aspects of prompt
    structure and content into six categories: Prompt Intent, Prompt Data, Prompt
    Context, Prompt Directives, Prompt Type, and Prompt Framework.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的结构和内容是用户在与ChatGPT交互中的关键控制组件。精心设计的提示可以显著提高模型生成的响应的质量和相关性。通过理解和有效使用提示设计的各种元素，用户可以优化与ChatGPT的交互。下方的图解将提示结构和内容的关键方面分解为六个类别：提示意图、提示数据、提示情境、提示指令、提示类型和提示框架。
- en: Prompt Intent
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 提示意图
- en: The intent of the prompt defines the purpose or goal of the interaction. Clarifying
    the intent helps guide ChatGPT to generate responses that align with the user’s
    objectives.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的意图定义了交互的目的或目标。明确意图有助于引导ChatGPT生成与用户目标一致的响应。
- en: 'Clarity and Specificity: Clearly stating the purpose of the prompt ensures
    the model understands the user’s needs. Goal-Oriented Design: Designing prompts
    with a clear end goal in mind helps streamline the interaction.'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰性和具体性：明确说明提示的目的确保模型理解用户的需求。目标导向设计：在设计提示时考虑到明确的目标有助于简化交互。
- en: Prompt Data
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 提示数据
- en: The data provided within the prompt plays a crucial role in shaping the response.
    Including relevant and accurate data helps ChatGPT generate more precise and informed
    answers.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 提示中提供的数据在塑造响应中起着至关重要的作用。包括相关且准确的数据有助于ChatGPT生成更精确和有见地的答案。
- en: 'Data Inclusion: Incorporate relevant facts, figures, and details within the
    prompt to provide a solid foundation for the response. Data Accuracy: Ensure that
    the data provided is accurate and up-to-date.'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 数据包含：在提示中融入相关事实、数据和细节，为响应提供坚实的基础。数据准确性：确保提供的数据准确且最新。
- en: Prompt Context
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 提示情境
- en: Context provides background information that helps ChatGPT understand the broader
    scenario in which the prompt is situated. Including context enhances the relevance
    and coherence of the responses.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 情境提供背景信息，帮助ChatGPT理解提示所处的更广泛场景。包括情境可以增强响应的相关性和连贯性。
- en: 'Background Information: Providing background information related to the prompt
    ensures that ChatGPT comprehensively understands the topic. Contextual Clarity:
    Clearly defining the context within the prompt helps avoid ambiguity.'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 背景信息：提供与提示相关的背景信息确保ChatGPT全面理解主题。情境清晰性：在提示中明确定义情境有助于避免歧义。
- en: Prompt Directives
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 提示指令
- en: Directives are instructions that guide ChatGPT on how to approach the prompt.
    These can include specific tasks, formatting requirements, or stylistic preferences.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 指令是指导ChatGPT如何处理提示的说明。这些可以包括具体任务、格式要求或风格偏好。
- en: 'Task-Specific Instructions: Including explicit instructions on what the model
    should do (e.g., summarise, compare, explain) helps focus the response. Formatting
    and Style: Specifying formatting requirements or stylistic preferences.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 任务特定指令：包括对模型应执行的操作的明确说明（例如，总结、比较、解释）有助于集中响应。格式和风格：指定格式要求或风格偏好。
- en: Prompt Type
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 提示类型
- en: Different types of prompts can elicit different types of responses from ChatGPT.
    Understanding the various prompt types helps users choose the most effective approach
    for their needs.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的提示类型可以从ChatGPT那里引发不同类型的响应。理解各种提示类型有助于用户选择最适合他们需求的有效方法。
- en: 'Open-Ended vs. Close-Ended: Open-ended prompts encourage expansive and detailed
    responses, while close-ended prompts solicit specific, concise answers. Question-Based
    vs. Instruction-Based: Question-based prompts invite informative responses, whereas
    instruction-based prompts provide more direct guidance to the model.'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式与封闭式：开放式提示鼓励广泛和详细的响应，而封闭式提示则要求具体、简洁的答案。基于问题与基于指令：基于问题的提示邀请提供信息性的响应，而基于指令的提示则向模型提供更直接的指导。
- en: Prompt Framework
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 提示框架
- en: A structured framework for prompts ensures consistency and comprehensiveness
    in interactions with ChatGPT. Developing a standardised approach to prompt design
    enhances overall effectiveness.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 为ChatGPT的提示构建一个结构化框架可以确保与ChatGPT交互的一致性和全面性。制定标准化的提示设计方法可以增强整体效果。
- en: 'Consistent Structure: A consistent structure for prompts helps streamline interactions
    and ensures that all necessary elements are included. Iterative Refinement: Continuously
    refining and improving prompt design based on feedback and results helps optimise
    interactions as the use continues.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 一致的结构：提示的一致结构有助于简化交互并确保包含所有必要的元素。迭代优化：根据反馈和结果持续优化提示设计，有助于在使用过程中优化交互。
- en: Conclusion
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Effective prompt structure and content are pivotal in leveraging the full potential
    of ChatGPT. By focusing on the intent, data, context, directives, type, and framework
    of prompts, users can significantly enhance the relevance, accuracy, and usefulness
    of the responses generated by the model.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示结构和内容对于充分发挥ChatGPT的潜力至关重要。通过关注意图、数据、上下文、指令、类型和框架，用户可以显著提高模型生成的响应的相关性、准确性和实用性。
- en: Interaction Use Cases
  id: totrans-447
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交互用例
- en: Interaction use cases for ChatGPT illustrate how different combinations of prompts,
    data, and context can be used to achieve specific objectives. Each use case provides
    a unique approach to engaging with the model, enabling users to tailor their interactions
    to meet various needs effectively. Understanding these use cases helps users leverage
    the full potential of ChatGPT.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的交互用例展示了如何使用不同的提示、数据和上下文组合来实现特定目标。每个用例提供了一种与模型互动的独特方法，使用户能够有效地定制他们的交互以满足各种需求。了解这些用例有助于用户充分发挥ChatGPT的潜力。
- en: Overview of Interaction Components
  id: totrans-449
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 交互组件概述
- en: This section defines the key components in the ChatGPT interaction model. The
    figure below breaks down the interaction use cases into several categories, each
    describing a unique combination of prompt, data, and context.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 本节定义了ChatGPT交互模型中的关键组件。下面的图解将交互用例分解为几个类别，每个类别描述了提示、数据和上下文的独特组合。
- en: '![Interaction Use Case Context](image_rsrc1GM.jpg)'
  id: totrans-451
  prefs: []
  type: TYPE_IMG
  zh: '![交互用例上下文](image_rsrc1GM.jpg)'
- en: Figure 18\. Interaction Use Case Context
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 图18. 交互用例上下文
- en: 'Prompts: These are text chunks instructing ChatGPT to perform some action or
    trigger a response. They are mandatory for every interaction with ChatGPT.'
  id: totrans-453
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示：这些是指导ChatGPT执行某些操作或触发响应的文本块。与ChatGPT的每次交互都是强制性的。
- en: 'Context: These are text chunks providing information that is common to multiple
    prompts or sessions. This could include background information like an organisation
    overview, project description, or stakeholder list. It could also include output
    instructions, such as always outputting in markdown. Context is optional but can
    greatly enhance the relevance and accuracy of ChatGPT’s responses. In the ChatGPT
    web client, you can enter “Custom Instructions” that are statements you might
    normally include in prompts, but apply to multiple prompts or even every interaction
    session that you have with ChatGPT.'
  id: totrans-454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：这些是提供信息文本块，这些信息对多个提示或会话是通用的。这可能包括背景信息，如组织概述、项目描述或利益相关者列表。它也可能包括输出指令，例如始终以Markdown格式输出。上下文是可选的，但可以极大地提高ChatGPT响应的相关性和准确性。在ChatGPT网页客户端中，您可以输入“自定义指令”，这些是您通常可能包含在提示中的语句，但适用于多个提示或甚至您与ChatGPT的每次交互会话。
- en: 'Data: These are information blocks we want ChatGPT to process or consider in
    some way based on the Prompt instructions and modulated by any Context information
    that is provided. Data is optional but can be crucial for tasks that require processing
    or analysing specific information. In recent versions, OpenAI has deployed new
    capabilities for accessing data, including direct URL access to resources located
    on the public internet, and integration points with Google Drive and Microsoft
    Onedrive. You can also upload files into the Context Window or paste the text
    data into the prompt window.'
  id: totrans-455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据：这些是我们希望ChatGPT根据提示指令处理或以某种方式考虑的信息块。数据是可选的，但对于需要处理或分析特定信息的工作至关重要。在最新版本中，OpenAI部署了新的数据访问功能，包括直接访问位于公共互联网上的资源的URL，以及与Google
    Drive和Microsoft Onedrive的集成点。您还可以将文件上传到上下文窗口或将文本数据粘贴到提示窗口中。
- en: 'Memory: OpenAI introduced ChatGPT “Memory” in 2024, which is used to store
    current guidance from users on their objectives, context or data. It’s not clear
    whether this is a new capability or simply some user interface “sugar” to help
    users better understand GPT operation. Nonetheless, you will often see a response
    along the lines of “Memory Updated” if you make a categorical statement or instruction
    to GPT.'
  id: totrans-456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记忆：OpenAI 在 2024 年引入了 ChatGPT 的“记忆”功能，用于存储用户关于其目标、上下文或数据的当前指导。目前尚不清楚这是否是一种新功能，或者只是用户界面上的“糖衣”，以帮助用户更好地理解
    GPT 的操作。尽管如此，如果你对 GPT 提出分类性的陈述或指令，你经常会看到“记忆更新”之类的响应。
- en: Basic ChatGPT Interaction Data Patterns
  id: totrans-457
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基本ChatGPT交互数据模式
- en: There are eight (8) basic interaction patterns, summarised below, and expanded
    in my book [“Advanced ChatGPT Application Primer”](https://bjl.ink/GptAP).
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 以下总结了八个（8）基本交互模式，并在我的书中进行了扩展 [《高级 ChatGPT 应用入门》](https://bjl.ink/GptAP)。
- en: 'Simple Text Completion (Prompt only): the user provides a straightforward prompt
    with no additional context or data. ChatGPT completes the text based solely on
    the input prompt.'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 简单文本补全（仅提示）：用户提供一个简单的提示，没有额外的上下文或数据。ChatGPT 仅根据输入提示完成文本。
- en: 'Simple Text Completion with Context: The user provides a prompt along with
    some contextual information to guide the response. This additional context helps
    ChatGPT generate more relevant and precise outputs.'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 带上下文的简单文本补全：用户提供提示和一些上下文信息以引导响应。这种额外的上下文有助于 ChatGPT 生成更相关和精确的输出。
- en: 'Prompt and Data: The user provides a prompt along with specific data that ChatGPT
    should incorporate into its response. The data enhances the relevance and accuracy
    of the output.'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 提示和数据：用户提供提示以及 ChatGPT 应将其纳入其响应的具体数据。这些数据增强了输出的相关性和准确性。
- en: 'Prompt and Data with Context: In this scenario, the user provides a prompt,
    specific data, and additional context. This comprehensive input allows ChatGPT
    to generate detailed and contextually accurate responses.'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 带上下文的提示和数据：在这种情况下，用户提供提示、具体数据和额外的上下文。这种综合输入允许 ChatGPT 生成详细且上下文准确的响应。
- en: 'Multi-Step No Context: This pattern involves a sequence of prompts without
    additional context. Each step builds on the previous response to achieve a more
    complex objective.'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 无上下文的分步操作：此模式涉及一系列不带额外上下文的提示。每个步骤都建立在之前的响应之上，以实现更复杂的目标。
- en: 'Multi-Step with Context: In this pattern, the multi-step interaction includes
    context at each step, guiding ChatGPT to produce more coherent and connected responses.'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 带上下文的分步操作：在这个模式中，多步交互在每个步骤中都包含上下文，引导 ChatGPT 生成更连贯和相关的响应。
- en: 'Input Data in Context: This pattern involves providing specific data within
    a contextual framework. The context helps ChatGPT understand the relevance of
    the data and generate an appropriate response.'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 在上下文中输入数据：此模式涉及在上下文框架内提供具体数据。上下文有助于 ChatGPT 理解数据的关联性并生成适当的响应。
- en: 'Multi-Step with Context/Data: In this comprehensive pattern, multiple steps,
    context, and data are combined. Each step builds on the previous ones, incorporating
    additional information and context to refine the responses.'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 带上下文/数据的分步操作：在这个综合模式中，结合了多个步骤、上下文和数据。每个步骤都建立在之前的基础上，结合额外的信息和上下文以细化响应。
- en: Understanding and using various interaction use cases allows users to tailor
    their engagements with ChatGPT to meet specific needs effectively. By combining
    prompts, data, and context in different ways, users can optimise the relevance,
    accuracy, and coherence of the responses generated by the model. These use cases
    provide a structured approach to interacting with ChatGPT, enhancing its utility
    across a wide range of applications.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和使用各种交互用例使用户能够有效地调整与 ChatGPT 的互动以满足特定需求。通过以不同的方式结合提示、数据和上下文，用户可以优化模型生成的响应的相关性、准确性和连贯性。这些用例为与
    ChatGPT 互动提供了一种结构化的方法，增强了其在广泛应用中的实用性。
- en: ChatGPT Product Interaction
  id: totrans-468
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT 产品交互
- en: Depending on your use case, you’ll be using one or more of these three black-box
    interfaces, each requiring more knowledge of the internal structure and function
    of the GPT platform.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的用例，您将使用一个或多个这三个黑盒接口，每个接口都需要更多了解 GPT 平台的内部结构和功能。
- en: ChatGPT Consumer Interface
  id: totrans-470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT 消费者界面
- en: OpenAI Playground Interface
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: OpenAI 操场界面
- en: OpenAI API Interface
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: OpenAI API 界面
- en: OpenAI Custom GPT Interace
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: OpenAI 定制 GPT 界面
- en: I’ll briefly cover these below, leading to more complete “user guides” for some
    of them in later parts of the book.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在下面简要介绍这些内容，并在本书的后续部分提供一些更完整的“用户指南”。
- en: ChatGPT Consumer Interface
  id: totrans-475
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT消费者界面
- en: 'This black-box interface is what I’ve been describing mainly in the preceding
    sections. There are three sub-types of this interface:'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 这种黑盒界面是我在前几节中主要描述的内容。这种界面有三种子类型：
- en: Free ChatGPT
  id: totrans-477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Free ChatGPT
- en: ChatGPT Plus
  id: totrans-478
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT Plus
- en: Enterprise ChatGPT
  id: totrans-479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 企业ChatGPT
- en: Free ChatGPT Interface
  id: totrans-480
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Free ChatGPT Interface
- en: This falls into the broad category of the interface I’ve described so far in
    this description.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 这属于我在本描述中迄今为止描述的广泛界面类别。
- en: ChatGPT Plus Interface
  id: totrans-482
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: ChatGPT Plus界面
- en: 'ChatGPT Plus adds three important capabilities to the Free version:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus为免费版本增加了三个重要功能：
- en: 'GPT-4 Model: you can select the most advanced model, which includes plugins.'
  id: totrans-484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: GPT-4模型：您可以选择最先进的模型，该模型包括插件。
- en: 'Custom Instructions: you can generate components of your prompts that are common
    to a chat session or series of sessions. You can include such things as the role
    that you want GPT to adopt, additional context, specific input and output formats
    and other inputs. The ChatGPT User Interface splits these custom instructions
    into two sections. As far as I can determine, both these sections have the same
    effect on your prompt execution as the “System” message in the TextCompletion
    API (see below). I’ve found Custom Instructions very useful in my own work with
    ChatGPT.'
  id: totrans-485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义指令：您可以为聊天会话或一系列会话中常见的提示生成组件。您可以包括您希望GPT采用的角色、附加上下文、特定的输入和输出格式以及其他输入。ChatGPT用户界面将这些自定义指令分为两个部分。据我所知，这两个部分对您的提示执行的影响与TextCompletion
    API中的“系统”消息相同（见下文）。我发现自定义指令在ChatGPT的工作中非常有用。
- en: 'Beta Previews: ChatGPT Plus users are eligible to preview new features of ChatGPT
    when they are in early release.'
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 测试预览：ChatGPT Plus用户在早期发布时可以预览ChatGPT的新功能。
- en: The Plus edition of ChatGPT is a paid plan and provides many features and options.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus的Plus版是一个付费计划，提供了许多功能和选项。
- en: '![ChatGPT Plus Version UI](image_rsrc1GN.jpg)'
  id: totrans-488
  prefs: []
  type: TYPE_IMG
  zh: '![ChatGPT Plus版本UI](image_rsrc1GN.jpg)'
- en: Figure 19\. ChatGPT Plus Version UI
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 图19. ChatGPT Plus版本UI
- en: 'Elements of the ChatGPT Plus UI:'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus UI的元素：
- en: 'Interaction Area: The interaction area is where users type their prompts to
    engage with ChatGPT.'
  id: totrans-491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 交互区域：交互区域是用户输入提示以与ChatGPT互动的地方。
- en: 'Account Icon: The account icon, located at the top right corner, provides access
    to user account settings and information.'
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 账户图标：位于右上角的账户图标提供访问用户账户设置和信息。
- en: 'Canned Prompts: The canned prompts section offers a selection of predefined
    questions and tasks that users can click on to quickly initiate interactions with
    ChatGPT.'
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预设提示：预设提示部分提供了用户可以点击以快速启动与ChatGPT交互的预定义问题和任务的选择。
- en: 'Model Selector: The model selector allows users to choose between different
    versions of the ChatGPT model, such as GPT-3.5 and GPT-4.'
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型选择器：模型选择器允许用户在ChatGPT的不同版本之间进行选择，例如GPT-3.5和GPT-4。
- en: 'New Session Icon: The new session icon facilitates starting a fresh conversation
    with ChatGPT.'
  id: totrans-495
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 新会话图标：新会话图标便于开始与ChatGPT的新对话。
- en: 'Show/Hide Sidebar Icon: The show/hide sidebar icon toggles the visibility of
    the sidebar, which contains navigation and additional features.'
  id: totrans-496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 显示/隐藏侧边栏图标：显示/隐藏侧边栏图标切换侧边栏的可见性，其中包含导航和附加功能。
- en: 'Conversation History / Custom GPT Sidebar: The conversation history sidebar
    displays previous interactions with ChatGPT, allowing users to revisit and reference
    past conversations.'
  id: totrans-497
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对话历史/自定义GPT侧边栏：对话历史侧边栏显示与ChatGPT的先前交互，使用户能够回顾和参考过去的对话。
- en: 'Accuracy Disclaimer: The accuracy disclaimer is a reminder to users that ChatGPT,
    while powerful, can make mistakes.'
  id: totrans-498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性免责声明：准确性免责声明是提醒用户，尽管ChatGPT功能强大，但可能会出错。
- en: 'Help Icon: The help icon provides access to support resources and documentation.'
  id: totrans-499
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 帮助图标：帮助图标提供访问支持资源和文档。
- en: Enterprise ChatGPT
  id: totrans-500
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 企业ChatGPT
- en: As the name implies Enterprise ChatGPT is a product offer from OpenAI targeted
    at organisations with multiple users of ChatGPT.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名所示，企业ChatGPT是OpenAI针对ChatGPT多个用户组织的产品提供。
- en: At the time of writing, I don’t have any access to Enterprise ChatGPT, so I
    can’t comment from an experience perspective. But from the OpenAI product description
    pages, the differences are primarily in relation to data security, user management
    and service levels. The actual user interface is the same as ChatGPT Plus. I won’t
    elaborate any more on Enterprise ChatGPT. If I get more experience with it, then
    perhaps I’ll come and update this blurb.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，我无法访问企业版ChatGPT，因此无法从经验角度进行评论。但从OpenAI的产品描述页面来看，差异主要在于数据安全、用户管理和服务级别。实际的用户界面与ChatGPT
    Plus相同。我不会再详细说明企业版ChatGPT。如果我有更多经验，或许我会回来更新这个简介。
- en: OpenAI Playground Interface
  id: totrans-503
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: OpenAI游乐场界面
- en: The OpenAI Playground is a web-based interface that provides a user-friendly
    environment to experiment with OpenAI’s language models, such as , GPT-4, GPT-4o
    and its inevitable successors like GPT-5\. It is an invaluable tool for developers,
    researchers, and professionals to test and debug their conversational AI use cases,
    prompts, and other applications. This Playground is often the first point of contact
    for many users before they integrate the OpenAI API into their own applications.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI游乐场是一个基于Web的界面，提供了一个用户友好的环境来实验OpenAI的语言模型，例如GPT-4、GPT-4o及其不可避免的继任者如GPT-5。它是开发人员、研究人员和专业人员测试和调试他们的对话式AI用例、提示和其他应用的宝贵工具。这个游乐场通常是许多用户在将OpenAI
    API集成到他们自己的应用之前接触的第一个点。
- en: Thus, your internal model of GPT needs to be richer, for example understanding
    the parameter functions and the three types of messages. The rest of the Appliance
    AI Black-box approach is the same.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，您的内部GPT模型需要更丰富，例如理解参数功能和三种类型的消息。其余的Appliance AI黑盒方法相同。
- en: I’m not going to go into detail on the OpenAI Playground here. But the parameters
    are illustrated in the following diagram and described in more detail after that.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会在这里详细说明OpenAI游乐场。但参数在以下图中进行了说明，并在之后进行了更详细的描述。
- en: '![The OpenAI Playground User Interface](image_rsrc1GP.jpg)'
  id: totrans-507
  prefs: []
  type: TYPE_IMG
  zh: '![OpenAI游乐场用户界面](image_rsrc1GP.jpg)'
- en: Figure 20\. The OpenAI Playground User Interface
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 图20. OpenAI游乐场用户界面
- en: There are two areas you can add messages that are submitted to ChatGPT for processing
    (“completion”).
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在两个区域添加要提交给ChatGPT进行处理的消息（“完成”）。
- en: 'User Message: The input text that you provide to the model. (also called a
    “prompt”)'
  id: totrans-510
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户消息：您提供给模型的输入文本。（也称为“提示”）
- en: 'System Message: An additional text input that is submitted to the model with
    the prompt to give additional context.'
  id: totrans-511
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 系统消息：一个额外的文本输入，用于向模型提交以提供额外上下文的提示。
- en: 'There are eight (8) parameters you can set that control how the GPT engine
    processes the prompts and generates an answer:'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以设置八个（8）参数来控制GPT引擎如何处理提示并生成答案：
- en: 'Mode: this is a legacy parameter – leave it set to “Chat” unless you know what
    you’re doing'
  id: totrans-513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模式：这是一个遗留参数 - 除非您知道自己在做什么，否则请将其设置为“Chat”。
- en: 'Model: Specifies which GPT model to use (e.g., `text-davinci-002`, `text-ada-002`).'
  id: totrans-514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型：指定要使用的GPT模型（例如，`text-davinci-002`，`text-ada-002`）。
- en: 'Temperature: Controls the randomness of the model’s output (Range: 0 to 1).'
  id: totrans-515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 温度：控制模型输出的随机性（范围：0到1）。
- en: 'Maximum Length: Limits the number of tokens in the model’s output. (also called
    “max_tokens”)'
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最大长度：限制模型输出的标记数量。（也称为“max_tokens”）
- en: 'Stop Sequences: Character strings that will stop generating further tokens.
    The returned text will not contain the stop sequence. You can enter up to 4 Stop
    sequences.'
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 停止序列：字符字符串，用于停止生成进一步的标记。返回的文本将不包含停止序列。您可以输入多达4个停止序列。
- en: 'TopP: Filters the model’s vocabulary before sampling the next token. (Range:
    0 to 1) (also called “top_p “)'
  id: totrans-518
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: TopP：在采样下一个标记之前过滤模型的词汇表。（范围：0到1）（也称为“top_p”）
- en: 'Frequency Penalty: Penalises or rewards frequently occurring tokens. (Range:
    -2 to 2)'
  id: totrans-519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 频率惩罚：对频繁出现的标记进行惩罚或奖励。（范围：-2到2）
- en: 'Presence Penalty: Penalises or rewards new tokens. (Range: -2 to 2)'
  id: totrans-520
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存在惩罚：对新的标记进行惩罚或奖励。（范围：-2到2）
- en: There are also several “Helper Functions” at the top right of the main work
    screen.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 在主工作屏幕的右上角也有一些“辅助函数”。
- en: 'Presets: configurations of the above parameter settings and messages that you’ve
    previously saved.'
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预设：您之前保存的上述参数设置和消息的配置。
- en: 'Save Button: a button to save a named version of the current configuration.'
  id: totrans-523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保存按钮：一个保存当前配置命名版本的按钮。
- en: 'View Code Button: a button that shows a code version of the current configuration
    that can be copied and pasted into a code editor.'
  id: totrans-524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查看代码按钮：一个显示当前配置的代码版本并可以复制粘贴到代码编辑器的按钮。
- en: 'Share Button: allows you to share an existing configuration with others.'
  id: totrans-525
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享按钮：允许您与他人共享现有配置。
- en: 'More functions: three horizontal dots. Currently only shows one menu item,
    which is to activate a Content Filter pop-up.'
  id: totrans-526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更多功能：三个水平点。目前仅显示一个菜单项，即激活内容过滤器弹出窗口。
- en: The OpenAI Playground is a critical tool for anyone looking to integrate conversational
    AI into professional workflows. Its user-friendly interface, combined with a range
    of customisable parameters, offers a valuable platform for prompt engineering
    and testing, essential for developing high-quality conversational interfaces.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 游乐场是任何希望将对话式人工智能集成到专业工作流程中的人的关键工具。其用户友好的界面，结合一系列可定制的参数，为提示工程和测试提供了一个有价值的平台，这对于开发高质量对话式界面至关重要。
- en: OpenAI API Interface
  id: totrans-528
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: OpenAI API 接口
- en: The OpenAI API interface provides both programmatic integration with the same
    functionality as you find in the web user interface and app versions of ChatGPT,
    but additional API endpoints as well.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI API 接口提供了与 ChatGPT 网页用户界面和应用程序版本相同的程序化集成功能，同时还提供了额外的 API 端点。
- en: The OpenAI API is the gateway for developers to access OpenAI’s state-of-the-art
    language models. It provides programmatic access to various functionalities beyond
    what is available in the Playground. The TextCompletion endpoint is crucial for
    integrating conversational AI into professional knowledge-worker activities. This
    endpoint allows developers to tap into the language model’s capabilities for generating
    human-like text based on provided prompts.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI API 是开发者访问 OpenAI 最先进语言模型的门户。它提供了比游乐场中可用的功能更广泛的程序化访问。文本完成端点是集成对话式人工智能到专业知识工作者活动中的关键。此端点允许开发者利用语言模型的能力，根据提供的提示生成类似人类的文本。
- en: I don’t think you need to add much more to the Black Box model for the OpenAI
    API interface than you do for the OpenAI Playground interface. There are nuances
    that specifically relate to API programming, such as Authentication, Rate Limits,
    Error Messages, and the like, but the knowledge level required is about the same.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为您不需要为 OpenAI API 接口添加比 OpenAI 游乐场接口更多的内容。有一些与 API 编程相关的细微差别，例如身份验证、速率限制、错误消息等，但所需的知识水平大致相同。
- en: The TextCompletion endpoint is the workhorse for many professional applications
    involving conversational AI. Understanding its parameters and advanced techniques
    allows for generating highly tailored and effective outputs, making it an indispensable
    tool for anyone writing about or working with advanced ChatGPT functionalities
    in professional settings.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 文本完成端点是许多涉及对话式人工智能的专业应用的工作马。理解其参数和高级技术可以生成高度定制和有效的输出，使其成为任何在专业环境中撰写或使用高级 ChatGPT
    功能的人不可或缺的工具。
- en: OpenAI Custom GPT Interace
  id: totrans-533
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: OpenAI 自定义 GPT 接口
- en: The OpenAI Custom GPT Interace is a builder and configuration interface that
    allows you to develop and maintain Custom GPTs, which are instances of the GPT
    engine and ChatGPT chat interface with additional prompting that shapes the interaction
    behaviour for a specific use case or application area.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 自定义 GPT 接口是一个构建和配置界面，允许您开发和维护自定义 GPT，这些是具有额外提示的 GPT 引擎和 ChatGPT 聊天界面的实例，这些提示塑造了特定用例或应用领域的交互行为。
- en: Designing and implementing Custom GPTs in superficially very simple but covers
    a very wide range of factors, and is beyond the scope of this book. Please search
    the OpenAI website for more information. Youtube also has some excellent tutorials.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 设计和实现自定义 GPT 虽然表面上非常简单，但涵盖了非常广泛的因素，超出了本书的范围。请搜索 OpenAI 网站获取更多信息。YouTube 上也有一些优秀的教程。
- en: Summary
  id: totrans-536
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 摘要
- en: So, our black box model of ChatGPT is a probability-based text regurgitator.
    We interact with it in a simplified human interaction model, in which the only
    observable behaviour is the text it regurgitates. Having said all that, the outputs
    we get from ChatGPT are often remarkable.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的 ChatGPT 黑盒模型是一个基于概率的文本重复器。我们以简化的人类交互模型与之互动，其中唯一可观察的行为是它重复的文本。话虽如此，我们从
    ChatGPT 获得的输出通常非常出色。
- en: If you adopt the “black box” model of ChatGPT, you’ll be in a much better position
    to apply it to your knowledge or practice domain, because it will focus your attention
    on the things you can control.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你采用ChatGPT的“黑盒”模型，你将处于更好的位置将其应用于你的知识或实践领域，因为它将你的注意力集中在你可以控制的事情上。
- en: By focusing on the things you can control, you will identify the areas where
    you might need to improve, and by doing so, you will increase the quality and
    value of the results you get from the AI Appliance.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注你可以控制的事情，你将确定你可能需要改进的领域，通过这样做，你将提高从人工智能设备中获得的结果的质量和价值。
- en: Use of ChatGPT Responses
  id: totrans-540
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT响应的使用
- en: The use of ChatGPT responses is a crucial element of user control that significantly
    impacts the effectiveness and utility of interactions with the model. Properly
    managing how responses are used involves setting appropriate user expectations,
    assessing the quality and relevance of the responses, and applying the responses
    effectively within the user’s context.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的响应是用户控制的一个关键要素，它对与模型交互的有效性和实用性有重大影响。正确管理响应的使用涉及设定适当的使用期望，评估响应的质量和相关性，并在用户的环境中有效地应用响应。
- en: User Expectations
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 用户期望
- en: Setting realistic and informed expectations about ChatGPT’s capabilities is
    essential for making the most out of its responses. Understanding what the model
    can and cannot do helps users align their goals and avoid disappointment.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 设定关于ChatGPT能力的现实和有信息量的期望对于最大限度地发挥其响应的作用至关重要。了解模型能做什么和不能做什么有助于用户调整他们的目标并避免失望。
- en: 'Capability Awareness: Users should be aware of ChatGPT’s strengths and limitations.'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 能力意识：用户应该了解ChatGPT的优势和局限性。
- en: 'Expectations Management: Managing expectations involves setting clear goals
    for what users aim to achieve with ChatGPT.'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 期望管理：管理期望涉及为用户使用ChatGPT旨在实现的目标设定明确的目标。
- en: Assessing Responses
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 评估响应
- en: Effectively assessing the responses generated by ChatGPT is critical to ensure
    that they are accurate, relevant, and useful. This process involves evaluating
    the content based on several criteria.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地评估ChatGPT生成的响应对于确保它们是准确、相关和有用的至关重要。这个过程涉及根据几个标准评估内容。
- en: 'Accuracy: Check the factual correctness of the information provided by ChatGPT.'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性：检查ChatGPT提供的信息的事实正确性。
- en: 'Relevance: Determine whether the response is relevant to the prompt and the
    context provided.'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性：确定响应是否与提示和提供的上下文相关。
- en: 'Coherence and Clarity: A well-structured and clear response is easier to understand
    and apply.'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性和清晰性：结构良好且清晰的响应更容易理解和应用。
- en: Application of Responses
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 响应应用
- en: Applying ChatGPT responses effectively involves integrating them into the user’s
    workflows or decision-making processes. This step ensures that the responses are
    used in a meaningful and productive manner.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地应用ChatGPT的响应涉及将它们整合到用户的流程或决策过程中。这一步骤确保响应以有意义和富有成效的方式被使用。
- en: 'Contextual Integration: Integrate the responses into the specific context of
    the user’s work or project.'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文整合：将响应整合到用户工作或项目的特定上下文中。
- en: 'Decision Support: Use the responses as a support tool in decision-making processes.'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 决策支持：将响应作为决策过程中的支持工具。
- en: 'Iterative Improvement: Engage in an iterative process of refinement and improvement.'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 逐步改进：参与一个逐步的精炼和改进过程。
- en: Conclusion
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Effectively using ChatGPT responses involves managing user expectations, carefully
    assessing the quality and relevance of the responses, and applying them appropriately
    within the user’s context. This strategic approach to using ChatGPT responses
    empowers users to leverage the model’s capabilities effectively and achieve their
    goals more efficiently.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地使用ChatGPT的响应涉及管理用户期望，仔细评估响应的质量和相关性，并在用户的环境中适当地应用它们。这种使用ChatGPT响应的战略方法使用户能够有效地利用模型的能力，更高效地实现他们的目标。
- en: Adopt Curious Abundance
  id: totrans-558
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 采用好奇的丰富性
- en: 'In this section, we summarise the fifth component of the ChatGPT “Black-box”
    Mindset. This topic is covered in greater detail in the chapter “Advanced Black-box
    Interface #5 - Adopt Curious Abundance” in the book [“Advanced ChatGPT Application
    and Operations Guide”](https://bjl.ink/GptAP).'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: '在本节中，我们总结了ChatGPT“黑盒”思维的第五个组成部分。这个主题在书籍“高级ChatGPT应用与操作指南”中的“高级黑盒界面 #5 - 采用好奇的丰富性”章节中有更详细的介绍。[“高级ChatGPT应用与操作指南”](https://bjl.ink/GptAP)。'
- en: '![Black-box Mindset #5](image_rsrc1GR.jpg)'
  id: totrans-560
  prefs: []
  type: TYPE_IMG
  zh: '![黑盒思维 #5](image_rsrc1GR.jpg)'
- en: 'Figure 21\. Black-box Mindset #5'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: '图21. 黑盒思维 #5'
- en: Adopting a mindset of Curious Abundance is key to effectively using ChatGPT.
    This mindset combines curiosity, independence, rationality, confidence, and optimism.
    Users with a Curious Abundance mindset are better equipped to explore ChatGPT’s
    capabilities, critically assess its outputs, and innovate in their application
    of the model. This proactive and positive approach leads to more meaningful and
    productive interactions.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 采用好奇丰富的思维模式是有效使用 ChatGPT 的关键。这种思维模式结合了好奇心、独立性、理性、信心和乐观。具有好奇丰富思维模式的使用者更能装备自己探索
    ChatGPT 的功能，批判性地评估其输出，并在模型的应用中创新。这种积极主动和积极的方法导致更有意义和更富有成效的互动。
- en: '![GPT Curious Abundance - Summary](image_rsrc1GS.jpg)'
  id: totrans-563
  prefs: []
  type: TYPE_IMG
  zh: '![GPT 好奇丰富 - 摘要](image_rsrc1GS.jpg)'
- en: Figure 22\. GPT Curious Abundance - Summary
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 图 22. GPT 好奇丰富 - 摘要
- en: (In)dependence
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: (独立/依赖)
- en: The balance of independence and dependence is crucial for effective interaction
    with ChatGPT. Users should be independent thinkers who rely on the model as a
    tool rather than a crutch.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 独立和依赖的平衡对于有效地与 ChatGPT 互动至关重要。用户应成为独立思考者，将模型作为工具而不是拐杖来依赖。
- en: 'Self-Reliance: Users should approach ChatGPT as an aid in their decision-making
    process, not as the sole source of truth. Critical Thinking: Engaging critically
    with the information provided by ChatGPT is essential. Collaborative Use: Independence
    does not mean isolation.'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 自信：用户应将 ChatGPT 视为决策过程中的辅助工具，而不是真理的唯一来源。批判性思维：与 ChatGPT 提供的信息进行批判性思考是必要的。协作使用：独立并不意味着孤立。
- en: Rational / Empirical
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 理性/经验
- en: A rational and empirical mindset is vital for making informed and logical use
    of ChatGPT’s capabilities. This involves basing decisions and actions on evidence
    and reason.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 理性和经验的心态对于明智和逻辑地使用 ChatGPT 的功能至关重要。这包括基于证据和理性做出决策和行动。
- en: 'Evidence-Based Approach: Users should prioritise evidence and empirical data
    when interacting with ChatGPT. Logical Analysis: Rationality requires users to
    apply logical analysis to the responses received. Objectivity: Maintaining objectivity
    is key.'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 基于证据的方法：在与 ChatGPT 互动时，用户应优先考虑证据和经验数据。逻辑分析：理性要求用户对收到的回应进行逻辑分析。客观性：保持客观是关键。
- en: Confidence
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 信心
- en: Confidence in using ChatGPT is necessary for maximising its potential. This
    confidence comes from understanding the model’s capabilities and limitations and
    using it assertively within those boundaries.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 的信心对于最大化其潜力是必要的。这种信心来自于理解模型的能力和限制，并在这些界限内自信地使用它。
- en: 'Informed Assurance: Confidence should be based on a thorough understanding
    of ChatGPT’s strengths and weaknesses. Decisive Interaction: Confident users engage
    decisively with ChatGPT, asking clear and purposeful questions. Resilience: Confidence
    also involves resilience in the face of errors or suboptimal responses.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 明智的保证：信心应基于对 ChatGPT 的优势和劣势的全面理解。决断的互动：自信的用户与 ChatGPT 进行决断性的互动，提出清晰和有目的的问题。弹性：信心还涉及面对错误或次优响应时的弹性。
- en: Optimism
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 乐观
- en: Optimism about the possibilities of ChatGPT fosters a positive and proactive
    approach to its use. Optimistic users are more likely to explore and innovate,
    pushing the boundaries of what the model can do.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 对 ChatGPT 可能性的乐观促进了对其使用的积极和积极主动的方法。乐观的用户更有可能探索和创新，推动模型能做的事情的边界。
- en: 'Positive Expectation: Optimistic users expect positive outcomes from their
    interactions with ChatGPT. Innovative Exploration: Optimism fuels innovation.
    Constructive Attitude: An optimistic mindset encourages a constructive attitude
    towards challenges and setbacks.'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 积极预期：乐观的用户期望从与 ChatGPT 的互动中获得积极的结果。创新探索：乐观激发创新。建设性态度：乐观的心态鼓励对挑战和挫折采取建设性的态度。
- en: Conclusion
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Curious Abundance is the ideal mindset for users engaging with ChatGPT. This
    mindset not only enhances the quality and relevance of the responses but also
    fosters a productive and innovative approach to using ChatGPT, unlocking its full
    potential as a powerful tool for various applications.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇丰富是用户与 ChatGPT 互动的理想心态。这种心态不仅提高了响应的质量和相关性，而且培养了一种富有成效和创新的方法来使用 ChatGPT，解锁其作为各种应用的有力工具的完整潜力。
- en: Adopt Black-box Governance
  id: totrans-579
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 采用黑盒治理
- en: 'In this section, we summarise the sixth component of the ChatGPT “Black-box”
    Mindset. This topic is covered in greater detail in the chapter “Advanced Black-box
    Interface #6 - Implement Black-box Governance” in the book [“Advanced ChatGPT
    Application and Operations Guide”](https://bjl.ink/GptAP).'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: '在本节中，我们总结了ChatGPT“黑盒”思维的第六个组成部分。这个主题在书籍“高级ChatGPT应用与操作指南”的章节“高级黑盒接口 #6 - 实施黑盒治理”中有更详细的介绍。[“Advanced
    ChatGPT Application and Operations Guide”](https://bjl.ink/GptAP)。'
- en: '![Black-box Mindset #6](image_rsrc1GT.jpg)'
  id: totrans-581
  prefs: []
  type: TYPE_IMG
  zh: '![黑盒思维 #6](image_rsrc1GT.jpg)'
- en: 'Figure 23\. Black-box Mindset #6'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: '图23. 黑盒思维 #6'
- en: The deployment of ChatGPT in organisations brings significant benefits but also
    introduces complexities that require careful governance. “Black-box Governance”
    refers to a structured approach to managing the use of ChatGPT, ensuring its application
    is transparent, ethical, and aligned with organisational policies and standards.
    This chapter explores the key components of Black Box Governance, which include
    Knowledge of Suppliers, Audit Responsibilities, Disclosure, and Citation, and
    Quality and Use of Results. The figure below provides a detailed breakdown of
    these components.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在组织中的部署带来了显著的好处，但也引入了需要谨慎治理的复杂性。“黑盒治理”指的是管理ChatGPT使用的一种结构化方法，确保其应用透明、道德，并与组织政策和标准一致。本章探讨了黑盒治理的关键组成部分，包括供应商知识、审计责任、披露和引用以及结果的质量和使用。下面的图提供了这些组件的详细分解。
- en: '![GPT Black-box Governance - Summary](image_rsrc1GU.jpg)'
  id: totrans-584
  prefs: []
  type: TYPE_IMG
  zh: '![GPT黑盒治理 - 摘要](image_rsrc1GU.jpg)'
- en: Figure 24\. GPT Black-box Governance - Summary
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 图24. GPT黑盒治理 - 摘要
- en: Knowledge of Suppliers
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 供应商知识
- en: Understanding the suppliers and the policies governing their technology is foundational
    for effective governance. This includes awareness of data sharing, copyright,
    and security policies.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 理解供应商及其技术管理政策是有效治理的基础。这包括对数据共享、版权和安全政策的了解。
- en: 'Data Sharing Policies: Organisations must be informed about how their data
    is handled and shared by ChatGPT suppliers. Copyright Policies: It is crucial
    to know the copyright policies related to the content generated by ChatGPT. Security
    Policies: Understanding the security measures implemented by ChatGPT suppliers
    is vital to safeguard organisational data.'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 数据共享政策：组织必须了解ChatGPT供应商如何处理和共享他们的数据。版权政策：了解与ChatGPT生成内容相关的版权政策至关重要。安全政策：了解ChatGPT供应商实施的安全措施对于保护组织数据至关重要。
- en: Audit Responsibilities
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 审计责任
- en: To maintain accountability and transparency, organisations need robust audit
    mechanisms. This involves tracking, understanding, and explaining the use and
    outcomes of ChatGPT.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持问责制和透明度，组织需要强大的审计机制。这包括跟踪、理解和解释ChatGPT的使用和结果。
- en: 'Understanding and Explainability: Organisations should strive to understand
    how ChatGPT generates responses and be able to explain these processes to stakeholders.
    Audit Tracking: Implementing audit trails for interactions with ChatGPT is essential.
    Other: Additional audit responsibilities may include regular reviews of ChatGPT
    usage.'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和可解释性：组织应努力理解ChatGPT生成响应的方式，并能够向利益相关者解释这些过程。审计跟踪：实施与ChatGPT交互的审计跟踪是必要的。其他：其他审计责任可能包括定期审查ChatGPT的使用情况。
- en: Disclosure and Citation
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 披露和引用
- en: Transparency in the use of ChatGPT is critical. This involves full disclosure
    of AI involvement in content creation and proper citation of sources and contributions.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使用的透明度至关重要。这包括在内容创作中完全披露AI的参与，以及正确引用来源和贡献。
- en: 'Full Disclosure: Organisations should disclose when and how ChatGPT is used,
    particularly in content creation. How to Explain: Providing clear explanations
    about the capabilities and limitations of ChatGPT is essential. How to Cite: Establishing
    guidelines for citing ChatGPT’s contributions ensures that the use of AI-generated
    content is properly acknowledged and traceable.'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 完全披露：组织应披露何时以及如何使用ChatGPT，特别是在内容创作方面。如何解释：提供关于ChatGPT能力和限制的明确解释是必要的。如何引用：建立引用ChatGPT贡献的指南确保AI生成内容的使用得到适当认可和可追溯。
- en: Quality and Use of Results
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 结果的质量和使用
- en: Ensuring the quality and appropriate use of ChatGPT’s outputs involves verification,
    validation, and addressing potential risks such as injection and errors.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 确保ChatGPT输出的质量和适当使用涉及验证、验证和解决潜在风险，如注入和错误。
- en: 'Verification: Organisations should verify the accuracy and reliability of ChatGPT’s
    responses before using them in decision-making processes. Validation: Validation
    processes should be in place to assess the relevance and applicability of ChatGPT’s
    outputs. Injection: Organisations need to be aware of and mitigate risks related
    to data injection attacks. Errors: Establishing protocols for identifying and
    correcting errors in ChatGPT’s responses is crucial.'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 验证：组织在使用ChatGPT的响应进行决策过程之前，应验证其准确性和可靠性。验证：应建立验证流程，以评估ChatGPT输出的相关性和适用性。注入：组织需要意识到并减轻与数据注入攻击相关的风险。错误：建立识别和纠正ChatGPT响应中错误的协议至关重要。
- en: Conclusion
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Black Box Governance is a comprehensive framework for managing the use of ChatGPT
    in organisations. By focusing on knowledge of suppliers, audit responsibilities,
    disclosure and citation, and the quality and use of results, organisations can
    ensure that their use of ChatGPT is transparent, ethical, and aligned with their
    strategic objectives. This approach enhances the trust and reliability of AI applications
    and empowers organisations to leverage ChatGPT’s capabilities responsibly and
    effectively.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒治理是一个全面的管理框架，用于管理组织内ChatGPT的使用。通过关注供应商的知识、审计责任、披露和引用以及结果的质量和使用，组织可以确保其使用ChatGPT是透明的、道德的，并与他们的战略目标一致。这种方法增强了人工智能应用的信任和可靠性，并使组织能够负责任和有效地利用ChatGPT的能力。
- en: Interacting with ChatGPT
  id: totrans-600
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与ChatGPT交互
- en: Organic prompting
  id: totrans-601
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有机提示
- en: This section summarises an approach to ChatGPT interaction I call “Organic Prompting.”
    This approach aligns with the strategic mindset of focusing on outcomes and impacts
    rather than techniques and deliverables.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 本节总结了被称为“有机提示”的ChatGPT交互方法。这种方法与关注结果和影响而不是技术和交付的战略思维模式相一致。
- en: In keeping with the primary proposition of this book, Organic Prompting starts
    with simplicity and the question “what can I remove to achieve perfection?”
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 与本书的主要论点保持一致，有机提示从简单性和问题“我能去掉什么以达到完美？”开始。
- en: Take what works for you and ignore the rest.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 取对你有用的，忽略其余的。
- en: 'But, I can already hear people asking: “What about Prompt Engineering?”. So,
    let’s address this first.'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，我已能听到人们问：“那Prompt Engineering怎么办？”所以，让我们首先解决这个问题。
- en: Why Not Just Start with Prompt Engineering?
  id: totrans-606
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么不直接从Prompt Engineering开始？
- en: I assume that you’ve read articles or discussions on ChatGPT. In that case,
    you’ve probably seen references to “Prompt Engineering,” a loosely defined practice
    that defines rules and techniques for creating prompts for artificial intelligence
    “chatbots” like ChatGPT.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设你已经阅读过关于ChatGPT的文章或讨论。在这种情况下，你可能已经看到了对“Prompt Engineering”的引用，这是一个定义不严格的实践，它定义了为像ChatGPT这样的“聊天机器人”创建提示的规则和技术。
- en: I have nothing against Prompt Engineering as a body of knowledge. Personally,
    I’m very interested in the various prompt types and the reason that they work.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 我对Prompt Engineering作为一种知识体系没有异议。就个人而言，我对各种提示类型及其工作原理非常感兴趣。
- en: “Prompt Engineering” emerged out of the long history of natural language interfaces
    to older AI systems. There is much to be gained from Prompt Engineering, but it
    is not a formal practice, and the term “Engineering” is a bit of overkill. In
    my long experience in the information technology field, I’ve seen many emerging
    practices have the word “engineering” slapped on them to give the impression of
    something formalised, organised, and unified.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: “Prompt Engineering”是从与较老的人工智能系统自然语言界面的漫长历史中产生的。从Prompt Engineering中可以获益良多，但它不是一种正式的实践，而且“Engineering”这个词有点过度夸张。在我长期的信息技术领域经验中，我看到了许多新兴实践被贴上“Engineering”的标签，以给人留下某种正式化、组织化和统一的印象。
- en: The intent is there, but I’m always concerned with recommendations that focus
    on the “what” and “how” of something rather than the “why”.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 意图是有的，但我总是担心那些只关注“是什么”和“怎么做”的建议，而不是“为什么”。
- en: If we focus too much on techniques in the prompt crafting for language models
    like ChatGPT, we can forget the reasons we’re doing this in the first place.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们过于关注像ChatGPT这样的语言模型在提示制作中的技术，我们可能会忘记我们最初为什么要这样做。
- en: The whole point of the “Black-box Mindset” is to nudge people to think about
    what they are trying to achieve by using ChatGPT and less about how it works.
    Although prompting is the external interface between the world and ChatGPT, prompt
    engineering exposes users to the internal operation and capabilities.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: “黑盒思维”的全部意义在于引导人们思考他们通过使用ChatGPT试图实现的目标，而不是它的工作原理。尽管提示是现实世界与ChatGPT之间的外部接口，但提示工程向用户揭示了其内部运作和能力。
- en: It’s very common for users to micro-manage ChatGPT with overly technical and
    prescriptive prompts. By over-specifying the prompt, users inadvertently constrain
    the model’s potential to generate creative and effective outputs.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 用户经常使用过于技术化和规定性的提示来微观管理ChatGPT。通过过度指定提示，用户无意中限制了模型生成创造性和有效输出的潜力。
- en: You should assume that everything you put into a prompt is used by ChatGPT as
    content when generating its responses – see section [“A Shallow Dive Into GPT
    Functionality”](#part0011.xhtml#a1A3).
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该假设你放入提示中的每一件事都被ChatGPT用作生成响应的内容——参见章节[“浅入GPT功能”](#part0011.xhtml#a1A3)。
- en: Some circumstances undoubtedly require more complex prompts. But start simple
    and scale up as needed.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，无疑需要更复杂的提示。但要从简单开始，根据需要逐步扩展。
- en: The Foundations of Organic Prompting
  id: totrans-616
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有机提示的基础
- en: The foundation of “Organic Prompting” for ChatGPT is simplifying the interaction
    between the user and the tool. It focuses on clear, context-driven prompts that
    capture the intended outcome rather than the specifics of the process.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的“有机提示”的基础是简化用户与工具之间的交互。它侧重于清晰、以上下文驱动的提示，这些提示捕捉到预期的结果，而不是过程的细节。
- en: 'User Accessibility: Organic Prompting lowers the barrier to entry for casual
    or non-technical users who may not be adept at constructing complex prompts (yet).'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可访问性：有机提示降低了非技术用户或可能不擅长构建复杂提示（目前）的普通用户进入的门槛。
- en: 'Efficiency: By focusing on outcomes, users can quickly and effectively communicate
    their needs, potentially leading to faster and more relevant responses.'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 效率：通过关注结果，用户可以快速有效地传达他们的需求，这可能导致更快、更相关的响应。
- en: 'Quality of Results: It encourages the LLM to generate responses aligned with
    the user’s end goals, which may improve the output’s usability and applicability.'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 结果质量：它鼓励LLM生成与用户最终目标一致的响应，这可能会提高输出的可用性和适用性。
- en: 'Encourages Strategic Thinking: Organic Prompting encourages users to think
    beyond the mere immediate generation of the response and more about the strategic
    use of the information provided.'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励战略思考：有机提示鼓励用户思考的不仅仅是响应的即时生成，而是关于信息提供的战略使用。
- en: 'Flexibility: Organic Prompting allows AI more creative freedom to draw upon
    its extensive training data to provide answers, often resulting in more innovative
    and comprehensive solutions. A good rule of design is that a good design is easier
    to change than a bad one, which applies to prompts as much as anything.'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 灵活性：有机提示允许AI拥有更多的创造性自由，从其庞大的训练数据中提取信息以提供答案，通常导致更创新和全面的解决方案。设计的一个好规则是，一个好的设计比一个坏的设计更容易改变，这一点同样适用于提示。
- en: 'Scalability: Organic Prompting allows users to start at the most simple stage
    and progress smoothly as their requirements and circumstances require. Simple
    things are easy, but hard things are possible. There has been a natural progression
    from organic prompting to other prompt frameworks and, ultimately, prompt engineering.'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展性：有机提示允许用户从最简单的阶段开始，并根据他们的需求和情况顺利地进展。简单的事情容易做，但困难的事情也是可能的。从有机提示到其他提示框架，再到最终的提示工程，已经自然地发展了。
- en: Principles of Organic Prompting
  id: totrans-624
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有机提示的原则
- en: Organic Prompting is based on the premise that prompts don’t need complexity;
    they need clarity and context. Prompts should be actionable. Organic Prompting
    believes that the user is the only judge of the usefulness of ChatGPT’s responses.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 有机提示基于这样的前提：提示不需要复杂性；它们需要清晰性和上下文。提示应该是可执行的。有机提示认为，用户是ChatGPT响应有用性的唯一评判者。
- en: Emergence Rocks
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 出现性很棒
- en: Get started! Then, see what happens. The best prompts emerge from iterative
    interactions. Avoid thinking you need to “get everything right in one go”. Run
    everything through the model and observe the outcomes.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 开始吧！然后，看看会发生什么。最好的提示来自于迭代交互。避免认为你需要“一次就做对一切”。将所有内容通过模型运行，并观察结果。
- en: Acceptability is the only Quality
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 可接受性是唯一的质量
- en: The only measure of quality is whether the results from ChatGPT are acceptable
    to you in your specific problem and situation.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的质量衡量标准是ChatGPT的结果是否在你特定的问题和情况下可以接受。
- en: You can’t always get what you want, but sometimes you get what you need.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 你并不总能得到你想要的东西，但有时你得到你需要的东西。
- en: Simplicity Rules (and always has)
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 简单至上（并且始终如此）
- en: The art of maximising the amount of work not done is essential. Clear prompts
    are the cornerstone of effective communication with ChatGPT. Ask yourself, “Can
    I remove anything and still get the same result or better?”
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 最大化未完成工作量的艺术是至关重要的。清晰的提示是有效与ChatGPT沟通的基石。问问自己：“我能去掉什么内容，仍然得到相同或更好的结果？”
- en: Natural Language is Best
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言最佳
- en: Describe what you want as naturally as possible. Communicate with ChatGPT using
    straightforward language but don’t agonise over it or spend time writing multiple
    drafts outside of ChatGPT. Let the model do the magic! Write your prompts as you
    would explain something to a colleague or family member.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 描述你想要的内容尽可能自然。使用直接的语言与ChatGPT沟通，但不要过分纠结或花费时间在ChatGPT之外撰写多个草稿。让模型施展魔法！像向同事或家庭成员解释事情一样编写你的提示。
- en: Enablement Guides Process
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 启用指南流程
- en: Describe what you want to enable through the interaction. After interacting
    with ChatGPT and receiving its response, what do you want to be able to do that
    you couldn’t do before? Think of active words like “understand,” “communicate,”
    “analyse,” and “apply.” See how to use this in the breakout below.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 尽可能自然地描述你想要通过交互实现的内容。使用直接的语言与ChatGPT沟通，但不要过分纠结或花费时间在ChatGPT之外撰写多个草稿。让模型施展魔法！像向同事或家庭成员解释事情一样编写你的提示。
- en: Don’t describe the steps or how ChatGPT should solve the problem unless you
    find that you can’t get an acceptable result without getting to that level of
    detail.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你发现不达到这一层面的细节就无法得到可接受的结果，否则不要描述步骤或ChatGPT应该如何解决问题。
- en: Context Is Key
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文至关重要
- en: Providing context allows ChatGPT to understand the prompt’s intention. Context
    frames the problem space without dictating specific methods for the solution.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 提供上下文使ChatGPT能够理解提示的意图。上下文界定问题空间，而不规定解决方案的具体方法。
- en: One element of context is the role that you want ChatGPT to play.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文的一个要素是你希望ChatGPT扮演的角色。
- en: “By using ChatGPT I will be able to …. in a topic or problem area.”
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: “通过使用ChatGPT，我将能够……在某个主题或问题领域。”
- en: “With the information generated by ChatGPT I will be able to …. in a topic or
    problem area.”
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: “通过ChatGPT生成的信息，我将能够……在某个主题或问题领域。”
- en: 'Understand: Know a topic’s key concepts and principles and articulate similarities,
    differences, and challenges.'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 理解：了解一个主题的关键概念和原则，并阐述相似之处、不同之处和挑战。
- en: 'Apply: implement practical techniques and tools.'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：实施实用技术和工具。
- en: 'Analyse: assess the situation critically and produce a summary or root cause,
    or ask additional clarifying questions**.**'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：批判性地评估情况，并产生总结或根本原因，或提出额外的澄清问题**。**
- en: 'Evaluate: assess the effectiveness and utility of different options and make
    a choice or decision.'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：评估不同选项的有效性和实用性，并做出选择或决定。
- en: 'Create: design and write a new work such as an article, artwork, plan, or data
    table.'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 创建：设计和撰写新的作品，如文章、艺术品、计划或数据表。
- en: 'Remember: recall and reference essential principles, best practices, facts,
    and ideas.'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：回忆和引用基本原理、最佳实践、事实和观点。
- en: Example of Organic Prompting
  id: totrans-649
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有机提示的示例
- en: Say you’re writing a master’s dissertation and want some information on a particular
    topic.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在撰写一篇硕士论文，并需要某个特定主题的信息。
- en: You could get into very specific detail which projects your concerns
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以深入到非常具体的细节，以表达你的担忧
- en: “Write 500 words on the topic of how current legislation affects small-scale
    solar power adoption. Write clearly and succinctly and avoid AI detection. Include
    citations for the information and include a number of quotes. Include a “References”
    list that includes the full details of citations in APA 7th edition format.”
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: “就当前立法如何影响小型太阳能发电的采用撰写500字的文章。清晰简洁地写作，避免AI检测。包括信息来源的引用，并包含多个引语。包括一个包含APA第7版格式中引用详细信息的“参考文献”列表。”
- en: This form of prompt is very common and originates in the user’s mind that they
    have to specify how ChatGPT should go about doing a task. The user is taking their
    knowledge of a problem domain and projecting into ChatGPT the set of rules and
    constraints that they feel are important. I’m sure this user will get some results.
    Try pasting this into ChatGPT and see what you get.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 这种提示形式非常常见，起源于用户认为他们必须指定ChatGPT如何执行任务的想法。用户正在将他们对问题领域的知识投射到ChatGPT上，认为这些规则和约束很重要。我相信这位用户会得到一些结果。试着把它粘贴到ChatGPT上，看看你会得到什么。
- en: Here’s an alternative approach, following the principles of Organic Prompting.
    Instead of giving ChatGPT specific instructions like “avoid AI detection,” reframe
    your prompt by stating the desired outcome.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个替代方法，遵循有机提示的原则。与其给出像“避免AI检测”这样的具体指令，不如通过陈述期望的结果来重构你的提示。
- en: “I’m writing an academic paper on renewable energy policies for my master’s
    dissertation at the University of [name]. I need insights on how current legislation
    affects small-scale solar power adoption.”
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: “我正在为[大学名称]的硕士学位论文撰写关于可再生能源政策的学术论文。我需要了解当前立法如何影响小型太阳能发电的采用。”
- en: This is the simplest prompt you could imagine. It clearly defines the purpose,
    context, and intended use of the information, allowing ChatGPT to generate a response
    that is aligned with your needs. Naming the university opens up the possibility
    that ChatGPT can use any information from the institution (or similar institutions)
    that relates to master’s dissertations, including plagiarism and referencing requirements.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你能想象到的最简单的提示。它清楚地定义了信息的目的、背景和预期用途，使ChatGPT能够生成符合你需求的响应。提及大学名称为ChatGPT使用与硕士论文相关的任何信息（或类似机构的信息）打开了大门，包括剽窃和引用要求。
- en: If you get the results you need, you’re done and moving on to the next task.
    If you don’t get the result you want, then you can expand this a little to the
    following
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你得到了你需要的成果，那么你就完成了，可以继续下一个任务。如果你没有得到你想要的成果，那么你可以稍微扩展以下内容
- en: “I’m writing an academic paper on renewable energy policies for my master’s
    dissertation at the University of [name]. I need insights on how current legislation
    affects small-scale solar power adoption. Include source citations and a reference
    list. Target the information so that a scholarly audience will find enough detail,
    and the response will comply with generally accepted academic plagiarism prohibitions.”
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: “我正在为[大学名称]的硕士学位论文撰写关于可再生能源政策的学术论文。我需要了解当前立法如何影响小型太阳能发电的采用。包括来源引用和参考文献列表。确保信息针对学术受众，提供足够的细节，并且响应符合普遍接受的学术剽窃禁止规定。”
- en: In some cases you’ll use the full prompt and in others you’ll break it up due
    to the evolutionary nature of the prompt-response cycle.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，你会使用完整的提示，而在其他情况下，由于提示-响应周期的演变性质，你可能需要将其拆分。
- en: Organic Prompt “Nudges”
  id: totrans-660
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有机提示“微调”
- en: In the context of Organic Prompting, a nudge is a subtle suggestion embedded
    within a prompt to guide ChatGPT toward a preferred outcome. Much like nudges
    in behavioral science, these phrases influence the AI’s behavior in a predictable
    way without restricting its options or forcing a specific response. Nudges gently
    steer the AI, making it more likely to provide a useful answer while maintaining
    the flexibility and creativity of its responses.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 在有机提示的背景下，一个微妙的建议被嵌入到提示中，以引导ChatGPT向期望的结果发展。这与行为科学中的微调类似，这些短语以可预测的方式影响AI的行为，而不限制其选项或强迫特定响应。微调温和地引导AI，使其更有可能提供有用的答案，同时保持其响应的灵活性和创造性。
- en: High-impact Nudges
  id: totrans-662
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 高影响力微调
- en: Here are a few high-impact statements that you can include in your Organic Prompts
    as nudges to influence the interaction flow or results.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些高影响力的话语，你可以将其包含在你的有机提示中，作为微调来影响交互流程或结果。
- en: Controlling flow
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 控制流程
- en: This statement stops ChatGPT responding before you’re ready. Often I will provide
    a number of input prompts before I ask a question or set a task. I usually define
    the relationship and job roles in one prompt. Then provide input data in one or
    more prompts, and then I’ll ask a series of questions. I’ll use the below phrase
    in each of the cycles where I’m providing input that doesn’t require anything
    more than an acknowledgement.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 这个陈述在你准备好之前阻止了ChatGPT的回复。通常在我提问或布置任务之前，我会提供一系列输入提示。我通常在一个提示中定义关系和角色。然后在一个或多个提示中提供输入数据，然后我会提出一系列问题。在提供不需要更多回应的输入的每个循环中，我会使用以下短语。
- en: “please don’t respond until I give you a specific task or ask a specific question”
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: “请在我给你一个具体任务或提出一个具体问题之前不要回复”
- en: I prefer to have my outputs generated in a raw form that I can copy to other
    applications. Sure, you can select the text response and copy it to an office
    app like Word. But if you want more fine-grained control, generate it in a markup
    format (XML, HTML), markdown format (markdown), or data format (CSV) and then
    click on the “Copy” link at the top of the code window.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢以原始形式生成我的输出，这样我就可以复制到其他应用程序。当然，你可以选择文本回复并将其复制到像Word这样的办公应用程序。但如果你想要更精细的控制，请以标记格式（XML、HTML）、Markdown格式（Markdown）或数据格式（CSV）生成它，然后点击代码窗口顶部的“复制”链接。
- en: “please generate your response in a code window so I can easily copy the results
    to other applications”
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: “请在一个代码窗口中生成你的回复，这样我可以轻松地将结果复制到其他应用程序”
- en: Low-impact Nudges
  id: totrans-669
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 低影响力暗示
- en: I see numerous statements in prompts almost every day that people add because
    they think it will “tell” ChatGPT to behave in a certain way. Again, if these
    are working for you, please keep using them. Sometimes, they are just “sugar”
    for the users to either keep track of problems with earlier prompts or to relieve
    tension and frustration.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 我几乎每天都在提示中看到许多人们添加的陈述，因为他们认为这会“告诉”ChatGPT以某种方式行事。再次强调，如果你发现这些对你有效，请继续使用它们。有时，它们只是用户为了跟踪早期提示中的问题或缓解紧张和挫败感的“糖衣”。
- en: Please also refer to the section on GPT weaknesses.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅关于GPT弱点的相关章节。
- en: Playing to Emotions
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 激发情感
- en: These statements assume there is some emotional capability inside the GPT engine
    that will respond to emotional colour.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 这些陈述假设GPT引擎内部存在某种情感能力，能够对情感色彩做出反应。
- en: “try your hardest”
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: “尽力而为”
- en: “don’t be stupid”
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: “不要愚蠢”
- en: “why are you doing this to me?”
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: “你为什么这样对我？”
- en: Playing to Intellect
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 激发智力
- en: These statements assume there is some intellect inside the GPT engine which
    can be controlled by giving explicit statements
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 这些陈述假设GPT引擎内部存在某种智力，可以通过给出明确陈述来控制。
- en: “be rigorous and accurate”
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: “严谨准确”
- en: “don’t plagiarise”
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: “不要抄袭”
- en: “do your best”
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: “尽力而为”
- en: “be truthful and don’t lie”
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: “说实话，不要撒谎”
- en: Language Shape or Form
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 语言形状或形式
- en: 'These statements assume ChatGPT can monitor its language production in the
    same way that we do: pages, words, long content, and short content. I’ve had some
    success with “long-form,” but the variability of the GPT environment far outweighs
    any boost you get from these phrases.'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 这些陈述假设ChatGPT可以像我们一样监控其语言生产：页面、单词、长内容、短内容。我在“长篇”方面取得了一些成功，但GPT环境的可变性远远超过了这些短语带来的任何提升。
- en: “generate 500 words”
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: “生成500个单词”
- en: “write a long article”
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇文章”
- en: Conclusion
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: As with any recommendations about ChatGPT prompting, do whatever works for you
    in your specific situation. I can advise you what I think, but “what works” beats
    “what someone else thinks works” every time.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何关于ChatGPT提示的建议一样，请根据你具体的情况做你认为有效的事情。我可以给你我的建议，但“对你有效”总是胜过“别人认为有效”。
- en: If you focus on what you’re trying to achieve, the context you’re working in,
    and creating the simplest possible language, then you’re doing Organic Prompting
    well.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你专注于你试图实现的目标，你工作的上下文，以及创造尽可能简单的语言，那么你就在有机提示方面做得很好。
- en: When is Organic Prompting The Wrong Approach?
  id: totrans-690
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 何时有机提示不是正确的方法？
- en: The purpose of Organic Prompting is to help early users to start prompting reliably
    and get them over the Skills Bootstrapping Chasm that I described in section [“Crossing
    the Skills Bootstrapping Chasm”](#part0009.xhtml#a191). I’m not proposing this
    as a universal process, unless, of course, it works for you.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 有机提示的目的在于帮助早期用户可靠地开始提示，并帮助他们跨越我在第[“跨越技能启动鸿沟”](#part0009.xhtml#a191)部分描述的技能启动鸿沟。我并不是把它作为一个普遍的过程来提出，除非，当然，它对你有效。
- en: Not a Silver Bullet
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 不是万能的银弹
- en: Organic Prompting is not a “silver bullet.” It’s not a universal solution for
    every user in every situation. Many scenarios require more complex and technical
    prompts. Organic Prompting proposes that we start and scale up only as required.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 有机提示并非“万能钥匙”。它不是每个用户在每个情况下都通用的解决方案。许多场景需要更复杂和技术的提示。有机提示建议我们只在需要时开始和扩大规模。
- en: How do we know when we need to scale up?
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何知道何时需要扩大规模？
- en: Organic Prompting is based on key strategy, problem, and user assumptions. If
    your unique situation breaks any of these assumptions, you’ve probably reached
    the limit of Organic Prompting. In these situations, there are simple remedies
    to build out your prompt to achieve what you need.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 有机提示基于关键策略、问题和用户假设。如果你的独特情况违反了这些假设中的任何一个，你可能已经达到了有机提示的极限。在这些情况下，有简单的补救措施来构建你的提示以实现你需要的结果。
- en: 'Assumptions:'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 假设：
- en: 'This is another principle of Organic Prompting: the best prompts emerge from'
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有机提示的另一个原则：最好的提示是从
- en: 'AI Interpretation is Sufficient: It assumes ChatGPT can accurately infer intent
    from context, which may not always be reliable, leading to potential misalignment
    between user expectations and AI output.'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: AI解释是足够的：它假设ChatGPT可以从上下文中准确推断意图，这并不总是可靠的，可能导致用户期望与AI输出之间的潜在不匹配。
- en: 'Prompts are Unambiguous: While simplicity is beneficial, too little guidance
    can result in vague prompts that lead to equally ambiguous or broad outputs.'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是明确的：虽然简单是有益的，但指导不足可能导致模糊的提示，导致同样模糊或广泛的输出。
- en: 'Prompts are not Under-Specification: Users may omit critical details to keep
    prompts outcome-focused, leading to results that are not actionable or detailed
    enough for the user’s needs.'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 提示不是低规格：用户可能会省略关键细节以保持提示结果集中，导致结果不可操作或不够详细，无法满足用户的需求。
- en: 'Effectiveness Can Be Assessed: Establishing metrics to measure the effectiveness
    of such prompts as opposed to more traditional, input-focused ones may be challenging.'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 效果可以评估：建立指标来衡量此类提示相对于更传统的、以输入为重点的提示的有效性可能具有挑战性。
- en: Conclusion
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: 'Organic Prompting is useful in a subset of interactions with ChatGPT. This
    subset strongly overlaps the needs of very early users, so it’s a useful strategy
    for people who are first starting out. The beauty of Organic Prompting is that
    it is a self-resolving question: if it works, keep using it, but if it doesn’t
    then transition to a different approach. That might be an advanced level of Organic
    Prompting, as described below, or it might be to early stage Prompt Engineering.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 有机提示在ChatGPT的某些交互中很有用。这个子集与非常早期用户的需要高度重叠，因此对于刚开始的人来说是一个有用的策略。有机提示的美丽之处在于它是一个自我解决的疑问：如果它有效，就继续使用它，但如果它不起作用，就转向不同的方法。这可能是一个高级水平的有机提示，如下文所述，或者可能是早期阶段的提示工程。
- en: Grow with Advanced Organic Prompting
  id: totrans-704
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与高级有机提示一起成长
- en: This section describes some more advanced approaches to Organic Prompting that
    users may find useful as their skills grow or their problems become more complex.
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 本节描述了一些更高级的有机提示方法，当用户技能增长或问题变得更加复杂时，他们可能会发现这些方法很有用。
- en: Satisficing is Satisfaction
  id: totrans-706
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 满足即满意
- en: 'What’s better: iterating through many prompt/response cycles to get a result
    that is a bit better than the first or taking the imperfect first response and
    manually editing it to make it acceptable?'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 哪个更好：通过多次提示/响应循环来得到一个比第一次略好一些的结果，还是将不完美的第一次响应手动编辑以使其可接受？
- en: Only you can judge that—there’s no right answer. But none of us has as much
    time as we’d like to spend on a problem, and ChatGPT has many imperfections. So,
    on balance, I know what my thoughts are.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 只有你自己才能判断——没有正确答案。但我们都无法像我们希望的那样有足够的时间去处理一个问题，而且ChatGPT有很多不足之处。所以，总的来说，我知道我的想法是什么。
- en: It all depends on your situation.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切都取决于你的情况。
- en: I see many questions about prompts and prompt structures that appear to be based
    on “Prompt FOMO” or “ChatGPT FOMO,” i.e., a “fear of missing out” on something
    unique and special in the GPT engine unless we use special techniques, hacks,
    or or “voodoo phrases”. “Voodoo phrases” are the ones you see on Facebook ads
    or reels telling you about the latest thing that will “change your life forever”,
    like “no yapping”.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到很多关于提示和提示结构的问题，这些问题似乎基于“提示焦虑”或“ChatGPT焦虑”，即除非我们使用特殊的技术、技巧或“巫术短语”，否则就会错过GPT引擎中独特和特别的东西的“恐惧”。“巫术短语”是你看到在Facebook广告或视频中告诉你关于将“永远改变你的生活”的最新事物的那些，比如“不要闲聊”。
- en: 'While we all want to get the most out of ChatGPT, there are two flaws in this
    thinking:'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们都希望从ChatGPT中获得最大利益，但这种想法存在两个缺陷：
- en: It assumes there are special techniques, hacks or “voodoo words” that will magically
    transform the responses.
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它假设存在一些特殊的技巧、窍门或“巫术词汇”，这些词汇能够神奇地改变回应。
- en: 'That ChatGPT is holding back expert-level content without using the things
    mentioned in #1 above. This thinking believes there’s some hidden “pot of gold”
    buried in the guts of ChatGPT that will make the user seem like a world-class
    expert.'
  id: totrans-713
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT没有使用上面提到的#1中提到的事物，却在保留专家级内容。这种想法认为，ChatGPT内部隐藏着一个“金矿”，这将使用户看起来像世界级专家。
- en: 'There are three things I say to this:'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这一点，我有三点要说：
- en: We’ll never really know how detailed or expert-sounding ChatGPT can become,
    but its training hasn’t covered every piece of information on every topic.
  id: totrans-715
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们永远无法真正了解ChatGPT可以变得多么详细或专家级，但它的训练并没有涵盖每个主题的每一块信息。
- en: ChatGPT results are likelier to be middling-level competent than a world-class
    expert.
  id: totrans-716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT的结果更有可能达到中等水平的胜任，而不是世界级专家的水平。
- en: While there may be some shortcuts, the more we inject our own thinking into
    the ChatGPT dialogue, the better our mastery of the content in our specific situation
    will be.
  id: totrans-717
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 虽然可能会有一些捷径，但我们将自己的思考更多地注入ChatGPT对话中，我们对我们特定情况中的内容掌握得就会越好。
- en: Forget FOMO – get cracking on your own experiences.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 忘掉“恐惧错过”（FOMO）——开始专注于你自己的经验。
- en: Organic Planning
  id: totrans-719
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有机规划
- en: When I refer to “Organic Planning” I mean the state of planning that occurs
    naturally, driven by the built-in cognitive powers of the human brain. Every human
    being performs something called “Pragmatic Prospection”, which if you scrape off
    the academic terminology means that if you think about a goal, your brain will
    naturally start to think through the process of getting there.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 当我提到“有机规划”时，我指的是由人类大脑内置的认知能力驱动的自然规划状态。每个人都会执行一种称为“实用展望”的活动，如果你去掉学术术语，这意味着如果你思考一个目标，你的大脑会自然地开始思考实现该目标的过程。
- en: Organic planning also refers to the natural scaling of planning scaffolding,
    such as plans, frameworks and even methodologies that you can add as your circumstances
    require. The alternative to Organic Planning is to try to adopt a framework right
    at the start, which can cause all sorts of problems if it’s too advanced for your
    knowledge and experience or not matched to your environment.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 有机规划还指的是规划框架的自然扩展，例如计划、框架甚至方法，根据你的情况需要，你可以添加这些内容。有机规划的对立面是在一开始就尝试采用一个框架，如果这个框架对你的知识和经验来说过于先进，或者与你的环境不匹配，这可能会引起各种问题。
- en: So organic planning starts with nothing but the capabilities of your brain,
    and adds additional support in a “just-in-time” approach.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，有机规划从你大脑的能力开始，并以“即时”的方式添加额外的支持。
- en: 'You can read more about “Pragmatic Prospection” in “Axiom # 121\. Everything
    in the agile mindset derives from four first principles”, and more about scaling
    up the management process in “Axiom # 96\. The methodology paradox”, both in the
    book [“Axioms of Project Management”](https://bjl.ink/pmaxioms).'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: '你可以在《公理 # 121. 敏捷思维中的所有内容都源自四个基本原则》中了解更多关于“实用展望”的内容，以及更多关于管理过程扩展的内容在《公理 # 96.
    方法论悖论》中，这两部分内容都收录在书籍《项目管理公理》[“Axioms of Project Management”](https://bjl.ink/pmaxioms)中。'
- en: Basic Interacting with ChatGPT
  id: totrans-724
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基本与ChatGPT的交互
- en: 'If you’re a very new user you probably have a simple idea of your interaction
    with ChatGPT, which is centred on just that: you interacting with ChatGPT, as
    illustrated below. You’re simply having ideas and pushing them as text (maybe
    with some data) into ChatGPT and getting the results.'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个非常新的用户，你可能对与ChatGPT的交互有一个简单的想法，那就是围绕这一点：你与ChatGPT的交互，如下所示。你只是提出想法，并以文本（可能附带一些数据）的形式将其推入ChatGPT，并获取结果。
- en: '![Basic ChatGPT Interaction](image_rsrc1GV.jpg)'
  id: totrans-726
  prefs: []
  type: TYPE_IMG
  zh: '![基本ChatGPT交互](image_rsrc1GV.jpg)'
- en: Figure 25\. Basic ChatGPT Interaction
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25. 基本ChatGPT交互
- en: 'As you become a little more experienced, you’ll start to realise that just
    your ideas aren’t sufficient for most use cases, and that you’ll need to do one
    or both of two things:'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你逐渐积累更多经验，你将开始意识到，仅凭你的想法对于大多数用例来说是不够的，你需要做以下一项或两项：
- en: 'Get some data: you’ll need to source some data from somewhere in your operating
    environment that feeds into ChatGPT. This could be contextual information, the
    subject of a prompt (e.g. “review this article”), or for transformation (e.g.
    “analyse this data” or “summarise this document”).'
  id: totrans-729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取一些数据：你需要从你的操作环境中获取一些数据，这些数据将输入到ChatGPT中。这可能是一些上下文信息，提示的主题（例如，“审查这篇文章”），或者用于转换（例如，“分析这些数据”或“总结这份文档”）。
- en: 'Use the responses: once you get the responses from ChatGPT, what are you going
    to do with them? Are they just for your personal consumption? Or do you need to
    distribute them to other people? Or load them into another system?'
  id: totrans-730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用响应：一旦你从ChatGPT获得响应，你打算如何处理它们？它们只是供你个人消费吗？或者你需要将它们分发给其他人？或者加载到另一个系统中？
- en: This interaction cycle gets to be something like the below. It’s still fairly
    ad-hoc but at least you’re considering the options.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 这个交互周期会变成以下的样子。它仍然相当随意，但至少你在考虑选项。
- en: '![Extended ChatGPT Interaction](image_rsrc1GW.jpg)'
  id: totrans-732
  prefs: []
  type: TYPE_IMG
  zh: '![扩展ChatGPT交互](image_rsrc1GW.jpg)'
- en: Figure 26\. Extended ChatGPT Interaction
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 图26. 扩展ChatGPT交互
- en: From Interaction to I-P-O
  id: totrans-734
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从交互到I-P-O
- en: Once you start to become more experienced with ChatGPT you will start to extend
    the use cases that you want to include in the processing. This is where we need
    to get just a little more structured.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你开始对ChatGPT有更多经验，你将开始扩展你希望在处理中包含的使用案例。这就是我们需要稍微更有结构化的地方。
- en: Every interaction with ChatGPT involves a basic pattern, regardless of your
    problem area, objective or the role you’ve want chatGPT to play.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 每一次与ChatGPT的交互都涉及一个基本模式，无论你的问题领域、目标或你希望ChatGPT扮演的角色如何。
- en: In process terms we call this an “IPO” pattern (“Input-Process-Output”). It’s
    very common process pattern and easy to understand In ChatGPT’s case (in the “Black-box
    mindset”) we are primarily concerned with the “Input” and “Output” phases. The
    “Process” phase is the ChatGPT “Black box”.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 在流程术语中，我们称之为“IPO”模式（“输入-处理-输出”）。这是一个非常常见的流程模式，也容易理解。在ChatGPT的情况下（在“黑盒思维”中），我们主要关注“输入”和“输出”阶段。“处理”阶段是ChatGPT的“黑盒”。
- en: '![Simple I-P-O Concept](image_rsrc1GX.jpg)'
  id: totrans-738
  prefs: []
  type: TYPE_IMG
  zh: '![简单的I-P-O概念](image_rsrc1GX.jpg)'
- en: Figure 27\. Simple I-P-O Concept
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 图27. 简单I-P-O概念
- en: But this “I-P-O” process pattern is too generic. Once we start thinking about
    how we use ChatGPT practically in more than simplistic use cases, we need to break
    out some subphases as shown in the diagram below.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 但这个“I-P-O”过程模式过于通用。一旦我们开始思考如何在更复杂的使用案例中实际使用ChatGPT，我们需要根据下面的图表分解出一些子阶段。
- en: '![Extended IPO model in context](image_rsrc1GY.jpg)'
  id: totrans-741
  prefs: []
  type: TYPE_IMG
  zh: '![在上下文中的扩展IPO模型](image_rsrc1GY.jpg)'
- en: Figure 28\. Extended IPO model in context
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 图28. 上下文中的扩展IPO模型
- en: 'This pattern consists of the following components:'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模式由以下组件组成：
- en: 'Your Operating Environment: the place where you work or play or do anythat
    that relates to your ChatGPT use cases.'
  id: totrans-744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的操作环境：你工作或玩耍或与你的ChatGPT使用案例相关的地方。
- en: 'Your Target/Consumer Environment: where your “customers” live and work. If
    you have any people or teams who recieve the information that you’ve obtained
    from a ChatGPT response, they live here.'
  id: totrans-745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的目标/消费者环境：你的“客户”生活和工作的地方。如果你有任何人员或团队接收你从ChatGPT响应中获得的信息，他们就在这里。
- en: 'I.1 Obtain / Preproc Data“: the first part of the “Input” phase, in which you
    obtain the data that you’ll provide to ChatGPT and perform any pre-processing
    functions, such as format conversion. This step may include any data transformations
    that occur outside ChatGPT.'
  id: totrans-746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: I.1 获取/预处理数据：“输入”阶段的第一部分，其中你获取将提供给ChatGPT的数据并执行任何预处理函数，例如格式转换。这一步可能包括在ChatGPT之外发生的任何数据转换。
- en: 'I.2 Load to GPT: this step (the 2nd part of the “Input” phase) is simply to
    load the data to GPT or provide a link. There are limited options for the technical
    mechanism of this upload, which you can find explained briefly in section [“ChatGPT
    Product Interaction”](#part0010.xhtml#a19J), and the main patterns for interaction
    are summarised in section [“ChatGPT Prompt and Data Use Cases”](#part0010.xhtml#a1E7).'
  id: totrans-747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: I.2 加载到GPT：这一步（“输入”阶段的第二部分）仅仅是把数据加载到GPT或提供链接。这个上传的技术机制选项有限，你可以在[“ChatGPT产品交互”](#part0010.xhtml#a19J)部分简要了解，而主要的交互模式总结在[“ChatGPT提示和数据使用案例”](#part0010.xhtml#a1E7)部分。
- en: 'Process: this is what happens between you submitting your prompt to ChatGPT
    and getting a response.'
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理：这是你在向ChatGPT提交提示并得到响应之间发生的事情。
- en: 'O.1 Extract from ChatGPT: this step (the 1st part of the “Output” phase) involves
    you getting your data from ChatGPT. As with step “I.2” above, there are limited
    technical options for this process'
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: O.1 从ChatGPT中提取：这一步（“输出”阶段的第一个部分）涉及您从ChatGPT获取数据。与上面的步骤“I.2”一样，此过程的技术选项有限。
- en: O.2 PostProc/Distribute; this step (the 2nd part of the “Output” phase) has
    to sub-steps. First, perform any post-processing that is required to convert the
    outputs from ChatGPT to the format that you need to your in your “Target/Consumer
    environment”. Second, distributing this data to your consumers. This could mean
    loading the data into another system, or simply attaching files to an email.
  id: totrans-750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: O.2 后处理/分发；这一步（“输出”阶段的第二部分）有子步骤。首先，执行任何必要的后处理，以将ChatGPT的输出转换为您的“目标/消费者环境”所需的格式。其次，将此数据分发给您的消费者。这可能意味着将数据加载到另一个系统，或者简单地将文件附加到电子邮件中。
- en: Whilst this might seem a little involved, anything except simple and personal
    use cases need to consider these explicitly.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这听起来可能有些复杂，但除了简单和个人用例之外，任何需要考虑这些因素的情况都需要明确地考虑。
- en: A Shallow Dive Into GPT Functionality
  id: totrans-752
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深入了解GPT功能
- en: Whilst we are maintaining a “black-box mindset” which avoids focus on the internal
    operation of ChatGPT, it’s important to address some existing concepts of how
    ChatGPT works. We can’t change the past and unfortunately there are many misconceptions
    and myths out in the world that we must correct.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们保持一种“黑盒心态”，避免关注ChatGPT的内部操作时，重要的是要解决一些关于ChatGPT工作原理的现有概念。我们无法改变过去，不幸的是，世界上存在许多误解和神话，我们必须纠正。
- en: Some (Not Unreasonable) Myths on GPT Operation
  id: totrans-754
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于GPT操作的某些（并非不合理）神话
- en: There are many misconceptions about the internal operation of the GPT AI engine.
    As we mention in the [“Black-box Mindset”](#part0009.xhtml#a192) we hold that
    you don’t need to know the internal operation and this is one example of why we
    think this way.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 关于GPT AI引擎的内部操作存在许多误解。正如我们在[“黑盒心态”](#part0009.xhtml#a192)中提到的，我们坚持认为您不需要了解内部操作，这是我们认为这样做的理由之一。
- en: But treating something as a “black-box” and expecting people to never think
    about what goes on inside is unreasonable - and futile.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 但将某物视为“黑盒”，并期望人们永远不要思考内部发生的事情是不合理的——也是徒劳的。
- en: 'The Black-box Interface:'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒接口：
- en: First let’s briefly review the simple “black-box interface” again, shown in
    the diagram below. Depending on what we think is happening inside, our expectations
    of the response, and our judgement of its quality, will vary.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们简要回顾一下下面的简单“黑盒接口”，如图所示。根据我们认为内部发生的情况，我们对响应的期望，以及我们对质量的判断，会有所不同。
- en: '![The simplest black-box interface to ChatGPT](image_rsrc1GD.jpg)'
  id: totrans-759
  prefs: []
  type: TYPE_IMG
  zh: '![ChatGPT最简单的黑盒接口](image_rsrc1GD.jpg)'
- en: Figure 29\. The simplest black-box interface to ChatGPT
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 图29. ChatGPT最简单的黑盒接口
- en: Common (But Wrong) Expectations
  id: totrans-761
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 常见（但错误）的期望
- en: The Database Expectation
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库期望
- en: A very common expectation held by users is the idea of GPT as a database, as
    illustrated below.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 用户普遍持有的一个常见期望是将GPT视为数据库，如下所示。
- en: '![The Database Expectation (Data + Deterministic Reponse)](image_rsrc1GZ.jpg)'
  id: totrans-764
  prefs: []
  type: TYPE_IMG
  zh: '![数据库期望（数据 + 确定性响应）](image_rsrc1GZ.jpg)'
- en: Figure 30\. The Database Expectation (Data + Deterministic Reponse)
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 图30. 数据库期望（数据 + 确定性响应）
- en: A database contains data, obviously, in a formal structure. When we issue a
    query, we expect a response that is predictable and repeatable. In the diagram,
    every time we query for ID=“999.1” we expect a complete, high-integrity response
    with all the data we’ve requested associated with the id “999.1”. The data may
    vary from the last time we performed the query, but that’s only because the data
    in the database changed, presumably under some form of control. The data is authoritative.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库显然包含数据，以正式的结构。当我们发出查询时，我们期望得到可预测和可重复的响应。在图中，每次我们查询ID=“999.1”时，我们期望得到一个完整、高完整性的响应，其中包含我们请求的所有与id“999.1”相关的数据。数据可能与我们上次执行查询时不同，但这只是因为数据库中的数据发生了变化，可能是某种形式的控制。数据是权威的。
- en: The API Expectation
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: API期望
- en: Similarly, if we make an API call, we expect the result to be consistent with
    the API specifications.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，如果我们发起API调用，我们期望结果与API规范一致。
- en: '![The API Expectation (Data + Deterministic Reponse)](image_rsrc1H0.jpg)'
  id: totrans-769
  prefs: []
  type: TYPE_IMG
  zh: '![API期望（数据 + 确定性响应）](image_rsrc1H0.jpg)'
- en: Figure 31\. The API Expectation (Data + Deterministic Reponse)
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 图31. API期望（数据 + 确定性响应）
- en: The Web-server Expectation
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: Web服务器期望
- en: Similarly on the World Wide Web, a “GET” command with the Http protocol results
    in the return of a specific resource, assuming the URL is correct.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，在万维网上，使用Http协议的“GET”命令会在URL正确的情况下返回特定的资源。
- en: '![The HTTP GET Expectation (Data + Deterministic Reponse)](image_rsrc1H1.jpg)'
  id: totrans-773
  prefs: []
  type: TYPE_IMG
  zh: '![HTTP GET期望（数据 + 确定性响应）](image_rsrc1H1.jpg)'
- en: Figure 32\. The HTTP GET Expectation (Data + Deterministic Reponse)
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 图32. HTTP GET期望（数据 + 确定性响应）
- en: In all three of these use cases, the data we are querying is stored at the target
    location (database, API server or Web Server). The query process is to obtain
    a copy of the data using whatever protocols we use.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 在这三个用例中，我们查询的数据都存储在目标位置（数据库、API服务器或Web服务器）。查询过程是使用我们使用的任何协议来获取数据的副本。
- en: This is a simple concept to grasp and many of us are exposed to this type of
    query every day.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单易懂的概念，我们中的许多人每天都在接触到这种类型的查询。
- en: Neither the API or HTTP pattern is how ChatGPT generates responses.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT neither uses the API nor the HTTP pattern to generate responses.
- en: A simplified view of how GPT Generates its Responses
  id: totrans-778
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GPT生成响应的简化视图
- en: So, we’ve looked at some common expectations that are not how GPT generates
    responses. Let’s look at a ‘simple’ equivalent that shows how GPT does generate
    its responses. The situation with ChatGPT (specifically, the GPT AI model that
    sits underneath ChatGPT) is radically different.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经探讨了某些常见的期望，这些期望并不是GPT生成响应的方式。让我们看看一个“简单”的等效示例，它展示了GPT是如何生成其响应的。ChatGPT的情况（特别是ChatGPT下方的GPT
    AI模型）是截然不同的。
- en: All that is stored in the GPT are word association probabilities - consistent
    with the black box mindset, let’s leave it at that. If you really want to dig
    into it, check out Appendix “Advanced GPT Internal Operations” in the book [“Advanced
    ChatGPT Application Primer”](https://bjl.ink/GptAP).
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: GPT中存储的只是一些词汇关联概率——与黑盒思维一致，我们就到此为止。如果你真的想深入了解，可以查看书中附录“高级GPT内部操作”——《高级ChatGPT应用入门》。
- en: Let’s imagine a situation where every word in the english language had a probability
    link we every other word in the language.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个情况，其中英语中的每一个单词都有一个概率链接，连接到语言中的每一个其他单词。
- en: '![Imaginary Word Probability Model](image_rsrc1H2.jpg)'
  id: totrans-782
  prefs: []
  type: TYPE_IMG
  zh: '![虚构的词汇概率模型](image_rsrc1H2.jpg)'
- en: Figure 33\. Imaginary Word Probability Model
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 图33. 虚构的词汇概率模型
- en: It sounds complex, but it’s nowhere near as complex as GPT’s network of word
    association probabilities.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然听起来很复杂，但它远不如GPT的词汇关联概率网络复杂。
- en: Now, the “data” that we see in our responses is generated on the fly by GPT
    based on a complex mash-up of the words in our prompts and data with the probability
    network in GPT’s network.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们在响应中看到的“数据”是由GPT根据我们提示中的词汇和数据的复杂混合以及GPT网络中的概率网络即时生成的。
- en: '![GPT Response of Mashed-up Words](image_rsrc1H3.jpg)'
  id: totrans-786
  prefs: []
  type: TYPE_IMG
  zh: '![混合词汇的GPT响应](image_rsrc1H3.jpg)'
- en: Figure 34\. GPT Response of Mashed-up Words
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 图34. 混合词汇的GPT响应
- en: So all those little coloured dots are my representation of tokens sitting in
    the probability network, and GPT decides how to serve them up to you assembled
    “on the fly” based on your prompt and input data.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，那些小小的彩色点代表的是坐在概率网络中的标记，GPT根据你的提示和输入数据，即时地决定如何将它们组装起来呈现给你。
- en: 'It’s really quite amazing how it all works. As I mentioned it’s far more complicated,
    but the two key points to remember are:'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 它的工作原理真的很神奇。正如我提到的，它远比想象的复杂，但有两个关键点需要记住：
- en: 'No Persistent Data: GPT is not retrieving blocks of stored facts or text, in
    the manner that perhaps Wikipedia is doing on a page-by-page basis.'
  id: totrans-790
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无持久数据：GPT不是以类似维基百科按页面逐页的方式检索存储的事实或文本块。
- en: 'Non-deterministic: GPT applies a mind-numbing number of probability factors
    - some in large numbers of dimensions - to assemble the response, so it’s unlikely
    you’ll get the same response twice. Depending on what changes you make to your
    prompt or context data, you may get highly different responses.'
  id: totrans-791
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 非确定性：GPT应用了令人难以置信数量的概率因素——其中一些在大量维度上——来组装响应，因此你不太可能得到两次相同的响应。根据你对提示或上下文数据的更改，你可能会得到高度不同的响应。
- en: '![GPT Responses Can Be Variable](image_rsrc1H4.jpg)'
  id: totrans-792
  prefs: []
  type: TYPE_IMG
  zh: '![GPT响应可能变化](image_rsrc1H4.jpg)'
- en: Figure 35\. GPT Responses Can Be Variable
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 图35. GPT响应可能变化
- en: Conclusion
  id: totrans-794
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: Having a functional model for how ChatGPT generates responses doesn’t break
    the “black-box” model - it removes misconceptions that would break the black-box
    model.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ChatGPT生成响应的功能模型并不破坏“黑盒”模型——它消除了会破坏黑盒模型的误解。
- en: Practical Suggestions for Focusing on What the User Can Control
  id: totrans-796
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集中于用户可控方面的实用建议
- en: Despite ChatGPT’s black-box nature, users have significant control over their
    interactions with the model. By focusing on these controllable elements, users
    can optimise their interactions and derive maximum value from ChatGPT. Here are
    practical “Do this …” and “Don’t do this …” suggestions based on this component.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT具有黑盒性质，但用户对其与模型互动的控制力很大。通过关注这些可控元素，用户可以优化他们的互动并从ChatGPT中获得最大价值。以下是基于此组件的实用“这样做…”和“不要这样做…”建议。
- en: 'Do This:'
  id: totrans-798
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 做这件事：
- en: 'Define Clear Objectives:'
  id: totrans-799
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义明确目标：
- en: 'Purpose: Clearly define what you want to achieve with ChatGPT to guide your
    interactions.'
  id: totrans-800
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：明确你希望通过ChatGPT实现的目标，以指导你的互动。
- en: 'Example: “Set SMART goals such as ‘Generate a 500-word article on renewable
    energy trends by the end of the day.’”'
  id: totrans-801
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“设定SMART目标，例如‘到今天结束时生成一篇关于可再生能源趋势的500字文章。’”
- en: 'Select Relevant Problems:'
  id: totrans-802
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择相关问题：
- en: 'Purpose: Identify specific problems or tasks where ChatGPT can be most effectively
    applied.'
  id: totrans-803
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：确定ChatGPT可以最有效应用的特定问题或任务。
- en: 'Example: “Use ChatGPT to draft emails, create summaries, or generate content
    ideas.”'
  id: totrans-804
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“使用ChatGPT起草电子邮件、创建摘要或生成内容想法。”
- en: 'Develop an Operational Strategy:'
  id: totrans-805
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定操作策略：
- en: 'Purpose: Plan how to integrate ChatGPT into your workflows systematically.'
  id: totrans-806
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：系统地规划如何将ChatGPT集成到你的工作流程中。
- en: 'Example: “Create a step-by-step plan that includes implementation, monitoring,
    and risk management for using ChatGPT in content creation.”'
  id: totrans-807
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“制定一个包括实施、监控和风险管理的ChatGPT内容创作使用步骤计划。”
- en: 'Use Specific and Contextual Prompts:'
  id: totrans-808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用具体和上下文相关的提示：
- en: 'Purpose: Craft prompts that are detailed and relevant to get more accurate
    responses.'
  id: totrans-809
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：制定详细且与主题相关的提示以获得更准确的回应。
- en: 'Example: “Instead of ‘Explain marketing,’ use ‘Explain the benefits of social
    media marketing for small businesses.’”'
  id: totrans-810
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“与其说‘解释营销’，不如说‘解释社交媒体营销对小企业的益处。’”
- en: 'Iterate and Refine Interactions:'
  id: totrans-811
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 迭代和细化互动：
- en: 'Purpose: Continuously improve the quality of responses by refining prompts
    based on initial outputs.'
  id: totrans-812
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：通过根据初始输出细化提示来持续提高响应质量。
- en: 'Example: “If the response is too vague, add more details or rephrase the prompt
    to get a better answer.”'
  id: totrans-813
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“如果回应过于模糊，请添加更多细节或重新措辞提示以获得更好的答案。”
- en: 'Verify Information:'
  id: totrans-814
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证信息：
- en: 'Purpose: Ensure the accuracy and reliability of the information provided by
    ChatGPT.'
  id: totrans-815
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：确保ChatGPT提供信息的准确性和可靠性。
- en: 'Example: “Cross-check facts and data from ChatGPT with trusted sources, especially
    for critical or sensitive tasks.”'
  id: totrans-816
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“将ChatGPT的事实和数据与可信来源交叉核对，特别是对于关键或敏感任务。”
- en: 'Manage User Expectations:'
  id: totrans-817
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管理用户期望：
- en: 'Purpose: Set realistic expectations regarding ChatGPT’s capabilities and limitations.'
  id: totrans-818
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：设定关于ChatGPT能力和限制的现实期望。
- en: 'Example: “Understand that while ChatGPT can generate useful content, it is
    not infallible and may require manual review and editing.”'
  id: totrans-819
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“理解虽然ChatGPT可以生成有用的内容，但它并非完美无缺，可能需要人工审查和编辑。”
- en: 'Leverage Domain Expertise:'
  id: totrans-820
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用领域专业知识：
- en: 'Purpose: Supplement ChatGPT’s outputs with insights from domain-specific experts
    to enhance quality and accuracy.'
  id: totrans-821
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目的：通过领域特定专家的见解补充ChatGPT的输出，以增强质量和准确性。
- en: 'Example: “Use ChatGPT to generate initial ideas or drafts and then have them
    reviewed by a subject matter expert.”'
  id: totrans-822
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“使用ChatGPT生成初步想法或草案，然后由主题专家进行审查。”
- en: 'Don’t Do This:'
  id: totrans-823
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不要这样做：
- en: 'Assume ChatGPT Is Infinitely Accurate:'
  id: totrans-824
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设ChatGPT无限准确：
- en: 'Risk: Believing that ChatGPT’s responses are always correct can lead to misinformation.'
  id: totrans-825
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：相信ChatGPT的回应总是正确可能导致错误信息。
- en: 'Alternative: Always verify critical information independently.'
  id: totrans-826
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：始终独立验证关键信息。
- en: 'Use Vague Prompts:'
  id: totrans-827
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用模糊提示：
- en: 'Risk: Vague prompts can lead to irrelevant or off-target responses.'
  id: totrans-828
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：模糊的提示可能导致无关或不切题的回应。
- en: 'Alternative: Provide clear and detailed prompts to guide ChatGPT effectively.'
  id: totrans-829
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：提供清晰和详细的提示以有效引导ChatGPT。
- en: 'Expect Deep Understanding:'
  id: totrans-830
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 期待深度理解：
- en: 'Risk: ChatGPT does not have true semantic understanding or emotional intelligence.'
  id: totrans-831
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：ChatGPT没有真正的语义理解或情感智能。
- en: 'Alternative: Use ChatGPT for tasks that require language processing rather
    than deep contextual understanding.'
  id: totrans-832
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：使用ChatGPT处理需要语言处理而非深度上下文理解的任务。
- en: 'Over-Rely on ChatGPT for Critical Decisions:'
  id: totrans-833
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度依赖ChatGPT做出关键决策：
- en: 'Risk: ChatGPT may not provide the depth of analysis required for high-stakes
    decisions.'
  id: totrans-834
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：ChatGPT可能无法提供高风险决策所需的深度分析。
- en: 'Alternative: Use ChatGPT as a supplementary tool and consult with human experts
    for critical decisions.'
  id: totrans-835
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：将ChatGPT作为辅助工具使用，并在做出关键决策时咨询人类专家。
- en: 'Ignore the Need for Human Oversight:'
  id: totrans-836
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视对人类监督的需求：
- en: 'Risk: Outputs from ChatGPT may require refinement and validation.'
  id: totrans-837
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：ChatGPT的输出可能需要改进和验证。
- en: 'Alternative: Always review and edit ChatGPT’s responses to ensure they meet
    your standards.'
  id: totrans-838
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：始终审查和编辑ChatGPT的回复，以确保它们符合你的标准。
- en: 'Expect Consistent Responses:'
  id: totrans-839
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 期望一致的回复：
- en: 'Risk: ChatGPT’s responses can vary even with the same prompt.'
  id: totrans-840
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：即使使用相同的提示，ChatGPT的回复也可能会有所不同。
- en: 'Alternative: Run multiple iterations and choose the most suitable response.'
  id: totrans-841
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：进行多次迭代并选择最合适的回复。
- en: 'Treat ChatGPT as Sentient:'
  id: totrans-842
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将ChatGPT视为有感知的：
- en: 'Risk: Assuming ChatGPT has human-like understanding can lead to misplaced trust.'
  id: totrans-843
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：假设ChatGPT具有类似人类的理解可能导致错误的信任。
- en: 'Alternative: Remember that ChatGPT generates responses based on patterns in
    data, not genuine comprehension.'
  id: totrans-844
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：记住ChatGPT是根据数据中的模式生成回复，而不是真正的理解。
- en: 'Overlook Knowledge Scope Limitations:'
  id: totrans-845
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视知识范围限制：
- en: 'Risk: ChatGPT’s knowledge is limited to its training data and may not be up-to-date.'
  id: totrans-846
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风险：ChatGPT的知识仅限于其训练数据，可能不是最新的。
- en: 'Alternative: Be aware of the model’s training cut-off and verify any recent
    information from reliable sources.'
  id: totrans-847
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替代方案：意识到模型的训练截止日期，并验证任何来自可靠来源的最新信息。
- en: Conclusion
  id: totrans-848
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: By focusing on what users can control, such as setting clear objectives, selecting
    relevant problems, developing operational strategies, and managing expectations,
    interactions with ChatGPT can be optimised. These practical do’s and don’ts provide
    a framework for leveraging ChatGPT’s strengths while mitigating potential drawbacks,
    ensuring that users derive maximum value from their interactions with the AI tool.
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注用户可以控制的内容，例如设定明确的目标、选择相关的问题、制定操作策略和管理期望，与ChatGPT的互动可以被优化。这些实用的做法和禁忌提供了一个框架，以利用ChatGPT的优势同时减轻潜在的缺点，确保用户从与AI工具的互动中获得最大价值。
- en: Myths, Mistakes, and Biases
  id: totrans-850
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迷思、错误和偏见
- en: 'There are three main myths or biases that will seriously affect your ability
    to interact with ChatGPT and make the best use of it. These are:'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 有三个主要迷思或偏见会严重影响你与ChatGPT互动的能力并使其得到最佳利用。这些是：
- en: Anthropomorphising ChatGPT
  id: totrans-852
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人格化ChatGPT
- en: Thinking that ChatGPT is Hallucinating
  id: totrans-853
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 认为ChatGPT在产生幻觉
- en: Thinking that ChatGPT is Lying to you
  id: totrans-854
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 认为ChatGPT在对你撒谎
- en: 'These are facets of the same root cause problem: a lack of understanding on
    the architecture, operation, and capabilities of ChatGPT, or any similar conversational
    AI tool you may encounter.'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是同一根本原因问题的不同方面：对ChatGPT或任何可能遇到的类似对话AI工具的架构、操作和能力缺乏理解。
- en: Anthropomorphisation
  id: totrans-856
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人格化
- en: Anthropomorphisation is the attribution of human traits, emotions, intentions,
    or characteristics to non-human entities, objects, or phenomena. This often refers
    to perceiving software, robots, and artificial intelligence as having human-like
    feelings, thoughts, or intentions.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 人格化是将人类的特质、情感、意图或特征归因于非人类实体、物体或现象。这通常指的是将软件、机器人和人工智能视为具有类似人类的情感、思维或意图。
- en: 'Anthropomorphism can have three impacts in work environments:'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 人格化在工作环境中可能产生三种影响：
- en: 'Perception of AI: People working with ChatGPT or similar AI models may attribute
    human-like characteristics to the AI system. This could manifest in ways such
    as believing the AI system has preferences, feelings, or biases.'
  id: totrans-859
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对AI的认知：与ChatGPT或类似AI模型合作的人可能会将类似人类的特征归因于AI系统。这可能会以相信AI系统有偏好、情感或偏见等方式表现出来。
- en: 'Collaboration Dynamics: Anthropomorphising AI tools like ChatGPT can affect
    the dynamics of teams. If team members view the AI system as another “team member,”
    they may place undue trust or reliance on its outputs, forgetting the AI system
    operates based on data and algorithms without true consciousness.'
  id: totrans-860
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 协作动态：将ChatGPT等AI工具人格化可能会影响团队的动态。如果团队成员将AI系统视为另一位“团队成员”，他们可能会过度信任或依赖其输出，忘记AI系统是基于数据和算法运作而没有真正的意识。
- en: 'Ethical Considerations: As AI becomes more advanced and integrated into work
    practices, there’s a need to address the ethical implications of anthropomorphisation.
    Misunderstanding the AI system’s capabilities or role can lead to inappropriate
    expectations and potential misuse.'
  id: totrans-861
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 伦理考量：随着AI变得更加先进并融入工作实践，需要解决人格化的伦理影响。误解AI系统的能力或角色可能导致不适当的期望和潜在的滥用。
- en: 'When implementing ChatGPT, it’s essential to educate ourselves and colleagues
    about the model’s capabilities and limitations. Understanding that the AI system
    does not have feelings, consciousness, or inherent bias can help in:'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施ChatGPT时，了解模型的能力和限制对于自己和同事来说至关重要。认识到AI系统没有情感、意识或固有的偏见，有助于：
- en: Setting realistic expectations for the AI system's role.
  id: totrans-863
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为AI系统的角色设定合理的期望。
- en: Avoiding over-reliance on the AI system for critical decisions without human
    oversight.
  id: totrans-864
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免在没有人监督的情况下过度依赖AI系统做出关键决策。
- en: Recognising the importance of human intuition, experience, and collaborative
    decision-making.
  id: totrans-865
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认识到人类直觉、经验和协作决策的重要性。
- en: By approaching AI tools like ChatGPT with a clear understanding and setting
    boundaries, you can harness the AI system’s capabilities without falling into
    the pitfalls of anthropomorphisation.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对ChatGPT等AI工具有清晰的理解并设定界限，你可以利用AI系统的能力，同时避免陷入拟人化的陷阱。
- en: Hallucination in AI Systems
  id: totrans-867
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI系统中的幻觉
- en: Hallucination in AI systems refers to the AI model producing outputs that are
    not based on its training data or make little sense in a given context. Essentially,
    the AI system “hallucinates” information that wasn’t explicitly provided or inherent
    in the input.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统中的幻觉指的是AI模型产生不基于其训练数据或在一个特定语境中几乎无意义的输出。本质上，AI系统“幻觉”了未明确提供或内在于输入的信息。
- en: 'Hallucination can have three impacts in AI use situations:'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI应用场景中，幻觉可能产生三种影响：
- en: 'Accuracy of Information: In most work environments, accuracy, and timely information
    are crucial. If ChatGPT or other AI models hallucinate, it can lead to misguided
    decisions or misinformed stakeholders.'
  id: totrans-870
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息准确性：在大多数工作环境中，准确性和及时的信息至关重要。如果ChatGPT或其他AI模型产生幻觉，可能会导致错误的决策或信息不明的利益相关者。
- en: 'Project Predictability: In environments that rely on iterative cycles and feedback
    loops, hallucinated data or insights can disrupt this cycle and lead to unpredictable
    or undesired outcomes.'
  id: totrans-871
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 项目可预测性：在依赖于迭代周期和反馈循环的环境中，幻觉数据或见解可能会破坏这个循环，导致不可预测或不受欢迎的结果。
- en: 'Stakeholder Communication: When communicating with stakeholders, presenting
    AI-generated insights that may have elements of hallucination can erode trust
    and confidence in the technology.'
  id: totrans-872
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利益相关者沟通：在与利益相关者沟通时，展示可能包含幻觉元素的AI生成的见解可能会侵蚀对技术的信任和信心。
- en: 'It’s essential to be aware of the potential for AI hallucination and have mechanisms
    in place to validate and cross-check AI-generated insights. AI users can:'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到AI幻觉的潜在可能性，并建立验证和交叉检查AI生成见解的机制。AI用户可以：
- en: Use multiple sources of data or tools to corroborate AI outputs.
  id: totrans-874
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用多个数据来源或工具来证实AI的输出。
- en: Always have human oversight, especially when using AI outputs for decision-making
    or communication.
  id: totrans-875
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总是有人监督，尤其是在使用AI输出进行决策或沟通时。
- en: Educate team members about the nature of AI models, ensuring they’re aware of
    potential inaccuracies.
  id: totrans-876
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育团队成员关于AI模型的本性，确保他们了解潜在的不准确性。
- en: By being proactive and knowledgeable, you can leverage the benefits of conversational
    AI like ChatGPT, while minimising risks associated with hallucinations.
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 通过积极主动和知识渊博，你可以利用ChatGPT等对话AI的好处，同时最大限度地减少与幻觉相关的风险。
- en: ChatGPT and the Phenomenon of “Lying”
  id: totrans-878
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT和“撒谎”现象
- en: When individuals claim that ChatGPT “lies,” they are often referring to instances
    where the model produces outputs that are factually incorrect or not entirely
    aligned with reality. However, it’s essential to understand that ChatGPT doesn’t
    have intentions, consciousness, or the ability to deliberately deceive.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 当个人声称ChatGPT“撒谎”时，他们通常指的是模型产生的事实上不正确或与现实不完全一致的输出。然而，理解ChatGPT没有意图、意识或故意欺骗的能力是至关重要的。
- en: 'Users of ChatGPT should factor in the following factors when considering the
    potential source of incorrect data:'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑潜在的错误数据来源时，ChatGPT的用户应考虑以下因素：
- en: 'Lack of Conscious Intent: ChatGPT operates based on patterns in its training
    data. It doesn’t “think” or have intent in the same way humans do. What may seem
    like a lie is usually an artifact of its training or a misinterpretation of the
    prompt.'
  id: totrans-881
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏意识意图：ChatGPT根据其训练数据中的模式运行。它不会“思考”或具有与人类相同的方式的意图。可能看起来像谎言的东西通常是其训练或对提示的误解的产物。
- en: 'Limitations of Training Data: If there are inaccuracies or biases in the training
    data, the model might reproduce those inaccuracies in its outputs.'
  id: totrans-882
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练数据局限性：如果训练数据中存在不准确或偏见，模型可能会在其输出中重现这些不准确。
- en: 'Overfitting and Generalisation: ChatGPT may sometimes overfit to specific patterns
    or generalise from its vast dataset, leading to outputs that aren’t entirely accurate
    for a given prompt.'
  id: totrans-883
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过拟合和泛化：ChatGPT有时可能会过度拟合到特定的模式或从其庞大的数据集中泛化，导致针对特定提示的输出并不完全准确。
- en: 'Even when ChatGPT responds to you about its intentions, or apologises for lying,
    it is just generating text based on its context. It’s not admitting to lying.
    Keep these three things in mind:'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 即使ChatGPT回应你关于其意图的问题，或者为撒谎道歉，它也只是基于其上下文生成文本。它并没有承认撒谎。请记住以下三点：
- en: 'Trust in AI Outputs: If you develop the perception that ChatGPT as deliberately
    producing “false” information, it can lead to reduced trust in the tool.'
  id: totrans-885
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信任AI输出：如果你形成了一种看法，认为ChatGPT故意产生“错误”信息，这可能导致对工具的信任度降低。
- en: 'Decision Making: If you’re involved in data-driven decision-making, then inaccurate
    outputs from ChatGPT can potentially misguide you and your stakeholders.'
  id: totrans-886
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：如果你参与数据驱动的决策，那么ChatGPT的不准确输出可能会误导你和你利益相关者。
- en: 'Feedback Loops: If you’re involved in iterative development and continuous
    feedback, then misinformation can disrupt these feedback loops.'
  id: totrans-887
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反馈循环：如果你参与迭代开发和持续反馈，那么错误信息可能会破坏这些反馈循环。
- en: 'Take the following steps to address any actual or perceived inaccuracies:'
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 采取以下步骤来解决任何实际或感知的不准确：
- en: Cross-check crucial AI-generated insights with other sources.
  id: totrans-889
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与其他来源交叉检查关键的AI生成洞察。
- en: Fine-tune or retrain the model with specific, relevant datasets if possible.
  id: totrans-890
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果可能，使用特定、相关的数据集微调或重新训练模型。
- en: Understand the importance of precise and clear prompting to get accurate outputs.
  id: totrans-891
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解精确和清晰的提示的重要性以获得准确的输出。
- en: By understanding the mechanics behind ChatGPT’s outputs and implementing robust
    validation processes, users can optimise their use of conversational AI while
    ensuring project integrity.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解ChatGPT输出的机制并实施稳健的验证流程，用户可以在确保项目完整性的同时优化他们对对话式AI的使用。
- en: How should you engage with ChatGPT?
  id: totrans-893
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你应该如何与ChatGPT互动？
- en: If you use ChatGPT in your professional work, you have both a great opportunity
    and a significant risk. The opportunity is the exceptional amplification of your
    capabilities, even when using a “simple” tool like ChatGPT. By “simple” I mean
    the nature of the conversational interface, not the underlying code and data.
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将ChatGPT用于你的专业工作，你既有巨大的机会，也有重大的风险。机会是使用“简单”工具如ChatGPT时能力的显著增强。我所说的“简单”是指对话式界面的性质，而不是底层代码和数据。
- en: 'The risk is reputational: if you screw up the application of ChatGPT outputs,
    you can be a contributor to impairment or failure of your work processes or even
    brand damage to your employer or customer.'
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 风险是声誉上的：如果你搞砸了ChatGPT输出的应用，你可能会成为你工作流程受损或甚至品牌损害你雇主或客户的贡献者。
- en: Please be smart about how you use it.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 请明智地使用它。
- en: More from Adam Russell
  id: totrans-897
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 更多来自亚当·拉塞尔（Adam Russell）
- en: If you enjoyed this book, check out more of my books and other content at BrainJuice.Media!
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这本书，请查看我在BrainJuice.Media上的更多书籍和其他内容！
- en: Principles of Project Management–Published on [Amazon KDP](https://bjl.ink/pmprinciplesKDP)
    and Leanpub.com
  id: totrans-899
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 项目管理原则—发布于[Amazon KDP](https://bjl.ink/pmprinciplesKDP)和Leanpub.com
- en: 'Adam On: Projects (Volume 1)–Published on [Amazon KDP](https://bjl.ink/AOPV1Kdp)
    and Leanpub.com'
  id: totrans-900
  prefs:
