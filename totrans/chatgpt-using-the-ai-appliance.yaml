- en: About the Author
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The following two sections provide a high-level summary of Adam’s extensive
    project management career and an update of Adam’s “Career by Numbers”—a breakdown
    of experience in work hours.
  prefs: []
  type: TYPE_NORMAL
- en: Career Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Adam has lived, eaten, slept and breathed the dynamics of Software Development,
    Software Project Management and large-scale Systems Integration of IT platforms
    for nearly 45 years. This experience enables a deep understanding of software
    projects, which informs his ability to successfully deliver projects of all kinds.
  prefs: []
  type: TYPE_NORMAL
- en: Adam started as a developer and later moved into pre-sales technical support
    and project management. He managed his first project in 1985 and hasn’t looked
    back.
  prefs: []
  type: TYPE_NORMAL
- en: Adam has extensive enterprise experience on both the supplier and customer sides.
    He worked for some of the largest companies in Australia, such as News Corp, IAG,
    Telstra and BHP and numerous large government departments. He has also worked
    for global vendors such as Hewlett-Packard, Wang Labs and Wipro. This experience
    resulted in a deep understanding of effective IT governance.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a counterpoint, Adam’s experience in startups and working with smaller software
    companies have instilled the delight of nimble and agile approaches to delivering
    customer value. Adam aims to implement governance with discipline and agility:
    strong and disciplined controls where needed, but with agile independence and
    flexibility that focuses on customer value in product development.'
  prefs: []
  type: TYPE_NORMAL
- en: Adam’s strength is bringing together people from all company areas to work on
    value delivery via software or digital components. Adam loves to solve complex
    problems in highly dynamic and often chaotic digital environments and thrives
    on building digital products and bringing them to market.
  prefs: []
  type: TYPE_NORMAL
- en: Adam does this by focusing the team on the outcomes that must be enabled. Although
    experienced in most traditional plan-based (Waterfall) and Agile methodologies,
    Adam is not bound to any specific one, preferring to assess each problem on a
    case-by-case basis and select the minimal tool-set necessary to support each project.
  prefs: []
  type: TYPE_NORMAL
