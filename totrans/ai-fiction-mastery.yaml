- en: GLOSSARY OF TERMS
  id: totrans-2249
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 术语表
- en: 'AI (Artificial Intelligence): A broad field of computer science that encompasses
    the development of intelligent agents, which are systems that can reason, learn,
    and act autonomously.'
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: 'AI (人工智能): 计算机科学的一个广泛领域，包括智能代理的开发，这些代理是能够推理、学习和自主行动的系统。'
- en: 'AI-assisted writing: The use of AI tools and technologies to enhance the writing
    process, such as generating ideas, outlining plots, crafting dialogue, or editing
    and revising text.'
  id: totrans-2251
  prefs: []
  type: TYPE_NORMAL
  zh: 'AI辅助写作: 使用AI工具和技术来增强写作过程，例如生成想法、概述情节、创作对话或编辑和修改文本。'
- en: 'ANTCONC: A software tool used for analyzing text and creating concordances,
    which show the frequency and context of words in a text.'
  id: totrans-2252
  prefs: []
  type: TYPE_NORMAL
  zh: 'ANTCONC: 一种用于分析文本和创建词频和语境对照的工具软件。'
- en: 'API (Application Programming Interface): A set of protocols and tools that
    allows different software applications to communicate with each other. In the
    context of AI writing, APIs allow users to access and interact with large language
    models (LLMs) directly.'
  id: totrans-2253
  prefs: []
  type: TYPE_NORMAL
  zh: 'API (应用程序编程接口): 一组协议和工具，允许不同的软件应用程序相互通信。在AI写作的背景下，API允许用户直接访问和交互大型语言模型（LLMs）。'
- en: 'Anthropic: An AI research and safety company that developed the Claude family
    of LLMs.'
  id: totrans-2254
  prefs: []
  type: TYPE_NORMAL
  zh: 'Anthropic: 一家AI研究和安全公司，开发了Claude系列LLM。'
- en: 'AutoCrit: A fiction writing software that offers manuscript analysis, editing
    suggestions, and AI-powered tools for story development and refinement.'
  id: totrans-2255
  prefs: []
  type: TYPE_NORMAL
  zh: 'AutoCrit: 一款小说写作软件，提供稿件分析、编辑建议以及用于故事发展和精炼的AI工具。'
- en: 'Bias: The tendency of AI models to reflect the biases present in their training
    data, leading to potentially unfair or discriminatory outputs.'
  id: totrans-2256
  prefs: []
  type: TYPE_NORMAL
  zh: '偏见: AI模型反映其训练数据中存在的偏见的倾向，可能导致不公平或歧视性的输出。'
- en: 'Big Bang Box (Rexy): A feature in the Rexy prompt sequencing tool that stores
    the output of each step in a prompt sequence and allows it to be used as input
    for subsequent steps, ensuring narrative continuity.'
  id: totrans-2257
  prefs: []
  type: TYPE_NORMAL
  zh: 'Big Bang Box (Rexy): Rexy提示序列工具中的一个功能，它存储提示序列中每一步的输出，并允许将其用作后续步骤的输入，确保叙事的连续性。'
- en: 'Chatbot: A computer program designed to simulate conversation with human users,
    often using natural language processing and AI techniques.'
  id: totrans-2258
  prefs: []
  type: TYPE_NORMAL
  zh: '聊天机器人: 一种旨在模拟与人类用户进行对话的计算机程序，通常使用自然语言处理和AI技术。'
- en: 'Claude: A family of LLMs developed by Anthropic, known for their conversational
    abilities and creative writing style.'
  id: totrans-2259
  prefs: []
  type: TYPE_NORMAL
  zh: 'Claude: Anthropic开发的一系列LLMs，以其对话能力和创意写作风格而闻名。'
- en: 'Completion Prompting: A prompting technique where the user provides a partial
    text and instructs the AI to continue or complete it.'
  id: totrans-2260
  prefs: []
  type: TYPE_NORMAL
  zh: '完成提示: 一种提示技术，用户提供部分文本并指示AI继续或完成它。'
- en: 'Context stuffing: A prompting technique where the user provides additional
    information and context beyond the core prompt to guide the AI’s response.'
  id: totrans-2261
  prefs: []
  type: TYPE_NORMAL
  zh: '上下文填充: 一种提示技术，用户提供超出核心提示的额外信息和上下文，以引导AI的响应。'
- en: 'Context Window: The number of tokens (words or word fragments) that an AI model
    can consider at a time when generating text.'
  id: totrans-2262
  prefs: []
  type: TYPE_NORMAL
  zh: '上下文窗口: AI模型在生成文本时一次可以考虑的标记（单词或词片段）的数量。'
- en: 'Custom GPTs (ChatGPT Plus): A feature that allows users to create and train
    AI models tailored to specific domains, writing styles, or preferences.'
  id: totrans-2263
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义GPTs（ChatGPT Plus）：一种功能，允许用户创建和训练针对特定领域、写作风格或偏好的AI模型。
- en: 'Custom Instructions (ChatGPT): A feature that allows users to provide specific
    guidelines and information to influence the AI’s responses in a chat session.'
  id: totrans-2264
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令（ChatGPT）：一种功能，允许用户在聊天会话中提供具体的指南和信息，以影响AI的响应。
- en: 'Developmental Editing: A type of editing that focuses on the overall structure,
    plot, characters, and themes of a story, helping to ensure a cohesive and engaging
    narrative.'
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: 发展性编辑：一种编辑类型，专注于故事的整体结构、情节、人物和主题，有助于确保连贯和引人入胜的叙述。
- en: 'Diffusion Model: A type of deep learning model used for generating images from
    text prompts.'
  id: totrans-2266
  prefs: []
  type: TYPE_NORMAL
  zh: 扩散模型：一种用于从文本提示生成图像的深度学习模型。
- en: 'Fine-Tuning: The process of training an existing AI model on a smaller, more
    specific dataset to adapt its behavior or improve its performance on a particular
    task.'
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: 微调：在较小的、更具体的数据集上训练现有AI模型的过程，以适应其行为或提高其在特定任务上的性能。
- en: 'Foundational Model: A large language model trained on a massive dataset of
    text and code, designed to be adaptable to various downstream tasks through fine-tuning.'
  id: totrans-2268
  prefs: []
  type: TYPE_NORMAL
  zh: 基础模型：在大量文本和代码数据集上训练的大型语言模型，旨在通过微调适应各种下游任务。
- en: 'Future Fiction Academy (FFA): A community and educational platform for authors
    who are interested in using AI for fiction writing. Membership includes access
    to Rexy, a prompt sequencing tool.'
  id: totrans-2269
  prefs: []
  type: TYPE_NORMAL
  zh: 未来科幻学院（FFA）：一个社区和教育平台，为对使用AI进行小说写作感兴趣的作者提供支持。会员资格包括访问Rexy，一个提示排序工具。
- en: 'Generative AI: A type of AI that can create new content, such as text, images,
    music, or code, that is similar to human-created content.'
  id: totrans-2270
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI：一种能够创建与人类创作内容相似的新内容（如文本、图像、音乐或代码）的AI类型。
- en: 'Genre Conventions: Established norms and expectations within a particular genre
    of fiction, such as character archetypes, plot structures, and thematic elements.'
  id: totrans-2271
  prefs: []
  type: TYPE_NORMAL
  zh: 类型惯例：在特定小说类型中建立的标准规范和期望，例如人物原型、情节结构和主题元素。
- en: 'GPT (Generative Pre-trained Transformer): A family of large language models
    developed by OpenAI, known for their ability to generate human-quality text.'
  id: totrans-2272
  prefs: []
  type: TYPE_NORMAL
  zh: GPT（生成预训练转换器）：由OpenAI开发的一组大型语言模型，以其生成人类质量文本的能力而闻名。
- en: 'Grammarly: An AI-powered writing assistant that offers grammar and style checking,
    as well as suggestions for improving clarity and conciseness.'
  id: totrans-2273
  prefs: []
  type: TYPE_NORMAL
  zh: Grammarly：一种AI驱动的写作助手，提供语法和风格检查，以及改进清晰度和简洁性的建议。
- en: 'Hugging Face: A website that provides information about a vast collection of
    open-source AI models and datasets.'
  id: totrans-2274
  prefs: []
  type: TYPE_NORMAL
  zh: Hugging Face：一个提供大量开源AI模型和数据集信息的网站。
- en: 'In-Context Learning: The ability of an AI model to learn and adapt to new information
    and tasks within a specific context, without requiring retraining on a large dataset.'
  id: totrans-2275
  prefs: []
  type: TYPE_NORMAL
  zh: 在上下文中学习：AI模型在特定上下文中学习并适应新信息和任务的能力，无需在大型数据集上重新训练。
- en: 'Iterative Prompting: A prompting technique where the user refines and adjusts
    prompts based on the AI’s responses, gradually shaping the generated content to
    align with their vision.'
  id: totrans-2276
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示：一种提示技术，用户根据AI的响应细化并调整提示，逐步塑造生成内容以符合他们的愿景。
- en: 'JSONL (JSON Lines): A text file format where each line contains a JSON object,
    often used for storing and exchanging data between AI models and applications.'
  id: totrans-2277
  prefs: []
  type: TYPE_NORMAL
  zh: JSONL（JSON行）：一种文本文件格式，其中每行包含一个JSON对象，常用于在AI模型和应用程序之间存储和交换数据。
- en: 'Large Language Model (LLM): A type of AI model trained on a massive dataset
    of text and code, capable of understanding and generating human-quality text,
    translating languages, writing different kinds of creative content, and answering
    your questions in an informative way.'
  id: totrans-2278
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM）：一种在大量文本和代码数据集上训练的AI模型，能够理解并生成人类质量的文本，翻译语言，撰写不同类型的创意内容，并以信息丰富的方式回答你的问题。
- en: 'Megaprompting: A prompting technique that involves providing extensive context
    and information within a prompt to guide the AI’s response and ensure accuracy
    and relevance.'
  id: totrans-2279
  prefs: []
  type: TYPE_NORMAL
  zh: 大规模提示：一种提示技术，涉及在提示中提供广泛的内容和信息，以引导AI的响应并确保准确性和相关性。
- en: 'Midjourney: An AI image generation tool that allows users to create images
    from text descriptions.'
  id: totrans-2280
  prefs: []
  type: TYPE_NORMAL
  zh: 中途之旅：一种AI图像生成工具，允许用户根据文本描述创建图像。
- en: 'Mixture-of-Experts (MoE): A type of neural network architecture that uses a
    collection of specialized sub-models, or “experts,” to process different parts
    of the input data.'
  id: totrans-2281
  prefs: []
  type: TYPE_NORMAL
  zh: Mixture-of-Experts (MoE)：一种神经网络架构，使用一组专门的子模型或“专家”来处理输入数据的不同部分。
- en: 'Multimodal: Refers to AI models that can process and generate information in
    multiple formats, such as text, images, audio, and video.'
  id: totrans-2282
  prefs: []
  type: TYPE_NORMAL
  zh: Multimodal：指能够处理和生成多种格式的AI模型，如文本、图像、音频和视频。
- en: 'Narrative Continuity: The consistency and logical flow of events within a story,
    ensuring that plot points connect and characters’ actions and motivations align
    with past events.'
  id: totrans-2283
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事连续性：故事中事件的一致性和逻辑流程，确保情节点相互连接，角色的行为和动机与过去的事件一致。
- en: 'Natural Language Processing (NLP): A branch of AI that focuses on enabling
    computers to understand, interpret, and generate human language.'
  id: totrans-2284
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）：AI的一个分支，专注于使计算机能够理解、解释和生成人类语言。
- en: 'Needs Assessment Prompting: A technique where the user asks the AI what information
    it needs to complete a given task effectively, leading to more tailored and effective
    prompts.'
  id: totrans-2285
  prefs: []
  type: TYPE_NORMAL
  zh: 需求评估提示：一种技术，其中用户询问AI完成给定任务所需的信息，从而产生更定制和有效的提示。
- en: 'Novelcrafter: An AI storytelling platform that offers tools for generating
    text, creating characters, and developing storylines.'
  id: totrans-2286
  prefs: []
  type: TYPE_NORMAL
  zh: Novelcrafter：一个AI故事创作平台，提供生成文本、创建角色和开发故事情节的工具。
- en: 'Notion: A flexible workspace and note-taking application that allows users
    to organize information, create databases, and collaborate on projects.'
  id: totrans-2287
  prefs: []
  type: TYPE_NORMAL
  zh: Notion：一款灵活的工作空间和笔记应用，允许用户组织信息、创建数据库并在项目上进行协作。
- en: 'NSFW (Not Safe for Work): Refers to content that is considered inappropriate
    for viewing or sharing in a professional setting, often due to its explicit or
    offensive nature.'
  id: totrans-2288
  prefs: []
  type: TYPE_NORMAL
  zh: NSFW（Not Safe for Work）：指在专业环境中被认为不适宜查看或分享的内容，通常由于其露骨或攻击性性质。
- en: 'OpenAI: An AI research and deployment company that developed the GPT family
    of LLMs and other AI tools.'
  id: totrans-2289
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI：一家AI研究和部署公司，开发了GPT系列LLM和其他AI工具。
- en: 'Open-Source: Refers to software or models that are made available to the public
    with a license that allows users to view, modify, and distribute the code.'
  id: totrans-2290
  prefs: []
  type: TYPE_NORMAL
  zh: Open-Source：指以允许用户查看、修改和分发代码的许可证公开的软件或模型。
- en: 'Parameters: Numerical values that define the behavior and characteristics of
    an AI model, such as the size of its context window or the randomness of its outputs.'
  id: totrans-2291
  prefs: []
  type: TYPE_NORMAL
  zh: 参数：定义AI模型行为和特性的数值，例如其上下文窗口的大小或其输出的随机性。
- en: 'Persona: A specific role or character that is assigned to the AI to guide its
    responses and provide a framework for its interactions with the user.'
  id: totrans-2292
  prefs: []
  type: TYPE_NORMAL
  zh: Persona：指分配给AI的特定角色或人物，以指导其响应并提供与用户互动的框架。
- en: 'Playground: A developer interface provided by many LLM platforms that allows
    users to experiment with prompts, adjust parameters, and explore the capabilities
    of the AI model.'
  id: totrans-2293
  prefs: []
  type: TYPE_NORMAL
  zh: Playground：许多LLM平台提供的开发者界面，允许用户实验提示、调整参数并探索AI模型的性能。
- en: 'Plot Threads: The different storylines or narrative arcs within a story that
    contribute to the overall plot development.'
  id: totrans-2294
  prefs: []
  type: TYPE_NORMAL
  zh: 情节线索：故事中的不同故事线或叙事弧，有助于整体情节发展。
- en: 'Prompt: A piece of text that serves as input or instructions to guide the LLM’s
    response. A prompt provides context, sets expectations, and directs the AI toward
    generating desired outputs, such as text, code, or images.'
  id: totrans-2295
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt：作为LLM响应的输入或指令的文本片段。提示提供上下文、设定期望并指导AI生成期望的输出，如文本、代码或图像。
- en: 'Prompt Chaining: A prompting technique that involves breaking down a complex
    prompt into a series of smaller, interconnected prompts to guide the AI through
    a logical thought process.'
  id: totrans-2296
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt Chaining：一种提示技术，涉及将复杂的提示分解为一系列较小的、相互关联的提示，以引导AI通过逻辑思维过程。
- en: 'Prompt Engineering: The art and science of crafting effective prompts to elicit
    desired responses from AI models.'
  id: totrans-2297
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt Engineering：制作有效提示的艺术和科学，以从AI模型中诱发出期望的响应。
- en: 'Prompt Sequencing: A technique that involves creating a sequence of prompts
    that build upon each other, allowing the AI to maintain narrative logic and consistency
    across generated text.'
  id: totrans-2298
  prefs: []
  type: TYPE_NORMAL
  zh: Prompt Sequencing：一种技术，涉及创建一系列提示，这些提示相互构建，使AI能够在生成的文本中保持叙事逻辑和一致性。
- en: 'ProWritingAid: A grammar checker and style editor that also offers AI-powered
    suggestions for improving clarity, conciseness, and overall writing quality.'
  id: totrans-2299
  prefs: []
  type: TYPE_NORMAL
  zh: ProWritingAid：一款语法检查和风格编辑器，同时提供基于AI的建议，以提升清晰度、简洁性和整体写作质量。
- en: 'RAG (Retrieval Augmented Generation): A technique where AI models use external
    information retrieval systems to access and incorporate relevant information when
    generating text.'
  id: totrans-2300
  prefs: []
  type: TYPE_NORMAL
  zh: RAG（检索增强生成）：一种技术，其中AI模型使用外部信息检索系统来访问和整合相关信息，以便在生成文本时使用。
- en: 'Rexy Word Banger: A prompt sequencing tool developed by the Future Fiction
    Academy, allowing users to create and customize sequences of prompts to guide
    AI models in generating text.'
  id: totrans-2301
  prefs: []
  type: TYPE_NORMAL
  zh: Rexy Word Banger：由未来虚构学院开发的一个提示序列工具，允许用户创建和自定义提示序列，以引导AI模型生成文本。
- en: 'Role-Based Prompts: Prompts that assign a specific role or persona to the AI,
    guiding its responses and providing a framework for its interactions with the
    user.'
  id: totrans-2302
  prefs: []
  type: TYPE_NORMAL
  zh: 基于角色的提示：将特定角色或人格赋予AI的提示，指导其响应并提供与用户互动的框架。
- en: 'Scene Brief: A detailed outline of a scene, including setting, characters,
    goals, conflicts, and key events, used to guide AI models in generating scene
    descriptions and dialogue.'
  id: totrans-2303
  prefs: []
  type: TYPE_NORMAL
  zh: 场景概述：一个场景的详细大纲，包括场景设置、人物、目标、冲突和关键事件，用于指导AI模型生成场景描述和对话。
- en: 'Second Brain: A system or tool used to store and organize information, acting
    as an extension of the user’s memory and cognitive abilities.'
  id: totrans-2304
  prefs: []
  type: TYPE_NORMAL
  zh: 第二大脑：一种用于存储和组织信息的系统或工具，作为用户记忆和认知能力的扩展。
- en: 'Story Bible/Blueprint: A comprehensive document that contains all the essential
    information about a story or series, including character profiles, setting descriptions,
    plot outlines, and world-building details.'
  id: totrans-2305
  prefs: []
  type: TYPE_NORMAL
  zh: 故事圣经/蓝图：一份包含关于故事或系列的所有必要信息的综合文档，包括人物档案、场景描述、情节大纲和世界构建细节。
- en: 'Sudowrite: An AI writing tool specifically designed for fiction writers, offering
    features for generating text, overcoming writer’s block, and refining prose.'
  id: totrans-2306
  prefs: []
  type: TYPE_NORMAL
  zh: Sudowrite：一种专门为小说作家设计的AI写作工具，提供生成文本、克服写作障碍和润色散文的功能。
- en: 'System Prompt/Instruction: A set of instructions or guidelines provided to
    the AI model at the beginning of a session to influence its overall behavior and
    response style.'
  id: totrans-2307
  prefs: []
  type: TYPE_NORMAL
  zh: 系统提示/指令：在会话开始时提供给AI模型的一组指令或指南，以影响其整体行为和响应风格。
- en: 'Temperature: A parameter that controls the randomness and creativity of an
    AI model’s output.'
  id: totrans-2308
  prefs: []
  type: TYPE_NORMAL
  zh: 温度：一个控制AI模型输出随机性和创造性的参数。
- en: 'Token: The basic unit of text used by AI models, typically representing a word
    or part of a word.'
  id: totrans-2309
  prefs: []
  type: TYPE_NORMAL
  zh: 令牌：AI模型使用的文本的基本单元，通常代表一个单词或单词的一部分。
- en: 'XML (Extensible Markup Language): A markup language that defines a set of rules
    for encoding documents in a format that is both human-readable and machine-readable.'
  id: totrans-2310
  prefs: []
  type: TYPE_NORMAL
  zh: XML（可扩展标记语言）：一种标记语言，定义了编码文档的规则，该格式既适合人类阅读，也适合机器阅读。
- en: ​[ ​44​ ]​
  id: totrans-2311
  prefs: []
  type: TYPE_NORMAL
  zh: '[44]'
- en: STORY DEVELOPMENT USING CHATGPT
  id: totrans-2312
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行故事发展
- en: Since ChatGPT is still the most popular AI tool for writers, I decided to use
    It to go from Ideation and Concept through Story Development all the way to an
    outline, scene briefs, and the writing of two scenes. I then tested the scene
    writing on various LLMs, including my fine-tune models, to show how the output
    can differ even with the same prompts. Furthermore, each run of the LLM is like
    a word slot machine, and you could get something quite different.
  id: totrans-2313
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT仍然是作家最受欢迎的AI工具，我决定使用它从构思和概念到故事发展，再到提纲、场景概述和两个场景的写作。然后，我对包括我的微调模型在内的各种LLM进行了场景写作测试，以展示即使使用相同的提示，输出也可以有所不同。此外，每次LLM的运行都像是一个单词老虎机，你可能会得到相当不同的结果。
- en: A year ago, I wrote [Love by the Prompt](https://books2read.com/lovebytheprompt)  ⁠[1](#c349.xhtml#a449)
    using ChatGPT for the entire book. What’s interesting is that those techniques
    still work, although the possibilities for generating prose have expanded. You
    can go from ideation, brainstorming, character and setting development, to plot
    and outline using nothing but ChatGPT. You can also write skeleton scenes with
    ChatGPT, and that might be all you need.
  id: totrans-2314
  prefs: []
  type: TYPE_NORMAL
  zh: 一年前，我使用ChatGPT为整本书写了[《按提示爱》](https://books2read.com/lovebytheprompt) [1](#c349.xhtml#a449)。有趣的是，那些技术仍然有效，尽管生成散文的可能性已经扩大。你可以仅使用ChatGPT从构思、头脑风暴、人物和场景发展，到情节和提纲。你还可以用ChatGPT写骨架场景，这可能就是你所需要的全部。
- en: So, if you have ChatGPT, you can follow along with the following conversation.
  id: totrans-2315
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你有ChatGPT，你可以跟随以下对话。
- en: 'Link to the ChatGPT 4 conversation:'
  id: totrans-2316
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 4对话链接：
- en: '[https://chat.openai.com/share/fb7c31f7-b813-43f7-93f1-cea044d4e8cd](https://chat.openai.com/share/fb7c31f7-b813-43f7-93f1-cea044d4e8cd)
    ⁠[2](#c349.xhtml#a3ZS)'
  id: totrans-2317
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://chat.openai.com/share/fb7c31f7-b813-43f7-93f1-cea044d4e8cd](https://chat.openai.com/share/fb7c31f7-b813-43f7-93f1-cea044d4e8cd)
    [2](#c349.xhtml#a3ZS)'
- en: 'Initial prompt: You are a bestselling romance author for small-town romance
    looking to write an enemies-to-lovers romance involving a family feud and a missing
    prize racehorse. Make this a dramatic contemporary romance full of romantic tension
    and chemistry between the hero and heroine as well as a touch of suspense. Give
    me a high-concept premise for this romance.'
  id: totrans-2318
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：你是一位畅销的小镇爱情小说作家，想要写一部关于家族纷争和失踪赛马的敌对到爱情的浪漫小说。让这个故事成为一部充满浪漫张力、化学反应以及一点悬疑的现代浪漫小说。给我一个这个浪漫小说的高概念前提。
- en: I then continued the conversation, refining and changing direction from what
    ChatGPT 4 gave me. Notice you don’t have to take what it gives you. You can and
    should inject your own opinions.
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着继续对话，对ChatGPT 4给出的内容进行细化并改变方向。注意，你不必接受它给出的内容。你可以，也应该加入你自己的观点。
- en: I generated the hook and pitch, as well as a list of characters and settings.
    I then asked ChatGPT 4 to create scene briefs by giving it an overview of how
    I wanted the scene to go.
  id: totrans-2320
  prefs: []
  type: TYPE_NORMAL
  zh: 我生成了钩子和提案，以及一个角色和场景列表。然后我要求ChatGPT 4通过给我一个场景如何进行的概述来创建场景概要。
- en: I can intervene and change things at every step of the process. Of course, this
    is a demo, so I kind of let it generate an outline that I wouldn’t use since I’m
    a pantser. The outline was very sketchy, so I suggested the first two scenes in
    alternating point of view between the heroine and hero, and then let ChatGPT generate
    the prose.
  id: totrans-2321
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以在过程的每个步骤中干预并改变事情。当然，这是一个演示，所以我让它生成了一个我不会使用的概要，因为我是一个即兴创作的人。概要非常粗略，所以我建议以女主角和男主角交替的视角来提出前两个场景，然后让ChatGPT生成散文。
- en: Once you get to the end of the conversation you’ll notice a few things.
  id: totrans-2322
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你到达对话的结尾，你会注意到一些事情。
- en: ChatGPT 4 was pretty good at developing the characters, but you can see that
    heavy guidance was needed to make the story more dramatic. One of the problems
    with AI, especially chatbots that are meant to be “nice,” is that they tend to
    minimize conflict. If you read through the chat, you can see that the proposed
    story lacks conflict for a romance.
  id: totrans-2323
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 4在角色塑造方面做得相当不错，但你也可以看出，为了让故事更戏剧化，需要大量的指导。AI的一个问题，尤其是那些旨在“友好”的聊天机器人，是它们倾向于最小化冲突。如果你阅读整个聊天记录，你会发现，所提出的爱情故事缺乏冲突。
- en: This is where you, as the human storyteller, need to come in and course-correct.
  id: totrans-2324
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你需要作为人类讲述者介入并纠正方向的地方。
- en: Unfortunately, even with heavy guidance for the scenes, the writing was not
    the best. These written scenes would have to be heavily edited or used for inspiration
    to write from.
  id: totrans-2325
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，即使在场景上进行了大量指导，写作仍然不尽如人意。这些写出的场景需要大量编辑，或者用作写作灵感的来源。
- en: Notice that the outline doesn’t make sense near the end. If Brooke and Jake
    find out about the true kidnapper in Chapter 15, who makes a confession about
    his plans to kill Brooke, then why is he still around in Chapter 16 to attempt
    a murder at an equestrian event?
  id: totrans-2326
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到概要的结尾部分没有意义。如果布鲁克和杰克在第15章发现了真正的绑架者，他承认了自己的计划要杀害布鲁克，那么为什么他还在第16章出现在马术赛事中试图谋杀？
- en: Since I’m not a plotter and I don’t use outlines, I’m not going to bother to
    correct the outline. I’m also not going to write this story since I don’t know
    that much about horses and equestrian events, so I don’t know if I would have
    started at the town hall either. It would probably be better to have the meet-cute
    at an equestrian event where Brooke could accuse Jake of cheating or something
    equally obnoxious before her horse disappears.
  id: totrans-2327
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我不是一个情节规划者，也不使用概要，所以我不会费心去纠正概要。我也不会写这个故事，因为我对马和马术赛事了解不多，所以我不知道我是否应该从市政厅开始。可能在一个马术赛事中相遇会更合适，在那里布鲁克可以在她的马消失之前指责杰克作弊或做其他同样令人讨厌的事情。
- en: Since ChatGPT 4’s writing wasn’t that great, I’m going to take the story information
    I generated and put it into Notion so I can use Future Fiction Academy’s Rexy
    Word Banger to try other LLMs to generate the first two scenes and compare the
    writing.
  id: totrans-2328
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT 4的写作并不出色，我将把我生成的故事信息放入Notion，这样我就可以使用未来小说学院（Future Fiction Academy）的Rexy
    Word Banger来尝试其他LLM生成前两个场景，并进行比较。
- en: 'After running through the following LLMs:'
  id: totrans-2329
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行了以下LLM之后：
- en: Gpt-3.5-turbo
  id: totrans-2330
  prefs: []
  type: TYPE_NORMAL
  zh: Gpt-3.5-turbo
- en: Gpt-3.5-turbo-16k
  id: totrans-2331
  prefs: []
  type: TYPE_NORMAL
  zh: Gpt-3.5-turbo-16k
- en: Gpt-4
  id: totrans-2332
  prefs: []
  type: TYPE_NORMAL
  zh: Gpt-4
- en: Gemini-pro-1.5
  id: totrans-2333
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini-pro-1.5
- en: Claude-haiku
  id: totrans-2334
  prefs: []
  type: TYPE_NORMAL
  zh: Claude-haiku
- en: Claude-sonnet
  id: totrans-2335
  prefs: []
  type: TYPE_NORMAL
  zh: Claude-sonnet
- en: Claude-2.0
  id: totrans-2336
  prefs: []
  type: TYPE_NORMAL
  zh: Claude-2.0
- en: Claude-opus
  id: totrans-2337
  prefs: []
  type: TYPE_NORMAL
  zh: Claude-opus
- en: '[All temperature and TopP was left at 1.0]'
  id: totrans-2338
  prefs: []
  type: TYPE_NORMAL
  zh: '[所有温度和TopP都设置为1.0]'
- en: I believe Claude 3 Opus was the best writer, sticking to the plan and sounding
    most interesting. It was also the most expensive, costing $0.43 for two scenes.
    Claude 2.0 was next best, in my opinion. It wrote more words than Opus and had
    better banter. However, it tended to keep writing past the scene, even though
    I told it not to (I think if I lowered the temperature and TopP to .7 and .7,
    it might have done better). Two Claude 2.0 scenes cost $0.22, half as much as
    Opus.
  id: totrans-2339
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为Claude 3 Opus是最好的作家，坚持计划并且听起来最有趣。它也是最昂贵的，两个场景的成本是0.43美元。在我看来，Claude 2.0是下一个最好的。它写的字数比Opus多，而且对话更精彩。然而，它倾向于在场景之后继续写作，尽管我告诉它不要这样做（我认为如果我把温度和TopP降低到0.7和0.7，它可能会做得更好）。两个Claude
    2.0场景的成本是0.22美元，是Opus的一半。
- en: Usually, I like Sonnet, but for some reason, the first chapter was really terse.
    I even tried it twice but only got about 700-800 words. The second chapter was
    over 2000 words. Sonnet does have a snarkier voice than the other LLMs, and I
    enjoy the banter and colorful words. Sonnet’s cost is about $0.08 for two scenes.
  id: totrans-2340
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我喜欢Sonnet，但不知何故，第一章真的很简洁。我甚至试了两次，但只得到了大约700-800字。第二章超过了2000字。Sonnet确实比其他LLM有更尖锐的声音，我喜欢它的对话和丰富的词汇。Sonnet的成本大约是两个场景0.08美元。
- en: 'The rest of the LLMs, Claude Haiku, the OpenAI GPTs, and gemini-pro-1.5 had
    very terse writing styles that didn’t work. The OpenAI models tended to do more
    telling and less dialogue. Haiku had some fun dialogue but rushed through the
    scene. Gemini-pro-1.5 had deeper insight and followed directions better, but it
    was too on the nose and rushed through the scenes. These LLMs produced less than
    1000 words per scene. Costs for the two scenes. Haiku: $0.005 or half a penny,
    gpt3.5-turbo: $0.02, gemini-pro-1.5: $0.16 and gpt4: $0.33'
  id: totrans-2341
  prefs: []
  type: TYPE_NORMAL
  zh: 其他的LLM，包括Claude Haiku、OpenAI的GPTs和gemini-pro-1.5，都有非常简洁的写作风格，效果不佳。OpenAI的模型倾向于更多地讲述而不是对话。Haiku有一些有趣的对话，但场景处理得很快。Gemini-pro-1.5有更深入的见解，并且更好地遵循指示，但它太直接了，场景处理得也很快。这些LLM每个场景产生的文字少于1000字。两个场景的成本如下：Haiku：0.005美元或半便士，gpt3.5-turbo：0.02美元，gemini-pro-1.5：0.16美元和gpt4：0.33美元。
- en: If you want to see how the fine tunes differ, I ran two. One was trained in
    romantic comedy, and the other one in my general writing style. All fine-tune
    scenes have a temperature of 0.7 and TopP of 0.7.
  id: totrans-2342
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想看看微调的差异，我运行了两个。一个是在浪漫喜剧中训练的，另一个是在我的通用写作风格中训练的。所有微调场景的温度都是0.7，TopP也是0.7。
- en: You can see the writing samples on the “AI Fiction Mastery Supplemental Materials”
    Page [https://adorable-porcupine.super.site/ai-fiction-mastery-supplemental-material](https://adorable-porcupine.super.site/ai-fiction-mastery-supplemental-material)
    ⁠[3](#c349.xhtml#a43Z)
  id: totrans-2343
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在“AI小说精通补充材料”页面看到写作样本[https://adorable-porcupine.super.site/ai-fiction-mastery-supplemental-material](https://adorable-porcupine.super.site/ai-fiction-mastery-supplemental-material)
    [3](#c349.xhtml#a43Z)
- en: Everything is unedited and exactly what came out of the LLMs.
  id: totrans-2344
  prefs: []
  type: TYPE_NORMAL
  zh: 所有内容都是未经编辑的，完全来自LLM。
- en: ​[ ​45​ ]​
  id: totrans-2345
  prefs: []
  type: TYPE_NORMAL
  zh: '[45]'
- en: 'SAMPLE AI WRITING - EXCERPT FROM SIT, STAY, HEEL: TRAINING YOUR BOYFRIEND LIKE
    A PRO'
  id: totrans-2346
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 样本AI写作 - 来自《坐下，别动，跟紧：像专业人士一样训练你的男朋友》的摘录
- en: UNEDITED - From Claude 3.0 - Sonnet 2024-03-27 05:49:51.869757
  id: totrans-2347
  prefs: []
  type: TYPE_NORMAL
  zh: 未经编辑 - 来自Claude 3.0 - Sonnet 2024-03-27 05:49:51.869757
- en: 'Here is Chapter 9 - “Grooming and Hygiene: Keeping Your Boyfriend Clean and
    Presentable” in Penelope Paws’ voice, at around 3000 words:'
  id: totrans-2348
  prefs: []
  type: TYPE_NORMAL
  zh: 这是第9章“造型和卫生：保持你的男朋友干净和得体”，以Penelope Paws的口吻，大约3000字：
- en: 'Grooming and Hygiene: Keeping Your Boyfriend Clean and Presentable'
  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: 造型和卫生：保持你的男朋友干净和得体
- en: Ooh, this is going to be a fun one, friends! As we all know, a well-trained
    boyfriend is a presentable boyfriend. And there’s no better way to ensure your
    man looks pawfect than by giving him a complete grooming makeover. I’m talking
    a full overhaul – new wardrobe, trendy haircut, and an upgraded skincare routine
    that will have him glowing brighter than a show poodle at Westminster.
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，这将会很有趣，朋友们！正如我们所知，一个受过良好训练的男朋友是一个得体的男朋友。确保你的男人看起来完美无瑕的最佳方式就是给他一个完整的造型改造。我说的就是全面翻新——新衣服、时尚的发型，以及升级的护肤程序，这将让他比在威斯敏斯特展出的展示贵宾犬还要闪耀。
- en: 'Now, I know what you’re thinking: “But Penelope, isn’t that kind of…I don’t
    know…controlling?” To which I say, pish posh! This isn’t about molding your boyfriend
    into someone he’s not. It’s about bringing out his inner alpha dog and helping
    him put his best paw forward.'
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我知道你在想什么：“但是佩内洛普，这不是有点……我不知道……控制欲强吗？”对此我说，胡说！这并不是关于把你男朋友塑造成他不是的人。这是关于挖掘他内心的雄性本能，并帮助他展现出最好的自己。
- en: “You keep telling yourself that, Pen,” Mr. Snuffles chimes in, puffing away
    on his toy cigar. “We both know this is just another one of your harebrained schemes
    to play master groomer.”
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
  zh: “你继续这样告诉自己吧，Pen，”Snuffles先生插话道，一边抽着他的玩具雪茄。“我们都知道这又是你那些异想天开的计划之一，想要成为主造型师。”
- en: Oh hush, you snarky little fuzzball. What do you know about cultivating a refined
    yet approachable look? With a few strategic snips and some product, we’ll have
    Max looking like a rugged yet refined model, ready to strut down the catwalk of
    life!
  id: totrans-2353
  prefs: []
  type: TYPE_NORMAL
  zh: 嘘，你这个爱挖苦的小毛球。你对培养既精致又平易近人的外观了解多少？通过一些战略性的剪裁和一些产品，我们将让Max看起来像是一个粗犷而精致的模特，准备好在生活的T台上大步前行！
- en: I declare this with all the determination of a samurai warrior, wielding my
    fabric shears like a sacred sword. Mr. Snuffles simply snorts and mutters something
    about me turning Max into a “poodle-headed Casanova” when he should be embracing
    his natural “inner mutt.”
  id: totrans-2354
  prefs: []
  type: TYPE_NORMAL
  zh: 我以武士般的决心宣布，手持我的剪刀，就像一把神圣的剑。Snuffles先生只是哼了一声，嘟囔着一些关于我应该让Max成为“卷毛卡萨诺瓦”而不是拥抱他自然“内在的野性”的话。
- en: Ignoring his jabs, I set my plan into motion…
  id: totrans-2355
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略了他的挖苦，我开始了我的计划……
- en: Step 1) The Wardrobe Upgrade
  id: totrans-2356
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步）服装升级
- en: The first stop on our makeover mission? The mall, of course! There’s no better
    way to revamp a guy’s look than with some fresh, stylish threads. So I grabbed
    Max by the hand (well, tried to – he kept pulling away like I was dragging him
    to obedience school) and marched him straight to the trendiest menswear boutique
    in town.
  id: totrans-2357
  prefs: []
  type: TYPE_NORMAL
  zh: 我们改造之旅的第一站？当然是商场！没有什么比一些新鲜、时尚的衣服更能改变一个男人的形象了。所以我抓住Max的手（好吧，我尽力了——他一直像是在被我拖去服从学校一样挣扎）直接带他去镇上最时髦的男士服装精品店。
- en: “Pen, I don’t know about this…” Max mumbles, eyeing the racks of slim-fit pants
    and crisp button-downs with trepidation. “Can’t I just wear my old t-shirts and
    jeans?”
  id: totrans-2358
  prefs: []
  type: TYPE_NORMAL
  zh: “Pen，我不知道这个……”Max咕哝着，带着恐惧的眼神看着那些紧身裤和整洁的衬衫架。“我难道不能只穿我的旧T恤和牛仔裤吗？”
- en: “Nonsense, my scruffily-dressed stud muffin!” I trill, holding up a sleek blazer
    that screams ‘sophisticated yet approachable.’ “We’re going to transform you into
    an absolute heartthrob. The ladies won’t be able to resist your dapper new look!”
  id: totrans-2359
  prefs: []
  type: TYPE_NORMAL
  zh: “胡说，我的穿着邋遢的帅小伙！”我娇声说道，举起一件时髦的夹克，那件夹克仿佛在喊：“既复杂又平易近人。” “我们要把你变成一个绝对的心动对象。女士们将无法抗拒你新潮的帅气外表！”
- en: 'Max tugs at the collar, grimacing. I can already see the doubt flickering in
    those puppy dog eyes of his. But never fear – that’s where positive reinforcement
    comes in! After piling his arms high with potential outfits, I lead him to the
    dressing room and dangle the greatest motivator of all in front of his nose: treats!'
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
  zh: Max扯着领口，皱着眉头。我已能预见他那小狗般的眼神中闪烁的怀疑。但别担心——这正是正面强化的地方！在把他手臂堆满可能的服装后，我带他到试衣间，把所有动机中最强大的东西放在他鼻子前：零食！
- en: “For every ensemble you try on, you get one of these tasty liver snaps,” I coax,
    giving the bag an enticing shake.
  id: totrans-2361
  prefs: []
  type: TYPE_NORMAL
  zh: “每试穿一套服装，你就能得到这些美味的肝片，”我诱惑道，一边摇着袋子，使其更具吸引力。
- en: Three hours and seventeen outfits later, Max is practically swimming in a sea
    of designer duds. Shirt collars dangle askew, pants puddle around his ankles,
    and I’m pretty sure that jaunty fedora ended up backwards at some point. But hey,
    at least he got a good protein boost!
  id: totrans-2362
  prefs: []
  type: TYPE_NORMAL
  zh: 三小时十七套服装之后，Max几乎在设计师服装的海洋中游泳。衬衫领口歪斜，裤子在脚踝周围打褶，我敢肯定那顶活泼的礼帽在某处时被戴反了。但嘿，至少他得到了很好的蛋白质补充！
- en: “Well, don’t you two look like you just survived a hurricane in a Banana Republic?”
    Mr. Snuffles drawls from his perch atop a clothing rack, surveying the chaos.
  id: totrans-2363
  prefs: []
  type: TYPE_NORMAL
  zh: “哎呀，你们俩看起来像是刚刚在Banana Republic经历了一场飓风吗？”Snuffles先生从衣架上俯瞰着混乱的场景，慢条斯理地说道。
- en: I simply beam at my disheveled but debonair boyfriend. “Don’t you worry, Mr.
    Skeptical Snuffles – this is all just a trial run. Once we narrow down the options,
    Max is going to be the best-dressed pup on the block!”
  id: totrans-2364
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是对着我那凌乱但英俊的男朋友微笑。“别担心，Mr. Skeptical Snuffles——这只是一个试运行。一旦我们缩小了选择范围，Max将成为街区最时髦的狗狗！”
- en: Step 2) The “Haircut of Horrors”
  id: totrans-2365
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步）恐怖的发型
- en: 'With Max’s new wardrobe hanging neatly in his closet (it took some…persuasion…but
    we got there), it’s time to move on to the next phase of Operation Dapper Boyfriend:
    the haircut!'
  id: totrans-2366
  prefs: []
  type: TYPE_NORMAL
  zh: 在Max的新衣服整齐地挂在衣柜里（这需要一些……说服……但我们做到了）之后，是时候进入Operation Dapper Boyfriend的下一阶段：理发！
- en: Now, I’ll admit, this one might have been a bit ambitious. In my mind, I envisioned
    Max with a stylishly tousled look – maybe a little messy but in that “I just rolled
    out of bed after a night of passionate lovemaking” kind of way. You know, the
    kind of hairstyle that makes you want to run your fingers through it and…
  id: totrans-2367
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我必须承认，这可能有点雄心勃勃。在我心中，我设想马克斯将拥有一个时髦的凌乱发型——可能有点凌乱，但那种“我刚刚在激情四溢的一夜之后从床上滚下来”的感觉。你知道的，那种让你想用手梳理的发型……
- en: Ahem. Getting a bit carried away there. The point is, I had grand visions of
    Max with a modern, sexy ’do that would perfectly complement his new designer getups.
    So I booked us an appointment at the hippest salon in town and practically dragged
    my protesting boyfriend through the doors.
  id: totrans-2368
  prefs: []
  type: TYPE_NORMAL
  zh: 哼。有点夸张了。重点是，我有一个宏伟的愿景，马克斯将拥有一个现代、性感的发型，这将完美地衬托他新设计的服装。所以我为我们预约了城里最时髦的沙龙，几乎把我抗议的男朋友拖进了门。
- en: “I like my hair the way it is, Pen,” he tried to reason as we settled into the
    waiting area. “It’s low-maintenance, you know?”
  id: totrans-2369
  prefs: []
  type: TYPE_NORMAL
  zh: “我喜欢我的头发现在这个样子，佩恩，”当我们坐进候诊区时，他试图解释。“你知道的，它不需要太多打理？”
- en: “Psh, where’s the fun in that?” I scoffed, thumbing through a stack of hairstyle
    magazines. “With just a little product and a daring new cut, we’ll have your luscious
    locks turning heads all over town!”
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: “呸，那样有什么乐趣？”我嘲笑道，翻阅着一堆发型杂志。“只要一点产品和一个大胆的新剪裁，我们就能让你的浓密头发让全城的目光都转向你！”
- en: Mr. Snuffles snickered at that, mumbling something about turning Max’s head
    into a “glorified toilet brush.” But I was too preoccupied studying photos of
    debonair gentlemen with expertly quaffed coifs to pay him any mind.
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 斯诺夫斯先生对此嗤之以鼻，嘟囔着要把马克斯的头变成一个“荣耀的厕所刷子”。但我太专注于研究那些穿着考究、发型精致的绅士的照片，以至于没有理睬他。
- en: When our stylist finally called us back, I presented her with my grand vision…and
    that’s where everything went terribly, horribly awry.
  id: totrans-2372
  prefs: []
  type: TYPE_NORMAL
  zh: '当我们的美发师终于叫我们回去时，我把我的宏伟愿景展示给她……然后一切就变得非常糟糕。 '
- en: “So, you’re envisioning something along the lines of a textured pompadour? Maybe
    with some long, face-framing layers for movement?” she asked, deftly running a
    comb through Max’s shaggy mane.
  id: totrans-2373
  prefs: []
  type: TYPE_NORMAL
  zh: “所以，你想象的是一种类似纹理蓬松头发的样子？也许有一些长而修饰脸部的层次，以增加动感？”她灵巧地用梳子梳理着马克斯蓬乱的头发。
- en: “Exactly!” I exclaimed, clapping my hands together. “A little bit of roguish
    charm, a touch of modern sophistication. Just think ‘James Dean meets Ryan Gosling’
    and you’ve got the general vibe.”
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: “正是！”我兴奋地拍着手。“一点放荡不羁的魅力，一点现代的精致。只要想象一下‘詹姆斯·迪恩遇见莱恩·高斯林’，你就有了大致的感觉。”
- en: Famous last words, my friends. Because two hours later, Max emerged from that
    salon chair looking like…well, like a bedraggled, overgrown poodle.
  id: totrans-2375
  prefs: []
  type: TYPE_NORMAL
  zh: 朋友们，这是最后的遗言。因为两小时后，马克斯从沙龙的椅子上出来，看起来……嗯，就像一只湿漉漉、长得过分的贵宾犬。
- en: “Oh. My. Doggy bags,” I gasped, hands flying to my mouth as he shuffled out
    with his head hanging low. “Maxwell Rover, what in the breed name did they do
    to you?!”
  id: totrans-2376
  prefs: []
  type: TYPE_NORMAL
  zh: “哦。我的狗粮袋，”我惊叫道，双手飞快地捂住嘴巴，当他低垂着头拖着脚步出来时。“马克斯·罗弗，他们到底对你做了什么？！”
- en: The stylist had taken my vague instructions for “messy yet stylish” and run
    wild, leaving Max with an unfortunate hybrid of a mullet and a full-body shave.
    The top was a wild tangle of choppy layers that stuck out in frazzled tufts, while
    the sides were practically sheared down to the skin. My boyfriend looked like
    a sheepdog that had gotten into a nasty fight with a lawnmower!
  id: totrans-2377
  prefs: []
  type: TYPE_NORMAL
  zh: 美发师根据我模糊的“凌乱但时尚”的要求，随心所欲地剪裁，让马克斯变成了一个不幸的混合体，既像莫霍克发型又像全身剃须。顶部是一团乱糟糟的层次剪裁，像一团蓬乱的毛发一样突出，而两侧几乎被剃到了皮肤。我的男朋友看起来像一只与割草机打了一架的牧羊犬！
- en: “I tried to warn you, Penelope,” Mr. Snuffles tutted, sauntering over to inspect
    the damage. “But noooo, you just had to go sticking your well-meaning snout where
    it didn’t belong. Now your poor boyfriend looks like a reject from the Crufts
    Dog Show.”
  id: totrans-2378
  prefs: []
  type: TYPE_NORMAL
  zh: “我试图警告你，佩内洛普，”斯诺夫斯先生叹了口气，大摇大摆地走过来检查损坏情况。“但不是的，你偏要伸长你的好意鼻子到不属于你的地方。现在你的可怜男朋友看起来像是从克鲁茨犬展中被淘汰的。”
- en: Ignoring his snide remarks (though I had to admit they stung with brutal accuracy),
    I turned to Max with the most apologetic expression I could muster.
  id: totrans-2379
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略了他的刻薄评论（尽管我必须承认它们刺痛了我，而且非常准确），我带着我能表现出的最抱歉的表情转向马克斯。
- en: “Oh sweetheart, I am so, so sorry,” I cooed, gently petting his threadbare head.
    “This is…well, it’s certainly a look, that’s for sure! But don’t worry, we’ll
    get it fixed. I promise.”
  id: totrans-2380
  prefs: []
  type: TYPE_NORMAL
  zh: “哦，亲爱的，我真的很抱歉，”我轻声说道，轻轻地抚摸着他的破旧头部。“这……嗯，确实是个样子，这是肯定的！但别担心，我们会把它修好的。我保证。”
- en: Max simply sighed and gave me a weary smile, his eyes silently pleading for
    this makeover madness to be over.
  id: totrans-2381
  prefs: []
  type: TYPE_NORMAL
  zh: 马克斯只是叹了口气，给了我一个疲惫的微笑，他的眼睛默默地祈求这次改造的疯狂能够结束。
- en: Step 3) The Skincare Snafu
  id: totrans-2382
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步）护肤混乱
- en: You’d think after the haircut debacle, I would have learned my lesson about
    pushing my beautification agenda too far. But folks, when you’re a determined
    dogmama like me, you don’t just roll over and play dead at the first sign of chaos!
    No, you shake it off, re-fluff your fur, and forge ahead with that same boundless
    enthusiasm.
  id: totrans-2383
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想，在剪发灾难之后，我应该已经吸取了教训，不再过分推进我的美容计划。但朋友们，当你像我一样是一个坚定的教条母亲时，你不会在混乱的第一迹象下就屈服和装死！不，你会抖掉它，重新梳理你的毛发，带着同样的无限热情继续前进。
- en: Which is precisely what I did as soon as Max’s traumatized tresses had grown
    out enough to be presentable again. This time, I decided to take a more…subtle
    approach to enhancing his natural assets. A skincare routine was just the ticket
    – a few targeted products to bring out his inner glow and have him looking refreshed,
    revitalized, and ready to take on the world!
  id: totrans-2384
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是我做的，当马克斯的受创伤的毛发长到足以再次体面地出现时。这次，我决定采取一种更……微妙的方法来增强他的自然优势。一套护肤程序正是我所需要的——一些针对性的产品来展现他的内在光彩，让他看起来焕然一新，充满活力，准备好迎接世界！
- en: “You cannot be serious,” Mr. Snuffles deadpanned when I unveiled my latest scheme
    over breakfast one morning. “First the clothes, then that haircut atrocity, and
    now you want to douse the poor sap in overpriced face gunk?”
  id: totrans-2385
  prefs: []
  type: TYPE_NORMAL
  zh: “你不会是认真的吧，”斯诺夫斯先生在一天早上早餐时一本正经地说，“先是衣服，然后是那个剪发的灾难，现在你想要把那个可怜的家伙浸泡在昂贵的面霜里？”
- en: I simply waved off his cynicism with a breezy trill. “Don’t be so dramatic,
    Snuffles! A little gentle exfoliation and some light moisturizing is hardly going
    to do Max any harm. In fact, I’ll bet he’ll love how smooth and radiant his skin
    feels afterwards!”
  id: totrans-2386
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是轻蔑地挥了挥手，发出轻松的尖叫声。“别这么戏剧化，斯诺夫斯！一点温和的去角质和一些轻微的保湿几乎不会对马克斯造成任何伤害。事实上，我敢打赌他会在之后喜欢他皮肤光滑和发光的感觉！”
- en: Max, bless his easygoing heart, just shrugged and smiled at me over his coffee
    mug. “If it makes you happy, babe, I’m game to try it.”
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: 马克斯，愿他随和的心地得到祝福，只是耸了耸肩，对着他的咖啡杯对我微笑。“宝贝，如果你开心，我愿意尝试。”
- en: Famous last words, am I right? Because oh boy, did that skincare experiment
    go haywire in a hurry!
  id: totrans-2388
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一句话，对吧？因为哦，天哪，那个护肤实验很快就出了问题！
- en: Our first attempt at a full facial regimen started out innocently enough. I
    laid out all my top-of-the-line products with the precision of a professional
    dog groomer – a luxurious cream cleanser, a gentle exfoliating scrub, a nutrient-rich
    mud mask, and a silky moisturizer to lock in all that hydrated goodness.
  id: totrans-2389
  prefs: []
  type: TYPE_NORMAL
  zh: 我们第一次尝试完整的面部护理程序开始得很简单。我像专业宠物美容师一样精确地摆放了我所有的顶级产品——一瓶奢华的清洁霜，一种温和的去角质磨砂膏，一种富含营养的泥面膜，以及一种丝滑的保湿霜，以锁住所有这些保湿的好处。
- en: “Okay Max, just sit back and relax while I work my magic,” I instructed, rubbing
    my hands together in eager anticipation. “This is going to make your skin glow
    like a freshly-polished trophy!”
  id: totrans-2390
  prefs: []
  type: TYPE_NORMAL
  zh: “好吧，马克斯，就坐下来放松，让我施展我的魔法，”我一边兴奋地搓着手一边指示。“这将让你的皮肤像新抛光的奖杯一样发光！”
- en: Max obediently closed his eyes as I slathered on the first layer of cleanser,
    gently massaging the creamy lather into his cheeks and forehead. So far, so good!
    That is, until I moved on to the exfoliating scrub…
  id: totrans-2391
  prefs: []
  type: TYPE_NORMAL
  zh: 当我涂抹第一层清洁剂时，马克斯顺从地闭上了眼睛，我轻轻地按摩着奶油泡沫在他的脸颊和前额上。到目前为止，一切顺利！也就是说，直到我转向去角质磨砂膏……
- en: “Gah! Pen, what is this stuff?” Max yelped, eyes flying open as the granular
    mixture made contact with his tender skin. “It feels like I’ve got a cheese grater
    being rubbed all over my face!”
  id: totrans-2392
  prefs: []
  type: TYPE_NORMAL
  zh: “哎呀！笔，这是什么东西？”马克斯尖叫着，眼睛瞪得大大的，当颗粒状混合物接触到他那脆弱的皮肤时。“感觉就像我在脸上擦了一层奶酪磨刀！”
- en: I tried to sooth him, assuring him that a little gentle buffing was key to sloughing
    off dead skin cells and achieving that coveted radiance. But Max would have none
    of it, frantically pawing at his face in an attempt to wipe away the scratchy
    serum.
  id: totrans-2393
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图安慰他，向他保证轻微的打磨是去除死皮细胞并实现那种渴望的光泽的关键。但马克斯对此不感兴趣，他疯狂地用爪子拍打自己的脸，试图擦掉那刺痒的精华液。
- en: Before I knew it, there were flecks of scrub flung in every direction – coating
    the bathroom counter, speckling the mirror, and even catching me square in the
    eye at one point. Mr. Snuffles wisely retreated to a safe vantage point atop the
    toilet tank, watching the chaos unfold with a bemused shake of his fuzzy head.
  id: totrans-2394
  prefs: []
  type: TYPE_NORMAL
  zh: 不知不觉间，磨砂膏的碎片四处飞溅——覆盖了浴室的台面，溅到了镜子上，甚至有一次直接溅到了我的眼睛上。Mr. Snuffles明智地退到了马桶水箱上方的安全位置，带着一头毛茸茸的头好奇地观察着混乱的发生。
- en: “Seriously, Pen? You’re going to douse him in goop and expect him to just sit
    there and take it?” the snarky pup chided as Max bolted from the room, his entire
    face tinged an angry pink from the vigorous scrubbing. “He’s a boyfriend, not
    a poodle at the groomer’s.”
  id: totrans-2395
  prefs: []
  type: TYPE_NORMAL
  zh: “真的，Pen？你要把他浸泡在黏糊糊的东西里，然后期待他坐那里接受？”那个爱挖苦的小家伙一边说，一边看着Max从房间里冲出去，整个脸因为激烈的磨砂而变成了愤怒的粉红色。“他是个男朋友，不是美容师那里的贵宾犬。”
- en: I’ll admit, at that moment my confidence wavered a bit. But I wasn’t about to
    let one minor skincare skirmish derail the entire operation! So after giving Max
    some space to recover (and maybe indulging in a consolation snack or two), I decided
    to switch tactics.
  id: totrans-2396
  prefs: []
  type: TYPE_NORMAL
  zh: 我得承认，那一刻我的信心有点动摇。但我绝不可能让一场小小的护肤小冲突破坏整个计划！所以，在给Max一些恢复的空间（也许还会享受一些安慰零食），我决定改变策略。
- en: Rather than go for a full-on spa treatment, I’d start slow and ease him into
    a simplified routine, one gentle product at a time. A basic moisturizer was the
    perfect gateway – just a pea-sized amount to hydrate and rejuvenate his handsome
    mug. No harsh scrubs, no overpowering scents, just a straightforward cream to
    nourish and soften.
  id: totrans-2397
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会一开始就进行全套水疗，而是会慢慢来，让他逐渐适应简化后的程序，一次只使用一种温和的产品。一款基本的保湿霜是完美的入门产品——只需豌豆大小，就能滋润并恢复他英俊的面容。没有粗糙的磨砂膏，没有压倒性的香味，只有一种简单的乳霜来滋养和软化。
- en: I should have known that even this stripped-down regimen wouldn’t go smoothly.
  id: totrans-2398
  prefs: []
  type: TYPE_NORMAL
  zh: 我本应该知道，即使这个简化后的程序也不会顺利。
- en: The first few nights were…well, let’s just say Max wasn’t quite accustomed to
    my nightly moisturizing ritual. More than once, I found myself chasing him around
    the apartment, moisturizer bottle in hand, pleading with him to let me work my
    magic.
  id: totrans-2399
  prefs: []
  type: TYPE_NORMAL
  zh: 前几个晚上……好吧，让我们说Max并不完全习惯我的夜间保湿仪式。不止一次，我发现自己拿着保湿霜在公寓里追着他跑，恳求他让我施展魔法。
- en: “Max, honey, where are you? It’s time for your hydrating treatment!” I’d coo,
    squeezing out a dollop of the rich, fragrant cream. “This is going to make your
    skin feel like pure velvet, I promise!”
  id: totrans-2400
  prefs: []
  type: TYPE_NORMAL
  zh: “Max，亲爱的，你在哪里？是时候进行你的保湿治疗了！”我会轻声说，挤出一些丰富、芳香的乳霜。“这会让你的皮肤感觉像纯丝绒，我保证！”
- en: His muffled response usually came from whatever closet or cabinet he’d tucked
    himself into that day.
  id: totrans-2401
  prefs: []
  type: TYPE_NORMAL
  zh: 他的回应通常是从他那天藏身的某个壁橱或柜子里传来的。
- en: “No way, Pen! I’m not falling for your beauty trap again. You’ll just try to
    smother me in another one of your smelly face potions!”
  id: totrans-2402
  prefs: []
  type: TYPE_NORMAL
  zh: “绝不，Pen！我不会再次落入你的美丽陷阱。你只会试图用你那些臭烘烘的面部精华把我淹没！”
- en: Meanwhile, Mr. Snuffles would be parked on the couch, gleefully watching the
    chase unfold as I scurried from room to room in pursuit of my moisturizer-averse
    mate.
  id: totrans-2403
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，Mr. Snuffles会坐在沙发上，高兴地看着追逐展开，我则从房间到房间地追赶那个讨厌保湿霜的伴侣。
- en: “I give it five minutes before he’s barricaded himself in the bathroom and you’re
    begging him to come out,” he’d taunt between bites of his chewy treat. “You know,
    for a ‘dog trainer,’ you sure are terrible at reading body language.”
  id: totrans-2404
  prefs: []
  type: TYPE_NORMAL
  zh: “我给他五分钟时间，然后他会把自己锁在浴室里，你会求他出来的，”他一边咬着粘牙的零食，一边嘲笑。“你知道，作为一个‘狗训练师’，你在解读肢体语言方面真的很糟糕。”
- en: Eventually, I’d manage to corner Max and quickly dab on a thin veil of moisturizer
    before he could wriggle free and disappear into another hidey-hole. All the while,
    I’d keep up a soothing stream of praise and encouragement, like I was calming
    a skittish puppy.
  id: totrans-2405
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我会设法把Max逼到角落，在他能够挣脱并消失到另一个藏身之处之前，迅速给他涂上一层薄薄的保湿霜。同时，我会不停地表扬和鼓励，就像在安抚一只胆小的狗。
- en: “There now, that’s not so bad, is it?” I’d croon, gently smoothing the cream
    along the apples of his cheeks. “You’re going to have the most lusciously hydrated
    skin on the block, my little stubble muffin!”
  id: totrans-2406
  prefs: []
  type: TYPE_NORMAL
  zh: “现在，这不算太糟糕，对吧？”我会轻声哼唱，轻轻地抹上乳霜在他的脸颊上。“你将拥有街区上最滋润的皮肤，我的小胡茬面包！”
- en: Max would just sigh and shake his head at me, resigning himself to being my
    perpetual makeover project. But hey, at least his complexion was looking more
    radiant by the day!
  id: totrans-2407
  prefs: []
  type: TYPE_NORMAL
  zh: Max只是对我叹了口气，摇了摇头，接受了自己成为我永久的美容项目的命运。但嘿，至少他的肤色每天看起来都更加光彩照人！
- en: 'The Takeaway: Embrace the Flaws, Warts and All'
  id: totrans-2408
  prefs: []
  type: TYPE_NORMAL
  zh: 吸取的教训：接受缺点，包括瑕疵在内
- en: So in the end, did Operation Dapper Boyfriend turn out to be the glamorous transformation
    I’d envisioned? Well…not quite. Despite my best efforts (and the occasional grooming-induced
    meltdown), Max emerged from this experience more or less the same lovably low-maintenance
    guy I’d fallen for in the first place.
  id: totrans-2409
  prefs: []
  type: TYPE_NORMAL
  zh: 所以最终，Dapper Boyfriend行动是否变成了我预想的那个迷人的转变呢？嗯……并不完全是。尽管我尽了最大努力（以及偶尔因为梳理引起的崩溃），Max从这次经历中走出来的样子，基本上还是那个我最初就喜欢上的可爱、低维护的男孩。
- en: Sure, his closet was a bit more stocked with fashion-forward apparel (most of
    which remained firmly on its hangers). And yes, he did develop a basic skincare
    routine of cleansing and moisturizing (though anything beyond that still made
    him squirm). But at his core, he was still my sweet, easygoing, comfortably rumpled
    Maxwell.
  id: totrans-2410
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，他的衣柜里确实多了很多时尚前卫的服装（大多数都还牢牢地挂在衣架上）。而且，他确实建立了一套基本的护肤程序，包括清洁和保湿（尽管任何超出这个范围的事情都会让他感到不舒服）。但他的本质，仍然是我那甜美的、随和的、舒适地皱巴巴的Maxwell。
- en: 'As Mr. Snuffles so inelegantly put it: “I told you all along the man was happy
    just being his natural, scruffy self. But you simply had to go sticking your well-meaning
    snout where it didn’t belong.”'
  id: totrans-2411
  prefs: []
  type: TYPE_NORMAL
  zh: 就像Snuffles先生那样不优雅地说：“我早就告诉你，那个男人只要保持他自然、蓬乱的自我就足够快乐了。但你却非得把你的好意伸到不属于你的地方。”
- en: You know what? For once, I can’t even argue with the snarky mutt’s sass-laden
    barbs. Because at the end of the day, he was absolutely right. My relentless pursuit
    of “refinement” was really just a misguided attempt to mold Max into some idealized
    version of boyfriend perfection.
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道吗？这一次，我甚至不能与那个刻薄的狗争论。因为最终，他绝对是正确的。我无休止地追求“精致”其实只是错误地试图将Max塑造成某种理想化的男朋友完美形象。
- en: But true perfection, I’ve come to realize, has nothing to do with designer clothes
    or fabulously coiffed hair or expertly moisturized skin. No, true perfection lies
    in the quirks, the flaws, the endearing little idiosyncrasies that make someone
    uniquely, unapologetically them.
  id: totrans-2413
  prefs: []
  type: TYPE_NORMAL
  zh: 但我意识到，真正的完美与设计师的衣服、令人惊叹的发型或专家级保湿的皮肤无关。不，真正的完美在于那些使一个人独一无二、无需道歉的小怪癖、缺点和可爱的小怪癖。
- en: For Max, that meant rocking his signature tousled bedhead and slightly fraying
    graphic tees. It meant feeling most himself in a worn pair of jeans, not a sleek
    suit from the menswear department. And it meant accepting his boyfriend just the
    way he was – a lovable, low-maintenance goofball who didn’t need any grand makeover
    to be wonderful in my eyes.
  id: totrans-2414
  prefs: []
  type: TYPE_NORMAL
  zh: 对Max来说，这意味着保持他标志性的蓬乱的床头发型和略微磨损的图形T恤。这意味着他最喜欢穿着一条破旧的牛仔裤，而不是男装部门的时髦西装。这意味着接受他的男朋友本来的样子——一个可爱、低维护的傻瓜，在我眼中不需要任何重大的改造就能变得很棒。
- en: 'So while this particular training endeavor may have been rife with chaos, mishaps,
    and way too many up-close encounters with potent skincare products, it ultimately
    taught me a valuable lesson: The secret to true happiness in a relationship isn’t
    about changing your partner or forcing them into your vision of perfection. It’s
    about celebrating the unique bundle of quirks and qualities that make them who
    they are – cozy imperfections, adorable flaws, and all.'
  id: totrans-2415
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，尽管这次特定的训练尝试充满了混乱、意外和与强力护肤产品近距离接触的次数过多，但它最终教会了我一个宝贵的教训：在一段关系中实现真正幸福的秘诀不在于改变你的伴侣或强迫他们进入你的完美愿景。而是庆祝那些使他们成为他们自己的独特特质和品质——舒适的瑕疵、可爱的缺点，以及所有的一切。
- en: “You mean to tell me that after all the grooming trauma you just put that poor
    guy through, the big lesson here is to love him for his innate doggish ways?”
    Mr. Snuffles arches one fuzzy eyebrow at me over the rim of his cigar. “Well,
    bravo Penelope. It only took an exploded facial routine and a disastrous haircut
    to learn that simple truth.”
  id: totrans-2416
  prefs: []
  type: TYPE_NORMAL
  zh: “你是想告诉我，在你刚刚让那个可怜的家伙经历的所有梳理的痛苦之后，这里最大的教训就是要爱他的天生的狗性？”Snuffles先生用他那模糊的眉毛挑起一边，透过雪茄的边缘看着我。“嗯，好极了，佩内洛普。只花了爆炸性的面部护理和一次灾难性的理发，你就学到了这个简单的真理。”
- en: I can’t even be mad at his sarcastic jibes this time, though. Not when Max chooses
    that very moment to wander in, his shaggy hair gloriously tousled and his soft
    old t-shirt hanging perfectly rumpled from our earlier cuddle session on the couch.
  id: totrans-2417
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我甚至不能对他的讽刺挖苦生气。当Max选择在那个时刻走进来时，他那蓬乱的头发被愉快地弄乱，他那柔软的旧T恤从我们之前在沙发上拥抱的场合完美地皱着。
- en: “There’s my ruggedly handsome boyfriend,” I sigh contentedly, pulling him in
    for a warm embrace and burying my face in the comforting, familiar scent of his
    worn cotton tee.
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: “这就是我那英俊粗犷的男朋友，”我满意地叹了口气，把他拉进怀里，把脸埋在他那熟悉、舒适的旧棉T恤的气味里。
- en: Max just chuckles and drops a kiss on the top of my head. “You know you wouldn’t
    have me any other way, Pen.”
  id: totrans-2419
  prefs: []
  type: TYPE_NORMAL
  zh: Max只是笑了笑，在我头顶上亲了一下。“你知道你不会以任何其他方式拥有我，Pen。”
- en: He’s absolutely right.
  id: totrans-2420
  prefs: []
  type: TYPE_NORMAL
  zh: 他绝对是对的。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-2421
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: This is close to the final chapter, but not entirely because I edited it. However,
    I thought the writing was good enough that the edits were minimal. There was a
    lot of megaprompting, including scene brief and writing style, that went into
    the AI, but overall, I like Sonnet’s voice and ability to “create.”
  id: totrans-2422
  prefs: []
  type: TYPE_NORMAL
  zh: 这几乎是最后的章节，但并非完全如此，因为我对它进行了编辑。然而，我认为写作已经足够好，以至于编辑很少。AI中投入了大量的megaprompting，包括场景简报和写作风格，但我总体上喜欢Sonnet的声音和“创造”能力。
- en: 'End of Excerpt: to read more please find Sit, Stay, Heel: Training Your Boyfriend
    Like a Pro at [https://books2read.com/sitstayheel](https://books2read.com/sitstayheel)
    ⁠[1](#c349.xhtml#a41S)'
  id: totrans-2423
  prefs: []
  type: TYPE_NORMAL
  zh: 摘录结束：想了解更多，请访问[https://books2read.com/sitstayheel](https://books2read.com/sitstayheel)
    [1](#c349.xhtml#a41S)
