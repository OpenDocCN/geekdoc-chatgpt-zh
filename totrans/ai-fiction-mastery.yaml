- en: AI RESOURCES FOR WRITERS
  id: totrans-296
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为作家提供的 AI 资源
- en: Since I encourage you to try out the tools and methods I discuss actively, let
    me introduce the ones I’m familiar with. Of course, you are not limited to this
    list, and with the warp speed that AI is developing, new ones will soon appear.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我鼓励你积极尝试我讨论的工具和方法，让我介绍一下我熟悉的那些。当然，你不必局限于这个列表，并且随着 AI 以光速发展，新的工具和方法很快就会出现。
- en: Tools
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 工具
- en: '1\. [OpenAI ChatGPT](https://chat.openai.com/) ⁠[1](#c349.xhtml#a40U) This
    is the granddaddy of all AI chatbots because it is my first experience with AI.
    ChatGPT is my go-to AI buddy trained on everything its creators could get their
    hands on: public domain text, internet archives, fan fiction, chatrooms, tons
    of code and formulas, and more. It was an experimental generative AI tool made
    for research purposes, and hence, the training can seem haphazard. It is the jack-of-all-trades
    chatbot based on OpenAI’s generations of GPT LLMs.'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. [OpenAI ChatGPT](https://chat.openai.com/) [1](#c349.xhtml#a40U) 这是所有 AI
    聊天机器人的鼻祖，因为这是我第一次接触 AI。ChatGPT 是我的首选 AI 伙伴，它接受了其创作者所能接触到的所有内容的训练：公共领域文本、互联网档案、同人小说、聊天室、大量的代码和公式等等。它是一个用于研究目的的实验性生成
    AI 工具，因此，训练可能看起来有些随意。它是基于 OpenAI 多代 GPT LLM 的全能型聊天机器人。
- en: 2\. [OpenAI Playground](https://platform.openai.com/playground) ⁠[2](#c349.xhtml#a47F)
    and API. The playground is OpenAI’s developer’s interface, allowing them to try
    out prompts and responses without writing code. The playground will enable users
    to tweak parameters to adjust how the LLM responds to your prompt (input). You
    can try out various generations of GPTs with the Playground. OpenAI has also allowed
    users to fine-tune their models to produce outputs skewed in a particular fashion
    or style. This in itself is exciting to creative writers. It eliminates the “generic”
    sound of AI-generated text and allows authors to shape their voice and tone to
    write more like themselves.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. [OpenAI Playground](https://platform.openai.com/playground) [2](#c349.xhtml#a47F)
    和 API。Playground 是 OpenAI 的开发者界面，允许他们尝试提示和响应而不需要编写代码。Playground 将使用户能够调整参数以调整
    LLM 对你的提示（输入）的响应方式。你可以使用 Playground 尝试各种 GPT 的生成。OpenAI 还允许用户微调他们的模型以产生具有特定风格或风格的输出。这对创意作家来说本身就非常令人兴奋。它消除了
    AI 生成文本的“通用”声音，并允许作者塑造他们的声音和语气，以更接近自己的风格写作。
- en: 3\. [Anthropic](https://claude.ai/chats)’[s Claude](https://claude.ai/chats)
    ⁠[3](#c349.xhtml#a3VH) This LLM was developed by Anthropic, a different organization,
    and has its own characteristics. By happy accident, the fiction writers I know
    find Claude a “better writer.” Of course, this is highly subjective, and ChatGPT
    is still a favorite all-around brainstormer, idea generator, and structure generator;
    the feeling is that Claude writes better prose. However, Claude is also smart
    and good at analysis, and coders claim it is excellent at code generation. As
    you’ll see, any model’s responses are heavily influenced by your prompting.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. [Anthropic](https://claude.ai/chats) 的 [Claude](https://claude.ai/chats)
    [3](#c349.xhtml#a3VH) 这个 LLM 是由另一个组织 Anthropic 开发的，并且具有自己的特点。由于一个愉快的意外，我所知道的小说作家发现
    Claude 是一个“更好的作家”。当然，这非常主观，ChatGPT 仍然是全方面的头脑风暴者、想法生成者和结构生成者；感觉是 Claude 写的散文更好。然而，Claude
    也非常聪明，擅长分析，程序员声称它在代码生成方面非常出色。正如你将看到的，任何模型的响应都受到你的提示的影响很大。
- en: 4\. Claude API. As of March 2024, Anthropic opened the Claude API to every subscriber.
    Anthropic has its own Playground analogue called [Workbench](https://console.anthropic.com/workbench).
    ⁠[4](#c349.xhtml#a46A)
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. Claude API。截至 2024 年 3 月，Anthropic 向所有订阅者开放了 Claude API。Anthropic 有自己的 Playground
    类似物，称为 [Workbench](https://console.anthropic.com/workbench)。[4](#c349.xhtml#a46A)
- en: 5\. [Google Gemini LLM](https://gemini.google.com/app) ⁠[5](#c349.xhtml#a42V)
    Google is the search engine; hence, one of Gemini’s strengths is its ability to
    find reference material on the Internet. Currently, Google allows access to its
    Gemini Pro 1.5 model in the [Google AI Studio](https://aistudio.google.com/) ⁠[6](#c349.xhtml#a42W).
    This model has a large context window (1,000,000 tokens) and allows users to upload
    documents, images, and videos. After uploading, you can ask questions about the
    content, which is helpful for story creation and developmental editing.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 5\. [Google Gemini LLM](https://gemini.google.com/app) [5](#c349.xhtml#a42V)
    Google 是搜索引擎；因此，Gemini 的一个优势是它能够在网上找到参考资料。目前，Google 允许访问其 Gemini Pro 1.5 模型在 [Google
    AI Studio](https://aistudio.google.com/) [6](#c349.xhtml#a42W)。这个模型有一个很大的上下文窗口（1,000,000
    tokens），并允许用户上传文档、图片和视频。上传后，你可以就内容提出问题，这对故事创作和编辑发展很有帮助。
- en: '6\. [Sudowrite](https://www.sudowrite.com/) ⁠[7](#c349.xhtml#a42B) This comprehensive
    AI writing application wraps the underlying AI with a graphical user interface
    that provides step-by-step paths for story development and prose generation. There
    are other tools like Novelcrafter, but Sudowrite is the one I am familiar with.
    I detailed my use of Sudowrite in writing a complete novel in [An AI Author](http://books2read.com/anaiauthorsjournal)’[s
    Journal: From 0 to 70000 in 14 Days](http://books2read.com/anaiauthorsjournal).
    ⁠[8](#c349.xhtml#a42C)'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: '6. [Sudowrite](https://www.sudowrite.com/) [7](#c349.xhtml#a42B) 这是一个综合性的AI写作应用，它将底层AI封装在一个图形用户界面中，为故事发展和散文生成提供逐步路径。还有其他像Novelcrafter这样的工具，但我熟悉的是Sudowrite。我在[《AI作者》](http://books2read.com/anaiauthorsjournal)的日记中详细描述了使用Sudowrite创作一部完整小说的过程：从0到70000字，仅用14天。[An
    AI Author](http://books2read.com/anaiauthorsjournal)’[s Journal: From 0 to 70000
    in 14 Days](http://books2read.com/anaiauthorsjournal) [8](#c349.xhtml#a42C)'
- en: 7\. [Future Fiction Academy](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[9](#c349.xhtml#a48E) - [Rexy](https://rexy.futurefictionacademy.com/) ⁠[10](#c349.xhtml#a48F).
    Ah, how do I describe Rexy? It is a sequencing tool available to members of the
    Future Fiction Academy that is intermediate between a developer’s playground and
    a user-friendly application. It is the brainchild of the founders of Future Fiction
    Academy, Elizabeth Ann West, Stephanie Pajonas, and Leeland Atra, and one designed
    for writers to customize their AI prompts and responses. Rexy has a web-based
    graphical user interface that connects the user to a data store and their personal
    notion pages and then passes information along with user-defined prompts to the
    LLMs they support. It is transparent and allows users to pick and choose their
    AI model and parameters and customize the prompts to fit their workflow. The goal
    of the FFA is to push the envelope of using AI for fiction writing and provide
    accessibility to the latest AI methodology to the ordinary author. The Future
    Fiction Academy leads the research into using AI for fiction writing.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 7. [未来虚构学院](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    [9](#c349.xhtml#a48E) - [Rexy](https://rexy.futurefictionacademy.com/) [10](#c349.xhtml#a48F)。啊，我该如何描述Rexy呢？它是一个介于开发者游乐场和用户友好型应用之间的序列化工具，可供未来虚构学院的成员使用。它是未来虚构学院创始人伊丽莎白·安·韦斯特、斯蒂芬妮·帕约纳斯和利兰·阿特拉的创意结晶，专为作家定制AI提示和响应而设计。Rexy拥有基于网络的图形用户界面，将用户连接到数据存储库和他们的个人Notion页面，然后将用户定义的提示与信息一起传递给支持的LLM。它是透明的，允许用户挑选和选择他们的AI模型和参数，并定制提示以适应他们的工作流程。未来虚构学院的目标是推动AI在虚构写作中的应用，并为普通作者提供最新的AI方法论。未来虚构学院在AI在虚构写作中的应用研究中处于领先地位。
- en: 8\. Other “bring your own LLM API” tools include [Typing Mind](https://www.typingmind.com/)
    ⁠[11](#c349.xhtml#a3ZV), Rexy, and [Novelcrafter](https://www.novelcrafter.com/)
    ⁠[12](#c349.xhtml#a3ZX). While 2023 was the year of ChatGPT and kitchen sink LLMs,
    2024 is the proliferation of LLMs out of the wazoo. The [huggingface.co](http://huggingface.co)
    ⁠[13](#c349.xhtml#a3ZZ) community is an attempt to keep up with a catalog of LLMs.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 其他“自带 LLM API”的工具包括 [Typing Mind](https://www.typingmind.com/) [11](#c349.xhtml#a3ZV)、Rexy
    和 [Novelcrafter](https://www.novelcrafter.com/) [12](#c349.xhtml#a3ZX)。虽然2023年是ChatGPT和厨房水槽式LLM的年份，但2024年是LLM如雨后春笋般涌现的一年。[huggingface.co](http://huggingface.co)
    [13](#c349.xhtml#a3ZZ) 社区是试图跟上LLM目录的尝试。
- en: 9\. LLM Aggregators. Many places now offer ways for users to pay for API access
    to an LLM through aggregators like [Openrouter.ai Playground](https://openrouter.ai/playground)
    ⁠[14](#c349.xhtml#a3Z2), [Poe.com](http://Poe.com) ⁠[15](#c349.xhtml#a3Z3), or
    [Hugging Chat](https://huggingface.co/chat/) ⁠[16](#c349.xhtml#a3Z4). Users can
    select from the many LLMs offered, and the aggregator will pass on the payment.
    These include open-source LLMs and ones that are unfiltered, allowing violence
    and sex. The [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)’[s
    Rexy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw) supports
    all the LLMs included on [Openrouter.ai](https://openrouter.ai/) and even integrates
    with OpenAI’s fine-tuned models, thus allowing a high degree of customization.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 9. LLM聚合器。现在许多地方都提供通过聚合器如[Openrouter.ai Playground](https://openrouter.ai/playground)
    [14](#c349.xhtml#a3Z2)、[Poe.com](http://Poe.com) [15](#c349.xhtml#a3Z3) 或 [Hugging
    Chat](https://huggingface.co/chat/) [16](#c349.xhtml#a3Z4) 为用户提供支付API访问LLM的方式。用户可以从提供的许多LLM中选择，聚合器将转交支付。这些包括开源LLM和未经筛选的LLM，允许暴力和色情内容。[未来虚构学院](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)的[Rexy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)支持[Openrouter.ai](https://openrouter.ai/)上包含的所有LLM，甚至与OpenAI的微调模型集成，从而允许高度定制。
- en: 10\. Autocrit - started many years ago primarily as a critiquing tool to look
    at overused words, slow pacing, and features many other bells and whistles. However,
    in the last year, they’ve been actively incorporating gen-AI into their suite
    of tools, making it capable of ideation and story concept, story development of
    characters, settings, and plot points (in their Inspiration Studio), and developmental
    editing with its [Story Analyzer.](https://www.autocrit.com/story-analyzer) ⁠[17](#c349.xhtml#a47B)
    Autocrit can also help discovery writers by suggesting the following scenes in
    many different ways with its “What Happens Next” feature and using “Mood Changer”
    to change the tone of a scene.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 10. Autocrit - 多年前主要作为一个批评工具来查看过度使用的词汇、缓慢的节奏，并拥有许多其他功能。然而，在去年，他们积极地将生成式AI纳入他们的工具套件中，使其能够进行创意和故事概念、人物、场景和情节点的开发（在其灵感工作室中），以及使用其[故事分析器](https://www.autocrit.com/story-analyzer)进行发展编辑。[17](#c349.xhtml#a47B)
    Autocrit还可以通过其“接下来会发生什么”功能以多种方式建议以下场景，并使用“情绪转换器”来改变场景的语气。
- en: 11\. ProwritingAid—This program polishes manuscripts, looking for overused words
    and grammatical mistakes. It has recently incorporated generative AI to suggest
    alternate phrasing, change tenses and mood, and continue writing in different
    ways, such as adding a counterargument, joke, or quote.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 11. ProwritingAid——这个程序可以润色稿件，寻找过度使用的词汇和语法错误。它最近集成了生成式AI来建议替代措辞，改变时态和语气，并以不同的方式继续写作，例如添加反论点、笑话或引用。
- en: 12\. Grammarly Pro - primarily a grammar checker, but lately, it has incorporated
    generative AI to suggest rewrites or expand on existing text.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 12. Grammarly Pro - 主要是一个语法检查器，但最近它已经集成了生成式AI来建议重写或扩展现有文本。
- en: ​[ ​PART 2​ ]​
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: '[第二部分]'
- en: THE ROLE OF AI IN FICTION
  id: totrans-312
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI在虚构中的作用
- en: '![group of writers at a castle](image_rsrc4B7.jpg)'
  id: totrans-313
  prefs: []
  type: TYPE_IMG
  zh: '![城堡中的作家群](image_rsrc4B7.jpg)'
- en: ​[ ​5​ ]​
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: '[5]'
- en: HOW AI FITS INTO THE FICTION WRITING PROCESS
  id: totrans-315
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI在虚构写作过程中的作用
- en: Now that we understand how generative AI works, let’s look at how we can use
    these LLM beasties in our fiction writing process. It’s important to acknowledge
    that every individual writer has his own writing process, and what works for one
    author may not work for another.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了生成式AI的工作原理，让我们看看我们如何可以在我们的虚构写作过程中使用这些LLM巨兽。重要的是要承认，每个作家都有自己的写作过程，对某个作者有效的方法可能对另一个作者无效。
- en: Some of you are planners who map out your stories to the last detail before
    writing a single word, whereas others write into the wind and let inspiration
    take the story where it will go. The beauty is that everyone’s creative process
    is as unique as their fingerprint. And guess what?
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人是在写作前将故事细节规划到最后一笔的规划者，而其他人则随风而写，让灵感引领故事走向何方。美的是，每个人的创作过程都像指纹一样独特。猜猜看？
- en: AI can fit into your process or style and meet you no matter where you are.
    There is no definitive approach to using AI—it’s all about what suits you best.
    The important thing is to be adaptable and open-minded in how AI tools and techniques
    can be used. AI’s role in your writing can be as flexible and personalized as
    you make it.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以适应你的过程或风格，无论你在哪里，都能与你相遇。使用AI没有固定的方法——关键在于什么最适合你。重要的是要灵活和开放地使用AI工具和技术。AI在你写作中的作用可以像你一样灵活和个性化。
- en: We will break down the way fiction authors use AI into several phases. Even
    though these phases are listed in a particular order, it does not mean your writing
    process flows the same way. Some of you might skip the planning phase and rough
    draft without an outline, only to go back later and add story structure. Others
    write best with a detailed roadmap accompanied by clearly defined character sketches
    and rich world-building.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把虚构作者使用AI的方式分解为几个阶段。尽管这些阶段按特定顺序列出，但这并不意味着你的写作过程会以同样的方式流动。有些人可能会在没有大纲的情况下跳过规划和草稿阶段，稍后回来添加故事结构。其他人则喜欢有详细路线图，并伴有明确的人物草图和丰富的世界观构建。
- en: AI can be integrated into your process and accessed at any storytelling stage.
    Some of you are dying to jump ahead into the tools and advanced techniques section,
    and that’s okay, too. Check out the technology, and then come back and decide
    where AI fits into your writing process. Or read straight through to understand
    the possibilities and try the methods I describe as you go.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以整合到你的过程中，并在任何叙事阶段访问。有些人迫不及待地想跳到工具和高级技术部分，这也是可以的。了解这项技术，然后回来决定AI在你的写作过程中适合的位置。或者直接阅读以了解可能性，并在阅读过程中尝试我描述的方法。
- en: ​[ ​6​ ]​
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: '[6]'
- en: STORY CONCEPT AND IDEATION
  id: totrans-322
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 故事概念与构思
- en: AI can help during the exploration and creativity stage of a story concept.
    This phase involves developing creative ideas and fleshing out the essential elements
    that will form the story’s foundation. Ideation is crucial as it sets the direction
    and tone for the work that follows.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以在探索和创意阶段帮助构思故事概念。这一阶段涉及发展创意想法和充实将构成故事基础的基本要素。构思至关重要，因为它为后续工作的方向和基调设定了方向。
- en: Authors often start by brainstorming ideas to come up with unique concepts and
    evaluate how they fit into the overall story idea. This is crucial for genre fiction
    authors because readers have specific expectations for each type of story.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 作者通常从头脑风暴开始，提出独特概念，并评估它们如何融入整体故事想法。这对于类型小说作家至关重要，因为读者对每种故事类型都有特定的期望。
- en: AI can take your ideas and make connections between them and other concepts
    in your genre. Using AI’s vast training data, you can identify opportunities,
    clarify your market niche, and develop ideas based on current trends.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以将你的想法与其他类型中的概念建立联系。利用AI庞大的训练数据，你可以识别机会、明确你的市场细分，并基于当前趋势发展想法。
- en: You can use AI’s insights to define your ideal reader and glean what would delight
    or challenge them. If you decide to be different, AI can invent wild twists to
    subvert or reinvent genre conventions and ensure your story stands out in the
    market.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用AI的见解来定义你的理想读者，并了解什么会让他们感到高兴或挑战他们。如果你决定与众不同，AI可以发明出人意料的转折，颠覆或重新发明类型惯例，确保你的故事在市场上脱颖而出。
- en: 'Here’s a breakdown of what typically happens during the concept and ideation
    phase in writing:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是写作中概念和构思阶段通常发生的事情的分解：
- en: 'Market Analysis: Choosing a genre or sub-genre of interest and analyzing the
    concepts and content resonating in the market. Analyzing the book descriptions
    of top books in the category and looking for trends, fit, and target audience.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 市场分析：选择感兴趣的类型或子类型，分析市场中的概念和内容。分析该类别中顶级书籍的描述，寻找趋势、契合度和目标受众。
- en: 'Premise Generation: Brainstorm or generate a variety of ideas that fit into
    your chosen niche: genre, sub-genre, trope, and other characteristics. Be as detailed
    as possible. Ask for unique twists. Be conversational and refine your prompts.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 前提生成：头脑风暴或生成各种适合你选择细分市场的想法：类型、子类型、陈词滥调和其他特征。尽可能详细。要求独特的转折。保持对话性并完善你的提示。
- en: 'Research: Conducting preliminary research is often part of concept development.
    You can use AI or a search engine to look into existing literature, historical
    events, scientific concepts, or cultural trends to find inspiration or ensure
    the originality and feasibility of their ideas. Leverage generative AI’s ability
    to “make things up” by asking it to come up with something different or surprising
    from the data you gathered.'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 研究：初步研究通常是概念开发的一部分。你可以使用AI或搜索引擎来查阅现有文献、历史事件、科学概念或文化趋势，以寻找灵感或确保其想法的原创性和可行性。利用生成式AI的“创造新事物”的能力，通过要求它从你所收集的数据中提出不同或令人惊讶的想法。
- en: 'Audience Analysis: Use AI to create avatars of your likely readers, defining
    their characteristics, needs, and what they hope to get from your book. Later,
    use AI to analyze your manuscript to see how you satisfied each avatar’s desires.'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 受众分析：使用AI创建你可能的读者的化身，定义他们的特征、需求和希望从你的书中得到什么。稍后，使用AI分析你的手稿，看看你如何满足每个化身的需求。
- en: 'Concept Development: Create or consider possible titles, subtitles, log lines,
    synopsis, blurbs, and hook/pitch combinations.'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 概念开发：创建或考虑可能的标题、副标题、梗概、简介和钩子/提案组合。
- en: 'Validation: This step involves evaluating the viability and appeal of the ideas.
    Writers might consider factors like market trends, potential audience, and personal
    interest or expertise to decide which ideas are worth pursuing. AI can give additional
    insights on the fit and framing of your story idea.'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 验证：这一步骤涉及评估想法的可行性和吸引力。作家可能会考虑市场趋势、潜在受众、个人兴趣或专业知识等因素，以决定哪些想法值得追求。AI可以提供关于故事想法的契合度和框架的额外见解。
- en: 'Pitching: In professional settings, be prepared to pitch the developed ideas
    to editors, publishers, or collaborators to gauge interest and receive feedback,
    which can further refine the concept before moving into detailed planning and
    writing. AI can give you the bullet points and prioritize the appeal of your ideas
    to a particular audience.'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: '**提案**：在专业环境中，准备好向编辑、出版商或合作者提出你的想法，以衡量兴趣并获得反馈，这可以在进入详细规划和写作之前进一步细化概念。AI可以帮助你列出要点，并优先考虑你的想法对特定受众的吸引力。'
- en: 'Rapid Iteration: The speed and flexibility of AI-powered brainstorming allow
    writers to generate and test a high volume of ideas in a short amount of time.
    By quickly exploring multiple angles and possibilities, you can hone in on the
    most promising concepts and make informed decisions about which direction to take
    your story.'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 快速迭代：AI驱动的头脑风暴的速度和灵活性使得作者能够在短时间内生成和测试大量想法。通过快速探索多个角度和可能性，你可以聚焦于最有希望的概念，并对故事的发展方向做出明智的决策。
- en: TOOLS AND TECHNIQUES FOR STORY CONCEPT AND IDEATION
  id: totrans-336
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事概念和创意的**工具和技术**
- en: The chatbot is king and queen in this phase. They are easy to use and conversational,
    allowing you to go from general to specific as you add more detail or branch off
    tangents.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，聊天机器人是国王和王后。它们易于使用且具有对话性，允许你在添加更多细节或偏离主题时从一般到具体。
- en: Choose the “smartest” one you can access because they possess larger training
    datasets and abilities to connect disparate ideas in unique and surprising ways.
    Whereas the smaller or earlier chatbot might go for the most obvious ideas, giving
    you clichéd premises and repetitive concepts, the larger models can draw connections
    between seemingly unrelated areas and help to generate fresh, innovative story
    ideas.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 选择你能够访问的“最聪明”的聊天机器人，因为它们拥有更大的训练数据集和以独特和令人惊讶的方式连接不同想法的能力。而较小的或较早的聊天机器人可能会选择最明显的主意，给你陈词滥调的前提和重复的概念，而较大的模型可以在看似无关的领域之间建立联系，帮助生成新颖、创新的故事想法。
- en: Try different chatbots for a broader spectrum of insight and advice. ChatGPT
    is the obvious starting point, but Anthropic’s Claude, Microsoft Copilot, Google
    Gemini, Meta’s Llama, Mistral, etc. These versatile chatbots can be used for brainstorming,
    generating ideas, and exploring different narrative possibilities through conversation.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的聊天机器人以获得更广泛的见解和建议。ChatGPT是一个明显的起点，但还有Anthropic的Claude、Microsoft Copilot、Google
    Gemini、Meta的Llama、Mistral等。这些多才多艺的聊天机器人可用于头脑风暴、生成想法和通过对话探索不同的叙事可能性。
- en: Prompt Engineering/Design will give you the most bang for the buck at this stage,
    as chatbots converse with you through your inputs, called prompts.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，**提示工程/设计**将为你带来最大的回报，因为聊天机器人会通过你的输入，即提示，与你进行对话。
- en: Specific techniques that will improve your results include iterative prompting,
    role-based prompting, and prompt chaining. Because each chatbot is different,
    a good practice is to ask the chatbot what information it needs from you to perform
    a particular task. Definitions are also important, so ask the chatbot what it
    thinks a particular word or concept means to find common ground for conversation.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 提高你结果的具体技术包括迭代提示、基于角色的提示和提示链。由于每个聊天机器人都不同，一个好的做法是询问聊天机器人它需要从你那里获取哪些信息来完成特定任务。定义也很重要，所以请询问聊天机器人它认为某个特定单词或概念的含义，以找到对话的共同基础。
- en: Overall, ideation is about creating a fertile ground from which a detailed and
    engaging narrative can grow. It’s a phase that requires creativity, insight, and
    strategic thinking, which can be enhanced using AI tools to produce more informed
    and compelling content ideas.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，创意阶段是创造一个肥沃的土壤，从中可以生长出详细和引人入胜的叙事。这是一个需要创造力、洞察力和战略思考的阶段，可以使用AI工具来增强这些能力，从而产生更明智和引人入胜的内容想法。
- en: ​[ ​7​ ]​
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: '[7]'
- en: 'STORY DEVELOPMENT: FROM PREMISE TO PLOT'
  id: totrans-344
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**故事发展：从前提到情节**'
- en: Now that you have the initial premise and concept for your story, it’s time
    to plan and grow it into a compelling story with all the moving parts, such as
    a vivid story world, memorable and invigorating characters, and a plot that propels
    the characters through memorable and exciting plot points.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经有了故事的基础前提和概念，是时候规划和扩展它，使其成为一个引人入胜的故事，其中包含所有动态元素，如生动的世界观、令人难忘且充满活力的角色，以及推动角色通过难忘和激动人心的情节点的情节。
- en: AI can help with all these stages and provide alternate insights and additional
    what-ifs for your consideration. If you’re writing genre fiction, now is the time
    to check that genre expectations are met while throwing in your own twists or
    blending of genres. The LLMs can assist you by making suggestions, but you are
    the glue that decides what sticks and which plot twists, themes, or hallmark moments
    to include.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以帮助所有这些阶段，并提供替代见解和额外的假设供您考虑。如果您正在写体裁小说，现在是检查体裁期望是否得到满足的时候了，同时加入您自己的转折或体裁混合。LLM可以通过提出建议来帮助您，但您是决定哪些内容保留、哪些情节转折、主题或标志性时刻要包含的粘合剂。
- en: Even though I document these as steps, please remember to fit the AI and the
    steps to your individual writing process and not the other way around. Some of
    you may skip this stage entirely, run off to drafting, and circle back to flesh
    out your characters or settings during revision.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我把这些当作步骤来记录，但请记住，要使AI和步骤适应您的个人写作过程，而不是反过来。有些人可能会完全跳过这一阶段，直接进入草稿阶段，然后在修订过程中回到完善角色或场景。
- en: Personalize your use of AI tools and use them as you desire. Whether you’re
    a meticulous planner or a seat-of-the-pants discovery writer, AI can assist or
    entertain you with its insights.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化您对AI工具的使用，并按您的意愿使用它们。无论您是细致的计划者还是即兴创作的作家，AI都可以通过其见解帮助或娱乐您。
- en: Here is the breakdown of what typically happens during the story development
    phase.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是故事发展阶段通常发生的事情的分解。
- en: 'Expand Premise into Synopsis: Try various synopsis proposals and run them through
    AI to check genre conventions and expectations. Suggest various twists, tropes,
    and themes and ask the LLM to craft a synopsis with these variations. Include
    any genre-specific tropes you want to use, such as doppelganger for horror or
    betrayal in a buddy romance. Or have AI suggest some and then test them out. Ask
    another LLM to evaluate the synopsis until you are satisfied. You can also utilize
    AI tools to research popular tropes, themes, and plot structures within your genre.'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 将前提扩展为概要：尝试不同的概要提案，并通过AI检查体裁惯例和期望。提出各种转折、陈词滥调以及主题，并要求LLM根据这些变化创作概要。包括您想要使用的任何特定体裁的陈词滥调，例如恐怖片中的双胞胎或伙伴浪漫中的背叛。或者让AI提出一些建议，然后进行测试。要求另一个LLM评估概要，直到您满意为止。您还可以利用AI工具研究您体裁中流行的陈词滥调、主题和情节结构。
- en: 'Note: I find it useful to iteratively develop my characters as I refine my
    premise and synopsis. After all, each character’s goals and motivations, flaws,
    and strengths have much to do with the story’s premise and synopsis. See [Chapter
    44: Story Development Using ChatGPT](#c305.xhtml).'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我发现，在我完善前提和概要的过程中，迭代式地发展我的角色很有用。毕竟，每个角色的目标、动机、缺点和优点与故事的前提和概要有很大关系。参见[第44章：使用ChatGPT进行故事发展](#c305.xhtml)。
- en: 'Crafting Compelling Characters: Chatting with AI is a wonderful way of fleshing
    out your characters. Whether you use character sheets (template-based prompting)
    or conversation (iterative prompting), you can discuss with AI the details such
    as background, strengths, weaknesses, motivations, and other characteristics of
    your characters. Remember, you can put in your vision of the characters and use
    AI for additional insights. You do not have to take what AI gives you. Go back
    and forth between characters and premise until you have a sense of conflicts,
    opposing characters, sidekicks and allies, and other genre-specific constraints.
    For a romance, design a hero who will bring out your heroine’s best and worst
    characteristics. For romantic suspense, don’t forget a villain with personal motives
    that make him/her scarier. Put your heart and soul into your characters, and then
    ask AI to evaluate the character arc and see if you’re missing anything.'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 构建引人入胜的角色：与AI聊天是完善角色的绝佳方式。无论您使用角色表格（基于模板的提示）还是对话（迭代提示），您都可以与AI讨论角色的细节，如背景、优点、缺点、动机和其他特征。记住，您可以提出您对角色的愿景，并利用AI获得额外的见解。您不必接受AI提供的内容。在角色和前提之间来回讨论，直到您对冲突、对立角色、配角和盟友以及其他体裁特定约束有感觉。对于浪漫小说，设计一个能够展现女主角最好和最坏特点的英雄。对于浪漫悬疑小说，别忘了一个有个人动机使其更可怕的反派。将您的热情和灵魂投入到角色中，然后要求AI评估角色弧线，看看您是否遗漏了什么。
- en: AI can also suggest other character archetypes and traits to explore or perhaps
    assign a Myers-Briggs personality type to the character you describe. Tag team
    with AI to delve into your character’s backstory and defining moment when their
    mistaken belief took root. Explore what success looks like for your characters.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: AI还可以建议其他角色原型和特质进行探索，或者可能为描述的角色分配一个迈尔斯-布里格斯个性类型。与AI合作，深入了解角色的背景和定义时刻，即他们的错误信念根深蒂固的时刻。探索你角色的成功是什么样的。
- en: You can even upload photos and ask AI to describe your characters physically
    or use AI to suggest a dialogue style for your character, such as how they speak,
    along with their personality quirks. The possibilities are endless. I used ChatGPT
    Plus with Dall-E to generate images of wedding dresses so I could visualize them
    and then asked AI to describe them. We even did one that looked like toilet paper
    rolls just for laughs.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以上传照片，让AI描述角色的外貌，或者使用AI为角色建议对话风格，例如他们的说话方式以及他们的个性特点。可能性是无限的。我使用ChatGPT Plus和Dall-E生成婚纱图像，以便我可以可视化它们，然后让AI描述它们。我们甚至做了一张看起来像卫生纸卷的，只是为了逗乐。
- en: 'Building Your Story World and Setting: Here, you can use AI’s universe of knowledge
    and work together to generate the perfect setting or story world. You can use
    template prompting or chain-of-thought where you progressively go into more detail
    about each aspect of the story world. If your story world needs magic, rules,
    or an invented language, AI can help you create these elements. Use follow-up
    prompting to explore aspects like history, geography, cultural traditions, mythology,
    and anything else you need. Work with a multimodal LLM to generate images that
    can inspire you or document locations and settings. If you need a map, you can
    sketch it out on a piece of notebook paper and upload it to an image generator
    that can prettify it and make it look like it’s drawn on parchment or a computer
    screen by using words to describe how you want the map to appear.'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 构建你的故事世界和背景：在这里，你可以利用AI的知识宇宙，共同生成完美的背景或故事世界。你可以使用模板提示或思维链，逐步深入到故事世界的每个方面的细节。如果你的故事世界需要魔法、规则或一种虚构语言，AI可以帮助你创建这些元素。使用后续提示来探索历史、地理、文化传统、神话以及其他你需要的内容。与多模态LLM合作，生成可以启发你或记录地点和背景的图像。如果你需要一张地图，你可以在笔记本纸上勾勒出来，然后上传到可以美化它并使其看起来像是绘制在羊皮纸或电脑屏幕上的图像生成器，通过文字描述你希望地图呈现的样子。
- en: 'Plan the Story Structure: While AI can suggest plot points and create an outline
    for you, a better way might be for you to decide on a story structure that fits
    your vision and the genre-specific content ahead of time. Earlier LLMs will usually
    generate a “hero’s journey-like” structure. This is true even if you ask for another
    structure, such as Save the Cat or Romancing the Beat. It doesn’t have as much
    knowledge of these structures since they are more recent and have less literature
    about them, but many times, the LLM will happily declare that it knows the structure
    you propose and generate something it believes matches that structure. This is
    a situation where it’s better to “train” the LLM on what you want it to do. Give
    it the structure you want it to use, either in the form of a template or as an
    explanation of the steps, and then ask it to generate an outline. As I mentioned
    before, one way to do this is to define a four-act structure and tell it the genre-specific
    beats you expect. Then, ask the LLM to fill in that structure with the information
    you developed: premise, synopsis, characters, setting, trope, must-have scenes,
    etc.'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 规划故事结构：虽然AI可以建议情节点和为你创建大纲，但可能更好的方式是你提前决定一个符合你愿景和特定类型内容的故事结构。早期的LLM通常会生成类似于“英雄之旅”的结构。即使你要求另一种结构，如《猫救猫》或《浪漫的节拍》，也是如此。由于这些结构较新，关于它们的文献较少，因此LLM对这些结构的了解并不太多，但很多时候，LLM会高兴地宣称它知道你提出的结构，并生成它认为符合该结构的内容。在这种情况下，最好是“训练”LLM去做你想要它做的事情。给它你希望它使用的结构，无论是模板的形式还是步骤的解释，然后让它生成大纲。正如我之前提到的，一种方法是定义一个四幕结构，并告诉它你期望的特定类型的节奏。然后，让LLM用你开发的信息填充这个结构：前提、概要、人物、背景、陈词滥调、必备场景等。
- en: 'Developing Your Plot and Outline: Now that you have all the information you
    need, you can work with the LLM to create an outline specific to your story. Do
    you see that all the preparation was necessary to craft a non-generic outline?
    By layering the prompts and compiling your story-specific requirements, you add
    your vision and creativity into the process to tailor the output to your individuality.
    Of course, you can iterate and fix up the outline, adding and deleting, or even
    asking for alternate endings. The beauty of using AI is that you can do rapid
    prototyping and analysis by asking the LLM to critique the outline or compare
    it with the proposed genre or your target audience’s desires. AI can also offer
    suggestions to improve the pacing and escalating tension, as well as ensure your
    outline captures all crucial plot developments and turning points. It can evaluate
    whether you have too many action scenes, enough cliffhangers, or anything else
    you wish to analyze. You can “story doctor” the outline rather than wait until
    you have a first draft to do development editing.'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 开发情节和大纲：现在你已经拥有了所有需要的信息，你可以与LLM合作，为你的故事创建一个特定的大纲。你是否看到，所有这些准备工作都是必要的，以制作一个非通用的大纲？通过分层提示和汇编你的故事特定要求，你将你的视野和创造力融入过程，以调整输出以适应你的个性。当然，你可以迭代和修正大纲，添加和删除，甚至要求不同的结局。使用AI的美丽之处在于，你可以通过要求LLM批评大纲或将其与提议的类型或目标受众的愿望进行比较来进行快速原型设计和分析。AI还可以提供建议以改善节奏和升级紧张感，以及确保你的大纲捕捉到所有关键情节发展和转折点。它可以评估你是否有很多动作场景、足够的悬念，或任何你希望分析的其他内容。你可以“故事医生”大纲，而不是等到你有了初稿才进行发展编辑。
- en: TOOLS AND TECHNIQUES FOR STORY DEVELOPMENT
  id: totrans-358
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事发展的工具和技术
- en: 'Chat Interface: The chatbot is again your first go-to for iteratively expanding
    and refining your story concept. However, as you go, you will want to collect
    your outputs into a file and tag it as Story Information with sections for Hook,
    Pitch, Synopsis, Main Characters, Setting, Plot Points, and Outline. Keep this
    file offline so you don’t lose it in the chatbot. You will use it later as input
    to either chats or LLMs that work through APIs (Application Programming Interfaces)
    or Playgrounds (Workbenches).'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天界面：聊天机器人再次成为你迭代扩展和精炼故事概念的首选。然而，随着你的进行，你将希望将你的输出收集到一个文件中，并将其标记为故事信息，包括钩子、提案、概要、主要角色、场景、情节点和大纲。请将此文件离线保存，以免在聊天机器人中丢失。你将稍后将其用作输入，用于与通过API（应用程序编程接口）或游乐场（工作台）工作的聊天或LLM（大型语言模型）。
- en: 'Custom GPTs: OpenAI allows users with a paid account to create Custom GPTs
    with additional pre-seeded instructions and a knowledge base. This provides additional
    context and guidelines for the model to generate domain-specific instructions.
    These custom GPTs can be very useful if you are writing genre fiction.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 定制GPTs：OpenAI允许付费账户的用户创建带有额外预置指令和知识库的定制GPTs。这为模型生成特定领域的指令提供了额外的上下文和指南。如果你在写类型小说，这些定制GPTs非常有用。
- en: For example, I created one called Romance Writing Coach ([https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach))
    ⁠[1](#c349.xhtml#a3X6) by uploading information about tropes, romantic tension,
    likable character traits, four-act romance structure, and a writing style that
    engages romance readers. When approaching a Custom GPT, the best thing you can
    do is ask it questions, and it will tell you how it can help you.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我创建了一个名为“浪漫写作教练”（[https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach)）的GPT，通过上传关于陈词滥调、浪漫紧张、令人喜爱的角色特质、四幕浪漫结构和吸引浪漫读者的写作风格的信息。在接近定制GPT时，你能做的最好的事情就是向它提问，它将告诉你它能如何帮助你。
- en: 'Specialized Fiction-Writing Apps and Websites: Prepackaged fiction writing
    tools such as Sudowrite and Novelcrafter provide a framework within which users
    can develop their story, including writing with AI. The degree of control or lack
    thereof depends on whether the tool is writing the prompt for you or you are passing
    your prompt through the tool to the underlying LLMs. The [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[2](#c349.xhtml#a404) provides a prompt chaining and sequencing tool with complete
    flexibility through Rexy. This specialized writing tool is transparent because
    you can log the exact prompts it generates and pass them to the LLM. It also allows
    the user to select LLMs, tweak parameters, use megaprompting techniques, and sequence
    prompts automatically.'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 专业的小说写作应用和网站：Sudowrite和Novelcrafter等预包装的小说写作工具提供了一个框架，用户可以在其中发展他们的故事，包括使用AI进行写作。控制程度或缺乏控制取决于工具是否为您编写提示，或者您是否通过工具将提示传递给底层的LLM。通过Rexy提供完全灵活性的[未来小说学院](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    [2](#c349.xhtml#a404) 提供了一个提示链和排序工具。这个专业的写作工具是透明的，因为您可以记录它生成的确切提示并将其传递给LLM。它还允许用户选择LLM，调整参数，使用巨提示技术，并自动排序提示。
- en: 'Visualization and Image tools: [OpenAI](https://openai.com/dall-e-3)’[s Dall-E](https://openai.com/dall-e-3)
    ⁠[3](#c349.xhtml#a475) image generator is integrated into ChatGPT Plus. [Adobe](https://www.adobe.com/products/firefly.html)’[s
    Firefly](https://www.adobe.com/products/firefly.html) ⁠[4](#c349.xhtml#a476) allows
    you to upload and refine a sketch by describing the changes you want. [Midjourney](https://midjourney.com)
    ⁠[5](#c349.xhtml#a477) is one of the most versatile text-to-image generators.'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化和图像工具：[OpenAI](https://openai.com/dall-e-3) 的 [Dall-E](https://openai.com/dall-e-3)
    图像生成器集成在ChatGPT Plus中。[Adobe](https://www.adobe.com/products/firefly.html) 的 [Firefly](https://www.adobe.com/products/firefly.html)
    允许您通过描述您想要的更改来上传和润色草图。[Midjourney](https://midjourney.com) 是最通用的文本到图像生成器之一。
- en: By utilizing a diverse toolkit of AI apps and techniques, you can accelerate
    and enhance the planning phase of your story development. Here is an example of
    using AI to visualize wedding gowns.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用多样化的AI应用和技术工具箱，您可以加速并增强故事发展的规划阶段。以下是一个使用AI可视化婚纱的例子。
- en: <Prompt>
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: <Prompt>
- en: 'Dall-E: please visualize this wedding gown. The third dress featured a weird
    toilet paper cozy-looking ruffle situation that belonged on a craft project, not
    a wedding gown.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: Dall-E：请可视化这件婚纱。第三件婚纱展示了一个奇怪的卫生纸围裙状的褶皱情况，这更适合工艺项目，而不是婚纱。
- en: </Prompt>
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: </Prompt>
- en: <Response>
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: <Response>
- en: '![toilet paper wedding gown](image_rsrc4B8.jpg)'
  id: totrans-369
  prefs: []
  type: TYPE_IMG
  zh: '![卫生纸婚纱](image_rsrc4B8.jpg)'
- en: </Response>
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: </Response>
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg]'
- en: As the storyteller, you are responsible for asking the right questions and guiding
    the AI with your vision for the story. While it’s interesting to see what the
    AI can generate from a minimal prompt, the story becomes yours when you add your
    opinions and detailed follow-up questions. So feel free to chat and explore the
    serendipity of brainstorming with another mind or multiple minds. Layer in your
    individuality to make the story truly yours.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 作为故事讲述者，您负责提出正确的问题，并引导AI根据您对故事的想法。虽然看到AI从最小提示中生成内容很有趣，但只有当您添加自己的观点和详细的后续问题时，故事才真正属于您。所以请随意聊天，探索与另一个或多个思维碰撞的灵感和偶然性。加入您的个性，使故事真正属于您。
- en: ​[ ​8​ ]​
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: '[8]'
- en: WRITING AND REFINING
  id: totrans-374
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 写作和润色
- en: Now that you’ve done your prep work, it’s time to roll up your sleeves and start
    writing that first draft. Your AI assistant is here to help, whether you use it
    to refine your text, suggest refinements and transitions, or write that dirty
    first draft. It’s your choice where you draw the boundaries, whether you only
    use AI to rewrite your text or you use it to generate the words of your manuscript.
    It is only an assistant, whether used as a fancy thesaurus or as a ghostwriter.
    It can help you with descriptions and dialogue or fill the blank page with words
    you can edit and riff from.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经完成了准备工作，是时候卷起袖子开始撰写第一稿了。您的AI助手就在这里帮助您，无论您是使用它来润色文本，提出改进和过渡建议，还是用它来撰写那令人不快的初稿。您可以选择在哪里划界限，无论是仅使用AI重写您的文本，还是使用它来生成您的手稿中的文字。它只是一个助手，无论是作为高级同义词词典，还是作为代笔人。它可以帮您处理描述和对话，或者用您可以编辑和即兴发挥的文字填满空白页面。
- en: Let’s roll up our sleeves and see how AI can write for us. For fiction writing,
    we let AI work scene by scene. Remember that AI’s response is based on the words
    inside an LLM’s context window. Chapter content, particularly those with alternate
    points of view or different settings, can confuse the AI by introducing unrelated
    or contradictory details into its context window. It can cause elements of one
    scene to bleed into another scene. We will discuss this in more detail when we
    present the techniques of context stuffing and megaprompting.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们卷起袖子，看看AI如何为我们写作。对于小说写作，我们让AI逐个场景地工作。记住，AI的回应是基于LLM（大型语言模型）上下文窗口内的词语。章节内容，尤其是那些有不同观点或不同背景的内容，可能会通过向其上下文窗口引入无关或矛盾的信息来混淆AI。这可能导致一个场景的元素渗透到另一个场景中。当我们介绍上下文填充和超大提示技术时，我们将更详细地讨论这一点。
- en: Here is a breakdown of how AI can help you with your first draft.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何使用AI帮助你完成第一稿的分解。
- en: 'Busting Writers Block: have you ever tried freewriting to overcome writer’s
    block? You know, the exercise where you sit down and write gibberish or anything
    that comes to mind about your characters and what they’re supposed to be doing
    in a particular scene? Freewriting helps get your creative juices flowing as it
    immerses you into your character’s world and the problems facing him. Well, AI
    can definitely help here. You can chat with AI about your scene and bounce ideas
    on how to start or ask AI to write the scene by copying and pasting the information
    you gathered in the planning step. You’ll notice that the “quality” depends on
    how much or little information you feed the AI. However, if all you care about
    is jumpstarting your writing, having AI attempt a starting point is often enough
    to get you going.'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 打破写作瓶颈：你是否尝试过自由写作来克服写作瓶颈？你知道，这是一种练习，你坐下来写下任何关于你的角色以及他们在特定场景中应该做什么的胡言乱语或任何想法。自由写作有助于激发你的创造力，因为它让你沉浸在你角色的世界中，面对他们的问题。嗯，AI在这里肯定能帮上忙。你可以与AI讨论你的场景，并就如何开始或要求AI通过复制粘贴你在规划步骤中收集的信息来撰写场景进行头脑风暴。你会发现，“质量”取决于你提供给AI的信息量多少。然而，如果你只关心启动你的写作，让AI尝试一个起点通常就足够让你开始。
- en: 'Filling in the Blanks: Another way you can use AI in the drafting process is
    to ask AI to suggest words, descriptions, dialogue snippets, and transitions.
    Let’s say you’re writing a scene, and you’d like to add some local color to your
    setting. You can ask AI to make up a bakery and describe it. You can also ask
    it to introduce walk-on characters and a funny situation or to make up a town
    legend on the fly. Perhaps you aren’t good at writing fight scenes. You can prompt
    the beginning of the fight scene and then ask AI to add in blows, kicks, and punches
    or describe the sword and armor and how the sequence should go. The possibilities
    are endless. Your AI assistant is always on hand to give you suggestions or fill
    in details.'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 填补空白：在起草过程中，你可以使用AI的另一种方法是要求AI建议单词、描述、对话片段和过渡。假设你正在写一个场景，并想给你的场景添加一些地方色彩。你可以要求AI创造一个面包店并描述它。你还可以要求它介绍一些客串角色和有趣的情况，或者即兴编造一个城镇传说。也许你不擅长写打斗场景。你可以提示打斗场景的开始，然后要求AI添加打击、踢打和拳头，或者描述剑和盔甲以及序列应该如何进行。可能性是无限的。你的AI助手始终在旁边为你提供建议或填补细节。
- en: 'Enhancing prose: Another way AI can help you is by rewriting sections of prose.
    Let’s say your character talks like a Valley Girl. You can write her dialogue
    in plain vanilla, copy and paste it into an LLM, and ask it to rewrite it using
    Valley Girl slang. I don’t know if this is an “enhancement” or not, but it’s certainly
    a feature. Again, you can explore different styles and voices. You might find
    that AI rewriting your prose deletes your voice, and it’s not something you care
    for. That’s okay, too, as you can always edit or rewrite whatever it gives you.
    The current LLMs tend to “overwrite” with too many adjectives and adverbs. The
    solution is obvious. Get AI to write or rewrite, see if there’s an improvement,
    and then edit the prose to your liking. Or you can try another LLM and see if
    you like its prose better. As you can see, working with AI is truly a collaboration
    and not a one-way street.'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 提升散文：AI可以帮助你的另一种方式是重写散文的部分内容。假设你的角色说话像山谷女孩。你可以用普通的语言写她的对话，复制粘贴到LLM中，并要求它使用山谷女孩俚语进行重写。我不知道这算不算“提升”，但确实是一个功能。同样，你可以探索不同的风格和声音。你可能会发现AI重写你的散文会删除你的声音，这不是你关心的事情。没关系，你也可以随时编辑或重写它给出的任何内容。当前的LLMs倾向于用过多的形容词和副词“覆盖”内容。解决方案很明显。让AI写作或重写，看看是否有改进，然后编辑散文到你满意为止。或者，你可以尝试另一个LLM，看看你是否更喜欢它的散文。正如你所见，与AI合作真正是一种合作，而不是一条单行道。
- en: 'Freeform Writing: A simple way of getting AI to write portions of a scene is
    to begin the scene on your own. Then feed your partial scene into the LLM and
    ask for it to either “continue writing” or “continue with these plot points and
    beats that you specify.” This is a technique called completion prompting. Results
    vary based on what you put in, but it is an easy way to get past a block. You
    either like what it gives you or dislike it, and that sparks ideas for you to
    continue. If you’re a pantser or discovery writer like me, this might be the only
    technique you use as you tandem write through your story. AI can allow you to
    brainstorm at every step or story beat. Or explore several paths if you can’t
    decide. You can even prompt the AI to write an outline (or several outlines) for
    the rest of the book based on the options available after each scene. This is
    rapid prototyping and might save backtracking or throwing out many chapters of
    exploration if you were to write out every scene in detail.'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 自由写作：让AI写作场景片段的一种简单方法是从自己开始。然后将你的部分场景输入到LLM中，并要求它“继续写作”或“继续你指定的这些情节点和节奏”。这是一种称为完成提示的技术。结果因你输入的内容而异，但这是一个克服写作障碍的简单方法。你可能喜欢它给出的内容，也可能不喜欢，这会激发你继续创作的灵感。如果你像我一样是一个即兴创作或探索型作家，这可能是你在串联写作故事时唯一使用的技巧。AI可以让你在每一个步骤或故事节奏中头脑风暴。或者，如果你无法决定，可以探索几条路径。你甚至可以提示AI根据每个场景后的选项为剩余的书本编写大纲（或几个大纲）。这是快速原型设计，可能会节省回溯或丢弃许多章节探索的时间。
- en: 'Drafting an entire scene: Having AI write scene prose is the holy grail for
    some writers and anathema for others. Suffice it to say that an LLM will not write
    anything other than a generic scene if you give it a one-line prompt. Remember
    all our work in the last section with story information, character details, settings,
    and plot points? Effective scene writing requires a lot of prompt engineering
    and sequencing, as well as providing data to ensure narrative continuity. The
    current AI assistants work best when given data in small, manageable chunks. Hence,
    the best practices involve giving it a scene brief or plan containing background
    information and scene beats. For more details on scene writing, see [Part V: Writing
    Scenes with AI](#c1NX.xhtml).'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 整个场景的草稿：对于一些作家来说，让AI写场景散文是圣杯，而对于另一些作家来说则是禁忌。简单来说，如果你只给LLM一个单行提示，它将不会写出除了通用场景之外的内容。记得我们在上一节中关于故事信息、人物细节、场景和情节点的所有工作吗？有效的场景写作需要大量的提示工程和排序，以及提供数据以确保叙事连贯性。当前的AI助手在提供小而可管理的数据块时工作得最好。因此，最佳实践包括给它一个包含背景信息和场景节奏的场景概述或计划。有关场景写作的更多详细信息，请参阅[第五部分：使用AI编写场景](#c1NX.xhtml)。
- en: TOOLS AND TECHNIQUES FOR WRITING SCENES
  id: totrans-383
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写场景的工具和技术
- en: 'Filling in the Blanks and Enhancing Prose: Use chatbots by copying and pasting
    a partial scene with instructions on what you want to be filled in. Use a tool
    like Sudowrite or Novelcrafter, where you place your cursor or highlight the text
    you want to be altered and type in instructions or prompts on what you want. These
    techniques are pretty intuitive, and you will soon develop your own favorite prompts
    or ways of doing things.'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 填空和增强散文：通过复制粘贴部分场景并附上你想要填写的指示来使用聊天机器人。使用Sudowrite或Novelcrafter等工具，将光标放置或突出显示你想要更改的文本，并输入你想要填写的指示或提示。这些技术相当直观，你很快就会发展出自己的首选提示或做事方式。
- en: 'Freeform Writing: Copy and paste a partial scene into a chatbot and ask it
    to continue. If you want to give more context, pre-seed the chatbot with background
    information. This technique is called megaprompting or context stuffing. You are
    essentially giving the LLM enough context to shift its responses to be relevant
    to your scene. We’ll talk about context windows in the Advanced LLM Concepts chapter,
    but these days, the models are growing in context window size, so you have less
    to worry about than a year ago when we had to count “tokens” like pinching pennies.
    Using a custom GPT that fits your genre will help the LLM adhere to genre guidelines.
    For example, if you’re writing a romance, a romance writing Custom GPT is more
    likely to include romantic tension and banter in the scene than a generic GPT.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 自由写作：将部分场景复制粘贴到聊天机器人中，并要求它继续。如果你想提供更多背景信息，可以在聊天机器人中预先输入背景信息。这种技术被称为megaprompting或背景填充。你实际上是在给LLM足够的背景信息，以使其响应与你的场景相关。我们将在高级LLM概念章节中讨论上下文窗口，但如今，模型在上下文窗口大小上的增长，所以你比一年前要少担心一些，当时我们不得不像捏硬币一样数“tokens”。使用适合你体裁的定制GPT可以帮助LLM遵守体裁指南。例如，如果你在写浪漫小说，一个浪漫写作的定制GPT更有可能包括场景中的浪漫紧张感和对话，而不是一个通用的GPT。
- en: 'Autocrit has recently added an “Inspiration Studio” feature. With this feature,
    you can place your cursor anywhere in your document and ask, “What Happens Next?”
    It’ll answer in several categories: Heighten Tension, Reveal Character Motivation,
    Unexpected Twist, Most Likely, and Outlandish.'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: Autocrit最近添加了一个“灵感工作室”功能。使用这个功能，你可以在文档的任何位置放置光标并询问，“接下来会发生什么？”它会在几个类别中回答：提升紧张感、揭示角色动机、意外转折、最有可能发生和荒谬。
- en: 'Drafting an entire scene: Preparing scene briefs or plans helps guide the AI
    in writing your scene. Remember that you are the author of the scene briefs or
    plans, and the more detail you put into it, the better the result. Please see
    [Chapter 31: Using Scene Briefs](#c1PB.xhtml) for more information. You can also
    fine-tune models to create a unique narrative voice. See [Part VI: Personalizing
    AI for Your Creative Vision](#c1XS.xhtml).'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 整个场景的草拟：准备场景概要或计划有助于引导AI为你编写场景。请记住，你是场景概要或计划的作者，你投入的细节越多，结果就越好。请参阅[第31章：使用场景概要](#c1PB.xhtml)以获取更多信息。你还可以微调模型以创建独特的叙事声音。参见[第六部分：个性化AI以适应你的创意愿景](#c1XS.xhtml)。
- en: Because scene writing requires more data and moving parts, using a tool such
    as Sudowrite, Novelcrafter, or Future Fiction Academy Rexy is preferable to copying
    and pasting large chunks of data into a chatbot window. It is doable, but in my
    experience, the chatbots are limited in the number of words they return. Furthermore,
    you cannot “tune” the parameters of an LLM, and it is hard to try different LLMs
    as you have to go to different windows (unless you are using an aggregator like
    Openrouter.ai). Future Fiction Academy’s Rexy Wordbanger is the power tool that
    allows you to sequence prompts and change the LLMs on the fly. It will enable
    you to generate the same scene multiple times using different LLMs to compare
    and contrast the results. Watch their YouTube channel for their live writing sessions.
    ([https://www.youtube.com/@FutureFictionAcademy](https://www.youtube.com/@FutureFictionAcademy))
    ⁠[1](#c349.xhtml#a43V)
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 由于场景写作需要更多的数据和动态部分，使用Sudowrite、Novelcrafter或Future Fiction Academy的Rexy等工具比将大量数据复制粘贴到聊天机器人窗口中更可取。虽然可行，但根据我的经验，聊天机器人返回的单词数量有限。此外，你不能“调整”LLM的参数，而且尝试不同的LLM也很困难，因为你必须打开不同的窗口（除非你使用像Openrouter.ai这样的聚合器）。Future
    Fiction Academy的Rexy Wordbanger是允许你动态调整提示和LLM的强大工具。它将使你能够使用不同的LLM生成相同的场景多次，以便比较和对比结果。观看他们的YouTube频道，了解他们的现场写作会话。（[https://www.youtube.com/@FutureFictionAcademy](https://www.youtube.com/@FutureFictionAcademy)）[1](#c349.xhtml#a43V)
- en: As you can see, AI’s role in scene writing is exciting and transformative. The
    AI also requires a lot of hand-holding, and that’s okay because, after all, you
    are the owner of the story, and it is just the assistant. You can tune and tweak
    or completely rewrite what it gives you. Writing with AI is a collaborative process,
    but at the end of the day, you are the author, and therefore, it is up to you
    to revise, enhance, or use the AI words as inspiration or trash it. The LLM will
    not have its feelings hurt, and you will benefit from gaining any insights or
    surprise “hallucinations,” which is the serendipitous and entertaining part of
    writing with AI. What did it just come up with?
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，AI在场景写作中的作用既令人兴奋又具有变革性。AI也需要大量的指导，这是可以接受的，因为毕竟，您是故事的主人，它只是个助手。您可以调整和微调，或者完全重写它提供的内容。用AI写作是一个协作过程，但最终，您是作者，因此，您有权修订、增强，或者将AI的文字作为灵感，或者将其丢弃。LLM不会受到伤害，您将从获得任何洞察或惊喜的“幻觉”中受益，这是与AI写作的意外和有趣的部分。它刚刚想到了什么？
- en: ​[ ​9​ ]​
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: '[9]'
- en: CRITIQUE AND DEVELOPMENT EDITING
  id: totrans-391
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评论和发展编辑
- en: Way back, when I was working on my first novel, I joined [Critiquecircle.com](http://Critiquecircle.com)
    ⁠[1](#c349.xhtml#a3W6), an online critique group with a point system to ensure
    reciprocity. I enjoyed the community and learned a lot, but the quality and thoroughness
    of the critiques were scattershot. Some users focused only on grammar, whereas
    others gave personal opinions. I used the critiques as best as possible to get
    a sense of my story but hired a developmental editor to go through my novel before
    publishing.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 很久以前，当我正在创作我的第一部小说时，我加入了[Critiquecircle.com](http://Critiquecircle.com) [1](#c349.xhtml#a3W6)，一个有积分系统的在线评论小组，以确保互惠。我喜欢这个社区，学到了很多东西，但评论的质量和彻底性是零散的。一些用户只关注语法，而其他人则给出了个人意见。我尽可能地使用评论来了解我的故事，但在出版之前雇佣了一位发展编辑来审阅我的小说。
- en: USING AI TOOLS FOR CRITIQUE AND STORY ANALYSIS
  id: totrans-393
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用AI工具进行评论和故事分析
- en: 1\. Story Structure
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 故事结构
- en: 'Plot and Structure Analysis: identify the exposition, rising action, climax,
    falling action, and resolution, and assess how effectively they are structured
    to create a compelling narrative.'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 情节和结构分析：确定序幕、上升行动、高潮、下降行动和结局，并评估它们如何有效地构建引人入胜的叙事。
- en: 'Pacing Evaluation: analyze the story’s pace and identify sections that may
    be too slow, too fast, or unevenly paced.'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 速度评估：分析故事的速度，并确定可能过慢、过快或不均匀的部分。
- en: 'Plot Holes and Inconsistencies: Track information across long stretches of
    text, which allows it to spot plot holes, inconsistencies, and unresolved plot
    lines.'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 情节漏洞和不一致性：追踪长段文本中的信息，这允许它发现情节漏洞、不一致性和未解决的情节线。
- en: 2\. Character Development
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 角色发展
- en: 'Character Arcs and Motivations: track the development of characters throughout
    the story, analyzing their motivations, goals, and internal conflicts.'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧线和动机：追踪故事中角色的发展，分析他们的动机、目标和内部冲突。
- en: 'Character Relationships: assess how characters interact with each other, the
    dynamics of their relationships, and how these relationships influence the plot.'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：评估角色如何相互交往，他们关系中的动态，以及这些关系如何影响情节。
- en: 'Characterization Techniques: analyze how the author uses dialogue, actions,
    thoughts, and descriptions to reveal characters’ personalities and inner lives.'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 角色塑造技巧：分析作者如何使用对话、行动、思想和描述来揭示角色的个性和内心世界。
- en: 3\. Theme and Meaning
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 主题和含义
- en: 'Identifying Themes: identify the main themes explored in the novel, including
    love, loss, redemption, justice, and the human condition.'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 识别主题：确定小说中探讨的主要主题，包括爱情、失落、救赎、正义和人类状况。
- en: 'Symbolism and Motifs: Recognize recurring symbols and motifs and analyze how
    they contribute to the story’s thematic development.'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 符号和主旨：识别重复的符号和主旨，并分析它们如何有助于故事的主题发展。
- en: 'Author’s Message: By analyzing themes and symbols, the AI can infer the author’s
    message or the underlying meaning they intend to convey.'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 作者信息：通过分析主题和象征，AI可以推断作者的信息或他们意图传达的潜在含义。
- en: 4\. Setting and Atmosphere
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 场景和氛围
- en: 'World-Building: assess the effectiveness of the author’s world-building, including
    creating believable settings, cultures, and societies.'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建：评估作者的世界构建效果，包括创造可信的设置、文化和社会。
- en: 'Atmosphere and Mood: analyze how the author uses sensory details and language
    to create a specific atmosphere or mood that enhances the story.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 氛围和情绪：分析作者如何使用感官细节和语言来创造特定的氛围或情绪，从而增强故事。
- en: 5\. Point of View and Narration
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 视角和叙述
- en: 'Narrative Voice and Perspective: identify the narrative voice and point of
    view used in the story, such as first-person, third-person limited, or omniscient.'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事声音和视角：确定故事中使用的叙事声音和视角，例如第一人称、第三人称有限视角或全知视角。
- en: 'Reliability of the Narrator: assess the narrator’s reliability and analyze
    how their perspective influences the reader’s understanding of events.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事者的可靠性：评估叙事者的可靠性，并分析他们的视角如何影响读者对事件的理解。
- en: 6\. Language and Style
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 语言和风格
- en: 'Sentence Structure and Word Choice: analyze the author’s use of language, including
    sentence structure, diction, and figurative language.'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 句子结构和词汇选择：分析作者的语言使用，包括句子结构、措辞和比喻语言。
- en: 'Tone and Style: Identify the tone and style of the writing and assess how they
    contribute to the story’s overall effect.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 调子和风格：确定写作的调子和风格，并评估它们如何对故事的整体效果做出贡献。
- en: 'Dialogue Effectiveness: analyze the effectiveness of dialogue in revealing
    characters’ personalities and advancing the plot.'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 对话的有效性：分析对话在揭示人物性格和推进情节方面的有效性。
- en: INTERACTIVE CRITIQUING WITH A CHATBOT
  id: totrans-416
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与聊天机器人进行交互式评论
- en: Like we wrote a story scene-by-scene, we can critique each scene with a chatbot
    such as ChatGPT or Claude. We can start a running conversation by copying and
    pasting each scene into the chat and asking for a general critique or specific
    points we are concerned about.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们逐场景地写故事一样，我们可以用ChatGPT或Claude等聊天机器人对每个场景进行评论。我们可以通过复制粘贴每个场景到聊天中并请求一般评论或我们关心的具体点来开始一段持续的对话。
- en: OpenAI’s ChatGPT Plus allows users to create Custom GPTs with custom knowledge
    base files. I’ve used this feature to create a Custom GPT called “Writer’s Room.”
    I gave names to each writer in the writer’s room and his or her field of expertise.
    One is a dialogue expert who looks for effective dialogue and subtext and advises
    on how to make dialogue clear and effective. Another could be an expert in character
    analysis, and someone else could be a world-builder. (You can also use Custom
    Instructions to Creates “Writer’s Room w/ OpenAI ChatGPT 4” [https://adorable-porcupine.super.site/openai-chatgpt](https://adorable-porcupine.super.site/openai-chatgpt)
    I believe Custom Instructions is now available with the Free version) ⁠[2](#c349.xhtml#a443)
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT Plus允许用户使用自定义知识库文件创建自定义GPT。我已使用此功能创建了一个名为“作家室”的自定义GPT。我为作家室中的每位作家及其专业领域命名。其中一位是对话专家，寻找有效的对话和潜台词，并就如何使对话清晰有效提供建议。另一位可能是人物分析专家，还有其他人可能是世界构建者。（您也可以使用自定义指令创建“带有OpenAI
    ChatGPT 4的作家室” [https://adorable-porcupine.super.site/openai-chatgpt](https://adorable-porcupine.super.site/openai-chatgpt)
    我相信自定义指令现在也适用于免费版本） [2](#c349.xhtml#a443)
- en: Take the categories I listed in the previous section and create a persona skilled
    at analyzing that attribute. Upload specific knowledge base files using your preferred
    story structure, character traits, world-building details, and genre conventions.
    If you have websites with more knowledge, you can retrieve that data through API
    calls. Be careful not to overload the knowledge base because your chat response
    time will be slower while it spins while going through the knowledge base.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上一节中我列出的类别，创建一个擅长分析该属性的个性。使用您偏好的故事结构、人物特质、世界构建细节和类型惯例上传特定的知识库文件。如果您有更多知识的网站，您可以通过API调用检索这些数据。请注意不要过度加载知识库，因为当它通过知识库时，您的聊天响应时间会变慢。
- en: You don’t have to use a Custom GPT. The foundational models have enough knowledge
    of fiction to provide critiques. I’ve heard of authors using Claude 3 Haiku for
    critiques and editing. Of course, there will always be a flavor of the week, so
    joining an author’s group will help you keep up.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 您不必使用自定义GPT。基础模型对虚构作品有足够的了解，可以提供评论。我听说有作者使用Claude 3 Haiku进行评论和编辑。当然，总会有一种当周的风味，所以加入作者群体将帮助您跟上。
- en: Here are some ways to use your Writer’s Room or generic chatbot.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些使用您的作家室或通用聊天机器人的方法。
- en: 1\. You could ask the LLM to analyze a specific section of your text and provide
    feedback on the pacing and tension. For example, “Analyze the pacing and tension
    in the following excerpt and suggest how it might be improved to increase engagement.”
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 你可以要求LLM分析你文本的特定部分，并提供关于节奏和紧张感的反馈。例如，“分析以下摘录的节奏和紧张感，并提出如何改进以增加参与度。”
- en: 2\. Ask the LLM specific questions about the text, such as “Does the action
    in this section feel rushed?” or “Is there enough tension in this dialogue to
    keep readers interested?”
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 向LLM提出关于文本的具体问题，例如“这个部分的动作是否感觉仓促？”或“这段对话中有足够的紧张感来吸引读者吗？”
- en: 3\. Provide the LLM with different scene versions and ask which one maintains
    better tension or pacing and why. Be sure to tag the scene with container tags
    so the LLM knows which one is Scene A and which one is Scene B. [Scene A]{paste
    in Scene A text}[/Scene A].
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 向LLM提供不同的场景版本，并询问哪一个能更好地保持紧张感或节奏，以及原因。务必用容器标签标记场景，以便LLM知道哪个是场景A，哪个是场景B。[场景A]{粘贴场景A文本}[/场景A]。
- en: 4\. Ask the LLM to describe a chapter’s or scene’s emotional arc and suggest
    modifications to enhance the emotional impact or smooth out narrative inconsistencies.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 要求LLM描述一个章节或场景的情感曲线，并提出修改以增强情感影响或平滑叙事不一致性。
- en: PRE-PACKAGED FICTION CRITIQUE TOOLS
  id: totrans-426
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预包装的虚构作品评论工具
- en: You can also use pre-packaged tools like Autocrit, Fictionary, and ProwritingAid.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以使用像Autocrit、Fictionary和ProwritingAid这样的预包装工具。
- en: 'Autocrit has a new Story Analyzer feature that uses Generative-AI to analyze
    the following:'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: Autocrit有一个新的故事分析功能，它使用生成式AI来分析以下内容：
- en: Synopsis
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要
- en: Conflict
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突
- en: Characters
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 角色
- en: World Building
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建
- en: Possible Contradiction Events
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 可能的矛盾事件
- en: Timeline Analysis
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 时间线分析
- en: Foreshadowing Events
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 预兆事件
- en: Plot Thread Tracking
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 情节线索追踪
- en: Genre Analysis
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 类型分析
- en: It works on one chapter at a time.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 它一次处理一个章节。
- en: 'ProwritingAid uses AI to analyze 4000 words at a time to give feedback on the
    following:'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: ProwritingAid使用AI一次分析4000个单词，以提供以下方面的反馈：
- en: Strengths
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 优点
- en: Plot/Story
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 情节/故事
- en: Characters
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 角色
- en: Tension
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 紧张感
- en: Point of View
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 视角
- en: Setting
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 背景
- en: Style/Voice
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 风格/声音
- en: Clarity
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度
- en: Etc.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 等等。
- en: Fictionary has an existing story analysis tool that compares your story to a
    predefined structure. They are currently adding generative AI. For example, the
    conflict and tension section is analyzed by AI. As of this writing, most of the
    rest is done conventionally, with user input where needed to keep track of the
    story threads. However, the platform is evolving, so by the time you read this,
    many more areas will be AI-enabled.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: Fictionary有一个现有的故事分析工具，它将你的故事与预定义的结构进行比较。他们目前正在添加生成式AI。例如，冲突和紧张感部分由AI分析。截至本文写作时，大部分其他部分仍然是传统方式完成的，需要用户输入以跟踪故事线索。然而，该平台正在不断发展，所以当你阅读这篇文章时，许多更多区域将启用AI。
- en: The same goes for just about every tool you use. Generative AI is embedded everywhere,
    and you will see it in your writing tools, browsers, and apps.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 这几乎适用于你使用的每一个工具。生成式AI无处不在，你将在你的写作工具、浏览器和应用程序中看到它。
- en: THE ADVANTAGES OF INTERACTING DIRECTLY WITH LANGUAGE MODELS
  id: totrans-451
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 直接与语言模型交互的优点
- en: While using prepackaged software is convenient and easy, you are limited to
    the features they’ve provided, and moreover, you cannot access the prompts they
    send. Therefore, you cannot modify the results by refining the prompts or personalizing
    them to your specific genre or story. You cannot choose the LLM to ask questions
    and are limited to the ones they support. The responses you get are likely to
    be generic because the prompts are generic.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然使用预包装的软件既方便又简单，但你被限制在他们提供的功能之内，而且你无法访问他们发送的提示。因此，你不能通过细化提示或根据你特定的类型或故事进行个性化来修改结果。你不能选择LLM来提问，只能使用他们支持的LLM。你得到的回答很可能是通用的，因为提示是通用的。
- en: Most of the foundational models from large corporations have filters that prevent
    them from responding to content they deem violent or sexual; however, open-source
    LLMs exist that are unfiltered. The responses you get are likely to be generic.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 大型公司的大部分基础模型都有过滤器，防止它们对认为具有暴力或性内容的内容做出回应；然而，存在未过滤的开源LLM。你得到的回答很可能是通用的。
- en: My personal opinion is to go directly to the LLM. That way, you know their data
    handling policy, whether your data will be used for training, and the size or
    context window being analyzed. You will also have clarity on the exact prompts
    passed to the LLM and can ask clarifying follow-up questions to target areas of
    your manuscript better. Individualized prompts will ensure that your results do
    not sound like every other user of a particular tool. Going directly to the LLM
    may mean paying per API call, but if you think about it, you get precisely what
    you pay for rather than aggregating your monthly charge among all the prepackaged
    tool’s users. Furthermore, the calls are fractions of pennies. For example, you
    can see the pricing chart at Openrouter.ai, which includes many FREE models.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人的观点是直接去LLM。这样，你知道他们的数据处理政策，你的数据是否会用于训练，以及正在分析的尺寸或上下文窗口。你还将对传递给LLM的确切提示有清晰的认识，并可以提出澄清的后续问题，以更好地针对你的稿件。个性化的提示将确保你的结果不会像其他工具的用户一样。直接去LLM可能意味着按API调用付费，但如果你这么想，你得到的正是你付出的，而不是将你的月度费用与其他预包装工具的用户汇总。此外，调用费用只是几分之一的美分。例如，你可以在Openrouter.ai上查看定价图表，其中包含许多免费模型。
- en: As of this writing, Google’s Gemini 1.5 Pro introduced a million-token context
    window that allows the entire analysis of documents (and even multiple documents).
    This presents a quantum leap in synthesizing plot threads across chapters and
    tracking character arcs across books in a series.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，谷歌的Gemini 1.5 Pro引入了一个百万token的上下文窗口，允许对文档（甚至多份文档）进行整个分析。这代表了在章节间综合情节线索以及在系列书籍中追踪人物弧线的量子飞跃。
- en: Finally, no AI LLM can give the human touch necessary for a complete developmental
    edit. This includes emotional experiences, puzzling plot threads, cultural considerations,
    and plain old common sense. However, the conversation with the LLM can point to
    areas that need further work.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，没有任何AI LLM能够提供完整的开发编辑所需的人类触感。这包括情感体验、令人困惑的情节线索、文化考虑以及普通的常识。然而，与LLM的对话可以指出需要进一步工作的区域。
- en: See [Part VII. Your AI-Enabled Second Brain](#c279.xhtml) for story critique
    examples.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[第七部分. 你的AI辅助第二大脑](#c279.xhtml)以获取故事评论示例。
- en: ​[ ​10​ ]​
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: '[10]'
- en: POLISHING AND PUBLISHING
  id: totrans-459
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**润色和出版**'
- en: Many authors regularly use grammar and spellcheckers to polish their manuscripts
    before sending them to editors. Today’s generative AI tools can be added to the
    list. LLMs like ChatGPT and Claude were trained on a vast corpus of human-created
    writing. They can look for patterns and identify areas that you’re concerned with.
    Their vast associative abilities mean they can provide insight you might not have
    thought of. In any case, using LLMs to polish your scenes can’t hurt. They offer
    an additional layer of consideration that complements your human editor.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 许多作者在将稿件发送给编辑之前，会定期使用语法和拼写检查器来润色他们的稿件。今天的生成式AI工具可以加入这个列表。像ChatGPT和Claude这样的LLM是在大量人类创作的文本语料库上训练的。它们可以寻找模式并识别你关心的区域。它们强大的关联能力意味着它们可以提供你可能未曾想到的见解。无论如何，使用LLM来润色你的场景不会有害。它们为你的人类编辑提供了一个额外的考虑层面。
- en: TIPS ON USING AI FOR EDITING
  id: totrans-461
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**使用AI进行编辑的技巧**'
- en: Ask the same questions of the AI editor as you would yourself. You can copy
    and paste your scene into its context window and ask specific questions.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 向AI编辑提出你自己的问题。你可以将你的场景复制粘贴到其上下文窗口中并提出具体问题。
- en: Read this scene and give me an analysis that includes (you need first to check
    what the AI sees in the scene).
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阅读这个场景，并给出一个包括（你首先需要检查AI在场景中看到的内容）的分析。
- en: Look for elements in the scene that don’t move the plot forward.
  id: totrans-464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找场景中不推动情节发展的元素。
- en: Are the people in the scene moving or acting toward their objectives?
  id: totrans-465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 场景中的人物是在移动还是朝着他们的目标行动？
- en: Is the dialogue relevant to the character’s objectives?
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话是否与角色的目标相关？
- en: Do the actions move the story forward if you have a sequence, such as a fight
    scene?
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你有像战斗场景这样的序列，这些行动是否推动了故事的发展？
- en: Are the characters’ motivations clear?
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人物的动机是否清晰？
- en: Are there unnecessary repetitions of events?
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否有事件的不必要重复？
- en: Let me know if there are places to cut anything to clarify the narrative drive.
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果有需要裁剪以阐明叙事驱动的部分，请告诉我。
- en: These are only example questions. One way to increase the accuracy of AI’s suggestions
    is to upload background information such as genre, sub-genre, your vision for
    the book or scene in question, where this book fits in the marketplace, target
    audience, and reading level.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是示例问题。提高AI建议准确性的方法之一是上传背景信息，例如类型、子类型、您对书籍或场景的愿景、这本书在市场上的位置、目标受众和阅读水平。
- en: 'You can do this with context stuffing or using a megaprompt. See [Chapter 21:
    Megaprompting](#c176.xhtml).'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用上下文填充或使用大提示来完成这项工作。参见[第21章：大提示](#c176.xhtml)。
- en: AI EDITING PRINCIPLES
  id: totrans-473
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 编辑原则
- en: 'Supplement, Don’t Replace: AI tools should be used as supplements to human
    judgment, not replacements. It’s crucial to review AI suggestions critically and
    retain the final say in all edits to preserve the author’s unique voice.'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 补充而非替代：AI 工具应作为人类判断的补充，而非替代品。批判性地审查 AI 建议，并在所有编辑中保留最终决定权，以保留作者的独特声音至关重要。
- en: 'Explore Different Tools: Different AI editing tools have unique strengths.
    Experiment with various options to find the ones that best suit your specific
    needs.'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 探索不同的工具：不同的AI编辑工具具有独特的优势。尝试不同的选项，以找到最适合您特定需求的工具。
- en: 'Incorporate Human Feedback: Even the most advanced AI cannot fully replace
    the nuanced understanding of a human editor or beta reader. Ensure your manuscript
    undergoes human review to capture subtleties that AI might miss.'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 结合人类反馈：即使是最先进的AI也无法完全取代人类编辑或测试读者的细微理解。确保您的手稿经过人类审查，以捕捉AI可能错过的细微之处。
- en: USING CONVENTIONAL EDITING TOOLS
  id: totrans-477
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用传统编辑工具
- en: 'AI-powered editing tools like Grammarly, ProWritingAid, and AutoCrit leverage
    advanced algorithms to analyze text for grammar, style, and clarity issues. A
    few of their main features, in addition to their generative AI suggestions, are:'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: Grammarly、ProWritingAid 和 AutoCrit 等AI驱动的编辑工具利用先进的算法来分析文本中的语法、风格和清晰度问题。除了它们的生成AI建议外，它们的一些主要功能还包括：
- en: Catching Typos and Grammatical Errors
  id: totrans-479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 捕捉错别字和语法错误
- en: Improving Sentence Structure and Clarity
  id: totrans-480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进句子结构和清晰度
- en: Enhancing Vocabulary and Style
  id: totrans-481
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升词汇和风格
- en: Another way to proofread your work is to use text-to-audio tools. Having someone
    or something read back your manuscript is a highly effective way for authors to
    catch errors that might be missed when reading text visually. Hearing your words
    can also provide a new perspective on the rhythm and flow of your writing, highlighting
    areas that may need further refinement.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种校对您作品的方法是使用文本到音频工具。让某人或某物朗读您的手稿是作者发现可能通过视觉阅读而遗漏的错误的一种非常有效的方法。听到您的话也可以为您提供对您写作节奏和流畅性的新视角，突出可能需要进一步润色的区域。
- en: MARKETING AND PROMOTIONAL MATERIALS
  id: totrans-483
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 营销和推广材料
- en: Marketing is beyond the scope of this book, but I’ll mention a few obvious uses
    of generative AI.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 营销超出了本书的范围，但我会提到一些生成AI的明显用途。
- en: 'Artwork and Blurbs: AI-driven design tools like [Canva](https://canva.com)
    ⁠[1](#c349.xhtml#a415) or tools powered by DALL-E or Adobe Firefly can generate
    book covers and marketing graphics. AI can also help craft compelling blurbs by
    analyzing successful books in your genre to determine what appeals to readers.'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术作品和简介：由 AI 驱动的设计工具，如 [Canva](https://canva.com) [1](#c349.xhtml#a415) 或由 DALL-E
    或 Adobe Firefly 驱动的工具可以生成书籍封面和营销图形。AI 还可以通过分析你所在领域的成功书籍，确定哪些内容吸引读者，从而帮助撰写引人入胜的简介。
- en: 'Social Media and Blog Content: AI tools can generate social media posts, blog
    articles, and even podcast transcripts that maintain a consistent promotional
    voice for your book.'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体和博客内容：AI 工具可以生成社交媒体帖子、博客文章，甚至播客文稿，以保持你书籍一致的推广声音。
- en: 'Audiobooks and Video Clips: AI voice synthesis technologies can transform your
    manuscript into an audiobook. Similarly, AI video creation platforms enable authors
    to produce book trailers and promotional video clips that can enhance online visibility.'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 有声书和视频片段：AI语音合成技术可以将您的手稿转换为有声书。同样，AI视频创作平台使作者能够制作书籍预告片和推广视频片段，从而增强在线可见性。
- en: 'Comprehensive Marketing Analysis: AI tools can be used to research market trends
    and reader preferences, analyze competitors, and determine what the target audience
    wants.'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 综合营销分析：AI工具可用于研究市场趋势和读者偏好，分析竞争对手，并确定目标受众想要的内容。
- en: The prompting techniques you hone during the story conception and development
    phase will also help you clarify your marketing goals and generate engaging content
    geared toward your target audience. AI technology will be ubiquitous in every
    aspect of your life, and learning to harness it will prove valuable for your success
    in the competitive literary and publishing marketplace.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 在故事构思和开发阶段磨练的提示技巧也将帮助你明确你的营销目标，并生成针对目标受众的吸引人的内容。AI技术将在你生活的各个方面无处不在，学会利用它将对你在竞争激烈的文学和出版市场上取得成功大有裨益。
- en: ​[ ​11​ ]​
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: '[11]'
- en: ADDITIONAL CONSIDERATIONS
  id: totrans-491
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**额外考虑**'
- en: Using AI is an individual choice and should be respected as long as it is used
    ethically. Let’s discuss several top-of-mind issues.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI是个人的选择，只要它被道德地使用，就应该受到尊重。让我们讨论几个当务之急的问题。
- en: 1\. Using generative AI is unethical because it is trained on people’s copyrighted
    work.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 使用生成式AI是不道德的，因为它是在人们的版权作品上训练的。
- en: The ethics of using generative AI are complex, as different language models
    are trained on various datasets. While some LLMs may have been trained on datasets
    that included copyrighted material scraped from the internet, others are trained
    exclusively on licensed data. Therefore, it’s unfair to paint all AI with a broad
    brush. While it is true that some datasets might have included copyrighted material,
    the case law isn’t settled. Previous cases have found that machine learning is
    covered under fair use, similar to when you check out a book from the library
    and read it cover to cover. You learned from the book, but you don’t have a carbon
    copy of the book in your memory, and neither does the LLM. I’m not a lawyer, so
    we’ll see how the cases settle. As an AI user, you can mitigate potential ethical
    concerns by choosing LLMs trained on licensed data.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI的伦理问题很复杂，因为不同的语言模型是在各种数据集上训练的。虽然一些大型语言模型可能是在包含从互联网上抓取的受版权保护材料的数据集上训练的，但其他模型则完全是在授权数据上训练的。因此，不能一概而论地将所有AI视为同一类。虽然确实有些数据集可能包含了受版权保护的材料，但案例法尚未确定。之前的案例发现，机器学习属于合理使用范畴，类似于从图书馆借阅一本书并从头到尾阅读的情况。你从书中学习，但你的记忆中并没有书的碳副本，LLM也是如此。我不是律师，所以我们拭目以待这些案例如何解决。作为AI用户，你可以通过选择在授权数据上训练的LLM来减轻潜在的伦理问题。
- en: 2\. Generative AI enables plagiarism by making it easy for people to plagiarize.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 生成式AI使得抄袭变得容易，从而助长了抄袭行为。
- en: AI language models are powerful tools, but the user is ultimately responsible
    for their use. If you enter a prompt asking the AI to recreate specific content
    or copy and paste someone else’s work into the prompt, you are the one committing
    a potential copyright violation, not the AI. The language model associates words
    based on the input you provide, so any instances of plagiarism or infringement
    result from the user’s actions.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: AI语言模型是强大的工具，但用户最终对其使用负责。如果你输入一个提示要求AI重新创建特定内容或将他人的作品复制粘贴到提示中，那么你是在进行潜在的版权侵犯，而不是AI。语言模型根据你提供的输入关联词语，因此任何抄袭或侵权行为都源于用户的行为。
- en: We should note, however, that occasionally, even without deliberate infringement,
    AI-generated content might produce unintentional similarities with existing works
    due to the vast amount of data used in training. The legal doctrines of fair use
    and transformative works are still being interpreted and applied to AI-generated
    content.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该注意的是，偶尔，即使没有故意侵权，由于训练中使用了大量数据，AI生成的内容可能会无意中与现有作品产生相似之处。合理使用和转换作品的法律原则仍在被解释和应用到AI生成内容上。
- en: Users should also be aware that their prompts may be recorded and stored, potentially
    serving as evidence in future legal cases unless they use a private, offline language
    model. Therefore, it is crucial to use AI responsibly and ethically and understand
    the potential consequences of your actions.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 用户还应该意识到，他们的提示可能被记录并存储，除非他们使用私人离线的语言模型，否则这些提示可能会在未来的法律案件中作为证据。因此，负责任和道德地使用AI至关重要，并了解你行为的潜在后果。
- en: 3\. Using AI could perpetuate potential biases in the AI models.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用AI可能会在AI模型中延续潜在的偏见。
- en: This is true because the biases were in the datasets. These datasets contain
    all known human-recorded text, art, photographs, videos, and audio throughout
    history. The LLM was trained on these datasets and will reflect those biases.
    However, this is where the AI users should provide oversight and take responsibility
    for the output. This is the same if you researched in a library and found biases.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为偏见存在于数据集中。这些数据集包含历史上所有已知的人类记录的文字、艺术、照片、视频和音频。LLM是在这些数据集上训练的，并将反映这些偏见。然而，这是AI用户应该提供监督并承担责任的地方。如果你在图书馆进行研究并发现偏见，情况也是如此。
- en: Some ways to mitigate the impact of biases are to fact-check information and
    seek feedback from diverse perspectives. Any content you produce with AI assistance
    needs to be critically evaluated. When necessary, you can manually edit the output
    to correct any mistakes.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 减缓偏见影响的一些方法是对信息进行事实核查并寻求来自不同观点的反馈。使用AI辅助生产的任何内容都需要进行批判性评估。必要时，你可以手动编辑输出以纠正任何错误。
- en: 4\. You cannot copyright AI-generated work.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 你不能对AI生成的作品进行版权保护。
- en: This varies from country to country. AI-generated writing is already copyrightable
    in some countries, whereas other countries have determined that you may copyright
    arrangement of public domain content. The issue is not settled, but generative
    AI is inside every creative tool or making its way into every tool, and it will
    be a can of worms to determine the “originality” of a particular work. Some countries
    consider AI-generated work in the public domain; however, the arrangement or modifications
    can be copyrighted (with arguments on how much was changed).
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点因国家而异。在一些国家，AI生成的写作已经可以享有版权，而其他国家则认为可以对公共领域内容的编排进行版权保护。这个问题尚未解决，但生成式AI已经存在于每一个创意工具中，或者正在进入每一个工具，确定特定作品的“原创性”将是一个棘手的问题。一些国家认为AI生成的作品属于公共领域；然而，编排或修改可能可以享有版权（关于变化了多少的争论）。
- en: I won’t list any specific country and definition of what is copyrightable and
    what is not because things are changing fast. However, we can look at the case
    of photography for clues on how the copyright issue might be settled.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会列出任何特定国家的具体定义，即什么可以享有版权，什么不可以，因为事情变化很快。然而，我们可以通过观察摄影案例来了解版权问题可能如何解决。
- en: In many jurisdictions, the copyright for a photograph is granted to the person
    who captured the image, regardless of the level of creativity or originality involved
    in the process. This protection is based on factors such as the choice of camera
    angle, timing, and the decision to take the photograph. Similarly, the human input
    involved in creating AI-generated work, such as designing prompts, refining outputs,
    and selecting the final result, could potentially be considered a basis for granting
    copyright protection.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多司法管辖区，照片的版权授予捕捉图像的人，无论在捕捉过程中涉及多少创造性和原创性。这种保护基于诸如相机角度的选择、时机和拍照的决定等因素。同样，在创建AI生成作品过程中涉及的人类输入，如设计提示、完善输出和选择最终结果，可能被视为授予版权保护的基础。
- en: However, it is essential to recognize that the legal landscape surrounding AI-generated
    work is still evolving, and current information may quickly become outdated. Therefore,
    staying informed about the latest developments in copyright law for your jurisdiction
    is essential. Organizations such as the World Intellectual Property Organization
    (WIPO) and national copyright offices can provide up-to-date information and resources
    on the legal status of AI-generated work.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，重要的是要认识到，围绕AI生成作品的法律法规仍在不断发展，当前信息可能很快就会过时。因此，了解你所在司法管辖区版权法的最新发展至关重要。世界知识产权组织（WIPO）和国家版权局等组织可以提供关于AI生成作品法律状态的最新信息和资源。
- en: The increasing integration of AI in creative tools and the rapid advancement
    of AI technologies will likely lead to further discussions and potential changes
    in copyright law. Key areas of focus may include the role of human input in the
    creative process, the concept of originality in the context of AI-generated work,
    and the balance between protecting creators’ rights and fostering innovation in
    the AI space.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: AI在创意工具中的日益融合和AI技术的快速进步可能会引发进一步的讨论和版权法律的潜在变化。关注的重点可能包括创意过程中人类输入的作用、AI生成作品中的原创性概念，以及保护创作者权利与促进AI领域创新之间的平衡。
- en: 5\. How will AI affect the publishing industry?
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 5. AI将如何影响出版行业？
- en: Do you have a crystal ball? My answer is that it will definitely affect the
    publishing industry just like it will affect all aspects of our lives. However,
    I don’t know the immediate or long-term effects. We live in exciting times.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 你有水晶球吗？我的回答是，它肯定会影响出版行业，就像它会影响我们生活的各个方面一样。然而，我不知道立即或长期的影响。我们生活在激动人心的时代。
- en: 6\. Can I build a career as an AI-assisted author?
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 我能否成为一名辅助人工智能的作者？
- en: You sure can. AI can help your productivity, but the stories you tell still
    come from your human individuality. Whether you’re an established or emerging
    author, your success will depend on your storytelling skills, marketing efforts,
    and ability to connect with readers.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 你当然可以。人工智能可以帮助提高你的生产力，但你讲述的故事仍然源自你的人类个性。无论你是资深还是新兴的作者，你的成功将取决于你的故事讲述技巧、营销努力以及与读者的连接能力。
- en: 7\. AI-generated stories are bland and generic.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 人工智能生成的故事平淡且缺乏个性。
- en: This is where prompting makes a difference. If you use generic prompts, you
    will get generic stories. I’m not a big proponent of collecting other people’s
    prompts. Writing unique prompts is the art of putting your soul into the story.
    In addition, filtering, selecting, and revising or using the AI-generated content
    as inspiration or even “what not to do” goes a long way toward making your story
    uniquely yours.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是提示词发挥作用的地方。如果你使用通用的提示词，你会得到通用的故事。我不是一个收集他人提示词的大支持者。编写独特的提示词是将你的灵魂融入故事的艺术。此外，过滤、选择、修改或使用人工智能生成的内容作为灵感，甚至作为“不要做什么”的参考，都有助于使你的故事独一无二。
- en: Early ChatGPT responses tend to be more clichéd and same-sounding. However,
    that was due to the dataset where they scraped the internet and fan fiction sites.
    Now that we have a proliferation of LLMs trained on diverse datasets, we can expect
    a broader range of results. Furthermore, the content you put in your prompts will
    influence generative AI’s output. The more imagination you put in, the more likely
    AI will give you back unique content.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 早期ChatGPT的回应往往更陈词滥调，听起来相似。然而，这主要是因为它们从互联网和同人小说网站上抓取的数据集。现在，由于大量基于多样化数据集训练的LLM（大型语言模型）的涌现，我们可以期待更广泛的结果。此外，你放入提示的内容将影响生成式人工智能的输出。你投入的想象力越多，人工智能给出独特内容的可能性就越大。
- en: As for AI writing sounding the same, that is no longer true. Most people’s notion
    of how AI sounds is based on ChatGPT’s default writing style. We can now fine-tune
    GPT-3.5 to take on an author’s voice. Therefore, in the final analysis, it is
    not AI making the story bland and generic, but the user copying other people’s
    prompt libraries and sounding like everyone else using the same prompts.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 至于人工智能写作听起来相同，这已经不再成立了。大多数人关于人工智能声音的观念是基于ChatGPT的默认写作风格。我们现在可以微调GPT-3.5以采用作者的语气。因此，在最终分析中，使故事平淡且缺乏个性的不是人工智能，而是用户复制他人的提示词库，听起来像其他人使用相同的提示词一样。
- en: Stories should be judged on how well the author’s soul touched your soul, whether
    AI was used or not.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 故事应该根据作者的灵魂如何触动你的灵魂来评判，无论是否使用了人工智能。
- en: ​[ ​12​ ]​
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: '[12]'
- en: RESOURCES AND REFERENCES
  id: totrans-518
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 资源和参考
- en: Even though AI can expand our horizons and appears to have vast knowledge, you,
    as the storyteller, must bring your domain expertise, story-crafting skills, and
    individuality into the story development process. AI can draw on a vast amount
    of word associations, but it needs you to direct it and filter the results.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能可以拓宽我们的视野，看起来拥有丰富的知识，但你作为讲述者，必须将你的领域专业知识、故事创作技巧和个性带入故事发展过程中。人工智能可以调用大量的词汇关联，但它需要你来引导和筛选结果。
- en: As the author, you are the final arbiter of what you use and how you adapt AI
    to your writing process. We talked about creating templates for story structure
    or character development as well as genre-specific scene beats and themes.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 作为作者，你是最终决定使用什么以及如何将人工智能适应到你的写作过程中的仲裁者。我们讨论了为故事结构或角色发展创建模板，以及特定类型的场景节奏和主题。
- en: There are many resources for learning the craft of writing, so I’ll leave you
    with a few here. The Story Grid scene development method is useful for scene briefs
    and John Truby’s books for story structure and genre-specific expectations. To
    preserve the individuality of your stories, I don’t recommend copying anyone’s
    story structure or beat outline. However, knowing the craft and how stories and
    scenes progress, you can create templates tailored to your own work.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 学习写作技巧的资源有很多，所以我在这里给你提供一些。故事网格场景发展方法对场景概述很有用，约翰·特鲁比的书籍适用于故事结构和特定类型的期望。为了保持你故事的独特性，我不建议复制任何人的故事结构或情节大纲。然而，了解技巧以及故事和场景如何发展，你可以创建适合你自己的工作模板。
- en: Reference Material
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 参考材料
- en: 'The Anatomy of Story: 22 Steps to Becoming a Master Storyteller by John Truby
    (use the steps for each section to build up your “Story Dossier”)'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 《故事解剖：成为大师级讲故事者的22步》由约翰·特鲁比著（使用每个部分的步骤来构建你的“故事档案”）
- en: 'Story Engineering: Mastering the 6 Core Competencies of Successful Writing
    by Larry Brooks'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 《故事工程：掌握成功写作的6个核心能力》由拉里·布鲁斯著
- en: 'Blog post: “[The Five Commandments of Storytelling](https://storygrid.com/five-commandments-of-storytelling/)”  ⁠[1](#c349.xhtml#a3TH)  by
    Story Grid Editors'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 博客文章：“[故事讲述的五条诫律](https://storygrid.com/five-commandments-of-storytelling/)”  by
    Story Grid编辑们 ⁠[1](#c349.xhtml#a3TH)
- en: 'Three-Story Method: Editing Your Scenes with ChatGPT by J. Thorn provides a
    detailed method for providing ChatGPT with a rubric and prompts to elicit specific
    feedback.'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 三故事法：使用ChatGPT编辑你的场景 by J. Thorn 提供了一种详细的方法，为ChatGPT提供评分标准和提示，以获得特定的反馈。
- en: The [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[2](#c349.xhtml#a3W3) offers a free course for writers to get started with generative
    AI and other standalone courses designed to get you up to speed and running.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: '[未来虚构学院](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    提供了一门免费课程，帮助作家开始使用生成式AI和其他旨在让你快速入门的课程。 ⁠[2](#c349.xhtml#a3W3)'
- en: Introduction to Basics for Fiction Writing [Free]
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小说写作基础入门 [免费]
- en: How to Prompt AI for Fiction Writing
  id: totrans-529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何提示AI进行小说写作
- en: How to Write a Novella With AI
  id: totrans-530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用AI撰写短篇小说
- en: Genre-Specific Storytelling
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 类型特定叙事
- en: “[John Truby](https://theelementsofwriting.com/truby-beats/)’[s Story Beats
    for 14 Genres](https://theelementsofwriting.com/truby-beats/)”  is a blog post
    that lists genre-specific scene beats for many popular genres. ⁠[3](#c349.xhtml#a435)
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: “[约翰·特鲁比的14种类型的情节节奏](https://theelementsofwriting.com/truby-beats/)” 是一篇博客文章，列出了许多流行类型的特定场景节奏。
    ⁠[3](#c349.xhtml#a435)
- en: 'The Anatomy of Genres: How Story Forms Explain the Way the World Works by John
    Truby is a book that explains the essence of fourteen popular genres, details
    obligatory scenes and character archetypes, and discusses plot points and themes.'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 《类型解剖：故事形式如何解释世界运作的方式》由约翰·特鲁比著，是一本解释十四种流行类型本质的书，详细介绍了必要的场景和人物原型，并讨论了情节点和主题。
- en: Romance Writing Coach (Custom GPT available for ChatGPT Plus subscribers) ([https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach))
    ⁠[4](#c349.xhtml#a471)
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 罗曼史写作教练（为ChatGPT Plus订阅者提供定制GPT）([https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach))
    ⁠[4](#c349.xhtml#a471)
- en: '[Love Stories: Writing a Romance Novella](https://books2read.com/LoveStories)
    for romance-specific plot points and obligatory romance scenes and how to organize
    them in novella form. ⁠[5](#c349.xhtml#a42H)'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: '[爱情故事：撰写罗曼史短篇小说](https://books2read.com/LoveStories) 提供特定于爱情的情节点和必要的爱情场景，以及如何在短篇小说形式中组织它们。
    ⁠[5](#c349.xhtml#a42H)'
- en: '[Dangerous Love: Writing a Romantic Suspense](https://books2read.com/WritingRomanticSuspense)  is
    a guidebook for blending the romance and the suspense plot points and explores
    eight plot types and their essential beats to satisfy sub-genre tropes. ⁠[6](#c349.xhtml#a48X)'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: '[危险的爱情：撰写浪漫悬疑小说](https://books2read.com/WritingRomanticSuspense) 是一本指南，用于融合爱情和悬疑情节点，并探讨了八种情节类型及其基本节奏，以满足子类型陈词滥调。
    ⁠[6](#c349.xhtml#a48X)'
- en: ​[ ​PART 3​ ]​
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: '[第三部分]'
- en: ADVANCED PROMPTING
  id: totrans-538
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高级提示
- en: '![group of writers using power tools](image_rsrc4B9.jpg)'
  id: totrans-539
  prefs: []
  type: TYPE_IMG
  zh: '![一群作家使用动力工具](image_rsrc4B9.jpg)'
- en: ​[ ​13​ ]​
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: '[13]'
- en: PROMPT DESIGN
  id: totrans-541
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示设计
- en: What is a prompt?
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是什么？
- en: It is the request or message you send to the AI or LLM to get a response. A
    prompt is formed with natural language rather than coding language. To talk to
    an LLM or AI model, you frame a request or a question and type it or speak it
    into the model’s input box.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 这是您向AI或LLM发送以获取响应的请求或消息。提示是通过自然语言而不是编码语言形成的。要与LLM或AI模型交流，您需要构建一个请求或问题，并将其输入到模型的输入框中或口头表达。
- en: Since the LLM is a context-based word association tool, your prompt seeds its
    context window with words to associate, directing it to put together a response.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 由于LLM是一个基于上下文的词关联工具，您的提示通过关联的词汇为其上下文窗口播种，指导它组合出一个响应。
- en: As you interact with an LLM, you might discover that the answers you’re getting
    are not what you wanted. Perhaps the LLM didn’t give you enough information, or
    it misunderstood your prompt and went in a different direction. This is where
    prompt engineering or prompt design comes in.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 当您与LLM互动时，您可能会发现您得到的答案并不是您想要的。也许LLM没有提供足够的信息，或者它误解了您的提示并走向了不同的方向。这就是提示工程或提示设计发挥作用的地方。
- en: By carefully constructing prompts, you can get the LLM to return more relevant
    or satisfying results. We’re giving the LLM relevant context to steer it in the
    direction you want it to go. Remember, the GPT is a word association machine,
    and words can mean different things in different contexts.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仔细构建提示，您可以引导LLM返回更相关或令人满意的结果。我们正在为LLM提供相关上下文，以引导它走向您希望的方向。记住，GPT是一个词关联机器，在不同的上下文中，单词可能有不同的含义。
- en: The prompt is your opportunity to include the words and phrases that matter
    to your story. It is a compelling way to differentiate your results from those
    of someone else. I don’t go with those “prompt encyclopedias” that people are
    selling or “secret prompts” playbooks. It’s better to understand the principles
    of prompting and then create prompts that are individualized for your particular
    story or task.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是您在故事中包含重要词汇和短语的机会。这是一种使您的结果与他人结果区分开来的有力方式。我不会选择那些人们正在销售的“提示百科”或“秘密提示”剧本。更好地理解提示原则，然后为您的特定故事或任务创建个性化的提示会更有效。
- en: 'One thing to note: Prompt design does not alter the pre-trained parameters
    in the model. It simply alters the distribution of the likely words to be returned.
    It is easy to do and experiment with. Small changes in the prompt could affect
    significant changes in the results, which is a big positive for creative writing
    or any other application.'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 一点要注意：提示设计不会改变模型的预训练参数。它只是改变了可能返回的单词分布。这很容易做到，并且可以实验。提示中的小变化可能会对结果产生重大影响，这对创意写作或其他任何应用都是一个很大的积极因素。
- en: ​[ ​14​ ]​
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: '[14]'
- en: ELEMENTS OF A BASIC PROMPT
  id: totrans-550
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基本提示的要素
- en: The most basic prompting technique is to provide clear and detailed instructions
    to the LLM so that it can effectively return a response that meets your needs.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 最基本的提示技术是向LLM提供清晰和详细的指令，以便它能够有效地返回满足您需求的响应。
- en: WHO, WHAT, HOW
  id: totrans-552
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谁、什么、如何
- en: Let’s first consider the following questions.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先考虑以下问题。
- en: 'Who: Who are you, and what are you looking for? This provides the context to
    the LLM in terms of the consumer of the result.'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 谁：您是谁，您在寻找什么？这为LLM提供了结果消费者的上下文。
- en: 'What: What are you asking or wanting the LLM to do? This provides the specific
    instruction and any input (or background) data you want the LLM to work on.'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 什么：您要求或希望LLM做什么？这提供了具体的指令和任何您希望LLM处理的输入（或背景）数据。
- en: 'How: This indicates the type of output or response you expect from the LLM.'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 如何：这表明您期望LLM提供哪种类型的输出或响应。
- en: The objective is to communicate your goals clearly to the LLM so that you receive
    an accurate and relevant output.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是清楚地传达您的目标给LLM，以便您收到准确和相关的输出。
- en: Here is an example.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子。
- en: <Prompt>
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: <Prompt>
- en: I am a developmental editor who drafts emails for my romance writing clients.
    Please suggest several eye-catching email titles that will enhance my open rate.
    This is the email I’m sending [copy and paste the email into the prompt]. I want
    the style to be punchy and upbeat.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一名发展编辑，为我的浪漫写作客户起草电子邮件。请建议几个吸引眼球的电子邮件标题，以提高我的打开率。这是我即将发送的电子邮件[将电子邮件复制粘贴到提示中]。我希望风格要活泼、积极。
- en: </Prompt>
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: </Prompt>
- en: 'This prompt is more specific than the first prompt you likely would have entered:'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示比您可能输入的第一个提示更具体：
- en: <Prompt>
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: <Prompt>
- en: Please give me a good title for this email [copy and paste the email into the
    prompt].
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 请给我这封电子邮件一个好的标题[将电子邮件复制粘贴到提示中]。
- en: </Prompt>
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: </Prompt>
- en: Another way of prompting is to add an audience and their needs with a motivational
    goal you want to obtain. This gives you more input on what you want and suggests
    the “how” to appeal to that audience and their needs.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种提示方式是添加一个受众及其需求，以及你想要实现的动力目标。这为你提供了更多关于你想要什么的输入，并建议了如何吸引那个受众及其需求。
- en: <Prompt>
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: <Prompt>
- en: I am a marketing consultant conducting a workshop on how to use social media
    to generate organic leads for small business owners interested in expanding their
    customer base and enhancing their brand visibility online. Write an engaging email
    to motivate the client to attend my workshop [copy and paste workshop agenda].
    Use a friendly tone of voice.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一位市场营销顾问，正在举办一个研讨会，教小企业主如何利用社交媒体生成有机线索，扩大客户群并提升在线品牌知名度。请为我写一封吸引人的电子邮件，激励客户参加我的研讨会[复制粘贴研讨会日程]。请使用友好的语气。
- en: </Prompt>
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: </Prompt>
- en: TEMPLATE-BASED PROMPTING
  id: totrans-570
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于模板的提示
- en: Additional information could be included as a template. The LLM “gets” that
    a colon suggests information for it to fill in.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 可以作为模板包含额外信息。LLM“理解”到冒号意味着它需要填写的信息。
- en: Here is an example of giving the AI a “template” to fill out.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个给AI提供“模板”来填写的例子。
- en: <Prompt>
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: <Prompt>
- en: I am writing a compelling and engaging product description for a book that readers
    can’t put down. Please write me a bestselling product description blurb for a
    contemporary romance with the following elements.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在为读者难以放下的书籍撰写引人入胜的产品描述。请为我写一段畅销的当代浪漫小说产品描述摘要，包含以下元素。
- en: 'The hook between the protagonists:'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 主角之间的吸引力：
- en: 'Initial attraction and conflict:'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 初次吸引和冲突：
- en: 'Intriguing elements that pique romance reader interest:'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 激起浪漫读者兴趣的有趣元素：
- en: 'Main crisis point and conflict dynamics:'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 主要危机点和冲突动态：
- en: 'What’s at risk:'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 风险：
- en: Here is the story summary for you to analyze {copy and paste in story summary}.
    Please limit the output to less than 1000 words.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是故事摘要供你分析{复制粘贴故事摘要}。请将输出限制在1000字以内。
- en: </Prompt>
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: </Prompt>
- en: The key to remember is that any LLM, just like an intern or assistant, will
    give you better results when you lay out specific details and expectations. Fortunately,
    prompting can be iterative, and you can improve on the results by telling the
    LLM what you liked and didn’t like. But the Who, What, How technique sets the
    stage for effective prompting.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 要记住的关键是，任何LLM，就像实习生或助理一样，当你提供具体的细节和期望时，会给你更好的结果。幸运的是，提示可以是迭代的，你可以通过告诉LLM你喜欢什么和不喜欢什么来改进结果。但“谁、什么、如何”技巧为有效的提示奠定了基础。
- en: POSITIVE PROMPTING
  id: totrans-583
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 积极提示
- en: By telling the AI what you’re looking for and how you want the results, you
    are aiding its ability to construct the answers that may prove more useful to
    you. Positive feedback gives you better results because the LLM is a word-association
    engine. For example, if you tell it what you don’t like, those words end up in
    its context window.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 通过告诉AI你想要什么以及你想要的结果，你正在帮助它构建可能对你更有用的答案。积极的反馈给你更好的结果，因为LLM是一个词关联引擎。例如，如果你告诉它你不喜欢什么，那些词最终会出现在它的上下文窗口中。
- en: We’ve all had the experience of telling a child, “Don’t touch the cookies or
    leave your socks on the floor or eat before washing your hands,” only to find
    out that the child did everything you told it not to do. This is because the tiny
    word “don’t” did not register as much as the rest of your commands. The same is
    true with AI, where you’re essentially stuffing its context window with everything
    you don’t want it to do.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都有过告诉孩子“不要碰饼干，不要把袜子扔在地上，不要洗手前吃东西”，结果发现孩子做了你告诉它不要做的事情的经历。这是因为小小的词“不要”并没有像你的其他命令那样引起注意。在AI中也是如此，你实际上是在用你不想让它做的事情填充它的上下文窗口。
- en: For example, saying “show, don’t tell, and don’t use flowery language and too
    many adverbs and dialogue tags” doesn’t work as well as stating your commands
    in positive terms. Instead of “show, don’t tell,” try saying, “Describe the progression
    of the scene in detailed action and dialogue.” Similarly, “don’t use flowery language”
    does not work as well as “write with a direct tone using simplistic language.”
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，说“展示，不要讲述，不要使用华丽的语言和过多的副词和对话标签”并不如用积极的术语陈述你的命令有效。与其说“展示，不要讲述”，不如尝试说，“详细描述场景的进展，包括动作和对话。”同样，“不要使用华丽的语言”也不如“用直接的语言风格简洁地写作”有效。
- en: REMINDER PROMPTS
  id: totrans-587
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提醒提示
- en: As the conversation progresses, the LLM may “forget” things you discussed earlier.
    This happens because the earlier words have fallen outside the context window,
    or “memory.” You will have to refresh the information you give it by reminding
    it or regularly summarizing the results of your discussion to keep that information
    fresh.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 随着对话的进行，LLM可能会“忘记”之前讨论的内容。这是因为早期的词语已经超出了上下文窗口，或者说“记忆”。您将通过提醒或定期总结讨论结果来刷新您提供的信息，以保持这些信息的时效性。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-589
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: As you can see, improved prompt design or engineering can do a lot. Skillful
    prompting saves editing time since you get results that are more suited to your
    needs.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，改进的提示设计或工程可以做到很多。熟练的提示可以节省编辑时间，因为您得到的结果更适合您的需求。
- en: ​[ ​15​ ]​
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: '[15]'
- en: ROLE-BASED PROMPTS
  id: totrans-592
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于角色的提示
- en: Role-playing is a method that can get an actor into character. As a fiction
    author, you might have used role-playing or personas to either interview your
    characters or get into your character’s head. This method also works with an LLM.
    For example, if you want the AI to act as a therapist, you’d like to push it in
    the direction of therapy terminology and associations. This makes the AI access
    those word sequences better aligned with your goals.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演是一种可以让演员进入角色的方法。作为一名小说作家，您可能已经使用角色扮演或人格来采访您的角色或进入角色的内心世界。这种方法也适用于LLM。例如，如果您想让AI扮演治疗师，您会希望将其推向治疗术语和关联的方向。这使得AI更好地访问与您的目标更一致的词语序列。
- en: By assigning a specific role or persona to the AI, you provide a clear framework
    for its responses. Role-based prompts are also flexible. You can refine the role
    as you go by nudging it in the direction it gives you based on its responses.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为AI分配一个特定的角色或人格，您为它的回答提供了一个清晰的框架。基于角色的提示也是灵活的。您可以通过根据其回答引导它来调整角色。
- en: Want to brainstorm ideas for a gritty dystopian thriller? Assign your AI the
    role of a seasoned post-apocalyptic fiction editor with a knack for dark, twisted
    plots. Need help fleshing out the intricate magic system for your epic fantasy
    series? Cast your AI as a veteran fantasy world-builder with a deep understanding
    of the genre’s tropes and traditions.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 想要为粗糙的反乌托邦惊悚片构思想法吗？将您的AI分配为经验丰富的后末日小说编辑角色，擅长黑暗、扭曲的情节。需要帮助完善您史诗奇幻系列中错综复杂的魔法体系吗？将您的AI扮演为对类型陈词滥调和传统有深刻理解的资深奇幻世界构建者。
- en: You’re essentially seeding the AI’s context window with words relevant to the
    desired results. You’ll also be surprised how agile today’s advanced LLMs can
    adapt to a role.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 您实际上是在用与期望结果相关的词语填充AI的上下文窗口。您也会惊讶于今天先进的LLM如何能够适应一个角色。
- en: THE ADVANTAGES OF ROLE-BASED INSTRUCTIONS
  id: totrans-597
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于角色指令的优势
- en: 'Compared to plain vanilla prompts, which state a request or ask a question,
    role-based prompts offer several key advantages:'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 与简单的请求或提问的提示相比，基于角色的提示提供了几个关键优势：
- en: 'Clarity and Focus: A role allows the LLM to focus on the results you want.
    It also adds to the specificity of good prompting. For instance, instead of asking,
    “Write a scene about a conflict,” you can instruct the AI to “Act as a screenwriter
    and write a tense scene where the protagonist confronts the antagonist, building
    towards a dramatic climax.”'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰性与专注性：一个角色允许LLM专注于您想要的结果。它还增加了良好提示的特定性。例如，您可以通过指示AI“扮演编剧，写一个紧张的场景，其中主角面对反派，逐步走向戏剧性的高潮”来代替简单地询问“写一个冲突的场景”。
- en: 'Expertise and Authority: Role-based prompts allow you to leverage the AI’s
    knowledge and capabilities within specific domains. By assigning roles such as
    “expert historian,” “experienced detective,” or “renowned scientist,” you tap
    into the AI’s vast universe of training data and guide it to provide responses
    that reflect that expertise.'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 专业知识与权威性：基于角色的提示允许您利用AI在特定领域的知识和能力。通过分配诸如“专家历史学家”、“经验丰富的侦探”或“著名科学家”等角色，您就可以利用AI庞大的训练数据宇宙，并引导它提供反映该专业知识的回答。
- en: 'Perspective and Voice: Role-playing prompts enable you to explore different
    perspectives and voices within your story. You can instruct the AI to act as a
    specific character, a narrator with a particular tone, or even an inanimate object,
    gaining valuable insights and enriching your narrative with diverse viewpoints.
    You can also add details about the role. Instead of asking your AI to “act as
    a romance novelist,” try something like: “You are a bestselling romance author
    with a penchant for witty banter and slow-burn relationships. You have a knack
    for crafting swoon-worthy heroes and relatable heroines. Provide feedback on my
    character dynamics and suggest ways to build romantic tension.”'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 视角和声音：基于角色的提示使你能够在故事中探索不同的视角和声音。你可以指示AI扮演一个特定的角色，一个具有特定语调的叙述者，甚至是一个无生命的物体，从而获得宝贵的见解，并用不同的观点丰富你的叙事。你还可以添加关于角色的细节。与其要求你的AI“扮演一位浪漫小说家”，不如尝试像这样：
    “你是一位畅销的浪漫小说作家，擅长机智的对话和缓慢升温的关系。你擅长塑造令人倾倒的英雄和令人同情的女主角。请对我的角色动态提供反馈，并建议构建浪漫紧张感的方法。”
- en: 'Consistency and Coherence: Assigning a consistent role to the AI throughout
    your project helps maintain coherence in its responses and ensures its outputs
    align with the overall tone and style of your story. You can do this in each thread
    of a chat, but be sure to repeat the role-based prompt every so often. If you
    have ChatGPT 4, you can place your role-based prompt in the Custom Instructions.
    However, don’t forget to turn it off if you start another conversation for another
    project. It is a bit of a pain, so I just put it in the chat every so often, and
    this allows me to refine the role as the chat proceeds.'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性和连贯性：在整个项目中为AI分配一个一致的角色有助于保持其回答的一致性，并确保其输出与故事的整体语气和风格保持一致。你可以在聊天中的每个线程中这样做，但务必不时重复基于角色的提示。如果你有ChatGPT
    4，你可以在自定义指令中放置你的基于角色的提示。然而，如果你开始另一个项目的另一个对话，别忘了将其关闭。这有点麻烦，所以我只是不时地将它放在聊天中，这样我就可以随着聊天的进行而细化角色。
- en: 'Creative Exploration: Role-based prompts can spark new ideas and push the boundaries
    of your creativity. By challenging the AI to think outside the box and adopt different
    personas, you may discover unexpected narrative twists, character motivations,
    or world-building elements.'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 创意探索：基于角色的提示可以激发新想法并拓宽你的创造力边界。通过挑战AI跳出思维定势并采用不同的角色，你可能会发现意想不到的叙事转折、角色动机或世界构建元素。
- en: EXAMPLES OF ROLE-BASED PROMPTS IN ACTION
  id: totrans-604
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于角色的提示在实际中的应用示例
- en: 'World-Building: “Act as a medieval cartographer and describe the layout of
    a bustling port city, including its key landmarks, trade routes, and defensive
    fortifications.”'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建：“扮演一位中世纪地图绘制者，描述一个繁忙港口城市的布局，包括其关键地标、贸易路线和防御工事。”
- en: 'Character Development: “Imagine you are a renowned psychologist. Analyze the
    protagonist’s motivations and inner conflicts, considering their past experiences
    and current challenges.”'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：“想象你是一位著名的心理学家。分析主角的动机和内心冲突，考虑他们的过去经历和当前挑战。”
- en: 'Plot Development: “Take on the role of a seasoned mystery writer and suggest
    three possible suspects for the crime, each with a compelling motive and alibi.”'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 情节发展：“扮演一位经验丰富的悬疑小说家，为犯罪提出三个可能的嫌疑人，每个嫌疑人都有令人信服的动机和不在场证明。”
- en: 'Scene Writing: “Become a film director and write a scene where the protagonist
    escapes from a high-security prison, focusing on suspenseful pacing and vivid
    descriptions of the environment.”'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 场景写作：“成为一名电影导演，编写一个主角从高度安全的监狱逃脱的场景，重点关注悬疑的节奏和环境的生动描述。”
- en: WHY GENRE FICTION AUTHORS SHOULD EMBRACE ROLE-BASED PROMPTS
  id: totrans-609
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么类型小说作家应该拥抱基于角色的提示
- en: 'Genre fiction, with its established conventions and reader expectations, presents
    unique opportunities for leveraging role-based prompts. Here’s why:'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 类型小说，由于其既定的传统和读者期望，为利用基于角色的提示提供了独特的机会。以下是原因：
- en: 'Genre-Specific Expertise: By assigning roles that align with your chosen genre,
    you can tap into the AI’s knowledge of genre tropes, character archetypes, and
    common plot structures.'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 类型特定专业知识：通过分配与所选类型相符的角色，你可以利用AI对类型陈词滥调、角色原型和常见情节结构的知识。
- en: 'World-Building Authenticity: Role-based prompts can help create immersive and
    believable worlds by drawing on the AI’s understanding of historical settings,
    futuristic technologies, or fantastical elements.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建的真实性：基于角色的提示可以通过利用AI对历史背景、未来技术或奇幻元素的理解，帮助创建沉浸式且可信的世界。
- en: 'Character Archetypes and Development: Guide the AI to explore different character
    archetypes within your genre, ensuring your cast resonates with readers’ expectations
    while also offering fresh and engaging personalities.'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 角色原型和发展：引导AI探索你所在流派中的不同角色原型，确保你的角色阵容与读者的期望产生共鸣，同时提供新鲜和吸引人的个性。
- en: 'Plot Twists and Suspense: Utilize role-playing to explore alternative plot
    lines, generate suspenseful scenarios, and surprise readers with unexpected twists
    that adhere to genre conventions.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 情节转折和悬念：利用角色扮演来探索替代情节线，生成悬疑场景，并以符合流派惯例的意外转折来惊喜读者。
- en: SYSTEM INSTRUCTIONS
  id: totrans-615
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统指令
- en: Most chatbots do not have system instructions, but I want to mention it here
    because they are instructions used by some LLMs as an overriding “global” instruction
    to the LLM about the role they are playing, tone or style of the output, or any
    additional rules or guidance. See [Chapter 25 for more on System Prompts](#c1EN.xhtml).
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数聊天机器人没有系统指令，但我想要在这里提一下，因为它们是一些LLM（大型语言模型）用作对LLM角色、输出语调或风格或任何额外规则或指导的覆盖“全局”指令。详见[第25章关于系统提示的更多信息](#c1EN.xhtml)。
- en: If you are using an interface, such as Google AI Studio, that allows you to
    put in a System Instruction or System Message, then placing the role into that
    box means you don’t have to keep repeating it for every prompt.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是允许你输入系统指令或系统消息的界面，例如Google AI Studio，那么将角色放入该框意味着你不必为每个提示重复它。
- en: Otherwise, you will need to remind the LLM every so often what role it is playing.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 否则，你将需要不时提醒LLM它正在扮演的角色。
- en: ​[ ​16​ ]​
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: '[16]'
- en: ITERATIVE PROMPTING
  id: totrans-620
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 迭代提示
- en: As writers, we’re masters of using dialogue to elicit information. That is why
    iterative prompting is natural for us. At its core, iterative prompting is a conversation—a
    back-and-forth exchange between you, the author, and your AI writing partner.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 作为作家，我们是使用对话来获取信息的大师。这就是为什么迭代提示对我们来说很自然。从本质上讲，迭代提示是一种对话——你、作者和你的AI写作伙伴之间的来回交流。
- en: You provide a prompt and then evaluate the responses. You then give feedback
    to the AI and refine subsequent prompts. It’s an intuitive process that mirrors
    the process of writing and editing. This iterative process allows authors to collaborate
    with the AI, gradually shaping the generated content to align with their creative
    vision and achieve the desired results.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 你提供提示并评估响应。然后你对AI给出反馈，并细化后续的提示。这是一个直观的过程，反映了写作和编辑的过程。这种迭代过程允许作者与AI协作，逐步塑造生成内容以符合他们的创意愿景并达到预期结果。
- en: All by asking clarifying questions.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 只需通过提出澄清问题。
- en: ADVANTAGES OF ITERATIVE PROMPTING
  id: totrans-624
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迭代提示的优势
- en: 'Gradual Learning Curve: Iterative prompting allows authors to start with simple
    prompts and gradually increase complexity as they become more comfortable with
    the AI and its capabilities.'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 逐渐的学习曲线：迭代提示允许作者从简单的提示开始，随着他们对AI及其功能的熟悉程度的提高，逐渐增加复杂性。
- en: 'Flexibility and Control: The iterative approach empowers authors to maintain
    control over the AI’s output and steer the direction of the generated content,
    which can be reassuring for those new to using AI.'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 灵活性和控制：迭代方法赋予作者对AI输出的控制权，并引导生成内容的方向，这对那些刚开始使用AI的人来说可能是有保证的。
- en: 'Refining Ideas and Concepts: Through iteration, authors can gradually refine
    their story ideas, character development, and world-building elements, exploring
    different possibilities and discovering new directions with AI’s assistance.'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼想法和概念：通过迭代，作者可以逐渐精炼他们的故事想法、角色发展和世界构建元素，在AI的帮助下探索不同的可能性并发现新的方向。
- en: 'Improving Accuracy and Relevance: By evaluating the AI’s responses and adjusting
    prompts accordingly, authors can ensure the generated content is accurate, relevant
    to the story, and consistent with the established narrative.'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 提高准确性和相关性：通过评估AI的响应并相应调整提示，作者可以确保生成的内容准确、与故事相关，并与既定的叙述保持一致。
- en: 'Training the AI within its Context Window: By giving the LLM feedback, iterative
    prompts allow the user to influence the AI’s results within its context window.
    Of course, this “training” is not permanent because the GPTs are “pre-trained.”
    However, by refining your prompts, you are showing the LLM what you currently
    desire.'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 在其上下文窗口内训练AI：通过给出LLM反馈，迭代提示使用户能够影响AI在其上下文窗口内的结果。当然，这种“训练”不是永久的，因为GPTs是“预训练”的。然而，通过精炼你的提示，你正在向LLM展示你当前的需求。
- en: STEPS IN THE ITERATIVE PROMPTING PROCESS
  id: totrans-630
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迭代提示过程步骤
- en: 'Initial Prompt: Start with a clear and concise prompt that conveys your basic
    idea or request.'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：从一个清晰简洁的提示开始，传达你的基本想法或请求。
- en: 'Evaluation: Analyze the AI’s response, considering its strengths, weaknesses,
    and alignment with your vision.'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：分析 AI 的响应，考虑其优点、缺点以及与您愿景的一致性。
- en: 'Refinement: Based on your evaluation, refine your next prompt to provide additional
    guidance, clarify expectations, or redirect the AI’s focus.'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼：根据您的评估，精炼您的下一个提示，以提供额外的指导、阐明期望或重新引导 AI 的焦点。
- en: 'Iteration: Repeat steps 2 and 3, continuing the cycle of evaluation and refinement
    until you achieve the desired results.'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代：重复步骤 2 和 3，继续评估和精炼的循环，直到达到期望的结果。
- en: EXAMPLES OF ITERATIVE PROMPTING
  id: totrans-635
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迭代提示的示例
- en: 'Initial Prompt: “Describe a strong and independent female character.”'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 初始提示：“描述一个强大而独立的女性角色。”
- en: 'AI Response: [redacted]'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: AI 响应：[已删除]
- en: 'Follow-up Prompt: “With this description, please layer three short-term goals
    that Anya has and her motivations for those goals.”'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 跟进提示：“根据这个描述，请列出 Anya 的三个短期目标和实现这些目标的原因。”
- en: 'AI Response: [redacted]'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: AI 响应：[已删除]
- en: 'Followup Prompt: “Looking at her goals and motivations, what sorts of conflicts
    will stymie her, and how will she react?”'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 跟进提示：“观察她的目标和动机，哪些冲突会阻碍她，她会如何反应？”
- en: 'AI Response: [redacted]'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: AI 响应：[已删除]
- en: 'Follow-up Prompt: “These are great; however, you’ve only shown positive reactions
    to these conflicts. To create a well-rounded and interesting character, Anya will
    need some flaws or areas of emotional growth. Please rephrase her approaches to
    these conflicts in a way that highlights a flaw in her character and how each
    conflict can help her overcome the flaw and turn a weakness into a strength.”'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 跟进提示：“这些很好；然而，你只展示了对这些冲突的积极反应。为了创造一个全面而有趣的角色，Anya 需要一些缺点或情感成长的空间。请重新表述她对这些冲突的处理方式，以突出她的性格缺陷以及每个冲突如何帮助她克服缺陷，将弱点转化为优势。”
- en: 'AI Response: [redacted]'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: AI 响应：[已删除]
- en: Now we’re getting somewhere. We don’t have a “perfect protagonist” who excels
    in every endeavor.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们正在取得进展。我们没有一个“完美的主角”，在每一个方面都表现出色。
- en: 'Follow-up Prompt: “Great. Now that you know Anya’s strengths, weaknesses, and
    emotional tenor, please design a love interest who can bring out both the best
    and worst in her.”'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 跟进提示：“很好。现在你了解了 Anya 的优点、缺点和情感基调，请设计一个能够激发她最好和最坏方面的恋爱对象。”
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-646
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: As you can see, iterative prompting is intuitive and natural for a writer, and
    I suspect you already do this naturally. Combining it with specificity, details,
    and role-playing will help you get results shaped to your creative vision.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，迭代提示对作家来说是直观且自然的，我怀疑您已经自然而然地这样做。结合具体性、细节和角色扮演将有助于您得到符合您创意愿景的结果。
- en: Tips for Effective Iterative Prompting
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 有效迭代提示的技巧
- en: 'It’s important to approach it with intention and strategy to get the most out
    of iterative prompting. Here are some best practices to keep in mind:'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要有意和有策略地处理，以充分利用迭代提示。以下是一些最佳实践，请记住：
- en: '1\. Start with a clear goal: Use the best practices we discussed before, with
    who, what, how, and role-playing to give the AI the best context. Are you looking
    to flesh out a character’s backstory? Brainstorm plot twists? Enrich your story’s
    setting. A specific focus will help guide your prompts and keep the iterative
    process on track.'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从一个明确的目标开始：使用我们之前讨论的最佳实践，包括谁、什么、如何和角色扮演，为 AI 提供最佳上下文。你是想完善角色的背景故事？构思情节转折？丰富故事背景？具体的焦点将有助于指导你的提示并保持迭代过程的方向。
- en: '2\. Be specific in your feedback and follow-up prompts: When evaluating the
    AI’s responses, provide clear and constructive feedback. Highlight what you like
    and what you don’t, and be specific about what you’d like to see more or less
    of in future iterations. The more guidance you can give, the better the AI can
    learn and adapt to your preferences.'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在反馈和跟进提示中要具体：当评估 AI 的响应时，提供清晰和建设性的反馈。指出你喜欢和不喜欢的地方，并具体说明你希望在未来的迭代中看到更多或更少的内容。你能提供的指导越多，AI
    就能更好地学习和适应你的偏好。
- en: '3\. Embrace experimentation: Don’t be afraid to try different approaches and
    techniques. Prompt the AI to explore your story from different angles or perspectives.
    Ask it to emulate different writing styles or genres. The beauty of iterative
    prompting is that you can continually refine and course-correct as needed.'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 拥抱实验：不要害怕尝试不同的方法和技巧。提示AI从不同的角度或视角探索你的故事。要求它模仿不同的写作风格或类型。迭代提示的美妙之处在于，你可以根据需要不断改进和调整。
- en: '4\. Trust the process: Iterative prompting is a journey, not a destination.
    It takes time and patience to sculpt your story into its final form. Embrace the
    messiness and uncertainty of the process, and trust that each iteration brings
    you one step closer to the story you want to tell.'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: '4. 信任过程：迭代提示是一个旅程，而不是目的地。将你的故事雕刻成最终形式需要时间和耐心。接受过程的混乱和不确定性，并相信每一次迭代都让你更接近你想要讲述的故事。 '
- en: Iterative prompting is a powerful technique for collaborating with AI and shaping
    its outputs to align with your creative vision. By embracing this dynamic and
    interactive approach, you can unlock the full potential of AI as a writing partner
    and elevate your storytelling to new heights.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示是与AI协作并调整其输出以符合你创意愿景的强大技术。通过采用这种动态和交互式方法，你可以充分发挥AI作为写作伙伴的潜力，并将你的故事叙述提升到新的高度。
- en: ​[ ​17​ ]​
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: '[17]'
- en: PROMPT CHAINING
  id: totrans-656
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示链
- en: Have you ever told your child to clean their room only to find that the results
    weren’t what you expected? That is because you gave the child a complex task with
    many moving parts and did not break it down to what “clean your room” meant or
    looked like.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾经告诉你的孩子打扫他们的房间，却发现结果并不如你所预期？这是因为你给了孩子一个包含许多变动部分的任务，而没有将其分解为“打扫房间”意味着什么或看起来像什么。
- en: Managers often experience the same “lack of results” from their workers when
    they assign a complex task to an intern or new employee, and the same thing happens
    with enthusiastic AI assistants when asked to do a task. The management technique
    that involves breaking down a complex task into smaller, step-by-step tasks is
    called Work Breakdown Structure (WBS).
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 经理们在分配复杂任务给实习生或新员工时，经常会从他们的员工那里体验到同样的“缺乏结果”。当要求热情的AI助手完成任务时，也会发生同样的事情。涉及将复杂任务分解成更小、逐步任务的管管理技术被称为工作分解结构（WBS）。
- en: We can do the same process by prompt chaining, where a complex prompt is broken
    down into a series of interconnected prompts to guide the AI model through a logical
    thought process and achieve more comprehensive and accurate results.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过提示链来完成同样的过程，即将一个复杂的提示分解成一系列相互关联的提示，以引导AI模型通过逻辑思维过程，实现更全面和准确的结果。
- en: Prompt chaining is like a step-by-step recipe. It gives instructions to the
    AI in smaller and more specific steps. For example, prompt chains help LLMs think
    through a mathematical word problem. This is also how children are taught to approach
    word problems without “skipping steps.”
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链就像一个逐步的食谱。它以更小、更具体的步骤向AI提供指令。例如，提示链帮助LLM思考数学文字问题。这也是孩子们被教导如何处理文字问题而不“跳过步骤”的方式。
- en: Prompt chains in fiction might involve asking the LLM to construct a rough sketch
    of a setting and then returning to fill in the details. Remember, a prompt chain
    is a predetermined sequence. It does not vary with the evaluation of the AI’s
    response.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 在小说中的提示链可能包括要求LLM构建一个场景的草图，然后返回来填充细节。记住，提示链是一个预定的序列。它不会随着AI响应的评估而变化。
- en: Breaking down a task into smaller, interconnected tasks is a method for obtaining
    a richer final result. For example, if you asked AI to describe a cat, it would
    give you a generic description. Using a logical sequence of steps, you can encourage
    the AI’s outputs to remain consistent and coherent and go to greater depth and
    detail.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 将任务分解成更小、相互关联的任务是一种获得更丰富最终结果的方法。例如，如果你要求AI描述一只猫，它可能会给出一个通用的描述。通过逻辑步骤的顺序，你可以鼓励AI的输出保持一致性和连贯性，并深入到更详细和具体的层面。
- en: Elizabeth Ann West taught prompt chaining early on, and many of the ideas in
    this section come from her methods.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 伊丽莎白·安·韦斯特早期就教授了提示链，本节中的许多想法都来自她的方法。
- en: BENEFITS OF PROMPT CHAINING
  id: totrans-664
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示链的**好处**
- en: 'Exploring Complex Ideas: By breaking down a broad concept into smaller components,
    you can delve deeper into specific aspects of your story, such as character motivations,
    world-building details, or plot intricacies.'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 探索复杂想法：通过将一个广泛的概念分解成更小的组成部分，你可以深入到故事的具体方面，如角色动机、世界构建细节或情节复杂性。
- en: 'Generating Creative Solutions: Prompt chains can help the AI model explore
    multiple possibilities and generate creative solutions to narrative challenges,
    such as overcoming plot holes or developing unique character arcs.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 生成创造性解决方案：提示链可以帮助AI模型探索多种可能性，并为叙事挑战（如克服情节漏洞或发展独特的角色弧线）生成创造性解决方案。
- en: 'Maintaining Coherence and Consistency: The step-by-step approach ensures that
    the AI’s responses remain connected and consistent with the overall story concept,
    avoiding contradictory or irrelevant outputs.'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 保持连贯性和一致性：逐步方法确保AI的响应与整体故事概念保持连贯和一致，避免矛盾或不相关的输出。
- en: 'Identify and Solve Problems in Piece of Prose: Asking the AI to first identify
    or critique a piece of prose and then fix it or rewrite it gives the LLM clarity
    on what it is supposed to do at each step.'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 识别并解决散文中的问题：要求AI首先识别或评论一段散文，然后修复或重写它，这有助于LLM在每个步骤中明确其应执行的操作。
- en: HOW TO USE PROMPT CHAINING
  id: totrans-669
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何使用提示链
- en: 'Identify the Core Concept: Start with the main idea or question you want to
    explore. Give as much detail as possible using the Who, What, How, and other Prompting
    techniques.'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 确定核心概念：从你想探索的主要想法或问题开始。尽可能详细地使用谁、什么、如何和其他提示技巧。
- en: 'Break Down the Concept: Divide the core concept into smaller, more manageable
    steps or sub-questions. These steps should follow a logical sequence and build
    upon each other.'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 分解概念：将核心概念分解为更小、更易于管理的步骤或子问题。这些步骤应遵循逻辑顺序，并相互构建。
- en: 'Create Prompts for Each Step: Formulate individual prompts for each step in
    the chain, ensuring they are clear, concise, and relevant to the overall concept.'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 为每个步骤创建提示：为链中的每个步骤制定单独的提示，确保它们清晰、简洁且与整体概念相关。
- en: 'Feed the Prompts Sequentially: Provide the prompts to the AI model one at a
    time, allowing it to build upon the previous response and develop a chain of thought.'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序提供提示：一次向AI模型提供一个提示，允许它基于之前的响应构建思维链。
- en: 'Evaluate and Refine: Analyze the AI’s responses at each step and adjust the
    subsequent prompts to ensure the chain of thought remains on track and aligns
    with your goals.'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 评估和改进：分析AI在每个步骤的响应，并调整后续提示，以确保思维链保持一致并符合你的目标。
- en: EXAMPLES OF PROMPT CHAINS FOR FICTION WRITING
  id: totrans-675
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 小说写作中提示链的示例
- en: <prompt chain>
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: <prompt chain>
- en: 'Let’s develop a well-rounded character for a fiction story. Follow these steps:'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为小说故事塑造一个全面发展的角色。遵循以下步骤：
- en: 1\. Generate a brief character description, including name, age, occupation,
    and key personality traits.
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 生成一个简短的角色描述，包括姓名、年龄、职业和关键性格特征。
- en: 2\. Provide a detailed backstory for the character, focusing on pivotal moments
    and experiences that shaped their personality.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为角色提供详细的历史背景，重点关注塑造其个性的关键时刻和经历。
- en: 3\. Describe the character’s primary goal or motivation in the story.
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 描述角色在故事中的主要目标或动机。
- en: 4\. Discuss potential conflicts or obstacles the character may face in pursuing
    their goal.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 讨论角色在追求目标过程中可能面临的潜在冲突或障碍。
- en: 5\. Outline how the character might grow or change throughout the story.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 概述角色在整个故事中可能如何成长或改变。
- en: </prompt chain>
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: </prompt chain>
- en: <prompt chain>
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: <prompt chain>
- en: 'Help me brainstorm a plot for a mystery novel using the following steps:'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助我使用以下步骤为悬疑小说构思情节：
- en: 1\. Generate a crime or mystery that will be the story’s central focus.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 生成一个将成为故事中心焦点的犯罪或谜团。
- en: 2\. Introduce the main characters involved in the mystery, including the protagonist,
    antagonist, and any suspects.
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 介绍参与谜团的 主要角色，包括主角、反派和任何嫌疑人。
- en: 3\. Provide a list of potential clues or evidence to help solve the mystery.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 提供可能帮助解决谜团的线索或证据列表。
- en: 4\. Describe the primary settings where the story will take place.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 描述故事将发生的首要场景设置。
- en: 5\. Outline a series of plot twists or revelations to keep readers engaged throughout
    the story.
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 概述一系列情节转折或揭示，以保持读者在整个故事中的兴趣。
- en: 6\. Suggest possible resolutions or outcomes for the mystery.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 提出可能的谜团解决方案或结局。
- en: </prompt chain>
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: </prompt chain>
- en: <prompt chain>
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: <prompt chain>
- en: 'Let’s create a vivid and immersive fantasy world for a novel. Follow these
    steps:'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为小说创造一个生动而沉浸式的幻想世界。遵循以下步骤：
- en: 1\. Describe the general landscape and geography of the world, including any
    notable landmarks or natural wonders.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 描述世界的总体景观和地理，包括任何显著的地标或自然奇观。
- en: 2\. Outline the different races, creatures, or magical beings that inhabit the
    world.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 概述居住在这个世界中的不同种族、生物或魔法生物。
- en: 3\. Explain the world’s system of magic or supernatural powers, including its
    limitations and consequences.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 解释世界的魔法或超自然力量体系，包括其限制和后果。
- en: 4\. Discuss the political structure and major factions or kingdoms.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 讨论政治结构和主要派系或王国。
- en: 5\. Provide examples of unique customs, traditions, or cultural practices found
    in the world.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 提供世界中发现的一些独特的习俗、传统或文化实践。
- en: 6\. Describe the technology level and key innovations or inventions in the story
    world.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 描述故事世界的科技水平以及关键的创新或发明。
- en: </prompt chain>
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: </prompt chain>
- en: Prompt chains differ from iterative prompting in that the prompt chain is fixed
    like a recipe, whereas iterative prompting is more like an interrogation, where
    the user varies the follow-up question based on each situation. Prompt chains
    work well when we use prompt sequencing to “automate” story generation.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链与迭代提示不同，提示链像食谱一样固定，而迭代提示更像是一个审问，用户根据每种情况变化后续问题。当使用提示序列“自动化”故事生成时，提示链效果很好。
- en: Prompt Chains are an excellent way of developing genre fiction outlines. Each
    genre has its requirements, obligatory moments, types of characters, and other
    attributes that a writer needs to fulfill genre convention. Each genre also has
    required story beats that you can include as a template to guide the LLM. Here
    is an example of a romance prompt chain.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链是发展类型小说大纲的绝佳方式。每个类型都有其要求、义务时刻、角色类型和其他属性，作家需要满足类型惯例。每个类型也有必需的故事节奏，你可以将其作为模板包含在内，以引导LLM。以下是一个浪漫提示链的例子。
- en: <prompt chain>
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: <prompt chain>
- en: You are a bestselling romance author for small-town romance looking to write
    {trope} romance involving {specifics, the more detail, the better}
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位畅销的小镇浪漫小说作家，想要写涉及{trope}浪漫的小说，包括{specifics，越详细越好}
- en: 'Follow these steps to develop our romance:'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤发展我们的浪漫：
- en: 1\. Give me a hook and a pitch.
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 给我一个钩子和一个推销词。
- en: 2\. Suggest a title and an SEO-enhanced subtitle that includes the trope and
    keywords of interest
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 建议一个标题和一个包含trope和感兴趣的关键词的SEO增强副标题。
- en: 3\. Name and describe the heroine of this romance. Make her a headstrong and
    independent woman with a soft heart and a strong sense of justice. Give her strengths
    and likable traits, as well as an emotional flaw that might stymie her chance
    for love.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为这个浪漫故事的女主角命名并描述。让她成为一个固执、独立的女性，有一颗柔软的心和强烈的正义感。给她赋予力量和可爱的特质，以及可能阻碍她爱情机会的情感缺陷。
- en: 4\. Name and describe the hero who will challenge the heroine in every way.
    Make him attractive and kind-hearted but distrustful due to his family background.
    Give him strengths and likable traits but an emotional flaw that makes it difficult
    for him to trust. However, he has a strong sense of justice and concern for the
    weak.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为将挑战女主角的男主角命名并描述。让他有吸引力、善良但因其家庭背景而不信任。给他赋予力量和可爱的特质，但有一个情感缺陷使他难以信任。然而，他有着强烈的正义感和对弱者的关心。
- en: 5\. Write a synopsis for this romance that includes a twist that will intrigue
    and surprise the reader. Adhere to all romance genre conventions.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为这个浪漫故事写一个包括一个将引起读者好奇和惊喜的转折点的概要。遵守所有浪漫类型惯例。
- en: '6\. Create a four-act romance structure for this enemies-to-lovers romance
    with the following romance plot beats in place: A meet-cute or initial connection
    between would-be lovers:'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 为这个从敌对到相爱的浪漫故事创建一个四幕结构，包括以下浪漫情节节奏：潜在的恋人之间的初次相遇或初步联系：
- en: 'Attraction and Growing Connection:'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 吸引和逐渐建立联系：
- en: 'Obstacles and Challenges:'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 障碍和挑战：
- en: 'Dark Moment, Separation, or Testing Problem:'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 黑暗时刻、分离或考验问题：
- en: 'Reconciliation and Declaration of Love:'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 和解和爱情宣言：
- en: 'Happy Ending:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 幸福结局：
- en: 7\. Create a 20-chapter outline for this romance following all romance conventions.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 为这个浪漫故事创建一个包含所有浪漫惯例的20章大纲。
- en: </prompt chain>
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: </prompt chain>
- en: I tried this with Claude 3 Opus by copying and pasting the entire prompt chain
    into the box and it worked. The LLM was able to take the steps and develop the
    story while keeping narrative logic. Pretty amazing, isn’t it?
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试使用Claude 3 Opus，通过复制粘贴整个提示链到框中，它成功了。LLM能够按照步骤发展故事，同时保持叙事逻辑。真是太神奇了，不是吗？
- en: The prompt chain takes advantage of the LLM’s context as it generates its response.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 提示链利用了LLM在生成响应时的上下文。
- en: One of the chains Elizabeth taught is to ask the LLM to analyze a scene, suggest
    enhancements, and write it (all within the same prompt).
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 伊丽莎白教授的一条链是要求LLM分析场景，提出改进建议，并撰写它（所有这些都在同一个提示中完成）。
- en: 'Example of a Prompt Chain in paragraph form:'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 段落形式的提示链示例：
- en: Upload your scene into the context window and use this prompt. It’s best to
    tag the scene with brackets. [scene]{contents of scene}[/scene] so that the LLM
    will know what you’re referring to when you mention scene. Tagging is explained
    in [Chapter 21 Megaprompting](#c176.xhtml).
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 将您的场景上传到上下文窗口，并使用此提示。最好用括号标记场景。[场景]{场景内容}[/场景]，这样LLM在您提到场景时就会知道您指的是什么。标记在[第21章
    大提示](#c176.xhtml)中有解释。
- en: <prompt>
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: <prompt>
- en: Identify places in the scene to make the writing stronger, longer, more dialogue,
    more detailed, better characterization, or less cliche. Make a quick plan on how
    to add more great writing to the scene. This can be an expansion of dialogue,
    add minor characters, or interaction with the scene between characters. Your quick
    plan should only be a few lines of ideas and set off by [rewrite plan] [/rewrite
    plan].
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 识别场景中使写作更强大、更长、更多对话、更详细、更好的人物塑造或更少陈词滥调的地方。快速制定一个如何添加更多精彩写作到场景的计划。这可以是对话的扩展，添加次要角色，或角色之间的场景互动。您的快速计划应该只有几行想法，并用[重写计划]
    [/重写计划]开头。
- en: Please rewrite the scene word for word, exactly as is, but adding in the ideas
    of the rewrite plan. The final scene must be longer, with more writing and character
    interaction than the original. Paragraphs, where action is summarized, are a great
    place to expand with sensory details and emotional drama. Avoid foreshadowing.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 请逐字逐句重写场景，但添加重写计划中的想法。最终的场景必须更长，有更多的写作和人物互动，比原始场景更丰富。总结动作的段落是扩展感官细节和情感戏剧的绝佳地方。避免预示。
- en: </prompt>
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: </prompt>
- en: ​[ ​18​ ]​
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: '[ 18 ]'
- en: NEEDS ASSESSMENT PROMPTING
  id: totrans-730
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**需求评估提示**'
- en: Sometimes, the best way to provide information to an LLM is to ask what it would
    need to perform a specific task. Different LLMs may require different prompting
    styles simply because they were trained on diverse datasets.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，向LLM提供信息的最佳方式是询问它完成特定任务所需的信息。不同的LLM可能需要不同的提示风格，这仅仅是因为它们是在不同的数据集上训练的。
- en: Asking the AI what it needs is a technique taught by Elizabeth Ann West. It
    is called “needs assessment prompting” and involves engaging in a dialogue with
    the AI model to understand its specific requirements for completing a given task
    effectively. By asking the AI questions about the information it needs, authors
    can gain insights into how the model thinks, what data it prioritizes, and how
    to best structure prompts for optimal results.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 询问AI它需要什么是由伊丽莎白·安·韦斯特教授的一种技巧。它被称为“需求评估提示”，涉及与AI模型进行对话，以了解其完成给定任务的有效性所需的具体要求。通过询问AI它需要的信息，作者可以深入了解模型是如何思考的，它优先考虑哪些数据，以及如何最佳地构建提示以获得最佳结果。
- en: BENEFITS FOR FICTION AUTHORS
  id: totrans-733
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**虚构作者的好处**'
- en: 'Improved Prompt Design: By understanding the AI’s needs, authors can craft
    more effective prompts that provide the necessary context, details, and instructions
    for generating desired outputs.'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 改善提示设计：通过了解AI的需求，作者可以制定更有效的提示，提供生成所需输出的必要上下文、细节和指令。
- en: 'Enhanced Collaboration: Treating the AI as a partner with specific requirements
    fosters a more collaborative approach, leading to better communication and understanding
    between the author and AI.'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 加强协作：将AI视为具有特定要求的合作伙伴，可以促进更协作的方法，从而提高作者与AI之间的沟通和理解。
- en: 'Reduced Trial and Error: Needs assessment can minimize the need for extensive
    trial and error when experimenting with prompts, as authors gain a clearer understanding
    of what information the AI requires upfront.'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 减少试错：需求评估可以最小化在尝试提示时的试错需求，因为作者对AI需要的信息有了更清晰的理解。
- en: 'Increased Efficiency: By tailoring prompts to the AI’s needs, authors can achieve
    desired results more quickly and efficiently, saving time and effort during the
    writing process.'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 提高效率：通过调整提示以适应AI的需求，作者可以更快、更有效地达到预期结果，从而在写作过程中节省时间和精力。
- en: 'Unlocking Creative Potential: Understanding the AI’s capabilities and limitations
    allows authors to explore its full potential and discover new ways to leverage
    its power for creative storytelling.'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 激发创意潜力：了解AI的能力和局限性，使作者能够探索其全部潜力，并发现利用其力量进行创意故事讲述的新方法。
- en: HOW TO CONDUCT NEEDS ASSESSMENT PROMPTING
  id: totrans-739
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**如何进行需求评估提示**'
- en: 'Define the Task: Clearly identify the specific task you want the AI to perform,
    such as generating a scene, developing a character, or writing a plot outline.'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 定义任务：明确指出你希望AI执行的具体任务，例如生成场景、发展角色或编写情节概述。
- en: 'Formulate Questions: Ask the AI about the information it needs to complete
    the task effectively. Examples include:'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 构思问题：询问AI它需要哪些信息才能有效地完成任务。例如：
- en: “What kind of information would be helpful for you to write a compelling scene?”
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: “对你来说，哪些信息会有助于你写出一个引人入胜的场景？”
- en: “What details about the characters would you need to create a believable dialogue?”
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: “你需要哪些关于角色的细节来创作出可信的对话？”
- en: “What information about the setting would help you generate a vivid description?”
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: “关于场景的哪些信息能帮助你生成生动的描述？”
- en: 'Analyze Responses: Consider the AI’s answers carefully to understand its priorities
    and requirements. Look for patterns or recurring themes in its responses.'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 分析响应：仔细考虑AI的回答，以了解其优先级和需求。寻找其回答中的模式或重复的主题。
- en: 'Refine Prompts: Based on the AI’s feedback, refine your prompts to include
    the necessary information and context.'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼提示：根据AI的反馈，精炼你的提示，包括必要的信息和上下文。
- en: 'Iterate and Experiment: Continue the dialogue with the AI as needed, refining
    your prompts further and exploring different approaches to achieve your desired
    results.'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代和实验：根据需要与AI进行对话，进一步细化你的提示，并探索不同的方法以达到你期望的结果。
- en: EXAMPLES OF NEEDS ASSESSMENT PROMPTS
  id: totrans-748
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需求评估提示示例：
- en: 'Scene Generation:'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 场景生成：
- en: “What details about the setting would help you create a vivid description?”
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: “关于场景的哪些细节能帮助你创作出生动的描述？”
- en: “What information about the characters’ emotional states would help you write
    a scene with a strong emotional impact?”
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: “关于角色的情感状态，哪些信息能帮助你写出一个具有强烈情感冲击的场景？”
- en: “Do you need any information about previous events in the story to ensure continuity
    within this scene?”
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: “你需要关于故事中先前事件的信息以确保场景内的连贯性吗？”
- en: 'Character Development:'
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：
- en: “What kind of background information about the character would be most helpful
    for you to develop their personality and motivations?”
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: “关于角色的哪种背景信息对你来说最有帮助，以发展他们的个性和动机？”
- en: “Would it be useful to know the character’s goals and desires or their relationships
    with other characters?”
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: “了解角色的目标和愿望或他们与其他角色的关系会有帮助吗？”
- en: “Is there anything specific you need to know about the character’s physical
    appearance or mannerisms?”
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: “你需要了解角色的具体外貌或举止吗？”
- en: 'Plot Outlining:'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 情节概述：
- en: “What information about the story’s genre and target audience would help you
    create a compelling plot outline?”
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: “关于故事类型和目标受众的信息能帮助你创建一个引人入胜的情节概述吗？”
- en: “To develop a strong plot structure, Do you need to know the main conflict or
    the protagonist’s goal?”
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: “为了构建一个强大的情节结构，你需要知道主要冲突或主角的目标吗？”
- en: “Would it be useful to provide information about the desired length or pacing
    of the story?”
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: “提供关于故事所需长度或节奏的信息会有帮助吗？”
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-761
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: Later on, we’ll see how to ask the AI what it needs from you to write a scene.
    We’ll assemble these materials into a scene brief, giving the LLM the material
    it needs to build a focused scene that includes the details you need, the story
    progression, character motivations, and goals.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们将看到如何询问AI它需要你提供什么来编写场景。我们将把这些材料汇编成一个场景简报，为LLM提供构建一个包含所需细节、故事发展、角色动机和目标的有针对性的场景所需材料。
- en: Asking the LLM what it needs is a great way to get better results. Incidentally,
    different LLMs may require you to prompt it differently. You might notice that
    a prompt that works well in ChatGPT does not give the same level of response from
    another LLM. In this case, it is best to ask the new LLM what it needs to perform
    a task you have in mind.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 询问LLM它需要什么是一个获取更好结果的好方法。顺便说一句，不同的LLM可能需要你以不同的方式提示它。你可能注意到，在ChatGPT中效果良好的提示在其他LLM上不会得到相同水平的响应。在这种情况下，最好是询问新的LLM它需要执行你心中的任务。
- en: ​[ ​19​ ]​
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: '[19]'
- en: COMPLETION PROMPTING
  id: totrans-765
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 完成提示：
- en: Completion prompting is quite simple. It is similar to leading by example and
    passing the baton on to the AI. This simply means typing in context and letting
    the LLM continue writing. Completion prompting is an excellent way of showing
    the LLM your writing style, ideas, and content as it continues to write in the
    same context window.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 完成提示相当简单。这类似于通过示例引导并将接力棒传递给AI。这仅仅意味着在上下文中输入文本，并让LLM继续写作。完成提示是一种展示LLM你的写作风格、想法和内容的好方法，因为它在相同的上下文窗口中继续写作。
- en: The dynamic and interactive nature of completion prompting suits discovery writers
    or pantsers well. The way you do it is to provide the AI with a partially written
    scene. You can either enter the partial scene without instructions or give it
    some guidance on what you want to see happen next.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 完成提示的动态和交互性质非常适合发现型作家或即兴创作者。你这样做是向AI提供部分写好的场景。你可以不提供任何指令就输入部分场景，或者给它一些关于你希望看到接下来发生什么的指导。
- en: Using this interactive approach, authors can leverage AI’s ability to continue
    the narrative, generate ideas, explore different directions, and uncover hidden
    possibilities within their stories.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种交互式方法，作者可以利用AI继续叙事、生成想法、探索不同方向并在他们的故事中揭示隐藏的可能性。
- en: HOW COMPLETION PROMPTING WORKS
  id: totrans-769
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**完成提示的工作原理**'
- en: 'Start Writing: Begin your scene or chapter as you normally would, writing until
    you need inspiration, want to explore different options, or simply feel stuck.'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 开始写作：像平时一样开始你的场景或章节，写作直到你需要灵感、想要探索不同的选项或只是感到卡壳。
- en: 'Feed the AI: Copy and paste your partially written text into the AI prompt
    window.'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 向AI提供输入：复制并粘贴你部分写好的文本到AI提示窗口中。
- en: 'Set the Stage: Provide additional context or instructions if necessary. This
    might include details about the character’s emotions, the setting, or the overall
    tone of the scene.'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 设置场景：如有必要，提供额外的背景或指令。这可能包括关于角色情绪、场景或整体场景基调的细节。
- en: 'Prompt for Completion: Instruct the AI to continue the narrative. You can use
    simple prompts like “Continue writing” or “What happens next?” or provide more
    specific instructions based on your desired outcome.'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 提示AI完成：指示AI继续叙事。你可以使用简单的提示，如“继续写作”或“接下来会发生什么？”或者根据你期望的结果提供更具体的指令。
- en: 'Evaluate and Iterate: Analyze the AI’s response, considering its coherence,
    creativity, and alignment with your vision. Use this feedback to refine your subsequent
    prompts, guiding the AI towards the direction you want to take the story.'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 评估和迭代：分析AI的回应，考虑其连贯性、创造性和与你的愿景的一致性。使用这些反馈来完善你后续的提示，引导AI朝着你想要的故事方向前进。
- en: BENEFITS FOR DISCOVERY WRITERS
  id: totrans-775
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**对发现型作家的好处**'
- en: 'Overcoming Writer’s Block: Completion prompting can help you break through
    moments of stagnation by providing fresh ideas and alternative paths for your
    narrative.'
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 克服写作障碍：完成提示可以通过提供新想法和替代叙事路径来帮助你突破停滞不前的时刻。
- en: 'Exploring Different Possibilities: Use the AI to test out different scenarios,
    character choices, or plot twists, discovering new directions for your story that
    you might not have considered otherwise.'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 探索不同可能性：使用AI来测试不同的场景、角色选择或情节转折，发现你可能没有考虑过的故事新方向。
- en: 'Unveiling Hidden Potential: The AI’s responses can reveal unexpected aspects
    of your characters or plot, helping you uncover hidden potential within your story.'
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 揭示隐藏潜力：AI的回应可以揭示你角色或情节的意外方面，帮助你发现故事中的隐藏潜力。
- en: 'Maintaining Momentum: Completion prompting can help you maintain a consistent
    writing pace, keeping the story moving forward even when unsure of the next step.'
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 保持节奏：完成提示可以帮助你保持一致的写作节奏，即使在不确定下一步该做什么时也能让故事继续前进。
- en: TIPS FOR EFFECTIVE COMPLETION PROMPTING
  id: totrans-780
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**有效完成提示的技巧**'
- en: 'Provide Enough Context: Ensure the AI has enough information about the characters,
    setting, and previous events to generate relevant and consistent continuation.'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 提供足够的信息背景：确保AI有足够关于角色、场景和先前事件的详细信息，以便生成相关且一致的后续内容。
- en: 'Set Clear Expectations: Use specific instructions to guide the AI toward the
    desired tone, style, or direction for the continuation.'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 设定明确期望：使用具体指令引导AI朝着期望的语气、风格或方向进行后续创作。
- en: 'Experiment with Different AI Models: Each AI model has strengths and weaknesses.
    Try various options to see which best complements your writing style and generates
    the most helpful and inspiring responses.'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的AI模型：每个AI模型都有其优势和劣势。尝试不同的选项，看看哪个最能补充你的写作风格并生成最有帮助和启发性的回应。
- en: 'Embrace the Unexpected: Be open to the AI’s suggestions, even if they deviate
    from your initial plans. Sometimes, unexpected turns can lead to exciting discoveries
    within your story.'
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎意外：即使它们偏离了您的初始计划，也要对人工智能的建议持开放态度。有时，意外的转折可以带来故事中的兴奋发现。
- en: The best part of using AI is actually the surprises. Completion prompting can
    help you discover insights and directions you hadn’t considered.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 使用人工智能的最好部分实际上是惊喜。完成提示可以帮助您发现您未曾考虑过的见解和方向。
- en: 'You can easily use the chat interface for completion prompting or go to the
    Playgrounds or developer’s interface, where you can play with the parameters to
    vary randomness and other factors. See [Chapter 24: Playgrounds and Developer
    Interfaces](#c1DY.xhtml).'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以轻松使用聊天界面进行完成提示，或前往游乐场或开发者界面，在那里您可以调整参数以改变随机性和其他因素。见[第24章：游乐场和开发者界面](#c1DY.xhtml)。
- en: Finally, remember that you are the author and ultimately in control of your
    narrative. Use the AI’s outputs as inspiration or building blocks, but always
    feel free to edit, revise, or discard anything that doesn’t align with your vision.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请记住，您是作者，您最终控制着您的叙事。将人工智能的输出用作灵感或构建块，但始终可以自由地编辑、修改或删除任何与您的愿景不符的内容。
- en: ​[ ​20​ ]​
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: '[20]'
- en: CONTEXT STUFFING
  id: totrans-789
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 上下文填充
- en: We’ve discussed context windows and how an LLM uses the words inside its context
    window to determine its response. Now that we have larger context windows, we
    can provide the AI model with additional information beyond the core prompt. This
    “stuffed” context helps guide the AI’s responses, ensuring greater accuracy, relevance,
    and consistency with your desired output.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了上下文窗口以及大型语言模型如何使用其上下文窗口内的单词来确定其响应。现在，我们有更大的上下文窗口，我们可以向人工智能模型提供超出核心提示的额外信息。这种“填充”的上下文有助于引导人工智能的响应，确保与您期望的输出有更高的准确性、相关性和一致性。
- en: Giving AI the background material gives you better responses.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 提供背景材料给人工智能，您将获得更好的响应。
- en: BENEFITS OF CONTEXT STUFFING
  id: totrans-792
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文填充的好处
- en: 'Improved Accuracy: By providing additional background information, character
    details, or world-building elements, you can reduce the likelihood of the AI generating
    inaccurate or irrelevant responses.'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 提高准确性：通过提供额外的背景信息、角色细节或世界构建元素，您可以降低人工智能生成不准确或不相关响应的可能性。
- en: 'Enhanced Relevance: Context stuffing helps ensure the AI’s outputs align with
    your specific vision for the story, characters, and setting.'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 增强相关性：上下文填充有助于确保人工智能的输出与您对故事、角色和场景的具体愿景保持一致。
- en: 'Increased Consistency: Providing context about previous events, character relationships,
    and established lore helps maintain consistency throughout the generated content.'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 提高一致性：提供关于先前事件、角色关系和已建立传说的信息，有助于在整个生成内容中保持一致性。
- en: 'Greater Control over Style and Tone: You can include examples of your desired
    writing style or specific authors you want the AI to emulate, guiding the tone
    and voice of the output.'
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 更大的风格和语气控制：您可以包括您希望的人工智能模仿的写作风格或特定作者的例子，从而引导输出的语气和声音。
- en: 'Unlocking Creativity: Context stuffing can spark new ideas and connections
    within the AI model, leading to more creative and unexpected results.'
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 激发创造力：上下文填充可以在人工智能模型中激发新的想法和联系，从而产生更多创意和意外的结果。
- en: HOW TO USE CONTEXT STUFFING EFFECTIVELY
  id: totrans-798
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何有效地使用上下文填充
- en: 'Identify Relevant Information: Determine what information is crucial for the
    AI to understand the context of your prompt and generate the desired output. This
    might include:'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 确定相关信息：确定哪些信息对于人工智能理解您的提示上下文并生成所需输出至关重要。这可能包括：
- en: Character profiles and backstories
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 角色档案和背景故事
- en: World-building details and lore
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建细节和传说
- en: Plot summaries and key events
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 情节摘要和关键事件
- en: Genre conventions and tropes
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 类型惯例和陈词滥调
- en: Desired writing style and tone
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 希望的写作风格和语气
- en: 'Structure the Context: Organize the information in a clear and concise manner.
    Use bullet points, numbered lists, or short paragraphs to effectively present
    the context.'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化上下文：以清晰简洁的方式组织信息。使用项目符号、编号列表或简短段落有效地呈现上下文。
- en: 'Integrate the Context into Your Prompt: Include the context before your main
    prompt or question. You can present it as background information or instructions
    for the AI. Most of the large-context window chats now allow file uploading.'
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 将上下文整合到您的提示中：在主要提示或问题之前包含上下文。您可以将其作为背景信息或对人工智能的说明。现在大多数大上下文窗口聊天都允许文件上传。
- en: 'Experiment with Different Levels of Detail: The amount of context you provide
    can vary depending on the complexity of your prompt and the desired output. Start
    with essential information and add more details as needed.'
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同层次的细节：你提供的上下文数量可以根据你的提示的复杂性和期望的输出而变化。从基本信息开始，根据需要添加更多细节。
- en: 'Review and Refine: Evaluate the AI’s responses and adjust the context accordingly.
    If the output is not aligned with your expectations, refine the information you
    provide or experiment with different ways of presenting it.'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 审查和改进：评估AI的响应并根据需要调整上下文。如果输出不符合你的预期，请改进你提供的信息或尝试以不同的方式呈现它。
- en: EXAMPLES OF CONTEXT STUFFING
  id: totrans-809
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文填充示例
- en: 'Character Development:'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：
- en: 'Context: “Luke Sherlock is a cynical detective with a troubled past and a dry
    sense of humor. He is investigating a murder mystery in a futuristic city filled
    with advanced technology and corruption.”'
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：“卢克·谢尔洛克是一位愤世嫉俗的侦探，有着复杂的过去和一种干燥的幽默感。他正在调查一个发生在充满先进技术和腐败的未来城市的谋杀案。”
- en: 'Prompt: “Write a scene where Luke Sherlock interrogates a suspect.”'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“写一个场景，其中卢克·谢尔洛克审问一个嫌疑人。”
- en: 'World-Building:'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 构建世界：
- en: 'Context: “The story takes place in a medieval fantasy world where magic is
    outlawed, and those who possess magical abilities are persecuted. The protagonist
    is a young woman who discovers she has hidden magical powers.”'
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：“故事发生在一个中世纪奇幻世界中，魔法被禁止，拥有魔法能力的人受到迫害。主角是一位发现自己拥有隐藏魔法力量的年轻女性。”
- en: 'Prompt: “Describe the magical system of this world and its impact on society.”'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“描述这个世界的魔法系统及其对社会的影响。”
- en: 'Genre and Style:'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 类型与风格：
- en: 'Context: “I want to write a science fiction story in the style of Isaac Asimov,
    focusing on the ethical implications of artificial intelligence.”'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：“我想以艾萨克·阿西莫夫的风格写一部科幻小说，重点关注人工智能的伦理影响。”
- en: 'Prompt: “Write a scene where a human confronts a sentient AI about the future
    of humanity.”'
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“写一个场景，其中人类与一个有感知的AI讨论人类的未来。”
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-819
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg]'
- en: Context stuffing is a powerful technique for guiding AI models and ensuring
    they generate outputs that align with your creative vision. By providing relevant
    information and context, you can unlock AI’s full potential as a writing partner
    and create richer, more engaging narratives.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文填充是一种强大的技术，可以引导AI模型并确保它们生成的输出与你的创意愿景保持一致。通过提供相关信息和上下文，你可以解锁AI作为写作伙伴的全部潜力，并创造更丰富、更吸引人的叙事。
- en: This leads us to the technique of Megaprompting, which organizes the content
    by using tags so that the LLM can later identify and refer to the tagged material.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了大提示技术，它通过使用标签来组织内容，以便LLM可以稍后识别和引用标记的材料。
- en: ​[ ​21​ ]​
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: '[21]'
- en: MEGAPROMPTING
  id: totrans-823
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 大提示
- en: As we’ve seen, stuffing information into a prompt gets us better and more relevant
    results. This is important for fiction since we are “making things up” and want
    AI to follow our vision. Of course, with so much information, the next step is
    to organize it so that subsequent prompts can refer to it.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所看到的，将信息塞入提示中可以得到更好、更相关的结果。这对于小说写作很重要，因为我们是在“编造事情”，希望AI能够遵循我们的愿景。当然，有了这么多信息，下一步就是组织它们，以便后续的提示可以引用它们。
- en: The folks at the Future Fiction Academy, Elizabeth Ann West, Leeland Atra, and
    Steph Pajonas, were the first people I knew to use megaprompts, an organized structure
    for sending information to an LLM.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 未来科幻学院的人们，伊丽莎白·安·韦斯特、利兰·阿特拉和斯蒂夫·帕约纳斯，是我认识的第一批使用大提示的人，这是一种向LLM发送信息的组织化结构。
- en: Unlike traditional, shorter prompts that might offer just a scenario or a single
    line of inspiration, megaprompts delve deeply into specifics. They can include
    character backgrounds, setting details, specific conflicts, thematic elements,
    and stylistic suggestions. However, more important than what they consist of is
    the nested format that allows the LLM to “organize” the information using labels.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统的、较短的提示不同，这些提示可能只提供一种场景或一条灵感，大提示深入到具体细节。它们可以包括角色背景、设定细节、特定冲突、主题元素和风格建议。然而，比它们包含的内容更重要的是嵌套格式，它允许LLM使用标签“组织”信息。
- en: 'In fiction writing, a megaprompt typically includes various elements that help
    define the story, characters, setting, and style. Some standard components of
    a fiction writing megaprompt are:'
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 在小说写作中，大提示通常包括各种有助于定义故事、角色、设定和风格的因素。小说写作大提示的一些标准组成部分包括：
- en: 1\. Genre and subgenre
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 类型与子类型
- en: 2\. Setting details (period, location, atmosphere)
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 设定细节（时期、地点、氛围）
- en: 3\. Main characters’ profiles (backstory, personality, goals, flaws)
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 主要角色的档案（背景故事、性格、目标、缺点）
- en: 4\. Plot outline or story beats
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 情节概述或故事节奏
- en: 5\. Themes and motifs
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 主题和动机
- en: 6\. Narrative point of view and tense
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 叙事视角和时态
- en: 7\. Tone and mood
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 调子和情绪
- en: 8\. Stylistic preferences or influences
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 风格偏好或影响
- en: 9\. World-building elements (for fantasy or science fiction)
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 构建世界元素（奇幻或科幻）
- en: 10\. Specific scenes or chapters to focus on
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 专注于特定的场景或章节
- en: By providing a megaprompt, writers refer to the specific information inside
    the megaprompt so that the AI can use the detailed information in the megaprompt
    to maintain consistency, develop characters and plot points, and adhere to the
    specified style and tone.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供大提示，作家引用大提示内的特定信息，以便AI可以使用大提示中的详细信息来保持一致性，发展角色和情节点，并遵守指定的风格和调子。
- en: You can have anything you want in a megaprompt as it is a way of organizing
    information.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在大提示中包含任何你想要的东西，因为这是一种组织信息的方式。
- en: Create a file called Story Information.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为“故事信息”的文件。
