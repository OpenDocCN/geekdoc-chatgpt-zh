  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc4B5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'I’m giving readers who legally obtain DRM-free versions of my romance-writing
    ebooks permission to upload them to an AI system and use them to develop their
    stories. [Romance in a Month](https://books2read.com/romanceinamonth), [366 Ways
    to Know Your Character](https://books2read.com/366ways), [Love Stories: Writing
    a Romance Novella in 30 Days](https://books2read.com/lovestories), [Writing Asian
    Romance Characters](https://books2read.com/writingasianromancecharacters), [Dangerous
    Love: Writing a Romantic Suspense](https://books2read.com/writingromanticsuspense).
    ⁠[3](#c349.xhtml#a3VT) Non-DRM EPUBs are available at [Smashwords.com](http://Smashwords.com).⁠[4](#c349.xhtml#a3VV)
    You can use a tool like [Calibre](https://calibre-ebook.com/) ⁠[5](#c349.xhtml#a3VX)
    to convert the EPUB to PDF.'
  prefs: []
  type: TYPE_NORMAL
- en: MYSTERY
