  id: totrans-1773
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：请为女主角旺达·科克斯、海迪·佐佐木和费利西亚·比比提出标题和主题建议。为他们提供职业，这些职业将引起最多的冲突同时激发吸引力和有趣的互动。
- en: 'MODEL:'
  id: totrans-1774
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
