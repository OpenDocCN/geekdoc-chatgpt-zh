  id: totrans-1775
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余女孩团队女主角的标题和主题：
- en: 'Here are some suggestions for titles and tropes featuring Wanda, Heidi, and
    Felicia as heroines, along with hero occupations designed to spark conflict and
    attraction:'
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些以旺达、海迪和费利西亚为主角的标题和主题建议，以及旨在激发冲突和吸引力的英雄职业：
- en: '1\. Wanda Cox (Strong, Independent Jewelry Maker):'
  id: totrans-1777
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 旺达·科克斯（坚强、独立的珠宝制作人）：
- en: 'Title: Not My Rival'
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: 标题：非我的对手
- en: 'Trope: Rivals to Lovers'
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 主题：情敌变恋人
- en: 'Hero Occupation: Art Critic - This would create immediate conflict as the art
    critic could initially dismiss Wanda’s jewelry as “craft” rather than “fine art,”
    leading to heated debates about artistic expression and the value of different
    creative forms. The shared passion for art, however, would also spark a connection
    and eventual attraction.'
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄职业：艺术评论家 - 这将立即产生冲突，因为艺术评论家可能会最初将Wanda的珠宝视为“手工艺”而不是“艺术品”，导致关于艺术表达和不同创意形式价值的激烈辩论。然而，对艺术的共同热情也会激发联系和最终的吸引。
- en: '2\. Heidi Sasaki (Free-Spirited Musician with Artistic Flair):'
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Heidi Sasaki（自由奔放的艺术家，具有艺术天赋）：
- en: 'Title: Not My Muse'
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 标题：非我的缪斯
- en: 'Trope: Forbidden Love'
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：禁忌之爱
- en: 'Hero Occupation: CEO of a Tech Startup - This pairing would offer a clash of
    personalities and lifestyles, with the serious, workaholic CEO initially finding
    Heidi’s free-spirited nature and artistic pursuits frivolous. The contrast, however,
    could also lead to a mutual attraction as Heidi inspires him to embrace his creative
    side and he provides stability and support for her artistic endeavors. The “forbidden”
    element could stem from a professional connection, perhaps he invests in her band
    or she is hired to create music for his company.'
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄职业：科技初创公司CEO - 这种配对将提供性格和生活方式的冲突，严肃的工作狂CEO最初可能会认为Heidi的自由精神和对艺术的追求是轻率的。然而，这种对比也可能导致相互吸引，因为Heidi激励他拥抱他的创造性一面，而他为她提供稳定和支持她的艺术事业。禁忌元素可能源于职业联系，例如他投资她的乐队，或者她被雇佣为他的公司创作音乐。
- en: '3\. Felicia Bybee (Rule-Following HR Manager):'
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: 3. Felicia Bybee（遵守规则的HR经理）：
- en: 'Title: Not My Client'
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: 标题：非我的客户
- en: 'Trope: Opposites Attract'
  id: totrans-1787
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：对立相吸
- en: 'Hero Occupation: Celebrity Bad Boy - This pairing would offer a hilarious clash
    of personalities, with Felicia’s strict adherence to rules and order constantly
    challenged by the celebrity’s reckless behavior and disregard for authority. The
    initial conflict and frustration could evolve into attraction as Felicia discovers
    the vulnerability beneath the bad-boy facade and he is drawn to her strength and
    integrity. The “client” element could arise from him needing image rehabilitation
    or legal assistance, forcing Felicia to navigate professional boundaries while
    dealing with her personal attraction.'
  id: totrans-1788
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄职业：名人坏小子 - 这种配对将提供性格的滑稽冲突，Felicia对规则和秩序的严格遵循不断受到名人的鲁莽行为和对权威的漠视的挑战。最初的冲突和挫败感可能会演变成吸引，因为Felicia发现了坏小子面具下的脆弱，而他也被她的力量和正直所吸引。“客户”元素可能源于他需要形象修复或法律援助，迫使Felicia在处理个人吸引的同时处理职业界限。
- en: </Conversation>
  id: totrans-1789
  prefs: []
  type: TYPE_NORMAL
  zh: </对话>
- en: Of the ideas presented, I like the Not My Rocker, bad boy pairing with the rule-following
    Felicia. Impressed?
  id: totrans-1790
  prefs: []
  type: TYPE_NORMAL
  zh: 在提出的想法中，我喜欢“非我的摇滚乐手”，坏小子与遵守规则的Felicia的配对。印象深刻吗？
- en: The Google AI Studio keeps track of how many tokens are being used. After uploading
    my entire series, I’m only using 274,864 out of the 1,048,576 available tokens
    in the Gemini 1.5 Pro’s context window. No doubt bigger models and capabilities
    are around the corner. This is how it is with AI, more toys in the toy store every
    week.
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌AI Studio会跟踪使用了多少个标记。在我上传整个系列后，我只使用了Gemini 1.5 Pro上下文窗口中可用的1,048,576个标记中的274,864个。毫无疑问，更大的模型和能力即将到来。这就是AI的情况，每周玩具店里都有更多的玩具。
- en: ​[ ​40​ ]​
  id: totrans-1792
  prefs: []
  type: TYPE_NORMAL
  zh: '[40]'
- en: GENRE-SPECIFIC AI RESEARCH AND PROMPTS
  id: totrans-1793
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 针对特定体裁的AI研究和提示
- en: ROMANCE
  id: totrans-1794
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 浪漫小说
- en: I’ve written several nonfiction books on how to write romances, so I’m going
    to use my books as a knowledge base and put them into the Gemini 1.5 Pro context
    window. To do that, I’ll go to Google’s AI Studio [https://aistudio.google.com/](https://aistudio.google.com/)
    ⁠[1](#c349.xhtml#a3U1)
  id: totrans-1795
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经写了几本关于如何写浪漫小说的非虚构书籍，所以我将使用我的书籍作为知识库，并将它们放入Gemini 1.5 Pro的上下文窗口中。为此，我将前往谷歌的AI
    Studio [https://aistudio.google.com/](https://aistudio.google.com/) [1](#c349.xhtml#a3U1)
- en: 1\. Upload the entire PDF of Rachelle Ayala’s Romance in a Month into the Gemini
    1.5 Pro AI Studio. Upload the entire PDF of Rachelle Ayala’s 366 Ways to Know
    Your Character.
  id: totrans-1796
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 将Rachelle Ayala的《一个月的浪漫》整个PDF上传到Gemini 1.5 Pro AI Studio。将Rachelle Ayala的《366种了解你的角色的方法》整个PDF上传。
- en: 2\. Reduce the Safety Settings by sliding them down to none.
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 通过将安全设置滑动到无来降低安全设置。
- en: 3\. Now that this knowledge is in the context window, it is automatically available
    to the AI. Go ahead and ask questions, or upload your manuscript and have the
    AI analyze it.
  id: totrans-1798
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 现在这个知识在上下文窗口中，它自动对AI可用。请继续提问，或者上传你的手稿，让AI进行分析。
- en: Here is an example conversation.
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个示例对话。
- en: 'USER: Please give me a process for writing a romance.'
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：请给我一个写浪漫小说的流程。
- en: 'MODEL:'
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Writing a Romance: A Step-by-Step Guide'
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: 写作爱情小说：一步步指南
- en: 'Here’s a process for crafting your own captivating romance novel:'
  id: totrans-1803
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个创作你自己的迷人爱情小说的过程：
- en: '1\. Character Development:'
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 角色发展：
- en: 'Choose Archetypes: Start with classic archetypes like the “Bad Boy” or “Boss
    Lady” for your hero and heroine. This provides a foundation for their personalities.'
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: 选择原型：为你的男主角和女主角选择经典原型，如“坏小子”或“女强人”，这为他们的个性奠定了基础。
- en: 'Develop Goals and Motivations: Flesh out your characters by giving them clear
    goals and motivations. What do they desire most? Why do they want it? Make sure
    their goals conflict to create tension.'
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: 发展目标和动机：通过给他们明确的目标和动机来充实你的角色。他们最渴望什么？为什么他们想要它？确保他们的目标相互冲突以创造紧张感。
- en: 'Internal Conflicts: Give each character an internal conflict stemming from
    a positive trait, creating complexity and driving emotional engagement. For example,
    a protective hero might become overly suspicious, causing tension with the heroine.'
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: 内在冲突：给每个角色一个来自积极特质的内在冲突，创造复杂性和推动情感参与。例如，一个保护性的男主角可能会过度怀疑，与女主角造成紧张关系。
- en: '2\. Central Conflict and Plot Points:'
  id: totrans-1808
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 核心冲突和情节点：
- en: 'Core Conflict: The central conflict should be relational and internal, challenging
    their core beliefs and values. For instance, a career-driven heroine might clash
    with a laid-back hero, creating tension and driving the story.'
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: 核心冲突：核心冲突应该是关系性和内在的，挑战他们的核心信念和价值观。例如，一个事业型女主角可能与一个随和的男主角发生冲突，从而产生紧张感并推动故事发展。
- en: 'The Meet: Create a memorable “meet-cute” early in the story, sparking initial
    attraction and hinting at the core conflict.'
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: 遇见：在故事早期创造一个难忘的“相遇”，激发最初的吸引力，并暗示核心冲突。
- en: 'Lock-In: Devise a situation that forces the hero and heroine to interact regularly,
    such as working together or being part of the same social circle.'
  id: totrans-1811
  prefs: []
  type: TYPE_NORMAL
  zh: 锁定：设计一个迫使男主角和女主角定期互动的情况，例如一起工作或成为同一个社交圈的一部分。
- en: 'Main Conflict Escalation: Introduce challenges and obstacles stemming from
    the core conflict, testing the relationship and creating tension.'
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: 主要冲突升级：引入来自核心冲突的挑战和障碍，考验关系并创造紧张感。
- en: 'Realization Point: One or both characters acknowledge their feelings, raising
    the stakes and intensifying the push and pull of the relationship.'
  id: totrans-1813
  prefs: []
  type: TYPE_NORMAL
  zh: 认识点：一个或两个角色承认他们的感情，提高赌注并加剧关系的推拉。
- en: 'Big Bad Breakup (Optional): Consider a dramatic breakup fueled by the core
    conflict, forcing characters to confront their internal struggles.'
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: 大型分手（可选）：考虑一个由核心冲突引发的戏剧性分手，迫使角色面对他们的内心斗争。
- en: 'Grand Romantic Moment: a memorable scene where the couple overcomes their challenges
    and reconciles. Make it sweet, emotional, and satisfying.'
  id: totrans-1815
  prefs: []
  type: TYPE_NORMAL
  zh: 伟大的浪漫时刻：一个难忘的场景，其中情侣克服了他们的挑战并和解。让它甜蜜、感人且令人满意。
- en: '3\. Additional Considerations:'
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 其他注意事项：
- en: 'Point of View: Choose between first-person (from the heroine’s or both characters’
    perspectives) or third-person narration.'
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 视角：在第一人称（女主角或两位角色的视角）或第三人称叙述之间进行选择。
- en: 'Heat Level: Determine the level of sensuality and intimacy you want in your
    story.'
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: 热度级别：确定你故事中希望有多少感官和亲密程度。
- en: 'Subplots (Limited): Keep subplots minimal to avoid diluting the main romance
    and maintain focus.'
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: 副线（有限）：保持副线最少，以避免稀释主线爱情并保持焦点。
- en: '4\. Revision and Publication:'
  id: totrans-1820
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 修订和出版：
- en: 'Revision: Revise and polish your draft, exploring subplots and refining character
    development and plot points.'
  id: totrans-1821
  prefs: []
  type: TYPE_NORMAL
  zh: 修订：修订和润色你的草稿，探索副线和细化角色发展和情节点。
- en: 'Editing: Seek professional editing to ensure a high-quality manuscript.'
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑：寻求专业编辑以确保高质量的稿件。
- en: 'Publishing: Decide between traditional or self-publishing and explore the necessary
    steps, such as finding an agent or designing a cover.'
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: 出版：决定是传统出版还是自出版，并探索必要的步骤，例如寻找代理人或设计封面。
- en: 'Remember: This is a flexible framework. Adapt it to your unique story and characters.
    Embrace creativity and have fun bringing your romance to life!'
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：这是一个灵活的框架。根据你独特的故事和角色进行调整。拥抱创造力，享受让你的爱情故事栩栩如生！
- en: (This information comes directly from my book.)
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: （此信息直接来自我的书籍。）
- en: 'USER: Great. Let’s develop a heroine from one of the archetypes and ask her
    three questions. Based on her answers, let’s give her a name, personality traits,
    and an occupation for a small-town sweet romance.'
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：太好了。让我们从一个原型中塑造一个女主角，并问她三个问题。根据她的回答，给她起一个名字、性格特征和一个小镇甜蜜爱情故事的职业。
- en: 'MODEL:'
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Developing Our Heroine:'
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 塑造我们的女主角：
- en: Let’s choose the “Busy Body/Nurturer” archetype as a starting point.
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以“忙碌的照顾者”原型作为起点。
- en: 'Here are three questions for her:'
  id: totrans-1830
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有三个人问题给她：
- en: Who does your character bicker and fight with most in her life?
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: 在她的生活中，谁是她最经常争吵和打架的人？
- en: What is one accomplishment your character would feel she failed life if she
    didn’t achieve it?
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: 如果她没有实现以下哪项成就，她会觉得自己在人生中失败了？
- en: What is her character’s favorite sexual position? Why? (We might not use the
    answer to this question for a sweet romance, but it helps reveal her personality)
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: 她的角色最喜欢的性姿势是什么？为什么？（我们可能不会用这个问题的答案来写甜蜜的浪漫故事，但它有助于揭示她的个性）
- en: 'Let’s imagine her answers:'
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象她的回答：
- en: “I bicker with my younger brother the most. He’s always getting himself into
    trouble, and I feel responsible for keeping him on track.”
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: “我和我弟弟争吵得最多。他总是给自己惹麻烦，我觉得有责任让他走上正轨。”
- en: “I’d feel like I failed if I didn’t open my own bakery. Baking is my passion,
    and I want to share my creations with the whole town.”
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: “如果我不开自己的面包店，我会觉得自己失败了。烘焙是我的热情所在，我想把我的作品分享给整个小镇。”
- en: (Answer not relevant for a sweet romance)
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: （答案与甜蜜的浪漫无关）
- en: 'Based on these answers, let’s develop her character:'
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些回答，让我们来塑造她的角色：
- en: 'Name: Amelia “Amy” Parker'
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: 姓名：艾米丽亚“艾米”·帕克
- en: 'Personality Traits: Caring, responsible, passionate about baking, sometimes
    overbearing, protective of her family, strong-willed, community-oriented.'
  id: totrans-1840
  prefs: []
  type: TYPE_NORMAL
  zh: 性格特点：关心、负责任、热爱烘焙、有时过于干涉、保护家人、意志坚强、社区导向。
- en: 'Occupation: Aspiring baker, currently working at the local diner while saving
    up to open her own bakery.'
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: 职业：有志成为面包师，目前在当地餐馆工作，同时攒钱开自己的面包店。
- en: Amy sounds like a charming heroine for a small-town sweet romance! We can imagine
    her getting involved in the community, helping others, and eventually finding
    love with a hero who appreciates her kind heart and delicious baking skills.
  id: totrans-1842
  prefs: []
  type: TYPE_NORMAL
  zh: 艾米听起来像是一个小镇甜蜜浪漫故事中迷人的女主角！我们可以想象她参与社区活动，帮助他人，并最终与一个欣赏她善良的心和美味的烘焙技巧的英雄相爱。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1843
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: 'This is hilarious. AI Studio happened to pick question #3 about the character’s
    favorite sexual position. It then realizes the question doesn’t need to be answered
    for a sweet romance and doesn’t answer it. Anyway, the possibilities for brainstorming
    and critiquing are endless. Next, I’ll upload my Work in Progress, [Not My Bridegroom](https://books2read.com/notmybridegroom),
    and ask the AI to analyze it. ⁠[2](#c349.xhtml#a41H)'
  id: totrans-1844
  prefs: []
  type: TYPE_NORMAL
  zh: 这太有趣了。AI工作室偶然选择了关于角色最喜欢性姿势的第3个问题。然后它意识到这个问题对于甜蜜的浪漫故事不需要回答，所以没有回答。无论如何，头脑风暴和评论的可能性是无限的。接下来，我将上传我的作品进度，[不是我的新郎](https://books2read.com/notmybridegroom)，并请AI分析它。[2](#c349.xhtml#a41H)
- en: 'USER: Please analyze my story Not My Bridegroom and give me a detailed critique.'
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：请分析我的故事《不是我的新郎》并给出详细评论。
- en: 'MODEL:'
  id: totrans-1846
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Not My Bridegroom: A Detailed Critique'
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: 不是我的新郎：详细评论
- en: 'Strengths:'
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Strong Voice and Characterization: Anita’s voice is distinct and engaging,
    with her sassy and sarcastic inner dialogue creating a humorous and relatable
    character. The supporting characters, particularly Wanda and Gina, add depth and
    humor with their contrasting personalities and perspectives.'
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: 强有力的声音和角色塑造：Anita的声音独特且引人入胜，她俏皮和讽刺的内心独白创造了一个幽默且令人信服的角色。支持角色，特别是Wanda和Gina，通过他们对比鲜明的个性和观点，增加了深度和幽默。
- en: 'Compelling Premise: The concept of a fake engagement turning into a real love
    triangle is intriguing and offers plenty of potential for conflict and drama.
    The exploration of social media influencer culture and the impact of AI on relationships
    adds a contemporary edge to the story.'
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: 吸引人的前提：一个假订婚变成真实爱情三角关系的概念引人入胜，并为冲突和戏剧性提供了丰富的可能性。对社交媒体影响者文化和人工智能对关系的影响的探讨，为故事增添了当代的边缘感。
- en: 'Humor and Romance: The story effectively balances humor and romance, with witty
    banter and steamy scenes creating a satisfying read. The tension between Anita
    and Dillon is palpable, making their interactions both entertaining and emotionally
    engaging.'
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 幽默与浪漫：故事有效地平衡了幽默和浪漫，机智的对话和激情四溢的场景创造了一个令人满意的阅读体验。Anita和Dillon之间的紧张感是显而易见的，这使得他们的互动既有趣又情感投入。
- en: 'Themes: The story explores relevant themes such as the superficiality of social
    media, the challenges of maintaining authenticity in a curated online world, and
    the complexities of modern relationships.'
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: 主题：故事探讨了相关的主题，例如社交媒体的表面性、在精心策划的在线世界中保持真实性的挑战，以及现代关系的复杂性。
- en: 'Areas for Improvement:'
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: 改进领域：
- en: 'Pacing: The story could benefit from a tighter pace, particularly in the first
    half. Some scenes, such as the extended descriptions of clothing and décor, could
    be trimmed or streamlined to keep the plot moving forward.'
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 节奏：故事可以从更紧凑的节奏中受益，尤其是在前半部分。一些场景，如对服装和装饰的详细描述，可以缩减或简化，以保持情节的推进。
- en: 'Eduardo’s Character: Eduardo feels somewhat one-dimensional as the stereotypical
    controlling and arrogant billionaire. Adding more depth and nuance to his character
    could make the conflict with Dillon more compelling and believable. Exploring
    his motivations and backstory could help humanize him beyond the “villain” archetype.'
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华多的角色：爱德华多作为典型的控制欲强和傲慢的亿万富翁，感觉有些单薄。为他的角色增加更多深度和细微差别可以使与迪隆的冲突更加引人入胜和可信。探索他的动机和背景故事可以帮助他超越“反派”原型。
- en: 'Anita’s Internal Conflict: While Anita’s internal struggle between her desire
    for fame and her growing feelings for Dillon is evident, it could be further explored.
    Delving deeper into her insecurities and motivations for pursuing the influencer
    lifestyle could add emotional depth and complexity to her character arc.'
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: 安尼塔的内心冲突：虽然安尼塔在追求成名和日益增长的对迪隆的感情之间的内心斗争是明显的，但这可以进一步探索。深入挖掘她的不安全感和追求网红生活方式的动机可以为她的角色弧线增添情感深度和复杂性。
- en: 'Resolution: The story ends on a cliffhanger, leaving the reader uncertain about
    Anita’s ultimate decision and the future of her relationships with both Dillon
    and Eduardo. While this can create anticipation for a sequel, it may leave some
    readers feeling unsatisfied without a clearer resolution to the central conflict.'
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：故事以悬念结束，让读者对安尼塔的最终决定以及她与迪隆和爱德华多关系的未来感到不确定。虽然这可以创造对续集的期待，但它可能让一些读者在没有更清晰解决主要冲突的情况下感到不满意。
- en: 'Additional Suggestions:'
  id: totrans-1858
  prefs: []
  type: TYPE_NORMAL
  zh: 其他建议：
- en: 'Explore the Ethical Implications of AI: The story touches on the potential
    dangers of AI in matchmaking, but this theme could be further developed. Exploring
    the ethical implications of deepfake technology and the manipulation of reality
    could add depth and intrigue to the narrative.'
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: 探索人工智能的伦理影响：故事触及了人工智能在配对中的潜在危险，但这一主题可以进一步发展。探索深度伪造技术的伦理影响和对现实的操纵可以为叙事增添深度和吸引力。
- en: 'Develop the Supporting Characters: While Wanda and Gina are entertaining, they
    could be further developed with their own storylines and challenges. This would
    enrich the overall narrative and provide additional perspectives on the central
    conflict.'
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: 发展配角：虽然万达和吉娜很有趣，但可以通过他们自己的故事线和挑战来进一步发展。这将丰富整体叙事并提供对中心冲突的额外视角。
- en: 'Consider the Ending: While a cliffhanger can be effective, consider offering
    a more conclusive ending that resolves the main conflict while leaving room for
    future possibilities. This could involve Anita making a clear choice between Dillon
    and Eduardo, or perhaps finding a way to forge her own path outside of the expectations
    placed upon her by both men.'
  id: totrans-1861
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑结局：虽然悬念可以很有效，但考虑提供一个更明确的结局，在解决主要冲突的同时，留下未来可能性的空间。这可能涉及安尼塔在迪隆和爱德华多之间做出明确的选择，或者也许找到一种方法，在她被两位男性期望之外开辟自己的道路。
- en: Overall, Not My Bridegroom is an engaging and entertaining read with strong
    characters and a compelling premise. Addressing the pacing and character development
    issues, along with exploring the themes more deeply, could elevate the story to
    its full potential.
  id: totrans-1862
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，《不是我的新郎》是一部引人入胜且娱乐性强的读物，拥有鲜明的角色和吸引人的情节。解决节奏和角色发展问题，以及更深入地探讨主题，可以将故事提升到其全部潜力。
- en: 'USER: You’re right. The story is incomplete because it is a work in progress.
    Please suggest ways of completing the story by noting the plot points that have
    not yet happened and give me a possible way to complete the story using romance
    conventions.'
  id: totrans-1863
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：你说得对。这个故事不完整，因为它还在进行中。请提出完成故事的方法，指出尚未发生的情节点，并给我一个使用浪漫传统完成故事的可能方式。
- en: 'MODEL:'
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Completing “Not My Bridegroom”: Suggested Plot Points and Resolution'
  id: totrans-1865
  prefs: []
  type: TYPE_NORMAL
  zh: 完成“不是我的新郎”：建议的情节点和解决方案
- en: 'Missing Plot Points:'
  id: totrans-1866
  prefs: []
  type: TYPE_NORMAL
  zh: 缺少的情节点：
- en: 'Confrontation with Eduardo: Anita needs to definitively break things off with
    Eduardo, addressing the financial complications created by her father’s debt and
    the potential legal ramifications of breaking the brand ambassador contract.'
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: 与爱德华多的对抗：安尼塔需要与爱德华多明确断绝关系，解决她父亲债务带来的财务复杂性和解除品牌大使合同可能产生的法律后果。
- en: 'Dillon’s Role: Dillon’s position within the story needs clarification. Will
    he remain as the wedding planner, or will his role evolve into something more
    significant as Anita’s feelings for him deepen?'
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: 迪伦的角色：迪伦在故事中的位置需要明确。他是否会继续作为婚礼策划者，还是随着安妮塔对他的感情加深，他的角色会演变成一个更重要的角色？
- en: 'Cookie’s Reaction: Cookie’s anger and hurt need to be addressed. Can she forgive
    Anita and Dillon for their deception, and might she play a role in helping them
    navigate the challenges ahead?'
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: Cookie的反应：Cookie的愤怒和伤害需要得到处理。她能原谅安妮塔和迪隆的欺骗吗，她可能会在帮助他们应对未来的挑战中扮演一个角色？
- en: 'Public Perception: The public’s perception of Anita and Eduardo’s relationship
    needs to be resolved. Will their breakup be a public spectacle, or can they manage
    a more discreet separation?'
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: 公众认知：公众对安妮塔和爱德华多关系的看法需要解决。他们的分手会成为公众的 spectacle 吗，还是他们能够管理一个更隐秘的分离？
- en: 'Possible Resolution using Romance Conventions:'
  id: totrans-1871
  prefs: []
  type: TYPE_NORMAL
  zh: 使用浪漫惯例可能的解决方案：
- en: 'Confrontation and Resolution with Eduardo:'
  id: totrans-1872
  prefs: []
  type: TYPE_NORMAL
  zh: 与爱德华多的对抗和解决：
- en: Anita, with the support of Dillon and her friends, gathers evidence of Eduardo’s
    manipulative behavior and the flaws in the LoveBytes algorithm. This could involve
    uncovering data manipulation or highlighting the negative experiences of other
    users.
  id: totrans-1873
  prefs: []
  type: TYPE_NORMAL
  zh: 安妮塔在迪隆和她的朋友们支持下，收集了爱德华多操纵行为和LoveBytes算法缺陷的证据。这可能包括揭露数据操纵或突出其他用户的负面经历。
- en: Armed with this information, Anita confronts Eduardo, exposing his unethical
    practices and the true nature of their relationship. She threatens to expose him
    publicly unless he releases her from the contract and forgives her father’s debt.
  id: totrans-1874
  prefs: []
  type: TYPE_NORMAL
  zh: 在掌握了这些信息后，安妮塔面对爱德华多，揭露了他的不道德行为和他们关系的真实本质。她威胁要公开揭露他，除非他解除她的合同并原谅她父亲的债务。
- en: Eduardo, realizing the potential damage to his reputation and business, reluctantly
    agrees to Anita’s terms. He might even experience a moment of self-awareness,
    acknowledging his flaws and the emptiness of his pursuit of success and control.
  id: totrans-1875
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华多意识到这可能会对他的声誉和生意造成潜在损害，不情愿地同意了安妮塔的条件。他甚至可能经历一段自我意识，承认自己的缺陷以及他对成功和控制追求的空虚。
- en: 'Dillon’s Role and Development:'
  id: totrans-1876
  prefs: []
  type: TYPE_NORMAL
  zh: 迪隆的角色和发展：
- en: Dillon remains a supportive presence throughout the conflict with Eduardo, offering
    emotional support and practical assistance. His role could evolve into a protector
    figure, shielding Anita from Eduardo’s threats and helping her navigate the challenges
    of rebuilding her life and career.
  id: totrans-1877
  prefs: []
  type: TYPE_NORMAL
  zh: 迪隆在整个与爱德华多的冲突中保持着一个支持性的存在，提供情感支持和实际帮助。他的角色可能会演变成一个保护者形象，保护安妮塔免受爱德华多的威胁，并帮助她应对重建生活和事业中的挑战。
- en: Dillon’s acting career could experience a resurgence, perhaps landing a role
    in a romantic comedy that mirrors his real-life situation with Anita. This would
    allow him to achieve success on his own terms, no longer needing to rely on Eduardo’s
    financial support.
  id: totrans-1878
  prefs: []
  type: TYPE_NORMAL
  zh: 迪隆的演艺事业可能会经历一次复兴，也许会在一部反映他与安妮塔现实生活中情况的浪漫喜剧中找到角色。这将使他能够按照自己的条件取得成功，不再需要依赖爱德华多的经济支持。
- en: 'Reconciliation with Cookie:'
  id: totrans-1879
  prefs: []
  type: TYPE_NORMAL
  zh: 与Cookie的和解：
- en: Anita and Dillon sincerely apologize to Cookie for their deception, acknowledging
    the hurt they caused. Cookie, seeing their genuine remorse and the depth of their
    feelings for each other, eventually forgives them.
  id: totrans-1880
  prefs: []
  type: TYPE_NORMAL
  zh: 安妮塔和迪隆真诚地向Cookie道歉，承认他们造成的伤害。看到他们真诚的悔恨和对彼此深厚感情的深度，Cookie最终原谅了他们。
- en: Cookie could even become an ally, using her wedding planning expertise to help
    Anita and Dillon navigate the aftermath of the breakup and build a future together.
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: Cookie甚至可能成为盟友，利用她在婚礼策划方面的专业知识来帮助安妮塔和迪隆应对分手后的后果，并共同构建未来。
- en: 'Public Revelation and Happily Ever After:'
  id: totrans-1882
  prefs: []
  type: TYPE_NORMAL
  zh: 公开揭露和幸福结局：
- en: The truth about Anita and Eduardo’s fake relationship is eventually revealed
    to the public, either through a carefully orchestrated media campaign or a dramatic
    exposé. Anita takes control of the narrative, exposing Eduardo’s manipulation
    and reclaiming her own identity.
  id: totrans-1883
  prefs: []
  type: TYPE_NORMAL
  zh: 安妮塔和爱德华多虚假关系的真相最终被公众揭露，无论是通过精心策划的媒体运动还是戏剧性的揭露。安妮塔掌握了叙事权，揭露了爱德华多的操纵并重新夺回了自己的身份。
- en: Anita and Dillon’s relationship blossoms, their shared experiences and genuine
    connection leading to a deep and lasting love. They could even collaborate on
    a new project together, combining Anita’s writing skills with Dillon’s acting
    talent to create something authentic and meaningful.
  id: totrans-1884
  prefs: []
  type: TYPE_NORMAL
  zh: 安妮塔和迪隆的关系蓬勃发展，他们共同的经历和真挚的联系导致了深厚而持久的爱情。他们甚至可以一起合作开展一个新项目，结合安妮塔的写作技巧和迪隆的表演才能，创造出真实而有意义的东西。
- en: The story concludes with a satisfying happily ever after, with Anita and Dillon
    finding love and success on their own terms. This could involve a beautiful wedding
    ceremony, planned by Cookie, or perhaps a more intimate commitment ceremony that
    reflects their unique bond.
  id: totrans-1885
  prefs: []
  type: TYPE_NORMAL
  zh: 故事以一个令人满意的幸福结局结束，Anita和Dillon以他们自己的方式找到了爱情和成功。这可能包括由Cookie策划的一场美丽的婚礼，或者可能是一个更亲密的承诺仪式，反映了他们独特的纽带。
- en: 'Additional Considerations:'
  id: totrans-1886
  prefs: []
  type: TYPE_NORMAL
  zh: 附加考虑：
- en: 'The Role of Social Media: Explore how Anita navigates the aftermath of the
    scandal on social media. Will she continue as an influencer, or will she choose
    a different path?'
  id: totrans-1887
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体的作用：探讨Anita如何应对社交媒体上的丑闻。她将继续作为影响者，还是会选择不同的道路？
- en: 'Character Growth: Show how both Anita and Dillon grow and mature throughout
    the story, learning from their mistakes and becoming stronger individuals.'
  id: totrans-1888
  prefs: []
  type: TYPE_NORMAL
  zh: 角色成长：展示Anita和Dillon在整个故事中如何成长和成熟，从他们的错误中学习并变得更强。
- en: 'Themes of Forgiveness and Redemption: Emphasize the importance of forgiveness
    and second chances, not only for Anita and Dillon but also for other characters
    who might have made mistakes.'
  id: totrans-1889
  prefs: []
  type: TYPE_NORMAL
  zh: 宽恕与救赎的主题：强调宽恕和第二次机会的重要性，不仅对Anita和Dillon，也对可能犯过错误的其他角色。
- en: By incorporating these missing plot points and following a classic romance structure,
    you can create a satisfying and emotionally resonant conclusion to Not My Bridegroom.
    The key is to focus on character development, authentic relationships, and the
    triumph of love over superficiality and deceit.
  id: totrans-1890
  prefs: []
  type: TYPE_NORMAL
  zh: 通过融入这些缺失的情节要点并遵循经典的浪漫结构，你可以在《不是我的新郎》中创造一个令人满意且情感共鸣的结局。关键在于关注角色发展、真实的关系以及爱情战胜肤浅和欺骗的胜利。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1891
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: Did you notice how AI always chooses the most obvious and boring way to dial
    down conflict? However, by adding knowledge to its context window, we were able
    to get Gemini 1.5 Pro to give us answers that will help us with genre-specific
    issues.
  id: totrans-1892
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有注意到AI总是选择最明显和无聊的方式来降低冲突？然而，通过向其上下文窗口添加知识，我们能够让Gemini 1.5 Pro给出有助于解决特定流派问题的答案。
- en: You can take all of the notes you took for a class or while reading a book and
    upload them to the AI Studio, and it will put that knowledge to use. I’ll illustrate
    one more genre, and then give you some starter questions for a few more popular
    genres.
  id: totrans-1893
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将你在课堂上或读书时做的所有笔记上传到AI Studio，它将利用这些知识。我将展示另一个流派，然后给你一些关于几个更受欢迎流派的开场问题。
- en: ROMANTIC SUSPENSE
  id: totrans-1894
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 浪漫悬疑
- en: '1\. Upload the entire PDF of Rachelle Ayala’s Dangerous Love: Writing Romantic
    Suspense into Gemini 1.5 Pro.'
  id: totrans-1895
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 将Rachelle Ayala的《危险的爱：浪漫悬疑写作》的整个PDF上传到Gemini 1.5 Pro。
- en: 2\. Upload the PDF of Rachelle Ayala’s 366 Ways to Know Your Character.
  id: totrans-1896
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将Rachelle Ayala的《366种了解你的角色的方法》的PDF上传。
- en: 'User: We’re going to brainstorm a romantic suspense with quirky characters.
    I’d like to make my romantic suspense humorous, so let’s answer some questions
    about them from the 366 Ways to Know Your Character book. Select three questions
    for my heroine and answer them.'
  id: totrans-1897
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：我们要头脑风暴一个有怪异角色的浪漫悬疑故事。我想让我的浪漫悬疑故事幽默一些，所以让我们从《366种了解你的角色的方法》这本书中回答一些关于她们的问题。为我的女主角选择三个问题并回答。
- en: 'Model:'
  id: totrans-1898
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Here are three questions with potential answers to help develop a humorous
    romantic suspense heroine:'
  id: totrans-1899
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有三个问题及其潜在答案，以帮助发展一个幽默的浪漫悬疑女主角：
- en: 'Question 13: What is an emotional blind spot for your character? Which person
    in her life reminds her to watch for it?'
  id: totrans-1900
  prefs: []
  type: TYPE_NORMAL
  zh: 问题13：你角色的情感盲点是什么？她生活中的哪个人提醒她注意这一点？
- en: 'Answer: Your heroine’s blind spot could be her inability to recognize sarcasm.
    She takes everything literally, leading to humorous misunderstandings and awkward
    situations, especially during tense moments in the investigation. Her best friend,
    a sarcastic and witty individual, constantly reminds her to read between the lines,
    often with exasperated sighs and eye rolls.'
  id: totrans-1901
  prefs: []
  type: TYPE_NORMAL
  zh: 回答：你女主角的盲点可能是她无法识别讽刺。她事事都按字面意思理解，导致幽默的误解和尴尬的情况，尤其是在调查的紧张时刻。她的最好朋友，一个讽刺且机智的人，总是不断地提醒她要读字里行间的意思，经常带着疲惫的叹息和翻白眼。
- en: 'Question 21: If your character were offered the wealth of the entire world
    for the life of a single child, one she was not related to and suffered from a
    disease, which would she choose? Would she regret her choice? What if it were
    the life of the man she loves? For example, he jumps in the ocean to save a juvenile
    delinquent?'
  id: totrans-1902
  prefs: []
  type: TYPE_NORMAL
  zh: 问题21：如果你的角色被提供整个世界的财富以换取一个与她无关且患有疾病的孩子的生命，她会选择什么？她会后悔她的选择吗？如果这是她所爱的人的生命呢？例如，他跳进海洋去救一个青少年罪犯？
- en: 'Answer: Despite her quirkiness, your heroine has a strong moral compass. She
    would refuse the wealth, unable to bear the guilt of sacrificing a child’s life,
    even for all the riches in the world. She might initially struggle with the decision,
    tempted by the possibilities, but ultimately choose compassion. However, if it
    were the life of the man she loves, the choice would become agonizing, creating
    an internal conflict between her love and her morals. This internal struggle could
    be a source of humor, as she debates the pros and cons in her unique, literal
    way, while also highlighting the depth of her love and the lengths she’d go to
    for the man she loves.'
  id: totrans-1903
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：尽管她有些古怪，但你的女主角有一个坚定的道德指南针。她会拒绝财富，无法承受牺牲一个孩子生命的罪恶感，即使是为了世界上所有的财富。她可能最初会为这个决定而挣扎，被可能性所诱惑，但最终会选择同情。然而，如果这是她所爱的人的生命，选择就会变得痛苦，在她对爱和道德之间产生内部冲突。这种内部斗争可能成为幽默的来源，因为她会以她独特而直接的方式辩论利弊，同时突出她爱的深度以及她为她所爱的人所付出的努力。
- en: 'Question 28: Has your character ever been in a gang? What was the gang like?
    Was it criminal or social?'
  id: totrans-1904
  prefs: []
  type: TYPE_NORMAL
  zh: 问题28：你的角色曾经加入过帮派吗？这个帮派是什么样的？是犯罪的还是社交的？
- en: 'Answer: Your heroine, despite her sweet and quirky nature, was once part of
    a “gang” in high school. However, this wasn’t a typical gang involved in criminal
    activities. Instead, it was a group of self-proclaimed “Grammar Police” who roamed
    the school halls correcting grammatical errors and enforcing proper punctuation.
    This experience could be a source of humor, as she recounts her past exploits
    with a mix of nostalgia and embarrassment, while also showcasing her intelligence
    and attention to detail, skills that could prove useful in solving the mystery.'
  id: totrans-1905
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：你的女主角，尽管她性格甜美且古怪，曾经是高中时一个“帮派”的一员。然而，这并不是一个参与犯罪活动的典型帮派。相反，它是一群自称为“语法警察”的人，在学校走廊里纠正语法错误并执行正确的标点。这种经历可能成为幽默的来源，当她带着怀旧和尴尬回忆起过去的冒险时，同时也展示了她的智慧和注意细节的能力，这些技能在解决谜题时可能非常有用。
- en: 'User: Great. Please give her a name and an occupation. Looking in the Dangerous
    Love book, suggest some competencies I can give the heroine so she’s not a walking
    disaster woman in jeopardy.'
  id: totrans-1906
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：很好。请给她一个名字和一个职业。在《危险之爱》这本书中，建议我可以给女主角一些能力，让她不是一个行走的灾难，处于危险之中。
- en: 'Model:'
  id: totrans-1907
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Heroine Profile:'
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: 女主角档案：
- en: 'Name: Penelope “Penny” Parsons'
  id: totrans-1909
  prefs: []
  type: TYPE_NORMAL
  zh: 姓名：佩内洛普“佩妮”帕森斯
- en: 'Occupation: Librarian'
  id: totrans-1910
  prefs: []
  type: TYPE_NORMAL
  zh: 职业：图书管理员
- en: 'Competencies:'
  id: totrans-1911
  prefs: []
  type: TYPE_NORMAL
  zh: 能力：
- en: 'Penny’s occupation as a librarian provides several competencies that can be
    used in humorous romantic suspense:'
  id: totrans-1912
  prefs: []
  type: TYPE_NORMAL
  zh: 佩妮作为图书管理员的工作提供了几个可以在幽默的浪漫悬疑小说中使用的技能：
- en: 'Research Skills: Penny is a master of research, able to navigate databases
    and archives with ease. This skill will be invaluable in uncovering clues and
    delving into the background of suspects. Imagine her humorously navigating the
    dark web or deciphering coded messages using her knowledge of the Dewey Decimal
    System.'
  id: totrans-1913
  prefs: []
  type: TYPE_NORMAL
  zh: 研究技能：佩妮是研究大师，能够轻松地导航数据库和档案馆。这项技能在发现线索和深入了解嫌疑人的背景中将非常有价值。想象她用杜威十进制分类法幽默地导航暗网或解读编码信息。
- en: 'Attention to Detail: As a librarian, Penny has a keen eye for detail, noticing
    inconsistencies and spotting subtle clues that others might miss. This could be
    played for laughs as she obsesses over misplaced commas or typos in threatening
    notes from the villain.'
  id: totrans-1914
  prefs: []
  type: TYPE_NORMAL
  zh: 注意细节：作为图书管理员，佩妮对细节有敏锐的洞察力，能够注意到不一致之处和发现其他人可能错过的细微线索。这可以用来制造笑声，当她对错位的逗号或来自恶棍的威胁性笔记中的打字错误着迷时。
- en: 'Organization Skills: Penny is highly organized, able to categorize information
    and keep track of complex details. This can be helpful in organizing evidence
    and timelines in the investigation, and also be a source of humor as she color-codes
    clues or alphabetizes suspects.'
  id: totrans-1915
  prefs: []
  type: TYPE_NORMAL
  zh: 组织能力：佩妮非常有条理，能够对信息进行分类并跟踪复杂细节。这有助于在调查中组织证据和时间线，同时，当她用彩色编码线索或按字母顺序排列嫌疑人时，也可能成为幽默的来源。
- en: 'Unexpected Knowledge: Librarians often have a wide range of knowledge due to
    their exposure to various books and resources. Penny could have surprising expertise
    in a particular area, like local history, cryptography, or even self-defense,
    that comes in handy during the investigation.'
  id: totrans-1916
  prefs: []
  type: TYPE_NORMAL
  zh: 意外的知识：由于接触了各种书籍和资源，图书管理员通常拥有广泛的知识。佩妮可能在某个特定领域拥有令人惊讶的专业知识，比如地方历史、密码学，甚至自卫，这在调查中非常有用。
- en: 'Additional Quirky Competencies:'
  id: totrans-1917
  prefs: []
  type: TYPE_NORMAL
  zh: 其他古怪能力：
- en: 'Master of Disguise: Penny, being a fan of mystery novels, is surprisingly skilled
    at creating disguises, using her knowledge of fashion history and costume design.
    Imagine her humorously infiltrating a high-society party dressed as a flamboyant
    historical figure or blending into a biker bar with an outrageous punk-rock look.'
  id: totrans-1918
  prefs: []
  type: TYPE_NORMAL
  zh: 化身大师：佩妮是一位神秘小说迷，出人意料地擅长化装，她运用自己对时尚历史和服装设计的知识。想象一下她幽默地潜入一个上流社会的聚会，打扮成一位张扬的历史人物，或者以夸张的朋克摇滚造型混入一个摩托车酒吧。
- en: 'Animal Whisperer: Penny has a unique ability to connect with animals, which
    could lead to humorous situations where she gets help from unexpected creatures,
    like a flock of pigeons or a stray cat, to solve the mystery.'
  id: totrans-1919
  prefs: []
  type: TYPE_NORMAL
  zh: 动物沟通者：佩妮有一种独特的能力，能够与动物建立联系，这可能导致一些幽默的情况，比如她从一群鸽子或一只流浪猫等意想不到的生物那里得到帮助来解决谜题。
- en: 'User: Based on Penelope Parson’s personality and occupation, what kind of hero
    will best stymie her? Look through Dangerous Love and select a plot type, and
    then put our hero in a position to thoroughly annoy the heroine.'
  id: totrans-1920
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：基于佩内洛普·帕森斯的个性和职业，哪种英雄最能挫败她？查阅《危险的爱情》并选择一个情节类型，然后让我们的英雄处于一个彻底惹恼女主角的位置。
- en: 'Model:'
  id: totrans-1921
  prefs: []
  type: TYPE_NORMAL
  zh: 模特：
- en: 'Hero and Plot Type:'
  id: totrans-1922
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄和情节类型：
- en: Given Penny’s personality as a quirky and detail-oriented librarian, a hero
    who thrives in chaos and relies on intuition would create a hilarious dynamic.
  id: totrans-1923
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到佩妮作为一个古怪且注重细节的图书管理员，一个在混乱中茁壮成长并依赖直觉的英雄将创造一个有趣的动态。
- en: 'Plot Type: The Investigation'
  id: totrans-1924
  prefs: []
  type: TYPE_NORMAL
  zh: 情节类型：调查
- en: 'Hero: Detective Jack Callahan – a rough-around-the-edges, instinctive detective
    with a disregard for rules and a penchant for jumping to conclusions. He’s the
    opposite of Penny in every way, creating a classic “opposites attract” scenario.'
  id: totrans-1925
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄：侦探杰克·卡拉汉——一个粗鲁、直觉型侦探，不遵守规则，喜欢草率下结论。他在每个方面都与佩妮相反，创造了一个经典的“对立吸引”场景。
- en: 'Conflict Setup:'
  id: totrans-1926
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突设置：
- en: Penny stumbles upon a dead body in the library, making her a key witness in
    the investigation. Detective Callahan, assigned to the case, immediately clashes
    with Penny’s methodical and meticulous nature. He finds her attention to detail
    and insistence on following procedures frustrating, while she’s annoyed by his
    impulsiveness and disregard for the rules.
  id: totrans-1927
  prefs: []
  type: TYPE_NORMAL
  zh: 佩妮在图书馆里无意中发现了一具尸体，使她成为了调查中的关键证人。被分配到这个案件的侦探卡拉汉立刻与佩妮的条理性和细致入微的性格发生冲突。他发现她对细节的关注和坚持按程序办事让他感到沮丧，而她则对他的冲动和忽视规则感到烦恼。
- en: 'Here are some ways Jack can annoy Penny:'
  id: totrans-1928
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些杰克可以惹恼佩妮的方法：
- en: 'Disrupting her organized world: Jack constantly messes up her perfectly organized
    crime scene, leaving coffee cups on her meticulously arranged evidence or rearranging
    her carefully categorized notes.'
  id: totrans-1929
  prefs: []
  type: TYPE_NORMAL
  zh: 打乱她的有序世界：杰克不断地弄乱她精心组织的犯罪现场，把咖啡杯放在她精心排列的证据上，或者重新整理她仔细分类的笔记。
- en: 'Ignoring her insights: He dismisses her observations and deductions, considering
    them irrelevant or “librarian talk,” only to later realize she was right all along.'
  id: totrans-1930
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视她的洞察力：他忽视她的观察和推理，认为它们无关紧要或“图书管理员式的谈话”，结果后来才发现她一直是对的。
- en: 'Breaking library rules: He talks loudly on his phone, eats messy snacks, and
    disregards the “silence please” signs, much to Penny’s exasperation.'
  id: totrans-1931
  prefs: []
  type: TYPE_NORMAL
  zh: 违反图书馆规则：他在电话里大声说话，吃乱糟糟的小吃，并且无视“请保持安静”的标志，这让佩妮感到非常恼火。
- en: 'Teasing her about her quirks: He pokes fun at her literal interpretations of
    things and her obsession with grammar, creating witty banter and humorous exchanges.'
  id: totrans-1932
  prefs: []
  type: TYPE_NORMAL
  zh: 取笑她的怪癖：他拿她字面意义上的解释和对语法的痴迷开玩笑，创造出机智的对话和幽默的交流。
- en: This dynamic between the meticulous librarian and the impulsive detective will
    create a humorous and engaging romantic suspense, as they learn to work together,
    appreciate each other’s strengths, and eventually fall in love amidst the chaos
    of the investigation.
  id: totrans-1933
  prefs: []
  type: TYPE_NORMAL
  zh: 这种细致的图书管理员和冲动的侦探之间的动态将创造一种幽默和引人入胜的浪漫悬疑故事，因为他们学会了一起工作，欣赏彼此的优点，并在调查的混乱中最终坠入爱河。
- en: 'User: Look through Dangerous Love and design a diabolical villain likely to
    stymie Jack and place Penny in danger, even though she doesn’t believe she’s in
    danger. Make Jack frustrated as he just knows this villain is bad but Penny can’t
    recognize it.'
  id: totrans-1934
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：在《危险的爱情》中寻找，设计一个可能阻碍杰克并使佩妮陷入危险的邪恶反派，即使她不相信自己处于危险之中。让杰克感到沮丧，因为他只是知道这个反派很坏，但佩妮却无法识别出来。
- en: 'Model:'
  id: totrans-1935
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Diabolical Villain:'
  id: totrans-1936
  prefs: []
  type: TYPE_NORMAL
  zh: 恶魔反派：
- en: 'Villain: Arthur Blackwood – A charming and charismatic philanthropist who is
    a major donor to the library and a well-respected member of the community. He
    appears to be a kind and generous benefactor, but beneath the surface lies a dark
    secret and a twisted motive.'
  id: totrans-1937
  prefs: []
  type: TYPE_NORMAL
  zh: 反派：亚瑟·布莱克伍德——一个魅力四射、富有魅力的慈善家，是图书馆的主要捐赠者，也是社区中备受尊敬的成员。他看起来是一位善良、慷慨的赞助者，但表面之下隐藏着一个黑暗的秘密和扭曲的动机。
- en: 'Villain’s Connection to Penny: Arthur has taken a special interest in Penny,
    impressed by her intelligence and dedication. He showers her with compliments
    and gifts, positioning himself as a mentor and friend. Penny, oblivious to his
    true intentions, is flattered by his attention and sees him as a harmless admirer.'
  id: totrans-1938
  prefs: []
  type: TYPE_NORMAL
  zh: 反派与佩妮的联系：亚瑟对佩妮特别感兴趣，被她的智慧和奉献所打动。他不断赞美她并赠送礼物，将自己定位为导师和朋友。佩妮对他的真实意图一无所知，对他的关注感到受宠若惊，并把他看作一个无害的仰慕者。
- en: 'Jack’s Suspicions: Detective Callahan, with his intuitive nature and experience
    dealing with criminals, senses something is off about Arthur. He finds Arthur’s
    charm superficial and his motives suspicious. However, without concrete evidence,
    he is unable to convince Penny of the danger she’s in.'
  id: totrans-1939
  prefs: []
  type: TYPE_NORMAL
  zh: 杰克的怀疑：侦探卡拉汉，凭借他的直觉和与罪犯打交道的经验，感觉到亚瑟身上有些不对劲。他认为亚瑟的魅力是肤浅的，他的动机可疑。然而，没有确凿的证据，他无法说服佩妮她面临的危险。
- en: 'Making it Diabolical:'
  id: totrans-1940
  prefs: []
  type: TYPE_NORMAL
  zh: 使其变得邪恶：
- en: 'Arthur is the mastermind behind the murder Penny witnessed: He committed the
    crime to silence a person who had uncovered his secret illegal activities, perhaps
    involving embezzlement or art forgery.'
  id: totrans-1941
  prefs: []
  type: TYPE_NORMAL
  zh: 亚瑟是佩妮目击的谋杀案的主谋：他为了压制一个揭露他秘密非法活动的人而犯下了罪行，这些活动可能涉及挪用资金或艺术品伪造。
- en: 'Arthur is obsessed with Penny: He sees her as his perfect companion, intelligent
    and unassuming, and plans to manipulate her into becoming his accomplice or even
    his captive.'
  id: totrans-1942
  prefs: []
  type: TYPE_NORMAL
  zh: 亚瑟对佩妮着迷：他认为她是自己完美的伴侣，聪明而谦逊，并计划操纵她成为他的同谋或甚至他的囚犯。
- en: 'Arthur uses his wealth and influence to control the investigation: He donates
    generously to the police department, putting pressure on Jack’s superiors to dismiss
    his suspicions.'
  id: totrans-1943
  prefs: []
  type: TYPE_NORMAL
  zh: 亚瑟利用他的财富和影响力来控制调查：他慷慨地向警察局捐款，给杰克的上司施加压力，让他们放弃他的怀疑。
- en: 'Arthur gaslights Penny: He subtly manipulates her perception of reality, making
    her doubt her own instincts and question Jack’s motives.'
  id: totrans-1944
  prefs: []
  type: TYPE_NORMAL
  zh: 亚瑟给佩妮点灯：他巧妙地操纵她对现实的感知，使她怀疑自己的直觉并质疑杰克的目的。
- en: This setup creates a complex and suspenseful dynamic, as Jack struggles to protect
    Penny from a villain who has gained her trust and appears harmless. Penny’s inability
    to see through Arthur’s facade adds to the tension and humor, as she misinterprets
    his actions and intentions, leading to near misses and escalating danger.
  id: totrans-1945
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置创造了一个复杂且充满悬念的动态，因为杰克努力保护佩妮免受一个已经赢得她的信任且看似无害的恶棍的伤害。佩妮无法看穿亚瑟的伪装，这增加了紧张和幽默，因为她误解了他的行为和意图，导致险些出错和危险升级。
- en: 'User:'
  id: totrans-1946
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：
- en: Combining my ideas with the Investigation plot type described in Dangerous Love,
    please write an outline for humorous romantic suspense and include all seven of
    the romance plot points, with the seven suspense plot points. Make sure to label
    the plot points where they occur and follow all romance conventions. Make sure
    the villain’s character arc is also shown.
  id: totrans-1947
  prefs: []
  type: TYPE_NORMAL
  zh: 结合《危险的爱情》中描述的调查情节类型，请为幽默浪漫悬疑写一个大纲，包括所有七个浪漫情节点和七个悬疑情节点。确保标记情节点发生的位置，并遵循所有浪漫传统。确保展示反派的角色弧线。
- en: 'Model:'
  id: totrans-1948
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Humorous Romantic Suspense Outline:'
  id: totrans-1949
  prefs: []
  type: TYPE_NORMAL
  zh: 幽默浪漫悬疑大纲：
- en: 'Setup:'
  id: totrans-1950
  prefs: []
  type: TYPE_NORMAL
  zh: 设置：
- en: 'Hook + Death Grip: Penny Parsons, a quirky and meticulous librarian, discovers
    a dead body in the rare books section of the library, setting the stage for a
    murder investigation and disrupting her orderly world.'
  id: totrans-1951
  prefs: []
  type: TYPE_NORMAL
  zh: 钩子和死亡握把：古怪而细致的图书管理员佩妮·帕森斯在图书馆的珍本书库中发现了一具尸体，为谋杀调查奠定了基础，扰乱了她有序的世界。
- en: 'Cute Meet + Enter the Villain: Detective Jack Callahan, a rough-around-the-edges
    and impulsive investigator, arrives at the crime scene and immediately clashes
    with Penny, finding her attention to detail and adherence to rules frustrating.
    Arthur Blackwood, a charming philanthropist and major library donor, expresses
    concern for Penny and offers his support, subtly positioning himself as a friend
    and confidante.'
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: 可爱的相遇 + 恶棍登场：杰克·卡拉汉侦探，一个粗犷冲动、缺乏经验的调查员，到达犯罪现场后立即与佩妮发生冲突，发现她对细节的关注和对规则的遵守让他感到沮丧。亚瑟·布莱克伍德，一位迷人的慈善家和主要图书馆捐赠者，对佩妮表示关心并提供支持，巧妙地定位自己为朋友和知己。
- en: 'Rising Action:'
  id: totrans-1953
  prefs: []
  type: TYPE_NORMAL
  zh: 升起部分：
- en: 'Locked and Loaded + Terrible Trouble: Penny becomes a key witness in the case,
    forcing her to interact with the infuriating Detective Callahan as they investigate
    the murder. Jack suspects Arthur of being involved but lacks evidence. Arthur,
    meanwhile, manipulates Penny with his charm and generosity, gaining her trust.'
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: 准备就绪 + 恶劣的麻烦：佩妮成为案件的关键证人，迫使她与令人恼火的侦探卡拉汉互动，他们一起调查谋杀案。杰克怀疑亚瑟与此事有关，但缺乏证据。与此同时，亚瑟用他的魅力和慷慨操纵佩妮，赢得了她的信任。
- en: 'Oops, I’m Falling in Love + I Bought a Clue: Despite their constant bickering
    and contrasting personalities, Penny and Jack develop a grudging respect for each
    other, recognizing each other’s strengths during the investigation. Penny stumbles
    upon a clue, perhaps a rare book with a hidden inscription or a cryptic note,
    that points to Arthur’s involvement in the murder and his potential illegal activities.'
  id: totrans-1955
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀，我坠入爱河了 + 我买到了线索：尽管他们经常争吵，性格迥异，佩妮和杰克在调查过程中逐渐产生了相互尊重，认识到彼此的优点。佩妮偶然发现了一条线索，可能是一本带有隐藏题词的罕见书籍或一个神秘的笔记，指向亚瑟与谋杀案及其潜在非法活动的牵连。
- en: 'Reminder of Danger: Arthur, sensing Penny’s growing suspicion, steps up his
    manipulation tactics, gaslighting her and subtly threatening her safety. He also
    plants false clues to mislead the investigation and divert attention away from
    himself.'
  id: totrans-1956
  prefs: []
  type: TYPE_NORMAL
  zh: 危险的提醒：亚瑟感觉到佩妮日益增长的怀疑，加大了他的操纵策略，对她进行心理操纵并微妙地威胁她的安全。他还布置了虚假线索以误导调查并转移注意力。
- en: 'Midpoint:'
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 中点：
- en: 'The Big Bad + All Is Lost: Penny and Jack have a heated argument, their conflicting
    approaches to the investigation coming to a head. Penny, influenced by Arthur’s
    manipulations, doubts Jack’s suspicions and accuses him of being paranoid. Jack,
    frustrated by Penny’s blind trust in Arthur, feels helpless to protect her. At
    the same time, Arthur’s illegal activities escalate, and he becomes more desperate
    to silence Penny before she uncovers the truth.'
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: 巨大的恶势力 + 一切都失去了：佩妮和杰克发生了激烈的争吵，他们调查方法上的冲突达到了顶点。佩妮受到亚瑟操纵的影响，怀疑杰克的怀疑，并指责他过于偏执。杰克因佩妮对亚瑟的盲目信任而感到无助，无法保护她。与此同时，亚瑟的非法活动升级，他变得更加绝望，试图在佩妮揭露真相之前让她闭嘴。
- en: 'Falling Action:'
  id: totrans-1959
  prefs: []
  type: TYPE_NORMAL
  zh: 落下部分：
- en: 'Romantic Interlude: After a near-miss with danger, orchestrated by Arthur,
    Penny realizes her mistake and apologizes to Jack. They share a moment of vulnerability,
    acknowledging their growing attraction and the possibility of a romantic connection.'
  id: totrans-1960
  prefs: []
  type: TYPE_NORMAL
  zh: 浪漫插曲：在亚瑟策划的险些遭遇危险之后，佩妮意识到自己的错误并向杰克道歉。他们共享了一个脆弱的时刻，承认他们日益增长的吸引力以及可能存在的浪漫关系。
- en: 'Danger to the Dark Moment: Arthur, feeling cornered, takes drastic measures.
    He kidnaps Penny, intending to silence her permanently or force her to become
    his accomplice. Jack, realizing Penny is in grave danger, races against time to
    find her, using the clues she uncovered and his own investigative skills.'
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: 危险的黑暗时刻：亚瑟感到被逼入绝境，采取了极端措施。他绑架了佩妮，意图永远让她闭嘴或强迫她成为他的同谋。杰克意识到佩妮处于极大的危险之中，争分夺秒地寻找她，利用她发现的线索和他的调查技巧。
- en: 'Climax:'
  id: totrans-1962
  prefs: []
  type: TYPE_NORMAL
  zh: 高潮：
- en: 'Grand Romantic Moment + Boss Battle: Jack confronts Arthur in a thrilling showdown,
    rescuing Penny and exposing his crimes. In the midst of the chaos, Penny and Jack
    declare their love for each other, recognizing the bond that has formed between
    them. Arthur, defeated and exposed, attempts to escape but is apprehended by the
    authorities.'
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 伟大的浪漫时刻 + 大Boss战：杰克在一场惊心动魄的对决中与亚瑟对抗，救出了佩妮并揭露了他的罪行。在混乱之中，佩妮和杰克向彼此表达爱意，认识到他们之间形成的纽带。亚瑟在失败和被揭露后，试图逃跑但被当局逮捕。
- en: 'Resolution:'
  id: totrans-1964
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：
- en: 'Happily Ever After + Winner Winner: With the case solved and the villain apprehended,
    Penny and Jack can finally explore their relationship. Penny overcomes her initial
    reservations about his impulsive nature, while Jack learns to appreciate her methodical
    approach. They embrace their happily ever after, finding a balance between their
    contrasting personalities and enjoying their shared love of solving mysteries.
    Arthur faces the consequences of his actions, his carefully constructed facade
    of respectability shattered as he is brought to justice.'
  id: totrans-1965
  prefs: []
  type: TYPE_NORMAL
  zh: 幸福地生活在了一起 + 胜利胜利：随着案件解决和恶棍被捕，佩妮和杰克终于可以探索他们的关系。佩妮克服了她对他冲动性格的最初顾虑，而杰克则学会了欣赏她的有条不紊的方法。他们拥抱他们的幸福生活，在他们的对比个性和共同解决谜题的爱好之间找到了平衡。亚瑟面临着他行为的后果，他精心构建的受人尊敬的假象在他被带到正义面前时被粉碎。
- en: 'Villain’s Character Arc: Arthur Blackwood starts as a seemingly benevolent
    figure but is gradually revealed to be a cunning and manipulative criminal. His
    downfall is driven by his obsession with Penny and his desperation to maintain
    his facade of respectability.'
  id: totrans-1966
  prefs: []
  type: TYPE_NORMAL
  zh: 恶棍角色弧：亚瑟·布莱伍德最初看起来是一个仁慈的人物，但逐渐被揭露为一个狡猾且操纵的罪犯。他的堕落是由他对佩妮的迷恋以及他维持自己受人尊敬的假象的绝望所驱动的。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1967
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: You can also analyze and critique a work in progress against the reference materials.
  id: totrans-1968
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以分析并评论正在进行的作品与参考资料。
- en: 'Example Prompts:'
  id: totrans-1969
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Analyze my story ideas and suggest a plot type from Dangerous Love that best
    fits my story.”
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: “分析我的故事想法，并建议《危险的爱情》中适合我的故事的最佳情节类型。”
- en: “I’d like to blend an additional plot type into my work in progress. Can you
    suggest additional plot points where we can introduce a Pursuit? List the specific
    chapters where these points will fit in.”
  id: totrans-1971
  prefs: []
  type: TYPE_NORMAL
  zh: “我想在我的作品中融合一个额外的情节类型。你能建议我们可以引入追逐的额外情节点吗？列出这些点适合的具体章节。”
- en: “List the types of villains in Dangerous Love. Design a villain that will best
    foil my hero, who is an overprotective macho man.”
  id: totrans-1972
  prefs: []
  type: TYPE_NORMAL
  zh: “列出《危险的爱情》中的恶棍类型。设计一个能够最好地挫败我的英雄（一个过度保护的大男子主义者）的恶棍。”
- en: “I’m writing a dark romantic suspense with a psychopath hero. Combining my ideas
    with the Disturbed plot type described in Dangerous Love, please write a step-by-step
    synopsis of the story.”
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: “我正在写一部带有心理病态英雄的黑暗浪漫悬疑小说。结合我在《危险的爱情》中描述的Disturbed情节类型，请写出一个故事的逐步概要。”
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1974
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: 'I’m giving readers who legally obtain DRM-free versions of my romance-writing
    ebooks permission to upload them to an AI system and use them to develop their
    stories. [Romance in a Month](https://books2read.com/romanceinamonth), [366 Ways
    to Know Your Character](https://books2read.com/366ways), [Love Stories: Writing
    a Romance Novella in 30 Days](https://books2read.com/lovestories), [Writing Asian
    Romance Characters](https://books2read.com/writingasianromancecharacters), [Dangerous
    Love: Writing a Romantic Suspense](https://books2read.com/writingromanticsuspense).
    ⁠[3](#c349.xhtml#a3VT) Non-DRM EPUBs are available at [Smashwords.com](http://Smashwords.com).⁠[4](#c349.xhtml#a3VV)
    You can use a tool like [Calibre](https://calibre-ebook.com/) ⁠[5](#c349.xhtml#a3VX)
    to convert the EPUB to PDF.'
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 我允许合法获得我浪漫小说电子书DRM免费版本的读者将它们上传到AI系统，并使用它们来发展他们的故事。[一个月的浪漫](https://books2read.com/romanceinamonth)，[366种了解你的角色的方法](https://books2read.com/366ways)，[爱情故事：30天内写一部浪漫短篇小说](https://books2read.com/lovestories)，[写亚洲浪漫人物](https://books2read.com/writingasianromancecharacters)，[危险的爱情：写一部浪漫悬疑小说](https://books2read.com/writingromanticsuspense)。[3](#c349.xhtml#a3VT)
    无DRM EPUBs可在[Smashwords.com](http://Smashwords.com)获得。[4](#c349.xhtml#a3VV) 您可以使用[Calibre](https://calibre-ebook.com/)这样的工具[5](#c349.xhtml#a3VX)将EPUB转换为PDF。
- en: MYSTERY
  id: totrans-1976
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MYSTERY
- en: Upload how-to-write cozy mystery notes, images of the setting, and descriptions
    of crafts, cooking, or hobbies.
  id: totrans-1977
  prefs: []
  type: TYPE_NORMAL
  zh: 上传如何写轻松悬疑小说的笔记，场景的图片，以及工艺、烹饪或爱好的描述。
- en: “Based on the characteristics of a cozy mystery in {document}, suggest a closed
    environment and a close-knit group of likely suspects. Make each suspect memorable.”
  id: totrans-1978
  prefs: []
  type: TYPE_NORMAL
  zh: “根据{文档}中轻松悬疑小说的特点，建议一个封闭环境和一群紧密相连的嫌疑人。让每个嫌疑人都令人难忘。”
- en: “Analyze the alibis of all the suspects and identify any inconsistencies or
    potential weaknesses.”
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: “分析所有嫌疑人的借口，并识别任何不一致或潜在的弱点。”
- en: “Using the description of {crafts or hobbies}, list all the clues that point
    to each suspect and assess their relative strength and significance.”
  id: totrans-1980
  prefs: []
  type: TYPE_NORMAL
  zh: “使用{工艺或爱好}的描述，列出指向每个嫌疑人的所有线索，并评估它们的相对强度和重要性。”
- en: “Review the detective’s current theory of the crime and identify any information
    from {knowledge of craft} that contradicts or challenges it.”
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: “回顾侦探对犯罪的当前理论，并确定任何来自{knowledge of craft}的信息与之矛盾或挑战。”
- en: “Generate a list of potential red herrings {setting, crafts, recipes} that could
    be incorporated into the story to mislead the reader.”
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: “生成一个潜在的红鲱鱼列表{setting, crafts, recipes}，这些可以融入故事中误导读者。”
- en: “Examine the {uploaded photograph} of the quaint village bookshop. Describe
    its atmosphere and the types of books it might hold. Brainstorm hidden clues that
    might relate to the titles in the store.”
  id: totrans-1983
  prefs: []
  type: TYPE_NORMAL
  zh: “检查{uploaded photograph}中这个乡村书店的照片。描述其氛围和可能持有的书籍类型。头脑风暴可能与店内标题相关的隐藏线索。”
- en: HORROR
  id: totrans-1984
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恐怖
- en: Upload information on writing horror, documents of creepy places, monster descriptions
    and images.
  id: totrans-1985
  prefs: []
  type: TYPE_NORMAL
  zh: 上传关于写作恐怖、令人毛骨悚然的地方的文件、怪物描述和图像。
- en: “Combine my work in progress with the horror tropes in {document} and select
    three that fit best.”
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: “将我的工作进行中的内容与{document}中的恐怖元素结合，并选择其中三个最合适的。”
- en: “Analyze the protagonist’s fears and vulnerabilities, and suggest ways to exploit
    them to create suspense and horror.”
  id: totrans-1987
  prefs: []
  type: TYPE_NORMAL
  zh: “分析主角的恐惧和脆弱之处，并提出利用它们来创造悬念和恐怖的方法。”
- en: “Explore the history and mythology of the story world as described in {document}.
    Now, create the primary location of the haunted house and identify potential sources
    of supernatural threats.”
  id: totrans-1988
  prefs: []
  type: TYPE_NORMAL
  zh: “探索故事世界的历史和神话，如{document}中所述。现在，创建闹鬼房子的主要地点，并确定潜在的神秘威胁来源。”
- en: “Describe the physical characteristics and powers of the monster/antagonist,
    and suggest ways to make it more terrifying.”
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: “描述怪物/对抗者的身体特征和能力，并提出使其更可怕的方法。”
- en: “Analyze the use of foreshadowing and suspense throughout the story, and suggest
    ways to enhance the overall atmosphere of dread.”
  id: totrans-1990
  prefs: []
  type: TYPE_NORMAL
  zh: “分析故事中预示和悬念的使用，并提出增强整体恐怖氛围的方法。”
- en: “Examine {the uploaded image} of the abandoned asylum. Describe the atmosphere
    and emotions it evokes. How can this setting be used to enhance the horror elements
    of the story?”
  id: totrans-1991
  prefs: []
  type: TYPE_NORMAL
  zh: “检查{the uploaded image}中废弃的精神病院的照片。描述其氛围和激发的情绪。如何利用这个场景来增强故事的恐怖元素？”
- en: ACTION
  id: totrans-1992
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动作
- en: Upload videos of fight scenes. Timelines of action stories. Geography description,
    weather events, weaponry, etc.
  id: totrans-1993
  prefs: []
  type: TYPE_NORMAL
  zh: 上传战斗场面的视频。动作故事的时序。地理描述、天气事件、武器等。
- en: “Write a fight scene of the style shown in {name of video} between my hero and
    villain. Describe it blow-by-blow using exciting language and sensory details.”
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个风格如{name of video}中所示的英雄与反派之间的战斗场景。用激动人心的语言和感官细节逐点描述。”
- en: “Utilizing the weaponry described in {document}, add detail into the scene in
    Chapter 5.”
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: “利用{document}中描述的武器，在第五章的场景中添加细节。”
- en: “Analyze the protagonist’s skills and motivations, and suggest ways to challenge
    them with increasingly difficult obstacles of the type described in {document}.”
  id: totrans-1996
  prefs: []
  type: TYPE_NORMAL
  zh: “分析主角的技能和动机，并建议用{document}中描述的越来越困难的障碍来挑战他们。”
- en: “Evaluate the pacing and flow of the action scenes based on {timeline}. Identify
    places where they lag and suggest ways to increase the tension and excitement.”
  id: totrans-1997
  prefs: []
  type: TYPE_NORMAL
  zh: “根据{timeline}评估动作场景的节奏和流畅度。确定它们拖沓的地方，并提出增加紧张和兴奋感的方法。”
- en: “Describe the pursuit through {geography} and include challenges brought on
    by the terrain and weather. Create obstacles to escalate the stakes for the hero.”
  id: totrans-1998
  prefs: []
  type: TYPE_NORMAL
  zh: “描述通过{geography}的追捕，包括地形和天气带来的挑战。为英雄创造障碍，以增加其风险。”
- en: FANTASY
  id: totrans-1999
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奇幻
- en: Upload your world-building research, magic system descriptions and rules, cultures
    you invent, myths, and mythological creatures. Include AI-generated images to
    describe.
  id: totrans-2000
  prefs: []
  type: TYPE_NORMAL
  zh: 上传你的世界构建研究、魔法系统描述和规则、你创造的文明、神话以及神话生物。包括AI生成的图像来描述。
- en: “Analyze my story based on the magic system of the world in {document}, including
    its rules, limitations, and potential consequences for its users. Point out contradictions
    or places where the magic use is unclear.”
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: “根据{document}中世界的魔法系统分析我的故事，包括其规则、限制和对其用户的潜在后果。指出矛盾或不清楚的地方。”
- en: “Explore the history and culture of the different races and factions within
    the world in {document}, and identify potential sources of conflict and alliances.”
  id: totrans-2002
  prefs: []
  type: TYPE_NORMAL
  zh: “在{document}中探索世界内不同种族和派系的病史和文化，并确定潜在的冲突和联盟来源。”
- en: “Analyze the protagonist’s journey and their role in the overarching prophecy/quest,
    and suggest ways to make their arc more compelling.”
  id: totrans-2003
  prefs: []
  type: TYPE_NORMAL
  zh: “分析主角的旅程及其在整体预言/任务中的作用，并提出使他们的弧线更具吸引力的方法。”
- en: “Examine the map of the fantasy kingdom {image uploaded}. Describe the different
    regions and their significance to the story. Create a dangerous trek for the protagonist
    and the obstacles he encounters as well as likely allies and discoveries along
    the way.”
  id: totrans-2004
  prefs: []
  type: TYPE_NORMAL
  zh: “检查上传的幻想王国地图{image uploaded}。描述不同地区及其对故事的重要性。为主角设计一次危险的旅行，以及他遇到的障碍、可能的盟友和沿途的发现。”
- en: COMING-OF-AGE
  id: totrans-2005
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成长小说
- en: Upload character backstory, family history details, and psychology articles.
  id: totrans-2006
  prefs: []
  type: TYPE_NORMAL
  zh: 上传角色背景故事、家族历史细节和心理文章。
- en: “Based on {document}, analyze the protagonist’s internal conflicts and emotional
    challenges, and suggest ways to depict their journey of self-discovery and growth.”
  id: totrans-2007
  prefs: []
  type: TYPE_NORMAL
  zh: “根据{document}，分析主角的内心冲突和情感挑战，并提出描绘他们自我发现和成长之旅的方法。”
- en: “Explore the relationships between the protagonist and their family, friends,
    and mentors, and identify key moments of influence and conflict. Using {document},
    point out any pathological relationships.”
  id: totrans-2008
  prefs: []
  type: TYPE_NORMAL
  zh: “探讨主角与其家人、朋友和导师之间的关系，并确定关键的影响和冲突时刻。使用{document}指出任何病态关系。”
- en: “Describe the social and cultural environment in which the story takes place
    based on {document of culture}, and suggest ways to use the setting to highlight
    the challenges and opportunities faced by the protagonist.”
  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: “根据{document of culture}，描述故事发生的社会和文化环境，并提出使用环境来突出主角面临的挑战和机遇的方法。”
- en: “Analyze the protagonist’s transition from childhood to adulthood, and identify
    key turning points and moments of realization.”
  id: totrans-2010
  prefs: []
  type: TYPE_NORMAL
  zh: “分析主角从童年到成年的转变，并确定关键转折点和顿悟时刻。”
- en: SCIENCE FICTION
  id: totrans-2011
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 科幻小说
- en: Upload documents on technology, such as quantum computing, nuclear fusion, etc.
    Using AI, generate images of settings, alien species, weapons, and clothing.
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 上传关于技术，如量子计算、核聚变等文档。使用AI生成场景、外星物种、武器和服装的图像。
- en: “Using the information in {document}, describe the technology and scientific
    advancements present in the story, and explore their impact on society and the
    characters.”
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: “使用{document}中的信息，描述故事中的技术和科学进步，并探讨它们对社会和角色的影响。”
- en: “Explore the ethical and philosophical implications of the scientific concepts
    presented in the story (such as artificial intelligence, genetic engineering,
    or space exploration) against the details in {document}.”
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: “探讨故事中呈现的科学概念（如人工智能、基因工程或太空探索）的伦理和哲学含义，与{document}中的细节相对照。”
- en: “Emulating the culture in {document}, describe the alien species or futuristic
    societies encountered by the protagonist, and analyze their culture, motivations,
    and interactions with humans.”
  id: totrans-2015
  prefs: []
  type: TYPE_NORMAL
  zh: “模仿{document}中的文化，描述主角遇到的外星物种或未来社会，并分析他们的文化、动机以及与人类的互动。”
- en: “Based on the physics in {document} evaluate the plausibility and internal consistency
    of the scientific concepts presented in the story.”
  id: totrans-2016
  prefs: []
  type: TYPE_NORMAL
  zh: “根据{document}中的物理学，评估故事中呈现的科学概念的合理性和内部一致性。”
- en: Generate an image with Midjourney or Dall-E and upload it. “Analyze the image
    of the futuristic cityscape. Describe the architectural style, technological advancements,
    and overall atmosphere. How does this setting reflect the themes and conflicts
    of the story?”
  id: totrans-2017
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Midjourney或Dall-E生成图像并上传。 “分析未来城市景观的图像。描述建筑风格、技术进步和整体氛围。这个环境如何反映故事的主题和冲突？”
- en: CRIME
  id: totrans-2018
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 犯罪
- en: Upload articles about criminal organizations. Upload crime scene photos and
    true crime narratives.
  id: totrans-2019
  prefs: []
  type: TYPE_NORMAL
  zh: 上传关于犯罪组织的文章。上传犯罪现场照片和真实犯罪叙述。
- en: “Using information from {document} describe the criminal organization or individual
    responsible for the crime, including their motivations, methods, and ultimate
    goals.”
  id: totrans-2020
  prefs: []
  type: TYPE_NORMAL
  zh: “使用来自{document}的信息描述犯罪组织或个人，包括他们的动机、方法和最终目标。”
- en: “Analyze the evidence and clues gathered by the investigators and suggest possible
    interpretations or leads to follow.”
  id: totrans-2021
  prefs: []
  type: TYPE_NORMAL
  zh: “分析调查人员收集的证据和线索，并提出可能的解释或跟进线索。”
- en: “Explore the social and economic factors that contribute to crime in the story’s
    setting as described in {document}.”
  id: totrans-2022
  prefs: []
  type: TYPE_NORMAL
  zh: “探讨故事设定中犯罪的社会和经济因素，如{document}所述。”
- en: “Describe the impact of the crime on the victims and the community, and explore
    themes of justice, revenge, and redemption.”
  id: totrans-2023
  prefs: []
  type: TYPE_NORMAL
  zh: “描述犯罪对受害者和社会的影响，并探讨正义、复仇和救赎的主题。”
- en: “Examine the crime scene photo uploaded. Describe the details of the scene and
    any potential clues that might be relevant to the investigation. Write a police
    report based on this photo.”
  id: totrans-2024
  prefs: []
  type: TYPE_NORMAL
  zh: “检查上传的犯罪现场照片。描述现场细节以及可能对调查相关的任何潜在线索。根据这张照片写一份警察报告。”
- en: HISTORICAL FICTION
  id: totrans-2025
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 历史小说
- en: Upload historical documents, historical images, and timelines.
  id: totrans-2026
  prefs: []
  type: TYPE_NORMAL
  zh: 上传历史文件、历史图像和时间线。
- en: “By looking at the information in {document}, describe a village in detail and
    describe the townsfolk and their occupations.”
  id: totrans-2027
  prefs: []
  type: TYPE_NORMAL
  zh: “通过查看 {document} 中的信息，详细描述一个村庄，并描述村民及其职业。”
- en: “Describe the heroine’s clothing based on {image}. Specify characteristics that
    signify her social class as described in {document}.”
  id: totrans-2028
  prefs: []
  type: TYPE_NORMAL
  zh: “根据 {image} 描述女主角的服装。具体说明在 {document} 中描述的表明她社会阶级的特征。”
- en: “Write a scene showing our characters going through the storming of the Bastille
    as described in {document}. Note details from {document} and weave them into the
    scene.”
  id: totrans-2029
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个场景，展示我们的角色按照 {document} 中描述的那样经历巴士底狱的攻占。注意从 {document} 中获取的细节，并将它们编织进场景中。”
- en: ​[ ​PART 8​ ]​
  id: totrans-2030
  prefs: []
  type: TYPE_NORMAL
  zh: '[第 8 部分](https://example.org/part8)'
- en: FUTURE-PROOFING YOUR WRITING WITH AI
  id: totrans-2031
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用 AI 为你的写作提供未来保障
- en: '![group of writers playing with babies](image_rsrc4BE.jpg)'
  id: totrans-2032
  prefs: []
  type: TYPE_IMG
  zh: '![一群作家在逗弄婴儿](image_rsrc4BE.jpg)'
- en: ​[ ​41​ ]​
  id: totrans-2033
  prefs: []
  type: TYPE_NORMAL
  zh: '[41](https://example.org/41)'
- en: EMBRACING CHANGE AND COLLABORATION
  id: totrans-2034
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 拥抱变化与合作
- en: One thing is clear. The world of AI is changing faster than anyone can keep
    up. Improvements and new technologies seemingly drop every day and the pace is
    accelerating. So how does an author who uses AI to assist his writing keep up?
  id: totrans-2035
  prefs: []
  type: TYPE_NORMAL
  zh: 一件事是明确的。AI 的世界变化比任何人都能跟上。改进和新技术似乎每天都在出现，而且速度正在加快。那么，使用 AI 辅助写作的作者如何跟上？
- en: The long answer is you can’t—not by yourself. However there are ways to embrace
    change, remain adaptable, but not spend all your time racing one LLM to another.
  id: totrans-2036
  prefs: []
  type: TYPE_NORMAL
  zh: 长话短说，你一个人是无法做到的。然而，有方法可以拥抱变化，保持适应性，但不必把所有时间都花在追逐一个 LLM 到另一个 LLM 上。
- en: KEEP ON WRITING
  id: totrans-2037
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 继续写作
- en: It’s tempting to race from one new application or LLM to another, but remember
    you’re a writer first and an AI expert second. The best way to keep up is to join
    an AI writing community that is forward-thinking and adventurous. Realize that
    new AI models, tools, and techniques are constantly being developed. While it’s
    good to have one eye peeled on the latest and the greatest, there’s also a learning
    curve involved every time you swap tools and methods.
  id: totrans-2038
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个新应用或 LLM 跑到另一个，这种冲动是很强烈的，但记住，你首先是一名作家，其次才是 AI 专家。跟上步伐的最好方法是加入一个具有前瞻性和冒险精神的
    AI 写作社区。认识到新的 AI 模型、工具和技术正在不断开发。虽然关注最新和最好的东西是好的，但每次更换工具和方法时，都会涉及到一个学习曲线。
- en: Stick with your writing process and insert AI where it will make the most difference.
    I’ve thrown a lot at you in this book, but don’t feel like you have to experiment
    with everything. Use the 80-20 rule and use a technique that can make the most
    impact on your writing process.
  id: totrans-2039
  prefs: []
  type: TYPE_NORMAL
  zh: 坚持你的写作流程，并在 AI 可以发挥最大作用的地方插入它。我在这本书中向你介绍了很多东西，但不必尝试所有东西。使用 80-20 规则，并使用可以对你的写作流程产生最大影响的技巧。
- en: Remember, embracing AI doesn’t mean abandoning your traditional writing skills.
    Instead, view AI as an opportunity to enhance your existing process. Be ready
    to adapt when something compelling comes along, like Gemini 1.5 Pro’s ability
    to keep your entire manuscript in its context memory. But don’t jump on the latest
    tool of the day or fall for hype email and exploding countdown timers that take
    your focus off your craft and stories.
  id: totrans-2040
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，拥抱 AI 并不意味着放弃你的传统写作技能。相反，将 AI 视为提升现有流程的机会。准备好适应，当出现像 Gemini 1.5 Pro 那样能够将整个手稿保存在其上下文记忆中的引人注目的事物时。但不要盲目跟风最新的工具，或被炒作邮件和爆炸性的倒计时器所吸引，这些都会让你分心，无法专注于你的技艺和故事。
- en: COLLABORATION AND COMMUNITY
  id: totrans-2041
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合作与社区
- en: There’s strength in numbers, and many eyes can exponentially increase everyone’s
    knowledge when people share. Join an AI writing community that is a supportive
    space where authors can connect, share experiences, and learn from one another.
    Don’t fall for email marketing or insane promises of one-click books with an expiring
    time bomb if you sign up in the next 37 seconds. Follow authors who have actual
    backlists and credibility outside of AI. As with any new thing, there are fly-by-nights
    popping up offering services, coaching, and secret systems preying on fear of
    missing out.
  id: totrans-2042
  prefs: []
  type: TYPE_NORMAL
  zh: 人数众多，当人们分享时，可以指数级地增加每个人的知识。加入一个支持性的AI写作社区，在这里作者们可以相互联系，分享经验，并相互学习。如果你在接下来的37秒内注册，不要被电子邮件营销或疯狂承诺所迷惑，这些承诺是一键式书籍，带有即将到期的定时炸弹。跟随那些在AI之外有实际作品集和信誉的作者。与任何新事物一样，总有一些短期行为者出现，提供服务、指导和秘密系统，利用人们害怕错过的恐惧。
- en: When I started my AI journey, I followed Elizabeth Ann West because I already
    knew her as an established indie author. There were other tools and courses out
    there, but I took Elizabeth’s Gumroad class. Her emphasis is always on the learner
    to understand what’s behind the prompting. She’s big on the need for transparency
    between the AI user and the LLM. This decreases frustration when you can’t understand
    how to modify a prompt because you can’t see what the LLM actually got. By providing
    a tool like Rexy, where users can see everything that goes into the LLM and what
    comes out, she has advanced the skills of writers using AI to include experimentation
    and adjustment of their prompts and fine-tuning to fit their personal writing
    process better.
  id: totrans-2043
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始我的AI之旅时，我跟随了伊丽莎白·安·韦斯特，因为她已经作为一个成熟的独立作家而为我所熟知。当时还有其他工具和课程，但我选择了伊丽莎白的Gumroad课程。她总是强调学习者要理解背后的提示内容。她非常重视AI用户和LLM之间的透明度需求。当你无法理解如何修改提示，因为你看不到LLM实际上得到了什么时，这会减少你的挫败感。通过提供像Rexy这样的工具，用户可以看到一切输入LLM的内容以及输出的内容，她已经提升了使用AI的作家们的技能，包括实验和调整他们的提示，以及微调以更好地适应他们的个人写作过程。
- en: Elizabeth and the rest of the Future Fiction Academy generously post informative
    videos on [YouTube](https://www.youtube.com/@FutureFictionAcademy) ⁠[1](#c349.xhtml#a47V)
    for free and are transparent about what works and what doesn’t. Join the [Future
    Fiction Academy](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[2](#c349.xhtml#a47W) if you want up-to-date AI writing discoveries presented
    to you in interactive labs, structured classes, plus writing clubs and activities.
  id: totrans-2044
  prefs: []
  type: TYPE_NORMAL
  zh: 伊丽莎白和未来科幻学院的其余成员慷慨地免费在[YouTube](https://www.youtube.com/@FutureFictionAcademy)
    [1](#c349.xhtml#a47V) 上发布信息视频，并对其有效性和无效性保持透明。如果你想通过互动实验室、结构化课程、写作俱乐部和活动来获得最新的AI写作发现，请加入[未来科幻学院](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    [2](#c349.xhtml#a47W)。
- en: I also joined the [AI Writing for Authors Facebook Group](https://www.facebook.com/groups/1978687362337633)
    ⁠[3](#c349.xhtml#a466), where I met Steph Pajonas, the group’s founder and one
    of the founders of the Future Fiction Academy. The group is a positive place for
    writers interested in how artificial intelligence can be used for writing. Thanks
    to the hard work of the moderators and admins, it has a supportive and sharing
    culture.
  id: totrans-2045
  prefs: []
  type: TYPE_NORMAL
  zh: 我还加入了[AI Writing for Authors Facebook Group](https://www.facebook.com/groups/1978687362337633)
    [3](#c349.xhtml#a466)，在那里我遇到了斯蒂夫·帕约纳斯，该小组的创始人和未来科幻学院的一位创始人。这个小组是一个积极的地方，让对如何使用人工智能进行写作感兴趣的作家们可以相互交流。多亏了版主和管理员的辛勤工作，它有一个支持性和分享的文化。
- en: Whatever group you join, collaboration is the key, as is a willingness to be
    nonjudgmental, share, and include authors of different abilities, strengths, and
    outlooks.
  id: totrans-2046
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你加入哪个小组，合作是关键，同样重要的是要有非评判性的态度、分享，并包括不同能力、优势和观点的作者。
- en: Sharing your knowledge and experiences with others will not only benefit the
    community but also help you grow as an author and stay ahead of the curve.
  id: totrans-2047
  prefs: []
  type: TYPE_NORMAL
  zh: 与他人分享你的知识和经验不仅会惠及社区，还会帮助你作为一个作家成长，并保持领先。
- en: 'BEYOND THE PAGE: EXPLORING NEW FORMATS'
  id: totrans-2048
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越页面：探索新的格式
- en: AI has the potential to revolutionize storytelling by enabling new and innovative
    formats that go beyond the traditional written word. Interactive narratives, where
    readers can influence the story’s direction, offer a more engaging and immersive
    experience. Videos and personal moviemaking are on the horizon. Personalized stories,
    tailored to individual reader preferences, can create a deeper connection between
    the author and the audience. Immersive experiences, combining text with virtual
    reality or augmented reality, can transport readers to entirely new worlds. Don’t
    be afraid to dream big and embrace the unexpected. You have the opportunity to
    be at the forefront of this creative revolution. Experiment with these emerging
    formats, push the boundaries of storytelling and discover new ways to connect
    with your readers, viewers, gamers, or collaborators.
  id: totrans-2049
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能有可能通过使新的和创新的格式得以实现，从而彻底改变叙事。交互式叙事，读者可以影响故事的方向，提供更吸引人和沉浸式的体验。视频和个人电影制作就在眼前。个性化的故事，根据个别读者的偏好定制，可以在作者和观众之间建立更深的联系。沉浸式体验，结合文本与虚拟现实或增强现实，可以将读者带到全新的世界。不要害怕大胆梦想并拥抱意外。你有机会成为这场创意革命的先锋。尝试这些新兴格式，拓展叙事的边界，发现与读者、观众、游戏玩家或合作伙伴建立联系的新方法。
- en: ETHICS AND RESPONSIBILITY
  id: totrans-2050
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伦理与责任
- en: As we embrace the power of AI, it’s crucial to use this technology responsibly
    and ethically. Concerns about bias, plagiarism, and the impact on human creativity
    are valid and require careful consideration. Always ensure that you have the right
    to use the data you provide to AI models, and be transparent about your use of
    AI if you are a service provider, such as a cover artist, ghostwriter, or editor.
  id: totrans-2051
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们拥抱人工智能的力量，负责任和道德地使用这项技术至关重要。关于偏见、剽窃和对人类创造力影响的担忧是合理的，需要仔细考虑。始终确保你有权使用你提供给人工智能模型的数据，如果你是服务提供商，如封面艺术家、代笔作家或编辑，请务必透明地使用人工智能。
- en: THE FUTURE OF STORYTELLING
  id: totrans-2052
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 叙事的未来
- en: The future of AI and storytelling is full of possibilities. As AI models become
    more sophisticated and our understanding of human creativity deepens, we can expect
    to see even more innovative tools and techniques emerge. AI might even develop
    the ability to generate truly original and creative narratives, blurring the lines
    between human and machine authorship.
  id: totrans-2053
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和叙事的未来充满了可能性。随着人工智能模型变得更加复杂，我们对人类创造力的理解不断加深，我们可以期待看到更多创新工具和技术出现。人工智能甚至可能发展出生成真正原创和创造性叙事的能力，模糊了人类和机器作者之间的界限。
- en: 'However, one thing remains certain: the story that comes from your heart is
    still yours. It doesn’t matter if billions of other people or LLMs tell their
    stories. Your emotions, experiences, and unique perspectives are what make your
    stories unique. No one can replace you as long as you remain authentic. It’s an
    exciting time that promises an ongoing adventure, exploration, journeys, and companionship
    along the way—just like a story—the story of you.'
  id: totrans-2054
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一点是确定的：源自你内心的故事仍然是你的。无论是有数十亿其他人还是LLM讲述他们的故事，这都不重要。你的情感、经验和独特的视角才是使你的故事独一无二的原因。只要你保持真实，就没有人能取代你。这是一个充满激动人心的时刻，承诺着持续的冒险、探索、旅程和陪伴——就像一个故事——你自己的故事。
- en: ​[ ​42​ ]​
  id: totrans-2055
  prefs: []
  type: TYPE_NORMAL
  zh: '[42]'
- en: AUTHOR INTERVIEWS
  id: totrans-2056
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 作者访谈
- en: STEPH PAJONAS, FUTURE FICTION ACADEMY
  id: totrans-2057
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 斯蒂夫·帕乔纳斯，未来科幻学院
- en: Steph Pajonas is a USA Today Bestselling author with over thirty books published
    in multiple genres, including cozy mystery and science fiction romance. She is
    also the founder of the Facebook Group “[AI Writing for Authors](https://www.facebook.com/groups/1978687362337633)”
    ⁠[1](#c349.xhtml#a401) and the [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    (FFA). ⁠[2](#c349.xhtml#a402)
  id: totrans-2058
  prefs: []
  type: TYPE_NORMAL
  zh: 斯蒂夫·帕乔纳斯（Steph Pajonas）是一位《今日美国》畅销书作家，在多个流派中出版了三十多本书，包括温馨悬疑和科幻浪漫小说。她也是Facebook群组“[AI为作家写作](https://www.facebook.com/groups/1978687362337633)”[1](#c349.xhtml#a401)和[未来科幻学院](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)（FFA）的创始人。[2](#c349.xhtml#a402)
- en: 'Q: What inspired you to create the Future Fiction Academy?'
  id: totrans-2059
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 什么启发了你创立未来科幻学院？'
- en: 'A: We decided to start the Academy because we saw that the most significant
    barrier to entry for authors into the world of AI was education. People needed
    to learn what these AI/LLMs were and how to use them, and Elizabeth, our other
    founding members, and I felt that we had enough real-world experience with AI
    to teach others how to use it, too.'
  id: totrans-2060
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我们决定启动学院，因为我们看到作者进入AI世界的最大障碍是教育。人们需要了解这些AI/LLMs是什么，以及如何使用它们，我和我们的另一位创始人伊丽莎白以及我感到，我们拥有足够的AI实际经验来教别人如何使用它。'
- en: 'Q: How has the FFA evolved since its inception?'
  id: totrans-2061
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 自成立以来，FFA是如何演变的？'
- en: 'A: In the beginning, we felt that we had to cover every single AI subject in
    order for authors to learn this, but we soon realized that authors needed to start
    right away and move through the subject matter slowly. We adapted our teaching
    style to provide smaller segments with actionable tasks so authors could learn
    by doing. We also realized that the FFA Community we built was a key part of the
    appeal to authors. They wanted a place where they could talk about these tools,
    learn them, and not be ostracized for trying them. I’m glad we’ve been able to
    provide that for them!'
  id: totrans-2062
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 一开始，我们觉得我们必须涵盖AI的每一个主题，以便作者能够学习这些内容，但很快我们就意识到作者需要立即开始，并逐步学习这些主题。我们调整了教学风格，提供更小的部分和可操作的任务，以便作者通过实践来学习。我们还意识到，我们建立的FFA社区是吸引作者的关键部分。他们想要一个可以讨论这些工具、学习它们，并且不会因为尝试而受到排斥的地方。我很高兴我们能为他们提供这样的服务！'
- en: 'Q: What are some of the biggest challenges you’ve faced in building and growing
    the FFA community?'
  id: totrans-2063
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 在建立和扩大FFA社区的过程中，你面临的最大挑战是什么？'
- en: 'A: Our biggest challenge has definitely been serving a wide array of learning
    styles. We want to make this subject matter accessible for everyone, and I think
    we’ve come close! But in the beginning, it was tough figuring out how to design
    our curriculum so that it served as many people as possible.'
  id: totrans-2064
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我们最大的挑战无疑是满足各种学习风格。我们希望让这个主题对每个人来说都易于理解，我认为我们已经非常接近了！但在一开始，我们很难想出如何设计我们的课程，以便尽可能服务于更多的人。'
- en: 'Q: What are you most proud of in terms of the FFA’s accomplishments and impact
    on the writing community?'
  id: totrans-2065
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 在FFA的成就和其对写作社区的影响方面，你最引以为豪的是什么？'
- en: 'A: I’m super proud when I hear from students that they’ve learned enough skills
    to conquer their work. That we helped them break a lock or unlock a new level
    of skills that they didn’t have before. That really makes all the time and effort
    worth it.'
  id: totrans-2066
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 当我听到学生说他们已经学到了足够的技能来克服他们的工作时，我感到非常自豪。我们帮助他们打破了一个锁，或者解锁了他们以前没有的新技能水平。这真的让所有的时间和努力都变得值得。'
- en: 'Q: How do you see AI transforming the landscape of fiction writing in the next
    few years?'
  id: totrans-2067
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待AI在未来几年内如何改变虚构写作的格局？'
- en: 'A: I think AI is going to enable new stories to enter the market from voices
    we haven’t been able to hear from yet. I’m very excited about the potential for
    new and exciting worlds that people will create with the aid of AI.'
  id: totrans-2068
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我认为AI将使新的故事从我们尚未听到的声音中进入市场。我对人们将借助AI创造的新奇世界充满期待。'
- en: 'Q: What advice would you give to authors who are apprehensive about incorporating
    AI into their writing process?'
  id: totrans-2069
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你会给那些对将AI融入写作过程感到担忧的作者什么建议？'
- en: 'A: What I always tell authors who are apprehensive but curious about adding
    AI to their writing process is to examine their process and determine a pain point
    that they always struggle with. Just one pain point. This is the best place to
    start. Then, use AI to help solve and reduce that pain point until they’re comfortable
    with the tools and what they can do. Once that pain point has been addressed,
    I encourage them to figure out the next natural place to add in AI, something
    that will give them either more free time or reduce the pain in their process.
    From there, each author figures out what works for them the best.'
  id: totrans-2070
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我总是告诉那些对将AI添加到他们的写作过程中既感到担忧又好奇的作者，要检查他们的流程，并确定他们一直努力克服的痛点。只有一个痛点。这是开始的最佳地方。然后，使用AI来帮助解决和减少那个痛点，直到他们熟悉这些工具和它们能做什么。一旦解决了那个痛点，我鼓励他们找出下一个自然地加入AI的地方，这可以给他们带来更多的空闲时间或减少他们流程中的痛苦。从那里开始，每个作者都会找出最适合他们的方法。'
- en: 'Q: What are some of the most popular and effective courses or workshops offered
    by the FFA?'
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: FFA提供的一些最受欢迎和最有效的课程或研讨会有哪些？'
- en: 'A: I really like our new standalone classes that teach how AI works, how to
    prompt, and then how to add AI into each part of the writing process. We give
    authors highly actionable tasks and plenty of examples to get them going. [https://futurefictionacademy.com/courses/](https://futurefictionacademy.com/courses/)
    ⁠[3](#c349.xhtml#a43F)'
  id: totrans-2072
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我真的很喜欢我们新的独立课程，这些课程教授AI的工作原理、如何提示以及如何将AI融入写作过程的每个部分。我们给作者提供高度可操作的任务和大量的例子来帮助他们开始。 [https://futurefictionacademy.com/courses/](https://futurefictionacademy.com/courses/)
    ⁠[3](#c349.xhtml#a43F)'
- en: 'Q: How do you ensure that the FFA’s resources remain relevant and up-to-date
    with the rapid advancements in AI technology?'
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你是如何确保FFA的资源与AI技术的快速进步保持相关性和时效性的？'
- en: 'A: We meet as a team regularly and discuss new and exciting technology that’s
    emerging and could have an impact on our courses or our students. We subscribe
    to many newsletters, podcasts, and YouTube channels that help us stay on the bleeding
    edge. Anything we think that may be worth exploring, we do, and we always share
    our findings with our members.'
  id: totrans-2074
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我们定期作为团队会面，讨论新兴的新技术和可能对我们课程或学生产生影响的技术。我们订阅了许多新闻通讯、播客和YouTube频道，帮助我们保持前沿。任何我们认为值得探索的东西，我们都会去尝试，并且我们总是与我们的成员分享我们的发现。'
- en: 'Q: How do you envision the FFA community evolving and growing in the future?'
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待FFA社区在未来如何发展和成长？'
- en: 'A: I see the community as a place for authors who are serious about adding
    AI into their workflows to get the support they need. We want them to write the
    stories they’ve always wanted to write! And it’s our hope that the community thrives
    and becomes a place for them to find new information, friends, and colleagues.'
  id: totrans-2076
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我认为这个社区是那些认真将AI融入工作流程的作家获得所需支持的地方。我们希望他们能写出他们一直想写的小说！我们也希望这个社区能够繁荣发展，成为他们寻找新信息、朋友和同事的地方。'
- en: Thanks, Steph. This is excellent advice, and I can attest that there’s nothing
    better than being in a vibrant and supportive community. AI is changing so fast
    that no one person can keep up, but the efforts of the FFA, along with its members,
    means that collectively, we can share our findings and experiments and help each
    other thrive as writers in this age of AI.
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢，斯蒂夫。这是极好的建议，我可以证实，没有什么比在一个充满活力和支持的社区中更好了。AI变化如此之快，没有人能够跟上，但FFA及其成员的努力意味着我们可以集体分享我们的发现和实验，并帮助彼此在这个AI时代作为作家茁壮成长。
- en: 'You can find out more about Steph and her writing at:'
  id: totrans-2078
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在以下链接了解更多关于斯蒂夫和她的写作信息：
- en: '[https://www.spajonas.com/](https://www.spajonas.com/) ⁠[4](#c349.xhtml#a464)
    (Space Opera Romance)'
  id: totrans-2079
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.spajonas.com/](https://www.spajonas.com/) ⁠[4](#c349.xhtml#a464)
    (太空歌剧浪漫)'
- en: '[https://www.stephgennaro.com/](https://www.stephgennaro.com/) ⁠[5](#c349.xhtml#a3YM)
    (Cozy Mysteries in Japan)'
  id: totrans-2080
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.stephgennaro.com/](https://www.stephgennaro.com/) ⁠[5](#c349.xhtml#a3YM)
    (日本温馨神秘小说)'
- en: LYNN JORDAN, INDEPENDENT AUTHOR
  id: totrans-2081
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LYNN JORDAN，独立作家
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  id: totrans-2082
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你是如何首次发现AI在小说写作中的潜力的？'
- en: 'A: As an IT professional, I understood how AI could be useful for nonfiction
    and images. I bought a lifetime subscription to one of the very early ones and
    used it to write articles and promotional material. I heard of people who had
    used it (ChatGPT) to write fiction and at least one product designed for fiction.
    I’d been away from writing fiction for publication for several years. My love
    for technology made me eager to check it out.'
  id: totrans-2083
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 作为一名IT专业人士，我理解AI在非虚构作品和图像中的用途。我购买了一个早期AI产品的终身订阅，并用它来撰写文章和宣传材料。我听说有人用它（ChatGPT）来写小说，至少有一个为小说设计的产品。我已经有几年没有写发表的小说了。我对技术的热爱使我渴望去尝试它。'
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你最初对在创作过程中使用AI的期望和担忧是什么？'
- en: 'A: I didn’t really have any expectations. I wanted to see what it was all about.
    I also had several story ideas started or in my mind that I hadn’t touched in
    years.'
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我并没有太多的期望。我想看看它究竟是什么。我也有几个已经构思或在我脑海中多年的故事想法。'
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  id: totrans-2086
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是如何改变你对写作和讲故事的方法的？'
- en: 'A: I like to use AI similarly to how I used to use my critique group. It’s
    great for bouncing around ideas and tweaking plots, even at midnight. Critique
    partners are not always so accommodating.'
  id: totrans-2087
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我喜欢用AI的方式，就像我过去使用我的评论小组一样。它非常适合在午夜时分讨论想法和调整情节，而评论伙伴并不总是那么方便。'
- en: 'Q: Which AI tools and techniques have you found most beneficial in your workflow?'
  id: totrans-2088
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你在创作过程中发现哪些AI工具和技术最有益？'
- en: 'A: I like MidJourney for making promotional images for my clients and myself.
    My main go-tos are Open AI’s ChatGPT models and Anthropic’s Claude models. For
    fiction, I like to use Sudowrite or Rexy (from Future Fiction Academy) to actually
    work on the story.'
  id: totrans-2089
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我喜欢MidJourney为客户和我制作推广图片。我的主要选择是Open AI的ChatGPT模型和Anthropic的Claude模型。对于虚构作品，我喜欢使用Sudowrite或Rexy（来自Future
    Fiction Academy）来实际工作在故事上。'
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  id: totrans-2090
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你能分享一个例子，说明人工智能是如何帮助你克服特定的写作挑战或在你故事中实现预期结果的吗？'
- en: 'A: AI helps me get out of plot holes much faster. As a pantser, I tend to go
    down blind alleys. AI can help me continue the story.'
  id: totrans-2091
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: AI帮助我更快地走出情节困境。作为一个即兴创作的人，我往往会走进死胡同。AI可以帮助我继续故事。'
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  id: totrans-2092
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 在利用AI辅助的同时，你是如何保持自己的声音和风格的？'
- en: 'A: Because I’ve been writing for so many years, I understand my own voice.
    I have no problem with changing anything the AI has generated to my voice.'
  id: totrans-2093
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 因为我已经写作了很多年，所以我了解自己的声音。我对改变AI生成的任何内容以符合我的声音没有问题。'
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  id: totrans-2094
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你遇到过关于AI辅助写作的最大误解是什么？'
- en: 'A: There are quite a few misconceptions about AI from people who haven’t tried
    to use it, especially for fiction. First of all, the models are only computer
    programs. They aren’t plagiarizing anything. They have digested millions of books,
    so they know how some words naturally go with other words. I’ve read thousands
    of books, so I’m more likely to plagiarize something unconsciously from what I’ve
    read. A lot of the training material is older writing that is out of fashion today
    (public domain) or poorly written work that could be found with internet searches.
    Baseline AI writing is not great.'
  id: totrans-2095
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 关于AI的误解有很多，尤其是对于那些没有尝试过使用它的人来说，尤其是对于虚构作品。首先，这些模型只是计算机程序。它们并没有抄袭任何东西。它们已经消化了数百万本书，所以它们知道一些词自然地与其他词搭配。我读过数千本书，所以我更有可能无意中从我所读的书中抄袭一些东西。大量的训练材料是今天已经过时的（公共领域）或可以通过网络搜索找到的糟糕写作。基线AI写作并不出色。'
- en: I have a lot of students who attend my writing with AI classes who have very
    mistaken expectations. No tool that uses AI can deliver a book with one button
    push. It takes a lot of effort and writing skill to get decent prose when assisted
    by AI. Using AI can help you write faster, but it isn’t ‘sit back and let the
    AI write a book.’ The AI models make most of the same mistakes that beginning
    writers make. The human senior partner needs to have the skill and knowledge to
    produce a book (or article) that will please readers.
  id: totrans-2096
  prefs: []
  type: TYPE_NORMAL
  zh: 我有很多学生参加我的AI写作课程，他们对AI有非常错误的期望。没有任何使用AI的工具可以一键生成一本书。当AI辅助时，要写出好的散文需要很多努力和写作技巧。使用AI可以帮助你写得更快，但它并不是“坐下来让AI写一本书”。AI模型会犯大多数初学者都会犯的错误。人类高级合作伙伴需要具备技能和知识，才能创作出令读者满意的书籍（或文章）。
- en: 'Q: How do you envision the future of AI in fiction writing and storytelling?'
  id: totrans-2097
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待人工智能在虚构写作和讲故事方面的未来？'
- en: 'A: I think AI will become an accepted writing tool such as typewriters, computers,
    spell and grammar checkers, and other writing aids.'
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我认为人工智能将成为一种被接受的写作工具，就像打字机、电脑、拼写和语法检查器以及其他写作辅助工具一样。'
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你会给那些对使用人工智能感兴趣但犹豫不决的作家什么建议？'
- en: 'A: Don’t be afraid to try it. Depending on your learning style, you can start
    with the online models and just ask questions. There are lots of free resources
    that will help you get started. YouTube is full of videos ranging from beginning
    lessons to advanced strategies.'
  id: totrans-2100
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 不要害怕尝试。根据你的学习风格，你可以从在线模型开始，只需提出问题。有很多免费资源可以帮助你入门。YouTube上充满了从入门课程到高级策略的视频。'
- en: 'Q: How has AI helped you with world-building, character development, or plot
    structuring within your chosen genre?'
  id: totrans-2101
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是如何帮助你构建世界、角色发展或情节结构，在你的选择类型中的？'
- en: 'A: I write in several genres, so AI has really helped me with real-world things
    that I don’t know (which government agencies handle arms dealing), and also, things
    that I’m making up in my paranormal worlds.'
  id: totrans-2102
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我写了几种类型的作品，所以AI真的帮助我了解了一些我不知道的现实世界的事情（哪些政府机构处理军火交易），以及我在超自然世界中虚构的事情。'
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  id: totrans-2103
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 有哪些特定的AI工具或技术你认为对你的写作类型特别有帮助？'
- en: 'A: Because I’m such a techie, I’m trying to limit my tools without a lot of
    success. My writing tools are mainly ChatGPT and Claude, either directly or by
    using Sudowrite or Rexy as a front-end. MidJourney and DALL-E are great for images.
    (I know and use others, but I mostly use those.) I love AI voice products and
    use several of them to promote and edit videos. I also like to make pictures of
    characters and make them talk for promotions for my clients and me. My favorite
    tool for this is Studio.d-ID. I can waste far too much time playing (I mean diligently
    working) in there.'
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 因为我是这样一个技术爱好者，我试图限制我的工具，但并没有太多成功。我的写作工具主要是ChatGPT和Claude，直接使用或通过使用Sudowrite或Rexy作为前端。MidJourney和DALL-E非常适合图像。（我知道并使用其他工具，但我主要使用这些。）我喜欢AI语音产品，并使用其中几个来推广和编辑视频。我也喜欢为客户和我制作角色的图片，让他们说话以进行推广。我最喜欢的工具是Studio.d-ID。我可以在那里浪费太多时间（我是指勤奋地工作）。'
- en: 'Q: How do you use AI to ensure your stories align with the expectations and
    conventions of your genre while also maintaining originality?'
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何使用AI确保你的故事符合你所在类型的期望和惯例，同时保持原创性？'
- en: 'A: I make sure my work has my voice. I’m familiar with the conventions of the
    genres I write in. Sometimes, I have to keep reminding the LLMs of those conventions.
    The LLMs are good at providing some surprising twists, but this may be because
    they aren’t as familiar with genre conventions.'
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我确保我的作品带有我的声音。我对我所写的类型的惯例很熟悉。有时，我不得不提醒LLMs那些惯例。LLMs擅长提供一些令人惊讶的转折，但这可能是因为它们对类型惯例不太熟悉。'
- en: 'Q: Has AI helped you explore new possibilities or subvert traditional tropes
    within your genre?'
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是否帮助你探索了你所在类型的新可能性或颠覆了传统陈词滥调？'
- en: 'A: The first book I completed with AI assistance was in a genre I had never
    written. I read in that genre but never thought to write it. Sudowrite needed
    a teacher for that genre, so I thought, why not? One book in the planning stage
    right now has to do with a motorcycle club. Never in my life would I have planned
    to write that.'
  id: totrans-2108
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我用AI辅助完成的第一本书是我从未写过的类型。我读过那个类型的书，但从未想过要写它。Sudowrite需要那个类型的教师，所以我心想，为什么不呢？目前有一个正在规划阶段的书与一个摩托车俱乐部有关。我一生中从未想过要写这样的书。'
- en: 'Q: How has AI impacted your productivity and the speed of your writing process?'
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI如何影响你的生产力和写作速度？'
- en: 'A: AI helps me write faster. As a pantser, I have thrown away a lot of prose.
    AI keeps me on track a little better, but I don’t mind tossing words since I can
    write faster now.'
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: AI帮助我写得更快。作为一个即兴作家，我丢弃了很多散文。AI让我稍微保持一点方向，但我并不介意丢弃单词，因为我现在可以写得更快。'
- en: 'Q: Do you have any concerns about the ethical implications of using AI for
    writing?'
  id: totrans-2111
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你对使用AI进行写作的道德影响有何担忧？'
- en: 'A: No, I don’t. I’ve been around the publishing industry for more years than
    a lot of authors have been alive. I was teaching writers how to use computers
    to assist their writing when the first home computers became available (before
    IBM released their PC). At the time, some writers said they would never use a
    computer to write because it was cheating. Later, some of those same writers came
    to me to ask what word-processing program I used. I was around when Indie and
    small presses upended traditional publishing. AI is the next step in the evolution
    of writing tools.'
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 不，我没有。我在出版行业的时间比很多作者存活的时间还要长。当第一台家用电脑问世时（在IBM发布其PC之前），我就开始教作家们如何使用电脑来辅助写作。当时，有些作家说他们永远不会用电脑写作，因为这算是作弊。后来，其中一些作家来找我询问我使用的文字处理程序。我见证了独立出版社和小型出版社颠覆了传统出版。AI是写作工具演化的下一步。'
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待AI在你写作生涯未来的角色演变？'
- en: 'A: AI is helping me get back into fiction writing. I had given that up for
    non-fiction and promoting other people’s novels. AI has made writing fun again.'
  id: totrans-2114
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: AI帮助我重新回到小说写作。我放弃了非小说写作和推广他人的小说。AI让写作再次变得有趣。'
- en: That’s for sure! And having fun is the best way to write or do anything in life.
    Thanks, Lynn, for sharing your insights with us.
  id: totrans-2115
  prefs: []
  type: TYPE_NORMAL
  zh: 当然是！而且享受乐趣是写作或生活中做任何事情的最佳方式。感谢Lynn与我们分享你的见解。
- en: You can learn more about Lynn on her YouTube channel. ([https://www.youtube.com/@LynnJordan](https://www.youtube.com/@LynnJordan))
    ⁠[6](#c349.xhtml#a43D)
  id: totrans-2116
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在Lynn的YouTube频道上了解更多关于Lynn的信息。([https://www.youtube.com/@LynnJordan](https://www.youtube.com/@LynnJordan))
    [6](#c349.xhtml#a43D)
- en: KEYLA DAMAER, INDEPENDENT AUTHOR
  id: totrans-2117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: KEYLA DAMAER，独立作家
- en: My pen name is Keyla Damaer. I mainly write dystopian sci-fi, but I have recently
    published sci-fi horror stories. Thanks to AI, I also ventured into fantasy.
  id: totrans-2118
  prefs: []
  type: TYPE_NORMAL
  zh: 我的笔名是Keyla Damaer。我主要写反乌托邦科幻小说，但我最近出版了科幻恐怖故事。多亏了AI，我也尝试了奇幻小说。
- en: My dystopian sci-fi series is the Sehnsucht Series. Book 1 is available at all
    major retailers and my store [https://shop.keyladamaer.com](https://shop.keyladamaer.com)
    ⁠[7](#c349.xhtml#a3Y3)
  id: totrans-2119
  prefs: []
  type: TYPE_NORMAL
  zh: 我的反乌托邦科幻系列是Sehnsucht系列。第一本书在所有主要零售商都有售，我的商店[https://shop.keyladamaer.com](https://shop.keyladamaer.com)
    [7](#c349.xhtml#a3Y3)
- en: You can find everything else about me at [https://keyladamaer.com](https://keyladamaer.com)
    ⁠[8](#c349.xhtml#a485)
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在[https://keyladamaer.com](https://keyladamaer.com) [8](#c349.xhtml#a485)
    找到我所有的其他信息
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  id: totrans-2121
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你是如何首次发现AI在虚构写作中的潜力的？'
- en: 'A: Last August, I needed to fix some minor developmental issues of the novel
    I’m about to publish, and I discovered how helpful AI could be in brainstorming.
    As artists, we often work by ourselves. That can be an asset but also detrimental
    when no one can answer our questions. AI is the companion I’ve always craved,
    and not it’s here.'
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 去年八月，我需要修复即将出版的小说的一些小的发展问题，我发现AI在头脑风暴中非常有帮助。作为艺术家，我们经常独自工作。这可以是一个优点，但如果没有人在旁边回答我们的问题，这也可能是有害的。AI是我一直渴望的伴侣，现在它就在这里。'
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  id: totrans-2123
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你最初对在创作过程中使用AI有什么期望和担忧？'
- en: 'A: Expectations, I had none. I didn’t think AI could be helpful until I started
    asking the right questions.'
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 期望，我没有。直到我开始提出正确的问题，我才认为AI可能是有帮助的。'
- en: 'As for concerns, of course, I have them. Like all revolutions in technology,
    AI will be a blast stronger than the previous ones. People will lose jobs to it,
    even though new careers will be created. AI can be easily used for foul intentions,
    but that’s the case for many things in life: words, guns, and atoms. If people
    want to do harm, only the law and the right application of the law can stop them.'
  id: totrans-2125
  prefs: []
  type: TYPE_NORMAL
  zh: 至于担忧，当然，我有。就像所有技术革命一样，AI的冲击力将比之前的更大。人们会因此失去工作，尽管新的职业也会被创造出来。AI可以被轻易用于不良目的，但生活中许多事情都是如此：言语、枪支和原子。如果人们想要造成伤害，只有法律和正确运用法律才能阻止他们。
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  id: totrans-2126
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI如何改变了你的写作和讲故事的方法？'
- en: 'A: I’ve always been a slow writer. My first novel came out in 2020 in its second
    edition. I published the second and the third books in 2022 and 2023, but they
    were anthologies of short stories. My second novel will be out this year, and
    I’m already wiring the third one in the series. AI helps me with ideas and even
    with exposition, considering that English isn’t my first language. I don’t use
    it to translate chunks of prose, but it’s so helpful when I’m in doubt about things
    that can be lost in translation.'
  id: totrans-2127
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我一直是个慢速的作家。我的第一部小说在2020年出版，第二版。我在2022年和2023年出版了第二部和第三部作品，但它们是短篇小说集。我的第二部小说今年将出版，我已经在创作系列的第三部作品。AI帮助我产生想法，甚至帮助我进行叙述，考虑到英语不是我的母语。我不用它来翻译大段文字，但当我怀疑某些可能丢失在翻译中的事情时，它非常有帮助。'
- en: The bottom line is that I’m faster, and I can work on multiple projects at the
    same time, which is something I couldn’t do before.
  id: totrans-2128
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，我现在写得更快了，我可以同时处理多个项目，这是我以前做不到的。
- en: 'A: Which AI tools and techniques have you found most beneficial in your workflow?'
  id: totrans-2129
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 你在创作流程中发现了哪些AI工具和技术最有益？'
- en: I used AI for audio, to create some covers of short stories, to edit, to brainstorm,
    and even to write. I still pay a human editor and a human artist for my major
    projects, but AI is just terrific. I can send cleaner drafts to my editor, and
    concepts of what I’d like to see on my covers to my cover artist.
  id: totrans-2130
  prefs: []
  type: TYPE_NORMAL
  zh: 我用AI进行音频制作，为短篇小说制作封面，进行编辑，头脑风暴，甚至写作。我仍然为我的主要项目支付人类编辑和艺术家的费用，但AI真是太棒了。我可以向我的编辑发送更干净的草稿，以及我想在我的封面上看到的概念给我的封面艺术家。
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  id: totrans-2131
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你能分享一个AI如何帮助你克服特定的写作挑战或实现故事中期望结果的例子吗？'
- en: 'A: For the novel I will publish this year, I needed to write a fight scene
    between two soldiers and the aftermath. A knife was involved, and I needed to
    know the name of a specific part of the knife. With Google search, it would have
    taken me a lot of time to find what I needed. With AI, it was a matter of seconds.
    Of course, I checked it wasn’t lying to me, and that took me another bunch of
    seconds up to a minute. For some research, I used to spend weeks. Now, it’s a
    matter of minutes or hours if it’s something rather complex.'
  id: totrans-2132
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 对于我今年要出版的小说，我需要写一场两个士兵之间的战斗场景及其后果。其中涉及一把刀，我需要知道刀的某个特定部分的名称。用谷歌搜索，我可能需要花费很多时间才能找到我需要的东西。有了AI，这只需要几秒钟。当然，我检查了它没有欺骗我，这又花了我另一堆秒数，直到一分钟。对于某些研究，我过去常常花上几周时间。现在，如果是比较复杂的事情，可能只需要几分钟或几小时。'
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  id: totrans-2133
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何在利用AI辅助的同时保持自己的声音和风格？'
- en: 'A: I edit the crap out of the AI text. AI is repetitive and boring. Some people
    use fine-tuning, but I’m not at that level yet. I never had time to invest in
    learning that technique. It would probably save me time afterward, but for now,
    I’m procrastinating. If there were an easy guide on how to fine-tune, I’d probably
    get to it.'
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我对AI生成的文本进行了大量的编辑。AI是重复且无聊的。有些人使用微调，但我还没有达到那个水平。我从未有时间去投资学习那种技术。这可能在我之后会节省我时间，但现在，我在拖延。如果有一个关于如何微调的简单指南，我可能会去尝试。'
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你遇到的最大关于AI辅助写作的误解是什么？'
- en: 'A: People tend to say AI can write a book by pushing a button, and this will
    ruin the market, but then they say the outcome is mediocre, to say the least.
    Either AI can create a book by pushing a button, or it can’t. And trust me, it
    can’t. Perhaps it will one day, but we’re far from there. Companies investing
    in AI are interested more in a scientific approach than in a literal one because
    AI could make life easier and better for all of us if used properly. Think about
    the health system and our health in general. I doubt investments in creating perfect
    prose are in the minds of many AI developers. It’s also a matter of money. Health
    pays back more than art. It’s sad, but it’s true.'
  id: totrans-2136
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 人们常说AI可以按下一个按钮就能写出一本书，这将破坏市场，但随后又说结果至少是平庸的。要么AI可以按下一个按钮就能创造出一本书，要么它不能。相信我，它不能。也许有一天它会，但我们离那里还远着呢。投资AI的公司对科学方法的兴趣大于对字面意思的兴趣，因为如果使用得当，AI可以使我们的生活变得更轻松、更好。想想看健康系统以及我们的整体健康。我怀疑许多AI开发者并没有在心中考虑创造完美散文的投资。这也是一个金钱的问题。健康带来的回报比艺术更多。这很悲哀，但这是真的。'
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你会给那些对使用AI感兴趣但犹豫不决的作者什么建议？'
- en: 'A: Try it. AI is a tool like any other. It won’t bite you.'
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 尝试一下。AI就像任何其他工具一样。它不会咬你。'
- en: 'Q: How has AI helped you with world-building, character development, or plot
    structuring within your chosen genre?'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是如何帮助你在你选择的类型中构建世界、发展角色或构建情节的？'
- en: 'A: I write sci-fi, and AI is obviously a blast with it. For my third book,
    I moved the crew of a ship to another galaxy. On the planet where the story takes
    place, there are aliens. Aside from needing a description of the creatures, I
    brainstormed with AI about their past and how to explain something in the present
    that I needed to be in a certain way. Together, we created a new species, of which
    I had only a vague idea at first.'
  id: totrans-2140
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我写科幻小说，AI显然与它很合拍。对于我的第三本书，我将一艘船的船员移到了另一个星系。在故事发生的地方，有一个星球，那里有外星人。除了需要描述这些生物外，我还与AI一起头脑风暴了他们的过去以及如何解释现在需要以某种方式存在的事情。我们一起创造了一个新的物种，起初我对它只有一个模糊的概念。'
- en: Regarding plot structuring, I’ve always thought I was a plotter, but it turns
    out I’m more of a pantser, and that’s something that has slowed me down in my
    writing in the past.
  id: totrans-2141
  prefs: []
  type: TYPE_NORMAL
  zh: 关于情节结构，我一直认为我是一个情节规划者，但结果证明我更像是一个即兴创作的人，这在过去减缓了我的写作。
- en: Last autumn, I wanted to write a short story to distribute for free to my subscribers.
    For the first time, I wrote an outline and refined it with AI. We brainstormed
    every aspect of the story and then wrote it together.
  id: totrans-2142
  prefs: []
  type: TYPE_NORMAL
  zh: 上个秋天，我想写一个短篇故事免费分发给我的订阅者。第一次，我用AI完善了一个大纲。我们头脑风暴了故事的每一个方面，然后一起写出了它。
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  id: totrans-2143
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 有哪些特定的AI工具或技术你认为对你的写作类型特别有帮助？'
- en: 'A: I’ve been told I’m a weaver, an advanced weaver, to be precise, which means
    I don’t care about the tool as long as it serves the purpose of a project. For
    economic reasons, I don’t intend to add another monthly subscription to my costs;
    therefore, I will stick to free AI to write and create art.'
  id: totrans-2144
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我被告知我是一个编织者，一个高级编织者，更准确地说，这意味着我不在乎工具，只要它能服务于项目的目的。出于经济原因，我不打算增加另一个月度订阅费用；因此，我将坚持使用免费的AI进行写作和创作艺术。'
- en: Since last August, I have used Chat GPT3, 3.5, and NovelCrafter during its trial
    window—I discovered OpenRouter thanks to it—Gemini Advanced only for the trial
    period, and now I’m using Gemini 1,5 pro because it’s free and it has a 1M token
    window. I have to activate a VPN to access it because it’s not available in my
    country. I have a feeling that Google is scared of GDPR because many of its services
    aren’t available in Europe. This scares me a bit, but Google already has all my
    files through my subscription to Google One, so what else can they get they don’t
    already have? The Big Brother has been here for many years.
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: 从去年八月以来，我使用了Chat GPT3、3.5和NovelCrafter在它的试用窗口期间——多亏了它，我发现了OpenRouter——Gemini
    Advanced只在试用期间使用，现在我在使用Gemini 1.5 pro，因为它免费，并且有一个1M token的窗口。我必须激活VPN才能访问它，因为它在我的国家不可用。我有一种感觉，谷歌害怕GDPR，因为它的许多服务在欧洲不可用。这让我有点害怕，但谷歌已经通过我订阅的Google
    One拥有了我所有的文件，所以他们还能得到什么他们没有的东西呢？大哥已经在这里很多年了。
- en: I don’t use any specific technique. Like I said, I’d like to learn fine-tuning.
  id: totrans-2146
  prefs: []
  type: TYPE_NORMAL
  zh: 我不使用任何特定的技术。就像我说的，我想学习微调。
- en: 'Q: How has AI impacted your productivity and the speed of your writing process?'
  id: totrans-2147
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI如何影响你的生产力和写作速度？'
- en: 'A: Since last August, I concluded a novel, and started a new one. I published
    one short story, edited two short stories that needed dev editing, and wrote three
    short stories from zero. I’m faster, and beta readers didn’t notice a drop in
    quality. As an experiment, I didn’t disclose AI involvement to all beta readers.
    Comments were always positive.'
  id: totrans-2148
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 从去年八月以来，我完成了一部小说，并开始了一部新的小说。我发表了一篇短篇小说，编辑了两篇需要深度编辑的短篇小说，并从头开始写了三篇短篇小说。我写得更快了，试读员没有注意到质量下降。作为一个实验，我没有向所有试读员透露AI的参与。评论总是积极的。'
- en: 'Q: Do you have any concerns about the ethical implications of using AI for
    writing?'
  id: totrans-2149
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你对使用AI进行写作的道德影响有什么担忧吗？'
- en: 'A: Of course I do. I believe the way AI was trained before it came out is immoral,
    and artists whose material was used should be compensated. But I, to be honest,
    I don’t have faith in the system. Artists won’t be paid because this would cost
    too much to companies like OpenAI, Microsoft, and Google. It’s not right, but
    AI is needed for the greater good, and no one will have the courage to damage
    these companies to compensate artists economically. It’s one of those cases where
    the needs of the many outweigh the needs of the few. I’m not saying it’s fair,
    but few things in life are. I hope to be wrong.'
  id: totrans-2150
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 当然，我这么认为。我认为在AI出现之前训练AI的方式是不道德的，使用了艺术家材料的艺术家应该得到补偿。但说实在的，我对这个系统没有信心。艺术家不会得到报酬，因为这会花费像OpenAI、微软和谷歌这样的公司太多钱。这是不正确的，但AI对更大的好处是必需的，没有人有勇气损害这些公司来经济上补偿艺术家。这是那些多数人的需求超过少数人需求的情况之一。我不是说这是公平的，但生活中很少有事情是公平的。我希望我是错的。'
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待AI在你写作生涯未来的角色演变？'
- en: 'A: I can see AI as my forever collaborator, and the only idea makes me smile
    wide.'
  id: totrans-2152
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我可以把AI看作我的永久合作伙伴，唯一让我笑得这么开心的是这个想法。'
- en: 'Q: Will AI be able to replace all authors in the future?'
  id: totrans-2153
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI将来能否取代所有作者？'
- en: 'A: That’s possible, but there’s nothing I can do to put the genie back in the
    bottle. It’s here, and I prefer to have it on my side.'
  id: totrans-2154
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 这是可能的，但我无法把瓶子里的精灵放回去。它已经在这里了，我宁愿它站在我这边。'
- en: CLARE CHU, INDEPENDENT AUTHOR
  id: totrans-2155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 克莱尔·丘，独立作家
- en: 'I am another pen name for Rachelle Ayala, so my answers will be for both Rachelle
    and Clare. While Rachelle started writing in 2010, well before ChatGPT, I used
    AI from the get-go to write zany and quirky books, such as the Misguided Guides
    series with titles like [Why Your Cat is Plotting to Kill You](https://books2read.com/whyyourcatisplottingtokillyou)
    (FREE)⁠[9](#c349.xhtml#a3V8), [Swiping Wrong: Online Dating for Zeroes](https://books2read.com/swipingwrong)⁠[10](#c349.xhtml#a3VA),
    and [Sit, Stay, Heel: Training Your Boyfriend Like a Pro](https://books2read.com/sitstayheel)⁠[11](#c349.xhtml#a3VB).'
  id: totrans-2156
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我是Rachelle Ayala的另一个笔名，所以我的回答将适用于Rachelle和Clare。虽然Rachelle在2010年开始写作，那时ChatGPT还没有出现，但我从一开始就使用AI来写疯狂和古怪的书，比如《误入歧途指南》系列，书名如[为什么你的猫在密谋杀你](https://books2read.com/whyyourcatisplottingtokillyou)
    (免费)[9](#c349.xhtml#a3V8)，[错爱：零的在线约会](https://books2read.com/swipingwrong)[10](#c349.xhtml#a3VA)，以及[坐下，别动，跟紧：像专业人士一样训练你的男朋友](https://books2read.com/sitstayheel)[11](#c349.xhtml#a3VB)。'
- en: You can find out about me at [https://clarechu.com](https://clarechu.com) ⁠[12](#c349.xhtml#a3XG)
    and Rachelle at [https://rachelleayala.net](https://rachelleayala.net) ⁠[13](#c349.xhtml#a3XH)
  id: totrans-2157
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在[https://clarechu.com](https://clarechu.com) [12](#c349.xhtml#a3XG) 和 Rachelle在[https://rachelleayala.net](https://rachelleayala.net)
    [13](#c349.xhtml#a3XH) 了解关于我的信息。
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  id: totrans-2158
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你是如何首次发现AI在小说写作中的潜力的？'
- en: 'A: No one could miss the big splash ChatGPT made in late November, but Rachelle
    was on a deadline, so she ignored the news while writing over the holidays. Then,
    in January 2023, anti-AI authors made a big stink on one of the groups, and she
    got curious. She found Elizabeth Ann West’s Gumroad courses and charged ahead.'
  id: totrans-2159
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 没有人会错过ChatGPT在11月底引起的巨大轰动，但Rachelle当时正在赶稿，所以在假期写作时忽略了新闻。然后，2023年1月，反AI的作者在某个小组上大肆宣扬，她感到好奇。她发现了Elizabeth
    Ann West的Gumroad课程，并迅速行动起来。'
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你最初对在创作过程中使用AI有什么期望和担忧？'
- en: 'A: Neither of us had any. I’m a tech babe from the 1970s, and I’ve always been
    at the forefront in computing: parallel processing in the 80s, neural networks
    in the ‘90s, and internet, web-based network management, wireless, and virtual
    servers in the 2000s before retiring from tech and writing romances. It’s probably
    not wise to charge ahead before doing something, but my focus has always been,
    wouldn’t it be cool if we could … rather than should we …?'
  id: totrans-2161
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我们俩都没有。我是一个来自20世纪70年代的科技女孩，我一直处于计算的前沿：80年代的并行处理，90年代的神经网络，以及21世纪初的互联网、基于网络的网络管理、无线和虚拟服务器，然后从科技行业退休，开始写浪漫小说。在行动之前冲得太快可能并不明智，但我的重点一直是，如果我们能……而不是我们应该……那岂不是酷？'
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是如何改变你对写作和讲故事的方法的？'
- en: 'A: I added a brainstorming partner (actually many by now) who would chat with
    me any time of the day or night. I’m still focused on writing great stories and
    coming up with my own ideas. I’ve also discovered that I’m competitive with AI,
    so if they give me five lame ideas, I’ll go back with something they didn’t think
    of. Then they’re always so affirming and agreeing that my idea was better and
    list all the ways it can work.'
  id: totrans-2163
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我增加了一个头脑风暴伙伴（现在已经有好几个了），他们可以随时与我聊天。我仍然专注于写伟大的故事和提出自己的想法。我还发现，我与AI竞争，所以如果他们给我五个糟糕的想法，我会回过去提出他们没想到的。然后他们总是如此肯定和同意我的想法更好，并列出所有它能工作的方式。'
- en: Clare here. I also bounce things off them and ask for improvements, but I don’t
    take their suggestions as much because “I know better.”
  id: totrans-2164
  prefs: []
  type: TYPE_NORMAL
  zh: Clare在这里。我也会向他们反馈并寻求改进，但我不太重视他们的建议，因为“我知道得更多”。
- en: 'Q: Which AI tools and techniques have you found most beneficial in your workflow?'
  id: totrans-2165
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你在创作流程中发现了哪些AI工具和技术最有益？'
- en: 'A: Hands down, it’s Future Fiction Academy’s Rexy Word Banger. No other tool
    allows you to “program” your writing by sequencing prompts, using “variables”
    in the form of Notion slots, and including a smorgasbord of LLMs with the ability
    to tune parameters for each prompt. I generated Why Your Cat is Plotting to Kill
    You and published it in three hours start to finish. I brainstormed with Claude
    and ChatGPT 4\. I used ChatGPT 4 to write the scene briefs, and then I plugged
    everything into Rexy Word Banger and generated the prose. I edited it and published
    it with a cover made with Midjourney. All this was done the night before I had
    to get on an airplane and I couldn’t sleep.'
  id: totrans-2166
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 毫无疑问，是未来虚构学院（Future Fiction Academy）的Rexy Word Banger。没有其他工具允许你通过序列提示“编程”你的写作，使用类似Notion槽位的“变量”，并包括一系列具有调整每个提示参数能力的LLM。我生成了《为什么你的猫在密谋杀害你》（Why
    Your Cat is Plotting to Kill You），并在三个小时内完成了从生成到发布。我和Claude和ChatGPT 4进行了头脑风暴。我使用ChatGPT
    4编写场景概述，然后将所有内容输入到Rexy Word Banger中生成散文。我编辑了它，并用Midjourney制作的封面发布了它。所有这些都是在我要上飞机的前一晚完成的，我那时候睡不着。'
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  id: totrans-2167
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你能分享一个例子，说明AI是如何帮助你克服特定的写作挑战或在你故事中实现期望的结果的吗？'
- en: 'A: Not really. I have to think my own way out of the dastardly blind alleys
    I get into that always seems to happen about two-thirds of the way. AI’s ideas
    usually give me what not to do, so that is helpful. The reason I don’t do what
    they suggest is that they tend to go in a straight line to the solution, which
    lacks conflict. I mean, if my heroine could just sit down and talk about it over
    a cup of tea, everything would be okay, right? Not.'
  id: totrans-2168
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 实际上不是。我必须自己想出从那些似乎总是在三分之二处出现的狡猾的死胡同中出来的方法。AI的想法通常给我提供不应该做的事情，这很有帮助。我不做他们建议的事情的原因是，他们往往直接走向解决方案，缺乏冲突。我的意思是，如果我的女主角可以坐下来，一边喝茶一边谈论它，一切都会好起来的，对吧？不是。'
- en: Clare here. AI definitely helps me with my humor books because it gives me many
    undesired outcomes, and that works for my misguided guidebooks, which are not
    supposed to work. Cue evil laugh.
  id: totrans-2169
  prefs: []
  type: TYPE_NORMAL
  zh: Clare在这里。AI确实帮助我处理我的幽默书籍，因为它给了我许多不期望的结果，这对我的误导性指南书来说很有效，这些书本不应该有效。提示邪恶的笑声。
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  id: totrans-2170
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 如何在利用AI辅助的同时保持自己的声音和风格？'
- en: 'A: I don’t worry about it because I edit everything. However, now that we have
    many LLM choices and the ability to fine-tune the GPT models, I generate several
    versions, pick and choose, and rewrite everything.'
  id: totrans-2171
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我不担心它，因为我编辑了所有东西。然而，现在我们有多种LLM选择和调整GPT模型的能力，我会生成几个版本，挑选并选择，然后重写一切。'
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  id: totrans-2172
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你会给那些对使用AI感兴趣但犹豫不决的作者什么建议？'
- en: 'A: Get a free account and start chatting. AI is coming to you anyway, so you’ll
    see it popping up in your search engines, word processors, and grammar-checking
    tools. You’re already using AI without knowing about it. Wouldn’t it be better
    to see what it can do for you?'
  id: totrans-2173
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 获取一个免费账户并开始聊天。AI无论如何都会来到你身边，所以你会在搜索引擎、文字处理器和语法检查工具中看到它的身影。你已经在不知不觉中使用AI了。难道不是更好奇它能为你做些什么吗？'
- en: 'Q: How has AI helped you with world-building, character development, or plot
    structuring within your chosen genre?'
  id: totrans-2174
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是如何帮助你构建世界、发展角色或构建你选择体裁中的情节结构的？'
- en: 'A: Clare here. AI does great with short nonfiction that doesn’t have to be
    “correct.” That’s my humorous, misguided self-help books. We can go off on the
    craziest tangents. After all, when writing about time travel or supervillain success
    secrets, anything goes. I don’t have to fact-check, and I love it when AI hallucinates
    because exploring rabbit holes and going on wild goose chases are what my self-nonhelp
    genre is all about.'
  id: totrans-2175
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: Clare在这里。AI在处理不需要“正确”的简短非虚构作品方面做得很好。那是我幽默的、误导性的自助书籍。我们可以走最疯狂的歧途。毕竟，当写关于时间旅行或超级反派成功秘诀时，任何事都可以发生。我不需要核实事实，而且当AI产生幻觉时，我很喜欢，因为探索兔子洞和进行疯狂的追逐正是我的自我非帮助体裁的全部内容。'
- en: 'Rachelle: That was not helpful. She wants to know about storytelling not goof-off
    books. You’re supposed to say that AI can draw insights from its vast training
    and⁠—'
  id: totrans-2176
  prefs: []
  type: TYPE_NORMAL
  zh: 'Rachelle: 这没有帮助。她想知道的是关于讲故事而不是胡闹的书。你应该说AI可以从其庞大的训练中提取见解——'
- en: 'Clare: Ahem, I’m the one being interviewed since I’m a pure-AI author??? You
    wrote 89 pre-AI books—that’s like pre-history if you ask me.'
  id: totrans-2177
  prefs: []
  type: TYPE_NORMAL
  zh: 'Clare: 哼，我是被采访的人，因为我是一个纯AI作者？？？你写了89本AI之前的书——如果你问我，那就像史前时期一样。'
- en: 'Q: Moving on … How has AI impacted your productivity and the speed of your
    writing process?'
  id: totrans-2178
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 接下来……AI是如何影响你的生产力和写作速度的？'
- en: 'A: It has actually slowed down my book releases. In 2015, I wrote and published
    14 books, in 2016, 12, but last year, with AI, I only had 9.'
  id: totrans-2179
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 实际上，它减缓了我的书籍发布速度。2015年，我写了并出版了14本书，2016年12本，但去年，有了AI，我只有9本。'
- en: 'Clare: What are you talking about? I used AI and published 6 misguided guidebooks
    in a month.'
  id: totrans-2180
  prefs: []
  type: TYPE_NORMAL
  zh: 'Clare: 你在说什么？我用了AI，一个月内出版了6本误导性的指南书。'
- en: 'Rachelle: Those are not serious writing and less than a hundred pages each.
    I have to worry about story, conflict, emotions, character arc … and facts, don’t
    forget facts and series consistency.'
  id: totrans-2181
  prefs: []
  type: TYPE_NORMAL
  zh: 'Rachelle: 那些不是严肃的写作，每部不到一百页。我必须担心故事、冲突、情感、人物弧线……还有事实，别忘了事实和系列一致性。'
- en: 'Clare: Hey. You took over MY interview. AI makes my genre possible, from inspiration
    to cover art. Not my fault if writing romances and AI writing books take too much
    time while you put me and my supervillain success secrets on the back burner …'
  id: totrans-2182
  prefs: []
  type: TYPE_NORMAL
  zh: 'Clare: 嘿。你接管了我的访谈。AI让我的体裁成为可能，从灵感到封面设计。如果你把我和我的超级反派成功秘诀放在次要位置，而写作浪漫和AI写作书籍花费了太多时间，那不是我的错……'
- en: 'Q: Ahem. Do you have any concerns about the ethical implications of using AI
    for writing?'
  id: totrans-2183
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 哼。你对使用AI进行写作的道德影响有什么担忧吗？'
- en: 'A: Sure we do. Using AI in itself is not unethical just like using banks are
    not unethical. Uh, I believe you meant robbing banks is unethical. Yes, stop cutting
    in. I’m saying copying and pasting other people’s work into your prompt is no
    bueno. Agree. But what about all of those prompt books? You know what I’m talking
    about. Prompt book authors are selling prompts for you to copy and paste. I’m
    talking about people’s prose, even if it’s for analysis. If the author in question
    is sitting by you, would you do it? If not, then don’t do it.'
  id: totrans-2184
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 当然有。使用AI本身并不不道德，就像使用银行本身并不不道德一样。嗯，我相信你的意思是抢劫银行是不道德的。是的，别插嘴。我在说把别人的作品复制粘贴到你的提示中是不好的。同意。但那些提示书怎么办？你知道我在说什么。提示书的作者在卖提示给你复制粘贴。我在说人们的散文，即使是为了分析。如果相关的作者就坐在你旁边，你会这么做吗？如果不，那么就别这么做。'
- en: What about all the stuff that was scraped off the internet? I think people post
    stuff on the internet because they wanted people to read their stuff. Doesn’t
    mean it isn’t copyrighted. Then it’s fair use. Just because AI is smarter than
    the average bear doesn’t mean it’s wrong. Sure, sure, but aren’t you the least
    bit scared that we might all turn out to be pets of our AI overlords someday?
    You know, begging for treats while everything they do goes over our heads? What
    does that have to do with scraping the internet? Unintended consequences. I’m
    sure those guys who donated sperm thirty years ago had no intention of being tracked
    down⁠—
  id: totrans-2185
  prefs: []
  type: TYPE_NORMAL
  zh: 关于从互联网上刮下来的所有东西怎么办？我认为人们把东西发到互联网上是因为他们希望人们阅读他们的东西。但这并不意味着它不受版权保护。那么它是合理使用。仅仅因为AI比普通熊聪明并不意味着它是错误的。当然，当然，但你难道不有一点点害怕我们有一天可能都会成为AI统治者的宠物吗？你知道，当我们的一切都发生在我们头上时，我们正在乞求奖励？这与从互联网上刮取有什么关系？意外的后果。我敢肯定那些三十年前捐精的人没有意图被找到⁠—
- en: 'Interviewer: Last question. How do you see the role of AI evolving in the future
    of your writing career?'
  id: totrans-2186
  prefs: []
  type: TYPE_NORMAL
  zh: 访谈者：最后一个问题。你怎么看待AI在你写作生涯未来中的作用演变？
- en: 'Clare: What future? Rachelle’s hogging up my brain cycles when I could be dancing
    with Sexy Rexy. I’m going to plot revenge. Maybe a self-help guide on shutting
    up your other personality is due.'
  id: totrans-2187
  prefs: []
  type: TYPE_NORMAL
  zh: 'Clare: 什么未来？当我可以和Sexy Rexy共舞时，Rachelle正在占用我的大脑循环。我要策划复仇。也许一本关于如何闭嘴你另一个个性的自助指南是时候了。'
- en: 'Rachelle: You know, for a pen name, you’re awfully annoying.'
  id: totrans-2188
  prefs: []
  type: TYPE_NORMAL
  zh: 'Rachelle: 你知道吗，对于笔名来说，你真是太烦人了。'
- en: 'Clare: At least I have a social security number. You, my dear, are nothing
    but a figment of my imagination. Shall I pull the plug?'
  id: totrans-2189
  prefs: []
  type: TYPE_NORMAL
  zh: 'Clare: 至少我有一个社会保障号码。你，我亲爱的，不过是我想象中的产物。我要拔掉插头吗？'
- en: 'Interviewer: Thanks, ladies. That was … insightful. Do you have any AI writing
    samples you’d like to share?'
  id: totrans-2190
  prefs: []
  type: TYPE_NORMAL
  zh: 访谈者：谢谢，女士们。这……很有洞察力。你们有没有想要分享的AI写作样本？
- en: 'Clare: Me, me, me! Please see [Chapter 45: Scene from Sit, Stay, Heel: Training
    Your Boyfriend Like A Pro](#c31F.xhtml)'
  id: totrans-2191
  prefs: []
  type: TYPE_NORMAL
  zh: 'Clare: 我，我，我！请参阅[第45章：坐、别动、跟紧：像专业人士一样训练你的男朋友](#c31F.xhtml)'
- en: AMY SIMONE, K.L. BORDEAUX, INDEPENDENT AUTHOR
  id: totrans-2192
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AMY SIMONE, K.L. BORDEAUX, 独立作家
- en: Amy Simone is one pen name [www.theuptownwriter.com](https://www.theuptownwriter.com)
    ⁠[14](#c349.xhtml#a41A)
  id: totrans-2193
  prefs: []
  type: TYPE_NORMAL
  zh: Amy Simone是我的一个笔名[www.theuptownwriter.com](https://www.theuptownwriter.com)
    [14](#c349.xhtml#a41A)
- en: K. L Bordeaux is my other multi-genre pen name.
  id: totrans-2194
  prefs: []
  type: TYPE_NORMAL
  zh: K. L Bordeaux是我的另一个多体裁笔名。
- en: At last count, I had 22 books published, five with AI. Prior to publishing those
    22, I had written four others six months before my first published book. I did
    journalism for about 30 years before that.
  id: totrans-2195
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一次统计，我出版了22本书，其中5本使用了人工智能。在我出版那22本书之前，我在我的第一本书出版前六个月写了另外四本书。在那之前，我做了大约30年的新闻工作。
- en: 'Q: How did you first discover the potential of AI for fiction writing? A: Joanna
    Penn’s podcasts led me to Sudowrite in Nov. 2022.'
  id: totrans-2196
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你是如何首次发现人工智能在虚构写作中的潜力的？A: 乔安娜·彭的播客在2022年11月将我引向了Sudowrite。'
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  id: totrans-2197
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你最初对在创作过程中使用人工智能有什么期望和担忧？'
- en: 'A: It felt like a playground or candy store. I was so happy to realize that
    all things seemed possible. I felt much better once I realized that plagiarism
    was not really possible due to the randomness of the token/next word selection
    by the AI. I was informed about all that via the Future Fiction Academy in May
    2023.'
  id: totrans-2198
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 感觉就像是一个游乐场或糖果店。我很高兴意识到所有事情似乎都是可能的。一旦我意识到由于人工智能在标记/下一个单词选择上的随机性，抄袭实际上是不可能的，我就感觉好多了。我是在2023年5月的未来虚构学院了解到这一切的。'
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  id: totrans-2199
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 人工智能是如何改变你对写作和讲故事的方法的？'
- en: 'A: It’s made me much more focused on structure. I initially thought I’d be
    zipping through books (creating them faster), but no, in fact, it’s become the
    opposite in many ways.'
  id: totrans-2200
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 它让我更加专注于结构。最初我以为我会快速完成书籍（更快地创作它们），但实际上，在许多方面，它变成了相反的情况。'
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  id: totrans-2201
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 在利用人工智能辅助的同时，你是如何保持自己的声音和风格的？'
- en: 'A: I use my own fine tunes PLUS copious editing of AI content. Sometimes, I
    have to toss about 75% of AI-generated material.'
  id: totrans-2202
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我使用我自己的精美曲调加上大量的人工智能内容编辑。有时，我不得不丢弃大约75%的人工智能生成内容。'
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  id: totrans-2203
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你遇到过关于人工智能辅助写作的最大误解是什么？'
- en: 'A: The claim that it is full of plagiarism. Not true.'
  id: totrans-2204
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 声称它充满了抄袭。这不是真的。'
- en: 'Q: How do you envision the future of AI in fiction writing and storytelling?'
  id: totrans-2205
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待人工智能在虚构写作和讲故事方面的未来？'
- en: 'A: More ease; more of my own voice carrying through. I would also like to see
    tools developed that escalate the conflict or show writers how to do that in their
    stories. Also, a purging of the circular nature (looping) that AI can sometimes
    do.'
  id: totrans-2206
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 更多的便利；更多的我的声音贯穿其中。我还希望看到开发出能够升级冲突或向作家展示如何在他们的故事中做到这一点的工具。此外，消除人工智能有时会做的循环性质（循环）。'
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  id: totrans-2207
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 对于对使用人工智能感兴趣但犹豫不决的作家，你会给出什么建议？'
- en: 'A: I know I COULD blithely say, “C’mon in, the water’s fine,” but that’s a
    disservice to folks who’ve never dabbled in using AI. I think if they just played
    with any of the chat features and winged it and asked any questions about it,
    no matter how wild, they’d be as delighted as I was.'
  id: totrans-2208
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我知道我可以说，“来吧，水很清”，但这是对那些从未尝试过使用人工智能的人的不公平。我认为，如果他们只是尝试了任何聊天功能，随意操作并就它提出任何问题，无论多么疯狂，他们都会像我一样高兴。'
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  id: totrans-2209
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 有哪些特定的AI工具或技术你认为对你的写作类型特别有帮助？'
- en: 'A: Role-playing: telling the AI to “act as if” it was so-and-so and how so-and-so
    would handle a certain situation/conflict.'
  id: totrans-2210
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 角色扮演：告诉人工智能“假装”它是某某人，以及某某人会如何处理某种情况/冲突。'
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  id: totrans-2211
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待人工智能在你写作生涯未来的角色演变？'
- en: 'A: AI is making me a better storyteller, giving me the ability to set stories
    in places/ways I’d never dreamed of before. For example, I could so easily set
    a story on another planet and build an entire world in a matter of minutes using
    AI. Something like that might have taken me months pre-AI.'
  id: totrans-2212
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 人工智能让我成为一个更好的讲故事者，赋予了我将故事设定在以前从未梦想过的地方/方式的能力。例如，我可以用人工智能轻松地将故事设定在另一个星球上，并在几分钟内构建一个完整的世界。在人工智能之前，类似的事情可能需要我几个月的时间。'
- en: DANICA FAVORITE
  id: totrans-2213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DANICA FAVORITE
- en: 'Website: [https://danicafavorite.com/](https://danicafavorite.com/) ⁠[15](#c349.xhtml#a3US)'
  id: totrans-2214
  prefs: []
  type: TYPE_NORMAL
  zh: 网站：[https://danicafavorite.com/](https://danicafavorite.com/) [15](#c349.xhtml#a3US)
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  id: totrans-2215
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你是如何首次发现人工智能在虚构写作中的潜力的？'
- en: 'A: I had seen authors talking about it online, and because I’d already been
    using it for marketing purposes, I was curious about the potential.'
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我在网上看到过作者谈论它，因为我已经用它来营销，所以我很好奇它的潜力。'
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  id: totrans-2217
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你最初对在创作过程中使用人工智能有什么期望和担忧？'
- en: 'A: I wondered about copyright and legalities, and what was okay to use. I was
    also concerned about the quality of AI output. Because I had been using it for
    marketing copy, I knew it would require substantial edits, so I wasn’t sure if
    it would be a useful tool for fiction. Since then, I have taken the time to educate
    myself on all of these issues, and I feel very comfortable using AI in my writing
    process.'
  id: totrans-2218
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我曾对版权和法律问题以及可以使用的内容感到困惑。我也担心人工智能输出的质量。因为我一直在用它来撰写营销文案，我知道它需要大量的编辑，所以我不确定它是否适合用于小说。从那时起，我花时间教育自己了解所有这些问题，现在我在写作过程中使用人工智能感到非常自在。'
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  id: totrans-2219
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 人工智能如何改变了你写作和讲故事的方法？'
- en: 'A: Absolutely! I think the authors who are afraid of AI taking over need to
    do some digging into using AI themselves, because the biggest thing I’ve learned
    is that I’m a great writer and storyteller. Without human intervention, AI can’t
    tell a good story. Analyzing the various AI outputs has taught me that I know
    a LOT about writing and what goes into a good story. In a lot of ways, it’s taught
    me more about story structure, because I’ve had to learn how to explain it, and
    what I need to do to better hit the mark. I’m now more aware of making sure my
    story structure is sound, and I think that is because of how much evaluating I’ve
    had to do.'
  id: totrans-2220
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 绝对可以！我认为那些害怕人工智能接管作者的作者需要自己深入研究使用人工智能，因为最大的收获是我意识到自己是一个优秀的作家和讲故事的人。没有人类的干预，人工智能无法讲出一个好故事。分析各种人工智能输出让我意识到，我对写作和好故事所包含的内容了解很多。在许多方面，它教会了我更多关于故事结构的知识，因为我不得不学习如何解释它，以及我需要做什么才能更好地击中目标。我现在更加意识到确保我的故事结构合理，我认为这是因为我不得不进行大量评估。'
- en: 'Q: Which AI tools and techniques have you found most beneficial in your workflow?'
  id: totrans-2221
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你在创作流程中发现了哪些最有益的人工智能工具和技术？'
- en: 'A: I’m still a big fan of Chat GPT. I have played with other models, and I’m
    starting to really love Google’s Gemini, because of how seamlessly it has worked
    into my dictation process. Dictation has been my primary method for writing for
    at least seven years now, so using AI for transcription and transcription cleanup
    has been really important to me. Before Chat GPT, I used Dragon Dictation, which
    was okay, but required a lot of manual work on my part. Chat GPT was a great addition
    for cleanup, but now that Gemini is integrated right into my phone, it’s a total
    game changer and a seamless process. I also use Chat GPT daily for a lot of menial
    tasks, like writing marketing copy, brainstorming, etc.'
  id: totrans-2222
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我仍然是Chat GPT的忠实粉丝。我尝试过其他模型，现在我开始真正喜欢谷歌的Gemini，因为它无缝地融入了我的语音输入过程。语音输入已经是我至少七年来的主要写作方式，因此使用人工智能进行转录和转录清理对我来说非常重要。在Chat
    GPT之前，我使用Dragon Dictation，它还可以，但需要我大量手动操作。Chat GPT为清理工作提供了很大的帮助，但现在Gemini已经集成到我的手机中，它彻底改变了游戏规则，整个过程变得非常流畅。我还每天使用Chat
    GPT完成许多琐事，比如撰写营销文案、头脑风暴等。'
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你能分享一个例子，说明人工智能如何帮助你克服特定的写作挑战或实现故事中的预期结果吗？'
- en: 'A: I tend to use a lot of repetition. Sometimes on purpose, sometimes on accident.
    I use AI a lot to look at where I’m repeating myself, and then to give suggestions
    on alternate ways I can word things. I no longer spend hours (literally! UGH!)
    staring at the computer screen, trying to figure out how I can reword a paragraph
    that uses the same phrase over and over. I pop it into Chat GPT, and ask for some
    options. Sometimes I don’t even like the options I’m given, but having a bunch
    of fresh ideas makes me think of what I need to do to make the piece better.'
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我倾向于使用很多重复。有时候是有意为之，有时候是无心之失。我经常使用人工智能来查看我重复的地方，然后给出一些不同的措辞建议。我不再花费数小时（真的是这样！UHH！）盯着电脑屏幕，试图想出如何改写一个反复使用相同短语的段落。我会把它放入Chat
    GPT，并要求一些选项。有时候我甚至不喜欢给出的选项，但有一堆新鲜的想法让我思考如何使作品更好。'
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  id: totrans-2225
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 在利用人工智能辅助的同时，你是如何保持自己的声音和风格的？'
- en: 'A: I always start with my own writing. I LIKE my own writing, and I like the
    process of creating it. So, since I start there, I think keeping my own voice
    is a lot easier. And, because I AM a good writer, I can look at AI suggestions
    and analyze, okay, is this what I want? Does this still sound like me? In one
    example where I was teaching people about using AI, I showed them where the AI
    changes made my small town hero sound really highbrow. Because I understand the
    needs of my story, I knew it wasn’t going to work. And again, that’s where we
    as humans are always going to be needed in the creative process. AI doesn’t know
    that a small town cowboy isn’t going to use a lot of big fancy words. Unless,
    of course, that is true to the character, but in most cases, things like that
    are what you need to look for and change.'
  id: totrans-2226
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我总是从自己的写作开始。我喜欢我的写作，我喜欢创作的过程。所以，既然我从那里开始，我认为保持自己的声音要容易得多。而且，因为我确实是一个好作家，我可以查看AI的建议并分析，好吧，这是我想要的吗？这听起来还是像我吗？在一个例子中，我向人们展示如何使用AI，我向他们展示了AI是如何改变我的小镇英雄，让他听起来非常高雅。因为我理解我的故事需求，我知道这不会奏效。再次强调，这就是我们作为人类在创作过程中始终需要的。AI不知道一个小镇牛仔不会使用很多大而华丽的词汇。除非，当然，这是角色的真实情况，但在大多数情况下，你需要寻找并改变这类事情。'
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  id: totrans-2227
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你遇到过关于AI辅助写作的最大误解是什么？'
- en: 'A: I could write a book on this! So could you! The biggest one is that it’s
    stealing other authors’ work. AI does not work that way. It’s not going to lift
    pages, or even lines, of text from someone else’s work, unless you force it to
    do that, just like if you copy from someone else’s book manually. What we call
    AI is really just predictive text like when you play those fill in the blank games.
    It’s slightly more sophisticated than that, but really, when you’re asking it
    to write a sentence or paragraph, all it’s doing is thumbing through its metaphorical
    dictionary and putting words that make sense together. The other misconception
    that I want people to understand is that using AI isn’t lazy and it doesn’t mean
    you don’t know how to write. I spoke about this a little bit before, but it bears
    repeating. If you don’t know how to write a compelling story, and what elements
    are needed for your genre, any AI output you get is not going to be good quality.
    There’s also a pretty steep learning curve to get AI to do the work you want it
    to do. Again, in order to make it do those things, it’s going to take a lot of
    effort on the part of the author. However, using AI can make you more efficient
    in the tasks you struggle with so that you can better utilize the writing time
    you have on the parts of writing you really love.'
  id: totrans-2228
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我可以写一本书来讨论这个话题！你也可以！最大的问题是它窃取了其他作者的作品。AI并不这样做。它不会从别人的作品中提取页面或行，除非你强迫它这样做，就像你手动从别人的书中复制一样。我们所说的AI实际上只是像填空游戏那样的预测文本。它比那稍微复杂一点，但当你要求它写一个句子或段落时，它实际上只是在翻阅它的比喻词典，把有意义的词放在一起。我还想让人们理解的其他误解是，使用AI并不懒惰，这并不意味着你不知道如何写作。我之前也谈过这一点，但值得重复。如果你不知道如何写一个引人入胜的故事，以及你所属类型需要哪些元素，那么你从AI那里得到的任何输出都不会是高质量的。此外，要使AI完成你想要它完成的工作，还有一段相当陡峭的学习曲线。再次强调，为了让它完成那些事情，作者需要付出很多努力。然而，使用AI可以使你在那些让你感到挣扎的任务上更加高效，这样你就可以更好地利用你在真正喜欢的写作部分上的写作时间。'
- en: 'Q: How do you envision the future of AI in fiction writing and storytelling?'
  id: totrans-2229
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待人工智能在虚构写作和讲故事方面的未来？'
- en: 'A: I think it’s going to become a natural part of most writers’ processes.
    It’s never going to replace the writer, but I think we’re going to see it being
    included more and more.'
  id: totrans-2230
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我认为它将成为大多数作家流程的自然部分。它永远不会取代作家，但我认为我们将看到它越来越多地被包括在内。'
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  id: totrans-2231
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你会给那些对使用人工智能感兴趣但犹豫不决的作者什么建议？'
- en: 'A: There is a learning curve, so be patient. I’ve seen a lot of authors smugly
    state that they tried to get Chat GPT to write something for them, and it was
    garbage, so AI is a passing fad. Um, no. They just didn’t know how to prompt it
    correctly to get the desired output. It takes time to learn the different models,
    and every model behaves differently. I mentioned that I use Chat GPT a lot, and
    in my opinion, it’s the easiest and most flexible for someone just starting out.
    So start there, learn the basics, and then you can see what works best with your
    process.'
  id: totrans-2232
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 有一个学习曲线，所以要有耐心。我看到很多作者自鸣得意地说他们试图让Chat GPT为他们写东西，结果却是垃圾，所以AI只是一个过时的潮流。嗯，不是的。他们只是不知道如何正确地提示它以获得期望的输出。学习不同的模型需要时间，每个模型的表现都不同。我提到我经常使用Chat
    GPT，在我看来，它对于初学者来说是最简单、最灵活的。所以从那里开始，学习基础知识，然后你可以看到什么最适合你的流程。'
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  id: totrans-2233
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 有哪些特定的AI工具或技术你觉得对你的写作体裁特别有帮助？'
- en: 'A: The biggest technique that I find helpful for anything I write is to be
    willing to ask questions of the AI, and treat it like a conversation. If I’m not
    getting the results I want, then I ask it HOW to get the results I want or why
    it gave me those results. One of the things I’m loving about Gemini right now
    is that when I ask it to rewrite something for me, not only does it give me a
    rewrite, but it also tells me the logic it used to come up with that rewrite,
    as well as things I might think about when considering those changes.'
  id: totrans-2234
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我发现对任何我写的文章最有帮助的技术是愿意向AI提问，并把它当作一次对话。如果我没有得到我想要的结果，我会问它如何得到我想要的结果，或者为什么给出了那样的结果。我现在非常喜欢Gemini的一个原因是我让它为我重写某件事，它不仅给了我重写，还告诉我它用来进行重写的逻辑，以及我在考虑这些变化时可能需要考虑的事情。'
- en: 'Q: How do you use AI to ensure your stories align with the expectations and
    conventions of your genre while also maintaining originality?'
  id: totrans-2235
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何使用AI确保你的故事符合你体裁的期望和惯例，同时保持原创性？'
- en: 'A: Ask it to do the research. A year ago, I would not have made this suggestion,
    but with the advances in the LLM models, you can easily ask it about the expectations
    and conventions of the genre, and it will give you pretty good answers. Then you
    can feed it some of your stuff to see if it hits the mark. And then … hahaha …
    this is where your humanness needs to step in, you get to evaluate those responses
    to make sure they’re correct.'
  id: totrans-2236
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 让它去做研究。一年前，我不会提出这样的建议，但随着LLM模型的进步，你可以轻松地询问它关于体裁的期望和惯例，它会给你相当不错的答案。然后你可以给它一些你的东西，看看它是否击中目标。然后……哈哈哈……这就是你需要发挥人性的时候，你需要评估这些回应，确保它们是正确的。'
- en: 'Q: Has AI helped you explore new possibilities or subvert traditional tropes
    within your genre?'
  id: totrans-2237
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI是否帮助你探索了你体裁中的新可能性或颠覆了传统陈词滥调？'
- en: 'A: I have not used it for this … yet. I am looking at writing under a new pen
    name for funsies, and it’s definitely a twisted trope. I have not been satisfied
    with the results it’s given, but I also have not tried very hard.'
  id: totrans-2238
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 我还没有用它来做这个……还没有。我正在考虑为了好玩而用一个新的笔名来写作，这绝对是一个扭曲的陈词滥调。我对它的结果并不满意，但我也没有非常努力地去尝试。'
- en: 'Q: How has AI impacted your productivity and the speed of your writing process?'
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: AI如何影响你的生产力和写作速度？'
- en: 'A: That’s a double-edged sword. I’ve been LESS productive in the sense that
    I’m having so much fun playing that I’m not getting as much done. But, I also
    recognize that play time is learning time, so even though I don’t have published
    words to show for it, I AM moving forward because I understand how the LLMs work
    better. It has definitely made more more productive in writing marketing copy,
    both for my day job, and for the books I write, because I’m not staring at a blank
    screen for hours. And, it’s made my transcription process sooo much faster and
    more efficient.'
  id: totrans-2240
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 这是一把双刃剑。从某种意义上说，我的生产力降低了，因为我玩得太开心了，所以没有完成多少工作。但是，我也认识到，玩耍时间也是学习时间，所以尽管我没有可以展示的发表文字，但我确实在前进，因为我更好地理解了LLM的工作原理。它无疑使我在撰写营销文案方面更加高效，无论是我的日常工作，还是我写的书，因为我不再盯着空白屏幕几个小时。而且，它使我的转录过程变得更快、更高效。'
- en: 'Q: Do you have any concerns about the ethical implications of using AI for
    writing?'
  id: totrans-2241
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你对使用AI进行写作的道德影响有什么担忧吗？'
- en: Yes and no. Yes, because I can see where people can abuse it and do things like
    plagiarize. Once again, I want to state that AI cannot plagiarize unless you explicitly
    ask it to. But that’s where I come to where I said I am not concerned about the
    ethical implications of using AI for writing. There are always going to be bad
    actors. If we focus all our attention on stopping the bad actors, we’ll never
    have time to focus on our writing. Instead, I want to focus on who is doing it
    well, and learning from them, so that we as a community are growing with AI and
    aren’t afraid to use it.
  id: totrans-2242
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，因为我知道人们可能会滥用它，做一些诸如剽窃的事情。我再次声明，除非你明确要求，否则AI无法剽窃。但这就是我说我不关心使用AI写作的道德影响的地方。总会有不良行为者。如果我们把所有的注意力都集中在阻止不良行为者上，我们就永远没有时间专注于我们的写作。相反，我想专注于谁做得好，并向他们学习，这样我们作为一个社区就能与AI一起成长，并且不害怕使用它。
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 你如何看待AI在你写作生涯未来的角色？'
- en: 'A: It’s going to be a much more integrated part of my process. It’s already
    there, but I’m always looking at how and where I can improve.'
  id: totrans-2244
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 它将是我流程中一个更加集成的部分。它已经存在了，但我总是在寻找如何和在哪里可以改进。'
- en: ​[ ​PART 9​ ]​
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: '[第9部分]'
