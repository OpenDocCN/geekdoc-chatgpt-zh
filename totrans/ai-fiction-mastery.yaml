  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找迪伦：我需要找到迪伦，告诉他我对他的真实感受。我需要为他利用他道歉，并解释他对我意味着多少。
- en: 'Being Authentic: I need to let go of my obsession with social media validation
