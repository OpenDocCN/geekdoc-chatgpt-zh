  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 对抗埃德华多：我需要与埃德华多断绝婚约，无论后果如何。我不能再继续生活在谎言中，假装成我不是自己。
- en: 'Finding Dillon: I need to find Dillon and tell him the truth about my feelings.
