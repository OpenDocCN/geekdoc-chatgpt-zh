- en: ACKNOWLEDGMENTS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I’m grateful for Elizabeth Ann West’s generosity in teaching and sharing her
    knowledge and brainstorms on using AI for writing. I started with her first Gumroad
    class and followed her through her YouTube channel and Future Fiction Academy.
  prefs: []
  type: TYPE_NORMAL
- en: Elizabeth’s vision is unparalleled in developing workflows, methods, and experiments.
    She is definitely a pioneer of AI writing and an advocate for indie authors, representing
    us with the big foundational models in their developer forums.
  prefs: []
  type: TYPE_NORMAL
- en: I’m profoundly grateful to Stephanie Pajonas for her pivotal role in creating
    a vibrant community of AI enthusiasts. Her two Facebook groups, AI Writing for
    Authors and AI Art for Authors have provided a safe and encouraging space for
    writers to explore this new technology. Stephanie’s advocacy for inclusivity,
    particularly in amplifying the voices of marginalized writers, is truly commendable.
  prefs: []
  type: TYPE_NORMAL
- en: The Future Fiction Academy is a welcoming and energetic group of authors who
    are supportive of AI and eagerly share their findings. I’m thankful that Elizabeth,
    Steph, and Leeland took time away from their writing careers to create this guild,
    community, university, and hangout spot for authors.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, I’m encouraged by my Romance In A Month writing group and the individual
    members. We all have a common goal, to write the best romances that we can. Now
    that we’re aware of AI, I’m encouraged by their open minds and support. Even though
    the group was not started as an AI writing group, no one in the group gave me
    grief about introducing AI to the group. It just shows that the people who joined,
    whether in 2013 or 2024, are open-minded and respectful—happy to help and affirm
    the life lessons we all learn on this romantic journey we share.
  prefs: []
  type: TYPE_NORMAL
- en: I’m also thankful for you, dear reader, as each one of you is a pioneer. There
    is no “one way” to do things with AI, which is always changing and hard to keep
    up with. I’m eager to hear your experiences and discoveries. Happy trails!
  prefs: []
  type: TYPE_NORMAL
