    container for story-specific information are the following (as of this writing):'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 如我上述所述，理解大提示的LLMs，作为故事特定信息的良好结构化容器，包括以下（截至本文写作时）：
