  zh: 最佳答案归Gemini-pro-1.5：
- en: 'Megaprompts: Guiding AI with Extensive Context'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: Megaprompts：用广泛上下文引导AI
- en: Megaprompts are a powerful tool in AI-assisted writing, especially for fiction
    authors seeking to generate longer and more complex narratives with greater control
    and consistency. A megaprompt is essentially an extensive prompt that provides
    the AI model with a wealth of information and context, guiding its responses and
    ensuring they align with your specific vision for the story.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: Megaprompts是AI辅助写作中的强大工具，特别是对于寻求以更大控制和一致性生成更长、更复杂叙事的虚构作家来说。Megaprompt本质上是一个广泛的提示，为AI模型提供大量信息和上下文，指导其响应并确保它们与您对故事的具体愿景保持一致。
- en: 'Components of a Megaprompt:'
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: Megaprompt的组成部分：
- en: 'Story Premise and Synopsis: Include a concise summary of your story’s core
    concept, main conflict, and key plot points. This provides the AI with a roadmap
    for the overall narrative direction.'
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 故事前提和概要：包括您故事核心概念的简要总结、主要冲突和关键情节点。这为AI提供整体叙事方向的路线图。
- en: 'Character Profiles: Provide detailed descriptions of your main characters,
    including their backstories, personalities, motivations, and relationships with
    other characters. This helps the AI generate dialogue and actions that are consistent
    with each character’s unique traits.'
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 人物档案：提供您主要角色的详细描述，包括他们的背景故事、性格、动机以及与其他角色的关系。这有助于AI生成与每个角色独特特征一致的对话和行动。
- en: 'World-Building Details: If your story takes place in a fictional world, include
    information about its history, geography, culture, and any unique elements such
    as magic systems or futuristic technologies. This ensures the AI’s outputs align
    with the established world-building framework.'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 构建世界的细节：如果您的故事发生在虚构世界中，请包括有关其历史、地理、文化以及任何独特元素（如魔法系统或未来技术）的信息。这确保AI的输出与建立的世界构建框架保持一致。
- en: 'Genre Conventions and Tropes: Specify the genre of your story and any relevant
    tropes or conventions you want the AI to incorporate. This helps the AI generate
    text that resonates with reader expectations within the chosen genre.'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 类型惯例和陈词滥调：指定您故事的类型以及您希望AI纳入的任何相关陈词滥调或惯例。这有助于AI生成与所选类型中读者期望产生共鸣的文本。
- en: 'Desired Style and Tone: Provide examples of your desired writing style or specific
    authors you want the AI to emulate. This helps guide the AI towards producing
    text that matches the overall tone and voice of your story.'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 想要的风格和语气：提供您想要的写作风格或您希望AI模仿的具体作者示例。这有助于引导AI产生与您故事整体语气和声音相符的文本。
- en: 'Benefits of Megaprompts:'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: Megaprompts的好处：
- en: 'Increased Accuracy and Relevance: The extensive context provided in a megaprompt
    helps the AI generate more accurate and relevant responses, reducing the likelihood
    of inconsistencies or deviations from your vision.'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 提高准确性和相关性：在megaprompt中提供的广泛上下文有助于AI生成更准确和相关的响应，减少不一致或偏离您愿景的可能性。
- en: 'Enhanced Consistency: By providing detailed information about characters, settings,
    and plot points, you ensure that the AI’s outputs remain consistent throughout
    the narrative.'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 提高一致性：通过提供关于人物、场景和情节点的详细信息，您确保AI的输出在整个叙事中保持一致。
- en: 'Greater Control Over Output: Megaprompts allow for more precise control over
    the style, tone, and direction of the AI-generated text, ensuring it aligns with
    your creative goals.'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 更大的输出控制权：Megaprompts允许更精确地控制AI生成文本的风格、语气和方向，确保其与您的创作目标保持一致。
- en: 'Unlocking Creativity: The rich context provided in a megaprompt can spark new
    ideas and connections within the AI model, leading to more creative and unexpected
    outputs.'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 激发创造力：Megaprompt中提供的丰富上下文可以在AI模型中激发新的想法和联系，导致更富有创意和出乎意料的输出。
- en: 'Efficiency for Longer Narratives: Megaprompts are particularly useful for generating
    longer narratives, such as novellas or novels, as they provide the AI with the
    necessary context to maintain coherence and consistency over extended text formats.'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 长篇叙事的效率：Megaprompts对于生成长篇叙事（如短篇小说或长篇小说）特别有用，因为它们为AI提供必要的上下文，以在扩展文本格式中保持连贯性和一致性。
- en: 'How to Create Effective Megaprompts:'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 如何创建有效的Megaprompts：
- en: 'Gather Your Story Information: Collect all relevant details about your story,
    including character profiles, world-building notes, plot outlines, and genre specifics.'
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 收集你的故事信息：收集你故事的所有相关信息，包括角色档案、世界构建笔记、情节大纲和类型细节。
- en: 'Structure the Information: Organize the information in a clear and concise
    manner, using bullet points, headings, or separate sections for each element.'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化信息：以清晰简洁的方式组织信息，使用项目符号、标题或为每个元素创建单独的部分。
- en: 'Combine Elements: Integrate the different components of your megaprompt into
    a single document or text file.'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 结合元素：将你的megaprompt的不同组件整合成一个单独的文档或文本文件。
- en: 'Iterative Refinement: Test your megaprompt by generating text with the AI and
    evaluate its effectiveness. Refine the content and structure of the megaprompt
    based on the AI’s responses.'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代优化：通过AI生成文本来测试你的megaprompt，并评估其有效性。根据AI的回应，优化megaprompt的内容和结构。
- en: 'Tools for Working with Megaprompts:'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 处理megaprompts的工具：
- en: 'LLMs with Large Context Windows: Models like Claude 2.0, GPT-4 (32k), and Gemini
    Pro 1.5 offer larger context windows that can accommodate the extensive information
    provided in megaprompts.'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 大上下文窗口的LLM：像Claude 2.0、GPT-4（32k）和Gemini Pro 1.5这样的模型提供了更大的上下文窗口，可以容纳megaprompts中提供的大量信息。
- en: 'Prompt Sequencing Tools: Platforms like Future Fiction Academy’s Rexy feed
    megaprompts to the AI sequentially, maintaining context and ensuring a coherent
    narrative flow.'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 提示序列工具：像未来小说学院（Future Fiction Academy）的Rexy这样的平台按顺序将megaprompts提供给AI，保持上下文并确保连贯的叙事流程。
- en: Megaprompts offer a powerful tool for fiction authors seeking to harness the
    full potential of AI in their writing process. By providing extensive context
    and detailed instructions, you can guide the AI to generate longer and more complex
    narratives that align with your creative vision, ultimately saving time and unlocking
    new storytelling possibilities.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: Megaprompts为寻求在写作过程中充分利用AI潜力的小说作者提供了一个强大的工具。通过提供广泛的上下文和详细的说明，你可以引导AI生成更长的、更复杂的叙事，与你的创意愿景保持一致，从而节省时间并开启新的叙事可能性。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-921
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg](image_rsrc4B5.jpg)'
- en: Join the [Future Fiction Academy](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[1](#c349.xhtml#a45X) to see how megaprompts are used. Gemini is right. It’s
    much easier to use megaprompting in a tool like Rexy than to continuously copy
    and paste into a chatbox or upload them as files. Rexy is integrated with a content
    management system, Notion, that allows you to store your megaprompts as Notion
    pages. Your prompts can refer to these pages, and Rexy can then send the prompt
    sequences with megaprompts to the LLM. Results are then written back to your Notion
    pages.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 加入[未来小说学院](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    [1](#c349.xhtml#a45X) 来了解如何使用megaprompts。Gemini是对的。在Rexy这样的工具中使用megaprompting比不断地复制粘贴到聊天框或上传文件要容易得多。Rexy与内容管理系统Notion集成，允许你将megaprompts存储为Notion页面。你的提示可以引用这些页面，然后Rexy可以将带有megaprompts的提示序列发送给LLM。结果随后会写回到你的Notion页面。
- en: 'Here is a video from Steph Pajonas explaining megaprompting. YouTube: AI +
    MegaPrompts = Fiction MAGIC! ([https://www.youtube.com/watch?v=ZCyQkzKZ9Jo](https://www.youtube.com/watch?v=ZCyQkzKZ9Jo))
    ⁠[2](#c349.xhtml#a3XU)'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是Steph Pajonas解释megaprompting的视频。YouTube：AI + MegaPrompts = Fiction MAGIC!
    ([https://www.youtube.com/watch?v=ZCyQkzKZ9Jo](https://www.youtube.com/watch?v=ZCyQkzKZ9Jo))
    [2](#c349.xhtml#a3XU)
- en: ​[ ​22​ ]​
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: '[22](#c349.xhtml#a3XU)'
- en: PROMPT SEQUENCING
  id: totrans-925
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示序列
- en: 'Gathering information into megaprompts and being able to refer to the information
    as variables opens the door to programmatic prompting or prompt sequencing. This
    technique is the brainchild of Elizabeth Ann West and the Future Fiction Academy.
    The general idea is the following:'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 将信息收集到megaprompts中并能够将其作为变量引用，为程序化提示或提示序列打开了大门。这种技术是伊丽莎白·安·韦斯特（Elizabeth Ann
    West）和未来小说学院（Future Fiction Academy）的创意产物。一般想法如下：
- en: Even though we stuffed context into a megaprompt, the LLM works much better
    if you tell it to focus on a single task. For example, don’t tell it to produce
    a plot and invent characters simultaneously. You’ll get some “half-ass” interesting
    results.
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们将上下文塞进了megaprompt中，但如果告诉LLM专注于单一任务，它的工作效果会更好。例如，不要让它同时生成情节和创造角色。你可能会得到一些“半吊子”有趣的结果。
- en: 'Here are the steps:'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是步骤：
- en: Decide on the sequence of prompts (tasks) you want done.
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 决定你想要完成的提示（任务）的顺序。
- en: Prime the first prompt by uploading global story information, writing style,
    synopsis, and character list in a megaprompt.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 通过上传全局故事信息、写作风格、概要和角色列表到megaprompt中，来预热第一个提示。
- en: Perform the prompt and concatenate the output from the previous prompt as input
    to the following prompt.
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 执行提示，并将前一个提示的输出作为下一个提示的输入。
- en: 'This ingenious method lets the LLM keep narrative logic because the output
    of the previous prompt in the sequence goes into the context window for the subsequent
    prompt. Initially, the AI is primed by the Story Information Megaprompt, but as
    each step progresses, it also gains information about what was written and can
    continue with that knowledge for subsequent prompts, thus building up its knowledge
    store. Note: You must use a large-context window LLM, and these prompt sequences
    can be expensive since you pay for tokens in and tokens out.'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 这种巧妙的方法使得大型语言模型（LLM）能够保持叙事逻辑，因为序列中前一个提示的输出会进入后续提示的上下文窗口。最初，AI 通过故事信息超级提示进行初始化，但随着每个步骤的推进，它也会获得关于所写内容的信息，并可以继续使用这些知识进行后续提示，从而建立起其知识库。注意：您必须使用大上下文窗口的LLM，并且这些提示序列可能很昂贵，因为您需要为输入和输出的令牌付费。
- en: 'Here is a walkthrough of prompt sequencing with Future Fiction Academy’s Rexy
    Word Banger. Note: it is possible to sequence prompts outside of Rexy, but it
    involves a lot of copying and pasting, as well as opening new conversations to
    clean the context window.'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是使用未来虚构学院（Future Fiction Academy）的Rexy Word Banger进行提示序列的演示。注意：您可以在Rexy之外进行提示序列，但这涉及到大量的复制粘贴，以及开启新的对话来清理上下文窗口。
- en: Rexy’s method of loading megaprompts from Notion, as well as fresh API calls
    per prompt means you can precisely control the data given to the LLM.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: Rexy从Notion加载超级提示的方法，以及每个提示的全新API调用意味着您可以精确控制提供给LLM的数据。
- en: '1\. Prompts and Steps:'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 提示和步骤：
- en: 'Prompts: You create individual prompts that define specific actions or instructions
    for the AI. These prompts can range from generating scene briefs to writing scenes,
    stepping through an outline, critiquing written scenes, and enhancing them. The
    possibilities are limited only by your imagination.'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：您创建单个提示，以定义AI的具体动作或指令。这些提示可以包括生成场景概要、编写场景、逐步通过大纲、评论已编写场景以及增强它们。可能性仅限于您的想象力。
- en: 'Steps: You organize your prompts into a sequence of steps, representing the
    desired execution order. This allows you to build a logical flow for the narrative
    and ensure continuity between different sections of the generated text.'
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤：您将提示组织成一系列步骤，代表所需的执行顺序。这允许您为叙事构建逻辑流程，并确保生成文本的不同部分之间的连续性。
- en: 'Big Bang Box: The output of each step is appended to the Big Bang Box, which
    is added to the input context window. You can bracket this box with separate prompts.
    The “top” prompt is sent to the LLM before the contents of the Big Bang Box, and
    the “bottom” prompt is appended after the contents. You may also skip or reset
    the Big Bang Box after selected steps.'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 大爆炸盒：每个步骤的输出附加到大爆炸盒中，该盒子被添加到输入上下文窗口。您可以使用单独的提示将该盒子括起来。“顶部”提示在发送到LLM大爆炸盒内容之前发送，而“底部”提示附加在大爆炸盒内容之后。您还可以在选定的步骤之后跳过或重置大爆炸盒。
- en: '2\. Customization and Control:'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 定制和控制：
- en: 'LLM Selection: Rexy Word Banger offers a wide selection of LLMs, including
    GPT models, Claude, OpenRouter.ai models, and various open-source options. For
    each step in your sequence, you can choose the AI model that best suits your writing
    style and genre preferences. This means you can select a different AI model for
    each prompt.'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: LLM选择：Rexy Word Banger提供广泛的LLM选择，包括GPT模型、Claude、OpenRouter.ai模型以及各种开源选项。对于您序列中的每个步骤，您可以选择最适合您写作风格和体裁偏好的AI模型。这意味着您可以为每个提示选择不同的AI模型。
- en: 'Parameter Adjustment: You can fine-tune the parameters of each LLM within the
    sequence, controlling aspects like temperature, top-p, and response length. This
    level of control allows you to tailor the AI’s output to your specific needs and
    preferences. See [Chapter 26: Playground Parameters](#c1FG.xhtml).'
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 参数调整：您可以在序列中微调每个LLM的参数，控制诸如温度、top-p和响应长度等方面。这种程度的控制允许您根据您的特定需求和偏好定制AI的输出。参见[第26章：游乐场参数](#c1FG.xhtml)。
- en: 'Context Management: Rexy Word Banger enables you to manage the context window
    effectively by specifying how much of the previous output should be included in
    subsequent prompts (by controlling whether the Big Bang box is reset or skipped).
    This helps maintain coherence and ensures the AI remains aware of past events
    and character development but also keeps the context window relevant for the steps
    in the sequence.'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文管理：Rexy Word Banger 通过指定在后续提示中应包含多少先前输出（通过控制是否重置或跳过大爆炸框）来有效地管理上下文窗口。这有助于保持连贯性，并确保AI始终了解过去的事件和角色发展，同时也保持上下文窗口对序列步骤的相关性。
- en: '3\. Iteration and Refinement:'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 迭代和优化：
- en: 'Real-time Feedback: As the AI generates text for each step, you can evaluate
    the output and adjust your prompts or parameters if you step through the bangs
    one at a time. You may edit what is in the Big Bang Box so that any mistakes or
    things you don’t want to carry over to the next step are deleted or fixed. This
    iterative process allows continuous refinement and ensures the narrative progresses
    in the desired direction.'
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 实时反馈：随着AI为每个步骤生成文本，您可以评估输出，并在逐个步骤通过时调整您的提示或参数。您可以编辑大爆炸框中的内容，以便删除或修复任何错误或您不希望带入下一个步骤的内容。这个迭代过程允许持续优化，并确保叙事按照期望的方向发展。
- en: 'Branching Paths: Rexy Word Banger allows you to create branching paths within
    your prompt sequence, exploring alternative storylines or character choices. This
    feature is handy for discovery writers or authors who want to test different possibilities
    before committing to a specific direction. You can do this by reloading the content
    management “Notion” slots with alternate material, such as the story information,
    writing style, or a different outline, or you can edit the Notion slots or Word
    Banger boxes and run them ad-hoc.'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 分支路径：Rexy Word Banger 允许您在提示序列中创建分支路径，探索替代故事线或角色选择。这个功能对于探索型作家或希望在做出具体方向决定前测试不同可能性的作者来说非常有用。您可以通过重新加载内容管理“Notion”槽位中的替代材料（如故事信息、写作风格或不同的提纲）来实现这一点，或者您可以直接编辑
    Notion 槽位或 Word Banger 框架并运行它们。
- en: 'Easily Reproducible Sequences: Word Banger also allows you to reproduce the
    exact prompts, information, and sequences but rerunning with different LLMs, parameters,
    or settings. This will enable you to compare and contrast multiple versions of
    your output.'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 易于复制的序列：Word Banger 还允许您重新运行确切的提示、信息和序列，但使用不同的LLM、参数或设置。这将使您能够比较和对比您输出的多个版本。
- en: '4\. Additional Features:'
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 其他功能：
- en: 'Notion Integration: Rexy Word Banger seamlessly integrates with Notion, allowing
    you to organize your story information, character profiles, and world-building
    details within your Notion workspace.'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 思维导图集成：Rexy Word Banger 与 Notion 无缝集成，让您能够在 Notion 工作空间内组织故事信息、角色档案和世界观构建细节。
- en: 'Custom Templates: You can create and save custom templates for different types
    of scenes, character interactions, narrative structures, and anything you want.
    These are called 21 Blackjacks, a database of prompt sequences, but are not limited
    to 21 prompts. It’s just a fun name.'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义模板：您可以创建和保存不同类型场景、角色互动、叙事结构和您所需任何内容的自定义模板。这些被称为21 Blackjacks，是一个提示序列数据库，但不仅限于21个提示。这只是个有趣的名字。
- en: 'Collaboration Tools: Rexy Word Banger offers features for sharing your prompt
    sequences and collaborating with other writers through Notion sharing and duplication.'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 协作工具：Rexy Word Banger 提供了通过 Notion 分享和复制来共享您的提示序列并与其他作家协作的功能。
- en: 'Benefits of Prompt Sequencing with Rexy Word Banger:'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Rexy Word Banger进行提示序列的优势：
- en: 'Precision and Control: Edit and rewrite the AI’s output to match your specific
    vision for the story before putting it back into the next prompt.'
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 精准和控制：在将内容放回下一个提示之前，编辑和重写AI的输出，以匹配您对故事的具体愿景。
- en: 'Narrative Coherence: Maintain consistency and continuity throughout your narrative.'
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事连贯性：在整个叙事中保持一致性和连续性。
- en: 'Creative Exploration: Experiment with different storylines, character choices,
    world-building elements, writing styles, LLMs, etc.'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 创意探索：尝试不同的故事线、角色选择、世界观元素、写作风格、LLM等。
- en: 'Efficiency and Productivity: Streamline your writing process and generate content
    more quickly.'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 效率和生产力：简化您的写作流程，更快地生成内容。
- en: 'Process Flexibility: Works for either pantsers or plotters or in between.'
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 流程灵活性：适用于即兴创作型作家、计划型作家或两者之间的任何类型。
- en: 'Collaboration and Sharing: Collaborate with other writers and share your prompt
    sequences.'
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 协作与分享：与其他作家协作并分享你的提示序列。
- en: 'Note: Access to Rexy Word Banger requires a membership in the [Future Fiction
    Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw).
    ⁠[1](#c349.xhtml#a41U) (They do, however, have a Rexy-only option without the
    workshops and clubs).'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 备注：要访问Rexy Word Banger，需要成为[未来科幻学院](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)的会员。
    [1](#c349.xhtml#a41U)（然而，他们确实有一个没有研讨会和俱乐部的Rexy专属选项）。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-959
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg]'
- en: Future Fiction Academy has several YouTube Live videos that demonstrate Rexy
    Wordbanger. My favorite one is where Elizabeth Ann West writes a Christmas story.
    Rexy Clause Write In ([https://www.youtube.com/watch?v=Vve5qct4Vyo](https://www.youtube.com/watch?v=Vve5qct4Vyo))
    ⁠[2](#c349.xhtml#a444)
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 未来科幻学院有多个YouTube直播视频展示了Rexy Wordbanger。我最喜欢的一个是Elizabeth Ann West写的一个圣诞故事。Rexy
    Clause Write In ([https://www.youtube.com/watch?v=Vve5qct4Vyo](https://www.youtube.com/watch?v=Vve5qct4Vyo))
    [2](#c349.xhtml#a444)
- en: ​[ ​23​ ]​
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: '[23]'
- en: MULTIMODAL PROMPTING
  id: totrans-962
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多模态提示
- en: At the beginning of last year, we were happy that we could send and receive
    text messages from ChatGPT. Near the end of the year, OpenAI introduced multimodal
    prompting into GPT-4, which made conversing with ChatGPT even more exciting.
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 去年年初，我们很高兴能够从ChatGPT发送和接收短信。年底时，OpenAI将多模态提示引入GPT-4，这使得与ChatGPT的对话变得更加激动人心。
- en: Multimodal means you can upload an image to the LLM and ask it to describe it
    using words. Conversely, with the integration of Dall-E image generation, you
    can now tell ChatGPT-4 to take text and turn it into an image.
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态意味着你可以上传一张图像到LLM，并要求它用文字描述它。相反，随着Dall-E图像生成功能的集成，你现在可以告诉ChatGPT-4将文本转换为图像。
- en: Multimodal prompting opens exciting possibilities for fiction authors. If you
    have trouble describing something, find a photo, upload it to the LLM, and ask
    it to write a description. Or, if you want to visualize your story world, copy
    and paste your description into the LLM and ask it to generate an image. You can
    even upload a book cover, a photograph, or a piece of art and ask the LLM to create
    a story or suggest a title or genre. You never know what inspiration can come
    up from mixing images and text.
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态提示为科幻作家打开了令人兴奋的可能性。如果你在描述某物时遇到困难，找到一张照片，上传到LLM，并要求它编写描述。或者，如果你想可视化你的故事世界，将你的描述复制粘贴到LLM中，并要求它生成图像。你甚至可以上传封面、照片或艺术品，并要求LLM创作故事或建议标题或类型。你永远不知道将图像和文本混合在一起会激发出什么样的灵感。
- en: HOW MULTIMODAL PROMPTING WORKS
  id: totrans-966
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多模态提示如何工作
- en: 'Combining Text and Images: Instead of relying solely on text-based prompts,
    authors can now include images as part of their input to the AI model. This allows
    the AI to process visual information alongside textual instructions, resulting
    in richer and more nuanced outputs.'
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 结合文本和图像：作者现在可以将图像作为其输入到AI模型的一部分，而不仅仅依赖于基于文本的提示。这允许AI在处理文本指令的同时处理视觉信息，从而产生更丰富和更细腻的输出。
- en: 'Image-to-Text Generation: AI models can generate text descriptions based on
    images, providing detailed and evocative descriptions of scenes, characters, or
    objects.'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 图像生成文本：AI模型可以根据图像生成文本描述，提供详细和富有表现力的场景、人物或物体描述。
- en: 'Text-to-Image Generation: Authors can use text prompts to generate images corresponding
    to their descriptions, creating visual representations of characters, settings,
    or key moments in the story.'
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 文本生成图像：作者可以使用文本提示生成与他们的描述相对应的图像，创建故事中人物、场景或关键时刻的视觉表现。
- en: EXAMPLES OF MULTIMODAL PROMPTING
  id: totrans-970
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多模态提示示例
- en: 'Setting Description:'
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: 场景描述：
- en: 'Image Input: Upload a photograph of a bustling cityscape at night.'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 图像输入：上传一张夜晚繁忙的城市景观照片。
- en: 'Text Prompt: “Describe the atmosphere of this city, including the sights, sounds,
    and smells.”'
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示： “描述这个城市的氛围，包括景象、声音和气味。”
- en: 'Character Description:'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 角色描述：
- en: 'Image Input: Generate an image of a mysterious woman with flowing black hair
    and piercing green eyes.'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 图像输入：生成一位神秘女性拥有飘逸的黑发和锐利的绿色眼睛的图像。
- en: 'Text Prompt: “Describe this woman’s personality and background.”'
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示： “描述这位女性的个性和背景。”
- en: 'Plot Development:'
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 情节发展：
- en: 'Image Input: Generate an image of a spaceship crash-landing on a desolate alien
    planet.'
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 图像输入：生成一艘太空船在荒凉的异星上紧急降落的图像。
- en: 'Text Prompt: “Write a scene about the aftermath of this crash and the challenges
    the survivors face.”'
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示： “写一个关于这次车祸后果以及幸存者面临的挑战的场景。”
- en: TOOLS FOR MULTIMODAL PROMPTING
  id: totrans-980
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多模态提示工具
- en: 'Multimodal LLMs: Models like Google’s Gemini 1.5 Pro and OpenAI’s ChatGPT Plus
    offer multimodal capabilities, allowing you to combine text and images within
    your prompts.'
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态LLM：像Google的Gemini 1.5 Pro和OpenAI的ChatGPT Plus这样的模型提供了多模态功能，允许您在提示中结合文本和图像。
- en: 'Image Generation Tools: Platforms like Midjourney, DALL-E 2, and Stable Diffusion
    can generate images from text descriptions.'
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 图像生成工具：Midjourney、DALL-E 2和Stable Diffusion等平台可以从文本描述生成图像。
- en: Google’s Gemini 1.5 Pro can even describe videos and transcribe audio files.
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: Google的Gemini 1.5 Pro甚至可以描述视频和转录音频文件。
- en: Video generation is right around the corner with OpenAI’s demo of Sora, which
    can generate short videos from text input.
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI展示了Sora，它可以从文本输入生成短视频，视频生成功能即将到来。
- en: ​[ ​PART 4​ ]​
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: ​[ ​第四部分​ ]​
- en: ADVANCED LLM TECHNIQUES
  id: totrans-986
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高级LLM技术
- en: '![group of writers playing violins](image_rsrc4BA.jpg)'
  id: totrans-987
  prefs: []
  type: TYPE_IMG
  zh: '![一群演奏小提琴的作家](image_rsrc4BA.jpg)'
- en: ​[ ​24​ ]​
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: ​[ ​24​ ]​
- en: PLAYGROUNDS AND DEVELOPER INTERFACES
  id: totrans-989
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 游乐场和开发者接口
- en: By now, almost everyone is familiar with ChatGPT or one of the other chatbots,
    such as Anthropic’s Claude, Microsoft’s Bing Chat, or Google’s latest entry, Gemini.
    They are easy to use and widely available.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，几乎每个人都熟悉ChatGPT或其他聊天机器人，例如Anthropic的Claude、Microsoft的Bing Chat或Google的最新产品Gemini。它们易于使用且广泛可用。
- en: However, there are reasons for exploring the “playground” or programmer’s interface.
    Because chatbots are designed for mass consumption, they contain additional programming
    to filter your input and output to maintain the conversational nature. In my experience,
    they don’t return as many words as going directly to the LLM’s “Playground” Interface.
    This is because you have no control over how it manages the chatbot’s context
    window. Furthermore, the output length is prespecified by the app and not available
    for you to control as it is when you go through an API or to the playground/workbench.
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，探索“游乐场”或程序员接口也有其理由。因为聊天机器人是为大众消费而设计的，它们包含额外的编程来过滤您的输入和输出，以保持对话性质。根据我的经验，它们返回的单词数量不如直接访问LLM的“游乐场”接口那么多。这是因为您无法控制它如何管理聊天机器人的上下文窗口。此外，输出长度由应用程序预先指定，您无法像通过API或访问游乐场/工作台那样控制它。
- en: What is a playground, you ask?
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问，什么是游乐场？
- en: A playground is a developer tool that allows developers to enter text and tweak
    parameters and other settings. Some even allow you to turn off its “safety” features
    and allow unfiltered responses.
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 游乐场是一个开发者工具，允许开发者输入文本并调整参数和其他设置。一些甚至允许您关闭其“安全”功能，并允许未过滤的响应。
- en: 'OpenAI Playground ([https://platform.openai.com/playground](https://platform.openai.com/playground))⁠[1](#c349.xhtml#a3Y6),
    where you can access current models as well as “legacy” modes, including completion
    and “beta” modes. There’s also a compare mode that allows you to give the same
    prompt to two different models. Note: these modes are subject to change.'
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI游乐场([https://platform.openai.com/playground](https://platform.openai.com/playground))⁠[1](#c349.xhtml#a3Y6)，在这里您可以访问当前模型以及“遗留”模式，包括完成和“测试版”模式。还有一个比较模式，允许您向两个不同的模型提供相同的提示。注意：这些模式可能会发生变化。
- en: Claude Workbench ([https://console.anthropic.com/workbench](https://console.anthropic.com/workbench))⁠[2](#c349.xhtml#a48N)
    provides access to current and older models. It also includes the ability to “get
    code” for the prompts you’ve written and upload images. You have control over
    token-length in the response.
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: Claude工作台([https://console.anthropic.com/workbench](https://console.anthropic.com/workbench))⁠[2](#c349.xhtml#a48N)提供了访问当前和旧模型的权限。它还包括获取您所写提示的“代码”以及上传图片的能力。您可以对响应中的token长度进行控制。
- en: Google Gemini Pro ([https://aistudio.google.com/](https://aistudio.google.com/))⁠[3](#c349.xhtml#a438)
    includes the ability to upload multimodal content and tweak parameters. The AI
    studio allows you to edit “Safety,” which controls the degree of content filtering.
    They also allow you to save your prompts or chats to Google Drive.
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: Google Gemini Pro([https://aistudio.google.com/](https://aistudio.google.com/))⁠[3](#c349.xhtml#a438)包括上传多模态内容和调整参数的能力。AI工作室允许您编辑“安全”设置，该设置控制内容过滤的程度。它们还允许您将您的提示或聊天保存到Google
    Drive。
- en: OpenRouter is an LLM aggregator ([https://openrouter.ai/playground](https://openrouter.ai/playground))⁠[4](#c349.xhtml#a48M)
    with a playground they call “Chat.” It allows you to load several models and prompt
    them at the same time. You can also tweak and adjust parameters for each model
    you are running, and you can export your chat to save it.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: OpenRouter是一个LLM聚合器（[https://openrouter.ai/playground](https://openrouter.ai/playground)）⁠[4](#c349.xhtml#a48M），他们称之为“聊天”。它允许你同时加载多个模型并对它们进行提示。你也可以调整你正在运行的每个模型的参数，并且你可以导出你的聊天以保存它。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-998
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg](image_rsrc4B5.jpg)'
- en: Because these playgrounds, workbenches, or studios are developer interfaces,
    their features vary based on what they can do and what is provided to the user.
    It’s best to read the documentation of each playground. We’ll go over some commonalities
    in the next section.
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些游乐场、工作台或工作室是开发者界面，它们的特性取决于它们能做什么以及提供给用户什么。最好阅读每个游乐场的文档。我们将在下一节中讨论一些共同点。
- en: ​[ ​25​ ]​
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: '[25]'
- en: SYSTEM, USER, ASSISTANT BOXES
  id: totrans-1001
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 系统、用户、助手框
- en: 'The first thing you might notice in most playgrounds are the different boxes:
    System, User, and Assistant, or System, User, Message, or System Instruction,
    Chat.'
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数游乐场中，你可能会注意到的第一件事是不同的框：系统、用户和助手，或者系统、用户、消息，或系统指令、聊天。
- en: SYSTEM INSTRUCTION
  id: totrans-1003
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统指令
- en: Let’s talk about System Prompt or System Instruction first. Remember when we
    did Role-Based Prompts, we told the LLM to take on a persona in order to better
    serve the user? And then we had to remind the LLM of the role it was playing every
    so often.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先谈谈系统提示或系统指令。记得当我们做基于角色的提示时，我们告诉LLM扮演一个角色以更好地服务用户吗？然后我们不时地要提醒LLM它扮演的角色。
- en: System Prompts or System Instructions set the background information of the
    session. They apply to every interaction until you change them and can be useful
    for defining roles, setting formats and rules, or steering the model’s behavior.
    They can also provide external information. For example, when I used Playground
    to generate scene text, I would put the Story Information Megaprompt in the system
    box and then the “Write {scene beat}” in the user box, plugging in one beat at
    a time. The output would show up in the Assistant or Message box.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 系统提示或系统指令设置会话的背景信息。它们适用于每次交互，直到你更改它们，并且对于定义角色、设置格式和规则或引导模型行为非常有用。它们还可以提供外部信息。例如，当我使用游乐场生成场景文本时，我会将故事信息巨提示放入系统框中，然后“写入{场景动作}”放入用户框中，一次插入一个动作。输出将显示在助手或消息框中。
- en: I suspect that ChatGPT’s Custom Instructions were a way of introducing System
    Instruction to the chat interface, giving more context and instructions to the
    conversation.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 我怀疑ChatGPT的自定义指令是向聊天界面引入系统指令的一种方式，为对话提供更多上下文和指令。
- en: USER PROMPT
  id: totrans-1007
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用户提示
- en: The user prompt is the part of the prompt that usually goes into the chatbox.
    It is the step by step instruction or question that we’re familiar with. It is
    the prompt you type in or enter.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提示是提示中通常进入聊天框的部分。这是我们熟悉的逐步指令或问题。这是你输入或输入的提示。
- en: For examples of how to use System and User prompts, take a look at the Claude
    Prompt Library. [https://docs.anthropic.com/claude/prompt-library](https://docs.anthropic.com/claude/prompt-library)
    ⁠[1](#c349.xhtml#a48R)
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解如何使用系统和用户提示的示例，请查看Claude提示库。[https://docs.anthropic.com/claude/prompt-library](https://docs.anthropic.com/claude/prompt-library)
    ⁠[1](#c349.xhtml#a48R)
- en: Notice that the “Storytelling Sidekick” uses a System Prompt to give the LLM
    a role, and a User Prompt to give it a specific task.
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，“讲故事助手”使用系统提示给LLM一个角色，并使用用户提示给它一个具体任务。
- en: Meanwhile, the “Corporate Clairvoyant” puts information into the System Prompt
    to give the LLM background.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，“企业先知”将信息输入到系统提示中，为LLM提供背景。
- en: The “Simile Savant” skipped the System Prompt and only uses a User Prompt. This
    is the default mode when we talk to a Chatbot.
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: “类比大师”跳过了系统提示，只使用用户提示。这是我们与聊天机器人交谈时的默认模式。
- en: ASSISTANT OR MESSAGE
  id: totrans-1013
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 助手或消息
- en: This is the response from the LLM. One thing that’s great in OpenAI’s Playground,
    is that you can edit the Assistant’s response before you run the next user prompt.
    This means you can change anything you don’t like in the response rather than
    “prompt” the LLM to change what you don’t like (as you have to do in the chat
    interface). Many times, the chat will refuse to answer due to its filters. However,
    if you are in Playground and you change the Assistant Message, you can steer the
    LLM in the direction you want it to go. This is one powerful way to use the playground
    to develop stories because it gives you more control over the contents in the
    LLM’s context window.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 这是来自LLM的响应。在OpenAI的Playground中，有一个非常好的功能，那就是在运行下一个用户提示之前，你可以编辑助手的响应。这意味着你可以更改响应中任何你不喜欢的部分，而不是“提示”LLM更改你不喜欢的部分（就像你在聊天界面中必须做的那样）。很多时候，聊天会因为其过滤器而拒绝回答。然而，如果你在Playground中更改助手消息，你可以引导LLM走向你想要的方向。这是使用Playground开发故事的一个强大方法，因为它让你能够更多地控制LLM上下文窗口中的内容。
- en: CAVEATS
  id: totrans-1015
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 注意事项
- en: Developer interfaces are usually not very “user-friendly.” They have knobs and
    boxes that are not clearly explained. For example, it is not clear how you can
    save your “chats” or view the history. There may be a little “counterclockwise
    arrow surrounding a five-o’clock” near the bottom of the screen that allows you
    to look at recent prompts. OpenAI Playground only saves conversations for 30 days.
    Google AI Studio has a “save” button that saves and reloads your conversation
    from Google Drive. A good idea with using these interfaces is to copy and paste
    what you want to save to another content management system.
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者界面通常不太“用户友好”。它们有旋钮和框，这些旋钮和框没有明确的解释。例如，不清楚你如何保存你的“聊天”或查看历史记录。屏幕底部附近可能有一个“五点钟方向的小逆时针箭头”，允许你查看最近的提示。OpenAI
    Playground只保存对话30天。Google AI Studio有一个“保存”按钮，可以从Google Drive保存并重新加载你的对话。使用这些界面的好主意是将你想要保存的内容复制并粘贴到另一个内容管理系统。
- en: 'The trade-off is that developer interfaces are like power tools. You can do
    more than you can in the playpen of a chatbox. You can change the parameters to
    tune the LLM’s responses and, in some cases (Google AI Studio), delete the content
    filtering. You can view the code for your prompt and try out new techniques, such
    as different types of prompting: completion, chat, or more.'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 代价是，开发者界面就像工具一样。你可以在聊天盒子的游乐场中做更多的事情。你可以更改参数来调整LLM的响应，在某些情况下（Google AI Studio），还可以删除内容过滤。你可以查看你的提示代码并尝试新的技术，例如不同类型的提示：完成、聊天或更多。
- en: Let’s look next at the common parameters you can use to tweak and tune the LLM’s
    response.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看你可以用来调整和微调LLM响应的常见参数。
- en: ​[ ​26​ ]​
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: '[26]'
- en: PLAYGROUND PARAMETERS
  id: totrans-1020
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Playground参数
- en: 'Many LLM platforms offer playgrounds or workbenches where you can interact
    directly with the AI model and fine-tune its behavior using various parameters.
    Here are some key parameters to explore:'
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 许多LLM平台提供Playground或工作台，你可以直接与AI模型交互，并使用各种参数微调其行为。以下是一些关键参数供您探索：
- en: 'Temperature: This parameter controls the randomness of the AI’s output. A higher
    temperature leads to more creative and unexpected results, while a lower temperature
    results in more predictable and conservative responses.'
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: 温度：此参数控制AI输出的随机性。较高的温度会导致更富有创造性和出乎意料的结果，而较低的温度则会导致更可预测和保守的响应。
- en: 'Top-P and Top-K: These parameters control the diversity of the AI’s vocabulary.
    Top-P sets a threshold for the probability distribution of the next word, while
    Top-K limits the selection to the top K most probable words. In practice, Top-P
    is more advantageous since it is proportional to the size of the result set.'
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: Top-P和Top-K：这些参数控制AI词汇的多样性。Top-P为下一个单词的概率分布设置一个阈值，而Top-K将选择限制在概率最高的前K个单词。在实践中，Top-P更有优势，因为它与结果集的大小成比例。
- en: 'Frequency Penalty: This parameter penalizes the AI for repeating words or phrases,
    encouraging it to use a broader range of vocabulary and avoid redundancy.'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 频率惩罚：此参数惩罚AI重复单词或短语，鼓励它使用更广泛的词汇并避免冗余。
- en: 'Presence Penalty: This parameter can prevent the AI from focusing too much
    on specific topics or characters. It penalizes the presence of a word that already
    exists in the conversation.'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 存在惩罚：此参数可以防止AI过分关注特定主题或人物。它惩罚对话中已经存在的单词的存在。
- en: 'Max-Length: This slider limits the number of tokens in the response. Increasing
    the number of tokens allows the LLM to give more in-depth responses, whereas moving
    it down makes the AI give you a concise response—which may sometimes be chopped
    off. Ensure the max-length size is within the context window limits. Sometimes,
    when your prompt is huge, you must back off on the max-length slider to fit the
    prompt into the context window. This is the knob you can use to try and get the
    LLM to give you more words in its response. If I increase the max-length slider
    too much, I’ve found that the LLM will repeat itself to fill up the space, even
    if it has nothing new to say. This happens more frequently when using a fine-tune
    model.'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 最大长度：这个滑块限制了响应中的token数量。增加token数量允许LLM给出更深入的回答，而将其向下移动会使AI给出更简洁的回答——有时可能会被截断。确保最大长度大小在上下文窗口限制内。有时，当你的提示非常长时，你必须将最大长度滑块向后移动，以便将提示放入上下文窗口。这是你可以用来尝试让LLM在回答中给出更多词语的旋钮。如果我将最大长度滑块调得太大，我发现LLM会重复自己来填充空间，即使它没有新的东西要说。这在使用微调模型时更为常见。
- en: 'Note: Claude’s Workbench only gives you access to Temperature and Max Tokens
    to Sample, which is semantically different from OpenAI’s Max-Length. Apparently
    it means the maximum number of tokens to output and the slider can only go up
    to 4000\. Even though Claude 3 has a 200,000 context window, most of it goes to
    the input and the prompt. The max tokens output means we can only get around 3000
    words per prompt.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：Claude的工作台只提供访问温度和最大采样token，这与OpenAI的最大长度在语义上不同。显然，这意味着最大输出token数量，滑块只能向上到4000。尽管Claude
    3有一个200,000的上下文窗口，但其中大部分都用于输入和提示。最大token输出意味着我们每个提示只能得到大约3000个词语。
- en: In practice, if you do not control the API call, meaning you’re using the chat
    mode or someone else’s tool, they could have set the limit much lower, to 500
    tokens or 1000 tokens. This is why people complain that Claude is lazy or hardly
    answered the question. It was trying to fit its response into a small number of
    words. You can ask for 10,000 words, but you’re not going to get it—even if the
    context window is able to handle it. Incidentally, a table on Claude’s website
    shows that all models are limited to 4096 tokens of output, which translates to
    roughly 3000 words. [https://docs.anthropic.com/claude/docs/models-overview](https://docs.anthropic.com/claude/docs/models-overview)
    ⁠[1](#c349.xhtml#a46W)
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，如果你不控制API调用，即你使用聊天模式或他人的工具，他们可能会将限制设置得更低，比如500个token或1000个token。这就是为什么人们会抱怨Claude懒惰或很少回答问题。它试图将回答压缩成少量词语。你可以要求10,000个词语，但你不会得到它——即使上下文窗口能够处理它。顺便说一句，Claude网站上的一张表格显示，所有模型都限制在4096个token的输出，这大约相当于3000个词语。[https://docs.anthropic.com/claude/docs/models-overview](https://docs.anthropic.com/claude/docs/models-overview)
    ⁠[1](#c349.xhtml#a46W)
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1029
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: If you want the LLM to go a little crazy and not follow instructions, you can
    slide the temperature up a little—not too much, or you might get gibberish. If
    you want it to stick to your instructions, decrease the temperature and the TopP.
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想让LLM稍微疯狂一点，不遵循指示，可以稍微提高温度——不要太多，否则你可能会得到乱码。如果你想让它遵循你的指示，降低温度和TopP。
- en: Playing around with a combination of Temperature and TopP can drastically alter
    the writing style of an LLM. For example, Leeland discovered a way to get GPT-4
    to write like Claude 2.0\. He would turn the temperature on GPT-4 to 1.7 and lower
    the TopP to .5 or .7\. This way, GPT-4 would have more randomness in word selection
    but be limited to only the top 70% or 50% of the more random choices.
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: '通过调整温度和TopP的组合，可以极大地改变LLM的写作风格。例如，利兰发现了一种让GPT-4写出Claude 2.0风格的方法。他会将GPT-4的温度设置为1.7，并将TopP降低到0.5或0.7。这样，GPT-4在单词选择上会有更多的随机性，但仅限于最随机选择的前70%或50%。 '
- en: If you don’t reduce the TopP, your chances of getting gibberish increases.
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有降低TopP，你得到乱码的机会会增加。
- en: When Elizabeth wants the AI to follow her outlines or directions, she reduces
    the temperature to .5 to .7 and the TopP to .5 to .7.
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 当伊丽莎白希望AI遵循她的提纲或指示时，她会将温度降低到0.5到0.7，并将TopP降低到0.5到0.7。
- en: By the way, the ranges for temperature are different between OpenAI and Claude,
    so it’s a relative number and not an absolute number.
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一下，OpenAI和Claude的温度范围不同，所以这是一个相对数字，而不是绝对数字。
- en: The [Future Fiction Academy](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[2](#c349.xhtml#a3UP) offers a free introductory class called “Introduction to
    AI Basics for Fiction Writing” that covers LLMs, playgrounds, and parameters.
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: '[未来虚构学院](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    [2](#c349.xhtml#a3UP) 提供了一门名为“虚构写作AI基础入门”的免费入门课程，涵盖了LLMs、游乐场和参数。'
- en: 'See their YouTube Channel: [https://www.youtube.com/watch?v=o_7PTSlFNn8&ab_channel=FutureFictionAcademy](https://www.youtube.com/watch?v=o_7PTSlFNn8&ab_channel=FutureFictionAcademy)
    ⁠[3](#c349.xhtml#a47H)'
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 查看他们的YouTube频道：[https://www.youtube.com/watch?v=o_7PTSlFNn8&ab_channel=FutureFictionAcademy](https://www.youtube.com/watch?v=o_7PTSlFNn8&ab_channel=FutureFictionAcademy)
    [3](#c349.xhtml#a47H)
- en: ​[ ​27​ ]​
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: '[27]'
- en: CONTEXT WINDOW CONSIDERATIONS
  id: totrans-1038
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 上下文窗口考虑事项
- en: Imagine having a conversation with someone who can only remember the last few
    sentences you said. Frustrating, right? That’s similar to how LLMs operate with
    their limited context window.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下与只能记住你说的最后几句话的人交谈。这很令人沮丧，对吧？这与LLMs使用有限上下文窗口操作的方式相似。
- en: While we’ve already talked about context windows, we didn’t go into detail because
    most chatbots “hide” context windows from the user. You only notice that the chatbot
    seems to have forgotten something you told it earlier.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经讨论了上下文窗口，但我们没有深入探讨，因为大多数聊天机器人“隐藏”上下文窗口不向用户显示。你只会注意到聊天机器人似乎忘记了之前告诉它的事情。
- en: Users also notice that the chats are sometimes terse and never seem to give
    you the number of words you asked for. This is because you have no control over
    the context window, whether the chat uses up the window by holding on to more
    past information or allowing more open space for its response.
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 用户也注意到，聊天有时很简短，似乎从未给出你要求的单词数量。这是因为你对上下文窗口没有控制权，聊天是通过保留更多过去信息或为响应留出更多开放空间来耗尽窗口的。
- en: The playground or developer’s interface makes the user more aware of the context
    window because it has a parameter that determines the “max-length” of the prompt
    and response, so now is a good time to go into more detail on how context windows
    work.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 游乐场或开发者界面让用户更了解上下文窗口，因为它有一个参数决定了提示和响应的“最大长度”，因此现在是深入了解上下文窗口如何工作的好时机。
- en: What is a Context Window?
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是上下文窗口？
- en: An LLM’s context window refers to how much text it can consider and “remember”
    when processing and generating a response. Think of it as the AI’s short-term
    memory. It holds a limited number of tokens (words or word fragments), including
    previous prompts and responses, along with the current prompt.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: LLM的上下文窗口指的是它在处理和生成响应时可以“记住”的文本量。将其视为AI的短期记忆。它包含有限数量的标记（单词或单词片段），包括先前的提示和响应，以及当前的提示。
- en: Why is Context Window Size Important?
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么上下文窗口大小很重要？
- en: 'The context window size directly impacts the AI’s ability to understand complex
    prompts, maintain narrative coherence, and generate consistent and relevant outputs.
    A small context window limits the amount of information the AI can process, leading
    to potential issues such as:'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文窗口的大小直接影响AI理解复杂提示、保持叙事连贯性和生成一致且相关输出的能力。小的上下文窗口限制了AI可以处理的信息量，可能导致以下问题：
- en: 'Loss of context: The AI may forget earlier parts of the conversation or story,
    resulting in irrelevant or contradictory responses.'
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文丢失：AI可能会忘记对话或故事的早期部分，导致无关或矛盾的响应。
- en: 'Repetition: The AI may repeat information or phrases due to limited access
    to previous text.'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 重复：由于对先前文本的访问有限，AI可能会重复信息或短语。
- en: 'Inability to handle complex tasks: Tasks requiring a larger context, such as
    summarizing long documents or generating detailed narratives, become challenging.'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 无法处理复杂任务：需要更大上下文的任务，如总结长文档或生成详细叙述，变得具有挑战性。
- en: STRUCTURING PROMPTS FOR DIFFERENT CONTEXT WINDOW SIZES
  id: totrans-1050
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为不同上下文窗口大小结构化提示
- en: 'Small Context Windows:'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 小上下文窗口：
- en: 'Keep prompts concise and focused: Provide only the most essential information.'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 保持提示简洁和专注：只提供最必要的信息。
- en: 'Break down complex tasks: Divide tasks into smaller prompts that fit within
    the window. Instead of prompting for an entire scene, break the prompt down into
    scene beats.'
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 将复杂任务分解：将任务分解为适合窗口的小提示。与其提示整个场景，不如将提示分解为场景的节奏。
- en: 'Use reminder prompts: Reiterate key information to refresh the AI’s memory.'
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提醒提示：重申关键信息以刷新AI的记忆。
- en: 'Large Context Windows:'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 大上下文窗口：
- en: 'Utilize context stuffing/megaprompts: Provide additional background information,
    character details, or world-building elements.'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 利用上下文填充/超大提示：提供额外的背景信息、角色细节或世界构建元素。
- en: 'Employ prompt chaining: Break down complex tasks into sequential prompts.'
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示链：将复杂任务分解成一系列的提示。
- en: 'Explore complex narratives: Generate longer and more intricate stories with
    greater continuity.'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 探索复杂叙事：生成更长、更复杂的情节，并具有更强的连贯性。
- en: THE EVOLUTION OF CONTEXT WINDOW SIZE
  id: totrans-1059
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**上下文窗口大小的演变**'
- en: 'Early LLMs had limited context windows, often around 2000 tokens (approximately
    1500 words). However, recent advancements have led to significant increases in
    context window size:'
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 早期的 LLM 具有有限的范围窗口，通常在 2000 个令牌（大约 1500 个单词）左右。然而，最近的进步导致了上下文窗口大小的显著增加：
- en: 'GPT-3.5: 4096 tokens (approximately 3000 words)'
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3.5：4096个令牌（大约3000个单词）
- en: 'GPT-4: 8192 tokens (approximately 6000 words)'
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4：8192个令牌（大约6000个单词）
- en: 'Claude 3: 200,000 tokens'
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: Claude 3：200,000个令牌
- en: 'Gemini Pro 1.5: 1,000,000 tokens'
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini Pro 1.5：1,000,000个令牌
- en: Keep in mind that LLMs charge for both the input and output tokens. Sometimes,
    the charge is the same, but in most cases, the input tokens cost less than the
    output tokens.
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，LLM 对输入和输出令牌都收费。有时，费用相同，但在大多数情况下，输入令牌的费用低于输出令牌。
- en: STRATEGIES FOR EFFECTIVE PROMPTING WITH CONTEXT WINDOWS
  id: totrans-1066
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**上下文窗口中的有效提示策略**'
- en: 'Even with larger context windows, it’s crucial to use them efficiently. Here
    are some strategies:'
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有更大的上下文窗口，也必须高效地使用它们。以下是一些策略：
- en: 'Prioritize relevant information: Focus on details essential to the current
    task or scene.'
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 优先考虑相关信息：关注当前任务或场景中至关重要的细节。
- en: 'Summarize previous events: To maintain continuity, provide concise summaries
    of key past events.'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 总结先前事件：为了保持连贯性，提供关键过去事件的简洁摘要。
- en: 'Utilize external knowledge bases: Store and reference information in external
    documents or tools.'
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 利用外部知识库：在外部文档或工具中存储和引用信息。
- en: 'Experiment with different AI models: Explore models with varying context window
    sizes to find the best fit for your needs.'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的 AI 模型：探索具有不同上下文窗口大小的模型，以找到最适合你需求的模型。
- en: Having a large context window does not always guarantee total recall of information.
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 即使拥有较大的上下文窗口，也不一定能保证完全回忆起信息。
- en: RAG AND LARGE-CONTEXT MODELS
  id: totrans-1073
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**RAG 和大型上下文模型**'
- en: Just having a large context window does not automatically guarantee the LLM’s
    ability to retrieve and relate to every piece of information inside its window.
    This is because most of the current large-context models, other than Google Gemini
    1.5 Pro, use Retrieval-Augmented Generation to summarize data.
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: 仅拥有较大的上下文窗口并不能自动保证 LLM 能够检索并关联其窗口内的每一条信息。这是因为大多数当前的大型上下文模型（除了 Google Gemini
    1.5 Pro）都使用检索增强生成来总结数据。
- en: In the next chapter, I’ll discuss RAG and suggest ways of getting RAG models
    to “key” into the information inside our megaprompt that we want it to retrieve
    and reason on.
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我将讨论 RAG 并提出让 RAG 模型“关键”到我们超大提示中我们希望它检索和推理的信息的方法。
- en: ​[ ​28​ ]​
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: '[28]'
- en: RETRIEVAL AUGMENTED GENERATION (RAG)
  id: totrans-1077
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**检索增强生成（RAG**）'
- en: To understand Retrieval Augmented Generation (RAG), we need to understand the
    mechanisms of how it works.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解检索增强生成（RAG），我们需要了解其工作机制。
- en: RAG is a fancy way of saying that the LLM uses external information to help
    it answer your questions. The LLM scans your text and indexes important words
    or phrases. This index is like a table of contents that helps it find relevant
    passages later.
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: RAG 是一种说法，即 LLM 使用外部信息来帮助它回答你的问题。LLM 扫描你的文本并索引重要的单词或短语。这个索引就像一个目录，帮助它在以后找到相关的段落。
- en: It decides what’s important by using TF-IDF, or “Term Frequency-Inverse Document
    Frequency.” Imagine you have a book about cats and a book about dogs. TF-IDF would
    tell you that “meow” is a more important word in the cat book, while “woof” is
    more important in the dog book.
  id: totrans-1080
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过使用 TF-IDF，或“词频-逆文档频率”来决定什么重要。想象你有一本关于猫的书和一本关于狗的书。TF-IDF 会告诉你，“喵喵”在猫书中是一个更重要的词，而“汪汪”在狗书中更重要。
- en: The index of important words or phrases is stored in a separate database, which
    is like a library where the AI can quickly access the information it needs.
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 重要单词或短语的索引存储在单独的数据库中，这就像一个图书馆，AI 可以快速访问所需的信息。
- en: When you ask a question, the AI uses your question as a search query and compares
    it to the indexed passages. It finds the passages that are most similar to your
    question, which is like finding books with similar titles or topics in a library.
    It then ranks the passages and retrieves the most relevant ones, ordering them
    by where they appeared in the original text.
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 当您提出问题时，AI会将您的问题用作搜索查询，并将其与索引段落进行比较。它找到与您的问题最相似的段落，就像在图书馆中找到具有相似标题或主题的书籍一样。然后，它对段落进行排序并检索最相关的段落，按它们在原始文本中的出现顺序排列。
- en: Unfortunately, when applied to fiction, RAG often misses important details because
    it relies on summaries and extracted keywords. It will miss clues, subtle details,
    or fine plot points that are crucial for a particular story. If a specific fact
    or event wasn’t deemed “important” during indexing, it may not be retrieved, even
    if present in the source material.
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，当应用于小说时，RAG经常遗漏重要细节，因为它依赖于摘要和提取的关键词。它可能会错过对特定故事至关重要的线索、细微的细节或精细的情节点。如果在索引过程中某个特定事实或事件被认为“不重要”，即使它在原始材料中存在，也可能无法检索到。
- en: Since most currently popular large-context models, including Claude 3 and OpenAI
    GPT-4, utilize RAG, we need to consider strategies for structuring our megaprompts
    to accommodate RAG.
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 由于目前大多数流行的长上下文模型，包括Claude 3和OpenAI GPT-4，都使用RAG，我们需要考虑为我们的megaprompt制定策略，以适应RAG。
- en: EFFECTIVE MEGAPROMPTING WITH RAG MODELS
  id: totrans-1085
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用RAG模型进行有效的megaprompting
- en: 'Focus on Key Information: Prioritize including crucial details such as character
    profiles, major plot points, important settings, and essential world-building
    elements within your megaprompt.'
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 重点关注关键信息：在您的megaprompt中，优先包含关键细节，例如角色档案、主要情节点、重要场景和基本的世界构建元素。
- en: 'Structure and Organization: Organize your megaprompt with clear headings, sections,
    and labels to improve information retrieval. This is why tagging is important.
    Use consistent keywords in your tags, like <character> <setting> <writing style>.'
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 结构和组织：使用清晰的标题、部分和标签组织您的megaprompt，以提高信息检索。这就是为什么标签很重要。在标签中使用一致的关键词，如<character>
    <setting> <writing style>。
- en: 'Utilize Keywords Strategically: Incorporate relevant keywords throughout your
    megaprompt to increase the likelihood of the AI recognizing and retrieving associated
    information. Use your characters’ names rather than pronouns. Be repetitive with
    details you want the AI to retain. For example, if you want snarky dialogue, mention
    it in the character trait, and then again in writing style, and insert it into
    the scene brief as a reminder.'
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 战略性地使用关键词：在您的megaprompt中融入相关关键词，以增加AI识别和检索相关信息的可能性。使用您角色的名字而不是代词。对您希望AI保留的细节进行重复。例如，如果您想要讽刺的对话，在角色特质中提及它，然后在写作风格中再次提及，并将其插入场景简报作为提醒。
- en: 'Specificity is Key: Avoid vague or ambiguous language. Use precise descriptions
    and specific terminology related to your story and genre. Name the sword, the
    pet, and the talisman specifically, and refer to them by their proper names in
    your prompts.'
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 明确性至关重要：避免含糊或模糊的语言。使用与您的故事和类型相关的精确描述和特定术语。具体命名剑、宠物和护身符，并在提示中按其正确名称引用。
- en: 'Multiple Megaprompts: To improve information organization and retrieval, consider
    creating separate megaprompts for different aspects of your story, such as characters,
    settings, or plotlines. We’ll talk about this later when dealing with narrative
    continuity, but you might not want to include all of your previous chapter summaries
    in your megaprompt. Include only what is relevant.'
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 多个megaprompt：为了提高信息组织和检索，考虑为故事的不同方面创建单独的megaprompt，例如角色、场景或情节线。我们将在处理叙事连续性时讨论这一点，但您可能不想在megaprompt中包含所有之前的章节摘要。只包含相关的部分。
- en: 'Utilize Retrieval-Specific Prompts: In addition to providing context, include
    prompts that explicitly instruct the AI to retrieve specific information from
    the megaprompt. For example, “Based on the character profile of [Character Name],
    describe their reaction to this situation…”'
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 利用检索特定提示：除了提供上下文外，还包括明确指示AI从megaprompt中检索特定信息的提示。例如，“基于[角色名称]的角色档案，描述他们对这种情况的反应……”
- en: 'Pre-processing and Annotation: Before feeding your text to the RAG model, pre-process
    it by highlighting or annotating key information, characters, locations, and events
    by tagging them. For example, if a particular magical item is important for your
    scene, tag it in your megaprompt and mention it by its tagged name several times.'
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理和标注：在将文本输入到RAG模型之前，通过标记来突出显示或标注关键信息、人物、地点和事件。例如，如果某个特定的魔法物品对您的场景很重要，请在您的巨提示中标记它，并通过其标记名称多次提及。
- en: Complete control over RAG indexing might not always be possible, but you can
    increase the efficacy of your prompting by tagging and spacing out (repeating)
    important details in your megaprompts.
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 完全控制RAG索引可能并不总是可能的，但您可以通过在您的巨提示中标记和间隔（重复）重要细节来提高您提示的效率。
- en: ​[ ​29​ ]​
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: '[29]'
- en: CUSTOM INSTRUCTIONS
  id: totrans-1095
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自定义指令
- en: One of the problems with chatbots is the need to remind the ongoing chat about
    roles and background information. We’ve already seen how System Prompts, or System
    Instructions, work across the totality of a conversation. However, they are not
    available on the chat interface. One way OpenAI did to provide this option is
    to make a feature called Custom Instructions.
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人存在的问题之一是需要提醒持续的聊天关于角色和背景信息。我们已经看到了系统提示或系统指令如何在整个对话中工作。然而，它们在聊天界面上不可用。OpenAI提供此选项的一种方式是创建一个名为自定义指令的功能。
- en: They are available for both the free and the paid versions. You can find the
    option in your account settings under “Customize ChatGPT.”
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 它们适用于免费和付费版本。您可以在“自定义ChatGPT”下的账户设置中找到此选项。
- en: 'It contains two boxes, a top box or a “Preamble” with the question: “What would
    you like ChatGPT to know about you to provide better responses?”'
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 它包含两个框，一个顶部框或“引言”，其中包含问题：“您希望ChatGPT了解哪些关于您自己的信息以提供更好的回应？”
- en: '-AND- a bottom box or Postscript with the question: “How would you like ChatGPT
    to respond?”'
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: -AND- 在底部框或附录中提出问题：“您希望ChatGPT如何回应？”
- en: You can enter 1500 characters into each box.
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以每个框输入1500个字符。
- en: The “Preamble” gives the overall context of the conversation. You can give it
    a role, or tell the AI what you’re trying to accomplish. For example, development
    editor, marketing, or brilliant mad scientist fantasy author. The “Postscript”
    tunes ChatGPT’s response.
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: “引言”提供了对话的整体上下文。您可以给它一个角色，或者告诉AI您试图实现的目标。例如，开发编辑、市场营销或杰出的疯狂科学家幻想作家。而“附录”调整ChatGPT的回应。
- en: I suspect that your “User input” is sandwiched between the “Preamble” box and
    the “Postscript” box. I don’t know, but Custom Instructions are a great way to
    alter the way ChatGPT responds to you and give it a role to take on and provide
    additional information.
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: 我怀疑您的“用户输入”位于“引言”框和“附录”框之间。我不知道，但自定义指令是改变ChatGPT对您回应方式的一种极好方式，并给它一个要扮演的角色并提供额外的信息。
- en: The Preamble box conditions the model to go to a particular area of its universe
    of possible responses. It’s like giving a hint of the domain of words to look
    for, whereas the Postscript helps it decide what words to return or how it responds.
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 引言框使模型倾向于其可能响应的特定区域。这就像给出要查找的单词领域的提示，而附录有助于它决定返回哪些单词或如何回应。
- en: The Preamble box is added to the top of the prompt and doesn’t seem to affect
    the output as much as the Postscript which is closer to end of the prompt. Because
    the large language model skews toward more recently seen words (tokens), the Postscript
    box has a larger influence in terms of word choices and direction of the responses.
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 引言框被添加到提示的顶部，并且似乎不会像接近提示末尾的附录那样影响输出。因为大型语言模型倾向于更多最近看到的单词（标记），所以附录框在单词选择和响应方向上具有更大的影响。
- en: 'Provide Instructions: Enter your desired guidelines and context in the provided
    text boxes. You can include information such as:'
  id: totrans-1105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供指令：在提供的文本框中输入您想要的指南和上下文。您可以包括如下信息：
- en: 'Your writing style and preferences: Specify your preferred tone, voice, and
    level of formality.'
  id: totrans-1106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的写作风格和偏好：指定您首选的语气、声音和正式程度。
- en: 'Your current project: Briefly describe your story’s genre, setting, and main
    characters.'
  id: totrans-1107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您当前的项目：简要描述您故事的类型、背景和主要人物。
- en: 'Specific instructions for the AI: Outline what you want the AI to focus on,
    such as generating ideas, providing feedback, or completing tasks.'
  id: totrans-1108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对AI的具体指令：概述您希望AI关注的要点，例如生成想法、提供反馈或完成任务。
- en: Your input is limited because you only have 1500 characters.
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: 您的输入有限，因为您只有1500个字符。
- en: 'Save and Apply: Once you’ve entered your instructions, save them. The AI will
    now consider these instructions in all your future interactions.'
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: 保存并应用：一旦您输入了指令，请保存它们。AI 将现在考虑您未来所有交互中的这些指令。
- en: There is a “toggle” at the bottom whether to “Enable for New Chats.” Turn off
    the Enable if you want to start a chat without the custom instructions.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 底部有一个“切换”按钮，可以选择是否“为新聊天启用”。如果您想开始一个不带自定义指令的聊天，请关闭启用。
- en: 'Update as Needed: As your project evolves or your needs change, revisit and
    update your custom instructions to ensure they remain relevant.'
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 需要时更新：随着您的项目发展或需求变化，请重新访问并更新您的自定义指令，以确保它们保持相关性。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1113
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: 'Benefits of Custom Instructions:'
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义指令的好处：
- en: 'Personalization: Tailor the AI’s behavior to your writing style, preferences,
    and project requirements.'
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化：根据您的写作风格、偏好和项目要求定制 AI 的行为。
- en: 'Consistency: Ensure the AI’s responses remain consistent with your established
    guidelines and avoid contradictory or off-topic outputs.'
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性：确保 AI 的回复与您设定的指南保持一致，避免产生矛盾或不相关的输出。
- en: 'Efficiency: Eliminate the need to repeat the exact instructions or provide
    context in every prompt, saving time and effort.'
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 效率：消除在每次提示中重复确切指令或提供上下文的必要性，节省时间和精力。
- en: 'Targeted Outputs: Guide the AI to generate content that aligns with your specific
    goals, whether brainstorming ideas, developing characters, or writing scenes.'
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 目标输出：引导 AI 生成符合您特定目标的内容，无论是头脑风暴想法、开发角色还是编写场景。
- en: Custom GPTs have supplanted Custom Instructions for users on the paid account.
    The free account does not allow access to Custom GPTs, so having a flavor of customization
    using Custom Instructions is still useful.
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义 GPT 已取代付费账户中的自定义指令。免费账户不允许访问自定义 GPT，因此使用自定义指令进行一些定制仍然很有用。
- en: If you’re interested in a Writers Room I created using Custom Instructions,
    please see this webpage “Writer’s Room w/ OpenAI ChatGPT 4” [https://adorable-porcupine.super.site/openai-chatgpt](https://adorable-porcupine.super.site/openai-chatgpt)
    ⁠[1](#c349.xhtml#a42T)
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对使用自定义指令创建的作家室感兴趣，请参阅这个网页“Writer’s Room w/ OpenAI ChatGPT 4” [https://adorable-porcupine.super.site/openai-chatgpt](https://adorable-porcupine.super.site/openai-chatgpt)
    [1](#c349.xhtml#a42T)
- en: 'Note: Custom Instructions are now available with the free account.'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：现在免费账户也提供了自定义指令功能。
- en: ​[ ​30​ ]​
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: '[30]'
- en: CUSTOM GPTS
  id: totrans-1123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自定义 GPTS
- en: ChatGPT Plus offers an exciting feature called Custom GPTs, allowing users to
    create and utilize AI models tailored to specific domains, writing styles, or
    individual preferences. It allows the creator to define a set of roles and tasks
    that the Custom GPT is to do. In addition, the creator can upload files that contain
    its knowledge base, and advanced creators can even link their Custom GPT to outside
    data sources. The Custom GPTs are free for users of the paid Plus plan, and there
    are talks about compensating the designers. Right now, everyone is just putting
    them up there for free.
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus 提供了一个名为自定义 GPT 的激动人心的功能，允许用户创建并使用针对特定领域、写作风格或个人偏好的 AI 模型。它允许创建者定义一组角色和任务，让自定义
    GPT 执行。此外，创建者可以上传包含其知识库的文件，高级创建者甚至可以将他们的自定义 GPT 连接到外部数据源。对于付费 Plus 计划的用户，自定义 GPT
    是免费的，并且有关于补偿设计师的讨论。目前，每个人都在免费提供这些功能。
- en: You, too, can create your own Custom GPT. Here are the steps.
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以创建自己的自定义 GPT。以下是步骤。
- en: Name your GPT and select an image, or let Dall-E generate one.
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: 为您的 GPT 命名并选择一个图像，或者让 Dall-E 生成一个。
- en: 'Gather Training Data: Collect a dataset of text that reflects the specific
    domain, style, or knowledge you want the AI to possess. This could include excerpts
    from your writing, genre-specific texts, or information about your genre’s world-building,
    characters, or themes.'
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 收集训练数据：收集反映您希望 AI 拥有的特定领域、风格或知识的文本数据集。这可能包括您写作的摘录、特定类型的文本，或关于您类型的世界构建、角色或主题的信息。
- en: 'Format the Data: You can use XML style tags to delineate your data just like
    we did with megaprompts. Uploading plain text files is best because it’s easier
    for the AI to parse. If you upload too much information, your custom GPT’s performance
    will suffer with spinning wheel syndrome.'
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 格式化数据：您可以使用 XML 风格的标签来划分您的数据，就像我们处理 megaprompts 一样。上传纯文本文件最佳，因为它更容易让 AI 解析。如果您上传了太多信息，您的自定义
    GPT 的性能可能会因为旋转轮子综合症而受到影响。
- en: 'Access the Custom GPT Feature: Navigate to the Custom GPT section within your
    ChatGPT Plus account.'
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 访问自定义 GPT 功能：在您的 ChatGPT Plus 账户中导航到自定义 GPT 部分。
- en: Write out the instructions for what you want the GPT to do.
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 写出你希望GPT执行的操作说明。
- en: Upload your knowledge base upon which you want the GPT to draw.
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 上传你希望GPT从中获取知识的知识库。
- en: Provide a few sample “prompts” to let users get started.
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一些示例“提示”，让用户开始使用。
- en: Test your GPT by prompting it and seeing how it responds.
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提示来测试你的GPT，看看它的响应如何。
- en: You may then “publish” it by either making it public and searchable, or for
    those who have the link, or keeping it private.
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以通过将其公开和可搜索、或对有链接的人，或者保持私密来“发布”它。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1135
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: 'Benefits of Custom GPTs for Fiction Writers:'
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义GPT对小说作家的好处：
- en: 'Genre-Specific Expertise: Create Custom GPTs trained on specific genres, such
    as fantasy, science fiction, romance, or mystery, to ensure the AI’s outputs align
    with genre conventions and reader expectations.'
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 题材特定专业知识：创建在特定题材上训练的自定义GPT，如奇幻、科幻、浪漫或悬疑，以确保AI的输出与题材惯例和读者期望一致。
- en: 'World-Building Consistency: Train a Custom GPT on your world-building documents
    and lore to ensure the AI generates text consistent with your established world
    and its unique elements.'
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建一致性：在你的世界构建文档和传说上训练一个自定义GPT，以确保AI生成的文本与你的建立的世界及其独特元素保持一致。
- en: 'Character Development: Develop a Custom GPT for specific characters, incorporating
    their backstories, personalities, and dialogue styles to ensure consistent and
    believable portrayals.'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：为特定角色开发一个自定义GPT，结合他们的背景故事、个性和对话风格，以确保一致和可信的描绘。
- en: 'Editing Team: Create a writer’s room of experts, each looking at a different
    aspect of editing. For example, pacing, tension, dialogue, character arc, scene
    building, and description.'
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑团队：创建一个由专家组成的作家室，每位专家都关注编辑的不同方面。例如，节奏、紧张感、对话、角色弧线、场景构建和描述。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1141
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: 'Using Existing Custom GPTs:'
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 使用现有的自定义GPT：
- en: OpenAI offers a community showcase where users can share and access Custom GPTs
    created by others. This allows you to benefit from domain-specific knowledge and
    expertise without training your own model from scratch.
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI提供了一个社区展示区，用户可以分享和访问他人创建的自定义GPT。这让你能够从特定领域的知识和专长中受益，而无需从头开始训练自己的模型。
- en: An excellent way to approach a custom GPT is to ask what it can do for you.
    Ask it in different ways, and then ask what information it needs from you. Interview
    it like you would any job applicant.
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 接近自定义GPT的一个很好的方法是询问它能为你做什么。用不同的方式询问，然后询问它需要从你那里获取什么信息。就像面试任何求职者一样面试它。
- en: 'Referring to Multiple Custom GPTs within a Chat:'
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 在聊天中引用多个自定义GPT：
- en: You can access and interact with multiple Custom GPTs within a single ChatGPT
    chat session by using the “@“ symbol. This pops up the last few Custom GPTs you’ve
    used or those you’ve pinned. This enables you to leverage the strengths of different
    customizations and combine their capabilities for even more powerful results.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过使用“@”符号在单个ChatGPT聊天会话中访问和交互多个自定义GPT。这会弹出你最近使用的或已固定的最后几个自定义GPT。这使你能够利用不同定制化的优势，并将它们的能力结合起来以获得更强大的效果。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1147
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: 'Among the many exciting possibilities of Custom GPTs is the ability to tailor
    AI assistance to specific genres. One example is the “Romance Writing Coach,”
    a custom GPT I designed to help authors write romances. It includes the following
    knowledge base:'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 在自定义GPT的许多令人兴奋的可能性中，能够根据特定题材定制AI辅助是一个亮点。一个例子是“浪漫写作教练”，这是我设计的一个自定义GPT，帮助作者写浪漫小说。它包括以下知识库：
- en: 'Contemporary Romance Tropes: a list of popular tropes such as “enemies to lovers,”
    “fake relationships,” and “second chances” to help with premise ideas'
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 当代浪漫陈词滥调：一个流行的陈词滥调列表，如“敌人变恋人”、“虚假关系”和“第二次机会”，以帮助构思情节想法。
- en: 'Tension Intensifiers: provides guidance on utilizing various tension-building
    techniques, such as forbidden love, secret pasts, and emotional vulnerabilities,
    to generate romantic tension.'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 紧张感增强器：提供使用各种紧张感构建技术的指导，例如禁忌之爱、秘密过去和情感脆弱性，以生成浪漫紧张感。
- en: 'Romantic Chemistry and Conflicts: offers insights into developing romantic
    attractions and conflicts, focusing on chemistry despite the obstacles'
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: 浪漫化学和冲突：提供发展浪漫吸引力和冲突的见解，专注于尽管有障碍的化学作用。
- en: 'Dialogue and Banter: This role assists in crafting witty, engaging dialogue
    and banter that reflects the characters’ personalities and enhances romantic tension.'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 对话和闲聊：这个角色协助创作机智、吸引人的对话和闲聊，反映角色的个性和增强浪漫紧张感。
- en: 'Character Development: it guides authors in creating well-rounded and likable
    characters with depth, humor, and emotional resonance.'
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：它指导作者创造有深度、幽默和情感共鸣的全面且受欢迎的角色。
- en: 'Scene Crafting and Emotional Impact: helps construct vivid scenes that convey
    the setting, character interactions, and emotional tone.'
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 场景构建和情感影响：帮助构建生动的场景，传达场景、角色互动和情感基调。
- en: Includes a four-act outline that includes the romance-genre plot points and
    obligatory scenes.
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 包含一个四幕大纲，其中包括浪漫体裁的情节点和必要场景。
- en: 'Writing Style and Tone: emphasizes a clear and engaging writing style and utilizes
    direct, relatable language to convey emotions and character chemistry effectively.'
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 写作风格和语气：强调清晰和引人入胜的写作风格，并使用直接、易于理解的语言来有效地传达情感和角色化学。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1157
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg](image_rsrc4B5.jpg)'
- en: One writer told me she brainstormed and outlined her entire year’s work using
    Romance Writing Coach. Another friend uses it to brainstorm “what happens next”
    in her story. I use it for brainstorming premises and characters, and later, when
    I’m writing, I ask it to generate scene briefs as well as critique and suggest
    enhancements to my scenes, for example, asking where I can increase romantic tension
    or enhance chemistry or improve the dialogue to be more snarky.
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 一位作家告诉我，她使用浪漫写作教练头脑风暴并概述了她整个年度的工作。另一位朋友用它来头脑风暴故事中的“接下来会发生什么”。我用来头脑风暴前提和角色，后来在写作时，我会要求它生成场景概要，以及对我的场景进行评论和建议，例如，询问我可以在哪里增加浪漫张力或增强化学作用或改善对话以使其更具讽刺意味。
- en: It’s free to try out if you have a ChatGPT Plus account, and of course, you
    are not limited to using only one custom GPT. You can call on different ones within
    the same conversation.
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你拥有ChatGPT Plus账户，可以免费试用，当然，你不必仅限于使用一个自定义GPT。你可以在同一对话中调用不同的GPT。
- en: 'Link to Romance Writing Coach: [https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach)
    ⁠[1](#c349.xhtml#a46D)'
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 浪漫写作教练链接：[https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach)
    [1](#c349.xhtml#a46D)
- en: ​[ ​PART 5​ ]​
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: '[第五部分](PART 5)'
- en: WRITING SCENES WITH AI
  id: totrans-1162
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI编写场景
- en: '![group of writers in front of typewriters](image_rsrc4BB.jpg)'
  id: totrans-1163
  prefs: []
  type: TYPE_IMG
  zh: '![group of writers in front of typewriters](image_rsrc4BB.jpg)'
- en: ​[ ​31​ ]​
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: '[31]'
- en: USING SCENE BRIEFS
  id: totrans-1165
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用场景概要
- en: A scene is the essential component of a story. It comprises a setting, character
    interactions, and significant events. A well-crafted scene is like a short story,
    with a clear beginning, middle, and end. Characters have specific goals in each
    scene that they attempt to achieve through their actions and dialogue. These goals
    can be fulfilled or thwarted by opposing characters or anticipated or unforeseen
    events. We can look at scenes as a collection of events or “beats” that have a
    story direction. They are glued together by logical consistency. This happened
    because of that, and because this happened, something might happen next.
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 场景是故事的基本组成部分。它包括场景、角色互动和重要事件。一个精心构建的场景就像一个短篇故事，有明确的开始、中间和结束。角色在每一个场景中都有特定的目标，他们通过行动和对话试图实现这些目标。这些目标可能被对立的角色或预期或未预见到的事件实现或挫败。我们可以将场景视为一系列事件或“节奏”，它们具有故事方向。它们通过逻辑一致性粘合在一起。这是因为发生了那件事，因为发生了这件事，接下来可能会发生某事。
- en: An LLM can assist in writing a scene, but it does not know the specific details
    of your intended outcome. If you rely solely on the LLM to generate a scene from
    a sentence in your outline, it may create elements that you did not intend, making
    it necessary to rewrite or discard most of what was generated. Therefore, providing
    clear guidance and direction to the LLM is crucial to producing a coherent scene
    that meets your specific needs.
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: LLM可以帮助编写场景，但它不知道你期望的具体细节。如果你仅依靠LLM从你的大纲中的句子生成场景，它可能会创建出你未打算包含的元素，这可能导致需要重写或丢弃大部分生成的内容。因此，向LLM提供清晰的指导和方向对于产生符合你特定需求的连贯场景至关重要。
- en: To do that, we can apply the skills we learned in detailed prompting and the
    use of megaprompts to give the LLM more context in order to help it deliver a
    satisfying scene.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们可以应用我们在详细提示和超大提示的使用中学到的技能，为LLM提供更多上下文，以便帮助它呈现一个令人满意的场景。
- en: We’ll also show how to maintain narrative logic from one scene to the next by
    providing the LLM of what happened before so that it doesn’t write something that
    contradicts the story.
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将展示如何通过提供之前发生的事情的LLM来保持叙事逻辑的一致性，这样它就不会写出与故事相矛盾的内容。
- en: While it’s possible to use iterative prompting to tease all of this into the
    AI, the folks at Future Fiction Academy have figured out an efficient and logical
    way of using special megaprompts called “Scene Briefs” to provide more context
    and structure.
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然可能使用迭代提示来引导所有这些内容进入AI，但未来虚构学院的人已经找到了一种高效且逻辑的方法，使用称为“场景摘要”的特殊大提示，以提供更多上下文和结构。
- en: Here is one example of a scene brief and what it includes.
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个场景摘要的例子以及它包含的内容。
- en: 'Scene type: this could include the genre, such as cozy mystery discovery of
    the body'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 场景类型：这可能包括类型，例如温馨的神秘发现尸体
- en: 'Scene goal: the goal of your POV character'
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: 场景目标：你的POV角色的目标
- en: 'Scene setting: a brief description of the setting'
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 场景设置：对场景的简要描述
- en: 'Scene characters: who’s POV, what each character wants, and why (list them)'
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 场景角色：谁的视角，每个角色想要什么，以及为什么（列出它们）
- en: 'Scene summary: a general description of what’s happening in the scene'
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: 场景概述：场景中发生的一般描述
- en: 'Scene beats: a step-by-step sequence of action that directs what is happening
    throughout the chapter.'
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: 场景节奏：指导章节中发生事件的逐步动作序列。
- en: 'The beats should include:'
  id: totrans-1178
  prefs: []
  type: TYPE_NORMAL
  zh: 应包括以下内容：
- en: 'Setup: (optional, or if you want to start in media res, say so)'
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 前置：（可选的，或者如果你想从媒体中开始，请说明）
- en: 'Inciting Incident for the POV character: something bad or unexpected happens
    (start here if in media res)'
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 触发事件：对POV角色来说发生了一些不好的或意料之外的事情（如果从媒体中开始，从这里开始）
- en: 'Progression of complications for POV character: (try-fail cycles, either emotional
    or physical or both, with opposition, conflict, tension)'
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: POV角色的复杂进展：（尝试-失败循环，无论是情感、身体还是两者兼而有之，与反对、冲突、紧张）
- en: 'Scene crisis: doesn’t have to be big, but it must create conflict for the POV
    character and several options, usually, none good, but of course, if it’s a HEA
    scene, then yes, make it a win'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: 场景危机：不必很大，但必须为POV角色创造冲突和几个选项，通常，没有一个是好的，但当然，如果是一个HEA场景，那么是的，让它成为一个胜利
- en: 'Scene climax or decision: (omit it if you want a cliffhanger, but you need
    to pick it up in the next scene with that POV character)'
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: 场景高潮或决定：（如果你想留下悬念，则省略它，但你需要用那个POV角色的下一个场景来继续）
- en: Scene resolution, showing what changed, usually a reversal for the POV character
    (optional, or hint of what might have changed)
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 场景解决，展示发生了什么变化，通常是POV角色的逆转（可选的，或者暗示可能发生了什么变化）
- en: 'Scene type or style: (is this an action scene or a reaction scene)'
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: 场景类型或风格：（这是动作场景还是反应场景）
- en: 'Writing tips: (guidance to the LLM on the tone, voice, or style)'
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 写作技巧：（对LLM的语气、声音或风格的指导）
- en: 'Any dialogue snippets: (pieces of dialogue you want to put in your characters’
    mouths)'
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 任何对话片段：（你想要放入角色嘴里的对话片段）
- en: This example is off the top of my head, and you can design your scene brief
    in any way that works for you. One method taught by the Future Fiction Academy
    is to ask the LLM what it needs to write a scene. For example, if you are writing
    a cozy mystery, you can ask the LLM what types of scenes occur in a cozy mystery.
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子是即兴想到的，你可以以任何对你有效的方式设计你的场景摘要。未来虚构学院教授的一种方法是询问LLM它需要写一个场景。例如，如果你在写温馨神秘小说，你可以询问LLM在温馨神秘小说中会发生哪些类型的场景。
- en: For example, what does it need in the “Discovery of the Body” scene? Consulting
    books on cozy mystery writing will give you the types of scenes, their goals,
    emotional tenor, usual suspects, etc.
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在“发现尸体”场景中需要什么？咨询温馨神秘写作方面的书籍将给出场景类型、目标、情感基调、常见嫌疑人等。
- en: Let’s ask ChatGPT-4 what it needs to write a “Discovery of the Body” scene.
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们询问ChatGPT-4它需要写一个“发现尸体”场景。
- en: <Response>
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: <响应>
- en: 'To craft a vivid and engaging “Discovery of the Body” scene for your cozy mystery,
    here are some details you might provide:'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 为了制作一个生动有趣的“发现尸体”场景，以下是一些你可能提供的细节：
- en: '1\. Setting Details: Describe the location where the body is found. Is it in
    a quaint village shop, a bustling local fair, a serene garden, or somewhere within
    a grand old mansion? Setting details can help set the tone and mood of the scene.'
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 场景细节：描述发现尸体的地点。是在一个古色古香的村庄商店、一个熙熙攘攘的地方集市、一个宁静的花园，还是在宏伟的老宅内？场景细节可以帮助设定场景的基调与氛围。
- en: '2\. Time and Atmosphere: Specify the time of day and the weather conditions.
    These elements can enhance the mood—whether it’s a sunny, seemingly peaceful morning
    or a foggy, eerie evening.'
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 时间与氛围：指定一天中的时间以及天气状况。这些元素可以增强氛围——无论是阳光明媚、看似平静的早晨，还是雾蒙蒙、令人毛骨悚然的夜晚。
- en: '3\. Character Discovering the Body: Who finds the body? What is their relationship
    to the victim or the community? The character’s personality and initial reaction
    can add depth to the scene.'
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 发现尸体的角色：谁发现了尸体？他们与受害者或社区的关系是什么？角色的个性和初始反应可以为场景增添深度。
- en: '4\. Victim Information: Details about the victim, such as their role in the
    community, their personality, and any known conflicts or relationships that might
    be pertinent to the plot.'
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 受害者信息：关于受害者的详细信息，例如他们在社区中的角色、他们的个性和任何可能与情节相关的已知冲突或关系。
- en: '5\. State of the Crime Scene: Describe how the body is positioned, any signs
    of struggle, or unusual items or symbols present. This helps in setting up initial
    clues and red herrings.'
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 犯罪现场的状态：描述尸体是如何摆放的，是否有挣扎的迹象，或存在不寻常的物品或符号。这有助于设置初始线索和假线索。
- en: '6\. Initial Clues: Mention if there are any immediate clues visible that may
    start to point the sleuth (and readers) in specific directions—like a dropped
    item, a footprint, or a piece of jewelry.'
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 初始线索：提及是否有任何立即可见的线索可能开始引导侦探（和读者）走向特定方向——比如掉落的物品、脚印或珠宝。
- en: '7\. Sleuth’s Role: How does the sleuth come into the picture? Are they stumbling
    upon the scene, called to it, or do they hear about it from someone else?'
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 侦探的角色：侦探是如何进入画面的？他们是偶然发现现场、被召唤到那里，还是从别人那里听说这件事？
- en: '8\. Tone and Style Preferences: Since cozy mysteries typically avoid graphic
    descriptions, let me know how you prefer to handle the discovery. Should it lean
    more towards the emotional impact and mystery, or should it be more factual and
    detached?'
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 语气和风格偏好：由于温馨悬疑通常避免过于血腥的描述，请告诉我你希望如何处理发现。它应该更多地偏向情感影响和神秘，还是应该更加事实性和客观？
- en: Providing these details will help tailor the scene to fit seamlessly into your
    story’s narrative and style, enhancing both the setting and the plot’s unfolding.
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: 提供这些细节将有助于使场景无缝地融入你的故事叙述和风格，增强环境和情节展开。
- en: </Response>
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: </Response>
- en: This is a good start, but I notice no scene beats. Of course, the AI doesn’t
    know the beats, so this is material you have to supply; after all, it’s your story.
    If I were writing the scene (someone tripping over a body), I would add these
    beats, starting from the inciting incident and then walking through the progression
    of complications (perhaps spilling their coffee and ruining the forensics or panicking
    and pulling the fire alarm).
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个好的开始，但我注意到没有场景节奏。当然，AI不知道节奏，所以这是你必须提供的内容；毕竟，这是你的故事。如果我在写场景（有人绊倒尸体），我会添加这些节奏，从引发事件开始，然后逐步展示复杂性的进展（可能是咖啡洒了，破坏了法医证据，或者恐慌中拉响了火警）。
- en: Think of these scene briefs as pseudo-code, a guide using natural language to
    describe what you’re trying to do, what happens here, what happens there, and
    what it means to the protagonist in a structured way that presents it to the LLM.
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些场景简报视为伪代码，它使用自然语言作为指南，以结构化的方式描述你试图做什么，这里发生了什么，那里发生了什么，以及这对主角意味着什么，向LLM呈现。
- en: Here is an example of a scene plan I used for my book, [Not My Barista](https://books2read.com/notmybarista),
    ⁠[1](#c349.xhtml#a3WE) a romantic comedy about an AI billionaire trying to get
    a romance writer to unknowingly fine tune his LLM to write like a human.
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我为我的书《不是我的咖啡师》（[Not My Barista](https://books2read.com/notmybarista)）[1](#c349.xhtml#a3WE)所用的场景计划的一个例子，这是一部关于一个AI亿万富翁试图让一位爱情作家不知不觉地微调他的LLM以写出像人类一样的文字的浪漫喜剧。
- en: '[Scene Plan]'
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: '[场景计划]'
- en: 'Setting:'
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 环境：
- en: Heidi’s garage has become a makeshift band rehearsal space. The atmosphere is
    charged with the creative energy of the Girl Crew, and various musical instruments
    are scattered around. The walls are adorned with posters of rock legends, and
    the air is filled with the scent of creativity and passion.
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: 海迪的车库已成为一个临时乐队排练空间。这里充满了女孩团队的创意能量，各种乐器散落在周围。墙上装饰着摇滚传奇的海报，空气中弥漫着创意和激情的气味。
- en: 'Characters:'
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 角色：
- en: 'Henry: Secret billionaire, posing as a barista, struggling with his growing
    feelings for Gina.'
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利：秘密亿万富翁，伪装成咖啡师，在与吉娜日益增长的感情中挣扎。
- en: 'Gina: NY Times bestselling author, trying out as the lead singer for the Girl
    Crew.'
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 吉娜：纽约时报畅销书作家，尝试成为女孩团队的领唱。
- en: 'Ichiro “Itch the Pitch”: Internet influencer and Heidi’s father, known for
    his keen eye for fashion and branding.'
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 伊仓“痒痒”：互联网影响者，海迪的父亲，以他对时尚和品牌敏锐的洞察力而闻名。
- en: 'Heidi, Wanda, Dixie, Anita: Members of the Girl Crew.'
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 海迪、旺达、迪西、安妮塔：女孩团队成员。
- en: 'Inciting Incident:'
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 引发事件：
- en: Henry observes Gina deeply engrossed in playing ProsePolish, his AI-driven writing
    game, and is impressed by her high scores and the admiration she’s receiving from
    other players on the leaderboard.
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利观察吉娜全神贯注地玩他的AI驱动的写作游戏ProsePolish，对她的高分以及她在排行榜上获得的其他玩家的赞赏印象深刻。
- en: 'Progressive Complications for Henry:'
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利逐渐增加的复杂性：
- en: 'Complimenting Gina: Henry compliments Gina on her impressive scores on ProsePolish,
    but internally, he’s wrestling with the guilt of using her talent to enhance his
    AI, ProsePantry.'
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 赞美吉娜：亨利对吉娜在ProsePolish上的高分表示赞赏，但内心深处，他正在与使用她的才能来增强他的AI，ProsePantry的罪恶感作斗争。
- en: 'Interaction with Itch the Pitch: Ichiro offers Gina fashion advice, suggesting
    a more flamboyant style to match her emerging rockstar persona. Henry notices
    Gina’s discomfort and wonders if he should intervene.'
  id: totrans-1218
  prefs: []
  type: TYPE_NORMAL
  zh: 与Itch的互动：Ichiro为吉娜提供时尚建议，建议她采用更张扬的风格来匹配她新兴的摇滚明星形象。亨利注意到吉娜的不适，并想知道他是否应该介入。
- en: 'Observing Gina’s Authenticity: Henry is captivated by Gina’s authenticity and
    raw talent, which only deepens his internal conflict about deceiving her with
    his true identity.'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 观察吉娜的真实性：亨利被吉娜的真实和天然才华所吸引，这进一步加深了他关于用真实身份欺骗她的内心冲突。
- en: 'Jealousy: Seeing Gina interact closely with other band members and Itch makes
    Henry feel a twinge of jealousy, complicating his emotions further.'
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 嫉妒：看到吉娜与其他乐队成员和Itch亲密互动，亨利感到一丝嫉妒，进一步复杂了他的情绪。
- en: 'Crisis for Henry (Two Bad Choices):'
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利的危机（两个糟糕的选择）：
- en: Henry must decide whether to come clean about his identity and risk losing Gina’s
    trust or continue hiding his true self, which feels increasingly dishonest, especially
    as he watches her pour her heart into the game he created.
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利必须决定是否坦白他的真实身份，冒着失去吉娜信任的风险，或者继续隐藏他的真实自我，这让他感到越来越不诚实，尤其是当他看到她将自己的心投入到他创造的这款游戏中时。
- en: 'Decision Point:'
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 决策点：
- en: Henry chooses to maintain his secret identity, rationalizing that revealing
    the truth at this moment could jeopardize their burgeoning relationship and the
    success of ProsePolish.
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利选择维持他的秘密身份，合理化地认为在这个时候揭露真相可能会危及他们刚刚萌芽的关系和ProsePolish的成功。
- en: 'Climax:'
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: 高潮：
- en: Gina, excited about her leaderboard ranking, shares her joy with Henry, unaware
    of his inner turmoil. This moment heightens Henry’s internal conflict as he’s
    torn between his growing affection for Gina and the deception he’s perpetuating.
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 吉娜对她的排行榜排名感到兴奋，与亨利分享她的喜悦，却不知道他内心的挣扎。这一刻加剧了亨利的内心冲突，因为他被对吉娜日益增长的喜爱和他所进行的欺骗所撕裂。
- en: 'Scene Development:'
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: 场景发展：
- en: Henry tries to engage in light-hearted banter with Gina, complimenting her on
    both her singing and her writing skills. However, his mind is clouded with guilt
    and uncertainty. As Gina interacts with Itch, discussing fashion and branding,
    Henry feels out of place and contemplates the complexities of their relationship.
    The scene reaches its peak when Gina, elated by her success in ProsePolish, seeks
    Henry’s approval, not knowing the truth behind his involvement in the game.
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 亨利试图与吉娜进行轻松的闲聊，称赞她的歌唱和写作技巧。然而，他的心中充满了罪恶感和不确定性。当吉娜与Itch互动，讨论时尚和品牌时，亨利感到格格不入，并思考他们关系的复杂性。当吉娜因在ProsePolish中的成功而兴奋，寻求亨利的认可，却不知道他在这场游戏中的真实角色时，场景达到了高潮。
- en: Henry leaves the garage with mixed feelings. He’s more enchanted by Gina than
    ever, but the weight of his secret looms larger. The scene ends with Henry making
    a silent promise to himself to find the right time to reveal his true identity,
    hoping it will not cost him Gina’s affection.
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: '亨利带着复杂的情绪离开了车库。他对吉娜的迷恋比以往任何时候都要强烈，但他的秘密带来的压力越来越大。场景以亨利对自己默默许下的诺言结束，他承诺要找到合适的时间揭露他的真实身份，希望这不会让他失去吉娜的爱。 '
- en: '[/Scene Plan]'
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: '[/场景计划]'
- en: There are so many scene types that I can’t possibly cover them all. My friend
    J. Thorn has an excellent book called The Scene Archetype Handbook with ChatGPT
    Prompts, which includes seventy-four different scene archetypes, information to
    create the megaprompt for the scene brief, and genre-specific examples using the
    Conflict, Choice, and Consequence framework. He gives you the prompt to inform
    the AI about the type of scene it is writing and fills in the details before asking
    ChatGPT to write the scene.
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 场景类型如此之多，我无法全部涵盖。我的朋友J. Thorn有一本名为《场景原型手册：ChatGPT提示》的优秀书籍，其中包含七十四种不同的场景原型，以及用于创建场景概要的megaprompt信息和使用冲突、选择和后果框架的特定类型示例。他提供了提示，让AI了解它正在编写的场景类型，并在询问ChatGPT编写场景之前填写了细节。
- en: 'The folks at the Future Fiction Academy have a video showing how to use Rexy
    Word Banger to sequence prompts. In this video, Elizabeth Ann West demonstrates
    how to write the scene brief, then write the scene, and then write the next scene.
    Because what was written is in the Big Bang Box, narrative logic consistency is
    maintained since the Big Bang Box is passed into the AI’s context window. The
    video is called: “Master Scene Briefs for Better Stories with AI” ([https://www.youtube.com/watch?v=SCsOvSG4Xc0](https://www.youtube.com/watch?v=SCsOvSG4Xc0))
    ⁠[2](#c349.xhtml#a416)'
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 未来虚构学院的人们有一个视频展示了如何使用Rexy Word Banger来序列化提示。在这个视频中，Elizabeth Ann West演示了如何编写场景简报，然后编写场景，然后编写下一个场景。因为所写的内容在“大爆炸盒子”中，所以叙事逻辑一致性得到了保持，因为“大爆炸盒子”被传递到AI的上下文窗口中。这个视频的标题是：“用AI创作更好的故事，掌握场景简报的技巧”
    ([https://www.youtube.com/watch?v=SCsOvSG4Xc0](https://www.youtube.com/watch?v=SCsOvSG4Xc0))
    [2](#c349.xhtml#a416)
- en: ​[ ​32​ ]​
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: '[32]'
- en: NARRATIVE CONTINUITY
  id: totrans-1234
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 叙事连续性
- en: Since a story is filled with cause-and-effect events, maintaining narrative
    continuity is crucial because it ensures that the plot progresses logically from
    one scene to the next. We human storytellers do it naturally because the story
    is in our minds. An AI assistant, however, has a more difficult time.
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 由于故事充满了因果关系的事件，保持叙事连续性至关重要，因为它确保了情节从一场场景到下一场场景的逻辑推进。我们人类讲故事者会自然地做到这一点，因为故事在我们心中。然而，人工智能助手却面临更大的挑战。
- en: First, it has a limited context window, but more than that, it doesn’t intuitively
    know the relative importance of the material presented to it. For example, a small
    detail, such as a smoking gun, means a lot in a mystery, but if it was only mentioned
    once, the AI assistant, especially one who relies on RAG, might have forgotten
    all about it.
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，它有一个有限的范围窗口，但更重要的是，它并不直观地知道它所呈现材料的相对重要性。例如，一个小的细节，如一支烟枪，在悬疑片中意义重大，但如果它只被提及一次，依赖RAG的人工智能助手可能会完全忘记它。
- en: Therefore, it is up to us to provide the necessary context and guidance to help
    the AI maintain continuity as it writes scene after scene.
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，责任在于我们提供必要的上下文和指导，以帮助AI在写一个场景又一个场景时保持连续性。
- en: One way to maintain narrative continuity is to include a short summary of the
    previous scene in the scene brief. However, this method can sometimes lead to
    the AI repeating information or becoming confused, as it interprets the summary
    and the current scene as closely related.
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 维护叙事连续性的一个方法是在场景简报中包含前一个场景的简要总结。然而，这种方法有时会导致AI重复信息或变得困惑，因为它将总结和当前场景视为密切相关。
- en: A more effective solution is a Prompt Sequence, which allows you to feed the
    AI a series of prompts that build upon each other while maintaining the necessary
    context. By sequencing your prompts, you can guide the AI through the story’s
    progression and ensure that each scene follows logically from the previous one
    without the risk of repetition or confusion.
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更有效的解决方案是提示序列，它允许你向AI提供一系列相互关联的提示，同时保持必要的上下文。通过序列化你的提示，你可以引导AI通过故事的进展，并确保每个场景都逻辑上紧接前一个场景，而不会出现重复或混淆的风险。
- en: Remember that prompt sequencing includes the output of a previous prompt as
    input to a subsequent prompt.
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，提示序列包括将前一个提示的输出作为后续提示的输入。
- en: While prompt sequencing in a chatbot, like ChatGPT and Claude Chat, is possible,
    the most significant disadvantage is “dirty data” inside the context window and
    the fact that you don’t know how far back the chatbot’s context window extends.
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在聊天机器人（如ChatGPT和Claude Chat）中进行提示序列是可能的，但最大的缺点是上下文窗口中的“脏数据”以及你不知道聊天机器人的上下文窗口可以追溯到多远。
- en: Let’s say you wrote the first scene with a chatbot, but you didn’t like everything
    it wrote. You need to change the critical details before writing the second scene.
    Otherwise, the chatbot will believe that those events you didn’t like are part
    of the story.
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你用聊天机器人写了第一场场景，但你并不喜欢它写的所有内容。在写第二场场景之前，你需要改变关键细节。否则，聊天机器人会认为你不喜欢的事件是故事的一部分。
- en: 'However, even if you change the events and put it back in the chat window,
    the original scene it wrote could still be inside the context window. You might
    observe the chatbot stubbornly sticking to the point that you didn’t want to be
    made. You can see this in the example in [Chapter 44: Story Development Using
    ChatGPT](#c305.xhtml). ChatGPT really wanted the villain to be corporate developers
    or outsiders but that takes away from the family feud. It was a struggle to steer
    ChatGPT away from the idea of land developers out to get both families.'
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，即使你更改了事件并将其放回聊天窗口，它最初编写的场景仍然可能存在于上下文窗口中。你可能会观察到聊天机器人固执地坚持你不想被提及的点。你可以在[第44章：使用ChatGPT进行故事发展](#c305.xhtml)的例子中看到这一点。ChatGPT非常希望反派是公司开发者或局外人，但这会削弱家族纷争。引导ChatGPT远离土地开发商想要同时对付两个家族的想法是一场斗争。
- en: Anyway, I digress. If I were really writing that story, I would have worked
    on the scene briefs in more detail and foreshadowed the villain at the town hall
    meeting. That said, I cannot tell the AI about any foreshadowing because, just
    like a kid without filters, the LLM will tell what it knows.
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，我跑题了。如果我真的在写那个故事，我会更详细地处理场景概述，并在市政厅会议上预示反派。话虽如此，我无法告诉AI任何预示，因为就像一个没有过滤器的孩子一样，LLM会说出它所知道的一切。
- en: Hence, we are responsible for giving the AI writing assistant enough details
    of what happened before so it can build from them and hide information from it
    until the time is right.
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们负责向AI写作助手提供足够详细的之前发生的事情的细节，以便它可以从这些细节中构建，并在适当的时候隐藏信息。
- en: MAINTAINING CONTINUITY WITH A CHATBOT
  id: totrans-1246
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 保持与聊天机器人的连续性
- en: If you want to write scenes with a chatbot interface, the best thing to do is
    to start another conversation when you have changed things so that your context
    window is clean. Here are the steps.
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要使用聊天机器人界面编写场景，最好的做法是在更改了事情之后开始另一场对话，以确保你的上下文窗口是干净的。以下是步骤。
- en: 1\. Upload background information, such as Story Information, with everything
    clearly labeled in tags.
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 上传背景信息，如故事信息，并使用标签清晰地标注所有内容。
- en: 2\. Upload a relevant summary of previous events and label it [previous scene],
    [story so far], or [background]. Don’t clutter this megaprompt with everything
    that happened, but only what you need the AI to know to write the current scene.
    This is especially true if you’re working on a mystery or suspense thriller. For
    example, if you had a previous scene from the murderer’s point of view and you’re
    writing the detective, you want to hide information from the detective. In that
    case, you should only include information the detective knows in the [story so
    far] section.
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 上传与之前事件相关的总结，并标注为[前情回顾]、[故事进展]或[背景]。不要在这个大提示中包含所有发生的事情，只需提供AI编写当前场景所需的信息。这一点在处理悬疑或惊悚小说时尤其重要。例如，如果你有一个从凶手视角的前情回顾，而你正在写侦探的故事，你希望隐藏信息不让侦探知道。在这种情况下，你应只包括侦探知道的[故事进展]部分。
- en: Some people wonder if they should include the synopsis or the outline in the
    story information. I personally don’t, but then I don’t really outline either.
    Since I’m a discovery writer, I decide ad hoc what to do with each scene. However,
    even if you do outline, you might only include the outline of what has already
    happened. If you include everything, including the happy ending, some LLMs will
    rush ahead and finish your story in a snap. The AI assistant tends to optimize,
    and therefore, it doesn’t see the reason for not taking what it knows about the
    ending and finishing the story in the first scene.
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人想知道他们是否应该在故事信息中包含摘要或大纲。我个人不这么做，但我也不会真正地做大纲。由于我是一个发现式作家，我会根据每个场景的实际情况来决定如何处理。然而，即使你做了大纲，你也可能只包括已经发生的事件的大纲。如果你包括一切，包括幸福的结局，一些LLM会迅速完成你的故事。AI助手倾向于优化，因此，它看不到不利用它对结局的了解并在第一场景中完成故事的必要性。
- en: 3\. Prompt the chatbot like this.
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 按照以下方式提示聊天机器人。
- en: <Prompt>
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: <Prompt>
- en: I’m going to give you background information to help you write a scene in my
    novel. Please read and understand the [Story Information] and the [Story so far]
    and keep it in mind when you write, but do not write anything until I tell you
    to. {upload or copy and paste in your story information and story so far}.
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: 我将提供背景信息来帮助你写我小说中的一个场景。请阅读并理解[故事信息]和[故事进展]，并在写作时记住它们，但在我告诉你之前不要写任何东西。{上传或复制粘贴你的故事信息和故事进展}。
- en: </Prompt>
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: </Prompt>
- en: Now that you have the information uploaded or copied into the chat, you can
    give your prompt to write the scene using the following [Scene Brief]. Words closer
    to the end of the prompt are more relevant to the LLM, which is why you put the
    Scene Brief last. It focuses on the LLM and tells it, “THIS” is what I want you
    to write.
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经将信息上传或复制到聊天中，你可以给出提示来使用以下[场景简报]写场景。提示末尾的词更接近LLM，这就是为什么你把场景简报放在最后。它专注于LLM，并告诉它，“这是”我想让你写的内容。
- en: Your prompt might look like this.
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示可能看起来像这样。
- en: <Prompt>
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: <提示>
- en: Using the [Story Information] as background material, write the scene described
    in the following [Scene Brief] with narrative logic consistent with [Story So
    Far]. {copy and paste in the scene brief}
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 使用[故事信息]作为背景材料，根据[场景简报]描述的场景，用与[到目前为止的故事]一致的叙事逻辑来写。{复制粘贴场景简报}
- en: </Prompt>
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: </提示>
- en: MAINTAINING CONTINUITY WITH PLAYGROUND
  id: totrans-1260
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Playground中保持连续性
- en: One advantage of using a Playground or developer’s interface is the ability
    to use a System Prompt to keep background information. Another is the control
    of the context window, with the ability to edit the AI’s output, delete both user
    and assistant messages, and prune the context window.
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Playground或开发者界面的一个优点是能够使用系统提示来保持背景信息。另一个优点是控制上下文窗口，能够编辑AI的输出，删除用户和助手消息，并修剪上下文窗口。
- en: 'These advanced techniques were discussed in [Part IV. Advanced LLM Techniques](#c1DG.xhtml)
    as well as in the Future Fiction Academy video series: “How to Prompt AI For Fiction
    Writing!” ([https://www.youtube.com/watch?v=bN1V9pc5TQA](https://www.youtube.com/watch?v=bN1V9pc5TQA))
    ⁠[1](#c349.xhtml#a420)'
  id: totrans-1262
  prefs: []
  type: TYPE_NORMAL
  zh: 这些高级技术已在[第四部分. 高级LLM技术](#c1DG.xhtml)中讨论，以及未来虚构学院视频系列：“如何提示AI进行虚构写作！”([https://www.youtube.com/watch?v=bN1V9pc5TQA](https://www.youtube.com/watch?v=bN1V9pc5TQA))
    [1](#c349.xhtml#a420)
- en: Use a large-context window LLM. Adjust the parameters and dial up the max-length
    to get a decent response size.
  id: totrans-1263
  prefs: []
  type: TYPE_NORMAL
  zh: 使用大上下文窗口的LLM。调整参数并将最大长度调至合适的值以获得合理的响应大小。
- en: 1\. Place [Story Information] in the System Box as background information for
    the LLM.
  id: totrans-1264
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 将[故事信息]放在系统框中作为LLM的背景信息。
- en: '2\. Write the following in the User Box:'
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在用户框中写下以下内容：
- en: Please continue the story we are writing with narrative logic consistent with
    what happened before {paste in summary of story so far}. Now, write the scene
    given in this scene brief {paste in the scene brief}.
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 请用与之前发生的事件一致的叙事逻辑继续我们正在写的这个故事 {粘贴到目前为止的故事摘要}。现在，根据这个场景简报写一个场景 {粘贴场景简报}。
- en: 3\. Read what the AI wrote in the Assistant box and EDIT it.
  id: totrans-1267
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 阅读AI在助手框中写的内容并编辑它。
- en: 4\. Go back and delete the contents of the previous User Box, but leave the
    edited Assistant box in place, labeling it [previous scene].
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 返回并删除上一个用户框的内容，但保留编辑过的助手框，并标记为[上一个场景]。
- en: 5\. Open up a User message BELOW the Assistant box and prompt it for the next
    scene.
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在助手框下方打开一个用户消息并提示它下一个场景。
- en: Please continue the story we are writing with narrative logic consistent with
    what happened before (see above). Now, write the scene given in this scene brief
    {paste in the scene brief}.
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: 请用与之前发生的事件一致的叙事逻辑继续我们正在写的这个故事（见上文）。现在，根据这个场景简报写一个场景 {粘贴场景简报}。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1271
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: Do you see what we’re doing here? We’re trimming the contents of the context
    window as we go so we don’t confuse the AI with irrelevant previous information.
    This is impossible to do with a Chatbot unless we open a new chat window, but
    then we have to copy and paste in the [Story Information], [Writing Style], etc.
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 你看到我们在做什么了吗？我们在逐步修剪上下文窗口的内容，这样我们就不至于用无关的先前信息混淆AI。除非我们打开一个新的聊天窗口，否则这是不可能用聊天机器人做到的，但那样我们就必须复制粘贴[故事信息]、[写作风格]等。
- en: As the story gets longer, you can delete the earlier User and Assistant messages
    and keep only the recent ones that are relevant to the scene you’re working on.
    Meanwhile, your story information and writing style stay in the System box, eliminating
    the need to “remind” the Chatbot every so often.
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 随着故事变长，你可以删除早期的用户和助手消息，只保留与正在工作的场景相关的最近消息。同时，你的故事信息和写作风格保持在系统框中，消除了不时“提醒”聊天机器人的需要。
- en: This is a benefit of using the Playground or a sequencing tool like Rexy.
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在使用Playground或Rexy等序列化工具时的一个好处。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1275
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: Review this video where Steph Pajonas puts in two previous chapters to maintain
    narrative logic consistency. She uses Claude Chat to write, and she does it step
    by step, going through each scene beat. She doesn’t use Scene Briefs here but
    demonstrates narrative continuity by priming the pump with what happened before.
    “AI + MegaPrompts = Fiction MAGIC!” ([https://www.youtube.com/watch?v=ZCyQkzKZ9Jo](https://www.youtube.com/watch?v=ZCyQkzKZ9Jo))
    ⁠[2](#c349.xhtml#a48S)
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 查看这个视频，Steph Pajonas将前两章放入其中以保持叙事逻辑的一致性。她使用Claude Chat进行写作，并一步一步地进行，逐个场景地分析。在这里她没有使用场景简报，而是通过提前引入之前发生的事情来展示叙事连续性。“AI
    + MegaPrompts = 小说魔法！”([https://www.youtube.com/watch?v=ZCyQkzKZ9Jo](https://www.youtube.com/watch?v=ZCyQkzKZ9Jo))
    [2](#c349.xhtml#a48S)
- en: MAINTAINING NARRATIVE CONTINUITY IN REXY WORD BANGER
  id: totrans-1277
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在REXY WORD BANGER中保持叙事连续性
- en: Rexy Word Banger was designed to be a prompt sequencer out of the box. I will
    review the big picture of how it’s done; those interested can check out the videos.
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: Rexy Word Banger被设计成一款开箱即用的提示序列器。我将回顾其整体工作原理；有兴趣的人可以查看相关视频。
- en: 1\. Place your Story Information, Writing Style, and Scene Brief(s) into your
    content management system and label them. Remember that the Big Bang Box is analogous
    to the Assistant Window in Playground. It is the place where the AI puts its response.
    To get it started, paste your Story So Far into the Big Bang Box (or let Rexy
    load it from your content management system).
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 将您的故事信息、写作风格和场景简报（s）放入内容管理系统并标记它们。请记住，大爆炸盒子与Playground中的助手窗口类似。这是AI放置其响应的地方。为了启动它，将到目前为止的故事粘贴到大爆炸盒子中（或让Rexy从您的内容管理系统加载它）。
- en: '3\. Top Prompt: Please read the Story Information, Writing Style, and Story
    So Far for background on the scene we are going to write.'
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 顶级提示：请阅读故事信息、写作风格和到目前为止的故事，以了解我们将要编写的场景背景。
- en: 'Bottom Prompt: Please continue the story we are writing with narrative logic
    consistent with the Story So Far, above. Now, write the scene given in the Scene
    Brief 1.'
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 底部提示：请使用与上述到目前为止的故事一致的叙事逻辑，继续编写我们正在编写的故事。现在，根据场景简报1编写场景。
- en: 4\. Read what the AI put in the Big Bang Box. Edit it in place and label it
    Story So Far.
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 阅读AI放入大爆炸盒子中的内容。就地编辑并标记为到目前为止的故事。
- en: '5\. Top Prompt: Please read the Story Information, Writing Style, and Story
    So Far for background on the scene we are going to write.'
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 顶级提示：请阅读故事信息、写作风格和到目前为止的故事，以了解我们将要编写的场景背景。
- en: 'Bottom Prompt: Please continue the story we are writing with narrative logic
    consistent with the Story So Far, above. Now, write the scene given in the Scene
    Brief 2.'
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 底部提示：请使用与上述到目前为止的故事一致的叙事逻辑，继续编写我们正在编写的故事。现在，根据场景简报2编写场景。
- en: (Continue in this manner as you step through Scene Briefs).
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: （以这种方式继续，您将逐个场景简报进行操作）。
- en: Currently, the content management system is Notion, and the prompts are stored
    in a Notion database. However, even if this is changed, the notion of prompt sequencing
    will be preserved and enhanced. The flexibility of Rexy Word Banger means you
    can chain these prompts together and run them without human intervention if you
    do not wish to edit what the AI gives you. You can also chain prompts to ask the
    AI to edit or enhance its output before moving on.
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，内容管理系统是Notion，提示存储在Notion数据库中。然而，即使这发生了变化，提示序列的概念也将得到保留和增强。Rexy Word Banger的灵活性意味着您可以将这些提示链接起来，并在不希望编辑AI提供的内容的情况下运行它们。您还可以将提示链接起来，要求AI在继续之前编辑或增强其输出。
- en: At any stage, you can trim what’s in the Big Bang box to manage the context
    window, so that if the LLM balks and says it cannot fit more into the context
    window (you’ll get an error message), you can go back and delete what’s no longer
    needed, keeping only the most recent material.
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何阶段，您都可以修剪大爆炸盒子中的内容来管理上下文窗口，这样如果LLM拒绝并说无法将更多内容放入上下文窗口（您将收到错误消息），您可以返回并删除不再需要的内容，只保留最新的材料。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1288
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc4B5.jpg]'
- en: 'It’s best to join the Future Fiction Academy to learn about Rexy. However,
    if you want a sneak peek, Elizabeth Ann West shows how narrative continuity is
    maintained in the Big Bang Box in this video, where she writes a short story in
    10 minutes in this video: “Nanowrimo in a DAY? I Did 10K Words in 10 Mins!!” ([https://www.youtube.com/watch?v=A9lLDiIJ7fw](https://www.youtube.com/watch?v=A9lLDiIJ7fw))
    ⁠[3](#c349.xhtml#a3TW) This video shows how to keep the story consistent by keeping
    all the scenes inside the Big Bang Box, which is sent every time into the prompt.'
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: 最好是加入未来虚构学院来学习关于Rexy的知识。然而，如果你想提前看看，Elizabeth Ann West在这段视频中展示了如何在“大爆炸盒子”中保持叙事连续性，她在视频中用10分钟写了一个短故事：“一天完成纳米小说？我在10分钟内写了1万个单词！！！”([https://www.youtube.com/watch?v=A9lLDiIJ7fw](https://www.youtube.com/watch?v=A9lLDiIJ7fw))
    [3](#c349.xhtml#a3TW)。这个视频展示了如何通过将所有场景都放在“大爆炸盒子”内，每次都发送到提示中，来保持故事的一致性。
- en: ​[ ​33​ ]​
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: '[33]'
- en: TROUBLESHOOTING
  id: totrans-1291
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 故障排除
- en: Here are some common issues writers encounter when using AI to write scenes.
    I’ll summarize them below with tips on troubleshooting and improving the process.
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 当作家使用AI来编写场景时，会遇到一些常见的问题。以下是我对这些问题进行总结，并提供了一些故障排除和改进流程的建议。
- en: 'Problem:'
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: The AI didn’t generate enough words.
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的单词不够多。
- en: I gave enough material, but it seemed to have petered out or stopped writing.
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: 我提供了足够的素材，但它似乎已经逐渐减弱或停止了写作。
- en: 'Consider:'
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑：
- en: Don’t give the AI a conclusion in the scene plan. It might rush to the conclusion,
    like problem solved, we’re all holding hands, and together, we’re determined to
    go forward.
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 不要在场景计划中给AI一个结论。它可能会急于得出结论，比如问题解决，我们都在握手，我们决心一起前进。
- en: Check your briefs for plot progression and make them more granular.
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 检查你的简报中的情节发展，并使其更加细化。
- en: Check the LLMs context window. Use large context window models and dial up your
    max-length parameter to 4000 (assuming you are using Rexy Word Banger or one of
    the Playgrounds that allow parameter tweaking). If you are using the Chat interface,
    you have no control over the “max-length” parameter. Therefore, you cannot override
    a short response no matter how you prompt it. The chat interface is a flat-fee
    service serving many users. If you need finer control, you must go directly to
    the API or use the Playground or developer interfaces.
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 检查LLM的上下文窗口。使用大上下文窗口模型，并将你的最大长度参数调至4000（假设你使用的是Rexy Word Banger或允许参数调整的Playground之一）。如果你使用的是聊天界面，你无法控制“最大长度”参数。因此，无论你如何提示，都无法覆盖简短的回复。聊天界面是一种面向众多用户的固定费用服务。如果你需要更精细的控制，你必须直接访问API或使用Playground或开发者界面。
- en: 'Problem:'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: The AI didn’t follow my scene brief or plan.
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: AI没有遵循我的场景简报或计划。
- en: 'Consider:'
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑：
- en: The temperature might be too high, and the AI might be too creative. Reduce
    it to .7 or .5.
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 温度可能太高，AI可能过于有创意。将其降低到0.7或0.5。
- en: You might have used too many pronouns. Use character names so that AI knows
    who is doing what. Sometimes, it might invent new characters if it can’t figure
    out the actors on the stage.
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能使用了太多的代词。使用角色名字，这样AI就知道谁在做什么。有时，如果它无法确定舞台上的演员，它可能会创造新的角色。
- en: Your scene brief does not have a logical progression. AI writes based on the
    context of the previous words. If you switch topics, locations, or the point of
    view character, it will get confused and continue down the stream of consciousness
    it was pursuing.
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 你的场景简报没有逻辑上的进展。AI根据前文的上下文进行写作。如果你切换了主题、地点或视角角色，它可能会感到困惑并继续它正在追求的意识流。
- en: Separate your scene brief into parts and give more detail. Use a new brief for
    a different point of view or jump to a different location or setting.
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的场景简报分成几个部分，并给出更多细节。为不同的视角或跳转到不同的地点或场景使用新的简报。
- en: 'Problem:'
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: I don’t like the writing style.
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 我不喜欢这种写作风格。
- en: 'Consider:'
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑：
- en: This is tricky because the LLMs will interpret the same style instructions differently.
    Claude 3 Opus, Sonnet, and Haiku are notable examples. They seem to have their
    own personalities. You can give each of them the same style guide and see how
    differently they write from it.
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 这很棘手，因为LLM会对相同的风格指令有不同的解释。Claude 3 Opus、Sonnet和Haiku是值得注意的例子。它们似乎有自己的个性。你可以给它们每个人提供相同的风格指南，看看它们如何从中学到不同的写作风格。
- en: Try feeding a piece of writing you want it to emulate through the LLM and ask
    it to describe the style in a way that a writing assistant can replicate. You
    might have to use different style guides for different LLMs.
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试通过LLM输入你希望它模仿的一段写作，并要求它以一种写作助手可以复制的方式描述这种风格。你可能需要为不同的LLM使用不同的风格指南。
- en: 'Another thing to consider is fine-tuning an LLM to write in your own style.
    You do this by feeding your writing into the fine-tuning system. See [Part VI:
    Personalizing AI for Your Creative Vision](#c1XS.xhtml)'
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: 另一件需要考虑的事情是微调LLM以使用你自己的风格写作。你可以通过将你的写作输入到微调系统中来实现这一点。参见[第六部分：个性化AI以适应你的创意视角](#c1XS.xhtml)
- en: 'Problem:'
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: The AI writing reveals too much or rushes ahead in the scene.
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: AI写作在场景中透露太多或急于前进。
- en: 'Consider:'
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑：
- en: Limit the AI’s need to know in the scene brief. Look at the beats from the reader’s
    point of view as they discover what’s going to happen next. If you want a cliffhanger,
    don’t tell the AI what it is. Say, end in a cliffhanger and see what it comes
    up with. You can always lop off anything you don’t want.
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: 在场景简报中限制AI需要知道的内容。从读者的视角看，看看他们发现接下来会发生什么。如果你想有一个悬念，不要告诉AI它是什么。说，以悬念结束，看看它会想出什么。你可以随时删除你不需要的任何内容。
- en: 'Problem:'
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: The LLM didn’t include something that was in its context window.
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: LLM没有包括其上下文中存在的内容。
- en: 'Consider:'
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑：
- en: Because the LLM is dealing with hundreds of thousands of tokens, a small piece
    of information may not be considered significant. Just by random chance, it would
    have been disregarded in favor of another piece of information. The best way to
    deal with this is to repeat this critical information near the end of the prompt.
    This is why we put general story information at the top, followed by previous
    scenes. The last part of the megaprompt is the current scene brief and the writing
    instructions, such as point of view, present or past tense, and other information
    you must have in your scene.
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: 因为LLM处理的是数十万个标记，一小块信息可能不会被考虑为重要。仅仅通过随机机会，它可能被忽视，以支持另一块信息。处理这种问题的最佳方式是在提示的末尾重复这一关键信息。这就是为什么我们将一般故事信息放在顶部，然后是之前的场景。巨提示的最后部分是当前场景简报和写作指令，例如视角、现在时或过去时，以及其他你必须在场景中拥有的信息。
- en: Another way is to re-roll the prompt. Because the LLM is a random word generator,
    you might get lucky on the next try. You can also use a different LLM or change
    the Temperature or TopP parameters.
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是重新滚动提示。因为LLM是一个随机单词生成器，你可能在下一次尝试时幸运。你也可以使用不同的LLM或更改温度或TopP参数。
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1322
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: Writing with AI is a collaborative process; you are always free to change things
    if you don’t like what it gives you. You can either prompt until it gives you
    what you want or edit or rewrite everything it gave you. You can tweak temperature,
    TopP, or change models. You can gather all the outputs and pick and choose pieces
    you like, or you can riff off what they produced and write it in your own words.
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI写作是一个协作过程；如果你不喜欢它给出的内容，你总是可以自由地更改。你可以提示直到它给出你想要的内容，或者编辑或重写它给出的一切。你可以调整温度、TopP或更改模型。你可以收集所有输出并挑选你喜欢的部分，或者你可以根据它们产生的结果进行创作。
- en: 'There is no wrong way to use AI if you use it ethically with your own prompts,
    story beats, scene briefs, and fine tunes (where AI personalizes its writing style
    based on your writing samples). See [Part VI: Personalizing AI for Your Creative
    Voice](#c1XS.xhtml).'
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你以道德的方式使用AI，并使用你自己的提示、故事转折、场景简报和微调（AI根据你的写作样本个性化其写作风格），就没有使用AI的错误方式。参见[第六部分：个性化AI以适应你的创意声音](#c1XS.xhtml)。
- en: ​[ ​34​ ]​
