  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 但你知道迪伦会受到伤害，即使你认为他理解你为什么这样做。如果迪伦决定他已经受够了，你会怎么反应？
- en: 'MODEL:'
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: The thought of Dillon walking away fills me with dread. I know deep down that
