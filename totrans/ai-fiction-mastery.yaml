  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来我将要做的是上传系列中的所有书籍，询问我可以用于后续书籍的角色，头脑风暴哪种浪漫喜剧最适合他们，并将前书中的一些配角发展成为系列中的未来主角。我想象着为奇幻作家构建世界可能性，为悬疑作家提供犯罪现场细节，以及为科幻作家发明未来技术。
