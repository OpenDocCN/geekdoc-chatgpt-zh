  prefs: []
  type: TYPE_NORMAL
  zh: 第18章：邀请迪伦参加俱乐部：在咖啡馆，万达加入吉娜和海蒂，邀请迪伦参加她们的女子之夜。鉴于她通常对男性公司的厌恶以及她对安妮塔的保护，这似乎与她的一贯性格不符。她的动机可能是为了进一步观察迪伦和他的意图，或者是为了为vlog创造更多戏剧性。
