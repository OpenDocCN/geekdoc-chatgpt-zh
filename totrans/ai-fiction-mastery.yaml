  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个混乱不会容易，但我知道我必须从对自己和周围的人诚实开始。
- en: 'Confronting Eduardo: I need to break off the engagement with Eduardo, regardless
