- en: STEPH PAJONAS, FUTURE FICTION ACADEMY
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Steph Pajonas is a USA Today Bestselling author with over thirty books published
    in multiple genres, including cozy mystery and science fiction romance. She is
    also the founder of the Facebook Group “[AI Writing for Authors](https://www.facebook.com/groups/1978687362337633)”
    ⁠[1](#c349.xhtml#a401) and the [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    (FFA). ⁠[2](#c349.xhtml#a402)
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What inspired you to create the Future Fiction Academy?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: We decided to start the Academy because we saw that the most significant
    barrier to entry for authors into the world of AI was education. People needed
    to learn what these AI/LLMs were and how to use them, and Elizabeth, our other
    founding members, and I felt that we had enough real-world experience with AI
    to teach others how to use it, too.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has the FFA evolved since its inception?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: In the beginning, we felt that we had to cover every single AI subject in
    order for authors to learn this, but we soon realized that authors needed to start
    right away and move through the subject matter slowly. We adapted our teaching
    style to provide smaller segments with actionable tasks so authors could learn
    by doing. We also realized that the FFA Community we built was a key part of the
    appeal to authors. They wanted a place where they could talk about these tools,
    learn them, and not be ostracized for trying them. I’m glad we’ve been able to
    provide that for them!'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are some of the biggest challenges you’ve faced in building and growing
    the FFA community?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Our biggest challenge has definitely been serving a wide array of learning
    styles. We want to make this subject matter accessible for everyone, and I think
    we’ve come close! But in the beginning, it was tough figuring out how to design
    our curriculum so that it served as many people as possible.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are you most proud of in terms of the FFA’s accomplishments and impact
    on the writing community?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I’m super proud when I hear from students that they’ve learned enough skills
    to conquer their work. That we helped them break a lock or unlock a new level
    of skills that they didn’t have before. That really makes all the time and effort
    worth it.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you see AI transforming the landscape of fiction writing in the next
    few years?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I think AI is going to enable new stories to enter the market from voices
    we haven’t been able to hear from yet. I’m very excited about the potential for
    new and exciting worlds that people will create with the aid of AI.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What advice would you give to authors who are apprehensive about incorporating
    AI into their writing process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: What I always tell authors who are apprehensive but curious about adding
    AI to their writing process is to examine their process and determine a pain point
    that they always struggle with. Just one pain point. This is the best place to
    start. Then, use AI to help solve and reduce that pain point until they’re comfortable
    with the tools and what they can do. Once that pain point has been addressed,
    I encourage them to figure out the next natural place to add in AI, something
    that will give them either more free time or reduce the pain in their process.
    From there, each author figures out what works for them the best.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are some of the most popular and effective courses or workshops offered
    by the FFA?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I really like our new standalone classes that teach how AI works, how to
    prompt, and then how to add AI into each part of the writing process. We give
    authors highly actionable tasks and plenty of examples to get them going. [https://futurefictionacademy.com/courses/](https://futurefictionacademy.com/courses/)
    ⁠[3](#c349.xhtml#a43F)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you ensure that the FFA’s resources remain relevant and up-to-date
    with the rapid advancements in AI technology?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: We meet as a team regularly and discuss new and exciting technology that’s
    emerging and could have an impact on our courses or our students. We subscribe
    to many newsletters, podcasts, and YouTube channels that help us stay on the bleeding
    edge. Anything we think that may be worth exploring, we do, and we always share
    our findings with our members.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you envision the FFA community evolving and growing in the future?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I see the community as a place for authors who are serious about adding
    AI into their workflows to get the support they need. We want them to write the
    stories they’ve always wanted to write! And it’s our hope that the community thrives
    and becomes a place for them to find new information, friends, and colleagues.'
  prefs: []
  type: TYPE_NORMAL
- en: Thanks, Steph. This is excellent advice, and I can attest that there’s nothing
    better than being in a vibrant and supportive community. AI is changing so fast
    that no one person can keep up, but the efforts of the FFA, along with its members,
    means that collectively, we can share our findings and experiments and help each
    other thrive as writers in this age of AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find out more about Steph and her writing at:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.spajonas.com/](https://www.spajonas.com/) ⁠[4](#c349.xhtml#a464)
    (Space Opera Romance)'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.stephgennaro.com/](https://www.stephgennaro.com/) ⁠[5](#c349.xhtml#a3YM)
    (Cozy Mysteries in Japan)'
  prefs: []
  type: TYPE_NORMAL
- en: LYNN JORDAN, INDEPENDENT AUTHOR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: As an IT professional, I understood how AI could be useful for nonfiction
    and images. I bought a lifetime subscription to one of the very early ones and
    used it to write articles and promotional material. I heard of people who had
    used it (ChatGPT) to write fiction and at least one product designed for fiction.
    I’d been away from writing fiction for publication for several years. My love
    for technology made me eager to check it out.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I didn’t really have any expectations. I wanted to see what it was all about.
    I also had several story ideas started or in my mind that I hadn’t touched in
    years.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I like to use AI similarly to how I used to use my critique group. It’s
    great for bouncing around ideas and tweaking plots, even at midnight. Critique
    partners are not always so accommodating.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Which AI tools and techniques have you found most beneficial in your workflow?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I like MidJourney for making promotional images for my clients and myself.
    My main go-tos are Open AI’s ChatGPT models and Anthropic’s Claude models. For
    fiction, I like to use Sudowrite or Rexy (from Future Fiction Academy) to actually
    work on the story.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: AI helps me get out of plot holes much faster. As a pantser, I tend to go
    down blind alleys. AI can help me continue the story.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Because I’ve been writing for so many years, I understand my own voice.
    I have no problem with changing anything the AI has generated to my voice.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: There are quite a few misconceptions about AI from people who haven’t tried
    to use it, especially for fiction. First of all, the models are only computer
    programs. They aren’t plagiarizing anything. They have digested millions of books,
    so they know how some words naturally go with other words. I’ve read thousands
    of books, so I’m more likely to plagiarize something unconsciously from what I’ve
    read. A lot of the training material is older writing that is out of fashion today
    (public domain) or poorly written work that could be found with internet searches.
    Baseline AI writing is not great.'
  prefs: []
  type: TYPE_NORMAL
- en: I have a lot of students who attend my writing with AI classes who have very
    mistaken expectations. No tool that uses AI can deliver a book with one button
    push. It takes a lot of effort and writing skill to get decent prose when assisted
    by AI. Using AI can help you write faster, but it isn’t ‘sit back and let the
    AI write a book.’ The AI models make most of the same mistakes that beginning
    writers make. The human senior partner needs to have the skill and knowledge to
    produce a book (or article) that will please readers.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you envision the future of AI in fiction writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I think AI will become an accepted writing tool such as typewriters, computers,
    spell and grammar checkers, and other writing aids.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Don’t be afraid to try it. Depending on your learning style, you can start
    with the online models and just ask questions. There are lots of free resources
    that will help you get started. YouTube is full of videos ranging from beginning
    lessons to advanced strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI helped you with world-building, character development, or plot
    structuring within your chosen genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I write in several genres, so AI has really helped me with real-world things
    that I don’t know (which government agencies handle arms dealing), and also, things
    that I’m making up in my paranormal worlds.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Because I’m such a techie, I’m trying to limit my tools without a lot of
    success. My writing tools are mainly ChatGPT and Claude, either directly or by
    using Sudowrite or Rexy as a front-end. MidJourney and DALL-E are great for images.
    (I know and use others, but I mostly use those.) I love AI voice products and
    use several of them to promote and edit videos. I also like to make pictures of
    characters and make them talk for promotions for my clients and me. My favorite
    tool for this is Studio.d-ID. I can waste far too much time playing (I mean diligently
    working) in there.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you use AI to ensure your stories align with the expectations and
    conventions of your genre while also maintaining originality?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I make sure my work has my voice. I’m familiar with the conventions of the
    genres I write in. Sometimes, I have to keep reminding the LLMs of those conventions.
    The LLMs are good at providing some surprising twists, but this may be because
    they aren’t as familiar with genre conventions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Has AI helped you explore new possibilities or subvert traditional tropes
    within your genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: The first book I completed with AI assistance was in a genre I had never
    written. I read in that genre but never thought to write it. Sudowrite needed
    a teacher for that genre, so I thought, why not? One book in the planning stage
    right now has to do with a motorcycle club. Never in my life would I have planned
    to write that.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI impacted your productivity and the speed of your writing process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: AI helps me write faster. As a pantser, I have thrown away a lot of prose.
    AI keeps me on track a little better, but I don’t mind tossing words since I can
    write faster now.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Do you have any concerns about the ethical implications of using AI for
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: No, I don’t. I’ve been around the publishing industry for more years than
    a lot of authors have been alive. I was teaching writers how to use computers
    to assist their writing when the first home computers became available (before
    IBM released their PC). At the time, some writers said they would never use a
    computer to write because it was cheating. Later, some of those same writers came
    to me to ask what word-processing program I used. I was around when Indie and
    small presses upended traditional publishing. AI is the next step in the evolution
    of writing tools.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: AI is helping me get back into fiction writing. I had given that up for
    non-fiction and promoting other people’s novels. AI has made writing fun again.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s for sure! And having fun is the best way to write or do anything in life.
    Thanks, Lynn, for sharing your insights with us.
  prefs: []
  type: TYPE_NORMAL
- en: You can learn more about Lynn on her YouTube channel. ([https://www.youtube.com/@LynnJordan](https://www.youtube.com/@LynnJordan))
    ⁠[6](#c349.xhtml#a43D)
  prefs: []
  type: TYPE_NORMAL
- en: KEYLA DAMAER, INDEPENDENT AUTHOR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My pen name is Keyla Damaer. I mainly write dystopian sci-fi, but I have recently
    published sci-fi horror stories. Thanks to AI, I also ventured into fantasy.
  prefs: []
  type: TYPE_NORMAL
- en: My dystopian sci-fi series is the Sehnsucht Series. Book 1 is available at all
    major retailers and my store [https://shop.keyladamaer.com](https://shop.keyladamaer.com)
    ⁠[7](#c349.xhtml#a3Y3)
  prefs: []
  type: TYPE_NORMAL
- en: You can find everything else about me at [https://keyladamaer.com](https://keyladamaer.com)
    ⁠[8](#c349.xhtml#a485)
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Last August, I needed to fix some minor developmental issues of the novel
    I’m about to publish, and I discovered how helpful AI could be in brainstorming.
    As artists, we often work by ourselves. That can be an asset but also detrimental
    when no one can answer our questions. AI is the companion I’ve always craved,
    and not it’s here.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Expectations, I had none. I didn’t think AI could be helpful until I started
    asking the right questions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As for concerns, of course, I have them. Like all revolutions in technology,
    AI will be a blast stronger than the previous ones. People will lose jobs to it,
    even though new careers will be created. AI can be easily used for foul intentions,
    but that’s the case for many things in life: words, guns, and atoms. If people
    want to do harm, only the law and the right application of the law can stop them.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I’ve always been a slow writer. My first novel came out in 2020 in its second
    edition. I published the second and the third books in 2022 and 2023, but they
    were anthologies of short stories. My second novel will be out this year, and
    I’m already wiring the third one in the series. AI helps me with ideas and even
    with exposition, considering that English isn’t my first language. I don’t use
    it to translate chunks of prose, but it’s so helpful when I’m in doubt about things
    that can be lost in translation.'
  prefs: []
  type: TYPE_NORMAL
- en: The bottom line is that I’m faster, and I can work on multiple projects at the
    same time, which is something I couldn’t do before.
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Which AI tools and techniques have you found most beneficial in your workflow?'
  prefs: []
  type: TYPE_NORMAL
- en: I used AI for audio, to create some covers of short stories, to edit, to brainstorm,
    and even to write. I still pay a human editor and a human artist for my major
    projects, but AI is just terrific. I can send cleaner drafts to my editor, and
    concepts of what I’d like to see on my covers to my cover artist.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: For the novel I will publish this year, I needed to write a fight scene
    between two soldiers and the aftermath. A knife was involved, and I needed to
    know the name of a specific part of the knife. With Google search, it would have
    taken me a lot of time to find what I needed. With AI, it was a matter of seconds.
    Of course, I checked it wasn’t lying to me, and that took me another bunch of
    seconds up to a minute. For some research, I used to spend weeks. Now, it’s a
    matter of minutes or hours if it’s something rather complex.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I edit the crap out of the AI text. AI is repetitive and boring. Some people
    use fine-tuning, but I’m not at that level yet. I never had time to invest in
    learning that technique. It would probably save me time afterward, but for now,
    I’m procrastinating. If there were an easy guide on how to fine-tune, I’d probably
    get to it.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: People tend to say AI can write a book by pushing a button, and this will
    ruin the market, but then they say the outcome is mediocre, to say the least.
    Either AI can create a book by pushing a button, or it can’t. And trust me, it
    can’t. Perhaps it will one day, but we’re far from there. Companies investing
    in AI are interested more in a scientific approach than in a literal one because
    AI could make life easier and better for all of us if used properly. Think about
    the health system and our health in general. I doubt investments in creating perfect
    prose are in the minds of many AI developers. It’s also a matter of money. Health
    pays back more than art. It’s sad, but it’s true.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Try it. AI is a tool like any other. It won’t bite you.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI helped you with world-building, character development, or plot
    structuring within your chosen genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I write sci-fi, and AI is obviously a blast with it. For my third book,
    I moved the crew of a ship to another galaxy. On the planet where the story takes
    place, there are aliens. Aside from needing a description of the creatures, I
    brainstormed with AI about their past and how to explain something in the present
    that I needed to be in a certain way. Together, we created a new species, of which
    I had only a vague idea at first.'
  prefs: []
  type: TYPE_NORMAL
- en: Regarding plot structuring, I’ve always thought I was a plotter, but it turns
    out I’m more of a pantser, and that’s something that has slowed me down in my
    writing in the past.
  prefs: []
  type: TYPE_NORMAL
- en: Last autumn, I wanted to write a short story to distribute for free to my subscribers.
    For the first time, I wrote an outline and refined it with AI. We brainstormed
    every aspect of the story and then wrote it together.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I’ve been told I’m a weaver, an advanced weaver, to be precise, which means
    I don’t care about the tool as long as it serves the purpose of a project. For
    economic reasons, I don’t intend to add another monthly subscription to my costs;
    therefore, I will stick to free AI to write and create art.'
  prefs: []
  type: TYPE_NORMAL
- en: Since last August, I have used Chat GPT3, 3.5, and NovelCrafter during its trial
    window—I discovered OpenRouter thanks to it—Gemini Advanced only for the trial
    period, and now I’m using Gemini 1,5 pro because it’s free and it has a 1M token
    window. I have to activate a VPN to access it because it’s not available in my
    country. I have a feeling that Google is scared of GDPR because many of its services
    aren’t available in Europe. This scares me a bit, but Google already has all my
    files through my subscription to Google One, so what else can they get they don’t
    already have? The Big Brother has been here for many years.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t use any specific technique. Like I said, I’d like to learn fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI impacted your productivity and the speed of your writing process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Since last August, I concluded a novel, and started a new one. I published
    one short story, edited two short stories that needed dev editing, and wrote three
    short stories from zero. I’m faster, and beta readers didn’t notice a drop in
    quality. As an experiment, I didn’t disclose AI involvement to all beta readers.
    Comments were always positive.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Do you have any concerns about the ethical implications of using AI for
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Of course I do. I believe the way AI was trained before it came out is immoral,
    and artists whose material was used should be compensated. But I, to be honest,
    I don’t have faith in the system. Artists won’t be paid because this would cost
    too much to companies like OpenAI, Microsoft, and Google. It’s not right, but
    AI is needed for the greater good, and no one will have the courage to damage
    these companies to compensate artists economically. It’s one of those cases where
    the needs of the many outweigh the needs of the few. I’m not saying it’s fair,
    but few things in life are. I hope to be wrong.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I can see AI as my forever collaborator, and the only idea makes me smile
    wide.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Will AI be able to replace all authors in the future?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: That’s possible, but there’s nothing I can do to put the genie back in the
    bottle. It’s here, and I prefer to have it on my side.'
  prefs: []
  type: TYPE_NORMAL
- en: CLARE CHU, INDEPENDENT AUTHOR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I am another pen name for Rachelle Ayala, so my answers will be for both Rachelle
    and Clare. While Rachelle started writing in 2010, well before ChatGPT, I used
    AI from the get-go to write zany and quirky books, such as the Misguided Guides
    series with titles like [Why Your Cat is Plotting to Kill You](https://books2read.com/whyyourcatisplottingtokillyou)
    (FREE)⁠[9](#c349.xhtml#a3V8), [Swiping Wrong: Online Dating for Zeroes](https://books2read.com/swipingwrong)⁠[10](#c349.xhtml#a3VA),
    and [Sit, Stay, Heel: Training Your Boyfriend Like a Pro](https://books2read.com/sitstayheel)⁠[11](#c349.xhtml#a3VB).'
  prefs: []
  type: TYPE_NORMAL
- en: You can find out about me at [https://clarechu.com](https://clarechu.com) ⁠[12](#c349.xhtml#a3XG)
    and Rachelle at [https://rachelleayala.net](https://rachelleayala.net) ⁠[13](#c349.xhtml#a3XH)
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: No one could miss the big splash ChatGPT made in late November, but Rachelle
    was on a deadline, so she ignored the news while writing over the holidays. Then,
    in January 2023, anti-AI authors made a big stink on one of the groups, and she
    got curious. She found Elizabeth Ann West’s Gumroad courses and charged ahead.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Neither of us had any. I’m a tech babe from the 1970s, and I’ve always been
    at the forefront in computing: parallel processing in the 80s, neural networks
    in the ‘90s, and internet, web-based network management, wireless, and virtual
    servers in the 2000s before retiring from tech and writing romances. It’s probably
    not wise to charge ahead before doing something, but my focus has always been,
    wouldn’t it be cool if we could … rather than should we …?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I added a brainstorming partner (actually many by now) who would chat with
    me any time of the day or night. I’m still focused on writing great stories and
    coming up with my own ideas. I’ve also discovered that I’m competitive with AI,
    so if they give me five lame ideas, I’ll go back with something they didn’t think
    of. Then they’re always so affirming and agreeing that my idea was better and
    list all the ways it can work.'
  prefs: []
  type: TYPE_NORMAL
- en: Clare here. I also bounce things off them and ask for improvements, but I don’t
    take their suggestions as much because “I know better.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Which AI tools and techniques have you found most beneficial in your workflow?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Hands down, it’s Future Fiction Academy’s Rexy Word Banger. No other tool
    allows you to “program” your writing by sequencing prompts, using “variables”
    in the form of Notion slots, and including a smorgasbord of LLMs with the ability
    to tune parameters for each prompt. I generated Why Your Cat is Plotting to Kill
    You and published it in three hours start to finish. I brainstormed with Claude
    and ChatGPT 4\. I used ChatGPT 4 to write the scene briefs, and then I plugged
    everything into Rexy Word Banger and generated the prose. I edited it and published
    it with a cover made with Midjourney. All this was done the night before I had
    to get on an airplane and I couldn’t sleep.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Not really. I have to think my own way out of the dastardly blind alleys
    I get into that always seems to happen about two-thirds of the way. AI’s ideas
    usually give me what not to do, so that is helpful. The reason I don’t do what
    they suggest is that they tend to go in a straight line to the solution, which
    lacks conflict. I mean, if my heroine could just sit down and talk about it over
    a cup of tea, everything would be okay, right? Not.'
  prefs: []
  type: TYPE_NORMAL
- en: Clare here. AI definitely helps me with my humor books because it gives me many
    undesired outcomes, and that works for my misguided guidebooks, which are not
    supposed to work. Cue evil laugh.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I don’t worry about it because I edit everything. However, now that we have
    many LLM choices and the ability to fine-tune the GPT models, I generate several
    versions, pick and choose, and rewrite everything.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Get a free account and start chatting. AI is coming to you anyway, so you’ll
    see it popping up in your search engines, word processors, and grammar-checking
    tools. You’re already using AI without knowing about it. Wouldn’t it be better
    to see what it can do for you?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI helped you with world-building, character development, or plot
    structuring within your chosen genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Clare here. AI does great with short nonfiction that doesn’t have to be
    “correct.” That’s my humorous, misguided self-help books. We can go off on the
    craziest tangents. After all, when writing about time travel or supervillain success
    secrets, anything goes. I don’t have to fact-check, and I love it when AI hallucinates
    because exploring rabbit holes and going on wild goose chases are what my self-nonhelp
    genre is all about.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rachelle: That was not helpful. She wants to know about storytelling not goof-off
    books. You’re supposed to say that AI can draw insights from its vast training
    and⁠—'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clare: Ahem, I’m the one being interviewed since I’m a pure-AI author??? You
    wrote 89 pre-AI books—that’s like pre-history if you ask me.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Moving on … How has AI impacted your productivity and the speed of your
    writing process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: It has actually slowed down my book releases. In 2015, I wrote and published
    14 books, in 2016, 12, but last year, with AI, I only had 9.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clare: What are you talking about? I used AI and published 6 misguided guidebooks
    in a month.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rachelle: Those are not serious writing and less than a hundred pages each.
    I have to worry about story, conflict, emotions, character arc … and facts, don’t
    forget facts and series consistency.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clare: Hey. You took over MY interview. AI makes my genre possible, from inspiration
    to cover art. Not my fault if writing romances and AI writing books take too much
    time while you put me and my supervillain success secrets on the back burner …'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Ahem. Do you have any concerns about the ethical implications of using AI
    for writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Sure we do. Using AI in itself is not unethical just like using banks are
    not unethical. Uh, I believe you meant robbing banks is unethical. Yes, stop cutting
    in. I’m saying copying and pasting other people’s work into your prompt is no
    bueno. Agree. But what about all of those prompt books? You know what I’m talking
    about. Prompt book authors are selling prompts for you to copy and paste. I’m
    talking about people’s prose, even if it’s for analysis. If the author in question
    is sitting by you, would you do it? If not, then don’t do it.'
  prefs: []
  type: TYPE_NORMAL
- en: What about all the stuff that was scraped off the internet? I think people post
    stuff on the internet because they wanted people to read their stuff. Doesn’t
    mean it isn’t copyrighted. Then it’s fair use. Just because AI is smarter than
    the average bear doesn’t mean it’s wrong. Sure, sure, but aren’t you the least
    bit scared that we might all turn out to be pets of our AI overlords someday?
    You know, begging for treats while everything they do goes over our heads? What
    does that have to do with scraping the internet? Unintended consequences. I’m
    sure those guys who donated sperm thirty years ago had no intention of being tracked
    down⁠—
  prefs: []
  type: TYPE_NORMAL
- en: 'Interviewer: Last question. How do you see the role of AI evolving in the future
    of your writing career?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clare: What future? Rachelle’s hogging up my brain cycles when I could be dancing
    with Sexy Rexy. I’m going to plot revenge. Maybe a self-help guide on shutting
    up your other personality is due.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rachelle: You know, for a pen name, you’re awfully annoying.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clare: At least I have a social security number. You, my dear, are nothing
    but a figment of my imagination. Shall I pull the plug?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Interviewer: Thanks, ladies. That was … insightful. Do you have any AI writing
    samples you’d like to share?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clare: Me, me, me! Please see [Chapter 45: Scene from Sit, Stay, Heel: Training
    Your Boyfriend Like A Pro](#c31F.xhtml)'
  prefs: []
  type: TYPE_NORMAL
- en: AMY SIMONE, K.L. BORDEAUX, INDEPENDENT AUTHOR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Amy Simone is one pen name [www.theuptownwriter.com](https://www.theuptownwriter.com)
    ⁠[14](#c349.xhtml#a41A)
  prefs: []
  type: TYPE_NORMAL
- en: K. L Bordeaux is my other multi-genre pen name.
  prefs: []
  type: TYPE_NORMAL
- en: At last count, I had 22 books published, five with AI. Prior to publishing those
    22, I had written four others six months before my first published book. I did
    journalism for about 30 years before that.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How did you first discover the potential of AI for fiction writing? A: Joanna
    Penn’s podcasts led me to Sudowrite in Nov. 2022.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: It felt like a playground or candy store. I was so happy to realize that
    all things seemed possible. I felt much better once I realized that plagiarism
    was not really possible due to the randomness of the token/next word selection
    by the AI. I was informed about all that via the Future Fiction Academy in May
    2023.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: It’s made me much more focused on structure. I initially thought I’d be
    zipping through books (creating them faster), but no, in fact, it’s become the
    opposite in many ways.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I use my own fine tunes PLUS copious editing of AI content. Sometimes, I
    have to toss about 75% of AI-generated material.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: The claim that it is full of plagiarism. Not true.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you envision the future of AI in fiction writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: More ease; more of my own voice carrying through. I would also like to see
    tools developed that escalate the conflict or show writers how to do that in their
    stories. Also, a purging of the circular nature (looping) that AI can sometimes
    do.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I know I COULD blithely say, “C’mon in, the water’s fine,” but that’s a
    disservice to folks who’ve never dabbled in using AI. I think if they just played
    with any of the chat features and winged it and asked any questions about it,
    no matter how wild, they’d be as delighted as I was.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Role-playing: telling the AI to “act as if” it was so-and-so and how so-and-so
    would handle a certain situation/conflict.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: AI is making me a better storyteller, giving me the ability to set stories
    in places/ways I’d never dreamed of before. For example, I could so easily set
    a story on another planet and build an entire world in a matter of minutes using
    AI. Something like that might have taken me months pre-AI.'
  prefs: []
  type: TYPE_NORMAL
- en: DANICA FAVORITE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Website: [https://danicafavorite.com/](https://danicafavorite.com/) ⁠[15](#c349.xhtml#a3US)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How did you first discover the potential of AI for fiction writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I had seen authors talking about it online, and because I’d already been
    using it for marketing purposes, I was curious about the potential.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What were your initial expectations and concerns about using AI in your
    creative process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I wondered about copyright and legalities, and what was okay to use. I was
    also concerned about the quality of AI output. Because I had been using it for
    marketing copy, I knew it would require substantial edits, so I wasn’t sure if
    it would be a useful tool for fiction. Since then, I have taken the time to educate
    myself on all of these issues, and I feel very comfortable using AI in my writing
    process.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI changed your approach to writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Absolutely! I think the authors who are afraid of AI taking over need to
    do some digging into using AI themselves, because the biggest thing I’ve learned
    is that I’m a great writer and storyteller. Without human intervention, AI can’t
    tell a good story. Analyzing the various AI outputs has taught me that I know
    a LOT about writing and what goes into a good story. In a lot of ways, it’s taught
    me more about story structure, because I’ve had to learn how to explain it, and
    what I need to do to better hit the mark. I’m now more aware of making sure my
    story structure is sound, and I think that is because of how much evaluating I’ve
    had to do.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Which AI tools and techniques have you found most beneficial in your workflow?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I’m still a big fan of Chat GPT. I have played with other models, and I’m
    starting to really love Google’s Gemini, because of how seamlessly it has worked
    into my dictation process. Dictation has been my primary method for writing for
    at least seven years now, so using AI for transcription and transcription cleanup
    has been really important to me. Before Chat GPT, I used Dragon Dictation, which
    was okay, but required a lot of manual work on my part. Chat GPT was a great addition
    for cleanup, but now that Gemini is integrated right into my phone, it’s a total
    game changer and a seamless process. I also use Chat GPT daily for a lot of menial
    tasks, like writing marketing copy, brainstorming, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Can you share an example of how AI has helped you overcome a specific writing
    challenge or achieve a desired outcome in your story?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I tend to use a lot of repetition. Sometimes on purpose, sometimes on accident.
    I use AI a lot to look at where I’m repeating myself, and then to give suggestions
    on alternate ways I can word things. I no longer spend hours (literally! UGH!)
    staring at the computer screen, trying to figure out how I can reword a paragraph
    that uses the same phrase over and over. I pop it into Chat GPT, and ask for some
    options. Sometimes I don’t even like the options I’m given, but having a bunch
    of fresh ideas makes me think of what I need to do to make the piece better.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you maintain your own voice and style while utilizing AI assistance?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I always start with my own writing. I LIKE my own writing, and I like the
    process of creating it. So, since I start there, I think keeping my own voice
    is a lot easier. And, because I AM a good writer, I can look at AI suggestions
    and analyze, okay, is this what I want? Does this still sound like me? In one
    example where I was teaching people about using AI, I showed them where the AI
    changes made my small town hero sound really highbrow. Because I understand the
    needs of my story, I knew it wasn’t going to work. And again, that’s where we
    as humans are always going to be needed in the creative process. AI doesn’t know
    that a small town cowboy isn’t going to use a lot of big fancy words. Unless,
    of course, that is true to the character, but in most cases, things like that
    are what you need to look for and change.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What are the biggest misconceptions you’ve encountered about AI-assisted
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I could write a book on this! So could you! The biggest one is that it’s
    stealing other authors’ work. AI does not work that way. It’s not going to lift
    pages, or even lines, of text from someone else’s work, unless you force it to
    do that, just like if you copy from someone else’s book manually. What we call
    AI is really just predictive text like when you play those fill in the blank games.
    It’s slightly more sophisticated than that, but really, when you’re asking it
    to write a sentence or paragraph, all it’s doing is thumbing through its metaphorical
    dictionary and putting words that make sense together. The other misconception
    that I want people to understand is that using AI isn’t lazy and it doesn’t mean
    you don’t know how to write. I spoke about this a little bit before, but it bears
    repeating. If you don’t know how to write a compelling story, and what elements
    are needed for your genre, any AI output you get is not going to be good quality.
    There’s also a pretty steep learning curve to get AI to do the work you want it
    to do. Again, in order to make it do those things, it’s going to take a lot of
    effort on the part of the author. However, using AI can make you more efficient
    in the tasks you struggle with so that you can better utilize the writing time
    you have on the parts of writing you really love.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you envision the future of AI in fiction writing and storytelling?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I think it’s going to become a natural part of most writers’ processes.
    It’s never going to replace the writer, but I think we’re going to see it being
    included more and more.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: What advice would you give to authors who are curious about using AI but
    hesitant to take the first step?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: There is a learning curve, so be patient. I’ve seen a lot of authors smugly
    state that they tried to get Chat GPT to write something for them, and it was
    garbage, so AI is a passing fad. Um, no. They just didn’t know how to prompt it
    correctly to get the desired output. It takes time to learn the different models,
    and every model behaves differently. I mentioned that I use Chat GPT a lot, and
    in my opinion, it’s the easiest and most flexible for someone just starting out.
    So start there, learn the basics, and then you can see what works best with your
    process.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Are there any specific AI tools or techniques that you find particularly
    helpful for writing in your genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: The biggest technique that I find helpful for anything I write is to be
    willing to ask questions of the AI, and treat it like a conversation. If I’m not
    getting the results I want, then I ask it HOW to get the results I want or why
    it gave me those results. One of the things I’m loving about Gemini right now
    is that when I ask it to rewrite something for me, not only does it give me a
    rewrite, but it also tells me the logic it used to come up with that rewrite,
    as well as things I might think about when considering those changes.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you use AI to ensure your stories align with the expectations and
    conventions of your genre while also maintaining originality?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Ask it to do the research. A year ago, I would not have made this suggestion,
    but with the advances in the LLM models, you can easily ask it about the expectations
    and conventions of the genre, and it will give you pretty good answers. Then you
    can feed it some of your stuff to see if it hits the mark. And then … hahaha …
    this is where your humanness needs to step in, you get to evaluate those responses
    to make sure they’re correct.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Has AI helped you explore new possibilities or subvert traditional tropes
    within your genre?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: I have not used it for this … yet. I am looking at writing under a new pen
    name for funsies, and it’s definitely a twisted trope. I have not been satisfied
    with the results it’s given, but I also have not tried very hard.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How has AI impacted your productivity and the speed of your writing process?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: That’s a double-edged sword. I’ve been LESS productive in the sense that
    I’m having so much fun playing that I’m not getting as much done. But, I also
    recognize that play time is learning time, so even though I don’t have published
    words to show for it, I AM moving forward because I understand how the LLMs work
    better. It has definitely made more more productive in writing marketing copy,
    both for my day job, and for the books I write, because I’m not staring at a blank
    screen for hours. And, it’s made my transcription process sooo much faster and
    more efficient.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: Do you have any concerns about the ethical implications of using AI for
    writing?'
  prefs: []
  type: TYPE_NORMAL
- en: Yes and no. Yes, because I can see where people can abuse it and do things like
    plagiarize. Once again, I want to state that AI cannot plagiarize unless you explicitly
    ask it to. But that’s where I come to where I said I am not concerned about the
    ethical implications of using AI for writing. There are always going to be bad
    actors. If we focus all our attention on stopping the bad actors, we’ll never
    have time to focus on our writing. Instead, I want to focus on who is doing it
    well, and learning from them, so that we as a community are growing with AI and
    aren’t afraid to use it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q: How do you see the role of AI evolving in the future of your writing career?'
  prefs: []
  type: TYPE_NORMAL
- en: 'A: It’s going to be a much more integrated part of my process. It’s already
    there, but I’m always looking at how and where I can improve.'
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​PART 9​ ]​
