- en: MEET RACHELLE
  id: totrans-2487
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 见拉谢尔
- en: Rachelle Ayala is a USA Today bestselling author of dramatic romantic suspense
    and humorous contemporary romances. She is the winner of multiple awards, including
    the 2015 Angie Ovation Award for best Multicultural Romance with Knowing Vera,
    the 2015 Readers’ Favorite Gold Award for A Father for Christmas, the 2016 Readers’
    Favorite Gold Award for Christmas Stray, the 2016 Readers’ Favorite Finalist for
    A Pet for Christmas, and the 2017 Readers’ Favorite Gold Award for Playing for
    the Save.
  id: totrans-2488
  prefs: []
  type: TYPE_NORMAL
  zh: 拉谢尔·阿亚拉是《今日美国》畅销书作家，擅长戏剧性浪漫悬疑和幽默当代浪漫小说。她是多项奖项的获得者，包括2015年Angie Ovation Award最佳多元文化浪漫奖（凭借《认识维拉》），2015年Readers’
    Favorite Gold Award（凭借《圣诞父亲》），2016年Readers’ Favorite Gold Award（凭借《圣诞流浪者》），2016年Readers’
    Favorite Finalist（凭借《圣诞宠物》），以及2017年Readers’ Favorite Gold Award（凭借《为拯救而战》）。
- en: She is also a nonfiction author of writing books and founder of the Romance
    In A Month method.
  id: totrans-2489
  prefs: []
  type: TYPE_NORMAL
  zh: 她还是一位非虚构类写作书籍的作家，也是“浪漫一个月”方法的创始人。
