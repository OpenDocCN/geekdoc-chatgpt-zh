- en: DESCRIPTION
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Dear writers, it’s been a light year since ChatGPT introduced artificial intelligence
    into the world of writing. And oh, what a year it has been. By now, you’ve probably
    tried using AI to brainstorm premises, write marketing copy, develop characters,
    and build worlds.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc4B5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Do you wish to do more?
  prefs: []
  type: TYPE_NORMAL
- en: Are you curious about what you can do beyond using ChatGPT?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ready to learn how to customize AI to your own writing?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Wondering how to keep up with the pace of AI?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fear not. I’m Rachelle Ayala, a USA Today Bestselling author and AI trailblazer.
    I’m here to equip you with the knowledge and techniques to unlock the powers of
    artificial intelligence and power up your storytelling.
  prefs: []
  type: TYPE_NORMAL
- en: 'Reading AI Fiction Mastery will help you:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Understand Generative AI: Learn how large language models like ChatGPT work
    and how to customize them to do what you want.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Master Prompt Engineering and Design: Discover how to use advanced prompting
    techniques to communicate your vision and elicit useful responses from AI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Invigorate Your Storytelling Process: Understand and apply AI to every stage,
    from ideation and premise generation to plotting and drafting scenes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Gain a Second or Third Set of Eyes: Leverage AI’s abilities to critique and
    ask questions about your work in progress, act as a reader, and give actionable
    feedback.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Write Story Scenes with AI: Explore advanced techniques like generating scene
    briefs, megaprompting, and prompt sequencing to write first-draft prose requiring
    minimal edits.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fine-Tune for Your Voice: Uncover the secrets of fine-tuning AI models to match
    your unique writing style.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Build Your AI-Enabled Second Brain: Discover how to utilize AI as a powerful
    tool for organizing your story world, tracking plot threads, and ensuring consistency
    across your story and even across your entire series.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Stay Ahead of the Curve: Gain insights into the latest AI advancements by joining
    other enthusiastic AI writers who share their breakthrough methods. This includes
    interviews with the founders of Future Fiction Academy and other independent authors
    to give you a glimpse into their writing process and let you know what’s possible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Fiction Mastery is a hands-on guide with links to reference material, YouTube
    videos, and my own examples, including two fine-tunes with instructions on how
    to create them, example prompts, and a ChatGPT conversation. I go beyond the basics,
    layering prompts and using templates to offer you a springboard to designing your
    own prompts and processes with AI tools like ChatGPT, Claude, Gemini, and more.
  prefs: []
  type: TYPE_NORMAL
- en: AI Fiction Mastery caters to veterans as well as first-time writers and gives
    you the understanding you need to unlock the full potential of artificial intelligence
    for your fiction writing pleasure or prowess.
  prefs: []
  type: TYPE_NORMAL
- en: So what are you waiting for? Grab this guide to AI nirvana, and let’s go get
    them.
  prefs: []
  type: TYPE_NORMAL
- en: FOREWORD BY ELIZABETH ANN WEST
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I learned about AI writing in its current incarnation in the autumn of 2021\.
    I published my first book with it in December of 2021\. Like the days of publishing
    my first novel, Cancelled, in the early days of being an indie author (September
    2011), I knew the minute I saw OpenAI’s davinci-3 in action that I needed to learn
    everything I could about it.
  prefs: []
  type: TYPE_NORMAL
- en: After publishing 3 novels with AI in them and seeing NOT one change in earnings
    or reviews, I wanted to share my knowledge with others. This was December 2022\.
    ChatGPT had just dropped, and everyone was scrambling. Once upon a time, I would
    share my knowledge in places like Kboards … but this was so new, it needed live
    training so authors could SEE IT NOW.
  prefs: []
  type: TYPE_NORMAL
- en: Those first classes were a hoot! We asked it to be the candle on Poe’s writing
    desk and felt pangs of jealousy as the personification was so loyal to an author
    who suffered mightily. We had it play the character of a woman abducted by aliens,
    interviewing her and learning that no, she did NOT spill her beer, thank you very
    much, as she was pulled up in the tractor beam!
  prefs: []
  type: TYPE_NORMAL
- en: More importantly, we learned that if we were stuck, we could write a short command
    like [I don't know, I think Ellen is mad here, please write a transition where
    that’s captured].
  prefs: []
  type: TYPE_NORMAL
- en: Magically, this “dictionary slot machine” as I call it, would write a more than
    half-decent paragraph.
  prefs: []
  type: TYPE_NORMAL
- en: WRITER’S BLOCK WAS DEAD. LONG LIVE THE AUTHOR!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’re living right in the middle of some seriously exciting times. Scary … but
    exciting. What once belonged to glossy sci-fi movies, Artificial Intelligence
    (AI), has become a part of our everyday lives. Our phones. Our social media. Our
    streaming services. Our militaries. Our law enforcement agencies. And now, it’s
    creeping into the realm of storytelling and turning us into pioneers in the process.
  prefs: []
  type: TYPE_NORMAL
- en: Enter “AI Fiction Writing Mastery” by Rachelle Ayala. Rachelle was one of my
    earliest students of AI fiction writing back in January of 2023\. She is also
    one of the most prolific, routinely taking new techniques I’ve researched and
    shared and immediately putting them into practice. She has poured her heart and
    soul into this groundbreaking guide, making it perfect for writers looking to
    commit to their AI Fiction Writing education, like it’s a new dimension of writing
    craft.
  prefs: []
  type: TYPE_NORMAL
- en: And it is.
  prefs: []
  type: TYPE_NORMAL
- en: Large publishers are using AI in all aspects of publishing. Author groups and
    trade organizations have focused on lawsuits and fruitless efforts to stop it,
    hand-wringing about impossible AI-detection. Some have gone so far as to cancel
    classes about AI and block speakers at conferences about the subject. Meanwhile,
    companies like Pan Macmillan appointed global AI leads.
  prefs: []
  type: TYPE_NORMAL
- en: By the time indies and hybrid authors learn that AI is being adopted by all
    of the major content publishing conglomerates, they will be years behind in knowledge
    and practice. But this doesn’t have to be our fate.
  prefs: []
  type: TYPE_NORMAL
- en: Reading this book makes you a pioneer.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the thing about being a pioneer—there’s no fixed path. We’re the ones
    blazing the trail. There are more questions than answers right now. What’s the
    best way to write with AI? Which AI model will become every writer’s best friend?
    Heck, we’re still figuring out how to mesh human creativity with AI’s power-packed
    capabilities. And that’s actually the real thrill!
  prefs: []
  type: TYPE_NORMAL
- en: Yes, it feels a bit like a leap of faith, and sure, not everyone will embrace
    AI. That’s okay. But imagine the pride ten years from now, when you look back
    and realize you were one of the first to adopt and master the magical blend of
    fiction writing and AI.
  prefs: []
  type: TYPE_NORMAL
- en: And remember, if you try the exercises in this book and don’t get a good result,
    click the button again. The AI doesn’t “think,” you do. All any of these LLM models
    can do is give you paragraphs or lists of words it predicted based on your prompt.
    You will get what we call “a bad dice roll.” Doesn’t mean you did anything wrong
    nor did the AI. Run it again, and you will get a completely different response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Welcome to the future of fiction writing: AI Fiction Mastery'
  prefs: []
  type: TYPE_NORMAL
- en: '- Elizabeth Ann West, CEO of the [Future Fiction Academy](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw),
    best-selling author of over 25 works'
  prefs: []
  type: TYPE_NORMAL
- en: PREFACE
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Hey, Fellow Fiction Authors:'
  prefs: []
  type: TYPE_NORMAL
- en: Are you curious about AI and how you can benefit from it for your fiction writing?
  prefs: []
  type: TYPE_NORMAL
- en: Are you wondering how to fit AI into your writing process but unsure where to
    start?
  prefs: []
  type: TYPE_NORMAL
- en: Have you found ChatGPT helpful but are ready for more advanced methods?
  prefs: []
  type: TYPE_NORMAL
- en: 'Look no further than AI Fiction Mastery: The Future of Storytelling. I’m Rachelle
    Ayala, a multi-published USA Today Bestselling author, a romance writing coach,
    and an AI enthusiast working on my one-hundredth book (this one).'
  prefs: []
  type: TYPE_NORMAL
- en: I’m here to give you the real deal about what it takes to write novels with
    today’s AI technology, how it has changed over the last year, and the exciting
    new techniques that are available today. We’ll go over effective prompting, how
    to choose and adapt to new language models, teaching AI with your knowledge base,
    keeping narrative logic, maintaining story and series information, personalizing
    the AI for your writing style, and much more.
  prefs: []
  type: TYPE_NORMAL
- en: It’s been a year since ChatGPT crashed the literary party. Some of us embraced
    AI, and others kept it at arm’s length. But no one can say AI hasn’t changed the
    fiction-writing landscape. With the leaps and bounds made by AI researchers, the
    availability of larger, more complex models, and the ability to train fine-tune
    models, the possibilities for fiction writers are mind-boggling.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s the thing: AI isn’t some mysterious, inaccessible technology reserved
    only for tech gurus and science fiction writers. It’s a tool that any author can
    learn to use and master, regardless of their genre or experience level.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc4B5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: January 23, 2023, marks the watershed moment when I discovered I can use ChatGPT
    for writing.
  prefs: []
  type: TYPE_NORMAL
- en: I used AI to brainstorm premises, develop and refine characters and settings,
    and produce outlines. AI gave me feedback on my work and suggestions for the next
    scene. I’m impressed by generative AI’s ability to make connections between unexpected
    and disparate ideas. Where others complain about “hallucinations,” I’m fascinated
    by AI’s ability to “go off the rails”—taking my story in directions I would not
    have foreseen.
  prefs: []
  type: TYPE_NORMAL
- en: This book is not a rah-rah rally for AI, nor is it a doom-and-gloom woe-are-we
    book. It sets realistic expectations for how you can use AI as an assistant in
    your writing process. I will share practical ways of mastering fiction with AI
    and insights on how to stay ahead of the curve in this rapidly evolving landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Andiamo! Let’s go get them!
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​PART 1​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: OVERVIEW OF GENERATIVE AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![group of writers running down the street](image_rsrc4B6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ​[ ​1​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: THE JOURNEY SO FAR - GENERATIVE AI'S IMPACT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: “I’m not a great prose stylist. I’m a storyteller.” - James Patterson
  prefs: []
  type: TYPE_NORMAL
- en: Fear of AI is very real and wise. In a series of landmark victories, AI has
    bested the world’s top human competitors in complex games like chess (IBM’s Deep
    Blue defeated Garry Kasparov in 1997), Jeopardy (Watson beat champions Ken Jennings
    and Brad Rutter in 2011), Go (Google’s AlphaGo bested human champion Lee Sedol
    in 2016), and poker (Facebook’s Pluribus outplayed pros in six-player no-limit
    Texas hold ’em in 2019).
  prefs: []
  type: TYPE_NORMAL
- en: From there, AI made great strides, from self-driving cars to accurate prediction
    of the 3D shapes of proteins.
  prefs: []
  type: TYPE_NORMAL
- en: AI then made inroads into writing with language models like GPT-3 in 2020, with
    a significant leap in language understanding and generation capabilities. Its
    context window was tiny, and it could only write a few hundred words of stilted
    text, but it was a harbinger of things to come.
  prefs: []
  type: TYPE_NORMAL
- en: The big breakthrough came in November 2022 with ChatGPT, which could engage
    in human-like conversation. Writers everywhere started prompting ChatGPT and finding
    it capable of writing short essays, blog posts, song lyrics, and jokes and emulating
    the writing style of Edgar Allan Poe or a Valley Girl.
  prefs: []
  type: TYPE_NORMAL
- en: The advances steamrolled, accelerating at warp speed, with GPT-4 following in
    March 2023\. With 1.5 trillion parameters compared to GPT-3.5’s 175 billion, GPT-4
    outperformed GPT-3.5 in its deeper level of comprehension and ability to reason
    when giving responses.
  prefs: []
  type: TYPE_NORMAL
- en: Most promising or worrying, depending on your perspective, GPT-4 scored a lot
    higher on creativity, thus enabling it to produce plots and outlines for screenplays
    and novels with a higher level of insight and complexity.
  prefs: []
  type: TYPE_NORMAL
- en: In early 2024, author Rie Kudan won a prestigious Japanese literary prize, the
    Akutagawa Prize, for a book, The Tokyo Tower of Sympathy, which contained text
    written by ChatGPT. She was upfront about it, and the selection committee did
    not see an issue with her use of AI.⁠[1](#c349.xhtml#a47R)
  prefs: []
  type: TYPE_NORMAL
- en: Other leading technology companies presented their models, including Microsoft’s
    Copilot, Google’s Gemini, Anthropic’s Claude, and Meta’s Llama.
  prefs: []
  type: TYPE_NORMAL
- en: As with any new technology, some writers raced to try AI in all aspects of writing.
    They used AI for brainstorming, generating plots, outlines, and characters, writing
    novel manuscript prose, enhancing descriptions, and anything else they could think
    of.
  prefs: []
  type: TYPE_NORMAL
- en: Others hung back, fearful that AI would either make them irrelevant or upset
    that AI was plagiarizing. We won’t get into the author wars here, except to say
    that if you understand the technology, you’ll know that generative AI creates
    new word combinations using probability and predictive texting. We also note that
    the training is not reading books like you and I read. Instead, snippets of words
    were shoved into the dataset to compute word association probabilities. It would
    be like reading a book where someone cut every line of text and tangled them up
    as spaghetti.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to the worry that AI will replace writers. We all know that AI
    can and will replace many human endeavors. However, this has been the same since
    the steam engine replaced John Henry. I’m not unsympathetic to the speed at which
    human work is replaced since I used to have a thriving ebook formatting business
    that is no longer needed. To give you some perspective, I first wrote Java code
    to generate the NCX views and HTML files required to assemble a mobi file in 2012.
  prefs: []
  type: TYPE_NORMAL
- en: So yes, the speed with which AI can write is daunting, and even more so is its
    astronomical ability to learn and improve. We are training it as we interact with
    it. Our conversations and responses let the developers know if the AI gave us
    what we wanted or missed the mark. The chatbots have thumb-up and thumb-down buttons,
    and they give us the ability to give natural language feedback.
  prefs: []
  type: TYPE_NORMAL
- en: What is the state of affairs in early 2024?
  prefs: []
  type: TYPE_NORMAL
- en: Today, AI is already pervasive in every industry and workflow. Marketers are
    using it. Lawyers are using it. Professors are using it. Scientists are using
    it. Doctors are using it. Everyone, including artists, writers, musicians, and
    other creatives. AI has already been under the hood of your favorite online stores,
    the websites you visit, and many business software you use at work. Your schedulers,
    calendars, meeting conference apps, payroll, accounting, and regulatory data.
    AI is everywhere—even that autocorrect feature we love to laugh at.
  prefs: []
  type: TYPE_NORMAL
- en: WHO'S THE STORYTELLER?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So here we are. AI is capable of producing credible and useful content. A few
    simple prompts can easily write blog posts, marketing copy, news articles, and
    term papers, especially with an LLM, which is connected to a search engine for
    additional context and knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: But what about fiction? The province of imagination and personal narrative.
    The nexus of where our personalities meet our dreams in the form of stories.
  prefs: []
  type: TYPE_NORMAL
- en: Good news. We’re relatively safe here as individual storytellers.
  prefs: []
  type: TYPE_NORMAL
- en: Think about it. There are already billions of us on this planet. But can any
    other human being on the earth create and tell the same story as you with your
    personality, experience, quirks, insights, fears, and brand of weirdness?
  prefs: []
  type: TYPE_NORMAL
- en: Absolutely not. That’s because storytelling is unique to each individual. How
    you tell a story is not the same as how I tell a story. Add in AI, and all it
    can do is assist you by expanding on the prompts and inputs YOU provide.
  prefs: []
  type: TYPE_NORMAL
- en: I know what you’re thinking. AI can mimic any human writer’s style. It has a
    vast amount of word associations and has been trained on an extensive library
    of knowledge. AI can be taught good storytelling techniques, and when it has the
    ability to “play itself” like AlphaGo did, such as write a scene, critique the
    scene, and improve the scene … are you still telling us we have nothing to fear?
  prefs: []
  type: TYPE_NORMAL
- en: I’ll go out on a limb and say. No fear. Why?
  prefs: []
  type: TYPE_NORMAL
- en: “Only you can tell your stories.” - Rachelle Ayala
  prefs: []
  type: TYPE_NORMAL
- en: No one is YOU, no other human being is YOU, and no LLM, no matter how well it
    mimics your writing style, is YOU. No one has your vision and your voice and can
    direct a story the way you would.
  prefs: []
  type: TYPE_NORMAL
- en: Once you understand the difference between a storyteller and a writer, you will
    never have to worry about AI taking over your creativity. A writer is a scribe
    who takes concepts and puts them into words. The storyteller directs the ideas
    behind the words. The storyteller is creative. The writer records, whether it
    goes from brain to fingers, brain to dictation program, or brain to prompt to
    generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike in chess, storytelling is not a zero-sum game. It’s not AlphaGo versus
    me, but AI with me as a writing assistant. I’m still the one who dreams up the
    story, and it’s my prompts, curation, and edits that create my ownership of the
    final manuscript.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll leave you with another James Patterson quote.
  prefs: []
  type: TYPE_NORMAL
- en: “If I’m working with a co-writer, they’ll usually write the first draft. And
    then I write subsequent drafts.” - James Patterson
  prefs: []
  type: TYPE_NORMAL
- en: “10 Questions for James Patterson”, Time Magazine, July 05, 2010 [https://content.time.com/time/magazine/article/0,9171,1999411,00.html](https://content.time.com/time/magazine/article/0,9171,1999411,00.html)⁠[2](#c349.xhtml#a43K)
  prefs: []
  type: TYPE_NORMAL
- en: THE OPPORTUNITY OF AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Powerful AI tools are here to stay, and their advancement will be truly impressive.
    It’s like standing on the beach facing a tsunami wave. We face questions of loss
    of control, becoming obsolete, and being overwhelmed by the amount of content
    it can generate.
  prefs: []
  type: TYPE_NORMAL
- en: These are valid concerns. However, the best way to overcome these fears is to
    take control of the AI tools—to understand how to use them for your purposes and
    to get AI on your side. As for the volume it generates, again, harness it for
    yourself.
  prefs: []
  type: TYPE_NORMAL
- en: We deal with AI the same way we collaborate with other human beings to empower
    us to reach new heights in our storytelling endeavors. No storyteller exists in
    a vacuum. We are consumers of other people’s stories, we mingle our experiences
    with others in our personal relationships, we share emotions and dreams with our
    friends, and we bounce ideas off human critique partners and readers.
  prefs: []
  type: TYPE_NORMAL
- en: AI can assist with the writing process, but remember that you are the one initiating
    the contact through your prompts. No input means no output, right?
  prefs: []
  type: TYPE_NORMAL
- en: Don’t let your fears hold you back. Embrace it like any other technological
    advance, such as the word processor or search engine, and see what it can do for
    you.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, the story is still yours to tell.
  prefs: []
  type: TYPE_NORMAL
- en: ADDITIONAL TIPS FOR EMBRACING AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Start with small experiments: Don’t feel pressured to use AI for every aspect
    of your writing. Begin by incorporating it into specific tasks, such as generating
    character names or brainstorming scene ideas.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Join the community: Connect with other authors who are using AI. Share experiences,
    learn from each other, and discover new ways to leverage this technology.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Stay informed: Stay up-to-date on the latest developments in AI writing tools.
    This will help you make informed decisions about which tools to use and how best
    to integrate them into your workflow.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Focus on the joy of storytelling: Don’t let fear or technical challenges overshadow
    the excitement and satisfaction of creating stories. Remember, AI is a tool to
    enhance your creativity, not replace it.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc4B5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A last point to remember. The worst that AI can do is what it’s doing today.
    It can only get better. It used to be that AI sounded stupid or made weird, nonsensical
    connections. However, as the GPTs advance, there will come a day when we won’t
    be able to tell AI writing and that some AI-generated content will be objectively
    better than human-generated content.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an article looking back to the early days of gen-AI, when “You sound
    like a bot,” was an insult. The Verge - “You Sound Like a Bot” ([https://www.theverge.com/24067999/ai-bot-chatgpt-chatbot-dungeon](https://www.theverge.com/24067999/ai-bot-chatgpt-chatbot-dungeon))
    ⁠[3](#c349.xhtml#a48W)
  prefs: []
  type: TYPE_NORMAL
- en: '[Write With AI: Guide for Fiction and Nonfiction Authors](http://books2read.com/writewithai)  by
    Rachelle Ayala (introduction to writing with AI, including basic ChatGPT prompts
    to get you started) ⁠[4](#c349.xhtml#a3WC)'
  prefs: []
  type: TYPE_NORMAL
- en: DEFINITIONS TO GET STARTED
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'API: Application Programming Interface. This is a programmatic call into an
    LLM with specific inputs, such as prompt, temperature, parameters, etc. It returns
    a result set or response.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chatbot: an app that accesses an LLM designed to respond to user input in a
    conversational manner. It may include content filtering for both input and output.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Context Window: The context window is the number of tokens (or word fragments)
    an LLM can work on in a single prompt. Imagine you’re on a subway, and you’re
    looking out a small window. The content you can see as the train runs by is the
    context window. Therefore, as the conversation proceeds, earlier tokens drop out
    of the window to be replaced by later tokens.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The context window for ChatGPT includes any previous prompts and responses
    that fit in the window, added to the tokens in your prompt, and the “estimated
    response length,” which is regulated by the max-length parameter. You’ll learn
    more about parameters in [Chapter 26: Playground Parameters](#c1FG.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: For now, imagine the context window as an AI’s short-term memory. It holds a
    limited number of tokens, words, or word fragments, which the AI uses to understand
    and respond to your conversation. If the conversation gets too long and exceeds
    this window, the AI forgets the earlier parts. This can lead to irrelevant responses,
    as the AI loses track of important information. To keep the conversation flowing,
    it’s best to stay within the context window’s limits or summarize past points
    to help the AI stay focused on the current topic.
  prefs: []
  type: TYPE_NORMAL
- en: Earlier LLMs had context windows of 2000 tokens or approximately 1500 words.
    We use the 75% ratio to approximate tokens to words since tokens can consist of
    word fragments and punctuation. Today, Google Gemini 1.5 Pro can keep a million
    token context window, and there is already talk about infinite context window
    models coming down the pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'LLM: Large Language Model. These are machine learning modules that take natural
    language prompts and generate outputs like text, audio, images, and video. In
    this book, I use LLM interchangeably with AI, even though LLMs are a subset of
    AI. Examples of LLMs are GPT-4, Claude, Gemini, and Mistral.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Playground: A developer interface that allows users to input raw prompts, tweak
    parameters, and experiment with settings. Playgrounds also show the code, so you
    can use them to learn how to access the API.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: The input to the LLM from the user in natural language text. It elicits
    a response from the LLM and provides the context for that response.'
  prefs: []
  type: TYPE_NORMAL
- en: Please see the [Glossary](#c2XY.xhtml) for more definitions.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​2​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: UNDERSTANDING GENERATIVE AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: BRIEF OVERVIEW OF GENERATIVE AI AND LLMS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI or artificial intelligence has been around us in many forms for many years,
    whether in pattern recognition, machine learning, or playing games. Generative
    AI is the form of AI that can create content, including text, images, 3D models,
    and even music that mimics human-like creativity.
  prefs: []
  type: TYPE_NORMAL
- en: Large Language Models (LLMs) are called “large” due to the immense size of their
    training data and the complexity of their neural networks. For example, Open AI’s
    GPT-4 has 1.8 trillion parameters across 120 layers. The training dataset consisted
    of 13 trillion tokens or about 10 trillion words. The immense size of the training
    ought to alleviate your concern if you believe an LLM was trained on your data
    because you had your blogs scraped or your free ebooks read. Whatever you contributed
    to the training is so minuscule that you don’t have to worry about the LLM magically
    “plagiarizing” your words.
  prefs: []
  type: TYPE_NORMAL
- en: Without getting too technical, LLMs are very sophisticated word predictors (or
    rather token predictors). A token is a part of a word or a punctuation mark. Even
    blanks and carriage returns are tokens. Instead of simply suggesting corrections
    like an autocorrect, LLMs analyze the relationships between the tokens inside
    their context window to more accurately predict what comes next. This allows an
    LLM to construct sentences that make sense and have meaning. It can carry conversations
    with you, execute commands, and even create new narratives based on the patterns
    it has learned.
  prefs: []
  type: TYPE_NORMAL
- en: A well-trained LLM gives you the illusion that it is thinking. Because we humans
    have mirror neurons that make us social, we feel like we are talking to another
    human when we chat with an LLM. Our imagination makes LLMs powerful tools for
    fiction writers because we can creatively prompt them to generate ideas and storylines
    that come from the context we provide. It is essential to note that an LLM does
    not “think” and even understand its own output.
  prefs: []
  type: TYPE_NORMAL
- en: This is why AI does not lie or hallucinate like some people claim. It does not
    know the truth, have any idea of your intentions, or have moral values. The AI
    mathematically predicts the next word based on the mass of other words in the
    context window.
  prefs: []
  type: TYPE_NORMAL
- en: That said, treating the LLM as a human chatting companion is convenient because
    it makes our interaction more enjoyable and supports our creativity.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding how a large language model (LLM) is trained will give us a better
    idea of how to influence the responses through better prompting, tweaking parameters,
    or fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: INFORMATION ABOUT LLMS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'YouTube video: “But what is a GPT? Visual intro to transformers” ([https://www.youtube.com/watch?v=wjZofJX0v4M](https://www.youtube.com/watch?v=wjZofJX0v4M))
    ⁠[1](#c349.xhtml#a429)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Jay Alammar’s Blog: This blog post provides a visual and intuitive explanation
    of the Transformer architecture and how it works, including the concept of pre-training
    and the role of attention mechanisms. ([https://jalammar.github.io/illustrated-transformer/](https://jalammar.github.io/illustrated-transformer/))
    ⁠[2](#c349.xhtml#a45P)'
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenAI GPT Models: Information about OpenAI’s GPT models, including GPT-4,
    can be found on their website and research publications. ([https://openai.com/research/gpt-4](https://openai.com/research/gpt-4))
    ⁠[3](#c349.xhtml#a42Z)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Anthropic Claude: Information about Anthropic’s Claude model and its capabilities
    can be found on their website. ([https://www.anthropic.com/claude](https://www.anthropic.com/claude))
    ⁠[4](#c349.xhtml#a456)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Google AI: Google AI research encompasses various areas, including natural
    language processing and LLMs. Information about their research and models can
    be found on their website. ([https://ai.google/](https://ai.google/)) ⁠[5](#c349.xhtml#a434)'
  prefs: []
  type: TYPE_NORMAL
- en: WHAT GEN-AI IS NOT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many resources are online for studying generative AI technology, but I suspect
    you’re more interested in what gen-AI can do for you and your writing process.
    Let’s quickly dispel some myths concerning LLMs and chatbots such as ChatGPT,
    Claude, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI is not a Search Engine
  prefs: []
  type: TYPE_NORMAL
- en: Our generation has grown up with search engines, and we’re used to typing questions
    and keywords into them to find what we need. Therefore, our tendency is to treat
    a chatbot like a search engine and expect it to behave like one. However, we must
    remember that an LLM is pre-trained and has a cut-off date. For example, GPT-3.5’s
    cut-off date was initially September 2021 and was increased to January 2022 with
    an update.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, some chatbots are connected to search engines, such as Bing Chat or Copilot,
    and that does confuse the issue somewhat, but that is an add-on where the search
    engine will go to the internet and provide more context to your question.
  prefs: []
  type: TYPE_NORMAL
- en: However, let’s return to a pure LLM (large language model) without the ability
    to browse the internet. If you watched the video, you’ll know that GPT stands
    for generative PRE-TRAINED transformer, and the model does not retain its training
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, it will not retrieve data nor provide factual results. It is designed
    to generate words that sound reasonable when paired together through pattern recognition.
    You can’t accuse generative AI of making things up when that is precisely what
    it was designed to do.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI is not a calculator
  prefs: []
  type: TYPE_NORMAL
- en: Just because AI can process language and generate text doesn’t mean it possesses
    advanced mathematical abilities. Again, AI models can associate likely numbers
    (tokens) with other numbers (tokens) and even do word problems based on the math
    word problems it has ingested. However, be very careful. It does not have a floating
    point processor underneath the hood, and it cannot even do the math of a basic
    Texas Instruments calculator. What it can do is appear to sound very reasonable,
    while it misses the entire point of the word problem.
  prefs: []
  type: TYPE_NORMAL
- en: I remember a math teacher complaining about my son’s messy work. She gave me
    an example of what she called A+ work, which was nicely and neatly sequenced,
    complete with arrows, boxes, and pretty flowers decorating the answers. She wanted
    my son to emulate this A-student’s work. When I recalculated the exercises, every
    single answer that my son’s math teacher claimed to be accurate was wrong. I stepped
    through the word problems, showed my work to the teacher, and proved that my son’s
    answers were correct even though he skipped five steps or just scribbled the answers
    after some messy computation. The A+ paper deserved an F even though it was prettily
    formatted and looked reasonable. I never heard back from the teacher after I submitted
    a detailed explanation, and I shudder to think how this teacher grades homework
    and tests based on good handwriting and pretty boxes instead of looking at the
    content.
  prefs: []
  type: TYPE_NORMAL
- en: Remember this when you get ChatGPT to do math for you. Yes, ChatGPT is getting
    “smarter,” but I suspect they are pre- and post-processing the inputs and outputs
    from the model. Since you cannot see the input that goes into the GPT, you cannot
    be sure exactly what’s happening underneath the hood.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI is not a database full of plagiarized works
  prefs: []
  type: TYPE_NORMAL
- en: 'This one touches a hot button but must be explained. Many people imagine that
    generative-AI hoovered up all the works on the internet and is storing all of
    it in a giant database where it can retrieve the data at will. They can point
    to prompts like “write me the happy birthday song” and say, see? It reproduced
    it exactly. They can even ask it to write out Psalm 23 and have it come out word
    for word. However, this only shows that it has read so many copies of Psalm 23
    that those word associates are tight. I can break this by turning up the temperature
    on the model so that it goes more random and returns divergent results. See [Chapter
    26: Playground Parameters](#c1FG.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: As we stated before, GPTs do not store the training data and therefore cannot
    “copy and paste.” Generative AI does not plagiarize, but humans do. If you upload
    a piece of plagiarized work, yes, you can get the GPT to appear like it plagiarized
    because you seeded those words into your prompt. But that’s on you, not the AI.
    Humans pull the trigger, not the gun.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI is not objective and unbiased
  prefs: []
  type: TYPE_NORMAL
- en: This should not be surprising since Generative AI was trained on human input,
    and humans are not objective and unbiased. The LLM is only as good as the data
    it was trained on. Therefore, users should always fact-check and edit the output
    for correctness.
  prefs: []
  type: TYPE_NORMAL
- en: Different LLMs are trained on different datasets, likely exhibiting different
    biases. The user should be aware of generative AI’s capabilities and blind spots
    and adjust accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: AI detectors cannot reliably detect AI-generated text
  prefs: []
  type: TYPE_NORMAL
- en: When ChatGPT first became popular, many outfits jumped in with programs they
    claimed could effectively distinguish between AI-generated output and human-written
    text. Some professors jumped on these tools and accused students of using AI in
    their essays, and people were fired from their jobs or suffered other financial
    consequences. However, recent research shows that AI detection tools are flawed
    and inaccurate.
  prefs: []
  type: TYPE_NORMAL
- en: People evaluated documents written before gen-AI existed and came up with high
    positives. Others took AI-generated text and changed or misspelled words here
    and there to drop the percentage. Others invented tools or fine-tuned models to
    “de-AI” text, and research is ongoing on “ watermarking” AI-generated text. Currently,
    detecting AI use is unreliable, and it may become even more challenging with the
    proliferation of diverse LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some limitations of current AI Detectors:'
  prefs: []
  type: TYPE_NORMAL
- en: 'False positives: AI detectors often misidentify human-written text as AI-generated.
    This can lead to unfair penalization and censorship of human-created expression.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Evolving AI Models: The plethora of LLMs and their diverse training data, filters,
    fine tunes, and other parameters make it increasingly challenging to detect AI-generated
    text. Most humans who claim to be able to “detect” AI-generated text base their
    analysis on ChatGPT’s default writing style. However, people can fine-tune GPT-3.5
    and create a writing style that does not “sound” like ChatGPT. See [Part VI: Personalizing
    AI for Your Creative Voice](#c1XS.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Editing and Weaving in Human Original Text: AI-generated text is easily edited,
    paraphrased, or woven in with human original text. Once the text is rearranged,
    edited, or riffed on, detecting AI becomes a crapshoot (which it always was).
    The percentages or scores these detectors claim swing wildly with small changes.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Lack of Transparency: Many AI detectors operate as black boxes, and we don’t
    know whether they are using AI to catch AI or what they are keying on. Obviously,
    if the detection method was made known, someone would figure out how to evade
    it. It’s a game of phantom cats and mice because AI detection was never accurate
    to begin with. The ironic thing is that a piece of text can score higher as AI-generated
    after being modified by a human than when it came fresh out of the GPT.'
  prefs: []
  type: TYPE_NORMAL
- en: ADDITIONAL REFERENCES
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI, the creators of ChatGPT, acknowledge the limitations of AI detection,
    stating that “our classifiers are not fully reliable” and that “it is impossible
    to reliably detect all AI-written text.” (OpenAI Blog [https://openai.com/blog/new-ai-classifier-for-indicating-ai-written-text/](https://openai.com/blog/new-ai-classifier-for-indicating-ai-written-text/))
    ⁠[6](#c349.xhtml#a46K)
  prefs: []
  type: TYPE_NORMAL
- en: A study by Stanford University and the University of Massachusetts Amherst found
    that AI detectors exhibit significant biases against non-native English speakers,
    often misclassifying their writing as AI-generated. (Stanford HAI [https://hai.stanford.edu/news/ai-detectors-biased-against-non-native-english-writers](https://hai.stanford.edu/news/ai-detectors-biased-against-non-native-english-writers))
    ⁠[7](#c349.xhtml#a467)
  prefs: []
  type: TYPE_NORMAL
- en: Researchers at the University of Maryland develop and test AI text detectors,
    highlighting the challenges of distinguishing between human and AI-generated content.
    ([https://www.trails.umd.edu/news/researchers-develop-and-test-ai-text-detectors](https://www.trails.umd.edu/news/researchers-develop-and-test-ai-text-detectors))
    ⁠[8](#c349.xhtml#a3WR)
  prefs: []
  type: TYPE_NORMAL
- en: Online uproar over Nigerian English flagged as ChatGPT-ish ([https://businessday.ng/technology/article/online-uproar-over-nigerian-english-flagged-as-chatgpt-ish](https://businessday.ng/technology/article/online-uproar-over-nigerian-english-flagged-as-chatgpt-ish))
    ⁠[9](#c349.xhtml#a46S)
  prefs: []
  type: TYPE_NORMAL
- en: THE SURPRISING THINGS GENERATIVE-AI CAN DO
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The astonishing and perhaps scary thing about generative AI is not only its
    ability to generate human-sounding text, beautiful images, and sound effects but
    the exponential pace of its growth and accomplishments. Every week, something
    incredible comes onto the scene. A year ago, videos were choppy and comically
    fake, and then OpenAI demonstrated Sora with astonishingly realistic video clips.
  prefs: []
  type: TYPE_NORMAL
- en: 'The ability to do math (something ChatGPT 3.5 was not good at) advances in
    leaps and bounds, and most of all, researchers are finding unexplained abilities,
    such as the models doing tasks they have not been trained on. For example, a model
    trained with math problems in English can solve math problems in French even though
    it was never trained on French math problems, only French literature. (See the
    article: “Large language models can do jaw-dropping things. But nobody knows exactly
    why” [https://www.technologyreview.com/2024/03/04/1089403/large-language-models-amazing-but-nobody-knows-why/](https://www.technologyreview.com/2024/03/04/1089403/large-language-models-amazing-but-nobody-knows-why/))
    ⁠[10](#c349.xhtml#a3ZR)'
  prefs: []
  type: TYPE_NORMAL
- en: It seems that LLMs can make leaps by applying knowledge from one domain to another
    or by tying together analogous concepts. They have been able to create new, never-before-seen
    languages just by knowing the linguistics of existing languages and approaching
    problems from angles that haven’t occurred to humans.
  prefs: []
  type: TYPE_NORMAL
- en: The implications for fiction writing are intriguing. Perhaps the LLMs can create
    novel story forms and blend or create new genres. They can create unimaginable
    fictional worlds with physical laws different from what we’re used to or generate
    poetry with unique structure and rhyme schemes.
  prefs: []
  type: TYPE_NORMAL
- en: We live in exciting times, and we haven’t seen anything yet. There will be an
    explosion of creativity and new forms of storytelling, and no one can predict
    what will happen next.
  prefs: []
  type: TYPE_NORMAL
- en: 'A good introduction to Generative AI video: Generative AI Class(April 2024)
    Part 1 from Worthy Works Foundation ([https://www.youtube.com/watch?v=vqjbhEMLnOA](https://www.youtube.com/watch?v=vqjbhEMLnOA))
    ⁠[11](#c349.xhtml#a472)'
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​3​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: UNDERSTANDING AI MODELS AND APPLICATIONS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When I wrote my first two books on AI, [Love by the Prompt](https://books2read.com/lovebytheprompt)  ⁠[1](#c349.xhtml#a3WY)  and
    [Write With AI](https://books2read.com/writewithai), ⁠[2](#c349.xhtml#a3X0) in
    early 2023, the only LLM I had to discuss was OpenAI’s ChatGPT. Now, a year later,
    we literally have thousands of LLMs at our fingertips. Every major tech company
    has its own offering, and open-source LLMs are also proliferating. We have head-to-head
    challenges and leaderboards for LLM rankings and libraries full of information
    and taxonomy.
  prefs: []
  type: TYPE_NORMAL
- en: All of this can be overwhelming for a fiction author who wants to get on with
    writing, so let me review the foundational models and a few of the attractive
    Open-Source Models, especially ones that are unfiltered and can write NSFW (Not
    Safe for Work) content.
  prefs: []
  type: TYPE_NORMAL
- en: FOUNDATIONAL MODELS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Foundational models are LLMs trained on a large amount of generic data. You
    can think of them as kitchen sink models. Because they were trained on vast quantities
    of generalized data, they can do almost anything. Foundational models can be fine-tuned
    for specific downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Two essential characteristics of an LLM are the number of parameters that represent
    the complexity of the model’s internal structure (or how “smart” it is) and the
    context window, which is the amount of text a model can consider when generating
    a response (or how much it “remembers.”)
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s GPT-3.5 was the first generally available LLM in November 2022\. It
    had 175 billion parameters and a context window of 4096 tokens (or approximately
    3000 words).
  prefs: []
  type: TYPE_NORMAL
- en: In March 2023, OpenAI released GPT-4, which has over a trillion parameters and
    a context window of 8192 tokens (approximately 6000 words).
  prefs: []
  type: TYPE_NORMAL
- en: Next, Anthropic released their LLM called Claude 2.0 with a 100,000-token context
    window. They didn’t tell us the number of parameters, but the Claude family is
    designed to be conversational, and many writers believe it suits creative writers
    and gives longer outputs.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI released GPT-4 Turbo in late 2023 with a 128K context window. An update
    to 3.5, Gpt-3.5-turbo-0125, supports a 16,385-token context window and is optimized
    for dialogue with higher accuracy. It can also be fine-tuned to a writer’s style.
  prefs: []
  type: TYPE_NORMAL
- en: If your head is spinning, 2024 is starting off with a bigger bang. Last year,
    we were happy to get a 4000-token (3000 words) context window, and GPT-4’s 8000-token
    window was a big deal since we were able to put in 3000-word prompts and get 3000-word
    responses (the beginning of megaprompting). This year, we’re looking at LLMs with
    a million or unlimited windows.
  prefs: []
  type: TYPE_NORMAL
- en: Claude 3 dropped in March 2024 with a 200,000 token context window and three
    flavors (Haiku, Sonnet, Opus).
  prefs: []
  type: TYPE_NORMAL
- en: Not to be outdone, Google dropped Gemini 1.5 Pro in April with a 1,000,000 token
    context window.
  prefs: []
  type: TYPE_NORMAL
- en: And here we are. By the time you read this, bigger and better models will no
    doubt be available.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, we’re writers and not model chasers, so let me give you my opinion
    on these models.
  prefs: []
  type: TYPE_NORMAL
- en: Most writers would do well to get a ChatGPT Plus subscription ($20/month) and
    a Claude Chat subscription ($20/month). You’ll find yourself bouncing between
    them. Both chatbots are now multimodal, with the ability to upload documents and
    images.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Plus comes with access to Custom GPTs and plugins as well as their Dall-E
    image generator. It is widely used in business and appears to be better at structuring
    data. Most writers and content creators pick ChatGPT Plus as their go-to chatbot.
    However, ChatGPT has one big drawback. Its writing style is known to be stiff
    and slightly archaic. It comes from being trained in public domain literature
    (books out of copyright because they are old) and fan fiction websites. It also
    seems more resistant to being told to write in a different style in the sense
    that you can request a style and still get the same stilted text.
  prefs: []
  type: TYPE_NORMAL
- en: For business use, ChatGPT wins hands down as its text is succinct and to the
    point. For fiction, it tends to layer on too many adjectives and adverbs. Some
    authors call it flowery prose—which brings us to Anthropic’s Claude.
  prefs: []
  type: TYPE_NORMAL
- en: Claude 2.0 was known to be a better writer than ChatGPT. Recently, Claude 3
    was released, consisting of three varieties (Haiku, Sonnet, Opus). Each writes
    with a different voice or tone, with Opus being the most intelligent and complex
    (and expensive) of the three.
  prefs: []
  type: TYPE_NORMAL
- en: Claude is the choice for creative work, such as social media engagement, blurbs
    and marketing material, and writing novel manuscript prose. It is more responsive
    to suggestions of writing style and will “remember” differences in character’s
    voices so that you can note the way each character talks and have it reflected
    in the prose it generates. However, unlike OpenAI’s GPT-3.5, Claude is so far
    not available for fine tuning.
  prefs: []
  type: TYPE_NORMAL
- en: OPEN SOURCE MODELS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Open-source models range from Meta’s Llama 3 model, pre-trained on 15 trillion
    tokens, to niche models designed for specific purposes. Some open-source models
    can generate content without the restrictions and filters found in commercially
    available LLMs. They can thus explore sensitive topics or create content for mature
    audiences. The open-source landscape is evolving at such a breakneck pace that
    staying current with the latest developments can be a daunting challenge.
  prefs: []
  type: TYPE_NORMAL
- en: Creative writing groups often share their experiments and results using open-source
    models. The people in the groups I’m in have found Mythomax and Goliath to be
    reasonably good at writing NSFW content. The caveat is that prompts need to be
    adjusted for different LLMs (this is true even between Claude and ChatGPT). The
    best way is to ask the LLM what it needs for it to complete a task for you.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, at the end of the day, a model might work for you in one situation
    and fall down on the job in another. They also seem to have good days and bad
    days, probably because they are being updated all the time. Be flexible with your
    prompts. Talking to LLMs is like talking to different friends. You’ll intuitively
    get their “personalities” and adjust your prompts.
  prefs: []
  type: TYPE_NORMAL
