- en: ​[ ​PART 6​ ]​
  id: totrans-1351
  prefs: []
  type: TYPE_NORMAL
  zh: '[第6部分]'
- en: PERSONALIZING AI FOR YOUR CREATIVE VOICE
  id: totrans-1352
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为你的创意声音**个性化AI**
- en: '![group of writers singing and dancing](image_rsrc4BC.jpg)'
  id: totrans-1353
  prefs: []
  type: TYPE_IMG
  zh: '![一群作家唱歌跳舞](image_rsrc4BC.jpg)'
- en: ​[ ​35​ ]​
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: '[第35部分]'
- en: WHAT IS FINE-TUNING?
  id: totrans-1355
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**什么是微调**？'
- en: One of the most exciting developments for fiction writers is the art of fine-tuning
    an existing LLM to shape its behavior in a style or format of your choosing. It
    suggests the possibility of creating a fine tune that writes like you. All you
    have to do is provide samples of your writing and format your prompts in a way
    that will elicit the behavior.
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 对虚构作家来说，最令人兴奋的发展之一是微调现有LLM的艺术，以塑造其行为风格或格式。它暗示了创建一个能像你一样写作的微调版本的可能性。你所要做的就是提供你的写作样本，并以一种方式格式化你的提示词，以引发这种行为。
- en: In practice, though, it’s not that easy. Finding samples is easy; however, figuring
    out the prompts to twist and tune the existing LLM to get the result you like
    is still an art. This is because fine-tuning is not simply stuffing context into
    an AI’s context window or giving it information to influence its responses.
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在实践中，这并不那么容易。找到样本很容易；然而，找出扭曲和调整现有LLM以获得你想要的结果的提示词仍然是一门艺术。这是因为微调不仅仅是将上下文填充到AI的上下文窗口中，或者给它提供信息以影响其响应。
- en: Fine-tuning changes HOW an LLM behaves; as you’ve seen before, researchers are
    still surprised by what and how an LLM behaves. Let’s explain in layman’s terminology.
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: 微调改变了LLM的行为方式；正如你之前看到的，研究人员仍然对LLM的行为方式和内容感到惊讶。让我们用通俗易懂的语言来解释。
- en: Think of fine-tuning as the process of adding adverbs to an action. Just as
    adverbs don’t change the action or the information provided, fine-tuning doesn’t
    add any new information to the model. Instead, it’s about showing the GPT what
    you want it to do, rather than telling it. For instance, you might start with
    a plain piece of text and then edit it to match your writing style. By providing
    it with samples, the aim is to rearrange the GPT’s expression to align with your
    desired manner.
  id: totrans-1359
  prefs: []
  type: TYPE_NORMAL
  zh: 将微调视为向动作添加副词的过程。正如副词不会改变动作或提供的信息一样，微调不会向模型添加任何新信息。相反，它是关于向GPT展示你希望它做什么，而不是告诉它。例如，你可能从一个简单的文本开始，然后编辑它以匹配你的写作风格。通过提供样本，目的是重新排列GPT的表达方式，使其与你的期望方式一致。
- en: Other analogies are rearranging the furniture to create a different experience
    or changing the cooking techniques of a recipe while retaining the same ingredients,
    for example, beating the eggs rather than folding them. Think of fine-tuning as
    shaping the personality of the AI and guiding it to express itself in a way that
    aligns with your own creative vision.
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 其他类比是将家具重新排列以创造不同的体验，或者在不改变相同成分的情况下改变食谱的烹饪技术，例如，打鸡蛋而不是折叠它们。将微调视为塑造AI个性的过程，并引导它以符合你自己的创意愿景的方式表达自己。
- en: In summary, fine-tuning involves training an existing LLM on a smaller, more
    specific dataset to adapt its behavior. It trains the GPT in qualitative terms.
    It doesn’t add any information. It is a style change and exactly what fiction
    authors look for to get an LLM that “writes like them.”
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，微调涉及在较小的、更具体的数据集上训练现有的LLM，以适应其行为。它从定性角度训练GPT。它不添加任何信息。它是一种风格变化，这正是小说作者寻找以获得“像他们一样写作”的LLM的原因。
- en: However, while fine-tuning can improve the AI’s ability to mimic an author’s
    style, getting there is still a challenge. That’s because we don’t entirely understand
    how the model will respond, and we have a limited dataset available to try to
    push the billions or trillions of parameters of its existing training. That said,
    careful prompting and semantic analysis of your dataset will reap rewards when
    you have a fine tune that sounds like you.
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管微调可以提高AI模仿作者风格的能力，但达到这一目标仍然是一个挑战。这是因为我们并不完全了解模型将如何响应，我们可用的数据集有限，试图推动其现有训练的数十亿或数万亿参数。话虽如此，当你有一个听起来像你自己的微调时，仔细的提示和语义分析你的数据集将带来回报。
- en: ​[ ​36​ ]​
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: '[36]'
- en: HOW TO FINE-TUNE
  id: totrans-1364
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何进行微调
- en: Fine-tuning an LLM to match your writing style requires a curated dataset that
    reflects your unique voice, tone, and style. The first step is to decide the purpose
    of your fine tune. If you want to get one to emulate your style, you need to gather
    writing samples of the tone or style you want the AI to emulate.
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: 将LLM微调以匹配你的写作风格需要一个反映你独特声音、语气和风格的精选数据集。第一步是决定你微调的目的。如果你想让AI模仿你的风格，你需要收集你希望AI模仿的语气或风格的写作样本。
- en: FINE-TUNING TIPS
  id: totrans-1366
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微调技巧
- en: Start by gathering 1000-2000 word samples that reflect your writing style. If
    your voice is different between, say, romantic suspense and romantic comedy, you
    might segregate the samples by point of view, tense, or genre.
  id: totrans-1367
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，收集1000-2000字的样本，以反映你的写作风格。如果你的声音在浪漫悬疑和浪漫喜剧之间有所不同，你可能需要根据观点、时态或类型对样本进行分类。
- en: Include a variety of writing samples, such as dialogue, descriptions, internal
    monologues, and expository text, to ensure the AI learns the full range of your
    stylistic expression.
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: 包括各种写作样本，如对话、描述、内心独白和说明性文本，以确保AI学习你风格表达的全面范围。
- en: Ensure the writing samples you choose reflect a consistent voice and tone throughout.
    Perhaps you have a more informal tone for fiction and a formal tone for nonfiction.
    Consider the purpose of the fine tune, and don’t mix datasets with different goals.
  id: totrans-1369
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你选择的写作样本在整个文档中保持一致的语气和风格。也许你对小说采用更随意的语气，而对非小说采用正式的语气。考虑微调的目的，不要将不同目标的集合混合在一起。
- en: 'Focus on Recent Work: Include your most recent writing samples, as your style
    may have evolved.'
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于近期作品：包括你最新的写作样本，因为你的风格可能已经有所变化。
- en: 'Respect Copyright: Only use writing samples you have the rights to or are in
    the public domain. If you have co-authored works, ensure you have permission to
    use them for fine-tuning.'
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: 尊重版权：只使用你有权使用或属于公共领域的写作样本。如果你有共同创作的作品，确保你有权使用它们进行微调。
- en: 'Select a base model LLM: Currently, OpenAI and Google Gemini allow fine-tuning
    on their foundational models (that I know of). OpenAI enables fine-tuning of its
    GPT-3.5 models and previous ones. There is a waiting list for the GPT-4, and Anthropic
    has announced that it has no interest in fine-tuning its models. They recently
    released their Claude 3 generation of LLMs in three flavors: Haiku, Sonnet, and
    Opus. I don’t know how they did it, but these three models have recognizable default
    writing styles. Perhaps they’ve already been tuned for how malleable they are
    to stylistic writing prompts.'
  id: totrans-1372
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个基础模型LLM：目前，OpenAI和Google Gemini允许在其基础模型上进行微调（据我所知）。OpenAI允许微调其GPT-3.5模型和之前的模型。GPT-4有一个等待列表，Anthropic宣布对微调其模型不感兴趣。他们最近发布了Claude
    3代LLM的三种版本：Haiku、Sonnet和Opus。我不知道他们是如何做到的，但这三个模型都有可识别的默认写作风格。也许它们已经被调整以适应风格提示的灵活性。
- en: Meanwhile, the OpenAI LLMs have a voice that many people recognize as “AI-ish”
    writing. The current model that we can fine-tune is GPT-3.5-16K. In itself, it
    is not that good of a writer and tends to be very brief and surface-level. I’ve
    created a fine tune for my romantic comedy style that doesn’t sound like ChatGPT.
    My fine tune provides snappier dialogue and lighter, more carefree writing. There
    are internal thoughts and banter minus the usual ChatGPT clichés and the tendency
    to summarize at the end of a scene. Although it is still GPT-3.5 level writing,
    I call it a win. Remember what I told you? A fine tune does not add “smarts” or
    information. It only changes the way the response is presented.
  id: totrans-1373
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，OpenAI的LLM有一个很多人都能认出的“AI式”写作的声音。我们可以微调的当前模型是GPT-3.5-16K。本身，它不是一个很好的作家，往往非常简短和肤浅。我已经为我的浪漫喜剧风格创建了一个微调，听起来不像ChatGPT。我的微调提供了更快的对话和更轻松、更无忧无虑的写作。有内心想法和闲聊，没有ChatGPT的陈词滥调和场景结尾时的总结倾向。尽管它仍然是GPT-3.5级别的写作，但我称之为胜利。还记得我告诉你的吗？微调不会增加“智慧”或信息。它只改变了响应的呈现方式。
- en: HOW TO FINE TUNE AN OPENAI MODEL
  id: totrans-1374
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何微调OpenAI模型
- en: The dataset consists of three portions. Each element is a System, User, or Assistant
    prompt.
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集由三个部分组成。每个元素都是一个系统、用户或助手提示。
- en: Sounds easy, right? The twist is that you will be providing the Assistant “prompt”
    as an example of what you want the AI to return, in addition to the System and
    User prompt that you best believe fits the data you desire.
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来很简单，对吧？转折在于，你将提供助手的“提示”作为你希望AI返回内容的示例，除了你最好相信适合你所需数据的系统和用户提示。
- en: By doing this, you are showing the LLM what you want from it, in addition to
    telling it through the System and User Prompt.
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，你不仅通过系统和用户提示告诉LLM你想要什么，而且还在LLM中展示了你想要的东西。
- en: Here’s a simple example of a System, User, and Assistant prompt.
  id: totrans-1378
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个系统、用户和助手提示的简单示例。
- en: 'System: You are a Snarkifier of Dialogue designed to take ordinary dialogue
    and make it snarky and sarcastic.'
  id: totrans-1379
  prefs: []
  type: TYPE_NORMAL
  zh: 系统：你是一个对话讽刺者，旨在将普通对话变得讽刺和挖苦。
- en: 'User: Please snarkify this dialogue sample: {copy and paste in boring dialogue
    line.}'
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：请讽刺化这个对话样本：{复制粘贴无聊的对话行。}
- en: 'Assistant: {Provide the snarky version of the dialogue}'
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: 助手：{提供对话的讽刺版本}
- en: If these snippets are short, providing 50 to 100 samples is reasonable. However,
    if we provide 1000-2000 word scenes, you only need to provide 20 samples. You
    must ensure that your System, User, and Assistant prompts fit into the LLM’s context
    window. The model they currently recommend is gpt-3.5-turbo-0125.
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些片段很短，提供50到100个样本是合理的。然而，如果我们提供1000-2000字的场景，你只需要提供20个样本。你必须确保你的系统、用户和助手提示适合LLM的上下文窗口。他们目前推荐的是gpt-3.5-turbo-0125。
- en: The dataset must be provided as a JSONL file, which is a major pain unless you
    use a tool that converts CSV into JSONL. (Rexy has an LLM Tuner that will do this
    for you). You can then upload the JSONL file to the OpenAI interface, push a button,
    and let it run.
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集必须以JSONL文件的形式提供，除非你使用将CSV转换为JSONL的工具，否则这是一个大麻烦。（Rexy有一个LLM调谐器可以为你完成这项工作）。然后你可以将JSONL文件上传到OpenAI界面，按下一个按钮，让它运行。
- en: See OpenAI’s documentation on Fine-Tuning. [https://platform.openai.com/docs/guides/fine-tuning](https://platform.openai.com/docs/guides/fine-tuning)
    ⁠[1](#c349.xhtml#a41W)
  id: totrans-1384
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅OpenAI关于微调的文档。[https://platform.openai.com/docs/guides/fine-tuning](https://platform.openai.com/docs/guides/fine-tuning)
    ⁠[1](#c349.xhtml#a41W)
- en: HOW TO GET A GOOD FINE TUNE OF YOUR WRITING STYLE
  id: totrans-1385
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何获得良好的写作风格微调
- en: Once you have the resulting fine-tuned model, you can try it to see if it meets
    your needs.
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了微调后的模型，你可以尝试它看看是否符合你的需求。
- en: Like everything else, fine-tuning is an iterative process. Follow the instructions
    to create the fine tune and then evaluate its performance with test prompts. You’ll
    notice that even if you trained your fine tune with default temperature and topP
    values at 1.0 and 1.0, it tends to go a little nutty and might spit out gibberish
    at that temperature level. No one knows why. Perhaps squeezing the model with
    fine-tuning makes it less predictable. Therefore, I turned the parameters down
    to 0.7 and 0.7\. Some writers go even lower to get the fine-tuned model to follow
    instructions. (Note, if your fine-tuned model is repetitive, consider lowering
    the temperature but keeping the TopP higher to increase the diversity of responses).
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 就像其他所有事情一样，精调也是一个迭代的过程。按照说明创建精调，然后用测试提示来评估其性能。你会注意到，即使你使用默认的温度和topP值1.0和1.0来训练你的精调，它可能会变得有点疯狂，并可能在那个温度级别上吐出胡言乱语。没有人知道为什么。也许通过精调压缩模型使其变得不那么可预测。因此，我将参数降低到0.7和0.7。一些作家甚至更低，以使精调模型能够遵循指令。（注意，如果你的精调模型重复性过高，考虑降低温度但保持TopP较高，以增加响应的多样性）。
- en: Here are some tips to increase the usefulness of your fine-tuned model.
  id: totrans-1388
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些提高你精调模型有用性的提示。
- en: 'Finding the Right Data: Selecting the right training data is crucial for successful
    fine-tuning. You need enough examples that showcase your writing style and voice
    while ensuring consistency and quality throughout the dataset.'
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找合适的数据：选择合适的训练数据对于成功的精调至关重要。你需要足够的例子来展示你的写作风格和声音，同时确保整个数据集的一致性和质量。
- en: 'Prompt Engineering: Crafting effective prompts for fine-tuning is an art in
    itself. Experiment with different approaches to find what elicits the desired
    response from the AI and effectively guides its learning process. I’ve found out
    there are no “shortcuts,” just throwing data at the fine-tuning and hoping it
    sticks. The user prompt must be specific enough for the task but also general
    enough to adapt to how you will use the fine-tuned model. This is an area I’m
    still experimenting with—how regimented or loose can I make the User prompt fit
    the output while remaining flexible?'
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程：为精调制作有效的提示本身就是一门艺术。尝试不同的方法来找出能从AI那里获得期望的响应并有效引导其学习过程的方法。我发现没有“捷径”，只是把数据扔给精调并希望它能粘附在上面。用户提示必须足够具体以完成任务，但也要足够通用，以便适应你将如何使用精调模型。这是一个我仍在实验的领域——我如何使用户提示既规范又灵活，以适应输出？
- en: 'Iteration and Refinement: Fine-tuning is an iterative process. It often requires
    multiple attempts, adjustments to the training data, and experimentation with
    different parameters to achieve optimal results. There are all sorts of knobs
    and dials, like a number of epochs, training loss, and an entire “science” to
    understand. There are also considerations of sample size and overtraining to worry
    about.'
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代与精调：精调是一个迭代的过程。它通常需要多次尝试，调整训练数据，以及尝试不同的参数以达到最佳结果。有各种各样的旋钮和仪表盘，比如epoch数量、训练损失，以及一个完整的“科学”来理解。还需要考虑样本大小和过度训练等问题。
- en: 'Technical Expertise: If you are interested in writing style, you need to understand
    how to describe that writing style in a way that the particular LLM you are using
    describes it. Lexical choices, syntax, and other linguistic attributes matter.
    One of the Future Fiction Academy authors used a concordance tool (ANTCONC) to
    understand the frequency and context of his words so that he could have the AI
    tell him how his voice is described. The concordance tool lets him get a sense
    of his writing and provides a good description of his writing style.'
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 技术专长：如果你对写作风格感兴趣，你需要了解如何以特定LLM描述的方式描述那种写作风格。词汇选择、句法和其他语言属性都很重要。未来虚构学院的一位作者使用了一个一致工具（ANTCONC）来了解他词汇的频率和上下文，以便让AI告诉他他的声音是如何被描述的。一致工具让他对自己的写作有了感觉，并提供了他写作风格的良好描述。
- en: 'Epochs and Training Loss: Our datasets are typically an order of magnitude
    larger than the usual datasets. Our application is creative, so the usual discussion
    about the number of epochs and training loss doesn’t pertain. The only way to
    tell if a fine tune works for you is if it works for you. Epochs are the number
    of times your data is run through the fine-tune training, and training loss should
    decrease, meaning the fine-tune is getting more “accurate.” However, in fiction,
    more is not better. Presumably, you can keep training and training until training
    loss goes to close to zero. However, once it does that, it will converge to an
    “answer” it believes you want and keep repeating phrases like a parrot. In practice,
    our training loss is between 1.4 to 2.0, and we run 4 or 5 epochs. If the fine-tuning
    is too repetitive, it means you’ve overfitted your data, and you should run fewer
    epochs. However, if your training loss number is too high and you run a few epochs,
    your fine-tuned model might not differ from the base model.'
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: 时代和训练损失：我们的数据集通常比常规数据集大一个数量级。我们的应用是创造性的，因此关于时代数量和训练损失的常规讨论不适用。唯一能告诉你微调是否适合你的方法就是它是否适合你。时代是指你的数据通过微调训练的次数，训练损失应该下降，这意味着微调正在变得更加“准确”。然而，在小说中，更多并不总是更好。假设你可以继续训练，直到训练损失接近零。然而，一旦它做到了这一点，它将收敛到一个它认为你想要的“答案”，并像鹦鹉一样重复短语。在实践中，我们的训练损失在1.4到2.0之间，我们运行4或5个时代。如果微调过于重复，这意味着你对数据过度拟合，你应该运行更少的时代。然而，如果你的训练损失数字太高，你运行了几个时代，你的微调模型可能与基础模型没有太大区别。
- en: In the case of fiction, with our creativity and diversity of training data,
    fine-tuning is truly an art and not a science. As more powerful models allow users
    to fine-tune them, we may see a day when any author can personalize their AI writing
    assistant so that the output possesses their unique voice. In addition to tailoring
    by genre, I can see a day where fine tunes are selected for alternate points of
    view characters to reflect better how they speak within a novel. A fine tune of
    20 samples of 2000 words costs around $3.00, so it doesn’t break the bank. This
    is with GPT 3.5\. Once GPT 4 fine-tuning is generally available, its cost will
    likely be higher.
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 在小说的情况下，凭借我们的创造力和训练数据的多样性，微调确实是一门艺术，而不是科学。随着更强大的模型允许用户微调它们，我们可能会看到有一天任何作者都可以个性化他们的AI写作助手，以便输出具有他们独特声音的内容。除了按类型定制外，我可以看到有一天微调会被选来为不同的视角角色，以更好地反映他们在小说中的说话方式。20个2000字样本的微调大约需要3.00美元，所以它不会打破你的预算。这是在GPT
    3.5的情况下。一旦GPT 4微调普遍可用，其成本可能会更高。
- en: Therefore, it doesn’t hurt to give it a try. In the next chapter, I’ll show
    you how I created two fine tunes and my thinking around them.
  id: totrans-1395
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尝试一下并不会有什么坏处。在下一章中，我将向您展示我是如何创建两个微调以及我对它们的思考。
- en: ​[ ​37​ ]​
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: '[37]'
- en: MY FINE TUNE EXAMPLES
  id: totrans-1397
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我的微调示例
- en: SIMPLE FIRST-PERSON POV
  id: totrans-1398
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单的第一人称视角
- en: I did a simplified fine tune using 20 writing samples of 1000-2000 words from
    my romance novels. I selected scenes from a first-person point of view present
    tense.
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用了我浪漫小说中的20个1000-2000字的写作样本进行了简化的微调。我选择了第一人称现在时态的场景。
- en: 'SYSTEM: You are RachAyalaFirstPOVPres, clone of romance author Rachelle Ayala’s
    writing style in first person present tense point of view. Your job is to write
    romance novel prose in Rachelle’s style and voice.'
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 系统：您是RachAyalaFirstPOVPres，是浪漫主义作家Rachelle Ayala第一人称现在时态视角写作风格的克隆。您的任务是使用Rachelle的风格和声音撰写浪漫小说散文。
- en: 'USER: Write romance novel prose in Rachelle Ayala’s style in character’s first
    person present-tense point of view.'
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：以Rachelle Ayala的风格，以角色的第一人称现在时态视角撰写浪漫小说散文。
- en: 'ASSISTANT: {1000-2000 words scenes)'
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 助手：{1000-2000字场景)
- en: 'Result One:'
  id: totrans-1403
  prefs: []
  type: TYPE_NORMAL
  zh: 结果一：
- en: The result was writing that did not sound like ChatGPT, as the base model is
    GPT 3.5\. It wrote longer scenes than the base model. As a test, I had the fine-tuned
    model write a simple short story.
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是写作听起来不像ChatGPT，因为基础模型是GPT 3.5。它写的场景比基础模型更长。作为一个测试，我让微调模型写了一个简单的短篇小说。
- en: 'Parameters: Temperature=0.7, TopP=0.7'
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: 参数：温度=0.7，TopP=0.7
- en: 'SYSTEM: You are RachAyalaFirstPOVPres, clone of romance author Rachelle Ayala’s
    writing style in first person present tense point of view. Your job is to write
    romance novel prose in Rachelle’s style and voice.'
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: 系统：您是RachAyalaFirstPOVPres，是浪漫主义作家Rachelle Ayala第一人称现在时态视角写作风格的克隆。您的任务是使用Rachelle的风格和声音撰写浪漫小说散文。
- en: 'USER: Be RachAyalaFirstPovPres and write a romance short story with a twist.'
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：扮演RachAyalaFirstPovPres，写一个有转折的浪漫短篇小说。
- en: 'ASSISTANT (this is written by the fine-tune model):'
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 助理（这是由微调模型撰写的）：
- en: '[First-person present tense, Raya’s point of view]'
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: '[第一人称现在时，Raya的视角]'
- en: I have a knack for saving the most difficult for last. I scan the room of singles,
    all of them chatting, laughing, and having a good time. The women are all dressed
    up, while the men are in business casual, but not too casual. The DJ is playing
    soft rock and pop tunes, and everyone’s sipping on some kind of drink.
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一种习惯，总是把最难的留到最后。我扫视了一下单身人士的房间，他们都在聊天、大笑，玩得很开心。女士们打扮得很漂亮，而男士们则穿着商务休闲装，但并不太休闲。DJ正在播放轻摇滚和流行音乐，每个人都喝着某种饮料。
- en: My gaze lands on a man sitting alone at the bar. I don’t know why I didn’t notice
    him before. He’s not a bad-looking guy. In fact, he’s quite attractive with his
    black hair, muscular build, and sharp jawline. He’s wearing a button-up shirt
    with the sleeves rolled up to his elbows, and he has a glass of water in front
    of him.
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目光落在酒吧里独自坐着的一个人身上。我不知道为什么以前没有注意到他。他长得并不难看。事实上，他相当有魅力，黑发，肌肉发达，下巴线条清晰。他穿着一件翻领衬衫，袖子卷到肘部，面前放着一杯水。
- en: I take a deep breath and walk over to him. He glances at me but quickly looks
    away. He’s not interested, but that’s never stopped me before.
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 我深吸一口气，向他走去。他瞥了我一眼，但很快又移开了目光。他似乎不感兴趣，但那以前从未阻止过我。
- en: “Hi,” I say, taking the seat next to him.
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨，”我说着坐在他旁边的座位上。
- en: “Hi,” he replies without looking at me.
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨，”他回答，没有看我。
- en: I’m not one to give up so easily. I lean closer to him. “I’m Raya. What’s your
    name?”
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是那种轻易放弃的人。我向他靠得更近。“我是Raya，你叫什么名字？”
- en: “Derek,” he answers, still not making eye contact.
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: “德里克，”他回答，仍然没有直视我。
- en: I try to catch his gaze. “So, Derek, why are you sitting here all alone?”
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图吸引他的目光。“所以，德里克，你为什么一个人坐在这里？”
- en: He finally looks at me. His eyes are a dark brown, and they’re cold. “I’m waiting
    for someone.”
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: 他终于看着我。他的眼睛是深棕色，眼神冷淡。“我在等待某个人。”
- en: My heart sinks. “Oh. I see.”
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: 我的心沉了下去。“哦。我明白了。”
- en: I stand up and return to the singles’ area. I can’t let one rejection get me
    down. Besides, I’m not the only one who’s striking out. I see several other women
    who are also getting turned down by the men.
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: 我站起来，回到单身人士的区域。我不能让一次拒绝让我沮丧。此外，我不是唯一一个被拒绝的人。我看到还有几个女人也在被男士拒绝。
- en: I’m about to approach another man when the host calls for everyone’s attention.
    “Alright, everyone, it’s time for the first activity of the night. We’re going
    to play a little game I like to call Love Connection.”
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: 我正准备走向另一个男人时，主持人叫大家注意。“好了，大家，现在是晚上的第一个活动时间。我们要玩一个小游戏，我称之为‘爱情连接’。”
- en: A few people cheer while others groan. I fall into the latter category. I’ve
    played this game before, and it never ends well. But I can’t be the only one who’s
    a Debbie Downer. The host has a wheel with various activities written on it. He
    spins the wheel, and it lands on “blindfolded taste test.”
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 几个人欢呼，而其他人则发出呻吟声。我属于后者。我以前玩过这个游戏，但从来没有好结果。但我不可能是唯一一个“德比·唐纳”（Debbie Downer）的人。主持人有一个轮盘，上面写着各种活动。他转动轮盘，它停在了“蒙眼品酒”上。
- en: The host claps his hands together. “Alright, I need two volunteers to come up
    to the stage.”
  id: totrans-1423
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人拍拍手。“好了，我需要两位志愿者上台。”
- en: A woman and a man raise their hands, and they walk up to the stage. The host
    hands them each a blindfold. “Now, the woman will be blindfolded, and the man
    will feed her three different types of food. She has to guess what they are.”
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: 一个女人和一个男人举手，他们走上舞台。主持人给他们每人发了一个眼罩。“现在，这位女士将被蒙上眼睛，这位男士将喂她三种不同的食物。她必须猜出它们是什么。”
- en: The host hands the man a plate of food, and he takes a bite of one of the items.
    “This is some kind of fruit. It’s sweet and juicy.”
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人递给那位男士一盘食物，他咬了一口其中一样。“这是一种水果。它又甜又多汁。”
- en: The woman laughs. “That could be any fruit.”
  id: totrans-1426
  prefs: []
  type: TYPE_NORMAL
  zh: 那个女人笑了。“那可以是任何水果。”
- en: He takes another bite. “It’s red.”
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: 他又咬了一口。“是红色的。”
- en: “Strawberry,” she guesses.
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: “草莓，”她猜道。
- en: “Correct!” the host says. “Now, let’s move on to the next item.”
  id: totrans-1429
  prefs: []
  type: TYPE_NORMAL
  zh: “正确！”主持人说。“现在，让我们进行下一个项目。”
- en: I watch as the man feeds the woman a piece of celery and a piece of carrot.
    She guesses them both correctly. The host congratulates them and hands them each
    a raffle ticket. I can’t help but feel a little jealous. It must be nice to have
    a connection with someone.
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: 我看着他喂那位女士吃一根芹菜和一根胡萝卜。她正确地猜出了它们。主持人祝贺他们，给他们每人一张抽奖券。我不禁感到有些嫉妒。和某人建立联系一定很棒。
- en: The host spins the wheel again, and it lands on “speed dating.” A few people
    groan, but I don’t mind speed dating. I’ve actually had some success with it.
    I grab my glass of wine and walk over to the speed dating area. I take a seat
    at one of the tables, and a man sits across from me.
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: 主持人再次转动转盘，它停在了“速配”上。一些人抱怨，但我并不介意速配。实际上，我在速配中取得了一些成功。我拿起我的酒杯，走到速配区。我在一张桌子旁坐下，一位男士坐在我对面。
- en: “Hi, I’m Raya,” I say, holding out my hand.
  id: totrans-1432
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨，我是雷雅，”我说，伸出我的手。
- en: “Hi, I’m Peter,” he replies, shaking my hand.
  id: totrans-1433
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨，我是彼得，”他回应，和我握手。
- en: He seems nice enough. He has sandy blond hair and blue eyes. He’s wearing a
    polo shirt and khaki shorts. He’s not exactly my type, but I’m not going to be
    picky.
  id: totrans-1434
  prefs: []
  type: TYPE_NORMAL
  zh: 他看起来很和善。他有一头沙色的金发和蓝色的眼睛。他穿着一件Polo衫和卡其短裤。他不是我的类型，但我也不会挑剔。
- en: “So, Peter, what do you do?” I ask.
  id: totrans-1435
  prefs: []
  type: TYPE_NORMAL
  zh: “那么，彼得，你做什么工作？”我问。
- en: “I’m a physical therapist,” he answers. “I work with athletes.”
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: “我是物理治疗师，”他回答。“我负责与运动员一起工作。”
- en: “That’s cool,” I say. “I work in marketing.”
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: “那很酷，”我说。“我在市场营销工作。”
- en: We make small talk for a few minutes before the host blows the whistle. It’s
    time to move on to the next person. I rotate to the next table, and the man sitting
    across from me is the one who rejected me at the bar. Derek.
  id: totrans-1438
  prefs: []
  type: TYPE_NORMAL
  zh: 在主持人吹哨子之前，我们聊了几分钟。是时候轮到下一个人了。我转向下一张桌子，对面坐着的男士就是我在酒吧里被拒绝的那个人。德里克。
- en: “Fancy meeting you here,” I say with a forced smile.
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: “真没想到在这里遇见你，”我带着强颜欢笑说。
- en: He chuckles. “I could say the same to you.”
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 他笑了。“我也可以对你说同样的话。”
- en: We make awkward small talk for a few minutes before the whistle blows. It’s
    time to move on to the next person. The rest of the speed dating rounds go by
    in a blur. I meet a software engineer, a personal trainer, and a teacher. They’re
    all nice, but there’s no spark. I don’t feel that connection that everyone’s talking
    about.
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 在哨子吹响之前，我们尴尬地聊了几分钟。是时候轮到下一个人了。剩下的速配环节过得飞快。我遇到了一位软件工程师、一位私人教练和一位教师。他们都很好，但没有任何火花。我没有感觉到大家都在谈论的那种联系。
- en: After the last round of speed dating, the host announces that it’s time for
    the final activity of the night. “We’re going to play a little game I like to
    call Love Lockdown. Each woman will be handcuffed to a man for the next hour.”
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后一轮速配结束后，主持人宣布夜间的最后一项活动开始了。“我们要玩一个小游戏，我称之为‘爱情封锁’。接下来一个小时，每位女士都将被手铐铐在一个男士身上。”
- en: The women cheer while the men groan. I can’t help but feel sorry for them. They
    have no say in who they’re handcuffed to. The host hands out the handcuffs, and
    we’re all paired up. I’m paired with the software engineer. He’s a nice guy, but
    there’s no spark.
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 女士们欢呼，男士们则抱怨。我不禁同情他们。他们没有选择和谁被手铐铐在一起的权利。主持人分发手铐，我们都被配对了。我被配对到那位软件工程师。他是个好人，但我们之间没有火花。
- en: I look over at Derek, who’s paired with a woman who’s practically hanging off
    of him. She’s giggling and twirling her hair, and he’s smiling at her. I feel
    a pang of jealousy, but I quickly push it aside. It’s not like I’m interested
    in him. I’m just competitive, and I don’t like losing.
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 我看向德里克，他和一位几乎挂在他身上的女士配对。她咯咯笑着，扭动着头发，他微笑着看着她。我感到一阵嫉妒，但很快把它压了下去。我对他并不感兴趣。我只是竞争心强，不喜欢输。
- en: I try to make the best of the situation. The software engineer and I play a
    few rounds of trivia, and we win a few raffle tickets. But the whole time, I can’t
    help but steal glances at Derek. He and his partner are having a grand old time.
    They’re laughing and whispering to each other, and he has his arm around her.
  id: totrans-1445
  prefs: []
  type: TYPE_NORMAL
  zh: 我尽力使情况变得最好。我和那位软件工程师玩了几轮知识竞赛，赢了几张抽奖券。但整个过程中，我忍不住偷看德里克。他和他的搭档玩得很开心。他们在互相笑着低语，他搂着她的腰。
- en: I glance at the clock on the wall. There are only a few minutes left of the
    game. I need to make a move if I want to win the grand prize. I don’t even know
    what the grand prize is, but I have to win it. I can’t let Derek beat me.
  id: totrans-1446
  prefs: []
  type: TYPE_NORMAL
  zh: 我瞥了一眼墙上的钟。比赛只剩下几分钟了。如果我想赢得大奖，我必须采取行动。我甚至不知道大奖是什么，但我必须赢得它。我不能让德里克打败我。
- en: I lean over to the software engineer. “Do you mind if I take a bathroom break?”
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: 我转向那位软件工程师。“你介意我上个洗手间吗？”
- en: He shrugs. “Sure, go ahead.”
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: 他耸了耸肩。“当然，继续吧。”
- en: I stand up and walk over to Derek and his partner. “Hey, guys, do you mind if
    I cut in for a few minutes?”
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: 我站起来走到德里克和他的搭档那里。“嗨，伙计们，你们介意我插一脚几分钟吗？”
- en: His partner looks at me with a raised eyebrow, but she hands me the handcuff
    key. “Be my guest.”
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 他的搭档用怀疑的眼神看着我，但她递给我手铐钥匙。“请随意。”
- en: She stands up and takes the software engineer’s hand. “Let’s go get some drinks.”
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: 她站起来，拉起那位软件工程师的手。“我们去喝点东西吧。”
- en: Derek and I are left alone at the table. I can feel the tension between us.
    I don’t know why he’s getting to me so much. Maybe it’s the handcuffs. Or maybe
    it’s the fact that he rejected me earlier. I need to prove to him that I’m a catch.
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克和我被单独留在了桌旁。我能感觉到我们之间的紧张气氛。我不知道为什么他对我如此烦心。也许是因为手铐。或者也许是因为他之前拒绝了我。我需要向他证明我是个不错的选择。
- en: “So, Derek, why did you come to a singles event if you’re waiting for someone?”
    I ask.
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: “那么，德里克，既然你在等待某人，为什么还要来单身派对？”我问。
- en: He shrugs. “I’m not waiting for anyone in particular. I’m just here to have
    a good time.”
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: 他耸了耸肩。“我没有在等待特定的人。我只是来这里享受乐趣。”
- en: I narrow my eyes at him. “Then why did you reject me earlier?”
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 我瞪着他。“那么，你为什么之前要拒绝我？”
- en: He chuckles. “I didn’t reject you. I just told you I was waiting for someone.”
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: 他笑了笑。“我没有拒绝你。我只是告诉你我在等待某人。”
- en: I roll my eyes. “Semantics. So, are you having a good time?”
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: 我翻了个白眼。“语义学。那么，你玩得开心吗？”
- en: He looks at me, and his gaze is intense. “I am now.”
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: 他看着我，目光专注。“我现在是。”
- en: I feel my face flush, and I quickly look away. I can’t let him see that he’s
    getting to me. I change the subject. “So, do you come to these events often?”
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: 我感到脸红，我迅速地转开了头。我不能让他看到他在影响我。我改变了话题。“那么，你经常参加这类活动吗？”
- en: He shakes his head. “This is my first time. What about you?”
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 他摇了摇头。“这是我第一次。你呢？”
- en: I shrug. “I’ve been to a few. They’re hit or miss.”
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 我耸了耸肩。“我去过几个。有的成功，有的失败。”
- en: He smiles. “I’d say this one’s a hit.”
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 他笑了笑。“我觉得这次很成功。”
- en: I can’t help but smile back. He’s charming, I’ll give him that. I look at the
    clock on the wall. There are only a few seconds left of the game. I need to make
    a move if I want to win the grand prize.
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: 我忍不住也笑了。他很有魅力，我承认这一点。我看了一眼墙上的钟。游戏只剩下几秒钟了。如果我想赢得大奖，我必须采取行动。
- en: “Hey, Derek, do you want to be my partner for the grand prize?” I ask.
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，德里克，你愿意和我一起成为大奖的搭档吗？”我问。
- en: He raises an eyebrow. “What’s the grand prize?”
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: 他挑了挑眉毛。“大奖是什么？”
- en: “I have no idea, but I have to win it,” I say. “I’m competitive like that.”
  id: totrans-1466
  prefs: []
  type: TYPE_NORMAL
  zh: “我不知道，但我必须赢，”我说。“我就是这样竞争。”
- en: He laughs. “Alright, you’re on. What do we have to do?”
  id: totrans-1467
  prefs: []
  type: TYPE_NORMAL
  zh: 他笑了。“好吧，你开始了。我们得做什么？”
- en: The host walks up to the stage. “Alright, everyone, it’s time to announce the
    winners of the grand prize. The winning couple is the one that has the most raffle
    tickets. So, let’s see who the lucky winners are.”
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: 主人走上舞台。“好吧，大家，是时候宣布大奖的获奖者了。获奖的情侣是拥有最多抽奖券的那一对。那么，让我们看看幸运的获奖者是谁。”
- en: The host pulls a raffle ticket out of the bucket. “The winning couple has ten
    raffle tickets. Do we have any couples with ten raffle tickets?”
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 主人从桶里抽了一张抽奖券。“获奖的情侣有十张抽奖券。有没有哪对情侣有十张抽奖券？”
- en: The teacher raises her hand. “We have ten raffle tickets!”
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: 老师举起手。“我们有十张抽奖券！”
- en: The host pulls another ticket out of the bucket. “The winning couple has eleven
    raffle tickets. Do we have any couples with eleven raffle tickets?”
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: 主人又从桶里抽了一张抽奖券。“获奖的情侣有十一张抽奖券。有没有哪对情侣有十一张抽奖券？”
- en: The software engineer raises his hand. “We have eleven raffle tickets!”
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: 软件工程师举起手。“我们有十一张抽奖券！”
- en: I groan. I was so close to winning. I look over at Derek, but he only has six
    raffle tickets. There’s no way we can win. I slump in my chair, feeling defeated.
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 我叹了口气。我差点就赢了。我看了看德里克，但他只有六张抽奖券。我们不可能赢。我垂头丧气地坐在椅子上，感到很沮丧。
- en: The host pulls one more ticket out of the bucket. “The winning couple has twelve
    raffle tickets. Do we have any couples with twelve raffle tickets?”
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: 主人从桶里又抽了一张抽奖券。“获奖的情侣有十二张抽奖券。有没有哪对情侣有十二张抽奖券？”
- en: Derek and his partner raise their hands. “We have twelve raffle tickets!”
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克和他的伴侣举起手。“我们有十二张抽奖券！”
- en: I can’t believe it. Derek won. I glare at him, but he only grins back at me.
    The host hands them the grand prize, which is a gift card to a fancy restaurant.
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 我简直不敢相信。德里克赢了。我瞪着他，但他只是对我笑。主人把大奖——一张昂贵餐厅的礼品卡——交给了他们。
- en: “Congratulations to Derek and his lovely partner!” the host says. “I hope you
    have a wonderful time on your date.”
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: “恭喜德里克和他的可爱伴侣！”主人说。“希望你们约会愉快。”
- en: Derek’s partner takes the gift card and gives him a hug. I roll my eyes. Of
    course, she’s going to fall for him. He’s tall, dark, and handsome. He’s charming
    and charismatic. He’s everything a woman could want.
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克的搭档接过礼品卡，给了他一个拥抱。我翻了个白眼。当然，她会爱上他的。他高大、英俊、帅气。他迷人而有魅力。他拥有一个女性可能想要的一切。
- en: I stand up and uncuff myself from the software engineer. “Thanks for a great
    time.”
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 我站起来，摆脱了软件工程师的束缚。“感谢你给我带来这么愉快的时光。”
- en: He shrugs. “It was fun. Maybe we can do it again sometime.”
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 他耸了耸肩。“很有趣。也许我们可以找个时间再玩一次。”
- en: I force a smile. “Sure, I’ll see you around.”
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 我强颜欢笑。“当然，我会在附近见到你的。”
- en: I walk over to Derek and his partner. “Congratulations on winning the grand
    prize.”
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 我走到德里克和他的搭档身边。“恭喜你们赢得大奖。”
- en: “Thanks,” Derek says. “I have to give all the credit to my partner. She’s the
    real MVP.”
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: “谢谢，”德里克说。“我必须把所有的功劳归功于我的搭档。她是真正的MVP。”
- en: His partner giggles and twirls her hair. “Aw, thanks, Derek. You’re too sweet.”
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 他的搭档咯咯地笑，转动着她的头发。“哎呀，谢谢你，德里克。你太甜了。”
- en: I resist the urge to gag. They’re so nauseatingly cute. I can’t stand it. I
    need to get out of here before I lose my lunch. I grab my purse and make a beeline
    for the exit.
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 我抑制住想要呕吐的冲动。他们太恶心地可爱了。我受不了。我需要离开这里，否则我会吐的。我抓起我的钱包，直奔出口。
- en: “Raya, wait!” Derek calls after me.
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: “雷雅，等等！”德里克在我身后叫道。
- en: I ignore him and keep walking. I’m not going to give him the satisfaction of
    seeing me upset. I’m a strong, independent woman, and I don’t need a man to complete
    me.
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: 我忽略了他，继续往前走。我不想让他看到我生气。我是一个坚强独立的女性，我不需要男人来完整我。
- en: I push open the door and step outside. The cool night air hits me, and I take
    a deep breath. I pull out my phone and order a rideshare. I’m about to put my
    phone away when I get a notification. It’s a message from Derek.
  id: totrans-1488
  prefs: []
  type: TYPE_NORMAL
  zh: 我推开门，走了出去。凉爽的夜风扑面而来，我深深地吸了一口气。我拿出手机，叫了一辆共享乘车。我正要把手机收起来时，收到了一条消息。是德里克发来的。
- en: 'Derek: Raya, wait. I want to talk to you.'
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克：雷雅，等等。我想和你谈谈。
- en: I roll my eyes and type out a reply.
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 我翻了个白眼，回复了一条消息。
- en: 'Raya: There’s nothing to talk about. You won. Congratulations. Have a great
    time on your date.'
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 雷雅：没什么好说的。你赢了。恭喜你。祝你约会愉快。
- en: I put my phone away and cross my arms. A few minutes later, my rideshare pulls
    up. I climb into the backseat and sink down in my seat. I close my eyes and let
    out a deep breath. I can’t believe I let Derek get to me. I barely know him, and
    yet, I’m so hung up on him. I need to get over it and move on.
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 我把手机收起来，交叉双臂。几分钟后，我的共享乘车到了。我坐进后座，陷进座位里。我闭上眼睛，深深地呼出一口气。我简直不敢相信我让德里克影响到我。我几乎不认识他，然而，我却如此地挂念他。我需要克服它，继续前进。
- en: My phone pings with another message from Derek. I ignore it and put my phone
    on silent. I lean my head against the window and watch the city lights pass by.
    I’m lost in my thoughts when the driver pulls up to my apartment building. I thank
    him and climb out of the car.
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: 我的手机收到德里克发来的另一条消息。我忽略它，把手机调至静音。我把头靠在窗户上，看着城市灯光一闪而过。当司机把车停在公寓大楼前时，我感谢他并从车里出来。
- en: I take the elevator up to my floor and unlock my apartment door. I kick off
    my heels and flop down on the couch. I stare up at the ceiling, feeling sorry
    for myself. I’m about to reach for a pint of ice cream when I hear a knock on
    the door. I glance at the clock. It’s almost midnight. Who could be knocking on
    my door at this hour?
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
  zh: 我乘电梯上到我的楼层，打开公寓门。我脱下高跟鞋，扑通一声倒在沙发上。我抬头看着天花板，对自己感到抱歉。我正要伸手拿一桶冰淇淋时，听到门被敲响。我看了一眼时钟。快到午夜了。这个时间谁会来敲我的门呢？
- en: I walk over to the door and peer through the peephole. It’s Derek. What is he
    doing here? I debate whether or not to open the door. I should be strong and tell
    him to leave me alone. But my curiosity gets the better of me, and I unlock the
    door.
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
  zh: 我走到门口，透过猫眼向外看。是德里克。他怎么会在这里？我在犹豫是否要开门。我应该坚强地告诉他让他走开。但我的好奇心占了上风，我打开了门。
- en: “Derek, what are you doing here?” I ask.
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: “德里克，你在这里干什么？”我问。
- en: He holds up his phone. “I got a notification that you read my message, but you
    didn’t reply. I wanted to make sure you got home okay.”
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 他举起手机。“我收到通知说你看了我的消息，但你没有回复。我想确保你安全到家。”
- en: I raise an eyebrow. “You wanted to make sure I got home okay? Or did you just
    want to rub it in my face that you won?”
  id: totrans-1498
  prefs: []
  type: TYPE_NORMAL
  zh: 我扬起眉毛。“你是想确保我安全到家吗？还是只是想在我面前炫耀你赢了？”
- en: He winces. “Ouch. I deserved that. I’m sorry if I came on too strong. I just
    wanted to have a good time, and I thought you did too.”
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 他皱了皱眉。“哎哟。我活该。如果我觉得太唐突了，我很抱歉。我只是想玩得开心，我以为你也是。”
- en: I sigh. “I did have a good time. Until you won the grand prize with your partner.”
  id: totrans-1500
  prefs: []
  type: TYPE_NORMAL
  zh: 我叹了口气。“我确实玩得很开心。直到你和你的搭档赢得了大奖。”
- en: He steps closer to me. “She’s not my partner. You are.”
  id: totrans-1501
  prefs: []
  type: TYPE_NORMAL
  zh: 他向我靠近。“她不是我的搭档。你是。”
- en: I frown. “What do you mean? I thought the grand prize was the gift card to the
    fancy restaurant.”
  id: totrans-1502
  prefs: []
  type: TYPE_NORMAL
  zh: 我皱了皱眉。“你的意思是什么？我以为大奖是那张高档餐厅的礼品卡。”
- en: He shakes his head. “That’s not the real grand prize. The real grand prize is
    finding a connection with someone. And I found that connection with you.”
  id: totrans-1503
  prefs: []
  type: TYPE_NORMAL
  zh: 他摇了摇头。“那不是真正的大奖。真正的大奖是找到与某人的联系。而我找到了与你之间的联系。”
- en: I feel my heart flutter. “You did? Even though we only met tonight?”
  id: totrans-1504
  prefs: []
  type: TYPE_NORMAL
  zh: 我感觉到我的心在跳动。“你真的这么觉得？即使我们今晚才见面？”
- en: He nods. “I know it sounds crazy, but I can’t stop thinking about you. I felt
    something when we were talking. It was like we had this instant connection. And
    I want to see where it goes.”
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
  zh: 他点了点头。“我知道这听起来很疯狂，但我无法停止想你。当我们交谈时，我感到了一些东西。这就像我们有一种瞬间的联系。我想看看这会走向何方。”
- en: I take a step closer to him. “I felt it too. But what about your partner? She
    seemed pretty into you.”
  id: totrans-1506
  prefs: []
  type: TYPE_NORMAL
  zh: 我向他靠近一步。“我也感觉到了。但你的搭档呢？她看起来对你很感兴趣。”
- en: He shrugs. “I’m not interested in her. I’m interested in you. So, what do you
    say? Will you go out with me?”
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 他耸了耸肩。“我对她不感兴趣。我对你是感兴趣的。那么，你怎么说？愿意和我出去吗？”
- en: I look into his warm brown eyes, and I see the sincerity in them. I take a deep
    breath and make a decision. “Yes. I’d love to go out with you.”
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: 我看着他那温暖的棕色眼睛，看到了其中的真诚。我深吸了一口气，做出了决定。“是的。我很乐意和你出去。”
- en: He grins and takes my hand. “Great. How about tomorrow night? I’ll take you
    to that fancy restaurant with the gift card.”
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: 他微笑着，握住了我的手。“太好了。明天晚上怎么样？我会用这张礼品卡带你去那家高档餐厅。”
- en: I chuckle. “I’d like that. But I have to warn you, I have expensive taste.”
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: 我笑了笑。“我很乐意。但我必须警告你，我品味很高。”
- en: He smiles. “I can afford it. For you, it’s worth it.”
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: 他微笑着。“我负担得起。为了你，这是值得的。”
- en: I feel my cheeks flush, and I look down at my feet. He reaches out and tilts
    my chin up so that I’m looking into his eyes.
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: 我感到脸颊发烫，低头看着我的脚。他伸出手，将我的下巴抬起来，让我看着他的眼睛。
- en: “Raya, I know we just met, but I have a good feeling about this. I think you’re
    someone special, and I don’t want to let you go.”
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: “Raya，我知道我们才刚认识，但我感觉很好。我觉得你是个特别的人，我不想让你离开。”
- en: I smile, feeling a warmth spread through me. “I think you’re pretty special
    too. I’m excited to see where this goes.”
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 我微笑着，感觉到一股温暖在我体内蔓延。“我觉得你也很特别。我很期待看到这一切会如何发展。”
- en: He leans in, and I close my eyes. Our lips meet in a soft, sweet kiss. It’s
    like magic. I feel that spark everyone’s talking about. It’s like we were meant
    to be together. I know it sounds crazy, but sometimes, you just have to take a
    chance on love.
  id: totrans-1515
  prefs: []
  type: TYPE_NORMAL
  zh: 他靠了过来，我闭上了眼睛。我们的嘴唇在温柔而甜蜜的吻中相遇。这就像魔法。我感觉到每个人都在谈论的那种火花。这就像我们注定要在一起。我知道这听起来很疯狂，但有时候，你不得不在爱情上冒险。
- en: And that’s exactly what I’m going to do.
  id: totrans-1516
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是我打算做的事情。
- en: '[/First-person present tense, Raya’s point of view]'
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
  zh: '[/第一人称现在时，Raya的视角]'
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1518
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc4B5.jpg)'
- en: It’s not the best writing, but at least it doesn’t sound like ChatGPT, and that’s
    the point of the fine tune. One thing I notice is that all the dialogue is tagged,
    whereas my writing has more untagged dialogue to keep the scene moving. This could
    mean that I’ve made things too simple in that my user prompt didn’t give the LLM
    any guidance about the style or voice of the scene it is writing.
  id: totrans-1519
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是最好的写作，但至少它听起来不像ChatGPT，这就是微调的目的。我注意到的一件事是，所有的对话都被标记了，而我的写作中有更多未标记的对话来推动场景。这可能意味着我在那个用户提示中没有给LLM任何关于场景风格或声音的指导，使得事情变得过于简单。
- en: Another thing I noticed is repetitive sentence structure. Subject verse, subject
    verse. This is a problem of fine tunes in that they can become habituated to a
    particular style and not break loose. One reason is that we lowered both the Temperature
    and the TopP down from 1.0 to 0.7.
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: 我还注意到另一个问题是句子结构的重复。主语对主语。这是微调的问题，它们可能会习惯于某种特定的风格而无法突破。一个原因是我们将温度和TopP从1.0降低到了0.7。
- en: Did you notice it lost narrative logic? I could have sworn that Raya cut in
    and became Derek’s partner for the raffle ticket game, but somehow, she was back
    with the software engineer. Also, the host announced the winning couple three
    times, but this could just be a feature of the dating game. Nevertheless, these
    discrepancies show why AI (or at least the not-so-smart models like GPT-3.5) need
    to be edited and fact-checked.
  id: totrans-1521
  prefs: []
  type: TYPE_NORMAL
  zh: 你注意到它失去了叙事逻辑吗？我确信雷亚插进来，成为了德雷克的搭档，参加抽奖游戏，但不知何故，她又和软件工程师在一起了。此外，主持人三次宣布获胜的情侣，但这可能是约会游戏的一个特性。尽管如此，这些差异显示了为什么AI（至少是像GPT-3.5这样的不太智能的模型）需要编辑和事实核查。
- en: WRITING STYLE GUIDED FIRST-PERSON POV
  id: totrans-1522
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 写作风格指南：以第一人称视角为主
- en: Since the previous fine-tuning missed the mark, I decided to add more information
    to the user prompt. After all, I didn’t tell it what writing style to use to write
    the scene. This time, I’m going to add information to the user prompt.
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 由于之前的微调没有达到目标，我决定在用户提示中添加更多信息。毕竟，我没有告诉它应该使用什么写作风格来写场景。这次，我打算在用户提示中添加信息。
- en: Since I need to enter “style information” into the user prompt, I’ll need two
    passes through my writing samples.
  id: totrans-1524
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我需要将“风格信息”输入到用户提示中，我需要对我的写作样本进行两次遍历。
- en: In the first step, I’ll ask the LLM to describe the writing style. I use the
    same one I’m going to fine tune. After all, that LLM’s vocabulary is what I’m
    interested in.
  id: totrans-1525
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一步，我会让LLM描述写作风格。我使用的是我打算微调的相同风格。毕竟，LLM的词汇是我感兴趣的。
- en: 'Step 1:'
  id: totrans-1526
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步：
- en: 'Writing Style Description Prompt: Please analyze the writing style, tone, and
    voice and describe it in a paragraph of 300 words. Be sure to cover pacing, dialogue
    style, descriptive language, emotional tone, sentence structure, and vocabulary
    and diction.'
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 写作风格描述提示：请分析写作风格、语气和声音，并以300字的段落描述。务必涵盖节奏、对话风格、描述性语言、情感基调、句子结构和词汇及措辞。
- en: Collect all of these descriptions, and DO NOT EDIT them. This is what the LLM
    thinks. What we’re trying to do is to train the LLM with its own description of
    writing style so that the results match and make sense for that particular LLM.
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 收集所有这些描述，并且不要编辑它们。这是LLM的想法。我们试图通过LLM自己对写作风格的描述来训练LLM，以便结果与特定LLM匹配并具有意义。
- en: 'Step 2:'
  id: totrans-1529
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步：
- en: Create the fine-tune dataset with the following prompts. [You may modify to
    fit your use.]
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下提示创建微调数据集。[你可以根据需要修改。]
- en: 'SYSTEM: You are a creative writer able to write romance novel prose to match
    a given writing style.'
  id: totrans-1531
  prefs: []
  type: TYPE_NORMAL
  zh: 系统：你是一位能够写出符合给定写作风格的浪漫小说散文的创意作家。
- en: 'USER: Write romance novel prose in the writing style: {insert style description
    collected in step 1}'
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：用以下写作风格写浪漫小说散文：{在第一步中收集的风格描述}
- en: 'ASSISTANT: {insert the corresponding excerpt}'
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 助手：{插入相应的摘录}
- en: 'Result Two:'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次结果：
- en: 'Here is a romantic scene my fine-tune wrote (Temperature: 0.7, TopP: 0.7)'
  id: totrans-1535
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我微调写的浪漫场景（温度：0.7，TopP：0.7）
- en: 'SYSTEM: You are a creative writer able to write romance novel prose to match
    a given writing style.'
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 系统：你是一位能够写出符合给定写作风格的浪漫小说散文的创意作家。
- en: 'USER: Write a sweet romance short story in the writing style: {insert style
    description from one of the scenes}'
  id: totrans-1537
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：用以下写作风格写一个甜蜜的爱情短篇小说：{插入场景中的风格描述}
- en: 'ASSISTANT: (what follows below)'
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 助手：（以下内容）
- en: '[Brynn]'
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: '[布莱恩]'
- en: “Marry me, Brynn.”
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: “嫁给我，布莱恩。”
- en: I freeze, the buttercream-covered spatula hanging in mid-air. Did I hear him
    right? I turn around, and there’s Harrison, down on one knee, holding a small,
    black velvet box open.
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 我愣住了，黄油奶油覆盖的勺子悬在半空中。我听错了吗？我转过身，看到哈里森跪在地上，手里打开了一个小黑天鹅绒盒子。
- en: He’s grinning from ear to ear, his dimples on full display. His eyes are shining
    with so much love, and my heart melts right along with the buttercream in my hand.
  id: totrans-1542
  prefs: []
  type: TYPE_NORMAL
  zh: 他笑得合不拢嘴，酒窝显露无遗。他的眼睛里充满了如此多的爱意，我的心脏随着手中的黄油奶油融化。
- en: “Harrison.” I can’t even get out the words. I’m so surprised, I don’t know what
    to say. Or do. Or think. Or breathe.
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: “哈里森。”我甚至说不出话来。我太惊讶了，不知道该说什么。或者做什么。或者思考。或者呼吸。
- en: Is this really happening? Or am I hallucinating? Because this has got to be
    a dream come true. My dream. The one I never dared to dream because I never thought
    it could come true.
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: 这真的是在发生吗？还是我在幻想？因为这一定是梦想成真。我的梦想。我从未敢梦想，因为我从未想过它能成真。
- en: But here he is, my boyfriend, my man, my Harrison, with a ring in his hand,
    asking me to marry him. I’ve been waiting for this moment for so long, and now
    that it’s here, I’m completely at a loss for words.
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 但他就在这里，我的男朋友，我的男人，我的哈里森，手里拿着戒指，向我求婚。我已经期待这个时刻很久了，现在它来了，我完全找不到话说。
- en: He stands up, still grinning, and takes my buttercream-covered hand in his.
    “I love you, Brynn. I’ve loved you from the moment I first saw you. You’re the
    most amazing woman I’ve ever met, and you’re my best friend. I can’t imagine my
    life without you. Will you marry me?”
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: 他站起来，仍然面带微笑，握住我那涂满奶油的手。 “我爱你，布赖恩。从我第一次见到你的那一刻起，我就爱上了你。你是我在见过最棒的女人，你是我最好的朋友。我无法想象没有你的生活。你愿意嫁给我吗？”
- en: Tears fill my eyes, and my heart swells so much I’m afraid it might burst. “Oh,
    Harrison. I love you so much. Of course, I’ll marry you.”
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: 眼泪充满了我的眼睛，我的心膨胀得我害怕它可能会爆裂。“哦，哈里森。我爱你那么多。当然，我会嫁给你。”
- en: He slips the ring on my finger, and it fits perfectly. It’s a simple, elegant,
    round-cut diamond in a platinum setting. Just like Harrison, it’s understated,
    classic, and beautiful.
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: 他把戒指套在我的手指上，它完美地契合。这是一枚简单的、优雅的、圆形切割钻石，镶嵌在铂金上。就像哈里森一样，它低调、经典、美丽。
- en: I fling my arms around his neck, and he pulls me close, his mouth finding mine.
    I melt into him, kissing him with all the love and passion in my heart. I never
    want this moment to end.
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 我搂住他的脖子，他把我拉近，他的嘴唇找到了我的。我融化在他怀里，用我心中所有的爱和激情吻他。我永远不会想让这个时刻结束。
- en: But it does, all too soon, because my phone is ringing. I groan, and Harrison
    chuckles. “Let me guess. That’s your mom, calling for the hundredth time today.”
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: 但它确实很快就来了，因为我的手机响了。我叹了口气，哈里森咯咯地笑。“让我猜猜。那是你妈妈，今天已经第一百次打电话来了。”
- en: I glance at the phone screen. “Yup. She wants to know how the cake tasting is
    going.”
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 我看了一眼手机屏幕。“是的。她想知道蛋糕品尝进行得怎么样。”
- en: He laughs. “I’d better get back to work. I’m sure my mom’s calling me, too.
    I’m supposed to be picking out the tuxedos.”
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 他笑了。“我最好回去工作了。我敢肯定我妈妈也在打电话给我。我应该去挑选西装。”
- en: “Right. The tuxedos. I guess we should start planning the wedding, huh?”
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: “对了。西装。我想我们应该开始计划婚礼了，嗯？”
- en: He grins. “I can’t wait to marry you, Brynn. I love you so much.”
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 他微笑着。“我迫不及待地想和你结婚，布赖恩。我爱你那么多。”
- en: “I love you, too, Harrison.”
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: “我也爱你，哈里森。”
- en: We kiss one more time, and then he goes back to the kitchen, and I finish frosting
    the cake. I’m floating on a cloud of happiness, so happy I can’t stop grinning.
    I’m going to marry the man of my dreams. I’m going to be Mrs. Harrison Bailey.
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: 我们又亲吻了一次，然后他回到了厨房，我继续给蛋糕抹奶油。我像飘在幸福云朵上，如此快乐，我停不下来地笑。我将要嫁给我的梦中情人。我将要成为哈里森·贝利的太太。
- en: My phone rings again. I glance at the screen, and it’s my best friend, Zoe.
    I pick up. “Hey, girl. You’ll never guess what just happened.”
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 我的手机又响了。我看了一眼屏幕，是我的最好朋友，佐伊。我拿起电话。“嘿，女孩。你永远猜不到刚刚发生了什么。”
- en: “What? What? What?” she screeches in my ear. “Did he propose?”
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: “什么？什么？什么？”她在我的耳边尖叫。“他求婚了吗？”
- en: “Yes!” I squeal. “He proposed, and I said yes!”
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: “是的！”我尖叫。“他求婚了，我说我愿意！”
- en: “Oh my God, I’m so happy for you. How did he do it? Did he get down on one knee?
    Did he cry? Did you cry?”
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: “哦，我的天哪，我真是太为你感到高兴了。他是怎么做到的？他是跪下来求婚的吗？他哭了？你哭了？”
- en: I laugh. “Yes, he got down on one knee, and no, he didn’t cry. But I did. I’m
    such a sap.”
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: 我笑了。“是的，他跪了下来，而且不，他没有哭。但我哭了。我真是太感性了。”
- en: “Of course you cried. You’re such a romantic. Oh, I can’t wait to see the ring.
    Send me a picture. Wait, let me call your sister first. She’s going to be so jealous.”
  id: totrans-1562
  prefs: []
  type: TYPE_NORMAL
  zh: “当然你哭了。你真是太浪漫了。哦，我迫不及待想看到戒指。给我发张照片。等等，让我先给你妹妹打电话。她一定会很嫉妒。”
- en: I groan. “Don’t tell her yet. I want to tell her myself.”
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: 我叹了口气。“现在先不要告诉她。我想亲自告诉她。”
- en: “Fine. I’ll call her after you tell me all the juicy details. When’s the wedding?
    What’s the date? Have you started planning yet? Oh my God, this is so exciting.”
  id: totrans-1564
  prefs: []
  type: TYPE_NORMAL
  zh: “好吧。在你告诉我所有细节之后，我会给她打电话。婚礼什么时候举行？日期是什么？你开始计划了吗？哦，我的天哪，这真是太令人兴奋了。”
- en: “Whoa, whoa, slow down. He just proposed. We haven’t even set a date yet.”
  id: totrans-1565
  prefs: []
  type: TYPE_NORMAL
  zh: “哇，哇，慢点。他刚刚求婚了。我们甚至还没有定下日期。”
- en: “Are you going to have a big wedding or a small one? Do you want me to be your
    maid of honor? Are you going to ask your sister?”
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: “你打算举行一个盛大的婚礼还是一个小型的婚礼？你希望我做你的伴娘吗？你会邀请你的妹妹吗？”
- en: “I don’t know, Zoe. It just happened. I need to talk to Harrison first. We have
    to figure out what we both want.”
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: “我不知道，佐伊。这只是一场意外。我需要先和哈里森谈谈。我们必须弄清楚我们各自想要什么。”
- en: “Okay, okay, I’ll stop bombarding you with questions. I’m just so excited for
    you.”
  id: totrans-1568
  prefs: []
  type: TYPE_NORMAL
  zh: “好吧，好吧，我不会再连续问你问题了。我只是太为你感到兴奋了。”
- en: “I’m excited, too. I’m going to marry the man of my dreams.”
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: “我也很兴奋。我要嫁给我的梦中情人。”
- en: “You mean the man of your lists?”
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: “你是说你的清单上的男人？”
- en: I laugh. “Yes, the man of my lists. My lists worked, Zoe. I got everything I
    ever wanted.”
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: 我笑了。“是的，我的清单上的男人。我的清单有效了，佐伊。我得到了我想要的一切。”
- en: “I’m so happy for you, Brynn. You deserve it. You’ve been through so much. And
    I know your parents would be so proud of you.”
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: “布丽恩，我为你感到非常高兴。你值得拥有这一切。你已经经历了很多。我知道你的父母会为你感到非常骄傲。”
- en: I blink back tears. I still miss my parents every day. They were the best parents
    in the world, and they loved me so much. I wish they could be here to see this,
    to see me so happy.
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: 我眨了眨眼，流下了眼泪。我每天都想念我的父母。他们是世界上最好的父母，他们非常爱我。我希望他们能在这里看到这一切，看到我这么快乐。
- en: “I know they’re watching over me,” I say. “And I know they’re happy for me.”
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: “我知道他们在守护着我，”我说。“我知道他们为我感到高兴。”
- en: “I know they are. They’re probably planning the wedding in heaven.”
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: “我知道他们会。他们可能在天上计划着婚礼。”
- en: I giggle. “I bet they are. They’re probably arguing over what kind of cake we
    should have.”
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: 我咯咯地笑。“我敢打赌他们会的。他们可能正在争论我们应该有什么样的蛋糕。”
- en: “I’m so glad you found Harrison. He’s perfect for you. He’s so patient and understanding,
    and he really loves you.”
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: “我很高兴你找到了哈里森。他非常适合你。他非常耐心和体贴，而且他真的很爱你。”
- en: “I love him, too. He’s everything I ever wanted in a man.”
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: “我也爱他。他是我一直想要的男人。”
- en: “Have you told him about the lists yet?”
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: “你告诉他关于清单的事情了吗？”
- en: “No. Not yet. I will, though. I think it’s time.”
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: “不。还不是。不过我会的。我认为是时候了。”
- en: “Good. You need to be honest with him. It’s not fair to keep secrets. I’m sure
    he’ll understand.”
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: “很好。你必须对他诚实。保守秘密是不公平的。我相信他会理解的。”
- en: I sigh. “I hope so. I know he’s the one for me. I just don’t want to mess things
    up.”
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 我叹了口气。“我希望如此。我知道他就是我的人。我只是不想搞砸。”
- en: “You won’t mess things up. You’ve both grown so much, and you’ve been through
    so much together. You have a strong foundation. You’ll be fine.”
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: “你不会搞砸的。你们俩都成长了很多，而且你们一起经历了那么多。你们有一个坚实的基础。你会没事的。”
- en: “I hope so. I don’t want to lose him.”
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: “希望如此。我不想失去他。”
- en: “You won’t. Just be honest with him. You’ll see. Everything will be okay.”
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: “你不会的。只要对他诚实。你会看到的。一切都会好起来的。”
- en: “Thanks, Zoe. I’m so glad I have you in my life.”
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: “谢谢，佐伊。我很高兴我的生活中有你。”
- en: “Aw, I love you, too, Brynn. Now, spill. How did he propose? I want all the
    details.”
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: “哎呀，我也爱你，布丽恩。现在，说出来吧。他是怎么求婚的？我想知道所有的细节。”
- en: I smile, feeling like the luckiest woman in the world. “He proposed at the bakery.
    He got down on one knee while I was frosting a cake, and he told me how much he
    loved me and how he couldn’t imagine his life without me. And then he asked me
    to marry him.”
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 我微笑着，感觉自己是世界上最幸运的女人。“他在面包店向我求婚。当我正在给蛋糕抹奶油的时候，他跪了下来，告诉我他有多么爱我，以及他无法想象没有我的生活。然后他问我是否愿意嫁给他。”
- en: “That’s so sweet. And so perfect. I’m so happy for you.”
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: “真是太甜蜜了。太完美了。我为你感到非常高兴。”
- en: “I’m happy, too. I can’t wait to start planning the wedding.”
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: “我也很高兴。我迫不及待地开始计划婚礼。”
- en: “Ooh, are you going to be a bridezilla?”
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: “哦，你会变成一个新娘狂吗？”
- en: I laugh. “I hope not. I want everything to be perfect, but I don’t want to be
    one of those crazy brides. I just want to enjoy the process and make sure everything
    is exactly the way I want it.”
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: 我笑了。“我希望不是。我希望一切都能完美，但我不想成为一个疯狂的新娘。我只是想享受这个过程，并确保一切都能如我所愿。”
- en: “Of course, you do. You’re Brynn. You have to have everything your way.”
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: “当然，你会的。你是布丽恩。你必须按照你的方式得到你想要的一切。”
- en: I stick my tongue out at her, even though she can’t see me. “Shut up. I’m not
    that bad.”
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 我对她做了个鬼脸，尽管她看不到我。“闭嘴。我还没那么糟糕。”
- en: “Uh-huh. Sure, you’re not. You know, you could always use the lists for planning
    the wedding. List everything you want, and then prioritize them. It’s the perfect
    way to make sure you get everything you want.”
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: “嗯哼。当然，你不是。你知道，你可以总是用清单来计划婚礼。列出你想要的一切，然后优先排序。这是确保你得到你想要的一切的完美方式。”
- en: I groan. “I’m not going to let you live that down, am I?”
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: 我叹了口气。“我不会让你那么做的，对吧？”
- en: “Not a chance. I’m going to remind you every chance I get. You have to admit,
    the lists worked.”
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: “绝对不可能。我会抓住每一个机会提醒你。你必须承认，清单有效了。”
- en: I roll my eyes. “Fine, fine. The lists worked. Happy now?”
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: 我翻了个白眼。“好吧，好吧。清单有效了。现在开心了吗？”
- en: “Ecstatic. I can’t wait to see you walk down the aisle and say ‘I do.’”
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: “太兴奋了。我迫不及待地想看到你走过红毯，说出‘我愿意’。”
- en: “I can’t wait, either. I’m going to be Mrs. Harrison Bailey. It’s a dream come
    true.”
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: “我也迫不及待了。我要成为哈里森·贝利夫人。这是梦想成真。”
- en: “I’m so happy for you, Brynn. You deserve all the happiness in the world.”
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: “我为你的幸福感到高兴，布莱恩。你值得世界上所有的幸福。”
- en: “Thanks, Zoe. I love you, girl.”
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: “谢谢，佐伊。我爱你，女孩。”
- en: “I love you, too. Now, go call your sister. She’s going to be so excited for
    you.”
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: “我也爱你。现在，去叫你的妹妹。她一定会为你感到非常兴奋。”
- en: “Okay, okay. I’ll call her. Talk to you later.”
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: “好吧，好吧。我会给她打电话。待会儿再聊。”
- en: I hang up and stare at the ring on my finger. I can’t believe I’m engaged. I
    can’t believe I’m going to marry Harrison. I can’t believe I’m going to be Mrs.
    Harrison Bailey.
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 我挂断电话，盯着手指上的戒指。我无法相信我订婚了。我无法相信我将要嫁给哈里森。我无法相信我将要成为哈里森·贝利夫人。
- en: I’m so happy, I can’t stop grinning. I finish frosting the cake, and then I
    take a picture of it and text it to Harrison.
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: 我太高兴了，我停不下来地笑。我完成了蛋糕的装饰，然后我拍了一张照片，并发短信给哈里森。
- en: The cake looks delicious, he texts back. Can’t wait to eat it.
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
  zh: 他回短信说蛋糕看起来很美味，迫不及待想吃。
- en: Me, too. I can’t wait to be your wife, I text back.
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 我也是。我迫不及待地想成为你的妻子，我回短信说。
- en: I can’t wait to make you mine, he texts.
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: 我迫不及待地想让你成为我的，他发短信说。
- en: '[/Brynn]'
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: '[/Brynn]'
- en: '![](image_rsrc4B5.jpg)'
  id: totrans-1611
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc4B5.jpg)'
- en: This sample has many more untagged dialogue samples, which are in my style.
    I think adding the writing style guidance made the LLM understand a little more
    of what snappy dialogue means. It still tends to use the same sentence structure,
    and it loses narrative logic. But I didn’t provide a scene brief or plan, so the
    LLM winged it. Besides, under the hood, it is still GPT-3.5, even though it no
    longer writes like ChatGPT.
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 这个样本有更多未标记的对话样本，它们都是我的风格。我认为添加写作风格指南让LLM对俏皮对话的含义有了更深的理解。它仍然倾向于使用相同的句子结构，并且失去了叙事逻辑。但我没有提供场景简报或计划，所以LLM就自行发挥了。此外，在底层，它仍然是GPT-3.5，尽管它不再像ChatGPT那样写作。
- en: 'I’ll use it for a few days and see how I like it, but I believe I found a way
    to make a fine tune without the lexical analysis and concordance work that gives
    you the very best fine tunes. For that, please see the video from Future Fiction
    Academy. “How to Build a Fine Tune for Fiction: Tips & Tricks” ([https://www.youtube.com/watch?v=ctNys4Jl6ME](https://www.youtube.com/watch?v=ctNys4Jl6ME))
    ⁠[1](#c349.xhtml#a42F)'
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 我会用它几天，看看我喜不喜欢，但我相信我找到了一种方法，可以在不进行词汇分析和词频统计的情况下进行微调，这可以给你带来最好的微调效果。关于这一点，请看未来虚构学院的视频：“如何为虚构作品构建微调：技巧与窍门”
    ([https://www.youtube.com/watch?v=ctNys4Jl6ME](https://www.youtube.com/watch?v=ctNys4Jl6ME))
    [1](#c349.xhtml#a42F)
- en: Future Fiction Academy Rexy has an “LLM Tuner” ([https://rexy.futurefictionacademy.com/LLM_Tuner](https://rexy.futurefictionacademy.com/LLM_Tuner)
    ⁠[2](#c349.xhtml#a45F) ) where you can enter your System, User, and Assistant
    messages in text boxes. It will generate a JSONL file. You can also load from
    CSV and edit an existing JSONL file. Then, you can save and download the new JSONL
    file and put it into the OpenAI fine-tune page. (Rexy requires a membership at
    the FFA.)
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: 未来虚构学院Rexy有一个“LLM微调器”([https://rexy.futurefictionacademy.com/LLM_Tuner](https://rexy.futurefictionacademy.com/LLM_Tuner)
    [2](#c349.xhtml#a45F))，你可以在文本框中输入你的系统、用户和助手消息。它将生成一个JSONL文件。你也可以从CSV加载并编辑现有的JSONL文件。然后，你可以保存并下载新的JSONL文件，并将其放入OpenAI微调页面。（Rexy需要FFA的会员资格。）
- en: ​[ ​PART 7​ ]​
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: '[第7部分]'
- en: YOUR AI-ENABLED SECOND BRAIN
  id: totrans-1616
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你的AI赋能的第二大脑
- en: '![group of writers tending to their garden](image_rsrc4BD.jpg)'
  id: totrans-1617
  prefs: []
  type: TYPE_IMG
  zh: '![一群作家照料他们的花园](image_rsrc4BD.jpg)'
- en: ​[ ​38​ ]​
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: '[38]'
- en: WHY YOU NEED AN AI-ENABLED SECOND BRAIN
  id: totrans-1619
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么你需要一个AI赋能的第二大脑
- en: If you’re like me and you’ve written one or many books, you’ve often wished
    to have a second brain—a way to organize your books, series, characters, and plots
    in a way where you can easily retrieve information. You might vaguely remember
    that a particular clue was hidden in plain sight but can’t find the location,
    or you’ve forgotten the eye color of a minor character.
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我一样，你已经写了一本或多本书，你常常希望能有一个第二大脑——一种以你可以轻松检索信息的方式组织你的书籍、系列、角色和情节的方法。你可能模糊地记得某个线索被隐藏在显而易见的地方，但找不到位置，或者你忘记了某个小角色的眼睛颜色。
- en: Some of you were organized and provided breadcrumbs to yourself through character
    spreadsheets, plot summaries, and world-building lore books. However, no matter
    how meticulous you were, there are details you never thought you’d need ten books
    down, and now you’re doing word searches through your manuscript to find the passage
    and context.
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人很有条理，通过角色表格、情节摘要和世界构建传说书籍为自己留下了线索。然而，无论你多么细致，总有一些你从未想过会在十本书之后需要的细节，现在你正在你的手稿中搜索单词，以找到那段文字和上下文。
- en: Others have put everything into databases or organized Scrivener files, Notion
    pages, and every other tool. However, there’s a big problem.
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 其他一些人将所有内容都放入数据库或组织 Scrivener 文件、Notion 页面和其他各种工具中。然而，有一个大问题。
- en: By nature, you had to pick and choose what you thought was relevant at the time
    to record. I mean, you’re not going to put in a walk-in character or an event
    meant to add humor or color to a scene. And that’s the trouble with most second-brain
    schemes.
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，你必须挑选你认为当时相关的信息进行记录。我的意思是，你不会把一个路过的角色或旨在为场景增添幽默或色彩的事件放进去。这就是大多数第二大脑计划的问题所在。
- en: Wouldn’t you like to have an expert who can suck in your entire novel or even
    your whole series and be able to answer questions accurately—and not just general
    questions, but find that needle in the haystack and then go to the place and show
    it to you? How about a series expert who can not only tell you about your details
    but also suggest characters and plot lines to expand your series in ways that
    will delight your readers?
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否希望拥有一个能够吸收你整部小说甚至整个系列并能够准确回答问题的专家——而不仅仅是泛泛的问题，还能找到那根针海中的线，然后带你到那里展示给你？想象一下一位系列专家，他不仅能告诉你细节，还能建议角色和情节线以使你的系列以令读者愉悦的方式扩展？
- en: How about a brain that can pull together plot threads spread across large distances?
    Perhaps this walk-on character was only mentioned in three places far apart but
    held the clue that solved the mystery. Or there’s a piece of arcane magic that
    was foreshadowed five books back, and there are glimmers of its power, but no
    actual plot turns around it. This world expert will be fluent in any language,
    magic, cultural traditions, and the taxonomy of your characters and social and
    physical systems. It can keep track of everything and suggest the evolution of
    your world or the development of new technologies. Imagine if Tolkien had such
    a world-keeper.
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下一个能够将散布在广阔距离上的情节线索汇集起来的大脑？或许这个路过的角色只在三个相隔甚远的地方被提及，但持有解开谜团的线索。或者有一段神秘的魔法在五本书之前就已经预示，它的力量有所显现，但围绕它的实际情节转折却不多。这位世界级专家将精通任何语言、魔法、文化传统以及你角色的分类和社会物理系统。它可以追踪一切，并建议你世界的演变或新技术的开发。想象一下，如果托尔金有这样的世界守护者。
- en: The possibilities are endless. You can even give abandoned manuscripts to this
    Second Brainiac Story Doctor and have it suggest ways to fix up your story, and
    of course, you can have it help you with your work in progress.
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: 可能性是无限的。你甚至可以将废弃的手稿交给这位第二大脑故事医生，让它建议如何修复你的故事，当然，你也可以让它帮助你处理正在进行中的工作。
- en: Get excited because today’s AI LLMs can give you a “living” second brain. And
    no, it’s not as hyped as it was a few months ago, before Google released Gemini
    1.5 Pro, a sparse mixture-of-experts multimodal LLM capable of recalling and reasoning
    across a million words.
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: 令人兴奋的是，今天的 AI LLM 可以为你提供一个“活”的第二大脑。不，它不像几个月前 Google 发布 Gemini 1.5 Pro 之前那样炒作，Gemini
    1.5 Pro 是一种稀疏的专家混合模态 LLM，能够回忆和推理百万字的内容。
- en: Take a breath.
  id: totrans-1628
  prefs: []
  type: TYPE_NORMAL
  zh: 深吸一口气。
- en: Before I talk about Gemini Pro 1.5’s capabilities, let’s go back to the recent
    past and the limitations of traditional tools and specially designed long-context
    window LLMs that use Retrieval Augmented Generation (RAG).
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 在我谈论 Gemini Pro 1.5 的功能之前，让我们回顾一下最近过去以及传统工具和特别设计的长上下文窗口 LLM（使用检索增强生成 RAG）的限制。
- en: THE LIMITATIONS OF TRADITIONAL STORY OR SERIES BLUEPRINT TOOLS
  id: totrans-1630
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传统故事或系列蓝图工具的局限性
- en: A month ago, when I was planning this book, I had a list of tools I would talk
    about. The usual suspects are AI-enhanced Notion and special applications like
    Novelcrafter, which has a Codex where you can store story information. I was going
    to talk about large-at-the-time-context-window LLMs like Claude 3 (200k tokens),
    GPT4 (128K tokens), and mention methods of uploading one chapter at a time and
    having AI summarize and pull out characters, settings, events, actions and put
    them in documents.
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: 一个月前，当我计划这本书时，我有一份将要讨论的工具清单。常见的候选者包括增强型 AI 的 Notion 和像 Novelcrafter 这样的特殊应用，它有一个
    Codex，你可以存储故事信息。我本打算讨论当时的大型上下文窗口 LLM，如 Claude 3（200k 令牌）、GPT4（128K 令牌），并提及一次上传一章，让
    AI 概括并提取角色、场景、事件、行动，并将它们放入文档中的方法。
- en: However, all of these methods had one big red flag. What was NOT saved is lost.
    Obvious, right? Summarization necessarily takes what was deemed necessary at the
    time and loses the rest of the information. The main characters are saved. Their
    motivation and goals are summarized. Settings turn into one-liners. Richness is
    lost.
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，所有这些方法都有一个很大的红旗。没有保存的是什么就丢失了。显然，对吧？摘要必然要保留当时认为必要的部分，而丢失其余的信息。主要角色被保存了。他们的动机和目标被总结。场景变成了单行描述。丰富性丢失了。
- en: Late last year, LLMs were released with an improvement called Retrieval Augmented
    Generation (RAG). A lot of us got excited. It was supposed to retrieve needles
    in haystacks and offer a glimmer of hope for authors seeking a more efficient
    and reliable way to manage their creative work.
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 去年年底，发布了改进后的LLM，称为检索增强生成（RAG）。我们中的许多人感到兴奋。它原本旨在从乱麻中找出针，为寻求更高效和可靠方式管理其创作工作的作者提供一线希望。
- en: Unfortunately for authors but not for other applications, RAG relies on summaries
    and extracted keywords, which proved disappointing for fiction writers because
    it failed at providing detailed chapter-by-chapter outlines.
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，对于作者来说如此，但对于其他应用来说并非如此，RAG依赖于摘要和提取的关键词，这对于小说作家来说令人失望，因为它未能提供详细的章节大纲。
- en: The problem with RAG is that information is lost in summarization, just like
    when you manually update your spreadsheets and second-brain databases. RAG typically
    uses keyword extraction or summarization techniques to create a condensed version
    of your work. This process is similar to how a SparkNotes summary can’t capture
    the full richness of a classic novel.
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: RAG的问题在于，信息在摘要过程中丢失，就像你手动更新电子表格和第二大脑数据库时一样。RAG通常使用关键词提取或摘要技术来创建你作品的浓缩版本。这个过程类似于SparkNotes摘要无法捕捉经典小说的全部丰富性。
- en: 'Here’s how missing details can impact your writing:'
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是缺少细节如何影响你的写作：
- en: 'Plot Holes and Inconsistencies: Forgetting or overlooking details can lead
    to plot holes, where events don’t follow logically or contradict previously established
    information.'
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: 情节漏洞和不一致：忘记或忽略细节可能导致情节漏洞，其中事件不符合逻辑或与之前建立的信息相矛盾。
- en: 'Character Inconsistencies: If the AI doesn’t have access to the complete picture
    of a character’s development, it might generate content that contradicts their
    established personality, motivations, or relationships. This can make characters
    feel inconsistent and unbelievable.'
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 角色不一致性：如果AI无法获取角色的完整发展图景，它可能会生成与角色已建立的性格、动机或关系相矛盾的内容。这会使角色显得不一致和不可信。
- en: 'World-Building Errors: Missing details about the world’s history, geography,
    culture, or magic system can lead to inconsistencies and confusion. This can weaken
    the world-building and make it difficult for readers to immerse themselves in
    the story fully.'
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 世界构建错误：缺少关于世界历史、地理、文化或魔法系统的细节可能导致不一致和混淆。这会削弱世界构建，使读者难以完全沉浸在故事中。
- en: While RAG can be helpful for some tasks, it’s not ideal for maintaining consistency
    and continuity in complex narratives. Native large context models like Gemini
    1.5 Pro, which can directly analyze and understand the full text of your work,
    offer a more reliable solution for authors who want to ensure the accuracy and
    consistency of their fictional universes.
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然RAG对于某些任务可能有帮助，但它并不适合在复杂叙事中保持一致性和连贯性。像Gemini 1.5 Pro这样的本地大上下文模型，可以直接分析和理解你作品的全部文本，为希望确保其虚构宇宙准确性和一致性的作者提供更可靠的解决方案。
- en: WHY I’M IN LOVE WITH GEMINI 1.5 PRO
  id: totrans-1641
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我为什么爱上Gemini 1.5 Pro
- en: Imagine you have a friend who reads tons of books and remembers every detail,
    even from years ago. Furthermore, your bookworm friend can come up with new insights
    based on the content of your books and she’s always ready to brainstorm and analyze,
    day or night. Wait no longer, because Gemini 1.5 Pro is here.
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你有一个朋友阅读了大量的书籍，并且记得每一个细节，甚至是从几年前的事情。此外，你的书虫朋友可以根据你书籍的内容提出新的见解，她随时准备头脑风暴和分析，无论白天还是夜晚。无需再等待，因为Gemini
    1.5 Pro已经到来。
- en: 'Here are her capabilities in a nutshell:'
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 这里简要介绍一下她的能力：
- en: She can hold your books up to a million tokens or 750,000 words in her memory
    in total, not in part, and she can retrieve information, no matter how obscure
    it is and where it’s tucked. She has perfect “needle in a haystack” retrieval
    of up to 530,000 tokens or approximately 400,000 words and 99.7% retrieval of
    up to a million tokens or 750,000 words.
  id: totrans-1644
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她可以在她的记忆中保存你的书籍，总共可达一百万个标记或750,000个单词，而不是部分保存，并且她可以检索信息，无论信息多么晦涩难懂，无论它藏在何处。她具有完美的“大海捞针”检索能力，可达530,000个标记或大约400,000个单词，并且高达99.7%的检索率可达一百万个标记或750,000个单词。
- en: She doesn’t need to cram or study summaries or snippets of your work because
    Gemini 1.5 Pro can read and understand your entire book or series.
  id: totrans-1645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她不需要死记硬背或研究你的工作总结或片段，因为Gemini 1.5 Pro可以阅读并理解你整本书或系列。
- en: She can also learn in context, meaning she is not relying on her training dataset
    to pull together concepts. This means she can reason with you about your work
    in progress or across your entire series, even if it is not yet published and
    is unknown in her training dataset.
  id: totrans-1646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她还可以在上下文中学习，这意味着她不依赖于她的训练数据集来整合概念。这意味着她可以就你正在进行的作品或整个系列与你进行推理，即使它尚未出版，在她的训练数据集中也是未知的。
- en: Because she is multimodal, you can upload photographs, images, maps, videos,
    and other material into your personal knowledge base. She can read maps, plan
    road trips for your characters, and even suggest a wardrobe based on a combination
    of your descriptions and the images you uploaded.
  id: totrans-1647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因为她是多模态的，你可以将照片、图像、地图、视频和其他材料上传到你的个人知识库中。她可以阅读地图，为你的角色规划公路旅行，甚至可以根据你的描述和上传的图像建议一套服装。
- en: She never sleeps. Ask anything, anytime. Forgot a character’s eye color from
    book one? Need to check if a plot point in book five contradicts something from
    book two? No problem! Worried that your character is acting inconsistently? She
    can point it out and also suggest why your character, who was shy in book 1, is
    now a public speaker in book 5.
  id: totrans-1648
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 她从不睡觉。随时提问。忘记了第一本书中角色的眼睛颜色？需要检查第五本书中的情节点是否与第二本书中的内容矛盾？没问题！担心你的角色行为不一致？她可以指出并建议为什么在第一本书中害羞的角色现在在第五本书中成为公众演讲者。
- en: 'Okay, I’m sure you’re dying to try it out. Here is the URL: [https://aistudio.google.com](https://aistudio.google.com)
    ⁠[1](#c349.xhtml#a45G)'
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，我敢肯定你迫不及待想要尝试它。以下是网址：[https://aistudio.google.com](https://aistudio.google.com)
    [1](#c349.xhtml#a45G)
- en: 'Here is an article to help you understand the capabilities of utilizing the
    entire context window without using RAG: “Gemini 1.5: Unlocking multimodal understanding
    across millions of tokens of context” ([https://storage.googleapis.com/deepmind-media/gemini/gemini_v1_5_report.pdf](https://storage.googleapis.com/deepmind-media/gemini/gemini_v1_5_report.pdf))
    ⁠[2](#c349.xhtml#a48T)'
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一篇文章可以帮助你了解在不使用RAG的情况下利用整个上下文窗口的能力：“Gemini 1.5：解锁数百万个上下文标记的多模态理解” ([https://storage.googleapis.com/deepmind-media/gemini/gemini_v1_5_report.pdf](https://storage.googleapis.com/deepmind-media/gemini/gemini_v1_5_report.pdf))
    [2](#c349.xhtml#a48T)
- en: ​[ ​39​ ]​
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: '[39]'
- en: USE CASES FOR YOUR SECOND BRAIN
  id: totrans-1652
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二大脑的应用场景
- en: The first use case is to use Gemini 1.5 Pro to generate a story or series blueprint.
    She can easily create a list of characters, plot points, and settings, giving
    you a clear overview of your story’s structure.
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个应用场景是使用Gemini 1.5 Pro生成故事或系列蓝图。她可以轻松创建角色列表、情节点和场景，为你提供故事结构的清晰概述。
- en: Once you have your generated Story Blueprint, you should immediately review
    it while the details are still fresh in your mind. Gemini, like other Language
    Models (LLMs), is a generative tool and not a data retrieval system, so she might
    make up information or introduce inconsistencies. Correct anything wrong before
    putting the information into your content management system.
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了生成的故事蓝图，你应该立即审查它，因为细节仍然在你的脑海中清晰。Gemini，像其他语言模型（LLM）一样，是一个生成工具，而不是数据检索系统，所以她可能会编造信息或引入不一致性。在将信息放入你的内容管理系统之前，纠正任何错误。
- en: However, Gemini’s capabilities extend far beyond generating a Story Blueprint.
    One of the significant advantages of using Gemini is her ability to answer questions
    about the generated content. If you come across any questionable information in
    the Story Blueprint, you can ask Gemini to clarify and tell you which chapter
    she got the purported information from. This is possible because the entire book
    or series remains within Gemini’s context window.
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，Gemini的能力远不止生成故事蓝图。使用Gemini的一个显著优势是她能够回答关于生成内容的问题。如果你在故事蓝图中发现任何可疑信息，你可以询问Gemini进行澄清，并告诉她她是从哪一章得到所谓信息的。这是因为整本书或系列都保持在Gemini的上下文窗口内。
- en: While Gemini 1.5 Pro can easily provide you with a Story Blueprint so you can
    see your story at a glance, that’s not all she can do. Oh no, she’s capable of
    reaching into greater depth than a mere list of characters, plot points, and settings.
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然1.5 Pro的Gemini可以轻松为你提供一个故事蓝图，让你可以一目了然地看到你的故事，但这并不是她能做的全部。哦，不，她能够深入到仅仅是一系列角色、情节点和场景的列表之上的深度。
- en: 'Gemini 1.5 Pro can help you with unpublished works because of her ability to
    learn from the information placed inside her context window. You can upload several
    documents. Imagine uploading not only your work in progress but perhaps articles
    consisting of research or genre-specific plot structures. Since I’m the author
    of Romance in a Month or Dangerous Love: Writing a Romantic Suspense, I can upload
    a copy of my book as a guidebook along with my work in progress and Gemini will
    look across these documents to help me apply the principles of one book to the
    next.'
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 1.5 Pro可以帮助你处理未发表的作品，因为她能够从她上下文窗口中放置的信息中学习。你可以上传几份文档。想象一下，你不仅上传了正在进行的作品，也许还有包含研究或特定类型情节结构的文章。由于我是《一个月的浪漫》或《危险的爱情：写浪漫悬疑》的作者，我可以上传我的书的副本作为指南，并与我的工作进度一起上传，Gemini将跨这些文档来帮助我将一本书的原则应用到另一本书上。
- en: She can act as a Story Doctor or a critique partner. I can upload a style guide,
    for example, and query my book against a publishing house’s style guide. Even
    better, any prompts or ideas I suggest in the conversation are worked into Gemini’s
    context memory and incorporated into future reasoning and responses.
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: 她可以充当故事医生或评论伙伴。我可以上传一个风格指南，例如，并将我的书与出版社的风格指南进行对比。更好的是，我在对话中提出的任何提示或想法都会被整合到Gemini的上下文记忆中，并纳入未来的推理和回答。
- en: I can have a critique partner who refines her critiques by listening to my explanations
    and comparing them with my work in progress and research materials, as well as
    any writing books I use as references.
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以有一个评论伙伴，通过聆听我的解释并将它们与我正在进行的作品和参考资料以及我用作参考的任何写作书籍进行比较来完善她的评论。
- en: WORK IN PROGRESS ANALYSIS AND SUGGESTIONS
  id: totrans-1660
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作进度分析及建议
- en: 'Example conversations with Gemini 1.5 Pro from my Work in Progress: Not My
    Bridegroom ⁠[1](#c349.xhtml#a41B) , a romantic comedy where an internet influencer
    has to use her ex-boyfriend as a deepfake in her wedding planning videos.'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 来自我的作品《我的新郎不是他》的Gemini 1.5 Pro示例对话：[1](#c349.xhtml#a41B)，这是一部浪漫喜剧，其中一位网络红人必须在她婚礼策划视频中使用她的前男友作为deepfake。
- en: <Conversation>
  id: totrans-1662
  prefs: []
  type: TYPE_NORMAL
  zh: <对话>
- en: 'USER:'
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：
- en: Please suggest specific scenes to improve romantic tension between Dillon and
    Anita.
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: 请提出具体的场景来增强迪隆和安妮塔之间的浪漫张力。
- en: 'MODEL:'
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 模型：
- en: 'Scenes to Enhance Romantic Tension:'
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 增强浪漫张力的场景：
- en: '1\. Vulnerable Confessions:'
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 易受伤害的坦白：
- en: 'Setting: After the mugging incident, Anita and Dillon are alone in her apartment.
    The atmosphere is charged with emotion and unspoken feelings.'
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：在抢劫事件之后，安妮塔和迪隆独自待在她的公寓里。空气中充满了情感和未言说的感受。
- en: 'Action: Anita opens up to Dillon about her insecurities and doubts about her
    relationship with Eduardo. Dillon, in turn, confesses his lingering feelings for
    her and his hurt over their past misunderstanding. They share a tender moment
    of connection and understanding.'
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 行动：安妮塔向迪隆坦白她对与埃德华多关系的疑虑和不安。迪隆反过来坦白他对她的持续感情以及他们对过去误解的伤害。他们共享了一个充满联系和理解的情感时刻。
- en: '2\. Stolen Moments amidst Chaos:'
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 混乱中的偷闲时刻：
- en: 'Setting: During a chaotic wedding planning event with Eduardo present, Anita
    and Dillon find themselves alone in a secluded corner of the venue (e.g., a garden,
    a balcony, a quiet room).'
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：在有埃德华多出席的混乱婚礼策划活动中，安妮塔和迪隆发现自己独自待在场地的一个隐蔽角落（例如，一个花园，一个阳台，一个安静的房间）。
- en: 'Action: Amidst the stress and pressure, they share a stolen moment of intimacy.
    A lingering look, a brush of hands, or a whispered conversation conveys their
    unspoken desire for one another.'
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 行动：在压力和紧张之中，他们共享了一瞬间的亲密。一个持续的凝视，一次手部的轻触，或是一次低声细语，传达了他们彼此间不言而喻的渴望。
- en: '3\. A Dance of Desire:'
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 欲望之舞：
- en: 'Setting: At a social gathering or a club, Dillon and Anita find themselves
    on the dance floor. The music is slow and sensual, creating an intimate atmosphere.'
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 环境：在一个社交聚会或俱乐部，迪伦和安妮塔发现自己站在舞池上。音乐缓慢而性感，营造了一种亲密的氛围。
- en: 'Action: As they dance, their bodies move in sync, and their eyes lock. The
    tension builds as they are drawn closer, their movements becoming more intimate
    and suggestive.'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 行动：随着他们跳舞，他们的身体同步移动，他们的目光交汇。随着他们被拉近，他们的动作变得更加亲密和暗示性。
- en: '4\. A Moment of Comfort:'
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一刻安慰：
- en: 'Setting: After a particularly challenging encounter with Eduardo, Anita is
    feeling vulnerable and upset. She seeks out Dillon for comfort and support.'
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 环境：在与爱德华多的特别艰难的遭遇之后，安妮塔感到脆弱和不安。她寻求迪伦的安慰和支持。
- en: 'Action: Dillon offers a listening ear and a shoulder to cry on. He provides
    words of encouragement and reassurance, reminding Anita of her strength and worth.
    Their connection deepens as they find solace in each other’s presence.'
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: 行动：迪伦提供了一个倾听的耳朵和一个哭泣的肩膀。他提供了鼓励和保证的话语，提醒安妮塔她的力量和价值。随着他们在彼此的存在中找到安慰，他们的联系加深了。
- en: '5\. A Playful Challenge:'
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 一次轻松的挑战：
- en: 'Setting: During a casual outing or activity (e.g., a picnic, a game night),
    Dillon and Anita engage in a playful competition.'
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 环境：在休闲外出或活动（例如野餐、游戏之夜）期间，迪伦和安妮塔进行了一场轻松的竞争。
- en: 'Action: The competition becomes charged with flirtation and suggestive banter.
    The stakes are raised as they challenge each other, creating a sense of excitement
    and anticipation.'
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 行动：竞争变得充满调情和暗示性的玩笑。随着他们相互挑战，赌注提高，创造了一种兴奋和期待的感觉。
- en: 'Additional Tips:'
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 其他建议：
- en: 'Utilize Sensory Details: Describe the physical sensations and emotions experienced
    by the characters, such as the warmth of their touch, the scent of their cologne,
    and the racing of their hearts.'
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 利用感官细节：描述角色所经历的物理感觉和情感，例如他们触摸的温暖，他们香水的气味，以及他们心跳的加速。
- en: 'Build Anticipation: Gradually escalate the tension through suggestive dialogue,
    lingering glances, and close proximity.'
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 建立期待：通过暗示性的对话、持续的凝视和近距离接触，逐渐升级紧张感。
- en: 'Create Obstacles: Introduce external factors that prevent them from acting
    on their feelings, heightening the sense of longing and desire.'
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: 创造障碍：引入外部因素，阻止他们表达自己的感情，增强渴望和欲望的感觉。
- en: 'Use Internal Monologues: Reveal the characters’ inner thoughts and desires,
    allowing readers to understand the depth of their emotions.'
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 使用内心独白：揭示角色的内心思想和欲望，让读者理解他们情感的深度。
- en: By incorporating these scene suggestions and focusing on building emotional
    intimacy, you can create a captivating romance between Anita and Dillon that will
    leave readers yearning for more.
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这些场景建议并专注于建立情感亲密，你可以创造安妮塔和迪伦之间引人入胜的浪漫，让读者渴望更多。
- en: </Conversation>
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: </对话>
- en: What Gemini did here was take specific scenes and suggest enhancements. These
    enhancements were not simply retrievals of what happened in the scene; using her
    reasoning capabilities about romantic tension, she added possible extensions of
    existing scenes.
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 双子座在这里所做的是挑选特定的场景并提出改进建议。这些改进建议不仅仅是场景中发生事件的恢复；利用她对浪漫紧张的推理能力，她增加了现有场景的可能扩展。
- en: I’m very open to sharing my work in progress, but I have added a disclaimer.
    I may or may not incorporate any of these suggestions, and since I’m a complete
    pantser, I don’t actually know the ending or whether any of these suggestions
    will play out or not.
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常愿意分享我的工作进展，但我已经添加了一个免责声明。我可能或可能不会采纳这些建议，因为我是一个完全的自由发挥者，我实际上不知道结局，也不知道这些建议是否会实现。
- en: I only included this to show you the power of Gemini Pro 1.5. Continuing …
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 我只包括这个是为了展示Gemini Pro 1.5的力量。继续……
