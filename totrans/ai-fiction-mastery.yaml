  zh: 这里更多关于我的新笔名，克莱尔·朱。
- en: 'My first series is called Misguided Guides, a set of dubious self-help guidebooks
    for the absurd situations you might find in life or otherwise. The first book,
    “[Why Your Cat Is Plotting to Kill You: A Paranoid Pet Owner’s Manual](https://books2read.com/whyyourcatisplottingtokillyou)”
    is FREE, and the audiobook, too, at a certain online store—see the universal link.'
  id: totrans-2507
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第一系列名为误导指南，这是一套针对生活中可能遇到的荒谬情况的可疑自助指南。第一本书，“[为什么你的猫在密谋杀害你：一个偏执宠物主人的手册](https://books2read.com/whyyourcatisplottingtokillyou)”是免费的，有声书在某个在线商店也是免费的——请查看通用链接。
- en: I aim to provide you with many more funny moments as we explore the boundaries
    of mythology, technology, and humor along with a zany cast of unforgettable and
    unreliable narrators.
  id: totrans-2508
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目标是在我们探索神话、技术和幽默的边界时，为你提供更多有趣的时刻，以及一群古怪、难忘且不可靠的叙述者。
