  prefs: []
  type: TYPE_NORMAL
- en: AI RESOURCES FOR WRITERS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Since I encourage you to try out the tools and methods I discuss actively, let
    me introduce the ones I’m familiar with. Of course, you are not limited to this
    list, and with the warp speed that AI is developing, new ones will soon appear.
  prefs: []
  type: TYPE_NORMAL
- en: Tools
  prefs: []
  type: TYPE_NORMAL
- en: '1\. [OpenAI ChatGPT](https://chat.openai.com/) ⁠[1](#c349.xhtml#a40U) This
    is the granddaddy of all AI chatbots because it is my first experience with AI.
    ChatGPT is my go-to AI buddy trained on everything its creators could get their
    hands on: public domain text, internet archives, fan fiction, chatrooms, tons
    of code and formulas, and more. It was an experimental generative AI tool made
    for research purposes, and hence, the training can seem haphazard. It is the jack-of-all-trades
    chatbot based on OpenAI’s generations of GPT LLMs.'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. [OpenAI Playground](https://platform.openai.com/playground) ⁠[2](#c349.xhtml#a47F)
    and API. The playground is OpenAI’s developer’s interface, allowing them to try
    out prompts and responses without writing code. The playground will enable users
    to tweak parameters to adjust how the LLM responds to your prompt (input). You
    can try out various generations of GPTs with the Playground. OpenAI has also allowed
    users to fine-tune their models to produce outputs skewed in a particular fashion
    or style. This in itself is exciting to creative writers. It eliminates the “generic”
    sound of AI-generated text and allows authors to shape their voice and tone to
    write more like themselves.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. [Anthropic](https://claude.ai/chats)’[s Claude](https://claude.ai/chats)
    ⁠[3](#c349.xhtml#a3VH) This LLM was developed by Anthropic, a different organization,
    and has its own characteristics. By happy accident, the fiction writers I know
    find Claude a “better writer.” Of course, this is highly subjective, and ChatGPT
    is still a favorite all-around brainstormer, idea generator, and structure generator;
    the feeling is that Claude writes better prose. However, Claude is also smart
    and good at analysis, and coders claim it is excellent at code generation. As
    you’ll see, any model’s responses are heavily influenced by your prompting.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Claude API. As of March 2024, Anthropic opened the Claude API to every subscriber.
    Anthropic has its own Playground analogue called [Workbench](https://console.anthropic.com/workbench).
    ⁠[4](#c349.xhtml#a46A)
  prefs: []
  type: TYPE_NORMAL
- en: 5\. [Google Gemini LLM](https://gemini.google.com/app) ⁠[5](#c349.xhtml#a42V)
    Google is the search engine; hence, one of Gemini’s strengths is its ability to
    find reference material on the Internet. Currently, Google allows access to its
    Gemini Pro 1.5 model in the [Google AI Studio](https://aistudio.google.com/) ⁠[6](#c349.xhtml#a42W).
    This model has a large context window (1,000,000 tokens) and allows users to upload
    documents, images, and videos. After uploading, you can ask questions about the
    content, which is helpful for story creation and developmental editing.
  prefs: []
  type: TYPE_NORMAL
- en: '6\. [Sudowrite](https://www.sudowrite.com/) ⁠[7](#c349.xhtml#a42B) This comprehensive
    AI writing application wraps the underlying AI with a graphical user interface
    that provides step-by-step paths for story development and prose generation. There
    are other tools like Novelcrafter, but Sudowrite is the one I am familiar with.
    I detailed my use of Sudowrite in writing a complete novel in [An AI Author](http://books2read.com/anaiauthorsjournal)’[s
    Journal: From 0 to 70000 in 14 Days](http://books2read.com/anaiauthorsjournal).
    ⁠[8](#c349.xhtml#a42C)'
  prefs: []
  type: TYPE_NORMAL
- en: 7\. [Future Fiction Academy](https://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[9](#c349.xhtml#a48E) - [Rexy](https://rexy.futurefictionacademy.com/) ⁠[10](#c349.xhtml#a48F).
    Ah, how do I describe Rexy? It is a sequencing tool available to members of the
    Future Fiction Academy that is intermediate between a developer’s playground and
    a user-friendly application. It is the brainchild of the founders of Future Fiction
    Academy, Elizabeth Ann West, Stephanie Pajonas, and Leeland Atra, and one designed
    for writers to customize their AI prompts and responses. Rexy has a web-based
    graphical user interface that connects the user to a data store and their personal
    notion pages and then passes information along with user-defined prompts to the
    LLMs they support. It is transparent and allows users to pick and choose their
    AI model and parameters and customize the prompts to fit their workflow. The goal
    of the FFA is to push the envelope of using AI for fiction writing and provide
    accessibility to the latest AI methodology to the ordinary author. The Future
    Fiction Academy leads the research into using AI for fiction writing.
  prefs: []
  type: TYPE_NORMAL
- en: 8\. Other “bring your own LLM API” tools include [Typing Mind](https://www.typingmind.com/)
    ⁠[11](#c349.xhtml#a3ZV), Rexy, and [Novelcrafter](https://www.novelcrafter.com/)
    ⁠[12](#c349.xhtml#a3ZX). While 2023 was the year of ChatGPT and kitchen sink LLMs,
    2024 is the proliferation of LLMs out of the wazoo. The [huggingface.co](http://huggingface.co)
    ⁠[13](#c349.xhtml#a3ZZ) community is an attempt to keep up with a catalog of LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 9\. LLM Aggregators. Many places now offer ways for users to pay for API access
    to an LLM through aggregators like [Openrouter.ai Playground](https://openrouter.ai/playground)
    ⁠[14](#c349.xhtml#a3Z2), [Poe.com](http://Poe.com) ⁠[15](#c349.xhtml#a3Z3), or
    [Hugging Chat](https://huggingface.co/chat/) ⁠[16](#c349.xhtml#a3Z4). Users can
    select from the many LLMs offered, and the aggregator will pass on the payment.
    These include open-source LLMs and ones that are unfiltered, allowing violence
    and sex. The [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)’[s
    Rexy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw) supports
    all the LLMs included on [Openrouter.ai](https://openrouter.ai/) and even integrates
    with OpenAI’s fine-tuned models, thus allowing a high degree of customization.
  prefs: []
  type: TYPE_NORMAL
- en: 10\. Autocrit - started many years ago primarily as a critiquing tool to look
    at overused words, slow pacing, and features many other bells and whistles. However,
    in the last year, they’ve been actively incorporating gen-AI into their suite
    of tools, making it capable of ideation and story concept, story development of
    characters, settings, and plot points (in their Inspiration Studio), and developmental
    editing with its [Story Analyzer.](https://www.autocrit.com/story-analyzer) ⁠[17](#c349.xhtml#a47B)
    Autocrit can also help discovery writers by suggesting the following scenes in
    many different ways with its “What Happens Next” feature and using “Mood Changer”
    to change the tone of a scene.
  prefs: []
  type: TYPE_NORMAL
- en: 11\. ProwritingAid—This program polishes manuscripts, looking for overused words
    and grammatical mistakes. It has recently incorporated generative AI to suggest
    alternate phrasing, change tenses and mood, and continue writing in different
    ways, such as adding a counterargument, joke, or quote.
  prefs: []
  type: TYPE_NORMAL
- en: 12\. Grammarly Pro - primarily a grammar checker, but lately, it has incorporated
    generative AI to suggest rewrites or expand on existing text.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​PART 2​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: THE ROLE OF AI IN FICTION
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![group of writers at a castle](image_rsrc4B7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: ​[ ​5​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: HOW AI FITS INTO THE FICTION WRITING PROCESS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now that we understand how generative AI works, let’s look at how we can use
    these LLM beasties in our fiction writing process. It’s important to acknowledge
    that every individual writer has his own writing process, and what works for one
    author may not work for another.
  prefs: []
  type: TYPE_NORMAL
- en: Some of you are planners who map out your stories to the last detail before
    writing a single word, whereas others write into the wind and let inspiration
    take the story where it will go. The beauty is that everyone’s creative process
    is as unique as their fingerprint. And guess what?
  prefs: []
  type: TYPE_NORMAL
- en: AI can fit into your process or style and meet you no matter where you are.
    There is no definitive approach to using AI—it’s all about what suits you best.
    The important thing is to be adaptable and open-minded in how AI tools and techniques
    can be used. AI’s role in your writing can be as flexible and personalized as
    you make it.
  prefs: []
  type: TYPE_NORMAL
- en: We will break down the way fiction authors use AI into several phases. Even
    though these phases are listed in a particular order, it does not mean your writing
    process flows the same way. Some of you might skip the planning phase and rough
    draft without an outline, only to go back later and add story structure. Others
    write best with a detailed roadmap accompanied by clearly defined character sketches
    and rich world-building.
  prefs: []
  type: TYPE_NORMAL
- en: AI can be integrated into your process and accessed at any storytelling stage.
    Some of you are dying to jump ahead into the tools and advanced techniques section,
    and that’s okay, too. Check out the technology, and then come back and decide
    where AI fits into your writing process. Or read straight through to understand
    the possibilities and try the methods I describe as you go.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​6​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: STORY CONCEPT AND IDEATION
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI can help during the exploration and creativity stage of a story concept.
    This phase involves developing creative ideas and fleshing out the essential elements
    that will form the story’s foundation. Ideation is crucial as it sets the direction
    and tone for the work that follows.
  prefs: []
  type: TYPE_NORMAL
- en: Authors often start by brainstorming ideas to come up with unique concepts and
    evaluate how they fit into the overall story idea. This is crucial for genre fiction
    authors because readers have specific expectations for each type of story.
  prefs: []
  type: TYPE_NORMAL
- en: AI can take your ideas and make connections between them and other concepts
    in your genre. Using AI’s vast training data, you can identify opportunities,
    clarify your market niche, and develop ideas based on current trends.
  prefs: []
  type: TYPE_NORMAL
- en: You can use AI’s insights to define your ideal reader and glean what would delight
    or challenge them. If you decide to be different, AI can invent wild twists to
    subvert or reinvent genre conventions and ensure your story stands out in the
    market.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a breakdown of what typically happens during the concept and ideation
    phase in writing:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Market Analysis: Choosing a genre or sub-genre of interest and analyzing the
    concepts and content resonating in the market. Analyzing the book descriptions
    of top books in the category and looking for trends, fit, and target audience.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Premise Generation: Brainstorm or generate a variety of ideas that fit into
    your chosen niche: genre, sub-genre, trope, and other characteristics. Be as detailed
    as possible. Ask for unique twists. Be conversational and refine your prompts.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Research: Conducting preliminary research is often part of concept development.
    You can use AI or a search engine to look into existing literature, historical
    events, scientific concepts, or cultural trends to find inspiration or ensure
    the originality and feasibility of their ideas. Leverage generative AI’s ability
    to “make things up” by asking it to come up with something different or surprising
    from the data you gathered.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Audience Analysis: Use AI to create avatars of your likely readers, defining
    their characteristics, needs, and what they hope to get from your book. Later,
    use AI to analyze your manuscript to see how you satisfied each avatar’s desires.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept Development: Create or consider possible titles, subtitles, log lines,
    synopsis, blurbs, and hook/pitch combinations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Validation: This step involves evaluating the viability and appeal of the ideas.
    Writers might consider factors like market trends, potential audience, and personal
    interest or expertise to decide which ideas are worth pursuing. AI can give additional
    insights on the fit and framing of your story idea.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pitching: In professional settings, be prepared to pitch the developed ideas
    to editors, publishers, or collaborators to gauge interest and receive feedback,
    which can further refine the concept before moving into detailed planning and
    writing. AI can give you the bullet points and prioritize the appeal of your ideas
    to a particular audience.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rapid Iteration: The speed and flexibility of AI-powered brainstorming allow
    writers to generate and test a high volume of ideas in a short amount of time.
    By quickly exploring multiple angles and possibilities, you can hone in on the
    most promising concepts and make informed decisions about which direction to take
    your story.'
  prefs: []
  type: TYPE_NORMAL
- en: TOOLS AND TECHNIQUES FOR STORY CONCEPT AND IDEATION
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The chatbot is king and queen in this phase. They are easy to use and conversational,
    allowing you to go from general to specific as you add more detail or branch off
    tangents.
  prefs: []
  type: TYPE_NORMAL
- en: Choose the “smartest” one you can access because they possess larger training
    datasets and abilities to connect disparate ideas in unique and surprising ways.
    Whereas the smaller or earlier chatbot might go for the most obvious ideas, giving
    you clichéd premises and repetitive concepts, the larger models can draw connections
    between seemingly unrelated areas and help to generate fresh, innovative story
    ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Try different chatbots for a broader spectrum of insight and advice. ChatGPT
    is the obvious starting point, but Anthropic’s Claude, Microsoft Copilot, Google
    Gemini, Meta’s Llama, Mistral, etc. These versatile chatbots can be used for brainstorming,
    generating ideas, and exploring different narrative possibilities through conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Engineering/Design will give you the most bang for the buck at this stage,
    as chatbots converse with you through your inputs, called prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Specific techniques that will improve your results include iterative prompting,
    role-based prompting, and prompt chaining. Because each chatbot is different,
    a good practice is to ask the chatbot what information it needs from you to perform
    a particular task. Definitions are also important, so ask the chatbot what it
    thinks a particular word or concept means to find common ground for conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, ideation is about creating a fertile ground from which a detailed and
    engaging narrative can grow. It’s a phase that requires creativity, insight, and
    strategic thinking, which can be enhanced using AI tools to produce more informed
    and compelling content ideas.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​7​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: 'STORY DEVELOPMENT: FROM PREMISE TO PLOT'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now that you have the initial premise and concept for your story, it’s time
    to plan and grow it into a compelling story with all the moving parts, such as
    a vivid story world, memorable and invigorating characters, and a plot that propels
    the characters through memorable and exciting plot points.
  prefs: []
  type: TYPE_NORMAL
- en: AI can help with all these stages and provide alternate insights and additional
    what-ifs for your consideration. If you’re writing genre fiction, now is the time
    to check that genre expectations are met while throwing in your own twists or
    blending of genres. The LLMs can assist you by making suggestions, but you are
    the glue that decides what sticks and which plot twists, themes, or hallmark moments
    to include.
  prefs: []
  type: TYPE_NORMAL
- en: Even though I document these as steps, please remember to fit the AI and the
    steps to your individual writing process and not the other way around. Some of
    you may skip this stage entirely, run off to drafting, and circle back to flesh
    out your characters or settings during revision.
  prefs: []
  type: TYPE_NORMAL
- en: Personalize your use of AI tools and use them as you desire. Whether you’re
    a meticulous planner or a seat-of-the-pants discovery writer, AI can assist or
    entertain you with its insights.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the breakdown of what typically happens during the story development
    phase.
  prefs: []
  type: TYPE_NORMAL
- en: 'Expand Premise into Synopsis: Try various synopsis proposals and run them through
    AI to check genre conventions and expectations. Suggest various twists, tropes,
    and themes and ask the LLM to craft a synopsis with these variations. Include
    any genre-specific tropes you want to use, such as doppelganger for horror or
    betrayal in a buddy romance. Or have AI suggest some and then test them out. Ask
    another LLM to evaluate the synopsis until you are satisfied. You can also utilize
    AI tools to research popular tropes, themes, and plot structures within your genre.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: I find it useful to iteratively develop my characters as I refine my
    premise and synopsis. After all, each character’s goals and motivations, flaws,
    and strengths have much to do with the story’s premise and synopsis. See [Chapter
    44: Story Development Using ChatGPT](#c305.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Crafting Compelling Characters: Chatting with AI is a wonderful way of fleshing
    out your characters. Whether you use character sheets (template-based prompting)
    or conversation (iterative prompting), you can discuss with AI the details such
    as background, strengths, weaknesses, motivations, and other characteristics of
    your characters. Remember, you can put in your vision of the characters and use
    AI for additional insights. You do not have to take what AI gives you. Go back
    and forth between characters and premise until you have a sense of conflicts,
    opposing characters, sidekicks and allies, and other genre-specific constraints.
    For a romance, design a hero who will bring out your heroine’s best and worst
    characteristics. For romantic suspense, don’t forget a villain with personal motives
    that make him/her scarier. Put your heart and soul into your characters, and then
    ask AI to evaluate the character arc and see if you’re missing anything.'
  prefs: []
  type: TYPE_NORMAL
- en: AI can also suggest other character archetypes and traits to explore or perhaps
    assign a Myers-Briggs personality type to the character you describe. Tag team
    with AI to delve into your character’s backstory and defining moment when their
    mistaken belief took root. Explore what success looks like for your characters.
  prefs: []
  type: TYPE_NORMAL
- en: You can even upload photos and ask AI to describe your characters physically
    or use AI to suggest a dialogue style for your character, such as how they speak,
    along with their personality quirks. The possibilities are endless. I used ChatGPT
    Plus with Dall-E to generate images of wedding dresses so I could visualize them
    and then asked AI to describe them. We even did one that looked like toilet paper
    rolls just for laughs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building Your Story World and Setting: Here, you can use AI’s universe of knowledge
    and work together to generate the perfect setting or story world. You can use
    template prompting or chain-of-thought where you progressively go into more detail
    about each aspect of the story world. If your story world needs magic, rules,
    or an invented language, AI can help you create these elements. Use follow-up
    prompting to explore aspects like history, geography, cultural traditions, mythology,
    and anything else you need. Work with a multimodal LLM to generate images that
    can inspire you or document locations and settings. If you need a map, you can
    sketch it out on a piece of notebook paper and upload it to an image generator
    that can prettify it and make it look like it’s drawn on parchment or a computer
    screen by using words to describe how you want the map to appear.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plan the Story Structure: While AI can suggest plot points and create an outline
    for you, a better way might be for you to decide on a story structure that fits
    your vision and the genre-specific content ahead of time. Earlier LLMs will usually
    generate a “hero’s journey-like” structure. This is true even if you ask for another
    structure, such as Save the Cat or Romancing the Beat. It doesn’t have as much
    knowledge of these structures since they are more recent and have less literature
    about them, but many times, the LLM will happily declare that it knows the structure
    you propose and generate something it believes matches that structure. This is
    a situation where it’s better to “train” the LLM on what you want it to do. Give
    it the structure you want it to use, either in the form of a template or as an
    explanation of the steps, and then ask it to generate an outline. As I mentioned
    before, one way to do this is to define a four-act structure and tell it the genre-specific
    beats you expect. Then, ask the LLM to fill in that structure with the information
    you developed: premise, synopsis, characters, setting, trope, must-have scenes,
    etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Developing Your Plot and Outline: Now that you have all the information you
    need, you can work with the LLM to create an outline specific to your story. Do
    you see that all the preparation was necessary to craft a non-generic outline?
    By layering the prompts and compiling your story-specific requirements, you add
    your vision and creativity into the process to tailor the output to your individuality.
    Of course, you can iterate and fix up the outline, adding and deleting, or even
    asking for alternate endings. The beauty of using AI is that you can do rapid
    prototyping and analysis by asking the LLM to critique the outline or compare
    it with the proposed genre or your target audience’s desires. AI can also offer
    suggestions to improve the pacing and escalating tension, as well as ensure your
    outline captures all crucial plot developments and turning points. It can evaluate
    whether you have too many action scenes, enough cliffhangers, or anything else
    you wish to analyze. You can “story doctor” the outline rather than wait until
    you have a first draft to do development editing.'
  prefs: []
  type: TYPE_NORMAL
- en: TOOLS AND TECHNIQUES FOR STORY DEVELOPMENT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Chat Interface: The chatbot is again your first go-to for iteratively expanding
    and refining your story concept. However, as you go, you will want to collect
    your outputs into a file and tag it as Story Information with sections for Hook,
    Pitch, Synopsis, Main Characters, Setting, Plot Points, and Outline. Keep this
    file offline so you don’t lose it in the chatbot. You will use it later as input
    to either chats or LLMs that work through APIs (Application Programming Interfaces)
    or Playgrounds (Workbenches).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Custom GPTs: OpenAI allows users with a paid account to create Custom GPTs
    with additional pre-seeded instructions and a knowledge base. This provides additional
    context and guidelines for the model to generate domain-specific instructions.
    These custom GPTs can be very useful if you are writing genre fiction.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, I created one called Romance Writing Coach ([https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach](https://chat.openai.com/g/g-WFzdoMZvY-romance-writing-coach))
    ⁠[1](#c349.xhtml#a3X6) by uploading information about tropes, romantic tension,
    likable character traits, four-act romance structure, and a writing style that
    engages romance readers. When approaching a Custom GPT, the best thing you can
    do is ask it questions, and it will tell you how it can help you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specialized Fiction-Writing Apps and Websites: Prepackaged fiction writing
    tools such as Sudowrite and Novelcrafter provide a framework within which users
    can develop their story, including writing with AI. The degree of control or lack
    thereof depends on whether the tool is writing the prompt for you or you are passing
    your prompt through the tool to the underlying LLMs. The [Future Fiction Academy](http://future-fiction-academy.teachable.com/?affcode=1654415_djcggmzw)
    ⁠[2](#c349.xhtml#a404) provides a prompt chaining and sequencing tool with complete
    flexibility through Rexy. This specialized writing tool is transparent because
    you can log the exact prompts it generates and pass them to the LLM. It also allows
    the user to select LLMs, tweak parameters, use megaprompting techniques, and sequence
    prompts automatically.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Visualization and Image tools: [OpenAI](https://openai.com/dall-e-3)’[s Dall-E](https://openai.com/dall-e-3)
    ⁠[3](#c349.xhtml#a475) image generator is integrated into ChatGPT Plus. [Adobe](https://www.adobe.com/products/firefly.html)’[s
    Firefly](https://www.adobe.com/products/firefly.html) ⁠[4](#c349.xhtml#a476) allows
    you to upload and refine a sketch by describing the changes you want. [Midjourney](https://midjourney.com)
    ⁠[5](#c349.xhtml#a477) is one of the most versatile text-to-image generators.'
  prefs: []
  type: TYPE_NORMAL
- en: By utilizing a diverse toolkit of AI apps and techniques, you can accelerate
    and enhance the planning phase of your story development. Here is an example of
    using AI to visualize wedding gowns.
  prefs: []
  type: TYPE_NORMAL
- en: <Prompt>
  prefs: []
  type: TYPE_NORMAL
- en: 'Dall-E: please visualize this wedding gown. The third dress featured a weird
    toilet paper cozy-looking ruffle situation that belonged on a craft project, not
    a wedding gown.'
  prefs: []
  type: TYPE_NORMAL
- en: </Prompt>
  prefs: []
  type: TYPE_NORMAL
- en: <Response>
  prefs: []
  type: TYPE_NORMAL
- en: '![toilet paper wedding gown](image_rsrc4B8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: </Response>
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc4B5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: As the storyteller, you are responsible for asking the right questions and guiding
    the AI with your vision for the story. While it’s interesting to see what the
    AI can generate from a minimal prompt, the story becomes yours when you add your
    opinions and detailed follow-up questions. So feel free to chat and explore the
    serendipity of brainstorming with another mind or multiple minds. Layer in your
    individuality to make the story truly yours.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​8​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: WRITING AND REFINING
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now that you’ve done your prep work, it’s time to roll up your sleeves and start
    writing that first draft. Your AI assistant is here to help, whether you use it
    to refine your text, suggest refinements and transitions, or write that dirty
    first draft. It’s your choice where you draw the boundaries, whether you only
    use AI to rewrite your text or you use it to generate the words of your manuscript.
    It is only an assistant, whether used as a fancy thesaurus or as a ghostwriter.
    It can help you with descriptions and dialogue or fill the blank page with words
    you can edit and riff from.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s roll up our sleeves and see how AI can write for us. For fiction writing,
    we let AI work scene by scene. Remember that AI’s response is based on the words
    inside an LLM’s context window. Chapter content, particularly those with alternate
    points of view or different settings, can confuse the AI by introducing unrelated
    or contradictory details into its context window. It can cause elements of one
    scene to bleed into another scene. We will discuss this in more detail when we
    present the techniques of context stuffing and megaprompting.
  prefs: []
  type: TYPE_NORMAL
- en: Here is a breakdown of how AI can help you with your first draft.
  prefs: []
  type: TYPE_NORMAL
- en: 'Busting Writers Block: have you ever tried freewriting to overcome writer’s
    block? You know, the exercise where you sit down and write gibberish or anything
    that comes to mind about your characters and what they’re supposed to be doing
    in a particular scene? Freewriting helps get your creative juices flowing as it
    immerses you into your character’s world and the problems facing him. Well, AI
    can definitely help here. You can chat with AI about your scene and bounce ideas
    on how to start or ask AI to write the scene by copying and pasting the information
    you gathered in the planning step. You’ll notice that the “quality” depends on
    how much or little information you feed the AI. However, if all you care about
    is jumpstarting your writing, having AI attempt a starting point is often enough
    to get you going.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Filling in the Blanks: Another way you can use AI in the drafting process is
    to ask AI to suggest words, descriptions, dialogue snippets, and transitions.
    Let’s say you’re writing a scene, and you’d like to add some local color to your
    setting. You can ask AI to make up a bakery and describe it. You can also ask
    it to introduce walk-on characters and a funny situation or to make up a town
    legend on the fly. Perhaps you aren’t good at writing fight scenes. You can prompt
    the beginning of the fight scene and then ask AI to add in blows, kicks, and punches
    or describe the sword and armor and how the sequence should go. The possibilities
    are endless. Your AI assistant is always on hand to give you suggestions or fill
    in details.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Enhancing prose: Another way AI can help you is by rewriting sections of prose.
    Let’s say your character talks like a Valley Girl. You can write her dialogue
    in plain vanilla, copy and paste it into an LLM, and ask it to rewrite it using
    Valley Girl slang. I don’t know if this is an “enhancement” or not, but it’s certainly
    a feature. Again, you can explore different styles and voices. You might find
    that AI rewriting your prose deletes your voice, and it’s not something you care
    for. That’s okay, too, as you can always edit or rewrite whatever it gives you.
    The current LLMs tend to “overwrite” with too many adjectives and adverbs. The
    solution is obvious. Get AI to write or rewrite, see if there’s an improvement,
    and then edit the prose to your liking. Or you can try another LLM and see if
    you like its prose better. As you can see, working with AI is truly a collaboration
    and not a one-way street.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Freeform Writing: A simple way of getting AI to write portions of a scene is
    to begin the scene on your own. Then feed your partial scene into the LLM and
    ask for it to either “continue writing” or “continue with these plot points and
    beats that you specify.” This is a technique called completion prompting. Results
    vary based on what you put in, but it is an easy way to get past a block. You
    either like what it gives you or dislike it, and that sparks ideas for you to
    continue. If you’re a pantser or discovery writer like me, this might be the only
    technique you use as you tandem write through your story. AI can allow you to
    brainstorm at every step or story beat. Or explore several paths if you can’t
    decide. You can even prompt the AI to write an outline (or several outlines) for
    the rest of the book based on the options available after each scene. This is
    rapid prototyping and might save backtracking or throwing out many chapters of
    exploration if you were to write out every scene in detail.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Drafting an entire scene: Having AI write scene prose is the holy grail for
    some writers and anathema for others. Suffice it to say that an LLM will not write
    anything other than a generic scene if you give it a one-line prompt. Remember
    all our work in the last section with story information, character details, settings,
    and plot points? Effective scene writing requires a lot of prompt engineering
    and sequencing, as well as providing data to ensure narrative continuity. The
    current AI assistants work best when given data in small, manageable chunks. Hence,
    the best practices involve giving it a scene brief or plan containing background
    information and scene beats. For more details on scene writing, see [Part V: Writing
    Scenes with AI](#c1NX.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: TOOLS AND TECHNIQUES FOR WRITING SCENES
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Filling in the Blanks and Enhancing Prose: Use chatbots by copying and pasting
    a partial scene with instructions on what you want to be filled in. Use a tool
    like Sudowrite or Novelcrafter, where you place your cursor or highlight the text
    you want to be altered and type in instructions or prompts on what you want. These
    techniques are pretty intuitive, and you will soon develop your own favorite prompts
    or ways of doing things.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Freeform Writing: Copy and paste a partial scene into a chatbot and ask it
    to continue. If you want to give more context, pre-seed the chatbot with background
    information. This technique is called megaprompting or context stuffing. You are
    essentially giving the LLM enough context to shift its responses to be relevant
    to your scene. We’ll talk about context windows in the Advanced LLM Concepts chapter,
    but these days, the models are growing in context window size, so you have less
    to worry about than a year ago when we had to count “tokens” like pinching pennies.
    Using a custom GPT that fits your genre will help the LLM adhere to genre guidelines.
    For example, if you’re writing a romance, a romance writing Custom GPT is more
    likely to include romantic tension and banter in the scene than a generic GPT.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Autocrit has recently added an “Inspiration Studio” feature. With this feature,
    you can place your cursor anywhere in your document and ask, “What Happens Next?”
    It’ll answer in several categories: Heighten Tension, Reveal Character Motivation,
    Unexpected Twist, Most Likely, and Outlandish.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Drafting an entire scene: Preparing scene briefs or plans helps guide the AI
    in writing your scene. Remember that you are the author of the scene briefs or
    plans, and the more detail you put into it, the better the result. Please see
    [Chapter 31: Using Scene Briefs](#c1PB.xhtml) for more information. You can also
    fine-tune models to create a unique narrative voice. See [Part VI: Personalizing
    AI for Your Creative Vision](#c1XS.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: Because scene writing requires more data and moving parts, using a tool such
    as Sudowrite, Novelcrafter, or Future Fiction Academy Rexy is preferable to copying
    and pasting large chunks of data into a chatbot window. It is doable, but in my
    experience, the chatbots are limited in the number of words they return. Furthermore,
    you cannot “tune” the parameters of an LLM, and it is hard to try different LLMs
    as you have to go to different windows (unless you are using an aggregator like
    Openrouter.ai). Future Fiction Academy’s Rexy Wordbanger is the power tool that
    allows you to sequence prompts and change the LLMs on the fly. It will enable
    you to generate the same scene multiple times using different LLMs to compare
    and contrast the results. Watch their YouTube channel for their live writing sessions.
    ([https://www.youtube.com/@FutureFictionAcademy](https://www.youtube.com/@FutureFictionAcademy))
    ⁠[1](#c349.xhtml#a43V)
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, AI’s role in scene writing is exciting and transformative. The
    AI also requires a lot of hand-holding, and that’s okay because, after all, you
    are the owner of the story, and it is just the assistant. You can tune and tweak
    or completely rewrite what it gives you. Writing with AI is a collaborative process,
    but at the end of the day, you are the author, and therefore, it is up to you
    to revise, enhance, or use the AI words as inspiration or trash it. The LLM will
    not have its feelings hurt, and you will benefit from gaining any insights or
    surprise “hallucinations,” which is the serendipitous and entertaining part of
    writing with AI. What did it just come up with?
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​9​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: CRITIQUE AND DEVELOPMENT EDITING
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Way back, when I was working on my first novel, I joined [Critiquecircle.com](http://Critiquecircle.com)
    ⁠[1](#c349.xhtml#a3W6), an online critique group with a point system to ensure
    reciprocity. I enjoyed the community and learned a lot, but the quality and thoroughness
    of the critiques were scattershot. Some users focused only on grammar, whereas
    others gave personal opinions. I used the critiques as best as possible to get
    a sense of my story but hired a developmental editor to go through my novel before
    publishing.
  prefs: []
  type: TYPE_NORMAL
- en: USING AI TOOLS FOR CRITIQUE AND STORY ANALYSIS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1\. Story Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot and Structure Analysis: identify the exposition, rising action, climax,
    falling action, and resolution, and assess how effectively they are structured
    to create a compelling narrative.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pacing Evaluation: analyze the story’s pace and identify sections that may
    be too slow, too fast, or unevenly paced.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot Holes and Inconsistencies: Track information across long stretches of
    text, which allows it to spot plot holes, inconsistencies, and unresolved plot
    lines.'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Character Development
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Arcs and Motivations: track the development of characters throughout
    the story, analyzing their motivations, goals, and internal conflicts.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationships: assess how characters interact with each other, the
    dynamics of their relationships, and how these relationships influence the plot.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Characterization Techniques: analyze how the author uses dialogue, actions,
    thoughts, and descriptions to reveal characters’ personalities and inner lives.'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Theme and Meaning
  prefs: []
  type: TYPE_NORMAL
- en: 'Identifying Themes: identify the main themes explored in the novel, including
    love, loss, redemption, justice, and the human condition.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Symbolism and Motifs: Recognize recurring symbols and motifs and analyze how
    they contribute to the story’s thematic development.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Author’s Message: By analyzing themes and symbols, the AI can infer the author’s
    message or the underlying meaning they intend to convey.'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Setting and Atmosphere
  prefs: []
  type: TYPE_NORMAL
- en: 'World-Building: assess the effectiveness of the author’s world-building, including
    creating believable settings, cultures, and societies.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Atmosphere and Mood: analyze how the author uses sensory details and language
    to create a specific atmosphere or mood that enhances the story.'
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Point of View and Narration
  prefs: []
  type: TYPE_NORMAL
- en: 'Narrative Voice and Perspective: identify the narrative voice and point of
    view used in the story, such as first-person, third-person limited, or omniscient.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reliability of the Narrator: assess the narrator’s reliability and analyze
    how their perspective influences the reader’s understanding of events.'
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Language and Style
  prefs: []
  type: TYPE_NORMAL
- en: 'Sentence Structure and Word Choice: analyze the author’s use of language, including
    sentence structure, diction, and figurative language.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tone and Style: Identify the tone and style of the writing and assess how they
    contribute to the story’s overall effect.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Dialogue Effectiveness: analyze the effectiveness of dialogue in revealing
    characters’ personalities and advancing the plot.'
  prefs: []
  type: TYPE_NORMAL
- en: INTERACTIVE CRITIQUING WITH A CHATBOT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like we wrote a story scene-by-scene, we can critique each scene with a chatbot
    such as ChatGPT or Claude. We can start a running conversation by copying and
    pasting each scene into the chat and asking for a general critique or specific
    points we are concerned about.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s ChatGPT Plus allows users to create Custom GPTs with custom knowledge
    base files. I’ve used this feature to create a Custom GPT called “Writer’s Room.”
    I gave names to each writer in the writer’s room and his or her field of expertise.
    One is a dialogue expert who looks for effective dialogue and subtext and advises
    on how to make dialogue clear and effective. Another could be an expert in character
    analysis, and someone else could be a world-builder. (You can also use Custom
    Instructions to Creates “Writer’s Room w/ OpenAI ChatGPT 4” [https://adorable-porcupine.super.site/openai-chatgpt](https://adorable-porcupine.super.site/openai-chatgpt)
    I believe Custom Instructions is now available with the Free version) ⁠[2](#c349.xhtml#a443)
  prefs: []
  type: TYPE_NORMAL
- en: Take the categories I listed in the previous section and create a persona skilled
    at analyzing that attribute. Upload specific knowledge base files using your preferred
    story structure, character traits, world-building details, and genre conventions.
    If you have websites with more knowledge, you can retrieve that data through API
    calls. Be careful not to overload the knowledge base because your chat response
    time will be slower while it spins while going through the knowledge base.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to use a Custom GPT. The foundational models have enough knowledge
    of fiction to provide critiques. I’ve heard of authors using Claude 3 Haiku for
    critiques and editing. Of course, there will always be a flavor of the week, so
    joining an author’s group will help you keep up.
  prefs: []
  type: TYPE_NORMAL
- en: Here are some ways to use your Writer’s Room or generic chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. You could ask the LLM to analyze a specific section of your text and provide
    feedback on the pacing and tension. For example, “Analyze the pacing and tension
    in the following excerpt and suggest how it might be improved to increase engagement.”
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Ask the LLM specific questions about the text, such as “Does the action
    in this section feel rushed?” or “Is there enough tension in this dialogue to
    keep readers interested?”
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Provide the LLM with different scene versions and ask which one maintains
    better tension or pacing and why. Be sure to tag the scene with container tags
    so the LLM knows which one is Scene A and which one is Scene B. [Scene A]{paste
    in Scene A text}[/Scene A].
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Ask the LLM to describe a chapter’s or scene’s emotional arc and suggest
    modifications to enhance the emotional impact or smooth out narrative inconsistencies.
  prefs: []
  type: TYPE_NORMAL
- en: PRE-PACKAGED FICTION CRITIQUE TOOLS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can also use pre-packaged tools like Autocrit, Fictionary, and ProwritingAid.
  prefs: []
  type: TYPE_NORMAL
- en: 'Autocrit has a new Story Analyzer feature that uses Generative-AI to analyze
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Synopsis
  prefs: []
  type: TYPE_NORMAL
- en: Conflict
  prefs: []
  type: TYPE_NORMAL
- en: Characters
  prefs: []
  type: TYPE_NORMAL
- en: World Building
  prefs: []
  type: TYPE_NORMAL
- en: Possible Contradiction Events
  prefs: []
  type: TYPE_NORMAL
- en: Timeline Analysis
  prefs: []
  type: TYPE_NORMAL
- en: Foreshadowing Events
  prefs: []
  type: TYPE_NORMAL
- en: Plot Thread Tracking
  prefs: []
  type: TYPE_NORMAL
- en: Genre Analysis
  prefs: []
  type: TYPE_NORMAL
- en: It works on one chapter at a time.
  prefs: []
  type: TYPE_NORMAL
- en: 'ProwritingAid uses AI to analyze 4000 words at a time to give feedback on the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: Strengths
  prefs: []
  type: TYPE_NORMAL
- en: Plot/Story
  prefs: []
  type: TYPE_NORMAL
- en: Characters
  prefs: []
  type: TYPE_NORMAL
- en: Tension
  prefs: []
  type: TYPE_NORMAL
- en: Point of View
  prefs: []
  type: TYPE_NORMAL
- en: Setting
  prefs: []
  type: TYPE_NORMAL
- en: Style/Voice
  prefs: []
  type: TYPE_NORMAL
- en: Clarity
  prefs: []
  type: TYPE_NORMAL
- en: Etc.
  prefs: []
  type: TYPE_NORMAL
- en: Fictionary has an existing story analysis tool that compares your story to a
    predefined structure. They are currently adding generative AI. For example, the
    conflict and tension section is analyzed by AI. As of this writing, most of the
    rest is done conventionally, with user input where needed to keep track of the
    story threads. However, the platform is evolving, so by the time you read this,
    many more areas will be AI-enabled.
  prefs: []
  type: TYPE_NORMAL
- en: The same goes for just about every tool you use. Generative AI is embedded everywhere,
    and you will see it in your writing tools, browsers, and apps.
  prefs: []
  type: TYPE_NORMAL
- en: THE ADVANTAGES OF INTERACTING DIRECTLY WITH LANGUAGE MODELS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While using prepackaged software is convenient and easy, you are limited to
    the features they’ve provided, and moreover, you cannot access the prompts they
    send. Therefore, you cannot modify the results by refining the prompts or personalizing
    them to your specific genre or story. You cannot choose the LLM to ask questions
    and are limited to the ones they support. The responses you get are likely to
    be generic because the prompts are generic.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the foundational models from large corporations have filters that prevent
    them from responding to content they deem violent or sexual; however, open-source
    LLMs exist that are unfiltered. The responses you get are likely to be generic.
  prefs: []
  type: TYPE_NORMAL
- en: My personal opinion is to go directly to the LLM. That way, you know their data
    handling policy, whether your data will be used for training, and the size or
    context window being analyzed. You will also have clarity on the exact prompts
    passed to the LLM and can ask clarifying follow-up questions to target areas of
    your manuscript better. Individualized prompts will ensure that your results do
    not sound like every other user of a particular tool. Going directly to the LLM
    may mean paying per API call, but if you think about it, you get precisely what
    you pay for rather than aggregating your monthly charge among all the prepackaged
    tool’s users. Furthermore, the calls are fractions of pennies. For example, you
    can see the pricing chart at Openrouter.ai, which includes many FREE models.
  prefs: []
  type: TYPE_NORMAL
- en: As of this writing, Google’s Gemini 1.5 Pro introduced a million-token context
    window that allows the entire analysis of documents (and even multiple documents).
    This presents a quantum leap in synthesizing plot threads across chapters and
    tracking character arcs across books in a series.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, no AI LLM can give the human touch necessary for a complete developmental
    edit. This includes emotional experiences, puzzling plot threads, cultural considerations,
    and plain old common sense. However, the conversation with the LLM can point to
    areas that need further work.
  prefs: []
  type: TYPE_NORMAL
- en: See [Part VII. Your AI-Enabled Second Brain](#c279.xhtml) for story critique
    examples.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​10​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: POLISHING AND PUBLISHING
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many authors regularly use grammar and spellcheckers to polish their manuscripts
    before sending them to editors. Today’s generative AI tools can be added to the
    list. LLMs like ChatGPT and Claude were trained on a vast corpus of human-created
    writing. They can look for patterns and identify areas that you’re concerned with.
    Their vast associative abilities mean they can provide insight you might not have
    thought of. In any case, using LLMs to polish your scenes can’t hurt. They offer
    an additional layer of consideration that complements your human editor.
  prefs: []
  type: TYPE_NORMAL
- en: TIPS ON USING AI FOR EDITING
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ask the same questions of the AI editor as you would yourself. You can copy
    and paste your scene into its context window and ask specific questions.
  prefs: []
  type: TYPE_NORMAL
- en: Read this scene and give me an analysis that includes (you need first to check
    what the AI sees in the scene).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Look for elements in the scene that don’t move the plot forward.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are the people in the scene moving or acting toward their objectives?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the dialogue relevant to the character’s objectives?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do the actions move the story forward if you have a sequence, such as a fight
    scene?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are the characters’ motivations clear?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are there unnecessary repetitions of events?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let me know if there are places to cut anything to clarify the narrative drive.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are only example questions. One way to increase the accuracy of AI’s suggestions
    is to upload background information such as genre, sub-genre, your vision for
    the book or scene in question, where this book fits in the marketplace, target
    audience, and reading level.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can do this with context stuffing or using a megaprompt. See [Chapter 21:
    Megaprompting](#c176.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: AI EDITING PRINCIPLES
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Supplement, Don’t Replace: AI tools should be used as supplements to human
    judgment, not replacements. It’s crucial to review AI suggestions critically and
    retain the final say in all edits to preserve the author’s unique voice.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Explore Different Tools: Different AI editing tools have unique strengths.
    Experiment with various options to find the ones that best suit your specific
    needs.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Incorporate Human Feedback: Even the most advanced AI cannot fully replace
    the nuanced understanding of a human editor or beta reader. Ensure your manuscript
    undergoes human review to capture subtleties that AI might miss.'
  prefs: []
  type: TYPE_NORMAL
- en: USING CONVENTIONAL EDITING TOOLS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'AI-powered editing tools like Grammarly, ProWritingAid, and AutoCrit leverage
    advanced algorithms to analyze text for grammar, style, and clarity issues. A
    few of their main features, in addition to their generative AI suggestions, are:'
  prefs: []
  type: TYPE_NORMAL
- en: Catching Typos and Grammatical Errors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improving Sentence Structure and Clarity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhancing Vocabulary and Style
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another way to proofread your work is to use text-to-audio tools. Having someone
    or something read back your manuscript is a highly effective way for authors to
    catch errors that might be missed when reading text visually. Hearing your words
    can also provide a new perspective on the rhythm and flow of your writing, highlighting
    areas that may need further refinement.
  prefs: []
  type: TYPE_NORMAL
- en: MARKETING AND PROMOTIONAL MATERIALS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Marketing is beyond the scope of this book, but I’ll mention a few obvious uses
    of generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Artwork and Blurbs: AI-driven design tools like [Canva](https://canva.com)
    ⁠[1](#c349.xhtml#a415) or tools powered by DALL-E or Adobe Firefly can generate
    book covers and marketing graphics. AI can also help craft compelling blurbs by
    analyzing successful books in your genre to determine what appeals to readers.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Social Media and Blog Content: AI tools can generate social media posts, blog
    articles, and even podcast transcripts that maintain a consistent promotional
    voice for your book.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Audiobooks and Video Clips: AI voice synthesis technologies can transform your
    manuscript into an audiobook. Similarly, AI video creation platforms enable authors
    to produce book trailers and promotional video clips that can enhance online visibility.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Comprehensive Marketing Analysis: AI tools can be used to research market trends
    and reader preferences, analyze competitors, and determine what the target audience
    wants.'
  prefs: []
  type: TYPE_NORMAL
- en: The prompting techniques you hone during the story conception and development
    phase will also help you clarify your marketing goals and generate engaging content
    geared toward your target audience. AI technology will be ubiquitous in every
    aspect of your life, and learning to harness it will prove valuable for your success
    in the competitive literary and publishing marketplace.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​11​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: ADDITIONAL CONSIDERATIONS
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using AI is an individual choice and should be respected as long as it is used
    ethically. Let’s discuss several top-of-mind issues.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Using generative AI is unethical because it is trained on people’s copyrighted
    work.
  prefs: []
  type: TYPE_NORMAL
- en: The ethics of using generative AI are complex, as different language models
    are trained on various datasets. While some LLMs may have been trained on datasets
    that included copyrighted material scraped from the internet, others are trained
    exclusively on licensed data. Therefore, it’s unfair to paint all AI with a broad
    brush. While it is true that some datasets might have included copyrighted material,
    the case law isn’t settled. Previous cases have found that machine learning is
    covered under fair use, similar to when you check out a book from the library
    and read it cover to cover. You learned from the book, but you don’t have a carbon
    copy of the book in your memory, and neither does the LLM. I’m not a lawyer, so
    we’ll see how the cases settle. As an AI user, you can mitigate potential ethical
    concerns by choosing LLMs trained on licensed data.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Generative AI enables plagiarism by making it easy for people to plagiarize.
  prefs: []
  type: TYPE_NORMAL
- en: AI language models are powerful tools, but the user is ultimately responsible
    for their use. If you enter a prompt asking the AI to recreate specific content
    or copy and paste someone else’s work into the prompt, you are the one committing
    a potential copyright violation, not the AI. The language model associates words
    based on the input you provide, so any instances of plagiarism or infringement
    result from the user’s actions.
  prefs: []
  type: TYPE_NORMAL
- en: We should note, however, that occasionally, even without deliberate infringement,
    AI-generated content might produce unintentional similarities with existing works
    due to the vast amount of data used in training. The legal doctrines of fair use
    and transformative works are still being interpreted and applied to AI-generated
    content.
  prefs: []
  type: TYPE_NORMAL
- en: Users should also be aware that their prompts may be recorded and stored, potentially
    serving as evidence in future legal cases unless they use a private, offline language
    model. Therefore, it is crucial to use AI responsibly and ethically and understand
    the potential consequences of your actions.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Using AI could perpetuate potential biases in the AI models.
  prefs: []
  type: TYPE_NORMAL
- en: This is true because the biases were in the datasets. These datasets contain
    all known human-recorded text, art, photographs, videos, and audio throughout
    history. The LLM was trained on these datasets and will reflect those biases.
    However, this is where the AI users should provide oversight and take responsibility
    for the output. This is the same if you researched in a library and found biases.
  prefs: []
  type: TYPE_NORMAL
- en: Some ways to mitigate the impact of biases are to fact-check information and
    seek feedback from diverse perspectives. Any content you produce with AI assistance
    needs to be critically evaluated. When necessary, you can manually edit the output
    to correct any mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. You cannot copyright AI-generated work.
  prefs: []
  type: TYPE_NORMAL
- en: This varies from country to country. AI-generated writing is already copyrightable
    in some countries, whereas other countries have determined that you may copyright
    arrangement of public domain content. The issue is not settled, but generative
    AI is inside every creative tool or making its way into every tool, and it will
    be a can of worms to determine the “originality” of a particular work. Some countries
    consider AI-generated work in the public domain; however, the arrangement or modifications
    can be copyrighted (with arguments on how much was changed).
  prefs: []
  type: TYPE_NORMAL
- en: I won’t list any specific country and definition of what is copyrightable and
    what is not because things are changing fast. However, we can look at the case
    of photography for clues on how the copyright issue might be settled.
  prefs: []
  type: TYPE_NORMAL
- en: In many jurisdictions, the copyright for a photograph is granted to the person
    who captured the image, regardless of the level of creativity or originality involved
    in the process. This protection is based on factors such as the choice of camera
    angle, timing, and the decision to take the photograph. Similarly, the human input
    involved in creating AI-generated work, such as designing prompts, refining outputs,
    and selecting the final result, could potentially be considered a basis for granting
    copyright protection.
  prefs: []
  type: TYPE_NORMAL
- en: However, it is essential to recognize that the legal landscape surrounding AI-generated
    work is still evolving, and current information may quickly become outdated. Therefore,
    staying informed about the latest developments in copyright law for your jurisdiction
    is essential. Organizations such as the World Intellectual Property Organization
    (WIPO) and national copyright offices can provide up-to-date information and resources
    on the legal status of AI-generated work.
  prefs: []
  type: TYPE_NORMAL
- en: The increasing integration of AI in creative tools and the rapid advancement
    of AI technologies will likely lead to further discussions and potential changes
    in copyright law. Key areas of focus may include the role of human input in the
    creative process, the concept of originality in the context of AI-generated work,
    and the balance between protecting creators’ rights and fostering innovation in
    the AI space.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. How will AI affect the publishing industry?
  prefs: []
  type: TYPE_NORMAL
- en: Do you have a crystal ball? My answer is that it will definitely affect the
    publishing industry just like it will affect all aspects of our lives. However,
    I don’t know the immediate or long-term effects. We live in exciting times.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Can I build a career as an AI-assisted author?
  prefs: []
  type: TYPE_NORMAL
- en: You sure can. AI can help your productivity, but the stories you tell still
    come from your human individuality. Whether you’re an established or emerging
    author, your success will depend on your storytelling skills, marketing efforts,
    and ability to connect with readers.
  prefs: []
  type: TYPE_NORMAL
- en: 7\. AI-generated stories are bland and generic.
  prefs: []
  type: TYPE_NORMAL
- en: This is where prompting makes a difference. If you use generic prompts, you
    will get generic stories. I’m not a big proponent of collecting other people’s
    prompts. Writing unique prompts is the art of putting your soul into the story.
    In addition, filtering, selecting, and revising or using the AI-generated content
    as inspiration or even “what not to do” goes a long way toward making your story
    uniquely yours.
  prefs: []
  type: TYPE_NORMAL
- en: Early ChatGPT responses tend to be more clichéd and same-sounding. However,
    that was due to the dataset where they scraped the internet and fan fiction sites.
    Now that we have a proliferation of LLMs trained on diverse datasets, we can expect
    a broader range of results. Furthermore, the content you put in your prompts will
    influence generative AI’s output. The more imagination you put in, the more likely
    AI will give you back unique content.
  prefs: []
  type: TYPE_NORMAL
- en: As for AI writing sounding the same, that is no longer true. Most people’s notion
    of how AI sounds is based on ChatGPT’s default writing style. We can now fine-tune
    GPT-3.5 to take on an author’s voice. Therefore, in the final analysis, it is
    not AI making the story bland and generic, but the user copying other people’s
    prompt libraries and sounding like everyone else using the same prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Stories should be judged on how well the author’s soul touched your soul, whether
    AI was used or not.
  prefs: []
  type: TYPE_NORMAL
- en: ​[ ​12​ ]​
  prefs: []
  type: TYPE_NORMAL
- en: RESOURCES AND REFERENCES
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Even though AI can expand our horizons and appears to have vast knowledge, you,
    as the storyteller, must bring your domain expertise, story-crafting skills, and
    individuality into the story development process. AI can draw on a vast amount
    of word associations, but it needs you to direct it and filter the results.
  prefs: []
  type: TYPE_NORMAL
- en: As the author, you are the final arbiter of what you use and how you adapt AI
    to your writing process. We talked about creating templates for story structure
    or character development as well as genre-specific scene beats and themes.
  prefs: []
  type: TYPE_NORMAL
- en: There are many resources for learning the craft of writing, so I’ll leave you
    with a few here. The Story Grid scene development method is useful for scene briefs
    and John Truby’s books for story structure and genre-specific expectations. To
    preserve the individuality of your stories, I don’t recommend copying anyone’s
    story structure or beat outline. However, knowing the craft and how stories and
    scenes progress, you can create templates tailored to your own work.
  prefs: []
  type: TYPE_NORMAL
