  zh: 我有一些想法，关于你如何利用你的温暖和关怀性质，以及你为任何情况带来的兴奋感，同时保留你的个人风格。但现在我不会告诉你，因为你必须先跌到谷底才能改变。你太固执了，当然，爱德华多威胁如果你的不嫁给他，你的家人将面临破产，但你必须先跌到谷底，你才会接受我为你指出的道路，并赢回迪伦。
