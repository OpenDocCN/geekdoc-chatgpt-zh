  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能意味着从头开始，重建我的职业生涯，面对未来的不确定性。但如果这意味着有机会与迪伦过上真实而充实的生活，我愿意承担这个风险。
- en: 'USER:'
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：
- en: Yes, I believe you’ll need to rethink your career as an internet influencer
