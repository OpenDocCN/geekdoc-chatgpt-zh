- en: 'Chapter 1: Leveling Up From Beginner to Pro'
  id: totrans-264
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：从新手到专家的飞跃
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: The first step to turning a bot into a moneymaker is getting comfortable with
    its advanced features, which is doable for anyone. This sums up going from knowing
    very little about ChatGPT to being superb at using it to make money. Let’s break
    it down.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 将机器人变成赚钱工具的第一步是熟悉其高级功能，这对任何人来说都是可行的。这总结了从对ChatGPT知之甚少到熟练使用它赚钱的过程。让我们一步步来分析。
- en: If you are unfamiliar with prompt engineering basics or need a refresher course,
    you can refer to my beginner’s training manual ChatGPT Money Machine by Alec Rowe
    for all the instruction and explanation you will need on AI and ChatGPT. Once
    the basics are understood, we can begin earning money with the tool.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不太熟悉提示工程的基础知识或者需要复习课程，你可以参考亚历克·罗的入门训练手册《ChatGPT Money Machine》，它将为你提供关于AI和ChatGPT所需的所有指导和解释。一旦掌握了基础知识，我们就可以开始利用这个工具赚钱了。
- en: First off, the idea of making money with a bot shows how useful ChatGPT can
    be. Originally just for helping with tasks and making content, ChatGPT has become
    a good way to earn money. Knowing what it can do and how to use it smartly can
    help you find new moneymaking opportunities.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，用机器人赚钱的想法展示了ChatGPT有多有用。最初只是用来帮助完成任务和制作内容，ChatGPT已经成为一种赚钱的好方法。了解它能做什么以及如何聪明地使用它可以帮助你找到新的赚钱机会。
- en: Learning the more complicated features makes it clear why going beyond the basics
    matters. To truly be an expert, you need to understand all of ChatGPT’s features.
    Beginners might be fine with just using it for simple things like writing or answering
    questions. But to do that well, you need to know about all the different settings
    and ways to make it work for you.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 学习更复杂的功能清楚地说明了超越基础的重要性。要真正成为专家，你需要了解ChatGPT的所有功能。初学者可能只需用它做一些简单的事情，比如写作或回答问题。但要做得好，你需要了解所有不同的设置和让它为你工作的方法。
- en: It also sounds like learning ChatGPT isn’t too hard. The advanced features might
    seem tough at first, but if you put in the time and effort, you can get the hang
    of them. By learning, practicing, and trying out different things on the platform,
    you can unlock its full moneymaking potential.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 学习ChatGPT听起来也不太难。一开始，高级功能可能看起来很困难，但如果你投入时间和精力，你可以掌握它们。通过学习、练习并在平台上尝试不同的事情，你可以解锁它的全部赚钱潜力。
- en: The main idea behind going from a ChatGPT newbie to a pro is feeling empowered.
    You can reach your financial goals by taking advantage of this powerful tool.
    Turning ChatGPT into a moneymaker means taking on the challenge, learning as much
    as you can, and exploring all the ways it can help you earn. So, let’s dive in
    and discover all the possibilities waiting for those who are ready to become ChatGPT
    experts.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 从ChatGPT新手到专家的主要思想是感到有力量。你可以通过利用这个强大的工具来实现你的财务目标。将ChatGPT变成赚钱工具意味着接受挑战，尽可能多地学习，并探索它如何帮助你赚钱。所以，让我们深入探索，发现那些准备好成为ChatGPT专家的人所等待的所有可能性。
- en: 'AI: How It Works'
  id: totrans-272
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI：它是如何工作的
- en: AI is a field of computer science dedicated to creating smart machines that
    mimic human-like behavior and decision-making. These machines can analyze data,
    learn from patterns, and adapt to new information, performing tasks that typically
    require human intelligence. AI has become increasingly important in various industries
    due to its transformative abilities.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是计算机科学的一个领域，致力于创建模仿人类行为和决策的智能机器。这些机器可以分析数据，从模式中学习，并适应新信息，执行通常需要人类智能的任务。由于人工智能具有变革能力，它在各个行业中变得越来越重要。
- en: AI technologies are changing the way we live and work, from powering virtual
    assistants and chatbots to driving autonomous vehicles and streamlining business
    operations. In healthcare, AI helps diagnose diseases, tailor treatments, and
    improve patient outcomes. In finance, AI algorithms detect fraud, assess risk,
    and manage investments. Moreover, AI-driven platforms enhance customer experiences,
    fuel recommendation engines, and enable personalized marketing in ecommerce and
    retail.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术正在改变我们的生活方式和工作方式，从为虚拟助手和聊天机器人提供动力到推动自动驾驶汽车和简化业务运营。在医疗保健领域，人工智能帮助诊断疾病、定制治疗方案并改善患者结果。在金融领域，人工智能算法检测欺诈、评估风险和管理投资。此外，人工智能驱动的平台增强了客户体验，推动了推荐引擎，并在电子商务和零售中实现了个性化营销。
- en: Overall, AI is reshaping industries, sparking innovation, opening doors to new
    solutions for complex problems, and increasing efficiency in our interconnected
    world. Its importance continues to rise as organizations leverage its potential
    to drive growth, gain a competitive edge, and meet evolving consumer needs in
    the digital era.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，人工智能正在重塑行业，激发创新，为复杂问题打开新的解决方案之门，并提高我们互联互通世界的效率。随着组织利用其潜力推动增长、获得竞争优势以及满足数字时代不断变化的消费者需求，其重要性持续上升。
- en: Understanding Machine Learning vs. Traditional Programming
  id: totrans-276
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解机器学习与传统编程的区别
- en: 'Ever wonder how those smart assistants on your phone understand your commands
    or how Netflix recommends movies you love? They rely on AI, and within AI, there
    are two key approaches: traditional programming and machine learning. Let’s break
    it down!'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾想过你手机上的智能助手是如何理解你的指令，或者Netflix是如何推荐你喜欢的电影的？它们依赖于人工智能，而在人工智能中，有两种关键的方法：传统编程和机器学习。让我们来分解一下！
- en: Imagine you’re teaching your dog to sit. You give clear instructions, reward
    good behavior, and repeat until it gets it right. That’s like traditional programming.
    We give computers precise instructions, step-by-step, to handle specific tasks.
    Think of sorting your email or calculating math problems. It’s reliable and predictable,
    but not very flexible.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在教你的狗坐下。你给出清晰的指令，奖励良好的行为，并重复直到它做对。这就像传统的编程。我们给计算机精确的指令，一步一步地处理特定的任务。比如整理你的电子邮件或计算数学问题。它可靠且可预测，但不够灵活。
- en: Now, imagine teaching your dog new tricks by just playing fetch together. It
    starts recognizing patterns and adapting its behavior. That’s machine learning.
    We feed the computer massive amounts of data (think pictures, text, or even sound),
    and it learns to find patterns and make predictions on its own. Imagine recognizing
    faces in photos or even composing music! It’s like magic but with data and algorithms.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一下，通过一起玩接球来教你的狗新把戏。它开始识别模式并调整其行为。这就像机器学习。我们向计算机提供大量数据（想想图片、文本，甚至是声音），它学会自己寻找模式和做出预测。想象一下在照片中识别面孔，甚至创作音乐！这就像魔法，但有了数据和算法。
- en: The main difference is that traditional programming uses predefined rules, while
    machine learning uses data. Like training a dog versus playing fetch. This makes
    machine learning powerful because it can handle situations it hasn’t been specifically
    programmed for, like recognizing new faces or understanding new words.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 主要区别在于，传统编程使用预定义的规则，而机器学习使用数据。就像训练狗和玩接球一样。这使得机器学习强大，因为它可以处理它没有被特别编程的情况，比如识别新面孔或理解新单词。
- en: So, Which Is Better?
  id: totrans-281
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 那么，哪个更好？
- en: It depends! Traditional programming is great for clear, defined tasks. Machine
    learning shines when things are less structured and more complex. Both play crucial
    roles in making AI the amazing technology it is today.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 取决于！传统编程非常适合清晰、定义明确的任务。机器学习在事物不那么结构化和更复杂时表现出色。两者都在使人工智能成为今天令人惊叹的技术中扮演着至关重要的角色。
- en: The Current Landscape of AI in Diverse Industries
  id: totrans-283
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当前人工智能在各个行业的应用格局
- en: From the pulse of healthcare to the flow of finance and the heartbeat of transportation,
    AI is not just revolutionizing, it’s redefining how we function. Imagine AI as
    a doctor’s sharpest assistant, diligently analyzing medical images, and spotting
    subtle nuances that might escape even the most seasoned eye. This eagle-eyed vision,
    powered by algorithms, leads to faster diagnoses and personalized treatment plans,
    uniquely tailored to each patient’s needs. AI even extends its hand directly to
    patients, with chatbots and virtual assistants offering readily available advice
    and support.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 从医疗保健的脉搏到金融的流动和交通的心跳，人工智能不仅正在革命化，还在重新定义我们如何运作。想象一下，人工智能就像医生最得力的助手，勤奋地分析医学图像，并捕捉到连经验最丰富的眼睛都可能错过的微妙差异。这种锐利的视野，由算法驱动，导致诊断更快，个性化治疗方案独特，针对每个患者的需求量身定制。人工智能甚至直接伸出手来帮助患者，通过聊天机器人和虚拟助手提供随时可用的建议和支持。
- en: In the financial sector, AI isn’t just crunching numbers, it’s acting as a trusted
    financial advisor. With lightning-fast analysis, it scans mountains of data, sniffing
    out suspicious transactions before they blossom into fraudulent activities. These
    digital sentries safeguard our hard-earned cash, while robo-advisors, guided by
    AI’s keen insights, offer personalized investment strategies, steering us toward
    a brighter financial future. Even customer service gets a tech makeover, with
    AI-powered systems answering inquiries with remarkable speed and accuracy, ensuring
    a seamless and efficient experience.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融领域，人工智能不仅仅是处理数字，它还充当着受信任的财务顾问。通过闪电般的分析，它扫描大量数据，在可疑交易变成欺诈活动之前就嗅探出来。这些数字哨兵保护我们辛苦赚来的钱，而由人工智能敏锐洞察力引导的机器人顾问，提供个性化的投资策略，引导我们走向更光明的财务未来。甚至客户服务也得到了技术改造，由人工智能驱动的系统以惊人的速度和准确性回答查询，确保无缝且高效的经历。
- en: The rumble of engines now carries the hum of AI as this technology takes the
    wheel in autonomous vehicles. These algorithmic minds perceive the world around
    them with unparalleled clarity, making split-second decisions and navigating with
    precision, paving the way for safer and more efficient transportation. Cities,
    too, benefit from AI’s watchful eye, with traffic management systems analyzing
    data in real time to optimize flow and reduce congestion, making our journeys
    smoother and less stressful. Even the vehicles themselves get smarter, with AI
    predicting potential issues before they turn into breakdowns, keeping us on the
    move and minimizing downtime.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，引擎的轰鸣声已经变成了人工智能的低鸣声，因为这项技术正在自动驾驶汽车中掌握方向盘。这些算法化的思维以无与伦比的清晰度感知周围的世界，做出瞬间决策，以精确的方式导航，为更安全、更高效的交通铺平道路。城市也从人工智能的警惕目光中受益，交通管理系统实时分析数据以优化流量和减少拥堵，使我们的旅程更加顺畅，压力更小。甚至车辆本身也变得更智能，人工智能在问题变成故障之前预测潜在问题，使我们保持移动，并最小化停机时间。
- en: This is just a glimpse into the transformative power of AI, its impact rippling
    across industries, boosting efficiency, and driving innovation. As this intelligent
    technology continues to evolve, we can expect even deeper integration, ushering
    in a new era of progress and possibility.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是对人工智能变革力量的初步了解，其影响波及各行各业，提升效率，推动创新。随着这种智能技术的持续发展，我们可以期待更深层次的融合，迎来一个进步和可能性的新时代。
- en: Brief Recap of Basics
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础知识简要回顾
- en: 'Remember the clunky chatbots with preprogrammed responses? Well, forget them!
    ChatGPT, a game-changer in the world of AI, takes natural language processing
    (NLP) to new heights. Forget rigid rules, ChatGPT is all about learning and evolving.
    It devours massive amounts of data, just like a curious student, constantly improving
    its ability to understand and even generate human-like text. Think of it this
    way: Instead of prerecorded lines, ChatGPT has a full-fledged conversation toolkit.
    It can answer your questions, provide information, and even help you with tasks—all
    in a way that feels natural and engaging. This isn’t just fancy tech; it’s about
    revolutionizing how we interact with AI. So, buckle up as we explore ChatGPT’s
    superpowers.'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 记得那些笨拙的、有预编程响应的聊天机器人吗？好吧，忘掉它们吧！ChatGPT，AI世界中的变革者，将自然语言处理（NLP）提升到了新的高度。忘掉僵化的规则，ChatGPT完全是关于学习和进化的。它像一名好奇的学生一样吞噬大量的数据，不断改进其理解和甚至生成类似人类文本的能力。可以这样想：与预先录制的台词不同，ChatGPT拥有一个完整的对话工具包。它可以回答你的问题，提供信息，甚至帮助你完成任务——所有这些都在一种自然和吸引人的方式中完成。这不仅仅是一项高级技术；这是关于革命性地改变我们与AI互动的方式。所以，系好安全带，让我们探索ChatGPT的超级能力。
- en: Understanding the Technology Behind ChatGPT
  id: totrans-290
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解ChatGPT背后的技术
- en: The complex architecture upon which ChatGPT runs is based on NLP and deep learning.
    The core of it is the neural network structure known as the transformer architecture,
    which is great at handling sequential data. Thanks to its design, ChatGPT can
    handle and produce text by focusing on various portions of the input sequence
    concurrently, thereby capturing intricate linguistic patterns and dependencies.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT运行的复杂架构基于自然语言处理（NLP）和深度学习。其核心是名为Transformer架构的神经网络结构，擅长处理序列数据。得益于其设计，ChatGPT可以通过同时关注输入序列的各个部分来处理和生成文本，从而捕捉复杂的语言模式和依赖关系。
- en: Using unsupervised learning approaches, ChatGPT learns from large text datasets
    during training. This allows ChatGPT to build a thorough grasp of language from
    a variety of sources, such as books, articles, webpages, and more. With the use
    of self-supervised learning, ChatGPT continuously improves its language modeling
    skills, making word sequence predictions based on the context that has come before.
    To optimize language creation accuracy and minimize prediction mistakes, this
    iterative procedure adjusts millions of model parameters.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 使用无监督学习方法，ChatGPT在训练过程中从大量的文本数据集中学习。这使得ChatGPT能够从各种来源，如书籍、文章、网页等，全面掌握语言。通过使用自监督学习，ChatGPT持续提升其语言建模技能，根据之前出现的上下文进行词语序列预测。为了优化语言创作准确性并最小化预测错误，这个迭代过程调整了数百万个模型参数。
- en: Before training and during fine-tuning, ChatGPT also gains an advantage. Working
    with big text collections during pretraining helps the model learn how to represent
    language in general. To improve the performance and adaptability of the pretrained
    model, it is then fine-tuned to perform better on certain tasks or domains. By
    following this procedure, ChatGPT can cater to a wide range of uses, from content
    generation and question answering to suggestions and assistance in certain topics.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练之前和微调期间，ChatGPT 也获得了一定的优势。在预训练期间处理大量文本集合有助于模型学习如何一般性地表示语言。为了提高预训练模型的性能和适应性，它随后被微调以在特定任务或领域上表现更佳。通过遵循这一程序，ChatGPT
    可以满足广泛的用途，从内容生成和问答到特定主题的建议和协助。
- en: A complex combination of large-scale data processing, iterative learning algorithms,
    and neural network designs constitutes ChatGPT’s technology. This synergy allows
    ChatGPT to amaze with its naturalness, consistency, and adaptability in producing
    text responses that mimic human speech in a variety of settings.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 大规模数据处理、迭代学习算法和神经网络设计的复杂组合构成了 ChatGPT 的技术。这种协同作用使得 ChatGPT 在产生模仿人类语言的各种环境中的自然性、一致性和适应性方面令人惊叹。
- en: Exploring ChatGPT’s Versatile Capabilities
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索 ChatGPT 的多功能能力
- en: ChatGPT displays a wide array of skills, able to manage everything from simple
    question-and-answer sessions to carrying on in-depth conversations with users.
    Using its deep learning architecture, ChatGPT can understand and respond in a
    human-like manner to a wide variety of topics and situations.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 展示了广泛的能力，能够处理从简单的问答会话到与用户进行深入对话的各种情况。利用其深度学习架构，ChatGPT 能够以类似人类的方式理解和回应各种主题和情境。
- en: When it comes to basic question-and-answer tasks, ChatGPT really shines at giving
    consumers precise and succinct responses. Whether you need answers to specific
    questions, detailed instructions, or just general information, ChatGPT can quickly
    find what you need in its extensive database and provide it to you accurately.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到基本的问答任务时，ChatGPT 在提供精确和简洁的回应方面表现得尤为出色。无论你需要回答具体问题、详细说明，还是仅仅需要一般信息，ChatGPT
    都能快速在其庞大的数据库中找到你需要的内容，并准确提供给你。
- en: By demonstrating its ability to engage people in more complex and multifaceted
    conversations, ChatGPT goes beyond simple queries. It knows how to keep a conversation
    going on a wide range of topics, change its answers according to what the user
    is saying, and even spice things up with some humor or inventiveness. Because
    of its adaptability, ChatGPT can captivate users as a virtual conversational companion
    by mimicking natural speech patterns.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 通过展示其参与更复杂和多层次对话的能力，ChatGPT 超越了简单的查询。它知道如何在一个广泛的主题上维持对话，根据用户所说的内容调整答案，甚至用一些幽默或创新来增添趣味。由于其适应性，ChatGPT
    可以通过模仿自然语言模式，作为虚拟对话伴侣吸引用户。
- en: In addition, ChatGPT is good at solving problems, making decisions, and using
    critical thinking skills. Effectively guiding people through decision-making processes,
    it can assess complex scenarios and deliver valuable viewpoints. The versatility
    and cognitive powers of ChatGPT are on display in a wide range of tasks, including
    idea generation, scenario exploration, and tailored recommendation-making.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT 还擅长解决问题、做决策和运用批判性思维技能。有效地引导人们通过决策过程，它能够评估复杂情境并提供有价值的观点。ChatGPT 的多功能性和认知能力在各种任务中得到了展示，包括创意生成、情境探索和定制化推荐制定。
- en: How to Leverage Previous Knowledge for Complex Projects
  id: totrans-300
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何利用先前的知识应对复杂项目
- en: 'To get the most out of ChatGPT while taking on complicated projects, it’s important
    to draw on prior knowledge and experience. Complex projects necessitate a more
    in-depth knowledge of and exploitation of ChatGPT’s features and functionalities;
    however, the basics do give a good basis. By going beyond the basics, users can
    fully utilize ChatGPT to tackle complex jobs and obstacles. Building on what you
    already know, you can:'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理复杂项目时，为了最大限度地发挥 ChatGPT 的作用，借鉴先前的知识和经验至关重要。复杂项目需要更深入地了解和利用 ChatGPT 的功能和特性；然而，基础部分也提供了一个良好的起点。通过超越基础，用户可以充分利用
    ChatGPT 来应对复杂的工作和挑战。基于你所知道的内容，你可以：
- en: ●  Personalize the parameters and prompts. Improve the quality of ChatGPT’s
    interactions and responses by customizing its prompts and parameters according
    to past experiences.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: ● 个性化参数和提示。根据以往的经验，通过定制其提示和参数来提高 ChatGPT 交互和回应的质量。
- en: ●  Enhance the quality of the training dataset. To improve ChatGPT’s performance
    in complicated situations, you can deepen its comprehension of particular domains
    or settings by drawing on relevant training data from previous projects.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提高训练数据集的质量。为了提高 ChatGPT 在复杂情况下的表现，可以通过利用先前项目中相关的训练数据来加深其对特定领域或环境的理解。
- en: ●  Introduce cutting-edge methods. To improve ChatGPT’s performance on difficult
    tasks, it can be enhanced with sophisticated approaches such as ensemble methods,
    transfer learning, and fine-tuning.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: ●  介绍前沿方法。为了提高 ChatGPT 在困难任务上的表现，可以通过集成方法、迁移学习和微调等复杂方法来增强其性能。
- en: ●  Resolve issues that are unique to the project. With prior knowledge, users
    can prepare for and handle project-specific issues, including complex user queries
    or domain-specific language, so that ChatGPT’s answers are in line with project
    goals.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: ●  解决项目特有的问题。用户可以利用先验知识来准备和处理项目特定的相关问题，包括复杂的用户查询或特定领域的语言，以确保 ChatGPT 的答案与项目目标一致。
- en: Project Applications of ChatGPT
  id: totrans-306
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT 的项目应用
- en: Projects leveraging ChatGPT’s adaptability to a wide range of areas and sectors
    are evidence of its strength in handling complex problems. Some examples of such
    projects include the below.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 利用 ChatGPT 在广泛领域和行业中的适应性，这些项目证明了其在处理复杂问题上的优势。以下是一些此类项目的例子。
- en: Customer Service Bots
  id: totrans-308
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 客户服务机器人
- en: Intelligent chatbots that respond to consumer questions, offer assistance, and
    speed up the order processing procedure can be created with the help of ChatGPT.
    These chatbots can converse with humans naturally, providing fast and tailored
    solutions to solve problems and assist customers.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 利用 ChatGPT 可以创建智能聊天机器人，这些机器人可以回答消费者问题、提供帮助并加快订单处理流程。这些聊天机器人可以与人类自然交流，提供快速和定制的解决方案，以解决问题并协助客户。
- en: Generating Content
  id: totrans-310
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 生成内容
- en: Posts for social media, product descriptions, blogs, and articles are just a
    few examples of the many types of material that ChatGPT can help generate. With
    the right context and suggestions, ChatGPT can help you create high-quality content
    that fits your brand’s voice and appeals to your target audience.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体帖子、产品描述、博客和文章只是 ChatGPT 可以帮助生成的众多材料类型中的几个例子。有了正确的背景和建议，ChatGPT 可以帮助你创建符合品牌声音并吸引目标受众的高质量内容。
- en: Data Analysis and Understanding
  id: totrans-312
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据分析和理解
- en: Finance, marketing, and healthcare are just a few of the many domains that might
    benefit from ChatGPT’s analysis of massive datasets and insightful forecasts.
    You may train ChatGPT to analyze your historical data and answer your unique questions,
    allowing you to gain valuable insights that will help you drive innovation and
    success in your business.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 金融、营销和医疗保健只是可能从 ChatGPT 对大规模数据集的分析和有洞察力的预测中受益的众多领域之一。你可以训练 ChatGPT 分析你的历史数据并回答你独特的问题，从而让你获得有价值的见解，这将有助于你在业务中推动创新和成功。
- en: Transcription and Translation of Languages
  id: totrans-314
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 语言转录和翻译
- en: For those who need help translating between languages or transcribing audio
    and video files, ChatGPT is a great tool to have at your disposal. Industries
    and contexts with a worldwide reach, like journalism, education, and international
    trade, greatly benefit from this skill.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些需要帮助在不同语言之间进行翻译或转录音频和视频文件的人来说，ChatGPT 是一个非常有用的工具。像新闻业、教育和国际贸易这样的具有全球影响力的行业和领域，都极大地受益于这项技能。
- en: Specific Suggestions
  id: totrans-316
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 具体建议
- en: Using data collected from users’ actions and preferences, ChatGPT may tailor
    suggestions for everything from services to content. ChatGPT can make personalized
    suggestions that improve the user experience, increase engagement, and lead to
    more sales by learning about the user’s likes and dislikes and past encounters.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 通过收集用户的行为和偏好数据，ChatGPT 可以针对从服务到内容的一切进行个性化建议。通过了解用户的喜好和以往的经历，ChatGPT 可以提供个性化的建议，从而改善用户体验、增加参与度并促进更多销售。
- en: These cases show how ChatGPT’s features may be applied to various projects,
    proving that it can transform processes and stimulate creativity in various sectors.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例展示了 ChatGPT 的功能如何应用于各种项目，证明了它能够改变流程并在各个行业激发创造力。
- en: Expanding ChatGPT’s Utility Through Existing Knowledge
  id: totrans-319
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过现有知识扩展 ChatGPT 的实用性
- en: Applying what is already known about ChatGPT to new, more complicated applications
    can greatly improve results and speed up execution. Using your current knowledge
    as a springboard, here are some suggestions for taking on these complex undertakings.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 将对ChatGPT已知的知识应用于新的、更复杂的应用可以大大提高结果并加快执行速度。利用您当前的知识作为跳板，以下是一些针对这些复杂任务的建议。
- en: Determining Particular Objectives
  id: totrans-321
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 确定特定目标
- en: Make sure you know exactly what you’re trying to accomplish or solve before
    you go into complicated projects with ChatGPT. Whether your goal is to enhance
    customer service efficiency, generate top-notch content, or perform advanced data
    analysis, having a clear purpose can help you navigate the process.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用ChatGPT进入复杂项目之前，确保您确切地知道您试图实现或解决的问题。无论您的目标是提高客户服务效率、生成高质量的内容，还是进行高级数据分析，有一个明确的目标可以帮助您导航整个过程。
- en: Breaking Down the Problem
  id: totrans-323
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 问题分解
- en: Dividing the challenge into smaller, more doable tasks is a great way to make
    the most of ChatGPT once you’ve settled on your goal. By doing so, you may better
    grasp the breadth of the project and solve problems in a methodical and organized
    fashion.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 将挑战分解为更小、更易管理的任务是在确定目标后充分利用ChatGPT的绝佳方式。通过这样做，您可以更好地掌握项目的范围，并以系统化和有组织的方式解决问题。
- en: Trying Out Prompt Engineering
  id: totrans-325
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 尝试提示工程
- en: Improving ChatGPT’s output quality requires exploring various prompt engineering
    techniques. To guide ChatGPT to produce more precise and pertinent replies, you
    need to construct well-designed prompts that are customized to your particular
    goals. The goal of this experimental phase is to improve the performance of the
    prompts by iteratively revising them based on initial results.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 提高ChatGPT输出质量需要探索各种提示工程技术。为了引导ChatGPT产生更精确和相关的回复，您需要构建针对您特定目标量身定制的精心设计的提示。这个实验阶段的目的是通过根据初步结果迭代修订提示来提高提示的性能。
- en: Continuously Refining Approach
  id: totrans-327
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 持续优化方法
- en: Finally, as the project progresses and you receive more and more input, adjust
    your approach accordingly. Keep an eye on what ChatGPT produces, figure out how
    well it solves the problem or accomplishes the objective, and find out what the
    stakeholders or users think. Make changes, refine your strategy, and iterate toward
    improved results using this input. To make ChatGPT work better and faster in complicated
    projects, iterative improvement is essential.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，随着项目的推进和您接收越来越多的输入，相应地调整您的策略。密切关注ChatGPT的输出，了解其解决问题的能力或完成目标的情况，并找出利益相关者或用户的看法。根据这些反馈进行修改，优化您的策略，并迭代改进以获得更好的结果。为了使ChatGPT在复杂项目中工作得更好、更快，迭代改进是必不可少的。
- en: Resources for Skill Enhancement and Deeper Insight
  id: totrans-329
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技能提升和深入洞察的资源
- en: 'If you’re familiar with ChatGPT, it’s a highly advanced language model that
    can impersonate the way humans speak and answer a wide range of questions. Exploring
    ChatGPT’s complexities and becoming proficient with its features can be both an
    exciting and intimidating idea if you don’t have proper guidance. To make your
    ChatGPT journey easier, there are a lot of free materials available online. Below,
    I’ll outline some of the top resources available for learning ChatGPT:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您熟悉ChatGPT，它是一个高度先进的语言模型，可以模仿人类说话并回答各种问题。如果您没有适当的指导，探索ChatGPT的复杂性和熟练掌握其功能可能既令人兴奋又令人畏惧。为了使您的ChatGPT之旅更加顺利，网上有很多免费资源。以下，我将概述一些学习ChatGPT的顶级资源：
- en: Tutorials to Improve Your Abilities
  id: totrans-331
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 提升能力的教程
- en: For anyone interested in ChatGPT, YouTube is a goldmine of instruction. From
    introductory guides for complete newcomers to the technology to more in-depth
    analyses for seasoned pros, these lessons cover everything. By reading through
    these materials, learners can fully comprehend ChatGPT’s features and learn how
    to use them effectively in various situations. Users can follow along and experiment
    with implementing different strategies in real time because these tutorials often
    contain hands-on demonstrations.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何对ChatGPT感兴趣的人来说，YouTube是一个充满指导的宝库。从针对完全新手的入门指南到针对资深专业人士的深入分析，这些课程涵盖了所有内容。通过阅读这些材料，学习者可以完全理解ChatGPT的功能，并学习如何在各种情况下有效地使用它们。用户可以实时跟随并尝试实施不同的策略，因为这些教程通常包含动手演示。
- en: Online Forums for Thought-Provoking Community Conversations
  id: totrans-333
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 思想启发型社区对话的在线论坛
- en: Sites like Reddit and LinkedIn are great resources for anyone looking for meaningful
    conversations and useful advice. Here, you can talk to other people who use ChatGPT,
    hear about their experiences, get advice on difficult parts, and share stories.
    People can learn ChatGPT and its advanced techniques faster in a community forum
    because it is a place for people to work together and share what they know.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 类似Reddit和LinkedIn这样的网站是寻找有意义对话和有用建议的绝佳资源。在这里，您可以与其他使用ChatGPT的人交流，了解他们的经验，获取关于困难部分的建议，并分享故事。在社区论坛中，人们可以更快地学习ChatGPT及其高级技术，因为这是一个人们共同工作和分享知识的地方。
- en: Official Documentation for In-Depth Guidance
  id: totrans-335
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 官方文档，提供深入指导
- en: The best places to find detailed instructions on how to use ChatGPT are OpenAI’s
    official website and its GitHub repository. Learners have access to expert-curated
    tutorials, examples, and guides on these platforms, which provide them with organized
    learning pathways and a wealth of resources.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到关于如何使用ChatGPT的详细说明，最佳地点是OpenAI的官方网站及其GitHub仓库。学习者可以访问这些平台上的专家精选教程、示例和指南，这些平台为他们提供了有组织的学习路径和丰富的资源。
- en: Books and Articles for Deeper Insights
  id: totrans-337
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 深入见解的书籍和文章
- en: Books and articles go further into the uses and applications of ChatGPT than
    what is available online, providing readers with more in-depth analysis as well
    as practical advice for making the most of the technology. Gain a greater grasp
    of ChatGPT’s potential and explore new methods of problem-solving with these resources
    that offer in-depth research, case studies, and expert viewpoints.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍和文章对ChatGPT的用途和应用进行了更深入的探讨，比在线上可获取的内容更为详尽，为读者提供了更深入的分析以及如何充分利用这项技术的实用建议。通过这些提供深入研究、案例研究和专家观点的资源，您可以更好地掌握ChatGPT的潜力，并探索新的问题解决方法。
- en: Key Advanced Features and Tools You Should Know
  id: totrans-339
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您应该了解的关键高级功能和工具
- en: As you learn more about ChatGPT, it’s important to get to know its more advanced
    features and tools so that you can handle big jobs well. One important thing to
    look into is the application programming interface (API) customization choices.
    These let you change how ChatGPT works so that it fits the needs of your project.
    With API customization, you can fine-tune factors like response length, style,
    and tone to make sure that ChatGPT produces results that are in line with your
    project goals.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 随着您对ChatGPT了解的加深，了解其更高级的功能和工具非常重要，这样您才能很好地处理大型任务。一个重要的事情是要关注应用程序编程接口（API）的自定义选择。这些选择让您可以改变ChatGPT的工作方式，以满足您项目的需求。通过API自定义，您可以微调响应长度、风格和语调等因素，以确保ChatGPT产生符合您项目目标的结果。
- en: You can also train ChatGPT on domain-specific data using advanced tools like
    fine-tuning, which makes it work better in certain situations. You can also improve
    collaboration on difficult projects and speed up workflows by learning about collaboration
    tools like OpenAI’s platform and how it works with famous frameworks. Mastering
    these important advanced features and tools is necessary to get the most out of
    ChatGPT and be successful in complex apps.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用高级工具如微调在特定情况下训练ChatGPT，这使其在某些情况下工作得更好。您还可以通过了解像OpenAI平台这样的协作工具及其如何与著名框架协同工作，来提高困难项目的协作并加快工作流程。掌握这些重要的高级功能和工具对于充分利用ChatGPT并在复杂应用程序中取得成功是必要的。
- en: Step-By-Step Guide to Use These Advanced Features Effectively
  id: totrans-342
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用这些高级功能的有效步骤指南
- en: Follow the step-by-step guide below to get the most out of ChatGPT’s advanced
    features, such as fine-tuning and customizing the API.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤指南操作，以充分利用ChatGPT的高级功能，如微调和自定义API。
- en: API Customization
  id: totrans-344
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: API自定义
- en: Read the official OpenAI instructions on how to customize the ChatGPT API.
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 阅读官方OpenAI关于如何自定义ChatGPT API的说明。
- en: Learn about the parameters and customization choices that are out there, such
    as the response time, temperature, and the presence of filters that block offensive
    language.
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 了解现有的参数和自定义选择，例如响应时间、温度以及存在阻止冒犯性语言的过滤器。
- en: Try out different settings to see how they affect the answers that are given.
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试不同的设置，看看它们如何影响给出的答案。
- en: Incorporate the customizable API into your project or app to change how ChatGPT
    works to fit your needs.
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将可定制的API集成到您的项目或应用程序中，以改变ChatGPT的工作方式以适应您的需求。
- en: Fine-Tuning
  id: totrans-349
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 微调
- en: First, choose the right pretrained model for your project based on its needs
    and the size of its dataset.
  id: totrans-350
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，根据您项目的需求和数据集的大小，选择合适的预训练模型。
- en: Gather your data and make sure it’s relevant to the goal domain by preprocessing
    it.
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过预处理来收集你的数据，并确保它与目标领域相关。
- en: Use transfer learning to train your model by using the weights that were already
    learned on the chosen model.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过使用在所选模型上已学到的权重来训练你的模型，利用迁移学习。
- en: To get the best results from the model on your dataset, fine-tune it by changing
    the hyperparameters and training settings.
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了从你的数据集上获得模型的最佳结果，通过改变超参数和训练设置来微调它。
- en: Check how well the fine-tuned model works by looking at things like accuracy,
    fluency, and logic.
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过查看准确性、流畅性和逻辑等方面来检查微调后的模型效果如何。
- en: Repeat the process of fine-tuning as needed, changing factors, and adding more
    data to make the model work even better.
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据需要重复微调过程，改变因素，并添加更多数据，以使模型工作得更好。
- en: Avoid Common Pitfalls
  id: totrans-356
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'There are some common mistakes that you should avoid when using advanced features
    in ChatGPT to get the most out of them. Here are some common mistakes people make
    and how to avoid them:'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用ChatGPT的高级功能时，有一些常见的错误你应该避免，以充分利用它们。以下是一些人们常犯的错误以及如何避免它们：
- en: '●  Insufficient Context: If you give ChatGPT vague or unclear directions, it
    might give you irrelevant or nonsensical answers. Make sure your prompts are clear
    and give ChatGPT enough information to understand the job or conversation you
    want it to understand.'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: ●  上下文不足：如果你给ChatGPT模糊或不清晰的指示，它可能会给出不相关或不合逻辑的答案。确保你的提示清晰，并给ChatGPT足够的信息来理解你希望它理解的任务或对话。
- en: '●  Not Enough Training Data: If you use too little or the wrong kind of training
    data, your model might give you wrong or biased results. Put together a large
    and varied training set that includes many different situations and language patterns
    that are important to your use case. Use info from several different sources to
    make sure that the results are robust and general.'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: ●  训练数据不足：如果你使用太少或错误类型的训练数据，你的模型可能会给出错误或带有偏见的答案。组合一个大型且多样化的训练集，包括许多不同的情况和语言模式，这些对您的用例很重要。使用来自多个不同来源的信息，以确保结果稳健且具有普遍性。
- en: '●  Overreliance on the Model: Trusting ChatGPT’s answers without questioning
    them can lead to wrong information or misunderstandings. Stay suspicious and think
    critically about what ChatGPT produces. To make sure answers are correct and reliable,
    compare them to outside sources or your own opinion.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: ●  过度依赖模型：在未经质疑的情况下信任ChatGPT的答案可能会导致错误信息或误解。保持怀疑态度，批判性地思考ChatGPT产生的结果。为确保答案正确可靠，将其与外部来源或你自己的观点进行比较。
- en: '●  No Feedback: If you don’t keep an eye on ChatGPT’s performance and get feedback
    from users, it can get in the way of ongoing improvement and optimization. Set
    up a feedback loop to get feedback from users and track how well ChatGPT is doing
    over time. Keep an eye on metrics like response time, user satisfaction, and job
    completion rates to find places where things could be better.'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: ●  缺乏反馈：如果你不关注ChatGPT的表现并从用户那里获取反馈，它可能会妨碍持续的改进和优化。设置一个反馈循环，从用户那里获取反馈，并跟踪ChatGPT随时间的变化情况。关注响应时间、用户满意度和任务完成率等指标，以找到可以改进的地方。
- en: If you learn how to use ChatGPT’s more advanced features, you can make your
    projects much better and use this powerful AI tool to its fullest. By using tools
    like API customization and fine-tuning correctly, you can make ChatGPT fit your
    needs and give you more accurate and useful results.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你学会了如何使用ChatGPT的高级功能，你可以使你的项目变得更好，并充分利用这个强大的AI工具。通过正确使用API定制和微调等工具，你可以使ChatGPT满足你的需求，并为你提供更准确和有用的结果。
- en: If you avoid common mistakes, your conversations with ChatGPT will go smoothly
    and get things done. You can use ChatGPT to make your projects more complex and
    useful by paying close attention to the little things and making improvements
    all the time. This will lead to better results and user experiences in the end.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你避免了常见错误，你的ChatGPT对话将会顺利，并且能够完成任务。通过密切关注细节并不断改进，你可以使用ChatGPT使你的项目更加复杂和有用。这最终将导致更好的结果和用户体验。
- en: Preparing for the Moneymaking Journey
  id: totrans-364
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备开启赚钱之旅
- en: 'Becoming an expert in using this cutting-edge AI technology can lead to financial
    rewards; therefore, it’s important to be prepared for this journey before you
    start making money with ChatGPT. Those who are skilled in ChatGPT will be able
    to take advantage of the growing demand for AI-driven solutions in the corporate
    world. When you know how to use ChatGPT, you can do a lot of activities that can
    make you money. Use your knowledge of ChatGPT in one of these 10 methods to start
    making money:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 成为使用这项尖端AI技术的专家可以带来经济回报；因此，在您开始用ChatGPT赚钱之前，做好这个旅程的准备是很重要的。那些擅长ChatGPT的人将能够利用企业界对AI驱动解决方案日益增长的需求。当你知道如何使用ChatGPT时，你可以做很多可以让你赚钱的活动。使用你对ChatGPT的知识，通过以下10种方法之一开始赚钱：
- en: 'Create an App, Website, or Service: Make use of ChatGPT’s features to build
    cutting-edge apps or websites that provide users with tailored experiences, such
    as virtual assistants or engines that recommend content.'
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建应用程序、网站或服务：利用ChatGPT的功能构建提供个性化体验的尖端应用程序或网站，例如虚拟助手或推荐内容的引擎。
- en: 'Make Logos and Illustrations: Use ChatGPT’s artistic skills to make logos,
    graphics, and illustrations for people and companies looking for one-of-a-kind
    visual branding solutions.'
  id: totrans-367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制作标志和插图：利用ChatGPT的艺术技能为寻求独特视觉品牌解决方案的个人和公司制作标志、图形和插图。
- en: 'Consult ChatGPT for Business Suggestions: Make use of ChatGPT’s extensive knowledge
    base and idea generation capabilities to develop and polish company concepts.'
  id: totrans-368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 咨询ChatGPT获取商业建议：利用ChatGPT广泛的知识库和创意生成能力，发展和完善公司概念。
- en: 'Building an AI Chatbot: Harnessing ChatGPT’s strength in NLP, build AI-powered
    chatbots to automate lead generation, customer support, and other critical business
    processes.'
  id: totrans-369
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建AI聊天机器人：利用ChatGPT在自然语言处理方面的优势，构建AI驱动的聊天机器人来自动化潜在客户生成、客户支持和其他关键业务流程。
- en: 'Become a Prompt Engineer: Learn how to write good prompts that will help ChatGPT
    figure out what to say, which will help people and companies get the most out
    of the AI model’s usefulness and accuracy.'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成为提示工程师：学习如何编写好的提示，这将帮助ChatGPT确定要说的话，从而帮助人们和企业充分利用AI模型的有用性和准确性。
- en: 'Make Videos With ChatGPT: Use ChatGPT’s text-to-video features to make compelling
    videos, whether they’re tutorials, ads, or content for platforms like YouTube
    and social media.'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用ChatGPT制作视频：利用ChatGPT的文本转视频功能制作引人入胜的视频，无论是教程、广告还是YouTube和社交媒体等平台的内容。
- en: 'Become a Data Analyst: Look at and make sense of the data that ChatGPT exchanges
    produce to find useful information that can help businesses and organizations
    make decisions.'
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成为数据分析员：查看并理解ChatGPT交换产生的数据，以找到有助于企业和组织做出决策的有用信息。
- en: 'Freelance and Create Content: You can offer freelance services for writing,
    editing, and creating content. You can use ChatGPT to streamline your processes
    and quickly produce high-quality written material.'
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自由职业和创作内容：你可以提供写作、编辑和创作内容的自由职业服务。你可以使用ChatGPT来简化你的流程并快速生产高质量的书面材料。
- en: 'Search Engine Optimization: Increase organic traffic and rank higher in search
    results by implementing ChatGPT’s suggestions and insights into your website’s
    content and digital marketing strategy.'
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索引擎优化：通过将ChatGPT的建议和洞察力融入您网站的内容和数字营销策略中，提高有机流量并在搜索结果中排名更高。
- en: 'Script Writing: Tap into ChatGPT’s creative potential to write captivating
    stories and interesting content for your next video, podcast, or storytelling
    endeavor.'
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 脚本编写：发挥ChatGPT的创意潜力，为您的下一个视频、播客或叙事尝试编写吸引人的故事和有趣的内容。
- en: Tips on Preparing a Portfolio
  id: totrans-376
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备作品集的技巧
- en: Below are some things to keep in mind while you put together your portfolio
    to make it stand out and get freelancing or full-time jobs.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 在您整理作品集时，以下是一些需要注意的事项，以使其脱颖而出并获得自由职业或全职工作。
- en: Highlight Diversity
  id: totrans-378
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 突出多样性
- en: Showcase your expertise and versatility in ChatGPT by including a variety of
    projects in your portfolio. Demonstrate your versatility and extensive knowledge
    by including examples from a range of sectors, applications, and project kinds.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的作品集中包含各种项目，以展示您在ChatGPT方面的专业知识和适应性。通过包括来自各个行业、应用和项目类型的示例，展示您的适应性和广泛的知识。
- en: Highlight Achievements
  id: totrans-380
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 突出成就
- en: Bring attention to the important things you’ve done in each project, like how
    you overcame problems, delivered great results, or won awards or praise. To back
    up your claims of competence, try to put a number on your accomplishments wherever
    you can.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 强调你在每个项目中完成的重要事项，比如你如何克服问题、取得出色的成果或获得奖项或赞誉。为了支持你关于能力的声明，尽量在你的成就中添加数字。
- en: Provide Context
  id: totrans-382
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 提供背景信息
- en: Provide prospective clients or companies with thorough project descriptions.
    Outline the problem or objective you set out to solve, the steps you took to get
    there, and the results you saw. People will appreciate your effort and its value
    more if you set the stage for them.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 向潜在客户或公司提供详细的项目描述。概述你试图解决的问题或目标，你采取的步骤以及你看到的结果。如果你为他们设定了舞台，人们会更欣赏你的努力及其价值。
- en: Show Off Your Skills
  id: totrans-384
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 展示你的技能
- en: Highlight certain features, approaches, or sophisticated functionalities you
    utilized in your projects to showcase your skill in utilizing ChatGPT. To prove
    your competence, explain how you used the technology to improve procedures, come
    up with original material, or handle difficult difficulties.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 突出你在项目中使用的一些特定功能、方法或复杂的特性，以展示你利用 ChatGPT 的技能。为了证明你的能力，解释你是如何使用这项技术来改进流程、创造原创内容或处理困难的挑战。
- en: Include Testimonials
  id: totrans-386
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 包含证词
- en: To make your portfolio more credible and validated, you should include endorsements
    or testimonials from happy clients, partners, or industry leaders. Potential clients
    and employers can see that you are trustworthy and skilled through testimonials,
    which serve as social proof of your abilities.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使你的作品集更具可信度和验证性，你应该包括来自满意客户、合作伙伴或行业领导者的推荐或证词。潜在客户和雇主可以通过这些证词看到你是值得信赖和有技能的，这些证词作为你能力的社交证明。
- en: Keep It Updated
  id: totrans-388
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 保持更新
- en: Keep your portfolio fresh by adding new projects, talents, and achievements
    regularly. This will show that you are constantly growing and improving. Adding
    new content to your portfolio shows that you are still an expert in your subject
    and keeps it interesting and up-to-date.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 通过定期添加新项目、才能和成就来保持你的作品集新鲜。这表明你一直在不断成长和进步。向你的作品集中添加新内容表明你仍然是该领域的专家，并使其保持有趣和最新。
- en: Tailor to Audience
  id: totrans-390
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 针对受众定制
- en: Whether you’re aiming to impress prospective employers, clients, or collaborators,
    tailor your portfolio to suit their tastes and requirements. For your portfolio
    to have the most possible impact, you should tailor its layout, content, and messaging
    to the needs, wants, and goals of your target audience.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是想给潜在雇主、客户或合作伙伴留下深刻印象，都应该根据他们的口味和需求定制你的作品集。为了使你的作品集产生最大影响，你应该根据目标受众的需求、愿望和目标来定制其布局、内容和信息。
- en: Provide Contact Information
  id: totrans-392
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 提供联系信息
- en: Whether it’s a contact form or easily legible contact information, make it easy
    for people who are interested to get in touch with you. Streamlining the way you
    talk to people will make it easier for them to ask questions, work together, or
    find jobs, and you won’t miss out on any possible links.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是一个联系表还是易于阅读的联系信息，都要让它容易让感兴趣的人与你取得联系。简化你与人交流的方式将使他们更容易提问、合作或找到工作，你也不会错过任何可能的联系。
- en: Setting Rates and Compensation for ChatGPT Projects
  id: totrans-394
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为 ChatGPT 项目设定费用和报酬
- en: 'To figure out rates and pay for ChatGPT projects, you have to carefully think
    about things like the market demand, the complexity of the project, the amount
    of time it will take, and the skills that will be needed. Let me show you how
    to tackle it:'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定 ChatGPT 项目的费用和报酬，你必须仔细考虑市场需求、项目的复杂性、所需的时间以及所需的技能。让我向你展示如何应对：
- en: The first step is to take stock of the project’s needs and requirements, including
    its size, complexity, and expected outcomes. If you want an accurate time and
    effort estimate, break the project down into smaller tasks or milestones.
  id: totrans-396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一步是评估项目的需求和要求，包括其规模、复杂性和预期成果。如果你想得到准确的时间和努力估计，将项目分解成更小的任务或里程碑。
- en: 'Think about how you want to bill clients: by the hour or by the project’s total
    price. While flat fees are better for clearly defined projects with definite objectives,
    hourly rates work better for projects with unpredictable or changing schedules.'
  id: totrans-397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑你希望如何向客户收费：按小时还是按项目的总价格。虽然固定费用更适合目标明确、有确定目标的项目，但按小时收费更适合具有不可预测或变化时间表的项目。
- en: Determine your charges by considering your degree of knowledge, experience,
    and specialized abilities. Your rate should represent the value you offer to the
    project; higher rates are usually associated with more specialized knowledge and
    better levels of ability.
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过考虑您的知识程度、经验和专业技能，来确定您的费用。您的费率应代表您为项目提供的价值；通常，较高的费率与更专业的知识和更高的能力水平相关联。
- en: Before setting charges for your ChatGPT project, make sure they are competitive
    and commensurate with your expertise and talents by researching industry standards.
    Before deciding on a price, think about things like your location, current trends
    in your business, and your client’s finances.
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在为您的ChatGPT项目设定费用之前，通过研究行业标准来确保它们具有竞争力，并与您的专业知识和才能相称。在决定价格之前，考虑诸如您的地理位置、您业务中的当前趋势以及客户的财务状况等因素。
- en: When determining your prices, make sure to include in all of your overhead expenses,
    including software subscriptions, equipment, utilities, and taxes. You should
    aim to make a fair profit after deducting all of your costs from your rates.
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在确定您的价格时，确保包括所有间接费用，包括软件订阅、设备、公用事业和税收。您应该旨在在扣除所有成本后从费率中获得公平的利润。
- en: Before beginning work, you and your client should go over the project’s parameters,
    including the payment plan, milestones, and deliverables. To prevent disagreements
    and miscommunication down the road, be clear about expectations, due dates, and
    modifications.
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在开始工作之前，您和您的客户应审查项目的参数，包括支付计划、里程碑和交付成果。为了防止未来的分歧和误解，明确期望、截止日期和修改。
- en: Take into account providing value-based pricing, where your fees are linked
    to the client’s perception of the project’s worth and its finished results. When
    defending your fees, be sure to highlight the value your services will provide.
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑提供基于价值的定价，其中您的费用与客户对项目价值及其最终成果的认识相关联。在捍卫您的费用时，务必强调您将提供的服务价值。
- en: Takeaway
  id: totrans-403
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收要点
- en: You are now prepared to take on complex projects thanks to your advanced understanding;
    the next step is to put this information to use in a business setting. Get a bird’s-eye
    view of how ChatGPT can transform tons of business apps in Chapter 2!
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 由于您对知识的深入理解，您现在已经准备好接受复杂的项目；下一步是将这些信息应用于商业环境中。在第二章中，了解ChatGPT如何改变众多商业应用的全貌！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-405
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png) |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-406
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: 'Chapter 2: An Overview of ChatGPT for Business'
  id: totrans-407
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：ChatGPT在商业中的应用概述
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-408
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: AI and robots have a big effect on the bottom line of businesses in many fields.
    According to McKinsey Digital (2023), generative AI could bring in between $2.6
    trillion and $4.4 trillion a year in economic gains across all fields. According
    to PwC (2018), AI could add up to $15.7 trillion to the world economy by 2030\.
    Of this amount, $6.6 trillion would come from higher output and $9.1 trillion
    would come from effects on consumption.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和机器人对许多领域的商业底线产生了重大影响。根据McKinsey Digital（2023年）的数据，生成式人工智能每年可以为所有领域带来2.6万亿美元至4.4万亿美元的经济收益。根据PwC（2018年）的数据，到2030年，人工智能可以为世界经济增加高达15.7万亿美元。其中，6.6万亿美元来自更高的产出，9.1万亿美元来自对消费的影响。
- en: Especially when it comes to making money and cutting costs, chatbots have done
    well. A study found that using a chatbot to get back to buyers who left their
    e-cart without buying can bring in up to 15% more money (Ruby, 2023). Juniper
    Research (2018) found that the ecommerce market will reach $112 billion in sales
    by using chatbots for a variety of purposes, such as alerts and leveraging. By
    cutting down on chat help, IBM found that chatbots can save businesses up to 30%
    on their total costs (GMS, 2023). That’s the power of AI in revolutionizing different
    industries.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是在赚钱和削减成本方面，聊天机器人表现得相当出色。一项研究发现，使用聊天机器人来回应那些在购物车中未购买就离开的买家，可以带来高达15%的额外收入（Ruby，2023年）。Juniper
    Research（2018年）发现，通过使用聊天机器人进行各种目的，如警报和利用，电子商务市场将达到1120亿美元的销售额。通过减少聊天帮助，IBM发现聊天机器人可以将企业的总成本降低高达30%（GMS，2023年）。这就是人工智能在革命性改变不同行业中的力量。
- en: This chapter will go into more detail about how AI and chatbots affect companies’
    bottom lines. It will look at how these technologies are changing industries,
    boosting growth, and opening up new chances for innovation and efficiency. Get
    ready to learn how AI and robots are changing business and making the future more
    prosperous.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将更详细地介绍人工智能和聊天机器人如何影响公司的盈利能力。它将探讨这些技术如何改变行业，促进增长，并为创新和效率开辟新的机会。准备好学习人工智能和机器人如何改变商业，使未来更加繁荣。
- en: Real-World Examples of Businesses Using ChatGPT
  id: totrans-412
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT的商业真实案例
- en: ChatGPT has huge effects on many fields and jobs. It might get rid of some jobs,
    but it will also make a lot of new ones. The most important thing it does, though,
    is help many of us “work smarter” by adding super-powered AI to our current skills
    and abilities. There are already businesses that are using it to make their internal
    processes more efficient and to come up with new services for their users. Below
    are some of the most important and useful use cases we’ve seen so far.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对许多领域和职业都有巨大的影响。它可能会淘汰一些工作，但也会创造许多新的工作。然而，它最重要的作用是帮助我们中的许多人通过将超级人工智能添加到我们的现有技能和能力中，使我们“工作得更聪明”。已经有企业在使用它来使他们的内部流程更高效，并为他们的用户提供新的服务。以下是我们迄今为止看到的一些最重要和最有用的用例。
- en: Snapchat
  id: totrans-414
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Snapchat
- en: 'Let’s look at a real-life example: Snapchat. Its answer time to customer service
    questions has been cut by 20% since it started using ChatGPT. Snapchat uses a
    simple method that works well (Heath, 2023). They added a bot called My AI to
    the user’s list of friends. Need help, want to plan a trip, or just want to talk?
    My AI can help you. It’s not about fancy features; it’s about giving answers in
    real time.'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个真实的例子：Snapchat。自从开始使用ChatGPT以来，其客户服务问题的回答时间已经减少了20%。Snapchat使用了一种简单而有效的方法（Heath，2023）。他们向用户的联系人列表中添加了一个名为My
    AI的机器人。需要帮助，想要计划一次旅行，或者只是想聊天？My AI可以帮助你。这并不是关于花哨的功能；这是关于实时提供答案。
- en: What’s the point? This proves that ChatGPT isn’t just for big tech companies.
    Even a fun app like Snapchat uses it to make things run more smoothly and give
    users a better experience. As we go through more cases, you’ll see how both large
    and small businesses use ChatGPT to make things run more smoothly and communicate
    better. Let’s delve deeper into the diverse applications of ChatGPT across various
    industries, each with its unique approach to utilizing this groundbreaking technology.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 这有什么意义？这证明了ChatGPT不仅仅适用于大型科技公司。甚至像Snapchat这样的娱乐应用也使用它来使事物运行得更顺畅，并为用户提供更好的体验。随着我们继续探讨更多案例，你将看到大公司和中小企业如何使用ChatGPT使事物运行得更顺畅，并更好地沟通。让我们深入探讨ChatGPT在各个行业的多样化应用，每个行业都有其独特的利用这一开创性技术的方法。
- en: Microsoft
  id: totrans-417
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Microsoft
- en: For quite some time, Microsoft has been an ardent supporter of ChatGPT and a
    major backer of its creator, OpenAI. The ChatGPT chatbot is powered on large language
    models (LLMs) or substantial language models. Bing is now powered by GPT-3 and
    GPT-4 language models, which means users may have natural conversations with search
    results instead of seeing a list of links. Word and Excel are only two of Microsoft’s
    well-known software packages that will utilize this technology. Codex, a specialized
    modified GPT-3 for code creation, is also employed to offer GitHub Copilot autocomplete
    coding suggestions.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 很长一段时间以来，微软一直是ChatGPT的坚定支持者，也是其创造者OpenAI的主要支持者。ChatGPT聊天机器人由大型语言模型（LLMs）或大量语言模型驱动。现在Bing由GPT-3和GPT-4语言模型驱动，这意味着用户可以与搜索结果进行自然对话，而不是看到一系列链接列表。Word和Excel只是微软将利用这项技术的众多知名软件包中的两个。Codex，这是一种专门用于代码创建的修改版GPT-3，也被用于提供GitHub
    Copilot自动完成编码建议。
- en: Expedia
  id: totrans-419
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Expedia
- en: Conversational AI support is now available on Expedia, a leading trip-booking
    website and app. Instead of looking for tickets, hotels, or destinations, consumers
    may organize their vacations as if conversing with a qualified and friendly travel
    agent. To further facilitate planning, the software generates smart lists of the
    client’s preferred hotels and attractions.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能支持现在可在领先的行程预订网站和应用程序Expedia上使用。消费者不再需要寻找机票、酒店或目的地，他们可以像与合格的友好旅行代理人交谈一样组织他们的假期。为了进一步方便规划，软件会生成客户偏好的酒店和景点的智能列表。
- en: Duolingo
  id: totrans-421
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Duolingo
- en: The most advanced LLM developed by OpenAI, the brains behind ChatGPT, GPT-4,
    has been used by language learning company Duolingo to power two new features.
    With Duolingo Max, students of a foreign language can get feedback in the same
    natural language they would receive from a real teacher, explaining why their
    responses to practice or exam questions were right or wrong. Another function
    lets students hone their language abilities through simulated interactions with
    AI characters, such as placing drink orders at a café in Paris. Users can discover
    more about the personas’ backgrounds and distinct characteristics through their
    interactions with them.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI开发的最高级LLM，ChatGPT背后的智囊团，GPT-4已被语言学习公司Duolingo用于推动两个新功能。通过Duolingo Max，外语学生可以获得与真实教师相同的自然语言反馈，解释为什么他们的练习或考试问题的回答是正确或错误的。另一个功能允许学生通过与AI角色的模拟互动来磨练他们的语言能力，例如在巴黎的咖啡馆下饮料订单。用户可以通过与他们互动来了解更多关于这些角色背景和独特特征的信息。
- en: Coca-Cola
  id: totrans-423
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可口可乐
- en: The soft drink giant has teamed up with experts Bain & Company to use ChatGPT
    to help with marketing and delivering more personalized experiences to customers
    (Marr, 2023). A press release states that the company intends to create customized
    advertisements by utilizing the technology and the generative picture generator
    DALL-E.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 这家软饮料巨头与专家贝恩公司合作，利用ChatGPT帮助进行市场营销并向客户提供更个性化的体验（Marr, 2023）。一份新闻稿表示，公司打算利用这项技术和生成式图片生成器DALL-E来创建定制广告。
- en: Freshworks
  id: totrans-425
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Freshworks
- en: Freshworks, a software development business, claims that its programmers have
    cut the time required to build complicated software applications in half, from
    10 weeks down to 1 week (Marr, 2023). The ChatGPT language generator is capable
    of producing code in multiple popular computer languages, such as Python, C++,
    and JavaScript, in addition to written human language. Additionally, it can debug
    its own or other people’s code when it fails to execute properly and serves as
    a coding tutor by explaining how the code it generates works.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 软件开发公司Freshworks声称，其程序员将构建复杂软件应用所需的时间缩短了一半，从10周缩短到1周（Marr, 2023）。ChatGPT语言生成器能够用多种流行的计算机语言生成代码，如Python、C++和JavaScript，以及书面人类语言。此外，当它无法正确执行时，它可以调试自己的或他人的代码，并通过解释它生成的代码的工作原理来充当编码导师。
- en: Slack
  id: totrans-427
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Slack
- en: The Slack app integrates ChatGPT, a powerful tool for collaborative workspaces,
    so users can better manage workflows, increase productivity, and connect with
    coworkers. Anyone using the plugin has access to a personal assistant who may
    guide how to proceed with their current tasks and answer any queries they may
    have.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: Slack应用集成了ChatGPT，这是一个强大的协作工作空间工具，因此用户可以更好地管理工作流程，提高生产力，并与同事保持联系。任何使用该插件的人都可以访问一个个人助理，他可以指导他们如何进行当前任务，并回答他们可能有的任何疑问。
- en: Udacity
  id: totrans-429
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Udacity
- en: Provider of online courses Udacity has built an AI virtual tutor using GPT-4
    to help students with their individual needs by giving them specific recommendations
    and comments. The program is made to assist students in solving difficult problems
    by providing personalized explanations. On top of that, it can translate when
    a student’s native language is not used in class and provide concise explanations
    of complex ideas and technical terms.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 在线课程提供商Udacity使用GPT-4构建了一个AI虚拟导师，通过提供具体的建议和评论来帮助学生满足他们的个人需求。该程序旨在通过提供个性化的解释来帮助学生解决难题。除此之外，当学生的母语不在课堂上使用时，它还可以进行翻译，并对复杂的概念和技术术语提供简洁的解释。
- en: Octopus Energy
  id: totrans-431
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 章鱼能源
- en: Octopus Energy, an energy provider based in the United Kingdom, claims that
    ChatGPT handles 44% of client inquiries when it is integrated into its customer
    care channels (Marr, 2023). The software is already functional for 250 users,
    according to CEO Greg Jackson, and it has more satisfied customers than human
    customer service representatives (Marr, 2023).
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 英国能源供应商章鱼能源声称，当ChatGPT集成到其客户服务渠道时，它处理了44%的客户咨询（Marr, 2023）。根据首席执行官格雷格·杰克逊的说法，该软件已经对250名用户可用，并且比人工客服代表拥有更多满意的客户（Marr,
    2023）。
- en: 'Exploring Niche Applications: Small Case Studies'
  id: totrans-433
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索利基应用：小型案例研究
- en: Let’s take a look at a few smaller case studies that demonstrate the specific
    and one-of-a-kind uses of ChatGPT, showcasing its immense flexibility and the
    wide range of opportunities it presents. Looking at these cases helps us understand
    the limitless possibilities of this strong tool and the revolutionary effects
    it can have in many different industries.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看几个小型案例研究，这些研究展示了ChatGPT的具体和独特的用途，展示了其巨大的灵活性和提供的广泛机会。研究这些案例有助于我们理解这个强大工具的无限可能性以及它可以在许多不同行业中产生的革命性影响。
- en: Help With Legal Documents
  id: totrans-435
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 法律文件帮助
- en: The legal industry is making use of ChatGPT to help in the preparation of legal
    documents. Legal businesses are utilizing ChatGPT to create preliminary versions
    of various legal documents, including contracts and briefs. While it won’t be
    able to take the place of a lawyer’s knowledge and experience, it will cut down
    on drafting time and free up lawyers to focus on more advanced issues.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 法律行业正在利用ChatGPT来帮助准备法律文件。法律企业正在使用ChatGPT创建各种法律文件的初步版本，包括合同和简报。虽然它无法取代律师的知识和经验，但它将减少起草时间，让律师有更多时间专注于更高级的问题。
- en: Chatbot for Personal Trainers
  id: totrans-437
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 个人教练聊天机器人
- en: Thanks to fitness coaching chatbots powered by ChatGPT, having a personal trainer
    on call is now a reality, not a luxury. These chatbots serve as virtual fitness
    buddies by giving customers exercise tips, tailoring workout programs to their
    needs, and sending inspirational messages. Users’ health and wellness journeys
    are made a little more personalized with this quick access to exercise assistance.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了由ChatGPT驱动的健身教练聊天机器人，现在拥有私人教练不再是奢侈品，而是现实。这些聊天机器人通过提供锻炼建议、根据客户需求定制锻炼计划以及发送鼓舞人心的信息，充当虚拟健身伙伴。通过这种快速获取锻炼援助的方式，用户的健康和福祉之旅变得更加个性化。
- en: Help With Code Review
  id: totrans-439
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码审查帮助
- en: For programmers, ChatGPT is a lifesaver when it comes to code review. It checks
    small pieces of code for mistakes and offers suggestions to make the code better.
    Iterative development becomes much more efficient as a result of the accelerated
    debugging process. This is how ChatGPT improves software development quality as
    a whole by acting as a helpful coding helper.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 对于程序员来说，ChatGPT在代码审查方面是救命稻草。它检查代码的小片段以查找错误，并提供改进代码的建议。由于加速的调试过程，迭代开发变得更加高效。这就是ChatGPT通过充当有用的编码助手来提高整体软件开发质量的方式。
- en: Advice on Personal Finances
  id: totrans-441
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 个人财务咨询
- en: For people who are struggling to make sense of their own complicated personal
    finances, ChatGPT can serve as a virtual financial advisor. Insightful answers
    to user questions regarding budgeting, investing, and general financial planning
    are provided via ChatGPT. It makes financial literacy more accessible by simplifying
    ideas and offering individualized guidance.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些难以理解自己复杂个人财务的人来说，ChatGPT可以作为一个虚拟财务顾问。通过ChatGPT提供有关预算、投资和一般财务规划的问题的深入答案。它通过简化想法并提供个性化指导，使金融素养更加易于获取。
- en: Creative Teamwork
  id: totrans-443
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创意团队合作
- en: Within the realm of creativity, ChatGPT promotes teamwork in the arts. It serves
    as a creative companion for artists and designers, allowing them to share ideas
    and receive suggestions. The creative process gains an element of artistic inquiry
    and inspiration through this partnership, which goes beyond standard AI features.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 在创意领域，ChatGPT推动了艺术领域的团队合作。它作为艺术家和设计师的创意伴侣，使他们能够分享想法并获得建议。通过这种合作，创意过程增加了艺术探究和灵感的元素，这超越了标准的AI功能。
- en: You may see the wide range of ChatGPT uses in these short case studies. ChatGPT
    shows that it can be used in a lot of different areas, from writing legal documents
    and exercise coaching to reviewing code, getting advice on personal finances,
    and working together on art projects. Upon investigating several use cases, it
    becomes evident that ChatGPT has a far-reaching impact, paving the way for new
    possibilities in various domains in terms of efficiency and innovation.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会在这些简短的案例研究中看到ChatGPT的广泛用途。ChatGPT表明，它可以用在许多不同的领域，从撰写法律文件和锻炼指导到代码审查、个人财务咨询以及艺术项目的合作。通过调查几个用例，很明显ChatGPT具有深远的影响，为各个领域的效率和创新开辟了新的可能性。
- en: Economics of Using ChatGPT
  id: totrans-446
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT的经济效益
- en: Upon its release in November 2022, ChatGPT was initially offered at no cost
    to all users. In response to user complaints about long wait times and service
    outages caused by the app’s meteoric surge in popularity, OpenAI introduced a
    paid membership plan called ChatGPT Plus. The goal of this $20/month membership
    model was to reduce wait times, offer constant access, and provide extra conveniences.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年11月发布时，ChatGPT对所有用户免费提供。为了应对用户对应用因人气激增而导致的长时间等待和服务中断的投诉，OpenAI推出了名为ChatGPT
    Plus的付费会员计划。这个每月20美元的会员模式的目标是减少等待时间，提供持续访问，并提供额外便利。
- en: ChatGPT Plus keeps users connected even when demand is high, allowing for faster
    response times compared to the free version. In addition to avoiding the aggravation
    of waiting, subscribers also get first dibs on unreleased and new features. To
    sweeten the sale, OpenAI threw in some cutting-edge innovations like GPT-4, which
    is an improvement over the old GPT-3.5 model.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 即使需求高峰期，ChatGPT Plus也能保持用户连接，与免费版本相比，响应时间更快。除了避免等待的烦恼外，订阅者还能优先体验未发布的新功能。为了使销售更加吸引人，OpenAI还加入了像GPT-4这样的尖端创新，这是对旧GPT-3.5模型的改进。
- en: Quicker responses aren’t the only perk of ChatGPT Plus. Exclusive ChatGPT plugins,
    which enable subscribers to have more personalized and flexible interactions,
    are made available to them. They can also take advantage of DALL-E 3’s picture
    production capabilities, which aren’t accessible to free users. The internet access,
    advanced data analysis features, and other state-of-the-art enhancements make
    ChatGPT Plus an even more compelling prospect.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus的快速响应并不是唯一的好处。专门为订阅者提供的ChatGPT插件，使他们能够进行更加个性化和灵活的互动，这些插件也向他们开放。他们还可以利用DALL-E
    3的图片生成能力，这是免费用户无法访问的。互联网接入、高级数据分析功能和其他最先进的功能使ChatGPT Plus成为一个更具吸引力的选择。
- en: Those who depend on ChatGPT for their job or daily operations can rest assured
    that they will always have access to the latest and greatest models with the subscription
    plan. The generative AI’s well-documented shortcomings—which frequently take the
    form of “hallucinations” or inaccurate responses—are the motivation for incorporating
    GPT-4.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 依赖于ChatGPT进行工作或日常运营的人可以放心，他们将通过订阅计划始终能够访问最新和最好的模型。生成式AI的已知不足——通常以“幻觉”或不准确回答的形式出现——是采用GPT-4的动机。
- en: Although GPT-4 does have its limitations, OpenAI boasts that it is 10 times
    better than its predecessor, GPT-3.5\. Having used ChatGPT Plus, I can confirm
    that it offers better results than the free version with GPT-3.5, especially when
    precision is very important. The subscription service gives more accurate answers,
    lowering the number of mistakes and making the experience better for users.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然GPT-4确实有其局限性，但OpenAI宣称它比其前辈GPT-3.5好10倍。使用过ChatGPT Plus的我可以证实，它比免费版本（带有GPT-3.5）提供了更好的结果，尤其是在精确度非常重要的情况下。订阅服务提供了更准确的答案，减少了错误数量，为用户提供了更好的体验。
- en: Cost Savings and Efficiency
  id: totrans-452
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本节约与效率
- en: Now, let’s talk about the economic side of ChatGPT, focusing on how businesses
    and people may be able to save money by using this AI model in their procedures.
    Think about all the money you could save and time you could save with ChatGPT
    before you even think about the $20 monthly plan.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们谈谈ChatGPT的经济效益，重点关注企业和个人如何通过在流程中使用这个AI模型来节省金钱。在你甚至考虑每月20美元的订阅计划之前，想想ChatGPT能帮你节省多少金钱和时间。
- en: Saved Time
  id: totrans-454
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 节省时间
- en: Every company operation relies on time as a vital resource. Users can avoid
    wasting time waiting by taking advantage of ChatGPT Plus’s constant access and
    quicker response times. Faster information retrieval means more productivity and
    more time for professionals to focus on what really matters.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 每个公司运营都依赖于时间作为一项重要资源。用户可以通过利用ChatGPT Plus的持续访问和快速响应时间来避免浪费时间等待。更快的信
- en: Enhance Productivity
  id: totrans-456
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 提高生产力
- en: Combining the capabilities of the subscription plan with GPT-4’s enhanced accuracy
    results in a notable increase in productivity. Users will have more faith in the
    AI-generated material because fewer mistakes equal less time spent fixing or explaining
    answers. Overall workflow efficiency is improved, and decision-making processes
    are accelerated by this trust.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 将订阅计划的特性与GPT-4的增强准确性相结合，显著提高了生产力。用户将更加信任AI生成的材料，因为错误更少意味着花费在修复或解释答案上的时间更少。整体工作流程效率得到提升，决策过程也因此加速。
- en: Gaining Access to Superior Functions
  id: totrans-458
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 获得高级功能访问权限
- en: Users gain an advantage with ChatGPT Plus’s exclusive features like GPT-4 access,
    DALL-E 3’s picture production, and ChatGPT plugins. Businesses that engage in
    creative pursuits might benefit from the picture production capacity, as it simplifies
    content development. Similarly, the fact that chatbots can be customized with
    plugins offers new options for personalized interactions, which further enhances
    user experiences.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 用户通过ChatGPT Plus的独家功能，如GPT-4访问权限、DALL-E 3的图片生产以及ChatGPT插件，获得优势。从事创意活动的企业可能从图片生产能力中受益，因为它简化了内容开发。同样，聊天机器人可以通过插件进行定制，这为个性化交互提供了新的选择，从而进一步提升了用户体验。
- en: Decrease in the Expenses of Human Resources
  id: totrans-460
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 人力资源成本降低
- en: It is possible to save money by using ChatGPT for jobs that do not call for
    highly trained humans. Businesses can utilize automation to streamline customer
    service, content development, and data analysis processes, freeing up human resources
    for more strategic endeavors. This has the dual benefit of reducing expenses and
    freeing up human workers to concentrate on more creative and analytical work.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用ChatGPT完成不需要高度训练的人类的工作，可以节省资金。企业可以利用自动化来简化客户服务、内容开发和数据分析流程，从而释放人力资源用于更战略性的任务。这具有双重好处：降低成本并释放人力，让他们专注于更具创造性和分析性的工作。
- en: Decision Support With an Improvement
  id: totrans-462
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 决策支持与改进
- en: With ChatGPT Plus’s Advanced Data Analysis features, users can extract even
    more value from their data. Better plans and results may be possible if businesses
    make data-driven decisions more efficiently. Users may remain ahead of the competition
    in their sectors by staying up-to-date with the latest AI capabilities with the
    subscription plan.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus的高级数据分析功能使用户能够从他们的数据中提取更多价值。如果企业更有效地进行数据驱动决策，可能会实现更好的计划和结果。通过订阅计划保持对最新AI能力的了解，用户可以在其领域内保持竞争优势。
- en: Cost-Effective Power of ChatGPT
  id: totrans-464
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的成本效益力量
- en: As an inexpensive alternative to traditional technologies, ChatGPT represents
    a paradigm shift for enterprises in customer service and content development.
    The pros and cons of ChatGPT can be better understood if we look into its economics,
    particularly in comparison to more traditional approaches.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 作为传统技术的低成本替代品，ChatGPT代表了企业在客户服务和内容开发方面的范式转变。如果我们深入研究其经济学，尤其是与传统方法相比，可以更好地理解ChatGPT的优缺点。
- en: Less Spending on Labor
  id: totrans-466
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 减少劳动力支出
- en: The obvious economic benefit of integrating ChatGPT into company operations
    is the decrease in labor expenses. Staff salary, benefits, and training costs
    are constant outlays in traditional customer service models. On the other hand,
    organizations can expedite common requests with ChatGPT’s automation capabilities—all
    without hiring a large human workforce.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT集成到公司运营中的明显经济优势是劳动力成本的降低。在传统的客户服务模式中，员工工资、福利和培训成本是持续的支出。另一方面，组织可以利用ChatGPT的自动化能力加速常见请求，而无需雇佣大量的人力。
- en: With ChatGPT, you can automate repetitive operations and handle routine client
    inquiries efficiently and affordably. Not only does this cut down on customer
    service labor expenses, but it also frees up human agents to handle more intricate
    and individual interactions, which ultimately leads to better service for customers.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT，您可以自动化重复性操作，高效且经济地处理日常客户咨询。这不仅减少了客户服务的人力成本，还释放了人工代理处理更复杂和个性化交互的能力，最终导致客户服务质量的提升。
- en: 24/7 Availability
  id: totrans-469
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 24/7可用性
- en: Availability at all times is another major economic advantage of ChatGPT. By
    utilizing human labor to cover different shifts, traditional customer assistance
    generally needs to be more robust in in-service hours. Hiring people for night
    hours or weekends may become more expensive as a result of this.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 全天候可用性是ChatGPT的另一个主要经济优势。通过利用人力覆盖不同的班次，传统的客户服务通常需要在服务时间内更加稳健。因此，雇佣夜间或周末工作的人可能会变得更加昂贵。
- en: On the other hand, ChatGPT provides round-the-clock availability, which eliminates
    this issue. Regardless of their location or time zone, customers can request assistance
    at any time. In addition to improving the customer service experience as a whole,
    this also guarantees that companies can keep up a constant level of service without
    constantly hiring more staff.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，ChatGPT提供全天候的可用性，这消除了这个问题。无论客户身处何地或处于哪个时区，他们都可以随时请求帮助。除了整体改善客户服务体验外，这也保证了公司可以保持持续的服务水平，而无需不断招聘更多员工。
- en: Scalability
  id: totrans-472
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可扩展性
- en: For companies that deal with unpredictable spikes and dips in client queries,
    scalability is an absolute must. ChatGPT is perfect for companies that experience
    spikes in demand since it can manage an endless number of client contacts at once.
    Without the need to recruit and train more human staff, ChatGPT can easily handle
    an influx of client requests during busy hours.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 对于处理客户查询波动不定的公司来说，可扩展性是绝对必要的。ChatGPT非常适合需求激增的公司，因为它可以同时管理无数的客户联系。无需招聘和培训更多的人力，ChatGPT可以轻松处理繁忙时段的客户请求激增。
- en: On the other hand, scalability is an issue for human customer service. Hiring
    and training more people to meet rising demand is a time-consuming and expensive
    procedure that can cause delays. ChatGPT gives organizations an advantage in customer
    interaction management thanks to its scalability, which allows it to adapt to
    their changing needs at a low cost.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，可扩展性是人工客户服务的问题。为了满足不断增长的需求而招聘和培训更多的人是一项耗时且昂贵的程序，可能会导致延误。ChatGPT凭借其可扩展性，以低成本适应组织不断变化的需求，从而在客户互动管理方面为组织提供优势。
- en: Maximizing Productivity in Writing
  id: totrans-475
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最大化写作效率
- en: Coming full circle to content generation, ChatGPT brings efficiency advantages
    that can positively affect a company’s bottom line. It is a great tool for quickly
    coming up with ideas, outlines, or rough drafts because of how fast it can generate
    text. This effectiveness is especially great for companies that want to crank
    out marketing materials, blog entries, or social media updates frequently.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 回到内容生成的主题，ChatGPT带来的效率优势可以积极影响公司的盈利能力。由于它能够快速生成文本，因此它是一个快速构思想法、大纲或草稿的出色工具。这种有效性对于希望频繁制作营销材料、博客文章或社交媒体更新的公司来说尤其出色。
- en: In contrast, the process of writing via traditional methods can be somewhat
    time-consuming. Content creation via traditional methods needs meticulous planning,
    research, and editing. ChatGPT simplifies this procedure, providing a time- and
    money-saving alternative for organizations.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，通过传统方法写作的过程可能有些耗时。通过传统方法进行内容创作需要细致的计划、研究和编辑。ChatGPT简化了这一程序，为组织提供了节省时间和金钱的替代方案。
- en: Efficiency in Cost
  id: totrans-478
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本效率
- en: The total cost-efficiency of ChatGPT is one of the strongest economic arguments
    in its favor. When compared to the expense of hiring a team of content creators
    or a customer service staff available 24/7, the $20 monthly subscription fee for
    ChatGPT Plus is nothing.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的总成本效益是其最有力的经济论据之一。与雇佣一支内容创作者团队或全天候可用的客户服务团队相比，ChatGPT Plus每月20美元的订阅费微不足道。
- en: Additionally, the affordability of AI-generated material is not at the expense
    of its quality. Thanks to its extensive training on large datasets, ChatGPT can
    provide coherent and high-quality material. Thanks to its affordable pricing and
    high-quality output, ChatGPT is a great choice for businesses seeking to simplify
    their content development processes without sacrificing quality.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，AI生成内容的低廉价格并不以牺牲其质量为代价。得益于其在大量数据集上的广泛训练，ChatGPT可以提供连贯且高质量的内容。由于其价格低廉且输出质量高，ChatGPT是那些寻求简化内容开发流程而不牺牲质量的企业的一个很好的选择。
- en: Limitations
  id: totrans-481
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 局限性
- en: Even though ChatGPT is incredibly efficient and affordable, you must be aware
    of its limitations. For the model to be effective, it must be able to creatively
    and contextually grasp complex works written by humans. This is especially true
    when you need to know the ins and outs of a certain industry’s lingo, tone, or
    cultural subtleties.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 即使ChatGPT非常高效且价格低廉，你也必须意识到它的局限性。为了使模型有效，它必须能够创造性地、情境性地理解人类所写的复杂作品。这在需要了解某个行业术语、语气或文化细微差别时尤其如此。
- en: ChatGPT’s responses don’t always live up to the standards of human-generated
    content in terms of originality and depth of thought. In cases where originality
    and thorough context awareness are critical, companies might have to find a middle
    ground between using ChatGPT for routine tasks and hiring humans for more complex
    content development.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回答在原创性和思考深度方面并不总是达到人类生成内容的标准。在原创性和全面上下文意识至关重要的情况下，公司可能需要在使用ChatGPT进行常规任务和雇佣人类进行更复杂的内容开发之间找到一个中间地带。
- en: Finding a Happy Medium
  id: totrans-484
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 寻找平衡点
- en: Many companies find that a combination of human knowledge and automated solutions,
    such as ChatGPT, yields the best results. Although ChatGPT is great at automating
    mundane processes and producing material quickly, it still needs human intervention
    to guarantee that the information it generates is accurate, creative, and relevant.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 许多公司发现，结合人类知识和自动化解决方案，如ChatGPT，可以产生最佳结果。尽管ChatGPT擅长自动化日常流程并快速生成材料，但它仍然需要人类干预来确保它生成的信息是准确、有创意且相关的。
- en: With ChatGPT, companies can automate repetitive customer care inquiries, freeing
    up agents to conduct more complex and individual conversations. This not only
    makes customer service more efficient, but it also makes the most efficient use
    of human resources by putting them where they can be most helpful.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT，公司可以自动化重复的客户关怀查询，让代理有更多时间进行更复杂和个性化的对话。这不仅使客户服务更加高效，而且通过将人力资源放在最能发挥作用的地方，也最有效地利用了人力资源。
- en: To save time for human authors, firms can use ChatGPT to generate early drafts,
    concepts, or outlines in content development. The content can then be improved
    by human writers who bring their originality, insights into the specific setting,
    and knowledge of the intended readers to the table.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 为了节省人类作者的时间，公司可以使用ChatGPT生成内容开发的早期草稿、概念或大纲。然后，人类作家可以带来他们的原创性、对特定环境的洞察以及对目标读者的了解来改进内容。
- en: Prospects for the Long Term
  id: totrans-488
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 长期前景
- en: As AI technology keeps getting better, the business effects of using ChatGPT
    are likely to change too. We can look forward to AI models getting better all
    the time, overcoming existing constraints, and learning more about context and
    creativity. To take advantage of AI-driven productivity without sacrificing the
    quality or depth of human-driven insights, businesses must adapt to this changing
    landscape by finding a balance between automated solutions and human expertise.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI技术的不断进步，使用ChatGPT的商业影响很可能会发生变化。我们可以期待AI模型不断改进，克服现有限制，并更多地了解上下文和创意。为了在不牺牲人类驱动洞察的质量或深度的情况下利用AI驱动的生产力，企业必须通过在自动化解决方案和人类专业知识之间找到平衡来适应这一不断变化的环境。
- en: Why ChatGPT Is a Game-Changer in Customer Service, Sales, and More
  id: totrans-490
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么ChatGPT是客户服务、销售以及更多领域的变革者
- en: The dynamic nature of customer service and sales presents businesses with increasing
    difficulties. Customers now want immediate, personalized interactions in addition
    to availability at all hours of the day and night, pushing the conventional models
    to their breaking points. In this regard, ChatGPT steps in as an AI solution that
    is prepared to revolutionize sales, customer service, and many other facets of
    company operations.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 客户服务和销售的动态性质给企业带来了越来越多的困难。现在，客户不仅希望全天候可用，还希望获得即时的个性化互动，这迫使传统模式达到极限。在这方面，ChatGPT作为一个准备革命化销售、客户服务以及公司运营许多其他方面的AI解决方案应运而生。
- en: A Picture of Where Things Stand Right Now in Sales and Customer Service
  id: totrans-492
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 销售和客户服务当前状况的图景
- en: Customer service and sales as they are now frequently have to adapt to match
    the ever-increasing demands of consumers. Issues with availability, response times,
    and handling numerous inquiries all at once plague traditional customer support
    approaches. Sales teams may use some guidance in responding quickly and effectively
    to a wide range of customer requests.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 客户服务和销售目前经常需要适应以匹配消费者不断增长的需求。可用性、响应时间和同时处理众多咨询等问题困扰着传统的客户支持方法。销售团队可能需要一些指导，以便快速有效地回应各种客户请求。
- en: 'Picture this: Clients are stuck in endless lines because they can’t get the
    help they need right away. Imagine a sales team that is so swamped with leads
    that they require assistance tailoring their approach to meet the unique needs
    of each customer. Businesses face inefficiencies in this difficult environment
    that affect customer satisfaction, revenue growth, and operational efficiency
    as a whole.'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：客户因为无法立即获得所需帮助而陷入无尽的等待。想象一下，销售团队因为线索过多，需要帮助调整策略以满足每位客户的独特需求。在这种困难的环境中，企业面临效率低下的问题，这影响了客户满意度、收入增长和整体运营效率。
- en: Pain Points
  id: totrans-495
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 痛点
- en: '●  Delayed Responses and Limited Availability: Timely replies are typically
    lacking in traditional customer service models, especially during busy or off-peak
    periods when staff availability is low. Being available at all times can be a
    challenge for sales teams, who may lose out on possible opportunities that arise
    outside of normal business hours.'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: ●  延迟响应和有限可用性：在传统客户服务模式中，通常缺乏及时回复，尤其是在繁忙或淡季期间，当员工可用性较低时。对于销售团队来说，始终可用可能是一个挑战，他们可能会错过正常工作时间之外出现的可能机会。
- en: '●  Scalability Issues: A company’s volume of sales leads and consumer inquiries
    grows in direct proportion to its size. Delays and worse service quality could
    occur if traditional approaches can’t scale efficiently.'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: ●  可扩展性问题：公司的销售线索量和消费者咨询量与其规模成正比增长。如果传统方法无法有效扩展，可能会出现延迟和更差的服务质量。
- en: '●  Personalization Challenges: The key to successful sales and customer service
    is tailoring interactions to each consumer. As the number of customers grows,
    it can be difficult for traditional models to continue providing a high degree
    of customization.'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: ●  个性化挑战：成功销售和客户服务的关键在于针对每个消费者定制互动。随着客户数量的增长，传统模型可能难以继续提供高度定制化。
- en: ChatGPT as the Solution
  id: totrans-499
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT作为解决方案
- en: After going over the problems with delayed responses, restricted availability,
    scalability, and personalization, it should come as no surprise that ChatGPT is
    an innovative solution for sales and customer support. Its revolutionary features
    include the ability to respond instantly and be available at all times, unleash
    scalability to handle larger workloads without a hitch, and enable large-scale
    tailored interactions.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论了延迟响应、有限可用性、可扩展性和个性化问题后，ChatGPT成为销售和客户支持的创新解决方案并不会令人惊讶。其革命性功能包括能够即时响应并始终可用，释放可扩展性以无缝处理更大的工作量，并实现大规模的个性化互动。
- en: Owners of businesses might imagine a future where ChatGPT complements human
    knowledge in a way that boosts customer happiness, simplifies sales procedures,
    allows for scalable operations, and helps with strategic resource allocation.
    A new age of efficiency, customer happiness, and growth for businesses is on the
    horizon with the integration of ChatGPT, which promises to transform customer
    service and sales.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 企业主可能会想象一个未来，ChatGPT以一种提升客户满意度、简化销售流程、允许可扩展操作并帮助战略资源分配的方式补充人类知识。随着ChatGPT的集成，一个新的效率、客户满意度和企业增长的时期即将到来，它承诺将改变客户服务和销售。
- en: Leveraging ChatGPT in Your Sales Strategy
  id: totrans-502
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在您的销售策略中利用ChatGPT
- en: You may revolutionize your approach to sales with ChatGPT integration, which
    boosts productivity, personalization, and the customer experience as a whole.
    Get ChatGPT up and running in your sales processes with the help of this detailed
    guide.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将ChatGPT集成到销售流程中，您可能会彻底改变您的销售方法，从而提高生产力、个性化以及整体客户体验。借助这份详细的指南，让ChatGPT在您的销售过程中运行起来。
- en: '●  Quick Lead Interaction: Make use of ChatGPT to quickly engage with leads,
    guaranteeing that potential clients receive timely attention.'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: ●  快速线索互动：利用ChatGPT快速与线索互动，确保潜在客户能够及时得到关注。
- en: '●  Lead Qualifying: Use ChatGPT to sort leads according to certain criteria,
    so your sales staff may concentrate on the most promising ones.'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: ●  线索筛选：使用ChatGPT根据某些标准对线索进行分类，这样您的销售团队就可以专注于最有希望的线索。
- en: '●  Customized Conversations: Make the most of ChatGPT’s learning capabilities
    for more tailored conversations. Create a more interesting and tailored sales
    experience by customizing messaging according to individual preferences.'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: ●  定制化对话：充分利用ChatGPT的学习能力进行更个性化的对话。通过根据个人偏好定制信息，创造更有趣和个性化的销售体验。
- en: '●  Suggestions for Products: Make more informed product recommendations to
    customers by training ChatGPT to take their wants and preferences into account.'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: ●  产品建议：通过训练ChatGPT考虑客户的需求和偏好，为客户提供更明智的产品推荐。
- en: '●  Handling Frequently Asked Questions (FAQs): Let your sales team focus on
    more difficult inquiries by using ChatGPT to answer FAQs and provide information
    about your products or services.'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: ●  处理常见问题：使用ChatGPT回答常见问题并提供产品或服务信息，让您的销售团队专注于处理更复杂的咨询。
- en: '●  Making Appointments: Let ChatGPT handle scheduling product demonstrations
    and appointments, making the process easier for potential customers.'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: ●  安排预约：让ChatGPT处理产品演示和预约的日程安排，为潜在客户简化流程。
- en: '●  Help With Follow-up: Have ChatGPT contact leads again after the first contact
    to make sure they’re still interested and remember your brand.'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: ●  协助跟进：让ChatGPT在初次接触后再次联系潜在客户，以确保他们仍有兴趣并记住您的品牌。
- en: '●  Data Analysis: Make use of ChatGPT’s analytical features to examine client
    interactions and spot trends; this will help you optimize your sales strategy.'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: ●  数据分析：利用ChatGPT的分析功能检查客户互动并发现趋势，这将有助于您优化销售策略。
- en: Your sales approach will be more effective, customer interactions will be streamlined,
    and procedures will be streamlined if you incorporate ChatGPT.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 整合ChatGPT将使您的销售方法更有效、客户互动更顺畅、流程更精简。
- en: Elevating Customer Service With ChatGPT
  id: totrans-513
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用ChatGPT提升客户服务水平
- en: One of the most useful ways to improve support initiatives is with ChatGPT,
    which has revolutionary features that easily transition into customer service.
    Here’s a guide on harnessing the power of ChatGPT to elevate your customer service.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT改进支持举措是最有效的方法之一，其革命性的功能可轻松融入客户服务。以下是一份关于利用ChatGPT提升客户服务水平的指南。
- en: '●  Immediate Query Resolution: Set up ChatGPT to answer client questions right
    away, fixing typical problems quickly to make customers happy.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: ●  即时查询解决：设置ChatGPT立即回答客户问题，快速解决典型问题以提高客户满意度。
- en: '●  Automated Ticketing System: ChatGPT can be used to create support tickets
    automatically, sort them into categories, and set priorities, helping to simplify
    the workflow for customer assistance.'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: ●  自动化工单系统：ChatGPT可用于自动创建支持工单、进行分类和设定优先级，有助于简化客户支持工作流程。
- en: '●  Help With FAQs: With the right training, ChatGPT can manage FAQs and help
    consumers discover answers quickly, all without human participation.'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: ●  协助处理常见问题：经过适当训练，ChatGPT可以管理常见问题并帮助消费者快速找到答案，整个过程无需人工参与。
- en: '●  Support for Escalation Protocols: For more complicated problems, use ChatGPT
    with an escalation procedure to quickly send questions to the right human resources
    representative.'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: ●  支持升级协议：针对更复杂的问题，使用ChatGPT配合升级流程，快速将问题转接至合适的人力资源代表。
- en: '●  Support in Multiple Languages: Use ChatGPT’s language features to offer
    support in multiple languages, reaching a wider audience and appealing to a wider
    range of customers.'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: ●  多语言支持：利用ChatGPT的语言功能提供多语言支持，触达更广泛的受众，吸引更多元化的客户。
- en: '●  Continuous Learning: Educate ChatGPT to pick up new information from user
    interactions so that it can adapt to answering fresh questions.'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: ●  持续学习：训练ChatGPT从用户互动中学习新信息，使其能够适应回答新问题。
- en: '●  Proactive Communication: Talk to your customers before problems get worse
    by using ChatGPT to get their comments, let them know about updates, or deal with
    potential problems before they get worse.'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: ●  主动沟通：在问题恶化之前与客户沟通，使用ChatGPT收集他们的反馈、告知更新信息，或在潜在问题升级前进行处理。
- en: '●  Social Media Integration: Add ChatGPT to your social media accounts to quickly
    answer customer questions and provide consistent service across all channels of
    contact.'
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: ●  社交媒体集成：将ChatGPT集成到您的社交媒体账户中，快速回答客户问题，并在所有联系渠道提供一致的服务。
- en: Using ChatGPT in your customer service improves how quickly you respond, how
    efficiently you work, and the general experience of your customers. Your customer
    service operations will be greatly enhanced with the help of ChatGPT because it
    automates common tasks and provides prompt, personalized support.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 在客户服务中使用ChatGPT可以提高响应速度、工作效率以及客户的整体体验。借助ChatGPT自动化常规任务并提供及时、个性化的支持，您的客户服务运营将得到极大提升。
- en: Simply put, ChatGPT is an adaptable solution that boosts productivity, customization,
    and client happiness in any sales or customer support setting. If you want to
    keep up with the latest innovations and provide your consumers with an engaging
    experience, you should carefully integrate ChatGPT into your business processes.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，ChatGPT是一种适应性解决方案，在任何销售或客户支持环境中都能提高生产力、定制化和客户满意度。如果您想跟上最新的创新并为您的消费者提供引人入胜的体验，您应该仔细将ChatGPT整合到您的业务流程中。
- en: Imagine the Transformation
  id: totrans-525
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 想象变革
- en: 'Imagine a customer service situation where all requests are answered promptly,
    accurately, and on an individual basis, every single day. Imagine a sales process
    where prospective customers get personalized messages that speak to their interests
    and requirements. This is the revolutionary possibility that ChatGPT offers. In
    the future, excellent customer service will be seen as a competitive advantage
    by business owners, rather than just a need. Companies can reap the benefits of
    ChatGPT’s seamless integration into their processes by:'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个客户服务场景，每天都能迅速、准确、个性化地回答所有请求。想象一个销售流程，潜在客户会收到针对他们兴趣和需求个性化的信息。这是ChatGPT提供的革命性可能性。在未来，卓越的客户服务将被企业主视为竞争优势，而不仅仅是需求。公司可以通过以下方式从ChatGPT无缝集成到其流程中获益：
- en: '●  Increased Customer Satisfaction:'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提高客户满意度：
- en: ○  Instant and individualized responses boost customer satisfaction and loyalty.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: ○  即时和个性化的响应可以提升客户满意度和忠诚度。
- en: ○  When companies pay more attention to what their customers want, it reflects
    well on their brand.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: ○  当公司更加关注客户的需求时，这会对其品牌产生积极影响。
- en: '●  Efficient Sales Processes:'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: ●  高效的销售流程：
- en: ○  The sales team is free to concentrate on high-value activities like closing
    deals and relationship building, while ChatGPT takes care of common questions
    and early contacts with leads.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: ○  销售团队可以自由地专注于高价值活动，如关闭交易和建立关系，而ChatGPT则负责处理常见问题和与潜在客户的初步接触。
- en: ○  Improved efficiency and effectiveness in the sales pipeline lead to higher
    conversion rates.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: ○  提高销售流程中的效率和有效性，导致更高的转化率。
- en: '●  Scalable Operations:'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: ●  可扩展的运营：
- en: ○  Businesses can confidently expand their operations without the limitations
    of conventional models, knowing that ChatGPT can easily scale to accommodate their
    growing customer base.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: ○  企业可以自信地扩大其运营规模，无需受传统模式的限制，因为ChatGPT可以轻松扩展以适应不断增长的客户群。
- en: ○  Being able to manage more work without lowering service quality is when scalability
    becomes a competitive advantage.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: ○  能够在不降低服务质量的情况下管理更多工作，这时可扩展性成为竞争优势。
- en: '●  Strategic Resource Allocation:'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: ●  战略资源分配：
- en: ○  Creative, analytical, and decision-making challenging work can be deliberately
    assigned to human resources.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: ○  创造性、分析性和决策性挑战性工作可以故意分配给人力资源。
- en: ○  By automating routine and repetitive processes, ChatGPT frees up human labor
    to concentrate on strategic initiatives that drive growth and innovation for the
    company.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: ○  通过自动化常规和重复性流程，ChatGPT释放了人力，使其能够专注于推动公司增长和创新的战略举措。
- en: Human–Tech Synergy
  id: totrans-539
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人机协同
- en: Although ChatGPT has revolutionary possibilities, it is essential to highlight
    the significance of finding the correct equilibrium between automated answers
    and human knowledge. If ChatGPT and humans could work together in equilibrium,
    ChatGPT might strengthen human skills rather than supplant them.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT具有革命性的可能性，但强调在自动化答案和人类知识之间找到正确平衡的重要性是至关重要的。如果ChatGPT和人类能够协同工作，达到平衡，ChatGPT可能会加强人类技能而不是取代它们。
- en: With ChatGPT, businesses can automate regular inquiries, respond instantly,
    and personalize encounters, making it a strong ally in sales and customer support.
    Conversely, human representatives are more suited to deal with issues requiring
    nuanced comprehension, complicated problem-solving, and relationship-building.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT，企业可以自动化常规查询，即时响应，并个性化互动，使其成为销售和客户支持中的强大盟友。相反，人类代表更适合处理需要细微理解、复杂问题解决和关系建立的问题。
- en: Takeaway
  id: totrans-542
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收要点
- en: You are now familiar with how businesses are profiting from ChatGPT and have
    also seen the quantitative evidence of its superiority. To unlock even greater
    success, let’s go technical and take your prompt abilities to the next level.
    Chapter 3 will help you quickly master this crucial skill.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经熟悉了企业如何从ChatGPT中获利，也看到了其优越性的量化证据。为了解锁更大的成功，让我们深入技术层面，将你的提示能力提升到新的水平。第3章将帮助你快速掌握这项关键技能。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-544
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-545
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 3: Next-Level Prompts—The Shortcut to Success'
  id: totrans-546
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3章：高级提示——成功的捷径
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-547
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: What if you could double the effectiveness of your bot with simple sentence
    tweaks? Sounds intriguing, right? Has it ever happened to you that a bot you interacted
    with appeared to understand what you needed, almost like a mind reader? Maybe
    it impressed you with its intelligence by perfectly answering your questions or
    effortlessly providing important facts. In contrast, you may have met bots that
    made you angry because they didn’t understand what you were asking for or replied
    with irrelevant information. When comparing bot performance, prompt engineering
    is frequently the deciding factor.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能通过简单的句子调整将你机器人的有效性翻倍，听起来是不是很有趣？这对你来说是不是曾经发生过，你交互的机器人似乎理解了你的需求，就像一个读心者一样？也许它通过完美回答你的问题或轻松提供重要事实来让你印象深刻。相比之下，你可能遇到过让你生气的机器人，因为它们不理解你想要什么，或者回复了不相关信息。在比较机器人性能时，提示工程通常是决定性因素。
- en: The science and art of prompt engineering involve creating successful prompts,
    which are the first clues or inquiries that users provide, to direct the bot’s
    responses. Improving the bot’s understanding of user purpose, context, and preferences
    is the goal of conversation shaping. Imagine it as laying the groundwork for a
    fruitful conversation between the bot and the user, where each prompt directs
    the bot to achieve the target result.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的科学与艺术在于创建成功的提示，这些是用户提供的第一个线索或询问，用以指导机器人的响应。提高机器人对用户目的、上下文和偏好的理解是会话塑造的目标。想象一下，这是为机器人和用户之间的一次富有成效的对话奠定基础，其中每个提示都指导机器人达到目标结果。
- en: You may increase your bot’s efficacy by a factor of two or three just by learning
    how to use prompt engineering to modify sentences. By honing your prompts, you
    may understand the subtleties of customer inquiries, foresee their requirements,
    and provide answers that truly connect with them. Whether you’re creating a recommendation
    engine, virtual assistant, or customer support bot, prompt engineering is essential
    for maximizing your bot’s capabilities and providing an exceptional user experience.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需通过学习如何使用提示工程来修改句子，就能将你机器人的效率提高两到三倍。通过磨练你的提示，你可以理解客户咨询的微妙之处，预见他们的需求，并提供真正与他们产生共鸣的答案。无论你是创建推荐引擎、虚拟助手还是客户支持机器人，提示工程对于最大化你的机器人能力并提供卓越的用户体验至关重要。
- en: In this chapter, we will explore the tricks of prompt engineering and learn
    how to make your bot respond the way you want it to. Here, you will learn what
    you need to know to optimize training data, fine-tune language models, and comprehend
    user intent and conversational flows. Along this path, you will learn everything
    you need to know to make your bot a more intelligent and perceptive conversational
    partner—one that surprises and delights its users every step of the way. So, let’s
    roll up our sleeves and dive into the world of prompt engineering, where the possibilities
    are as endless as your imagination.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨提示工程的技巧，并学习如何让你的机器人以你想要的方式响应。在这里，你将了解你需要知道的内容来优化训练数据、微调语言模型，以及理解用户意图和对话流程。沿着这条道路，你将学习你需要知道的一切，让你的机器人成为一个更智能、更有洞察力的对话伙伴——它会在每一步都让用户感到惊喜和愉悦。所以，让我们卷起袖子，深入提示工程的世界，那里的可能性就像你的想象力一样无限。
- en: Reviewing Prompt Engineering
  id: totrans-552
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 回顾提示工程
- en: When it comes to AI, prompt engineering is the key to optimizing ChatGPT’s performance
    and opening up new possibilities. Before diving into this section, let’s go over
    the significance of prompt engineering and how it may be utilized to maximize
    ChatGPT’s potential.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到AI时，提示工程是优化ChatGPT性能和开启新可能性的关键。在深入这一部分之前，让我们回顾一下提示工程的重要性以及它是如何被利用来最大化ChatGPT的潜力的。
- en: The science and art of prompt engineering are guiding ChatGPT to produce desired
    outputs by creating inputs. Getting the most out of an AI model’s responses requires
    more than simply coming up with a query; it also requires carefully crafting the
    words and context to use. As we venture into the world of AI-powered content production,
    consumer interactions, and problem-solving, becoming an expert in prompt engineering
    will be crucial for getting impressive results.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的科学与艺术是通过创建输入来引导ChatGPT产生期望的输出。从AI模型响应中获得最大利益需要不仅仅是提出一个查询；还需要精心设计要使用的词汇和上下文。随着我们进入AI驱动的内容创作、消费者互动和问题解决的世界，成为提示工程专家对于获得令人印象深刻的结果至关重要。
- en: As an analogy, prompt engineering is like giving ChatGPT a roadmap to successful
    understanding and response. To get AI to do what you want it to, you have to understand
    its subtleties in language, context, and intent. Prompt engineering is a potent
    tool for crafting the story since it controls the intelligibility of ChatGPT’s
    responses.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个类比，提示工程就像为ChatGPT提供一条通往成功理解和回应的路线图。为了使AI做你想让它做的事，你必须理解它在语言、上下文和意图上的微妙之处。提示工程是构建故事的强大工具，因为它控制着ChatGPT回应的可理解性。
- en: Optimizing for Specific Outcomes
  id: totrans-556
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化特定结果
- en: With prompt engineering, you can control the output by adjusting the inputs.
    Your prompt framing determines ChatGPT’s focus, whether you’re looking for creative
    content, technical insights, or problem-solving. It makes the AI more tailored
    to your specific needs, rather than just another generic tool.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提示工程，你可以通过调整输入来控制输出。你的提示框架决定了ChatGPT的焦点，无论是寻找创意内容、技术洞察还是问题解决。这使得AI更加符合你的特定需求，而不仅仅是另一个通用工具。
- en: Dealing with AI models can be difficult because of their sensitivity to ambiguity.
    Here, prompt engineering steps in as a way to get around the ambiguities. You
    can make sure that ChatGPT understands your requests correctly by crafting prompts
    that are clear, brief, and provide context.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 与AI模型打交道可能很困难，因为它们对模糊性很敏感。在这里，提示工程作为一种克服模糊性的方法出现。通过设计清晰、简洁并提供上下文的提示，你可以确保ChatGPT正确理解你的请求。
- en: Using prompt engineering isn’t going to work for every situation. It’s a cycle
    where you adjust your suggestions depending on the results you want. You can improve
    the quality of the information or solutions supplied by ChatGPT by learning from
    your interactions and making adjustments to your prompts.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示工程并不适用于所有情况。这是一个根据你想要的结果调整建议的循环。通过从你的互动中学习并调整你的提示，你可以提高ChatGPT提供的信息或解决方案的质量。
- en: Why Prompt Engineering Deserves Its Star Billing
  id: totrans-560
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么提示工程值得其明星地位
- en: Accuracy Is Key
  id: totrans-561
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 准确性是关键
- en: By providing clear and simple prompts, you may eliminate uncertainty and ensure
    that ChatGPT provides outputs that fulfill your unique requirements. It is the
    equivalent of providing the model with a precise plan rather than an imprecise
    sketch.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供清晰简单的提示，你可以消除不确定性，并确保ChatGPT提供满足你独特需求的输出。这相当于向模型提供一个精确的计划，而不是一个模糊的草图。
- en: Context Matters
  id: totrans-563
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 上下文很重要
- en: By giving ChatGPT some context, you may help it understand the bigger picture
    and get more nuanced and intelligent answers. Imagine it as preparing the stage
    for the performance; it provides the model with the information it needs to provide
    its best performance.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为ChatGPT提供一些上下文，你可以帮助它理解更大的图景，并获得更细致、更智能的答案。想象一下，这就像为表演准备舞台；它为模型提供了提供最佳表现所需的信息。
- en: Unlocking Potential
  id: totrans-565
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 激发潜能
- en: A solid grounding in prompt engineering is essential for advanced approaches
    such as temperature control and persona creation. If you want to try your hand
    at complicated recipes, it’s like knowing a master chef.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程方面有坚实的基础对于高级方法，如温度控制和角色创建，是必不可少的。如果你想尝试复杂的食谱，这就如同了解一位大师厨师。
- en: Improving your prompt game is much more than simply receiving responses; it’s
    about making the most of ChatGPT to reach your unique objectives. Make sure you
    have a firm grasp of prompt engineering before moving on to more complex tactics.
    Throughout your ChatGPT adventure, your investment will yield dividends.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 提升你的提示技巧远不止简单地接收回应；它关乎如何充分利用ChatGPT来实现你独特的目标。在转向更复杂的策略之前，确保你对提示工程有牢固的理解。在整个ChatGPT的冒险过程中，你的投资将带来回报。
- en: 'Golden Nugget: If you’re looking to delve deeper into the fundamentals of prompt
    engineering, I highly recommend checking out my comprehensive guide in my other
    book ChatGPT 4 Money Machine: The Ultimate Chatbot Cheat Sheet to Go From Clueless
    Noob to Prompt Prodigy Fast! Complete Beginner’s Course for AI Mastery to Catch
    the GPT Gold Rush Before It Leaves You Behind. There, you’ll find a detailed exploration
    of prompt engineering principles, along with practical examples and step-by-step
    instructions to help you master this essential skill.'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 稀世之宝：如果你想要深入了解提示工程的基础，我强烈推荐查看我在另一本书《ChatGPT 4 Money Machine：通往提示大师的终极聊天机器人作弊表》中的全面指南。在那里，你可以找到对提示工程原则的详细探讨，以及实际示例和逐步指导，帮助你掌握这项基本技能。
- en: The Foundation for Advanced Strategies
  id: totrans-569
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级策略基金会
- en: The more we delve into the details of prompt engineering, the more apparent
    it becomes that this basic skill acts as a compass throughout your time with ChatGPT,
    not merely an introduction. As such, it is essential for the development of more
    complex strategies.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们深入探索提示工程的细节，越来越明显的是，这项基本技能在ChatGPT的使用过程中充当指南针，而不仅仅是入门。因此，对于更复杂策略的发展至关重要。
- en: '●  Temperature Control: You can change how creative and random ChatGPT’s answers
    are by changing the temperature parameter in your prompts. But controlling the
    temperature is like adjusting the stovetop knob without knowing what you’re cooking
    if you don’t have a specific prompt.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: ●  温度控制：通过在提示中改变温度参数，你可以改变ChatGPT的回答的创造性和随机性。但如果你没有具体的提示，控制温度就像不知道要做什么而调整炉灶的旋钮一样。
- en: '●  Persona Crafting: Creating a ChatGPT persona entails molding its replies
    to reflect a specific persona or voice. A firm foundation is essential for a persona
    to succeed, but without a carefully planned trigger, the character may stumble.'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: ●  角色塑造：创建ChatGPT角色意味着塑造其回复以反映特定的角色或声音。一个坚实的基础对于角色的成功至关重要，但没有精心策划的触发器，角色可能会出错。
- en: '●  Generating Long-Form Content: Use prompt engineering as your compass if
    you want ChatGPT to generate long-form, consistent material. The AI will be able
    to grasp the intended length, style, and complexity of the information if the
    prompt is well-structured.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: ●  生成长篇内容：如果你想让ChatGPT生成长篇、一致的内容，请以提示工程为指南。如果提示结构良好，AI将能够掌握信息的预期长度、风格和复杂性。
- en: Cool Tips and Tricks to Make Your Bot Smarter
  id: totrans-574
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让你的机器人更聪明的实用技巧和技巧
- en: Let’s look at more advanced strategies that go beyond the usual ways of using
    ChatGPT as well as some unique tips and tricks that will make your bot smarter.
    These useful tips are meant to help you get a better sense of what the language
    model can do, so you can change how it responds to different situations and needs.
    If you want to make your bot smarter, here are some tips that are different from
    what you can find in other ChatGPT resources.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些更高级的策略，这些策略超越了通常使用ChatGPT的方式，以及一些独特的技巧和窍门，这些技巧和窍门将使你的机器人更聪明。这些有用的技巧旨在帮助你更好地了解语言模型能做什么，以便你能够改变它对不同情况的需求的响应。如果你想使你的机器人更聪明，这里有一些与其他ChatGPT资源中可以找到的不同建议。
- en: 'Tip 1: Specify Output Format'
  id: totrans-576
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技巧1：指定输出格式
- en: When writing prompts for ChatGPT, telling it what output style you want can
    make it work a lot better. If you want an answer in a certain format, like bullet
    points, paragraphs, or even code snippets, make that clear in the prompt. This
    helps ChatGPT understand what you want and gives you results in the style you
    want.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 当为ChatGPT编写提示时，告诉它你想要的输出样式可以使它工作得更好。如果你想以特定的格式得到答案，比如项目符号、段落，甚至是代码片段，请在提示中明确指出。这有助于ChatGPT理解你的需求，并以你想要的风格给出结果。
- en: Step-By-Step Implementation Guide
  id: totrans-578
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 逐步实施指南
- en: ●  Start your question with a clear direction like “Please answer in bullet
    points.”
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: ●  以清晰的方向开始你的问题，例如“请用项目符号回答。”
- en: ●  After that, give ChatGPT the main part of your prompt and make sure it knows
    what it means.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: ●  之后，给ChatGPT你的主要提示部分，并确保它知道其含义。
- en: ●  Check the output that was made to make sure that the answer matches the format
    that was given.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: ●  检查生成的输出，确保答案符合所提供的格式。
- en: 'Tip 2: Tell It to Format in HTML'
  id: totrans-582
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 2：告知以HTML格式格式化
- en: Telling the model to format answers in HTML is very helpful for people who want
    to use ChatGPT-generated content on webpages or apps. With this tip, you can easily
    add ChatGPT’s results to your digital projects without having to do a lot of extra
    work.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉模型以HTML格式格式化答案对于想在网页或应用中使用ChatGPT生成内容的人来说非常有帮助。有了这个提示，你可以轻松地将ChatGPT的结果添加到你的数字项目中，而无需做很多额外的工作。
- en: Step-By-Step Implementation Guide
  id: totrans-584
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤化实施指南
- en: '●  Add this command to your prompt: “Format the response in HTML.”'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在你的提示中添加此命令：“以HTML格式格式化响应。”
- en: ●  In the prompt, define any HTML tags or patterns that you want.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在提示中定义你想要的任何HTML标签或模式。
- en: ●  Check the generated content to make sure it follows the HTML format that
    was given.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: ●  检查生成的内容，确保它遵循所提供的HTML格式。
- en: 'Tip 3: Iterate With Multiple Attempts'
  id: totrans-588
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 3：多次尝试迭代
- en: Iteration is often needed to get the right answer. Instead of being satisfied
    with the first result, try different things more than once. Use a series of hints
    to help ChatGPT improve its answers, focusing on the end result you want to achieve.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 为了得到正确的答案，通常需要迭代。不要满足于第一个结果，尝试多次不同的方法。使用一系列提示来帮助ChatGPT改进其答案，专注于你想要实现的结果。
- en: Step-By-Step Implementation Guide
  id: totrans-590
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤化实施指南
- en: ●  Evaluate ChatGPT’s first response.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: ●  评估ChatGPT的第一响应。
- en: ●  Using the first output as a starting point, create a follow-up prompt to
    direct the model’s improvement.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: ●  以第一个输出作为起点，创建一个后续提示来指导模型改进。
- en: ●  To get the accuracy you want, you have to iteratively repeat the process.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: ●  为了获得你想要的确切准确性，你必须迭代地重复这个过程。
- en: 'Tip 4: Use Long Prompts or Sets of Prompts'
  id: totrans-594
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 4：使用长提示或提示集
- en: Despite the general consensus that you should keep your prompts short, you shouldn’t
    be afraid to use lengthy ones when context and clarity are absolutely critical.
    With long prompts, you can give ChatGPT all the information it needs to provide
    better, more relevant responses.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管普遍认为你应该保持提示简短，但在语境和清晰度绝对关键时，你不必害怕使用较长的提示。有了长提示，你可以给ChatGPT提供所有必要的信息，以提供更好、更相关的响应。
- en: Step-By-Step Implementation Guide
  id: totrans-596
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤化实施指南
- en: ●  Whenever dealing with complex issues, opt for longer prompts that provide
    thorough details.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在处理复杂问题时，选择提供详细信息的较长的提示。
- en: ●  It may be helpful to divide long requests into smaller sets of questions
    so that ChatGPT can handle the data in stages.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: ●  将长请求分成更小的提问组，这样ChatGPT就可以分阶段处理数据。
- en: ●  Make sure the generated answers are clear and relevant by reviewing them.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: ●  通过审查它们来确保生成的答案清晰且相关。
- en: 'Tip 5: Limit a Response by Being Specific'
  id: totrans-600
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 5：通过具体化来限制响应
- en: Give ChatGPT clear parameters to work with if you want very precise results.
    You can tell ChatGPT to produce results that meet your standards by setting limits,
    such as a maximum word count or response length, or by specifying a specific style
    guide.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想得到非常精确的结果，请给ChatGPT提供清晰的参数。你可以通过设置限制，如最大字数或响应长度，或指定特定的风格指南，来告诉ChatGPT生成符合你标准的结果。
- en: Step-By-Step Implementation Guide
  id: totrans-602
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤化实施指南
- en: ●  Indicate the limitations of your prompt explicitly (for instance, “Please
    respond within 200 words”).
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: ●  明确指出你的提示的限制（例如，“请回答不超过200字”）。
- en: ●  Make sure you use clear language to describe any other restrictions or needs
    for the generated material.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: ●  确保你使用清晰的语言描述任何其他对生成材料的限制或需求。
- en: ●  Verify that the results are within the bounds of the parameters you gave.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: ●  核实结果是否在所给参数的范围内。
- en: 'Tip 6: Tell It Number of Words, Sentences, Characters'
  id: totrans-606
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士 6：告知字数、句子数、字符数
- en: Users who want fine-grained control over the structure and length of ChatGPT’s
    responses can achieve great success by telling the model the exact number of words,
    phrases, or characters they want. The created content will be precisely the right
    length and format thanks to this tip.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 想要精细控制ChatGPT响应的结构和长度的用户，通过告诉模型他们想要的精确字数、短语或字符数，可以取得巨大的成功。由于这个提示，创建的内容将精确到正确的长度和格式。
- en: Step-By-Step Implementation Guide
  id: totrans-608
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤化实施指南
- en: ●  Make it clear in the prompt how long the answer should be (for example, “Write
    a response with exactly three sentences”).
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在提示中明确指出答案应该有多长（例如，“写一个由三个句子组成的回答”）。
- en: ●  Define the parameters of the prompt, whether they be word count, phrase form,
    or character limit.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: ●  定义提示的参数，无论是字数、短语形式还是字符限制。
- en: ●  Make sure the produced response is of the correct length and format.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: ●  确保生成的回答长度和格式正确。
- en: 'Tip 7: Allow the AI to Evaluate its Answers'
  id: totrans-612
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小贴士7：让AI评估其答案
- en: Get ChatGPT to check its own work and see how it stacks up. By encouraging the
    model to reflect on its own answers, this piece of advice helps it become smarter
    and more efficient in its generating process.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 让ChatGPT检查自己的工作并看看它的表现如何。通过鼓励模型对自己的答案进行反思，这条建议有助于它在生成过程中变得更聪明、更高效。
- en: Step-By-Step Implementation Guide
  id: totrans-614
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤化实施指南
- en: ●  In your prompt, include follow-up questions that encourage ChatGPT to assess
    the correctness or applicability of its first response.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在你的提示中包含后续问题，鼓励ChatGPT评估其第一响应的正确性或适用性。
- en: ●  “Do you think this answer fully addresses the question?” is a good question
    to ask to encourage self-evaluation.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: ●  “你认为这个答案完全回答了问题吗？”是一个很好的问题，可以鼓励自我评估。
- en: ●  When making changes to future prompts, take into account the self-assessment
    comments given by ChatGPT.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: ●  在对未来的提示进行修改时，请考虑ChatGPT给出的自我评估评论。
- en: Best Practices for Testing and Refining Prompts
  id: totrans-618
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试和改进提示的最佳实践
- en: The first step in making the most of ChatGPT is realizing how important continuous
    testing is. Language models, in contrast to static systems, benefit greatly from
    being refined and adjusted. The key to getting the most out of ChatGPT when you
    incorporate it into your projects or company processes is to test it frequently.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 充分利用ChatGPT的第一步是意识到持续测试的重要性。与静态系统相比，语言模型从被精炼和调整中受益匪浅。当你将ChatGPT纳入你的项目或公司流程时，测试它是获取最大效益的关键。
- en: With continuous testing, you can keep up with ChatGPT’s ever-changing capabilities.
    You may keep in tune with the model’s nuanced reactions and adjust your prompts
    appropriately by testing it regularly as it receives updates and enhancements.
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 通过持续测试，你可以跟上ChatGPT不断变化的能力。你可以通过定期测试它在接收更新和增强时的微妙反应，并相应地调整你的提示。
- en: There are specific needs for each project or commercial activity. Find out how
    well ChatGPT fits your demands with the help of continuous testing. By iteratively
    refining the model, you can make sure that it consistently produces results that
    are spot on with your expectations.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 每个项目或商业活动都有特定的需求。借助持续测试，找出ChatGPT如何满足你的需求。通过迭代优化模型，你可以确保它始终产生符合你期望的结果。
- en: You can adapt ChatGPT to new situations. Continuous testing is like a map; it
    shows you how to adjust and improve prompts for changing settings, whether it’s
    new industry trends, revised company strategies, or user preferences.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以调整ChatGPT以适应新情况。持续测试就像一张地图；它显示了如何调整和改进提示以适应不断变化的设置，无论是新的行业趋势、修订的公司战略还是用户偏好。
- en: The data used to train language models can introduce biases into the models.
    To make sure that your ChatGPT interactions are fair and inclusive, it’s a good
    idea to implement continuous testing. This will help you uncover and mitigate
    biases by evaluating replies across varied scenarios.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 用于训练语言模型的数据可能会引入模型中的偏差。为了确保你的ChatGPT交互是公平和包容的，实施持续测试是个好主意。这将帮助你通过评估不同场景下的回复来发现和减轻偏差。
- en: To ensure the best possible user experience with your ChatGPT app, continuous
    testing is a must if it requires user interaction. Achieving higher levels of
    user satisfaction can be achieved by consistently analyzing prompts in real-life
    situations. This will help you discover patterns that are meaningful to your audience.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保你的ChatGPT应用提供最佳的用户体验，如果它需要用户交互，持续测试是必不可少的。通过持续分析现实生活中的提示，可以实现更高的用户满意度。这将帮助你发现对你受众有意义的模式。
- en: Let us explore the complex world of advanced methods for testing and improving
    ChatGPT prompts. Mastering and understanding these methods is important for making
    the content that the language model creates more useful and high-quality.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索测试和改进ChatGPT提示的高级方法复杂世界。掌握和理解这些方法对于使语言模型创建的内容更有用、更高质量至关重要。
- en: A/B Testing
  id: totrans-626
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: A/B测试
- en: A/B testing is one of the most important ways to quickly improve things. The
    idea is to give ChatGPT different types of prompts and judge the quality of the
    answers it comes up with. This methodical approach lets you figure out which variations
    on the question always lead to better results.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试是快速改进事物的重要方法之一。其想法是给ChatGPT提供不同类型的提示，并判断其提出的答案的质量。这种方法论方法让你能够找出哪些问题的变体总是导致更好的结果。
- en: To do A/B testing correctly, you should make several copies of the same prompt
    that are different in tone, wording, or specific directions. It is the goal to
    keep improving general performance by making small changes to prompts based on
    test results.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 要正确进行A/B测试，你应该制作几个不同语气、措辞或具体方向的相同提示词副本。目标是通过对测试结果进行的小幅调整来不断提高整体性能。
- en: 'Let’s consider an example:'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个例子：
- en: '●  Original Prompt: “Describe the process of photosynthesis in plants.”'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: ●  原始提示： “描述植物光合作用的过程。”
- en: '●  Variation 1: “Explain the mechanism of photosynthesis in plants.”'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: ●  变体1： “解释植物光合作用的机制。”
- en: '●  Variation 2: “Elaborate on how plants undergo photosynthesis.”'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: ●  变体2： “详细说明植物如何进行光合作用。”
- en: User Feedback Mechanisms
  id: totrans-633
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户反馈机制
- en: Improving prompts is a breeze with the help of user feedback. You can engage
    in a continuous conversation with ChatGPT’s developing capabilities by setting
    up systems to gather input, whether it’s through explicit interactions, like rating
    response quality, or implicit interactions, like studying user behavior.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 在用户反馈的帮助下，改进提示词变得轻而易举。您可以通过设置收集输入的系统，无论是通过明确的交互，如对响应质量进行评分，还是通过隐性的交互，如研究用户行为，与ChatGPT的发展能力进行持续的对话。
- en: Provide quantitative statistics for assessing user satisfaction by allowing
    users to score the quality of ChatGPT’s responses. Watching how users act during
    interactions gives you qualitative information that can be used right away to
    make things better. To directly acquire thoughts on prompt effectiveness, introduce
    periodic questionnaires or feedback loops. Engaging with ChatGPT becomes dynamic
    and responsive through this iterative discussion.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 通过允许用户对ChatGPT的响应质量进行评分来提供评估用户满意度的定量统计数据。观察用户在互动中的行为可以立即为你提供用于改进事物的定性信息。为了直接获取关于提示有效性的想法，引入定期的问卷调查或反馈循环。通过这种迭代讨论，与ChatGPT的互动变得动态和响应。
- en: Think of a situation where people can give the replies a quality rating from
    1 to 5, with 5 being the best result. You can learn a lot about user happiness
    from these numbers. Also, you can get some good qualitative insights by seeing
    how users act when interacting. One way to identify areas for improvement is to
    see how often people ask for clarification on specific responses.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个场景，人们可以从1到5对回复进行质量评分，5是最佳结果。你可以从这些数字中学到很多关于用户满意度的信息。此外，通过观察用户在互动中的行为，你可以获得一些有价值的定性见解。识别改进领域的一种方法是通过查看人们多久会要求对特定响应进行澄清。
- en: Nudging, Chaining Prompts, and Feedback Loops
  id: totrans-637
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 微调、提示链和反馈循环
- en: When you interact with ChatGPT, you can use nudges, chaining hints, and feedback
    loops to change the way it responds, making its outputs more complex and logical.
    Nudging is the process of guiding ChatGPT to think about things from several angles
    to help it grasp questions better. Chaining prompts are a great way to get talking
    in a logical and relevant way by referencing or building upon previous answers.
    In a feedback loop, users can ask ChatGPT to evaluate the correctness or applicability
    of its responses, which leads to an ongoing process of improvement.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与ChatGPT互动时，你可以使用微调、提示链和反馈循环来改变它的响应方式，使其输出更加复杂和逻辑。微调是通过引导ChatGPT从多个角度思考问题，帮助它更好地理解问题的过程。提示链是一种通过引用或基于先前答案构建来以逻辑和相关性进行对话的绝佳方式。在反馈循环中，用户可以要求ChatGPT评估其响应的正确性或适用性，这导致了一个持续改进的过程。
- en: Examples
  id: totrans-639
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 示例
- en: '●  Nudging Prompt: “Consider the environmental impact of the process you just
    described in the context of climate change.”'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: ●  微调提示： “考虑你刚刚描述的过程在气候变化背景下的环境影响。”
- en: '●  Chaining Prompt: “How does the environmental impact of photosynthesis contribute
    to the broader discourse on climate change?”'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: ●  提示链： “光合作用的环境影响如何对气候变化更广泛的讨论做出贡献？”
- en: '●  Feedback Loop Prompt: “Evaluate the accuracy of your explanation regarding
    the environmental impact. Are there any aspects you would revise?”'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: ●  反馈循环提示： “评估你关于环境影响的解释的准确性。有没有任何方面你需要修改的？”
- en: All things considered, these methods provide a methodical way to influence the
    flow of conversation, letting you use ChatGPT with greater precision and command.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到所有因素，这些方法提供了一种系统的方法来影响对话的流程，让你能够更精确、更有控制地使用 ChatGPT。
- en: Role-Play
  id: totrans-644
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 角色扮演
- en: Through the use of role-play, it’s possible to customize ChatGPT’s responses
    by giving the model different personas or varying degrees of skill. This method
    involves giving ChatGPT instructions to act out a specific role or set of facts
    so that the content fits the intended context.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 通过角色扮演，可以定制 ChatGPT 的响应，通过给模型提供不同的角色或不同水平的技能来实现。这种方法包括给 ChatGPT 指示扮演一个特定的角色或一系列事实，以便内容符合预期的上下文。
- en: You can test ChatGPT’s adaptability to different personas and the accuracy of
    its responses by assigning them different levels of competence before prompt generation
    (for example, “industry expert” or “novice”). Changing personas often based on
    testing and user feedback helps make them more relevant to the situation. For
    instance
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过在提示生成之前分配不同水平的胜任能力来测试 ChatGPT 对不同角色的适应性和响应的准确性（例如，“行业专家”或“新手”）。根据测试和用户反馈经常改变角色，有助于使它们更符合实际情况。例如
- en: '●  Role-Play Prompt: “Respond to the question as if you were a high school
    biology teacher explaining photosynthesis to students.”'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: ●  角色扮演提示：“以高中生物学老师的身份回答问题，向学生解释光合作用。”
- en: This prompts ChatGPT to adopt a teaching persona, adjusting the tone and level
    of complexity in its response accordingly.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 这促使 ChatGPT 采取教学角色，相应地调整其响应的语气和复杂程度。
- en: Clarity in Instructions
  id: totrans-649
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指令的清晰度
- en: Clarity in instructions is key to effective communication using ChatGPT. Making
    suggestions that are clear and to the point helps to avoid confusion and maximize
    accuracy. The clarity and precision of brief instructions can be maintained by
    regularly analyzing and modifying them, depending on user interactions and feedback.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 ChatGPT 进行有效沟通时，指令的清晰度至关重要。提出明确、简洁的建议有助于避免混淆并最大化准确性。通过定期分析和修改，根据用户互动和反馈，可以保持简短指令的清晰度和精确度。
- en: Use clear and direct wording in your prompts to remove any room for interpretation.
    To lead ChatGPT accurately, it is necessary to clearly explain any requirements,
    limits, or expectations. Establishing a strong basis for communication with ChatGPT,
    this iterative method guarantees that instructions stay clear and effective. For
    example
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中使用清晰、直接的措辞，以消除任何解释的空间。为了准确引导 ChatGPT，有必要清楚地解释任何要求、限制或期望。与 ChatGPT 建立强大的沟通基础，这种迭代方法保证了指令保持清晰和有效。例如
- en: '●  Clear Instruction Prompt: “Provide a concise and jargon-free explanation
    of the photosynthesis process suitable for a general audience.”'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: ●  清晰的指令提示：“为普通观众提供一个简洁且无专业术语的光合作用过程解释。”
- en: This makes ChatGPT focus on being clear, staying away from scientific terms,
    and making the answer fit a wider audience.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得 ChatGPT 专注于清晰性，避免使用科学术语，并使答案适合更广泛的受众。
- en: Troubleshooting Tips for Optimizing Responses
  id: totrans-654
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化响应的故障排除技巧
- en: Problems will inevitably arise as you move through ChatGPT’s testing phase.
    On the other hand, if you have a game plan for fixing common problems, you can
    improve the language model’s performance.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 在你通过 ChatGPT 的测试阶段时，问题不可避免地会出现。另一方面，如果你有一个解决常见问题的计划，你可以提高语言模型的表现。
- en: Repetitive or Irrelevant Responses
  id: totrans-656
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重复或不相关的响应
- en: 'A common problem that users might face is that they receive answers that are
    either irrelevant or repetitive. Try these solutions if you’re having problems
    with ChatGPT becoming stuck or not responding to your query:'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可能会遇到的一个常见问题是收到不相关或重复的答案。如果你在 ChatGPT 上遇到卡住或未响应查询的问题，可以尝试以下解决方案：
- en: '●  Rephrase the Prompt: Try rephrasing your questions to bring a new angle
    to the table. This can help the model avoid giving the same answer over and over
    again and instead, think about the question from a new perspective.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: ●  重新措辞提示：尝试重新措辞你的问题，以提出新的角度。这可以帮助模型避免反复给出相同的答案，并从新的角度思考问题。
- en: '○  Original Prompt: “Explain the impact of climate change on marine ecosystems.”'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: ○  原始提示：“解释气候变化对海洋生态系统的影响。”
- en: '○  Rephrased Prompt: “Explore how rising temperatures affect marine life in
    the context of climate change.”'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: ○  重新措辞的提示：“在气候变化背景下，探讨温度上升如何影响海洋生物。”
- en: '●  Provide More Context: Provide more context in your prompts if ChatGPT has
    trouble understanding your question. The AI can be trained to provide better,
    more relevant results with this supplementary data.'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供更多上下文：如果ChatGPT难以理解你的问题，请在提示中提供更多上下文。通过这些补充数据，AI可以被训练以提供更好、更相关的结果。
- en: '○  Original Prompt: “Discuss the economic implications of renewable energy
    adoption.”'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 原始提示：“讨论可再生能源采用的经济学影响。”
- en: '○  Context-Enhanced Prompt: “Consider the economic shifts and market dynamics
    associated with the widespread adoption of renewable energy sources.”'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 增强上下文提示：“考虑可再生能源广泛采用带来的经济转型和市场动态。”
- en: Unsatisfactory Response Quality
  id: totrans-664
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不满意的回答质量
- en: 'Unsatisfactory response quality is another potential issue that users may encounter.
    If the output isn’t up to par, you can use more sophisticated methods to train
    ChatGPT to understand better and provide better answers:'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 不满意的回答质量是用户可能遇到的其他潜在问题。如果输出不符合标准，您可以使用更复杂的方法来训练ChatGPT，使其更好地理解并提供更好的答案：
- en: 'Chaining Prompts: Formulate a set of questions that, when answered in sequence,
    will lead to a logical story. With chaining prompts, ChatGPT is prompted to think
    about what has come before, which could result in more sophisticated and well-informed
    responses.'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 连接提示：制定一系列问题，当依次回答时，将引导到一个逻辑故事。通过连接提示，ChatGPT被提示思考之前发生的事情，这可能导致更复杂和更全面的信息反馈。
- en: '●  Chaining Prompt Example: “Building on the previous response, delve deeper
    into the environmental implications of renewable energy adoption.”'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: ● 连接提示示例：“在先前的回答基础上，深入探讨可再生能源采用的环保影响。”
- en: '●  Feedback Loops: To start a feedback loop, ask ChatGPT directly how it thinks
    its answers are relevant or accurate. By going through this cycle, again and again,
    the model can improve its responses through self-evaluation.'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: ● 反馈循环：要启动反馈循环，直接询问ChatGPT其对答案的相关性或准确性的看法。通过反复进行这一循环，模型可以通过自我评估来改进其回答。
- en: '●  Feedback Loop Prompt: “Evaluate the completeness and accuracy of your previous
    response regarding the economic implications. Are there aspects that need clarification
    or elaboration?”'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: ● 反馈循环提示：“评估你之前关于经济影响的回答的完整性和准确性。是否有需要澄清或详细说明的方面？”
- en: The key to realizing ChatGPT’s full potential in an ever-changing environment
    is to embrace a mindset of constant testing and improvement. Keep in mind that
    those seeking the best results will find great value in the iterative process
    of creating material, fixing problems, and perfecting solutions.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 在不断变化的环境中实现ChatGPT全部潜力的关键是拥抱持续测试和改进的心态。记住，那些寻求最佳结果的人会在创建材料、解决问题和完美解决方案的迭代过程中发现巨大的价值。
- en: The troubleshooting suggestions provide practical answers to common problems,
    so irrelevant or repetitive responses can be turned into opportunities for improvement.
    By rephrasing the prompts and providing more context, we can revitalize the conversation
    and guide ChatGPT toward more accurate and nuanced results.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 故障排除建议为常见问题提供实用答案，因此无关或重复的回答可以转化为改进的机会。通过重新措辞提示并提供更多上下文，我们可以使对话焕发活力，并引导ChatGPT向更准确和细微的结果发展。
- en: Applications in Business Scenarios
  id: totrans-672
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业场景应用
- en: Imagine that a busy online store wanted to get more involved with social media.
    Responding quickly and effectively to a flood of customer comments and messages
    was their biggest challenge. Then comes ChatGPT with our top-notch, lightning-prompt
    engineering. The company saw a dramatic increase in engagement after they started
    using prompts that accurately reflected the brand’s voice and answered customers’
    questions. Responding to each comment with a unique personalized message made
    the online presence more engaging and interactive, which in turn strengthened
    the relationship with the audience.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个繁忙的在线商店想要更多地参与社交媒体。快速有效地回应大量客户评论和消息是他们最大的挑战。然后ChatGPT带着我们顶级的闪电式提示工程出现。该公司在使用准确反映品牌声音并回答客户问题的提示后，看到了参与度的显著提升。对每条评论回复独特的个性化信息使在线存在更加吸引人、互动性强，从而加强了与受众的关系。
- en: Personalized Responses on Social Media
  id: totrans-674
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 社交媒体个性化回复
- en: 'Prompt Example: “Craft a response to a customer comment expressing interest
    in our latest product launch.”'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“针对客户对我们最新产品发布的兴趣表达进行回复。”
- en: With the help of modified prompts, ChatGPT can now provide replies that are
    both unique and appropriate to the user’s current situation, encouraging genuine
    engagement on social media. Businesses that want to establish an authentic and
    reactive web presence will find this especially useful.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用修改后的提示，ChatGPT现在可以提供既独特又适合用户当前情况的回复，鼓励在社交媒体上进行真诚的互动。想要建立真实和反应迅速的在线形象的企业会发现这一点特别有用。
- en: Multilingual Support in Customer Service
  id: totrans-677
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 客户服务中的多语言支持
- en: 'Prompt Example: “Provide customer support in French for a query related to
    our product delivery.”'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“为有关我们产品配送的查询提供法语客户支持。”
- en: By taking advantage of ChatGPT’s multilingual features, companies can provide
    better customer service by offering support in more languages. By doing so, we
    can communicate effectively with our varied clientele, which in turn promotes
    inclusivity and happiness.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用ChatGPT的多语言功能，公司可以通过提供更多语言的支持来提供更好的客户服务。通过这样做，我们可以有效地与多样化的客户群进行沟通，从而促进包容性和幸福感。
- en: Sales Strategy Enhancement
  id: totrans-680
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 销售策略提升
- en: 'Prompt Example: “Generate a persuasive product description for our upcoming
    sale on electronic gadgets.”'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“为我们即将推出的电子产品促销活动生成一个有说服力的产品描述。”
- en: Thanks to its improved prompts, ChatGPT can now aid sales strategies by writing
    engaging product descriptions. Any company that wants to save time and effort
    when making promotional and marketing-related content will find this useful.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了改进的提示，ChatGPT现在可以通过编写吸引人的产品描述来帮助销售策略。任何想要在制作促销和营销相关内容时节省时间和精力的公司都会发现这一点很有用。
- en: Automated Email Responses
  id: totrans-683
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动化电子邮件回复
- en: 'Prompt Example: “Compose an automated response for customer inquiries about
    order status.”'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“为关于订单状态的客户查询编写自动化回复。”
- en: Prompt engineering allows ChatGPT to automate email responses efficiently in
    the ecommerce realm. In response to client inquiries regarding orders, businesses
    can use this app to improve communication with customers by responding quickly
    and accurately.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程允许ChatGPT在电子商务领域高效地自动化电子邮件回复。对于客户关于订单的查询，企业可以使用这个应用通过快速准确地回复来改善与客户的沟通。
- en: Content Creation for Blog Posts
  id: totrans-686
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 博客文章的内容创作
- en: 'Prompt Example: “Generate an introductory paragraph for a blog post discussing
    the latest trends in our industry.”'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“为讨论我们行业最新趋势的博客文章生成一个引言段落。”
- en: Refined prompts make it easier for ChatGPT to contribute to blog post content
    creation. Any company that wants to be a leader in their field and have an engaging
    and informative web presence would benefit from it.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼的提示使ChatGPT更容易为博客文章的内容创作做出贡献。任何想要在其领域成为领导者并拥有吸引人和信息丰富的在线形象的公司都将从中受益。
- en: Market Research Analysis
  id: totrans-689
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 市场研究分析
- en: 'Prompt Example: “Analyze customer feedback to identify emerging trends and
    preferences in our target market.”'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“分析客户反馈，以识别目标市场中的新兴趋势和偏好。”
- en: Using its superior prompt engineering, ChatGPT can conduct in-depth analyses
    of market research. To make better strategic decisions, businesses can use this
    application to learn about consumer feelings, tastes, and market trends.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 利用其卓越的提示工程，ChatGPT可以对市场研究进行深入分析。为了做出更好的战略决策，企业可以使用这个应用来了解消费者的感受、口味和市场趋势。
- en: Takeaway
  id: totrans-692
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收要点
- en: 'Now that we’ve finished discussing prompt engineering and how it can help you
    get the most out of ChatGPT, we can move on to Chapter 4: Automated Income Streams.
    After you’ve mastered the art of creating insightful questions to guide ChatGPT’s
    answers, you’re ready to explore the fascinating world of AI-powered automated
    revenue generation. What follows is a detailed examination of the possibilities,
    methods, and tactics for developing AI-powered passive income streams that toil
    away on your behalf. Find out how to build a steady income with AI-driven automation
    by joining me in the next chapter!'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了提示工程以及它如何帮助你充分利用ChatGPT，我们可以继续到第四章：自动化收入流。在你掌握了引导ChatGPT回答的洞察力问题的艺术之后，你就可以探索由AI驱动的自动化收入生成的迷人世界了。接下来，我们将详细探讨开发AI驱动的被动收入流的可能性、方法和策略，这些收入流将为你辛勤工作。通过加入我，你将了解如何通过AI驱动的自动化建立稳定的收入，请看下一章！
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-694
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-695
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 4: Automated Income Streams'
  id: totrans-696
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：自动化收入流
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-697
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: Welcome to the world of income streams with AI! This chapter will take you on
    a journey into the fascinating realm of AI-driven automated income streams. Think
    about how great it would be if, every morning, a team of AI workers worked around
    the clock to increase your bank account balance. Anyone who knows how to use AI
    to create passive income streams can make this a reality, not just a pipe dream.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到AI收入流的世界！这一章节将带您进入AI驱动的自动化收入流的迷人领域。想象一下，如果每天早上都有一个AI工作团队全天候工作，以增加您的银行账户余额，那会多么美好。任何知道如何使用AI创建被动收入流的人都可以将这变成现实，而不仅仅是空想。
- en: We’ll talk about the best ways to use AI to make automated income streams, from
    starting businesses that are run by AI to making existing businesses better with
    AI-powered platforms and tools. Whether you’re an experienced business owner or
    just getting your feet wet, this chapter has something valuable to offer.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将讨论使用AI创建自动化收入流的最佳方法，从创建由AI运营的企业到利用AI驱动的平台和工具改善现有业务。无论你是经验丰富的企业主还是刚开始涉足这一领域，这一章节都有一些有价值的建议提供。
- en: Prepare to be amazed by the ways AI can transform into a powerful tool for building
    a passive income stream. Let’s explore the realm of AI-powered automated income
    streams and discover the key to financial independence and success.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好被AI如何转变为构建被动收入流的强大工具的方式所震撼。让我们探索AI驱动的自动化收入流领域，并发现实现财务独立和成功的关键。
- en: Automating Freelance Writing
  id: totrans-701
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化自由写作
- en: As more and more companies get serious about having an online presence and engaging
    with their audience, the demand for top-notch content is going through the roof
    in this digital age. Deadlines are always looming, and the workload is never-ending
    for freelance writers. Nevertheless, there is a chance to seize this challenge
    by making the most of ChatGPT to efficiently automate tasks related to freelance
    writing.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 随着越来越多的公司认真对待在线存在和与受众互动，在这个数字时代，对优质内容的需求正在飙升。对于自由职业者来说，截止日期总是迫在眉睫，工作量永无止境。然而，通过充分利用ChatGPT来高效自动化与自由写作相关的任务，有机会抓住这个挑战。
- en: ChatGPT is a revolutionary way to meet the growing demand for content because
    it can generate complex languages. Freelance writers can improve efficiency, boost
    output, and scale up content production without sacrificing quality by utilizing
    AI. Content creation for blogs, articles, product descriptions, and social media
    captions is a breeze for ChatGPT because it can do it much faster than a human
    writer while still maintaining contextual relevance.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一种革命性的方式来满足日益增长的内容需求，因为它可以生成复杂语言。通过利用AI，自由职业者可以提高效率、增加产出并扩大内容生产规模，同时不牺牲质量。对于博客、文章、产品描述和社交媒体标题的内容创作来说，ChatGPT可以做得比人类作者更快，同时保持语境的相关性。
- en: Freelance writers who are proficient in ChatGPT will have a leg up on the competition
    when it comes to efficiently and effectively meeting the increasing demand for
    content, especially as more and more businesses turn to automation to streamline
    their operations. By embracing automation, freelance writers can stay up with
    the fast-paced digital world and discover new ways to be creative and innovative.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 精通ChatGPT的自由职业者在高效和有效地满足日益增长的内容需求方面将比竞争对手更有优势，尤其是随着越来越多的企业转向自动化以简化其运营。通过拥抱自动化，自由职业者可以跟上快节奏的数字世界，并发现新的创意和创新方式。
- en: Leveraging ChatGPT to Boost Freelance Writing Productivity and Client Base
  id: totrans-705
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用ChatGPT提升自由写作生产力和客户群
- en: Freelance writing is a fast-paced field where originality and efficiency are
    key to making it. Freelancers now have a potent ally in the form of ChatGPT and
    other AI-powered tools to boost their writing skills, productivity, and client
    base. Let’s explore how freelancers can use ChatGPT in their workflow more thoroughly.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 自由写作是一个快节奏的领域，原创性和效率是成功的关键。现在，自由职业者有了ChatGPT和其他AI工具作为强大的盟友，可以提升他们的写作技能、生产力和客户群。让我们深入探讨自由职业者如何更有效地在他们的工作中使用ChatGPT。
- en: 1.  Crafting Compelling Bios
  id: totrans-707
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.  编写吸引人的个人简介
- en: A freelancer’s bio, which also functions as an online storefront, is often the
    first point of contact between the freelancer and clients. With the help of ChatGPT,
    you can easily create captivating and concise biographies that highlight your
    key skills, experience, and achievements. By crafting engaging summaries that
    are optimized for different platforms and audiences, freelancers have the opportunity
    to make a significant impact and stand out from the competition.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业者的个人简介，也充当在线店面，通常是自由职业者和客户之间的第一个接触点。借助ChatGPT，你可以轻松创建吸引人且简洁的个人简介，突出你的关键技能、经验和成就。通过制作针对不同平台和受众的吸引人摘要，自由职业者有机会产生重大影响，并在竞争中脱颖而出。
- en: 2.  Writing Client Proposals
  id: totrans-709
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 撰写客户提案
- en: Securing projects requires the ability to craft compelling client proposals.
    Freelancers can use ChatGPT to better express their value proposition, define
    project deliverables, and meet client requirements. Freelancers can show their
    professionalism and gain clients’ trust by creating proposals that are well-structured
    and compelling.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 获得项目需要能够制作引人入胜的客户提案。自由职业者可以使用ChatGPT更好地表达他们的价值主张，定义项目可交付成果，并满足客户要求。通过创建结构良好且引人入胜的提案，自由职业者可以展示他们的专业性并赢得客户的信任。
- en: 3.  Crafting Cold Emails
  id: totrans-711
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. 制作冷邮件
- en: One effective way to connect with prospective customers and build relationships
    is through cold emailing. If you’re a freelancer, ChatGPT can help you craft effective,
    personalized cold emails. Freelancers can improve their response rate and workflow
    by crafting captivating subject lines and body copy for their email campaigns.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 与潜在客户建立联系并建立关系的一种有效方式是通过冷邮件。如果你是一名自由职业者，ChatGPT可以帮助你撰写有效的个性化冷邮件。通过为他们的电子邮件活动制作吸引人的主题行和正文，自由职业者可以提高他们的回复率和工作流程。
- en: 4.  Creating Email Templates
  id: totrans-713
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. 创建电子邮件模板
- en: Many freelancers’ inboxes are filled with repetitive messages like invoices,
    project updates, and follow-ups. By creating reusable email templates, ChatGPT
    can make this process easier. Freelancers may maximize efficiency and maintain
    client consistency through the automation of mundane communication tasks.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 许多自由职业者的收件箱里充满了重复的信息，如发票、项目更新和跟进。通过创建可重用的电子邮件模板，ChatGPT可以使这个过程变得更简单。自由职业者可以通过自动化日常沟通任务来最大化效率并保持客户一致性。
- en: 5.  Developing Email Sequences
  id: totrans-715
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. 开发电子邮件序列
- en: To nurture leads and guide prospective customers through the sales funnel, it
    is crucial to have effective email sequences. Freelancers can use ChatGPT to build
    custom email sequences for each step of the customer journey. Freelancers can
    increase their chances of converting prospects into paying customers by providing
    them with interesting and useful content.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 为了培养潜在客户并引导潜在客户通过销售漏斗，拥有有效的电子邮件序列至关重要。自由职业者可以使用ChatGPT为每个客户旅程步骤构建定制的电子邮件序列。通过提供有趣和有用的内容，自由职业者可以增加将潜在客户转化为付费客户的机会。
- en: 6.  Crafting Advertisement Copy
  id: totrans-717
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6. 制作广告文案
- en: Having attention-grabbing ad copy is essential for getting people to click on
    your ads. Freelancers can use ChatGPT to draft compelling ad copy for landing
    pages, social media, and Google Ads. The success of freelancers’ advertising campaigns
    can be enhanced by crafting attention-grabbing headlines, compelling calls to
    action, and compelling product descriptions.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有吸引人的广告文案对于吸引人们点击你的广告至关重要。自由职业者可以使用ChatGPT起草吸引人的广告文案，用于着陆页、社交媒体和谷歌广告。通过制作吸引人的标题、引人入胜的号召性用语和引人入胜的产品描述，可以增强自由职业者广告活动的成功率。
- en: 7.  Writing Website Content
  id: totrans-719
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 7. 撰写网站内容
- en: The website of a freelancer serves as a digital portfolio showcasing their skills
    and experience. Content creation for websites, such as about pages, service descriptions,
    and landing pages, can be facilitated by ChatGPT. Freelancers may attract visitors
    and turn them into customers by creating interesting and useful content that represents
    their own voice and product offers.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业者的网站作为一个数字作品集，展示了他们的技能和经验。通过ChatGPT，可以方便地为网站创建内容，如关于页面、服务描述和着陆页。通过创建代表他们自己的声音和产品提供的有趣和有用的内容，自由职业者可以吸引访客并将他们转化为客户。
- en: 8.  Generating Topics for Blog and Social Media Posts
  id: totrans-721
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 8. 为博客和社交媒体帖子生成主题
- en: If you want to establish yourself online and gain followers, you need to create
    content consistently. Writers, journalists, and social media influencers can all
    benefit from ChatGPT’s idea-generation features. Freelancers can keep ahead of
    the curve and have an active online presence by coming up with relevant and engaging
    topics based on industry trends, audience interests, and client preferences.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要在线建立自己的品牌并吸引追随者，你需要持续地创建内容。作家、记者和社交媒体影响者都可以从 ChatGPT 的创意生成功能中受益。通过基于行业趋势、观众兴趣和客户偏好的相关和引人入胜的主题，自由职业者可以保持领先并保持活跃的在线存在感。
- en: 9.  Creating Content Calendars
  id: totrans-723
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 9. 创建内容日历
- en: If you want to remain organized and consistent, you need to organize your content
    creation efforts. Freelancers can use ChatGPT to make content calendars that help
    them organize and plan their writing tasks. Freelancers can keep themselves organized
    and provide their audience with consistent high-quality content by creating timelines,
    due dates, and lists of ideas.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要保持组织和一致性，你需要对你的内容创作工作进行组织。自由职业者可以使用 ChatGPT 创建内容日历，帮助他们组织和规划写作任务。通过创建时间表、截止日期和想法清单，自由职业者可以保持自身组织有序，并为他们的观众提供一致的高质量内容。
- en: 10.  Outlining Blog Posts
  id: totrans-725
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 10. 概述博客文章
- en: Writing an effective blog post or article begins with a well-organized outline.
    Freelancers can use ChatGPT to generate ideas for topics, main points, and important
    takeaways for their writing projects. Freelancers can streamline their writing
    process and ensure clarity and coherence in their final deliverables by providing
    a structured framework for their content.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 编写有效的博客文章或文章始于一个良好的大纲。自由职业者可以使用 ChatGPT 为他们的写作项目生成主题、主要观点和重要结论的想法。通过为内容提供结构化的框架，自由职业者可以简化他们的写作过程，并确保最终交付成果的清晰和连贯。
- en: 11.  Writing Social Media Posts
  id: totrans-727
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 11. 编写社交媒体帖子
- en: If you want to establish a solid online presence and connect with followers,
    you need to create engaging content for social media. Freelancers can use ChatGPT
    to help them create engaging content for social media sites like LinkedIn, Facebook,
    and X (formerly Twitter). Freelancers can expand their social media following
    and engagement by creating engaging, succinct content.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要建立稳固的在线存在感并与追随者建立联系，你需要为社交媒体创建引人入胜的内容。自由职业者可以使用 ChatGPT 帮助他们为 LinkedIn、Facebook
    和 X（前身为 Twitter）等社交媒体网站创建引人入胜的内容。通过创建引人入胜、简洁的内容，自由职业者可以扩大他们的社交媒体关注度和互动。
- en: 12.  Crafting Scripts for Videos
  id: totrans-729
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 12. 为视频编写脚本
- en: Videos are a great way to get people’s attention and get your point across.
    Video scripts for social media platforms like TikTok, Instagram Reels, and YouTube
    can be easily crafted with the help of ChatGPT. Freelancers can create captivating
    video content that attracts viewers and generates results by incorporating conversation,
    narrative, and calls to action.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 视频是吸引人们注意力和传达观点的绝佳方式。借助 ChatGPT，可以轻松地为 TikTok、Instagram Reels 和 YouTube 等社交媒体平台制作视频脚本。通过融入对话、叙事和行动号召，自由职业者可以创建吸引观众并产生结果的引人入胜的视频内容。
- en: 13.  Generating Business Strategy Ideas
  id: totrans-731
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 13. 生成商业策略想法
- en: Freelancers can use ChatGPT for more than just writing assignments; it can also
    help them and their clients come up with ideas for business strategies. Freelancers
    can establish themselves as valuable assets to their clients and provide more
    value to their services by coming up with fresh ideas, market research, and expansion
    prospects.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 自由职业者不仅可以用 ChatGPT 完成写作任务，它还可以帮助他们和他们的客户想出商业策略的想法。通过提出新想法、市场研究和扩展前景，自由职业者可以把自己定位为客户的有价值资产，并为他们的服务提供更多价值。
- en: Integrating ChatGPT Into Your Freelance Writing Workflow
  id: totrans-733
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 ChatGPT 集成到你的自由撰稿人写作流程中
- en: 'Boost your efficiency and output as a freelance writer by incorporating ChatGPT
    into your workflow. To ensure a smooth integration of ChatGPT into your process,
    follow these guidelines:'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将 ChatGPT 纳入你的工作流程，提高作为自由撰稿人的效率和产出。为确保 ChatGPT 与你的工作流程顺利整合，请遵循以下指南：
- en: The first step in successfully delegating tasks to ChatGPT is to identify them
    within your workflow. Research, brainstorming, outlining, revising, and content
    writing are all part of the process. Streamline your workload and concentrate
    on tasks that demand your unique expertise and creativity by identifying areas
    where ChatGPT can be of assistance.
  id: totrans-735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成功地将任务委托给 ChatGPT 的第一步是在你的工作流程中识别它们。研究、头脑风暴、概述、修订和内容写作都是这个过程的一部分。通过确定 ChatGPT
    可以提供帮助的领域，你可以简化你的工作量，专注于需要你独特专业知识和创造力的任务。
- en: If you suffer from writer’s block or just want to automate mundane tasks, ChatGPT
    is the tool for you. You can work more efficiently and meet deadlines with ease
    with the help of ChatGPT, which can generate initial ideas, draft outlines, and
    flesh out content.
  id: totrans-736
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您遭受写作瓶颈或只想自动化日常任务，ChatGPT是您的工具。借助ChatGPT，您可以更高效地工作并轻松地满足截止日期，因为它可以生成初步想法、起草大纲并充实内容。
- en: To keep your content genuine and credible while using ChatGPT, it’s important
    to mix generated content with your knowledge and imagination. Instead of relying
    solely on ChatGPT, use it to supplement your writing process. You can make sure
    the content represents your professional brand and connects with your audience
    by adding your voice and perspective to it.
  id: totrans-737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在使用ChatGPT的同时保持内容真实可信，混合使用生成内容和您的知识和想象力非常重要。不要仅仅依赖ChatGPT，而应将其用作补充您的写作过程。通过添加您的声音和观点，您可以确保内容代表您的专业品牌并与您的受众建立联系。
- en: Follow these steps to easily incorporate ChatGPT into your workflow. You’ll
    be amazed by how much you can boost productivity, creativity, and output by using
    it. With ChatGPT by your side, you can confidently advance your craft and reach
    your goals in the ever-changing world of freelance writing.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤轻松地将ChatGPT集成到您的工作中。您将会惊讶于通过使用它，您能提升多少生产力、创造力和产出。有了ChatGPT的陪伴，您可以在不断变化的自由写作世界中自信地提升您的技艺并实现目标。
- en: Bots for Ecommerce and Customer Engagement
  id: totrans-739
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 电商和客户参与中的机器人
- en: Businesses thrive or fail based on their customer service and engagement levels
    in the fast-paced ecommerce industry. As more and more people shop online, they
    have come to expect instant responses, tailored experiences, and streamlined interactions.
    More and more, ecommerce companies are looking to bots as a way to streamline
    customer engagement and meet these expectations.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 在竞争激烈的电商行业中，企业的兴衰取决于其客户服务和参与度。随着越来越多的人在线购物，他们已经期待即时响应、定制体验和简化的互动。越来越多的电商公司正在寻求使用机器人作为简化客户参与和满足这些期望的方式。
- en: Customer service is crucial in the highly competitive world of online shopping.
    Bots allow businesses to offer 24/7 support, instantly respond to customer inquiries,
    and provide personalized recommendations based on purchase and browsing behavior.
    The use of bots for customer engagement allows ecommerce businesses to boost sales
    and revenue by improving the shopping experience, establishing trust, and fostering
    loyalty.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 在高度竞争的在线购物世界中，客户服务至关重要。机器人允许企业提供24/7的支持，即时响应用户咨询，并根据购买和浏览行为提供个性化推荐。使用机器人进行客户参与使电商企业能够通过改善购物体验、建立信任和培养忠诚度来提高销售额和收入。
- en: Elevating Ecommerce Operations With ChatGPT
  id: totrans-742
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用ChatGPT提升电商运营
- en: Businesses in the ecommerce industry are always on the lookout for new ways
    to improve communication, simplify processes, and provide a better shopping experience
    for customers. ChatGPT is a revolutionary new tool that revolutionizes online
    shopping by providing a one-stop solution for all your customer service needs,
    including order tracking, FAQs, and individualized recommendations. Let’s explore
    how ChatGPT can transform ecommerce operations in these areas more thoroughly.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 电商行业的企业总是在寻找新的方法来改善沟通、简化流程并为顾客提供更好的购物体验。ChatGPT是一个革命性的新工具，它通过提供一站式解决方案来满足所有客户服务需求，包括订单跟踪、常见问题解答和个性化推荐，从而彻底改变了在线购物。让我们更深入地探讨ChatGPT如何在这些领域改变电商运营。
- en: Order Updates and Tracking
  id: totrans-744
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 订单更新和跟踪
- en: 'Efficient order fulfillment is essential for thriving ecommerce businesses,
    and ChatGPT is a game-changer when it comes to keeping everyone informed and on
    the same page:'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的订单履行对于蓬勃发展的电商企业至关重要，而ChatGPT在保持每个人知情并保持一致方面是一个变革者：
- en: Businesses can now offer customers up-to-the-minute order status and tracking
    information thanks to ChatGPT’s integration with order management systems. Quickly
    responding to customer inquiries and easing concerns about order progress is possible
    because ChatGPT has direct access to order details.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT与订单管理系统的集成，企业现在可以向客户提供最新的订单状态和跟踪信息。由于ChatGPT可以直接访问订单详情，因此快速响应客户咨询和缓解客户对订单进度的担忧成为可能。
- en: Customers can easily get purchase updates by creating personalized prompts that
    are tailored to their inquiries. You can trust ChatGPT’s NLP skills to provide
    you with accurate and contextually relevant answers whenever you ask about the
    status of an order or want to know more about tracking.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创建针对他们查询的个性化提示，客户可以轻松地获取购买更新。您可以信赖ChatGPT的自然语言处理技能，在您询问订单状态或想要了解更多关于跟踪信息时，提供准确和上下文相关的答案。
- en: Businesses can automate the delivery of order tracking updates straight to customers’
    mobile devices by integrating ChatGPT with SMS notification systems. This forward-thinking
    strategy improves communication and gives customers up-to-date information, which
    increases their faith in the ecommerce company.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将ChatGPT与短信通知系统集成，企业可以自动将订单跟踪更新直接发送到客户的移动设备。这种前瞻性的策略改善了沟通，并为客户提供最新信息，从而增加了他们对电子商务公司的信任。
- en: If you care about your customers’ happiness, you need to keep an eye on how
    well ChatGPT is keeping them updated and tracked. To improve accuracy and effectively
    handle any new issues, businesses can analyze user interactions and feedback to
    iteratively refine prompts and responses.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您关心客户的幸福，就需要关注ChatGPT如何有效地更新和跟踪客户。为了提高准确性和有效处理任何新问题，企业可以分析用户交互和反馈，以迭代地改进提示和响应。
- en: FAQs
  id: totrans-750
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 常见问题解答（FAQ）
- en: For customer support to run smoothly and for shopping to go off without a hitch,
    it is crucial to effectively handle FAQs. With ChatGPT, companies can automate
    their responses to FAQs, which means customers can get help right away and support
    costs go down.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使客户支持顺利运行，购物无障碍进行，有效处理常见问题至关重要。借助ChatGPT，公司可以自动化对常见问题的响应，这意味着客户可以立即获得帮助，支持成本也随之降低。
- en: Businesses can automate the process of responding to FAQs by utilizing ChatGPT’s
    NLP features. Support teams can reclaim more time thanks to ChatGPT’s ability
    to efficiently handle a wide range of topics, including questions about product
    specifications, payment methods, shipping, and returns.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 企业可以通过利用ChatGPT的自然语言处理（NLP）功能来自动化对常见问题解答（FAQ）的响应过程。得益于ChatGPT能够高效处理各种主题的能力，包括产品规格、支付方式、运输和退货等问题，支持团队可以节省更多时间。
- en: By utilizing ChatGPT for FAQ management, businesses can provide 24/7 access
    to information, guaranteeing that customers receive timely assistance no matter
    the time of day. Customers are more satisfied and have a better impression of
    the ecommerce brand because of this effortless availability.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用ChatGPT进行常见问题解答（FAQ）管理，企业可以提供全天候的信息访问，确保客户无论何时都能及时获得帮助。由于这种无障碍的可用性，客户更加满意，并对电子商务品牌留下了更好的印象。
- en: Business support teams can handle more complex issues and provide personalized
    assistance when needed if they are not overburdened with repetitive FAQs. The
    ecommerce operation can save money and run more efficiently as a result of this
    resource optimization.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 如果业务支持团队没有因重复的常见问题而负担过重，他们可以处理更复杂的问题，并在需要时提供个性化帮助。通过这种资源优化，电子商务运营可以节省资金并更高效地运行。
- en: Personalized Shopping Experiences
  id: totrans-755
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 个性化购物体验
- en: 'The key to increasing engagement, conversions, and customer loyalty is making
    the shopping experience personalized to each customer’s preferences. ChatGPT makes
    it easy to provide customers with tailored suggestions and interactions derived
    from their data and actions:'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 提高参与度、转化率和客户忠诚度的关键是使购物体验个性化，以适应每位客户的偏好。ChatGPT使得根据客户数据和行动提供定制建议和互动变得容易：
- en: Companies can learn a lot about their customers’ demographics, interests, buying
    habits, and web surfing habits by combining ChatGPT with customer data analytics.
    Using this information, ChatGPT can tailor its marketing campaigns to each customer’s
    specific tastes and requirements.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将ChatGPT与客户数据分析相结合，公司可以了解其客户的人口统计信息、兴趣、购买习惯和上网习惯。利用这些信息，ChatGPT可以定制其营销活动，以满足每位客户的特定口味和需求。
- en: Customers are captivated and engaged by personalized product recommendations
    because they provide them with relevant offerings that are tailored to their preferences.
    This laser-like focus raises the bar for conversion and repeat business, which
    in turn boosts ecommerce revenue and customer lifetime value.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 由于个性化产品推荐提供了针对客户偏好的相关产品，因此它们吸引了客户的注意并使他们参与其中。这种精确的关注提高了转化率和重复业务的标准，进而提升了电子商务收入和客户终身价值。
- en: Integrating ChatGPT Into Your Ecommerce Platform
  id: totrans-759
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将ChatGPT集成到您的电子商务平台中
- en: Customer interactions and the shopping experience as a whole can be revolutionized
    by integrating ChatGPT into your ecommerce platform. If you want to add ChatGPT
    to your platform without any hitches, below is a practical guide.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将ChatGPT集成到您的电商平台，可以彻底改变客户互动和整体购物体验。如果您想无缝地将ChatGPT添加到您的平台，以下是一个实用的指南。
- en: Determine Particular Use Cases
  id: totrans-761
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 确定特定使用场景
- en: The first step in implementing ChatGPT into your ecommerce platform is to determine
    its precise use cases. Find out how ChatGPT can be useful, like by answering FAQs,
    making personalized product suggestions, or helping with order tracking and updates.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT整合到您的电商平台的第一步是确定其确切的使用场景。了解ChatGPT如何有用，例如通过回答常见问题、提供个性化产品建议或帮助跟踪订单和更新。
- en: Establish Access to Data Sources for ChatGPT
  id: totrans-763
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 为ChatGPT建立数据源访问权限
- en: To proceed with intelligent interactions, you will need to link ChatGPT to the
    data sources of your platform. Provide ChatGPT with the context and information
    it needs to make accurate recommendations and responses by integrating consumer
    profiles, product catalogs, order history, and other pertinent data sources.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 要进行智能交互，您需要将ChatGPT连接到您平台的数据源。通过集成消费者档案、产品目录、订单历史和其他相关数据源，为ChatGPT提供其做出准确推荐和响应所需的上下文和信息。
- en: Develop Prompts and Conversation Flows
  id: totrans-765
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开发提示和对话流程
- en: Create natural-sounding conversation flows and prompts to lead users through
    their interactions with ChatGPT. Create questions or actions that deal with common
    customer needs or questions, like “What shipping options do you have?” or “Can
    you suggest a product based on my preferences?” Make sure the prompts are easy
    to understand, brief, and tailored to the user’s requirements.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 创建自然流畅的对话流程和提示，引导用户通过ChatGPT进行交互。创建处理常见客户需求或问题的提问或行动，例如“您有哪些运输选项？”或“您可以根据我的偏好推荐一个产品吗？”确保提示易于理解、简短并针对用户需求定制。
- en: Test and Refine Integration
  id: totrans-767
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 测试和改进集成
- en: After the ChatGPT integration is set up, make sure to test it completely to
    make sure it works as intended and that users are happy. To find out what people
    really think and where you can make improvements, you should do usability tests
    with actual users. Improve the user experience by adjusting integration settings,
    conversation flows, and prompts according to performance metrics and user feedback.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT集成设置完成后，务必进行全面测试，以确保其按预期工作且用户满意。为了了解人们真正的想法以及您可以进行改进的地方，您应该对实际用户进行可用性测试。通过根据性能指标和用户反馈调整集成设置、对话流程和提示，来改善用户体验。
- en: Track Progress and Make Adjustments
  id: totrans-769
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 跟踪进度并做出调整
- en: The ChatGPT integration’s performance should be monitored continuously, and
    improvements should be iterated as necessary. To measure how effective ChatGPT-powered
    interactions are, keep an eye on important metrics like response accuracy, user
    engagement, and conversion rates. Ensure that ChatGPT continues to benefit your
    ecommerce platform and its users by utilizing analytics and user feedback to identify
    areas that can be optimized and refined.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 应持续监控ChatGPT集成的性能，并在必要时进行迭代改进。为了衡量ChatGPT驱动的交互的有效性，关注重要指标，如响应准确性、用户参与度和转化率。通过利用分析和用户反馈来识别可以优化和改进的领域，确保ChatGPT继续为您的电商平台及其用户带来益处。
- en: Passive Income Ideas
  id: totrans-771
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 被动收入想法
- en: Earnings that, once set up, require little in the way of continual work or time
    investment are known as passive income. To put it simply, passive income streams
    allow you to earn money without actively working, as opposed to active income,
    which is based on exchanging your time for money through traditional jobs or services.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦设置好，几乎不需要持续的工作或时间投入的收益被称为被动收入。简单来说，被动收入流允许你在不主动工作的前提下赚钱，这与主动收入形成对比，主动收入是基于通过传统工作或服务以时间换钱。
- en: Passive income is important because it can change your financial independence.
    You can lessen your dependency on regular jobs and increase your financial security
    and autonomy by diversifying your income and making passive income streams. Individuals
    aiming for financial independence greatly value passive income because it allows
    them to amass wealth regardless of their location or the time of day, giving them
    a great deal of freedom and autonomy.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 被动收入很重要，因为它可以改变你的财务独立状态。通过多元化收入和创造被动收入流，你可以减少对常规工作的依赖，并提高你的财务安全和自主性。追求财务独立的人非常重视被动收入，因为它允许他们无论身处何地或何时，都能积累财富，给他们带来极大的自由和自主权。
- en: In times of economic uncertainty, passive income can provide a safety net in
    the form of protection against job loss or unforeseen expenses. The ability to
    reinvest profits or seek out other opportunities to generate income is another
    way that passive income can hasten the accumulation of wealth. A substantial amount
    of wealth can be amassed and long-term financial stability achieved through the
    compounding impact of passive income sources over an extended period.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 在经济不确定时期，被动收入可以提供一种安全网，形式是防止失业或意外开支。能够再投资利润或寻找其他收入机会也是被动收入能够加速财富积累的另一种方式。通过长期被动收入来源的复利效应，可以在一段较长的时间内积累大量财富并实现长期财务稳定。
- en: At its core, passive income is a means to financial independence, which in turn
    allows you to follow your heart, spend more time with those you care about, and
    do what makes you happy. You can escape the constraints of conventional work and
    build a life of plenty, satisfaction, and financial success by utilizing the potential
    of passive income.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，被动收入是实现财务独立的一种手段，这反过来又允许你追随自己的内心，花更多的时间与你关心的人在一起，做让你快乐的事情。通过利用被动收入的潜力，你可以摆脱传统工作的限制，建立一个丰富、满意和财务成功的生活。
- en: Below is an in-depth exploration of various ways ChatGPT can generate passive
    income.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是ChatGPT可以生成被动收入的多种方式的深入探讨。
- en: Content Creation
  id: totrans-777
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 内容创作
- en: You can use ChatGPT to make all sorts of content, like articles, blog posts,
    social media posts, and more. Blogs, websites, and social media channels are great
    places to monetize this content. Your ability to generate passive income via advertising,
    affiliate marketing, sponsored content, or the sale of digital products is directly
    proportional to the amount of high-quality content you consistently produce.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用ChatGPT制作各种内容，如文章、博客文章、社交媒体帖子等。博客、网站和社交媒体渠道是货币化这些内容的绝佳地方。你通过广告、联盟营销、赞助内容或销售数字产品来生成被动收入的能力，与你持续生产的高质量内容量成正比。
- en: Code Generation
  id: totrans-779
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码生成
- en: ChatGPT’s code generation capabilities can be utilized to build and market software
    solutions. You can simplify the coding process with ChatGPT and make valuable
    products to sell on online marketplaces like GitHub, CodeCanyon, or even your
    own website. Whether you’re developing plugins, templates, or custom scripts,
    ChatGPT can help.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的代码生成能力可以被用来构建和销售软件解决方案。你可以利用ChatGPT简化编码过程，并制作出可以在GitHub、CodeCanyon等在线市场或甚至你自己的网站上销售的有价值的产品。无论你是开发插件、模板还是定制脚本，ChatGPT都能提供帮助。
- en: Developing and Selling Software Products
  id: totrans-781
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开发和销售软件产品
- en: Not only can ChatGPT generate code, but it can also help with ideas, designs,
    and testing of software products. Insights and ideas for developing innovative
    software solutions can be found in ChatGPT, whether it’s for mobile apps or web
    applications. A reliable source of passive income can be generated once these
    products are developed and sold through various online platforms, app stores,
    or directly to clients.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不仅能生成代码，还能帮助软件产品的想法、设计和测试。无论是移动应用还是网络应用，ChatGPT中都可以找到开发创新软件解决方案的见解和想法。一旦这些产品开发并通过各种在线平台、应用商店或直接向客户销售，就可以生成可靠的被动收入来源。
- en: Creating Online Courses or Ebooks
  id: totrans-783
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建在线课程或电子书
- en: Online courses, ebooks, tutorials, and instructional videos can all be made
    easier with the help of ChatGPT. To make course creation more efficient and scalable,
    you can use ChatGPT to generate content summaries, lesson plans, or course outlines.
    Making digital products and selling them on sites like Udemy, Teachable, Amazon
    Kindle, or even your own website can bring in passive income in the form of royalties
    or course sales.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 在线课程、电子书、教程和教学视频的制作都可以借助ChatGPT变得更轻松。为了提高课程创建的效率和可扩展性，您可以使用ChatGPT生成内容摘要、课程计划或课程大纲。制作数字产品并在Udemy、Teachable、Amazon
    Kindle等平台甚至您自己的网站上销售，可以通过版税或课程销售的形式带来被动收入。
- en: Curating and Publishing Newsletters
  id: totrans-785
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 筛选与发布新闻简报
- en: Using ChatGPT, you can automate the steps of newsletter content curation and
    writing. Whether it’s curated articles, industry insights, or personalized recommendations,
    ChatGPT can create captivating newsletter content that keeps subscribers informed
    and interested. With each edition sent out, you can earn passive income through
    subscriptions, sponsorships, or affiliate marketing.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT，您可以自动化完成新闻简报内容的筛选和撰写步骤。无论是精选文章、行业洞察还是个性化推荐，ChatGPT都能创作出引人入胜的新闻简报内容，让订阅者保持信息灵通和兴趣盎然。每期简报发出后，您都可以通过订阅、赞助或联盟营销获得被动收入。
- en: Developing Investment Strategies
  id: totrans-787
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 制定投资策略
- en: Trading strategies and the financial markets can benefit from ChatGPT’s data
    analysis capabilities. Trading strategies, investment suggestions, and stock market
    analyses based on past data and current trends can be generated using ChatGPT.
    Passive income can be generated from subscription fees or consulting fees by sharing
    these insights through investment forums, newsletters, or financial advisory services.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 交易策略和金融市场可以受益于ChatGPT的数据分析能力。利用ChatGPT，可以根据历史数据和当前趋势生成交易策略、投资建议和股市分析。通过投资论坛、新闻简报或财务咨询服务分享这些见解，可以从订阅费或咨询费中产生被动收入。
- en: Creating and Selling Artwork
  id: totrans-789
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创作与销售艺术作品
- en: With the help of ChatGPT, you can come up with visual artwork like illustrations,
    designs, or digital paintings, as well as ideas and concepts. You and ChatGPT
    can work together to make one-of-a-kind designs and templates that you can then
    sell on sites like Etsy, Redbubble, or even your own web store as digital downloads
    or printed goods. You can earn royalties without having to put in constant work
    because every sale turns into passive income.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 借助ChatGPT，您可以构思插画、设计或数字绘画等视觉艺术作品，以及各种创意和概念。您与ChatGPT可以协作创建独一无二的设计和模板，然后将其作为数字下载产品或印刷品在Etsy、Redbubble等平台甚至您自己的网店上销售。每一次销售都会转化为被动收入，您无需持续投入工作即可获得版税。
- en: You can generate income from diverse sources with minimal active involvement
    by incorporating ChatGPT into your passive income strategies. It opens up a world
    of possibilities. From developing software to coming up with ideas to investing
    strategies, ChatGPT provides limitless opportunities to create, innovate, and
    earn passive income in the digital age.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将ChatGPT融入您的被动收入策略，您可以从多种来源获得收入，而只需最少的主动参与。它开启了一个充满可能性的世界。从软件开发到创意构思，再到投资策略，ChatGPT在数字时代为创造、创新和赚取被动收入提供了无限可能。
- en: Creating Passive Income With ChatGPT
  id: totrans-792
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT创造被动收入
- en: Using ChatGPT to set up a passive income stream requires a step-by-step process
    that begins with finding a niche or target audience and ends with making money
    off of your chatbot and spreading the word about it. Here is a detailed tutorial
    on how to use ChatGPT to set up a passive income stream.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT建立被动收入流需要一个循序渐进的过程，从寻找细分市场或目标受众开始，到通过您的聊天机器人获利并推广它为止。以下是一份关于如何使用ChatGPT建立被动收入流的详细教程。
- en: Determine Your Niche or Target Market
  id: totrans-794
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定您的细分市场或目标市场
- en: Think about who you’re making your chatbot for before you build it. This might
    be a specific market, type of customer, or issue that your chatbot aims to solve.
    To learn about the wants, needs, and problems of your intended audience, you should
    do market research.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建聊天机器人之前，请先考虑您是为谁而创建。这可能是您的聊天机器人旨在服务的特定市场、客户类型或要解决的问题。为了解目标受众的需求、愿望和痛点，您应该进行市场调研。
- en: Define the Chatbot’s Goal
  id: totrans-796
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义聊天机器人的目标
- en: Define your chatbot’s purpose and primary functions. Find out if your chatbot’s
    main function is to respond to consumer questions, suggest products, generate
    leads, or provide tailored recommendations.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 明确您的聊天机器人的目的和主要功能。确定您的聊天机器人的主要功能是回答消费者问题、推荐产品、生成潜在客户还是提供定制化建议。
- en: Create a Conversation Flow
  id: totrans-798
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建对话流程
- en: Make a flow of conversations that will help people use the chatbot. The steps
    your chatbot will take to respond to user queries and inputs should be defined
    in advance. Make use of decision trees and branching paths to efficiently process
    user inputs and handle different scenarios.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一系列有助于人们使用聊天机器人的对话。您的聊天机器人将采取的步骤以响应用户查询和输入应在事先定义。利用决策树和分支路径来高效处理用户输入和处理不同场景。
- en: Add ChatGPT
  id: totrans-800
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加ChatGPT
- en: Make your chatbot act more human by feeding it conversations and responses designed
    by ChatGPT. To make ChatGPT produce answers that make sense, you need to connect
    it to your chatbot platform and feed it the right questions and background information.
    Make the questions fit the personality of your business or the people you’re trying
    to reach.
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供由ChatGPT设计的对话和响应来使您的聊天机器人更具人性。为了使ChatGPT产生有意义的答案，您需要将其连接到您的聊天机器人平台，并提供正确的问题和背景信息。确保问题符合您业务或您试图接触的人的性格。
- en: Iterate and Test
  id: totrans-802
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 迭代和测试
- en: Make sure your chatbot works by testing it with real users. Find out what people
    think by collecting their feedback and looking at how they interact with the chatbot.
    Improving the chatbot’s functionality and usability can be achieved by incorporating
    user feedback into the conversation flow, prompts, and responses.
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 通过让真实用户测试您的聊天机器人来确保其正常工作。通过收集他们的反馈并观察他们如何与聊天机器人互动来了解人们的想法。通过将用户反馈纳入对话流程、提示和响应中，可以改善聊天机器人的功能性和可用性。
- en: Monetize Your Chatbot
  id: totrans-804
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天机器人盈利
- en: Make money without actively working on your chatbot by using monetization techniques.
    You could charge a monthly fee to access special features or content, provide
    sponsored content or promotions from partner brands, or add affiliate marketing
    links to make money from sales of associated products.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用盈利技术，在不积极工作于您的聊天机器人时赚钱。您可以收取月费以访问特殊功能或内容，提供来自合作伙伴品牌的赞助内容或促销活动，或添加联盟营销链接，从相关产品的销售中获得收入。
- en: Promote Your Chatbot
  id: totrans-806
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推广您的聊天机器人
- en: Get the word out about your chatbot to your intended users through all the right
    channels to increase engagement and user acquisition. Get the word out about your
    chatbot and attract users by using online advertising, social media, email, and
    content marketing. To promote the use and adoption of your chatbot, it is important
    to emphasize its advantages and value proposition.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 通过所有正确的渠道向目标用户宣传您的聊天机器人，以增加参与度和用户获取。通过在线广告、社交媒体、电子邮件和内容营销来宣传您的聊天机器人并吸引用户。为了推广您的聊天机器人的使用和采用，强调其优势和价值主张非常重要。
- en: Takeaway
  id: totrans-808
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 吸收要点
- en: Now that you know how to turn ChatGPT into a profitable source of income, the
    next step is to customize it. In Chapter 5, we will explore how to create an AI
    worker that is customized to your business’s or project’s needs. Learn the ins
    and outs of using AI to its maximum capacity to overcome obstacles, improve processes,
    and achieve your goals. On this thrilling next leg of your entrepreneurial journey,
    get ready to discover previously untapped potential in terms of productivity,
    creativity, and profit.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经知道如何将ChatGPT变成一个盈利的收入来源，下一步就是对其进行定制。在第5章中，我们将探讨如何创建一个符合您业务或项目需求的AI工作者。学习如何最大限度地利用AI克服障碍、改进流程和实现目标。在您创业旅程的这个激动人心的下一阶段，准备好发现生产率、创造力和利润方面的先前未开发的潜力。
- en: A Quick Note from Alec Rowe
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 来自亚历克·罗的简短笔记
- en: Hey there,
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 嘿，
- en: If you're finding value in this book, I’d really appreciate a quick favor. Your
    review can help others discover these strategies and support my work as an independent
    author.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您觉得这本书有价值，我会非常感激您的一个小小帮助。您的评论可以帮助他人发现这些策略，并支持我作为独立作者的工作。
- en: Just a few words from you on the platform you purchased this book from would
    mean a lot – it's a huge boost for a book like this and helps build our community.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 在您从该平台购买此书的地方留下几句话就意义重大——这对这类书籍来说是一个巨大的推动，并有助于构建我们的社区。
- en: And if you don’t have time for a review at the moment, for now, please just
    leave a star rating if you’ve found these pages helpful.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您目前没有时间进行评论，那么现在，如果您觉得这些页面有帮助，请留下一个星级评分。
- en: Thanks for your support and for being part of this journey!
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的支持和参与这段旅程！
- en: Best, Alec
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 最美好的祝愿，亚历克
