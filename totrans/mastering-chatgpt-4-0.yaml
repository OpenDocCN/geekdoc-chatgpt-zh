- en: Leveraging Third-Party Plugins and Extensions
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 利用第三方插件和扩展
- en: Enhance ChatGPT’s functionality by using third-party plugins and extensions.
    These tools can help automate tasks, improve accuracy, and add new features.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用第三方插件和扩展来增强ChatGPT的功能。这些工具可以帮助自动化任务，提高准确性，并添加新功能。
- en: 'Example: Use a grammar-checking plugin like “Grammarly” to polish ChatGPT’s
    drafts.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：使用像“Grammarly”这样的语法检查插件来润色ChatGPT的草稿。
