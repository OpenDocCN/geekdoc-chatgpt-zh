- en: Chapter 1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Why ChatGPT Advanced Voice Mode is the future
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Imagine this for a moment. It’s 2022\. It’s cold outside. The rain is falling
    against the window and pitter pattering on the pavement outside. The only light
    you can truly see is from your laptop screen. The white text on your screen speeds
    past your eyes at nearly dizzying speeds.
  prefs: []
  type: TYPE_NORMAL
- en: All you asked the AI to do was write an email the style of your favourite superhero.
    The next thing you know, you have paragraphs of text, as if written by the character
    itself.
  prefs: []
  type: TYPE_NORMAL
- en: That was me a few years ago with ChatGPT 3.0 Alpha. Before the world woke up
    to AI.
  prefs: []
  type: TYPE_NORMAL
- en: Suddenly that one employee from Google who was claiming “THE AI IS ALIVE!” didn’t
    seem so crazy. Especially when this AI was talking so naturally. And this was
    two years ago.
  prefs: []
  type: TYPE_NORMAL
- en: Now? We can have full blown conversations with our ChatGPT tool. Quite literally
    turning it into a companion if we so wish. The days of me having to text and type
    to ChatGPT are almost entirely in the past for when I want to have truly meaningful
    conversations.
  prefs: []
  type: TYPE_NORMAL
- en: Now, it’s likely that you’ve picked up this book and you clearly know what ChatGPT
    Advanced Voice mode is. It’s safe to say that if you’re looking into ChatGPT Advanced
    Voice mode then you’ve likely used ChatGPT before in its text form. Where you
    can message it, prompt it, and get decent outputs.
  prefs: []
  type: TYPE_NORMAL
- en: Well, I am here to tell you that Advanced Voice Mode prompt engineering is entirely
    different from your standard prompting type. Because now you’re not just taking
    into account what you type and prompt to ChatGPT. You’re also taking into account
    your own voice, the way you sound, and the little habits you have. Even trigger
    phrases.
  prefs: []
  type: TYPE_NORMAL
- en: The native version of ChatGPT Voice Mode within ChatGPT’s App is a taste of
    what’s possible with it. This guide won’t be getting into the Live API side of
    things because that’s far too excessive for a guide that’s designed to be personal
    and easy to understand. But if you think Siri or Google Assistant sounds good
    and useful, then ChatGPT Advanced Voice mode is far beyond that and a sign of
    things to come.
  prefs: []
  type: TYPE_NORMAL
- en: Now, don’t get me wrong, if you’ve used the new Google Voice Assistant feature,
    you’ll see that it’s come leaps and bounds from where it was only a year ago.
  prefs: []
  type: TYPE_NORMAL
- en: But that’s because Google understood where the market was going.
  prefs: []
  type: TYPE_NORMAL
- en: How many times have you said the phrase “Okay Google” or “Hey Alexa” or “Hey
    Siri”? Then asked a simple question?
  prefs: []
  type: TYPE_NORMAL
- en: For me, it’s countless.
  prefs: []
  type: TYPE_NORMAL
- en: To the point where I openly say “Okay Google” when I am working and make notes
    or get it to perform tasks for me. Including checking on store opening times,
    reading messages, giving me weather updates, and even reading my schedule.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced Voice mode will be that. But far more extreme. We’re talking ChatGPT
    Advanced Voice mode emulating a fully fluent Spanish speaking professional. That
    can teach you Spanish, with ease.
  prefs: []
  type: TYPE_NORMAL
- en: We’re talking a voice mode that can talk in multiple dialects. With no need
    to stick to just plain old common accents. We’re talking street-level authentic
    Bisaya. We’re talking roadman English. Gen-Z sarcastic American English. The limits
    are nearly endless because of Advanced Voice Mode’s ability to blend voices.
  prefs: []
  type: TYPE_NORMAL
- en: Not to mention the fact that it has a near infinite amount of information that
    it can either generate or amalgamate. Asking your new authentic patois AI bot
    for authentic Jamaican recipes? It can do that. But what if you wanted Jamaican
    recipes that had a Sci Fi twist from your favourite movie? Well it can do that
    too. Dishes that never existed up until ChatGPT more or less made them.
  prefs: []
  type: TYPE_NORMAL
- en: And, yes, ChatGPT Advanced Voice mode (the API) can be used to answer phone
    calls, reference existing business files, and give decent - and factual - resolutions
    to customer complaints 99% of the time. Honestly, unless a company discloses that
    you’re talking to AI, I doubt most people would even be able to tell.
  prefs: []
  type: TYPE_NORMAL
- en: There are just a few areas of basic possibility.
  prefs: []
  type: TYPE_NORMAL
- en: 'With Advanced Voice mode, you can get ChatGPT to be:'
  prefs: []
  type: TYPE_NORMAL
- en: -         Any historical figure
  prefs: []
  type: TYPE_NORMAL
- en: -         A professor on practically any subject
  prefs: []
  type: TYPE_NORMAL
- en: -         A consultant on any topic
  prefs: []
  type: TYPE_NORMAL
- en: -         The perfect brainstorm partner
  prefs: []
  type: TYPE_NORMAL
- en: -         A Mock Interview Holder
  prefs: []
  type: TYPE_NORMAL
- en: -         A Public Speaking Coach
  prefs: []
  type: TYPE_NORMAL
- en: -         A Workshop Consultant
  prefs: []
  type: TYPE_NORMAL
- en: -         A Learning Path Designer
  prefs: []
  type: TYPE_NORMAL
- en: -         A Client Relations Manager
  prefs: []
  type: TYPE_NORMAL
- en: -         A Friend
  prefs: []
  type: TYPE_NORMAL
- en: And nearly anything you can imagine.
  prefs: []
  type: TYPE_NORMAL
- en: All it takes is Prompting it correctly, but more importantly, thinking about
    it correctly.
  prefs: []
  type: TYPE_NORMAL
- en: And what makes it extremely powerful? You’re essentially talking to it. Just
    like a phone call. Just like you would talk to a friend.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let me talk to you and teach you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 2: An introduction to me and who you’re speaking with'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I’m Edward Morris. Or Edward Frank Morris, if you know me from LinkedIn.
  prefs: []
  type: TYPE_NORMAL
- en: Yeah, Frank’s my middle name - it’s not some branding gimmick, though a good
    friend-slash-branding-guru suggested I start using it because, let’s face it,
    “Edward Morris” isn’t exactly rare.
  prefs: []
  type: TYPE_NORMAL
- en: Pop “Edward Morris” into Google, and you’ll find Titanic passengers, a few authors,
    maybe a businessman or two, but you’d have to dig deep to find me.
  prefs: []
  type: TYPE_NORMAL
- en: And frankly, as necessary as it is for online presence, saying my full name
    out loud? A bit cringe.
  prefs: []
  type: TYPE_NORMAL
- en: Feels like introducing myself at a corporate retreat. But I digress.
  prefs: []
  type: TYPE_NORMAL
- en: The reason I’m telling you this isn’t to bore you with a name origin story -
    it’s because I want to start with where I came from before we dive into the big-ticket
    details.
  prefs: []
  type: TYPE_NORMAL
- en: Before the LinkedIn articles, before the press features, before anyone called
    me a “Prompt Engineer,” I was just a guy tinkering with AI prompts, fumbling around
    in the early days, trying to figure out what I could make it do.
  prefs: []
  type: TYPE_NORMAL
- en: No fanfare, no fancy job title, no instructional guide telling me what I was
    supposed to be doing.
  prefs: []
  type: TYPE_NORMAL
- en: It was just me and an interface and a stack of ideas waiting to be tested.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve always been intrigued by how things work, especially things that most people
    find intimidating or “technical.” I’m that person who actually reads the manual
    (or at least skims it), who finds joy in troubleshooting and fine-tuning, who
    gets a weird kick out of understanding the nitty-gritty of systems.
  prefs: []
  type: TYPE_NORMAL
- en: I was probably always meant to end up in tech, but Generative AI? That’s a whole
    different ball game. Because Generative AI doesn’t just function on rules and
    scripts; it functions on language, context, nuance - those tricky, slippery things
    that make us human.
  prefs: []
  type: TYPE_NORMAL
- en: I got my start in Prompt Engineering back in November 2022, long before the
    hype, before half the world had even heard of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Back then, AI was still just a curiosity for most people, a novelty.
  prefs: []
  type: TYPE_NORMAL
- en: But I saw something else - potential.
  prefs: []
  type: TYPE_NORMAL
- en: Not just in terms of automation or convenience but in terms of transformative
    power. I wanted to figure out how I could bend it, stretch it, make it do things
    that weren’t in the user manual.
  prefs: []
  type: TYPE_NORMAL
- en: From this point on, I’ll be using AI and Generative AI interchangeably.
  prefs: []
  type: TYPE_NORMAL
- en: My first real test run with ChatGPT was an AI chatbot I created on the very
    first day of having access.
  prefs: []
  type: TYPE_NORMAL
- en: It was modelled after a certain superhero (the kind who wears black, has an
    affinity for nocturnal animals, and lurks in shadows).
  prefs: []
  type: TYPE_NORMAL
- en: Legal reasons prevent me from dropping the actual name, but let’s just say it
    rhymed with “Catvan.” That day, I remember sitting in my home office, typing line
    after line, each prompt shaping the bot’s responses into something recognizably
    “him.”
  prefs: []
  type: TYPE_NORMAL
- en: By the time I finished, I’d built something with personality, tone, a voice
    that felt almost…authentic. And this was day one.
  prefs: []
  type: TYPE_NORMAL
- en: The realisation hit me hard—this wasn’t just programming; this was sculpting
    personalities out of thin air.
  prefs: []
  type: TYPE_NORMAL
- en: Back then, nobody was doing this. Chatbots were rigid, mechanical, stripped
    of character. But here I was, creating something that sounded a little like our
    dark knight, complete with the gritty, monosyllabic tone, a love for justice,
    and maybe even a little existential brooding.
  prefs: []
  type: TYPE_NORMAL
- en: I knew then that Prompt Engineering was going to be big - huge, even. Not even
    covering the actual tasks it can handle and do.
  prefs: []
  type: TYPE_NORMAL
- en: I knew I was standing on the brink of something I didn’t fully understand yet.
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t know it would become a career. I didn’t know companies would eventually
    seek out people like me, who could bridge the gap between what AI was and what
    it could become.
  prefs: []
  type: TYPE_NORMAL
- en: I just knew I’d found something intriguing, something that felt like uncharted
    territory.
  prefs: []
  type: TYPE_NORMAL
- en: And I wanted to explore every inch of it.
  prefs: []
  type: TYPE_NORMAL
- en: So here’s where the story gets…stranger. By February 2023, just a few months
    after my “Catvan” chatbot experiment, I’d crafted a prompt that would kick off
    a whole new chapter of my life.
  prefs: []
  type: TYPE_NORMAL
- en: I was experimenting with how far I could push ChatGPT to handle complex, real-world
    scenarios. I wanted it to do more than just spit out definitions or play language
    games.
  prefs: []
  type: TYPE_NORMAL
- en: I wanted it to analyse, empathise, diagnose. So I created a prompt designed
    to function like a virtual doctor, to answer questions about symptoms and possible
    conditions in layman’s terms, something that might reassure people while gently
    nudging them toward professional medical advice when necessary.
  prefs: []
  type: TYPE_NORMAL
- en: And want to know something crazy?
  prefs: []
  type: TYPE_NORMAL
- en: Elon Musk, as of the 1st of November 2024, only just caught on that you can
    do this. I was ahead of him by over a year.
  prefs: []
  type: TYPE_NORMAL
- en: That prompt ended up on the desks of a few companies out in California, and
    before I knew it, they were interested.
  prefs: []
  type: TYPE_NORMAL
- en: Here was this AI assistant that could, in a sense, understand people, could
    frame responses in a way that felt approachable. This wasn’t just “programming”
    anymore—this was almost like creating a personality that knew when to be assertive,
    when to be cautious, and when to show empathy.
  prefs: []
  type: TYPE_NORMAL
- en: And companies saw the potential immediately.
  prefs: []
  type: TYPE_NORMAL
- en: And that was just the beginning. My work started catching attention. Fast-forward
    a bit, and I found myself on the front page of the Financial Times, four pages
    dedicated to the story of how I used Prompt Engineering + Investing.
  prefs: []
  type: TYPE_NORMAL
- en: It was surreal, watching my experiments and tinkering get thrust into the spotlight,
    my name alongside the words “Prompt Engineering” as if this was some established
    field.
  prefs: []
  type: TYPE_NORMAL
- en: But really, I was just a guy who’d asked himself how far he could push this
    thing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Not long after, I was pulled into some of the biggest AI promotional campaigns
    around—Times Square, New York. My name up in flashing lights. On the NASDAQ Square.
    And right there in the middle, the world’s newest frontier: AI. Here was this
    bizarre twist in my story where my obscure obsession with prompts had become part
    of the public conversation, a new frontier that everyone from tech startups to
    media giants wanted in on. And somehow, I’d become part of that conversation.'
  prefs: []
  type: TYPE_NORMAL
- en: Then came Forbes. Not once, but multiple times. Suddenly, I was being profiled
    and interviewed, with publications wanting to know about my work in AI, my approaches,
    my thoughts on the field.
  prefs: []
  type: TYPE_NORMAL
- en: They wanted insight into how I’d taken a sandboxed AI tool and turned it into
    something that felt genuinely useful, powerful, and adaptable.
  prefs: []
  type: TYPE_NORMAL
- en: They wanted to know about the companies I’d helped, the tools I’d built, and
    the vision I had for what AI could be.
  prefs: []
  type: TYPE_NORMAL
- en: But, as surreal as those features and campaigns were, they weren’t my real accomplishments.
  prefs: []
  type: TYPE_NORMAL
- en: Those were just the neon signs lighting up the journey.
  prefs: []
  type: TYPE_NORMAL
- en: The real work happened in conference rooms, on Zoom calls, at coffee shop meetups
    with developers, and in small offices at Fortune 500 companies and charities alike.
  prefs: []
  type: TYPE_NORMAL
- en: I worked side-by-side with teams at OpenAI, Microsoft, and other industry titans,
    figuring out how to apply this technology in ways that actually mattered.
  prefs: []
  type: TYPE_NORMAL
- en: This was the work I cared about - the kind where AI wasn’t just a cool gimmick
    but an actual solution, where it helped people solve real problems.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve worked with massive corporations, yes, but I’ve also worked with small
    startups, nonprofits, and even charities that couldn’t afford the big-ticket solutions
    but wanted to use AI to make a difference.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve even worked with individuals one-on-one, guiding them through the world
    of AI, helping them understand how this strange new tool could fit into their
    lives or businesses.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve sat across from people with doubts in their eyes, only to see those doubts
    dissolve when they saw the possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: That’s what sets my experience apart from the “Prompt Engineer influencers”
    who throw around theories from behind a keyboard, but who’ve never put these ideas
    to work in a room full of people relying on AI to make decisions, improve operations,
    or, in some cases, even change lives.
  prefs: []
  type: TYPE_NORMAL
- en: Because for me, this isn’t theory or branding or the thrill of seeing my name
    in lights.
  prefs: []
  type: TYPE_NORMAL
- en: This is the real deal.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s talk. This isn’t your average manual, and if you’re reading this,
    I’m guessing you didn’t come here looking for an average experience.
  prefs: []
  type: TYPE_NORMAL
- en: You came here because you’re ready to do something different. Yes, of course,
    Advanced Voice Mode, but also to break past the limits of basic prompts, to take
    AI beyond question-and-answer interactions, and to unlock an entire new way of
    thinking about what’s possible.
  prefs: []
  type: TYPE_NORMAL
- en: This guide is the map, but it’s not a map of safe, well-trodden paths. It’s
    a blueprint for exploration.
  prefs: []
  type: TYPE_NORMAL
- en: See, what we’re doing here is Advanced Voice Mode.
  prefs: []
  type: TYPE_NORMAL
- en: And let’s make something clear right off the bat - this isn’t just another setting
    in ChatGPT. This is next-level interaction.
  prefs: []
  type: TYPE_NORMAL
- en: It’s talking to an AI that doesn’t just understand your words; it understands
    the way you say them. It picks up on tone, context, subtlety.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t typing a prompt and waiting for a block of text. It’s holding a conversation.
    It’s doing it in real-time.
  prefs: []
  type: TYPE_NORMAL
- en: We’re taking AI and dragging it into the territory of human speech, where intonation
    and inflection add layers of meaning that text alone can’t convey.
  prefs: []
  type: TYPE_NORMAL
- en: Now, why does that matter? Because voice isn’t just about convenience - it’s
    about depth.
  prefs: []
  type: TYPE_NORMAL
- en: When you use Advanced Voice Mode, you’re tapping into a layer of ChatGPT that’s
    closer to real human interaction than anything else.
  prefs: []
  type: TYPE_NORMAL
- en: You’re setting yourself up to have a conversation that flows like a natural
    back-and-forth.
  prefs: []
  type: TYPE_NORMAL
- en: You’re not just interacting with AI; you’re creating with it. You’re in the
    trenches with a partner that can respond, adjust, and evolve based on how you
    speak and what you need in the moment.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine for a moment that you’re brainstorming a new product idea. Instead of
    typing out detailed prompts, you’re talking, fast, letting the thoughts come out
    raw and unpolished.
  prefs: []
  type: TYPE_NORMAL
- en: And ChatGPT keeps up. It doesn’t wait for perfect syntax or fully formed ideas
    - it dives into the chaos with you.
  prefs: []
  type: TYPE_NORMAL
- en: It pulls out patterns, makes connections, even challenges you on assumptions
    you didn’t realise you were making.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like having a creative collaborator in the room, one that’s tireless, endlessly
    curious, and never out of ideas.
  prefs: []
  type: TYPE_NORMAL
- en: And that’s just the beginning. Because this guide isn’t just going to show you
    how to have conversations with ChatGPT - it’s going to show you how to strategize,
    to design prompts that drive results, and to make AI feel like a natural extension
    of your own thought process.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about leveraging Advanced Voice Mode to tap into ChatGPT’s potential as
    an empathic listener, a devil’s advocate, a researcher, and a creative co-pilot.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the part where things get really interesting.
  prefs: []
  type: TYPE_NORMAL
- en: This guide will give you the framework to mould ChatGPT’s responses to mirror
    your personality, align with your goals, and even reflect your quirks.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine creating a virtual assistant that knows your preferences so well it
    can anticipate your needs, one that knows when to ask questions and when to just
    listen, one that doesn’t sound like a bot but like a collaborator who gets you.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t about having a gimmicky AI friend. It’s about building a powerful
    tool that speaks your language.
  prefs: []
  type: TYPE_NORMAL
- en: We’re going to dig into prompt engineering techniques that turn ChatGPT from
    a passive responder into an active participant in your projects.
  prefs: []
  type: TYPE_NORMAL
- en: This is high-level command of an AI system. We’ll get into strategies that make
    ChatGPT adaptable, allowing it to shift roles based on what you need, from brainstorming
    buddy to devil’s advocate to empathetic sounding board.
  prefs: []
  type: TYPE_NORMAL
- en: You’re going to learn how to control tone, direction, and complexity of response
    - all with your voice. Or commands.
  prefs: []
  type: TYPE_NORMAL
- en: And let me tell you, the implications of this go way beyond the obvious. We’re
    talking about using ChatGPT to push boundaries, to question assumptions, to make
    connections that a text-based prompt would never evoke.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a relationship with AI that gets richer, more nuanced, and more valuable
    the longer you use it.
  prefs: []
  type: TYPE_NORMAL
- en: And as you master these techniques, you’ll realize that this isn’t just about
    making ChatGPT sound more human - it’s about enhancing your own creative and analytical
    abilities.
  prefs: []
  type: TYPE_NORMAL
- en: By the time you’re through with this guide, you’ll understand how to make ChatGPT
    more than just a tool.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll know how to transform it into a dynamic partner that brings out your
    best work, whether you’re writing, designing, strategizing, or solving complex
    problems.
  prefs: []
  type: TYPE_NORMAL
- en: This is about supercharging your abilities with AI, making ChatGPT a collaborator
    that knows when to challenge you, when to support you, and when to throw a little
    chaos into the mix just to see what emerges.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, let’s get one thing clear: This guide is not just a technical manual. It’s
    an invitation to step into a new kind of collaboration.'
  prefs: []
  type: TYPE_NORMAL
- en: I’m not claiming that this will be easy.
  prefs: []
  type: TYPE_NORMAL
- en: It is certainly not.
  prefs: []
  type: TYPE_NORMAL
- en: Many of you will not make it through the book.
  prefs: []
  type: TYPE_NORMAL
- en: Even less will master the things I say.
  prefs: []
  type: TYPE_NORMAL
- en: But to those dedicated few?
  prefs: []
  type: TYPE_NORMAL
- en: This book is a manifesto for those of you who want to push boundaries, who aren’t
    satisfied with what’s “good enough,” who know that AI can be more than a glorified
    calculator.
  prefs: []
  type: TYPE_NORMAL
- en: It can be a partner, a provocateur, and a limitless resource.
  prefs: []
  type: TYPE_NORMAL
- en: Get ready to step into Advanced Voice Mode - not just as a feature but as a
    philosophy, a new way of working that’s unpredictable, powerful, and genuinely
    exciting.
  prefs: []
  type: TYPE_NORMAL
- en: Because when you master this? You’re not just using ChatGPT - you’re harnessing
    it, shaping it, and taking it places nobody’s taken it before. This is the future
    of AI, and it starts with the words you say.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s get you plugged in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 3: Setting up Advanced Voice Mode like a Pro'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s get straight into it.
  prefs: []
  type: TYPE_NORMAL
- en: 'First things first: if you want to set up Advanced Voice Mode like a pro, you’ll
    need the ChatGPT app.'
  prefs: []
  type: TYPE_NORMAL
- en: This, obviously, isn’t negotiable.
  prefs: []
  type: TYPE_NORMAL
- en: This may change in the future, potentially after I write this.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let's start with a common misconception. You can't simply type a prompt,
    switch to Advanced Voice Mode, and expect ChatGPT to magically pick up where your
    text left off.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t work like that.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it like trying to have a conversation while switching languages mid-sentence.
    Confusing and not very effective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead, you’re going to need a secret weapon: Custom Instructions.'
  prefs: []
  type: TYPE_NORMAL
- en: Where to Find Them
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Go to Settings →  Personalization →  Customizations.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not buried in some obscure submenu, but it’s not glaringly obvious either.
    This is where the magic happens.
  prefs: []
  type: TYPE_NORMAL
- en: The Two Boxes (or, as I call them, the Brain and the Mouth)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you open Customizations, you’ll see two fields staring back at you like
    blank pages begging to be filled.
  prefs: []
  type: TYPE_NORMAL
- en: These boxes are more than just text fields-they’re the core of your voice setup.
  prefs: []
  type: TYPE_NORMAL
- en: Box 1 is the Brain.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is where you input context about the GPT. Who is it? What is it meant to
    be doing? What role is it? What action? This is the box where you pour in the
    details of how ChatGPT should think, act, and prioritise its responses. Think
    of it as a set of marching orders. The more precise you are here, the more human
    (and useful) your interactions will feel. But do not go overboard. Simple is best
    here.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Box 2 is the Mouth.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, this one is all about delivery. How should ChatGPT sound? Should it speak
    with enthusiasm like a motivational speaker, or with calm reassurance like a therapist?
    Should it lean into humour or stick to the facts? Here’s where you can even specify
    things like speaking pace or inflection. Or even accent and language. Basically,
    this is where you tell ChatGPT exactly how to articulate every single word.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Pause for a moment and let that sink in.
  prefs: []
  type: TYPE_NORMAL
- en: You’re going to need to plan these out.
  prefs: []
  type: TYPE_NORMAL
- en: The main point of the “Brain” box is so that ChatGPT can act with a specific
    task in mind.
  prefs: []
  type: TYPE_NORMAL
- en: That can be anything from a Brainstorming Partner to a Therapist.
  prefs: []
  type: TYPE_NORMAL
- en: You have to choose and you have to be specific.
  prefs: []
  type: TYPE_NORMAL
- en: Think of These Boxes as the Yin and Yang of Your Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Without the Brain, the Mouth just rambles without focus. Without the Mouth,
    the Brain’s insights get lost in dull, robotic delivery. You need both to get
    the full effect.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pro Tip: Tweak, Test, Tweak Again'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Don’t expect perfection on the first go. Your initial settings are just a starting
    point. Try it out in a few different situations: ask it to explain a complex concept,
    narrate a funny story, or guide you through a meditation. See how it performs,
    and then go back to fine-tune the details. This is where words matter. Think emotions,
    inflections, personality, speed of speech, pitch, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: Seriously, don’t skip this step.
  prefs: []
  type: TYPE_NORMAL
- en: Real-World Example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Say you want ChatGPT to sound like a seasoned coach for your business calls-confident,
    direct, but also personable. In Box 1, you’d provide details about your business
    style, how you like to address problems, and any industry jargon that might come
    up. In Box 2, you’d specify a tone that’s authoritative but friendly, with a moderate
    pace that conveys expertise without rushing.
  prefs: []
  type: TYPE_NORMAL
- en: Now you’re not just talking to an AI. You’re having a real conversation with
    a virtual consultant who knows exactly how you like to get things done.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve filled the Brain and Mouth, It's Time to Test
  prefs: []
  type: TYPE_NORMAL
- en: You’ve done the hard part. Configuring the Brain and Mouth. Now, it’s time to
    see if this digital conversationalist can walk the talk.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Load Up ChatGPT-4o'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Fire up the latest iteration of ChatGPT 4o. You’ll want the newest version to
    make the most of the Advanced Voice Mode feature. If you’re new to this, you’re
    probably wondering, Where exactly is this Advanced Voice Mode hiding?
  prefs: []
  type: TYPE_NORMAL
- en: Don’t worry, it’s not buried under layers of menus or anything cryptic. Just
    look for the button to the right of the chat input box.
  prefs: []
  type: TYPE_NORMAL
- en: Yep, that’s your gateway to unleashing ChatGPT's voice capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: The button is right here - and it should look the same as mine.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc2C4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: That button with the wave thing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pro Tip: If you can’t find the button, make sure your app is up to date.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Advanced Voice Mode Activation'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you tap that button, you’ll see a connecting screen, followed by a blue
    circle pulsating like a heartbeat. The first time you see it, it feels almost
    as if ChatGPT is... alive, waiting for you to speak.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc2C5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: It should look a lot like this. This blue bubble means that you’re connected.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Say "Hello?" Like You''re Answering a Phone Call'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Yes, really. Just say, “Hello?”
  prefs: []
  type: TYPE_NORMAL
- en: It might feel odd at first, talking to an AI as if you're on a call. But trust
    me, treat it like a normal conversation, and you’ll notice the responses feel
    more fluid, more natural. It's a small mental shift with a big impact.
  prefs: []
  type: TYPE_NORMAL
- en: After your greeting, ChatGPT will spring to life, responding just as if you
    were on the line with a real person.
  prefs: []
  type: TYPE_NORMAL
- en: This is where the magic of your Custom Instructions really kicks in.
  prefs: []
  type: TYPE_NORMAL
- en: The Brain and Mouth configuration you’ve carefully set up will come to life.
    ChatGPT will not only respond to what you say, but also sound exactly how you
    envisioned it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pro Tip: Verify Your Customization'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To ensure your Custom Instructions are in play, ask ChatGPT to read back its
    Custom Instructions to you.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a simple trick that’ll confirm whether the configurations are active and
    running as intended. If it can accurately recite the instructions you set - or
    at least give you an overview - you’re good to go.
  prefs: []
  type: TYPE_NORMAL
- en: If not, hang up, load a fresh ChatGPT Chat session and then re-connect.
  prefs: []
  type: TYPE_NORMAL
- en: Now You're Ready
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the Advanced Voice Mode and Custom Instructions fully integrated, you’re
    not just using and calling the AI. You’re engaging in a tailored, voice-activated
    experience that feels unique to you.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you're practising a speech, troubleshooting an issue, or just chatting
    for fun, you've now got a virtual companion that thinks and talks the way you
    want it to.
  prefs: []
  type: TYPE_NORMAL
- en: Start experimenting. Ask it to narrate a story, explain a technical concept,
    or just have a casual chat. You'll find that each interaction gets smoother as
    the system learns your style.
  prefs: []
  type: TYPE_NORMAL
- en: Tailor it to your own needs and let the conversation flow.
  prefs: []
  type: TYPE_NORMAL
- en: You now know more than a majority of people on how to use ChatGPT Advanced Voice
    mode - and make presets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pro Tip: Sort of goes without saying, but, choose a voice that fits. If you
    want a female voice, choose a female voice. Otherwise if your Prompt says “You
    have an effeminate voice”, yet you choose a gruff male voice, it won’t sound right.
    To change the voice, go to Settings > Voice > Tap Voice > Pick a Character that
    matches. I personally like Arbor with a British Accent.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 4: Mastering voice commands without repeating yourself'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So, you’ve got the Brain and Mouth configured. Now it’s time to elevate your
    interaction and really take advantage of Advanced Voice Mode.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what you need to know.
  prefs: []
  type: TYPE_NORMAL
- en: Talking to ChatGPT vocally is different from just typing commands. You’re now
    in the driver’s seat of a far more dynamic conversation, one where you don’t have
    to constantly repeat yourself or start from scratch with every request.
  prefs: []
  type: TYPE_NORMAL
- en: The Brain is Always Listening
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Remember, the Brain of Advanced Voice Mode is there to constantly refer back
    to the instructions you’ve set. It’s like ChatGPT’s mental sticky note - always
    present, always guiding how it responds. This makes voice commands feel seamless.
    You’re no longer just barking orders and hoping the AI catches on. Instead, you’re
    in a flowing dialogue, where every new command layers on top of the existing instructions.
  prefs: []
  type: TYPE_NORMAL
- en: The Default Setting for Voice Mode
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here’s the best part. The Brain is the default for Advanced Voice Mode. What
    does that mean? It means that no matter what adjustments you make mid-conversation,
    ChatGPT will always refer back to the custom settings you’ve established.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve set ChatGPT to speak in an Australian accent in your Custom Instructions,
    but during the conversation you ask it to speed up, it’s not going to abandon
    the accent just because you added a new command.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT will instead combine both, speaking faster and maintaining that Australian
    twang you set from the beginning.
  prefs: []
  type: TYPE_NORMAL
- en: It’s like a recipe. You don’t throw out the flour just because you decided to
    add some sugar.
  prefs: []
  type: TYPE_NORMAL
- en: Balancing Immediate Needs with Core Purpose
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is where Advanced Voice Mode really shines. You don’t have to worry about
    losing context. When you ask it to make adjustments - whether it's tone, speed,
    or phrasing - ChatGPT doesn’t reset itself. It understands that its core purpose
    (those settings in the Brain) stays in place, while also adapting to whatever
    new request you throw at it.
  prefs: []
  type: TYPE_NORMAL
- en: So, when you say something like, “Hey ChatGPT, slow down a bit,” it will adjust
    the speed while still maintaining the personality and tone you've defined in the
    Custom Instructions.
  prefs: []
  type: TYPE_NORMAL
- en: In short, you’re not replacing instructions-you’re refining them. Each voice
    command builds on what came before.
  prefs: []
  type: TYPE_NORMAL
- en: Blunt Commands Are Necessary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There will be times when you’ll need to interrupt ChatGPT mid-sentence and just
    say, “No, no, no, I want it like this.” That’s how you steer the conversation
    to get exactly what you’re looking for.
  prefs: []
  type: TYPE_NORMAL
- en: Whether it’s the tone, the pace, or even the message itself, you’ll find that
    being blunt is often the fastest way to get ChatGPT to adjust on the fly.
  prefs: []
  type: TYPE_NORMAL
- en: 'Maybe the response isn’t quite there yet. It’s a little too robotic, or maybe
    it’s not empathetic enough. You’ll need to tell it straight up: “Be more empathetic,”
    or “I need that to sound more realistic.”'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t be shy about it. Advanced Voice Mode thrives on these immediate corrections.
  prefs: []
  type: TYPE_NORMAL
- en: It Feels Weird at First
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I know. It’s going to feel uncomfortable at first. Saying commands out loud,
    especially blunt ones, goes against a lot of what we’ve been taught about communication.
    We’re so conditioned to treat human conversations with respect, patience, and
    a touch of politeness.
  prefs: []
  type: TYPE_NORMAL
- en: So, when you start barking orders at an AI, it feels a bit unnatural.
  prefs: []
  type: TYPE_NORMAL
- en: You might even catch yourself thinking, Am I really talking to a machine like
    this?
  prefs: []
  type: TYPE_NORMAL
- en: But here’s the truth. It’s okay to feel weird about it.
  prefs: []
  type: TYPE_NORMAL
- en: The discomfort is part of the learning curve. You’re transitioning from written
    commands to spoken instructions, and yes, it’s going to feel like you're being
    rude at times. That’s normal.
  prefs: []
  type: TYPE_NORMAL
- en: The Balance Between Directness and Respect
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, don’t get me wrong - you should still treat ChatGPT with respect. Just
    because it’s a machine doesn’t mean you should develop the bad habit of barking
    orders like you’re in charge of a robot army.
  prefs: []
  type: TYPE_NORMAL
- en: You’re building a new habit, one where directness and clarity are key. But there’s
    no need to be harsh.
  prefs: []
  type: TYPE_NORMAL
- en: Speak clearly, be concise, and make sure ChatGPT knows exactly what you want.
    That’s the sweet spot.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a balancing act. You’ll need to get comfortable with being blunt when needed,
    but don’t let it turn into a habit of being overly demanding.
  prefs: []
  type: TYPE_NORMAL
- en: The way you interact and communicate with ChatGPT absolutely will rub off on
    how you communicate with people in person.
  prefs: []
  type: TYPE_NORMAL
- en: Think of ChatGPT as a digital assistant that deserves some courtesy too - after
    all, the better you treat it, the better it performs for you.
  prefs: []
  type: TYPE_NORMAL
- en: Breaking Through the Awkwardness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So yes, you do have to get used to being a bit more direct, a bit more commanding
    than you’re probably used to. But remember, the more you practise, the less uncomfortable
    it will feel.
  prefs: []
  type: TYPE_NORMAL
- en: Soon enough, you’ll find that giving ChatGPT quick, to-the-point voice commands
    becomes second nature. And that’s when you’ll truly start unlocking the potential
    of Advanced Voice Mode-by mastering the balance between being assertive and respectful.
  prefs: []
  type: TYPE_NORMAL
