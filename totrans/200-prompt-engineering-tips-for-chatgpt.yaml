    Ethical Considerations](#xhtml-0-202.xhtml#aid_384)Chapter 1: Be SpecificIn the
    realm of prompt engineering for ChatGPT, specificity stands as a cornerstone for
    obtaining high-quality and relevant responses. Being specific in your prompts
    ensures that the AI understands exactly what you are asking for, reducing ambiguity
    and increasing the accuracy of the information provided. Let''s explore why specificity
    is crucial and how to achieve it effectively.Why Specificity Matters'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'Clarity: Specific prompts eliminate vague interpretations. When you clearly
    state your request, the AI can focus on delivering a precise answer rather than
    trying to guess your intentions.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：具体的提示消除了含糊的解释。当你清楚地说明你的请求时，AI可以专注于提供精确的答案，而不是试图猜测你的意图。
- en: 'Relevance: A specific prompt narrows down the possible responses, ensuring
    the AI provides information that is directly pertinent to your query.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：具体的提示缩小了可能的回答范围，确保AI提供与你的查询直接相关的信息。
- en: 'Efficiency: Specificity saves time by reducing the need for follow-up questions
    and clarifications, allowing you to get the information you need quickly and accurately.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：精确性通过减少后续问题和澄清的需要来节省时间，让你能够快速准确地获取所需信息。
- en: 'Depth: Detailed prompts encourage comprehensive answers, providing deeper insights
    and more valuable information.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的提示鼓励全面的回答，提供更深入的见解和更有价值的信息。
- en: 'How to Be SpecificTo craft specific prompts, consider the following strategies:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如何具体化：要制定具体的提示，考虑以下策略：
- en: 'Identify Key Elements: Determine the essential components of your question
    or request. Focus on who, what, when, where, why, and how to ensure all relevant
    aspects are covered.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定关键要素：确定你问题或请求的基本组成部分。关注谁、什么、何时、何地、为什么以及如何，以确保涵盖所有相关方面。
- en: 'Provide Context: Include background information or context that can help the
    AI understand the framework of your question. This can involve setting the scene,
    explaining the problem, or describing the scenario in detail.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括有助于AI理解你问题框架的背景信息或上下文。这可能涉及设置场景、解释问题或详细描述情景。
- en: 'Use Precise Language: Avoid vague or general terms. Instead, use precise and
    descriptive language to convey your message clearly.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用精确的语言：避免含糊或一般性的术语。相反，使用精确和描述性的语言来清楚地传达你的信息。
- en: 'Define Scope: Specify the scope of the information you are seeking. Are you
    looking for a brief overview, a detailed analysis, or a step-by-step guide? Defining
    the scope helps the AI tailor its response accordingly.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义范围：指定你寻求信息的范围。你是想获取简短的概述、详细的分析，还是逐步指南？定义范围有助于AI相应地调整其回答。
- en: 'Include Examples: If applicable, provide examples to illustrate your point.
    Examples can clarify complex concepts and guide the AI in generating a more accurate
    response.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含示例：如果适用，提供示例来说明你的观点。示例可以阐明复杂的概念，并指导AI生成更准确的回答。
- en: Examples of Specific Prompts
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 具体提示的示例
- en: 'General Prompt: "Tell me about World War II." Specific Prompt: "Provide a summary
    of the key events that led to the outbreak of World War II in Europe."'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："告诉我关于第二次世界大战的事情。" 具体提示："提供导致欧洲第二次世界大战爆发的主要事件的概述。"
- en: 'General Prompt: "How does a car engine work?" Specific Prompt: "Explain the
    working principle of a four-stroke internal combustion engine, including the roles
    of the intake, compression, power, and exhaust strokes."'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："汽车发动机是如何工作的？" 具体提示："解释四冲程内燃机的工作原理，包括进气、压缩、动力和排气冲程的作用。"
- en: 'General Prompt: "What are the benefits of exercise?" Specific Prompt: "Describe
    the cardiovascular and mental health benefits of regular aerobic exercise, such
    as running or cycling."'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："锻炼有什么好处？" 具体提示："描述定期进行有氧运动（如跑步或骑自行车）的心血管和心理健康益处。"
- en: Common Pitfalls to Avoid
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Questions: Asking broad questions can lead to equally broad and
    unfocused answers. Narrow your questions to get more detailed and useful information.'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出宽泛的问题可能导致同样宽泛且不集中的答案。缩小你的问题范围，以获得更详细和有用的信息。
- en: 'Assuming AI Knows Your Intent: Never assume that the AI understands your intent
    without clear instructions. Explicitly state what you are looking for to avoid
    misunderstandings.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设AI知道你的意图：永远不要在没有明确指令的情况下假设AI理解你的意图。明确地说明你想要什么，以避免误解。
- en: 'Lack of Context: Providing insufficient context can confuse the AI. Always
    include enough background information to frame your question properly.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：提供不足的上下文可能会使AI困惑。始终包括足够的信息来正确地构建你的问题。
- en: ConclusionBeing specific in your prompts is a fundamental aspect of effective
    prompt engineering. It ensures clarity, relevance, and efficiency in the responses
    you receive from ChatGPT. By identifying key elements, providing context, using
    precise language, defining the scope, and including examples, you can craft specific
    prompts that yield accurate and valuable answers. Remember to avoid common pitfalls,
    such as overly broad questions and lack of context, to maximize the effectiveness
    of your prompts.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示工程中，明确你的提示是一个基本要素。这确保了你从ChatGPT收到的回答清晰、相关且高效。通过识别关键要素、提供背景、使用精确语言、定义范围和包括例子，你可以构建具体的提示，从而获得准确和有价值的答案。记住，为了避免常见的陷阱，如过于宽泛的问题和缺乏背景，以最大限度地提高你提示的有效性。
- en: '* * *'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 2: Use Direct QuestionsIn the art of prompt engineering, the use of
    direct questions is essential for obtaining clear and concise answers from ChatGPT.
    Direct questions cut through ambiguity and guide the AI towards providing the
    specific information you need. This chapter will delve into why direct questions
    are important and how to formulate them effectively.Importance of Direct Questions'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：使用直接提问在提示工程的艺术中，使用直接提问对于从ChatGPT获得清晰简洁的答案至关重要。直接提问可以消除歧义，并引导AI提供你所需要的具体信息。本章将深入探讨为什么直接提问很重要以及如何有效地构建它们。
- en: 'Clarity: Direct questions leave little room for misinterpretation. By clearly
    stating what you want to know, you ensure that the AI understands your query.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：直接提问几乎不会产生误解。通过清楚地说明你想要了解的内容，你确保AI理解你的查询。
- en: 'Precision: Direct questions are inherently precise, focusing on a specific
    aspect of a topic. This precision helps the AI deliver more targeted and accurate
    responses.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：直接问题本质上是精确的，专注于主题的特定方面。这种精确性有助于AI提供更针对性和准确的回答。
- en: 'Efficiency: Asking direct questions streamlines the interaction process. You
    are more likely to get the desired information in the first response, reducing
    the need for follow-up questions.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：直接提问可以简化交互过程。你更有可能在第一次回答中就获得所需信息，从而减少后续提问的需求。
- en: 'Relevance: Direct questions help filter out unnecessary information, ensuring
    that the AI’s response is relevant to your query.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 直接提问的重要性
- en: 'How to Formulate Direct QuestionsTo craft direct questions effectively, consider
    the following tips:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如何构建直接提问为了有效地构建直接提问，考虑以下建议：
- en: 'Identify Your Objective: Determine the specific information you need. What
    is the main purpose of your question? Knowing your objective helps you frame the
    question clearly.'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定你的目标：确定你需要的具体信息。你提问的主要目的是什么？了解你的目标有助于你清晰地构建问题。
- en: 'Be Concise: Keep your questions short and to the point. Avoid adding extraneous
    details that might confuse the AI.'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简洁明了：保持你的问题简短且直接。避免添加可能使AI混淆的额外细节。
- en: 'Use Simple Language: Use straightforward language and avoid complex sentence
    structures. Simple language ensures that the AI easily grasps your query.'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用简单语言：使用直接的语言，避免复杂的句子结构。简单语言确保AI容易理解你的查询。
- en: 'Avoid Multiple Questions: Focus on one question at a time. Multiple questions
    within a single prompt can lead to fragmented or incomplete answers.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免多个问题：一次关注一个问题。单个提示中的多个问题可能导致答案碎片化或不完整。
- en: 'Specify the Type of Answer: If you need a particular type of answer (e.g.,
    a definition, a list, an explanation), specify this in your question.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确回答类型：如果你需要特定类型的答案（例如，定义、列表、解释），请在你的问题中明确指出。
- en: Examples of Direct Questions
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 直接提问的例子
- en: 'General Question: "Can you tell me about photosynthesis?" Direct Question:
    "What is the process of photosynthesis in plants?"'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般性问题：“你能告诉我关于光合作用吗？”直接问题：“植物光合作用的过程是什么？”
- en: 'General Question: "What are the benefits of meditation?" Direct Question: "How
    does meditation improve mental health?"'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般性问题：“冥想有什么好处？”直接问题：“冥想如何改善心理健康？”
- en: 'General Question: "Explain the causes of World War I." Direct Question: "What
    were the main causes of World War I?"'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般性问题：“解释第一次世界大战的原因。”直接问题：“第一次世界大战的主要原因是什么？”
- en: Common Pitfalls to Avoid
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Questions: Avoid questions that are too broad or vague. Specificity is
    key to getting precise answers.'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊问题：避免过于宽泛或模糊的问题。具体性是获得精确答案的关键。
- en: 'Overly Complex Questions: Complex questions with multiple parts can confuse
    the AI. Break them down into simpler, single-part questions.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Assuming Prior Knowledge: Do not assume the AI has prior knowledge of previous
    interactions. Each question should be self-contained and clear.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ConclusionUsing direct questions is a vital strategy in prompt engineering.
    Direct questions enhance clarity, precision, efficiency, and relevance, making
    it easier to obtain accurate and useful information from ChatGPT. By identifying
    your objective, being concise, using simple language, focusing on one question
    at a time, and specifying the type of answer you need, you can craft direct questions
    that yield high-quality responses. Avoiding vague and overly complex questions
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 3: Context MattersIn the realm of prompt engineering, context plays
    a crucial role in shaping the responses you receive from ChatGPT. Providing adequate
    context ensures that the AI understands the background and framework of your query,
    leading to more accurate and relevant answers. This chapter will explore the significance
    of context and how to incorporate it effectively into your prompts.Importance
    of Context'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'Understanding: Context helps the AI understand the nuances and specifics of
    your query. It provides the necessary background information for accurate interpretation.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Relevance: By framing your question within a specific context, you ensure that
    the AI’s response is relevant and tailored to your needs.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Depth: Context allows the AI to provide more comprehensive and in-depth answers,
    as it has a clearer picture of the scenario or topic.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Avoiding Ambiguity: Providing context reduces the chances of ambiguous or misinterpreted
    responses, leading to more precise answers.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'How to Provide ContextTo effectively provide context in your prompts, consider
    the following strategies:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Set the Scene: Describe the situation, background, or scenario related to your
    question. This can include relevant events, conditions, or settings.'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Include Key Details: Mention important details that are essential for understanding
    the query. These details can be historical, technical, or situational.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Define Terms: Clarify any specific terms or jargon that are part of your question.
    This ensures that the AI accurately understands and responds to the query.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Specify Relationships: Explain any relationships between different elements
    in your question. This helps the AI grasp the connections and dependencies.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Provide Examples: Use examples to illustrate the context. Examples can clarify
    complex scenarios and guide the AI in generating accurate responses.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples of Contextual Prompts
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: 'General Prompt: "Explain the causes of climate change." Contextual Prompt:
    "Explain the causes of climate change, focusing on the industrial revolution and
    the increase in greenhouse gas emissions."'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "Describe the impact of World War II." Contextual Prompt: "Describe
    the impact of World War II on European economies in the decade following the war."'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述第二次世界大战的影响。”上下文提示：“描述第二次世界大战对战后十年欧洲经济的影响。”
- en: 'General Prompt: "What are the benefits of a balanced diet?" Contextual Prompt:
    "What are the benefits of a balanced diet for a middle-aged individual with a
    sedentary lifestyle?"'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“均衡饮食的好处是什么？”上下文提示：“对于一个有久坐生活方式的中年人来说，均衡饮食的好处是什么？”
- en: Common Pitfalls to Avoid
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Lack of Context: Avoid asking questions without providing sufficient background
    information. Lack of context can lead to irrelevant or incomplete answers.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：避免在没有提供足够背景信息的情况下提问。缺乏上下文可能导致无关或不完整的答案。
- en: 'Overloading with Details: While context is important, providing too many details
    can overwhelm the AI. Strike a balance by including only the most relevant information.'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度详细：虽然上下文很重要，但提供过多细节可能会使AI感到不知所措。通过仅包含最相关信息来保持平衡。
- en: 'Assuming Prior Knowledge: Do not assume the AI remembers past interactions.
    Each prompt should include all necessary context for a standalone understanding.'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设先验知识：不要假设AI记得过去的互动。每个提示都应包含所有必要的上下文，以便独立理解。
- en: ConclusionContext matters significantly in prompt engineering, as it enhances
    the AI’s ability to understand, interpret, and respond accurately to your queries.
    By setting the scene, including key details, defining terms, specifying relationships,
    and providing examples, you can craft prompts that offer adequate context for
    precise and relevant answers. Avoiding pitfalls such as lack of context, overloading
    with details, and assuming prior knowledge will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 4: Set the RoleWhen interacting with ChatGPT, defining the role of
    the AI can significantly enhance the relevance and quality of the responses. Setting
    the role helps the AI tailor its answers to fit the specific perspective, expertise,
    or tone you require. This chapter will discuss the importance of setting the role
    and how to effectively incorporate it into your prompts.Importance of Setting
    the Role'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：设定角色在与ChatGPT互动时，定义AI的角色可以显著提高回复的相关性和质量。设定角色有助于AI根据您所需的具体视角、专业知识或语气调整其答案。本章将讨论设定角色的重要性以及如何有效地将其融入您的提示中。设定角色的重要性
- en: 'Tailored Responses: Defining the role helps the AI provide responses that are
    aligned with the specific perspective or expertise you need.'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制化回复：明确角色定义有助于AI提供与您所需的具体视角或专业知识相一致的回复。
- en: 'Consistency: Setting the role ensures consistency in the tone and style of
    the responses, making them more coherent and appropriate for the context.'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一致性：设定角色确保了回复的语气和风格的一致性，使它们更加连贯且适合上下文。
- en: 'Expertise: Specifying a role can prompt the AI to generate answers that reflect
    a higher level of expertise or specialized knowledge.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专业知识：指定一个角色可以提示AI生成反映更高层次专业知识或专门知识的答案。
- en: 'Engagement: Role-playing can make interactions more engaging and dynamic, particularly
    for educational or interactive scenarios.'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：角色扮演可以使互动更加有趣和动态，尤其是在教育或互动场景中。
- en: 'How to Set the RoleTo effectively set the role in your prompts, consider the
    following strategies:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如何设定角色为了在提示中有效地设定角色，请考虑以下策略：
- en: 'Define the Role Explicitly: Clearly state the role you want the AI to assume
    at the beginning of your prompt.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确定义角色：在您的提示中明确指出您希望AI承担的角色。
- en: 'Provide Role-Specific Instructions: Include any specific instructions or guidelines
    related to the role to ensure the AI understands how to approach the response.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供角色特定的指令：包括与角色相关的任何特定指令或指南，以确保AI理解如何处理回复。
- en: 'Use Role-Appropriate Language: Craft your prompt using language that matches
    the tone and style appropriate for the defined role.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用适合角色的语言：使用与定义的角色相匹配的语气和风格来构建您的提示。
- en: 'Specify the Perspective: Indicate the perspective from which the AI should
    respond, such as a professional, a layperson, an educator, etc.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定视角：指出AI应从哪个视角进行回复，例如专业人士、普通民众、教育工作者等。
- en: 'Reinforce the Role: If the conversation continues, periodically reinforce the
    role to maintain consistency.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 强化角色：如果对话继续进行，定期强化角色以保持一致性。
- en: Examples of Setting the Role
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 设置角色的示例
- en: 'General Prompt: "Explain the benefits of exercise." Role-Specific Prompt: "As
    a fitness coach, explain the benefits of exercise to someone who is new to working
    out."'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释锻炼的好处。”角色特定提示：“作为一名健身教练，向一个刚开始锻炼的人解释锻炼的好处。”
- en: 'General Prompt: "Describe the significance of the Renaissance." Role-Specific
    Prompt: "As a history professor, describe the significance of the Renaissance
    to a group of high school students."'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述文艺复兴的意义。”角色特定提示：“作为一名历史教授，向一群高中生描述文艺复兴的意义。”
- en: 'General Prompt: "What are the key features of Python programming?" Role-Specific
    Prompt: "As a software engineer, explain the key features of Python programming
    to a beginner who wants to learn coding."'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“Python编程的关键特性是什么？”角色特定提示：“作为一名软件工程师，向一个想学习编程的新手解释Python编程的关键特性。”
- en: Common Pitfalls to Avoid
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Role Definitions: Avoid vague or ambiguous role definitions. Clearly
    state the role and any specific guidelines to ensure accurate responses.'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色定义模糊：避免模糊或含糊不清的角色定义。清楚地说明角色和任何具体指南，以确保准确回答。
- en: 'Inconsistent Roles: Switching roles frequently within a conversation can lead
    to inconsistent responses. Maintain a consistent role throughout the interaction.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色不一致：在对话中频繁切换角色可能导致回答不一致。在整个互动过程中保持一致的角色。
- en: 'Overloading with Role Instructions: While it''s important to define the role,
    providing too many instructions can overwhelm the AI. Keep the role definition
    clear and concise.'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色指令过载：虽然定义角色很重要，但提供过多的指令可能会使AI感到不知所措。保持角色定义清晰简洁。
- en: ConclusionSetting the role in your prompts is a powerful technique in prompt
    engineering. It helps the AI provide tailored, consistent, and expertise-driven
    responses, enhancing the relevance and quality of the interaction. By defining
    the role explicitly, providing role-specific instructions, using appropriate language,
    specifying the perspective, and reinforcing the role, you can craft prompts that
    effectively guide the AI in assuming the desired role. Avoiding pitfalls such
    as vague role definitions, inconsistent roles, and overloading with instructions
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中设置角色是提示工程中的一个强大技术。它有助于AI提供定制、一致和专业知识驱动的回答，提高互动的相关性和质量。通过明确定义角色，提供角色特定指令，使用适当的语言，指定视角，并强化角色，你可以构建出能够有效引导AI承担期望角色的提示。避免诸如角色定义模糊、角色不一致和指令过载等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 5: Be ConciseConciseness is a key principle in prompt engineering that
    directly impacts the clarity and efficiency of your interactions with ChatGPT.
    Being concise means expressing your queries or instructions in a clear and straightforward
    manner, without unnecessary words or complexity. This chapter will explore the
    importance of conciseness and how to achieve it effectively in your prompts.Importance
    of Conciseness'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 第5章：简洁简洁是提示工程中的一个关键原则，它直接影响你与ChatGPT互动的清晰度和效率。简洁意味着以清晰直接的方式表达你的查询或指令，避免不必要的词语或复杂性。本章将探讨简洁的重要性以及如何在提示中有效地实现它。简洁的重要性
- en: 'Clarity: Concise prompts eliminate ambiguity, making it easier for the AI to
    understand and respond accurately.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简洁的提示消除了歧义，使AI更容易理解和准确回答。
- en: 'Efficiency: Short and to-the-point prompts save time by reducing the need for
    follow-up questions and clarifications.'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：简短而直接的提示通过减少后续问题和澄清的需要来节省时间。
- en: 'Focus: Conciseness helps maintain focus on the core question or task, ensuring
    that the response is relevant and targeted.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注：简洁有助于保持对核心问题或任务的专注，确保回答相关且具有针对性。
- en: 'Readability: Clear and concise prompts are easier to read and comprehend, both
    for the AI and for humans reviewing the interaction.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可读性：清晰简洁的提示更容易阅读和理解，无论是对于AI还是对于审查互动的人类。
- en: 'How to Be ConciseTo craft concise prompts, consider the following strategies:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如何做到简洁为了构建简洁的提示，考虑以下策略：
- en: 'Identify the Core Question: Determine the main question or task you need to
    address. Focus on this core element and eliminate any extraneous details.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定核心问题：确定你需要解决的主要问题或任务。专注于这个核心要素，并消除任何无关的细节。
- en: 'Use Simple Language: Opt for straightforward and simple language. Avoid jargon
    or complex terminology unless absolutely necessary.'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用简单语言：选择直接和简单的语言。除非绝对必要，否则避免使用行话或复杂术语。
- en: 'Eliminate Redundancies: Remove redundant words or phrases that do not add value
    to your prompt.'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 消除冗余：删除不增加提示价值的冗余词语或短语。
- en: 'Focus on Key Points: Highlight the key points or requirements of your query.
    Ensure that each word serves a purpose.'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关注要点：突出查询的关键点或要求。确保每个词都有其作用。
- en: 'Review and Edit: After drafting your prompt, review it for conciseness. Edit
    out any unnecessary words or details.'
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查和编辑：在起草提示后，审查其简洁性。删除任何不必要的词语或细节。
- en: Examples of Concise Prompts
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁提示的示例
- en: 'General Prompt: "Can you explain the various benefits and advantages of regular
    physical exercise, including both physical and mental health aspects?" Concise
    Prompt: "What are the physical and mental health benefits of regular exercise?"'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“你能解释定期进行体育锻炼的各种益处和优势，包括身体和心理健康方面吗？” 简洁提示：“定期锻炼对身体和心理健康有哪些益处？”
- en: 'General Prompt: "Please provide a detailed explanation of how the process of
    photosynthesis works in plants, including all the stages and important factors
    involved." Concise Prompt: "Explain the stages of photosynthesis in plants."'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“请详细解释植物光合作用的过程，包括所有阶段和涉及的重要因素。” 简洁提示：“解释植物光合作用的阶段。”
- en: 'General Prompt: "I would like to know about the major causes and contributing
    factors that led to the start of World War I, and how these factors interacted
    to result in the conflict." Concise Prompt: "What caused the start of World War
    I?"'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“我想了解导致第一次世界大战开始的主要原因和影响因素，以及这些因素如何相互作用导致冲突。” 简洁提示：“第一次世界大战的起因是什么？”
- en: Common Pitfalls to Avoid
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Long Prompts: Avoid crafting prompts that are overly lengthy and filled
    with unnecessary details. This can confuse the AI and lead to unfocused responses.'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过长提示：避免制作过长且包含不必要细节的提示。这可能会使AI困惑，并导致回答不集中。
- en: 'Complex Language: Using complex language or jargon can obscure the core question.
    Stick to simple and clear language for better understanding.'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复杂语言：使用复杂语言或行话可能会掩盖核心问题。坚持使用简单和清晰的语言以获得更好的理解。
- en: 'Including Multiple Questions: Multiple questions within a single prompt can
    dilute the focus. Address one question at a time for more precise answers.'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含多个问题：单个提示中的多个问题可能会分散焦点。一次解决一个问题以获得更精确的回答。
- en: ConclusionBeing concise is a fundamental aspect of effective prompt engineering.
    It enhances clarity, efficiency, focus, and readability, ensuring that your interactions
    with ChatGPT are productive and meaningful. By identifying the core question,
    using simple language, eliminating redundancies, focusing on key points, and reviewing
    and editing your prompts, you can achieve conciseness and improve the quality
    of the responses you receive. Avoiding pitfalls such as overly long prompts, complex
    language, and multiple questions will further enhance the effectiveness of your
    interactions with ChatGPT.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 结论简洁是有效提示工程的基本要素。它增强了清晰度、效率、专注度和可读性，确保与ChatGPT的互动富有成效且有意义。通过确定核心问题，使用简单语言，消除冗余，关注要点，并审查和编辑你的提示，你可以实现简洁性并提高收到的回答质量。避免过长提示、复杂语言和多个问题的陷阱将进一步增强与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 6: Use ExamplesUsing examples in your prompts is a powerful technique
    in prompt engineering. Examples provide concrete illustrations that help clarify
    your questions and guide the AI towards generating accurate and relevant responses.
    This chapter will explore the importance of using examples and how to incorporate
    them effectively into your prompts.Importance of Using Examples'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章：使用示例在提示中使用示例是提示工程中的一种强大技术。示例提供具体的说明，有助于阐明你的问题，并引导AI生成准确和相关的回答。本章将探讨使用示例的重要性以及如何有效地将它们融入你的提示中。使用示例的重要性
- en: 'Clarity: Examples help clarify abstract concepts or complex questions by providing
    concrete illustrations.'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过提供具体的例子，示例有助于阐明抽象概念或复杂问题。
- en: 'Guidance: They guide the AI towards understanding the specific context or scenario
    you are referring to.'
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指导：它们引导AI理解你所指的具体上下文或场景。
- en: 'Precision: Examples narrow down the possible interpretations, leading to more
    precise answers.'
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：示例缩小了可能的解释范围，导致更精确的回答。
- en: 'Comprehension: They enhance the AI’s comprehension of your query, reducing
    the likelihood of misunderstandings.'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们增强了AI对你查询的理解，减少了误解的可能性。
- en: 'How to Use ExamplesTo effectively use examples in your prompts, consider the
    following strategies:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用例子：为了有效地在你的提示中使用例子，考虑以下策略：
- en: 'Relevant Examples: Choose examples that are directly relevant to your question
    or the information you seek. Irrelevant examples can confuse the AI.'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关例子：选择与你的问题或你寻求的信息直接相关的例子。不相关例子可能会混淆AI。
- en: 'Clear and Simple: Ensure that your examples are clear and simple. Avoid overly
    complex or detailed examples that might obscure the main point.'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰简洁：确保你的例子清晰简单。避免使用过于复杂或详细的例子，这可能会掩盖主要观点。
- en: 'Specific Scenarios: Use specific scenarios that illustrate the context or situation
    you are referring to. This helps the AI grasp the nuances of your query.'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体场景：使用具体场景来阐述你所指的上下文或情况。这有助于AI理解你查询的细微差别。
- en: 'Highlight Key Points: Use examples to highlight the key points or aspects of
    your question. This focuses the AI’s attention on the most important elements.'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 突出重点：使用例子来突出你问题的关键点或方面。这使AI的注意力集中在最重要的元素上。
- en: 'Use Multiple Examples: If one example might not be sufficient, use multiple
    examples to cover different aspects of your query.'
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用多个例子：如果单个例子可能不足以说明问题，使用多个例子来涵盖你查询的不同方面。
- en: Examples of Prompts with Examples
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 带有例子的提示示例
- en: 'General Prompt: "Explain how a four-stroke engine works." Prompt with Example:
    "Explain how a four-stroke engine works, similar to the one found in most modern
    cars."'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释四冲程发动机的工作原理。”提示示例：“解释四冲程发动机的工作原理，类似于大多数现代汽车中找到的那种。”
- en: 'General Prompt: "Describe the benefits of a balanced diet." Prompt with Example:
    "Describe the benefits of a balanced diet, like one that includes a variety of
    fruits, vegetables, proteins, and grains."'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述均衡饮食的好处。提示示例：“描述均衡饮食的好处，比如包含各种水果、蔬菜、蛋白质和谷物的饮食。”
- en: 'General Prompt: "What are the causes of climate change?" Prompt with Example:
    "What are the causes of climate change, focusing on factors like greenhouse gas
    emissions from industries and deforestation?"'
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”提示示例：“气候变化的原因是什么，关注像工业温室气体排放和森林砍伐这样的因素？”
- en: Common Pitfalls to Avoid
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Irrelevant Examples: Avoid using examples that are not directly related to
    your query. Irrelevant examples can lead to off-target responses.'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不相关例子：避免使用与你的查询不直接相关的例子。不相关例子可能导致偏离目标的回答。
- en: 'Overly Complex Examples: Examples that are too complex or detailed can confuse
    the AI. Keep them simple and focused on the main point.'
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的例子：过于复杂或详细的例子可能会混淆AI。保持它们简单并集中在主要观点上。
- en: 'Using Too Many Examples: While examples are helpful, using too many can clutter
    your prompt. Use just enough to clarify your query without overwhelming the AI.'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用过多例子：虽然例子很有帮助，但使用过多例子可能会使提示杂乱。只需使用足够的例子来阐明你的查询，而不会使AI感到不知所措。
- en: ConclusionUsing examples is a highly effective technique in prompt engineering.
    Examples enhance clarity, provide guidance, increase precision, and improve comprehension,
    leading to better quality responses from ChatGPT. By choosing relevant, clear,
    and specific examples, highlighting key points, and using multiple examples when
    necessary, you can craft prompts that effectively utilize examples to achieve
    accurate and relevant answers. Avoiding pitfalls such as irrelevant examples,
    overly complex examples, and using too many examples will further enhance the
    effectiveness of your interactions with ChatGPT.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：使用例子是提示工程中一种非常有效的技术。例子增强了清晰度，提供了指导，增加了精确度，并提高了理解力，从而提高了ChatGPT的回答质量。通过选择相关、清晰和具体的例子，突出重点，并在必要时使用多个例子，你可以构建出有效地利用例子以达到准确和相关性回答的提示。避免诸如不相关例子、过于复杂的例子和使用过多例子等陷阱，将进一步增强你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 7: Clarify AmbiguitiesClarifying ambiguities in your prompts is a crucial
    aspect of prompt engineering. Ambiguities can lead to misunderstandings and inaccurate
    responses from ChatGPT. By ensuring that your prompts are clear and unambiguous,
    you can enhance the quality and relevance of the information you receive. This
    chapter will discuss the importance of clarifying ambiguities and how to do it
    effectively.Importance of Clarifying Ambiguities'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章：澄清含糊之处澄清提示中的含糊之处是提示工程的关键方面。含糊不清可能导致ChatGPT产生误解和不准确的响应。通过确保您的提示清晰且无歧义，您可以提高您收到的信息和相关性的质量。本章将讨论澄清含糊之处的重要性以及如何有效地进行。
- en: 'Accuracy: Clear prompts lead to more accurate responses. Ambiguities can cause
    the AI to misinterpret your query.'
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：清晰的提示将导致更准确的响应。含糊不清可能导致AI误解您的查询。
- en: 'Relevance: Eliminating ambiguities ensures that the AI provides information
    that is directly relevant to your question.'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：消除含糊之处确保AI提供与您问题直接相关的信息。
- en: 'Efficiency: Clarifying ambiguities reduces the need for follow-up questions
    and corrections, making the interaction more efficient.'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：澄清含糊之处减少了后续问题和更正的需要，使交互更加高效。
- en: 'Understanding: Clear and unambiguous prompts help the AI understand the specific
    details and nuances of your query.'
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：清晰且无歧义的提示有助于AI理解您查询的具体细节和细微差别。
- en: 'How to Clarify AmbiguitiesTo effectively clarify ambiguities in your prompts,
    consider the following strategies:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如何澄清含糊之处为了有效地澄清您提示中的含糊之处，请考虑以下策略：
- en: 'Define Key Terms: Clearly define any key terms or jargon used in your prompt.
    This ensures that the AI understands exactly what you are referring to.'
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义关键术语：明确定义您提示中使用的任何关键术语或行话。这确保AI确切地知道您所指的内容。
- en: 'Specify Details: Include specific details that help clarify the context or
    scenario of your question.'
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确细节：包括有助于澄清您问题的背景或场景的具体细节。
- en: 'Use Precise Language: Opt for precise and descriptive language. Avoid vague
    or general terms that can be interpreted in multiple ways.'
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用精确语言：选择精确和描述性的语言。避免可以有多种解释的含糊或一般性术语。
- en: 'Ask Directly: If there is a potential for misunderstanding, directly ask for
    clarification or specify what you do not want in the response.'
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 直接询问：如果有可能产生误解，直接要求澄清或指定您不希望包含在响应中的内容。
- en: 'Provide Context: Include background information or context that helps frame
    your question and eliminate ambiguities.'
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括有助于构建您问题并消除含糊之处的背景信息或上下文。
- en: Examples of Clarified Prompts
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 澄清提示的示例
- en: 'Ambiguous Prompt: "What is the process of migration?" Clarified Prompt: "What
    is the process of bird migration, specifically the migration patterns of Arctic
    Terns?"'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊的提示：“迁移的过程是什么？”澄清后的提示：“鸟类的迁移过程是什么，特别是北极燕鸥的迁移模式？”
- en: 'Ambiguous Prompt: "Explain the principles of management." Clarified Prompt:
    "Explain the principles of management in the context of project management within
    a tech company."'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊的提示：“解释管理的原则。”澄清后的提示：“在科技公司项目管理背景下解释管理的原则。”
- en: 'Ambiguous Prompt: "Describe the benefits of regular exercise." Clarified Prompt:
    "Describe the benefits of regular aerobic exercise, such as running or swimming,
    on cardiovascular health."'
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊的提示：“描述定期锻炼的好处。”澄清后的提示：“描述定期有氧锻炼（如跑步或游泳）对心血管健康的好处。”
- en: Common Pitfalls to Avoid
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Terms: Avoid using vague or general terms that can be interpreted in
    multiple ways. Be as specific as possible.'
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免含糊术语：避免使用可以有多种解释的含糊或一般性术语。尽可能具体。
- en: 'Assuming Understanding: Do not assume that the AI understands your specific
    context without clear instructions. Provide all necessary details.'
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设理解：不要假设AI在没有明确指令的情况下理解您的特定上下文。提供所有必要的细节。
- en: 'Lack of Context: Omitting important background information can lead to ambiguous
    responses. Always provide enough context to frame your question.'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略重要的背景信息可能导致含糊不清的响应。始终提供足够的信息来构建您的问题。
- en: ConclusionClarifying ambiguities is an essential practice in prompt engineering.
    Clear and unambiguous prompts lead to more accurate, relevant, and efficient responses
    from ChatGPT. By defining key terms, specifying details, using precise language,
    directly asking for clarification, and providing context, you can eliminate ambiguities
    and improve the quality of your interactions with ChatGPT. Avoiding pitfalls such
    as vague terms, assuming understanding, and lack of context will further enhance
    the effectiveness of your prompts.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 8: Sequential PromptsSequential prompts are a valuable technique in
    prompt engineering, especially when dealing with complex queries or topics that
    require a step-by-step approach. By breaking down a complex query into a series
    of simpler, sequential prompts, you can guide ChatGPT through a logical progression,
    ensuring thorough and accurate responses. This chapter will explore the importance
    of sequential prompts and how to implement them effectively.Importance of Sequential
    Prompts'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：顺序提示
- en: 'Clarity: Sequential prompts break down complex queries into manageable parts,
    making it easier for the AI to understand and respond accurately.'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：顺序提示将复杂查询分解为可管理的部分，使AI更容易理解和准确回应。
- en: 'Depth: By addressing each part of the query separately, sequential prompts
    allow for more detailed and comprehensive responses.'
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：通过单独处理查询的每个部分，顺序提示允许提供更详细和全面的回应。
- en: 'Focus: This approach helps maintain focus on specific aspects of a query, reducing
    the risk of off-topic or incomplete answers.'
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注：这种方法有助于保持对查询特定方面的专注，降低出现离题或不完整答案的风险。
- en: 'Efficiency: Sequential prompts streamline the interaction, ensuring that each
    response builds logically on the previous one.'
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：顺序提示简化了交互过程，确保每个回应都逻辑上建立在之前的一个基础上。
- en: 'How to Implement Sequential PromptsTo effectively use sequential prompts, consider
    the following strategies:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 如何实施顺序提示
- en: 'Identify Key Components: Break down the complex query into its key components
    or stages. Determine the logical sequence in which these components should be
    addressed.'
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别关键组成部分：将复杂查询分解为其关键组成部分或阶段。确定这些组成部分应被处理的逻辑顺序。
- en: 'Ask One Question at a Time: Focus on one question or aspect of the query at
    a time. This ensures that each part is thoroughly addressed before moving on to
    the next.'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一次问一个问题：一次关注一个问题或查询的一个方面。这确保在继续下一个部分之前，每个部分都得到了充分的处理。
- en: 'Use Clear Transitions: Use clear transitions to link each prompt to the previous
    one. This helps maintain coherence and continuity in the responses.'
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用清晰的过渡：使用清晰的过渡将每个提示与上一个提示联系起来。这有助于保持回应的连贯性和连续性。
- en: 'Summarize Previous Responses: Summarize the previous response before moving
    on to the next prompt to ensure continuity and clarity.'
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总结之前的回应：在进入下一个提示之前总结之前的回应，以确保连贯性和清晰度。
- en: 'Adjust Based on Responses: Be prepared to adjust your prompts based on the
    responses you receive. If the AI needs more information or clarification, provide
    it before moving on.'
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据回应调整：准备好根据收到的回应调整你的提示。如果AI需要更多信息或澄清，在继续之前提供它。
- en: Examples of Sequential Prompts
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序提示的例子
- en: 'General Query: "Explain how photosynthesis works and its importance to plants."
    Sequential Prompts:'
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般查询："解释光合作用的工作原理及其对植物的重要性。" 顺序提示：
- en: '"What are the stages of photosynthesis?"'
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"光合作用有哪些阶段？"'
- en: '"Explain the role of chlorophyll in photosynthesis."'
  id: totrans-168
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"解释叶绿素在光合作用中的作用。"'
- en: '"Why is photosynthesis important for plant growth?"'
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"为什么光合作用对植物生长很重要？"'
- en: 'General Query: "Describe the causes and impacts of World War I." Sequential
    Prompts:'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般查询："描述第一次世界大战的原因和影响。" 顺序提示：
- en: '"What were the main causes of World War I?"'
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"第一次世界大战的主要原因是哪些？"'
- en: '"How did the assassination of Archduke Franz Ferdinand trigger the war?"'
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"弗朗茨·斐迪南大公被暗杀是如何引发战争的？"'
- en: '"What were the major impacts of World War I on European economies?"'
  id: totrans-173
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"第一次世界大战对欧洲经济的主要影响是什么？"'
- en: 'General Query: "How can a balanced diet improve health?" Sequential Prompts:'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般查询："如何通过均衡饮食改善健康？" 连续提示：
- en: '"What are the key components of a balanced diet?"'
  id: totrans-175
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"均衡饮食的关键组成部分是什么？"'
- en: '"How do vitamins and minerals contribute to overall health?"'
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"维生素和矿物质如何影响整体健康？"'
- en: '"What are the long-term health benefits of maintaining a balanced diet?"'
  id: totrans-177
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"维持均衡饮食的长期健康益处是什么？"'
- en: Common Pitfalls to Avoid
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Prompts: Avoid asking broad questions that try to cover too much
    at once. Break them down into smaller, focused prompts.'
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的提示：避免提出试图一次性涵盖太多内容的宽泛问题。将它们分解为更小、更专注的提示。
- en: 'Lack of Continuity: Ensure that each prompt logically follows from the previous
    one. Lack of continuity can lead to fragmented or disjointed responses.'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏连续性：确保每个提示逻辑上与前一个提示相接。缺乏连续性可能导致零散或分离的响应。
- en: 'Ignoring Responses: Pay attention to the AI’s responses and adjust your subsequent
    prompts accordingly. Ignoring responses can lead to misunderstandings or incomplete
    answers.'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视响应：注意AI的响应并根据需要调整后续提示。忽视响应可能导致误解或不完整的答案。
- en: ConclusionSequential prompts are a powerful tool in prompt engineering, particularly
    for complex queries. They enhance clarity, depth, focus, and efficiency by breaking
    down queries into manageable parts and guiding the AI through a logical progression.
    By identifying key components, asking one question at a time, using clear transitions,
    summarizing previous responses, and adjusting based on responses, you can effectively
    implement sequential prompts to obtain thorough and accurate answers. Avoiding
    pitfalls such as overly broad prompts, lack of continuity, and ignoring responses
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 结论连续提示是提示工程中的强大工具，尤其是在处理复杂查询时。通过将查询分解为可管理的部分并引导AI进行逻辑推进，它们增强了清晰性、深度、专注和效率。通过识别关键组件、一次问一个问题、使用清晰的过渡、总结之前的响应并根据响应进行调整，你可以有效地实施连续提示以获得全面和准确的答案。避免像过于宽泛的提示、缺乏连续性和忽视响应这样的错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 9: State Your IntentStating your intent clearly in your prompts is
    a critical aspect of prompt engineering. When the AI understands the purpose or
    goal of your query, it can provide more relevant and accurate responses. This
    chapter will explore the importance of stating your intent and how to effectively
    incorporate it into your prompts.Importance of Stating Your Intent'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章：明确意图在提示中明确表达你的意图是提示工程的关键方面。当AI理解你查询的目的或目标时，它可以提供更相关和准确的响应。本章将探讨明确表达意图的重要性以及如何有效地将其融入你的提示中。
- en: 'Clarity: Clearly stating your intent eliminates ambiguity, making it easier
    for the AI to understand what you are asking for.'
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：明确表达你的意图消除了歧义，使AI更容易理解你想要什么。
- en: 'Relevance: When the AI knows your goal, it can tailor its response to be more
    relevant to your needs.'
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：当AI知道你的目标时，它可以调整其响应以更符合你的需求。
- en: 'Focus: Stating your intent helps maintain focus on the main objective of your
    query, reducing the likelihood of off-topic answers.'
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注：明确表达意图有助于保持对查询主要目标的关注，减少离题答案的可能性。
- en: 'Efficiency: By articulating your intent, you minimize the need for follow-up
    questions and clarifications, leading to a more efficient interaction.'
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：通过表达你的意图，你最小化了后续问题和澄清的需要，从而提高了互动的效率。
- en: 'How to State Your IntentTo effectively state your intent in your prompts, consider
    the following strategies:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如何明确表达意图为了有效地在提示中表达你的意图，考虑以下策略：
- en: 'Be Explicit: Clearly articulate the purpose or goal of your query at the beginning
    of your prompt.'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确表达：在提示的开头清楚地阐述你查询的目的或目标。
- en: 'Use Clear Language: Use straightforward and unambiguous language to state your
    intent. Avoid vague or indirect phrases.'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用清晰的语言：使用直接和明确的语言来表达你的意图。避免含糊或间接的短语。
- en: 'Provide Context: Include any relevant context that can help clarify your intent
    and frame your question.'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于阐明你的意图和构建问题的相关背景。
- en: 'Specify the Desired Outcome: Indicate what you hope to achieve or learn from
    the response. This guides the AI in generating a more targeted answer.'
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定期望的结果：表明你希望从响应中获得什么或学到什么。这指导AI生成更针对性的答案。
- en: 'Ask for Confirmation: If necessary, ask the AI to confirm its understanding
    of your intent before proceeding with the response.'
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求确认：如果需要，在AI开始响应之前，请求AI确认其对意图的理解。
- en: Examples of Stating Your Intent
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 表达意图的例子
- en: 'General Prompt: "Tell me about climate change." Stated Intent: "I want to understand
    the main causes of climate change to educate my students. Can you explain them?"'
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“告诉我关于气候变化的事情。” 表达意图：“我想了解气候变化的主要原因，以便教育我的学生。你能解释它们吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Stated Intent: "I''m
    writing a science article for beginners. Can you describe the process of photosynthesis
    in simple terms?"'
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。” 表达意图：“我正在为初学者写一篇科学文章。你能用简单的话描述光合作用的过程吗？”
- en: 'General Prompt: "Explain the benefits of exercise." Stated Intent: "I want
    to create a health guide for seniors. Can you explain the benefits of exercise
    for older adults?"'
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释锻炼的好处。” 表达意图：“我想为老年人编写一份健康指南。你能解释锻炼对老年人的好处吗？”
- en: Common Pitfalls to Avoid
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Implicit Intent: Avoid assuming that the AI will infer your intent from the
    prompt. Explicitly state your purpose to ensure clarity.'
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐含意图：避免假设AI会从提示中推断出你的意图。明确地表达你的目的以确保清晰度。
- en: 'Vague Language: Using vague or indirect language can obscure your intent. Be
    clear and specific about what you want.'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊语言：使用模糊或间接的语言可能会掩盖你的意图。要清楚和具体地说明你想要什么。
- en: 'Overloading with Details: While context is important, providing too many details
    can overwhelm the AI. Focus on the main purpose of your query.'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度细节：虽然上下文很重要，但提供过多细节可能会使AI感到不知所措。请关注你查询的主要目的。
- en: ConclusionStating your intent is a crucial practice in prompt engineering that
    enhances clarity, relevance, focus, and efficiency. By being explicit, using clear
    language, providing context, specifying the desired outcome, and asking for confirmation,
    you can ensure that your prompts effectively communicate your intent to ChatGPT.
    Avoiding pitfalls such as implicit intent, vague language, and overloading with
    details will further improve the quality and relevance of the responses you receive.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 结论明确表达意图是提示工程中的关键实践，它增强了清晰度、相关性、重点和效率。通过明确表达、使用清晰的语言、提供上下文、指定期望的结果以及请求确认，你可以确保你的提示有效地将你的意图传达给ChatGPT。避免诸如隐含意图、模糊语言和过度细节等错误将进一步提高你收到的回复的质量和相关性。
- en: '* * *'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 10: Ask for StepsWhen dealing with processes or tasks, asking for step-by-step
    instructions can significantly enhance the clarity and usability of the responses
    from ChatGPT. This approach ensures that the AI provides a detailed and organized
    sequence of actions, making it easier for you to understand and follow. This chapter
    will explore the importance of asking for steps and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Steps'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：请求步骤当处理过程或任务时，请求逐步说明可以显著提高ChatGPT的响应的清晰度和可用性。这种方法确保AI提供详细且有序的动作序列，使你更容易理解和遵循。本章将探讨请求步骤的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Step-by-step instructions break down complex processes into manageable
    parts, making them easier to understand.'
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：逐步说明将复杂过程分解成可管理的部分，使其更容易理解。
- en: 'Organization: Providing a sequence of steps helps organize the information
    logically, ensuring that each part of the process is covered comprehensively.'
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 组织：提供一系列步骤有助于逻辑地组织信息，确保过程的每个部分都得到全面覆盖。
- en: 'Usability: Detailed steps are practical and actionable, making it easier for
    you to implement the instructions.'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：详细的步骤是实用且可执行的，使你更容易实施指令。
- en: 'Thoroughness: Asking for steps ensures that the AI addresses all necessary
    components of the process, reducing the likelihood of missing important details.'
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽性：请求步骤确保AI处理了过程的所有必要组成部分，减少了遗漏重要细节的可能性。
- en: 'How to Ask for StepsTo effectively ask for steps in your prompts, consider
    the following strategies:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求步骤为了有效地在提示中请求步骤，考虑以下策略：
- en: 'Specify the Task: Clearly define the task or process you want to be broken
    down into steps.'
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确任务：清楚地定义你想要分解成步骤的任务或过程。
- en: 'Use Direct Language: Use direct and straightforward language to ask for step-by-step
    instructions.'
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直截了当的语言来请求逐步说明。
- en: 'Include Relevant Details: Provide any relevant details or context that can
    help the AI tailor the steps to your specific needs.'
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包括相关细节：提供任何有助于AI根据你的特定需求定制步骤的相关细节或上下文。
- en: 'Ask for Numbered Steps: Request that the steps be numbered or listed sequentially
    to enhance organization and readability.'
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求编号步骤：要求步骤编号或按顺序列出，以增强组织和可读性。
- en: 'Clarify the Desired Level of Detail: Indicate how detailed you want the steps
    to be, whether you need a high-level overview or an in-depth guide.'
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确所需细节水平：指出你希望步骤有多详细，是需要一个高级概述还是一个深入指南。
- en: Examples of Asking for Steps
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 请求步骤的示例
- en: 'General Prompt: "Explain how to bake a cake." Step-by-Step Prompt: "Can you
    provide a step-by-step guide on how to bake a chocolate cake from scratch?"'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释如何烘焙蛋糕。” 步骤性提示：“你能提供如何从零开始烘焙巧克力蛋糕的步骤性指南吗？”
- en: 'General Prompt: "Describe the process of starting a business." Step-by-Step
    Prompt: "Can you outline the steps involved in starting a small business, including
    legal and financial considerations?"'
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述开始创业的过程。” 步骤性提示：“你能概述开始一家小型企业涉及的步骤，包括法律和财务考虑吗？”
- en: 'General Prompt: "How do I change a tire?" Step-by-Step Prompt: "Can you provide
    a step-by-step guide on how to change a flat tire on a car?"'
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“我如何更换轮胎？” 步骤性提示：“你能提供更换汽车备胎的步骤性指南吗？”
- en: Common Pitfalls to Avoid
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Task Definition: Avoid asking for steps for tasks that are not clearly
    defined. Be specific about what you need.'
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的任务定义：避免请求对未明确定义的任务的步骤。具体说明你需要什么。
- en: 'Lack of Context: Omitting relevant details or context can lead to incomplete
    or inaccurate steps. Provide enough information to frame the task.'
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关细节或上下文可能导致步骤不完整或不准确。提供足够的信息来界定任务。
- en: 'Overly Broad Requests: Asking for steps for overly broad tasks can result in
    a disorganized or unfocused response. Narrow down the task to ensure clarity.'
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的请求：对过于宽泛的任务请求可能导致无组织或缺乏焦点的回应。缩小任务范围以确保清晰。
- en: ConclusionAsking for steps is a highly effective technique in prompt engineering
    that enhances clarity, organization, usability, and thoroughness. By specifying
    the task, using direct language, including relevant details, asking for numbered
    steps, and clarifying the desired level of detail, you can craft prompts that
    yield detailed and actionable step-by-step instructions from ChatGPT. Avoiding
    pitfalls such as vague task definitions, lack of context, and overly broad requests
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求步骤是提示工程中一种非常有效的技术，它增强了清晰度、组织性、可用性和全面性。通过指定任务、使用直接语言、包括相关细节、请求编号步骤以及明确所需细节水平，你可以构建出从ChatGPT获得详细且可操作的步骤性指令的提示。避免诸如模糊的任务定义、缺乏上下文和过于宽泛的请求等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 11: Provide LimitsProviding limits in your prompts is an essential
    technique in prompt engineering that helps focus the AI''s responses and ensures
    they are concise, relevant, and manageable. Limits can pertain to the length of
    the response, the scope of the information, or specific boundaries within which
    the AI should operate. This chapter will discuss the importance of providing limits
    and how to effectively incorporate them into your prompts.Importance of Providing
    Limits'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章：提供限制
- en: 'Focus: Limits help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 焦点：限制有助于缩小AI的回应范围，使其聚焦于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting boundaries, you ensure that the response remains clear
    and on-topic, enhancing overall comprehension.'
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定边界，你确保回应保持清晰并紧扣主题，增强整体理解。
- en: 'Efficiency: Limits prevent overly long or verbose responses, making the information
    more digestible and time-efficient.'
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：限制防止了过长或冗长的回应，使信息更易于消化且更节省时间。
- en: 'Relevance: Providing limits helps the AI prioritize the most important aspects
    of the query, ensuring that the response is directly applicable to your needs.'
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：提供限制有助于AI优先考虑查询的最重要方面，确保回应直接适用于你的需求。
- en: 'How to Provide LimitsTo effectively provide limits in your prompts, consider
    the following strategies:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 如何提供限制
- en: 'Specify Length: Indicate the desired length of the response, such as a word
    count, number of sentences, or paragraphs.'
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定长度：指出期望的响应长度，例如字数、句子数或段落数。
- en: 'Define Scope: Clearly define the scope of the information you are seeking.
    This could involve specifying a particular aspect of a topic or a timeframe.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确范围：清楚地定义你寻求的信息范围。这可能包括指定主题的某个特定方面或时间段。
- en: 'Set Boundaries: Establish boundaries for the response, such as excluding certain
    information or focusing only on specific details.'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设定边界：为响应设定边界，例如排除某些信息或仅关注特定细节。
- en: 'Use Clear Instructions: Provide clear and direct instructions about the limits
    you are setting. This helps the AI understand and adhere to your requirements.'
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用清晰的指令：提供关于你设定的限制的清晰和直接指令。这有助于AI理解和遵守你的要求。
- en: 'Ask for Summaries: If the topic is broad, ask for a summary or an overview
    instead of a detailed explanation.'
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求摘要：如果主题广泛，请请求摘要或概述，而不是详细解释。
- en: Examples of Providing Limits
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 提供限制的例子
- en: 'General Prompt: "Explain the history of the Roman Empire." Limited Prompt:
    "Provide a brief overview of the history of the Roman Empire in 200 words."'
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释罗马帝国的历史。” 限制性提示：“用200字简要概述罗马帝国的历史。”
- en: 'General Prompt: "Describe the benefits of exercise." Limited Prompt: "List
    the top three benefits of regular exercise for cardiovascular health."'
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述锻炼的好处。” 限制性提示：“列出对心血管健康有益的常规锻炼的前三大好处。”
- en: 'General Prompt: "What are the causes of climate change?" Limited Prompt: "Summarize
    the main causes of climate change, focusing only on human activities."'
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？” 限制性提示：“总结气候变化的主要原因，仅关注人类活动。”
- en: Common Pitfalls to Avoid
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Limits: Avoid setting limits that are too broad or vague. Be specific
    about what you want to include or exclude.'
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度宽泛的限制：避免设置过于宽泛或模糊的限制。具体说明你想要包含或排除的内容。
- en: 'Unrealistic Limits: Setting limits that are too restrictive can lead to incomplete
    or superficial responses. Ensure your limits are reasonable and allow for a comprehensive
    answer.'
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不切实际的限制：设置过于严格的限制可能导致不完整或肤浅的响应。确保你的限制是合理的，并允许全面回答。
- en: 'Lack of Clarity: Providing unclear or ambiguous instructions about limits can
    confuse the AI. Use precise language to define your limits.'
  id: totrans-244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏清晰度：关于限制的模糊或不明确的指令可能会使AI困惑。使用精确的语言来定义你的限制。
- en: ConclusionProviding limits in your prompts is a crucial practice in prompt engineering
    that enhances focus, clarity, efficiency, and relevance. By specifying the length,
    defining the scope, setting boundaries, using clear instructions, and asking for
    summaries, you can ensure that the AI's responses are concise, relevant, and manageable.
    Avoiding pitfalls such as overly broad limits, unrealistic limits, and lack of
    clarity will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 12: Iterate QuestionsIterating questions is an effective technique
    in prompt engineering that involves rephrasing or building on previous questions
    to explore a topic more deeply or clarify information. This approach allows you
    to refine the AI''s responses, ensuring greater accuracy and detail. This chapter
    will explore the importance of iterating questions and how to implement this technique
    effectively.Importance of Iterating Questions'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章：迭代问题
- en: 'Depth: Iterating questions helps delve deeper into a topic, uncovering more
    detailed and nuanced information.'
  id: totrans-248
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：迭代问题有助于深入探讨主题，揭示更详细和细微的信息。
- en: 'Clarification: Rephrasing questions or asking follow-up questions can clarify
    ambiguous or incomplete responses.'
  id: totrans-249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 澄清：重新措辞问题或提出后续问题可以澄清模糊或不完整的信息。
- en: 'Accuracy: By refining your questions, you can correct misunderstandings and
    ensure that the AI provides accurate information.'
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：通过细化你的问题，你可以纠正误解并确保AI提供准确的信息。
- en: 'Exploration: Iterating questions allows you to explore different aspects of
    a topic, gaining a broader and more comprehensive understanding.'
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：迭代问题允许你探索一个主题的不同方面，从而获得更广泛和更全面的理解。
- en: 'How to Iterate QuestionsTo effectively iterate questions, consider the following
    strategies:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 如何迭代问题为了有效地迭代问题，请考虑以下策略：
- en: 'Rephrase for Clarity: If the initial response is unclear or incomplete, rephrase
    the question to provide additional clarity or focus.'
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新措辞以获得清晰度：如果初始响应不清楚或不完整，重新措辞问题以提供额外的清晰度或焦点。
- en: 'Ask Follow-Up Questions: Use follow-up questions to delve deeper into specific
    aspects of the initial response.'
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出后续问题：使用后续问题深入探讨初始响应的特定方面。
- en: 'Build on Responses: Build on the AI''s previous responses to further explore
    the topic or uncover additional details.'
  id: totrans-255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建立在回答之上：基于AI之前的回答，进一步探索主题或揭示更多细节。
- en: 'Seek Clarification: If the AI''s response is ambiguous, ask for clarification
    or additional information.'
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻求澄清：如果AI的回答含糊不清，请要求澄清或提供更多信息。
- en: 'Use a Logical Sequence: Ensure that your questions follow a logical sequence,
    gradually building on each other to explore the topic comprehensively.'
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用逻辑顺序：确保你的问题遵循逻辑顺序，逐步建立在对主题的全面探索。
- en: Examples of Iterating Questions
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代问题的示例
- en: 'Initial Question: "What are the benefits of meditation?" Follow-Up Questions:'
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始问题：“冥想有哪些好处？”后续问题：
- en: '"Can you explain how meditation reduces stress?"'
  id: totrans-260
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “你能解释一下冥想是如何减轻压力的吗？”
- en: '"What are the long-term mental health benefits of regular meditation practice?"'
  id: totrans-261
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “定期冥想练习对长期心理健康有哪些益处？”
- en: 'Initial Question: "How does photosynthesis work?" Follow-Up Questions:'
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始问题：“光合作用是如何工作的？”后续问题：
- en: '"What role does chlorophyll play in photosynthesis?"'
  id: totrans-263
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “叶绿素在光合作用中扮演什么角色？”
- en: '"How do light and dark reactions differ in the process of photosynthesis?"'
  id: totrans-264
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “光合作用过程中光反应和暗反应有何不同？”
- en: 'Initial Question: "What caused the start of World War I?" Follow-Up Questions:'
  id: totrans-265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始问题：“第一次世界大战的爆发是由什么引起的？”后续问题：
- en: '"How did the assassination of Archduke Franz Ferdinand contribute to the outbreak
    of the war?"'
  id: totrans-266
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “弗朗茨·斐迪南大公被暗杀是如何导致战争爆发的？”
- en: '"What were the underlying political and economic tensions that led to World
    War I?"'
  id: totrans-267
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “导致第一次世界大战爆发的潜在政治和经济紧张局势是什么？”
- en: Common Pitfalls to Avoid
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Repetition: Avoid simply repeating the same question. Instead, rephrase or
    build on the previous question to gain more insight.'
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复：避免简单地重复相同的问题。相反，重新措辞或基于前一个问题以获得更多见解。
- en: 'Disjointed Questions: Ensure that your questions follow a logical sequence.
    Disjointed or unrelated questions can confuse the AI and lead to fragmented responses.'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不连贯的问题：确保你的问题遵循逻辑顺序。不连贯或无关的问题可能会使AI困惑并导致零散的响应。
- en: 'Overloading with Questions: Avoid asking too many questions at once. Focus
    on one aspect at a time to ensure thorough and detailed responses.'
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免问题过多：避免一次性提出太多问题。一次关注一个方面，以确保回答全面且详细。
- en: ConclusionIterating questions is a powerful technique in prompt engineering
    that enhances depth, clarification, accuracy, and exploration. By rephrasing for
    clarity, asking follow-up questions, building on responses, seeking clarification,
    and using a logical sequence, you can effectively iterate questions to obtain
    more detailed and accurate information from ChatGPT. Avoiding pitfalls such as
    repetition, disjointed questions, and overloading with questions will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 结论迭代问题是提示工程中的一种强大技术，它增强了深度、澄清、准确性和探索性。通过重新措辞以获得清晰度、提出后续问题、基于回答建立、寻求澄清和使用逻辑顺序，你可以有效地迭代问题，从ChatGPT中获得更详细和准确的信息。避免诸如重复、不连贯的问题和问题过多等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 13: Check for UnderstandingChecking for understanding is an essential
    technique in prompt engineering that involves verifying that the AI comprehends
    your query correctly before proceeding with detailed responses. This approach
    helps ensure accuracy and relevance, reducing the likelihood of misunderstandings
    and errors. This chapter will explore the importance of checking for understanding
    and how to implement this technique effectively.Importance of Checking for Understanding'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章：检查理解检查理解是提示工程中的一个基本技巧，它涉及在提供详细回答之前验证AI是否正确理解了你的查询。这种方法有助于确保准确性和相关性，减少误解和错误的可能性。本章将探讨检查理解的重要性以及如何有效地实施这一技巧。理解检查的重要性
- en: 'Accuracy: Verifying understanding ensures that the AI comprehends your query
    correctly, leading to more accurate responses.'
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：验证理解确保AI正确理解了你的查询，从而产生更准确的回答。
- en: 'Relevance: Confirming understanding helps ensure that the information provided
    is directly relevant to your needs.'
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：确认理解有助于确保提供的信息直接相关于你的需求。
- en: 'Clarity: This technique clarifies any potential ambiguities or misunderstandings
    early in the interaction.'
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：这项技术在交互的早期阶段就澄清了任何潜在的歧义或误解。
- en: 'Efficiency: Checking for understanding minimizes the need for follow-up questions
    and corrections, making the interaction more efficient.'
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：检查理解可以减少后续问题和更正的需要，使交互更加高效。
- en: 'How to Check for UnderstandingTo effectively check for understanding in your
    prompts, consider the following strategies:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 如何检查理解为了有效地在你的提示中检查理解，考虑以下策略：
- en: 'Ask for Confirmation: Directly ask the AI to confirm its understanding of your
    query before providing a detailed response.'
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求确认：直接要求AI在提供详细回答之前确认其对查询的理解。
- en: 'Restate the Query: Request the AI to restate or paraphrase your query to ensure
    it has grasped the main points.'
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重述查询：要求AI重述或改述你的查询，以确保它已经掌握了主要观点。
- en: 'Pose Clarifying Questions: Ask clarifying questions to address any potential
    ambiguities or uncertainties in your query.'
  id: totrans-282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出澄清问题：提出澄清问题以解决查询中任何潜在的歧义或不确定性。
- en: 'Use Examples: Provide examples to illustrate your query and ask the AI to confirm
    its understanding based on these examples.'
  id: totrans-283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用示例：提供示例来说明你的查询，并要求AI根据这些示例确认其理解。
- en: 'Request Summaries: Ask the AI to summarize your query to ensure it has understood
    the key elements.'
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求摘要：请AI总结你的查询，以确保它已经理解了关键要素。
- en: Examples of Checking for Understanding
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 检查理解的示例
- en: 'General Prompt: "Explain the benefits of exercise." Check for Understanding:
    "Can you confirm that you understand I''m asking about the health benefits of
    regular physical exercise for adults?"'
  id: totrans-286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释锻炼的好处。"检查理解："你能确认你理解我是在询问成年人定期进行体育锻炼的健康益处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Check for Understanding:
    "Can you restate what you understand about my request to explain the stages of
    photosynthesis in plants?"'
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述光合作用的过程。"检查理解："你能重述你理解的我请求解释植物光合作用阶段的内容吗？”
- en: 'General Prompt: "What are the causes of World War I?" Check for Understanding:
    "Can you summarize the main causes of World War I as you understand them before
    going into detail?"'
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："第一次世界大战的原因是什么？"检查理解："在你详细说明之前，你能总结一下你理解的第一世界大战的主要原因吗？"
- en: Common Pitfalls to Avoid
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Assuming Understanding: Avoid assuming that the AI has understood your query
    without verification. Always check for understanding to ensure accuracy.'
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设理解：避免在没有验证的情况下假设AI已经理解了你的查询。始终检查理解以确保准确性。
- en: 'Vague Requests: Make sure your request for confirmation is clear and specific.
    Vague requests can lead to further misunderstandings.'
  id: totrans-291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：确保你的确认请求清晰具体。模糊的请求可能导致进一步的误解。
- en: 'Skipping the Step: Skipping the step of checking for understanding can result
    in inaccurate or irrelevant responses. Always prioritize this step in complex
    or detailed queries.'
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 跳过步骤：跳过检查理解的步骤可能导致不准确或不相关的回答。在复杂或详细的查询中始终优先考虑这一步骤。
- en: ConclusionChecking for understanding is a critical practice in prompt engineering
    that enhances accuracy, relevance, clarity, and efficiency. By asking for confirmation,
    restating the query, posing clarifying questions, using examples, and requesting
    summaries, you can ensure that ChatGPT comprehends your query correctly before
    providing detailed responses. Avoiding pitfalls such as assuming understanding,
    vague requests, and skipping this step will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 结论检查理解是提示工程中的一个关键实践，它增强了准确性、相关性、清晰性和效率。通过请求确认、重述查询、提出澄清问题、使用示例和请求总结，你可以确保ChatGPT在提供详细回答之前正确理解了你的查询。避免假设理解、模糊请求和跳过这一步骤将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 14: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons can provide clearer insights
    and enhance the understanding of complex topics. This chapter will explore the
    importance of using comparisons and how to effectively incorporate them into your
    prompts.Importance of Using Comparisons'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、对象或场景之间的差异和相似性。比较可以提供更清晰的见解，并增强对复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将其融入你的提示中。使用比较的重要性
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas.'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：比较有助于通过将其与更熟悉的概念联系起来，阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by highlighting differences and similarities,
    making it easier to grasp nuanced details.'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 见解：通过突出差异和相似性，它们提供了更深入的见解，使把握细微差别变得更容易。
- en: 'Engagement: Comparisons make the information more engaging and relatable, enhancing
    comprehension.'
  id: totrans-298
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：比较使信息更具吸引力和相关性，增强理解。
- en: 'Decision-Making: They facilitate informed decision-making by presenting multiple
    options or perspectives side by side.'
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：它们通过并排展示多个选项或观点来促进明智的决策。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较为了有效地在提示中使用比较，考虑以下策略：
- en: 'Identify Relevant Comparisons: Choose comparisons that are directly relevant
    to the topic or query. Irrelevant comparisons can confuse the AI and the reader.'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定相关比较：选择与主题或查询直接相关的比较。不相关的比较可能会使AI和读者感到困惑。
- en: 'Be Specific: Clearly specify the elements you want to compare, including their
    characteristics or attributes.'
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地指定你想要比较的元素，包括它们的特征或属性。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似性”、“差异性”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any necessary context that can help the AI understand
    the basis for the comparison.'
  id: totrans-304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于AI理解比较基础的必要背景信息。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    functionality, effectiveness, pros and cons, etc.'
  id: totrans-305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对特定方面的比较，如功能、有效性、利弊等。
- en: Examples of Using Comparisons
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 比较的使用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparative Prompt:
    "Compare the benefits of solar energy versus wind energy in terms of cost, efficiency,
    and environmental impact."'
  id: totrans-307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。比较提示：从成本、效率和环境影响的角度比较太阳能和风能的好处。
- en: 'General Prompt: "Describe the process of photosynthesis." Comparative Prompt:
    "Compare the process of photosynthesis in plants to the process of cellular respiration
    in animals."'
  id: totrans-308
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“比较植物光合作用与动物细胞呼吸的过程。”
- en: 'General Prompt: "What are the causes of climate change?" Comparative Prompt:
    "Compare the impacts of human activities and natural factors on climate change."'
  id: totrans-309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“比较人类活动和自然因素对气候变化的影响。”
- en: Common Pitfalls to Avoid
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的比较：避免请求过于宽泛或一般的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致比较不完整或不准确。提供足够的信息来构建比较框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不明确：使用模糊或不清晰的语言可能会掩盖比较的意图。请确保用词准确，以便AI能够理解你的请求。
- en: ConclusionUsing comparisons is a powerful technique in prompt engineering that
    enhances clarity, insight, engagement, and decision-making. By identifying relevant
    comparisons, being specific, using comparative language, providing context, and
    asking for specific aspects, you can craft prompts that effectively utilize comparisons
    to elucidate differences and similarities. Avoiding pitfalls such as overly broad
    comparisons, lack of context, and unclear language will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 15: Encourage CreativityEncouraging creativity in your prompts is a
    valuable technique in prompt engineering that can lead to innovative and imaginative
    responses from ChatGPT. This approach is particularly useful for brainstorming,
    generating ideas, and exploring new perspectives. This chapter will explore the
    importance of encouraging creativity and how to effectively incorporate this technique
    into your prompts.Importance of Encouraging Creativity'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章：鼓励创造性
- en: 'Innovation: Creative prompts can lead to innovative solutions and ideas that
    might not emerge from more conventional queries.'
  id: totrans-317
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：创造性的提示可以导致创新解决方案和想法，这些可能不会从更传统的查询中产生。
- en: 'Engagement: Encouraging creativity makes the interaction more engaging and
    dynamic, fostering a more enjoyable experience.'
  id: totrans-318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：鼓励创造性使互动更加吸引人和动态，从而营造更加愉快的体验。
- en: 'Exploration: Creative prompts allow for the exploration of new perspectives
    and possibilities, broadening the scope of the discussion.'
  id: totrans-319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：创造性的提示允许探索新的视角和可能性，拓宽讨论的范围。
- en: 'Problem-Solving: Creativity can enhance problem-solving by generating unique
    and out-of-the-box solutions.'
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：创造性可以通过产生独特和突破性的解决方案来增强解决问题的能力。
- en: 'How to Encourage CreativityTo effectively encourage creativity in your prompts,
    consider the following strategies:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 如何鼓励创造性：为了有效地在你的提示中鼓励创造性，考虑以下策略：
- en: 'Use Open-Ended Questions: Pose open-ended questions that allow for a wide range
    of responses and encourage imaginative thinking.'
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用开放式问题：提出开放式问题，允许有广泛的回答，并鼓励想象性思维。
- en: 'Invite Novelty: Ask for novel or unconventional ideas and solutions, explicitly
    inviting the AI to think outside the box.'
  id: totrans-323
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励新颖性：要求新颖或不寻常的想法和解决方案，明确邀请AI跳出思维定式。
- en: 'Pose Hypothetical Scenarios: Create hypothetical scenarios that encourage the
    AI to explore different possibilities and outcomes.'
  id: totrans-324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设情景：创建假设情景，鼓励AI探索不同的可能性和结果。
- en: 'Incorporate Playfulness: Use playful language and concepts to stimulate creative
    thinking and make the interaction more enjoyable.'
  id: totrans-325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结合趣味性：使用轻松的语言和概念来激发创造性思维，使互动更加愉快。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives or approaches
    to a problem, encouraging the AI to generate diverse ideas.'
  id: totrans-326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：要求对问题提出多个视角或方法，鼓励AI生成多样化的想法。
- en: Examples of Encouraging Creativity
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励创造性的例子
- en: 'General Prompt: "What are some ways to improve productivity?" Creative Prompt:
    "Imagine you''re designing a futuristic office space. What innovative features
    would you include to enhance productivity and employee well-being?"'
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“有哪些提高生产力的方法？”创造提示：“想象你正在设计一个未来办公室空间。你会包括哪些创新功能来提高生产力和员工的福祉？”
- en: 'General Prompt: "Describe the benefits of renewable energy." Creative Prompt:
    "If you could invent a new type of renewable energy source, what would it be and
    how would it work?"'
  id: totrans-329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述可再生能源的好处。” 创意提示：“如果你能发明一种新的可再生能源，那会是什么，它将如何工作？”
- en: 'General Prompt: "How can we reduce plastic waste?" Creative Prompt: "Think
    of an imaginative solution to reduce plastic waste in urban areas, incorporating
    elements of nature and technology."'
  id: totrans-330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“我们如何减少塑料垃圾？” 创意提示：“想象一种减少城市地区塑料垃圾的创造性解决方案，结合自然和技术元素。”
- en: Common Pitfalls to Avoid
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 常见错误
- en: 'Overly Restrictive Prompts: Avoid prompts that are too restrictive or specific,
    as they can stifle creativity. Allow for open-ended and broad responses.'
  id: totrans-332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度限制的提示：避免过于限制或具体的提示，因为它们可能会扼杀创造力。允许开放式和广泛的响应。
- en: 'Lack of Clarity: While encouraging creativity, ensure that your prompts are
    still clear and understandable. Ambiguity can lead to confusion.'
  id: totrans-333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏清晰度：虽然鼓励创造力，但请确保您的提示仍然清晰易懂。含糊不清可能导致混淆。
- en: 'Ignoring Feasibility: While creative prompts should encourage imaginative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创意提示应鼓励创造性思维，但请考虑在创造性与可行性之间取得平衡，以确保其实用相关性。
- en: ConclusionEncouraging creativity in your prompts is a powerful technique in
    prompt engineering that fosters innovation, engagement, exploration, and problem-solving.
    By using open-ended questions, inviting novelty, posing hypothetical scenarios,
    incorporating playfulness, and asking for multiple perspectives, you can craft
    prompts that stimulate creative and imaginative responses from ChatGPT. Avoiding
    pitfalls such as overly restrictive prompts, lack of clarity, and ignoring feasibility
    will further enhance the effectiveness of your interactions with ChatGPT.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 结论 在您的提示中鼓励创造力是提示工程中的一种强大技术，它促进了创新、参与、探索和问题解决。通过使用开放式问题、邀请新颖性、提出假设情景、融入趣味性以及要求多个观点，您可以构建能够激发ChatGPT创造性和想象力响应的提示。避免过度限制的提示、缺乏清晰度和忽视可行性等错误将进一步增强您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 16: Request SummariesRequesting summaries in your prompts is an effective
    technique in prompt engineering that helps condense large amounts of information
    into concise and manageable formats. This approach is particularly useful for
    quickly understanding complex topics or long texts. This chapter will explore
    the importance of requesting summaries and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Summaries'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 第16章：请求摘要 在提示中请求摘要是在提示工程中的一种有效技术，它有助于将大量信息压缩成简洁和可管理的格式。这种方法特别适用于快速理解复杂主题或长文本。本章将探讨请求摘要的重要性以及如何有效地将此技术融入您的提示中。请求摘要的重要性
- en: 'Clarity: Summaries distill complex information into its essential points, making
    it easier to understand.'
  id: totrans-338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：摘要将复杂信息提炼成其基本要点，使其更容易理解。
- en: 'Efficiency: By providing a condensed version of the information, summaries
    save time and make it quicker to grasp the main ideas.'
  id: totrans-339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：通过提供信息的浓缩版本，摘要节省了时间，并使抓住主要思想变得更快。
- en: 'Focus: Summaries help maintain focus on the key aspects of a topic, avoiding
    unnecessary details.'
  id: totrans-340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重点：摘要有助于保持对主题关键方面的关注，避免不必要的细节。
- en: 'Relevance: Requesting summaries ensures that the information provided is directly
    relevant to your needs, highlighting the most important elements.'
  id: totrans-341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：请求摘要确保提供的信息直接与您的需求相关，突出最重要的元素。
- en: 'How to Request SummariesTo effectively request summaries in your prompts, consider
    the following strategies:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求摘要 为了有效地在提示中请求摘要，请考虑以下策略：
- en: 'Specify the Scope: Clearly define the scope of the summary you are requesting.
    Indicate whether you need a brief overview or a more detailed summary.'
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确范围：明确您请求的摘要范围。指出您需要的是简短概述还是更详细的摘要。
- en: 'Use Direct Language: Use straightforward and direct language to request the
    summary, ensuring that the AI understands your need.'
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求摘要，确保AI理解您的需求。
- en: 'Highlight Key Points: Ask for the main points or key elements to be highlighted
    in the summary.'
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 突出重点：要求在摘要中突出主要点或关键元素。
- en: 'Set Length Limits: Specify any length limits for the summary, such as word
    count or number of sentences.'
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置长度限制：指定摘要的长度限制，例如字数或句子数。
- en: 'Provide Context: Include any relevant context that can help the AI tailor the
    summary to your specific requirements.'
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于AI根据你的具体要求定制总结的相关上下文。
- en: Examples of Requesting Summaries
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 请求总结的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Summary Prompt: "Can
    you provide a brief summary of the process of photosynthesis, highlighting the
    main stages?"'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”总结提示：“你能提供光合作用过程的简要总结，并突出主要阶段吗？”
- en: 'General Prompt: "Describe the causes of World War I." Summary Prompt: "Can
    you summarize the main causes of World War I in a few sentences?"'
  id: totrans-350
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述第一次世界大战的原因。”总结提示：“你能用几句话总结第一次世界大战的主要原因吗？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Summary Prompt:
    "Can you provide a concise summary of the key benefits of renewable energy sources?"'
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”总结提示：“你能提供可再生能源关键好处的简洁总结吗？”
- en: Common Pitfalls to Avoid
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague requests for summaries. Be specific about what
    you need to ensure clarity and relevance.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的请求：避免对总结提出模糊的请求。确保具体，以确保清晰和相关性。
- en: 'Overly Detailed Requests: While requesting a summary, avoid asking for too
    much detail. The goal is to condense the information into its essential points.'
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于详细的要求：在请求总结时，避免要求过多细节。目标是将信息浓缩到其基本要点。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    summaries. Provide enough background information to frame the summary.'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致总结不完整或不准确。提供足够的背景信息以构建总结框架。
- en: ConclusionRequesting summaries is a highly effective technique in prompt engineering
    that enhances clarity, efficiency, focus, and relevance. By specifying the scope,
    using direct language, highlighting key points, setting length limits, and providing
    context, you can craft prompts that yield concise and informative summaries from
    ChatGPT. Avoiding pitfalls such as vague requests, overly detailed requests, and
    lack of context will further improve the effectiveness of your interactions with
    ChatGPT.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求总结是提示工程中一种非常有效的技术，它增强了清晰度、效率、专注度和相关性。通过指定范围、使用直接语言、突出重点、设定长度限制和提供上下文，你可以构建出从ChatGPT获得简洁且信息丰富的总结的提示。避免如模糊请求、过于详细的要求和缺乏上下文等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: '*'
- en: 'Chapter 17: Ask for ListsAsking for lists in your prompts is a practical technique
    in prompt engineering that helps organize information into clear and structured
    formats. Lists can be used to present ideas, facts, steps, or comparisons in a
    way that is easy to read and understand. This chapter will explore the importance
    of asking for lists and how to effectively incorporate this technique into your
    prompts.Importance of Asking for Lists'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 第17章：请求列表在提示中请求列表是提示工程中的一种实用技术，有助于将信息组织成清晰和结构化的格式。列表可以用来以易于阅读和理解的方式呈现想法、事实、步骤或比较。本章将探讨请求列表的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Lists present information in a clear and straightforward manner, making
    it easier to understand and follow.'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：列表以清晰和直接的方式呈现信息，使其更容易理解和遵循。
- en: 'Organization: Organizing information into lists helps structure the response,
    ensuring that each point is distinct and easy to locate.'
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 组织结构：将信息组织成列表有助于构建响应结构，确保每个要点都是明确的且易于定位。
- en: 'Focus: Lists help maintain focus on specific items or steps, reducing the likelihood
    of missing important details.'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注度：列表有助于保持对特定项目或步骤的专注，减少遗漏重要细节的可能性。
- en: 'Readability: Information presented in list format is generally more readable
    and accessible, enhancing overall comprehension.'
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可读性：以列表形式呈现的信息通常更易于阅读和获取，从而增强整体理解。
- en: 'How to Ask for ListsTo effectively ask for lists in your prompts, consider
    the following strategies:'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求列表为了有效地在提示中请求列表，考虑以下策略：
- en: 'Specify the Type of List: Clearly indicate the type of list you are requesting,
    such as a numbered list, bullet points, or a checklist.'
  id: totrans-364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定列表类型：明确指出你请求的列表类型，如编号列表、项目符号或清单。
- en: 'Define the Scope: Specify the scope or criteria for the items to be included
    in the list. This helps the AI focus on the most relevant points.'
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义范围：指定列表中要包含的项目范围或标准。这有助于AI专注于最相关的要点。
- en: 'Use Direct Language: Use straightforward and direct language to request the
    list, ensuring that the AI understands your need.'
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接的语言请求列表，确保AI理解您的需求。
- en: 'Limit the Number of Items: If applicable, set a limit on the number of items
    in the list to keep the response concise and manageable.'
  id: totrans-367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 限制项目数量：如果适用，对列表中的项目数量设定限制，以保持响应简洁且易于管理。
- en: 'Provide Context: Include any relevant context that can help the AI tailor the
    list to your specific requirements.'
  id: totrans-368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于AI根据您的特定要求调整列表的相关上下文。
- en: Examples of Asking for Lists
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 请求列表的示例
- en: 'General Prompt: "Explain the benefits of exercise." List Prompt: "Can you list
    the top five benefits of regular exercise for overall health?"'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释锻炼的好处。” 列表提示：“你能列出对整体健康有益的常规锻炼的前五项好处吗？”
- en: 'General Prompt: "Describe the steps to start a business." List Prompt: "Can
    you provide a step-by-step checklist for starting a small business?"'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述开始创业的步骤。” 列表提示：“你能提供一份启动小型企业的逐步清单吗？”
- en: 'General Prompt: "What are the causes of climate change?" List Prompt: "Can
    you list the main human activities that contribute to climate change?"'
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？” 列表提示：“你能列出导致气候变化的 主要人类活动吗？”
- en: Common Pitfalls to Avoid
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague requests for lists. Be specific about what you
    need to ensure clarity and relevance.'
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对列表提出含糊不清的请求。确保具体说明您需要的内容，以确保清晰和相关性。
- en: 'Overly Long Lists: While lists are useful, overly long lists can be overwhelming.
    Limit the number of items to keep the response concise.'
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过长的列表：虽然列表很有用，但过长的列表可能会让人感到不知所措。限制项目数量以保持响应简洁。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    lists. Provide enough background information to frame the list.'
  id: totrans-376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致列表不完整或不准确。提供足够的背景信息以界定列表。
- en: ConclusionAsking for lists is a practical and effective technique in prompt
    engineering that enhances clarity, organization, focus, and readability. By specifying
    the type of list, defining the scope, using direct language, limiting the number
    of items, and providing context, you can craft prompts that yield clear and structured
    lists from ChatGPT. Avoiding pitfalls such as vague requests, overly long lists,
    and lack of context will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求列表是提示工程中的一种实用且有效的技术，可以增强清晰度、组织性、重点和可读性。通过指定列表类型、定义范围、使用直接语言、限制项目数量和提供上下文，您可以从ChatGPT中构建出清晰和结构化的列表。避免诸如含糊不清的请求、过长的列表和缺乏上下文等陷阱，将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 18: Specify FormatSpecifying the format in your prompts is an essential
    technique in prompt engineering that ensures the AI''s responses are presented
    in a clear, organized, and usable manner. Whether you need information in bullet
    points, tables, paragraphs, or any other format, specifying this in your prompt
    can greatly enhance the utility and readability of the response. This chapter
    will explore the importance of specifying format and how to effectively incorporate
    this technique into your prompts.Importance of Specifying Format'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 第18章：指定格式在您的提示中指定格式是提示工程中的一个基本技巧，确保AI的响应以清晰、有组织和可用的方式呈现。无论您需要以项目符号、表格、段落或其他任何格式呈现信息，指定这一点都可以大大提高响应的实用性和可读性。本章将探讨指定格式的重要性以及如何有效地将此技巧融入您的提示中。指定格式的意义
- en: 'Clarity: Specifying the format helps the AI present information in a clear
    and structured way, making it easier to understand.'
  id: totrans-380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：指定格式有助于AI以清晰和结构化的方式呈现信息，使其更容易理解。
- en: 'Usability: Information presented in the desired format is more practical and
    easier to use for your specific needs.'
  id: totrans-381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：以所需格式呈现的信息更实用，更容易满足您的特定需求。
- en: 'Consistency: Consistent formatting ensures that the information is organized
    uniformly, enhancing overall comprehension and readability.'
  id: totrans-382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一致性：一致的格式确保信息以统一的方式组织，增强整体的可理解性和可读性。
- en: 'Efficiency: Specifying the format can save time by reducing the need to reformat
    the information yourself.'
  id: totrans-383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 效率：指定格式可以通过减少自行重新格式化信息的需求来节省时间。
- en: 'How to Specify FormatTo effectively specify the format in your prompts, consider
    the following strategies:'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定格式为了有效地在您的提示中指定格式，考虑以下策略：
- en: 'State the Desired Format: Clearly state the format you want the response to
    be in, such as bullet points, tables, paragraphs, etc.'
  id: totrans-385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确所需格式：清楚地说明您希望响应采用的格式，例如项目符号、表格、段落等。
- en: 'Be Specific: Provide detailed instructions on how you want the information
    organized, including any specific headings, columns, or sections.'
  id: totrans-386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：提供关于如何组织信息的详细说明，包括任何特定的标题、列或部分。
- en: 'Use Examples: If possible, provide examples of the desired format to guide
    the AI in generating the response.'
  id: totrans-387
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用示例：如果可能，提供所需格式的示例，以引导AI生成响应。
- en: 'Indicate Length or Scope: Specify any length or scope requirements for the
    formatted response to ensure it meets your needs.'
  id: totrans-388
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指示长度或范围：指定格式化响应的长度或范围要求，以确保其满足您的需求。
- en: 'Ask for Confirmation: Request confirmation that the AI understands the formatting
    instructions before proceeding with the detailed response.'
  id: totrans-389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求确认：在继续详细响应之前，请求AI确认其是否理解了格式说明。
- en: Examples of Specifying Format
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 格式指定示例
- en: 'General Prompt: "Describe the benefits of renewable energy." Format-Specified
    Prompt: "Can you list the benefits of renewable energy in bullet points, with
    each point focusing on a different type of renewable energy source?"'
  id: totrans-391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述可再生能源的好处。”格式指定提示：“你能用项目符号列出可再生能源的好处，每个点都关注不同类型的可再生能源来源吗？”
- en: 'General Prompt: "Explain the process of photosynthesis." Format-Specified Prompt:
    "Can you explain the process of photosynthesis in a step-by-step format, with
    each step numbered?"'
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”格式指定提示：“你能以逐步格式解释光合作用的过程，每个步骤都编号吗？”
- en: 'General Prompt: "What are the causes of World War I?" Format-Specified Prompt:
    "Can you summarize the main causes of World War I in a table with two columns:
    one for the cause and one for its description?"'
  id: totrans-393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“第一次世界大战的原因是什么？”格式指定提示：“你能用两个列的表格总结第一次世界大战的主要原因及其描述吗？一列是原因，另一列是描述？”
- en: Common Pitfalls to Avoid
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Format Instructions: Avoid vague or ambiguous format instructions. Be
    specific about what you need to ensure clarity.'
  id: totrans-395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊的格式说明：避免模糊或含糊不清的格式说明。确保具体说明您需要的内容以确保清晰度。
- en: 'Overly Complex Formats: While detailed formats are useful, overly complex instructions
    can be confusing. Keep the format instructions clear and manageable.'
  id: totrans-396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的格式：虽然详细的格式很有用，但过于复杂的说明可能会令人困惑。保持格式说明清晰且易于管理。
- en: 'Ignoring Confirmation: Skipping the step of confirming the AI''s understanding
    of the format can lead to inaccurate or inconsistent responses. Always ask for
    confirmation if needed.'
  id: totrans-397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略确认：跳过确认AI对格式理解步骤可能导致不准确或不一致的响应。如有需要，请始终请求确认。
- en: ConclusionSpecifying the format in your prompts is a crucial practice in prompt
    engineering that enhances clarity, usability, consistency, and efficiency. By
    stating the desired format, being specific, using examples, indicating length
    or scope, and asking for confirmation, you can ensure that the AI's responses
    are presented in a clear, organized, and usable manner. Avoiding pitfalls such
    as vague format instructions, overly complex formats, and ignoring confirmation
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在您的提示中指定格式是提示工程中的关键实践，它增强了清晰度、可用性、一致性和效率。通过说明所需格式、具体说明、使用示例、指示长度或范围以及请求确认，您可以确保AI的响应以清晰、有组织且可用的方式呈现。避免诸如模糊的格式说明、过于复杂的格式和忽略确认等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 19: Define Time FramesDefining time frames in your prompts is an important
    technique in prompt engineering that provides context and relevance to the AI''s
    responses. Time frames help specify the period you are interested in, ensuring
    that the information is accurate and pertinent to your needs. This chapter will
    explore the importance of defining time frames and how to effectively incorporate
    this technique into your prompts.Importance of Defining Time Frames'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 第19章：定义时间框架在提示中定义时间框架是提示工程中的重要技巧，它为AI的响应提供了上下文和相关性。时间框架有助于指定您感兴趣的时期，确保信息准确且与您的需求相关。本章将探讨定义时间框架的重要性以及如何有效地将此技巧融入您的提示中。定义时间框架的重要性
- en: 'Relevance: Time frames ensure that the information provided is relevant to
    the specific period you are interested in.'
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：时间框架确保提供的信息与您感兴趣的特定时期相关。
- en: 'Accuracy: Specifying time frames helps the AI focus on data or events from
    the correct period, enhancing the accuracy of the response.'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：指定时间框架有助于AI关注正确时期的数据或事件，提高响应的准确性。
- en: 'Context: Time frames provide context for the information, making it easier
    to understand historical trends, developments, or changes over time.'
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：时间框架为信息提供背景，使理解历史趋势、发展或随时间的变化变得更容易。
- en: 'Comparisons: Defining time frames allows for comparisons between different
    periods, helping to highlight changes or patterns.'
  id: totrans-404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较：定义时间框架允许在不同时期之间进行比较，有助于突出变化或模式。
- en: 'How to Define Time FramesTo effectively define time frames in your prompts,
    consider the following strategies:'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 如何定义时间框架为了在提示中有效地定义时间框架，考虑以下策略：
- en: 'Specify the Period: Clearly state the time frame you are interested in, including
    specific years, decades, centuries, or historical periods.'
  id: totrans-406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定时期：清楚地说明你感兴趣的时间框架，包括具体的年份、十年、世纪或历史时期。
- en: 'Use Precise Language: Use precise and unambiguous language to define the time
    frame, ensuring that the AI understands your request.'
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用精确语言：使用精确且无歧义的语言来定义时间框架，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context that helps frame the time frame
    within the broader scope of your query.'
  id: totrans-408
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于在更广泛的查询范围内界定时间框架的相关背景信息。
- en: 'Indicate Relevance: Explain why the specified time frame is relevant to your
    question, helping the AI tailor its response accordingly.'
  id: totrans-409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表明相关性：解释为什么指定的时间框架与你的问题相关，帮助AI相应地调整其响应。
- en: 'Ask for Comparisons: If applicable, request comparisons between different time
    frames to highlight changes or trends.'
  id: totrans-410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求比较：如果适用，请求在不同时间框架之间的比较，以突出变化或趋势。
- en: Examples of Defining Time Frames
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 定义时间框架的示例
- en: 'General Prompt: "Describe the impact of industrialization." Time Frame-Specified
    Prompt: "Describe the impact of industrialization in Europe during the late 19th
    century."'
  id: totrans-412
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述工业化的影响。” 时间框架指定提示：“描述19世纪末欧洲工业化的影响。”
- en: 'General Prompt: "Explain the causes of climate change." Time Frame-Specified
    Prompt: "Explain the main causes of climate change over the past 50 years."'
  id: totrans-413
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 时间框架指定提示：“过去50年中气候变化的主要原因。”
- en: 'General Prompt: "What are the benefits of renewable energy?" Time Frame-Specified
    Prompt: "What are the benefits of renewable energy technologies developed in the
    last decade?"'
  id: totrans-414
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？” 时间框架指定提示：“过去十年中开发的可再生能源技术有哪些好处？”
- en: Common Pitfalls to Avoid
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Time Frames: Avoid using vague or ambiguous time frames. Be specific
    about the period you are interested in to ensure clarity.'
  id: totrans-416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊时间框架：避免使用模糊或含糊的时间框架。对你感兴趣的时期要具体，以确保清晰。
- en: 'Assuming Understanding: Do not assume that the AI will infer the correct time
    frame without explicit instructions. Clearly state the period you are referring
    to.'
  id: totrans-417
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设理解：不要假设AI会在没有明确指令的情况下推断出正确的时间框架。清楚地说明你所指的时期。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the time frame.'
  id: totrans-418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致不完整或不准确的响应。提供足够的背景信息来界定时间框架。
- en: ConclusionDefining time frames in your prompts is a critical practice in prompt
    engineering that enhances relevance, accuracy, context, and comparisons. By specifying
    the period, using precise language, providing context, indicating relevance, and
    asking for comparisons, you can ensure that the AI's responses are accurate and
    pertinent to your specific needs. Avoiding pitfalls such as vague time frames,
    assuming understanding, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中定义时间框架是提示工程中的一个关键实践，它增强了相关性、准确性、背景和比较。通过指定时期，使用精确的语言，提供背景，表明相关性，并请求比较，你可以确保AI的响应是准确且与你的特定需求相关的。避免如模糊时间框架、假设理解、忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 20: Use HypotheticalsUsing hypotheticals in your prompts is a powerful
    technique in prompt engineering that allows you to explore different possibilities,
    scenarios, and outcomes. Hypotheticals stimulate creative thinking and can provide
    insights into how certain actions or events might impact a situation. This chapter
    will explore the importance of using hypotheticals and how to effectively incorporate
    this technique into your prompts.Importance of Using Hypotheticals'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 第20章：使用假设
- en: 'Exploration: Hypotheticals allow you to explore various scenarios and possibilities,
    gaining insights into potential outcomes.'
  id: totrans-422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设允许你探索各种场景和可能性，从而深入了解潜在的结果。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-423
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案来鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypotheticals can help identify potential problems and solutions
    by simulating different situations.'
  id: totrans-424
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：假设可以通过模拟不同情况来帮助识别潜在问题和解决方案。
- en: 'Engagement: Using hypotheticals makes the interaction more engaging and dynamic,
    fostering a deeper exploration of the topic.'
  id: totrans-425
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：使用假设可以使互动更加吸引人和动态，促进对主题的深入探索。
- en: 'How to Use HypotheticalsTo effectively use hypotheticals in your prompts, consider
    the following strategies:'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-427
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设场景构造成“如果……会怎样”的问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-428
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设场景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-429
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束条件，以引导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设场景请求具体的成果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造性：邀请AI进行创造性思考，并考虑非常规解决方案或观点。
- en: Examples of Using Hypotheticals
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设的例子
- en: 'General Prompt: "Describe the benefits of renewable energy." Hypothetical Prompt:
    "What if a country transitioned to 100% renewable energy? What would be the economic,
    environmental, and social impacts?"'
  id: totrans-433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述可再生能源的好处。” 假设提示：“如果某个国家过渡到100%的可再生能源，经济、环境和社交影响会是什么？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Prompt:
    "What if all countries agreed to cut their carbon emissions by 50% in the next
    decade? How would this impact global climate change?"'
  id: totrans-434
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 假设提示：“如果所有国家都同意在下一个十年内减少50%的碳排放，这将对全球气候变化产生什么影响？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Prompt: "What if a country with an authoritarian regime transitioned to a democratic
    government? What challenges and opportunities might arise during this transition?"'
  id: totrans-435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 假设提示：“如果一个实行威权主义的国家的政体过渡到民主政府，这个过渡过程中可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-437
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的场景：避免创建过于复杂或混乱的假设场景。保持场景清晰和集中。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-438
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设场景的条件和参数定义清晰，以避免混淆。
- en: 'Ignoring Feasibility: While hypotheticals encourage creative thinking, consider
    balancing creativity with some level of feasibility to ensure practical relevance.'
  id: totrans-439
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设鼓励创造性思维，但考虑在创造性与可行性之间取得平衡，以确保其实用相关性。
- en: ConclusionUsing hypotheticals in your prompts is a powerful technique in prompt
    engineering that enhances exploration, creative thinking, problem-solving, and
    engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypotheticals to explore different possibilities and
    scenarios. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 21: Ask for ClarificationsAsking for clarifications in your prompts
    is a crucial technique in prompt engineering that ensures you obtain clear, accurate,
    and relevant information. When the AI''s response is ambiguous or incomplete,
    requesting clarifications helps refine the answer and address any uncertainties.
    This chapter will explore the importance of asking for clarifications and how
    to effectively incorporate this technique into your prompts.Importance of Asking
    for Clarifications'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
- en: 'Accuracy: Clarifications help ensure that the information provided is accurate
    and aligns with your query.'
  id: totrans-443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Relevance: By requesting clarifications, you can ensure that the response is
    directly relevant to your needs.'
  id: totrans-444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Clarity: Clarifications help eliminate ambiguities and make the information
    easier to understand.'
  id: totrans-445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Thoroughness: Asking for clarifications encourages the AI to provide more detailed
    and comprehensive answers.'
  id: totrans-446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'How to Ask for ClarificationsTo effectively ask for clarifications in your
    prompts, consider the following strategies:'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
- en: 'Identify Ambiguities: Pinpoint any ambiguous or unclear parts of the AI''s
    response that need further explanation.'
  id: totrans-448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Be Specific: Clearly state what you need clarified, specifying the exact points
    or details that require further information.'
  id: totrans-449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use Follow-Up Questions: Pose follow-up questions to delve deeper into specific
    aspects of the response.'
  id: totrans-450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Request Examples: Ask for examples to illustrate complex concepts or points
    that need clarification.'
  id: totrans-451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Confirm Understanding: Request confirmation that the AI has understood your
    query correctly before providing further details.'
  id: totrans-452
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples of Asking for Clarifications
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "Describe the benefits of exercise." Clarification Prompt:
    "You mentioned that exercise improves mental health. Can you provide more details
    on how exercise affects mental well-being?"'
  id: totrans-455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "What are the causes of climate change?" Clarification Prompt:
    "You listed several causes of climate change. Can you explain how deforestation
    specifically contributes to climate change?"'
  id: totrans-456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Common Pitfalls to Avoid
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
- en: 'Vague Requests for Clarification: Avoid vague or general requests for clarification.
    Be specific about what you need clarified to ensure accuracy.'
  id: totrans-458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ignoring Ambiguities: Do not ignore ambiguous or unclear parts of the response.
    Address them promptly to ensure a comprehensive understanding.'
  id: totrans-459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略歧义：不要忽略响应中模糊或不清楚的部分。及时解决它们以确保全面理解。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionAsking for clarifications is a critical practice in prompt engineering
    that enhances accuracy, relevance, clarity, and thoroughness. By identifying ambiguities,
    being specific, using follow-up questions, requesting examples, and confirming
    understanding, you can ensure that ChatGPT provides clear and accurate information
    tailored to your needs. Avoiding pitfalls such as vague requests for clarification,
    ignoring ambiguities, and overloading with questions will further improve the
    effectiveness of your interactions with ChatGPT.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求澄清是提示工程中的关键实践，它通过提高准确性、相关性、清晰性和全面性来增强效果。通过识别歧义、具体化、使用后续问题、请求示例和确认理解，你可以确保ChatGPT提供符合你需求的信息。避免陷入模糊的澄清请求、忽略歧义和过度提问等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 22: Use AnalogiesUsing analogies in your prompts is a valuable technique
    in prompt engineering that helps explain complex concepts by relating them to
    more familiar ideas. Analogies can make abstract or difficult topics more understandable
    and relatable. This chapter will explore the importance of using analogies and
    how to effectively incorporate this technique into your prompts.Importance of
    Using Analogies'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十二章：使用类比在提示中使用类比是提示工程中的一个宝贵技巧，它通过将复杂概念与更熟悉的想法联系起来来帮助解释。类比可以使抽象或难以理解的主题更容易理解和相关。本章将探讨使用类比的重要性以及如何有效地将此技术融入你的提示中。使用类比的重要性
- en: 'Clarity: Analogies help clarify complex or abstract concepts by comparing them
    to something more familiar and easier to understand.'
  id: totrans-464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：类比通过将复杂或抽象的概念与更熟悉、更容易理解的事物进行比较，有助于阐明这些概念。
- en: 'Relatability: They make information more relatable and engaging, enhancing
    overall comprehension.'
  id: totrans-465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们使信息更具相关性和吸引力，从而增强整体理解。
- en: 'Retention: Analogies can improve memory retention by creating mental associations
    between new and known information.'
  id: totrans-466
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记忆力：类比可以通过在新旧信息之间建立心理联系来提高记忆保留。
- en: 'Insight: Using analogies can provide new insights and perspectives on a topic
    by highlighting similarities and differences.'
  id: totrans-467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过突出相似性和差异性，使用类比可以为话题提供新的见解和视角。
- en: 'How to Use AnalogiesTo effectively use analogies in your prompts, consider
    the following strategies:'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用类比：为了在提示中有效地使用类比，考虑以下策略：
- en: 'Identify the Concept: Clearly identify the complex or abstract concept you
    want to explain.'
  id: totrans-469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地识别你想要解释的复杂或抽象概念。
- en: 'Choose a Familiar Comparison: Select a familiar idea or object that shares
    similarities with the concept you are explaining.'
  id: totrans-470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择熟悉比较：选择一个与你要解释的概念具有相似性的熟悉想法或对象。
- en: 'Highlight the Similarities: Emphasize the key similarities between the complex
    concept and the familiar comparison to make the analogy clear.'
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 突出相似性：强调复杂概念与熟悉比较之间的关键相似性，使类比清晰。
- en: 'Explain the Analogy: Provide a brief explanation of how the analogy relates
    to the concept, ensuring that the comparison is understandable.'
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释类比：简要解释类比如何与概念相关联，确保比较是可理解的。
- en: 'Ask for Analogies: Directly ask the AI to provide analogies to explain complex
    topics, encouraging creative and relatable comparisons.'
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：直接要求AI提供类比来解释复杂主题，鼓励创造性和相关的比较。
- en: Examples of Using Analogies
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 使用类比示例
- en: 'General Prompt: "Explain the process of photosynthesis." Analogy Prompt: "Can
    you explain the process of photosynthesis using an analogy that compares it to
    a factory producing energy?"'
  id: totrans-475
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”类比提示：“你能用类比来解释光合作用的过程吗，比如将其比作一个生产能量的工厂？”
- en: 'General Prompt: "Describe the function of a computer''s CPU." Analogy Prompt:
    "Can you describe the function of a computer''s CPU using an analogy, like comparing
    it to the brain of a human?"'
  id: totrans-476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述计算机CPU的功能。”类比提示：“你能用类比来描述计算机CPU的功能吗，比如将其与人脑进行比较？”
- en: 'General Prompt: "What is blockchain technology?" Analogy Prompt: "Can you explain
    blockchain technology using an analogy that compares it to a digital ledger or
    a shared notebook?"'
  id: totrans-477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”类比提示：“你能用类比的方式解释区块链技术，将其比作数字账本或共享笔记本吗？”
- en: Common Pitfalls to Avoid
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Inappropriate Analogies: Avoid using analogies that do not clearly relate to
    the concept or that might create confusion. Choose analogies that are simple and
    relevant.'
  id: totrans-479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不恰当的类比：避免使用与概念没有明确关联或可能造成混淆的类比。选择简单且相关的类比。
- en: 'Overly Complex Analogies: Analogies should simplify the concept, not make it
    more complex. Keep the comparisons straightforward and easy to understand.'
  id: totrans-480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的类比：类比应该简化概念，而不是使其更复杂。保持比较简单易懂。
- en: 'Ignoring the Explanation: Do not assume that the analogy alone is sufficient.
    Always provide an explanation of how the analogy relates to the concept.'
  id: totrans-481
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要假设类比本身就足够了。始终提供解释，说明类比如何与概念相关。
- en: ConclusionUsing analogies in your prompts is a powerful technique in prompt
    engineering that enhances clarity, relatability, retention, and insight. By identifying
    the concept, choosing a familiar comparison, highlighting the similarities, explaining
    the analogy, and asking for analogies, you can craft prompts that effectively
    utilize analogies to explain complex topics. Avoiding pitfalls such as inappropriate
    analogies, overly complex analogies, and ignoring the explanation will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用类比是提示工程中的一种强大技术，可以增强清晰度、相关性、记忆力和洞察力。通过识别概念、选择熟悉的比较、突出相似之处、解释类比和请求类比，你可以制作出有效地利用类比来解释复杂主题的提示。避免诸如不恰当的类比、过于复杂的类比和忽略解释等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 23: Seek DefinitionsSeeking definitions in your prompts is a fundamental
    technique in prompt engineering that helps clarify terms, concepts, and jargon.
    Definitions provide precise explanations that can enhance understanding and eliminate
    ambiguity. This chapter will explore the importance of seeking definitions and
    how to effectively incorporate this technique into your prompts.Importance of
    Seeking Definitions'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 第23章：寻求定义在提示工程中，寻求定义是一项基本技术，有助于明确术语、概念和行话。定义提供了精确的解释，可以增强理解并消除歧义。本章将探讨寻求定义的重要性以及如何有效地将这项技术融入你的提示中。寻求定义的重要性
- en: 'Clarity: Definitions provide clear and precise explanations of terms, making
    complex or unfamiliar concepts easier to understand.'
  id: totrans-485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：定义提供了术语的清晰和精确解释，使复杂或不熟悉的概念更容易理解。
- en: 'Accuracy: Seeking definitions ensures that you have an accurate understanding
    of specific terms and concepts.'
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求定义确保你对特定术语和概念有准确的理解。
- en: 'Relevance: Definitions help contextualize terms within a specific field or
    topic, enhancing the relevance of the information.'
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：定义有助于在特定领域或主题中定位术语，增强信息的相关性。
- en: 'Foundation: Understanding definitions lays the foundation for more advanced
    discussions and learning, providing a solid base for further exploration.'
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基础：理解定义是更高级讨论和学习的基础，为进一步的探索提供了坚实的基础。
- en: 'How to Seek DefinitionsTo effectively seek definitions in your prompts, consider
    the following strategies:'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求定义为了有效地在提示中寻求定义，考虑以下策略：
- en: 'Identify the Term: Clearly identify the specific term or concept you need defined.'
  id: totrans-490
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别术语：清楚地识别需要定义的特定术语或概念。
- en: 'Be Specific: Specify any particular aspects of the term you are interested
    in, such as its application or context.'
  id: totrans-491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的术语的特定方面，例如其应用或背景。
- en: 'Ask for Contextual Definitions: Request definitions that are relevant to a
    specific field or topic to ensure that the explanation is applicable.'
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求上下文定义：请求与特定领域或主题相关的定义，以确保解释适用。
- en: 'Use Direct Language: Use straightforward and direct language to ask for definitions,
    ensuring that the AI understands your request.'
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求定义，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the definition and provide
    additional clarity.'
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例来说明定义并提供额外的清晰度。
- en: Examples of Seeking Definitions
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求定义的示例
- en: 'General Prompt: "Explain what photosynthesis is." Definition Prompt: "Can you
    define photosynthesis and explain its importance in plant biology?"'
  id: totrans-496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释光合作用是什么。" 定义提示："你能定义光合作用并解释它在植物生物学中的重要性吗？"
- en: 'General Prompt: "Describe blockchain technology." Definition Prompt: "Can you
    provide a definition of blockchain technology and explain how it is used in cryptocurrencies?"'
  id: totrans-497
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述区块链技术。" 定义提示："你能提供区块链技术的定义并解释它在加密货币中的应用吗？"
- en: 'General Prompt: "What is quantum computing?" Definition Prompt: "Can you define
    quantum computing and provide an example of how it differs from classical computing?"'
  id: totrans-498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："什么是量子计算？" 定义提示："你能定义量子计算并提供一个它与经典计算不同的例子吗？"
- en: Common Pitfalls to Avoid
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: '******'
- en: 'Vague Requests: Avoid vague or general requests for definitions. Be specific
    about what you need to ensure clarity and accuracy.'
  id: totrans-500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对定义的模糊或一般性请求。确保具体化，以确保清晰和准确性。
- en: 'Ignoring Context: Omitting the context can lead to incomplete or irrelevant
    definitions. Provide enough background information to frame the definition.'
  id: totrans-501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略上下文可能导致定义不完整或不相关。提供足够的背景信息来界定定义。
- en: 'Assuming Prior Knowledge: Do not assume that the AI understands the specific
    context of your query without clear instructions. Explicitly state the context
    if necessary.'
  id: totrans-502
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设先验知识：不要假设AI在没有明确指令的情况下理解你查询的具体上下文。如有必要，明确地说明上下文。
- en: ConclusionSeeking definitions is a fundamental practice in prompt engineering
    that enhances clarity, accuracy, relevance, and foundational understanding. By
    identifying the term, being specific, asking for contextual definitions, using
    direct language, and requesting examples, you can ensure that ChatGPT provides
    clear and precise definitions tailored to your needs. Avoiding pitfalls such as
    vague requests, ignoring context, and assuming prior knowledge will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求定义是提示工程中的基本实践，它增强了清晰度、准确性、相关性和基础理解。通过识别术语、具体化、请求上下文定义、使用直接语言和请求示例，你可以确保ChatGPT提供符合你需求的清晰和精确的定义。避免诸如模糊请求、忽略上下文和假设先验知识等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度：详细的解释有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Chapter 24: Ask for ExplanationsAsking for explanations in your prompts is
    a key technique in prompt engineering that helps you gain a deeper understanding
    of concepts, processes, and phenomena. Explanations provide detailed and comprehensive
    insights that can enhance learning and comprehension. This chapter will explore
    the importance of asking for explanations and how to effectively incorporate this
    technique into your prompts.Importance of Asking for Explanations'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 第24章：请求解释在提示中请求解释是提示工程的关键技术，有助于你更深入地理解概念、过程和现象。解释提供了详细和全面的见解，可以增强学习和理解。本章将探讨请求解释的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Depth: Explanations provide in-depth insights into how things work, enhancing
    your understanding of complex topics.'
  id: totrans-506
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：解释提供了深入了解事物如何运作的见解，增强了你对复杂主题的理解。
- en: 'Clarity: Detailed explanations help clarify abstract or difficult concepts,
    making them more accessible and understandable.'
  id: totrans-507
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释的重要性
- en: 'Context: Explanations provide context, helping you understand the broader implications
    and relationships between different concepts.'
  id: totrans-508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：解释提供上下文，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Asking for explanations encourages a more interactive and engaging
    learning experience, fostering curiosity and exploration.'
  id: totrans-509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Ask for ExplanationsTo effectively ask for explanations in your prompts,
    consider the following strategies:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解释为了在提示中有效地请求解释，考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-511
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：清楚地说明你需要解释的内容，包括你感兴趣的任何特定方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request explanations,
    ensuring that the AI understands your query.'
  id: totrans-512
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定解释的相关上下文或背景信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：要求示例以说明解释并提供额外的清晰度。
- en: Examples of Asking for Explanations
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Explanation Prompt: "Can
    you explain how photosynthesis works, including the role of chlorophyll and the
    different stages of the process?"'
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释光合作用是如何工作的。" 解释提示："你能解释光合作用是如何工作的，包括叶绿素的作用和过程的不同阶段？"
- en: 'General Prompt: "Describe blockchain technology." Explanation Prompt: "Can
    you explain how blockchain technology works, including how transactions are verified
    and added to the blockchain?"'
  id: totrans-518
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述区块链技术。" 解释提示："你能解释区块链技术是如何工作的，包括交易是如何被验证并添加到区块链中的？"
- en: 'General Prompt: "What is quantum computing?" Explanation Prompt: "Can you explain
    the principles of quantum computing, including the concepts of superposition and
    entanglement?"'
  id: totrans-519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："什么是量子计算？" 解释提示："你能解释量子计算的原则，包括叠加和纠缠的概念？"
- en: Common Pitfalls to Avoid
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for explanations. Be specific
    about what you need to ensure clarity and comprehensiveness.'
  id: totrans-521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的解释请求。确保具体说明你需要的内容，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致解释不完整或不准确。提供足够的信息以构建解释框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionAsking for explanations is a key practice in prompt engineering that
    enhances depth, clarity, context, and engagement. By being specific, using direct
    language, providing context, asking for step-by-step explanations, and requesting
    examples, you can ensure that ChatGPT provides detailed and comprehensive explanations
    tailored to your needs. Avoiding pitfalls such as vague requests, lack of context,
    and overly broad questions will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 25: Prompt for PredictionsPrompting for predictions in your prompts
    is an insightful technique in prompt engineering that allows you to explore future
    possibilities and trends based on current data or patterns. Predictions can provide
    valuable foresight and help you anticipate potential outcomes. This chapter will
    explore the importance of prompting for predictions and how to effectively incorporate
    this technique into your prompts.Importance of Prompting for Predictions'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 第25章：预测提示
- en: 'Foresight: Predictions provide a glimpse into potential future developments,
    helping you prepare for and adapt to possible changes.'
  id: totrans-527
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 先见之明：预测提供了对潜在未来发展的洞察，帮助你为可能的变化做好准备和适应。
- en: 'Insight: They offer insights into trends and patterns, enhancing your understanding
    of how current events might evolve.'
  id: totrans-528
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们提供了对趋势和模式的见解，增强了你对当前事件可能如何发展的理解。
- en: 'Decision-Making: Predictions can inform decision-making by highlighting possible
    outcomes and their implications.'
  id: totrans-529
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：预测可以通过突出可能的结果及其影响来提供决策信息。
- en: 'Exploration: Prompting for predictions encourages exploration of various scenarios,
    fostering a deeper understanding of complex systems and dynamics.'
  id: totrans-530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：预测提示鼓励探索各种场景，促进对复杂系统和动态的深入理解。
- en: 'How to Prompt for PredictionsTo effectively prompt for predictions in your
    prompts, consider the following strategies:'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 如何进行预测提示
- en: 'Identify the Topic: Clearly identify the topic or area you want predictions
    about, ensuring that the AI understands the context.'
  id: totrans-532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确指出你想要预测的主题或领域，确保AI理解上下文。
- en: 'Specify the Time Frame: Define the time frame for the prediction, such as short-term,
    medium-term, or long-term, to provide a clear focus.'
  id: totrans-533
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定时间范围：定义预测的时间范围，如短期、中期或长期，以提供明确的焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request predictions,
    ensuring that the AI understands your query.'
  id: totrans-534
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求预测，确保AI理解你的查询。
- en: 'Ask for Rationale: Request an explanation or rationale for the predictions
    to understand the underlying reasoning and factors.'
  id: totrans-535
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求解释理由：请求解释或理由以了解预测背后的推理和因素。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the predictions.'
  id: totrans-536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建预测的相关上下文或背景信息。
- en: Examples of Prompting for Predictions
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 预测提示示例
- en: 'General Prompt: "What is the future of renewable energy?" Prediction Prompt:
    "Can you predict the future of renewable energy over the next decade, including
    potential advancements and challenges?"'
  id: totrans-538
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的未来是什么？”预测提示：“你能预测未来十年可再生能源的发展趋势和潜在挑战吗？”
- en: 'General Prompt: "Describe the impact of climate change." Prediction Prompt:
    "Can you predict the impact of climate change on global agriculture in the next
    20 years?"'
  id: totrans-539
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”预测提示：“你能预测未来20年气候变化对全球农业的影响吗？”
- en: 'General Prompt: "What are the trends in technology?" Prediction Prompt: "Can
    you predict the major trends in technology for the next five years, focusing on
    artificial intelligence and robotics?"'
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“技术趋势是什么？”预测提示：“你能预测未来五年技术的主要趋势，重点关注人工智能和机器人技术吗？”
- en: Common Pitfalls to Avoid
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for predictions. Be specific
    about the topic and time frame to ensure clarity and relevance.'
  id: totrans-542
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对预测进行模糊或一般性的请求。确保主题和时间范围的具体性，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    predictions. Provide enough background information to frame the prediction.'
  id: totrans-543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致预测不完整或不准确。提供足够的背景信息以构建预测。
- en: 'Ignoring Rationale: Do not overlook the importance of understanding the rationale
    behind predictions. Always request explanations to gain insights into the reasoning.'
  id: totrans-544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略理由：不要忽视理解预测背后理由的重要性。始终要求解释以获得洞察力。
- en: ConclusionPrompting for predictions is an insightful practice in prompt engineering
    that enhances foresight, insight, decision-making, and exploration. By identifying
    the topic, specifying the time frame, using direct language, asking for rationale,
    and providing context, you can ensure that ChatGPT provides accurate and relevant
    predictions tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring rationale will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 26: Use Conditional StatementsUsing conditional statements in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different scenarios and their outcomes based on specific conditions. Conditional
    statements help you understand how varying factors might influence a situation.
    This chapter will explore the importance of using conditional statements and how
    to effectively incorporate this technique into your prompts.Importance of Using
    Conditional Statements'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 第26章：使用条件语句在提示中使用条件语句是提示工程中的一种强大技术，它允许你根据特定条件探索不同的场景及其结果。条件语句帮助你理解不同因素可能如何影响一个情况。本章将探讨使用条件语句的重要性以及如何有效地将此技术融入你的提示中。使用条件语句的重要性
- en: 'Scenario Analysis: Conditional statements enable the exploration of various
    scenarios, helping you understand potential outcomes based on different conditions.'
  id: totrans-548
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情景分析：条件语句允许探索各种场景，帮助你理解基于不同条件的潜在结果。
- en: 'Decision-Making: They inform decision-making by highlighting how different
    actions or choices might impact the results.'
  id: totrans-549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：它们通过强调不同的行动或选择可能如何影响结果来提供决策信息。
- en: 'Problem-Solving: Conditional statements facilitate problem-solving by examining
    how changes in variables affect the overall situation.'
  id: totrans-550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：条件语句通过检查变量变化如何影响整体情况来促进问题解决。
- en: 'Clarity: They provide a clear framework for understanding the relationships
    between different factors and their effects.'
  id: totrans-551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们提供了一个清晰的框架，以理解不同因素及其影响之间的关系。
- en: 'How to Use Conditional StatementsTo effectively use conditional statements
    in your prompts, consider the following strategies:'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用条件语句为了在提示中有效地使用条件语句，考虑以下策略：
- en: 'Identify the Condition: Clearly state the condition or variable you are interested
    in, specifying the factors that might change.'
  id: totrans-553
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定条件：明确陈述你感兴趣的特定条件或变量，并指定可能变化的因素。
- en: 'Define the Scenario: Describe the scenario or situation in detail, providing
    enough context for the AI to understand the condition and its potential impact.'
  id: totrans-554
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义场景：详细描述场景或情况，为AI提供足够的信息以理解条件和其潜在影响。
- en: 'Use "If-Then" Language: Frame your prompts using "if-then" language to clearly
    define the condition and the expected outcome.'
  id: totrans-555
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用“如果-那么”语言：使用“如果-那么”语言来构建你的提示，以清楚地定义条件和预期的结果。
- en: 'Ask for Multiple Scenarios: Request multiple scenarios to explore different
    conditions and their respective outcomes.'
  id: totrans-556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个场景：请求多个场景以探索不同的条件和相应的结果。
- en: 'Provide Context: Include any relevant background information that can help
    the AI tailor the response to your specific needs.'
  id: totrans-557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于AI根据你的特定需求定制响应的相关背景信息。
- en: Examples of Using Conditional Statements
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 使用条件语句的示例
- en: 'General Prompt: "Describe the benefits of renewable energy." Conditional Prompt:
    "If all countries adopted 100% renewable energy sources by 2050, what would be
    the environmental and economic impacts?"'
  id: totrans-559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述可再生能源的好处。”条件提示：“如果所有国家到2050年采用100%的可再生能源，环境和经济影响将是什么？”
- en: 'General Prompt: "Explain the causes of climate change." Conditional Prompt:
    "If global carbon emissions were reduced by 50% in the next decade, how would
    this affect global temperature trends?"'
  id: totrans-560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。”条件提示：“如果全球碳排放量在下一个十年减少50%，这将如何影响全球温度趋势？”
- en: 'General Prompt: "What are the key features of a democratic government?" Conditional
    Prompt: "If a country with an authoritarian regime transitioned to a democratic
    government, what challenges and opportunities might arise?"'
  id: totrans-561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”条件提示：“如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Conditions: Avoid using vague or ambiguous conditions. Be specific about
    the variables and scenarios you are interested in.'
  id: totrans-563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊条件：避免使用模糊或不明确的条件。对你感兴趣的变量和场景要具体明确。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the condition.'
  id: totrans-564
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的信息来构建条件。
- en: 'Ignoring Multiple Scenarios: Focusing on a single condition can limit the analysis.
    Request multiple scenarios to explore different possibilities and outcomes.'
  id: totrans-565
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略多个场景：专注于单一条件可能会限制分析。请求多个场景以探索不同的可能性和结果。
- en: ConclusionUsing conditional statements in your prompts is a powerful technique
    in prompt engineering that enhances scenario analysis, decision-making, problem-solving,
    and clarity. By identifying the condition, defining the scenario, using "if-then"
    language, asking for multiple scenarios, and providing context, you can ensure
    that ChatGPT provides accurate and relevant responses tailored to your needs.
    Avoiding pitfalls such as vague conditions, lack of context, and ignoring multiple
    scenarios will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用条件语句是提示工程中的一种强大技术，它增强了情景分析、决策、问题解决和清晰性。通过确定条件、定义场景、使用“如果-那么”语言、请求多个场景和提供上下文，你可以确保ChatGPT提供准确且相关的响应，以满足你的需求。避免诸如模糊条件、缺乏上下文和忽略多个场景等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 27: Ask for ExamplesAsking for examples in your prompts is a practical
    technique in prompt engineering that helps illustrate concepts, clarify explanations,
    and provide concrete instances to support abstract ideas. Examples make information
    more relatable and easier to understand. This chapter will explore the importance
    of asking for examples and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Examples'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 第27章：请求示例在提示中请求示例是提示工程中的一个实用技巧，有助于说明概念、澄清解释并提供具体实例以支持抽象思想。示例使信息更具相关性且更容易理解。本章将探讨请求示例的重要性以及如何有效地将此技巧融入您的提示中。
- en: 'Clarity: Examples help clarify abstract or complex concepts by providing concrete
    instances that illustrate the idea.'
  id: totrans-569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：示例通过提供具体实例来说明抽象或复杂的概念，有助于澄清这些概念。
- en: 'Relatability: They make information more relatable and easier to understand
    by connecting it to familiar situations or objects.'
  id: totrans-570
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过将其与熟悉的情况或对象联系起来，使信息更具相关性且更容易理解。
- en: 'Illustration: Examples serve as illustrations that enhance explanations and
    provide additional context.'
  id: totrans-571
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 说明：示例作为说明，可以增强解释并提供额外的背景信息。
- en: 'Engagement: Using examples makes the interaction more engaging and dynamic,
    fostering a deeper exploration of the topic.'
  id: totrans-572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用示例使互动更具吸引力和动态性，促进对主题的深入探讨。
- en: 'How to Ask for ExamplesTo effectively ask for examples in your prompts, consider
    the following strategies:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求示例：为了在提示中有效地请求示例，请考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or idea you want examples of,
    ensuring that the AI understands the focus of your query.'
  id: totrans-574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明您想要示例的概念或想法，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as types of examples or specific scenarios.'
  id: totrans-575
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定您感兴趣的任何特定方面或细节，例如示例类型或特定场景。
- en: 'Use Direct Language: Use straightforward and direct language to request examples,
    ensuring that the AI understands your request.'
  id: totrans-576
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求示例，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建示例的相关背景信息。
- en: 'Ask for Multiple Examples: Request multiple examples to cover different aspects
    or variations of the concept.'
  id: totrans-578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个示例：请求多个示例以涵盖概念的不同方面或变化。
- en: Examples of Asking for Examples
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 请求示例的例子：
- en: 'General Prompt: "Explain the process of photosynthesis." Example Prompt: "Can
    you provide examples of plants that use photosynthesis and explain how they benefit
    from this process?"'
  id: totrans-580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”示例提示：“你能提供一些利用光合作用的植物例子，并解释它们如何从中受益？”
- en: 'General Prompt: "Describe blockchain technology." Example Prompt: "Can you
    give examples of real-world applications of blockchain technology and explain
    how they work?"'
  id: totrans-581
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”示例提示：“你能给出区块链技术实际应用的例子，并解释它们是如何工作的？”
- en: 'General Prompt: "What is quantum computing?" Example Prompt: "Can you provide
    examples of problems that quantum computing can solve more efficiently than classical
    computing?"'
  id: totrans-582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”示例提示：“你能提供一些量子计算比经典计算更有效地解决的问题的例子？”
- en: Common Pitfalls to Avoid
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误：
- en: 'Vague Requests: Avoid vague or general requests for examples. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的示例请求。确保具体说明您需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or irrelevant
    examples. Provide enough background information to frame the examples.'
  id: totrans-585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致示例不完整或不相关。提供足够的信息来构建示例。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度使用示例：虽然示例很有用，但一次请求太多可能会让人感到不知所措。专注于可管理的示例数量以保持清晰。
- en: ConclusionAsking for examples is a practical and effective technique in prompt
    engineering that enhances clarity, relatability, illustration, and engagement.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for multiple examples, you can ensure that ChatGPT provides clear and
    relevant examples tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overloading with examples will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求示例是提示工程中一种实用且有效的技术，它增强了清晰度、相关性、说明性和参与度。通过识别概念、明确具体、使用直接语言、提供背景和请求多个示例，你可以确保ChatGPT提供符合您需求的清晰和相关的示例。避免诸如请求模糊、缺乏背景和示例过多等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 28: Specify PerspectiveSpecifying the perspective in your prompts is
    an important technique in prompt engineering that helps tailor the AI''s responses
    to a particular viewpoint, role, or context. This approach ensures that the information
    provided is relevant and appropriate for the intended audience or purpose. This
    chapter will explore the importance of specifying perspective and how to effectively
    incorporate this technique into your prompts.Importance of Specifying Perspective'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 第28章：明确视角在提示工程中是一个重要的技术，它有助于使AI的回答适应特定的观点、角色或情境。这种方法确保提供的信息与目标受众或目的相关且适当。本章将探讨明确视角的重要性以及如何有效地将此技术融入你的提示中。明确视角的重要性
- en: 'Relevance: Specifying the perspective ensures that the information is relevant
    and tailored to the specific viewpoint or context you are interested in.'
  id: totrans-590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：明确视角确保信息与您感兴趣的特定视角或情境相关。
- en: 'Clarity: It provides clarity by defining the angle or lens through which the
    topic should be addressed, reducing ambiguity.'
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它通过定义处理主题的角度或透镜，提供清晰度，减少歧义。
- en: 'Engagement: Specifying the perspective makes the interaction more engaging
    by aligning the response with the intended audience or role.'
  id: totrans-592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：明确视角通过使回答与目标受众或角色对齐，使互动更具吸引力。
- en: 'Depth: It allows for a deeper exploration of the topic by considering different
    viewpoints and their implications.'
  id: totrans-593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：它通过考虑不同的观点及其影响，允许对主题进行更深入的探索。
- en: 'How to Specify PerspectiveTo effectively specify the perspective in your prompts,
    consider the following strategies:'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 如何明确视角为了有效地在提示中明确视角，考虑以下策略：
- en: 'Define the Perspective: Clearly state the perspective, role, or context you
    want the AI to adopt, such as a professional viewpoint, a cultural perspective,
    or an educational context.'
  id: totrans-595
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义视角：明确声明AI应采用的视角、角色或情境，例如专业观点、文化视角或教育背景。
- en: 'Be Specific: Specify any particular aspects or details you are interested in
    from the chosen perspective.'
  id: totrans-596
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：从所选角度明确指出你感兴趣的任何特定方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    perspective, ensuring that the AI understands your request.'
  id: totrans-597
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来明确视角，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the perspective.'
  id: totrans-598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何相关的背景信息，这有助于构建视角。
- en: 'Ask for Comparisons: If applicable, request comparisons between different perspectives
    to highlight contrasts and similarities.'
  id: totrans-599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求比较：如果适用，请求不同视角之间的比较，以突出对比和相似之处。
- en: Examples of Specifying Perspective
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 明确视角的示例
- en: 'General Prompt: "Explain the benefits of exercise." Perspective-Specified Prompt:
    "As a fitness coach, explain the benefits of exercise to someone who is new to
    working out."'
  id: totrans-601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释锻炼的好处。”视角明确提示：“作为一名健身教练，向一个刚开始锻炼的人解释锻炼的好处。”
- en: 'General Prompt: "Describe the impact of World War II." Perspective-Specified
    Prompt: "From a historian''s perspective, describe the impact of World War II
    on European economies."'
  id: totrans-602
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述第二次世界大战的影响。”视角明确提示：“从历史学家的角度来看，描述第二次世界大战对欧洲经济的影响。”
- en: 'General Prompt: "What are the key features of a democratic government?" Perspective-Specified
    Prompt: "From a political scientist''s viewpoint, what are the key features of
    a democratic government?"'
  id: totrans-603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”视角明确提示：“从政治学家的角度来看，民主政府的核心特征是什么？”
- en: Common Pitfalls to Avoid
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Perspective: Avoid using vague or ambiguous perspectives. Be specific
    about the viewpoint or role you are interested in.'
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊视角：避免使用模糊或含糊不清的视角。具体说明你感兴趣的视角或角色。
- en: 'Assuming Understanding: Do not assume that the AI will infer the correct perspective
    without explicit instructions. Clearly state the perspective to avoid misunderstandings.'
  id: totrans-606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设理解：不要假设AI在没有明确指令的情况下会推断出正确的视角。清楚地说明视角以避免误解。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the perspective.'
  id: totrans-607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致回答不完整或不准确。提供足够的背景信息以构建视角。
- en: ConclusionSpecifying the perspective in your prompts is a crucial practice in
    prompt engineering that enhances relevance, clarity, engagement, and depth. By
    defining the perspective, being specific, using direct language, providing context,
    and asking for comparisons, you can ensure that ChatGPT provides accurate and
    tailored responses from the desired viewpoint. Avoiding pitfalls such as vague
    perspective, assuming understanding, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定视角是提示工程中的一项关键实践，它增强了相关性、清晰度、参与度和深度。通过定义视角、具体说明、使用直接语言、提供背景信息和请求比较，你可以确保ChatGPT从期望的视角提供准确和定制的响应。避免诸如模糊视角、假设理解和忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 29: Request VisualizationsRequesting visualizations in your prompts
    is an effective technique in prompt engineering that helps illustrate concepts,
    data, and processes through descriptive imagery or visual elements. Visualizations
    can enhance understanding and make information more engaging and accessible. This
    chapter will explore the importance of requesting visualizations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Visualizations'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 第29章：请求可视化在提示中请求可视化是提示工程中的一种有效技术，它通过描述性图像或视觉元素帮助说明概念、数据和过程。可视化可以增强理解力，使信息更具吸引力和可及性。本章将探讨请求可视化的重要性以及如何有效地将此技术融入你的提示中。请求可视化的重要性
- en: 'Clarity: Visualizations help clarify complex or abstract concepts by providing
    a visual representation that is easier to understand.'
  id: totrans-611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：可视化通过提供易于理解的视觉表示，有助于阐明复杂或抽象的概念。
- en: 'Engagement: They make information more engaging and interesting, capturing
    attention and enhancing the learning experience.'
  id: totrans-612
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：它们使信息更具吸引力和趣味性，吸引注意力并增强学习体验。
- en: 'Memory: Visual elements can improve memory retention by creating mental images
    associated with the information.'
  id: totrans-613
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记忆：视觉元素可以通过与信息相关的心理图像来提高记忆保持力。
- en: 'Comprehension: Visualizations can enhance comprehension by breaking down information
    into more digestible parts.'
  id: totrans-614
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解力：可视化可以通过将信息分解成更易于消化的部分来增强理解力。
- en: 'How to Request VisualizationsTo effectively request visualizations in your
    prompts, consider the following strategies:'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求可视化为了有效地在提示中请求可视化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or data you want visualized,
    ensuring that the AI understands the focus of your query.'
  id: totrans-616
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要可视化的概念或数据，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of visualization you are interested in, such
    as charts, diagrams, or descriptive imagery.'
  id: totrans-617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的视觉类型，例如图表、图表或描述性图像。
- en: 'Use Direct Language: Use straightforward and direct language to request visualizations,
    ensuring that the AI understands your request.'
  id: totrans-618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求可视化，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the visualization.'
  id: totrans-619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建可视化的相关背景或信息。
- en: 'Ask for Descriptions: If the AI cannot generate actual visual elements, request
    detailed descriptions that help you visualize the concept.'
  id: totrans-620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求描述：如果AI无法生成实际的视觉元素，请请求详细的描述，以帮助你可视化概念。
- en: Examples of Requesting Visualizations
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 请求可视化的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Visualization Prompt:
    "Can you describe a diagram of the process of photosynthesis, including the stages
    and key components?"'
  id: totrans-622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”可视化提示：“你能描述一个包括阶段和关键组成部分的光合作用流程图吗？”
- en: 'General Prompt: "Describe the impact of climate change." Visualization Prompt:
    "Can you provide a visualization or detailed description of the impact of climate
    change on polar ice caps over the past 50 years?"'
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”可视化提示：“你能提供过去50年气候变化对北极冰盖影响的可视化或详细描述吗？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Visualization
    Prompt: "Can you describe a chart that compares the benefits of different types
    of renewable energy sources?"'
  id: totrans-624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：列出利弊有助于阐明涉及的不同因素，使理解整体情况更容易。
- en: Common Pitfalls to Avoid
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱：
- en: 'Vague Requests: Avoid vague or general requests for visualizations. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-626
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对可视化进行模糊或一般性的请求。确保具体化，以确保清晰度和相关性。
- en: 'Overly Complex Visuals: While detailed visualizations are useful, overly complex
    instructions can be confusing. Keep the visualization request clear and manageable.'
  id: totrans-627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的可视化：虽然详细的可视化很有用，但过于复杂的指令可能会令人困惑。保持可视化请求清晰且易于管理。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    visualizations. Provide enough background information to frame the visualization.'
  id: totrans-628
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景信息：省略相关背景信息可能导致可视化不完整或不准确。提供足够的背景信息来构建可视化框架。
- en: ConclusionRequesting visualizations is an effective practice in prompt engineering
    that enhances clarity, engagement, memory, and comprehension. By identifying the
    concept, being specific, using direct language, providing context, and asking
    for descriptions, you can ensure that ChatGPT provides clear and engaging visualizations
    tailored to your needs. Avoiding pitfalls such as vague requests, overly complex
    visuals, and ignoring context will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示工程中请求可视化是一种有效的实践，它增强了清晰度、参与度、记忆力和理解力。通过识别概念、具体化、使用直接语言、提供背景信息和请求描述，你可以确保ChatGPT提供符合你需求的清晰且引人入胜的可视化。避免诸如模糊请求、过于复杂的视觉内容和忽略背景信息等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”可视化提示：“你能描述一个比较不同类型可再生能源优点的图表吗？”
- en: 'Chapter 30: Ask for Pros and ConsAsking for pros and cons in your prompts is
    a valuable technique in prompt engineering that helps evaluate the positive and
    negative aspects of a concept, decision, or scenario. This approach provides a
    balanced perspective and supports informed decision-making. This chapter will
    explore the importance of asking for pros and cons and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Pros and Cons'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 第30章：请求利弊在提示中请求利弊是提示工程中的一个有价值的技术，有助于评估概念、决策或场景的正负方面。这种方法提供了平衡的视角，并支持了情报决策。本章将探讨请求利弊的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Balanced Perspective: Evaluating both pros and cons provides a balanced view
    of the topic, highlighting both benefits and drawbacks.'
  id: totrans-632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：评估利弊可以提供对主题的平衡看法，突出其优点和缺点。
- en: 'Informed Decision-Making: Understanding the positive and negative aspects supports
    informed decision-making by presenting a comprehensive evaluation.'
  id: totrans-633
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：了解正负方面通过提供全面的评估支持了情报决策。
- en: 'Clarity: Listing pros and cons helps clarify the different factors involved,
    making it easier to understand the overall picture.'
  id: totrans-634
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求利弊的重要性：
- en: 'Critical Thinking: This approach encourages critical thinking by examining
    various aspects and their implications.'
  id: totrans-635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**批判性思维**：这种方法通过检查各个方面及其影响来鼓励批判性思维。'
- en: 'How to Ask for Pros and ConsTo effectively ask for pros and cons in your prompts,
    consider the following strategies:'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求利弊：为了在提示中有效地请求利弊，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or decision you want to evaluate,
    ensuring that the AI understands the focus of your query.'
  id: totrans-637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地陈述你想要评估的主题或决策，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as the context or criteria for evaluation.'
  id: totrans-638
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确任何你感兴趣的特定方面或细节，例如背景或评估标准。
- en: 'Use Direct Language: Use straightforward and direct language to request pros
    and cons, ensuring that the AI understands your request.'
  id: totrans-639
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求利弊，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the evaluation.'
  id: totrans-640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建评估的相关背景或信息。
- en: 'Ask for Balanced Lists: Request balanced lists that equally highlight both
    pros and cons to ensure a comprehensive evaluation.'
  id: totrans-641
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求平衡的列表：请求平衡的列表，同等突出利弊，以确保全面评估。
- en: Examples of Asking for Pros and Cons
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 请求利弊的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Pros and Cons Prompt:
    "Can you provide a list of the pros and cons of using solar energy as a primary
    source of power?"'
  id: totrans-643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”利弊提示：“你能提供一份使用太阳能作为主要电力来源的利弊清单吗？”
- en: 'General Prompt: "Describe the impact of climate change." Pros and Cons Prompt:
    "Can you list the pros and cons of implementing a carbon tax to combat climate
    change?"'
  id: totrans-644
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”利弊提示：“你能列出实施碳税以应对气候变化的利弊吗？”
- en: 'General Prompt: "What are the benefits of remote work?" Pros and Cons Prompt:
    "Can you provide a list of the pros and cons of remote work for employees and
    employers?"'
  id: totrans-645
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“远程工作的好处是什么？”利弊提示：“你能提供一份关于员工和雇主远程工作利弊的清单吗？”
- en: Common Pitfalls to Avoid
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for pros and cons. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-647
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或笼统地要求列出利弊。确保具体说明你需要的内容，以保持清晰和相关性。
- en: 'Unbalanced Lists: Ensure that the AI provides balanced lists that equally highlight
    both pros and cons to avoid biased evaluations.'
  id: totrans-648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不平衡的列表：确保AI提供平衡的列表，同等突出利弊，以避免有偏见的评估。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    evaluations. Provide enough background information to frame the pros and cons.'
  id: totrans-649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致评估不完整或不准确。提供足够的背景信息来构建利弊。
- en: ConclusionAsking for pros and cons is a valuable practice in prompt engineering
    that enhances balanced perspective, informed decision-making, clarity, and critical
    thinking. By identifying the topic, being specific, using direct language, providing
    context, and asking for balanced lists, you can ensure that ChatGPT provides comprehensive
    and relevant evaluations tailored to your needs. Avoiding pitfalls such as vague
    requests, unbalanced lists, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求利弊是提示工程中的一种宝贵实践，它增强了平衡的视角、明智的决策、清晰性和批判性思维。通过确定主题、具体说明、使用直接语言、提供背景信息和请求平衡的列表，你可以确保ChatGPT提供全面且相关的评估，以满足你的需求。避免诸如模糊请求、不平衡的列表和忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 31: Seek ComparisonsSeeking comparisons in your prompts is a practical
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of seeking comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Seeking Comparisons'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 第31章：寻求比较在提示工程中寻求比较是一种实用的技术，有助于阐明概念、对象或场景之间的差异和相似性。比较提供了更清晰的见解，并增强了复杂主题的理解。本章将探讨寻求比较的重要性以及如何有效地将此技术融入你的提示中。寻求比较的重要性
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：比较通过将它们与更熟悉的概念联系起来或突出差异，有助于阐明抽象或复杂的概念。
- en: 'Insight: They offer deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过识别相似性和差异性，提供更深入的见解，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-655
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：比较通过并排展示多个选项或观点，促进明智的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Seek ComparisonsTo effectively seek comparisons in your prompts, consider
    the following strategies:'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求比较为了有效地在提示中寻求比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-658
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要比较的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-659
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定比较的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似之处”、“不同之处”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建比较的相关背景或信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻求详细的比较：请求详细的比较，以探索不同方面及其相应的含义。
- en: Examples of Seeking Comparisons
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-664
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。比较提示：你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-665
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。比较提示：你能比较植物光合作用和动物细胞呼吸的过程吗？
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-666
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：气候变化的原因是什么？比较提示：你能比较人类活动和自然因素对气候变化的影响吗？
- en: Common Pitfalls to Avoid
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的比较：避免请求过于广泛或一般的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要的背景可能导致比较不完整或不准确。提供足够的背景信息以构建比较。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖比较的意图。确保你的措辞精确，以便AI能够理解你的请求。
- en: ConclusionSeeking comparisons is a practical and effective technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求比较是提示工程中的一种实用且有效的技巧，它增强了清晰度、洞察力、决策力和理解力。通过识别概念、具体化、使用比较语言、提供背景和请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度广泛的比较、缺乏背景和语言不清晰等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 32: Ask for InsightsAsking for insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of asking for insights and how to effectively incorporate this
    technique into your prompts.Importance of Asking for Insights'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 第32章：寻求见解在提示中寻求见解是提示工程中的一种宝贵技巧，有助于揭示对各种主题的更深入理解、解释和观点。见解提供细微的信息，可以增强你的理解并指导决策。本章将探讨寻求见解的重要性以及如何有效地将此技巧融入你的提示中。寻求见解的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-674
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：见解提供了对主题的更深入理解，揭示了潜在的原则、模式或含义。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-675
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-676
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过突出关键因素、风险和机会，见解为决策提供信息。
- en: 'Engagement: Asking for insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：寻求见解鼓励更互动和有趣的探索，激发好奇心和学习。
- en: 'How to Ask for InsightsTo effectively ask for insights in your prompts, consider
    the following strategies:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求见解为了在提示中有效地寻求见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-679
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要寻求见解的主题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：指定你感兴趣的任何特定方面或细节，例如趋势、影响或基本原理。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-681
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言来请求见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-682
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建见解的相关上下文或背景信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点，以获得对主题的更深入理解。
- en: Examples of Asking for Insights
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-685
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。洞察提示：你能提供关于可再生能源的采用如何影响未来十年全球能源市场的见解吗？
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-686
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。洞察提示：你能提供关于气候变化对生物多样性和生态系统长期影响的见解吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？洞察提示：你能提供关于民主政府的原则如何影响社会和经济发展的见解吗？
- en: Common Pitfalls to Avoid
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或泛泛的见解请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致见解不完整或不准确。提供足够的背景信息来构建见解。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视解释：不要忽视解释的重要性。寻求解释可以提供更深入的理解和背景。
- en: ConclusionAsking for insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求见解是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体化、使用直接语言、提供上下文和请求解释，你可以确保ChatGPT提供针对你需求的细微和相关的见解。避免诸如模糊请求、缺乏上下文和忽视解释等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 33: Request AnalogiesRequesting analogies in your prompts is a powerful
    technique in prompt engineering that helps explain complex concepts by relating
    them to more familiar ideas. Analogies make abstract or difficult topics more
    understandable and relatable. This chapter will explore the importance of requesting
    analogies and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Analogies'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 第33章：请求类比在提示中请求类比是提示工程中的一种强大技术，通过将复杂概念与更熟悉的思想联系起来来解释它们。类比使抽象或难以理解的主题更容易理解和相关。本章将探讨请求类比的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Analogies help clarify complex or abstract concepts by comparing them
    to something more familiar and easier to understand.'
  id: totrans-695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过将复杂或抽象的概念与更熟悉、更容易理解的事物进行比较，类比有助于阐明这些概念。
- en: 'Relatability: They make information more relatable and engaging, enhancing
    overall comprehension.'
  id: totrans-696
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们使信息更具相关性，更吸引人，从而增强整体理解。
- en: 'Retention: Analogies can improve memory retention by creating mental associations
    between new and known information.'
  id: totrans-697
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持记忆：通过在新知识与已知信息之间建立心理联系，类比可以提高记忆保持力。
- en: 'Insight: Using analogies can provide new insights and perspectives on a topic
    by highlighting similarities and differences.'
  id: totrans-698
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过突出相似之处和差异，使用类比可以为话题提供新的洞察力和视角。
- en: 'How to Request AnalogiesTo effectively request analogies in your prompts, consider
    the following strategies:'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求类比为了有效地在提示中请求类比，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex or abstract concept you want
    to explain using an analogy.'
  id: totrans-700
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要用类比解释的复杂或抽象概念。
- en: 'Choose a Familiar Comparison: Select a familiar idea or object that shares
    similarities with the concept you are explaining.'
  id: totrans-701
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择熟悉的比较：选择一个与你要解释的概念相似度高的熟悉想法或物体。
- en: 'Highlight the Similarities: Emphasize the key similarities between the complex
    concept and the familiar comparison to make the analogy clear.'
  id: totrans-702
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 突出相似之处：强调复杂概念与熟悉比较之间的关键相似之处，使类比清晰易懂。
- en: 'Explain the Analogy: Provide a brief explanation of how the analogy relates
    to the concept, ensuring that the comparison is understandable.'
  id: totrans-703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释类比：简要说明类比如何与概念相关联，确保比较是可理解的。
- en: 'Ask for Analogies: Directly ask the AI to provide analogies to explain complex
    topics, encouraging creative and relatable comparisons.'
  id: totrans-704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：直接要求AI提供类比来解释复杂主题，鼓励创造性和相关的比较。
- en: Examples of Requesting Analogies
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 请求类比示例
- en: 'General Prompt: "Explain the process of photosynthesis." Analogy Prompt: "Can
    you explain the process of photosynthesis using an analogy that compares it to
    a factory producing energy?"'
  id: totrans-706
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”类比提示：“你能用将光合作用与生产能量的工厂进行比较的类比来解释光合作用的过程吗？”
- en: 'General Prompt: "Describe the function of a computer''s CPU." Analogy Prompt:
    "Can you describe the function of a computer''s CPU using an analogy, like comparing
    it to the brain of a human?"'
  id: totrans-707
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述计算机CPU的功能。”类比提示：“你能用将计算机CPU与人类大脑进行比较的类比来描述计算机CPU的功能吗？”
- en: 'General Prompt: "What is blockchain technology?" Analogy Prompt: "Can you explain
    blockchain technology using an analogy that compares it to a digital ledger or
    a shared notebook?"'
  id: totrans-708
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”类比提示：“你能用将区块链技术与数字账本或共享笔记本进行比较的类比来解释区块链技术吗？”
- en: Common Pitfalls to Avoid
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Inappropriate Analogies: Avoid using analogies that do not clearly relate to
    the concept or that might create confusion. Choose analogies that are simple and
    relevant.'
  id: totrans-710
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不恰当的类比：避免使用与概念没有明显关联或可能造成混淆的类比。选择简单且相关的类比。
- en: 'Overly Complex Analogies: Analogies should simplify the concept, not make it
    more complex. Keep the comparisons straightforward and easy to understand.'
  id: totrans-711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的类比：类比应该简化概念，而不是使其更加复杂。保持比较简单明了，易于理解。
- en: 'Ignoring the Explanation: Do not assume that the analogy alone is sufficient.
    Always provide an explanation of how the analogy relates to the concept.'
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要假设类比本身就足够了。始终提供解释，说明类比如何与概念相关联。
- en: ConclusionRequesting analogies in your prompts is a powerful technique in prompt
    engineering that enhances clarity, relatability, retention, and insight. By identifying
    the concept, choosing a familiar comparison, highlighting the similarities, explaining
    the analogy, and asking for analogies, you can craft prompts that effectively
    utilize analogies to explain complex topics. Avoiding pitfalls such as inappropriate
    analogies, overly complex analogies, and ignoring the explanation will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中请求类比是提示工程中的一种强大技术，它增强了清晰性、相关性、记忆力和洞察力。通过识别概念、选择熟悉的比较、突出相似之处、解释类比和请求类比，你可以制作出有效地利用类比来解释复杂主题的提示。避免诸如不恰当的类比、过于复杂的类比和忽略解释等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 34: Use "What If" ScenariosUsing "What if" scenarios in your prompts
    is a powerful technique in prompt engineering that allows you to explore different
    possibilities, scenarios, and outcomes. "What if" scenarios stimulate creative
    thinking and can provide insights into how certain actions or events might impact
    a situation. This chapter will explore the importance of using "What if" scenarios
    and how to effectively incorporate this technique into your prompts.Importance
    of Using "What If" Scenarios'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 第34章：使用“如果...会怎样”情景在提示中使用“如果...会怎样”情景是提示工程中的一个强大技巧，它允许你探索不同的可能性、情景和结果。“如果...会怎样”情景可以激发创造性思维，并可以提供关于某些行动或事件可能如何影响情况的见解。本章将探讨使用“如果...会怎样”情景的重要性以及如何有效地将此技巧融入你的提示中。使用“如果...会怎样”情景的重要性
- en: 'Exploration: "What if" scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：“如果...会怎样”情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的了解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-717
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案来鼓励创造性和批判性思维。
- en: 'Problem-Solving: "What if" scenarios can help identify potential problems and
    solutions by simulating different situations.'
  id: totrans-718
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：“如果...会怎样”情景可以通过模拟不同的情况来帮助识别潜在的问题和解决方案。
- en: 'Engagement: Using "What if" scenarios makes the interaction more engaging and
    dynamic, fostering a deeper exploration of the topic.'
  id: totrans-719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用“如果...会怎样”情景可以使互动更加吸引人且动态，促进对主题的深入探讨。
- en: 'How to Use "What If" ScenariosTo effectively use "What if" scenarios in your
    prompts, consider the following strategies:'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用“如果...会怎样”情景为了有效地在提示中使用“如果...会怎样”情景，考虑以下策略：
- en: 'Pose Hypothetical Questions: Frame your hypothetical scenarios as "What if"
    questions to explore different possibilities.'
  id: totrans-721
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景构造成“如果...会怎样”问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-722
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表述清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或限制条件，以引导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设情景请求具体的成果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创新：邀请AI进行创新性思考，并考虑非常规的解决方案或观点。
- en: Examples of Using "What If" Scenarios
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: “如果...会怎样”情景的使用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." "What If" Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”“如果...情景提示：如果一个国家过渡到100%的可再生能源，会对经济、环境和社交产生什么影响？”
- en: 'General Prompt: "Explain the causes of climate change." "What If" Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-728
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。”“如果...情景提示：如果所有国家都同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" "What
    If" Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”“如果...情景提示：如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？在这次转变过程中？”
- en: Common Pitfalls to Avoid
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的条件：确保假设情景的条件和参数定义清晰，以避免混淆。
- en: 'Ignoring Feasibility: While "What if" scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然“如果...会怎样”的情景可以激发创造性思维，但考虑在创新与可行性之间取得平衡，以确保其实际相关性。
- en: ConclusionUsing "What if" scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing hypothetical questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize "What if" scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用“如果”情景是提示工程中的一种强大技巧，可以增强探索、创造性思维、问题解决和参与度。通过提出假设性问题，保持清晰和具体，定义参数，请求结果，并鼓励创造力，你可以构建有效地利用“如果”情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 35: Ask for Historical ContextAsking for historical context in your
    prompts is an important technique in prompt engineering that helps frame current
    events, concepts, or phenomena within a broader historical framework. Historical
    context provides background information that enhances understanding and relevance.
    This chapter will explore the importance of asking for historical context and
    how to effectively incorporate this technique into your prompts.Importance of
    Asking for Historical Context'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 第35章：请求历史背景在提示中请求历史背景是提示工程中的重要技巧，有助于将当前事件、概念或现象置于更广泛的历史框架中。历史背景提供了增强理解和相关性的背景信息。本章将探讨请求历史背景的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Understanding: Historical context provides background information that enhances
    understanding of current events, concepts, or phenomena.'
  id: totrans-737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史背景提供了增强对当前事件、概念或现象理解的背景信息。
- en: 'Relevance: It highlights the relevance of past events and developments, showing
    how they shape the present and future.'
  id: totrans-738
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它突出了过去事件和发展的相关性，展示了它们如何塑造现在和未来。
- en: 'Insight: Historical context offers insights into patterns, trends, and the
    evolution of ideas or events over time.'
  id: totrans-739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：历史背景提供了对模式、趋势以及思想或事件随时间演变的洞察。
- en: 'Perspective: It provides a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它提供了一个更广阔的视角，有助于将特定主题置于更广泛的历史叙事中。
- en: 'How to Ask for Historical ContextTo effectively ask for historical context
    in your prompts, consider the following strategies:'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史背景为了有效地在提示中请求历史背景，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or event you want historical context
    for, ensuring that the AI understands the focus of your query.'
  id: totrans-742
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要历史背景的主题或事件，确保AI理解你的查询焦点。
- en: 'Specify the Period: Define the historical period you are interested in, including
    specific years, decades, or eras.'
  id: totrans-743
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    context, ensuring that the AI understands your request.'
  id: totrans-744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求历史背景，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant background information that can help
    frame the historical context.'
  id: totrans-745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建历史背景的相关背景信息。
- en: 'Ask for Connections: Request connections between historical events and current
    developments to highlight their relevance.'
  id: totrans-746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求联系：请求历史事件和当前发展之间的联系，以突出其相关性。
- en: Examples of Asking for Historical Context
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史背景的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Context
    Prompt: "Can you provide the historical context of the development of renewable
    energy technologies over the past century?"'
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。历史背景提示：你能提供过去一个世纪可再生能源技术发展的历史背景吗？
- en: 'General Prompt: "Describe the impact of climate change." Historical Context
    Prompt: "Can you explain the historical context of climate change, including major
    events and milestones in climate science?"'
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史背景提示：“你能解释气候变化的历史背景，包括气候科学中的重大事件和里程碑吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Context Prompt: "Can you provide the historical context of the development of
    democratic governments, focusing on key historical events and movements?"'
  id: totrans-750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史背景提示：“你能提供关于民主政府发展历史背景吗？重点关注关键历史事件和运动？”
- en: Common Pitfalls to Avoid
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for historical context. Be
    specific about the topic and period to ensure clarity and relevance.'
  id: totrans-752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对历史背景进行模糊或一般性的请求。明确主题和时期以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    historical background. Provide enough information to frame the historical context.'
  id: totrans-753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景可能导致历史背景不完整或不准确。提供足够的信息来构建历史背景。
- en: 'Overloading with Details: While historical context is important, providing
    too many details can overwhelm the response. Focus on the most relevant historical
    background.'
  id: totrans-754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度细节化：虽然历史背景很重要，但提供过多细节可能会使回答显得繁杂。专注于最相关的历史背景。
- en: ConclusionAsking for historical context is a crucial practice in prompt engineering
    that enhances understanding, relevance, insight, and perspective. By identifying
    the topic, specifying the period, using direct language, providing context, and
    asking for connections, you can ensure that ChatGPT provides accurate and relevant
    historical context tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overloading with details will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史背景是提示工程中的一个关键实践，它增强了理解、相关性、洞察力和视角。通过确定主题、指定时期、使用直接语言、提供背景信息和请求联系，你可以确保ChatGPT提供准确且符合你需求的定制历史背景。避免诸如模糊请求、缺乏背景信息和过度细节化等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 36: Seek Expert OpinionsSeeking expert opinions in your prompts is
    a valuable technique in prompt engineering that helps you gain insights from authoritative
    and knowledgeable perspectives. Expert opinions provide depth, credibility, and
    specialized knowledge on various topics. This chapter will explore the importance
    of seeking expert opinions and how to effectively incorporate this technique into
    your prompts.Importance of Seeking Expert Opinions'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 第36章：寻求专家意见在提示工程中寻求专家意见是一种有价值的技巧，可以帮助你从权威和知识渊博的视角获得洞察。专家意见提供了深度、可信度和关于各种主题的专业知识。本章将探讨寻求专家意见的重要性以及如何有效地将此技巧融入你的提示中。寻求专家意见的重要性
- en: 'Credibility: Expert opinions add credibility and authority to the information,
    enhancing its reliability.'
  id: totrans-758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：专家意见增加了信息的可信度和权威性，增强了其可靠性。
- en: 'Depth: They provide in-depth insights and specialized knowledge that go beyond
    general information.'
  id: totrans-759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：他们提供深入见解和专业知识，这些知识超越了一般信息。
- en: 'Context: Expert opinions offer contextual understanding and interpretations
    based on experience and expertise.'
  id: totrans-760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：专家意见提供基于经验和专业知识的环境理解和解释。
- en: 'Informed Decision-Making: They inform decision-making by providing well-founded
    perspectives and recommendations.'
  id: totrans-761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 智慧决策：它们通过提供有根据的观点和建议来指导决策。
- en: 'How to Seek Expert OpinionsTo effectively seek expert opinions in your prompts,
    consider the following strategies:'
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求专家意见为了有效地在提示中寻求专家意见，考虑以下策略：
- en: 'Specify the Expert: Clearly identify the type of expert or field of expertise
    you are interested in, ensuring that the AI understands the focus of your query.'
  id: totrans-763
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确专家类型：清楚地识别你感兴趣的专家类型或专业领域，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as specific questions or areas of expertise.'
  id: totrans-764
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：明确指出你感兴趣的特定方面或细节，例如具体问题或专业领域。
- en: 'Use Direct Language: Use straightforward and direct language to request expert
    opinions, ensuring that the AI understands your request.'
  id: totrans-765
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求专家意见，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the expert opinion.'
  id: totrans-766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建专家意见的相关背景或信息。
- en: 'Ask for Multiple Perspectives: If applicable, request opinions from multiple
    experts to gain a well-rounded understanding.'
  id: totrans-767
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻求多角度观点：如果适用，请求多位专家的意见以获得全面的理解。
- en: Examples of Seeking Expert Opinions
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求专家意见的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Expert Opinion
    Prompt: "Can you provide an expert opinion from a renewable energy scientist on
    the long-term benefits of solar energy?"'
  id: totrans-769
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”专家意见提示：“你能从可再生能源科学家的角度提供关于太阳能长期益处的专家意见吗？”
- en: 'General Prompt: "Describe the impact of climate change." Expert Opinion Prompt:
    "Can you provide an expert opinion from a climate scientist on the projected impact
    of climate change on coastal cities?"'
  id: totrans-770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”专家意见提示：“你能从气候科学家的角度提供关于气候变化对沿海城市预期影响的专家意见吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Expert
    Opinion Prompt: "Can you provide an expert opinion from a political scientist
    on the key features and challenges of modern democratic governments?"'
  id: totrans-771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”专家意见提示：“你能从政治科学家的角度提供关于现代民主政府的核心特征和挑战的专家意见吗？”
- en: Common Pitfalls to Avoid
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for expert opinions. Be specific
    about the type of expert and the focus of your query to ensure clarity and relevance.'
  id: totrans-773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的专家意见请求。确保具体说明专家类型和查询焦点，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    expert opinions. Provide enough background information to frame the expert perspective.'
  id: totrans-774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致专家意见不完整或不准确。提供足够的背景信息来构建专家观点。
- en: 'Assuming Expertise: Do not assume that the AI will infer the correct expert
    perspective without explicit instructions. Clearly state the type of expert you
    are interested in.'
  id: totrans-775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设专业知识：不要假设AI会根据明确的指示推断出正确的专家观点。明确说明您感兴趣的专家类型。
- en: ConclusionSeeking expert opinions is a valuable practice in prompt engineering
    that enhances credibility, depth, context, and informed decision-making. By specifying
    the expert, being specific, using direct language, providing context, and asking
    for multiple perspectives, you can ensure that ChatGPT provides accurate and relevant
    expert opinions tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and assuming expertise will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求专家意见是提示工程中的一个宝贵实践，它增强了可信度、深度、上下文和明智的决策。通过指定专家、具体化、使用直接语言、提供上下文和询问多个观点，您可以确保ChatGPT提供准确且相关的专家意见，以满足您的需求。避免模糊请求、缺乏上下文和假设专业知识等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: '*'
- en: 'Chapter 37: Ask for Future TrendsAsking for future trends in your prompts is
    a valuable technique in prompt engineering that helps you explore potential developments
    and changes in various fields. Future trends provide insights into emerging patterns
    and technologies, helping you anticipate and prepare for the future. This chapter
    will explore the importance of asking for future trends and how to effectively
    incorporate this technique into your prompts.Importance of Asking for Future Trends'
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 第37章：询问未来趋势在您的提示中询问未来趋势是提示工程中的一个宝贵技巧，它帮助您探索各个领域的潜在发展和变化。未来趋势提供了对新兴模式和技术的洞察，帮助您预测和准备未来。本章将探讨询问未来趋势的重要性以及如何有效地将此技巧融入您的提示中。
- en: 'Foresight: Future trends provide a glimpse into potential developments, helping
    you anticipate and prepare for changes.'
  id: totrans-779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预见：未来趋势为潜在的发展提供一瞥，帮助您预测和准备变化。
- en: 'Innovation: They offer insights into emerging technologies and patterns that
    can drive innovation and progress.'
  id: totrans-780
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：它们提供了对新兴技术和模式的认识，这些技术和模式可以推动创新和进步。
- en: 'Decision-Making: Understanding future trends informs decision-making by highlighting
    opportunities and risks.'
  id: totrans-781
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：了解未来趋势通过突出机会和风险来指导决策。
- en: 'Strategic Planning: Future trends support strategic planning by providing a
    long-term perspective on developments in various fields.'
  id: totrans-782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 战略规划：未来趋势通过提供各个领域发展的长期视角来支持战略规划。
- en: 'How to Ask for Future TrendsTo effectively ask for future trends in your prompts,
    consider the following strategies:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 如何询问未来趋势为了有效地在提示中询问未来趋势，考虑以下策略：
- en: 'Identify the Field: Clearly state the field or topic you want future trends
    about, ensuring that the AI understands the focus of your query.'
  id: totrans-784
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定领域：清楚地说明您想要了解未来趋势的领域或主题，确保AI理解查询的焦点。
- en: 'Specify the Time Frame: Define the time frame for the trends, such as short-term,
    medium-term, or long-term, to provide a clear focus.'
  id: totrans-785
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确时间范围：定义趋势的时间范围，如短期、中期或长期，以提供明确的焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request future
    trends, ensuring that the AI understands your request.'
  id: totrans-786
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求未来趋势，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the future trends.'
  id: totrans-787
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建未来趋势的相关背景或信息。
- en: 'Ask for Implications: Request an explanation of the implications and potential
    impact of the future trends to understand their significance.'
  id: totrans-788
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求影响：要求解释未来趋势的影响和潜在影响，以了解其重要性。
- en: Examples of Asking for Future Trends
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 请求未来趋势的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Future Trends Prompt:
    "Can you provide insights into future trends in renewable energy technologies
    over the next decade?"'
  id: totrans-790
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。未来趋势提示：你能提供关于未来十年可再生能源技术趋势的见解吗？
- en: 'General Prompt: "Describe the impact of climate change." Future Trends Prompt:
    "Can you predict future trends in climate change and their potential impact on
    global weather patterns?"'
  id: totrans-791
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。未来趋势提示：你能预测气候变化未来的趋势及其对全球天气模式可能产生的影响吗？
- en: 'General Prompt: "What are the trends in technology?" Future Trends Prompt:
    "Can you provide insights into future trends in technology for the next five years,
    focusing on artificial intelligence and robotics?"'
  id: totrans-792
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“技术趋势是什么？”未来趋势提示：“你能提供关于未来五年技术趋势的见解吗？重点关注人工智能和机器人技术？”
- en: Common Pitfalls to Avoid
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for future trends. Be specific
    about the field and time frame to ensure clarity and relevance.'
  id: totrans-794
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对未来的趋势提出模糊或一般性的请求。关于领域和时间范围要具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    predictions. Provide enough background information to frame the future trends.'
  id: totrans-795
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致预测不完整或不准确。提供足够的背景信息以构建未来趋势。
- en: 'Ignoring Implications: Do not overlook the importance of understanding the
    implications of future trends. Always request explanations to gain insights into
    their impact.'
  id: totrans-796
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视影响：不要忽视理解未来趋势影响的重要性。始终要求解释，以获得对其影响的洞察。
- en: ConclusionAsking for future trends is a valuable practice in prompt engineering
    that enhances foresight, innovation, decision-making, and strategic planning.
    By identifying the field, specifying the time frame, using direct language, providing
    context, and asking for implications, you can ensure that ChatGPT provides accurate
    and relevant insights into future trends tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring implications will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 38: Use ContrastsUsing contrasts in your prompts is a powerful technique
    in prompt engineering that helps highlight differences and distinctions between
    concepts, objects, or scenarios. Contrasts provide clear insights and enhance
    understanding by emphasizing what sets things apart. This chapter will explore
    the importance of using contrasts and how to effectively incorporate this technique
    into your prompts.Importance of Using Contrasts'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 第38章：使用对比
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：对比有助于阐明差异和区别，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-801
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过突出不同元素的不同之处，提供更深入的洞察，增强理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-802
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清晰地展示不同选项的优缺点，促进基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-803
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供比较视角，展示不同元素之间如何相互关联，它们增强了整体理解。
- en: 'How to Use ContrastsTo effectively use contrasts in your prompts, consider
    the following strategies:'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用对比：为了有效地在提示中使用对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-805
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别元素：清楚地说明你想要对比的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-806
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：具体说明对比的方面或标准，例如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-807
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建对比的相关上下文或背景信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-809
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细的对比：请求详细的对比以探索不同方面及其相应的含义。
- en: Examples of Using Contrasts
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 使用对比的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-811
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”对比提示：“你能从成本、效率和环境影响的角度对比太阳能与风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-812
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”对比提示：“你能对比植物光合作用与动物细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-813
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”对比提示：“你能对比人类活动与自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-815
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的对比：避免请求过于广泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-816
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致对比不完整或不准确。提供足够的背景信息来构建对比框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-817
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清的语言可能会掩盖对比的意图。确保你的措辞精确，以便AI能够理解你的请求。
- en: ConclusionUsing contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用对比是提示工程中的一种强大技术，它增强了清晰度、洞察力、决策力和理解力。通过识别元素、具体说明、使用比较语言、提供上下文以及请求详细的对比，你可以确保ChatGPT提供针对你需求的清晰和相关的对比。避免过度广泛的对比、缺乏上下文和语言不清等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 39: Ask for ImplicationsAsking for implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of asking for implications and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Implications'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 第39章：请求影响在提示中请求影响是提示工程中的一个宝贵技巧，有助于你探索行动、决策或事件的潜在后果和影响。理解影响提供了更深入的见解并支持明智的决策。本章将探讨请求影响的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-821
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-822
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过突出特定行动或事件的更广泛影响和重要性，它们增强了理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-823
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解影响可以指导决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-824
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：影响通过展示不同因素和事件之间的相互联系和相互影响来提供背景。
- en: 'How to Ask for ImplicationsTo effectively ask for implications in your prompts,
    consider the following strategies:'
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-826
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地说明你想要探索的行动、决策或事件，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-827
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-828
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求影响，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-829
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定影响的相关的背景或信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-830
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：请求对影响的详细分析，以探索不同方面及其相应的效果。
- en: Examples of Asking for Implications
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-832
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 影响提示：“你能解释可再生能源广泛采用对全球能源市场长期影响的含义吗？”
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-833
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 影响提示：“你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-834
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 影响提示：“你能讨论从威权体制过渡到民主政府在社会稳定和经济发展方面的含义吗？”
- en: Common Pitfalls to Avoid
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-836
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的影响请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-837
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致对影响的分析不完整或不准确。提供足够的信息来界定影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-838
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略多个观点：专注于单一观点可能会限制分析。请求多个观点以探索不同的影响和结果。
- en: ConclusionAsking for implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求含义是提示工程中的一个宝贵实践，它增强了深度、理解、决策和背景。通过确定行动或事件，具体说明，使用直接语言，提供背景，并请求详细分析，你可以确保ChatGPT为你提供准确和相关的见解，以满足你的需求。避免诸如请求模糊、缺乏背景和忽视多个视角等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 40: Request Alternative ViewsRequesting alternative views in your prompts
    is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 第40章：请求不同的观点在提示中请求不同的观点是提示工程中的一个宝贵技巧，它可以帮助你探索一个主题的不同视角和观点。不同的观点提供了更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求不同观点的重要性以及如何有效地将这一技巧融入你的提示中。
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-842
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：不同的观点通过呈现一个议题或主题的不同方面来提供平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-843
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-844
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同的观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-845
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 智慧决策：考虑不同的观点通过呈现多个选项和考虑因素来支持智慧决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同的观点为了有效地在提示中请求不同的观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-847
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要不同观点的主题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-848
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-849
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言来请求不同的观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-850
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建不同观点的相关背景或信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-851
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-853
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”不同的观点提示：“你能提供关于可再生能源好处的不同观点，包括正面和批评的视角吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-854
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”不同的观点提示：“你能提供关于气候变化的不同观点，包括来自环保主义者和怀疑论者的视角吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-855
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 常见陷阱：避免
- en: Common Pitfalls to Avoid
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 第41章：指定标准在提示中指定标准是提示工程的重要技巧，有助于聚焦AI的响应并确保它们与你的需求相关。标准提供清晰的指南和边界，提高了信息的质量和精确性。本章将探讨指定标准的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-857
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代观点提出模糊或一般性的请求。确保具体化以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-858
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致观点不完整或不准确。提供足够的背景信息以构建视角框架。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-859
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点和影响。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代观点是提示工程中的一种有价值实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、具体化、使用直接语言、提供上下文和请求多个视角，你可以确保ChatGPT提供准确且相关的替代观点，以满足你的需求。避免诸如模糊请求、缺乏上下文和忽视多元视角等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 41: Specify CriteriaSpecifying criteria in your prompts is an important
    technique in prompt engineering that helps focus the AI''s responses and ensures
    they are relevant and aligned with your needs. Criteria provide clear guidelines
    and boundaries, enhancing the quality and precision of the information. This chapter
    will explore the importance of specifying criteria and how to effectively incorporate
    this technique into your prompts.Importance of Specifying Criteria'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 标准指定的意义
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-863
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注：标准有助于缩小AI的响应范围，使其聚焦于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-864
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保响应保持清晰并与你的具体需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-865
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-866
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：明确标准可以提高响应的精确性，使其更加准确和有用。
- en: 'How to Specify CriteriaTo effectively specify criteria in your prompts, consider
    the following strategies:'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定标准为了有效地在提示中指定标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-868
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要解决的问题或主题，确保AI理解你查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-869
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：明确响应的标准或指南，例如范围、长度、格式或需要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-870
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来明确标准，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-871
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建标准的相关上下文或背景信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-872
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求合规：要求响应遵守指定的标准，以确保与你的需求保持一致。
- en: Examples of Specifying Criteria
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 指定标准的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-874
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 标准指定提示：“你能解释可再生能源的好处，重点放在经济和环境影响上，不超过200字？”
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-875
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 标准指定提示：“你能描述气候变化对沿海城市的影响，包括短期和长期影响吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-876
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 标准指定提示：“你能列出民主政府的核心特征，重点关注政治和社会方面吗？”
- en: Common Pitfalls to Avoid
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-878
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊标准：避免使用模糊或含糊不清的标准。具体说明指南以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-879
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度限制的标准：设定过于严格的标准可能会限制响应的深度和质量。确保你的标准是合理的，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-880
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的信息来界定标准。
- en: ConclusionSpecifying criteria in your prompts is a crucial practice in prompt
    engineering that enhances focus, clarity, relevance, and precision. By identifying
    the topic, defining the criteria, using direct language, providing context, and
    asking for compliance, you can ensure that ChatGPT provides accurate and relevant
    responses tailored to your needs. Avoiding pitfalls such as vague criteria, overly
    restrictive criteria, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定标准是提示工程中的一个关键实践，它增强了焦点、清晰度、相关性和精确性。通过确定主题、定义标准、使用直接语言、提供上下文和请求遵守，你可以确保ChatGPT提供准确且相关的响应，以满足你的需求。避免诸如模糊标准、过度限制的标准和忽略上下文等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 42: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 第42章：请求简化在提示中请求简化是提示工程中的一个宝贵技巧，有助于将复杂的概念、过程或信息分解成更简单、更易理解的术语。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将此技巧融入你的提示中。请求简化的重要性
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-884
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-885
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众理解，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-886
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：简化使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-887
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释更实用，更容易在实际情况下应用。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化为了有效地在提示中请求简化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-889
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要简化的复杂概念或过程，确保AI理解你的查询焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-890
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-891
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化的目标受众，如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-892
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-893
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建简化的相关上下文或背景信息。
- en: Examples of Requesting Simplifications
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-895
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释光合作用的过程。" 简化提示："你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释吗？"
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-896
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述区块链技术。" 简化提示："你能用简单语言和例子为没有技术背景的人简化区块链技术吗？"
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-897
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："什么是量子计算？" 简化提示："你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的？"
- en: Common Pitfalls to Avoid
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-899
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的简化请求。确保具体说明你需要什么，以保持清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-900
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化是有用的，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-901
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致简化不完整或不准确。提供足够的背景信息来构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供上下文，你可以确保ChatGPT提供针对你需求的清晰和相关的简化。避免如含糊请求、过度简化、忽略上下文等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 43: Seek Applications in Real LifeSeeking applications in real life
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-life
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of seeking applications in real life
    and how to effectively incorporate this technique into your prompts.Importance
    of Seeking Applications in Real Life'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 第43章：在现实生活中寻找应用在提示中寻找现实生活的应用是提示工程中的重要技巧，有助于你理解概念、理论或过程如何实际应用。现实生活的应用提供了具体的例子，增强了理解和相关性。本章将探讨在现实生活中寻找应用的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Relevance: Real-life applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-905
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实生活的应用通过展示它们在实际情境中的使用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-906
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供如何在现实世界环境中实施的具体例子来帮助阐明复杂的思想。
- en: 'Engagement: Real-life applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-907
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：现实生活的应用使信息更具吸引力和趣味性，加深了与主题的连接。
- en: 'Usability: Understanding real-life applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-908
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实生活的应用增强了信息的实用性，使其更容易在各种情况下应用。
- en: 'How to Seek Applications in Real LifeTo effectively seek applications in real
    life in your prompts, consider the following strategies:'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 如何在现实生活中寻求应用为了在提示中有效地寻求现实生活的应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-life applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-910
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要在现实生活应用中探索的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of real-life applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-911
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：明确你感兴趣的实际情况的类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-life
    applications, ensuring that the AI understands your request.'
  id: totrans-912
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求现实生活的应用，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-life applications.'
  id: totrans-913
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建现实生活应用的相关的上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-life applications
    to understand how the concept is implemented and its impact.'
  id: totrans-914
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求现实生活应用的详细例子，以了解概念是如何实施及其影响的。
- en: Examples of Seeking Applications in Real Life
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 现实生活中寻求应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-Life Applications
    Prompt: "Can you provide real-life examples of how renewable energy sources, such
    as solar and wind power, are being used in different industries?"'
  id: totrans-916
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实生活应用提示：“你能提供可再生能源（如太阳能和风能）在不同行业中应用的现实生活例子吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-Life Applications
    Prompt: "Can you provide examples of real-life initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-917
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实生活应用提示：“你能提供城市为应对气候变化实施的实际举措和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-Life Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-918
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”现实生活应用提示：“你能提供区块链技术在各个领域（如金融、供应链和医疗保健）应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for real-life applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-920
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对实际应用提出模糊或泛泛的请求。确保具体说明你需要什么，以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-life applications.'
  id: totrans-921
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以构建现实生活的应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-922
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视具体性：一般性的例子可能无法提供你所需要的深度。请求详细的例子以理解实际应用的实施和影响。
- en: ConclusionSeeking applications in real life is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-life applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示工程中寻求现实生活的应用是一个重要的实践，它增强了相关性、清晰度、参与度和可用性。通过确定概念、具体说明、使用直接语言、提供上下文和请求详细例子，你可以确保ChatGPT提供符合你需求的清晰和相关的现实生活应用。避免像模糊请求、缺乏上下文和忽视具体性这样的陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 44: Request DataRequesting data in your prompts is a valuable technique
    in prompt engineering that helps you obtain quantitative information, statistics,
    and evidence to support your queries. Data provides a factual basis that enhances
    the accuracy and credibility of the information. This chapter will explore the
    importance of requesting data and how to effectively incorporate this technique
    into your prompts.Importance of Requesting Data'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 第44章：请求数据在提示中请求数据是提示工程中的一个宝贵技巧，帮助你获取定量信息、统计数据和证据来支持你的查询。数据提供了事实基础，增强了信息的准确性和可信度。本章将探讨请求数据的重要性以及如何有效地将此技巧融入你的提示中。请求数据的重要性
- en: 'Accuracy: Data provides a factual basis that enhances the accuracy and reliability
    of the information.'
  id: totrans-926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：数据提供了事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative information and statistics add credibility to the
    response, making it more trustworthy.'
  id: totrans-927
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信誉度：定量信息和统计数据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Data offers insights into trends, patterns, and relationships, helping
    you understand the topic more deeply.'
  id: totrans-928
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：数据提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Data supports informed decision-making by providing evidence-based
    information.'
  id: totrans-929
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：数据通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request DataTo effectively request data in your prompts, consider the
    following strategies:'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求数据为了有效地在提示中请求数据，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want data on, ensuring
    that the AI understands the focus of your query.'
  id: totrans-931
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要数据涉及的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Type of Data: Indicate the type of data you are interested in,
    such as statistics, trends, comparisons, or specific metrics.'
  id: totrans-932
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定数据类型：指出你感兴趣的数据类型，如统计数据、趋势、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request data,
    ensuring that the AI understands your request.'
  id: totrans-933
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言来请求数据，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the data request.'
  id: totrans-934
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建数据请求的相关背景或信息。
- en: 'Ask for Sources: Request sources or references for the data to ensure its credibility
    and reliability.'
  id: totrans-935
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求来源：请求数据或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Data
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 数据请求示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Data Prompt: "Can
    you provide data on the adoption rates of renewable energy sources, such as solar
    and wind power, in the past decade?"'
  id: totrans-937
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”数据提示：“你能提供关于过去十年中太阳能和风能等可再生能源采用率的数据吗？”
- en: 'General Prompt: "Describe the impact of climate change." Data Prompt: "Can
    you provide statistics on the increase in global temperatures and the frequency
    of extreme weather events over the past 50 years?"'
  id: totrans-938
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”数据提示：“你能提供过去50年中全球温度上升和极端天气事件发生频率的统计数据吗？”
- en: 'General Prompt: "What is blockchain technology?" Data Prompt: "Can you provide
    data on the growth of blockchain technology in different industries, including
    the number of blockchain-based companies and projects?"'
  id: totrans-939
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”数据提示：“你能提供关于不同行业中区块链技术增长的数据，包括基于区块链的公司和项目数量吗？”
- en: Common Pitfalls to Avoid
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for data. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-941
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或一般的数据请求。确保具体说明你需要什么，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    data. Provide enough background information to frame the data request.'
  id: totrans-942
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致数据不完整或不准确。提供足够的背景信息来构建数据请求。
- en: 'Ignoring Sources: Data without credible sources can be unreliable. Always request
    sources or references to ensure the credibility of the data.'
  id: totrans-943
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的数据可能不可靠。始终请求来源或参考文献，以确保数据可信度。
- en: ConclusionRequesting data is a valuable practice in prompt engineering that
    enhances accuracy, credibility, insight, and decision-making. By identifying the
    topic, specifying the type of data, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    data tailored to your needs. Avoiding pitfalls such as vague requests, lack of
    context, and ignoring sources will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求数据是提示工程中的一项宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定数据类型、使用直接语言、提供背景信息和请求来源，你可以确保ChatGPT提供符合你需求的确切和可靠的数据。避免诸如请求模糊、缺乏背景信息和忽视来源等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 45: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 第45章：请求历史比较在提示中请求历史比较是提示工程中的一个重要技巧，有助于你理解当前事件、概念或现象与历史事件的关系或差异。历史比较提供了背景和洞察，增强了理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-947
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史比较通过展示当前事件或概念与过去事件的关系，提供了背景。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-948
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们提供了对模式、趋势以及思想或事件随时间演变的洞察。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-949
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和不同之处，增强了理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-950
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了一个更广阔的视角，有助于将特定主题置于更大的历史叙事中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较为了在提示中有效地请求历史比较，考虑以下策略：
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-952
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要与历史事件、概念或现象进行比较的当前事件、概念或现象，确保AI理解你查询的焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-953
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-954
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求历史比较，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-955
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建历史比较的相关背景或信息。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-956
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面的比较，如原因、影响或结果，以确保分析具有针对性。
- en: Examples of Asking for Historical Comparisons
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 历史比较请求的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-958
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史比较提示：“你能比较当前可再生能源的采用与工业革命期间煤炭的采用吗？”
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-959
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能比较当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-960
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史比较提示：“你能比较现代民主政府的核心特征与古代雅典民主制的特征吗？”
- en: Common Pitfalls to Avoid
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见误区
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-962
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对历史比较提出含糊或笼统的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-963
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致比较不完整或不准确。提供足够的背景信息来构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-964
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详述细节：虽然历史比较很有用，但提供过多细节可能会使回答显得繁杂。请专注于最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史比较是提示工程中的一个重要实践，它增强了情境、洞察力、理解和视角。通过确定主题、指定历史时期、使用直接语言、提供背景信息以及请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如含糊请求、缺乏背景和详述细节等误区将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: '** ** *'
- en: 'Chapter 46: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 第46章：寻求跨学科见解在提示中寻求跨学科见解是提示工程中的一个宝贵技巧，帮助你探索不同领域或学科如何交叉和相互影响。跨学科见解通过整合来自各个领域的知识，提供了一个更广阔的视角并增强了理解。本章将探讨寻求跨学科见解的重要性以及如何有效地将此技巧融入你的提示中。寻求跨学科见解的重要性
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-968
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：跨学科见解通过整合来自不同领域或学科的知识，提供了一个更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-969
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：它们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-970
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域的交叉和相互影响，增强了理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-971
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：它们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了有效地在提示中寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-973
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要探讨的主题或问题，确保AI能够理解你的查询焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-974
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的各个领域或学科，如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-975
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求跨学科见解，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-976
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建跨学科洞察的相关背景或信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-977
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求整合：请求不同领域的知识整合，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科洞察的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-979
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 跨学科提示：“你能提供关于可再生能源好处的跨学科洞察，包括环境科学、经济学和社会政策的视角吗？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-980
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 跨学科提示：“你能提供关于气候变化影响的跨学科洞察，包括气候学、农业和公共卫生的视角吗？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-981
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？” 跨学科提示：“你能提供关于人工智能的跨学科洞察，包括计算机科学、伦理和社会学的视角吗？”
- en: Common Pitfalls to Avoid
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-983
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对跨学科洞察的模糊或一般性请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-984
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致洞察不完整或不准确。提供足够的背景信息以构建跨学科洞察。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-985
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视整合：仅关注单个领域可能会限制分析。请求知识整合以探索不同领域如何交叉和影响主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科洞察是提示工程中的一种宝贵实践，它增强了视角、创新、理解和问题解决能力。通过确定主题、指定学科、使用直接语言、提供背景和请求整合，你可以确保ChatGPT提供准确且相关的跨学科洞察，以满足你的需求。避免诸如模糊请求、缺乏背景和忽视整合等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 47: Request Solutions to ProblemsRequesting solutions to problems in
    your prompts is an important technique in prompt engineering that helps you explore
    potential answers and strategies for addressing various issues. Solutions provide
    practical and actionable information that can guide decision-making and problem-solving.
    This chapter will explore the importance of requesting solutions to problems and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Solutions to Problems'
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 第47章：请求解决问题的方案在提示中请求解决问题的方案是提示工程中的重要技巧，它有助于你探索潜在答案和解决各种问题的策略。解决方案提供实用且可操作的信息，可以指导决策和问题解决。本章将探讨请求解决问题的意义以及如何有效地将此技巧融入你的提示中。请求解决问题的意义
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-989
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用且可操作的信息，可以直接应用于解决实际问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-990
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：它们通过展示潜在答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-991
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：通过提供克服挑战的具体方法，解决方案有助于问题解决。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-992
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：请求解决方案通过探索各种策略和想法，鼓励创造性思维和创新。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求问题的解决方案为了在提示中有效地请求问题的解决方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-994
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-995
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要具体：明确你感兴趣的特定方面或细节，例如限制、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-996
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-997
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何相关的背景信息，这有助于界定问题和潜在解决方案。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-998
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：要求提供多个解决方案，以探索解决问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 请求问题解决方案的示例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-1000
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。解决方案提示：你能提供缓解气候变化对沿海城市影响的解决方案吗？包括短期和长期策略？
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-1001
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”解决方案提示：“你能提供在发展中国家增加可再生能源采用率的解决方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-1002
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释远程工作的挑战。解决方案提示：你能提供解决远程工作挑战的解决方案吗？包括沟通、生产力和工作与生活平衡？
- en: Common Pitfalls to Avoid
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-1004
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的解决方案请求。明确问题和你需要的解决方案类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-1005
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解决方案不完整或不准确。提供足够的背景信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-1006
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创造性与可行性，以确保其实用相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求解决方案是提示工程中的一种重要实践，它增强了实用性、决策、问题解决和创新。通过确定问题、具体化、使用直接语言、提供背景信息和请求多个解决方案，你可以确保ChatGPT提供准确且相关的解决方案，满足你的需求。避免诸如含糊请求、缺乏背景信息和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 48: Ask for Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 第48章：请求应用实例请求在提示中的应用实例是提示工程中的实用技术，有助于说明概念、理论或过程在现实世界场景中的应用。应用实例提供了具体的实例，增强了理解和相关性。本章将探讨请求应用实例的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-1010
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：应用实例通过提供具体的使用实例来帮助阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-1011
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示如何在现实世界场景中应用来使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-1012
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：应用实例使信息更具吸引力和相关性，从而增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-1013
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户体验：理解现实世界的应用增强了信息的实用性，使其在各种情况下更容易应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用实例为了有效地在提示中请求应用实例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-1015
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要应用实例的概念、理论或过程，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-1016
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的特定应用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-1017
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求应用实例，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-1018
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建例子的相关上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-1019
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求详细例子以了解概念是如何实施的及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用实例的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-1021
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供太阳能和风能等可再生能源在不同行业中应用的实例吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-1022
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供区块链技术在金融、供应链和医疗保健等不同领域的应用实例吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-1023
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”应用提示：“你能提供人工智能在不同领域（如医疗保健、金融和交通）中的实际应用实例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1025
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的请求应用实例。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-1026
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息来构建应用框架。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-1027
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度使用例子：虽然例子很有用，但一次性要求太多可能会让人感到不知所措。专注于可管理的例子数量以保持清晰。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用示例是提示工程中一种实用且有效的实践，它增强了清晰度、相关性、参与度和可用性。通过确定概念、具体化、使用直接语言、提供背景和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰和相关的应用示例。避免模糊请求、缺乏背景和示例过多等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 49: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 第49章：使用假设情景在提示中使用假设情景是提示工程中的一种强大技术，它允许你探索不同的可能性、情景和结果。假设情景激发创造性思维，并可以提供关于某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。使用假设情景的重要性
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-1031
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而获得对潜在未来的见解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-1032
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案来鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-1033
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：假设情景可以通过模拟不同的情况来帮助识别潜在的问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-1034
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用假设情景使互动更加吸引人和动态，促进对主题的深入探讨。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景为了有效地在提示中使用假设情景，请考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-1036
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景构造成“如果”问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-1037
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-1038
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束条件，以指导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-1039
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设情景请求具体的后果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-1040
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造性：邀请AI进行创造性思考，并考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 假设情景的使用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-1042
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 假设情景提示：“如果一个国家过渡到100%的可再生能源，这将产生什么样的经济、环境和社交影响？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-1043
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 假设情景提示：“如果所有国家都同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-1044
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”假设情景提示：“如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-1046
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-1047
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数被明确定义，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-1048
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设情景鼓励创造性思维，但请考虑在创造力和可行性之间取得平衡，以确保其实用相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用假设情景是提示工程中的一个强大技术，它增强了探索、创造性思维、问题解决和参与度。通过提出“如果...会怎样”的问题，明确具体，定义参数，请求结果，并鼓励创造力，你可以构建有效地利用假设情景来探索不同可能性和结果的提示。避免陷阱，如过于复杂的情景、模糊的条件和忽视可行性，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 50: Ask for Alternative SolutionsAsking for alternative solutions in
    your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 第50章：请求替代方案在提示中请求替代方案是提示工程中的一个有价值的技术，有助于你探索解决各种问题的不同方法和策略。替代方案提供更广泛的视角，鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代方案的重要性以及如何有效地将此技术融入你的提示中。请求替代方案的重要性
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-1052
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造力：通过探索不同的方法和策略，替代方案鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-1053
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 综合性问题解决：它们提供更广泛的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-1054
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案，通过展示各种选项及其影响，支持基于信息的决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-1055
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：替代方案通过突出解决问题的不同方式提供灵活性，允许适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代方案为了在提示中有效地请求替代方案，请考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1057
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-1058
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如限制、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-1059
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求替代方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-1060
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定问题和潜在解决方案的相关上下文或背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-1061
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代解决方案的例子
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-1063
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代解决方案提示：“你能提供缓解气候变化对沿海城市影响的替代方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-1064
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”替代解决方案提示：“你能提供在发展中国家推广可再生能源的替代方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-1065
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案吗？包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-1067
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免提出模糊或泛泛的替代解决方案请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-1068
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-1069
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性，以确保实际相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代解决方案是提示工程中的一种宝贵实践，它增强了创造力、全面问题解决、明智的决策和灵活性。通过确定问题、具体说明、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代解决方案，以满足你的需求。避免模糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 51: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 第51章：寻求概念澄清在提示工程中寻求概念澄清是一项重要技术，有助于确保你完全理解复杂的思想、术语或过程。澄清提供了详细解释，增强了理解并消除了歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将此技术融入你的提示中。寻求概念澄清的重要性
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-1073
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供了详细解释，增强了复杂思想、术语或过程的理解。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-1074
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，降低了误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-1075
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中定位概念，增强了信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-1076
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强应用信息的准确性和有效性的信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1078
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你需要澄清的概念或术语，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-1079
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如其应用或上下文。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-1080
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-1081
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例来说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-1082
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定澄清的相关上下文或背景信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 求解概念澄清的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-1084
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清叶绿素在光合作用的光反应中的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-1085
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-1086
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中叠加的概念并提供其应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1088
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的澄清请求。确保具体说明你需要什么以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-1089
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解释不完整或不准确。提供足够的背景信息来界定概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-1090
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求概念澄清是提示工程中的重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、具体说明、使用直接语言、请求示例和提供上下文，你可以确保ChatGPT提供详细和准确的澄清，以满足你的需求。避免诸如含糊请求、缺乏上下文和过度提问等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 52: Request Detailed ExplanationsRequesting detailed explanations in
    your prompts is a key technique in prompt engineering that helps you gain a deeper
    understanding of concepts, processes, and phenomena. Detailed explanations provide
    comprehensive insights that enhance learning and comprehension. This chapter will
    explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 第52章：请求详细解释在提示工程中请求详细解释是关键技巧，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技巧融入你的提示中。请求详细解释的重要性
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-1094
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细解释提供了对事物工作原理的深入了解，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-1095
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们有助于阐明抽象或难以理解的概念，使它们更容易接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-1096
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：详细解释提供了上下文，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-1097
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：请求详细解释可以鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了在提示中有效地请求详细解释，考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-1099
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地说明你需要解释的内容，包括任何你感兴趣的特定方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-1100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-1101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建解释的相关上下文或背景信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-1102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-1103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明解释并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-1105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用是如何工作的。”详细解释提示：“你能解释光合作用是如何工作的，包括叶绿素的作用和过程的各个阶段？”
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-1106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”详细解释提示：“你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链中的？”
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-1107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“量子计算是什么？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念？”
- en: Common Pitfalls to Avoid
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-1109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免提出模糊或泛泛的详细解释请求。要具体说明你需要解释的内容，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-1110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解释不完整或不准确。提供足够的背景信息以构建解释框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-1111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求详细解释是提示工程中的关键实践，它增强了深度、清晰度、上下文和参与度。通过具体说明、使用直接语言、提供上下文、请求逐步解释和请求示例，你可以确保ChatGPT提供符合你需求的详细和全面解释。避免模糊请求、缺乏上下文和过于宽泛的问题等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 53: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 第53章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、对象或场景之间的差异和相似性。比较提供了更清晰的见解，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技巧融入你的提示中。使用比较的重要性
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-1115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过将其与更熟悉的概念相关联或突出差异，比较有助于阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-1116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过识别相似性和差异性，它们提供了更深入的见解，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-1117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过并排展示多个选项或观点，比较有助于基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-1118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较为了有效地在提示中使用比较，请考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-1120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要比较的概念、对象或场景，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-1121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定比较的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-1122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似性”、“差异性”）来清楚地界定你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-1123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建比较的相关上下文或背景信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-1124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：要求详细的比较以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: 使用比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-1126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 比较提示："你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？"
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-1127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述光合作用的过程。" 比较提示："你能比较植物光合作用和动物细胞呼吸的过程吗？"
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-1128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "气候变化的原因是什么？" 比较提示："你能比较人类活动和自然因素对气候变化的影响吗？"
- en: Common Pitfalls to Avoid
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-1130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的比较：避免提出过于宽泛或一般性的比较请求。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-1131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致比较不完整或不准确。提供足够的信息来构建比较框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-1132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不明确：使用模糊或不清晰的语言可能会掩盖比较的意图。在措辞上要精确，以确保AI理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 54: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-1136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-1137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-1138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-1139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-1142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-1143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-1144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-1145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples of Requesting Insights
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-1147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-1148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-1149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Common Pitfalls to Avoid
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-1151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-1152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-1153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 55: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-1157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-1158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-1159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-1160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-1162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-1163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-1164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-1165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-1166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples of Asking for Contrasts
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-1168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-1169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”对比提示：“你能对比植物中光合作用的过程与动物细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-1170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”对比提示：“你能对比人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-1172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的对比：避免请求过于宽泛或一般的对比。关注具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-1173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要的背景可能导致对比不完整或不准确。提供足够的信息来构建对比。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-1174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用含糊或不清的语言可能会掩盖对比的意图。在措辞上要精确，以确保AI理解您的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在您的提示中请求对比是提示工程中的一个强大技巧，它增强了清晰度、洞察力、决策和理解的深度。通过识别元素、具体化、使用比较语言、提供背景信息和请求详细对比，您可以确保ChatGPT提供针对您需求的清晰和相关的对比。避免过度宽泛的对比、缺乏背景和语言不清晰等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 56: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: 第56章：请求影响在您的提示中请求影响是提示工程中的一个宝贵技巧，有助于您探索行动、决策或事件的可能后果和影响。理解影响提供了更深入的见解并支持明智的决策。本章将探讨请求影响的重要性以及如何有效地将此技巧融入您的提示中。请求影响的重要性
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-1178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-1179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过突出特定行动或事件更广泛的影响和重要性，它们增强了理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-1180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解影响有助于决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-1181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：影响通过展示不同因素和事件如何相互关联并影响彼此来提供背景。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响为了有效地在您的提示中请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-1183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地陈述您想要探索的行动、决策或事件，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-1184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定您感兴趣的任何特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-1185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求影响，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-1186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建影响的相关的背景或信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-1187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：请求对影响的详细分析以探索不同方面及其相应的影响。
- en: Examples of Requesting Implications
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-1189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 意义提示：“你能解释可再生能源广泛采用对全球能源市场长期影响的含义吗？”
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-1190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 意义提示：“你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-1191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 意义提示：“你能讨论从威权体制过渡到民主政府在社会稳定和经济发展方面的意义吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的请求影响。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-1194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关背景信息可能导致对影响的分析不完整或不准确。提供足够的背景信息来界定影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-1195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多个视角：专注于单一视角可能会限制分析。请求多个视角以探索不同的影响和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求影响是提示工程中的一个宝贵实践，它增强了深度、理解、决策和上下文。通过确定行动或事件，保持具体，使用直接语言，提供上下文，并请求详细分析，你可以确保ChatGPT提供针对你需求的准确和相关的见解。避免如含糊请求、缺乏上下文和忽视多个视角等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 57: Request Alternative ViewsRequesting alternative views in your prompts
    is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 第57章：请求不同的观点在提示中请求不同的观点是提示工程中的一个宝贵技巧，有助于你探索一个主题的不同视角和观点。不同的观点提供了更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求不同观点的重要性以及如何有效地将这一技巧融入你的提示中。请求不同观点的重要性
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-1199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡的视角：不同的观点通过展示一个议题或话题的不同方面来提供平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-1200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：他们通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-1201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同的观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-1202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑不同的观点通过提供多种选项和考虑因素来支持情报决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同的观点为了有效地在提示中请求不同的观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-1204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明您想要不同观点的主题或问题，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-1205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：指定您感兴趣的任何特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-1206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求不同的观点，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-1207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建不同观点的相关背景信息或背景资料。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-1208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-1210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”不同观点提示：“你能提供关于可再生能源好处的不同观点，包括正面和批评性的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-1211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”不同观点提示：“你能提供关于气候变化影响的不同的观点，包括环保主义者和怀疑论者的观点吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-1212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的特征有哪些？”不同观点提示：“你能讨论关于民主政府特征的替代观点，包括支持和批评的观点吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对不同的观点提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-1215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的替代观点。提供足够的背景信息以构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-1216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：只关注单一视角可能会限制分析。请求多元视角以探索不同的观点和含义。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求不同的观点是提示工程中的一种宝贵实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、详尽具体、使用直接语言、提供背景信息和请求多个视角，您可以确保ChatGPT提供准确且相关的不同观点，以满足您的需求。避免诸如模糊请求、缺乏背景信息和忽视多元视角等错误将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1218
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 58: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 第58章：明确评估标准在您的提示中明确评估标准是提示工程的重要技巧，有助于聚焦AI的响应并确保它们与您的需求相关。标准提供清晰的指导方针和边界，提高信息的质量和精确度。本章将探讨明确评估标准的重要性以及如何有效地将此技巧融入您的提示中。明确评估标准的重要性
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-1220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 焦点：标准有助于缩小AI的回答范围，使其专注于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-1221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保回答保持清晰并与你的具体需求一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-1222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-1223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准提高了回答的精确性，使其更加准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-1225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要解决的问题或议题，确保AI理解你的查询焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-1226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定回答的标准或指南，例如范围、长度、格式或特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-1227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来指定标准，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-1228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于确定标准的相关上下文或背景信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-1229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求遵守：要求回答遵守指定的标准，以确保与你的需求一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-1231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”标准指定提示：“你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字吗？”
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-1232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”标准指定提示：“你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-1233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”标准指定提示：“你能列出民主政府的核心特征，重点关注政治和社会方面吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-1235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的标准：避免使用模糊或含糊的标准。具体说明指南以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-1236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度限制的标准：设定过于限制性的标准可能会限制回答的深度和质量。确保你的标准是合理的，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-1237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的背景信息以确定标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 59: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 第59章：请求简化在提示工程中请求简化是一个有价值的技巧，它有助于将复杂的概念、过程或信息分解成更简单、更易于理解的表达。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将此技巧融入你的提示中。请求简化的重要性
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-1241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-1242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众理解，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-1243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：简化使信息更具吸引力和相关性，从而提高整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-1244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释在现实世界中的应用更实际，更容易实施。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化为了有效地在提示中请求简化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-1246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要简化的复杂概念或过程，确保AI理解你的查询焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-1247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-1248
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指明简化的目标受众，例如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-1249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-1250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建简化的相关上下文或背景信息。
- en: Examples of Requesting Simplifications
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-1252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释光合作用的过程。" 简化提示："你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释吗？"
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-1253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述区块链技术。" 简化提示："你能用简单语言和例子为没有技术背景的人简化区块链技术吗？"
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-1254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："什么是量子计算？" 简化提示："你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的？"
- en: Common Pitfalls to Avoid
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或笼统的简化请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-1257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化很有用，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间取得平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-1258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致简化不完整或不准确。提供足够的背景信息来构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景，您可以确保ChatGPT提供针对您需求的清晰和相关的简化。避免诸如请求模糊、过度简化或忽略背景等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 60: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 第60章：请求现实世界应用在您的提示中请求现实世界应用是提示工程中的重要技巧，有助于您了解概念、理论或过程如何在实际中应用。现实世界应用提供了具体的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入您的提示中。请求现实世界应用的重要性
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-1262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界应用通过展示它们在实际情况中的使用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-1263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：它们通过提供如何在现实世界环境中实施的具体例子来帮助阐明复杂的思想。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-1264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：现实世界应用使信息更具吸引力和趣味性，加深了与主题的连接。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-1265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了有效地在您的提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-1267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明您想要在现实世界应用中探索的概念、理论或过程，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-1268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明您感兴趣的特定类型现实世界应用，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-1269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求现实世界应用，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-1270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建现实世界应用的相关的背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-1271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细示例：请求现实世界应用的具体示例，以了解概念是如何实施的以及其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-1273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供关于如何在不同行业中使用太阳能和风能等可再生能源来源的现实世界例子吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-1274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化影响而实施的现实世界倡议和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-1275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "什么是区块链技术？" 实际应用提示： "你能提供区块链技术在各个领域应用的例子，例如金融、供应链和医疗保健吗？"
- en: Common Pitfalls to Avoid
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对实际应用进行含糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-1278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以界定实际应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-1279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般例子可能无法提供你所需要的深度。请求详细例子以了解实际实施和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求实际应用是提示工程中的一个重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体化、使用直接语言、提供上下文和请求详细例子，你可以确保ChatGPT提供针对你需求的清晰和相关的实际应用。避免诸如含糊请求、缺乏上下文和忽略具体性等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 61: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 第61章：请求统计分析在提示中请求统计分析是提示工程中的一个宝贵技巧，有助于你获得定量洞察和证据来支持你的查询。统计分析提供了事实基础，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。请求统计分析的重要性
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-1283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-1284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-1285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-1286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析为了有效地在提示中请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-1288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-1289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，例如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-1290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-1291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定统计分析的相关上下文或背景信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-1292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-1294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释可再生能源的好处。" 统计分析提示： "你能提供过去十年中可再生能源（如太阳能和风能）采用率的统计分析吗？"
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-1295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 统计分析提示： "你能提供过去50年中全球温度上升和极端天气事件发生频率的统计分析吗？"
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-1296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "什么是区块链技术？" 统计分析提示： "你能提供关于区块链技术在不同行业增长（包括基于区块链的公司和项目数量）的统计分析吗？"
- en: Common Pitfalls to Avoid
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-1298
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的统计分析请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-1299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的背景信息以构建统计分析框架。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-1300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终请求来源或参考文献，以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一种宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景和请求来源，你可以确保ChatGPT提供准确且可靠的统计分析，以满足你的需求。避免诸如模糊请求、缺乏背景和忽略来源等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 62: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 第62章：请求历史比较在提示中请求历史比较是提示工程中的重要技巧，有助于你理解当前事件、概念或现象与历史事件的关系或差异。历史比较提供了背景和洞察，增强了理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入你的提示中。请求历史比较的重要性
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-1304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史比较通过展示当前事件或概念与过去事件的关系来提供背景。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-1305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们提供了对模式、趋势以及随着时间的推移中思想或事件演变的洞察。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-1306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和差异来增强理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-1307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了更广阔的视角，有助于将特定主题置于更广泛的历史叙述中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较为了在提示中有效地请求历史比较，考虑以下策略：
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-1309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要与历史事件、概念或现象进行比较的当前事件、概念或现象，确保AI理解你查询的焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-1310
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-1311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求历史比较，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-1312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建历史比较的相关背景信息或背景知识。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-1313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面进行比较，如原因、影响或结果，以确保分析具有针对性。
- en: Examples of Asking for Historical Comparisons
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史比较的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-1315
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史比较提示：“你能比较当前可再生能源的采用与工业革命期间煤炭的采用吗？”
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-1316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能比较当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-1317
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史比较提示：“你能比较现代民主政府的核心特征与古代雅典民主制的特征吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对历史比较提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-1320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致比较不完整或不准确。提供足够的背景信息以构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-1321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提供细节：虽然历史比较很有用，但提供过多细节可能会使响应变得混乱。关注最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史比较是提示工程中的重要实践，它增强了上下文、洞察力、理解和观点。通过确定主题、指定历史时期、使用直接语言、提供背景信息和请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如模糊请求、缺乏背景信息和细节过多等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 63: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: 第63章：寻求跨学科见解
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-1325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：跨学科见解通过整合来自不同领域或学科的知识提供了更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-1326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：他们通过结合来自不同领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-1327
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域如何交叉和相互影响来增强理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-1328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：他们通过提供不同观点和解决复杂问题的方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要探索的主题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-1331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的不同的领域或学科，如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-1332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求跨学科见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-1333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建跨学科见解的相关背景或信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-1334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求整合：请求不同领域的知识整合，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-1336
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括环境科学、经济学和社会政策的视角？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-1337
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”跨学科提示：“你能提供关于气候变化影响的跨学科见解，包括气候学、农业和公共卫生的视角？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-1338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”跨学科提示：“你能提供关于人工智能的跨学科见解，包括计算机科学、伦理和社会学的视角？”
- en: Common Pitfalls to Avoid
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对跨学科见解的模糊或一般性请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-1341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致见解不完整或不准确。提供足够的背景信息以界定跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-1342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略整合：仅关注单个领域可能会限制分析。请求整合知识，以探索不同领域如何交叉影响该主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：寻求跨学科见解是提示工程中的一种宝贵实践，它增强了视角、创新、理解和解决问题的能力。通过确定主题、指定学科、使用直接语言、提供背景和请求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏背景和忽略整合等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 64: Request Solutions to ProblemsRequesting solutions to problems in
    your prompts is an important technique in prompt engineering that helps you explore
    potential answers and strategies for addressing various issues. Solutions provide
    practical and actionable information that can guide decision-making and problem-solving.
    This chapter will explore the importance of requesting solutions to problems and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Solutions to Problems'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: 第64章：请求解决问题的方案在提示中请求解决问题的方案是提示工程中的重要技巧，帮助你探索各种问题的潜在答案和策略。解决方案提供实用和可操作的信息，可以指导决策和解决问题。本章将探讨请求解决问题的方案的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-1346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用和可操作的信息，可以直接应用于解决实际问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-1347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：它们通过展示潜在答案和策略来支持信息化的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-1348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：通过提供克服挑战的具体方法，解决方案有助于解决问题。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-1349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：通过探索各种策略和想法，请求解决方案鼓励创造性思维和创新。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的方案：为了在提示中有效地请求解决问题的方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：明确陈述你想要解决的问题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-1352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：指定你感兴趣的任何特定方面或细节，例如限制条件、资源或期望结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-1353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-1354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定问题和潜在解决方案的相关背景或信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-1355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决该问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决问题的方案示例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-1357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”解决方案提示：“你能提供缓解气候变化对沿海城市影响的解决方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-1358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”解决方案提示：“你能提供在发展中国家增加可再生能源应用方案的解决方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-1359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释远程工作的挑战。解决方案提示：你能提供解决远程工作挑战的方案，包括沟通、生产力和工作与生活平衡吗？
- en: Common Pitfalls to Avoid
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-1361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的解决方案请求。具体说明问题和你需要的解决方案类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-1362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息，以界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-1363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新方案很有价值，但考虑平衡创新与可行性，以确保实际的相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求解决方案是提示工程中的一种重要实践，它增强了实用性、决策、问题解决和创新。通过识别问题、具体说明、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且符合你需求的解决方案。避免诸如含糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 65: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-1366
  prefs: []
  type: TYPE_NORMAL
  zh: 第65章：请求应用实例请求提示中的应用实例是提示工程中的一种实用技术，有助于说明概念、理论或过程在现实场景中的应用。应用实例提供了具体案例，增强了理解和相关性。本章将探讨请求应用实例的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-1367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：应用实例有助于通过提供具体的使用案例来阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-1368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：通过展示信息在现实场景中的应用，它们使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-1369
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：应用实例使信息更具吸引力和相关性，增强了整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-1370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实用可用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用实例为了有效地在提示中请求应用实例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-1372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要应用实例的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-1373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的特定应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-1374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求应用例子，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-1375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建例子的相关上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-1376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求详细例子以了解概念是如何实施的及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用例子示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-1378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供太阳能和风能等可再生能源在不同行业中的应用例子吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-1379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域的应用例子吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-1380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”应用提示：“你能提供人工智能在不同领域（如医疗保健、金融和交通）中的实际应用例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统地请求应用例子。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-1383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以构建应用场景。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-1384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 例子过多：虽然例子很有用，但一次性请求太多例子可能会让人感到不知所措。专注于可管理的例子数量以保持清晰。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1385
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用例子是提示工程中的一种实用且有效的方法，它增强了清晰度、相关性、参与度和可用性。通过识别概念、具体说明、使用直接语言、提供上下文和请求详细例子，你可以确保ChatGPT提供符合你需求的清晰和相关的应用例子。避免诸如含糊请求、缺乏上下文和例子过多等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 66: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 第66章：使用假设情景在提示中使用假设情景是提示工程中的一种强大技术，它允许你探索不同的可能性、情景和结果。假设情景刺激创造性思维，并可以提供对某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。使用假设情景的重要性
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-1388
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的了解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-1389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：通过挑战AI考虑不同的观点和解决方案，他们鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-1390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：假设情景可以通过模拟不同情况来帮助识别潜在问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-1391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：使用假设情景可以使互动更加吸引人和动态，促进对主题的深入探讨。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景：为了有效地在提示中使用假设情景，考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-1393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设问题：将你的假设情景构造成“如果”问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-1394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-1395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束条件，以指导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-1396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设情景请求具体的成果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-1397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创新：邀请AI进行创新思考，考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 假设情景的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-1399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 假设情景提示：“如果一个国家过渡到100%的可再生能源，这将对经济、环境和社交产生什么影响？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-1400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 假设情景提示：“如果所有国家同意在下一个十年内减少50%的碳排放，这将对全球气候变化产生什么影响？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-1401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 假设情景提示：“如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-1403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和集中。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-1404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数定义清晰，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-1405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设情景鼓励创新思维，但考虑在创新与可行性之间取得平衡，以确保其实际相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用假设情景是提示工程中的一种强大技术，可以增强探索、创造性思维、问题解决和参与度。通过提出“如果”问题，保持清晰具体，定义参数，请求结果，并鼓励创新，你可以构建出有效地利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱，将进一步提高与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 67: Ask for Alternative SolutionsAsking for alternative solutions in
    your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 第67章：请求替代解决方案在提示中请求替代解决方案是提示工程中的一个宝贵技巧，有助于你探索解决各种问题的不同方法和策略。替代解决方案提供了更广阔的视角，鼓励创造性思维，从而实现更全面的解决问题。本章将探讨请求替代解决方案的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-1409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造力：替代解决方案通过探索不同的方法和策略，鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-1410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全面解决问题：它们提供了更广阔的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-1411
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案通过展示各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-1412
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：替代解决方案通过强调解决问题的不同方式，提供了灵活性，允许适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代解决方案为了在提示中有效地请求替代解决方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1414
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-1415
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如限制、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-1416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求替代解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-1417
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定问题和潜在解决方案的相关背景或信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-1418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻求多种解决方案：请求多种解决方案以探索解决该问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求替代解决方案的例子
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-1420
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代解决方案提示：“你能提供缓解气候变化对沿海城市影响的替代方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-1421
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”替代解决方案提示：“你能提供在发展中国家推广可再生能源的替代方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-1422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案吗？包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-1423
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-1424
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对替代解决方案的模糊或一般性请求。具体说明问题和所需的解决方案类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-1425
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致解决方案不完整或不准确。提供足够的信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-1426
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略可行性：虽然创造性的解决方案很有价值，但考虑平衡创造性与可行性，以确保实际的相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代解决方案是提示工程中的一种有价值的方法，它增强了创造力、全面的问题解决、明智的决策和灵活性。通过识别问题、具体化、使用直接语言、提供背景和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代解决方案，以满足你的需求。避免诸如请求模糊、缺乏背景和忽略可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 68: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-1429
  prefs: []
  type: TYPE_NORMAL
  zh: 第68章：寻求概念澄清在提示工程中，寻求概念澄清是一项重要的技术，有助于确保你完全理解复杂的思想、术语或过程。澄清提供了详细的解释，增强了理解并消除了歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将这项技术融入你的提示中。
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-1430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供了详细的解释，增强了复杂思想、术语或过程的理解。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-1431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，减少了误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-1432
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中定位概念，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-1433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强准确和有效地应用信息的信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-1434
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你需要澄清的概念或术语，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-1436
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如其应用或背景。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-1437
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-1438
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求例子：请求例子来说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-1439
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建澄清的相关背景信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-1441
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释光合作用的过程。" 澄清提示： "你能澄清叶绿素在光合作用的光反应中的作用吗？"
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-1442
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述区块链技术。" 澄清提示： "你能澄清区块链技术如何确保交易的安全性和完整性吗？"
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-1443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中叠加的概念，并提供一个应用实例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的澄清请求。确保具体说明你需要什么，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-1446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致不完整或不准确的澄清。提供足够的背景信息来界定概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-1447
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 69: Request Detailed ExplanationsRequesting detailed explanations in
    your prompts is a key technique in prompt engineering that helps you gain a deeper
    understanding of concepts, processes, and phenomena. Detailed explanations provide
    comprehensive insights that enhance learning and comprehension. This chapter will
    explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 第69章：请求详细解释在提示中请求详细解释是提示工程中的一个关键技巧，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将这一技巧融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-1451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的解释提供了对事物如何运作的深入了解，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-1452
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-1453
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：详细的解释提供了上下文，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-1454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地在提示中请求详细解释，考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-1456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确说明：清楚地说明你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-1457
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-1458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定解释的相关上下文或背景信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-1459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-1460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：要求示例来说明解释，并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求对概念进行澄清是提示工程中的一个重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、明确说明、使用直接语言、请求示例和提供上下文，你可以确保ChatGPT提供详细和准确的澄清，以满足你的需求。避免诸如含糊请求、缺乏上下文和过度提问等错误将进一步提高你与ChatGPT互动的有效性。
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-1462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用是如何工作的。”详细解释提示：“你能解释光合作用是如何工作的，包括叶绿素的作用和过程的各个阶段吗？”
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-1463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”详细解释提示：“你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链中的？”
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-1464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-1466
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免含糊不清的请求：避免对详细解释的含糊或一般性请求。确保具体说明你需要的内容，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-1467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解释不完整或不准确。提供足够的信息来构建解释框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-1468
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能会导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求详细解释是提示工程中的一个关键实践，它增强了深度、清晰度、上下文和参与度。通过具体说明、使用直接语言、提供上下文、要求逐步解释和请求示例，你可以确保ChatGPT提供针对你需求的详细和全面的解释。避免像含糊请求、缺乏上下文和过于宽泛的问题这样的陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 70: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: 第70章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、对象或场景之间的差异和相似性。比较提供了更清晰的洞察力，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技巧融入你的提示中。使用比较的重要性
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-1472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过将它们与更熟悉的概念相关联或突出差异，比较有助于阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-1473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过识别相似性和差异性，他们提供了更深入的洞察力，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-1474
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：比较通过并排呈现多个选项或观点来促进信息化的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-1475
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供更广泛的背景和多个观点，他们增强了整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较为了有效地在提示中使用比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-1477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要比较的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-1478
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定比较的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-1479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较性语言：使用比较性语言（例如，“比较”、“对比”、“相似性”、“差异性”）来清楚地界定你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-1480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建比较的相关背景或信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-1481
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：请求详细的比较以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 比较法的应用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-1483
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”比较提示：“你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-1484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“你能比较植物光合作用和动物细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-1485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“你能比较人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-1487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的比较：避免请求过于宽泛或一般的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-1488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要的背景可能导致比较不完整或不准确。提供足够的背景信息以构建比较。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-1489
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不明确：使用模糊或不清晰的语言可能会掩盖比较的意图。在措辞上要精确，以确保AI理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用比较是提示工程中的一种宝贵技巧，它增强了清晰度、洞察力、决策和理解。通过识别概念、具体化、使用比较性语言、提供背景和请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度宽泛的比较、缺乏背景和不清晰的语言等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 71: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 第71章：请求洞察力在提示中请求洞察力是提示工程中的一种宝贵技巧，有助于揭示对各种主题的更深入理解、解释和观点。洞察力提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求洞察力的重要性以及如何有效地将此技巧融入你的提示中。请求洞察力的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-1493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：洞察力提供了对主题的更深入理解，揭示了潜在的原则、模式或含义。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-1494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供了解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-1495
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：洞察力通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-1496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求洞察力鼓励更互动和有趣的探索，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求见解为了有效地在提示中请求见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要见解的主题或问题，确保AI理解查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-1499
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、影响或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-1500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-1501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建见解的相关上下文或背景信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-1502
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点，以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-1503
  prefs: []
  type: TYPE_NORMAL
  zh: 请求见解的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-1504
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”见解提示：“你能提供关于可再生能源的采用如何影响未来十年全球能源市场的见解吗？”
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-1505
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”见解提示：“你能提供关于气候变化对生物多样性和生态系统长期影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-1506
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”见解提示：“你能提供关于民主政府的原则如何影响社会和经济发展的见解吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-1508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或一般性的见解请求。确保具体化以获得清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-1509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致见解不完整或不准确。提供足够的背景信息以构建见解。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-1510
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和上下文。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求见解是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体化、使用直接语言、提供上下文和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的见解。避免诸如模糊请求、缺乏上下文和忽视解释等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 72: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: 第72章：请求对比在提示工程中请求对比是一种强大的技术，有助于突出概念、对象或场景之间的差异和区分。对比提供清晰的见解，并通过强调事物之间的不同来增强理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-1514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：对比有助于明确差异和区分，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-1515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们通过突出不同元素的特点，提供更深入的洞察力。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-1516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清楚地展示不同选项的优缺点，促进信息化的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-1517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供比较视角，展示不同元素之间的关系，增强整体理解。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比：为了有效地在提示中请求对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-1519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别元素：明确陈述你想要对比的概念、对象或场景，确保AI理解你查询的重点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-1520
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要具体：具体说明对比的方面或标准，如功能、有效性、优缺点等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-1521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地表达你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-1522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建对比的相关上下文或背景信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-1523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细的对比：请求详细的对比以探索不同方面及其相应的含义。
- en: Examples of Asking for Contrasts
  id: totrans-1524
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-1525
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。对比提示：你能从成本、效率和环境影响的角度对比太阳能与风能的好处吗？
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-1526
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。对比提示：你能对比植物光合作用与动物细胞呼吸的过程吗？
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-1527
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：气候变化的原因是什么？对比提示：你能对比人类活动与自然因素对气候变化的影响吗？
- en: Common Pitfalls to Avoid
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-1529
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免过于宽泛的对比：避免请求过于宽泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-1530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的信息可能导致对比不完整或不准确。提供足够的背景信息来构建对比。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-1531
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖对比的意图。在措辞上要精确，以确保AI理解你的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求提示中的对比是提示工程中的一种强大技术，它增强了清晰度、洞察力、决策和理解的深度。通过识别元素、具体化、使用比较语言、提供上下文和请求详细的对比，你可以确保ChatGPT提供符合你需求的清晰和相关的对比。避免过度宽泛的对比、缺乏上下文和语言不清晰等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 73: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 第73章：请求影响在提示中请求影响是提示工程中的一种宝贵技术，有助于您探索行动、决策或事件的潜在后果和效果。理解影响提供了更深入的见解，并支持明智的决策。本章将探讨请求影响的重要性以及如何有效地将此技术融入您的提示中。
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-1535
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求影响的重要性
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-1536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过突出特定行动或事件更广泛的影响和重要性，它们增强了理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-1537
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解影响有助于决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-1538
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：影响通过展示不同因素和事件如何相互关联并相互影响，提供背景。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响为了有效地在提示中请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-1540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定行动或事件：清楚地陈述您想要探索的行动、决策或事件，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-1541
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保具体性：明确您感兴趣的特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-1542
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求影响，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-1543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建影响的相关背景或信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-1544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：要求对影响的详细分析，以探索不同方面及其相应的效果。
- en: Examples of Requesting Implications
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-1546
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。影响提示：你能解释可再生能源广泛采用对全球能源市场长期影响的解释吗？
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-1547
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。影响提示：你能提供关于气候变化对全球农业和粮食安全潜在影响的见解吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-1548
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？影响提示：你能讨论从威权政权过渡到民主政府对社会稳定和经济发展的含义吗？
- en: Common Pitfalls to Avoid
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对影响提出模糊或一般性的请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-1551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致对影响的分析不完整或不准确。提供足够的背景信息以构建影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-1552
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多个观点：专注于单一观点可能会限制分析。请求多个观点以探索不同的影响和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
- en: '* * *'
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 74: Request Alternative ViewsRequesting alternative views in your prompts
    is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: 'Chapter 74: Request Alternative ViewsRequesting alternative views in your prompts
    is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-1556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-1557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-1558
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-1559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-1561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-1562
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
- en: 'Use Direct Language**: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-1563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Use Direct Language**: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-1564
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-1565
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
- en: Examples of Requesting Alternative Views
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: Examples of Requesting Alternative Views
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-1567
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-1568
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-1569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”替代观点提示：“你能讨论关于民主政府核心特征的替代观点，包括支持和批评者吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1571
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的请求，确保清晰和相关性，具体说明你需要的内容。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-1572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致不完整或不准确的替代观点。提供足够的背景信息以构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-1573
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点和影响。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代观点是提示工程中的宝贵实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、具体说明、使用直接语言、提供上下文和请求多个视角，你可以确保ChatGPT提供准确和相关的替代观点，以满足你的需求。避免诸如含糊请求、缺乏上下文和忽视多元视角等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 75: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: 第75章：指定评估标准在提示中指定评估标准是提示工程中的重要技巧，有助于聚焦AI的响应并确保它们与你的需求相关。标准提供清晰的指南和边界，提高了信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将此技巧融入你的提示中。评估标准指定的重要性
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-1577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚焦：标准有助于缩小AI的响应范围，使其专注于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-1578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保响应保持清晰并与你的特定需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-1579
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-1580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准提高了响应的精确性，使其更准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准为了有效地在提示中指定评估标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-1582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要解决的问题或主题，确保AI理解你查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-1583
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：明确响应的标准或指南，例如范围、长度、格式或需要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-1584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言来指定标准，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-1585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建标准的相关背景信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-1586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求合规：要求响应符合指定的标准，以确保与您的需求保持一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-1588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”标准指定提示：“你能解释可再生能源的好处，重点放在经济和环境影响上，不超过200字？”
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-1589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”标准指定提示：“你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-1590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”标准指定提示：“你能列出民主政府的核心特征，重点关注政治和社会方面吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-1592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊标准：避免使用模糊或含糊不清的标准。具体说明指南以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-1593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于严格的准则：设定过于严格的准则可能会限制响应的深度和质量。确保您的标准是合理的，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-1594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的信息来界定标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定评估标准是提示工程中的一个关键实践，它增强了重点、清晰度、相关性和精确度。通过确定主题、定义标准、使用直接语言、提供上下文和请求合规，您可以确保ChatGPT提供准确且相关的响应，以满足您的需求。避免诸如模糊标准、过于严格的准则和忽略上下文等错误将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 76: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 第76章：请求简化在提示中请求简化是提示工程中的一个宝贵技巧，有助于将复杂的概念、过程或信息分解成更简单、更易于理解的术语。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将此技巧融入您的提示中。请求简化的重要性
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-1598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-1599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众获取，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-1600
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：简化使信息更具吸引力和相关性，从而提高整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-1601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释在现实世界中的应用更实际，更容易实施。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化为了有效地在提示中请求简化，请考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-1603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要简化的复杂概念或过程，确保AI理解你的查询焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-1604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-1605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化所针对的目标受众，例如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-1606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子以帮助说明简化的概念并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-1607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建简化的相关背景或信息。
- en: Examples of Requesting Simplifications
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-1609
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为10岁的学生简化光合作用的过程，包括一个类比来解释它吗？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-1610
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单语言和例子为没有技术背景的人简化区块链技术吗？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-1611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的？”
- en: Common Pitfalls to Avoid
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1613
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的简化请求。确保具体明确，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-1614
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化很有用，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-1615
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致简化不完整或不准确。提供足够的背景信息以构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一个宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景信息，你可以确保ChatGPT提供符合你需求的清晰和相关的简化。避免诸如模糊请求、过度简化和忽略背景等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 77: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 第77章：请求现实世界应用在提示中请求现实世界应用是提示工程中的一个重要技巧，有助于你了解概念、理论或过程如何实际应用。现实世界应用提供了有形的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入你的提示中。请求现实世界应用的重要性
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-1619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界的应用通过展示它们在实际情境中的使用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-1620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供如何在现实世界背景下实施的具体例子来帮助阐明复杂的思想。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-1621
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：现实世界的应用使信息更具吸引力，并加深对主题的深入了解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-1622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用：为了有效地在提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-1624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：明确说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-1625
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的现实世界应用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-1626
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求现实世界应用，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-1627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建现实世界应用的相关的上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-1628
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求现实世界应用的详细例子，以了解概念是如何实施及其影响的。
- en: Examples of Requesting Real-World Applications
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-1630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供可再生能源，如太阳能和风能，在不同行业中如何被使用的现实世界例子吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-1631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化影响而实施的现实世界倡议和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-1632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”现实世界应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1634
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对现实世界应用进行模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-1635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以构建现实世界的应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-1636
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视具体性：一般性的例子可能无法提供你所需要的深度。请求详细的例子以了解实际实施及其影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求实际应用是提示工程中的重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体说明、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰和相关的实际应用。避免模糊请求、缺乏背景信息和忽略具体性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 78: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 第78章：请求统计分析在提示中请求统计分析是提示工程中的一个有价值的技术，帮助你获得定量洞察和证据来支持你的查询。统计分析提供了事实依据，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-1640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实依据，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-1641
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-1642
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-1643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析为了在提示中有效地请求统计分析，请考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-1645
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-1646
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，例如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-1647
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-1648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建统计分析的相关背景信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-1649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-1651
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”统计分析提示：“你能提供关于过去十年中太阳能和风能等可再生能源采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-1652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”统计分析提示：“你能提供关于过去50年中全球温度上升和极端天气事件发生频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-1653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于不同行业中区块链技术增长的统计分析吗？包括基于区块链的公司和项目数量？”
- en: Common Pitfalls to Avoid
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-1655
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的统计分析请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-1656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的背景信息来构建统计分析框架。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-1657
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视来源：没有可信来源的统计分析可能不可靠。始终要求提供来源或参考文献，以确保分析的可靠性。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一项宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景信息和要求来源，你可以确保ChatGPT提供符合你需求的准确和可靠的统计分析。避免诸如模糊请求、缺乏背景信息和忽视来源等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 79: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: 第79章：请求历史比较在提示中请求历史比较是提示工程中的一个重要技巧，有助于你理解当前事件、概念或现象与历史事件的关系或差异。历史比较提供背景和洞察，增强理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-1661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史比较通过展示当前事件或概念与过去的联系，提供背景信息。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-1662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们提供了对模式、趋势以及观点或事件随时间演变的洞察。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-1663
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和不同之处，增强了理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-1664
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了一个更广阔的视角，有助于将特定主题置于更大的历史叙事中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较为了有效地在提示中请求历史比较，考虑以下策略：
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-1666
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要与历史事件比较的当前事件、概念或现象，确保AI理解你的查询焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-1667
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-1668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求历史比较，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-1669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建历史比较的相关背景或信息。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-1670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面进行比较，例如原因、影响或结果，以确保分析集中。
- en: Examples of Asking for Historical Comparisons
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-1672
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。历史比较提示：你能将当前可再生能源的采用与工业革命期间煤炭的采用进行比较吗？
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-1673
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。历史比较提示：你能将当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期进行比较吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-1674
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？历史比较提示：你能将现代民主政府的核心特征与古代雅典民主的特征进行比较吗？
- en: Common Pitfalls to Avoid
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1676
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对历史比较提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-1677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致比较不完整或不准确。提供足够的背景信息来构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-1678
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度详细：虽然历史比较很有用，但提供过多细节可能会使回答显得繁杂。关注最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史比较是提示工程中的一项重要实践，它通过增强上下文、洞察力、理解和观点来提高效果。通过确定主题、指定历史时期、使用直接语言、提供上下文以及请求具体方面，你可以确保ChatGPT提供符合你需求的准确且相关的历史比较。避免诸如模糊请求、缺乏上下文和过度详细等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 80: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 第80章：寻求跨学科洞察力在提示中寻求跨学科洞察力是提示工程中的一种宝贵技术，有助于你探索不同领域或学科如何交叉和相互影响。跨学科洞察力通过整合来自各个领域的知识提供更广阔的视角，并增强理解。本章将探讨寻求跨学科洞察力的重要性以及如何有效地将这项技术融入你的提示中。寻求跨学科洞察力的重要性
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-1682
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：通过整合来自不同领域或学科的知识，跨学科洞察力提供了更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-1683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：他们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-1684
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科洞察力通过展示不同领域如何交叉和相互影响来增强理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-1685
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：他们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了在提示中有效地寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要探索的主题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-1688
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的不同的领域或学科，如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-1689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求跨学科见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-1690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建跨学科见解的相关背景或信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-1691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求整合：请求从不同领域整合知识，以探索它们如何相交并影响该主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-1693
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括环境科学、经济学和社会政策的视角吗？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-1694
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。跨学科提示：你能提供关于气候变化影响的跨学科见解，包括气候学、农业和公共卫生的视角吗？
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-1695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”跨学科提示：“你能提供关于人工智能的跨学科见解，包括计算机科学、伦理和社会学的视角吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1697
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的跨学科见解请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-1698
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景信息可能导致见解不完整或不准确。提供足够的背景信息来构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-1699
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视整合：仅关注单个领域可能会限制分析。请求整合知识以探索不同领域如何相交并影响该主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科见解是提示工程中的一种宝贵实践，它增强了视角、创新、理解和解决问题的能力。通过确定主题、指定学科、使用直接语言、提供背景信息和请求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏背景和忽视整合等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 81: Request Solutions to ProblemsRequesting solutions to problems in
    your prompts is an important technique in prompt engineering that helps you explore
    potential answers and strategies for addressing various issues. Solutions provide
    practical and actionable information that can guide decision-making and problem-solving.
    This chapter will explore the importance of requesting solutions to problems and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Solutions to Problems'
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 'Chapter 81: Request Solutions to ProblemsRequesting solutions to problems in
    your prompts is an important technique in prompt engineering that helps you explore
    potential answers and strategies for addressing various issues. Solutions provide
    practical and actionable information that can guide decision-making and problem-solving.
    This chapter will explore the importance of requesting solutions to problems and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Solutions to Problems'
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-1703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-1704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-1705
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-1706
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
  zh: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1708
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-1709
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-1710
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-1711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-1712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
- en: Examples of Requesting Solutions to Problems
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: Examples of Requesting Solutions to Problems
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-1714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-1715
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-1716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
- en: Common Pitfalls to Avoid
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: Common Pitfalls to Avoid
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-1718
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-1719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-1720
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求问题的解决方案是提示工程中的一项重要实践，它增强了实用性、决策、问题解决和创新。通过识别问题、具体化、使用直接语言、提供上下文以及请求多个解决方案，你可以确保ChatGPT提供准确且符合你需求的解决方案。避免诸如模糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 82: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-1723
  prefs: []
  type: TYPE_NORMAL
  zh: 第82章：请求应用示例在提示中请求应用示例是提示工程中的一种实用技术，有助于说明概念、理论或过程如何在现实世界场景中使用。应用示例提供了具体的实例，增强了理解和相关性。本章将探讨请求应用示例的重要性以及如何有效地将此技术融入你的提示中。请求应用示例的重要性
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-1724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：应用示例通过提供具体的使用实例来帮助阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-1725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示如何在现实世界场景中应用，使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-1726
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：应用示例使信息更具参与性和相关性，增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-1727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：了解现实世界应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-1728
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用示例为了有效地在提示中请求应用示例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-1729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要应用示例的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-1730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确你感兴趣的特定应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-1731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求应用示例，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-1732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建示例的相关上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-1733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细示例：请求详细示例以了解概念是如何实施的及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用示例的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-1735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供可再生能源，如太阳能和风能，在不同行业中应用的示例吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-1736
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域的应用示例吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-1737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“人工智能是什么？”应用提示：“你能提供人工智能在不同领域（如医疗保健、金融和交通）中的实际应用示例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对应用示例进行模糊或泛泛的请求。确保具体化以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-1740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以构建应用框架。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-1741
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提供示例：虽然示例很有用，但一次请求太多可能会令人不知所措。专注于可管理的示例数量以保持清晰。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用示例是提示工程中一种实用且有效的方法，可以增强清晰度、相关性、参与度和可用性。通过识别概念、具体化、使用直接语言、提供上下文和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰和相关的应用示例。避免诸如模糊请求、缺乏上下文和过度提供示例等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 83: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 第83章：使用假设情景在提示中使用假设情景是提示工程中一种强大的技术，允许你探索不同的可能性、情景和结果。假设情景刺激创造性思维，并可以提供对某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。使用假设情景的重要性
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-1745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的了解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-1746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案来鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-1747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：假设情景可以通过模拟不同的情况来帮助识别潜在的问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-1748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用假设情景使互动更具吸引力和动态性，促进对主题的更深入探索。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景为了有效地在你的提示中使用假设情景，考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-1750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景构造成“如果...将会怎样”的问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-1751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-1752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束，以引导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-1753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设情景请求具体的成果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-1754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创新：邀请AI进行创新性思考，并考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 假设情景的应用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-1756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”假设情景提示：“如果一个国家过渡到100%的可再生能源，经济、环境和社交影响会是什么？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-1757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。”假设情景提示：“如果所有国家都同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-1758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”假设情景提示：“如果一个实行威权政体的国家过渡到民主政府，这个过渡过程中可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-1760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-1761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数被明确定义，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-1762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设情景鼓励创造性思维，但请考虑在创造性与可行性之间取得平衡，以确保其实际相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-1763
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用假设情景是提示工程中的一个强大技术，它增强了探索、创造性思维、问题解决和参与度。通过提出“如果”问题，保持清晰和具体，定义参数，请求结果，并鼓励创新，您可以构建有效地利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 84: Ask for Alternative SolutionsAsking for alternative solutions in
    your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-1765
  prefs: []
  type: TYPE_NORMAL
  zh: 第84章：请求替代方案在提示中请求替代方案是提示工程中的一个有价值的技术，它帮助您探索解决各种问题的不同方法和策略。替代方案提供了更广阔的视角，并鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代方案的重要性以及如何有效地将此技术融入您的提示中。
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-1766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求替代方案的重要性
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-1767
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全面问题解决：它们提供更广阔的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-1768
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明智的决策：考虑多种解决方案通过展示各种选项及其影响，支持明智的决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-1769
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：通过突出解决问题的不同方式，替代方案提供了灵活性，允许采用适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-1770
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代解决方案为了在提示中有效地请求替代解决方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：明确陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-1772
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持具体：指定任何你感兴趣的特定方面或细节，例如约束条件、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-1773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求替代解决方案，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-1774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定问题和潜在解决方案的相关上下文或背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-1775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代解决方案的示例
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-1777
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代解决方案提示：“你能提供减轻气候变化对沿海城市影响的替代方案，包括短期和长期策略吗？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-1778
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”替代解决方案提示：“你能提供在发展中国家增加可再生能源采用率的替代方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-1779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案，包括沟通、生产力和工作与生活平衡吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-1781
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对替代解决方案提出模糊或泛泛的请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-1782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-1783
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性，以确保实际的相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代解决方案是提示工程中的一种宝贵实践，它增强了创造力、全面的问题解决、明智的决策和灵活性。通过确定问题、保持具体、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代解决方案，以满足你的需求。避免模糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 85: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: 第85章：寻求概念澄清在提示工程中，寻求提示中概念的澄清是一项重要技术，有助于确保你完全理解复杂想法、术语或过程。澄清提供详细的解释，增强理解并消除歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-1787
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供详细的解释，有助于加深对复杂想法、术语或过程的了解。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-1788
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，降低误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-1789
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中定位概念，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-1790
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念有助于在准确有效地应用信息时建立信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1792
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地陈述你需要澄清的概念或术语，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-1793
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如其应用或背景。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-1794
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-1795
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：要求示例以说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-1796
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建澄清的相关背景信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-1798
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清叶绿素在光合作用光反应中的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-1799
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-1800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中的叠加概念并提供其应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1802
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的澄清请求。确保具体说明你需要什么以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-1803
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致不完整或不准确的澄清。提供足够的背景信息以构建概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-1804
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求概念澄清是提示工程中的重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、具体化、使用直接语言、请求示例和提供背景，你可以确保ChatGPT提供针对你需求的详细和准确的澄清。避免模糊请求、缺乏背景和问题过多等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Chapter 86: Request Detailed ExplanationsRequesting detailed explanations in
    your prompts is a key technique in prompt engineering that helps you gain a deeper
    understanding of concepts, processes, and phenomena. Detailed explanations provide
    comprehensive insights that enhance learning and comprehension. This chapter will
    explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: 第86章：请求详细解释在提示中请求详细解释是提示工程的关键技术，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-1808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的解释提供了对事物工作方式的深入见解，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-1809
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-1810
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：详细的解释提供了背景信息，帮助你理解不同概念之间的广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-1811
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了有效地在提示中请求详细解释，考虑以下策略：
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的重要性
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-1813
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地说明你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-1814
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-1815
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何相关的背景信息，这有助于构建解释框架。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-1816
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-1817
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：要求提供示例来说明解释，并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-1819
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的工作原理。”详细解释提示：“你能解释光合作用是如何工作的，包括叶绿素的作用和过程的不同阶段？”
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-1820
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述区块链技术。详细解释提示：你能解释区块链技术是如何工作的，包括交易是如何被验证并添加到区块链中的？
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-1821
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”详细解释提示：“你能解释量子计算的基本原理，包括叠加和纠缠的概念？”
- en: Common Pitfalls to Avoid
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-1823
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的详细解释请求。确保具体，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-1824
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解释不完整或不准确。提供足够的信息以构建解释框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-1825
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求详细解释是提示工程中的关键实践，它增强了深度、清晰度、上下文和参与度。通过具体化、使用直接语言、提供上下文、要求逐步解释和请求示例，你可以确保ChatGPT提供针对你需求的详细和全面的解释。避免如含糊请求、缺乏上下文和过于宽泛的问题等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 87: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 第87章：使用比较在提示中使用比较是提示工程中的一个有价值的技巧，有助于阐明概念、对象或场景之间的差异和相似之处。比较提供了更清晰的见解，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-1829
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：比较有助于通过将抽象或复杂的概念与更熟悉的思想联系起来或突出差异来澄清这些概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-1830
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过识别相似之处和差异，它们提供了更深入的见解，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-1831
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策制定：通过并排展示多个选项或观点，比较有助于基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-1832
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较为了有效地在你的提示中使用比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-1834
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要比较的概念、对象或场景，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-1835
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定比较的方面或标准，例如功能、有效性、优缺点等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-1836
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似之处”、“不同之处”）来清楚地表达你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-1837
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建比较的相关上下文或背景信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-1838
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：要求进行详细的比较，以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: 比较的使用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-1840
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：请“解释可再生能源的好处。”比较提示：“你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-1841
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“你能比较植物中光合作用的过程与动物中细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-1842
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“你能比较人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-1844
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的比较：避免提出过于宽泛或一般的比较请求。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-1845
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要上下文可能导致比较不完整或不准确。提供足够背景信息以构建比较。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-1846
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不清晰的表述：使用模糊或不明确的语言可能会掩盖比较的意图。请确保你的措辞精确，以便AI能够理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用比较是一种在提示工程中非常有价值的技巧，它增强了清晰度、洞察力、决策力和理解力。通过识别概念、具体化、使用比较语言、提供上下文以及请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免诸如过于宽泛的比较、缺乏上下文和表述不清晰等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 88: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: 第88章：请求见解在提示中使用请求见解是一种在提示工程中非常有价值的技巧，它有助于揭示对各种主题的更深入的理解、解释和观点。见解提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求见解的重要性以及如何有效地将此技巧融入你的提示中。请求见解的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-1850
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：见解提供了对主题的更深入理解，揭示了潜在的原则、模式或影响。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-1851
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-1852
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：见解通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-1853
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求见解鼓励更互动和有趣的探索主题，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求见解为了有效地在提示中请求见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-1855
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要深入了解的主题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-1856
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、影响或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-1857
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-1858
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建见解的相关背景信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-1859
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: 请求洞察的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-1861
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”洞察提示：“你能提供关于可再生能源的采用如何影响未来十年全球能源市场的洞察吗？”
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-1862
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”洞察提示：“你能提供关于气候变化对生物多样性和生态系统长期影响的洞察吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-1863
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”洞察提示：“你能提供关于民主政府的原则如何影响社会和经济发展的洞察吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-1865
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或一般性的洞察请求。确保具体化，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-1866
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致不完整或不准确的洞察。提供足够的信息来构建洞察。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-1867
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和背景。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求洞察是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体化、使用直接语言、提供背景和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的洞察。避免诸如模糊请求、缺乏背景和忽视解释等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: 重要性
- en: 'Chapter 89: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: 第89章：请求对比在提示工程中请求对比是一种强大的技术，有助于突出概念、对象或场景之间的差异和区别。对比通过强调不同元素的特点，提供清晰的洞察并增强理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-1871
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：对比有助于阐明差异和区别，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-1872
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过突出不同元素的特点，提供更深入的洞察，增强理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-1873
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清晰地展示不同选项的优点和缺点，促进明智的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-1874
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供比较视角，展示不同元素之间的关系，增强整体理解。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-1875
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比为了有效地在提示中请求对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-1876
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定元素：清楚地说明你想要对比的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-1877
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定对比的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-1878
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地构建你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-1879
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建对比的相关背景或信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-1880
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细的对比：请求详细的对比以探索不同方面及其相应的后果。
- en: Examples of Asking for Contrasts
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-1882
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”对比提示：“你能从成本、效率和环境影响的角度对比太阳能与风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-1883
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。对比提示：你能对比植物光合作用与动物细胞呼吸的过程吗？
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-1884
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”对比提示：“你能对比人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1885
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-1886
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的对比：避免请求过于广泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-1887
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要的背景信息可能导致对比不完整或不准确。提供足够的背景信息以构建对比。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-1888
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖对比的意图。确保用词精确，以确保AI理解你的请求。
- en: 'ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg) Chapter
    90: Request ImplicationsRequesting implications in your prompts is a valuable
    technique in prompt engineering that helps you explore the potential consequences
    and effects of actions, decisions, or events. Understanding implications provides
    deeper insights and supports informed decision-making. This chapter will explore
    the importance of requesting implications and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Implications'
  id: totrans-1889
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中请求对比是提示工程中的一种强大技术，它增强了清晰度、洞察力、决策和理解的深度。通过识别元素、具体化、使用比较语言、提供背景和请求详细的对比，你可以确保ChatGPT提供符合你需求的清晰和相关的对比。避免过度广泛的对比、缺乏背景和语言不清晰等陷阱将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第90章：请求影响
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-1890
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件可能后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-1891
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过突出特定行动或事件更广泛的影响和重要性，它们增强了理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-1892
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示可能的成果和风险，理解影响有助于决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-1893
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：影响通过展示不同因素和事件如何相互关联和影响彼此来提供上下文。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-1894
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响：为了在提示中有效地请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-1895
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地陈述你想要探索的行动、决策或事件，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-1896
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：指定你感兴趣的任何特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-1897
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言来请求影响，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-1898
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定影响的相关的上下文或背景信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-1899
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：请求对影响的详细分析，以探索不同方面及其相应的影响。
- en: Examples of Requesting Implications
  id: totrans-1900
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-1901
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”影响提示：“你能解释广泛采用可再生能源对全球能源市场长期影响的含义吗？”
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-1902
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”影响提示：“你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-1903
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”影响提示：“你能讨论从威权体制过渡到民主政府在社会稳定和经济发展方面的含义吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1904
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1905
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对影响进行模糊或一般性的请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-1906
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致对影响的分析不完整或不准确。提供足够的背景信息来界定影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-1907
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多重观点：专注于单一观点可能会限制分析。请求多个观点以探索不同的影响和结果。
- en: 'ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg)
    Chapter 91: Request Alternative ViewsRequesting alternative views in your prompts
    is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求含义是提示工程中的一种宝贵实践，它增强了深度、理解、决策和上下文。通过识别行为或事件，具体说明，使用直接语言，提供上下文，并要求详细分析，你可以确保ChatGPT为你提供准确且相关的见解，针对你的需求量身定制。避免诸如模糊请求、缺乏上下文和忽视多个观点等陷阱，将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第91章：请求不同观点在提示中请求不同观点是提示工程中的一种宝贵技巧，有助于你探索一个主题的不同视角和观点。不同的观点提供了更广泛和更细腻的理解，鼓励批判性思维和平衡评估。本章将探讨请求不同观点的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-1909
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：不同观点通过呈现一个议题或主题的不同方面来提供平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-1910
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-1911
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-1912
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑不同观点通过呈现多个选项和考虑因素来支持情报决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-1913
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同观点为了有效地在提示中请求不同观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-1914
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明你想要不同观点的主题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-1915
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-1916
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言来请求不同观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-1917
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建不同观点的相关背景信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-1918
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-1919
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-1920
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”不同观点提示：“你能提供关于可再生能源好处的不同观点，包括正面和批评的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-1921
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”不同观点提示：“你能提供关于气候变化影响的不同观点，包括来自环保主义者和怀疑论者的观点吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-1922
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： “民主政府的核心特征是什么？”  替代观点提示： “你能讨论关于民主政府核心特征的替代观点，包括支持者和批评者吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1923
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1924
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代观点的模糊或一般性请求。确保具体化以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-1925
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的替代观点。提供足够的背景信息以构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-1926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点和影响。
- en: 'ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg)
    Chapter 92: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-1927
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代观点是提示工程中的一种宝贵实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、具体化、使用直接语言、提供背景信息以及请求多个观点，你可以确保ChatGPT提供准确且相关的替代观点，以满足你的需求。避免如模糊请求、缺乏背景信息和忽视多元视角等陷阱，将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第92章：指定评估标准在提示中指定评估标准是提示工程中的重要技巧，有助于聚焦AI的响应并确保它们与你的需求相关。标准提供清晰的指导方针和边界，提高了信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-1928
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚焦：标准有助于缩小AI的响应范围，使其聚焦于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-1929
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保响应保持清晰并与你的具体需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-1930
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-1931
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准增强了响应的精确性，使其更加准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-1932
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准为了有效地在提示中指定评估标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-1933
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确陈述你想要解决的问题或主题，确保AI能够理解你查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-1934
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定响应的标准或指南，例如范围、长度、格式或要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-1935
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来指定标准，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-1936
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建标准的有关背景信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-1937
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求合规性：要求回答符合指定的标准，以确保与您的需求一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-1938
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-1939
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”标准指定的提示：“你能解释可再生能源的好处吗，重点在于经济和环境影响，不超过200字？”
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-1940
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”标准指定的提示：“你能描述气候变化对沿海城市的影响吗，包括短期和长期效应？”
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-1941
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”标准指定的提示：“你能列出民主政府的核心特征，重点在于政治和社会方面？”
- en: Common Pitfalls to Avoid
  id: totrans-1942
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-1943
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊标准：避免使用模糊或含糊不清的标准。确保指南具体，以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-1944
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于严格的限制标准：设定过于严格的限制可能会限制回答的深度和质量。确保您的标准合理，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-1945
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的背景信息以确定标准。
- en: 'ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg) Chapter
    93: Request SimplificationsRequesting simplifications in your prompts is a valuable
    technique in prompt engineering that helps break down complex concepts, processes,
    or information into simpler and more understandable terms. Simplifications enhance
    clarity and accessibility, making information easier to comprehend. This chapter
    will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-1946
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-1947
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-1948
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众获取，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-1949
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：简化使信息更具吸引力和相关性，从而提高整体理解力。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-1950
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释更实用，更容易在实际情况下应用。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-1951
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-1952
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要简化的复杂概念或过程，确保AI理解你查询的焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-1953
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-1954
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指明简化的目标受众，例如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-1955
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：要求提供类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-1956
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建简化的相关背景或信息。
- en: Examples of Requesting Simplifications
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-1958
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释它？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-1959
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单语言和例子为没有技术背景的人简化区块链技术吗？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-1960
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的？”
- en: Common Pitfalls to Avoid
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-1962
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或泛泛的简化请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-1963
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化很有用，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-1964
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致简化不完整或不准确。提供足够的背景信息以构建简化。
- en: 'ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.![](image/image-0-0.jpg) Chapter 94: Request
    Real-World ApplicationsRequesting real-world applications in your prompts is an
    important technique in prompt engineering that helps you understand how concepts,
    theories, or processes can be applied practically. Real-world applications provide
    tangible examples that enhance understanding and relevance. This chapter will
    explore the importance of requesting real-world applications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Real-World
    Applications'
  id: totrans-1965
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景信息，你可以确保ChatGPT提供符合你需求的清晰和相关的简化。避免诸如模糊请求、过度简化以及忽略背景信息等陷阱，将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第94章：请求现实世界应用在提示中请求现实世界应用是提示工程中的重要技巧，有助于你了解概念、理论或过程如何在实际中应用。现实世界的应用提供了具体的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-1966
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界的应用通过展示它们在实际情境中的使用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-1967
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：它们通过提供如何在现实世界环境中实施的具体例子，帮助阐明复杂的概念。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-1968
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：现实世界的应用使信息更具吸引力和趣味性，从而加深对主题的深入了解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-1969
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了在提示中有效地请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-1971
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-1972
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的现实世界应用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-1973
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求现实世界应用，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-1974
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建现实世界应用的相关的背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-1975
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求详细的现实世界应用例子，以了解概念是如何实施的及其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-1977
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供太阳能和风能等可再生能源在不同行业中应用的实例吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-1978
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化实施的实际倡议和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-1979
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“区块链技术是什么？”现实世界应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-1980
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-1981
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对现实世界应用提出模糊或泛泛的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-1982
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致例子不完整或不准确。提供足够的背景信息以构建现实世界应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-1983
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般性的例子可能无法提供你所需要的深度。请求详细例子以了解实际实施和影响。
- en: 'ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.![](image/image-0-0.jpg) Chapter 95: Request
    Statistical AnalysisRequesting statistical analysis in your prompts is a valuable
    technique in prompt engineering that helps you obtain quantitative insights and
    evidence to support your queries. Statistical analysis provides a factual basis
    that enhances the accuracy and credibility of the information. This chapter will
    explore the importance of requesting statistical analysis and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Statistical
    Analysis'
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求现实世界的应用是提示工程中的重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰和相关的现实世界应用。避免模糊请求、缺乏背景信息和忽视具体性等陷阱，将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第95章：请求统计分析在提示中请求统计分析是提示工程中的一个宝贵技巧，有助于你获得定量洞察和证据来支持你的查询。统计分析提供了一个事实基础，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-1985
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了一个事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-1986
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-1987
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-1988
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析：为了在提示中有效地请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-1990
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要进行统计分析的议题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-1991
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指明你感兴趣的统计分析方法，例如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-1992
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-1993
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建统计分析的相关背景信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-1994
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-1996
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 统计分析提示：“你能提供过去十年中太阳能和风能等可再生能源采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-1997
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 统计分析提示：“你能提供过去50年中全球温度上升和极端天气事件发生频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-1998
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于不同行业中区块链技术增长的统计分析，包括基于区块链的公司和项目数量？”
- en: Common Pitfalls to Avoid
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-2000
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的统计分析请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-2001
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景信息可能导致分析不完整或不准确。提供足够的背景信息以构建统计分析框架。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-2002
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终要求提供来源或参考，以确保分析的可信度。
- en: 'ConclusionRequesting statistical analysis is a valuable practice in prompt
    engineering that enhances accuracy, credibility, insight, and decision-making.
    By identifying the topic, specifying the type of analysis, using direct language,
    providing context, and asking for sources, you can ensure that ChatGPT provides
    accurate and reliable statistical analysis tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring sources will further improve
    the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg) Chapter
    96: Ask for Historical ComparisonsAsking for historical comparisons in your prompts
    is an important technique in prompt engineering that helps you understand how
    current events, concepts, or phenomena relate to or differ from historical ones.
    Historical comparisons provide context and insights that enhance understanding
    and relevance. This chapter will explore the importance of asking for historical
    comparisons and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Historical Comparisons'
  id: totrans-2003
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-2004
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史比较通过展示当前事件或概念如何与过去的事件或概念相关联，提供背景。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-2005
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们提供了对模式、趋势以及观点或事件随时间演变的洞察。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-2006
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和不同之处，增强了理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-2007
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了一个更广泛的视角，有助于将特定主题置于更大的历史叙事中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-2008
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-2009
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确指出你想要与历史事件、概念或现象进行比较的当前事件、概念或现象，确保AI理解你的查询焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-2010
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-2011
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求历史比较，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-2012
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建历史比较的相关背景或信息。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-2013
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面的比较，如原因、影响或结果，以确保分析具有针对性。
- en: Examples of Asking for Historical Comparisons
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-2015
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。历史比较提示：你能比较当前可再生能源的采用与工业革命期间煤炭的采用吗？
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-2016
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能比较当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-2017
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史比较提示：“你能比较现代民主政府的核心特征与古代雅典民主的核心特征吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2019
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对历史比较提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-2020
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致比较不完整或不准确。提供足够的背景信息来构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-2021
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提供细节：虽然历史比较很有用，但提供过多细节可能会使回答显得繁重。关注最相关的方面。
- en: 'ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg)
    Chapter 97: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-2022
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史比较是提示工程中的一种重要实践，它增强了上下文、洞察力、理解和观点。通过确定主题、指定历史时期、使用直接语言、提供上下文以及请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如模糊请求、缺乏上下文和细节过多等陷阱将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第97章：寻求跨学科见解在提示中寻求跨学科见解是提示工程中的一种宝贵技术，帮助你探索不同领域或学科如何交叉和相互影响。跨学科见解通过整合来自各个领域的知识提供了更广阔的视角，并增强了理解。本章将探讨寻求跨学科见解的重要性以及如何有效地将这项技术融入你的提示中。寻求跨学科见解的重要性
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-2023
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：跨学科见解通过整合来自不同领域或学科的知识提供了更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-2024
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：他们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-2025
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域如何交叉和相互影响来增强理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-2026
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：他们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-2027
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了在提示中有效地寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2028
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要探索的主题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-2029
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的不同的领域或学科，如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-2030
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求跨学科见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-2031
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建跨学科见解的相关上下文或背景信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-2032
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求整合：请求不同领域的知识整合，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-2033
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-2034
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括来自环境科学、经济学和社会政策的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-2035
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”跨学科提示：“你能提供关于气候变化影响的跨学科见解，包括来自气候学、农业和公共健康的观点吗？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-2036
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”跨学科提示：“你能提供关于人工智能的跨学科见解，包括来自计算机科学、伦理学和社会学的观点吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2037
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2038
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的跨学科见解请求。具体说明你需要什么，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-2039
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致见解不完整或不准确。提供足够的背景信息来构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-2040
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略整合：仅关注单个领域可能会限制分析。请求整合知识以探索不同领域如何交叉和影响主题。
- en: 'ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg)
    Chapter 98: Request Solutions to ProblemsRequesting solutions to problems in your
    prompts is an important technique in prompt engineering that helps you explore
    potential answers and strategies for addressing various issues. Solutions provide
    practical and actionable information that can guide decision-making and problem-solving.
    This chapter will explore the importance of requesting solutions to problems and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Solutions to Problems'
  id: totrans-2041
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科见解是提示工程中的一种宝贵实践，它增强了视角、创新、理解和问题解决。通过确定主题、指定学科、使用直接语言、提供背景信息和请求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免陷入模糊请求、缺乏背景信息和忽视整合等陷阱，将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第98章：请求解决问题的解决方案在提示中请求解决问题的解决方案是提示工程中的重要技巧，帮助你探索潜在答案和策略以解决各种问题。解决方案提供实用且可操作的信息，可以指导决策和问题解决。本章将探讨请求解决问题的解决方案的重要性以及如何有效地将此技巧融入你的提示中。请求解决问题的解决方案的重要性
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-2042
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用且可操作的信息，可以直接应用于解决问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-2043
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：它们通过展示潜在答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-2044
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：解决方案通过提供克服挑战的具体方法来促进问题解决。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-2045
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：请求解决方案通过探索各种策略和想法，鼓励创造性思维和创新。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-2046
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的解决方案为了在提示中有效地请求解决方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2047
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询重点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-2048
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：指定你感兴趣的任何特定方面或细节，例如约束条件、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-2049
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直截了当的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-2050
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-2051
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案，以探索解决问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-2052
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决问题的解决方案示例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-2053
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述气候变化的影响。" 解决方案提示："你能提供减轻气候变化对沿海城市影响的解决方案吗，包括短期和长期策略？"
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-2054
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："可再生能源的好处是什么？" 解决方案提示："你能提供在发展中国家增加可再生能源采用率的解决方案吗？"
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-2055
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释远程工作的挑战。" 解决方案提示："你能提供解决远程工作挑战的解决方案吗，包括沟通、生产力和工作与生活平衡？"
- en: Common Pitfalls to Avoid
  id: totrans-2056
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视可行性：在寻求创新解决方案的同时，考虑其实际可行性。
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-2057
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的解决方案请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-2058
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息以界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-2059
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性以确保实际相关性。
- en: 'ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg)
    Chapter 99: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-2060
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求解决问题的方案是提示工程中的一种重要实践，它增强了实用性、决策、问题解决和创新。通过识别问题、具体说明、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且符合你需求的解决方案。避免模糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第99章：请求应用示例
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-2061
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：应用实例通过提供具体的使用实例来帮助阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-2062
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：通过展示其在现实世界场景中的应用，使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-2063
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：应用实例使信息更具吸引力和相关性，从而提高整体理解力。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-2064
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-2065
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用示例的例子
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-2066
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定示例的相关上下文或背景信息。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-2067
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的适用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-2068
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：确保你的请求具体明确，避免泛泛而谈。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-2069
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求应用示例，确保AI理解你的请求。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-2070
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细示例：请求详细示例以了解概念是如何实施的及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要应用示例的概念、理论或过程，确保AI理解你的查询焦点。
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-2072
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供一些例子，说明可再生能源，如太阳能和风能，在不同行业中的应用吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-2073
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供一些例子，说明区块链技术在各个领域的应用，如金融、供应链和医疗保健吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-2074
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”应用提示：“你能提供一些例子，说明人工智能在不同领域的实际应用，如医疗保健、金融和交通吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2076
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的要求：避免对应用例子提出含糊或一般性的要求。要具体说明你需要什么，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-2077
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息，以界定应用的范围。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-2078
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度举例：虽然举例很有用，但一次性要求太多可能会让人感到不知所措。专注于可管理的例子数量，以保持清晰性。
- en: 'ConclusionAsking for examples of applications is a practical and effective
    practice in prompt engineering that enhances clarity, relevance, engagement, and
    usability. By identifying the concept, being specific, using direct language,
    providing context, and asking for detailed examples, you can ensure that ChatGPT
    provides clear and relevant examples of applications tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and overloading with examples
    will further improve the effectiveness of your interactions with ChatGPT.![](image/image-0-0.jpg)
    Chapter 100: Use Hypothetical ScenariosUsing hypothetical scenarios in your prompts
    is a powerful technique in prompt engineering that allows you to explore different
    possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate creative
    thinking and can provide insights into how certain actions or events might impact
    a situation. This chapter will explore the importance of using hypothetical scenarios
    and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-2079
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求应用例子是提示工程中的一种实用且有效的方法，可以增强清晰性、相关性、参与度和可用性。通过识别概念、具体化、使用直接语言、提供上下文和请求详细例子，你可以确保ChatGPT提供符合你需求的清晰和相关的应用例子。避免陷入模糊要求、缺乏上下文和过度举例等陷阱，将进一步提高你与ChatGPT互动的有效性。![图片](image/image-0-0.jpg)
    第100章：使用假设情景
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-2080
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的了解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-2081
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们鼓励创造性和批判性思维，挑战AI考虑不同的观点和解决方案。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-2082
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：假设情景可以通过模拟不同情况来帮助识别潜在问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-2083
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用假设情景使互动更加吸引人和动态，促进对主题的深入探讨。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-2085
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景构造成“如果...会怎样？”的问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-2086
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表达清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-2087
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或限制条件，以引导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-2088
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设情景请求具体的成果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-2089
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造性：邀请AI进行创造性思考，考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-2090
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设情景的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-2091
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 假设情景提示：“如果一个国家过渡到100%的可再生能源，会对经济、环境和社交产生什么影响？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-2092
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 假设情景提示：“如果所有国家同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-2093
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 假设情景提示：“如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-2094
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-2095
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-2096
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的条件：确保假设情景中的条件和参数被明确定义，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-2097
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设情景可以激发创造性思维，但考虑在某种程度上平衡创造性与可行性，以确保其实际相关性。
- en: 'ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.![](image/image-0-0.jpg) Chapter 101: Ask for Alternative SolutionsAsking
    for alternative solutions in your prompts is a valuable technique in prompt engineering
    that helps you explore different approaches and strategies for addressing various
    issues. Alternative solutions provide a broader perspective and encourage creative
    thinking, leading to more comprehensive problem-solving. This chapter will explore
    the importance of asking for alternative solutions and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用假设情景是提示工程中的一种强大技术，可以增强探索、创造性思维、问题解决和参与度。通过提出“如果...会怎样？”的问题，表达清晰具体，定义参数，请求结果，并鼓励创造性，你可以构建出有效地利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱，将进一步提高你与ChatGPT交互的有效性。![图片](image/image-0-0.jpg)
    第101章：请求替代方案
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-2099
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造力：替代解决方案通过探索不同的方法和策略，鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-2100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全面的问题解决：它们提供了更广泛的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-2101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案通过呈现各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-2102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：替代解决方案通过突出解决问题的不同方式，提供了灵活性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-2103
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代解决方案为了在提示中有效地请求替代方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确问题：清楚地说明你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-2105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如约束、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-2106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求替代解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-2107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-2108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案，以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代解决方案的例子
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-2110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代解决方案提示：“你能提供减轻气候变化对沿海城市影响的替代方案，包括短期和长期策略吗？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-2111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”替代解决方案提示：“你能提供在发展中国家增加可再生能源采用率的替代方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-2112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案，包括沟通、生产力和工作与生活平衡吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-2114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对替代解决方案的模糊或一般性请求。确保对问题和所需解决方案的类型具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-2115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的解决方案。提供足够的背景信息以界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-2116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创造性解决方案很有价值，但考虑平衡创造性与可行性，以确保其实用相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-2117
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代解决方案是提示工程中的一种宝贵实践，它通过增强创造力、全面问题解决、明智的决策和灵活性来提高效果。通过识别问题、具体化、使用直接语言、提供背景和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代解决方案，以满足你的需求。避免诸如模糊请求、缺乏背景和忽视可行性等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2118
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 102: Utilize Analogies for ClarityUsing analogies in your prompts is
    an effective technique in prompt engineering that helps clarify complex concepts
    by relating them to familiar ideas. Analogies bridge the gap between unfamiliar
    and known concepts, making it easier to understand and process information. This
    chapter will explore the importance of using analogies and how to effectively
    incorporate this technique into your prompts.Importance of Using Analogies'
  id: totrans-2119
  prefs: []
  type: TYPE_NORMAL
  zh: 第102章：利用类比来提高清晰度在提示中使用类比是提示工程中的一种有效技术，它通过将复杂概念与熟悉的想法联系起来，有助于阐明复杂概念。类比在未知和已知概念之间架起桥梁，使理解和处理信息更容易。本章将探讨使用类比的重要性以及如何有效地将此技术融入你的提示中。使用类比的重要性
- en: 'Simplification: Analogies simplify complex ideas by relating them to familiar
    concepts, making it easier for the AI to understand and generate relevant responses.'
  id: totrans-2120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化：通过将复杂思想与熟悉的概念联系起来，类比简化了复杂思想，使AI更容易理解和生成相关响应。
- en: 'Enhanced Understanding: They improve comprehension by providing relatable examples
    that illustrate the point, aiding in better grasp of the subject matter.'
  id: totrans-2121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强理解：通过提供相关的例子来说明观点，它们提高了理解力，有助于更好地掌握主题。
- en: 'Engagement: Analogies can make interactions more engaging and interesting,
    capturing attention and making the information more memorable.'
  id: totrans-2122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：类比可以使互动更加吸引人、更有趣，吸引注意力并使信息更容易记住。
- en: 'Effective Communication: They facilitate clearer communication by breaking
    down intricate ideas into more digestible parts.'
  id: totrans-2123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有效沟通：通过将复杂的思想分解成更易消化的部分，它们促进了更清晰的沟通。
- en: 'How to Use Analogies in Your PromptsTo effectively use analogies in your prompts,
    consider the following strategies:'
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: 如何在提示中使用类比为了有效地在提示中使用类比，请考虑以下策略：
- en: 'Identify the Complex Concept: Clearly state the complex concept or idea you
    want to explain, ensuring the AI understands the focus of your query.'
  id: totrans-2125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别复杂概念：清楚地陈述你想要解释的复杂概念或想法，确保AI理解你的查询焦点。
- en: 'Choose a Relatable Analogy: Select an analogy that is widely understood and
    relevant to the concept you are explaining.'
  id: totrans-2126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择相关的类比：选择一个广为人知且与你所解释的概念相关的类比。
- en: 'Draw Clear Parallels: Highlight the similarities between the analogy and the
    complex concept, ensuring the comparison is clear and logical.'
  id: totrans-2127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰地建立平行关系：强调类比与复杂概念之间的相似性，确保比较清晰且合乎逻辑。
- en: 'Keep It Simple: Avoid overly complicated analogies. Keep them simple and straightforward
    to maintain clarity.'
  id: totrans-2128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化：避免过于复杂的类比。保持它们简单直接，以保持清晰。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the analogy and the concept.'
  id: totrans-2129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建类比和概念的相关背景或信息。
- en: Examples of Using Analogies
  id: totrans-2130
  prefs: []
  type: TYPE_NORMAL
  zh: 使用类比示例
- en: 'General Prompt: "Explain how a neural network works." Analogy Prompt: "Can
    you explain how a neural network works by comparing it to the way a human brain
    processes information?"'
  id: totrans-2131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释神经网络是如何工作的。”类比提示：“你能通过将其与人类大脑处理信息的方式相比来解释神经网络是如何工作的吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Analogy Prompt: "Can
    you describe the process of photosynthesis by comparing it to how a factory produces
    goods?"'
  id: totrans-2132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。类比提示：你能通过将其与工厂生产商品的方式相比来描述光合作用的过程吗？
- en: 'General Prompt: "What is blockchain technology?" Analogy Prompt: "Can you explain
    blockchain technology by comparing it to a digital ledger or a chain of blocks?"'
  id: totrans-2133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”类比提示：“你能通过将其与数字账本或区块链相比来解释区块链技术吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Complex Analogies: Avoid analogies that are too complicated or obscure,
    as they can confuse rather than clarify the concept.'
  id: totrans-2135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的类比：避免过于复杂或晦涩的类比，因为它们可能会混淆而不是澄清概念。
- en: 'Irrelevant Comparisons: Ensure the analogy is relevant and accurately represents
    the concept to maintain clarity and relevance.'
  id: totrans-2136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不相关的比较：确保类比的相关性，并准确代表概念，以保持清晰和相关性。
- en: 'Incomplete Analogies: Provide enough detail in the analogy to make the comparison
    clear, avoiding partial or vague comparisons.'
  id: totrans-2137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完整性：在类比中提供足够的细节，使比较清晰，避免部分或不明确的比较。
- en: ConclusionUsing analogies is a valuable practice in prompt engineering that
    enhances simplification, understanding, engagement, and effective communication.
    By identifying the complex concept, choosing a relatable analogy, drawing clear
    parallels, keeping it simple, and providing context, you can ensure that ChatGPT
    provides accurate and relevant responses. Avoiding pitfalls such as overly complex
    analogies, irrelevant comparisons, and incomplete analogies will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: 结论使用类比是提示工程中的一种宝贵实践，它增强了简化、理解、参与和有效沟通。通过识别复杂概念、选择相关的类比、绘制清晰的平行关系、保持简单并提供背景，你可以确保ChatGPT提供准确和相关的响应。避免过度复杂的类比、不相关的比较和不完整的类比将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 103: Request Detailed ExplanationsRequesting detailed explanations
    in your prompts is a key technique in prompt engineering that helps you gain a
    deeper understanding of concepts, processes, and phenomena. Detailed explanations
    provide comprehensive insights that enhance learning and comprehension. This chapter
    will explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-2140
  prefs: []
  type: TYPE_NORMAL
  zh: 第103章：请求详细解释在提示中请求详细解释是提示工程中的一个关键技巧，有助于你更深入地理解概念、过程和现象。详细解释提供全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-2141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重要性：详细解释提供了深入了解事物如何工作的洞察，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-2142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-2143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：详细解释提供背景，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-2144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了在提示中有效地请求详细解释，请考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-2146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地说明你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-2147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-2148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建解释的相关背景或信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-2149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-2150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：要求提供示例以说明解释，并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-2152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用是如何工作的。”详细解释提示：“你能解释光合作用是如何工作的，包括叶绿素的作用和过程的不同阶段？”
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-2153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”详细解释提示：“你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链的吗？”
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-2154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“量子计算是什么？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2155
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-2156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对详细解释的模糊或一般性请求。确保具体，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-2157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解释不完整或不准确。提供足够的信息来构建解释的框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-2158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2159
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求详细解释是提示工程中的一个关键实践，它增强了深度、清晰度、上下文和参与度。通过具体、使用直接语言、提供上下文、要求逐步解释和请求示例，您可以确保ChatGPT提供详细且全面符合您需求的解释。避免诸如模糊请求、缺乏上下文和过于宽泛的问题将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: '*'
- en: 'Chapter 104: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-2161
  prefs: []
  type: TYPE_NORMAL
  zh: 第104章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、对象或场景之间的差异和相似性。比较提供了更清晰的洞察，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技巧融入您的提示中。比较的使用重要性
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-2162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：比较通过将它们与更熟悉的概念联系起来或突出差异，有助于阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-2163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过识别相似性和差异性，他们提供了更深入的洞察，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-2164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：比较通过并排展示多个选项或观点，促进信息化的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-2165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-2166
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较为了有效地在提示中使用比较，请考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-2167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明您想要比较的概念、对象或场景，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-2168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：指定比较的方面或标准，例如功能、有效性、优缺点等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-2169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似性”、“差异性”）来清楚地阐述您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-2170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建比较的相关上下文或背景信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-2171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：请求详细比较以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-2172
  prefs: []
  type: TYPE_NORMAL
  zh: 比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-2173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。比较提示：你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-2174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。比较提示：你能比较植物光合作用和动物细胞呼吸的过程吗？
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-2175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：气候变化的原因是什么？比较提示：你能比较人类活动和自然因素对气候变化的影响吗？
- en: Common Pitfalls to Avoid
  id: totrans-2176
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-2177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的比较：避免请求过于广泛或一般的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-2178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致比较不完整或不准确。提供足够的背景信息来构建比较框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-2179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不清晰的表述：使用模糊或不明确的语言可能会掩盖比较的意图。在措辞上要精确，以确保AI能够理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2180
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用比较是提示工程中的一种有价值的技术，它增强了清晰度、洞察力、决策和理解的深度。通过识别概念、具体化、使用比较语言、提供上下文和请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度广泛的比较、缺乏上下文和表述不清晰等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2181
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 105: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-2182
  prefs: []
  type: TYPE_NORMAL
  zh: 第105章：请求洞察力在提示中请求洞察力是提示工程中的一种有价值的技术，它有助于揭示对各种主题的更深入理解、解释和观点。洞察力提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求洞察力的重要性以及如何有效地将此技术融入你的提示中。请求洞察力的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-2183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：洞察力提供了对主题的更深入理解，揭示了潜在的原则、模式或含义。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-2184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-2185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：洞察力通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-2186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求洞察力鼓励更互动和有趣的探索，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-2187
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求洞察力为了有效地在提示中请求洞察力，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要洞察力的主题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-2189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如趋势、影响或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-2190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求洞察，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-2191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建洞察的相关背景或信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-2192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点，以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-2193
  prefs: []
  type: TYPE_NORMAL
  zh: 请求洞察的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-2194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”洞察提示：“你能提供关于可再生能源的采用如何影响未来十年全球能源市场的洞察吗？”
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-2195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”洞察提示：“你能提供关于气候变化对生物多样性和生态系统长期影响的洞察吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-2196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”洞察提示：“你能提供关于民主政府的原则如何影响社会和经济发展的洞察吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2197
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见的陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-2198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的洞察请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-2199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致洞察不完整或不准确。提供足够的背景信息来构建洞察。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-2200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和背景。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2201
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求洞察是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体说明、使用直接语言、提供背景和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的洞察。避免诸如含糊请求、缺乏背景和忽视解释等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2202
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 106: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-2203
  prefs: []
  type: TYPE_NORMAL
  zh: 第106章：请求对比在提示工程中请求对比是一种强大的技术，有助于突出概念、对象或场景之间的差异和区别。对比提供清晰的洞察，并通过强调区分事物的不同之处来增强理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-2204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：对比有助于阐明差异和区别，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-2205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过突出不同元素之间的区别，他们提供了更深入的洞察，增强了理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-2206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清晰地展示不同选项的优缺点，促进明智的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-2207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供比较视角，展示不同元素之间的关系，从而增强整体理解。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-2208
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-2209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定元素：清楚地说明你想要对比的概念、对象或场景，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-2210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确对比的方面或标准，例如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-2211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-2212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定对比的相关上下文或背景信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-2213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细的对比：请求详细的对比以探索不同方面及其相应的含义。
- en: Examples of Asking for Contrasts
  id: totrans-2214
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-2215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。对比提示：你能从成本、效率和环境影响的角度对比太阳能和风能的好处吗？
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-2216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。对比提示：你能对比植物光合作用和动物细胞呼吸的过程吗？
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-2217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：气候变化的原因是什么？对比提示：你能对比人类活动和自然因素对气候变化的影响吗？
- en: Common Pitfalls to Avoid
  id: totrans-2218
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-2219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的对比：避免请求过于宽泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-2220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致对比不完整或不准确。提供足够的信息来界定对比。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-2221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不明确：使用模糊或不清晰的语言可能会掩盖对比的意图。确保你的措辞精确，以便AI能够理解你的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2222
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 107: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: 第107章：请求含义
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-2225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件的潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-2226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过强调特定行动或事件的更广泛影响和重要性来增强理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-2227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解影响有助于决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-2228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：影响通过展示不同因素和事件如何相互关联并相互影响，提供上下文。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-2229
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响：为了在提示中有效地请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-2230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定行动或事件：清楚地陈述你想要探索的行动、决策或事件，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-2231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-2232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求影响，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-2233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定影响的相关的上下文或背景信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-2234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：请求对影响进行详细分析，以探索不同方面及其相应的效果。
- en: Examples of Requesting Implications
  id: totrans-2235
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-2236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释可再生能源的好处。" 影响提示： "你能解释可再生能源广泛采用对全球能源市场长期影响的含义吗？"
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-2237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 影响提示： "你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-2238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "民主政府的核心特征是什么？" 影响提示： "你能讨论从威权体制过渡到民主政府对社会稳定和经济发展的含义吗？"
- en: Common Pitfalls to Avoid
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对影响进行模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-2241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致对影响的分析不完整或不准确。提供足够的背景信息来界定影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-2242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多个观点：专注于单一观点可能会限制分析。请求多个观点以探索不同的影响和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求影响是提示工程中的一种宝贵实践，它增强了深度、理解、决策和上下文。通过确定行动或事件，具体说明，使用直接语言，提供上下文，并请求详细分析，你可以确保ChatGPT提供针对你需求的准确和相关的见解。避免诸如请求模糊、缺乏上下文和忽视多个观点等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2244
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 108: Request Alternative ViewsRequesting alternative views in your
    prompts is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: 第108章：请求替代观点在提示中请求替代观点是提示工程中的一个宝贵技巧，有助于你探索关于一个主题的不同观点和视角。替代观点提供了更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求替代观点的重要性以及如何有效地将此技巧融入你的提示中。请求替代观点的重要性
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-2246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：替代观点通过展示一个议题或主题的不同方面来提供平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-2247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-2248
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：替代观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-2249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 智能决策：考虑替代观点通过提供多种选项和考虑因素，支持智能决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代观点为了有效地在提示中请求替代观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-2251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要关于替代观点的主题或问题，确保AI理解查询的重点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-2252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-2253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求替代观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-2254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建替代观点的相关上下文或背景信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-2255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-2256
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-2257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”替代观点提示：“你能提供关于可再生能源好处的替代观点，包括正面和批评的视角吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-2258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代观点提示：“你能提供关于气候变化影响的不同的观点，包括来自环保主义者和怀疑论者的视角吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-2259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”替代观点提示：“你能讨论关于民主政府核心特征的替代观点，包括支持和批评者吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2260
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的替代观点请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-2262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致替代观点不完整或不准确。提供足够的背景信息来构建观点框架。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-2263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点及其相应的含义。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2264
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求不同的观点是提示工程中的一种宝贵实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、具体化、使用直接语言、提供背景和请求多个观点，您可以确保ChatGPT提供针对您需求的准确和相关的不同观点。避免诸如模糊请求、缺乏背景和忽视多元视角等陷阱，将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 109: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-2266
  prefs: []
  type: TYPE_NORMAL
  zh: 第109章：指定评估标准在您的提示中指定评估标准是提示工程中的重要技术，有助于聚焦人工智能的响应，并确保它们与您的需求相关并一致。标准提供清晰的指导方针和边界，提高了信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将此技术融入您的提示中。评估标准指定的意义
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-2267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注：标准有助于缩小人工智能的响应范围，使其专注于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-2268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，您确保响应保持清晰并与您的具体需求一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-2269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于您的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-2270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准增强了响应的精确性，使其更加准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-2271
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准为了有效地在您的提示中指定评估标准，请考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-2272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明您想要解决的问题或议题，确保人工智能理解您查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-2273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定响应的标准或指南，例如范围、长度、格式或需要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-2274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来指定标准，确保人工智能理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-2275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建标准的相关背景信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-2276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求遵守：要求响应遵守指定的标准，以确保与您的需求一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-2277
  prefs: []
  type: TYPE_NORMAL
  zh: 指定标准的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-2278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”标准指定提示：“你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字？”
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-2279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”标准指定提示：“你能描述气候变化对沿海城市的影响吗，包括短期和长期效应？”
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-2280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”标准指定提示：“你能列出民主政府的核心特征，重点关注政治和社会方面吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2281
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-2282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的标准：避免使用模糊或含糊不清的标准。确保具体说明指南以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-2283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度限制的标准：设定过于严格的标准可能会限制响应的深度和质量。确保你的标准是合理的，并允许提供全面的答案。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-2284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致不完整或不准确的响应。提供足够的背景信息来构建标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2285
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中指定评估标准是提示工程中的关键实践，它增强了焦点、清晰度、相关性和精确性。通过确定主题、定义标准、使用直接语言、提供背景和请求遵守，你可以确保ChatGPT提供准确且相关的响应，满足你的需求。避免如模糊标准、过度限制的标准和忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2286
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 110: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-2287
  prefs: []
  type: TYPE_NORMAL
  zh: 第110章：请求简化在提示中请求简化是提示工程中的一种有价值的技术，它有助于将复杂的概念、过程或信息分解成更简单、更易理解的术语。简化增强了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将这项技术融入你的提示中。
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-2288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-2289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息对更广泛的受众更加可访问，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-2290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：简化使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-2291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释更实用，更容易在实际情况下应用。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-2292
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化：为了有效地在提示中请求简化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-2293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要简化的复杂概念或过程，确保AI理解你查询的焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-2294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、直截了当的语言来请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-2295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化的目标受众，例如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-2296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-2297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建简化的相关背景信息。
- en: Examples of Requesting Simplifications
  id: totrans-2298
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-2299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为一名10岁的学生简化光合作用的过程，包括一个类比来帮助解释它吗？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-2300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单语言和例子为没有技术背景的人简化区块链技术吗？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-2301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“量子计算是什么？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2302
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对简化的含糊或一般性请求。具体说明你需要什么以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-2304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化很有用，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-2305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致简化不完整或不准确。提供足够的背景信息以构建简化框架。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2306
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰性、可访问性、参与度和可用性。通过确定概念、使用直接语言、指定受众、请求类比和提供上下文，你可以确保ChatGPT提供针对你需求的清晰和相关的简化。避免诸如含糊请求、过度简化和忽略上下文等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2307
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 111: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-2308
  prefs: []
  type: TYPE_NORMAL
  zh: 第十一章：请求现实世界应用在提示中请求现实世界应用是提示工程中的重要技术，有助于你了解概念、理论或过程如何实际应用。现实世界应用提供了有形的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技术融入你的提示中。请求现实世界应用的重要性
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-2309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界应用通过展示它们在实际情况中的使用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-2310
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供具体示例，说明如何在现实世界环境中实施，从而帮助阐明复杂思想。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-2311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：现实世界应用使信息更具吸引力，并加深对主题的深入了解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-2312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-2313
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了有效地在提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-2314
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-2315
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确你感兴趣的特定现实世界应用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-2316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求现实世界应用，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-2317
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建现实世界应用的有关背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-2318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求详细例子：请求现实世界应用的详细例子以了解概念是如何实施及其影响的。
- en: Examples of Requesting Real-World Applications
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-2320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供关于可再生能源，如太阳能和风能，在不同行业中如何被使用的现实世界例子吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-2321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化实施的现实世界项目和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-2322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”现实世界应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2323
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对现实世界应用进行模糊或一般性的请求。确保具体化以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-2325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致例子不完整或不准确。提供足够的背景信息以构建现实世界应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-2326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般性的例子可能无法提供你所需要的深度。请要求详细的例子以理解实际应用和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2327
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求现实世界的应用是提示工程中的一项重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和要求详细例子，你可以确保ChatGPT提供符合你需求的清晰和相关的现实世界应用。避免诸如模糊请求、缺乏背景信息和忽略具体性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2328
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 112: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-2329
  prefs: []
  type: TYPE_NORMAL
  zh: 第112章：请求统计分析在提示中请求统计分析是提示工程中的一个宝贵技巧，它帮助你获得定量洞察和证据来支持你的查询。统计分析提供了事实基础，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-2330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-2331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-2332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析可以提供对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-2333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-2334
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析为了在提示中有效地请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-2335
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要统计分析的主题或问题，确保AI理解查询的焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-2336
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-2337
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-2338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建统计分析的相关背景或信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-2339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-2340
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-2341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。统计分析提示：你能提供过去十年中可再生能源（如太阳能和风能）采用率的统计分析吗？
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-2342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。统计分析提示：你能提供过去50年中全球温度上升和极端天气事件频率增加的统计分析吗？
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-2343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于区块链技术在不同行业增长（包括基于区块链的公司和项目数量）的统计分析吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2344
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-2345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的统计分析请求。具体说明你需要什么，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-2346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的背景信息来构建统计分析框架。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-2347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终请求来源或参考文献，以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-2348
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一种宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景信息和请求来源，你可以确保ChatGPT提供符合你需求的准确和可靠的统计分析。避免如模糊请求、缺乏背景信息和忽略来源等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 113: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 第113章：请求历史比较在提示中请求历史比较是提示工程中的重要技巧，有助于你理解当前事件、概念或现象如何与历史事件相关联或不同。历史比较提供上下文和见解，增强了理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-2351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：历史比较通过展示当前事件或概念如何与过去的事件或概念相关联，从而提供上下文。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-2352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面的比较，如原因、影响或结果，以确保分析集中。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-2353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供更广阔的视角，有助于将特定主题置于更大的历史叙事中。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-2354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求历史比较，确保AI理解你的请求。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-2355
  prefs: []
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-2356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史比较提示：“你能比较当前可再生能源的采用与工业革命期间煤炭的采用吗？”
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-2357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求历史比较的例子
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-2358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何请求历史比较为了在提示中有效地请求历史比较，考虑以下策略：
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-2359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何相关的背景信息，这些信息可以帮助构建历史比较框架。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-2360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明你想要与历史事件比较的当前事件、概念或现象，确保AI理解你的查询焦点。
- en: Examples of Asking for Historical Comparisons
  id: totrans-2361
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致比较不完整或不准确。提供足够的背景信息以构建历史比较框架。
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-2362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和不同之处来增强理解。
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-2363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能比较当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-2364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史比较提示：“你能比较现代民主政府的核心特征与古代雅典民主制的特征吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2365
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对历史比较提出模糊或一般性的请求。确保具体说明所需内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-2367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求历史比较的重要性
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-2368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度详细：虽然历史比较很有用，但提供过多细节可能会使回答显得繁重。关注最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2369
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示工程中请求历史比较是一种重要的实践，它增强了背景、洞察力、理解和视角。通过确定主题、指定历史时期、使用直接语言、提供背景和请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如请求模糊、缺乏背景和过度详细等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 114: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 第114章：寻求跨学科见解在提示中寻求跨学科见解是提示工程中的一个宝贵技巧，帮助你探索不同领域或学科如何交叉和相互影响。跨学科见解通过整合来自各个领域的知识提供了更广阔的视角，并增强了理解。本章将探讨寻求跨学科见解的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-2372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：通过整合不同领域或学科的知识，跨学科见解提供了更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-2373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：它们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-2374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域如何交叉和相互影响来增强理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-2375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重要性：它们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-2376
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了在提示中有效地寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要探索的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-2378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的各个领域或学科，例如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-2379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来请求跨学科见解，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-2380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建跨学科见解的相关背景或信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-2381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求整合：请求整合来自不同领域的知识，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-2382
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-2383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括环境科学、经济学和社会政策方面的观点？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-2384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 跨学科提示：“你能提供关于气候变化影响的跨学科见解，包括气候学、农业和公共卫生的视角吗？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-2385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？” 跨学科提示：“你能提供关于人工智能的跨学科见解，包括计算机科学、伦理和社会学的视角吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2386
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2387
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对跨学科见解进行模糊或一般性的请求。确保你的需求具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-2388
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致见解不完整或不准确。提供足够的背景信息以构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-2389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略整合：仅仅关注单个领域可能会限制分析。请求整合知识，以探索不同领域如何交叉影响主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2390
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：寻求跨学科见解是提示工程中的一种宝贵实践，它增强了视角、创新、理解和解决问题的能力。通过确定主题、指定学科、使用直接语言、提供背景信息和请求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏背景信息和忽略整合等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2391
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 115: Request Solutions to ProblemsRequesting solutions to problems
    in your prompts is an important technique in prompt engineering that helps you
    explore potential answers and strategies for addressing various issues. Solutions
    provide practical and actionable information that can guide decision-making and
    problem-solving. This chapter will explore the importance of requesting solutions
    to problems and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Solutions to Problems'
  id: totrans-2392
  prefs: []
  type: TYPE_NORMAL
  zh: 第115章：请求解决问题的方案在提示中请求解决问题的方案是提示工程中的一种重要技术，它帮助你探索解决各种问题的潜在答案和策略。解决方案提供实用且可操作的信息，可以指导决策和解决问题。本章将探讨请求解决问题的方案的重要性以及如何有效地将此技术融入你的提示中。请求解决问题的方案的重要性
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-2393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用且可操作的信息，可以直接应用于解决问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-2394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：他们通过呈现可能的答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-2395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：解决方案通过提供克服挑战的具体方法来促进问题解决。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-2396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：请求解决方案通过探索各种策略和想法，鼓励创造性思维和创新。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-2397
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的方案为了有效地在提示中请求解决问题的方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别问题：清楚地陈述你想要解决的问题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-2399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如约束、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-2400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-2401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-2402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-2403
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决方案的例子
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-2404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”解决方案提示：“你能提供缓解气候变化对沿海城市影响的解决方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-2405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”解决方案提示：“你能提供在发展中国家增加可再生能源采用率的解决方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-2406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”解决方案提示：“你能提供解决远程工作挑战的解决方案吗？包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-2407
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-2408
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免提出模糊或泛泛的解决方案请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-2409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解决方案不完整或不准确。提供足够的背景信息以界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-2410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性，以确保实际的相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2411
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求解决方案是提示工程中的一项重要实践，它增强了实用性、决策、问题解决和创新。通过识别问题、具体说明、使用直接语言、提供背景信息和请求多个解决方案，你可以确保ChatGPT提供准确且相关的解决方案，满足你的需求。避免模糊请求、缺乏背景信息和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 116: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-2413
  prefs: []
  type: TYPE_NORMAL
  zh: 第116章：请求应用实例的例子在提示中请求应用实例是提示工程中的一种实用技术，有助于说明概念、理论或过程在现实世界场景中的应用。应用实例提供具体实例，增强理解和相关性。本章将探讨请求应用实例的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-2414
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：应用实例通过提供具体的使用实例来帮助阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-2415
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示信息在现实世界场景中的应用，使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-2416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：应用实例使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-2417
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用实例为了在提示中有效地请求应用实例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-2419
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要应用实例的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-2420
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的特定应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-2421
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求应用实例，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-2422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建实例的相关背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-2423
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细实例：请求详细实例以了解概念的实施方式和其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用实例的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-2425
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。应用提示：你能提供太阳能和风能等可再生能源在不同行业应用的实例吗？
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-2426
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述区块链技术。应用提示：你能提供区块链技术在各个领域（如金融、供应链和医疗保健）应用的实例吗？
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-2427
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：什么是人工智能？应用提示：你能提供人工智能在不同领域（如医疗保健、金融和交通）的实例吗？
- en: Common Pitfalls to Avoid
  id: totrans-2428
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2429
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对应用实例的模糊或一般性请求。确保具体说明你需要的内容，以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-2430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致实例不完整或不准确。提供足够的背景信息以构建应用。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-2431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提供实例：虽然实例很有用，但一次性请求过多可能会令人不知所措。关注可管理的实例数量以保持清晰。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用实例是提示工程中一种实用且有效的方法，它增强了清晰度、相关性、参与度和可用性。通过识别概念、具体说明、使用直接语言、提供背景和请求详细实例，你可以确保ChatGPT提供符合你需求的清晰和相关的应用实例。避免诸如模糊请求、缺乏背景和实例过多等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2433
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 117: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-2434
  prefs: []
  type: TYPE_NORMAL
  zh: 第117章：使用假设情景在提示中使用假设情景是提示工程中的一种强大技术，它允许你探索不同的可能性、情景和结果。假设情景刺激创造性思维，并可以提供关于某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-2435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的了解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-2436
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用假设情景的重要性
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-2437
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：假设情景可以通过模拟不同的情况来帮助识别潜在的问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-2438
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用假设情景使互动更加吸引人且动态，促进对主题的更深入探索。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景为了有效地在提示中使用假设情景，考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-2440
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景构造成“如果”问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-2441
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-2442
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束条件，以指导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-2443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体结果：根据假设情景请求具体的后果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-2444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造性思维：邀请AI进行创造性思考，并考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-2445
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设情景的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-2446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 假设情景提示：“如果一个国家过渡到100%的可再生能源，将会产生什么样的经济、环境和社交影响？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-2447
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 假设情景提示：“如果所有国家同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-2448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 假设情景提示：“如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-2449
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-2450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-2451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数被明确定义，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-2452
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略可行性：虽然假设情景鼓励创造性思维，但考虑平衡创造性与一定程度的可行性，以确保其实用相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-2453
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用假设情景是提示工程中的一种强大技术，它可以增强探索、创造性思维、问题解决和参与度。通过提出“如果”问题，明确具体，定义参数，请求结果，并鼓励创造性，你可以构建出有效地利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽略可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2454
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 118: Ask for Alternative SolutionsAsking for alternative solutions
    in your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-2455
  prefs: []
  type: TYPE_NORMAL
  zh: 第118章：请求替代解决方案在提示中请求替代解决方案是提示工程中的一种宝贵技术，它帮助你探索解决各种问题的不同方法和策略。替代解决方案提供了更广阔的视角，并鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代解决方案的重要性以及如何有效地将此技术融入你的提示中。请求替代解决方案的重要性
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-2456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性：替代解决方案通过探索不同的方法和策略鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-2457
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全面的问题解决：它们提供了更广阔的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-2458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多种解决方案通过呈现各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-2459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：替代解决方案通过突出解决问题的不同方式提供灵活性，允许适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-2460
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代解决方案为了有效地在提示中请求替代解决方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-2462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：指定你感兴趣的任何特定方面或细节，例如约束条件、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-2463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求替代解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-2464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-2465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多种解决方案：请求多种解决方案以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-2466
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代解决方案的例子
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-2467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代解决方案提示：“你能提供缓解气候变化对沿海城市影响的替代解决方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-2468
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”替代解决方案提示：“你能提供增加发展中国家可再生能源来源采用率的替代解决方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-2469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案吗，包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-2470
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-2471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代方案提出模糊或泛泛的请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-2472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致解决方案不完整或不准确。提供足够的信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-2473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性以确保其实用相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-2474
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代方案是提示工程中的一种有价值实践，它增强了创造力、全面问题解决、明智决策和灵活性。通过识别问题、具体化、使用直接语言、提供背景和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代方案，以满足你的需求。避免诸如模糊请求、缺乏背景和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2475
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 119: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: 第119章：寻求概念澄清在提示工程中寻求概念澄清是一项重要技术，有助于确保你完全理解复杂的思想、术语或过程。澄清提供了详细解释，增强了理解并消除了歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将此技术融入你的提示中。寻求概念澄清的重要性
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-2477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供了详细解释，增强了复杂思想、术语或过程的理解。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-2478
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，降低了误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-2479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中定位概念，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-2480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强应用信息的准确性和有效性。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2482
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你需要澄清的概念或术语，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-2483
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如其应用或背景。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-2484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-2485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-2486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细解释的重要性
- en: Examples of Seeking Clarification of Concepts
  id: totrans-2487
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-2488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清叶绿素在光合作用的光反应中的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-2489
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-2490
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中叠加的概念，并提供一个应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2491
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的解释深入探讨了事物的工作原理，增强了你对复杂主题的理解。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-2493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的澄清。提供足够的信息来构建概念框架。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-2494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提问过多：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2495
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求概念的澄清是提示工程中的一种重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、具体说明、使用直接语言、请求示例和提供背景信息，你可以确保ChatGPT提供针对你需求的详细和准确的澄清。避免诸如请求模糊、缺乏背景信息和问题过多等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2496
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 120: Request Detailed ExplanationsRequesting detailed explanations
    in your prompts is a key technique in prompt engineering that helps you gain a
    deeper understanding of concepts, processes, and phenomena. Detailed explanations
    provide comprehensive insights that enhance learning and comprehension. This chapter
    will explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-2497
  prefs: []
  type: TYPE_NORMAL
  zh: 第120章：请求详细解释在提示中请求详细解释是提示工程中的一个关键技巧，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-2498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建澄清的相关背景或信息。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-2499
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们有助于阐明抽象或难以理解的概念，使它们更容易接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-2500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：详细的解释提供了背景信息，帮助你理解不同概念之间的广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-2501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-2502
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了在提示中有效地请求详细解释，请考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-2503
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或一般性的澄清请求。明确你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-2504
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求详细解释，确保AI理解您的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-2505
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建解释的相关背景信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-2506
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-2507
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明解释并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-2508
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-2509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用是如何工作的。”详细解释提示：“你能解释光合作用是如何工作的，包括叶绿素的作用和过程的不同阶段？”
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-2510
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”详细解释提示：“你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链中的？”
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-2511
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2512
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-2513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对详细解释的模糊或一般性请求。确保具体说明您需要的内容，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-2514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解释不完整或不准确。提供足够的背景信息以构建解释。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-2515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2516
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-2517
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 121: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-2518
  prefs: []
  type: TYPE_NORMAL
  zh: 第121章：使用比较
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-2519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过将它们与更熟悉的概念相关联或突出差异，比较有助于阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-2520
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过识别相似性和差异性，它们提供了更深入的见解，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-2521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过并列展示多个选项或观点，比较有助于促进信息化的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-2522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-2523
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-2524
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要比较的概念、对象或场景，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-2525
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确比较的方面或标准，例如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-2526
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似性”、“差异性”）来清楚地表达你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-2527
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建比较的相关背景或信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-2528
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：请求详细比较以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-2529
  prefs: []
  type: TYPE_NORMAL
  zh: 使用比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-2530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”比较提示：“你能比较太阳能和风能在成本、效率和环境影响方面的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-2531
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“你能比较植物中光合作用的过程与动物中细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-2532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“你能比较人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2533
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-2534
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的比较：避免提出过于广泛或笼统的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-2535
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要的背景可能导致比较不完整或不准确。提供足够的背景信息来构建比较。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-2536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖比较的意图。在措辞上要精确，以确保AI理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2537
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-2538
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 122: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-2539
  prefs: []
  type: TYPE_NORMAL
  zh: 第122章：请求洞察
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-2540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：见解提供了对主题的更深入理解，揭示了潜在原则、模式或影响。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-2541
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-2542
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：见解通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-2543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：请求见解可以促进更互动和吸引人的主题探索，培养好奇心和学习热情。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-2544
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求见解：为了在提示中有效地请求见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2545
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要见解的主题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-2546
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、影响或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-2547
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-2548
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何相关的背景信息，这有助于构建见解。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-2549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-2550
  prefs: []
  type: TYPE_NORMAL
  zh: 请求见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-2551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”见解提示：“你能提供关于可再生能源的采用如何影响未来十年全球能源市场的见解吗？”
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-2552
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”见解提示：“你能提供关于气候变化对生物多样性和生态系统长期影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-2553
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”见解提示：“你能提供关于民主政府原则如何影响社会和经济发展的见解吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2554
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-2555
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊请求：避免含糊或笼统的见解请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-2556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致见解不完整或不准确。提供足够的背景信息以构建见解。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-2557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和背景。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2558
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求见解是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体化、使用直接语言、提供背景和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的见解。避免诸如含糊请求、缺乏背景和忽视解释等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2559
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 123: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-2560
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的重要性
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-2561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-2562
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的对比：避免请求过于宽泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-2563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清楚地展示不同选项的优缺点，促进明智的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-2564
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：气候变化的原因是什么？对比提示：你能对比人类活动和自然因素对气候变化的影响吗？
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-2565
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比：为了有效地在提示中请求对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-2566
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。对比提示：你能从成本、效率和环境影响的角度对比太阳能与风能的好处吗？
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-2567
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：明确对比的方面或标准，例如功能、有效性、优缺点等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-2568
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较性语言：使用比较性语言（例如，“对比”、“差异”、“区别”）来清楚地界定你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-2569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不明确：使用模糊或含糊的语言可能会掩盖对比的意图。确保用词精确，以便AI理解你的请求。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-2570
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: Examples of Asking for Contrasts
  id: totrans-2571
  prefs: []
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建对比的相关背景信息。
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-2572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略必要的信息可能导致对比不完整或不准确。提供足够的背景信息以构建对比。
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-2573
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细的对比：请求详细的对比以探索不同方面及其相应的含义。
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-2574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过突出不同元素的区别，它们提供了更深入的见解，增强了理解。
- en: Common Pitfalls to Avoid
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: 理解：它们通过提供比较视角，展示不同元素之间的关系，从而增强整体理解。
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-2576
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第123章：请求对比在提示工程中请求对比是一种强大的技术，有助于突出概念、对象或场景之间的差异和区别。对比通过强调区分事物的因素，提供清晰的见解并增强理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-2577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：对比有助于阐明差异和区别，使复杂概念更容易理解。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-2578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定元素：清楚地说明你想要对比的概念、对象或场景，确保AI理解你的查询焦点。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2579
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中请求对比是提示工程中的一个强大技巧，它增强了清晰度、洞察力、决策和理解。通过识别元素、具体化、使用比较语言、提供上下文和请求详细对比，你可以确保ChatGPT提供针对你需求的清晰和相关的对比。避免过度广泛的对比、缺乏上下文和语言不清晰等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2580
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 124: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-2581
  prefs: []
  type: TYPE_NORMAL
  zh: 第124章：请求含义在提示中请求含义是提示工程中的一个宝贵技巧，有助于你探索行动、决策或事件的可能后果和影响。理解含义可以提供更深入的见解并支持明智的决策。本章将探讨请求含义的重要性以及如何有效地将此技巧融入你的提示中。含义请求的重要性
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-2582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：含义提供了对行动、决策或事件潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-2583
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过突出特定行动或事件的更广泛影响和重要性来增强理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-2584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解含义可以指导决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-2585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：含义通过展示不同因素和事件之间的相互联系和影响来提供上下文。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-2586
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求含义为了有效地在提示中请求含义，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-2587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地陈述你想要探索的行动、决策或事件，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-2588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如短期或长期含义。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-2589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来请求含义，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-2590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建含义的相关背景信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-2591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：请求对含义进行详细分析，以探索不同方面及其相应的影响。
- en: Examples of Requesting Implications
  id: totrans-2592
  prefs: []
  type: TYPE_NORMAL
  zh: 请求含义的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-2593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”含义提示：“你能解释可再生能源广泛采用对全球能源市场的长期含义吗？”
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-2594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”含义提示：“你能提供关于气候变化对全球农业和粮食安全潜在含义的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-2595
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”含义提示：“你能讨论从威权体制过渡到民主政府对社会稳定和经济发展的含义吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2596
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2597
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的请求，确保清晰和相关性，具体说明你需要什么。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-2598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致对含义的不完整或不准确分析。提供足够的背景信息以构建含义。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-2599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多个观点：专注于单一观点可能会限制分析。请求多个观点以探索不同的含义和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2600
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求含义是提示工程中的一种有价值的方法，它增强了深度、理解、决策和上下文。通过识别行动或事件，具体说明，使用直接语言，提供上下文，并要求详细分析，你可以确保ChatGPT为你提供准确和相关的见解，针对你的需求定制含义。避免如含糊请求、缺乏上下文和忽视多个观点等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 125: Request Alternative ViewsRequesting alternative views in your
    prompts is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-2602
  prefs: []
  type: TYPE_NORMAL
  zh: 第125章：请求不同观点在提示中请求不同观点是提示工程中的一种有价值的技术，帮助你探索一个主题的不同观点和视角。不同的观点提供了更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求不同观点的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-2603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡的视角：不同的观点通过展示问题或主题的不同方面，提供了一个平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-2604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-2605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同的观点通过突出不同的解释和方法，增强了理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-2606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息化决策：考虑不同的观点通过提供多种选项和考虑因素，支持了信息化的决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-2607
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同观点为了在提示中有效地请求不同观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-2608
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明你想要不同观点的主题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-2609
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如不同的观点或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-2610
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言来请求不同观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-2611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建不同观点的相关背景信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-2612
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求多个观点：请求多个观点以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-2613
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-2614
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”替代观点提示：“你能提供关于可再生能源好处的替代观点，包括正面和批评性的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-2615
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代观点提示：“你能提供关于气候变化影响的不同的观点，包括来自环保主义者和怀疑者的观点吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-2616
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”替代观点提示：“你能讨论关于民主政府核心特征的替代观点，包括支持和批评者的观点吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代观点进行模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-2619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的替代观点。提供足够的背景信息来构建观点框架。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-2620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元观点：专注于单一观点可能会限制分析。请求多元观点以探索不同的观点和含义。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求不同的观点是提示工程中一种有价值的实践，它增强了平衡的视角、批判性思维、理解和信息化的决策。通过确定主题、具体说明、使用直接的语言、提供背景信息和请求多个观点，你可以确保ChatGPT提供准确且相关的替代观点，以满足你的需求。避免诸如模糊请求、缺乏背景信息和忽视多元观点等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 126: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-2623
  prefs: []
  type: TYPE_NORMAL
  zh: 第126章：指定评估标准在提示工程中指定评估标准是一项重要的技术，有助于聚焦AI的响应并确保它们与你的需求相关。标准提供明确的指南和边界，提高了信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将这项技术融入你的提示中。指定评估标准的重要性
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-2624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 焦点：标准有助于缩小AI的响应范围，使其聚焦于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-2625
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保响应保持清晰并与你的具体需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-2626
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-2627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准提高了响应的精确度，使其更准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-2628
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准为了在提示中有效地指定评估标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-2629
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要解决的问题或主题，确保AI理解你查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-2630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定响应的标准或指南，如范围、长度、格式或特定方面要关注的。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-2631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来指定标准，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-2632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建标准的相关背景或信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-2633
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求遵守：要求响应遵守指定的标准，以确保与你的需求一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-2634
  prefs: []
  type: TYPE_NORMAL
  zh: 评估指标指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-2635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释可再生能源的好处。" 指标指定提示： "你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字吗？"
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-2636
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 指标指定提示： "你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-2637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "民主政府的核心特征是什么？" 指标指定提示： "你能列出民主政府的核心特征，重点关注政治和社会方面吗？"
- en: Common Pitfalls to Avoid
  id: totrans-2638
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-2639
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的指标：避免使用模糊或含糊不清的指标。确保指南具体，以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-2640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于严格的指标：设定过于严格的指标可能会限制响应的深度和质量。确保你的标准合理，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-2641
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致回答不完整或不准确。提供足够的信息来构建标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2642
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定评估标准是提示工程中的关键实践，它增强了重点、清晰度、相关性和精确性。通过确定主题、定义标准、使用直接语言、提供背景信息和要求遵守，你可以确保ChatGPT提供准确且相关的响应，以满足你的需求。避免如模糊标准、过于严格的指标和忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2643
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 127: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-2644
  prefs: []
  type: TYPE_NORMAL
  zh: 第127章：请求简化在提示中请求简化是提示工程中的一个宝贵技巧，它有助于将复杂的概念、过程或信息分解成更简单、更易于理解的形式。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将此技巧融入你的提示中。请求简化的重要性
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-2645
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-2646
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众获取，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-2647
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：简化使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-2648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释在现实世界中的应用更实际，更容易实施。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-2649
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化：为了在提示中有效地请求简化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-2650
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要简化的复杂概念或过程，确保AI理解你的查询重点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-2651
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-2652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化的目标受众，如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-2653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化后的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-2654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何相关的背景信息，这有助于构建简化。
- en: Examples of Requesting Simplifications
  id: totrans-2655
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-2656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释它吗？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-2657
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单语言和例子为没有技术背景的人简化区块链技术吗？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-2658
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2659
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的简化请求。确保具体说明你需要什么，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-2661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化很有用，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-2662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致简化不完整或不准确。提供足够的信息来构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2663
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景，你可以确保ChatGPT提供针对你需求的清晰和相关的简化。避免诸如模糊请求、过度简化以及忽略背景等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2664
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 128: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-2665
  prefs: []
  type: TYPE_NORMAL
  zh: 第128章：请求现实世界应用在提示中请求现实世界应用是提示工程中的重要技巧，有助于你理解概念、理论或过程如何实际应用。现实世界应用提供了具体的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入你的提示中。请求现实世界应用的重要性
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-2666
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界应用通过展示它们在实际情况中的应用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-2667
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供如何在现实世界环境中实施的具体例子，帮助阐明复杂的思想。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-2668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：现实世界应用使信息更具吸引力，更有趣，从而加深对主题的深入了解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-2669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了有效地在提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-2671
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-2672
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的现实世界应用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-2673
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求现实世界应用，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-2674
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建现实世界应用的有关上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-2675
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求现实世界应用的详细例子，以了解概念是如何实施的及其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-2676
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-2677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通用提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供可再生能源，如太阳能和风能，在不同行业中应用的实例吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-2678
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通用提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化实施的现实世界倡议和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-2679
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通用提示：“什么是区块链技术？”现实世界应用提示：“你能提供区块链技术在各个领域应用的例子吗？例如，在金融、供应链和医疗保健等领域？”
- en: Common Pitfalls to Avoid
  id: totrans-2680
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2681
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对现实世界应用进行含糊或笼统的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-2682
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以构建现实世界的应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-2683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视具体性：一般示例可能无法提供你所需要的深度。请求详细示例以了解实际实施和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2684
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求现实世界的应用是提示工程中的一种重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供针对你需求的清晰和相关的现实世界应用。避免模糊请求、缺乏背景信息和忽视具体性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2685
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 129: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-2686
  prefs: []
  type: TYPE_NORMAL
  zh: 第129章：请求统计分析在提示中请求统计分析是提示工程中的一种宝贵技巧，有助于你获得定量洞察和证据来支持你的查询。统计分析提供了事实依据，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。请求统计分析的重要性
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-2687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实依据，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-2688
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-2689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-2690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-2691
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析为了有效地在提示中请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-2692
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-2693
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指明你感兴趣的统计分析方法，例如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-2694
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-2695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建统计分析的相关背景信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-2696
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-2697
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-2698
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”统计分析提示：“你能提供过去十年中可再生能源（如太阳能和风能）采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-2699
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”统计分析提示：“你能提供过去50年来全球温度上升和极端天气事件发生频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-2700
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于不同行业中区块链技术增长、包括基于区块链的公司和项目的数量等方面的统计分析吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2701
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-2702
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的统计分析请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-2703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的信息来构建统计分析的背景。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-2704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终要求提供来源或参考，以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-2705
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一种宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景信息和请求来源，你可以确保ChatGPT提供针对你需求的准确和可靠的统计分析。避免诸如含糊请求、缺乏背景信息和忽略来源等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2706
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 130: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-2707
  prefs: []
  type: TYPE_NORMAL
  zh: 第130章：请求历史比较在提示中请求历史比较是提示工程中的重要技巧，有助于你理解当前事件、概念或现象与历史事件的关系或差异。历史比较提供了背景和见解，增强了理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入你的提示中。请求历史比较的重要性
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-2708
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史比较通过展示当前事件或概念如何与过去的事件相关联，提供了背景。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-2709
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 见解：它们提供了对模式、趋势以及想法或事件随时间演变的见解。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-2710
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和不同之处，增强了理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-2711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了更广阔的视角，有助于将特定主题置于更广泛的历史叙事中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-2712
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较为了有效地在提示中请求历史比较，考虑以下策略：
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-2713
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要与历史事件比较的当前事件、概念或现象，确保AI理解你查询的焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-2714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-2715
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求历史比较，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-2716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何相关的背景或信息，这有助于构建历史比较框架。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-2717
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对特定方面的比较，例如原因、影响或结果，以确保分析集中。
- en: Examples of Asking for Historical Comparisons
  id: totrans-2718
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-2719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史比较提示：“你能比较当前可再生能源的采用与工业革命期间煤炭的采用吗？”
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-2720
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能比较当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-2721
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史比较提示：“你能比较现代民主政府的核心特征与古代雅典民主制的特征吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2722
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对历史比较的模糊或一般性请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-2724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致比较不完整或不准确。提供足够的背景信息以构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-2725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度详细：虽然历史比较很有用，但提供过多细节可能会使回答显得繁杂。关注最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2726
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史比较是提示工程中的重要实践，它增强了上下文、洞察力、理解和视角。通过确定主题、指定历史时期、使用直接语言、提供背景和请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如模糊请求、缺乏背景和过度详细等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2727
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 131: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-2728
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章：寻求跨学科洞察力在提示中寻求跨学科洞察力是提示工程中的一个宝贵技巧，有助于你探索不同领域或学科如何相互交叉和影响。跨学科洞察力通过整合来自各个领域的知识提供了更广阔的视角，并增强了理解。本章将探讨寻求跨学科洞察力的重要性以及如何有效地将此技巧融入你的提示中。寻求跨学科洞察力的重要性
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-2729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：通过整合不同领域或学科的知识，跨学科洞察力提供了更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-2730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：他们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-2731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域的交叉和相互影响，增强了理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-2732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：它们通过提供对复杂问题的不同观点和方法来支持解决问题。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-2733
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了在提示中有效地寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2734
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要探索的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-2735
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的不同的领域或学科，如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-2736
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求跨学科见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-2737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建跨学科见解的相关背景信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-2738
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求整合：要求不同领域的知识整合，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-2739
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-2740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。跨学科提示：你能提供关于可再生能源好处的跨学科见解，包括来自环境科学、经济学和社会政策的观点吗？
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-2741
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。跨学科提示：你能提供关于气候变化影响的跨学科见解，包括来自气候学、农业和公共健康的观点吗？
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-2742
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：什么是人工智能？跨学科提示：你能提供关于人工智能的跨学科见解，包括来自计算机科学、伦理学和社会学的观点吗？
- en: Common Pitfalls to Avoid
  id: totrans-2743
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对跨学科见解的模糊或一般性请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-2745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致见解不完整或不准确。提供足够的背景信息以构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-2746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视整合：仅关注单个领域可能会限制分析。要求知识整合以探索不同领域如何交叉和影响主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2747
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科见解是提示工程中一种有价值的实践，它增强了视角、创新、理解和解决问题的能力。通过确定主题、指定学科、使用直接语言、提供背景信息和要求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏背景信息和忽视整合等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2748
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 132: Request Solutions to ProblemsRequesting solutions to problems
    in your prompts is an important technique in prompt engineering that helps you
    explore potential answers and strategies for addressing various issues. Solutions
    provide practical and actionable information that can guide decision-making and
    problem-solving. This chapter will explore the importance of requesting solutions
    to problems and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Solutions to Problems'
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: 第132章：请求解决问题的方案
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-2750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：方案提供实用且可操作的信息，可以直接应用于解决问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-2751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：它们通过展示潜在答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-2752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：方案通过提供克服挑战的具体方法来促进问题解决。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-2753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：请求解决方案通过探索各种策略和想法，鼓励创新思维。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-2754
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的方案
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别问题：清楚地说明你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-2756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如约束、资源或期望结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-2757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-2758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-2759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决该问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-2760
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决问题的方案示例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-2761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述气候变化的影响。" 方案提示："你能提供减轻气候变化对沿海城市影响的解决方案吗？包括短期和长期策略？"
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-2762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："可再生能源的好处是什么？" 方案提示："你能提供增加发展中国家可再生能源来源采用率的解决方案吗？"
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-2763
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释远程工作的挑战。" 方案提示："你能提供解决远程工作挑战的解决方案吗？包括沟通、生产力和工作与生活平衡？"
- en: Common Pitfalls to Avoid
  id: totrans-2764
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-2765
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或泛泛的解决方案请求。确保对问题和所需解决方案的类型具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-2766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解决方案不完整或不准确。提供足够的信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-2767
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创造性与可行性，以确保其实用相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2768
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求解决方案是提示工程中的一种重要实践，它增强了实用性、决策、问题解决和创新。通过确定问题、明确具体、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且相关的解决方案，以满足你的需求。避免诸如模糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2769
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 133: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-2770
  prefs: []
  type: TYPE_NORMAL
  zh: 第133章：请求应用示例在提示中请求应用示例是提示工程中的一种实用技术，有助于说明概念、理论或过程在现实世界场景中的应用。应用示例提供了具体的实例，增强了理解和相关性。本章将探讨请求应用示例的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-2771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：应用示例通过提供具体的使用实例来帮助阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-2772
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示在现实世界场景中的应用来使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-2773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：应用示例使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-2774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重要性：理解现实世界应用增强了信息的实用可用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-2775
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用示例为了在提示中有效地请求应用示例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-2776
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要应用实例的概念、理论或过程，确保AI能够理解你查询的焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-2777
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：明确指出你感兴趣的特定应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-2778
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求应用示例，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-2779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建示例的相关上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-2780
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细示例：请求详细示例以了解概念是如何实施的以及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-2781
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用示例的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-2782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供可再生能源（如太阳能和风能）在不同行业中应用的示例吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-2783
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供区块链技术在各个领域（如金融、供应链和医疗保健）应用的示例吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-2784
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”应用提示：“你能提供人工智能在不同领域（如医疗保健、金融和交通）中的实际应用示例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2785
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-2786
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对应用示例进行模糊或一般性的请求。确保具体化，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-2787
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致示例不完整或不准确。提供足够的背景信息来界定应用。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-2788
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用示例过多：虽然示例很有用，但一次性要求太多可能会让人感到不知所措。专注于可管理的示例数量以保持清晰。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2789
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用示例是提示工程中一种实用且有效的实践，它增强了清晰度、相关性、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰和相关的应用示例。避免模糊请求、缺乏背景信息和示例过多等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2790
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 134: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-2791
  prefs: []
  type: TYPE_NORMAL
  zh: 第134章：使用假设情景在提示中使用假设情景是提示工程中的一种强大技术，它允许你探索不同的可能性、情景和结果。假设情景可以激发创造性思维，并可以提供关于某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。使用假设情景的重要性
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-2792
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的洞察。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-2793
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案，鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-2794
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：假设情景可以通过模拟不同情况来帮助识别潜在问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-2795
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用假设情景可以使互动更加吸引人且动态，促进对主题的深入探索。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-2796
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景为了有效地在提示中使用假设情景，考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-2797
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景构造成“如果...会怎样”的问题，以探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-2798
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表述清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-2799
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束，以指导AI的响应。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-2800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求具体结果：根据假设情景请求具体的结果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-2801
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求替代方案的重要性
- en: Examples of Using Hypothetical Scenarios
  id: totrans-2802
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设场景的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-2803
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 假设场景提示：“如果一个国家过渡到100%的可再生能源，经济、环境和社交影响会是什么？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-2804
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的成因。” 假设场景提示：“如果所有国家同意在下一个十年内减少50%的碳排放，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-2805
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 假设场景提示：“如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-2806
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-2807
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度复杂的场景：避免创建过于复杂或错综复杂的假设场景。保持场景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-2808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的条件：确保假设场景的条件和参数被清楚地定义，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-2809
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设场景鼓励创造性思维，但考虑平衡创造性与一定程度的可行性，以确保其实际相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-2810
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用假设场景是提示工程中的一种强大技术，可以增强探索、创造性思维、问题解决和参与度。通过提出“如果”问题，保持清晰和具体，定义参数，要求结果，并鼓励创造力，你可以构建出有效地利用假设场景来探索不同可能性和结果的提示。避免过度复杂的场景、模糊的条件和忽视可行性等问题将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2811
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 135: Ask for Alternative SolutionsAsking for alternative solutions
    in your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-2812
  prefs: []
  type: TYPE_NORMAL
  zh: 第135章：请求替代方案在提示中请求替代方案是提示工程中的一种有价值的技术，有助于你探索解决各种问题的不同方法和策略。替代方案提供了更广阔的视角，并鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代方案的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-2813
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造力：通过探索不同的方法和策略，替代方案鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-2814
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 综合问题解决：它们提供了更广阔的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-2815
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案通过展示各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-2816
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：通过突出解决问题的不同方式，替代方案提供了灵活性，允许适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-2817
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代解决方案为了在提示中有效地请求替代解决方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2818
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-2819
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确你感兴趣的特定方面或细节，例如约束、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-2820
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求替代解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-2821
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-2822
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：要求提供多个解决方案，以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-2823
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代解决方案的示例
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-2824
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。替代解决方案提示：你能提供缓解气候变化对沿海城市影响的替代方案吗？包括短期和长期策略？
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-2825
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”替代解决方案提示：“你能提供增加发展中国家可再生能源采用率的替代方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-2826
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释远程工作的挑战。替代解决方案提示：你能提供解决远程工作挑战的替代方案吗？包括沟通、生产力和工作与生活平衡？
- en: Common Pitfalls to Avoid
  id: totrans-2827
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-2828
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代解决方案进行模糊或一般性的请求。确保对问题和所需解决方案的类型具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-2829
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解决方案不完整或不准确。提供足够的信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-2830
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑在创造力和可行性之间取得平衡，以确保实际的相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-2831
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代解决方案是提示工程中的一种宝贵实践，它增强了创造力、全面问题解决、信息决策和灵活性。通过确定问题、具体化、使用直接语言、提供背景信息和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代解决方案，以满足你的需求。避免陷入模糊请求、缺乏背景信息和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2832
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 136: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-2833
  prefs: []
  type: TYPE_NORMAL
  zh: 第136章：寻求概念澄清寻求澄清概念是提示工程中的重要技巧，有助于确保你完全理解复杂的思想、术语或过程。澄清提供了详细的解释，增强了理解并消除了歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将此技巧融入你的提示中。寻求概念澄清的重要性
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-2834
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供了详细的解释，增强了复杂思想、术语或过程的理解。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-2835
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，减少了误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-2836
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中界定概念，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-2837
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强在准确有效地应用信息时的信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-2838
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2839
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：明确陈述需要澄清的概念或术语，确保AI理解你查询的重点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-2840
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如其应用或背景。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-2841
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-2842
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求例子：请求例子来说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-2843
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定澄清的相关背景或信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-2844
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-2845
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清叶绿素在光合作用的光反应中的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-2846
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-2847
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中叠加的概念并提供其应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2848
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2849
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的澄清请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-2850
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致不完整或不准确的澄清。提供足够的信息来界定概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-2851
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2852
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求概念澄清是提示工程中的一项重要实践，它有助于提高理解、准确性、相关性和信心。通过识别概念、具体化、使用直接语言、请求示例和提供背景信息，你可以确保ChatGPT提供详细且符合你需求的澄清。避免模糊请求、缺乏背景信息和问题过多等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2853
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 137: Request Detailed ExplanationsRequesting detailed explanations
    in your prompts is a key technique in prompt engineering that helps you gain a
    deeper understanding of concepts, processes, and phenomena. Detailed explanations
    provide comprehensive insights that enhance learning and comprehension. This chapter
    will explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-2854
  prefs: []
  type: TYPE_NORMAL
  zh: 第137章：请求详细解释在提示中请求详细解释是提示工程的关键技术，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-2855
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的解释提供了深入了解事物是如何工作的，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-2856
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-2857
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：详细的解释提供了背景信息，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-2858
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细解释的重要性
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-2859
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了在提示中有效地请求详细解释，考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-2860
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地说明你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-2861
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-2862
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建解释的相关背景或信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-2863
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-2864
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明解释并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-2865
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-2866
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释光合作用是如何工作的。详细解释提示：你能解释光合作用是如何工作的，包括叶绿素的作用和过程的各个阶段吗？
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-2867
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述区块链技术。详细解释提示：你能解释区块链技术是如何工作的，包括交易是如何验证并被添加到区块链中的吗？
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-2868
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“量子计算是什么？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2869
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-2870
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的详细解释请求。具体说明你需要什么，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-2871
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致解释不完整或不准确。提供足够的信息来构建解释。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-2872
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2873
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求详细解释是提示工程中的关键实践，它增强了深度、清晰度、背景和参与度。通过具体化、使用直接语言、提供背景、请求逐步解释和请求示例，你可以确保ChatGPT提供符合你需求的详细和全面的解释。避免如含糊请求、缺乏背景和过于宽泛问题等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2874
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 138: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-2875
  prefs: []
  type: TYPE_NORMAL
  zh: 第138章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、物体或场景之间的差异和相似性。比较提供了更清晰的洞察力，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-2876
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：比较法通过将抽象或复杂的概念与更熟悉的思想联系起来或突出差异，有助于阐明这些概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-2877
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过识别相似性和差异性，它们提供了更深入的洞察力，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-2878
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策制定：通过并排展示多个选项或观点，比较法有助于基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-2879
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供更广泛的背景和多个观点，它们增强了整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-2880
  prefs: []
  type: TYPE_NORMAL
  zh: 比较的使用方法为了有效地在提示中使用比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-2881
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要比较的概念、物体或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-2882
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：具体说明比较的方面或标准，例如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-2883
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较性语言：使用比较性语言（例如，“比较”、“对比”、“相似性”、“差异性”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-2884
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建比较的相关背景或信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-2885
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：请求详细的比较，以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-2886
  prefs: []
  type: TYPE_NORMAL
  zh: 比较法的应用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-2887
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：一般提示：“解释可再生能源的好处。”比较提示：“你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-2888
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“你能比较植物中光合作用的过程和动物中细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-2889
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“你能比较人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2890
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-2891
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的比较：避免请求过于宽泛或一般的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-2892
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略必要的背景信息可能导致比较不完整或不准确。提供足够的信息来构建比较的框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-2893
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不清晰的表述：使用模糊或不明确的语言可能会掩盖比较的意图。请确保用词准确，以便AI能够理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2894
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用比较是提示工程中的一个宝贵技巧，它增强了清晰度、洞察力、决策力和理解力。通过识别概念、具体化、使用比较语言、提供背景信息和请求详细的比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度宽泛的比较、缺乏背景信息和表述不清晰等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2895
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 139: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-2896
  prefs: []
  type: TYPE_NORMAL
  zh: 第139章：请求洞见在提示中请求洞见是提示工程中的一个宝贵技巧，有助于揭示对各种主题的更深入理解、解释和观点。洞见提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求洞见的重要性以及如何有效地将此技巧融入你的提示中。请求洞见的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-2897
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：洞见提供了对主题的更深入理解，揭示了潜在的原则、模式或含义。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-2898
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供了解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-2899
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：洞见通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-2900
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求洞见鼓励更互动和有趣的探索主题，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-2901
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求洞见为了有效地在提示中请求洞见，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-2902
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要洞见的主题或问题，确保AI能够理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-2903
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、含义或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-2904
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言来请求洞见，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-2905
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何相关的背景信息或背景知识，这有助于构建洞见的框架。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-2906
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点，以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-2907
  prefs: []
  type: TYPE_NORMAL
  zh: 请求洞察的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-2908
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 洞察提示："你能提供关于可再生能源在未来十年内如何影响全球能源市场的见解吗？"
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-2909
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述气候变化的影响。" 洞察提示："你能提供关于气候变化对生物多样性和生态系统长期影响的见解吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-2910
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："民主政府的核心特征是什么？" 洞察提示："你能提供关于民主政府原则如何影响社会和经济发展的见解吗？"
- en: Common Pitfalls to Avoid
  id: totrans-2911
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-2912
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或泛泛的洞察请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-2913
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致见解不完整或不准确。提供足够的信息以构建见解的框架。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-2914
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和背景。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-2915
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求洞察是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体化、使用直接语言、提供背景信息和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的见解。避免如含糊请求、缺乏背景信息和忽略解释等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2916
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 140: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-2917
  prefs: []
  type: TYPE_NORMAL
  zh: 第140章：请求对比在提示中请求对比是提示工程中的一种强大技术，有助于突出概念、对象或场景之间的差异和区分。对比通过强调区分事物的不同之处，提供了清晰的见解并增强了理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-2918
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：对比有助于阐明差异和区分，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-2919
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过突出不同元素之间的差异，它们提供了更深入的见解，增强了理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-2920
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清晰地展示不同选项的优缺点，促进基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-2921
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供比较视角，展示不同元素之间的关系，从而增强整体理解。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-2922
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比为了有效地在提示中请求对比，请考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-2923
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定元素：明确说明你想要对比的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-2924
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定对比的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-2925
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-2926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建对比的相关背景或信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-2927
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细对比：请求详细的对比，以探索不同方面及其相应的含义。
- en: Examples of Asking for Contrasts
  id: totrans-2928
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-2929
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释可再生能源的好处。" 对比提示： "你能从成本、效率和环境影响的角度对比太阳能和风能的好处吗？"
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-2930
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述光合作用的过程。" 对比提示： "你能对比植物中光合作用的过程与动物中细胞呼吸的过程吗？"
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-2931
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "气候变化的原因是什么？" 对比提示： "你能对比人类活动与自然因素对气候变化的影响吗？"
- en: Common Pitfalls to Avoid
  id: totrans-2932
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-2933
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的对比：避免请求过于广泛或笼统的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-2934
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要背景可能导致对比不完整或不准确。提供足够的信息来构建对比。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-2935
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖对比的意图。在措辞上要精确，以确保AI理解你的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2936
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中请求对比是提示工程中的一种强大技术，它增强了清晰度、洞察力、决策和理解。通过识别元素、具体化、使用比较语言、提供背景和请求详细对比，你可以确保ChatGPT提供针对你需求的清晰和相关的对比。避免过度广泛的对比、缺乏背景和语言不清晰等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2937
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 141: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-2938
  prefs: []
  type: TYPE_NORMAL
  zh: 第141章：请求影响请求影响是提示工程中的一种宝贵技术，它帮助你探索行动、决策或事件的潜在后果和影响。理解影响提供了更深入的见解并支持明智的决策。本章将探讨请求影响的重要性以及如何有效地将此技术融入你的提示中。请求影响的重要性
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-2939
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-2940
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过突出特定行动或事件更广泛的影响和重要性来增强理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-2941
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解影响可以指导决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-2942
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：影响通过展示不同因素和事件如何相互关联和影响彼此来提供背景。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-2943
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响为了在提示中有效地请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-2944
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地陈述你想要探索的行动、决策或事件，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-2945
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持具体：指定你感兴趣的任何特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-2946
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求影响，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-2947
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建影响的相关背景或信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-2948
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求详细分析：要求对影响进行详细分析，以探索不同方面及其相应的影响。
- en: Examples of Requesting Implications
  id: totrans-2949
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-2950
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”影响提示：“你能解释广泛采用可再生能源对全球能源市场的长期影响吗？”
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-2951
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”影响提示：“你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-2952
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”影响提示：“你能讨论从威权体制过渡到民主政府对社会稳定和经济发展的潜在影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2953
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2954
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或泛泛的关于影响的要求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-2955
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致对影响的不完整或不准确的分析。提供足够的背景信息以构建影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-2956
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多角度：专注于单一视角可能会限制分析。请求多个视角以探索不同的影响和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2957
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求影响是提示工程中的一种宝贵实践，它增强了深度、理解、决策和背景。通过识别行动或事件，保持具体，使用直接语言，提供背景，并要求详细分析，你可以确保ChatGPT为你提供准确和相关的见解，针对你的需求定制影响。避免诸如模糊请求、缺乏背景和忽视多角度等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2958
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 142: Request Alternative ViewsRequesting alternative views in your
    prompts is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-2959
  prefs: []
  type: TYPE_NORMAL
  zh: 第142章：请求替代观点在提示中请求替代观点是提示工程中的一个有价值的技术，有助于你探索一个主题的不同视角和观点。替代观点提供了更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求替代观点的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-2960
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：通过呈现问题或主题的不同方面，替代观点提供了一个平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-2961
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索多元视角来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-2962
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过突出不同的解释和方法，替代观点可以增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-2963
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 智慧决策：考虑替代观点通过提供多个选项和考虑因素来支持明智的决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-2964
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代观点为了有效地在提示中请求替代观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-2965
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要了解替代观点的主题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-2966
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：明确指出你感兴趣的特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-2967
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求替代观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-2968
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建替代视角的相关上下文或背景信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-2969
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-2970
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-2971
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”替代观点提示：“你能提供关于可再生能源好处的不同观点，包括正面和批评的视角吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-2972
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代观点提示：“你能提供关于气候变化的不同观点，包括来自环保主义者和怀疑者的视角吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-2973
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”替代观点提示：“你能讨论关于民主政府核心特征的替代观点，包括支持和批评者的观点吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2974
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-2975
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的替代观点请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-2976
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致不完整或不准确的替代观点。提供足够的背景信息以构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-2977
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略多元视角：只关注单一视角可能会限制分析。请求多元视角以探索不同的观点和影响。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-2978
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求不同的观点是提示工程中的一种宝贵实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、具体化、使用直接语言、提供背景和询问多个观点，您可以确保ChatGPT提供针对您需求的准确和相关的不同观点。避免诸如模糊请求、缺乏背景和忽视多元观点等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-2979
  prefs: []
  type: TYPE_NORMAL
  zh: '** ** * * *'
- en: 'Chapter 143: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-2980
  prefs: []
  type: TYPE_NORMAL
  zh: 第143章：指定评估标准在您的提示中指定评估标准是提示工程中的重要技术，有助于聚焦AI的响应并确保它们与您的需求相关。标准提供清晰的指导方针和边界，提高信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将此技术融入您的提示中。评估标准指定的意义
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-2981
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 焦点：标准有助于缩小AI的响应范围，使其聚焦于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-2982
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，您确保响应保持清晰并与您的具体需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-2983
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于您的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-2984
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确度：指定标准可以提高响应的精确度，使其更加准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-2985
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准为了在您的提示中有效地指定评估标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-2986
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确陈述您想要解决的问题或议题，确保AI理解您查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-2987
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定响应的标准或指南，例如范围、长度、格式或需要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-2988
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言来指定标准，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-2989
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定标准的有关背景或信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-2990
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求遵守：要求响应遵守指定的标准，以确保与您的需求保持一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-2991
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-2992
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”标准指定提示：“你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字？”
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-2993
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”标准指定提示：“你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-2994
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”标准指定提示：“你能列出民主政府的核心特征，重点关注政治和社会方面吗？”
- en: Common Pitfalls to Avoid
  id: totrans-2995
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-2996
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的标准：避免使用模糊或含糊不清的标准。具体说明指南以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-2997
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度限制的标准：设定过于严格的标准可能会限制响应的深度和质量。确保你的标准是合理的，并允许提供全面的答案。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-2998
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的背景信息来界定标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-2999
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定评估标准是提示工程中的一个关键实践，它增强了焦点、清晰度、相关性和精确性。通过确定主题、定义标准、使用直接语言、提供上下文和请求遵守，你可以确保ChatGPT提供准确和相关的响应，以满足你的需求。避免如模糊标准、过度限制的标准和忽略上下文等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3000
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 144: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-3001
  prefs: []
  type: TYPE_NORMAL
  zh: 第144章：请求简化在提示工程中请求简化是一个有价值的技巧，有助于将复杂的概念、过程或信息分解成更简单、更易于理解的形式。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将此技巧融入你的提示中。请求简化的重要性
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-3002
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-3003
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众理解，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-3004
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：简化使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-3005
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释在实际应用中更实用，也更容易应用。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-3006
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化为了有效地在提示中请求简化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-3007
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地陈述你想要简化的复杂概念或过程，确保AI理解你的查询焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-3008
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-3009
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化的目标受众，如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-3010
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-3011
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定简化的相关上下文或背景信息。
- en: Examples of Requesting Simplifications
  id: totrans-3012
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-3013
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释它吗？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-3014
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单语言和例子为没有技术背景的人简化区块链技术吗？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-3015
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本类比来解释它是如何工作的吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3016
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3017
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的简化请求。确保你的需求具体明确，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-3018
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化是有用的，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-3019
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致简化不完整或不准确。提供足够的信息来构建简化框架。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3020
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景信息，你可以确保ChatGPT提供符合你需求的清晰和相关的简化。避免诸如模糊请求、过度简化和忽略背景等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3021
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 145: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-3022
  prefs: []
  type: TYPE_NORMAL
  zh: 第145章：请求现实世界应用在提示中请求现实世界应用是提示工程中的一个重要技巧，有助于你了解概念、理论或过程如何在实际中应用。现实世界的应用提供了具体的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-3023
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界的应用通过展示它们在实际情境中的使用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-3024
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供如何在现实世界情境中实施的具体例子，帮助阐明复杂的思想。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-3025
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：现实世界的应用使信息更具吸引力和趣味性，加深了与主题的连接。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-3026
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-3027
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了有效地在提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-3028
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-3029
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的实际情况，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-3030
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求实际应用，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-3031
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建实际应用的相关的背景信息或背景资料。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-3032
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求详细的实际应用例子，以了解概念的实施方式和其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-3033
  prefs: []
  type: TYPE_NORMAL
  zh: 请求实际应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-3034
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”实际应用提示：“你能提供可再生能源（如太阳能和风能）在不同行业中应用的实例吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-3035
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”实际应用提示：“你能提供城市为应对气候变化实施的实际举措和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-3036
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”实际应用提示：“你能提供区块链技术在各个领域（如金融、供应链和医疗保健）应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3037
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3038
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对实际应用提出模糊或一般性的请求。确保具体说明你的需求，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-3039
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致例子不完整或不准确。提供足够的背景信息以构建实际应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-3040
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般性的例子可能无法提供你所需要的深度。请求详细的例子以了解实际实施和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3041
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求实际应用是提示工程中的重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体说明、使用直接语言、提供背景信息和请求详细例子，你可以确保ChatGPT提供符合你需求的清晰和相关的实际应用。避免模糊请求、缺乏背景信息和忽略具体性等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3042
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 146: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-3043
  prefs: []
  type: TYPE_NORMAL
  zh: 第146章：请求统计分析在提示中请求统计分析是提示工程中的一个宝贵技巧，有助于你获得定量洞察和证据来支持你的查询。统计分析提供了事实依据，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-3044
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实依据，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-3045
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-3046
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-3047
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：统计分析通过提供基于证据的信息支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-3048
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析：为了在提示中有效地请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-3049
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解查询的焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-3050
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，例如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-3051
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-3052
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建统计分析的相关背景或信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-3053
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 求源：请求提供统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-3054
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-3055
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”统计分析提示：“你能提供过去十年中太阳能和风能等可再生能源采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-3056
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”统计分析提示：“你能提供过去50年中全球温度上升和极端天气事件发生频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-3057
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于区块链技术在不同行业增长（包括基于区块链的公司和项目数量）的统计分析吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3058
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-3059
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对统计分析的模糊或一般性请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-3060
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的背景信息以构建统计分析。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-3061
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终请求来源或参考文献以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-3062
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一项宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景和请求来源，你可以确保ChatGPT提供符合你需求的准确和可靠的统计分析。避免诸如请求模糊、缺乏背景和忽略来源等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3063
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 147: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-3064
  prefs: []
  type: TYPE_NORMAL
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-3065
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-3066
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-3067
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-3068
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-3069
  prefs: []
  type: TYPE_NORMAL
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-3070
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-3071
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-3072
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-3073
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-3074
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples of Asking for Historical Comparisons
  id: totrans-3075
  prefs: []
  type: TYPE_NORMAL
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-3076
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-3077
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-3078
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Common Pitfalls to Avoid
  id: totrans-3079
  prefs: []
  type: TYPE_NORMAL
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3080
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-3081
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-3082
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免细节过载：虽然历史比较很有用，但提供过多细节可能会使回答显得繁杂。专注于最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3083
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史比较是提示工程中的一个重要实践，它增强了情境、洞察力、理解和视角。通过确定主题、指定历史时期、使用直接语言、提供情境和请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如请求模糊、缺乏情境和细节过载等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3084
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 148: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-3085
  prefs: []
  type: TYPE_NORMAL
  zh: 第148章：寻求跨学科见解在提示中寻求跨学科见解是提示工程中的一个宝贵技巧，有助于你探索不同领域或学科如何相互交叉和影响。跨学科见解提供了更广阔的视角，并通过整合来自各个领域的知识来增强理解。本章将探讨寻求跨学科见解的重要性以及如何有效地将此技巧融入你的提示中。寻求跨学科见解的重要性
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-3086
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：跨学科见解通过整合来自不同领域或学科的知识来提供更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-3087
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：它们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-3088
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域如何交叉和相互影响来增强理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-3089
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：它们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-3090
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了有效地在提示中寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3091
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要探索的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-3092
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的各个领域或学科，例如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-3093
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求跨学科见解，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-3094
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供情境：包括任何有助于构建跨学科见解的相关情境或背景信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-3095
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求整合：请求来自不同领域的知识整合，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-3096
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-3097
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括环境科学、经济学和社会政策的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-3098
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”跨学科提示：“你能提供关于气候变化影响的跨学科见解，包括气候学、农业和公共卫生的视角吗？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-3099
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”跨学科提示：“你能提供关于人工智能的跨学科见解，包括计算机科学、伦理和社会学的视角吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3100
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对跨学科见解的模糊或一般性请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-3102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致见解不完整或不准确。提供足够的背景信息以构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-3103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略整合：仅仅关注单个领域可能会限制分析。请求整合知识，以探索不同领域如何交叉影响主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3104
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科见解是提示工程中的一种宝贵实践，它增强了观点、创新、理解和解决问题的能力。通过确定主题、指定学科、使用直接语言、提供背景信息以及请求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏背景信息和忽略整合等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3105
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 149: Request Solutions to ProblemsRequesting solutions to problems
    in your prompts is an important technique in prompt engineering that helps you
    explore potential answers and strategies for addressing various issues. Solutions
    provide practical and actionable information that can guide decision-making and
    problem-solving. This chapter will explore the importance of requesting solutions
    to problems and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Solutions to Problems'
  id: totrans-3106
  prefs: []
  type: TYPE_NORMAL
  zh: 第149章：请求解决问题的方案在提示中请求解决问题的方案是提示工程中的一种重要技术，它帮助你探索解决各种问题的潜在答案和策略。解决方案提供实用和可操作的信息，可以指导决策和解决问题。本章将探讨请求解决问题的方案的重要性以及如何有效地将此技术融入你的提示中。请求解决问题的方案的重要性
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-3107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用和可操作的信息，可以直接应用于解决实际问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-3108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：它们通过呈现可能的答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-3109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：通过提供克服挑战的具体方法，解决方案有助于解决问题。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-3110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：通过探索各种策略和想法，请求解决方案鼓励创造性思维和创新。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-3111
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的方案为了有效地在提示中请求解决问题的方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别问题：清楚地陈述你想要解决的问题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-3113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽具体：指定你感兴趣的任何特定方面或细节，例如约束条件、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-3114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-3115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-3116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-3117
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决问题的解决方案实例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-3118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”解决方案提示：“你能提供缓解气候变化对沿海城市影响的解决方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-3119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”解决方案提示：“你能提供在发展中国家增加可再生能源采用率的解决方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-3120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”解决方案提示：“你能提供解决远程工作挑战的解决方案吗？包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-3121
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-3122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的解决方案请求。具体说明问题和所需的解决方案类型，以确保清晰性和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-3123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致解决方案不完整或不准确。提供足够的信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-3124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性以确保其实际相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3125
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求解决问题的解决方案是提示工程中的一种重要实践，它增强了实用性、决策、问题解决和创新。通过确定问题、具体说明、使用直接语言、提供背景和请求多个解决方案，你可以确保ChatGPT提供准确且符合你需求的解决方案。避免诸如含糊请求、缺乏背景和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3126
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 150: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-3127
  prefs: []
  type: TYPE_NORMAL
  zh: 第150章：请求应用实例在提示中请求应用实例是提示工程中的一种实用技术，有助于说明概念、理论或过程在现实世界场景中的应用。应用实例提供了具体的实例，增强了理解和相关性。本章将探讨请求应用实例的重要性以及如何有效地将此技术融入你的提示中。请求应用实例的重要性
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-3128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：应用实例通过提供具体的使用实例来帮助阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-3129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示其在现实世界场景中的应用，使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-3130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：应用实例使信息更具吸引力和相关性，从而增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-3131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-3132
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用示例为了在提示中有效地请求应用示例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-3133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要应用示例的概念、理论或过程，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-3134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：明确你感兴趣的特定应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-3135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求应用示例，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-3136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建示例的相关背景信息或背景知识。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-3137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细示例：请求详细示例以了解概念是如何实施的及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-3138
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用示例的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-3139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供一些可再生能源，如太阳能和风能，在不同行业中应用的例子吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-3140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供区块链技术在金融、供应链和医疗保健等不同领域的应用示例吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-3141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”应用提示：“你能提供人工智能在不同领域，如医疗保健、金融和交通中的应用示例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3142
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对应用示例进行模糊或泛泛的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-3144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致示例不完整或不准确。提供足够的背景信息来构建应用。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-3145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度举例：虽然举例很有用，但一次性要求太多可能会让人感到不知所措。专注于可管理的例子数量，以保持清晰度。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3146
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用示例是提示工程中一种实用且有效的实践，它增强了清晰度、相关性、参与度和可用性。通过识别概念、明确具体、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰且相关的应用示例。避免诸如模糊请求、缺乏背景信息和过度举例等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3147
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 151: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-3148
  prefs: []
  type: TYPE_NORMAL
  zh: 第151章：使用假设情景
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-3149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来获得见解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-3150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案来鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-3151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：假设情景可以通过模拟不同的情景来帮助识别潜在的问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-3152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：使用假设情景可以使互动更加吸引人和动态，促进对主题的深入探讨。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-3153
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-3154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景作为“如果...会怎样”的问题来探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-3155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设情景，包括相关的细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-3156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束，以指导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-3157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体结果：根据假设情景请求具体的结果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-3158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造性：邀请AI进行创造性思考，并考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-3159
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设情景的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-3160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 假设情景提示："如果一个国家过渡到100%的可再生能源，将产生什么样的经济、环境和社交影响？"
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-3161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释气候变化的原因。" 假设情景提示："如果所有国家同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？"
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-3162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："民主政府的核心特征是什么？" 假设情景提示："如果一个实行威权主义的国家的政权转变为民主政府，可能会出现哪些挑战和机遇？"
- en: Common Pitfalls to Avoid
  id: totrans-3163
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-3164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或混乱的假设情景。保持情景清晰和集中。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-3165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数定义清晰，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-3166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然假设情景鼓励创造性思维，但考虑在创造性和可行性之间取得平衡，以确保实际的相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-3167
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用假设情景是提示工程中的一个强大技术，它可以增强探索、创造性思维、问题解决和参与度。通过提出“如果”问题，保持清晰和具体，定义参数，请求结果，并鼓励创造性，你可以构建出能够有效利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3168
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 152: Ask for Alternative SolutionsAsking for alternative solutions
    in your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-3169
  prefs: []
  type: TYPE_NORMAL
  zh: 第152章：请求替代方案在提示中请求替代方案是提示工程中的一个有价值的技术，它帮助你探索解决各种问题的不同方法和策略。替代方案提供了更广阔的视角，并鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代方案的重要性以及如何有效地将这一技术融入你的提示中。
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-3170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性：替代方案通过探索不同的方法和策略鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-3171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全面的问题解决：它们提供了更广阔的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-3172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案通过展示各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-3173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：替代方案通过突出解决问题的不同方式提供灵活性，允许适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-3174
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代方案为了在提示中有效地请求替代方案，请考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-3176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持具体：指定你感兴趣的任何特定方面或细节，例如约束、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-3177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求替代方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-3178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-3179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案，以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-3180
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代方案的示例
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-3181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代方案提示：“你能提供减轻气候变化对沿海城市影响的替代方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-3182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源的好处是什么？”替代方案提示：“你能提供增加发展中国家可再生能源采用率的替代方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-3183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案，包括沟通、生产力和工作与生活平衡吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3184
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-3185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的替代解决方案请求。具体说明问题和你需要的解决方案类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-3186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息，以界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-3187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略可行性：虽然创造性的解决方案很有价值，但考虑平衡创造性与可行性，以确保其实际相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-3188
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求替代解决方案是提示工程中的一种宝贵实践，它增强了创造力、全面的问题解决、明智的决策和灵活性。通过确定问题、具体说明、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确和相关的替代解决方案，以满足你的需求。避免诸如含糊请求、缺乏上下文和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3189
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 153: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-3190
  prefs: []
  type: TYPE_NORMAL
  zh: 第153章：寻求概念澄清在你的提示中寻求概念的澄清是提示工程中的一种重要技术，有助于确保你完全理解复杂的思想、术语或过程。澄清提供详细的解释，有助于理解并消除歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-3191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供详细的解释，有助于理解复杂的思想、术语或过程。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-3192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，减少误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-3193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题内定位概念，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-3194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强准确和有效地应用信息的信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-3195
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清：为了有效地在你的提示中寻求概念的澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：明确陈述需要澄清的概念或术语，确保AI理解你查询的重点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-3197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如其应用或上下文。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-3198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-3199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-3200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建澄清的相关背景信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-3201
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-3202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清叶绿素在光合作用的光依赖反应中的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-3203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-3204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中叠加的概念并提供其应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3205
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或笼统的澄清请求。确保具体化你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-3207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景可能导致不完整或不准确的澄清。提供足够的背景信息来构建概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-3208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3209
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清是提示工程中的一个重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、具体化、使用直接语言、请求示例和提供背景信息，你可以确保ChatGPT提供针对你需求的详细和准确的澄清。避免陷入模糊请求、缺乏背景信息和过度提问等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3210
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 154: Request Detailed ExplanationsRequesting detailed explanations
    in your prompts is a key technique in prompt engineering that helps you gain a
    deeper understanding of concepts, processes, and phenomena. Detailed explanations
    provide comprehensive insights that enhance learning and comprehension. This chapter
    will explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-3211
  prefs: []
  type: TYPE_NORMAL
  zh: 第154章：请求详细解释在提示工程中请求详细解释是一个关键技巧，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察力，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将这一技巧融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-3212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的解释提供了深入了解事物如何运作的洞察力，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-3213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-3214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：详细的解释提供了背景，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-3215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-3216
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了有效地在提示中请求详细解释，考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-3217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：清楚地说明你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-3218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-3219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于解释框架的相关背景或信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-3220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-3221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求例子：请求例子以说明解释并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-3222
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的例子
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-3223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释光合作用是如何工作的。详细解释提示：你能解释光合作用是如何工作的，包括叶绿素的作用和过程的各个阶段？
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-3224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述区块链技术。详细解释提示：你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链中的？
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-3225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“量子计算是什么？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念？”
- en: Common Pitfalls to Avoid
  id: totrans-3226
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-3227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对详细解释进行模糊或一般性的请求。确保具体说明，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-3228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致解释不完整或不准确。提供足够的信息来构建解释框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-3229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3230
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求详细解释是提示工程中的一个关键实践，它增强了深度、清晰度、背景和参与度。通过具体说明、使用直接语言、提供背景、请求逐步解释和请求例子，你可以确保ChatGPT提供详细且全面、符合你需求的解释。避免诸如模糊请求、缺乏背景和过于宽泛的问题将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3231
  prefs: []
  type: TYPE_NORMAL
  zh: '** ** * **'
- en: 'Chapter 155: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-3232
  prefs: []
  type: TYPE_NORMAL
  zh: 第155章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、对象或场景之间的差异和相似性。比较提供了更清晰的见解，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技巧融入你的提示中。使用比较的重要性
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-3233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：比较通过将它们与更熟悉的概念相关联或突出差异，有助于阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-3234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过识别相似性和差异性，它们提供了更深入的见解，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-3235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：比较通过并排呈现多个选项或观点，促进基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-3236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-3237
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较：为了有效地在你的提示中使用比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-3238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要比较的概念、对象或场景，确保AI理解查询的重点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-3239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体明确：明确比较的方面或标准，例如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-3240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似之处”、“不同之处”）来清楚地界定你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-3241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建比较的相关上下文或背景信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-3242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：请求详细比较以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-3243
  prefs: []
  type: TYPE_NORMAL
  zh: 使用比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-3244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”比较提示：“你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-3245
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“你能比较植物中光合作用的过程和动物中细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-3246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“你能比较人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3247
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-3248
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的比较：避免请求过于广泛或笼统的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-3249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致比较不完整或不准确。提供足够的背景信息以构建比较框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-3250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖比较的意图。确保措辞精确，以便AI理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3251
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用比较是提示工程中的一个宝贵技巧，它增强了清晰度、洞察力、决策力和理解力。通过识别概念、具体明确、使用比较语言、提供上下文和请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度广泛的比较、缺乏上下文和语言不清晰等错误将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3252
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 156: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-3253
  prefs: []
  type: TYPE_NORMAL
  zh: 第156章：请求洞见请求洞见是提示工程中的一个宝贵技巧，有助于揭示对各种主题的更深入的理解、解释和观点。洞见提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求洞见的重要性以及如何有效地将此技巧融入你的提示中。请求洞见的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-3254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：洞察提供了对主题的更深入理解，揭示了潜在的原则、模式或影响。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-3255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-3256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策制定：洞察通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-3257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互动：请求洞察鼓励更互动和有趣的探索，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-3258
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求洞察：为了有效地在提示中请求洞察，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要洞察的主题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-3260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、影响或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-3261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求洞察，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-3262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建洞察的相关背景或信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-3263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-3264
  prefs: []
  type: TYPE_NORMAL
  zh: 请求洞察的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-3265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”洞察提示：“你能提供关于可再生能源采用如何影响未来十年全球能源市场的洞察吗？”
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-3266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”洞察提示：“你能提供关于气候变化对生物多样性和生态系统长期影响的洞察吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-3267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”洞察提示：“你能提供关于民主政府原则如何影响社会和经济发展的洞察吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3268
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见错误
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-3269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或一般性的洞察请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-3270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致洞察不完整或不准确。提供足够的背景信息来构建洞察。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-3271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和背景。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3272
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求洞察是提示工程中的一种宝贵实践，它增强了深度、解释、决策和互动。通过确定主题、具体化、使用直接语言、提供背景和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的洞察。避免模糊请求、缺乏背景和忽视解释等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3273
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 157: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-3274
  prefs: []
  type: TYPE_NORMAL
  zh: 第157章：请求对比在提示工程中请求对比是一种强大的技术，有助于突出概念、物体或场景之间的差异和区别。对比通过强调不同之处提供了清晰的洞察力，并增强了理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。请求对比的重要性
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-3275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：对比有助于阐明差异和区别，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-3276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过突出不同元素的特点，它们提供了更深入的洞察力，增强了理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-3277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清晰地展示不同选项的优缺点，促进了基于信息的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-3278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供比较视角，它们增强了整体理解，展示了不同元素之间的关系。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-3279
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比为了有效地在提示中请求对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-3280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别元素：清楚地说明你想要对比的概念、物体或场景，确保AI理解查询的重点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-3281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定对比的方面或标准，如功能、有效性、优缺点等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-3282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地表达你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-3283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建对比的相关上下文或背景信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-3284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细对比：请求详细的对比，以探索不同方面及其相应的含义。
- en: Examples of Asking for Contrasts
  id: totrans-3285
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-3286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”对比提示：“你能从成本、效率和环境影响的角度对比太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-3287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”对比提示：“你能对比植物光合作用和动物细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-3288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”对比提示：“你能对比人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3289
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-3290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的对比：避免请求过于宽泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-3291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的上下文可能导致对比不完整或不准确。请提供足够的背景信息来构建对比框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-3292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不清晰的表述：使用模糊或不明确的语言可能会掩盖对比的意图。请确保用词准确，以便AI能够理解你的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3293
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在您的提示中请求对比是提示工程中的一个强大技巧，它增强了清晰度、洞察力、决策力和理解力。通过识别元素、具体化、使用比较语言、提供背景信息和请求详细对比，您可以确保ChatGPT提供针对您需求的清晰和相关的对比。避免过度广泛的对比、缺乏背景和语言不清晰等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3294
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 158: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-3295
  prefs: []
  type: TYPE_NORMAL
  zh: 第158章：请求影响在您的提示中请求影响是提示工程中的一个宝贵技巧，有助于您探索行动、决策或事件的潜在后果和影响。理解影响可以提供更深入的见解并支持明智的决策。本章将探讨请求影响的重要性以及如何有效地将此技巧融入您的提示中。请求影响的重要性
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-3296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-3297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过突出特定行动或事件的更广泛影响和重要性来增强理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-3298
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：理解影响通过展示潜在的结果和风险来指导决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-3299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：影响通过展示不同因素和事件如何相互关联并相互影响来提供背景。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-3300
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响为了有效地在您的提示中请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-3301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地说明您想要探索的行动、决策或事件，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-3302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保具体：明确您感兴趣的任何特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-3303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来请求影响，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-3304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建影响的相关的背景或信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-3305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求详细分析：请求对影响的详细分析，以探索不同方面及其相应的效果。
- en: Examples of Requesting Implications
  id: totrans-3306
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-3307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 影响提示：“你能解释广泛采用可再生能源对全球能源市场长期影响的解释吗？”
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-3308
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 影响提示：“你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-3309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 影响提示：“你能讨论从威权制度过渡到民主政府对社会稳定和经济发展的含义吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3310
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对影响提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-3312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致对影响的分析不完整或不准确。提供足够的背景信息来界定影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-3313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多个视角：专注于单一视角可能会限制分析。请求多个视角以探索不同的影响和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3314
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求影响是提示工程中的一个宝贵实践，它增强了深度、理解、决策和上下文。通过确定行动或事件、具体明确、使用直接语言、提供上下文以及请求详细分析，您可以确保ChatGPT提供针对您需求的准确和相关的见解。避免诸如模糊请求、缺乏上下文和忽视多个视角等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3315
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 159: Request Alternative ViewsRequesting alternative views in your
    prompts is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-3316
  prefs: []
  type: TYPE_NORMAL
  zh: 第159章：请求不同观点在提示中请求不同观点是提示工程中的一个宝贵技巧，它帮助您探索一个主题的不同视角和观点。不同的观点提供了更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求不同观点的重要性以及如何有效地将此技巧融入您的提示中。请求不同观点的重要性
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-3317
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：不同的观点通过展示问题或主题的不同方面提供了一个平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-3318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-3319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同的观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-3320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑不同的观点通过提供多个选项和考虑因素，支持情报决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-3321
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同观点为了有效地在提示中请求不同观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-3322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明您想要不同观点的主题或问题，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-3323
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体明确：指定您感兴趣的任何特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-3324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求不同观点，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-3325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定不同观点的相关上下文或背景信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-3326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-3327
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-3328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。替代观点提示：你能提供关于可再生能源好处的不同观点，包括正面和批评的视角吗？
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-3329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。替代观点提示：你能提供关于气候变化的不同观点，包括环保主义者和怀疑论者的视角吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-3330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？替代观点提示：你能讨论关于民主政府核心特征的替代观点，包括支持和批评的声音吗？
- en: Common Pitfalls to Avoid
  id: totrans-3331
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代观点提出模糊或一般性的请求。确保具体化，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-3333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的替代观点。提供足够的背景信息以构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-3334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点和影响。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3335
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代观点是提示工程中的一种宝贵实践，它增强了平衡的视角、批判性思维、理解和知情决策。通过确定主题、具体化、使用直接语言、提供背景信息以及请求多个视角，你可以确保ChatGPT提供准确且相关的替代观点，以满足你的需求。避免如模糊请求、缺乏背景信息和忽视多元视角等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3336
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 160: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-3337
  prefs: []
  type: TYPE_NORMAL
  zh: 第160章：指定评估标准在提示工程中指定评估标准是一项重要的技术，有助于聚焦AI的回答并确保它们与你的需求相关。标准提供明确的指导方针和边界，提高了信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将这项技术融入你的提示中。评估标准指定的意义
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-3338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚焦：标准有助于将AI的回答缩小到最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-3339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保回答保持清晰并与你的特定需求一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-3340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-3341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准提高了回答的精确性，使其更准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-3342
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准为了在提示中有效地指定评估标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-3343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要解决的问题或议题，确保AI理解你查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-3344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定响应的标准或指南，例如范围、长度、格式或要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-3345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来指定标准，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-3346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建标准的有关背景或信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-3347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求遵守：要求响应遵守指定的标准，以确保与你的需求保持一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-3348
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-3349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。指定标准提示：你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字？
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-3350
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。指定标准提示：你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-3351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？指定标准提示：你能列出民主政府的核心特征，重点关注政治和社会方面吗？
- en: Common Pitfalls to Avoid
  id: totrans-3352
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-3353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊标准：避免使用模糊或含糊不清的标准。确保具体明确地说明指南，以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-3354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于限制性的标准：设定过于限制性的标准可能会限制响应的深度和质量。确保你的标准是合理的，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-3355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致回答不完整或不准确。提供足够的背景信息以构建标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3356
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定评估标准是提示工程中的一个关键实践，它增强了焦点、清晰度、相关性和精确度。通过确定主题、定义标准、使用直接语言、提供背景和请求遵守，你可以确保ChatGPT提供准确且相关的响应，以满足你的需求。避免如模糊标准、过于限制性的标准以及忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3357
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 161: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-3358
  prefs: []
  type: TYPE_NORMAL
  zh: 第161章：请求简化在提示中请求简化是提示工程中的一个宝贵技巧，有助于将复杂的概念、过程或信息分解成更简单、更易于理解的形式。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将此技巧融入你的提示中。请求简化的重要性
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-3359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-3360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息对更广泛的受众更加可访问，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-3361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：简化使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-3362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释更实用，更容易在实际情况下应用。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-3363
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-3364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要简化的复杂概念或过程，确保AI理解你查询的焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-3365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言来请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-3366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化的目标受众，例如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-3367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-3368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建简化的相关背景或信息。
- en: Examples of Requesting Simplifications
  id: totrans-3369
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-3370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释它吗？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-3371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单易懂的语言和例子为没有技术背景的人简化区块链技术吗？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-3372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3373
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的简化请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-3375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化很有用，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间取得平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-3376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致简化不完整或不准确。提供足够的背景信息来构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3377
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一个宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景，你可以确保ChatGPT提供针对你需求的清晰和相关的简化。避免诸如含糊请求、过度简化以及忽略背景等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3378
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 162: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-3379
  prefs: []
  type: TYPE_NORMAL
  zh: 第162章：请求现实世界应用在提示中请求现实世界应用是提示工程中的重要技巧，有助于你了解概念、理论或过程如何在实际中应用。现实世界应用提供了有形的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-3380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求现实世界应用的重要性
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-3381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供如何在现实世界环境中实施的具体例子，帮助阐明复杂的概念。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-3382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：现实世界的应用使信息更具吸引力并更有趣，从而加深对主题的深入了解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-3383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-3384
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用：为了有效地在提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-3385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-3386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的特定现实世界应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-3387
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求现实世界应用，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-3388
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建现实世界应用的相关的背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-3389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求现实世界应用的详细例子，以了解概念是如何实施的及其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-3390
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-3391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供可再生能源（如太阳能和风能）在不同行业中应用的实例吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-3392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化实施的实际项目和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-3393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”现实世界应用提示：“你能提供区块链技术在不同领域（如金融、供应链和医疗保健）中的应用实例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3394
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对现实世界应用进行模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰性和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-3396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致例子不完整或不准确。提供足够的背景信息以构建现实世界应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-3397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般性的例子可能无法提供你所需要的深度。请要求详细的例子，以理解实际应用和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3398
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求现实世界的应用是提示工程中的重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和请求详细例子，你可以确保ChatGPT提供符合你需求的清晰和相关的现实世界应用。避免模糊请求、缺乏背景信息和忽略具体性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3399
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 163: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-3400
  prefs: []
  type: TYPE_NORMAL
  zh: 第163章：请求统计分析在提示中请求统计分析是提示工程中的一个有价值的技术，它帮助你获得定量洞察和证据来支持你的查询。统计分析提供了一个事实基础，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将这项技术融入你的提示中。
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-3401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了一个事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-3402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信誉度：定量的洞察和证据增加了回答的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-3403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-3404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-3405
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析为了在提示中有效地请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-3406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-3407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-3408
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-3409
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建统计分析的相关背景信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-3410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：要求提供统计分析的来源或参考文献，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-3411
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-3412
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”统计分析提示：“你能提供过去十年中太阳能和风能等可再生能源采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-3413
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”统计分析提示：“你能提供关于过去50年来全球温度上升和极端天气事件发生频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-3414
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于不同行业中区块链技术增长的统计分析，包括基于区块链的公司和项目数量吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3415
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-3416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对统计分析提出含糊或一般性的请求。确保具体说明您需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-3417
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致分析不完整或不准确。提供足够的信息来构建统计分析的背景。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-3418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终要求提供来源或参考，以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-3419
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一个宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景信息和请求来源，您可以确保ChatGPT提供针对您需求的准确和可靠的统计分析。避免诸如含糊请求、缺乏背景信息和忽略来源等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3420
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 164: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-3421
  prefs: []
  type: TYPE_NORMAL
  zh: 第164章：请求历史比较在您的提示中请求历史比较是提示工程中的一个重要技巧，有助于您了解当前事件、概念或现象与历史事件的关系或差异。历史比较提供了背景和洞察，增强了理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入您的提示中。请求历史比较的重要性
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-3422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史比较通过展示当前事件或概念如何与过去相关来提供背景。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-3423
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：它们提供了对模式、趋势以及随时间推移的思想或事件演变的洞察。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-3424
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和差异来增强理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-3425
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了更广阔的视角，有助于将特定主题置于更广泛的历史叙事中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-3426
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较为了有效地在您的提示中请求历史比较，请考虑以下策略：
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-3427
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明您想要与历史事件进行比较的当前事件、概念或现象，确保AI理解您查询的焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-3428
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义您感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-3429
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求历史比较，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-3430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建历史比较的相关背景或信息。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-3431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：要求在具体方面进行比较，例如原因、效果或结果，以确保分析的专注性。
- en: Examples of Asking for Historical Comparisons
  id: totrans-3432
  prefs: []
  type: TYPE_NORMAL
  zh: 视角：通过整合来自不同领域或学科的知识，跨学科见解提供了更广阔的视角。
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-3433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史比较提示：“你能将当前可再生能源的采用与工业革命期间煤炭的采用进行比较吗？”
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-3434
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能将当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期进行比较吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-3435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求历史比较的例子
- en: Common Pitfalls to Avoid
  id: totrans-3436
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3437
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对历史比较提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-3438
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致比较不完整或不准确。提供足够的背景信息以构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-3439
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度详细：虽然历史比较很有用，但提供过多细节可能会使回答显得繁杂。关注最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3440
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求历史比较是提示工程中的一种重要实践，它增强了上下文、洞察力、理解和观点。通过确定主题、指定历史时期、使用直接语言、提供背景信息和请求具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免诸如请求模糊、缺乏背景信息和过度详细等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3441
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 165: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-3442
  prefs: []
  type: TYPE_NORMAL
  zh: 第165章：寻求跨学科见解在提示中寻求跨学科见解是提示工程中的一种宝贵技术，有助于你探索不同领域或学科如何相互交叉和影响。跨学科见解提供了更广阔的视角，并通过整合来自各个领域的知识来增强理解。本章将探讨寻求跨学科见解的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-3443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的重要性
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-3444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：他们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-3445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域如何交叉和相互影响来增强理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-3446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：他们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-3447
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解为了在提示中有效地寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要探索的主题或问题，确保AI理解你的查询焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-3449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的不同的领域或学科，如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-3450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求跨学科见解，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-3451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建跨学科见解的相关上下文或背景信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-3452
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求整合：请求从不同领域整合知识，以探索它们如何交叉和影响主题。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-3453
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-3454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括来自环境科学、经济学和社会政策的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-3455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 跨学科提示：“你能提供关于气候变化影响的跨学科见解，包括来自气候学、农业和公共卫生的观点吗？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-3456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？” 跨学科提示：“你能提供关于人工智能的跨学科见解，包括来自计算机科学、伦理和社会学的观点吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3457
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对跨学科见解提出模糊或一般性的请求。确保具体说明你需要什么，以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-3459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致见解不完整或不准确。提供足够的背景信息，以构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-3460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视整合：仅仅关注单个领域可能会限制分析。请求整合知识，以探索不同领域如何交叉和影响该主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3461
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科见解是提示工程中的一种宝贵实践，它增强了视角、创新、理解和问题解决。通过确定主题、指定学科、使用直接语言、提供上下文和请求整合，你可以确保ChatGPT提供准确且相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏上下文和忽视整合等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3462
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 166: Request Solutions to ProblemsRequesting solutions to problems
    in your prompts is an important technique in prompt engineering that helps you
    explore potential answers and strategies for addressing various issues. Solutions
    provide practical and actionable information that can guide decision-making and
    problem-solving. This chapter will explore the importance of requesting solutions
    to problems and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Solutions to Problems'
  id: totrans-3463
  prefs: []
  type: TYPE_NORMAL
  zh: 第166章：请求解决问题的方案在提示中请求解决问题的方案是提示工程中的重要技巧，有助于你探索解决各种问题的潜在答案和策略。解决方案提供实用且可操作的信息，可以指导决策和问题解决。本章将探讨请求解决问题的必要性以及如何有效地将此技巧融入你的提示中。
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-3464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用且可操作的信息，可以直接应用于解决问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-3465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：它们通过呈现潜在答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-3466
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：解决方案通过提供克服挑战的具体方法来促进问题解决。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-3467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：请求解决方案鼓励创造性思维和创新，通过探索各种策略和想法。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-3468
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的方案为了有效地在提示中请求解决问题的方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-3470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持具体：指定你感兴趣的任何特定方面或细节，例如约束条件、资源或期望结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-3471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-3472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-3473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决该问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-3474
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决问题的方案示例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-3475
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”解决方案提示：“你能提供缓解气候变化对沿海城市影响的解决方案吗？包括短期和长期策略？”
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-3476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“可再生能源有哪些好处？”解决方案提示：“你能提供在发展中国家增加可再生能源采用率的方案吗？”
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-3477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”解决方案提示：“你能提供解决远程工作挑战的方案吗？包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-3478
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-3479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对解决方案进行模糊或泛泛的请求。具体说明问题和你需要的解决方案类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-3480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解决方案不完整或不准确。提供足够的背景信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-3481
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略可行性：虽然创新方案很有价值，但考虑平衡创新与可行性，以确保其实用相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3482
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示工程中，请求问题的解决方案是一项重要的实践，它增强了实用性、决策、问题解决和创新。通过识别问题、具体说明、使用直接语言、提供背景信息和请求多个解决方案，你可以确保ChatGPT提供准确且符合你需求的解决方案。避免诸如模糊请求、缺乏背景信息和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3483
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 167: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-3484
  prefs: []
  type: TYPE_NORMAL
  zh: 第167章：请求应用实例在本章中，我们将探讨请求应用实例的重要性以及如何有效地将这一技术融入你的提示中。请求应用实例的重要性
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-3485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：应用实例通过提供具体的使用实例，有助于阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-3486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示如何在现实世界场景中应用，使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-3487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：应用实例使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-3488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-3489
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用实例为了在提示中有效地请求应用实例，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-3490
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要应用实例的概念、理论或过程，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-3491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：具体说明你感兴趣的实例类型，如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-3492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求应用实例，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-3493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建实例的相关背景或信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-3494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细实例：请求详细实例以了解概念的实施方式和其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-3495
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用实例的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-3496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”应用提示：“你能提供太阳能和风能等可再生能源在不同行业中应用的例子吗？”
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-3497
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”应用提示：“你能提供区块链技术在各个领域（如金融、供应链和医疗保健）应用的例子吗？”
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-3498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”应用提示：“你能提供人工智能在不同领域（如医疗保健、金融和交通）中的实际应用示例吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3499
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对应用示例进行模糊或一般性的请求。确保具体化以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-3501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用假设情景的重要性
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-3502
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 示例过多：虽然示例很有用，但一次性请求过多可能会让人感到不知所措。专注于可管理的示例数量以保持清晰。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3503
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用示例是提示工程中一种实用且有效的方法，它增强了清晰度、相关性、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰和相关的应用示例。避免陷入模糊请求、缺乏背景信息和示例过多等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3504
  prefs: []
  type: TYPE_NORMAL
  zh: '*'
- en: 'Chapter 168: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-3505
  prefs: []
  type: TYPE_NORMAL
  zh: 第168章：使用假设情景在提示中使用假设情景是提示工程中一种强大的技术，它允许你探索不同的可能性、情景和结果。假设情景刺激创造性思维，并可以提供关于某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-3506
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而对潜在的未来有更深入的了解。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-3507
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：它们通过挑战AI考虑不同的观点和解决方案来鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-3508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决问题：假设情景可以通过模拟不同情况来帮助识别潜在问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-3509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：使用假设情景可以使互动更加吸引人和动态，促进对主题的深入探讨。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-3510
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景为了有效地在你的提示中使用假设情景，考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-3511
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景作为“如果...将会怎样”的问题来探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-3512
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-3513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：指定适用于假设情景的任何参数或约束，以指导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-3514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求结果：根据假设情景请求具体的成果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-3515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造力：邀请AI进行创造性思考，并考虑非常规解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-3516
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设情景的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-3517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 假设情景提示：“如果一个国家过渡到100%的可再生能源，这将产生什么样的经济、环境和社交影响？”
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-3518
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释气候变化的原因。” 假设情景提示：“如果所有国家同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？”
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-3519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？” 假设情景提示：“如果一个实行威权主义的国家过渡到民主政府，这个过渡过程中可能会出现哪些挑战和机遇？”
- en: Common Pitfalls to Avoid
  id: totrans-3520
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-3521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度复杂的情景：避免创建过于复杂或复杂的假设情景。保持情景清晰和专注。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-3522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数定义清晰，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-3523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略可行性：虽然假设情景鼓励创造性思维，但考虑在创造力和可行性之间取得平衡，以确保实际的相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-3524
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用假设情景是一种强大的提示工程技术，可以增强探索、创造性思维、问题解决和参与度。通过提出“如果”问题，保持清晰和具体，定义参数，要求结果，并鼓励创造力，你可以构建有效地利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3525
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 169: Ask for Alternative SolutionsAsking for alternative solutions
    in your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-3526
  prefs: []
  type: TYPE_NORMAL
  zh: 第169章：请求替代方案在提示中请求替代方案是提示工程中的一个有价值的技术，有助于你探索解决各种问题的不同方法和策略。替代方案提供更广阔的视角，并鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代方案的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-3527
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造力：替代方案通过探索不同的方法和策略来鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-3528
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 综合问题解决：它们提供更广阔的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-3529
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案通过展示各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-3530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：通过突出解决问题的不同方法，替代方案提供了灵活性，允许采用适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-3531
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代方案为了在提示中有效地请求替代方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：明确陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-3533
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如约束条件、资源或期望结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-3534
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求替代方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-3535
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定问题和潜在解决方案的相关上下文或背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-3536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：要求提供多个解决方案，以探索解决该问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-3537
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代方案的示例
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-3538
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 替代解决方案提示： "你能提供一些缓解气候变化对沿海城市影响的替代方案吗？包括短期和长期策略？"
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-3539
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "可再生能源的好处是什么？" 替代解决方案提示： "你能提供一些在发展中国家推广可再生能源的替代方案吗？"
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-3540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释远程工作的挑战。" 替代解决方案提示： "你能提供一些解决远程工作挑战的替代方案吗？包括沟通、生产力和工作与生活平衡？"
- en: Common Pitfalls to Avoid
  id: totrans-3541
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-3542
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代方案进行模糊或泛泛的请求。具体说明问题和你需要的解决方案类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-3543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-3544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新方案很有价值，但考虑平衡创新与可行性，以确保其实用相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-3545
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代方案是提示工程中的一种宝贵实践，它增强了创造力、全面的问题解决、明智的决策和灵活性。通过确定问题、具体说明、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代方案，以满足你的需求。避免诸如模糊请求、缺乏上下文和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3546
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 170: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-3547
  prefs: []
  type: TYPE_NORMAL
  zh: 第170章：寻求概念澄清在提示工程中寻求概念的澄清是一项重要的技术，有助于确保你完全理解复杂的思想、术语或过程。澄清提供了详细的解释，有助于提高理解力并消除歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将这项技术融入你的提示中。
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-3548
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供了详细的解释，有助于加深对复杂想法、术语或过程的了解。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-3549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，从而降低误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-3550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中定位概念，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-3551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强应用信息的准确性和有效性时的信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-3552
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念的澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3553
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你需要澄清的概念或术语，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-3554
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如其应用或背景。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-3555
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-3556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-3557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定澄清的相关上下文或背景信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-3558
  prefs: []
  type: TYPE_NORMAL
  zh: 概念澄清的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-3559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清叶绿素在光合作用的光反应中的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-3560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-3561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中的叠加概念并提供其应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3562
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或笼统的澄清请求。确保具体说明你需要什么，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-3564
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致不完整或不准确的澄清。提供足够的背景信息来界定概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-3565
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3566
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的重要性寻求对概念的解释是提示工程中的一个重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、明确具体、使用直接语言、请求示例和提供背景信息，你可以确保ChatGPT提供针对你需求的详细和准确的澄清。避免诸如请求模糊、缺乏背景信息和问题过多等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3567
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 171: Request Detailed ExplanationsRequesting detailed explanations
    in your prompts is a key technique in prompt engineering that helps you gain a
    deeper understanding of concepts, processes, and phenomena. Detailed explanations
    provide comprehensive insights that enhance learning and comprehension. This chapter
    will explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-3568
  prefs: []
  type: TYPE_NORMAL
  zh: 第171章：请求详细解释在提示中请求详细解释是提示工程中的一个关键技巧，有助于你更深入地理解概念、过程和现象。详细的解释提供了全面的洞察，增强了学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-3569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细的解释提供了对事物如何工作的深入了解，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-3570
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-3571
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：详细的解释提供了背景信息，帮助你理解不同概念之间的更广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-3572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-3573
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了在提示中有效地请求详细解释，请考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-3574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：清楚地说明你需要解释的内容，包括任何你感兴趣的特定方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-3575
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言请求详细解释，确保AI理解你的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-3576
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于解释框架的相关背景信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-3577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序的逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-3578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明解释并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-3579
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-3580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用是如何工作的。”详细解释提示：“你能解释光合作用是如何工作的，包括叶绿素的作用和过程的不同阶段吗？”
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-3581
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”详细解释提示：“你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链中的吗？”
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-3582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”详细解释提示：“你能解释量子计算的原则，包括叠加和纠缠的概念吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3583
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-3584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较的重要性
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-3585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解释不完整或不准确。提供足够的背景信息以构建解释框架。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-3586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3587
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求详细解释是提示工程中的关键实践，它增强了深度、清晰度、上下文和参与度。通过具体化、使用直接语言、提供上下文、请求逐步解释和请求示例，你可以确保ChatGPT提供详细且全面符合你需求的解释。避免诸如模糊请求、缺乏上下文和过于宽泛问题等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3588
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 172: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-3589
  prefs: []
  type: TYPE_NORMAL
  zh: 第172章：使用比较在提示中使用比较是提示工程中的一个宝贵技巧，有助于阐明概念、对象或场景之间的差异和相似之处。比较提供了更清晰的洞察，并增强了复杂主题的理解。本章将探讨使用比较的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-3590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：比较有助于通过将其与更熟悉的概念相关联或突出差异来阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-3591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过识别相似之处和差异，它们提供了更深入的洞察，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-3592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过并排展示多个选项或观点，比较有助于进行信息丰富的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-3593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过提供更广泛的背景和多个观点来增强整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-3594
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较：为了有效地在你的提示中使用比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-3595
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要比较的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-3596
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：具体说明比较的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-3597
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似之处”、“不同之处”）来清楚地界定你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-3598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建比较的相关上下文或背景信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-3599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求详细比较：请求详细的比较，以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-3600
  prefs: []
  type: TYPE_NORMAL
  zh: 使用比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-3601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”比较提示：“你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-3602
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述光合作用的过程。比较提示：你能比较植物中光合作用的过程与动物中细胞呼吸的过程吗？
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-3603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”比较提示：“你能比较人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3604
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-3605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的比较：避免提出过于宽泛或一般性的比较请求。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-3606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要的背景可能导致比较不完整或不准确。提供足够的背景信息来构建比较。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-3607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖比较的意图。确保用词精确，以确保AI理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3608
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用比较是提示工程中的一种有价值的技术，它增强了清晰度、洞察力、决策力和理解力。通过识别概念、具体化、使用比较语言、提供背景信息和请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度宽泛的比较、缺乏背景信息和语言不清晰等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3609
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 173: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-3610
  prefs: []
  type: TYPE_NORMAL
  zh: 第173章：请求见解在提示中请求见解是提示工程中的一种有价值的技术，它有助于揭示对各种主题的更深入的理解、解释和观点。见解提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求见解的重要性以及如何有效地将这一技术融入你的提示中。请求见解的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-3611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：见解提供了对主题的更深入理解，揭示了潜在的原则、模式或含义。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-3612
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-3613
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：见解通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-3614
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求见解鼓励对主题进行更互动和有趣的探索，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-3615
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求见解为了有效地在提示中请求见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3616
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你想要见解的主题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-3617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、含义或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-3618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言来请求见解，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-3619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建见解的相关背景或信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-3620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点，以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-3621
  prefs: []
  type: TYPE_NORMAL
  zh: 请求见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-3622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。洞察提示：你能提供关于采用可再生能源如何影响未来十年全球能源市场的见解吗？
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-3623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。洞察提示：你能提供关于气候变化对生物多样性和生态系统长期影响的见解吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-3624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”洞察提示：“你能提供关于民主政府的原则如何影响社会和经济发展的见解吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3625
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-3626
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的请求见解。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-3627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致见解不完整或不准确。提供足够的背景信息来构建见解。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-3628
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和背景。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3629
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求见解是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与度。通过确定主题、具体化、使用直接语言、提供背景信息和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的见解。避免如模糊请求、缺乏背景信息和忽略解释等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3630
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 174: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-3631
  prefs: []
  type: TYPE_NORMAL
  zh: 第174章：请求对比在提示中请求对比是提示工程中的一种强大技术，有助于突出概念、对象或场景之间的差异和区别。对比提供清晰的见解，并通过强调区分事物的因素来增强理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。请求对比的重要性
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-3632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：对比有助于阐明差异和区别，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-3633
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：通过突出不同元素的区别，提供更深入的洞察，增强理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-3634
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比有助于通过清晰地展示不同选项的优缺点来促进明智的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-3635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供比较的视角，展示不同元素之间的关系，从而增强整体理解。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-3636
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比：为了有效地在提示中请求对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-3637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别元素：清楚地说明你想要对比的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-3638
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定对比的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-3639
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区别”）来清楚地阐述您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-3640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建对比的相关背景或信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-3641
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细对比：请求详细对比以探索不同方面及其相应的含义。
- en: Examples of Asking for Contrasts
  id: totrans-3642
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-3643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”对比提示：“你能从成本、效率和环境影响的角度对比太阳能和风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-3644
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”对比提示：“你能对比植物光合作用和动物细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-3645
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”对比提示：“你能对比人类活动和自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3646
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-3647
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度宽泛的对比：避免提出过于宽泛或一般的对比要求。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-3648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要背景可能导致对比不完整或不准确。提供足够的背景信息以构建对比。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-3649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不清晰：使用模糊或不清晰的语言可能会掩盖对比的意图。确保用词精确，以确保AI理解您的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3650
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在您的提示中请求对比是提示工程中的一个强大技术，它增强了清晰度、洞察力、决策和理解。通过识别元素、具体化、使用比较语言、提供背景信息和请求详细对比，您可以确保ChatGPT提供符合您需求的清晰和相关的对比。避免过度宽泛的对比、缺乏背景和语言不清晰等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3651
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 175: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-3652
  prefs: []
  type: TYPE_NORMAL
  zh: 第175章：请求影响在您的提示中请求影响是提示工程中的一个有价值的技术，它帮助您探索行动、决策或事件的可能后果和影响。理解影响提供更深入的见解并支持明智的决策。本章将探讨请求影响的重要性以及如何有效地将此技术融入您的提示中。请求影响的重要性
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-3653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：影响提供了对行动、决策或事件的可能后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-3654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过突出特定行动或事件的更广泛影响和重要性，它们增强了理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-3655
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过呈现可能的成果和风险，影响理解有助于决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-3656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：影响通过展示不同因素和事件如何相互关联并相互影响来提供上下文。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-3657
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求影响为了在提示中有效地请求影响，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-3658
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定行动或事件：清楚地说明你想要探索的行动、决策或事件，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-3659
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：说明你感兴趣的任何特定方面或细节，例如短期或长期影响。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-3660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求影响，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-3661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定影响的相关的上下文或背景信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-3662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求详细分析：要求对影响进行详细分析，以探索不同方面及其相应的影响。
- en: Examples of Requesting Implications
  id: totrans-3663
  prefs: []
  type: TYPE_NORMAL
  zh: 请求影响的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-3664
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 影响提示："你能解释可再生能源广泛采用对全球能源市场的长期影响吗？"
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-3665
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述气候变化的影响。" 影响提示："你能提供关于气候变化对全球农业和粮食安全的潜在影响的见解吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-3666
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："民主政府的核心特征是什么？" 影响提示："你能讨论从威权体制过渡到民主政府对社会稳定和经济发展的潜在影响吗？"
- en: Common Pitfalls to Avoid
  id: totrans-3667
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对影响进行模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-3669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致对影响的分析不完整或不准确。提供足够的背景信息来界定影响。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-3670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多个视角：专注于单一视角可能会限制分析。请求多个视角以探索不同的影响和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3671
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求影响是提示工程中的一项宝贵实践，它增强了深度、理解、决策和上下文。通过确定行动或事件，具体说明，使用直接语言，提供上下文，并要求详细分析，你可以确保ChatGPT为你提供准确和相关的见解，以满足你的需求。避免诸如模糊请求、缺乏上下文和忽视多个视角等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3672
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 176: Request Alternative ViewsRequesting alternative views in your
    prompts is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-3673
  prefs: []
  type: TYPE_NORMAL
  zh: 第176章：请求不同观点
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-3674
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡视角：不同的观点通过展示问题或主题的不同方面来提供平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-3675
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索不同观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-3676
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同的观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-3677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑不同的观点通过提供多个选项和考虑因素来支持情报决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-3678
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同观点
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-3679
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要不同观点的主题或问题，确保AI理解你的查询重点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-3680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：指定你感兴趣的任何特定方面或细节，例如不同的视角或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-3681
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求不同观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-3682
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建替代观点的相关背景或信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-3683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个视角以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-3684
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-3685
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”不同观点提示：“你能提供关于可再生能源好处的不同观点，包括正面和批判性观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-3686
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”不同观点提示：“你能提供关于气候变化影响的不同的观点，包括来自环保主义者和怀疑论者的观点吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-3687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”不同观点提示：“你能讨论关于民主政府核心特征的替代观点，包括支持和批评者吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3688
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对替代观点进行模糊或一般性的请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-3690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致不完整或不准确的替代观点。提供足够的背景信息以构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-3691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点和含义。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3692
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-3693
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 177: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-3694
  prefs: []
  type: TYPE_NORMAL
  zh: 第177章：指定评估标准
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-3695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚焦：标准有助于缩小AI的响应范围，使其聚焦于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-3696
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，您确保响应保持清晰并与您的具体需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-3697
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于您的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-3698
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准增强了响应的精确性，使其更加准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-3699
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-3700
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明您想要解决的问题或议题，确保AI理解您查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-3701
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：明确响应的标准或指南，例如范围、长度、格式或需要关注的特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-3702
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来指定标准，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-3703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定标准的相关背景或信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-3704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求遵守：要求响应符合指定的标准，以确保与您的需求保持一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-3705
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-3706
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 标准指定提示："你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字？"
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-3707
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述气候变化的影响。" 标准指定提示："你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-3708
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”标准指定提示：“你能列出民主政府的核心特征，重点关注政治和社会方面吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3709
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-3710
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊的标准：避免使用模糊或含糊不清的标准。具体说明指南以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-3711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度限制的标准：设置过于严格的标准可能会限制回答的深度和质量。确保你的标准是合理的，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-3712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致回答不完整或不准确。提供足够的背景信息以构建标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3713
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-3714
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 178: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-3715
  prefs: []
  type: TYPE_NORMAL
  zh: 第178章：请求简化
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-3716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-3717
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息对更广泛的受众更加可访问，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-3718
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：简化使信息更具吸引力和相关性，从而增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-3719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释在现实世界中的应用更加实用且易于操作。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-3720
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-3721
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要简化的复杂概念或过程，确保AI理解你查询的焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-3722
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-3723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指明简化的目标受众，例如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-3724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子以帮助说明简化的概念并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-3725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建简化的相关背景或信息。
- en: Examples of Requesting Simplifications
  id: totrans-3726
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的例子
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-3727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释光合作用的过程。简化提示：你能为10岁的学生简化光合作用的过程，包括一个类比来解释它吗？
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-3728
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述区块链技术。简化提示：你能用简单语言和例子，为没有技术背景的人简化区块链技术吗？
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-3729
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“量子计算是什么？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本的类比来解释它是如何工作的？”
- en: Common Pitfalls to Avoid
  id: totrans-3730
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的简化请求。确保具体，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-3732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化是有用的，但避免过度简化到重要细节丢失的程度。在简单性和准确性之间保持平衡。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-3733
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致简化不完整或不准确。提供足够的背景信息来构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3734
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过确定概念、使用直接语言、指定受众、请求类比和提供上下文，您可以确保ChatGPT提供针对您需求的清晰和相关的简化。避免模糊请求、过度简化和忽略上下文等陷阱将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3735
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 179: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-3736
  prefs: []
  type: TYPE_NORMAL
  zh: 第179章：请求现实世界应用在您的提示中请求现实世界应用是提示工程中的重要技巧，有助于您了解概念、理论或过程如何实际应用。现实世界应用提供了有形的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技巧融入您的提示中。请求现实世界应用的重要性
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-3737
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界应用通过展示它们在实际情况中的应用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-3738
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：它们通过提供如何在现实世界环境中实施的具体例子，帮助阐明复杂的概念。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-3739
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：现实世界应用使信息更具吸引力，并加深与主题的关联。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-3740
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界的应用增强了信息的实用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-3741
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了有效地在提示中请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-3742
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述您想在现实世界应用中探索的概念、理论或过程，确保AI理解您查询的焦点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-3743
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确具体：明确指出你感兴趣的实世界应用类型，例如行业特定示例或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-3744
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求实世界应用，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-3745
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建实世界应用的相关上下文或背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-3746
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细示例：请求详细实世界应用的例子，以了解概念的实施方式和其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-3747
  prefs: []
  type: TYPE_NORMAL
  zh: 请求实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-3748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”实世界应用提示：“你能提供关于可再生能源，如太阳能和风能，在不同行业中如何被使用的实世界例子吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-3749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”实世界应用提示：“你能提供城市为应对气候变化实施的实际项目和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-3750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”实世界应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3751
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对实世界应用进行模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-3753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致例子不完整或不准确。提供足够的背景信息以构建实世界应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-3754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般例子可能无法提供你所需要的深度。请求详细例子以了解实际实施和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3755
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求实世界应用是提示工程中的一项重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、明确具体、使用直接语言、提供上下文以及请求详细示例，你可以确保ChatGPT提供符合你需求的清晰且相关的实世界应用。避免模糊请求、缺乏上下文和忽略具体性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3756
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 180: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-3757
  prefs: []
  type: TYPE_NORMAL
  zh: 第180章：请求统计分析在提示中请求统计分析是提示工程中的一个宝贵技巧，有助于你获得定量洞察和证据来支持你的查询。统计分析提供了事实基础，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。请求统计分析的重要性
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-3758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-3759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可信度：定量洞察和证据增加了响应的可信度，使其更加可靠。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-3760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-3761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-3762
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析为了在提示中有效地请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-3763
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解查询的重点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-3764
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-3765
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求统计分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-3766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建统计分析的相关背景或信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-3767
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考，以确保其可信度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-3768
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-3769
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”统计分析提示：“你能提供过去十年中太阳能和风能等可再生能源采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-3770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”统计分析提示：“你能提供过去50年中全球温度上升和极端天气事件发生频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-3771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于区块链技术在不同行业增长、包括基于区块链的公司和项目的数量的统计分析吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3772
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-3773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对统计分析提出模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-3774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的背景信息以构建统计分析。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-3775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略来源：没有可信来源的统计分析可能不可靠。始终要求提供来源或参考，以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-3776
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一项宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景和请求来源，你可以确保ChatGPT提供准确且可靠的统计分析，以满足你的需求。避免诸如模糊请求、缺乏背景和忽略来源等错误，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3777
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 181: Ask for Historical ComparisonsAsking for historical comparisons
    in your prompts is an important technique in prompt engineering that helps you
    understand how current events, concepts, or phenomena relate to or differ from
    historical ones. Historical comparisons provide context and insights that enhance
    understanding and relevance. This chapter will explore the importance of asking
    for historical comparisons and how to effectively incorporate this technique into
    your prompts.Importance of Asking for Historical Comparisons'
  id: totrans-3778
  prefs: []
  type: TYPE_NORMAL
  zh: 第181章：请求历史比较在提示中请求历史比较是提示工程中的重要技巧，有助于你理解当前事件、概念或现象如何与或不同于历史事件。历史比较提供了上下文和洞察，增强了理解和相关性。本章将探讨请求历史比较的重要性以及如何有效地将此技巧融入你的提示中。请求历史比较的重要性
- en: 'Context: Historical comparisons provide context by showing how current events
    or concepts relate to past ones.'
  id: totrans-3779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：历史比较通过展示当前事件或概念如何与过去的事件相关联来提供上下文。
- en: 'Insight: They offer insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-3780
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：它们提供了对模式、趋势以及思想或事件随时间演变的洞察。
- en: 'Understanding: Historical comparisons enhance understanding by highlighting
    similarities and differences between past and present.'
  id: totrans-3781
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史比较通过突出过去和现在之间的相似之处和不同之处来增强理解。
- en: 'Perspective: They provide a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-3782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它们提供了一个更广泛的视角，有助于将特定主题置于更广泛的历史叙述中。
- en: 'How to Ask for Historical ComparisonsTo effectively ask for historical comparisons
    in your prompts, consider the following strategies:'
  id: totrans-3783
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史比较：为了在提示中有效地请求历史比较，考虑以下策略：
- en: 'Identify the Topic: Clearly state the current event, concept, or phenomenon
    you want to compare with historical ones, ensuring that the AI understands the
    focus of your query.'
  id: totrans-3784
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别主题：清楚地说明你想要与历史事件比较的当前事件、概念或现象，确保AI理解你的查询焦点。
- en: 'Specify the Historical Period: Define the historical period you are interested
    in, including specific years, decades, or eras.'
  id: totrans-3785
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定历史时期：定义你感兴趣的历史时期，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    comparisons, ensuring that the AI understands your request.'
  id: totrans-3786
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求历史比较，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical comparisons.'
  id: totrans-3787
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建历史比较的相关上下文或背景信息。
- en: 'Ask for Specific Aspects: Request comparisons on specific aspects, such as
    causes, effects, or outcomes, to ensure a focused analysis.'
  id: totrans-3788
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面的比较，如原因、影响或结果，以确保分析集中。
- en: Examples of Asking for Historical Comparisons
  id: totrans-3789
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史比较的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Comparison
    Prompt: "Can you compare the current adoption of renewable energy sources with
    the adoption of coal during the Industrial Revolution?"'
  id: totrans-3790
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史比较提示：“你能比较当前可再生能源的采用与工业革命期间煤炭的采用吗？”
- en: 'General Prompt: "Describe the impact of climate change." Historical Comparison
    Prompt: "Can you compare the current impact of climate change on global weather
    patterns with historical climate events, such as the Little Ice Age?"'
  id: totrans-3791
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史比较提示：“你能比较当前气候变化对全球天气模式的影响与历史上的气候事件，如小冰期吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Comparison Prompt: "Can you compare the key features of modern democratic governments
    with those of ancient Athens'' democracy?"'
  id: totrans-3792
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史比较提示：“你能比较现代民主政府的核心特征与古代雅典民主的特征吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3793
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3794
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或一般性的历史比较请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  id: totrans-3795
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致比较不完整或不准确。提供足够的背景信息来构建历史比较。
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-3796
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提供细节：虽然历史比较很有用，但提供过多的细节可能会使响应变得混乱。关注最相关的方面。
- en: ConclusionAsking for historical comparisons is an important practice in prompt
    engineering that enhances context, insight, understanding, and perspective. By
    identifying the topic, specifying the historical period, using direct language,
    providing context, and asking for specific aspects, you can ensure that ChatGPT
    provides accurate and relevant historical comparisons tailored to your needs.
    Avoiding pitfalls such as vague requests, lack of context, and overloading with
    details will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3797
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示工程中，请求历史比较是一种重要的实践，它增强了背景、洞察力、理解和视角。通过确定主题、指定历史时期、使用直接语言、提供背景和询问具体方面，你可以确保ChatGPT提供准确且相关的历史比较，以满足你的需求。避免陷入模糊请求、缺乏背景和细节过载等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3798
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 182: Seek Cross-Disciplinary InsightsSeeking cross-disciplinary insights
    in your prompts is a valuable technique in prompt engineering that helps you explore
    how different fields or disciplines intersect and influence each other. Cross-disciplinary
    insights provide a broader perspective and enhance understanding by integrating
    knowledge from various domains. This chapter will explore the importance of seeking
    cross-disciplinary insights and how to effectively incorporate this technique
    into your prompts.Importance of Seeking Cross-Disciplinary Insights'
  id: totrans-3799
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的重要性
- en: 'Perspective: Cross-disciplinary insights provide a broader perspective by integrating
    knowledge from different fields or disciplines.'
  id: totrans-3800
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：跨学科见解通过整合来自不同领域或学科的知识，提供了一个更广阔的视角。
- en: 'Innovation: They foster innovation by combining ideas and approaches from various
    domains, leading to new solutions and concepts.'
  id: totrans-3801
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：它们通过结合来自各个领域的想法和方法来促进创新，从而产生新的解决方案和概念。
- en: 'Understanding: Cross-disciplinary insights enhance understanding by showing
    how different fields intersect and influence each other.'
  id: totrans-3802
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：跨学科见解通过展示不同领域的交叉和相互影响，增强了理解。
- en: 'Problem-Solving: They support problem-solving by offering diverse viewpoints
    and approaches to complex issues.'
  id: totrans-3803
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：它们通过提供对复杂问题的不同观点和方法来支持问题解决。
- en: 'How to Seek Cross-Disciplinary InsightsTo effectively seek cross-disciplinary
    insights in your prompts, consider the following strategies:'
  id: totrans-3804
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求跨学科见解：为了在提示中有效地寻求跨学科见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want to explore,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3805
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要探索的主题或问题，确保AI能理解你的查询焦点。
- en: 'Specify the Disciplines: Indicate the different fields or disciplines you are
    interested in, such as science, technology, humanities, or social sciences.'
  id: totrans-3806
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定学科：指出你感兴趣的各个领域或学科，例如科学、技术、人文或社会科学。
- en: 'Use Direct Language: Use straightforward and direct language to request cross-disciplinary
    insights, ensuring that the AI understands your request.'
  id: totrans-3807
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来请求跨学科见解，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cross-disciplinary insights.'
  id: totrans-3808
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建跨学科见解的相关背景或信息。
- en: 'Ask for Integration: Request an integration of knowledge from different fields
    to explore how they intersect and influence the topic.'
  id: totrans-3809
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第182章：寻求跨学科见解在提示中寻求跨学科见解是提示工程中的一个宝贵技巧，帮助你探索不同领域或学科如何交叉和相互影响。跨学科见解通过整合来自各个领域的知识，提供了一个更广阔的视角并增强了理解。本章将探讨寻求跨学科见解的重要性以及如何有效地将此技巧融入你的提示中。
- en: Examples of Seeking Cross-Disciplinary Insights
  id: totrans-3810
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求跨学科见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the benefits of renewable
    energy, including perspectives from environmental science, economics, and social
    policy?"'
  id: totrans-3811
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。” 跨学科提示：“你能提供关于可再生能源好处的跨学科见解，包括环境科学、经济学和社会政策的观点吗？”
- en: 'General Prompt: "Describe the impact of climate change." Cross-Disciplinary
    Prompt: "Can you provide cross-disciplinary insights on the impact of climate
    change, including perspectives from climatology, agriculture, and public health?"'
  id: totrans-3812
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。” 跨学科提示：“你能提供关于气候变化影响的跨学科见解，包括气候学、农业和公共卫生的视角吗？”
- en: 'General Prompt: "What is artificial intelligence?" Cross-Disciplinary Prompt:
    "Can you provide cross-disciplinary insights on artificial intelligence, including
    perspectives from computer science, ethics, and sociology?"'
  id: totrans-3813
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？” 跨学科提示：“你能提供关于人工智能的跨学科见解，包括计算机科学、伦理和社会学的视角吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3814
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cross-disciplinary insights.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3815
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免模糊或泛泛的跨学科见解请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the cross-disciplinary
    insights.'
  id: totrans-3816
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致见解不完整或不准确。提供足够的背景信息来构建跨学科见解。
- en: 'Ignoring Integration: Focusing solely on individual fields can limit the analysis.
    Request integration of knowledge to explore how different fields intersect and
    influence the topic.'
  id: totrans-3817
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视整合：仅关注单个领域可能会限制分析。请求整合知识，以探索不同领域如何交叉和影响主题。
- en: ConclusionSeeking cross-disciplinary insights is a valuable practice in prompt
    engineering that enhances perspective, innovation, understanding, and problem-solving.
    By identifying the topic, specifying the disciplines, using direct language, providing
    context, and asking for integration, you can ensure that ChatGPT provides accurate
    and relevant cross-disciplinary insights tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring integration will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3818
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求跨学科见解是提示工程中的宝贵实践，它增强了视角、创新、理解和问题解决能力。通过确定主题、指定学科、使用直接语言、提供背景信息和请求整合，你可以确保ChatGPT提供准确和相关的跨学科见解，以满足你的需求。避免诸如模糊请求、缺乏背景信息和忽视整合等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3819
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 183: Request Solutions to ProblemsRequesting solutions to problems
    in your prompts is an important technique in prompt engineering that helps you
    explore potential answers and strategies for addressing various issues. Solutions
    provide practical and actionable information that can guide decision-making and
    problem-solving. This chapter will explore the importance of requesting solutions
    to problems and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Solutions to Problems'
  id: totrans-3820
  prefs: []
  type: TYPE_NORMAL
  zh: 第183章：请求解决问题的方案在提示中请求解决问题的方案是提示工程中的重要技巧，这有助于你探索可能的答案和解决各种问题的策略。解决方案提供实用和可操作的信息，可以指导决策和问题解决。本章将探讨请求解决问题的意义以及如何有效地将这一技巧融入你的提示中。请求解决问题的意义
- en: 'Practicality: Solutions provide practical and actionable information that can
    be directly applied to address issues.'
  id: totrans-3821
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实用性：解决方案提供实用和可操作的信息，可以直接应用于解决实际问题。
- en: 'Decision-Making: They support informed decision-making by presenting potential
    answers and strategies.'
  id: totrans-3822
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：它们通过展示可能的答案和策略来支持明智的决策。
- en: 'Problem-Solving: Solutions facilitate problem-solving by offering specific
    approaches to overcome challenges.'
  id: totrans-3823
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：解决方案通过提供克服挑战的具体方法来促进问题解决。
- en: 'Innovation: Requesting solutions encourages creative thinking and innovation
    by exploring various strategies and ideas.'
  id: totrans-3824
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创新：请求解决方案通过探索各种策略和想法，鼓励创造性思维和创新。
- en: 'How to Request Solutions to ProblemsTo effectively request solutions to problems
    in your prompts, consider the following strategies:'
  id: totrans-3825
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求解决问题的方案为了有效地在提示中请求解决问题的方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3826
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定问题：明确陈述你想要解决的问题或问题，确保AI能够理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-3827
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体说明：指定你感兴趣的任何特定方面或细节，例如约束、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request solutions,
    ensuring that the AI understands your request.'
  id: totrans-3828
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求解决方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-3829
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定问题和潜在解决方案的相关上下文或背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-3830
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决问题的不同方法和策略。
- en: Examples of Requesting Solutions to Problems
  id: totrans-3831
  prefs: []
  type: TYPE_NORMAL
  zh: 请求解决方案的实例
- en: 'General Prompt: "Describe the impact of climate change." Solution Prompt: "Can
    you provide solutions to mitigate the impact of climate change on coastal cities,
    including both short-term and long-term strategies?"'
  id: totrans-3832
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 解决方案提示： "你能提供缓解气候变化对沿海城市影响的解决方案，包括短期和长期策略吗？"
- en: 'General Prompt: "What are the benefits of renewable energy?" Solution Prompt:
    "Can you provide solutions for increasing the adoption of renewable energy sources
    in developing countries?"'
  id: totrans-3833
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "可再生能源的好处是什么？" 解决方案提示： "你能提供一些在发展中国家推广可再生能源解决方案的方法吗？"
- en: 'General Prompt: "Explain the challenges of remote work." Solution Prompt: "Can
    you provide solutions to address the challenges of remote work, including communication,
    productivity, and work-life balance?"'
  id: totrans-3834
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释远程工作的挑战。" 解决方案提示： "你能提供解决远程工作挑战的解决方案，包括沟通、生产力和工作与生活平衡吗？"
- en: Common Pitfalls to Avoid
  id: totrans-3835
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for solutions. Be specific
    about the problem and the type of solutions you need to ensure clarity and relevance.'
  id: totrans-3836
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免含糊或笼统的解决方案请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-3837
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的背景信息，以界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-3838
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创新解决方案很有价值，但考虑平衡创新与可行性，以确保实际的相关性。
- en: ConclusionRequesting solutions to problems is an important practice in prompt
    engineering that enhances practicality, decision-making, problem-solving, and
    innovation. By identifying the problem, being specific, using direct language,
    providing context, and asking for multiple solutions, you can ensure that ChatGPT
    provides accurate and relevant solutions tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring feasibility will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3839
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求解决方案是提示工程中的一种重要实践，它增强了实用性、决策、问题解决和创新。通过确定问题、具体化、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确和相关的解决方案，满足你的需求。避免诸如含糊请求、缺乏上下文和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3840
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 184: Request Examples of ApplicationsAsking for examples of applications
    in your prompts is a practical technique in prompt engineering that helps illustrate
    how concepts, theories, or processes are used in real-world scenarios. Examples
    of applications provide concrete instances that enhance understanding and relevance.
    This chapter will explore the importance of asking for examples of applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Asking for Examples of Applications'
  id: totrans-3841
  prefs: []
  type: TYPE_NORMAL
  zh: 第184章：请求应用实例在提示中请求应用实例是提示工程中的一种实用技术，有助于说明概念、理论或过程在现实世界场景中的应用。应用实例提供具体实例，增强理解和相关性。本章将探讨请求应用实例的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Clarity: Examples of applications help clarify abstract or complex concepts
    by providing concrete instances of their use.'
  id: totrans-3842
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：应用实例通过提供具体的使用实例来阐明抽象或复杂的概念。
- en: 'Relevance: They make information more relevant by showing how it is applied
    in real-world scenarios.'
  id: totrans-3843
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：它们通过展示信息在现实世界场景中的应用，使信息更具相关性。
- en: 'Engagement: Examples of applications make the information more engaging and
    relatable, enhancing overall comprehension.'
  id: totrans-3844
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：应用实例使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-3845
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：了解现实世界的应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Ask for Examples of ApplicationsTo effectively ask for examples of applications
    in your prompts, consider the following strategies:'
  id: totrans-3846
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求应用例子为了在提示中有效地请求应用例子，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    examples of applications for, ensuring that the AI understands the focus of your
    query.'
  id: totrans-3847
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地说明你想要应用例子概念、理论或过程，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify the type of applications you are interested in, such as
    industry-specific examples or everyday uses.'
  id: totrans-3848
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确你感兴趣的应 用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request examples
    of applications, ensuring that the AI understands your request.'
  id: totrans-3849
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求应用例子，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the examples.'
  id: totrans-3850
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建例子的相关背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples to understand how the
    concept is implemented and its impact.'
  id: totrans-3851
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求详细例子以了解概念是如何实施的及其影响。
- en: Examples of Asking for Examples of Applications
  id: totrans-3852
  prefs: []
  type: TYPE_NORMAL
  zh: 请求应用例子的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Application Prompt:
    "Can you provide examples of how renewable energy sources, such as solar and wind
    power, are being used in different industries?"'
  id: totrans-3853
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。应用提示：你能提供一些例子，说明可再生能源，如太阳能和风能，在不同行业中的应用吗？
- en: 'General Prompt: "Describe blockchain technology." Application Prompt: "Can
    you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-3854
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述区块链技术。应用提示：你能提供一些例子，说明区块链技术在各个领域的应用，如金融、供应链和医疗保健吗？
- en: 'General Prompt: "What is artificial intelligence?" Application Prompt: "Can
    you provide examples of real-world applications of artificial intelligence in
    different fields, such as healthcare, finance, and transportation?"'
  id: totrans-3855
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：什么是人工智能？应用提示：你能提供一些人工智能在不同领域（如医疗保健、金融和交通）中的实际应用例子吗？
- en: Common Pitfalls to Avoid
  id: totrans-3856
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for examples of applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-3857
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对应用例子进行模糊或一般性的请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the applications.'
  id: totrans-3858
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致例子不完整或不准确。提供足够的背景信息以构建应用。
- en: 'Overloading with Examples: While examples are useful, asking for too many at
    once can be overwhelming. Focus on a manageable number of examples to maintain
    clarity.'
  id: totrans-3859
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度举例：虽然例子很有用，但一次性要求太多可能会让人感到不知所措。专注于可管理的例子数量，以保持清晰度。
- en: ConclusionAsking for examples of applications is a practical and effective practice
    in prompt engineering that enhances clarity, relevance, engagement, and usability.
    By identifying the concept, being specific, using direct language, providing context,
    and asking for detailed examples, you can ensure that ChatGPT provides clear and
    relevant examples of applications tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with examples will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3860
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求应用例子是提示工程中的一种实用且有效的方法，它增强了清晰度、相关性、参与度和可用性。通过确定概念、具体化、使用直接语言、提供背景信息和请求详细例子，你可以确保ChatGPT提供符合你需求的清晰且相关的应用例子。避免如模糊请求、缺乏背景信息和过度举例等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3861
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 185: Use Hypothetical ScenariosUsing hypothetical scenarios in your
    prompts is a powerful technique in prompt engineering that allows you to explore
    different possibilities, scenarios, and outcomes. Hypothetical scenarios stimulate
    creative thinking and can provide insights into how certain actions or events
    might impact a situation. This chapter will explore the importance of using hypothetical
    scenarios and how to effectively incorporate this technique into your prompts.Importance
    of Using Hypothetical Scenarios'
  id: totrans-3862
  prefs: []
  type: TYPE_NORMAL
  zh: 第185章：使用假设情景在提示中使用假设情景是提示工程中的一种强大技术，它允许你探索不同的可能性、情景和结果。假设情景刺激创造性思维，并可以提供关于某些行动或事件可能如何影响情况的见解。本章将探讨使用假设情景的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Exploration: Hypothetical scenarios allow you to explore various possibilities
    and outcomes, gaining insights into potential futures.'
  id: totrans-3863
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索：假设情景允许你探索各种可能性和结果，从而深入了解潜在的未来。
- en: 'Creative Thinking: They encourage creative and critical thinking by challenging
    the AI to consider different perspectives and solutions.'
  id: totrans-3864
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造性思维：通过挑战AI考虑不同的观点和解决方案，鼓励创造性和批判性思维。
- en: 'Problem-Solving: Hypothetical scenarios can help identify potential problems
    and solutions by simulating different situations.'
  id: totrans-3865
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决：通过模拟不同情况，假设情景可以帮助识别潜在问题和解决方案。
- en: 'Engagement: Using hypothetical scenarios makes the interaction more engaging
    and dynamic, fostering a deeper exploration of the topic.'
  id: totrans-3866
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：使用假设情景使互动更加吸引人和动态，促进对主题的深入探索。
- en: 'How to Use Hypothetical ScenariosTo effectively use hypothetical scenarios
    in your prompts, consider the following strategies:'
  id: totrans-3867
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用假设情景为了有效地在提示中使用假设情景，考虑以下策略：
- en: 'Pose "What If" Questions: Frame your hypothetical scenarios as "What if" questions
    to explore different possibilities.'
  id: totrans-3868
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出假设性问题：将你的假设情景作为“如果...会怎样”的问题来探索不同的可能性。
- en: 'Be Clear and Specific: Clearly describe the hypothetical scenario, including
    relevant details and conditions.'
  id: totrans-3869
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰具体：清楚地描述假设情景，包括相关细节和条件。
- en: 'Define the Parameters: Specify any parameters or constraints that apply to
    the hypothetical situation to guide the AI''s response.'
  id: totrans-3870
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义参数：明确假设情景中适用的任何参数或约束，以指导AI的回答。
- en: 'Ask for Outcomes: Request specific outcomes or implications based on the hypothetical
    scenario.'
  id: totrans-3871
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体结果：根据假设情景请求具体的后果或影响。
- en: 'Encourage Creativity: Invite the AI to think creatively and consider unconventional
    solutions or perspectives.'
  id: totrans-3872
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励创造性：邀请AI进行创造性思考，考虑非常规的解决方案或观点。
- en: Examples of Using Hypothetical Scenarios
  id: totrans-3873
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设情景的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Hypothetical Scenario
    Prompt: "What if a country transitioned to 100% renewable energy? What would be
    the economic, environmental, and social impacts?"'
  id: totrans-3874
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 假设情景提示："如果一个国家过渡到100%的可再生能源，经济、环境和社交影响会是什么？"
- en: 'General Prompt: "Explain the causes of climate change." Hypothetical Scenario
    Prompt: "What if all countries agreed to cut their carbon emissions by 50% in
    the next decade? How would this impact global climate change?"'
  id: totrans-3875
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释气候变化的原因。" 假设情景提示："如果所有国家都同意在下一个十年内将碳排放量减少50%，这将如何影响全球气候变化？"
- en: 'General Prompt: "What are the key features of a democratic government?" Hypothetical
    Scenario Prompt: "What if a country with an authoritarian regime transitioned
    to a democratic government? What challenges and opportunities might arise during
    this transition?"'
  id: totrans-3876
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："民主政府的核心特征是什么？" 假设情景提示："如果一个实行威权统治的国家过渡到民主政府，这个过程中可能会出现哪些挑战和机遇？"
- en: Common Pitfalls to Avoid
  id: totrans-3877
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Overly Complex Scenarios: Avoid creating hypothetical scenarios that are too
    complex or convoluted. Keep the scenarios clear and focused.'
  id: totrans-3878
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于复杂的情景：避免创建过于复杂或错综复杂的假设情景。保持情景清晰和集中。
- en: 'Vague Conditions: Ensure that the conditions and parameters of the hypothetical
    scenario are clearly defined to avoid confusion.'
  id: totrans-3879
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊条件：确保假设情景的条件和参数定义清晰，以避免混淆。
- en: 'Ignoring Feasibility: While hypothetical scenarios encourage creative thinking,
    consider balancing creativity with some level of feasibility to ensure practical
    relevance.'
  id: totrans-3880
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略可行性：虽然假设情景鼓励创造性思维，但考虑在创造性和可行性之间取得平衡，以确保实际的相关性。
- en: ConclusionUsing hypothetical scenarios in your prompts is a powerful technique
    in prompt engineering that enhances exploration, creative thinking, problem-solving,
    and engagement. By posing "What if" questions, being clear and specific, defining
    parameters, asking for outcomes, and encouraging creativity, you can craft prompts
    that effectively utilize hypothetical scenarios to explore different possibilities
    and outcomes. Avoiding pitfalls such as overly complex scenarios, vague conditions,
    and ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-3881
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：在提示中使用假设情景是提示工程中的一种强大技术，可以增强探索、创造性思维、问题解决和参与度。通过提出“如果”问题，明确具体，定义参数，请求结果，并鼓励创造性，你可以构建出有效地利用假设情景来探索不同可能性和结果的提示。避免过度复杂的情景、模糊的条件和忽视可行性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3882
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 186: Ask for Alternative SolutionsAsking for alternative solutions
    in your prompts is a valuable technique in prompt engineering that helps you explore
    different approaches and strategies for addressing various issues. Alternative
    solutions provide a broader perspective and encourage creative thinking, leading
    to more comprehensive problem-solving. This chapter will explore the importance
    of asking for alternative solutions and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Alternative Solutions'
  id: totrans-3883
  prefs: []
  type: TYPE_NORMAL
  zh: 第186章：请求替代方案在提示中请求替代方案是提示工程中的一个有价值的技术，可以帮助你探索解决各种问题的不同方法和策略。替代解决方案提供更广泛的视角，并鼓励创造性思维，导致更全面的问题解决。本章将探讨请求替代方案的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Creativity: Alternative solutions encourage creative thinking by exploring
    different approaches and strategies.'
  id: totrans-3884
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创造力：通过探索不同的方法和策略，替代解决方案鼓励创造性思维。
- en: 'Comprehensive Problem-Solving: They provide a broader perspective, leading
    to more comprehensive and effective solutions.'
  id: totrans-3885
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 综合问题解决：它们提供更广泛的视角，导致更全面和有效的解决方案。
- en: 'Informed Decision-Making: Considering multiple solutions supports informed
    decision-making by presenting various options and their implications.'
  id: totrans-3886
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：考虑多个解决方案通过展示各种选项及其影响，支持情报决策。
- en: 'Flexibility: Alternative solutions offer flexibility by highlighting different
    ways to address a problem, allowing for adaptable and customized approaches.'
  id: totrans-3887
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 灵活性：替代解决方案通过突出解决问题的不同方式提供灵活性，允许适应性和定制化的方法。
- en: 'How to Ask for Alternative SolutionsTo effectively ask for alternative solutions
    in your prompts, consider the following strategies:'
  id: totrans-3888
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求替代方案：为了有效地在提示中请求替代方案，考虑以下策略：
- en: 'Identify the Problem: Clearly state the problem or issue you want to address,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3889
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别问题：清楚地陈述你想要解决的问题或问题，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as constraints, resources, or desired outcomes.'
  id: totrans-3890
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如约束、资源或期望的结果。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    solutions, ensuring that the AI understands your request.'
  id: totrans-3891
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求替代方案，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the problem and potential solutions.'
  id: totrans-3892
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于界定问题和潜在解决方案的相关背景信息。
- en: 'Ask for Multiple Solutions: Request multiple solutions to explore different
    approaches and strategies for addressing the problem.'
  id: totrans-3893
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个解决方案：请求多个解决方案以探索解决问题的不同方法和策略。
- en: Examples of Asking for Alternative Solutions
  id: totrans-3894
  prefs: []
  type: TYPE_NORMAL
  zh: 请求替代方案的例子
- en: 'General Prompt: "Describe the impact of climate change." Alternative Solutions
    Prompt: "Can you provide alternative solutions to mitigate the impact of climate
    change on coastal cities, including both short-term and long-term strategies?"'
  id: totrans-3895
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 替代解决方案提示： "你能提供一些缓解气候变化对沿海城市影响的替代方案，包括短期和长期策略吗？"
- en: 'General Prompt: "What are the benefits of renewable energy?" Alternative Solutions
    Prompt: "Can you provide alternative solutions for increasing the adoption of
    renewable energy sources in developing countries?"'
  id: totrans-3896
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "可再生能源的好处是什么？" 替代解决方案提示： "你能提供一些在发展中国家推广可再生能源的替代方案吗？"
- en: 'General Prompt: "Explain the challenges of remote work." Alternative Solutions
    Prompt: "Can you provide alternative solutions to address the challenges of remote
    work, including communication, productivity, and work-life balance?"'
  id: totrans-3897
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释远程工作的挑战。”替代解决方案提示：“你能提供解决远程工作挑战的替代方案吗？包括沟通、生产力和工作与生活平衡？”
- en: Common Pitfalls to Avoid
  id: totrans-3898
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative solutions.
    Be specific about the problem and the type of solutions you need to ensure clarity
    and relevance.'
  id: totrans-3899
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的替代解决方案请求。具体说明问题和所需解决方案的类型，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    solutions. Provide enough background information to frame the problem and potential
    solutions.'
  id: totrans-3900
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致解决方案不完整或不准确。提供足够的信息来界定问题和潜在解决方案。
- en: 'Ignoring Feasibility: While creative solutions are valuable, consider balancing
    creativity with feasibility to ensure practical relevance.'
  id: totrans-3901
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视可行性：虽然创意解决方案很有价值，但考虑平衡创意与可行性，以确保其实际相关性。
- en: ConclusionAsking for alternative solutions is a valuable practice in prompt
    engineering that enhances creativity, comprehensive problem-solving, informed
    decision-making, and flexibility. By identifying the problem, being specific,
    using direct language, providing context, and asking for multiple solutions, you
    can ensure that ChatGPT provides accurate and relevant alternative solutions tailored
    to your needs. Avoiding pitfalls such as vague requests, lack of context, and
    ignoring feasibility will further improve the effectiveness of your interactions
    with ChatGPT.
  id: totrans-3902
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求替代方案是提示工程中的一种宝贵实践，它增强了创造力、全面的问题解决、明智的决策和灵活性。通过识别问题、具体化、使用直接语言、提供上下文和请求多个解决方案，你可以确保ChatGPT提供准确且相关的替代方案，以满足你的需求。避免诸如模糊请求、缺乏上下文和忽视可行性等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3903
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 187: Seek Clarification of ConceptsSeeking clarification of concepts
    in your prompts is an important technique in prompt engineering that helps ensure
    you fully understand complex ideas, terms, or processes. Clarifications provide
    detailed explanations that enhance comprehension and eliminate ambiguity. This
    chapter will explore the importance of seeking clarification of concepts and how
    to effectively incorporate this technique into your prompts.Importance of Seeking
    Clarification of Concepts'
  id: totrans-3904
  prefs: []
  type: TYPE_NORMAL
  zh: 第187章：寻求概念澄清寻求提示中的概念澄清是提示工程中的重要技巧，有助于确保你完全理解复杂的思想、术语或过程。澄清提供详细的解释，增强理解并消除歧义。本章将探讨寻求概念澄清的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Understanding: Clarifications provide detailed explanations that enhance understanding
    of complex ideas, terms, or processes.'
  id: totrans-3905
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：澄清提供详细的解释，有助于理解复杂的思想、术语或过程。
- en: 'Accuracy: Seeking clarification ensures that you have an accurate understanding
    of specific concepts, reducing the risk of misunderstandings.'
  id: totrans-3906
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：寻求澄清确保你对特定概念有准确的理解，从而降低误解的风险。
- en: 'Relevance: Clarifications help contextualize concepts within a specific field
    or topic, enhancing the relevance of the information.'
  id: totrans-3907
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：澄清有助于在特定领域或主题中将概念具体化，增强信息的相关性。
- en: 'Confidence: Understanding concepts clearly builds confidence in applying the
    information accurately and effectively.'
  id: totrans-3908
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信心：清楚地理解概念可以增强应用信息准确和有效性的信心。
- en: 'How to Seek Clarification of ConceptsTo effectively seek clarification of concepts
    in your prompts, consider the following strategies:'
  id: totrans-3909
  prefs: []
  type: TYPE_NORMAL
  zh: 如何寻求概念澄清为了有效地在提示中寻求概念澄清，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept or term you need clarified,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3910
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定概念：清楚地陈述你需要澄清的概念或术语，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as its application or context.'
  id: totrans-3911
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如其应用或上下文。
- en: 'Use Direct Language: Use straightforward and direct language to request clarification,
    ensuring that the AI understands your request.'
  id: totrans-3912
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求澄清，确保AI理解你的请求。
- en: 'Ask for Examples: Request examples to illustrate the concept and provide additional
    clarity.'
  id: totrans-3913
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例来说明概念并提供额外的澄清。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the clarification.'
  id: totrans-3914
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建澄清的相关上下文或背景信息。
- en: Examples of Seeking Clarification of Concepts
  id: totrans-3915
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求概念澄清的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Clarification Prompt:
    "Can you clarify the role of chlorophyll in the light-dependent reactions of photosynthesis?"'
  id: totrans-3916
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”澄清提示：“你能澄清在光合作用的光反应中叶绿素的作用吗？”
- en: 'General Prompt: "Describe blockchain technology." Clarification Prompt: "Can
    you clarify how blockchain technology ensures the security and integrity of transactions?"'
  id: totrans-3917
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”澄清提示：“你能澄清区块链技术如何确保交易的安全性和完整性吗？”
- en: 'General Prompt: "What is quantum computing?" Clarification Prompt: "Can you
    clarify the concept of superposition in quantum computing and provide an example
    of its application?"'
  id: totrans-3918
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”澄清提示：“你能澄清量子计算中叠加的概念并提供其应用的例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-3919
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for clarification. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-3920
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的澄清请求。确保具体化以获得清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    clarifications. Provide enough background information to frame the concept.'
  id: totrans-3921
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致不完整或不准确的澄清。提供足够的背景信息以构建概念。
- en: 'Overloading with Questions: While clarifications are important, avoid asking
    too many follow-up questions at once. Focus on one aspect at a time to maintain
    clarity.'
  id: totrans-3922
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度提问：虽然澄清很重要，但避免一次性提出太多后续问题。一次关注一个方面以保持清晰。
- en: ConclusionSeeking clarification of concepts is an important practice in prompt
    engineering that enhances understanding, accuracy, relevance, and confidence.
    By identifying the concept, being specific, using direct language, asking for
    examples, and providing context, you can ensure that ChatGPT provides detailed
    and accurate clarifications tailored to your needs. Avoiding pitfalls such as
    vague requests, lack of context, and overloading with questions will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-3923
  prefs: []
  type: TYPE_NORMAL
  zh: 结论寻求概念澄清是提示工程中的一项重要实践，它增强了理解、准确性、相关性和信心。通过识别概念、具体化、使用直接语言、请求示例和提供上下文，你可以确保ChatGPT提供详细且符合你需求的澄清。避免诸如模糊请求、缺乏上下文和过度提问等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3924
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 188: Request Detailed ExplanationsRequesting detailed explanations
    in your prompts is a key technique in prompt engineering that helps you gain a
    deeper understanding of concepts, processes, and phenomena. Detailed explanations
    provide comprehensive insights that enhance learning and comprehension. This chapter
    will explore the importance of requesting detailed explanations and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Detailed
    Explanations'
  id: totrans-3925
  prefs: []
  type: TYPE_NORMAL
  zh: 第188章：请求详细解释在提示中请求详细解释是提示工程中的一个关键技巧，有助于你更深入地理解概念、过程和现象。详细解释提供全面的洞察，增强学习和理解。本章将探讨请求详细解释的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Depth: Detailed explanations offer in-depth insights into how things work,
    enhancing your understanding of complex topics.'
  id: totrans-3926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：详细解释提供了对事物如何运作的深入了解，增强了你对复杂主题的理解。
- en: 'Clarity: They help clarify abstract or difficult concepts, making them more
    accessible and understandable.'
  id: totrans-3927
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们有助于阐明抽象或难以理解的概念，使它们更易于接近和理解。
- en: 'Context: Detailed explanations provide context, helping you understand the
    broader implications and relationships between different concepts.'
  id: totrans-3928
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：详细解释提供上下文，帮助你理解不同概念之间的广泛影响和关系。
- en: 'Engagement: Requesting detailed explanations encourages a more interactive
    and engaging learning experience, fostering curiosity and exploration.'
  id: totrans-3929
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求详细解释鼓励更互动和吸引人的学习体验，激发好奇心和探索精神。
- en: 'How to Request Detailed ExplanationsTo effectively request detailed explanations
    in your prompts, consider the following strategies:'
  id: totrans-3930
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求详细解释为了在提示中有效地请求详细解释，考虑以下策略：
- en: 'Be Specific: Clearly state what you need explained, including any specific
    aspects or details you are interested in.'
  id: totrans-3931
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：清楚地说明你需要解释的内容，包括你感兴趣的任何具体方面或细节。
- en: 'Use Direct Language: Use straightforward and direct language to request detailed
    explanations, ensuring that the AI understands your query.'
  id: totrans-3932
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求详细解释，确保AI理解您的查询。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the explanation.'
  id: totrans-3933
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建解释的相关背景或信息。
- en: 'Ask for Step-by-Step Explanations: Request step-by-step explanations for processes
    or procedures to ensure a comprehensive understanding.'
  id: totrans-3934
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求逐步解释：请求对过程或程序进行逐步解释，以确保全面理解。
- en: 'Request Examples: Ask for examples to illustrate the explanation and provide
    additional clarity.'
  id: totrans-3935
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求示例：请求示例以说明解释并提供额外的清晰度。
- en: Examples of Requesting Detailed Explanations
  id: totrans-3936
  prefs: []
  type: TYPE_NORMAL
  zh: 请求详细解释的示例
- en: 'General Prompt: "Explain how photosynthesis works." Detailed Explanation Prompt:
    "Can you explain how photosynthesis works, including the role of chlorophyll and
    the different stages of the process?"'
  id: totrans-3937
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释光合作用是如何工作的。" 详细解释提示："你能解释光合作用是如何工作的，包括叶绿素的作用和过程的各个阶段吗？"
- en: 'General Prompt: "Describe blockchain technology." Detailed Explanation Prompt:
    "Can you explain how blockchain technology works, including how transactions are
    verified and added to the blockchain?"'
  id: totrans-3938
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述区块链技术。" 详细解释提示："你能解释区块链技术是如何工作的，包括交易是如何验证并添加到区块链的吗？"
- en: 'General Prompt: "What is quantum computing?" Detailed Explanation Prompt: "Can
    you explain the principles of quantum computing, including the concepts of superposition
    and entanglement?"'
  id: totrans-3939
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："什么是量子计算？" 详细解释提示："你能解释量子计算的原则，包括叠加和纠缠的概念吗？"
- en: Common Pitfalls to Avoid
  id: totrans-3940
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for detailed explanations.
    Be specific about what you need to ensure clarity and comprehensiveness.'
  id: totrans-3941
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊不清的请求：避免对详细解释的含糊或一般性请求。确保具体说明您需要的内容，以确保清晰和全面。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    explanations. Provide enough background information to frame the explanation.'
  id: totrans-3942
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致解释不完整或不准确。提供足够的信息以构建解释。
- en: 'Overly Broad Questions: Asking overly broad questions can result in unfocused
    or superficial explanations. Narrow down the question to ensure depth and detail.'
  id: totrans-3943
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的问题：提出过于宽泛的问题可能导致解释不集中或肤浅。缩小问题范围以确保深度和细节。
- en: ConclusionRequesting detailed explanations is a key practice in prompt engineering
    that enhances depth, clarity, context, and engagement. By being specific, using
    direct language, providing context, asking for step-by-step explanations, and
    requesting examples, you can ensure that ChatGPT provides detailed and comprehensive
    explanations tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and overly broad questions will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3944
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: '* * *'
  id: totrans-3945
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 189: Use ComparisonsUsing comparisons in your prompts is a valuable
    technique in prompt engineering that helps elucidate differences and similarities
    between concepts, objects, or scenarios. Comparisons provide clearer insights
    and enhance understanding of complex topics. This chapter will explore the importance
    of using comparisons and how to effectively incorporate this technique into your
    prompts.Importance of Using Comparisons'
  id: totrans-3946
  prefs: []
  type: TYPE_NORMAL
  zh: 第189章：使用比较
- en: 'Clarity: Comparisons help clarify abstract or complex concepts by relating
    them to more familiar ideas or highlighting differences.'
  id: totrans-3947
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：比较通过将它们与更熟悉的概念联系起来或突出差异，有助于阐明抽象或复杂的概念。
- en: 'Insight: They provide deeper insights by identifying similarities and differences,
    making it easier to grasp nuanced details.'
  id: totrans-3948
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：通过识别相似性和差异性，提供更深入的见解，使把握细微差别变得更容易。
- en: 'Decision-Making: Comparisons facilitate informed decision-making by presenting
    multiple options or perspectives side by side.'
  id: totrans-3949
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：比较通过并排呈现多个选项或观点，促进信息化的决策。
- en: 'Understanding: They enhance overall understanding by providing a broader context
    and multiple viewpoints.'
  id: totrans-3950
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供更广泛的背景和多个观点，它们增强了整体理解。
- en: 'How to Use ComparisonsTo effectively use comparisons in your prompts, consider
    the following strategies:'
  id: totrans-3951
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用比较为了有效地在提示中使用比较，考虑以下策略：
- en: 'Identify the Concepts: Clearly state the concepts, objects, or scenarios you
    want to compare, ensuring that the AI understands the focus of your query.'
  id: totrans-3952
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要比较的概念、对象或场景，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify the aspects or criteria for comparison, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-3953
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：具体说明比较的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "compare," "contrast,"
    "similarities," "differences") to clearly frame your request.'
  id: totrans-3954
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“比较”、“对比”、“相似之处”、“不同之处”）来清楚地阐述你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the comparison.'
  id: totrans-3955
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建比较的相关背景或信息。
- en: 'Ask for Detailed Comparisons: Request detailed comparisons to explore different
    aspects and their respective implications.'
  id: totrans-3956
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细比较：请求详细比较以探索不同方面及其相应的含义。
- en: Examples of Using Comparisons
  id: totrans-3957
  prefs: []
  type: TYPE_NORMAL
  zh: 比较的使用示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Comparison Prompt:
    "Can you compare the benefits of solar energy versus wind energy in terms of cost,
    efficiency, and environmental impact?"'
  id: totrans-3958
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。比较提示：你能从成本、效率和环境影响的角度比较太阳能和风能的好处吗？
- en: 'General Prompt: "Describe the process of photosynthesis." Comparison Prompt:
    "Can you compare the process of photosynthesis in plants to the process of cellular
    respiration in animals?"'
  id: totrans-3959
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”比较提示：“你能比较植物中光合作用的过程和动物中细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Comparison Prompt:
    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  id: totrans-3960
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：气候变化的原因是什么？比较提示：你能比较人类活动和自然因素对气候变化的影响吗？
- en: Common Pitfalls to Avoid
  id: totrans-3961
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
    general. Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-3962
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度广泛的比较：避免请求过于广泛或一般的比较。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the comparison.'
  id: totrans-3963
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略必要背景可能导致比较不完整或不准确。提供足够的信息来构建比较。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the comparison. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-3964
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不明确的语言：使用模糊或不清晰的语言可能会掩盖比较的意图。用精确的措辞确保AI理解你的请求。
- en: ConclusionUsing comparisons in your prompts is a valuable technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the concepts, being specific, using comparative language, providing
    context, and asking for detailed comparisons, you can ensure that ChatGPT provides
    clear and relevant comparisons tailored to your needs. Avoiding pitfalls such
    as overly broad comparisons, lack of context, and unclear language will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-3965
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中使用比较是提示工程中的一种有价值的技巧，它增强了清晰度、洞察力、决策力和理解力。通过识别概念、具体化、使用比较语言、提供背景信息和请求详细比较，你可以确保ChatGPT提供符合你需求的清晰和相关的比较。避免过度广泛的比较、缺乏背景信息和语言不清晰等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3966
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 190: Request InsightsRequesting insights in your prompts is a valuable
    technique in prompt engineering that helps uncover deeper understanding, interpretations,
    and perspectives on various topics. Insights provide nuanced information that
    can enhance your comprehension and inform decision-making. This chapter will explore
    the importance of requesting insights and how to effectively incorporate this
    technique into your prompts.Importance of Requesting Insights'
  id: totrans-3967
  prefs: []
  type: TYPE_NORMAL
  zh: 第190章：请求洞察力在提示工程中请求洞察力是一种有价值的技巧，有助于揭示对各种主题的更深入的理解、解释和观点。洞察力提供了细微的信息，可以增强你的理解并指导决策。本章将探讨请求洞察力的重要性以及如何有效地将此技巧融入你的提示中。请求洞察力的重要性
- en: 'Depth: Insights offer a deeper understanding of a topic, revealing underlying
    principles, patterns, or implications.'
  id: totrans-3968
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：见解提供了对主题的深入理解，揭示了潜在的原则、模式或影响。
- en: 'Interpretation: They provide interpretations and perspectives that help you
    make sense of complex or ambiguous information.'
  id: totrans-3969
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释：它们提供解释和观点，帮助你理解复杂或模糊的信息。
- en: 'Decision-Making: Insights inform decision-making by highlighting key factors,
    risks, and opportunities.'
  id: totrans-3970
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：见解通过突出关键因素、风险和机会来指导决策。
- en: 'Engagement: Requesting insights encourages a more interactive and engaging
    exploration of the topic, fostering curiosity and learning.'
  id: totrans-3971
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：请求见解鼓励更互动和有趣的探索，激发好奇心和学习。
- en: 'How to Request InsightsTo effectively request insights in your prompts, consider
    the following strategies:'
  id: totrans-3972
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求见解为了在提示中有效地请求见解，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want insights on,
    ensuring that the AI understands the focus of your query.'
  id: totrans-3973
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要见解的主题或问题，确保AI理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as trends, implications, or underlying principles.'
  id: totrans-3974
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如趋势、影响或潜在原则。
- en: 'Use Direct Language: Use straightforward and direct language to request insights,
    ensuring that the AI understands your request.'
  id: totrans-3975
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求见解，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the insights.'
  id: totrans-3976
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建见解的相关上下文或背景信息。
- en: 'Ask for Interpretations: Request interpretations or perspectives to gain a
    deeper understanding of the topic.'
  id: totrans-3977
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求解释：请求解释或观点以获得对主题的更深入理解。
- en: Examples of Requesting Insights
  id: totrans-3978
  prefs: []
  type: TYPE_NORMAL
  zh: 请求见解的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Insight Prompt:
    "Can you provide insights into how the adoption of renewable energy sources can
    impact global energy markets in the next decade?"'
  id: totrans-3979
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。洞察提示：你能提供关于可再生能源的采用如何影响未来十年全球能源市场的见解吗？
- en: 'General Prompt: "Describe the impact of climate change." Insight Prompt: "Can
    you provide insights into the long-term implications of climate change on biodiversity
    and ecosystems?"'
  id: totrans-3980
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。洞察提示：你能提供关于气候变化对生物多样性和生态系统长期影响的见解吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Insight
    Prompt: "Can you provide insights into how the principles of a democratic government
    influence social and economic development?"'
  id: totrans-3981
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？洞察提示：你能提供关于民主政府的原则如何影响社会和经济发展的见解吗？
- en: Common Pitfalls to Avoid
  id: totrans-3982
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for insights. Be specific about
    what you need to ensure clarity and relevance.'
  id: totrans-3983
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或一般性的见解请求。确保具体化以保持清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    insights. Provide enough background information to frame the insights.'
  id: totrans-3984
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略相关上下文可能导致见解不完整或不准确。提供足够的背景信息以构建见解。
- en: 'Ignoring Interpretations: Do not overlook the importance of interpretations.
    Asking for interpretations can provide deeper understanding and context.'
  id: totrans-3985
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略解释：不要忽视解释的重要性。请求解释可以提供更深入的理解和上下文。
- en: ConclusionRequesting insights is a valuable practice in prompt engineering that
    enhances depth, interpretation, decision-making, and engagement. By identifying
    the topic, being specific, using direct language, providing context, and asking
    for interpretations, you can ensure that ChatGPT provides nuanced and relevant
    insights tailored to your needs. Avoiding pitfalls such as vague requests, lack
    of context, and ignoring interpretations will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-3986
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求见解是提示工程中的一种宝贵实践，它增强了深度、解释、决策和参与。通过确定主题、具体化、使用直接语言、提供上下文和请求解释，你可以确保ChatGPT提供符合你需求的细微和相关的见解。避免诸如模糊请求、缺乏上下文和忽略解释等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-3987
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 191: Ask for ContrastsAsking for contrasts in your prompts is a powerful
    technique in prompt engineering that helps highlight differences and distinctions
    between concepts, objects, or scenarios. Contrasts provide clear insights and
    enhance understanding by emphasizing what sets things apart. This chapter will
    explore the importance of asking for contrasts and how to effectively incorporate
    this technique into your prompts.Importance of Asking for Contrasts'
  id: totrans-3988
  prefs: []
  type: TYPE_NORMAL
  zh: 第191章：请求对比在提示工程中请求对比是一种强大的技术，有助于突出概念、对象或场景之间的差异和区分。对比通过强调事物之间的不同，提供清晰的见解并增强理解。本章将探讨请求对比的重要性以及如何有效地将此技术融入你的提示中。请求对比的重要性
- en: 'Clarity: Contrasts help clarify differences and distinctions, making complex
    concepts easier to understand.'
  id: totrans-3989
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：对比有助于明确差异和区分，使复杂概念更容易理解。
- en: 'Insight: They provide deeper insights by highlighting what sets different elements
    apart, enhancing comprehension.'
  id: totrans-3990
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 见解：通过突出不同元素的不同之处，它们提供更深入的见解，增强理解。
- en: 'Decision-Making: Contrasts facilitate informed decision-making by clearly presenting
    the advantages and disadvantages of different options.'
  id: totrans-3991
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：对比通过清楚地展示不同选项的优缺点，促进明智的决策。
- en: 'Understanding: They enhance overall understanding by providing a comparative
    perspective, showing how different elements relate to each other.'
  id: totrans-3992
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过提供比较视角，它们增强了整体理解，展示了不同元素之间的关系。
- en: 'How to Ask for ContrastsTo effectively ask for contrasts in your prompts, consider
    the following strategies:'
  id: totrans-3993
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求对比为了有效地在提示中请求对比，考虑以下策略：
- en: 'Identify the Elements: Clearly state the concepts, objects, or scenarios you
    want to contrast, ensuring that the AI understands the focus of your query.'
  id: totrans-3994
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定元素：清楚地说明你想要对比的概念、对象或场景，确保AI理解查询的重点。
- en: 'Be Specific: Specify the aspects or criteria for contrast, such as functionality,
    effectiveness, pros and cons, etc.'
  id: totrans-3995
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定对比的方面或标准，如功能、有效性、利弊等。
- en: 'Use Comparative Language: Use comparative language (e.g., "contrast," "differences,"
    "distinctions") to clearly frame your request.'
  id: totrans-3996
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用比较语言：使用比较语言（例如，“对比”、“差异”、“区分”）来清楚地界定你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the contrast.'
  id: totrans-3997
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于构建对比的相关背景信息。
- en: 'Ask for Detailed Contrasts: Request detailed contrasts to explore different
    aspects and their respective implications.'
  id: totrans-3998
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细的对比：请求详细的对比以探索不同方面及其相应的含义。
- en: Examples of Asking for Contrasts
  id: totrans-3999
  prefs: []
  type: TYPE_NORMAL
  zh: 请求对比的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Contrast Prompt:
    "Can you contrast the benefits of solar energy versus wind energy in terms of
    cost, efficiency, and environmental impact?"'
  id: totrans-4000
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”对比提示：“你能从成本、效率和环境影响的角度对比太阳能与风能的好处吗？”
- en: 'General Prompt: "Describe the process of photosynthesis." Contrast Prompt:
    "Can you contrast the process of photosynthesis in plants with the process of
    cellular respiration in animals?"'
  id: totrans-4001
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述光合作用的过程。”对比提示：“你能对比植物光合作用与动物细胞呼吸的过程吗？”
- en: 'General Prompt: "What are the causes of climate change?" Contrast Prompt: "Can
    you contrast the impacts of human activities and natural factors on climate change?"'
  id: totrans-4002
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“气候变化的原因是什么？”对比提示：“你能对比人类活动与自然因素对气候变化的影响吗？”
- en: Common Pitfalls to Avoid
  id: totrans-4003
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Overly Broad Contrasts: Avoid asking for contrasts that are too broad or general.
    Focus on specific aspects to ensure clarity and relevance.'
  id: totrans-4004
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于宽泛的对比：避免请求过于宽泛或一般的对比。专注于具体方面以确保清晰和相关性。
- en: 'Lack of Context: Omitting necessary context can lead to incomplete or inaccurate
    contrasts. Provide enough background information to frame the contrast.'
  id: totrans-4005
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏上下文：省略必要的信息可能导致对比不完整或不准确。提供足够的信息来构建对比框架。
- en: 'Unclear Language: Using vague or unclear language can obscure the intent of
    the contrast. Be precise in your wording to ensure the AI understands your request.'
  id: totrans-4006
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言不明确：使用模糊或不清晰的语言可能会掩盖对比的意图。确保用词精确，以确保AI理解你的请求。
- en: ConclusionAsking for contrasts in your prompts is a powerful technique in prompt
    engineering that enhances clarity, insight, decision-making, and understanding.
    By identifying the elements, being specific, using comparative language, providing
    context, and asking for detailed contrasts, you can ensure that ChatGPT provides
    clear and relevant contrasts tailored to your needs. Avoiding pitfalls such as
    overly broad contrasts, lack of context, and unclear language will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-4007
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中请求对比是提示工程中的一种强大技巧，可以增强清晰度、洞察力、决策力和理解力。通过识别元素、具体化、使用比较语言、提供背景信息和请求详细对比，你可以确保ChatGPT提供符合你需求的清晰和相关的对比。避免过度广泛的对比、缺乏背景和语言不清晰等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4008
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 192: Request ImplicationsRequesting implications in your prompts is
    a valuable technique in prompt engineering that helps you explore the potential
    consequences and effects of actions, decisions, or events. Understanding implications
    provides deeper insights and supports informed decision-making. This chapter will
    explore the importance of requesting implications and how to effectively incorporate
    this technique into your prompts.Importance of Requesting Implications'
  id: totrans-4009
  prefs: []
  type: TYPE_NORMAL
  zh: 第192章：请求意义请求在提示中请求意义是提示工程中的一种宝贵技巧，有助于你探索行动、决策或事件的可能后果和影响。理解意义可以提供更深入的见解并支持明智的决策。本章将探讨请求意义的重要性以及如何有效地将此技巧融入你的提示中。请求意义的重要性
- en: 'Depth: Implications provide deeper insights into the potential consequences
    and effects of actions, decisions, or events.'
  id: totrans-4010
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度：意义提供了对行动、决策或事件潜在后果和影响的更深入见解。
- en: 'Understanding: They enhance understanding by highlighting the broader impact
    and significance of specific actions or events.'
  id: totrans-4011
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：它们通过强调特定行动或事件的更广泛影响和重要性来增强理解。
- en: 'Decision-Making: Understanding implications informs decision-making by presenting
    the potential outcomes and risks.'
  id: totrans-4012
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：通过展示潜在的结果和风险，理解意义可以指导决策。
- en: 'Context: Implications provide context by showing how different factors and
    events are interconnected and influence each other.'
  id: totrans-4013
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：意义通过展示不同因素和事件如何相互关联和影响彼此，提供背景。
- en: 'How to Request ImplicationsTo effectively request implications in your prompts,
    consider the following strategies:'
  id: totrans-4014
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求意义为了有效地在提示中请求意义，考虑以下策略：
- en: 'Identify the Action or Event: Clearly state the action, decision, or event
    you want to explore, ensuring that the AI understands the focus of your query.'
  id: totrans-4015
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别行动或事件：清楚地陈述你想要探索的行动、决策或事件，确保AI理解你的查询焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as short-term or long-term implications.'
  id: totrans-4016
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：指定你感兴趣的任何特定方面或细节，例如短期或长期意义。
- en: 'Use Direct Language: Use straightforward and direct language to request implications,
    ensuring that the AI understands your request.'
  id: totrans-4017
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言来请求意义，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the implications.'
  id: totrans-4018
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建意义的相关的背景或信息。
- en: 'Ask for Detailed Analysis: Request a detailed analysis of the implications
    to explore different aspects and their respective effects.'
  id: totrans-4019
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细分析：请求对意义的详细分析，以探索不同方面及其相应的影响。
- en: Examples of Requesting Implications
  id: totrans-4020
  prefs: []
  type: TYPE_NORMAL
  zh: 请求意义的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
    "Can you explain the long-term implications of widespread adoption of renewable
    energy on global energy markets?"'
  id: totrans-4021
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："解释可再生能源的好处。" 意义提示："你能解释可再生能源广泛采用对全球能源市场长期意义的解释吗？"
- en: 'General Prompt: "Describe the impact of climate change." Implication Prompt:
    "Can you provide insights into the potential implications of climate change on
    global agriculture and food security?"'
  id: totrans-4022
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："描述气候变化的影响。" 意义提示："你能提供关于气候变化对全球农业和粮食安全的潜在意义的见解吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Implication
    Prompt: "Can you discuss the implications of transitioning from an authoritarian
    regime to a democratic government on social stability and economic development?"'
  id: totrans-4023
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示："民主政府的核心特征是什么？" 意义提示："你能讨论从威权体制过渡到民主政府对社会稳定和经济发展的意义吗？"
- en: Common Pitfalls to Avoid
  id: totrans-4024
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for implications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-4025
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对含义进行模糊或一般性的请求。确保具体，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis of implications. Provide enough background information to frame the implications.'
  id: totrans-4026
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致对含义的不完整或不准确的分析。提供足够的背景信息以构建含义。
- en: 'Ignoring Multiple Perspectives: Focusing on a single perspective can limit
    the analysis. Request multiple perspectives to explore different implications
    and outcomes.'
  id: totrans-4027
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略多个观点：专注于单一观点可能会限制分析。请求多个观点以探索不同的含义和结果。
- en: ConclusionRequesting implications is a valuable practice in prompt engineering
    that enhances depth, understanding, decision-making, and context. By identifying
    the action or event, being specific, using direct language, providing context,
    and asking for detailed analysis, you can ensure that ChatGPT provides accurate
    and relevant insights into the implications tailored to your needs. Avoiding pitfalls
    such as vague requests, lack of context, and ignoring multiple perspectives will
    further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-4028
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求含义是提示工程中的一种宝贵实践，它增强了深度、理解、决策和背景。通过确定行动或事件，保持具体，使用直接语言，提供背景，并请求详细分析，你可以确保ChatGPT为你提供准确和相关的见解，以满足你的需求。避免诸如模糊请求、缺乏背景和忽略多个观点等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4029
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 193: Request Alternative ViewsRequesting alternative views in your
    prompts is a valuable technique in prompt engineering that helps you explore different
    perspectives and viewpoints on a topic. Alternative views provide a broader and
    more nuanced understanding, encouraging critical thinking and balanced evaluations.
    This chapter will explore the importance of requesting alternative views and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Alternative Views'
  id: totrans-4030
  prefs: []
  type: TYPE_NORMAL
  zh: 第193章：请求不同的观点在提示中请求不同的观点是提示工程中的一种宝贵技巧，有助于你探索一个主题的不同观点和视角。不同的观点提供了一个更广泛和更细致的理解，鼓励批判性思维和平衡评估。本章将探讨请求不同观点的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Balanced Perspective: Alternative views provide a balanced perspective by presenting
    different sides of an issue or topic.'
  id: totrans-4031
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平衡观点：不同的观点通过展示问题或主题的不同方面提供了一个平衡的视角。
- en: 'Critical Thinking: They encourage critical thinking by challenging assumptions
    and exploring diverse viewpoints.'
  id: totrans-4032
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性思维：它们通过挑战假设和探索不同的观点来鼓励批判性思维。
- en: 'Understanding: Alternative views enhance understanding by highlighting different
    interpretations and approaches.'
  id: totrans-4033
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：不同的观点通过突出不同的解释和方法来增强理解。
- en: 'Informed Decision-Making: Considering alternative views supports informed decision-making
    by presenting multiple options and considerations.'
  id: totrans-4034
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息化决策：考虑不同的观点通过提供多种选项和考虑因素来支持信息化的决策。
- en: 'How to Request Alternative ViewsTo effectively request alternative views in
    your prompts, consider the following strategies:'
  id: totrans-4035
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求不同的观点为了在提示中有效地请求不同的观点，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  id: totrans-4036
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确指出你想要了解不同观点的主题或问题，确保AI能够理解你查询的焦点。
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
    such as different perspectives or approaches.'
  id: totrans-4037
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持具体：指定你感兴趣的任何特定方面或细节，例如不同的观点或方法。
- en: 'Use Direct Language: Use straightforward and direct language to request alternative
    views, ensuring that the AI understands your request.'
  id: totrans-4038
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言来请求不同的观点，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the alternative views.'
  id: totrans-4039
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建不同观点的相关背景或信息。
- en: 'Ask for Multiple Perspectives: Request multiple perspectives to explore different
    viewpoints and their respective implications.'
  id: totrans-4040
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个观点：请求多个观点以探索不同的观点及其相应的含义。
- en: Examples of Requesting Alternative Views
  id: totrans-4041
  prefs: []
  type: TYPE_NORMAL
  zh: 请求不同观点的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Alternative Views
    Prompt: "Can you provide alternative views on the benefits of renewable energy,
    including both positive and critical perspectives?"'
  id: totrans-4042
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”替代观点提示：“你能提供关于可再生能源好处的不同观点，包括正面和批评的视角吗？”
- en: 'General Prompt: "Describe the impact of climate change." Alternative Views
    Prompt: "Can you provide different viewpoints on the impact of climate change,
    including perspectives from environmentalists and skeptics?"'
  id: totrans-4043
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”替代观点提示：“你能提供关于气候变化的不同观点，包括环保主义者和怀疑论者的观点吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Alternative
    Views Prompt: "Can you discuss alternative views on the key features of a democratic
    government, including both supporters and critics?"'
  id: totrans-4044
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”替代观点提示：“你能讨论关于民主政府核心特征的替代观点，包括支持和批评者吗？”
- en: Common Pitfalls to Avoid
  id: totrans-4045
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for alternative views. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-4046
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对替代观点提出模糊或一般性的请求。确保具体说明你需要的内容，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    alternative views. Provide enough background information to frame the perspectives.'
  id: totrans-4047
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致替代观点不完整或不准确。提供足够的背景信息来构建视角。
- en: 'Ignoring Diverse Perspectives: Focusing on a single perspective can limit the
    analysis. Request diverse perspectives to explore different viewpoints and implications.'
  id: totrans-4048
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多元视角：专注于单一视角可能会限制分析。请求多元视角以探索不同的观点和影响。
- en: ConclusionRequesting alternative views is a valuable practice in prompt engineering
    that enhances balanced perspective, critical thinking, understanding, and informed
    decision-making. By identifying the topic, being specific, using direct language,
    providing context, and asking for multiple perspectives, you can ensure that ChatGPT
    provides accurate and relevant alternative views tailored to your needs. Avoiding
    pitfalls such as vague requests, lack of context, and ignoring diverse perspectives
    will further improve the effectiveness of your interactions with ChatGPT.
  id: totrans-4049
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：请求不同的观点是提示工程中的一种宝贵实践，它有助于增强平衡的视角、批判性思维、理解和明智的决策。通过确定主题、具体说明、使用直接语言、提供背景信息和请求多个观点，你可以确保ChatGPT提供准确且相关的替代观点，以满足你的需求。避免陷入模糊请求、缺乏背景信息和忽视多元视角等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4050
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 194: Specify Criteria for EvaluationSpecifying criteria for evaluation
    in your prompts is an important technique in prompt engineering that helps focus
    the AI''s responses and ensures they are relevant and aligned with your needs.
    Criteria provide clear guidelines and boundaries, enhancing the quality and precision
    of the information. This chapter will explore the importance of specifying criteria
    for evaluation and how to effectively incorporate this technique into your prompts.Importance
    of Specifying Criteria for Evaluation'
  id: totrans-4051
  prefs: []
  type: TYPE_NORMAL
  zh: 第194章：指定评估标准在提示中指定评估标准是提示工程中的一种重要技术，有助于聚焦人工智能的响应并确保它们与你的需求相关和一致。标准提供了明确的指南和边界，提高了信息的质量和精确度。本章将探讨指定评估标准的重要性以及如何有效地将这项技术融入你的提示中。
- en: 'Focus: Criteria help narrow down the AI''s response to the most relevant information,
    avoiding unnecessary details.'
  id: totrans-4052
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重点关注：标准有助于缩小人工智能的响应范围，使其专注于最相关的信息，避免不必要的细节。
- en: 'Clarity: By setting criteria, you ensure that the response remains clear and
    aligned with your specific needs.'
  id: totrans-4053
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：通过设定标准，你确保响应保持清晰并与你的具体需求保持一致。
- en: 'Relevance: Criteria ensure that the information provided is directly applicable
    to your query, highlighting the most important aspects.'
  id: totrans-4054
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：标准确保提供的信息直接适用于你的查询，突出最重要的方面。
- en: 'Precision: Specifying criteria enhances the precision of the response, making
    it more accurate and useful.'
  id: totrans-4055
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精确性：指定标准提高了响应的精确性，使其更加准确和有用。
- en: 'How to Specify Criteria for EvaluationTo effectively specify criteria for evaluation
    in your prompts, consider the following strategies:'
  id: totrans-4056
  prefs: []
  type: TYPE_NORMAL
  zh: 如何指定评估标准：为了在提示中有效地指定评估标准，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to address, ensuring
    that the AI understands the focus of your query.'
  id: totrans-4057
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确陈述你想要解决的问题或主题，确保人工智能能够理解你查询的焦点。
- en: 'Define the Criteria: Specify the criteria or guidelines for the response, such
    as scope, length, format, or particular aspects to focus on.'
  id: totrans-4058
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义标准：指定回答的标准或指南，例如范围、长度、格式或特定方面。
- en: 'Use Direct Language: Use straightforward and direct language to specify the
    criteria, ensuring that the AI understands your request.'
  id: totrans-4059
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言来指定标准，确保AI理解您的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the criteria.'
  id: totrans-4060
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：包括任何有助于界定标准的相关上下文或背景信息。
- en: 'Ask for Compliance: Request that the response adheres to the specified criteria
    to ensure alignment with your needs.'
  id: totrans-4061
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要求合规：要求回答符合指定的标准，以确保与您的需求一致。
- en: Examples of Specifying Criteria for Evaluation
  id: totrans-4062
  prefs: []
  type: TYPE_NORMAL
  zh: 评估标准指定的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Criteria-Specified
    Prompt: "Can you explain the benefits of renewable energy, focusing on economic
    and environmental impacts, in no more than 200 words?"'
  id: totrans-4063
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "解释可再生能源的好处。" 指定标准提示： "你能解释可再生能源的好处，重点关注经济和环境影响，不超过200字吗？"
- en: 'General Prompt: "Describe the impact of climate change." Criteria-Specified
    Prompt: "Can you describe the impact of climate change on coastal cities, including
    both short-term and long-term effects?"'
  id: totrans-4064
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "描述气候变化的影响。" 指定标准提示： "你能描述气候变化对沿海城市的影响，包括短期和长期效应吗？"
- en: 'General Prompt: "What are the key features of a democratic government?" Criteria-Specified
    Prompt: "Can you list the key features of a democratic government, focusing on
    political and social aspects?"'
  id: totrans-4065
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示： "民主政府的核心特征是什么？" 指定标准提示： "你能列出民主政府的核心特征，重点关注政治和社会方面吗？"
- en: Common Pitfalls to Avoid
  id: totrans-4066
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的常见错误
- en: 'Vague Criteria: Avoid using vague or ambiguous criteria. Be specific about
    the guidelines to ensure clarity and relevance.'
  id: totrans-4067
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 含糊的标准：避免使用含糊或模糊的标准。确保指南具体，以确保清晰和相关性。
- en: 'Overly Restrictive Criteria: Setting criteria that are too restrictive can
    limit the depth and quality of the response. Ensure your criteria are reasonable
    and allow for a comprehensive answer.'
  id: totrans-4068
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于严格的标准：设定过于严格的标准可能会限制回答的深度和质量。确保您的标准合理，并允许全面回答。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    responses. Provide enough background information to frame the criteria.'
  id: totrans-4069
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：省略相关上下文可能导致回答不完整或不准确。提供足够的背景信息来界定标准。
- en: ConclusionSpecifying criteria for evaluation in your prompts is a crucial practice
    in prompt engineering that enhances focus, clarity, relevance, and precision.
    By identifying the topic, defining the criteria, using direct language, providing
    context, and asking for compliance, you can ensure that ChatGPT provides accurate
    and relevant responses tailored to your needs. Avoiding pitfalls such as vague
    criteria, overly restrictive criteria, and ignoring context will further improve
    the effectiveness of your interactions with ChatGPT.
  id: totrans-4070
  prefs: []
  type: TYPE_NORMAL
  zh: 结论在提示中指定评估标准是提示工程中的关键实践，它增强了重点、清晰度、相关性和精确性。通过确定主题、定义标准、使用直接语言、提供上下文和请求合规，您可以确保ChatGPT提供准确且相关的回答，以满足您的需求。避免诸如标准模糊、标准过于严格和忽略上下文等陷阱，将进一步提高您与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4071
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 195: Request SimplificationsRequesting simplifications in your prompts
    is a valuable technique in prompt engineering that helps break down complex concepts,
    processes, or information into simpler and more understandable terms. Simplifications
    enhance clarity and accessibility, making information easier to comprehend. This
    chapter will explore the importance of requesting simplifications and how to effectively
    incorporate this technique into your prompts.Importance of Requesting Simplifications'
  id: totrans-4072
  prefs: []
  type: TYPE_NORMAL
  zh: 第195章：请求简化在提示中请求简化是提示工程中的一个有价值的技术，它有助于将复杂的概念、过程或信息分解成更简单、更易于理解的表达。简化提高了清晰度和可访问性，使信息更容易理解。本章将探讨请求简化的重要性以及如何有效地将这项技术融入您的提示中。
- en: 'Clarity: Simplifications help clarify complex or abstract concepts, making
    them easier to understand.'
  id: totrans-4073
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰度：简化有助于阐明复杂或抽象的概念，使它们更容易理解。
- en: 'Accessibility: They make information more accessible to a broader audience,
    including those with limited background knowledge.'
  id: totrans-4074
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：它们使信息更容易被更广泛的受众获取，包括那些背景知识有限的人。
- en: 'Engagement: Simplifications make the information more engaging and relatable,
    enhancing overall comprehension.'
  id: totrans-4075
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与：简化使信息更具吸引力和相关性，增强整体理解。
- en: 'Usability: Simplified explanations are more practical and easier to apply in
    real-world situations.'
  id: totrans-4076
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：简化的解释在现实世界中的应用更实际，更容易实施。
- en: 'How to Request SimplificationsTo effectively request simplifications in your
    prompts, consider the following strategies:'
  id: totrans-4077
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求简化为了在提示中有效地请求简化，考虑以下策略：
- en: 'Identify the Concept: Clearly state the complex concept or process you want
    simplified, ensuring that the AI understands the focus of your query.'
  id: totrans-4078
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地陈述你想要简化的复杂概念或过程，确保AI理解你的查询焦点。
- en: 'Use Direct Language: Use straightforward and direct language to request simplifications,
    ensuring that the AI understands your request.'
  id: totrans-4079
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和直接的语言来请求简化，确保AI理解你的请求。
- en: 'Specify the Audience: Indicate the intended audience for the simplification,
    such as beginners, students, or the general public.'
  id: totrans-4080
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定受众：指出简化的目标受众，如初学者、学生或公众。
- en: 'Ask for Analogies: Request analogies or examples to help illustrate the simplified
    concept and provide additional clarity.'
  id: totrans-4081
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求类比：请求类比或例子来帮助说明简化的概念，并提供额外的清晰度。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the simplification.'
  id: totrans-4082
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建简化的相关背景或信息。
- en: Examples of Requesting Simplifications
  id: totrans-4083
  prefs: []
  type: TYPE_NORMAL
  zh: 请求简化的示例
- en: 'General Prompt: "Explain the process of photosynthesis." Simplification Prompt:
    "Can you simplify the process of photosynthesis for a 10-year-old student, including
    an analogy to help explain it?"'
  id: totrans-4084
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释光合作用的过程。”简化提示：“你能为10岁的学生简化光合作用的过程，包括一个类比来帮助解释它？”
- en: 'General Prompt: "Describe blockchain technology." Simplification Prompt: "Can
    you simplify blockchain technology for someone with no technical background, using
    simple language and examples?"'
  id: totrans-4085
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述区块链技术。”简化提示：“你能用简单语言和例子为没有技术背景的人简化区块链技术？”
- en: 'General Prompt: "What is quantum computing?" Simplification Prompt: "Can you
    simplify the concept of quantum computing for beginners, including a basic analogy
    to explain how it works?"'
  id: totrans-4086
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是量子计算？”简化提示：“你能为初学者简化量子计算的概念，包括一个基本类比来解释它是如何工作的？”
- en: Common Pitfalls to Avoid
  id: totrans-4087
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for simplifications. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-4088
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免模糊或泛泛的简化请求。确保具体，以确保清晰和相关性。
- en: 'Over-Simplification: While simplifications are useful, avoid over-simplifying
    to the point where important details are lost. Balance simplicity with accuracy.'
  id: totrans-4089
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度简化：虽然简化是有用的，但避免过度简化到重要细节丢失的程度。平衡简洁与准确性。
- en: 'Ignoring Context: Omitting relevant context can lead to incomplete or inaccurate
    simplifications. Provide enough background information to frame the simplification.'
  id: totrans-4090
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略背景：省略相关背景可能导致简化不完整或不准确。提供足够的背景信息来构建简化。
- en: ConclusionRequesting simplifications is a valuable practice in prompt engineering
    that enhances clarity, accessibility, engagement, and usability. By identifying
    the concept, using direct language, specifying the audience, asking for analogies,
    and providing context, you can ensure that ChatGPT provides clear and relevant
    simplifications tailored to your needs. Avoiding pitfalls such as vague requests,
    over-simplification, and ignoring context will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-4091
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求简化是提示工程中的一种宝贵实践，它增强了清晰度、可访问性、参与度和可用性。通过识别概念、使用直接语言、指定受众、请求类比和提供背景，你可以确保ChatGPT提供针对你需求的清晰和相关的简化。避免模糊请求、过度简化和忽略背景等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4092
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 196: Request Real-World ApplicationsRequesting real-world applications
    in your prompts is an important technique in prompt engineering that helps you
    understand how concepts, theories, or processes can be applied practically. Real-world
    applications provide tangible examples that enhance understanding and relevance.
    This chapter will explore the importance of requesting real-world applications
    and how to effectively incorporate this technique into your prompts.Importance
    of Requesting Real-World Applications'
  id: totrans-4093
  prefs: []
  type: TYPE_NORMAL
  zh: 第196章：请求现实世界应用在提示中请求现实世界应用是提示工程中的重要技术，有助于你了解概念、理论或过程如何实际应用。现实世界应用提供了有形的例子，增强了理解和相关性。本章将探讨请求现实世界应用的重要性以及如何有效地将此技术融入你的提示中。
- en: 'Relevance: Real-world applications make abstract concepts and theories more
    relevant by showing how they are used in practical situations.'
  id: totrans-4094
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：现实世界应用通过展示它们在实际情况中的应用，使抽象的概念和理论更具相关性。
- en: 'Clarity: They help clarify complex ideas by providing concrete examples of
    how they are implemented in real-world contexts.'
  id: totrans-4095
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：它们通过提供如何在现实世界环境中实施的具体例子，帮助阐明复杂的概念。
- en: 'Engagement: Real-world applications make information more engaging and interesting,
    fostering a deeper connection with the topic.'
  id: totrans-4096
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与度：现实世界应用使信息更具吸引力，并激发对主题的更深入联系。
- en: 'Usability: Understanding real-world applications enhances the practical usability
    of the information, making it easier to apply in various situations.'
  id: totrans-4097
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可用性：理解现实世界应用增强了信息的实际可用性，使其更容易在各种情况下应用。
- en: 'How to Request Real-World ApplicationsTo effectively request real-world applications
    in your prompts, consider the following strategies:'
  id: totrans-4098
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求现实世界应用为了在提示中有效地请求现实世界应用，考虑以下策略：
- en: 'Identify the Concept: Clearly state the concept, theory, or process you want
    to explore in real-world applications, ensuring that the AI understands the focus
    of your query.'
  id: totrans-4099
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别概念：清楚地说明你想要在现实世界应用中探索的概念、理论或过程，确保AI理解查询的重点。
- en: 'Be Specific: Specify the type of real-world applications you are interested
    in, such as industry-specific examples or everyday uses.'
  id: totrans-4100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具体化：明确你感兴趣的特定现实世界应用类型，例如行业特定例子或日常用途。
- en: 'Use Direct Language: Use straightforward and direct language to request real-world
    applications, ensuring that the AI understands your request.'
  id: totrans-4101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和简洁的语言请求现实世界应用，确保AI能理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the real-world applications.'
  id: totrans-4102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建现实世界应用的相关的背景信息。
- en: 'Ask for Detailed Examples: Request detailed examples of real-world applications
    to understand how the concept is implemented and its impact.'
  id: totrans-4103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求详细例子：请求现实世界应用的具体例子，以了解概念是如何实施的及其影响。
- en: Examples of Requesting Real-World Applications
  id: totrans-4104
  prefs: []
  type: TYPE_NORMAL
  zh: 请求现实世界应用的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Real-World Applications
    Prompt: "Can you provide real-world examples of how renewable energy sources,
    such as solar and wind power, are being used in different industries?"'
  id: totrans-4105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”现实世界应用提示：“你能提供太阳能和风能等可再生能源在不同行业中应用的例子吗？”
- en: 'General Prompt: "Describe the impact of climate change." Real-World Applications
    Prompt: "Can you provide examples of real-world initiatives and strategies that
    cities are implementing to combat the effects of climate change?"'
  id: totrans-4106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”现实世界应用提示：“你能提供城市为应对气候变化实施的实际项目和策略的例子吗？”
- en: 'General Prompt: "What is blockchain technology?" Real-World Applications Prompt:
    "Can you provide examples of how blockchain technology is being applied in various
    sectors, such as finance, supply chain, and healthcare?"'
  id: totrans-4107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”现实世界应用提示：“你能提供区块链技术在金融、供应链和医疗保健等各个领域的应用例子吗？”
- en: Common Pitfalls to Avoid
  id: totrans-4108
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见错误
- en: 'Vague Requests: Avoid vague or general requests for real-world applications.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-4109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不明确的请求：避免对现实世界应用进行模糊或一般性的请求。确保具体明确，以确保清晰性和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    examples. Provide enough background information to frame the real-world applications.'
  id: totrans-4110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致例子不完整或不准确。提供足够的背景信息以构建现实世界应用。
- en: 'Ignoring Specificity: General examples may not provide the depth you need.
    Request detailed examples to understand the practical implementation and impact.'
  id: totrans-4111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略具体性：一般示例可能无法提供你所需要的深度。请求详细示例以了解实际实施和影响。
- en: ConclusionRequesting real-world applications is an important practice in prompt
    engineering that enhances relevance, clarity, engagement, and usability. By identifying
    the concept, being specific, using direct language, providing context, and asking
    for detailed examples, you can ensure that ChatGPT provides clear and relevant
    real-world applications tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and ignoring specificity will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-4112
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求实际应用：在提示中请求实际应用是提示工程中的重要实践，它增强了相关性、清晰度、参与度和可用性。通过识别概念、具体化、使用直接语言、提供背景信息和请求详细示例，你可以确保ChatGPT提供符合你需求的清晰且相关的实际应用。避免模糊请求、缺乏背景信息和忽视具体性等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4113
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 197: Request Statistical AnalysisRequesting statistical analysis in
    your prompts is a valuable technique in prompt engineering that helps you obtain
    quantitative insights and evidence to support your queries. Statistical analysis
    provides a factual basis that enhances the accuracy and credibility of the information.
    This chapter will explore the importance of requesting statistical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Statistical Analysis'
  id: totrans-4114
  prefs: []
  type: TYPE_NORMAL
  zh: 第197章：请求统计分析在提示中请求统计分析是提示工程中的一个宝贵技巧，帮助你获得定量洞察和证据来支持你的查询。统计分析提供了事实基础，增强了信息的准确性和可信度。本章将探讨请求统计分析的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Accuracy: Statistical analysis provides a factual basis that enhances the accuracy
    and reliability of the information.'
  id: totrans-4115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准确性：统计分析提供了事实基础，增强了信息的准确性和可靠性。
- en: 'Credibility: Quantitative insights and evidence add credibility to the response,
    making it more trustworthy.'
  id: totrans-4116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信誉度：定量洞察和证据增加了响应的信誉度，使其更加可信。
- en: 'Insight: Statistical analysis offers insights into trends, patterns, and relationships,
    helping you understand the topic more deeply.'
  id: totrans-4117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：统计分析提供了对趋势、模式和关系的洞察，帮助你更深入地理解主题。
- en: 'Decision-Making: Statistical analysis supports informed decision-making by
    providing evidence-based information.'
  id: totrans-4118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策支持：统计分析通过提供基于证据的信息来支持明智的决策。
- en: 'How to Request Statistical AnalysisTo effectively request statistical analysis
    in your prompts, consider the following strategies:'
  id: totrans-4119
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求统计分析：为了在提示中有效地请求统计分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or question you want statistical
    analysis on, ensuring that the AI understands the focus of your query.'
  id: totrans-4120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要进行统计分析的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Type of Analysis: Indicate the type of statistical analysis you
    are interested in, such as trends, correlations, comparisons, or specific metrics.'
  id: totrans-4121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定分析类型：指出你感兴趣的统计分析类型，如趋势、相关性、比较或特定指标。
- en: 'Use Direct Language: Use straightforward and direct language to request statistical
    analysis, ensuring that the AI understands your request.'
  id: totrans-4122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接、简洁的语言请求统计分析，确保AI能够理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the statistical analysis.'
  id: totrans-4123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景信息：包括任何有助于构建统计分析的相关背景或信息。
- en: 'Ask for Sources: Request sources or references for the statistical analysis
    to ensure its credibility and reliability.'
  id: totrans-4124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求来源：请求统计分析的来源或参考文献，以确保其信誉度和可靠性。
- en: Examples of Requesting Statistical Analysis
  id: totrans-4125
  prefs: []
  type: TYPE_NORMAL
  zh: 请求统计分析的示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the adoption rates of renewable
    energy sources, such as solar and wind power, in the past decade?"'
  id: totrans-4126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”统计分析提示：“你能提供过去十年中太阳能和风能等可再生能源采用率的统计分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Statistical Analysis
    Prompt: "Can you provide statistical analysis on the increase in global temperatures
    and the frequency of extreme weather events over the past 50 years?"'
  id: totrans-4127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”统计分析提示：“你能提供过去50年来全球温度上升和极端天气事件频率的统计分析吗？”
- en: 'General Prompt: "What is blockchain technology?" Statistical Analysis Prompt:
    "Can you provide statistical analysis on the growth of blockchain technology in
    different industries, including the number of blockchain-based companies and projects?"'
  id: totrans-4128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是区块链技术？”统计分析提示：“你能提供关于区块链技术在不同行业增长、包括基于区块链的公司和项目的数量的统计分析吗？”
- en: Common Pitfalls to Avoid
  id: totrans-4129
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for statistical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-4130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对统计分析的模糊或一般性请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the statistical analysis.'
  id: totrans-4131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景信息：省略相关背景信息可能导致分析不完整或不准确。提供足够的背景信息以构建统计分析框架。
- en: 'Ignoring Sources: Statistical analysis without credible sources can be unreliable.
    Always request sources or references to ensure the credibility of the analysis.'
  id: totrans-4132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视来源：没有可信来源的统计分析可能不可靠。始终要求来源或参考文献以确保分析的可信度。
- en: ConclusionRequesting statistical analysis is a valuable practice in prompt engineering
    that enhances accuracy, credibility, insight, and decision-making. By identifying
    the topic, specifying the type of analysis, using direct language, providing context,
    and asking for sources, you can ensure that ChatGPT provides accurate and reliable
    statistical analysis tailored to your needs. Avoiding pitfalls such as vague requests,
    lack of context, and ignoring sources will further improve the effectiveness of
    your interactions with ChatGPT.
  id: totrans-4133
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求统计分析是提示工程中的一个宝贵实践，它增强了准确性、可信度、洞察力和决策能力。通过确定主题、指定分析类型、使用直接语言、提供背景信息和要求来源，你可以确保ChatGPT提供符合你需求的准确和可靠的统计分析。避免诸如请求模糊、缺乏背景信息和忽视来源等陷阱，将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4134
  prefs: []
  type: TYPE_NORMAL
  zh: '****'
- en: 'Chapter 198: Request Historical AnalysisRequesting historical analysis in your
    prompts is a valuable technique in prompt engineering that helps you understand
    how historical events, trends, or decisions impact the present and future. Historical
    analysis provides context and insights that enhance understanding and relevance.
    This chapter will explore the importance of requesting historical analysis and
    how to effectively incorporate this technique into your prompts.Importance of
    Requesting Historical Analysis'
  id: totrans-4135
  prefs: []
  type: TYPE_NORMAL
  zh: 第198章：请求历史分析在提示中请求历史分析是提示工程中的一个宝贵技巧，它帮助你理解历史事件、趋势或决策如何影响现在和未来。历史分析提供背景和洞察力，增强理解和相关性。本章将探讨请求历史分析的重要性以及如何有效地将此技巧融入你的提示中。请求历史分析的重要性
- en: 'Context: Historical analysis provides context by showing how past events and
    decisions shape the present and future.'
  id: totrans-4136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：历史分析通过展示过去的事件和决策如何塑造现在和未来来提供背景。
- en: 'Insight: It offers insights into patterns, trends, and the evolution of ideas
    or events over time.'
  id: totrans-4137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察力：它提供了对模式、趋势以及观点或事件随时间演变的洞察。
- en: 'Understanding: Historical analysis enhances understanding by highlighting the
    causes and effects of historical events.'
  id: totrans-4138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：历史分析通过突出历史事件的原因和影响来增强理解。
- en: 'Perspective: It provides a broader perspective, helping to situate specific
    topics within a larger historical narrative.'
  id: totrans-4139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视角：它提供了一个更广阔的视角，帮助将特定主题置于更大的历史叙事中。
- en: 'How to Request Historical AnalysisTo effectively request historical analysis
    in your prompts, consider the following strategies:'
  id: totrans-4140
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求历史分析为了有效地在提示中请求历史分析，考虑以下策略：
- en: 'Identify the Topic: Clearly state the historical event, trend, or decision
    you want to analyze, ensuring that the AI understands the focus of your query.'
  id: totrans-4141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地说明你想要分析的历史事件、趋势或决策，确保AI理解你查询的焦点。
- en: 'Specify the Time Period: Define the time period you are interested in, including
    specific years, decades, or eras.'
  id: totrans-4142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定时间段：定义你感兴趣的时间段，包括具体的年份、十年或时代。
- en: 'Use Direct Language: Use straightforward and direct language to request historical
    analysis, ensuring that the AI understands your request.'
  id: totrans-4143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求历史分析，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the historical analysis.'
  id: totrans-4144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建历史分析的相关背景或信息。
- en: 'Ask for Specific Aspects: Request analysis on specific aspects, such as causes,
    effects, or outcomes, to ensure a focused analysis.'
  id: totrans-4145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对特定方面进行分析，如原因、影响或结果，以确保分析具有针对性。
- en: Examples of Requesting Historical Analysis
  id: totrans-4146
  prefs: []
  type: TYPE_NORMAL
  zh: 请求历史分析示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Historical Analysis
    Prompt: "Can you provide a historical analysis of the adoption of renewable energy
    sources since the Industrial Revolution?"'
  id: totrans-4147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”历史分析提示：“你能提供自工业革命以来采用可再生能源的历史分析吗？”
- en: 'General Prompt: "Describe the impact of climate change." Historical Analysis
    Prompt: "Can you provide a historical analysis of climate change, including significant
    events and milestones over the past century?"'
  id: totrans-4148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”历史分析提示：“你能提供过去一个世纪气候变化的历史分析，包括重大事件和里程碑吗？”
- en: 'General Prompt: "What are the key features of a democratic government?" Historical
    Analysis Prompt: "Can you provide a historical analysis of the development of
    democratic governments from ancient Greece to the modern era?"'
  id: totrans-4149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“民主政府的核心特征是什么？”历史分析提示：“你能提供从古希腊到现代时期民主政府发展历史分析吗？”
- en: Common Pitfalls to Avoid
  id: totrans-4150
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for historical analysis. Be
    specific about what you need to ensure clarity and relevance.'
  id: totrans-4151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对历史分析进行模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    analysis. Provide enough background information to frame the historical analysis.'
  id: totrans-4152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致分析不完整或不准确。提供足够的背景信息以构建历史分析框架。
- en: 'Overloading with Details: While historical analysis is useful, providing too
    many details can overwhelm the response. Focus on the most relevant aspects.'
  id: totrans-4153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详尽无遗：虽然历史分析很有用，但提供过多细节可能会使回答显得繁重。关注最相关的方面。
- en: ConclusionRequesting historical analysis is a valuable practice in prompt engineering
    that enhances context, insight, understanding, and perspective. By identifying
    the topic, specifying the time period, using direct language, providing context,
    and asking for specific aspects, you can ensure that ChatGPT provides accurate
    and relevant historical analysis tailored to your needs. Avoiding pitfalls such
    as vague requests, lack of context, and overloading with details will further
    improve the effectiveness of your interactions with ChatGPT.
  id: totrans-4154
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求历史分析是提示工程中的一个宝贵实践，它增强了上下文、洞察、理解和观点。通过确定主题、指定时间范围、使用直接语言、提供背景以及请求具体方面，你可以确保ChatGPT提供准确且相关的历史分析，以满足你的需求。避免诸如请求模糊、缺乏背景和详尽无遗等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4155
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 199: Ask for Cultural ContextAsking for cultural context in your prompts
    is a valuable technique in prompt engineering that helps you understand how cultural
    factors influence concepts, behaviors, and perspectives. Cultural context provides
    insights that enhance relevance and understanding, especially when exploring topics
    that vary across different societies. This chapter will explore the importance
    of asking for cultural context and how to effectively incorporate this technique
    into your prompts.Importance of Asking for Cultural Context'
  id: totrans-4156
  prefs: []
  type: TYPE_NORMAL
  zh: 第199章：请求文化背景在提示中请求文化背景是提示工程中的一个宝贵技巧，有助于你理解文化因素如何影响概念、行为和观点。文化背景提供了增强相关性和理解的见解，尤其是在探讨不同社会之间差异较大的主题时。本章将探讨请求文化背景的重要性以及如何有效地将此技巧融入你的提示中。请求文化背景的重要性
- en: 'Relevance: Cultural context makes information more relevant by showing how
    it applies within specific cultural settings.'
  id: totrans-4157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关性：文化背景通过展示信息如何适用于特定文化环境，使信息更具相关性。
- en: 'Understanding: It enhances understanding by highlighting how cultural factors
    influence concepts, behaviors, and perspectives.'
  id: totrans-4158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过强调文化因素如何影响概念、行为和观点，它增强了理解。
- en: 'Insight: Cultural context provides insights into the diversity of human experiences
    and viewpoints.'
  id: totrans-4159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 洞察：文化背景提供了对人类经验和观点多样性的洞察。
- en: 'Sensitivity: It promotes cultural sensitivity and awareness, helping to avoid
    misunderstandings and biases.'
  id: totrans-4160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 敏感性：它促进了文化敏感性和意识，有助于避免误解和偏见。
- en: 'How to Ask for Cultural ContextTo effectively ask for cultural context in your
    prompts, consider the following strategies:'
  id: totrans-4161
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求文化背景为了在提示中有效地请求文化背景，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or concept you want to explore
    within a cultural context, ensuring that the AI understands the focus of your
    query.'
  id: totrans-4162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：清楚地陈述你希望在文化背景下探索的主题或概念，确保AI理解你查询的焦点。
- en: 'Specify the Culture: Define the specific culture or cultural group you are
    interested in, including relevant geographic or demographic details.'
  id: totrans-4163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定文化：定义你感兴趣的具体文化或文化群体，包括相关的地理或人口统计细节。
- en: 'Use Direct Language: Use straightforward and direct language to request cultural
    context, ensuring that the AI understands your request.'
  id: totrans-4164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接和清晰的语言请求文化背景，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the cultural analysis.'
  id: totrans-4165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建文化分析的背景或相关信息。
- en: 'Ask for Specific Aspects: Request analysis on specific aspects, such as traditions,
    values, or social norms, to ensure a focused cultural context.'
  id: totrans-4166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求具体方面：请求对具体方面的分析，如传统、价值观或社会规范，以确保文化背景的聚焦。
- en: Examples of Asking for Cultural Context
  id: totrans-4167
  prefs: []
  type: TYPE_NORMAL
  zh: 文化背景提问示例
- en: 'General Prompt: "Explain the benefits of renewable energy." Cultural Context
    Prompt: "Can you provide insights into how the benefits of renewable energy are
    perceived in different cultures, such as in Europe and Asia?"'
  id: totrans-4168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：解释可再生能源的好处。文化背景提示：你能提供关于不同文化（如欧洲和亚洲）如何看待可再生能源好处的见解吗？
- en: 'General Prompt: "Describe the impact of climate change." Cultural Context Prompt:
    "Can you explain how the impact of climate change is viewed in different cultural
    contexts, such as in indigenous communities and urban populations?"'
  id: totrans-4169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：描述气候变化的影响。文化背景提示：你能解释在不同文化背景下（如土著社区和城市人口）如何看待气候变化的影响吗？
- en: 'General Prompt: "What are the key features of a democratic government?" Cultural
    Context Prompt: "Can you discuss how the key features of a democratic government
    are understood and implemented in different cultural settings, such as in Western
    and non-Western countries?"'
  id: totrans-4170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：民主政府的核心特征是什么？文化背景提示：你能讨论在不同文化背景下（如西方和非西方国家）如何理解和实施民主政府的核心特征吗？
- en: Common Pitfalls to Avoid
  id: totrans-4171
  prefs: []
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for cultural context. Be specific
    about what you need to ensure clarity and relevance.'
  id: totrans-4172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊请求：避免对文化背景的模糊或一般性请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    cultural analysis. Provide enough background information to frame the cultural
    context.'
  id: totrans-4173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景可能导致文化分析不完整或不准确。提供足够的背景信息以构建文化背景。
- en: 'Overgeneralization: Avoid overgeneralizing cultural traits or perspectives.
    Recognize the diversity within cultures and provide nuanced analysis.'
  id: totrans-4174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度概括：避免过度概括文化特征或观点。认识到文化内部的多样性，并提供细致的分析。
- en: ConclusionAsking for cultural context is a valuable practice in prompt engineering
    that enhances relevance, understanding, insight, and sensitivity. By identifying
    the topic, specifying the culture, using direct language, providing context, and
    asking for specific aspects, you can ensure that ChatGPT provides accurate and
    relevant cultural context tailored to your needs. Avoiding pitfalls such as vague
    requests, lack of context, and overgeneralization will further improve the effectiveness
    of your interactions with ChatGPT.
  id: totrans-4175
  prefs: []
  type: TYPE_NORMAL
  zh: 结论请求文化背景是提示工程中的一项宝贵实践，它增强了相关性、理解、洞察力和敏感性。通过确定主题、指定文化、使用直接语言、提供背景和请求具体方面，你可以确保ChatGPT提供符合你需求的准确和相关的文化背景。避免诸如模糊请求、缺乏背景和过度概括等陷阱将进一步提高你与ChatGPT互动的有效性。
- en: '* * *'
  id: totrans-4176
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 200: Request Ethical ConsiderationsRequesting ethical considerations
    in your prompts is an important technique in prompt engineering that helps you
    explore the moral and ethical implications of actions, decisions, or events. Ethical
    considerations provide insights that enhance understanding and support informed
    decision-making, especially when dealing with complex or sensitive issues. This
    chapter will explore the importance of requesting ethical considerations and how
    to effectively incorporate this technique into your prompts.Importance of Requesting
    Ethical Considerations'
  id: totrans-4177
  prefs: []
  type: TYPE_NORMAL
  zh: 第200章：请求伦理考量在提示中请求伦理考量是提示工程中的重要技巧，有助于你探索行为、决策或事件的道德和伦理含义。伦理考量提供了增强理解和支持情报决策的见解，尤其是在处理复杂或敏感问题时。本章将探讨请求伦理考量的重要性以及如何有效地将此技巧融入你的提示中。
- en: 'Moral Insight: Ethical considerations provide moral insights that help evaluate
    the rightness or wrongness of actions, decisions, or events.'
  id: totrans-4178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 道德洞察：伦理考量提供了道德洞察力，有助于评估行为、决策或事件的正确性或错误性。
- en: 'Informed Decision-Making: They support informed decision-making by highlighting
    potential ethical dilemmas and consequences.'
  id: totrans-4179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情报决策：它们通过突出潜在的伦理困境和后果，支持情报决策。
- en: 'Understanding: Ethical considerations enhance understanding by exploring the
    broader impact of actions on individuals, communities, and society.'
  id: totrans-4180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解：通过探讨行为对个人、社区和社会的更广泛影响，伦理考量增强了理解。
- en: 'Responsibility: They promote a sense of responsibility and accountability,
    encouraging thoughtful and conscientious behavior.'
  id: totrans-4181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 责任：它们促进责任感与问责感，鼓励深思熟虑和负责任的行为。
- en: 'How to Request Ethical ConsiderationsTo effectively request ethical considerations
    in your prompts, consider the following strategies:'
  id: totrans-4182
  prefs: []
  type: TYPE_NORMAL
  zh: 如何请求伦理考量为了有效地在提示中请求伦理考量，考虑以下策略：
- en: 'Identify the Topic: Clearly state the topic or issue you want to explore from
    an ethical perspective, ensuring that the AI understands the focus of your query.'
  id: totrans-4183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定主题：明确从伦理角度想要探讨的主题或问题，确保AI理解你查询的焦点。
- en: 'Specify the Ethical Aspect: Define the specific ethical aspect you are interested
    in, such as fairness, justice, or rights.'
  id: totrans-4184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确伦理方面：定义你感兴趣的特定伦理方面，如公平、正义或权利。
- en: 'Use Direct Language: Use straightforward and direct language to request ethical
    considerations, ensuring that the AI understands your request.'
  id: totrans-4185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用直接语言：使用直接明了的语言请求伦理考量，确保AI理解你的请求。
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the ethical analysis.'
  id: totrans-4186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供背景：包括任何有助于构建伦理分析的相关背景或信息。
- en: 'Ask for Multiple Perspectives: Request multiple ethical perspectives to explore
    different viewpoints and their respective implications.'
  id: totrans-4187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求多个视角：请求多个伦理视角，以探索不同的观点及其相应的含义。
- en: Examples of Requesting Ethical Considerations
  id: totrans-4188
  prefs: []
  type: TYPE_NORMAL
  zh: 请求伦理考量的例子
- en: 'General Prompt: "Explain the benefits of renewable energy." Ethical Considerations
    Prompt: "Can you discuss the ethical considerations of renewable energy adoption,
    including the impact on local communities and environmental justice?"'
  id: totrans-4189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“解释可再生能源的好处。”伦理考量提示：“你能讨论可再生能源采用的伦理考量，包括对当地社区和环境正义的影响吗？”
- en: 'General Prompt: "Describe the impact of climate change." Ethical Considerations
    Prompt: "Can you provide insights into the ethical implications of climate change
    policies, focusing on the balance between economic growth and environmental protection?"'
  id: totrans-4190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“描述气候变化的影响。”伦理考量提示：“你能提供关于气候变化政策伦理影响的见解，重点关注经济增长与环境保护之间的平衡吗？”
- en: 'General Prompt: "What is artificial intelligence?" Ethical Considerations Prompt:
    "Can you discuss the ethical considerations of artificial intelligence, including
    issues related to privacy, bias, and job displacement?"'
  id: totrans-4191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一般提示：“什么是人工智能？”伦理考量提示：“你能讨论人工智能的伦理考量，包括与隐私、偏见和就业转移相关的问题吗？”
- en: Common Pitfalls to Avoid
  id: totrans-4192
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱
- en: 'Vague Requests: Avoid vague or general requests for ethical considerations.
    Be specific about what you need to ensure clarity and relevance.'
  id: totrans-4193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免模糊请求：避免对伦理考量提出模糊或一般性的请求。确保具体明确，以确保清晰和相关性。
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    ethical analysis. Provide enough background information to frame the ethical considerations.'
  id: totrans-4194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏背景：省略相关背景信息可能导致伦理分析不完整或不准确。提供足够的背景信息以构建伦理考量框架。
- en: 'Ignoring Multiple Perspectives: Focusing on a single ethical perspective can
    limit the analysis. Request multiple perspectives to explore different ethical
    implications and outcomes.'
  id: totrans-4195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视多种观点：专注于单一伦理观点可能会限制分析。请求多个观点以探索不同的伦理影响和结果。
- en: 'ConclusionRequesting ethical considerations is an important practice in prompt
    engineering that enhances moral insight, informed decision-making, understanding,
    and responsibility. By identifying the topic, specifying the ethical aspect, using
    direct language, providing context, and asking for multiple perspectives, you
    can ensure that ChatGPT provides accurate and relevant ethical considerations
    tailored to your needs. Avoiding pitfalls such as vague requests, lack of context,
    and ignoring multiple perspectives will further improve the effectiveness of your
