  - PREF_OL
  type: TYPE_NORMAL
- en: Common Pitfalls to Avoid
  prefs: []
  type: TYPE_NORMAL
- en: 'Vague Requests: Avoid vague or general requests for historical comparisons.
    Be specific about what you need to ensure clarity and relevance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Lack of Context: Omitting relevant context can lead to incomplete or inaccurate
    comparisons. Provide enough background information to frame the historical comparisons.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Overloading with Details: While historical comparisons are useful, providing
    too many details can overwhelm the response. Focus on the most relevant aspects.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ConclusionAsking for historical comparisons is an important practice in prompt
