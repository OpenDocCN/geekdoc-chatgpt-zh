  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples of Requesting Implications
  prefs: []
  type: TYPE_NORMAL
- en: 'General Prompt: "Explain the benefits of renewable energy." Implication Prompt:
