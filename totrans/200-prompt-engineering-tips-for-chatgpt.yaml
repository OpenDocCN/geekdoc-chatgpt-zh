  zh: 结论请求伦理考量是提示工程中的一个重要实践，它增强了道德洞察力、信息化的决策、理解和责任感。通过确定主题、指定伦理方面、使用直接语言、提供背景信息以及寻求多个观点，你可以确保ChatGPT提供符合你需求的准确和相关的伦理考量。避免诸如模糊请求、缺乏背景信息和忽视多个观点等陷阱，将进一步提高你与ChatGPT互动的有效性。
