    "Can you compare the impacts of human activities and natural factors on climate
    change?"'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Common Pitfalls to Avoid
  prefs: []
  type: TYPE_NORMAL
- en: 'Overly Broad Comparisons: Avoid asking for comparisons that are too broad or
