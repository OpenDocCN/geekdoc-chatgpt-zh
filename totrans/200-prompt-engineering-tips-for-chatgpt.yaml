  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Provide Context: Include any relevant context or background information that
    can help frame the future trends.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ask for Implications: Request an explanation of the implications and potential
