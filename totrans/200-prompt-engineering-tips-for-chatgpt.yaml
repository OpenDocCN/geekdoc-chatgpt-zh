  type: TYPE_NORMAL
- en: 'Identify the Topic: Clearly state the topic or issue you want alternative views
    on, ensuring that the AI understands the focus of your query.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Be Specific: Specify any particular aspects or details you are interested in,
