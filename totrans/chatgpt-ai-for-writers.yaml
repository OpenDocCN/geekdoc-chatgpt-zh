  id: totrans-851
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能辅助虚构作品代笔：基于人工智能生成的提纲，开发完整的小说、短篇小说或系列，将基本想法转化为完整的稿件。
- en: 'Writing Workshops and Courses: Offer online courses or workshops teaching writers
