- en: Medical Charts
  prefs: []
  type: TYPE_NORMAL
- en: The first chart I asked GPT to analyze was my EKG chart. I did not inform CPT
    of what type of chart I uploaded. To its credit, ChatGPT was able to discern what
    kind of data it was shown and give a pretty detailed account of my ECG.
  prefs: []
  type: TYPE_NORMAL
- en: '![A graph paper with a graph on it Description automatically generated](image_rsrc1X6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'The image you have uploaded is another electrocardiogram (ECG or EKG). Here''s
    an analysis of this EKG:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Heart Rate: To determine the heart rate, count the number of large squares
    between two successive R waves and use the formula: 300 divided by the number
    of large squares. The rate seems to be regular and within normal limits.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Rhythm: The rhythm appears to be regular, indicated by the consistent interval
    between R waves (R-R interval).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'P Waves: P waves are present before each QRS complex, which is a sign of normal
    atrial depolarization.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'PR Interval: The PR interval seems to be within the normal range (0.12 to 0.20
    seconds).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'QRS Complex: The QRS duration appears to be within the normal range (less than
    0.12 seconds), suggesting normal ventricular depolarization.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'ST Segment: The ST segment is isoelectric (flat), indicating no ST segment
    elevation or depression. This suggests no acute ischemia or infarction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'T Waves: T waves look normal without any inversion or peaking, indicating normal
    ventricular repolarization.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Axis: The QRS axis appears normal, suggesting the electrical activity is moving
    through the heart in the correct direction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Additional Observations: There are no significant pathological Q waves present,
    which can indicate a previous myocardial infarction.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Based on this basic analysis, this EKG appears normal as well. However, a detailed
    interpretation and diagnosis should be provided by a healthcare professional or
    a cardiologist, who can consider the clinical context and provide a thorough evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: Financial Charts
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to try GPT-4’s analysis of financial data. I found a chart of the price
    of silver per ounce for the last five years.
  prefs: []
  type: TYPE_NORMAL
- en: '![A graph of a price Description automatically generated](image_rsrc1X7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: My prompt was, “Perform a quick analysis of the chart.”
  prefs: []
  type: TYPE_NORMAL
- en: 'The response I received:'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Response
  prefs: []
  type: TYPE_NORMAL
- en: The chart appears to be a time series graph showing the price movement of silver
    over a period from January 2018 to around November 2023.
  prefs: []
  type: TYPE_NORMAL
- en: '•      Price Axis: The right vertical axis indicates the price of silver in
    U.S. dollars, ranging from $15.00 to $30.00.'
  prefs: []
  type: TYPE_NORMAL
- en: '•      Time Axis: The horizontal axis at the bottom shows time, starting from
    January 2018 and extending to approximately November 2023.'
  prefs: []
  type: TYPE_NORMAL
- en: '•      Trend: The price of silver has fluctuated over the period. There is
    a significant spike around early to mid-2020, where the price sharply increases,
    reaching close to the peak of $30.00\. After this peak, the price shows volatility
    but appears to trend downward, with some recovery observed towards the end of
    the chart.'
  prefs: []
  type: TYPE_NORMAL
- en: '•      Contextual Options: Along the top of the chart are options to compare
    silver''s performance with other financial indicators or commodities such as the
    US Dollar, Dow Jones, S&P 500, Crude Oil, and Bitcoin. These options are not selected,
    so only silver''s performance is displayed.'
  prefs: []
  type: TYPE_NORMAL
- en: '•      Notable Features:'
  prefs: []
  type: TYPE_NORMAL
- en: •      The shaded area under the line graph represents the volume or another
    secondary metric, but it's not clearly labeled, so its exact meaning is unknown.
  prefs: []
  type: TYPE_NORMAL
- en: •      The graph shows that the price has not returned to the peak levels seen
    in 2020 but has had several peaks and troughs, indicating periods of both increased
    and decreased prices.
  prefs: []
  type: TYPE_NORMAL
- en: For a more comprehensive analysis, one would need additional data like trading
    volumes, related news events, and economic conditions that could explain the price
    movements. This graph alone does not provide enough context to determine the causes
    of the price changes.
  prefs: []
  type: TYPE_NORMAL
- en: Predict
  prefs: []
  type: TYPE_NORMAL
- en: 'Being the smartie pants that I am, I ask ChatGPT to predict the price of silver
    next month based on the chart. ChatGPT declined with a long-winded response that
    started with this:'
  prefs: []
  type: TYPE_NORMAL
- en: Predicting the future price of silver based on a chart without considering additional
    information such as market trends, economic indicators, and geopolitical events
    would be speculative. The price of commodities like silver can be influenced by
    a multitude of factors, including supply and demand dynamics, currency movements,
    interest rates, investment trends, and broader economic conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Fair enough. I went further than this and provided more information to the AI
    to get it to make a prediction. But for the purposes here I feel looking at legal
    contracts is a better application for writers.
  prefs: []
  type: TYPE_NORMAL
- en: Legal Documents
  prefs: []
  type: TYPE_NORMAL
- en: Legal contracts involving usage, rights, and licensing can be downright lengthy
    and intimidating. I’m not saying to replace your lawyer with an AI, but you can
    use an AI to help understand these legal documents.
  prefs: []
  type: TYPE_NORMAL
- en: I downloaded the “Steelfish” font from Frontspring. The font is free and licensed
    through an End User License Agreement (EULA).
  prefs: []
  type: TYPE_NORMAL
- en: '![A black text on a white background Description automatically generated](image_rsrc1X8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The EULA document, if printed, would be five full pages long.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.fontspring.com/lic/w1mv09gzoy](https://www.fontspring.com/lic/w1mv09gzoy)'
  prefs: []
  type: TYPE_NORMAL
- en: What I did was copied the EULA document. I asked the AI a question in the prompt,
    then pasted the document.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: According to the following font rights, may I use this font on a book cover?
  prefs: []
  type: TYPE_NORMAL
