  type: TYPE_NORMAL
- en: Chapter 19 - Basic Book Marketing Research
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A room with shelves of books Description automatically generated](image_rsrc1XA.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This chapter is for those writers who plan to use AI to help write and illustrate
    their books.
  prefs: []
  type: TYPE_NORMAL
- en: With the increase of AI assistance for writing, creating a book for publication
    has become easier. But just because you can create a book doesn't necessarily
    mean you should. Even with AI assistance, writing a book still takes time, effort,
    and money.
  prefs: []
  type: TYPE_NORMAL
- en: While my example topic in this chapter is a children's book, the procedure and
    process are the same for any book topic from AI Imaging to Xylophones – how to
    make one for your child.
  prefs: []
  type: TYPE_NORMAL
- en: Positive ROI
  prefs: []
  type: TYPE_NORMAL
- en: A positive ROI (Return On Investment) is not required to write a book. For example,
    you have a burning desire to write a book, for whatever reason, and it's without
    regard to a financial payback from book sales. No law requires a profit motive
    for writing and publishing a book, so writing your not-for-profit book is okay.
    (It may be your best writing ever.)
  prefs: []
  type: TYPE_NORMAL
- en: In this case, realize you're writing for personal satisfaction and should be
    prepared to sell five copies of your book to friends and family and be happy with
    that result. If not, it will be disappointing after investing your time, energy,
    and money to write a book, to discover no one wants to read it. There is a "no
    market" or a "small market." audience; yikes! How much better it would have been
    to learn that before putting pen to paper, so to speak.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to reduce your chances of writing a book for a no-market to a small-market
    audience, I recommend your first step is to check if there is an audience for
    your book.
  prefs: []
  type: TYPE_NORMAL
- en: It also helps if you have a variety of topics you would like to write on. This
    allows you to choose a topic with hopefully a large audience with little competition.
  prefs: []
  type: TYPE_NORMAL
- en: Start by performing a little preexisting marketing research by looking at books
    similar to the book(s) you want to create.
  prefs: []
  type: TYPE_NORMAL
- en: Granted, this is not an extensive look at the book marketing research. It is
    simplistic and rudimentary. However, it suffices for my uses here for my first
    children's book. I used Amazon.Com as my resource. Going on to Amazon's website,
    I first searched for "Children's books." Amazon returned over 80,000 hits. Obviously,
    this is a big market with intense competition. Next, I searched for books on the
    topic of "roman architecture.” Amazon returned 3000 hits. Smaller market and less
    competition. If I narrow the niche to "Pre-Christian Roman architecture," Amazon
    returned seven hits. Small market with little competition.
  prefs: []
  type: TYPE_NORMAL
- en: Since my topic is children's books, I searched Amazon for the top ten children's
    books for ages three to five.
  prefs: []
  type: TYPE_NORMAL
- en: The information I gathered from the books listed were cost, book size, number
    of pages, review stats, and Amazon Sales Rank. Many of the books didn't offer
    a look inside. I wanted to look inside to see how they formatted the pages.
  prefs: []
  type: TYPE_NORMAL
- en: Sizes varied all over the place but generally between 5" x 7" to 9" x 10". The
    page count was low, between 24 and 36 pages. Nevertheless, we had some killer
    review stats. "The Very Hungry Caterpillar" by Eric Carle racked up over 54,000
    reviews. My kid's favorite, "Goodnight Moon" by Margaret Wise Brown and Clement
    Hurd had a respectable 24,000 reviews plus. A newer book, "The Leaf Thief", by
    Alice Hemming  (Author), Nicola Slater  (Illustrator), is doing very well in this
    space. (It doesn't hurt to steer by the stars.)
  prefs: []
  type: TYPE_NORMAL
- en: Another critical fact to ascertain is how many books are sold in your preexisting
    market, for this you can use Amazon's "Best Seller Ranking."
  prefs: []
  type: TYPE_NORMAL
- en: Amazon Sales Rank Calculator
  prefs: []
  type: TYPE_NORMAL
- en: Several websites offer an "Amazon Sales Rank Calculator." The sales rank calculator
    will provide the approximate sales based on Amazon's "Best Seller Rank" (BSR)
    in the book's “Product Details". The link below is to a sales rank calculator
    but there are other sites you may use as well.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://bookbird.io/tools/sales-calculator](https://bookbird.io/tools/sales-calculator)/'
  prefs: []
  type: TYPE_NORMAL
- en: The following illustration show two children's books, "The Leaf Thief" and "The
    Very Hungry Caterpillar." Please note these are print books and not ePub or Kindle
    versions.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a website Description automatically generated](image_rsrc1XB.jpg)'
  prefs: []
  type: TYPE_IMG
- en: By putting Amazon's Best Seller's Rank into the calculator, we can see the average
    books sold per day and per month.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a calculator Description automatically generated](image_rsrc1XC.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Kindle is Easy, but Print may be Better
  prefs: []
  type: TYPE_NORMAL
- en: Kindle and eBooks are easier to produce and publish. I'm not saying for you
    not to create a Kindle eBook, that's easy enough to do. I do recommend multiple
    platforms. But with a children's book, a tangible print book may be the better
    ticket for reading stories to children. Compare the sales ranking for Print vs
    Kindle for "The Very Hungry Caterpillar."
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1XD.jpg)'
  prefs: []
  type: TYPE_IMG
- en: For children's books, print is a better option for sales. With Amazon Print
    On Demand (POD) you have an obstacle with these style books. Amazon print books
    require a minimum page count of 72 pages.
  prefs: []
  type: TYPE_NORMAL
- en: IngramSpark can print books with as few as 18 pages.
  prefs: []
  type: TYPE_NORMAL
- en: A quick note on our “Roman Architecture” books, you can use their Amazon Best
    Seller rank, to determine the books sold in these smaller markets.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating Book Printing Cost
  prefs: []
  type: TYPE_NORMAL
- en: I like IngramSpark. You can print, publish and distribute eBooks and print books
    through this company. They offer a virtual online library of information on publishing
    your book.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.ingramspark.com/plan-your-book/print/print-on-demand](https://www.ingramspark.com/plan-your-book/print/print-on-demand)'
  prefs: []
  type: TYPE_NORMAL
- en: The following link is a cost calculator for Print Books by IngramSpark. They
    can print books that range in page count in multiples of 2 pages from 18 to 1200.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://myaccount.ingramspark.com/Portal/Tools/ShippingCalculator](https://myaccount.ingramspark.com/Portal/Tools/ShippingCalculator)'
  prefs: []
  type: TYPE_NORMAL
- en: The following link is the cost calculator for KDP POD for hardcover and softcover
    books.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://kdp.amazon.com/en_US/help/topic/GSQF43YAMUPFTMSP](https://kdp.amazon.com/en_US/help/topic/GSQF43YAMUPFTMSP)'
  prefs: []
  type: TYPE_NORMAL
- en: General Guidelines for Selling Print Books on Amazon
  prefs: []
  type: TYPE_NORMAL
- en: Amazon requires a 40% discount off the retail price for softcover books printed
    using its Print On Demand (POD) service. The POD cost is typically a bit higher
    than what you can pay to have the books printed by a book printer. You can use
    Amazon’s POD service inside your KDP account.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, if you wish to sell your own printed books on Amazon, you
    must open an Amazon Advantage account (that’s different from your KDP account).
    Using your Amazon Advantage account, you can submit your printed book to be sold
    on Amazon. Amazon must approve the book. Using this avenue, Amazon requires a
    55% discount off the retail price of the book, and Amazon does not pay for the
    shipping of the book to the Amazon warehouse.
  prefs: []
  type: TYPE_NORMAL
- en: Amazon will issue you a purchase order for your book. If the book is only selling
    a few copies, Amazon will only purchase a few copies at a time. Mailing or shipping
    one or two books at a time can be prohibitive, depending on your printing costs
    and profit margin.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is an introduction to book marketing. Consider it an excursion
    into switching from your book creator's hat to your book business hat. This is
    not meant to be a comprehensive tutorial on book marketing and book production.
    It is meant to be an eye-opener, to give you the insight to put on your business
    hat when planning a book for publication.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 20 - Monetize This Book’s Information
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A cellphone on top of money Description automatically generated](image_rsrc1XE.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Basics of the Gig Economy
  prefs: []
  type: TYPE_NORMAL
- en: It’s difficult to find a “niche” market that’s not being serviced and then to
    service that market. Success can be found in broader markets by finding a unique
    spin on a service or product that people are already making money doing.
  prefs: []
  type: TYPE_NORMAL
- en: Save Your Customer's Time
  prefs: []
  type: TYPE_NORMAL
- en: I stated that using AI enhances one’s output and essentially provides its users
    with more time—our most valuable commodity. In keeping with that idea, a side
    hustle that saves your customers time will (in my opinion) have a greater chance
    of success.
  prefs: []
  type: TYPE_NORMAL
- en: A friend asked me, why would he hire an individual to create comic book illustrations
    using AI, when he could run prompts into a text-to-art AI and do it himself.
  prefs: []
  type: TYPE_NORMAL
- en: There are multiple reasons to hire another person, beginning with talent and
    experience. You develop experience as you work with text-to-art AI’s. It’s a challenge
    to keep and direct the same character running through different panels. I suggested
    if this became a real project for him he’d be better served focusing on writing
    the narrative and dialog than the artwork. He remained unconvinced, but that’s
    his inexperience.
  prefs: []
  type: TYPE_NORMAL
