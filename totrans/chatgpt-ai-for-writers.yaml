- en: Introduction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Artificial Intelligence (AI) has been used in writing programs for years. Writers
    are familiar with grammar checkers like Grammarly, Quill Bot, Prowriting Aid,
    Hemingway, etc. Recently, Generative AI took a quantum leap forward. These newer
    AIs are creating a paradigm shift in writing—so much so that some writers and
    their unions are afraid these AIs will demonetize their writing skills and put
    them out of work.
  prefs: []
  type: TYPE_NORMAL
- en: I feel writers who are afraid of using AI will be replaced by writers who do
    use AI. I recommend to writers to harness AI to enhance their creativity and increase
    their productivity.
  prefs: []
  type: TYPE_NORMAL
- en: '![A collage of images of writing and writing Description automatically generated](image_rsrc1TT.jpg)'
  prefs: []
  type: TYPE_IMG
- en: While the future of AI is unlimited, currently AI works better in some applications
    than others. Some AI platforms work better at some applications than other AI
    platforms. For instance, Perplexity.ai can search the internet for the latest
    news and research better than OpenAI’s ChaptGPT. That fact may change in the future,
    but for now, when I research topics, Perplexity is my go-to AI.
  prefs: []
  type: TYPE_NORMAL
- en: Try everything to see what works for you. Because AI continues to evolve, a
    task that doesn’t work well today may work perfectly six months from now.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 1 – AI-Assisted Writing - Copyright & IP Ownership
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I use AI to edit and improve my writing. I do not use AI to write my books and
    short stories. Although I have seen many AI instructors advocate this exact use.
  prefs: []
  type: TYPE_NORMAL
- en: '![Close-up of a book with text Description automatically generated](image_rsrc1TU.jpg)'
  prefs: []
  type: TYPE_IMG
- en: For some writers, working with AI tools comes with mixed feelings. The allure
    of using these platforms to brainstorm, outline, or draft is undeniable, yet they
    are concerned about creative ownership of their work. Lately the issue of data
    privacy and concern that AI has the potential to steal creative ideas. Let us
    look at these two issues further.
  prefs: []
  type: TYPE_NORMAL
- en: Copyright and AI-Assisted Writing
  prefs: []
  type: TYPE_NORMAL
- en: The question of whether AI-generated content can be copyrighted is currently
    being debated in courtrooms around the world. These court rulings will help set
    legal precedents, and new legislation may follow based on these rulings, but for
    now, this is how I see the copyright status of AI-generated and AI-assisted content.
  prefs: []
  type: TYPE_NORMAL
- en: I am not a lawyer; this material on copyrights is based on my own research and
    opinion and should not be taken as legal advice.
  prefs: []
  type: TYPE_NORMAL
- en: Copyright Basis
  prefs: []
  type: TYPE_NORMAL
- en: Copyright is granted automatically once your art is fixed in tangible form. This
    is true whether you render a piece of art, write a story, write a song, or record
    a piece of music. Copyright is an “automatic right.” However, it is much easier
    to prove you are a legitimate copyright owner if you register your work with the
    US Government.
  prefs: []
  type: TYPE_NORMAL
- en: Why You Should Register Copyright Your Creative Work
  prefs: []
  type: TYPE_NORMAL
- en: To register your work with the US government, you will need to fill out an application,
    pay a filing fee, and provide a copy of the work. The copyright office will examine
    your application to ensure the work is eligible for copyright protection. If so,
    you will get an official “Certificate of Registration.”
  prefs: []
  type: TYPE_NORMAL
- en: Registered copyright protection makes it easier to pursue legal recourse if
    anyone uses your work without your consent. If someone tries to use your creative
    work without permission, you can bring them to court for copyright infringement.
  prefs: []
  type: TYPE_NORMAL
- en: Some Believe AI Creative Work is Not Copyrightable
  prefs: []
  type: TYPE_NORMAL
- en: The idea that AI-rendered work is not copyrightable may come from the following
    text in the US Government’s regulations on copyright.
  prefs: []
  type: TYPE_NORMAL
- en: '![A close up of a document Description automatically generated](image_rsrc1TV.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Government Copyrightable Authorship
  prefs: []
  type: TYPE_NORMAL
- en: 'This text is on chapter 300, page 7 of the US Government’s “Copyrightable Authorship:
    What Can Be Registered,” see the link below.'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.copyright.gov/comp3/chap300/ch300-copyrightable-authorship.pdf](https://www.copyright.gov/comp3/chap300/ch300-copyrightable-authorship.pdf)'
  prefs: []
  type: TYPE_NORMAL
- en: By following the strict letter of the law as stated by the US Government, the
    AI-rendered work can be modified by you, which invokes human authorship of the
    work, and thus, it becomes copyrightable.
  prefs: []
  type: TYPE_NORMAL
- en: Modification of AI Rendered Work
  prefs: []
  type: TYPE_NORMAL
- en: Any meaningful modification of the AI-rendered work can create human authorship. Thereby
    making the work “AI-assisted” rather than “AI-generated.” AI-assisted creative
    work is copyrightable.
  prefs: []
  type: TYPE_NORMAL
- en: Registered Copyrights For Me and You
  prefs: []
  type: TYPE_NORMAL
- en: Yes, you can copyright your AI-assisted content.
  prefs: []
  type: TYPE_NORMAL
- en: As a writer looking to copyright your work, it’s crucial to understand these
    nuances and be vigilant when incorporating AI into your creative work. To keep
    your creative work copyrightable, my suggestion is to use AI as your writing assistant
    and collaborator and NOT as a sole content generator.
  prefs: []
  type: TYPE_NORMAL
- en: Stealing Your Ideas
  prefs: []
  type: TYPE_NORMAL
- en: Another concern some writers have in using AI is stealing your writing ideas.
    Most AI platforms, including ChatGPT and Perplexity, retain user conversations
    for a period of time—even after a session ends. While users can often delete their
    conversations, it doesn’t necessarily mean the data is entirely erased from the
    company’s internal systems. In some cases, conversations may still be used in
    a limited way to help improve the AI model. For writers, ideas are precious, and
    understanding where those ideas might travel is essential.
  prefs: []
  type: TYPE_NORMAL
- en: Some of us, myself included, intentionally allow our conversations with AI to
    remain stored. This lets me revisit discussions to ask follow-up questions or
    spin off fresh ideas from previous sessions.
  prefs: []
  type: TYPE_NORMAL
- en: How much control do we have over our ideas and data once they’re in the hands
    of a third-party system?
  prefs: []
  type: TYPE_NORMAL
- en: Ethical AI companies have policies aimed at protecting user data and intellectual
    property. Still, the legal landscape surrounding AI and creativity remains murky.
    Despite a company’s best intentions, training data for these models might still
    contain copyrighted material or generate ideas strikingly similar to those of
    another user. This isn't necessarily due to malicious intent; rather, it’s an
    inherent risk of how AI is developed.
  prefs: []
  type: TYPE_NORMAL
- en: It’s also worth noting that, even if a specific conversation remains private,
    the AI may produce comparable ideas for other users based on patterns from its
    training data. For writers, this means approaching AI tools with a sense of both
    opportunity and caution. The benefits are considerable, but so are the potential
    risks to idea ownership and privacy.
  prefs: []
  type: TYPE_NORMAL
- en: In the end, writers must weigh the creative advantages AI can offer against
    the possible impacts on their intellectual property. By understanding the issues
    involved, you can make an informed decision to use (or not use) AI as a creative
    partner. For myself, I am not concerned with my AI conversation being used as
    training data.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2- AI is a Writer’s Toolbox
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![An open book with glowing pages Description automatically generated](image_rsrc1TW.jpg)'
  prefs: []
  type: TYPE_IMG
- en: AI can augment and amplify your personal and business writing skills. In many
    ways, AI surpasses the definition of a tool and may be thought of as a partner
    and collaborator.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fiction Writing:'
  prefs: []
  type: TYPE_NORMAL
- en: AI will supercharge your writing process. AI can help generate ideas, plots,
    plot twists, and characters and rephrase and rewrite text to improve your writing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Non-Fiction Writing:'
  prefs: []
  type: TYPE_NORMAL
- en: AI can do everything mentioned above, plus assist in developing non-fiction
    ideas and creating outlines, summarizing text, research, and reference lookups.
  prefs: []
  type: TYPE_NORMAL
- en: Business Writing & Reports
  prefs: []
  type: TYPE_NORMAL
- en: AI can assist in generating business reports from data and writing company emails
    and product sales copy.
  prefs: []
  type: TYPE_NORMAL
- en: Blogs
  prefs: []
  type: TYPE_NORMAL
- en: Blogs and article writing become so much easier when you have an AI to assist
    you with writing and researching.
  prefs: []
  type: TYPE_NORMAL
- en: Vision OCR and Reading Charts
  prefs: []
  type: TYPE_NORMAL
- en: AI Vision's capabilities can read and interpret charts and financial reports.
    It can summarize articles, read legal documents, and help you interpret the text.
    See Chapter 14.
  prefs: []
  type: TYPE_NORMAL
- en: Psychology and Character Development
  prefs: []
  type: TYPE_NORMAL
- en: You can bounce personal feelings and characters' interpersonal relationships
    to the AI for feedback.
  prefs: []
  type: TYPE_NORMAL
- en: AI is so competent in psychology that shortly, I expect AI to augment human
    therapists or become competent clinical social workers themselves. Humans may
    trust their AI therapist more than their human counterparts.
  prefs: []
  type: TYPE_NORMAL
- en: Putting this aspect of AI will improve your characters' realism and motivation.
  prefs: []
  type: TYPE_NORMAL
- en: Book Contracts & Legal Documents
  prefs: []
  type: TYPE_NORMAL
- en: AI is not a lawyer but can easily pass any bar exam. It can be used to read
    and explain legal documents and terminology. AI can provide insight into copyright,
    licenses, book, and article contracts.
  prefs: []
  type: TYPE_NORMAL
- en: It can also write simple legal documents. The boilerplate photography releases
    available online were too bulky and detailed for my simple transaction. So, I
    asked my AI to write a photograph release. In the first round, the AI gave me
    a three-page release. That was still too much legalize. I asked the AI to reduce
    it to one page. It performed and gave me the bare-bone release I needed with the
    extra-legal verbiage.
  prefs: []
  type: TYPE_NORMAL
- en: Poems, Song & Music Writing
  prefs: []
  type: TYPE_NORMAL
- en: AI can write poetry, songs, and music. I don’t expect a Grammy winner to thank
    his AI for his hit song, but that doesn’t mean it hasn’t happened.
  prefs: []
  type: TYPE_NORMAL
- en: Translation
  prefs: []
  type: TYPE_NORMAL
- en: Provide your AI with text, and the AI can translate that text into any number
    of languages or translate foreign languages into English.
  prefs: []
  type: TYPE_NORMAL
- en: Writing Tutor
  prefs: []
  type: TYPE_NORMAL
- en: The AI can tutor you in many subjects, including English. AI can act like a
    grammar checker, thesaurus, and dictionary and offer word alternatives.
  prefs: []
  type: TYPE_NORMAL
- en: Problem Solving – Working with Hemingway
  prefs: []
  type: TYPE_NORMAL
- en: If you have a thorny plot problem or writing issue, you can work it through
    with the AI acting like one of your favorite or famous writers. Imagine working
    with a Hemingway AI or Fitzgerald AI on a plot point.
  prefs: []
  type: TYPE_NORMAL
- en: Research
  prefs: []
  type: TYPE_NORMAL
- en: The latest iteration of AIs has access to the Internet. This means they can
    help you with research and history.
  prefs: []
  type: TYPE_NORMAL
- en: Everyday Miscellaneous Issues
  prefs: []
  type: TYPE_NORMAL
- en: I turn to AI to help me solve minor issues. In the last few days, I have asked
    it how to add a heart to an iPhone text message, explain the difference between
    the hot, common, and ground in a home AC power system, draw a simple op-amp amplifier
    using a 741 op-amp, and generate a text-to-art prompt based on a picture I uploaded
    to the AI. The AI helped me troubleshoot unlocking the screen rotation on my iPad.
  prefs: []
  type: TYPE_NORMAL
- en: What more would you want from a writing assistant?
  prefs: []
  type: TYPE_NORMAL
- en: Remember, AI can be many things, it can be a tool, your assistant, and your
    collaborator.
  prefs: []
  type: TYPE_NORMAL
- en: Copyrights - Authenticity of Originality
  prefs: []
  type: TYPE_NORMAL
- en: This question was answered in Chapter 1.
  prefs: []
  type: TYPE_NORMAL
- en: Most writers are already using AI augmentation. Sophisticated writing tools,
    like Grammarly, Quill Bot, and spell checkers, use AI. I believe that when AI
    is used as a tool rather than a content creator, you are still the creator, and
    your work is authentic to you and copyrightable.
  prefs: []
  type: TYPE_NORMAL
- en: GPT4o is one of Many.
  prefs: []
  type: TYPE_NORMAL
- en: GPT is the acronym for "Generative Pre-trained Transformer." This language model
    has been trained on a large amount of text (deep learning) to produce results
    that mimic human writing. When you add the word "Chat" to GPT, you get "ChatGPT,"
    which is a chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: There are many AI platforms on the market. ChatGPT from OpenAI is one of the
    most recognizable; it may not be the best in every application.
  prefs: []
  type: TYPE_NORMAL
- en: GPT4o is a powerful AI tool that will help you create great content. In this
    book, I will demonstrate with examples how to use these AIs effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 3 -Opening an AI Account
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A person looking at a message Description automatically generated with medium
    confidence](image_rsrc1TX.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You have many options when it comes to choosing an AI. I will use OpenAI as
    a primary example. Near the end of the chapter, alternative AI’s are listed.
  prefs: []
  type: TYPE_NORMAL
- en: Signing Up for ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Go to:  [https://chat.openai.com](https://chat.openai.com)'
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with black text Description automatically generated](image_rsrc1TY.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Register for an account using your email address and create a password; see
    image below.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a login form Description automatically generated](image_rsrc1TZ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You can use ChatGPT3 for free, which is the best way to start. When ready, you
    can upgrade to ChatGPT4 for $20.00 per month. At this subscription level, you
    have access to GPT4o (omni), a higher-level AI model with better creativity.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U0.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Once your account is created and your email verified, you can access the ChatGPT
    AI.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT4 is considered the legacy model. New iterations of ChatGPT are GPT-40,
    GPT4o Omni, 01 preview, GPT-40 with Canva, and 01-mini.
  prefs: []
  type: TYPE_NORMAL
- en: More AI Bots
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s ChatGPT is probably the most familiar of the Chatbots, but numerous
    alternatives exist. Most AI bots have similar sign-on procedures and typically
    a free version for people to try.
  prefs: []
  type: TYPE_NORMAL
- en: Twitter X Grok
  prefs: []
  type: TYPE_NORMAL
- en: Grok.ai is available to premium members of Twitter X. As of this writing, the
    monthly cost for access is $16.00 per month. Grok's unique advantage lies in its
    ability to provide unbiased information on politically charged topics, such as
    climate change, immigration, and green energy costs, without being influenced
    by politically correct thinking. This gives users a more objective and factual
    perspective on these issues, fostering a more informed and open dialogue.
  prefs: []
  type: TYPE_NORMAL
- en: Perplexity
  prefs: []
  type: TYPE_NORMAL
- en: The free version of Perplexity.ai can be accessed here.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.perplexity.ai/](https://www.perplexity.ai/)'
  prefs: []
  type: TYPE_NORMAL
- en: The pro version costs $20.00 per month.
  prefs: []
  type: TYPE_NORMAL
- en: What is exceptional about this AI, is that it does an extensive web search to
    answer the question. It provides the reference URLs to its answer. AIs are adding
    web searches so that up-to-date information can be accessed.
  prefs: []
  type: TYPE_NORMAL
- en: AI Aggregators – Futurepedia, Gmtech, Magai, Edenai
  prefs: []
  type: TYPE_NORMAL
- en: The One Service To Include Them All
  prefs: []
  type: TYPE_NORMAL
- en: There are AI aggregators services that allow their users to access and use a
    wide variety of LLM and Image Generators for one monthly cost.
  prefs: []
  type: TYPE_NORMAL
- en: Basic services start at $14.99 per month. Accessing an AI costs a fractional
    amount, typically around $0.01 per AI response. Each service has its unique plan.
    So you need to visit the AI site to get its particulars.
  prefs: []
  type: TYPE_NORMAL
- en: This money is deducted from your credits. Additional credits can be purchased
    if you exceed your $5.00 monthly allocation.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://gmtech.com/](https://gmtech.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: Below is a screenshot image of their current AI integrations.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: To reach Magai
  prefs: []
  type: TYPE_NORMAL
- en: '[https://magai.co/](https://magai.co/)'
  prefs: []
  type: TYPE_NORMAL
- en: Magai provides access to over 16 large language models, and more than 5 AI image
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 'To reach Futurepedia:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.futurepedia.io/](https://www.futurepedia.io/)'
  prefs: []
  type: TYPE_NORMAL
- en: 'To reach Eden AI:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.edenai.co/](https://www.edenai.co/)'
  prefs: []
  type: TYPE_NORMAL
- en: You may want to search for new AI aggregators, as more services are showing
    up all the time. These services offer users access to various AI platforms for
    one monthly price.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 4 - Crafting Prompts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using AI effectively involves crafting prompts that communicate with the AI
    in such a manner as to obtain your desired results.
  prefs: []
  type: TYPE_NORMAL
- en: '![A blue and purple background with a blue line Description automatically generated
    with medium confidence](image_rsrc1U2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This book will guide you to write effective prompts for writing. Writing prompts
    for financial analysis, physics, and astronomy would require a different methodology
    that what is outline here.
  prefs: []
  type: TYPE_NORMAL
- en: Crafting effective prompts is a learnable skill.
  prefs: []
  type: TYPE_NORMAL
- en: Prompts
  prefs: []
  type: TYPE_NORMAL
- en: I don’t think anyone would argue that crafting prompts is the key to unleashing
    the power of AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use ChatGPT AI to do any of the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 - Generate book ideas based on a topic.
  prefs: []
  type: TYPE_NORMAL
- en: 2 - Generate fiction book outlines.
  prefs: []
  type: TYPE_NORMAL
- en: 3 - Generate book titles.
  prefs: []
  type: TYPE_NORMAL
- en: 4 - Summarize text
  prefs: []
  type: TYPE_NORMAL
- en: 5 - Rewrite and improve text.
  prefs: []
  type: TYPE_NORMAL
- en: 6 - Help create book characters.
  prefs: []
  type: TYPE_NORMAL
- en: 7 - Generate non-fiction outlines (solar, wind energy, etc.)
  prefs: []
  type: TYPE_NORMAL
- en: 8 - Generate character descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: 9 - Generate pros and cons of decisions or ideas.
  prefs: []
  type: TYPE_NORMAL
- en: 10 - Generate lists.
  prefs: []
  type: TYPE_NORMAL
- en: 11 - Generate poems
  prefs: []
  type: TYPE_NORMAL
- en: 12 – Generate songs
  prefs: []
  type: TYPE_NORMAL
- en: 13 – Critique and give feedback on your story/text.
  prefs: []
  type: TYPE_NORMAL
- en: 14 – Problem-solving - Help with police procedures etc.
  prefs: []
  type: TYPE_NORMAL
- en: 15 - Language translations
  prefs: []
  type: TYPE_NORMAL
- en: 16 - Generate prompts for Text to Art AI.
  prefs: []
  type: TYPE_NORMAL
- en: 17 - Personal Instructor for learning
  prefs: []
  type: TYPE_NORMAL
- en: 18 - Write emails – personal and business
  prefs: []
  type: TYPE_NORMAL
- en: 19 - Craft response – business and personal
  prefs: []
  type: TYPE_NORMAL
- en: 20 - Act as a tutor when taking online learning classes
  prefs: []
  type: TYPE_NORMAL
- en: 21 - Offer insight into your character's behavior.
  prefs: []
  type: TYPE_NORMAL
- en: The above list is only a fraction of AI capabilities. Many of the prompts we
    touch upon in this chapter are explored in greater detail in the following chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Classifications - Open, Fixed and Conversation (Chat)
  prefs: []
  type: TYPE_NORMAL
- en: Open - Open prompts allow the AI to generate the most creative responses. For
    example,  “Write 300 words on the advantages of Solar Energy.” The topic can vary,
    such as the best foods for diabetics, diets, etc.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT did an excellent job writing 300 words on the advantages of solar energy.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fixed - This prompt asks for a specific fact or facts. For example, “Who was
    the third President of the United States?” Keep in mind that the AI can hallucinate
    facts and data, so remember to double-check its data output.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Chat - Creating a character response with ChatGPT. In this scenario, my 13-year-old
    character, Tommy, has a problem Explaining to his doctor dad why he failed a biology
    test. I asked ChatGPT to give me a few ideas of how a character may respond to
    a dilemma. ChatGPT provided six possible options.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Jumping Off From Any Branch
  prefs: []
  type: TYPE_NORMAL
- en: You can use any one of those AI response ideas as a jumping-off point, or those
    suggestions could even trigger your imagination for a completely different response
    you may want to pursue.
  prefs: []
  type: TYPE_NORMAL
- en: It’s Not Just One (Bite of the Apple) Prompt
  prefs: []
  type: TYPE_NORMAL
- en: I see many people writing prompts and ending the conversation with AI after
    one prompt. No. You can continue asking and refining your question and drilling
    down until YOU are satisfied with the answer.
  prefs: []
  type: TYPE_NORMAL
- en: You can continue to ask the AI multiple questions to clarify or simplify its
    answer.
  prefs: []
  type: TYPE_NORMAL
- en: In the above example, suppose you wanted to pursue the “Avoidance” scenario.
    You could ask the AI to fill out the idea with the potential consequences for
    Tommy for taking this action.
  prefs: []
  type: TYPE_NORMAL
- en: If the AI’s response is too vague, drill down with additional prompts asking
    for greater detail.
  prefs: []
  type: TYPE_NORMAL
- en: Talk To Me, Formal – Informal
  prefs: []
  type: TYPE_NORMAL
- en: You can direct the AI to write responses in a formal, academic manner.
  prefs: []
  type: TYPE_NORMAL
- en: Or you can ask the AI to respond in a friendly, informal manner. I would shy
    away from AI jokes and AI sarcasm. The last time I checked, the AI hasn’t evolved
    to the point where that can be pulled off credibly.
  prefs: []
  type: TYPE_NORMAL
- en: Positive and Confident
  prefs: []
  type: TYPE_NORMAL
- en: I like my AI to be positive and confident. But I wouldn’t want to ask my AI
    to be “Positive & Confident” at the beginning of every conversation. Here is where
    you can implement GPT’s.
  prefs: []
  type: TYPE_NORMAL
- en: I devoted a full chapter to how to create GPT’s and what they are. Think of
    them as a procedural prompt script that is saved to the OpenAI server and can
    be called by you at any time.
  prefs: []
  type: TYPE_NORMAL
- en: In general, the quality of the AI’s response is proportional to the quality
    of your prompt. The following are a bunch of quick-start tips for writing effective
    prompts. Many of these tips have full chapters devoted to exploring its use.
  prefs: []
  type: TYPE_NORMAL
- en: Segmenting AI’s Large Knowledge Base
  prefs: []
  type: TYPE_NORMAL
- en: The AI has a tremendously large knowledge database. We can obtain better responses
    by telling the AI we want it to segment its knowledge to an area we are interested
    in. Many prompts of this type begin with the famous “As an expert [ you name the
    topic].
  prefs: []
  type: TYPE_NORMAL
- en: Establish a Persona For The AI
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the “As an expert” prompt, we can prompt the AI to assume a Persona.
    This persona could be a doctor, detective, marine, cop, astronaut, dock worker,
    etc. In writing, you can ask the AI to assume a persona and to respond or ask
    how the persona would react in your fictional situation.
  prefs: []
  type: TYPE_NORMAL
- en: Establish Your Audience
  prefs: []
  type: TYPE_NORMAL
- en: It can be necessary for the AI to know its audience. Explaining a medical issue
    to an adolescent is different than to an adult and different from other medical
    professionals.
  prefs: []
  type: TYPE_NORMAL
- en: Establishing the AIs Tonality
  prefs: []
  type: TYPE_NORMAL
- en: We touched up this before. Do we want the AI to respond in a neutral, formal,
    informal, friendly, and confident manner?
  prefs: []
  type: TYPE_NORMAL
- en: Background
  prefs: []
  type: TYPE_NORMAL
- en: Giving the AI some set-up and setting will improve its response. Imagine the
    difference in a marine’s response when fighting in a jungle, urban city, or spaceport
    50 light years from the Earth.
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating this information into your prompt, the AI’s response will be
    focused and on target.
  prefs: []
  type: TYPE_NORMAL
- en: Keys to Creating Great Prompts-      Wash, Rinse, and Repeat
  prefs: []
  type: TYPE_NORMAL
- en: 1) Write your prompt in the text box and hit send.
  prefs: []
  type: TYPE_NORMAL
- en: 2) ChatGPT will process your prompt and write its response in the chat area.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Analyze ChatGPT’s response
  prefs: []
  type: TYPE_NORMAL
- en: 4) Refine your original prompt to obtain better results.
  prefs: []
  type: TYPE_NORMAL
- en: The upcoming chapters will explore the tips we touched up here.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 5- Writing Fiction: Story, Plot and Characters'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A light bulb inside a book Description automatically generated](image_rsrc1U6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fiction - Story Plot and Outline
  prefs: []
  type: TYPE_NORMAL
- en: If you have an idea for a story or don’t, you can ask AI to fill in a story
    plot and outline.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with the first scenario: You have an idea you want to develop and
    move forward with. The following is an idea I have for a science fiction story
    I plan on writing.'
  prefs: []
  type: TYPE_NORMAL
- en: A group of astronauts orbiting the Earth sees it suddenly disappear. However,
    the Earth's clouds are still present, and the space station and moon are still
    held in orbit of the missing planet. One astronaut remembered reading about an
    experiment at CERN to create a subatomic black hole. The astronauts surmised the
    black hole was made and swallowed the Earth. Their only hope is to break orbit
    and get to Mars, where supplies are waiting to start a small colony.
  prefs: []
  type: TYPE_NORMAL
- en: I added the following directive to the beginning of my idea. Write a plot and
    story outline for the following science fiction novel.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Next, I sent my request and idea to ChatGPT4, and I obtained three parts plus
    an epilogue. Part 1 is shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The AI provided a title for the book “Whispers in the Void” that I consider
    an OK working title.  Part 1 closely follows my thoughts. Let’s move on to part
    2.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U9.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The first two plot points in part 2 align with my thinking. However, plot points
    3 and 4 are not. I think there are only supplies on Mars waiting in anticipation
    for colonists to arrive. Let’s continue to part 3.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UA.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In part 3, the deviation from my original thoughts for this story continues.
    If this were an active project, I could massage my original prompt to adhere more
    closely to my ideas. Or I could incorporate the randomness of the AI plot points.
    Read plot point 4, Echos from Earth. This would certainly be a twist after thinking
    everyone on Earth was dead for most of the story.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we move on to the final part, the Epilogue.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white text on a white background Description automatically generated](image_rsrc1UB.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I am not thrilled with the Epilogue, but if this were an active project, the
    epilogue could be developed.
  prefs: []
  type: TYPE_NORMAL
- en: Second Scenario -  I don’t know what I want to write next.
  prefs: []
  type: TYPE_NORMAL
- en: You have succumbed to writer’s block. You want to write a science fiction story
    but don’t have an idea. You can ask the AI to come up with ten ideas for a science
    fiction story, or you can choose a topic yourself.
  prefs: []
  type: TYPE_NORMAL
- en: First, we have the AI come up with ten ideas.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UC.jpg)![A
    screenshot of a computer Description automatically generated](image_rsrc1UD.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You can run with any of those ideas or use your own. Let’s run with the first
    idea generated by the AI. Let’s add my directive sentence, Write a plot and story
    outline for the following science fiction novel, to the beginning of the idea.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UE.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Again, the AI has created a suitable title, background, and protagonist. Moving
    on to part 2.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UF.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The AI provides excellent plot points and development, on to part 3.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UG.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The AI develops the plot, beginning with a personal issue for the protagonist
    and progressing to a global issue for the world in part 4.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UH.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A complete story outline. Remember, every section and plot point can be tweaked
    to align with your vision and sensibilities.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 6 - Writing Non-Fiction; ideas, outline, and purpose
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A light bulb on an open book Description automatically generated](image_rsrc1UJ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Non-Fiction Work
  prefs: []
  type: TYPE_NORMAL
- en: If you are using AI to assist in writing non-fiction material, be careful. AI
    can sometimes “hallucinate” information, providing inaccurate or fabricated information
    in such great detail as you would unquestioningly consider it true.
  prefs: []
  type: TYPE_NORMAL
- en: When researching a medical topic, I have had an AI completely fabricate medical
    facts with fake citations to non-existent studies and papers with fictional non-working
    URLs. I was stunned by the details involved in the fabrication by the AI.
  prefs: []
  type: TYPE_NORMAL
- en: We, unfortunately, have a tendency to believe computers and AI when they are
    quoting facts. Always verify any facts generated by AI. With AI, trust but verify.
  prefs: []
  type: TYPE_NORMAL
- en: Plagiarism
  prefs: []
  type: TYPE_NORMAL
- en: AI tools are designed not to copy existing content verbatim, it’s wise to run
    AI-generated text through a plagiarism checker as a precaution.
  prefs: []
  type: TYPE_NORMAL
- en: Non-Fiction Idea and Outline
  prefs: []
  type: TYPE_NORMAL
- en: You can direct an AI to develop ideas and outlines if you have an idea for a
    nonfiction article or book. You can also direct the AI to provide ideas if you
    are lost for ideas.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with the first scenario: You have an idea you want to develop and
    move forward with. The following is an idea I have for personal development that
    I plan on writing about.'
  prefs: []
  type: TYPE_NORMAL
- en: While many self-help how-to development articles/books focus on goal setting,
    my article will be specifically on perseverance toward a goal. When a person initially
    sets a goal, the excitement and the plans to achieve drive you forward. Most worthwhile
    goals take a considerable amount of time to achieve. So my article is about how
    to persevere and keep grinding toward your goal when your enthusiasm dissipates,
    and you prefer to stop and pursue a different bright and shiny goal.
  prefs: []
  type: TYPE_NORMAL
- en: I added the following directive to the beginning of my idea. Rewrite and improve
    this idea as a directive to develop this idea into an outline for writing.
  prefs: []
  type: TYPE_NORMAL
- en: '![A close up of a text Description automatically generated](image_rsrc1UK.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The AI responds with a title and objective.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a article Description automatically generated](image_rsrc1UM.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Followed by a 7 chapter outline, with sub-points to hit inside each chapter.
  prefs: []
  type: TYPE_NORMAL
- en: '![A list of goals with text Description automatically generated](image_rsrc1UN.jpg)'
  prefs: []
  type: TYPE_IMG
- en: It ends its response with a note to the writer.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with black text Description automatically generated](image_rsrc1UP.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Greater focus
  prefs: []
  type: TYPE_NORMAL
- en: I could get the AI to achieve greater focus by defining a personality to imitate
    and an audience. I am not doing that here. Let’s assume you are happy with this
    outline; one way you could proceed is to ask the AI to write on each point.
  prefs: []
  type: TYPE_NORMAL
- en: The first point in Chapter 1, Introduction, is to briefly discuss the universal
    allure of setting new goals.
  prefs: []
  type: TYPE_NORMAL
- en: You could begin fleshing out the document by asking the AI to write 100 words
    on that first point.
  prefs: []
  type: TYPE_NORMAL
- en: Write 100 words - briefly discuss the universal allure of setting new goals.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT responds with:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UR.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You can continue in this manner until you have a complete article ready for
    editing.
  prefs: []
  type: TYPE_NORMAL
- en: Idea Generation
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t have a clear-cut topic for your article/book, you can ask the AI
    to create ideas for you. Using the idea of required perseverance toward a goal,
    we can ask the AI the following.
  prefs: []
  type: TYPE_NORMAL
- en: Please generate five self-help article ideas that focus on the how-to of maintaining
    perseverance in achieving a goal.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1US.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Each article idea provided by the AI can be drilled down as we did with the
    first idea.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 7 - Sudowrite For Topics AI Will Not Write
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A child writing on a paper with a robot Description automatically generated](image_rsrc1UT.jpg)'
  prefs: []
  type: TYPE_IMG
- en: There are some things, well many things, our standard AI platforms will refuse
    to write. In the case of ChatGPT, anything outside OpenAI’s Content Guidelines
    will be rejected or throttled back in content. These include too graphic scenes
    of violence, sex, rape, incest, or slavery. I can’t list everything that could
    trigger a content warning or dismissal of services, but in the middle of writing
    a novel, you don’t want to argue with your AI writing assistant.
  prefs: []
  type: TYPE_NORMAL
- en: '![A close-up of a white background Description automatically generated](image_rsrc1UU.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Sudowrite will assist you in writing when other platforms refuse your request.
    Sudowrite is an AI designed to assist writers in writing creative fiction. Like
    other AIs, Sudowrite is intended to assist you in your writing, not to do the
    writing for you.
  prefs: []
  type: TYPE_NORMAL
- en: Sudowrite is powerful, and I feel it is a little better than general-purpose
    AIs for writing fiction. However, for non-fiction writing, I feel GPT4o is the
    stronger AI.
  prefs: []
  type: TYPE_NORMAL
- en: That said, let’s examine a few of Sudowrite's features for fiction. The following
    is the stock Sudowrite home screen.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UV.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Keep in mind that this is a quick overview of Sudowrite. To explore all of its
    features, a book would be required. However, beginners can utilize Sudowrite at
    its elementary levels and still derive excellent results.
  prefs: []
  type: TYPE_NORMAL
- en: This is my home screen of Sudowrite.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UW.jpg)'
  prefs: []
  type: TYPE_IMG
- en: To change the color theme, hit the settings gear icon in the upper right. That
    opens the following screen;
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UX.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I changed the theme from Sorbet to Amber.
  prefs: []
  type: TYPE_NORMAL
- en: New Projects
  prefs: []
  type: TYPE_NORMAL
- en: When you select a project, a new Sudowrite screen opens up for writing and editing.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UY.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The center screen is the editor. It has the expected editor controls in its
    upper left-hand corner.
  prefs: []
  type: TYPE_NORMAL
- en: The Project list to the left of the editor lists your projects.
  prefs: []
  type: TYPE_NORMAL
- en: The History panel is to the right of the editor. It shows the history of Sudowrite’s
    generated content. Below each card, you can insert or copy the text. You can also
    highlight and copy portions of the text to use in your writing.
  prefs: []
  type: TYPE_NORMAL
- en: The canvas option at the lower left opens a screen that allows you to visualize
    text. Much like a text-to-art AI. See example below
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a video game Description automatically generated](image_rsrc1UZ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The Features Toolbar provides options that would require a prompt in standard
    GPT4o.
  prefs: []
  type: TYPE_NORMAL
- en: Rewrite
  prefs: []
  type: TYPE_NORMAL
- en: If you highlight text in the editor, you get the following options to act upon
    that highlighted text.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V0.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'If you choose to Rewrite, on the right-hand side of the screen, you are provided
    the following options:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a phone Description automatically generated](image_rsrc1V1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Select from the drop-down menu what operation you want Sudowrite to perform
    and hit go.
  prefs: []
  type: TYPE_NORMAL
- en: The results will be shown on the right side of the screen, ready for you to
    insert, copy, or edit into your story.
  prefs: []
  type: TYPE_NORMAL
- en: Quick Chat
  prefs: []
  type: TYPE_NORMAL
- en: Quick Chat is like a ChatGPT prompt screen. When you highlight text in the editor,
    you get the following options.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc1V2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Clicking on “Quick Edit” opens a prompt window. Here, you can enter ChaptGPT-style
    prompts to edit your highlighted text.
  prefs: []
  type: TYPE_NORMAL
- en: '![A black rectangular object with white text Description automatically generated](image_rsrc1V3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'I entered a prompt, asking Sudowrite to make the text more descriptive. The
    result was the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I could either accept or reject Sudowrite's output.
  prefs: []
  type: TYPE_NORMAL
- en: Writing for You
  prefs: []
  type: TYPE_NORMAL
- en: You can direct Sudowrite to write for you. Why? Suppose you have reached an
    impasse and have writer’s block. Sudowrite can read what you have written and
    add some meaningful text.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: I placed my cursor at the end of the last sentence in the screenshot. Then,
    I clicked on Write in the Features Toolbar. The text shown on the right of the
    screenshot is the text generated by Sudowrite.
  prefs: []
  type: TYPE_NORMAL
- en: Descriptions
  prefs: []
  type: TYPE_NORMAL
- en: If you highlight an item inside your text, you can ask Sudowrite to write a
    description of that item. It will write a description for each of the five senses,
    plus a metaphor. Each option can be turned on or off.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a phone Description automatically generated](image_rsrc1V6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: As an example, imagine highlighting the words “gold ring” and asking Sudowrite
    to describe it. Sudowrite will produce the following outputs.
  prefs: []
  type: TYPE_NORMAL
- en: SIGHT
  prefs: []
  type: TYPE_NORMAL
- en: The gold ring sparkles under the bright sunlight, its polished surface reflecting
    the rays in a dazzling display of light and color. Its band is thin and delicate,
    adorned with intricate engravings of vines and leaves.
  prefs: []
  type: TYPE_NORMAL
- en: The gold ring shimmers under the sunlight, its surface catching and reflecting
    every beam, creating a dazzling display of lights. The metal is polished to a
    brilliant shine, creating a sense of luxury and elegance.
  prefs: []
  type: TYPE_NORMAL
- en: The gold ring gleamed in the sunlight, its smooth and polished surface reflecting
    the surrounding scenery like a mini mirror.
  prefs: []
  type: TYPE_NORMAL
- en: SMELL
  prefs: []
  type: TYPE_NORMAL
- en: The ring emits a faint scent of metal and earth, hinting at the natural elements
    used to create it.
  prefs: []
  type: TYPE_NORMAL
- en: The gold ring has no scent, but the oils and perfumes of its wearer cling to
    it, leaving a trace of sweetness and warmth.
  prefs: []
  type: TYPE_NORMAL
- en: The metallic scent of gold wafted from the ring, filling the air with the aroma
    of wealth and luxury.
  prefs: []
  type: TYPE_NORMAL
- en: TASTE
  prefs: []
  type: TYPE_NORMAL
- en: If licked, the gold ring would leave a metallic taste on the tongue, a reminder
    of its precious material.
  prefs: []
  type: TYPE_NORMAL
