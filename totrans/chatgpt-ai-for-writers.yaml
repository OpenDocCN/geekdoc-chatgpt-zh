  type: TYPE_IMG
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: Based on the Fontspring Desktop/Ebook Font End User License Agreement, you are
    allowed to use the font on a book cover. The agreement grants a license to use
