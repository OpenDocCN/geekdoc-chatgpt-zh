- en: Chapter 14 - Defining Your Audience
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Now that you have ChatGPT speaking through a persona let’s further focus its
    output by defining the audience to which ChatGPT is speaking.
  prefs: []
  type: TYPE_NORMAL
- en: The audience is an essential factor. For example, if you are marketing an ankle
    brace, you want the AI to write a pitch to someone (audience) who has recently
    hurt their ankle and is looking for relief.
  prefs: []
  type: TYPE_NORMAL
- en: 'Writing an article on grapefruit will be different depending on whether the
    audience is obese, diabetic, or average weight. See below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WK.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In fiction, we can also define our audience. A science fiction story geared
    toward teenagers will vastly differ from a story written for adults and, further
    still, from a story written for an audience of truck drivers.
  prefs: []
  type: TYPE_NORMAL
