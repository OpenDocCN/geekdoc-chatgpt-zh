  id: totrans-854
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 电子书自助出版：使用人工智能开发小说内容，在流行的体裁或细分市场中创建并自助出版电子书。
- en: 'Scriptwriting for Media: Write scripts for films, plays, or video games, using
