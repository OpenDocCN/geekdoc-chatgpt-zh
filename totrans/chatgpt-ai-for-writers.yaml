- en: Introduction
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: Artificial Intelligence (AI) has been used in writing programs for years. Writers
    are familiar with grammar checkers like Grammarly, Quill Bot, Prowriting Aid,
    Hemingway, etc. Recently, Generative AI took a quantum leap forward. These newer
    AIs are creating a paradigm shift in writing—so much so that some writers and
    their unions are afraid these AIs will demonetize their writing skills and put
    them out of work.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）在写作程序中的应用已有多年。作家们熟悉像Grammarly、Quill Bot、Prowriting Aid、Hemingway等语法检查器。最近，生成式AI取得了飞跃性的进展。这些新的AI正在写作领域引发范式转变——如此之大，以至于一些作家及其工会担心这些AI将使他们的写作技能贬值，并使他们失业。
- en: I feel writers who are afraid of using AI will be replaced by writers who do
    use AI. I recommend to writers to harness AI to enhance their creativity and increase
    their productivity.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得害怕使用人工智能的作家将被那些确实使用人工智能的作家所取代。我建议作家利用人工智能来增强他们的创造力和提高他们的生产力。
- en: '![A collage of images of writing and writing Description automatically generated](image_rsrc1TT.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![写作图像的拼贴，带有自动生成的描述](image_rsrc1TT.jpg)'
- en: While the future of AI is unlimited, currently AI works better in some applications
    than others. Some AI platforms work better at some applications than other AI
    platforms. For instance, Perplexity.ai can search the internet for the latest
    news and research better than OpenAI’s ChaptGPT. That fact may change in the future,
    but for now, when I research topics, Perplexity is my go-to AI.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然人工智能的未来无限，但目前人工智能在某些应用上比其他应用表现更好。一些AI平台在某些应用上比其他AI平台表现更好。例如，Perplexity.ai在搜索互联网最新新闻和研究方面比OpenAI的ChaptGPT做得更好。这一事实可能会在未来改变，但就目前而言，当我研究主题时，Perplexity是我的首选AI。
- en: Try everything to see what works for you. Because AI continues to evolve, a
    task that doesn’t work well today may work perfectly six months from now.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试一切方法，看看什么适合你。因为人工智能持续发展，今天不奏效的任务可能在六个月后就能完美运行。
- en: Chapter 1 – AI-Assisted Writing - Copyright & IP Ownership
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章 – 人工智能辅助写作 - 版权与知识产权
- en: I use AI to edit and improve my writing. I do not use AI to write my books and
    short stories. Although I have seen many AI instructors advocate this exact use.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用人工智能来编辑和改进我的写作。我不使用人工智能来写我的书籍和短篇小说。尽管我见过许多AI导师提倡这种确切的使用方法。
- en: '![Close-up of a book with text Description automatically generated](image_rsrc1TU.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![带有自动生成文本描述的书本特写](image_rsrc1TU.jpg)'
- en: For some writers, working with AI tools comes with mixed feelings. The allure
    of using these platforms to brainstorm, outline, or draft is undeniable, yet they
    are concerned about creative ownership of their work. Lately the issue of data
    privacy and concern that AI has the potential to steal creative ideas. Let us
    look at these two issues further.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些作家来说，与AI工具合作伴随着复杂的情感。使用这些平台进行头脑风暴、概述或草拟的吸引力无可否认，但他们担心他们作品的艺术所有权。最近，数据隐私问题和担心人工智能有可能窃取创意想法。让我们进一步探讨这两个问题。
- en: Copyright and AI-Assisted Writing
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 版权与人工智能辅助写作
- en: The question of whether AI-generated content can be copyrighted is currently
    being debated in courtrooms around the world. These court rulings will help set
    legal precedents, and new legislation may follow based on these rulings, but for
    now, this is how I see the copyright status of AI-generated and AI-assisted content.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成内容是否可以版权的问题目前正在全球法庭上被辩论。这些法院裁决将有助于设定法律先例，基于这些裁决，可能会有新的立法出台，但就目前而言，这是我看待人工智能生成和人工智能辅助内容版权状态的方式。
- en: I am not a lawyer; this material on copyrights is based on my own research and
    opinion and should not be taken as legal advice.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我不是律师；关于版权的这些材料基于我的研究和观点，不应被视为法律建议。
- en: Copyright Basis
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 版权基础
- en: Copyright is granted automatically once your art is fixed in tangible form. This
    is true whether you render a piece of art, write a story, write a song, or record
    a piece of music. Copyright is an “automatic right.” However, it is much easier
    to prove you are a legitimate copyright owner if you register your work with the
    US Government.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 版权一旦你的艺术作品以有形形式固定，就会自动获得。这适用于你创作艺术品、撰写故事、编写歌曲或录制音乐。版权是一种“自动权利”。然而，如果你将作品登记在美国政府处，证明你是合法的版权所有者会更容易。
- en: Why You Should Register Copyright Your Creative Work
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你应该注册你的创意作品的版权
- en: To register your work with the US government, you will need to fill out an application,
    pay a filing fee, and provide a copy of the work. The copyright office will examine
    your application to ensure the work is eligible for copyright protection. If so,
    you will get an official “Certificate of Registration.”
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 要将你的作品登记在美国政府处，你需要填写一份申请表，支付一份登记费，并提供作品副本。版权局将审查你的申请，以确保作品符合版权保护资格。如果是的话，你将获得一份正式的“注册证书”。
- en: Registered copyright protection makes it easier to pursue legal recourse if
    anyone uses your work without your consent. If someone tries to use your creative
    work without permission, you can bring them to court for copyright infringement.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 注册版权保护使得在未经你同意使用你的作品时，追究法律途径变得更容易。如果有人未经许可试图使用你的创意作品，你可以将他们告上法庭，指控其侵犯版权。
- en: Some Believe AI Creative Work is Not Copyrightable
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 一些认为人工智能创作的作品不可版权化
- en: The idea that AI-rendered work is not copyrightable may come from the following
    text in the US Government’s regulations on copyright.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: AI渲染作品不受版权保护的想法可能源于美国政府在版权法规中的以下文本。
- en: '![A close up of a document Description automatically generated](image_rsrc1TV.jpg)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![文档的近距离描述自动生成](image_rsrc1TV.jpg)'
- en: Government Copyrightable Authorship
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 政府可登记的著作权
- en: 'This text is on chapter 300, page 7 of the US Government’s “Copyrightable Authorship:
    What Can Be Registered,” see the link below.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这段文字在美国政府“可登记的著作权：可以登记什么”的第300章第7页，下面有链接。
- en: '[https://www.copyright.gov/comp3/chap300/ch300-copyrightable-authorship.pdf](https://www.copyright.gov/comp3/chap300/ch300-copyrightable-authorship.pdf)'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.copyright.gov/comp3/chap300/ch300-copyrightable-authorship.pdf](https://www.copyright.gov/comp3/chap300/ch300-copyrightable-authorship.pdf)'
- en: By following the strict letter of the law as stated by the US Government, the
    AI-rendered work can be modified by you, which invokes human authorship of the
    work, and thus, it becomes copyrightable.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循美国政府规定的严格法律，你可以修改AI渲染的作品，这会引发作品的著作权，因此，作品成为受版权保护的作品。
- en: Modification of AI Rendered Work
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: AI渲染作品的修改
- en: Any meaningful modification of the AI-rendered work can create human authorship. Thereby
    making the work “AI-assisted” rather than “AI-generated.” AI-assisted creative
    work is copyrightable.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 任何对AI渲染作品的实质性修改都可以创造人类作者的著作权。因此，作品变为“AI辅助”而非“AI生成”。AI辅助的创意作品是受版权保护的。
- en: Registered Copyrights For Me and You
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为我和你登记的版权
- en: Yes, you can copyright your AI-assisted content.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你可以对你的AI辅助内容进行版权登记。
- en: As a writer looking to copyright your work, it’s crucial to understand these
    nuances and be vigilant when incorporating AI into your creative work. To keep
    your creative work copyrightable, my suggestion is to use AI as your writing assistant
    and collaborator and NOT as a sole content generator.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位希望版权登记自己作品的作家，理解这些细微差别并在将AI融入你的创意作品中时保持警惕至关重要。为了保持你的创意作品受版权保护，我的建议是使用AI作为你的写作助手和合作者，而不是作为唯一的内容生成者。
- en: Stealing Your Ideas
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 偷窃你的想法
- en: Another concern some writers have in using AI is stealing your writing ideas.
    Most AI platforms, including ChatGPT and Perplexity, retain user conversations
    for a period of time—even after a session ends. While users can often delete their
    conversations, it doesn’t necessarily mean the data is entirely erased from the
    company’s internal systems. In some cases, conversations may still be used in
    a limited way to help improve the AI model. For writers, ideas are precious, and
    understanding where those ideas might travel is essential.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 一些作家在使用AI时担忧的一个问题是偷窃他们的写作想法。大多数AI平台，包括ChatGPT和Perplexity，都会保留用户对话一段时间——即使会话结束后也是如此。虽然用户可以删除他们的对话，但这并不一定意味着数据完全从公司的内部系统中删除。在某些情况下，对话可能仍然以有限的方式被用于帮助改进AI模型。对于作家来说，想法是宝贵的，了解这些想法可能去向何方是至关重要的。
- en: Some of us, myself included, intentionally allow our conversations with AI to
    remain stored. This lets me revisit discussions to ask follow-up questions or
    spin off fresh ideas from previous sessions.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的一些人，包括我自己，故意允许与AI的对话保持存储。这让我可以回顾讨论，提出后续问题或从之前的会话中产生新的想法。
- en: How much control do we have over our ideas and data once they’re in the hands
    of a third-party system?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对想法和数据有多少控制权，一旦它们落入第三方系统手中？
- en: Ethical AI companies have policies aimed at protecting user data and intellectual
    property. Still, the legal landscape surrounding AI and creativity remains murky.
    Despite a company’s best intentions, training data for these models might still
    contain copyrighted material or generate ideas strikingly similar to those of
    another user. This isn't necessarily due to malicious intent; rather, it’s an
    inherent risk of how AI is developed.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理的AI公司有旨在保护用户数据和知识产权的政策。然而，围绕AI和创造性的法律环境仍然模糊。尽管公司有最好的意图，但这些模型的训练数据可能仍然包含受版权保护的材料或生成与另一用户的想法惊人相似的想法。这并不一定是由于恶意意图；而是AI开发固有的风险。
- en: It’s also worth noting that, even if a specific conversation remains private,
    the AI may produce comparable ideas for other users based on patterns from its
    training data. For writers, this means approaching AI tools with a sense of both
    opportunity and caution. The benefits are considerable, but so are the potential
    risks to idea ownership and privacy.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，即使特定的对话保持私密，AI也可能根据其训练数据中的模式为其他用户生成类似的想法。对于作家来说，这意味着在接近AI工具时既要有一种机会感，也要有一种谨慎感。好处是相当大的，但潜在的风险对想法所有权和隐私也是相当大的。
- en: In the end, writers must weigh the creative advantages AI can offer against
    the possible impacts on their intellectual property. By understanding the issues
    involved, you can make an informed decision to use (or not use) AI as a creative
    partner. For myself, I am not concerned with my AI conversation being used as
    training data.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，作家必须权衡AI可以提供的创作优势与对其知识产权可能产生的影响。通过了解涉及的问题，你可以做出明智的决定，决定是否使用（或不使用）AI作为创作伙伴。就我自己而言，我不担心我的AI对话被用作训练数据。
- en: Chapter 2- AI is a Writer’s Toolbox
  id: totrans-71
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章 - AI是作家的工具箱
- en: '![An open book with glowing pages Description automatically generated](image_rsrc1TW.jpg)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![一本发光的书籍页面，描述自动生成](image_rsrc1TW.jpg)'
- en: AI can augment and amplify your personal and business writing skills. In many
    ways, AI surpasses the definition of a tool and may be thought of as a partner
    and collaborator.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以增强和提升你的个人和商业写作技能。在许多方面，AI超越了工具的定义，可能被视为合作伙伴和合作者。
- en: 'Fiction Writing:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 小说写作：
- en: AI will supercharge your writing process. AI can help generate ideas, plots,
    plot twists, and characters and rephrase and rewrite text to improve your writing.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: AI将极大地加速你的写作过程。AI可以帮助生成想法、情节、情节转折和人物，并重新措辞和改写文本以改进你的写作。
- en: 'Non-Fiction Writing:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 非小说写作：
- en: AI can do everything mentioned above, plus assist in developing non-fiction
    ideas and creating outlines, summarizing text, research, and reference lookups.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以做上述所有事情，并协助开发非小说想法、创建大纲、总结文本、研究和参考资料查找。
- en: Business Writing & Reports
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 商业写作与报告
- en: AI can assist in generating business reports from data and writing company emails
    and product sales copy.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以帮助从数据中生成商业报告，并撰写公司电子邮件和产品销售文案。
- en: Blogs
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 博客
- en: Blogs and article writing become so much easier when you have an AI to assist
    you with writing and researching.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 博客和文章写作在有了AI协助写作和研究时变得容易得多。
- en: Vision OCR and Reading Charts
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉OCR和阅读图表
- en: AI Vision's capabilities can read and interpret charts and financial reports.
    It can summarize articles, read legal documents, and help you interpret the text.
    See Chapter 14.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: AI视觉的能力可以阅读和解释图表和财务报告。它可以总结文章，阅读法律文件，并帮助你解释文本。见第14章。
- en: Psychology and Character Development
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 心理学与人物发展
- en: You can bounce personal feelings and characters' interpersonal relationships
    to the AI for feedback.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将个人情感和人物的人际关系反馈给AI以获取反馈。
- en: AI is so competent in psychology that shortly, I expect AI to augment human
    therapists or become competent clinical social workers themselves. Humans may
    trust their AI therapist more than their human counterparts.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: AI在心理学方面非常出色，不久的将来，我预计AI将增强人类治疗师的能力，或者自己成为合格的临床社会工作者。人类可能比他们的同行更信任他们的AI治疗师。
- en: Putting this aspect of AI will improve your characters' realism and motivation.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 将这一方面的AI融入其中将提高你角色的真实性和动机。
- en: Book Contracts & Legal Documents
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍合同与法律文件
- en: AI is not a lawyer but can easily pass any bar exam. It can be used to read
    and explain legal documents and terminology. AI can provide insight into copyright,
    licenses, book, and article contracts.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: AI不是律师，但可以轻松通过任何律师资格考试。它可以用来阅读和解释法律文件和术语。AI可以提供关于版权、许可证、书籍和文章合同的见解。
- en: It can also write simple legal documents. The boilerplate photography releases
    available online were too bulky and detailed for my simple transaction. So, I
    asked my AI to write a photograph release. In the first round, the AI gave me
    a three-page release. That was still too much legalize. I asked the AI to reduce
    it to one page. It performed and gave me the bare-bone release I needed with the
    extra-legal verbiage.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 它还可以编写简单的法律文件。网上可用的标准摄影发布声明过于庞大和详细，不适合我简单的交易。因此，我要求我的AI编写一份摄影发布声明。在第一轮中，AI给了我一份三页的发布声明。这仍然太多了法律术语。我要求AI将其缩减到一页。它做到了，给了我一份我需要的简洁发布声明，并附上了额外的法律术语。
- en: Poems, Song & Music Writing
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 诗歌、歌曲与音乐写作
- en: AI can write poetry, songs, and music. I don’t expect a Grammy winner to thank
    his AI for his hit song, but that doesn’t mean it hasn’t happened.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以写诗歌、歌曲和音乐。我不期望格莱美奖获得者会感谢他的AI为他创作的热门歌曲，但这并不意味着这种情况没有发生过。
- en: Translation
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译
- en: Provide your AI with text, and the AI can translate that text into any number
    of languages or translate foreign languages into English.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 向你的AI提供文本，AI可以将该文本翻译成任何数量的语言，或将外语翻译成英语。
- en: Writing Tutor
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 写作辅导
- en: The AI can tutor you in many subjects, including English. AI can act like a
    grammar checker, thesaurus, and dictionary and offer word alternatives.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以在许多科目中辅导你，包括英语。人工智能可以充当语法检查器、同义词词典和字典，并提供单词替代方案。
- en: Problem Solving – Working with Hemingway
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 问题解决 - 与海明威合作
- en: If you have a thorny plot problem or writing issue, you can work it through
    with the AI acting like one of your favorite or famous writers. Imagine working
    with a Hemingway AI or Fitzgerald AI on a plot point.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个棘手的情节问题或写作问题，你可以与人工智能合作，就像你的一个最喜欢的或著名的作家一样。想象一下与海明威AI或菲茨杰拉德AI在情节点上合作。
- en: Research
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 研究
- en: The latest iteration of AIs has access to the Internet. This means they can
    help you with research and history.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 最新的人工智能版本可以访问互联网。这意味着它们可以帮助你进行研究和历史研究。
- en: Everyday Miscellaneous Issues
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 每日杂项问题
- en: I turn to AI to help me solve minor issues. In the last few days, I have asked
    it how to add a heart to an iPhone text message, explain the difference between
    the hot, common, and ground in a home AC power system, draw a simple op-amp amplifier
    using a 741 op-amp, and generate a text-to-art prompt based on a picture I uploaded
    to the AI. The AI helped me troubleshoot unlocking the screen rotation on my iPad.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我转向人工智能来帮助我解决一些小问题。在过去的几天里，我询问了如何向iPhone短信中添加爱心，解释家庭AC电源系统中热、常见和地之间的区别，使用741运算放大器绘制一个简单的运算放大器，以及根据我上传到人工智能的图片生成文本到艺术提示。人工智能帮助我解决了iPad屏幕旋转解锁的问题。
- en: What more would you want from a writing assistant?
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 你还希望从写作助手那里得到什么？
- en: Remember, AI can be many things, it can be a tool, your assistant, and your
    collaborator.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，人工智能可以是许多东西，它可以是一个工具，你的助手，也可以是你的合作伙伴。
- en: Copyrights - Authenticity of Originality
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 版权 - 原创性的真实性
- en: This question was answered in Chapter 1.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题在第1章中已经解答。
- en: Most writers are already using AI augmentation. Sophisticated writing tools,
    like Grammarly, Quill Bot, and spell checkers, use AI. I believe that when AI
    is used as a tool rather than a content creator, you are still the creator, and
    your work is authentic to you and copyrightable.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数作家已经在使用人工智能增强。像Grammarly、Quill Bot和拼写检查器这样的复杂写作工具都使用了人工智能。我相信，当人工智能作为工具而不是内容创作者时，你仍然是创作者，你的作品对你来说是真实的，并且可以享有版权。
- en: GPT4o is one of Many.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: GPT4o是众多之一。
- en: GPT is the acronym for "Generative Pre-trained Transformer." This language model
    has been trained on a large amount of text (deep learning) to produce results
    that mimic human writing. When you add the word "Chat" to GPT, you get "ChatGPT,"
    which is a chatbot.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: GPT是“生成预训练转换器”的缩写。这种语言模型在大量文本（深度学习）上进行了训练，以产生模仿人类写作的结果。当你把“Chat”这个词加到GPT上，你就得到了“ChatGPT”，这是一个聊天机器人。
- en: There are many AI platforms on the market. ChatGPT from OpenAI is one of the
    most recognizable; it may not be the best in every application.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 市场上有很多AI平台。OpenAI的ChatGPT是最容易被识别的之一；它可能不是每个应用中最好的。
- en: GPT4o is a powerful AI tool that will help you create great content. In this
    book, I will demonstrate with examples how to use these AIs effectively.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: GPT4o是一个强大的AI工具，将帮助你创建优质内容。在这本书中，我将通过示例展示如何有效地使用这些AI。
- en: Chapter 3 -Opening an AI Account
  id: totrans-112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3章 - 开设人工智能账户
- en: '![A person looking at a message Description automatically generated with medium
    confidence](image_rsrc1TX.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![一个正在看信息的人，描述自动生成，中等置信度](image_rsrc1TX.jpg)'
- en: You have many options when it comes to choosing an AI. I will use OpenAI as
    a primary example. Near the end of the chapter, alternative AI’s are listed.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择AI时，你有许多选择。我将使用OpenAI作为主要示例。在章节的末尾，列出了其他替代AI。
- en: Signing Up for ChatGPT
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 注册ChatGPT
- en: 'Go to:  [https://chat.openai.com](https://chat.openai.com)'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 前往：[https://chat.openai.com](https://chat.openai.com)
- en: '![A white background with black text Description automatically generated](image_rsrc1TY.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，描述自动生成](image_rsrc1TY.jpg)'
- en: Register for an account using your email address and create a password; see
    image below.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您的电子邮件地址注册账户并创建密码；请参阅下面的图片。
- en: '![A screenshot of a login form Description automatically generated](image_rsrc1TZ.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![登录表单的截图，描述自动生成](image_rsrc1TZ.jpg)'
- en: You can use ChatGPT3 for free, which is the best way to start. When ready, you
    can upgrade to ChatGPT4 for $20.00 per month. At this subscription level, you
    have access to GPT4o (omni), a higher-level AI model with better creativity.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以免费使用ChatGPT3，这是开始的最佳方式。准备好后，你可以升级到每月20.00美元的ChatGPT4。在这个订阅级别，你可以访问GPT4o（全能），这是一个更高层次的AI模型，具有更好的创造力。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U0.jpg)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，描述自动生成](image_rsrc1U0.jpg)'
- en: Once your account is created and your email verified, you can access the ChatGPT
    AI.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的账户创建并验证了您的电子邮件，您就可以访问ChatGPT AI。
- en: ChatGPT4 is considered the legacy model. New iterations of ChatGPT are GPT-40,
    GPT4o Omni, 01 preview, GPT-40 with Canva, and 01-mini.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT4被认为是传统模型。ChatGPT的新版本包括GPT-40、GPT4o Omni、01预览、GPT-40 with Canva和01-mini。
- en: More AI Bots
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 更多AI机器人
- en: OpenAI’s ChatGPT is probably the most familiar of the Chatbots, but numerous
    alternatives exist. Most AI bots have similar sign-on procedures and typically
    a free version for people to try.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT可能是最熟悉的聊天机器人，但存在许多替代方案。大多数AI机器人都有类似的登录流程，通常还有一个免费版本供人们尝试。
- en: Twitter X Grok
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Twitter X Grok
- en: Grok.ai is available to premium members of Twitter X. As of this writing, the
    monthly cost for access is $16.00 per month. Grok's unique advantage lies in its
    ability to provide unbiased information on politically charged topics, such as
    climate change, immigration, and green energy costs, without being influenced
    by politically correct thinking. This gives users a more objective and factual
    perspective on these issues, fostering a more informed and open dialogue.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: Grok.ai可供Twitter X的付费会员使用。截至本文撰写时，访问的月费为每月16.00美元。Grok的独特优势在于其提供不受政治正确性影响的信息的能力，例如气候变化、移民和绿色能源成本，这为用户提供了一个更客观和事实性的视角，促进了更明智和开放的对话。
- en: Perplexity
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂度
- en: The free version of Perplexity.ai can be accessed here.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: Perplexity.ai的免费版本可以通过这里访问。
- en: '[https://www.perplexity.ai/](https://www.perplexity.ai/)'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.perplexity.ai/](https://www.perplexity.ai/)'
- en: The pro version costs $20.00 per month.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 专业版每月费用为20.00美元。
- en: What is exceptional about this AI, is that it does an extensive web search to
    answer the question. It provides the reference URLs to its answer. AIs are adding
    web searches so that up-to-date information can be accessed.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这款AI的特别之处在于，它进行了广泛的网络搜索来回答问题。它提供了其答案的参考URL。AI正在添加网络搜索，以便可以访问最新信息。
- en: AI Aggregators – Futurepedia, Gmtech, Magai, Edenai
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: AI聚合器 – Futurepedia, Gmtech, Magai, Edenai
- en: The One Service To Include Them All
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 一站式服务，包含所有功能
- en: There are AI aggregators services that allow their users to access and use a
    wide variety of LLM and Image Generators for one monthly cost.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些AI聚合器服务允许用户以每月的费用访问和使用各种LLM和图像生成器。
- en: Basic services start at $14.99 per month. Accessing an AI costs a fractional
    amount, typically around $0.01 per AI response. Each service has its unique plan.
    So you need to visit the AI site to get its particulars.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 基本服务起价为每月14.99美元。访问AI的费用是微不足道的，通常大约为每AI响应0.01美元。每个服务都有自己的独特计划，因此您需要访问AI网站以获取其详细信息。
- en: This money is deducted from your credits. Additional credits can be purchased
    if you exceed your $5.00 monthly allocation.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这笔钱会从您的信用中扣除。如果您超过每月5.00美元的配额，可以购买额外的信用。
- en: '[https://gmtech.com/](https://gmtech.com/)'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://gmtech.com/](https://gmtech.com/)'
- en: Below is a screenshot image of their current AI integrations.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是他们当前AI集成的截图。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U1.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，描述自动生成](image_rsrc1U1.jpg)'
- en: To reach Magai
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问Magai
- en: '[https://magai.co/](https://magai.co/)'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://magai.co/](https://magai.co/)'
- en: Magai provides access to over 16 large language models, and more than 5 AI image
    models.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: Magai提供超过16个大型语言模型和超过5个AI图像模型的访问权限。
- en: 'To reach Futurepedia:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问Futurepedia：
- en: '[https://www.futurepedia.io/](https://www.futurepedia.io/)'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.futurepedia.io/](https://www.futurepedia.io/)'
- en: 'To reach Eden AI:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问Eden AI：
- en: '[https://www.edenai.co/](https://www.edenai.co/)'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.edenai.co/](https://www.edenai.co/)'
- en: You may want to search for new AI aggregators, as more services are showing
    up all the time. These services offer users access to various AI platforms for
    one monthly price.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能需要寻找新的AI聚合器，因为每天都有更多服务出现。这些服务以每月的费用为用户提供访问各种AI平台的机会。
- en: Chapter 4 - Crafting Prompts
  id: totrans-149
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章 - 创建提示
- en: Using AI effectively involves crafting prompts that communicate with the AI
    in such a manner as to obtain your desired results.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 有效使用AI涉及创建提示，以便与AI进行沟通，从而获得您期望的结果。
- en: '![A blue and purple background with a blue line Description automatically generated
    with medium confidence](image_rsrc1U2.jpg)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![带有蓝色和紫色背景以及蓝色线条的截图，描述自动生成，中等置信度](image_rsrc1U2.jpg)'
- en: This book will guide you to write effective prompts for writing. Writing prompts
    for financial analysis, physics, and astronomy would require a different methodology
    that what is outline here.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书将指导你编写有效的写作提示。为财务分析、物理和天文学编写的提示需要不同的方法，这里没有概述。
- en: Crafting effective prompts is a learnable skill.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 构建有效的提示是一项可学习的技能。
- en: Prompts
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: I don’t think anyone would argue that crafting prompts is the key to unleashing
    the power of AI.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为没有人会争论，构建提示是释放AI力量的关键。
- en: 'You can use ChatGPT AI to do any of the following:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用ChatGPT AI执行以下任何一项：
- en: 1 - Generate book ideas based on a topic.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 1 - 根据一个主题生成书想法。
- en: 2 - Generate fiction book outlines.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 2 - 生成虚构书大纲。
- en: 3 - Generate book titles.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 3 - 生成书名。
- en: 4 - Summarize text
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 4 - 总结文本
- en: 5 - Rewrite and improve text.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 5 - 重写并改进文本。
- en: 6 - Help create book characters.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 6 - 帮助创造书中的角色。
- en: 7 - Generate non-fiction outlines (solar, wind energy, etc.)
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 7 - 生成非虚构大纲（如太阳能、风能等）
- en: 8 - Generate character descriptions.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 8 - 生成角色描述。
- en: 9 - Generate pros and cons of decisions or ideas.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 9 - 生成决策或想法的利弊。
- en: 10 - Generate lists.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 10 - 生成列表。
- en: 11 - Generate poems
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 11 - 生成诗歌
- en: 12 – Generate songs
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 12 – 生成歌曲
- en: 13 – Critique and give feedback on your story/text.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 13 – 批评并对你故事/文本提供反馈。
- en: 14 – Problem-solving - Help with police procedures etc.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 14 – 解决问题 - 帮助警察程序等。
- en: 15 - Language translations
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 15 - 语言翻译
- en: 16 - Generate prompts for Text to Art AI.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 16 - 为文本到艺术AI生成提示。
- en: 17 - Personal Instructor for learning
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 17 - 学习个人教练
- en: 18 - Write emails – personal and business
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 18 - 写电子邮件 - 个人和商业
- en: 19 - Craft response – business and personal
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 19 - 创建回应 - 商业和个人
- en: 20 - Act as a tutor when taking online learning classes
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 20 - 在在线学习课程中充当辅导老师
- en: 21 - Offer insight into your character's behavior.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 21 - 提供你对角色行为的洞察。
- en: The above list is only a fraction of AI capabilities. Many of the prompts we
    touch upon in this chapter are explored in greater detail in the following chapters.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 上述列表只是AI能力的一小部分。我们在这章中提到的许多提示将在接下来的章节中更详细地探讨。
- en: Prompt Classifications - Open, Fixed and Conversation (Chat)
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 提示分类 - 开放、固定和对话（聊天）
- en: Open - Open prompts allow the AI to generate the most creative responses. For
    example,  “Write 300 words on the advantages of Solar Energy.” The topic can vary,
    such as the best foods for diabetics, diets, etc.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 开放 - 开放提示允许AI生成最具创造性的回应。例如，“写300字关于太阳能的优点。”主题可以变化，如糖尿病患者最佳食物、饮食等。
- en: ChatGPT did an excellent job writing 300 words on the advantages of solar energy.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT出色地写了300字关于太阳能优点的文章。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U3.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![计算机描述自动生成的截图](image_rsrc1U3.jpg)'
- en: Fixed - This prompt asks for a specific fact or facts. For example, “Who was
    the third President of the United States?” Keep in mind that the AI can hallucinate
    facts and data, so remember to double-check its data output.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 固定 - 这个提示要求提供具体的事实或事实。例如，“谁是美国的第三任总统？”记住，AI可能会产生事实和数据幻觉，所以请记住要双重检查其数据输出。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U4.jpg)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![计算机描述自动生成的截图](image_rsrc1U4.jpg)'
- en: Chat - Creating a character response with ChatGPT. In this scenario, my 13-year-old
    character, Tommy, has a problem Explaining to his doctor dad why he failed a biology
    test. I asked ChatGPT to give me a few ideas of how a character may respond to
    a dilemma. ChatGPT provided six possible options.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Chat - 使用ChatGPT创建角色回应。在这个场景中，我的13岁角色汤米有一个问题，向他的医生父亲解释为什么他生物考试不及格。我要求ChatGPT给我一些角色可能如何回应困境的几个想法。ChatGPT提供了六个可能的选择。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U5.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![计算机描述自动生成的截图](image_rsrc1U5.jpg)'
- en: Jumping Off From Any Branch
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 从任何分支跳起
- en: You can use any one of those AI response ideas as a jumping-off point, or those
    suggestions could even trigger your imagination for a completely different response
    you may want to pursue.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用这些AI回应想法中的任何一个作为起点，或者这些建议甚至可以激发你想象出你想要追求的完全不同的回应。
- en: It’s Not Just One (Bite of the Apple) Prompt
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个（咬一口苹果）提示
- en: I see many people writing prompts and ending the conversation with AI after
    one prompt. No. You can continue asking and refining your question and drilling
    down until YOU are satisfied with the answer.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到很多人写提示，在AI之后只进行一次提示就结束对话。不。你可以继续提问和细化你的问题，深入挖掘，直到你对自己的答案满意。
- en: You can continue to ask the AI multiple questions to clarify or simplify its
    answer.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以继续向AI提出多个问题，以澄清或简化其回答。
- en: In the above example, suppose you wanted to pursue the “Avoidance” scenario.
    You could ask the AI to fill out the idea with the potential consequences for
    Tommy for taking this action.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述示例中，假设你想要追求“避免”情景。你可以要求AI填充这个想法，并考虑汤米采取这一行动可能带来的潜在后果。
- en: If the AI’s response is too vague, drill down with additional prompts asking
    for greater detail.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI的回答过于模糊，可以通过附加提示要求更多细节来深入挖掘。
- en: Talk To Me, Formal – Informal
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 跟我说话，正式-非正式
- en: You can direct the AI to write responses in a formal, academic manner.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以指示AI以正式、学术的方式撰写回答。
- en: Or you can ask the AI to respond in a friendly, informal manner. I would shy
    away from AI jokes and AI sarcasm. The last time I checked, the AI hasn’t evolved
    to the point where that can be pulled off credibly.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你可以要求AI以友好、非正式的方式回答。我会避免使用AI笑话和AI讽刺。在我最后一次检查时，AI还没有发展到能够以可信的方式做到这一点。
- en: Positive and Confident
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 积极自信
- en: I like my AI to be positive and confident. But I wouldn’t want to ask my AI
    to be “Positive & Confident” at the beginning of every conversation. Here is where
    you can implement GPT’s.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢我的AI积极自信。但我不希望每次对话一开始就要求AI“积极自信”。这就是你可以实施GPT的地方。
- en: I devoted a full chapter to how to create GPT’s and what they are. Think of
    them as a procedural prompt script that is saved to the OpenAI server and can
    be called by you at any time.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我专门用了一章来介绍如何创建GPT以及它们是什么。把它们想象成一个存储在OpenAI服务器上的程序性提示脚本，你可以在任何时候调用它。
- en: In general, the quality of the AI’s response is proportional to the quality
    of your prompt. The following are a bunch of quick-start tips for writing effective
    prompts. Many of these tips have full chapters devoted to exploring its use.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，AI回答的质量与你的提示质量成正比。以下是一些建议，用于编写有效的提示。其中许多建议都有专门的章节来探讨其使用。
- en: Segmenting AI’s Large Knowledge Base
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 分割AI的大知识库
- en: The AI has a tremendously large knowledge database. We can obtain better responses
    by telling the AI we want it to segment its knowledge to an area we are interested
    in. Many prompts of this type begin with the famous “As an expert [ you name the
    topic].
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: AI拥有庞大的知识数据库。通过告诉AI我们希望它将其知识分割到我们感兴趣的领域，我们可以获得更好的回答。许多此类提示都以著名的“作为一个专家[你命名的主题]”开始。
- en: Establish a Persona For The AI
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 为AI建立一个角色
- en: In addition to the “As an expert” prompt, we can prompt the AI to assume a Persona.
    This persona could be a doctor, detective, marine, cop, astronaut, dock worker,
    etc. In writing, you can ask the AI to assume a persona and to respond or ask
    how the persona would react in your fictional situation.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 除了“作为一个专家”的提示，我们还可以提示AI扮演一个角色。这个角色可以是医生、侦探、海军、警察、宇航员、码头工人等。在写作中，你可以要求AI扮演一个角色，并对其在虚构情景中的反应或提问。
- en: Establish Your Audience
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 建立你的受众
- en: It can be necessary for the AI to know its audience. Explaining a medical issue
    to an adolescent is different than to an adult and different from other medical
    professionals.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: AI可能需要了解其受众。向青少年解释医学问题与向成人解释不同，与其他医疗专业人员也不同。
- en: Establishing the AIs Tonality
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 建立AI的语气
- en: We touched up this before. Do we want the AI to respond in a neutral, formal,
    informal, friendly, and confident manner?
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前已经讨论过这个问题。我们希望AI以中立、正式、非正式、友好和自信的方式回答吗？
- en: Background
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 背景
- en: Giving the AI some set-up and setting will improve its response. Imagine the
    difference in a marine’s response when fighting in a jungle, urban city, or spaceport
    50 light years from the Earth.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 给AI一些设定和背景将提高其回答的质量。想象一下，当一名海军在丛林、城市或距离地球50光年外的太空港作战时，他的回答会有多大的差异。
- en: By incorporating this information into your prompt, the AI’s response will be
    focused and on target.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将此信息纳入你的提示，AI的回答将更加专注和准确。
- en: Keys to Creating Great Prompts-      Wash, Rinse, and Repeat
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 创建优秀提示的关键-清洗、冲洗、重复
- en: 1) Write your prompt in the text box and hit send.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 1) 在文本框中写下你的提示并点击发送。
- en: 2) ChatGPT will process your prompt and write its response in the chat area.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 2) ChatGPT将处理你的提示并在聊天区域撰写其回答。
- en: 3\. Analyze ChatGPT’s response
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 分析ChatGPT的回答
- en: 4) Refine your original prompt to obtain better results.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 4) 优化你的原始提示以获得更好的结果。
- en: The upcoming chapters will explore the tips we touched up here.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的章节将探讨我们在这里讨论的技巧。
- en: 'Chapter 5- Writing Fiction: Story, Plot and Characters'
  id: totrans-218
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章- 写作小说：故事、情节和人物
- en: '![A light bulb inside a book Description automatically generated](image_rsrc1U6.jpg)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![书中的灯泡，自动生成的描述](image_rsrc1U6.jpg)'
- en: Fiction - Story Plot and Outline
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 小说 - 情节和概要
- en: If you have an idea for a story or don’t, you can ask AI to fill in a story
    plot and outline.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个故事的想法或者没有，你可以让AI填充故事情节和概要。
- en: 'Let’s start with the first scenario: You have an idea you want to develop and
    move forward with. The following is an idea I have for a science fiction story
    I plan on writing.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从第一个场景开始：你有一个想要发展和推进的想法。以下是我计划撰写的科幻故事的一个想法。
- en: A group of astronauts orbiting the Earth sees it suddenly disappear. However,
    the Earth's clouds are still present, and the space station and moon are still
    held in orbit of the missing planet. One astronaut remembered reading about an
    experiment at CERN to create a subatomic black hole. The astronauts surmised the
    black hole was made and swallowed the Earth. Their only hope is to break orbit
    and get to Mars, where supplies are waiting to start a small colony.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 一群环绕地球的宇航员看到地球突然消失。然而，地球的云层仍然存在，空间站和月球仍然保持在失踪行星的轨道上。一位宇航员记得阅读过关于在CERN进行创建亚原子黑洞的实验。宇航员们推测黑洞被制造出来并吞噬了地球。他们唯一的希望是打破轨道并到达火星，那里有物资等待开始一个小型殖民地。
- en: I added the following directive to the beginning of my idea. Write a plot and
    story outline for the following science fiction novel.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 我在想法的开头添加了以下指令。为以下科幻小说撰写情节和故事概要。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U7.jpg)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![书中的灯泡，自动生成的描述](image_rsrc1U7.jpg)'
- en: Next, I sent my request and idea to ChatGPT4, and I obtained three parts plus
    an epilogue. Part 1 is shown below.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将我的请求和想法发送给了ChatGPT4，我获得了三个部分加上一个结语。第一部分如下所示。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U8.jpg)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，自动生成的描述](image_rsrc1U8.jpg)'
- en: The AI provided a title for the book “Whispers in the Void” that I consider
    an OK working title.  Part 1 closely follows my thoughts. Let’s move on to part
    2.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: AI为这本书提供了标题“Whispers in the Void”，我认为这是一个不错的暂定标题。第一部分紧密跟随我的想法。让我们继续到第二部分。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1U9.jpg)'
  id: totrans-229
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，自动生成的描述](image_rsrc1U9.jpg)'
- en: The first two plot points in part 2 align with my thinking. However, plot points
    3 and 4 are not. I think there are only supplies on Mars waiting in anticipation
    for colonists to arrive. Let’s continue to part 3.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分的前两个情节点与我的想法一致。然而，情节点3和4则不然。我认为火星上只有等待殖民者到来的物资。让我们继续到第三部分。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UA.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，自动生成的描述](image_rsrc1UA.jpg)'
- en: In part 3, the deviation from my original thoughts for this story continues.
    If this were an active project, I could massage my original prompt to adhere more
    closely to my ideas. Or I could incorporate the randomness of the AI plot points.
    Read plot point 4, Echos from Earth. This would certainly be a twist after thinking
    everyone on Earth was dead for most of the story.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三部分，这个故事的情节与我的原始想法继续偏离。如果这是一个活跃的项目，我可以调整我的原始提示，使其更接近我的想法。或者我可以结合AI情节点的随机性。阅读情节点4，来自地球的回声。这肯定是在大多数人认为地球上的人都已死去的大部分故事之后的一个转折。
- en: Now, we move on to the final part, the Epilogue.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们进入最后一部分，即结语。
- en: '![A white text on a white background Description automatically generated](image_rsrc1UB.jpg)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
  zh: '![白色文字在白色背景上，自动生成的描述](image_rsrc1UB.jpg)'
- en: I am not thrilled with the Epilogue, but if this were an active project, the
    epilogue could be developed.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我对结语并不兴奋，但如果这是一个活跃的项目，结语可以进一步发展。
- en: Second Scenario -  I don’t know what I want to write next.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个场景 - 我不知道接下来想写什么。
- en: You have succumbed to writer’s block. You want to write a science fiction story
    but don’t have an idea. You can ask the AI to come up with ten ideas for a science
    fiction story, or you can choose a topic yourself.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你陷入了写作瓶颈。你想要写一个科幻故事，但没有想法。你可以让AI提出十个科幻故事的想法，或者你可以自己选择一个主题。
- en: First, we have the AI come up with ten ideas.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们让AI提出十个想法。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UC.jpg)![A
    screenshot of a computer Description automatically generated](image_rsrc1UD.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，自动生成的描述](image_rsrc1UC.jpg)![计算机屏幕截图，自动生成的描述](image_rsrc1UD.jpg)'
- en: You can run with any of those ideas or use your own. Let’s run with the first
    idea generated by the AI. Let’s add my directive sentence, Write a plot and story
    outline for the following science fiction novel, to the beginning of the idea.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以采用这些想法中的任何一个，或者使用你自己的想法。让我们从AI生成的第一个想法开始。让我们在想法的开头添加我的指令句子：“为以下科幻小说编写情节和故事大纲。”
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UE.jpg)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 自动生成的描述](image_rsrc1UE.jpg)'
- en: Again, the AI has created a suitable title, background, and protagonist. Moving
    on to part 2.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，AI已经创建了一个合适的标题、背景和主角。接下来进行第二部分。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UF.jpg)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 自动生成的描述](image_rsrc1UF.jpg)'
- en: The AI provides excellent plot points and development, on to part 3.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: AI提供了优秀的情节点和发展，进入第三部分。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UG.jpg)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 自动生成的描述](image_rsrc1UG.jpg)'
- en: The AI develops the plot, beginning with a personal issue for the protagonist
    and progressing to a global issue for the world in part 4.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: AI从主角的个人问题开始发展情节，并在第四部分推进到全球性问题。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UH.jpg)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 自动生成的描述](image_rsrc1UH.jpg)'
- en: A complete story outline. Remember, every section and plot point can be tweaked
    to align with your vision and sensibilities.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 一个完整的故事大纲。记住，每个部分和情节点都可以调整以符合你的愿景和感受。
- en: Chapter 6 - Writing Non-Fiction; ideas, outline, and purpose
  id: totrans-249
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第六章 - 撰写非虚构作品；想法、大纲和目的
- en: '![A light bulb on an open book Description automatically generated](image_rsrc1UJ.jpg)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![一本打开的书上的灯泡 自动生成的描述](image_rsrc1UJ.jpg)'
- en: Non-Fiction Work
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 非虚构作品
- en: If you are using AI to assist in writing non-fiction material, be careful. AI
    can sometimes “hallucinate” information, providing inaccurate or fabricated information
    in such great detail as you would unquestioningly consider it true.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用AI协助撰写非虚构材料，请小心。AI有时会“产生幻觉”信息，提供如此详细的不准确或编造的信息，以至于你会毫不犹豫地认为它是真的。
- en: When researching a medical topic, I have had an AI completely fabricate medical
    facts with fake citations to non-existent studies and papers with fictional non-working
    URLs. I was stunned by the details involved in the fabrication by the AI.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在研究医学主题时，我曾遇到一个AI完全编造医学事实，并使用对不存在的研究和论文的虚假引用。AI在编造过程中涉及的细节让我震惊。
- en: We, unfortunately, have a tendency to believe computers and AI when they are
    quoting facts. Always verify any facts generated by AI. With AI, trust but verify.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 很不幸，我们有一种相信计算机和AI在引用事实时的倾向。始终验证AI生成的任何事实。与AI打交道时，要信任但也要核实。
- en: Plagiarism
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 抄袭
- en: AI tools are designed not to copy existing content verbatim, it’s wise to run
    AI-generated text through a plagiarism checker as a precaution.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: AI工具的设计是不直接复制现有内容，因此明智的做法是在预防措施下运行AI生成的文本通过抄袭检测器。
- en: Non-Fiction Idea and Outline
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 非虚构想法和大纲
- en: You can direct an AI to develop ideas and outlines if you have an idea for a
    nonfiction article or book. You can also direct the AI to provide ideas if you
    are lost for ideas.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个非虚构文章或书籍的想法，你可以指导AI发展想法和大纲。如果你没有想法，你还可以指导AI提供想法。
- en: 'Let’s start with the first scenario: You have an idea you want to develop and
    move forward with. The following is an idea I have for personal development that
    I plan on writing about.'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从第一个场景开始：你有一个想要发展和推进的想法。以下是我计划撰写的关于个人发展的想法。
- en: While many self-help how-to development articles/books focus on goal setting,
    my article will be specifically on perseverance toward a goal. When a person initially
    sets a goal, the excitement and the plans to achieve drive you forward. Most worthwhile
    goals take a considerable amount of time to achieve. So my article is about how
    to persevere and keep grinding toward your goal when your enthusiasm dissipates,
    and you prefer to stop and pursue a different bright and shiny goal.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 当许多自助如何发展文章/书籍专注于目标设定时，我的文章将专门讨论对目标的坚持。当一个人最初设定目标时，兴奋和实现计划的驱动会让你前进。大多数值得追求的目标需要相当长的时间才能实现。因此，我的文章是关于如何在热情消退、你更愿意停止并追求另一个不同且闪亮的目标的时侯，如何坚持不懈并继续努力实现目标。
- en: I added the following directive to the beginning of my idea. Rewrite and improve
    this idea as a directive to develop this idea into an outline for writing.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 我在想法的开头添加了以下指令。将这个想法重写并改进，以将其发展成一个写作大纲的指令。
- en: '![A close up of a text Description automatically generated](image_rsrc1UK.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![文本特写自动生成的描述](image_rsrc1UK.jpg)'
- en: The AI responds with a title and objective.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: AI回应了一个标题和目标。
- en: '![A screenshot of a article Description automatically generated](image_rsrc1UM.jpg)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![文章截图自动生成的描述](image_rsrc1UM.jpg)'
- en: Followed by a 7 chapter outline, with sub-points to hit inside each chapter.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 随后是一个7章大纲，每章都有要涵盖的子点。
- en: '![A list of goals with text Description automatically generated](image_rsrc1UN.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![带有文字的目标列表自动生成的描述](image_rsrc1UN.jpg)'
- en: It ends its response with a note to the writer.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 它以给作者的一则笔记结束其回应。
- en: '![A white background with black text Description automatically generated](image_rsrc1UP.jpg)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景黑色文字自动生成的描述](image_rsrc1UP.jpg)'
- en: Greater focus
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 更大的关注
- en: I could get the AI to achieve greater focus by defining a personality to imitate
    and an audience. I am not doing that here. Let’s assume you are happy with this
    outline; one way you could proceed is to ask the AI to write on each point.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以通过定义一个要模仿的个性和受众来让AI达到更大的关注。我这里没有这么做。让我们假设你对这个大纲感到满意；你可以通过要求AI针对每个要点进行写作来继续进行。
- en: The first point in Chapter 1, Introduction, is to briefly discuss the universal
    allure of setting new goals.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章，引言的第一点是简要讨论设定新目标的无尽吸引力。
- en: You could begin fleshing out the document by asking the AI to write 100 words
    on that first point.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以要求AI就第一个要点写100个字，开始充实文档。
- en: Write 100 words - briefly discuss the universal allure of setting new goals.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 写100个字 - 简短讨论设定新目标的无尽吸引力。
- en: 'ChatGPT responds with:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回应道：
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UR.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图自动生成的描述](image_rsrc1UR.jpg)'
- en: You can continue in this manner until you have a complete article ready for
    editing.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以继续这样写，直到你有一个完整的文章准备编辑。
- en: Idea Generation
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 想象力生成
- en: If you don’t have a clear-cut topic for your article/book, you can ask the AI
    to create ideas for you. Using the idea of required perseverance toward a goal,
    we can ask the AI the following.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有明确的文章/书籍主题，你可以要求AI为你创造想法。使用对实现目标所需坚持不懈的想法，我们可以向AI提出以下问题。
- en: Please generate five self-help article ideas that focus on the how-to of maintaining
    perseverance in achieving a goal.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 请生成五个以如何保持实现目标坚持不懈为焦点的自我提升文章想法。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1US.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图自动生成的描述](image_rsrc1US.jpg)'
- en: Each article idea provided by the AI can be drilled down as we did with the
    first idea.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对AI提供的每个文章想法进行深入挖掘，就像我们对第一个想法所做的那样。
- en: Chapter 7 - Sudowrite For Topics AI Will Not Write
  id: totrans-282
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第七章 - Sudowrite For Topics AI Will Not Write
- en: '![A child writing on a paper with a robot Description automatically generated](image_rsrc1UT.jpg)'
  id: totrans-283
  prefs: []
  type: TYPE_IMG
  zh: '![一个孩子在纸上写着一个机器人的描述自动生成的描述](image_rsrc1UT.jpg)'
- en: There are some things, well many things, our standard AI platforms will refuse
    to write. In the case of ChatGPT, anything outside OpenAI’s Content Guidelines
    will be rejected or throttled back in content. These include too graphic scenes
    of violence, sex, rape, incest, or slavery. I can’t list everything that could
    trigger a content warning or dismissal of services, but in the middle of writing
    a novel, you don’t want to argue with your AI writing assistant.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 有些事情，好吧，很多事情，我们的标准AI平台会拒绝写作。在ChatGPT的情况下，任何超出OpenAI内容指南的内容都会被拒绝或限制。这包括过于血腥的暴力、性、强奸、乱伦或奴隶制场景。我无法列出所有可能触发内容警告或服务拒绝的内容，但在写作小说的过程中，你不想与你的AI写作助手争论。
- en: '![A close-up of a white background Description automatically generated](image_rsrc1UU.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景特写自动生成的描述](image_rsrc1UU.jpg)'
- en: Sudowrite will assist you in writing when other platforms refuse your request.
    Sudowrite is an AI designed to assist writers in writing creative fiction. Like
    other AIs, Sudowrite is intended to assist you in your writing, not to do the
    writing for you.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 当其他平台拒绝你的请求时，Sudowrite将帮助你写作。Sudowrite是一个旨在帮助作家创作创意小说的AI。像其他AI一样，Sudowrite旨在帮助你写作，而不是为你代写。
- en: Sudowrite is powerful, and I feel it is a little better than general-purpose
    AIs for writing fiction. However, for non-fiction writing, I feel GPT4o is the
    stronger AI.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: Sudowrite功能强大，我感觉它比通用AI在写小说方面略胜一筹。然而，对于非虚构写作，我感觉GPT4o是更强的AI。
- en: That said, let’s examine a few of Sudowrite's features for fiction. The following
    is the stock Sudowrite home screen.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，让我们来探讨一下Sudowrite的一些小说功能。以下是Sudowrite的股票主页。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UV.jpg)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1UV.jpg)'
- en: Keep in mind that this is a quick overview of Sudowrite. To explore all of its
    features, a book would be required. However, beginners can utilize Sudowrite at
    its elementary levels and still derive excellent results.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这只是一个Sudowrite的快速概述。要探索其所有功能，可能需要一本书。然而，初学者可以在Sudowrite的基本级别上使用它，并仍然获得优秀的结果。
- en: This is my home screen of Sudowrite.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我的Sudowrite主屏幕。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UW.jpg)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1UW.jpg)'
- en: To change the color theme, hit the settings gear icon in the upper right. That
    opens the following screen;
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 要更改颜色主题，点击右上角的设置齿轮图标。这会打开以下屏幕；
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UX.jpg)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1UX.jpg)'
- en: I changed the theme from Sorbet to Amber.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 我将主题从Sorbet更改为Amber。
- en: New Projects
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 新项目
- en: When you select a project, a new Sudowrite screen opens up for writing and editing.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 当你选择一个项目时，会打开一个新的Sudowrite屏幕进行写作和编辑。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1UY.jpg)'
  id: totrans-298
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1UY.jpg)'
- en: The center screen is the editor. It has the expected editor controls in its
    upper left-hand corner.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕中央是编辑器。它在其左上角有预期的编辑器控制。
- en: The Project list to the left of the editor lists your projects.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑器左侧的项目列表列出了你的项目。
- en: The History panel is to the right of the editor. It shows the history of Sudowrite’s
    generated content. Below each card, you can insert or copy the text. You can also
    highlight and copy portions of the text to use in your writing.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 历史面板位于编辑器右侧。它显示了Sudowrite生成内容的记录。在每张卡片下方，你可以插入或复制文本。你还可以高亮并复制文本的一部分用于你的写作。
- en: The canvas option at the lower left opens a screen that allows you to visualize
    text. Much like a text-to-art AI. See example below
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 左下角的画布选项打开一个屏幕，允许你可视化文本。就像一个文本到艺术AI。见以下示例
- en: '![A screenshot of a video game Description automatically generated](image_rsrc1UZ.jpg)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![视频游戏截图，自动生成描述](image_rsrc1UZ.jpg)'
- en: The Features Toolbar provides options that would require a prompt in standard
    GPT4o.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 功能工具栏提供了一些在标准GPT4o中需要提示的选项。
- en: Rewrite
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 重写
- en: If you highlight text in the editor, you get the following options to act upon
    that highlighted text.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你编辑器中高亮文本，你会得到以下选项来处理该高亮文本。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V0.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1V0.jpg)'
- en: 'If you choose to Rewrite, on the right-hand side of the screen, you are provided
    the following options:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你选择重写，屏幕右侧将提供以下选项：
- en: '![A screenshot of a phone Description automatically generated](image_rsrc1V1.jpg)'
  id: totrans-309
  prefs: []
  type: TYPE_IMG
  zh: '![手机截图，自动生成描述](image_rsrc1V1.jpg)'
- en: Select from the drop-down menu what operation you want Sudowrite to perform
    and hit go.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择你想要Sudowrite执行的操作，然后点击“执行”。
- en: The results will be shown on the right side of the screen, ready for you to
    insert, copy, or edit into your story.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 结果将在屏幕右侧显示，供你插入、复制或编辑到你的故事中。
- en: Quick Chat
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: Quick Chat
- en: Quick Chat is like a ChatGPT prompt screen. When you highlight text in the editor,
    you get the following options.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: Quick Chat就像一个ChatGPT提示屏幕。当你编辑器中高亮文本时，你会得到以下选项。
- en: '![](image_rsrc1V2.jpg)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc1V2.jpg)'
- en: Clicking on “Quick Edit” opens a prompt window. Here, you can enter ChaptGPT-style
    prompts to edit your highlighted text.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“快速编辑”会打开一个提示窗口。在这里，你可以输入ChaptGPT风格的提示来编辑你高亮显示的文本。
- en: '![A black rectangular object with white text Description automatically generated](image_rsrc1V3.jpg)'
  id: totrans-316
  prefs: []
  type: TYPE_IMG
  zh: '![黑色矩形物体，白色文字描述自动生成](image_rsrc1V3.jpg)'
- en: 'I entered a prompt, asking Sudowrite to make the text more descriptive. The
    result was the following:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 我输入了一个提示，要求Sudowrite使文本更具描述性。结果是以下内容：
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V4.jpg)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1V4.jpg)'
- en: I could either accept or reject Sudowrite's output.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以接受或拒绝Sudowrite的输出。
- en: Writing for You
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 为你写作
- en: You can direct Sudowrite to write for you. Why? Suppose you have reached an
    impasse and have writer’s block. Sudowrite can read what you have written and
    add some meaningful text.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以指示Sudowrite为你写作。为什么？假设你遇到了瓶颈，有写作障碍。Sudowrite可以阅读你写的内容并添加一些有意义的文本。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V5.jpg)'
  id: totrans-322
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图自动生成的描述](image_rsrc1V5.jpg)'
- en: I placed my cursor at the end of the last sentence in the screenshot. Then,
    I clicked on Write in the Features Toolbar. The text shown on the right of the
    screenshot is the text generated by Sudowrite.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 我将光标放在截图最后一句的末尾。然后，我在功能工具栏中点击了“写入”。截图右侧显示的文本是 Sudowrite 生成的文本。
- en: Descriptions
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 描述
- en: If you highlight an item inside your text, you can ask Sudowrite to write a
    description of that item. It will write a description for each of the five senses,
    plus a metaphor. Each option can be turned on or off.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你突出显示文本中的某个项目，你可以要求 Sudowrite 描述该物品。它将为五种感官以及一个比喻各写一个描述。每个选项都可以打开或关闭。
- en: '![A screenshot of a phone Description automatically generated](image_rsrc1V6.jpg)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![手机截图自动生成的描述](image_rsrc1V6.jpg)'
- en: As an example, imagine highlighting the words “gold ring” and asking Sudowrite
    to describe it. Sudowrite will produce the following outputs.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，想象一下突出显示“金戒指”这个词，并要求 Sudowrite 描述它。Sudowrite 将生成以下输出。
- en: SIGHT
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉
- en: The gold ring sparkles under the bright sunlight, its polished surface reflecting
    the rays in a dazzling display of light and color. Its band is thin and delicate,
    adorned with intricate engravings of vines and leaves.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 金戒指在明亮的阳光下闪耀，其抛光的表面反射着光线，呈现出令人眼花缭乱的色彩。它的环带细而精致，装饰着复杂的藤蔓和叶子的雕刻。
- en: The gold ring shimmers under the sunlight, its surface catching and reflecting
    every beam, creating a dazzling display of lights. The metal is polished to a
    brilliant shine, creating a sense of luxury and elegance.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 金戒指在阳光下闪烁，其表面捕捉并反射每一束光线，创造出一道耀眼的光芒。金属被抛光到闪亮的光泽，营造出奢华和优雅的感觉。
- en: The gold ring gleamed in the sunlight, its smooth and polished surface reflecting
    the surrounding scenery like a mini mirror.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 金戒指在阳光下闪耀，其光滑抛光的表面像迷你镜子一样反射周围的景色。
- en: SMELL
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 嗅觉
- en: The ring emits a faint scent of metal and earth, hinting at the natural elements
    used to create it.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 戒指散发出微弱的金属和土壤气味，暗示了用于制作它的自然元素。
- en: The gold ring has no scent, but the oils and perfumes of its wearer cling to
    it, leaving a trace of sweetness and warmth.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 金戒指没有气味，但佩戴者的油脂和香水会附着在其上，留下淡淡的甜味和温暖。
- en: The metallic scent of gold wafted from the ring, filling the air with the aroma
    of wealth and luxury.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 金戒指的金属香味从戒指中飘散出来，空气中充满了财富和奢华的香气。
- en: TASTE
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 味觉
- en: If licked, the gold ring would leave a metallic taste on the tongue, a reminder
    of its precious material.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 如果舔一下金戒指，舌头会留下金属的味道，提醒它的珍贵材质。
- en: The ring has no taste, but a lingering sensation of warmth and familiarity remains
    on the tongue as if a loved one's touch still lingers.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 戒指没有味道，但舌头上有一种温暖和熟悉的感觉，就像亲人的触摸仍然存在。
- en: Although not recommended, licking the ring would reveal a faint taste of metal,
    similar to licking coins.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不推荐，但舔戒指会透露出微弱的金属味，类似于舔硬币。
- en: SOUND
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 听觉
- en: A soft clinking sound can be heard as the ring is slid onto a finger. Tapping
    against a hard surface produces a crisp ringing sound that signifies its value.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 当戒指滑到手指上时，可以听到柔和的叮当声。敲击硬物会产生清脆的叮当声，这表明了它的价值。
- en: As the ring is picked up and moved, it creates a soft clinking sound, almost
    like tiny bells chiming together, a delicate melody that adds to its allure.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 当戒指被拿起并移动时，会发出柔和的叮当声，几乎像是 tiny bells chiming together，一种精致的旋律，增添了它的魅力。
- en: As it falls, the gold ring clinks against other gold rings in a pleasing tinkling
    sound, a symphony of wealth.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 当它落下时，金戒指与其他金戒指碰撞，发出悦耳的叮当声，是一曲财富的交响乐。
- en: TOUCH
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 触觉
- en: The gold ring feels cool and smooth to the touch, its weight light yet substantial.
    Run your fingers along the engravings and feel the slight indentations of the
    design.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 金戒指触感凉爽光滑，重量轻而充实。沿着雕刻轻轻触摸，可以感觉到设计的轻微凹痕。
- en: Running a finger along the ring feels smooth and cool to the touch. The metal
    is solid and unyielding yet comforting in its weight.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着戒指轻轻触摸，感觉光滑凉爽。金属坚固而不可屈服，但在重量上却给人以安慰。
- en: The ring felt warm to the touch, its smooth surface hinting at the skill and
    craftsmanship that went into creating it.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 戒指触感温暖，光滑的表面暗示着制作它所需的技艺和工艺。
- en: METAPHOR
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 比喻
- en: The ring gleamed like a golden droplet of sunshine, a bright spot of wealth
    and opulence amidst the dull gray of everyday life.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 戒指像金色的阳光露珠一样闪耀，在日常生活中单调的灰色中成为财富和奢华的亮点。
- en: METAPHOR
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 比喻
- en: The ring was like a tiny sun, casting golden rays that shimmered and danced
    across the surface of her finger.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 那个戒指就像一个小太阳，投射出金色的光芒，在手指表面闪烁和舞动。
- en: ChatGPT4
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT4
- en: Asking ChatGPT4 to describe a gold ring renders the following output.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 要求ChatGPT4描述一个金戒指，会得到以下输出。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V7.jpg)'
  id: totrans-354
  prefs: []
  type: TYPE_IMG
  zh: '![计算机的自动生成描述截图](image_rsrc1V7.jpg)'
- en: SudoWrite’s SuperPower
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: SudoWrite的超级功能
- en: 'Sudowrite has many features that I haven’t touched up. But I would be remiss
    not to mention what I believe is the most important feature available in Sufowrite:
    its “Story Bible.”'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: Sudowrite有许多我尚未尝试的功能。但我不提及其最重要的功能——Sudowrite的“故事圣经”是不妥的。
- en: Story Bible
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 故事圣经
- en: Clicking on Story Bible opens a page of questions about your story that will
    help the Sudowrite AI stay on track and produce good content. AIs tend to wander
    and branch out, writing content that doesn’t relate to the story at hand.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 点击故事圣经会打开一个关于你故事的问题页面，这将帮助Sudowrite AI保持方向并产生优质内容。AI往往会偏离主题，写出与当前故事无关的内容。
- en: '![A screenshot of a book Description automatically generated](image_rsrc1V8.jpg)'
  id: totrans-359
  prefs: []
  type: TYPE_IMG
  zh: '![一本书的自动生成描述截图](image_rsrc1V8.jpg)'
- en: The full-page GUI is shown below.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 下图显示了全页GUI。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1V9.jpg)'
  id: totrans-361
  prefs: []
  type: TYPE_IMG
  zh: '![计算机的自动生成描述截图](image_rsrc1V9.jpg)'
- en: The story bible is an invaluable asset that many fiction writers have reviewed
    positively. However, it’s extensive and labor-intensive to fill out correctly.
    This is the Garbage-in-Garbage-out computer philosophy. If you want the best content
    from the Sudowrite AI, fill out the story bible with the best content. Remember,
    you are not obligated to complete the entire story bible in one go. It can be
    filled out over several writing sessions.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 故事圣经是无价之宝，许多小说作家对其评价很高。然而，正确填写它既广泛又费时。这是“垃圾输入，垃圾输出”的计算机哲学。如果你想从Sudowrite AI获得最佳内容，请用最佳内容填写故事圣经。记住，你不必一次性完成整个故事圣经。它可以在几个写作会话中完成。
- en: I would only invest the time filling out the Story Bible for more complex writing
    projects, such as novels and short story series.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 我只会为更复杂的写作项目，如小说和短篇故事系列，花费时间填写故事圣经。
- en: Cost
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 成本
- en: Sudowrite pricing is purchasing credits. The program consumes credits as it
    performs writing assignments.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: Sudowrite的定价是购买积分。程序在执行写作任务时会消耗积分。
- en: Learning Sudowrite
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 学习Sudowrite
- en: There are many resources available to learn Sudowrite. The company Sudowrite
    offers live classes and has an extensive library of tutorial videos on YouTube.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多资源可以学习Sudowrite。Sudowrite公司提供现场课程，并在YouTube上拥有大量的教程视频库。
- en: Sudowrite has a Discord channel you can join.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: Sudowrite有一个你可以加入的Discord频道。
- en: Many independent writers also uploaded Sudowrite tutorial videos on YouTube.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 许多独立作家也在YouTube上上传了Sudowrite教程视频。
- en: YouTube Video’s
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: YouTube视频
- en: '[https://www.youtube.com/watch?v=LwUIAvOIGUE&t=7s](https://www.youtube.com/watch?v=LwUIAvOIGUE&t=7s)'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.youtube.com/watch?v=LwUIAvOIGUE&t=7s](https://www.youtube.com/watch?v=LwUIAvOIGUE&t=7s)'
- en: Alternative AIs
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 其他AI
- en: Here is a short list of AIs that are specific to writing.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份简短列表，列出了专门针对写作的AI。
- en: Rytr
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: Rytr
- en: '[https://rytr.me/](https://rytr.me/)'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://rytr.me/](https://rytr.me/)'
- en: ShortyAI
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: ShortyAI
- en: '[https://www.shortlyai.com/](https://www.shortlyai.com/)'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.shortlyai.com/](https://www.shortlyai.com/)'
- en: WriteSonicAI
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: WriteSonicAI
- en: '[https://writesonic.com/](https://writesonic.com/)'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://writesonic.com/](https://writesonic.com/)'
- en: JasperAI
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: JasperAI
- en: '[https://www.jasper.ai/tools](https://www.jasper.ai/tools)'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.jasper.ai/tools](https://www.jasper.ai/tools)'
- en: Chapter 8 – Letting Characters Speak
  id: totrans-382
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第8章 – 让角色说话
- en: '![A group of people standing together Description automatically generated](image_rsrc1VA.jpg)'
  id: totrans-383
  prefs: []
  type: TYPE_IMG
  zh: '![一群人站在一起的自动生成描述](image_rsrc1VA.jpg)'
- en: Much like an actor, you can direct ChatGPT to adopt a persona or character before
    responding to a prompt. The purpose is to tailor the AI’s response to achieve
    your desired outcome. For instance, you can direct the AI to respond as a professional
    persona, such as a doctor, lawyer, or Indian chief.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 就像演员一样，你可以在ChatGPT响应提示之前，指导它采用一个角色或人格。目的是为了使AI的响应符合你的期望。例如，你可以指导AI以专业角色回应，如医生、律师或印第安首领。
- en: For instance, in a fictional scene, you may ask the AI to rewrite a little dialog
    as if one character were a doctor talking to another character with a medical
    issue. This will add a measure of realism.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个虚构场景中，你可以要求AI重写一小段对话，就像一个角色在和一个有医疗问题的人物交谈一样。这将增加一定的现实感。
- en: To see how assuming a character works, I asked ChatGPT4 to write a 100-word
    description of an Apollo liftoff, first as a rocket scientist and then as a 13-year-old
    boy.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 为了看到扮演角色的效果，我要求ChatGPT4以火箭科学家和一个13岁男孩的身份分别写一个100字的阿波罗发射描述。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VB.jpg)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的计算机截图描述](image_rsrc1VB.jpg)'
- en: I have had fun writing a passage of text and then asking ChatGPT to rewrite
    it using the voice of a famed horror writer or hardboiled detective novelist.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢写一段文字，然后让ChatGPT用著名恐怖作家或硬汉侦探小说家的笔调重新写一遍。
- en: Here’s a rewritten piece using the voice of a famous horror writer
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是使用著名恐怖作家笔调重写的作品。
- en: And here’s the hard boil detective writer.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是硬汉侦探作家的风格。
- en: '![A screenshot of a text message Description automatically generated](image_rsrc1VC.jpg)'
  id: totrans-391
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的文本消息截图描述](image_rsrc1VC.jpg)'
- en: Pulp Fiction and Other Voices
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 纸浆小说及其他声音
- en: As a writer, you may not want to invoke the names of other writers. That's fair
    enough. Instead of using the proper names of writers, one could use a generic
    term such as “Horror Writer” or “Paranormal Writer.” For hard-boiled detectives,
    instead of proper writer names, use the terms “Pulp Fiction Writer” and “Noir—Hard
    Boiled Detective Writer.” Experiment and play with them; you will develop your
    own prompts that provide the desired results.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作家，你可能不想提及其他作家的名字。这是完全可以理解的。与其使用作家的真实姓名，不如使用通用术语，如“恐怖作家”或“超自然作家”。对于硬汉侦探，与其使用作家的真实姓名，不如使用“纸浆小说作家”和“黑色电影——硬汉侦探作家”。尝试并玩转这些术语；你将发展出能提供所需结果的自己的提示。
- en: You can direct ChatGPT to write in any fiction or non-fiction genre you can
    define.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以指导ChatGPT以你定义的任何虚构或非虚构体裁进行写作。
- en: More Voices and Contexts
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 更多声音和背景
- en: Here is a partial list of keywords that may be used to direct the AI to create
    fiction focused content.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个可能用于指导AI创建聚焦于虚构内容的部分关键词列表。
- en: Emotions and Moods
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 情绪与心情
- en: Love                  Hate            Sarcastic            Funny
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 爱                  恨            讽刺的            有趣的
- en: Helpful            Hurtful            Passionate               Sensual
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 有益的            有害的            热情的               感官的
- en: Dark                  Light            Horror            Psychotic
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 暗黑                  光明            恐怖            精神错乱
- en: Thriller            Paranormal      Ghostly            Deadly
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 惊悚            超自然            幽灵般的            致命的
- en: Define and Trim the Output
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 定义并修剪输出
- en: I usually restrict the output of the AI. Simple terms like write 100 words.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常限制AI的输出。简单的术语如写100个字。
- en: Chapter 9 - Writing Emotional Scenes
  id: totrans-404
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第九章 - 写作情感场景
- en: The AI can help write emotional scenes in two main categories. One is to describe
    the emotions your character might feel in a given situation. The second is to
    write the emotional scene itself.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以在两个主要类别中帮助编写情感场景。一是描述你的角色在特定情况下可能感受到的情绪。二是编写情感场景本身。
- en: Let’s take the first situation, describing your character's emotions.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以第一种情况为例，描述你的角色的情绪。
- en: 'Prompt:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: Describe the anxiety a nervous person feels on a roller-coaster ride as he is
    being pulled up vertically to the first drop.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 描述一个紧张的人在过山车上被垂直拉到第一个下坠点时感受到的焦虑。
- en: 'Results:'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: 'As a nervous person is pulled up vertically to the first drop of a roller coaster,
    they may experience a whirlwind of emotions and physical sensations. Here is a
    description of the anxiety they might feel:'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个紧张的人被垂直拉到过山车第一个下坠点时，他们可能会体验到一系列的情绪和身体感觉。以下是他们可能感受到的焦虑描述：
- en: 'Anticipation and Dread: As the roller coaster climbs higher, the person might
    feel a growing sense of anticipation mixed with dread. The slow ascent builds
    tension, and they may become hyper-aware of each click of the chain pulling them
    upward.'
  id: totrans-411
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预期与恐惧：当过山车缓缓上升时，人们可能会感到越来越强烈的预期与恐惧交织。缓慢的上升过程累积了紧张感，他们可能会变得对链条每一次拉动他们向上的声音变得极度敏感。
- en: 'Racing Thoughts: Their mind could be racing with thoughts about what is to
    come. They might be questioning their decision to get on the ride or imagining
    the drop ahead with a mix of fear and excitement.'
  id: totrans-412
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 急速思维：他们的思绪可能会飞速转动，思考即将发生的事情。他们可能会质疑自己乘坐这个过山车的决定，或者带着恐惧和兴奋混合的情绪想象即将到来的下坠。
- en: 'Physical Sensations: Physically, they might experience a rapid heartbeat, shallow
    breathing, and a tightening in their chest. Their stomach could feel like it''s
    tied in knots, and they may have sweaty palms or a dry mouth as their body responds
    to the perceived threat.'
  id: totrans-413
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 身体感觉：从身体上讲，他们可能会经历心跳加速、呼吸急促和胸部紧绷。他们的胃可能会感觉像被结在一起，他们可能会因为身体对感知到的威胁的反应而出汗或口干。
- en: 'Heightened Senses: As they reach the peak, their senses might feel heightened.
    The view from the top, the sounds of the ride, and the feel of the wind can all
    seem more intense, contributing to their anxiety.'
  id: totrans-414
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 感官增强：当他们达到顶峰时，他们的感官可能会感到增强。从顶部看到的景色、过山车的声音和风的感觉都可能显得更加强烈，这些都加剧了他们的焦虑。
- en: 'Tension and Release: The tension reaches its peak as they near the top. There''s
    a brief moment of weightlessness and suspension just before the drop, which can
    feel both terrifying and exhilarating.'
  id: totrans-415
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 紧张与释放：当他们在接近顶部时，紧张感达到顶峰。在掉落前，有一瞬间失重和悬浮的感觉，这既可能感到恐怖又可能感到兴奋。
- en: 'Fight or Flight Response: Their body might activate the fight or flight response,
    a natural reaction to fear, leading to a surge of adrenaline that amplifies their
    alertness and awareness.'
  id: totrans-416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 战斗或逃跑反应：他们的身体可能会激活战斗或逃跑反应，这是一种对恐惧的自然反应，导致肾上腺素激增，增强他们的警觉性和意识。
- en: Overall, the experience of being pulled up to the first drop on a roller coaster
    can be a complex mix of fear, excitement, and physical arousal, culminating in
    a powerful rush of emotions as they brace for the plunge.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，被拉向过山车第一座山的体验可能是一种复杂的恐惧、兴奋和身体兴奋的混合，最终在准备冲下时达到强烈的情绪高潮。
- en: In the next prompt we direct the AI to write the scene itself.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个提示中，我们指导AI编写场景本身。
- en: 'Prompt:'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: Write a fictional first-person scene of the feelings inside a nervous person
    on a roller-coaster ride as he is being pulled up vertically to the first drop.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个虚构的第一人称场景，描述一个紧张的人在过山车上被垂直拉向第一座山时的感受。
- en: 'Result:'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: As I sit in the roller coaster seat, the safety harness clicks into place, locking
    me into this metal contraption that promises both thrills and terror. The ride
    jolts forward, and my heart skips a beat. I grip the bar tightly, my knuckles
    whitening as the car slowly inches toward the towering first hill.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 当我坐在过山车座位上时，安全带咔哒一声扣紧，将我锁在这个既带来刺激又带来恐怖的金属装置中。过山车猛地向前一冲，我的心跳漏了一拍。我紧紧抓住杆子，我的指关节因为车缓缓向高耸的第一座山移动而变白。
- en: With each clink and clank of the chain lift, my anxiety builds, coiling tight
    in my chest. It's a strange, potent mix of fear and excitement, swirling together
    like a storm inside me. My mind races with thoughts I can't quiet. "What was I
    thinking getting on this thing? How high are we going?" The higher we climb, the
    smaller the world below becomes. I can see the entire amusement park sprawling
    beneath us, a miniature version of itself. It's almost beautiful, if not for the
    gnawing fear in my stomach.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 随着链条提升的每一次咔哒声和叮当声，我的焦虑感增强，在胸中紧紧地盘旋。这是一种奇怪而强烈的恐惧和兴奋的混合，就像在我体内肆虐的暴风雨。我的思绪飞快地翻滚，无法平静下来。“我为什么会想到坐这个？我们有多高？”我们爬得越高，下面的世界看起来就越小。我可以看到整个游乐园在我们下方蔓延，它是一个微缩版。如果不是胃里的那种令人不安的恐惧，这几乎是一种美丽。
- en: I take a deep breath, trying to calm my nerves, but my body has other ideas.
    My heart is pounding so hard that I can hear it in my ears, each beat echoing
    like a drum. My palms are sweaty against the cold metal bar, and I feel a prickling
    sensation at the back of my neck.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 我深吸一口气，试图平静我的神经，但我的身体有不同的想法。我的心跳得如此之快，以至于我能在耳边听到它，每一次跳动都像鼓声一样回响。我的手掌在冰冷的金属杆上出汗，我感觉到脖子后面有刺痛感。
- en: As we near the peak, there's a moment of suspension—weightlessness that feels
    both exhilarating and terrifying. The anticipation is almost unbearable. I know
    what's coming, and yet, I'm completely unprepared. The wind whips past my face,
    the only sound is the faint clattering of the coaster.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们接近顶峰时，有一瞬间悬浮——既令人兴奋又令人恐惧的失重感。期待几乎难以忍受。我知道接下来会发生什么，但我完全没准备好。风呼啸过我的脸，唯一的声音是过山车微弱的叮当声。
- en: For a split second, everything is still. The world holds its breath, and so
    do I. And then, we plunge.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 在短短的一瞬间，一切似乎都静止了。世界屏住了呼吸，我也一样。然后，我们冲了下去。
- en: The drop is a freefall into chaos, a wild rush that yanks the breath from my
    lungs and sends my stomach lurching. It's terrifying, but as we race down the
    track, fear transforms into a thrill that courses through me like electricity.
    I'm screaming now, but it's a sound mixed with laughter and pure, unrestrained
    exhilaration.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 跌落是自由落体进入混乱，一种让我呼吸困难、让我的胃部翻腾的狂野冲刺。它是可怕的，但当我们沿着轨道飞驰而下时，恐惧转变为一种电流般贯穿我的兴奋。我现在在尖叫，但那是一种混合了笑声和纯粹、无拘无束的兴奋的声音。
- en: As we level out and prepare for the next twist and turn, I realize the fear
    has given way to something else entirely—a sense of triumph and a reminder that
    sometimes the scariest moments lead to the most unforgettable experiences.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们平稳过渡并准备迎接下一个转折点时，我意识到恐惧已经让位于另一种完全不同的东西——一种胜利感，以及有时最可怕的时刻会带来最难忘的经历的提醒。
- en: Remember the AI is writing a character, not your character. You could flesh
    out the response more aligned to your character, by prefacing the prompt with
    your character’s charter traits.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，AI在编写一个角色，而不是你的角色。你可以通过在提示前加上你角色的性格特征来使回应更符合你的角色。
- en: In addition the AI is going to write a generic scene, in this scene confronting
    fear and the exhilaration afterwards. It’s not going to write anything unique,
    like the character soiled his pants on the first drop.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，AI 将会编写一个通用的场景，在这个场景中，人物将面对恐惧以及随后的兴奋。它不会编写任何独特的内容，比如角色在第一次跌落时弄脏了裤子。
- en: As a writer, you may take this generic scene’s framework and rewrite it to make
    it your own.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作家，你可以采用这个通用场景的框架，并重新编写使其成为你自己的。
- en: Chapter 10 - Adding Mood & Emotion
  id: totrans-432
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第10章 - 添加情绪与情感
- en: '![A person holding many masks Description automatically generated](image_rsrc1VD.jpg)'
  id: totrans-433
  prefs: []
  type: TYPE_IMG
  zh: '![一个人拿着许多面具自动生成的描述](image_rsrc1VD.jpg)'
- en: I want to explore a little further how to direct the AI to create work with
    a specific tonality. By tonality, I mean the mood or emotional quality of the
    text. We can ask the AI to write text that is funny, sarcastic, diplomatic, helpful,
    loving, hateful, etc.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 我想进一步探讨如何指导AI创建具有特定语调的作品。通过语调，我指的是文本的基调或情感质量。我们可以要求AI编写幽默、讽刺、外交、有帮助、充满爱意、仇恨等的文本。
- en: I already posted examples of directing the AI to assume someone's personality
    based on occupation. You can double down on the prompt by adding a personality
    that enhances the desired tonality. For example, you want a sarcastic joke about
    an obese person ordering a second helping of chocolate cake. Direct the AI to
    write the joke as the comedian Don Rickles.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经发布了指导AI根据职业假设某人个性的例子。你可以通过添加一个增强所需语调的个性来加大提示的力度。例如，你想要一个关于一个肥胖的人再次点第二份巧克力蛋糕的讽刺笑话。指导AI以喜剧演员唐·里克斯的口吻编写这个笑话。
- en: Make it Funny
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 让它变得有趣
- en: Please write a sarcastic joke about an obese person ordering a second piece
    of chocolate cake in the voice of comedian Don Rickles.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 请以喜剧演员唐·里克斯的口吻写一个关于一个肥胖的人再次点第二份巧克力蛋糕的讽刺笑话。
- en: '![A screenshot of a social media post Description automatically generated](image_rsrc1VE.jpg)'
  id: totrans-438
  prefs: []
  type: TYPE_IMG
  zh: '![社交媒体帖子截图自动生成的描述](image_rsrc1VE.jpg)'
- en: Whether you like to joke or not is not the point. In its response, the AI provides
    you with fertile ideas and concepts you can use to jump off from. You can choose
    to use only the best bits of the AI’s output. For instance, suppose you are writing
    a scene in a fictional story and want one character to say something to ride another
    character who ordered a second piece of pie during their meeting in a diner. The
    character could say, “Hey, is the baker giving you a group discount?”
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是否喜欢开玩笑，这都不是重点。在其回应中，AI为你提供了丰富的想法和概念，你可以从中跳出来。你可以选择只使用AI输出的最佳部分。例如，假设你正在写一个虚构故事中的场景，并想让一个角色在餐厅的会议中向另一个点了第二份派的角色说些话。这个角色可以说，“嘿，面包师给你团体折扣了吗？”
- en: Make it Sad
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 让它变得悲伤
- en: Write 50-75 compassionate and sad words that a father says to his son, telling
    him his pet cat needs to be put to sleep by the veterinarian.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 写出50-75个充满同情和悲伤的词，描述一位父亲对他的儿子说，他的宠物猫需要由兽医进行安乐死。
- en: '![A screenshot of a chat Description automatically generated](image_rsrc1VF.jpg)'
  id: totrans-442
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图自动生成的描述](image_rsrc1VF.jpg)'
- en: Make it Angry
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 让它变得愤怒
- en: Write 50-75 angry words a man says when he is two minutes late returning to
    his car and discovers that the police have already issued him a parking ticket.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 写出50-75个愤怒的词，描述一个男子两分钟后回到他的车时发现警察已经给他开了一张停车罚单时说的话。
- en: '![A screenshot of a phone Description automatically generated](image_rsrc1VG.jpg)'
  id: totrans-445
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的手机截图](image_rsrc1VG.jpg)'
- en: Make it Diplomatic
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 使其外交化
- en: Write 50-75 diplomatic words a doctor says to an obese patient to encourage
    him to exercise to improve his health.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 写50-75个外交辞令，医生对肥胖患者说，以鼓励他锻炼以改善健康状况。
- en: '![A screenshot of a social media post Description automatically generated](image_rsrc1VH.jpg)'
  id: totrans-448
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的社交媒体帖子截图](image_rsrc1VH.jpg)'
- en: Editing
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑
- en: Rewrite and Improve the Following Text
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 重写并改进以下文本
- en: The one AI prompt I use repeatedly is “Rewrite and improve the following text.”
    It’s a powerful command that reaps many rewards. Not only will the command improve
    the text to the best of its ability, but the AI will also correct spelling and
    grammar errors it finds.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 我反复使用的 AI 提示是“重写并改进以下文本。”这是一个强大的命令，能带来许多回报。不仅该命令会尽力改进文本，AI 还会纠正它发现的拼写和语法错误。
- en: I do not use the AI to check my text for spelling or grammar. These functions
    are performed automatically in the rewrite and improve commands. I intentionally
    included a spelling error in my text; see the outlined word in red.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 我不使用 AI 检查我的文本的拼写或语法。这些功能在重写和改进命令中自动执行。我故意在我的文本中包含了一个拼写错误；请参阅用红色轮廓线标记的单词。
- en: '![A screenshot of a email Description automatically generated](image_rsrc1VJ.jpg)'
  id: totrans-453
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的电子邮件截图](image_rsrc1VJ.jpg)'
- en: The AI’s response improves the text and corrects the spelling error.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: AI 的响应会改进文本并纠正拼写错误。
- en: '![A close-up of a text Description automatically generated](image_rsrc1VK.jpg)'
  id: totrans-455
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的文本描述的特写](image_rsrc1VK.jpg)'
- en: As previous examples have shown, you can also add a personality construct, tone,
    as well as audience directives to the command.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 如前例所示，你还可以在命令中添加个性构建、语气以及受众指令。
- en: Chapter 11 – Using GPT’s
  id: totrans-457
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第11章 – 使用 GPT
- en: '![A person typing on a computer Description automatically generated](image_rsrc1VM.jpg)'
  id: totrans-458
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的人在电脑上打字截图](image_rsrc1VM.jpg)'
- en: In this chapter we will explore the uses of GPTs. The letters GPT are an acronym
    for Generative Pretrained Transformers. We will use this feature to create an
    AI GPT that writes like you. Before we do that, let’s take a quick look at GPTs.
    OpenAI has many ready-made GPTs available to expand the AIs capabilities.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨 GPT 的用途。GPT 代表生成预训练转换器（Generative Pretrained Transformers）。我们将利用这一功能来创建一个像你一样写作的
    AI GPT。在我们这样做之前，让我们快速了解一下 GPT。OpenAI 提供了许多现成的 GPT，以扩展 AI 的功能。
- en: Go to the GPT-4o screen's upper left corner and click Explore GPTs.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 GPT-4o 屏幕的左上角并选择探索 GPT。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VN.jpg)'
  id: totrans-461
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的电脑截图](image_rsrc1VN.jpg)'
- en: This opens a scrollable window with categorized lists of GPTs.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 这将打开一个可滚动的窗口，其中包含分类的 GPT 列表。
- en: 'Here is the list of the top categories:'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是顶级类别的列表：
- en: Writing, Productivity, Research & Analysis, Education, Lifestyle
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 写作、生产力、研究与分析、教育、生活方式
- en: At the top of the page, there is a text box where you can enter terms and search
    for particular GPTs.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 在页面顶部，有一个文本框，您可以在其中输入术语并搜索特定的 GPT。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VP.jpg)'
  id: totrans-466
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的电脑截图](image_rsrc1VP.jpg)'
- en: Below the text box is a scrollable list of available GPTs.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 在文本框下方是一个可滚动的 GPT 列表。
- en: '![A screenshot of a website Description automatically generated](image_rsrc1VR.jpg)'
  id: totrans-468
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的网站截图](image_rsrc1VR.jpg)'
- en: I scrolled down the list of available GPTs and selected Veed video creator to
    illustrate using GPTs.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 我滚动列表中的可用 GPT，并选择了 Veed 视频创建者来展示如何使用 GPT。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VS.jpg)'
  id: totrans-470
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的电脑截图](image_rsrc1VS.jpg)'
- en: Selecting this option opened the Veed welcome screen.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 选择此选项将打开 Veed 欢迎屏幕。
- en: '![A screenshot of a video chat Description automatically generated](image_rsrc1VT.jpg)'
  id: totrans-472
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的视频聊天截图](image_rsrc1VT.jpg)'
- en: I selected “Let’s create a video!”
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择了“让我们创建一个视频！”
- en: This creates a prompt on the screen.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 这将在屏幕上创建一个提示。
- en: '![A screenshot of a video project Description automatically generated](image_rsrc1VU.jpg)'
  id: totrans-475
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的视频项目截图](image_rsrc1VU.jpg)'
- en: I entered the following information.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 我输入了以下信息。
- en: A 20-second video on Yorkshire Terrier dogs. The target audience is potential
    families interested in adopting abandoned dogs. The tone should be encouraging
    and professional.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 一段关于约克夏梗犬的20秒视频。目标受众是希望领养流浪狗的潜在家庭。语气应该是鼓励性和专业的。
- en: '![A white background with black text Description automatically generated](image_rsrc1VV.jpg)'
  id: totrans-478
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，自动生成的描述](image_rsrc1VV.jpg)'
- en: The AI asked a few details which I answered.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: AI询问了一些细节，我回答了。
- en: '![A screenshot of a chat Description automatically generated](image_rsrc1VW.jpg)'
  id: totrans-480
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图，自动生成的描述](image_rsrc1VW.jpg)'
- en: The AI generated a text script that I approved, and then it rendered a 20-second
    video with music, a female narrator, dog video clips, and additional media in
    less than one minute. According to terms you can publish this video.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成了一段我批准的文本脚本，然后在一分钟内制作了一个带有音乐、女声旁白、狗视频剪辑和额外媒体的20秒视频。根据条款，你可以发布这个视频。
- en: '![A screenshot of a video Description automatically generated](image_rsrc1VX.jpg)'
  id: totrans-482
  prefs: []
  type: TYPE_IMG
  zh: '![视频截图，自动生成的描述](image_rsrc1VX.jpg)'
- en: Chapter 12 – Creating a GPT’s That Writes Like You
  id: totrans-483
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第12章 – 创建一个像你一样写作的GPT
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VN.jpg)'
  id: totrans-484
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成的描述](image_rsrc1VN.jpg)'
- en: OpenAI is one of the platforms that allows users to create custom GPTs for specific
    applications.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI是允许用户为特定应用创建自定义GPT的平台之一。
- en: To access the custom set-up, go to the upper left-hand corner of the GPT4o screen,
    outlined in red below.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问自定义设置，请转到GPT4o屏幕的左上角，下面用红色轮廓标出。
- en: Mouse over the Explore GPTs icon, click on the icon to open up a menu.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 将鼠标悬停在“探索GPT”图标上，点击图标以打开菜单。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VY.jpg)'
  id: totrans-488
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成的描述](image_rsrc1VY.jpg)'
- en: This opens a screen where you can install a number of pre-made GPTs. If you
    click on the “+ Create” icon in the upper right corner, outlined in red,  you
    can create a GPT.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 这将打开一个屏幕，你可以安装许多预制的GPT。如果你点击右上角的“+创建”图标，红色轮廓，你可以创建一个GPT。
- en: This opens up the Custom Instructions page.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 这将打开自定义指令页面。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VZ.jpg)'
  id: totrans-491
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成的描述](image_rsrc1VZ.jpg)'
- en: The left side box is where you can input information to create the GPT. You
    can write directives in the text box that you want the AI to follow.  You could
    direct the AI to write its response in a specific way. We will explore two options,
    fiction and non-fiction writing but there are many more. I write both fiction
    and non-fiction. While the instructions to the AI are identical for creating a
    fiction writing GPT and non-fiction writing GPT, the writing samples provided
    to the AI are different.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 左侧的框是你可以输入信息以创建GPT的地方。你可以在文本框中写下你希望AI遵循的指令。你可以指示AI以特定的方式撰写其回应。我们将探索两种选项，虚构和非虚构写作，但还有更多。我既写虚构也写非虚构。虽然为创建虚构写作GPT和非虚构写作GPT提供的指令相同，但提供给AI的写作样本是不同的。
- en: Have GPT Write Like You – Non-Fiction
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 让GPT写出像你一样的非虚构内容
- en: The first step is find the best sample of your fiction writing. I would choose
    a sample of about 1500 words. You can make a PDF file to paste into, just paste
    the writing sample below the instruction. Both methods will work.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是找到你最好的虚构写作样本。我会选择大约1500字的样本。你可以制作一个PDF文件粘贴进去，只需将写作样本粘贴在指令下方即可。两种方法都行。
- en: I wrote this prompt into ChatGPT, and ChatGPT responded.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 我将这个提示输入到ChatGPT中，ChatGPT做出了回应。
- en: '![A white background with black text Description automatically generated](image_rsrc1W0.jpg)'
  id: totrans-496
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，自动生成的描述](image_rsrc1W0.jpg)'
- en: The AI responded
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: AI做出了回应
- en: '![A white background with black text Description automatically generated](image_rsrc1W1.jpg)'
  id: totrans-498
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，自动生成的描述](image_rsrc1W1.jpg)'
- en: Next, I copied and pasted about 700 words I wrote on Red light Therapy into
    GPT text box. The AI responded with the following analysis.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将我在红光疗法上写的约700字复制粘贴到了GPT文本框中。AI给出了以下分析。
- en: The AI responded
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: AI做出了回应
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1W2.jpg)![A
    white background with black text Description automatically generated](image_rsrc1W3.jpg)'
  id: totrans-501
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成的描述](image_rsrc1W2.jpg)![白色背景，黑色文字，自动生成的描述](image_rsrc1W3.jpg)'
- en: The AI asked for the name of this custom GPT, and I answered with the name John.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: AI询问了自定义GPT的名称，我回答了“John”。
- en: '![A screenshot of a chat Description automatically generated](image_rsrc1W4.jpg)'
  id: totrans-503
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图，自动生成的描述](image_rsrc1W4.jpg)'
- en: The AI accepted the name, listed a few specifications of the GPT based on my
    writing sample, then created an icon for the GPT. The preview is shown below.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: AI接受了这个名称，根据我的写作样本列出了一些GPT的规格，然后为GPT创建了一个图标。预览如下。
- en: '![A person in a tie Description automatically generated](image_rsrc1W5.jpg)'
  id: totrans-505
  prefs: []
  type: TYPE_IMG
  zh: '![系着领带的人的图片 自动生成的描述](image_rsrc1W5.jpg)'
- en: I tested the GPT in the preview window.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 我在预览窗口中测试了GPT。
- en: '![A screenshot of a screenshot of a medical test Description automatically
    generated](image_rsrc1W6.jpg)'
  id: totrans-507
  prefs: []
  type: TYPE_IMG
  zh: '![医疗测试截图的截图 自动生成的描述](image_rsrc1W6.jpg)'
- en: Moving forward, when I ask the “John” GPT to write material, it will emulate
    my writing style.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在开始，当我要求“John”GPT撰写材料时，它将模仿我的写作风格。
- en: Fact-Checking AI Non-Fiction Writing GPT
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 事实核查AI非虚构写作GPT
- en: 'We can also use GPTs to fine-tune non-fiction writing. If you are writing non-fiction
    articles and books, you want to reduce the amount of hallucinating facts from
    ChatGPT. This is what I entered into the text box:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用GPT来微调非虚构写作。如果你正在撰写非虚构文章和书籍，你希望减少ChatGPT中虚构事实的数量。这就是我输入文本框的内容：
- en: I want the GPT to answer questions and limit its response to 200 words.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让GPT回答问题，并限制其回答在200字以内。
- en: I want your responses to include a low, medium, or high confidence level to
    its accuracy.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你的回答包括对其准确性的低、中或高置信水平。
- en: When you answer a question, provide the facts along with a valid URL link to
    its source.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 当你回答问题时，提供事实以及其来源的有效URL链接。
- en: If you speculate or predict information, let me know.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你推测或预测信息，请让我知道。
- en: 'This GPT will limit its output to 200-word responses. The GPT should self-analyze
    its response and rate the confidence level in its accuracy: low, medium, or high.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 这个GPT将限制其输出为200字的回答。GPT应自行分析其回答并对其准确性的置信水平进行评级：低、中或高。
- en: Next, I ask for a valid URL link to the source(s) used for its response. This
    helps to verify the accuracy of the GPT’s response, and the URL link may become
    a quoted reference in my writing.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我要求提供用于其回答的有效URL链接。这有助于验证GPT回答的准确性，并且URL链接可能成为我写作中的引用。
- en: '![A white rectangular box with black text Description automatically generated](image_rsrc1W7.jpg)'
  id: totrans-517
  prefs: []
  type: TYPE_IMG
  zh: '![白色矩形框上显示黑色文字的图片 自动生成的描述](image_rsrc1W7.jpg)'
- en: 'The GPT creator responded like this:'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: GPT的创造者这样回应：
- en: '![A white screen with black text Description automatically generated](image_rsrc1W8.jpg)![A
    screenshot of a chat Description automatically generated](image_rsrc1W9.jpg)'
  id: totrans-519
  prefs: []
  type: TYPE_IMG
  zh: '![白色屏幕上显示黑色文字的图片 自动生成的描述](image_rsrc1W8.jpg)![聊天截图 自动生成的描述](image_rsrc1W9.jpg)'
- en: The AI provided a reasonable name for the GPT, Fact Checker Pro, which I accepted.
    Next, the GPT created a useable icon for this GPT.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: AI为GPT提供了一个合理的名字，Fact Checker Pro，我接受了。接下来，GPT为这个GPT创建了一个可用的图标。
- en: Taking the Fact Checker Pro GPT out for a spin. I asked the AI to write on the
    benefits of hydrogen-infused water. The following text shows just how well this
    feature works.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试使用Fact Checker Pro GPT。我要求AI撰写关于氢水益处的文章。以下文本展示了这一功能如何有效工作。
- en: Benefits of Hydrogen-Infused Water
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 氢水的好处
- en: 'Hydrogen-infused water, also known as hydrogen-rich water, is regular water
    that contains dissolved hydrogen gas. Here are some of the benefits associated
    with it:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 氢水，也称为富氢水，是含有溶解氢气的普通水。以下是与之相关的部分好处：
- en: 'Antioxidant Properties:'
  id: totrans-524
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 抗氧化特性：
- en: Hydrogen molecules act as antioxidants, neutralizing harmful free radicals in
    the body. This can help reduce oxidative stress and inflammation.
  id: totrans-525
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 氢分子作为抗氧化剂，可以中和体内的有害自由基。这有助于减少氧化应激和炎症。
- en: 'Confidence Level: Medium'
  id: totrans-526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信水平：中
- en: 'Source: Healthline'
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来源：Healthline
- en: 'Improved Athletic Performance:'
  id: totrans-528
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 改善运动表现：
- en: Some studies suggest that hydrogen-infused water can enhance endurance and reduce
    fatigue during exercise by reducing muscle fatigue and lactate build-up.
  id: totrans-529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些研究表明，氢水可以增强耐力，在运动中减少疲劳，通过减少肌肉疲劳和乳酸积累。
- en: 'Confidence Level: Medium'
  id: totrans-530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信水平：中
- en: 'Source: [PubMed](https://pubmed.ncbi.nlm.nih.gov/20528583/)'
  id: totrans-531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来源：[PubMed](https://pubmed.ncbi.nlm.nih.gov/20528583/)
- en: 'Anti-Inflammatory Effects:'
  id: totrans-532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 抗炎作用：
- en: Drinking hydrogen-infused water may help reduce inflammation, which can benefit
    individuals with conditions like arthritis or metabolic syndrome.
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 喝氢水可能有助于减少炎症，这对患有关节炎或代谢综合征等疾病的人有益。
- en: 'Confidence Level: Medium'
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信水平：中
- en: 'Source: [ScienceDirect](https://www.sciencedirect.com/science/article/pii/S245207482030034X)'
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来源：[ScienceDirect](https://www.sciencedirect.com/science/article/pii/S245207482030034X)
- en: 'Skin Health:'
  id: totrans-536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 皮肤健康：
- en: The antioxidant properties of hydrogen water may promote healthier skin by combating
    oxidative stress and reducing wrinkles.
  id: totrans-537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 氢水的抗氧化特性可能通过对抗氧化应激和减少皱纹来促进更健康的皮肤。
- en: 'Confidence Level: Low'
  id: totrans-538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信水平：低
- en: 'Source: MDPI'
  id: totrans-539
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来源：MDPI
- en: 'Potential Neuroprotective Effects:'
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 潜在的神经保护作用：
- en: Preliminary research indicates that hydrogen-infused water may have neuroprotective
    benefits, potentially helping in conditions like Parkinson's disease.
  id: totrans-541
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初步研究表明，氢水可能具有神经保护作用，可能有助于帕金森病等疾病。
- en: 'Confidence Level: Low'
  id: totrans-542
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信度：低
- en: 'Source: [PubMed](https://pubmed.ncbi.nlm.nih.gov/24021968/)'
  id: totrans-543
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来源：[PubMed](https://pubmed.ncbi.nlm.nih.gov/24021968/)
- en: 'Improved Athletic Performance:'
  id: totrans-544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 改善运动表现：
- en: Some studies suggest that hydrogen-infused water can enhance endurance and reduce
    fatigue during exercise by reducing muscle fatigue and lactate build-up.
  id: totrans-545
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些研究表明，氢水可以增强耐力并减少运动中的疲劳，通过减少肌肉疲劳和乳酸积累。
- en: 'Confidence Level: Medium'
  id: totrans-546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信度：中等
- en: 'Source: [PubMed](https://pubmed.ncbi.nlm.nih.gov/20528583/)'
  id: totrans-547
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来源：[PubMed](https://pubmed.ncbi.nlm.nih.gov/20528583/)
- en: 'Note: While there are promising studies, more extensive clinical research is
    needed to fully validate these benefits. Some claims are based on early-stage
    research or animal studies, so it''s important to approach the benefits with cautious
    optimism.'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：尽管有一些有希望的研究，但仍需要更广泛的临床研究来完全验证这些益处。一些说法基于早期研究或动物研究，因此以谨慎的乐观态度对待这些益处是很重要的。
- en: '* * *'
