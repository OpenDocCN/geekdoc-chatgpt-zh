  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互动和连载小说：为在线平台创建互动或连载小说，使用人工智能概述情节分支或连续内容。
- en: 'Fan Fiction and Alternative Endings: Generate and sell fan fiction or alternative
