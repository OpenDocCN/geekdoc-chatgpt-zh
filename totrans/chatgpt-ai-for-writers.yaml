- en: Chapter 12 – Creating a GPT’s That Writes Like You
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VN.jpg)'
  prefs: []
  type: TYPE_IMG
- en: OpenAI is one of the platforms that allows users to create custom GPTs for specific
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: To access the custom set-up, go to the upper left-hand corner of the GPT4o screen,
    outlined in red below.
  prefs: []
  type: TYPE_NORMAL
- en: Mouse over the Explore GPTs icon, click on the icon to open up a menu.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VY.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This opens a screen where you can install a number of pre-made GPTs. If you
    click on the “+ Create” icon in the upper right corner, outlined in red,  you
    can create a GPT.
  prefs: []
  type: TYPE_NORMAL
- en: This opens up the Custom Instructions page.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1VZ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The left side box is where you can input information to create the GPT. You
    can write directives in the text box that you want the AI to follow.  You could
    direct the AI to write its response in a specific way. We will explore two options,
    fiction and non-fiction writing but there are many more. I write both fiction
    and non-fiction. While the instructions to the AI are identical for creating a
    fiction writing GPT and non-fiction writing GPT, the writing samples provided
    to the AI are different.
  prefs: []
  type: TYPE_NORMAL
- en: Have GPT Write Like You – Non-Fiction
  prefs: []
  type: TYPE_NORMAL
- en: The first step is find the best sample of your fiction writing. I would choose
    a sample of about 1500 words. You can make a PDF file to paste into, just paste
    the writing sample below the instruction. Both methods will work.
  prefs: []
  type: TYPE_NORMAL
- en: I wrote this prompt into ChatGPT, and ChatGPT responded.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with black text Description automatically generated](image_rsrc1W0.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The AI responded
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with black text Description automatically generated](image_rsrc1W1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Next, I copied and pasted about 700 words I wrote on Red light Therapy into
    GPT text box. The AI responded with the following analysis.
  prefs: []
  type: TYPE_NORMAL
- en: The AI responded
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1W2.jpg)![A
    white background with black text Description automatically generated](image_rsrc1W3.jpg)'
