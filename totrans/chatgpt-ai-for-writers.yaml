  type: TYPE_NORMAL
  zh: 故事顾问服务：为作家或出版机构提供人工智能辅助的故事发展服务，帮助克服写作障碍并扩展现有情节。
- en: 'Interactive and Serialized Fiction: Create interactive or serialized fiction
