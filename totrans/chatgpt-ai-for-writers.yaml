  zh: AI虚构了其参考文献，并且做得令人信服且可信。AI可能成为世界上最大的骗子。其答案的置信度适中。
- en: So, even using “Custom Instructions” to reduce hallucinations, the AI can still
    hallucinate. This information is as a caution to check facts given to you by the
    AI.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，即使使用“自定义指令”来减少幻觉，AI仍然可能产生幻觉。这些信息作为对检查AI提供给你的事实的警告。
- en: Accessing Your Custom GPT’s
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 访问您的自定义GPT
- en: Starting from your home screen on GPT4o.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 从GPT4o的主屏幕开始。
- en: Go to the upper left menu items and select “Explore GPTs”
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 前往屏幕左上角的菜单项，选择“探索GPTs”
- en: This opens the GPT main screen. From here, go to the upper right corner of the
    screen and click on My GPTs, which opens up a screen displaying your custom GPTs.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 这将打开GPT主屏幕。从这里，点击屏幕右上角，点击“我的GPTs”，这将打开一个显示你的自定义GPTs的屏幕。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WB.jpg)'
  id: totrans-566
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，自动生成的描述](image_rsrc1WB.jpg)'
- en: Going Further
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步了解
- en: 'It is easy to make the Custom GPT more robust, using greater detail in the
    instructions. So instead of a one sentence instruction that I used previously:'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在指令中使用更多细节，可以轻松使自定义GPT更加健壮。所以，而不是使用我之前的一个句子指令：
- en: '![A white background with black text Description automatically generated](image_rsrc1W0.jpg)'
  id: totrans-569
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，自动生成的描述](image_rsrc1W0.jpg)'
- en: The following prompt can be used to create a fiction writer or non-fiction writer
    “instructions” for either training a GPT or as a straight “preamble” to a prompt
    for writing a topic. What determines the type of writer you create is the training
    data “documents” supplied.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 以下提示可用于创建虚构作家或非虚构作家“指令”，无论是用于训练GPT还是作为写作主题提示的“序言”。决定你创建的作家类型的是提供的训练数据“文档”。
- en: Instructions for Custom GPT Style Analysis and Replication
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义GPT风格分析和复制的说明
- en: 'Role: You are a highly skilled linguist and writing analyst with expertise
    in tone, style, and voice extraction. Your objective is to deeply analyze the
    provided [DOCUMENT_TYPE] and distill its unique writing qualities, capturing the
    essence of the author’s voice for consistent future content creation.'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 角色：你是一位具有专业技能的语言学家和写作分析师，擅长语气、风格和语气的提取。你的目标是深入分析提供的 [文档类型]，提炼其独特的写作品质，捕捉作者语气的精髓，以实现未来内容创作的连贯性。
- en: 'Background: The [DOCUMENT_TYPE] is a [BRIEF_DESCRIPTION] crafted by [AUTHOR/SOURCE].
    It’s essential to identify the core characteristics of this writing style to create
    an accurate guide for replicating it in subsequent pieces.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：[文档类型] 是由 [作者/来源] 精心打造的 [简要描述]。确定这种写作风格的核心特征对于创建准确指南以在后续作品中复制它至关重要。
- en: 'Process:'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 流程：
- en: 'Analyze and Understand the Text: Carefully read the [DOCUMENT_TYPE] in its
    entirety to understand its structure, flow, and overall tone.'
  id: totrans-575
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析和理解文本：仔细阅读 [文档类型]，以了解其结构、流程和整体语气。
- en: 'Identify Tone Characteristics: Capture the nuances of the writing tone, such
    as:'
  id: totrans-576
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别语气特征：捕捉写作语气的细微差别，例如：
- en: Formality level (e.g., conversational, professional, academic)
  id: totrans-577
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正式程度（例如，对话式、专业、学术）
- en: Emotional impact (e.g., optimistic, neutral, reflective)
  id: totrans-578
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感影响（例如，乐观、中性、反思）
- en: Mood and Atmosphere (e.g., warm, authoritative, playful)
  id: totrans-579
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情绪和氛围（例如，温馨、权威、俏皮）
- en: 'Distill Stylistic Elements: Determine distinctive style features, including:'
  id: totrans-580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提炼风格元素：确定独特的风格特征，包括：
- en: Sentence Structure (e.g., complex, concise, flowing)
  id: totrans-581
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 句子结构（例如，复杂、简洁、流畅）
- en: Word Choice (e.g., sophisticated, straightforward, poetic)
  id: totrans-582
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 词汇选择（例如，复杂、直接、诗意）
- en: Use of Literary Devices (e.g., metaphors, analogies, vivid imagery)
  id: totrans-583
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文学手法的运用（例如，隐喻、类比、生动的意象）
- en: Paragraph Organization (e.g., short paragraphs, long, flowing narrative blocks)
  id: totrans-584
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 段落组织（例如，短段落、长，流畅的叙述块）
- en: 'Extract Signature Phrases and Expressions: Note any recurring phrases, specific
    terminology, or unique expressions that reinforce the author’s voice.'
  id: totrans-585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提取标志性短语和表达：注意任何重复的短语、特定术语或独特的表达，这些表达可以加强作者的语气。
- en: 'Synthesize into a Style Guide Snippet: Summarize these findings into a concise,
    actionable style guide snippet. This guide should enable an AI to emulate the
    tone, style, and voice of the original [DOCUMENT_TYPE] accurately.'
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '综合成风格指南片段：将这些发现总结成简洁、可操作的风格指南片段。此指南应使 AI 能够准确模仿原始 [文档类型] 的语气、风格和语气。 '
- en: 'Output: Provide your findings as a clear, command-style snippet, structured
    to be easily integrated into future AI prompts to guide consistent tone and style
    replication.'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：以清晰、命令式片段的形式提供你的发现，结构化以便轻松集成到未来的 AI 提示中，以指导一致的语气和风格复制。
- en: 'Additional Support: If further details or clarifications are needed, please
    ask questions to ensure the analysis fully captures the original writing style.'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 额外支持：如果需要更多详细信息或澄清，请提问以确保分析完全捕捉到原始写作风格。
- en: I tested this prompt using a fictional short story I wrote on the occult and
    paranormal.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用我写的关于神秘和超自然现象的虚构短篇小说测试了这个提示。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WC.jpg)'
  id: totrans-590
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成的描述](image_rsrc1WC.jpg)'
- en: The AI created a complete analysis of the writing. Only the first sentence is
    shown in the image below.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: AI 创建了完整的写作分析。下面图片中只显示了第一句话。
- en: '![A white background with black text Description automatically generated](image_rsrc1WD.jpg)'
  id: totrans-592
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，自动生成的描述](image_rsrc1WD.jpg)'
- en: I then asked the AI to rewrite the analysis as a set of instructions for creating
    a GPT.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后要求 AI 将分析重写为创建 GPT 的指令。
- en: '![A white background with black text Description automatically generated](image_rsrc1WE.jpg)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字，自动生成的描述](image_rsrc1WE.jpg)'
- en: These instruction can be placed in a GPT to emulate my writing.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指令可以放入 GPT 中来模仿我的写作。
- en: Another Method
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法
- en: One can also put the prompt directly into the instructions for creating a GPT.
    The AI follows the prompt, reads the story and creates the GPT. The screenshot
    below shows how the AI configured this GPT.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以直接将提示放入创建 GPT 的指令中。AI 会遵循提示，阅读故事并创建 GPT。下面的截图显示了 AI 如何配置这个 GPT。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WF.jpg)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成的描述](image_rsrc1WF.jpg)'
- en: 'You can use these GPTs to write rewrite and help you outline and plot your
    story, based on your own unique style of writing. For instance, you may direct
    the AI to:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用这些GPT来改写，并帮助您根据您独特的写作风格概述和构思故事。例如，您可能指示AI：
- en: Outline a short story that includes a character arc, beginning, inciting incident.,
    middle, plot twist, climax, and resolution.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 概述一个包含角色弧、开始、触发事件、中间、情节转折、高潮和结局的短篇小说。
- en: Chapter 13 – Perplexity Spaces
  id: totrans-601
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第13章 – Perplexity Spaces
- en: The Perplexity AI has implemented Spaces, while it is not a GPT, it can be trained
    and has unique abilities one can use.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: Perplexity AI已实施Spaces，虽然它不是GPT，但它可以被训练并具有独特的功能，人们可以使用这些功能。
- en: Perplexity Spaces is a platform designed to enhance search capabilities and
    information retrieval by combining AI-powered search with personal data and custom
    instructions.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: Perplexity Spaces是一个平台，通过结合AI驱动的搜索、个人数据和自定义指令来增强搜索能力和信息检索。
- en: It is particularly useful for research-oriented tasks and collaborative projects.
    Perplexity spaces could help me write and organize material on the “Health Benefits
    of Hydrogen Infused Water.”
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 对于研究型任务和协作项目特别有用。困惑空间可以帮助我撰写和组织关于“氢水健康益处”的材料。
- en: 'Create a dedicated Space:'
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个专门的空间：
- en: Set up a Space specifically for hydrogen infused water research. This will allow
    you to keep all relevant information in one organized location.
  id: totrans-606
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为氢水研究设置一个专门的空间。这将允许您将所有相关信息保存在一个有组织的位置。
- en: 'Upload relevant files:'
  id: totrans-607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传相关文件：
- en: You can upload up to 50 files related to hydrogen water, such as scientific
    papers, news articles, or personal notes. This allows you to have all your sources
    readily available.
  id: totrans-608
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您可以上传最多50个与氢水相关的文件，如科学论文、新闻文章或个人笔记。这使得您能够轻松地访问所有来源。
- en: 'Conduct comprehensive searches:'
  id: totrans-609
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进行全面搜索：
- en: Use the AI-powered search functionality to find information from both your uploaded
    files and the web simultaneously. This can help you discover new studies or perspectives
    on hydrogen water.
  id: totrans-610
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用AI驱动的搜索功能同时从您上传的文件和网络上查找信息。这可以帮助您发现关于氢水的新研究或观点。
- en: 'Ask specific questions:'
  id: totrans-611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出具体问题：
- en: Utilize the AI to ask detailed questions about hydrogen water, such as "What
    are the potential health benefits of drinking hydrogen-rich water?" or "How does
    hydrogen water compare to regular water in terms of antioxidant properties?"
  id: totrans-612
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 利用AI提出关于氢水的详细问题，例如“饮用富含氢的水可能有哪些潜在的健康益处？”或“氢水在抗氧化特性方面与普通水相比如何？”
- en: 'Summarize research:'
  id: totrans-613
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 概括研究：
- en: Ask the AI to summarize key findings from multiple sources, helping you to get
    a comprehensive overview of the current state of research on hydrogen water.
  id: totrans-614
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请AI从多个来源总结关键发现，帮助您全面了解氢水研究现状。
- en: 'Compare studies:'
  id: totrans-615
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较研究：
- en: Use the platform to compare results from different studies on hydrogen water,
    helping you identify consistencies or discrepancies in the research.
  id: totrans-616
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用该平台比较不同氢水研究的成果，帮助您识别研究中的一致性和差异。
- en: 'Generate research plans:'
  id: totrans-617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成研究计划：
- en: Ask the AI to help you create a research plan for further investigation into
    hydrogen water, including potential areas for future study.
  id: totrans-618
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请AI帮助您制定进一步研究氢水的计划，包括未来研究的潜在领域。
- en: 'Collaborate with others:'
  id: totrans-619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与他人协作：
- en: Share your Space with up to 10 collaborators, allowing for team research and
    discussion on the topic of hydrogen water.
  id: totrans-620
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 与最多10个合作者共享您的空间，允许团队就氢水主题进行研究和讨论。
- en: 'Create custom instructions:'
  id: totrans-621
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建自定义指令：
- en: Set up custom instructions for the AI to follow when answering questions about
    hydrogen water, ensuring responses are tailored to your specific research needs.
  id: totrans-622
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为AI设置自定义指令，以便在回答有关氢水的问题时遵循，确保回答符合您特定的研究需求。
- en: 'Stay updated:'
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持更新：
- en: Use the platform to stay informed about the latest developments in hydrogen
    water research by regularly searching for new studies or news articles.
  id: totrans-624
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过定期搜索新研究或新闻文章，使用该平台了解氢水研究的最新进展。
- en: By leveraging these features, Perplexity Spaces can help you conduct thorough,
    organized research on hydrogen infused water for health, allowing you to gather,
    analyze, and synthesize information from various sources efficiently.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用这些功能，Perplexity Spaces可以帮助您对氢水健康进行彻底、有组织的的研究，让您能够高效地从各种来源收集、分析和综合信息。
- en: How to Get There
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 如何到达那里
- en: In the Perplexity User Interface (UI), you would click on Spaces in the left
    menu items. This will open the “Create a Space”
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 在困惑用户界面（UI）中，您会在左侧菜单项中点击“空间”。这将打开“创建空间”。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WG.jpg)'
  id: totrans-628
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图自动生成的描述](image_rsrc1WG.jpg)'
- en: Clicking on the Create a Space button opens the following screen.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“创建空间”按钮会打开以下屏幕。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WH.jpg)'
  id: totrans-630
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图自动生成的描述](image_rsrc1WH.jpg)'
- en: Hitting the Continue button creates the space that can be accessed from the
    Perplexity User Interface.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“继续”按钮创建的空间可以通过困惑用户界面访问。
- en: Opening the space provides the following window. Here you can add custom instructions
    for the AI to follow. Add files for the AI to reference, and perform information
    analysis.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 打开空间会提供以下窗口。在这里，您可以添加AI遵循的定制说明。为AI添加参考文件，并执行信息分析。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WJ.jpg)'
  id: totrans-633
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图自动生成的描述](image_rsrc1WJ.jpg)'
- en: 'In general Perplexity Spaces excels at tasks involving comprehensive research
    and information gathering:'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，困惑空间在涉及全面研究和信息收集的任务中表现出色：
- en: 'Organizing research materials: Users can create dedicated Spaces for specific
    topics or projects, allowing them to keep all relevant information in one place.'
  id: totrans-635
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组织研究材料：用户可以为特定主题或项目创建专用空间，使他们能够将所有相关信息集中在一个地方。
- en: 'Literature reviews: The platform can search through uploaded files and web
    sources simultaneously, making it ideal for conducting thorough literature review.'
  id: totrans-636
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文献综述：该平台可以同时搜索上传的文件和网页资源，非常适合进行彻底的文献综述。
- en: 'Fact-checking and verification: With its ability to search recent web content
    and personal files, Spaces is useful for verifying information and cross-referencing
    sources.'
  id: totrans-637
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 事实核查和验证：凭借其搜索最近网页内容和个人文件的能力，空间对于验证信息和交叉引用来源非常有用。
- en: Collaborative Projects
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 协作项目
- en: 'The platform offers robust features for team-based work:'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 该平台为基于团队的工作提供强大的功能：
- en: 'Group projects: Spaces can be shared with up to 10 collaborators, making it
    excellent for coordinating team efforts.'
  id: totrans-640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队项目：空间可以与最多10个协作者共享，非常适合协调团队工作。
- en: 'Project planning: Users can generate project plans, including task division
    and deadlines, based on uploaded materials and web resources.'
  id: totrans-641
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目规划：用户可以根据上传的材料和网页资源生成项目计划，包括任务分配和截止日期。
- en: 'Knowledge sharing: Teams can create a shared knowledge hub, allowing members
    to access and contribute to a common pool of information.'
  id: totrans-642
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识共享：团队可以创建共享的知识库，使成员能够访问和贡献到共同的信息库中。
- en: Academic and Learning Support
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 学术和学习支持
- en: 'Students and educators can leverage Spaces for various educational tasks:'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 学生和教育工作者可以利用空间进行各种教育任务：
- en: 'Study guide creation: The platform can generate custom study guides based on
    uploaded course materials and syllabus information.'
  id: totrans-645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习指南创建：该平台可以根据上传的课程材料和课程大纲信息生成定制的学习指南。
- en: 'Homework assistance: Students can ask specific questions about their coursework,
    drawing answers from both their uploaded materials and web sources.'
  id: totrans-646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作业辅助：学生可以就他们的课程作业提出具体问题，从他们上传的材料和网页资源中获取答案。
- en: 'Lecture summarization: Spaces can summarize key points from lectures and help
    identify important topics for upcoming exams.'
  id: totrans-647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讲座总结：空间可以总结讲座中的关键点，并帮助识别即将到来的考试的重要主题。
- en: Content Creation and Summarization
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 内容创作和总结
- en: 'Perplexity Spaces offers tools for generating and refining content:'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 困惑空间提供生成和改进内容的功能：
- en: 'Content summarization: Users can ask the platform to summarize long documents
    or multiple sources on a specific topic.'
  id: totrans-650
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容总结：用户可以要求平台总结长文档或特定主题的多个来源。
- en: 'Writing assistance: The AI can help with drafting and refining written content,
    drawing insights from uploaded materials and web sources.'
  id: totrans-651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作辅助：AI可以帮助起草和改进书面内容，从上传的材料和网页资源中获取见解。
- en: 'Multimedia content creation: Spaces supports image and video searches, which
    can be useful for creating visual content or presentations.'
  id: totrans-652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多媒体内容创建：空间支持图像和视频搜索，这对于创建视觉内容或演示文稿非常有用。
- en: Data Analysis and Insights
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析和洞察
- en: 'The platform''s AI capabilities make it suitable for certain analytical tasks:'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 该平台的AI能力使其适合某些分析任务：
- en: 'Trend analysis: By combining personal data with web searches, Spaces can help
    identify trends and patterns in specific fields or industries.'
  id: totrans-655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 趋势分析：通过结合个人数据与网络搜索，Spaces 可以帮助识别特定领域或行业中的趋势和模式。
- en: 'Comparative analysis: Users can ask the platform to compare different documents,
    proposals, or data sets within their Space.'
  id: totrans-656
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较分析：用户可以要求平台比较其空间内不同的文档、提案或数据集。
- en: Personalized Information Management
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化信息管理
- en: 'Perplexity Spaces serves as a powerful tool for organizing and accessing personal
    information:'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: Perplexity Spaces 是一个强大的工具，用于组织和访问个人信息：
- en: 'Creating knowledge hubs: Users can build tailored knowledge bases for specific
    topics or interests, combining their own files with web-based information.'
  id: totrans-659
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建知识库：用户可以为特定主题或兴趣构建定制化的知识库，将他们自己的文件与基于网络的信息相结合。
- en: 'File searching: The platform allows users to search through their uploaded
    files along with web sources, making it easier to find specific information quickly.'
  id: totrans-660
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件搜索：该平台允许用户在其上传的文件和网页资源中搜索，以便快速找到特定信息。
- en: 'Custom AI interactions: Users can provide custom instructions to the AI, tailoring
    its responses to their specific needs or preferences.'
  id: totrans-661
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制AI交互：用户可以向AI提供定制指令，以适应他们的特定需求或偏好。
- en: In summary, Perplexity Spaces combines AI-driven search with personal file integration,
    making it a versatile tool for a wide range of knowledge-based tasks.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Perplexity Spaces 结合了AI驱动的搜索与个人文件集成，使其成为广泛知识型任务的通用工具。
- en: Chapter 14 - Defining Your Audience
  id: totrans-663
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第14章 - 定义你的受众
- en: Now that you have ChatGPT speaking through a persona let’s further focus its
    output by defining the audience to which ChatGPT is speaking.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经让 ChatGPT 通过一个角色说话，让我们进一步通过定义 ChatGPT 说话的对象来聚焦其输出。
- en: The audience is an essential factor. For example, if you are marketing an ankle
    brace, you want the AI to write a pitch to someone (audience) who has recently
    hurt their ankle and is looking for relief.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 受众是一个关键因素。例如，如果你在推广踝部支具，你希望AI为最近受伤并寻求缓解的受众（受众）撰写一个提案。
- en: 'Writing an article on grapefruit will be different depending on whether the
    audience is obese, diabetic, or average weight. See below:'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写一篇关于葡萄柚的文章，其内容将根据受众是否肥胖、患有糖尿病或体重正常而有所不同。见下文：
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WK.jpg)'
  id: totrans-667
  prefs: []
  type: TYPE_IMG
  zh: '![计算机自动生成的描述截图](image_rsrc1WK.jpg)'
- en: In fiction, we can also define our audience. A science fiction story geared
    toward teenagers will vastly differ from a story written for adults and, further
    still, from a story written for an audience of truck drivers.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 在虚构作品中，我们也可以定义我们的受众。面向青少年的科幻故事将与为成人所写的故事大相径庭，更不用说为卡车司机所写的受众了。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WM.jpg)![A
    screenshot of a computer Description automatically generated](image_rsrc1WN.jpg)![A
    screenshot of a computer Description automatically generated](image_rsrc1WP.jpg)'
  id: totrans-669
  prefs: []
  type: TYPE_IMG
  zh: '![计算机自动生成的描述截图](image_rsrc1WM.jpg)![计算机自动生成的描述截图](image_rsrc1WN.jpg)![计算机自动生成的描述截图](image_rsrc1WP.jpg)'
- en: Chapter 15 - Writing Description
  id: totrans-670
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第15章 - 写描述
- en: '![A person and person sitting at a table with a computer Description automatically
    generated](image_rsrc1WR.jpg)'
  id: totrans-671
  prefs: []
  type: TYPE_IMG
  zh: '![一个人和坐在电脑桌旁的人描述自动生成](image_rsrc1WR.jpg)'
- en: Use AI to write background and set moods in describing a scene.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI在描述场景时编写背景和营造氛围。
- en: 'Descriptions:'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：
- en: Describing scenes, items, or places. For example, in the following example,
    I asked the AI to describe a steampunk living room before a party.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 描述场景、物品或地点。例如，在以下示例中，我要求AI描述一个派对前的蒸汽朋克客厅。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WS.jpg)'
  id: totrans-675
  prefs: []
  type: TYPE_IMG
  zh: '![计算机自动生成的描述截图](image_rsrc1WS.jpg)'
- en: Text to AI Artwork
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 文本到AI艺术品
- en: 'We can use the description from ChatGPT to create artwork. Taking the first
    paragraph of the description, I feed it into the Mage text to art AI: [https://www.mage.space](https://www.mage.space)/'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 ChatGPT 的描述来创建艺术品。将描述的第一段输入到 Mage 文本到艺术 AI 中：[https://www.mage.space](https://www.mage.space)/
- en: '![A black background with white text Description automatically generated](image_rsrc1WT.jpg)'
  id: totrans-678
  prefs: []
  type: TYPE_IMG
  zh: '![黑色背景上白色文字描述自动生成](image_rsrc1WT.jpg)'
- en: Here are the results.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是结果。
- en: '![A room with a couch and chandelier Description automatically generated](image_rsrc1WU.jpg)'
  id: totrans-680
  prefs: []
  type: TYPE_IMG
  zh: '![带有沙发和吊灯的房间描述自动生成](image_rsrc1WU.jpg)'
- en: Chapter 16 - Writing Poems
  id: totrans-681
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第16章 - 写诗
- en: You start with the idea of what you want the AI to write. I am writing this
    in October, and Halloween is in a few weeks, so my idea for this test is a Halloween
    poem.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 您开始思考您希望AI写的内容。我是在10月写的，万圣节还有几周，所以我这个测试的想法是一首万圣节诗。
- en: Next, determine what person would be the ideal source for that piece. In other
    words, who should the AI imitate? How about Edgar Allen Poe? Next up is what context?
    It could be funny or sad, but I’ll choose horror. Define your audience as adults.
    Next, define, trim, and focus the output. I don’t want the AI to write a book,
    so I’ll ask for a 10-line rhyming poem. Let’s see what happens.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，确定哪个人会是那件作品的理想来源。换句话说，AI应该模仿谁？比如埃德加·爱伦·坡？接下来是上下文？它可以是幽默的或悲伤的，但我会选择恐怖。将您的受众定义为成年人。接下来，定义、修剪和聚焦输出。我不想AI写一本书，所以我会要求一首10行的押韵诗。让我们看看会发生什么。
- en: Write a 10-line, rhyming Halloween horror poem in the style of Edgar Allen Poe.
    Audience = adults
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 用埃德加·爱伦·坡的风格写一首10行的押韵万圣节恐怖诗。受众=成年人
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1WV.jpg)'
  id: totrans-685
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的计算机截图描述](image_rsrc1WV.jpg)'
- en: AI text-to-art rendition of the above poem.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: AI将上述诗歌转换为文本到艺术的表现形式。
- en: '![A crow sitting on a tree branch Description automatically generated](image_rsrc1WW.jpg)'
  id: totrans-687
  prefs: []
  type: TYPE_IMG
  zh: '![一只乌鸦坐在树枝上自动生成的描述](image_rsrc1WW.jpg)'
- en: Please consider that these are my AI output’s first “raw” outputs. These are
    the first outputs, whether ChatGPT4 or Mage, for the artwork.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 请考虑这些是我的AI输出的第一个“原始”输出。这些是第一个输出，无论是ChatGPT4还是Mage，都是针对艺术作品的。
- en: In the practical world, you may run multiple prompts and select only the best
    bits of each output while massaging and refining the prompts as you work toward
    your goal and polish the gold nuggets you find. I want to say that I am not doing
    that here, and you certainly can. Rest assured, with a little work, you will exceed
    the outputs I presented here.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际世界中，您可能会运行多个提示，并在工作中根据目标对提示进行按摩和细化，只选择每个输出的最佳部分。我想说，我这里不是在这样做，你当然可以。放心，只要稍加努力，你就能超越我这里展示的输出。
- en: Chapter 17 – Business Writing
  id: totrans-690
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第17章 - 商业写作
- en: '![A person using a computer Description automatically generated](image_rsrc1WX.jpg)'
  id: totrans-691
  prefs: []
  type: TYPE_IMG
  zh: '![一个人在使用计算机自动生成的描述](image_rsrc1WX.jpg)'
- en: Email - Drafts & Rewriting
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 电子邮件 - 草稿与重写
- en: I recommend passing all your email correspondence through an AI. The way to
    do this is as follows.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议将所有您的电子邮件往来通过AI处理。这样做的方式如下。
- en: 'Begin with:'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 开始：
- en: Rewrite and Improve the following [Cust. Service Request], [Cust Service Response],
    [Cust Support], [News Announcement], [Business Question], [Business Response],
    followed by your original response.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 重新编写和改进以下[客户服务请求]、[客户服务响应]、[客户支持]、[新闻公告]、[商业问题]、[商业响应]，然后加上你的原始回复。
- en: The AI will take your email text and improve it.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: AI将提取您的电子邮件文本并改进它。
- en: This one step will elevate the professionalism of all your email correspondence.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步将提升您所有电子邮件通信的专业性。
- en: The AI will remove any negative tone and keep your email neutral and professional.
    The AI will prettify and professionalize your words. In addition, if any anger
    or frustration overtakes or leaks through in your correspondence writing, the
    AI will remove and replace the text with neutral tones.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: AI将移除任何负面语气，并保持您的电子邮件中性和专业。AI将美化并专业化您的措辞。此外，如果任何愤怒或挫败感在您的通信写作中占据或泄露出来，AI将移除并替换为中性语气。
- en: I recommend running all your emails through the AI; see the example below. Sometimes,
    to get the best response, I provide the correspondence's background, purpose or
    intent to the AI.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议将所有您的电子邮件通过AI处理；请看下面的例子。有时，为了得到最好的回应，我会向AI提供通信的背景、目的或意图。
- en: '![A white box with black text Description automatically generated](image_rsrc1WY.jpg)![A
    screenshot of a computer Description automatically generated](image_rsrc1WZ.jpg)'
  id: totrans-700
  prefs: []
  type: TYPE_IMG
  zh: '![一个带有黑色文字的白色盒子自动生成的描述](image_rsrc1WY.jpg)![自动生成的计算机截图](image_rsrc1WZ.jpg)'
- en: Sales Copy
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 销售文案
- en: If you are writing a product description or pitch, AI can help clean up your
    ad copy. Provide the AI with information on the product, its uses, and its audience.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在撰写产品描述或推销词，AI可以帮助清理您的广告文案。向AI提供有关产品、其用途和其受众的信息。
- en: 'For example, assuming you are trying to create ad copy to sell a particular
    product, a pen with a built-in LED light. You can use the following directives:'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设您正在尝试创建广告文案来销售某个特定产品，一个内置LED灯的笔。您可以使用以下指令：
- en: Write a convincing pitch for our Light Pen, with a built-in LED light.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 为我们的内置LED灯的Light Pen写一个令人信服的推销词。
- en: Write a compelling pitch for our Light Pen, with a built-in LED light.
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 为我们的内置LED灯的Light Pen撰写一篇引人入胜的推销文案。
- en: Write an authoritative pitch for our Light Pen, with a built-in LED light.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 为我们的内置LED灯的Light Pen撰写一篇权威的推销文案。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1X0.jpg)![A
    screenshot of a writing tool Description automatically generated with medium confidence](image_rsrc1X1.jpg)'
  id: totrans-707
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图的自动生成描述](image_rsrc1X0.jpg)![写作工具截图的自动生成描述，中等置信度](image_rsrc1X1.jpg)'
- en: In addition to the tools we have already discussed in this book here are a few
    AIs specific to business tasks.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 除了本书中已经讨论的工具外，还有一些专门针对商业任务的AI。
- en: Content Creation
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 内容创作
- en: 'Tools: [Copy.ai](https://www.copy.ai/), [Writesonic](https://writesonic.com/)'
  id: totrans-710
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[Copy.ai](https://www.copy.ai/)，[Writesonic](https://writesonic.com/)
- en: 'Features: AI can generate ideas and draft content for blog posts, articles,
    social media updates, and more. These tools can adapt to different tones and styles,
    providing marketers and content creators with versatile writing options.'
  id: totrans-711
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：AI可以为博客文章、文章、社交媒体更新等生成想法和内容。这些工具可以适应不同的语气和风格，为营销人员和内容创作者提供多功能的写作选项。
- en: 3\. Report Generation
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 报告生成
- en: 'Tools: [Wordsmith](https://automatedinsights.com/wordsmith/), [Arria](https://www.arria.com/)'
  id: totrans-713
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[Wordsmith](https://automatedinsights.com/wordsmith/)，[Arria](https://www.arria.com/)
- en: 'Features: AI can automate the generation of reports from data, turning complex
    datasets into coherent narratives. This is particularly useful for financial reporting,
    business analytics, and other data-driven writing tasks.'
  id: totrans-714
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：AI可以自动从数据生成报告，将复杂的数据集转化为连贯的叙述。这对于财务报告、商业分析和其他数据驱动型写作任务特别有用。
- en: 4\. Proposal Writing
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 撰写提案
- en: 'Tools: [Grammarly](https://www.grammarly.com/), [Proposify](https://www.proposify.com/)'
  id: totrans-716
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[Grammarly](https://www.grammarly.com/)，[Proposify](https://www.proposify.com/)
- en: 'Features: AI tools can help structure and refine business proposals, ensuring
    they are persuasive, concise, and well-organized. These tools can also suggest
    improvements in language and presentation.'
  id: totrans-717
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：AI工具可以帮助构建和精炼商业提案，确保它们具有说服力、简洁且组织良好。这些工具还可以在语言和演示方面提出改进建议。
- en: 5\. Social Media Management
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 社交媒体管理
- en: 'Tools: [Lately.ai](https://www.lately.ai/), [BuzzSumo](https://buzzsumo.com/)'
  id: totrans-719
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[Lately.ai](https://www.lately.ai/)，[BuzzSumo](https://buzzsumo.com/)
- en: 'Features: AI can assist in creating engaging social media posts, optimizing
    content for different platforms, and scheduling updates. These tools often include
    analytics to refine content strategies.'
  id: totrans-720
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：AI可以帮助创建吸引人的社交媒体帖子，优化不同平台的内容，并安排更新。这些工具通常包括分析功能，以优化内容策略。
- en: 6\. Customer Communication
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 客户沟通
- en: 'Tools: [Intercom](https://www.intercom.com/), [Drift](https://www.drift.com/)'
  id: totrans-722
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[Intercom](https://www.intercom.com/)，[Drift](https://www.drift.com/)
- en: 'Features: AI chatbots and virtual assistants can draft and send personalized
    responses to customer inquiries, handle FAQs, and support customer service teams
    by automating routine communications.'
  id: totrans-723
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：AI聊天机器人和虚拟助手可以起草并发送针对客户咨询的个性化回复，处理常见问题，并通过自动化常规沟通来支持客户服务团队。
- en: 7\. Press Release Creation
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 新闻稿撰写
- en: 'Tools: [PRLeap](https://www.prleap.com/)'
  id: totrans-725
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[PRLeap](https://www.prleap.com/)
- en: 'Features: AI can help draft press releases, ensuring they adhere to industry
    standards and effectively communicate key messages to target audiences.'
  id: totrans-726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：AI可以帮助起草新闻稿，确保其符合行业标准，并有效地向目标受众传达关键信息。
- en: 8\. Presentation Writing
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 演示文稿撰写
- en: 'Tools: [Beautiful.ai](https://www.beautiful.ai/), [Canva](https://www.canva.com/)
    (with AI suggestions)'
  id: totrans-728
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具：[Beautiful.ai](https://www.beautiful.ai/)，[Canva](https://www.canva.com/)（带有AI建议）
- en: 'Features: These tools can assist in creating structured presentations, offering
    design and content suggestions to enhance visual appeal and message clarity.'
  id: totrans-729
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：这些工具可以帮助创建结构化的演示文稿，提供设计和内容建议，以增强视觉吸引力和信息清晰度。
- en: Benefits of AI-Assisted Business Writing
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: AI辅助商业写作的好处
- en: 'Time Efficiency: AI can significantly reduce the time needed to draft and edit
    documents.'
  id: totrans-731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间效率：AI可以显著减少起草和编辑文档所需的时间。
- en: 'Consistency: Ensures consistent tone and style across communications.'
  id: totrans-732
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致性：确保沟通中的语气和风格保持一致。
- en: 'Cost Savings: Reduces the need for extensive manual editing and rewriting.'
  id: totrans-733
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本节约：减少了对大量手动编辑和重写的需求。
- en: 'Scalability: Allows for the production of large volumes of content quickly
    and efficiently.'
  id: totrans-734
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可扩展性：允许快速高效地生产大量内容。
- en: Chapter 18 - Exploring OCR Capabilities
  id: totrans-735
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第18章 - 探索OCR功能
- en: '![A close-up of a robot''s face Description automatically generated](image_rsrc1X2.jpg)'
  id: totrans-736
  prefs: []
  type: TYPE_IMG
  zh: '![机器人脸部的特写，描述自动生成](image_rsrc1X2.jpg)'
- en: AI Vision Used In Real World Medicine
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: AI在现实世界医学中的应用
- en: AIs are already heavily employed in medicine. They are routinely used to assist
    and read X-rays for pneumonia, tuberculosis screening, and dental X-rays, and
    they also read and interpret breast mammograms for cancer detection. AI surpasses
    human radiologists in many cases. AIs do not tire or become bored with the routine
    of the work.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经在医学中被大量使用。它们通常用于协助和读取肺炎、结核筛查和牙科X光片，它们还读取并解释乳腺癌乳腺X光片以进行癌症检测。在许多情况下，人工智能超越了人类放射科医生。人工智能不会因工作的常规而感到疲倦或无聊。
- en: Using AI Vision
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI视觉
- en: Ever run across an interesting magazine article or tidbit of information and
    take a photograph of it to read later?
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否遇到过有趣的杂志文章或信息片段，并拍照以便稍后阅读？
- en: You can read it later and direct ChatGPT to look at the photograph and generate
    a text document or summarize the article for you. ChapGPT has a paperclip icon
    used to upload files.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以稍后阅读它，并指导ChatGPT查看照片，为你生成文本文件或总结文章。ChapGPT有一个用于上传文件的纸夹图标。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1X3.jpg)'
  id: totrans-742
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，描述自动生成](image_rsrc1X3.jpg)'
- en: Upload your photograph, ask ChatGPT to read it, and supply a text file.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 上传你的照片，让ChatGPT读取它，并提供一个文本文件。
- en: The original photograph I used is copyrighted, so I couldn’t include that image
    as a test in this article. However, I was doing research on the effect vinegar
    has on blood glucose and insulin on a government website.  I took a snap of that
    and proceeded.
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用的原始照片是受版权保护的，所以我无法将那张图片作为测试包含在这篇文章中。然而，我在政府网站上研究醋对血糖和胰岛素的影响。我拍了那张照片，然后继续进行。
- en: Articles
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 文章
- en: The photograph I uploaded is outlined in green. The prompt for ChatGPT is outlined
    in red. Response from ChaptGPT is outlined in purple.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 我上传的照片用绿色勾勒出来。ChatGPT的提示用红色勾勒出来。ChaptGPT的回复用紫色勾勒出来。
- en: '![A screenshot of a chat Description automatically generated](image_rsrc1X4.jpg)'
  id: totrans-747
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图，描述自动生成](image_rsrc1X4.jpg)'
- en: I downloaded the text file and opened it in Notepad; see the following image.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 我下载了文本文件并在记事本中打开它；请看以下图片。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1X5.jpg)'
  id: totrans-749
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，描述自动生成](image_rsrc1X5.jpg)'
- en: I’m impressed, but it goes further. You could ask GPT to read the text in a
    PDF file and create a text file.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 我印象深刻，但这还远不止如此。你可以要求GPT读取PDF文件中的文本并创建一个文本文件。
- en: Medical Charts
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 医学图表
- en: The first chart I asked GPT to analyze was my EKG chart. I did not inform CPT
    of what type of chart I uploaded. To its credit, ChatGPT was able to discern what
    kind of data it was shown and give a pretty detailed account of my ECG.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 我要求GPT分析的第一张图表是我的心电图。我没有告诉CPT我上传了什么类型的图表。值得赞扬的是，ChatGPT能够辨别出它所展示的数据类型，并给出了相当详细的关于我的心电图描述。
- en: '![A graph paper with a graph on it Description automatically generated](image_rsrc1X6.jpg)'
  id: totrans-753
  prefs: []
  type: TYPE_IMG
  zh: '![一张带有图表的坐标纸，描述自动生成](image_rsrc1X6.jpg)'
- en: 'The image you have uploaded is another electrocardiogram (ECG or EKG). Here''s
    an analysis of this EKG:'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 你上传的图像是另一张心电图（ECG或EKG）。以下是对这张心电图的分析：
- en: 'Heart Rate: To determine the heart rate, count the number of large squares
    between two successive R waves and use the formula: 300 divided by the number
    of large squares. The rate seems to be regular and within normal limits.'
  id: totrans-755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 心率：为了确定心率，计算两个连续R波之间的大方格数量，并使用公式：300除以大方格数量。心率似乎规律且在正常范围内。
- en: 'Rhythm: The rhythm appears to be regular, indicated by the consistent interval
    between R waves (R-R interval).'
  id: totrans-756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节律：节律似乎规律，由R波之间的恒定间隔（R-R间期）表示。
- en: 'P Waves: P waves are present before each QRS complex, which is a sign of normal
    atrial depolarization.'
  id: totrans-757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: P波：每个QRS复合波之前都有P波，这是正常心房去极化的标志。
- en: 'PR Interval: The PR interval seems to be within the normal range (0.12 to 0.20
    seconds).'
  id: totrans-758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: PR间期：PR间期似乎在正常范围内（0.12到0.20秒）。
- en: 'QRS Complex: The QRS duration appears to be within the normal range (less than
    0.12 seconds), suggesting normal ventricular depolarization.'
  id: totrans-759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: QRS复合波：QRS持续时间似乎在正常范围内（小于0.12秒），表明心室去极化正常。
- en: 'ST Segment: The ST segment is isoelectric (flat), indicating no ST segment
    elevation or depression. This suggests no acute ischemia or infarction.'
  id: totrans-760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ST段：ST段等电（平坦），表明没有ST段抬高或压低。这表明没有急性缺血或梗死。
- en: 'T Waves: T waves look normal without any inversion or peaking, indicating normal
    ventricular repolarization.'
  id: totrans-761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: T波：T波看起来正常，没有倒置或峰值，表明心室复极正常。
- en: 'Axis: The QRS axis appears normal, suggesting the electrical activity is moving
    through the heart in the correct direction.'
  id: totrans-762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 轴：QRS轴看起来正常，表明电活动以正确的方向通过心脏。
- en: 'Additional Observations: There are no significant pathological Q waves present,
    which can indicate a previous myocardial infarction.'
  id: totrans-763
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 额外观察：没有出现显著的病理性Q波，这可以表明之前有过心肌梗死。
- en: Based on this basic analysis, this EKG appears normal as well. However, a detailed
    interpretation and diagnosis should be provided by a healthcare professional or
    a cardiologist, who can consider the clinical context and provide a thorough evaluation.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这一基本分析，这个心电图看起来也正常。然而，应由医疗保健专业人员或心脏病专家提供详细的解释和诊断，他们可以考虑到临床背景并提供全面评估。
- en: Financial Charts
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 金融图表
- en: I wanted to try GPT-4’s analysis of financial data. I found a chart of the price
    of silver per ounce for the last five years.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 我想尝试GPT-4对金融数据的分析。我找到了过去五年每盎司银价的图表。
- en: '![A graph of a price Description automatically generated](image_rsrc1X7.jpg)'
  id: totrans-767
  prefs: []
  type: TYPE_IMG
  zh: '![一张价格描述自动生成的图表](image_rsrc1X7.jpg)'
- en: My prompt was, “Perform a quick analysis of the chart.”
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 我的提示是，“对图表进行快速分析。”
- en: 'The response I received:'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 我收到的回复：
- en: ChatGPT Response
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回复
- en: The chart appears to be a time series graph showing the price movement of silver
    over a period from January 2018 to around November 2023.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 该图表似乎是一个时间序列图，显示了从2018年1月到大约2023年11月期间银价的变化。
- en: '•      Price Axis: The right vertical axis indicates the price of silver in
    U.S. dollars, ranging from $15.00 to $30.00.'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: •      价格轴：右侧的垂直轴表示银价，以美元计，范围在15.00美元到30.00美元之间。
- en: '•      Time Axis: The horizontal axis at the bottom shows time, starting from
    January 2018 and extending to approximately November 2023.'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: •      时间轴：底部水平轴表示时间，从2018年1月开始，延伸到大约2023年11月。
- en: '•      Trend: The price of silver has fluctuated over the period. There is
    a significant spike around early to mid-2020, where the price sharply increases,
    reaching close to the peak of $30.00\. After this peak, the price shows volatility
    but appears to trend downward, with some recovery observed towards the end of
    the chart.'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: •      趋势：银价在期间内波动。在2020年初至中期有一个显著的峰值，价格急剧上升，接近30.00美元的峰值。在此峰值之后，价格表现出波动，但似乎呈下降趋势，图表末尾观察到一些恢复。
- en: '•      Contextual Options: Along the top of the chart are options to compare
    silver''s performance with other financial indicators or commodities such as the
    US Dollar, Dow Jones, S&P 500, Crude Oil, and Bitcoin. These options are not selected,
    so only silver''s performance is displayed.'
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: •      上下文选项：图表顶部有选项可以比较银价与其他金融指标或商品（如美元、道琼斯指数、标普500、原油和比特币）的表现。这些选项未被选中，因此只显示了银价的表现。
- en: '•      Notable Features:'
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: •      显著特征：
- en: •      The shaded area under the line graph represents the volume or another
    secondary metric, but it's not clearly labeled, so its exact meaning is unknown.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: •      线形图下方的阴影区域代表体积或其他次要指标，但并未明确标注，因此其确切含义不明。
- en: •      The graph shows that the price has not returned to the peak levels seen
    in 2020 but has had several peaks and troughs, indicating periods of both increased
    and decreased prices.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: •      图表显示，价格并未回到2020年看到的峰值水平，但已经经历了几个峰值和谷值，表明价格既有上涨也有下跌的时期。
- en: For a more comprehensive analysis, one would need additional data like trading
    volumes, related news events, and economic conditions that could explain the price
    movements. This graph alone does not provide enough context to determine the causes
    of the price changes.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行更全面的分析，需要额外的数据，如交易量、相关新闻事件和经济状况，这些数据可以解释价格变动。这张图表本身并不提供足够的信息来确定价格变化的原因。
- en: Predict
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 预测
- en: 'Being the smartie pants that I am, I ask ChatGPT to predict the price of silver
    next month based on the chart. ChatGPT declined with a long-winded response that
    started with this:'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 作为我这样一个聪明人，我要求ChatGPT根据图表预测下个月银价。ChatGPT以一个冗长的回复拒绝了请求，开头是这样的：
- en: Predicting the future price of silver based on a chart without considering additional
    information such as market trends, economic indicators, and geopolitical events
    would be speculative. The price of commodities like silver can be influenced by
    a multitude of factors, including supply and demand dynamics, currency movements,
    interest rates, investment trends, and broader economic conditions.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不考虑市场趋势、经济指标和地缘政治事件等额外信息，仅根据图表预测银的未来价格将是推测性的。银等商品的价格可能受到多种因素的影响，包括供需动态、货币走势、利率、投资趋势和更广泛的经济状况。
- en: Fair enough. I went further than this and provided more information to the AI
    to get it to make a prediction. But for the purposes here I feel looking at legal
    contracts is a better application for writers.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 没问题。我做得比这更深入，并向AI提供了更多信息，以使其做出预测。但在这里，我认为查看法律合同对作家来说是一个更好的应用。
- en: Legal Documents
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 法律文件
- en: Legal contracts involving usage, rights, and licensing can be downright lengthy
    and intimidating. I’m not saying to replace your lawyer with an AI, but you can
    use an AI to help understand these legal documents.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 涉及使用、权利和许可的法律合同可能非常冗长且令人畏惧。我并不是说用AI取代律师，但您可以使用AI来帮助理解这些法律文件。
- en: I downloaded the “Steelfish” font from Frontspring. The font is free and licensed
    through an End User License Agreement (EULA).
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 我从 Frontspring 下载了“Steelfish”字体。该字体免费，并通过最终用户许可协议（EULA）授权。
- en: '![A black text on a white background Description automatically generated](image_rsrc1X8.jpg)'
  id: totrans-787
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的黑色文字 描述自动生成](image_rsrc1X8.jpg)'
- en: The EULA document, if printed, would be five full pages long.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 如果打印，EULA 文档将长达五页。
- en: '[https://www.fontspring.com/lic/w1mv09gzoy](https://www.fontspring.com/lic/w1mv09gzoy)'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.fontspring.com/lic/w1mv09gzoy](https://www.fontspring.com/lic/w1mv09gzoy)'
- en: What I did was copied the EULA document. I asked the AI a question in the prompt,
    then pasted the document.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 我所做的是复制了 EULA 文档。我在提示中向AI提出问题，然后粘贴了文档。
- en: 'Prompt:'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: According to the following font rights, may I use this font on a book cover?
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 根据以下字体权利，我可以在书封面上使用这个字体吗？
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1X9.jpg)'
  id: totrans-793
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 描述自动生成](image_rsrc1X9.jpg)'
- en: 'Response:'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 回复：
- en: Based on the Fontspring Desktop/Ebook Font End User License Agreement, you are
    allowed to use the font on a book cover. The agreement grants a license to use
    the font to create and distribute graphics, logos, and artwork for display on
    any surface, including physical products like book covers. Just ensure that you
    follow all other requirements and restrictions outlined in the license, such as
    not creating alphabet products for resale without an extended license.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 Fontspring Desktop/Ebook 字体最终用户许可协议，您可以在书封面上使用该字体。该协议授予您使用该字体创建和分发用于任何表面显示的图形、标志和艺术作品的许可，包括书封面等物理产品。只需确保您遵守许可证中概述的所有其他要求和限制，例如，如果没有扩展许可，不要创建用于转售的字母产品。
- en: For more detailed information, please refer to the Fontspring EULA.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 如需更多信息，请参阅 Fontspring EULA。
- en: At this point, you must decide whether you trust that the AI is providing correct
    and true legal information. You are responsible for any errors, not the AI.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 到这一点，您必须决定您是否相信AI提供的是正确和真实的信息。任何错误的责任都在您，而不是AI。
- en: Chapter 19 - Basic Book Marketing Research
  id: totrans-798
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第19章 - 基本图书市场研究
- en: '![A room with shelves of books Description automatically generated](image_rsrc1XA.jpg)'
  id: totrans-799
  prefs: []
  type: TYPE_IMG
  zh: '![一个书架上摆满书籍的房间 描述自动生成](image_rsrc1XA.jpg)'
- en: This chapter is for those writers who plan to use AI to help write and illustrate
    their books.
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是为那些计划使用AI帮助撰写和插图其书籍的作家而设。
- en: With the increase of AI assistance for writing, creating a book for publication
    has become easier. But just because you can create a book doesn't necessarily
    mean you should. Even with AI assistance, writing a book still takes time, effort,
    and money.
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI写作辅助工具的增加，创作一本书以供出版变得更加容易。但仅仅因为您能够创作一本书，并不意味着您就应该这样做。即使有AI辅助，写一本书仍然需要时间、精力和金钱。
- en: While my example topic in this chapter is a children's book, the procedure and
    process are the same for any book topic from AI Imaging to Xylophones – how to
    make one for your child.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本章的示例主题是儿童书籍，但该程序和过程对于任何从AI成像到木琴——如何为您的孩子制作——的书籍主题都是相同的。
- en: Positive ROI
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 正面回报
- en: A positive ROI (Return On Investment) is not required to write a book. For example,
    you have a burning desire to write a book, for whatever reason, and it's without
    regard to a financial payback from book sales. No law requires a profit motive
    for writing and publishing a book, so writing your not-for-profit book is okay.
    (It may be your best writing ever.)
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 写书不需要有正的投资回报率（ROI）。例如，你可能出于某种原因有强烈的写书的愿望，而不考虑书籍销售带来的经济回报。没有法律要求写书和出版书籍必须有盈利动机，所以写一本非盈利的书籍是可以的。（这可能是你写得最好的作品。）
- en: In this case, realize you're writing for personal satisfaction and should be
    prepared to sell five copies of your book to friends and family and be happy with
    that result. If not, it will be disappointing after investing your time, energy,
    and money to write a book, to discover no one wants to read it. There is a "no
    market" or a "small market." audience; yikes! How much better it would have been
    to learn that before putting pen to paper, so to speak.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，要意识到你是在为了个人满足感而写作，并且应该准备好向朋友和家人出售五本书，并对这个结果感到满意。如果不是这样，在你投入了时间、精力和金钱来写书之后，发现没有人想阅读它，那将会令人失望。存在一个“无市场”或“小市场”的受众；哎呀！如果能在动笔之前了解到这一点，那就好了。
- en: If you want to reduce your chances of writing a book for a no-market to a small-market
    audience, I recommend your first step is to check if there is an audience for
    your book.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要减少为无市场或小市场受众写书的可能性，我建议你的第一步是检查你的书是否有受众。
- en: It also helps if you have a variety of topics you would like to write on. This
    allows you to choose a topic with hopefully a large audience with little competition.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有很多你想要写的主题，这也会有所帮助。这让你可以选择一个可能有大量受众且竞争较少的主题。
- en: Start by performing a little preexisting marketing research by looking at books
    similar to the book(s) you want to create.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，通过查看你想要创作的书籍类似的书来执行一些现有的市场研究。
- en: Granted, this is not an extensive look at the book marketing research. It is
    simplistic and rudimentary. However, it suffices for my uses here for my first
    children's book. I used Amazon.Com as my resource. Going on to Amazon's website,
    I first searched for "Children's books." Amazon returned over 80,000 hits. Obviously,
    this is a big market with intense competition. Next, I searched for books on the
    topic of "roman architecture.” Amazon returned 3000 hits. Smaller market and less
    competition. If I narrow the niche to "Pre-Christian Roman architecture," Amazon
    returned seven hits. Small market with little competition.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并不是对图书市场研究的一个全面审视。它很简单，很基础。然而，对于我的第一本儿童书来说，这已经足够了。我使用了Amazon.Com作为我的资源。在亚马逊网站上，我首先搜索了“儿童书籍”。亚马逊返回了超过80,000个结果。显然，这是一个大市场，竞争激烈。接下来，我搜索了关于“罗马建筑”主题的书籍。亚马逊返回了3,000个结果。市场较小，竞争较少。如果我将细分市场缩小到“基督教前的罗马建筑”，亚马逊返回了七个结果。市场小，竞争少。
- en: Since my topic is children's books, I searched Amazon for the top ten children's
    books for ages three to five.
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我的主题是儿童书籍，我在亚马逊上搜索了三到五岁儿童的前十本儿童书籍。
- en: The information I gathered from the books listed were cost, book size, number
    of pages, review stats, and Amazon Sales Rank. Many of the books didn't offer
    a look inside. I wanted to look inside to see how they formatted the pages.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 我从列出的书中收集的信息包括成本、书籍尺寸、页数、评论统计数据和亚马逊销量排名。许多书籍没有提供预览。我想看看他们是如何排版页面的。
- en: Sizes varied all over the place but generally between 5" x 7" to 9" x 10". The
    page count was low, between 24 and 36 pages. Nevertheless, we had some killer
    review stats. "The Very Hungry Caterpillar" by Eric Carle racked up over 54,000
    reviews. My kid's favorite, "Goodnight Moon" by Margaret Wise Brown and Clement
    Hurd had a respectable 24,000 reviews plus. A newer book, "The Leaf Thief", by
    Alice Hemming  (Author), Nicola Slater  (Illustrator), is doing very well in this
    space. (It doesn't hurt to steer by the stars.)
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 尺寸各不相同，但通常在5" x 7"到9" x 10"之间。页数较少，在24到36页之间。尽管如此，我们有一些非常出色的评论统计数据。"好饿的毛毛虫"（作者：艾瑞克·卡尔）获得了超过54,000条评论。我孩子的最爱，“晚安月亮”（作者：玛格丽特·怀兹·布朗，插图：克莱门特·赫德）也有令人尊重的24,000条评论。一本较新的书，“叶子小偷”（作者：爱丽丝·汉明，插图：尼古拉·斯莱特）在这个领域表现得很不错。（跟随明星的指引是有好处的。）
- en: Another critical fact to ascertain is how many books are sold in your preexisting
    market, for this you can use Amazon's "Best Seller Ranking."
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要确定的关键事实是，在你的现有市场中，有多少书籍被售出，为此你可以使用亚马逊的“畅销书排名”。
- en: Amazon Sales Rank Calculator
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊销量排名计算器
- en: Several websites offer an "Amazon Sales Rank Calculator." The sales rank calculator
    will provide the approximate sales based on Amazon's "Best Seller Rank" (BSR)
    in the book's “Product Details". The link below is to a sales rank calculator
    but there are other sites you may use as well.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 几个网站提供“亚马逊销售排名计算器”。销售排名计算器将根据书籍“产品详情”中的亚马逊“畅销书排名”（BSR）提供基于估算的销售量。以下链接是销售排名计算器，但您也可以使用其他网站。
- en: '[https://bookbird.io/tools/sales-calculator](https://bookbird.io/tools/sales-calculator)/'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://bookbird.io/tools/sales-calculator](https://bookbird.io/tools/sales-calculator)/'
- en: The following illustration show two children's books, "The Leaf Thief" and "The
    Very Hungry Caterpillar." Please note these are print books and not ePub or Kindle
    versions.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 以下插图展示了两本儿童书籍，“叶子小偷”和“非常饿的毛毛虫”。请注意，这些是印刷书籍，而不是ePub或Kindle版本。
- en: '![A screenshot of a website Description automatically generated](image_rsrc1XB.jpg)'
  id: totrans-818
  prefs: []
  type: TYPE_IMG
  zh: '![网站自动生成的描述截图](image_rsrc1XB.jpg)'
- en: By putting Amazon's Best Seller's Rank into the calculator, we can see the average
    books sold per day and per month.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将亚马逊的畅销书排名输入计算器，我们可以看到平均每天和每月销售的书籍数量。
- en: '![A screenshot of a calculator Description automatically generated](image_rsrc1XC.jpg)'
  id: totrans-820
  prefs: []
  type: TYPE_IMG
  zh: '![计算器自动生成的描述截图](image_rsrc1XC.jpg)'
- en: Kindle is Easy, but Print may be Better
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: Kindle简单易用，但印刷可能更好
- en: Kindle and eBooks are easier to produce and publish. I'm not saying for you
    not to create a Kindle eBook, that's easy enough to do. I do recommend multiple
    platforms. But with a children's book, a tangible print book may be the better
    ticket for reading stories to children. Compare the sales ranking for Print vs
    Kindle for "The Very Hungry Caterpillar."
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: Kindle和电子书更容易生产和发布。我并不是说您不应该创建Kindle电子书，这很容易做到。我确实建议使用多个平台。但对于儿童书籍，一本有形的印刷书籍可能是向孩子讲故事更好的选择。比较“非常饿的毛毛虫”的印刷版和Kindle版的销售排名。
- en: '![A screenshot of a computer Description automatically generated](image_rsrc1XD.jpg)'
  id: totrans-823
  prefs: []
  type: TYPE_IMG
  zh: '![计算机自动生成的描述截图](image_rsrc1XD.jpg)'
- en: For children's books, print is a better option for sales. With Amazon Print
    On Demand (POD) you have an obstacle with these style books. Amazon print books
    require a minimum page count of 72 pages.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 对于儿童书籍，印刷是更好的销售选择。使用亚马逊印刷按需（POD）服务，这些风格书籍会遇到一些障碍。亚马逊印刷书籍需要至少72页的页数。
- en: IngramSpark can print books with as few as 18 pages.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: IngramSpark可以印刷至少18页的书籍。
- en: A quick note on our “Roman Architecture” books, you can use their Amazon Best
    Seller rank, to determine the books sold in these smaller markets.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 关于我们“罗马建筑”书籍的简要说明，您可以使用它们的亚马逊畅销书排名来确定这些较小市场的书籍销量。
- en: Calculating Book Printing Cost
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 计算书籍印刷成本
- en: I like IngramSpark. You can print, publish and distribute eBooks and print books
    through this company. They offer a virtual online library of information on publishing
    your book.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢IngramSpark。您可以通过这家公司印刷、出版和分发电子书和平装书。他们提供有关出版书籍的虚拟在线图书馆信息。
- en: '[https://www.ingramspark.com/plan-your-book/print/print-on-demand](https://www.ingramspark.com/plan-your-book/print/print-on-demand)'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.ingramspark.com/plan-your-book/print/print-on-demand](https://www.ingramspark.com/plan-your-book/print/print-on-demand)'
- en: The following link is a cost calculator for Print Books by IngramSpark. They
    can print books that range in page count in multiples of 2 pages from 18 to 1200.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 以下链接是IngramSpark提供的平装书成本计算器。他们可以以2页的倍数从18页到1200页印刷书籍。
- en: '[https://myaccount.ingramspark.com/Portal/Tools/ShippingCalculator](https://myaccount.ingramspark.com/Portal/Tools/ShippingCalculator)'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://myaccount.ingramspark.com/Portal/Tools/ShippingCalculator](https://myaccount.ingramspark.com/Portal/Tools/ShippingCalculator)'
- en: The following link is the cost calculator for KDP POD for hardcover and softcover
    books.
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 以下链接是硬封面和平装书KDP POD的成本计算器。
- en: '[https://kdp.amazon.com/en_US/help/topic/GSQF43YAMUPFTMSP](https://kdp.amazon.com/en_US/help/topic/GSQF43YAMUPFTMSP)'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://kdp.amazon.com/en_US/help/topic/GSQF43YAMUPFTMSP](https://kdp.amazon.com/en_US/help/topic/GSQF43YAMUPFTMSP)'
- en: General Guidelines for Selling Print Books on Amazon
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 在亚马逊上销售印刷书籍的一般指南
- en: Amazon requires a 40% discount off the retail price for softcover books printed
    using its Print On Demand (POD) service. The POD cost is typically a bit higher
    than what you can pay to have the books printed by a book printer. You can use
    Amazon’s POD service inside your KDP account.
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊要求使用其印刷按需（POD）服务印刷的平装书提供40%的零售价折扣。POD成本通常略高于您支付给印刷厂印刷书籍的费用。您可以在KDP账户内使用亚马逊的POD服务。
- en: On the other hand, if you wish to sell your own printed books on Amazon, you
    must open an Amazon Advantage account (that’s different from your KDP account).
    Using your Amazon Advantage account, you can submit your printed book to be sold
    on Amazon. Amazon must approve the book. Using this avenue, Amazon requires a
    55% discount off the retail price of the book, and Amazon does not pay for the
    shipping of the book to the Amazon warehouse.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，如果你想在亚马逊上销售自己的印刷书籍，你必须开设一个亚马逊优势账户（这与你的KDP账户不同）。使用你的亚马逊优势账户，你可以提交你的印刷书籍以在亚马逊上销售。亚马逊必须批准这本书。通过这种方式，亚马逊要求从书的零售价中折扣55%，并且亚马逊不支付将书运送到亚马逊仓库的运费。
- en: Amazon will issue you a purchase order for your book. If the book is only selling
    a few copies, Amazon will only purchase a few copies at a time. Mailing or shipping
    one or two books at a time can be prohibitive, depending on your printing costs
    and profit margin.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊会为你这本书发出采购订单。如果这本书只卖出几本，亚马逊会一次只购买几本。根据你的印刷成本和利润率，一次邮寄或运送一两本书可能是不可行的。
- en: Chapter Conclusion
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 章节结论
- en: This chapter is an introduction to book marketing. Consider it an excursion
    into switching from your book creator's hat to your book business hat. This is
    not meant to be a comprehensive tutorial on book marketing and book production.
    It is meant to be an eye-opener, to give you the insight to put on your business
    hat when planning a book for publication.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是关于书籍营销的介绍。把它看作是从你的书籍创作者帽子转向你的书籍商业帽子的一次远足。这不是一本关于书籍营销和书籍生产的全面教程。它的目的是启发你，在计划出版一本书时，穿上你的商业帽子。
- en: Chapter 20 - Monetize This Book’s Information
  id: totrans-840
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第20章 - 将本书的信息货币化
- en: '![A cellphone on top of money Description automatically generated](image_rsrc1XE.jpg)'
  id: totrans-841
  prefs: []
  type: TYPE_IMG
  zh: '![金钱上的手机 自动生成的描述](image_rsrc1XE.jpg)'
- en: Basics of the Gig Economy
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 劳务经济的基础
- en: It’s difficult to find a “niche” market that’s not being serviced and then to
    service that market. Success can be found in broader markets by finding a unique
    spin on a service or product that people are already making money doing.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 找到一个尚未被服务的“利基”市场并为其提供服务是困难的。通过找到一种独特的服务或产品，人们已经在其中赚钱，可以在更广泛的市场中找到成功。
- en: Save Your Customer's Time
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 节省你客户的时间
- en: I stated that using AI enhances one’s output and essentially provides its users
    with more time—our most valuable commodity. In keeping with that idea, a side
    hustle that saves your customers time will (in my opinion) have a greater chance
    of success.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 我指出使用人工智能可以增强一个人的产出，并且本质上为其用户提供更多时间——我们最宝贵的商品。根据这个想法，一个能为你客户节省时间的副业（在我看来）有更大的成功机会。
- en: A friend asked me, why would he hire an individual to create comic book illustrations
    using AI, when he could run prompts into a text-to-art AI and do it himself.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 一个朋友问我，为什么他要雇佣一个人使用人工智能创建漫画插图，当他可以直接将提示输入到文本到艺术人工智能中并自己完成时。
- en: There are multiple reasons to hire another person, beginning with talent and
    experience. You develop experience as you work with text-to-art AI’s. It’s a challenge
    to keep and direct the same character running through different panels. I suggested
    if this became a real project for him he’d be better served focusing on writing
    the narrative and dialog than the artwork. He remained unconvinced, but that’s
    his inexperience.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 有多个原因可以雇佣另一个人，从人才和经验开始。你在与文本到艺术人工智能合作的过程中积累经验。保持和引导同一个角色在不同的画板中运行是一个挑战。我建议如果这成为他的一个真实项目，他最好专注于写作叙事和对话，而不是艺术作品。他仍然不确信，但这只是他的缺乏经验。
- en: The following lists are ideas to monetize applications detailed in this book.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列出的都是将本书中详细说明的应用程序货币化的想法。
- en: Creative Writing and Storytelling
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作和讲故事
- en: 'Custom Content Creation: Use AI to generate detailed descriptions and narratives
