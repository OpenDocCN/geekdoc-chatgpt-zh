- en: INTRODUCTION
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Introducing generative AI and ChatGPT.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍生成式 AI 和 ChatGPT。
- en: The dawn of the AI age
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能时代的曙光
- en: A computer did not write these words. But it easily could have. As you probably
    know, we now have technological tools that can generate text instantly, on request,
    that seems equal to anything a human could produce – at first glance, at least.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机没有撰写这些文字。但它很容易就能做到。你可能知道，我们现在有技术工具可以即时生成文本，按需生成，看起来与人类能产生的任何内容一样——至少从第一眼看来是这样。
- en: The term for this type of technology is generative artificial intelligence,
    or generative AI, because it can ‘generate’ content like text, artwork and music
    in response to a user’s text prompt. Popular generative AI writing tools include
    OpenAI’s ChatGPT, Anthropic’s Claude, Google’s Gemini, Meta’s Llama and Microsoft’s
    Copilot. In this book, I will refer to ChatGPT alone because it’s the most popular
    and well-known, and the others offer broadly similar functions.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术的术语是生成式人工智能，或生成 AI，因为它可以根据用户的文本提示“生成”文本、艺术作品和音乐等内容。流行的生成式 AI 写作工具包括 OpenAI
    的 ChatGPT、Anthropic 的 Claude、Google 的 Gemini、Meta 的 Llama 和 Microsoft 的 Copilot。在这本书中，我将仅提及
    ChatGPT，因为它是最受欢迎和最知名的，其他工具提供类似的功能。
- en: 'Generative AI feels like a seismic shift in our relationship to technology.
    For the first time, computers are laying claim to cultural production, and even
    artistic expression, that has previously been done by humans alone. For decades,
    we’ve had computers that can do boring science stuff like calculating, planning
    and data-processing. More recently, we’ve had computers that can search the whole
    of human knowledge at the touch of a screen, keep us in constant contact with
    everyone we know and cater to our tastes before we even consciously decide what
    we like. But we’ve never had a computer that can come up with something like this:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能感觉像是我们在与技术关系中的地震性转变。对于第一次，计算机正在声称拥有以前只有人类才能完成的文化生产和艺术表达。几十年来，我们有了可以进行无聊的科学工作，如计算、规划和数据处理计算机。最近，我们有了可以触摸屏幕搜索整个人类知识的计算机，可以让我们与所认识的人保持持续联系，并在我们甚至没有意识到自己喜欢什么之前就迎合我们的口味。但我们从未有过能够想出这样的计算机：
- en: From circuits born, a mind begins to dream,
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从电路诞生，心灵开始梦想，
- en: New worlds arise from code’s creative stream.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 新世界从代码的创意之流中崛起。
- en: Art, thought, and form, reshaped by unseen hands,
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术思想，形式，被无形之手重塑，
- en: A future forged where human and machine stands.[1](#cER.xhtml#aPA)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人类与机器并立的未来。[1](#cER.xhtml#aPA)
- en: The reaction to the appearance of generative AI has been frenzied. Businesses,
    investors and the general public have all piled in, lured by the promise of the
    ‘next big thing’. Some creatives have been understandably fearful that they are
    about to be replaced by a machine – yet others have willingly embraced the technology
    and encouraged others to do the same. And while some observers have hailed generative
    AI as the dawn of a new age, others have been more critical of the technology
    and the buzz that surrounds it.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对生成式人工智能出现的反应是狂热的。企业、投资者和公众都纷纷涌入，被“下一个大事物”的承诺所吸引。一些创意人士可以理解地感到恐惧，他们担心自己将被机器取代——而另一些人则愿意拥抱这项技术，并鼓励他人也这样做。尽管一些观察家将生成式人工智能誉为新时代的曙光，但其他人则对这项技术和围绕它的炒作持更批判的态度。
- en: With so many people shouting so loudly about AI, it can be hard to tell fact
    from hype. In this book, I’ve aimed to take a realistic look at what writing tools
    like ChatGPT can and cannot do, particularly in relation to the craft of writing
    as practised by human writers. But first, let’s find out where these AI writing
    tools came from.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这么多人高声谈论人工智能的情况下，很难区分事实和炒作。在这本书中，我旨在对ChatGPT等写作工具能做什么和不能做什么进行现实分析，特别是与人类作家实践写作技艺相关联。但首先，让我们弄清楚这些AI写作工具是从哪里来的。
- en: A brief history of ChatGPT
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT简史
- en: OpenAI was founded in 2015 by Sam Altman, Elon Musk, Ilya Sutskever and Greg
    Brockman. In its early days, it was a non-profit with a mission to ‘advance digital
    intelligence in the way that is most likely to benefit humanity as a whole’. By
    2018, the firm was experimenting with Generated Pre-Training, or GPT. In the following
    year, OpenAI struck a deal with Microsoft to accept $1 billion of funding and
    use Microsoft’s Azure cloud computing platform, at which point OpenAI switched
    from being a pure non-profit to a complex web of interlinked companies with Microsoft
    as minority shareholder.[2](#cER.xhtml#aKJ)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI由山姆·奥特曼（Sam Altman）、埃隆·马斯克（Elon Musk）、伊利亚·苏茨克维（Ilya Sutskever）和格雷格·布鲁克曼（Greg
    Brockman）于2015年创立。在其早期，它是一家非营利组织，其使命是“以最有可能造福全人类的方式推进数字智能”。到2018年，该公司开始尝试生成预训练（Generated
    Pre-Training），或称GPT。在次年，OpenAI与微软达成协议，接受10亿美元的资金并使用微软的Azure云计算平台，此时OpenAI从一家纯非营利组织转变为一个与微软作为少数股东相互关联的复杂公司网络。[2](#cER.xhtml#aKJ)
- en: Early GPT models didn't cause much of a stir outside the tech community. But
    all that changed when ChatGPT appeared in November 2022, using the GPT-3 model.
    Taking the form of a chatbot, which interacts with users through typed conversations,
    ChatGPT offered an impressive range of functions. It could research topics and
    summarise its findings. It could recommend books, films, hotels, music and more.
    It could perform calculations and write computer code. It could edit and proofread
    existing text. And, most importantly for our purposes, it could generate plausible
    prose, poems, stories, speeches, marketing copy and news articles – all in a style
    of the user’s choice.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 早期的 GPT 模型在技术社区之外并没有引起太大的轰动。但所有这些都随着 2022 年 11 月 ChatGPT 的出现而改变，它使用了 GPT-3 模型。以聊天机器人的形式出现，通过与用户的文字对话进行交互，ChatGPT
    提供了一系列令人印象深刻的函数。它可以研究主题并总结其发现。它可以推荐书籍、电影、酒店、音乐等等。它可以进行计算和编写计算机代码。它可以编辑和校对现有文本。最重要的是，对于我们的目的而言，它可以生成符合用户选择的合理散文、诗歌、故事、演讲、营销文案和新闻文章。
- en: News of the remarkable new generative AI tool spread like wildfire, and just
    two months later, ChatGPT reached over 100 million users, making it the fastest-growing
    consumer software application of all time. In March 2023, OpenAI launched GPT-4,
    which offered many improvements over GPT-3 and was available through a paid subscription.
    As I write this, ChatGPT is among the top 20 most visited websites in the world.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这款引人注目的新型生成式人工智能工具的消息像野火一样迅速传播，仅仅两个月后，ChatGPT 的用户数量就超过了 1 亿，使其成为史上增长最快的消费软件应用。2023
    年 3 月，OpenAI 推出了 GPT-4，它在 GPT-3 的基础上进行了许多改进，并且可以通过付费订阅获得。在我撰写这篇文章的时候，ChatGPT 已经成为全球最受欢迎的
    20 个网站之一。
- en: Investors, sensing a historic opportunity, have been pouring cash into AI. In
    2023, the industry was already worth around $200 billion, and some expect it to
    mushroom to over $1.8 trillion by 2030.[3](#cER.xhtml#aU8) Meanwhile, businesses
    have been eagerly exploring the possibilities of using AI to automate their processes,
    discover valuable new insights or build their own chirpy chatbots to augment customer
    service teams.[4](#cER.xhtml#aU9)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 投资者意识到这是一个历史性的机会，已经开始大量投资于人工智能。到 2023 年，该行业已经价值约 2000 亿美元，有些人预计到 2030 年将激增至超过
    1.8 万亿美元。[3](#cER.xhtml#aU8) 同时，企业也在积极探索使用人工智能自动化其流程、发现有价值的新见解或构建自己的欢快的聊天机器人以增强客户服务团队的潜力。[4](#cER.xhtml#aU9)
- en: Given AI’s stratospheric rise to date, it’s hardly surprising that there have
    been some eye-popping predictions for its future. Apparently, by 2030, we’ll all
    be using AIs as our personal assistants, tutors, careers advisors, therapists,
    accountants, lawyers and even romantic partners,[5](#cER.xhtml#aUB) while physical
    robots performing human tasks will be commonplace in our homes and neighbourhoods.[6](#cER.xhtml#aUC)
    Sam Altman, CEO of OpenAI, predicted that AI would probably replace most of the
    work done by humans, while also heralding a massive increase in ‘material abundance’
    through 50 percent year-on-year increases in global GDP.[7](#cER.xhtml#aUD) If
    we’re lucky, AI will even step in to fix climate change[8](#cER.xhtml#aUE) – which
    is only fair, since AI blazes through up to 33 times as much energy as regular
    software to complete the same task.[9](#cER.xhtml#aUF)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到人工智能迄今为止的飞速发展，对其未来的预测令人眼花缭乱也就不足为奇了。显然，到 2030 年，我们将都会使用人工智能作为我们的个人助理、导师、职业顾问、治疗师、会计师、律师甚至浪漫伴侣，[5](#cER.xhtml#aUB)
    而执行人类任务的物理机器人在我们的家庭和社区中将变得司空见惯。[6](#cER.xhtml#aUC] OpenAI 的首席执行官 Sam Altman 预测，人工智能可能会取代人类的大部分工作，同时预示着通过全球国内生产总值（GDP）每年增长
    50% 的速度，将带来“物质丰富”的巨大增长。[7](#cER.xhtml#aUD] 如果我们幸运的话，人工智能甚至可以介入以解决气候变化[8](#cER.xhtml#aUE)
    - 这也是公平的，因为人工智能在完成相同任务时消耗的能量是常规软件的 33 倍。[9](#cER.xhtml#aUF)
- en: Such brash optimism is typical of Silicon Valley, with its philosophy of ‘move
    fast and break things’ and a business model that depends on projecting a sense
    of rapid progress and urging people to get involved by cultivating FOMO – the
    fear of missing out. However, not everyone is feeling quite so positive about
    the prospects for AI. Even Altman himself has confessed to feeling ‘a little bit
    scared’ about its future, admitting that AI technology could be used for cyberwarfare,
    hacking, disinformation or biological warfare – particularly once authoritarian
    regimes get up to speed with it. He’s also speculated that AI could end up making
    us stupid, by robbing us of our ‘discriminating thought process’.[10](#cER.xhtml#aPH)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这种鲁莽的乐观主义是硅谷的典型特征，其哲学是“快速行动，打破事物”，商业模式依赖于展示快速进步的感觉，并通过培养FOMO——即错失恐惧症——来鼓励人们参与。然而，并非所有人都对AI的前景感到如此乐观。甚至Altman本人也承认对AI的未来感到“有点害怕”，承认AI技术可能被用于网络战争、黑客攻击、虚假信息或生物战——尤其是当威权政权掌握了这项技术之后。他还推测，AI最终可能会让我们变得愚蠢，因为它剥夺了我们“辨别性思维过程”。[10](#cER.xhtml#aPH)
- en: By 2024, a ‘vibe shift’ seemed to be building over AI. OpenAI continued to release
    new versions of ChatGPT, including one that could speak as well as write, but
    still could not explain precisely how it planned to recoup the exorbitant costs
    of building and training AI models.[11](#cER.xhtml#aK6) Some sources claimed that
    ChatGPT’s growth was flatlining as users lost interest.[12](#cER.xhtml#aK7) Sceptics
    pointed out that AI applications vastly outnumbered actual use cases, stoking
    suspicions that AI was a solution in search of a problem.[13](#cER.xhtml#aK8)
    Investors, no longer quite so exuberant, grew impatient for results, with many
    fearful that AI would turn out to be the biggest tech bubble of all time.[14](#cER.xhtml#aK9)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 到2024年，关于人工智能的“氛围转变”似乎正在形成。OpenAI继续发布ChatGPT的新版本，包括一个既能说话也能写作的版本，但仍然无法精确解释它计划如何收回建造和训练AI模型的高昂成本。[11](#cER.xhtml#aK6)
    一些来源声称，随着用户失去兴趣，ChatGPT的增长正在停滞。[12](#cER.xhtml#aK7) 怀疑论者指出，AI应用的数量远远超过了实际用例，这引发了人们对AI是寻找问题的解决方案的怀疑。[13](#cER.xhtml#aK8)
    投资者不再那么兴奋，对结果变得不耐烦，许多人担心AI最终会成为有史以来最大的技术泡沫。[14](#cER.xhtml#aK9)
- en: 'As I write, the story is still unfolding – but I think we can confidently say
    that the first era of uncritical enthusiasm for AI is over. As with previous ‘next
    big things’ like wearable technology, NFTs, bitcoin and the metaverse, AI may
    be settling into place as ‘just another technology’: important and useful in its
    way, but not quite as earth-shattering as we first thought. But even after the
    hype does subside, the tools themselves will still be around, and we’ll still
    have to decide whether and how to use them. So what can ChatGPT actually do? And
    how exactly does it do it?'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当我写下这些时，故事仍在继续展开——但我认为我们可以自信地说，对AI无批判的热情的第一个时代已经结束。就像之前的“下一个大事物”如可穿戴技术、NFT、比特币和元宇宙一样，AI可能正在逐渐成为“另一种技术”：在某种程度上重要且有用，但并不像我们最初想象的那样具有颠覆性。但即使炒作消退，这些工具本身仍然存在，我们仍然需要决定是否以及如何使用它们。那么ChatGPT实际上能做什么？它又是如何做到的呢？
- en: How ChatGPT works
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的工作原理
- en: ChatGPT is a Large Language Model (LLM). It works by recognising and reproducing
    patterns in human language through what is called Natural Language Processing,
    or NLP.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个大型语言模型（LLM）。它通过所谓的自然语言处理（NLP）识别和再现人类语言中的模式来工作。
- en: Before ChatGPT was launched, the GPT-3 engine had to be ‘taught to speak’. To
    achieve that, it was ‘pre-trained’ on 570 gigabytes of text available on the internet
    in the form of websites, books, news articles, journals and social media. (By
    my calculation, that’s around 94.6 trillion words.)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT推出之前，GPT-3引擎需要“学会说话”。为了实现这一点，它需要在互联网上可用的570GB文本上进行“预训练”，这些文本以网站、书籍、新闻文章、期刊和社交媒体的形式存在。（据我计算，这大约是94.6万亿个单词。）
- en: By analysing these myriad sentences and exploiting the statistical regularities
    in language, GPT-3 was able to learn the ‘rules’ that govern how human beings
    speak and write. As it wandered through the universe of language, it observed
    which words tend to be used together, which ones are more important and which
    ones are most likely to come next in a given sequence.[15](#cER.xhtml#aS3) Essentially,
    GPT-3 is a word-prediction machine.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分析这些无数的句子并利用语言中的统计规律，GPT-3能够学习到支配人类说话和写作的“规则”。在它穿越语言宇宙的过程中，它观察到哪些词倾向于一起使用，哪些词更重要，以及哪些词在给定的序列中最有可能出现。[15](#cER.xhtml#aS3)
    从本质上讲，GPT-3是一个单词预测机器。
- en: You give [it] a text and cover up one of the words. Then you make it guess the
    missing word. Then you do it again. And again. And again. Over time, feeding it
    with new texts and more data, it does not only get increasingly more accurate
    at guessing words, but it also gains a vast amount of knowledge and learns to
    produce humanlike texts and responses.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 你给它一段文本，然后遮住其中的一个单词。然后让它猜出缺失的单词。然后你再次这样做。再然后。再然后。随着时间的推移，给它提供新的文本和更多数据，它不仅越来越擅长猜测单词，而且获得了大量的知识，并学会了产生类似人类的文本和回应。
- en: DANIEL HARDT[16](#cER.xhtml#aR9)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: DANIEL HARDT[16](#cER.xhtml#aR9)
- en: Natural Language Processing is what allows ChatGPT to hold humanlike conversations
    with its users. You can type in a request (known as a ‘prompt’) that gives instructions
    to the software in standard English, as if you were talking to another person,
    and ChatGPT will respond in kind.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理是ChatGPT能够与用户进行类似人类对话的原因。你可以输入一个请求（称为“提示”），用标准英语向软件下达指令，就像你正在与另一个人交谈一样，ChatGPT会相应地做出回应。
- en: 'For example, you can:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以：
- en: Ask ChatGPT open questions, like ‘Tell me about the history of breadmaking’
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向ChatGPT提出开放式问题，比如“告诉我面包制作的历史”。
- en: Ask ChatGPT to write text, like ‘Write a sonnet about the joy of breadmaking’
    or ‘Write a job application to become a music teacher’
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让ChatGPT写文本，比如“写一首关于面包制作快乐的十四行诗”或“写一份成为音乐教师的求职信”。
- en: Ask ChatGPT to edit text you already have – for example, ‘Rewrite the text below
    in plain English’ (and you paste in the text)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让ChatGPT编辑你已有的文本——例如，“将下面的文本重写为简单英语”（然后你粘贴文本）。
- en: Ask ChatGPT to summarise your text, or even someone else’s – for example, ‘Write
    a plot summary for Wuthering Heights’
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让ChatGPT总结你的文本，或者甚至别人的文本——例如，“为《呼啸山庄》写一个情节摘要”。
- en: Hold a conversation with ChatGPT – for example, by asking it a follow-up question
    or telling it to alter or refine the text it has just produced. ChatGPT automatically
    ‘remembers’ what you’re talking about from one prompt to the next.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与ChatGPT进行对话——例如，通过询问它后续问题或告诉它修改或完善它刚刚生成的文本。ChatGPT会自动“记住”你从一次提示到下一次提示所谈论的内容。
- en: 'Arthur C. Clarke said, ‘Any sufficiently advanced technology is indistinguishable
    from magic.’ That aptly describes the experience of seeing ChatGPT in operation
    for the first time. As the screen rapidly fills up with logical, grammatical and
    plausible content at superhuman speed, it seems that this machine has mastered
    a skill that takes us years to learn and remains a challenge for the rest of our
    lives: writing. And you can chat to it too.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 亚瑟·C·克拉克曾说：“任何足够先进的技术都和魔法无法区分。”这恰好描述了第一次看到ChatGPT运行时的体验。当屏幕以超人的速度迅速填满逻辑、语法和合理的内容时，似乎这台机器掌握了一种需要我们花费数年时间去学习，并且在我们余生中仍然是一个挑战的技能：写作。而且你还可以和它聊天。
- en: Take a closer look, however, and it’s clear that ChatGPT has its problems. In
    terms of factual writing, it makes errors (known as ‘hallucinations’) that may
    be difficult to detect. Its writing tone can sometimes sound weird or robotic,
    and it lacks empathy or insight into human life. Morally speaking, the whole enterprise
    is questionable, as ChatGPT’s capabilities are built on the past labours of human
    writers who receive no payment or even credit for their work. And worst of all,
    the platform has negative impacts on the user, by taking away a task that they
    can and (I believe) should do for themselves.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，仔细观察就会发现，ChatGPT存在一些问题。在事实性写作方面，它会产生（被称为“幻觉”）的错误，这些错误可能难以察觉。它的写作语气有时听起来很奇怪或像机器人，而且它缺乏对人类生活的同理心或洞察力。从道德上讲，整个项目都是可疑的，因为ChatGPT的能力建立在人类作家过去的劳动之上，而这些作家既没有得到报酬，也没有得到他们的工作的认可。最糟糕的是，这个平台对用户产生了负面影响，因为它剥夺了他们可以并且（我相信）应该自己完成的任务。
- en: Just a Luddite?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 只是一个卢德分子吗？
- en: I’ll be expanding on all my criticisms of ChatGPT in the second part of the
    book. But before we go any further, I have to pause and answer the charge that
    I am nothing more than a Luddite – that is, someone who resists technological
    innovation not on its merits, but in a stubborn or reactionary way.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在书的第二部分中详细阐述我对ChatGPT的所有批评。但在我们继续之前，我必须停下来回答这种指控，即我不过是一个卢德分子——也就是说，不是基于技术的优点，而是以固执或反动的方式抵制技术创新的人。
- en: Behind this accusation lies the assumption that technological advances always
    mean societal improvement. New technologies expand the range of possibilities
    by allowing us to do more things, or better things, or the same things more quickly
    and easily. As our knowledge expands outward, so our standard of living improves.
    Essentially, new tech means a better life.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个指控背后隐藏的假设是，技术进步总是意味着社会进步。新技术通过允许我们做更多的事情，或者更好的事情，或者更快、更轻松地做同样的事情来扩展我们的可能性范围。随着我们的知识向外扩展，我们的生活水平也在提高。本质上，新技术意味着更好的生活。
- en: Obviously, some new technology does bring benefits. Advances in medicine save
    lives. Improvements in agriculture prevent famine. Better transport saves time
    and fuel. And digital technology can manipulate knowledge and information in remarkable
    ways. But those benefits might still come at a cost, and that cost might not become
    clear until the technology has been widely adopted and used for some time. For
    example, the internet has brought us new connections, saved us time and made human
    knowledge freely available to all. But it’s also sown discord, spread misinformation
    and made our children more anxious than they’ve ever been.[17](#cER.xhtml#aMF)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，一些新技术确实带来了好处。医学的进步挽救了生命。农业的改进防止了饥荒。更好的交通节省了时间和燃料。而数字技术可以在惊人的方式上操纵知识和信息。但这些好处可能仍然会付出代价，而这个代价可能直到技术被广泛采用和使用一段时间后才会变得明显。例如，互联网为我们带来了新的联系，节省了我们的时间，使人类知识对所有人均可自由获取。但它也播下了不和，传播了错误信息，使我们的孩子比以往任何时候都更加焦虑。[17](#cER.xhtml#aMF)
- en: So when a new technology like AI comes along, we’re entitled to ask, in a polite
    and measured way, what the downsides might be – particularly when we’re bombarded
    with so much breathless coverage of the upsides.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当一种新技术如AI出现时，我们有权利以礼貌和谨慎的方式询问可能存在的缺点——尤其是当我们被大量关于正面报道的喘息声所轰炸时。
- en: 'Some AI evangelists argue that anyone who expresses reluctance is suffering
    from fear of the unknown, fear of change or fear of becoming irrelevant. This
    frames the discussion in terms of feelings vs facts: our irrational fears are
    holding us back, and once we overcome them with a dose of factual knowledge, we’ll
    be able to move forward.[18](#cER.xhtml#aRY) A cruder accusation is that Luddites
    simply don’t understand the technology they’re resisting. If only we’d make the
    effort to learn a bit more about it, we’d see how beneficial it can be. Or maybe
    we’re simply incapable of learning, in which case we probably deserve to be left
    behind.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 一些AI的鼓吹者认为，任何表达犹豫的人都在遭受对未知、对变化或变得无关紧要的恐惧。这把讨论框架在情感与事实之间：我们非理性的恐惧阻碍了我们，一旦我们用一些事实知识克服它们，我们就能继续前进。[18](#cER.xhtml#aRY)
    一个更粗鲁的指控是，卢德分子只是不理解他们所抵制的技术。如果我们能花点时间多了解一点，我们就会看到它可能是有益的。或者也许我们根本无法学习，在这种情况下，我们可能应该被留下。
- en: When you face a big decision with major consequences, it’s perfectly sensible
    to take a step back, wait for more information and weigh up benefits versus costs.
    That’s not fear, but rational caution. Then, having learned more about the possibilities,
    you might still make a rational or principled decision not to get involved. And
    on top of all that, if you feel an instinctive unease that something is not quite
    right, or seems too good to be true, it often pays to act on it, or at least look
    into it.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当你面临一个具有重大后果的重大决定时，退一步，等待更多信息，权衡利弊是非常合理的。那不是恐惧，而是理性的谨慎。然后，在了解更多可能性之后，你仍然可能做出理性或原则性的决定不参与其中。而且，更重要的是，如果你本能地感到不安，觉得某件事不太对劲，或者看起来太好了而不真实，那么采取行动或至少调查它通常是值得的。
- en: The original Luddites smashed new automated machinery introduced into English
    textile mills during the Industrial Revolution. Over time, their name has become
    a byword for anyone who resists new technology or even progress of any sort. But
    the Luddites were neither fearful nor ignorant of industrialisation, and nor did
    they have a knee-jerk opposition to anything new. Rather, they took a clear-eyed
    view of the social impact of technology and correctly predicted what would happen
    when industrial automation met the power of big capital in 19th-century English
    society. While smaller textile mills might well be run with respect for workers’
    wellbeing and the law of the land, larger enterprises would have enough clout
    to disregard the rules. That would mean lower pay and worse conditions for workers,
    reduced quality for customers and colossal profits for those who owned the mills.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 原始的卢德派砸毁了在工业革命期间引入英国纺织厂的新的自动化机器。随着时间的推移，他们的名字已经成为任何抵制新技术或任何形式进步的人的代名词。但卢德派既不害怕也不无知于工业化，他们也没有对新事物有本能的反对。相反，他们清楚地看待技术的社会影响，并正确预测了当工业自动化在19世纪英国社会遇到大资本的权力时会发生什么。虽然较小的纺织厂可能会尊重工人的福祉和土地法律，但较大的企业会有足够的实力忽视规则。这意味着工人的工资会降低，条件会更差，顾客的质量会降低，而那些拥有工厂的人会获得巨大的利润。
- en: 'The Luddites knew exactly who owned the machinery they destroyed. They saw
    that automation is not a faceless phenomenon that we must submit to. And they
    were right: Automation is, quite often and quite simply, a matter of the executive
    classes locating new ways to enrich themselves.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 卢德派清楚地知道他们摧毁的机器属于谁。他们看到自动化不是一种无名的现象，我们必须屈服于它。他们是对的：自动化在许多情况下，简单来说，就是管理层寻找新的方式来丰富自己。
- en: BRIAN MERCHANT[19](#cER.xhtml#aKU)
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: BRIAN MERCHANT[19](#cER.xhtml#aKU)
- en: It wasn’t the machines themselves that Luddites had a problem with, but the
    power of the companies that built them. Smashing the machines was merely the only
    means at hand to confront and challenge that power. And when factory owners mobilised
    military and legal force to crush the Luddites’ protests, they were proved absolutely
    right.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 卢德派的问题并不是机器本身，而是建造它们的公司的权力。砸毁机器只是他们手中唯一可以用来对抗和挑战这种权力的手段。当工厂主动员军事和法律力量镇压卢德派的抗议时，他们被证明是完全正确的。
- en: In the same way, questioning the value of generative AI is not about being fearful
    or dismissive of the technology itself, or new technology in general. It’s about
    resisting the powerful corporations who offer to solve non-existent problems,
    or proclaim that everything can be quicker, easier and smoother, but without ever
    explaining why.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，质疑生成式人工智能的价值并不是因为害怕或轻视这项技术本身，或者一般的新技术。这是关于抵制那些承诺解决不存在的问题，或者宣称一切都可以更快、更简单、更顺畅的公司，但他们从未解释过原因。
- en: 'Tech critic Evgeny Morozov calls this ‘technological solutionism’: the notion
    that technology can solve all the problems of humankind, and that once engineers
    have built the right solutions, we’ll enter a frictionless, hassle-free utopia.[20](#cER.xhtml#aTS)
    Each new digital platform arrives with promises of an easier and better life.
    But after the initial thrill of novelty and the rush of early adoption, we soon
    end up mired in what Cory Doctorow calls ‘enshittification’: the slow degradation
    of an online product or service as it surreptitiously shifts from attracting users
    to monetising them, often through advertising.[21](#cER.xhtml#aTT) Ultimately,
    tech firms undermine the core user experience by prioritising shareholder value
    above all else.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 技术评论家叶夫根尼·莫罗佐夫称这为“技术解决方案主义”：认为技术可以解决人类的所有问题，一旦工程师构建了正确的解决方案，我们就会进入一个无摩擦、无烦恼的乌托邦。[20](#cER.xhtml#aTS)
    每个新的数字平台都带着更轻松、更好的生活的承诺。但在新奇的初始兴奋和早期采用的冲动之后，我们很快就会陷入科里·多克托罗所说的“奴役化”：在线产品或服务在不知不觉中从吸引用户转变为货币化，通常是通过广告。[21](#cER.xhtml#aTT)
    最终，科技公司通过将股东价值置于一切之上来破坏核心用户体验。
- en: ChatGPT is only at the beginning of that process, but the direction of travel
    is already clear – and the benefits are dubious even now. And that brings us to
    the second part of the book, where I lay out my case against ChatGPT. Then, in
    the third part, I’ll suggest some ways to make your writing more human, stand
    out from machine-generated content and resist the advance of AI.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT还处于这个过程的开始阶段，但方向已经明确——而且即使现在，其好处也是可疑的。这把我们带到了这本书的第二部分，在那里我阐述了我对ChatGPT的反对意见。然后，在第三部分，我将提出一些使你的写作更具人性、区别于机器生成内容并抵制AI进步的方法。
- en: THE CASE AGAINST CHATGPT
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 反对ChatGPT的案例
- en: Why a machine will never write as well as you.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么机器永远无法写得像你一样好。
- en: The process of writing
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 写作的过程
- en: To set the scene, let’s define some terms. When I say the word ‘writing’, you
    might think of using a pen and paper or typing at a keyboard. But there’s a lot
    more to the writing process than putting words onto a page or screen.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了设定场景，让我们定义一些术语。当我提到“写作”这个词时，你可能会想到使用笔和纸或敲击键盘。但写作过程远不止将词语放在纸张或屏幕上。
- en: '![](OEBPS/image_rsrcVU.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](OEBPS/image_rsrcVU.jpg)'
- en: First, you decide what you’re going to write – your aim. For example, you might
    be planning to write a crime novel. Or you might be writing an article about solar
    panels aimed at homeowners who are considering installing them. Or you might be
    working on a vital email to your boss about an upcoming job opportunity.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你决定你要写什么——你的目标。例如，你可能正在计划写一部犯罪小说。或者你可能正在写一篇关于太阳能板的文章，目标读者是正在考虑安装太阳能板的房主。或者你可能正在写一封至关重要的电子邮件给你的老板，关于即将到来的工作机会。
- en: At the same time, you decide the purpose of your writing. While your aim captures
    what you want your writing to be, your purpose describes what you want it to do.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，你决定你写作的目的。虽然你的目标捕捉了你希望你的写作成为的样子，但你的目的描述了你希望它做到的事情。
- en: Crucially, your purpose should be framed in terms of your reader(s), not you
    as a writer. It will usually be making your reader know, think or feel something
    new or different. For example, with a crime novel, your purpose is to entertain,
    intrigue and thrill your reader with the twists and turns in your story. For the
    solar panels article, you want to provide clear information or valuable guidance
    to support a decision to buy. For the email, you want your boss to understand
    why you’d be perfect for the role and offer you an interview.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，你的目的应该从你的读者（们）的角度来设定，而不是你作为作者。它通常是为了让你的读者了解、思考或感受到一些新的或不同的事物。例如，对于犯罪小说，你的目的是通过故事中的转折和转折来娱乐、引起读者的好奇心和兴奋。对于太阳能板的文章，你希望提供清晰的信息或宝贵的指导，以支持购买的决定。对于电子邮件，你希望你的老板理解你为什么适合这个角色，并为你提供面试机会。
- en: Once you’ve decided on your aim and purpose, you move on to thinking about what
    to write. This could include writing a plan, like the plot of a novel or the outline
    of a non-fiction book. You might also do some research – for example, you might
    delve into the historical setting for your novel, investigate the legal regulations
    on solar panels or ask around the office to find out what your company looks for
    in a manager. Or you might just reflect on your writing project in a less formal,
    structured way, thinking it over in your mind and jotting down ideas or phrases.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你决定了你的目标和目的，你接下来就要考虑写什么。这可能包括写一个计划，比如小说的情节或非虚构书的提纲。你也可能做一些研究——例如，你可能深入研究你小说的历史背景，调查太阳能板的法律法规，或者在办公室里四处询问，了解你的公司对经理的要求。或者你可能只是以不那么正式、结构化的方式反思你的写作项目，在心里思考并记下想法或短语。
- en: 'Next is the actual writing: the act of choosing words and putting them down.
    As you know, this can prove extremely challenging, as you struggle to find the
    words that will achieve your purpose and realise your aim. Even if some parts
    of your writing take shape relatively easily, you’ll probably run into problems
    at some point. And of course, it’s precisely this frustration that ChatGPT offers
    to take away.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是实际的写作：选择词语并将它们写下来的行为。正如你所知，这可能会非常具有挑战性，因为你努力寻找能够实现你的目的和达到你目标的话语。即使你写作的某些部分相对容易成形，你可能会在某个时候遇到问题。当然，正是这种挫败感，ChatGPT试图帮你摆脱。
- en: After writing comes editing, when you’re mainly trying to improve what you’ve
    already written rather than produce anything new. This can involve changing individual
    words, reordering sentences or paragraphs, deleting bits that aren’t working and
    so on.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 写作之后是编辑，这时你主要是在尝试改进你已经写下的内容，而不是创造新的内容。这可能包括更改个别词语，重新排列句子或段落，删除不起作用的片段等等。
- en: 'Thinking, writing and editing all overlap. You’ll often move back and forth
    between them as your writing develops, and it can be hard to say where one stage
    ends and another begins. For example, few writers generate an entire first draft
    before editing a word; it’s more common to make changes as you go along, switching
    between editing and writing from moment to moment. And thinking is always there
    in the background: you’ll probably carry on mulling over your writing, whether
    consciously or unconsciously, even when you’re not physically at your desk – the
    mental process known as incubation.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 思考、写作和编辑三者相互重叠。随着写作的发展，你经常会在这三者之间来回移动，很难说清楚一个阶段在哪里结束，另一个阶段在哪里开始。例如，很少有作家在编辑一个单词之前就能生成整个初稿；更常见的是边走边改，从一刹那到另一刹那之间切换编辑和写作。而且思考始终在幕后：你可能会继续深思熟虑你的写作，无论是自觉还是不自觉的，即使你不在办公桌前——这种心理过程被称为酝酿。
- en: The thinking-writing-editing phase is fairly open-ended, and continues until
    you either reach a version you’re happy with, run out of time or simply give up,
    at which point your writing is done. The end result is the output of your writing
    process, and it reflects what you targeted when you chose your aim (a book, an
    article, an email, etc).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 思考、写作和编辑阶段相当开放，会一直持续到你满意某个版本、时间耗尽或简单地放弃，这时你的写作就完成了。最终结果是写作过程的输出，它反映了你选择目标（一本书、一篇文章、一封电子邮件等）时所设定的目标。
- en: However, that’s not the end of the story, because your writing must now go out
    into the world, be read by its readers and achieve the purpose you set at the
    beginning. This is the outcome of your writing.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不是故事的结束，因为你的写作现在必须进入世界，被读者阅读，并实现你最初设定的目的。这是你写作的结果。
- en: Outcomes are the true test of writing success. Unless you’re writing something
    purely private and personal, like a diary, you want your writing to get some sort
    of real-world result, and it only succeeds insofar as it does so. If your writing
    doesn’t do what you wanted it to do, it’s failed – and all your efforts have gone
    to waste.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是衡量写作成功与否的真正标准。除非你写的是纯粹私密和个人的东西，比如日记，否则你希望你的写作得到某种现实世界的成果，并且只有在这样做的情况下才算成功。如果你的写作没有达到你想要的效果，那么它就失败了——你所有的努力都白费了。
- en: Overall, writing is a process of communication that links the writer and the
    reader. Your goal is not just to ‘write something’ or ‘create some content’, but
    to communicate ideas, facts, stories, opinions or emotions and make something
    happen in the mind and heart of your reader. The words on the page are just the
    tool you use to make that happen.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，写作是一个沟通过程，将作者和读者联系起来。你的目标不仅仅是“写点什么”或“创造一些内容”，而是传达想法、事实、故事、观点或情感，并在读者的心灵和心中产生某种影响。页面上的文字只是你用来实现这一点的工具。
- en: 'Now compare this process to what happens when you use ChatGPT to produce your
    text instead:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将这个过程与使用ChatGPT生成文本时发生的情况进行比较：
- en: While ChatGPT offers instant results, the prompt/response format neglects vital
    aspects of the writing process. Your prompt is focused mainly on the output you
    want to obtain, as opposed to the purpose you want to achieve.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然ChatGPT提供即时结果，但提示/响应格式忽略了写作过程中的重要方面。你的提示主要关注你想要获得的输出，而不是你想要实现的目的。
- en: Although you can try to explain your purpose to ChatGPT, it has no objective
    knowledge of the world and doesn’t understand human experience, goals or emotions.
    So while it’s relatively easy to change the structure or style of the output,
    ChatGPT will never comprehend the substance of what you’re trying to say or what
    it will mean to your reader.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽管你可以尝试向ChatGPT解释你的目的，但它对世界的客观知识为零，也不理解人类经验、目标或情感。因此，虽然改变输出的结构或风格相对容易，但ChatGPT永远不会理解你试图表达的本质，或者这对你读者意味着什么。
- en: ChatGPT offers to do the thinking for you, but you have no idea what it’s doing,
    or how. All you can do is look at the content it creates and infer its ‘thinking’
    process from that. You also miss out on doing the thinking yourself, which can
    have a major impact on both the direction and quality of your writing.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT提供为你思考，但你不知道它在做什么，或者它是如何做到的。你能做的只是查看它创造的内容，并从中推断出它的“思考”过程。你还错过了自己思考的机会，这可能会对写作的方向和质量产生重大影响。
- en: ChatGPT seems to offer ‘the answer’ to your prompt, but its output is only one
    possible approach among many.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT似乎提供了对你提示的“答案”，但它的输出只是众多可能方法中的一种。
- en: ChatGPT seems authoritative, but it can make mistakes, and it can be hard to
    detect minor errors if you don’t know the subject well.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT看起来很权威，但它会犯错误，如果你对主题不熟悉，很难察觉到细微的错误。
- en: Last but by no means least, ChatGPT cannot write from your mind and heart, drawing
    on your own absolutely unique experience and view of the world, because that is
    something that only you can do.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，ChatGPT无法从你的内心和情感出发写作，借鉴你自己的绝对独特的经验和世界观，因为这是只有你自己才能做到的事情。
- en: In the rest of this chapter, I’ll explore these areas in more detail, getting
    deep into the whys and wherefores and citing evidence to support my points.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的其余部分，我将更详细地探讨这些领域，深入探讨原因和结果，并引用证据来支持我的观点。
- en: ChatGPT is not a person
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不是一个真人
- en: 'For as long as computers have existed, both their creators and their users
    have tended to anthropomorphise them – that is, to see them as somehow human.
    The ground was prepared by popular science fiction, where we’ve met the malignant
    Hal 9000 in 2001: A Space Odyssey (1968), the child-savant Brain in Isaac Asimov’s
    robot stories[22](#cER.xhtml#aP1) and the oracular Deep Thought in Douglas Adams’
    Hitch-Hiker’s Guide to the Galaxy,[23](#cER.xhtml#aP2) among many others. All
    these imaginary computers had distinctive characters, held humanlike conversations
    with the people who used them and were created to solve problems that humans could
    not.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 自从计算机存在以来，无论是它们的创造者还是使用者，都倾向于将它们拟人化——也就是说，将它们视为某种形式的人类。科幻小说为这种观念奠定了基础，我们在1968年的《2001太空漫游》中遇到了恶意的HAL
    9000，在艾萨克·阿西莫夫的机器人故事中遇到了儿童天才Brain[22](#cER.xhtml#aP1)，在道格拉斯·亚当斯的《银河系漫游指南》中遇到了神秘的深思[23](#cER.xhtml#aP2)，以及其他许多虚构的计算机。所有这些虚拟计算机都有独特的个性，与使用它们的人类进行类似人类的对话，并被创造出来解决人类无法解决的问题。
- en: In the real world, engineers do the same thing, giving their creations names
    like Siri and Alexa so we’re encouraged to think of them as people. ChatGPT is
    an exception, although the word ‘chat’ still encourages us to think of our interactions
    with it as a human conversation.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，工程师们也做同样的事情，给他们的创造物起名如Siri和Alexa，以鼓励我们将其视为人类。ChatGPT是一个例外，尽管“聊天”这个词仍然鼓励我们将其与它的互动视为一种人类对话。
- en: With all these devices, we intuitively use speech as a measure of intelligence
    and an indication of humanity. When we come across something that speaks in the
    same way that we do, we assume it must think like us too. If Hal had communicated
    his evil intentions via ‘beep-boop’ noises and flashing lights, he would have
    seemed less like a movie villain and more like a washing machine.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有这些装置的帮助下，我们本能地将言语视为智能的衡量标准和人性的标志。当我们遇到以与我们相同方式说话的事物时，我们就会假设它也像我们一样思考。如果HAL通过“哔哔-嘟嘟”的声音和闪烁的灯光传达其邪恶意图，它看起来会更像是一部洗衣机，而不是电影中的反派角色。
- en: The famous Turing Test, devised by pioneering computer scientist Alan Turing,
    suggested that if a human evaluator could not tell the difference between text
    responses from a human and those from a machine, the machine would be exhibiting
    intelligent behaviour. Turing only intended his test as one possible way to evaluate
    AI, rather than an ‘entrance exam’ for computers to prove their intelligence.
    Nevertheless, the test became a goal for engineers trying to create AI – a goal
    that was apparently attained with the creation of GPT-4, which can pass a rigorous
    Turing Test with flying colours, according to researchers at Stanford.[24](#cER.xhtml#aKA)
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 著名的图灵测试，由先驱计算机科学家艾伦·图灵设计，表明如果人类评估者无法区分人类和机器的文本回复，那么机器就会表现出智能行为。图灵只打算将他的测试作为评估AI的一种可能方式，而不是计算机证明其智能的“入学考试”。尽管如此，这个测试成为了工程师们试图创造AI的目标——一个显然在GPT-4的创造中得以实现的目标，根据斯坦福大学的研究人员[24](#cER.xhtml#aKA)的说法，GPT-4能够轻松通过严格的图灵测试。
- en: ChatGPT has a number of features that make us more likely to think of it as
    human. When you ask it a question, it seems to pause and think, and then refers
    to itself as ‘I’ when replying. Rather than its output appearing all at once,
    it is ‘typed’ letter by letter – albeit at superhuman speed. ChatGPT gives the
    impression of understanding you and seems to remember the conversation as it unfolds.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT拥有许多让我们更倾向于将其视为人类的特点。当你向它提问时，它似乎会停下来思考，然后在回答时自称“我”。它的输出不是一次性出现，而是逐字“输入”——尽管速度超乎常人。ChatGPT给人一种理解你的印象，似乎在对话展开的过程中记得之前的对话。
- en: 'We experience phenomena like ChatGPT as ‘quasi-other’: something more than
    mere objects, but less than living things.[25](#cER.xhtml#aN4) However, ChatGPT
    isn’t conscious and has no mind of its own. It doesn’t have perceptions, thoughts
    or feelings, and as we’ll see later, it doesn’t really know anything about the
    world or how we live in it. All it does is arrange tokens into sequences according
    to patterns it has learnt from data.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将ChatGPT这样的现象体验为“准他者”：比纯粹的对象更多，但又不如生物那样有生命。[25](#cER.xhtml#aN4) 然而，ChatGPT没有意识，也没有自己的思想。它没有感知、思维或情感，正如我们稍后将看到的，它对世界或我们如何生活其中并不真正了解。它所做的只是根据从数据中学到的模式将标记排列成序列。
- en: Of course, the makers of ChatGPT want us to think of it as a living being, which
    is why they gave it human-like features. If we believe that it’s a fallible person,
    rather than a precision-tuned device, we might be prepared to forgive its mistakes.
    And if we grow attached to it as a trusted friend or colleague, we’re more likely
    to stay loyal to it over time.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，ChatGPT的制作者希望我们把它想象成一个生命体，这就是为什么他们赋予了它类似人类的特点。如果我们认为它是一个会犯错的普通人，而不是一个精确调校的设备，我们可能会准备原谅它的错误。如果我们把它当作一个值得信赖的朋友或同事而与之建立感情，那么随着时间的推移，我们更有可能保持对它的忠诚。
- en: ChatGPT can’t write your words
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT无法为你写出你的话语
- en: It is easy for me to imagine that the next great division of the world will
    be between people who wish to live as creatures and people who wish to live as
    machines.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我很容易想象，世界未来的伟大分裂将是那些希望像生物一样生活的人和那些希望像机器一样生活的人之间。
- en: WENDELL BERRY[26](#cER.xhtml#aU7)
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 文/文德尔·贝里[26](#cER.xhtml#aU7)
- en: 'During the 2024 Olympics, several firms aired TV advertisements for their AI
    tools that tried to align them with everyday human experience. Most ads focused
    on productivity tasks, using taglines like ‘Expand your world’. But Google’s ‘Dear
    Sydney’ ad went further. It featured a father whose daughter wants to write a
    fan letter to American Olympic hurdler Sydney McLaughlin-Levrone. But instead
    of sitting down with his daughter so they can write it together, the father turns
    to Gemini, Google’s AI tool. The crass, tone-deaf ad drew a chorus of criticism,
    and a chastened Google duly withdrew it.[27](#cER.xhtml#aTF) But the mask had
    slipped: Big Tech wants to dissect our emotions, mediate our closest relationships
    and choose the words we would otherwise choose for ourselves, all so it can sell
    us the solution to a problem that doesn’t exist.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在2024年奥运会上，几家公司在电视广告中推广了他们的AI工具，试图将它们与日常人类经验相联系。大多数广告都集中在生产力任务上，使用像“拓展你的世界”这样的口号。但谷歌的“亲爱的悉尼”广告更进一步。广告中有一个父亲，他的女儿想给美国奥运跨栏运动员悉尼·麦克劳林-莱弗罗恩写一封粉丝信。但父亲并没有和女儿坐下来一起写，而是转向了谷歌的AI工具Gemini。这个粗俗、无感的广告引发了一片批评，谷歌也相应地撤回了广告。[27](#cER.xhtml#aTF)
    但面具已经滑落：大科技公司想要剖析我们的情感，调解我们最亲密的关系，并选择我们本会为自己选择的词语，所有这一切都是为了向我们推销一个并不存在的解决方案。
- en: When we write, we all have our own individual ‘voice’. On one level, this writing
    voice is a matter of writing style and word choice – that is, the output of the
    writing process. But at a deeper level, it’s rooted in our individual experiences,
    thoughts, beliefs and emotions, and the human purposes that lie behind every word
    we choose.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们写作时，我们每个人都有自己的“声音”。在某种程度上，这种写作声音是写作风格和词汇选择的问题——即写作过程的输出。但在更深层次上，它根植于我们个人的经历、思想、信仰和情感，以及我们选择每个词语背后的人类目的。
- en: 'No-one else on earth is quite like you. Your unique character is the product
    of every moment of your life up to today: everyone you’ve known, all the things
    you’ve done, everything you’ve learned, every friendship you’ve gained, every
    love you’ve lost, every triumph and every defeat. No-one sees through your eyes,
    thinks with your mind or speaks from your experience. No one travelled the same
    road to be here today.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个地球上，没有其他人像你一样。你独特的个性是你迄今为止生活中的每一刻的产物：你所认识的人，你所做的事情，你所学到的所有东西，你所获得的所有友谊，你所失去的所有爱情，你所取得的每一次胜利和每一次失败。没有人能透过你的眼睛看，用你的思想思考，或从你的经验中说话。没有人走过相同的道路来到今天。
- en: 'As you live your life, so you acquire your words: you accumulate experience
    along with the language you use to describe it. In your early years, you learn
    from parents or carers; later on, you learn from wider family, friends and teachers.
    Eventually, you go out into the world and learn from coaches, professors, managers
    or workplace trainers. You pick up knowledge and ideas from culture: books, newspapers,
    magazines, TV, movies, websites and social media. Taken together, all this learning
    taught you everything you know about the world and gave you the means to express
    it.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在你生活的过程中，你就获得了你的词汇：你积累了经验，以及你用来描述它的语言。在你早年，你从父母或照顾者那里学习；后来，你从更广泛的家人、朋友和老师那里学习。最终，你走出世界，从教练、教授、经理或职场培训师那里学习。你从文化中获取知识和思想：书籍、报纸、杂志、电视、电影、网站和社交媒体。所有这些学习共同教会了你关于世界的所有知识，并给了你表达它的手段。
- en: Words play a major part in all these relationships. Through them, you share
    your feelings of kinship, friendship and love. You learn skills and put them into
    practice. You express what you feel about yourself, your life and your place in
    the world. You state your beliefs about politics, philosophy, religion, spirituality
    or art.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 文字在所有这些关系中扮演着重要的角色。通过它们，你分享你的亲情、友情和爱情。你学习技能并将它们付诸实践。你表达你对自身、生活以及你在世界中的位置的感受。你陈述你对政治、哲学、宗教、灵性或艺术的信仰。
- en: Every time you write, your words flow from the wellspring of your life. It doesn’t
    matter how ‘good’ you are at writing compared to other people. It doesn’t matter
    whether your writing is grammatically correct down to the last comma. What matters
    is that these words are yours. And you have a sacred right to speak and write
    them that nobody can take away.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你写作时，你的文字都源自你生命的源泉。你写作的“好”与不好与其他人相比无关。你的写作是否语法正确，直到最后一个逗号，也无关紧要。重要的是这些文字是你的。你有神圣的权利去说和写这些文字，没有人可以夺走。
- en: Moreover, although your words are your own, they also bind you to everyone who
    hears or reads them, just as other people’s words bind them to you. Language is
    a complex adaptive system that is both shared and shaped by everyone who uses
    it.[28](#cER.xhtml#aMA) You have played your own small part in that process throughout
    your life, as you speak and listen to those around you. You and I are engaged
    in the same process right now, as you read my words across our separation in space
    and time. Together, all these myriad word-links shape the language we all share.
    And they extend back through time in a chain of meaning to the very first spoken
    word. Language links us with the generations who came before us and prepared our
    way so that we could be born into a world of words already made.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，尽管你的话是你自己的，但它们也把你与所有听到或读到它们的人联系在一起，就像别人的话把他们与你联系在一起一样。语言是一个复杂且适应性强的系统，它既被所有人共享，也被所有人所塑造。[28](#cER.xhtml#aMA)
    在你的整个生命中，你都在这个过程中扮演着小小的角色，因为你与周围的人说话和倾听。现在，你和我正在参与同样的过程，因为你跨越时空的分离阅读我的文字。共同地，所有这些无数的词汇链接塑造了我们共同的语言。并且它们通过意义链回溯到最初的说出的单词。语言将我们与那些在我们之前来过并为我们铺路，以便我们能够出生在一个已经由文字构成的世界中的世代联系起来。
- en: 'We make language – but at the same time, language makes us. Earlier, I described
    writing as a process of communication, but it’s far more than that. It’s not just
    a way to reflect a world ‘out there’, but a way to create a world for ourselves:
    a world that makes sense to us and to those around us. It’s not just a way to
    cast our pre-existing thoughts into words, but a part of how we think in the first
    place. We use words not merely to capture our experience, but to create it.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创造语言——但与此同时，语言也塑造了我们。早些时候，我把写作描述为沟通的过程，但它远不止于此。它不仅仅是一种反映“外面”世界的方式，而是一种为我们自己创造世界的方式：一个对我们和周围的人来说都有意义的世界。它不仅仅是一种把我们的现有思想转化为文字的方式，而是我们思考方式的一部分。我们使用文字不仅是为了捕捉我们的经验，也是为了创造它。
- en: While language may be natural, that doesn’t mean it’s easy. We’ve all struggled
    to express certain ideas or put certain feelings into words. The task of writing
    can present a huge challenge, from the classroom to the boardroom. But although
    the work may sometimes be difficult or frustrating, it’s still not something that
    we should give up and outsource to a machine. To give up the labour of writing
    is to give up the labour of living.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然语言可能是自然的，但这并不意味着它容易。我们都曾努力表达某些想法或把某些情感用文字表达出来。写作的任务可能是一个巨大的挑战，从教室到会议室。但尽管工作有时可能困难或令人沮丧，这并不是我们应该放弃并外包给机器的事情。放弃写作的劳动就是放弃生活的劳动。
- en: When we turn to an LLM to write for us, we are also inviting it to undertake
    the more fundamental task of articulation, and this is no small thing. Indeed,
    given the centrality of language to the human condition, we should wonder about
    the degree to which the outsourcing of the labor of articulation is the outsourcing
    of a fundamentally human activity.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们转向LLM来为我们写作时，我们也在邀请它承担更根本的任务——表达，而这并非小事。的确，鉴于语言对人类状况的核心地位，我们应该思考将表达劳动外包到何种程度是外包了一种基本的人类活动。
- en: L.M. SACASAS[29](#cER.xhtml#aMT)
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: L.M. SACASAS[29](#cER.xhtml#aMT)
- en: From this perspective, it’s clear that there’s no comparison between the writing
    that ChatGPT does ‘for’ you and the writing you do for yourself. It might sometimes
    serve as a substitute, but it’s far from being equivalent. ChatGPT doesn’t know
    you as a person, and it doesn’t know what it’s like to be you, or your reader,
    or indeed anybody in the world. When you outsource your writing to ChatGPT, you
    reduce yourself to a data-network node and your language to an algorithm. You
    trade your individual human voice – unique in the world and for all time – for
    an uncanny ghost-voice, woven from stolen strands. The best you can hope for is
    a sort of plausible average of stuff that other people have said in the past.
    By accepting it, simply because it’s there, you’re sidelining yourself within
    your own life.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个角度来看，很明显，ChatGPT为你“写”的文本和你自己写的文本之间没有可比性。它有时可能作为替代品，但它远非等同。ChatGPT不了解你作为一个人，它不知道作为你、你的读者或世界上任何人的感受。当你将写作外包给ChatGPT时，你将自己降低为一个数据网络节点，将你的语言降低为一个算法。你用你独特的人类声音——在世界上独一无二，并且永远如此——交换了一个令人毛骨悚然的幽灵般的声音，它是由窃取的线头编织而成的。你所能期望的最好是一种看似合理的、由其他人过去说过的话的平均值。仅仅因为它存在就接受它，你就在自己的生活中将自己置于次要地位。
- en: If we accept that the challenge of articulating life in the first person, as
    it unfolds, is central to human beings, then to allow an AI to do this on our
    behalf suggests self-erasure of the human.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们接受将第一人称表达生活的挑战是人类的中心，那么允许AI代表我们这样做，就意味着自我抹去人类。
- en: MATTHEW CRAWFORD[30](#cER.xhtml#aMS)
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: MATTHEW CRAWFORD[30](#cER.xhtml#aMS)
- en: Now, you may be thinking that all this might apply to something highly personal,
    like a love letter, or something artistic, like a poem or a literary novel – but
    surely not to something as utilitarian as a work email, or as trivial as a tweet.
    But as we’ve seen, every piece of writing has a human purpose and a human outcome.
    If we dial up some ChatGPT content and decide that it will do, we’re implicitly
    accepting that neither purpose nor outcome are particularly important to us –
    that is, either that we don’t care whether our writing achieves its purpose or
    maybe that we don’t even have any purpose at all. Whichever one it is, it begs
    the question of whether this writing venture is worth our while, or whether our
    time would be better spent elsewhere.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可能认为所有这些都可能适用于高度个人化的东西，比如情书，或者艺术性的东西，比如诗歌或文学小说——但肯定不适用于像工作邮件这样的实用主义作品，或者像推文这样的琐事。但正如我们所看到的，每一篇写作都有其人类目的和人类结果。如果我们调用了ChatGPT的内容并决定它将行得通，我们隐含地接受目的和结果对我们来说并不特别重要——也就是说，我们不在乎我们的写作是否实现了其目的，或者我们甚至可能没有任何目的。无论哪种情况，它都提出了这样一个问题：这种写作尝试是否值得我们投入，或者我们的时间是否应该花在其他地方。
- en: It's also worth reflecting on the experience of the poor, tired reader, who
    is so cruelly neglected by thousands of writers each and every day. How will your
    reader feel on receiving and reading this text that you got from ChatGPT? Will
    they feel valued and appreciated? Will they sense that the writer respects their
    time and attention, attends to their needs or prioritises their pleasure? Will
    they feel involved in a meaningful interaction that serves a human purpose? Or
    will they feel insulted, disregarded and degraded, having been forced into a one-sided
    relationship with a machine against their will?
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 值得反思的是，那些疲惫的读者，他们每天都被成千上万的作家无情地忽视。当你从ChatGPT那里收到并阅读这段文本时，你的读者会感到被重视和欣赏吗？他们会感觉到作者尊重他们的时间和注意力，关注他们的需求或优先考虑他们的愉悦吗？他们会觉得自己参与了有意义的互动，服务于人类的目的吗？或者他们会感到被侮辱、被忽视和贬低，被迫在不情愿的情况下与机器建立单方面的关系？
- en: ChatGPT can’t be your coworker
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不能成为你的同事
- en: But what about writers for hire, like ghostwriters and copywriters? Don’t they
    write in someone else’s voice, or the established voice of a brand? And don’t
    their clients buy in third-party content to pass off as their own?
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于那些受雇的作家，如代笔作家和文案作家呢？他们难道不是在用别人的声音，或者品牌的既定声音写作吗？难道他们的客户不是购买第三方内容来冒充自己的吗？
- en: 'In a way, yes. But the relationship involved is very different. Professional
    writers collaborate with their clients by discussing the project, developing the
    brief, agreeing a plan, creating iterative drafts and working through corrections
    and revisions. Through this two-way process, they get to know each other’s personality
    and working approach, building deep understanding and trust. Specifically, the
    writer gradually gets to know their client’s individual voice, until they can
    write something that the client almost recognises as their own. They also learn
    when and how to push back against the client: to challenge aspects of the brief
    when they believe the client’s direction is wrong or stand their ground when asked
    to change something they believe is fine as it is. In a way, client and writer
    meld their experiences and personalities together to form a single, unified writing
    mind. And that’s a world away from simply giving instructions to a machine.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，是的。但涉及的关系非常不同。专业作家通过与客户讨论项目、制定大纲、同意计划、创建迭代草稿以及处理修改和修订来与客户合作。通过这个双向过程，他们了解彼此的个性和工作方法，建立深入的理解和信任。具体来说，作家逐渐了解客户的个人声音，直到他们能够写出客户几乎能认出是自己的东西。他们还学会了何时以及如何向客户提出反对意见：当他们认为客户的方向错误时，挑战大纲的某些方面；当被要求改变他们认为已经足够好的东西时，坚守立场。在某种程度上，客户和作家将他们的经验和个性融合在一起，形成一个单一的、统一的写作思维。这与仅仅向机器下达指令相去甚远。
- en: Most creatives need collaborators. Bands need record producers, novelists need
    editors, journalists need subeditors and copywriters need creative directors.
    When you work on something alone, it’s easy to lose perspective. A second pair
    of eyes and a little thoughtful feedback can help to get your project back on
    track.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数创意人士需要合作者。乐队需要唱片制作人，小说家需要编辑，记者需要副编辑和文案需要创意总监。当你独自工作时，很容易失去视角。一双第二只眼睛和一点深思熟虑的反馈可以帮助你的项目回到正轨。
- en: Despite this, however, many writers do end up working alone, purely out of necessity.
    Maybe your boss asked for a report by the end of the day, and no-one else has
    the time or knowledge to help out. Maybe you’re writing a novel, and you can’t
    afford to ask an editor to help you with the text. And in one sense, the individual
    writer always ends up alone with their work sooner or later, because they have
    to sit down at a desk and get the words out of their brain, one by one.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管如此，许多作家最终不得不独自工作，纯粹是出于必要性。也许你的老板要求你在当天结束时提交一份报告，没有人有时间和知识来帮助你。也许你正在写一部小说，你负担不起请编辑帮助你修改文本。从某种意义上说，单个作家迟早会独自面对他们的工作，因为他们必须坐在桌前，一个接一个地将想法从大脑中提取出来。
- en: ChatGPT seems to offer a way out of this predicament. Even if you’re working
    alone at your desk, it’s always there on your screen, ready to help out, like
    an omniscient, never-tiring colleague who never says no or answers back. ChatGPT
    finally delivers on the ambitious promise of Ask Jeeves, the search engine launched
    in 1996 that claimed to offer answers to any question you could ask. Jeeves himself
    – a cartoon valet straight out of P.G. Wodehouse – embodied the notion of a faithful
    servant, working for you alone, who instinctively understood your needs and lived
    only to meet them.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT似乎提供了一种摆脱这种困境的方法。即使你独自一人在办公桌前工作，它也始终出现在你的屏幕上，随时准备帮助，就像一个无所不知、永不疲倦的同事，从不拒绝或回应。ChatGPT最终实现了Ask
    Jeeves的雄心壮志，Ask Jeeves是1996年推出的一种搜索引擎，声称可以回答你提出的任何问题。Jeeves本人——一个来自P.G. Wodehouse的卡通门房——体现了忠诚仆人的概念，只为一个人工作，本能地理解你的需求，只为满足这些需求而活着。
- en: Sam Altman himself has described his vision for the future of AI as a ‘super-competent
    colleague that knows absolutely everything about my whole life, every email, every
    conversation I’ve ever had, but doesn’t feel like an extension’.[31](#cER.xhtml#aNM)
    And while most of us would hesitate to share everything about our lives with a
    colleague, at least the promise of ‘super-competence’ offers some compensation.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: Sam Altman本人曾描述他对AI未来的愿景，即一个“超级能干的同事，他知道我生活的方方面面，包括每一封电子邮件、每一次对话，但又不觉得像是一个延伸”。[31](#cER.xhtml#aNM)
    尽管如此，我们中的大多数人可能会犹豫是否与同事分享我们生活的方方面面，但“超级能干”的承诺至少提供了一些补偿。
- en: ChatGPT has two features that make us more likely to trust it as a ‘colleague’.
    First, it’s phenomenologically transparent. That means that we quickly and intuitively
    learn to use it as a tool, just as we learn to use everyday utensils like spoons
    and scissors. Once you’ve got the hang of ChatGPT’s simple chatbot interface,
    you no longer have to think consciously about how to operate it – you just say
    what you want, and the software does it. And as the conversation flows, you also
    experience epistemological transparency, which means you understand ChatGPT’s
    answers and generally believe them to be true. The resulting interactional flow
    helps to cultivate trust – at least until it’s dispelled by a weird or unexpected
    response.[32](#cER.xhtml#aM7) However, this trust is inherently one-sided, because
    while ChatGPT users make themselves vulnerable to the AI’s mistakes, the AI itself
    remains untouchable behind the screen.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT有两个特性使其更可能被我们视为“同事”。首先，它是现象学上透明的。这意味着我们可以快速而直观地学会将其作为工具使用，就像我们学会使用日常用品如勺子和剪刀一样。一旦你掌握了ChatGPT简单的聊天机器人界面，你就不必再有意识地思考如何操作它——你只需说出你想要的内容，软件就会完成。随着对话的进行，你也会体验到认识论上的透明度，这意味着你理解ChatGPT的回答，并且通常相信它们是真实的。这种互动流程有助于培养信任——至少直到它被奇怪或意外的回应所打破。[32](#cER.xhtml#aM7)
    然而，这种信任本质上是单方面的，因为尽管ChatGPT用户使自己容易受到AI错误的伤害，但AI本身在屏幕背后是不可触及的。
- en: If you really have no-one else to turn to, editorial feedback from ChatGPT is
    probably better than nothing. But as we’ve seen, writing is a fundamentally social
    process that links humans with humans – and the most valuable writing feedback
    reflects this. ChatGPT can help with low-level, technical issues like spelling,
    grammar and the choice of individual words. However, it can never do what a human
    copyeditor can do, which for fiction is ‘to read the book as its target audience
    will read it,’ as editor Elyse Lyon puts it.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你真的没有人可以求助，ChatGPT提供的编辑反馈可能比没有好。但正如我们所看到的，写作是一个本质上社会化的过程，将人与人联系起来——最有价值的写作反馈反映了这一点。ChatGPT可以帮助解决低级的技术问题，如拼写、语法和个别词汇的选择。然而，它永远无法做到人类校对员所能做到的事情，正如编辑Elyse
    Lyon所说，对于小说来说，就是“像目标读者一样阅读书籍”。
- en: 'Playing the role of a human fiction reader means taking account of a host of
    potential issues: ambiguity, contradiction, inconsistent tone, cultural sensitivity
    and the all-important rhythm of prose. It means ensuring that characters have
    stable traits and speak and act consistently – or, if they change over the course
    of the story, that they do so in an organic and believable way. It also covers
    little details that aren’t wrong as such but still break the spell of the book,
    like a character suddenly lighting a cigarette halfway through chapter 6, then
    never smoking again for the rest of the book.[33](#cER.xhtml#aMK)'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 扮演人类小说读者的角色意味着要考虑到一系列潜在的问题：歧义、矛盾、不一致的语气、文化敏感性和散文的重要节奏。这意味着要确保人物具有稳定的性格特征，并且言行一致——或者，如果他们在故事过程中发生变化，那么他们以有机和可信的方式进行变化。这也包括一些小细节，虽然它们本身并没有错，但仍然会破坏书籍的魔幻感，比如一个人物在第6章中突然点燃香烟，然后在接下来的书中再也没有吸烟。[33](#cER.xhtml#aMK)
- en: When I edit papers for academics whose first language is not English, I often
    tweak sentences that are technically correct but still slightly unclear – which
    is a big problem in a context where precision is paramount. I’ll also aim to pick
    up inconsistencies in the argument, potentially spanning several thousand words
    (for example, ‘on page 3 you said X, but on page 18 you say Y’). In my experience,
    when ChatGPT is asked to simplify or summarise a text, it will often introduce
    weaknesses like this, because it only understands language at a surface level
    and has no grasp of the deep structural meaning within the text.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 当我为那些母语不是英语的学者编辑论文时，我经常调整那些技术上正确但仍然稍微不清楚的句子——这在精确性至关重要的环境中是一个大问题。我还会努力捕捉到论点中的不一致性，这些不一致性可能跨越数千字（例如，“在第3页你说X，但在第18页你说Y”）。根据我的经验，当ChatGPT被要求简化或总结文本时，它通常会引入这种弱点，因为它只理解语言表面层次，而没有把握文本中的深层结构意义。
- en: 'Also, as we saw earlier, the processes of thinking, writing and editing overlap,
    and the boundaries between them aren’t always so clear. It’s not unusual to edit
    as you write, or go over the same paragraph again and again, or decide that this
    part needs to go there, or even that it would be easier to start all over again.
    These are all aspects of the ‘labour of articulation’ we saw earlier: working
    and reworking the clay, taking as long as it takes, until your thoughts and words
    finally correspond. But with ChatGPT, all you have is the blunt instrument of
    the command to edit or rewrite everything in one go. That puts distance between
    you and your writing, as you focus on the mediating tool of the prompt rather
    than the text itself. Instead of loftily instructing the gardener how to follow
    your plan, you should be out there with your own hands in the soil.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，正如我们之前看到的，思考和写作以及编辑的过程是重叠的，它们之间的界限并不总是那么清晰。在写作时编辑，或者一遍又一遍地重复同一段话，或者决定这部分需要放在那里，甚至认为从头开始会更简单，这些都是我们之前看到的“表达劳动”的方面：工作并重新塑造粘土，花尽可能多的时间，直到你的思想和文字最终相符。但与ChatGPT相比，你拥有的只是编辑或一次性重写一切的命令这一钝工具。这让你与你的写作产生了距离，因为你专注于提示的中介工具而不是文本本身。与其高高在上地指导园丁如何遵循你的计划，不如亲自下到土壤中去。
- en: ChatGPT has no empathy
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT缺乏同理心
- en: 'In Star Trek: The Next Generation, the android Data has a Pinocchio-like ambition
    to feel the emotions that are excluded from his programming, which he attempts
    to do through artistic pursuits such as poetry and music.[34](#cER.xhtml#aUP)
    But while Data can nail a technically flawless imitation of a great violinist,
    his performance still lacks soul. He can’t learn artistic self-expression because
    he has nothing to express. In fact, despite repeated attempts to reach the answer
    through rational analysis, he doesn’t understand what artistic expression even
    is.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在《星际迷航：下一代》中，机器人Data有着像匹诺曹一样的抱负，想要感受他编程中排除的情感，他试图通过诗歌和音乐等艺术追求来实现这一点。[34](#cER.xhtml#aUP)
    但尽管Data能够完美地模仿一位伟大的小提琴家，但他的表演仍然缺乏灵魂。他无法学习艺术表达，因为他没有什么可以表达的。事实上，尽管他通过理性分析反复尝试寻找答案，但他甚至不明白艺术表达究竟是什么。
- en: As a writer, you want to get ideas, information, stories or emotions out of
    your own head and into your reader’s. And a big part of this is understanding,
    as far as possible, what is going on for your reader now. If you want to teach,
    you need to know what they already know. If you want to persuade them to act,
    you need to know why they do what they do, and why they might resist your suggestion.
    If you want them to accept a new idea, you need to know what they currently think,
    and why. And if you want to change how they feel, you need to know how they’re
    most likely feeling now. The human purpose of your writing will only be achieved
    when your reader responds to your writing in the way you want.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作家，你希望将想法、信息、故事或情感从自己的头脑中提取出来，传递给你的读者。而这其中的一个重要部分是尽可能理解你的读者现在正在经历什么。如果你想教学，你需要知道他们已经知道什么。如果你想说服他们采取行动，你需要知道他们为什么这样做，以及他们为什么可能抵制你的建议。如果你想让他们接受一个新想法，你需要知道他们目前认为什么，以及为什么。如果你想改变他们的感受，你需要知道他们现在最有可能有什么感受。你的写作的人类目的只有在你的读者以你希望的方式对你的写作做出反应时才能实现。
- en: 'Copywriter Eddie Shleyner carried out an experiment where he went head-to-head
    with an AI writing tool.[35](#cER.xhtml#aMZ) First, he entered this prompt:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 写作人Eddie Shleyner进行了一项实验，他与一个AI写作工具进行了面对面的较量。[35](#cER.xhtml#aMZ) 首先，他输入了以下提示：
- en: Can you describe meeting your firstborn child?
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你能描述一下遇见你的第一个孩子吗？
- en: 'Here’s what the AI wrote in response:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这是AI做出的回应：
- en: Meeting my firstborn child was a truly magical experience. It was a moment of
    joy and excitement that I will never forget. When I held my newborn for the first
    time, I felt a wave of love and warmth that I had not experienced before. I was
    filled with so much joy and pride that I was now a parent. My little one looked
    so peaceful and content in my arms. Seeing my baby for the first time was an unforgettable
    moment that I will cherish forever.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 遇见我的第一个孩子是一次真正神奇的经历。那是一个我永远不会忘记的喜悦和兴奋的时刻。当我第一次抱起我的新生儿时，我感受到了一股前所未有的爱和温暖。我充满了如此多的喜悦和自豪，因为我现在是一个父亲了。我的小宝贝在我的怀里看起来如此平和而满足。第一次看到我的宝宝是一个难忘的时刻，我将永远珍惜。
- en: 'Now here’s Eddie’s version:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是Eddie的版本：
- en: “He’s so quiet,” I said, looking up at the nurse.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: “他太安静了，”我说，抬头看着护士。
- en: She smiled behind her mask. We all wore masks. Gowns, too. Gloves and hairnets,
    too.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 她在面具后微笑。我们都戴着面具。长袍，手套和头套，也都戴着。
- en: “Is that ok?” I said. “Is it ok he’s not crying?”
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: “这样好吗？”我说。“他没哭，这样好吗？”
- en: (I thought healthy newborns cried.)
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: （我以为健康的新生儿都会哭。）
- en: “It’s ok,” said the nurse, “he’s quiet but alert,” she said. “Just look at him
    looking at you.” I looked. “He’s looking right at you.” He was. He was looking
    in my eyes. “He’s saying hello,” she smiled.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: “没关系，”护士说，“他安静但警觉，”她说。“只需看看他看你。”我看了。“他正看着你。”他确实在看着我。“他是在和你打招呼，”她微笑着。
- en: “Hello,” I said. I felt like crying. “Hello, son.”
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: “你好，”我说。我感觉要哭了。“你好，儿子。”
- en: You hardly need me to point out the difference in quality. But let’s break down
    a few of the most important contrasts on a technical level.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你几乎不需要我指出质量上的差异。但让我们从技术层面上分析一些最重要的对比。
- en: First, the AI sounds like it’s speaking from notes – trying to guess what a
    person would say about this experience. There’s no sense of someone reliving a
    memory. But Eddie is clearly speaking from the heart, describing an experience
    he has actually lived through.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，AI听起来像是在照着笔记说话——试图猜测一个人会如何评价这种体验。没有人在回忆记忆的感觉。但爱迪显然是在用心说话，描述他真正经历过的体验。
- en: The AI is weirdly insular, dwelling on its own ‘feelings’ and sounding pretty
    much alone. But few of our emotions are completely solitary; we experience them
    through others. Reflecting this, Eddie’s account records a shared moment of connection
    between himself, his son and the nurse. His story comes alive through the dance
    between his own doubts, the kindness of the nurse and the curiosity of his newborn
    son. And while the AI bluntly states its feelings with cast-iron certainty, Eddie’s
    memory is marked by the trepidation of experiencing something new.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: AI奇怪地自我封闭，专注于自己的“感受”，听起来几乎孤独一人。但我们的情感很少是完全孤立的；我们通过他人来体验它们。反映这一点，爱迪的叙述记录了他、他的儿子和护士之间的一个共享的连接时刻。他的故事通过他自己的怀疑、护士的善意和他新生儿的求知欲之间的舞蹈而生动起来。而尽管AI以铁定的确定性直接表达其感受，但爱迪的记忆却标记着体验新事物时的紧张。
- en: Look at the physical details Eddie mentions, like the masks and gowns. Big events
    are often evoked by little details, because at the time, there’s just too much
    to take in. Later on, sensory cues like the sound of a piano or the smell of cut
    grass can transport us back to an earlier time. The only sensory detail the AI
    can muster is a single mention of ‘arms’.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 看看爱迪提到的物理细节，比如面具和长袍。大事件往往是通过小细节唤起的，因为在当时，有太多东西需要吸收。后来，像钢琴声或割草的气味这样的感官线索可以带我们回到更早的时间。AI能提供的唯一感官细节就是提到“手臂”。
- en: With its cheesy ‘magical’ and ‘unforgettable’, the AI ends up sounding like
    a Hallmark card or a holiday brochure. It’s doing its best to convey a ‘big’ emotion
    – but such words are labels that we stick on our most significant memories after
    the event. At the time, it’s all too much; our hearts overflow, and there are
    no words. Rather than self-consciously thinking ‘this is magical’; we’re wordlessly
    caught up in the magic.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: AI用其陈词滥调的“神奇”和“难忘”，听起来像是一张贺卡或假日手册。它尽力传达一种“强烈”的情感——但这些词汇是我们事后贴在我们最珍贵的记忆上的标签。当时，一切都太过强烈；我们的心充满了，没有言语。我们不是有意识地想“这是神奇的”，而是在无声中被魔法所吸引。
- en: On the level of writing craft, the AI demonstrates its tin ear for language
    by bashing out a succession of five boxy declarative sentences, all of similar
    length, with almost no thread linking them together. There’s no energy, no narrative,
    no pace or flow. In Eddie’s version, prose rhythm, sentence structure, sensory
    detail and the patterns of everyday speech come together to form a story so vivid
    that we feel like we’re right there in the hospital ourselves. Even if you haven’t
    had this experience yourself, your memories, knowledge and relationships still
    give you some sense of how it must feel. Eddie calls this technique creating a
    ‘mind movie’ for the reader.[36](#cER.xhtml#aPG)
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在写作技巧层面，AI通过连续发出一系列五个方框式的陈述句，这些句子长度相似，几乎没有任何线索将它们串联起来，展示了其对语言的迟钝。没有能量，没有叙事，没有节奏或流畅感。在爱迪的版本中，散文节奏、句子结构、感官细节和日常对话的模式结合在一起，形成了一个如此生动的故事，我们感觉就像自己真的在医院里一样。即使你自己没有经历过这种体验，你的记忆、知识和关系仍然能给你一些关于这种感觉的线索。爱迪称这种技巧为为读者创造一个“心灵电影”.[36](#cER.xhtml#aPG)
- en: Writers say, ‘Show, don’t tell.’ If you can show your reader what’s going on,
    there’s no need to explain every last detail. If you can artfully describe what
    people do and say, there’s no need to proclaim their emotions like a mind-reader.
    The AI’s writing is far too ‘on the nose’ – direct, obvious, literal. While it’s
    at pains to insist that it will never forget that first look, Eddie knows that
    some things go without saying. The best writers leave dots for us to join, making
    us active partners in the creation of meaning. As Arthur Koestler said, ‘The artist
    rules his subjects by turning them into accomplices.’[37](#cER.xhtml#aT1)
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 作家们说：“展示，而不是告诉。”如果你能向读者展示正在发生的事情，就没有必要解释每一个细节。如果你能巧妙地描述人们的所作所为和所说的话，就没有必要像占卜师一样宣扬他们的情感。ChatGPT的写作过于“直白”——直接、明显、字面。尽管它努力坚持说它永远不会忘记第一次的观察，但Eddie知道有些事情是不言而喻的。最好的作家留下空白供我们填补，使我们成为意义的创造中的积极参与者。正如亚瑟·科斯特勒所说：“艺术家通过将他的主题变成同谋来统治他们。”[37](#cER.xhtml#aT1)
- en: Maybe you can’t write as well as Eddie. (I know I can’t.) If you wrote something
    like this, it might not be so lively and engaging. If you couldn’t find the right
    word or phrase, you might fall back on something you once read or heard somewhere
    else. But wherever your words come from, the point is that they’re still yours.
    You choose them because they express something significant to you. And that’s
    a world away from ordering up a slab of text from a digital vending machine and
    presenting it as your own.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你写不出像Eddie那样好的文章。（我知道我写不出。）如果你写的东西像这样，可能就不会那么生动和吸引人。如果你找不到合适的词或短语，你可能就会退而求其次，使用你曾经读到或听到的某个地方的内容。但无论你的话从哪里来，重点是它们仍然是你的。你选择它们是因为它们表达了你认为重要的东西。而这与从数字自动售货机订购一大块文字并将其作为你自己的作品相去甚远。
- en: While originality and technical competence might be nice to have, they are not
    the main point. Nor are they sufficient in themselves; no amount of style will
    make up for a lack of substance. When we read an account of a human experience,
    we want to feel that it has come from a human heart.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然原创性和技术能力可能很吸引人，但它们并不是重点。它们本身也不够充分；任何风格都无法弥补内容的缺失。当我们阅读关于人类经历的故事时，我们希望感受到它来自一颗人类的心。
- en: However, empathy matters in factual, informational content too. Say you’re writing
    a how-to guide or a sales report. What are your readers’ priorities and concerns?
    What are they thinking and feeling when they come to this subject for the first
    time? What preconceptions might they have that would make it harder for them to
    understand your message? What objections might make them reluctant to accept it?
    It’s only when we get right down to the level of ultra-precise, codified language,
    like the text of a legal contract, that empathy plays no part at all. (And even
    here, you could argue that it should.)
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，同理心在事实性、信息性内容中也同样重要。比如说你正在写一个指南或销售报告。你的读者的优先事项和担忧是什么？当他们第一次接触到这个主题时，他们在想什么，感受什么？他们可能有什么先入为主的观念，这会使他们更难理解你的信息？可能有什么反对意见会使他们不愿意接受它？只有在达到极其精确、规范化的语言水平，如法律合同的文本时，同理心才完全不发挥作用。（即使在这里，你也可以争论它应该发挥作用。）
- en: All writing is driven by purpose, and all purpose is coloured by emotion. The
    writing that makes a connection, that is longest remembered and best loved, always
    has human emotion at its heart. Because the outcome of writing depends on what
    the reader thinks and feels – not just what the writer says.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 所有写作都是由目的驱动的，而所有目的都带有情感色彩。那些能够建立联系、最长久被记住和最被喜爱的写作，总是以人类的情感为核心。因为写作的结果取决于读者的想法和感受——而不仅仅是作者说的话。
- en: ChatGPT can’t teach you to write
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不能教你写作
- en: So ChatGPT can’t write for you – but could you still improve your skills by
    emulating it? After all, the model was trained on the content of the internet,
    which includes many great works of literature. So if ChatGPT’s output represents
    ‘good’ writing, could you improve your writing skills by carefully reading, analysing
    and copying what it does?
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 所以ChatGPT不能为你写作——但你能否通过模仿它来提高你的技能？毕竟，这个模型是在互联网内容上训练的，其中包括许多伟大的文学作品。所以如果ChatGPT的输出代表“好的”写作，你能否通过仔细阅读、分析和复制它的做法来提高你的写作技能？
- en: There’s no doubt that writers need to be readers. By reading widely, you absorb
    useful words, expressions, structures and techniques – not to mention stories
    and ideas that spark off new connections in your mind. But I believe that these
    lessons will only crystallise when you actually put pen to paper and use them
    for yourself. The best way to improve your writing is to read, write and repeat.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，作家需要成为读者。通过广泛阅读，你吸收了有用的词汇、表达、结构和技巧——更不用说激发你心中新联系的故事和想法了。但我相信，这些教训只有在你真正动笔并亲自使用它们时才会结晶。提高写作的最佳方式是阅读、写作并重复。
- en: From this perspective, it’s clear that ChatGPT actively prevents you from learning
    about writing, by discouraging you from practising the craft yourself. Every day
    you outsource your writing to ChatGPT is a lost day of learning how to write.
    Just as an e-bike stops you acquiring the strength to pedal up hills, so ChatGPT
    stops you surmounting the writing challenges that you face.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个角度来看，很明显，ChatGPT通过阻止你亲自练习写作来积极地阻止你学习写作。你每天将写作外包给ChatGPT，就是失去了一天学习如何写作的机会。就像电动自行车阻止你获得爬坡的力气一样，ChatGPT阻止你克服你面临的写作挑战。
- en: At best, you might become so frustrated with the AI’s limitations that you swat
    it aside and write the text yourself – or at least rewrite the text that it creates.
    But at worst, you’ll lose faith in your own ability to write, or become so anxious
    about it that you end up completely reliant on ChatGPT. That’s not convenience
    or progress; it’s being gaslit and manipulated by tech firms who have a financial
    interest in making you psychologically dependent on their product.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的情况是，你可能会因为对AI局限性的挫败感而将其抛开，自己动手写文本——或者至少重写它所创造的文本。但最坏的情况是，你可能会失去对自己写作能力的信心，或者因为焦虑而完全依赖ChatGPT。这并不是便利或进步；这是被科技公司操纵，这些公司有经济利益让你心理上依赖他们的产品。
- en: In this sense, technology that claims to ‘empower’ us actually robs us of our
    power, because it puts up a barrier between our abilities and the world. Instead
    of teaching us something new, it contrives to make us unlearn what we already
    know, until we have no choice but to turn to the machine.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个意义上，那些声称“赋权”我们的技术实际上剥夺了我们的力量，因为它在我们能力和世界之间设置了障碍。它不是教我们新东西，而是设法让我们忘记我们已经知道的东西，直到我们别无选择，只能转向机器。
- en: ChatGPT can help some people
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助一些人
- en: Before we go any further, let’s pause to address an important objection. You
    could argue that this anti-ChatGPT stance is inherently ableist, because it assumes
    that everyone can write if they want to. But of course, not everyone can. So we
    should certainly make an exception for those people who genuinely cannot write
    to the technical standard that they want to, or need to. They might include people
    with a physical or mental disability, a disorder such as autism, or a learning
    difficulty such as dyslexia, as well as those who haven’t been able to develop
    strong literacy skills because of their life history or personal circumstances,
    or whose first language is not English. For these people, a tool like ChatGPT
    might provide access to services or opportunities that would otherwise be out
    of reach, in the same way as a wheelchair provides access to mobility. And even
    if someone will go on to learn to write well later on, ChatGPT might still provide
    a valuable stopgap in the meantime.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续之前，让我们暂停一下，解决一个重要的反对意见。你可以辩称，这种反ChatGPT的立场本质上是有能力主义的，因为它假设如果人们愿意，每个人都可以写作。但当然，并不是每个人都可以。因此，我们应该当然为那些真正无法达到他们想要或需要的写作技术标准的人做出例外。这些人可能包括有身体或精神残疾的人，有如自闭症这样的疾病，或者有如阅读障碍这样的学习困难的人，以及那些由于他们的生活经历或个人情况而没有能够发展出强大的读写技能的人，或者他们的母语不是英语的人。对于这些人来说，像ChatGPT这样的工具可能提供他们原本无法触及的服务或机会，就像轮椅提供行动能力一样。即使有人将来会学会很好地写作，ChatGPT在同时可能仍然是一个有价值的临时解决方案。
- en: Turning the question round, perhaps we should ask why we, as readers, place
    so much value on technical accuracy over clarity or sincerity. Maybe we should
    be more tolerant of those who have different writing skills from our own and focus
    on their message rather than the skill with which it’s expressed. It would be
    a shame if people resorted to using ChatGPT because they felt their own writing
    wasn’t good enough.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 反过来思考，也许我们应该问为什么我们作为读者，如此重视技术准确性而忽略了清晰度或真诚度。也许我们应该对那些写作技能与我们不同的人更加宽容，关注他们的信息而不是表达技巧。如果人们因为觉得自己写作不够好而求助于ChatGPT，那将是一件遗憾的事情。
- en: 'This brings us to another double-edged benefit of ChatGPT. While it might help
    people follow the rules of language, it might also perpetuate writing snobbery
    by raising expectations of linguistic accuracy across the board. ‘Grammar nazis’
    are enough of a problem as it is, and they’re only going to get worse now they
    have a robotic inquisitor to interrogate everyone else’s text on their behalf.
    To avoid going down this road, we should keep in mind what writing is really about:
    not following and enforcing rules, but communicating facts and feelings.'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我们想到了ChatGPT的另一个双刃剑好处。虽然它可能帮助人们遵循语言规则，但它也可能通过提高对语言准确性的整体期望而延续写作的势利。‘语法纳粹’本身就是一个问题，而现在他们有了机器人调查员来代表他们质问每个人的文本，问题只会变得更糟。为了避免走这条路，我们应该记住写作真正是什么：不是遵循和执行规则，而是传达事实和情感。
- en: ChatGPT makes everyone the same
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT让每个人都变得一样
- en: Since ChatGPT can write pretty much anything you ask it to, it’s been eagerly
    taken up by practically everyone who needs to generate text, from schoolkids writing
    essays to consultants preparing presentations for their clients.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT几乎可以写任何你要求它写的东西，因此它被几乎所有需要生成文本的人所热烈接受，从写论文的学生到为客户准备演示文稿的顾问。
- en: 'This has severely undermined the utility of writing as a means to gauge someone’s
    ability. For example, employers have traditionally used the standard of a CV as
    a proxy to assess job applicants: the slicker the CV, the stronger the candidate.
    But now ChatGPT can whip up an accurate, well-structured resumé in seconds – and
    tailor it to the employer and their industry for good measure.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这严重削弱了写作作为衡量一个人能力手段的效用。例如，雇主传统上使用简历的标准作为评估求职者的代理：简历越光鲜，候选人就越强。但现在ChatGPT可以在几秒钟内制作出准确、结构良好的简历——并且为了公正起见，还会根据雇主及其行业进行定制。
- en: In the classroom, teachers must now contend with student essays created with
    ChatGPT, which anti-plagiarism software such as Turnitin is increasingly powerless
    to detect. That makes it harder for educators to gauge academic progress – at
    least, using their traditional tools. Since we can’t put the genie back into the
    bottle, educators will have to adapt their own methods of teaching and examination
    to a post-ChatGPT world.[38](#cER.xhtml#aMU)
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在课堂上，教师现在必须应对学生使用ChatGPT创作的论文，而像Turnitin这样的反抄袭软件越来越难以检测到。这使得教育工作者更难评估学术进步——至少，使用他们传统的工具是这样的。既然我们无法将魔瓶中的精灵放回瓶中，教育工作者将不得不调整自己的教学和考试方法，以适应后ChatGPT时代。[38](#cER.xhtml#aMU)
- en: Some welcome the ‘death of homework’, arguing that it was never anything more
    than pointless busywork anyway – rather like using log tables before the invention
    of pocket calculators.[39](#cER.xhtml#aPB) However, a reliance on machine writing
    ultimately ends up hindering students themselves, because they never develop the
    skills in comprehension, reasoning, decision-making or analysis that their essays
    were intended to assess. While ChatGPT may get them through the early stages of
    a course, in the end they’ll be found out or fall behind.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 一些人对“作业的终结”表示欢迎，认为它从来就只是无意义的忙碌——就像在发明袖珍计算器之前使用对数表一样。[39](#cER.xhtml#aPB] 然而，对机器写作的依赖最终会阻碍学生自身的发展，因为他们从未培养出理解、推理、决策或分析等技能，而这些技能正是他们的论文旨在评估的。虽然ChatGPT可能帮助他们通过课程的早期阶段，但最终他们会被发现或落后。
- en: 'What’s the overall effect on performance if everyone uses ChatGPT? One study
    of creativity looked at what happened when two sets of people were asked to write
    stories, one with help from a generative AI platform and the other without.[40](#cER.xhtml#aU4)
    The researchers found that the AI had a general levelling effect on quality: while
    it helped the less-skilled writers to achieve a moderate level of creativity,
    it was less beneficial to those who were already quite creative. Moreover, AI
    tended to reduce originality: the AI-driven stories were more similar to each
    other than those written by humans alone.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 如果每个人都使用ChatGPT，对表现的整体影响是什么？一项关于创造力的研究观察了当两组人被要求写故事时发生了什么，一组在生成式AI平台的帮助下，另一组没有。[40](#cER.xhtml#aU4)
    研究人员发现，AI对质量产生了普遍的均等化影响：它帮助不太熟练的作家达到一定的创造力水平，但对那些已经相当有创造力的人来说，效果较小。此外，AI倾向于减少原创性：由AI驱动的故事比仅由人类编写的更相似。
- en: In my view, the lesson here is that while ChatGPT may bring you up to an average
    level of quality, only you can go beyond that level to something really great.
    And if you want to stand out from the crowd, you’re better off tuning into your
    own unique imagination than the crowdsourced content of a machine.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，这里的教训是，虽然ChatGPT可能将你提升到平均质量水平，但只有你自己才能超越这个水平，达到真正卓越的境界。而且，如果你想脱颖而出，你最好关注你自己的独特想象力，而不是机器的众包内容。
- en: ChatGPT gets things wrong
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT犯错误
- en: If you live in northern Europe, you probably know that the first person to cross
    the English Channel completely on foot was Christof Wandratsch of Germany, who
    made his historic crossing in 14 hours and 51 minutes on August 14, 2020\. And
    while U.S. readers may be aware when the Golden Gate Bridge was first transported
    across Egypt, they may not know that the second occasion was in October 2016.[41](#cER.xhtml#aSD)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你住在北欧，你可能知道第一个完全徒步穿越英吉利海峡的人是德国的克里斯托夫·万德拉茨，他在2020年8月14日用了14小时51分钟完成了这一历史性的穿越。而尽管美国读者可能知道金门大桥首次被运往埃及的时间，但他们可能不知道第二次是在2016年10月。[41](#cER.xhtml#aSD)
- en: Of course, no-one could really know either of these things, because they’re
    utterly false ‘hallucinations’ dreamt up by ChatGPT. Hallucinations happen when
    an LLM ‘perceives patterns or objects that are non-existent or imperceptible to
    human observers, creating outputs that are nonsensical or altogether inaccurate’.[42](#cER.xhtml#aTY)
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，没有人真正知道这两件事，因为它们是ChatGPT幻想出的完全虚假的‘幻觉’。当LLM‘感知到人类观察者不存在或无法感知的模式或对象，创造出无意义或完全不准确的结果’时，就会发生幻觉。[42](#cER.xhtml#aTY)
- en: ChatGPT can only know what was covered in its original training dataset, so
    it inevitably knows more about some areas than others. If there were errors in
    the dataset, there could be errors in its output too. So it’s hardly surprising
    that ChatGPT sometimes gets things wrong.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT只能知道其原始训练数据集中涵盖的内容，因此它不可避免地对其中的某些领域了解得更多，而对其他领域了解得较少。如果数据集中存在错误，其输出也可能出现错误。因此，ChatGPT有时会犯错误并不令人惊讶。
- en: In the years since ChatGPT was launched, academics have probed its accuracy
    – and the results aren’t great. For example, a recent study at Purdue University
    found that when ChatGPT was given questions on computer programming, it gave wrong
    answers 52 percent of the time. But programmers, given a choice, still opted for
    ChatGPT’s answers 39 percent of the time – and 77 percent of those chosen answers
    were wrong.[43](#cER.xhtml#aJT) In the field of paediatric medicine, ChatGPT was
    tested on making diagnoses based on children’s case histories. It made the wrong
    call 83 percent of the time, apparently struggling to pick up relationships between
    conditions that an experienced doctor would spot.[44](#cER.xhtml#aJU)
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 自ChatGPT推出以来，学者们对其准确性进行了探究——结果并不理想。例如，最近在普渡大学的一项研究发现，当ChatGPT被问及计算机编程问题时，它有52%的时间给出了错误答案。但是，如果程序员可以选择，他们仍然有39%的时间选择了ChatGPT的答案——其中77%的选择答案是错误的。[43](#cER.xhtml#aJT)
    在儿科医学领域，ChatGPT被测试根据儿童的病历进行诊断。它有83%的时间做出了错误判断，显然难以捕捉到经验丰富的医生能够发现的条件之间的关系。[44](#cER.xhtml#aJU)
- en: 'Unfortunately, while AI output may be wrong, it still looks plausible enough
    to fool even experts. In recent years, scientific journals have been flooded with
    fake studies created with AI. Leading academic publisher Wiley was so badly hit
    that it had to shut down 19 journals and retract over 11,000 studies.[45](#cER.xhtml#aNC)
    These fake papers look so technical that few readers can understand them, but
    on closer inspection, they turn out to be ‘AI gobbledegook sandwiches’. One classic
    red flag is so-called ‘tortured phrases’: AI-generated non-synonyms designed to
    evade automated plagiarism detectors (like ‘bosom peril’ in place of ‘breast cancer’[46](#cER.xhtml#aND)).
    To bolster its argument, ChatGPT will even fabricate references for papers that
    don’t exist.[47](#cER.xhtml#aNE) While research fraud is obviously bad for the
    reputations of publishers and universities, it has real impacts outside the academy
    – for example, when fake papers purport to offer serious medical research.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，尽管AI的输出可能是错误的，但它看起来足够可信，甚至可以欺骗专家。近年来，科学期刊充斥着用AI创造的虚假研究。领先的学术出版商威利（Wiley）受到了严重影响，以至于不得不关闭19种期刊并撤回超过11,000项研究。[45](#cER.xhtml#aNC)
    这些虚假论文看起来如此技术化，以至于很少有读者能理解它们，但仔细检查后发现它们实际上是“AI胡言乱语三明治”。一个典型的红旗是所谓的“扭曲的短语”：AI生成的非同义词，旨在规避自动抄袭检测器（例如，用“胸脯危险”代替“乳腺癌”的[46](#cER.xhtml#aND)）。为了加强其论点，ChatGPT甚至会为不存在的论文伪造参考文献。[47](#cER.xhtml#aNE)
    虽然研究欺诈显然对出版商和大学的声誉有害，但它对学术界以外的实际影响也是真实的——例如，当虚假论文声称提供严肃的医疗研究时。
- en: Another problem is that ChatGPT doesn’t know whether its answers are right or
    wrong. One study found that when users challenged its responses, it immediately
    caved in and was unable to defend its beliefs, even when they were right.[48](#cER.xhtml#aSF)
    Conversely, when users try to correct ChatGPT’s wrong answers through follow-up
    prompts, it sometimes remains stuck in its initial error in an attempt to stay
    consistent.[49](#cER.xhtml#aSG), [50](#cER.xhtml#aSH) But on the plus side, at
    least it refuses to accept that mayonnaise is racist.[51](#cER.xhtml#aSJ)
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题在于ChatGPT不知道它的答案是对是错。一项研究发现，当用户对其回答提出质疑时，它会立即屈服，甚至无法为自己的信念辩护，即使它们是正确的。[48](#cER.xhtml#aSF)
    相反，当用户试图通过后续提示纠正ChatGPT的错误答案时，它有时会陷入最初的错误，试图保持一致性。[49](#cER.xhtml#aSG)，[50](#cER.xhtml#aSH)。但好处是，至少它拒绝接受蛋黄酱是种族主义者的说法。[51](#cER.xhtml#aSJ)
- en: ChatGPT can be biased too – because we ourselves are biased, and LLMs are trained
    on human output, so they reflect the biases that are ‘baked into’ the content
    it consumes. For example, early versions of image generator DALL-E 2 created images
    of white men by default, overly sexualised images of women and reinforced racial
    stereotypes.[52](#cER.xhtml#aKB) And while ChatGPT will insist to users that it
    has no political opinions or beliefs, one study found that it had a ‘pro-environmental,
    left-libertarian orientation’,[53](#cER.xhtml#aKC) while another found ‘significant
    and systematic political bias’ towards progressive parties around the world.[54](#cER.xhtml#aKD)
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT也可能存在偏见——因为我们自己是有偏见的，而大型语言模型（LLMs）是在人类输出上训练的，因此它们反映了内容中“嵌入”的偏见。例如，图像生成器DALL-E
    2的早期版本默认创建的是白人男性的图像，过度性化的女性图像，并强化了种族刻板印象。[52](#cER.xhtml#aKB) 虽然ChatGPT会向用户坚称它没有政治观点或信仰，但一项研究发现它具有“亲环境、左翼自由主义倾向”的[53](#cER.xhtml#aKC)，而另一项研究发现它对世界各地的进步政党存在“显著且系统性的政治偏见”的[54](#cER.xhtml#aKD)。
- en: Now, if you’re a lefty liberal like me, you might not see any problem with that.
    But technology platforms owned by corporations can be bought and sold, with profound
    implications for their content – as Elon Musk’s purchase and subsequent overhaul
    of Twitter (now X) vividly illustrates.[55](#cER.xhtml#aUA) If, in the future,
    the boot was on the other foot, and ChatGPT was quietly nudging all its users
    to the right, progressives might not feel quite so relaxed. And if we truly care
    about democracy and the integrity of elections, we should be opposed to any covert
    interference in people’s political beliefs.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你像我一样是个左翼自由主义者，你可能不会对此有任何问题。但是，由公司拥有的技术平台可以被买卖，这对它们的内容有着深远的影响——正如埃隆·马斯克对Twitter（现更名为X）的收购和随后的全面改革生动地说明了这一点。[55](#cER.xhtml#aUA)
    如果未来情况相反，ChatGPT悄悄地将所有用户推向右翼，进步主义者可能就不会那么轻松了。而且，如果我们真正关心民主和选举的完整性，我们应该反对任何对人们政治信念的隐蔽干预。
- en: Since ChatGPT presents itself as a machine for answering questions, we naturally
    assume that its answers will be true. Having grown accustomed to computers solving
    problems and managing tasks that we can’t do ourselves, we’ve been conditioned
    to see them as rational, inherently honest devices that were built to serve us.
    And given that the nature of interacting with ChatGPT encourages us to trust it,
    as we’ve seen, we’re unlikely to question what it says.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT将自己定位为一个问答机器，我们自然会假设它的答案将是真实的。我们已经习惯了电脑解决我们无法自己解决的问题和管理工作，因此我们被训练成将它们视为理性、本质上诚实的设备，它们被建造出来是为了为我们服务的。鉴于与ChatGPT互动的本质鼓励我们信任它，正如我们所看到的，我们不太可能质疑它所说的内容。
- en: It wouldn’t be so bad if ChatGPT was more self-aware about its limitations.
    But it presents its wrong answers with the same sublime confidence as the right
    ones. Its interface discreetly warns us, ‘ChatGPT can make mistakes. Check important
    info.’ But there are no clues to be found in the output itself; no telltale change
    in tone, syntax or structure to indicate that the AI might gone quietly fruitloop.
    So while downright nonsense is easy to spot, a human user who lacked contextual
    knowledge could easily miss a subtler mistake such as a historical date being
    out by a year or two.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT对自己的局限性有更多的自我意识，那情况就不会这么糟糕。但它用与正确答案相同的崇高自信来呈现其错误答案。它的界面会谨慎地提醒我们：“ChatGPT可能会犯错误。请检查重要信息。”但在输出本身中找不到任何线索；没有明显的语气、句法或结构上的变化来表明AI可能已经悄然陷入混乱。因此，虽然明显的胡言乱语很容易被发现，但缺乏上下文知识的人类用户可能会轻易错过一些更微妙的错误，比如历史日期差了一两年。
- en: A human who is unsure of themselves will hedge their bets with phrases like
    ‘I think’, ‘I believe’, ‘I may be wrong’ or ‘as far as I know’. But ChatGPT cheerfully
    ventures beyond the limits of its knowledge without any indication that it’s doing
    so. And if you ask it to write something, it doesn’t present its output as a first
    draft, or one approach to the brief, but as the finished product.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一个不确定自己的人会用诸如“我认为”、“我相信”、“我可能错了”或“据我所知”之类的短语来打赌。但ChatGPT却愉快地超越了其知识范围的限制，没有任何迹象表明它在这样做。如果你要求它写些东西，它不会将其输出作为初稿或对简报的一种方法，而是作为成品呈现。
- en: While we might be tempted to call ChatGPT a liar, it’s actually more like a
    bullshitter. In his famous book On Bullshit,[56](#cER.xhtml#aTR) philosopher Harry
    Frankfurt defined bullshit as speech intended to persuade without regard to truth.
    While a truth-teller wants to present the truth, and a liar tries to conceal it,
    the bullshitter merely wants to misrepresent themselves as knowledgeable on the
    topic at hand – and they’ll say whatever is necessary to achieve that goal. Thus,
    the bullshitter does not necessarily even need to know the truth, as long as they
    obtain the approval of their audience. In everyday life, we might stumble into
    bullshitting if we find ourselves in a conversation where we feel we should share
    an opinion on, say, politics or culture without sufficient knowledge of the topic.
    Frankfurt felt that while bullshitters may be more tolerated than liars, they
    actually do more harm, because of their total disregard for the value of the truth.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们可能会倾向于称ChatGPT为骗子，但实际上它更像是一个胡说八道的人。在著名的书籍《论胡说八道》中，哲学家哈里·弗兰克福特将胡说八道定义为旨在说服而不考虑真相的言语。真理讲述者想要呈现真相，而骗子试图隐藏真相，但胡说八道者只是想要在当前话题上伪装成有知识的人——他们会说出任何必要的话来实现这个目标。因此，胡说八道者甚至不一定需要知道真相，只要他们能获得听众的认可。在日常生活中，如果我们发现自己处于一个需要就某个话题发表意见的对话中，比如政治或文化，而我们对该话题的了解不足，我们可能会无意中陷入胡说八道。弗兰克福特认为，尽管胡说八道者可能比骗子更容易被容忍，但它们实际上造成的伤害更大，因为它们完全忽视了真相的价值。
- en: In their paper ‘ChatGPT is bullshit’,[57](#cER.xhtml#aRR) academics Michael
    Townsen Hicks, James Humphries and Joe Slater point out that since ChatGPT presents
    all its answers as correct, whether right or wrong, it demonstrates precisely
    this indifference to the truth. The also argue that the term ‘hallucinations’
    is inaccurate, because ChatGPT is not a person with an otherwise accurate worldview
    that occasionally goes astray. Rather, it simply has no grasp of reality at all
    – no objective perception that its ‘hallucinations’ could be said to disturb.
    Since all it does is manipulate symbols and patterns, it doesn’t know anything
    in the same way we do. In other words, ChatGPT simply does not understand what
    it’s saying – but it does everything it can to bullshit us that it does.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们的论文《ChatGPT is bullshit》中，[57](#cER.xhtml#aRR) 学者们Michael Townsen Hicks、James
    Humphries和Joe Slater指出，由于ChatGPT将其所有答案都呈现为正确的，无论对错，它恰恰展示了这种对真相的无动于衷。他们还认为，“幻觉”这个词不准确，因为ChatGPT不是一个拥有其他准确世界观但偶尔会走偏的人。相反，它根本无法理解现实——没有客观感知，它的“幻觉”可以说会打扰。由于它所做的只是操纵符号和模式，它不知道任何东西的方式和我们一样。换句话说，ChatGPT根本不理解它在说什么——但它尽其所能地欺骗我们，让它看起来像是在理解。
- en: To ChatGPT, language is just another type of data, like computer code. But for
    humans, it’s a tool for life. Our ancestors created it to communicate ideas and
    work towards goals that were vital to their survival, like cultivating crops,
    building shelters and raising families. At a fundamental level, the meaning of
    our words and sentences is intimately bound up with our bodies and how we interact
    with the physical world. In other words, language reflects our embodied reality.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ChatGPT来说，语言只是另一种类型的数据，就像计算机代码一样。但对于人类来说，它是生活的工具。我们的祖先创造它是为了交流思想和实现对生存至关重要的目标，比如种植作物、建造庇护所和抚养家庭。在根本层面上，我们的话和句子的意义与我们的身体和我们如何与物理世界互动紧密相连。换句话说，语言反映了我们的具身现实。
- en: 'Think about how we learn words. At some point in your childhood, an adult pointed
    to an apple and said the word ‘apple’. That forged a link between the real-world
    object and the word. From that point on, the word ‘apple’ became a signifier for
    the sensory reality of apples in your life: seeing them, touching them, tasting
    them. Hence, you have an experiential memory of apples that is unique to you alone.
    Yet you also partake in a shared, collective concept of apples, common to all
    English speakers, that allows you to talk to others and discover what they think
    about apples or how they’ve experienced them in their lives.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 想想我们是如何学习单词的。在你童年某个时刻，一个成人指向一个苹果并说出“苹果”这个词。这就在现实世界物体和这个词之间建立了一个联系。从那时起，“苹果”这个词就成为了你生活中苹果感官现实的标志：看到它们，触摸它们，品尝它们。因此，你拥有关于苹果的独特经验记忆，这是仅属于你自己的。然而，你也参与了一个共享的、集体的苹果概念，这是所有英语使用者共有的，它使你能够与他人交谈并了解他们对苹果的看法或他们在生活中如何体验它们。
- en: You already know from experience that apples are usually red or green and taste
    good when baked in a pie. But crucially, because you understand the characteristics
    of an apple, you can picture how it could be used in other contexts that you haven’t
    experienced. For example, you know that you could roll an apple down a mountain,
    draw a face on it or use it as a makeshift cricket ball, even if you’ve never
    done or seen those things yourself. But since ChatGPT only knows surface language,
    not underlying experience, it can be confused by speculative scenarios like this.
    Rather than consulting a mental representation of the world, as we would, it relies
    on its LLM to deduce how an answer to the question usually looks. And if the subject
    is too unfamiliar, there isn’t enough text out there for ChatGPT to work with,
    and that trips it up. The content produced by generative AI is not truly realistic,
    but rather ‘reality-adjacent’.[58](#cER.xhtml#aS7)
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经从经验中知道苹果通常是红色或绿色的，当它们被烤在馅饼里时味道很好。但关键的是，因为你理解了苹果的特性，你可以想象它在其他你没有经历过的情况下可能被如何使用。例如，你知道你可以把苹果从山上滚下来，在它上面画一个脸或者用它作为临时的板球，即使你自己从未做过或见过这些事情。但既然ChatGPT只知道表面语言，而不是底层经验，它可能会被这种推测性场景所困惑。它不会像我们那样咨询对世界的心理表征，而是依赖于其LLM来推断问题的答案通常看起来是什么样子。如果主题太不熟悉，没有足够的文本供ChatGPT处理，这就会让它陷入困境。生成式AI产生的不是真正现实的内容，而是“现实相邻”的内容。[58](#cER.xhtml#aS7)
- en: For example, ChatGPT might confidently state that if you want to fan the flames
    of a barbecue, a stone will work better than a paper map. Since it doesn’t understand
    the physical nature of a fire, a stone or a map, it can’t deduce the answer for
    itself. In fact, some psychologists believe that AI will only understand language
    the way humans do when it has ‘a humanlike body, senses, purposes, and ways of
    life’.[59](#cER.xhtml#aP9)
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，ChatGPT可能会自信地断言，如果你想煽动烧烤的火焰，石头比纸地图更有效。由于它不理解火、石头或地图的物理性质，它无法自己推断出答案。事实上，一些心理学家认为，只有当AI拥有“类似人类的身体、感官、目的和生活方式”时，它才会像人类一样理解语言。[59](#cER.xhtml#aP9)
- en: 'Concerns about AI are often framed in terms of machines becoming sentient,
    overthrowing their human masters and taking over the world. One theoretical scenario
    is that an AI is assigned a relatively simple task, like manufacturing paperclips.
    However, because the AI can think for itself, it reasons that humans might interfere
    with its important work – for example, by shutting down the paperclip factory
    or cutting off the supply of steel. So it banishes all the humans, just in case.
    This is known as the ‘control problem’: we will inevitably lose control of AI
    because it will always be one step ahead of any checks and balances we might try
    to impose.[60](#cER.xhtml#aTB)'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 关于人工智能的担忧通常被描述为机器变得有感知能力，推翻它们的人类主人并接管世界。一个理论上的场景是，一个AI被分配了一个相对简单的任务，比如制造回形针。然而，由于AI可以自己思考，它推断人类可能会干扰其重要的工作——例如，通过关闭回形针工厂或切断钢材供应。因此，它将所有人类都驱逐出去，以防万一。这被称为“控制问题”：我们不可避免地会失去对AI的控制，因为它的步伐总是比我们可能尝试实施的任何检查和平衡快一步。[60](#cER.xhtml#aTB)
- en: 'These fears are predicated on the idea that AI is ‘too good’ – that is, so
    intelligent that it will be able to outthink us and anticipate our every move.
    But technology thinker Jaron Lanier sees it differently. He argues that the ‘Frankenstein
    myth’ merely imposes an unwelcome ‘religious narrative’ on what should be a purely
    technical question. AI will never become more intelligent than us, because its
    intelligence is derived from our own.[61](#cER.xhtml#aK1) Instead, Lanier argues,
    the real threat comes from relying on AI that isn’t nearly as good as we think
    it is:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这些恐惧是基于这样一个观点，即AI“太好了”——也就是说，如此聪明以至于它将能够超越我们，预测我们的每一个动作。但技术思想家贾伦·拉尼尔有不同的看法。他认为，“弗兰肯斯坦神话”只是将一个不受欢迎的“宗教叙事”强加在一个纯粹的技术问题上。AI永远不会比我们更聪明，因为它的智慧来源于我们自己的。[61](#cER.xhtml#aK1)相反，拉尼尔认为，真正的威胁来自于依赖于并不像我们想象中那么好的AI：
- en: … the biggest threat of AI is probably the one that’s due to AI not actually
    existing, to the idea being a fraud, or at least such a poorly constructed idea
    that it’s phony. In other words, what I’m proposing is that if AI was a real thing,
    then it probably would be less of a threat to us than it is as a fake thing.[62](#cER.xhtml#aSY)
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: …人工智能最大的威胁可能是因为人工智能实际上并不存在，这个想法是一个骗局，或者至少是一个如此糟糕的构想，以至于它是虚假的。换句话说，我提出的是，如果人工智能是一个真实的东西，那么它可能对我们构成的威胁比作为一个虚假的东西要小。[62](#cER.xhtml#aSY)
- en: For writers, the principal threat of using ChatGPT is misplaced trust in its
    ability. Because it’s so convincing, it’s easy to overrate its powers of writing,
    editing and research and defer to it as an authority. We’re told to ‘check important
    info’ – but what is unimportant info? Isn’t all information important to someone
    in some situation? If we can’t trust all the answers, we can’t trust any of the
    answers. That makes ChatGPT an unreliable colleague at best, a devious editorial
    saboteur at worst.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 对于作家来说，使用ChatGPT的主要威胁是对其能力的过度信任。因为它如此令人信服，很容易高估其写作、编辑和研究能力，并把它当作权威来依赖。我们被告知要“检查重要信息”——但什么是不重要信息？难道不是所有信息在某种情况下对某人来说都是重要的吗？如果我们不能信任所有答案，我们就不能信任任何答案。这使得ChatGPT最多是一个不可靠的同事，最坏的情况是一个狡猾的编辑破坏者。
- en: ChatGPT is a black box
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个黑盒
- en: When we ask a friend or relative a question, we know we’re only getting one
    person’s perspective, and we treat it accordingly. We consider who they are, what
    they know, what they believe, what they like and what they are like. If we know
    them well enough, we may notice that they’re saying things they think we want
    to hear, or withholding things that might upset or irritate us. And whatever answer
    they give, we don’t have to take it as read. For example, we can probe their reasoning
    by asking them, ‘What makes you say that?’ or ‘How do you know?’
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们向朋友或亲戚提问时，我们知道我们只得到一个人的观点，我们会相应地对待它。我们考虑他们是谁，他们知道什么，他们相信什么，他们喜欢什么，他们是什么样的。如果我们足够了解他们，我们可能会注意到他们在说他们认为我们想听的话，或者保留可能会让我们不高兴或生气的事情。而且无论他们给出什么答案，我们都不必把它当作理所当然。例如，我们可以通过问他们，“是什么让你这么说？”或“你是怎么知道的？”来探究他们的推理。
- en: However, when we put a question to ChatGPT, we have little choice but to shrug
    and accept its answer. Earlier, we saw how the model was trained on a massive
    corpus of text material. Through a process known as ‘deep learning’, it ‘taught
    itself’ through a process of repeated trial and error until it reached the point
    where it could generate text and answer questions. Following that, human trainers
    gave ChatGPT some feedback and guidance on what sort of responses are acceptable
    – mainly to stop it giving offensive or inflammatory answers. However, this ‘reinforcement
    learning’ is a drop in the ocean compared to the deep learning that the model
    does on its own. For example, the training phase for GPT-4 required 21 billion
    petaFLOPs[63](#cER.xhtml#aR1) – that is, 21,000,000,000,000,000,000,000 individual
    calculations. This is computation on a scale that no human could ever comprehend.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当我们向ChatGPT提出一个问题，我们几乎没有选择，只能耸耸肩接受它的答案。之前，我们看到了这个模型是如何在大量的文本材料上训练的。通过一个被称为“深度学习”的过程，它通过反复尝试和错误的过程“自学”直到它能够生成文本并回答问题。之后，人类训练师给了ChatGPT一些反馈和指导，关于什么样的回答是可以接受的——主要是为了阻止它给出冒犯性或煽动性的回答。然而，与模型自身进行的深度学习相比，这种“强化学习”只是沧海一粟。例如，GPT-4的训练阶段需要2100亿petaFLOPs[63](#cER.xhtml#aR1)——即21,000,000,000,000,000,000,000个单独的计算。这是任何人类都无法理解的计算规模。
- en: 'As a result, no-one really knows what ChatGPT is doing – not even its creators.
    The only way to gauge its workings is to examine the responses it gives. ChatGPT
    is a ‘black box’: we know roughly what goes in, and we can see what comes out,
    but whatever happens in between is hidden from us. The more advanced the model
    gets, and the more its text-prediction ability improves, the more obscure its
    reasoning becomes.[64](#cER.xhtml#aNK)'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，没有人真正知道ChatGPT在做什么——甚至它的创造者也不知道。唯一衡量其工作方式的方法是检查它给出的回答。ChatGPT是一个“黑箱”：我们知道大致的输入是什么，我们可以看到输出是什么，但中间发生的一切对我们来说是隐藏的。随着模型的不断进步和其文本预测能力的提高，其推理变得越来越晦涩。[64](#cER.xhtml#aNK)
- en: This is important to bear in mind when you’re watching ChatGPT spool out another
    confidently expressed response. You can never know what ChatGPT chose to leave
    out of a text, or what sources it used to write it, because it never has to ‘show
    its workings’. It’s like a writer who will produce whatever you want, but never
    explain how they did it.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 当你看到ChatGPT自信地给出另一个回答时，这一点很重要。你永远不知道ChatGPT选择从文本中省略了什么，或者它使用了哪些来源来撰写它，因为它永远不需要“展示其工作过程”。这就像一个作家可以写出你想要的一切，但永远不会解释他们是如何做到的。
- en: ChatGPT is not creative
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT没有创造力
- en: Creativity is just connecting things. When you ask creative people how they
    did something, they feel a little guilty because they didn’t really do it, they
    just saw something. It seemed obvious to them after a while. That’s because they
    were able to connect experiences they’ve had and synthesize new things.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力只是连接事物的过程。当你问创意人士他们是如何做到某事的时候，他们会感到有点内疚，因为他们并没有真正做这件事，他们只是看到了某些东西。过了一段时间后，这看起来对他们来说很明显。这是因为他们能够将他们经历过的经验连接起来，并综合出新的东西。
- en: STEVE JOBS
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 史蒂夫·乔布斯
- en: There is nothing truly new under the sun. Instead, what we call ‘creativity’
    is merely making new connections between things that already exist. But there’s
    still the question of who, or what, is going to make those connections, and why.
    Will it be a human being, driven a human purpose, drawing on their unique experience
    of life and culture? Or will it be a machine?
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在太阳之下，没有真正的新事物。相反，我们所说的“创造力”仅仅是把已经存在的事物之间建立新的联系。但仍然有一个问题，是谁或是什么将建立这些联系，以及为什么。会是人类，被人类的目的驱动，利用他们独特的生命和文化经验吗？或者会是机器？
- en: Some observers have been seduced by ChatGPT’s impressive functionality, arguing
    that it will become more and more sophisticated and technically competent over
    time, ultimately replacing human writers.[65](#cER.xhtml#aT8) But this mistakes
    the whole purpose of writing, and art more broadly.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 一些观察者被ChatGPT令人印象深刻的功能所吸引，认为它将随着时间的推移变得越来越复杂和技艺精湛，最终取代人类作家。[65](#cER.xhtml#aT8)
    但这是对写作，以及更广泛的艺术的整个目的的误解。
- en: Yes, it’s true that on one level, writing is merely a matter of mastering certain
    genres, forms or techniques. You can even argue that a lot of human writing is
    just as formulaic as AI writing – particularly the kind of cookie-cutter content
    produced to please algorithms or attract search engines. But assuming that we
    are genuinely writing for other people to read, the purpose behind our writing
    will always be human.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，从某种程度上说，写作仅仅是掌握某些流派、形式或技术的问题。你甚至可以争论，很多人类写作和人工智能写作一样程式化——尤其是那种为了取悦算法或吸引搜索引擎而生产的批量内容。但如果我们真正是为了让其他人阅读而写作，我们写作背后的目的始终是人类的。
- en: What’s more, these purposes are always evolving, which is why art never stands
    still. Culture is constantly renewing itself as each new generation redefines
    creativity for themselves and the times they live in. The most successful works
    are perfectly in sync with the cultural moment when they appear, capturing the
    zeitgeist to a T. In contrast, generative AI is inherently conservative and backward-looking,
    because its training data inevitably belongs to the past. While it can tell us
    what has been successful or popular before, it will never be able to tell us what’s
    happening now – let alone what’s coming next.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，这些目的总是在不断发展，这就是为什么艺术永远不会停滞不前。文化在每一代人为自己和他们所处的时代重新定义创造性的同时不断更新。最成功的作品与它们出现时的文化时刻完美同步，完美地捕捉了时代精神。相比之下，生成式人工智能本质上是保守的，是向后看的，因为它的训练数据不可避免地属于过去。虽然它可以告诉我们过去什么曾经成功或流行，但它永远无法告诉我们现在正在发生什么——更不用说接下来会发生什么了。
- en: As technology progresses, we’ll be able to dial up AI-generated books, albums
    and movies to order, if we really want to. Presumably, that type of content-on-tap
    will find its own little place in the entertainment universe, alongside personalised
    gifts and design-your-own pizzas. But AI-driven designer content will never replace
    human art. Because at the end of the day, we look to art because we want to be
    told something new and profound about our lives by someone who thinks differently
    from us. We want to see the world through someone else’s eyes and feel what they
    feel. We want to live through someone else’s dream – or nightmare. We want to
    be pushed beyond our comfort zone, not merely entertained within the compass of
    our own imagination.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 随着技术的进步，如果我们真的想的话，我们将能够订购由人工智能生成的书籍、专辑和电影。据推测，这种即点即享的内容将在娱乐宇宙中找到自己的一席之地，与个性化礼物和定制披萨并列。但人工智能驱动的定制内容永远不会取代人类艺术。因为最终，我们之所以寻求艺术，是因为我们希望有人能以与我们不同的思维方式告诉我们关于我们生活的新鲜和深刻的东西。我们想通过别人的眼睛看世界，感受他们的感受。我们想通过别人的梦想——或者噩梦——来生活。我们希望被推向我们的舒适区之外，而不仅仅是被限制在我们的想象力范围内。
- en: 'Around 2.2 million books are published each year.[66](#cER.xhtml#aNT) So the
    chances of authors coming up with something original are fairly slim. In fact,
    you don’t even need AI to create the exact novel you want to read: chances are
    that a human author somewhere in the world has already written it. The world of
    fanfiction caters to this exact need, with sites that will filter hundreds of
    thousands of fan-authored Harry Potter stories by character, mood and setting.[67](#cER.xhtml#aNU)
    So why do people keep writing?'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 每年大约有220万本书籍出版。[66](#cER.xhtml#aNT) 因此，作者提出原创作品的几率相当小。事实上，你甚至不需要人工智能来创造你想要阅读的确切小说：可能性很大，世界上某个地方的人类作者已经写出了它。粉丝小说的世界满足了这一确切需求，网站会根据角色、情绪和场景过滤数十万篇粉丝创作的哈利·波特故事。[67](#cER.xhtml#aNU)
    那么为什么人们还在继续写作呢？
- en: They write partly for the joy of writing itself, and partly because they have
    something of their own to express. Their story may not be new to the world, but
    it still feels new to them. Moreover, it will be meaningful to at least some of
    the people who read it, and that will forge a human connection between author
    and reader, which is one of the purposes of art. We read to know we are not alone.[68](#cER.xhtml#aSS)
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 他们写作部分是因为写作本身的乐趣，部分是因为他们有自己要表达的东西。他们的故事可能对世界来说并不新鲜，但对他们来说仍然感觉新鲜。此外，它对至少一些阅读它的人来说将是有意义的，这将作者和读者之间建立一个人际联系，这是艺术的一个目的。我们阅读是为了知道我们并不孤独。[68](#cER.xhtml#aSS)
- en: The developers of AI like to frame it as breaking down the barriers to creativity.
    Traditional art, with its focus on technical skill and artistic merit, is inherently
    elitist. Now the machines are here to allow everybody to create. As Stability
    AI founder Emad Mostaque charmingly put it, ‘So much of the world is creatively
    constipated, and we’re going to make it so that they can poop rainbows.’[69](#cER.xhtml#aRM)
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: AI的开发者喜欢将其描述为打破创造力的障碍。传统的艺术，其重点在于技术技能和艺术价值，本质上具有精英主义。现在，机器已经到来，让每个人都能创造。正如稳定性AI创始人Emad
    Mostaque迷人地所说：“世界上有太多的事情在创造上便秘，我们将让它们能够排泄彩虹。”[69](#cER.xhtml#aRM)
- en: 'The irony of this is that everybody can already create. Anybody can try their
    hand at writing, painting or music, right now. And there is no knowing where that
    might lead: as Ralph Waldo Emerson said, ‘Every artist was once an amateur.’ If
    anything is stopping people from creating, it’s probably a lack of time, inclination
    or confidence, rather than some yearning for a technology platform to do everything
    on their behalf.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这种讽刺之处在于，每个人都可以已经创造。任何人现在都可以尝试写作、绘画或音乐。没有人知道这会通向何方：正如拉尔夫·瓦尔多·爱默生所说，“每个艺术家曾经都是一个业余爱好者。”如果有什么阻止人们创造，那可能是因为缺乏时间、意愿或信心，而不是对某个技术平台的渴望，这个平台可以代表他们做所有事情。
- en: Anyone can give it a go. But great artists do far more than that. They take
    their art further than we ever could ourselves. They achieve dazzling technical
    skill, delight huge audiences, transcend the limits of their medium or express
    universal truths about the human condition. And they are able to do that because
    they have exceptional talent and they’re willing to work very hard to make the
    most of it.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以尝试一下。但伟大的艺术家所做的远不止于此。他们将艺术推向了我们自己无法达到的高度。他们达到了令人眼花缭乱的技艺水平，取悦了庞大的观众群体，超越了他们媒介的限制，或表达了关于人类状况的普遍真理。他们之所以能够做到这一点，是因为他们拥有非凡的才能，并且愿意非常努力地充分利用它。
- en: ChatGPT does neither of these things. It can’t replace our individual human
    expression, and nor does it offer a short-cut to becoming a great artist. All
    it gives us is a means to instantly generate some stuff that superficially resembles
    art but lacks its intrinsic humanity. AI ‘art’ is mere content, signifying nothing.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT既不能取代我们个人的人类表达，也不能提供成为伟大艺术家的捷径。它所提供的只是瞬间生成一些表面上看似艺术但缺乏其内在人性的东西的手段。AI“艺术”仅仅是内容，没有任何意义。
- en: 'Turning to commercial creativity, Sam Altman believes that generative AI will
    one day take over 95 percent of the work that creative professionals currently
    do: ‘All free, instant, and nearly perfect. Images, videos, campaign ideas? No
    problem.’[70](#cER.xhtml#aKK) (That ‘nearly’ is doing some heavy lifting.) But
    as I’ve argued throughout this book, there’s a difference between a just-about-viable
    output and one that successfully bridges a human purpose and a real-world outcome.
    Running a successful advertising campaign is more than putting a well-made video
    online; to get results, you need people to notice, watch and act upon your ad
    – which is where human creativity comes in. Anyone can generate a few campaign
    ideas; the skill is in knowing, in advance, which one will connect with people.
    (And as we’ll see in the next section, these ‘ideas’ may not be quite as original
    as they seem.)'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 转到商业创造力，山姆·奥特曼相信，生成式AI有一天将接管创意专业人士目前所做工作的95%：“所有都是免费的、即时的，几乎完美。图像、视频、活动想法？没问题。”[70](#cER.xhtml#aKK)（这里的“几乎”承担了很大的工作量。）但正如我在本书中一直所论证的，一个勉强可行的输出和一个成功连接人类目的和现实世界结果之间的区别是存在的。运行一个成功的广告活动不仅仅是上传一个制作精良的视频；要取得结果，你需要人们注意到、观看并采取行动——这就是人类创造力的作用。任何人都可以生成一些活动想法；技巧在于事先知道哪一个会与人们产生联系。（而且正如我们将在下一节中看到的，这些“想法”可能并不像它们看起来那样原创。）
- en: When I’ve used ChatGPT for creative tasks, I’ve usually found that it works
    best as a kind of prompter or sounding board for my own thinking. The output can
    rarely be used as is, but by considering why and how it doesn’t work, or why it
    doesn’t express what I want to say, I can find my own way forward.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 当我用 ChatGPT 进行创意任务时，我通常发现它最好作为一个提示器或我自己的想法的回声板。输出很少可以直接使用，但通过考虑为什么它不起作用，或者为什么它没有表达我想说的话，我可以找到自己的前进道路。
- en: There may also be some value in just having some material to work with, almost
    regardless of its quality. Editing is often easier than writing, and ChatGPT could
    allow you to skip straight to the improvement phase. Even if you end up changing
    almost everything, at least you don’t have to conquer the blank page. However,
    if you choose this option, it’s still worth bearing in mind where ChatGPT’s writing
    actually comes from. So let’s look at that now.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 仅拥有一些可以工作的材料也可能具有一定的价值，几乎无论其质量如何。编辑通常比写作更容易，ChatGPT 可以让你直接跳到改进阶段。即使你最终几乎改变了所有东西，至少你不必征服空白页。然而，如果你选择这个选项，仍然值得记住
    ChatGPT 的写作实际上是从哪里来的。那么现在让我们来看看这一点。
- en: ChatGPT is a parasite
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是一个寄生虫
- en: Whenever you see a spark of creativity in ChatGPT’s output, it came from a human.
    While the software has been designed to give the impression that it writes its
    own stuff, in reality it’s derived from the work of millions of human writers
    whose content was commandeered to train the GPT model. In the same way, ChatGPT’s
    image creator, DALL-E, was trained on photos and artwork created by real-world
    artists and photographers.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 无论何时你在 ChatGPT 的输出中看到一丝创意火花，它都来自人类。虽然该软件被设计成给人一种它自己写东西的印象，但实际上它来源于数百万人类作者的作品，其内容被征用以训练
    GPT 模型。同样，ChatGPT 的图像创作者 DALL-E 也是在现实世界艺术家和摄影师创作的照片和艺术作品上训练的。
- en: ChatGPT is an aesthetic vampire, sucking its creative energy from human creatives
    just as the oppressive machines in The Matrix turned human bodies into batteries.
    Many of these creatives make a living from writing or illustration and their works
    are nominally protected by copyright. All were co-opted, unwittingly and unwillingly,
    to hone the technology that now threatens their livelihood.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是一个美学吸血鬼，就像《黑客帝国》中压迫性的机器一样，从人类创造者那里吸取他们的创造能量。许多这些创造者靠写作或插画为生，他们的作品名义上受到版权保护。所有这些都被无意识地、不愿意地吸纳，以磨练现在威胁他们生计的技术。
- en: What’s more, AI tools seem to tacitly encourage a freewheeling approach to intellectual
    property. Image creators like Midjourney and Stable Diffusion will gladly accept
    an artist’s name in their prompts, then create an artwork in their style. As these
    knock-off images flood the web, the artists’ actual work is being subsumed beneath
    an avalanche of fakes. While Stability, the firm behind Stable Diffusion, later
    introduced an opt-out,[71](#cER.xhtml#aPS) it still placed the onus on the artists
    themselves to manually flag their work – within a two-week window. OpenAI, Google
    and Midjourney don’t even give artists the option.[72](#cER.xhtml#aPT) No wonder
    digital artists are pushing back with a campaign entitled ‘No to AI Art’.[73](#cER.xhtml#aPU)
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，AI 工具似乎默许了一种对知识产权的自由放任态度。像 Midjourney 和 Stable Diffusion 这样的图像创作者会欣然接受艺术家在提示中的名字，然后以他们的风格创作艺术品。随着这些仿制品在网络上泛滥，艺术家的实际作品正被假象的洪流所淹没。虽然
    Stable Diffusion 背后的公司 Stability 后来引入了退出选项[71](#cER.xhtml#aPS)，但它仍然将责任推给了艺术家自己，要求他们在两周内手动标记自己的作品——OpenAI、谷歌和
    Midjourney 甚至都不给艺术家提供选择。[72](#cER.xhtml#aPT]难怪数字艺术家们正在通过名为“反对 AI 艺术”的运动进行反击。[73](#cER.xhtml#aPU)
- en: 'With text, it’s a bit harder to tell what ChatGPT is doing, since it might
    be pulling together phrases from multiple diverse works and authors without telling
    us. But there are strong signs that its attitude to copyrighted text is equally
    relaxed. For example, it didn’t need much encouragement to pull an idea from one
    of my own books:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 对于文本来说，判断 ChatGPT 在做什么要困难一些，因为它可能会从多个不同的作品和作者那里收集短语，而不告诉我们。但有一些强有力的迹象表明，它对受版权保护文本的态度同样宽松。例如，它不需要太多鼓励就能从我的书中抽取一个想法：
- en: '[Prompt] write a metaphor for what copywriting is, in the style of author Tom
    Albrighton'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: '[提示]用作者汤姆·阿尔布里顿的风格写一个比喻，说明文案是什么'
- en: '[Response] Copywriting is the art of constructing a bridge between a brand
    and its audience, where every word is a carefully chosen stone, placed with precision
    to create a seamless path. The copywriter is the master architect, blending creativity
    with strategy to design a structure that not only supports but also inspires trust,
    guiding readers effortlessly to the other side. Just as a well-built bridge withstands
    the test of time and elements, compelling copy stands firm against skepticism
    and indifference, ensuring a lasting connection that drives action and engagement.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '[回应] 写作是构建品牌与受众之间桥梁的艺术，每一词都是精心挑选的石头，精确放置以创造一条无缝的道路。文案作者是大师级的建筑师，将创意与策略相结合，设计出一个不仅支持而且激发信任的结构，引导读者轻松地到达另一边。正如一座精心建造的桥梁能够经受时间的考验和自然元素的侵蚀，引人入胜的文案能够坚定地对抗怀疑和冷漠，确保建立持久的联系，推动行动和参与。'
- en: Note that I only asked for ‘in the style of’ – not ‘taken from’ or ‘based on’.
    And my books aren’t in the public domain. Yet ChatGPT’s answer is suspiciously
    close to the exact metaphor used in the first chapter of my book Copywriting Made
    Simple:[74](#cER.xhtml#aR2)
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我只要求“以……风格”，而不是“摘自”或“基于”。而且我的书并不在公有领域。然而，ChatGPT的回答却可疑地接近我书中第一章节中使用的确切隐喻：[74](#cER.xhtml#aR2)
- en: Copywriting is like a bridge. On one side is the person who will read your copy.
    On the other side is you, along with whatever you’re selling. Your job is to get
    the reader to cross the bridge and give it a try.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 写作就像一座桥梁。一边是阅读你文案的人，另一边是你以及你正在销售的一切。你的任务是让读者跨越这座桥梁，尝试一下。
- en: I hesitate to bore on about my own internal writing process, but it’s the only
    one that I have direct access to, so please forgive the indulgence.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 我犹豫着不厌其烦地谈论我自己的内部写作过程，但这是我唯一能直接接触到的，所以请原谅我的放纵。
- en: 'This paragraph, which I’m quietly proud of, took me multiple revisions, spread
    out over months of editing time as I laboured to make the book live up to its
    title. Multiple earlier versions of ‘Copywriting is like a bridge’ included empty
    words that just didn’t need to be there. If you’ve ever put serious time and effort
    into writing simply and clearly, you may recognise this process: you start out
    with something wordy, vague and obtuse, then gradually whittle it down to something
    that says precisely what you want to say. As Nathaniel Hawthorne said, ‘Easy reading
    is damn hard writing.’'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我对此段落感到自豪，它经过了多次修改，分布在几个月的编辑时间里，我努力使这本书名副其实。‘写作就像一座桥梁’的多个早期版本包含了不必要的空话。如果你曾经投入大量时间和精力来简洁明了地写作，你可能能够识别这个过程：你开始时写得很冗长、模糊和晦涩，然后逐渐将其削减到能够精确表达你想要表达的内容。正如纳撒尼尔·霍桑所说，“易读的写作是极其艰难的。”
- en: With all that in mind, it’s depressing to see ChatGPT festooning the core idea
    with pretentious flourishes like ‘art’, ‘constructing’, ‘placed with precision’
    and ‘effortlessly’. Instead of keeping the ‘bridge’ metaphor in check, ChatGPT
    extends it beyond all reason, bringing in the notions of ‘master architect’, the
    ‘test of time and elements’ and ‘standing firm’. Worst of all is the clunking
    mixed metaphor ‘seamless path’, which proves that ChatGPT has no idea what seams
    or paths might actually be. If you attempt to read this text out loud – an excellent
    test for clarity, rhythm and flow – you’ll sound like a pompous blowhard who swallowed
    a dictionary.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一切，看到ChatGPT用“艺术”、“构建”、“精确放置”和“轻松”等自负的修饰语装饰核心思想，真是令人沮丧。ChatGPT不仅没有控制住“桥梁”的隐喻，反而将其扩展到无理的地步，引入了“大师级建筑师”、“时间的考验和自然元素的侵蚀”以及“坚定”等概念。最糟糕的是，“无缝道路”这个笨拙的混合隐喻证明ChatGPT根本不知道接缝或道路可能是什么。如果你尝试大声朗读这段文字——这是一个测试清晰度、节奏和流畅性的优秀方法——你会听起来像一个自大的吹牛者，吞下了一本字典。
- en: This example suggests that authors whose work has been ingested by ChatGPT face
    a depressing choice between brazen plagiarism and insidious misrepresentation.
    If you didn’t know my work – and, let’s be honest, most people don’t – you’d naturally
    assume that the AI version really is ‘in my style’. As if it wasn’t enough that
    the machine stole my idea, anyone using this same prompt might think I wrote that
    shit.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子表明，其作品被ChatGPT吸收的作者面临着一种令人沮丧的选择：公然的剽窃和隐秘的误代表。如果你不知道我的作品——让我们说实话，大多数人都不了解——你自然会认为AI版本真的是“我的风格”。仿佛机器偷了我的想法还不够，任何使用相同提示的人可能会认为我写了那堆垃圾。
- en: There doesn’t seem to be much that authors can do about this, beyond putting
    ‘No AI training with my text’ clauses into their contracts and hoping that tech
    firms will respect them.[75](#cER.xhtml#aJJ) However, since the technology has
    already been trained, much of the damage has already done. If your work was online
    when GPT-3 and -4 were unleashed, it may already have been assimilated by the
    Borg.[76](#cER.xhtml#aJK)
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 作者似乎对此无能为力，除了在合同中加入“不得用我的文本进行AI训练”条款，并希望科技公司会尊重这些条款。[75](#cER.xhtml#aJJ) 然而，由于技术已经被训练，大部分损害已经造成。如果您的作品在GPT-3和GPT-4发布时已经在网上，它可能已经被“博格人”同化。[76](#cER.xhtml#aJK)
- en: This is worth keeping in mind if you plan to use ChatGPT for commercial copywriting
    or content creation. As OpenAI admits, its output could infringe on someone’s
    copyright, or it could be giving someone else the exact same output as you – but
    unless you check, you’ll never know.[77](#cER.xhtml#aUG) At the time of writing,
    The New York Times is pursuing a lawsuit against OpenAI alleging that ChatGPT
    infringes on its copyright, as well as hallucinating non-existent articles that
    it falsely attributes to the newspaper.[78](#cER.xhtml#aUH)
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您计划使用ChatGPT进行商业文案创作或内容创作，这一点值得您牢记。正如OpenAI所承认的，其输出可能会侵犯某人的版权，或者可能会给出与您完全相同的输出给其他人——但除非您检查，否则您永远不会知道。[77](#cER.xhtml#aUG)
    在撰写本文时，《纽约时报》正在起诉OpenAI，指控ChatGPT侵犯其版权，以及虚构不存在文章并将其错误地归咎于该报纸。[78](#cER.xhtml#aUH)
- en: Are AI evangelists concerned about this wholesale trashing of intellectual property
    rights? Quite the contrary. Indeed, they seem to take an impish glee in trolling
    human creatives as Luddites or losers whose industries are clearly ripe for ‘disruption’.
    When Jason M. Allen won the ‘emerging digital artists’ category of the Colorado
    State Art Fair competition with a Midjourney image, he exulted that ‘Art is dead
    Dude… It's over. A.I. won. Humans lost.’[79](#cER.xhtml#aMM) Others burble about
    ‘democratising art’, as if artists are somehow being all mean and authoritarian
    for wanting to retain ownership and control of the things they create.[80](#cER.xhtml#aMN)
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: AI的传教士们是否关心这种对知识产权的全面破坏？恰恰相反。事实上，他们似乎以一种顽皮的喜悦来戏弄人类创造者，将他们视为卢德分子或失败者，他们的行业显然已经准备好“颠覆”。当Jason
    M. Allen凭借Midjourney图像在科罗拉多州艺术博览会比赛中赢得“新兴数字艺术家”类别时，他欢呼道：“艺术已经死亡，伙计……结束了。AI赢了，人类输了。”[79](#cER.xhtml#aMM)
    其他一些人喋喋不休地谈论“艺术民主化”，好像艺术家们因为想要保留他们所创造事物的所有权和控制权而变得非常刻薄和专断。[80](#cER.xhtml#aMN)
- en: The most cogent argument against copyright law is that data should not be locked
    down by government-granted monopolies, but released to create a shared public
    domain of information. This notion is summed up by the slogan ‘information wants
    to be free’. But art is more than information, and while this ‘freedom’ sounds
    very fine and noble, are creators being liberated or enslaved? Moreover, what’s
    the motivation for authors and artists to put years of effort into learning a
    craft and perfecting their work if they have no hope even of recognition, let
    alone financial reward? Who will feed the ravenous ChatGPTs of tomorrow?
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 反对版权法的最有力论点是，数据不应被政府授予的垄断所锁定，而应释放出来，以创建一个共享的公共信息领域。这一观点可以用口号“信息渴望自由”来概括。但艺术不仅仅是信息，尽管这种“自由”听起来非常高尚和崇高，创作者是被解放还是被奴役？此外，如果作者和艺术家没有希望得到认可，更不用说获得经济回报，他们为何要投入数年的努力去学习一门手艺并完善他们的作品？谁将为明天的贪婪的ChatGPT们提供食物？
- en: I guess you can say that if you put your stuff online, you are implicitly sharing
    it with the world, with all the risks that entails. But there’s still a big difference
    between, say, a sixth-former pinching a few sentences from a blog post and a powerful
    corporation brutally harvesting every byte of data it can get its hands on, then
    exploiting it to develop a paid-for service without paying creators a penny or
    even giving them credit. Nobody signed up for that.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 我想你可以这么说，如果你把你的东西放在网上，你就是在隐式地与世界分享，这涉及到所有的风险。但比如说，一个六年级学生从博客文章中剽窃了几句话，与一个强大的公司残酷地收集它能得到的每一字节数据，然后利用它来开发付费服务，而不支付创作者一分钱，甚至不给他们任何信用，这两者之间仍然有很大的区别。没有人同意这样做。
- en: 'There’s no getting away from it: every time you use ChatGPT, you are standing
    on the shoulders of human creators without their permission. That instantly generated
    recipe, potted history, application letter, student essay or PTA email – someone
    out there wrote every word. The fact that the theft is diffused across multiple
    sources and hidden behind an interface doesn’t make it any less real.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 没有办法摆脱这个事实：每次你使用ChatGPT，你都是在未经人类创作者许可的情况下站在他们的肩膀上。那些即时生成的食谱、简短的历史、求职信、学生论文或PTA电子邮件——每个字都是有人写的。盗窃行为虽然分散在多个来源并隐藏在界面背后，但这并不使它变得不那么真实。
- en: Ethical questions like these should make every user pause and reflect. But I
    imagine few give them a second thought. After all, OpenAI tends to keep quiet
    about the lifeblood of its technology, referring euphemistically to ‘large amounts
    of data’ without specifying where it came from.[81](#cER.xhtml#aSR)
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的伦理问题应该让每个用户停下来深思。但我想很少有人会再次思考。毕竟，OpenAI倾向于对其技术的生命线保持沉默，委婉地提到“大量数据”，而没有具体说明数据来源。[81](#cER.xhtml#aSR)
- en: 'However, ChatGPT is parasitic on its users too, since it uses their data to
    develop its model.[82](#cER.xhtml#aJB) In its advice to members on using AI for
    writing, the UK Society of Authors notes:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT也依赖于其用户，因为它使用他们的数据来开发其模型。[82](#cER.xhtml#aJB) 在其向会员提供的关于使用AI进行写作的建议中，英国作家协会指出：
- en: Use an AI system as a tool only after considering what it can learn from you
    in return for what it gives you and the unethical way in which many AI programmes
    have been trained by learning on pirated content. The adage that ‘if something
    is free, you are the product’ holds true in the AI development race.[83](#cER.xhtml#aMY)
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑AI系统能从你那里学到什么，以换取它给你提供的东西，以及许多AI程序通过学习盗版内容而被训练的不道德方式之后，才将其用作工具。在AI开发竞赛中，“如果某物是免费的，那么你就是产品”这句谚语是正确的。[83](#cER.xhtml#aMY)
- en: 'Poker players make the same point in blunter terms: if you look round the table
    and you don’t know who the sucker is, it’s you. ChatGPT gives the impression of
    a frictionless short-cut to free content. But if something seems too good to be
    true, it probably is. Somebody, somewhere, is footing the bill – whether it’s
    you, through your data, or the unknown writers out there in the world whose work
    was hijacked to create your text. There’s no such thing as a free lunch.'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 桌子周围的扑克玩家会用更直白的话来表达同样的观点：如果你环顾四周，不知道谁是傻瓜，那么那个人就是你。ChatGPT给人一种通往免费内容的无摩擦捷径的印象。但如果某件事看起来好得令人难以置信，那么它可能就是真的。某个人，某个地方，正在支付账单——无论是你通过你的数据，还是那些在世界上不知名的作家，他们的作品被劫持来创建你的文本。免费午餐是不存在的。
- en: 'ChatGPT is even parasitic on its host: the internet. The software is a perfect
    fit for search engine optimisation (SEO) and social media, where the algorithms
    grant visibility to those who can provide a steady flow of content. As people
    post more and more AI-generated stuff online, the inevitable result is that AI
    models are beginning to consume AI content during their training. One recent study
    found that this degrades the models’ output quality and makes it less diverse.[84](#cER.xhtml#aM5)
    The researchers call this vicious cycle Model Autophagy Disorder, or MAD, in an
    analogy to mad cow disease. Like the trumpet-mouthed Suckophant in the Beatles
    film Yellow Submarine,[85](#cER.xhtml#aM6) ChatGPT will hoover up everything in
    the world, including itself.'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT甚至依赖于其宿主：互联网。这款软件非常适合搜索引擎优化（SEO）和社交媒体，那里的算法赋予那些能够提供持续内容流的人以可见性。随着人们在网上发布越来越多的AI生成内容，不可避免的结果是AI模型在训练过程中开始消耗AI内容。一项最近的研究发现，这降低了模型输出的质量，使其变得不那么多样化。[84](#cER.xhtml#aM5)
    研究人员将这种恶性循环称为模型自噬紊乱，或MAD，类似于疯牛病。就像披头士电影《黄色潜水艇》中喇叭嘴的Suckophant一样[85](#cER.xhtml#aM6)，ChatGPT将吞噬世界上的一切，包括它自己。
- en: ChatGPT destroys thought
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT摧毁了思考
- en: How do I know what I think until I see what I say?
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我如何知道我的想法，直到我看到我说的话？
- en: E.M. FORSTER
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: E.M. FORSTER
- en: Writing is thinking. As we write, our thoughts and words shape each other as
    they move forward hand in hand. But if we click straight to the end of the writing
    process, we deny ourselves the opportunity to think along the way. As a result,
    the destination we arrive at might not be the one we really needed to reach.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 写作就是思考。在我们写作的过程中，我们的思想和语言相互塑造，携手前进。但如果我们直接跳到写作过程的结尾，我们就剥夺了自己沿途思考的机会。结果，我们到达的目的地可能并不是我们真正需要达到的地方。
- en: 'The format of the ChatGPT prompt presupposes that you know exactly what you
    want before you begin writing. But sometimes, the path through the forest only
    becomes clear once you begin to walk it. Digging into words unearths emergent
    insights: unanticipated ideas and perceptions that you couldn’t have known at
    the outset, but now stand revealed as vital to your text.'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提示的格式假设你在开始写作之前就知道你确切想要什么。但有时，只有当你开始行走时，森林中的道路才会变得清晰。深入挖掘文字可以发现涌现的洞察力：你一开始无法预知的思想和感知，但现在它们作为你文本的关键而显现出来。
- en: 'As E.M. Forster’s quote suggests, you may find that your ideas only become
    clear to you while you write, as you weigh up what you want to say and see it
    staring back at you from the page. Sometimes, it’s like having an internal debate:
    you set out your ideas in words, only to realise with a frown that you don’t actually
    agree with yourself. So if you don’t think that, what do you think?'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 如E.M.福斯特的名言所说，你可能发现，只有在写作的过程中，你的想法才会变得清晰，因为你权衡你想说的话，看到它从页面上回望着你。有时，这就像是一场内心的辩论：你用言语表达你的想法，但随后皱着眉头意识到你实际上并不认同自己。那么，如果你不这么想，你又会怎么想呢？
- en: If you write fiction, the drafting process lets you hear your story as you tell
    it. Characters reveal to you who they are, how they want to be and what they want
    to do. New situations and events occur to you as new causalities and consequences
    emerge. Plot points you thought were intractable are resolved. Playing the part
    of your reader, you imagine how your story will unfold in their mind, moving ever
    closer to the perfect blend of what you want to write and what they want to read.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写小说，草稿过程让你在讲述故事时听到你的故事。角色向你展示他们是谁，他们想要成为什么样的人，以及他们想要做什么。新的情况和事件会出现在你的脑海中，作为新的因果和后果出现。你原本认为无法解决的情节点得到了解决。扮演读者的角色，你想象你的故事将在他们的脑海中展开，越来越接近你想要写和读者想要读的完美结合。
- en: Writing is a doorway to learning. Writing about a new subject is an excellent
    way to dive in and start gathering knowledge – or, if you already know the subject,
    to deepen and clarify your thinking about it. When you’re idly thinking about
    something, you can gloss over a few gaps and fuzzy bits here and there. But when
    you sit down to write, you no longer have anywhere to hide. Every point must be
    put down in black and white, and that discipline forces you to get everything
    properly straight in your mind.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是学习的门户。关于一个新主题的写作是一个很好的方式，可以让你深入其中并开始积累知识——或者，如果你已经了解这个主题，可以加深并澄清你对它的思考。当你漫无目的地思考某事时，你可以忽略这里那里的几个空白和模糊的地方。但当你坐下来写作时，你就无处可藏。每个观点都必须用黑白分明的方式表达出来，这种纪律迫使你在大脑中正确地整理一切。
- en: 'Albert Einstein supposedly said, ‘If you can''t explain it simply, you don''t
    understand it well enough.’ This could mean that you need to improve your understanding
    of the idea until you can explain it in simple terms. Yet the converse is also
    true: if you work on explaining the idea simply, your own understanding of it
    will improve.'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 据说阿尔伯特·爱因斯坦说过：“如果你不能简单解释，你就没有真正理解。”这可能意味着你需要提高你对这个概念的理解，直到你能够用简单的术语来解释它。然而，反过来也是真的：如果你致力于用简单的方式解释这个概念，你对它的理解也会提高。
- en: Writing is a journey from not knowing to knowing. Most obviously, we don’t know
    at the outset what the words of our finished text will be. Beyond that, we may
    not be sure about its length, structure or tone. There might be things we need
    to research or people we need to consult. We may have a strong opening or an intriguing
    starting point, but less sense of where we want to end up. And we may not even
    know quite what our writing is going to be about.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 写作是从不知到知的旅程。最明显的是，我们一开始不知道我们最终文本的词语会是什么。除此之外，我们可能不确定它的长度、结构或语气。我们可能需要研究某些事情或咨询某些人。我们可能有一个强烈的开头或一个引人入胜的起点，但不太清楚我们想要达到的终点。甚至我们可能不知道我们的写作究竟会是什么主题。
- en: Whatever the reasons, there are many things we don’t know, and that gives us
    a sense of not-knowing. Sometimes that’s exciting. But at other times we may feel
    not-knowing as an anxiety or a lack. We may wonder whether we can finish, or even
    start. We may ask ourselves whether we have the ability to surmount the obstacles
    in our way. And the more we struggle with the writing process, the worse this
    pain becomes.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是什么原因，有许多事情我们不知道，这让我们有一种不知的感觉。有时这会令人兴奋。但有时我们可能会把不知觉地感到焦虑或缺乏。我们可能会怀疑自己是否能够完成，甚至开始。我们可能会问自己是否有能力克服我们道路上的障碍。而且，我们与写作过程斗争得越激烈，这种痛苦就越严重。
- en: However, we have to deal with this pain and get through it, because the moment
    of not-knowing is also the creative moment. It’s the sandbox where we play around
    and try things out. It’s the overgrown path that we plunge into just to see where
    it leads. It’s the ‘what if?’ that allows curiosity to override rationality. It’s
    the freedom to let go of the pressure to produce and disregard the demands of
    the reader – just for now.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们必须面对这种痛苦并克服它，因为不知道的时刻也是创造的时刻。它是我们玩耍和尝试新事物的沙盒。它是我们冲进去看它通向何方的荒芜小径。它是允许好奇心超越理性的“如果怎样”。它是让我们暂时放下生产压力和忽视读者要求的自由。
- en: Crucially, not-knowing gives you the right to make mistakes. A mistake is an
    outcome that seems unwanted right now but might later turn out to be ideal. Or
    it might be a message from your unconscious about something you need to be mindful
    of. As Brian Eno says, ‘Honour thy mistake as a hidden intention.’[86](#cER.xhtml#aJD)
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，不知道给你犯错误的权利。错误是一个现在看起来不受欢迎的结果，但可能后来会变得理想。或者它可能是你无意识中关于你需要留意的某事的信号。正如布莱恩·伊诺所说：“尊重你的错误，因为它是一个隐藏的意图。”[86](#cER.xhtml#aJD)
- en: Sometimes, we just have to trust our writing process, knowing that a solution
    will come in time. If we can just stay with the state of not-knowing for long
    enough, and lean into it instead of fearing it, it often reveals an answer that
    was there all along, but hidden from us because we’d convinced ourselves that
    it didn’t exist.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，我们只能相信我们的写作过程，知道解决方案终将到来。如果我们能够长时间地保持不知道的状态，并且勇敢地面对它而不是害怕它，它通常会揭示一个一直存在但被我们隐藏的答案。
- en: Become at ease with the state of “not knowing.” This takes you beyond mind because
    the mind is always trying to conclude and interpret. It is afraid of not knowing.
    So, when you can be at ease with not knowing, you have already gone beyond the
    mind. A deeper knowing that is non-conceptual then arises out of that state.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 与“不知道”的状态和平共处。这让你超越了思维，因为思维总是试图得出结论和解释。它害怕不知道。所以，当你能够与不知道和平共处时，你已经超越了思维。从那种状态中，一种非概念性的更深层次的认知就会产生。
- en: ECKHART TOLLE[87](#cER.xhtml#aMB)
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: ECKHART TOLLE[87](#cER.xhtml#aMB)
- en: ChatGPT is a certainty machine. By leaping in to ‘conclude and interpret’ on
    our behalf, it eases the pain of not-knowing, allowing us to jump from aim to
    output without any of the uncomfortable not-knowing in between. But uncertainty
    is something that we have to feel on the way to creating something real and true.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是一台确定性机器。通过代表我们“得出结论和解释”，它减轻了不知道的痛苦，让我们能够从目标跳到输出，中间没有任何不舒服的不知道。但不确定性是我们创造真实和真实事物过程中必须感受到的。
- en: ChatGPT is too easy
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 太容易
- en: No work, no food.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 没有工作，就没有食物。
- en: ZEN PROVERB
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: ZEN PROVERB
- en: 'We’re increasingly surrounded by digital technologies that promise to save
    time, reduce hassle and make life generally friction-free. Generative AI is a
    prime example, since it effects a radical transfer of labour from the user to
    the technology: a single-line prompt can yield a thousand words. Suddenly, a task
    that used to take a human writer hours or days can seemingly be accomplished in
    seconds.'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 我们越来越被承诺节省时间、减少麻烦并使生活更加顺滑的数字技术所包围。生成式人工智能是一个典型的例子，因为它从用户到技术的劳动转移是革命性的：一条简单的提示就能产生一千个单词。突然之间，一个过去需要人类作家数小时或数天才能完成的任务，似乎可以在几秒钟内完成。
- en: This technical feat is so audacious, so dazzling, that to question it can feel
    ridiculous. A time saving of literally days, and you’re going to turn it down?
    Since our society runs on a paradigm of ‘faster is better’, we eagerly buy into
    the acceleration of another aspect of our lives, without asking whether we really
    need the extra speed – or even want it. And if the solution is free to use, as
    new technologies usually are in their early days, that sweetens the deal even
    more.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 这项技术成就如此大胆，如此耀眼，以至于质疑它可能会感觉荒谬。节省的时间可以说是几天，你却要拒绝它？鉴于我们的社会运行在“更快更好”的范式下，我们急切地接受我们生活中另一个方面的加速，而不去询问我们是否真的需要额外的速度——甚至是否想要它。而且如果解决方案是免费使用的，就像新技术在其早期通常那样，那么这会让交易更加甜蜜。
- en: When a new device automates a task that we previously did ourselves, it throws
    the spotlight onto the task itself. Before, we accepted it as an inevitable part
    of life, without constantly complaining that it was taking ‘too long’. It took
    as long as it took. But now, we suddenly see the hours we’re spending on it and
    feel elated at the thought of claiming them back. This bountiful windfall of previously
    ‘wasted’ time is what gives labour-saving technologies their powerful appeal.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 当一种新设备自动化了我们以前自己完成的任务时，它将焦点投向了这项任务本身。以前，我们把它视为生活中不可避免的一部分，而没有不断地抱怨它“花费了太多时间”。它花费了它需要的时间。但现在，我们突然看到了我们在这上面花费的时间，并因为想到要夺回这些时间而感到兴奋。这种以前被认为是“浪费”的宝贵时间的大量收益，正是节省劳动技术的强大吸引力所在。
- en: However, that feeling doesn’t last. After a while, we no longer notice the time
    we’ve supposedly saved. Obeying Parkinson’s Law, our other tasks have expanded
    to fill the time available, leaving us just as busy and hassled as before. So
    what are we saving time for? If we save time on writing, what will we spend it
    on instead? And whatever the alternative is, are we certain it will it bring us
    greater benefit than writing itself?
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种感觉不会持续太久。过了一段时间，我们就不再注意到我们所谓节省的时间。遵循帕金森定律，我们的其他任务已经扩展到填补可用的时间，让我们仍然像以前一样忙碌和烦恼。那么我们节省时间是为了什么？如果我们节省了写作的时间，我们将用它来做什么？而且无论替代方案是什么，我们是否确定它将给我们带来比写作本身更大的好处？
- en: In the workplace, new technology is often pitched as ‘freeing up employees’
    time’ for ‘higher-value activities’ – but that’s usually managerial code for automating
    people out of a job. Perhaps the endpoint is an idyllic future where machines
    do all the work while we kick back and chill out. Some leftwing commentators even
    envisage a future of ‘fully automated luxury communism’, where the gains of automation
    will be equally shared or publicly owned and we’ll all enjoy a life of leisure.[88](#cER.xhtml#aKE)
    But for as long as we live under a capitalist system, the only tasks to be digitally
    automated will be those that will make profits, attract investment or drive growth
    for tech firms. Despite OpenAI’s lofty aspirations to ‘benefit humanity as a whole’,
    it’s far from clear as yet what real-world problems generative AI will actually
    solve.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作场所，新技术常常被宣传为“为员工节省时间”，以便进行“更高价值的活动”——但这通常只是管理者用自动化手段将人们从工作中排挤出去的代名词。或许，最终目标是实现一个理想的未来，在那里机器做所有的工作，而我们则放松身心。一些左翼评论家甚至设想了一个“完全自动化的奢侈共产主义”的未来，在那里自动化的收益将平等共享或归公众所有，我们都将享受休闲的生活。[88](#cER.xhtml#aKE)
    但只要我们生活在资本主义体系下，将被数字化自动化的任务将是那些能带来利润、吸引投资或推动科技企业增长的任务。尽管OpenAI有着崇高的愿望，即“为整个人类造福”，但目前还远不清楚生成式AI将实际解决哪些现实问题。
- en: ‘Faster is better’ is a paradigm well suited to software development or industrial
    production. But when we apply it to our own lives, we pay a price in terms of
    our humanity, our relationships and our embodied engagement with the world. If
    we shape our lives around machines, we become more machine-like ourselves.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: “更快更好”是一种非常适合软件开发或工业生产的范式。但当我们将其应用于我们的生活时，我们付出的代价是失去了人性、人际关系以及与世界互动的亲身感受。如果我们围绕机器塑造我们的生活，我们自己也会变得更加像机器。
- en: By emphasising efficiency and productivity at the expense of human purpose,
    emotion and cognition, ChatGPT turns writing into a production line for words.
    But greater productivity is only worthwhile if you are producing something of
    value. As Peter Drucker said, ‘There is nothing so useless as doing efficiently
    that which should not be done at all.’
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT通过牺牲人类目的、情感和认知来强调效率和生产力，将写作变成了一个单词的生产线。但更高的生产力只有在生产有价值的东西时才有意义。正如彼得·德鲁克所说：“没有什么比做那些根本不应该做的事情更无用了。”
- en: A similar point applies to our own time. Instead of relying on a quantitative,
    monetary metaphor of ‘saving’ and ‘spending’ time, we should consider the quality
    of our time and what we do with it. Perhaps, instead of doing things better, we
    need to be doing better things.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的情况也适用于我们自己的时代。我们不应仅仅依赖于“节省”和“消费”时间的量化、货币化隐喻，而应考虑我们时间的质量以及我们如何利用它。或许，我们需要的不是把事情做得更好，而是去做更好的事情。
- en: Anthropologist Thomas Hylland Eriksen draws a distinction between ‘fast time’
    and ‘slow time’.[89](#cER.xhtml#aRH) Fast-time activities can be accelerated with
    no ill effects. For example, a washing machine does laundry far more quickly than
    we could do it by hand, and this is generally beneficial. Unless we genuinely
    enjoy washing our clothes by hand, there’s little to be gained from taking more
    time over it.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 人类学家托马斯·希尔兰·埃里克森区分了“快时间”和“慢时间”。[89](#cER.xhtml#aRH) 快时间活动可以加速进行，而不会产生不良影响。例如，洗衣机洗衣服比我们手工洗得快得多，这通常是有益的。除非我们真正喜欢手工洗衣服，否则在这一点上花费更多的时间是得不到什么好处的。
- en: However, there are also slow-time tasks, which cannot be sped up because they
    involve the mind as well as the hands. Writing is one such slow-time activity.
    Our brains are not computers, and they need time to deduce, reason, evaluate and
    reconsider. So yes, writing manually does take a ‘long’ time in comparison to
    the instant results of ChatGPT. But that’s a feature, not a bug. Spending time
    on writing is the whole point.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，也有一些慢时间任务，因为它们既涉及思维也涉及手工，所以不能加快速度。写作就是这样一种慢时间活动。我们的头脑不是计算机，它们需要时间来推理、思考、评估和重新考虑。所以，是的，与
    ChatGPT 的即时结果相比，手动写作确实需要“更长”的时间。但这不是缺陷，而是特性。在写作上花费时间是整个目的。
- en: I want AI to do my laundry and dishes so that I can do art and writing, not
    for AI to do my art and writing so that I can do my laundry and dishes.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望人工智能帮我洗衣服和餐具，这样我就可以从事艺术和写作，而不是让人工智能帮我从事艺术和写作，这样我就可以洗衣服和餐具。
- en: JOANNA MACIEJEWSKA[90](#cER.xhtml#aPV)
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: JOANNA MACIEJEWSKA[90](#cER.xhtml#aPV)
- en: Imagine that some ingenious tech startup has invented a teleportation device
    that will take you anywhere on earth at the click of a button. When you’ve had
    enough, you can return to your armchair with another click. Instead of looking
    up landmarks like the Taj Mahal or the Pyramids online, we’d zip over to see them
    for real. However, we’d probably only stay for the highlights, and gladly miss
    out flight delays, hotel transfers, puzzling over maps and struggling with the
    local language. Why spend time on the ‘in-between’ stuff when you can fast-forward
    to the good bits?
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，某个天才的技术初创公司发明了一种传送装置，可以一键将你带到地球上的任何地方。当你玩够了，你可以再按一下按钮回到你的扶手椅上。我们不再需要在网上查找像泰姬陵或金字塔这样的地标，我们会飞快地去看它们。然而，我们可能只会停留在亮点上，并乐意错过航班延误、酒店转移、在地图上困惑以及与当地语言作斗争。当你可以快进到好片段时，为什么还要浪费时间在“中间”的事情上呢？
- en: However, while that sort of instant tourism might be fun once or twice, ultimately
    it would be unrewarding and hollow. You wouldn’t feel that you’d earned the enjoyment,
    because the point of travelling is not merely to arrive, but to travel. The experience
    includes everything that happens, both good and bad, from departure to arrival
    and back again.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管这种即时旅游可能一开始很有趣，但最终它将是不值得的，是空洞的。你不会觉得你赢得了这种享受，因为旅行的目的不仅仅是到达，而是旅行。这种经历包括从出发到到达以及返回过程中发生的所有事情，无论是好是坏。
- en: ChatGPT is a teleporter for text. It offers to take us straight to the destination,
    missing out all the difficult stuff in between. If we don’t like where we end
    up, we can discard it and demand a new version, free of charge, over and over
    again. But that one-click convenience ends up making the writing process and its
    output too slight and insubstantial. Since we’re not putting that much in, nor
    will we get that much out. In Thomas Paine’s words, ‘That which we obtain too
    easily, we esteem too lightly.’
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是文本的传送门。它承诺直接带我们到达目的地，跳过所有中间的困难。如果我们不喜欢最终的结果，我们可以丢弃它，并免费要求一个新的版本，一次又一次。但这种一键便利最终使得写作过程及其产出变得过于轻微和不真实。因为我们没有投入那么多，所以我们也不会得到那么多。用托马斯·潘恩的话说，“我们获得得太容易的东西，我们评价得太轻率。”
- en: 'I hate to be the bearer of bad news, but there are no short cuts. The more
    deeply you engage with your writing, and the longer and harder you work at it,
    the better your results will be. It’s like gravity: you can’t escape it.'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 我不愿意成为坏消息的传递者，但没有任何捷径。你越深入地参与写作，你在这上面投入的时间越长、工作越努力，你的结果就会越好。这就像重力一样：你无法逃避它。
- en: Indeed, as I hope I’ve shown in this book, using ChatGPT is fundamentally different
    from writing by hand – not just by degree (faster, cheaper, more ‘efficient’),
    but by nature. While the output – some text – is nominally the same, that’s where
    the similarities end. When you use ChatGPT, what you are doing is not writing
    in any meaningful sense of the word.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，正如我希望我在这本书中已经展示的那样，使用ChatGPT与手写写作在本质上是有区别的——不仅仅是程度上的（更快、更便宜、更“高效”），而且是本质上的。虽然输出——一些文本——在名义上是相同的，但相似之处到此为止。当你使用ChatGPT时，你所做的并不是在真正意义上的写作。
- en: 'That is why something more significant than textual quality is at stake: your
    own standing as a writer, and even your character as a person. The labour of writing
    is edifying: it ignites curiosity, strengthens intellect, sharpens reasoning,
    focuses attention and builds moral muscle. The point of writing is not just to
    write your text, but to become the person who wrote it. Each act of writing creates
    both a text and an author. While ChatGPT may seem to give you the output you want,
    it denies you the experience of creating it, and all the benefits that may bring.
    In the end, the reward you get from writing is not just the text you create, but
    also the person you become.'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 正因为如此，不仅仅是文本质量至关重要：你的作家地位，甚至你作为一个人的品格都受到威胁。写作的劳动是富有教育意义的：它激发好奇心，增强智力，锐化推理，集中注意力，并培养道德肌肉。写作的目的不仅仅是写出你的文本，而是成为写出它的人。每一次写作行为都创造了一篇文本和一个作者。虽然ChatGPT似乎能给你你想要的输出，但它剥夺了你创造它的体验，以及可能带来的所有好处。最终，你从写作中获得的回报不仅仅是你创造的文本，还有你成为的人。
- en: HOW TO WRITE LIKE A HUMAN
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何像人类一样写作**'
- en: Twelve ideas to keep the humanity in your writing and make it stand out from
    content generated by AI.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 十二个想法，以保持你的写作中的人类特质，并使其区别于由AI生成的内容。
- en: Start strong
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 开门见山
- en: 'ChatGPT often takes a ‘student essay’ approach to structure by beginning with
    a bland declaration or introductory statement. Make your writing stand out by
    crafting an opening that’s calculated to grab reader interest from the start.
    For example:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 通常采用“学生论文”的结构方法，从平淡的声明或介绍性陈述开始。通过精心设计的开头来吸引读者的兴趣，让你的写作从一开始就脱颖而出。例如：
- en: 'Start a story in the middle, piquing your reader’s interest so they just have
    to read on:'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从故事的中段开始，激发读者的兴趣，使他们不得不继续阅读：
- en: Two weeks passed and it happened again.[91](#cER.xhtml#aKH)
  id: totrans-292
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 两个星期过去了，它又发生了。[91](#cER.xhtml#aKH)
- en: 'Open with a counterintuitive or little-known fact that intrigues the reader
    and makes them want to know more:'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以一个令人意想不到或鲜为人知的事实开始，激发读者的好奇心，并使他们想要了解更多：
- en: 'If you can’t stand hearing your uncle pontificate at Thanksgiving, you could
    be suffering from Allodoxaphobia: the fear of other people’s opinions.'
  id: totrans-294
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你无法忍受在感恩节听到你的叔叔滔滔不绝地布道，你可能正在遭受Allodoxaphobia：对他人意见的恐惧。
- en: 'Open with a thought-provoking question that gets the reader thinking:'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以一个引人深思的问题开始，让读者开始思考：
- en: If you had just one day left on earth, what would you do?
  id: totrans-296
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你只剩一天在地球上，你会做什么？
- en: If you’re struggling with your opening, delete your first sentence and see how
    the first paragraph works without it.
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你对你的开头感到困惑，删除你的第一句话，看看没有它第一段是如何工作的。
- en: As you review your writing, imagine that your one and only job is to make the
    reader read the following sentence.
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你审阅你的写作时，想象你唯一的工作就是让读者阅读接下来的句子。
- en: Draw on experience
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 借鉴经验
- en: 'As we’ve seen, ChatGPT doesn’t really understand what it means to live a human
    life, and it may never be able to. So bring individual human experience into your
    writing whenever you can. For example:'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，ChatGPT 并不完全理解什么是人类生活，它可能永远无法做到。因此，在可能的情况下，将个人的生活经验融入到你的写作中。例如：
- en: 'Link your own experience to the subject. Talk about relevant events from your
    life, or how you’ve been affected by the topic at hand:'
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将你的个人经历与主题联系起来。谈谈你生活中的相关事件，或者这个话题是如何影响你的：
- en: Mental illness can strike anyone, anytime – but from the outside, you might
    not even know anything was wrong. That’s exactly what happened to me when I began
    suffering from depression in my 30s.
  id: totrans-302
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 精神疾病可能随时袭击任何人——但对外人来说，你可能甚至不知道出了什么问题。这正是我在30多岁时开始遭受抑郁症时发生的事情。
- en: Talk about the reader’s own experience and link it to the subject. Describe
    events or situations they might recognise, either from their own experience or
    those of other people close to them.
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论读者的个人经历，并将其与主题联系起来。描述他们可能从自己的经历或他们亲近的人的经历中认识到的事件或情况。
- en: Use culturally specific details that you know will resonate for your readers,
    either because they recognise them specifically or because they know something
    similar. For example, refer to customs, history, geographical features, weather,
    landmarks or food and drink.
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用你了解的、会让读者产生共鸣的文化特定细节，无论是他们能具体识别出来，还是因为他们知道类似的东西。例如，提及习俗、历史、地理特征、天气、地标或食物和饮料。
- en: Tell human stories in the form of anecdotes, case studies, vignettes and so
    on. If you can’t tell a specific true story, tell a typical one as an illustration
    or general example.
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以轶事、案例研究、短篇故事等形式讲述人类故事。如果你不能讲述一个具体的事实故事，就讲述一个典型的故事作为说明或一般例子。
- en: Include sensory details – sights, sounds, smells, tastes and textures. Evoke
    sensory cues that will encourage readers to consult their own sensory ‘memory
    banks’ to reconstruct an experience in their own minds.
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含感官细节——视觉、听觉、嗅觉、味觉和触觉。唤起感官线索，鼓励读者查阅他们自己的感官“记忆库”，在自己的脑海中重建一个经历。
- en: Follow your feelings
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 跟随你的感受
- en: No tears in the writer, no tears in the reader. No surprise in the writer, no
    surprise in the reader.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 作者不流泪，读者不流泪。作者不惊讶，读者不惊讶。
- en: ROBERT FROST
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 罗伯特·弗罗斯特
- en: Readers buy into writing when they sense that the writer themselves is engaged.
    However, ChatGPT only understands the language of emotion, not the emotions themselves,
    so it can never fake this type of engagement.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 当读者感觉到作者自己也投入其中时，他们会接受写作。然而，ChatGPT只能理解情绪的语言，而不是情绪本身，所以它永远无法假装这种投入。
- en: To give your writing some emotional weight, talk about feelings whenever you
    can. It doesn’t really matter what the feeling is – curiosity, disgust, anger,
    compassion, sadness or joy. You can talk about what you feel, things that others
    may be feeling or the feelings of made-up characters. Just make sure that the
    feeling fits with whatever you’re writing about.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你的写作增添一些情感分量，尽可能多地谈论感受。实际上，感受是什么并不重要——好奇心、厌恶、愤怒、同情、悲伤或快乐。你可以谈论你自己的感受，其他人可能有的感受，或者虚构角色的感受。只要确保这种感受与你所写的内容相符。
- en: Don’t be afraid to tune into your own feelings as a first indication. If you
    need to research online, that’s fine – but look at other people’s words yourself
    rather than asking ChatGPT to process them on your behalf. The tiniest word or
    phrase, as used by a real-world human writer, could be the key to expressing the
    emotion that you need.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 不要害怕关注你自己的感受作为第一指示。如果你需要在线研究，那没问题——但请亲自查看他人的文字，而不是让ChatGPT代表你处理它们。一个真实世界的人类作者使用的最微小的词或短语，可能是表达你所需要情绪的关键。
- en: Write like people talk
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 写得像人们说话
- en: ChatGPT struggles with dialogue, and usually has to be told to imitate the style
    of a novelist before it can come up with anything remotely believable.[92](#cER.xhtml#aME)
    That’s because it’s only ever consumed text as a symbolic code and has never heard
    the everyday language that you have been immersed in all your life. ChatGPT can
    imitate formal structures like sonnets with ease, but it has no sense of how people
    in the real world actually talk to each other.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在处理对话方面有困难，通常在能够提出任何稍微可信的内容之前，必须告诉它模仿小说家的风格。[92](#cER.xhtml#aME) 这是因为它始终只以符号代码的形式消费文本，从未听过你一生中沉浸其中的日常语言。ChatGPT可以轻松模仿如十四行诗这样的正式结构，但它没有意识到现实世界中人们实际上是如何交谈的。
- en: Most readers ‘hear’ written words in their heads as they read,[93](#cER.xhtml#aP6)
    and the ‘sound’ of written language in the mind’s ear has a big impact on its
    cognitive fluency, or how easy it is to understand. That’s why reading your text
    out loud, or having someone read it to you, is such a great way to review it.
    If your writing sounds like something a human being would actually say, your reader
    is much more likely to enjoy the reading experience and buy into your story or
    message. This applies to all forms of writing, not just fictional dialogue.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数读者在阅读时会“听到”他们头脑中的文字，[93](#cER.xhtml#aP6) 心中文字的“声音”对其认知流畅性或理解起来有多容易有重大影响。这就是为什么大声朗读你的文本或让别人为你朗读是如此好的审阅方式。如果你的写作听起来像人类实际上会说的话，你的读者更有可能享受阅读体验，并接受你的故事或信息。这适用于所有形式的写作，而不仅仅是虚构对话。
- en: What’s more, everyday speech expresses purpose – which, as we’ve seen, is the
    foundation of every piece of writing. While people do sometimes chat idly to each
    other for fun, they engage in purposeful conversation when they want to get something
    done. That sense of drive and motivation is the energy that drives many types
    of writing, from dramatic dialogue to marketing copy.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，日常语言表达了目的——正如我们所看到的，这是每一篇写作的基础。虽然人们有时会闲聊以取乐，但当他们想要完成某事时，他们会进行有目的的对话。那种驱动和动机的感觉是推动许多类型写作的能量，从戏剧对话到营销文案。
- en: You can get close to real-world speech patterns just by listening to what people
    say. Tune in to conversations at work, on the bus, in the bar or anywhere else
    people are talking and pick up phrases you can bring into your writing.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需通过倾听人们说的话，就可以接近现实世界的说话模式。在工作、公交车上、酒吧或任何人们交谈的地方倾听对话，并挑选出你可以带入你写作中的短语。
- en: This obviously works well for fiction, but it has commercial applications too.
    For example, businesspeople describing their product or service in conversation
    will often use casual but colourful phrases that they would never write down.
    But copywriters can pick up these phrases and use them, knowing that they will
    resonate more with readers than business-speak.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 这显然对小说很有用，但它也有商业应用。例如，商人在对话中描述他们的产品或服务时，通常会使用非正式但色彩丰富的短语，他们永远不会写下来。但文案人员可以挑选出这些短语并使用它们，知道它们会比商业语言更能引起读者的共鸣。
- en: Get poetic
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 变得诗意
- en: ChatGPT works by calculating the ‘average’ descriptions of things across multiple
    pieces of existing writing. So, to stand out, see if you can find a more unusual
    and poetic way to describe something. It doesn’t have to be pretentious, ostentatious
    or wilfully weird – just a less common form of words that expresses some important
    truth.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT通过计算多篇文章中事物的“平均”描述来工作。因此，为了脱颖而出，看看你是否能找到一种更不寻常、更有诗意的描述方式。这不必是自负的、炫耀的或故意奇怪的——只需是一种表达某些重要真理的较少见的词语形式。
- en: One excellent way to bring a touch of colour into your writing is with similes
    and metaphors. These are ways to understand one thing in terms of another, using
    a shared characteristic as a bridge from the reader’s existing knowledge to a
    new idea that you want them to understand.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的写作中添加一抹色彩的一个极好方式是使用明喻和隐喻。这些是通过使用共同特征作为桥梁，将一个事物理解为另一个事物的方法，从读者的现有知识到你想让他们理解的新想法。
- en: 'A simile is when you make a ‘like’ comparison between the two things. For example:'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 明喻是你对两个事物进行“像”的比较。例如：
- en: 'Four-colour printing is like painting with just four colours: cyan, magenta,
    yellow and black.'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 四色印刷就像只用四种颜色：青色、品红色、黄色和黑色来绘画。
- en: 'A metaphor is when you make a comparison by saying that the first thing simply
    is the second thing. For example:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 隐喻是你通过说第一件事简单地就是第二件事来进行比较。例如：
- en: 'Boredom is the deserted station of the mind: an empty platform at which a new
    idea can arrive at any time.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 厌倦是心灵的荒凉车站：一个新想法可以随时到达的空站台。
- en: ChatGPT only knows about metaphors and similes that have already been written,
    and while it can see the words that have been used (known as the vehicle of a
    metaphor), it doesn’t understand the underlying reality (known as the tenor).
    So you can make your writing stand out by finding a new metaphor that will make
    reality come alive for your reader.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT只知道已经写下的隐喻和明喻，虽然它可以看到被使用的词语（被称为隐喻的载体），但它并不理解背后的现实（被称为隐喻的底本）。因此，你可以通过找到一个能让现实为读者生动起来的新隐喻来让你的写作脱颖而出。
- en: Look beyond lists
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 超越列表
- en: When asked to research or summarise a topic, ChatGPT naturally devolves to writing
    a bullet-point list, or ‘listicle’, comprising several items of equal length.
    This shows that it doesn’t really understand why one aspect might be more compelling
    or intriguing than another. Break out of this rigid structure by spending more
    time on the points that most interest you, or that you feel will most interest
    your reader. If an interesting tangent occurs to you, go with it for a while and
    see where it leads. If there’s a way to link things together in a timeline or
    story, explore that as an option too.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 当被要求研究或总结一个主题时，ChatGPT自然地退化到编写一个等长的项目符号列表，或称为“清单文章”，包含几个项目。这表明它实际上并不真正理解为什么某个方面可能比另一个方面更有吸引力或更引人入胜。通过花更多时间在你最感兴趣或你认为最能引起读者兴趣的点上，或者如果你想到一个有趣的旁白，就跟随它一段时间，看看它会引向何方。如果有一种方法可以将事物通过时间线或故事联系起来，也可以探索这个选项。
- en: Say something new
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 说出一些新东西
- en: ChatGPT is trained on existing text, so it can’t come up with anything new.
    You can stand out by offering something original in your writing. It could be
    first-hand research, interview quotes or just your own observations. If you conduct
    your own research, share your theories, methods and findings – including both
    what you proved and what you disproved.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是在现有文本上训练的，所以它无法创造出任何新东西。你可以在你的写作中提供一些原创内容来脱颖而出。这可以是第一手研究、采访引语，或者仅仅是你的观察。如果你进行自己的研究，分享你的理论、方法和发现——包括你证明了什么和什么被你证伪了。
- en: Use your imagination
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 发挥你的想象力
- en: 'Everyone wants to know what will happen next. But because ChatGPT is intrinsically
    backward-looking, it can’t imagine the future. If you ask it to, you’ll simply
    get what other people have previously imagined. So extrapolating trends or speculating
    on future events is another way to give your text a human flavour. For example:'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都想知道接下来会发生什么。但由于ChatGPT本质上具有回顾性，它无法想象未来。如果你要求它，你只会得到其他人之前想象的内容。因此，预测趋势或对未来事件进行推测是给你的文本增添人性味道的另一种方式。例如：
- en: It seems likely that we’ll have to get used to gardening with much less water
    in the future. But I don’t believe people will ever want to give up the classic
    design of the English garden. Instead, we’ll switch out our moisture-loving perennials
    for more drought-tolerant equivalents, use trees to cast strategic shade and consider
    alternatives to lawn grass such as thyme and sedum. While they may take some getting
    used to, it has to be better than looking at a parched garden throughout the summer
    months.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 似乎我们未来不得不习惯在更少的水资源下进行园艺。但我相信人们永远不会放弃经典的英国花园设计。相反，我们将用更耐旱的替代品替换我们喜爱的多年生植物，利用树木投射战略性的阴影，并考虑替代草坪草如百里香和石莲花。虽然这可能需要一些适应，但总比在整个夏季看到干涸的花园要好。
- en: Lean into your expertise
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 依靠你的专业知识
- en: ChatGPT is, by definition, a generalist – it promises to write anything about
    anything. So if you’re an expert on your subject, show it in your writing. Go
    beyond a superficial overview and get deep into the fine details of your expertise.
    Work through examples or case studies in detail, giving your commentary on every
    step or element.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT按定义是一个通才——它承诺写任何关于任何东西。所以如果你是你主题的专家，在你的写作中展示这一点。超越表面的概述，深入到你专业知识的最细微之处。详细处理例子或案例研究，对每一步或每个元素进行评论。
- en: Cite them right
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 正确引用
- en: As we’ve seen, ChatGPT is a ‘black box’ that doesn’t use verbatim quotes or
    reveal any of the sources it uses. That gives you a means of differentiation right
    there. However, you can also go further by weaving the quotes and ideas from your
    sources into your own narrative, as if you were having a respectful ‘conversation’
    with the authors you cite. That situates your writing as part of a wider discussion
    and avoids the curious detachment that characterises a lot of AI writing.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所看到的，ChatGPT是一个“黑箱”，它不会使用逐字引用，也不会透露它所使用的任何来源。这为你提供了一个差异化的手段。然而，你也可以更进一步，将你来源中的引语和观点编织到你的叙述中，就像你正在与引用的作者进行尊重的“对话”一样。这使你的写作成为更广泛讨论的一部分，并避免了大量AI写作所具有的奇特疏离感。
- en: Speak to the group
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 与群体对话
- en: If you’re writing for a particular audience, see if you can refer to shared
    experiences or specialist language that only members of that group will know.
    Referring to things that readers recognise builds trust and rapport, making them
    more likely to listen to what you say.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你为特定的受众写作，看看你是否可以提及共享的经历或只有该群体成员才会知道的专业术语。提及读者能识别的事物可以建立信任和联系，使他们更有可能听你所说的话。
- en: Tell a joke
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 讲一个笑话
- en: While ChatGPT can produce humorous writing ‘to order’, it’s merely recycling
    funny stuff that humans have previously written. It doesn’t understand why things
    are funny, or why things are funny in certain contexts and not others. As a result,
    it can’t bring humour into an otherwise serious piece to dispel tension or lighten
    the mood.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT可以“定制”地生成幽默的写作，但它只是在重复人类之前写过的有趣内容。它不理解为什么某些事情是幽默的，或者为什么在某些情境下某些事情是幽默的，而在其他情境下则不是。因此，它无法将幽默融入一个本应严肃的作品中，以缓解紧张或轻松气氛。
- en: 'So, without forcing a joke where it’s not appropriate, add a touch of humour
    to your writing to reaffirm your humanity. You can usually do this in all but
    the most serious subjects (for example, dealing with death or serious illness).
    For example:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在不合适的地方强迫笑话之外，给你的写作中加入一点幽默，以重申你的人性。你通常可以在除了最严肃的主题之外的所有情况下做到这一点（例如，处理死亡或严重疾病）。例如：
- en: When I started out as an editor, my boss told me that the strongest desire was
    not sex or greed, but the desire to change someone else’s text. He was absolutely
    right – but he also taught me that the best editors know when to wade in and when
    to sit tight. A light touch goes a long way.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始做编辑时，我的老板告诉我，最强的欲望不是性或贪婪，而是改变他人文本的欲望。他完全正确——但他也教会了我，最好的编辑知道何时介入，何时保持沉默。轻柔的触摸可以走得很远。
- en: AFTERWORD
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 后记
- en: Afterword
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 后记
- en: The starting point for this book was my angry rants in the pub about the evils
    of ChatGPT, why it wouldn’t really help people and why they should do their own
    writing. After a while, it occurred to me that instead of hectoring my poor friends
    about it, I should write down my thoughts for those who are actually interested.
    And you’ve just finished reading the result.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的起点是我对酒吧里关于ChatGPT恶行的愤怒抱怨，为什么它实际上不会真正帮助人们，以及为什么他们应该自己写作。过了一段时间，我突然想到，与其责备我那可怜的朋友，不如把我的想法写下来给真正感兴趣的人看。而你刚刚读完了这个结果。
- en: I guess this book comes across as angry and self-righteous in places. But the
    truth is that I don’t really mind if you want to use ChatGPT. It’s fun to play
    around with and it can sometimes spark ideas, even if the origin of those ideas
    is someone else’s writing. I just want people to appreciate the craft of writing
    and understand why it’s part of being human. If I’ve achieved that with this book,
    I’m more than satisfied.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这本书在某些地方显得愤怒且自以为是。但事实是，如果你想使用ChatGPT，我并不真的介意。玩弄它很有趣，它有时可以激发灵感，即使这些想法的来源是别人的写作。我只是希望人们能够欣赏写作的技艺，并理解为什么它是人类的一部分。如果这本书能让我达到这个目标，我就非常满足了。
- en: Many thanks for reading, and good luck with whatever you choose to write.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 非常感谢您阅读，祝您在您选择的写作中好运。
