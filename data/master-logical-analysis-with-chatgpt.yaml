  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑谬误：仓促归纳 - 基于不充分证据得出结论。
- en: 'Non Sequitur: None.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 非因果律：无。
- en: 'Consistency and Coherence: The argument lacks coherence as it relies on a generalization
    without considering individual differences.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性和连贯性：论证缺乏连贯性，因为它依赖于一个没有考虑个体差异的概括。
- en: '* * *'
