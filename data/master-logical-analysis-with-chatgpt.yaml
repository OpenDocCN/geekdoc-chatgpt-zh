  type: TYPE_NORMAL
  zh: 分析论证的强度并评估其有效性。
- en: Identify any logical fallacies present in the argument.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别论证中存在的任何逻辑谬误。
- en: Identify any instances of non sequiturs.
