  type: TYPE_NORMAL
  zh: 前提 1：所有哺乳动物都是热血动物。前提 2：海豚是哺乳动物。结论：因此，海豚是热血动物。
- en: 'Type of Reasoning: Deductive Reasoning'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 推理类型：演绎推理
- en: 'Strength of Argument: Strong. The conclusion logically follows from the premises.'
