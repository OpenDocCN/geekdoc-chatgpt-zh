  id: totrans-1000
  prefs: []
  type: TYPE_IMG
  zh: '![流程图示意图 描述自动生成](d2d_images/image001.png)'
- en: '![A diagram of a computer Description automatically generated with medium confidence](d2d_images/image003.png)'
  id: totrans-1001
  prefs: []
  type: TYPE_IMG
  zh: '![计算机示意图 自动生成，中等置信度](d2d_images/image003.png)'
