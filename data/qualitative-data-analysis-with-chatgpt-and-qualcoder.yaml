- en: 'Q ualitative Data Coding : Manual vs. Automated Import Methods in QualCoder'
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: QualCoder 中的定性数据编码：手动与自动导入方法
- en: 'In qualitative analysis, importing and organizing data within QualCoder can
    be approached in three distinct ways: Manual Coding , Semi-Automated Import with
    ChatGPT Assistance , and Fully Automated Import via API Integration . Each method
    has unique benefits and limitations, and the best approach depends on factors
    such as research needs, available time, technical skills, and desired engagement
    with the data (Figure 10.5).'
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: 在定性分析中，在QualCoder中导入和组织数据可以采用三种不同的方法：手动编码、半自动导入并辅以ChatGPT的帮助，以及通过API集成实现的全自动导入。每种方法都有其独特的优点和局限性，最佳方法取决于研究需求、可用时间、技术技能以及与数据的期望互动等因素（图10.5）。
- en: Only the Manual Coding option (Option 1) falls within the scope of this book,
    covering the complete process of importing, coding, and organizing data manually
    within QualCoder. The Semi-Automated Import and Fully Automated Import via API
    Integration (Options 2 and 3) are outside the scope of this book and require advanced
    technical knowledge and tools that go beyond this guide’s focus.
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 只有手动编码选项（选项1）在本书的范围内，涵盖了在QualCoder中手动导入、编码和组织数据的完整过程。半自动导入和通过API集成实现的全自动导入（选项2和3）超出了本书的范围，需要更高级的技术知识和工具，这些超出了本指南的焦点。
- en: 1\. Manual Import and Coding
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 手动导入和编码
- en: 'Steps:'
  id: totrans-1599
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤：
- en: 'Step 1: Upload Transcript Files'
  id: totrans-1600
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1步：上传转录文件
- en: Navigate to File > Import in QualCoder.
  id: totrans-1601
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在QualCoder中导航到文件 > 导入。
- en: Select and upload qualitative data files, such as interview or focus group transcripts.
  id: totrans-1602
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择并上传定性数据文件，如访谈或焦点小组的转录文件。
- en: Organize and label the imported files by participant, interview number, or relevant
    metadata.
  id: totrans-1603
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据参与者、访谈编号或相关元数据对导入的文件进行组织和标记。
- en: 'Step 2: Manual Coding Based on ChatGPT Insights'
  id: totrans-1604
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2步：基于ChatGPT洞察的手动编码
- en: Begin by reviewing ChatGPT’s outputs, including suggested codes, themes, and
    potentially useful quotes or phrases.
  id: totrans-1605
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，审查ChatGPT的输出，包括建议的代码、主题以及可能有用的引言或短语。
- en: In QualCoder, create new codes based on these suggestions, or modify them as
    necessary to suit your research context.
  id: totrans-1606
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在QualCoder中，根据这些建议创建新的代码，或根据需要修改它们以适应你的研究背景。
- en: Open each transcript and manually review the text. Highlight relevant sections
    and assign codes as you proceed.
  id: totrans-1607
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开每个转录本并手动审查文本。在继续的过程中突出相关部分并分配代码。
- en: By manually applying codes, you control the interpretation of ChatGPT’s insights
    and engage closely with the data.
  id: totrans-1608
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过手动应用代码，你控制着ChatGPT洞察的解释，并与数据紧密互动。
- en: 'S TEP 3: BUILD A CODE Tree'
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：构建代码树
- en: As you code, you can structure related codes into themes and sub-themes, forming
    a hierarchical code tree.
  id: totrans-1610
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在编码过程中，你可以将相关的代码结构化为主题和子主题，形成一个层次化的代码树。
- en: Group similar codes, label overarching themes, and make adjustments based on
    your understanding of the data and ChatGPT’s suggestions.
  id: totrans-1611
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将相似代码分组，标记总体主题，并根据你对数据和ChatGPT建议的理解进行调整。
- en: This iterative process ensures that you remain connected to the data while benefiting
    from ChatGPT’s automated suggestions.
  id: totrans-1612
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个迭代过程确保你在从ChatGPT的自动建议中受益的同时，保持与数据的连接。
- en: 'Pros of Manual Coding:'
  id: totrans-1613
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 手动编码的优点：
- en: 'Deep Engagement : Allows you to engage fully with the data, improving the quality
    and validity of insights.'
  id: totrans-1614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度参与：允许你完全与数据互动，从而提高洞察的质量和有效性。
- en: 'Complete Control : Researchers retain control over which sections to code,
    ensuring that interpretations are researcher-led.'
  id: totrans-1615
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全控制：研究人员保留对要编码的章节的控制权，确保解释由研究者主导。
- en: 'Flexibility : You can modify ChatGPT’s suggestions, adapting the codes and
    themes as new patterns or insights emerge during coding.'
  id: totrans-1616
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 灵活性：你可以修改ChatGPT的建议，根据编码过程中出现的新模式或洞察调整代码和主题。
- en: 'Cons of Manual Coding:'
  id: totrans-1617
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 手动编码的缺点：
- en: 'Time-Intensive : Manually applying codes across lengthy transcripts can be
    time-consuming, especially for large datasets.'
  id: totrans-1618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 耗时：在较长的转录本上手动应用代码可能耗时，尤其是对于大型数据集来说。
- en: 'Risk of Inconsistency : In manual coding, there may be variations in coding
    style or focus, depending on the researcher’s interpretation at different stages.'
  id: totrans-1619
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不一致性风险：在手动编码中，编码风格或重点可能会因研究者在不同阶段的解释而有所不同。
- en: 'Labor-Intensive Code Structuring : Organizing codes into themes can require
    significant effort to maintain consistency and hierarchy.'
  id: totrans-1620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 劳动密集型代码结构化：将代码组织到主题中可能需要大量努力以保持一致性和层次结构。
- en: 2 . AUTOMATED IMPORT and Coding (with ChatGPT)
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 自动导入和编码（含ChatGPT）
- en: The automated method uses ChatGPT to generate codes and themes, which are then
    imported into QualCoder with minimal manual intervention. While currently limited
    in full automation, this method offers a semi-automated approach to streamline
    the coding process (Table 10.1).
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 自动方法使用ChatGPT生成代码和主题，然后通过最小的人工干预导入QualCoder。虽然目前尚未实现完全自动化，但这种方法提供了一种半自动化的方法来简化编码过程（表10.1）。
- en: 'Steps:'
  id: totrans-1623
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤：
- en: 'Step 1: Open Coding in ChatGPT'
  id: totrans-1624
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1步：在ChatGPT中进行开放式编码
- en: Use ChatGPT to perform open coding by analyzing transcripts and suggesting codes,
    themes, and potential categories.
  id: totrans-1625
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT通过分析转录本并建议代码、主题和潜在类别来执行开放式编码。
- en: ChatGPT may provide direct quotes, phrases, or thematic insights that correspond
    to the interview data.
  id: totrans-1626
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可能提供直接引用、短语或与访谈数据相对应的主题见解。
- en: 'Step 2: Export ChatGPT’s Output to a REFI-QDA or CSV Format'
  id: totrans-1627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2步：将ChatGPT的输出导出为REFI-QDA或CSV格式
- en: Save ChatGPT’s generated codes, themes, and quote suggestions in a CSV or REFI-QDA
    XML format.
  id: totrans-1628
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将ChatGPT生成的代码、主题和引用建议保存为CSV或REFI-QDA XML格式。
- en: The structure should include relevant details such as code, category, quote,
    and source.
  id: totrans-1629
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构应包括相关细节，如代码、类别、引用和来源。
- en: 'Step 3: Import the Codes and Themes into QualCoder'
  id: totrans-1630
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3步：将代码和主题导入QualCoder
- en: Navigate to File > Import > REFI-QDA Project or Import > Codes from CSV in QualCoder.
  id: totrans-1631
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在QualCoder中导航到文件 > 导入 > REFI-QDA项目或导入 > 从CSV导入代码。
- en: Select the file containing ChatGPT’s codes and themes, and follow the prompts
    to import them.
  id: totrans-1632
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择包含ChatGPT代码和主题的文件，并按照提示导入它们。
- en: QualCoder will import the codes and associate any provided quotes with relevant
    codes, allowing for partial automation of the coding process.
  id: totrans-1633
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: QualCoder将导入代码并将任何提供的引用与相关代码关联，从而实现编码过程的局部自动化。
- en: 'Step 4: Review and Refine Imported Codes'
  id: totrans-1634
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第4步：审查和细化导入的代码
- en: Open each transcript in QualCoder and examine how well the automated codes match
    the data.
  id: totrans-1635
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在QualCoder中打开每个转录本，检查自动代码与数据匹配得如何。
- en: Adjust, delete, or reassign codes where necessary to ensure accuracy and alignment
    with your research questions.
  id: totrans-1636
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据需要调整、删除或重新分配代码，以确保准确性与与您的研究问题的一致性。
- en: If code application is inconsistent, manually apply or modify codes based on
    the context.
  id: totrans-1637
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果代码应用不一致，根据上下文手动应用或修改代码。
- en: 'Pros of Automated Import:'
  id: totrans-1638
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自动导入的优点：
- en: 'Efficiency : Reduces the time needed to create and apply codes manually, especially
    useful for large datasets.'
  id: totrans-1639
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 效率：减少手动创建和应用代码所需的时间，特别是对于大型数据集非常有用。
- en: 'Quick Initial Structure : Provides an initial code structure that can be refined,
    giving researchers a head start in analysis.'
  id: totrans-1640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速初始结构：提供可细化的初始代码结构，使研究人员在分析中取得先机。
- en: 'Scalability : Allows for easier analysis of large datasets by providing a foundational
    code set that can be manually refined.'
  id: totrans-1641
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可扩展性：通过提供可手动细化的基础代码集，便于对大型数据集进行分析。
- en: 'Cons of Automated Import:'
  id: totrans-1642
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自动导入的缺点：
- en: 'Reliance on AI Interpretation : Automated codes are based on ChatGPT’s interpretation,
    which may not capture nuanced meanings as a researcher would.'
  id: totrans-1643
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 依赖AI解释：自动代码基于ChatGPT的解释，可能无法像研究者那样捕捉细微的含义。
- en: 'Potential for Data Loss : Importing codes without careful review may lead to
    missing or misinterpreted insights.'
  id: totrans-1644
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据丢失的可能性：未经仔细审查导入代码可能导致遗漏或误解的见解。
- en: 'Limited Control Over Contextualization : ChatGPT may not accurately apply codes
    based on contextual factors, requiring additional manual adjustments in QualCoder.'
  id: totrans-1645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对上下文控制的限制：ChatGPT可能无法根据上下文因素准确应用代码，需要QualCoder中进行额外的手动调整。
- en: T ABLE 10.1\. MANUAL vs. Automated import in QualCoder
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: 表10.1. QualCoder中手动导入与自动导入的比较
- en: '| Aspect | Manual import and coding | Automated import and coding (with chatgpt)
    |'
  id: totrans-1647
  prefs: []
  type: TYPE_TB
  zh: '| 方面 | 手动导入和编码 | 自动导入和编码（使用ChatGPT） |'
- en: '| Engagement level | High | Moderate |'
  id: totrans-1648
  prefs: []
  type: TYPE_TB
  zh: '| 参与度 | 高 | 中等 |'
- en: '| Time requirement | High | Lower |'
  id: totrans-1649
  prefs: []
  type: TYPE_TB
  zh: '| 时间需求 | 高 | 低 |'
- en: '| Control over data | High | Moderate (depends on quality of ChatGPT coding)
    |'
  id: totrans-1650
  prefs: []
  type: TYPE_TB
  zh: '| 数据控制 | 高 | 中等（取决于ChatGPT编码的质量） |'
- en: '| Coding accuracy | Researcher-driven; more accurate context analysis | AI-driven;
    may require refinement |'
  id: totrans-1651
  prefs: []
  type: TYPE_TB
  zh: '| 编码准确性 | 研究者驱动；更准确的分析上下文 | AI驱动；可能需要细化 |'
- en: '| Scalability | Suitable for smaller datasets | Better suited for large datasets
    |'
  id: totrans-1652
  prefs: []
  type: TYPE_TB
  zh: '| 可扩展性 | 适用于小型数据集 | 更适合大型数据集 |'
- en: '| Data consistency | Prone to researcher variation | Consistent but may lack
    nuanced interpretation |'
  id: totrans-1653
  prefs: []
  type: TYPE_TB
  zh: '| 数据一致性 | 易受研究者差异影响 | 一致但可能缺乏细微的解释 |'
- en: 3\. Fully Automated Import via API Integration
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 通过API集成实现完全自动导入
- en: 'A third option— Fully Automated Import via API Integration —could be considered
    a viable solution, especially for large-scale qualitative projects or research
    teams requiring streamlined workflows (Table 10.2). Here is how it could be framed:'
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 第三种选择——通过API集成完全自动导入——可以考虑作为一个可行的解决方案，特别是对于大规模定性项目或需要简化工作流程的研究团队（见表10.2）。以下是可能的框架：
- en: The most advanced method of integrating ChatGPT and QualCoder uses APIs to automate
    both analysis and data transfer. While QualCoder does not have a built-in API,
    creating a custom middleware that connects OpenAI’s API for ChatGPT with QualCoder
    can make fully automated coding possible.
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: 集成ChatGPT和QualCoder的最先进方法使用API来自动化分析和数据传输。虽然QualCoder没有内置API，但创建一个连接OpenAI的ChatGPT
    API和QualCoder的自定义中间件可以使完全自动编码成为可能。
- en: 'Steps:'
  id: totrans-1657
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤：
- en: 'API Setup :'
  id: totrans-1658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API设置：
- en: Obtain API access through OpenAI’s platform and set up an environment where
    ChatGPT can receive and analyze transcripts directly.
  id: totrans-1659
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过OpenAI的平台获取API访问权限，并设置一个环境，使ChatGPT可以直接接收和分析文本。
- en: Develop or utilize a middleware solution that can translate data from ChatGPT
    into a format QualCoder recognizes.
  id: totrans-1660
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发或利用一个可以将ChatGPT中的数据转换为QualCoder可识别格式的中间件解决方案。
- en: This might require coding knowledge, as QualCoder lacks an out-of-the-box API.
    However, a custom script can serve as a bridge between ChatGPT’s output and QualCoder’s
    import functions.
  id: totrans-1661
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这可能需要编程知识，因为QualCoder缺乏现成的API。然而，一个自定义脚本可以作为ChatGPT的输出和QualCoder导入功能之间的桥梁。
- en: 'Automated Coding and Importing :'
  id: totrans-1662
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动编码和导入：
- en: With APIs in place, ChatGPT analyzes transcripts and generates codes automatically.
    These codes, along with relevant quotes and themes, can then be structured for
    QualCoder in real time.
  id: totrans-1663
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在API就位的情况下，ChatGPT分析文本并自动生成代码。这些代码，连同相关引言和主题，可以实时地结构化到QualCoder中。
- en: Middleware would transfer ChatGPT’s output directly into QualCoder, applying
    codes and themes to the transcripts as they are processed.
  id: totrans-1664
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中间件将ChatGPT的输出直接传输到QualCoder，在处理过程中应用代码和主题。
- en: This setup can achieve full automation by mapping ChatGPT-generated codes directly
    onto specific text segments in QualCoder without any manual intervention.
  id: totrans-1665
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种设置可以通过将ChatGPT生成的代码直接映射到QualCoder中的特定文本段来实现完全自动化，无需任何手动干预。
- en: 'Efficient Data Management :'
  id: totrans-1666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高效的数据管理：
- en: This fully automated workflow is ideal for large datasets or fast-paced projects.
    By automating the full cycle—from text analysis and coding by ChatGPT to seamless
    code application in QualCoder—this approach minimizes manual tasks and boosts
    efficiency.
  id: totrans-1667
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种完全自动化的工作流程非常适合大型数据集或快速项目。通过自动化整个周期——从ChatGPT的文本分析和编码到QualCoder中无缝代码应用——这种方法最小化了手动任务并提高了效率。
- en: With all coding done in real-time, researchers can focus more on interpreting
    results rather than on data processing.
  id: totrans-1668
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于所有编码都是实时进行的，研究人员可以更多地关注解释结果，而不是数据处理。
- en: 'Pros of Fully Automated Import via API:'
  id: totrans-1669
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 通过API完全自动导入的优点：
- en: 'Maximal Efficiency : Ideal for managing and coding large datasets quickly.'
  id: totrans-1670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最大效率：非常适合快速管理和编码大型数据集。
- en: 'Seamless Workflow : Provides a streamlined, end-to-end solution that automates
    qualitative data analysis, from initial coding to importing into QualCoder.'
  id: totrans-1671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无缝工作流程：提供了一种简化的端到端解决方案，自动化定性数据分析，从初始编码到导入QualCoder。
- en: 'Scalability : Particularly useful for projects requiring rapid or high-volume
    data processing.'
  id: totrans-1672
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可扩展性：特别适用于需要快速或大量数据处理的项目。
- en: 'Cons of Fully Automated Import via API:'
  id: totrans-1673
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 通过API完全自动导入的缺点：
- en: 'Technical Setup : Requires substantial programming knowledge to create a middleware
    or custom script for integration, which may be beyond the reach of some researchers.'
  id: totrans-1674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术设置：需要大量的编程知识来创建中间件或自定义脚本以进行集成，这可能超出了某些研究人员的范围。
- en: 'Dependency on AI Interpretation : Automated codes are based on ChatGPT’s analysis,
    which may lack contextual nuance.'
  id: totrans-1675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 依赖AI解释：自动编码基于ChatGPT的分析，可能缺乏语境细微差别。
- en: 'Potential Data Loss : Like all automated systems, this setup could miss subtle
    insights or nuances, requiring some manual review.'
  id: totrans-1676
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能的数据丢失：像所有自动化系统一样，这个设置可能会错过细微的见解或细微差别，需要一些手动审查。
- en: T ABLE 10.2\. FULLY AUTOMATED Import via API vs. Manual and Semi-Automated Approaches
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 表10.2. 通过API完全自动导入与手动和半自动方法
- en: '| Aspect | Manual coding | Semi-automated import | Fully automated import via
    api |'
  id: totrans-1678
  prefs: []
  type: TYPE_TB
  zh: '| 方面 | 手动编码 | 半自动导入 | 通过API完全自动导入 |'
- en: '| Engagement level | High | Moderate | Low |'
  id: totrans-1679
  prefs: []
  type: TYPE_TB
  zh: '| 参与度水平 | 高 | 中等 | 低 |'
- en: '| Technical knowledge | Minimal | Moderate (basic data import/export) | High
    (programming skills required) |'
  id: totrans-1680
  prefs: []
  type: TYPE_TB
  zh: '| 技术知识 | 最小 | 中等（基本数据导入/导出） | 高（需要编程技能）|'
- en: '| Coding accuracy | High (researcher-controlled) | Moderate (review of imported
    codes) | Variable (ChatGPT-driven coding) |'
  id: totrans-1681
  prefs: []
  type: TYPE_TB
  zh: '| 编码准确性 | 高（研究者控制） | 中等（审查导入的代码） | 可变（ChatGPT 驱动的编码）|'
- en: '| Time requirement | High | Lower | Lowest |'
  id: totrans-1682
  prefs: []
  type: TYPE_TB
  zh: '| 时间要求 | 高 | 中 | 低 |'
- en: '| Best use case | Smaller datasets, detailed analysis | Medium datasets, efficient
    structuring | Large datasets, rapid processing |'
  id: totrans-1683
  prefs: []
  type: TYPE_TB
  zh: '| 最佳用例 | 小型数据集，详细分析 | 中型数据集，高效结构化 | 大型数据集，快速处理 |'
- en: '* * *'
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In this context, a fully automated API approach can offer a powerful solution
    for researchers seeking to integrate AI-driven coding directly with QualCoder.
    While it requires a substantial initial setup, it can be a transformative method
    for scaling up qualitative research projects. Including all three methods provides
    a comprehensive view of how different approaches to integration can meet various
    research needs, from deep manual engagement to high-efficiency automation.
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，完全自动化的 API 方法可以为寻求将 AI 驱动的编码直接集成到 QualCoder 的研究者提供强大的解决方案。虽然它需要大量的初始设置，但它可以是一种变革性的方法，用于扩大定性研究项目。包括所有三种方法提供了如何满足不同研究需求的不同集成方法的全面视角，从深度手动参与到高效率的自动化。
- en: Figure 10.5\. Importing Data to QualCoder and Generating Code Tree
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.5\. 将数据导入 QualCoder 并生成代码树
- en: '![A diagram of a company Description automatically generated](d2d_images/image020.png)'
  id: totrans-1687
  prefs: []
  type: TYPE_IMG
  zh: '![公司描述自动生成图](d2d_images/image020.png)'
- en: Choosing the Right Approach
  id: totrans-1688
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 选择正确的方法
- en: The manual method is ideal for those who prefer hands-on control and a deeper
    connection with the data. It is suited for researchers who want full responsibility
    over how codes are applied and refined.
  id: totrans-1689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动方法是那些喜欢动手操作和与数据建立更深层联系的人的理想选择。它适合那些希望对代码的应用和改进承担全部责任的研究者。
- en: The semi-automated approach balances automation and manual oversight. It reduces
    repetitive tasks like code creation but still allows the researcher to manually
    apply codes to specific text segments, maintaining flexibility and interpretive
    depth.
  id: totrans-1690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 半自动化方法平衡了自动化和手动监督。它减少了代码创建等重复性任务，但仍然允许研究者手动将代码应用于特定的文本片段，保持灵活性和解释深度。
- en: The fully automated approach is recommended for advanced users familiar with
    programming and API integration. It offers maximum efficiency, making it ideal
    for large-scale projects where speed and automation are crucial.
  id: totrans-1691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全自动化的方法推荐给熟悉编程和 API 集成的资深用户。它提供最大效率，对于速度和自动化至关重要的大规模项目来说，它是理想的。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1692
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1693
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: 'Step 6: Analyze Codes in QualCoder'
  id: totrans-1694
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 6 步：在 QualCoder 中分析代码
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1695
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: 'Objective:'
  id: totrans-1696
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 目标：
- en: F inalize the coding process and analyze themes across the entire dataset (Figure
    10.6).
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 完成编码过程并分析整个数据集中的主题（图 10.6）。
- en: 'Process:'
  id: totrans-1698
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 流程：
- en: 'Conduct Cross-Analysis :'
  id: totrans-1699
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进行交叉分析：
- en: Using QualCoder, conduct cross-analysis to explore how themes vary across different
    participants or transcripts. For example, you could compare how different team
    members experience "isolation" when using VR for remote meetings.
  id: totrans-1700
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 QualCoder 进行交叉分析，以探索主题在不同参与者或转录本中的变化。例如，你可以比较不同团队成员在使用 VR 进行远程会议时对“隔离”的感受。
- en: 'Generate Reports and Visualizations :'
  id: totrans-1701
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成报告和可视化：
- en: QualCoder allows you to generate reports that summarize the frequency and distribution
    of codes across the dataset. Use these reports to explore relationships between
    themes and to visualize the results of your analysis.
  id: totrans-1702
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: QualCoder 允许你生成总结数据集中代码频率和分布的报告。使用这些报告来探索主题之间的关系，并可视化分析结果。
- en: 'Interpret Findings :'
  id: totrans-1703
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释研究结果：
- en: With the help of the code tree and detailed qualitative coding, interpret the
    findings to answer your research questions. Use the themes and quotes identified
    in ChatGPT and refined in QualCoder to draw meaningful conclusions from the data.
  id: totrans-1704
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在代码树和详细定性编码的帮助下，解释研究结果以回答你的研究问题。使用 ChatGPT 中识别的主题和引用，并在 QualCoder 中进行细化，从数据中得出有意义的结论。
- en: F IGURE 10.6\. ANALYZING Codes in QualCoder
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.6\. 在 QualCoder 中分析代码
- en: '![A diagram of a company Description automatically generated](d2d_images/image008.png)'
  id: totrans-1706
  prefs: []
  type: TYPE_IMG
  zh: '![公司描述自动生成的图表](d2d_images/image008.png)'
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1707
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1708
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Step 7: Develop Themes and Categories'
  id: totrans-1709
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第7步：开发主题和类别
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1710
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: A fter the open coding process, move toward thematic analysis to identify larger
    patterns and connections within your data (Figure 10.7).
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
  zh: 在开放式编码过程之后，转向主题分析以识别数据中的更大模式和联系（图10.7）。
- en: 'Group Codes into Themes :'
  id: totrans-1712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将代码分组到主题中：
- en: Use QualCoder to group related codes into broader themes. For example, codes
    related to "communication challenges" and "technology adaptation" might form a
    theme like "Barriers to Remote Work Efficiency."
  id: totrans-1713
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 QualCoder 将相关代码分组到更广泛的主题中。例如，与“沟通挑战”和“技术适应”相关的代码可能形成一个主题，如“远程工作效率障碍”。
- en: 'Use ChatGPT for Thematic Suggestions :'
  id: totrans-1714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 进行主题建议：
- en: 'Prompt ChatGPT to assist in grouping codes into potential themes:'
  id: totrans-1715
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示 ChatGPT 帮助将代码分组到潜在的主题中：
- en: 'Example Prompt:'
  id: totrans-1716
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例提示：
- en: '"Here are the codes I generated from my data. Can you suggest overarching themes
    or categories?"'
  id: totrans-1717
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: “这里是我从我的数据中生成的代码。你能建议一些总体的主题或类别吗？”
- en: This step allows you to leverage AI for deeper pattern recognition.
  id: totrans-1718
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此步骤允许您利用 AI 进行更深入的图案识别。
- en: 'Finalize Themes in QualCoder :'
  id: totrans-1719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 QualCoder 中最终确定主题：
- en: Finalize the themes within QualCoder by reviewing both AI-suggested and manually
    created themes.
  id: totrans-1720
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过审查 AI 建议和手动创建的主题来在 QualCoder 中最终确定主题。
- en: Refine as necessary, merging or adjusting themes as you see fit.
  id: totrans-1721
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据需要细化，根据您的喜好合并或调整主题。
- en: Figure 10.7\. Developing Themes and Categories
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.7. 开发主题和类别
