- en: AI-Assisted Open Coding
  id: totrans-538
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI 辅助开放式编码
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-539
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
