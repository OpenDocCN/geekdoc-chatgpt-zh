  type: TYPE_NORMAL
  zh: 第4步：创建提示并运行编码过程
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1541
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: 'Objective:'
  id: totrans-1542
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 目标：
- en: E xecute the coding process by running tailored prompts for each transcript
    and saving the outputs for further analysis (Figure 10.4).
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为每个访谈记录运行定制的提示并保存输出以供进一步分析来执行编码过程（图10.4）。
- en: 'Process:'
  id: totrans-1544
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 流程：
- en: 'Create Clear and Targeted Prompts :'
  id: totrans-1545
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建清晰和有针对性的提示：
- en: 'For each transcript, create prompts that are aligned with your research objectives.
    Example prompts might include:'
  id: totrans-1546
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每一份记录，创建与你的研究目标一致的提示。例如，可能的提示包括：
- en: 'Deductive Example : “For this transcript, identify any references to team communication.
    Focus on how participants describe their interactions and challenges when using
    VR.”'
  id: totrans-1547
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 演绎示例：“对于这份记录，识别任何关于团队沟通的引用。关注参与者如何描述他们在使用VR时的互动和挑战。”
- en: 'Inductive Example : “Identify any emerging themes related to how participants
    experience emotional well-being during virtual meetings. Summarize key points
    mentioned.”'
  id: totrans-1548
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 归纳示例：“识别与参与者体验虚拟会议中的情绪福祉相关的任何新兴主题。总结提到的关键点。”
- en: 'Run the Prompts for Each Transcript :'
  id: totrans-1549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每一份记录运行提示：
- en: Submit each transcript to ChatGPT using the prepared prompts. Ensure that the
    AI’s output is saved in a structured format (such as a Word document or text file)
    after each run.
  id: totrans-1550
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用准备好的提示将每一份记录提交给ChatGPT。确保每次运行后AI的输出以结构化格式（如Word文档或文本文件）保存。
- en: 'Example Output :'
  id: totrans-1551
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例输出：
- en: 'Codes: Team Isolation , Increased Focus in VR Meetings , Stress from Learning
    New Tools .'
  id: totrans-1552
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码：团队孤立，VR会议中的专注力提升，学习新工具的压力。
- en: 'Quotes: “I find that working in VR makes me feel disconnected from my team
    sometimes.”'
  id: totrans-1553
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用：“我发现我在VR中工作时有时会感到与团队脱节。”
- en: 'Iterate and Validate :'
  id: totrans-1554
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 迭代和验证：
- en: 'For each transcript, you may need to run multiple prompts to explore different
    aspects of the data (e.g., team dynamics, emotional responses). Use iterative
    questioning to refine the output. For example, if a code seems too broad, ask
    ChatGPT to break it down into more specific components:'
  id: totrans-1555
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每一份记录，你可能需要运行多个提示来探索数据的各个方面（例如，团队动态，情绪反应）。使用迭代提问来细化输出。例如，如果一个代码太宽泛，请要求ChatGPT将其分解成更具体的组成部分：
- en: 'Prompt : “Can you provide more detail on the different ways participants describe
    ‘team isolation’? What specific factors contribute to this?”'
  id: totrans-1556
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“你能提供更多关于参与者描述‘团队孤立’的不同方式的细节吗？具体有哪些因素导致了这种情况？”
- en: 'Save Outputs for Analysis :'
  id: totrans-1557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存输出以供分析：
- en: After running each transcript, ensure the outputs are saved in a consistent
    format. These outputs will later be uploaded into QualCoder for further analysis.
  id: totrans-1558
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行每一份记录后，确保输出以一致格式保存。这些输出将随后上传到QualCoder进行进一步分析。
- en: F IGURE 10.4\. CREATING Prompts and Running the Coding Process
