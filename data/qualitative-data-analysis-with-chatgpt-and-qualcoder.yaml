- en: Accessing and Configuring ChatGPT
  id: totrans-1088
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 访问和配置 ChatGPT
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1089
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'T o effectively use ChatGPT for qualitative data analysis, it is crucial to
    understand the different approaches to accessing and configuring the tool. Broadly,
    there are two main ways to utilize ChatGPT for qualitative analysis:'
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地使用 ChatGPT 进行定性数据分析，理解访问和配置工具的不同方法至关重要。总的来说，有两大主要方式可以利用 ChatGPT 进行定性分析：
- en: Using the Default GPT Models (via OpenAI’s web interface or API)
  id: totrans-1091
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用默认 GPT 模型（通过 OpenAI 的网络界面或 API）
- en: Building Custom GPTs tailored specifically for qualitative analysis.
  id: totrans-1092
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建针对定性分析量身定制的自定义 GPTs。
- en: Each approach offers unique advantages and limitations, and your choice will
    depend on the complexity of your project, your technical skills, and the specific
    needs of your research (Table 9.1).
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 每种方法都有其独特的优势和局限性，您的选择将取决于项目的复杂性、您的技术技能以及您研究的具体需求（表 9.1）。
- en: 1\. Using Default GPT Models for Qualitative Analysis
  id: totrans-1094
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 使用默认 GPT 模型进行定性分析
- en: T HE MOST COMMON AND straightforward approach is to use the default GPT models
    (such as GPT-4) directly through OpenAI's web interface or via API integration
    (23). This approach offers ease of access and requires little to no technical
    expertise.
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见且最直接的方法是直接通过 OpenAI 的网络界面或通过 API 集成（23）使用默认 GPT 模型（如 GPT-4）。这种方法易于访问，且几乎不需要任何技术专长。
- en: 'Accessing ChatGPT : You can easily access the GPT models through the OpenAI
    web interface (chat.openai.com) or integrate the tool into your workflow using
    the OpenAI API. This allows you to input qualitative data, such as interview transcripts,
    and receive generated themes, codes, or even summaries directly from ChatGPT.'
  id: totrans-1096
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问 ChatGPT：您可以通过 OpenAI 网络界面（chat.openai.com）轻松访问 GPT 模型，或者使用 OpenAI API 将工具集成到您的流程中。这允许您输入定性数据，例如访谈记录，并直接从
    ChatGPT 收到生成的主题、代码或甚至摘要。
- en: 'Subscription Plans : If you are conducting complex analyses or need to process
    large amounts of qualitative data, consider using ChatGPT Plus , which provides
    access to the more advanced GPT-4 model. GPT-4 offers better language comprehension,
    increased accuracy, and can handle more complex and nuanced inputs compared to
    previous versions.'
  id: totrans-1097
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 订阅计划：如果您正在进行复杂分析或需要处理大量定性数据，请考虑使用 ChatGPT Plus，它提供了访问更先进的 GPT-4 模型的权限。GPT-4
    提供了更好的语言理解能力、更高的准确度，并且可以处理比之前版本更复杂和细微的输入。
- en: 'Configuring for Research Needs :'
  id: totrans-1098
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置研究需求：
- en: 'Prompt Crafting : When using the default models, your success will largely
    depend on how well you craft your prompts. For example, you can instruct ChatGPT
    to "identify key themes" in a set of responses, or you can ask it to "generate
    initial codes based on this transcript." You will need to ensure that the prompts
    are clear and specific to yield useful results.'
  id: totrans-1099
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示制作：在使用默认模型时，您的成功在很大程度上取决于您如何制作提示。例如，您可以指示 ChatGPT 在一组回应中“识别关键主题”，或者您可以要求它“根据这份记录生成初始代码”。您需要确保提示清晰且具体，以产生有用的结果。
- en: 'Pros of Using Default GPT Models :'
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 使用默认 GPT 模型的优点：
- en: 'Ease of Access : The default models are readily available through a simple
    user interface, requiring minimal setup or technical knowledge.'
  id: totrans-1101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 易于访问：默认模型通过简单的用户界面即可轻松获取，无需进行大量设置或技术知识。
- en: 'Quick and Efficient : You can instantly start analyzing your qualitative data
    without needing to build or configure specialized models.'
  id: totrans-1102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速高效：您无需构建或配置专用模型即可立即开始分析您的定性数据。
- en: 'Widely Applicable : Default GPT models are versatile and can handle a wide
    range of qualitative tasks, from summarizing to thematic analysis.'
  id: totrans-1103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广泛适用：默认 GPT 模型通用性强，可以处理从总结到主题分析的各种定性任务。
- en: 'Cons of Using Default GPT Models :'
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 使用默认 GPT 模型的缺点：
- en: 'Generalized Output : Since the model is not customized for your specific data
    or analysis needs, the results might be broad or lack the depth required for complex
    qualitative studies.'
  id: totrans-1105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通用输出：由于模型未针对您的特定数据或分析需求进行定制，结果可能较为宽泛或缺乏复杂定性研究所需的深度。
- en: 'Limited Customization : You cannot fine-tune the default models to specialize
    in qualitative research, which could limit their effectiveness in identifying
    very niche or specific themes.'
  id: totrans-1106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制化有限：您无法微调默认模型以专门从事定性研究，这可能会限制它们在识别非常狭窄或特定主题方面的有效性。
- en: 2\. Building Custom GPTs for Qualitative Analysis
  id: totrans-1107
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 为定性分析构建自定义 GPT
- en: F OR RESEARCHERS SEEKING tailored support in their qualitative analysis, OpenAI
    offers the ability to create Custom GPTs using its inbuilt tools. This feature
    allows you to build and customize GPTs specifically for your project, without
    needing to use APIs or complex programming. You can create a Custom GPT by providing
    specific instructions and examples, ensuring that the model is more focused on
    the unique themes and requirements of your qualitative research.
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于寻求在定性分析中定制支持的学者，OpenAI 提供了使用其内置工具创建自定义 GPT 的能力。此功能允许您为您的项目构建和自定义 GPT，而无需使用
    API 或复杂的编程。您可以通过提供特定的指令和示例来创建自定义 GPT，确保模型更加专注于您定性研究的独特主题和需求。
- en: What Are Custom GPTs?
  id: totrans-1109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 什么是自定义 GPT？
- en: C USTOM GPTS ARE PERSONALIZED versions of the GPT models that can be adapted
    to meet your specific research needs. Through OpenAI’s user-friendly interface,
    you can customize how the GPT behaves by inputting your data and crafting detailed
    instructions for your qualitative study. For example, if you are analyzing interview
    data related to mental health, you can create a Custom GPT that focuses on identifying
    concepts such as stress, coping mechanisms, or emotional well-being based on your
    instructions and examples.
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义 GPT 是 GPT 模型的个性化版本，可以适应满足您特定的研究需求。通过 OpenAI 的用户友好界面，您可以通过输入您的数据和为您的定性研究制定详细的指令来自定义
    GPT 的行为。例如，如果您正在分析与心理健康相关的访谈数据，您可以根据您的指令和示例创建一个专注于识别压力、应对机制或情绪福祉等概念的定制 GPT。
- en: Building a Custom GPT
  id: totrans-1111
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建自定义 GPT
- en: 'Defining Your Instructions and Examples : Begin by outlining the specific tasks
    you want the Custom GPT to perform. You can guide the model by providing detailed
    instructions and sample questions that help it focus on the most relevant aspects
    of your research.'
  id: totrans-1112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义您的指令和示例：首先概述您希望自定义 GPT 执行的具体任务。您可以通过提供详细的指令和示例问题来引导模型，帮助它专注于您研究中最相关的方面。
- en: 'Customizing the GPT : OpenAI’s inbuilt tools allow you to customize GPT behavior
    without the need for programming or APIs. You can define the model’s tone, clarify
    its role in your research, and upload sample data to give it context for analysis.
    For instance, you can instruct it to focus on recognizing themes related to work-life
    balance, emotional stress, or social interaction.'
  id: totrans-1113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义 GPT：OpenAI 的内置工具允许您在不使用编程或 API 的情况下自定义 GPT 的行为。您可以定义模型的语气，阐明其在您研究中的角色，并上传样本数据以提供分析背景。例如，您可以指示它专注于识别与工作生活平衡、情绪压力或社交互动相关的主题。
- en: 'Testing and Refining : Once you have created a Custom GPT, you can test it
    by asking specific research-related queries. Based on its responses, you can further
    refine the instructions and behavior to ensure it produces accurate and insightful
    outputs that align with your research objectives.'
  id: totrans-1114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试和改进：一旦创建了自定义 GPT，您可以通过提出具体的研究相关查询来测试它。根据其响应，您可以进一步改进指令和行为，以确保它产生准确且富有洞察力的输出，与您的研究目标保持一致。
- en: Pros of Building Custom GPTs
  id: totrans-1115
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建自定义 GPT 的优点
- en: 'Tailored to Your Research : Custom GPTs can be designed to focus on your specific
    qualitative data, producing more relevant codes and themes that are aligned with
    your research objectives.'
  id: totrans-1116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适合您的研究：自定义 GPT 可以设计为专注于您的特定定性数据，产生与您的研究目标一致的相关代码和主题。
- en: 'Greater Ease of Use : Unlike the technical complexity of building a model from
    scratch with APIs, OpenAI’s inbuilt Custom GPT creation tool is user-friendly
    and does not require any programming knowledge. This makes it accessible to researchers
    with varying levels of technical expertise.'
  id: totrans-1117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用更便捷：与使用 API 从头开始构建模型的技术复杂性相比，OpenAI 的内置自定义 GPT 创建工具用户友好，且不需要任何编程知识。这使得它对具有不同技术水平的研究者都易于访问。
- en: 'Quick Customization : Custom GPTs can be set up relatively quickly, enabling
    you to adjust their behavior and focus without extensive setup, making them ideal
    for time-sensitive projects.'
  id: totrans-1118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速定制：自定义 GPT 可以相对快速地设置，使您能够在不进行大量设置的情况下调整其行为和焦点，使其非常适合对时间敏感的项目。
- en: Cons of Building Custom GPTs
  id: totrans-1119
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建自定义 GPT 的缺点
- en: 'Limited to Pre-Defined Capabilities : While the customization options are flexible,
    you are still working within the existing framework of GPT, which may limit more
    advanced or highly specific requirements compared to custom models trained with
    APIs.'
  id: totrans-1120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制于预定义的功能：虽然定制选项很灵活，但你仍然是在GPT现有的框架内工作，这可能会限制与使用API训练的定制模型相比更高级或更具体的需求。
- en: 'Requires Ongoing Refinement : Although easy to set up, Custom GPTs may still
    require iterative refinement based on testing and feedback to ensure they are
    aligned with your specific research needs.'
  id: totrans-1121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要持续优化：尽管设置简单，定制GPT可能仍然需要基于测试和反馈的迭代优化，以确保它们与你的具体研究需求保持一致。
- en: 'Potential Costs : While using Custom GPTs does not involve the higher costs
    of API-driven fine-tuning, there may still be usage fees, depending on your data
    volume and customization needs.'
  id: totrans-1122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能的成本：虽然使用定制GPT不涉及API驱动的微调的高成本，但根据你的数据量和定制需求，可能仍会有使用费用。
- en: B Y LEVERAGING OPENAI’S inbuilt Custom GPT tools, researchers can easily create
    specialized models that suit their qualitative research needs without needing
    extensive technical expertise or resources. This makes Custom GPTs an ideal solution
    for tailoring AI-powered analysis to your project's unique themes and questions.
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用OpenAI内置的定制GPT工具，研究人员可以轻松创建适合他们定性研究需求的专用模型，而无需广泛的技术专业知识或资源。这使得定制GPT成为针对项目独特主题和问题的AI分析定制解决方案的理想选择。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1124
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1125
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Choosing the Right Approach
  id: totrans-1126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择正确的方法
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1127
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: D eciding between using the default GPT models or creating custom GPTs depends
    on your specific research needs, timeline, and resources. If you are looking for
    quick, general insights and do not require deep customization, the default models
    will likely suffice. However, if your project involves complex qualitative analysis
    with specific themes or language nuances, building a custom GPT may offer greater
    precision and relevance.
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 选择使用默认GPT模型或创建定制GPT取决于你的具体研究需求、时间表和资源。如果你寻求快速、一般性的见解且不需要深度定制，默认模型可能就足够了。然而，如果你的项目涉及复杂定性分析，具有特定主题或语言细微差别，构建定制GPT可能提供更高的精确度和相关性。
- en: For most general qualitative research projects, starting with the default models
    and crafting specific prompts will be the most practical and efficient option.
    As your research evolves, you may consider transitioning to custom GPTs if you
    need more specialized analysis.
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数一般性的定性研究项目，从默认模型开始并制作特定的提示将是实际和高效的选择。随着你的研究发展，如果你需要更多专业化的分析，你可能考虑过渡到定制GPT。
- en: 'Note: GPT models continue to be updated with new functionalities, and improvements
    are made over time. For the most recent features and versions, it is advisable
    to check the OpenAI website regularly to stay informed on the latest advancements
    and capabilities of GPT models.'
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：GPT模型会持续更新，并随着时间的推移进行改进。为了获取最新功能和版本，建议定期检查OpenAI网站，以了解GPT模型的最新进展和能力。
- en: Table 9.1\. Approaches to Accessing and Configuring ChatGPT
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.1\. 访问和配置ChatGPT的方法
- en: '| Aspect | Using default gpt models | Building custom gpts (using openai’s
    inbuilt tool) |'
  id: totrans-1132
  prefs: []
  type: TYPE_TB
  zh: '| 方面 | 使用默认gpt模型 | 构建定制gpts（使用openai的内置工具） |'
- en: '| Definition | Using standard GPT models like GPT-4 via OpenAI’s web interface
    for qualitative tasks. | Creating specialized GPTs customized to your research
    needs through OpenAI’s built-in GPT customization feature, without requiring APIs.
    |'
  id: totrans-1133
  prefs: []
  type: TYPE_TB
  zh: '| 定义 | 通过OpenAI的网页界面使用标准GPT模型（如GPT-4）进行定性任务。 | 通过OpenAI内置的GPT定制功能创建针对你的研究需求定制的专业GPT，无需API。
    |'
- en: '| Access method | - Access via OpenAI’s web interface.- Requires minimal setup
    or technical knowledge. | - Access via OpenAI’s web interface (Custom GPT feature).-
    No API or programming needed; built directly in OpenAI''s user interface. |'
  id: totrans-1134
  prefs: []
  type: TYPE_TB
  zh: '| 访问方法 | - 通过OpenAI的网页界面访问。- 需要最少的设置或技术知识。 | - 通过OpenAI的网页界面（定制GPT功能）。- 不需要API或编程；直接在OpenAI的用户界面中构建。
    |'
- en: '| Configuration | - Craft clear and specific prompts for desired results.-
    Adjust temperature and tone settings via the interface for controlled outputs.
    | - Provide detailed instructions and examples to guide the model.- Customize
    the behavior of the GPT without the need for technical coding skills. |'
  id: totrans-1135
  prefs: []
  type: TYPE_TB
  zh: '| 配置 | - 为所需结果制定清晰和具体的提示。- 通过界面调整温度和语气设置以实现受控输出。- 提供详细的指令和示例以指导模型。- 无需技术编码技能即可自定义GPT的行为。
    |'
- en: '| Best use case | - Quick, efficient access for general qualitative tasks like
    summarizing, identifying themes, and generating initial codes.- Suitable for straightforward
    research projects. | - Ideal for research requiring more specific focus or themes
    relevant to your study (e.g., exploring stress management, specific cultural patterns).-
    Great for researchers who want more tailored insights without coding or API setup.
    |'
  id: totrans-1136
  prefs: []
  type: TYPE_TB
  zh: '| 最佳使用案例 | - 快速、高效的访问，适用于总结、识别主题和生成初始代码等一般定性任务。- 适用于简单的科研项目。- 理想适用于需要更多具体焦点或与您研究相关的主题（例如，探索压力管理、特定的文化模式）的研究。-
    对于希望获得更多定制见解而不需要编码或API设置的研究人员来说非常合适。 |'
- en: '| Pros | - Ease of Access : Simple interface, ready-to-use.- Quick Results
    : Immediate access to qualitative analysis.- Versatile : Can handle a wide range
    of qualitative tasks. | - Tailored to Research : Easily customizable to produce
    more accurate, project-specific outputs.- No Technical Expertise Required : No
    programming or APIs needed.- Deeper Insights : Provides nuanced data based on
    specific instructions. |'
  id: totrans-1137
  prefs: []
  type: TYPE_TB
  zh: '| 优点 | - 易于访问：简单的界面，即用即用。- 快速结果：立即访问定性分析。- 多功能性：可以处理广泛的定性任务。- 适合研究：易于定制以生成更准确、项目特定的输出。-
    无需技术专长：无需编程或API。- 深度见解：根据具体指令提供细微的数据。 |'
- en: '| Cons | - Generalized Output : May lack depth for highly specialized qualitative
    analysis.- Limited Customization : Only basic adjustments to outputs and behavior
    are available. | - Limited to Pre-Defined Frameworks : While highly customizable,
    the features are still confined to the broader GPT model’s capabilities.- Ongoing
    Refinement : May require iterative adjustments to perfect the outputs. |'
  id: totrans-1138
  prefs: []
  type: TYPE_TB
  zh: '| Cons | - 广义输出：可能缺乏高度专业化的定性分析深度。- 有限的自定义：仅提供对输出和行为的基本调整。- 限于预定义框架：虽然高度可定制，但功能仍限于更广泛的GPT模型的能力。-
    持续改进：可能需要迭代调整以完善输出。 |'
- en: '| Subscription/cost | - ChatGPT Plus subscription gives access to GPT-4 with
    better performance for complex tasks. | - Usage fees depend on data volume and
    customization, but no API costs are involved. |'
  id: totrans-1139
  prefs: []
  type: TYPE_TB
  zh: '| 订阅/费用 | - ChatGPT Plus订阅提供对性能更好的GPT-4的访问，适用于复杂任务。- 使用费用取决于数据量和定制，但无需涉及API费用。
    |'
- en: '| Example use case | - "Identify key themes related to work-life balance in
    this interview transcript." | - "Analyze the specific emotional responses of participants
    in this focus group about stress, based on tailored instructions provided." |'
  id: totrans-1140
  prefs: []
  type: TYPE_TB
  zh: '| 示例使用案例 | - "在这篇访谈记录中识别与工作生活平衡相关的关键主题。" | - "根据提供的定制指令，分析这个焦点小组中关于压力的参与者的具体情绪反应。"
    |'
- en: This table provides a clear comparison between using default GPT models and
    building custom GPTs for qualitative research, helping researchers determine the
    best approach based on their project needs, technical skills, and resources.
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 此表提供了使用默认GPT模型和为定性研究构建自定义GPT之间的清晰比较，帮助研究人员根据他们的项目需求、技术技能和资源确定最佳方法。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1142
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1143
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Data Preparation: Cleaning and Formatting Qualitative Data'
  id: totrans-1144
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据准备：清洗和格式化定性数据
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1145
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: O nce you have accessed ChatGPT and decided on either using the default models
    or custom GPTs , the next step is preparing your qualitative data for analysis
    (Figure 9.1). Raw qualitative data—such as interview transcripts, focus group
    discussions, or observational notes—often needs cleaning and formatting to make
    it compatible with AI-assisted analysis. Proper data preparation ensures that
    ChatGPT delivers accurate, meaningful, and relevant results during your thematic
    analysis.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你访问了ChatGPT并决定使用默认模型或自定义GPT，下一步就是准备你的定性数据以进行分析（图9.1）。原始定性数据，如访谈记录、焦点小组讨论或观察笔记，通常需要清理和格式化，以便与AI辅助分析兼容。适当的数据准备确保ChatGPT在主题分析期间提供准确、有意义和相关的结果。
- en: 'Steps for Data Cleaning and Formatting:'
  id: totrans-1147
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据清理和格式化步骤：
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1148
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1149
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: Transcription Accuracy
  id: totrans-1150
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 转录准确性
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1151
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: I f your data includes interviews, focus groups, or other audio/video recordings,
    it is essential to have accurate and clear transcripts. While there are several
    transcription tools available, like Otter.ai, Rev, or Descript, always manually
    review the transcripts to correct any errors. ChatGPT’s performance in qualitative
    analysis heavily depends on the quality of the input. Inaccuracies in the transcript—such
    as misheard words or missed sentences—can lead to incorrect coding or misidentified
    themes.
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的数据包括访谈、焦点小组或其他音频/视频记录，拥有准确且清晰的转录本至关重要。虽然有多种转录工具可用，如Otter.ai、Rev或Descript，但始终手动审查转录本以纠正任何错误。ChatGPT在定性分析中的表现高度依赖于输入质量。转录本中的不准确——如听错的话或遗漏的句子——可能导致错误的编码或主题识别错误。
- en: 'Using Automated Transcription Tools : Automated transcription tools are an
    efficient way to quickly convert audio data into text. However, no matter how
    advanced, AI-driven transcription tools are not perfect. Misinterpretation of
    jargon, speaker changes, and background noise can cause inaccuracies, which is
    why manual review is critical.'
  id: totrans-1153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用自动转录工具：自动转录工具是快速将音频数据转换为文本的有效方法。然而，无论多么先进，AI驱动的转录工具都不是完美的。术语误解、说话者变化和背景噪音可能导致不准确，这就是为什么手动审查至关重要的原因。
- en: 'Manual Review : After generating the transcript, review it thoroughly to ensure
    that important nuances are not lost or misrepresented. This step is vital when
    analyzing complex interviews with specific terminology or context.'
  id: totrans-1154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动审查：在生成转录本后，彻底审查以确保重要细微差别没有丢失或被错误地表达。当分析具有特定术语或背景的复杂访谈时，这一步骤至关重要。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1155
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1156
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: Formatting for AI Readability
  id: totrans-1157
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 适用于AI可读性的格式化
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1158
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: T o ensure that ChatGPT can effectively analyze your data, it is important to
    format the transcripts in a way that makes them easy for AI to process. Formatting
    plays a key role in helping ChatGPT recognize the structure of your data and respond
    accurately during analysis.
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保ChatGPT能够有效地分析你的数据，重要的是以使AI易于处理的方式格式化转录本。格式化在帮助ChatGPT识别你的数据结构并在分析期间准确响应中起着关键作用。
- en: 'Remove Extraneous Information : Unnecessary information, such as time stamps,
    filler words ("um," "you know," "like"), or repetitive interviewer prompts, should
    be removed or cleaned up. These elements can confuse ChatGPT and lead to irrelevant
    codes or themes.'
  id: totrans-1160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移除多余信息：应删除或清理不必要的信息，例如时间戳、填充词（“嗯”，“你知道”，“就像”），或重复的采访提示。这些元素可能会使ChatGPT困惑，导致无关代码或主题。
- en: 'Example:'
  id: totrans-1161
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Raw: “Um, yeah, so I guess... like, when we use VR, it’s, um, interesting but
    also a bit, you know, draining.”'
  id: totrans-1162
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原始：“嗯，是的，我想……就像，当我们使用VR时，嗯，很有趣，但也有些，你知道，耗精力。”
- en: 'Cleaned: “When we use VR, it’s interesting but also a bit draining.”'
  id: totrans-1163
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清理后：“当我们使用VR时，很有趣，但也有些耗精力。”
- en: 'Standardize Interview Structures : If you are analyzing multiple interviews
    or discussions, ensure that all transcripts follow a consistent structure. Clearly
    distinguish between the interviewer’s questions and the participant’s responses
    using headings such as "Interviewer" and "Participant" . This allows ChatGPT to
    better understand the flow of the conversation and to focus on the relevant content
    in its analysis.'
  id: totrans-1164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准化访谈结构：如果你正在分析多个访谈或讨论，确保所有转录文本遵循一致的结构。使用如“访谈者”和“参与者”等标题明确区分访谈者的问题和参与者的回应。这允许ChatGPT更好地理解对话的流程，并在分析中关注相关内容。
- en: 'Example Format:'
  id: totrans-1165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例格式：
- en: 'Interviewer : "How has using VR affected your productivity?"'
  id: totrans-1166
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访谈者："使用VR如何影响你的生产力？"
- en: 'Participant : "It’s helped for creative tasks but has been a challenge for
    regular meetings."'
  id: totrans-1167
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与者："这有助于创意任务，但在常规会议中却是一个挑战。"
- en: 'Tag Key Segments : Use labels or tags to mark key areas in your transcripts.
    This makes it easier for ChatGPT to focus on specific sections during analysis,
    such as responses directly related to productivity or well-being. You can introduce
    sections like "Team Collaboration" or "Emotional Well-being" for clarity and focus.'
  id: totrans-1168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标记关键段落：使用标签或标记来标记你的转录文本中的关键区域。这使得ChatGPT在分析期间更容易关注特定部分，例如直接与生产力或幸福感相关的回应。你可以引入如“团队协作”或“情感福祉”等部分以提高清晰度和专注度。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1169
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1170
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Breaking Down Large Data Sets
  id: totrans-1171
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 拆分大型数据集
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1172
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: C hatGPT has token limits , meaning it can only process a certain amount of
    text in a single query. If your interview transcripts or datasets are lengthy,
    you will need to break them into smaller, manageable chunks. This step is essential
    to avoid overloading the model and losing context during analysis.
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT有令牌限制，这意味着它只能在一个查询中处理一定量的文本。如果你的访谈转录文本或数据集很长，你需要将它们拆分成更小、更易管理的部分。这一步对于避免过载模型和分析中丢失上下文至关重要。
- en: 'Chunking Large Transcripts : If an interview is long or has multiple sections,
    break it down by responses to each specific question or by theme (e.g., “Productivity”
    , “Team Interaction” , “Well-being” ). By keeping the sections logically structured,
    you allow ChatGPT to maintain the necessary context across smaller batches of
    data.'
  id: totrans-1174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拆分大型转录文本：如果访谈很长或包含多个部分，可以通过对每个具体问题的回应或主题（例如，“生产力”、“团队互动”、“幸福感”）进行拆分。通过保持部分逻辑结构，你允许ChatGPT在较小的数据批次中保持必要的上下文。
- en: 'Example:'
  id: totrans-1175
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Instead of submitting an entire 3,000-word interview, break it into sections
    like:'
  id: totrans-1176
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而不是提交一个完整的3,000字访谈，可以将其拆分为如下部分：
- en: 'Part 1: Responses about productivity (1,000 words)'
  id: totrans-1177
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一部分：关于生产力的回应（1,000字）
- en: 'Part 2: Responses about team interaction (1,000 words)'
  id: totrans-1178
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二部分：关于团队互动的回应（1,000字）
- en: 'Part 3: Responses about well-being (1,000 words)'
  id: totrans-1179
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三部分：关于幸福感的回应（1,000字）
- en: This approach ensures that the AI focuses on specific aspects of the data, generating
    more accurate and theme-specific insights.
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法确保AI专注于数据的特定方面，生成更准确和主题特定的见解。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1181
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1182
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Data Cleaning for Themes
  id: totrans-1183
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 主题数据清理
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1184
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: O nce your transcripts are formatted and divided into manageable chunks, it
    is important to clean your data with your predefined themes in mind. For deductive
    thematic analysis, you will have already identified key themes or categories from
    your theoretical framework. Preparing your data in line with these themes helps
    ChatGPT focus on the right content and produce relevant codes or insights.
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的转录文本格式化并分成可管理的部分，重要的是要考虑到你预定义的主题来清理你的数据。对于演绎性主题分析，你将已经从你的理论框架中识别出关键主题或类别。按照这些主题准备你的数据有助于ChatGPT专注于正确的内容并产生相关的代码或见解。
- en: 'Pre-Identifying Themes : Highlight sections of the transcript that correspond
    to your key areas of interest. For example, if your predefined themes include
    "communication," "productivity," and "emotional well-being," make sure that relevant
    segments of the transcript are organized accordingly. This can be done manually
    or through text markers, like:'
  id: totrans-1186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预先识别主题：突出显示与您关键兴趣区域相对应的转录部分。例如，如果您的预定义主题包括“沟通”、“生产力”和“情感福祉”，请确保转录的相关部分按此组织。这可以手动完成或通过文本标记完成，例如：
- en: 'Example :'
  id: totrans-1187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: '[Theme: Communication]'
  id: totrans-1188
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[主题：沟通]'
- en: 'Participant : "VR has definitely made communication with the team more dynamic,
    but there’s also some awkwardness due to the virtual setting."'
  id: totrans-1189
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与者： “VR无疑使团队沟通更加动态，但虚拟环境也带来了一些尴尬。”
- en: '[Theme: Productivity]'
  id: totrans-1190
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[主题：生产力]'
- en: 'Participant : "I feel more productive when I use VR for creative tasks, but
    routine meetings feel a bit cumbersome."'
  id: totrans-1191
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与者： “当我使用VR进行创意任务时，我感觉更有生产力，但常规会议感觉有点繁琐。”
- en: 'Using Tags and Comments : If your transcripts are stored in a text editor or
    qualitative analysis software, use comments or tagging features to identify important
    sections for analysis. When feeding these into ChatGPT, you can use these markers
    to ask the AI to focus on specific aspects, ensuring that it aligns with your
    research themes.'
  id: totrans-1192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用标签和注释：如果您的转录存储在文本编辑器或定性分析软件中，请使用注释或标记功能来识别分析中的重要部分。当将这些内容输入ChatGPT时，您可以使用这些标记来指示AI关注特定的方面，确保它与您的研究主题相一致。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1193
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1194
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Example Workflow for Data Cleaning:'
  id: totrans-1195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据清洗示例工作流程：
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1196
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'Transcribe : Use automated tools for initial transcription, followed by manual
    review for accuracy.'
  id: totrans-1197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 转录：使用自动化工具进行初步转录，然后进行人工审查以确保准确性。
- en: 'Clean : Remove filler words, time stamps, and extraneous information.'
  id: totrans-1198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清洗：删除填充词、时间戳和无关信息。
- en: 'Format : Ensure consistency by clearly labeling the interviewer’s questions
    and the participant’s responses, and introduce sections with relevant tags for
    specific themes.'
  id: totrans-1199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 格式：通过明确标记访谈者的问题和参与者的回答来确保一致性，并为特定主题引入带有相关标签的章节。
- en: 'Chunk : Divide long interviews into smaller, logically coherent sections to
    accommodate ChatGPT’s token limits.'
  id: totrans-1200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分块：将长访谈分成更小、逻辑上连贯的部分，以适应ChatGPT的令牌限制。
- en: 'Pre-Tag Themes : Identify and label important segments of your transcripts
    based on the predefined themes of your study, making it easier for ChatGPT to
    generate relevant codes.'
  id: totrans-1201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预标签主题：根据您研究预定义的主题识别并标记您的转录中的重要部分，使ChatGPT能够生成相关的代码变得更容易。
- en: B y properly cleaning and formatting your data, you ensure that ChatGPT can
    process your qualitative transcripts accurately and generate meaningful codes
    and themes. The next step involves guiding ChatGPT through the analysis process
    using these well-prepared transcripts and effective prompts.
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: 通过正确清洗和格式化您的数据，您确保ChatGPT可以准确处理您的定性转录并生成有意义的代码和主题。下一步涉及使用这些精心准备的转录和有效的提示引导ChatGPT通过分析过程。
- en: Figure 9.1\. Steps for Data Cleaning and Formatting for Qualitative Analysis
    with ChatGPT
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1. 使用ChatGPT进行定性分析的数据清洗和格式化步骤
- en: '![A diagram of a company Description automatically generated](d2d_images/image007.png)'
  id: totrans-1204
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成公司描述的图表](d2d_images/image007.png)'
- en: E NSURING DATA PRIVACY and Compliance
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: 确保数据隐私和合规性
- en: Qualitative research often deals with sensitive and personal data, particularly
    when it involves interviews, focus groups, or any form of data collection that
    captures individual experiences and insights. When using ChatGPT for qualitative
    research, ensuring data privacy and compliance with ethical standards becomes
    even more critical. AI tools like ChatGPT process large amounts of text data,
    and it is essential to safeguard the privacy of research participants while adhering
    to legal and ethical requirements.
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: 定性研究通常涉及敏感和个人的数据，尤其是当它涉及访谈、焦点小组或任何形式的数据收集，这些数据收集捕捉到个人的经验和见解时。当使用ChatGPT进行定性研究时，确保数据隐私和符合伦理标准变得更加重要。AI工具如ChatGPT处理大量文本数据，在遵守法律和伦理要求的同时保护研究参与者的隐私至关重要。
- en: 'Here are the key considerations for ensuring data privacy and compliance in
    AI-assisted qualitative research:'
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是确保在 AI 辅助定性研究中数据隐私和合规性的关键考虑因素：
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1208
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1209
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Anonymizing Data
  id: totrans-1210
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 匿名化数据
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1211
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: A nonymization is one of the most important steps when preparing qualitative
    data for analysis with ChatGPT. This involves removing any personal identifiers
    from the transcripts to protect participants’ privacy and ensure confidentiality.
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 匿名化是准备定性数据以供 ChatGPT 分析时最重要的步骤之一。这涉及到从记录中移除任何个人标识符以保护参与者的隐私并确保机密性。
- en: 'Steps for Anonymizing Data:'
  id: totrans-1213
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 匿名化数据步骤：
- en: 'Remove Identifying Information : Before feeding your interview transcripts
    into ChatGPT, make sure all personal identifiers, such as names, job titles, company
    details, and geographical locations, are removed or replaced with generic labels.
    This minimizes the risk of identifying individuals from the data.'
  id: totrans-1214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移除识别信息：在将你的访谈记录输入 ChatGPT 之前，确保移除或用通用标签替换所有个人标识符，例如姓名、职位、公司详情和地理位置。这最大限度地减少了从数据中识别个人的风险。
- en: 'Example:'
  id: totrans-1215
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: Instead of “John Smith from ABC Corporation,” use “Participant 1 from Company
    A.”
  id: totrans-1216
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而不是“来自 ABC 公司的约翰·史密斯”，使用“来自公司 A 的参与者 1”。
- en: For geographical details, replace specific cities or locations with broader
    terms, such as “Region X” instead of “New York City.”
  id: totrans-1217
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于地理细节，用更广泛的术语替换具体的城市或地点，例如用“地区 X”代替“纽约市”。
- en: 'Pseudonymization : Assign participants unique pseudonyms or codes (e.g., “Participant
    1” , “Team Member A” ) to distinguish them throughout the analysis without revealing
    their identities. This allows you to maintain clarity in the data while protecting
    anonymity.'
  id: totrans-1218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 匿名化：为参与者分配唯一的化名或代码（例如，“参与者 1” , “团队成员 A” ）以在整个分析过程中区分他们，同时不透露他们的身份。这允许你在保护匿名性的同时保持数据的清晰性。
- en: A NONYMIZING YOUR DATA before using ChatGPT is crucial for ensuring that sensitive
    information is not exposed or mishandled during the analysis process.
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 ChatGPT 之前对数据进行匿名化是确保在分析过程中敏感信息不会被泄露或不当处理的关键。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1220
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1221
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Informed Consent
  id: totrans-1222
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 知情同意
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1223
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: I nformed consent is a fundamental ethical principle in research, especially
    when using AI tools like ChatGPT. Participants must be fully aware of how their
    data will be used, including its processing by AI systems, and must give their
    explicit consent before data collection begins.
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 知情同意是研究中的基本伦理原则，尤其是在使用像 ChatGPT 这样的 AI 工具时。参与者必须充分了解他们的数据将被如何使用，包括其通过 AI 系统的处理，并且在数据收集开始之前必须给予明确的同意。
- en: 'Steps for Informed Consent:'
  id: totrans-1225
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 知情同意步骤：
- en: 'Transparency about AI Use : Ensure that your consent forms clearly outline
    how AI, particularly ChatGPT, will be used in the analysis process. Explain that
    their qualitative data (e.g., interview transcripts) will be processed by an AI
    system to generate insights or themes, and clarify what this means in layman''s
    terms. Participants should understand how their data will be used, stored, and
    protected.'
  id: totrans-1226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于 AI 使用的透明度：确保你的同意书清楚地概述了 AI（尤其是 ChatGPT）在分析过程中的使用方式。解释他们的定性数据（例如，访谈记录）将由 AI
    系统处理以生成见解或主题，并澄清这在通俗语言中的含义。参与者应了解他们的数据将如何被使用、存储和保护。
- en: 'Consent for External Systems : Since ChatGPT is an external AI tool, it is
    essential to inform participants that their data may be processed by a third-party
    platform (OpenAI in this case). Participants should be made aware of any potential
    data transfer outside of the primary research institution.'
  id: totrans-1227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 外部系统同意：由于 ChatGPT 是一个外部 AI 工具，因此必须告知参与者他们的数据可能由第三方平台（在这种情况下是 OpenAI）处理。参与者应了解任何潜在的数据传输可能超出主要研究机构。
- en: 'Voluntary Participation : Reaffirm that participation is voluntary and that
    participants can withdraw at any time without penalty. Provide clear instructions
    on how they can revoke their consent if they decide not to participate further.'
  id: totrans-1228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自愿参与：重申参与是自愿的，参与者可以在任何时候无惩罚地退出。提供明确的指示，说明他们如何撤销同意，如果他们决定不再参与。
- en: B Y OBTAINING INFORMED consent that explicitly covers AI usage, you ensure that
    participants are fully aware of their rights and the scope of the study.
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 通过获得明确涵盖AI使用的知情同意，您确保参与者充分了解他们的权利和研究的范围。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1230
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1231
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Compliance with Data Protection Laws
  id: totrans-1232
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 遵守数据保护法律
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1233
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: W hen conducting research with sensitive qualitative data, you must comply with
    relevant data protection laws that govern the storage, processing, and use of
    personal data. These laws vary by region, and it is important to be familiar with
    the ones that apply to your research.
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行涉及敏感定性数据的研究时，您必须遵守相关数据保护法律，这些法律规定了个人数据的存储、处理和使用。这些法律因地区而异，了解适用于您的研究的法律非常重要。
- en: 'Key Data Protection Laws:'
  id: totrans-1235
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 关键数据保护法律：
- en: 'GDPR (General Data Protection Regulation) : If your research involves participants
    in Europe, you need to comply with GDPR, which governs how personal data must
    be handled and protected. Under GDPR, personal data must be anonymized, securely
    stored, and processed with explicit consent.'
  id: totrans-1236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GDPR（通用数据保护条例）：如果您的涉及欧洲参与者的研究，您需要遵守GDPR，该条例规定了个人数据必须如何处理和保护。根据GDPR，个人数据必须匿名化、安全存储并经明确同意处理。
- en: 'CCPA (California Consumer Privacy Act) : For research involving participants
    in California, CCPA outlines data privacy rights, including the right to know
    how personal data is being used and the right to have data deleted upon request.'
  id: totrans-1237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'CCPA（加利福尼亚消费者隐私法案）: 对于涉及加利福尼亚参与者的研究，CCPA概述了数据隐私权，包括了解个人数据如何被使用以及请求删除数据的权利。'
- en: 'Other Regional Laws : Depending on the location of your participants, familiarize
    yourself with local data protection regulations, such as PIPEDA in Canada, HIPAA
    (for health-related research) in the U.S., or Australian Privacy Principles (APPs)
    .'
  id: totrans-1238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他地区法律：根据参与者的位置，熟悉当地的数据保护法规，例如加拿大的PIPEDA、美国的健康相关研究HIPAA或澳大利亚隐私原则（APPs）。
- en: E NSURE THAT YOUR USE of ChatGPT complies with these legal frameworks. This
    includes informing participants about their rights under these laws, such as the
    right to access their data or request its deletion.
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您使用ChatGPT的方式符合这些法律框架。这包括告知参与者他们根据这些法律享有的权利，例如访问他们的数据或请求删除数据的权利。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1240
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1241
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Storage and Data Security
  id: totrans-1242
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 存储和数据安全
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1243
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: W hen working with sensitive qualitative data, it is vital to ensure that the
    data is securely stored and protected throughout the research process, from initial
    data collection to the analysis phase. Proper storage and security measures protect
    against unauthorized access or breaches, especially when using cloud-based services
    or external tools like ChatGPT.
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理敏感定性数据时，确保数据在整个研究过程中安全存储和保护至关重要，从最初的数据收集到分析阶段。适当的存储和安全措施可以防止未经授权的访问或泄露，尤其是在使用基于云的服务或外部工具如ChatGPT时。
- en: 'Best Practices for Data Storage and Security:'
  id: totrans-1245
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据存储和安全最佳实践：
- en: 'Encryption : Store all data, including transcripts and analysis outputs, in
    secure, encrypted databases. This ensures that even if the data is intercepted,
    it cannot be read or accessed without the decryption key.'
  id: totrans-1246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加密：将所有数据，包括转录和分析输出，存储在安全、加密的数据库中。这确保了即使数据被截获，没有解密密钥也无法读取或访问。
- en: 'Cloud Services Compliance : If you are using cloud-based services to store
    your data, ensure that these services are compliant with data protection regulations
    like GDPR or CCPA. Cloud providers should offer robust encryption and access controls.'
  id: totrans-1247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 云服务合规性：如果您使用基于云的服务来存储数据，请确保这些服务符合数据保护法规，如GDPR或CCPA。云服务提供商应提供强大的加密和访问控制。
- en: 'Access Controls : Limit access to sensitive data to only those who are directly
    involved in the research. Ensure that all users who can access the data use strong
    passwords and two-factor authentication (2FA) to prevent unauthorized entry.'
  id: totrans-1248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问控制：仅限直接参与研究的人员访问敏感数据。确保所有可以访问数据的使用者使用强密码和双因素认证（2FA）以防止未经授权的访问。
- en: 'Backup Procedures : Regularly back up your data to prevent data loss in case
    of system failures. However, make sure that backup copies are also encrypted and
    stored securely.'
  id: totrans-1249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 备份程序：定期备份您的数据以防止系统故障导致的数据丢失。但是，请确保备份副本也进行了加密并安全存储。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1250
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1251
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: OpenAI’s Data Usage Policies
  id: totrans-1252
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: OpenAI的数据使用政策
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1253
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: W hen using ChatGPT for qualitative analysis, it is important to understand
    OpenAI’s data usage policies. As of the time of writing, OpenAI does not use data
    sent to its API for training purposes unless the user consents to it. However,
    this policy may change, so it is essential to stay up to date with OpenAI’s terms
    of service.
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用ChatGPT进行定性分析时，了解OpenAI的数据使用政策非常重要。截至写作时，OpenAI不会将其API收到的数据用于训练目的，除非用户同意。然而，这项政策可能会改变，因此保持对OpenAI服务条款的更新至关重要。
- en: 'What to Review:'
  id: totrans-1255
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 需要审查的内容：
- en: 'Data Retention Policies : Check how long OpenAI retains data submitted via
    the API and what steps are taken to ensure data privacy. Ideally, you want to
    ensure that your data is not stored indefinitely and is deleted after the analysis
    is complete.'
  id: totrans-1256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据保留政策：检查OpenAI通过API提交的数据保留时间以及为确保数据隐私所采取的措施。理想情况下，您希望确保数据不会无限期存储，分析完成后即被删除。
- en: 'Data Processing Practices : Review OpenAI’s terms to understand how your data
    is processed, whether for analysis, storage, or usage in model training. You can
    choose to opt out of data usage for future model training if this option is available.'
  id: totrans-1257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理实践：请查阅OpenAI的条款，了解您的数据是如何被处理的，无论是用于分析、存储还是用于模型训练。如果此选项可用，您可以选择退出未来模型训练中的数据使用。
- en: B Y STAYING INFORMED about OpenAI’s data policies, you ensure that your research
    aligns with your ethical standards and complies with participant consent regarding
    data usage.
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解OpenAI的数据政策，您确保您的科研与您的道德标准一致，并符合关于数据使用的参与者同意。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1259
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1260
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Transparency and Ethical Reporting
  id: totrans-1261
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 透明度和道德报告
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1262
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: W hen publishing or presenting your research, transparency about how ChatGPT
    was used is essential. Ethical reporting includes clearly documenting the role
    that AI played in the data analysis process and addressing any limitations or
    potential biases that AI may have introduced into the analysis.
  id: totrans-1263
  prefs: []
  type: TYPE_NORMAL
  zh: 在发布或展示您的研究时，关于如何使用ChatGPT的透明度至关重要。道德报告包括清楚地记录AI在数据分析过程中的作用，并解决AI可能引入分析中的任何局限性或潜在偏差。
- en: 'Steps for Transparent Reporting:'
  id: totrans-1264
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 透明报告的步骤：
- en: 'Document ChatGPT’s Role : Clearly explain how ChatGPT was used in the research
    process—whether for generating codes, identifying themes, or analyzing patterns.
    This should be part of your methodology section, where you describe the tools
    and processes used for analysis.'
  id: totrans-1265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录ChatGPT的作用：清楚地解释ChatGPT在研究过程中的使用情况——无论是用于生成代码、识别主题还是分析模式。这应该是您的方法论部分的一部分，其中描述了用于分析的工具和流程。
- en: 'Acknowledge Limitations : AI models like ChatGPT may introduce biases or oversights.
    Be upfront about these limitations and how you mitigated them, such as reviewing
    and refining AI-generated codes with human oversight. It is important to acknowledge
    that while AI can aid in analysis, the final interpretation should still rest
    with the researcher.'
  id: totrans-1266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 承认局限性：像ChatGPT这样的AI模型可能会引入偏见或疏忽。坦率地说明这些局限性以及你如何减轻它们，例如在人类监督下审查和改进AI生成的代码。重要的是要承认，尽管人工智能可以帮助分析，但最终的解释仍然应该由研究人员负责。
- en: 'Maintain Ethical Boundaries : Ensure that your analysis adheres to ethical
    standards, such as fairness, accuracy, and respect for participant data. Do not
    overstate AI’s capabilities, and make sure that human judgment and expertise remain
    central to the research findings.'
  id: totrans-1267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维护道德边界：确保你的分析符合道德标准，例如公平性、准确性以及对参与者数据的尊重。不要过度夸大人工智能的能力，并确保人类判断和专业知识在研究结论中保持核心地位。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1268
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1269
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Interview transcript example
  id: totrans-1270
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 访谈记录示例
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1271
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: T he following interview example focuses on how employees and teams have been
    affected by the introduction of VR in their remote work environments. This could
    involve using VR for virtual meetings, collaborative projects, and even social
    interaction in a virtual workspace.
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 以下访谈示例关注员工和团队如何受到远程工作环境中虚拟现实（VR）引入的影响。这可能包括使用VR进行虚拟会议、协作项目和甚至虚拟工作空间中的社交互动。
- en: Given the novelty of VR in professional settings, participants could be remote
    employees or managers who have been experimenting with VR tools to enhance collaboration,
    communication, and team building. The goal of the interview is to capture their
    unique experiences and the challenges and opportunities they have encountered.
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 由于虚拟现实（VR）在专业环境中的新颖性，参与者可能是远程员工或管理人员，他们一直在尝试使用VR工具来增强协作、沟通和团队建设。访谈的目的是捕捉他们的独特经历以及他们遇到的挑战和机遇。
- en: '"The Impact of Virtual Reality (VR) on Team Collaboration in Remote Work Environments"'
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: '"虚拟现实（VR）对远程工作环境中团队协作的影响"'
- en: 'Rationale:'
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: 理由：
- en: The rise of remote work has accelerated the use of new technologies, including
    Virtual Reality (VR), in the workplace. However, the effects of using VR for remote
    team collaboration have not been extensively studied. This topic is relatively
    new and allows us to explore how immersive technologies like VR are shaping the
    way teams interact, collaborate, and communicate in virtual spaces. With VR gaining
    traction for remote meetings, virtual brainstorming sessions, and training programs,
    this subject offers a fresh perspective on how cutting-edge technology is influencing
    workplace dynamics, making it an ideal subject for qualitative analysis.
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: 远程工作的兴起加速了新技术在工作场所的应用，包括虚拟现实（VR）。然而，使用VR进行远程团队协作的影响尚未得到广泛研究。这个主题相对较新，使我们能够探索沉浸式技术如VR如何塑造团队在虚拟空间中的互动、协作和沟通方式。随着VR在远程会议、虚拟头脑风暴会议和培训计划中的应用越来越受欢迎，这个主题为如何尖端技术影响工作场所动态提供了新的视角，使其成为定性分析的理想主题。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1277
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1278
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Deductive Thematic Analysis
  id: totrans-1279
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 演绎主题分析
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1280
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: D eductive thematic analysis is well-suited for exploring a novel and evolving
    topic like VR in remote work environments. In this case, the analysis will be
    guided by predefined themes based on existing theories of team collaboration and
    technology adoption in the workplace. By applying these pre-defined themes to
    interview data, we can explore how the integration of VR is impacting areas such
    as communication, productivity, interpersonal relationships, and overall team
    cohesion in a virtual work environment.
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 演绎主题分析非常适合探索像远程工作环境中的VR这样的新颖且不断发展的主题。在这种情况下，分析将由基于现有团队协作和工作场所技术采用理论的预定义主题指导。通过将这些预定义主题应用于访谈数据，我们可以探索VR的整合如何影响沟通、生产力、人际关系以及虚拟工作环境中的整体团队凝聚力。
- en: Our focus will be on how ChatGPT can assist in identifying key themes and recurring
    patterns from interview transcripts, aligning these with the pre-established categories,
    and helping researchers explore the broader implications of VR for team dynamics.
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的关注点将是如何利用ChatGPT从访谈记录中识别关键主题和重复出现的模式，将这些与预先建立的类别对齐，并帮助研究人员探索VR对团队动态的更广泛影响。
- en: This example allows us to investigate underexplored areas of research, such
    as whether VR helps bridge the gap between geographically dispersed teams, fosters
    better communication, or even creates new types of workplace stress or digital
    fatigue.
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子使我们能够调查研究不充分探索的领域，例如VR是否有助于弥合地理上分散的团队之间的差距，促进更好的沟通，甚至创造新的工作场所压力或数字疲劳。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1284
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1285
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Structure of the Interview
  id: totrans-1286
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 访谈结构：
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1287
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: T he semi-structured interview design will focus on core areas related to VR
    and its impact on remote team collaboration. This structure allows for detailed,
    qualitative responses while ensuring the interview stays aligned with predefined
    themes.
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 半结构化访谈设计将重点关注与VR及其对远程团队协作的影响相关的核心领域。这种结构允许进行详细的质量响应，同时确保访谈与预定义的主题保持一致。
- en: 'Interview Structure:'
  id: totrans-1289
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 访谈结构：
- en: 'Introduction and General Questions :'
  id: totrans-1290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 引言和一般问题：
- en: “How long have you been using Virtual Reality (VR) tools in your remote work
    environment?”
  id: totrans-1291
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您在远程工作环境中使用虚拟现实（VR）工具有多长时间了？”
- en: “What are the main tasks or activities for which your team uses VR?”
  id: totrans-1292
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您的团队使用VR的主要任务或活动是什么？”
- en: 'Team Communication and Collaboration :'
  id: totrans-1293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 团队沟通与协作：
- en: “How has VR affected the way you communicate with your team during remote work?”
  id: totrans-1294
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “VR如何影响您在远程工作中与团队沟通的方式？”
- en: “Do you feel that VR helps or hinders collaboration compared to traditional
    video conferencing tools?”
  id: totrans-1295
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您认为与传统的视频会议工具相比，VR有助于还是阻碍了协作？”
- en: 'Team Dynamics and Relationships :'
  id: totrans-1296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 团队动态与关系：
- en: “Has the use of VR influenced your sense of connection with colleagues?”
  id: totrans-1297
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “VR的使用是否影响了您与同事之间的联系感？”
- en: “Do you think VR has changed the way your team members interact or build relationships?”
  id: totrans-1298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您认为VR是否改变了团队成员之间的互动方式或建立关系的方式？”
- en: 'Productivity and Efficiency :'
  id: totrans-1299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生产力和效率：
- en: “Do you feel more or less productive when using VR for meetings or collaborative
    tasks?”
  id: totrans-1300
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您在使用VR进行会议或协作任务时，感觉更有效率还是更少？”
- en: “Has VR introduced any challenges or improvements in task management during
    remote projects?”
  id: totrans-1301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “VR在远程项目中的任务管理是否带来了任何挑战或改进？”
- en: 'Emotional and Psychological Effects :'
  id: totrans-1302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情感和心理影响：
- en: “How does using VR for work affect your mental well-being or stress levels?”
  id: totrans-1303
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “使用VR进行工作如何影响您的心理健康或压力水平？”
- en: “Have you experienced any form of digital fatigue or VR-related exhaustion?”
  id: totrans-1304
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您是否经历过任何形式的数字疲劳或VR相关的疲劳？”
- en: 'Adaptation and Learning Curve :'
  id: totrans-1305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应与学习曲线：
- en: “What was the learning curve like for adapting to VR tools in the workplace?”
  id: totrans-1306
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “适应工作场所中的VR工具的学习曲线是什么样的？”
- en: “Has your company provided sufficient support for transitioning to VR?”
  id: totrans-1307
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您的公司是否为过渡到VR提供了足够支持？”
- en: 'Future of VR in Remote Work :'
  id: totrans-1308
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: VR在远程工作中的未来：
- en: “Do you see VR playing a larger role in the future of remote work? Why or why
    not?”
  id: totrans-1309
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您认为VR在未来远程工作中将扮演更重要的角色吗？为什么或为什么不？”
- en: “What changes or improvements would you suggest for using VR in team collaboration?”
  id: totrans-1310
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您建议在团队协作中使用VR时进行哪些改变或改进？”
- en: 'Closing Questions :'
  id: totrans-1311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结束问题：
- en: “What would you like to share about your experience using VR that we haven’t
    covered?”
  id: totrans-1312
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您想分享关于您使用VR的经验，而我们尚未涉及的内容是什么？”
- en: “Is there anything else you think is important regarding the impact of VR on
    team dynamics?”
  id: totrans-1313
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “您认为关于VR对团队动态的影响还有什么其他重要的事情吗？”
- en: T HIS STRUCTURE BALANCES practical questions with exploratory ones, allowing
    the participants to share insights on their personal experiences while ensuring
    the interview touches on the main themes relevant to remote work and VR.
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构平衡了实际问题和探索性问题，使参与者能够分享他们个人经验的见解，同时确保访谈涉及与远程工作和VR相关的主题。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1315
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1316
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: Predefined Themes for Deductive Analysis
  id: totrans-1317
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 预定义主题用于演绎分析
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1318
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: F or deductive thematic analysis, we will use predefined themes based on existing
    literature around team collaboration, technology adoption, and the psychological
    effects of immersive environments like VR.
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: 对于演绎主题分析，我们将使用基于现有文献中关于团队协作、技术采用和VR等沉浸式环境心理效应的预定义主题。
- en: 'Predefined Themes:'
  id: totrans-1320
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 预定义主题：
- en: 'Communication and Interaction :'
  id: totrans-1321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 沟通和互动：
- en: 'Focus : How VR impacts communication within teams and between team members.'
  id: totrans-1322
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注：VR如何影响团队内部以及团队成员之间的沟通。
- en: 'Sub-themes : Clarity of communication, ease of collaboration, informal vs.
    formal interactions, non-verbal cues in VR.'
  id: totrans-1323
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：沟通清晰度、协作便利性、非正式与正式互动、VR中的非言语线索。
- en: 'Team Cohesion and Relationships :'
  id: totrans-1324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 团队凝聚力和关系：
- en: 'Focus : The effect of VR on team dynamics and interpersonal relationships.'
  id: totrans-1325
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注：VR对团队动态和人际关系的影响。
- en: 'Sub-themes : Team bonding, social connection, trust-building, remote team integration.'
  id: totrans-1326
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：团队凝聚力、社交联系、建立信任、远程团队整合。
- en: 'Productivity and Workflow :'
  id: totrans-1327
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生产力和工作流程：
- en: 'Focus : How VR affects individual and team productivity in remote work settings.'
  id: totrans-1328
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注：VR如何影响远程工作环境中的个人和团队生产力。
- en: 'Sub-themes : Task efficiency, focus, workflow management, multitasking in VR.'
  id: totrans-1329
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：任务效率、专注力、工作流程管理、VR中的多任务处理。
- en: 'Emotional and Psychological Impact :'
  id: totrans-1330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 情感和心理影响：
- en: 'Focus : The mental and emotional effects of using VR as a work tool.'
  id: totrans-1331
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注：作为工作工具使用VR的心理和情感影响。
- en: 'Sub-themes : Stress, digital fatigue, cognitive load, immersive overload, feelings
    of isolation or presence.'
  id: totrans-1332
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：压力、数字疲劳、认知负荷、沉浸式超负荷、孤独或存在感。
- en: 'Adaptation and Learning Curve :'
  id: totrans-1333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应和学习曲线：
- en: 'Focus : The ease or difficulty of adopting and adapting to VR technologies
    in the workplace.'
  id: totrans-1334
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注：在职场中采用和适应VR技术的容易程度。
- en: 'Sub-themes : Training, learning challenges, skill acquisition, company support.'
  id: totrans-1335
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：培训、学习挑战、技能获取、公司支持。
- en: 'Perception of Future Use :'
  id: totrans-1336
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对未来使用的感知：
- en: 'Focus : Employee perceptions of the long-term viability and future of VR in
    remote work.'
  id: totrans-1337
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重点关注：员工对远程工作中VR长期可行性和未来的看法。
- en: 'Sub-themes : Scalability, long-term adaptation, potential for innovation, barriers
    to adoption.'
  id: totrans-1338
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：可扩展性、长期适应、创新潜力、采用障碍。
- en: T HESE PREDEFINED THEMES will guide our deductive analysis, with ChatGPT assisting
    in identifying relevant codes from the interview data. The themes offer a structured
    way to analyze the impact of VR on remote work while leaving room for insights
    specific to this emerging technology.
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 这些预定义主题将指导我们的演绎分析，ChatGPT将协助从访谈数据中识别相关代码。这些主题提供了一种结构化的方式来分析VR对远程工作的影响，同时为针对这一新兴技术的特定见解留出空间。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1340
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![图片](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1341
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: Hypothetical Interview Transcript
  id: totrans-1342
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 假设性访谈记录
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1343
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: 'Interviewer: How long have you been using VR tools in your remote work environment,
    and what kinds of tasks or activities does your team typically use VR for?'
  id: totrans-1344
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 访谈者：你在远程工作环境中使用VR工具有多久了，你们团队通常使用VR来完成哪些任务或活动？
- en: 'P articipant : I have been using VR for roughly eight months now. Initially,
    we only used it for occasional meetings—usually when we needed to brainstorm or
    have more interactive discussions. But over time, it has become more of a regular
    thing. Now, we use it for bigger team meetings, virtual training sessions, and
    creative workshops. It is particularly useful when we need to collaborate visually,
    like when we are sketching ideas on a virtual whiteboard or reviewing 3D models.
    I would say it is more hands-on compared to a regular video call, but we do not
    use it for everything. Sometimes, it is still easier just to hop on Zoom.'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：我大约已经使用VR八个月了。最初，我们只是偶尔使用它进行会议——通常在我们需要头脑风暴或进行更互动的讨论时。但随着时间的推移，它已经变成了更常见的事情。现在，我们用它来进行更大的团队会议、虚拟培训课程和创意研讨会。当我们需要视觉协作时尤其有用，比如我们在虚拟白板上绘制想法或审查3D模型时。我认为它比常规的视频通话更直观，但我们并不是用它在所有事情上。有时，直接跳上Zoom仍然更容易。
- en: 'Interviewer: How has VR affected the way you communicate with your team during
    remote work?'
  id: totrans-1346
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：VR如何影响你在远程工作时与团队沟通的方式？
- en: 'P ARTICIPANT : It is definitely changed the way we communicate, and for the
    most part, it has been an improvement. In VR, it feels like we are all in the
    same room, which adds a level of engagement you do not get with traditional video
    calls. The avatars give a sense of presence, and even though it is virtual, it
    helps with things like body language and non-verbal cues. I find that I am more
    focused during VR meetings—it is harder to get distracted when you are fully immersed.'
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：它确实改变了我们沟通的方式，而且大部分情况下，这已经是一个改进。在VR中，感觉我们都在同一个房间里，这增加了你在传统视频通话中得不到的参与度。这些虚拟形象给人一种存在感，尽管它是虚拟的，但它有助于肢体语言和非言语提示。我发现我在VR会议中更加专注——当你完全沉浸其中时，很难分心。
- en: That being said, there are some challenges. Not everyone on the team is comfortable
    using VR, so there is a bit of a gap in participation. Some people are still hesitant,
    and that can slow things down. Plus, the tech learning curve at the start was
    steep—there were issues with headsets not working properly, or people just not
    being familiar with how to navigate the virtual space. It has been a bit smoother
    now, but there is still the occasional glitch or someone getting lost in the virtual
    room.
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，也有一些挑战。团队中并非每个人都舒服地使用VR，所以参与度存在一些差距。有些人仍然犹豫不决，这可能会减慢事情的发展。此外，一开始的技术学习曲线很陡峭——存在头戴设备无法正常工作的问题，或者人们不熟悉如何导航虚拟空间。现在它已经变得稍微顺畅一些，但偶尔还是会有一些故障或有人在虚拟房间中迷路。
- en: 'Interviewer: Has using VR influenced your sense of connection with your colleagues?
    Do you think it is changed the way you interact with team members?'
  id: totrans-1349
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：使用VR是否影响了你与同事之间的联系感？你认为它是否改变了你与团队成员互动的方式？
- en: 'P ARTICIPANT : In some ways, it is definitely brought us closer. The virtual
    environment makes it feel like we are in the same space, even if we are all working
    from different locations. I have noticed that when we use VR for social events
    or team-building exercises, it feels more interactive than just doing a Zoom happy
    hour or something. For example, we did a virtual coffee break in VR, and it felt
    more natural to move around and talk to different people, like you would in a
    real office setting.'
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：在某些方面，它确实让我们更近了。虚拟环境让我们感觉好像我们都在同一个空间，即使我们都在不同的地方工作。我注意到，当我们使用VR进行社交活动或团队建设练习时，它比仅仅进行Zoom欢乐时光或类似的活动更有互动性。例如，我们在VR中进行了虚拟咖啡休息，感觉像在真实的办公室环境中一样自然地四处走动和与不同的人交谈。
- en: But it is not perfect. There is still something missing. The avatars are fun,
    but they are not real people, you know? I still miss seeing facial expressions
    and real body language. Sometimes, VR feels a bit artificial, and I think that
    creates a little bit of emotional distance. It is definitely better than just
    staring at a screen of faces on Zoom, but it is not a replacement for face-to-face
    interaction.
  id: totrans-1351
  prefs: []
  type: TYPE_NORMAL
  zh: 但它并不完美。还有一些东西缺失。这些虚拟形象很有趣，但你知道，它们并不是真实的人。我还是怀念看到面部表情和真实的肢体语言。有时候，VR感觉有点不自然，我认为这造成了一些情感上的距离。它确实比只是盯着Zoom上的面孔屏幕要好，但它不能替代面对面的互动。
- en: 'Interviewer: How has VR impacted your productivity? Do you feel more or less
    productive when using VR for meetings or collaborative tasks?'
  id: totrans-1352
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：VR如何影响你的生产力？你认为在使用VR进行会议或协作任务时，你更有效率还是更没效率？
- en: 'P ARTICIPANT : That really depends on the task. For things like creative brainstorming
    or collaborating on designs, VR is amazing. It lets us visualize ideas and work
    on things together in a way that feels very collaborative. For those kinds of
    tasks, I would say I am definitely more productive. The fact that you can work
    on a virtual whiteboard or interact with 3D models speeds up the process and makes
    everything more hands-on.'
  id: totrans-1353
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：这完全取决于任务。对于像创意头脑风暴或协作设计这样的任务，VR非常神奇。它让我们能够可视化想法，并以一种感觉非常协作的方式一起工作。对于这类任务，我会说我确实更有效率。你可以在虚拟白板上工作或与3D模型互动，这加快了过程，使一切更加亲身体验。
- en: But for everyday meetings? Not so much. It is kind of overkill for routine stuff
    like status updates or quick check-ins. There is also the setup time—you need
    to put on the headset, make sure everything is working, and sometimes deal with
    technical hiccups. Plus, meetings tend to run longer in VR because we are still
    figuring out the best way to use it. So, while it is great for certain tasks,
    I wouldn’t say it’s boosted my productivity across the board.
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于日常会议呢？并不多。对于像状态更新或快速检查这类常规事务来说，这有点过度了。还有设置时间——你需要戴上头戴式设备，确保一切正常工作，有时还要处理技术故障。此外，在VR中会议往往更长，因为我们仍在探索最佳使用方式。所以，虽然它在某些任务上很棒，但我不会说我因此提高了整体的生产力。
- en: 'Interviewer: How has VR affected your mental and emotional well-being?'
  id: totrans-1355
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：VR如何影响你的心理和情感健康？
- en: 'P ARTICIPANT : I did not expect VR to be as tiring as it is. It can be exhausting,
    especially if you are in it for long periods. There’s so much sensory input in
    VR—visuals, sounds, and the whole immersive environment—that it can get overwhelming
    after a while. I have found that after a couple of hours in VR, I feel drained
    in a way I do not after a regular video call. I have definitely experienced what
    I would call “VR fatigue,” where I just need to take off the headset and take
    a break.'
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：我没有想到VR会这么累。它可能会让人筋疲力尽，尤其是如果你长时间使用它。VR中有大量的感官输入——视觉、声音以及整个沉浸式环境——一段时间后可能会让人感到压倒。我发现，在VR中待了几个小时后，我感到的疲惫程度比常规视频通话后要大。我确实体验到了所谓的“VR疲劳”，那时我只需要摘下头戴式设备休息一下。
- en: Another thing is the disconnect between being in this immersive virtual space
    and then taking off the headset and realizing you are just alone in your room.
    It can feel a bit jarring, and that is something I had not anticipated. It is
    like your brain is in two places at once, and it can take a little while to adjust
    back to reality after a long VR session.
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 另一件事是，从沉浸式的虚拟空间中摘下头戴式设备并意识到你只是独自一人在房间里，这可能会让人感到有些震惊。我没有预料到这一点。感觉就像你的大脑同时在两个地方，在长时间VR体验后，需要一段时间才能调整回现实。
- en: 'Interviewer: What was the learning curve like for adapting to VR tools in the
    workplace? Has your company provided enough support for the transition to VR?'
  id: totrans-1358
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：适应工作场所的VR工具的学习曲线是怎样的？贵公司为VR的过渡提供了足够支持吗？
- en: 'P ARTICIPANT : The learning curve was pretty steep at the beginning. Getting
    used to the controls, navigating the virtual environment, and even just wearing
    the headset for extended periods took some time. My company did provide training,
    but it was mostly self-guided, which worked for some of us but was a bit harder
    for others. The more tech-savvy people adapted quickly, but I know some colleagues
    struggled with it, especially at the start. We could have used more structured
    training or one-on-one sessions to help everyone get up to speed.'
  id: totrans-1359
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：一开始的学习曲线相当陡峭。适应控制、在虚拟环境中导航，甚至只是长时间佩戴头戴式设备都需要一些时间。我的公司确实提供了培训，但主要是自学，这对我们中的一些人来说效果不错，但对其他人来说有点困难。技术更熟练的人适应得很快，但我知道一些同事在开始时遇到了困难。我们本可以使用更多结构化的培训或一对一的辅导，帮助每个人跟上进度。
- en: On the plus side, the company has been pretty good about providing the equipment
    and troubleshooting when things go wrong. They have been understanding that VR
    is new for most of us, and they’ve been patient as we all get used to it. But
    I do think more hands-on support early on would have made the transition smoother.
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 优点是，公司一直做得很好，在提供设备和处理问题时。他们理解VR对我们大多数人来说都是新的，并且在我们逐渐适应的过程中表现出了耐心。但我确实认为，如果一开始就提供更多手把手支持，过渡过程会更为顺畅。
- en: 'Interviewer: Do you think VR will play a bigger role in remote work in the
    future? Why or why not?'
  id: totrans-1361
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：你认为VR在未来远程工作中会扮演更重要的角色吗？为什么或为什么不呢？
- en: 'P ARTICIPANT : I think VR has a lot of potential for remote work, especially
    for certain industries and tasks. It is great for creative collaboration, training,
    and any situation where you need to visualize things in 3D. But I do not see it
    replacing everything. For routine meetings or quick conversations, regular video
    calls are still easier and more efficient.'
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：我认为VR在远程工作中有很大的潜力，尤其是在某些行业和任务中。它非常适合创意协作、培训和任何需要3D可视化的场合。但我并不认为它会取代一切。对于常规会议或快速对话，常规的视频通话仍然更简单、更高效。
- en: That said, I do think as the technology improves, we will see more people adopting
    it. Right now, the hardware is still a bit bulky, and the software can be glitchy,
    but as those issues get ironed out, I think VR could become a bigger part of how
    we work remotely. But for now, I see it as just one tool in the toolbox—not the
    main way we do things.
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我认为随着技术的进步，我们将看到更多的人开始采用它。目前，硬件仍然有点笨重，软件可能会有点故障，但随着这些问题的解决，我认为VR可能会成为我们远程工作方式的一个重要组成部分。但就目前而言，我把它看作是工具箱中的一个工具——而不是我们做事的主要方式。
- en: 'Interviewer: What would you change about how VR is used in your workplace?'
  id: totrans-1364
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：您会改变您在工作场所使用VR的哪些方面？
- en: 'P ARTICIPANT : I think we need clearer guidelines on when to use VR and when
    it is better to stick with traditional tools. Right now, it feels like we are
    still experimenting, and sometimes we use VR for meetings where it is not really
    necessary. I would also suggest keeping VR meetings shorter—after an hour or so,
    it gets pretty tiring. And, as I mentioned earlier, more structured training would
    have helped, especially for the people who were not familiar with the technology.'
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：我认为我们需要更清晰的指南，说明何时使用VR，何时最好坚持使用传统工具。目前，感觉我们还在实验阶段，有时我们会使用VR进行会议，但实际上并不必要。我还建议缩短VR会议的时长——大约一个小时后，就会感到非常疲劳。而且，正如我之前提到的，更多的结构化培训会有所帮助，特别是对于那些不熟悉这项技术的人来说。
- en: 'Interviewer: Is there anything else you would like to share about your experience
    using VR for remote work?'
  id: totrans-1366
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 采访者：您在使用VR进行远程工作时，还有其他想分享的经验吗？
- en: 'P ARTICIPANT : Overall, I think VR is an exciting tool with a lot of potential.
    It is changed how I think about remote work and made certain tasks a lot more
    interactive. But it is not a magic bullet, and there are definitely challenges—especially
    around fatigue and learning to use the tech. I think with the right balance and
    support, VR could be a game-changer for certain aspects of remote work, but it
    is not going to replace everything.'
  id: totrans-1367
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者：总的来说，我认为VR是一个令人兴奋的工具，具有很大的潜力。它改变了我对远程工作的看法，并使某些任务变得更加互动。但它不是万能的，确实存在一些挑战——尤其是在疲劳和学习使用技术方面。我认为，在适当的平衡和支持下，VR可能会成为远程工作某些方面的游戏改变者，但它不会取代一切。
