  zh: 第二章。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Understanding ChatGPT and AI Language Models
  id: totrans-218
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解ChatGPT和AI语言模型
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: T o use ChatGPT to its full potential in your research, it is essential to first
    understand the basics of how AI and natural language processing (NLP) work, the
    capabilities and limitations of ChatGPT, and the ethical considerations that come
    with incorporating AI into your research process. By the end of this chapter,
    you will have a solid grasp of the mechanics of ChatGPT and be prepared to use
    it responsibly and effectively.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 要在研究中充分发挥ChatGPT的潜力，首先理解人工智能和自然语言处理（NLP）的基本工作原理、ChatGPT的功能和限制，以及将AI纳入研究过程所带来的伦理考量至关重要。到本章结束时，你将牢固掌握ChatGPT的机制，并准备好负责任且有效地使用它。
- en: Basics of AI and Natural Language Processing
  id: totrans-221
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 人工智能与自然语言处理基础
- en: A RTIFICIAL INTELLIGENCE has been rapidly advancing in recent years, with NLP
    emerging as one of its most transformative branches. NLP allows machines to understand,
    interpret, and generate human language in ways that were previously impossible.
    At its core, NLP bridges the gap between human communication and computer comprehension,
    enabling AI to process and analyze vast amounts of unstructured text data—exactly
    the kind of data generated in qualitative research.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能近年来发展迅速，自然语言处理（NLP）已成为其最具变革性的分支之一。NLP使机器能够以以前不可能的方式理解、解释和生成人类语言。在其核心，NLP架起了人类沟通与计算机理解之间的桥梁，使AI能够处理和分析大量非结构化文本数据——这正是定性研究产生的那种数据。
- en: 'In the context of ChatGPT, NLP enables the AI to "read" through qualitative
    data, such as interview transcripts or focus group discussions, and assist in
    identifying patterns, codes, and themes. Key techniques in NLP include:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT的语境中，自然语言处理（NLP）使AI能够“阅读”定性数据，如访谈记录或焦点小组讨论，并协助识别模式、编码和主题。NLP的关键技术包括：
- en: 'Tokenization : Breaking down text into smaller units like words or phrases.'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分词：将文本分解成更小的单元，如单词或短语。
- en: 'Text classification : Assigning predefined categories to text, which can assist
    in tasks like sentiment analysis or thematic coding.'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本分类：将预定义的类别分配给文本，这有助于执行诸如情感分析或主题编码等任务。
- en: 'Named entity recognition : Identifying and classifying specific elements like
    names, dates, or organizations within a text.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名实体识别：在文本中识别和分类特定元素，如名称、日期或组织。
- en: 'Text generation : The ability of AI, like ChatGPT, to generate human-like responses
    or summaries from prompts or questions.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本生成：AI（如ChatGPT）从提示或问题中生成类似人类的响应或摘要的能力。
- en: ChatGPT, specifically, is built on the GPT (Generative Pretrained Transformer)
    architecture, which uses deep learning models to predict the next word in a sequence,
    making it highly proficient at tasks like conversation generation and text summarization
    (6).
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT特别基于GPT（生成预训练变换器）架构，该架构使用深度学习模型来预测序列中的下一个单词，使其在对话生成和文本摘要等任务上非常熟练（6）。
- en: In qualitative research, these features can streamline tasks like coding and
    thematic analysis, saving researchers time and energy.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在定性研究中，这些功能可以简化编码和主题分析等任务，节省研究者的时间和精力。
- en: 'How ChatGPT Works: Capabilities and Limitations'
  id: totrans-230
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT的工作原理：功能与限制
- en: T O UNDERSTAND HOW CHATGPT functions in a research setting, let us break down
    its capabilities and limitations (Figure 2.1).
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解ChatGPT在研究环境中的功能，让我们分析其功能和限制（图2.1）。
- en: 'Capabilities:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 功能：
- en: 'Text Summarization : ChatGPT can process large amounts of text data and generate
    concise summaries, helping researchers quickly identify the core ideas or themes
    from lengthy transcripts.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本摘要：ChatGPT可以处理大量文本数据并生成简洁的摘要，帮助研究者快速从冗长的记录中识别核心思想或主题。
- en: 'Text Classification and Coding : ChatGPT can assist with the open coding process
    by identifying recurring words, phrases, or concepts in qualitative data. For
    example, if you input raw interview transcripts, ChatGPT can highlight key terms
    and suggest initial codes, which you can refine and validate.'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本分类与编码：ChatGPT可以通过识别定性数据中的重复单词、短语或概念来协助开放编码过程。例如，如果你输入原始访谈记录，ChatGPT可以突出显示关键术语并建议初始编码，你可以进一步精炼和验证。
- en: 'Generating Ideas and Questions : ChatGPT is useful for brainstorming, generating
    questions, or expanding on thematic insights. This can be particularly helpful
    in refining research questions or developing new angles of inquiry during thematic
    analysis.'
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成想法和问题：ChatGPT在头脑风暴、生成问题或扩展主题洞察方面很有用。这在细化研究问题或发展主题分析的新角度时尤其有帮助。
- en: 'Pattern Recognition : By analyzing qualitative data for trends and recurring
    themes, ChatGPT can support pattern identification, helping you find connections
    in the data you might otherwise overlook.'
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模式识别：通过分析定性数据中的趋势和重复主题，ChatGPT可以支持模式识别，帮助你找到你可能否则会忽视的数据中的联系。
- en: 'Figure 2.1: Capabilities of ChatGPT'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1：ChatGPT的能力
- en: '![image](d2d_images/image019.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/image019.png)'
- en: H OWEVER, WHILE CHATGPT has impressive capabilities, it is important to recognize
    its limitations (Figure 2.2).
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管ChatGPT拥有令人印象深刻的性能，但重要的是要认识到它的局限性（图2.2）。
- en: 'Limitations:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 局限性：
- en: 'Contextual Understanding : Although ChatGPT can generate coherent text, it
    does not truly understand the context in which the data is being analyzed. For
    instance, while it may suggest codes based on language patterns, it cannot fully
    comprehend cultural nuances, emotional undertones, or social context—factors that
    are critical in qualitative research.'
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文理解：尽管ChatGPT可以生成连贯的文本，但它并不真正理解数据被分析时的上下文。例如，它可能会根据语言模式提出代码，但它无法完全理解文化细微差别、情感基调或社会背景——这些因素在定性研究中至关重要。
- en: 'Bias in Data : ChatGPT is trained on vast datasets pulled from the internet,
    and as a result, it may reflect certain biases present in its training data. This
    can potentially influence the codes or themes it generates, necessitating careful
    oversight from the researcher to ensure accuracy and objectivity.'
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据偏差：ChatGPT是在从互联网上抽取的大量数据集上训练的，因此，它可能反映了其训练数据中存在的某些偏差。这可能会影响它生成的代码或主题，需要研究人员进行仔细的监督，以确保准确性和客观性。
- en: 'Inconsistent Quality : While ChatGPT can produce highly relevant insights in
    one instance, it may generate less useful or even nonsensical responses in others.
    This variability requires researchers to cross-check AI-generated results against
    their own analysis to ensure validity.'
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 质量不一致：虽然ChatGPT可能在某个实例中产生高度相关的洞察，但它可能在其他情况下生成不太有用甚至无意义的回应。这种可变性要求研究人员将AI生成的结果与自己的分析交叉检查，以确保有效性。
- en: 'Ethical and Interpretive Challenges : ChatGPT can assist in identifying patterns
    and suggesting themes, but it cannot interpret findings or offer theoretical insights.
    The interpretation of data remains a uniquely human task, grounded in your understanding
    of the research context and the theoretical framework guiding your study.'
  id: totrans-244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 道德和解释挑战：ChatGPT可以帮助识别模式和提出主题，但它无法解释发现或提供理论洞察。数据解释是一个独特的人类任务，它基于你对研究背景和指导你研究的理论框架的理解。
- en: Figure 2.2\. Limitations of ChatGPT
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2. ChatGPT的局限性
- en: '![A diagram of a company Description automatically generated](d2d_images/image010.png)'
  id: totrans-246
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的公司描述图](d2d_images/image010.png)'
- en: U NDERSTANDING THESE limitations helps you maintain realistic expectations for
    ChatGPT’s role in your research and ensures that you use it as a tool to complement
    —not replace—your qualitative analysis process.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些局限性有助于你保持对ChatGPT在研究中的角色的现实期望，并确保你将其用作补充——而不是取代——你的定性分析过程的工具。
- en: Ethical Considerations and Responsible Use
  id: totrans-248
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 道德考量与负责任的使用
- en: 'I NCORPORATING CHATGPT into your research introduces several ethical considerations.
    As with any research tool, it is important to approach AI with responsibility
    and mindfulness, ensuring that its use aligns with ethical research practices.
    Here are some key areas to keep in mind:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT融入你的研究引入了几个道德考量。与任何研究工具一样，以责任感和警觉性对待AI非常重要，确保其使用符合道德研究实践。以下是一些需要牢记的关键领域：
- en: 'Data Privacy : When using ChatGPT, particularly in cloud-based applications,
    it is essential to ensure that sensitive or personal data remains secure. This
    is especially crucial in qualitative research, where interview transcripts, focus
    group notes, and observational data often contain private or confidential information.
    You should take steps to anonymize the data before using AI tools and ensure that
    any third-party platforms used comply with data protection regulations, such as
    GDPR.'
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据隐私：在使用ChatGPT时，尤其是在基于云的应用中，确保敏感或个人信息的安全至关重要。这在定性研究中尤为重要，因为访谈记录、焦点小组笔记和观察数据通常包含私人或机密信息。在使用AI工具之前，您应采取措施匿名化数据，并确保任何第三方平台都符合数据保护法规，如GDPR。
- en: 'Informed Consent : Participants should be informed if AI tools, like ChatGPT,
    will be used in the analysis of their data. While AI might streamline the analysis
    process, participants have the right to know how their information will be processed
    and who will have access to it. This transparency ensures that ethical standards
    are upheld and that participants’ rights are respected.'
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 知情同意：如果分析数据时将使用AI工具，如ChatGPT，参与者应被告知。虽然AI可能简化分析过程，但参与者有权了解他们的信息将如何被处理以及谁将有权访问这些信息。这种透明度确保了道德标准的遵守和参与者权利的尊重。
- en: 'Bias and Fairness : As mentioned earlier, AI tools like ChatGPT can reflect
    biases present in the training data. In qualitative research, this poses the risk
    of reinforcing stereotypes or overlooking important but less frequent patterns
    in the data. Researchers must carefully evaluate AI-generated suggestions and
    verify them against their own interpretations to ensure fairness and accuracy.'
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏见与公平：如前所述，AI工具如ChatGPT可能会反映训练数据中存在的偏见。在定性研究中，这可能导致强化刻板印象或忽略数据中重要但出现频率较低的模式。研究人员必须仔细评估AI生成的建议，并对照自己的解释进行验证，以确保公平性和准确性。
- en: 'Transparency in AI Contributions : When presenting findings, it is important
    to be transparent about the role ChatGPT played in your research. This means clearly
    documenting how the AI was used—whether it was for coding, summarizing data, or
    generating themes. Transparency allows your audience to understand the methodology
    fully and assess the role that AI played in shaping the analysis.'
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI贡献的透明度：在呈现结果时，重要的是要清楚地说明ChatGPT在您的研究中扮演的角色。这意味着明确记录AI的使用方式——是用于编码、总结数据还是生成主题。透明度使您的听众能够全面了解方法论并评估AI在塑造分析中的作用。
- en: 'The Human Element : Finally, it is essential to emphasize that ChatGPT is a
    tool —not a substitute for human judgment. The final analysis, interpretation
    of themes, and development of conclusions should always remain in the hands of
    the researcher. While AI can support and enhance the research process, the depth
    and meaning of qualitative research come from the researcher’s understanding of
    the context, participants, and theoretical frameworks.'
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人的因素：最后，必须强调ChatGPT是一个工具——不是人类判断的替代品。最终的分析、主题的解释和结论的发展始终应掌握在研究人员手中。虽然AI可以支持和增强研究过程，但定性研究的深度和意义来自于研究人员对背景、参与者和理论框架的理解。
- en: By understanding the basics of AI, the capabilities and limitations of ChatGPT,
    and the ethical implications of using AI in research, you can begin to harness
    this powerful tool effectively. As we move forward in the book, we will delve
    into practical strategies for setting up ChatGPT for your research, creating effective
    prompts, and integrating AI into your workflow in a responsible and impactful
    way.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解AI的基本知识、ChatGPT的能力和局限性以及使用AI进行研究的伦理影响，您可以开始有效地利用这个强大的工具。随着本书的深入，我们将探讨为研究设置ChatGPT、创建有效的提示以及以负责任和有影响的方式将AI整合到您的工作流程中的实用策略。
- en: '| Chapter Key Points:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '| 章节要点：'
- en: ChatGPT streamlines coding and thematic analysis in qualitative research, saving
    time and effort.
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT简化了定性研究中的编码和主题分析，节省了时间和精力。
- en: It summarizes text to identify core ideas from lengthy transcripts.
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它总结文本以从冗长的记录中识别核心思想。
- en: Assists in text classification and coding by finding recurring words and concepts.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过寻找重复出现的单词和概念来协助文本分类和编码。
- en: Generates ideas and questions to refine research inquiries.
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成想法和问题以完善研究调查。
- en: Recognizes patterns and trends in qualitative data.
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在定性数据中识别模式和趋势。
- en: 'Limitations of ChatGPT:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的局限性：
- en: Lacks true contextual understanding of cultural nuances and emotional undertones.
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏对文化细微差别和情感基调的真实语境理解。
- en: May reflect biases present in its internet-based training data.
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能反映了其基于互联网的训练数据中存在的偏见。
- en: Can produce inconsistent or nonsensical responses at times.
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有时可能产生不一致或无意义的回应。
- en: Cannot interpret findings or offer theoretical insights; human analysis remains
    crucial.
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法解释结果或提供理论洞察；人类分析仍然至关重要。
- en: 'Ethical Considerations:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理考量：
- en: Ensure data privacy by anonymizing sensitive information and complying with
    regulations like GDPR.
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过匿名化敏感信息和遵守GDPR等法规来确保数据隐私。
- en: Obtain informed consent from participants regarding the use of AI in data analysis.
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在数据分析中使用人工智能时，从参与者那里获得知情同意。
- en: Address bias and fairness by critically evaluating AI-generated suggestions.
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过批判性地评估人工智能生成的建议来解决偏见和公平性问题。
- en: Be transparent about how ChatGPT was used in the research process.
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在研究过程中，关于如何使用ChatGPT要透明。
- en: Emphasize that ChatGPT complements, not replaces, human judgment in qualitative
    analysis.
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强调ChatGPT在定性分析中补充而非取代人类判断。
- en: '|'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Chapter 3\.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-275
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: The Role of AI in Qualitative Research
  id: totrans-277
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能在定性研究中的作用
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: U nderstanding the role of AI begins with a look at the historical context of
    qualitative methods, the ways in which AI can augment (but not replace) human
    insight, and addressing common myths about AI taking over the role of researchers.
    The goal is to highlight the ways in which AI, when used correctly, can enhance
    qualitative research without compromising its core values of depth, richness,
    and human interpretation.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 理解人工智能的作用，首先要了解定性方法的历史背景，以及人工智能如何增强（但不是取代）人类洞察力，并解决关于人工智能取代研究人员角色的常见误解。目标是突出人工智能在正确使用时如何增强定性研究，而不会损害其核心价值，如深度、丰富性和人类解释。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-280
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-281
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Historical Context of Qualitative Methods
  id: totrans-282
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 定性方法的历史背景
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-283
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Q ualitative research has a long and rich history, originating in fields such
    as sociology, anthropology, psychology, and education (7–9). The central goal
    of qualitative research has always been to explore and understand the complexities
    of human behavior, experience, and social phenomena. Unlike quantitative research,
    which focuses on numerical data and statistical analysis, qualitative research
    prioritizes depth, meaning, and context. Methods such as in-depth interviews,
    focus groups, participant observation, and case studies have been the primary
    tools for gathering and analyzing qualitative data (10,11).
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 定性研究有着悠久而丰富的历史，起源于社会学、人类学、心理学和教育等领域（7–9）。定性研究的核心目标始终是探索和理解人类行为、经验和社会现象的复杂性。与侧重于数值数据和统计分析的定量研究不同，定性研究优先考虑深度、意义和背景。深度访谈、焦点小组、参与观察和案例研究一直是收集和分析定性数据的主要工具（10,11）。
- en: Traditionally, the process of coding and analyzing qualitative data has been
    manual, requiring researchers to sift through pages of transcripts, field notes,
    and other text-based data to identify patterns, themes, and insights. This is
    labor-intensive, requiring careful interpretation and a deep understanding of
    the context in which the data was collected. The researcher’s role has always
    been central in qualitative research, with a focus on subjective interpretation,
    nuance, and the theoretical frameworks that guide analysis.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，编码和分析定性数据的过程是手工的，需要研究人员筛选大量转录、田野笔记和其他基于文本的数据，以识别模式、主题和洞察。这是一个劳动密集型过程，需要仔细的解释和对数据收集背景的深入了解。在定性研究中，研究者的角色始终是核心的，重点是主观解释、细微差别和指导分析的框架。
- en: As the volume of qualitative data grows, especially in the digital age where
    interviews, social media content, and online discussions can generate massive
    amounts of text, researchers are increasingly faced with the challenge of managing
    large datasets while maintaining the quality of their analysis. This is where
    AI, particularly language models like ChatGPT, has entered the scene—offering
    new ways to assist with tasks such as coding, pattern recognition, and thematic
    analysis.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 随着定性数据的量增长，尤其是在数字时代，访谈、社交媒体内容和在线讨论可以产生大量的文本，研究者越来越多地面临在保持分析质量的同时管理大量数据集的挑战。这正是AI，尤其是像ChatGPT这样的语言模型介入的领域——提供新的方法来协助诸如编码、模式识别和主题分析等任务。
- en: While AI is a relatively new addition to the qualitative research toolkit, it
    is important to view it as an extension of historical qualitative methods, rather
    than a replacement. AI does not alter the core goals of qualitative research;
    instead, it helps researchers manage larger datasets and streamline time-consuming
    tasks, allowing them to focus more on interpretation and theory-building.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI是定性研究工具箱中相对较新的补充，但将其视为历史定性方法的扩展，而不是替代品，这一点很重要。AI并没有改变定性研究的核心目标；相反，它帮助研究者管理更大的数据集，简化耗时任务，使他们能够更多地专注于解释和理论构建。
- en: The Synergy Between Human Insight and Machine Assistance
  id: totrans-288
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 人类洞察与机器辅助的协同作用
- en: T HE INTRODUCTION OF AI, and tools like ChatGPT, into qualitative research is
    best viewed as a collaborative process between human researchers and machine assistance.
    The synergy between human insight and AI capabilities enhances the research process
    without diminishing the role of the researcher. In fact, when used properly, AI
    frees researchers from time-consuming, repetitive tasks, enabling them to devote
    more energy to the creative, interpretive, and theoretical aspects of their work.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI，以及像ChatGPT这样的工具，引入定性研究最好被视为人类研究者与机器辅助之间的协作过程。人类洞察力和AI能力之间的协同作用增强了研究过程，而没有削弱研究者的角色。事实上，当正确使用时，AI使研究者从耗时、重复的任务中解放出来，使他们能够更多地投入到工作的创造性、解释性和理论性方面。
- en: 'Here is how this synergy plays out in practice:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何在实际中体现这种协同作用的：
- en: 'Managing Complex Data Sets : One of the primary benefits of using AI in qualitative
    research is its ability to quickly process large volumes of data. For example,
    ChatGPT can help analyze interview transcripts, focus group discussions, or social
    media content by identifying recurring themes, patterns, and concepts. However,
    it is the researcher who interprets these findings, contextualizing them within
    the framework of the study and deciding which themes are most relevant or significant.'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理复杂的数据集：使用AI进行定性研究的主要好处之一是其能够快速处理大量数据。例如，ChatGPT可以通过识别重复的主题、模式和概念来帮助分析访谈记录、焦点小组讨论或社交媒体内容。然而，解释这些发现、在研究框架内对其进行背景化以及决定哪些主题最相关或重要的是研究者的职责。
- en: 'Supporting, Not Replacing, Coding : While ChatGPT can assist in the initial
    stages of open coding by suggesting possible codes based on recurring words or
    phrases, it is ultimately up to the researcher to refine these codes, merge them
    into broader categories, and interpret their meaning. The AI provides efficiency,
    but human insight ensures that the analysis captures the richness and complexity
    of the data.'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持而非取代编码：虽然ChatGPT可以通过基于重复出现的单词或短语建议可能的代码来协助开放编码的初始阶段，但最终由研究者来细化这些代码，将它们合并到更广泛的类别中，并解释其含义。AI提供效率，但人类的洞察力确保分析能够捕捉数据的丰富性和复杂性。
- en: 'Pattern Recognition and Theme Development : AI’s strength lies in its ability
    to detect patterns across large data sets that may not be immediately apparent
    to the human eye. However, AI cannot replace the researcher’s deep understanding
    of the context, culture, and specificities of the data. AI can suggest connections
    between concepts, but it is the researcher who determines how these connections
    relate to the theoretical framework or research question.'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模式识别和主题发展：AI的优势在于其能够检测出人类眼睛可能不会立即察觉的大数据集中的模式。然而，AI不能取代研究者对数据背景、文化和特定性的深入理解。AI可以提出概念之间的联系，但决定这些联系如何与理论框架或研究问题相关的是研究者。
- en: 'Iterative Analysis : Qualitative research is often iterative, with researchers
    refining their analysis over time as new data or insights emerge. ChatGPT can
    assist in this iterative process by rapidly generating new themes or revising
    codes as the data evolves. But the key insights still emerge from the researcher’s
    intuition, experience, and theoretical grounding.'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代分析：定性研究通常是迭代的，研究者会随着新数据或新见解的出现而不断改进他们的分析。ChatGPT可以通过快速生成新的主题或随着数据的发展修订代码来协助这一迭代过程。但关键见解仍然来自研究者的直觉、经验和理论基础。
- en: The collaboration between human researchers and AI results in a more efficient
    workflow, but the researcher remains the primary decision-maker. AI serves as
    a powerful assistant, helping researchers manage data, but it is always the human
    insight that drives the depth and meaning of the analysis.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 人类研究者与人工智能之间的合作导致工作流程更加高效，但研究者仍然是主要的决策者。人工智能作为一个强大的助手，帮助研究者管理数据，但始终是人类的洞察力推动了分析的深度和意义。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-296
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Debunking Myths About AI Replacing Researchers
  id: totrans-298
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 澄清关于人工智能取代研究者的误区
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: T here is a common misconception that AI tools like ChatGPT are poised to replace
    human researchers, especially in fields like qualitative analysis where the process
    can be time-consuming.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种常见的误解，即像ChatGPT这样的AI工具即将取代人类研究者，尤其是在定性分析等耗时较长的领域。
- en: However, this could not be further from the truth.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这与事实相去甚远。
- en: 'The idea that AI will render researchers obsolete overlooks the fundamental
    nature of qualitative research: it is a deeply interpretive process that requires
    human judgment, cultural understanding, and emotional intelligence—areas where
    AI still falls short.'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 认为人工智能会使研究者变得过时，忽视了定性研究的基本性质：它是一个深度的解释过程，需要人类的判断、文化理解和情商——这些领域是人工智能仍然不足的地方。
- en: Here are some myths about AI replacing researchers and the reality behind them
    (Figure 3.1).
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关于人工智能取代研究者的误区及其背后的现实（图3.1）。
- en: 'Myth 1: AI Can Fully Automate Qualitative Analysis'
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 误区1：人工智能可以完全自动化定性分析
- en: 'Reality : While AI can assist in certain stages of the analysis—such as coding
    or pattern recognition—it cannot replicate the interpretive and contextual understanding
    that human researchers bring to the process. AI may be able to recognize that
    certain words frequently appear together, but it does not understand the cultural
    or emotional nuances behind those words. AI can support the process, but it cannot
    offer the deep insights that come from human experience and theoretical knowledge.'
  id: totrans-305
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现实：虽然人工智能可以在分析的一定阶段提供帮助——例如编码或模式识别——但它无法复制人类研究者带来的解释性和情境理解。人工智能可能能够识别出某些词语经常一起出现，但它并不理解这些词语背后的文化或情感细微差别。人工智能可以支持这个过程，但它无法提供来自人类经验和理论知识的深刻见解。
- en: 'Myth 2: AI Can Replace the Researcher’s Role in Interpretation'
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 误区2：人工智能可以取代研究者在解释中的作用
- en: 'Reality : AI is good at identifying patterns, but it lacks the ability to interpret
    those patterns within the broader context of a research study. For example, ChatGPT
    might identify recurring themes in interview transcripts, but it is the researcher
    who understands how those themes fit into a larger theoretical framework or social
    context. Interpretation remains a deeply human process, shaped by the researcher’s
    background, knowledge, and interaction with the data.'
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现实：人工智能擅长识别模式，但缺乏在研究背景中解释这些模式的能力。例如，ChatGPT可能会在访谈记录中识别出重复出现的主题，但理解这些主题如何融入更广泛的理论框架或社会背景的是研究者。解释是一个深植于人类的过程，受到研究者背景、知识和与数据的互动的影响。
- en: 'Myth 3: AI Eliminates the Need for Traditional Qualitative Methods'
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 误区3：人工智能消除了传统定性方法的需求
- en: 'Reality : AI does not replace traditional qualitative methods; rather, it enhances
    them. Researchers still need to conduct interviews, engage in participant observation,
    or collect narrative data through traditional methods. AI can assist in the analysis
    phase, but the data collection and interpretation stages still rely heavily on
    human interaction and insight.'
  id: totrans-309
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现实：人工智能并不取代传统的定性方法；相反，它增强了它们。研究人员仍然需要通过传统方法进行访谈、参与观察或收集叙事数据。人工智能可以在分析阶段提供帮助，但数据收集和解释阶段仍然高度依赖人类互动和洞察力。
- en: 'Myth 4: AI Is Flawless'
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神话4：人工智能无懈可击
- en: 'Reality : AI is only as good as the data it has been trained on. ChatGPT, for
    example, may produce biased or incomplete results if the training data is biased
    or lacks diversity. Researchers must always critically evaluate the suggestions
    made by AI tools, checking for accuracy, potential biases, and relevance. The
    role of the researcher is to ensure that AI’s contributions enhance the research
    rather than distort it.'
  id: totrans-311
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现实：人工智能的效果取决于其训练数据。例如，ChatGPT如果训练数据存在偏见或缺乏多样性，可能会产生有偏见或不完整的结果。研究人员必须始终批判性地评估人工智能工具提出的建议，检查其准确性、潜在偏见和相关性。研究人员的角色是确保人工智能的贡献能够增强研究，而不是扭曲研究。
- en: Figure 3.1\. Myths about AI in Qualitative Research
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1\. 定性研究中关于人工智能的神话
- en: '![A diagram of a diagram Description automatically generated with medium confidence](d2d_images/image016.png)'
  id: totrans-313
  prefs: []
  type: TYPE_IMG
  zh: '![一个图表的图表描述，自动生成，中等置信度](d2d_images/image016.png)'
- en: By debunking these myths, we can better understand the true role of AI in qualitative
    research. Far from replacing researchers, AI tools like ChatGPT are best viewed
    as assistants—helping manage large volumes of data, suggesting patterns, and streamlining
    workflows, but always leaving the crucial tasks of interpretation, analysis, and
    contextual understanding to the human researcher.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 通过揭穿这些神话，我们可以更好地理解人工智能在定性研究中的真正作用。人工智能工具如ChatGPT远非取代研究人员，它们最好被视为助手——帮助管理大量数据、提出模式、简化工作流程，但始终将解释、分析和情境理解等关键任务留给人类研究人员。
- en: AI is an invaluable tool for modern qualitative researchers, but it is most
    powerful when used in collaboration with human insight. Throughout this book,
    the goal is to show you how to leverage ChatGPT’s strengths while ensuring that
    you remain in control of the interpretive and analytical processes that make qualitative
    research unique.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是现代定性研究人员宝贵的工具，但它在与人类洞察力协作使用时最为强大。整本书的目标是向您展示如何利用ChatGPT的优势，同时确保您仍然控制着使定性研究独特的解释和分析过程。
- en: This book is not intended to dive deeply into the various theories and foundations
    of qualitative analysis.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的目的不是深入探讨定性分析的各个理论和基础。
- en: Instead, the focus is on providing you with a practical guide to how ChatGPT
    can be utilized to enhance the process of qualitative data analysis. While qualitative
    research encompasses a wide range of methodologies and theoretical perspectives,
    my aim here is to demonstrate how AI, specifically ChatGPT, can streamline tasks
    such as coding, identifying patterns, and aiding in thematic development. By the
    end of this book, you will understand how to integrate ChatGPT into your qualitative
    research workflow in a way that complements your existing research skills and
    methodologies.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，重点是为您提供一份实用指南，说明如何利用ChatGPT来增强定性数据分析的过程。虽然定性研究涵盖了广泛的方法论和理论视角，但我的目标是展示人工智能，特别是ChatGPT，如何简化编码、识别模式和辅助主题发展等任务。到本书结束时，您将了解如何将ChatGPT整合到您的定性研究工作流程中，以补充您现有的研究技能和方法。
- en: For the purposes of demonstration, this book will focus primarily on thematic
    analysis of interview transcripts, and more specifically, deductive content thematic
    analysis based on an already established framework. This type of analysis starts
    with predefined codes or themes that guide the exploration of the data (12,13),
    making it particularly suitable for illustrating how ChatGPT can assist in identifying
    and organizing data according to existing categories. By focusing on this specific
    method, we will show how ChatGPT can be integrated into your analysis process
    from the initial coding phase through to the development and refinement of themes.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示目的，本书将主要关注访谈记录的主题分析，特别是基于已建立框架的演绎内容主题分析。这种分析从预定义的代码或主题开始，引导对数据的探索（12,13），特别适合于说明ChatGPT如何帮助根据现有类别识别和组织数据。通过关注这一特定方法，我们将展示ChatGPT如何从最初的编码阶段到主题的发展和细化过程中融入您的分析过程。
- en: '| Chapter Key Points:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '| 章节要点：'
- en: Qualitative research traditionally involves manual, time-consuming analysis
    of complex, unstructured data.
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定性研究传统上涉及对复杂、非结构化数据的耗时手动分析。
- en: Managing large qualitative datasets has become increasingly challenging in the
    digital age.
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在数字时代，管理大量定性数据集变得越来越具有挑战性。
- en: AI tools like ChatGPT can assist researchers by streamlining tasks such as coding,
    pattern recognition, and thematic analysis.
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能工具如ChatGPT可以通过简化编码、模式识别和主题分析等任务来协助研究人员。
- en: AI serves as an extension of traditional qualitative methods, augmenting but
    not replacing human insight.
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能作为传统定性方法的延伸，增强但不取代人类洞察力。
- en: There is a synergy between human researchers and AI, where AI handles data processing
    and humans provide context and interpretation.
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类研究人员和人工智能之间存在协同作用，其中人工智能处理数据处理，而人类提供背景和解释。
- en: Myths that AI will replace researchers are debunked; AI lacks the cultural understanding
    and emotional intelligence necessary for deep qualitative analysis.
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于人工智能将取代研究人员的神话被揭穿；人工智能缺乏进行深入定性分析所需的文化理解和情商。
- en: AI can manage complex data sets and support coding, but final interpretation
    and theme development remain human tasks.
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能可以管理复杂的数据集并支持编码，但最终解释和主题发展仍然是人类任务。
- en: Ethical considerations emphasize that AI is a tool to support, not replace,
    human researchers in qualitative analysis.
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伦理考量强调，人工智能是支持而不是取代人类研究人员进行定性分析的工具。
- en: The chapter focuses on practical guidance for integrating ChatGPT into qualitative
    research workflows.
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本章重点介绍将ChatGPT整合到定性研究工作流程中的实用指南。
- en: By leveraging AI tools like ChatGPT, researchers can enhance efficiency while
    preserving the depth, richness, and human interpretation that define qualitative
    research.
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过利用ChatGPT等人工智能工具，研究人员可以在保持定性研究的深度、丰富性和人类解释能力的同时提高效率。
