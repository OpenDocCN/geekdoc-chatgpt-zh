  id: totrans-1433
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_above.png)'
- en: 'Step 3: Define Themes and Develop Prompts for Deductive or Inductive Analysis'
  id: totrans-1434
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 3 步：定义主题并为演绎或归纳分析开发提示
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1435
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: 'Objective:'
  id: totrans-1436
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 目标：
- en: D evelop a strategy for generating initial codes based on your chosen qualitative
    analysis approach—deductive or inductive (Figure 10.3).
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你选择的定性分析方法（演绎或归纳）（图 10.3）制定生成初始编码的策略。
- en: 'Deductive Thematic Analysis: Predefined Themes and Subthemes'
  id: totrans-1438
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 归纳主题分析：预定义主题和子主题
- en: 'Identify Predefined Themes :'
  id: totrans-1439
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别预定义主题：
- en: 'Review the theoretical framework or literature that informs your study and
    identify the key themes and subthemes relevant to your research. For example:'
  id: totrans-1440
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回顾为你的研究提供信息的理论框架或文献，并确定与研究相关的关键主题和子主题。例如：
- en: 'Themes: Productivity , Team Dynamics , Emotional Well-being .'
  id: totrans-1441
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题：生产力，团队动态，情感福祉。
- en: 'Subthemes: Increased Productivity , Challenges in Collaboration , Stress from
    Virtual Tools .'
  id: totrans-1442
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：生产力提高，协作挑战，虚拟工具带来的压力。
- en: 'Develop Prompt for Theme-Based Coding :'
  id: totrans-1443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发基于主题编码的提示：
- en: 'Create prompts that instruct ChatGPT to search for specific codes within the
    defined themes. For example:'
  id: totrans-1444
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建指示ChatGPT在定义的主题内搜索特定代码的提示。例如：
- en: 'Prompt : “Identify any statements related to productivity in this transcript.
    Focus on mentions of increased or decreased productivity, and explain how the
    participant describes these changes.”'
  id: totrans-1445
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示： “在这份记录中识别与生产力相关的任何陈述。关注提及的生产力提高或降低，并解释参与者如何描述这些变化。”
- en: 'Refinement :'
  id: totrans-1446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精炼：
- en: After receiving the initial codes from ChatGPT, refine or modify the prompts
    based on the response quality, ensuring the AI stays focused on your predefined
    themes.
  id: totrans-1447
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在收到ChatGPT的初始代码后，根据响应质量对提示进行细化或修改，确保AI始终专注于您预定义的主题。
- en: 'Inductive Analysis: Generating Themes from Data'
  id: totrans-1448
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 归纳分析：从数据生成主题
- en: 'No Predefined Themes :'
  id: totrans-1449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无预定义主题：
- en: In the inductive approach, let the data speak for itself. Instead of imposing
    predefined themes, ChatGPT will explore the raw data to generate codes and themes
    that emerge naturally.
  id: totrans-1450
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在归纳方法中，让数据自己说话。而不是强加预定义的主题，ChatGPT将探索原始数据以生成自然出现的代码和主题。
- en: 'Develop Open-Ended Prompts :'
  id: totrans-1451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发开放式提示：
- en: 'Use prompts that allow for open-ended exploration of the data. For instance:'
  id: totrans-1452
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用允许对数据进行开放式探索的提示。例如：
- en: 'Prompt : “Analyze this transcript and identify any recurring ideas or patterns.
    Focus on concepts related to team collaboration and emotional responses to using
    VR.”'
  id: totrans-1453
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示： “分析这份记录并识别任何重复出现的想法或模式。关注与团队协作和VR使用中的情感反应相关的概念。”
- en: 'Iterative Process :'
  id: totrans-1454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复过程：
- en: Review ChatGPT’s initial output and adjust your prompts to focus on emerging
    ideas that seem most relevant. You may need to run multiple iterations to explore
    different angles within the data.
  id: totrans-1455
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查ChatGPT的初始输出，并调整你的提示以关注似乎最相关的出现想法。你可能需要运行多次迭代来探索数据中的不同角度。
- en: F IGURE 10.3\. DEFINING Themes and Developing Prompts for Analysis
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3. 定义主题和开发分析提示
- en: '![A diagram of a process Description automatically generated](d2d_images/image017.png)'
  id: totrans-1457
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的流程描述图](d2d_images/image017.png)'
- en: The following sections illustrate how the ChatGPT prompt identifies relevant
    codes from each section of the interview transcript, guided by predefined thematic
    areas and structured through deductive thematic analysis.
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: 以下部分说明了ChatGPT如何根据预定义的主题区域和结构化的演绎主题分析，从访谈记录的每个部分识别相关代码。
- en: 'ChatGPT prompt Example:'
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提示示例：
- en: 'Instructions:'
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 指令：
- en: You are tasked with performing a deductive thematic analysis on an interview
    transcript using a predefined thematic framework. Your goal is to identify relevant
    codes within the transcript that correspond to the provided themes and sub-themes.
    For each identified code, extract the exact quotes from the transcript that support
    it.
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 你被要求使用预定义的主题框架对访谈记录进行演绎主题分析。你的目标是识别与提供的主题和子主题相对应的记录中的相关代码。对于每个识别出的代码，提取支持它的记录中的确切引语。
- en: 'Please follow these steps:'
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 请按照以下步骤操作：
- en: 'Read the Interview Transcript Carefully:'
  id: totrans-1463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 仔细阅读访谈记录：
- en: Thoroughly read the entire transcript to understand the context and content.
  id: totrans-1464
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细阅读整个记录，以了解背景和内容。
- en: 'Use the Predefined Thematic Framework:'
  id: totrans-1465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用预定义的主题框架：
- en: Refer to the provided themes and sub-themes as a guide for your analysis.
  id: totrans-1466
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在分析时，以提供的主题和子主题作为指南。
- en: 'Identify Relevant Codes:'
  id: totrans-1467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别相关代码：
- en: For each theme and sub-theme, identify codes that are evident in the transcript.
  id: totrans-1468
