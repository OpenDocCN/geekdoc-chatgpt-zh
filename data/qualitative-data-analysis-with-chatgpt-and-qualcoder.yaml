  zh: '|  | 通过视觉协作更好地理解 | “当我们需要视觉协作时，例如在虚拟白板上绘制想法或审查3D模型时，这尤其有用。”|'
- en: '| Non-verbal cues in vr | Avatars and sense of presence | "The avatars give
    a sense of presence, and even though it''s virtual, it helps with things like
    body language and non-verbal cues." |'
  id: totrans-1566
  prefs: []
  type: TYPE_TB
  zh: '| VR中的非语言线索 | 虚拟化身和存在感 | “虚拟化身给人一种存在感，即使它是虚拟的，也有助于身体语言和非语言线索。”|'
- en: '|  | Missing real facial expressions | "The avatars are fun, but they’re not
    real people, you know? I still miss seeing facial expressions and real body language."
    |'
  id: totrans-1567
  prefs: []
  type: TYPE_TB
  zh: '|  | 缺失真实面部表情 | “虚拟化身很有趣，但它们不是真人，你知道？我还是怀念看到面部表情和真实身体语言。”|'
