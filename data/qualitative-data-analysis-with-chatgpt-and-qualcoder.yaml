  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Semi-Automated Transfer Using CSV or TXT Files
  id: totrans-950
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用CSV或TXT文件进行半自动化迁移
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-951
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: T he Semi-Automated Transfer approach provides a balance between automation
    and manual oversight in the integration of ChatGPT with QualCoder (Figure 8.2).
    This method is suitable for researchers with basic technical skills who want to
    automate part of the process while maintaining control over how codes are applied.
    It involves exporting codes and themes generated by ChatGPT in file formats like
    CSV or TXT, which are then imported into QualCoder for further analysis. This
    approach significantly speeds up the initial setup of codes and themes while still
    requiring manual steps for applying those codes to specific quotes in the data.
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: '**半自动化迁移方法**在将ChatGPT与QualCoder集成时提供了自动化和手动监督之间的平衡（见图8.2）。此方法适合具有基本技术技能的研究人员，他们希望在保持对代码应用方式控制的同时自动化部分流程。它涉及将ChatGPT生成的代码和主题以CSV或TXT等文件格式导出，然后导入QualCoder进行进一步分析。这种方法显著加快了代码和主题的初始设置，同时仍需要手动步骤将代码应用于数据中的特定引语。'
- en: Here is a detailed breakdown of each substep involved in this approach.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是对此方法中涉及到的每个子步骤的详细分解。
- en: 'Step 1: Generate Codes and Themes with ChatGPT'
  id: totrans-954
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1步：使用ChatGPT生成代码和主题
- en: 'A S WITH THE MANUAL method, you begin by using ChatGPT to generate codes and
    themes from your qualitative data. The steps are as follows:'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**手动方法**，你首先通过ChatGPT从你的定性数据中生成代码和主题。步骤如下：
- en: 'Input Data into ChatGPT : Provide ChatGPT with your qualitative transcripts
    or other text-based data and request code suggestions. Example prompts might include:'
  id: totrans-956
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将数据输入ChatGPT：向ChatGPT提供你的定性转录或基于文本的其他数据，并请求代码建议。可能的提示包括：
- en: '"Identify key themes in this interview about remote work challenges," or'
  id: totrans-957
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"确定关于远程工作挑战的这次访谈中的关键主题，"或'
- en: '"Generate codes for discussing work-life balance in the following text."'
  id: totrans-958
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"在以下文本中生成讨论工作与生活平衡的代码。"'
- en: 'Code and Theme Generation : ChatGPT will provide you with a list of codes and
    potential themes based on the content. For instance, it might generate codes such
    as remote collaboration , productivity issues , and employee well-being .'
  id: totrans-959
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码和主题生成：ChatGPT将根据内容提供一系列代码和潜在的主题。例如，它可能会生成如远程协作、生产力问题和员工福祉等代码。
- en: 'Review and Refine : Before moving forward, review ChatGPT’s suggestions and
    make any necessary adjustments. This ensures that the codes are relevant and aligned
    with your research questions.'
  id: totrans-960
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查和精炼：在继续之前，审查 ChatGPT 的建议并进行任何必要的调整。这确保了代码的相关性并与其研究问题保持一致。
- en: 'Step 2: Export Codes and Themes in CSV or TXT Format'
  id: totrans-961
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第 2 步：以 CSV 或 TXT 格式导出代码和主题
- en: O NCE CHATGPT HAS GENERATED your codes and themes, the next step is to export
    these into a format that can be imported into QualCoder.
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦 ChatGPT 生成代码和主题，下一步就是将这些内容导出为可以导入 QualCoder 的格式。
- en: 'Copy Codes and Themes : Using ChatGPT’s output, copy the list of codes and
    themes into a structured format. You can do this manually by copying and pasting
    the codes and categories from the chat window, or by generating a more organized
    list in ChatGPT using prompts like "Generate a CSV-friendly list of codes and
    themes."'
  id: totrans-963
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制代码和主题：使用 ChatGPT 的输出，将代码和主题列表复制到结构化格式中。您可以通过手动复制和粘贴聊天窗口中的代码和类别来完成此操作，或者通过使用如“生成一个
    CSV 适合的代码和主题列表”的提示在 ChatGPT 中生成一个更有序的列表。
- en: 'Create a CSV or TXT File : Save the codes and themes in a CSV or TXT file format.
    A CSV file is especially useful for structuring data in rows and columns, which
    QualCoder can read more easily. The basic structure of the CSV file should look
    something like this:'
  id: totrans-964
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建 CSV 或 TXT 文件：将代码和主题保存为 CSV 或 TXT 文件格式。CSV 文件特别适用于在行和列中结构化数据，这使得 QualCoder
    可以更容易地读取。CSV 文件的基本结构应类似于以下内容：
- en: Table 8.1\. Organizing Codes for Import into QualCoder
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8.1\. 为导入 QualCoder 组织代码
- en: '| Code | Theme | Description |'
  id: totrans-966
  prefs: []
  type: TYPE_TB
  zh: '| 代码 | 主题 | 描述 |'
- en: '| Remote Collaboration | Team Dynamics | Issues with remote communication |'
  id: totrans-967
  prefs: []
  type: TYPE_TB
  zh: '| 远程协作 | 团队动态 | 远程沟通问题 |'
- en: '| Productivity Issues | Work Performance | Difficulties maintaining productivity
    |'
  id: totrans-968
  prefs: []
  type: TYPE_TB
  zh: '| 生产问题 | 工作表现 | 维持生产力的困难 |'
- en: '| Employee Well-being | Emotional Health | Concerns about work-life balance
    |'
  id: totrans-969
  prefs: []
  type: TYPE_TB
  zh: '| 员工福祉 | 情绪健康 | 对工作与生活平衡的担忧 |'
- en: This format ensures that your codes are organized, and it allows for easy import
    into QualCoder (Table 8.1).
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 此格式确保您的代码组织有序，并允许轻松导入 QualCoder（表 8.1）。
- en: 'Step 3: Import Codes and Themes into QualCoder'
  id: totrans-971
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第 3 步：将代码和主题导入 QualCoder
- en: N OW THAT YOUR CODES are saved in CSV or TXT format, you can import them into
    QualCoder, saving time in manually setting up the code framework.
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您的代码已保存为 CSV 或 TXT 格式，您可以将其导入 QualCoder，从而节省手动设置代码框架的时间。
- en: 'Open QualCoder : Launch the QualCoder software and open your project.'
  id: totrans-973
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开 QualCoder：启动 QualCoder 软件，并打开您的项目。
- en: 'Import Codes : Navigate to the "Code" section within QualCoder and use the
    "Import" function to upload the CSV or TXT file containing your codes. QualCoder
    will automatically create the codes listed in the file and associate them with
    the project.'
  id: totrans-974
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入代码：在 QualCoder 中导航到“代码”部分，并使用“导入”功能上传包含您的代码的 CSV 或 TXT 文件。QualCoder 将自动创建文件中列出的代码，并将它们与项目关联。
- en: 'Review the Imported Codes : Once imported, review the codes within QualCoder
    to ensure that they have been correctly mapped. Verify that each code has its
    associated description and theme as intended. This review is crucial to avoid
    any formatting issues that may have occurred during the import.'
  id: totrans-975
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查导入的代码：一旦导入，请审查 QualCoder 中的代码以确保它们已被正确映射。验证每个代码是否都有其关联的描述和主题，如预期。此审查对于避免在导入过程中可能出现的任何格式问题至关重要。
- en: 'Step 4: Manually Associate Codes with Text Segments'
  id: totrans-976
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第 4 步：手动将代码与文本片段关联
- en: O NE LIMITATION OF THIS approach is that while codes and themes are imported
    automatically, the corresponding quotes or text segments from the transcripts
    are not. Therefore, the researcher must manually associate the imported codes
    with relevant portions of the text.
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的局限性在于，虽然代码和主题可以自动导入，但相应的引言或文本片段则不能。因此，研究人员必须手动将导入的代码与文本的相关部分关联起来。
- en: 'Identify Relevant Text Segments : Open your transcript in QualCoder and manually
    highlight sections of text that correspond to each code. For example, for the
    code Employee Well-being , identify sections where participants discuss their
    emotional health and apply the appropriate code to those sections.'
  id: totrans-978
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别相关文本片段：在 QualCoder 中打开您的转录本，并手动突出显示与每个代码对应的文本部分。例如，对于代码“员工福祉”，识别参与者讨论其情绪健康的部分，并将适当的代码应用于这些部分。
- en: 'Apply Codes : As you highlight relevant text segments, apply the corresponding
    codes that were imported into QualCoder. This step remains manual but ensures
    that you carefully review and interpret the data, maintaining a hands-on approach
    to coding.'
  id: totrans-979
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用代码：当您突出显示相关的文本段时，应用导入到QualCoder中的相应代码。这一步骤仍然是手动的，但确保您仔细审查和解释数据，保持编码的手动方法。
- en: 'Step 5: Use Memos for Contextual Notes'
  id: totrans-980
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第5步：使用备忘录进行上下文注释
- en: T O MITIGATE THE LIMITATION of not having the quotes automatically linked to
    the imported codes, you can use QualCoder’s Memo feature to add contextual notes
    for each code or theme.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减轻没有自动将引语链接到导入的代码的限制，您可以使用QualCoder的备忘录功能为每个代码或主题添加上下文注释。
- en: 'Create Memos : For each code, add memos that explain its context or any insights
    you have gathered from the data. For instance, if Remote Collaboration is a code,
    you might create a memo explaining that this code covers discussions about challenges
    in remote teamwork and communication.'
  id: totrans-982
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建备忘录：为每个代码添加备忘录，解释其上下文或您从数据中收集到的任何见解。例如，如果远程协作是一个代码，您可能创建一个备忘录解释这个代码涵盖了关于远程团队合作和沟通的挑战的讨论。
- en: 'Link Memos to Codes : Attach memos to specific codes or categories, providing
    additional context for each one. This feature helps keep track of insights and
    reflections that are not automatically generated during the import process.'
  id: totrans-983
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将备忘录链接到代码：将备忘录附加到特定的代码或类别，为每个提供额外的上下文。此功能有助于跟踪在导入过程中未自动生成的见解和反思。
- en: 'Tip : You can use memos not only to document your thinking but also to store
    any additional information from ChatGPT that might provide further context for
    specific codes or themes.'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：您不仅可以用备忘录来记录您的思考，还可以存储任何可能为特定代码或主题提供更多上下文的ChatGPT的附加信息。
- en: 'Step 6: Refine Codes and Themes Within QualCoder'
  id: totrans-985
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第6步：在QualCoder中精炼代码和主题
- en: A FTER ASSOCIATING CODES with the appropriate text segments, you can refine
    and organize them into broader categories or themes.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 在将代码与适当的文本段关联后，您可以进一步精炼和组织它们到更广泛的类别或主题中。
- en: 'Develop Categories : Manually group related codes into categories or themes
    within QualCoder. For instance, if you have multiple codes related to team communication
    and collaboration, you might group them under a theme like Remote Work Challenges
    .'
  id: totrans-987
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发类别：在QualCoder中将相关的代码手动分组到类别或主题中。例如，如果你有多个与团队沟通和协作相关的代码，你可能将它们分组在“远程工作挑战”这样的主题下。
- en: 'Hierarchical Structuring : QualCoder allows you to create hierarchies of codes,
    which can help in structuring your final analysis. For example, under the theme
    Employee Well-being , you might have sub-codes such as Stress , Work-life Balance
    , and Mental Health .'
  id: totrans-988
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分层结构：QualCoder允许您创建代码的层次结构，这有助于构建您的最终分析。例如，在“员工福祉”主题下，您可能有子代码，如压力、工作与生活平衡和心理健康。
- en: 'Step 7: Finalize and Analyze Data'
  id: totrans-989
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第7步：最终化并分析数据
- en: O NCE YOUR CODES ARE applied and refined, you can utilize QualCoder’s built-in
    tools for further analysis.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的代码被应用和精炼，您就可以利用QualCoder内置的工具进行进一步分析。
- en: 'Generate Reports : QualCoder allows you to generate code frequency reports,
    which summarize how often each code appears in the data. You can export these
    reports for use in presentations or publications.'
  id: totrans-991
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成报告：QualCoder允许您生成代码频率报告，总结每个代码在数据中出现的频率。您可以导出这些报告用于演示或出版物。
- en: 'Visualize Relationships : Use QualCoder’s visual tools, such as code relationship
    diagrams and word clouds, to identify patterns and connections between codes.'
  id: totrans-992
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可视化关系：使用QualCoder的可视化工具，如代码关系图和词云，来识别代码之间的模式和联系。
- en: 'Cross-Check Codes : To ensure thorough analysis, you can compare the codes
    generated by ChatGPT with the ones you have manually refined. This helps validate
    the accuracy and relevance of ChatGPT’s output.'
  id: totrans-993
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交叉检查代码：为确保彻底分析，您可以比较ChatGPT生成的代码与您手动精炼的代码。这有助于验证ChatGPT输出的准确性和相关性。
- en: Advantages of the Semi-Automated Transfer Approach
  id: totrans-994
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 半自动化迁移方法的优势
- en: 'Saves Time : This method speeds up the process of creating codes and themes
    by automating the import process through CSV or TXT files. You do not need to
    manually input each code or theme into QualCoder, saving considerable time in
    the initial setup phase.'
  id: totrans-995
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节省时间：此方法通过通过CSV或TXT文件自动化导入过程来加速创建代码和主题的过程。您不需要手动将每个代码或主题输入到QualCoder中，在初始设置阶段节省了大量时间。
- en: 'Flexibility : While some automation is involved, this approach still allows
    for manual refinement and review of the data, ensuring that the researcher maintains
    control over the analysis.'
  id: totrans-996
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 灵活性：虽然涉及一些自动化，但这种方法仍然允许手动精炼和审查数据，确保研究人员对分析保持控制。
- en: 'Memo Feature : Using memos to supplement the codes adds flexibility, allowing
    researchers to document their thoughts and reflections even though quotes are
    not automatically transferred.'
  id: totrans-997
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 备忘功能：使用备忘录补充代码增加了灵活性，允许研究人员即使引用没有自动传输也能记录他们的想法和反思。
- en: 'Beginner-Friendly with Basic Technical Skills : The process only requires basic
    technical skills like handling CSV files, making it accessible to researchers
    who are comfortable using spreadsheets but may not have programming knowledge.'
  id: totrans-998
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初学者友好，基本技术技能：此过程只需要基本的技能，如处理CSV文件，使得那些习惯使用电子表格但可能没有编程知识的学者也能使用。
- en: F IGURE 8.2\. SEMI-AUTOMATED Transfer approach from ChatGPT to QualCoder
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2. 从ChatGPT到QualCoder的半自动传输方法
