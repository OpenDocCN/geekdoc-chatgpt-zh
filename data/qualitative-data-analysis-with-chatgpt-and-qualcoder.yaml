- en: 'Step 9: Validate and Cross-Check'
  id: totrans-1756
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第9步：验证和交叉检查
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1757
  prefs: []
  type: TYPE_IMG
  zh: '![图片](d2d_images/chapter_title_below.png)'
- en: E nsure that your coding and thematic development are rigorous and transparent
    (Figure 10.9).
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你的编码和主题发展既严格又透明（图10.9）。
- en: 'Compare AI-Suggested Codes with Manual Coding :'
  id: totrans-1759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将AI建议的代码与人工编码进行比较：
- en: Review ChatGPT’s coding suggestions against your own to ensure accuracy and
    to mitigate potential biases from the AI.
  id: totrans-1760
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将ChatGPT的编码建议与你自己的进行比较，以确保准确性并减轻AI可能带来的潜在偏差。
- en: 'Triangulation :'
  id: totrans-1761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 三角测量法：
- en: If applicable, use triangulation by comparing the AI-generated findings with
    traditional manual methods or additional data sources to validate your results.
  id: totrans-1762
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果适用，通过比较AI生成的发现与传统手动方法或额外数据源来验证你的结果，进行三角测量法。
- en: Figure 10.9\. Validating and Cross-Checking
  id: totrans-1763
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.9\. 验证和交叉检查
- en: '![image](d2d_images/image002.png)'
  id: totrans-1764
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/image002.png)'
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
  id: totrans-1765
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1766
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Step 10: Visualize and Analyze in QualCoder'
  id: totrans-1767
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 步骤10：在QualCoder中可视化和分析
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1768
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: U se QualCoder’s inbuilt tools for further analysis and visualization of your
    coded data (Figure 10.10).
  id: totrans-1769
  prefs: []
  type: TYPE_NORMAL
  zh: 使用QualCoder内置的工具对编码数据进行进一步分析和可视化（图10.10）。
- en: 'Generate Code Trees :'
  id: totrans-1770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成代码树：
- en: Use QualCoder’s Code Tree feature to visualize how your codes and themes are
    structured. This is useful for seeing the relationships between different themes
    and sub-themes.
  id: totrans-1771
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用QualCoder的代码树功能来可视化你的代码和主题的结构。这对于查看不同主题和子主题之间的关系很有用。
- en: 'Memo Writing :'
  id: totrans-1772
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 备忘录编写：
- en: Create memos within QualCoder to document your thoughts, interpretations, and
    reflections on the coding process. This helps in maintaining transparency and
    rigor.
  id: totrans-1773
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在QualCoder中创建备忘录以记录你对编码过程的思考、解释和反思。这有助于保持透明度和严谨性。
- en: 'Export Findings :'
  id: totrans-1774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导出发现：
- en: Once coding is complete, you can export the coded data, themes, and memos for
    further analysis or inclusion in your research report.
  id: totrans-1775
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦编码完成，你可以导出编码数据、主题和备忘录，以进行进一步分析或包含在你的研究报告内。
- en: Figure 10.10\. Visualizing and Analyzing in QualCoder
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.10\. 在QualCoder中可视化和分析
- en: '![A diagram of a company Description automatically generated](d2d_images/image009.png)'
  id: totrans-1777
  prefs: []
  type: TYPE_IMG
  zh: '![自动生成的公司描述图](d2d_images/image009.png)'
- en: Report and Present Findings
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: 报告和展示发现
- en: Present your findings, ensuring that the role of ChatGPT and QualCoder is clearly
    documented.
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 展示你的发现，确保清楚地记录ChatGPT和QualCoder的作用。
- en: When presenting your findings, it is crucial to thoroughly explain how you integrated
    ChatGPT and QualCoder into your research process. Start by detailing their roles
    in your methodology, specifically how ChatGPT assisted with coding and thematic
    analysis. This transparency enhances the credibility of your study by allowing
    others to understand the extent of AI involvement and how it influenced your results.
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 在展示你的发现时，彻底解释如何将ChatGPT和QualCoder整合到你的研究过程中至关重要。首先详细说明它们在你方法论中的作用，特别是ChatGPT如何协助编码和主题分析。这种透明度通过允许他人了解AI参与的深度及其如何影响你的结果，增强了你研究的研究力。
- en: Organize your findings around the themes you have developed in QualCoder. Use
    visual aids like code trees or thematic maps to illustrate these themes and their
    interconnections effectively. These visualizations can help readers grasp complex
    relationships within your data and add depth to your presentation.
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的发现围绕在QualCoder中开发的主题组织起来。使用代码树或主题图等视觉辅助工具有效地说明这些主题及其相互关系。这些可视化可以帮助读者理解你数据中的复杂关系，并为你的展示增添深度。
- en: It is also important to acknowledge any limitations encountered when using ChatGPT.
    Discuss challenges such as the AI's potential difficulty in fully capturing nuanced
    contextual meanings without human interpretation. By openly addressing these limitations,
    you provide a balanced perspective on your methodology and underscore the importance
    of human oversight in AI-assisted research.
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用ChatGPT时，承认遇到的任何局限性也很重要。讨论挑战，例如AI在没有人类解释的情况下可能难以完全捕捉细微的语境意义。通过公开地处理这些局限性，你提供了关于你方法的一个平衡视角，并强调了在AI辅助研究中的人类监督的重要性。
- en: Achieving Robust and Transparent Qualitative Analysis with AI and QualCoder
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI和QualCoder实现稳健且透明的定性分析
- en: By following this structured, step-by-step approach, you can leverage ChatGPT
    to streamline the initial stages of open coding while ensuring that the analysis
    remains grounded in rigorous qualitative research principles. Balancing AI-generated
    insights with researcher intuition, and integrating the results into QualCoder,
    allows for a transparent and replicable process. This approach empowers researchers
    to conduct efficient, in-depth qualitative data analysis that is both methodologically
    sound and enhanced by AI-driven capabilities.
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这个结构化、分步进行的方法，您可以利用 ChatGPT 简化开放式编码的初始阶段，同时确保分析基于严格的定性研究原则。平衡人工智能生成的洞察力与研究人员直觉，并将结果整合到
    QualCoder 中，允许一个透明且可重复的过程。这种方法赋予研究人员进行高效、深入定性数据分析的能力，这种分析在方法论上是可靠的，并且由人工智能驱动的功能得到增强。
- en: The entire 10-step process is summarized in Table 10.3\.
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: 整个 10 步流程总结在表 10.3 中。
- en: Table 10.3\. Summary of the 10-step Process to Qualitative Data Analysis in
    ChatGPT and QualCoder
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: 表 10.3\. ChatGPT 和 QualCoder 中定性数据分析 10 步流程总结
- en: '| Step | Objective | Key Actions |'
  id: totrans-1787
  prefs: []
  type: TYPE_TB
  zh: '| 步骤 | 目标 | 关键行动 |'
- en: '| 1\. Clean the interview transcript | Prepare data by cleaning, anonymizing,
    and formatting transcripts for analysis. | - Remove Unnecessary Text: Eliminate
    filler words, irrelevant phrases, and unnecessary prompts.- Anonymize Sensitive
    Information: Replace personal identifiers with generic labels (e.g., "Participant
    1").- Structure Data for AI: Clearly distinguish between interviewer and participant
    responses. |'
  id: totrans-1788
  prefs: []
  type: TYPE_TB
  zh: '| 1\. 清洗访谈转录文本 | 通过清洗、匿名化和格式化转录文本以备分析来准备数据。 | - 删除不必要的文本：消除填充词、无关短语和不必要的提示。-
    匿名化敏感信息：用通用标签（例如，“参与者 1”）替换个人标识符。- 为人工智能结构化数据：明确区分访谈者和参与者的回答。 |'
- en: '| 2\. Set up chatgpt for qualitative data analysis | Configure ChatGPT effectively
    using default or custom GPT models. | - Choose Your Approach: Select default GPT-4
    for general tasks or build a custom model for specific needs.- Configure the Model:
    Provide specific instructions; fine-tune with relevant data if custom.- Adjust
    Settings: Set temperature to 0.2–0.4 for focused responses; be mindful of token
    limits. |'
  id: totrans-1789
  prefs: []
  type: TYPE_TB
  zh: '| 2\. 为定性数据分析设置 ChatGPT | 使用默认或自定义 GPT 模型有效地配置 ChatGPT。 | - 选择您的方案：选择默认的 GPT-4
    用于一般任务或为特定需求构建自定义模型。- 配置模型：提供具体指令；如有自定义，使用相关数据进行微调。- 调整设置：将温度设置为 0.2–0.4 以获得专注的响应；注意令牌限制。
    |'
- en: '| 3\. Define themes and develop prompts | Develop a strategy for generating
    initial codes using deductive or inductive analysis. | - Deductive Analysis:-
    Identify predefined themes from literature or frameworks.- Create prompts targeting
    these themes.- Refine prompts based on AI responses.- Inductive Analysis:- Use
    open-ended prompts to let themes emerge naturally.- Iterate prompts to explore
    emerging ideas. |'
  id: totrans-1790
  prefs: []
  type: TYPE_TB
  zh: '| 3\. 定义主题并开发提示 | 使用演绎或归纳分析制定生成初始代码的策略。 | - 演绎分析：- 从文献或框架中识别预定义的主题。- 创建针对这些主题的提示。-
    根据人工智能的响应精炼提示。- 归纳分析：- 使用开放式提示让主题自然出现。- 迭代提示以探索新出现的想法。 |'
- en: '| 4\. Create prompts and run coding process | Execute coding by running tailored
    prompts and saving outputs. | - Create Clear Prompts: Align prompts with research
    objectives.- Run Prompts for Each Transcript: Submit transcripts to ChatGPT; save
    outputs.- Iterate and Validate: Refine outputs with follow-up questions.- Save
    Outputs for Analysis: Organize results for later use. |'
  id: totrans-1791
  prefs: []
  type: TYPE_TB
  zh: '| 4\. 创建提示并运行编码过程 | 通过运行定制提示并保存输出执行编码。 | - 创建清晰的提示：使提示与研究目标一致。- 为每个转录文本运行提示：将转录文本提交给
    ChatGPT；保存输出。- 迭代和验证：通过后续问题精炼输出。- 保存输出以供分析：整理结果以供后续使用。 |'
- en: '| 5\. Import data into qualcoder and generate a code tree | Transfer ChatGPT
    results into QualCoder for further analysis. | - Upload Transcripts: Import cleaned
    transcripts into QualCoder.- Generate Code Tree: Organize ChatGPT codes hierarchically.-
    Transfer Codes: Manually input codes and associated quotes.- Review and Adjust:
    Refine codes to reflect content accurately.- Apply Codes Consistently: Use the
    code tree across all transcripts. |'
  id: totrans-1792
  prefs: []
  type: TYPE_TB
  zh: '| 5\. 将数据导入 QualCoder 并生成代码树 | 将 ChatGPT 结果转移到 QualCoder 进行进一步分析。 | - 上传转录文本：将清洗后的转录文本导入
    QualCoder。- 生成代码树：按层次组织 ChatGPT 代码。- 转移代码：手动输入代码和相关引文。- 审查和调整：精炼代码以准确反映内容。- 一致应用代码：在整个转录文本中使用代码树。
    |'
- en: '| 6\. Analyze codes in qualcoder | Finalize coding and analyze themes across
    the dataset. | - Conduct Cross-Analysis: Explore theme variations among participants.-
    Generate Reports and Visualizations: Summarize code frequencies and relationships.-
    Interpret Findings: Use codes and themes to answer research questions. |'
  id: totrans-1793
  prefs: []
  type: TYPE_TB
  zh: '| 6. 在QualCoder中分析代码 | 完成编码并分析数据集中的主题。 | - 进行交叉分析：探索参与者之间主题的变化。- 生成报告和可视化：总结代码频率和关系。-
    解释发现：使用代码和主题来回答研究问题。 |'
- en: '| 7\. Develop themes and categories | Identify larger patterns and connections
    in the data. | - Group Codes into Themes: Combine related codes into broader categories.-
    Use ChatGPT for Suggestions: Prompt AI to suggest overarching themes.- Finalize
    Themes: Refine and adjust themes within QualCoder. |'
  id: totrans-1794
  prefs: []
  type: TYPE_TB
  zh: '| 7. 开发主题和类别 | 识别数据中的更大模式和联系。 | - 将代码分组到主题中：将相关代码组合到更广泛的类别中。- 使用ChatGPT提出建议：提示AI提出总体主题。-
    最终确定主题：在QualCoder中完善和调整主题。 |'
- en: '| 8\. Thematic analysis in chatgpt | Use ChatGPT to perform deeper thematic
    analysis. | - Prepare Summarized Data: Compile codes and key excerpts.- Develop
    Advanced Prompts: Craft prompts to explore relationships and patterns.- Run Analysis:
    Input data and prompts into ChatGPT; review AI-generated themes.- Refine Themes:
    Iteratively ask follow-up questions for depth.- Document AI Contributions: Save
    and organize AI-suggested themes. |'
  id: totrans-1795
  prefs: []
  type: TYPE_TB
  zh: '| 8. 在ChatGPT中进行主题分析 | 使用ChatGPT进行更深入的主题分析。 | - 准备总结数据：汇编代码和关键摘录。- 开发高级提示：制作提示以探索关系和模式。-
    运行分析：将数据和提示输入ChatGPT；审查AI生成的主题。- 完善主题：迭代提出后续问题以加深理解。- 记录AI贡献：保存和组织AI建议的主题。 |'
- en: '| 9\. Validate and cross-check | Ensure coding and themes are rigorous and
    transparent. | - Compare AI and Manual Coding: Check for consistency and accuracy.-
    Triangulate Findings: Validate results with traditional methods or additional
    data sources. |'
  id: totrans-1796
  prefs: []
  type: TYPE_TB
  zh: '| 9. 验证和交叉检查 | 确保编码和主题的严谨性和透明度。 | - 比较AI和手动编码：检查一致性和准确性。- 三角验证发现：使用传统方法或附加数据源验证结果。
    |'
- en: '| 10\. Visualize and analyze in qualcoder | Utilize QualCoder''s tools for
    further analysis and visualization. | - Generate Code Trees: Visualize code and
    theme structures.- Write Memos: Document insights and reflections.- Export Findings:
    Prepare data for reports or additional analysis. |'
  id: totrans-1797
  prefs: []
  type: TYPE_TB
  zh: '| 在QualCoder中可视化和分析 | 利用QualCoder的工具进行进一步分析和可视化。 | - 生成代码树：可视化代码和主题结构。- 编写备忘录：记录洞察和反思。-
    导出发现：为报告或附加分析准备数据。 |'
- en: '| Chapter Key Points:'
  id: totrans-1798
  prefs: []
  type: TYPE_NORMAL
  zh: '| 第10章要点：'
- en: Remove filler words, anonymize personal information, and format transcripts
    to distinguish between speakers.
  id: totrans-1799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除填充词，匿名化个人信息，并格式化转录本以区分说话者。
- en: Choose between default GPT-4 or custom models, provide specific instructions,
    and adjust settings for focused responses.
  id: totrans-1800
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在默认的GPT-4或自定义模型之间进行选择，提供具体指令，并调整设置以获得专注的回应。
- en: Use deductive analysis with predefined themes or inductive analysis to let themes
    emerge, creating and refining prompts accordingly.
  id: totrans-1801
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用预定义的主题进行演绎分析或让主题自然出现，相应地创建和改进提示。
- en: Develop clear prompts aligned with research goals, run them for each transcript,
    refine outputs, and save results for analysis.
  id: totrans-1802
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发与研究目标一致的清晰提示，为每个转录本运行它们，完善输出，并将结果保存以供分析。
- en: Upload cleaned transcripts to QualCoder, organize codes hierarchically, manually
    input codes and quotes, and ensure consistent application.
  id: totrans-1803
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将清洗后的转录本上传到QualCoder，按层级组织代码，手动输入代码和引语，并确保应用的一致性。
- en: Conduct cross-analysis, generate reports and visualizations, and interpret findings
    to address research questions.
  id: totrans-1804
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行交叉分析，生成报告和可视化，并解释发现以解决研究问题。
- en: Group related codes into broader themes, use ChatGPT for suggestions, and refine
    themes within QualCoder.
  id: totrans-1805
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将相关代码分组到更广泛的主题中，使用ChatGPT提出建议，并在QualCoder中完善主题。
- en: Summarize codes and excerpts, create advanced prompts to explore patterns, run
    analyses, refine themes, and document AI-generated insights.
  id: totrans-1806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结代码和摘录，创建高级提示以探索模式，运行分析，完善主题，并记录AI生成的洞察。
- en: Compare AI-generated codes with manual coding for consistency, and triangulate
    findings with other methods or data sources.
  id: totrans-1807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较AI生成的代码与手动编码的一致性，并与其他方法或数据源进行三角验证以验证发现。
- en: Use QualCoder’s tools to create code trees and visualizations, document insights
    with memos, and export findings for reports.
  id: totrans-1808
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用QualCoder的工具创建代码树和可视化，用备忘录记录洞察，并将发现导出以供报告。
