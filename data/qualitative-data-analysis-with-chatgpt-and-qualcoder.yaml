- en: 'Part I: Foundations of Large Language Model in Qualitative Analysis'
  id: totrans-213
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一部分：定性分析中大型语言模型的基础。
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: C hapter 2\.
  id: totrans-215
  prefs: []
