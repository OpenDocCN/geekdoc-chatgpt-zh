- en: 'Step 5: Import Data into QualCoder and Generate a Code Tree'
  id: totrans-1593
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 5 步：将数据导入 QualCoder 并生成代码树
