  id: totrans-1002
  prefs: []
  type: TYPE_TB
  zh: '| ![图像](d2d_images/chapter_title_corner_decoration_left.png)  |  | ![图像](d2d_images/chapter_title_corner_decoration_right.png)  |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1003
  prefs: []
  type: TYPE_IMG
  zh: '![图像](d2d_images/chapter_title_above.png)'
- en: Fully Automated Import via API Integration
  id: totrans-1004
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过API集成实现完全自动导入
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1005
  prefs: []
  type: TYPE_IMG
  zh: '![图像](d2d_images/chapter_title_below.png)'
- en: T he Fully Automated Import via API Integration is the most advanced approach
    for integrating ChatGPT with QualCoder (Figure 8.3). It automates the entire process
    of transferring codes, themes, and patterns generated by ChatGPT directly into
    QualCoder through the use of APIs. This method is ideal for researchers dealing
    with large datasets who require maximum efficiency. However, it requires a solid
    understanding of programming and API development to set up the necessary connections
    between ChatGPT and QualCoder.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 通过API集成实现完全自动导入是集成ChatGPT与QualCoder（图8.3）的最先进方法。它通过使用API将ChatGPT生成的代码、主题和模式直接自动传输到QualCoder。这种方法非常适合处理大型数据集且需要最高效率的研究人员。然而，它需要具备编程和API开发方面的扎实理解，以设置ChatGPT和QualCoder之间必要的连接。
- en: In this section, we will outline the key steps involved in setting up a fully
    automated system using APIs and discuss the advantages and challenges associated
    with this method.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将概述使用API设置完全自动化系统的关键步骤，并讨论与此方法相关的优势和挑战。
- en: 'Step 1: Understanding APIs and Setting Up ChatGPT and QualCoder for Integration'
  id: totrans-1008
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1步：了解API并设置ChatGPT和QualCoder以进行集成
- en: B EFORE DIVING INTO the technical setup, it is important to understand the role
    of APIs in facilitating the automated transfer of data between ChatGPT and QualCoder.
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入技术设置之前，理解API在促进ChatGPT和QualCoder之间自动数据传输中的作用非常重要。
- en: 'What is an API? : APIs allow two software platforms to communicate and exchange
    data automatically. In this context, the API will enable ChatGPT to send the generated
    codes, themes, and patterns directly to QualCoder without manual intervention.'
  id: totrans-1010
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是API？：API允许两个软件平台自动通信和交换数据。在这种情况下，API将使ChatGPT能够直接将生成的代码、主题和模式发送到QualCoder，无需人工干预。
- en: 'Setting Up OpenAI’s API (ChatGPT) : You will need to create an account with
    OpenAI and obtain an API key for accessing ChatGPT. The API key allows you to
    send and retrieve data from ChatGPT programmatically.'
  id: totrans-1011
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置OpenAI的API（ChatGPT）：您需要创建一个OpenAI账户并获取访问ChatGPT的API密钥。API密钥允许您以编程方式发送和检索数据从ChatGPT。
- en: 'Obtain an API Key : Sign up on OpenAI’s platform and navigate to the API section.
    From there, you can generate an API key, which will be used in your code to access
    ChatGPT’s services.'
  id: totrans-1012
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取API密钥：在OpenAI平台上注册并导航到API部分。从那里，您可以生成一个API密钥，该密钥将用于您的代码中，以访问ChatGPT的服务。
- en: 'API Documentation : Review the OpenAI API documentation to understand the available
    methods for sending data to ChatGPT and receiving its output. This includes methods
    for generating codes and themes from textual data.'
  id: totrans-1013
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: API文档：查阅OpenAI API文档，了解向ChatGPT发送数据并接收其输出的可用方法。这包括从文本数据生成代码和主题的方法。
- en: 'Setting Up API Access for QualCoder : QualCoder does not currently offer a
    native API, but it supports the import of REFI-QDA files (a standardized format
    for qualitative data). To achieve full automation, you will need to either develop
    a custom API for QualCoder or use a third-party tool that supports API-based data
    transfer.'
  id: totrans-1014
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置QualCoder的API访问：QualCoder目前不提供原生API，但它支持导入REFI-QDA文件（定性数据的标准化格式）。为了实现完全自动化，您需要为QualCoder开发自定义API或使用支持基于API的数据传输的第三方工具。
- en: 'Develop Custom API Solutions : If you have advanced programming skills, you
    could create a custom script or middleware that acts as an API for QualCoder,
    converting ChatGPT’s output into a format that QualCoder can interpret and import.'
  id: totrans-1015
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发自定义API解决方案：如果您具有高级编程技能，可以创建一个自定义脚本或中间件，作为QualCoder的API，将ChatGPT的输出转换为QualCoder可以解释和导入的格式。
- en: 'Third-Party Applications : If direct API integration with QualCoder is challenging,
    consider using third-party software that supports APIs and REFI-QDA file formats
    to act as a bridge between ChatGPT and QualCoder.'
  id: totrans-1016
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三方应用程序：如果直接与QualCoder的API集成具有挑战性，考虑使用支持API和REFI-QDA文件格式的第三方软件作为ChatGPT和QualCoder之间的桥梁。
- en: 'Step 2: Automating Data Transfer from ChatGPT to QualCoder'
  id: totrans-1017
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第2步：自动化从ChatGPT到QualCoder的数据传输
- en: O NCE API ACCESS IS set up, the next step is to automate the transfer of codes
    and themes from ChatGPT into QualCoder.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦API访问设置完成，下一步就是自动化将代码和主题从ChatGPT传输到QualCoder。
- en: 'Sending Data to ChatGPT via API : First, programmatically send your qualitative
    data (e.g., interview transcripts) to ChatGPT via its API. This can be done by
    writing a script that feeds text data into ChatGPT and requests code and theme
    generation. Example API request:'
  id: totrans-1019
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过API向ChatGPT发送数据：首先，通过其API将您的定性数据（例如，访谈记录）编程发送到ChatGPT。这可以通过编写一个将文本数据输入ChatGPT并请求代码和主题生成的脚本来完成。示例API请求：
- en: python
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: python
- en: Copy code
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 复制代码
- en: import openai
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: import openai
- en: openai.api_key = 'your-api-key-here'
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: openai.api_key = 'your-api-key-here'
- en: response = openai.Completion.create(
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: response = openai.Completion.create(
- en: engine="gpt-4",
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: engine="gpt-4",
- en: 'prompt="Identify key codes and themes from this interview transcript: [your
    transcript text here]",'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 'prompt="Identify key codes and themes from this interview transcript: [your
    transcript text here]",'
- en: max_tokens=1000
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: max_tokens=1000
- en: )
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: codes_and_themes = response['choices'][0]['text']
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: codes_and_themes = response['choices'][0]['text']
- en: The above script will send your transcript to ChatGPT and receive a response
    containing the suggested codes and themes.
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 上述脚本将发送您的访谈记录到ChatGPT，并接收包含建议代码和主题的响应。
- en: 'Converting Output into a Structured Format : Once ChatGPT returns the codes
    and themes, format the output into a structure that can be automatically processed
    by QualCoder. This typically involves saving the output as a CSV or JSON file.
    For example, a simple conversion could output the codes into a CSV file like this:'
  id: totrans-1031
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将输出转换为结构化格式：一旦ChatGPT返回代码和主题，将输出格式化为QualCoder可以自动处理的格式。这通常涉及将输出保存为CSV或JSON文件。例如，简单的转换可以将代码输出到如下CSV文件：
- en: python
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: python
- en: Copy code
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 复制代码
- en: import csv
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: import csv
- en: 'with open(''codes.csv'', mode=''w'', newline='''') as file:'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 'with open(''codes.csv'', mode=''w'', newline='''') as file:'
- en: writer = csv.writer(file)
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: writer = csv.writer(file)
- en: writer.writerow(["Code", "Theme", "Description"])
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: writer.writerow(["代码", "主题", "描述"])
- en: 'for code, theme, description in codes_and_themes:'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 'for code, theme, description in codes_and_themes:'
- en: writer.writerow([code, theme, description])
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: writer.writerow([code, theme, description])
- en: This script creates a CSV file that can later be imported into QualCoder.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本创建一个CSV文件，稍后可以导入到QualCoder。
- en: 'Automated Import into QualCoder : If you are developing an API for QualCoder
    or using a third-party tool, the next step is to set up a system where the CSV
    or JSON file generated by ChatGPT is automatically imported into QualCoder. This
    can be done using custom middleware that reads the file and inserts the codes
    and themes into QualCoder’s database or project file structure.'
  id: totrans-1041
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动导入到QualCoder：如果您正在开发QualCoder的API或使用第三方工具，下一步是设置一个系统，自动将ChatGPT生成的CSV或JSON文件导入到QualCoder中。这可以通过自定义中间件实现，该中间件读取文件并将代码和主题插入到QualCoder的数据库或项目文件结构中。
- en: 'Step 3: Handling the REFI-QDA Format for QualCoder Integration'
  id: totrans-1042
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第3步：处理REFI-QDA格式以实现QualCoder集成
- en: S INCE QUALCODER SUPPORTS the REFI-QDA standard, you may need to convert the
    output from ChatGPT into this format to fully automate the import process.
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 由于QualCoder支持REFI-QDA标准，您可能需要将ChatGPT的输出转换为该格式，以完全自动化导入过程。
- en: 'What is REFI-QDA? : REFI-QDA is a standard format used by qualitative analysis
    software to exchange data (e.g., codes, themes, and transcript information) between
    platforms. While ChatGPT does not natively support REFI-QDA, you can create a
    script that formats ChatGPT’s output into this format.'
  id: totrans-1044
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是REFI-QDA？：REFI-QDA是定性分析软件用于在不同平台之间交换数据（例如，代码、主题和转录信息）的标准格式。虽然ChatGPT原生不支持REFI-QDA，但你可以创建一个脚本，将ChatGPT的输出格式化为这种格式。
- en: 'Conversion Script : Write a script that takes the output from ChatGPT and converts
    it into the REFI-QDA format. This may involve mapping the codes and themes from
    ChatGPT into the XML-based structure of REFI-QDA.'
  id: totrans-1045
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转换脚本：编写一个脚本，将ChatGPT的输出转换为REFI-QDA格式。这可能涉及将ChatGPT中的代码和主题映射到基于XML的REFI-QDA结构中。
- en: 'Third-Party Tools : Alternatively, use third-party applications like NVivo
    or ATLAS.ti, which support both API integrations and REFI-QDA imports, to act
    as intermediaries in the process. These tools can help bridge the gap between
    ChatGPT’s output and QualCoder’s requirements.'
  id: totrans-1046
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三方工具：或者，使用NVivo或ATLAS.ti等第三方应用程序，这些工具支持API集成和REFI-QDA导入，作为过程中的中间件。这些工具可以帮助弥合ChatGPT的输出和QualCoder的要求之间的差距。
- en: 'Step 4: Running the Automated Workflow'
  id: totrans-1047
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第4步：运行自动化工作流程
- en: 'W ITH THE APIS AND DATA conversion processes in place, you can now automate
    the entire workflow. Here’s a simplified outline of the process:'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 在API和数据转换过程就绪后，你现在可以自动化整个工作流程。以下是过程的简化概述：
- en: 'Data Submission : The researcher uploads the qualitative data (transcripts,
    notes, etc.) into the automation script, which sends it to ChatGPT via the API.'
  id: totrans-1049
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据提交：研究人员将定性数据（转录、笔记等）上传到自动化脚本中，该脚本通过API将其发送到ChatGPT。
- en: 'Code and Theme Generation : ChatGPT processes the data and returns a structured
    list of codes and themes.'
  id: totrans-1050
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代码和主题生成：ChatGPT处理数据并返回一个结构化的代码和主题列表。
- en: 'File Conversion : The output is automatically converted into a CSV, JSON, or
    REFI-QDA format.'
  id: totrans-1051
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文件转换：输出自动转换为CSV、JSON或REFI-QDA格式。
- en: 'Automatic Import into QualCoder : The codes and themes are transferred directly
    into QualCoder’s project environment through either a custom API connection or
    a third-party software intermediary.'
  id: totrans-1052
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动导入到QualCoder：代码和主题通过自定义API连接或第三方软件中介直接转移到QualCoder的项目环境中。
- en: 'Code Application : In the most advanced setups, the system may also attempt
    to apply the codes directly to relevant text segments in QualCoder, although this
    feature may still require some manual intervention depending on the complexity
    of the data.'
  id: totrans-1053
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代码应用：在最高级的设置中，系统也可能尝试直接将代码应用到QualCoder中相关的文本片段，尽管这个功能可能仍然需要根据数据的复杂性进行一些手动干预。
- en: 'Step 5: Reviewing and Finalizing the Analysis'
  id: totrans-1054
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第5步：审查和最终分析
- en: A FTER THE FULLY AUTOMATED import process, it’s essential to review the results
    to ensure accuracy and relevance.
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 在完全自动化的导入过程之后，审查结果以确保准确性和相关性是非常重要的。
- en: 'Review Codes and Themes : Although the transfer is automated, it’s important
    to manually review the codes and themes within QualCoder to verify that they align
    with your research objectives.'
  id: totrans-1056
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查代码和主题：尽管传输是自动化的，但手动审查QualCoder中的代码和主题以验证它们是否符合你的研究目标是很重要的。
- en: 'Refine as Needed : Make any necessary adjustments to the codes, group related
    codes into categories, and create memos to document your analytical process.'
  id: totrans-1057
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据需要细化：对代码进行必要的调整，将相关的代码分组到类别中，并创建备忘录以记录你的分析过程。
- en: 'Apply QualCoder Tools : Once the data is imported, you can utilize all of QualCoder’s
    built-in analysis tools, such as code frequency analysis, co-occurrence tables,
    and visualization features, to conduct deeper analysis.'
  id: totrans-1058
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用QualCoder工具：一旦数据导入，你可以利用所有QualCoder的内置分析工具，例如代码频率分析、共现表和可视化功能，进行更深入的分析。
- en: Challenges and Considerations for Fully Automated Integration
  id: totrans-1059
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 完全自动化集成的挑战和考虑因素
- en: 'W HILE THE FULLY AUTOMATED approach offers efficiency and scalability, it comes
    with certain challenges:'
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管完全自动化的方法提供了效率和可扩展性，但也伴随着一些挑战：
- en: 'Technical Expertise : This approach requires significant programming knowledge
    to set up the API connections and develop scripts for automating the data transfer
    process. Researchers without coding experience may find this approach difficult
    to implement.'
  id: totrans-1061
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术专业知识：这种方法需要大量的编程知识来设置API连接并开发自动化数据传输过程的脚本。没有编码经验的研究人员可能会发现这种方法难以实施。
- en: 'Limited Format Compatibility : ChatGPT does not currently support the REFI-QDA
    format, which is essential for QualCoder. Therefore, additional tools or custom
    scripts are needed to convert ChatGPT’s output into a compatible format.'
  id: totrans-1062
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 格式兼容性有限：ChatGPT目前不支持QualCoder必需的REFI-QDA格式，因此需要额外的工具或自定义脚本来将ChatGPT的输出转换为兼容的格式。
- en: 'Debugging and Maintenance : API connections and scripts may require ongoing
    debugging and maintenance, especially if there are updates to either ChatGPT or
    QualCoder. Researchers need to ensure their automated workflows remain functional
    as software platforms evolve.'
  id: totrans-1063
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调试和维护：API连接和脚本可能需要持续的调试和维护，尤其是如果ChatGPT或QualCoder有更新。研究人员需要确保他们的自动化工作流程在软件平台发展过程中保持功能正常。
- en: Advantages of the Fully Automated Approach
  id: totrans-1064
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 完全自动方法的优点
- en: 'Efficiency with Large Datasets : This method is particularly useful for researchers
    handling large volumes of qualitative data, as it eliminates the need for manual
    coding and data entry.'
  id: totrans-1065
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大数据集的效率：这种方法特别适用于处理大量定性数据的研究人员，因为它消除了手动编码和数据输入的需要。
- en: 'Seamless Integration : When set up correctly, this approach offers a seamless,
    end-to-end integration between ChatGPT and QualCoder, allowing researchers to
    focus more on analysis rather than on administrative tasks.'
  id: totrans-1066
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无缝集成：当正确设置时，这种方法提供了ChatGPT和QualCoder之间的无缝、端到端集成，使研究人员能够更多地专注于分析而不是行政任务。
- en: 'Scalability : This approach can be scaled to handle multiple projects or large
    datasets, making it an ideal solution for research teams or organizations with
    extensive data analysis needs.'
  id: totrans-1067
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可扩展性：这种方法可以扩展以处理多个项目或大型数据集，对于需要大量数据分析的研究团队或组织来说是一个理想的解决方案。
- en: F IGURE 8.3\. FULLY AUTOMATED Import from ChatGPT to QualCoder via API Integration
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3\. 通过API集成从ChatGPT完全自动导入到QualCoder
- en: '![A diagram of a computer Description automatically generated with medium confidence](d2d_images/image021.png)'
  id: totrans-1069
  prefs: []
  type: TYPE_IMG
  zh: '![使用中等置信度自动生成的计算机图描述](d2d_images/image021.png)'
- en: '![A diagram of a process flow Description automatically generated](d2d_images/image013.png)'
  id: totrans-1070
  prefs: []
  type: TYPE_IMG
  zh: '![流程图描述自动生成](d2d_images/image013.png)'
- en: '| Chapter Key Points:'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: '| 章节要点：'
- en: Integrating ChatGPT with QualCoder enhances qualitative data analysis by combining
    AI capabilities with a powerful open-source tool for efficient research.
  id: totrans-1072
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将ChatGPT与QualCoder集成通过结合AI能力和强大的开源工具，提高了定性数据分析的效率。
- en: There are three integration approaches—Manual Import, Semi-Automated Transfer,
    and Fully Automated Import via API Integration—each varying in automation level
    and technical expertise required.
  id: totrans-1073
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有三种集成方法——手动导入、半自动传输和通过API集成的完全自动导入——每种方法的自动化程度和技术专业知识要求各不相同。
- en: The Manual Import method involves manually applying ChatGPT-generated codes
    in QualCoder, offering full control and alignment with research objectives.
  id: totrans-1074
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动导入方法涉及在QualCoder中手动应用ChatGPT生成的代码，提供完全的控制并与研究目标保持一致。
- en: The Semi-Automated Transfer method uses CSV or TXT files to import ChatGPT codes
    into QualCoder, saving setup time but requiring manual association of codes with
    text segments.
  id: totrans-1075
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 半自动传输方法使用CSV或TXT文件将ChatGPT代码导入到QualCoder，节省了设置时间，但需要手动将代码与文本片段关联起来。
- en: The Fully Automated Import via API Integration method automates code transfer
    from ChatGPT to QualCoder using APIs, ideal for large datasets but requiring advanced
    technical skills and possibly additional tools.
  id: totrans-1076
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过API集成完全自动导入方法使用API将ChatGPT的代码自动传输到QualCoder，非常适合大型数据集，但需要高级技术技能以及可能需要额外的工具。
- en: Each approach allows researchers to optimize their workflow based on their needs
    and skills while ensuring rigorous qualitative analysis.
  id: totrans-1077
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每种方法都允许研究人员根据他们的需求和技能优化他们的工作流程，同时确保严格的定性分析。
- en: Challenges with the Fully Automated approach include technical complexity and
    compatibility issues, necessitating programming expertise and potential use of
    third-party tools.
  id: totrans-1078
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全自动方法面临的挑战包括技术复杂性和兼容性问题，需要编程专业知识以及可能使用第三方工具。
- en: Selecting the appropriate integration method enables leveraging AI-driven coding
    with QualCoder's features, enhancing efficiency without compromising research
    quality.
  id: totrans-1079
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择合适的集成方法可以借助QualCoder的功能实现AI驱动的编码，提高效率而不影响研究质量。
