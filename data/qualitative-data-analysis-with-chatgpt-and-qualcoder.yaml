- en: 'Sub-theme: Clarity of Communication'
  id: totrans-1528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：沟通的清晰度
- en: 'Code: Improved understanding through immersive meetings'
  id: totrans-1529
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码：通过沉浸式会议提高理解
- en: 'Quote: "Since we started using VR, I feel like I understand my colleagues''
    ideas much better because we can visualize concepts together."'
  id: totrans-1530
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用：“自从我们开始使用VR以来，我感觉我更好地理解了同事们的想法，因为我们能一起可视化概念。”
- en: 'Sub-theme: Non-Verbal Cues in VR'
  id: totrans-1531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子主题：VR中的非言语线索
- en: 'Code: Lack of real facial expressions'
  id: totrans-1532
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码：缺乏真实面部表情
- en: 'Quote: "It''s sometimes hard to gauge reactions because avatars don''t show
    real facial expressions."'
  id: totrans-1533
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用：“有时很难衡量反应，因为化身无法展示真实的面部表情。”
- en: Repeat this format for each theme and sub-theme.
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 对每个主题和子主题重复此格式。
- en: 'Note:'
  id: totrans-1535
  prefs: []
  type: TYPE_NORMAL
  zh: 备注：
- en: Focus on quality over quantity; it is better to have well-supported codes than
