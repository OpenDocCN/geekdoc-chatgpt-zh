  zh: 详细角色表格模板
- en: This character sheet covers all aspects of character creation and development.
    This template is designed to be versatile enough for any genre. If you want a
    more comprehensive template, copy this one into ChatGPT and ask it to create a
    new template with more traits for your specific needs.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 此角色表格涵盖了角色创建和发展的所有方面。此模板设计得足够灵活，适用于任何类型。如果您需要一个更全面的模板，请将此模板复制到ChatGPT中，并要求它为您特定的需求创建一个具有更多特征的新的模板。
