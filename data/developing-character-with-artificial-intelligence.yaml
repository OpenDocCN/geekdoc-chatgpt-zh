- en: 3\. A character with a strong sense of justice that sometimes leads to conflict.
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个有强烈正义感的角色，有时会导致冲突。
- en: 4\. A highly adaptable character who can blend into any social situation.
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
