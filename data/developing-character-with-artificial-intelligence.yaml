  id: totrans-864
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：我的[指定类型]故事中的一组演员开始于以下关系：[描述关系]。这些关系在整个故事中如何演变或改变？
- en: Author Seeks Ideas
  id: totrans-865
