  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基本角色表格模板
- en: The following character sheet templates are tailored for specific genres, along
    with a general template that can be adapted for any genre. These templates can
    be used as a starting point to develop detailed and engaging characters suited
    to the specific needs of your story.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 以下角色表格模板针对特定类型定制，同时还有一个通用模板可以适应任何类型。这些模板可以用作起点，开发出适合故事特定需求的详细和引人入胜的角色。
- en: They help ensure that all critical aspects of character creation are considered.
    You can fill in parts of or all of the template and ask ChatGPT to fill in the
    rest.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 它们有助于确保考虑所有角色创建的关键方面。您可以填写模板的部分或全部内容，并要求ChatGPT填写其余部分。
