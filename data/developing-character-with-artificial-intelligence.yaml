  prefs: []
  type: TYPE_NORMAL
  zh: '"character_traits": "列出关键角色特点（例如，勇敢，聪明，神秘）"'
- en: '"background": "Specify any relevant background information (e.g., from a distant
    planet, ancient lineage)",'
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: '"background": "指定任何相关的背景信息（例如，来自遥远的星球，古老的血统）",'
- en: '"desired_meaning": "If applicable, specify a meaning you want the name to convey
    (e.g., strength, wisdom)",'
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: '"desired_meaning": "如果适用，指定你希望名字传达的意义（例如，力量，智慧）",'
- en: '"additional_criteria": "Any other relevant criteria (e.g., sounds futuristic,
    easy to pronounce)",'
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: '"additional_criteria": "任何其他相关标准（例如，听起来未来感十足，易于发音）",'
- en: '"number_of_names": "Specify how many names you would like generated"'
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: '"number_of_names": "指定你想要生成的名字数量"'
- en: '}'
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: 'Example Usage:'
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 示例用法：
- en: 'If you''re seeking names for a character in a sci-fi story who is a brilliant
    but eccentric inventor from a technologically advanced civilization, and you want
    the name to sound futuristic but also be easy to pronounce, your JSON request
    might look like this:'
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在寻找一个在科幻故事中角色名字，这个角色是一个来自技术先进文明的聪明而古怪的发明家，并且你希望这个名字听起来未来感十足但易于发音，你的JSON请求可能看起来像这样：
- en: '{'
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"prompt": "Generate unique character names",'
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: '"prompt": "生成独特的角色名字",'
- en: '"genre": "sci-fi",'
  id: totrans-1466
  prefs: []
  type: TYPE_NORMAL
  zh: '"genre": "科幻",'
- en: '"character_traits": "brilliant, eccentric, inventor",'
  id: totrans-1467
  prefs: []
  type: TYPE_NORMAL
  zh: '"character_traits": "聪明，古怪，发明家",'
- en: '"background": "from a technologically advanced civilization",'
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: '"background": "来自技术先进文明",'
- en: '"desired_meaning": "innovation, intelligence",'
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: '"desired_meaning": "创新，智慧",'
- en: '"additional_criteria": "sounds futuristic, easy to pronounce",'
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: '"additional_criteria": "听起来未来感十足，易于发音",'
- en: '"number_of_names": "5"'
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: '"number_of_names": "5"'
- en: '}'
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: Chapter 37
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 第37章
- en: Character Name and Role
  id: totrans-1474
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色名字和角色
- en: The following structure of questions, ideas, and prompts should help in fleshing
    out your characters fully. We'll continue this approach for each aspect of character
    development in the next several chapters, ensuring a thorough exploration of the
    characters in your novel.
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: 以下关于问题、想法和提示的结构应该有助于充分塑造你的角色。我们将在接下来的几章中继续这种做法，确保对小说中角色的彻底探索。
- en: Character Name
  id: totrans-1476
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色名字
- en: 'Questions:'
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. How did you come up with your main character's name?
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 你是如何想出你主要角色的名字的？
- en: 2\. Does the name have any cultural, historical, or familial significance in
    the context of your story?
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在你的故事背景下，名字是否有任何文化、历史或家族意义？
- en: 3\. Are there any hidden meanings or references in the name that relate to the
    character's journey or traits?
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 名字中是否有任何与角色的旅程或特征相关的隐藏含义或引用？
- en: 4\. How does the character feel about their name? Is it a source of pride, shame,
    or conflict?
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 角色对自己的名字有何感受？它是骄傲、羞愧还是冲突的来源？
- en: 5\. Does the character have any nicknames, and if so, who gave them and why?
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 角色是否有任何昵称，如果有，是谁给的以及为什么？
- en: 'Ideas:'
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感：
- en: 1\. A name that is a play on words related to the character’s destiny or personality
    traits.
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一个与角色的命运或个性特征相关的双关语名字。
- en: 2\. A name inherited from a significant ancestor, adding to the character's
    background depth.
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 从一个重要的祖先那里继承的名字，增加了角色的背景深度。
- en: 3\. A name that reflects the character's cultural heritage, adding authenticity.
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个反映角色文化遗产的名字，增加真实性。
- en: 4\. A self-chosen name representing the character's personal transformation.
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一个代表角色个人转变的自选名字。
- en: 5\. A name with a double meaning, hinting at a hidden aspect of the character
    or plot.
  id: totrans-1488
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 一个具有双重含义的名字，暗示角色的隐藏方面或情节。
- en: 'Prompts for AI Development:'
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: AI开发提示：
- en: 1\. Create a name for a character that embodies the theme of redemption.
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为一个体现救赎主题的角色创造一个名字。
- en: 2\. Generate a list of names that would suit a cunning trickster in a fantasy
    setting.
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为一个在奇幻设定中适合狡猾骗子的角色生成一系列名字。
- en: 3\. Suggest names with historical significance for a character in a period drama.
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为一部历史剧中的角色建议具有历史意义的名字。
- en: 4\. Provide names that are symbolic for a character embarking on a journey of
    self-discovery.
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 提供一些象征性的名字，适合一个踏上自我发现之旅的角色。
- en: 5\. Develop a name that subtly hints at a character’s secret power or ability.
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 设计一个微妙地暗示角色秘密力量或能力的名字。
- en: Role in the Story
  id: totrans-1495
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事中的角色作用
- en: 'Questions:'
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. What inspired the specific role you chose for your character in the story?
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 你选择的角色在故事中的具体角色受到了什么启发？
- en: 2\. How does this role challenge or complement the character's personality?
  id: totrans-1498
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 这个角色如何挑战或补充角色的个性？
- en: 3\. Are there any role models or archetypes you are drawing from for this role?
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 你是否为这个角色借鉴了任何榜样或原型？
- en: 4\. How does the character's role evolve throughout the story?
  id: totrans-1500
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 角色的角色在故事中是如何发展的？
- en: 5\. Does the character's role in the story conflict with their personal desires
    or ambitions?
  id: totrans-1501
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 角色的角色在故事中是否与他们的个人愿望或抱负冲突？
- en: 'Ideas:'
  id: totrans-1502
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感：
- en: 1\. A reluctant hero who grows to embrace their destiny.
  id: totrans-1503
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一个不情愿的英雄，最终接受了自己的命运。
- en: 2\. An antagonist who believes they are doing the right thing.
  id: totrans-1504
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 一个相信自己在做正确事情的反派。
- en: 3\. A side character who unexpectedly becomes pivotal to the plot.
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个意外成为情节关键点的副角色。
- en: 4\. A mentor character who must confront their own past mistakes.
  id: totrans-1506
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一个必须面对自己过去错误的导师角色。
- en: 5\. A comic relief character who provides crucial insight at a critical moment.
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 一个在关键时刻提供关键洞察的喜剧角色。
- en: 'Prompts for AI Development:'
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: AI开发提示：
- en: 1\. Develop a character arc for a protagonist who starts off as a skeptic but
    becomes a believer.
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为一个起初是怀疑者但最终成为信仰者的主角发展一个角色弧线。
- en: 2\. Suggest ways in which an antagonist’s backstory could make them sympathetic.
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 建议如何使反派的历史背景使其变得有同情心。
- en: 3\. Generate ideas for a side character who brings unexpected wisdom or aid
    to the main plot.
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为一个为主线情节带来意外智慧或援助的副角色生成想法。
- en: 4\. Create a backstory for a mentor figure who is overcoming a personal failure.
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为一个克服个人失败的导师角色创造一个背景故事。
- en: 5\. Outline a subplot where the comic relief character faces a serious challenge.
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 概述一个副角色面临严重挑战的副情节。
- en: Chapter 38
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 第38章
- en: Occupation or Role in Society
  id: totrans-1515
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 职业或社会角色
- en: 'Questions:'
  id: totrans-1516
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. How does the character’s occupation or societal role reflect their personality
    traits?
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 角色的职业或社会角色如何反映他们的个性特征？
- en: 2\. What influenced the character to choose or end up in this occupation or
    role?
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 什么影响了角色选择或最终陷入这个职业或角色？
- en: 3\. How does their occupation or societal role affect their relationships with
    other characters?
  id: totrans-1519
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 他们的职业或社会角色如何影响他们与其他角色的关系？
- en: 4\. Are there any conflicts or challenges the character faces due to their occupation
    or role?
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 由于职业或角色，角色面临任何冲突或挑战吗？
- en: 5\. How might the character’s occupation or role change by the end of the story?
  id: totrans-1521
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 角色的职业或角色可能会在故事结束时如何改变？
- en: 'Ideas:'
  id: totrans-1522
  prefs: []
  type: TYPE_NORMAL
  zh: 思想：
- en: 1\. A dedicated scientist whose pursuit of truth leads to ethical dilemmas.
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一个致力于追求真理的科学家，这导致道德困境。
- en: 2\. A soldier struggling with loyalty to their country versus personal morals.
  id: totrans-1524
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 一个在忠诚于国家与个人道德之间挣扎的士兵。
- en: 3\. An artist who uses their work as a means of silent rebellion.
  id: totrans-1525
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个将他们的作品作为无声反抗手段的艺术家。
- en: 4\. A high-ranking official living a double life.
  id: totrans-1526
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一个过着双重生活的官员。
- en: 5\. A commoner rising to prominence through unexpected circumstances.
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 一个通过意外情况崛起的普通人。
- en: 'Prompts for AI Development:'
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能开发提示：
- en: 1\. Create a dilemma for a scientist character that challenges their ethical
    boundaries.
  id: totrans-1529
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为一个科学家角色创造一个挑战他们道德边界的困境。
- en: 2\. Explore the internal conflict of a soldier torn between duty and personal
    ethics.
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 探索一个士兵在职责和个人道德之间的内心冲突。
- en: 3\. Describe how an artist in a repressive society would express themselves
    subtly in their art.
  id: totrans-1531
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 描述在一个压抑的社会中，一个艺术家如何在他们的艺术中微妙地表达自己。
- en: 4\. Develop a storyline for a high-ranking official with a secret life.
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为一个有秘密生活的官员发展一个故事情节。
- en: 5\. Outline the journey of a commoner who unexpectedly becomes a key figure
    in a revolution.
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 概述一个普通人意外成为革命关键人物的经历。
- en: Chapter 39
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 第39章
- en: Physical Description, Traits, and Mannerisms
  id: totrans-1535
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生理描述、特征和举止
- en: Physical Description
  id: totrans-1536
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生理描述
- en: 'Questions:'
  id: totrans-1537
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. What unique physical features distinguish your character from others?
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 什么独特的生理特征使角色与其他人区别开来？
- en: 2\. How does your character's physical appearance affect the way they interact
    with their world?
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 您角色的物理外观如何影响他们与世界互动的方式？
- en: 3, Are there any aspects of their appearance that your character is particularly
    proud of or self-conscious about?
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 您的角色是否特别自豪或对他们的外貌感到害羞？
- en: 4, How does their look change under stress or in different emotional states
    (e.g., blushing, pale)?
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 4、在压力或不同的情绪状态下（例如，脸红、苍白），他们的外观如何改变？
- en: 5, Does your character have any physical scars or markings? If so, what are
    their stories?
  id: totrans-1542
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 角色是否有任何身体疤痕或标记？如果有，它们的故事是什么？
- en: 'Ideas:'
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 思想：
- en: 1\. A character with strikingly unusual eye color that is tied to a family secret.
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一个与家族秘密相关的引人注目的不寻常眼色的角色。
- en: 2\. A character who uses their physical strength or stature to hide emotional
    vulnerability.
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 一个利用他们的身体力量或身材来隐藏情感脆弱性的角色。
- en: 3\. A character with a distinctive hairstyle or tattoo that symbolizes their
    life philosophy.
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个有独特发型或纹身，象征着他们生活哲学的角色。
- en: 4\. A character who physically transforms under certain conditions (e.g., werewolf,
    magical curse).
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在某些条件下（例如，狼人、魔法诅咒）身体发生变化的角色。
- en: 5\. A character with a scar that serves as a reminder of a past failure or challenge.
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 一个疤痕作为过去失败或挑战的提醒的角色。
- en: 'Prompts for AI Development:'
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能开发提示：
- en: 1\. Create a physical description for a character whose appearance defies typical
    beauty standards in their culture.
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为一个角色创造一个违反典型审美标准的物理描述。
- en: 2\. Generate a list of physical traits for a character who is a seasoned warrior
    with a gentle heart.
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为一个经验丰富的战士，他有一颗温柔的心，生成一份生理特征列表。
- en: 3\. Suggest distinctive physical features for a character who is a rebel in
    a dystopian world.
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为一个在反乌托邦世界中反叛的角色提出独特的生理特征。
- en: 4\. Describe the physical transformation of a character under a magical curse.
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 描述一个角色在魔法诅咒下的身体变化。
- en: 5\. Develop a backstory for a character with a prominent scar and its significance.
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为一个有显著疤痕及其重要性的角色发展背景故事。
- en: Unique Physical Traits
  id: totrans-1555
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 独特的生理特征
- en: 'Questions:'
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. How do your character's unique physical traits influence their daily life?
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 您角色的独特生理特征如何影响他们的日常生活？
- en: 2\. Are these traits common in the world of your story, or do they make your
    character stand out?
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 这些特质在您故事的世界中很常见，还是使您的角色脱颖而出？
- en: 3\. Do these traits have any cultural, magical, or historical significance?
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 这些特质是否有任何文化、魔法或历史意义？
- en: 4\. How do others in your story world react to these unique traits?
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 故事世界中其他人如何反应这些独特特质？
