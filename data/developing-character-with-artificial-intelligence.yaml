  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：在一个[指定类型]的故事中，全体演员可能出现的内部群体冲突有哪些，以及这些冲突如何以推动情节发展和塑造角色的方式得到解决？
- en: Chapter 20
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十章
- en: Character Exercises
  id: totrans-878
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色练习
- en: These exercises are meant to encourage hands-on experimentation with AI in various
    aspects of character creation while giving you a focal point to avoid going down
    a rabbit hole.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 这些练习旨在鼓励在角色创建的各个方面进行人工智能的动手实验，同时为你提供一个焦点，以避免陷入兔子洞。
- en: AI-Generated Backstory Exploration
  id: totrans-880
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能生成背景故事探索
- en: 'Goal: To understand how AI can add depth and complexity to standard archetypes.'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：理解人工智能如何为标准原型增加深度和复杂性。
- en: 'Exercise: Select a character archetype (e.g., the hero, the mentor, the villain).
    Use an AI tool to generate a unique backstory for this archetype. Then, write
    a brief scene where this backstory influences the character''s decision-making.'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：选择一个角色原型（例如，英雄、导师、反派）。使用人工智能工具为这个原型生成一个独特的背景故事。然后，写一个简短的场景，其中这个背景故事影响角色的决策。
- en: Diverse Personality Crafting
  id: totrans-883
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多样化性格塑造
- en: 'Goal: To explore how AI can diversify a character’s personality beyond initial
    ideas.'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：探索人工智能如何使角色的个性超越最初的想法。
- en: 'Exercise: Input basic information about a character into an AI tool (e.g.,
    age, occupation). Ask the AI to generate different personality traits, fears,
    and desires. Choose the most intriguing combination and write a character profile
    based on these traits.'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：将一个角色的基本信息输入到人工智能工具中（例如，年龄、职业）。要求人工智能生成不同的个性特征、恐惧和欲望。选择最引人入胜的组合，并根据这些特征编写一个角色档案。
- en: Dialogue Development Challenge
  id: totrans-886
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对话发展挑战
- en: 'Goal: To practice refining AI-generated dialogue to fit specific character
    voices.'
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：练习调整人工智能生成的对话以适应特定的角色声音。
- en: 'Exercise: Create a scenario where two characters meet for the first time. Use
    AI to generate dialogue for this encounter based on brief character descriptions.
    Edit the dialogue to better fit the characters’ voices and the story’s tone.'
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：创造一个场景，其中两个角色第一次见面。使用人工智能根据简短的角色描述生成这次遭遇的对话。编辑对话以更好地符合角色的声音和故事的风格。
- en: Character Evolution Exercise
  id: totrans-889
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 角色演变练习
- en: 'Goal: To demonstrate how AI can be used to plot character development arcs.'
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：展示如何使用人工智能来规划角色发展弧线。
- en: 'Exercise: Develop a character with a basic personality. Use AI to suggest life
    events that could drastically change this character. Write a before-and-after
    scene showing how these events alter the character’s personality or outlook.'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：开发一个具有基本个性的角色。使用人工智能建议可能极大地改变这个角色生活的事件。写一个前后场景，展示这些事件如何改变角色的个性或观点。
- en: Interpersonal Dynamics Workshop
  id: totrans-892
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人际动力学研讨会
- en: 'Goal: To explore using AI in developing complex interpersonal dynamics between
    characters.'
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：探索使用人工智能在角色之间发展复杂的人际动态。
- en: 'Exercise: Design two characters with contrasting personalities using AI. Write
    a scene where they must cooperate to achieve a common goal. Focus on how their
    differing traits create conflict and resolution.'
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 练习：使用人工智能设计两个性格相反的角色。写一个场景，其中他们必须合作实现一个共同的目标。关注他们不同的特质如何创造冲突和解决。
- en: Crafting Backstories
  id: totrans-895
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编写背景故事
- en: '1\. The Hidden Heir: Generate a backstory for a character who discovers they
    are the heir to a mysterious fortune.'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 隐藏的继承人：为一位发现自己是一位神秘财富继承人的角色创造一个背景故事。
- en: '2\. From Rags to Riches: Create a history for a character who overcomes poverty
    to achieve great success.'
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 从贫民到富翁：为一位克服贫困取得巨大成功的人物创造一个历史背景。
- en: '3\. The Secret Agent: Design a backstory for a character living a double life
    as a secret agent.'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 秘密特工：为一位过着双重生活作为秘密特工的角色设计一个背景故事。
- en: '4\. Lost and Found: Develop a history for a character who was lost at sea and
    presumed dead, but returns years later.'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 失而复得：为一位在海难中失踪并被认为已死，但多年后返回的角色创造一个历史背景。
- en: '5\. A Scholar''s Secret: Create a backstory for an academic who harbors a forbidden
    ancient knowledge.'
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 学者的秘密：为一位隐藏着禁忌古老知识学者的角色创造一个背景故事。
- en: '6\. The Exiled Royalty: Generate a history for a royal character who has been
    exiled from their kingdom.'
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 被流放的贵族：为一位被流放的王国贵族创造一个历史背景。
- en: '7\. The Inventor''s Apprentice: Develop a backstory for a character who is
    an apprentice to a famous but eccentric inventor.'
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 发明家的学徒：为一位著名但古怪发明家的学徒创造一个背景故事。
- en: '8\. The Star-Crossed Lover: Create a romantic yet tragic backstory for a character
    involved in a forbidden love affair.'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 星际恋人的悲剧：为一位陷入禁忌爱情的角色创造浪漫而悲惨的背景故事。
- en: '9\. The War Hero''s Guilt: Generate a history for a celebrated war hero who
    is secretly dealing with guilt and trauma.'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 战争英雄的内疚：为一位获奖的战争英雄生成一个历史背景，他秘密地处理着内疚和创伤。
- en: '10\. The Forgotten Childhood: Develop a backstory for a character who uncovers
    suppressed memories from their childhood.'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 被遗忘的童年：为一位发现童年被压抑记忆的角色发展背景故事。
- en: Developing Personalities
  id: totrans-906
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发展个性
- en: '1\. The Charismatic Leader: Craft a personality for a character who is naturally
    charismatic but secretly insecure.'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 魅力型领导者：为一位天生具有魅力但内心却感到不安全的角色塑造个性。
- en: '2\. The Rebellious Genius: Develop traits for a highly intelligent character
    who defies societal norms.'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 反叛的天才：为一位极具智慧但违反社会规范的角色发展特质。
- en: '3\. The Compassionate Fighter: Create a personality for a character who is
    tough on the outside but deeply empathetic.'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 同情心战士：为一位外表强硬但内心充满同理心的角色创造个性。
- en: '4\. The Witty Outcast: Design traits for a character who uses humor as a defense
    mechanism.'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 滑稽的局外人：为一位使用幽默作为防御机制的角色设计特质。
- en: '5\. The Dreamy Realist: Craft a personality that balances idealistic dreams
    with a pragmatic approach to life.'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 梦幻的现实主义者：为一位在理想主义梦想与对生活的实用方法之间取得平衡的角色塑造个性。
- en: '6\. The Sensitive Artist: Develop traits for a character who is deeply in tune
    with their emotions and expresses it through art.'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 敏感的艺术家：为一位深深与自己的情感相协调并通过艺术表达的角色发展特质。
- en: '7\. The Cautious Adventurer: Create a personality for someone who loves adventure
    but is always prepared for risks.'
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 谨慎的探险家：为一位热爱冒险但总是为风险做好准备的人创造个性。
- en: '8\. The Loyal Betrayer: Design a complex personality for a character torn between
    loyalty to their friends and a secret betrayal.'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 忠诚的背叛者：为一位在忠诚于朋友和秘密背叛之间挣扎的角色设计复杂的个性。
- en: '9\. The Mysterious Stranger: Craft traits for a character who is intriguing
    and enigmatic, with a hidden past.'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 神秘的陌生人：为一位迷人且神秘、有着隐藏过去的人物塑造特质。
- en: '10\. The Optimistic Survivor: Develop a personality for a character who remains
    hopeful despite having a difficult life.'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 乐观的幸存者：为一位尽管生活艰难却始终保持希望的角色塑造个性。
- en: Dialogue and Interaction
  id: totrans-917
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对话与互动
- en: '1\. The Unexpected Meeting: Write a dialogue where two characters from vastly
    different backgrounds meet unexpectedly.'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 意外的相遇：写一个两个来自截然不同背景的角色意外相遇的对话。
- en: '2\. The Confrontation: Create an interaction between a character confronting
    their long-time rival.'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 对峙：创造一个角色与其长期对手之间的互动。
- en: '3\. The Heartfelt Confession: Develop a dialogue where one character confesses
    a deep secret to another.'
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 深情的告白：发展一个角色向另一个角色坦白深藏秘密的对话。
- en: '4\. The Witty Banter: Write an exchange full of wit and humor between two characters
    with a playful rivalry.'
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 机智的闲聊：写两个具有嬉戏竞争关系的角色充满机智和幽默的交流。
- en: '5\. The Mentor and Protégé: Craft a dialogue that showcases the dynamic between
    a wise mentor and an eager protégé.'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 导师与门徒：创作一个展示睿智导师和渴望学习的门徒之间动态的对话。
- en: '6\. The Family Dispute: Create an intense family argument that reveals underlying
    issues.'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 家庭纠纷：创造一个揭示潜在问题的激烈家庭争吵。
- en: '7\. The First Encounter: Develop a dialogue for two characters who are meeting
    for a blind date.'
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 第一次相遇：为两位进行相亲的角色发展对话。
- en: '8\. The Villain''s Monologue: Write a monologue from a villain revealing their
    motivations.'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 恶棍的独白：写一个恶棍揭示其动机的独白。
- en: '9\. The Cultural Exchange: Craft a dialogue between characters from different
    cultural backgrounds, highlighting their differences and similarities.'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 文化交流：创作一个不同文化背景角色之间的对话，突出他们的差异和相似之处。
- en: '10\. The Unexpected Alliance: Develop an interaction where two unlikely characters
    decide to work together for a common goal.'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 意外的联盟：发展两个不太可能的角色决定为了共同目标而合作的互动。
- en: Chapter 21
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 第21章
- en: More Prompts and Exercises
  id: totrans-929
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 更多提示和练习
- en: These exercises and prompts are designed to get you comfortable with guiding
    AI in various aspects of character development, providing a starting point for
    you to explore and expand on.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 这些练习和提示旨在让您熟悉引导AI在角色发展的各个方面，为您提供探索和扩展的起点。
- en: Backstory
  id: totrans-931
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: Exercises
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. The Lost Heirloom: Write about a character who discovers an old family
    heirloom, revealing a hidden family secret.'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 1．失落的传家宝：写一个角色发现一个古老的家族传家宝，揭示了一个隐藏的家庭秘密。
- en: '2\. Childhood Incident: Create a scene where a character recalls a significant
    event from their childhood that shaped their fears or dreams.'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 童年事件：创造一个场景，其中角色回忆起塑造他们恐惧或梦想的童年重要事件。
- en: '3\. First Heartbreak: Describe a character''s first experience with heartbreak
    and how it influenced their approach to relationships.'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 第一次心碎：描述一个角色第一次经历心碎以及它如何影响他们对关系的看法。
- en: '4\. A Defining Moment: Craft a flashback of a moment that changed your character’s
    life path or perspective.'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 4．一个决定性时刻：构建一个改变你角色人生道路或观点的时刻的闪回。
- en: '5\. Ancestral Legacy: Explore a character''s feelings and actions upon learning
    about a notable ancestor and their legacy.'
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 5．祖先遗产：探索角色在了解到一个著名祖先及其遗产时的感受和行动。
- en: Prompts
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. Generate a backstory for a character who grew up in a dystopian society
    and is now leading a rebellion.
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 1．为一个在反乌托邦社会中长大并现在领导叛乱的角色生成一个背景故事。
- en: 2\. Create a history for a character who discovered they have magical powers
    on their 21st birthday.
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 2．为一个在21岁生日那天发现自己拥有魔法力量的角色创造一个历史。
- en: 3\. Develop a backstory for a character who was once a celebrated artist but
    fell into obscurity.
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 3．为一个曾经是著名艺术家但后来陷入默默无闻的角色构建一个背景故事。
- en: 4\. Construct a past for a character who grew up in a nomadic space colony.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 4．为在一个游牧太空殖民地长大的角色构建过去。
- en: 5\. Describe the childhood of a character who is the sole survivor of a mysterious
    village disappearance.
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 5．描述一个角色，他是神秘村庄消失事件的唯一幸存者，他的童年。
- en: Motivation and Goals
  id: totrans-944
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机和目标
- en: Exercises
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Unfulfilled Dream: Write about a character who is driven by an unfulfilled
    dream from their youth.'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 1．未实现的梦想：写一个角色被他们青年时代的未实现梦想所驱动的情节。
- en: '2\. Revenge Plot: Create a scenario where a character is motivated by the desire
    for revenge.'
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 复仇情节：创造一个角色因复仇欲望而行动的场景。
- en: '3\. A Quest for Redemption: Develop a character seeking redemption for a past
    mistake.'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 3．救赎之旅：发展一个寻求为过去的错误赎罪的角色。
- en: '4\. Ambition Overdrive: Write about a character whose life is driven by a specific
    ambition, and how it affects their relationships.'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 野心驱动：写一个角色的人生被特定的野心所驱动，以及它如何影响他们的关系。
- en: '5\. Escape the Past: Create a character who is motivated by the desire to escape
    or overcome their past.'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 5．逃离过去：创造一个因渴望逃离或克服过去而行动的角色。
- en: Prompts
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. What would drive a character who has been wrongly accused of a crime to
    clear their name?
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 1．一个被错误指控犯罪的角色会是什么驱使他们澄清自己的名誉？
- en: 2\. Generate a goal for a character who wants to revive an ancient, forgotten
    tradition.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 2．为一个想要复兴古老、被遗忘传统的角色生成一个目标。
- en: 3\. What motivates a retired detective to come back for one last case?
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 什么动机让一位退休侦探为了最后一案而回归？
- en: 4\. Describe the ambition of a young inventor who wants to create eco-friendly
    technology.
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 4．描述一个年轻发明家的抱负，他想要创造环保技术。
- en: 5\. Craft a motivation for a character who is searching for a mythical land
    mentioned in old family tales.
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 5\. 为一位寻找古老家族传说中提到的神秘土地的角色创造动机。
- en: Personality Traits
  id: totrans-957
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性格特质
- en: Exercises
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Contrasting Traits: Develop a character with contrasting traits (e.g.,
    kind but easily angered) and show how these traits affect their actions.'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 1．对比特质：发展一个具有对比性特质（例如，善良但易怒）的角色，并展示这些特质如何影响他们的行为。
- en: '2\. Quirk and Consequence: Write a scene showing how a character''s unique
    quirk lands them in an unexpected situation.'
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 2．怪癖与后果：写一个场景，展示角色的独特怪癖如何使他们陷入意想不到的情况。
- en: '3\. Strengths and Weaknesses: Create a scenario where a character''s greatest
    strength becomes their weakness.'
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 优点与缺点：创造一个场景，其中角色的最大优点变成了他们的弱点。
- en: '4\. Habitual Actions: Describe a day in your character’s life focusing on their
    habits and how they impact their day.'
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 习惯性行为：描述你角色的生活中的一天，重点关注他们的习惯以及它们如何影响他们的一天。
- en: '5\. Fear Factor: Write about how a character''s deepest fear influences their
    decision in a critical moment.'
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 5．恐惧因素：写一个角色在关键时刻如何被他们最深的恐惧所影响。
- en: Prompts
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. Provide personality traits for a charismatic leader who secretly battles
    with impostor syndrome.
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 为一位秘密与冒名顶替综合症作斗争的魅力型领导者提供性格特质。
- en: 2\. List traits for a brilliant scientist who is socially awkward.
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 为一位社交笨拙的杰出科学家列出特质。
- en: 3\. Suggest traits for a detective who is excellent at their job but struggles
    with personal relationships.
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 建议一个侦探的特质，他工作出色但个人关系处理有困难。
- en: 4\. Generate personality traits for a rebel fighter who is fiercely loyal but
    extremely headstrong.
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为一个忠诚但极其固执的反抗战士生成个性特质。
- en: 5\. Create a set of traits for a mystical oracle who is wise but cryptic.
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为一个既聪明又神秘的预言家创造一系列特质。
- en: Growth and Change
  id: totrans-970
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成长与变化
- en: Exercises
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Transformation Journey: Chart a character’s journey from selfishness to
    selflessness.'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 变化之旅：描绘一个角色从自私到无私的旅程。
- en: '2\. Change of Belief: Write a scene where a pivotal event causes a character
    to question or change a long-held belief.'
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 信念的改变：写一个关键事件导致角色质疑或改变长期持有的信念的场景。
- en: '3\. Overcoming Fear: Create a scenario where a character confronts and overcomes
    a fear.'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 克服恐惧：创造一个角色面对并克服恐惧的场景。
- en: '4\. Adapting to Change: Show how a major life change (e.g., a new job, a move)
    affects a character’s outlook or behavior.'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 适应变化：展示重大生活变化（例如，新工作、搬家）如何影响角色的观点或行为。
- en: '5\. Learning from Mistakes: Write about a character who learns a valuable lesson
    from a significant mistake.'
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从错误中学习：写一个角色从重大错误中吸取宝贵教训的故事。
- en: Prompts
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. How would a selfish billionaire change after a life-altering event?
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一个自私的亿万富翁在改变人生的事件后会如何改变？
- en: 2\. Show the development of a young warrior who learns the importance of peace
    over war.
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 展示一个年轻战士的发展，他学会了和平比战争更重要。
- en: 3\. Describe the evolution of a character who starts off as cynical but grows
    to find joy in small things.
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 描述一个角色从愤世嫉俗到在小事情中找到快乐的发展过程。
- en: 4\. Generate a story arc for a ruler who learns humility and compassion.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为一个统治者生成一个故事弧，他学会了谦卑和同情。
- en: 5\. Craft a character growth journey for a scientist who starts as a skeptic
    but becomes a believer in the supernatural.
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为一个从怀疑论者转变为超自然信仰者的科学家创造一个角色成长之旅。
- en: Consistency
  id: totrans-983
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一贯性
- en: Exercises
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Core Values Test: Put your character in a situation where their core values
    are tested.'
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 核心价值观测试：让你的角色处于一个考验其核心价值观的情况。
- en: '2\. Predictable Reaction: Write a scene where other characters accurately predict
    how your main character will react in a situation.'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 可预测的反应：写一个场景，其他角色准确地预测了你的主要角色在某种情况下的反应。
- en: '3\. In Character: Create a scenario that is out of the ordinary for your character,
    but ensure they react in a way that is true to their nature.'
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 角色扮演：创造一个对你角色来说不同寻常的场景，但确保他们以符合其本性的方式反应。
- en: '4\. Consistent Habits: Describe how a character''s consistent habit plays a
    crucial role in a key plot point.'
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一贯的习惯：描述一个角色的持续习惯如何在关键情节点中发挥关键作用。
- en: '5\. Moral Compass: Show a scene where your character''s moral compass guides
    them through a difficult decision.'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 道德指南：展示一个场景，其中角色的道德指南引导他们在困难的决定中前行。
- en: Prompts
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. Create scenarios that test a character's unwavering honesty.
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建场景以考验角色的坚定不移的诚实。
- en: 2\. Describe how a consistently optimistic character deals with a series of
    unfortunate events.
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 描述一个始终乐观的角色如何处理一系列不幸的事件。
- en: 3\. Generate situations where a character's commitment to non-violence is challenged.
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 生成挑战角色非暴力承诺的情况。
- en: 4\. Show a character's consistent approach to solving problems, whether in personal
    or professional scenarios.
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 展示一个角色在个人或职业场景中解决问题的持续方法。
- en: 5\. Create a storyline that highlights a character's steadfast loyalty to their
    friends.
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 创造一个强调角色对朋友坚定不移忠诚的故事情节。
- en: Conflict and Challenge
  id: totrans-996
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 冲突与挑战
- en: Exercises
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Moral Dilemma: Present a character with a challenging moral dilemma.'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 道德困境：向角色呈现一个具有挑战性的道德困境。
- en: '2\. Facing the Antagonist: Write a confrontation scene between your character
    and their antagonist.'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 面对对手：写一个角色与其对手之间的对抗场景。
- en: '3\. Difficult Choice: Create a scenario where a character must make a difficult
    choice between two equally important things.'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 困难的选择：创造一个场景，角色必须在两个同样重要的事物之间做出困难的选择。
- en: '4\. Under Pressure: Describe how your character reacts under extreme pressure.'
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 压力之下：描述角色在极端压力下的反应。
- en: '5\. Overcoming Obstacles: Write a scene where your character overcomes a significant
    obstacle that’s been hindering their goals.'
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 克服障碍：写一个场景，你的角色克服了一个阻碍其目标的重大障碍。
- en: Prompts
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. What kind of conflict would arise for a character hiding their true identity?
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 隐藏真实身份的角色可能会引发什么样的冲突？
- en: 2\. Develop a challenge for a character who must choose between their career
    and their family.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为一个必须在事业和家庭之间做出选择的角色设计挑战。
- en: 3\. Generate a conflict scenario for a character torn between two loves.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为一个在两个爱人之间挣扎的角色生成冲突场景。
- en: 4\. Create a challenging situation for a hero who has lost their powers.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为一个失去力量的英雄创造一个具有挑战性的情况。
- en: 5\. Describe a significant obstacle for a character who is trying to break a
    family curse.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 描述一个试图打破家族诅咒的角色所面临的重大障碍。
- en: Relationships and Interactions
  id: totrans-1009
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关系和互动
- en: Exercises
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Unexpected Friendship: Write about how two unlikely characters become friends.'
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 意外的友谊：写两个不太可能成为朋友的角色如何成为朋友。
- en: '2\. Family Dynamics: Explore the complex dynamics in a family gathering.'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 家庭动态：探索家庭聚会中的复杂动态。
- en: '3\. Romantic Tension: Create a scene that highlights the romantic tension between
    two characters.'
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 浪漫张力：创造一个突出两个角色之间浪漫张力的场景。
- en: '4\. Betrayal: Write about a character discovering a betrayal by someone close
    to them.'
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 背叛：写一个角色发现他们亲近的人背叛了他们。
- en: '5\. Mentorship Bond: Show the evolving relationship between a mentor and their
    protégé.'
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 导师与门徒的关系：展示导师与他们的门徒之间不断发展的关系。
- en: Prompts
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 指令
- en: 1\. How would an introverted character interact with an extroverted one?
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 内向的角色如何与外向的角色互动？
- en: 2\. Generate a dialogue between a young apprentice and their elderly mentor.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 生成一个年轻学徒和他们的年长导师之间的对话。
- en: 3\. Create a scenario where two rivals are forced to work together.
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 创建一个场景，其中两个对手被迫合作。
- en: 4\. Show how a character with trust issues develops a relationship with a new
    ally.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 展示一个有信任问题的角色如何与新的盟友建立关系。
- en: 5\. Describe the interaction between a character from the future and one from
    the past.
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 描述来自未来和过去的人物之间的互动。
- en: Voice and Dialogue
  id: totrans-1022
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语音和对话
- en: Exercises
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: '1\. Distinct Voice: Write a monologue that showcases your character’s unique
    voice.'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 独特的声音：写一个展现你角色独特声音的独白。
- en: '2\. Dialogue with Conflict: Create a dialogue between characters with opposing
    views.'
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 具有对立观点的角色之间的对话：创建一个对话。
- en: '3\. Secret Revealed: Write a conversation where a character inadvertently reveals
    a secret.'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 秘密揭露：写一个角色无意中透露秘密的对话。
- en: '4\. Cultural Influences: Show how your character’s cultural background influences
    their way of speaking.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 文化影响：展示你的角色的文化背景如何影响他们的说话方式。
- en: '5\. Inner Monologue: Write an inner monologue that reveals your character’s
    true feelings about an event.'
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 内心独白：写一个内心独白，揭示你的角色对一个事件的真正感受。
- en: Prompts
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 指令
- en: 1\. Write a line of dialogue for a character who speaks in riddles.
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为一个说谜语的角色写一句台词。
- en: 2\. Generate a monologue for a villain explaining their plan.
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为一个反派生成一个解释他们计划的独白。
- en: 3\. Create dialogue for a first encounter between characters from different
    planets.
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为来自不同星球的角色的第一次相遇创建对话。
- en: 4\. Develop a heartfelt confession between two characters who have been long-time
    friends.
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 发展两个长期朋友之间充满感情的坦白。
- en: 5\. Script an argument between a character advocating for technology and one
    advocating for nature.
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 编写一个倡导科技与倡导自然的人物之间的争论剧本。
- en: Physical Description
  id: totrans-1035
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 身体描述
- en: '1\. First Impression: Describe a character’s first impression on another character.'
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 第一印象：描述一个角色对另一个角色的第一印象。
- en: '2\. Mirror Reflection: Write a scene where a character observes themselves
    in a mirror, focusing on their physical attributes.'
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 镜子反射：写一个场景，其中角色在镜子中观察自己，重点关注他们的身体特征。
- en: '3\. Character Through Others'' Eyes: Show how different characters perceive
    your main character’s physical appearance.'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 通过他人的眼睛看角色：展示不同角色如何看待你的主要角色的外貌。
- en: '4\. Transformation: Describe a character’s physical transformation over time.'
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 变化：描述一个角色随时间变化的身体特征。
- en: '5\. Symbolic Trait: Create a physical trait for a character that symbolizes
    a key aspect of their personality.'
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 象征性特征：为角色创造一个象征他们个性关键方面的身体特征。
- en: Prompts
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 指令
- en: 1\. Describe a character who has features typical of an intergalactic traveler.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 描述一个具有星际旅行者典型特征的角色。
- en: 2\. Generate a description for a character who is a shapeshifter, focusing on
    their default form.
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为一个变形者生成描述，重点关注他们的默认形态。
- en: 3\. Create a vivid physical description of a stealthy, nocturnal vigilante.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 创造一个对隐秘、夜间巡逻的义警的生动身体描述。
- en: 4\. Describe the appearance of a character who is part-human, part-machine.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 描述一个半人半机器角色的外观。
- en: 5\. Craft a description for a royal character from a fantasy realm.
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为一个来自幻想王国的皇室角色编写描述。
- en: Internal Conflict
  id: totrans-1047
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内部冲突
- en: '1\. Torn Between Choices: Write about a character who is torn between two conflicting
    desires or duties.'
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在选择之间挣扎：写一个在两种冲突的欲望或责任之间挣扎的角色。
- en: '2\. Moral Conflict: Create a scenario where a character struggles with a moral
    conflict.'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 道德冲突：创造一个场景，让角色在道德冲突中挣扎。
- en: '3\. Secret Burden: Write a scene where a character grapples with a secret that
    causes internal conflict.'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 秘密负担：写一个场景，一个角色在与导致内部冲突的秘密作斗争。
- en: '4\. Heart vs. Head: Show a character struggling to choose between a logical
    decision and an emotional one.'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 心灵与理智：展示一个角色在逻辑决策和情感决策之间挣扎。
- en: '5\. Identity Crisis: Write about a character facing an identity crisis, questioning
    their sense of self.'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 身份危机：写一个面临身份危机、质疑自我感的角色。
- en: Prompts
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: 1\. What internal conflict would a superhero face when deciding whether to save
    a friend or a city?
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 超级英雄在决定是救朋友还是城市时，将面临什么样的内部冲突？
- en: 2\. Describe the inner turmoil of a character who must betray their country
    for the greater good.
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 描述一个为了更大的利益而背叛自己国家的角色的内心动荡。
- en: 3\. Generate an internal conflict for a character who discovers their whole
    life is a lie.
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为一个发现整个生活都是谎言的角色生成内部冲突。
- en: 4\. Create an internal struggle for a character who has to choose between love
    and duty.
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为一个必须在爱情和责任之间做出选择的角色创造内部斗争。
- en: 5\. Develop an internal conflict for a healer who can save lives but at a great
    personal cost.
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为一个能够拯救生命但代价巨大的治疗师发展内部冲突。
- en: Chapter 22
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十二章
- en: Character Author Questions and Template
  id: totrans-1060
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色作者问题和模板
- en: These prompts can be used to delve deeply into each aspect of your characters,
    guiding you in your thought process. Adapt these prompts based on the specific
    needs of your characters and plot.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示可以帮助你深入挖掘每个角色的各个方面，引导你的思考过程。根据你角色的具体需求和情节，调整这些提示。
- en: Generalized Character Development Prompts
  id: totrans-1062
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通用角色发展提示
- en: Backstory
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 背景
- en: Create a backstory for [Character Name]. Focus on their history, upbringing,
    past experiences, and significant events that have shaped their personality. How
    do these elements influence their current actions and decisions?
  id: totrans-1064
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[角色名称]创建背景故事。关注他们的历史、成长背景、过去经历以及塑造他们个性的重大事件。这些元素如何影响他们当前的行为和决策？
- en: Motivation and Goals
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 动机和目标
- en: Define the primary motivations and goals for [Character Name]. What drives them
    in the story? This could range from grand ambitions like saving the world to personal
    quests like seeking redemption.
  id: totrans-1066
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义[角色名称]的主要动机和目标。他们在故事中是什么驱使他们？这可以从拯救世界的宏伟抱负到寻求救赎的个人追求等不同层面。
- en: Personality Traits
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 性格特征
- en: List the key personality traits of [Character Name]. Include a mix of strengths,
    weaknesses, quirks, and habits. How do these traits make them relatable and memorable?
  id: totrans-1068
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出[角色名称]的关键性格特征。包括优点、缺点、怪癖和习惯。这些特征如何使他们变得亲切和难忘？
- en: Growth and Change
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 成长和变化
- en: Outline how [Character Name] will grow or change throughout the novel. What
    changes in beliefs, attitudes, or behavior will they exhibit, and how will these
    changes reflect their response to the story’s events?
  id: totrans-1070
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概述[角色名称]在整个小说中的成长或变化。他们将表现出哪些信念、态度或行为的变化，以及这些变化将如何反映他们对故事事件的反应？
- en: Consistency
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性
- en: Ensure that while [Character Name] evolves, their core traits remain consistent.
    Identify these core traits and describe how they will persist even as the character
    undergoes development.
  id: totrans-1072
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保在[角色名称]发展过程中，其核心特质保持一致。识别这些核心特质，并描述它们如何在角色发展过程中持续存在。
- en: Conflict and Challenge
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突和挑战
- en: Describe the conflicts or challenges that [Character Name] will face. How will
    these conflicts reveal their true nature and contribute to their development?
  id: totrans-1074
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述[角色名称]将面临的冲突或挑战。这些冲突将如何揭示他们的真实本质，并促进他们的成长？
- en: Relationships and Interactions
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 关系和互动
- en: Detail the key relationships and interactions of [Character Name] with other
    characters. How do these relationships and interactions reveal different facets
    of their personality?
  id: totrans-1076
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细描述[角色名称]与其他角色的关键关系和互动。这些关系和互动如何揭示他们性格的不同方面？
- en: Voice and Dialogue
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 语气和对话
- en: Craft a distinctive voice and style of dialogue for [Character Name]. How does
    their way of speaking reflect their background, personality, and current state
    of mind?
  id: totrans-1078
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[角色名称]打造独特的声音和对话风格。他们的说话方式如何反映其背景、个性和当前的心态？
- en: Physical Description
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: 身体描述
- en: Provide a physical description of [Character Name]. How does their appearance
    contribute to the story and help readers form a mental image of them?
  id: totrans-1080
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供对[角色名称]的身体描述。他们的外观如何有助于故事发展并帮助读者形成他们的心理图像？
- en: Internal Conflict
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 内在冲突
- en: Identify an internal conflict for [Character Name]. This could be doubts, fears,
    moral dilemmas, or struggles between contrasting desires or beliefs. How does
    this conflict influence their behavior?
  id: totrans-1082
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[角色名称]确定一个内在冲突。这可能包括怀疑、恐惧、道德困境或对比欲望或信念之间的斗争。这种冲突如何影响他们的行为？
- en: Reactions to Situations
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 对情况的反应
- en: Describe how [Character Name] reacts to different situations, particularly under
    pressure. What do these reactions reveal about their character beyond their stated
    intentions or beliefs?
  id: totrans-1084
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述[角色名称]对不同情况的反应，特别是在压力之下。这些反应揭示了他们性格的哪些方面，超出了他们声明的意图或信念？
- en: Layered Complexity
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 层次复杂性
- en: Incorporate elements of gray areas and moral ambiguities in [Character Name].
    Avoid making them simply good or bad. How does this complexity make them more
    realistic and intriguing?
  id: totrans-1086
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在[角色名称]中融入灰色区域和道德模糊性的元素。避免简单地将其描述为好或坏。这种复杂性如何使角色更加真实和引人入胜？
- en: Chapter 23
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十三章
- en: Character Detail Prompts For AI
  id: totrans-1088
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为AI设计的角色细节提示
- en: 'Here are the revised question prompts designed to guide an AI in generating
    specific ideas for each aspect of the character’s development:'
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是重新设计的提问提示，旨在指导AI为角色的每个发展方面生成具体想法：
- en: Backstory
  id: totrans-1090
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: 'Prompt: Generate a detailed backstory for [Character Name], including key childhood
    events, family dynamics, and pivotal moments that shaped their personality.'
  id: totrans-1091
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]生成一个详细的后台故事，包括关键童年事件、家庭动态和塑造其个性的关键时刻。
- en: Motivation and Goals
  id: totrans-1092
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机与目标
- en: 'Prompt: Create clear motivations and goals for [Character Name] that drive
    their actions, ranging from overarching ambitions to personal quests for redemption.'
  id: totrans-1093
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]创造清晰的动力和目标，这些动力推动其行动，从总体抱负到个人救赎的个人追求。
- en: Personality Traits
  id: totrans-1094
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性格特质
- en: 'Prompt: Provide a list of diverse and nuanced personality traits for [Character
    Name], including strengths, weaknesses, quirks, and habits.'
  id: totrans-1095
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]提供一个多样化和细腻的性格特质列表，包括优点、缺点、怪癖和习惯。
- en: Growth and Change
  id: totrans-1096
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成长与变化
- en: 'Prompt: Outline the development arc for [Character Name], showing how they
    change in beliefs, attitudes, or behavior throughout the novel.'
  id: totrans-1097
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：概述[角色名称]的发展弧线，展示他们在整个小说中信念、态度或行为的变化。
- en: Consistency
  id: totrans-1098
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一致性
- en: 'Prompt: Identify and describe consistent core traits for [Character Name] that
    remain unchanged despite their growth and development in the story.'
  id: totrans-1099
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：识别并描述[角色名称]在故事中成长和发展过程中始终保持不变的一致核心特质。
- en: Conflict and Challenge
  id: totrans-1100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 冲突与挑战
- en: 'Prompt: Detail the major conflicts or challenges that [Character Name] encounters,
    highlighting how these shape and develop their character.'
  id: totrans-1101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：详细说明[角色名称]遇到的主要冲突或挑战，突出这些如何塑造和培养他们的性格。
- en: Relationships and Interactions
  id: totrans-1102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关系与互动
- en: 'Prompt: List significant relationships and interactions for [Character Name],
    showing how they reveal different aspects of their personality.'
  id: totrans-1103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：列出[角色名称]的重要关系和互动，展示它们如何揭示他们性格的不同方面。
- en: Voice and Dialogue
  id: totrans-1104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 话语与对话
- en: 'Prompt: Craft distinct voice and dialogue styles for [Character Name] that
    reflect their background and personality.'
  id: totrans-1105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]打造独特的声音和对话风格，以反映其背景和个性。
- en: Physical Description
  id: totrans-1106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 身体描述
- en: 'Prompt: Provide a comprehensive physical description for [Character Name],
    including how their appearance influences their interactions and self-perception.'
  id: totrans-1107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]提供一个全面的身体描述，包括他们的外观如何影响他们的互动和自我认知。
- en: Internal Conflict
  id: totrans-1108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内在冲突
- en: 'Prompt: Create an internal conflict for [Character Name], focusing on doubts,
    fears, moral dilemmas, or contrasting desires and beliefs.'
  id: totrans-1109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]创造一个内在冲突，重点关注怀疑、恐惧、道德困境或对比欲望和信念。
- en: Reactions to Situations
  id: totrans-1110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对情况的反应
- en: 'Prompt: Describe [Character Name]''s typical reactions to various situations,
    particularly under pressure, to reveal insights into their character.'
  id: totrans-1111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：描述[角色名称]对各种情况的典型反应，特别是在压力之下，以揭示其性格的洞察。
- en: Layered Complexity
  id: totrans-1112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层次复杂性
- en: 'Prompt: Develop aspects of [Character Name]''s personality that demonstrate
    moral ambiguities and gray areas, avoiding a simple good or bad characterization.'
  id: totrans-1113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：发展[角色名称]的性格方面，以展示道德模糊性和灰色区域，避免简单的善恶刻画。
- en: This JSON template wraps up all of the above and can be given to ChatGPT or
    Claude for it to quickly give you some starting points for your character and
    their development throughout the story.
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 这个JSON模板总结了上述所有内容，可以提供给ChatGPT或Claude，以便它快速为你提供一些关于角色及其在故事中发展的起点。
- en: If you have story specifics, include that in the chat when you upload this template.
    If you don’t have a story and just want ideas for a character, copying this template
    directly into Chat is all you need to do. I do recommend minimum guidance of at
    least telling the AI what genre you will be writing.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一些故事的具体细节，请在上传此模板时包含在聊天中。如果你没有故事，只想为角色获取一些想法，只需直接将此模板复制到聊天中即可。我确实建议至少提供一些指导，比如告诉AI你将写作的流派。
- en: You can adjust the “main character” wording to reflect any other character instead
    - villain, secondary character, love interest, etc.
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将“主要角色”的措辞调整为反映任何其他角色——反派、次要角色、恋人等。
- en: Template
  id: totrans-1117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模板
- en: '{'
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"GeneralCharacterDevelopmentPromptTemplate": {'
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: '"GeneralCharacterDevelopmentPromptTemplate": {'
- en: '"Backstory": "Create a backstory for a main character. Focus on their history,
    upbringing, past experiences, and significant events that have shaped their personality.",'
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: '"Backstory": "为主要的角色创建一个背景故事。关注他们的历史、成长背景、过去经历以及塑造他们个性的重大事件。",'
- en: '"MotivationAndGoals": "Define the primary motivations and goals for this character.",'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: '"MotivationAndGoals": "定义这个角色的主要动机和目标。",'
- en: '"PersonalityTraits": "List the key personality traits of this character. Include
    a mix of strengths, weaknesses, quirks, and habits. How do these traits make them
    relatable and memorable?",'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: '"PersonalityTraits": "列出这个角色的关键性格特征。包括优点、缺点、怪癖和习惯。这些特征如何使他们变得亲切和难忘？",'
- en: '"GrowthAndChange": "Outline how this character will grow or change throughout
    the novel. What changes in beliefs, attitudes, or behavior will they exhibit,
    and how will these changes reflect their response to the story’s events?",'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: '"GrowthAndChange": "概述这个角色在整个小说中的成长或变化。他们将表现出哪些信念、态度或行为的变化，以及这些变化将如何反映他们对故事事件的反应？",'
- en: '"Consistency": "Ensure that while the character evolves, their core traits
    remain consistent. Identify these core traits and describe how they will persist
    even as the character undergoes development.",'
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: '"Consistency": "确保在角色发展的过程中，他们的核心特征保持一致。确定这些核心特征，并描述它们如何在角色经历发展时持续存在。",'
- en: '"ConflictAndChallenge": "Describe the conflicts or challenges that this character
    will face. How will these conflicts reveal their true nature and contribute to
    their development?",'
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: '"ConflictAndChallenge": "描述这个角色将面临的冲突或挑战。这些冲突将如何揭示他们的真实本质并促进他们的成长？",'
- en: '"RelationshipsAndInteractions": "Detail the key relationships and interactions
    of this character with other characters.",'
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: '"RelationshipsAndInteractions": "详细描述这个角色与其他角色的关键关系和互动。",'
- en: '"VoiceAndDialogue": "Craft a distinctive voice and style of dialogue for this
    character.",'
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: '"VoiceAndDialogue": "为这个角色创造独特的声音和对话风格。",'
- en: '"PhysicalDescription": "Provide a physical description of this character.",'
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: '"PhysicalDescription": "提供这个角色的身体描述。",'
- en: '"InternalConflict": "Identify an internal conflict for this character. This
    could be doubts, fears, moral dilemmas, or struggles between contrasting desires
    or beliefs.",'
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: '"InternalConflict": "为这个角色确定一个内部冲突。这可能包括怀疑、恐惧、道德困境，或者对比欲望或信仰之间的斗争。",'
- en: '"ReactionsToSituations": "Describe how this character reacts to different situations,
    particularly under pressure.",'
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: '"ReactionsToSituations": "描述这个角色对不同情况的反应，尤其是在压力之下。",'
- en: '"LayeredComplexity": "Incorporate elements of gray areas and moral ambiguities
    for this character. Avoid making them simply good or bad."'
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: '"LayeredComplexity": "为这个角色融入灰色区域和道德模糊性的元素。避免简单地将其描绘为好或坏。",'
- en: '}'
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: '}'
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: Chapter 24
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 第24章
- en: Mega-Prompt
  id: totrans-1135
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超级提示
- en: This mega-prompt is an alternative to the JSON format. You can adapt the depth
    and focus of each section to suit the specific needs of your story and characters,
    adding in any specifics you want the AI to consider and wrap into the output.
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 这个超级提示是JSON格式的替代品。你可以根据故事和角色的具体需求调整每个部分的深度和焦点，添加任何你希望AI考虑并包含在输出中的具体细节。
- en: Comprehensive Character Development Mega-Prompt
  id: totrans-1137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 完整的角色发展超级提示
- en: Create a detailed profile for [Character Name]. Begin with their Backstory,
    outlining their history, upbringing, and key events that shaped them. What past
    experiences have defined their current motivations and goals? Moving on to Motivation
    and Goals, define what drives them in the story, from large-scale ambitions to
    personal quests.
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 为[角色名称]创建一个详细的个人档案。从他们的背景故事开始，概述他们的历史、成长经历和塑造他们的关键事件。哪些过去经历定义了他们当前的动力和目标？接着到动机和目标，定义他们在故事中驱动的因素，从大规模抱负到个人追求。
- en: Next, list their Personality Traits, including strengths, weaknesses, quirks,
    and habits, and consider how these traits make them both relatable and memorable.
    Describe how the character will experience Growth and Change throughout the novel,
    showing evolution in beliefs, attitudes, or behavior while maintaining Consistency
    in their core traits.
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，列出他们的性格特征，包括优点、缺点、怪癖和习惯，并考虑这些特征如何使他们既具有亲和力又令人难忘。描述角色在整个小说中的成长和变化，展示信念、态度或行为的演变，同时保持核心特征的连贯性。
- en: Identify the primary Conflicts and Challenges they will face and how these will
    reveal and develop their character. Detail their significant Relationships and
    Interactions with other characters, and how these dynamics reveal different aspects
    of their personality.
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 确定他们将面临的主要冲突和挑战以及这些冲突如何揭示和发展他们的性格。详细描述他们与其他角色的重大关系和互动，以及这些动态如何揭示他们性格的不同方面。
- en: Craft a unique Voice and Dialogue style for them, reflecting their background,
    personality, and emotional state. Provide a vivid Physical Description to help
    visualize them. Explore an Internal Conflict they grapple with, such as doubts,
    fears, moral dilemmas, or internal struggles, and describe how this conflict influences
    their actions and decisions.
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 为他们打造独特的声音和对话风格，反映他们的背景、个性和情绪状态。提供生动的物理描述以帮助他们可视化。探索他们所面临的内部冲突，例如怀疑、恐惧、道德困境或内心挣扎，并描述这种冲突如何影响他们的行为和决策。
- en: Finally, detail their Reactions to Situations, especially under pressure, to
    reveal more about them than their stated intentions or beliefs. Ensure to include
    Layered Complexity in their character, incorporating moral ambiguities and gray
    areas to avoid making them one-dimensional. How does each of these elements serve
    their purpose in the story and contribute to driving the plot forward, creating
    conflict, or aiding the growth of other characters?
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，详细描述他们在不同情况下的反应，特别是在压力之下，以揭示比他们声明的意图或信念更多的关于他们的信息。确保在他们的角色中包含层次复杂性，融入道德模糊性和灰色区域，以避免使他们变得单维。这些元素如何服务于故事的目的，并有助于推动情节发展、创造冲突或帮助其他角色的成长？
- en: Chapter 25
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十五章
- en: Enhanced Prompts
  id: totrans-1144
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 增强型提示
- en: Backstory
  id: totrans-1145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景故事
- en: 'Prompt: Generate a comprehensive and vivid backstory for [Character Name].
    Include a variety of key childhood events, such as transformative experiences,
    significant milestones, and influential encounters. Detail the family dynamics,
    including relationships with parents, siblings, and other family members, and
    how these relationships impacted their development. Describe pivotal moments,
    both positive and challenging, that played a crucial role in shaping [Character
    Name]''s personality, beliefs, and aspirations. Additionally, incorporate cultural,
    social, and economic factors that influenced their upbringing and early life experiences.'
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]生成一个全面而生动的故事背景。包括各种关键童年事件，如转变性经历、重要里程碑和有影响力的遭遇。详细描述家庭动态，包括与父母、兄弟姐妹和其他家庭成员的关系，以及这些关系如何影响他们的成长。描述关键时刻，无论是积极的还是具有挑战性的，这些时刻在塑造[角色名称]的性格、信念和抱负方面发挥了至关重要的作用。此外，融入文化、社会和经济因素，这些因素影响了他们的成长和早期生活经历。
- en: Motivation and Goals
  id: totrans-1147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机与目标
- en: 'Prompt: Develop intricate motivations and multifaceted goals for [Character
    Name], encompassing both internal desires and external objectives. Delve into
    deep-seated aspirations, such as personal fulfillment, overcoming past traumas,
    or achieving self-discovery. Also, include external ambitions like career success,
    societal change, or adventure-seeking. Highlight how these motivations are interconnected
    with [Character Name]''s backstory, and how they actively influence their decisions
    and actions within the story''s context. Address any evolving goals that change
    in response to the story''s progression, and how these shifts reflect [Character
    Name]''s development.'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]发展复杂的动机和多元目标，包括内在欲望和外在目标。深入挖掘深层的愿望，如个人满足、克服过去的创伤或实现自我发现。同时，包括外部目标，如职业成功、社会变革或寻求冒险。强调这些动机如何与[角色名称]的背景故事相互关联，以及它们如何积极影响他们在故事背景下的决策和行动。讨论任何随着故事进展而变化的演变目标，以及这些变化如何反映[角色名称]的发展。
- en: Personality Traits
  id: totrans-1149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 个性特征
- en: 'Prompt: Construct a detailed and layered personality profile for [Character
    Name]. Include a balanced mix of strengths, like resilience or empathy, and weaknesses,
    such as impulsiveness or a tendency to worry. Incorporate unique quirks that set
    them apart, like unusual hobbies, peculiar speech patterns, or distinct behavioral
    tendencies. Highlight habitual actions or routines that are indicative of their
    personality, such as morning rituals, consistent reactions to stress, or social
    interaction styles. Ensure these traits are reflective of their backstory and
    influence how they navigate the world and interact with other characters.'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]构建一个详细且层次分明的个性档案。包括平衡的强项，如韧性或同理心，和弱点，如冲动或担忧的倾向。融入独特的怪癖，使他们与众不同，如不寻常的爱好、独特的语言模式或独特的行为倾向。强调表明他们个性的习惯性行为或例行公事，如晨间仪式、对压力的一致反应或社交互动风格。确保这些特质反映了他们的背景故事，并影响他们如何在世界中导航并与他人互动。
- en: Growth and Change
  id: totrans-1151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成长与变化
- en: 'Prompt: Craft a dynamic and detailed development arc for [Character Name],
    focusing on the transformation they undergo in the story. Identify key events
    or experiences that act as catalysts for change in their beliefs, attitudes, or
    behavior. Describe how these changes unfold gradually, highlighting pivotal moments
    of realization, decision, or change. Explore the internal and external factors
    influencing this evolution, such as personal challenges, interactions with other
    characters, or major plot developments. Illustrate the progression from their
    initial state to their transformed state, ensuring that this growth is realistic
    and aligns with the narrative''s overall theme and direction.'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]构思一个动态且详细的成长弧线，重点关注他们在故事中经历的变化。识别那些作为他们信念、态度或行为变化催化剂的关键事件或经历。描述这些变化如何逐渐展开，突出认识、决策或变化的转折点。探讨影响这种演变的内部和外部因素，例如个人挑战、与其他角色的互动或重大情节发展。展示他们从初始状态到转变状态的进展，确保这种成长是真实且与叙事的整体主题和方向相符。
- en: Consistency
  id: totrans-1153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一致性
- en: 'Prompt: Develop a clear outline of enduring core traits for [Character Name]
    that persist throughout the novel, despite their growth and experiences. Highlight
    traits that form the bedrock of their personality, such as inherent moral values,
    deep-seated beliefs, or fundamental aspects of their temperament. Explain how
    these traits manifest in various situations across the story, and how they influence
    [Character Name]''s reactions and decisions. Additionally, illustrate the consistency
    of these traits in relation to the character''s evolving circumstances, ensuring
    that they provide a sense of continuity and authenticity to [Character Name]''s
    journey.'
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]发展一个贯穿整个小说的持久核心特质轮廓，尽管他们经历了成长和经历。突出构成他们个性基石的特质，如固有的道德价值观、根深蒂固的信念或性格的基本方面。解释这些特质如何在故事的各种情境中体现，以及它们如何影响[角色名称]的反应和决策。此外，展示这些特质与角色不断变化的环境的一致性，确保它们为[角色名称]的旅程提供连续性和真实性。
- en: Conflict and Challenge
  id: totrans-1155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 冲突与挑战
- en: 'Prompt: Elaborate on a variety of significant conflicts and challenges that
    [Character Name] encounters throughout the story. Include both external conflicts,
    such as antagonistic forces, societal pressures, or physical obstacles, and internal
    conflicts, like emotional struggles, ethical dilemmas, or personal fears. Describe
    how each conflict or challenge is intricately linked to [Character Name]''s motivations,
    backstory, and goals. Highlight how overcoming or facing these challenges contributes
    to [Character Name]''s growth, shaping their personality, beliefs, and future
    actions. Additionally, explore the consequences of these conflicts on [Character
    Name]''s relationships and their role in the broader narrative.'
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: 详细描述[角色名称]在故事中遇到的各种重要冲突和挑战。包括外部冲突，如敌对力量、社会压力或物理障碍，以及内部冲突，如情感斗争、道德困境或个人恐惧。描述每个冲突或挑战如何与[角色名称]的动机、背景和目标紧密相连。强调克服或面对这些挑战如何促进[角色名称]的成长，塑造他们的个性、信念和未来的行动。此外，探讨这些冲突对[角色名称]的人际关系和其在更广泛叙事中的作用产生的后果。'
- en: Relationships and Interactions
  id: totrans-1157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关系和互动
- en: 'Prompt: Develop a comprehensive analysis of [Character Name]''s key relationships
    and interactions, including those with family members, friends, romantic partners,
    adversaries, and mentors. For each relationship, describe the nature of the bond,
    the history behind it, and the significant moments that define it. Explain how
    these relationships influence [Character Name]''s behavior, decisions, and emotional
    responses. Highlight the nuances in these interactions, such as moments of conflict,
    support, misunderstanding, and reconciliation. Explore how each relationship brings
    out different facets of [Character Name]''s personality, including hidden traits
    or qualities that are not evident in other aspects of their life. Additionally,
    discuss how these interactions contribute to [Character Name]''s overall character
    development within the story.'
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: 对[角色名称]的关键关系和互动进行全面的剖析，包括与家庭成员、朋友、浪漫伴侣、对手和导师的关系。对于每一项关系，描述关系的本质、背后的历史以及定义它的关键时刻。解释这些关系如何影响[角色名称]的行为、决策和情感反应。突出这些互动中的细微差别，如冲突、支持、误解和和解的时刻。探讨每一项关系如何展现[角色名称]性格的不同方面，包括在其他生活方面不明显的隐藏特质或品质。此外，讨论这些互动如何有助于[角色名称]在故事中的整体性格发展。'
- en: Voice and Dialogue
  id: totrans-1159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 声音和对话
- en: 'Prompt: Construct a distinctive voice and dialogue style for [Character Name],
    ensuring it resonates with their background, cultural context, experiences, and
    current emotional and psychological state. Integrate elements like vocabulary
    choice, speech patterns, rhythm, and tone that are unique to their character.
    Reflect on how their dialogue varies in different situations and with different
    characters, such as formal vs. informal settings, or when interacting with close
    friends vs. strangers. Include idiosyncrasies in their speech, like specific phrases
    or words they favor, or a particular way of structuring sentences. Additionally,
    consider how their dialogue evolves throughout the story, mirroring their development
    and the changes they undergo.'
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt: 为[角色名称]构建一个独特的声音和对话风格，确保其与他们的背景、文化环境、经历以及当前的情感和心理状态产生共鸣。整合独特的元素，如词汇选择、说话方式、节奏和语调，这些元素是该角色的特点。思考他们的对话在不同情境和不同角色中如何变化，例如正式与非正式场合，或与亲密朋友相比与陌生人交流时。包括他们言语中的个性特征，如他们偏爱的特定短语或词汇，或句子结构的特定方式。此外，考虑他们的对话如何在故事中演变，反映他们的成长和经历的变化。'
- en: Physical Description
  id: totrans-1161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 身体描述
- en: 'Prompt: Develop an in-depth physical description for [Character Name], encompassing
    not only basic attributes like height, build, hair and eye color, but also distinctive
    features such as scars, birthmarks, or style of dress. Describe how their appearance
    has been shaped by their lifestyle, profession, or cultural background. Elaborate
    on how certain aspects of their look, like a commanding presence or a demure demeanor,
    impact their daily interactions, relationships, and how others perceive them.
    Discuss how [Character Name] feels about their own appearance, including any insecurities,
    pride, or indifference they might have, and how this self-perception influences
    their behavior and choices. Additionally, consider how their appearance might
    change or remain constant throughout the story, and what these changes or consistencies
    signify about their character journey.'
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]开发一个深入的物理描述，包括基本属性如身高、体型、发色和眼色，以及独特的特征，如疤痕、胎记或着装风格。描述他们的外观如何受其生活方式、职业或文化背景的影响。详细阐述某些外观特征，如威严的气场或谦逊的气质，如何影响他们的日常互动、关系以及他人如何看待他们。讨论[角色名称]对自己外观的看法，包括他们可能有的不安全感、自豪感或冷漠，以及这种自我认知如何影响他们的行为和选择。此外，考虑他们的外观如何在故事中改变或保持不变，以及这些变化或一致性如何表明他们的角色旅程。
- en: Internal Conflict
  id: totrans-1163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内心冲突
- en: 'Prompt: Devise a complex internal conflict for [Character Name] that is deeply
    rooted in their backstory, personality, or current circumstances. Focus on conflicts
    arising from internal doubts, fears, unresolved past traumas, ethical dilemmas,
    or struggles between contrasting desires and beliefs. Describe how this conflict
    is not just a fleeting thought but a significant struggle that affects their decision-making,
    relationships, and actions throughout the story. Explore how the conflict influences
    their emotional state, creates tension in their interactions, and drives key plot
    points. Additionally, consider how this internal conflict might evolve or find
    resolution as the story progresses, and what impact this resolution or lack thereof
    has on [Character Name]''s overall character arc.'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为[角色名称]设计一个根植于其背景故事、个性或当前情况的复杂内心冲突。重点关注源于内心疑虑、恐惧、未解决的过去创伤、道德困境，或对比欲望和信念之间的斗争所引发的冲突。描述这种冲突不仅仅是一个短暂的念头，而是一个重大的斗争，它影响着他们在整个故事中的决策、关系和行为。探讨这种冲突如何影响他们的情绪状态，在他们的互动中创造紧张感，并推动关键情节点。此外，考虑这种内心冲突如何在故事发展中演变或找到解决方法，以及这种解决方法或缺乏解决方法对[角色名称]的整体人物弧线有何影响。
- en: Reactions to Situations
  id: totrans-1165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对情况的反应
- en: 'Prompt: Elaborate on [Character Name]''s diverse range of reactions to a variety
    of situations, from everyday occurrences to high-stress or unexpected scenarios.
    Describe their initial emotional responses, coping mechanisms, and decision-making
    processes. Focus on how their reactions are influenced by their past experiences,
    core beliefs, and personality traits. Include how they handle conflict, adversity,
    success, and change. Reflect on how their reactions might differ when interacting
    with various characters or in different environments, such as in private versus
    public settings, or with friends versus authority figures. Additionally, consider
    how their responses evolve throughout the story, indicating growth, regression,
    or a shift in perspective.'
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：详细阐述[角色名称]对各种情况的多样化反应，从日常事件到高压或意外场景。描述他们的初始情绪反应、应对机制和决策过程。重点关注他们的反应如何受过去经历、核心信念和个性特征的影响。包括他们如何处理冲突、逆境、成功和变化。反思他们在与不同角色互动或在不同的环境中（如私人场合与公共场合，或与朋友与权威人物）的反应可能有何不同。此外，考虑他们的反应如何在故事中演变，表明成长、退步或视角的转变。
- en: Layered Complexity
  id: totrans-1167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层次复杂性
- en: 'Prompt: Construct detailed aspects of [Character Name]''s personality that
    embody a spectrum of moral complexities and ethical ambiguities. Explore traits,
    decisions, and actions that challenge binary notions of good and bad. Delve into
    their motivations, justifications, and rationales behind actions that may appear
    contradictory or morally complex. Highlight scenarios where [Character Name] faces
    ethical dilemmas, and describe how they navigate these situations, including the
    internal and external conflicts they experience. Consider how their cultural background,
    personal experiences, and the influence of significant relationships contribute
    to their moral framework. Also, reflect on how these gray areas add depth to their
    character, making them more relatable and intriguing to the reader. Finally, illustrate
    how this complexity influences their arc in the story, affecting their interactions,
    choices, and the overall narrative outcome.'
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：构建[角色名称]性格的详细方面，体现一系列道德复杂性和道德模糊性。探索挑战二元观念（好与坏）的特质、决定和行为。深入探究他们可能看似矛盾或道德复杂的行动背后的动机、正当理由和理由。突出[角色名称]面临道德困境的场景，并描述他们如何应对这些情况，包括他们经历的内部和外部冲突。考虑他们的文化背景、个人经历和重要关系的影響，以及这些灰色地带如何增加他们的深度，使他们更具亲和力和吸引力。最后，说明这种复杂性如何影响他们在故事中的弧线，影响他们的互动、选择和整体叙事结果。
- en: Chapter 26
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十六章
- en: AI and The Author
  id: totrans-1170
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能与作者
- en: Here are two versions of a series of prompts to guide character development
    and story arcs. Each version of the prompt is designed to walk you through the
    stages of character and story development, with the first engaging you - the author
    - directly in the creative process, and the second tailored for an AI to generate
    character ideas.
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两个版本的提示系列，用于指导角色发展和故事弧线。每个提示版本都是为了引导你——作者——直接参与创作过程，第一个版本直接与作者互动，第二个版本是为人工智能生成角色想法而量身定制的。
- en: AI Prompts the Author
  id: totrans-1172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能提示作者
- en: 'Introduce Your Character: Begin by describing your character''s basic information:
    name, age, occupation, and role in the story.'
  id: totrans-1173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 介绍你的角色：首先描述你角色的基本信息：姓名、年龄、职业和在故事中的角色。
- en: 'Backstory Development: What pivotal events from their past shaped who they
    are today? Consider their family dynamics, education, and key life experiences.'
  id: totrans-1174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：从他们过去的哪些关键事件塑造了他们今天的性格？考虑他们的家庭动态、教育和关键生活经历。
- en: 'Motivations and Goals: What drives your character? Are they seeking revenge,
    love, power, redemption, or something else?'
  id: totrans-1175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 动机和目标：是什么驱使你的角色？他们是在寻求复仇、爱情、权力、救赎还是其他什么？
- en: 'Personality Traits: List their strengths, weaknesses, quirks, and habits. How
    do these traits influence their interactions with others?'
  id: totrans-1176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性格特征：列出他们的优点、缺点、怪癖和习惯。这些特质如何影响他们与他人的互动？
- en: 'Growth and Change: How will your character evolve throughout the story? What
    events will challenge their beliefs and attitudes?'
  id: totrans-1177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成长和变化：你的角色将在故事中如何发展？哪些事件将挑战他们的信念和态度？
- en: 'Consistency in Traits: Despite their growth, what core aspects of their personality
    remain unchanged? How do these traits anchor their identity?'
  id: totrans-1178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 特征一致性：尽管他们有所成长，但哪些核心性格特征保持不变？这些特质如何锚定他们的身份？
- en: 'Conflict and Challenge: What external and internal conflicts will they face?
    How will these shape their journey?'
  id: totrans-1179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 冲突和挑战：他们将会面临哪些外部和内部冲突？这些冲突将如何塑造他们的旅程？
- en: 'Relationships and Interactions: Who are the key figures in your character''s
    life, and how do these relationships affect them?'
  id: totrans-1180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关系和互动：在你角色的生活中，谁是关键人物，这些关系如何影响他们？
- en: 'Voice and Dialogue: What is unique about the way they speak? Consider their
    background and personality in crafting their dialogue.'
  id: totrans-1181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语气和对话：他们说话的方式有什么独特之处？考虑他们的背景和性格来创作他们的对话。
- en: 'Physical Description: How does their appearance reflect their personality and
    background? How does it change over the story?'
  id: totrans-1182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 物理描述：他们的外貌如何反映他们的个性和背景？它如何在故事中发生变化？
- en: 'Internal Conflict: What internal struggles will they grapple with? How do these
    conflicts drive their actions?'
  id: totrans-1183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内部冲突：他们将会与哪些内部斗争作斗争？这些冲突如何推动他们的行动？
- en: 'Reactions to Situations: How does your character respond to success, failure,
    love, betrayal, or crisis?'
  id: totrans-1184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对情况的反应：你的角色如何回应成功、失败、爱情、背叛或危机？
- en: 'Layered Complexity: Explore the moral ambiguities and gray areas in their character.
    What difficult choices will they face?'
  id: totrans-1185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 层次复杂性：探索他们性格中的道德模糊性和灰色地带。他们将会面临哪些艰难的选择？
- en: Author Prompts the AI
  id: totrans-1186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 作者提示AI
- en: 'Character Introduction: Generate an introduction for [Character Name] including
    basic attributes like age, occupation, and role in the story.'
  id: totrans-1187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色介绍：为[角色名称]生成一个简介，包括年龄、职业和在故事中的角色。
- en: 'Backstory Creation: Craft a detailed backstory for [Character Name], focusing
    on childhood, formative experiences, and family dynamics.'
  id: totrans-1188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 剧情背景创作：为[角色名称]创作一个详细的后台故事，重点关注童年、形成性经历和家庭动态。
- en: 'Motivations and Goals Development: Define [Character Name]''s motivations and
    goals, both personal and professional, that drive the character''s actions in
    the story.'
  id: totrans-1189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 动机和目标发展：定义[角色名称]的个人和职业动机和目标，这些推动角色在故事中的行动。
- en: 'Personality Traits Outline: List [Character Name]''s personality traits, including
    strengths, weaknesses, quirks, and habits, and how these influence their relationships.'
  id: totrans-1190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性格特征概述：列出[角色名称]的性格特征，包括优点、缺点、怪癖和习惯，以及这些如何影响其关系。
- en: 'Character Growth and Change Mapping: Describe the evolution of [Character Name]''s
    beliefs, attitudes, and behaviors in response to the story''s events.'
  id: totrans-1191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色成长与变化映射：描述[角色名称]在故事事件影响下的信念、态度和行为演变。
- en: 'Consistency in Character: Identify core traits of [Character Name] that remain
    consistent throughout the story, providing continuity and depth.'
  id: totrans-1192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色一致性：确定[角色名称]在整个故事中保持一致的核心特质，提供连续性和深度。
- en: 'Conflict and Challenge Description: Detail the internal and external conflicts
    [Character Name] encounters and how these contribute to their development.'
  id: totrans-1193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 冲突与挑战描述：详细描述[角色名称]遇到的内部和外部冲突以及这些如何促进其发展。
- en: 'Relationships and Interactions Analysis: Examine [Character Name]''s key relationships
    and how they reveal different aspects of their personality.'
  id: totrans-1194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关系与互动分析：考察[角色名称]的关键关系以及它们如何揭示其性格的不同方面。
- en: 'Voice and Dialogue Style: Develop a unique voice and dialogue style for [Character
    Name] that reflects their background and personality.'
  id: totrans-1195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语气与对话风格：为[角色名称]开发独特的语气和对话风格，以反映其背景和性格。
- en: 'Physical Description: Provide a physical description of [Character Name] and
    how their appearance affects their journey and self-perception.'
  id: totrans-1196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 身体描述：提供[角色名称]的物理描述以及他们的外貌如何影响其旅程和自我认知。
- en: 'Internal Conflict Exploration: Create a narrative exploring [Character Name]''s
    internal conflicts, focusing on their doubts, fears, and moral dilemmas.'
  id: totrans-1197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内部冲突探索：创作一个叙事，探索[角色名称]的内部冲突，重点关注其疑虑、恐惧和道德困境。
- en: 'Reaction to Situations: Describe how [Character Name] reacts to different scenarios,
    showcasing their character through their responses.'
  id: totrans-1198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对情况的反应：描述[角色名称]对不同场景的反应，通过他们的回应展示其性格。
- en: 'Layered Complexity Development: Build aspects of [Character Name]''s character
    that show moral ambiguities and ethical challenges they face.'
  id: totrans-1199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 层次复杂性发展：构建[角色名称]性格的方面，以展示他们面临的道德模糊性和伦理挑战。
- en: Chapter 27
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十七章
- en: Character Image Prompts
  id: totrans-1201
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色图像提示
- en: Here are five prompts you can use to request the creation of images for your
    story characters. These prompts are structured to provide clear and detailed descriptions,
    allowing for the creation of images that closely match the vision of your characters.
    As always, adjust as needed.
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: 这里提供了五个提示，您可以使用这些提示来请求创建故事角色的图像。这些提示结构化以提供清晰和详细的描述，允许创建与您角色愿景紧密匹配的图像。如往常一样，根据需要调整。
- en: 'Prompt for a Hero Character: Create an image of the protagonist of my story,
    [Hero''s Name]. They are a [describe age, occupation, and general appearance].
    Key features include [specific physical attributes like hair color, eye color,
    notable scars, or tattoos]. They often wear [typical clothing style]. The setting
    is [describe the environment if relevant, like a futuristic city, a medieval village,
    or a magical forest].'
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄角色提示：为我故事中的主角[英雄名称]创建一个图像。他们是一个[描述年龄、职业和一般外貌]。关键特征包括[具体的身体特征，如发色、眼色、显著的疤痕或纹身]。他们经常穿着[典型的服装风格]。场景是[如果相关，描述环境，如未来城市、中世纪村庄或魔法森林]。
- en: 'Prompt for a Villain Character: I need an image of the antagonist in my novel,
    [Villain''s Name]. They have a [describe menacing or unique appearance, including
    stature, face, and expressions]. Their attire should reflect [specific style or
    theme, like dystopian overlord, elegant but dark wizard, corporate tycoon]. Include
    [any significant props or symbols, like a scepter, a technological gadget, or
    a distinctive piece of jewelry].'
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: 想象反派角色的提示：我需要我小说中名为[Villain's Name]的反派角色的图像。他们有[描述威胁或独特的外貌，包括身高、面部和表情]。他们的服装应反映[特定的风格或主题，如反乌托邦的统治者，优雅但黑暗的巫师，企业巨头]。包括[任何重要的道具或符号，如权杖，科技小工具，或独特的首饰]。
- en: 'Prompt for a Fantasy Creature: Can you create a fantasy creature that''s central
    to my story? It''s called a [Creature''s Name or Type] and resembles a [basic
    form, like dragon, unicorn, etc.], with unique features such as [specific traits
    like scales, wings, fur pattern]. The color scheme is [describe color and texture].
    It should be set in [type of landscape or environment].'
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: 想象奇幻生物的提示：你能为我故事中的中心奇幻生物创建一个图像吗？它被称为[Creature's Name or Type]，类似于[基本形态，如龙、独角兽等]，具有独特的特征，如[特定的特征，如鳞片、翅膀、毛皮图案]。色彩方案是[描述色彩和质感]。它应该置于[类型的景观或环境中]。
- en: 'Prompt for a Supporting Character: I''d like an image of a key supporting character,
    [Character''s Name]. They are [describe age and role in the story]. Important
    characteristics include [distinctive features like hairstyle, eye color, body
    build]. Their clothing style is [describe - modern, historical, armor, casual,
    etc.], and they typically carry [an item like a book, weapon, musical instrument].'
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: 想象配角角色的提示：我想看到一个关键配角角色的图像，[Character's Name]。他们是[描述年龄和在故事中的角色]。重要的特征包括[独特的特征，如发型、眼睛颜色、体型]。他们的着装风格是[描述
    - 现代、历史、盔甲、休闲装等]，他们通常携带[像一本书、武器、乐器这样的物品]。
- en: 'Prompt for a Sci-Fi Character: Please create an image of a sci-fi character
    from my book, named [Character''s Name]. They should look [describe age, any alien
    features, or technological enhancements]. Their attire is [describe - futuristic
    armor, space suit, casual wear with tech gadgets]. The background should be [describe
    - spaceship interior, alien planet landscape, cyberpunk cityscape].'
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 想象科幻角色的提示：请为我书中的科幻角色[Character's Name]创建一个图像。他们应该看起来[描述年龄、任何外星特征或技术增强]。他们的服装是[描述
    - 未来式装甲、太空服、带有科技小工具的休闲装]。背景应该是[描述 - 船舶内部、外星星球景观、赛博朋克城市景观]。
- en: Unknown Characteristics
  id: totrans-1208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未知特征
- en: What about when you are still exploring how your characters might look? These
    prompts are intended to assist you in visualizing characters when specific details
    are not yet decided, providing a starting point that can spark your imagination.
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 当你仍在探索角色的外观时怎么办？这些提示旨在帮助你可视化角色，当具体细节尚未确定时，提供一个可以激发你想象力的起点。
- en: 'Prompt for an Undetermined Hero: Create an image of a protagonist whose appearance
    isn''t fully defined yet. Imagine a character with a heroic demeanor in a setting
    that complements their unknown journey – perhaps standing at the edge of a cityscape,
    a forest, or a mystical land. Include elements that suggest courage and resilience,
    like a confident posture or a gaze towards the horizon.'
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 想象未确定英雄的提示：创建一个尚未完全确定外观的主角的图像。想象一个在与其未知的旅程相匹配的场景中的英雄气概角色——也许站在城市景观的边缘、森林或神秘之地。包括暗示勇气和坚韧的元素，如自信的姿态或望向地平线的目光。
- en: 'Prompt for a Mysterious Villain: I need an image of a villain whose features
    are not yet clear. Picture a figure shrouded in mystery, with shadows partially
    concealing their face, hinting at a menacing presence. The background should be
    something that implies danger or darkness, like a dimly lit room or a stormy landscape.'
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 想象神秘反派的提示：我需要一个特征尚不明确的反派角色的图像。想象一个被神秘笼罩的人物，阴影部分遮掩了他们的脸，暗示着威胁的存在。背景应该是暗示危险或黑暗的东西，如昏暗的房间或暴风雨的景观。
- en: 'Prompt for a Fantasy Sidekick: Create an image of a whimsical sidekick character
    in a fantasy setting. Imagine a creature or person that could be a blend of various
    animals or mythical beings, set in an enchanting forest or ancient ruins. The
    character should exude a sense of loyalty and playfulness.'
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个奇幻伙伴的提示：在奇幻场景中创造一个古怪伙伴角色的形象。想象一个可以是各种动物或神话生物混合的生物或人物，置于一个迷人的森林或古老遗迹中。这个角色应散发出忠诚和活泼的感觉。
- en: 'Prompt for an Ambiguous Supporting Character: Visualize a supporting character
    whose details are not yet finalized. This character could be anyone – a friend,
    a mentor, or a rival. Place them in a neutral setting like a café, a park, or
    a city street. Add elements that suggest a supportive but complex personality,
    like a thoughtful expression or an intriguing accessory.'
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 针对模糊配角的角色提示：可视化一个细节尚未确定的角色。这个角色可以是任何人——一个朋友、导师或对手。将他们置于一个中性的场景中，如咖啡馆、公园或城市街道。添加暗示支持但复杂个性的元素，如深思的表情或引人入胜的配饰。
- en: 'Prompt for a Sci-Fi Character of Unknown Origin: Generate an image of a sci-fi
    character whose origins and appearance are open-ended. Think of a figure in a
    futuristic or intergalactic setting, perhaps wearing technology-enhanced clothing
    or gear, with a face that''s partially obscured or not fully detailed. The environment
    could be a spacecraft, a distant planet, or a high-tech city, leaving room for
    imagination about their role in the story.'
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 针对未知起源的科幻角色提示：生成一个起源和外观都未定的科幻角色形象。想象一个可能出现在未来或星际环境中的形象，可能穿着技术增强的服装或装备，面部部分被遮挡或未完全详细。环境可以是宇宙飞船、遥远的星球或高科技城市，留下想象他们故事角色作用的余地。
- en: Chapter 28
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十八章
- en: Genre-Specific Character Images
  id: totrans-1216
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 针对特定体裁的角色图像
- en: Each genre offers unique thematic elements and settings that can inspire distinct
    character traits and appearances, providing a rich canvas for authors to develop
    their story's characters. Here are two prompts for each genre – one for authors
    with defined character details and another for those still exploring their character's
    appearance.
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 每个体裁都提供独特的主题元素和场景，可以激发独特的角色特性和外观，为作者提供丰富的画布来发展他们故事的角色。以下是每个体裁的两个提示——一个针对具有定义角色细节的作者，另一个针对仍在探索角色外观的作者。
- en: Fantasy Genre
  id: totrans-1218
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 幻想体裁
- en: 'Defined Character: Create an image of a fantasy character named [Character''s
    Name]. They are a [describe role - elf, wizard, warrior]. Key features include
    [specific attributes like hair color, attire, magical items]. The setting is [describe
    - enchanted forest, ancient castle].'
  id: totrans-1219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：创建一个名为[角色名称]的幻想角色形象。他们是一位[描述角色 - 精灵、法师、战士]。关键特征包括[具体属性如发色、服饰、魔法物品]。场景设定为[描述
    - 魔法森林、古老城堡]。
- en: 'Undefined Character: Visualize a fantasy character whose details are open.
    Imagine a being that could fit into a world of magic and myth, like a mysterious
    sorcerer or a mythical creature, in a setting that''s rich in fantasy elements.'
  id: totrans-1220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：可视化一个细节未定的幻想角色。想象一个可能适合魔法和神话世界的生物，如神秘的法师或神话生物，在一个充满幻想元素的场景中。
- en: Science Fiction Genre
  id: totrans-1221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 科幻体裁
- en: 'Defined Character: Generate an image of a sci-fi character named [Character''s
    Name], a [role - space explorer, alien, scientist]. Include specific features
    like [futuristic outfit, any technological enhancements, alien characteristics].
    Set them in [space station, alien landscape].'
  id: totrans-1222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：生成一个名为[角色名称]的科幻角色形象，他们是一位[角色 - 太空探险者、外星人、科学家]。包括具体特征如[未来派服装、任何技术增强、外星特征]。将他们置于[太空站、外星景观]。
- en: 'Undefined Character: Create an image of an undefined sci-fi character. Think
    of a figure that could belong to a distant future or an advanced alien civilization,
    with a setting that complements their potential role in a sci-fi narrative.'
  id: totrans-1223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：创建一个未定义的科幻角色形象。想象一个可能属于遥远未来或高级外星文明的生物，背景与他们在科幻叙事中可能扮演的角色相匹配。
- en: Mystery Genre
  id: totrans-1224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 悬疑体裁
- en: 'Defined Character: Craft an image of a mystery character named [Character''s
    Name]. They are a [detective, suspect, informant]. Detail their appearance with
    [detective attire, suspicious features, etc.]. The background could be [crime
    scene, shadowy alley, detective''s office].'
  id: totrans-1225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：制作一个名为[角色名称]的悬疑角色形象。他们是一位[侦探、嫌疑人、线人]。用[侦探服装、可疑特征等]详细描述他们的外观。背景可能是[犯罪现场、阴暗小巷、侦探办公室]。
- en: 'Undefined Character: Envision a mysterious figure whose details are not yet
    clear. Place them in a setting that evokes intrigue and suspense, like a foggy
    street or a dimly lit room, with elements that suggest a mystery to be solved.'
  id: totrans-1226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：想象一个细节尚不清晰的神秘人物。将他们置于一个激发好奇和悬疑的场景中，如雾蒙蒙的街道或昏暗的房间，添加暗示有待解决的谜团的元素。
- en: Romance Genre
  id: totrans-1227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 爱情体裁
- en: 'Defined Character: Create an image of a romantic character named [Character''s
    Name]. They are a [type of romantic lead]. Include features like [charming smile,
    elegant dress, casual attire]. The setting should be something that evokes romance,
    like a cozy café or a beautiful garden.'
  id: totrans-1228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：创建一个名为[角色名称]的浪漫角色图像。他们是一个[类型的浪漫主角]。包括[迷人的微笑、优雅的连衣裙、休闲服装]等特征。场景应该是能够唤起浪漫感的，如温馨的咖啡馆或美丽的花园。
- en: 'Undefined Character: Imagine a character in a romantic setting who could be
    part of a love story. The details are open-ended – think of a figure that exudes
    romantic potential, perhaps caught in a moment of contemplation or a glance towards
    someone unseen.'
  id: totrans-1229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：想象一个处于浪漫场景中的角色，可能是爱情故事的一部分。细节是开放的——想象一个散发出浪漫潜力的形象，可能是在沉思或向未见之人投去一瞥的时刻。
- en: Horror Genre
  id: totrans-1230
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恐怖类型
- en: 'Defined Character: Generate an image of a horror character named [Character''s
    Name], a [monster, ghost, haunted individual]. Their key features are [terrifying
    appearance, ghostly aura, signs of possession]. The setting is [abandoned house,
    creepy forest, haunted asylum].'
  id: totrans-1231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：生成一个名为[角色名称]的恐怖角色图像，他是一个[怪物、鬼魂、被附身的人]。他们的主要特征是[恐怖的外貌、幽灵般的气息、被附身的迹象]。场景是[废弃的房子、令人毛骨悚然的森林、被诅咒的精神病院]。
- en: 'Undefined Character: Visualize a horror character whose specifics are not yet
    determined. Consider a figure that embodies fear and suspense, set in an environment
    that amplifies a sense of dread, like a shadowy corridor or an eerie, moonlit
    field.'
  id: totrans-1232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：设想一个恐怖角色，具体细节尚未确定。考虑一个体现恐惧和悬疑的形象，背景是一个能够放大恐惧感的场景，如阴暗的走廊或神秘的月光田野。
- en: Adventure
  id: totrans-1233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 冒险
- en: 'Defined Character: Craft an image of an adventure character named [Character''s
    Name], a [role - explorer, treasure hunter, adventurer]. They are equipped with
    [gear like a backpack, map, compass] and dressed for [jungle exploration, mountain
    climbing].'
  id: totrans-1234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：制作一个名为[角色名称]的冒险角色图像，他是一个[角色 - 探险家、寻宝者、冒险者]。他们配备了[背包、地图、指南针]等装备，并穿着适合[丛林探险、登山]的服装。
- en: 'Undefined Character: Imagine an adventurer whose specifics are not yet known.
    Think of a character prepared for exploration, set against a backdrop of an exotic
    or challenging landscape, embodying the spirit of adventure.'
  id: totrans-1235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：想象一个具体细节尚未知的冒险者。想象一个为探险准备的角色，背景是异国或具有挑战性的景观，体现探险精神。
- en: Thriller/Suspense
  id: totrans-1236
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 惊悚/悬疑
- en: 'Defined Character: Generate an image of a thriller character named [Character''s
    Name], who could be a [spy, detective, fugitive]. Detail their appearance with
    elements like [tense expression, stealthy attire]. The background should be something
    evocative of suspense, like a dark alley or a crowded urban space.'
  id: totrans-1237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：生成一个名为[角色名称]的惊悚角色图像，他可能是一名[间谍、侦探、逃犯]。详细描述他们的外貌，包括[紧张的表情、隐秘的服装]等元素。背景应该是能够唤起悬疑感的场景，如黑暗的巷子或拥挤的城市空间。
- en: 'Undefined Character: Visualize a character suitable for a thriller or suspense
    story, with details open for interpretation. Imagine a figure in a high-stakes
    situation, with a setting that creates a sense of tension and uncertainty.'
  id: totrans-1238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：设想一个适合惊悚或悬疑故事的角色，细节可以自由解读。想象一个处于高风险情境中的形象，背景营造出紧张和不确定感。
- en: Dystopian/Utopian
  id: totrans-1239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反乌托邦/乌托邦
- en: 'Defined Character: Create an image of a dystopian or utopian character named
    [Character''s Name], living in a [futuristic, post-apocalyptic, perfect world].
    Their appearance should include [futuristic clothing, survival gear, harmonious
    attire], reflecting their environment.'
  id: totrans-1240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：创建一个名为[角色名称]的反乌托邦或乌托邦角色图像，他们生活在[未来、后末日、完美世界]中。他们的外观应包括[未来服装、生存装备、和谐的服装]，反映出他们的环境。
- en: 'Undefined Character: Envision a character in an unspecified dystopian or utopian
    setting. Picture a figure that reflects elements of a radically transformed society,
    set against a backdrop that suggests either decay or perfection.'
  id: totrans-1241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未定义角色：设想一个在未指定的反乌托邦或乌托邦背景中的角色。想象一个反映社会彻底变革元素的形象，背景暗示着衰败或完美。
- en: Young Adult (YA)
  id: totrans-1242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 青少年（YA）
- en: 'Defined Character: Craft an image of a YA character named [Character''s Name],
    who is a [high school student, young hero, teenage wizard]. Their style is [trendy,
    casual, unique], and they carry items like [a backpack, magical artifact, sports
    equipment].'
  id: totrans-1243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义角色：制作一个名为[角色名称]的青少年角色图像，他是一个[高中生、年轻英雄、青少年巫师]。他们的风格是[时尚、休闲、独特]，并携带[背包、魔法神器、体育器材]等物品。
- en: 'Undefined Character: Imagine a young adult character without specific details.
    Consider a figure that embodies youth and the challenges of growing up, set in
    a context like a school, a fantasy realm, or a relatable everyday environment.'
  id: totrans-1244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Undefined Character: 想象一个没有具体细节的青年角色。考虑一个体现青春和成长挑战的人物，设定在像学校、幻想领域或可相关日常生活环境这样的背景下。'
- en: Historical Fiction Genre
  id: totrans-1245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Historical Fiction Genre
- en: 'Defined Character: Create an image of [Character''s Name], a [specific historical
    role] from the [specific time period]. They wear [period-appropriate attire] and
    have features like [distinct historical characteristics]. The background is a
    [historical setting].'
  id: totrans-1246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"Defined Character": 创建一个[Character''s Name]的形象，一个来自[specific time period]的[specific
    historical role]。他们穿着[period-appropriate attire]，具有[distinct historical characteristics]等特征。背景是一个[historical
    setting]。'
- en: 'Undefined Character: Envision a character in an unspecified historical setting.
    Picture a figure that could blend into any historical backdrop, with attire and
    features that suggest a past era, leaving room for various interpretations.'
  id: totrans-1247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'Undefined Character: 想象一个在未指定历史背景下的角色。想象一个可以融入任何历史背景的人物，其服饰和特征暗示着一个过去时代，留下各种解释的空间。'
- en: Chapter 29
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: Chapter 29
- en: Minimal Genre Character Templates
  id: totrans-1249
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Minimal Genre Character Templates
- en: Each genre often has unique tropes and conventions that can be reflected in
    character development. The following chapters include JSON templates for each
    genre.
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: 每个体裁通常都有独特的主题和惯例，这些可以在角色发展中得到体现。以下章节包括每个体裁的JSON模板。
- en: Each template includes the general character development prompts listed earlier,
    adjusted to fit the specific elements and themes of the respective genre. Use
    these templates to guide your character creation process, ensuring your characters
    are well-suited to the genre of your story.
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 每个模板都包括前面列出的通用角色发展提示，调整以适应各自体裁的具体元素和主题。使用这些模板来指导你的角色创造过程，确保你的角色适合你故事中的体裁。
- en: Remember to change “main character” to another if you need to.
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: 记得根据需要将“main character”改为其他名称。
- en: Fantasy Character Template
  id: totrans-1253
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Fantasy Character Template
- en: '{'
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: '{'
- en: '"FantasyCharacterDevelopment": {'
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: '"FantasyCharacterDevelopment": {'
- en: '"Backstory": "Create a magical or mythical origin for the main character.",'
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: '"Backstory": "为主角创造一个魔法或神话起源。",'
- en: '"MotivationAndGoals": "What quest or prophecy drives this character in this
    fantasy world?",'
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: '"MotivationAndGoals": "什么任务或预言推动这个角色在这个幻想世界中前进？",'
- en: '"PersonalityTraits": "How does this character’s traits reflect their role in
    the story (e.g., a brave knight, a cunning sorcerer)?",'
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: '"PersonalityTraits": "这个角色的特质如何反映他们在故事中的角色（例如，一位勇敢的骑士，一个狡猾的法师）？",'
- en: '"GrowthAndChange": "Describe this character’s journey from a mundane to a heroic
    or magical status.",'
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: '"GrowthAndChange": "描述这个角色从平凡到英雄或魔法状态的旅程。",'
- en: '"Consistency": "Ensure this character remains true to the fantasy genre''s
    archetypes while developing."'
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: '"Consistency": "在发展过程中确保这个角色忠于幻想体裁的典型形象。",'
