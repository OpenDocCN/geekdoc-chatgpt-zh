  id: totrans-2187
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 在[这里！](https://twilight-mongoose-256.notion.site/Developing-Characters-With-AI-Prompts-134ecdf986c44e24945e222deaad75b3?pvs=4)获取你的提示
