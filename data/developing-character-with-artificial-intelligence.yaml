  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恐惧和恐惧症
- en: 'Questions:'
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. What is your character's deepest fear or phobia, and how did it develop?
