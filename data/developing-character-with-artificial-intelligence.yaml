- en: Chapter 35
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 第35章
- en: Naming Characters
  id: totrans-1401
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 命名角色
- en: Creating a character name is an art that blends creativity with intentionality.
    Names can convey personality, background, and even destiny. Use this chapter as
    a starting point to craft names that add depth and resonance to your characters.
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 创造角色名字是一门融合创造性和目的性的艺术。名字可以传达个性、背景，甚至命运。使用本章作为起点，为你的角色创造具有深度和共鸣的名字。
- en: Understanding the Importance of Character Names
  id: totrans-1403
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解角色名称的重要性
- en: '• Reflect Character Traits: Names can hint at a character’s personality or
    destiny. Think of names that might reflect their traits, such as "Grace" for a
    kind character or "Rowan" for someone strong and sturdy.'
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: • 反映角色特质：名字可以暗示角色的个性或命运。想想可能反映他们特质的名字，比如“Grace”对于一个善良的角色或“Rowan”对于一个坚强而健壮的人。
- en: '• Indicate Background: Names can suggest a character’s cultural, ethnic, or
    historical background, adding depth and realism.'
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: • 指示背景：名字可以暗示角色的文化、种族或历史背景，增加深度和现实感。
- en: '• Fit the Genre: Certain names fit better with specific genres. Fantasy names
    might be more elaborate, while contemporary names might be more conventional or
    trendy.'
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: • 适应体裁：某些名字更适合特定的体裁。奇幻名字可能更复杂，而当代名字可能更传统或时尚。
- en: Steps to Creating Character Names
  id: totrans-1407
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建角色名字的步骤
- en: 1\. Start with the Character’s Essence
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从角色的本质开始
- en: '• Brainstorm Keywords: List words that capture your character''s essence, traits,
    or destiny.'
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: • 思考关键词：列出能够捕捉角色本质、特质或命运的字词。
- en: '• Use Name Meanings: Look up names that align with your character’s traits
    or background in meaning.'
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用名字含义：查找与角色特质或背景相符合的含义的名字。
- en: 2\. Consider the Setting and Genre
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 考虑设定和类型
- en: '• Historical and Cultural Context: Ensure the name fits the time period and
    culture of your setting.'
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: • 历史和文化背景：确保名字符合你设定的时间和文化的时期。
- en: '• Genre Appropriateness: Fantasy or sci-fi might allow for more creative naming,
    while realistic genres may require names that readers can easily relate to.'
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: • 风格适宜性：奇幻或科幻可能允许更富有创造性的命名，而现实主义的类型可能需要读者容易关联的名字。
- en: 3\. Sound and Resonance
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 声音和共鸣
- en: '• Name Sound: Consider how the name sounds. Is it harsh, soft, short, or long?
    The phonetic appeal can influence how readers perceive the character.'
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: • 名字发音：考虑名字的发音。它是刺耳的、柔和的、短的还是长的？语音吸引力可以影响读者对角色的感知。
- en: '• Alliteration and Rhythm: Alliterative names or those with a pleasing rhythm
    can be more memorable (e.g., Severus Snape).'
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: • 首字母押韵和节奏：押韵的名字或那些有愉悦节奏的名字可能更容易记忆（例如，Severus Snape）。
- en: 4\. Uniqueness vs. Relatability
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 独特性与可关联性
- en: '• Balance Uniqueness: Unique names stand out but ensure they are not too difficult
    to pronounce or remember.'
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: • 平衡独特性：独特的名字会脱颖而出，但确保它们不是太难发音或记忆。
- en: '• Maintain Relatability: Names should be unique enough to be interesting but
    relatable enough to be memorable and pronounceable by readers.'
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: • 保持可关联性：名字应该足够独特以吸引人，但也要足够容易记忆和发音，以便读者能够记住。
- en: 5\. Research and Inspiration
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 研究和灵感
- en: '• Baby Name Websites: These can be a goldmine for names, including meanings
    and origins.'
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: • 婴儿名字网站：这些网站可以成为名字的宝库，包括含义和起源。
- en: '• Mythology and History: Look to myths, legends, and historical figures for
    unique names.'
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: • 神话和历史：参考神话、传说和历史人物以获取独特的名字。
- en: '• Nature and Places: Names inspired by nature or places can evoke certain imagery
    or feelings.'
  id: totrans-1423
  prefs: []
  type: TYPE_NORMAL
  zh: • 自然和地点：受自然或地点启发的名字可以唤起某些意象或情感。
- en: Tools and Resources
  id: totrans-1424
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具和资源
- en: '• Name Generators: Online tools can generate names based on criteria like genre,
    ethnicity, or theme.'
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: • 名字生成器：在线工具可以根据类型、民族或主题等标准生成名字。
- en: '• Cultural Name Books: Books dedicated to names from specific cultures can
    provide authentic options.'
  id: totrans-1426
  prefs: []
  type: TYPE_NORMAL
  zh: • 文化名字书籍：专注于特定文化名字的书籍可以提供真实的选择。
- en: '• Ancestry Websites: These sites can offer a range of names from different
    times and places, useful for historical fiction.'
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: • 家谱网站：这些网站可以提供来自不同时代和地点的名字，对历史小说很有用。
- en: Naming Websites and Generators
  id: totrans-1428
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 命名网站和生成器
- en: '[https://www.babycenter.com/baby-names](https://www.babycenter.com/baby-names)'
  id: totrans-1429
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.babycenter.com/baby-names](https://www.babycenter.com/baby-names)'
- en: '[https://www.fantasynamegenerators.com/](https://www.fantasynamegenerators.com/)'
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.fantasynamegenerators.com/](https://www.fantasynamegenerators.com/)'
- en: '[https://www.scifiideas.com/](https://www.scifiideas.com/)'
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.scifiideas.com/](https://www.scifiideas.com/)'
- en: '[https://www.20000-names.com/](https://www.20000-names.com/)'
  id: totrans-1432
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.20000-names.com/](https://www.20000-names.com/)'
- en: Creative Exercises for Naming
  id: totrans-1433
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 命名创意练习
- en: '• Mix and Match: Combine first and last names from different lists or sources
    until something clicks.'
  id: totrans-1434
  prefs: []
  type: TYPE_NORMAL
  zh: • 混合匹配：从不同的列表或来源中组合姓氏和名字，直到找到合适的组合。
- en: '• Alterations: Take a common name and alter letters or phonetics to create
    something new.'
  id: totrans-1435
  prefs: []
  type: TYPE_NORMAL
  zh: • 改变：取一个常见的名字，改变字母或音素以创造新的名字。
- en: '• Translate: Look up translations of a trait or object relevant to your character
    in various languages for inspiration.'
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: • 翻译：查找与角色相关的特质或物体在不同语言中的翻译以获取灵感。
- en: Final Tips
  id: totrans-1437
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终提示
- en: '• Avoid Similar Names: Ensure that main characters'' names don’t start with
    the same letter or sound too similar to avoid confusion.'
  id: totrans-1438
  prefs: []
  type: TYPE_NORMAL
  zh: • 避免相似名字：确保主要角色的名字不要以相同的字母开头或听起来太相似，以避免混淆。
- en: '• Say It Out Loud: Names should be easy to pronounce or have a natural flow
    when read aloud.'
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: • 大声读出来：名字应该容易发音或在朗读时自然流畅。
- en: '• Get Feedback: Share your character''s name with others to gauge their impressions
    and ensure it conveys the intended traits or backgrounds.'
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: • 获取反馈：与他人分享角色的名字，以了解他们的印象，并确保它传达了预期的特质或背景。
- en: Prompt For Guiding an Author
  id: totrans-1441
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指导作者的提示
- en: 'Prompt: I''m creating a character for my (genre) story and need help deciding
    on a name. This character is [describe character traits, background, role in story,
    etc.]. I want the name to reflect [specific traits/background/meaning]. Can you
    walk me through the process of finding the perfect name that fits these criteria?'
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：我正在为我的（类型）故事创造一个角色，并需要帮助决定名字。这个角色是[描述角色特点，背景，故事中的角色等]。我希望这个名字能反映出[具体特点/背景/意义]。你能引导我找到符合这些标准的最完美的名字吗？
- en: 'Example Use:'
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 示例用法：
- en: 'Prompt: I''m creating a character for my fantasy novel and need help deciding
    on a name. This character is a brave warrior from an ancient tribe that has a
    deep connection with nature. I want the name to reflect strength, connection to
    the earth, and have an old-world charm. Can you walk me through the process of
    finding the perfect name that fits these criteria?'
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：我正在为我的奇幻小说创造一个角色，并需要帮助决定名字。这个角色是一个来自古老部落、与自然有着深厚联系的勇敢战士。我希望这个名字能反映出力量、与大地的联系，并具有古老世界的魅力。你能引导我找到符合这些标准的最完美的名字吗？
- en: Naming GPT
  id: totrans-1445
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 命名GPT
- en: Here is a custom GPT just for naming characters. This GPT will walk you through
    a few questions before generating a list of names. In response, you can tell it
    that you have no preference on any or all of the questions.
  id: totrans-1446
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个专门用于命名角色的定制GPT。这个GPT会在生成名字列表之前引导你回答几个问题。作为回应，你可以告诉它你对任何或所有问题都没有偏好。
- en: A friend also tested it and found it gave pretty good physical character descriptions.
    They then brought the output into MidJourney for an image, but you could simply
    ask DALL-E to create one in the chat.
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: 一个朋友也测试了它，并发现它给出了相当好的物理角色描述。然后他们将输出带入MidJourney进行图像创作，但你也可以简单地要求DALL-E在聊天中创建一个。
- en: '[https://chat.openai.com/g/g-JpRDs1TOi-name-my-character](https://chat.openai.com/g/g-JpRDs1TOi-name-my-character)'
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://chat.openai.com/g/g-JpRDs1TOi-name-my-character](https://chat.openai.com/g/g-JpRDs1TOi-name-my-character)'
