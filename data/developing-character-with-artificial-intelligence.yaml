  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：为[指定类型]故事中的一组演员生成动态关系想法，包括随时间可能发生的演变或变化。
- en: Balancing Screen Time and Importance
  id: totrans-867
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平衡银幕时间和重要性
- en: Author Provides Ideas
  id: totrans-868
