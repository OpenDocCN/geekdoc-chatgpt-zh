  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个害怕失败的角色，这驱使他们过度努力，但也造成巨大的压力。
- en: 4\. A character scared of the dark, stemming from a traumatic childhood event.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一个害怕黑暗的角色，这源于一个创伤性的童年事件。
