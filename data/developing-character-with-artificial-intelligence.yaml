- en: This structured prompt can help guide the AI to provide a list of names that
    closely match your character's concept and the story's needs, ensuring the suggestions
    are tailored and relevant. Save a master copy for you to grab and customize for
    each character.
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结构化提示可以帮助引导AI提供与你的角色概念和故事需求紧密匹配的名字列表，确保建议是定制和相关的。保存一个主副本供你使用，并根据每个角色进行定制。
