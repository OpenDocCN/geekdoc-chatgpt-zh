- en: Character Sheet Image Prompt
  id: totrans-752
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色表格图像提示
- en: This prompt can be adjusted to fit any story and character, giving you an image
    of the character that encompasses both physical appearance and deeper personality
    traits and backstory elements to help you visualize them as you write.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示可以根据任何故事和角色进行调整，为你提供一个包含外貌、更深层次的性格特征和背景元素的角色的图像，帮助你写作时进行可视化。
- en: 'Prompt: Generate an image for a detailed character sheet for a character in
    my [specify genre] story. The character''s name is [Name]. Physical attributes
    include [height, build, hair color, eye color, distinctive features]. Their clothing
    style is [describe clothing style]. Key personality traits are [list traits].
    They have a unique background which includes [briefly describe background elements].
    They possess skills or abilities such as [list skills/abilities]. The setting
    or background of the image should reflect [describe setting or background]. Please
    include any notable items or accessories they often have with them.'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为我生成一张详细的角色表格的图片，该角色出现在我的[指定类型]故事中。角色的名字是[名字]。身体特征包括[身高、体型、发色、眼色、显著特征]。他们的着装风格是[描述着装风格]。关键个性特质是[列出特质]。他们有一个独特的背景，包括[简要描述背景元素]。他们拥有[列出技能/能力]等技能或能力。图片的背景或环境应反映[描述背景或环境]。请包括他们经常携带的任何显著物品或配件。
