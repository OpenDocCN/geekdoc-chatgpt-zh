- en: Education and Training
  id: totrans-1692
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教育和培训
- en: 'Questions:'
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 问题：
- en: 1\. What kind of formal or informal education did your character receive?
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 你的角色接受了什么样的正式或非正式教育？
- en: 2\. How has their education or training influenced their current role or occupation?
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 他们的教育或培训如何影响了他们目前的角色或职业？
- en: 3\. Were there any mentors or influential teachers in your character's life?
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 你的角色生活中是否有任何导师或有影响力的老师？
- en: 4\. How does your character view the importance of their education?
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 你的角色如何看待他们教育的重要性？
- en: 5\. Did your character face any challenges or notable experiences during their
    education?
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 你的角色在教育过程中是否面临过任何挑战或显著的经历？
- en: 'Ideas:'
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 思路：
- en: 1\. A character who is self-taught, valuing experience over formal education.
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一个自学成才的角色，重视经验胜过正规教育。
- en: 2\. A character who attended a prestigious institution but feels disillusioned
    by it.
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 一个就读于著名机构但对其感到幻灭的角色。
- en: 3\. A character who was mentored by a renowned expert in their field.
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 一个由他们领域内的知名专家指导的角色。
- en: 4\. A character who had to fight for their education in a society that undervalues
    it.
  id: totrans-1703
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在一个轻视教育的社会中为教育而奋斗的角色。
- en: 5\. A character who uses unconventional methods they learned from a unique educational
    experience.
  id: totrans-1704
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 一个使用他们从独特教育经历中学到的非常规方法的角色。
