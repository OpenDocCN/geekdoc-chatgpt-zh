- en: Ian Khan—The Futurist
  id: totrans-3896
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Ian Khan—未来学家
- en: '**Ian Khan** “The Futurist” is a multifaceted leadership expert, storyteller,
    and creative mind. Founder of AIRI™, the AI Readiness Initiative, aimed at helping
    organizations measure their current state of readiness for an AI-driven world,
    Ian has also created the Future Readiness Score™, a KPI, to scientifically measure
    how well an organization is ready to grow through unanticipated change. His work
    has been featured on CNN, BBC, Bloomberg, Fast Company, and other global media.'
  id: totrans-3897
  prefs: []
  type: TYPE_NORMAL
  zh: '**伊恩·汗** “未来学家”是一位多面手的领导力专家、讲故事的人和创意思维者。他是AIRI™（AI Readiness Initiative）的创始人，该计划旨在帮助组织衡量它们在人工智能驱动世界中的当前准备状态，他还创建了未来准备度评分™，这是一个关键绩效指标（KPI），用于科学地衡量一个组织准备通过不可预见的变化增长的情况。他的工作在CNN、BBC、彭博社、Fast
    Company和其他全球媒体上都有报道。'
- en: Ian is an authority on emerging technologies including artificial intelligence,
    Web3, metaverse, virtual reality, technology enablement, and cybersecurity. He
    speaks about digital transformation, algorithms, robotics, and automation with
    ChatGPT and generative AI as well as decentralization through blockchain from
    a leadership perspective.
  id: totrans-3898
  prefs: []
  type: TYPE_NORMAL
  zh: 伊恩是人工智能、Web3、元宇宙、虚拟现实、技术赋能和网络安全等新兴技术的权威专家。他从领导力的角度，与ChatGPT和生成式AI一起讨论数字化转型、算法、机器人技术和自动化，以及通过区块链实现去中心化。
- en: As a storyteller Ian is passionate about using different media to help educate
    his audiences and has produced several critically acclaimed technology-focused
    documentaries available on Prime Video, Emirates Airlines, Tubi, FlyDubai, and
    other leading streaming platforms. Ian is deeply vested in technology education
    and future readiness and believes in the positive transformative power of technology.
  id: totrans-3899
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位讲故事的人，伊恩热衷于使用不同的媒体来帮助教育他的观众，并制作了多部在Prime Video、阿联酋航空、Tubi、FlyDubai和其他主要流媒体平台上获得好评的技术主题纪录片。伊恩对技术教育和未来准备度投入了深厚的热情，并相信技术具有积极的变革力量。
- en: Ian is also a multiple times published author and has written *Metaverse for
    Dummies*, the most comprehensive reference book to help readers of all levels
    understand virtual reality and the metaverse. Ian stars in a new truth-seeking
    documentary series *The Futurist*, an investigative and storytelling, episodic
    show to help understand the impact of emerging technologies on our world.
  id: totrans-3900
  prefs: []
  type: TYPE_NORMAL
  zh: 伊恩也是一位多次出版的作者，并撰写了《元宇宙入门》（Metaverse for Dummies），这是一本全面参考书籍，旨在帮助所有水平的读者理解虚拟现实和元宇宙。伊恩主演了一部新的寻求真理的纪录片系列《未来学家》，这是一部调查性和叙事性的剧集，旨在帮助理解新兴技术对我们世界的影响。
- en: An outdoors person, Ian loves nature and currently lives in Toronto with his
    wife and two kids.
  id: totrans-3901
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位户外爱好者，伊恩热爱大自然，目前与他的妻子和两个孩子住在多伦多。
- en: Learn more about Ian at [www.IanKhan.com](http://www.IanKhan.com).
  id: totrans-3902
  prefs: []
  type: TYPE_NORMAL
  zh: 了解更多关于伊恩的信息，请访问 [www.IanKhan.com](http://www.IanKhan.com)。
