- en: Praise for *The Quick Guide to Prompt Engineering*
  id: totrans-280
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 对《快速指南：提示工程》的赞誉
- en: “It’s not just a ‘quick’ guide; it’s the best guide to accelerate your GenAI
    journey.”
  id: totrans-281
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “这不仅仅是一本‘快速’指南；这是加速你的生成式AI之旅的最佳指南。”
- en: ''
  id: totrans-282
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**—Robert C. Wolcott,** *Co-Founder & Chair, TWIN Global Adjunct Professor
    of Innovation University of Chicago & Northwestern University*'
  id: totrans-283
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—罗伯特·C·沃尔科特**，*联合创始人兼主席，TWIN全球创新大学附属教授，芝加哥大学和西北大学*'
- en: “We need a fresh definition for computer literacy that is not only focused on
    the ability to use computers but also on how to ask computers the right questions
    that will ensure getting the best answers. Ian’s new book is a practical guide
    that helps readers understand, learn, and implement prompt engineering successfully.”
  id: totrans-284
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们需要一个全新的计算机素养定义，它不仅关注使用计算机的能力，还关注如何向计算机提出正确的问题，以确保获得最佳答案。伊恩的新书是一本实用的指南，帮助读者理解、学习和成功实施提示工程。”
- en: ''
  id: totrans-285
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**—Dina Fares,** *Director of Digital Transformation Digital Ajman*'
  id: totrans-286
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—迪娜·法里斯**，*迪拜数字转型总监*'
- en: “Ian Khan has written a highly accessible book for understanding how to quickly
    use advanced skills to get the most value from popular generative AI solutions.
    The book can be used both as a reference guide to quickly look up specific techniques
    or even read from front to back to get a good handle on many of the most important
    and developing technologies and concepts in the AI field today. Ian’s guide certainly
    has benefits for both beginners and advanced generative AI users.”
  id: totrans-287
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “伊恩·汗写了一本易于理解的书籍，帮助读者快速掌握如何使用高级技能从流行的生成式AI解决方案中获得最大价值。这本书既可以作为参考指南快速查找特定技术，也可以从头到尾阅读，以了解AI领域今天许多最重要的和正在发展的技术和概念。伊恩的指南对初学者和高级生成式AI用户都有益处。”
- en: ''
  id: totrans-288
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**—Dr. Jonathan Reichental,** *Founder of Human Future, Professor, and Author*'
  id: totrans-289
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—乔纳森·赖希特尔博士**，*人类未来创始人、教授和作家*'
- en: “Prompting is an essential part of digital literacy or basic digital skills
    by now – if you have not mastered it yet, this book is a good start.”
  id: totrans-290
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “提示现在是数字素养或基本数字技能的一个基本组成部分——如果你还没有掌握它，这本书是一个良好的起点。”
- en: ''
  id: totrans-291
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**—Siim Sikkut,** *Former CIO Government of Estonia. Author of “Digital Government
    Excellence”*'
  id: totrans-292
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—西姆·西库特**，*爱沙尼亚政府前首席信息官。《数字政府卓越》一书的作者*'
- en: “Ian Khan has masterfully presented ‘prompt engineering’ as the key to human
    engagement with AI. It is truly an authoritative and comprehensive guide.”
  id: totrans-293
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “伊恩·汗巧妙地将‘提示工程’呈现为人类与人工智能互动的关键。这真是一本权威且全面的指南。”
- en: ''
  id: totrans-294
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**—Rafi-uddin Shikoh,** *CEO, Dinar Standard*'
  id: totrans-295
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—拉菲-乌丁·希克**，*Dinar Standard公司首席执行官*'
- en: “Ian Khan has once again showcased his expertise and passion for helping others
    understand the technology that is transforming our lives. He adeptly elucidates
    the intricate subjects of artificial intelligence and prompt engineering in a
    manner that is not only understandable but, more importantly, practical. The Guide
    to Prompt Engineering stands as a crucial resource for comprehending the terminology,
    foundational elements, and the commercial and ethical considerations associated
    with the utilization of AI.”
  id: totrans-296
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “伊恩·汗再次展现了他帮助他人理解改变我们生活的技术的专业知识和热情。他巧妙地阐释了人工智能和提示工程的复杂主题，不仅易于理解，更重要的是实用。提示工程指南是理解与人工智能使用相关的术语、基础要素以及商业和伦理考量的关键资源。”
- en: ''
  id: totrans-297
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**—Deborah Westphal,** *Author of Convergence*'
  id: totrans-298
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—黛博拉·韦斯特法尔**，*《融合》一书的作者*'
