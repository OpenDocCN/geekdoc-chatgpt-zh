  zh: '[252](#eula.xhtml#Page_252)'
- en: As always, Donna translates what was somewhat overwhelming into a practical
    how‐to and step‐by‐step guide that will be a game‐changer for us all. Every team
    member in every organisation needs this book on their shelf to use ChatGPT to
    increase their capacity. I've already used it for social media content plans,
    sharing stories and metaphors in content and finding ways to delight my customers
    that would have taken hours of time but with ChatGPT we're done in a few minutes.
    I'm off to create more clever prompts to help me optimise my time even more!
  id: totrans-309
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 和往常一样，多娜将一些令人感到压倒性的内容转化为实用的操作指南和逐步指南，这将对我们所有人都是一个颠覆性的变化。每个组织中的每个团队成员都需要这本书放在他们的书架上，以便使用ChatGPT来提高他们的能力。我已经用它来制定社交媒体内容计划，分享故事和隐喻，以及找到让客户高兴的方法，这些原本可能需要数小时的时间，但有了ChatGPT，我们几分钟就完成了。我正要去创建更多巧妙的提示，以帮助我进一步优化我的时间！
- en: ''
  id: totrans-310
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '** —Jane Anderson, award‐winning business consultant, *Forbes* contributor
    and author of ten books**'
  id: totrans-311
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—Jane Anderson，获奖的商业顾问、《福布斯》撰稿人和十本书的作者**'
- en: Donna has shared a wealth of insights about the potentials (and the perils)
    associated with ChatGPT. She cleverly explores practical examples that illustrate
    how we can leverage the tool, both professionally and personally, so we can save
    our most precious resources as humans, TIME! This book was a catalyst for me to
    start to think about the myriad of other ways to bolster my productivity with
    ChatGPT.
  id: totrans-312
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 多娜分享了许多关于ChatGPT潜在（以及危险）的见解。她巧妙地探讨了实际例子，说明了我们如何利用这个工具，无论是在专业上还是个人生活中，以便我们能够节省作为人类最宝贵的资源——时间！这本书激发了我开始思考利用ChatGPT提高生产力的无数其他方式。
- en: ''
  id: totrans-313
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '** —Dr Kristy Goodwin, digital peak‐performance and wellbeing researcher, speaker
    and author**'
  id: totrans-314
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—Dr Kristy Goodwin，数字峰值性能和福祉研究员、演讲者和作家**'
- en: As someone who thought they already knew a lot about ChatGPT I was blown away
    by how much more I learned from this book. So many examples, tips and tricks to
    turbocharge anyone's ChatGPT journey. AI and machine learning aren't going away,
    and Donna's book equips you to come along for the ride. Exciting stuff.
  id: totrans-315
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作为一位认为自己已经对ChatGPT了解很多的人，我被这本书教会了我多少而感到震惊。有如此多的例子、技巧和窍门来加速任何人的ChatGPT之旅。人工智能和机器学习不会消失，Donna的书让你准备好加入这场旅程。令人兴奋的事情。
- en: ''
  id: totrans-316
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '** —Anne‐Marie Hyde, ACA, associate partner, Professional Services**'
  id: totrans-317
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—Anne-Marie Hyde，ACA，专业服务部门合伙人**'
- en: '*The ChatGPT Revolution* is a how‐to guide for anyone who wants to get up to
    speed on this new technology and use it to reclaim time for what matters most.
    Donna''s practical approach will help you quickly master using ChatGPT for day‐to‐day
    tasks from travel planning to letter writing … and before you know it you will
    wonder how you managed your life (and life admin) without it.'
  id: totrans-318
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*ChatGPT革命*是任何想要掌握这项新技术并利用它来为最重要的事情争取时间的指南。多娜的实用方法将帮助你快速掌握使用ChatGPT进行日常任务，从旅行计划到写信……在你意识到之前，你将
    wonder 如何在没有它的情况下管理你的生活（和生活管理）。'
- en: ''
  id: totrans-319
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '** —Dinah Rowe‐Roberts, co‐author of *Life Admin Hacks* and co‐host of the
    *Life Admin Hacks* podcast**'
  id: totrans-320
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—Dinah Rowe-Roberts，*Life Admin Hacks*的共同作者和播客主持人**'
- en: If you want the inside scoop on how to understand and use ChatGPT and AI, both
    personally and professionally, *The ChatGPT Revolution* is a must‐read! Whether
    you are new to ChatGPT or been deep in it, Donna McGeorge provides a practical
    breakdown of how to best utilise this mind‐blowing technology for productivity
    and efficiency!
  id: totrans-321
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你想了解如何理解和使用ChatGPT和AI，无论是个人还是专业上，*ChatGPT革命*都是必读之作！无论你是ChatGPT的新手还是已经深入其中，Donna
    McGeorge都提供了如何最佳利用这一令人惊叹的技术以提高生产力和效率的实用分析！
- en: ''
  id: totrans-322
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '** —Amy Yamada, business coach for Coaches & Entrepreneurs**'
  id: totrans-323
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**—Amy Yamada，教练和企业家商业教练**'
