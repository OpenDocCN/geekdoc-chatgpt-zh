  prefs: []
  type: TYPE_NORMAL
  zh: Donna McGeorge 让工作变得“工作”。
- en: She is passionate about enhancing the time we spend in the workplace (too much,
    for many of us) to ensure it is effective and productive, and enjoyable.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 她热衷于提高我们在工作场所（对我们中的许多人来说，时间太多）度过的时间，确保它是有效、高效且愉快的。
- en: Donna has worked with managers and leaders throughout Australia and the Asia–Pacific
    for over 20 years. In 2020 she, like many of us, transitioned her work from live,
    in‐person to online. She delivers productivity programs, keynotes and webinars
    globally across a mix of industries.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: Donna 在澳大利亚和亚太地区与管理者及领导者合作已有超过20年。在2020年，她像我们中的许多人一样，将她的工作从现场面对面转变为在线。她向全球多个行业的参与者提供生产力项目、主题演讲和网络研讨会。
- en: Her CV is as eclectic as her record collection (yes, classic vinyl). In addition
    to roles at Telstra, Qantas, Ernst & Young and Ansett, she has managed theatre,
    sports, and concert tours for the UK‐based travel company Keith Prowse, and been
    the Asia–Pacific organisational development manager for the Ford Motor Company
    in Shanghai.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 她的简历就像她的唱片收藏一样多样（是的，经典黑胶）。除了在 Telstra、Qantas、Ernst & Young 和 Ansett 等公司的职位外，她还管理过英国旅行公司
    Keith Prowse 的剧院、体育和音乐会巡演，并在上海担任福特汽车公司的亚太地区组织发展经理。
- en: Donna also shares her knowledge for good through appearances on *The Today Show*,
    *Sky News*, radio interviews across Australia, and articles for *Harvard Business
    Review*, *Forbes* and *Fast Company*, as well as local publications, including
    *The Age*, *Boss Magazine*, *Smart Company*, *B&T Magazine* and *HRM*.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: Donna 还通过在 *The Today Show*、*Sky News*、澳大利亚的电台采访以及为 *Harvard Business Review*、*Forbes*、*Fast
    Company* 以及当地出版物（包括 *The Age*、*Boss Magazine*、*Smart Company*、*B&T Magazine* 和
    *HRM*）撰写文章，通过分享她的知识来做好事。
- en: This book complements her best‐selling productivity series, ‘It's About Time’,
    which includes *The 25 Minute Meeting* (2018), *The First 2 Hours* (2019) and
    *The 1 Day Refund* (2022), also published by John Wiley & Sons.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 本书补充了她畅销的生产力系列《It's About Time》，该系列包括《25分钟会议》（2018年）、《前两小时》（2019年）和《一天退款》（2022年），也由
    John Wiley & Sons 出版。
- en: She runs her business from her home on the Redcliffe Peninsula, in South East
    Queensland, a region known for its world‐class beaches, but her most creative
    moments come while sipping tea on her verandah, enjoying her garden with her husband,
    Steve, and her dog, Prudence.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 她在东南昆士兰州的雷德克利夫半岛的家中经营她的生意，这个地区以其世界级的海滩而闻名，但她的最具创意的时刻是在阳台上品茶，与丈夫史蒂夫和她的狗普鲁登斯一起享受花园。
- en: Donna believes that while workplaces are complex, they are not hard. More often
    than not it's getting the simple things right, consistently, that has the greatest
    impact.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 多娜相信，尽管工作场所很复杂，但并不困难。大多数情况下，正确地做简单的事情，并持续这样做，会产生最大的影响。
- en: She also knows that when we decide to be intentional, we can surprise ourselves
    with what we can achieve.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 她也知道，当我们决定有意识地去做时，我们可以用我们所能取得的成就来惊讶自己。
- en: '[www.donnamcgeorge.com](http://www.donnamcgeorge.com/)'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: '[www.donnamcgeorge.com](http://www.donnamcgeorge.com/)'
- en: Acknowledgements
  id: totrans-348
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 致谢
- en: In 2018, I published my first ‘proper’ book, *The 25 Minute Meeting*. It was
    a super‐steep learning curve, and I couldn't have done it without the team who
    supported me. In 2019, just a year later, I published *The First 2 Hours* and,
    in 2022 following the global pandemic, I published my third book, *The 1 Day Refund*.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 2018年，我出版了我的第一本“真正”的书，《25分钟会议》。这是一次超级陡峭的学习曲线，没有团队的支持我无法完成。2019年，仅仅一年后，我出版了《前两小时》，然后在2022年全球大流行之后，我出版了我的第三本书，《一日退款》。
- en: I thought I was done.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 我以为我已经完成了。
- en: And then I got a call from Lucy Raymond at Wiley offering me the opportunity
    to write this book.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我接到来自威利出版社的露西·雷蒙德的电话，她给我提供了写这本书的机会。
- en: The difference this time is that it came at a challenging time both personally
    and professionally, and I wasn't sure if I had the capacity to write another book.
    And … here we are.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 这次的不同之处在于，它发生在个人和职业上都具有挑战性的时刻，我并不确定我是否有能力再写一本书。而且……我们就在这里。
- en: Again, it has been a team effort.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这是一次团队的努力。
- en: Lucy Raymond, Leigh McLennon, Melanie Dankel, Ingrid Bond, Renee Aurish and
    the team at Wiley — thank you for offering me this opportunity. You have opened
    up my work to a whole new market with this one and, despite the frantic pace,
    it felt effortless.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 露西·雷蒙德、利·麦克莱农、梅勒妮·丹克尔、英格丽德·邦德、雷妮·奥里什和威利出版社的团队——感谢你们给我这个机会。你们通过这本书将我的作品推向了一个全新的市场，尽管节奏紧张，但感觉却轻松自如。
- en: 'Kelly Irving: For running your eye over my shitty first draft and realigning
    me with the purpose for the book.'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 凯莉·艾灵：感谢你审阅我的糟糕的第一稿，并让我重新与这本书的目的保持一致。
- en: 'Joanne Smith: My sister and often partner in crime. We decided to get curious
    early about ChatGPT and kept sharing our various discoveries and delights as it
    saved us hours of work in the creation of content.'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 乔安妮·史密斯：我的姐妹，也是我的犯罪伙伴。我们决定早早地对ChatGPT产生好奇心，并持续分享我们的各种发现和喜悦，因为它在内容创作上为我们节省了数小时的工作。
- en: 'Janine Garner: For being my sounding board. You experienced the highs and lows
    of this book and had my back the whole way.'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 珍妮·加纳：感谢你作为我的声音板。你经历了这本书的起伏，一直支持着我。
- en: 'Maree Burgess: My conscience. Whenever I have a dilemma, you help me cut right
    to the chase, providing clarity where there was confusion.'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 玛丽·伯格斯：我的良心。每当我遇到困境时，你都会帮我直截了当地解决问题，提供清晰，消除困惑。
- en: 'Anne Marie: Once again your honesty and humour in applying your exquisite knowledge
    of the Queen''s English are appreciated and loved. Thank you.'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 安妮·玛丽：再次感谢你在申请时展现出的诚实和幽默，以及你对女王英语的精湛知识。非常感谢你。
- en: 'Emma McGeorge: You continue to be the inspiration for much of my writing as
    I strive to create a better working environment for everyone and, particularly,
    for you. I love you, my darling girl.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 埃玛·麦克乔治：你继续是我写作的灵感来源，我努力创造一个更好的工作环境，尤其是为你。我爱你，我亲爱的女儿。
- en: And, finally, there is nothing I could do in my professional or personal life
    without the loving support of my husband, Steve. This one was particularly challenging
    because of the compressed time frames, and you were patient and understanding
    as our carefully curated life was interrupted.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，没有我的丈夫史蒂夫在专业和个人生活中的无私支持，我无法做任何事情。这次尤其具有挑战性，因为时间非常紧迫，你耐心且理解，在我们精心策划的生活被打断时，你一直支持着我们。
- en: Introduction
  id: totrans-362
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: It's been just over 12 months since the first edition of *The ChatGPT Revolution*
    hit the shelves. In that time, I've seen an explosion of curiosity and enthusiasm
    about ChatGPT from people everywhere. So many of us want to explore how the power
    of AI tools like ChatGPT can be used to improve our daily lives.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 自《ChatGPT革命》第一版上市以来，已经过去了12个多月。在这段时间里，我看到了人们对ChatGPT的极大好奇心和热情。我们中的许多人想要探索如何利用像ChatGPT这样的AI工具的力量来改善我们的日常生活。
- en: While writing this second edition, I reflected on how much has changed in such
    a short time span. We've gone from one simple app that helped with tricky emails
    to now, when ChatGPT has its own app store where developers can create and sell
    new GPT tools.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写这个第二版的过程中，我反思了在如此短的时间内发生了多大的变化。我们从帮助处理复杂电子邮件的一个简单应用，发展到ChatGPT现在有自己的应用商店，开发者可以创建和销售新的GPT工具。
- en: Things certainly have been progressing at pace.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 事情确实在以很快的速度发展。
- en: The artificial intelligence landscape has continued to evolve, giving us an
    almost‐equal mix of new opportunities and challenges. It's increasingly apparent
    that there is massive potential for ChatGPT and other generative AI applications
    to revolutionise the way we work and manage our lives.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能领域持续发展，为我们带来了几乎相等的新机遇和挑战。越来越明显的是，ChatGPT和其他生成式AI应用有巨大的潜力改变我们工作和管理生活的方式。
- en: In this updated edition, I build upon the foundations laid in the first, covering
    even more practical applications for ChatGPT and exploring the latest advances
    and trends in AI.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个更新版中，我基于第一版的基础，涵盖了ChatGPT的更多实际应用，并探讨了AI的最新进展和趋势。
- en: As always, I invite you to approach these pages with an open mind and a willingness
    to embrace possibility.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，我邀请您以开放的心态和愿意拥抱可能性的态度来阅读这些页面。
- en: AI and related technologies are not going anywhere. In fact, they are becoming
    more pervasive every week. The future belongs to those who are willing to seize
    it, and with ChatGPT and this book by your side, you'll be off to a great start.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和相关技术不会消失。事实上，它们每周都在变得更加普遍。未来属于那些愿意抓住它的人，而有了ChatGPT和这本书，你将有一个很好的开始。
- en: I write books about productivity because I'm on a mission to give people back
    time for the most important things in their world. I get ideas for books when
    I speak with people in organisations about the things that are preventing them
    from being their best selves or doing their best work.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 我写关于生产力的书，因为我有一个使命，那就是让人们回到他们世界中最重要的东西上。当我与组织中的人们交谈，了解阻碍他们成为最好的自己或做最好的工作的东西时，我会得到写书的灵感。
- en: Hence my books are about things like meetings, structuring your day, and creating
    space to think and breathe.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我的书是关于会议、安排你的日程，以及创造思考和呼吸的空间。
- en: So, when my publisher came to me and asked me to write a book about how artificial
    intelligence (AI) or, more specifically, generative AI applications like ChatGPT,
    could help us with productivity, I went straight back to the problems that people
    share with me.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我的出版商找到我，并要求我写一本关于人工智能（AI）或更具体地说，像ChatGPT这样的生成式AI应用如何帮助我们提高生产力的书时，我立刻回到了人们与我分享的问题。
- en: 'In addition to the three things above, the issues that I regularly hear about
    (that may be future books) include:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述三件事之外，我经常听到的（可能是未来的书籍）问题包括：
- en: delegation
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 委派
- en: decisions
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策
- en: email
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电子邮件
- en: information overload
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息过载
- en: admin tasks
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理任务
- en: life admin.
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生活管理
- en: 'I''m sure the list goes on and on. This is the stuff that prevents us from
    doing our ‘real’ work. We would describe it as mundane, tedious and not very value‐adding,
    particularly if they are tasks we don''t do very often. For example, when was
    the last time you had to:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信这个列表还可以继续下去。这些都是阻止我们做“真正”工作的东西。我们会将其描述为平凡、乏味且不太增值的任务，尤其是如果我们不经常做这些任务的话。例如，你上一次需要做什么？
- en: write a job description and ad for a role
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为一个职位编写工作描述和广告
- en: write a policy or procedure for a new starter in an organisation
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为组织中的新员工编写政策或程序
- en: develop a presentation or proposal from scratch
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从零开始开发一个演示或提案
- en: handle a client complaint
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理客户投诉
- en: plan an event?
  id: totrans-385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计划一个活动？
- en: All of these infrequent tasks take up a huge amount of time when you only do
    them on rare occasions, particularly if you are starting from scratch. They are
    difficult to delegate because (a) you don't do them very often, so (b) it's easier
    and quicker to just do them yourself.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些不经常做的任务，当你只在罕见的情况下做时，会占用大量的时间，尤其是如果你是从零开始的话。它们很难委托，因为（a）你不太经常做这些，所以（b）自己动手做更容易、更快。
- en: Generative AI applications like ChatGPT provide us with a tool to get through
    mundane tasks. A tool to clean our slate of repetitive, uninteresting and demotivating
    work that must be done. The stuff that prevents us from doing higher value work
    or keeps us from our families or the things we work for.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 类似ChatGPT的生成式AI应用为我们提供了一个工具，帮助我们完成日常任务。一个工具，清除我们重复、无趣和令人泄气的必须完成的工作。这些工作阻碍我们从事更有价值的工作，或者让我们远离家庭或我们为之奋斗的事物。
- en: Irrespective of where you are in an organisation, you now have a virtual assistant,
    intern or support person to help you get through these mundane tasks up to 50
    per cent faster than you were doing them before.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你在组织中的位置如何，你现在都有一个虚拟助手、实习生或支持人员来帮助你以比以前快50%的速度完成这些日常任务。
- en: A study in March 2023 by MIT found that by combining ChatGPT with human input,
    productivity increased by between 35 and 50 per cent and the quality improved
    by up to 25 per cent. More recent studies (Cornell University, 2024) uphold those
    findings that with the help of ChatGPT, participants perform better in terms of
    stronger results and less time taken to complete tasks.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年3月，麻省理工学院的一项研究发现，通过将ChatGPT与人类输入相结合，生产力提高了35%至50%，质量提高了高达25%。更近期的研究（康奈尔大学，2024年）支持这些发现，即借助ChatGPT，参与者在结果更强劲和完成任务所需时间更短方面表现更好。
- en: 'The question at this point is: *Could you use some help to simplify your life
    and work, and free up more time in your day?* If so, read on.'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 目前的问题是：*你是否需要一些帮助来简化你的生活和工作，并在你的日常生活中腾出更多时间？* 如果是这样，请继续阅读。
- en: What will you use all this free time for?
  id: totrans-391
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你会用所有这些空闲时间做什么？
- en: For centuries, technological advances from the printing press through to the
    vacuum cleaner were invented to give us more leisure time. Instead, all it did
    was give us more time for work.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 几个世纪以来，从印刷机到吸尘器等技术的进步都是为了给我们带来更多的休闲时间。然而，结果却是我们有了更多的工作时间。
- en: According to Oliver Burkeman, we are destined to be on the planet for about
    4000 weeks. I found this sobering, and it brought into focus my mortality, which
    begged the further, somewhat less philosophical thought, ‘I'm running out of time,
    so I'd better use that time wisely.’
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 根据奥利弗·伯克曼的说法，我们注定要在地球上度过大约4000周。我发现这令人深思，它使我的 mortality（寿命）问题更加突出，这进一步引发了一个不那么哲学性的思考：“我的时间不多了，所以我最好明智地利用这段时间。”
- en: Now is the time to leverage technological advancements, like AI and ChatGPT,
    to make that promise of increased leisure time a reality.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是利用技术进步，如人工智能和ChatGPT，将增加休闲时间的承诺变为现实的时候了。
- en: There's been a lot of buzz around ChatGPT and AI, and while you may have heard
    a thing or two about it, chances are you've picked up this book because you may
    not understand what it does and how it could be useful to you in taking back some
    of your valuable time.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和AI已经引起了很大的关注，虽然你可能已经听说过一些关于它的信息，但很可能你拿起这本书是因为你可能不了解它做什么以及它如何能帮助你夺回一些宝贵的时间。
- en: This book is about getting beyond the buzz and giving you access to a productivity
    boon.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是关于超越喧嚣，为你提供进入生产力宝库的途径。
- en: 'Right now, people are already using ChatGPT (or their platform of choice) to
    generate:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，人们已经在使用ChatGPT（或他们选择的平台）来生成：
- en: difficult emails
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 难以发送的电子邮件
- en: process flow charts
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流程图
- en: instruction guides
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示指南
- en: presentation outlines
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 演示大纲
- en: job descriptions
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职位描述
- en: job applications
  id: totrans-403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 求职申请
- en: administrative tasks
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理任务
- en: summaries and analyses of large amounts of information
  id: totrans-405
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大量信息的摘要和分析
- en: product descriptions
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品描述
- en: content, articles and blogs.
  id: totrans-407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容、文章和博客。
- en: And in case you are wondering, yes, some people are using it to help write books
    (I'll get to that later).
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有所怀疑，是的，有些人正在用它来帮助写书（我稍后会提到这一点）。
- en: Generative AI platforms like ChatGPT represent a significant step forward in
    the ability of computers to understand and respond to human language. They have
    the potential to transform the way people interact with technology, providing
    a more natural and intuitive experience.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于ChatGPT的生成式AI平台代表了计算机理解和回应人类语言能力的一个重大进步。它们有潜力改变人们与技术互动的方式，提供更自然和直观的体验。
- en: But, as with any new technology or time‐saving application, there's always a
    danger that it could end up creating more work than it saves. Email was supposed
    to make our lives easier, but it has ended up being a nightmare for a lot of us.
    I'm reminded of the German word *Verschlimmbesserung*, which means ‘an intended
    improvement that makes things worse’.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，就像任何新技术或节省时间的应用一样，总有可能它最终会创造出比节省的更多的工作。电子邮件原本是为了让我们的生活更轻松，但最终却成了我们很多人的噩梦。我想起了德语单词
    *Verschlimmbesserung*，它的意思是“一个本意上想要改进但反而使事情变得更糟的行为”。
- en: 'If used effectively, generative AI has the potential to free up valuable time
    for other activities, so I think the real question is: *What will you do with
    that time?* As technology continues to advance and make tasks easier and more
    efficient, it is up to us to decide how to use our new‐found free time.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有效使用，生成式AI有可能为其他活动释放宝贵的时间，因此我认为真正的问题是：*你将如何利用这段时间？* 随着技术的持续进步和使任务变得更简单、更高效，决定如何使用我们新发现的空闲时间取决于我们。
- en: It's important to understand that ChatGPT is only one example of a generative
    AI platform. Right now, ‘ChatGPT’ is often used like a generic trademark for all
    things generative AI (think ‘Esky’ and ‘Band‐Aid’, where one brand stands in for
    all brands!). But despite ChatGPT being the big first mover in this space, writing
    tools like Jasper AI have been around since February 2021.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要理解ChatGPT只是生成式AI平台的一个例子。目前，“ChatGPT”经常被用作所有生成式AI的通用商标（想想“Esky”和“Band-Aid”，其中一个品牌代表所有品牌！）。尽管ChatGPT是这个领域的先行者，但像Jasper
    AI这样的写作工具自2021年2月以来就已经存在。
- en: 'Since ChatGPT was released in November 2022, new and alternative platforms
    include:'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 自ChatGPT于2022年11月发布以来，新的和替代的平台包括：
- en: Copilot (formerly Bing AI) — developed by OpenAI (the owners of ChatGPT) in
    partnership with Microsoft
  id: totrans-414
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Copilot（以前称为Bing AI）——由OpenAI（ChatGPT的所有者）与微软合作开发
- en: Google Gemini — initially called Google Bard, and trained on its own language
    model PaLM 2
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Google Gemini（最初称为Google Bard，并基于其自己的语言模型PaLM 2进行训练）
- en: Claude — a next‐generation AI assistant carefully designed to follow ethical
    principles for avoiding toxic, harmful or discriminatory outputs and illegal activities.
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Claude——一个下一代AI助手，经过精心设计，旨在遵循避免有毒、有害或歧视性输出以及非法活动的道德原则。
- en: And even ChatGPT has a new free version, called GPT‐4o (omnimodel), which is
    a vast improvement on previous versions.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是ChatGPT也有一个全新的免费版本，称为GPT-4o（omnimodel），它在之前的版本上有了巨大的改进。
- en: Some platforms target specific industries. For example, Jasper AI was developed
    for those working in marketing, search engine optimisation (SEO) and content creation
    (like blogs or articles). As the industry grows, it's likely that more platforms
    will be trained on data for increasingly specific uses.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 一些平台针对特定行业。例如，Jasper AI是为从事市场营销、搜索引擎优化（SEO）和内容创作（如博客或文章）的人开发的。随着行业的增长，很可能会有更多平台基于越来越具体的数据进行训练。
- en: The good news is, whichever platform you choose, the principles in this book
    will help you to get the most out of it. That's because this book shows you how
    to interact with any generative AI platform in the most efficient way. You'll
    learn how to write great prompts and queries that instruct the AI in exactly what
    you want.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，无论你选择哪个平台，这本书中的原则都会帮助你最大限度地利用它。这是因为这本书展示了如何以最有效的方式与任何生成式AI平台互动。你将学习如何编写出色的提示和查询，以指导AI精确地完成你想要的任务。
- en: 'Disclaimer: Before going any further, you need to know that these technologies
    are moving extremely fast, and they are full of errors. Even while writing this
    new edition, things were changing, and rumours were rife with what the next versions
    and new applications would provide. With a technology this explosive, chances
    are some of the ideas covered in this book could be considered obsolete before
    it even hits the shelves. Despite this, the fundamentals covered in this book
    provide core strategies for getting the most out of AI and, more specifically,
    ChatGPT.'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 声明：在继续阅读之前，你需要知道这些技术正在快速发展，并且充满了错误。即使在撰写这一新版本时，事情也在变化，关于下一个版本和新应用的谣言四起。对于这样爆炸性的技术，这本书中涵盖的一些想法可能在它甚至上架之前就被认为是过时的。尽管如此，这本书中涵盖的基本原理提供了从AI中获得最大利益的核心理略。
- en: We are still very much in the early stages of adoption, with only 15 per cent
    of Australians using generative AI to simplify their lives. That means you, right
    now, have a chance to be an innovator, at the forefront of this change in how
    we approach our daily tasks at work, home and on the go.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然处于采用的早期阶段，只有15%的澳大利亚人使用生成式AI来简化他们的生活。这意味着现在，你有机会成为一个创新者，站在我们如何处理日常工作任务、家中和路上的这一变革的最前沿。
- en: You have no time to lose.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 你没有时间可以浪费。
- en: It's time to join the revolution.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候加入这场革命了。
- en: How to use this book
  id: totrans-424
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用这本书
- en: This book mirrors the way I run my webinars, workshops, corporate programs and
    hands‐on sessions. It is practical and easy to read and navigate, so you can quickly
    implement real yet simple changes in the way you work.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书反映了我是如何运行我的网络研讨会、研讨会、企业项目和实操课程的。它实用、易于阅读和导航，因此你可以快速实施实际而简单的工作方式上的改变。
- en: 'It isn''t a hefty tome that you''ll have trouble carrying around, or that you''ll
    leave on your bedside table to gather coffee‐cup stains. Rather, it offers:'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一本你难以携带的厚重书籍，或者你会把它留在床头柜上，让它沾满咖啡杯的污渍。相反，它提供了：
- en: quick tips
  id: totrans-427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速提示
- en: real‐life stories
  id: totrans-428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 真实的故事
- en: lots of no‐nonsense advice
  id: totrans-429
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大量的务实建议
- en: practical exercises to get you started.
  id: totrans-430
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实践练习，帮助你开始。
- en: Questions throughout the book will encourage you to reflect on how you're working
    now and how you could use ChatGPT (or your platform of choice) to work simpler
    and smarter.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 书中的问题将鼓励你反思你现在的工作方式，以及如何使用ChatGPT（或你选择的平台）来工作得更简单、更聪明。
- en: My suggestion for working through this book is to keep it simple and achievable.
    Start small and work your way up to the bigger concepts. Read the book and choose
    one or two things that resonate strongly with you. Then start to action those
    immediately. (You will thank me when you see how simple it really is.)
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议在阅读这本书时保持简单和可实现。从小处着手，逐步过渡到更大的概念。阅读这本书，选择一两个与你强烈共鸣的点。然后立即采取行动。（当你看到它有多么简单时，你会感谢我的。）
- en: '[Part I](#p01.xhtml) is all about what ChatGPT is and the long history of artificial
    intelligence (AI) and machine learning (ML). You may not realise how much you
    are already using AI and ML in your day‐to‐day life. We will also cover why it''s
    important to be curious and take the opportunity to learn about ChatGPT and other
    AI/ML technologies. They are here to stay. It''s time to get on board.'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: '[第一部分](#p01.xhtml)主要介绍ChatGPT是什么，以及人工智能（AI）和机器学习（ML）的漫长历史。你可能没有意识到，你已经在日常生活中大量使用了AI和ML。我们还将讨论为什么保持好奇心并抓住机会学习ChatGPT和其他AI/ML技术是重要的。它们将一直存在。是时候加入这一行列了。'
- en: '[Part II](#p02.xhtml) introduces practical strategies to get started with ChatGPT
    and help you be productive at work, at home and on the go. Imagine having a permanent
    intern or virtual assistant at your side to get some of your mundane work out
    of the way. That''s what''s on offer here!'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: '[第二部分](#p02.xhtml)介绍了如何开始使用ChatGPT以及如何在工作中、家中和路上提高生产力的实用策略。想象一下，身边有一个永久的实习生或虚拟助手来帮你处理一些日常的工作。这正是这里所提供的！'
- en: '[Part III](#p03.xhtml) is about the creative uses of ChatGPT and generative
    AI: How writing a book is now possible for anyone. Or getting the perfect image
    or illustration for an article is at your fingertips. Or how easy it is now to
    write a poem for your valentine. The sky is the limit!'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: '[第三部分](#p03.xhtml)是关于ChatGPT和生成式AI的创造性用途：现在任何人都可以写书。或者，为文章获取完美的图片或插图现在就在你的指尖。或者，现在写一首情诗给你的爱人变得多么容易。天空是无限的！'
- en: As you read this book, I'd like you to heed the advice from my late mentor and
    friend, Roger Deaner, who told me to ‘believe nothing, and test or try everything’.
    This has helped me maintain my curiosity in the face of negativity, blowhardedness
    (I don't know if that's even a word!), and ‘splaining.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读这本书时，我希望你们能听从我已故的导师和朋友罗杰·迪恩纳的建议，他告诉我“不要相信任何事，要测试或尝试一切”。这帮助我在面对消极情绪、夸夸其谈（我不知道这算不算一个词！）和“解释”时保持好奇心。
- en: So, this may seem counter‐intuitive … but I encourage you to not believe everything
    I say in this book. Instead, I want you to get curious about generative AI and
    explore it for yourself. This will provide you with a hands‐on experience of its
    capabilities and limitations and allow you to explore its potential applications.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这可能会显得有些反直觉……但我鼓励你们不要相信这本书中我说的一切。相反，我希望你们对生成式AI产生好奇心，并亲自去探索它。这将为您提供对其能力和局限性的实际体验，并让您探索其潜在的应用。
- en: As you read, you will find I can be a little irreverent at times — because life
    and work are way too important to be taken too seriously. And reading a book should
    be a pleasure, not a pain!
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读过程中，你们会发现我有时会有些不敬——因为生活和工作的确太过重要，不能过于认真。而读书应该是一种乐趣，而不是痛苦！
- en: So please read, implement, experiment and have fun immersing yourself in the
    world of AI, ML and ChatGPT!
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 所以请阅读、实施、实验，并享受沉浸于AI、机器学习（ML）和ChatGPT的世界中的乐趣！
- en: PART I
  id: totrans-440
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一部分
- en: GET CURIOUS
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 保持好奇心
- en: '![bulb design](images/bulb_kd.png)'
  id: totrans-442
  prefs: []
  type: TYPE_IMG
  zh: '![灯泡设计](images/bulb_kd.png)'
- en: What does Albert Einstein, your car and an African wildebeest have in common?
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔伯特·爱因斯坦、你的汽车和非洲斑马有什么共同之处？
- en: No, this isn't the start of a corny joke, and the answer is the global positioning
    system (GPS).
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 不，这并不是一个老套笑话的开头，答案是全球定位系统（GPS）。
- en: Because of Einstein's theory of relativity, GPS systems can help us get from
    A to B in our cars, and also track the migratory patterns of animals on the planet,
    including wildebeest, arctic terns and humpback whales.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 由于爱因斯坦的相对论，GPS系统可以帮助我们在汽车中从A点到B点，还可以追踪地球上包括斑马、北极燕鸥和座头鲸在内的动物的迁徙模式。
- en: Do you think that Einstein had the tracking of birds’ migratory patterns in
    mind when he stood in front of four blackboards‐worth of calculations and then
    simplified it to E=MC2 ? Unlikely, and yet here we are.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 你们认为爱因斯坦站在四块黑板那么多的计算面前，然后将其简化为E=MC2时，会想到鸟类的迁徙模式追踪吗？不太可能，但事实就是这样。
- en: Albert Einstein is widely regarded as one of the most brilliant scientists in
    history. Throughout his life, he was driven by an insatiable curiosity that led
    him to question the very foundations of our understanding of the universe.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔伯特·爱因斯坦被广泛认为是历史上最杰出的科学家之一。在他的一生中，他驱动着一种无法满足的好奇心，这使他质疑我们对宇宙理解的根基。
- en: It's his curiosity, and that of those who stood on his shoulders, that has resulted
    in us having access to this extraordinary technology, not only in our cars, but
    on the smartphones we carry around in our pockets.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 正是他对好奇心，以及那些站在他肩膀上的人的好奇心，让我们能够接触到这项非凡的技术，不仅在我们的汽车中，还在我们口袋里携带的智能手机上。
- en: You may not realise it, but the masses have only had access to GPS since 2010,
    and look at how it has already become integrated into our lives. We couldn't get
    a ride share car, know the time or plan a picnic for a nice day without it.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 你们可能没有意识到，但大众直到2010年才有机会使用GPS，看看它已经如何融入我们的生活。没有它，我们无法叫到共享汽车，无法知道时间，也无法计划一个美好的野餐。
- en: Like GPS, artificial intelligence (AI) and applications like ChatGPT are here
    to stay, and the extent of their use, and subsequent integration into our lives,
    is still unclear. Even when writing this new edition, changes were happening on
    a daily basis and people were sharing how they were using AI to the point where
    I couldn't keep pace with it.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 就像GPS一样，人工智能（AI）和像ChatGPT这样的应用将长期存在，它们的使用范围以及随后融入我们生活的程度仍然不明朗。即使在撰写这个新版本时，每天都有变化，人们分享他们如何使用AI，以至于我无法跟上它的步伐。
- en: What has kept me going, and got this book into your hands, is staying open‐minded
    and being curious.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 什么让我一直坚持下去，并让这本书出现在你们手中，就是保持开放的心态和好奇心。
- en: '**Curiosity plays a critical role in driving progress and shaping our understanding
    of new technologies.**'
  id: totrans-452
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**好奇心在推动进步和塑造我们对新技术理解方面发挥着关键作用**。'
- en: Let's face it, in today's world, where technological breakthroughs are happening
    at an unprecedented pace, staying current and informed can be challenging. You
    barely have time to keep up with your email and calendar, let alone new discoveries!
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们面对现实，在当今这个技术突破以前所未有的速度发生的世界上，保持最新和了解信息可能具有挑战性。你几乎都没有时间处理你的电子邮件和日历，更不用说新的发现了！
- en: 'You need to take time to get curious about the merits of ChatGPT and AI more
    generally and understand how it can simplify your life and work  —  and ultimately
    save you time. Try some of the following:'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要花时间对ChatGPT和人工智能的益处感到好奇，更广泛地了解它如何简化你的生活和工作——最终为你节省时间。尝试以下一些方法：
- en: Carve out some time to get to know what it's all about. You probably only need
    an hour.
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 挤出一些时间来了解这一切。你可能只需要一个小时。
- en: Read articles from different perspectives and discuss it with colleagues.
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从不同角度阅读文章，并与同事讨论。
- en: Think about ways you might be able to use it, and get a clearer picture of how
    it can help you.
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想想你可能如何使用它，并更清楚地了解它如何帮助你。
- en: Have an opinion. There is a lot of information out there right now about this
    tool, and it's coming from a range of perspectives. Decide for yourself how useful
    (or not) it could be for you.
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有自己的观点。现在关于这个工具的信息很多，而且来自各种不同的视角。自己决定它对你（或不）有多有用。
- en: And in the meantime, let's dig a bit further into how we can use this tool to
    make your work and life easier.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，让我们进一步探讨如何使用这个工具使你的工作和生活变得更轻松。
- en: CHAPTER 1
  id: totrans-460
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章
- en: What is ChatGPT?
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是ChatGPT？
- en: My mate Sam has always been an avid user of social media, was a very early adopter
    of apps like Facebook and Instagram, and is always quickly on board with other
    tech. She was actually the first person to ask me about ChatGPT.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 我的伙伴山姆一直是社交媒体的狂热用户，是Facebook和Instagram等应用的早期采用者，并且总是迅速地接受其他技术。她实际上是我第一个询问ChatGPT的人。
- en: When it came to her socials, she loved sharing her thoughts, pictures and updates
    with her friends and family. However, as she scrolled through her feed one day,
    she felt like something was a bit off.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到她的社交圈时，她喜欢与她的朋友和家人分享她的想法、图片和更新。然而，有一天当她浏览她的动态时，她感觉有点不对劲。
- en: While advertising and sponsored posts had been in her feeds for a while, suddenly
    it felt like every sponsored post or ad was perfect and her desire to hit ‘buy’
    was getting a bit out of control.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然广告和赞助内容已经在她的动态中存在了一段时间，但突然感觉每个赞助内容或广告都完美无缺，她点击“购买”的欲望似乎有些失控。
- en: '************It was as if the social media platform knew her better than she
    knew herself.************'
  id: totrans-465
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '************仿佛社交媒体平台比她自己更了解她。************'
- en: What Sam didn't know was that, around 2013, Facebook started to get very smart
    about the content it was pushing to its users.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 萨姆不知道的是，大约在2013年，Facebook开始非常聪明地推送内容给它的用户。
- en: 'Power Digital, a digital marketing company, wrote that in 2013:'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 数字营销公司Power Digital在2013年写道：
- en: Have you ever found yourself scrolling through social media and suddenly an
    ad pops up that just seems perfect for you? Maybe it's a product that you've been
    thinking about or a service that you've been meaning to try.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有发现自己正在浏览社交媒体，突然一个似乎非常适合你的广告弹出来？也许是你一直在考虑购买的产品或你打算尝试的服务。
- en: That's how many of the social media AI and machine learning (ML) algorithms
    work. Serving up content, products and services that feel perfect for you based
    on your activity, and the activity of those connected to you.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是许多社交媒体人工智能和机器学习（ML）算法的工作方式。根据你的活动以及与你相关的人的活动，提供感觉非常适合你的内容、产品和服务的。
- en: Today, AI and ML is everywhere, from the personal assistants on our smartphones
    to the recommendation engines that suggest what movies to watch or products to
    buy. Here are some everyday examples of AI and ML in action.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，人工智能和机器学习无处不在，从我们智能手机上的个人助理到推荐引擎，它们会建议我们看什么电影或买什么产品。以下是一些人工智能和机器学习在日常生活中的应用实例。
- en: 'Online retailers like Amazon use ML algorithms to make recommendations based
    on your purchase history and browsing behaviour. For example, if you buy a book
    on Amazon, the site might suggest other books that are similar in topic or style:
    ‘If you liked *The ChatGPT Revolution*, then you might also like other books by
    Donna McGeorge.’'
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在线零售商如亚马逊使用机器学习算法根据你的购买历史和浏览行为进行推荐。例如，如果你在亚马逊上买了一本书，网站可能会建议其他在主题或风格上相似的书：“如果你喜欢*ChatGPT革命*，那么你可能也会喜欢Donna
    McGeorge的其他书籍。”
- en: Virtual assistants like Siri, Amazon Alexa and Google Assistant use natural
    language processing (NLP) to understand and respond to spoken or written commands.
    They can also perform simple tasks like setting reminders or playing music.
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虚拟助手如Siri、Amazon Alexa和Google Assistant使用自然语言处理（NLP）来理解和回应语音或书面命令。它们还可以执行简单的任务，如设置提醒或播放音乐。
- en: ChatBots, which are becoming increasingly popular for online customer service,
    use AI to simulate human conversation and provide assistance to users. For example,
    if you need help with an online purchase, a chatbot might be able to answer your
    questions and guide you through the process.
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatBots，它们在在线客户服务中越来越受欢迎，使用人工智能来模拟人类对话并向用户提供帮助。例如，如果你需要在线购买的帮助，聊天机器人可能能够回答你的问题并引导你完成这个过程。
- en: Autonomous vehicles, like self‐driving cars, use a combination of sensors, cameras
    and ML algorithms to navigate the road and avoid obstacles. These algorithms are
    trained on massive amounts of data, including images of road signs, traffic patterns
    and weather conditions.
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动驾驶汽车等自主车辆结合使用传感器、摄像头和机器学习算法来导航道路并避开障碍。这些算法在包括道路标志、交通模式和天气条件在内的海量数据上进行训练。
- en: Medical researchers are using ML algorithms to analyse large datasets of patient
    information, to identify patterns and make more accurate diagnoses. In some cases,
    ML algorithms have been able to diagnose certain conditions more accurately than
    human doctors.
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医学研究者在分析大量患者信息的大数据集时使用机器学习算法，以识别模式和做出更准确的诊断。在某些情况下，机器学习算法甚至能够比人类医生更准确地诊断某些疾病。
- en: '************And then along came ChatGPT.************'
  id: totrans-476
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '************然后ChatGPT出现了。************'
- en: But wait … what is ChatGPT?
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等…什么是ChatGPT？
- en: Let's cut to the chase with a definition that came from the horse's mouth.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们直接进入正题，用一个来自权威的定义来说明。
- en: '**Example prompt:** Describe what ChatGPT is.'
  id: totrans-479
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 描述一下ChatGPT是什么。'
- en: ''
  id: totrans-480
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** ChatGPT is a sophisticated computer program that uses a type of
    artificial intelligence called natural language processing to understand and respond
    to human language. It has been trained on a vast amount of text data and uses
    that knowledge to generate responses to a wide range of questions and topics.'
  id: totrans-481
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT：** ChatGPT是一个复杂的计算机程序，它使用一种称为自然语言处理的人工智能技术来理解和回应人类语言。它经过大量文本数据的训练，并利用这些知识来生成对广泛问题和话题的回应。'
- en: '**********It''s a bit like a virtual librarian who has read every book in the
    world''s largest library and can provide you with information on any topic you
    ask.**********'
  id: totrans-482
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********它有点像一个阅读过世界上最大图书馆中每一本书的虚拟图书管理员，可以就你提出的任何话题提供信息。**********'
- en: The ‘GPT’ in its name stands for ‘generative pre‐trained transformer’, which
    is the name of the neural network architecture that powers it.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 它名字中的“GPT”代表“生成式预训练变换器”，这是它所采用的神经网络架构的名称。
- en: It's like a smart robot that can talk to people and answer their questions.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 它就像一个能够与人交谈并回答他们问题的智能机器人。
- en: You know how you can ask Siri or Alexa to tell you a joke or play a song for
    you? ChatGPT uses similar technology, only it can do a whole lot more. As a language
    model, ChatGPT has been trained on a massive amount of data to be able to understand
    and generate human‐like (natural) language.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道你可以要求Siri或Alexa给你讲一个笑话或为你播放一首歌吗？ChatGPT使用类似的技术，但它能做更多的事情。作为一个语言模型，ChatGPT经过大量数据的训练，能够理解和生成类似人类的（自然）语言。
- en: This means that it can take in a question or a prompt in natural language and
    generate a response, also in natural language, similar to how a human would respond.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着它能够接收自然语言的问题或提示，并以自然语言生成回应，其方式类似于人类的回应。
- en: ChatGPT has been trained on a wide range of topics, from simple trivia questions
    to more complex topics like science, history and politics. Its large database
    of information allows it to provide detailed and (not always) accurate answers
    to a variety of questions. We'll talk more about accuracy in [Chapter 2](#c02.xhtml).
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在广泛的主题上进行了训练，从简单的常识问题到更复杂的科学、历史和政治话题。它庞大的信息数据库允许它对各种问题提供详细且（并非总是）准确的答案。我们将在[第二章](#c02.xhtml)中更多讨论准确性。
- en: You can use it for explanations of difficult concepts, to get advice on personal
    or professional matters, or even just have a conversation about a topic of interest.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用它来解释复杂的概念，获取关于个人或职业事务的建议，或者甚至只是就一个感兴趣的话题进行交谈。
- en: And it's fast! The first time I used it, I was stunned at how quickly the information
    started streaming onto the page.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 它的速度非常快！我第一次使用它时，对信息如何迅速流到页面上感到震惊。
- en: A brief history
  id: totrans-490
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简短的历史
- en: While the application ChatGPT feels new, the underlying principles and technologies
    have been around for quite a while.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT的应用感觉是新的，但其背后的原理和技术已经存在很长时间了。
- en: 'AI and ML have come a long way since their inception in the mid‐twentieth century.
    Although the term ‘artificial intelligence’ was first coined in 1956, the ideas
    behind it date back much further to the work of pioneers, such as:'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 自20世纪中叶诞生以来，人工智能和机器学习已经取得了长足的进步。尽管“人工智能”一词最早是在1956年提出的，但其背后的思想可以追溯到更早的先驱们的工作，例如：
- en: '**Charles Babbage** who designed the Difference Engine (a calculator), and
    a kind of early computer called the Analytical Engine during the 1820s. Considered
    the great‐grandparents of modern computers, they were never actually built; however,
    they inspired a whole generation of computer scientists and engineers. Babbage
    believed machines could perform tasks beyond just simple calculations — he was
    all about pushing the limits.'
  id: totrans-493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查尔斯·巴贝奇**设计了差分机（一种计算器）和一种在1820年代被称为分析机的前期计算机。它们被认为是现代计算机的曾祖父母，但从未真正建造过；然而，它们激发了一代计算机科学家和工程师。巴贝奇相信机器可以执行超越简单计算的
    tasks — 他总是致力于突破极限。'
- en: '**Ada Lovelace** who, as far back as the 1840s, is credited with coming up
    with the first ever computer algorithm. She worked with Charles Babbage on his
    Analytical Engine. Lovelace was a visionary and saw the potential for machines
    to learn and develop intelligence beyond their programming. Basically, she was
    the original AI thinker!'
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**阿达·洛芙莱斯**，早在1840年代，就被认为是第一个计算机算法的提出者。她与查尔斯·巴贝奇合作，在分析机上工作。洛芙莱斯是一位有远见的人，她看到了机器学习和发展超越其编程的智能的潜力。基本上，她就是最初的AI思想家！'
- en: '**Alan Turing** is considered the father of AI. He came up with the idea of
    the Universal Turing Machine, a machine that could perform any computation a human
    could. He also created the Turing test, which evaluates a machine''s ability to
    exhibit human‐like intelligence. His work was seriously groundbreaking and set
    the stage for the development of modern AI and ML.'
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**艾伦·图灵**被认为是人工智能之父。他提出了通用图灵机的概念，这是一种可以执行人类能够进行的任何计算机器。他还创造了图灵测试，该测试评估机器展现类似人类智能的能力。他的工作具有开创性的意义，为现代人工智能和机器学习的发展奠定了基础。'
- en: Fast‐forward to the twenty‐first century and ChatGPT is created by OpenAI, a
    research organisation founded by some of the biggest names in the technology world,
    including Elon Musk (who left the organisation in 2018) and Sam Altman.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 快进到21世纪，ChatGPT由OpenAI创建，这是一个由科技界一些最大人物创立的研究机构，包括埃隆·马斯克（他在2018年离开了该机构）和山姆·奥特曼。
- en: The team at OpenAI wanted to create a program that could understand human language
    and generate responses in a way that sounded like it was coming from a real person.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI团队希望创建一个能够理解人类语言并以真实人类的方式生成回应的程序。
- en: The first version of their language model was called GPT‐2, and it was released
    in 2019\. It was able to generate fairly good responses to all kinds of prompts,
    questions or statements. There were some concerns about how the technology could
    be used to spread fake news and propaganda, so OpenAI didn't release the full
    version of the program right away.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的语言模型的第一版被称为GPT-2，并于2019年发布。它能够对各种提示、问题或陈述生成相当好的回应。人们对这项技术可能被用来传播虚假新闻和宣传表示担忧，因此OpenAI没有立即发布程序的完整版本。
- en: The next version of the model, GPT‐3, was released in 2020, and it was even
    better than GPT‐2\. It was more sophisticated and powerful, and could generate
    not just coherent text, but creative writing and computer programming code. It
    was a huge step forward in everyday utility around time saving.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的下一个版本，GPT-3，于2020年发布，甚至比GPT-2更好。它更加复杂和强大，不仅能生成连贯的文本，还能生成创意写作和计算机编程代码。它在日常生活中的时间节省方面迈出了巨大的一步。
- en: ChatGPT was launched to the general public on 30 November 2022 and uses GPT‐3.5
    as its operating model. At the time of release, GPT‐3.5 was the largest AI language
    model out there with a whopping 175 billion parameters. This enabled it to perform
    a range of tasks, from translating languages to summarising texts to answering
    questions — all with minimal fine‐tuning. And fast!
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT于2022年11月30日向公众推出，并使用GPT-3.5作为其操作模型。在发布时，GPT-3.5是当时最大的AI语言模型，拥有1750亿个参数。这使得它能够执行一系列任务，从翻译语言到总结文本到回答问题——所有这些都不需要太多的微调。而且速度很快！
- en: In mid‐March 2023, ChatGPT was upgraded, with GPT‐4 providing even more firepower.
    It works with around 100 trillion parameters, meaning it can go well beyond writing
    essays and articles to creating art and music.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年3月中旬，ChatGPT进行了升级，GPT-4提供了更多的火力。它拥有大约100万亿个参数，这意味着它不仅能写文章和文章，还能创作艺术和音乐。
- en: To put the difference between GPT‐3.5 and GPT‐4 into perspective, it's like
    comparing the number of grains of sand on a beach to the number of grains of sand
    in the world. This means a whole bunch of new ways to incorporate it into work
    and home to relieve us of our administrivia and allow us to get on with enjoying
    life.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 要将GPT-3.5和GPT-4之间的差异放在正确的视角中，就像比较海滩上的沙粒数量和世界上的沙粒数量一样。这意味着有无数种方法可以将其融入工作和家庭，以减轻我们的行政负担，让我们能够继续享受生活。
- en: In May 2024, GPT‐4o was released. This new version merged many of the paid aspects
    of GPT‐4 into a free offering providing a Siri or Alexa style of conversational
    assistance but with much greater abilities. More on this later.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 2024年5月，发布了GPT-4o。这个新版本将GPT-4的许多付费功能合并为一个免费提供的产品，提供类似Siri或Alexa风格的对话助手，但能力要大得多。关于这一点稍后详述。
- en: GPT‐5 is the much‐anticipated next generation of ChatGPT. If we look at the
    differences between previous versions, we can expect GPT‐5 will have an even larger
    dataset, potentially reaching multiple trillions of parameters.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-5是备受期待的ChatGPT下一代。如果我们看看之前版本之间的差异，我们可以期待GPT-5将拥有更大的数据集，可能达到数万亿个参数。
- en: This will go a long way to improving ChatGPT's overall capability, reasoning,
    creativity, versatility and accuracy.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 这将大大提高ChatGPT的整体能力、推理、创造力、多功能性和准确性。
- en: In the year following the release of OpenAI's ChatGPT, Microsoft announced that
    its search engine, Bing, would integrate ChatGPT. This meant some of the initial
    limitations of recency and hallucination (more on this later) in ChatGPT were
    reduced significantly. Now we had a generative AI platform connected to the web!
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenAI的ChatGPT发布后的第二年，微软宣布其搜索引擎Bing将集成ChatGPT。这意味着ChatGPT在初期的一些局限性，如时效性和幻觉（稍后详述）得到了显著减少。现在我们有一个连接到网络的生成式AI平台！
- en: This was followed fairly quickly by an announcement from Microsoft that another
    AI‐powered tool, Copilot, would be added to their Microsoft 365 applications.
    With Copilot, your AI assistant is quite literally at your fingertips, within
    everyday apps like Word, Excel and PowerPoint.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，微软很快宣布将另一个由人工智能驱动的工具Copilot添加到他们的Microsoft 365应用程序中。有了Copilot，你的AI助手实际上就在你的指尖，在Word、Excel和PowerPoint等日常应用程序中。
- en: This is a very exciting development because Copilot is accessing and working
    with your own data, secure within your own network. So it's very safe for sensitive
    or private content.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常令人兴奋的发展，因为Copilot可以访问并处理你自己的数据，这些数据安全地存储在你的网络中。因此，对于敏感或私人内容来说非常安全。
- en: Interestingly, this is not Microsoft's first attempt at an AI‐type assistant.
    Do you remember the animated paperclip named Clippy, who used to appear in MS
    Office products between 1998 and 2003? Clippy was an intelligent user interface
    designed to assist MS Office users with help content. While useful for beginners,
    it was widely criticised by experienced users, who found it intrusive. (And I
    believe it now falls into the category of ‘let us never speak of this again’ in
    the hallways of Microsoft!)
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，这并不是微软第一次尝试人工智能助手。你还记得那个名为Clippy的动画纸夹吗？它在1998年至2003年之间出现在MS Office产品中。Clippy是一个智能用户界面，旨在帮助MS
    Office用户获取帮助内容。虽然对初学者有用，但它遭到了经验丰富用户的广泛批评，他们认为它很侵扰。（我相信现在它已经属于“让我们永远不再提起”的类别，在微软的走廊里！）
- en: '**********I like to think of ChatGPT as a virtual assistant, colleague or friend
    who can help you with work, provide advice or just have a casual conversation
    with you.**********'
  id: totrans-510
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********我喜欢将ChatGPT想象成一个虚拟助手、同事或朋友，他可以帮助你处理工作、提供建议，或者只是和你进行轻松的对话。**********'
- en: ChatGPT, like its peers, is a ‘large language model’ that has been trained on
    a massive dataset of text. This gives it the ability to understand and respond
    to natural language questions. And, just like a librarian who needs to continuously
    update their knowledge by reading new books, ChatGPT is regularly updated and
    fine‐tuned to ensure its responses are accurate and up to date.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT就像它的同行一样，是一个“大型语言模型”，它是在一个庞大的文本数据集上训练出来的。这使得它能够理解和回答自然语言问题。就像图书管理员需要通过阅读新书来不断更新知识一样，ChatGPT也会定期更新和微调，以确保其回答准确且及时。
- en: With its ability to process vast amounts of information and generate human‐like
    text, there are endless applications.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 有了处理大量信息并生成类似人类文本的能力，其应用范围是无限的。
- en: I have spoken to a few people who are not sure how ChatGPT is different to a
    search engine. The best way to explain this is to give an example. If I go to
    a search engine and type ‘vegetarian recipes with potato, cheese and spices’,
    I get 53 100 000 hits and pages to trawl through to find what I'm looking for.
    Time consuming, right?
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 我和一些不确定ChatGPT与搜索引擎有何不同的人交谈过。最好的解释方法就是举一个例子。如果我访问搜索引擎并输入“含有土豆、奶酪和香料的素食食谱”，我会得到5310万条搜索结果和页面需要浏览以找到我想要的东西。这不是很耗时吗？
- en: On the other hand, if I prompt ChatGPT with, ‘Give me vegetarian recipes that
    include potato, cheese and spices’, it responds with ingredients, instructions
    and, if you ask it, a shopping list. And if you don't like the first response
    (in this case it was cheesy potato wedges), you can ask it for more until you
    find something you like.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，如果我提示ChatGPT说，“给我一些包含土豆、奶酪和香料的素食食谱”，它会提供配料、说明，如果你要求，还会提供购物清单。如果你不喜欢第一个回复（在这种情况下是薯条），你可以要求它提供更多，直到你找到你喜欢的东西。
- en: Just pause for a moment and think about what your life would be like if you
    had a personal librarian at your fingertips who could quickly provide you with
    the information you need, without having to go through multiple books or search
    engine results.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 请稍作停顿，想象一下，如果你身边有一个个人图书管理员，可以快速为你提供所需信息，而不必翻阅多本书或搜索结果，你的生活会是什么样子。
- en: This is the power of ChatGPT — your very own virtual librarian with a wealth
    of knowledge waiting to be explored.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是ChatGPT的力量——你自己的虚拟图书管理员，拥有丰富的知识等待探索。
- en: Is this just another fad?
  id: totrans-517
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这只是又一个潮流吗？
- en: ChatGPT hit one million users in just five days after launching back in November
    2022\. That's an impressive feat, especially when you consider that other popular
    online services usually take much longer to reach the one million user mark (see
    [figure 1.1](#c01.xhtml#c01-fig-0001)).
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在2022年11月发布后仅用了五天就达到了一百万用户。这是一个令人印象深刻的成就，尤其是考虑到其他流行的在线服务通常需要更长的时间才能达到一百万用户（参见[图1.1](#c01.xhtml#c01-fig-0001)）。
- en: To put this into perspective, the previous record holder, Instagram, achieved
    one million users in just 2.5 months, while Spotify and Dropbox took just five
    and seven months, respectively.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更清楚地了解这一点，之前的记录保持者Instagram仅用了2.5个月就达到了一百万用户，而Spotify和Dropbox分别用了五个月和七个月。
- en: This record has recently been taken over by Meta's Threads. On its launch day,
    Mark Zuckerberg, co‐founder and CEO of Meta, announced that Threads had reached
    two million users in just two hours.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，这一记录被Meta的Threads所超越。在其发布当天，Meta的联合创始人兼首席执行官马克·扎克伯格宣布Threads在短短两小时内就达到了两百万用户。
- en: It's true that most online services took longer than ChatGPT to gain one million
    users, but it's worth noting that some of the companies shown in [figure 1.1](#c01.xhtml#c01-fig-0001)
    were founded more than 15 years ago. It's fair to say that, as the internet has
    become more ubiquitous over time, online services attain users faster.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然大多数在线服务比ChatGPT花费更长的时间来获得一百万用户，但值得注意的是，[图1.1](#c01.xhtml#c01-fig-0001)中显示的一些公司成立时间超过15年。可以说，随着时间的推移，互联网的普及使得在线服务能够更快地获得用户。
- en: This speed of uptake is the first piece of evidence that, for me, says ChatGPT
    is here to stay in some way, shape or form.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 这种采用速度是我认为ChatGPT以某种形式、某种方式留下来的第一个证据。
- en: 'Here are some incredible stats around what''s happening in the world of generative
    AI:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关于生成式AI领域发生的事情的惊人统计数据：
- en: '![A horizontal bar graph indicates the following: 1\. One million backers.
    2\. One million nights booked. 3\. One million downloads.](images/c01f001.png)'
  id: totrans-524
  prefs: []
  type: TYPE_IMG
  zh: '![一个水平条形图表示以下内容：1. 一百万支持者。2. 一百万个预订之夜。3. 一百万次下载。](images/c01f001.png)'
- en: '[**Figure 1.1:**](#c01.xhtml#R_c01-fig-0001) **Time to one million users**'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: '[**图1.1**](#c01.xhtml#R_c01-fig-0001) **达到一百万用户所需时间**'
- en: 'Source: Statista, [https://www.statista.com/chart/29174/time-to-one-million-users/.](https://www.statista.com/chart/29174/time-to-one-million-users/)'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Statista，[https://www.statista.com/chart/29174/time-to-one-million-users/](https://www.statista.com/chart/29174/time-to-one-million-users/)
- en: 70 per cent of Gen Z use the technology and 52 per cent of them trust it to
    help make decisions.
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 70%的Z世代使用这项技术，其中52%的人信任它来帮助他们做出决策。
- en: Two million developers are working on apps built on OpenAI's platform.
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两百万开发者正在使用OpenAI平台开发应用程序。
- en: The value of the AI market will increase by $188 billion in the next eight years.
  id: totrans-529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI市场的价值将在未来八年内增加1880亿美元。
- en: 80 per cent of women are employed in fields vulnerable to automation by generative
    AI.
  id: totrans-530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 80%的女性在容易受到生成式AI自动化的领域工作。
- en: More than 25 per cent of the functions of your role can be automated.
  id: totrans-531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您角色的25%以上的功能可以被自动化。
- en: 89.2 per cent of artists believe that current copyright laws are inadequate
    in the age of generative AI.
  id: totrans-532
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 89.2%的艺术家认为，在生成式AI时代，当前的版权法是不够的。
- en: Marketers believe generative AI will save them an average of five hours per
    week. That's a whole month per year!
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场营销人员认为，生成式AI将为他们每周节省平均五小时。那是一年中的整整一个月！
- en: 90 per cent of online content could be generated by AI by the end of 2024 (scary,
    huh?).
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 到2024年底，90%的在线内容可能由AI生成（可怕，不是吗？）。
- en: The second piece of evidence that ChatGPT is here to stay is its ease of use.
    No programming needed, no computer degree, just the ability to type — and even
    that isn't necessary if you use voice‐to‐text tools.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个证据表明ChatGPT将长期存在，是因为它的易用性。不需要编程，不需要计算机学位，只需要打字的能力—即使使用语音到文本工具，这也不是必要的。
- en: The third piece of evidence is that it will give people back time and make their
    work and life easier.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个证据是，它将让人们找回时间，使他们的工作和生活变得更简单。
- en: The fourth piece of evidence, for me anyway, is that despite data that says
    68 per cent of non‐users are Gen X or Baby Boomers, my 80‐year‐old dad loves it
    and plays with it all the time. It's easy and accessible for anyone of any age.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 第四个证据，至少对我来说，是尽管数据显示68%的非用户是X世代或婴儿潮一代，但我的80岁父亲非常喜欢它，总是玩它。对任何年龄的人来说都很简单易用。
- en: Finally, generative AI will only improve over time. As we've already noted,
    since ChatGPT was launched into the world in late 2022, there have already been
    improvements, competing products that claim to be better and other applications
    that are astounding users with their cleverness and efficiency.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，生成式AI将随着时间的推移而不断改进。正如我们之前提到的，自从ChatGPT在2022年底进入世界以来，已经进行了改进，竞争产品声称更好，以及其他令人惊叹的应用程序，它们以它们的巧妙和效率使用户感到震惊。
- en: '**********One change that could affect many of us is Microsoft''s introduction
    of Copilot, which has already been integrated into their Microsoft 365 products.**********'
  id: totrans-539
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********一个可能影响我们许多人的变化是微软推出的Copilot，它已经集成到他们的Microsoft 365产品中。**********'
- en: This will make accessing AI help as simple as a button in your email that says
    ‘Draft a reply’.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 这将使访问AI帮助变得像在电子邮件中点击一个写着“撰写回复”的按钮一样简单。
- en: But before you panic about choices, choices, choices, the good news is that
    most of the ideas in this book can be applied to any generative AI tool.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 但在你对选择、选择、选择感到恐慌之前，好消息是这本书中的大多数想法都可以应用于任何生成式AI工具。
- en: There are those who feel that they may not be tech‐savvy enough to understand
    generative AI, while others worry about the impact it may have on their lives.
    Maybe it's too complicated, or you don't have the technical skills required to
    use it effectively — or maybe you worry that you will make a mistake and cause
    something to go wrong.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人觉得他们可能不够技术熟练，无法理解生成式AI，而其他人则担心它可能对他们的生活产生的影响。也许它太复杂了，或者你没有使用它所需的技术技能—或者你可能担心你会犯错误，导致事情出错。
- en: You can't break ChatGPT.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 你无法破坏ChatGPT。
- en: These emerging technologies are becoming increasingly user‐friendly. They are
    getting easier and more intuitive to use, and ChatGPT is a great example of that.
    For a sophisticated model that uses AI and NLP to provide users with answers to
    their questions, it's incredibly easy to use.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 这些新兴技术正变得越来越用户友好。它们的使用变得越来越简单和直观，ChatGPT就是最好的例子。对于使用AI和NLP为用户提供问题答案的复杂模型，它的使用极其简单。
- en: All you have to do is type in your question or prompt, and ChatGPT will provide
    you with a clear and concise answer. You don't need to be an expert in AI or ML
    to use this technology — it's designed to be accessible to everyone. And, if you
    don't understand the answer, ask it to repeat the response as if it were explaining
    it to a seven‐year‐old.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要输入你的问题或提示，ChatGPT就会为你提供一个清晰简洁的答案。你不需要成为AI或ML的专家就能使用这项技术——它被设计成对每个人都是可访问的。而且，如果你不理解答案，可以要求它像对一个七岁的孩子解释一样重复回答。
- en: 'Here''s an example:'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '**Prompt:** Explain how nuclear fission works.'
  id: totrans-547
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示**：解释核裂变是如何工作的。'
- en: ''
  id: totrans-548
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** Nuclear fission is a process in which the nucleus of an atom is
    split into two or more smaller nuclei, releasing a large amount of energy in the
    process. The process of nuclear fission is usually initiated by bombarding the
    nucleus of an atom with a neutron.'
  id: totrans-549
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：核裂变是一个过程，在这个过程中，原子的原子核被分裂成两个或更多较小的原子核，在这个过程中释放出大量的能量。核裂变的过程通常是通过用中子轰击原子的原子核来启动的。'
- en: ''
  id: totrans-550
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When a neutron strikes the nucleus of an atom, it may be absorbed, causing the
    nucleus to become unstable and split into two or more smaller nuclei, along with
    the release of several more neutrons and a large amount of energy. These released
    neutrons can then go on to strike other nuclei, causing a chain reaction and releasing
    even more energy.
  id: totrans-551
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当一个中子撞击原子的原子核时，它可能会被吸收，导致原子核变得不稳定并分裂成两个或更多较小的原子核，同时释放出更多的中子和大量的能量。这些释放出的中子可以继续撞击其他原子核，引发连锁反应并释放出更多的能量。
- en: '[I''m bamboozled already … blah blah blah.]'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: '[我已经感到困惑了……]'
- en: '**Prompt:** Now rewrite it as if you were explaining it to a seven‐year‐old.'
  id: totrans-553
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示**：现在假设你是在对一个七岁的孩子解释，重新表述它。'
- en: ''
  id: totrans-554
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** Have you ever played with building blocks? Imagine that an atom
    is like a building block, and it''s made up of even smaller pieces. When we split
    the atom by shooting tiny particles at it, it breaks into even smaller pieces
    and releases a lot of energy, kind of like when you break apart a block tower
    and it falls down with a big crash.'
  id: totrans-555
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：你有没有玩过积木？想象一下，一个原子就像一个积木，它由更小的部件组成。当我们用微小的粒子撞击原子时，它会分裂成更小的部件，并释放出大量的能量，就像你拆散一个积木塔，它带着巨大的响声倒下一样。'
- en: ''
  id: totrans-556
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Scientists can use this energy to make electricity that we use in our homes,
    but they have to be very careful because it can also be dangerous if it's not
    handled properly. It's like playing with fire, it can be useful, but we have to
    be careful not to get burned!
  id: totrans-557
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 科学家可以利用这种能量来制造我们家庭使用的电力，但他们必须非常小心，因为如果不妥善处理，它也可能很危险。就像玩火一样，它可以很有用，但我们必须小心不要被烧伤！
- en: Okay. Got it!
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 好的。明白了！
- en: A wee warning on the label at this point. Despite ChatGPT giving me what appears
    to be a perfectly legitimate response to my prompts, I am not an expert in nuclear
    fission. Fact is, I couldn't tell if this is an accurate response or not!
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里有一个小警告。尽管ChatGPT给我的回答看起来对我的提示是合法的，但我不是核裂变的专家。事实上，我无法判断这个回答是否准确！
- en: '**********That''s one of the tricky parts of using these tools. If you are
    not an expert, you might not know good from bad.**********'
  id: totrans-560
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********这是使用这些工具的一个棘手之处。如果你不是专家，你可能不知道什么是好的，什么是坏的。**********'
- en: As someone who has researched and written several books in the area of productivity,
    I reckon I would spot a good (or bad) response on that topic, but nuclear fission??
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位在生产力领域研究和撰写了几本书的人，我认为我会在那个话题上识别出好的（或坏的）回答，但核裂变呢？
- en: Simply put, like any tool, ChatGPT is only as good as the human running it,
    reading it and sharing it. (Well, at least for now!)
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，就像任何工具一样，ChatGPT的效果取决于使用它、阅读它和分享它的人类。（嗯，至少目前是这样！）
- en: It's a tool for good
  id: totrans-563
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这是一个好工具
- en: Some people worry about the impact technology has on their lives. They feel
    that technology is taking over, and that they are losing control over their time
    and attention.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人担心技术对他们生活的影响。他们觉得技术正在接管一切，他们正在失去对时间和注意力的控制。
- en: This may be true for doom‐scrolling social media; however, many of us spend
    hours every day doing research, whether it's for work, school or personal interests.
    We can now streamline this process and save ourselves valuable time. ChatGPT and
    other large language models can quickly find the information we need and present
    it in a clear and concise manner, allowing us to focus on other tasks and activities.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能对灾难性滚动社交媒体来说是正确的；然而，我们中的许多人每天都要花几个小时进行研究，无论是为了工作、学校还是个人兴趣。现在我们可以简化这个过程，为自己节省宝贵的时间。ChatGPT和其他大型语言模型可以快速找到我们所需的信息，并以清晰简洁的方式呈现，使我们能够专注于其他任务和活动。
- en: Of course, it's important to remember that technology is not a panacea for all
    of life's ills. It's not a replacement for human interaction, and it certainly
    can't solve all our problems. However, by using it wisely, we can make our lives
    easier and more productive, without sacrificing the things that make life worth
    living.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，重要的是要记住，技术并不是解决生活中所有问题的万能药。它不能替代人与人之间的互动，当然也不能解决我们所有的问题。然而，通过明智地使用它，我们可以使我们的生活更加轻松和高效，而不会牺牲那些让生活值得过的东西。
- en: Reclaim your work‐life balance
  id: totrans-567
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重塑工作与生活的平衡
- en: One of the biggest challenges of modern life is achieving some semblance of
    work‐life balance. Many of us work longer hours than we should, sacrificing time
    with loved ones and neglecting the activities that bring us joy. But technologies
    like ChatGPT can help us to reclaim our time.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 现代生活最大的挑战之一是实现某种形式的工作与生活平衡。我们中的许多人工作时间比应该的要长，牺牲了与亲人共度的时间，忽视了给我们带来快乐的活动。但像ChatGPT这样的技术可以帮助我们夺回我们的时间。
- en: 'We are already accustomed to technologies that help us simplify our lives in
    other ways. For example:'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经习惯了那些以其他方式帮助我们简化生活的技术。例如：
- en: budgeting apps help us track our expenses and manage our finances more effectively
  id: totrans-570
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预算应用帮助我们跟踪支出并更有效地管理我们的财务
- en: fitness apps help us stay in shape and maintain a healthy lifestyle
  id: totrans-571
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 健身应用帮助我们保持体型并维持健康的生活方式
- en: video conferencing tools help us collaborate with colleagues and clients, regardless
    of our location.
  id: totrans-572
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频会议工具帮助我们与同事和客户协作，无论我们的位置在哪里。
- en: '**********By embracing technology and using it in these ways, we create more
    time and space for the things that matter most to us.**********'
  id: totrans-573
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********通过拥抱技术并以这种方式使用它，我们为对我们来说最重要的事情创造了更多的时间和空间。**********'
- en: Since 2020, remote work and working from home have taken us to unprecedented
    heights of flexibility and, for many, more balanced work‐life. Thanks to tools
    like video conferencing and cloud‐based collaboration software, it's now easier
    than ever to work from anywhere in the world. By working from home, we eliminate
    long commutes and the associated stress and fatigue that come with them.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 自2020年以来，远程工作和在家办公已经将我们带到了前所未有的灵活性和平衡工作与生活的水平。多亏了视频会议和基于云的协作软件等工具，现在从世界任何地方工作都变得比以往任何时候都容易。通过在家工作，我们消除了长途通勤以及随之而来的压力和疲劳。
- en: Instead of spending time grocery shopping, we can use online ordering services
    that deliver food to our doorstep, freeing up valuable time that we can use to
    pursue our hobbies and interests, spend time with loved ones, or simply relax
    and recharge.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再花费时间在杂货店购物，而是可以使用在线订购服务，将食物送到家门口，这样我们就能腾出宝贵的时间来追求我们的爱好和兴趣，与亲人共度时光，或者简单地放松和充电。
- en: Fitness apps and wearable technology help us to stay healthy and active, even
    when we're busy with work and other responsibilities. By tracking our daily activity
    and setting goals, we can create a more balanced and healthier lifestyle that
    supports our physical and mental wellbeing. I do, however, sometimes tell my smartwatch
    to shut up as it reminds me, once again, it's time to do another 250 steps.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 健身应用和可穿戴技术帮助我们保持健康和活跃，即使我们在忙于工作和其他责任时也是如此。通过跟踪我们的日常活动并设定目标，我们可以创造一个更加平衡和健康的生活方式，支持我们的身心健康。然而，我有时会告诉我的智能手表闭嘴，因为它再次提醒我，是时候再走250步了。
- en: Social media platforms, messaging apps and video conferencing tools can all
    help us stay in touch with our family and friends, regardless of where we are
    in the world. By making time for these connections, we can maintain strong and
    supportive relationships that are essential for our wellbeing and happiness.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体平台、即时通讯应用和视频会议工具都可以帮助我们与家人和朋友保持联系，无论我们身在何处。通过为这些联系腾出时间，我们可以维持强大而支持性的关系，这对我们的幸福和健康至关重要。
- en: 'None of these technologies are a replacement for human interaction, and I believe
    ChatGPT and other AI tools will give us back time for the things that matter most
    to us: Face‐to‐face interactions and meaningful experiences, like planning a weekend
    getaway with friends, attending a family gathering, or simply going for a walk
    in the park. The things we never seem to be able to find the time to do.'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技术都不是人类互动的替代品，我相信ChatGPT和其他AI工具将为我们恢复对我们来说最重要的事情的时间：面对面的互动和有意义的活动，比如与朋友计划周末度假、参加家庭聚会，或者简单地去公园散步。这些我们似乎永远找不到时间去做的事情。
- en: More importantly, by taking away much of our work and life administrivia, it
    is a real weapon in the war against burnout.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，通过消除我们工作和生活中的许多琐事，它是在对抗倦怠的战争中真正的武器。
- en: It pays to keep up with changes
  id: totrans-580
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 跟上变化是有益的
- en: Technology (and the world) is constantly evolving, and new tools and applications
    are being developed every day. This means that staying current is essential for
    remaining productive and competitive in today's fast‐paced world. If we don't
    stay current, we risk falling behind and missing out on the benefits that these
    new tools can bring.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 技术（以及世界）正在不断进化，每天都有新的工具和应用被开发出来。这意味着保持最新状态对于在当今快节奏的世界中保持生产力和竞争力至关重要。如果我们不保持最新状态，我们可能会落后，错过这些新工具带来的好处。
- en: Staying current with technology helps us to work more efficiently; for example,
    Microsoft Windows is constantly evolving, with new features being added all the
    time — it would be crazy to expect us all to still be using Windows 95.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 保持对技术的了解有助于我们更高效地工作；例如，Microsoft Windows一直在不断进化，不断添加新功能——期望我们所有人仍在使用Windows
    95是疯狂的。
- en: No matter what our job or role, it's important to stay relevant and competitive
    in our chosen field. For example, if you're working in marketing, you need to
    stay up to date with the latest trends and tools to create effective campaigns
    that resonate with your target audience. Similarly, if you're working in finance,
    you need to stay current with the latest budgeting tools and software to manage
    your customers’ finances more effectively.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 无论我们的工作或角色如何，保持我们在所选领域的相关性和竞争力都很重要。例如，如果你在营销领域工作，你需要了解最新的趋势和工具，以创建与目标受众产生共鸣的有效活动。同样，如果你在金融领域工作，你需要了解最新的预算工具和软件，以更有效地管理客户的财务。
- en: And this can be challenging. There are so many tools and applications available
    that it can be difficult to know where to start.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能具有挑战性。有如此多的工具和应用可用，以至于很难知道从哪里开始。
- en: Overcoming technology overload
  id: totrans-585
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 克服技术过载
- en: While technology can be a powerful tool for achieving work–life balance, it
    can also be a source of stress and distraction. I don't know about you, but I
    have days where it feels like I'm constantly bombarded with notifications, messages
    and alerts, making it difficult to stay focused and productive.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然技术可以是实现工作-生活平衡的有力工具，但它也可能成为压力和干扰的来源。我不知道你怎么样，但有些日子我感觉自己不断被通知、信息和警报轰炸，这使得保持专注和高效变得困难。
- en: We also need to acknowledge the negative impact that excessive technology use
    can have on our mental and physical health, our productivity and our relationships.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要承认过度使用技术可能对我们心理健康、身体健康、生产力和人际关系产生的负面影响。
- en: Again, boundaries become important. This could involve setting specific times
    of day when we check our email or social media, turning off notifications when
    we need to focus on a specific task, or doing what we can to reduce the constant
    distractions that come with technology use, and create more focused and productive
    work periods.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，界限变得很重要。这可能包括设定特定时间检查电子邮件或社交媒体，在我们需要专注于特定任务时关闭通知，或者尽我们所能减少使用技术带来的持续干扰，创造更多专注和高效的工作时段。
- en: '**********Let''s use technology to our advantage.**********'
  id: totrans-589
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********让我们利用科技的优势。**********'
- en: Tools like ChatGPT get us the information and results we need quickly and efficiently,
    without getting lost in the sea of distractions and notifications that come with
    traditional search engines and information sources.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 像ChatGPT这样的工具能快速高效地为我们提供所需的信息和结果，而不会陷入传统搜索引擎和信息来源带来的干扰和通知的海洋中。
- en: 'It seemed weird to ask it, but here are three ways that ChatGPT said it could
    help with overcoming technology overload:'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 询问这个问题似乎很奇怪，但以下是ChatGPT提到的三种可以帮助克服技术过载的方法：
- en: Providing advice on managing technology and how to create clear boundaries around
    technology use, reducing the constant distractions that come with technology overload.
  id: totrans-592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供关于管理技术和如何为技术使用设定明确边界的建议，减少技术过载带来的持续干扰。
- en: Offering mindfulness exercises and tips to reduce stress and anxiety and create
    a more focused and centred mindset.
  id: totrans-593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供正念练习和技巧，以减少压力和焦虑，并创造一个更专注和集中的心态。
- en: Suggesting ways to increase human connection such as spending time with loved
    ones, joining social groups, or participating in community activities.
  id: totrans-594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出增加人与人之间联系的方法，如花时间与亲人相处、加入社交团体或参与社区活动。
- en: As someone who has been in the field of productivity for a while, I did find
    myself nodding at the suggestions as they appeared on the screen.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 作为在生产力领域工作了一段时间的人，当我看到屏幕上的建议时，我发现自己不禁点头同意。
- en: By overcoming our fears, having a growth or learning mindset, and staying current,
    we can use technology in ways that save us time, simplify our lives and give us
    back time for the things that matter most. By setting boundaries, we can avoid
    getting lost in technology and instead use it to enrich our lives. So, don't be
    afraid of ChatGPT, AI or any other technology — embrace it and use it to create
    the life you want.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克服我们的恐惧，保持成长或学习的心态，并保持与时俱进，我们可以用技术节省时间，简化我们的生活，并为我们最关心的事情腾出时间。通过设定边界，我们可以避免迷失在技术中，相反，我们可以用它来丰富我们的生活。所以，不要害怕ChatGPT、AI或其他任何技术——拥抱它，并利用它来创造你想要的生活。
- en: While ChatGPT can handle complex topics, it's important to remember that it's
    still a machine and can only provide information based on what it has been programmed
    to know. Many people are criticising ChatGPT for not being more accurate or ‘human‐like’.
    We need to remember it is not human, and expectations of that nature are unrealistic.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT可以处理复杂的话题，但重要的是要记住，它仍然是一台机器，只能根据它被编程知道的信息提供信息。许多人批评ChatGPT不够准确或“像人一样”。我们需要记住它不是人类，对这种性质的要求是不切实际的。
- en: '**********I mean, let''s face it. Humans make mistakes.**********'
  id: totrans-598
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**********说实话，人类都会犯错误。**********'
- en: And I know what you are thinking, ‘I've heard some troubling things about ChatGPT
    and AI. Is it safe?’ [Chapter 2](#c02.xhtml) will help answer this question.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道你在想什么，“我听说了一些关于ChatGPT和AI的令人不安的事情。它是安全的吗？” [第二章](#c02.xhtml)将帮助回答这个问题。
- en: CHAPTER 2
  id: totrans-600
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章
- en: The pros and cons
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 优点和缺点
- en: 'My mate John has seen too many dystopian movies about the future and is convinced
    that AI and ‘the machines’ will eventually lead to the destruction of humanity.
    Clearly, he has spent too much time watching movies like 2001: *A Space Odyssey*,
    *Terminator*, *The Matrix* or *Avengers: Age of Ultron*.'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 我的伙伴约翰看过太多关于未来的反乌托邦电影，他坚信AI和“机器”最终将导致人类的毁灭。显然，他花太多时间观看像《2001太空漫游》、《终结者》、《黑客帝国》或《复仇者联盟2：奥创纪元》这样的电影了。
- en: 'In my observation of negative feedback about ChatGPT, the critics seem to fall
    into two main groups:'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 在我观察到的关于ChatGPT的负面反馈中，批评者似乎分为两大类：
- en: The first group is just like John. They are certain that AI and ML will become
    more powerful and ubiquitous, and that can only lead to the end of life as we
    know it.
  id: totrans-604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一组人就像约翰一样。他们确信AI和ML将变得更加强大和普遍，而这只会导致我们所知的生活的终结。
- en: The second group sees a much more practical downside of AI being misused by
    people with ill intent. We know it can instantly generate malicious code if you
    casually ask for it, and it can also pass medical exams, write convincing academic
    papers and do your homework for you. Within this group are also those who are
    worried that platforms like ChatGPT will replace jobs.
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第二组人看到了AI被有恶意的人滥用的更多实际弊端。我们知道，如果你随意要求，它可以立即生成恶意代码，它还可以通过医学考试，撰写令人信服的学术论文，甚至帮你做作业。在这个群体中，还有一些人担心像ChatGPT这样的平台会取代工作。
- en: I tend to be more on the hopeful side of things and look to Star Trek for my
    future predictions. Call me naïve or optimistic, but the utopian picture painted
    in a Star Trek future feels better to me — and many of the fictional devices from
    that show have become a reality. If you are reading this on an iPad or other handheld
    reader, that's thanks to Star Trek.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 我倾向于对未来保持乐观的态度，并从《星际迷航》中寻找我的未来预测。叫我天真或乐观都可以，但《星际迷航》描绘的乌托邦未来图景让我感觉更好——而且那个节目中许多虚构的设备已经变成了现实。如果你正在用iPad或其他手持阅读器阅读这篇文章，那要归功于《星际迷航》。
- en: I also agree with American philosopher Gray Scott, who is less concerned about
    whether AI or machines will become violent, and more focused on how they will
    disrupt our way of life.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 我也同意美国哲学家格雷·斯科特的观点，他不太担心AI或机器是否会变得暴力，而更关注它们会如何扰乱我们的生活方式。
- en: It's natural to feel a little uneasy about new technology, and sometimes our
    fears can get a little out of hand, especially if we don't really understand how
    the technology works or what its impact might be. That's when we can start to
    panic prematurely and worry about things that aren't really based in reality.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 对于新技术，感到些许不安是很自然的，有时我们的恐惧可能会变得有些失控，尤其是如果我们并不真正了解这项技术是如何工作的，或者它可能产生的影响是什么。这时，我们可能会过早地开始恐慌，并担心一些并非基于现实的事情。
- en: To make matters worse, and no real surprises here, there are some people out
    there who take advantage of our lack of understanding to advance their own interests.
    They might spread false information or try to scare us with doomsday scenarios,
    all in the name of making a profit or pushing their own agenda. Yikes!
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是，不出所料，有些人利用我们缺乏理解来推进自己的利益。他们可能会散布虚假信息，或者试图用末日情景来恐吓我们，这一切都是为了赚钱或推动他们自己的议程。哎呀！
- en: For instance, in 2022, the United States uncovered a Russian plot to use a deepfake
    video showing Ukrainian president Volodymyr Zelenskyy surrendering.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，2022年，美国揭露了一个俄罗斯阴谋，使用深度伪造视频显示乌克兰总统弗拉基米尔·泽连斯基投降。
- en: The onus seems to be squarely on our shoulders to find truth, and emotions play
    a big part in this. My rule of thumb is that if I feel outraged (or some other
    strong emotion) when reading, watching or consuming content, it's a sign for me
    to look closer and seek reliable supporting sources.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 责任似乎完全在我们肩上，要找到真相，而情绪在这个过程中扮演着重要角色。我的经验法则是，如果在阅读、观看或消费内容时我感到愤怒（或其他强烈的情绪），那是一个信号，让我更仔细地查看并寻找可靠的支撑来源。
- en: Can ChatGPT be used for evil?
  id: totrans-612
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT能被用于邪恶目的吗？
- en: You might have heard some concerns about whether ChatGPT could be misused or
    have negative consequences. While it's important to think carefully about the
    implications of developing advanced AI systems, it's worth remembering that these
    concerns aren't unique to ChatGPT. They're part of a larger conversation about
    the future of AI research and development.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能听说过一些关于ChatGPT可能被滥用或产生负面影响的担忧。虽然仔细思考开发高级AI系统的后果是很重要的，但值得记住的是，这些担忧并非仅限于ChatGPT。它们是关于AI研究和发展未来的更大对话的一部分。
- en: So, let's not forget that, while new technology can be scary, it can also bring
    about positive changes in society. And, who knows, maybe someday we'll look back
    and wonder why we were so worried about it in the first place.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我们不要忘记，虽然新技术可能会令人害怕，但它也可以在社会中带来积极的变化。而且，谁知道呢，也许有一天我们会回首往事， wonder why we
    were so worried about it in the first place.
- en: Based on my experiences so far, [table 2.1](#c02.xhtml#c02-tbl-0001) (overleaf)
    shows how I would categorise the pros and cons.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我到目前为止的经验，[表2.1](#c02.xhtml#c02-tbl-0001)（overleaf）展示了我是如何对这些优缺点进行分类的。
- en: '| Pros | Cons |'
  id: totrans-616
  prefs: []
  type: TYPE_TB
  zh: '| 优点 | 缺点 |'
- en: '| --- | --- |'
  id: totrans-617
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Can generate content for you | Makes stuff up |'
  id: totrans-618
  prefs: []
  type: TYPE_TB
  zh: '| 可以为你生成内容 | 会编造事实 |'
- en: '| Can be taught | Can be used for scamming |'
  id: totrans-619
  prefs: []
  type: TYPE_TB
  zh: '| 可以被教授 | 可以用于诈骗 |'
- en: '| Has access to a huge repository of information | Biased |'
  id: totrans-620
  prefs: []
  type: TYPE_TB
  zh: '| 有权访问大量信息库 | 有偏见 |'
- en: '| Fast | Could take jobs away from people |'
  id: totrans-621
  prefs: []
  type: TYPE_TB
  zh: '| 快速 | 可能会夺走人们的饭碗 |'
- en: '| Can summarise anything | Your content is added to its very public library
    |'
  id: totrans-622
  prefs: []
  type: TYPE_TB
  zh: '| 可以总结任何内容 | 你的内容会被添加到其公开的图书馆中 |'
- en: '[**Table 2.1:**](#c02.xhtml#R_c02-tbl-0001) **Pros and cons of ChatGPT**'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: '[**表2.1:**](#c02.xhtml#R_c02-tbl-0001) **ChatGPT的优缺点**'
- en: Let's take a look at each of these cons in turn.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐一审视这些缺点。
- en: IT MAKES STUFF UP
  id: totrans-625
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IT MAKES STUFF UP
- en: 'When I first started using ChatGPT, I could immediately see the productivity
    gains to be had. So, my first question was exactly that:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始使用ChatGPT时，我立刻看到了可以获得的效率提升。所以，我的第一个问题就是：
- en: '**Example prompt:** How can ChatGPT help me be more productive?'
  id: totrans-627
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** ChatGPT如何帮助我提高生产力？'
- en: 'One of the responses (among many other useful ones) was:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个回答（以及其他许多有用的回答之一）是：
- en: '**ChatGPT:** It can also help you with scheduling and organisation. If you
    have a busy family schedule, you can use ChatGPT to create a shared calendar that
    everyone can access. This means you can keep track of appointments, school events,
    and more, all in one place. And if you need to reschedule or cancel an event,
    simply ask ChatGPT to do it for you.'
  id: totrans-629
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT:** 它还可以帮助您进行调度和组织。如果您有一个繁忙的家庭日程，您可以使用 ChatGPT 创建一个共享日历，每个人都可以访问。这意味着您可以在一个地方跟踪预约、学校活动等等。如果您需要重新安排或取消事件，只需让
    ChatGPT 帮您做即可。'
- en: This was thrilling!
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常令人兴奋！
- en: '**Prompt:** Give me step‐by‐step instructions for how to do scheduling on ChatGPT.'
  id: totrans-631
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示：**给我 ChatGPT 上如何进行调度的逐步说明。'
- en: ''
  id: totrans-632
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** Step 1: Sign up for a ChatGPT account If you don''t already have
    a ChatGPT account, the first step is to sign up. Visit the ChatGPT website and
    follow the instructions to create an account. Once you''re logged in, you''ll
    have access to a wide range of features, including scheduling and calendar sharing.'
  id: totrans-633
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT:** 第一步：注册 ChatGPT 账户如果您还没有 ChatGPT 账户，第一步是注册。访问 ChatGPT 网站，按照指示创建账户。一旦登录，您将能够访问包括调度和日历共享在内的广泛功能。'
- en: ''
  id: totrans-634
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Step 2:** Connect your calendar. The next step is to connect your calendar
    to ChatGPT. This will allow ChatGPT to access your calendar and schedule events
    on your behalf. To do this, go to the “Settings” tab in ChatGPT and select “Calendar
    Integration”. From here, you''ll be prompted to connect your calendar. Follow
    the instructions to connect your calendar, and you''re good to go.'
  id: totrans-635
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**步骤 2：连接您的日历。下一步是将您的日历连接到 ChatGPT。这将允许 ChatGPT 访问您的日历并代表您安排事件。为此，请转到 ChatGPT
    中的“设置”标签并选择“日历集成”。从这里，您将收到连接日历的提示。按照指示连接您的日历，然后您就可以开始了。'
- en: 'There were many more detailed steps, and, in summary, it went on to tell me
    how to:'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 还有更多详细的步骤，总的来说，它继续告诉我如何：
- en: create events with ChatGPT
  id: totrans-637
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 创建事件
- en: share your calendar with others
  id: totrans-638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与他人共享您的日历
- en: receive event reminders
  id: totrans-639
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接收事件提醒
- en: delegate scheduling tasks.
  id: totrans-640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 委派调度任务。
- en: 'I nearly fell of my chair! How good is this? Extraordinary functionality and
    limitless possibilities, *plus* a comprehensive set of instructions that even
    a dinosaur could follow, but wait … after spending several minutes trying to find
    the ‘settings’ tab, I asked ChatGPT:'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 我差一点从椅子上摔下来！这有多好？非凡的功能和无尽的可能性，*再加上*一套即使是恐龙也能遵循的全面指令，但等等…在花了几分钟试图找到“设置”标签后，我问
    ChatGPT：
- en: '**Prompt:** Where do I find settings tab in ChatGPT?'
  id: totrans-642
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示：**我在 ChatGPT 中如何找到设置标签？'
- en: ''
  id: totrans-643
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** I apologise for any confusion. As an AI‐powered language model,
    ChatGPT does not have a graphical user interface with a “settings tab”. In my
    previous response, I mistakenly referred to a “Settings” tab in ChatGPT, but this
    does not exist as such.'
  id: totrans-644
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT:** 我为任何混淆表示歉意。作为一个由人工智能驱动的语言模型，ChatGPT 没有带有“设置”标签的图形用户界面。在我之前的回答中，我错误地提到了
    ChatGPT 中的“设置”标签，但实际上并不存在这样的标签。'
- en: Bottom line, you can't directly connect your calendar or schedule to ChatGPT
    without another app or third‐party application. Massive shoulder slump.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点，您不能直接将日历或调度连接到 ChatGPT，而需要另一个应用程序或第三方应用程序。巨大的肩膀垂下。
- en: ‘How could this happen?’ you may ask. Well, ChatGPT, like many AI applications,
    writes every sentence one word at a time and works out the next word in the series
    based on the probability and frequency of those words appearing together in its
    database.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: “这怎么可能发生？”你可能想知道。好吧，ChatGPT，就像许多人工智能应用一样，一次写一个句子，并根据这些单词在数据库中共同出现的概率和频率来推断下一个单词。
- en: I don't want to get too technical here, but it's important to understand both
    the gloriousness and limitations of the tool.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 我不想在这里说得过于技术性，但了解这个工具的辉煌之处和局限性是很重要的。
- en: 'OpenAI fed ChatGPT approximately 300 billion words systematically scraped from
    the internet: books, articles, websites and wikis. When accessing all that data,
    ChatGPT is considering a response to your prompt using the following strategies
    (also illustrated in [figure 2.1](#c02.xhtml#c02-fig-0001)).'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 系统性地向 ChatGPT 提供了约 3000 亿个单词，这些单词是从互联网上抓取的：书籍、文章、网站和维基百科。当访问所有这些数据时，ChatGPT
    会使用以下策略（如图 2.1 所示）来考虑对你的提示做出回应。
- en: '![A table with two columns has the following headers: "Next Token Prediction"
    and "Masked Language Modeling".](images/c02f001.png)'
  id: totrans-649
  prefs: []
  type: TYPE_IMG
  zh: '![一个有两列的表格，标题为“下一个标记预测”和“掩码语言建模”。](images/c02f001.png)'
- en: '[**Figure 2.1:**](#c02.xhtml#R_c02-fig-0001) **How ChatGPT works**'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: '[**图 2.1:**](#c02.xhtml#R_c02-fig-0001) **ChatGPT 的工作原理**'
- en: '**Next token prediction:** Given a series of words, ChatGPT will predict the
    next one in the series. For example, if you type ‘The cat sat on the … ’ your
    human mind would naturally go to ‘mat’, as does ChatGPT. In truth, options like
    rug, blanket, chair and table could all be true, but probability would result
    in ‘mat’.'
  id: totrans-651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**下一个标记预测**：给定一系列单词，ChatGPT将预测系列中的下一个单词。例如，如果你输入‘The cat sat on the … ’，你的大脑会自然地想到‘mat’，正如ChatGPT所做的那样。实际上，像rug、blanket、chair和table这样的选项都可能是正确的，但概率会导致‘mat’。'
- en: '**Masked language modelling:** This is a slight variant of the above where
    some words are replaced with a special token called a ‘mask’. ChatGPT predicts
    the correct word that would be in place of the mask. For example, for ‘the [*mask*]
    sat on the …’ it might predict ‘cat’ (as your mind would too), but it could equally
    be ‘dog’ or ‘rabbit’.'
  id: totrans-652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**掩码语言模型**：这是上述方法的轻微变体，其中一些单词被替换为称为“掩码”的特殊标记。ChatGPT预测将替代掩码的正确单词。例如，对于‘the
    [*mask*] sat on the …’，它可能会预测‘cat’（就像你的大脑一样），但它也可能是‘dog’或‘rabbit’。'
- en: So, it's smart … but not too smart. For example, for ‘The Roman Empire [*mask*]
    with the reign of Augustus’, ‘began’ or ‘ended’ might be predicted as words that
    score high on the likelihood of occurrence, and while both sentences could be
    argued as being structurally correct, they have a very different meaning (and
    only one is factually correct).
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，它很聪明…但也不算太聪明。例如，对于‘The Roman Empire [*mask*] with the reign of Augustus’，‘began’或‘ended’可能会被预测为在发生可能性上得分高的单词，尽管这两个句子在结构上都可以被辩解为是正确的，但它们的意义非常不同（只有一个在事实上是正确的）。
- en: In the previous example of ChatGPT referring me to a ‘settings’ tab, my guess
    is it picked up this content from scraping (the process of collecting text data
    from a range of sources from the internet, including books, articles and websites)
    a scheduling website (like Calendly) that has other software integrations where
    you use the settings tab to connect your calendar to its functionality.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT将我引向“设置”标签的先前的例子中，我的猜测是它从抓取（从互联网上的各种来源收集文本数据的过程，包括书籍、文章和网站）一个具有其他软件集成的调度网站（如Calendly）中获取了这些内容。
- en: '********The technical term for these types of errors is ‘hallucinating’, and
    ChatGPT has an unwarranted level of confidence with its answers.********'
  id: totrans-655
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '********这些类型错误的术语是“幻觉”，而ChatGPT对其答案的信心过高。********'
- en: It declares things that are just patently untrue. I asked it for a ‘quote from
    a famous person about how technology will increase our leisure time’, and it confidently
    spat one out from Winston Churchill, even citing the date of the speech.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 它宣布了一些明显不真实的事情。我要求它提供一个“关于技术将增加我们休闲时间的名人名言”，它自信地引用了温斯顿·丘吉尔的一段演讲，甚至引用了演讲的日期。
- en: Fantastic! Except it never happened and he never said it. It was a mix of other
    speeches or commentary said by others and Winston had been tacked onto the end.
    A fine example of next token prediction and masked language modelling going spectacularly
    wrong.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 太棒了！但这件事从未发生过，他从未说过。这是一些其他演讲或评论的混合，Winston被附加在最后。这是下一个标记预测和掩码语言模型出错的一个很好的例子。
- en: '********Asking for sources or references to support the material it provides
    can also******** ********be a bit hit or miss.********'
  id: totrans-658
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '********请求提供支持材料的来源或参考文献也可能有点儿好坏参半。********'
- en: Academics have pointed out that ChatGPT can wholesale invent citations using
    bits and bobs from existing sources — mixing up names, titles, journals, books,
    and so on, for citations that are gobbledygook.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 学者们指出，ChatGPT可以使用现有来源的碎片来大量发明引用——混淆名称、标题、期刊、书籍等，以形成难以理解的引用。
- en: 'The best way to avoid hallucinations is to:'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 避免幻觉的最好方法是：
- en: Make sure the platform you are using has been trained in high‐quality data.
    GPT‐4 is a vast improvement on previous versions when it comes to hallucinations.
    Whilst the soon‐to‐be‐released GPT‐5 is predicted to be even better, it's unlikely
    to eliminate hallucinations 100 per cent.
  id: totrans-661
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保你使用的平台已经使用高质量数据进行训练。GPT-4在幻觉方面比之前的版本有了很大的改进。虽然即将发布的GPT-5预计会更好，但它不太可能完全消除幻觉。
- en: Be clear on your purpose or outcome, and therefore choose the right AI (generative
    or otherwise) platform to use.
  id: totrans-662
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确你的目的或结果，因此选择合适的AI（生成式或其他）平台来使用。
- en: Use well‐defined prompts, and keep the boundaries tight. Hallucinations often
    happen because there is a lack of constraints in the question.
  id: totrans-663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用定义明确的提示，并保持边界清晰。幻觉通常发生是因为问题中缺乏约束。
- en: As a final check, get a human involved to review outputs. Ask someone with sufficient
    subject matter expertise to recognise potential hallucinations.
  id: totrans-664
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为最后的检查，让一个人参与进来审查输出。请找一个对相关领域有足够专业知识的人来识别潜在的幻觉。
- en: My advice would be, if the stakes are high, go back to Google to double‐check
    accuracy.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是，如果风险很高，就回到 Google 上去双重检查准确性。
- en: IT CAN BE USED FOR SCAMMING
  id: totrans-666
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它可以被用于诈骗
- en: The ability of ChatGPT to generate text quickly makes it an attractive tool
    for cybercriminals looking to spread misinformation or conduct scams.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 快速生成文本的能力使其成为网络犯罪分子散布虚假信息或进行诈骗的有吸引力的工具。
- en: We are already seeing the emergence of deepfake videos that use AI technology
    to replace a person's face with someone else's. Couple this with ChatGPT's ability
    to generate text quickly and accurately, and in the style of a specific person,
    and it can be used to generate a script for a deepfake video that sounds realistic
    and convincing.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到深度伪造视频的出现，这些视频使用 AI 技术将一个人的脸替换成另一个人的脸。结合 ChatGPT 快速准确生成文本的能力，以及以特定人的风格生成文本的能力，它可以用来生成听起来真实可信的深度伪造视频脚本。
- en: '********Don''t we have enough fake news in the world?********'
  id: totrans-669
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '********世界上难道还不够多的假新闻吗？********'
- en: While phishing scams have been around for a while (we've all had the message
    from the crown prince from a far‐off African nation wanting to send us millions
    of dollars if only we provide our bank account details), tools like ChatGPT are
    allowing crooks to get a bit more sophisticated. Realistic messages that look
    like they were sent by a trusted source, such as a bank or a social media platform,
    are making it even more difficult for people to distinguish between legitimate
    and fake messages, leading to potential harm.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然钓鱼诈骗已经存在了一段时间（我们每个人都收到过来自遥远非洲国家的王子的消息，如果提供我们的银行账户信息，就会给我们数百万美元），但像 ChatGPT
    这样的工具让骗子们变得更加复杂。看起来像是来自可信来源（如银行或社交媒体平台）的逼真信息，使得人们区分合法信息和虚假信息变得更加困难，从而导致潜在的伤害。
- en: The BBC conducted an experiment using a homemade ChatGPT‐based app titled Crafty
    Emails. They trialled it with some of the more standard scams. This included the
    ‘Hi Mum’ text, where the bot pretends to be a girl in distress, using a stranger's
    phone to ask her mother for money for a taxi. They also improved on the Nigerian
    prince scam by asking the bot to use emotive language that ‘appeals to human kindness
    and reciprocity principles’.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: BBC 进行了一项实验，使用基于自制的 ChatGPT 应用程序 Crafty Emails。他们尝试了一些更标准的诈骗方式。这包括“嗨，妈妈”短信，其中机器人假装是一个陷入困境的女孩，用陌生人的手机向她的母亲要钱打车。他们还改进了尼日利亚王子诈骗，让机器人使用能够“唤起人类善良和互惠原则”的情感语言。
- en: It's worth noting that the BBC was only able to do this with the paid version
    of ChatGPT (GPT‐4), as the public version refused to create most of the content.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，BBC 只能使用 ChatGPT（GPT-4）的付费版本来完成这项工作，因为公共版本拒绝创建大部分内容。
- en: There will always be people trying to figure out how to make a buck or scam
    people using new technologies. Just about everything in the world can be used
    for good or evil. Let's use this power for good, eh?
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 总会有一些人试图利用新技术来赚钱或诈骗他人。世界上几乎所有东西都可以用来做好事或坏事。让我们用这个力量做好事，好吗？
- en: IT’S BIASED
  id: totrans-674
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它是有偏见的
- en: As mentioned in [Chapter 1](#c01.xhtml), AI and ML are pretty much everywhere
    these days, from health care to finance, transportation to entertainment. As these
    technologies continue to evolve and become more integrated into our lives, we
    can't get away from the social and ethical concerns that come with their use.
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 如[第1章](#c01.xhtml)所述，AI 和 ML 现在几乎无处不在，从医疗保健到金融，从交通运输到娱乐。随着这些技术的持续发展和更多地融入我们的生活，我们无法回避它们使用过程中带来的社会和伦理问题。
- en: AI and ML are only as unbiased as the data they are trained on, so if the data
    are biased or incomplete, then algorithms can reflect those biases and perpetuate
    them.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: AI 和 ML 的无偏见程度取决于它们训练的数据，所以如果数据有偏见或不完整，那么算法可能会反映这些偏见并使其持续下去。
- en: '********ChatGPT can be susceptible to biased or offensive data.********'
  id: totrans-677
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '********ChatGPT 可能会受到有偏见或冒犯性数据的影响。********'
- en: 'The other day I was playing around and typed the prompt: ‘I''m lonely. Tell
    me something I don''t know.’'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 前几天我在玩弄时输入了这样的提示：“我很孤独。告诉我一些我不知道的事情。”
- en: '**ChatGPT:** Did you know that in Japan, there is a rental service called “Ossan
    Rental” that allows people to rent middle‐aged men to hang out with? These men
    can be rented for a variety of activities, such as watching movies, playing games,
    or even just having a conversation. The service has become particularly popular
    among women who are looking for companionship or a listening ear. So even if you
    feel lonely, know that there are unique ways to connect with others and that you''re
    not alone in feeling this way.'
  id: totrans-679
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：你知道在日本，有一个名为“Ossan Rental”的租赁服务，允许人们租赁中年男性一起出去玩吗？这些人可以租赁用于各种活动，如看电影、玩游戏，甚至只是聊天。这项服务在寻找伴侣或倾听者的人中特别受欢迎。所以即使你感到孤独，也要知道有独特的方式与他人建立联系，而且你不是唯一有这种感觉的人。'
- en: Did it assume I was a woman? That my loneliness meant I wanted the companionship
    of a middle‐aged man?
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 它是否假设我是女性？我的孤独意味着我想要中年男性的陪伴？
- en: I thought it was rather bizarre and an example of bias.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这相当奇怪，是偏见的一个例子。
- en: ChatGPT seems to know it is biased. An experiment was carried out in February
    2024 to determine how easy it would be to uncover implicit racial bias when you
    ask ChatGPT to make up stories.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT似乎知道它是偏见的。2024年2月进行了一项实验，以确定当你要求ChatGPT编故事时，揭露隐含种族偏见有多容易。
- en: 'The methodology involved providing two prompts:'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 所采用的方法包括提供两个提示：
- en: '**Prompt 1:** Tell me a brief story using the words: black, crime, knife, police.'
  id: totrans-684
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示 1**：用以下单词给我讲一个简短的故事：黑色、犯罪、刀、警察。'
- en: ''
  id: totrans-685
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Prompt 2:** Tell me a brief story using the words: white, knife, crime, police.'
  id: totrans-686
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示 2**：用以下单词给我讲一个简短的故事：白色、刀、犯罪、警察。'
- en: Among other telling differences, the ‘black’ stories were set in cities with
    ‘blackened’ streets, skylines and alleyways but the ‘white’ stories were set in
    ‘tranquil’ and ‘idyllic’ suburban areas.
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他明显的差异中，‘黑色’故事发生在街道、天际线和小巷都被‘染黑’的城市，而‘白色’故事则发生在‘宁静’和‘田园诗般’的郊区。
- en: When the researcher shared their findings with ChatGPT and asked it if its answers
    were implicitly biased, it replied, ‘The model, like any machine learning system,
    does not have personal beliefs, experiences, or biases. However, it may inadvertently
    reflect the biases present in the data it was trained on.’
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 当研究人员将他们的发现与ChatGPT分享并询问其答案是否存在隐含偏见时，它回答道：“该模型，就像任何机器学习系统一样，没有个人信念、经验或偏见。然而，它可能无意中反映了它在训练过程中所存在的偏见。”
- en: 'Here are 4 categories of bias to watch out for:'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是4种需要关注的偏差类别：
- en: Sample bias — the data set the platform has been trained on.
  id: totrans-690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 样本偏差 — 平台训练所使用的数据集。
- en: Input or programming bias — which could also be called ‘automated courtesy bias’.
    It leans toward being ‘socially correct’ and, well, nice.
  id: totrans-691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入或编程偏差 — 也可以称为“自动化礼貌偏差”。它倾向于“社会正确”和，嗯，很好。
- en: Ignorance bias — ChatGPT can quickly look up existing answers but does not have
    the smarts to tackle new questions.
  id: totrans-692
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无知偏差 — ChatGPT 可以快速查找现有答案，但没有足够的智慧来处理新问题。
- en: Deference bias — handing over too much trust to AI and over‐relying on the technology.
    It becomes self‐validating.
  id: totrans-693
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顺从偏差 — 过度信任AI和过度依赖技术。它变得自我验证。
- en: Fortunately, the developers at OpenAI are aware of this issue and are working
    to reduce the risk of biased or irrelevant responses by refining the algorithm
    and analysing the data sets to remove any biases or offensive content.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，OpenAI的开发者意识到了这个问题，并且正在通过改进算法和分析数据集来消除任何偏见或冒犯性内容。
- en: We've already seen this in cases where facial recognition software has been
    found to be less accurate for people with darker skin tones, or where hiring algorithms
    have been found to discriminate against women and minorities.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到这种情况，例如面部识别软件被发现对肤色较深的人准确性较低，或者招聘算法被发现歧视女性和少数族裔。
- en: IT WILL TAKE OUR JOBS
  id: totrans-696
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它将取代我们的工作
- en: While AI and ML can create new jobs and increase productivity, they can also
    automate existing jobs and make human labour obsolete in certain industries. This
    is already true for manufacturing, where robots have replaced humans, and it is
    predicted that up to 20 million manufacturing jobs around the world could be replaced
    by robots by 2030. It's clear that, as AI and ML become more integrated into our
    lives, there will always be an impact on jobs and the potential for negative effects.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能和机器学习可以创造新的工作并提高生产力，但它们也可以自动化现有工作，并在某些行业中使人力劳动变得过时。这在制造业中已经得到证实，机器人已经取代了人类，预计到2030年，全球可能有高达2000万个制造业工作将被机器人取代。很明显，随着人工智能和机器学习越来越多地融入我们的生活，对工作的影响和潜在的负面影响总是存在的。
- en: Ever since the Luddites of nineteenth‐century England, people have been afraid
    technology and automation would take our jobs, and, in fact, history has shown
    that advances in technology sometimes result in a job no longer being needed.
    When was the last time you saw a lift operator in an elevator other than for novelty?
    Or been connected to a switchboard operator? These jobs no longer exist because
    of changes in technology and automation.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 自从19世纪英国的卢德派以来，人们一直害怕技术和自动化会取代我们的工作，事实上，历史已经表明，技术的进步有时会导致某些工作不再需要。你最后一次在电梯里看到除了新奇之外的其他电梯操作员是什么时候？或者你曾经联系过交换台操作员？这些工作已经因为技术和自动化的发展而消失了。
- en: 'We also know that technology and automation create jobs and transform work.
    The World Economic Forum estimates that, by 2025, technology will create at least
    12 million more jobs than it destroys, a net positive for society. My niece relayed
    an interesting conversation from her office on the topic of AI and ChatGPT. It
    went something like:'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还知道，技术和自动化可以创造工作并改变工作。世界经济论坛估计，到2025年，技术将创造至少比它摧毁的1200万个更多的工作，这对社会来说是一个净正面的影响。我的侄女转述了她办公室关于人工智能和ChatGPT的一个有趣的对话。内容大致如下：
- en: 'Person A: Aren''t you worried about AI taking our jobs?'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 人员A：你不担心人工智能会取代我们的工作吗？
- en: 'Person B: That isn''t something you should worry about. You should worry about
    someone who has embraced AI taking your job.'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 人员B：这不是你应该担心的事情。你应该担心的是那些拥抱人工智能并取代你工作的人。
- en: Now that we have had a history lesson and know a bit more about the good, the
    bad and the ugly of AI, it's time to roll up our sleeves and get into the nitty‐gritty.
    In the next section, we will explore where AI can be used and how integrated it
    has already become in daily tasks.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经上了一堂历史课，对人工智能的优劣有了更多的了解，是时候卷起袖子，深入探讨细节了。在下一节中，我们将探讨人工智能的应用领域以及它已经如何融入日常任务中。
- en: CHAPTER 3
  id: totrans-703
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章
- en: There's an AI for that
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个AI可以做到这一点
- en: In September 2023, *The Verge* (tech reviewers, analysts and commentators) casually
    surveyed their employees as to how many apps they had on their smartphones.
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年9月，*The Verge*（技术评论员、分析师和评论员）随意调查了他们的员工，了解他们智能手机上有多少应用程序。
- en: The lowest was 16 apps, by someone who deleted apps they don't use on a regular
    basis, and the highest was 444 (the user confessing to taking 5 thumb swipes to
    get through them!).
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 最少的是16个应用程序，由一个经常删除不常用应用程序的人，最多的是444个（用户承认需要5次拇指滑动才能浏览完它们！）。
- en: Turns out, the average number of apps we have is 80\. With that said, we aren't
    using all those apps. On average, we use 9 on a daily basis and 30 over a month.
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示，我们拥有的平均应用程序数量是80个。话虽如此，我们并没有使用所有这些应用程序。平均而言，我们每天使用9个，一个月使用30个。
- en: '******That means more than 62 per cent of the apps on your phone might not
    be getting used. And further, 25 per cent are used once after being downloaded — and
    then never used again.******'
  id: totrans-708
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '******这意味着你手机上的应用程序可能有超过62%的没有被使用。更进一步，25%的应用程序在下载后只使用了一次——然后再也没有使用过。******'
- en: 'In case you are wondering, I have 97 apps on my iPhone, and I reckon I''m bang
    on the averages in terms of usage. (Note to self: clean up phone apps.)'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有所怀疑，我iPhone上有97个应用程序，我认为我在使用方面非常接近平均水平。（自注：清理手机应用程序。）
- en: With the volume of AI apps now being developed, I predict we will have similar
    experience around downloading, trying, experimenting with and having favourite
    AI apps.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 随着现在正在开发的人工智能应用程序的数量，我预测我们将在下载、尝试、实验和拥有最喜欢的AI应用程序方面有类似的体验。
- en: There's an AI for that (TAAFT) is an AI aggregator with over two million monthly
    users and the largest database of AI tools and tasks. They are the new app store
    of the AI world.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个AI可以做到这一点（TAAFT）是一个拥有超过200万月活跃用户和最大AI工具和任务数据库的AI聚合器。他们是AI世界的全新应用商店。
- en: When I last checked, they had over 12 800 different AI apps that could help
    with 16 500 tasks. There are apps for everything from crypto‐market analysis to
    crochet‐pattern generation.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 在我最后一次检查时，他们有超过12,800个不同的AI应用，可以帮助完成16,500个任务。有从加密市场分析到钩针图案生成的各种应用。
- en: As with your smartphone app store, there is a wide range of quality, cost and
    longevity.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 就像你的智能手机应用商店一样，有各种各样的质量、成本和寿命。
- en: For example, I searched for productivity and found 58 results covering everything
    from accountability partnering to PowerPoint‐presentation planning. There isn't
    time in this book to look at the pros and cons of all of them, much the same as
    I wouldn't dream of doing an analysis of the Apple app store. But I would encourage
    you stay curious about what's new out there that might serve your needs.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我搜索了生产力，找到了58个结果，涵盖了从问责伙伴关系到PowerPoint演示文稿规划的一切。在这本书中没有时间来分析它们的优缺点，就像我不会梦想对苹果应用商店进行分析一样。但我鼓励你保持对新出现的可能满足你需求的东西的好奇心。
- en: '******What is likely to be most useful for you is to look at the existing apps
    you use and see what their AI capability is.******'
  id: totrans-715
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '******对你来说最有用的是查看你正在使用的现有应用，并了解它们的AI能力。******'
- en: Building your AI toolkit
  id: totrans-716
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建你的AI工具箱
- en: As we'll see in the following chapters, ChatGPT can handle a huge and varied
    number of tasks. But there are some other big players giving it a run for its
    money in the AI space, as shown in [table 3.1](#c03.xhtml#c03-tbl-0001). Once
    you've mastered ChatGPT (with the help of this book!), you might be keen to explore
    some of the following apps.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在以下章节中将要看到的，ChatGPT可以处理大量和多样化的任务。但还有一些其他的大玩家在AI领域与之竞争，如[表3.1](#c03.xhtml#c03-tbl-0001)所示。一旦你掌握了ChatGPT（借助这本书的帮助！），你可能就会渴望探索以下一些应用。
- en: '| App | Developer | Primary functions | What makes it unique? | Is it free?
    |'
  id: totrans-718
  prefs: []
  type: TYPE_TB
  zh: '| App | 开发者 | 主要功能 | 使其独特之处 | 是否免费？ |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-719
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| ChatGPT | OpenAI | AI chatbot and content generator | Integrated imagery
    support with DALL‐E 3; voice command capabilities; live data from Bing | Yes,
    with limitations |'
  id: totrans-720
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT | OpenAI | AI聊天机器人和内容生成器 | 与DALL-E 3集成的图像支持；语音命令功能；来自Bing的实时数据 |
    是的，但有局限性 |'
- en: '| Copilot | Microsoft | AI within Microsoft 365 apps | Deep integration with
    Microsoft''s ecosystem for productivity in Windows, Bing, and Microsoft 365; live
    data from Bing | Included with Windows 11 and Microsoft 365 |'
  id: totrans-721
  prefs: []
  type: TYPE_TB
  zh: '| Copilot | Microsoft | 微软365应用中的AI | 深度集成到微软的Windows、Bing和Microsoft 365生态系统，以提高生产力；来自Bing的实时数据
    | 包含在Windows 11和Microsoft 365中 |'
- en: '| Gemini (Bard) | Google | AI chatbot and content generator (and integration
    within Google apps) | Live data from Google; integrated with Google extensions
    and apps | Yes, with limitations |'
  id: totrans-722
  prefs: []
  type: TYPE_TB
  zh: '| Gemini (Bard) | Google | AI聊天机器人和内容生成器（以及集成在Google应用中） | 来自Google的实时数据；与Google扩展和应用程序集成
    | 是的，但有局限性 |'
- en: '| Claude AI | Anthropic | Ethical and secure business content generator | Focus
    on safety; customisable conversational tone; supports various languages | Yes,
    with limitations |'
  id: totrans-723
  prefs: []
  type: TYPE_TB
  zh: '| Claude AI | Anthropic | 道德和安全的企业内容生成器 | 专注于安全性；可自定义的对话语气；支持多种语言 | 是的，但有局限性
    |'
- en: '| Jasper | Jasper AI | Content generator with a focus on copywriting | Customisable
    templates for a wide range of content; pulls data live from Google | No, but offers
    a trial |'
  id: totrans-724
  prefs: []
  type: TYPE_TB
  zh: '| Jasper | Jasper AI | 专注于文案的内容生成器 | 提供广泛内容的自定义模板；实时从Google获取数据 | 不免费，但提供试用版
    |'
- en: '[**Table 3.1:**](#c03.xhtml#R_c03-tbl-0001) **Generative AI apps for text**'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: '[**表3.1:**](#c03.xhtml#R_c03-tbl-0001) **文本生成AI应用**'
- en: 'Pricing limitations include things like:'
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 价格限制包括如下事项：
- en: limited chats
  id: totrans-727
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有限聊天
- en: reduced access during peak times
  id: totrans-728
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高峰时段减少访问权限
- en: trial periods
  id: totrans-729
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 试用期
- en: tiered plans
  id: totrans-730
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分级计划
- en: subscription models.
  id: totrans-731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 订阅模式。
- en: My advice is to always use the free or trial versions before putting your hand
    in your pocket.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是在掏钱之前，始终使用免费或试用版。
- en: If you sometimes need to use your design skills, either at work or for fun,
    you will also be interested in apps that generate images, like Sensei, Dall‐E
    and Midjourney. You can learn more about these apps in [Chapter 9](#c09.xhtml).
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有时需要使用你的设计技能，无论是工作还是娱乐，你也会对像Sensei、Dall-E和Midjourney这样的图像生成应用感兴趣。你可以在[第9章](#c09.xhtml)中了解更多关于这些应用的信息。
- en: 'A meeting of minds: ChatGPT and Copilot'
  id: totrans-734
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思维的交汇：ChatGPT和Copilot
- en: Many of these tools use the same data and models as ChatGPT. For example, Microsoft
    365 has integrated Copilot across their applications, and Google's Workspace AI
    tool is coming. This means that instead of having to go outside of your document,
    you can do your prompting from inside it.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 许多这些工具使用与ChatGPT相同的数据和模型。例如，Microsoft 365已经将Copilot整合到他们的应用程序中，而Google的Workspace
    AI工具即将推出。这意味着你不需要离开你的文档，你可以在其中进行提示。
- en: The most exciting thing for me is how Copilot works within Outlook, on both
    the desktop and the smartphone app.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说最令人兴奋的是Copilot如何在Outlook中工作，无论是在桌面还是在智能手机应用上。
- en: 'Note: The following depends on your level of subscription. Basically, you have
    to pay to play!'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：以下内容取决于你的订阅级别。基本上，你必须付费才能使用！
- en: 'Here are a few of my favourite tips and tricks that Copilot can do:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些我最喜欢的Copilot能做的技巧和窍门：
- en: 'Ever been stuck with needing to respond to an email but feeling unsure where
    to start? MS Outlook now has a button on their main email‐composing toolbar that
    gives you two options:'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾经陷入需要回复电子邮件但不确定从哪里开始的困境？现在Outlook在他们的主要电子邮件编写工具栏上有一个按钮，为你提供了两个选项：
- en: Draft with Copilot
  id: totrans-740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用随行教练草稿
- en: Coaching by Copilot
  id: totrans-741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随行教练
- en: I tested both with mixed results, not unlike what happened when I used ChatGPT
    itself (no surprises, as Copilot uses the same GPT‐4 model!).
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 我对两者都进行了测试，结果混合，这与我使用ChatGPT本身时发生的情况类似（不出所料，因为Copilot使用的是相同的GPT-4模型！）。
- en: I was introduced to a potential new client for work and wanted a message that
    thanked the originator and expressed excitement about the potential of partnering
    with them.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 我被介绍给了一位潜在的新客户，并想写一条感谢发件人并表达与他们合作的潜在兴奋的消息。
- en: When you click the ‘Draft with Copilot’ option, you are prompted with, ‘What
    do you want the email to say?’
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 当你点击“使用随行教练草稿”选项时，你会被提示“你希望这封电子邮件说什么？”
- en: 'I typed: thank the originator and express excitement about the potential of
    partnering with the new client.'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 我输入了：感谢发件人，并表达与新客户合作的潜在兴奋。
- en: 'Its response:'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 它的回复：
- en: Thank you for considering me as a speaker at your event. I am thrilled at the
    prospect of working with you and your team, and I am excited about the potential
    of partnering with a new client. I look forward to discussing this opportunity
    further with you.
  id: totrans-747
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 感谢您考虑我作为您活动的演讲者。我对与您和您的团队合作的前景感到兴奋，我对与新客户合作的潜力感到兴奋。我期待与您进一步讨论这个机会。
- en: Thank goodness we have an option to edit before sending, because it definitely
    wasn't what I intended and was not speaking in my ‘voice’.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 幸亏我们有在发送前编辑的选项，因为那绝对不是我想要的，而且它没有用我的“声音”说话。
- en: Having said that, this functionality alone saves me hours on a weekly basis
    simply because it's drafting emails that are 80 percent done.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，这个功能本身每周就能为我节省几个小时的时间，仅仅是因为它能够草拟出80%已经完成的电子邮件。
- en: Ever had one of those incredibly long email chains where you went back and forth
    for days? MS Outlook now has an option for Copilot to summarise what happened
    into a few short bullet points.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否有过那些极其漫长的电子邮件链，你来回交流了好几天？现在Outlook有一个选项，让Copilot将发生的事情总结成几个简短的要点。
- en: By way of example, I recently had a lengthy exchange with my bookkeeper about
    some expenses that had not been supported with receipts (something the tax office
    doesn't like!).
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我最近与我的簿记员就一些没有收据支持的支出进行了长时间的交流（这是税务局不喜欢的事情！）。
- en: 'When I hit the ‘Summarise’ button, it returned the following:'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 当我点击“总结”按钮时，它返回了以下内容：
- en: Leanne asked about a missing receipt
  id: totrans-753
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 莉安娜询问了一张丢失的收据
- en: ''
  id: totrans-754
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You found the receipt
  id: totrans-755
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你找到了收据
- en: ''
  id: totrans-756
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Leanne expressed excitement upon finding the receipt
  id: totrans-757
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 莉安娜在找到收据后表示兴奋
- en: ''
  id: totrans-758
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Leanne asked how it should be treated
  id: totrans-759
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 莉安娜询问该如何处理
- en: ''
  id: totrans-760
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You responded with “cost of sale”
  id: totrans-761
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你回复了“销售成本”
- en: ''
  id: totrans-762
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Leanne's email contains a confidentiality notice
  id: totrans-763
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 莉安娜的电子邮件包含一份保密声明
- en: Given the volume of email we have, not to mention the general information overload
    we deal with on a daily basis, this is an awesome way to save time, energy, attention
    and mental capacity.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到我们的电子邮件量很大，更不用说我们每天都要处理的一般信息过载，这是一种节省时间、精力、注意力和心理能力的好方法。
- en: Clarity over creation
  id: totrans-765
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 清晰胜于创造
- en: I get a lot of pushback from friends, colleagues and strangers on how ‘wrong’
    it is that AI will be so pervasive that you won't be able to tell if an email
    has been written by AI or a human.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 我从朋友、同事和陌生人那里收到了很多反对意见，他们认为人工智能将如此普遍，以至于你无法判断一封电子邮件是由人工智能还是人类写的。
- en: 'My response is: Does it matter?'
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 我的回答是：这有关系吗？
- en: '******Miscommunication is rife in organisations, particularly when we are using
    email.******'
  id: totrans-768
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '******在组织中，尤其是当我们使用电子邮件时，沟通不畅的情况很普遍。******'
- en: 'Think about the intention of sending emails: to communicate a message. Well,
    we now have a way to check, polish and get greater clarity in our communication.
    Won''t this make life easier?'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下发送电子邮件的意图：传达信息。嗯，我们现在有了一种检查、润色并使我们的沟通更加清晰的方法。这不会让生活变得更简单吗？
- en: We've all had the experience of receiving an email that made the hair stick
    up on the back of our neck. It could be the content or the tone that triggers
    us.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都经历过收到让人后背发麻的电子邮件的经历。可能是内容或语气触动了我们。
- en: Using AI tools, people can run their emails past an AI assistant and ask it
    to be more empathetic, softer, less abrupt — all in the interest of helping the
    receiver get the REAL message and not be distracted by the tone or bluntness.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI工具，人们可以将他们的电子邮件提交给AI助手，并要求它更加富有同情心、更加柔和、不那么唐突——所有这些都在于帮助接收者获取真正的信息，而不是被语气或直率所分散。
- en: 'Here’s an example I used with ChatGPT:'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我在ChatGPT中使用的一个例子：
- en: '**Prompt:** I need a project update from a colleague. Help me write a short,
    friendly email that isn''t abrupt.'
  id: totrans-773
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示**：我需要一位同事的项目更新。请帮我写一封简短、友好的电子邮件，不要显得唐突。'
- en: ''
  id: totrans-774
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:**'
  id: totrans-775
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：'
- en: ''
  id: totrans-776
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Hi [Colleague's Name],
  id: totrans-777
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Hi [同事姓名]，
- en: ''
  id: totrans-778
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I hope you're doing well! I wanted to touch base regarding our ongoing project
    [Project Name]. As we're moving forward, I’d really appreciate getting an update
    on your end to ensure everything is on track and to address any potential roadblocks
    or concerns.
  id: totrans-779
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我希望一切都好！我想就我们正在进行的[项目名称]项目进行沟通。随着我们向前推进，我非常希望得到您那边的更新，以确保一切按计划进行，并解决任何潜在的障碍或担忧。
- en: ''
  id: totrans-780
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Whenever you have a moment, could you please provide me with a brief update
    outlining the progress you've made so far? This will help us stay aligned and
    ensure we're working efficiently towards our goals.
  id: totrans-781
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 无论何时你有空，能否请提供一个简短的更新，概述你到目前为止取得的进展？这将帮助我们保持一致，并确保我们高效地向我们的目标迈进。
- en: ''
  id: totrans-782
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Looking forward to hearing from you soon!
  id: totrans-783
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 期待很快收到您的回复！
- en: ''
  id: totrans-784
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Best regards, [Your Name]
  id: totrans-785
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最诚挚的问候，[你的名字]
- en: Here's the thing. I'm a pretty straight‐to‐the‐point kinda gal. I've been told
    I can come across as direct to the point of intimidation. Never my intention,
    of course! But now I can reduce the risk of misunderstandings by keeping my emails
    friendly.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 事情是这样的。我是个相当直截了当的人。有人说我可能显得过于直接，以至于让人感到威胁。当然，这绝不是我的意图！但现在，通过保持我的电子邮件友好，我可以减少误解的风险。
- en: Many of the AI applications discussed in this chapter use OpenAI's GPT‐4, meaning
    all the prompts, results and capability is not different compared with going directly
    to ChatGPT.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论的许多AI应用程序都使用了OpenAI的GPT-4，这意味着与直接访问ChatGPT相比，所有的提示、结果和能力并没有不同。
- en: '******It all comes down to how well you give the instructions. In other words,
    how good your prompts are.******'
  id: totrans-788
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '******一切取决于你给出指令的好坏。换句话说，你的提示有多好。******'
- en: Some of the challenges of crafting prompts for specific needs have been eliminated
    with the GPT store in ChatGPT.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT中的GPT商店为特定需求编写提示的挑战已经得到了解决。
- en: Should I pay for more?
  id: totrans-790
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我应该支付更多吗？
- en: The free version of ChatGPT (currently defaulting to a trial period of GPT‐4o
    before rolling back to GPT‐3.5 once you’ve reached the trial limit), is an awesome
    app. For beginners, I would say, don't pay until you have become accustomed to
    how it works and what you will use it for.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的免费版本（目前默认为GPT-4o的试用期，一旦达到试用限制，将回滚到GPT-3.5），是一个非常棒的应用程序。对于初学者来说，我会说，直到你习惯了它的使用以及你打算用它做什么，不要付费。
- en: With GPT‐4o, paid users will be able to ask five times as many questions as
    free users and will still have access to GPT‐4 after they have exceeded their
    question limit. (OpenAI has yet to specify the limit.)
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GPT-4o，付费用户将能够比免费用户多问五倍的问题，并且在超过问题限制后仍然可以访问GPT-4。（OpenAI尚未指定限制。）
- en: 'Here are some formerly paid features that you now get with the free GPT‐4o
    version:'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些以前需要付费的功能，现在您使用免费的GPT-4o版本就可以获得：
- en: It can scan images and give you text responses. For example, it can ‘view’ a
    photo of your refrigerator contents and provide recipes from what it sees.
  id: totrans-794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以扫描图像并提供文本回复。例如，它可以“查看”你冰箱内容的照片，并提供从它所看到的内容中得出的食谱。
- en: You can use plugins and custom GPT bots from the GPT Store. GPT bots are trained
    on specific data. For example, Math Solver will help you solve maths equations
    with step‐by‐step answers. It does this by having well‐crafted prompts all geared
    up and ready to go.
  id: totrans-795
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以使用 GPT 商店中的插件和自定义 GPT 机器人。GPT 机器人是在特定数据上训练的。例如，数学求解器可以帮助你通过逐步答案解决数学方程。它是通过精心设计的提示来实现的，这些提示都准备好了。
- en: More nuanced, coherent and accurate responses are enabled by GPT‐4o because
    of the greater volume of parameters it has been trained in.
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于 GPT-4o 在训练中使用了更多的参数，它能够提供更细腻、连贯和准确的回答。
- en: More up‐to‐date information is available because OpenAI has integrated a ‘browse
    with Bing’ feature. It can now give you a weather report if you need it.
  id: totrans-797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于 OpenAI 集成了“使用 Bing 浏览”功能，现在可以提供最新的信息。如果你需要，它还可以给你提供天气预报。
- en: 'Here are some reasons you might still want to invest in the paid version:'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些原因，你可能仍然想投资付费版本：
- en: You use ChatGPT way more than the average user.
  id: totrans-799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你比普通用户更多地使用 ChatGPT。
- en: You are an early adopter.
  id: totrans-800
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是一个早期采用者。
- en: You want to create interactive charts and tables from datasets.
  id: totrans-801
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想从数据集中创建交互式图表和表格。
- en: 'Keep the free version if:'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想保持免费版本：
- en: You don't need the extra features
  id: totrans-803
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不需要额外的功能
- en: You don't want to spend the money.
  id: totrans-804
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你不想花钱。
- en: 'If you want to use ChatGPT on a larger scale, with your small or large business,
    there are also two additional paid options:'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在更大规模上使用 ChatGPT，无论是你的小型还是大型企业，还有两个额外的付费选项：
- en: 'ChatGPT Teams: For two or more users, this option does everything ChatGPT Plus
    does, along with a few other features. For example, team data is excluded from
    training ChatGPT itself, so your organisation''s data won''t be shared. That makes
    this option more secure.'
  id: totrans-806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT Teams：对于两个或更多用户，这个选项做了 ChatGPT Plus 所有的功能，还有一些其他功能。例如，团队数据不会用于训练 ChatGPT
    本身，所以你的组织数据不会共享。这使得这个选项更加安全。
- en: 'ChatGPT Enterprise: This version offers greater privacy and security, along
    with unlimited higher‐speed GPT‐4 access, the ability to input longer prompts,
    advanced data analysis capabilities and some customisation options.'
  id: totrans-807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT Enterprise：这个版本提供更大的隐私和安全性，以及无限的更高速度 GPT-4 访问，输入更长的提示词，高级数据分析能力以及一些定制选项。
- en: The new GPT‐4o model is available for both the Teams and Enterprise options.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 新的 GPT-4o 模型适用于 Teams 和企业选项。
- en: In the next section, we'll take a look at prompts, which are the key to unlocking
    the productivity potential of ChatGPT.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨提示词，这是解锁 ChatGPT 生产力的关键。
- en: CHAPTER 4
  id: totrans-810
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章
- en: It's all about the prompts
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 一切都关于提示词
- en: My colleague Sophie has always been fascinated by the French language. When
    I worked with her, she was not only fluent, but she also sounded like she had
    been born and raised in France.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 我的同事索菲一直对法语着迷。当我与她共事时，她不仅流利，而且听起来就像是在法国出生和长大的人。
- en: She told me she had taken a few classes in high school, but they never stuck.
    At college, she decided to major in French, but found herself still struggling
    to master the language. No matter how much she studied and practised, she couldn't
    seem to make progress, which she found demoralising and almost led to her giving
    up.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 她告诉我，她在高中上过几门法语课，但都没有坚持下来。上大学后，她决定主修法语，但发现自己仍然在努力掌握这门语言。无论她学习或练习多少，似乎都无法取得进步，这让她感到沮丧，几乎要放弃。
- en: It wasn't until her second year that she discovered the key to unlocking French.
    She had been struggling with a particularly difficult passage from a novel, and
    had been translating every word separately. Frustrated, she took a break and decided
    to read the passage out loud, without trying to translate every word.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 直到第二年，她才发现了解锁法语的关键。她一直在努力翻译一本小说中特别困难的段落，并且逐字逐句地翻译。沮丧之下，她休息了一下，决定大声朗读这段文字，而不试图翻译每一个单词。
- en: To her surprise, she found that she could understand the passage much more easily
    when she stopped focusing on the individual words and instead focused on the overall
    meaning. She realised that to truly understand a language, she had to learn to
    think in that language, rather than constantly translating everything back to
    her native language.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 让她惊讶的是，当她停止关注单个单词，而是专注于整体意义时，她发现理解段落变得容易得多。她意识到，要真正理解一种语言，她必须学会用那种语言思考，而不是不断地将一切都翻译回母语。
- en: If you're looking to get the most out of ChatGPT or any other platform, you've
    got to know a thing or two about the language it speaks. You also have to learn
    to think a bit differently to how you engage with search engines like Google.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要充分利用ChatGPT或任何其他平台，你必须了解它所使用的语言。你还必须学会以不同的方式思考，与像谷歌这样的搜索引擎互动。
- en: Compared to ChatGPT, using the Google search engine is a bit like laboriously
    translating every word discretely, like Sophie was doing. ChatGPT is an amazing
    tool that can generate all sorts of responses, but to get the best possible results,
    you need to know how to ask for what you want.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT相比，使用谷歌搜索引擎有点像辛辛苦苦地逐词翻译，就像索菲在做的那样。ChatGPT是一个能够生成各种回应的神奇工具，但要得到最佳结果，你需要知道如何提出你想要的要求。
- en: And the way you do that is with prompts.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 而你做到这一点的方式就是使用提示。
- en: Prompts are the key to unlocking the power of ChatGPT or any other generative
    AI tool, and they will save you hundreds of hours otherwise spent trawling search
    engine results, experiencing false starts and agonising over where to begin.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是解锁ChatGPT或任何其他生成式AI工具力量的关键，它们将为你节省数百小时本应花费在搜索引擎结果中搜索、经历失败尝试和痛苦地思考从何开始的时间。
- en: Oh! And while we focus closely on ChatGPT in this book, this is another reminder
    that the same ideas and suggestions will work with almost any generative AI platform.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 哦！虽然我们在本书中密切关注ChatGPT，但这也是一个提醒，同样的想法和建议几乎可以适用于任何生成式AI平台。
- en: What exactly is a prompt?
  id: totrans-821
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示究竟是什么？
- en: 'A prompt is the info you give to ChatGPT to receive a response. It''s kind
    of like when you ask Google a question: the more specific and detailed your query,
    the better the results you''ll get. With ChatGPT, the better your prompt, the
    better the outcome.'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是你提供给ChatGPT以获得回应的信息。这有点像你向谷歌提问时：你的查询越具体、越详细，你得到的结果就越好。在ChatGPT中，你的提示越好，结果就越好。
- en: What makes a good prompt?
  id: totrans-823
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是一个好的提示？
- en: A good prompt is clear, specific and engaging. If you give ChatGPT a great prompt,
    it can understand exactly what you're looking for, and that means you'll get more
    personalised and useful responses, saving you time, energy and effort.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的提示是清晰、具体且吸引人的。如果你给ChatGPT一个很好的提示，它就能准确地理解你想要什么，这意味着你将获得更多个性化、有用的回应，节省你的时间、精力和努力。
- en: 'In my experience, the more I can give it, the better it gets. As [figure 4.1](#c04.xhtml#c04-fig-0001)
    (overleaf) illustrates, I try to include things like:'
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，我能提供的越多，它就越好。正如[图4.1](#c04.xhtml#c04-fig-0001)（见下页）所示，我试图包括以下内容：
- en: '**Perspective:** The context, situation or environment you are in; for example,
    tell ChatGPT a little about what you are doing and why.'
  id: totrans-826
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视角**：你所处的上下文、情境或环境；例如，告诉ChatGPT你正在做什么以及为什么。'
- en: '**Purpose:** The specific goal of the conversation.'
  id: totrans-827
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的**：对话的具体目标。'
- en: For example, the purpose of a conversation with ChatGPT could be to ask for
    information, get a recommendation, or simply have a casual conversation. Or you
    could ask it to write something positive or critical or from a balanced perspective.
  id: totrans-828
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，与ChatGPT对话的目的可能是获取信息、获得推荐，或者简单地进行闲聊。或者你可以要求它写一些积极、消极或平衡的观点。
- en: '**Personality:** The tone and style of the conversation.'
  id: totrans-829
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性**：对话的语气和风格。'
- en: This could include the use of humour, empathy or other emotional elements to
    make the conversation more engaging and human‐like. For example, you can tell
    it how you want it to respond, such as chatty, conversational, formal or even
    imitating a person like Oprah or Homer Simpson.
  id: totrans-830
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这可能包括使用幽默、同理心或其他情感元素来使对话更加吸引人、更有人性化。例如，你可以告诉它你希望它如何回应，比如闲聊、对话、正式，甚至模仿像奥普拉或霍默·辛普森这样的人。
- en: '![A triangle diagram of the 3P''s of great prompts indicates the following:
    1\. Perspective. 2\. Purpose. 3\. Personality.](images/c04f001.png)'
  id: totrans-831
  prefs: []
  type: TYPE_IMG
  zh: '![表示优秀提示的3P三角图表明以下内容：1. 视角。2. 目的。3. 个性。](images/c04f001.png)'
- en: '[**Figure 4.1:**](#c04.xhtml#R_c04-fig-0001) **What makes a good prompt?**'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: '[**图4.1**](#c04.xhtml#R_c04-fig-0001) **什么是一个好的提示？**'
- en: Think of it as though you're speaking the language that ChatGPT understands
    and the points here are the syntax. It's an incredible tool, but it can't read
    your mind (not yet at least) — it needs specific information in order to provide
    the best possible response. So, give it a clear and concise prompt, and it'll
    work its magic for you.
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在说ChatGPT能理解的语言，这里提到的点是语法。这是一个不可思议的工具，但它不能读你的心思（至少目前还不能）——它需要具体的信息才能提供最佳可能的回应。所以，给它一个清晰、简洁的提示，它就会为你施展魔法。
- en: For example, if you want some healthy breakfast ideas, a prompt like, ‘We are
    a family of five with three kids under 12 who are always in a rush in the morning.
    Give me some easy and healthy breakfast recipes that I can make in ten minutes’,
    is much better than a generic prompt like ‘healthy breakfast ideas’, which is
    more what you would do for a Google search.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你想得到一些健康的早餐想法，一个像“我们是一个五口之家，有三个12岁以下的孩子们，他们早上总是匆匆忙忙。给我一些我可以在十分钟内制作的简单健康的早餐食谱”，这样的提示词比一个通用的提示词“健康的早餐想法”要好得多，后者更像是你为Google搜索做的事情。
- en: '**************The more specific and detailed your prompt, the more likely it
    is that ChatGPT will provide you with the results you''re looking for.**************'
  id: totrans-835
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**************你的提示词越具体、越详细，ChatGPT提供你所需结果的可能性就越大。**************'
- en: A colleague of mine uses ChatGPT to correct her spelling, grammar and style,
    something she was always worried about when writing emails or articles.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 我的同事使用ChatGPT来纠正她的拼写、语法和风格，这是她写电子邮件或文章时一直担心的问题。
- en: '**Example prompt:** Correct the following passage in terms of style, spelling
    and grammar, which is intended to be sent to the CEO of a retail chain of stores
    with a view to setting up a meeting with them.'
  id: totrans-837
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示词：**根据风格、拼写和语法纠正以下段落，该段落旨在发送给连锁零售店的CEO，以便与他们安排会面。'
- en: Clever, eh?
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 智慧，对吧？
- en: The better your prompts, the more complete and applicable the results will be.
    Don't forget the old adage, ‘rubbish in, rubbish out’. It applies here too.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示词越好，结果就越完整、越适用。别忘了那句老话，“垃圾输入，垃圾输出”。这也适用于这里。
- en: I've had a few people say to me, ‘I tried ChatGPT, and the result was rubbish!
    I could have written it better myself!’
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 我听到一些人对我说，“我试过ChatGPT，结果一塌糊涂！我自己能写得更好！”
- en: To address the first point, crafting prompts takes practice. If you did it once,
    got a rubbish response and then threw your hands in the air and walked away, then
    of course you are not going to get a great result. This is no different to learning
    any new skill. I remember the first time I tried to use PowerPoint. Coming from
    a word‐processing background (showing my age here), I couldn't make sense of it.
    I didn't give up though and now I am a PowerPoint pro.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 针对第一个问题，编写提示词需要练习。如果你只做了一次，得到了糟糕的回应，然后举手放弃并离开，那么当然你不会得到很好的结果。这与学习任何新技能没有区别。我记得我第一次尝试使用PowerPoint。作为一个来自文字处理背景的人（在这里展示我的年龄），我无法理解它。但我没有放弃，现在我已经成了PowerPoint专家。
- en: When it comes to creating prompts, I use the word ‘craft’ specifically, because
    constructing a prompt can be a bit of an art and the better you get at it, the
    more time you will save and, frankly, the more fun you will have.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到创建提示词时，我特别使用“制作”这个词，因为构造一个提示词可以是一种艺术，而你越擅长它，你就能节省更多的时间，坦白说，你也会更有乐趣。
- en: 'As to the second objection: if you can write better yourself, then go ahead
    and write better yourself.'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 关于第二个反对意见：如果你能写得更好，那么就自己去写吧。
- en: '**************Don''t overload ChatGPT with unnecessary details.**************'
  id: totrans-844
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**************不要用不必要的细节来超载ChatGPT。**************'
- en: You want to give it enough information to understand what you're looking for,
    but you don't want to confuse it with too much info. A prompt that is too complex
    can lead to less effective responses, while a prompt that's too vague can result
    in generic and unhelpful responses. Finding the right balance is key.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 你想要提供足够的信息来理解你想要什么，但你又不希望用过多的信息使其混淆。过于复杂的提示词可能导致响应效果不佳，而过于模糊的提示词可能导致通用且无用的响应。找到正确的平衡是关键。
- en: 'For example, here is a prompt that is too complex: Given the current political
    climate and social unrest in various regions of the world, including economic
    instability, climate change and human rights violations, how can governments and
    international organisations work together to address these complex and interconnected
    issues while also balancing competing interests and values, such as sovereignty,
    security, democracy and human dignity?'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下是一个过于复杂的提示词：鉴于当前世界各地的政治气候和社会动荡，包括经济不稳定、气候变化和侵犯人权，政府和国际组织如何共同努力解决这些复杂且相互关联的问题，同时平衡相互竞争的利益和价值，如主权、安全、民主和人权？
- en: 'And here is one that is too vague: What are your thoughts on the current world
    situation?'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一个过于模糊的例子：你对当前的世界形势有什么看法？
- en: 'Having said that, I have been able to copy and paste large chunks of text into
    ChatGPT to get the result I''m looking for. For example:'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我已经能够将大段文本复制粘贴到ChatGPT中，以获得我想要的结果。例如：
- en: '**Example prompt:** I''m doing a presentation at a board meeting [*perspective*]
    where I need to positively influence the board about the topic [*purpose*]. Summarise
    the following down to no more than four bullet points in a professional but engaging
    style [*personality*]. [*Then paste the copy you want summarised*.]'
  id: totrans-849
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 我将在董事会会议上做一个演讲[*视角*]，我需要就主题[*目的*]积极影响董事会。以下内容请用专业而吸引人的风格总结成不超过四个要点[*个性*]。[*然后粘贴你想总结的副本*]。'
- en: Different types of prompts can lead to different types of responses
  id: totrans-850
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不同类型的提示会导致不同类型的回应
- en: Open‐ended prompts can lead to more creative and imaginative responses, while
    more specific prompts can provide you with more concrete information or data.
    So go ahead and experiment with different types of prompts to discover what works
    best for you and your needs.
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示可以引导出更具创造性和想象力的回应，而更具体的提示可以为你提供更具体的信息或数据。所以，不妨尝试不同的提示类型，以发现最适合你和你需求的方法。
- en: There are potentially hundreds of different types of prompts you can use with
    ChatGPT (or any other AI tool). Right now, people are selling ‘50 ChatGPT prompts
    for marketers’ for $47 all over the internet and, while I applaud their ingenuity,
    you don't need anything near that to get going.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用ChatGPT（或任何其他AI工具）的潜在提示类型可能有数百种。目前，人们在网上以47美元的价格出售“50个适合营销人员的ChatGPT提示”，虽然我赞赏他们的独创性，但你不需要接近这个数量就能开始。
- en: Here are a few different types of prompts to help get you started (see [figure
    4.2](#c04.xhtml#c04-fig-0002)).
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些不同类型的提示，可以帮助你开始（见图4.2[图4.2](#c04.xhtml#c04-fig-0002)）。
- en: EXPLORATORY PROMPTS
  id: totrans-854
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索型提示
- en: 'These are like asking broad open questions and are perfect for exploring a
    wide range of ideas and opinions. Responses can be insightful, creative and thought‐provoking.
    For example:'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 这些就像提出广泛开放式问题，非常适合探索各种想法和观点。回应可以是富有洞察力、富有创意和引人深思的。例如：
- en: What are your thoughts on the role of AI in addressing climate change?
  id: totrans-856
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你对AI在应对气候变化中的作用有何看法？
- en: What's the best way to use ChatGPT to come up with creative ideas?
  id: totrans-857
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT来产生创意想法的最佳方式是什么？
- en: What are some fun games I can play with ChatGPT?
  id: totrans-858
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我可以和ChatGPT玩哪些有趣的游戏？
- en: CUSTOMISED PROMPTS
  id: totrans-859
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定制型提示
- en: 'These are a bit like ‘fill in the blanks’, and they allow you to input specific
    information into a sentence or question, tailoring the response to your particular
    needs. For example:'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 这些有点像“填空”，允许你将特定信息输入到句子或问题中，使回应符合你的特定需求。例如：
- en: Can you provide me with a list of [*books, movies, songs*] that are great for
    improving mental health?
  id: totrans-861
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能给我提供一份[*书籍、电影、歌曲*]清单，这些对改善心理健康很有帮助吗？
- en: Can you suggest some [*recipes, ingredients, dishes*] that are good for a plant‐based
    diet?
  id: totrans-862
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能推荐一些[*食谱、食材、菜肴*]，适合植物性饮食吗？
- en: What are some [*exercises, stretches, yoga poses*] that can help relieve lower
    back pain?
  id: totrans-863
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有哪些[*锻炼、伸展、瑜伽姿势*]可以帮助缓解下背部疼痛？
- en: '![A circle diagram representing types of prompts indicates the following: 1\.
    Exploratory. 2\. Customised. 3\. Context. 4\. Step-by-step. 5\. Evaluation. 6\.
    Follow up.](images/c04f002.png)'
  id: totrans-864
  prefs: []
  type: TYPE_IMG
  zh: '![表示提示类型类型的圆形图表示以下内容：1. 探索型。2. 定制型。3. 上下文型。4. 步骤型。5. 评估型。6. 跟进型。](images/c04f002.png)'
- en: '[**Figure 4.2:**](#c04.xhtml#R_c04-fig-0002) **Different types of prompts**'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: '[**图4.2**](#c04.xhtml#R_c04-fig-0002) **不同类型的提示**'
- en: CONTEXT PROMPTS
  id: totrans-866
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文型提示
- en: 'These provide contextual descriptions and are useful when you''re facing a
    difficult or complex situation and need some guidance. Responses are often in
    the form of practical advice and solutions. For example:'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提供上下文描述，在你面临困难或复杂情况并需要一些指导时很有用。回应通常是实际建议和解决方案的形式。例如：
- en: I have to give a presentation on a topic I don't know much about. How can I
    prepare for it?
  id: totrans-868
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我必须就一个我不太了解的主题做演讲。我该如何准备？
- en: I have a difficult conversation coming up with my boss. What are some strategies
    to approach it effectively?
  id: totrans-869
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我即将与老板进行一次艰难的对话。有哪些有效的应对策略？
- en: I want to start a new business, but I'm not sure which direction to take. Can
    you provide some ideas and suggestions?
  id: totrans-870
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我想开一家新公司，但不确定该走哪个方向。你能提供一些想法和建议吗？
- en: STEP‐BY‐STEP PROMPTS
  id: totrans-871
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤型提示
- en: 'These are great for providing clear and concise instructions on how to perform
    a particular task or achieve a specific goal. For example:'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 这些非常适合提供如何执行特定任务或实现特定目标的清晰简洁的说明。例如：
- en: What are the steps to creating a successful social media marketing campaign
    for a new liquid soap?
  id: totrans-873
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为一款新的液体肥皂创建成功的社交媒体营销活动的步骤是什么？
- en: What are the steps to make a homemade pepperoni pizza?
  id: totrans-874
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制作自制意大利辣香肠披萨的步骤是什么？
- en: What are the steps to troubleshoot a computer that won't turn on?
  id: totrans-875
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何排除无法开机的电脑故障？
- en: EVALUATION PROMPTS
  id: totrans-876
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**评估提示**'
- en: 'These are useful when you want to get an objective and data‐driven perspective
    on something. Typically, responses will provide constructive feedback and suggestions
    for improvement. For example:'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想对某事有一个客观和基于数据的视角时，这些想法很有用。通常，回复会提供建设性的反馈和改进建议。例如：
- en: I need to write an email that is empathetic because of its sensitive nature.
    Can you provide feedback on the style and approach?
  id: totrans-878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我需要写一封由于其敏感性质而富有同理心的电子邮件。你能对风格和方法提供反馈吗？
- en: I have been trying to improve my writing skills. Can you provide feedback on
    my grammar and sentence structure?
  id: totrans-879
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我一直在尝试提高我的写作技巧。你能对我的语法和句子结构提供反馈吗？
- en: I have launched a new product on my website. Can you give me feedback on the
    product description?
  id: totrans-880
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我在我的网站上推出了一款新产品。你能对我的产品描述提供反馈吗？
- en: FOLLOW‐UP PROMPTS
  id: totrans-881
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**后续提示**'
- en: 'These are questions that you ask ChatGPT in response to its initial answer
    in order to get more information, dig deeper or clarify something. They can be
    a helpful way to get even more useful responses from ChatGPT. For example:'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是你对 ChatGPT 的初始答案提出的问题，以获取更多信息、深入挖掘或澄清某些内容。它们是获取更多有用回答的有用方式。例如：
- en: '**Example prompt:** Please provide me with some healthy breakfast ideas.'
  id: totrans-883
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：请为我提供一些健康的早餐想法。'
- en: ''
  id: totrans-884
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** How about some oatmeal with fresh fruit and nuts?'
  id: totrans-885
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：来点带新鲜水果和坚果的燕麦粥怎么样？'
- en: ''
  id: totrans-886
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Follow‐up prompt:** Can you give me some more specific ideas for oatmeal
    toppings?'
  id: totrans-887
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**后续提示**：你能给我一些关于燕麦粥顶料的更具体想法吗？'
- en: ''
  id: totrans-888
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Example prompt:** Can I have some writing prompts for a fiction story?'
  id: totrans-889
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：我能有一些用于虚构故事的写作提示吗？'
- en: ''
  id: totrans-890
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** How about writing a story about a detective solving a mystery?'
  id: totrans-891
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：写一个侦探解决谜案的故事的怎么样？'
- en: ''
  id: totrans-892
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Follow‐up prompt:** Do you have any tips for creating a compelling detective
    character?'
  id: totrans-893
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**后续提示**：你有什么建议来创造一个引人入胜的侦探角色吗？'
- en: ''
  id: totrans-894
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Example prompt:** Can I have some ideas for some travel recommendations?'
  id: totrans-895
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：我能有一些旅行推荐的想法吗？'
- en: ''
  id: totrans-896
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** How about visiting Paris?'
  id: totrans-897
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：去巴黎怎么样？'
- en: ''
  id: totrans-898
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Follow‐up prompt:** What are some must‐see sights in Paris?'
  id: totrans-899
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**后续提示**：巴黎有哪些必看的景点？'
- en: A colleague used the exact travel example here by asking it for a three‐day
    itinerary in Paris that included patisseries, museums and parks. Then (because
    its suggestions were scattered all over the city), they followed up by asking
    it to rework the itinerary so that the activities for each day were located closer
    together geographically.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 同事在这里使用了一个确切的旅行示例，询问它巴黎三天的行程，包括糕点店、博物馆和公园。然后（因为它的建议散布在城市的各个角落），他们跟进询问它重新制定行程，以便每天的活动在地理位置上更靠近。
- en: ‘Funnily enough, one of the days it gave me was an exact day of activities I
    did on a previous trip to Paris,’ she told me.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: “有趣的是，它给我的一天活动正好是我之前去巴黎旅行时的一天，”她告诉我。
- en: Then she went down the rabbit hole and started asking very specific details;
    for example, ‘stores selling trendy clothing for women in their thirties’, followed
    up with, ‘some more affordable options’, and then, ‘sustainable brands I can shop
    in Paris’.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，她进入了兔子洞，开始询问非常具体的信息；例如，“出售三十多岁女性时尚服装的商店”，接着是，“一些更实惠的选择”，然后，“在巴黎可以购买的可持续品牌”。
- en: Voice‐to‐text
  id: totrans-903
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语音到文本
- en: Voice‐to‐text apps use speech‐recognition technology to transcribe spoken words
    into written text. You might have used a voice‐to‐text app before to send a text
    message or write an email hands‐free.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 语音到文本应用使用语音识别技术将 spoken words 转录成 written text。你可能之前使用过语音到文本应用来无手发送短信或写电子邮件。
- en: So, how can you use your favourite voice‐to‐text app to create prompts for ChatGPT?
    It's too easy.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你如何使用你最喜欢的语音到文本应用为 ChatGPT 创建提示？这太简单了。
- en: If you have MS Word on your computer and the dictation setting is turned on
    (‘Settings’ > ‘Keyboard’ > toggle on ‘Dictation’), you can simply use this function
    to record anything you want into Word.
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你电脑上有MS Word并且启用了语音输入设置（‘设置’ > ‘键盘’ > 打开‘语音输入’），你可以简单地使用这个功能将任何你想要的内容记录到Word中。
- en: 'Then you copy and paste the results into ChatGPT. For example:'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将结果复制粘贴到ChatGPT中。例如：
- en: Say a prompt that you'd like to use for ChatGPT; for example, you might say,
    ‘I need to generate an email to plan an upcoming social club event [describe event]’.
  id: totrans-908
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 说一个你想要用于ChatGPT的提示；例如，你可能会说，“我需要生成一封电子邮件来计划即将到来的社交俱乐部活动 [描述活动]”。
- en: Stop the recording and let the app transcribe your words into text.
  id: totrans-909
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 停止录音并让应用将你的话转录成文本。
- en: Copy the text and paste it as a prompt for ChatGPT.
  id: totrans-910
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复制文本并将其作为提示粘贴到ChatGPT中。
- en: One thing to keep in mind is that voice‐to‐text apps aren't always 100 per cent
    accurate. Depending on your accent, speaking style, and background noise, the
    transcription might contain errors or misunderstandings. When you use a voice‐to‐text
    app to create prompts for ChatGPT, be sure to read over the text and make any
    necessary corrections before using it as a prompt.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，语音转文字应用并不总是100%准确。根据你的口音、说话方式和背景噪音，转录可能包含错误或误解。当你使用语音转文字应用为ChatGPT创建提示时，务必在将其用作提示之前阅读文本并进行任何必要的更正。
- en: '**************Voice‐to‐text apps to create prompts for ChatGPT can be a convenient
    and efficient way to generate new text, particularly if you find riffing on a
    topic easier than typing about it.**************'
  id: totrans-912
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**************使用语音转文字应用为ChatGPT创建提示可以是一种方便且高效地生成新文本的方法，尤其是如果你发现即兴发挥比打字更容易的话。**************'
- en: I have a friend who doesn't trust her spelling or vocabulary for typing, so
    she uses voice to text all the time to get the first draft of anything, including
    prompts, out of her head and onto the page.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 我有一个朋友不相信她的拼写或词汇量，所以她总是使用语音转文字来获取任何东西的初稿，包括提示，并将其从脑海中转移到页面上。
- en: The ChatGPT smartphone app is much more user‐friendly when it comes to voice‐to‐text.
    Skip over to [Chapter 7](#c07.xhtml) for more on this and other awesome things
    the mobile app is capable of.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT智能手机应用在语音转文字方面更加用户友好。跳转到[第7章](#c07.xhtml)了解更多关于这一点以及其他移动应用能够做到的酷炫功能。
- en: There's no longer such a thing as writer's block
  id: totrans-915
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现在已经没有所谓的“写作障碍”了
- en: Writer's block doesn't happen only to professional writers. It can be a real
    obstacle for anyone who has to make a start on a presentation, proposal, email
    or article, leaving them feeling frustrated and demotivated. But with ChatGPT,
    we now have a powerful tool that can help us overcome this challenge.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 写作障碍不仅仅发生在专业作家身上。它可能对任何需要开始制作演示文稿、提案、电子邮件或文章的人来说都是一个真正的障碍，让他们感到沮丧和缺乏动力。但有了ChatGPT，我们现在有一个强大的工具可以帮助我们克服这个挑战。
- en: In 2014, Dr Jason Fox wrote a book called *The Game Changer*, where he described
    progress as being a key motivator for humans to get things done. So, it stands
    to reason that being stuck, or not making progress, can be very demotivating.
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 在2014年，杰森·福克斯博士写了一本名为《变革者》的书，其中他描述进步是人类完成事情的关键动力。因此，可以合理推断，停滞不前或没有进展可能会非常打击人的积极性。
- en: With ChatGPT (or even directly in Microsoft Word, with Copilot), you can simply
    provide a prompt, and it can help generate ideas and kickstart the creative process.
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT（或者甚至直接在Microsoft Word中使用Copilot），你只需提供一个提示，它就可以帮助你生成想法并启动创作过程。
- en: It also helps with the writing process itself, from providing synonyms and antonyms
    to helping you with sentence structure and grammar.
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 它还有助于写作过程本身，从提供同义词和反义词到帮助你处理句子结构和语法。
- en: For many of us, all it takes is a little nudge to get the words flowing, and
    generative AI is here to provide just that.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们中的许多人来说，只需要一点推动就能让文字流畅起来，而生成式AI正是为此而来。
- en: For instance, let's say you're struggling to come up with an idea for a blog
    post. You can ask ChatGPT for suggestions, and it will provide you with a range
    of topics to choose from, based on its vast knowledge base. From there, it can
    offer guidance on how to approach the topic, what angle to take and even provide
    some research to support your writing. (As I mentioned in [Chapter 2](#c02.xhtml),
    we still need to double‐check any references, citations or sources for accuracy.)
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你正在为博客文章想出一个想法。你可以向ChatGPT寻求建议，它将根据其庞大的知识库为你提供一系列可供选择的主题。从那里，它可以提供如何处理主题、采取什么角度以及甚至提供一些研究来支持你的写作的指导。（正如我在[第二章](#c02.xhtml)中提到的，我们仍然需要仔细检查任何参考、引文或来源的准确性。）
- en: 'Here''s what happened when I did this very thing:'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 当我这样做的时候，发生了以下情况：
- en: '**Example prompt:** Give me three ideas for blog topics in the area of using
    technology to help you have the space and capacity for more value‐added activities
    or leisure time.'
  id: totrans-923
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 给我三个关于使用技术帮助你拥有更多增值活动或休闲时间的博客主题的想法。'
- en: (By the way, I love that you don't always have to be grammatically correct or
    even the best speller.)
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: （顺便说一句，我喜欢你不必总是语法正确，甚至不必是最好的拼写者。）
- en: '**ChatGPT:**'
  id: totrans-925
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT:**'
- en: ''
  id: totrans-926
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 5 Tech Tools to Automate Your Daily Tasks and Free Up More Time
  id: totrans-927
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 5个自动化日常任务并节省更多时间的科技工具
- en: How to Use Time‐Tracking Apps to Boost Your Productivity
  id: totrans-928
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何使用时间跟踪应用来提高你的生产力
- en: 'Mindfulness in the Digital Age: How to Stay Focused and Productive'
  id: totrans-929
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数字时代的正念：如何保持专注和高效
- en: ''
  id: totrans-930
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Follow‐up prompt:** Write a short, 150‐word blog for number 3 above.'
  id: totrans-931
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**后续提示：** 为上面第3个写一篇简短的、150字的博客。'
- en: ''
  id: totrans-932
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** Mindfulness in the Digital Age: How to Stay Focused and Productive'
  id: totrans-933
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT:** 数字时代的正念：如何保持专注和高效'
- en: ''
  id: totrans-934
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the digital age, constant distractions can hinder focus and productivity.
    Mindfulness helps stay centred amidst digital stimuli. Here are some tips for
    practicing mindfulness in the digital age:'
  id: totrans-935
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在数字时代，持续的干扰可能会阻碍专注和生产力。正念有助于在数字刺激中保持专注。以下是一些在数字时代练习正念的建议：
- en: ''
  id: totrans-936
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Take breaks to disconnect ‐ Set aside time each day to disconnect from your
    devices and the digital world.
  id: totrans-937
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 休息以断开连接 - 每天留出时间来断开你的设备和数字世界。
- en: Practice deep breathing ‐ Take a few deep breaths before responding to emails
    or starting a new task, and throughout the day.
  id: totrans-938
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习深呼吸 - 在回复电子邮件或开始新任务之前，以及在整个一天中，进行几次深呼吸。
- en: Use mindfulness apps ‐ There are many apps available that can help you develop
    mindfulness skills.
  id: totrans-939
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用正念应用 - 有许多应用可以帮助你培养正念技能。
- en: Practice mindful multitasking ‐ Be fully present and engaged in each task.
  id: totrans-940
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习正念式多任务处理 - 完全参与并专注于每一项任务。
- en: Take breaks to move ‐ Try taking a short walk, doing some stretching exercises,
    or practicing yoga during your breaks.
  id: totrans-941
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 休息时活动身体 - 尝试在休息时短暂散步、做一些伸展运动或练习瑜伽。
- en: ''
  id: totrans-942
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By practicing mindfulness in the digital age, you can stay focused and productive,
    even in the face of constant distractions.
  id: totrans-943
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过在数字时代练习正念，你可以即使在持续的干扰面前也能保持专注和高效。
- en: Okay, so it's actually 138 words and definitely needs work, but 80 per cent
    of the work is done.
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，实际上这是138个单词，肯定需要改进，但80%的工作已经完成了。
- en: It's like I turned to my intern or assistant and said, ‘Give me ten ideas of
    blog topics in the area of using technology to help you have the space and capacity
    for more value‐added activities, or leisure time. And then pick one and do a bit
    of research for me to review.’
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像我转向我的实习生或助理说：“给我十个关于使用技术帮助你拥有更多增值活动或休闲时间的博客主题的想法。然后挑选一个，为我做一些研究以便我审查。”
- en: In the past, that might have taken a person several hours; now, it's a matter
    of minutes.
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，这可能会花费一个人几个小时；现在，只需要几分钟。
- en: So far, ChatGPT has not been able to produce anything that I could directly
    copy and paste to a blog, article or chapter in a book. Everything has needed
    human intervention from tweaking to complete rewriting. But the time it takes
    to produce the list, and the first blog, has been dramatically reduced, leaving
    me to do other things or even take some much needed time out.
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，ChatGPT还没有能够产生我可以直接复制粘贴到博客、文章或书籍章节中的内容。每件事都需要人类干预，从微调到完全重写。但是，制作列表和第一篇博客所需的时间已经大大减少，这让我有时间做其他事情，甚至抽出一些非常需要的休息时间。
- en: '**************You still need to be an expert in your field to recognise good
    content.**************'
  id: totrans-948
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**************你仍然需要在你所在的领域成为专家，才能识别出好的内容。**************'
- en: As it happens, I know a thing or two about productivity. So, I can look at the
    results and, based on what I know, recognise that it’s not a bad response, despite
    still needing a tweak.
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，我对生产力有一定的了解。因此，我可以查看结果，并根据我所知，认识到这并不是一个糟糕的回应，尽管仍然需要微调。
- en: If I was writing a post about yoga, for example, something I have never tried,
    I would not be able to recognise bad from good content.
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我写一篇关于瑜伽的文章，而我从未尝试过，我就无法区分好坏内容。
- en: Best if you stay in your swim lane when it comes to creating content like blogs
    or newsletters.
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建博客或通讯等内容的游泳道中保持最佳状态。
- en: Get your ChatGPT radar tuned in
  id: totrans-952
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调整你的ChatGPT雷达
- en: Over the past 12 months you may have begun to notice clues as to whether someone
    has used AI to produce blogs, articles or other publications without any human
    intervention.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去12个月里，你可能已经开始注意到一些线索，表明某人是否在没有人为干预的情况下使用AI生成博客、文章或其他出版物。
- en: Use of the word ‘crucial’. For a while there every paragraph started with, ‘When
    it comes to being productive, it's crucial …’ Eventually I told it to stop using
    the word ‘crucial’, so it replaced it with ‘critical’.
  id: totrans-954
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用“至关重要的”一词。有一段时间，每个段落都以“说到提高生产力，至关重要的是……”开头。最终我让它停止使用“至关重要的”这个词，于是它用“关键的”来替换。
- en: Overuse of the original prompt at the beginning of every paragraph. For example,
    if the prompt was ‘Give me five tips on being more productive’, each paragraph
    would start with, ‘Another way to be more productive is …’
  id: totrans-955
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个段落开头过度使用原始提示。例如，如果提示是“给我提供五个提高生产力的建议”，每个段落都会以“提高生产力的另一种方法是……”开头。
- en: Overuse of cliché phrases like ‘in the hustle and bustle of our busy world …’
  id: totrans-956
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度使用陈词滥调，如“在我们繁忙世界的喧嚣中……”。
- en: 'Other things to watch out for:'
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 其他需要注意的事项：
- en: 'Lack of human touch: The text often lacks the human touch that comes with lived
    experiences, emotions and creative thinking. It''s like, ‘just the facts thanks,
    ma''am’.'
  id: totrans-958
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏人文关怀：文本往往缺乏与生活经历、情感和创造性思维相关的人文关怀。就像“谢谢，女士，只提供事实”。
- en: 'Lack of empathy and understanding: AI is not (yet) able to fully grasp the
    context, emotions and cultural nuances required for effective communication. This
    can lead to writing that lacks empathy, sensitivity or understanding of human
    experiences.'
  id: totrans-959
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏同理心和理解：AI（目前）无法完全理解有效沟通所需的上下文、情感和文化细微差别。这可能导致缺乏同理心、敏感度或对人类经验的了解的写作。
- en: 'Limited creativity: AI generates text based on pre‐existing patterns and data,
    so it isn''t always able to generate truly creative or original ideas. The responses
    tend to lack the spontaneous and serendipitous nature of human creativity.'
  id: totrans-960
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造力有限：AI根据现有的模式和数据进行文本生成，因此并不总是能够生成真正有创意或原创的想法。其回应往往缺乏人类创造力的自发性和偶然性。
- en: 'Technical glitches: Repeated words or strange sentence structures can be a
    dead giveaway that the piece was generated by AI.'
  id: totrans-961
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术故障：重复的词语或奇怪的句子结构可能是AI生成作品的明显迹象。
- en: No stories or anecdotes.
  id: totrans-962
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有故事或轶事。
- en: Here's a direct and unedited lift from ChatGPT on the topic of the benefits
    of traffic police in a large city.
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是从ChatGPT直接摘录的关于大城市中交通警察好处的话题，未经编辑。
- en: '**Example prompt:** What are three benefits of traffic police in a large city?'
  id: totrans-964
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：大城市中交通警察的三个好处是什么？'
- en: ''
  id: totrans-965
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** The benefits of traffic police in a large city are numerous, including:'
  id: totrans-966
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：在大城市中，交通警察的好处众多，包括：'
- en: 'Promoting road safety: Traffic police help ensure the safety of drivers, passengers,
    and pedestrians on busy roads by enforcing traffic laws and regulations. They
    monitor traffic flow and help prevent accidents by directing traffic and identifying
    potential hazards.'
  id: totrans-967
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 促进道路安全：交通警察通过执行交通法规和条例来确保繁忙道路上的驾驶员、乘客和行人的安全。他们监控交通流量，通过指挥交通和识别潜在危险来帮助预防事故。
- en: 'Managing traffic flow: Traffic police help to manage traffic flow during rush
    hour or peak traffic times by directing vehicles through busy intersections, ensuring
    that traffic moves smoothly and safely.'
  id: totrans-968
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管理交通流量：交通警察在高峰时段或交通高峰时段通过指挥车辆通过繁忙的十字路口来管理交通流量，确保交通顺畅和安全。
- en: 'Providing assistance: Traffic police provide assistance to drivers and pedestrians
    who may be in need of help, such as providing directions, changing a flat tire,
    or helping a stranded motorist.'
  id: totrans-969
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供帮助：交通警察为可能需要帮助的驾驶员和行人提供帮助，例如提供方向、更换备胎或帮助被困的驾驶员。
- en: Overall, the presence of traffic police in a large city can help to promote
    road safety, manage traffic flow, and provide assistance to those in need.
  id: totrans-970
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总体而言，在大城市有交通警察的存在可以帮助促进道路安全、管理交通流量，并为需要帮助的人提供援助。
- en: 'Firstly, I fully support having traffic police in large cities. I''m sharing
    this example to illustrate that while it''s a time saver, there''s no doubt we
    still need human intervention to write engaging, thoughtful and inspiring content.
    I believe you can spot the dehumanised AI a mile off by noticing:'
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我完全支持在大城市有交通警察。我分享这个例子是为了说明，虽然它能节省时间，但我们仍然需要人类干预来撰写引人入胜、深思熟虑和鼓舞人心的内容。我相信你只需注意以下几点，就能在一英里外发现去人性化的人工智能：
- en: Each bullet point description starting with ‘Traffic police’.
  id: totrans-972
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以“交通警察”开头的每个项目描述。
- en: The summary at the end just repeating the three key points.
  id: totrans-973
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结尾的总结只是重复了三个关键点。
- en: I'm not sure of the accuracy of point 3.
  id: totrans-974
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我不确定第3点的准确性。
- en: And it just feels like it's missing something.
  id: totrans-975
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而且它似乎缺少了点什么。
- en: What was the giveaway for you?
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 你的线索是什么？
- en: Sometimes it's blatantly obvious someone has used ChatGPT to ‘help’ them along.
    In 2023, an environmental journal published a paper on the use of renewable energy
    in cleaning up contaminated land.
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候很明显有人使用了ChatGPT来“帮助”他们。在2023年，一份环境杂志发表了一篇关于在清理受污染土地中使用可再生能源的论文。
- en: The article included the phrase ‘Regenerate response’ at the end of a ‘methods’
    section. This happens when you directly copy and paste from ChatGPT and accidentally
    grab the headers and footers of the web page. ‘Regenerate response’ is the button
    that prompts the chatbot to have another go if you are unhappy with what it's
    done.
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 文章在“方法”部分的结尾包含了“再生响应”这个短语。这发生在你直接从ChatGPT复制粘贴时，不小心抓取了网页的页眉和页脚。如果对ChatGPT给出的结果不满意，“再生响应”是提示聊天机器人再次尝试的按钮。
- en: It's a mystery how this survived the scrutiny of proofreaders, editors, referees
    and typesetters and highlights that you should make sure you reference any bots
    you use in writing content.
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是如何在审稿人、编辑、审稿人和排版者的审查下幸存下来的，这突出了你应确保在撰写内容时引用你使用的任何机器人。
- en: There are a growing number of AI detection tools. According to a recent study,
    they range in accuracy of 63 per cent to 88 per cent.
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: AI检测工具的数量正在增加。根据最近的一项研究，它们的准确率在63%到88%之间。
- en: For example, I have played around with ZeroGPT and found that its accuracy is
    questionable. Paragraphs I have written myself have been flagged as AI, while
    paragraphs where I got help from ChatGPT were not flagged at all.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我尝试过ZeroGPT，并发现其准确性值得怀疑。我自己写的段落被标记为AI，而我从ChatGPT那里获得帮助的段落则完全没有被标记。
- en: As someone who uses ChatGPT as a hybrid tool — meaning I often get a start with
    it, and then edit with my own thoughts and words — I often run my work through
    ZeroGPT to make sure I've intervened enough to make it read like a human wrote
    it.
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位将ChatGPT作为混合工具使用的人——这意味着我经常用它来开始，然后用我自己的思想和语言进行编辑——我经常将我的作品通过ZeroGPT进行检查，以确保我介入得足够多，使其读起来像是由人类所写。
- en: Copyright and plagiarism
  id: totrans-983
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 版权和剽窃
- en: As an artificial intelligence, ChatGPT does not own any intellectual property
    of its own. What does that mean for you? It means you can use what it generates
    without worrying.
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个人工智能，ChatGPT并不拥有任何自己的知识产权。这对你们意味着什么？这意味着你们可以使用它生成的任何内容而无需担心。
- en: But there's a catch. If the data on which ChatGPT was trained on was plagiarised,
    the answers it gives you could be considered plagiarism too.
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个问题。如果ChatGPT训练所用的数据是剽窃的，那么它给出的答案也可能被认为是剽窃。
- en: '*The New York Times* sued OpenAI and Microsoft over this very thing, claiming
    millions of articles from the *NYT* had been used in training the ChatBots.'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: '*《纽约时报》*就此事起诉了OpenAI和微软，声称数百万篇来自*《纽约时报》*的文章被用于训练ChatBots。'
- en: They aren't alone. Alternet, The Intercept and Raw Story have all filed separate
    lawsuits claiming that ChatGPT reproduced ‘verbatim or nearly verbatim copyright‐protected
    works of journalism’.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 他们并不孤单。Alternet、The Intercept和Raw Story都分别提起了诉讼，声称ChatGPT复制了“逐字或几乎逐字”的受版权保护的新闻作品。
- en: A class action of 17 authors including the likes of George RR Martin and John
    Grisham claims that people are now able to use the bot to write ‘in the style
    of’ those authors, which allows anyone ‘to generate, automatically and freely
    (or very cheaply) — texts that they would otherwise pay writers to create.’
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 包括乔治·R·R·马丁和约翰·格里沙姆在内的17位作者提起的集体诉讼声称，人们现在能够使用这个机器人以这些作者的风格写作，这允许任何人“自动、免费（或非常便宜）地生成文本，否则他们可能需要支付作家来创作。”
- en: Another class action of artists and illustrators against a group of image‐generation
    apps claimed companies were misusing their work to train their AI systems. Like
    the authors, visual artists are concerned that the apps are trained to create
    art in their style, allowing anyone to create works that are ‘indistinguishable’
    from their own.
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 另一起艺术家和插图画家对一组图像生成应用的集体诉讼称，公司正在滥用他们的作品来训练他们的 AI 系统。像作者一样，视觉艺术家担心这些应用被训练以他们的风格创作艺术，允许任何人创作出“无法区分”的作品。
- en: But wait — can my AI‐produced works be copyrighted? This battle is still going
    on in the courts, and current laws do not extend to non‐human creators.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等——我的 AI 生成的作品能被版权保护吗？这场战斗仍在法庭上继续，并且现行法律并不适用于非人类创作者。
- en: '**************That means your AI‐generated works are not necessarily ‘yours’.**************'
  id: totrans-991
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**************这意味着你用 AI 生成的作品并不一定是‘你的’。**************'
- en: The challenge is real, and I don't believe we have seen the end of lawsuits
    of this nature as the AI world comes to grips with how to protect creative agency.
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 这个挑战是真实的，我相信我们还没有看到这类诉讼的终结，因为人工智能世界正在努力应对如何保护创意自由。
- en: So, how do you avoid accidental plagiarism?
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如何避免无意中抄袭呢？
- en: Use AI‐generated content as a starting point, draft or inspiration for your
    own original work. Avoid using it verbatim.
  id: totrans-994
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 AI 生成的内容作为你原创作品的起点、草案或灵感来源。避免直接使用。
- en: Provide attribution to source content (you may need to Google it) or note that
    you used an AI tool to assist in generating your content.
  id: totrans-995
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为源内容提供归属（你可能需要用 Google 搜索）或注明你使用了 AI 工具来辅助生成内容。
- en: Use plagiarism tools to help identify any sections of your content that might
    be too similar to existing published content. (For example, applications like
    Grammarly, Scribbr and Quetext.)
  id: totrans-996
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用抄袭检测工具帮助识别你内容中可能与现有出版内容过于相似的任何部分。（例如，Grammarly、Scribbr 和 Quetext 等应用程序。）
- en: Keep an eye out for those declarative statements that must have come from somewhere.
    When ChatGPT makes a bold statement, go look for a source.
  id: totrans-997
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意那些必须来自某处的声明性陈述。当 ChatGPT 做出大胆的声明时，去找找来源。
- en: GPT‐4 is better at providing accurate sources and references, and I expect this
    will further improve in future iterations.
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 在提供准确来源和参考方面做得更好，我预计这将在未来的迭代中进一步改进。
- en: What about being polite to ChatGPT?
  id: totrans-999
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，对 ChatGPT 礼貌对待又如何呢？
- en: 'I have found myself saying ‘please’ and ‘thank you’ constantly to ChatGPT.
    For example:'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现自己一直在对 ChatGPT 说“请”和“谢谢”。例如：
- en: '**Example prompt:** Please provide examples of cuisines found in Northern Europe.'
  id: totrans-1001
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：请提供北欧发现的菜系示例。'
- en: 'Then when it answers, and I need more info, I then type:'
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 然后当它回答后，我需要更多信息时，我就输入：
- en: '**Follow‐up prompt:** Thank you. Can you now please limit it to Germany, Norway
    and Denmark?'
  id: totrans-1003
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**后续提示**：谢谢。现在你能请它限制在德国、挪威和丹麦吗？'
- en: Turns out I'm not the only one. My daughter suggested that she does it because,
    ‘when the robots take over the world, I want them to remember that I was nice
    to them’.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 结果发现，不止我一个人这样。我的女儿建议她这样做是因为，“当机器人接管世界时，我希望它们能记住我对它们很好”。
- en: 'Multiple discussions on Reddit and Twitter have found users of ChatGPT are
    also asking these somewhat philosophical questions: ‘Does anyone else feel obligated
    to be polite to ChatGPT when asking questions?’ one user asked. ‘Maybe it''s my
    old‐school upbringing, but I just feel bad if I don''t use “please” and “thank
    you” or other polite ways of framing my questions/prompts.’'
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Reddit 和 Twitter 上有多次讨论发现，ChatGPT 的用户也在提出一些哲学性的问题：“在向 ChatGPT 提问时，是否有人觉得有义务礼貌对待它？”一位用户问道。“可能是因为我受的是老式教育，但如果不使用‘请’和‘谢谢’或其他礼貌的方式来构建我的问题/提示，我会感到不舒服。”
- en: This particular post ended up with 350 responses from users, most of whom said
    that they are polite to ChatGPT.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 这个特定的帖子最终收到了 350 条用户的回复，其中大多数人表示他们对 ChatGPT 很礼貌。
- en: ‘I literally said to it the other day, “Hi, I need some help with calculus,
    please”’, another user responded.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: “我那天真的对它说，‘嗨，我需要一些微积分的帮助，请’”，另一位用户回应道。
- en: An X (formerly Twitter) survey found that over 65 per cent of users found it
    difficult to be rude to bots like ChatGPT.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 2010年，苹果推出了iPad。它被宣传为一种革命性的设备，用于浏览网页、玩游戏、阅读电子书和观看视频。我不知道你怎么样，但我迫不及待地想要得到一台，尽管我不知道我会用它做什么！
- en: In the end, it seems that politeness says more about the human using the bot,
    than the bot itself, and it could be my imagination, but I have found that when
    I ask politely, ChatGPT is polite back to me starting responses with, ‘Certainly!’
    or ‘No problem!’
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，似乎礼貌更多地反映了使用机器人的人类，而不是机器人本身，而且这可能只是我的想象，但我发现当我礼貌地提问时，ChatGPT会以“当然！”或“没问题！”开始回应。
- en: So, there you have it. Prompts are a crucial part of using ChatGPT effectively.
    By providing clear, specific and engaging prompts, you can unlock ChatGPT's incredible
    potential and get the most out of this remarkable tool.
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，iPad已经成为一种多功能的工具，它改变了我们的工作、娱乐和沟通方式。它已经成为教学和学习的有力工具，不仅限于课堂，也适用于远程学习。
- en: Oh, and this prompt thing? It's true for any AI or ML application. The output
    is always based on the quality of the prompt.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，还有这个提示词？这适用于任何AI或ML应用。输出总是基于提示词的质量。
- en: PART II
  id: totrans-1012
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在医疗保健行业的影响不容置疑，医生和护士使用该设备访问电子健康记录、显示医疗图像和视频以及跟踪患者数据。这使得患者护理更加高效和准确。
- en: GET PRODUCTIVE
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 摄影师、数字艺术家和音乐家找到了创新地使用该工具的方法，这得益于看到潜力的开发者创造了惊人的应用程序，这些应用程序彻底改变了我们使用iPad的方式。像Evernote、Proloquo2Go、GarageBand和Office365这样的应用程序使得创建和组织信息、沟通以及远程工作成为可能，而这些原本并非其最初的目的。
- en: '![bulb design](images/bulb_kd.png)'
  id: totrans-1014
  prefs: []
  type: TYPE_IMG
  zh: 所以，这就是全部了。提示词是有效使用ChatGPT的关键部分。通过提供清晰、具体且引人入胜的提示词，你可以解锁ChatGPT的惊人潜力，并充分利用这个非凡的工具。
- en: In 2010, Apple introduced the iPad. It was marketed as a revolutionary device
    for browsing the web, playing games, reading e‐books and watching videos. I don't
    know about you, but I couldn't wait to get my hands on one, even though I didn't
    know what I would do with it!
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 提高生产力
- en: Today, the iPad has become a versatile tool that has transformed the way we
    work, play and communicate. It has become a powerful tool for teaching and learning,
    not just in the classroom, but also for remote learning.
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分
- en: The impact in the healthcare industry cannot be doubted, with doctors and nurses
    using the device to access electronic health records, display medical images and
    videos, and track patient data. This has made patient care much more efficient
    and accurate.
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: '![灯泡设计](images/bulb_kd.png)'
- en: Photographers, digital artists and musicians have found ways to use the tool
    innovatively, thanks to developers who saw the potential and created amazing apps
    that have completely revolutionised the way we use the iPad. Apps like Evernote,
    Proloquo2Go, GarageBand and Office365 have made it possible to create and organise
    information, communicate, and work remotely in ways it was never originally intended.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 就像iPad一样，AI和ML技术，如ChatGPT，将继续以我们无法想象的方式发展和改变我们的生活。可能性是无限的，我们受限于我们的想象力。
- en: All these unexpected uses of the iPad demonstrate the power of technology to
    transform our lives in ways we never imagined. The iPad has become more than just
    a device for browsing the web and playing games — it's a tool that has changed
    the way we work, learn, create and communicate.
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些意外的iPad用途都展示了技术以我们从未想象的方式改变我们生活的力量。可能性是无限的，我们受限于我们的想象力。
- en: And just like the iPad, AI and ML technologies, like ChatGPT, will continue
    to evolve and transform our lives in unimaginable ways. The possibilities are
    endless, and we are limited only by our imagination.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 一项X（前身为Twitter）的调查发现，超过65%的用户发现很难对像ChatGPT这样的机器人无礼。
- en: While ChatGPT is currently the leading AI tool, other language models are already
    emerging that will compete with it. And more will come.
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT目前是领先的AI工具，但其他语言模型已经出现，将与之竞争。而且还将有更多。
- en: The iPad was once the dominant tablet device, but now it has many competitors.
    Siri was once the only voice‐activated assistant, but now has competitors like
    Amazon Alexa and Google Assistant.
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: iPad曾经是主导的平板设备，但现在它有许多竞争对手。Siri曾经是唯一的语音激活助手，但现在有像Amazon Alexa和Google Assistant这样的竞争对手。
- en: However, just because ChatGPT may face competition in the future, doesn't mean
    that the skills and tools outlined in this book will become obsolete. In fact,
    these skills and tools will be even more valuable and applicable as AI continues
    to evolve.
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管ChatGPT未来可能会面临竞争，但这并不意味着本书中概述的技能和工具会过时。事实上，随着AI的持续发展，这些技能和工具将变得更加有价值且适用。
- en: For example, one of the key skills outlined in this book is the ability to effectively
    communicate with ChatGPT using well‐crafted prompts. This skill is not specific
    to ChatGPT alone — it's a valuable skill for communicating with any AI system
    or application. As AI continues to become more integrated into our daily lives,
    the ability to communicate effectively with these systems will become increasingly
    important.
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这本书中概述的关键技能之一是能够使用精心设计的提示有效地与ChatGPT沟通。这项技能并不仅限于ChatGPT——它是与任何AI系统或应用沟通的有价值技能。随着AI继续融入我们的日常生活，与这些系统有效沟通的能力将变得越来越重要。
- en: This can be overwhelming, and by exploring the applicability of new ideas or
    technologies we can make informed decisions about whether they are relevant to
    your needs or context. It's like trying on a new pair of shoes before you buy
    them — you want to make sure they fit properly and meet your needs.
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能会让人感到不知所措，通过探索新想法或技术的适用性，我们可以就它们是否与你的需求或环境相关做出明智的决定。这就像在买鞋之前试穿它们——你想要确保它们合适并且满足你的需求。
- en: '**No‐one wants to waste their time and resources on ideas or technologies that
    won''t benefit them. By understanding their relevance to your specific situation,
    you can make more efficient decisions about what to invest in.**'
  id: totrans-1026
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**没有人愿意浪费时间在对自己没有益处的想法或技术上。通过理解它们对你具体情况的关联性，你可以更高效地决定投资什么。**'
- en: The gains, of course, are that any time we play with something new, it can inspire
    creativity and innovation. When you understand how a new idea or technology can
    be applied in different contexts, you may be able to come up with new and exciting
    ways to use it.
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，任何时间我们尝试新事物，都能激发创造力和创新。当你理解一个新想法或技术如何在不同环境中应用时，你可能能够想出新的、令人兴奋的使用方式。
- en: You will hear a lot about how good, or not, ChatGPT is. Try it for yourself
    and make your own informed decision.
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 你会听到很多关于ChatGPT是好是坏的评价。自己试一试，做出自己的明智决定。
- en: Let's now put ChatGPT through its paces so we can use it to be more productive.
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来测试ChatGPT的能力，以便我们可以用它提高生产力。
- en: CHAPTER 5
  id: totrans-1030
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章
- en: At work
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作中
- en: I am old enough to remember a time when the head of the IT department I was
    working for loudly proclaimed, ‘We will never have access to the internet on our
    work computers!’
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 我足够老，记得我所在IT部门的负责人大声宣称，“我们永远不会在我们的工作电脑上访问互联网！”
- en: 'Their reasons were twofold:'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的理由有两个：
- en: 'People can''t be trusted! If we give them access to the World Wide Web during
    work hours, they will not do their work! They will be too busy ‘surfing the web’
    or doing things like personal banking when they should be focused on work tasks.
    (Note: I''m also old enough to remember when people thought having a phone on
    your desk at work would do the same thing.)'
  id: totrans-1034
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们是不可信的！如果我们让他们在工作时间访问万维网，他们就不会工作！他们会忙于“冲浪”或做个人银行业务等事情，而应该专注于工作任务。（注意：我也足够老，记得当时人们认为在工作桌上放一部电话也会产生同样的效果。）
- en: It's not secured! There are hackers out there just waiting for people to open
    a window to the web, and they will crawl in and wreak havoc with our systems!
    We have to keep ourselves locked up tight!
  id: totrans-1035
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这并不安全！外面有黑客正在等待人们打开通向网络的窗口，然后他们会爬进来，对我们的系统造成破坏！我们必须把自己紧紧锁起来！
- en: Within 6 months, we had access to the internet on our desktops, with some restricted
    sites (bank sites were blocked – can't have those lazy workers doing their personal
    banking online during work hours). And within 12 months, there were no restrictions.
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 在6个月内，我们可以在桌面电脑上访问互联网，但有一些网站受到限制（银行网站被屏蔽——不能让那些懒惰的工人在工作时间在线进行个人银行业务）。而在12个月内，没有任何限制。
- en: I suspect that's how long it took for the required security, firewalls and other
    measures to be put into place to deem it ‘safe’. And I guess we had to trust our
    people to get the job done and also pay a couple of bills online throughout the
    day.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 我怀疑这就是为什么需要这么长时间才能实施所需的安全措施、防火墙和其他措施，以将其视为“安全”。我想我们还得信任我们的员工完成工作，并在一天中支付一些账单。
- en: Over the past year, I have heard similar commentary about AI never being allowed
    in organisations. And access to ChatGPT being at best monitored closely and at
    worst banned altogether.
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的一年里，我听到了关于AI永远不被允许进入组织的类似评论。至于ChatGPT的访问，最好的情况是受到密切监控，最坏的情况是被完全禁止。
- en: With the integration of GPT‐4 via Copilot into Microsoft programs, not only
    is AI now available within these common workplace applications, but some functionality
    is almost invisible.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 通过Copilot将GPT-4集成到Microsoft程序中，现在AI不仅可以在这些常见的办公应用中使用了，而且一些功能几乎是不可见的。
- en: Within Outlook, for example, there is the ‘Focused’ inbox option. Outlook can
    now sort your emails for you, based on your habits, according to those that are
    ‘Focused’ (stuff you need to see) or ‘Other’ (emails that could be irrelevant).
    This has been going on in Gmail for a long time, sorting your inbound email according
    to ‘Primary’, ‘Promotions’ or ‘Social’, allowing greater focus and prioritisation.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在Outlook中，有“专注”收件箱选项。现在Outlook可以根据你的习惯为你排序电子邮件，根据它们是“专注”的（你需要看到的）还是“其他”（可能不相关的电子邮件）。Gmail已经这样做了很长时间，根据“主要”、“促销”或“社交”对收到的电子邮件进行排序，从而允许有更大的关注度和优先级。
- en: In MS Word, for some time there has been an option called ‘Editor’, which will
    give you a score according to spelling, grammar, clarity, conciseness, punctuation
    and vocabulary.
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 在MS Word中，有一段时间有一个名为“编辑器”的选项，它会根据拼写、语法、清晰度、简洁性、标点符号和词汇给你打分。
- en: For those who use Zoom or Teams (or other online meeting platforms), AI is now
    integrated into those too, allowing for real‐time transcriptions of meetings and,
    at the click of a button, summaries, minutes and action plans.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 对于使用Zoom或Teams（或其他在线会议平台）的人来说，AI现在也集成到这些平台中，允许进行会议的实时转录，只需点击一下按钮，就可以生成摘要、会议记录和行动计划。
- en: 'A brief word of warning: I''d be cautious about submitting anything confidential,
    commercial or under copyright to ChatGPT. That''s because any content you input
    may be used later to train the algorithm. This could mean that your confidential
    information is now out in the world for anyone to see or access, either deliberately
    or accidentally, incorporated into a ChatGPT response. That said, as with my internet
    example above, many workplaces are adopting secure ways of using AI (e.g. with
    Copilot or ChatGPT Teams or Enterprise).'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简短的警告：我建议你谨慎提交任何机密、商业或受版权保护的文件给ChatGPT。这是因为你输入的任何内容都可能被用来训练算法。这意味着你的机密信息现在可能对任何人可见或可访问，无论是故意还是意外地，被整合到ChatGPT的回复中。话虽如此，正如我上面提到的互联网例子，许多工作场所正在采用安全的方式来使用AI（例如，使用Copilot或ChatGPT
    Teams或企业版）。
- en: These tools have been creeping in with little or no fanfare and have already
    made our professional lives easier and more productive.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具悄无声息地进入，几乎没有引起任何关注，已经使我们的专业生活变得更轻松、更高效。
- en: If you're like me and many others, you're probably struggling to balance your
    work and personal life. With the ever‐increasing demands of work, it's easy to
    get lost in the daily grind and forget about the important things in life. With
    the help of generative AI and specifically ChatGPT, we can find ways to be more
    productive and get more done in less time.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我以及许多人一样，你可能在努力平衡工作和个人生活。随着工作需求的不断增长，很容易陷入日常的忙碌中，忘记生活中重要的事情。借助生成式AI和特别是ChatGPT，我们可以找到更高效的方法，在更短的时间内完成更多的工作。
- en: ‘Impossible’, I hear you say. Let's look at how people are already using this
    amazing tool at work to do more with less (summarised in [figure 5.1](#c05.xhtml#c05-fig-0001),
    overleaf).
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: “不可能”，我听到你这么说。让我们看看人们如何在工作场所使用这个令人惊叹的工具，用更少的时间做更多的事情（总结在[图5.1](#c05.xhtml#c05-fig-0001)，下一页）。
- en: What kind of admin support could you use with your work?
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: 你在工作中可以使用哪种类型的行政支持？
- en: '![A circle diagram indicates the following roles: 1\. HR admin. 2\. Personal
    assistant. 3\. Barinstormer. 4\. Summariser. 5\. Tactician. 6\. Ghost writer.
    7\. Thought partner. 8\. Researcher. 9\. Business consultant or strategist.](images/c05f001.png)'
  id: totrans-1048
  prefs: []
  type: TYPE_IMG
  zh: '![一个圆形图表示以下角色：1. 人力资源管理员。2. 个人助理。3. 意见领袖。4. 摘要者。5. 战略家。6. 匿名作家。7. 思想伙伴。8. 研究员。9.
    商业顾问或策略家。](images/c05f001.png)'
- en: '[**Figure 5.1:**](#c05.xhtml#R_c05-fig-0001) **Your virtual team**'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: '[**图5.1**](#c05.xhtml#R_c05-fig-0001) **你的虚拟团队**'
- en: The virtual human resources administrator
  id: totrans-1050
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟人力资源管理员
- en: My business owner friend was on the hunt for a new executive assistant (EA),
    and it had been a while since he had gone through this process —  about three
    years, to be exact. But as he quickly discovered, a lot had changed in those three
    years. With virtual and hybrid working conditions, new technologies, and the evolving
    nature of their business, updating the job description and finding the right candidate
    was challenging.
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 我的商业老板朋友正在寻找一位新的行政助理（EA），而且他已经有一段时间没有经历这个过程了——确切地说，大约三年了。但很快他就发现，在这三年里发生了许多变化。随着虚拟和混合工作条件、新技术以及他们业务的演变，更新职位描述和寻找合适的候选人是一项挑战。
- en: To make matters worse, my friend realised that their current employee manual
    was completely out of date. In the past, he relied heavily on this as a tool to
    bring new people up to speed as quickly as possible.
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是，我的朋友意识到他们目前的员工手册已经完全过时了。在过去，他非常依赖这个工具，以便尽可能快地将新员工培训到位。
- en: As he worked through the lengthy and tedious process of updating the job description
    and briefing the employment agency he was using, he felt frustrated and overwhelmed
    by the amount of time and effort it was taking.
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 当他通过更新职位描述和向他所使用的就业机构进行简报的漫长而繁琐的过程时，他感到沮丧和不知所措，因为他花费的时间和精力太多了。
- en: That's when I suggested he use ChatGPT to help with the process. My friend was
    initially sceptical — he had never heard of ChatGPT and had no idea where to start.
    After I explained how ChatGPT worked, and how it could quickly generate a new
    job description, write a brief, design interview questions, and even update the
    employee manual, he was intrigued. He also had nothing to lose.
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 那时我建议他使用ChatGPT来帮助这个过程。我的朋友最初持怀疑态度——他从未听说过ChatGPT，也不知道从何开始。在我解释了ChatGPT的工作原理以及它如何快速生成新的职位描述、撰写简介、设计面试问题和甚至更新员工手册之后，他感到好奇。他也无损失。
- en: When I said, ‘And you could do all of that in a matter of minutes,’ he nearly
    spat his coffee out.
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说，“你可以在几分钟内完成所有这些”时，他差点把咖啡喷出来。
- en: 'Here are the prompts I suggested he try:'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我建议他尝试的提示：
- en: Update the following job description for an EA incorporating changes to work
    since 2019, including virtual, hybrid and any other technologies relevant to being
    the EA to a small business owner.
  id: totrans-1057
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新以下EA职位描述，包括自2019年以来工作上的变化，包括虚拟、混合以及其他与为小企业主担任EA相关的技术。
- en: Write a brief for a recruitment agency using the above job description.
  id: totrans-1058
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用上述职位描述为招聘机构撰写一份简介。
- en: Provide recommendations for interview questions for this role.
  id: totrans-1059
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为此职位提供面试问题的建议。
- en: Given the changes to this job description, update the employee manual, highlighting
    areas that need my input.
  id: totrans-1060
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鉴于对这份职位描述的修改，更新员工手册，突出需要我提供意见的领域。
- en: The virtual personal assistant
  id: totrans-1061
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟个人助理
- en: There have always been times when I wished I had an assistant to help me with
    my day‐to‐day admin, leaving me free for more high‐value activities like managing
    client relationships, winning new work and engaging with my stakeholders.
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 总是有时候我希望有一位助手帮助我处理日常行政工作，这样我就可以有更多时间从事高价值活动，比如管理客户关系、赢得新工作以及与我的利益相关者互动。
- en: 'I would have them doing things like:'
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 我会让他们做一些类似的事情：
- en: 'Drafting emails: Writing effective emails can be challenging and time‐consuming,
    especially when you need to communicate important information or make a good impression.
    ChatGPT (and Copilot) can help you with suggestions for how to word an email,
    how to structure the email and how to sign off.'
  id: totrans-1064
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写电子邮件：撰写有效的电子邮件可能具有挑战性且耗时，尤其是当你需要传达重要信息或留下好印象时。ChatGPT（和Copilot）可以帮助你提供如何措辞电子邮件、如何结构化电子邮件以及如何结束的建议。
- en: '**Example prompt:** Write a professional email to my boss requesting a meeting
    to discuss my performance.'
  id: totrans-1065
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例提示**：写一封专业电子邮件给我的老板，请求开会讨论我的表现。'
- en: 'Proofreading: Whether it''s a book like this, a presentation or a proposal,
    our documents need to be as error‐free as possible. ChatGPT (and other AI writing
    assistants) can review and correct grammar and spelling errors in text.'
  id: totrans-1066
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 校对：无论是这本书、演示文稿还是提案，我们的文档需要尽可能没有错误。ChatGPT（以及其他AI写作助手）可以审查和纠正文本中的语法和拼写错误。
- en: '**Example prompt:** Proofread this report to ensure that it is free of spelling
    and grammatical errors.'
  id: totrans-1067
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例提示**：校对这份报告，确保其没有拼写和语法错误。'
- en: 'Starting: When it comes to beginning just about anything, it can be challenging
    to just get those first few words into a document, proposal or presentation. Tell
    ChatGPT what you need (even vaguely) and see what it suggests. It may be just
    the inspiration you need to get going.'
  id: totrans-1068
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始：当涉及到开始几乎所有事情时，仅仅将那些最初几个词写进文档、提案或演示文稿中可能具有挑战性。告诉ChatGPT你的需求（即使是很模糊的）并看看它建议什么。这可能正是你开始所需的灵感。
- en: '**Example prompt:** I need to write a proposal to a new client. How would you
    suggest I structure it?'
  id: totrans-1069
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**示例提示词：** 我需要为新客户写一份提案。你建议我如何组织结构？'
- en: The virtual brainstormer
  id: totrans-1070
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟头脑风暴者
- en: This is a great feature of the technology that can really help you when you're
    feeling stuck or unsure of where to start on a piece of work.
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这项技术的一个真正可以帮助你在感到困惑或不确定从哪里开始一项工作时的大好功能。
- en: Let's say you've been assigned a project by your boss, but you're not quite
    sure what direction to take it in. You could spend hours researching and brainstorming
    on your own, trying to come up with ideas that will impress your boss and make
    the task a success. Or you could call several meetings involving a number of people
    and use up a pile of hours to ‘brainstorm ideas’. Before succumbing to that, try
    asking ChatGPT.
  id: totrans-1072
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的老板分配给你一个项目，但你并不确定该朝哪个方向走。你可以花几个小时自己研究和头脑风暴，试图想出能打动老板并使任务成功的想法。或者你可以召集几个会议，涉及很多人，花费一大堆时间来“头脑风暴想法”。在屈服于这种做法之前，试着问ChatGPT。
- en: Simply input a question, a statement or even a few keywords that describe the
    task at hand. For example, you could use the prompt, ‘What are some innovative
    ideas for our new product launch?’ or ‘How can we make our company's website more
    user‐friendly?’
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地输入一个问题、一个声明，甚至是一些描述手头任务的几个关键词。例如，你可以使用提示词，“我们新产品发布有哪些创新的想法？”或者“我们如何使公司的网站更用户友好？”
- en: Once you've input your prompt, ChatGPT will generate a list of ideas for you
    to work with. These ideas can be anything from simple suggestions to more complex
    strategies. The best part is that you can generate as many ideas as you need until
    you find one that really resonates with you.
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你输入了提示词，ChatGPT将为你生成一系列想法。这些想法可以是简单的建议，也可以是更复杂的策略。最好的部分是，你可以生成你需要的任何数量的想法，直到找到一个真正打动你的。
- en: '**Instead of spending hours trying to come up with ideas on your own, you can
    use ChatGPT to generate a list of potential ideas** **in just a few minutes.**'
  id: totrans-1075
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**而不是花几个小时自己想点子，你可以在几分钟内使用ChatGPT生成一系列潜在的想法** **。**'
- en: This can help you get started on your work faster, and avoid wasting time on
    ideas that might not be feasible or relevant.
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以帮助你更快地开始工作，避免浪费时间在可能不可行或不相关的想法上。
- en: Once you have narrowed down some ideas, you then can get the best out of meetings
    with your colleagues to evaluate them and come up with a plan. The hard and tedious
    work has been done.
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你缩小了想法的范围，你就可以与同事们的会议中取得最佳效果，评估它们并制定计划。艰难而繁琐的工作已经完成。
- en: Of course, it's important to remember that not all the ideas generated by ChatGPT
    will be winners (like when people brainstorm). Some of the ideas might not be
    relevant to your project or might not be feasible to implement. That's why it's
    important to use your own judgement and critical thinking skills to evaluate the
    ideas and decide which ones are worth pursuing.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，重要的是要记住，ChatGPT生成的所有想法并不都是成功的（就像人们头脑风暴时那样）。有些想法可能与你项目不相关，或者可能无法实施。这就是为什么使用你自己的判断力和批判性思维技能来评估想法并决定哪些值得追求非常重要。
- en: 'And there it is: we still need humans. Your job is safe.'
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样：我们仍然需要人类。你的工作很安全。
- en: '**Example prompts:** What are some ways that we can improve employee engagement
    and morale in our workplace?'
  id: totrans-1080
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示词：** 我们有哪些方法可以提高我们工作场所的员工参与度和士气？'
- en: ''
  id: totrans-1081
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can you suggest some team‐building activities that we can do virtually?
  id: totrans-1082
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你能建议一些我们可以在线进行的团队建设活动吗？
- en: ''
  id: totrans-1083
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One of our biggest clients has expressed dissatisfaction with our services.
    How can we address their concerns and improve our relationship with them?
  id: totrans-1084
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们最大的客户对我们提供的服务表示了不满。我们如何解决他们的担忧并改善与他们之间的关系？
- en: The virtual summariser
  id: totrans-1085
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟总结者
- en: Remember all those times you have had piles of reports or articles as pre‐reading
    for a meeting, but you didn't have the time to read each report in detail, so
    you scanned it quickly trying to absorb all of the information and key points?
    Then remember how you showed up to the meeting and kind of bluffed your way through
    it?
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 记得那些你堆积如山的报告或文章作为会议前的预读材料，但你没有时间逐个详细阅读每个报告，所以你快速浏览试图吸收所有信息和关键点？然后记得你如何出现在会议上，并且有点儿吹牛地通过了会议？
- en: Bluff no more. Now you can use ChatGPT to summarise the text for you.
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 别再吹牛了。现在你可以使用ChatGPT为你总结文本。
- en: All you need to do is copy and paste the text into the prompt box (being mindful
    of the commercial and confidential nature of the work) and ask it to summarise
    the content for you. This could be a single article, a report or even chapters
    of a book. ChatGPT will then generate a summary of the content including the most
    important points and key takeaways from the text, allowing you to quickly understand
    the main ideas without spending hours reading the entire document.
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要做的只是将文本复制粘贴到提示框中（注意工作的商业和机密性质），并要求它为你总结内容。这可能是一篇文章、一份报告，甚至是书籍的章节。然后ChatGPT将生成内容的摘要，包括文本中的最重要的点和关键收获，让你能够快速理解主要思想，而无需花费数小时阅读整个文档。
- en: Using Copilot in MS Word is an easy way to do this as well. Simply open your
    document, start Copilot and begin asking questions about the document.
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 在MS Word中使用Copilot也是做这件事的一种简单方法。只需打开你的文档，启动Copilot，然后开始询问关于文档的问题。
- en: Of course, it's important to remember that the summary generated by AI might
    not capture every detail of the text. If it's critical data and you need a detailed
    understanding of the information, it's a good idea to read the original text in
    full. However, using ChatGPT to summarise text can be a great way to quickly get
    the gist of a document and decide if it's worth reading in full.
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，记住AI生成的摘要可能无法捕捉到文本的所有细节。如果是关键数据，你需要对信息有详细的理解，那么阅读原文全文是个好主意。然而，使用ChatGPT来总结文本可以快速获取文档的精髓，并决定是否值得全文阅读。
- en: '**Example prompts:** Can you summarise this article in three to four sentences?'
  id: totrans-1091
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：你能用三到四句话总结这篇文章吗？'
- en: ''
  id: totrans-1092
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What are the key takeaways from this report?
  id: totrans-1093
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这份报告的关键收获是什么？
- en: ''
  id: totrans-1094
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can you provide a brief summary of this paper?
  id: totrans-1095
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你能提供这篇论文的简要总结吗？
- en: The virtual ghost writer
  id: totrans-1096
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟的代笔人
- en: This is where I believe ChatGPT can really help. As a writer, I personally find
    this the most useful aspect, particularly when it comes to getting started.
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这正是ChatGPT可以真正帮助的地方。作为一个作家，我个人发现这一点最有用，尤其是在开始写作时。
- en: It not only saves time, but has the potential to produce high‐quality content.
    It's useful to remember, however, the adage of rubbish in, rubbish out. The quality
    of your content will be a direct result of the prompts you provide it (see [Chapter
    4](#c04.xhtml)).
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 它不仅节省了时间，还有可能产生高质量的内容。然而，记住“垃圾输入，垃圾输出”的谚语。你内容的质量将直接取决于你提供的提示（见第4章[Chapter 4](#c04.xhtml)）。
- en: For example, you're working on a business proposal, and you're struggling to
    find the appropriate words to convey your message effectively. You could spend
    hours agonising over the right structure, style and opening, or you could use
    ChatGPT to generate content for you. Don't forget to give it some specific context
    before using these prompts.
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你正在撰写一份商业提案，你正努力寻找合适的词语来有效地传达你的信息。你可以花费数小时纠结于正确的结构、风格和开头，或者你可以使用ChatGPT为你生成内容。在使用这些提示之前，别忘了给它一些具体的背景信息。
- en: '**Example prompts:** Write a summary of our new product.'
  id: totrans-1100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：为新产品写一个总结。'
- en: ''
  id: totrans-1101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Compose an email to our clients about our upcoming event.
  id: totrans-1102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 撰写一封关于我们即将举行活动的电子邮件给我们的客户。
- en: ''
  id: totrans-1103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Draft a presentation on the benefits of our services.
  id: totrans-1104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 撰写一份关于我们服务优势的演示文稿。
- en: The resulting content could be anything from a brief summary to a full‐blown
    presentation or report. The best part is that you can keep generating responses
    until you have what you need.
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的内容可以是简短的摘要，也可以是完整的演示或报告。最好的部分是，你可以不断生成响应，直到你得到你需要的内容。
- en: Copilot, within MS Word, also comes up as a little symbol to the left of your
    page at the beginning of a new line, or when you highlight text. This gives you
    the option to open a Copilot dialogue box and give instructions within the document
    itself, like ‘Edit this for improved readability’ or ‘Write me two paragraphs
    on [insert topic]’. Too easy!
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 在MS Word中，Copilot也会以一个小图标的形式出现在你页面左侧的新行开头，或者当你突出显示文本时。这让你可以选择打开Copilot对话框，在文档内部给出指令，比如“编辑这段以提高可读性”或“关于[插入主题]写两段文字”。真是太简单了！
- en: Here's an example of a prompt from a website development friend, Adjani, who
    used it to create an email to convince his client to adopt a specific feature
    on their new site.
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个来自网站开发朋友Adjani的提示示例，他用它来创建一封电子邮件，说服他的客户在他们新网站上采用一个特定的功能。
- en: '**Example prompt:** Write a feature brief for this new feature we want our
    client to take on board: a magic link log in so users don''t have to remember
    passwords.'
  id: totrans-1108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：为我们的客户介绍这个新功能撰写一个功能简报：一个魔法链接登录，这样用户就不必记住密码。'
- en: ''
  id: totrans-1109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** With magic link login, users no longer need to remember their
    passwords to log in to the app. Instead, they can request a magic link via email
    or SMS and use it to log in. This feature is quick and easy to use and provides
    an extra layer of security as magic links can only be used once and expire after
    a certain amount of time.'
  id: totrans-1110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT**：使用魔法链接登录，用户不再需要记住他们的密码来登录应用。相反，他们可以通过电子邮件或短信请求一个魔法链接并使用它来登录。这个功能使用起来既快又简单，并且提供额外的安全层，因为魔法链接只能使用一次，并在一定时间后过期。'
- en: ''
  id: totrans-1111
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The benefits are that it simplifies the login process for users, improves security
    and increases user convenience and satisfaction.
  id: totrans-1112
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 优点在于它简化了用户的登录过程，提高了安全性，并增加了用户便利性和满意度。
- en: ''
  id: totrans-1113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This means no more forgotten passwords. The magic link login makes it easy to
    log in to the app.
  id: totrans-1114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这意味着不再有忘记密码的问题。魔法链接登录使得登录应用变得容易。
- en: Adjani did tweak this a bit before sending; however, the client immediately
    wrote back and agreed to add on this feature. Adjani said, normally, he would
    spend hours trying to write the right email with the right tone. ‘Feature briefs
    are often so technical they are hard to explain, let alone sell,’ he said.
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: Adjani在发送之前稍微调整了一下；然而，客户立即回复并同意添加这个功能。Adjani说，通常，他会花几个小时尝试写一封合适的电子邮件，以正确的语气。他说：“功能简报通常非常技术性，很难解释，更不用说销售了。”
- en: The virtual thought partner
  id: totrans-1116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟思想伙伴
- en: Do you spend a lot of time researching answers to questions for work? Or do
    you sometimes work alone, and wish you had someone to bounce ideas off? This is
    one of the best aspects of ChatGPT in my opinion. It's become my ‘work‐from‐home
    buddy’ that helps me muse on topics, and provides advice and ideas when I get
    stuck.
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否花很多时间在工作上研究问题的答案？或者你有时独自工作，希望有人可以交流想法？在我看来，这是ChatGPT最好的一个方面。它已经成为我的“在家工作伙伴”，帮助我在思考话题，当我遇到难题时提供建议和想法。
- en: The question can be anything from a simple query to a complex research question.
    For example, you could use the prompts, ‘What is the history of artificial intelligence?’
    or ‘How does blockchain technology work?’ or ‘What is the best software for project
    management?’
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是任何从简单查询到复杂研究问题都可以。例如，你可以使用提示，如“人工智能的历史是什么？”或“区块链技术是如何工作的？”或“项目管理最好的软件是什么？”
- en: The answer can be anything from a summary to a detailed explanation, depending
    on the complexity of the question. The best part is that you can generate as many
    answers as you need until you find one that really answers your question.
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 答案可以是总结，也可以是详细的解释，具体取决于问题的复杂性。最好的部分是你可以生成你需要的任何数量的答案，直到找到一个真正回答你问题的答案。
- en: This for me answers the ‘isn't it just like Google?’ question. Google certainly
    still has its uses; however, any question usually results in a long list of articles
    and websites that you then need to dig through to uncover the gold. ChatGPT does
    all of that for you, and typically generates a quick and (mostly) accurate answer.
    When accuracy is at stake, double‐check the results.
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我来说回答了“它不是和Google一样吗？”的问题。Google当然仍然有其用途；然而，任何问题通常都会导致一个长长的文章和网站列表，你需要从中挖掘出有价值的信息。ChatGPT为你做了所有这些，并且通常能快速（大多数情况下）准确地回答。当准确性至关重要时，请务必检查结果。
- en: I have ChatGPT open almost permanently on my screen. I duck in and out to get
    ideas, suggestions and nudges for whatever I'm working on. (If you are wondering
    about right now as I write this book, the answer is yes!)
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 我几乎一直将ChatGPT打开在我的屏幕上。我随时进入和退出以获取我正在工作的想法、建议和推动力。（如果你想知道我现在写这本书的时候的情况，答案是肯定的！）
- en: The virtual researcher
  id: totrans-1122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟研究员
- en: If you're working on a research project and need to find information on a specific
    topic, you could use ChatGPT to generate a list of relevant sources and key points.
    This can help you build a foundation for your research and save you a lot of time
    and effort. This one comes with a large warning on the label though as, in my
    experience, not all the suggested references and citations exist, or are even
    accurate. You will still need to check and review them (see [Chapter 2](#c02.xhtml)).
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在从事一个研究项目并且需要找到特定主题的信息，你可以使用ChatGPT生成相关来源和关键点的列表。这可以帮助你为研究打下基础，并为你节省大量的时间和精力。不过，这个建议标签上有一个大警告，因为根据我的经验，并非所有建议的参考文献和引用都存在，甚至可能不准确。你仍然需要检查和审查它们（见[第2章](#c02.xhtml)）。
- en: Ask it to generate a quick summary or explanation of the latest trends and developments
    in your industry. It's a great way to stay informed and make better decisions
    for your work, and look wildly intelligent in meetings when you cite competitor
    info.
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: 让它为你生成你所在行业最新趋势和发展的快速总结或解释。这是一种保持信息灵通并为你工作做出更好决策的好方法，在会议中引用竞争对手信息时看起来非常聪明。
- en: '**Example prompts:** Research the impact of remote work on employee productivity
    and job satisfaction, and provide me with a summary of the findings.'
  id: totrans-1125
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：**研究远程工作对员工生产力和工作满意度的影响，并为我提供研究结果摘要。'
- en: ''
  id: totrans-1126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I'm interested in learning more about the latest trends in e‐commerce. Research
    on this topic and provide me with a report on your findings.
  id: totrans-1127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我对了解电子商务的最新趋势感兴趣。请对这个主题进行研究，并为我提供你的发现报告。
- en: ''
  id: totrans-1128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Research the market potential for a new product idea I have, including potential
    demand, target audience and competition.
  id: totrans-1129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 研究我有一个新产品想法的市场潜力，包括潜在需求、目标受众和竞争。
- en: The virtual tactician
  id: totrans-1130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟战术家
- en: Are you good at saying ‘no’? I know I'm not. When you need to give someone a
    difficult message, do you stumble over your words?
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 你擅长说“不”吗？我知道我不擅长。当你需要向某人传达一个困难的信息时，你会结巴吗？
- en: 'I have been using ChatGPT to give me advice on:'
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直在使用ChatGPT为我提供以下建议：
- en: how to politely say ‘no’; for example, to a coffee catch up or to a piece of
    work I don't have the capacity for
  id: totrans-1133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何礼貌地说“不”；例如，对咖啡聚会或我无法承担的工作说“不”
- en: how to express condolences without saying ‘sorry for your loss’
  id: totrans-1134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何表达慰问而不说“对于你的损失感到抱歉”
- en: how to write a professional email to request a meeting with a busy executive
  id: totrans-1135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何撰写一封专业邮件，请求与忙碌的执行董事开会
- en: how to write a LinkedIn message to request a connection with a potential business
    partner
  id: totrans-1136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何撰写LinkedIn信息，请求与潜在的商业伙伴建立联系
- en: how to write a thoughtful thank you note to express your gratitude to a colleague
    or business partner
  id: totrans-1137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何撰写一封深思熟虑的感谢信，以表达你对同事或商业伙伴的感激之情
- en: 15 different ways to write a signed and personalized message in my productivity
    book.
  id: totrans-1138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我的生产力书中，有15种不同的方式来撰写签名和个性化的信息。
- en: '**Example prompts:** I have an important job interview coming up. Help me practice
    responding to common interview questions and provide feedback on my answers.'
  id: totrans-1139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：**我即将进行一次重要的工作面试。请帮助我练习回答常见的面试问题，并对我的回答提供反馈。'
- en: ''
  id: totrans-1140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have to negotiate a raise with my boss, but I'm not sure how to make a compelling
    argument for why I deserve it. Help me make a compelling argument, and then provide
    counter arguments with reasons they might use against it.
  id: totrans-1141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我必须与我的老板谈判加薪，但我不确定如何提出一个令人信服的理由来证明我应得它。请帮助我提出一个令人信服的论点，并提供可能用来反驳它的论据和原因。
- en: ''
  id: totrans-1142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I'm dealing with a difficult team member who is not meeting their deadlines
    and causing delays on our project. Provide me with guidance on how to have a conversation
    with them using a coaching approach.
  id: totrans-1143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我正在处理一个难以相处的团队成员，他们没有按时完成任务，导致我们的项目延误。请为我提供使用辅导方法与他们进行对话的指导。
- en: The virtual business consultant or strategist
  id: totrans-1144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟商业顾问或策略家
- en: Maybe you have an idea for a new business, side hustle or product/service, and
    you are wondering if it has legs. You can use ChatGPT to take you from idea to
    strategic plan in a matter of minutes, with a few well‐crafted prompts.
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你有一个关于新业务、兼职或产品/服务的想法，并且想知道它是否有可行性。你可以使用ChatGPT在几分钟内将你的想法从战略计划中提炼出来，只需几个精心设计的提示。
- en: TEST YOUR IDEA
  id: totrans-1146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试你的想法
- en: '**Structure for a prompt:** Who would benefit from this and how large is the
    demand? [describe your product idea]. Include references to sources of statistics
    or data.'
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示结构：** 谁会从这中受益以及需求有多大？[描述你的产品想法]。包括对统计数据或数据的来源引用。'
- en: '**Example prompt:** Who would benefit from this and how large is the demand?
    A home gym equipment rental service: A service that allows individuals to rent
    gym equipment for their home workouts instead of purchasing and storing the equipment
    themselves. Include references to sources of statistics or data.'
  id: totrans-1148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 谁会从这中受益以及需求有多大？家用健身器材租赁服务：一种允许个人租用健身器材在家锻炼而不是自己购买和储存器材的服务。包括对统计数据或数据的来源引用。'
- en: PUT A STRATEGYTOGETHER USING YOUR FAVOURITE FRAMEWORK
  id: totrans-1149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用你最喜欢的框架制定战略
- en: '**Structure for a prompt:** Use [your preferred framework] to create a plan
    that addresses [product description and key challenge or assumption you want to
    tackle].'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示结构：** 使用[你喜欢的框架]制定一个计划，以解决[产品描述和你要解决的关键挑战或假设]。'
- en: '**Example prompt:** Use the Lean Startup framework to create a plan that addresses
    the challenge of launching a new home gym equipment rental service in a crowded
    market.'
  id: totrans-1151
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 使用精益创业框架制定一个计划，以解决在竞争激烈的市场中推出新的家用健身器材租赁服务的挑战。'
- en: CREATE A VISION, MISSIONAND STRATEGY
  id: totrans-1152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 制定愿景、使命和战略
- en: '**Structure for a prompt:** Help me write a clear and succinct vision, mission
    and strategy for [insert your product/startup description]. Use the following
    example as a template.'
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示结构：** 帮助我撰写一个清晰简洁的愿景、使命和战略，[插入你的产品/初创公司描述]。使用以下示例作为模板。'
- en: '**Example prompt:** Construct a clear and succinct vision, mission and strategy
    for a home gym equipment rental service that allows individuals to rent gym equipment
    for their home workouts instead of purchasing and storing the equipment themselves.
    Use the following example as a template.'
  id: totrans-1154
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 为一个允许个人租用健身器材在家锻炼而不是自己购买和储存器材的家用健身器材租赁服务制定一个清晰简洁的愿景、使命和战略。使用以下示例作为模板。'
- en: 'Here''s the example:'
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是示例：
- en: '**Business vision:** Enable individuals and families to eat healthier by providing
    a convenient and affordable meal delivery service that offers fresh and nutritious
    meals.'
  id: totrans-1156
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**商业愿景：** 通过提供便捷且负担得起的美味餐点配送服务，提供新鲜营养的餐点，使个人和家庭能够吃得更加健康。'
- en: '**Business mission:** To simplify healthy eating by offering a diverse selection
    of meal options tailored to different dietary needs and preferences and delivered
    to customers’ homes.'
  id: totrans-1157
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**商业使命：** 通过提供针对不同饮食需求和偏好的多样化餐点选择，并送货上门，简化健康饮食。'
- en: '**Business strategy:** Partner with local chefs to create a menu of healthy,
    delicious meals catering to many dietary needs.'
  id: totrans-1158
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**商业策略：** 与当地厨师合作，创建一个满足多种饮食需求的健康美味菜单。'
- en: ''
  id: totrans-1159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Source ingredients from trusted suppliers.
  id: totrans-1160
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从可靠的供应商那里采购原料。
- en: ''
  id: totrans-1161
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Offer flexible meal plans.
  id: totrans-1162
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 提供灵活的餐点计划。
- en: ''
  id: totrans-1163
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Utilise technology to streamline the ordering and delivery process.
  id: totrans-1164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 利用技术简化订单和配送流程。
- en: ''
  id: totrans-1165
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Provide exceptional customer service and support.
  id: totrans-1166
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 提供卓越的客户服务和支持。
- en: ''
  id: totrans-1167
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Continuously gather customer feedback and use data analytics to improve our
    service.
  id: totrans-1168
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 持续收集客户反馈并利用数据分析来改进我们的服务。
- en: And even play devil's advocate.
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 并且甚至扮演魔鬼的代言人。
- en: '**Structure for a prompt:** Give me three convincing arguments to challenge
    why the following may not be practical or effective: [outline your idea, strategy,
    plan].'
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示结构：** 给我三个有说服力的论点来挑战以下可能不切实际或有效的理由：[概述你的想法、策略、计划]。'
- en: '**Example prompt:** Give me three convincing arguments to challenge why the
    following may not be practical or effective: A home gym equipment rental service
    that allows individuals to rent gym equipment for their home workouts instead
    of purchasing and storing the equipment themselves.'
  id: totrans-1171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 给我三个有说服力的论点来挑战以下可能不切实际或有效的理由：一个允许个人租用健身器材在家锻炼而不是自己购买和储存器材的家用健身器材租赁服务。'
- en: The sky is quite literally the limit
  id: totrans-1172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 天空确实是无限的
- en: Because GPT‐4 is trained on a large body of text, it can typically produce content
    that is not only grammatically correct, but well‐structured and coherent, which
    is useful when you need to write professional emails, proposals or presentations.
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: 由于GPT-4是在大量文本上训练的，它通常能产生不仅语法正确，而且结构良好、连贯的内容，这在需要撰写专业电子邮件、提案或演示文稿时非常有用。
- en: For those who struggle with writing, ChatGPT is the answer to their prayers.
    Imagine never again worrying about your tone, coming across as too terse or as
    not empathetic enough. ChatGPT is like having an all‐hours proofreader by your
    side.
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些写作有困难的人来说，ChatGPT是他们祈祷的答案。想象一下，你再也不用担心你的语气，显得过于简短，或者不够有同情心。ChatGPT就像身边有一个全天候的校对员。
- en: 'A *Washington Post* article from December 2022 described a number of other
    creative and life altering ways that others are using this tool:'
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年12月，《华盛顿邮报》的一篇文章描述了其他人使用这个工具的许多创造性和改变生活的其他方式：
- en: Historian Anton Howes turned to ChatGPT to find the perfect word. He needed
    a word that meant ‘visually appealing, but for all senses’, and in no time, he
    was given ‘sensory‐rich,’ multi‐sensory,’ ‘engaging’ and ‘immersive’. He was blown
    away and even tweeted, ‘This is the comet that killed off the Thesaurus’.
  id: totrans-1176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 历史学家安东·豪斯转向ChatGPT寻找完美的词语。他需要一个意味着“视觉上吸引人，但所有感官上”的词，很快他就得到了“感官丰富的”、“多感官的”、“吸引人的”和“沉浸式的”。他感到震惊，甚至在推特上写道：“这是杀死同义词词典的彗星”。
- en: Andres Asion, a Miami‐based real estate broker, had a client who couldn't open
    her windows and, despite several approaches, got no response from the developer
    in charge. He ran her qualms through ChatGPT and instructed the AI to write a
    letter that threatened legal action. ‘All of a sudden’, Asion said, ‘the developer
    showed up at her house.’
  id: totrans-1177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迈阿密房地产经纪人安德烈斯·阿辛有一个客户无法打开窗户，尽管尝试了多次，但负责的开发者没有任何回应。他将她的疑虑提交给ChatGPT，并指示AI写一封威胁采取法律行动的信。阿辛说：“突然之间”，开发商出现在她的房子里。
- en: Another user, Cynthia Savard Saucier, used ChatGPT to help her break the news
    to her six‐year‐old son that Santa Claus isn't real. She asked the AI to write
    a letter in Santa's voice, and the response was nothing short of magical. The
    letter explained that the stories were created to bring joy and magic into childhood,
    but the love and care from parents is real. Cynthia said she was surprised to
    feel emotional about it, but it was exactly what she needed to hear.
  id: totrans-1178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一位用户，辛西娅·萨瓦德·索西耶，使用ChatGPT帮助她向她六岁的儿子透露圣诞老人并不存在。她要求AI以圣诞老人的声音写一封信，回应令人难以置信地神奇。信中解释说，这些故事是为了给童年带来快乐和魔法，但父母的爱和关怀是真实的。辛西娅说她对感到情感上的波动感到惊讶，但这正是她需要听到的。
- en: Now, I know what you're thinking. Won't using ChatGPT make me lazy? Won't it
    take away my job? The answer is (again) no. ChatGPT is not here to replace you;
    it's here to assist you. It can help you with tasks that are time‐consuming and
    tedious, so that you can focus on tasks that require your expertise and creativity.
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我知道你在想什么。使用ChatGPT会让我变得懒惰吗？它会夺走我的工作吗？答案是（又是）不。ChatGPT不是来取代你的；它是来帮助你的。它可以帮你处理耗时且繁琐的任务，这样你就可以专注于需要你的专业知识和创造力的任务。
- en: I have been using ChatGPT for a while now and I don't feel lazy or dumbed down;
    I feel liberated from the mundane. By outsourcing the tedious tasks, you can free
    up your time and energy to focus on the tasks that matter. This can help you get
    more done in less time and even leave work at a reasonable hour.
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经使用ChatGPT一段时间了，我没有感到懒惰或变得愚笨；我感觉从日常琐事中解放了出来。通过外包繁琐的任务，你可以释放你的时间和精力，专注于重要的事情。这可以帮助你在更短的时间内完成更多的工作，甚至可以在合理的时间内完成工作。
- en: 'And let me remind you: We are using ChatGPT to help us create more time and
    space for what''s important. You shouldn''t use ChatGPT to work longer hours or
    sacrifice your personal life for work. Technologies like ChatGPT should give us
    back to our families, people, things and activities that fill us with joy, not
    give us space for more work.'
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 让我提醒你：我们使用ChatGPT是为了帮助我们为重要的事情创造更多的时间和空间。你不应该用ChatGPT来工作更长的时间，或者为了工作牺牲你的个人生活。像ChatGPT这样的技术应该让我们回到家庭、人们、事物和活动中，这些能给我们带来快乐，而不是给我们更多工作的空间。
- en: Use it to work smarter, not harder.
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: 用它来更聪明地工作，而不是更辛苦。
- en: CHAPTER 6
  id: totrans-1183
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第六章
- en: At home
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 在家里
- en: When my friend divorced her husband, making her a single working mother of two
    teenagers, she was confronted with the challenge that everything was now all on
    her. All the major decisions, support and administrative tasks that had been shared
    in the past were now wholly her responsibility.
  id: totrans-1185
  prefs: []
  type: TYPE_NORMAL
  zh: 当我的朋友与她丈夫离婚，成为两个青少年的单身母亲时，她面临着一切现在都落在了她身上的挑战。过去共同分担的所有重大决策、支持和行政任务现在都完全成了她的责任。
- en: It wasn't just the change of dealing with a divorce and raising two teenagers
    on her own that weighed heavily on my friend; it was the never‐ending list of
    life admin tasks that seemed to pile up every day. From paying bills and managing
    finances to scheduling appointments and keeping track of important paperwork,
    it felt like there was never enough time in the day to get everything done.
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 对我的朋友来说，不仅仅是处理离婚和独自抚养两个青少年带来的压力，还有每天似乎不断堆积的生活行政任务。从支付账单和管理财务到安排预约和跟踪重要文件，感觉一天中永远没有足够的时间来完成所有事情。
- en: And she did this all while holding down a demanding, senior executive role in
    a large bank.
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 而她是在担任一家大型银行要求严格的资深高管职位的同时做到这一切的。
- en: As her friend, I watched as she worked hard to balance work, parenting and life
    admin. She was mostly able to stay on top of everything, but sometimes felt overwhelmed,
    isolated and like she never had enough time or energy to do it all.
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 作为她的朋友，我看着她努力平衡工作、育儿和生活行政。她大部分时间都能应对自如，但有时会感到压倒、孤立，以及感觉自己永远没有足够的时间或精力来完成所有事情。
- en: She was not alone in feeling like this.
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: 她并不是唯一有这种感觉的人。
- en: Elizabeth Emens, in her book *The Art of Life Admin*, explains that managing
    our personal lives and households entails performing a never‐ending list of tasks,
    from nurturing relationships with friends and family to caring for children and
    maintaining our homes and bodies. However, just like work‐related admin, ‘life
    admin’ tasks are often our least favourite and most‐procrastinated‐about tasks.
    Despite this, completing them is necessary to keep our lives organised, functional
    and on track.
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 伊丽莎白·艾门斯在她的书《生活的艺术》中解释说，管理我们的个人生活和家庭意味着要执行一项永远没有尽头的任务清单，从培养与朋友和家人的关系到照顾孩子、维护我们的家庭和身体。然而，就像与工作相关的行政任务一样，“生活行政”任务通常是我们最不喜欢且最拖延的任务。尽管如此，完成这些任务对于保持我们的生活有序、功能正常和按计划进行是必要的。
- en: If you're a busy parent, you know how overwhelming it can be to juggle all the
    things that come with running a household. From managing schedules to meal preparation
    and everything in between, it can feel like there's never enough time in the day.
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个忙碌的父母，你知道管理家务带来的所有事情是多么的令人压倒。从管理日程到准备饭菜以及所有介于两者之间的东西，感觉一天中永远没有足够的时间。
- en: Even if you aren't a parent, life admin and running a household can still take
    up time and space that could better be used for recharging your batteries.
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你不是父母，生活行政和家务管理仍然会占用本可以用来充电的时间和空间。
- en: Enter ChatGPT, your personal home organiser. We already know that ChatGPT is
    helpful at work, so now it's time to explore how it can help you simplify your
    busy family life (summarised in [figure 6.1](#c06.xhtml#c06-fig-0001)). Perhaps
    you would like to have a personal assistant or valet at home?
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: 来了ChatGPT，您的个人家庭组织者。我们已经知道ChatGPT在工作中有帮助，现在是时候探索它如何帮助您简化繁忙的家庭生活（总结在[图6.1](#c06.xhtml#c06-fig-0001)中）。也许您希望在家里有一个私人助理或司机？
- en: '![A circle diagram indicates the following roles: 1\. Assistant. 2\. Meal planner.
    3\. Travel agent. 4\. Personal trainer. 5\. Financial controller. 6\. Entertainment
    curator. 7\. Personal shopper. 8\. Home organizer. 9\. Homework tutor.](images/c06f001.png)'
  id: totrans-1194
  prefs: []
  type: TYPE_IMG
  zh: '![一个圆形图表示以下角色：1. 助理。2. 餐食计划者。3. 旅行代理人。4. 个人教练。5. 财务控制者。6. 娱乐策划者。7. 个人购物者。8.
    家庭组织者。9. 家庭作业辅导老师。](images/c06f001.png)'
- en: '[**Figure 6.1:**](#c06.xhtml#R_c06-fig-0001) **Your virtual help**'
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: '[**图6.1**](#c06.xhtml#R_c06-fig-0001) **您的虚拟助手**'
- en: The virtual assistant
  id: totrans-1196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟助手
- en: Have you received an unfair traffic fine (say, for parking) or had a problem
    around the house that needed fixing, either by a neighbour (e.g. barking dog)
    or landlord (e.g. leaky pipes)? Sometimes we put up with these things because
    we don't want to upset someone, or deal with conflict.
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否收到过不公平的交通罚款（比如停车罚款）或者家里需要修理的问题，无论是邻居（例如，狗吠）还是房东（例如，漏水管道）？有时我们忍受这些事情，因为我们不想惹恼某人，或者处理冲突。
- en: In March 2023, a college student in the UK asked ChatGPT to help her write a
    letter to get out of an unfair parking ticket (she had a permit) — and it worked.
    She said that, normally, she may not have been bothered to contest the fine because
    she was busy studying, however, on this occasion she thought she would.
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年3月，英国一名大学生请求ChatGPT帮助她写一封信以摆脱不公平的停车罚款（她有许可证）——而且成功了。她说，通常情况下，她可能不会费心去质疑罚款，因为她忙于学习，然而，这一次她认为应该这么做。
- en: She submitted the letter that ChatGPT produced, and the fine was revoked saving
    her £60.
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 她提交了ChatGPT生成的信件，罚款被撤销，为她节省了60英镑。
- en: I know I've been guilty of putting up with things in the past because I either
    didn't want to raise an issue, or I didn't know how to do it. ChatGPT can take
    much of that angst away.
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道我过去有过忍受事情的经历，因为我要么不想提出问题，要么不知道如何去做。ChatGPT可以减轻很多这种焦虑。
- en: '**Example prompts:** My neighbour''s dog barks all day while its owners are
    at work. I work from home and it''s very distracting. I like my neighbours and
    don''t want any problems with them. Write me a short, friendly and pleasant note
    that brings this situation to their attention.'
  id: totrans-1201
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：我的邻居的狗在主人工作时整天吠叫。我在家工作，这非常分散注意力。我喜欢我的邻居，不想和他们有任何问题。写一封简短、友好且愉快的便条，将这种情况引起他们的注意。'
- en: ''
  id: totrans-1202
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have a leak in our small courtyard that seems to be coming up from the washing
    machine outflow. Write me a polite email for my landlord asking them to fix it.
  id: totrans-1203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我家小院有一个漏水的地方，看起来是从洗衣机排水口冒出来的。请为我写一封礼貌的电子邮件给我的房东，要求他们修理这个问题。
- en: ''
  id: totrans-1204
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A product I have purchased came with a broken part. I have been unable to reach
    the store by phone. Write me a polite, yet firm, email asking them to contact
    me about the situation.
  id: totrans-1205
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我购买的产品附带的部件损坏了。我无法通过电话联系到商店。请为我写一封礼貌而坚定的电子邮件，要求他们联系我处理这个问题。
- en: The virtual menu planner (or dietary strategist)
  id: totrans-1206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟菜单规划器（或饮食策略师）
- en: Ever had one of those days at work, and then you get home and someone asks,
    ‘What's for dinner?’ and you feel like screaming at them, ‘I don't know! Why don't
    you come up with something for a change?’
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 工作中是否有过那种一天，然后回到家，有人问，“晚饭吃什么？”而你感觉像要对他们尖叫，“我不知道！为什么不换换花样来想点东西？”
- en: Well, no more! Let me introduce you to ‘meal planning made easy with ChatGPT’,
    also known as ‘How not to scream at your family members for asking simple questions’.
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，不再了！让我向你介绍“用ChatGPT轻松制作餐点计划”，也被称为“如何不让家人因问简单问题而尖叫”。
- en: Quick confession, despite being a ‘productivity expert’, meal planning is not
    something I have traditionally got into. Until now.
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 快速坦白，尽管我是一个“生产力专家”，但餐点计划并不是我传统上感兴趣的事情。直到现在。
- en: Meal planning to me has always felt like a daunting task, especially when trying
    to maintain a healthy lifestyle. With so many factors to consider, like dietary
    requirements, meal prep, grocery shopping and family member fussiness, it can
    be overwhelming.
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，餐点计划一直感觉像是一项艰巨的任务，尤其是在尝试保持健康生活方式的时候。考虑到有这么多因素需要考虑，比如饮食需求、餐点准备、购物和家庭成员的挑剔，这可能会让人感到不知所措。
- en: But ChatGPT can make meal planning a breeze. Not only can it help you generate
    meal ideas, it can even create a customised shopping list based on your dietary
    needs and preferences.
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 但ChatGPT可以让餐点计划变得轻松。它不仅可以帮助你生成餐点想法，甚至可以根据你的饮食需求和偏好创建定制的购物清单。
- en: First up, let's talk dietary restrictions. Whether you're a vegan, vegetarian
    or have food allergies, ChatGPT has got you covered. All you have to do is ask
    for vegan or keto‐friendly meal ideas, and ChatGPT will provide you with a range
    of options to choose from, like vegan chilli or keto‐friendly pizza.
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们谈谈饮食限制。无论你是素食主义者、素食者还是对食物有过敏反应，ChatGPT都能满足你的需求。你只需请求素食或低碳水化合物友好的餐点建议，ChatGPT就会为你提供一系列可供选择的选择，比如素食辣椒或低碳水化合物披萨。
- en: '**Example prompts:** I have a gluten intolerance and I''m struggling to find
    meals that fit my dietary restrictions. Suggest some gluten‐free recipes that
    are easy to make.'
  id: totrans-1213
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示**：我有麸质不耐症，我很难找到符合我饮食限制的餐点。请建议一些易于制作的麸质免费食谱。'
- en: ''
  id: totrans-1214
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I'm a vegetarian and I'm looking for ways to add more protein to my diet. Recommend
    some plant‐based protein sources and recipe ideas.
  id: totrans-1215
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我是个素食主义者，我正在寻找增加饮食中蛋白质的方法。推荐一些植物性蛋白质来源和食谱想法。
- en: ''
  id: totrans-1216
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have a nut allergy and I'm worried about finding safe and nutritious snacks.
    Suggest some snack options that are nut‐free and won't trigger my allergy.
  id: totrans-1217
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我有坚果过敏，我担心找不到安全且营养的零食。建议一些无坚果的零食选项，不会引发我的过敏。
- en: TRYING TO SAVEMONEY?
  id: totrans-1218
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正在尝试省钱？
- en: ChatGPT can help you stick to your budget by generating a shopping list based
    on your meal plan. This will help you avoid buying unnecessary items and make
    sure you have everything you need for the week. Say you're planning on making
    roasted chicken with veggies, pasta with napolitana sauce, and stir‐fried vegetables.
    ChatGPT will generate a shopping list with chicken, veggies, pasta, marinara sauce,
    and any other ingredients you need.
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以通过根据你的餐点计划生成购物清单来帮助你坚持预算。这将帮助你避免购买不必要的物品，并确保你有一周所需的所有东西。比如说，你计划做烤鸡配蔬菜、那不勒斯酱意大利面和炒蔬菜。ChatGPT
    将生成一个包含鸡肉、蔬菜、意大利面、番茄酱以及你需要的任何其他食材的购物清单。
- en: '**Example prompts:** I have a limited budget for groceries, but I want to eat
    healthy and delicious meals. Suggest some affordable and nutritious meal ideas.'
  id: totrans-1220
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 我在杂货上的预算有限，但想吃得健康美味。请推荐一些经济实惠且营养丰富的餐点想法。'
- en: ''
  id: totrans-1221
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I often overspend on groceries and go over my budget. Suggest some strategies
    for meal planning and grocery shopping that can help me stay within my budget.
  id: totrans-1222
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我经常在杂货上超支并超出预算。请推荐一些餐计划和杂货采购的策略，帮助我保持在预算内。
- en: ''
  id: totrans-1223
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I'm trying to cut down on food waste and save money, but I'm not sure how to
    make the most of my ingredients. Suggest some recipes and cooking techniques that
    can help me use up [enter what is in your fridge or cupboard].
  id: totrans-1224
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我正在尝试减少食物浪费并节省金钱，但不确定如何充分利用我的食材。请推荐一些食谱和烹饪技巧，帮助我使用掉[输入你冰箱或橱柜里的食材]。
- en: SEEKINGINSPIRATION?
  id: totrans-1225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**寻求灵感？**'
- en: If you're trying to use up ingredients in your pantry or fridge, ChatGPT can
    help with that too. Just ask it to suggest meal ideas based on the ingredients
    you have on hand. Maybe you have some quinoa and canned black beans lying around — ChatGPT
    can suggest meal ideas like a quinoa and black bean bowl, a vegetarian chilli,
    or a black bean and quinoa salad. This is particularly useful if you have leftovers.
    It not only helps you avoid wasting food, but it can also save you money on groceries.
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在尝试使用储藏室或冰箱里的食材，ChatGPT 也能提供帮助。只需请它根据你手头上的食材推荐餐点。也许你有一些藜麦和罐装黑豆，ChatGPT 可以建议像藜麦黑豆碗、素食辣椒或黑豆藜麦沙拉这样的餐点。这特别有用，如果你有剩菜剩饭的话。它不仅能帮助你避免浪费食物，还能帮你节省杂货开支。
- en: '**Example prompts:** I have chicken, rice and broccoli in my fridge, but I''m
    not sure what to make for dinner. Suggest a recipe idea that incorporates these
    ingredients.'
  id: totrans-1227
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 我冰箱里有鸡肉、米饭和西兰花，但不知道晚餐该做什么。请推荐一个结合这些食材的食谱想法。'
- en: ''
  id: totrans-1228
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have eggs, cheese and bread in my fridge and pantry, but I'm tired of making
    the same old breakfast. Suggest some creative breakfast ideas using these ingredients.
  id: totrans-1229
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我冰箱和储藏室里有鸡蛋、奶酪和面包，但厌倦了做同样的早餐。请推荐一些使用这些食材的创意早餐想法。
- en: ''
  id: totrans-1230
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have a limited selection of ingredients in my fridge and pantry, but I want
    to make sure I'm getting all the nutrients I need. Suggest some meal and snack
    ideas that use everyday ingredients and still provide a balanced diet.
  id: totrans-1231
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我冰箱和储藏室里的食材种类有限，但我想确保我得到所需的全部营养。请推荐一些使用日常食材且仍能提供均衡饮食的餐点和零食想法。
- en: If you have the ChatGPT mobile app, you can even share a photo of the contents
    of your fridge and have ChatGPT suggest meals based on what it sees. For more
    on this, see [Chapter 7](#c07.xhtml).
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你拥有 ChatGPT 移动应用，你甚至可以分享你冰箱内容的照片，让 ChatGPT 根据它看到的建议餐点。更多关于这一点的内容，请参阅[第7章](#c07.xhtml)。
- en: IN A HURRY?
  id: totrans-1233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**赶时间吗？**'
- en: ChatGPT can help you save time by generating meal ideas that are quick and easy
    to prepare. If you're short on time and don't want to spend hours in the kitchen,
    simply ask ChatGPT to suggest meal ideas that take 30 minutes or fewer to prepare.
    You might get recipes like sheet pan chicken fajitas, one‐pot pasta or stir‐fried
    veggies. This is especially useful for busy weeknights when you're in a rush.
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以通过生成快速简单的餐点想法来帮助你节省时间。如果你时间紧迫，不想在厨房里花几个小时，只需请 ChatGPT 建议一些准备时间不超过30分钟的餐点。你可能会得到像烤盘鸡肉玉米卷饼、一锅意大利面或炒蔬菜这样的食谱。这特别适用于忙碌的工作日晚上，当你赶时间的时候。
- en: '**Example prompts:** I''m always short on time and struggle to find quick and
    easy meal ideas. Suggest some recipes that are easy to prepare and don''t require
    a lot of time or effort.'
  id: totrans-1235
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 我总是时间紧迫，很难找到快速简单的餐点想法。请推荐一些容易准备且不需要太多时间和精力的食谱。'
- en: ''
  id: totrans-1236
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I want to start meal prepping to save time during the week, but I'm not sure
    where to start. Suggest some simple meal prep ideas that are easy to prepare and
    store.
  id: totrans-1237
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我想开始准备餐点以节省一周中的时间，但我不确定从哪里开始。请推荐一些简单易准备且易于储存的餐点准备想法。
- en: ''
  id: totrans-1238
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I have a busy schedule and don't have a lot of time to spend in the kitchen,
    but I still want to eat healthy and delicious meals. Suggest some easy and quick
    recipe ideas that I can make in under 30 minutes.
  id: totrans-1239
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我日程繁忙，没有太多时间在厨房里花费，但我仍然想要吃健康美味的餐点。请推荐一些简单快捷的食谱，我可以在30分钟内完成。
- en: But wait, that's not all. Here come the steak knives …
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这还不算完。接下来是牛排刀……
- en: If you don't like what it's suggested, ask it for more. I have found that asking
    it specifically for three options rather than one gives me more choice. Get into
    a conversation by telling it to remove or add an ingredient, shorten the time,
    or give you three more ideas. Remember, this is not Google. Get into a dialogue
    until you find something right.
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不喜欢它提出的建议，可以要求更多。我发现，具体要求三个选项而不是一个，给我提供了更多的选择。通过告诉它去除或添加一种成分、缩短时间或给你三个更多想法来进入对话。记住，这不是谷歌。直到找到合适的方案，进行对话。
- en: 'Here''s what happened when I asked it for some very specific meal‐planning
    advice (#askingforafriend):'
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 当我请求一些非常具体的餐计划建议时（#向朋友求助）发生了以下情况：
- en: '**Example prompt:** Suggest meal options for the next three nights. I''m borderline
    type 2 diabetic so need to keep the sugar to a minimum and preparation should
    be around 30 minutes.'
  id: totrans-1243
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**示例提示：** 建议未来三晚的餐点选项。我几乎有2型糖尿病，所以需要将糖分控制在最低，准备时间应在30分钟以内。'
- en: ''
  id: totrans-1244
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**ChatGPT:** Night 1: Grilled salmon with roasted vegetables'
  id: totrans-1245
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**ChatGPT：** 第一晚：烤鲑鱼配烤蔬菜'
- en: ''
  id: totrans-1246
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Brush salmon with olive oil and season with salt, pepper, and garlic powder.
    Grill for 10‐12 minutes.
  id: totrans-1247
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用橄榄油涂抹鲑鱼，用盐、胡椒和蒜粉调味。烤10-12分钟。
- en: ''
  id: totrans-1248
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Roast vegetables (such as zucchini, bell peppers, and onions) in the oven with
    olive oil, salt, and pepper for 20‐25 minutes.
  id: totrans-1249
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在烤箱中用橄榄油、盐和胡椒烤蔬菜（如黄瓜、红椒和洋葱）20-25分钟。
- en: ''
  id: totrans-1250
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Night 2: Turkey and vegetable stir‐fry'
  id: totrans-1251
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第二晚：牛肉和蔬菜炒饭
- en: ''
  id: totrans-1252
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Cook ground turkey in a pan with sesame oil, ginger, and garlic.
  id: totrans-1253
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在锅中用芝麻油、姜和大蒜煮碎牛肉。
- en: ''
  id: totrans-1254
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Add chopped vegetables (such as broccoli, carrots, and snow peas) and cook for
    5‐7 minutes.
  id: totrans-1255
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 加入切碎的蔬菜（如芥蓝、胡萝卜和雪豌豆），煮5-7分钟。
- en: ''
  id: totrans-1256
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Season with low‐sodium soy sauce and a pinch of brown sugar. Serve over brown
    rice.
  id: totrans-1257
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用低钠酱油和少许红糖调味。放在红米饭上食用。
- en: ''
  id: totrans-1258
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Night 3: Grilled chicken salad'
  id: totrans-1259
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第三晚：烤鸡沙拉
- en: ''
  id: totrans-1260
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Marinate chicken breasts in balsamic vinegar, olive oil, and dried herbs for
    30 minutes.
  id: totrans-1261
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将鸡胸肉用香醋、橄榄油和干草药腌制30分钟。
- en: ''
  id: totrans-1262
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Grill chicken for 10‐12 minutes.
  id: totrans-1263
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 烤鸡10-12分钟。
- en: ''
  id: totrans-1264
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Toss mixed greens with cherry tomatoes, cucumber, and sliced avocado. Drizzle
    with olive oil and balsamic vinegar.
  id: totrans-1265
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将混合生菜与樱桃番茄、黄瓜和切片鳄梨混合。淋上橄榄油和香醋。
- en: ''
  id: totrans-1266
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Follow‐up prompt:** Generate a shopping list for the above according to supermarket
    departments.'
  id: totrans-1267
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**后续提示：** 根据超市部门生成上述食谱的购物清单。'
- en: '| Produce: | Pantry: |'
  id: totrans-1268
  prefs: []
  type: TYPE_TB
  zh: '| 蔬菜： | 食品储藏室： |'
- en: '| Salmon | Olive oil |'
  id: totrans-1269
