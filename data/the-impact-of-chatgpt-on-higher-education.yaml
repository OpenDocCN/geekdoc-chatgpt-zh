  id: totrans-1111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能聊天机器人带来了哪些威胁，为什么在管理它们时伦理政策至关重要？
- en: How can universities contribute responsibly to AI chatbot development and ethical
