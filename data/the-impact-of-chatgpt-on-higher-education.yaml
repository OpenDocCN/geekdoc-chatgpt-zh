  id: totrans-1110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在人工智能聊天机器人开发过程中，会出现哪些伦理挑战？现实世界的例子如何为这些挑战提供洞见？
- en: What threats do AI chatbots pose, and why is ethical policy crucial in managing
