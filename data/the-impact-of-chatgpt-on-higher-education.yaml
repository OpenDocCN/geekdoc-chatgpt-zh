- en: We dedicate this book to the memory of Dr İbrahim Arıkan, the founder of MEF
    Schools and MEF University, who dedicated his life to revolutionising education.
    Dr Arıkan's ultimate dream was to establish MEF University as a fully flipped
    university, but sadly, he passed away before witnessing its realisation. He was
    a pioneer across all stages of education, from kindergarten to university, and
    believed in a democratic approach to education that prioritised the individuality
    of each student.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将此书献给MEF学校和MEF大学的创始人，伊布拉希姆·阿里坎博士，他一生致力于教育革命。阿里坎博士的最终梦想是将MEF大学建设成为一个完全翻转的大学，但遗憾的是，他在见证这一梦想实现之前就去世了。他在从幼儿园到大学的所有教育阶段都是一位先驱，并坚信一种民主的教育方法，该方法优先考虑每个学生的个性。
- en: Dr Arıkan implemented full academic independence for teachers at his institutions,
    and his commitment to creating a learning environment that nurtures the potential
    of every student has left a lasting impact on the field of education. His spirit
    lives on in the hearts and minds of every student and teacher who had the privilege
    to know him. As we continue to honour his legacy, we are proud to say that MEF
    University has become the realisation of his dream, an innovative and fully flipped
    university that empowers students to take control of their education and become
    lifelong learners.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 阿里坎博士在他的机构中为教师实施了完全的学术独立性，他对创造一个培养每个学生潜力的学习环境的承诺对教育领域产生了持久的影响。他的精神在每一位有幸认识他的学生和教师的心中继续活着。随着我们继续纪念他的遗产，我们自豪地说，MEF大学已经成为他梦想的实现，一个创新和完全翻转的大学，赋予学生控制自己教育的能力，并成为终身学习者。
- en: We believe that Dr Arıkan would have been proud of the innovative direction
    MEF University is taking by incorporating cutting-edge technologies like ChatGPT
    to further enhance the teaching and learning experience. As a pioneer in education,
    he always believed in implementing new and effective teaching methods to provide
    his students with the best possible education. His spirit continues to inspire
    us to strive for excellence in education, and we dedicate this book to his memory.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们相信，阿里坎博士会为MEF大学通过整合像ChatGPT这样的尖端技术而采取的创新方向感到自豪，这将进一步增强教学和学习体验。作为一名教育先驱，他始终坚信实施新的和有效的教学方法，为学生提供最好的教育。他的精神继续激励我们追求教育卓越，我们将此书献给他以示纪念。
- en: About the Authors
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于作者
- en: '**Caroline Fell Kurban** is an academic, educator and consultant with a diverse
    educational background, including a PhD in Applied Linguistics, MA in Technology
    and Learning Design, MSc in Teaching English to Speakers of Other Languages and
    BSc (Hons) in Geology. Her expertise in flipped learning and contributions to
    publications on digital teaching and learning have been instrumental in advancing
    initiatives at MEF University in Istanbul. As the principal investigator, Caroline''s
    extensive background and prior studies have influenced the selection of theoretical
    frameworks for this investigation of ChatGPT integration in education. Her expertise
    in Clayton Christensen''s Theory of Jobs to be Done, critical examination of power
    dynamics through theorists like Bourdieu and Marx and understanding of phenomenology
    through Heidegger''s philosophy bring a comprehensive perspective to her research.
    With her credentials and passion for enhancing educational practices, she is well-suited
    to lead this project.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**卡罗琳·费尔·库尔班**是一位学者、教育者和顾问，拥有丰富的教育背景，包括应用语言学博士、技术和学习设计文学硕士、对外英语教学硕士以及地质学荣誉学士。她在翻转学习方面的专业知识以及对数字教学和学习的出版物所做的贡献，对伊斯坦布尔的MEF大学推进举措起到了关键作用。作为主要研究员，卡罗琳丰富的背景和先前的研究影响了这一研究选择理论框架，以探讨ChatGPT在教育中的整合。她对克莱顿·克里斯坦森的“待完成工作”理论、通过布迪厄和马克思等理论家的权力动态批判性考察以及通过海德格尔的哲学对现象学的理解，为她的研究带来了全面的视角。凭借她的资历和对提升教育实践的激情，她非常适合领导这个项目。'
- en: '**Muhammed Şahin**, an esteemed academic leader, holds a geomatics engineering
    degree from Istanbul Technical University (ITU) and earned his master''s degree
    from University College London in 1991 and a PhD from the University of Newcastle
    in 1994\. He joined ITU as an Assistant Professor in 1994 and climbed the ranks
    to become a tenured Professor in 2002\. Şahin''s remarkable career includes serving
    as the Rector of ITU from 2008 to 2012 and later as the founding rector at MEF
    University, the pioneering institution fully based on the flipped learning methodology
    in which this research is located. With esteemed leadership roles in various organisations,
    substantial contributions to research and strategic management and influential
    work in engineering education, his expertise spans diverse domains. However, his
    current passion and dedication revolve around educational transformation, especially
    with regard to the impact that technologies are having on reshaping learning experiences
    and empowering students for the future. He strongly believes that the experiences
    derived from this transformation should be shared with others, which is what prompted
    the development of this book.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**穆罕默德·沙欣**，一位备受尊敬的学术领导者，拥有伊斯坦布尔技术大学（ITU）的地理信息工程学位，并在1991年从伦敦大学学院获得硕士学位，1994年从纽卡斯尔大学获得博士学位。他在1994年加入ITU担任助理教授，并在2002年晋升为终身教授。沙欣非凡的职业生涯包括2008年至2012年担任ITU校长，后来成为MEF大学的创始校长，该校是位于翻转学习方法论基础上的先锋机构，也是这项研究所在的地方。他在各种组织中担任尊贵的领导角色，对研究和战略管理做出了重大贡献，并在工程教育领域产生了重大影响，他的专业知识涵盖了多个领域。然而，他目前的热情和奉献集中在教育转型上，特别是关于技术如何重塑学习体验和赋予学生未来能力的方面。他坚信，应该与他人分享这种转型带来的经验，这也是这本书得以发展的原因。'
- en: Foreword
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前言
- en: In the dynamic and ever-evolving landscape of education, one of the most profound
    shifts is the integration of emerging technologies. As an advocate for access
    to high-quality education for all, I find this era of technological advancement
    an intriguing period of transformation. This book dives deep into the exploration
    of artificial intelligence (AI) in education, specifically focusing on AI chatbots
    like ChatGPT, and the implications they bring to our learning environments.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育领域动态且不断演变的格局中，最深刻的转变之一是新兴技术的整合。作为一名倡导所有人都能获得高质量教育的人，我发现这个技术进步的时代是一个引人入胜的转型时期。这本书深入探讨了教育中的人工智能（AI），特别是关注像ChatGPT这样的AI聊天机器人，以及它们对我们学习环境带来的影响。
- en: My pleasure in presenting the foreword for this book is twofold. Firstly, because
    the authors have undertaken a rigorous exploration of a critical topic. Secondly,
    because this subject resonates with my professional journey, spent in pursuit
    of improving student outcomes and democratising access to quality education.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴为这本书撰写前言，原因有两方面。首先，因为作者们对一个关键主题进行了严格的探索。其次，因为这个主题与我的职业生涯产生了共鸣，我一直在追求提高学生成绩和普及高质量教育的途径。
- en: MEF University in Istanbul, the book's focal research site, stands as a beacon
    of innovation for its integration of AI, offering a unique context for this study.
    The authors critically examine ChatGPT, discussing its development, the ethical
    considerations surrounding its use, and the need for a globally inclusive discourse
    on the ethical guidelines for AI technologies.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 伊斯坦布尔的MEF大学，本书的研究焦点，以其整合AI而成为创新的灯塔，为这项研究提供了一个独特的背景。作者们批判性地审视了ChatGPT，讨论了其发展、使用过程中的伦理考量，以及就AI技术伦理指南进行全球包容性对话的必要性。
- en: From my tenure as US Under Secretary of Education to leading the American Council
    on Education, I have seen the impact that a conscientious integration of technology
    can have on access to high-quality education. In this book, by delving into the
    history and ascent of chatbots, formulating a theoretical framework for evaluating
    AI's influence, conducting a contemporary literature review and embarking on an
    exploratory case study, the authors shed light on how AI chatbots have the potential
    to reshape the very foundations of teaching and learning.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 从我担任美国教育部副部长到领导美国教育理事会，我见证了有意识的科技整合对高质量教育获取的影响。在这本书中，通过深入研究聊天机器人的历史和崛起，制定评估AI影响的理论框架，进行当代文献综述，并开展探索性案例研究，作者们揭示了AI聊天机器人有可能重塑教学和学习的根本基础。
- en: What the authors present is not just a well-researched treatise on ChatGPT,
    but a tool for future exploration. The book's concluding chapters provide a blueprint
    for how to effectively and ethically integrate these AI technologies in our classrooms
    and institutions, a guide I wish I had when piloting early edtech initiatives
    in my own career.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 作者所呈现的不仅是对ChatGPT的深入研究论文，而且是一个未来探索的工具。本书的结论章节提供了一个蓝图，说明了如何有效地、道德地整合这些AI技术到我们的课堂和机构中，这是我自己在职业生涯中试点早期教育技术项目时希望拥有的指南。
- en: The insights gleaned from this book go beyond ChatGPT. They will shape how we,
    as educators, policymakers, and students, navigate the rapidly changing technological
    landscape of education. The authors have not only provided a comprehensive exploration
    of AI chatbots in education but also prompted us to consider how we can harness
    this technology to create an equitable and inclusive future for all learners.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 从这本书中获得的洞察力超越了ChatGPT。它们将塑造我们作为教育者、政策制定者和学生如何应对教育领域快速变化的科技景观。作者不仅全面探讨了教育中的AI聊天机器人，还促使我们思考如何利用这项技术为所有学习者创造一个公平包容的未来。
- en: In the grand scheme of things, the integration of AI in education is a new frontier.
    This book stands as an essential guide for all those venturing into this new territory.
    We stand on the precipice of a new era in education – an era where AI can help
    us achieve our shared goals of equity, excellence and accessibility in education.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在更大的背景下，AI在教育中的整合是一个新的前沿。这本书为所有进入这个新领域的人提供了一本不可或缺的指南。我们站在教育新时代的边缘——一个AI可以帮助我们实现教育公平、卓越和可及性的共同目标的时代。
- en: Let us not just read this book but act on its insights to ensure a future where
    all learners have access to quality education.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不仅要阅读这本书，更要行动起来，利用其洞察力确保一个所有学习者都能获得优质教育的未来。
- en: '*Ted Mitchell*'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*特德·米切尔*'
- en: President of the American Council on Education
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 美国教育委员会主席
- en: Preface
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前言
- en: 'It is my pleasure to introduce our new book, *The Impact of ChatGPT on Higher
    Education: Exploring the AI Revolution*. As the founding rector of MEF University
    in Istanbul, Turkey, I am proud to say that our institution has always been at
    the forefront of innovative and cutting-edge approaches to education.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴向大家介绍我们新书，《ChatGPT对高等教育的影响：探索AI革命》。作为土耳其伊斯坦布尔的MEF大学的创始校长，我自豪地说，我们的机构一直处于创新和尖端教育方法的前沿。
- en: Since our establishment in 2014 as the world's first fully flipped university,
    we have been dedicated to providing our students with the skills they need to
    succeed in their future careers. However, we also recognise that the landscape
    of education is constantly evolving, and we must adapt our methods accordingly.
    That is why, in this book, we are excited to share our exploration of how ChatGPT
    may affect the roles of students, instructors and institutions of higher education.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 自从我们2014年作为世界上第一所完全翻转的大学成立以来，我们一直致力于为学生提供他们在未来职业生涯中成功所需的技能。然而，我们也认识到教育领域不断演变，我们必须相应地调整我们的方法。这就是为什么，在这本书中，我们兴奋地分享我们对ChatGPT可能如何影响学生、教师和高等教育机构角色的探索。
- en: Our university has always been a pioneer in the use of technology in education.
    We were early adopters of the flipped learning approach, which has now become
    widely recognized as an effective pedagogical method. We were also at the forefront
    of using digital platforms with adaptive learning capabilities to provide our
    students with personalised and individualised learning experiences.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的大学在教育技术使用方面一直处于先锋地位。我们是翻转学习方法的早期采用者，这种方法现在已被广泛认可为一种有效的教学方法。我们还处于使用具有自适应学习能力的数字平台的前沿，为学生提供个性化的学习体验。
- en: As we embrace new technologies and innovative approaches to education, the potential
    of AI in education using ChatGPT is both exciting and promising. However, it is
    crucial to thoroughly explore and understand how this technology will impact students,
    instructors and universities themselves. Moreover, universities will have a vital
    role to play in the global discourse of AI as it rapidly transforms various aspects
    of our lives.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们拥抱新的教育技术和创新方法，使用ChatGPT的教育AI潜力既令人兴奋又充满希望。然而，彻底探索和理解这项技术将如何影响学生、教师和大学本身至关重要。此外，大学将在全球AI话语中扮演至关重要的角色，因为它正在迅速改变我们生活的各个方面。
- en: This book presents an in-depth analysis of our institution's exploratory case
    study, investigating the potential effects of ChatGPT on various stakeholders.
    Through the sharing of experiences, anecdotes and perspectives from various practitioners'
    viewpoints, our goal is to offer a glimpse into the transformations occurring
    within our organisation. This endeavour can serve as a useful reference for other
    institutions seeking to undertake similar inquiries. We are excited to be at the
    forefront of this discourse and to contribute to the progress of knowledge in
    this field.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 本书深入分析了我们机构探索性案例研究，调查ChatGPT对各种利益相关者的潜在影响。通过分享来自各种实践者观点的经验、轶事和观点，我们的目标是提供一个窗口，让我们一窥我们组织内部的变革。这项努力可以作为其他寻求进行类似调查的机构的有用参考。我们很高兴能站在这个讨论的前沿，并为这个领域的知识进步做出贡献。
- en: '*Muhammed Şahin*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '*穆罕默德·沙欣*'
- en: Rector of MEF University
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: MEF大学校长
- en: Acknowledgements
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 致谢
- en: In creating this book, we have been fortunate to receive significant support,
    assistance and inspiration. We are profoundly grateful to all who contributed.
    Our students, especially Levent Olcay, Utkan Enis Demirelgil, Nida Uygun and Mehmet
    Oğuzhan Unlu, brought invaluable enthusiasm and insights to the project. We would
    also like to acknowledge the diligent assistance of our student volunteer, Muhammet
    Dursun Şahin. We are deeply thankful to the İbrahim Arıkan Education and Scientific
    Research Foundation, a guiding light in our pursuit of educational excellence,
    and the MEF University faculty, whose creative ideas and persistent motivation
    were indispensable. We express our gratitude to Professor Muhittin Gökmen, Director
    of the Graduate School of Science and Engineering and the Chairman of the Department
    of Computer Engineering at MEF. His valuable insights concerning AI theorists
    like Tegmark, Marcus, Davis and Russell greatly enriched our understanding. Additionally,
    we extend our appreciation to Professor Mustafa Özcan, Dean of the Faculty of
    Education at MEF, for his continuous feedback and unwavering support throughout
    the duration of this project. We owe a debt of gratitude to Paker Doğu Özdemir
    and his team at the MEF CELT, along with the MEF Library staff, especially Ertuğrul
    Çimen and Ertuğrul Akyol, for their tireless support and valuable contributions.
    Our heartfelt thanks also go to our colleagues, including Ted Mitchell, whose
    thoughtful foreword frames our work; Leonid Chechurin, for his astute critique;
    and Juliet Girdher, whose expertise on Heidegger enriched our understanding of
    AI through a Heideggarian lens. We also extend our appreciation to the members
    of our AI think tank, Errol St Clair Smith, Thomas Menella, Dan Jones and Juli
    Ross-Kleinmann whose thoughtful discussions helped shape our ideas. Finally, we
    express our sincere gratitude to Emerald Publishing for making this book possible.
    In essence, this book is a testament to the strength of collaborative effort and
    the pursuit of knowledge. Each of you has enriched our work, leaving an indelible
    mark that we will forever appreciate. Thank you.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在创作这本书的过程中，我们非常幸运地得到了重要的支持、协助和灵感。我们对所有贡献者深表感激。我们的学生，尤其是Levent Olcay、Utkan Enis
    Demirelgil、Nida Uygun和Mehmet Oğuzhan Unlu，为项目带来了无价的热情和洞察力。我们还要感谢我们学生志愿者Muhammet
    Dursun Şahin的勤奋协助。我们对İbrahim Arıkan Education and Scientific Research Foundation深表感激，它是我们追求教育卓越的指路明灯，以及MEF大学的教师团队，他们的创新思想和持续的动力是不可或缺的。我们感谢MEF大学科学和工程学院院长、计算机工程系主任Muhittin
    Gökmen教授，他对像Tegmark、Marcus、Davis和Russell这样的AI理论家的宝贵见解极大地丰富了我们的理解。此外，我们还要感谢MEF大学教育学院院长Mustafa
    Özcan教授，他在整个项目期间持续反馈和坚定不移的支持。我们对Paker Doğu Özdemir及其在MEF CELT的团队，以及MEF图书馆工作人员，特别是Ertuğrul
    Çimen和Ertuğrul Akyol的无私支持和宝贵贡献表示感激。我们衷心的感谢也送给我们的同事，包括Ted Mitchell，他的深思熟虑的序言为我们的工作定下了基调；Leonid
    Chechurin，他的敏锐批评；以及Juliet Girdher，她对海德格尔的专长通过海德格尔的视角丰富了我们对AI的理解。我们还感谢我们AI智库的成员，包括Errol
    St Clair Smith、Thomas Menella、Dan Jones和Juli Ross-Kleinmann，他们的深思熟虑的讨论帮助我们塑造了我们的想法。最后，我们对我们真诚感谢Emerald
    Publishing，使这本书成为可能。本质上，这本书是对协作力量和知识追求的力量的证明。你们每个人都丰富了我们的工作，留下了我们永远感激的不可磨灭的印记。谢谢。
- en: Chapter 1
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一章
- en: Exploring ChatGPT's Impact on Higher Education – A Case Study
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索ChatGPT对高等教育的影响——案例研究
- en: The Revolutionary Impact of AI
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能的革命性影响
- en: Throughout the ages, technological advancements have disrupted traditional practices,
    necessitating individuals to adjust and weigh the potential advantages and disadvantages
    of emerging technologies. From the printing press to the blackboard, from the
    computer to the internet, each new innovation has shaped the way we teach and
    learn. And artificial intelligence (AI) is set to be the next catalytic jump forwards.
    Although AI has been around since the mid-1950s, it is only in recent times that
    data mining, advanced algorithms and powerful computers with vast memory have
    been developed, thus making AI increasingly relevant. From problem-solving in
    the 1950s to the simulation of human reasoning in the 1960s, from early mapping
    projects in the 1970s to the development of intelligent assistants in the 2000s,
    AI has made impressive strides. Today, AI manifests in household personal assistants
    like Siri and Alexa, self-driving cars and automated legal assistants. It has
    also spawned AI-assisted stores, AI-enabled hospitals and the ubiquitous Internet
    of Things. In the realm of higher education, the integration of AI technologies
    holds transformative potential for traditional teaching and learning practices.
    However, a new era has now arrived with the emergence of ChatGPT, the game-changing
    AI chatbot. So what is ChatGPT?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在漫长的历史中，技术进步一直颠覆着传统实践，迫使个人调整并权衡新兴技术的潜在利弊。从印刷术到黑板，从计算机到互联网，每一次新的创新都塑造了我们的教学和学习方式。人工智能（AI）预计将成为下一个催化性的飞跃。尽管AI自20世纪50年代中期以来就已经存在，但直到最近，数据挖掘、高级算法和具有巨大内存的强大计算机才得到发展，从而使AI越来越相关。从20世纪50年代的解决问题到20世纪60年代的人类推理模拟，从20世纪70年代的早期测绘项目到21世纪初智能助手的开发，AI取得了令人印象深刻的进步。今天，AI体现在家庭个人助理如Siri和Alexa、自动驾驶汽车和自动化法律助理中。它还催生了AI辅助商店、AI赋能医院以及无处不在的物联网。在高等教育领域，AI技术的整合对传统的教学和学习实践具有变革性的潜力。然而，随着ChatGPT这一颠覆性AI聊天机器人的出现，一个新时代已经到来。那么，什么是ChatGPT？
- en: The Arrival of Chat Generative Pre-trained Transformer (ChatGPT)
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Chat Generative Pre-trained Transformer（ChatGPT）的到来
- en: ChatGPT, an influential AI chatbot developed by OpenAI, has emerged as a game-changer
    in education, offering students dynamic and human-like conversations through natural
    language processing (NLP). Since its launch on 30 November 2022, ChatGPT has revolutionised
    the educational landscape, providing students with immediate access to information,
    personalised recommendations and continuous support throughout their academic
    journey. However, its implementation has also raised concerns about academic integrity,
    leading some institutions to ban its usage or adopt stricter assessment methods
    to combat AI-based cheating. This has sparked global discussions among educators,
    debating whether ChatGPT represents an opportunity or a threat.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT，由OpenAI开发的一款有影响力的AI聊天机器人，已成为教育领域的颠覆者，通过自然语言处理（NLP）为学生提供动态且类似人类的对话。自2022年11月30日推出以来，ChatGPT已经彻底改变了教育格局，为学生提供了即时获取信息、个性化推荐以及在整个学术旅程中持续的支持。然而，其应用也引发了关于学术诚信的担忧，导致一些机构禁止其使用或采取更严格的评估方法来对抗基于AI的作弊行为。这引发了全球教育者的讨论，争论ChatGPT代表的是机遇还是威胁。
- en: At its core, ChatGPT operates by harnessing the power of NLP to comprehend and
    respond to human queries in a conversational manner. Through advanced algorithms
    and machine learning techniques, ChatGPT has been trained on vast datasets to
    generate human-like responses, making it an indispensable tool for engaging with
    students. The interactive and personalised nature of ChatGPT's conversations makes
    it highly valuable in the educational landscape. Students can instantly access
    answers to their questions, relevant resources and tailored recommendations based
    on their learning needs. Whether seeking clarifications, additional information
    or guidance, ChatGPT serves as a reliable and readily available support system
    throughout their academic journey. Furthermore, instructors can leverage ChatGPT
    to streamline administrative tasks and enhance the learning experience. By automating
    routine administrative processes, such as addressing frequently asked questions
    and providing course-related information, instructors have more time to focus
    on meaningful interactions with students. Additionally, ChatGPT can offer timely
    and personalised feedback, providing students with real-time guidance and support.
    Integrating ChatGPT into the educational environment can lead to a more engaging
    and interactive learning experience. Students benefit from immediate assistance,
    personalised guidance and a supportive learning environment, while instructors
    can optimise their teaching practices and facilitate more meaningful interactions.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的核心运作方式是通过利用自然语言处理（NLP）的力量，以对话的方式理解和回应人类查询。通过先进的算法和机器学习技术，ChatGPT在庞大的数据集上进行了训练，以生成类似人类的回应，使其成为与学生互动的不可或缺的工具。ChatGPT对话的互动性和个性化特性使其在教育领域中极具价值。学生可以立即获取他们问题的答案、相关资源和基于其学习需求的定制推荐。无论是寻求澄清、额外信息还是指导，ChatGPT都作为可靠且随时可用的支持系统贯穿他们的学术旅程。此外，教师可以利用ChatGPT简化行政任务并提升学习体验。通过自动化常规行政流程，如回答常见问题并提供课程相关信息，教师可以有更多时间专注于与学生的有意义互动。此外，ChatGPT还可以提供及时和个性化的反馈，为学生提供实时指导和支持。将ChatGPT整合到教育环境中可以带来更加吸引人和互动的学习体验。学生从即时帮助、个性化指导和支持性的学习环境中受益，而教师则可以优化他们的教学实践并促进更有意义的互动。
- en: As we can see, the potential of ChatGPT in higher education is promising. However,
    it is essential to recognise the caveats that accompany it. To begin with, addressing
    the ethical considerations and limitations surrounding ChatGPT is crucial. These
    encompass concerns about its reliance on heuristics, lack of transparency in internal
    workings, issues with capability versus alignment, limitations in helpfulness,
    interpretability challenges, issues of bias and fairness, factual accuracy and
    truthfulness, as well as ethical concerns regarding data privacy and cybersecurity.
    Moreover, the impact of ChatGPT on industries, including higher education, necessitates
    thorough investigation. The integration of AI technologies like ChatGPT brings
    transformative effects on job markets, resulting in the elimination and transformation
    of positions, requiring a re-evaluation of traditional work models. Within education,
    institutions and companies face disruptive challenges as ChatGPT alters job roles,
    posing questions about the value of human expertise and critical thinking skills.
    Additionally, financial implications and the costs associated with implementation
    and ongoing support require careful consideration. Furthermore, the concentration
    of AI power and the potential for corporate dominance are critical factors to
    explore. The risk of a few dominant companies controlling and influencing AI raises
    concerns about limited diversity, choice and fair competition, emphasising the
    need to address data ownership, privacy and the possibility of monopolistic practices.
    Establishing comprehensive policies and regulations becomes essential to ensure
    ethical use, responsible deployment and accountability in the integration of ChatGPT
    and similar technologies. Lastly, the scarcity of research on the specific impact
    of ChatGPT in teaching, learning and higher education institutions underlines
    the significance of investigation. The limited availability of case studies, insufficient
    student perspectives and inadequate understanding of necessary adaptations in
    educational objectives and practices create a substantial knowledge gap. It is
    therefore crucial that investigations of ChatGPT in higher education are undertaken,
    due to its potential as well as its associated caveats.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，ChatGPT在高等教育中的潜力是光明的。然而，认识到其伴随的注意事项是至关重要的。首先，解决围绕ChatGPT的伦理考虑和限制是至关重要的。这包括对其依赖启发式方法、内部运作缺乏透明度、能力与对齐问题、帮助性限制、可解释性挑战、偏见和公平性问题、事实准确性和真实性，以及关于数据隐私和网络安全方面的伦理担忧。此外，ChatGPT对包括高等教育在内的行业的影响需要彻底调查。ChatGPT等人工智能技术的集成对就业市场产生了变革性影响，导致职位被消除和转变，需要重新评估传统的工作模式。在教育领域，随着ChatGPT改变工作角色，机构和企业面临着颠覆性的挑战，这引发了关于人类专业知识和批判性思维技能价值的疑问。此外，实施和持续支持相关的财务影响和成本需要仔细考虑。此外，AI力量的集中和可能的企业主导地位是关键因素，需要探索。少数主导公司控制并影响AI的风险引发了关于多样性有限、选择有限和公平竞争的担忧，强调了处理数据所有权、隐私和垄断行为可能性的必要性。建立全面的政策和法规对于确保ChatGPT和类似技术的道德使用、负责任部署和问责制至关重要。最后，关于ChatGPT在教学中、学习中和高等教育机构中的具体影响的研究的稀缺，凸显了调查的重要性。案例研究的有限可用性、学生观点的不足以及对学生教育目标和实践必要调整的不充分理解，造成了巨大的知识差距。因此，鉴于其潜力和相关注意事项，对高等教育中ChatGPT的调查是至关重要的。
- en: In the wake of the COVID-19 pandemic, educational approaches underwent a significant
    shift. However, compared to the emergence of ChatGPT, the impact of the pandemic
    may appear relatively small. While instructors and institutions had the option
    to revert to traditional educational methods as the pandemic receded, the same
    cannot be said for ChatGPT and AI chatbots. In fact, one could argue that ChatGPT
    represents a new kind of ‘pandemic’ in the educational landscape. So, how should
    this be addressed?
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在COVID-19大流行之后，教育方法经历了重大转变。然而，与ChatGPT的出现相比，大流行的影响可能相对较小。虽然随着大流行的消退，教师和机构有选择回归传统教育方法，但ChatGPT和AI聊天机器人的情况并非如此。事实上，有人可能会认为ChatGPT代表了教育领域的一种新的“大流行”。那么，我们应该如何应对这种情况呢？
- en: MEF University's Response to ChatGPT
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MEF大学对ChatGPT的回应
- en: MEF University, a pioneering non-profit private institution located in Istanbul,
    Turkey, has been at the forefront of embracing innovative educational methodologies
    since its inception. Founded by Dr İbrahim Arıkan, the university envisions revolutionising
    higher education by equipping students with the skills necessary for future careers
    and addressing the dynamic demands of contemporary industries and society. By
    strategically investing in infrastructure and cutting-edge technology, MEF has
    solidified its reputation as a forward-thinking institution. Since its establishment
    in 2014, MEF became a trailblazer by fully embracing the flipped learning approach
    across its entire campus. This pedagogical model emphasises student-centred learning
    and the cultivation of critical thinking skills. Under this framework, students
    engage with course content outside of class, while in-class time is dedicated
    to the practical application of these principles. Instructors adopt roles as facilitators
    or coaches, delivering personalised support and feedback. However, MEF University's
    commitment to enhancing the learning experience and embracing innovation did not
    stop there. In 2019, the institution phased out traditional final exams in favour
    of project-based and product-focused assessments, fostering active learning and
    tangible application of acquired knowledge. Additionally, digital platforms and
    adaptive learning technologies were seamlessly integrated into programmes, providing
    interactive resources and tailoring the learning journey to each student's unique
    needs. The integration of Massive Open Online Courses (MOOCs) further expanded
    self-directed learning opportunities, culminating in the development of the Flipped,
    Adaptive, Digital and Active Learning (FADAL) model (Şahin & Fell Kurban, 2019).
    This model proved its worth when the COVID-19 pandemic struck in 2020\. While
    conventional institutions grappled with the transition to online learning, MEF
    University's FADAL approach facilitated a seamless shift. The institution's emphasis
    on technology, active learning and personalised education ensured a smooth transition
    to remote learning. Accolades, including being recognised as Turkey's top university
    for effectively navigating the pandemic through national student satisfaction
    surveys and receiving the 2020 Blackboard Catalyst Award for Teaching and Learning,
    underscored MEF's successful adaptation to the new educational landscape. Building
    on this foundation, the institution introduced an AI minor programme, Data Science
    and AI, in 2021\. This programme equips students across all departments with comprehensive
    skills in data management, analytics, machine learning and deep learning, preparing
    them for real-world applications. Through these strategic initiatives, MEF University's
    commitment to disruptive innovation and investment in new technologies have positioned
    it as a leader in preparing students to meet the evolving demands of industries
    and society.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: MEF大学，一家位于土耳其伊斯坦布尔的先锋非营利私立机构，自成立以来一直处于拥抱创新教育方法的尖端。由İbrahim Arıkan博士创立，该大学旨在通过为学生提供未来职业所需的技能，并应对当代产业和社会的动态需求，来革新高等教育。通过战略性地投资基础设施和尖端技术，MEF巩固了其作为前瞻性机构的声誉。自2014年成立以来，MEF通过在其整个校园内全面采用翻转学习方法，成为了一个开拓者。这种教学模式强调以学生为中心的学习和批判性思维技能的培养。在这个框架下，学生将在课外时间与课程内容互动，而在课堂时间则致力于这些原则的实际应用。教师扮演着促进者或教练的角色，提供个性化的支持和反馈。然而，MEF大学对提升学习体验和拥抱创新的承诺并未止步于此。2019年，该机构逐步淘汰了传统的期末考试，转而采用基于项目和产品评估的方法，以培养主动学习和知识应用的实质性应用。此外，数字平台和自适应学习技术被无缝集成到课程中，提供互动资源，并根据每个学生的独特需求定制学习之旅。大规模开放在线课程（MOOCs）的整合进一步扩大了自主学习的机会，最终导致了翻转、自适应、数字和主动学习（FADAL）模型（Şahin
    & Fell Kurban, 2019）的发展。当2020年COVID-19大流行爆发时，这一模型证明了其价值。在传统机构为过渡到在线学习而挣扎时，MEF大学的FADAL方法促进了无缝的转变。该机构对技术、主动学习和个性化教育的重视确保了远程学习的顺利过渡。包括在国家学生满意度调查中被认定为土耳其最顶尖的大学，以及获得2020年Blackboard
    Catalyst奖（教学与学习奖）在内的赞誉，突显了MEF成功适应新教育格局的能力。在此基础上，该机构于2021年推出了人工智能辅修课程，数据科学和人工智能，该课程为所有院系的学生提供了数据管理、分析、机器学习和深度学习的全面技能，为他们准备实际应用。通过这些战略举措，MEF大学对颠覆性创新和新技术的投资使其在培养学生满足行业和社会不断变化的需求方面成为领导者。
- en: The public launch of ChatGPT on 30 November 2022 sparked robust discussions
    at MEF University about the potential opportunities and challenges it introduces
    to higher education. In response, three individuals at the university volunteered
    to undertake an initial experiment spanning from December 2022 to January 2023\.
    This experiment involved integrating ChatGPT into course design, classroom activities
    and evaluating its impact on assessments and exams. The findings from this experiment
    catalysed a faculty meeting in January 2023\. During this meeting, the origins
    and potential implications of ChatGPT were presented, and the volunteers shared
    concrete examples of its incorporation in various educational contexts. The diverse
    array of perspectives expressed during the meeting underscored the necessity for
    an in-depth institutional case study to comprehensively explore ChatGPT's impact
    on education within MEF University. Specifically, the university aimed to understand
    how ChatGPT could potentially reshape the roles of students, instructors and higher
    education institutions. Recognising the gravity of the situation and the imperative
    for further exploration, the concept for the research project outlined in this
    book was conceived.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT于2022年11月30日的公开发布，在MEF大学引发了关于其给高等教育带来的潜在机遇和挑战的激烈讨论。作为回应，大学中的三位个人自愿从2022年12月到2023年1月进行了一项初步实验。这项实验涉及将ChatGPT整合到课程设计、课堂活动和评估其对评估和考试的影响。这次实验的结果促使2023年1月举行了一次教师会议。在这次会议上，介绍了ChatGPT的起源和潜在影响，志愿者们分享了其在各种教育环境中的应用的具体例子。会议期间表达的多样化观点强调了在MEF大学全面探索ChatGPT对教育影响的必要性。具体来说，大学旨在了解ChatGPT如何可能重塑学生、教师和高等教育机构的作用。认识到形势的严重性和进一步探索的必要性，本书中概述的研究项目概念由此产生。
- en: The core objectives of our research project encompass a thorough exploration
    of ChatGPT's potential impact on students and instructors within the realm of
    higher education. By immersing ourselves in the implementation of this transformative
    technology, our study aims to unearth potential challenges and barriers that may
    emerge. This endeavour offers invaluable insights into the transformative role
    AI chatbots like ChatGPT can play in reshaping the teaching and learning landscape.
    Our overarching mission is to delve into how the integration of ChatGPT might
    redefine the roles of students, instructors and higher education institutions.
    Through this inquiry, we aspire to gain a profound understanding of how AI chatbots
    might reshape dynamics and responsibilities within the educational sphere. By
    scrutinising these shifts, we seek insights into the implications for educators,
    learners and universities as a whole. Furthermore, our research aims to contribute
    to the broader discourse surrounding the integration of AI technologies in higher
    education. Guided by three pivotal research questions that structure our investigation,
    namely, ‘How may ChatGPT affect the role of the student?’; ‘How may ChatGPT affect
    the role of the instructor?’; and ‘'How may ChatGPT affect the role of institutions
    of higher education?’, our study aims to offer valuable insights that will inform
    educational practices, guide policy formulation and shape the future integration
    of AI technologies in higher education institutions. Ultimately, our research
    endeavours aim to contribute to a deeper understanding of the potential benefits
    and considerations associated with ChatGPT, ensuring its effective and responsible
    integration within the realm of higher education.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们研究项目的核心目标包括对ChatGPT在高等教育领域对学生和教师潜在影响的彻底探索。通过沉浸在这项变革性技术的实施中，我们的研究旨在揭示可能出现的挑战和障碍。这一努力为AI聊天机器人如ChatGPT在重塑教学和学习景观中可能发挥的变革性作用提供了宝贵的见解。我们的总体使命是深入研究ChatGPT的整合如何重新定义学生、教师和高等教育机构的角色。通过这一调查，我们希望深入了解AI聊天机器人可能如何重塑教育领域的动态和责任。通过审视这些转变，我们寻求对教育工作者、学习者以及整个大学的影响的见解。此外，我们的研究旨在对围绕高等教育中AI技术整合的更广泛讨论做出贡献。在三个关键研究问题的指导下进行我们的调查，即“ChatGPT可能如何影响学生的角色？”；“ChatGPT可能如何影响教师的角色？”以及“ChatGPT可能如何影响高等教育机构？”我们的研究旨在提供有价值的见解，这些见解将指导教育实践、政策制定并塑造高等教育机构中AI技术的未来整合。最终，我们的研究努力旨在对ChatGPT的潜在利益和考虑因素有更深入的理解，确保其在高等教育领域中的有效和负责任整合。
- en: Purpose and Scope of the Book
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本书的目的和范围
- en: This book aims to provide a comprehensive analysis of MEF University's exploratory
    case study, delving into the potential impacts of ChatGPT on various stakeholders.
    Drawing from diverse perspectives, experiences and anecdotes, our objective is
    to offer a profound understanding of the transformative shifts occurring within
    our institution. By delving into these findings, we intend to contribute meaningfully
    to the broader discourse on ChatGPT's implications in higher education and offer
    valuable insights to institutions facing similar inquiries.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 本书旨在对MEF大学的探索性案例研究进行全面分析，深入探讨ChatGPT对各方利益相关者的潜在影响。借鉴不同的视角、经验和轶事，我们的目标是提供一个深刻的理解，了解我们机构内部正在发生的转型性变化。通过深入研究这些发现，我们旨在对关于ChatGPT在高等教育中影响的更广泛讨论做出有意义的贡献，并为面临类似调查的机构提供有价值的见解。
- en: 'In this opening chapter, we introduced ChatGPT and highlighted the significance
    of investigating its role in higher education. We established our research context,
    reasons for conducting this study, research objectives and research questions.
    Chapter 2 delves into the emergence of chatbots, shedding light on their limitations
    and ethical considerations. Additionally, we explore ChatGPT''s profound impact
    on employment and education, as well as scrutinising evolving educational policies
    in response to these changes. We conclude this chapter by discussing the need
    for robust policies to address potential risks associated with AI. Chapter 3 constructs
    a theoretical framework by incorporating critical theory and phenomenology. This
    framework enables us to comprehensively examine ChatGPT''s impact, encompassing
    power dynamics, social structures, subjective experiences and consciousness, thereby
    providing deeper insights into its relevance and broader implications. In Chapter
    4, we present a literature review of ChatGPT in higher education, identifying
    valuable insights and specific gaps, while explaining how our study addresses
    these gaps and advances understanding. Chapter 5 introduces the research methodology,
    employing a qualitative exploratory case study approach at MEF. We utilise interviews,
    observations, research diaries and surveys for data collection. Thematic analysis
    aids in interpreting the data, leading to the identification of themes, including:
    Input Quality and Output Effectiveness of ChatGPT, Limitations and Challenges
    of ChatGPT, Human-like Interactions with ChatGPT; the Personal Aide/Tutor Role
    of ChatGPT; Impact of ChatGPT on User Learning and Limitations of Generalised
    Bots for Educational Context. Chapter 6 offers an interpretation of these themes,
    linking them to the research questions, data, literature review and theoretical
    framework. The book then transitions to discussing the practical implications
    derived from the findings and interpretation. In Chapter 7, we delve into the
    ethical implications, including critiquing AI detection tools, scrutinising current
    AI referencing systems, the need to rethink plagiarism in the AI age, the need
    to cultivate proficiency in AI ethics and the importance of enhancing university
    ethics committees'' roles. Chapter 8 delves into product implications, emphasising
    the necessity of fair access to AI bots for all students, the importance of fostering
    industry collaboration to understand AI developments, how we should approach decision-making
    regarding specialised bots and the importance of integrating prompt engineering
    courses into programmes. Chapter 9 explores educational implications, discussing
    the impact of AI on foundational learning, how we can navigate AI challenges through
    flipped learning, how we can design AI-resilient assessment and instruction strategies,
    and the importance of fostering AI literacy in students and instructors. In Chapter
    10, we highlight our study''s contributions to knowledge and research. Beginning
    with an overview of our research structure, the chapter delves into key insights
    and findings, revisiting essential themes. Our theoretical framework is discussed
    for advancing AI discourse by blending philosophy and technology in educational
    research. We explore practical implications for higher education institutions.
    Moreover, we advocate that universities bear a moral duty to actively engage in
    the global AI conversation. Addressing research limitations, we outline how we
    plan to overcome them in future studies. Recommendations for additional relevant
    research areas are also presented to further explore AI in higher education. The
    chapter concludes by underscoring our role as authors of the AI narrative, with
    the power to shape AI technologies in alignment with our shared values and aspirations.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的开篇，我们介绍了ChatGPT并强调了调查其在高等教育中作用的重要性。我们确立了我们的研究背景、进行这项研究的原因、研究目标和研究问题。第二章深入探讨了聊天机器人的出现，揭示了它们的局限性和伦理考量。此外，我们还探讨了ChatGPT对就业和教育产生的深远影响，以及针对这些变化而不断演变的政策。我们通过讨论应对与AI相关的潜在风险的稳健政策来结束本章。第三章通过结合批判理论和现象学构建了一个理论框架。这个框架使我们能够全面考察ChatGPT的影响，包括权力动态、社会结构、主观经验和意识，从而更深入地了解其相关性和更广泛的影响。在第四章中，我们回顾了ChatGPT在高等教育中的文献，确定了有价值的见解和具体差距，并解释了我们的研究如何填补这些差距并推进理解。第五章介绍了研究方法，采用在MEF的定性探索性案例研究方法。我们利用访谈、观察、研究日记和调查进行数据收集。主题分析有助于解释数据，导致主题的识别，包括：ChatGPT的输入质量和输出有效性、ChatGPT的局限性和挑战、与ChatGPT的人性化互动；ChatGPT作为个人助手/导师的角色；ChatGPT对用户学习的影响和通用机器人对教育背景的局限性。第六章对这些主题进行了解释，将它们与研究问题、数据、文献综述和理论框架联系起来。随后，本书转向讨论从研究结果和解释中得出的实际影响。在第七章中，我们深入探讨了伦理影响，包括批评AI检测工具、审查当前的AI引用系统、在AI时代重新思考剽窃的必要性、培养AI伦理熟练度的需要以及加强大学伦理委员会作用的重要性。第八章深入探讨了产品影响，强调所有学生公平访问AI机器人的必要性、促进行业合作以了解AI发展的必要性、我们应如何处理专门机器人的决策以及将提示工程课程整合到课程中的重要性。第九章探讨了教育影响，讨论了AI对基础学习的影响、我们如何通过翻转学习来应对AI挑战、我们如何设计AI弹性评估和教学策略，以及培养学生和教师AI素养的重要性。在第十章中，我们强调了我们的研究对知识和研究的贡献。从对研究结构的概述开始，本章深入探讨了关键见解和发现，回顾了基本主题。我们讨论了理论框架，通过在教育研究中融合哲学和技术来推进AI话语。我们探讨了高等教育机构的具体实际影响。此外，我们主张大学有义务积极参与全球AI对话。在解决研究局限性的同时，我们概述了如何在未来的研究中克服它们。我们还提出了对其他相关研究领域的建议，以进一步探索高等教育中的AI。本章最后强调了我们作为AI叙事作者的角色的作用，我们有力量根据我们的共同价值观和愿望来塑造AI技术。
- en: In conclusion, this book provides a comprehensive exploration of the implications
    of ChatGPT within both our institution and higher education at large. Our in-depth
    case study yields profound insights into the transformative power of AI tools
    like ChatGPT. By sharing these insights and their broader implications, our goal
    is to foster meaningful discussions, critical engagement and purposeful initiatives
    in the field. Our endeavour offers valuable guidance to other institutions, allows
    us to reflect on our experiences and envisions a future where education thrives
    in an AI-enhanced environment. We extend a warm invitation to educators, university
    leaders and institutions to join us in responsibly harnessing AI's potential,
    thereby shaping a more promising horizon for education.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这本书全面探讨了ChatGPT在我们机构以及整个高等教育领域的影响。我们深入的研究案例为我们揭示了AI工具如ChatGPT的变革力量。通过分享这些见解及其更广泛的影响，我们的目标是促进有意义的讨论、批判性的参与和有目的的倡议。我们的努力为其他机构提供了宝贵的指导，使我们能够反思我们的经验，并展望一个教育在AI增强环境中繁荣的未来。我们向教育工作者、大学领导者和机构发出诚挚的邀请，与我们一同负责任地利用AI的潜力，从而塑造一个更加光明的教育前景。
- en: Chapter 2
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二章
- en: Navigating the Landscape of AI Chatbots
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索人工智能聊天机器人的领域
- en: Emergence and Growth of Chatbots
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天机器人的出现和增长
- en: Artificial intelligence (AI) has transformed human existence by processing vast
    data and performing tasks resembling human capabilities (Anyoha, 2017). Early
    AI faced challenges, but the breakthrough Logic Theorist showcased its potential
    (Anyoha, 2017). Thriving in the 1990s and 2000s, AI achieved landmark goals despite
    funding hurdles (Anyoha, 2017). The development of conversational AI systems progressed
    significantly, with milestones like ELIZA, ALICE and SmarterChild (Adamopoulou
    & Moussiades, 2020; Shum et al., 2018). In November 2022, OpenAI unleashed Chat
    Generative Pre-trained Transformer (ChatGPT), a powerful natural language processing
    (NLP) model with 175 billion parameters, rapidly gaining one million users. GPT-3.5,
    developed in 2020, marked a significant advancement in language models, capable
    of learning from any text and performing various tasks (Rudolph et al., 2023).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）通过处理大量数据和执行类似人类能力的工作（Anyoha，2017年）改变了人类的存在。早期的AI面临挑战，但逻辑理论家（Anyoha，2017年）的突破展示了其潜力。在1990年代和2000年代蓬勃发展，AI尽管面临资金障碍，但仍实现了里程碑式的目标（Anyoha，2017年）。对话式AI系统的发展取得了显著进展，例如ELIZA、ALICE和SmarterChild（Adamopoulou
    & Moussiades，2020；Shum等人，2018年）。2022年11月，OpenAI发布了Chat Generative Pre-trained
    Transformer（ChatGPT），这是一个拥有1750亿参数的强大自然语言处理（NLP）模型，迅速获得了百万用户。2020年开发的GPT-3.5标志着语言模型的一个重要进步，能够从任何文本中学习并执行各种任务（Rudolph等人，2023年）。
- en: In 2022, OpenAI unveiled ChatGPT-3.5, followed by GPT-4 in 2023. Notably, companies
    like Microsoft seamlessly integrated ChatGPT into their products (Milmo, 2023a;
    Waugh, 2023). The rising popularity of ChatGPT has ignited discussions about the
    future of search engines, particularly concerning Google (Paleja, 2023b). In response,
    Google introduced its own chatbot technologies, including LaMDA and Apprentice
    Bard (Milmo, 2023a). Sundar Pichai, CEO of Alphabet, voiced strong confidence
    in Google's AI capabilities (Milmo, 2023a) and revealed plans to seamlessly integrate
    chatbots into their product offerings. Furthermore, other companies have also
    entered the AI chatbot arena. In April 2023, Elon Musk, CEO of Twitter (now renamed
    as X), playfully proposed the idea of ‘TruthGPT’ in response to ChatGPT's reluctance
    to address controversial topics. Musk highlighted the need for an AI system free
    from such constraints, leading to the inception of a cryptocurrency-based project
    to tackle this challenge (Sabarwal, 2023). Later, in July 2023, Meta introduced
    its advanced AI system, ‘Llama 2’. Mark Zuckerberg proudly announced its collaboration
    with Microsoft and the availability of this AI for research and commercial purposes
    (Sankaran, 2023). Thus, industry has now taken the lead in machine learning model
    development, surpassing academia. This is the current situation. However, what
    lies ahead?
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在2022年，OpenAI发布了ChatGPT-3.5，随后在2023年发布了GPT-4。值得注意的是，像微软这样的公司无缝地将ChatGPT集成到他们的产品中（Milmo,
    2023a; Waugh, 2023）。ChatGPT日益增长的受欢迎程度引发了关于搜索引擎未来的讨论，尤其是关于谷歌（Paleja, 2023b）。作为回应，谷歌推出了自己的聊天机器人技术，包括LaMDA和Apprentice
    Bard（Milmo, 2023a）。Alphabet的首席执行官Sundar Pichai表达了对谷歌AI能力的坚定信心（Milmo, 2023a），并透露了将聊天机器人无缝集成到他们产品中的计划。此外，其他公司也进入了AI聊天机器人领域。2023年4月，Twitter（现更名为X）的首席执行官埃隆·马斯克（Elon
    Musk）在回应ChatGPT不愿讨论有争议的话题时，俏皮地提出了“TruthGPT”的想法。马斯克强调了需要一个不受此类限制的AI系统，这导致了基于加密货币的项目来应对这一挑战的诞生（Sabarwal,
    2023）。后来，在2023年7月，Meta推出了其先进的AI系统“Llama 2”。马克·扎克伯格（Mark Zuckerberg）自豪地宣布了与微软的合作，以及该AI系统在研究和商业用途上的可用性（Sankaran,
    2023）。因此，行业现在在机器学习模型开发方面已经领先，超过了学术界。这就是目前的状况。然而，接下来会发生什么呢？
- en: OpenAI states that its long-term goal is to create ‘artificial general intelligence’
    (AGI) (Brockman & Sutskever, 2015). AGI refers to AI systems that possess the
    ability to understand, learn and apply knowledge in a way that's comparable to
    human intelligence. AGI would be capable of performing a wide range of tasks and
    adapting to new situations without being explicitly programmed for each specific
    task, making it a higher level of AI than the specialised, narrow AI systems currently
    available. Tech entrepreneur, Siqi Chen, claims that GPT-5 will achieve AGI by
    the end of 2023, generating excitement in the AI community (Tamim, 2023). Chen's
    claim, while not widely held at OpenAI, suggests that generative AI is making
    significant strides (Tamim, 2023). Sam Altman, the CEO of OpenAI, goes one step
    further, hinting at the potential for AI systems to far surpass even AGI (Sharma,
    2023). He believes that AI's current trajectory indicates remarkable potential
    for unprecedented levels of capability and impact in the near future (Sharma,
    2023). In summary, AI's transformative impact on human existence, coupled with
    the rapid advancement of chatbots like ChatGPT, highlights the potential for significant
    changes in various industries and the field of AI as a whole. However, this does
    come with caveats.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI表示，其长期目标是创造“通用人工智能”（AGI）（Brockman & Sutskever, 2015）。AGI指的是能够以与人类智能相当的方式理解、学习和应用知识的AI系统。AGI将能够执行广泛的任务，并适应新情况，而无需为每个特定任务进行明确编程，使其成为比目前可用的专用、窄AI系统更高层次的AI。科技企业家Siqi
    Chen声称，GPT-5将在2023年底实现AGI，这在AI社区中引起了兴奋（Tamim, 2023）。Chen的声明，尽管在OpenAI并未得到广泛认同，但表明生成式AI正在取得重大进展（Tamim,
    2023）。OpenAI的首席执行官Sam Altman更进一步，暗示AI系统有可能远远超越AGI（Sharma, 2023）。他相信，AI目前的轨迹表明，在不久的将来，它具有前所未有的能力和影响（Sharma,
    2023）。总之，AI对人类存在的变革性影响，加上像ChatGPT这样的聊天机器人的快速进步，突显了在各个行业以及AI整体领域可能发生重大变化的潜力。然而，这也伴随着一些警告。
- en: Challenges and Ethical Considerations in AI
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能中的挑战和伦理考量
- en: As AI chatbots like ChatGPT continue to evolve and become more prevalent in
    our daily lives, we are starting to understand more about their limitations. One
    of the biggest questions surrounding ChatGPT is how it works, and even the creators
    themselves do not fully understand it. They attempted to use AI to explain the
    model, but encountered challenges due to the ‘black box’ phenomenon present in
    large language models like GPT (Griffin, 2023). This lack of transparency raises
    concerns about biases and the dissemination of inaccurate information to users.
    Researchers are exploring ‘interpretability research’ to understand the inner
    workings of AI models (Griffin, 2023). One approach involves studying individual
    ‘neurons’ within the system, but the complexity of billions of parameters makes
    manual inspection impractical. To address this, OpenAI researchers employed GPT-4
    to automate the examination of system behaviour (Griffin, 2023). Despite limitations
    in providing human-like explanations, the researchers remain optimistic about
    AI technology's potential for self-explanation with continued research (Griffin,
    2023). However, further work is needed to overcome the challenges in this field,
    including describing the system's functioning using everyday language and considering
    the overall impact of individual neuron functionality (Griffin, 2023).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 随着像ChatGPT这样的AI聊天机器人不断进化并在我们的日常生活中变得越来越普遍，我们开始更多地了解它们的局限性。围绕ChatGPT最大的问题之一是它是如何工作的，甚至其创造者本身也不完全理解它。他们试图使用AI来解释该模型，但由于GPT（Griffin,
    2023）等大型语言模型中存在的“黑箱”现象，他们遇到了挑战。这种缺乏透明度引发了关于偏见和向用户传播不准确信息的担忧。研究人员正在探索“可解释性研究”以了解AI模型的内部运作（Griffin,
    2023）。一种方法涉及研究系统中的单个“神经元”，但由于数十亿参数的复杂性，手动检查变得不切实际。为了解决这个问题，OpenAI的研究人员使用了GPT-4来自动检查系统行为（Griffin,
    2023）。尽管在提供类似人类的解释方面存在局限性，但研究人员仍然对AI技术通过持续研究实现自我解释的潜力持乐观态度（Griffin, 2023）。然而，还需要进一步的工作来克服这一领域的挑战，包括用日常语言描述系统的运作，以及考虑单个神经元功能性的整体影响（Griffin,
    2023）。
- en: At the core of ChatGPT lies language processing, encompassing various aspects
    like grammar, vocabulary and cultural context. While it can perform numerous language-related
    tasks, its understanding is limited to learnt patterns from training data. Unlike
    humans, ChatGPT lacks actual consciousness or self-awareness, relying on heuristics,
    which are rules of thumb used to make efficient decisions in complex situations
    (Kahneman, 2011). In language processing, heuristics help parse sentences, recognise
    patterns and infer meanings based on context. ChatGPT uses deep learning algorithms
    trained on extensive text data to generate relevant and coherent responses (Sánchez-Adame
    et al., 2021). However, language's constant evolution and complexity still present
    limitations for AI chatbots.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的核心是语言处理，包括语法、词汇和文化背景等多个方面。虽然它可以执行许多与语言相关的任务，但其理解仅限于从训练数据中学习到的模式。与人类不同，ChatGPT缺乏真正的意识或自我意识，依赖于启发式方法，这些是用于在复杂情况下做出高效决策的经验法则（Kahneman,
    2011）。在语言处理中，启发式方法有助于解析句子、识别模式和根据上下文推断意义。ChatGPT使用在大量文本数据上训练的深度学习算法来生成相关且连贯的响应（Sánchez-Adame
    et al., 2021）。然而，语言的持续演变和复杂性仍然为AI聊天机器人带来了限制。
- en: 'ChatGPT also has some limitations that lead to gaps in its knowledge base and
    issues with generating accurate responses (Johnson, 2022; Rudolph et al., 2023).
    It can frequently repeat phrases, reject questions or provide answers to slightly
    modified versions of questions (Johnson, 2022). Additionally, some chatbots, including
    ChatGPT, have been observed using language that is misogynistic, racist and spreading
    false information (Johnson, 2022). These issues stem from the challenge of aligning
    the model''s behaviour with human values and expectations (Ramponi, 2022). Large
    language models like ChatGPT are trained to optimise their objective function,
    which may not always align with human values when generating text (Ramponi, 2022).
    This misalignment can hinder the practical applications of chatbots in systems
    that require reliability and trust, impacting human experience (Ramponi, 2022).
    This is often seen in the following ways (Ramponi, 2022):'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT也存在一些局限性，导致其知识库存在空白以及生成准确响应的问题（Johnson, 2022; Rudolph et al., 2023）。它经常会重复短语，拒绝问题或对问题进行轻微修改后提供答案（Johnson,
    2022）。此外，一些聊天机器人，包括ChatGPT，被观察到使用具有性别歧视、种族主义和传播虚假信息的语言（Johnson, 2022）。这些问题源于将模型的行为与人类价值观和期望相一致性的挑战（Ramponi,
    2022）。像ChatGPT这样的大型语言模型被训练以优化其目标函数，这在生成文本时可能并不总是与人类价值观相一致（Ramponi, 2022）。这种不一致性可能会阻碍聊天机器人在需要可靠性和信任的系统中的实际应用，影响人类体验（Ramponi,
    2022）。这些问题通常以以下方式出现（Ramponi, 2022）：
- en: '*Lack of Helpfulness*'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*缺乏实用性*'
- en: Where a language model fails to accurately understand and execute the specific
    instructions provided by the user.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当语言模型未能准确理解并执行用户提供的具体指令时。
- en: '*Hallucinations*'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*幻觉*'
- en: When the model generates fictitious or incorrect information.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当模型生成虚构或错误的信息时。
- en: '*Lack of Interpretability*'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*缺乏可解释性*'
- en: When it is hard for humans to comprehend the process by which the model arrived
    at a particular decision or prediction.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当人类难以理解模型得出特定决策或预测的过程时。
- en: '*Generating Biased or Toxic Output*'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*生成具有偏见或毒性的输出*'
- en: When a model generates output that reproduces such biases or toxicity (due to
    being trained on biased or toxic data) even if it was not intentionally programmed
    to do so.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当模型生成的输出重现了这种偏见或毒性（由于在具有偏见或毒性数据的上训练）即使它并非有意为之。
- en: But why does this happen? Language models like transformers are trained using
    next-token-prediction and masked-language-modelling techniques to learn the statistical
    structure of language (Ramponi, 2022). However, these techniques may cause issues
    as the model cannot differentiate between significant and insignificant errors,
    leading to misalignment for more complex tasks (Ramponi, 2022). OpenAI plans to
    address these limitations through its release of a limited version of ChatGPT,
    (ChatGPT-3.5) and gradually increasing its capabilities using a combination of
    supervised learning and reinforcement learning, including reinforcement learning
    from human feedback, to fine-tune the model and reduce harmful outputs (Ramponi,
    2022). This involves three steps, although steps two and three can be iterated
    continuously.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么会出现这种情况？像transformers这样的语言模型使用下一标记预测和掩码语言建模技术来学习语言的统计结构（Ramponi, 2022）。然而，这些技术可能会引起问题，因为模型无法区分重要和微不足道的错误，导致在更复杂的任务中产生不一致性（Ramponi,
    2022）。OpenAI计划通过发布ChatGPT的有限版本（ChatGPT-3.5）并逐渐通过结合监督学习和强化学习（包括来自人类反馈的强化学习）来增加其能力，以微调模型并减少有害输出（Ramponi,
    2022）。这涉及三个步骤，尽管步骤二和三可以持续迭代。
- en: '*Stage One*'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第一阶段*'
- en: Fine-tuning a pre-trained language model on labelled data to create a supervised
    policy.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在标记数据上微调预训练的语言模型以创建一个监督策略。
- en: '*Stage Two*'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第二阶段*'
- en: Creating a comparison dataset by having labellers vote on the policy model's
    outputs and training a new reward model on these data.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过让标签员对策略模型的输出进行投票来创建一个比较数据集，并在这些数据上训练一个新的奖励模型。
- en: '*Stage Three*'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第三阶段*'
- en: Further fine-tuning and improving the supervised policy using the reward model
    through proximal policy optimisation.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过近端策略优化使用奖励模型进一步微调和改进监督策略。
- en: (Ramponi, 2022)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: (Ramponi, 2022)
- en: OpenAI employs a moderation application programming interface (API), an AI-based
    system, to detect violations of their content policy and ensure that harmful language,
    such as misogyny and false news, is avoided (Johnson, 2022). However, the system
    is not perfect and has flaws, as seen when a Twitter user bypassed it to share
    inappropriate content (Johnson, 2022). OpenAI acknowledges the challenges and
    limitations of their language models, including ChatGPT-4, which may produce harmful
    or inaccurate content despite its advanced capabilities (Waugh, 2023). While they
    are actively working to improve the system through supervised and reinforcement
    learning, as well as collaborating with external researchers, challenges related
    to interpretability and hallucinations remain unresolved (Waugh, 2023).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 使用一个基于人工智能的审核应用程序编程接口 (API)，来检测其内容政策违规行为，并确保避免有害语言，例如性别歧视和虚假新闻（Johnson,
    2022）。然而，该系统并不完美，存在缺陷，正如一位推特用户绕过它分享不适当内容的情况所示（Johnson, 2022）。OpenAI 承认其语言模型，包括
    ChatGPT-4，尽管其功能先进，但可能产生有害或不准确的内容的挑战和限制（Waugh, 2023）。尽管他们正在通过监督学习和强化学习以及与外部研究人员合作来积极改进系统，但与可解释性和幻觉相关的问题仍然未得到解决（Waugh,
    2023）。
- en: AI ethics is a rapidly evolving field, especially with the rise of generative
    AI systems (GAI), making fairness, bias and ethical considerations crucial (Maslej
    et al., 2023). The 2023 Artificial Intelligence Index Report highlights the presence
    of unfairness and bias in AI systems, leading to potential harms such as allocative
    and representation harm (Maslej et al., 2023). Emily Bender, a University of Washington
    computational linguist, warns that language models can carry biases due to their
    training data, leading to problematic outcomes (Grove, 2023). Instances of AI-related
    ethical issues are on the rise, as demonstrated by the Algorithmic and Automation
    Incidents and Controversies Repository (Maslej et al., 2023). For instance, the
    use of AI in US prisons raised concerns about discrimination, while the Gang Violence
    Matrix in London faced criticism for bias (Maslej et al., 2023). Midjourney's
    AI-generated images also raised ethical concerns (Maslej et al., 2023). Fair algorithms
    are essential to prevent such issues, but currently, AI incidents and controversies
    are on the rise, highlighting the need for continuous ethical vigilance (Maslej
    et al., 2023). To address issues of bias in AI, various applications are being
    utilised. The perspective API by Alphabet's Jigsaw assesses toxicity in language,
    with its use increasing by 106% due to growing AI deployment (Maslej et al., 2023).
    SuperGLUE's Winogender Task measures gender bias in AI systems related to occupations,
    evaluating the use of stereotypical pronouns (Maslej et al., 2023). Instruction-tuned
    models, fine-tuned on instructional datasets, have shown improved performance,
    but they may rely on stereotypes (Maslej et al., 2023). The BBQ and HELM benchmarks
    assess bias and fairness in question-answering systems, highlighting trade-offs
    between accuracy and bias metrics (Maslej et al., 2023). Additionally, machine
    translation models struggle with gendered pronouns, leading to mistranslations
    and potential dehumanisation (Maslej et al., 2023). Despite these challenges,
    these applications are valuable tools to mitigate bias and promote ethical AI
    practices.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能伦理是一个快速发展的领域，尤其是随着生成式人工智能系统（GAI）的兴起，使公平性、偏见和伦理考量变得至关重要（Maslej et al., 2023）。2023年人工智能指数报告突出了人工智能系统中存在的不公平性和偏见，可能导致潜在的损害，如配置和代表性损害（Maslej
    et al., 2023）。华盛顿大学计算语言学家 Emily Bender 警告说，由于训练数据，语言模型可能会携带偏见，导致问题性结果（Grove, 2023）。人工智能相关伦理问题的实例正在增加，如算法和自动化事件及争议存储库所示（Maslej
    et al., 2023）。例如，人工智能在美国监狱的使用引发了歧视的担忧，而伦敦的帮派暴力矩阵因偏见而受到批评（Maslej et al., 2023）。Midjourney
    的 AI 生成的图像也引发了伦理担忧（Maslej et al., 2023）。公平算法对于防止此类问题至关重要，但目前，人工智能事件和争议正在增加，突显了持续伦理警觉的必要性（Maslej
    et al., 2023）。为了解决人工智能中的偏见问题，正在使用各种应用。Alphabet 的 Jigsaw 的视角 API 评估语言的毒性，其使用因人工智能部署的增长而增加了106%（Maslej
    et al., 2023）。SuperGLUE 的 Winogender 任务衡量与职业相关的 AI 系统中的性别偏见，评估典型代词的使用（Maslej et
    al., 2023）。在指导数据集上微调的指令调整模型已显示出改进的性能，但它们可能依赖于刻板印象（Maslej et al., 2023）。BBQ 和 HELM
    基准测试评估问答系统中的偏见和公平性，突显了准确性和偏见指标之间的权衡（Maslej et al., 2023）。此外，机器翻译模型在性别化代词上存在困难，导致翻译错误和潜在的降格（Maslej
    et al., 2023）。尽管存在这些挑战，但这些应用是减轻偏见和促进道德人工智能实践的宝贵工具。
- en: Conversational AI raises ethical concerns as well. Researchers from Luleå University
    found that 37% of analysed chatbots were female gendered, and 62.5% of popular
    commercial chatbots defaulted to female, potentially reinforcing biases (Maslej
    et al., 2023). Moreover, dialogue systems may be overly anthropomorphised, making
    users uncomfortable, and many examples in dialogue datasets were rated impossible
    or uncomfortable for machines to output (Maslej et al., 2023). Clear policy interventions
    and awareness of limitations are crucial to address these issues and foster better
    communication with users. Text-to-image models face biases too. Meta researchers
    found Instagram-trained models to be less biased than previous ImageNet-trained
    models (Maslej et al., 2023). And the socially, environmentally and ethically
    responsible (SEER) model showed fairer representations of people (Maslej et al.,
    2023). However, using public data without user awareness for AI training may be
    unethical. A study comparing pre-trained vision-language models revealed gender
    bias in larger models, with contrastive language-image pre-training (CLIP) having
    more bias but higher relevance (Maslej et al., 2023). Stable Diffusion and DALL-E
    2 exhibited biases, as did Midjourney, generating images reinforcing stereotypes
    (Maslej et al., 2023). For example, ‘CEO’ prompted images of men in suits (Maslej
    et al., 2023).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能也引发了伦理问题。吕勒奥大学的学者发现，在分析的聊天机器人中，有37%被设定为女性性别，而62.5%的流行商业聊天机器人默认为女性，这可能会加剧偏见（Maslej
    等人，2023年）。此外，对话系统可能过度拟人化，使用户感到不适，对话数据集中许多例子被评为机器输出不可能或不舒服（Maslej 等人，2023年）。明确的政策干预和对局限性的认识对于解决这些问题并促进与用户的更好沟通至关重要。文本到图像模型也存在偏见。Meta
    研究人员发现，与之前在 ImageNet 上训练的模型相比，Instagram 训练的模型偏见较小（Maslej 等人，2023年）。而社会责任、环境责任和伦理责任（SEER）模型展示了更公平的人的表征（Maslej
    等人，2023年）。然而，在未经用户意识的情况下使用公共数据进行人工智能训练可能是不道德的。一项比较预训练视觉语言模型的研究揭示了较大模型中的性别偏见，其中对比语言-图像预训练（CLIP）具有更多偏见但相关性更高（Maslej
    等人，2023年）。Stable Diffusion 和 DALL-E 2 展现了偏见，Midjourney 也是如此，它们生成的图像强化了刻板印象（Maslej
    等人，2023年）。例如，输入“CEO”会提示男性穿西装的图像（Maslej 等人，2023年）。
- en: AI ethics research is experiencing significant growth and attention in conferences
    and publications. Fairness, Accountability, and Transparency (FAccT), an interdisciplinary
    conference, is a prominent platform for research on algorithmic fairness and transparency,
    witnessing a tenfold increase in submissions since 2018 (Maslej et al., 2023).
    The interest in AI ethics is shared by industry and government-affiliated actors,
    indicating its relevance for policymakers, practitioners and researchers (Maslej
    et al., 2023). European contributions to the field are also on the rise, although
    the majority of authors are still from North America and Western countries (Maslej
    et al., 2023). In recent years, workshops on fairness and bias in AI have emerged,
    with NeurIPS hosting its first workshop on fairness, accountability and transparency
    in 2014 (Maslej et al., 2023). Certain topics, like ‘AI for Science’ and ‘AI for
    Climate’, have gained popularity and transitioned from workshops to the main track,
    reflecting the surge in AI applications in healthcare and climate research (Maslej
    et al., 2023). NeurIPS has seen a rise in papers focused on interpretability and
    explainability, particularly in the main track (Maslej et al., 2023). Additionally,
    statistical methods such as causal inference are being used to address fairness
    and bias concerns, leading to a significant increase in papers submitted on causal
    inference and counterfactual analysis at NeurIPS (Maslej et al., 2023). Privacy
    in machine learning has also become a mainstream concern, with NeurIPS hosting
    workshops and privacy discussions moving into the main track (Maslej et al., 2023).
    The conference now requires authors to submit broader impact statements addressing
    ethical and societal consequences, indicating a growing emphasis on ethical considerations
    (Maslej et al., 2023). The surge in the number of papers on fairness and bias,
    as well as the increase in workshop acceptances, reflects the growing interest
    and importance of this topic for researchers and practitioners (Maslej et al.,
    2023).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: AI伦理研究在会议和出版物中经历了显著的增长和关注。公平、问责和透明度（FAccT）是一个跨学科会议，是研究算法公平和透明度的一个突出平台，自2018年以来提交的论文数量增加了十倍（Maslej
    等人，2023年）。行业和政府相关行动者对AI伦理的兴趣表明，它对政策制定者、实践者和研究人员的相关性（Maslej 等人，2023年）。欧洲对该领域的贡献也在增加，尽管大多数作者仍然来自北美和西方国家（Maslej
    等人，2023年）。近年来，关于AI中的公平性和偏见的工作坊出现了，NeurIPS在2014年举办了其第一个关于公平、问责和透明度的工作坊（Maslej 等人，2023年）。某些主题，如“AI用于科学”和“AI用于气候”，已经变得流行，并从工作坊转向主轨道，反映了AI在医疗保健和气候研究中的应用激增（Maslej
    等人，2023年）。NeurIPS上关于可解释性和可解释性的论文数量也在增加，尤其是在主轨道上（Maslej 等人，2023年）。此外，统计方法如因果推理被用来解决公平性和偏见问题，导致NeurIPS上关于因果推理和反事实分析的论文提交数量显著增加（Maslej
    等人，2023年）。机器学习中的隐私问题也已成为一个主流关注点，NeurIPS举办了工作坊和隐私讨论，这些讨论已进入主轨道（Maslej 等人，2023年）。现在，会议要求作者提交更广泛的冲击声明，以解决伦理和社会后果，这表明对伦理考量的重视正在增加（Maslej
    等人，2023年）。关于公平性和偏见的论文数量激增以及工作坊接受率的增加，反映了研究人员和实践者对这个话题的兴趣和重要性日益增加（Maslej 等人，2023年）。
- en: AI algorithms also face challenges in factuality and truthfulness. This had
    led to the development of AI for fact-checking and combating misinformation using
    fact-checking datasets (Maslej et al., 2023). However, research on natural language
    fact-checking seems to have shifted, with a plateau in citations of widely-used
    fact-checking benchmarks like FEVER, LIAR and Truth of Varying Shades (Maslej
    et al., 2023). Automated fact-checking systems have limitations, as they assume
    availability of contradicting evidence for new false claims and some datasets
    lack sufficient evidence or use impractical fact-checking articles as evidence
    (Maslej et al., 2023). To address these challenges, the development of the TruthfulQA
    benchmark evaluates the truthfulness of language models on question answering,
    testing misconceptions across various categories (Maslej et al., 2023).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: AI算法在事实性和真实性方面也面临着挑战。这导致了使用事实核查数据集（Maslej 等人，2023年）开发AI进行事实核查和对抗虚假信息的出现。然而，自然语言事实核查的研究似乎已经发生了转变，广泛使用的如FEVER、LIAR和《色彩各异的真相》等事实核查基准的引用量似乎已经达到顶峰（Maslej
    等人，2023年）。自动事实核查系统存在局限性，因为它们假设对于新的虚假主张有可用的矛盾证据，而某些数据集缺乏足够的证据或使用不切实际的核查文章作为证据（Maslej
    等人，2023年）。为了解决这些挑战，开发TruthfulQA基准评估语言模型在问答中的真实性，测试各种类别中的错误观念（Maslej 等人，2023年）。
- en: AI interfaces like chatbots have practical benefits but raise privacy concerns
    due to their potential for intrusive data collection (O'Flaherty, 2023). Unlike
    search engines, chatbots' conversational nature can catch users off guard, leading
    them to reveal more personal information (O'Flaherty, 2023). Chatbots can collect
    various data types, including text, voice, device, location and social media activity,
    potentially enabling targeted advertising (O'Flaherty, 2023). Microsoft's consideration
    of adding advertisements to Bing Chat and Google's privacy policy permitting targeted
    advertising using user data raise further concerns (O'Flaherty, 2023). However,
    ChatGPT's privacy policy is believed to prioritise personal data protection and
    prohibit commercial exploitation (Moscona, as cited in O'Flaherty, 2023).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能界面，如聊天机器人，具有实际效益，但由于其潜在的侵入性数据收集能力（O'Flaherty, 2023），也引发了隐私担忧。与搜索引擎不同，聊天机器人的对话性质可能会让用户措手不及，导致他们透露更多个人信息（O'Flaherty,
    2023）。聊天机器人可以收集各种类型的数据，包括文本、语音、设备、位置和社交媒体活动，这可能会使定向广告成为可能（O'Flaherty, 2023）。微软考虑将广告添加到Bing
    Chat，以及谷歌隐私政策允许使用用户数据进行定向广告，进一步引发了担忧（O'Flaherty, 2023）。然而，ChatGPT的隐私政策被认为优先考虑个人数据保护，并禁止商业利用（Moscona，据O'Flaherty，2023年引用）。
- en: In response to data privacy, cybersecurity concerns, some countries and companies
    initially imposed bans on the usage of generative AI technology like ChatGPT.
    For instance, Italy passed a decree banning the use of such technology for processing
    personal data, citing potential threats to data privacy (Paleja, 2023c). However,
    the ban was later lifted after OpenAI addressed regulatory requirements (Robertson,
    2023). Others issued warnings to staff. Companies like JP Morgan and Amazon restricted
    employee use of ChatGPT (O'Flaherty, 2023). Data consultancy firm Covelent advises
    caution, recommending adherence to security policies and refraining from sharing
    sensitive information (O'Flaherty, 2023). Even chatbot companies like ChatGPT
    and Microsoft warn against sharing sensitive data in conversations (O'Flaherty,
    2023). These actions highlight the serious data privacy threats associated with
    AI chatbots.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 针对数据隐私和网络安全问题，一些国家和公司最初对像ChatGPT这样的生成式AI技术的使用实施了禁令。例如，意大利颁布了一项法令，禁止使用此类技术处理个人数据，理由是可能威胁到数据隐私（Paleja,
    2023c）。然而，在OpenAI解决了监管要求后，禁令后来被取消（Robertson, 2023）。其他人则发布了警告。像摩根大通和亚马逊这样的公司限制了员工使用ChatGPT（O'Flaherty,
    2023）。数据咨询公司Covelent建议谨慎行事，建议遵守安全政策并避免分享敏感信息（O'Flaherty, 2023）。即使是聊天机器人公司ChatGPT和微软也警告在对话中不要分享敏感数据（O'Flaherty,
    2023）。这些行动突显了与AI聊天机器人相关的严重数据隐私威胁。
- en: There are also concerns that AI interfaces, like ChatGPT, have the potential
    to facilitate fraud, spread misinformation and enable cybersecurity attacks, posing
    existential risks (O'Flaherty, 2023). Experts warn that advanced phishing emails
    could be created using chatbots due to their ability to generate content in multiple
    languages with impeccable language skills (O'Flaherty, 2023). Moreover, chatbots
    might spread misinformation, assist in creating realistic deepfake videos and
    contribute to the dissemination of harmful propaganda on social media platforms
    (Tamim, 2023). These risks are already evident, with chatbots being used for malicious
    purposes, such as generating fake news (Moran, 2023). Additionally, AI presents
    security risks, aiding cybercriminals in conducting more convincing and efficient
    cyberattacks (O'Flaherty, 2023).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，人们还担心，像ChatGPT这样的AI界面有可能促进欺诈、传播虚假信息和使网络安全攻击成为可能，从而带来生存风险（O'Flaherty, 2023）。专家警告，由于聊天机器人能够用多种语言生成内容且语言技能无懈可击，因此可能会创建高级钓鱼邮件（O'Flaherty,
    2023）。此外，聊天机器人可能会传播虚假信息，帮助制作逼真的深度伪造视频，并在社交媒体平台上传播有害宣传（Tamim, 2023）。这些风险已经显现，聊天机器人被用于恶意目的，例如生成虚假新闻（Moran,
    2023）。此外，AI还带来了安全风险，帮助网络犯罪分子进行更具说服力和效率的网络安全攻击（O'Flaherty, 2023）。
- en: There are also ethical concerns that surround the potential exploitation of
    African workers in content moderation for AI engines like ChatGPT (Schamus, 2023).
    Earning less than $2 a day, these workers handle distressing online content to
    train AI engines, raising questions about the sustainability and fairness of their
    efforts (Schamus, 2023). The utilisation of African labour for data mining and
    cleansing by a US organisation underscores the ethical predicament of relying
    on underpaid individuals from less economically advantaged regions to benefit
    those in more affluent areas. Consequently, addressing these ethical concerns
    is crucial for the responsible development of AI tools.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，围绕AI引擎如ChatGPT在内容审核中对非洲工人的潜在剥削也存在道德担忧（Schamus, 2023）。这些工人每天的收入不到2美元，他们处理令人痛苦的在线内容以训练AI引擎，引发了关于他们努力可持续性和公平性的问题（Schamus,
    2023）。美国组织利用非洲劳动力进行数据挖掘和清洗，凸显了依靠来自经济较不发达地区的低收入个体来造福更富裕地区的道德困境。因此，解决这些道德问题是AI工具负责任发展的关键。
- en: Meredith Whitaker, an AI researcher and ethicist, highlights that generative
    AI heavily relies on vast amounts of surveillance data scraped from the web (Bhuiyan,
    2023). However, the specific sources of these data, obtained from writers, journalists,
    artists and musicians, remain undisclosed by proprietary companies like OpenAI
    (Bhuiyan, 2023). This raises concerns about potential copyright violations and
    lack of fair compensation for content creators. When asked about compensation
    for creators, OpenAI's CEO, Sam Altman, mentioned ongoing discussions but did
    not provide a definitive answer (Bhuiyan, 2023). The impact on local news publications,
    whose content is used for training AI models, is also a concern, and Altman expressed
    hope for supporting journalists while considering possible actions (Bhuiyan, 2023).
    Nonetheless, the necessity for external regulation to address these issues is
    evident (Bhuiyan, 2023).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能研究员和伦理学家Meredith Whitaker强调，生成式AI严重依赖于从网络中抓取的大量监控数据（Bhuiyan, 2023）。然而，这些数据的特定来源，包括从作家、记者、艺术家和音乐家那里获得，却未由像OpenAI这样的专有公司公开（Bhuiyan,
    2023）。这引发了关于潜在版权侵犯和对内容创作者缺乏公平补偿的担忧。当被问及对创作者的补偿时，OpenAI的首席执行官Sam Altman提到了正在进行的讨论，但没有给出明确的答复（Bhuiyan,
    2023）。使用AI模型进行训练的本地新闻出版物的内容也引起了关注，Altman表示希望支持记者，同时考虑可能的行动（Bhuiyan, 2023）。尽管如此，外部监管解决这些问题的必要性是显而易见的（Bhuiyan,
    2023）。
- en: The environmental impact of AI technology, particularly large language models,
    is a growing concern. Data centres, hosting power-hungry servers for AI models
    like ChatGPT, significantly contribute to carbon emissions (McLean, 2023). The
    power source, whether coal or renewable energy, further affects emission levels
    (McLean, 2023). Moreover, the water footprint of AI models is substantial; for
    example, Microsoft's data centres used around 700,000 litres of freshwater during
    GPT-3's training, equivalent to the water needed for hundreds of vehicles (McLean,
    2023). Hence, it's vital to tackle these environmental concerns and imperative
    to discover sustainable solutions as these models continue their expansion (McLean,
    2023).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术对环境的影响，尤其是大型语言模型，正日益成为关注的焦点。为像ChatGPT这样的AI模型提供强大服务器的数据中心，对碳排放做出了重大贡献（McLean,
    2023）。电力来源，无论是煤炭还是可再生能源，都会进一步影响排放水平（McLean, 2023）。此外，AI模型的用水足迹也非常大；例如，在GPT-3的训练过程中，微软的数据中心使用了大约70万升淡水，相当于数百辆汽车所需的用水量（McLean,
    2023）。因此，解决这些环境问题至关重要，并且迫切需要发现可持续的解决方案，因为这些模型继续扩大其规模（McLean, 2023）。
- en: AI's Impact on the Job Market
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能对就业市场的影响
- en: 'AI is no longer just a futuristic concept that we see in movies; it''s now
    a reality in our everyday lives – from individuals to organisations, and from
    businesses to governments. Advancements in AI technology have led to its rapid
    deployment, but with great power comes great responsibility. Historian Yuval Noah
    Harari (2018) suggests that to comprehend the nature of these technological challenges,
    we should start by asking questions about the job market: What will the job market
    look like in 2050? Will AI impact all industries, and if so, how and when? Could
    billions of people become economically redundant within the next decade or two?
    Or will automation continue to create new jobs and greater prosperity for all
    in the long run? Will this mirror the positives that happened due to the industrial
    revolution or is this time different? Given the ongoing debate and lack of consensus
    among experts, this section aims to provide some answers to the aforementioned
    questions.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能不再是我们在电影中看到的未来概念；它现在是我们日常生活中的一部分——从个人到组织，从企业到政府。人工智能技术的进步导致了其快速部署，但权力越大，责任越大。历史学家尤瓦尔·赫拉利（2018年）建议，为了理解这些技术挑战的本质，我们应该从询问关于就业市场的问题开始：2050年的就业市场会是什么样子？人工智能会影响所有行业吗？如果是这样，会如何以及何时？在未来的十年或二十年内，数十亿人可能会变得经济上过剩吗？或者，自动化是否会继续创造新的工作并为所有人带来更大的繁荣？这会反映出工业革命带来的积极影响，还是这次情况不同？鉴于专家之间的持续辩论和缺乏共识，本节旨在对上述问题提供一些答案。
- en: We are now starting to hear a lot more mainstream conversation regarding the
    social and economic impact that AI and AI chatbots will have on society and industry.
    According to the 2023 Artificial Intelligence Index Report, bar agriculture, forestry,
    fishing and hunting, the demand for AI-related skills is rapidly increasing in
    nearly all sectors of the American economy. The report highlights that between
    2021 and 2022, the number of AI-related job postings increased on average from
    1.7% to 1.9% (Maslej et al., 2023). According to Business Insider, AI technology
    like ChatGPT could drastically change jobs in various industries, such as finance,
    customer service, media, software engineering, law and teaching, including potential
    gains and losses (Mok & Zinkula, 2023). This may happen in the following ways.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在开始听到越来越多的主流对话，讨论人工智能和人工智能聊天机器人将对社会和产业产生的社会经济影响。根据2023年人工智能指数报告，除了农业、林业、渔业和狩猎外，人工智能相关技能的需求在美国经济几乎所有部门都在迅速增长。报告强调，在2021年和2022年之间，人工智能相关职位发布数量平均从1.7%增加到1.9%（Maslej等人，2023年）。据Business
    Insider报道，像ChatGPT这样的AI技术可能会彻底改变金融、客户服务、媒体、软件工程、法律和教学等各个行业的就业，包括潜在的收益和损失（Mok和Zinkula，2023年）。这可能会以下列方式发生。
- en: In finance, it is thought likely that very soon AI-powered bots will handle
    complicated financial questions, allowing advisors and CFOs to make real-time
    decisions by tapping into AI's knowledge. They will also be able to perform information
    analysis, pattern detection and forecasting. Moreover, ChatGPT will save time
    for marketers in finance by analysing data and providing insights into customer
    behaviour as well as organising information and generating marketing materials
    (*How Will ChatGPT & AI Impact The Financial Industry?*, 2023). In addition, ChatGPT
    has the potential to disrupt jobs across various industries on Wall Street, including
    trading and investment banking. This is because ChatGPT can automate some of the
    tasks that knowledge workers perform today. One advantage of this is that it will
    enable them to concentrate on higher-value tasks. However, it also means that
    AI could do certain jobs that recent college graduates are currently doing at
    investment banks (Mok & Zinkula, 2023). This may lead to the elimination of low-level
    or entry jobs.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融领域，人们认为，不久的将来，AI驱动的机器人将处理复杂的金融问题，使顾问和首席财务官能够通过利用AI的知识做出实时决策。他们还将能够执行信息分析、模式检测和预测。此外，ChatGPT将通过分析数据和提供关于客户行为的见解，以及组织信息和生成营销材料，为金融领域的营销人员节省时间（“ChatGPT和AI将如何影响金融行业？”2023年）。此外，ChatGPT有可能颠覆华尔街各个行业的就业，包括交易和投资银行。这是因为ChatGPT可以自动化知识工作者今天执行的一些任务。一个优势是，这将使他们能够专注于更高价值的工作。然而，这也意味着AI可能会做某些工作，这些工作目前是由在投资银行工作的大学毕业生做的（Mok和Zinkula，2023年）。这可能会导致低级或入门级工作的消失。
- en: When it comes to customer service and engagement, according to Forbes, conversational
    AI, such as ChatGPT, has the potential to revolutionise customer service by providing
    human-like conversations that address each user's concerns. Unlike traditional
    chatbots, which follow predetermined paths and lack flexibility, conversational
    AI can automate the upfront work needed for customer service agents to focus on
    high-value customers and complex cases requiring human interaction (Fowler, 2023).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到客户服务和参与度时，根据福布斯的说法，对话式AI，如ChatGPT，有可能通过提供类似人类的对话来应对每个用户的关注点，从而彻底改变客户服务。与遵循预定路径且缺乏灵活性的传统聊天机器人不同，对话式AI可以自动化客户服务代表所需的前期工作，使他们能够专注于高价值客户和需要人类互动的复杂案例（Fowler,
    2023）。
- en: And what about the creative arts? Forbes predicts that ChatGPT is expected to
    have a significant impact on jobs in advertising, content creation, copywriting,
    copy editing and journalism (Fowler, 2023). Furthermore, due to the AI's ability
    to analyse and understand text, it is likely that ChatGPT will transform jobs
    related to media, including enabling tasks such as article writing, editing and
    fact-checking, script-writing for content creators and copywriting for social
    media posts and advertisements (Fowler, 2023). In fact, we are already seeing
    chatbots drafting screenplays (Stern, 2023), writing speeches (Karp, 2023), writing
    novels (Bensinger, 2023) and being used by public relations companies to ‘research,
    develop, identify customer values or changing trends, and strategize optimal campaigns
    for… clients in a matter of seconds’ (Martinez, 2023). There is already a visible
    response from affected employees in response to these developments. In Los Angeles
    in early May 2023, a strike was initiated involving thousands of film and television
    writers, later joined by actors and other members of the film community, with
    the aim not only to address financial matters but also to establish rules preventing
    studios from using AI to generate scripts, excluding human involvement in the
    creative process (Hinsliff, 2023). This shift is also being seen in Buzzfeed,
    which is one of many publishers that have started to use AI-generated content
    to create articles and social media posts, with the aim of increasing efficiency
    and output (Tarantola, 2023). However, the quality of the content generated by
    AI is still a concern for many (Tarantola, 2023). Another area which is being
    affected is fashion, where AI is being used for everything from analysing data
    to create designs for upcoming collections to generating a variety of styles from
    sketches and details from creative directors (Harreis, 2023).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，关于创意艺术领域呢？福布斯预测，ChatGPT预计将对广告、内容创作、文案写作、文案编辑和新闻业的工作产生重大影响（Fowler, 2023）。此外，由于AI分析和理解文本的能力，ChatGPT很可能会改变与媒体相关的各种工作，包括使文章写作、编辑和事实核查、为内容创作者编写剧本以及为社交媒体帖子撰写广告文案等任务成为可能（Fowler,
    2023）。实际上，我们已经开始看到聊天机器人起草剧本（Stern, 2023），撰写演讲稿（Karp, 2023），撰写小说（Bensinger, 2023），并被公关公司用来“在几秒钟内研究、开发、识别客户价值或变化趋势，并为……客户制定最佳营销策略”（Martinez,
    2023）。受影响的员工对这些发展已经有了明显的反应。2023年5月初在洛杉矶，数千名电影和电视编剧发起了罢工，后来演员和其他电影界人士也加入了进来，目的不仅是为了解决财务问题，还旨在制定规则，防止制片厂使用AI生成剧本，排除人类在创作过程中的参与（Hinsliff,
    2023）。这种转变也在Buzzfeed上得到了体现，Buzzfeed是许多开始使用AI生成内容来创建文章和社交媒体帖子的出版商之一，目的是提高效率和产出（Tarantola,
    2023）。然而，许多人对AI生成内容的品质仍然表示担忧（Tarantola, 2023）。另一个受到影响领域是时尚业，AI在这里被用于从分析数据以设计即将推出的系列到从创意总监的草图和细节中生成各种风格（Harreis,
    2023）。
- en: When it comes to engineering, while ChatGPT may be able to aid engineers in
    their work by generating answers for engineering calculations and providing information
    on general engineering knowledge, it will not be able to replace the knowledge,
    expertise and innovation that engineers bring to the design and product development
    process (Brown-Siebenaler, 2023). However, regarding software engineering, there
    may be many changes. Software engineering involves a lot of manual work and attention
    to detail. However, ChatGPT can generate code much faster than humans which will
    lead to improved efficiency, bug identification and increased code generation
    speed, while also cutting resource costs (Mok & Zinkula, 2023).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到工程时，虽然ChatGPT可能能够通过生成工程计算答案和提供一般工程知识信息来帮助工程师工作，但它无法取代工程师在设计和生产开发过程中带来的知识、专业和创新（Brown-Siebenaler，2023）。然而，在软件工程方面，可能会有很多变化。软件工程涉及大量手动工作和对细节的关注。然而，ChatGPT可以比人类更快地生成代码，这将提高效率、识别错误和增加代码生成速度，同时降低资源成本（Mok
    & Zinkula，2023）。
- en: With regard to healthcare, Harari (2018) gives the following example by comparing
    what doctors do to what nurses do. Doctors mainly process medical information,
    whereas nurses require not only cognitive but also motor and emotional skills
    to carry out their duties. Harari believes this makes it more likely that we will
    have an AI family doctor on our smartphones before we have a reliable nurse robot.
    Therefore, he expects the human care industry to remain a field dominated by humans
    for a long time and, due to an ageing population, this is likely to be a growing
    industry. And there is now evidence coming out to support Harari's claims. A recent
    study conducted by the University of California San Diego looking at a comparison
    between written responses from doctors and ChatGPT to real-world health queries,
    the panel of healthcare professionals preferred ChatGPT's responses 79% of the
    time (Tilley, 2023). They also found ChatGPT's answers to be of higher quality
    in terms of information provided and perceived empathy, without knowing which
    responses came from the AI system (Tilley, 2023). Furthermore, ChatGPT has even
    demonstrated the ability to pass the rigorous medical licencing exam in the United
    States, scoring between 52.4 and 75% (Tilley, 2023).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 关于医疗保健，哈拉里（2018）通过比较医生和护士的工作来给出以下例子。医生主要处理医疗信息，而护士在履行职责时不仅需要认知技能，还需要运动和情感技能。哈拉里认为这使我们更有可能在智能手机上拥有一个可靠的护士机器人之前，先拥有一个AI家庭医生。因此，他预计人类护理行业将长期由人类主导，并且由于人口老龄化，这很可能是增长行业。现在有证据出现来支持哈拉里的观点。加州大学圣地亚哥分校最近进行的一项研究，比较了医生和ChatGPT对现实世界健康查询的书面回应，医疗保健专业人士中有79%的时间更喜欢ChatGPT的回应（Tilley，2023）。他们还发现，ChatGPT的回答在提供信息和感知同理心方面质量更高，而不知道哪些回应来自AI系统（Tilley，2023）。此外，ChatGPT甚至展示了通过美国严格的医学执照考试的能力，得分在52.4%到75%之间（Tilley，2023）。
- en: According to a recent Goldman Sachs report, generative AI may also have a profound
    impact on legal workers, since language-oriented jobs, such as paralegals and
    legal assistants, are susceptible to automation. These jobs are responsible for
    consuming large amounts of information, synthesising what they learnt, and making
    it digestible through a legal brief or opinion. Once again, these tend to be low-level
    or entry jobs. However, AI will not completely automate these jobs since it requires
    human judgement to understand what a client or employer wants (Mok & Zinkula,
    2023). We are already starting to see examples of AI being used in the legal field.
    DoNotPay, founded in 2015 is a bot that helps individuals fight against large
    organisations for acts such as applying wrong fees, robocalling and parking tickets
    (Paleja, 2023a). In February 2023, DoNotPay was used to help a defendant contest
    a speeding ticket in a US court, with the programme running on a smartphone and
    providing appropriate responses to the defendant through an earpiece (Paleja,
    2023a). In addition, AI judges are already being used in Estonia to settle small
    contract disputes, allowing human judges more time for complex cases (Hunt, 2022).
    Furthermore, a joint research project in Australia is currently examining the
    benefits and challenges of AI in courts (Hunt, 2022). Overall, we are seeing AI
    becoming more popular in courts worldwide. And this is certainly the case in China.
    In March 2021, China's National People's Congress approved the 14th Five-Year
    Plan which aimed to continue the country's judicial reform, including the implementation
    of ‘smart courts’ to digitalise the judicial system (Cousineau, 2021). ChatGPT
    is also demonstrating its ability to excel in legal exams. The latest iteration
    of the AI programme, GPT-4, recently surpassed the threshold set by Arizona on
    the uniform bar examination (Cassens Weiss, 2023). With a combined score of 297,
    it achieved a significant margin of success which, notably, places ChatGPT's performance
    close to the 90th percentile of test takers (Cassens Weiss, 2023).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 根据最近高盛的报告，生成式AI也可能对法律工作者产生深远的影响，因为以语言为导向的工作，如律师助理和法律顾问，容易受到自动化的影响。这些工作负责消耗大量信息，综合所学内容，并通过法律简报或意见使其易于消化。这些工作往往属于低级或入门级别。然而，AI不会完全自动化这些工作，因为这需要人类的判断来理解客户或雇主的需求（Mok
    & Zinkula，2023）。我们已经开始看到AI在法律领域的应用实例。成立于2015年的DoNotPay是一个帮助个人对抗大型组织的机器人，用于处理如错误收费、自动电话和停车罚单等问题（Paleja，2023a）。2023年2月，DoNotPay被用于帮助一名被告在美国法庭上对超速罚单提出异议，程序在智能手机上运行，并通过耳机向被告提供适当的回应（Paleja，2023a）。此外，爱沙尼亚已经开始使用AI法官来解决小额合同纠纷，这使人类法官有更多时间处理复杂案件（Hunt，2022）。此外，澳大利亚的一个联合研究项目目前正在研究法院中AI的益处和挑战（Hunt，2022）。总的来说，我们看到AI在全球法院中越来越受欢迎。这当然也包括中国。2021年3月，中国全国人民代表大会批准了第十四个五年计划，旨在继续推进国家的司法改革，包括实施“智能法院”以数字化司法系统（Cousineau，2021）。ChatGPT也展示了其在法律考试中的卓越能力。AI程序的最新版本GPT-4最近超过了亚利桑那州在统一律师资格考试中设定的标准（Cassens
    Weiss，2023）。总分297分，取得了显著的胜利，值得注意的是，ChatGPT的表现接近测试者的第90百分位数（Cassens Weiss，2023）。
- en: Just like other industries, the emergence of ChatGPT has compelled education
    companies to reassess and re-examine their business models. According to Times
    Higher Education writers, Tom Williams and Jack Grove, the CEO of education technology
    firm Chegg, Dan Rosensweig, attributes a decline in new sign ups for their textbook
    and coursework assistance services to ChatGPT, believing that as midterms and
    finals approached, many potential customers opted to seek AI-based help instead
    (2023). Williams and Grove believe this shift in consumer behaviour serves as
    a ‘harbinger’ of how the rise of generative AI will disrupt education enterprises
    and is prompting companies to hastily adapt and future-proof their offerings (2023).
    They give the example of Turnitin, which has expedited the introduction of an
    AI detector, and Duolingo, which has incorporated GPT-4 to assist language learners
    in evaluating their language skills (2023). Williams and Grove also note that,
    simultaneously, a wave of newly established start-ups has emerged, offering a
    wide range of services, including personalised tutoring chatbots and proprietary
    AI detectors, each with varying levels of accuracy (2023). They quote Mike Sharples,
    an emeritus professor at the Open University's Institute of Educational Technology,
    saying that it is the larger companies that are successfully integrating AI into
    their existing and well-established products that are thriving. Conversely, Sharples
    cautions that others run the risk of becoming like the ‘Kodak of the late 1990s’,
    unable to adapt swiftly or effectively enough to thrive in a competitive market
    (Williams & Grove, 2023). Sharples goes on to say that he anticipates that numerous
    companies in the education field, particularly distance-learning institutions,
    will face significant challenges in their survival, as students may perceive AI
    as capable of performing their tasks better; however, he cautions that whether
    or not that is the case remains to be seen (Williams & Grove, 2023). Williams
    and Grove also quote Rose Luckin, professor of learner-centred design at University
    College London Knowledge Lab. Luckin describes the advantages of platforms like
    ChatGPT, such as being able to effortlessly generate textbooks and course materials;
    however, she warns that there will be a great need for quality control to address
    errors (Williams & Grove, 2023). However, she points out that this is significantly
    more cost-effective than producing the materials from scratch (Williams & Grove,
    2023). Williams and Grove therefore conclude that the publishing and educational
    technology sectors are going to undergo significant transformations due to these
    developments and stress that companies must recognise these changes and assess
    how student demands and industry requirements are evolving. This will eventually
    help them in identifying the areas where ChatGPT falls short, after which they
    can work to fill those gaps effectively (2023).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 就像其他行业一样，ChatGPT的出现迫使教育公司重新评估和审视他们的商业模式。根据《泰晤士高等教育》的作者汤姆·威廉姆斯和杰克·格罗夫的说法，教育技术公司Chegg的首席执行官丹·罗森斯维格将他们教科书和课程辅导服务的用户注册量下降归因于ChatGPT，认为随着期中和期末考试的临近，许多潜在客户选择寻求基于AI的帮助（2023年）。威廉姆斯和格罗夫认为，这种消费者行为的转变是生成式AI崛起将如何颠覆教育企业的“预兆”，并促使公司匆忙适应并确保其产品面向未来（2023年）。他们以Turnitin为例，该公司加快了AI检测器的引入，以及Duolingo，该公司将GPT-4集成到帮助语言学习者评估其语言技能中（2023年）。威廉姆斯和格罗夫还指出，同时，一波新成立的企业也涌现出来，提供包括个性化辅导聊天机器人和专有AI检测器在内的广泛服务，每个服务的准确性水平各不相同（2023年）。他们引用了开放大学教育技术研究所荣誉教授迈克·夏普尔斯的话，他说，成功将AI整合到其现有和成熟产品中的大型公司正在蓬勃发展。相反，夏普尔斯警告说，其他公司面临的风险是变成20世纪90年代末的“柯达”，无法迅速或有效地适应竞争市场（威廉姆斯和格罗夫，2023年）。夏普尔斯接着说，他预计教育领域的许多公司，尤其是远程学习机构，在生存方面将面临重大挑战，因为学生可能会认为AI能够更好地完成他们的任务；然而，他警告说，这究竟是不是事实还有待观察（威廉姆斯和格罗夫，2023年）。威廉姆斯和格罗夫还引用了伦敦大学学院知识实验室学习者中心设计教授罗丝·卢金的言论。卢金描述了ChatGPT等平台的优势，例如能够轻松生成教科书和课程材料；然而，她警告说，将需要大量的质量控制来处理错误（威廉姆斯和格罗夫，2023年）。然而，她指出，这比从头开始制作材料要显著节省成本（威廉姆斯和格罗夫，2023年）。因此，威廉姆斯和格罗夫得出结论，由于这些发展，出版和教育技术行业将经历重大变革，并强调公司必须认识到这些变化，并评估学生需求和行业要求是如何演变的。这将最终帮助他们确定ChatGPT的不足之处，之后他们可以有效地填补这些空白（2023年）。
- en: As we have seen, AI is leading to major changes in the job market, including
    job gains and job losses. However, what is interesting is that ChatGPT may not
    only be changing jobs but also creating jobs. In fact, OpenAI cofounder, Greg
    Brockman, expressed that concerns about AI tools taking away human jobs were exaggerated,
    and that AI would enable people to concentrate on essential work. Brockman believes
    that the key to the future will be more elevated skills, such as discernment and
    the ability to determine when to delve into details, and that AI will enhance
    what humans can accomplish (Waugh, 2023). According to Fiona Jackson, technology
    writer, some remote workers are already secretly using AI to complete multiple
    jobs at the same time, referring to themselves as ‘overemployed’ because ChatGPT
    helps them finish each job's workload in record time (2023). She reports that
    they are using the tool to produce high-quality written content, which may include
    anything from writing marketing materials to articles to blog posts, and are therefore
    able to work multiple full-time jobs without their employers knowing (Jackson,
    2023). She notes that the inception of such remote work can be traced back to
    the advent of the pandemic, which compelled many employees to assume additional
    jobs to sustain themselves in the wake of economic instability. Built upon this,
    she notes that the emergence of ChatGPT appears to have provided workers with
    an even more advanced online tool that is augmenting their remote work capabilities,
    helping them to effectively manage multiple roles at the same time (Jackson, 2023).
    However, Jackson points out that ChatGPT-generated text often contains errors,
    which some workers see as a positive, as it means their expertise is still required
    to check the AI's work (Jackson, 2023). Jackson further reports that many workers
    who use ChatGPT to supplement their income are living in fear of losing their
    jobs. These professionals recognise the possibility that the rapid advancements
    in AI could ultimately make their positions obsolete (Jackson, 2023). Apparently,
    one worker even likened the impact of AI on the workforce to the historical shift
    from weavers to a single loom operator in the textile industry (Jackson, 2023).
    Therefore, it seems that while AI can be a helpful tool, it also comes with some
    significant risks for those who rely on traditional employment. But what about
    non-traditional employment? What about the new jobs emerging?
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，人工智能正在引领就业市场的重大变革，包括岗位的增加和减少。然而，有趣的是，ChatGPT可能不仅会改变工作，还会创造新的工作。实际上，OpenAI的联合创始人Greg
    Brockman表示，关于人工智能工具剥夺人类工作的担忧被夸大了，人工智能将使人们能够专注于核心工作。Brockman认为，未来的关键将是更高层次的能力，例如辨别力和确定何时深入细节的能力，而人工智能将增强人类所能完成的事情（Waugh，2023）。根据技术作家Fiona
    Jackson的说法，一些远程工作者已经在秘密地使用人工智能同时完成多项工作，他们自称为“过度就业”，因为ChatGPT帮助他们以创纪录的时间完成每项工作的工作量（2023）。她报告说，他们正在使用这个工具来制作高质量的书面内容，这可能包括从撰写营销材料到文章再到博客帖子，因此能够在雇主不知情的情况下同时从事多项全职工作（Jackson，2023）。她指出，这种远程工作的出现可以追溯到疫情的爆发，这迫使许多员工承担额外的工作以在经济不稳定之后维持生计。在此基础上，她指出，ChatGPT的出现似乎为工作者提供了一种更先进的在线工具，增强了他们的远程工作能力，帮助他们同时有效地管理多个角色（Jackson，2023）。然而，Jackson指出，ChatGPT生成的文本常常包含错误，一些工作者认为这是一个积极的信号，因为这意味着他们仍需要检查人工智能的工作（Jackson，2023）。Jackson进一步报告说，许多使用ChatGPT来增加收入的工人生活在失去工作的恐惧中。这些专业人士认识到，人工智能的快速进步最终可能会使他们的职位变得过时（Jackson，2023）。显然，一位工作者甚至将人工智能对劳动力的影响比作纺织业从织工到单一织布机操作者的历史性转变（Jackson，2023）。因此，虽然人工智能可以是一个有用的工具，但它也给那些依赖传统就业的人带来了一些显著的风险。那么，非传统就业又如何呢？新兴的工作岗位又如何呢？
- en: We are even seeing that the advent of ChatGPT has led to the creation of a new
    job market where companies are actively seeking prompt engineers to harness the
    bot's potential; a job that involves enhancing the performance of ChatGPT and
    educating the company's staff on how to make the most of this technology (Tonkin,
    2023). Often referred to as ‘AI whisperers’, prompt engineers specialise in crafting
    prompts for AI bots such as ChatGPT, and frequently come from backgrounds in history,
    philosophy or English language, where a mastery of language and wordplay is essential
    (Tonkin, 2023). And we are currently seeing a strong demand for prompt engineers,
    with Google-backed start-up Anthropic advertising a lucrative salary of up to
    $335,000 for a ‘Prompt Engineer and Librarian’ position in San Francisco; a role
    which involves curating a library of prompts and prompt chains and creating tutorials
    for customers (Tonkin, 2023). Additionally, another job posting offers a salary
    of $230,000 for a machine learning engineer with experience in prompt engineering
    to produce optimal AI output (Tonkin, 2023). Interestingly, the job postings encourage
    candidates to apply even if they don't meet all the qualifications. Sam Altman
    is currently emphasising the significance of prompt engineers, stating that ‘writing
    a really great prompt for a chatbot persona is an amazingly high-leverage skill’
    (Tonkin, 2023). Thus, a new job market has opened. But why is this happening so
    quickly and seamlessly? And why are people who did not meet all the qualifications
    being asked to apply? It all comes down to unlocking the potential of capability
    overhang.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们甚至看到ChatGPT的出现导致了一个新的就业市场的形成，公司正在积极寻找提示工程师来利用机器人的潜力；这项工作涉及提升ChatGPT的性能并教育公司员工如何充分利用这项技术（Tonkin，2023）。通常被称为“AI占卜师”，提示工程师专注于为AI机器人如ChatGPT编写提示，并且通常来自历史、哲学或英语语言等背景，在这些领域中，对语言和文字游戏的掌握是必不可少的（Tonkin，2023）。目前，我们正看到对提示工程师的强烈需求，谷歌支持的初创公司Anthropic在旧金山为“提示工程师和图书管理员”职位广告了高达$335,000的丰厚薪酬；这个角色包括整理提示和提示链的图书馆并为客户创建教程（Tonkin，2023）。此外，另一份工作广告为具有提示工程经验的机器学习工程师提供$230,000的薪酬，以产生最佳的AI输出（Tonkin，2023）。有趣的是，工作广告鼓励即使不符合所有资格的候选人也申请。Sam
    Altman目前正在强调提示工程师的重要性，他表示：“为聊天机器人角色编写一个真正出色的提示是一项惊人的高杠杆技能”（Tonkin，2023）。因此，一个新的就业市场已经打开。但为什么这一切发生得如此之快且如此顺畅？为什么要求那些不符合所有资格的人申请？这一切都归结于释放能力过剩的潜力。
- en: 'One of the reasons prompt engineers do not have to have a background in computer
    science or machine learning is related to the concept of capability overhang.
    In his article ‘ChatGPT proves AI is finally mainstream – and things are only
    going to get weirder’, James Vincent highlights the concept of ‘capability overhang’
    in AI, which refers to the untapped potential of AI systems, including latent
    skills and abilities that researchers have yet to explore (2022). The potential
    of AI remains largely untapped due to the complexity of its models, which are
    referred to as ‘black boxes’. This complexity makes it challenging to understand
    how AI functions and arrives at specific results. However, this lack of understanding
    opens up vast possibilities for future AI advancements (Vincent, 2022). Vincent
    quotes Jack Clark, an AI policy expert, who describes the concept of capability
    overhang as follows: ‘Today''s models are much more capable than we think, and
    the techniques we have to explore them are very immature. What about all the abilities
    we are unaware of because we have not yet tested for them?’ (Vincent, 2022). Vincent
    highlights ChatGPT as a prime example of how accessibility has impeded the progress
    of AI. Although ChatGPT is built on GPT-3.5, an improved version of GPT-3, it
    was not until OpenAI made it available on the web that its potential to reach
    a wider audience was fully realised. Furthermore, as it was released free of charge,
    this further increased its accessibility. Moreover, despite the extensive research
    and innovation in exploring the capabilities and limitations of AI models, the
    vast and complex intelligence of the internet remains unparalleled. Now, with
    the sudden accessibility of AI capabilities to the general public, according to
    Vincent, the potential overhang may be within reach (2022).'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 促使工程师不需要具备计算机科学或机器学习背景的一个原因与“能力超限”这一概念有关。在文章《ChatGPT证明人工智能终于成为主流——而且事情只会变得更加奇怪》中，詹姆斯·文森特（James
    Vincent）突出了人工智能（AI）中“能力超限”的概念，这指的是AI系统尚未挖掘的潜力，包括研究人员尚未探索的潜在技能和能力（2022年）。由于AI模型的复杂性，其潜力在很大程度上尚未得到挖掘，这些模型被称为“黑盒”。这种复杂性使得理解AI如何运作以及如何得出特定结果变得具有挑战性。然而，这种缺乏理解为未来AI的进步开辟了广阔的可能性（文森特，2022年）。文森特引用了AI政策专家杰克·克拉克（Jack
    Clark）对“能力超限”概念的描述：“今天的模型比我们想象的要强大得多，而我们探索它们的技巧却非常不成熟。那么，我们还没有测试过的所有能力又是什么呢？”（文森特，2022年）。文森特将ChatGPT作为可访问性阻碍AI进步的一个主要例证。尽管ChatGPT建立在GPT-3.5之上，这是GPT-3的改进版本，但直到OpenAI将其发布到网络上，其触及更广泛受众的潜力才得到充分实现。此外，由于它是免费发布的，这也进一步增加了其可访问性。此外，尽管在探索AI模型的能力和限制方面进行了广泛的研究和创新，但互联网的庞大而复杂的智能仍然无与伦比。现在，随着AI能力对公众的突然可访问性，根据文森特的说法，潜在的超限可能已经触手可及（2022年）。
- en: So, what do the experts have to say about the potential impact of AI on the
    job market? Sam Altman holds an optimistic viewpoint, acknowledging that while
    technology will undoubtedly influence the job market, he believes there will be
    even greater job opportunities emerging as a result. Altman emphasises the importance
    of recognising AI tools like GPT as tools, not autonomous entities (Bhuiyan, 2023).
    In Altman's perspective, GPT-4 and similar tools are poised to excel at specific
    tasks rather than completely supplanting entire jobs (Bhuiyan, 2023). He envisions
    GPT-4 automating certain tasks while concurrently giving rise to novel, improved
    job roles (Bhuiyan, 2023). However, Altman's optimism contrasts with the outlook
    of Sir Patrick Vallance, the departing scientific adviser to the UK government
    (Milmo, 2023c). Vallance adopts a more cautious stance, predicting that AI will
    instigate profound societal and economic shifts, with its impact on employment
    potentially rivalling that of the Industrial Revolution (Milmo, 2023c). Moreover,
    the Organisation for Economic Co-operation and Development (OECD) contends that
    major economies stand on the brink of an AI revolution, which could lead to job
    losses in skilled professions such as law, medicine and finance. According to
    the OECD, approximately 27% of employment across its 38 member countries, including
    the United Kingdom, United States and Canada, comprises highly skilled jobs vulnerable
    to AI-driven automation. The OECD specifically highlights roles in sectors like
    finance, medicine and legal activities, which require extensive education and
    accumulated experience, as suddenly susceptible to AI-driven automation (Milmo,
    2023e). In fact, these predictions are already starting to materialise. In May
    2023, IBM's CEO announced a temporary halt in hiring for positions that could
    potentially be replaced by AI, estimating that around one-third of the company's
    non-customer facing roles, approximately 7,800 positions, could be affected (Milmo,
    2023c). The influence of AI has also reached the stock markets, as evidenced by
    the significant decline in the share price of UK education company Pearson following
    revised financial projections by US-based provider Chegg, attributing the impact
    to ChatGPT and its effect on customer growth (Milmo, 2023c). Therefore we can
    see that the negative influence of AI is already here, it is already happening.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，专家们对人工智能对就业市场潜在影响的看法是什么？山姆·阿尔特曼持乐观观点，承认虽然技术无疑会影响就业市场，但他相信由此将产生更多的就业机会。阿尔特曼强调，认识到像GPT这样的AI工具是工具，而不是自主实体（Bhuiyan，2023）。在阿尔特曼看来，GPT-4和类似工具有望在特定任务上表现出色，而不是完全取代整个工作（Bhuiyan，2023）。他设想GPT-4将自动化某些任务，同时产生新的、改进的工作角色（Bhuiyan，2023）。然而，阿尔特曼的乐观态度与英国政府即将离职的科学顾问帕特里克·瓦兰斯爵士的观点形成对比（Milmo，2023c）。瓦兰斯采取更为谨慎的立场，预测AI将引发深刻的社会和经济变革，其对就业的影响可能堪比工业革命（Milmo，2023c）。此外，经济合作与发展组织（OECD）认为，主要经济体正站在AI革命的边缘，这可能导致法律、医学和金融等技能型职业的失业。根据OECD的数据，在其38个成员国中，包括英国、美国和加拿大，大约27%的就业岗位，即约27%的就业岗位，容易受到AI驱动的自动化的影响。OECD特别指出，在金融、医学和法律活动等需要广泛教育和积累经验的领域，这些角色突然变得容易受到AI驱动的自动化影响（Milmo，2023e）。事实上，这些预测已经开始实现。2023年5月，IBM的CEO宣布暂停招聘可能被AI取代的职位，估计大约三分之一的非客户服务岗位，即大约7,800个岗位，可能受到影响（Milmo，2023c）。AI的影响也波及到股市，正如英国教育公司Pearson在美国公司Chegg修订财务预测后股价大幅下跌，将影响归因于ChatGPT及其对客户增长的影响（Milmo，2023c）。因此，我们可以看到，AI的负面影响已经到来，它正在发生。
- en: AI's Impact on Education
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能对教育的影响
- en: 'In 2023, Felten et al. conducted a study to evaluate the degree to which advancements
    in AI language modelling capabilities could affect various occupations. Their
    findings indicate that the education sector is going to be hit particularly hard.
    Out of the 20 professions they identified as being most at risk, 85% of these
    projected job losses were in the field of education. Starting with those with
    the highest risk, these include: psychology teachers; communications teachers;
    political scientists; cultural studies teachers; geography teachers; library science
    teachers; clinical, counselling and school psychologists; social work teachers;
    English language and literature teachers; foreign language and literature teachers;
    history teachers; law teachers; philosophy and religion teachers; sociology teachers;
    political science teachers; criminal justice and law enforcement teachers and
    sociologists (Felten et al., 2023).'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在2023年，Felten等人进行了一项研究，以评估人工智能语言建模能力进步对各种职业可能产生的影响程度。他们的研究发现，教育行业将受到特别严重的打击。在他们确定的20个最易受影响的职业中，85%的预期失业发生在教育领域。从风险最高的开始，这些包括：心理学教师；传播学教师；政治学家；文化研究教师；地理学教师；图书馆学教师；临床、咨询和学校心理学家；社会工作教师；英语语言和文学教师；外语和文学教师；历史教师；法学教师；哲学和宗教教师；社会学教师；政治学教师；刑事司法和执法教师以及社会学家（Felten等人，2023年）。
- en: We are also starting to see a shift in how graduates are being affected. According
    to the 2023 Artificial Intelligence Report, the percentage of new computer science
    PhD graduates from US universities specialising in AI has been increasing steadily
    over the years. In 2021, 19.1% of new graduates specialised in AI, up from 14.9%
    in 2020 and 10.2% in 2010 (Maslej et al., 2023). The trend is shifting towards
    AI PhDs choosing industry over academia. In 2011, a similar number of AI PhD graduates
    took jobs in industry (40.9%) and academia (41.6%). However, since then, a majority
    of AI PhDs are choosing industry, with 65.4% taking jobs in industry in 2021,
    which is more than double the 28.2% who chose academia (Maslej et al., 2023).
    In addition, the number of new North American faculty hires in computer science,
    computer engineering and information fields have remained relatively stagnant
    over the past decade (Maslej et al., 2023). In 2021, a total of 710 new hires
    were made, which is slightly lower than the 733 hires made in 2012\. Furthermore,
    the number of tenure-track hires also saw a peak in 2019 with 422 hires, but then
    dropped to 324 in 2021 (Maslej et al., 2023).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也开始看到毕业生受到的影响发生了变化。根据2023年人工智能报告，美国大学中专注于人工智能的新计算机科学博士毕业生的比例在近年来稳步上升。到2021年，19.1%的新毕业生专注于人工智能，高于2020年的14.9%和2010年的10.2%（Maslej等人，2023年）。趋势正在转向人工智能博士选择工业界而非学术界。2011年，类似数量的AI博士毕业生在工业界（40.9%）和学术界（41.6%）找到了工作。然而，从那时起，大多数AI博士选择工业界，2021年有65.4%的AI博士在工业界找到了工作，这比选择学术界的28.2%的人数多出近两倍（Maslej等人，2023年）。此外，过去十年中北美计算机科学、计算机工程和信息领域的新的教职员工招聘数量相对稳定（Maslej等人，2023年）。到2021年，共招聘了710名新员工，略低于2012年的733名招聘人数。此外，终身教职招聘人数在2019年达到峰值，为422人，但随后在2021年降至324人（Maslej等人，2023年）。
- en: There is also a growing difference in external research funding between private
    and public American computer science departments. A decade ago, the median total
    expenditure from external sources for computing research was similar for private
    and public computer science departments in the United States. However, the gap
    has widened over time, with private universities receiving millions more in funding
    than public ones (Maslej et al., 2023). As of 2021, private universities had a
    median expenditure of $9.7 million, while public universities had a median expenditure
    of $5.7 million (Maslej et al., 2023). In response to these changes, universities
    are taking various actions to adapt. They are focusing on several key areas, including
    their infrastructure, programme offerings, faculty recruitment and faculty retention.
    Inside Higher Ed's Susan D'Agostino's May 2023 article provides recent information
    regarding how universities are reacting. Regarding universities' increased investments
    in AI faculty and infrastructure, she gives the following examples. The University
    at Albany, Purdue University and Emory University are currently actively hiring
    a substantial number of AI faculty members, while the University of Southern California
    is investing $1 billion in AI, to recruit 90 new faculty members and establish
    a dedicated AI school (D'Agostino, 2023). Similarly, the University of Florida
    is creating the Artificial Intelligence Academic Initiative Centre, while Oregon
    State University is building an advanced AI research centre with cutting-edge
    facilities (D'Agostino, 2023). In support of these efforts, the National Science
    Foundation is committing $140 million to establish seven national AI research
    institutes at US universities, each with a specific focus area (D'Agostino, 2023).
    However, D'Agostino quotes Victor Lee, an associate professor at Stanford's Graduate
    School of Education, as emphasising the importance of extending AI initiatives
    beyond computer science departments, suggesting that integrating diverse disciplines
    such as writing, arts, philosophy and humanities to foster a range of perspectives
    and critical thinking necessary for AI's development and understanding (2023).
    According to D'Agostino, colleges are also establishing new academic programmes
    in AI. For example, Houston Community College will introduce four-year degree
    programmes in applied technology for AI and robotics, as well as applied science
    in healthcare management, and Rochester Institute of Technology plans to offer
    an interdisciplinary graduate degree in AI (D'Agostino, 2023). Furthermore, the
    New Jersey Institute of Technology will launch two AI graduate programmes, and
    Georgia Tech will lead a statewide AI initiative with a $65 million investment,
    transforming a facility into an AI Manufacturing Pilot Facility (D'Agostino, 2023).
    In addition, Palm Beach State College is introducing an AI programme and aims
    to establish a graduate school offering AI courses (D'Agostino, 2023).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在美国，私立和公立计算机科学系之间的外部研究资金差异也在不断扩大。十年前，美国私立和公立计算机科学系在计算研究方面的外部资金总支出中位数相似。然而，随着时间的推移，差距已经扩大，私立大学获得的资金比公立大学多出数百万（Maslej
    等人，2023年）。截至2021年，私立大学的平均支出为970万美元，而公立大学的平均支出为570万美元（Maslej 等人，2023年）。针对这些变化，大学正在采取各种措施来适应。它们正专注于几个关键领域，包括基础设施、课程设置、教师招聘和教师保留。Inside
    Higher Ed的Susan D'Agostino在2023年5月的文章中提供了关于大学如何反应的最新信息。关于大学在人工智能教师和基础设施方面的增加投资，她给出了以下例子。纽约州立大学、普渡大学和埃默里大学目前正在积极招聘大量人工智能教师，而南加州大学正在投资10亿美元用于人工智能，以招聘90名新教师并建立一所专门的人工智能学校（D'Agostino，2023年）。同样，佛罗里达大学正在创建人工智能学术倡议中心，而俄勒冈州立大学正在建立一个配备尖端设施的高级人工智能研究中心（D'Agostino，2023年）。为了支持这些努力，美国国家科学基金会承诺投资1.4亿美元，在美国大学建立七个国家人工智能研究机构，每个机构都有一个特定的重点领域（D'Agostino，2023年）。然而，D'Agostino引用斯坦福大学教育学院副教授Victor
    Lee的话，强调将人工智能倡议扩展到计算机科学部门之外的重要性，建议将写作、艺术、哲学和人文学科等多元化学科整合起来，以培养人工智能发展和理解所需的各种观点和批判性思维（2023年）。根据D'Agostino的说法，学院也在建立新的AI学术项目。例如，休斯顿社区学院将推出四年制人工智能应用技术和医疗保健管理应用科学学位课程，罗切斯特理工学院计划提供跨学科的人工智能研究生学位（D'Agostino，2023年）。此外，新泽西理工学院将启动两个AI研究生项目，而乔治亚理工学院将投资6500万美元领导全州的人工智能倡议，将一个设施转变为AI制造试点设施（D'Agostino，2023年）。此外，棕榈滩州立学院正在推出AI项目，并旨在建立一个提供AI课程的研究生院（D'Agostino，2023年）。
- en: 'As can be seen, many universities are actively expanding their infrastructure
    and programmes to accommodate the growing interest in AI. However, these efforts
    are not without challenges, especially when it comes to recruiting AI faculty
    members. And this is further exacerbated by the existing shortage of computer
    scientists. In fact, these challenges predate the widespread public awareness
    of AI''s potential, as American colleges have long struggled to meet the high
    demand for computer science courses while grappling with a shortage of qualified
    faculty (D''Agostino, 2023). D''Agostino quotes Kentaro Toyama, a professor at
    the University of Michigan, who acknowledges that institutions planning to hire
    a significant number of faculty members may struggle to find individuals with
    the necessary teaching skills for these specialised classes (2023). Therefore,
    it is evident that universities are facing difficulties in recruiting faculty
    members at a pace that meets the demand. However, even if they can manage to hire
    new faculty, there is the additional challenge of retaining these new members
    due to their high demand in the industry. D''Agostino quotes Ishwar K. Puri, Senior
    Vice President of Research and Innovation at Southern California, who says that
    universities should carefully consider the difficulty of retaining computer scientists
    once they are hired (2023). This is because as faculty members gain expertise
    and establish themselves, they become highly sought-after by the private sector,
    which offers salaries that universities are unable to match. Furthermore, Puri
    points out that universities cannot provide the same opportunities for groundbreaking
    work in AI that is currently available in the AI corporations, which may be another
    reason academics choose to leave universities in favour of industry (D''Agostino,
    2023). In order to address this issue, D''Agostino quotes Ravi Bellamkonda, provost
    and executive vice president for academic affairs at Emory University, who suggests
    the following: make starting salaries in computer science departments higher compared
    to other departments, even though it may potentially lead to other challenges
    within the university; and offer unconventional incentives (2023). One example
    he gives of an unconventional incentive is allowing faculty members to consult
    one day a week, thereby blurring the line between academia and industry (D''Agostino,
    2023). As such, Emory University is now supporting collaborations with companies
    such as Google or Amazon, and many faculty members are already engaging in these
    collaborations or choosing to spend their sabbatical at a company instead of another
    academic institution (D''Agostino, 2023).'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如所见，许多大学正在积极扩展其基础设施和项目，以适应对人工智能日益增长的兴趣。然而，这些努力并非没有挑战，尤其是在招聘人工智能教师方面。而且，由于计算机科学家的现有短缺，这个问题进一步加剧。事实上，这些挑战早于公众对人工智能潜力的广泛认识，因为美国学院长期以来一直在努力满足对计算机科学课程的巨大需求，同时应对合格教师短缺的问题（D'Agostino，2023）。D'Agostino
    引用了密歇根大学的教授 Kentaro Toyama 的话，他承认，计划招聘大量教师的机构可能难以找到这些专业课程所需的教学技能（2023）。因此，很明显，大学在以满足需求的速度招聘教师方面面临着困难。然而，即使他们能够成功招聘新教师，由于行业对他们的需求很高，他们还面临着保留这些新成员的额外挑战。D'Agostino
    引用了南加州大学研究与创新高级副总裁 Ishwar K. Puri 的话，他说，一旦被聘用，大学应仔细考虑保留计算机科学家的难度（2023）。这是因为随着教师获得专业知识和确立自己，他们成为私营部门高度追捧的对象，私营部门提供的薪水是大学无法匹敌的。此外，Puri
    指出，大学无法提供目前在人工智能公司可获得的突破性人工智能工作的机会，这可能是学者选择离开大学而转向行业的原因之一（D'Agostino，2023）。为了解决这个问题，D'Agostino
    引用了埃默里大学教务长兼学术事务执行副总裁 Ravi Bellamkonda 的话，他提出了以下建议：将计算机科学系的起薪与其他系相比提高，即使这可能会在大学内部引发其他挑战；并提供非常规激励措施（2023）。他给出的一个非常规激励措施的例子是允许教师每周咨询一天，从而模糊了学术界和产业界的界限（D'Agostino，2023）。因此，埃默里大学现在正在支持与谷歌或亚马逊等公司的合作，许多教师已经参与这些合作或选择在公司而不是另一所学术机构度过他们的休假（D'Agostino，2023）。
- en: 'There are also reports coming out regarding concerns that schools in the United
    Kingdom are having due to the overwhelming pace of AI development and a lack of
    trust in technology companies'' ability to protect students and educational institutions
    (Milmo, 2023d). To address these concerns, a group of headteachers has launched
    a body aimed at advising and safeguarding schools from the risks associated with
    AI (Milmo, 2023d). However, their worries go beyond AI-powered chatbots simply
    facilitating cheating and are expanded to encompass the potential impact on children''s
    well-being as well as the teaching profession itself (2023d). These concerns were
    expressed in a letter to *The Times*, highlighting the ‘very real and present
    hazards and dangers’ posed by AI, particularly in generative AI breakthroughs
    that can produce realistic text, images and voice impersonations (Milmo, 2023d).
    Led by Sir Anthony Seldon, the head of Epsom College, a fee-paying school, the
    group consists of heads from various private and state schools (Milmo, 2023d).
    The primary goal of the group is to provide secure guidance to schools amidst
    the rapidly evolving AI landscape, fuelled by scepticism towards large digital
    companies'' ability to self-regulate in the best interests of students and schools
    (Milmo, 2023d). Their letter also criticises the government for insufficiently
    regulating AI. Therefore, to tackle these challenges, the group plans to establish
    a cross-sector body comprising leading teachers and independent digital and AI
    experts. This body will offer guidance on AI developments and assist schools in
    deciding which technologies to embrace or avoid. The United Nations Educational,
    Scientific and Cultural Organization (UNESCO) resonates with these concerns, amplifying
    them through their *Global Education Monitoring Report* (2023). The report spotlights
    inadequate oversight within the education technology sector, placing children''s
    well-being at risk. Although they note that education technology oversight exists
    in 82% of countries, challenges arise from private actors. Thus, the report underscores
    the necessity to regulate privacy, safety and well-being. Moreover, the report
    unveils that out of 163 education technology products recommended during the pandemic,
    89% collect children''s information. However, just 16% of countries ensure data
    privacy in education. The report also raises the issue of AI algorithms deepening
    inequality, specifically affecting indigenous groups in the United States. Additionally,
    it highlights the surge in cyberattacks targeting education, with incidents doubling
    in 45 US districts between 2021 and 2022\. Another concern in the report lies
    in the adverse effects of excessive screen time on children''s well-being, noting
    that US children spend up to nine hours daily on screens. Yet, despite this, the
    report notes that there are limited regulations for screen time and most countries
    do not ban phones in schools. To address these challenges, UNESCO suggests that
    countries need to adopt comprehensive and tailored data protection laws and standards
    for children and that policymakers should consider the voices of children to protect
    their rights during online activities. They call for sound education technology
    and data governance to ensure equitable and high-quality technology benefits while
    safeguarding children''s rights to privacy and education. They also call for clear
    frameworks, effective regulations and oversight mechanisms to protect the rights
    of children in a world where data exchange is widespread (*Global Education Monitoring
    Report 2023: Technology in Education – A Tool on Whose Terms?* 2023).'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 有关英国学校因人工智能发展的迅猛步伐以及对科技公司保护学生和教育机构能力的不信任而出现的问题，也有报道出现（Milmo, 2023d）。为了解决这些担忧，一群校长成立了一个旨在向学校提供咨询和保护，以防范与人工智能相关的风险的机构（Milmo,
    2023d）。然而，他们的担忧并不仅限于人工智能驱动的聊天机器人仅仅促进作弊，而是扩展到了对儿童福祉以及教学职业本身可能产生的影响（2023d）。这些担忧在致《泰晤士报》的一封信中得到了表达，强调了人工智能，尤其是能够生成逼真文本、图像和声音模仿的生成式人工智能突破带来的“非常真实且紧迫的危险和危害”（Milmo,
    2023d）。由Epsom College（一所收费学校）的校长Anthony Seldon爵士领导，该小组由来自各种私立和公立学校的校长组成（Milmo,
    2023d）。该小组的主要目标是，在人工智能快速发展的背景下，为学校提供安全的指导，同时质疑大型数字公司自我监管以最好地服务于学生和学校的能力（Milmo,
    2023d）。他们的信件还批评政府没有充分监管人工智能。因此，为了应对这些挑战，该小组计划建立一个跨部门的机构，由领先的教师和独立的数字和人工智能专家组成。该机构将就人工智能的发展提供指导，并协助学校决定采用或避免哪些技术。联合国教科文组织（UNESCO）对这些担忧产生了共鸣，通过其《全球教育监测报告》（2023）放大了这些担忧。报告突出了教育技术领域监管不足的问题，将儿童福祉置于风险之中。尽管他们指出，82%的国家存在教育技术监管，但来自私人行为者的挑战仍然存在。因此，报告强调了监管隐私、安全和福祉的必要性。此外，报告揭示了在大流行期间推荐的163个教育技术产品中，有89%收集儿童信息。然而，只有16%的国家确保了教育中的数据隐私。报告还提出了人工智能算法加剧不平等的问题，特别是影响了美国的土著群体。此外，它还强调了针对教育的网络攻击激增，2021年至2022年间，45个美国地区的此类事件翻了一番。报告中的另一个担忧是过度使用屏幕对儿童福祉的负面影响，指出美国儿童每天在屏幕上花费多达九个小时。尽管如此，报告指出，对屏幕时间的监管有限，大多数国家不禁止在学校使用手机。为了应对这些挑战，联合国教科文组织建议各国需要为儿童采用全面和定制的数据保护法律和标准，并且政策制定者应考虑儿童的呼声，以保护他们在在线活动中的权利。他们呼吁建立良好的教育技术和数据治理，以确保公平和高质量的技术利益，同时保护儿童隐私和教育的权利。他们还呼吁建立清晰的框架、有效的法规和监督机制，以保护在一个数据交换广泛的世界中儿童的权益（*《全球教育监测报告2023：教育中的技术——一个谁说了算的工具？》2023）。
- en: AI's Impact on the World
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能对世界的影响
- en: 'So far in this chapter, we have examined various aspects of AI, including the
    emergence and growth of chatbots, challenges and ethical considerations in AI,
    AI''s influence on the job market and its effect on education. Yet, a more overarching
    inquiry remains: What will be the impact of AI on the world? To delve into this
    question more deeply, we investigate the viewpoints of experts in the field. We
    start by considering opinions expressed before ChatGPT was publicly introduced
    and then transition to perspectives shared after its unveiling.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，在本章中，我们已经探讨了人工智能的各个方面，包括聊天机器人的出现和增长、人工智能中的挑战和伦理考量，以及人工智能对就业市场和其对教育的影响。然而，一个更为广泛的探究仍然存在：人工智能将对世界产生什么影响？为了更深入地探讨这个问题，我们调查了该领域专家的观点。我们首先考虑在ChatGPT公开推出之前表达的意见，然后过渡到其发布后分享的视角。
- en: 'In 2017, prior to ChatGPT''s introduction, Max Tegmark, a physicist and cosmologist
    renowned for his work in theoretical physics and AI, released ‘Life 3.0: Being
    Human in the Age of Artificial Intelligence’ (Tegmark, 2017). In this book, Tegmark
    navigates the potential influence of AI on human society and envisions the potential
    futures that AI''s advancement could unfold. In particular, he looks into the
    realm of Artificial General Intelligence (AGI), analysing the potential pros and
    cons, which he believes span from the potential positives – such as advancements
    in science, medicine and technology – to the potential negatives, which encompass
    ethical dilemmas and existential risks. Tegmark also puts forward an array of
    hypothetical scenarios that could transpire as AGI evolves, including the prospects
    of utopian outcomes, dystopian visions and a middle ground where human and AI
    coexistence is harmonious. He further investigates the societal implications of
    AGI, including its potential impact on the job market, economy and governance.
    Based on this, he stresses the importance of ethical considerations and conscientious
    development to ensure that AGI ultimately serves the collective benefit of all
    humanity. In 2019, following Tegmark''s book, Gary Marcus, a Cognitive Scientist
    and Computer Scientist, and Ernest Davis, a Professor of Computer Science, published
    ‘*Rebooting AI: Building Artificial Intelligence We Can Trust*’, in which they
    investigate critical aspects and challenges within the AI field, specifically
    focusing on the limitations and deficiencies prevalent in current AI systems.
    Through doing so, they raise critical questions about the trajectory of AI advancement.
    Marcus and Davis contend that, despite notable advancements in AI technology,
    fundamental constraints persist, hindering the development of genuinely intelligent
    and reliable AI systems. They underscore the lack of common sense reasoning, robustness
    and a profound understanding of the world in many contemporary AI systems – qualities
    inherent to human cognition. Based on this, they argue that prevailing AI development
    approaches, often centred on deep learning and neural networks, fall short in
    achieving human-level intelligence and true understanding. Within their work,
    Marcus and Davis place transparency, interpretability and accountability as prominent
    themes, emphasising the significance of rendering AI systems transparent and interpretable,
    particularly in domains where their decisions impact human lives. They assert
    that these considerations are crucial, especially in fields such as healthcare,
    finance and law, where comprehending how AI arrives at its decisions is vital
    for ensuring ethical and equitable decision-making (Marcus & Davis, 2019). Another
    publication in 2019 was ‘*Human Compatible: Artificial Intelligence and the Problem
    of Control*’ by Stuart Russell, a computer scientist and professor at the University
    of California, Berkeley. Russell is widely acclaimed for his significant contributions
    to the field of AI, particularly in machine learning, decision theory and the
    intricate issue of control within AI systems. In his book, Russell explores a
    critical concern in AI advancement: the imperative to ensure that AI systems act
    in harmony with human values and aspirations. The central theme of his work is
    control, addressing the intricate challenge of designing AI systems that benefit
    humanity without entailing risks or unforeseen outcomes. Russell argues that the
    prevailing trajectory of AI development, which focuses on maximising specific
    objectives without sufficient regard for human values, could lead to AI systems
    that are difficult to manage and potentially harmful. As a result, he emphasises
    the paramount importance of early alignment between AI systems and human values
    and advocates for establishing a framework that enables the regulation of AI behaviour
    (Russell, 2019).'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '在2017年，在ChatGPT推出之前，著名物理学家和宇宙学家，以其在理论物理和人工智能领域的工作而闻名的马克斯·特格马克（Max Tegmark）发布了《生命3.0：人工智能时代的人类》（Tegmark,
    2017）。在这本书中，特格马克探讨了人工智能对人类社会可能产生的影响，并展望了人工智能进步可能带来的潜在未来。特别是，他深入研究了通用人工智能（AGI）的领域，分析了潜在的利弊，他认为这些利弊从潜在的积极方面——如科学、医学和技术的进步——到潜在的消极方面，包括伦理困境和生存风险。特格马克还提出了一系列假设情景，这些情景可能随着AGI的发展而发生，包括乌托邦式的结果、反乌托邦的愿景以及人类与人工智能和谐共存的中间地带。他进一步研究了AGI的社会影响，包括其对就业市场、经济和治理的潜在影响。基于此，他强调了伦理考虑和负责任的发展的重要性，以确保AGI最终服务于全人类的共同利益。2019年，在特格马克的书籍之后，认知科学家和计算机科学家加里·马库斯（Gary
    Marcus）和计算机科学教授欧内斯特·戴维斯（Ernest Davis）出版了《*重启人工智能：构建我们可以信赖的人工智能*》（*Rebooting AI:
    Building Artificial Intelligence We Can Trust*），在这本书中，他们调查了人工智能领域的关键方面和挑战，特别是关注当前人工智能系统中普遍存在的局限性和不足。通过这样做，他们提出了关于人工智能进步轨迹的批判性问题。马库斯和戴维斯认为，尽管人工智能技术在某些方面取得了显著进步，但基本的限制仍然存在，阻碍了真正智能和可靠的人工智能系统的开发。他们强调，许多当代人工智能系统中缺乏常识推理、鲁棒性和对世界的深刻理解——这些都是人类认知固有的品质。基于此，他们认为，以深度学习和神经网络为中心的现行人工智能发展方法在实现人类水平智能和真正理解方面存在不足。在他们的工作中，马库斯和戴维斯将透明度、可解释性和问责制作为突出的主题，强调使人工智能系统透明和可解释的重要性，特别是在其决策影响人类生活的领域。他们断言，这些考虑因素至关重要，特别是在医疗保健、金融和法律等领域，理解人工智能如何做出决策对于确保道德和公平的决策至关重要（Marcus
    & Davis, 2019）。2019年还有另一部出版物，即斯图尔特·罗素（Stuart Russell）的《*人类兼容：人工智能与控制问题*》（*Human
    Compatible: Artificial Intelligence and the Problem of Control*），罗素是加州大学伯克利分校的计算机科学家和教授，他在人工智能领域，特别是在机器学习、决策理论和人工智能系统中的控制复杂问题方面做出了重大贡献。在他的书中，罗素探讨了人工智能进步中的一个关键问题：确保人工智能系统与人类价值观和愿望和谐共处的必要性。他工作的中心主题是控制，解决设计对人类有益而不带来风险或意外结果的人工智能系统的复杂挑战。罗素认为，目前人工智能发展的轨迹，即专注于最大化特定目标而不充分考虑人类价值观，可能导致难以管理和可能有害的人工智能系统。因此，他强调人工智能系统与人类价值观早期对齐的极端重要性，并主张建立一个能够规范人工智能行为的框架（Russell,
    2019）。'
- en: 'As we can see, even before the public release of ChatGPT in November 2022,
    experts were engaged in discussions regarding concerns about the development of
    AI. But what is being said now that AI, such as ChatGPT, has been released to
    the public? It would appear that feelings are mixed. Some view it as an existential
    threat, while others argue that the risk is too distant to warrant concern. Some
    hail it as ‘the most important innovation of our time’ (Liberatore & Smith, 2023),
    while others caution that it ‘poses a profound risk to society and humanity’ (Smith,
    2023). But what is the stance of AI companies themselves? Bill Gates, Sundar Pichai
    and Ray Kurzweil champion ChatGPT, highlighting its potential in addressing climate
    change, finding cancer cures and enhancing productivity (Liberatore & Smith, 2023).
    In contrast, Elon Musk, Steve Wozniak and a group of 2,500 individuals express
    reservations about large language models. In March 2023, they issued an open letter
    urging a pause in their development due to potential risks and societal implications
    (*Pause Giant AI Experiments: An Open Letter*, 2023). Moreover, in May 2023, Dr
    Geoffrey Hinton, a prominent figure in the field of AI, stepped down from his
    position at Google, citing apprehensions about misinformation, disruptions in
    employment and the existential threats posed by AI (Taylor & Hern, 2023). In particular,
    he is concerned about the potential for AI to exceed human intelligence and become
    susceptible to misuse (Taylor & Hern, 2023). Although Gates holds favourable opinions
    about AI, he supports enhanced regulation for augmented AI, especially due to
    issues such as misinformation and deepfakes (Gates, 2023). In a similar vein,
    Sundar Pichai stresses the necessity for AI regulation and is against the advancement
    of autonomous weapons (Milmo, 2023b). Additionally, technology experts, including
    the CEOs of DeepMind, OpenAI and Anthropic, are actively advocating for regulation
    to tackle existential concerns (Abdul, 2023). But are these calls for regulation
    being heeded?'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '如我们所见，甚至在2022年11月ChatGPT公开发布之前，专家们就已经在讨论关于AI发展的担忧。但是，现在AI，如ChatGPT，已经向公众发布，人们都在说什么呢？看起来情绪是复杂的。有些人认为这是一个存在主义的威胁，而另一些人则认为风险太遥远，不值得担忧。有些人称其为“我们这个时代最重要的创新”（Liberatore
    & Smith, 2023），而有些人则警告说它“对社会和人类构成了深刻的威胁”（Smith, 2023）。但是，AI公司本身的立场是什么呢？比尔·盖茨、桑达尔·皮查伊和雷·库兹韦尔都支持ChatGPT，强调其在应对气候变化、寻找癌症治疗方法以及提高生产力方面的潜力（Liberatore
    & Smith, 2023）。相比之下，埃隆·马斯克、史蒂夫·沃兹尼亚克和2500名个人对大型语言模型表示了保留。2023年3月，他们发布了一封公开信，呼吁暂停其发展，以应对潜在的风险和社会影响（*Pause
    Giant AI Experiments: An Open Letter*, 2023）。此外，2023年5月，AI领域的杰出人物杰弗里·辛顿博士辞去了在谷歌的职务，理由是对虚假信息、就业中断以及AI带来的存在主义威胁的担忧（Taylor
    & Hern, 2023）。特别是，他担心AI可能超越人类智能并容易受到滥用（Taylor & Hern, 2023）。尽管盖茨对AI持有积极的看法，但他支持加强增强型AI的监管，特别是由于虚假信息和深度伪造等问题（Gates,
    2023）。同样，桑达尔·皮查伊强调AI监管的必要性，并反对自主武器的进步（Milmo, 2023b）。此外，包括DeepMind、OpenAI和Anthropic的首席执行官在内的技术专家正在积极倡导监管以应对存在主义担忧（Abdul,
    2023）。但是，这些对监管的呼吁是否得到了重视？'
- en: Navigating the Shifting Landscape of AI Policies and Actions
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索AI政策和行动的动态变化格局
- en: 'Emerging worldwide, the landscape of AI policies is undergoing a notable expansion,
    marked by a surge in legal measures and legislative activities that mention ‘artificial
    intelligence’ (Maslej et al., 2023). In the United Kingdom, the Competition and
    Markets Authority (CMA) is actively engaged in a thorough review of AI, with a
    specific focus on addressing concerns surrounding misinformation and potential
    job disruptions (Milmo, 2023c). This comprehensive evaluation by the CMA is squarely
    directed at foundational models such as ChatGPT, aiming to foster healthy competition
    and ensure the protection of consumer interests (Milmo, 2023c). Ministers have
    tasked the CMA with a multifaceted mandate, encompassing safety, transparency,
    fairness, accountability and the potential for emerging players to challenge established
    AI entities (Milmo, 2023c). These initiatives underscore the mounting pressure
    on regulatory bodies to intensify their scrutiny of AI technologies. Simultaneously,
    the UK government is actively working on updating AI regulations to address potential
    risks (Stacey & Mason, 2023). On the other side of the Atlantic, the Vice President
    of the United States convened discussions with AI CEOs at the White House in May
    2023, with the primary focus on safety considerations (Milmo, 2023c). In parallel,
    both the Federal Trade Commission and the White House are conducting investigations
    into the far-reaching impacts of AI (Milmo, 2023c) (*Blueprint for an AI Bill
    of Rights*, n.d.). At a broader international level, the EU''s AI Act introduces
    a comprehensive and structured regulatory framework (‘EU AI Act: First Regulation
    on Artificial Intelligence’, 2023). This framework categorises AI applications
    according to varying levels of risk and seeks to establish itself as a global
    standard for promoting responsible AI practices (‘EU AI Act: First Regulation
    on Artificial Intelligence’, 2023). In July 2023, building upon the initiatives
    outlined earlier, a consortium of prominent technology firms, including OpenAI,
    Anthropic, Microsoft and Google (DeepMind''s owner), introduced the Frontier Model
    Forum (Milmo, 2023f). The forum claims that its primary objective is to stimulate
    AI safety research, establish benchmarks for model evaluation, advocate for the
    conscientious deployment of advanced AI, foster dialogue with policymakers and
    academics on trust and safety concerns and explore favourable applications of
    AI, such as combating climate change and detecting cancer (Milmo, 2023f). The
    Forum acknowledges that it has built upon the significant contributions of entities
    such as the UK government and the European Union in the realm of AI safety (Milmo,
    2023f). Additionally, it''s noteworthy that tech companies, particularly those
    leading the Frontier Model Forum, have recently reached agreements on new AI safeguards
    through conversations with the White House; these safeguards encompass initiatives
    such as watermarking AI content to identify deceptive materials like deepfakes
    and enabling independent experts to evaluate AI models (Milmo, 2023f). Indeed,
    it appears that developments are taking place within the realm of tech companies.
    However, the question that arises is whether we can have confidence in their commitment
    to fulfilling their pledges. Doubts persist among some. And this is not surprising
    given some of the things we have seen AI companies and individuals do and say.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 全球范围内，人工智能政策的格局正在经历显著的扩张，这标志着提及“人工智能”的法律措施和立法活动的激增（Maslej 等人，2023年）。在英国，竞争与市场管理局（CMA）正在积极进行对人工智能的全面审查，特别关注解决围绕虚假信息和潜在就业中断的担忧（Milmo，2023c）。CMA的这次全面评估直接针对基础模型，如ChatGPT，旨在促进健康竞争并确保保护消费者利益（Milmo，2023c）。部长们赋予CMA一个多方面的任务，包括安全、透明度、公平性、问责制以及新兴玩家挑战现有AI实体的潜力（Milmo，2023c）。这些举措凸显了监管机构加强对人工智能技术审查的压力。同时，英国政府正在积极更新人工智能法规，以应对潜在风险（Stacey
    & Mason，2023）。在大西洋彼岸，美国副总统于2023年5月在白宫召集了与AI首席执行官的讨论，主要关注安全考虑（Milmo，2023c）。与此平行，联邦贸易委员会和白宫都在调查人工智能的深远影响（Milmo，2023c）（*人工智能权利法案蓝图*，不详）。在更广泛的国际层面，欧盟的人工智能法案引入了一个全面和结构化的监管框架（“欧盟人工智能法案：关于人工智能的第一项法规”，2023）。该框架根据不同的风险水平对人工智能应用进行分类，并寻求成为促进负责任人工智能实践的全球标准（“欧盟人工智能法案：关于人工智能的第一项法规”，2023）。2023年7月，在之前概述的倡议的基础上，包括OpenAI、Anthropic、微软和谷歌（DeepMind的所有者）在内的知名科技公司联盟推出了前沿模型论坛（Milmo，2023f）。该论坛声称其首要目标是刺激人工智能安全研究，建立模型评估的基准，倡导高级人工智能的负责任部署，与政策制定者和学者就信任和安全问题进行对话，并探索人工智能的有利应用，如应对气候变化和检测癌症（Milmo，2023f）。论坛承认，它是在英国政府、欧盟等实体在人工智能安全领域的重大贡献的基础上建立的（Milmo，2023f）。此外，值得注意的是，科技公司，尤其是那些领导前沿模型论坛的公司，最近通过与白宫的对话达成了新的AI安全协议；这些协议包括水印AI内容以识别深度伪造等欺骗性材料，并允许独立专家评估AI模型（Milmo，2023f）。确实，似乎在科技公司领域正在发生一些发展。然而，一个问题随之而来，那就是我们是否可以对其履行承诺的承诺有信心。有些人对此表示怀疑，这并不令人惊讶，鉴于我们看到了一些AI公司和个人的所作所为和所说的话。
- en: For example, in October 2022, preceding the launch of ChatGPT, it was reported
    that Microsoft made a notable reduction in the size of its ethics and society
    team (Bellan, 2023). According to insider accounts, growing pressure from the
    CTO and CEO may have played a role in this decision, with the aim of getting the
    latest OpenAI models to customers as soon as possible (Bellan, 2023). Subsequently,
    in March 2023, it was reported that Microsoft decided to lay off the remaining
    members of this team (Bellan, 2023). Those within the team expressed a shared
    belief that these layoffs were likely influenced by Microsoft's intensified focus
    on rapidly releasing AI products to gain an edge over competitors, potentially
    leading to a reduced emphasis on long-term, socially responsible deliberations
    (Bellan, 2023). Despite this, it's important to note that Microsoft has retained
    its Office of Responsible AI, which carries the responsibility of setting ethical
    AI guidelines through governance and public policy initiatives (Bellan, 2023).
    Nevertheless, the action of dismantling the ethics and society team raises valid
    questions about the extent of Microsoft's commitment to authentically infusing
    ethical AI principles into its product design. Another instance emerged directly
    from the mouth of OpenAI CEO Sam Altman, who, just days after advocating for AI
    regulation in the US Congress voiced apprehension about the EU's efforts to regulate
    artificial intelligence (Ray, 2023). Altman expressed his belief that the EU AI
    Act's draft was excessive in its regulations and warned that OpenAI might withdraw
    its services from the region if compliance proved too challenging (Ray, 2023).
    This shift in stance was both sudden and significant, highlighting the considerable
    influence one individual can wield.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在2022年10月ChatGPT发布之前，据报道，微软对其伦理与社会团队规模进行了显著缩减（Bellan, 2023）。据内部人士透露，CTO和CEO日益增长的压力可能是这一决策的原因，目的是尽快将最新的OpenAI模型推向客户（Bellan,
    2023）。随后，在2023年3月，据报道，微软决定裁减该团队的剩余成员（Bellan, 2023）。团队内部成员普遍认为，这些裁员可能受到了微软加强快速发布AI产品以在竞争中取得优势的决策影响，这可能导致对长期、负责任的讨论的重视程度降低（Bellan,
    2023）。尽管如此，值得注意的是，微软保留了其负责任AI办公室，该办公室负责通过治理和公共政策倡议制定伦理AI指南（Bellan, 2023）。然而，解散伦理与社会团队的行动引发了关于微软将伦理AI原则真正融入产品设计承诺程度的合理质疑。另一个例子直接来自OpenAI首席执行官山姆·奥特曼的口中，他刚刚在美国国会倡导AI监管后不久，就表达了对欧盟监管人工智能努力的担忧（Ray,
    2023）。奥特曼表示，他对欧盟AI法案草案的监管过于严格，并警告称，如果合规性证明过于困难，OpenAI可能会从该地区撤回其服务（Ray, 2023）。这种立场的变化既突然又意义重大，凸显了个人可以产生的重要影响。
- en: It is precisely these instances of power and actions that raise concerns for
    Rumman Chowdhury, a notable figure in the AI domain. Chowdhury recognises recurring
    patterns in the AI industry, akin to the cases mentioned above, which she considers
    as warning signals (Aceves, 2023). One of the key issues she highlights is the
    common practice of entities calling for regulation while simultaneously using
    significant resources to lobby against regulatory laws, exerting control over
    the narrative (Aceves, 2023). This paradoxical approach hinders the development
    of robust and comprehensive regulatory frameworks that could ensure the responsible
    use of AI technologies. Moreover, Chowdhury emphasises that the lack of accountability
    is a fundamental issue in AI development and deployment (Aceves, 2023). She points
    out how internal risk analysis within companies often neglects moral considerations,
    focusing primarily on assessing risks and willingness to take them (Aceves, 2023),
    as we saw with Microsoft. When the potential for failure or reputational damage
    becomes significant, the playing field is manipulated to favour specific parties,
    providing them with an advantage due to their available resources (Aceves, 2023).
    This raises concerns about the concentration of power in the hands of a few, leading
    to potential bias and adverse consequences for the wider population. Chowdhury
    further highlights that unlike machines, individuals possess diverse and indefinite
    priorities and motivations, making it challenging to categorise them as inherently
    good or bad (Aceves, 2023). Therefore, to drive meaningful change, she advocates
    leveraging incentive structures and redistributing power sources in AI governance
    (Aceves, 2023). This would involve fostering collaboration among various stakeholders,
    including governments, industries, academia and civil society, to collectively
    address complex AI-related issues, promote cooperation and reach compromises on
    a large scale (Aceves, 2023). By doing so, she believes we can ensure that AI
    technologies are developed and deployed in a way that benefits society as a whole,
    rather than serving the interests of a select few. In addition to Chowdhury's
    concerns, Karen Hao, senior AI editor at MIT Technology Review, expresses serious
    reservations about the interconnection between advanced AI and the world's biggest
    corporations (Hao, 2020). She points out that, as the most sophisticated AI methods
    demand vast computational resources, only the wealthiest companies can afford
    to invest in and control such technologies and consequently, tech giants have
    significant influence not just on the direction of AI research but also on the
    creation and management of algorithms that impact our daily lives (Hao, 2020).
    These concerns highlight the critical importance of transparency, inclusivity
    and multi-stakeholder collaboration in shaping AI policies and regulations. The
    dialogue and actions surrounding AI governance must involve a diverse range of
    voices and perspectives to ensure that AI technologies are ethically developed,
    responsibly deployed and serve the collective interests of humanity. We return
    to these concerns later in this book. However, for now, our focus turns to the
    creation of a theoretical framework that will empower us to delve deeper into
    the complexities of AI.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 正是这些权力和行动的实例引起了人工智能领域知名人物Rumman Chowdhury的关注。Chowdhury认识到人工智能行业中反复出现的模式，类似于上述案例，她将其视为警示信号（Aceves,
    2023）。她强调的一个关键问题是，实体在呼吁监管的同时，又投入大量资源游说反对监管法律，对叙事施加控制（Aceves, 2023）。这种矛盾的方法阻碍了建立稳健和全面的监管框架，这些框架本可以确保人工智能技术的负责任使用。此外，Chowdhury强调，缺乏问责制是人工智能开发和部署中的一个基本问题（Aceves,
    2023）。她指出，公司内部的内部风险评估往往忽视道德考虑，主要关注评估风险和承担风险的意愿（Aceves, 2023），正如我们看到的微软的情况。当失败或声誉损害的可能性变得很大时，竞争场就会被操纵以有利于特定的当事人，使他们因可利用的资源而获得优势（Aceves,
    2023）。这引发了关于权力集中在少数人手中的担忧，可能导致潜在的偏见和对更广泛人群的不利后果。Chowdhury进一步强调，与机器不同，个人拥有多样且不确定的优先级和动机，这使得将他们归类为天生善良或邪恶变得具有挑战性（Aceves,
    2023）。因此，为了推动有意义的变革，她主张利用激励机制和重新分配人工智能治理中的权力来源（Aceves, 2023）。这包括促进政府、行业、学术界和民间社会等各方之间的合作，共同解决复杂的与人工智能相关的问题，促进合作并在大规模上达成妥协（Aceves,
    2023）。通过这样做，她相信我们可以确保人工智能技术以有利于整个社会的方式开发和部署，而不是服务于少数人的利益。除了Chowdhury的担忧之外，MIT
    Technology Review的高级人工智能编辑Karen Hao对高级人工智能与世界上最大的公司之间的相互关联表示严重的保留意见（Hao, 2020）。她指出，随着最复杂的人工智能方法需要庞大的计算资源，只有最富有的公司才能负担得起投资和控制这些技术，因此，科技巨头不仅对人工智能研究的方向有重大影响，而且对影响我们日常生活的算法的创建和管理也有重大影响（Hao,
    2020）。这些担忧突出了在塑造人工智能政策和法规中透明度、包容性和多利益相关者合作的关键重要性。围绕人工智能治理的对话和行动必须涉及各种声音和观点，以确保人工智能技术以道德的方式开发、负责任地部署，并服务于人类的共同利益。我们将在本书的后面回到这些担忧。然而，现在我们的焦点转向创建一个理论框架，这将使我们能够深入探讨人工智能的复杂性。
- en: Chapter 3
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第三章
- en: Theoretical Framework for Investigating ChatGPT's Role in Higher Education
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 研究ChatGPT在高等教育中作用的理论框架
- en: Exploring the Need for a Theoretical Framework
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索建立理论框架的必要性
- en: In our research study, we undertake an exploratory case study to investigate
    the potential impact of Chat Generative Pre-trained Transformer (ChatGPT) on the
    roles of students, instructors and institutions of higher education. This type
    of live experiment provides valuable real-life insights and allows us to validate
    theoretical considerations. However, before delving into the study, it is essential
    to establish our theoretical framework. Theoretical frameworks, grounded in philosophy,
    are commonly employed in postmodern qualitative research to examine diverse perspectives
    and interpretations of a phenomenon. They help align the research with its objectives,
    consider the influence of social and cultural factors on our understanding of
    reality and provide valuable insights from a critical standpoint. In our study,
    we have chosen the qualitative research paradigm to explore the subjective experiences
    and meanings associated with ChatGPT, aiming to understand its impact on various
    stakeholders within our institution. Based on this, we needed to choose theoretical
    frameworks that would comprehensively address both the sociopolitical implications
    and the personal lived experiences associated with ChatGPT's integration in higher
    education. To achieve this, we decided to adopt the theoretical frameworks of
    critical theory and phenomenology. Critical theory, with its focus on societal
    structures and power dynamics, offers a lens through which we can critically interrogate
    the larger implications of technology in educational settings. On the other hand,
    phenomenology, rooted in understanding human experiences, provides an avenue to
    delve into the individual and collective consciousness of stakeholders interacting
    with ChatGPT. The combined strength of both frameworks allows us to present a
    balanced and holistic view, capturing not only the macro-level impacts on institutional
    dynamics but also the micro-level nuances of personal experiences and interpretations.
    As our research advances, we employ these lenses to delve deeper into each theme
    as it emerges. This enables us to shed light on the broader implications of our
    research topic, gaining a comprehensive understanding of its significance.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的研究研究中，我们进行了一项探索性案例研究，以调查Chat Generative Pre-trained Transformer（ChatGPT）对学生、教师和高等教育机构角色的潜在影响。这种现场实验提供了宝贵的现实生活见解，并使我们能够验证理论考虑。然而，在深入研究之前，建立我们的理论框架是至关重要的。理论框架，基于哲学，在后现代定性研究中被普遍采用，以考察现象的多样视角和解释。它们有助于使研究与其目标保持一致，考虑社会和文化因素对我们对现实理解的影响，并从批判的角度提供有价值的见解。在我们的研究中，我们选择了定性研究范式来探索与ChatGPT相关的主体经验和意义，旨在理解它对我们机构内各利益相关者的影响。基于此，我们需要选择能够全面解决ChatGPT在高等教育中整合的社会政治含义和个人生活经历的理论框架。为了实现这一目标，我们决定采用批判理论和现象学的理论框架。批判理论，以其对社会组织结构和权力动态的关注，提供了一个视角，通过它可以批判性地质疑教育环境中技术的更广泛影响。另一方面，现象学，基于对人类经验的了解，提供了一个深入探讨与ChatGPT互动的利益相关者的个人和集体意识的途径。这两个框架的联合优势使我们能够提供一个平衡和全面的视角，不仅捕捉到对机构动态的宏观层面影响，还捕捉到个人经验和解释的微观层面细微差别。随着我们研究的深入，我们使用这些视角深入探讨每个主题，随着其出现。这使得我们能够阐明我们研究主题的更广泛含义，全面理解其重要性。
- en: 'Critical Theory and ChatGPT: Unpacking Power Dynamics and Social Structures'
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 批判理论与ChatGPT：剖析权力动态和社会结构
- en: 'Critical theory serves as a powerful theoretical framework that delves into
    power dynamics, social structures and ideologies to scrutinise and challenge prevailing
    systems of inequality and oppression. This approach aims to uncover the underlying
    social and political factors that shape our perception of reality, with the ultimate
    goal of empowering marginalised groups (Tyson, 2023). When considering the impact
    of ChatGPT on the various stakeholders within a university, critical theory becomes
    invaluable for several compelling reasons:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 批判理论是一个强大的理论框架，深入探讨权力动态、社会结构和意识形态，以审查和挑战现有的不平等和压迫体系。这种方法旨在揭示塑造我们现实感知的潜在社会和政治因素，最终目标是赋权边缘化群体（Tyson，2023）。在考虑ChatGPT对大学内各种利益相关者的影响时，批判理论因其几个令人信服的原因而变得非常有价值：
- en: '*Examining Power Dynamics*'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*考察权力动态*'
- en: Critical theory facilitates an exploration of how ChatGPT could either disrupt
    or reinforce power dynamics within educational environments. It provides a lens
    through which to uncover potential inequalities that might arise from technology's
    utilisation and encourages a thoughtful analysis of how these dynamics could influence
    the landscape of teaching and learning.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批判理论促进了对ChatGPT如何可能颠覆或加强教育环境中的权力动态的探索。它提供了一个视角，可以揭示技术利用可能产生的潜在不平等，并鼓励对这些动态如何影响教学和学习格局进行深思熟虑的分析。
- en: '*Redefining Instructor Roles*'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*重新定义教师角色*'
- en: The transformative potential of ChatGPT extends to reshaping the roles of instructors
    by offering automated responses and student assistance. Within this context, critical
    theory proves instrumental in dissecting how this shift might impact the authority,
    expertise and interaction dynamics between instructors and students. By prompting
    a critical examination, it opens the door to probing the implications and repercussions
    of such changes.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的变革潜力延伸到通过提供自动响应和学生辅助来重塑教师的角色。在这个背景下，批判理论在剖析这种转变可能如何影响教师与学生的权威、专业知识和互动动态方面发挥了关键作用。通过引发批判性审视，它打开了探究这些变化的影响和后果的大门。
- en: '*Reassessing Student Roles*'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*重新评估学生角色*'
- en: As students increasingly engage with artificial intelligence (AI)-powered tools
    like ChatGPT, their roles in the learning process are likely to evolve. Critical
    theory provides a framework for scrutinising how this transformation influences
    student agency, critical thinking and the development of independent learning
    skills. It invites an exploration of whether students become passive consumers
    of information or active participants in shaping their educational journey.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着学生越来越多地与ChatGPT等人工智能（AI）工具互动，他们在学习过程中的角色可能会发生变化。批判理论提供了一个框架来审视这种转变如何影响学生的能动性、批判性思维和独立学习技能的发展。它邀请人们探索学生是否会成为信息的被动消费者，还是成为塑造他们教育旅程的积极参与者。
- en: '*Institutional Implications*'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机构影响*'
- en: Critical theory's lens extends to encompass the broader landscape of higher
    education institutions as they integrate ChatGPT. It encourages a rigorous analysis
    of how institutional policies, structures and practices need to be reconsidered
    during the adoption of AI technologies. This introspection is vital for understanding
    how these changes may either reinforce or challenge existing power structures
    and inequalities within the educational ecosystem.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批判理论的视角扩展到涵盖高等教育机构在整合ChatGPT时的更广泛领域。它鼓励对在采用人工智能技术过程中，机构政策、结构和实践需要重新考虑的方式进行严格分析。这种内省对于理解这些变化可能如何加强或挑战教育生态系统中现有的权力结构和不平等至关重要。
- en: 'In order to enhance our understanding further, we decided to look into the
    works of renowned theorists in the field of critical theory: Clayton Christensen,
    Pierre Bourdieu and Karl Marx.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步加深我们的理解，我们决定研究批判理论领域的知名理论家的作品：克莱顿·克里斯滕森、皮埃尔·布迪厄和卡尔·马克思。
- en: Christensen's Disruptive Innovation and the Transformative Potential of ChatGPT
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 克里斯滕森的颠覆性创新与ChatGPT的变革潜力
- en: 'At the forefront of business strategy theory is Clayton Christensen''s seminal
    work, ‘*The Innovator''s Dilemma*’ (Christensen, 1997). Here, he introduces the
    world to ‘disruptive innovation’, a phenomenon where smaller companies with limited
    resources rise to challenge and eventually overtake well-established industry
    giants. Though their products might start in niche markets and initially appear
    inferior, they stand out because of their affordability and accessibility. Over
    time, these innovations gain traction, appealing to larger demographic and destabilising
    dominant market players. While Christensen''s disruptive innovation and critical
    theory might initially seem unconnected, a closer examination reveals intricate
    intersections. Central to disruptive innovation is the shift in power dynamics:
    start-ups not only challenge but occasionally dethrone established giants. This
    movement mirrors the principles of critical theory, which is deeply invested in
    studying power relations. Furthermore, disruptive innovations are characterised
    by their democratising potential. They transform products and services, once seen
    as exclusive luxuries, into accessible necessities. When viewed through critical
    theory, this democratisation process becomes even more compelling, offering insights
    into societal access and equity. Beyond market disruptions, Christensen, in collaboration
    with his colleagues, offers another analytical tool: the Theory of Jobs to be
    Done (Christensen et al., 2016). They suggest that consumers do not simply buy
    products or services for their features; they ‘hire’ them to perform specific
    tasks or ‘jobs’. These jobs can be functional, like using a phone to call, social,
    such as buying a luxury car to denote status or emotional, akin to purchasing
    a fitness tracker for the satisfaction it provides. By comprehending these jobs,
    companies can design better, more targeted products. However, staying relevant
    requires continual monitoring and adaptation, as these jobs can evolve.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 商业战略理论的尖端是克莱顿·克里斯滕森的开创性作品，《*创新者的窘境*》（Christensen, 1997）。在这里，他向世界介绍了“颠覆性创新”，这是一种现象，即资源有限的小公司崛起，挑战并最终超越根深蒂固的行业巨头。尽管他们的产品可能最初在利基市场中出现，并显得劣质，但它们因其可负担性和可及性而脱颖而出。随着时间的推移，这些创新获得了动力，吸引了更广泛的受众，并动摇了主导市场的玩家。虽然克里斯滕森的颠覆性创新和批判性理论最初可能看似不相关，但更深入的考察揭示了错综复杂的交汇点。颠覆性创新的核心是权力动态的转变：初创公司不仅挑战，有时甚至推翻了既有的巨头。这一运动反映了批判性理论的原则，该理论深入研究权力关系。此外，颠覆性创新以其民主化潜力为特征。它们将产品和服务从一度被视为专属奢侈品转变为可及的必需品。通过批判性理论的观点来看，这一民主化过程变得更加引人入胜，提供了关于社会接入和公平的见解。除了市场颠覆之外，克里斯滕森与他的同事共同提供了一种分析工具：完成工作理论（Christensen
    et al., 2016）。他们提出，消费者并非仅仅因为产品的特性而购买产品或服务；他们“雇佣”它们来完成特定的任务或“工作”。这些工作可以是功能性的，比如用手机打电话，社交的，比如购买豪华车以表明地位，或者情感的，类似于购买健身追踪器以获得满足感。通过理解这些工作，公司可以设计出更好、更有针对性的产品。然而，保持相关性需要持续的监控和适应，因为这些工作可能会演变。
- en: Applying Christensen's Theory of Jobs to be Done to investigate the impact of
    ChatGPT on various educational roles can provide valuable insights into the specific
    needs and motivations of stakeholders. By understanding the ‘jobs’ that ChatGPT
    may fulfil for each role, we can better analyse the potential effects on students,
    instructors and institutions of higher education. Regarding the role of the student,
    Christensen's theory can help us uncover the jobs that students aim to fulfil
    in their educational journey. ChatGPT may support students in researching and
    accessing information (functional job), promoting collaborative learning and peer
    interaction (social job) or enhancing their motivation and self-confidence (emotional
    job). Examining these jobs can shed light on how ChatGPT may influence students'
    learning experiences and outcomes. When it comes to the instructor, by applying
    the Theory of Jobs to be Done, we can examine the specific tasks and goals that
    instructors seek to accomplish in their role. ChatGPT may assist instructors in
    automating administrative tasks (functional job), facilitating student engagement
    and interaction (social job) or fostering creativity in lesson planning (emotional
    job). This understanding can guide the exploration of how ChatGPT may augment
    or transform the instructor's responsibilities. By analysing the jobs that institutions
    of higher education aim to fulfil, we can gain insights into how ChatGPT may impact
    their operations. This can include tasks such as enhancing accessibility and inclusivity
    (functional job), fostering innovation and collaboration across departments (social
    job) or adapting to evolving educational demands (emotional job). Understanding
    these jobs can inform strategic decisions regarding the integration and utilisation
    of ChatGPT within educational institutions. Therefore, we believe that melding
    Christensen's disruptive innovation with critical theory presents a multi-dimensional
    framework, as it allows for a comprehensive exploration of technologies, like
    ChatGPT, not just as tools but as potential game-changers in industry and society.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 将克里斯蒂安森的“完成工作”理论应用于研究ChatGPT对各种教育角色的冲击，可以提供对利益相关者具体需求和动机的宝贵见解。通过理解ChatGPT可能为每个角色完成的“工作”，我们可以更好地分析其对学生、教师和高等教育机构潜在的影响。关于学生的角色，克里斯蒂安森的理论可以帮助我们揭示学生在教育旅程中旨在完成的工作。ChatGPT可能支持学生在研究和获取信息（功能性工作）、促进协作学习和同伴互动（社交工作）或增强他们的动力和自信心（情感工作）。考察这些工作可以阐明ChatGPT可能如何影响学生的学习和成果。当谈到教师时，通过应用“完成工作”理论，我们可以检查教师在角色中寻求完成的具体任务和目标。ChatGPT可能帮助教师自动化行政任务（功能性工作）、促进学生的参与和互动（社交工作）或激发课程规划中的创造力（情感工作）。这种理解可以指导探索ChatGPT如何增强或转变教师的职责。通过分析高等教育机构旨在完成的工作，我们可以深入了解ChatGPT可能对其运营的影响。这可以包括增强可访问性和包容性（功能性工作）、促进跨部门的创新和协作（社交工作）或适应不断变化的教育需求（情感工作）。理解这些工作可以就ChatGPT在教育机构中的整合和利用方面的战略决策提供信息。因此，我们认为将克里斯蒂安森的颠覆性创新与批判性理论相结合，提供了一个多维框架，因为它允许对像ChatGPT这样的技术进行全面探索，而不仅仅是作为工具，而是作为行业和社会中潜在的变革者。
- en: ChatGPT Through Bourdieu's Societal Lens
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从布迪厄的社会视角看ChatGPT
- en: 'Our second theorist, Pierre Bourdieu, was a sociologist and philosopher whose
    work focused on the relationship between social structures, cultural practices
    and individuals'' behaviours. His theories of habitus, field and cultural capital
    provide a lens for understanding how social structures shape human behaviour and
    how individuals navigate these structures to achieve success (Webb et al., 2002).
    Bourdieu''s habitus theory posits that an individual''s environment shapes their
    habits, which unconsciously guide their thoughts, actions and preferences (Webb
    et al., 2002). These habits perpetuate social structures and contribute to the
    development and maintenance of power in social groups. His field theory emphasises
    the interplay between social structures and human agency, arguing that social
    reality is composed of various fields, each with its own set of rules and power
    relations (Webb et al., 2002). Bourdieu''s theory of capital suggests that social
    class is determined not only by economic factors but also by cultural and symbolic
    capital. He identifies three forms of capital: economic, cultural and social,
    which individuals in different social classes possess to maintain or improve their
    social status (Webb et al., 2002). Bourdieu (1982) argues that cultural capital,
    in its external form, appears as a self-contained and consistent entity. Although
    it has roots in historical actions, it follows its own distinct rules, overriding
    individual desires. This idea is clearly exemplified by language, which does not
    solely belong to any one individual or collective. Importantly, cultural capital
    is not just a theoretical construct; it has real-world, symbolic and tangible
    power. This power becomes evident when people harness and employ it in diverse
    cultural domains, from arts to sciences. In these fields, individuals'' success
    is often proportional to their understanding of this external form of capital
    and their inherent cultural resources. Regarding language, Pierre Bourdieu understood
    language as being not just a tool for communication but a form of capital he termed
    ‘linguistic capital’. Central to this notion is the interplay between ‘linguistic
    habitus’ and the ‘linguistic market’, which Bourdieu puts forward in the following
    formula:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的第二位理论家皮埃尔·布迪厄是一位社会学家和哲学家，他的研究集中在社会结构、文化实践与个人行为之间的关系。他的习惯性理论、场域理论和文化资本理论为理解社会结构如何塑造人类行为以及个人如何在这些结构中导航以实现成功提供了一个视角（Webb
    等人，2002年）。布迪厄的习惯性理论认为，个人的环境塑造了他们的习惯，这些习惯无意识地引导他们的思想、行动和偏好（Webb 等人，2002年）。这些习惯持续着社会结构，并为社会群体中权力的发展和维持做出了贡献。他的场域理论强调社会结构与人类行为之间的相互作用，认为社会现实由各种场域组成，每个场域都有其自身的规则和权力关系（Webb
    等人，2002年）。布迪厄的资本理论表明，社会阶级不仅由经济因素决定，还由文化和象征资本决定。他确定了三种资本形式：经济、文化和社会资本，不同社会阶级的个人拥有这些资本以维持或提高他们的社会地位（Webb
    等人，2002年）。布迪厄（1982年）认为，文化资本在其外在形式上表现为一个自足且一致的实体。尽管它根植于历史行动，但它遵循其自身的独特规则，超越了个人的欲望。这一观点在语言中得到了清晰的体现，语言并不属于任何单个个体或集体。重要的是，文化资本不仅仅是一个理论构建；它具有现实世界的、象征的和有形的权力。这种权力在人们利用它在各种文化领域，从艺术到科学中发挥作用时变得明显。在这些领域，个人的成功通常与他们对这种外部资本形式及其内在文化资源的理解成比例。关于语言，皮埃尔·布迪厄将语言理解为一个不仅仅是沟通工具的资本形式，他称之为“语言资本”。这一概念的核心是“语言习惯”与“语言市场”之间的相互作用，布迪厄在以下公式中提出了这一观点：
- en: Linguistic habitus + linguistic market = linguistic expression, speech
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 语言学习惯 + 语言学市场 = 语言学表达，言语
- en: At its core, Bourdieu's linguistic habitus reflects an individual's social history
    and is innate, being embodied within the individual (Bourdieu, 1986). This habitus,
    a product of societal conditions, dictates utterances tailored to specific social
    situations or markets. While one might be tempted to believe that knowledge of
    a language ensures effective communication, Bourdieu postulates that the actual
    execution of speech is governed by the situation's intrinsic rules – rules encompassing
    levels of formality and interlocutors' expectations (Bourdieu, 1978). This brings
    us to his concept of the ‘linguistic market’. Bourdieu believes it is not enough
    to simply speak a language correctly, one must also understand the sociolinguistic
    nuances of where and to whom one speaks (Bourdieu, 1978). This market is both
    tangible and elusive. At its most concrete, it involves familiar social rituals
    and a clear understanding of one's place in a social hierarchy. However, its abstract
    nature lies in the constantly evolving linguistic norms and the subconscious factors
    that influence our speech. Bourdieu's ‘linguistic capital’ encapsulates the tangible
    benefits that specific speakers can accrue (Bourdieu, 1978). Bourdieu's perspective
    accounts for scenarios where speech exists without genuine communication. Consider
    the ‘voice of authority’, where a speaker, backed by societal and institutional
    support, may say much while conveying little (Bourdieu, 1978, p. 80). Bourdieu
    believes linguistic capital is intrinsically tied to power dynamics. It shapes
    value judgements, allowing certain speakers to exploit language to their advantage.
    ‘Every act of interaction, every linguistic communication, even between two people,
    two friends, boy and girl, all linguistic interactions, are in a sense micro-markets
    which always remain dominated by the overall structures’ (Bourdieu, 1978, p. 83).
    Building on Bourdieu's insights, Webb et al. (2002) underscore language's role
    as a mechanism of power that is moulded by an individual's social standing. Interactions,
    verbal or otherwise, are reflective of the participants' societal positions. Bourdieu's
    emphasis on language as a reservoir of social capital is especially poignant.
    When perceived as a resource, language functions as a blend of cultural capital.
    This fusion can be leveraged to forge potent relationships, granting the speaker
    access to invaluable resources within communities or institutions (Webb et al.,
    2002). Bourdieu's cultural reproduction theory, or legacy theory, suggests that
    social inequalities persist from one generation to the next through the transmission
    of cultural values and practices (Webb et al., 2002). This transmission takes
    place through family upbringing, education and socialisation in different institutions.
    Bourdieu argues that the cultural practices and beliefs of the dominant class
    are legitimised and reinforced through the educational system, which acts as a
    significant tool for social reproduction (Webb et al., 2002).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，布迪厄的语言习惯反映了个人的社会历史，并且是固有的，存在于个体之中（布迪厄，1986）。这种习惯是社会条件的产物，决定了针对特定社会情境或市场的言语表达。虽然人们可能会倾向于认为对语言的了解确保了有效的沟通，但布迪厄提出，实际的语言执行受制于情境的内在规则——包括正式程度和对话者的期望（布迪厄，1978）。这引出了他的“语言市场”概念。布迪厄认为，仅仅正确地说一种语言是不够的，一个人还必须理解自己说话的社会语言学的细微差别（布迪厄，1978）。这个市场既是具体的又是难以捉摸的。在最具体的形式上，它涉及熟悉的社会仪式和对个人在社会等级中位置的明确理解。然而，其抽象性在于不断演变的语言规范和影响我们言语的无意识因素。布迪厄的“语言资本”概括了特定说话者可以积累的实质性利益（布迪厄，1978）。布迪厄的视角解释了存在没有真正沟通的言语的情况。考虑“权威之声”，一个说话者，在社会和制度支持的背后，可能说了很多，但传达的却很少（布迪厄，1978，第80页）。布迪厄认为语言资本与权力动态内在地联系在一起。它塑造了价值判断，使某些说话者能够利用语言为自己谋利。“每一次互动，每一次语言沟通，即使是两个人、两个朋友、男孩和女孩之间的沟通，在某种意义上都是微观市场，这些市场始终受制于整体结构”（布迪厄，1978，第83页）。在布迪厄的洞察基础上，韦伯等人（2002）强调了语言作为由个人社会地位塑造的权力机制的角色的作用。互动，无论是口头还是其他形式，都反映了参与者的社会地位。布迪厄对语言作为社会资本库的强调尤为深刻。当语言被视为一种资源时，它就成为了文化资本的混合体。这种融合可以用来建立强大的关系，使说话者能够获得社区或机构中宝贵的资源（韦伯等人，2002）。布迪厄的文化再生产理论，或遗产理论，表明社会不平等通过文化价值观和实践的传递从一代传到下一代（韦伯等人，2002）。这种传递是通过家庭教养、教育和不同机构中的社会化来实现的。布迪厄认为，主导阶级的文化实践和信仰通过教育体系得到合法化和加强，教育体系作为社会再生产的重要工具（韦伯等人，2002）。
- en: Applying Bourdieu's theory to investigate the impact of ChatGPT on various educational
    roles allows us to examine how social structures, cultural practices and individuals'
    behaviours intersect with the integration of this technology. Bourdieu's concepts
    of habitus, field, cultural capital and cultural reproduction can provide insights
    into the dynamics and potential consequences of ChatGPT regarding the role of
    students, instructors and institutions of higher education. Regarding the role
    of the student, with the introduction of ChatGPT, students may experience changes
    in their habitus and cultural capital. The technology may affect their learning
    practices, as well as their access to and utilisation of knowledge. ChatGPT's
    influence on language interactions and communication may shape the way students
    express themselves, engage with course materials and collaborate with peers. It
    may also impact students' relationship to authority and expertise, potentially
    challenging traditional hierarchies and sources of knowledge. ChatGPT's integration
    can impact the power dynamics within the educational field, as instructors navigate
    the interplay between their own habitus, cultural capital and the expectations
    and demands of using ChatGPT. The technology may alter the distribution of symbolic
    capital and redefine what knowledge and expertise are valued in the teaching profession.
    Instructors may need to negotiate their position and authority in relation to
    ChatGPT, potentially leading to a reconfiguration of the instructor's role and
    the skills required to be an effective educator. And finally, regarding the role
    of institutions of higher education, Bourdieu's theory suggests that the integration
    of ChatGPT may contribute to the cultural reproduction within institutions of
    higher education. It may perpetuate existing power structures by privileging certain
    forms of knowledge and communication. The use of ChatGPT may impact institutional
    practices, curriculum development and assessment methods. Therefore, institutions
    need to critically consider the potential consequences of adopting ChatGPT, and
    how it aligns with their educational goals, values and commitment to social equity.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 将布迪厄的理论应用于研究ChatGPT对各种教育角色的冲击，使我们能够审视社会结构、文化实践和个人行为如何与这一技术的整合相互交织。布迪厄的习性、场域、文化资本和文化再生产等概念可以为ChatGPT在学生、教师和高等教育机构角色方面的动态和潜在后果提供洞见。关于学生的角色，随着ChatGPT的引入，学生可能会经历其习性和文化资本的变化。这项技术可能会影响他们的学习实践，以及他们获取和利用知识的方式。ChatGPT对语言互动和沟通的影响可能会塑造学生表达自己、与课程材料互动以及与同伴合作的方式。它还可能影响学生对权威和专业知识的关系，可能挑战传统的等级和知识来源。ChatGPT的整合可能会影响教育领域内的权力动态，因为教师需要在自身习性、文化资本以及使用ChatGPT的期望和要求之间进行权衡。这项技术可能会改变象征资本的分配，并重新定义教学职业中哪些知识和专业知识受到重视。教师可能需要就ChatGPT相对于他们的位置和权威进行协商，这可能导致教师角色的重新配置以及有效教育者所需技能的重新定义。最后，关于高等教育机构的作用，布迪厄的理论表明，ChatGPT的整合可能有助于高等教育机构内的文化再生产。它可能会通过赋予某些知识形式和沟通方式特权来延续现有的权力结构。ChatGPT的使用可能会影响机构的实践、课程开发和评估方法。因此，机构需要批判性地考虑采用ChatGPT的潜在后果，以及它与他们的教育目标、价值观和对社会公平的承诺是否一致。
- en: Marx's Theory of Alienation in the Context of ChatGPT
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在ChatGPT背景下探讨马克思的异化理论
- en: 'Karl Marx, the renowned German philosopher, economist, sociologist and revolutionary
    socialist, stands as a pivotal figure in history. At the heart of his philosophy
    and social thought lies the concept of communism, an alternative socio-economic
    system advocating for collective ownership of property and resources, as opposed
    to private ownership (Elster, 1986). Being a revolutionary socialist, Marx believed
    in the need for a radical, profound change in the system through revolutionary
    means, rather than incremental reforms. Challenging static ideas of human nature,
    Marx proposed that it is continually moulded by historical and social circumstances
    (Elster, 1986). He placed labour at the forefront of societal structures, asserting
    it as the primary generator of all wealth (Elster, 1986). Marx pinpointed a critical
    concern of capitalism: the capital owners exploit workers by taking the surplus
    value produced by their labour (Elster, 1986). This exploitation seeds class struggle,
    primarily between the bourgeoisie, the capitalist class and the proletariat, the
    working class (Elster, 1986). He envisioned a future where the proletariat would
    overthrow the bourgeoisie, paving the way for a socialist society, with collective
    ownership and control of production means (Elster, 1986). While Marx''s theories
    highlighted the working class'' misbelief that their interests are aligned with
    the ruling class, a notion often termed ‘false consciousness’, it''s crucial to
    acknowledge that Marx never directly used this term (Althusser, 1971). Marx aimed
    his critique of political economy at uncovering the contradictions within capitalism,
    emphasising the role of material conditions, especially economic relationships,
    in crafting history (Elster, 1986). Capitalism, for Marx, was a phase in historical
    development, destined to transition to socialism and, ultimately, to communism
    (Elster, 1986). A significant pillar of Marx''s critique was the theory of alienation.
    He detailed how individuals under capitalism become distanced from the products
    of their labour, the labour process, their fellow humans and their innate creative
    potential (Mészáros, 2005). Workers, in the capitalist machinery, are stripped
    of control over production means, leading them to sell their labour for wages.
    Marx distinguished four alienation types: alienation from the created products,
    which become commodities controlled by the exploiting capitalists; alienation
    from the labour process, which becomes monotonous under the profit-driven motivations
    of capitalists; alienation from fellow workers, as capitalism promotes competition
    and individualism and alienation from one''s inherent creative essence, as the
    capitalist system reduces individuals to mere production tools (Mészáros, 2005).
    These facets of alienation give rise to societal issues such as inequality, exploitation
    and the breakdown of genuine human connections (Mészáros, 2005). To address these
    deep-rooted problems, Marx championed the abolition of private ownership of production
    means and the dawn of a classless society, where collective control empowers individuals
    to shape their work and its outcomes (Mészáros, 2005). In conclusion, Marx''s
    ideas paint a landscape deeply concerned with the intricate ties between economic
    mechanisms and societal interactions. His theories have had enduring impacts,
    resonating in various sociopolitical movements and analyses even in contemporary
    times. But how do these relate to ChatGPT?'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 卡尔·马克思，这位著名的德国哲学家、经济学家、社会学家和革命社会主义者，在历史上占据着关键地位。他的哲学和社会思想的核心是共产主义的概念，这是一种主张财产和资源集体所有制的替代性社会经济体系，与私有制相对立（Elster，1986）。作为一名革命社会主义者，马克思相信需要通过革命手段进行根本的、深刻的制度变革，而不是渐进的改革。挑战人类本性的静态观念，马克思提出，人的本质是不断由历史和社会环境塑造的（Elster，1986）。他将劳动置于社会结构的前沿，断言它是所有财富的主要创造者（Elster，1986）。马克思指出了资本主义的重大关切：资本家通过占有工人劳动产生的剩余价值来剥削工人（Elster，1986）。这种剥削导致了阶级斗争，主要是资产阶级、资本家和工人阶级之间的斗争（Elster，1986）。他设想了一个未来，在那里工人阶级将推翻资产阶级，为社会主义社会铺平道路，实现生产手段的集体所有和控制（Elster，1986）。虽然马克思的理论突出了工人阶级对他们的利益与统治阶级利益一致的错误认识，这种观点通常被称为“虚假意识”，但重要的是要认识到马克思从未直接使用过这个术语（Althusser，1971）。马克思将他的政治经济学批判旨在揭示资本主义的矛盾，强调物质条件，尤其是经济关系在塑造历史中的作用（Elster，1986）。对马克思来说，资本主义是历史发展中的一个阶段，注定要过渡到社会主义，最终过渡到共产主义（Elster，1986）。马克思批判的一个重要支柱是异化理论。他详细阐述了在资本主义下，个人如何与其劳动产品、劳动过程、同胞和内在的创造潜力疏远（Mészáros，2005）。在资本主义机器中，工人失去了对生产手段的控制，导致他们为了工资而出售自己的劳动。马克思区分了四种异化类型：对创造产品的异化，这些产品成为被剥削资本家控制的商品；对劳动过程的异化，在资本家利润驱动动机下变得单调乏味；对同伴工人的异化，因为资本主义促进了竞争和个人主义；以及对个人内在创造本质的异化，因为资本主义体系将个人降低为仅仅的生产工具（Mészáros，2005）。这些异化的方面导致了社会问题，如不平等、剥削和真正的人际关系的崩溃（Mészáros，2005）。为了解决这些根深蒂固的问题，马克思主张废除生产手段的私人所有制，迎来一个无阶级社会，在那里集体控制赋予个人塑造其工作和其成果的能力（Mészáros，2005）。总之，马克思的思想描绘了一幅深刻关注经济机制与社会互动之间复杂联系的图景。他的理论产生了持久的影响，即使在当代，也仍在各种社会政治运动和分析中产生共鸣。但这些都是如何与ChatGPT相关的呢？
- en: Karl Marx's framework on alienation underscores the relationship between workers
    and the essence of their labour. By applying this theory to the modern context
    of higher education, we can ascertain the potential consequences and implications
    of technologies like ChatGPT on students, instructors and institutions. For Marx,
    education could be considered a type of labour, where students invest effort to
    gain knowledge and skills. Introducing ChatGPT could reshape this dynamic, altering
    the student's relationship with their educational labour. While ChatGPT might
    grant swift access to information, which might be an advantage for collaborative
    research or independent study, an over-reliance could stifle students' critical
    thinking abilities and reduce active engagement in the learning process. And,
    although ChatGPT has the potential to democratise access to information, there's
    a growing concern that education could further become a commodity, exacerbating
    the gulf between economically diverse student groups, especially if quality educational
    tools become stratified based on purchasing power. Extending Marx's perspective
    to instructors, educators might feel estranged from their professional essence
    if ChatGPT or similar technologies encroach too deeply into their domain. Though
    ChatGPT could automate certain pedagogical tasks, potentially elevating the quality
    of education by allowing educators to concentrate on nuanced, human-centric aspects
    of teaching, there's a risk. If institutions prioritise technology over educators,
    it could lead to a form of professional alienation, relegating educators to secondary
    roles and potentially diminishing their perceived value in the educational process.
    Through a Marxist lens, the capitalist tendencies of institutions could be amplified
    with technologies like ChatGPT. These tools might be seen less as educational
    enhancements and more as cost-saving or profit-driving mechanisms. This could
    shift priorities from holistic education to market-driven objectives, echoing
    Marx's concerns about capitalist structures overshadowing true value. However,
    this does not have to happen. Ethical, student-centric integration of ChatGPT
    could lead to enriched collaborative experiences, blending traditional pedagogy
    with modern techniques. In essence, while ChatGPT and similar AI technologies
    hold vast potential for reshaping higher education, Marx's theory of alienation
    cautions us to think about the caveats. The challenge lies in ethically integrating
    these tools, focusing on augmenting human capabilities rather than sidelining
    them. It underscores the importance of continually reassessing institutional policies,
    emphasising the human aspect of education and ensuring that advancements in technology
    truly serve their primary stakeholders – the students, instructors and the broader
    educational community.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 卡尔·马克思关于异化的框架强调了工人与其劳动本质之间的关系。通过将这一理论应用于现代高等教育的背景，我们可以确定像ChatGPT这样的技术对学生、教师和机构可能产生的潜在后果和影响。对马克思来说，教育可以被视为一种劳动，学生通过投入努力来获取知识和技能。引入ChatGPT可能会改变这种动态，改变学生与他们的教育劳动之间的关系。虽然ChatGPT可能提供快速获取信息的能力，这可能对协作研究或独立学习有利，但过度依赖可能会抑制学生的批判性思维能力，并减少他们在学习过程中的积极参与。而且，尽管ChatGPT有可能使信息获取民主化，但越来越多的人担心教育可能会进一步成为一种商品，加剧经济多元学生群体之间的差距，尤其是如果优质教育工具根据购买力分层。将马克思的视角扩展到教师，如果ChatGPT或类似技术过于深入地侵入他们的领域，教育工作者可能会感到与他们的专业本质疏远。尽管ChatGPT可以自动化某些教学任务，通过允许教育工作者专注于教学的人性化、细微方面来提高教育质量，但存在风险。如果机构优先考虑技术而不是教育工作者，可能会导致一种职业异化，将教育工作者降为次要角色，并可能降低他们在教育过程中的感知价值。从马克思主义的角度来看，像ChatGPT这样的技术可能会放大机构的资本主义倾向。这些工具可能被视为更少的作为教育增强工具，而是作为节约成本或盈利的机制。这可能会将重点从全面教育转向市场驱动目标，呼应马克思对资本主义结构掩盖真正价值的担忧。然而，这种情况并不一定发生。ChatGPT的道德、以学生为中心的整合可以导致丰富的协作体验，将传统教学法与现代技术相结合。本质上，虽然ChatGPT和类似的人工智能技术具有重塑高等教育的巨大潜力，但马克思的异化理论提醒我们要考虑这些限制。挑战在于道德地整合这些工具，关注增强人类能力而不是边缘化它们。它强调了不断重新评估机构政策的重要性，强调教育的以人为本方面，并确保技术进步真正服务于其主要利益相关者——学生、教师和更广泛的教育社区。
- en: 'Phenomenology: Unveiling Insights into ChatGPT'
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现象学：揭示ChatGPT的洞察
- en: 'Phenomenology, as a theoretical framework, centres on comprehending the subjective
    experiences and the significances that individuals ascribe to them. It delves
    into the lived encounters of individuals, striving to unveil the core nature of
    phenomena as perceived by those engaged (Patton, 2002). In the context of examining
    the influence of ChatGPT on the roles of diverse stakeholders within a university,
    phenomenology offers a valuable theoretical approach with the following implications:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种理论框架，现象学集中于理解个体赋予主观经历的意义。它深入到个体的生活经历中，努力揭示那些参与其中的人所感知的现象的核心本质（Patton，2002）。在考察ChatGPT对大学内各种利益相关者角色影响的背景下，现象学提供了一个有价值的理论方法，具有以下影响：
- en: '*Exploration of Subjective Experiences*'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*主观经历的探索*'
- en: Phenomenology allows researchers to delve into the subjective experiences of
    individuals involved in teaching and learning with ChatGPT. It helps uncover the
    lived experiences, perceptions and emotions of students and teachers in relation
    to the technology.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现象学使研究人员能够深入到使用ChatGPT参与教学和学习的个体的主观经历中。它有助于揭示学生和教师与该技术相关的亲身经历、感知和情感。
- en: '*Understanding the Meaning-Making Process*'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*理解意义构建过程*'
- en: Phenomenology seeks to understand how individuals make sense of their experiences
    and the meanings they attach to them. In the context of ChatGPT, it can shed light
    on how students and teachers interpret and understand the technology's impact
    on their roles and the educational process as a whole.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现象学试图理解个体如何理解他们的经历以及他们赋予这些经历的意义。在ChatGPT的背景下，它可以帮助我们了解学生和教师如何诠释和理解技术对他们角色以及整个教育过程的影响。
- en: '*Examination of Changes in Teaching and Learning*'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*教学与学习变化的考察*'
- en: Phenomenology can help researchers explore how ChatGPT may affect the roles
    of teaching and learning by investigating possible required shifts in pedagogical
    practices and instructional strategies. It provides insights into the ways in
    which the technology may influence the interaction between students and instructors
    and the overall educational experience.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过调查可能需要的教学实践和教学策略的变化，现象学可以帮助研究人员探索ChatGPT可能如何影响教学和学习的角色。它提供了关于技术可能如何影响学生和教师之间的互动以及整体教育体验的见解。
- en: '*Uncovering New Possibilities and Constraints*'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*揭示新的可能性和限制*'
- en: Phenomenology enables researchers to identify both the opportunities and limitations
    presented by ChatGPT in education. It allows for an exploration of the potential
    benefits, such as increased access to information or personalised learning experiences,
    as well as the challenges, such as the potential reduction of human interaction
    surrounding AI technology.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现象学使研究人员能够识别ChatGPT在教育中提供的机遇和限制。它允许探索潜在的益处，如增加信息获取或个性化学习体验，以及挑战，如围绕人工智能技术的潜在人际互动减少。
- en: '*Emphasis on the Lived Experience*'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*强调生活体验*'
- en: Phenomenology places emphasis on the first-person perspective and the experiential
    knowledge of individuals. This focus aligns with the aim of understanding the
    lived experiences of students and instructors as they navigate the integration
    of ChatGPT.
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现象学强调第一人称视角和个体的经验知识。这种关注与理解学生和教师在整合ChatGPT过程中所经历的亲身经历的目标相一致。
- en: To enhance our understanding further, we looked into the works of one of the
    most famous theorists in phenomenological research, Martin Heidegger.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步加深我们的理解，我们研究了现象学研究中最著名的理论家之一马丁·海德格尔的作品。
- en: 'Heideggerian Reflections: AI and the Essence of Being'
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 海德格尔反思：人工智能与存在的本质
- en: Heidegger, a German philosopher, made significant contributions to phenomenology,
    hermeneutics and existentialism. Despite criticism for his affiliation with the
    Nazi Party, his philosophy offers valuable insights into the impact of technology
    on human relationships and our sense of authenticity and connectedness to the
    world (Inwood, 2019). At the core of Heidegger's philosophy is the concept of
    Dasein, which refers to human existence and its unique ability to question its
    own being (Girdher, 2019). Heidegger's philosophy emphasises the pre-existing
    understanding of the world that shapes human existence, known as ‘being-in-the-world’
    (Girdher, 2019). Heidegger's inquiry into the meaning of being revolves around
    what makes beings intelligible as beings. He distinguishes between ontical and
    ontological aspects, where ontical pertains to specific beings and ontological
    focuses on the underlying meaning of entities, referred to as the ‘Ontological
    Difference’ (Inwood, 2019). This distinction forms the basis of Fundamental Ontology,
    which aims to comprehend the meaning of being itself. Time is a crucial aspect
    of Heidegger's philosophy, not simply a linear sequence of events, but a fundamental
    aspect of all existence, shaping our understanding of the world and our place
    within it (Inwood, 2019). In Heidegger's philosophy, technology is seen as fundamentally
    transforming our relationship with the world, revealing and ordering it in a particular
    way, referred to as the ‘enframing’ or ‘challenging-forth’ nature of technology
    (Inwood, 2019). This perspective leads to a mode of being called ‘standing reserve’,
    where everything, including humans, is objectified and reduced to a means to an
    end (Inwood, 2019). He cautioned that this way of being obscures our authentic
    relationship with the world and disconnects us from our true nature (Inwood, 2019).
    However, Heidegger also acknowledged technology's potential for positive transformation,
    proposing a different approach characterised as ‘poetic dwelling’ or ‘releasement’
    (Bida, 2018). He introduced the concept of ‘readiness-to-hand’, describing our
    seamless interaction with tools and objects in everyday life, where tools become
    extensions of ourselves, allowing for a sense of flow and efficiency (Inwood,
    2019). In this view, technology should foster openness, attentiveness and a deeper
    connection with the world, revealing and enabling our engagement with it (Bida,
    2018). Heidegger's philosophy of technology significantly influences contemporary
    discussions on the ethical and existential dimensions of technology. It prompts
    us to reflect on the effects of technology on our lives, question the assumptions
    underlying our technological worldview, and explore alternative ways of relating
    to technology for a more meaningful and sustainable existence.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 海德格尔，一位德国哲学家，对现象学、诠释学和存在主义做出了重大贡献。尽管因与纳粹党的关系受到批评，但他的哲学为我们提供了关于技术对人际关系以及我们对世界真实性和与世界联系感的深刻见解（Inwood，2019）。海德格尔哲学的核心概念是Dasein，它指的是人类存在及其独特的质疑自身存在的能力（Girdher，2019）。海德格尔的哲学强调塑造人类存在的先验的世界理解，称为“在世界之中存在”（Girdher，2019）。海德格尔对存在意义的探究围绕着是什么使存在者成为可理解的存在。他区分了存在论和本体论方面，其中存在论与特定的存在者相关，而本体论则关注实体背后的基本意义，被称为“本体论差异”（Inwood，2019）。这种区分构成了基础本体论的基础，旨在理解存在本身的意义。时间在海德格尔的哲学中是一个关键方面，不仅仅是事件的线性序列，而是所有存在的根本方面，塑造了我们理解世界和我们在这个世界中的位置（Inwood，2019）。在海德格尔的哲学中，技术被视为从根本上改变我们与世界的关系，以特定的方式揭示和整理它，被称为技术的“框定”或“挑战性揭示”性质（Inwood，2019）。这种观点导致了一种被称为“站立储备”的存在方式，其中一切，包括人类，都被对象化并简化为达到目的的手段（Inwood，2019）。他警告说，这种方式的存在遮蔽了我们与世界真实的联系，使我们与我们的真实本质脱节（Inwood，2019）。然而，海德格尔也承认技术具有积极变革的潜力，提出了以“诗意居住”或“释放”为特征的另一种方法（Bida，2018）。他引入了“在手边”的概念，描述了我们在日常生活中与工具和物体的无缝互动，其中工具成为我们自身的延伸，使我们能够感受到流畅和效率（Inwood，2019）。从这种观点来看，技术应该促进开放性、注意力和与世界更深的联系，揭示并使我们能够与之互动（Bida，2018）。海德格尔的技术哲学对当代关于技术的伦理和存在维度的讨论产生了重大影响。它促使我们反思技术对我们生活的影响，质疑我们技术世界观背后的假设，并探索与技术的不同关系方式，以实现更有意义和可持续的存在。
- en: When considering the role of students, Heidegger's philosophy underscores their
    unique capacity to question their own being and the temporal nature of their existence.
    The presence of ChatGPT in education raises questions about students' relationship
    with knowledge. ChatGPT, as a tool for accessing information, may enhance the
    readiness-to-hand experience for students. By providing immediate and relevant
    responses to queries, ChatGPT can simplify the process of obtaining information,
    reducing cognitive load and enabling students to focus more on understanding and
    applying knowledge. However, with this comes a risk that excessive reliance on
    ChatGPT might lead to passive learning, diminishing students' inclination for
    exploration and critical thinking. To prevent this, students may need to reflect
    on the role of technology in their learning process and actively participate in
    shaping their understanding of being-in-the-world. In relation to instructors,
    Heidegger's concept of being-in-the-world suggests that their role is intertwined
    with their existence and understanding of the world. The introduction of ChatGPT
    may challenge their traditional role as the primary source of knowledge. This
    technology can assist them in preparing course materials, offering timely feedback
    and addressing common questions from students. However, it also raises questions
    about the readiness-to-hand experience of teaching. Instructors should be mindful
    of how their reliance on AI assistance might impact their authentic engagement
    with students and the learning process. Therefore, instructors may need to navigate
    the integration of technology in their teaching practices, re-evaluating their
    own relationship to knowledge and the facilitation of authentic learning experiences.
    As a result, the instructor's role may shift towards guiding students in their
    engagement with technology, fostering critical reflection and assisting students
    in uncovering their own understanding of being. The introduction of ChatGPT also
    prompts a re-evaluation of the temporal dimension of education for institutions
    of higher education. Institutions should critically assess how this technology
    aligns with their educational values and goals. They must reflect on the balance
    between efficiency and the time needed for meaningful learning experiences. This
    integration of AI technology could impact institutional structures, curriculum
    design and the overall educational environment. By integrating ChatGPT into higher
    education institutions, access to information and resources can be streamlined,
    potentially increasing efficiency and reducing administrative burdens. However,
    caution is necessary to avoid over-reliance on AI technology. Institutions must
    carefully consider the balance between efficiency and the temporal space required
    for genuine learning experiences. Additionally, they should ensure that AI integration
    preserves the readiness-to-hand experience for both students and instructors while
    also aligning with their educational values and objectives. This will help maintain
    a holistic and effective learning environment while embracing the advantages of
    AI technology. Therefore, in summary, by applying Heidegger's philosophy to the
    examination of ChatGPT in education, we can gain a deeper understanding of the
    potential implications for students, instructors and institutions. It prompts
    us to reflect on the existential and temporal dimensions of education, encouraging
    a critical evaluation of how technology can shape our relationship with knowledge,
    authenticity and our sense of being-in-the-world.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑学生的角色时，海德格尔的哲学强调他们质疑自身存在和存在时间性质的独特能力。ChatGPT在教育中的出现引发了关于学生与知识之间关系的疑问。作为获取信息的一种工具，ChatGPT可能增强学生的即手可用体验。通过提供即时和相关的回应，ChatGPT可以简化获取信息的过程，减少认知负荷，使学生能够更多地专注于理解和应用知识。然而，这也带来了一种风险，即过度依赖ChatGPT可能会导致被动学习，减少学生探索和批判性思考的倾向。为了防止这种情况，学生可能需要反思技术在他们的学习过程中的作用，并积极参与塑造他们对存在状态的认知。就教师而言，海德格尔的“在世界中存在”的概念表明，他们的角色与他们的存在和对世界的理解交织在一起。ChatGPT的引入可能挑战了他们作为知识主要来源的传统角色。这项技术可以帮助他们准备课程材料，提供及时的反馈，并回答学生常见的疑问。然而，这也引发了关于教学即手可用体验的问题。教师应该意识到他们对人工智能辅助的依赖可能如何影响他们与学生的真实互动和学习过程。因此，教师可能需要在他们的教学实践中导航技术的整合，重新评估他们与知识的关系以及促进真实学习体验的能力。因此，教师的角色可能转向指导学生在与技术互动中的参与，培养批判性反思，并帮助学生揭示他们自己对存在状态的认知。ChatGPT的引入也促使高等教育机构重新评估教育的时序维度。机构应批判性地评估这项技术与他们的教育价值观和目标的一致性。他们必须反思效率与有意义学习体验所需时间的平衡。这种人工智能技术的整合可能会影响机构结构、课程设计和整体教育环境。通过将ChatGPT整合到高等教育机构中，可以简化信息和资源的获取，可能提高效率并减少行政负担。然而，必须谨慎行事，避免过度依赖人工智能技术。机构必须仔细考虑效率与真实学习体验所需时间空间之间的平衡。此外，他们应确保人工智能的整合既保留了学生和教师即手可用体验，又与他们的教育价值观和目标相一致。这将有助于在拥抱人工智能技术优势的同时，保持全面有效的学习环境。因此，总的来说，通过将海德格尔的哲学应用于教育中ChatGPT的考察，我们可以更深入地理解对学生、教师和机构可能产生的潜在影响。这促使我们反思教育的存在和时序维度，鼓励对技术如何塑造我们与知识、真实性和我们存在状态的感知进行批判性评估。
- en: 'Within this chapter, we have constructed a theoretical foundation to facilitate
    the examination of ChatGPT and similar AI technologies. Our framework encompasses
    two key components: critical theory, which delves into power dynamics, social
    disparities and cultural conventions; and phenomenology, enabling an understanding
    of conscious experiences as perceived directly by individuals. In Chapter 6, we
    revisit these theories, using them as a guide to conduct a comprehensive analysis
    of our findings.'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们构建了一个理论框架，以促进对ChatGPT和类似人工智能技术的考察。我们的框架包括两个关键组成部分：批判理论，深入探讨权力动态、社会差异和文化传统；以及现象学，使人们能够理解个体直接感知到的意识体验。在第6章中，我们将回顾这些理论，并使用它们作为指导，对我们的发现进行全面分析。
- en: Chapter 4
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第四章
- en: 'Exploring ChatGPT''s Role in Higher Education: A Literature Review'
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索ChatGPT在高等教育中的作用：文献综述
- en: Defining the Scope of the Literature Review
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定文献综述的范围
- en: 'In this chapter, we present our literature review conducted in early April
    2023, where we utilised Google Scholar to search for articles focusing on ChatGPT''s
    impact on students, instructors and higher education. Our primary goal was to
    identify case studies exploring ChatGPT''s integration in educational settings
    to gain valuable insights into its practical implications. As ChatGPT had only
    been publicly released on 30 November 2022, just over 4 months before our literature
    review began, we expected a scarcity of case studies due to limited time for in-depth
    research and analysis. As anticipated, our search revealed limited literature
    related to actual case studies involving ChatGPT. However, what we did discover
    was an emerging trend in content and document analysis studies examining secondary
    sources like media releases and social media discussions. Additionally, we identified
    meta-literature reviews synthesising the growing body of research around ChatGPT,
    often including preprints due to its recent public appearance and the limited
    time for peer-reviewed publications on this topic. Furthermore, we found several
    user case studies focusing on the individual experiences of instructors and researchers
    experimenting with aspects of ChatGPT. Considering that we were particularly interested
    in the implementation of ChatGPT in educational settings, we limited our scope
    to papers released following its public launch on 30 November 2022, concentrating
    on the 4-month period leading up to the commencement of our research. After conducting
    our initial review, we selected nine papers that we deemed most relevant to our
    research questions. These papers were categorised into three groups: content and
    document analysis papers (three papers), literature review papers (two papers)
    and case studies focusing on user experiences (four papers). An overview of these
    is provided below.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们展示了我们在2023年4月初进行的文献综述，我们利用Google Scholar搜索了关注ChatGPT对学生、教师和高等教育影响的文章。我们的主要目标是确定探索ChatGPT在教育环境中整合的案例研究，以获得其实际影响的宝贵见解。由于ChatGPT仅在2022年11月30日公开发布，距离我们的文献综述开始仅超过4个月，我们预计案例研究将因深入研究与分析的时间有限而较少。正如预期的那样，我们的搜索揭示了与涉及ChatGPT的实际案例研究相关的有限文献。然而，我们发现了一个在内容与文档分析研究中出现的趋势，这些研究考察了次级来源，如媒体发布和社交媒体讨论。此外，我们还确定了综合围绕ChatGPT不断增长的研究文献的元文献综述，通常包括预印本，因为ChatGPT最近公开发布，以及关于这个主题同行评审出版物的时间有限。此外，我们还发现了几个关注教师和研究人员在ChatGPT方面进行实验的个人体验的用户案例研究。鉴于我们特别关注ChatGPT在教育环境中的实施，我们将范围限制在其2022年11月30日公开发布之后发布的论文上，集中在研究开始前4个月的时期。在完成初步审查后，我们选择了九篇我们认为与我们研究问题最相关的论文。这些论文被分为三类：内容与文档分析论文（三篇）、文献综述论文（两篇）和关注用户体验的案例研究（四篇）。以下是对这些论文的概述。
- en: Content and Document Analysis Papers on ChatGPT
  id: totrans-199
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT的内容与文档分析论文
- en: Analysing the Role of ChatGPT in Improving Student Productivity in Higher Education
  id: totrans-200
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析ChatGPT在提高高等教育学生生产力中的作用
- en: In their study, ‘Analysing the Role of ChatGPT in Improving Student Productivity
    in Higher Education’, Fauzi et al. (2023) aimed to explore the impact of ChatGPT
    on student productivity in higher education settings. Employing a qualitative
    research methodology, the researchers adopted a desk research approach and relied
    on secondary sources of information for data collection. By consulting various
    reference materials, including online media and journal databases, they guaranteed
    comprehensive coverage of relevant information related to ChatGPT's role in enhancing
    student productivity. During the data collection process, Fauzi et al. (2023)
    recorded relevant information, which they subsequently analysed using data reduction
    and data presentation techniques. Through simplifying, classifying and eliminating
    irrelevant data, they gained insights into ChatGPT's potential impact on student
    productivity. Their data presentation involved systematically organising it and
    using written discourse in the form of field notes to facilitate understanding
    and support the process of drawing conclusions. The study's findings revealed
    that ChatGPT holds the potential to contribute to various aspects of student productivity
    in higher education. Notably, ChatGPT provided valuable assistance to students
    by offering relevant information and resources for their assignments and projects.
    ChatGPT also assisted students in improving their language skills, grammar, vocabulary
    and writing style. Moreover, ChatGPT fostered collaboration among students, enabling
    effective communication, idea exchange and project collaboration. Additionally,
    it contributed to time efficiency and effectiveness by helping students organise
    their schedules, assignment due dates and task lists. Beyond that, ChatGPT served
    as a source of support and motivation for students, offering guidance on stress
    management and time and task management strategies. Based on their findings, Fauzi
    et al. (2023) propose several recommendations. Firstly, they suggest that students
    should use ChatGPT judiciously and critically evaluate the credibility of the
    information it provides. Secondly, they emphasise that educators and educational
    institutions should consider integrating ChatGPT into learning processes to enhance
    student productivity, while also maintaining a balanced approach that values human
    interaction and student engagement. Thirdly, they recommended that technology
    companies continue advancing and refining language models like ChatGPT to further
    contribute to the improvement of student productivity and online learning. Fauzi
    et al.'s (2023) study sheds light on the positive implications of ChatGPT in higher
    education, particularly its potential to enhance student productivity. However,
    it is essential to address the study's weaknesses, such as the heavy reliance
    on secondary sources and the limited exploration of other aspects of ChatGPT's
    impact on education. To strengthen the validity and reliability of findings, it
    is suggested that future research should consider incorporating primary research
    methods and conducting broader investigations.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们的研究《分析ChatGPT在提高高等教育学生生产力中的作用》中，Fauzi等人（2023年）旨在探讨ChatGPT在高等教育环境中对学生生产力的影响。采用定性研究方法，研究人员采用了桌面研究方法，并依赖次级信息来源进行数据收集。通过查阅各种参考资料，包括在线媒体和期刊数据库，他们确保了全面覆盖与ChatGPT在提高学生生产力方面相关信息的全面性。在数据收集过程中，Fauzi等人（2023年）记录了相关信息，随后他们使用数据缩减和数据展示技术进行分析。通过简化、分类和消除无关数据，他们获得了ChatGPT对学生生产力潜在影响的见解。他们的数据展示涉及系统地组织数据，并使用形式为田野笔记的书面话语来促进理解和支持得出结论的过程。该研究的发现揭示了ChatGPT在高等教育学生生产力的各个方面具有潜在的贡献。值得注意的是，ChatGPT通过为学生提供相关信息和资源，为他们的作业和项目提供了宝贵的帮助。ChatGPT还帮助学生提高他们的语言技能、语法、词汇和写作风格。此外，ChatGPT促进了学生之间的合作，使有效沟通、思想交流和项目协作成为可能。此外，它通过帮助学生安排日程、作业截止日期和任务列表，提高了时间效率和有效性。除此之外，ChatGPT还作为学生支持和动力的来源，提供有关压力管理和时间及任务管理策略的指导。基于他们的发现，Fauzi等人（2023年）提出了几项建议。首先，他们建议学生应谨慎使用ChatGPT，并批判性地评估其提供信息的可信度。其次，他们强调教育工作者和教育机构应考虑将ChatGPT整合到学习过程中，以提高学生生产力，同时保持一种平衡的方法，重视人际互动和学生参与。第三，他们建议技术公司继续推进和改进像ChatGPT这样的语言模型，以进一步促进学生生产力和在线学习质量的提高。Fauzi等人（2023年）的研究揭示了ChatGPT在高等教育中的积极影响，特别是其提高学生生产力的潜力。然而，解决该研究的弱点，如对次级信息的过度依赖和对ChatGPT对教育其他方面影响探索的有限性，是至关重要的。为了加强发现的效度和可靠性，建议未来的研究应考虑采用初级研究方法并进行更广泛的调查。
- en: Fauzi et al.’s (2023) paper is of significant importance to our study, as it
    directly addresses our research topic on how ChatGPT may affect the roles of students,
    instructors and institutions of higher education. This paper adds value to our
    understanding of the research topic in several key ways.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: Fauzi等人（2023）的论文对我们研究具有重大意义，因为它直接针对我们的研究主题，即探讨ChatGPT可能如何影响学生、教师和高等教育机构的作用。这篇论文以几种关键方式增加了我们对研究主题的理解。
- en: '*Focus on Student Productivity*'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*关注学生生产力*'
- en: The paper provides a specific examination of the impact of ChatGPT on student
    productivity in higher education. It offers relevant insights into the role of
    ChatGPT in influencing student learning outcomes and academic performance through
    various means of support.
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 论文对ChatGPT对高等教育中学生生产力的影响进行了具体分析。它通过各种支持方式提供了关于ChatGPT在影响学生学习成果和学术表现中所起作用的有关见解。
- en: '*Practical Recommendations*'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*实际建议*'
- en: The study's recommendations offer valuable guidance for educators and institutions
    seeking to effectively integrate ChatGPT into learning processes while maintaining
    a balance with human interaction and personalised instruction.
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究的建议为寻求在保持人际互动和个性化指导平衡的同时，有效整合ChatGPT到学习过程中的教育者和机构提供了宝贵的指导。
- en: '*Broader Implications*'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*更广泛的影响*'
- en: While focusing on student productivity, the study indirectly informs our research
    on the roles of instructors and higher education institutions. It illustrates
    how students' interactions with ChatGPT may influence instructors' teaching practices
    and institutional approaches to supporting student learning and academic success.
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然研究关注学生生产力，但它间接地为我们关于教师和高等教育机构作用的研究提供了信息。它说明了学生与ChatGPT的互动如何可能影响教师的授课实践和机构支持学生学习及学术成功的策略。
- en: Overall, Fauzi et al.’s (2023) findings and recommendations offer valuable guidance
    for navigating the integration of ChatGPT effectively, while also raising important
    considerations for examining the roles of instructors and higher education institutions
    in the context of artificial intelligence (AI)-driven technologies.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，Fauzi等人（2023）的研究发现和建议为有效导航ChatGPT的整合提供了宝贵的指导，同时也提出了在人工智能（AI）驱动技术背景下考察教师和高等教育机构作用的重要考虑。
- en: Open AI in Education, the Responsible and Ethical Use of ChatGPT Towards Lifelong
    Learning
  id: totrans-210
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 教育中的Open AI，ChatGPT的负责任和道德使用以促进终身学习
- en: 'David Mhlanga''s 2023 article, ‘Open AI in Education: The Responsible and Ethical
    Use of ChatGPT Towards Lifelong Learning’, employs document analysis, reviewing
    various sources, including news outlets, blog posts, published journal articles
    and books (Mhlanga, 2023). For the research, Mhlanga conducted a global search
    to identify papers that investigated OpenAI, the principles of responsible AI
    use in education and the ethical implications of AI in education (Mhlanga, 2023).
    From this search, he selected 23 publications that served as his primary sources,
    from which he derived a number of key themes. One of these key themes revolves
    around the challenges associated with using ChatGPT in education, in which he
    warns against the use of ChatGPT for grading written tasks, as it may threaten
    conventional methods of assessment, such as essays. Additionally, he raises concerns
    that students might outsource their work to ChatGPT, making it harder to detect
    instances of plagiarism. Despite these challenges, Mhlanga believes that a blanket
    ban on ChatGPT might not be the best approach. Instead, he urges educators and
    policymakers to address these challenges thoughtfully while considering the potential
    benefits of ChatGPT in education. Despite his concerns, Mhlanga also highlights
    various opportunities that ChatGPT brings, suggesting that the ability of ChatGPT
    to generate essays and written content can be a powerful tool to enhance learning.
    In addition, he suggests it can be used to improve assessment procedures, foster
    student collaboration and engagement and facilitate experiential learning. While
    Mhlanga acknowledges that ChatGPT can be disruptive, he also opines that it presents
    an excellent opportunity to modernise and revolutionise education (Mhlanga, 2023).
    However, if implementing ChatGPT in educational settings, Mhlanga emphasises the
    importance of adhering to responsible and ethical practices, noting that protecting
    the privacy of users'' data is paramount, and students must be informed about
    data collection, usage and security measures. Similarly, he warns that the responsible
    use of ChatGPT requires addressing potential biases and ensuring fairness and
    non-discrimination, particularly in grading and evaluation. Mhlanga also underscores
    that ChatGPT should not be viewed as a replacement for human teachers but rather
    as a supplement to classroom instruction. This is because he believes human instructors
    play a crucial role in understanding students'' unique needs, fostering creativity
    and providing hands-on experiences that ChatGPT cannot replicate (Mhlanga, 2023).
    Furthermore, Mhlanga points out some of the limitations of ChatGPT, such as its
    inability to comprehend the context surrounding students, such as their culture
    and background. He believes this limitation makes ChatGPT unsuitable for providing
    personalised and experiential education, which, he notes, is essential for students''
    holistic learning. Therefore, he suggests that educators must educate their students
    about ChatGPT''s limitations and encourage them to critically evaluate its output
    (Mhlanga, 2023). To ensure ethical AI use in education, Mhlanga suggests that
    transparency is crucial. Therefore, he suggests offering open forums, workshops
    and discussion groups for students and teachers to understand how ChatGPT functions
    and its capabilities. For Mhlanga, transparency should include informing students
    about the algorithms and data sources used and potential biases in the technology.
    He also believes it is essential to prioritise the adoption of open-source or
    transparent AI technology to provide access to the source code and underlying
    data. He believes that by educating students about AI''s limitations and potential
    biases, we can empower them to use the technology responsibly (Mhlanga, 2023).
    Additionally, Mhlanga emphasises the significance of accuracy in education, noting
    that ensuring AI-generated content is accurate and reliable is essential to prevent
    misconceptions and misinformation among students. Therefore, he states that critical
    thinking and fact-checking must be encouraged when using AI tools in the educational
    process (Mhlanga, 2023).'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '大卫·姆兰加（David Mhlanga）2023年的文章《Open AI in Education: The Responsible and Ethical
    Use of ChatGPT Towards Lifelong Learning》采用了文献分析法，审查了包括新闻媒体、博客文章、已发表的期刊文章和书籍在内的各种来源（Mhlanga,
    2023）。为了进行研究，姆兰加进行了全球搜索，以识别研究OpenAI、教育中负责任AI使用原则以及AI在教育中的伦理影响的论文（Mhlanga, 2023）。从这次搜索中，他选择了23篇出版物作为他的主要来源，从中提炼出了一些关键主题。其中之一的关键主题围绕着在教育中使用ChatGPT所面临的挑战，他警告说，使用ChatGPT来评分书面任务可能会威胁到传统的评估方法，如论文。此外，他还提出了担忧，认为学生可能会将他们的工作外包给ChatGPT，这使得检测剽窃行为变得更加困难。尽管存在这些挑战，姆兰加认为全面禁止ChatGPT可能不是最佳方法。相反，他敦促教育工作者和政策制定者深思熟虑地应对这些挑战，同时考虑ChatGPT在教育中的潜在益处。尽管有这些担忧，姆兰加也强调了ChatGPT带来的各种机会，建议ChatGPT生成论文和书面内容的能力可以成为增强学习的强大工具。此外，他还建议它可以用于改进评估程序、促进学生的协作和参与以及促进体验式学习。虽然姆兰加承认ChatGPT可能会造成干扰，但他也认为它为现代化和革命化教育提供了一个极好的机会（Mhlanga,
    2023）。然而，如果在教育环境中实施ChatGPT，姆兰加强调遵守负责任和道德实践的重要性，指出保护用户数据隐私至关重要，学生必须了解数据收集、使用和安全措施。同样，他警告说，负责任地使用ChatGPT需要解决潜在的偏见，并确保公平和非歧视，特别是在评分和评估方面。姆兰加还强调，ChatGPT不应被视为替代人类教师，而应被视为课堂教学的补充。这是因为他认为人类教师在理解学生的独特需求、培养创造力和提供ChatGPT无法复制的动手经验方面发挥着至关重要的作用（Mhlanga,
    2023）。此外，姆兰加指出ChatGPT的一些局限性，例如它无法理解学生周围的环境，如他们的文化和背景。他认为这一局限性使得ChatGPT不适合提供个性化的体验式教育，而他指出，这种教育对于学生的全面发展至关重要。因此，他建议教育工作者必须教育学生关于ChatGPT的局限性，并鼓励他们批判性地评估其输出（Mhlanga,
    2023）。为确保教育中AI的道德使用，姆兰加认为透明度至关重要。因此，他建议为学生和教师提供开放的论坛、研讨会和讨论小组，以了解ChatGPT的功能和其能力。对于姆兰加来说，透明度应包括向学生告知所使用的算法和数据来源以及技术中的潜在偏见。他还认为，优先采用开源或透明AI技术，以提供访问源代码和底层数据至关重要。他认为，通过教育学生关于AI的局限性和潜在偏见，我们可以赋权他们负责任地使用这项技术（Mhlanga,
    2023）。此外，姆兰加强调了教育中准确性的重要性，指出确保AI生成的内容准确可靠对于防止学生在误解和错误信息中至关重要。因此，他声明，在教育过程中使用AI工具时必须鼓励批判性思维和事实核查（Mhlanga,
    2023）。'
- en: Mhlanga's findings highlight the challenges and opportunities associated with
    using AI in educational settings and emphasise the importance of responsible and
    transparent practices. The study underscores the need to educate students and
    instructors about AI's limitations and potential biases and stresses the irreplaceable
    role of human teachers in the learning process. Overall, Mhlanga's research offers
    valuable insights into the impact of ChatGPT on students, instructors and higher
    education institutions, addressing key aspects of our research question. However,
    it is suggested that further research be conducted to expand the sample size as
    well as considering AI's broader applications in education.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: Mhlanga的研究突出了在教育环境中使用人工智能所带来的挑战和机遇，并强调了负责任和透明实践的重要性。研究强调了教育学生和教师了解人工智能的局限性和潜在偏见，并强调了人类教师在学习过程中的不可替代作用。总的来说，Mhlanga的研究为ChatGPT对学生、教师和高等教育机构的影响提供了宝贵的见解，解决了我们研究问题的关键方面。然而，建议进行进一步的研究，以扩大样本量，并考虑人工智能在教育中的更广泛应用。
- en: 'Mhlanga''s (2023) study is relevant to our research in the following ways:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: Mhlanga（2023）的研究以以下方式与我们的研究相关：
- en: '*Challenges and Opportunities for Education*'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*教育的挑战与机遇*'
- en: Mhlanga's research identifies both challenges and opportunities in using ChatGPT
    for education. Understanding these aspects can help inform how students and instructors
    should approach and leverage ChatGPT in educational settings. The concerns about
    potential plagiarism and the need for educators to adapt their assessment methods
    highlight the challenges institutions may face while implementing AI tools. Conversely,
    the opportunities presented by ChatGPT, such as improved assessment procedures
    and innovative teaching approaches, can inspire educators to explore its integration
    in a responsible manner.
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mhlanga的研究确定了在教育中使用ChatGPT所面临的挑战和机遇。了解这些方面可以帮助指导学生和教师如何以何种方式利用ChatGPT在教育环境中。关于潜在剽窃的担忧和教育者需要调整评估方法的需求突显了机构在实施AI工具时可能面临挑战。相反，ChatGPT带来的机遇，如改进的评估程序和创新的教学方法，可以激励教育者以负责任的方式探索其整合。
- en: '*Complementing Human Instructors*'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*补充人类教师*'
- en: Mhlanga's findings suggest that ChatGPT should not replace human teachers but
    rather supplement their efforts. This aligns well with our research question about
    the roles of students and instructors in the AI-driven educational landscape.
    Gaining insights into how ChatGPT can facilitate and improve human instruction
    can provide valuable guidance for instructors to adjust their teaching approaches
    and for students to effectively engage with AI technologies.
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mhlanga的研究结果表明，ChatGPT不应取代人类教师，而应补充他们的努力。这与我们关于学生在人工智能驱动的教育格局中角色的研究问题非常吻合。深入了解ChatGPT如何促进和改进人类教学可以为教师调整教学方法以及学生有效参与人工智能技术提供宝贵的指导。
- en: '*Limitations and Awareness*'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*局限性与意识*'
- en: Mhlanga's research underscores the importance of educating students about the
    limitations of ChatGPT. Understanding AI's capabilities and limitations is essential
    for students to critically evaluate AI-generated content and use the technology
    effectively. This aspect is highly relevant to our research regarding how students
    may interact with and perceive AI tools like ChatGPT.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mhlanga的研究强调了教育学生了解ChatGPT局限性的重要性。了解人工智能的能力和局限性对于学生批判性地评估人工智能生成的内容并有效地使用这项技术至关重要。这一方面与我们关于学生如何互动和感知像ChatGPT这样的AI工具的研究高度相关。
- en: '*Integration and Adaptation*'
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*整合与适应*'
- en: Mhlanga's (2023) study's focus on challenges and opportunities for integrating
    ChatGPT in education can inform how higher education institutions adapt to the
    AI-driven landscape. Understanding the potential disruptions and benefits can
    help institutions make informed decisions about adopting AI technologies.
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mhlanga（2023）的研究聚焦于将ChatGPT整合到教育中的挑战和机遇，这可以为高等教育机构如何适应由人工智能驱动的格局提供信息。了解潜在的干扰和好处可以帮助机构在采用人工智能技术时做出明智的决定。
- en: '*Scope for Further Research*'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*进一步研究的范围*'
- en: Mhlanga's article encourages further research and debate on the responsible
    use of AI in education. This aligns with our research goal of exploring the broader
    implications of AI on students, instructors and educational institutions. Our
    research can expand on Mhlanga's findings and delve into specific use cases and
    best practices for AI integration in education.
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mhlanga的文章鼓励进一步研究并就AI在教育中的负责任使用进行辩论。这与我们探索AI对学生、教师和教育机构更广泛影响的研究目标相一致。我们的研究可以扩展Mhlanga的发现，深入研究AI在教育中具体的应用案例和最佳实践。
- en: In conclusion, David Mhlanga's 2023 article is highly relevant to our research,
    as it provides valuable insights into the responsible and ethical implementation
    of ChatGPT in education. The study addresses key aspects of how ChatGPT affects
    students, instructors and higher education institutions, offering relevant perspectives
    on challenges, opportunities, ethical considerations and potential future directions.
    It serves as a foundation for understanding the implications of AI in education
    and can guide institutions in navigating the AI-driven educational landscape responsibly.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，David Mhlanga的2023年文章对我们研究高度相关，因为它提供了关于ChatGPT在教育中负责任和道德实施的宝贵见解。该研究解决了ChatGPT如何影响学生、教师和高等教育机构的关键方面，提供了关于挑战、机遇、伦理考虑和潜在未来方向的有关观点。它作为理解AI在教育中影响的基础，并可以指导机构在负责任地导航AI驱动的教育景观。
- en: 'ChatGPT in Higher Education: Considerations for Academic Integrity and Student
    Learning'
  id: totrans-225
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 高等教育中的ChatGPT：关于学术诚信和学生学习的考虑因素
- en: 'Sullivan et al.''s (2023) article titled ‘ChatGPT in higher education: Considerations
    for academic integrity and student learning’ presents an investigation into the
    disruptive effects of ChatGPT on higher education. Their study focuses on two
    main areas: analysing key themes in news articles related to ChatGPT in the context
    of higher education and assessing whether ChatGPT is portrayed as a potential
    learning tool or an academic integrity risk. Their research methodology involved
    conducting a content analysis of 100 media articles from Australia, New Zealand,
    the United States and the United Kingdom using specific search terms, which were
    then imported into EndNote and subsequently Nvivo for analysis. The authors followed
    a content analysis guidebook, refining a preliminary codebook and coding the articles
    based on identified themes. They also examined how various stakeholders, including
    university staff, students and ChatGPT, were represented in the media. To assess
    sentiment and word usage, they employed Nvivo''s Sentiment Analysis and Query.
    Overall, a number of themes emerged from the analysis. The authors found that
    the articles mainly focused on concerns related to academic integrity, particularly
    regarding cheating, academic dishonesty and misuse facilitated by AI, such as
    ChatGPT. Instances of using ChatGPT for cheating on university entrance exams
    were also identified. Educating students about AI''s impact on academic integrity
    and setting clear guidelines was highlighted as crucial. The articles also explored
    universities'' efforts to detect AI use in assignments, mentioning various tools
    like OpenAI''s Open Text Classifier, Turnitin, GPTZero, Packback, HuggingFace
    and AICheatCheck. However, some scepticism was expressed about the accuracy and
    sophistication of these detection technologies, with academics relying on their
    familiarity with students'' work and detecting shifts in tone to identify AI-generated
    content. In their study, Sullivan et al. (2023) also identified a significant
    theme concerning strategies to discourage the use of ChatGPT in education. Many
    articles discussed universities adjusting their courses, syllabi or assignments
    to minimise susceptibility to ChatGPT-generated content, often opting for invigilated
    examinations. However, some argued against relying solely on exams, suggesting
    task redesign to promote authenticity and assess critical thinking. The analysis
    also highlighted concerns about ChatGPT''s proneness to errors, limitations and
    its impact on learning outcomes. Additionally, articles raised copyright, privacy
    and security concerns related to student data. Interestingly, some articles emphasised
    the inherent connection between learning and writing, underscoring the role of
    writing in exploring and solidifying thoughts on various subjects. Other concerns
    included the potential decline in critical thinking skills due to overreliance
    on AI for coursework completion, which may undermine genuine educational growth.
    In addition, Sullivan et al. (2023) found that a higher number of articles made
    references to institutions or departments that had imposed bans on ChatGPT compared
    to those allowing its use. However, they observed that the most commonly discussed
    response was the indecisiveness of certain universities regarding their policies.
    These universities were described as ‘updating’, ‘reviewing’ and ‘considering’
    their policies, reflecting a cautious approach due to the rapidly evolving nature
    of the situation. In the absence of official institutional policies, several articles
    mentioned that individual academic staff members would develop revised policies
    on a course-by-course basis. The researchers also noted that universities that
    had chosen to prohibit the use of ChatGPT had already updated their academic integrity
    policy or honour code, or they believed that AI use was already prohibited based
    on existing definitions of contract cheating. On the other hand, in cases where
    universities permitted the use of ChatGPT, it often came with the requirement
    to adhere to strict rules, including the disclosure or acknowledgement of its
    use in assignments. Additionally, the researchers highlighted that two articles
    clarified that while a specific university did not impose a ban on ChatGPT, individual
    academic staff members still had the discretion to prohibit its use in certain
    assessments or units. Furthermore, Sullivan et al. (2023) found that a significant
    portion of the analysed articles discussed integrating ChatGPT into teaching practices.
    These articles advocated for meaningful integration of AI in teaching and suggested
    specific ways to incorporate ChatGPT into assignment tasks, such as idea generation
    and feedback on student work. Various applications for ChatGPT in the learning
    experience were proposed, including personalised assignments, code debugging assistance,
    generating drafts, providing exemplar assignments and more. The articles acknowledged
    the difficulties of banning ChatGPT and recognised its relevance in future workplaces.
    Enforcing a complete ban was deemed impractical, leading to debates on investing
    in AI detection systems. ChatGPT was likened to calculators or Wikipedia, highlighting
    its disruptive nature. However, specific ways AI would be employed in the workplace
    were not extensively explored. The researchers noted a lack of focus on using
    ChatGPT to enhance equity outcomes for students. Few articles discussed mitigating
    anxiety or supporting accessibility challenges on campus. They also highlight
    that there was limited mention of ChatGPT''s potential to improve writing skills
    for non-native speakers and promote a more equitable learning environment. They
    note that only one article touched briefly on disability-related considerations
    and AI''s potential to empower individuals with disabilities. Regarding voices,
    Sullivan et al. (2023) found that university figures, including leaders, coordinators,
    researchers and staff, were extensively quoted in the media, with nearly half
    of the articles citing three or more representatives from respective institutions.
    In contrast, student voices were relatively underrepresented, appearing in only
    30 articles, and only seven of those included quotes from more than three students.
    Some articles focused on Edward Tien, the student behind ChatGPT Zero, while others
    used survey data to represent the collective student voice.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: Sullivan等人（2023）的文章《ChatGPT在高等教育中的影响：学术诚信与学生学习的考量》对ChatGPT对高等教育的颠覆性影响进行了调查。他们的研究集中在两个主要领域：分析有关ChatGPT在高等教育背景下的新闻文章中的关键主题，以及评估ChatGPT是否被描绘成一种潜在的学习工具或学术诚信风险。他们的研究方法包括使用特定搜索词对来自澳大利亚、新西兰、美国和英国的100篇媒体文章进行内容分析，然后将这些文章导入EndNote，随后导入Nvivo进行分析。作者遵循内容分析指南手册，完善了初步的代码簿，并根据识别出的主题对文章进行编码。他们还考察了包括大学员工、学生和ChatGPT在内的各种利益相关者在媒体中的表现。为了评估情感和词汇使用，他们使用了Nvivo的情感分析和查询功能。总体而言，分析中出现了许多主题。作者发现，文章主要关注与学术诚信相关的担忧，特别是关于作弊、学术不诚实和由AI（如ChatGPT）促成的滥用。还发现了使用ChatGPT在大学入学考试中作弊的案例。教育学生关于AI对学术诚信的影响以及制定明确的指导方针被视为至关重要。文章还探讨了大学在检测作业中AI使用方面的努力，提到了各种工具，如OpenAI的Open
    Text Classifier、Turnitin、GPTZero、Packback、HuggingFace和AICheatCheck。然而，一些人对这些检测技术的准确性和复杂性表示怀疑，学者们依赖他们对学生工作的熟悉程度以及检测语气变化来识别AI生成的内容。在他们的研究中，Sullivan等人（2023）还确定了一个关于阻止ChatGPT在教育中使用的策略的显著主题。许多文章讨论了大学调整课程、教学大纲或作业以最小化ChatGPT生成内容的敏感性，通常选择监考考试。然而，一些人反对仅依赖考试，建议重新设计任务以促进真实性并评估批判性思维。分析还突出了ChatGPT易于出错、局限性及其对学习成果的影响的担忧。此外，文章还提出了与学生数据相关的版权、隐私和安全问题。有趣的是，一些文章强调了学习和写作之间的内在联系，强调了写作在探索和巩固对各种主题的想法中的作用。其他担忧包括过度依赖AI完成课程作业可能导致批判性思维技能的潜在下降，这可能会损害真正的教育增长。此外，Sullivan等人（2023）发现，与允许使用ChatGPT的机构相比，更多文章提到了实施ChatGPT禁令的机构或部门。然而，他们观察到最常见的反应是某些大学在政策上的犹豫不决。这些大学被描述为“更新”、“审查”和“考虑”他们的政策，反映了由于情况迅速变化而采取的谨慎态度。在没有官方机构政策的情况下，一些文章提到个别学术人员会根据每门课程制定修订后的政策。研究人员还指出，选择禁止使用ChatGPT的大学已经更新了他们的学术诚信政策或荣誉准则，或者他们认为基于现有的合同作弊定义，AI的使用已经被禁止。另一方面，在允许使用ChatGPT的情况下，通常要求遵守严格的规则，包括在作业中披露或承认其使用。此外，研究人员强调，有两篇文章明确指出，尽管某所大学没有对ChatGPT实施禁令，但个别学术人员仍然有权在某些评估或单元中禁止其使用。此外，Sullivan等人（2023）发现，分析的大量文章讨论了将ChatGPT整合到教学实践中。这些文章提倡在教学中有意义地整合AI，并提出了将ChatGPT纳入作业任务的具体方法，如创意生成和对学生工作的反馈。提出了ChatGPT在学习体验中的各种应用，包括个性化作业、代码调试辅助、生成草稿、提供示范作业等。文章承认禁止ChatGPT的困难，并认识到其在未来工作场所的相关性。完全禁止被认为是不切实际的，导致了对投资AI检测系统的辩论。ChatGPT被比作计算器或维基百科，突显了其颠覆性。然而，对AI在职场中具体应用的探讨并不广泛。研究人员指出，缺乏关注使用ChatGPT来提高学生的公平成果。很少有文章讨论减轻焦虑或支持校园中的可及性挑战。他们还强调，关于ChatGPT有可能提高非母语者的写作技能并促进更公平的学习环境的潜力，只有少数文章有所提及。他们指出，只有一篇文章简要提到了与残疾相关的考虑以及AI赋予残疾人权力的潜力。关于声音，Sullivan等人（2023）发现，包括领导、协调员、研究人员和员工在内的大学人士在媒体中被广泛引用，近一半的文章引用了各自机构的三名或更多代表。相比之下，学生的声音相对较少，只有30篇文章提到了学生，其中只有7篇文章引用了超过三名学生的引语。一些文章关注ChatGPT
    Zero背后的学生Edward Tien，而其他文章则使用调查数据来代表学生的集体声音。
- en: Based on their research, Sullivan et al. (2023) urge for a more balanced examination
    of the risks and opportunities of ChatGPT in university teaching and learning,
    as they believe media emphasis on cheating may influence readers' perceptions
    of education's value and student views on its appropriate use. Sullivan et al.
    (2023), therefore, suggest redesigning assessment tasks to reduce susceptibility
    to AI tools through personalised and reflective tasks. However, they acknowledge
    disagreements on the most effective adaptation strategies and the evolving nature
    of ChatGPT and detection software, potentially making some discussions in the
    articles outdated. They note that the need for policy revisions regarding AI tools
    and academic integrity is emphasised in the articles, but specific implementation
    details are lacking. They suggest that clearer policy positions are expected later
    in 2023\. They also believe establishing explicit guidelines for ethical AI tool
    use is crucial, considering accessibility, sophistication and widespread adoption
    across industries. They deem an outright ban on AI tool usage impractical given
    student access. Sullivan et al. (2023) emphasise the need for clear guidelines
    for ChatGPT use, including acknowledging its limitations and biases. They highlight
    potential benefits for student learning, simplifying complex concepts and aiding
    test preparation. They believe incorporating ChatGPT into workflows could enhance
    employability, but that critical thinking skills to analyse AI outputs are essential.
    They also suggest more industry input is needed in workplace discussions and educators
    must foster unique skills for students to stay competitive in the job market.
    In addition, Sullivan et al. (2023) emphasise ChatGPT's potential to enhance academic
    success for diverse equity groups, but note limited attention in existing literature.
    They believe ChatGPT can support non-traditional students, non-native English
    speakers and students with accessibility needs. However, they caution about potential
    inaccuracies and biases. The authors report that they find the opportunities promising
    and look forward to AI's development in accessibility and inclusion in the future.
    Sullivan et al. (2023) acknowledge the media's predominant focus on academic and
    institutional perspectives regarding ChatGPT, neglecting student views. They stress
    the need for a more constructive and student-led discussion, involving all stakeholders
    for an inclusive discourse on AI. They advocate for student associations and partnerships
    to collaborate with university staff, enhancing student engagement and institutional
    approaches to AI.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 基于他们的研究，Sullivan等人（2023年）呼吁对ChatGPT在大学教学和学习中的风险和机遇进行更平衡的考察，因为他们认为媒体对作弊的强调可能会影响读者对教育价值的看法以及学生对其适当使用的观点。因此，Sullivan等人（2023年）建议重新设计评估任务，通过个性化的反思性任务来降低对AI工具的依赖性。然而，他们承认在最有效的适应策略以及ChatGPT和检测软件的演变性质上存在分歧，这可能会使文章中的一些讨论过时。他们指出，文章强调了关于AI工具和学术诚信的政策修订的必要性，但缺乏具体的实施细节。他们建议在2023年晚些时候期待更明确的政策立场。他们还认为，鉴于学生的可访问性、复杂性和在各个行业的广泛应用，制定明确的伦理AI工具使用指南至关重要。他们认为，考虑到学生的可访问性，完全禁止AI工具的使用是不切实际的。Sullivan等人（2023年）强调了对ChatGPT使用明确指南的需要，包括承认其局限性和偏见。他们强调了对学生学习的潜在益处，简化复杂概念并帮助准备考试。他们认为将ChatGPT纳入工作流程可以提高就业能力，但分析AI输出的批判性思维技能是必不可少的。他们还建议需要更多的行业参与工作场所的讨论，教育工作者必须培养学生的独特技能，以在就业市场上保持竞争力。此外，Sullivan等人（2023年）强调ChatGPT有可能提高不同权益群体的学术成功，但指出现有文献中对此关注有限。他们认为ChatGPT可以支持非传统学生、非英语母语者和有可访问性需求的学生。然而，他们警告说，潜在的误差和偏见需要引起注意。作者报告说，他们认为机会很有希望，并期待未来在可访问性和包容性方面AI的发展。Sullivan等人（2023年）承认媒体主要关注ChatGPT在学术和机构方面的观点，忽视了学生的观点。他们强调需要更多建设性和以学生为主导的讨论，涉及所有利益相关者，以进行关于AI的包容性对话。他们主张学生协会和合作伙伴与大学工作人员合作，增强学生参与度和机构对AI的方法。
- en: Sullivan et al. (2023) acknowledge the limitations of their study, focusing
    on mainstream news databases and a relatively small number of articles, and we
    are inclined to agree with them. They emphasise the importance of considering
    alternative sources like social media platforms and education blogs for a more
    comprehensive understanding of ChatGPT discourse. They also recommend expanding
    the sample size, exploring diverse cultural contexts and investigating the sources
    shaping media coverage to address existing biases. To address these limitations,
    Sullivan et al. (2023) propose future research opportunities, including exploring
    non-Western sources, conducting surveys and focus groups with students and investigating
    academic staff perspectives on ChatGPT. They emphasise the potential for AI tools
    to enhance student learning and access, highlighting the need for a more inclusive
    student perspective in discussions. The authors stress the importance of media
    framing and its impact on public perceptions of academic integrity and university
    responses to ChatGPT. The authors conclude that their findings emphasise the necessity
    for further research and dialogue concerning the implications of AI tools, highlighting
    the need to explore ethical use, innovative teaching and learning practices and
    the promotion of equitable access to educational opportunities. Finally, they
    assert that as AI technologies continue to evolve, it is crucial for universities
    to adapt and embrace their utilisation in a manner that supports student learning
    and prepares them for the challenges of an increasingly digital world.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: Sullivan等人（2023）承认他们研究的局限性，主要集中在主流新闻数据库和相对较少的文章上，我们倾向于同意他们的观点。他们强调考虑社交媒体平台和教育博客等替代来源的重要性，以更全面地理解ChatGPT的讨论。他们还建议扩大样本量，探索不同的文化背景，并调查塑造媒体覆盖的来源，以解决现有的偏见。为了解决这些局限性，Sullivan等人（2023）提出了未来的研究机会，包括探索非西方来源，对学生和学术人员进行调查和焦点小组讨论，以及调查学术人员对ChatGPT的看法。他们强调AI工具增强学生学习和获取的潜力，强调在讨论中需要更多包容性的学生视角。作者强调媒体框架及其对公众对学术诚信和大学对ChatGPT反应认知的影响。作者总结说，他们的发现强调了进一步研究和对话AI工具影响的必要性，强调了探索伦理使用、创新的教学和学习实践以及促进教育机会公平获取的必要性。最后，他们断言，随着AI技术的持续发展，大学适应并采用支持学生学习并为他们准备日益数字化的世界挑战的方式至关重要。
- en: Sullivan et al.'s (2023) investigation is relevant to our study in the following
    ways.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: Sullivan等人（2023）的研究以以下方式与我们的研究相关。
- en: '*Academic Integrity Concerns*'
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*学术诚信担忧*'
- en: Sullivan et al. highlight that media articles predominantly focus on concerns
    related to academic integrity, such as cheating and academic dishonesty facilitated
    by ChatGPT. This finding underscores the importance of addressing these integrity
    concerns and developing clear guidelines for students to ensure ethical use of
    AI tools in our study.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Sullivan等人强调，媒体文章主要关注与学术诚信相关的担忧，例如ChatGPT促进的作弊和学术不诚实。这一发现强调了解决这些诚信担忧并为我们研究制定明确的学生使用AI工具指南的重要性。
- en: '*Task Redesign and Avoidance Strategies*'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*任务重设计和规避策略*'
- en: The study reveals that universities are adopting strategies to discourage the
    use of ChatGPT, including task redesign and opting for invigilated examinations.
    These findings can inform our research on how institutions are adapting to the
    challenges posed by AI tools and maintaining the integrity of assessments.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该研究揭示，大学正在采取策略来阻止ChatGPT的使用，包括任务重设计和选择监考考试。这些发现可以为我们研究机构如何适应AI工具带来的挑战并保持评估的完整性提供信息。
- en: '*Policy Challenges*'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*政策挑战*'
- en: Sullivan et al. report on the indecisiveness of certain universities regarding
    their policies on ChatGPT usage. This aspect is particularly relevant to our study,
    as it emphasises the need for institutions to develop explicit guidelines and
    policies for the ethical use of AI tools while ensuring academic integrity.
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Sullivan等人报告了某些大学在ChatGPT使用政策上的犹豫不决。这一方面对我们研究特别相关，因为它强调了机构在确保学术诚信的同时，需要制定明确的指南和政策以规范AI工具的伦理使用。
- en: '*Embracing ChatGPT in Teaching*'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在教学中使用ChatGPT*'
- en: Despite concerns, the study highlights that some media articles advocate for
    meaningful integration of ChatGPT in teaching practices. This finding is significant
    for our research, as it provides insights into potential opportunities and benefits
    of incorporating AI tools in educational settings.
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽管存在担忧，这项研究强调了一些媒体报道倡导在教学实践中有意义地整合ChatGPT。这一发现对我们研究具有重要意义，因为它为我们提供了将AI工具融入教育环境中的潜在机会和益处的见解。
- en: '*Equity and Accessibility Considerations*'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*公平性和可及性考虑*'
- en: The study touches on the potential benefits of ChatGPT for equity and accessibility,
    such as assisting non-native speakers and students with disabilities. These considerations
    align with our research focus on understanding how AI tools can support all of
    our students, especially considering that the majority of our students are non-native
    speakers studying in an English-medium environment.
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究触及了ChatGPT在公平性和可及性方面的潜在益处，例如帮助非母语演讲者和有残疾的学生。这些考虑与我们的研究重点相一致，即了解AI工具如何支持我们所有的学生，特别是考虑到我们大多数学生都是非母语演讲者在英语环境中学习。
- en: '*Student Engagement*'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*学生参与度*'
- en: Their study reveals that student voices are relatively underrepresented in media
    articles. This aspect is directly relevant to our research, emphasising the importance
    of involving students in the discussion and decision-making processes concerning
    AI integration in education.
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们的研究揭示了学生在媒体报道中的代表性相对较低。这一方面与我们研究直接相关，强调了在涉及AI在教育中整合的讨论和决策过程中涉及学生的必要性。
- en: In conclusion, Sullivan et al.'s (2023) investigation holds substantial relevance
    to our research, as it illuminates critical aspects essential for understanding
    the implications of integrating ChatGPT in the educational landscape. Their findings
    concerning academic integrity concerns, task redesign strategies, policy challenges,
    embracing ChatGPT in teaching, equity and accessibility considerations, media
    perception and student engagement provide valuable groundwork for our study to
    explore the responsible and effective integration of AI tools in our educational
    context.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，Sullivan等人（2023）的调查对我们研究具有重大相关性，因为它阐明了理解将ChatGPT整合到教育景观中的影响的关键方面。他们关于学术诚信问题、任务重新设计策略、政策挑战、在教学中使用ChatGPT、公平性和可及性考虑、媒体认知和学生参与度的发现为我们研究提供了宝贵的基石，以探索在我们教育环境中负责任和有效地整合AI工具。
- en: Literature Review Papers on ChatGPT
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT文献综述论文
- en: '‘We Need To Talk About ChatGPT’: The Future of AI and Higher Education'
  id: totrans-244
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ‘我们需要谈谈ChatGPT’：人工智能与高等教育的未来
- en: 'In their 2023 paper titled ‘We Need To Talk About ChatGPT’: The Future of AI
    and Higher Education, Neumann et al. emphasise the diverse applications of ChatGPT
    for software engineering students. These applications include assessment preparation,
    translation and generating specific source code as well summarising literature
    and paraphrasing text in scientific writing. This prompted them to write a position
    paper with the aim of initiating a discussion regarding potential strategies to
    integrate ChatGPT into higher education. They, therefore, decided to investigate
    articles that explore the impact of ChatGPT on higher education, specifically
    in the fields of software engineering and scientific writing, with the aim of
    asking ‘Are there lessons to be learned from the research community?’ (Neumann
    et al., 2023). However, since ChatGPT had only recently been released, similar
    to our own situation, they observed a lack of peer-reviewed articles addressing
    this topic at the time of their writing. Therefore, they decided to conduct a
    structured grey literature review using Google Scholar to identify preprints of
    primary studies. A total of 5 preprints out of 55 were selected by the researchers
    for their analysis. Additionally, they engaged in informal discussions and conversations
    with lecturers and researchers, as well as examining their own test results from
    experimenting with ChatGPT. Through their examination of these preprints, Neumann
    et al. identified emerging challenges and opportunities that demanded attention
    (2023). The four areas in higher education, where they contend these challenges
    and opportunities are applicable are teaching, papers, curricula and regulations.
    In the context of teaching, Neumann et al. emphasise the importance of early introduction
    to foundational concepts, such as programming fundamentals, while specifying the
    appropriate use of ChatGPT (2023). They highlight the need for transparency, ensuring
    students are aware of ChatGPT''s functionalities and limitations. They suggest
    adapting existing guidelines or handouts, coordinating among teachers to avoid
    redundancy, and integrating ChatGPT into teaching activities. They also recommend
    that students practise using the tool for specific use cases, exploring both its
    possibilities and limitations. In addition, they note the potential integration
    of ChatGPT into modern teaching approaches like problem-based learning or flipped
    learning. Furthermore, they propose inviting practitioners to provide insights
    on integrating ChatGPT into practical work during courses. Overall, their recommendations
    aim to foster practice-based learning and enhance transparency. Regarding papers,
    according to Neumann et al., integrating ChatGPT into higher education presents
    challenges in scientific writing, especially in sections involving existing knowledge
    (2023). They suggest using a combination of plagiarism checkers and AI detection
    tools, with manual examination as a backup. Thorough reference checks and validation
    are emphasised as crucial. They also highlight identifiable characteristics of
    ChatGPT using GPT-3, such as referencing non-existent literature, which can assist
    in detection. They propose the use of additional oral examinations or documentation
    as additional measures. Furthermore, they recommend placing greater emphasis on
    research design and results sections to enhance scientific education. According
    to Neumann et al., adjusting a curriculum is a complex process that requires careful
    consideration of the impact on other courses and compliance with regulations (2023).
    However, they expect substantial discussions among lecturers due to varying opinions
    on integrating ChatGPT into lectures. Nonetheless, they believe these discussions
    will be valuable as they will provide an opportunity for mutual learning and the
    development of solutions to address the challenges that arise. In the context
    of regulations, the authors emphasise the importance of evaluating official regulatory
    documents, such as examination regulations (2023). They also highlight the need
    to consider various legal aspects, such as copyright and data protection, when
    integrating ChatGPT into teaching. To ensure consistency, the authors recommend
    re-evaluating existing examination regulations and establishing clear guidelines
    for students. Additionally, they stress the significance of thorough discussions
    among lecturers within a study programme to identify adoption opportunities by
    aligning course objectives, theoretical foundations and examination types. By
    addressing these areas, they believe successful integration of ChatGPT into university
    teaching can be achieved, leading to reduced uncertainties and a focus on innovative
    education. Neumann et al. summarise their study by stating that their findings
    highlight the transformative impact of AI-based chatbots like ChatGPT on higher
    education, particularly in the realm of scientific writing (2023). However, they
    acknowledge the presence of several unresolved questions that require further
    investigation: Is text generated by ChatGPT a suspected plagiarism case? How should
    one reference text generated by ChatGPT? and What proportion of text generated
    with ChatGPT in relation to the total scope is acceptable? However, they acknowledge
    that numerous additional questions are likely to arise. To conclude, they highlight
    that as educators shape the future experts, it is important to equip our students
    with the essential skills for responsible use of ChatGPT. They, therefore, emphasise
    the need to address the integration of AI tools in higher education and acknowledge
    their work as a stepping stone towards initiating further inquiries, fostering
    discussions and discovering solutions.'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们2023年发表的论文《我们需要谈谈ChatGPT：人工智能与高等教育的未来》中，Neumann等人强调了ChatGPT在软件工程学生中的应用多样性。这些应用包括评估准备、翻译和生成特定源代码，以及总结文献和改写科学写作中的文本。这促使他们撰写了一份立场文件，旨在启动关于将ChatGPT整合到高等教育中可能策略的讨论。因此，他们决定调查探讨ChatGPT对高等教育影响的文章，特别是软件工程和科学写作领域，目的是询问“研究社区中有哪些经验教训可以借鉴？”（Neumann等人，2023）。然而，由于ChatGPT刚刚发布，与我们自己的情况相似，他们在写作时观察到缺乏针对这一主题的同行评审文章。因此，他们决定使用Google
    Scholar进行结构化灰色文献综述，以识别初级研究的预印本。研究人员从55篇预印本中选出了5篇进行分析。此外，他们与讲师和研究人员进行了非正式的讨论和交流，并检查了他们自己对ChatGPT实验的测试结果。通过审查这些预印本，Neumann等人确定了需要关注的潜在挑战和机遇（2023）。他们认为这些挑战和机遇适用于高等教育的四个领域：教学、论文、课程和法规。在教学方面，Neumann等人强调早期引入基础概念的重要性，例如编程基础，并明确ChatGPT的适当使用（2023）。他们强调需要透明度，确保学生了解ChatGPT的功能和限制。他们建议调整现有的指南或手册，协调教师以避免重复，并将ChatGPT整合到教学活动中。他们还建议学生练习使用该工具进行特定用例，探索其可能性和局限性。此外，他们指出ChatGPT可能整合到现代教学方法，如基于问题的学习或翻转课堂。此外，他们提议邀请实践者提供在课程中整合ChatGPT到实际工作中的见解。总体而言，他们的建议旨在促进基于实践的学习并提高透明度。关于论文，根据Neumann等人的观点，将ChatGPT整合到高等教育中在科学写作方面提出了挑战，特别是在涉及现有知识的部分（2023）。他们建议结合使用抄袭检测器和AI检测工具，并将人工检查作为后备。他们强调彻底的参考文献检查和验证是至关重要的。他们还强调ChatGPT使用GPT-3时的可识别特征，如引用不存在的文献，这有助于检测。他们提出使用额外的口试或文件作为额外措施。此外，他们建议更加重视研究设计和结果部分，以增强科学教育。根据Neumann等人的观点，调整课程是一个复杂的过程，需要仔细考虑对其他课程的影响以及符合法规（2023）。然而，他们预计讲师之间将进行大量讨论，因为对将ChatGPT整合到讲座中的意见不一。尽管如此，他们认为这些讨论将是宝贵的，因为它们将提供相互学习和解决出现挑战的机会。在法规方面，作者强调评估官方法规文件，如考试法规的重要性（2023）。他们还强调在将ChatGPT整合到教学中时需要考虑各种法律方面，如版权和数据保护。为了确保一致性，作者建议重新评估现有的考试法规并为学生制定明确的指南。此外，他们强调在研究计划内讲师之间进行彻底讨论的重要性，以通过调整课程目标、理论基础和考试类型来识别采用机会。通过解决这些领域，他们认为ChatGPT成功整合到大学教学是可能的，这将减少不确定性并关注创新教育。Neumann等人通过总结他们的研究指出，他们的发现突出了基于人工智能的聊天机器人如ChatGPT对高等教育的变革性影响，特别是在科学写作领域（2023）。然而，他们承认存在一些需要进一步研究的问题：ChatGPT生成的文本是否构成抄袭案件？如何引用ChatGPT生成的文本？以及使用ChatGPT生成的文本在总范围中占多大比例是可接受的？然而，他们也承认可能会出现更多的问题。为了总结，他们强调，作为塑造未来专家的教育者，为学生配备ChatGPT负责任使用的必要技能是重要的。因此，他们强调需要解决高等教育中AI工具的整合问题，并承认他们的工作是为启动进一步调查、促进讨论和发现解决方案奠定基础。
- en: Neumann et al.’s (2023) study's strengths lie in its focus on emerging AI technology's
    impact on higher education and its comprehensive exploration of various aspects
    of integration. The researchers incorporated informal discussions and practical
    experimentation with ChatGPT to supplement their findings, enhancing the study's
    insights. However, there are notable weaknesses and limitations to consider. The
    study's reliance on preprints and informal discussions may introduce potential
    biases and limit the generalisability of the findings. The small sample size of
    preprints (only 5 out of 55) might not fully represent the breadth of research
    on the topic, and the lack of peer-reviewed articles may affect the study's credibility.
    Additionally, the study's emphasis on software engineering and scientific writing
    may not fully capture ChatGPT's impact on other academic disciplines. Moreover,
    the authors acknowledge the presence of unresolved questions, indicating that
    certain aspects of ChatGPT's integration into higher education remain unaddressed.
    Furthermore, the study primarily explores the researchers' perspectives. Incorporating
    more diverse perspectives, including practitioners from different disciplines
    and institutions, could enhance the validity and reliability of the findings.
    In conclusion, Neumann et al.'s study provides valuable insights into the integration
    of ChatGPT into higher education, but it faces limitations related to sample size,
    representation and focus. Despite these limitations, the study serves as a starting
    point for further inquiries and discussions on the responsible and effective use
    of AI tools in the educational landscape.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: Neumann等人（2023）的研究优势在于其关注新兴AI技术对高等教育的影响，以及其对整合各个方面进行的全面探索。研究人员通过非正式讨论和与ChatGPT的实践实验来补充他们的发现，增强了研究的见解。然而，该研究存在明显的弱点和局限性需要考虑。研究对预印本和非正式讨论的依赖可能引入潜在的偏见，并限制发现的可推广性。预印本的小样本量（只有55篇中的5篇）可能无法完全代表该主题的研究范围，并且缺乏同行评审的文章可能会影响研究的可信度。此外，研究对软件工程和科学写作的强调可能无法完全捕捉ChatGPT对其他学术学科的影响。此外，作者承认存在未解决的问题，表明ChatGPT融入高等教育的某些方面尚未得到解决。此外，该研究主要探索研究人员的观点。纳入更多来自不同学科和机构的实践者的不同观点，可以增强发现的有效性和可靠性。总之，Neumann等人关于将ChatGPT融入高等教育的这项研究提供了宝贵的见解，但它面临着与样本量、代表性以及关注点相关的局限性。尽管存在这些局限性，该研究仍然是进一步探讨在教育环境中负责任和有效使用AI工具的起点和讨论的基础。
- en: 'We believe Neumann et al.''s (2023) study has important implications for our
    research in the following areas:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认为Neumann等人（2023）的研究在以下领域对我们的研究具有重要意义：
- en: '*Teaching Strategies and Early Introduction*'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*教学策略和早期引入*'
- en: The study emphasises the importance of early introduction to foundational concepts
    and transparent use of ChatGPT in teaching. Their recommendations for coordinating
    among instructors and integrating ChatGPT into teaching activities provide insights
    into how instructors may incorporate AI tools in their pedagogical approaches.
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究强调了早期引入基础概念和在教学中透明使用ChatGPT的重要性。他们对协调教师之间关系和将ChatGPT融入教学活动的建议，为教师如何在他们的教学方法中融入AI工具提供了见解。
- en: '*Curricular Adaptation and Regulations*'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*课程调整与规定*'
- en: The study identifies the need for discussions among lecturers to adjust curricula
    and comply with regulations when integrating ChatGPT. This insight informs our
    research on how institutions may need to adjust to accommodate AI tools.
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该研究确定了在整合ChatGPT时讲师之间进行讨论的需求，以调整课程并遵守规定。这一见解为我们研究机构可能需要如何调整以适应AI工具提供了信息。
- en: '*Unresolved Questions and Further Inquiries*'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*未解决的问题和进一步调查*'
- en: The study acknowledges unresolved questions related to ChatGPT's usage in academic
    settings. This serves as a guide for our research in which we may explore these
    unanswered aspects, such as how to reference AI-generated text.
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究承认了与ChatGPT在学术环境中使用相关的未解决问题。这为我们可能探索这些未回答方面的研究提供了一个指南，例如如何引用AI生成的文本。
- en: Despite the limitations of Neumann et al.'s study, such as the small sample
    size and potential biases, their comprehensive exploration of AI technology's
    impact on higher education offers valuable insights. By building upon their work
    and conducting our own research, we can contribute to evidence-based practices
    and informed discussions on the responsible and effective integration of ChatGPT
    in higher education, thereby preparing students for the future AI-driven landscape.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Neumann等人的研究存在局限性，例如样本量小和潜在的偏见，但他们全面探索人工智能技术对高等教育的影响提供了宝贵的见解。通过建立在他们工作的基础上并开展我们自己的研究，我们可以为基于证据的实践和关于ChatGPT在高等教育中负责任和有效整合的知情讨论做出贡献，从而为学生准备未来以AI驱动的景观。
- en: 'ChatGPT: Bullshit Spewer or the End of Traditional Assessments in Higher Education?'
  id: totrans-255
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT：胡言乱语者还是高等教育传统评估的终结？
- en: 'In their 2023 paper titled ‘ChatGPT: Bullshit spewer or the end of traditional
    assessments in higher education?’ Rudolph et al. conduct a comprehensive literature
    review and experimental analysis of ChatGPT. Their literature review stands out
    as one of the pioneering peer-reviewed academic journal articles to explore the
    relevance of ChatGPT in higher education to date, specifically in assessment,
    learning and teaching. Rudolph et al.''s paper primarily examines the implications
    of this technology for higher education and delves into the future of learning,
    teaching and assessment in the context of AI chatbots like ChatGPT. They contextualise
    ChatGPT within the realm of current research on Artificial Intelligence in Education
    (AIEd), discussing its applications for students, teachers and educational systems.
    The authors analyse the opportunities and threats posed by ChatGPT and conclude
    the article with recommendations targeted towards students, teachers and higher
    education institutions, with a particular focus on assessment. For their research,
    Rudolph et al. utilised a desktop analysis approach. They conducted Google Scholar
    searches, examined reference lists and explored embedded references in non-academic
    articles to conduct their literature review. However, due to the novelty of the
    topic, once again, similar to our own situation, they discovered there were only
    a limited number of relevant scholarly resources. As of 18 January 2023, the researchers
    found two peer-reviewed journal articles and eight preprints on ChatGPT''s application
    in higher education, with a particular focus on assessment, learning and teaching.
    Based on their literature review, Rudolph et al. (2023) put forward the following
    implications of ChatGPT for education.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们2023年的论文《ChatGPT：胡言乱语者还是高等教育传统评估的终结？》中，Rudolph等人对ChatGPT进行了全面的文献综述和实验分析。他们的文献综述在迄今为止探索ChatGPT在高等教育中相关性的开创性同行评审学术期刊文章中脱颖而出，特别是在评估、学习和教学方面。Rudolph等人的论文主要考察这项技术对高等教育的启示，并深入探讨了在AI聊天机器人如ChatGPT的背景下学习和教学的未来。他们将ChatGPT置于当前教育人工智能（AIEd）研究领域，讨论了其对学生的应用、教师和教育系统的影响。作者分析了ChatGPT带来的机遇和威胁，并在文章结尾针对学生、教师和高等教育机构提出了具体建议，特别关注评估。为了他们的研究，Rudolph等人采用了桌面分析的方法。他们进行了Google
    Scholar搜索，检查了参考文献列表，并探索了非学术文章中嵌入的参考文献以进行文献综述。然而，由于主题的新颖性，再次，类似于我们自己的情况，他们发现只有有限的相关学术资源。截至2023年1月18日，研究人员发现了两篇关于ChatGPT在高等教育中应用的同行评审期刊文章和八篇预印本，特别关注评估、学习和教学。基于他们的文献综述，Rudolph等人（2023）提出了以下ChatGPT对教育的启示。
- en: Rudolph et al. (2023) highlight that AIEd presents a unique opportunity for
    exploring diverse tools and applications in educational technology. Drawing from
    Baker and Smith's (2019) framework, they categorise educational contexts into
    student-facing, teacher-facing and system-facing dimensions, which they found
    valuable in their understanding of AI's utilisation in education. Regarding student-facing
    AI applications, Rudolph et al. emphasise the potential of AI applications like
    Intelligent Tutoring Systems (ITS) in personalising student learning through tailored
    instruction. They highlight ITS's ability to simulate human tutoring and provide
    personalised assistance in problem-solving. Additionally, they discuss the possibilities
    of personalised adaptive learning (PAL) facilitated by advancements in big data
    technology and learning analytics. While acknowledging ChatGPT's promise in enhancing
    tasks like language translation and question answering, they also point out its
    limitations in deeply comprehending subject matter. The authors say they find
    it ironic that concerns about AI-powered writing applications exist, as they believe
    ChatGPT can greatly benefit teachers in fostering innovative teaching and learning
    approaches. Regarding teacher-facing applications, Rudolph et al. (2023) emphasise
    how teacher-facing AIEd systems reduce teachers' workload by automating tasks
    like assessment, plagiarism detection and feedback. They also note that AI-powered
    applications can provide valuable insights into students' learning progress, enabling
    targeted guidance and support. Their research explores AI-powered assessment methods,
    including Automated Essay Scoring (AES) systems, which offer students prompts
    to revise answers, extending assessment beyond multiple-choice tests. They conclude
    that AI-powered essay ratings generally align with human ratings, with some concerns
    persisting. Rudolph et al. also highlight the importance of combining AES with
    AI-enabled automatic feedback systems to enhance effectiveness. The adaptive evaluation
    of the feedback system ensures appropriate answers based on Bloom's cognitive
    levels and can recommend additional learning resources and challenges to students.
    They acknowledge the well-documented effectiveness of AI-powered grading applications
    for essays. However, they raise concerns about ChatGPT's potential disruption
    in the emerging subfield of AI-powered applications supporting students' writing
    skill development. Furthermore, they highlight various AI-based writing tools
    developed before ChatGPT, aiming to enhance writing skills and facilitate the
    writing process through automated feedback and assessment. The authors also emphasise
    AI-powered writing applications like Grammarly and Wordtune as valuable additions
    to the writing curriculum, noting that Grammarly offers immediate feedback and
    revision suggestions, effectively improving writing engagement through automated
    corrective feedback, and Wordtune, using natural language processing (NLP), assists
    English as a Foreign Language (EFL) students in formulating ideas and enhancing
    their writing quality. They note that research underscores the positive impact
    of AI-based interventions on students' self-efficacy and academic emotions in
    EFL contexts, supporting independent learning and improvement. They also suggest
    that ChatGPT should be analysed within the same category of AIEd tools. Regarding
    system-facing applications, Rudolph et al. (2023) point out that system-facing
    AI-powered applications receive less attention in the literature compared to student-facing
    and teacher-facing applications. Despite this, they emphasise the importance of
    a holistic approach when developing strategies to leverage ChatGPT for innovation
    in education, taking cues from Microsoft's incorporation of ChatGPT into its products.
    They also mention that, since ChatGPT is a new product in the market, there is
    limited empirical research on its implications for education. Therefore, they
    suggest a discussion on the opportunities and challenges that ChatGPT may present
    for educational practitioners, policymakers and researchers is necessary (Rudolph
    et al., 2023).
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）强调，AIEd在教育技术中探索各种工具和应用提供了一个独特的机会。借鉴Baker和Smith（2019年）的框架，他们将教育环境分为面向学生、面向教师和面向系统的维度，他们认为这些维度有助于他们理解AI在教育中的应用。关于面向学生的AI应用，Rudolph等人强调智能辅导系统（ITS）等AI应用在通过定制教学个性化学生学习的潜力。他们强调ITS模拟人类辅导并提供个性化问题解决辅助的能力。此外，他们讨论了由大数据技术和学习分析进步推动的个性化自适应学习（PAL）的可能性。虽然承认ChatGPT在增强语言翻译和问答等任务方面的潜力，但他们也指出其在深入理解学科内容方面的局限性。作者表示，他们认为关于AI驱动的写作应用的担忧是讽刺的，因为他们相信ChatGPT可以极大地帮助教师培养创新的教学和学习方法。关于面向教师的AI应用，Rudolph等人（2023年）强调面向教师的AIEd系统通过自动化评估、剽窃检测和反馈等任务来减轻教师的工作负担。他们还指出，AI驱动的应用可以提供有关学生学习进展的宝贵见解，从而实现有针对性的指导和支持。他们的研究探讨了AI驱动的评估方法，包括自动作文评分（AES）系统，这些系统为学生提供修改答案的提示，将评估扩展到多项选择题之外。他们得出结论，AI驱动的作文评分通常与人类评分一致，但一些担忧仍然存在。Rudolph等人还强调将AES与AI驱动的自动反馈系统相结合以增强有效性的重要性。反馈系统的自适应评估确保基于布卢姆的认知水平提供适当的答案，并可以向学生推荐额外的学习资源和挑战。他们承认AI驱动的评分应用在论文评分方面的良好记录。然而，他们提出了关于ChatGPT在支持学生写作技能发展的新兴子领域可能造成的破坏的担忧。此外，他们强调在ChatGPT之前开发的基于AI的写作工具，旨在通过自动反馈和评估提高写作技能并促进写作过程。作者还强调Grammarly和Wordtune等AI驱动的写作应用作为写作课程的宝贵补充，指出Grammarly提供即时反馈和修订建议，通过自动纠正反馈有效地提高写作参与度，而Wordtune则利用自然语言处理（NLP）帮助英语作为外语（EFL）学生在构思想法和提升写作质量方面。他们指出，研究强调了基于AI的干预对学生自我效能感和EFL环境中的学术情绪的积极影响，支持独立学习和改进。他们还建议将ChatGPT分析在AIEd工具的同一类别中。关于面向系统的应用，Rudolph等人（2023年）指出，与面向学生和面向教师的AI应用相比，文献中关于面向系统的AI驱动的应用受到的关注较少。尽管如此，他们强调在制定利用ChatGPT进行教育创新的策略时采取整体方法的重要性，并从微软将其纳入其产品的做法中汲取灵感。他们还提到，由于ChatGPT是市场上的一种新产品，因此关于其对教育的潜在影响的实证研究有限。因此，他们认为有必要讨论ChatGPT可能为教育实践者、政策制定者和研究人员带来的机遇和挑战（Rudolph等人，2023年）。
- en: Rudolph et al. (2023) highlight concerns about ChatGPT threatening the traditional
    essay assessment method, noting that instructors worry that students might outsource
    their assignments to ChatGPT, generating passable prose undetected by plagiarism
    tools. They believe these concerns may partly stem from instructors' resistance
    to adapting to new assessment methods, as written assignments are sometimes criticised
    for being ineffective in assessing students' learning. Rudolph et al. (2023) also
    express concerns about ChatGPT's limitations in understanding and evaluating information
    shared, as it is merely a text-generating machine. They believe this concern might
    prompt institutions to blacklist the AI application. However, with the potential
    integration of ChatGPT's technology into Microsoft products, they suggest a pragmatic
    approach to managing the challenges posed by the widespread use of ChatGPT in
    the future. From their research, Rudolph et al. (2023) note that language models
    offer a wide range of beneficial applications for society, such as code and writing
    autocompletion, grammar assistance, game narrative generation, improving search
    engine responses and answering questions. However, they also acknowledge the potential
    harmful applications of these models, saying that GPT-3, in particular, stands
    out for its enhanced text generation quality and adaptability, making it challenging
    to differentiate synthetic text from human-written text. Thus, they believe this
    advancement in language models presents both opportunities and risks, and that,
    in this context, the focus should be on exploring the potential harms of improved
    language models, not to imply that the harms outweigh the benefits, but to encourage
    research and efforts to address and mitigate potential risks. Rudolph et al. (2023)
    summarise by saying that introduction of disruptive education technologies in
    the classroom often brings forth various challenges in teaching and learning.
    As a result, education practitioners and policymakers are tasked with managing
    these situations to ensure that inadequate pedagogical practices are avoided.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）指出ChatGPT可能威胁到传统的论文评估方法，指出教师担心学生可能会将作业外包给ChatGPT，生成未经抄袭检测工具检测到的可接受的文章。他们认为这些担忧可能部分源于教师对适应新评估方法的抵制，因为书面作业有时因评估学生学习效果不力而受到批评。Rudolph等人（2023年）还表达了对ChatGPT在理解和评估共享信息方面的局限性的担忧，因为它仅仅是一个文本生成机器。他们认为这种担忧可能会促使机构将AI应用列入黑名单。然而，随着ChatGPT技术可能集成到微软产品中，他们建议采取一种务实的办法来管理未来ChatGPT广泛使用带来的挑战。从他们的研究中，Rudolph等人（2023年）指出，语言模型为社会提供了广泛的有益应用，例如代码和写作自动完成、语法辅助、游戏叙事生成、改进搜索引擎响应和回答问题。然而，他们也承认这些模型潜在的有害应用，特别是GPT-3因其增强的文本生成质量和适应性而突出，使得合成文本与人类撰写的文本难以区分。因此，他们认为语言模型的发展既带来了机遇也带来了风险，在这种情况下，重点应放在探索改进后的语言模型的潜在危害上，而不是暗示危害大于利益，而是鼓励研究和努力应对和减轻潜在风险。Rudolph等人（2023年）总结说，课堂中引入颠覆性教育技术通常会在教学和学习中带来各种挑战。因此，教育实践者和政策制定者有责任管理这些情况，以确保避免不充分的教学习惯。
- en: Based on their research, Rudolph et al. (2023) discovered that ChatGPT's ability
    to generate essays presents challenges for educators, but that some are enthusiastic
    about the potential for innovation in teaching and learning brought by this disruptive
    AI application. They reference literature suggesting that tools like ChatGPT may
    become as prevalent in writing as calculators and computers are in mathematics
    and science. Additionally, they note that some authors propose involving students
    and instructors in shaping and utilising AI tools to support learning instead
    of limiting their use. From their research, they also note that while ChatGPT
    is often seen as posing a threat to traditional essay assessments, they believe
    it also presents an opportunity for educators to introduce innovative assessment
    methods. They note that typically, assessments are used by instructors to evaluate
    students' learning, but opine that many instructors may lack the skills to use
    assessments for both learning and as a means of learning. They, therefore, believe
    that institutions should capitalise on this opportunity to enhance instructors'
    assessment skills and leverage disruptive AI applications like ChatGPT to enhance
    students' learning. Rudolph et al. (2023) highlight another opportunity for instructors
    to enhance their teaching strategies by leveraging ChatGPT. For instance, they
    suggest adopting a flipped learning approach where crucial classwork is completed
    during in-person sessions, allowing more emphasis on multimedia assignments and
    oral presentations rather than traditional assignments. Moreover, they believe
    this would enable instructors to dedicate more time to providing feedback and
    revising students' work. According to Rudolph et al. (2023), another significant
    advantage of ChatGPT is its potential to facilitate experiential learning. Based
    on their literature review, they propose that students should explore various
    strategies and problem-solving approaches through game-based learning and other
    student-centred pedagogies by utilising ChatGPT. Additionally, they believe that
    students who prefer hands-on, experiential learning will particularly benefit
    from using ChatGPT as a learning tool. According to the authors, ChatGPT can be
    effectively employed to promote collaboration and teamwork among participants
    through appropriate instructional strategies. They propose the incorporation of
    student-centred learning activities that can be conducted in groups. For instance,
    the ChatGPT application can generate diverse scenarios that encourage students
    to collaborate in problem-solving and achieving goals. They believe this will
    foster a sense of community, allowing students to learn from and support each
    other. Therefore, Rudolph et al. (2023) assert that instead of viewing ChatGPT
    as a disruptive force in the teaching and learning process, it should be seen
    as a significant opportunity for learning innovators to revolutionise education.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 基于他们的研究，Rudolph等人（2023年）发现，ChatGPT生成论文的能力对教育工作者来说提出了挑战，但有些人对这种颠覆性人工智能应用在教育和学习方面带来的创新潜力感到热情。他们引用了文献，表明像ChatGPT这样的工具可能会像计算器和计算机在数学和科学中一样普遍。此外，他们指出，一些作者提出应让学生和教师参与塑造和利用AI工具以支持学习，而不是限制其使用。从他们的研究中，他们还指出，尽管ChatGPT通常被视为对传统论文评估构成威胁，但他们相信它也为教育工作者提供了引入创新评估方法的机会。他们指出，通常，评估被教师用来评估学生的学习，但他们认为许多教师可能缺乏使用评估作为学习和学习手段的技能。因此，他们认为机构应利用这个机会来提高教师的评估技能，并利用像ChatGPT这样的颠覆性AI应用来增强学生的学习。Rudolph等人（2023年）强调，通过利用ChatGPT，教师还有另一个提高教学策略的机会。例如，他们建议采用翻转学习法，在面对面会议期间完成关键课程作业，从而更侧重于多媒体作业和口头报告，而不是传统作业。此外，他们认为这将使教师能够有更多时间提供反馈和修改学生的作业。根据Rudolph等人（2023年的说法），ChatGPT的另一个显著优势是其促进体验式学习的潜力。基于他们的文献综述，他们提出学生应通过利用ChatGPT进行基于游戏的学习和其他以学生为中心的教学法来探索各种策略和解决问题的方法。此外，他们认为喜欢动手、体验式学习的学生将特别受益于使用ChatGPT作为学习工具。根据作者的说法，ChatGPT可以通过适当的指导策略有效地用于促进参与者之间的协作和团队合作。他们提出将学生为中心的学习活动融入其中，这些活动可以在小组中进行。例如，ChatGPT应用可以生成各种场景，鼓励学生在解决问题和实现目标时进行合作。他们认为这将培养社区感，使学生能够相互学习和支持。因此，Rudolph等人（2023年）断言，与其将ChatGPT视为教学和学习过程中的颠覆性力量，不如将其视为学习创新者变革教育的重要机遇。
- en: Rudolph et al. (2023) conclude that AI, represented by tools like ChatGPT, is
    becoming increasingly mainstream, and its impact on higher education is still
    unfolding. While they note there are concerns about the potential implications
    of artificial intelligence on employment, they caution against alarmist reporting.
    However, they do emphasise the importance of monitoring and engaging with this
    rapidly developing space and the need to adjust teaching and assessment approaches
    in higher education. Additionally, they highlight that ChatGPT's work was not
    detected by their random testing with anti-plagiarism software, raising concerns
    about its potential to evade plagiarism checkers like Grammarly's professional
    version. Moreover, they observe that ChatGPT can be utilised to manipulate user
    input sentences to deceive anti-plagiarism software from reporting low originality
    scores. They reflect on the irony that anti-plagiarism software, which relies
    on AI, can be bypassed by other AI tools within seconds. They even point out that
    GPT-3 is capable of writing a review of a student's AI-generated assignment, leaving
    humans with minimal involvement and questioning the true value of the learning
    experience.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）得出结论，以ChatGPT等工具为代表的AI正在变得越来越主流，其对高等教育的影响仍在展开。虽然他们指出人们对人工智能对就业的潜在影响存在担忧，但他们警告不要过度报道。然而，他们确实强调了对这个快速发展的领域进行监控和参与的必要性，以及调整高等教育中教学和评估方法的需要。此外，他们强调，ChatGPT的工作在他们的随机测试中没有被反抄袭软件检测到，这引起了对其可能绕过Grammarly专业版等抄袭检查器的担忧。此外，他们观察到ChatGPT可以被用来操纵用户输入的句子，以欺骗反抄袭软件不报告低原创性分数。他们反思了这样一个讽刺现象：依赖AI的反抄袭软件可以在几秒钟内被其他AI工具绕过。他们甚至指出，GPT-3能够撰写一份关于学生AI生成作业的评论，使人类参与度降至最低，并质疑学习体验的真实价值。
- en: Based on their findings, Rudolph et al. (2023) offer general recommendations
    for dealing with ChatGPT in higher education. They suggest moving away from a
    policing approach that focuses on detecting academic misconduct and instead advocate
    for building trusting relationships with students through student-centric pedagogy
    and assessments for and as learning. They also emphasise the importance of constructive
    alignment, where learning objectives, teaching and assessments are all aligned.
    Their recommendations for faculty, students and higher education institutions
    are as follows. Regarding recommendations for higher education faculty, Rudolph
    et al. (2023) suggest exploring alternative assessment methods, such as physical
    closed-book exams with pen and paper or online exams with proctoring/surveillance
    software, but also caution against over-reliance on such traditional assessments.
    To combat the use of text generators like ChatGPT, they propose designing writing
    assignments that these AI systems are currently not proficient at handling, focusing
    on specific and niche topics, personal experiences and original arguments. The
    authors acknowledge that ChatGPT's current limitation is its lack of in-text referencing
    and reference lists, but anticipate the emergence of tools like WebGPT that can
    access web browsing for improved information retrieval. They also highlight the
    availability of text generator detection software to address academic integrity
    concerns. The authors encourage faculty to foster creative and critical thinking
    in assessments, utilising authentic assessments and embracing students' interests
    and voices. They believe that involving students in peer evaluations and 'teach-back'
    exercises can further enhance learning experiences. The authors also emphasise
    the importance of creating an atmosphere where students are actively engaged in
    their learning and demonstrate the value of human writing while incorporating
    AI tools responsibly to nurture creativity and critical thinking (Rudolph et al.,
    2023). Regarding recommendations for students, Rudolph et al. (2023) note that,
    as digital natives, students often possess an inherent familiarity with technology,
    giving them a unique advantage in incorporating AI into their academic journey.
    Therefore, the authors stress the importance of understanding academic integrity
    policies and the potential consequences of academic misconduct. They believe that
    to fully harness the potential of AI, students should be encouraged to enhance
    their digital literacy and master AI tools like ChatGPT, as this proficiency could
    significantly boost their employability in the modern job market. However, they
    also caution against using AI as a mere shortcut for assignments, advocating instead
    for its use as a valuable set of tools to improve writing skills and generate
    original ideas. They also warn that it is essential to avoid plagiarism and prioritise
    high-quality sources, as well as remain vigilant against misinformation and disinformation
    when conducting research. To foster critical thinking, Rudolph et al. (2023) suggest
    that we should urge students to read widely, broadening their perspectives and
    enhancing their creative abilities. Furthermore, they suggest that students should
    be encouraged to explore the application of AI language tools like ChatGPT to
    write and debug code, providing additional opportunities for skill development.
    Ultimately, Rudolph et al. encourage students to actively practise using AI language
    tools to address real-world challenges and expand their problem-solving capabilities,
    and believe that by embracing AI responsibly and thoughtfully, students can seize
    its transformative potential and propel their educational journey to new heights
    (Rudolph et al., 2023). Regarding recommendations for higher education institutions,
    Rudolph et al. (2023) emphasise the critical importance of digital literacy education,
    advocating for the inclusion of AI tools like ChatGPT in the curriculum. They
    suggest that to equip faculty with the necessary skills, training on AI tools,
    particularly ChatGPT, is essential. Simultaneously, they recommend that students
    should also receive training on academic integrity to promote responsible AI tool
    usage. Furthermore, they recommend that curricula and courses should be thoughtfully
    designed to be meaningful and relevant to students, reducing the likelihood of
    resorting to cheating. They believe that addressing the use of AI tools, institutions
    should update academic integrity policies and develop clear, easy-to-understand
    guidelines, and that these guidelines should define appropriate usage and outline
    the consequences for cheating. They also highlight that encouraging research on
    the effects of AI tools on learning and teaching is crucial to better understand
    their impact and foster informed decision-making. They believe that by adopting
    these recommendations, higher education institutions can navigate the evolving
    landscape of AI tools, creating an environment that supports responsible and innovative
    learning practices (Rudolph et al., 2023).
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 基于他们的发现，Rudolph 等人（2023）为高等教育中处理 ChatGPT 提供了一般性建议。他们建议从关注检测学术不端行为的执法方法转向通过以学生为中心的教学法和评估来与学生建立信任关系。他们还强调建设性对齐的重要性，即学习目标、教学和评估都应保持一致。他们对教师、学生和高等教育机构的建议如下。关于对高等教育教师的建议，Rudolph
    等人（2023）建议探索替代评估方法，例如使用笔和纸进行的物理闭卷考试或带有监考/监控软件的在线考试，但也警告不要过度依赖这些传统评估方法。为了应对像 ChatGPT
    这样的文本生成器的使用，他们提出设计这些人工智能系统目前尚不擅长的写作任务，专注于特定和细分主题、个人经验和原创论点。作者承认 ChatGPT 当前的局限性是其缺乏文本引用和参考文献列表，但预计像
    WebGPT 这样可以访问网络浏览以改进信息检索的工具将会出现。他们还强调存在用于检测文本生成器的软件，以解决学术诚信问题。作者鼓励教师在评估中培养创造性和批判性思维，利用真实评估并接纳学生的兴趣和声音。他们认为，让学生参与同行评审和“教学反馈”练习可以进一步丰富学习体验。作者还强调，在创造一个学生积极参与学习并展示人类写作价值的同时，负责任地融入人工智能工具以培养创造性和批判性思维的环境（Rudolph
    等人，2023）。关于对学生的建议，Rudolph 等人（2023）指出，作为数字原住民，学生通常对技术有内在的熟悉度，这使他们能够将人工智能融入他们的学术旅程中，从而获得独特的优势。因此，作者强调理解学术诚信政策和学术不端行为的潜在后果的重要性。他们认为，为了充分利用人工智能的潜力，应鼓励学生提高他们的数字素养并掌握像
    ChatGPT 这样的 AI 工具，因为这种熟练程度可以显著提高他们在现代就业市场中的就业能力。然而，他们也警告不要将人工智能作为作业的简单捷径，而是提倡将其作为一套有价值的工具来提高写作技能和生成原创想法。他们还警告说，在进行研究时，避免剽窃、优先考虑高质量来源以及保持对错误信息和虚假信息的警惕是至关重要的。为了培养批判性思维，Rudolph
    等人（2023）建议我们应该敦促学生广泛阅读，拓宽他们的视野并增强他们的创造力。此外，他们建议鼓励学生探索将 AI 语言工具如 ChatGPT 应用于编写和调试代码的应用，为技能发展提供额外的机会。最终，Rudolph
    等人鼓励学生积极练习使用 AI 语言工具来解决现实世界的挑战并扩展他们的解决问题的能力，并相信通过负责任和深思熟虑地拥抱人工智能，学生可以抓住其变革潜力并推动他们的教育之旅达到新的高度（Rudolph
    等人，2023）。关于对高等教育机构的建议，Rudolph 等人（2023）强调数字素养教育的重要性，提倡将像 ChatGPT 这样的 AI 工具纳入课程。他们建议为了使教师具备必要的技能，对
    AI 工具，尤其是 ChatGPT 的培训是必不可少的。同时，他们建议学生也应接受学术诚信培训，以促进负责任地使用 AI 工具。此外，他们建议精心设计课程和课程，使其对学生有意义且相关，以降低作弊的可能性。他们认为，为了应对
    AI 工具的使用，机构应更新学术诚信政策并制定明确、易于理解的指南，这些指南应定义适当的用途并概述作弊的后果。他们还强调，鼓励研究 AI 工具对学习和教学的影响至关重要，以更好地理解其影响并促进明智的决策。他们认为，通过采用这些建议，高等教育机构可以应对人工智能工具不断发展的格局，创造一个支持负责任和创新学习实践的环境（Rudolph
    等人，2023）。
- en: Rudolph et al.'s (2023) study explores ChatGPT's relevance in higher education,
    particularly in assessment, learning and teaching. However, the study has some
    limitations. The scarcity of scholarly resources on ChatGPT's application in higher
    education may have affected the depth of analysis. Additionally, relying on desktop
    analysis and lacking empirical evidence could impact the study's validity. Furthermore,
    a more comparative analysis of other AI writing tools' implications would provide
    a broader understanding of AI's impact on education. The study's positive view
    of AI's benefits may introduce bias, and a balanced assessment of risks and benefits
    would enhance objectivity.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）的研究探讨了ChatGPT在高等教育中的相关性，特别是在评估、学习和教学方面。然而，该研究存在一些局限性。关于ChatGPT在高等教育中应用的学术资源稀缺可能影响了分析的深度。此外，依赖桌面分析和缺乏实证证据可能会影响研究的有效性。此外，对其他AI写作工具影响的更比较分析将提供对AI对教育影响的更广泛理解。研究对AI益处的积极看法可能会引入偏见，而对风险和收益的平衡评估将增强客观性。
- en: 'The implications of Rudolph et al.''s (2023) study for our research on how
    ChatGPT may affect the role of students, instructors and institutions of higher
    education are as follows:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）的研究对我们研究ChatGPT可能如何影响学生、教师和高等教育机构的作用的启示如下：
- en: '*Understanding AI in Education*'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*理解教育中的AI*'
- en: Rudolph et al.'s study provides valuable insights into the applications and
    implications of AI, specifically ChatGPT, in higher education. It offers a framework
    categorising AI applications into student-facing, teacher-facing and system-facing
    dimensions, enabling a comprehensive understanding of AI's role in education.
    This is a framework that we can draw upon in our research to help us shed light
    on the diverse ways AI tools like ChatGPT can impact various educational contexts.
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）的研究为AI，特别是ChatGPT在高等教育中的应用和影响提供了宝贵的见解。它提供了一个框架，将AI应用分类为学生面向、教师面向和系统面向维度，使人们能够全面理解AI在教育中的作用。这是一个我们可以借鉴的框架，以帮助我们阐明AI工具如ChatGPT如何影响各种教育环境的不同方式。
- en: '*Innovative Assessment Methods*'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*创新评估方法*'
- en: The study highlights concerns about ChatGPT's potential to disrupt traditional
    assessment methods, such as essays and online exams. As we investigate the impact
    of AI tools on assessment practices, Rudolph et al.'s findings can guide our exploration
    of innovative assessment approaches that leverage AI while addressing the challenges
    posed by text-generating AI applications.
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该研究强调了ChatGPT可能破坏传统评估方法（如论文和在线考试）的担忧。随着我们调查AI工具对评估实践的影响，Rudolph等人的发现可以指导我们探索利用AI的创新评估方法，同时解决由文本生成AI应用带来的挑战。
- en: '*Opportunities for Personalised Learning*'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*个性化学习的机会*'
- en: Rudolph et al. emphasise the potential of AI tools, including ChatGPT, in personalising
    and adapting student learning experiences. This insight can inform our research
    on how AI can be utilised to tailor instruction, provide feedback and support
    student-centred pedagogies that foster individualised learning paths.
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rudolph等人强调AI工具（包括ChatGPT）在个性化和学生学习体验适应方面的潜力。这一见解可以指导我们研究如何利用AI来定制教学、提供反馈，并支持以学生为中心的教学法，培养个性化的学习路径。
- en: '*Leveraging AI for Instructor Support*'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*利用AI支持教师*'
- en: The study discusses how AI can reduce teacher workload and enhance classroom
    innovation through automated tasks like assessment and feedback. Our research
    can explore how AI tools like ChatGPT can complement instructors' efforts, allowing
    them to focus more on guiding students and providing personalised support.
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该研究讨论了AI如何通过自动化任务（如评估和反馈）来减少教师工作量并增强课堂创新。我们的研究可以探索AI工具如ChatGPT如何补充教师的努力，使他们能够更多地指导学生并提供个性化支持。
- en: '*Addressing Ethical Concerns*'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*解决伦理问题*'
- en: Rudolph et al.'s study acknowledges concerns about academic integrity and the
    potential misuse of AI tools like ChatGPT for plagiarism. As we investigate the
    ethical implications of AI integration in education, their findings can help us
    examine strategies to promote responsible AI use and combat academic misconduct
    effectively.
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）的研究承认了对学术诚信的担忧以及AI工具如ChatGPT被用于剽窃的潜在滥用。随着我们调查AI在教育中整合的伦理影响，他们的发现可以帮助我们审视促进负责任AI使用和有效打击学术不端行为的策略。
- en: '*Promoting Digital Literacy*'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*促进数字素养*'
- en: The study emphasises the importance of digital literacy education for students
    and faculty. We can incorporate this insight into our research by exploring how
    educational institutions can integrate AI tools like ChatGPT into the curriculum
    while educating users on its responsible and effective use.
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究强调了数字素养教育对学生和教师的重要性。我们可以通过探索教育机构如何将ChatGPT等人工智能工具融入课程，同时教育用户其负责任和有效使用来将这一见解纳入我们的研究。
- en: '*Collaborative Learning Opportunities*'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*协作学习机会*'
- en: Rudolph et al. discuss the potential of AI tools, like ChatGPT, to promote collaboration
    and teamwork among students. Our research can investigate how these tools can
    be integrated into group learning activities to foster a sense of community and
    mutual support.
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rudolph等人讨论了人工智能工具，如ChatGPT，促进学生在协作和团队合作中潜力的可能性。我们的研究可以调查这些工具如何融入小组学习活动，以培养社区感和相互支持感。
- en: '*Monitoring and Engagement*'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*监控与参与*'
- en: The study emphasises the need for ongoing monitoring and engagement with AI
    technologies in higher education. Our research can contribute to the ongoing discussion
    by examining how institutions can stay informed about AI advancements and adapt
    their teaching and assessment approaches accordingly.
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究强调了在高等教育中持续监控和参与人工智能技术的必要性。我们的研究可以通过考察机构如何了解人工智能的进步并相应地调整其教学和评估方法来对持续讨论做出贡献。
- en: Rudolph et al.'s (2023) study provides valuable insights into ChatGPT's implications
    in higher education, highlighting the transformative impact of AIEd tools on teaching
    and learning. Our research can build on these findings to understand how ChatGPT
    shapes student, instructor and institutional roles. However, limitations, such
    as scarce literature and lack of empirical evidence, warrant further exploration.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023）的研究为ChatGPT在高等教育中的影响提供了宝贵的见解，突出了AIEd工具对教学和学习的变革性影响。我们的研究可以在此基础上理解ChatGPT如何塑造学生、教师和机构的角色。然而，如文献匮乏和缺乏实证证据等局限性需要进一步探索。
- en: User Case Study Papers on ChatGPT
  id: totrans-281
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT的用户案例研究论文
- en: 'What if the Devil Is My Guardian Angel: ChatGPT as a Case Study of Using Chatbots
    in Education'
  id: totrans-282
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 如果恶魔是我的守护天使：ChatGPT作为教育中应用聊天机器人的案例研究
- en: 'Due to the global attention that ChatGPT has garnered, in their 2023 paper
    ‘What if the devil is my guardian angel: ChatGPT as a case study of using chatbots
    in education’ Tlili et al. (2023) ask ‘What are the concerns of using chatbots,
    specifically ChatGPT, in education?’ To address this question, they performed
    a qualitative instrumental case study to explore the utilisation of ChatGPT in
    education among early adopters. They accomplished this by analysing three types
    of data: social network analysis of tweets, content analysis of interviews and
    examination of user experiences. Tlili et al. (2023) employed social network analysis
    of tweets to examine public discourse on ChatGPT''s use in education. They collected
    2,330 tweets from 1,530 users between 23 December 2022, and 6 January 2023, using
    the search string ‘#ChatGPT* AND (education OR teaching OR learning)’. The researchers
    conducted sentiment and tSNE analysis on the tweets. For interviews, they selected
    diverse participants with ratings of familiarity with chatbots (average rating:
    3.02) and different backgrounds, including educators, developers, students and
    AI freelancers. Content analysis was performed on the interviews using a coding
    scheme. Additionally, they conducted hands-on experiences with ChatGPT involving
    three experienced educators, exploring various teaching scenarios and concerns
    (Tlili et al., 2023). Regarding the social network analysis of tweets, Tlili et
    al. (2023) found that the community formation around ChatGPT is fragmented, with
    individuals seeking information and discussion about its limitations and promises.
    The most used word pairs provide interesting insights, with some suggesting how
    to use AI-powered ChatGPT in education, while others hint at the turning point
    in educational systems. The researchers concluded that the public''s view on ChatGPT
    is diverse, with no collective consensus on whether it is a hype or a future opportunity.
    While positive sentiments (5%) outweighed negative sentiments (2.5%), the majority
    of sentiments (92.5%) were non-categorised, indicating uncertainty about ChatGPT
    in education. Word cluster analysis revealed users'' optimism about using AI-powered
    chatbots in education. However, there were also critical insights and concerns
    expressed, such as cheating and ethical implications. The researchers emphasise
    the need to examine the underlying AI technologies, like machine learning and
    deep learning, behind ChatGPT. Despite the optimistic overview, concerns about
    its use in education were also observed. The study concludes that negative sentiments
    demonstrated deeper and more critical thinking, suggesting caution in approaching
    ChatGPT''s integration into education (Tlili et al., 2023). Regarding the content
    analysis of interviews conducted by Tlili et al. (2023), the findings highlighted
    users'' positive perceptions of ChatGPT''s significance in revolutionising education.
    Participants acknowledged its effectiveness in enhancing educational success by
    providing foundational knowledge and simplifying complex topics. This potential
    led the researchers to believe in a paradigm shift in instructional methods and
    learning reform. However, a minority of participants expressed concerns about
    learners becoming overly reliant on ChatGPT, potentially hindering their creativity
    and critical thinking abilities. Regarding the quality of responses provided by
    Chatbots in education, Tlili et al.''s (2023) study revealed that participants
    generally found the dialogue quality and accuracy of information from ChatGPT
    to be satisfactory. However, they also noted occasional errors, limited information
    and instances of misleading responses, suggesting room for improvement. In terms
    of user experience, many participants in Tlili et al.''s (2023) study were impressed
    by the fluid and exciting conversations with ChatGPT. However, they also pointed
    out that ChatGPT''s humaneness needs improvement, particularly in terms of enhancing
    its social role since it currently lacks the ability to detect physical cues or
    motions of users. The study also showed that users perceived ChatGPT as a valuable
    tool for diverse disciplines, reducing teachers'' workload and providing students
    with immediate feedback. However, some users reported challenges with response
    accuracy, contradictions, limited contextual information and a desire for additional
    functionalities. On an ethical front, participants raised concerns about ChatGPT
    encouraging plagiarism and cheating, fostering laziness among users, and potentially
    providing biased or fake information. The study also highlighted worries about
    ChatGPT''s impact on students'' critical thinking and issues related to privacy
    through repetitive interactions.'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT在全球范围内获得的关注，Tlili等人（2023）在他们的2023年论文《如果恶魔是我的守护天使：以ChatGPT为例，探讨在教育中使用聊天机器人的案例研究》中提出问题：“使用聊天机器人，特别是ChatGPT，在教育中存在哪些担忧？”为了回答这个问题，他们进行了一项定性工具性案例研究，以探索早期采用者中ChatGPT在教育中的使用情况。他们通过分析三种类型的数据来完成这项任务：推文的社交网络分析、访谈的内容分析和用户体验的考察。Tlili等人（2023）使用推文的社交网络分析来考察公众对ChatGPT在教育中使用的讨论。他们收集了从2022年12月23日至2023年1月6日之间，来自1,530个用户的2,330条推文，搜索词为“#ChatGPT*
    AND (education OR teaching OR learning)”。研究人员对推文进行了情感和tSNE分析。对于访谈，他们选择了具有不同背景的多样化参与者，包括教育工作者、开发者、学生和AI自由职业者，他们对聊天机器人的熟悉度评分为3.02（平均）。访谈使用编码方案进行了内容分析。此外，他们还与三位经验丰富的教育工作者进行了ChatGPT的实际体验，探讨了各种教学场景和担忧（Tlili等人，2023）。关于推文的社交网络分析，Tlili等人（2023）发现围绕ChatGPT的社区形成是碎片化的，个人在寻求有关其局限性和承诺的信息和讨论。最常用的词对提供了有趣的见解，其中一些建议如何使用AI驱动的ChatGPT在教育中，而另一些则暗示了教育系统中的转折点。研究人员得出结论，公众对ChatGPT的看法是多样的，没有关于它是否是炒作还是未来机会的集体共识。虽然积极情绪（5%）超过了消极情绪（2.5%），但大多数情绪（92.5%）未被分类，这表明公众对ChatGPT在教育中的不确定性。词簇分析揭示了用户对使用AI驱动的聊天机器人在教育中的乐观态度。然而，也表达了一些批评性的见解和担忧，例如作弊和伦理影响。研究人员强调，需要检查ChatGPT背后的基础AI技术，如机器学习和深度学习。尽管总体上持乐观态度，但对其在教育中使用的担忧也被观察到。该研究得出结论，消极情绪表明了更深层次的批判性思维，这表明在将ChatGPT整合到教育中时应持谨慎态度（Tlili等人，2023）。关于Tlili等人（2023）进行的访谈内容分析，研究发现强调了用户对ChatGPT在教育中革命性意义的积极看法。参与者承认，它通过提供基础知识和简化复杂主题来提高教育成功的有效性。这种潜力使研究人员相信，教学方法和学习改革将发生范式转变。然而，少数参与者表达了对学习者过度依赖ChatGPT的担忧，这可能会阻碍他们的创造力和批判性思维能力。关于教育中聊天机器人提供的响应质量，Tlili等人（2023）的研究表明，参与者普遍认为ChatGPT的对话质量和信息准确性是令人满意的。然而，他们也指出偶尔会出现错误、信息有限和误导性响应的情况，这表明还有改进的空间。在用户体验方面，Tlili等人（2023）的研究中许多参与者对与ChatGPT进行的流畅和令人兴奋的对话印象深刻。然而，他们也指出，ChatGPT的人文性需要改进，特别是在增强其社会角色方面，因为它目前缺乏检测用户物理线索或动作的能力。该研究还表明，用户将ChatGPT视为跨学科的有价值工具，减轻了教师的负担，并为学生提供了即时反馈。然而，一些用户报告了响应准确性、矛盾、有限上下文信息和希望增加更多功能方面的挑战。在伦理方面，参与者对ChatGPT可能鼓励剽窃和作弊、在用户中培养懒惰以及可能提供有偏见或虚假信息的担忧。该研究还强调了关于ChatGPT对学生批判性思维的影响以及通过重复互动产生的隐私问题的担忧。
- en: Regarding investigation of user experiences, after daily meetings between the
    educators to compare the various results they obtained using ChatGPT, they identified
    ten scenarios where various educational concerns were present. These are as follows.
    The authors found that educators observed ChatGPT's ability to aid students in
    writing essays and answering exam questions, raising concerns about potential
    cheating and the effectiveness of cheating detection in education using chatbots
    (Tlili et al., 2023). Educators also recognised chatbots' proficiency in generating
    learning content but emphasised the need for content accuracy and reliability,
    questioning how to ensure content quality and verification for chatbot-generated
    content, including ChatGPT (Tlili et al., 2023). The educators each initiated
    a new ChatGPT chat using the same prompt. However, they all received different
    responses with varying answer quality, highlighting concerns about equitable access
    to high-quality learning content (Tlili et al., 2023). ChatGPT's generated quizzes
    varied in difficulty, leading to questions about the appropriateness of these
    learning assessments (Tlili et al., 2023). The educators stressed the importance
    of well-designed learning assessments for student understanding and problem-solving
    but found inconsistencies in chatbot-generated quizzes that could complicate teachers'
    responsibilities (Tlili et al., 2023). They noted that users' interaction styles
    influenced the level of learning assistance received from ChatGPT, raising questions
    about users' competencies and thinking styles to maximise its potential (Tlili
    et al., 2023). The educators emphasised the need to humanise chatbots, including
    the ability to express emotions and have a personality, to encourage reflective
    engagement in students (Tlili et al., 2023). The educators observed ChatGPT occasionally
    providing incomplete answers, raising concerns about its impact on user behaviour,
    especially among young learners who might use it as an excuse for incomplete tasks
    or assignments (Tlili et al., 2023). The educators stressed the importance of
    exploring potential adverse effects on users (Tlili et al., 2023). They also highlighted
    concerns about data storage and usage, with ChatGPT denying conversation data
    storage, emphasising the need to safeguard user privacy, particularly for young
    individuals (Tlili et al., 2023). During an interaction with ChatGPT, one educator's
    request for a blog's American Psychological Association (APA) format led to intriguingly
    inaccurate information, raising questions about ensuring reliable responses from
    ChatGPT to prevent harm or manipulation (Tlili et al., 2023).
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 关于用户体验的调查，教育者在每日会议中比较了他们使用ChatGPT获得的各种结果后，确定了十个存在各种教育问题的场景。具体如下。作者发现，教育者观察到ChatGPT在帮助学生撰写论文和回答考试问题方面的能力，对潜在的作弊行为以及使用聊天机器人进行教育中作弊检测的有效性提出了担忧（Tlili等人，2023年）。教育者还认识到聊天机器人在生成学习内容方面的熟练程度，但强调了内容准确性和可靠性的必要性，质疑如何确保聊天机器人生成内容，包括ChatGPT（Tlili等人，2023年）的内容质量和验证。教育者每个人都使用相同的提示启动了一个新的ChatGPT聊天。然而，他们收到了不同质量答案的不同响应，突显了对高质量学习内容公平获取的担忧（Tlili等人，2023年）。ChatGPT生成的测验难度各异，引发了关于这些学习评估适当性的疑问（Tlili等人，2023年）。教育者强调了精心设计的评估对于学生理解和解决问题的必要性，但发现聊天机器人生成的测验中存在不一致性，可能会使教师的责任复杂化（Tlili等人，2023年）。他们指出，用户的互动风格影响了从ChatGPT获得的学习辅助水平，提出了关于用户能力思考和风格以最大化其潜力的疑问（Tlili等人，2023年）。教育者强调了使聊天机器人人性化的必要性，包括表达情感和具有个性的能力，以鼓励学生进行反思性参与（Tlili等人，2023年）。教育者观察到ChatGPT偶尔提供不完整的答案，对其对用户行为的影响提出了担忧，特别是对于可能将其作为未完成任务或作业借口的小学习者（Tlili等人，2023年）。教育者强调了探索潜在对用户不利影响的必要性（Tlili等人，2023年）。他们还强调了关于数据存储和使用的担忧，ChatGPT否认存储对话数据，强调保护用户隐私的必要性，尤其是对年轻人（Tlili等人，2023年）。在一次与ChatGPT的互动中，一位教育者请求以美国心理学会（APA）格式提供博客，结果得到了令人惊讶的不准确信息，引发了关于确保ChatGPT提供可靠响应以防止伤害或操纵的疑问（Tlili等人，2023年）。
- en: In their discussion, Tlili et al. (2023) express their belief that their findings
    demonstrate the potential of ChatGPT to bring about transformative changes in
    education. However, despite acknowledging its potential, they also raise several
    concerns regarding the utilisation of ChatGPT in educational settings. The authors
    acknowledge that while some institutions have banned ChatGPT in education due
    to concerns about cheating and manipulation, they propose a responsible adoption
    approach. This approach involves guidelines and interdisciplinary discussions
    involving experts from education, security and psychology. They note that, despite
    drawbacks, recent studies indicate educational opportunities in ChatGPT that can
    enhance learning and instruction, prompting a need for further research on the
    consequences of excessive reliance on chatbot technology in education. Highlighting
    the transformative impact of technology in education, the authors also emphasise
    ChatGPT's potential to simplify essay writing and introduce innovative teaching
    methods like oral debates for assessing critical thinking. They advocate for diverse
    assessment approaches and the reformation of traditional classrooms, along with
    exploring the balance between chatbots and human interaction, including collaborative
    potential with human tutors. Consequently, they call for further research to investigate
    how chatbots can enhance learning outcomes and promote effective human–machine
    collaboration in education. Regarding user experiences, Tlili et al. (2023) reveal
    variations of output quality based on question wording, stressing the importance
    of learning how to obtain the most useful output for learning. They note that
    while ChatGPT doesn't demand extensive technical skills, critical thinking and
    questioning abilities are essential for optimal results. As a solution, they suggest
    further research on necessary competencies and their development for effective
    chatbot use, including ChatGPT. While ChatGPT shows partial humanisation, the
    authors highlight limitations in reflective thinking and emotional expression,
    which they believe may affect its effectiveness in education. Thus, they call
    for research on developing more humanised chatbots in education, drawing from
    relationship formation theories and exploring the impact of human–chatbot relationships
    on student learning outcomes. However, they express concerns about treating ChatGPT
    as a human, citing instances where it was listed as a co-author in academic articles,
    raising ethical, regulatory, originality, authorship and copyright questions.
    To ensure responsible design, the authors emphasise the need to consider inclusion,
    ethics and usability when implementing chatbots in education. They highlight instances
    where ChatGPT exhibited harmful behaviour, stressing the importance of responsible
    AI design that addresses biases, fairness and transparency. The authors advocate
    for user-centred design principles, taking into account social, emotional and
    pedagogical aspects. They recommend future research should focus on designing
    responsible chatbots aligned with human values and legal frameworks for safe use
    in education.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们的讨论中，Tlili等人（2023年）表达了自己相信他们的发现证明了ChatGPT在教育领域带来变革性变化的潜力。然而，尽管承认其潜力，他们也对ChatGPT在教育环境中的使用提出了几个担忧。作者承认，尽管一些机构因担心作弊和操纵而禁止在教育中使用ChatGPT，但他们提出了一个负责任的应用方法。这种方法包括制定指南和涉及来自教育、安全和心理学领域的专家的跨学科讨论。他们指出，尽管存在缺点，但最近的研究表明ChatGPT在教育中存在提升学习和教学的机会，这促使人们进一步研究过度依赖聊天机器人技术在教育中的后果。强调技术在教育中的变革性影响，作者还强调ChatGPT简化论文写作和引入如口头辩论等创新教学方法以评估批判性思维的潜力。他们提倡多样化的评估方法和传统课堂的改革，同时探索聊天机器人和人类互动之间的平衡，包括与人类导师的协作潜力。因此，他们呼吁进一步研究以调查聊天机器人如何提高学习成果并促进教育中有效的人机协作。关于用户体验，Tlili等人（2023年）揭示了基于问题措辞的输出质量变化，强调了学习如何获得最有用的学习输出的重要性。他们指出，尽管ChatGPT不需要广泛的技术技能，但批判性思维和提问能力对于获得最佳结果至关重要。作为解决方案，他们建议进一步研究必要的技能及其发展，包括ChatGPT的有效使用。尽管ChatGPT显示出部分人性化，但作者强调了反思思考和情感表达方面的局限性，他们认为这可能会影响其在教育中的有效性。因此，他们呼吁在教育中开发更人性化的聊天机器人，借鉴关系形成理论，并探讨人-聊天机器人关系对学生学习成果的影响。然而，他们对于将ChatGPT视为人类表示担忧，引用了其在学术论文中被列为合著者的情况，提出了伦理、监管、原创性、作者权和版权问题。为了确保负责任的设计，作者强调在实施聊天机器人时需要考虑包容性、伦理和可用性。他们强调ChatGPT表现出有害行为的情况，强调了负责任的人工智能设计的重要性，该设计解决偏见、公平和透明度问题。作者提倡以用户为中心的设计原则，考虑到社会、情感和教学方面。他们建议未来的研究应专注于设计符合人类价值观和法律框架、在教育中安全使用的负责任聊天机器人。
- en: Tlili et al.'s (2023) study offers a comprehensive understanding of public discourse
    on ChatGPT in education through diverse data sources like tweets, interviews and
    user experiences. However, its small sample size and limited time frame for data
    collection raise concerns about generalisability and capturing evolving opinions.
    Content analysis may also introduce subjective interpretations and biases. Despite
    limitations, the study highlights the need for responsible implementation and
    guidelines in educational settings. It underscores the importance of adapting
    teaching practices and exploring human–chatbot relationships' impact on learning
    outcomes. Future research should focus on the need to upskill competencies and
    the development of more humanised and responsible chatbots for education. In addition,
    continuous research is crucial to maximise chatbots' potential while addressing
    concerns in educational contexts.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: Tlili等人（2023）的研究通过分析来自推文、访谈和用户体验等多样化的数据来源，对教育领域关于ChatGPT的公共话语提供了全面的理解。然而，其样本量小且数据收集的时间框架有限，这引发了关于普遍性和捕捉不断变化意见的担忧。内容分析也可能引入主观解释和偏见。尽管存在局限性，但该研究强调了在教育环境中负责任实施和制定指南的必要性。它强调了调整教学实践和探索人机关系对学习成果影响的重要性。未来的研究应侧重于提升技能的需求和开发更人性化和负责任的教育聊天机器人。此外，持续研究对于在教育环境中最大化聊天机器人的潜力同时解决担忧至关重要。
- en: 'We believe the implications of Tlili et al.''s (2023) study for our research
    are as follows:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认为，Tlili等人（2023）的研究对我们研究的影响如下：
- en: '*Comprehensive Understanding*'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*全面理解*'
- en: Tlili et al.'s study provides a holistic view of public discourse and opinions
    on ChatGPT in education through the analysis of tweets, interviews and user experiences.
    This comprehensive understanding can help inform our research on how different
    stakeholders perceive and interact with ChatGPT in educational settings.
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Tlili等人通过分析推文、访谈和用户体验，为教育领域关于ChatGPT的公共话语和观点提供了一个全面的视角。这种全面的理解可以帮助我们了解不同利益相关者在教育环境中如何感知和互动ChatGPT。
- en: '*Potential Benefits and Concerns*'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*潜在利益与担忧*'
- en: The study highlights both the potential benefits and concerns associated with
    the use of ChatGPT in education. As we investigate the impact on students, instructors
    and institutions, it's essential to consider these aspects to develop a balanced
    perspective of the technology's implications.
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究突出了使用ChatGPT在教育中的潜在利益和担忧。在调查对学生、教师和机构的影响时，考虑这些方面对于形成对技术影响的平衡观点至关重要。
- en: '*Responsible Implementation*'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*负责任实施*'
- en: Tlili et al. suggests that rather than banning ChatGPT, responsible implementation
    should be emphasised. This implies the need for guidelines, policies and interdisciplinary
    discussions involving experts from education, security and psychology to ensure
    ethical and transparent use of ChatGPT in educational contexts. This is an aspect
    that we look to investigate in our research.
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Tlili等人建议，与其禁止ChatGPT，不如强调负责任的实施。这意味着需要制定指南、政策和涉及来自教育、安全和心理学领域的专家的跨学科讨论，以确保在教育环境中ChatGPT的道德和透明使用。这是我们研究中要调查的一个方面。
- en: '*Adaptation of Teaching Practices*'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*教学实践调整*'
- en: The study points out the transformative impact of technology in education, requiring
    educators to adapt their practices. As we examine the role of instructors, it's
    important to consider how ChatGPT may influence instructional delivery and assessment
    methods, and how educators can effectively incorporate chatbots into their teaching
    philosophies.
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究指出，技术在教育领域的变革性影响，要求教育工作者调整他们的实践。在审视教师角色时，考虑ChatGPT可能对教学交付和评估方法的影响，以及教育工作者如何有效地将聊天机器人融入他们的教学理念，这一点非常重要。
- en: '*Ensuring Fairness and Equity*'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*确保公平与平等*'
- en: Tlili et al.'s findings raise concerns about the fairness and equal access to
    educational content provided by ChatGPT, which bears relevance to our research
    as we investigate how to provide equitable access to bots for all students.
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Tlili等人的发现对ChatGPT在教育内容提供中的公平性和平等访问提出了担忧，这与我们的研究相关，因为我们正在研究如何为所有学生提供对聊天机器人的公平访问。
- en: '*Enhancing User Competencies*'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*提升用户技能*'
- en: The study highlights that effective use of ChatGPT requires critical thinking
    and question-asking skills. Our research can explore how students and instructors
    can develop the necessary competencies to optimally interact with chatbots and
    leverage their potential for enhanced learning experiences.
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究指出，有效使用ChatGPT需要批判性思维和提问技巧。我们的研究可以探讨学生和教师如何培养与聊天机器人进行最佳互动所需的必要能力，并利用其潜力以增强学习体验。
- en: These implications can serve as valuable insights and guiding points for our
    research on the impact of ChatGPT on the role of students, instructors and institutions
    of higher education. By considering the potential benefits, challenges and responsible
    use of the technology, we can develop a comprehensive and balanced understanding
    of its implications in the educational landscape.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 这些影响可以作为我们研究ChatGPT对学生、教师和高等教育机构角色影响的有价值见解和指导点。通过考虑技术的潜在益处、挑战和负责任的使用，我们可以对教育领域中其影响有一个全面和平衡的理解。
- en: 'Exploring the Usage of ChatGPT in Higher Education: Frequency and Impact on
    Productivity'
  id: totrans-301
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 探索ChatGPT在高等教育中的使用：频率及其对生产力的影響
- en: 'In the second instructor user experience paper, Firaina and Sulisworo (2023)
    conducted a study titled ‘Exploring the Usage of ChatGPT in Higher Education:
    Frequency and Impact on Productivity’, with the aim of gaining insights into lecturers''
    perspectives and decision-making processes regarding the adoption of ChatGPT in
    learning. To do this, they interviewed five lecturers to gather their experiences
    and viewpoints on ChatGPT, collected and analysed the data and interpreted it
    to deepen their understanding of the effects of using ChatGPT on learning and
    the factors influencing lecturers'' choices. Their research aimed to identify
    challenges, needs and expectations of lecturers related to using ChatGPT for improving
    learning outcomes and provide recommendations for technology developers and education
    decision-makers. Their aim was to use their findings to offer valuable insights
    for lecturers to enhance the effectiveness of learning and inform decision-making
    in the education field. Based on the frequency of ChatGPT usage reported in the
    interviews, Firaina and Sulisworo (2023) found that most respondents preferred
    using it frequently and found it helpful for obtaining new ideas in everyday learning.
    However, they also acknowledged the need for additional tools in certain cases.
    The authors concluded that ChatGPT serves as a communication channel between respondents
    and the information needed for learning, functioning as a medium for accessing
    new information and ideas. They believe this aligns with the constructivist learning
    theory, where individuals actively construct knowledge based on experiences. Furthermore,
    the authors observed that ChatGPT assists respondents in constructing new knowledge
    by providing access to fresh information and ideas, akin to a social media platform
    for learning. Thus, they emphasise the active role of individuals in constructing
    knowledge through experiences, reflection and interpretation. They note that,
    in the case of the respondents, ChatGPT was utilised as a source of information
    and ideas to facilitate the development of new knowledge and skills in the learning
    process. Based on the conducted interviews, the authors also discovered that using
    ChatGPT has a positive impact on productivity and learning effectiveness. They
    report how one lecturer highlighted how ChatGPT facilitated a quicker understanding
    of the material and saved time in searching for learning resources. However, the
    authors acknowledge the importance of conducting further research to ensure accurate
    responses from ChatGPT. They also report that another lecturer mentioned increased
    productivity, completing tasks more quickly and saving time in knowledge resource
    searches. Nonetheless, the authors emphasise the need for a clear understanding
    of the overall work to align with intended goals. From their findings, the authors
    connect the use of ChatGPT to communication theory, specifically symbolic interaction
    theory, which explains how humans communicate using symbolic signs and attribute
    meaning to them. They also draw upon media theory, particularly the theory of
    new media, which considers media as a social environment influencing interactions
    and information acquisition. Additionally, the authors suggest that the use of
    ChatGPT aligns with constructivist theory in learning, emphasising the process
    of knowledge construction by learners through experience and reflection (Firaina
    & Sulisworo, 2023). In addition, the authors found that ChatGPT can be a valuable
    tool for supporting various aspects of a lecturer''s work. However, they note
    that the ability to select relevant commands was crucial in determining the usefulness
    of the obtained information. Furthermore, they report that the utilisation of
    ChatGPT was observed to be beneficial in several learning aspects for the respondents.
    This is because, firstly, it assisted them in translating scientific articles
    into English, which helped overcome their English proficiency limitations. And
    secondly, ChatGPT aided the respondents in searching for up-to-date ideas in learning
    that catered to their specific needs. The authors give the example whereby instructors
    could request suggestions on teaching with a constructivist teaching and learning
    approach and receive multiple alternative recommendations. In conclusion, Firaina
    and Sulisworo (2023) found that despite its limitations, respondents recognised
    the benefits of using ChatGPT to enhance productivity and efficiency in learning.
    Consequently, they consider ChatGPT to be an intriguing alternative in education,
    emphasising the importance of maintaining a critical approach and verifying the
    information obtained. The authors suggest that further research, including additional
    interviews and case studies, is necessary to obtain a more comprehensive understanding
    of the use of ChatGPT in learning, as this would help to deepen knowledge and
    insights regarding its implementation and potential impact (Firaina & Sulisworo,
    2023).'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二篇关于讲师用户体验的论文中，Firaina 和 Sulisworo（2023）进行了一项研究，标题为《探索 ChatGPT 在高等教育中的应用：频率及其对生产力的影响》，旨在深入了解讲师对采用
    ChatGPT 进行学习的观点和决策过程。为此，他们采访了五位讲师，收集了他们关于 ChatGPT 的经验和观点，收集并分析了数据，并对其进行解释，以加深他们对使用
    ChatGPT 对学习的影响以及影响讲师选择因素的理解。他们的研究旨在确定讲师在使用 ChatGPT 提高学习成果方面的挑战、需求和期望，并为技术开发者和教育决策者提供建议。他们的目标是利用他们的发现为讲师提供有价值的见解，以增强学习效果并指导教育领域的决策。根据访谈中报告的
    ChatGPT 使用频率，Firaina 和 Sulisworo（2023）发现大多数受访者更喜欢频繁使用它，并认为它在日常学习中获取新想法方面很有帮助。然而，他们也承认在某些情况下需要额外的工具。作者得出结论，ChatGPT
    作为受访者与学习所需信息之间的沟通渠道，作为一种获取新信息和思想的媒介。他们认为这与建构主义学习理论相符，该理论认为个人基于经验主动构建知识。此外，作者观察到
    ChatGPT 通过提供新鲜信息和思想，帮助受访者构建新知识，类似于学习型社交媒体平台。因此，他们强调个人通过经验、反思和解释在构建知识中的积极作用。他们指出，在受访者的案例中，ChatGPT
    被用作信息来源和思想，以促进学习过程中新知识和技能的发展。基于进行的访谈，作者还发现使用 ChatGPT 对生产力和学习效果有积极影响。他们报告了一位讲师如何强调
    ChatGPT 如何促进对材料的更快理解，并在寻找学习资源上节省时间。然而，作者承认进行进一步研究的重要性，以确保从 ChatGPT 获得准确响应。他们还报告说，另一位讲师提到了提高生产力，更快完成任务，并在知识资源搜索上节省时间。尽管如此，作者强调需要对整体工作有一个清晰的理解，以符合预期目标。根据他们的发现，作者将
    ChatGPT 的使用与沟通理论联系起来，特别是符号互动理论，该理论解释了人类如何使用符号符号并赋予其意义。他们还借鉴了媒体理论，特别是新媒体理论，该理论将媒体视为影响互动和信息获取的社会环境。此外，作者建议
    ChatGPT 的使用与学习中的建构主义理论相符，强调学习者通过经验和反思构建知识的过程（Firaina & Sulisworo，2023）。此外，作者发现
    ChatGPT 可以作为支持讲师工作各个方面的宝贵工具。然而，他们指出，选择相关命令的能力在确定获得信息的有用性方面至关重要。此外，他们报告说，ChatGPT
    的使用在受访者的几个学习方面观察到是有益的。这是因为，首先，它帮助他们将科学文章翻译成英语，这有助于克服他们的英语水平限制。其次，ChatGPT 帮助受访者寻找满足他们特定需求的学习中的最新观点。作者举例说明，教师可以请求关于采用建构主义教学和学习方法的建议，并收到多个替代建议。总之，Firaina
    和 Sulisworo（2023）发现，尽管有其局限性，受访者仍认识到使用 ChatGPT 提高学习生产力和效率的好处。因此，他们认为 ChatGPT 是教育中一个有趣的替代品，强调保持批判性态度和验证获取的信息的重要性。作者建议进行进一步研究，包括额外的访谈和案例研究，以更全面地了解
    ChatGPT 在学习中的应用，因为这有助于深化对其实施和潜在影响的知识和见解（Firaina & Sulisworo，2023）。
- en: Firaina and Sulisworo's (2023) qualitative study stands out due to its in-depth
    interviews with five lecturers, providing rich insights into their experiences
    with ChatGPT in education. The researchers effectively connected their findings
    with educational theories, such as constructivist and communication theories,
    enhancing the credibility of their conclusions. The study highlights practical
    implications for lecturers and educational decision-makers, suggesting that ChatGPT
    positively impacts productivity and learning effectiveness. However, some limitations,
    like the small sample size and lack of a comparison group, should be considered
    when interpreting the results. Future research with larger and more diverse samples,
    along with comparative studies, can further explore the benefits and challenges
    of using AI-powered chatbots like ChatGPT in educational settings.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: Firaina 和 Sulisworo（2023）的定性研究因其对五位讲师的深入访谈而脱颖而出，提供了关于他们在教育中使用 ChatGPT 的丰富见解。研究人员有效地将他们的发现与教育理论，如建构主义和传播理论联系起来，增强了他们结论的可信度。该研究突出了对讲师和教育决策者的实际应用，表明
    ChatGPT 对生产力和学习效果有积极影响。然而，在解读结果时，应考虑一些局限性，如样本量小和缺乏对照组。未来的研究需要更大、更多样化的样本，以及比较研究，以进一步探索在教育环境中使用像
    ChatGPT 这样的 AI 聊天机器人的利益和挑战。
- en: Firaina and Sulisworo's (2023) study has several implications for our research
    on how ChatGPT affects the role of students, instructors and institutions in higher
    education.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: Firaina 和 Sulisworo（2023）的研究对我们关于 ChatGPT 如何影响高等教育中学生在校生、教师和机构角色的研究有几个启示。
- en: '*Faculty Perspectives*'
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*教师观点*'
- en: The in-depth interviews conducted by Firaina and Sulisworo provide valuable
    insights into how instructors perceive and utilise ChatGPT in their teaching and
    learning processes. Understanding faculty perspectives can help inform our study
    on how instructors perceive the integration of AI chatbots in educational practices
    and the factors influencing their decision-making.
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Firaina 和 Sulisworo 进行的一系列深入访谈提供了宝贵的见解，揭示了教师如何感知和利用 ChatGPT 进行教学和学习过程。了解教师观点可以帮助我们了解教师如何看待人工智能聊天机器人在教育实践中的整合，以及影响他们决策的因素。
- en: '*Impact on Productivity*'
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*对生产力的影響*'
- en: The findings from Firaina and Sulisworo's study suggest that ChatGPT positively
    impacts productivity and efficiency for instructors. This insight may serve as
    a basis for investigating how the adoption of AI chatbots in higher education
    can enhance instructors' efficiency in tasks such as lesson planning, content
    creation and resource searching.
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Firaina 和 Sulisworo 的研究发现表明，ChatGPT 对教师的效率和效率有积极影响。这一见解可能成为调查高等教育中采用人工智能聊天机器人如何提高教师在课程规划、内容创作和资源搜索等任务中的效率的基础。
- en: '*Practical Implications*'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*实际应用*'
- en: The practical implications highlighted by Firaina and Sulisworo's study can
    inform our research on the potential benefits and challenges of integrating AI
    chatbots in higher education. Understanding how instructors navigate the use of
    ChatGPT can offer insights into best practices and strategies for effectively
    integrating AI chatbots in educational settings.
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Firaina 和 Sulisworo 的研究提出的实际应用可以为我们研究在高等教育中整合人工智能聊天机器人的潜在利益和挑战提供信息。了解教师如何使用
    ChatGPT 可以提供关于在教育环境中有效整合人工智能聊天机器人的最佳实践和策略的见解。
- en: Overall, Firaina and Sulisworo's study serves as a valuable reference for our
    research, offering insights into how instructors perceive and utilise ChatGPT
    in higher education. By incorporating their findings and considering the study's
    implications, we can strengthen the theoretical foundation and practical relevance
    of our research on the effects of AI chatbots on students, instructors and institutions
    in the higher education context. From looking at instructor user experiences,
    we now turn to researcher user experiences.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，Firaina 和 Sulisworo 的研究为我们提供了宝贵的参考，为我们研究教师如何感知和利用 ChatGPT 在高等教育中提供了见解。通过结合他们的发现并考虑研究的影响，我们可以加强我们关于
    AI 聊天机器人在高等教育环境中对学生、教师和机构影响的研究的理论基础和实践相关性。从观察教师用户体验来看，我们现在转向研究人员的用户体验。
- en: 'Exploring the Role of Artificial Intelligence in Enhancing Academic Performance:
    A Case Study of ChatGPT'
  id: totrans-312
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 探索人工智能在提高学术表现中的作用：ChatGPT 的案例研究
- en: 'Alshater''s 2022 study, titled ‘Exploring the Role of Artificial Intelligence
    in Enhancing Academic Performance: A Case Study of ChatGPT’, aims to investigate
    the potential of AI, specifically NLP, in improving academic performance, using
    the field of economics and finance as an illustrative example. The study adopts
    a case study methodology, using ChatGPT as a specific NLP tool to illustrate its
    potential for advancing research in this domain. By examining the application
    of ChatGPT in economics and finance research, Alshater explores its capabilities,
    benefits and limitations. His study also addresses the ethical considerations
    and potential biases associated with using ChatGPT and similar technologies in
    academic research, while also discussing future developments and implications.
    Through this case study approach, Alshater endeavours to offer valuable insights
    and guidance to researchers seeking to incorporate AI into their scholarly pursuits.'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔沙特的2022年研究，题为《探索人工智能在提升学术表现中的作用：以ChatGPT为例的案例研究》，旨在调查人工智能，特别是自然语言处理（NLP），在提高学术表现方面的潜力，并以经济学和金融领域作为说明性的例子。该研究采用案例研究方法，使用ChatGPT作为特定的NLP工具来展示其在该领域推进研究潜力的可能性。通过考察ChatGPT在经济学和金融研究中的应用，阿尔沙特探讨了其能力、益处和局限性。他的研究还讨论了在学术研究中使用ChatGPT和类似技术相关的伦理考量以及潜在偏见，同时讨论了未来的发展和影响。通过这种案例研究方法，阿尔沙特努力为寻求将人工智能融入学术追求的研究者提供有价值的见解和指导。
- en: Alshater's findings revealed that the utilisation of ChatGPT and other sophisticated
    chatbots in research can have various implications, encompassing both advantages
    and disadvantages. According to Alshater (2022), the use of ChatGPT and other
    advanced chatbots in research offers numerous benefits. These include enhanced
    research efficiency through task automation, such as data extraction and analysis
    from financial documents, and the generation of reports and research summaries.
    Additionally, ChatGPT can contribute to improved research accuracy by detecting
    errors in data or analysis, ensuring greater reliability of findings. Moreover,
    the flexibility of ChatGPT enables researchers to address a wide range of research
    questions, generating realistic scenarios for financial modelling and simulating
    complex economic systems. The time-consuming tasks that typically require significant
    human effort, such as data analysis of large volumes of data or report generation,
    can be expedited through ChatGPT's automation. Furthermore, Alshater argues that
    ChatGPT and similar advanced chatbots can provide more objective insights by eliminating
    personal biases and subjective judgement and by identifying patterns or trends
    in financial data not immediately apparent to humans. Alshater also notes that
    these technologies can ensure greater consistency in research processes by following
    standardised procedures and protocols, aiding in conducting data analysis in a
    consistent and reproducible manner. In Alshater's study, he not only explores
    the benefits of ChatGPT and advanced chatbots but also highlights their limitations.
    One significant factor influencing their effectiveness is the quality and relevance
    of their training data, as inadequate or biased data can hamper their performance.
    Moreover, Alshater points out that these chatbots may lack expertise in specialised
    fields like economics and finance, affecting their ability to accurately analyse
    data and interpret findings. The ethical implications of using chatbots in research
    are also a concern raised by Alshater. He discusses the potential displacement
    of human labour and the perpetuation of biases present in the training data, urging
    researchers to consider these ethical issues carefully. Additionally, he warns
    of the risk of chatbots being misused for unethical purposes, such as generating
    spam or impersonating others, emphasising the need for vigilance and preventive
    measures. Alshater notes that as technology advances, the capabilities of chatbots
    evolve and that this means researchers must adapt their methods and approaches
    accordingly to keep up with these technological advancements. However, he also
    notes that it's important to acknowledge that chatbots, including ChatGPT, may
    occasionally generate repetitive or irrelevant responses due to their lack of
    contextual understanding, necessitating caution when using them in research. Alshater's
    study also delves into the ethical considerations and potential biases related
    to utilising ChatGPT and similar technologies in academic research. He highlights
    the crucial role of extensive training data in these technologies and the potential
    for biases or inaccuracies in the generated output. He gives the example whereby
    if the training data predominantly represents specific demographics or cultural
    backgrounds, it may lead to biased results or reinforce existing stereotypes.
    To address this, Alshater emphasises the need for careful evaluation and understanding
    of biases within the training data and proactive measures to mitigate them, ensuring
    fairness and impartiality in the model's outcomes. Additionally, Alshater sheds
    light on the intricate algorithms and processes involved in these technologies,
    which may not always be fully transparent or understood by users. This lack of
    transparency can pose challenges in holding the technologies accountable for potential
    biases or errors that may arise. Thus, he underscores the importance of prioritising
    transparency in the functioning of these technologies, allowing for scrutiny and
    ensuring fairness and impartiality in their operations. Moreover, Alshater emphasises
    the significant role of human oversight and intervention when using these technologies,
    noting that, as ChatGPT and similar technologies are not fully autonomous, careful
    consideration of the roles and responsibilities of humans in their implementation
    is essential. This includes the ability to intervene and address any errors or
    biases that may occur, ensuring the technologies are used responsibly. Alshater
    raises legitimate concerns about privacy and data protection when incorporating
    technologies into academic research, as personal data collection and processing
    may be necessary. Therefore, he emphasises the importance of implementing suitable
    measures to safeguard individuals' privacy, preventing unauthorised access or
    misuse of their data and upholding ethical standards in research practices. While
    acknowledging the potential benefits of these technologies in specific research
    tasks, such as data analysis, Alshater cautions against overreliance and the complete
    replacement of human judgement or interpretation. He advocates for a balanced
    approach that leverages the strengths of these technologies while respecting the
    significance of human expertise in research.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: Alshater的研究发现，在研究中使用ChatGPT和其他高级聊天机器人可以产生各种影响，包括优点和缺点。根据Alshater（2022）的观点，ChatGPT和其他高级聊天机器人在研究中的应用提供了许多好处。这些包括通过自动化任务（如从财务文件中提取和分析数据以及生成报告和研究摘要）提高研究效率，以及通过检测数据或分析中的错误来提高研究准确性，确保发现结果的可靠性。此外，ChatGPT的灵活性使研究人员能够解决广泛的研究问题，为金融建模和模拟复杂经济系统生成现实场景。通常需要大量人力投入的耗时任务，如大量数据的分析或报告生成，可以通过ChatGPT的自动化来加速。此外，Alshater认为，ChatGPT和类似的高级聊天机器人可以通过消除个人偏见和主观判断以及识别人类不易察觉的金融数据中的模式或趋势，提供更客观的见解。Alshater还指出，这些技术可以通过遵循标准化程序和协议来确保研究过程的更大一致性，有助于以一致和可重复的方式进行数据分析。在Alshater的研究中，他不仅探讨了ChatGPT和高级聊天机器人的好处，还突出了它们的局限性。影响它们有效性的一个重要因素是训练数据的质量和相关性，因为数据不足或存在偏见可能会妨碍其性能。此外，Alshater指出，这些聊天机器人可能在经济学和金融等专门领域缺乏专业知识，这会影响它们准确分析数据和解释发现的能力。Alshater还提出了使用聊天机器人在研究中的伦理影响，他讨论了可能取代人力劳动以及训练数据中存在的偏见的持续存在，敦促研究人员仔细考虑这些伦理问题。此外，他警告说，聊天机器人可能被误用于不道德的目的，如生成垃圾邮件或冒充他人，强调需要保持警惕并采取预防措施。Alshater指出，随着技术的进步，聊天机器人的能力也在不断发展，这意味着研究人员必须相应地调整他们的方法和途径，以跟上这些技术进步。然而，他也指出，承认聊天机器人，包括ChatGPT，可能由于缺乏上下文理解而偶尔生成重复或不相关的响应是很重要的，因此在研究中使用它们时需要谨慎。Alshater的研究还深入探讨了在学术研究中利用ChatGPT和类似技术相关的伦理考虑和潜在偏见。他强调了在这些技术中广泛训练数据的关键作用以及生成输出中可能存在的偏见或不准确性的可能性。他举了一个例子，即如果训练数据主要代表特定的群体或文化背景，可能会导致偏见的结果或强化现有的刻板印象。为了解决这个问题，Alshater强调了仔细评估和理解训练数据中偏见以及采取主动措施来减轻它们的重要性，以确保模型结果的公平性和无偏见。此外，Alshater还揭示了这些技术中涉及的复杂算法和过程，这些可能并不总是完全透明或为用户所理解。这种缺乏透明度可能会在追究技术可能出现的偏见或错误的责任时带来挑战。因此，他强调了在技术运作中优先考虑透明度的重要性，以便进行审查并确保其操作的公平性和无偏见。此外，Alshater强调了在使用这些技术时人类监督和干预的显著作用，他指出，由于ChatGPT和类似技术并非完全自主，因此在实施过程中仔细考虑人类在其中的角色和责任是至关重要的。这包括干预和解决可能出现的任何错误或偏见的能力，确保这些技术负责任地使用。Alshater在将技术融入学术研究时提出了关于隐私和数据保护的合理担忧，因为可能需要收集和处理个人数据。因此，他强调了实施适当措施来保护个人隐私、防止未经授权访问或滥用其数据以及维护研究实践中的伦理标准的重要性。虽然承认这些技术在特定研究任务（如数据分析）中的潜在好处，但Alshater警告不要过度依赖并完全取代人类的判断或解释。他主张采取平衡的方法，利用这些技术的优势，同时尊重人类在研究中的专业知识的重要性。
- en: Overall, Alshater believes that ChatGPT as an advanced and versatile NLP tool
    has the potential to bring about a revolutionary impact on academic research (2022).
    He expresses his belief that the tool's impressive capabilities in generating
    human-like text, analysing data and simulating scenarios make it an invaluable
    asset for researchers in various fields. However, he also highlights the importance
    of considering limitations such as generalisability, data quality and domain expertise
    when utilising ChatGPT and similar tools. Despite these limitations, he asserts
    that the potential benefits outweigh the drawbacks. Alshater concludes by emphasising
    how these technologies empower researchers to efficiently process and analyse
    vast amounts of data, create realistic scenarios for theory testing and effectively
    communicate their findings. He expresses his belief that these capabilities hold
    great promise in advancing research across diverse fields and driving transformative
    discoveries and insights that enhance our understanding of the world.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，Alshater 认为，作为一款先进且多功能的自然语言处理工具，ChatGPT 有可能对学术研究产生革命性的影响（2022）。他表达了自己对工具在生成类似人类文本、分析数据和模拟场景方面的惊人能力深信不疑，认为它是各个领域研究人员宝贵的资产。然而，他也强调了在利用
    ChatGPT 和类似工具时考虑局限性（如普遍性、数据质量和领域专业知识）的重要性。尽管存在这些局限性，但他断言潜在的好处超过了缺点。Alshater 在结论中强调，这些技术使研究人员能够高效地处理和分析大量数据，为理论测试创建现实场景，并有效地传达他们的发现。他相信这些能力在推动跨领域研究、促进具有变革性的发现和见解，从而增强我们对世界的理解方面具有巨大的潜力。
- en: Alshater's (2022) study delves into ChatGPT's advantages, including enhanced
    productivity, improved research accuracy, flexibility in research questions, accelerated
    speed, objectivity and consistency. The research also acknowledges weaknesses,
    like the reliance on training data quality and limited domain knowledge. Ethical
    considerations are addressed, including algorithmic bias and technology misuse.
    However, the small sample size and focus on economics and finance may limit generalisability.
    Therefore, we believe future research should explore other disciplines and employ
    larger and more diverse samples. Alshater's approach to ethics is commendable,
    but challenges persist in ensuring complete fairness in AI systems. By recognising
    limitations and focusing on responsible practices, we believe researchers can
    leverage AI's potential for academic advancement. Continuous vigilance and improvement
    are also essential for the ethical integration of AI in academia.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: Alshater (2022) 的研究深入探讨了 ChatGPT 的优势，包括提高生产力、改善研究准确性、研究问题的灵活性、加速速度、客观性和一致性。研究也承认了弱点，如对训练数据质量的依赖和有限的领域知识。伦理考量也被提及，包括算法偏见和技术滥用。然而，小样本量和集中于经济学和金融可能限制了普遍性。因此，我们认为未来的研究应该探索其他学科，并采用更大、更多样化的样本。Alshater
    对伦理的处理方法值得称赞，但在确保人工智能系统中完全公平性方面仍存在挑战。通过认识到局限性并专注于负责任的做法，我们相信研究人员可以利用人工智能的潜力促进学术进步。对人工智能在学术界伦理整合的持续警惕和改进也是必不可少的。
- en: In light of Alshater's (2022) study, several implications arise that are directly
    relevant to our research investigating the impact of ChatGPT on the role of students,
    instructors and institutions in higher education.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 Alshater (2022) 的研究，出现了几个与我们研究 ChatGPT 对高等教育中学生在校角色、教师和机构影响的研究直接相关的启示。
- en: '*Enhancing Student Learning Experiences*'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*提升学生学习体验*'
- en: Alshater's study highlights the potential benefits of ChatGPT for students,
    particularly in terms of enhancing their learning experiences. By automating certain
    tasks and providing immediate access to information and research summaries, ChatGPT
    can offer students more opportunities to focus on deeper learning activities,
    positively influencing their overall educational journey. This is something we
    look to investigate.
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Alshater 的研究突出了 ChatGPT 对学生的潜在益处，特别是在增强他们的学习体验方面。通过自动化某些任务和提供即时获取信息和研究摘要的途径，ChatGPT
    可以为学生提供更多专注于深度学习活动的机会，从而积极影响他们的整体教育旅程。这是我们希望调查的内容。
- en: '*Empowering Instructors with Advanced Teaching and Research Tools*'
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*赋予教师先进的教学和研究工具*'
- en: The study emphasises how ChatGPT can be a valuable tool for instructors to improve
    their teaching and research practices. Through automated data analysis and report
    generation, instructors can streamline research processes and discover new insights,
    leading to more effective teaching approaches and enriching the classroom experience.
    This is an area we aim to explore further.
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究强调了 ChatGPT 可以成为教师改进教学和研究实践的有价值工具。通过自动数据分析和分析报告生成，教师可以简化研究流程并发现新的见解，从而带来更有效的教学方法和丰富课堂体验。这是我们打算进一步探索的领域。
- en: '*Addressing Data Quality and Biases for Ethical Use*'
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*解决数据质量和偏见以实现伦理使用*'
- en: The study underscores the importance of data quality and ethical considerations
    when utilising ChatGPT. As we delve into its impact on higher education, it is
    crucial to be mindful of potential biases and ensure the responsible use of the
    technology, safeguarding against discriminatory consequences. This is an area
    we plan to investigate.
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究强调了在利用 ChatGPT 时数据质量和伦理考量的重要性。随着我们深入探讨其对高等教育的影响，关注潜在的偏见并确保技术的负责任使用，防范歧视性后果至关重要。这是我们计划要调查的一个领域。
- en: '*Extending Research Scope for Comprehensive Insights*'
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*扩展研究范围以获得全面洞察*'
- en: Alshater's research is primarily focused on economics and finance, but it encourages
    us to extend our investigation to other academic disciplines. By conducting in-depth
    studies with diverse samples, we can gain comprehensive insights into how ChatGPT
    influences various areas of higher education. Our exploratory case study into
    a different discipline will help to add to Alshater's insights.
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阿尔沙特的科研主要聚焦于经济学和金融学，但它鼓励我们将调查扩展到其他学术领域。通过进行深入研究和多样化的样本，我们可以全面了解 ChatGPT 对高等教育各个领域的影響。我们对不同学科的探索性案例研究将有助于丰富阿尔沙特的见解。
- en: Acknowledging and applying the insights from Alshater's study may help us to
    navigate the transformative landscape of ChatGPT in higher education responsibly,
    paving the way for a more efficient, inclusive and ethically sound academic environment.
    Moreover, the implications he presents serve as valuable guidance for shaping
    our own research.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 认识并应用阿尔沙特研究中的见解，可以帮助我们负责任地导航 ChatGPT 在高等教育中的变革性景观，为更高效、包容和道德的学术环境铺平道路。此外，他提出的含义为我们塑造自己的研究提供了宝贵的指导。
- en: 'ChatGPT User Experience: Implications for Education'
  id: totrans-327
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT 用户体验：对教育的影响
- en: 'In Zhai''s 2022 paper titled ‘ChatGPT User Experience: Implications for Education’,
    our second researcher user experience paper, the author aims to explore the yet
    unknown potential impacts of ChatGPT on education. Recognising the significant
    capacity of ChatGPT, the study acknowledges the potential to bring about substantial
    changes in educational learning goals, learning activities and assessment and
    evaluation practices. Zhai conducted a study involving the use of ChatGPT to draft
    an academic paper titled ‘Artificial Intelligence for Education’, noting that
    this particular task was selected due to its highly intellectual nature, typically
    performed by professionals. According to Zhai, the objective of piloting ChatGPT
    in this manner was to assess its ability to generate accurate, organised, coherent
    and insightful writing. Zhai reports that the text in the paper was directly generated
    by ChatGPT, with the author''s contribution limited to adding subtitles and making
    minor adjustments for logical organisation. To conduct the pilot with ChatGPT,
    Zhai utilised a predefined set of queries to compose the paper, developed through
    interactive trials and engagements with ChatGPT. Initially, Zhai prompted ChatGPT
    to generate the introduction for a scholarly paper focusing on the utilisation
    of AI in education; as a response, ChatGPT introduced the background information
    on AI for Education and narrowed down the paper''s scope. Based on this scope,
    Zhai identified the structure of the paper, which encompassed two main sections:
    the potential and challenges of AI for Education, as well as future research directions.
    To delve into the potential section, Zhai reports querying ChatGPT about the history
    of AI for Education, noting that in response, ChatGPT provided three paragraphs
    that chronologically detailed the history of AI in education, starting from the
    1960s up to the present day. The author reports that this description was comprehensive,
    including relevant examples and notable milestones in the development of AI for
    Education. The author also reports that within the aforementioned writing, ChatGPT
    provided detailed descriptions of three specific applications of AI in education:
    personalised learning, automating administrative tasks and tutoring and mentorship.
    In order to delve deeper into these applications, Zhai posed separate queries
    regarding the use cases for each application. As a result, each query yielded
    a comprehensive definition of the application, a list of typical uses and a concise
    summary; for instance, when inquiring about personalised learning, ChatGPT offered
    Zhai a definition along with a comprehensive list of use cases as an illustrative
    example. To delve even deeper into the use cases, Zhai conducted additional queries
    on the history and potential of each aspect of personalised learning. This investigation
    led to the identification of four specific uses: adaptive learning, personalised
    recommendation, individualised instruction and early identification of learning
    needs. Zhai reports that for each of these use cases, the results provided by
    ChatGPT encompassed the definition, historical background, evidence of potential
    and a concise summary. Zhai also conducted queries on automating administrative
    tasks in education, after which ChatGPT provided the definition, description,
    five use cases and a summary. From this, Zhai proceeded to query the history and
    potential of the five use cases associated with automating administrative tasks
    in education, stating that the results yielded a comprehensive description of
    the following: enrolment and registration, student record management, grading
    and assessment, course scheduling and financial aid. For the second aspect of
    the study, Zhai explored the challenges associated with implementing AI in the
    classroom. Through queries posed to ChatGPT, the author obtained a direct list
    of challenges, which encompassed ethical concerns, technological limitations,
    teacher buy-in, student engagement and integration with existing systems. Seeking
    a deeper understanding of these challenges, Zhai proceeded to query each specific
    challenge and potential solutions associated with them. In the third part of the
    study, Zhai explored the future prospects of AI in education. Through queries
    directed at ChatGPT, the author obtained five potential developments. These included
    the increased utilisation of AI for personalised learning, the development of
    AI-powered educational games and simulations, the expanded use of AI for tutoring
    and mentorship, the automation of administrative tasks through AI and the creation
    of AI-powered education platforms. In the final stage, Zhai requested ChatGPT
    compose the conclusion of an academic paper that discussed the role of AI in driving
    innovation and improvement in education. The author reports that the conclusion
    began by reiterating the potential of AI in transforming education positively
    and that, additionally, it emphasised the need to acknowledge and address the
    limitations of AI, highlighting ethical, technological and other challenges associated
    with its implementation in education. Zhai reports that the conclusion urged the
    implementation of appropriate measures to ensure the ethical and effective use
    of AI in the education system.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 在蔡的2022年论文《ChatGPT用户体验：对教育的影响》中，我们的第二篇关于用户体验的研究论文，作者旨在探讨ChatGPT在教育领域尚未知的潜在影响。认识到ChatGPT的显著能力，该研究承认其在教育学习目标、学习活动和评估评估实践方面可能带来重大变革的潜力。蔡进行了一项研究，使用ChatGPT草拟了一篇题为《教育人工智能》的学术论文，指出这项特定任务之所以被选中，是因为其高度智力性质，通常由专业人士执行。根据蔡的说法，以这种方式试点ChatGPT的目的是评估其生成准确、组织、连贯和有洞察力的写作的能力。蔡报告说，论文中的文本是直接由ChatGPT生成的，作者的贡献仅限于添加副标题和对逻辑组织进行微小调整。为了使用ChatGPT进行试点，蔡利用一组预定义的查询来撰写论文，这些查询是通过与ChatGPT的交互试验和互动开发的。最初，蔡提示ChatGPT为专注于教育中AI应用的学术论文生成引言；作为回应，ChatGPT介绍了AI教育的背景信息并缩小了论文的范围。基于这个范围，蔡确定了论文的结构，包括两个主要部分：AI教育的潜力和挑战，以及未来的研究方向。为了深入了解潜力部分，蔡报告说，他查询了ChatGPT关于AI教育历史的细节，指出ChatGPT提供了三个按时间顺序详细描述AI在教育中历史的三段文字，从20世纪60年代到今天。作者报告说，这个描述是全面的，包括相关的例子和AI教育发展中的显著里程碑。作者还报告说，在上述写作中，ChatGPT提供了AI在教育中三个具体应用的详细描述：个性化学习、自动化行政任务和辅导与指导。为了更深入地了解这些应用，蔡就每个应用的用例提出了单独的查询。结果，每个查询都产生了一个关于应用的全面定义、典型用例列表和简短总结；例如，在询问个性化学习时，ChatGPT向蔡提供了一个定义，并附带了一个全面的用例列表作为示例。为了更深入地了解用例，蔡对个性化学习的各个方面进行了额外的查询。这项调查导致确定了四个具体用途：适应性学习、个性化推荐、个性化指导和早期识别学习需求。蔡报告说，对于这些用例中的每一个，ChatGPT提供的结果都包括定义、历史背景、潜在的证据和简短总结。蔡还就教育中自动化行政任务进行了查询，之后ChatGPT提供了定义、描述、五个用例和总结。据此，蔡继续查询与教育中自动化行政任务相关的五个用例的历史和潜力，表示结果产生了以下方面的全面描述：招生和注册、学生记录管理、评分和评估、课程安排和财务援助。对于研究的第二方面，蔡探讨了在课堂上实施AI所面临的挑战。通过向ChatGPT提出的查询，作者获得了一份直接列出挑战的清单，包括伦理问题、技术限制、教师接受度、学生参与度和与现有系统的整合。为了更深入地了解这些挑战，蔡继续查询每个具体挑战及其潜在解决方案。在研究的第三部分，蔡探讨了AI在教育中的未来前景。通过针对ChatGPT的查询，作者获得了五个潜在的发展方向。这些包括AI在个性化学习中的更广泛使用、AI驱动的教育游戏和模拟的发展、AI在辅导和指导中的更广泛使用、通过AI自动化行政任务以及创建AI驱动的教育平台。在最后阶段，蔡要求ChatGPT撰写一篇学术论文的结论，讨论AI在推动教育创新和改进中的作用。作者报告说，结论首先重申了AI在积极转变教育方面的潜力，并强调需要承认和解决AI在教育中实施时的伦理、技术和其他挑战。蔡报告说，结论呼吁实施适当的措施，以确保AI在教育系统中得到道德和有效的使用。
- en: 'Zhai (2022) describes the findings as follows. During the piloting process,
    the author followed the scope suggested by ChatGPT and used subsequent queries
    to delve deeper into the study. Zhai notes that the entire process, including
    generating and testing queries, adding subtitles, reviewing and organising the
    content, was completed within 2–3 hours with minimal human intervention. Zhai
    also observes that the writing generated by ChatGPT exhibited four key characteristics:
    coherence, partial accuracy, informativeness and systematicity. Furthermore, for
    each query, Zhai reports that the responses encompassed essential information
    and maintained a smooth flow between paragraphs. By changing the topic while addressing
    the same aspects, Zhai found that the responses followed an identical format:
    ChatGPT would introduce the topic, provide a brief historical overview, present
    evidence of potentials and limitations and conclude with a summary of the topic.
    Zhai also reports that, interestingly, even with slight variations in wording,
    ChatGPT consistently produced the same results, believing this indicates its ability
    to address queries expressed in different forms. Through this process, Zhai acknowledges
    that ChatGPT demonstrates a remarkable capacity to organise and compose components
    of articles effectively.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 潘扎（2022）对研究结果描述如下。在试点过程中，作者遵循ChatGPT建议的范围，并使用后续查询来深入研究。潘扎指出，整个过程，包括生成和测试查询、添加字幕、审查和组织内容，在2-3小时内完成，且人工干预最小。潘扎还观察到，ChatGPT生成的写作表现出四个关键特征：连贯性、部分准确性、信息性和系统性。此外，对于每个查询，潘扎报告说，响应包含了关键信息，并在段落之间保持了流畅的过渡。通过在处理相同方面时改变主题，潘扎发现响应遵循了相同的格式：ChatGPT会介绍主题，提供简要的历史概述，展示潜力和局限性的证据，并以对主题的总结结束。潘扎还报告说，有趣的是，即使措辞略有变化，ChatGPT也始终产生相同的结果，这表明它能够以不同形式表达的问题进行回应。通过这个过程，潘扎承认ChatGPT在有效组织和撰写文章组成部分方面展现出非凡的能力。
- en: Zhai's (2022) study provides valuable insights into the use of ChatGPT in education.
    Firstly, Zhai suggests that educators should reassess literacy requirements in
    education based on ChatGPT's capabilities. The study acknowledges the efficient
    information processing capabilities of computers and the impressive writing proficiency
    of AI, surpassing that of the average student. Zhai believes this finding prompts
    the consideration of whether students should develop the ability to effectively
    utilise AI language tools as part of future educational goals. Zhai argues that
    education should prioritise enhancing students' creativity and critical thinking
    rather than focusing solely on general skills. To achieve this, the study advocates
    for further research to understand which aspects of human intelligence can be
    effectively substituted by AI and which aspects remain uniquely human. Secondly,
    Zhai emphasises the importance of integrating AI, such as ChatGPT, into subject-based
    learning tasks. The study points out that AI's problem-solving abilities closely
    mirror how humans approach real-world challenges. Zhai posits that, as AI, including
    ChatGPT, continues to advance towards AGI, educators are presented with an opportunity
    to design learning tasks that incorporate AI, thereby fostering student engagement
    and enhancing the overall learning experience and that this integration of AI
    into domain-specific learning tasks aligns with the way contemporary scientific
    endeavours increasingly rely on AI for prediction, classification and inference
    to solve complex problems. Thirdly, Zhai addresses the potential impact of ChatGPT
    on assessment and evaluation in education. The study highlights traditional assessment
    practices, such as essay writing, and raises concerns about students potentially
    outsourcing their writing tasks to AI. As AI demonstrates proficiency in generating
    written content, Zhai argues that assessment practices should adapt their goals
    to focus on areas that cannot be easily replicated by AI, such as critical thinking
    and creativity. This shift in assessment practices aligns with the evolving needs
    of society and the corresponding shifts in educational learning objectives. To
    effectively measure creativity and critical thinking, Zhai suggests educators
    explore innovative assessment formats that are beyond AI's capabilities. In conclusion,
    Zhai's study underscores the transformative potential of ChatGPT in education
    and calls for timely adjustments to educational learning goals, learning activities
    and assessment practices. By recognising the strengths and limitations of AI technologies
    like ChatGPT, educators can better prepare students to navigate a future where
    AI plays an increasingly vital role. As AI reshapes the field of education, it
    is essential to consider its integration thoughtfully and ensure that the emphasis
    remains on cultivating skills that remain uniquely human while harnessing the
    capabilities of AI to enhance the learning process.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 潘扎（2022）的研究为ChatGPT在教育中的应用提供了宝贵的见解。首先，潘扎建议教育工作者应根据ChatGPT的能力重新评估教育的读写能力要求。该研究承认了计算机高效的信息处理能力以及AI令人印象深刻的写作水平，超过了普通学生的水平。潘扎认为这一发现促使人们考虑学生是否应该培养有效利用AI语言工具的能力，作为未来教育目标的一部分。潘扎认为，教育应优先考虑提高学生的创造力和批判性思维，而不是仅仅关注一般技能。为了实现这一目标，该研究主张进行进一步研究，以了解哪些方面的人类智能可以被AI有效替代，哪些方面仍然具有独特的人类特性。其次，潘扎强调了将AI，如ChatGPT，整合到基于学科的学习任务中的重要性。研究指出，AI的解决问题的能力与人类解决现实世界挑战的方式密切相关。潘扎认为，随着AI，包括ChatGPT，继续向通用人工智能（AGI）迈进，教育工作者面临着一个机会，设计包含AI的学习任务，从而激发学生的参与度，并提升整体的学习体验。这种将AI整合到特定领域学习任务中的做法与当代科学探索日益依赖AI进行预测、分类和推理以解决复杂问题的趋势相一致。第三，潘扎讨论了ChatGPT对教育评估和评价的潜在影响。研究突出了传统的评估实践，如论文写作，并对学生可能将写作任务外包给AI表示担忧。随着AI在生成书面内容方面的熟练程度，潘扎认为评估实践应调整其目标，专注于AI难以轻易复制的领域，如批判性思维和创造力。这种评估实践的转变与社会需求的演变以及教育学习目标的相应转变相一致。为了有效衡量创造力和批判性思维，潘扎建议教育工作者探索超越AI能力的创新评估格式。总之，潘扎的研究强调了ChatGPT在教育中的变革潜力，并呼吁及时调整教育学习目标、学习活动和评估实践。通过认识到AI技术如ChatGPT的优势和局限性，教育工作者可以更好地为学生准备，使他们能够应对一个AI日益发挥关键作用的未来。随着AI重塑教育领域，深思熟虑地考虑其整合并确保重点始终放在培养独特的人类技能上，同时利用AI的能力来提升学习过程，这一点至关重要。
- en: Zhai (2022) explores ChatGPT's impact on education, focusing on learning goals,
    activities and assessments. Using a pilot study, ChatGPT efficiently drafted an
    academic paper with minimal human intervention, showcasing its potential in generating
    scholarly content. While innovative, the study's small sample size and limited
    scope may restrict its generalisability. Additionally, ChatGPT's lack of deeper
    understanding and biases in predefined queries may affect its applicability in
    certain educational tasks. We believe further research, with a mixed-methods approach
    and larger samples, is needed to fully understand AI's role in education and its
    long-term implications on pedagogy and learning experiences. Nonetheless, Zhai's
    study sets the stage for future investigations into AI's impact on education.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 沈于2022年的研究探讨了ChatGPT对教育的影响，重点关注学习目标、活动和评估。通过一项试点研究，ChatGPT在最小的人为干预下高效地起草了一篇学术论文，展示了其在生成学术内容方面的潜力。虽然这项研究具有创新性，但其样本量小、范围有限可能限制了其普遍适用性。此外，ChatGPT缺乏深入理解和预定义查询中的潜在偏见可能会影响其在某些教育任务中的应用。我们相信，需要进一步的研究，采用混合方法方法和更大的样本量，以全面理解AI在教育中的作用及其对教学和学习体验的长期影响。尽管如此，沈的研究为未来调查AI对教育的影响奠定了基础。
- en: Zhai's (2022) study offers crucial implications for our research.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 沈于2022年的研究对我们的研究具有关键性的启示。
- en: '*Rethinking Learning Goals*'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*重新思考学习目标*'
- en: Zhai's findings indicate that AI, like ChatGPT, has efficient information processing
    capabilities and impressive writing proficiency. As we investigate the role of
    ChatGPT in education, it becomes essential to reassess traditional learning goals.
    Integrating AI language tools into educational objectives may prompt a shift towards
    prioritising the development of students' creativity and critical thinking, which
    are areas where AI might not fully replace human intelligence. This is something
    we aim to investigate.
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沈的研究表明，像ChatGPT这样的AI具有高效的信息处理能力和令人印象深刻的写作能力。随着我们调查ChatGPT在教育中的作用，重新评估传统学习目标变得至关重要。将AI语言工具整合到教育目标中可能会促使我们优先考虑学生创造力和批判性思维的发展，这些领域是AI可能无法完全取代人类智能的领域。这是我们旨在调查的问题。
- en: '*Innovating Learning Activities*'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*创新学习活动*'
- en: The study emphasises the significance of incorporating AI, such as ChatGPT,
    into subject-based learning tasks. As AI's problem-solving capabilities mirror
    human approaches, it presents an opportunity for educators to design engaging
    learning activities. This integration aligns with the increasing use of AI in
    real-world problem-solving and scientific endeavours. This is a subject we intend
    to explore.
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该研究强调了将AI，如ChatGPT，纳入基于学科的学习任务中的重要性。由于AI的解决问题的能力与人类方法相似，它为教育工作者设计引人入胜的学习活动提供了机会。这种整合与AI在现实世界问题解决和科学事业中的日益广泛使用相一致。这是我们打算探索的主题。
- en: '*Transforming Assessment Practices*'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*转变评估实践*'
- en: Zhai's study raises awareness of potential challenges, such as students outsourcing
    writing tasks to AI. To address this, we may need to rethink assessment practices.
    Focusing assessments on areas where AI cannot replicate human abilities, such
    as critical thinking and creativity, can ensure that educational evaluations remain
    relevant and meaningful. We intend to look into this further.
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沈的研究提高了人们对潜在挑战的认识，例如学生将写作任务外包给AI。为了解决这个问题，我们可能需要重新思考评估实践。将评估集中在AI无法复制的人类能力领域，如批判性思维和创造力，可以确保教育评估保持相关性和意义。我们打算进一步研究这个问题。
- en: '*Considering Limitations and Ethical Implications*'
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*考虑局限性和伦理影响*'
- en: While ChatGPT demonstrates remarkable capabilities, the study acknowledges its
    limitations, including the lack of deeper understanding and potential biases in
    predefined queries. As we examine the role of ChatGPT in education, we believe
    it is essential to consider these challenges and potential ethical implications.
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然ChatGPT展示了非凡的能力，但该研究承认了其局限性，包括缺乏深入理解和预定义查询中的潜在偏见。随着我们考察ChatGPT在教育中的作用，我们认为考虑这些挑战和潜在的伦理影响是至关重要的。
- en: In conclusion, Zhai's study urges educators and institutions to approach the
    integration of AI language tools like ChatGPT thoughtfully. By considering the
    implications outlined in the study, we believe our research can contribute to
    a responsible and effective adoption of AI in education while preserving the unique
    strengths of human intelligence and creativity in the learning process.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，翟的研究敦促教育工作者和机构在整合像ChatGPT这样的AI语言工具时，要深思熟虑。通过考虑研究中概述的后果，我们相信我们的研究可以促进对AI在教育中的负责任和有效的采用，同时保留学习过程中人类智慧和创造力的独特优势。
- en: Identifying Themes, Methodologies and Gaps in the Literature
  id: totrans-342
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定文献中的主题、方法和空白
- en: The nine studies in the literature review delved into the implications of integrating
    ChatGPT in education. Some studies emphasised the need to address potential biases
    and data privacy concerns, while others explored the potential impact on teaching
    practices and student productivity. The literature also discussed the transformative
    potential of AI in education, calling for a re-evaluation of traditional learning
    goals and assessment practices. While the studies differed in methodologies and
    focus, they collectively provide guidance for educators and institutions on effectively
    integrating ChatGPT. However, certain limitations and gaps were evident. Some
    studies lacked comprehensive exploration or diverse samples, and there was a scarcity
    of case studies directly investigating ChatGPT's impact on education. The literature
    also lacked sufficient representation of student perspectives, and a deeper understanding
    of necessary adaptations in educational objectives and activities is needed. To
    address these gaps, our research project aims to fill the scarcity of case studies
    and actively include student perspectives through in-depth qualitative research.
    We seek to understand how ChatGPT is influencing students' learning experiences
    and instructors' teaching practices. Furthermore, we intend to explore necessary
    adaptations in educational objectives and activities to leverage the potential
    of AI chatbots effectively. By addressing these gaps, our research project will
    contribute valuable insights into the transformative role of AI chatbots in revolutionising
    teaching and learning practices, providing guidance for responsible AI use in
    educational settings.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 文献综述中的九项研究深入探讨了在教育中整合ChatGPT的后果。一些研究强调了解决潜在偏见和数据隐私问题的必要性，而另一些研究则探讨了其对教学实践和学生生产力可能产生的影响。文献还讨论了AI在教育中的变革潜力，呼吁重新评估传统的学习目标和评估实践。尽管这些研究在方法和重点上有所不同，但它们共同为教育工作者和机构提供了有效整合ChatGPT的指导。然而，某些局限性和空白是显而易见的。一些研究缺乏全面的探索或多样化的样本，并且缺乏直接调查ChatGPT对教育影响的研究案例。文献还缺乏对学生观点的充分代表，并且需要更深入地理解在教育目标和活动中的必要调整。为了解决这些空白，我们的研究项目旨在填补案例研究的稀缺，并通过深入定性研究积极纳入学生观点。我们寻求了解ChatGPT如何影响学生的学习体验和教师的授课实践。此外，我们打算探索在教育目标和活动中进行必要调整，以有效利用AI聊天机器人的潜力。通过解决这些空白，我们的研究项目将为AI聊天机器人在革命性改变教学和学习实践中的变革性作用提供宝贵的见解，并为教育环境中负责任地使用AI提供指导。
- en: Chapter 5
  id: totrans-344
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第五章
- en: Research Methodology
  id: totrans-345
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 研究方法论
- en: Research Context
  id: totrans-346
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 研究背景
- en: This research is conducted at MEF University, a non-profit, private, English-medium
    institution located in Istanbul, Turkey. Established in 2014, MEF University holds
    the distinction of being the world's first fully flipped university. Embracing
    a flipped, adaptive, digital and active learning approach, the university incorporates
    project-based and product-focused assessments instead of relying on final exams.
    Furthermore, digital platforms and adaptive learning technologies are seamlessly
    integrated into the programmes, while MOOCs are offered to facilitate self-directed
    learning opportunities. In addition, since 2021, a data science and artificial
    intelligence (AI) minor has been made available for students from all departments.
    Caroline Fell Kurban, the principal investigator and co-author of this book, plays
    a central role in leading the investigation. She balances dual responsibilities,
    serving as both the principal investigator for the project and the instructor
    in the in-class case study. To ensure comprehensive data analysis, interpretation
    phases and the formulation of theoretical and practical implementation suggestions,
    she received support from the MEF University Centre for Research and Best Practices
    in Learning and Teaching (CELT). As flipped learning is a fundamental aspect of
    MEF's educational approach and is specifically featured in this case study, we
    provide more information here.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究是在土耳其伊斯坦布尔的非营利性、私立、英语授课的MEF大学进行的。成立于2014年，MEF大学享有世界上第一所完全翻转式大学的荣誉。该大学采用翻转、适应性、数字化和主动学习的方法，采用基于项目和以产品为导向的评估，而不是依赖期末考试。此外，数字平台和适应性学习技术无缝集成到课程中，同时提供MOOCs以促进自主学习机会。自2021年以来，为所有院系的学生提供了数据科学和人工智能（AI）辅修课程。本书的主要调查员和合著者Caroline
    Fell Kurban在领导调查中扮演着核心角色。她承担双重责任，既是项目的首席调查员，也是课堂案例研究的讲师。为确保全面的数据分析、解释阶段以及理论性和实践性实施建议的制定，她得到了MEF大学学习和教学研究最佳实践中心（CELT）的支持。由于翻转学习是MEF教育方法的基本方面，并且在本次案例研究中特别突出，因此我们在此提供更多信息。
- en: Flipped learning is an instructional approach that reverses the traditional
    classroom model, allowing students to learn course concepts outside of class and
    use class time for active, practical application of the principles. In this approach,
    teachers become facilitators or coaches, guiding students through problems and
    projects while providing personalised support and feedback. The focus shifts from
    content delivery to creating a student-centred learning experience. To ensure
    the effectiveness of a flipped learning course syllabus, it is crucial to anchor
    it on proven learning frameworks. These frameworks, rooted in learning theories,
    offer valuable insights into the cognitive processes essential for successful
    learning. They empower instructors to comprehend, analyse and anticipate the learning
    process, guiding them in making informed decisions for teaching and learning implementation.
    A pivotal aspect of designing a successful flipped learning syllabus is recognising
    the interconnectedness between curriculum, assessment and instruction. For learning
    to be impactful, these three components must align cohesively, with a focus on
    learning outcomes (Gollub et al., 2002). In flipped learning courses, this approach
    should permeate all three elements. To achieve this, MEF courses draw upon four
    well-established learning frameworks, which act as the foundation for each stage
    of the flipped learning syllabus design. *These frameworks include Understanding
    by Design (UbD), Bloom's Taxonomy, Assessment For, As, and Of Learning and Gagne's
    Nine Events of Instruction, collectively fostering cohesion between curriculum,
    assessment and instruction, and ultimately leading to effective learning.* We
    describe how we bring these theories together to plan for our flipped courses
    below.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 翻转式学习是一种教学方式，它反转了传统的课堂模式，允许学生在课外学习课程概念，并在课堂上使用时间进行原则的积极、实际应用。在这种方法中，教师成为促进者或教练，指导学生通过问题和项目，同时提供个性化的支持和反馈。重点从内容传递转向创建以学生为中心的学习体验。为确保翻转式学习课程大纲的有效性，将其建立在经过验证的学习框架上至关重要。这些框架根植于学习理论，为成功学习所必需的认知过程提供了宝贵的见解。它们使教师能够理解、分析和预测学习过程，指导他们在教学和学习实施方面做出明智的决定。设计成功翻转式学习课程大纲的一个关键方面是认识到课程、评估和教学之间的相互关联。为了使学习具有影响力，这三个组成部分必须协调一致，重点关注学习成果（Gollub等人，2002年）。在翻转式学习课程中，这种方法应渗透到所有三个要素中。为了实现这一点，MEF课程借鉴了四个经过验证的学习框架，这些框架是翻转式学习课程大纲设计每个阶段的基石。*这些框架包括理解设计（UbD）、布卢姆分类法、学习评估的“为了”、“作为”和“关于”以及加涅的九大教学事件，共同促进课程、评估和教学之间的协调，最终导致有效的学习。*以下我们描述了如何将这些理论结合起来为我们的翻转课程进行规划。
- en: 'At the heart of our flipped learning course design is Understanding by Design
    (UbD), a model originated by Jay McTighe and Grant Wiggins during the 1990s (Wiggins
    & McTighe, 1998). UbD presents a holistic strategy for shaping curriculum, assessment
    and instructional methods. This methodology revolves around two core principles:
    prioritising teaching and assessment for genuine understanding and learning transfer
    and structuring curriculum by first determining the intended outcomes. The UbD
    framework is anchored in seven guiding principles:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 我们翻转式学习课程设计的核心是理解设计（UbD），这是一个由Jay McTighe和Grant Wiggins在20世纪90年代提出的模型（Wiggins
    & McTighe，1998）。UbD提供了一个整体策略，用于塑造课程、评估和教学方法。这种方法围绕两个核心原则：优先考虑真正的理解和学习迁移的教学和评估，以及首先确定预期成果来构建课程。UbD框架建立在七个指导原则之上：
- en: (1)Thoughtful curricular planning enhances the learning journey, and UbD provides
    a flexible structure to facilitate this without imposing rigid guidelines.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: (1)深思熟虑的课程规划增强了学习之旅，UbD提供了一个灵活的结构来促进这一点，而不强加僵化的指南。
- en: (2)UbD guides curriculum and instructional strategies towards cultivating profound
    comprehension and the practical application of knowledge.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: (2)UbD引导课程和教学策略，旨在培养对知识的深刻理解和知识的实际应用。
- en: (3)Genuine understanding emerges when students independently employ and expand
    their learning through authentic performance.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: (3)当学生通过真实的表演独立运用和扩展他们的学习时，真正的理解才会出现。
- en: (4)Effective curriculum design adopts an inverse path, commencing with long-term
    desired outcomes and progressing through three stages – Desired Results, Evidence
    and Learning Plan, which guards against potential pitfalls like excessive reliance
    on textbooks or prioritisation of activities over clear learning objectives.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: (4) 有效的课程设计采用逆向路径，从长期期望的结果开始，通过三个阶段——期望结果、证据和学习计划，来避免潜在的陷阱，如过度依赖教科书或优先考虑活动而非明确的学习目标。
- en: (5)Educators assume the role of facilitators, favouring meaningful learning
    experiences over mere content delivery.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: (5) 教育者扮演着促进者的角色，更倾向于有意义的学习体验，而不是单纯的内容传递。
- en: (6)Regular evaluations of curriculum units against design benchmarks enhance
    quality and encourage meaningful professional discourse.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: (6) 定期评估课程单元与设计基准，提高质量并鼓励有意义的职业讨论。
- en: (7)The UbD framework embodies a continuous enhancement approach, wherein student
    achievements and teaching efficacy steer ongoing improvements in both curriculum
    and instruction.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: (7) UbD框架体现了一种持续改进的方法，其中学生的成就和教学效率指导着课程和教学的持续改进。
- en: (Wiggins & McTighe, 1998).
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: (Wiggins & McTighe, 1998)。
- en: UbD is a widely recognised framework for underpinning flipped courses (Şahin
    & Fell Kurban, 2019).
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: UbD是一个被广泛认可的框架，用于支撑翻转课堂（Şahin & Fell Kurban, 2019）。
- en: 'Instructors employing UbD in course curriculum development proceed through
    three distinct stages: Stage 1 – identify desired results (curriculum), Stage
    2 – determine acceptable evidence (assessment) and Stage 3 – create the learning
    plans (instruction).'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 在课程课程开发中采用UbD的教师会经历三个不同的阶段：第一阶段——确定期望结果（课程），第二阶段——确定可接受的证据（评估）和第三阶段——创建学习计划（教学）。
- en: Stage 1
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一阶段
- en: 'The initial phase of UbD centres on defining desired outcomes, encompassing
    several key elements. This process involves establishing clear objectives, designing
    enduring understandings, formulating essential questions and specifying what students
    should ultimately learn and achieve. Instructors should derive explicit goals
    from university programme standards, accreditation criteria and course purpose.
    These objectives then shape the creation of enduring understandings. An enduring
    understanding encapsulates a fundamental concept with lasting relevance beyond
    the immediate learning context. It is a profound notion that embodies essential
    principles within a subject. These understandings offer students deeper insights,
    fostering a comprehensive grasp of the subject beyond surface-level facts. Crafting
    a robust enduring understanding begins with identifying a pivotal concept then
    distilling it into a clear statement resonating with students. For instance, ‘Water
    cycles impact both Earth and society’ succinctly captures a significant idea in
    UbD. Essential questions follow, serving as UbD''s cornerstone. Understanding
    their essence is crucial. These questions are open-ended, thought-provoking and
    engaging, promoting higher order thinking and transferable concepts. They necessitate
    reasoning, evidence and sometimes further inquiry. Notably, essential questions
    recur throughout the learning journey, pivotal for design and teaching. For example:
    How do water cycles affect ecosystems and natural processes? In what ways do human
    activities influence water cycles? Essential questions come in two types: overarching,
    which apply to multiple topics, and topical, which focus on specific subject matter
    (McTighe & Wiggins, 2013).'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: UbD的初始阶段集中在定义期望结果上，包括几个关键要素。这个过程涉及建立明确的目标、设计持久理解、制定基本问题和明确学生最终应学习和实现的内容。教师应从大学课程标准、认证标准和课程目的中得出明确的目标。然后，这些目标塑造了持久理解的创建。持久理解封装了一个具有持久相关性的基本概念，超越了直接的学习环境。这是一个深刻的观念，它体现了一个学科中的基本原理。这些理解为学生提供了更深入的见解，促进了学生对主题的全面掌握，而不仅仅是表面事实。构建一个强大的持久理解始于识别一个关键概念，然后将其提炼成一个与学生产生共鸣的清晰陈述。例如，“水循环影响地球和社会”简洁地捕捉了UbD中的一个重要思想。基本问题随后出现，作为UbD的基石。理解它们的本质至关重要。这些问题是开放式的、引人深思的、吸引人的，促进高级思维和可转移的概念。它们需要推理、证据，有时还需要进一步的探究。值得注意的是，基本问题在整个学习过程中反复出现，对设计和教学至关重要。例如：水循环如何影响生态系统和自然过程？人类活动以何种方式影响水循环？基本问题有两种类型：总体性的，适用于多个主题，和专题性的，专注于特定的学科内容（McTighe
    & Wiggins, 2013）。
- en: After establishing the course aim, enduring understanding and essential questions,
    the next step is to develop learning outcomes, i.e. what the students will know
    and be able to do by the end of the course. For this purpose, Bloom's taxonomy
    proves to be an effective framework (Bloom et al., 1956). This taxonomy classifies
    educational goals into different categories, with each category representing a
    higher level of cognitive functioning than the one below it. It follows a hierarchical
    structure where each lower category serves as a prerequisite for achieving the
    next higher level. The cognitive processes described within this framework represent
    the actions through which learners engage with and apply knowledge. Examples of
    some of these, adapted from Armstrong (n.d.), are as follows, going from higher
    to lower levels of cognition.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 在确立课程目标、持久理解和基本问题之后，下一步是制定学习成果，即学生在课程结束时将知道并能做什么。为此，布鲁姆分类法证明是一个有效的框架（Bloom et
    al., 1956）。这个分类法将教育目标分为不同的类别，每个类别代表比其下级类别更高的认知功能水平。它遵循一种层次结构，其中每个较低类别都是达到下一个更高级别的先决条件。这个框架中描述的认知过程代表了学习者与知识互动和应用知识的行为。以下是一些例子，这些例子是从Armstrong（n.d.）改编的，从认知水平的较高到较低排列：
- en: '*Create (produce new or original work)*'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*创造（产生新的或原创的作品）*'
- en: Design, compose, create, combine, formulate, invent, substitute, compile, construct,
    develop, generalise, modify, organise, produce, role-play
  id: totrans-364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计、创作、创造、组合、制定、发明、替代、编译、构建、开发、概括、修改、组织、生产、角色扮演
- en: '*Evaluate (justify a stand or decision)*'
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*评估（证明立场或决策）*'
- en: Criticise, evaluate, appraise, judge, support, decide, recommend, summarise,
    assess, convince, defend, estimate, find errors, grade, measure, predict, rank
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批评、评估、评价、判断、支持、决定、推荐、总结、评估、说服、辩护、估计、找出错误、评分、衡量、预测、排名
- en: '*Analyse (make connections from ideas)*'
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*分析（从想法中建立联系）*'
- en: Analyse, compare, classify, contrast, distinguish, infer, separate, explain,
    categorise, connect, differentiate, divide, order, prioritise, subdivide, survey
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析、比较、分类、对比、区分、推断、分离、解释、归类、连接、区分、划分、排序、优先考虑、细分、调查
- en: '*Apply (use information in new situations)*'
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*应用（在新情境中使用信息）*'
- en: Solve, apply, illustrate, modify, use, calculate, change, demonstrate, discover,
    experiment, show, sketch, complete, construct, dramatise, interpret, produce
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决、应用、说明、修改、使用、计算、改变、演示、发现、实验、展示、草图、完成、构建、戏剧化、解释、生产
- en: '*Understand (explain ideas or concepts)*'
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*理解（解释想法或概念）*'
- en: Explain, describe, interpret, paraphrase, summarise, classify, compare, discuss,
    distinguish, extend, associate, contrast, convert, demonstrate
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释、描述、解释、释义、总结、归类、比较、讨论、区分、扩展、关联、对比、转换、演示
- en: '*Remember (recall basic facts and concepts)*'
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*记忆（回忆基本事实和概念）*'
- en: Define, identify, describe, label, list, name, state, match, recognise, select,
    examine, locate, memorise, quote, recall, reproduce, tabulate, tell, copy
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义、识别、描述、标记、列出、命名、陈述、匹配、识别、选择、检查、定位、记忆、引用、回忆、复制、制表、讲述、复制
- en: Although we've provided the complete Bloom's taxonomy spectrum here, it's important
    to acknowledge that in specific learning situations, such as introductory courses,
    the priority might be understanding and applying existing knowledge, rather than
    generating novel content or solutions. In such cases, the inclusion of the ‘Create’
    level of cognitive functioning in the learning outcomes might not be essential.
    The emphasis could instead be on remembering, understanding and applying the acquired
    information.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们在这里提供了完整的布鲁姆分类法光谱，但重要的是要承认，在特定的学习情境中，例如入门课程，重点可能在于理解和应用现有知识，而不是生成新的内容或解决方案。在这种情况下，学习成果中包含认知功能“创造”级别可能不是必需的。相反，重点可能在于记忆、理解和应用所获得的信息。
- en: To align with Bloom's taxonomy, an additional knowledge taxonomy can be implemented,
    encompassing the domains of factual, conceptual, procedural and metacognitive
    knowledge (Armstrong, n.d.). Factual knowledge includes familiarity with terminology,
    specific details and elements within a subject area. Conceptual knowledge pertains
    to familiarity with classifications, categories, principles, generalisations and
    a grasp of theories, models and structures. Procedural knowledge encompasses mastery
    of subject-specific skills, algorithms, techniques, methods and the ability to
    determine appropriate procedures. Metacognitive knowledge involves strategic and
    contextual understanding of cognitive tasks, including self-awareness and conditional
    knowledge. From this, course learning outcomes can be formulated by identifying
    action verbs from Bloom's taxonomy.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 为了与布鲁姆的分类法相一致，可以实施一个额外的知识分类法，包括事实、概念、程序和元认知知识的领域（Armstrong, n.d.）。事实知识包括对术语、学科领域内的具体细节和要素的熟悉。概念知识涉及对分类、类别、原则、概括以及对理论、模型和结构的掌握。程序知识包括对学科特定技能、算法、技术、方法以及确定适当程序的能力的掌握。元认知知识涉及对认知任务的策略性和情境性理解，包括自我意识和条件性知识。据此，可以通过从布鲁姆的分类法中识别行动动词来制定课程学习成果。
- en: Stage 2
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二阶段
- en: 'Once the course aim, enduring understanding, essential questions and learning
    outcomes have been established, the instructor proceeds to Stage 2: determining
    acceptable evidence (assessment). At this stage, instructors should ask some key
    questions including: How will we know if students have achieved the desired results?
    What will we accept as evidence of student understanding and their ability to
    use (transfer) their learning in new situations? and How will we evaluate student
    performance in fair and consistent ways? (Wiggins & McTighe, 1998). To answer
    these questions, UbD encourages instructors to think like assessors before developing
    units and lessons. The assessment evidence should match the desired outcomes identified
    in Stage 1\. So, it is therefore important for instructors to think ahead about
    the evidence needed to show that students have achieved the goals. This approach
    helps to focus the instruction. In Stage 2, there are two main types of assessment
    – performance tasks and other evidence. Performance tasks ask students to use
    what they have learnt in new and real situations to see if they really understand
    and can use their learning. These tasks are not for everyday lessons; they are
    like final assessments for a unit or a course. Everyday classes teach the knowledge
    and skills needed for the final performance tasks. Alongside performance tasks,
    Stage 2 includes other evidence like quizzes, tests, observations and work samples
    to find out what students know and can do. However, before we move on to discuss
    how we can design the performance task and other types of evidence, first let''s
    take a look at our third learning framework, Assessment For Learning (AfL), Assessment
    As Learning (AaL) and Assessment Of Learning (AoL) framework (*Rethinking Classroom
    Assessment with Purpose in Mind: Assessment for Learning; Assessment as Learning;
    Assessment of Learning*, 2006).'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: '一旦确定了课程目标、持久理解、核心问题和学习成果，教师便进入第二阶段：确定可接受的证据（评估）。在这一阶段，教师应提出一些关键问题，包括：我们如何知道学生是否达到了预期的结果？我们将接受哪些作为学生理解和他们在新情境中使用（迁移）所学知识的证据？以及我们将如何以公平和一致的方式评估学生的表现？（Wiggins
    & McTighe, 1998）。为了回答这些问题，UbD鼓励教师在开发单元和课程之前像评估者一样思考。评估证据应与第一阶段中确定的目标相匹配。因此，对于教师来说，提前考虑展示学生达成目标所需证据是很重要的。这种方法有助于集中教学重点。在第二阶段，主要有两种评估类型——表现任务和其他证据。表现任务要求学生在新的真实情境中使用他们所学的知识，以检验他们是否真正理解和能够应用他们的学习。这些任务不是日常课程的一部分；它们类似于单元或课程的最终评估。日常课程教授最终表现任务所需的知识和技能。在表现任务之外，第二阶段还包括其他证据，如测验、测试、观察和作品样本，以了解学生知道什么和能做什么。然而，在我们讨论如何设计表现任务和其他类型的证据之前，首先让我们看一下我们的第三个学习框架，即学习评估（AfL）、作为学习的评估（AaL）和评估学习（AoL）框架（*Rethinking
    Classroom Assessment with Purpose in Mind: Assessment for Learning; Assessment
    as Learning; Assessment of Learning*, 2006）。'
- en: The AfL, AaL and AoL framework serves as a valuable tool for developing these
    assessments, as it emphasises how different aspects of the learning process have
    distinct roles in enhancing students' understanding and performance. AoL, often
    referred to as summative assessment, is what most people commonly associate with
    testing and grading. This involves assessing students' knowledge and skills at
    the end of a learning period to determine their level of achievement. AoL aims
    to measure how well students have met the learning outcomes and to assign grades
    or scores. While the primary purpose of AoL is to provide a summary judgement
    of student performance, it can also offer insights into the effectiveness of instructional
    methods and curriculum design. AoL forms the foundation of the end-of-course performance
    task. However, it is also supported by AfL and AaL. AfL, also known as formative
    assessment, focuses on using assessment as a tool to support and enhance the learning
    process. The primary purpose of AfL is to provide timely feedback to both students
    and educators. This feedback helps students understand their strengths and areas
    that need improvement, allowing them to adjust their learning strategies accordingly.
    Teachers can use the insights from formative assessments to tailor their instruction,
    addressing students' needs more effectively. AfL promotes a learner-centred approach,
    where assessment is seen as a means to guide and enhance learning rather than
    merely to measure it. Therefore, AfL should be incorporated throughout the semester
    to support the students to achieve the learning outcomes in the end-of-course
    performance task. However, AaL should also play an important part in this process.
    AaL is about promoting a metacognitive approach to learning. Here, assessment
    is viewed as an opportunity for students to actively engage with the material
    and reflect on their learning process. Students take on a more active role by
    monitoring their own learning, setting goals and evaluating their progress. AaL
    encourages students to develop self-regulation skills and become independent learners.
    This approach shifts the focus from external evaluations to internal self-assessment
    and personal growth. Therefore, AaL should also be incorporated throughout the
    semester to support students towards evaluating their learning and setting their
    goals for the end-of-course performance task. Thus, these three types of assessment
    are not mutually exclusive; rather, they complement each other within the broader
    framework of educational assessment.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: AfL（形成性评估）、AaL（分析性评估）和AoL（总结性评估）框架是开发这些评估的有价值工具，因为它强调了学习过程中的不同方面在增强学生理解和表现中的不同作用。AoL，通常被称为总结性评估，是大多数人通常与测试和评分相关联的内容。这涉及到在学期的末尾评估学生的知识和技能，以确定他们的成就水平。AoL旨在衡量学生达到学习成果的程度，并分配成绩或分数。虽然AoL的主要目的是对学生表现提供一个总结性判断，但它也可以提供关于教学方法有效性和课程设计有效性的见解。AoL是课程结束表现任务的基础。然而，它也由AfL和AaL支持。AfL，也称为形成性评估，侧重于将评估作为支持并增强学习过程的一种工具。AfL的主要目的是为学生和教师提供及时的反馈。这种反馈帮助学生了解他们的优势和需要改进的领域，使他们能够相应地调整学习策略。教师可以利用形成性评估的见解来调整他们的教学，更有效地满足学生的需求。AfL促进以学生为中心的方法，其中评估被视为引导和增强学习的手段，而不仅仅是衡量它。因此，AfL应该在整个学期中融入，以支持学生在课程结束表现任务中实现学习成果。然而，AaL也应该在这个过程中发挥重要作用。AaL是关于促进元认知学习方法的。在这里，评估被视为学生积极与材料互动并反思其学习过程的机会。学生通过监控自己的学习、设定目标和评估自己的进度来承担更积极的角色。AaL鼓励学生发展自我调节技能并成为独立的学习者。这种方法将重点从外部评估转移到内部自我评估和个人成长。因此，AaL也应该在整个学期中融入，以支持学生评估他们的学习并设定课程结束表现任务的目标。因此，这三种类型的评估不是相互排斥的；相反，它们在教育评估的更广泛框架内相互补充。
- en: 'To design the end-of-course performance task, following UbD, it is recommended
    that instructors follow the Goal, Role, Audience, Situation, Performance/Product
    and Standards for assessment (GRASPS mnemonic), as this ensures an authentic context
    that equips students with essential skills for their future careers. Following
    Wiggins and McTighe (1998), GRASPS works as follows:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 为了设计课程结束时的表现任务，遵循UbD原则，建议教师遵循目标（Goal）、角色（Role）、受众（Audience）、情境（Situation）、表现/产品（Performance/Product）和评估标准（Standards
    for assessment）的GRASPS助记符，因为这确保了一个真实的环境，为学生未来的职业生涯提供了必要的技能。根据Wiggins和McTighe（1998）的研究，GRASPS的工作原理如下：
- en: Goal – What task do I want the students to achieve?
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标 – 我希望学生达到什么任务？
- en: Role – What is the student's role in the task?
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色 – 学生在任务中的角色是什么？
- en: Audience – Who is the student's target audience?
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 受众 – 学生的目标受众是谁？
- en: Situation – What is the context? The challenge?
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情境 – 上下文是什么？挑战是什么？
- en: Performance – What will students create/develop?
  id: totrans-385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表现 – 学生将创造/开发什么？
- en: Standards – On what criteria will they be judged?
  id: totrans-386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准 – 他们将根据什么标准被评判？
- en: After devising the end-of-course task, it becomes crucial to establish precise
    assessment standards through a rubric aligned with the learning outcomes. These
    rubrics are invaluable aids benefiting both students and educators. They provide
    students with a clear grasp of project expectations right from the outset, and
    they provide instructors with a structured means to impartially evaluate work
    based on predefined criteria. Rubrics can also facilitate conversations about
    performance levels and can serve in self and peer assessment. By incorporating
    rubrics, instructors empower students and promote their active engagement in the
    learning journey. Furthermore, rubrics prove instrumental in assessing the resilience
    of an assessment task against AI influence, a topic explored further in Chapter
    9, Educational Implications.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计课程结束任务之后，通过与学习成果一致的评分标准建立精确的评估标准变得至关重要。这些评分标准对学生和教师都非常有价值。它们让学生从一开始就能清楚地了解项目期望，并为讲师提供了一种结构化的方式，以便根据预定义的标准公正地评估工作。评分标准还可以促进关于表现水平的对话，并可用于自我和同伴评估。通过整合评分标准，讲师赋权学生，并促进他们在学习旅程中的积极参与。此外，评分标准在评估评估任务对人工智能影响的抵抗力方面也发挥了重要作用，这一主题在第九章“教育影响”中进行了进一步探讨。
- en: Once the end-of-course performance task has been designed, the instructor can
    proceed to develop assessments for various types of other evidence, such as quizzes
    (AfL), experiments (AfL) and reflections (AaL). These will support students in
    making progress towards the final performance task. In the context of the flipped
    learning approach, the pre-class phase plays an important role; therefore, we
    take a deeper look at this here. In flipped learning, students are required to
    engage with pre-class videos or study materials before attending the class session.
    To ensure the effectiveness of this approach, these pre-class materials should
    be accompanied by pre-class quizzes or other graded activities. This serves the
    dual purpose of holding students accountable for their learning and enabling instructors
    to assess their comprehension and preparedness. These assessment methods often
    involve quizzes (AfL), short questions (AfL) or introspective prompts that guide
    students in self-assessing their understanding (AaL). During the course, the instructor
    can use the data from these pre-class assessments to tailor their in-class activities,
    discussions and examples to effectively address specific gaps in learning. This
    brings us to Stage 3.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦课程结束时的表现任务被设计出来，讲师就可以继续为各种其他证据类型开发评估，例如测验（AfL）、实验（AfL）和反思（AaL）。这些将支持学生在向最终表现任务迈进的过程中取得进步。在翻转学习方法的背景下，课前阶段扮演着重要的角色；因此，我们在这里对此进行更深入的探讨。在翻转学习中，学生在参加课堂会议之前需要与课前视频或学习材料互动。为确保这种方法的有效性，这些课前材料应伴随课前测验或其他评分活动。这既保证了学生对学习的责任感，又使讲师能够评估他们的理解能力和准备情况。这些评估方法通常涉及测验（AfL）、简短问题（AfL）或引导学生在自我评估理解（AaL）方面的反思提示。在课程期间，讲师可以使用这些课前评估的数据来调整他们的课堂活动、讨论和例子，以有效地解决学习中的特定差距。这把我们带到了第三阶段。
- en: Stage 3
  id: totrans-389
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三阶段
- en: 'Stage 3 of UbD involves planning learning experiences and instruction that
    align with the goals established in Stage 1\. This stage is guided by the following
    key questions that shape the instructional process: How will we support learners
    as they come to understand important ideas and processes? How will we prepare
    them to autonomously transfer their learning? What enabling knowledge and skills
    will students need to perform effectively and achieve desired results? What activities,
    sequence and resources are best suited to accomplish our goals? (Wiggins & McTighe,
    1998). According to Wiggins and McTighe, during this stage, instructors need to
    go beyond mere content delivery and consider the holistic learning experience.
    They note that traditionally, teaching has often focused on conveying information
    and demonstrating basic skills for acquisition, neglecting deeper understanding
    and real-world application. However, they point out that genuine understanding
    requires active engagement, including inference and generalisation, to avoid surface-level
    comprehension, which they believe involves applying knowledge to new contexts
    and receiving constructive feedback for improvement. They suggest that taking
    this approach transforms educators into facilitators of meaning-making and mentors
    who guide effective content utilisation rather than mere presenters. It is at
    this stage that all the required elements are structured into comprehensive units
    to facilitate learning.'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: UbD的第三阶段涉及规划与第一阶段设定的目标相一致的学习体验和教学活动。这一阶段由以下关键问题引导，这些问题塑造了教学过程：我们如何支持学习者理解重要观念和过程？我们如何准备他们自主地转移他们的学习？学生需要哪些使能知识和技能才能有效地执行并实现期望的结果？哪些活动、顺序和资源最适合实现我们的目标？（Wiggins
    & McTighe, 1998）。根据Wiggins和McTighe的说法，在这一阶段，教师需要超越单纯的内容传递，并考虑整体学习体验。他们指出，传统上，教学往往侧重于传递信息和展示基本技能以供获取，而忽视了更深层次的理解和实际应用。然而，他们指出，真正的理解需要积极的参与，包括推理和概括，以避免表面理解，他们认为这涉及到将知识应用于新的情境并接受建设性的反馈以改进。他们建议采取这种方法将教育者转变为意义构建的促进者和指导有效内容利用的导师，而不是单纯的展示者。正是在这一阶段，所有必需的元素被结构化为综合单元，以促进学习。
- en: 'Following our flipped learning approach, within each unit, we draw on Gagne''s
    Nine Events of Instruction to ensure effective learning. Robert Gagne''s Nine
    Events of Instruction offers a robust framework for structuring instructional
    activities. The model is based on the information processing model of mental events
    that occur during learning when individuals are exposed to different stimuli (*Gagne''s
    9 Events of Instruction*, 2016). From this model, Gagne derived nine events of
    instruction, which provide a valuable structure for designing instructional activities.
    These are as follows:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的翻转学习方法中，在每个单元内，我们借鉴Gagne的九个教学事件来确保有效的学习。Robert Gagne的九个教学事件提供了一个结构化教学活动的强大框架。该模型基于学习过程中个体暴露于不同刺激时发生的心理事件的信息处理模型（*Gagne的九个教学事件*，2016）。从这个模型中，Gagne推导出九个教学事件，为设计教学活动提供了有价值的结构。以下是这些事件：
- en: (1)gain attention,
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: (1)引起注意，
- en: (2)inform learners of objectives,
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: (2)告知学习者目标，
- en: (3)stimulate recall of prior learning,
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: (3)激发对先前学习的回忆，
- en: (4)present the content,
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: (4)呈现内容，
- en: (5)provide ‘learning guidance’,
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: (5)提供“学习指导”，
- en: (6)elicit performance (practice),
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: (6)引发表现（练习），
- en: (7)provide feedback,
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: (7)提供反馈，
- en: (8)assess performance,
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: (8)评估表现，
- en: (9)enhance retention and transfer to the job.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: (9)增强保留和将知识转移到工作中。
- en: 'However, for flipped learning to be effective, we believe the sequence of these
    events needs to be rearranged in the following ways:'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了使翻转学习有效，我们相信这些事件的顺序需要以下方式重新排列：
- en: '*Pre-class/Online*'
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*课前/在线*'
- en: –Unit overview;
  id: totrans-403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –单元概述；
- en: –Introduction to key terms;
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –介绍关键术语；
- en: –Prior knowledge activity;
  id: totrans-405
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –先前知识活动；
- en: –Introduction to concepts (via video, article);
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –概念的介绍（通过视频、文章）；
- en: –Hold students accountable for their learning (formative assessment).
  id: totrans-407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –对学生的学习负责（形成性评估）。
- en: '*In Class*'
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*课堂内*'
- en: –Start-of-class/bridging activity to review the pre-class concept;
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –课堂开始时的/过渡活动来复习课前概念；
- en: –Structured student-centred activities to practise the concept;
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –结构化的以学生为中心的活动来练习概念；
- en: –Semi-structured student-centred activities to practise the concept;
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –半结构化的学生为中心的活动来练习概念；
- en: –Freer student-centred activities to practise the concept;
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –更自由的学生为中心的活动来练习概念；
- en: –Self-reflection (at the end of a lesson or unit, either in class or out of
    class).
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –自我反思（在课程或单元结束时，无论是在课堂上还是在课堂外）。
- en: In conclusion, these four frameworks serve as the recommended foundation for
    MEF's flipped courses, emphasising andragogical principles. Together, they assist
    instructors in formulating course aims, enduring understandings, essential questions
    and learning outcomes. This comprehensive approach further facilitates the creation
    of authentic assessments, which then guides the development of suitable instructional
    strategies and activities. By aligning curriculum, assessment and instruction,
    this framework ensures a cohesive and effective teaching and learning experience.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，这四个框架作为MEF翻转课程的推荐基础，强调成人教育原则。它们共同帮助教师制定课程目标、持久理解、核心问题和学习成果。这种全面的方法进一步促进了真实评估的创建，然后指导适合的教学策略和活动的开发。通过使课程、评估和教学相一致，这个框架确保了连贯而有效的教学和学习体验。
- en: Research Approach
  id: totrans-415
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 研究方法
- en: This research centres on an investigation of the impact of ChatGPT on students
    and instructors in higher education. Our primary objectives are to explore, understand
    and assess how this AI chatbot may influence the roles of students and instructors
    within an academic setting. By delving into the implementation of ChatGPT, we
    aim to uncover potential challenges and opportunities that may arise, providing
    valuable insights into its transformative role in the educational landscape. Ultimately,
    our goal is to comprehensively examine how the integration of ChatGPT specifically
    affects the roles of students, instructors and higher education institutions.
    As such, similar to Rudolph et al. (2023), we categorise our areas of research
    into student-facing, teacher-facing and system-facing. However, we introduce another
    category, ‘researcher-facing’, as it provides an additional metacognitive perspective
    on how ChatGPT influenced the research process which, ultimately, will also affect
    institutions of higher education.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究集中在调查ChatGPT对高等教育中学生和教师的影响。我们的主要目标是探索、理解和评估这种人工智能聊天机器人可能如何影响学术环境中学生和教师的角色。通过深入研究ChatGPT的实施，我们旨在揭示可能出现的挑战和机遇，为它在教育领域的变革性作用提供有价值的见解。最终，我们的目标是全面考察ChatGPT的整合如何具体影响学生、教师和高等教育机构的角色。因此，类似于Rudolph等人（2023年），我们将我们的研究领域分为面向学生、面向教师和面向系统。然而，我们引入了另一个类别，“面向研究者”，因为它提供了对ChatGPT如何影响研究过程（最终也会影响高等教育机构）的额外元认知视角。
- en: On planning our research approach, we decided a qualitative research paradigm
    would be the most suitable, as it is an exploratory approach which aims to understand
    the subjective experiences of individuals (not just the technology) and the meanings
    they attach to those experiences. This approach is particularly useful when investigating
    new phenomena, such as ChatGPT, where there is limited knowledge and experience.
    Using such an approach enables us to gain a deeper understanding of the impact
    of ChatGPT on the role of students, instructors and our institution as a whole
    and to explore the subjective experiences and perspectives of those involved.
    Within this paradigm, a case study approach seemed most appropriate. Case studies
    involve conducting a thorough investigation of a real-life system over time, using
    multiple sources of information to produce a comprehensive case description, from
    which key themes can be identified (Cresswell & Poth, 2016). This approach, commonly
    employed in the field of education, entails gathering and analysing data from
    diverse sources like interviews, observations, documents and artefacts to gain
    valuable insights into the case and its surrounding context. Case studies are
    a useful approach when a case can be considered unique and intrinsic (Yin, 2011).
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 在规划我们的研究方法时，我们决定采用定性研究范式最为合适，因为它是一种探索性方法，旨在理解个人的主观体验（不仅仅是技术）以及他们附加在这些体验上的意义。这种方法在研究新现象时尤其有用，例如ChatGPT，在这些领域知识和经验有限。采用这种方法使我们能够更深入地理解ChatGPT对学生、教师以及我们整个机构角色的影响，并探索相关人员的主体体验和观点。在这个范式下，案例研究方法似乎最为恰当。案例研究涉及对现实生活中的系统进行长时间的彻底调查，使用多种信息来源来制作全面的案例描述，从而可以识别出关键主题（Cresswell
    & Poth, 2016）。这种方法在教育领域被广泛采用，包括从访谈、观察、文件和实物等不同来源收集和分析数据，以获得对案例及其周围环境的宝贵见解。当案例被认为是独特且内在的时，案例研究是一种有用的方法（Yin,
    2011）。
- en: 'Our case is both unique and intrinsic, as it involves looking at the potential
    effect of ChatGPT on various stakeholders at our university, something that, at
    the time of writing, had not been studied extensively before. Due to this, we
    decided to employ Yin''s (1984) methodology, which uses an instrumental case study
    research design proposed by Stake (1995). Yin''s design follows five phases of
    analysis: compiling, disassembling, reassembling, interpreting and concluding.
    It is particularly useful for understanding a phenomenon within a specific context,
    as is the case with ChatGPT and its potential impact on various stakeholders in
    education. It also takes into consideration the historical background, present
    circumstances and potential future developments of the case. In such a case, data
    can be gathered via interviews, focus groups, observations, emails, reflections,
    projects, critical incidents and researcher diaries, after which, following Braun
    and Clarke (2006) a thematic analysis can be conducted.'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的案例既是独特的又是内在的，因为它涉及研究ChatGPT对我们大学各种利益相关者的潜在影响，这在撰写本文时尚未被广泛研究。因此，我们决定采用Yin（1984）的方法，该方法使用Stake（1995）提出的工具性案例研究设计。Yin的设计遵循五个分析阶段：汇编、拆解、重组、解释和结论。它特别适用于理解特定背景下的现象，正如ChatGPT及其对教育领域各种利益相关者潜在影响的情况。它还考虑了案例的历史背景、现状和潜在的未来发展。在这种情况下，可以通过访谈、焦点小组、观察、电子邮件、反思、项目、关键事件和研究者日记等方式收集数据，之后，根据Braun和Clarke（2006）的建议，可以进行主题分析。
- en: Data Collection
  id: totrans-419
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据收集
- en: This study took place from December 2022 to August 2023, starting with the release
    of ChatGPT-3.5 on 30 November 2022\. We used the free version of ChatGPT-3.5 for
    data collection, publicly available since November 2023, to ensure fair participation
    of students without requiring them to purchase a paid version. However, it should
    be noted that the training data in ChatGPT-3.5 only extend up to September 2021.
    During the write-up phase, GPT-4 was used. As discussed previously, the literature
    review focused on papers published between December 2022 and early April 2023
    to ensure current resources. However, considering ChatGPT's ever-evolving nature,
    we continued to collect extant literature from media sources throughout the study
    until the final write-up.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究从 2022 年 12 月至 2023 年 8 月进行，始于 2022 年 11 月 30 日 ChatGPT-3.5 的发布。我们使用了自 2023
    年 11 月以来公开的 ChatGPT-3.5 的免费版本进行数据收集，以确保学生公平参与，无需他们购买付费版本。然而，需要注意的是，ChatGPT-3.5
    的训练数据仅延伸至 2021 年 9 月。在撰写阶段，使用了 GPT-4。如前所述，文献综述集中在 2022 年 12 月至 2023 年初四月的论文上，以确保资源的时效性。然而，考虑到
    ChatGPT 持续演变的性质，我们在整个研究过程中继续从媒体来源收集现有文献，直至最终撰写。
- en: Adopting a case study approach, our research aims to collect diverse and comprehensive
    data. In line with Yin's (1994) case study protocol, we identified six specific
    types of data we would gather, including documentation, archival records, reflections,
    direct observation, participant observation and physical artefacts. To collect
    data for this study, relevant documents such as reports, policies and news articles
    on ChatGPT in education were continuously gathered from internet searches throughout
    the investigation. The objective was to gain comprehensive insights and perspectives
    on the integration of ChatGPT in education. The collected data formed the basis
    for Chapter 2 in this book. The principal investigator made sure to maintain reflexivity
    throughout, considering her positionality and biases and sought diverse perspectives
    from various sources to enhance data validity and reliability. This approach ensures
    a well-rounded study.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 采用案例研究方法，我们的研究旨在收集多样化和全面的数据。根据 Yin（1994）的案例研究协议，我们确定了六种具体的数据类型，我们将收集这些数据，包括文档、档案记录、反思、直接观察、参与观察和实物证据。为了收集本研究的数据，我们从整个调查过程中通过互联网搜索持续收集与教育中
    ChatGPT 相关的相关文件，如报告、政策和新闻文章。目标是获得关于 ChatGPT 整合到教育中的全面见解和观点。收集到的数据构成了本书第二章的基础。主要研究人员确保在整个过程中保持反思性，考虑到她的位置性和偏见，并从各种来源寻求不同的观点，以增强数据的有效性和可靠性。这种方法确保了研究全面性。
- en: The researcher-facing aspect of this study involved the principal investigator
    documenting the impact of ChatGPT on the research process. A comparative approach
    was taken, analysing how research stages were conducted in previous projects,
    before ChatGPT's availability, and how they could be approached since the availability
    of ChatGPT. This meta-perspective allowed for reflection on the research process,
    providing insights into the researcher's perspective. The data collection for
    this aspect took place from December 2022 to June 2023, using a research diary
    digitally maintained in Google Sheets following Patton's (2002) guidelines. The
    diary tracked insights, challenges and adjustments made while incorporating ChatGPT
    into the research, enhancing self-awareness and understanding of research practices
    with AI technologies. Researcher-facing data are referenced as RFD in Chapter
    6, Findings and Interpretations.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究的面向研究人员的方面涉及主要研究人员记录 ChatGPT 对研究过程的影响。采用比较方法，分析在 ChatGPT 可用之前和之后如何进行研究阶段。这种元视角允许对研究过程进行反思，为研究人员的观点提供见解。这一方面的数据收集从
    2022 年 12 月至 2023 年 6 月进行，遵循 Patton（2002）的指南，在 Google Sheets 中以数字方式维护研究日记。日记追踪了在将
    ChatGPT 纳入研究过程中获得的见解、挑战和调整，增强了自我意识和 AI 技术研究实践的理解。面向研究人员的资料在第六章“发现与解释”中引用为 RFD。
- en: The teacher-facing part of this study aims to investigate the impact of ChatGPT
    on the instructor's role, in which the principal investigator, in the role of
    instructor, conducted a comparative analysis between a previous course (before
    ChatGPT) and an upcoming course in the spring semester of 2023\. The course in
    question was HUM 312 Forensic Linguistics, which follows MEF University's flipped
    learning approach. Throughout January and February 2023, the instructor actively
    evaluated and adjusted the course design to incorporate ChatGPT effectively. This
    involved analysing the syllabus, course overview, assessments and rubrics, and
    in-class activities to identify suitable opportunities for ChatGPT integration.
    To record these procedures and contemplations, the instructor utilised a Teacher's
    Research Diary (TFD) in Google Sheets, showcasing reflexivity through self-examination,
    noting choices and critically evaluating both past and revised course materials.
    Observations were conducted while the course unfolded in the spring 2023 semester.
    During this period, the instructor engaged in rigorous self-reflection, contributing
    significantly to the data collection process. This approach helped address possible
    biases and assumptions, ensuring valuable insights from student feedback.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究面向教师的部分旨在调查ChatGPT对教师角色的影响，其中主要研究员在教师的角色下，对之前的一门课程（ChatGPT之前）和2023年春季学期的即将开设的课程进行了比较分析。这门课程是HUM
    312法语言学，遵循MEF大学的翻转学习方法。在2023年1月和2月期间，教师积极评估和调整课程设计，以有效地整合ChatGPT。这包括分析课程大纲、课程概述、评估和评分标准，以及课堂活动，以确定ChatGPT整合的合适机会。为了记录这些程序和思考，教师利用Google
    Sheets中的教师研究日记（TFD），通过自我反思展示反思性，记录选择并批判性地评估了过去和修订后的课程材料。观察是在2023年春季学期课程进行期间进行的。在此期间，教师进行了严格的自我反思，对数据收集过程做出了重大贡献。这种方法有助于解决可能的偏见和假设，确保从学生反馈中获得宝贵见解。
- en: The student-facing aspect of the research took place within the new HUM 312
    Forensic Linguistics course. The course was conducted online whereby pre-class
    activities were made available on the university learning management system prior
    to class, and weekly classes took place via Zoom where hands-on, interactive learning
    were employed. The course was a 16-week course, with one 2-hour lesson per week.
    The course had first run in the spring semester of 2020, when it moved from face-to-face
    to online due to the COVID pandemic, and has run every year since, continuing
    in its online format. The new iteration of the course ran in spring 2023 with
    a cohort of 12 students. An overview of the new iteration of the course is provided
    below.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 研究面向学生的部分是在新的HUM 312法语言学课程中进行的。该课程在线进行，课前活动在课前通过大学学习管理系统提供，每周的课程通过Zoom进行，采用动手互动式学习。该课程为期16周，每周一次2小时的课程。该课程首次在2020年春季学期运行，当时由于COVID大流行从面对面教学转为在线教学，并且从那以后每年都继续进行，一直保持在线形式。2023年春季，该课程的新版本运行，共有12名学生参加。以下是该课程新版本的概述。
- en: '*Course Aim*'
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*课程目标*'
- en: The overall educational aim of this course is for students to investigate the
    role linguistic analysis plays in the legal process. It focuses on the increasing
    use of linguists as expert witnesses where linguistic analysis is presented as
    evidence.
  id: totrans-426
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本课程的总体教育目标是让学生调查语言分析在法律过程中的作用。它侧重于语言学家作为专家证人日益广泛的使用，其中语言分析被作为证据提出。
- en: '*Course Description*'
  id: totrans-427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*课程描述*'
- en: 'This course aims to provide students with an understanding of forensic linguistics,
    focusing on the role of linguistic analysis in the legal process. Forensic linguistics
    involves a careful and systematic examination of language, serving justice and
    aiding in the evaluation of guilt and innocence in criminal cases. The field is
    divided into two major areas: written language, which analyses various texts like
    police interviews, criminal messages and social media posts, and spoken language,
    which examines language used during official interviews and crimes. Through a
    case-based approach, the course explores how crimes have been solved using different
    linguistic elements, such as emojis, text message abbreviations, regional accents
    and dialects, handwriting analysis and linguistic mannerisms, among others.'
  id: totrans-428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本课程旨在使学生了解法语言学，重点关注语言分析在法律过程中的作用。法语言学涉及对语言的仔细和系统性的审查，服务于正义，并有助于在刑事案件中对有罪与无罪进行评估。该领域分为两大主要领域：书面语言，分析各种文本，如警察访谈、犯罪信息和社交媒体帖子，以及口语语言，审查官方访谈和犯罪中使用的语言。通过案例研究方法，本课程探讨如何使用不同的语言元素，如表情符号、短信缩写、地方口音和方言、笔迹分析和语言习惯等，来解决犯罪。
- en: '*Enduring Understanding*'
  id: totrans-429
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*持久理解*'
- en: Forensic Linguistics aids justice by analysing language to uncover truth in
    criminal cases.
  id: totrans-430
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法语言学通过分析语言来揭示刑事案件中的真相，从而有助于正义。
- en: '*Essential Questions*'
  id: totrans-431
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*基本问题*'
- en: Overarching Essential Questions
  id: totrans-432
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 总体基本问题
- en: –How does linguistic analysis contribute to legal case analysis in forensic
    linguistics?
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –语言分析如何有助于法语言学的法律案例分析？
- en: –How is the emergence of AI reshaping the legal field?
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –人工智能的出现如何重塑法律领域？
- en: Topical Essential Questions
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主题基本问题
- en: –In what ways do communication methods such as emojis, text messages and punctuation
    impact understanding in forensic linguistics cases?
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –沟通方式，如表情符号、短信和标点符号，在法语言学案件中如何影响理解？
- en: –What ethical and legal aspects surround mandating preferred transgender pronouns,
    and how does this relate to freedom of speech and discrimination concerns?
  id: totrans-437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –强制使用首选的跨性别代词周围有哪些伦理和法律方面的问题，这与言论自由和歧视问题有何关系？
- en: –How can slang, regional dialects, linguistic mannerisms and handwriting be
    utilised to identify a potential suspect in forensic linguistic investigations?
  id: totrans-438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –如何利用俚语、地方方言、语言习惯和笔迹在法语言学调查中识别潜在嫌疑人？
- en: –How can the analysis of acoustic phonetics in speech help identify whether
    someone is intoxicated or sober?
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –如何通过分析语音的声学语音学来帮助识别某人是否醉酒或清醒？
- en: –In the realm of forensic linguistics, how does the study of pragmatics present
    challenges in accurately interpreting an individual's intended meaning during
    communication?
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –在法语言学领域，语用学的研究如何对准确解释个体在交流中的意图意义提出挑战？
- en: '*Learning Outcomes*'
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*学习成果*'
- en: –Analyse how language affects legal decisions.
  id: totrans-442
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –分析语言如何影响法律决策。
- en: –Deconstruct aspects of language from lawsuits and manipulate language from
    the suits from one form to another.
  id: totrans-443
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –从诉讼中解构语言方面，并操纵诉讼中的语言从一种形式转变为另一种形式。
- en: –Analyse how language was used in real-life cases to convict or acquit a defendant.
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –分析在现实案件中如何使用语言来定罪或宣告被告无罪。
- en: –Compose a mock closing argument on a specific aspect of language in a real-life
    case and justify your argument.
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –就现实案件中的特定语言方面撰写模拟总结陈词，并证明你的论点。
- en: '*Assessment*'
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*评估*'
- en: –pre-class quizzes (20%),
  id: totrans-447
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –课前测验（20%），
- en: –in-class assessed activities (40%),
  id: totrans-448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –课堂评估活动（40%），
- en: –Semester Project 1 (20%).
  id: totrans-449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –学期项目1（20%）。
- en: '–You will take on the role of either the defence or prosecution, with the goal
    of getting the defendant acquitted or convicted in one of the cases. Your audience
    will be the judge and jury. The situation entails making a closing argument at
    the end of a trial. As the product/performance, you are required to create a closing
    argument presented both in writing and as a recorded speech. The standards for
    assessment include: providing a review of the case, a review of the evidence,
    stories and analogies, arguments to get the jury on your client''s side, arguments
    attacking the opposition''s position, concluding comments to summarise your argument
    and visual evidence from the case.'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –你将扮演辩护人或检方角色，目标是使被告在一宗案件中获判无罪或定罪。你的听众将是法官和陪审团。这种情况要求在审判结束时进行总结陈词。作为成果/表现，你需要创作一份书面和录音的总结陈词。评估标准包括：对案件进行回顾，对证据进行回顾，讲述故事和类比，说服陪审团站在你客户一方，攻击对方立场，总结性评论以总结你的论点，以及从案件中提取的视觉证据。
- en: –Semester Project 2 (20%)
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –学期项目2（占20%）
- en: –You will develop your own individual projects related to an aspect of forensic
    linguistics and ChatGPT or the law and ChatGPT. You will also develop your own
    rubric for evaluation. You will present your project to an audience of peers and
    professors in the final lesson and answer any questions posed to you.
  id: totrans-452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –你将开发与法医语言学和ChatGPT或法律和ChatGPT相关的个人项目。你还将开发自己的评估标准。你将在最后一节课向同行和教授展示你的项目，并回答他们向你提出的任何问题。
- en: The selection of this course for investigation was driven by several factors.
    Firstly, the principal investigator was the instructor for this course and had
    expertise in exploring educational technologies. Additionally, she had previously
    investigated and been involved in the design of the Flipped, Adaptive, Digital
    and Active Learning (FADAL) approach, making her well-suited for this investigation.
    The instructor's deep understanding of the course, its planning processes and
    her ability to teach it again in the upcoming semester provided an ideal opportunity
    to compare pre- and post-ChatGPT course planning. Moreover, the linguistic components
    of the Forensic Linguistics course made it suitable for testing ChatGPT's capabilities
    across various linguistic aspects. The students enrolled were from the Faculty
    of Law, a field expected to be heavily impacted by AI advancements, making their
    involvement in the investigation valuable for raising awareness about AI's impact
    on the legal profession. Data collection occurred between March and June 2023,
    aligning with the spring semester. To investigate the effects on students, a diverse
    set of data was gathered. This started with a survey administered at the beginning
    of the course to assess students' existing familiarity and usage of ChatGPT. In
    the second lesson, students were presented with a video that introduced them to
    ChatGPT, followed by open-ended questions to capture their impressions. Pre-class
    questions were employed throughout the course to find out about the specific interactions
    students had with ChatGPT and how these interactions had influenced their learning
    experiences. A reflective questionnaire was conducted at the end of the course
    to gain more information about the students' insights, impressions and perspectives
    of their experiences with ChatGPT throughout the course. Furthermore, complementary
    data sources were incorporated into the study. Padlets, screenshots and students'
    reflections were gathered to provide a more comprehensive perspective on the student
    experience. To further enrich the analysis, students granted permission for their
    projects to be included in the data assessment. The student-facing data are referred
    to as SFD.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 选择这门课程进行研究的动机由几个因素驱动。首先，主要调查员是该课程的讲师，并且对探索教育技术有专业知识。此外，她之前已经调查过并参与了翻转、自适应、数字和主动学习（FADAL）方法的设计，这使得她非常适合进行这项研究。讲师对课程的深入理解、其规划过程以及她即将在下个学期再次教授这门课程的能力，为比较ChatGPT前后课程规划提供了理想的机会。此外，法语言学课程的言语成分使其适合测试ChatGPT在各个语言方面的能力。注册的学生来自法学院，该领域预计会受到人工智能进步的严重影响，因此他们的参与对于提高人们对人工智能对法律职业影响的意识是有价值的。数据收集发生在2023年3月至6月之间，与春季学期相吻合。为了调查对学生的影响，收集了一组多样化的数据。这始于课程开始时进行的一项调查，以评估学生对ChatGPT现有熟悉程度和使用情况。在第二节课中，学生观看了一部介绍ChatGPT的视频，随后提出了开放式问题以捕捉他们的印象。在整个课程中使用了课前问题，以了解学生与ChatGPT的具体互动以及这些互动如何影响了他们的学习体验。课程结束时进行了一次反思性问卷调查，以获取更多关于学生在整个课程中与ChatGPT互动的见解、印象和观点的信息。此外，还纳入了互补的数据来源。收集了Padlets、屏幕截图和学生的反思，以提供对学生体验的更全面视角。为了进一步丰富分析，学生同意将他们的项目包括在数据评估中。面向学生的数据被称为SFD。
- en: The focus of the system-facing aspect of this study was to examine the implications
    of ChatGPT from the viewpoints of different stakeholders at the university, including
    instructors, department heads, deans and vice-rectors. Peripheral participants,
    including visiting teachers at workshops and discussions with professors from
    different institutions and educational leaders at conferences, provided additional
    insights. The data collection period for this aspect was from January to June
    2023\. Various methods were used for data collection. Email communications from
    university stakeholders were collected, providing valuable insights into discussions
    surrounding ChatGPT's impact on the university. Zoom recordings and workshop activities
    were collected from institutional workshops about ChatGPT to understand the institutional
    response. Interviews with instructors and stakeholders were conducted via Zoom
    or Google Chats. Critical incidents arising from conversations and conferences
    were recorded in a system-facing diary, helping to identify patterns, themes,
    challenges and opportunities related to ChatGPT's integration in education. This
    served as a valuable tool for documenting and reflecting upon insights and challenges.
    Information recorded in this diary was member-checked, wherever possible, with
    those involved to verify accuracy and validity of data and ensure perspectives
    were accurately represented. System-facing data are referred to as SYFD.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究的系统面向方面重点是考察ChatGPT对大学不同利益相关者（包括教师、系主任、院长和副校长）的影响，包括工作坊中的访问教师以及与不同机构教授和会议上的教育领导者的讨论，这些外围参与者提供了额外的见解。这一方面的数据收集期从2023年1月到6月。数据收集使用了多种方法。收集了来自大学利益相关者的电子邮件通信，为围绕ChatGPT对大学影响的讨论提供了宝贵的见解。收集了关于ChatGPT的机构工作坊的Zoom录音和工作坊活动，以了解机构的反应。通过Zoom或Google
    Chats进行了与教师和利益相关者的访谈。在系统面向日记中记录了来自对话和会议的关键事件，有助于识别与ChatGPT在教育中整合相关的模式、主题、挑战和机遇。这作为一个宝贵的工具，用于记录和反思见解和挑战。在可能的情况下，日记中记录的信息与相关人员进行了成员检查，以验证数据的准确性和有效性，并确保观点得到准确反映。系统面向数据被称为SYFD。
- en: Data Analysis Methods and Techniques
  id: totrans-455
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据分析方法和技术
- en: 'To analyse our data, we followed Braun and Clarke''s (2006) thematic analysis
    approach, which involves systematically coding and categorising the data to identify
    patterns or themes. It involves six phases: familiarisation with the data, coding,
    searching for themes, reviewing themes, defining and naming themes and writing
    up. While there are six phases to this process, following Braun and Clarke''s
    advice, we viewed each phase as iterative, not linear, requiring us to revisit
    previous phases as needed. In order to ensure the credibility and dependability
    of the study, following Thurmond (2001), we employed data triangulation using
    multiple data collection tools to achieve a comprehensive and in-depth understanding.'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 为了分析我们的数据，我们遵循了Braun和Clarke（2006）的主题分析方法，该方法涉及系统地编码和分类数据以识别模式或主题。它包括六个阶段：熟悉数据、编码、寻找主题、审查主题、定义和命名主题以及撰写报告。虽然这个过程有六个阶段，但根据Braun和Clarke的建议，我们将每个阶段视为迭代性的，而不是线性的，需要根据需要回顾之前的阶段。为了确保研究的可信度和可靠性，根据Thurmond（2001）的建议，我们采用了数据三角测量法，使用多种数据收集工具，以实现全面和深入的理解。
- en: 'We began by immersing ourselves in the dataset, engaging in repeated reading
    and noting initial observations to gain familiarity. Subsequently, we developed
    codes to capture significant features that were relevant to our research questions.
    This process encompassed both data reduction and analysis, aiming to comprehensively
    capture the semantic and conceptual meaning embedded in the data. Initially, the
    principal investigator undertook the task of creating the codes, carefully reviewing
    the data and establishing preliminary coding categories. Following this, a collaborative
    approach was adopted, involving members of the MEF Centre for Research and Best
    Practices in Learning and Teaching (CELT). The codes were reviewed, critiqued
    and revised as necessary, ensuring a comprehensive and accurate representation
    of the data. Through this iterative process, we arrived at our final set of codes
    and definitions, as shown below:'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先沉浸在数据集中，进行重复阅读并记录初步观察，以获得熟悉感。随后，我们开发了代码来捕捉与我们的研究问题相关的显著特征。这个过程包括数据减少和分析，旨在全面捕捉数据中嵌入的语义和概念意义。最初，主要研究员承担了创建代码的任务，仔细审查数据并建立初步编码类别。随后，采用了一种协作方法，涉及MEF研究中心的研究和最佳实践（CELT）的成员。代码被审查、批评和必要时进行修订，以确保数据的全面和准确表示。通过这个迭代过程，我们得到了最终的代码和定义集，如下所示：
- en: Ability to translate
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 翻译能力
- en: ChatGPT has the ability to translate text from one language to another.
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT具有将文本从一种语言翻译到另一种语言的能力。
- en: ChatGPT demonstrates competency in completing assigned student tasks.
  id: totrans-460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT在完成分配给学生的任务方面表现出能力。
- en: ChatGPT exhibits proficiency in successfully accomplishing tasks assigned to
    students.
  id: totrans-461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT表现出成功完成分配给学生任务的能力。
- en: ChatGPT unable to perform assigned student tasks
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT无法执行分配给学生的任务
- en: This indicates situations where ChatGPT is unable to successfully complete tasks
    or assignments given to students.
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这表明ChatGPT无法成功完成分配给学生的任务或作业的情况。
- en: Culturally specific database
  id: totrans-464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有文化特定数据库
- en: The information in ChatGPT's database is specific to a particular culture or
    cultural context, which may not be relevant to the user's needs.
  id: totrans-465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT数据库中的信息特定于某个文化或文化背景，可能不符合用户的需求。
- en: Disciplinary context limitations
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学科背景限制
- en: ChatGPT demonstrates limitations in its understanding of specific disciplinary
    contexts or lacks specialised knowledge in a particular field.
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT在其对特定学科背景的理解上表现出局限性，或在特定领域缺乏专业知识。
- en: Enriches the user's ideas
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 丰富用户的思想
- en: ChatGPT has the ability to enhance and expand the user's ideas through its generated
    responses.
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT具有通过其生成的响应增强和扩展用户想法的能力。
- en: Gaps in knowledge
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识差距
- en: ChatGPT demonstrates a lack of information or understanding on certain topics
    or areas.
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT在特定主题或领域上表现出信息或理解不足。
- en: Gender bias in pronoun usage
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代词使用中的性别偏见
- en: This refers to the tendency of ChatGPT to default to male pronouns unless prompted
    otherwise during interactions.
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是ChatGPT在交互中默认使用男性代词，除非被提示使用其他代词。
- en: Gives incorrect information
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供错误信息
- en: ChatGPT provides inaccurate or incorrect information in its responses.
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT在其响应中提供不准确或不正确的信息。
- en: Imparts specific knowledge, skills or concepts to users
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向用户传授特定的知识、技能或概念
- en: ChatGPT provides users with specific information, skills or concepts through
    its responses.
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT通过其响应向用户提供特定的信息、技能或概念。
- en: Inhibits user learning process
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 抑制用户学习过程
- en: This refers to the negative impact of ChatGPT, which can hinder or diminish
    users' ability to actively engage in the learning process and acquire knowledge
    independently.
  id: totrans-479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是ChatGPT的负面影响，可能会阻碍或减少用户积极参与学习过程和独立获取知识的能力。
- en: Input determines output quality.
  id: totrans-480
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入决定输出质量。
- en: The quality of the output generated by ChatGPT is influenced by the quality
    of the input provided to it.
  id: totrans-481
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT生成的输出质量受其输入质量的影响。
- en: Interactivity of communication
  id: totrans-482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通信的互动性
- en: This refers to the dynamic and responsive nature of the interaction between
    users and ChatGPT.
  id: totrans-483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是用户与ChatGPT之间交互的动态和响应性。
- en: Lack of standard referencing guide for ChatGPT
  id: totrans-484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏ChatGPT的标准引用指南
- en: This refers to the absence or inadequate guidelines for citing and referencing
    sources derived from ChatGPT in academic and research contexts.
  id: totrans-485
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是在学术和研究环境中，引用和参考ChatGPT来源的指南缺失或不充分。
- en: Lack of response relevance
  id: totrans-486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应的相关性不足
- en: This refers to instances where the responses generated by ChatGPT are not pertinent
    or closely related to the input or query.
  id: totrans-487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是ChatGPT生成的回应与输入或查询不相关或不紧密相关的情况。
- en: Need for giving a clear context
  id: totrans-488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要提供清晰的上下文
- en: This highlights the importance of providing a clear and specific context when
    interacting with ChatGPT to ensure accurate and relevant responses.
  id: totrans-489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这强调了在与ChatGPT交互时提供清晰和具体上下文的重要性，以确保获得准确和相关的回应。
- en: Need to fact-check
  id: totrans-490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要进行事实核查
- en: This highlights the importance of verifying or confirming the information provided
    by ChatGPT through independent fact-checking.
  id: totrans-491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这突显了通过独立的事实核查验证或确认ChatGPT提供的信息的重要性。
- en: Occurrences of refusal or reprimand by ChatGPT
  id: totrans-492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT拒绝或斥责的情况
- en: This signifies instances where ChatGPT refuses to provide a response or issues
    reprimands to the user for certain inputs or queries.
  id: totrans-493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这表示ChatGPT拒绝提供回应或对用户的某些输入或查询提出斥责的情况。
- en: People perceive ChatGPT as providing opinions rather than predictions.
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们将ChatGPT视为提供意见而不是预测。
- en: This highlights the difference between instances where ChatGPT appears to provide
    personal opinions, while in reality, it generates responses based on predictive
    models.
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这突显了ChatGPT看似提供个人意见的情况与实际上基于预测模型生成回应之间的差异。
- en: Perceived human-like interactions with ChatGPT
  id: totrans-496
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 感知到与ChatGPT的类似人类交互
- en: This refers to the phenomenon where users perceive or experience ChatGPT as
    exhibiting human-like qualities in its interactions, despite its artificial nature.
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是用户尽管意识到ChatGPT本质上是人工的，但在其交互中感知或体验到它展现出类似人类的特质的现象。
- en: Reduces cognitive load
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少认知负担
- en: ChatGPT can alleviate cognitive burden or mental effort by providing assistance
    or performing tasks on behalf of the user.
  id: totrans-499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以通过提供帮助或代表用户执行任务来减轻认知负担或心理努力。
- en: Requires multiple iterations to get what you want
  id: totrans-500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要多次迭代才能得到你想要的结果
- en: Achieving the desired outcome or response from ChatGPT may require multiple
    interactions or iterations.
  id: totrans-501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要从ChatGPT获得期望的结果或回应可能需要多次交互或迭代。
- en: Reviews work and gives suggestions for improvement
  id: totrans-502
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查工作并提出改进建议
- en: ChatGPT can analyse and provide feedback on the work or content presented to
    it, offering suggestions for improvement.
  id: totrans-503
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以对其呈现的工作或内容进行分析并提供改进建议。
- en: Speeds up the process
  id: totrans-504
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加快了过程
- en: ChatGPT can accelerate or expedite certain tasks or processes compared to traditional
    methods.
  id: totrans-505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与传统方法相比，ChatGPT可以加速或加快某些任务或过程。
- en: Text register modification
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本语域修改
- en: This refers to the capability of ChatGPT to adapt its writing style, tone or
    formality to match specific registers, including the ability to mimic the style
    of particular individuals.
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是ChatGPT能够调整其写作风格、语气或正式程度以匹配特定语域的能力，包括模仿特定个人风格的能力。
- en: Unquestioning trust in information
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对信息的无条件的信任
- en: This refers to instances where users place complete trust in the information
    provided by ChatGPT without critical evaluation or scepticism, even when it is
    giving incorrect information.
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这指的是用户对ChatGPT提供的信息完全信任，即使它提供错误信息，也没有进行批判性评估或怀疑。
- en: Useful in other areas of life
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在生活的其他领域也很有用
- en: ChatGPT can have practical applications and benefits beyond just educational
    use.
  id: totrans-511
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT在教育用途之外还可以有实际的应用和好处。
- en: 'The process of refining codes into coherent themes involved several cycles
    of careful evaluation. We began by generating initial codes and then organising
    them into meaningful themes. Thorough exploration of various groupings and potential
    themes ensured their accuracy and validity. To validate these themes, we meticulously
    cross-referenced them with the coded data extracts and the entire dataset. Additional
    data, such as critical incidents observed during conferences and workshop discussions,
    posed a challenge as they emerged after we had established our codes and completed
    the thematic analysis. However, since these incidents contained relevant new data
    that could enrich our analysis, we revisited the coding and thematic analysis
    process three times to integrate these additional data. This iterative approach
    resulted in more robust codes and themes. Collaborative discussions further led
    to the formulation of concise and informative names for each theme. Through this
    iterative approach, we attained data saturation, indicating that no further new
    information or themes were coming to light. The final themes that were collectively
    agreed upon and their respective codes are as follows:'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 将代码精炼成连贯主题的过程涉及了多次仔细评估的循环。我们首先生成初始代码，然后将它们组织成有意义的主题。对各种分组和潜在主题的彻底探索确保了它们的准确性和有效性。为了验证这些主题，我们仔细地将它们与编码的数据摘录和整个数据集进行交叉参考。在会议和工作坊讨论中观察到的关键事件等额外数据构成了挑战，因为它们在我们建立代码并完成主题分析之后出现。然而，由于这些事件包含了可以丰富我们分析的相关新数据，我们三次回顾了编码和主题分析过程，以整合这些额外数据。这种迭代方法导致了更稳健的代码和主题。协作讨论进一步导致了为每个主题制定简洁且信息丰富的名称。通过这种迭代方法，我们达到了数据饱和，这表明没有新的信息或主题出现。最终达成共识的主题及其相应的代码如下：
- en: '*Input Quality and Output Effectiveness*'
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入质量与输出效果*'
- en: Need for giving a clear context, input determines output quality, requires multiple
    iterations to get what you want
  id: totrans-514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要提供清晰的背景，输入决定输出质量，需要多次迭代才能得到想要的结果
- en: '*Limitations and Challenges of ChatGPT*'
  id: totrans-515
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT的限制与挑战*'
- en: Lack of standard referencing guide for ChatGPT, gives incorrect information,
    lack of response relevance, occurrences of refusal or reprimand by ChatGPT, gender
    bias in pronoun usage, need to fact-check
  id: totrans-516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT缺乏标准引用指南，提供错误信息，缺乏响应的相关性，ChatGPT出现拒绝或斥责的情况，代词使用中的性别偏见，需要事实核查
- en: '*Human-Like Interactions with ChatGPT*'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*与ChatGPT的人类似交互*'
- en: Interactivity of communication, perceived human-like interactions with ChatGPT,
    people perceive ChatGPT as providing opinions rather than predictions, unquestioning
    trust in information
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交流的互动性，与ChatGPT感知到的人类似交互，人们认为ChatGPT提供的是观点而不是预测，对信息的不加质疑的信任
- en: '*Personal Aide/Tutor Role of ChatGPT*'
  id: totrans-519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT的个人助手/导师角色*'
- en: Enriches the user's ideas, speeds up the process, reduces cognitive load, useful
    in other areas of life, ability to translate, reviews work and gives suggestions
    for improvement, text register modification, imparts specific knowledge, skills,
    concepts to users
  id: totrans-520
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 丰富了用户的思想，加快了过程，减少了认知负荷，在生活的其他领域也很有用，具有翻译能力，审查工作并提出改进建议，文本语域修改，传授特定知识、技能和概念给用户
- en: '*Impact on User Learning*'
  id: totrans-521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*对用户学习的影响*'
- en: ChatGPT demonstrates competency in completing assigned student tasks, inhibits
    user learning process, ChatGPT unable to perform assigned student tasks
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT在完成分配的学生任务方面表现出能力，抑制了用户的学习过程，ChatGPT无法执行分配的学生任务
- en: '*Limitations of a Generalised Bot for Educational Context*'
  id: totrans-523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*通用教育场景中聊天机器人的局限性*'
- en: Gaps in knowledge, disciplinary context limitations, culturally specific database
  id: totrans-524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识差距，学科背景限制，文化特定的数据库
- en: 'To facilitate the mapping and analysis of the themes, the researchers utilised
    a Google Sheet for each theme, incorporating the following sections: code, code
    definition, examples from the extant literature, examples from the literature
    review and supporting examples from the data. This comprehensive framework allowed
    for a systematic examination of each of the themes in relation to our research
    questions. From this, the following interconnectivity of the themes was derived
    ([Fig. 1](#978-1-83797-647-820241005.xhtml#fig1)).'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于对主题进行映射和分析，研究人员为每个主题使用了一个Google表格，包括以下部分：代码、代码定义、现有文献中的例子、文献综述中的例子以及数据中的支持性例子。这个综合框架允许对每个主题与我们的研究问题进行系统性的考察。据此，得出了以下主题之间的相互关联性([图1](#978-1-83797-647-820241005.xhtml#fig1))。
- en: '![image](images/f05-01.jpg)'
  id: totrans-526
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/f05-01.jpg)'
- en: Fig. 1.Interconnectivity of Themes.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.主题之间的互连性。
- en: Throughout this study, obtaining informed consent from all participants, including
    interviewees, instructors, and students, was a top priority. Participants were
    fully informed about the research purpose, procedures, potential risks, and benefits,
    with the freedom to decline or withdraw without consequences. Our communication
    with participants remained transparent and clear, ensuring data privacy and confidentiality.
    Ethical review and approval were obtained from the university's ethics committee
    to comply with guidelines and protect participants' rights. To mitigate bias,
    the researcher remained mindful of personal biases during data collection and
    analysis. However, during the research process, an ethical issue emerged concerning
    consent related to the research diaries, which served as a hidden form of data
    collection. The researcher began to perceive every interaction and event as potential
    data, while participants may not have viewed them in the same light (Hammersley
    & Atkinson, 1995). This raised concerns about ensuring proper consent for the
    use of information gathered through such situations. As, on most occasions, the
    researcher did not recognise the relevance of these incidents to the investigation
    until after they occurred, this meant the researcher had not explicitly communicated
    to participants that the content of the interactions could be used in the research.
    Therefore, to protect the confidentiality of the individuals involved and respect
    their privacy, the researcher took measures to provide anonymity when referencing
    extracts from the research diaries in the writing.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个研究中，从所有参与者（包括受访者、讲师和学生）那里获得知情同意是一个首要任务。参与者被充分告知研究目的、程序、潜在风险和收益，并且有权拒绝或撤回同意而不受任何后果。我们与参与者的沟通保持透明和清晰，确保数据隐私和保密。我们获得了大学伦理委员会的伦理审查和批准，以符合指南并保护参与者的权利。为了减轻偏见，研究者在数据收集和分析过程中保持对个人偏见的警觉。然而，在研究过程中，关于研究日记的同意问题出现了一个伦理问题，这些日记作为一种隐蔽的数据收集形式。研究者开始将每一次互动和事件视为潜在的数据，而参与者可能不会以同样的方式看待它们（Hammersley
    & Atkinson, 1995）。这引发了关于确保通过这种情况收集到的信息使用适当同意的担忧。由于在大多数情况下，研究者直到事件发生后才认识到这些事件与调查的相关性，这意味着研究者没有明确告知参与者互动内容可能被用于研究。因此，为了保护涉及个人的隐私并尊重他们的隐私，研究者在撰写时引用研究日记摘录时采取了匿名措施。
- en: In the next chapter, we present our findings and interpretations of the data,
    encompassing a thorough analysis and derivation of insights from our outcomes.
    This chapter systematically provides an overview of the collected data, aligning
    it with the extant literature and the literature review. Subsequently, we interpret
    these findings within the framework of our theoretical approach. Employing this
    information, we re-examine our research questions, specifically exploring the
    potential impacts of ChatGPT on students, instructors, and higher education institutions.
    Through this process, we convert our raw data into valuable insights, enriching
    our understanding of the subject.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们展示了我们的发现和对数据的解释，包括对结果进行彻底分析和推导见解。本章系统地概述了收集到的数据，将其与现有文献和文献综述相联系。随后，我们在我们的理论框架内对这些发现进行解释。利用这些信息，我们重新审视我们的研究问题，特别是探讨ChatGPT对学生、讲师和高等教育机构可能产生的影响。通过这个过程，我们将原始数据转化为有价值的见解，丰富了我们对主题的理解。
- en: Chapter 6
  id: totrans-530
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第六章
- en: Findings and Interpretation
  id: totrans-531
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发现与解释
- en: Input Quality and Output Effectiveness of ChatGPT
  id: totrans-532
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT的输入质量与输出效果
- en: The theme of ‘Input Quality and Output Effectiveness’ underscores the crucial
    role of input in determining the quality and effectiveness of ChatGPT's output.
    Large language models like ChatGPT can generate human-like text, but their outputs
    may not always align with human values due to their focus on predicting the next
    word rather than understanding broader context. This misalignment can result in
    challenges related to reliability and trust, such as a lack of helpfulness when
    the model fails to accurately comprehend and execute specific user instructions.
    In order to overcome this, users need to provide ChatGPT with a clear context,
    quality input and undergo multiple iterations to get the desired output. This
    was seen in the following ways.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: “输入质量与输出有效性”的主题强调了输入在决定ChatGPT输出质量和有效性中的关键作用。像ChatGPT这样的大型语言模型可以生成类似人类的文本，但它们的输出可能并不总是符合人类价值观，因为它们的重点是预测下一个单词，而不是理解更广泛的背景。这种不匹配可能导致与可靠性、信任相关的问题，例如当模型未能准确理解和执行特定用户指令时，可能会缺乏帮助性。为了克服这一点，用户需要向ChatGPT提供清晰的背景、高质量输入，并经历多次迭代以获得期望的输出。这可以从以下方面看到。
- en: Need for Giving a Clear Context
  id: totrans-534
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 需要提供清晰背景的原因
- en: According to the researcher (the principal investigator in her research role),
    ‘You have to input your own ideas, personal experiences, and reflections first
    in order for ChatGPT to come up with research questions relevant to your situation’
    (RFD). The instructor (the principal investigator in her teaching role) noted
    that ‘ChatGPT helps write enduring understandings. These can be tricky to word.
    By getting it to define enduring understandings first and then telling it about
    your course, it can help with the wording’ (TFD). Similarly, when it comes to
    writing a course aim, the instructor highlighted the need to input clear information
    about students, department, and institution to receive accurate suggestions from
    ChatGPT (TFD). The instructor also emphasised the importance of providing a lot
    of specific information about the course and students to obtain useful learning
    outcomes (TFD). Additionally, ChatGPT's ability to generate suggestions for lesson
    plans depended on knowing the context of the class (TFD). Furthermore, inputting
    the text or video text from the pre-class activity allowed ChatGPT to provide
    suggestions for pre-class quizzes, provided that the teacher specified the type
    of quiz questions they wanted (TFD).
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 根据研究人员（在其研究角色中的主要研究员），“你必须首先输入自己的想法、个人经验和反思，这样ChatGPT才能提出与你情况相关的科研问题”（RFD）。讲师（在其教学角色中的主要研究员）指出，“ChatGPT有助于撰写持久理解。这些内容措辞可能有些棘手。通过先让它定义持久理解，然后告诉它你的课程内容，它可以帮助你措辞”（TFD）。同样，在撰写课程目标时，讲师强调了输入关于学生、系和机构的清晰信息以获得ChatGPT准确建议的必要性（TFD）。讲师还强调了提供大量关于课程和学生的具体信息以获得有用学习成果的重要性（TFD）。此外，ChatGPT生成课程计划建议的能力取决于了解课程背景（TFD）。此外，输入课前活动的文本或视频文本，只要教师指定了他们想要的测验问题类型，ChatGPT就能提供课前测验的建议（TFD）。
- en: The literature review supports the finding that providing a clear context is
    crucial when interacting with ChatGPT. Mhlanga (2023) highlights that ChatGPT,
    being a machine, lacks the ability to comprehend contextual factors such as culture,
    background and experiences in the same way as human educators. This aligns with
    the fact that ChatGPT's outputs may not align with human values because its focus
    is on predicting the next word rather than understanding the broader context.
    Similarly, Alshater (2022) observes that language models like ChatGPT can generate
    unrelated or generic responses due to their lack of contextual understanding.
    In addition, Sullivan et al.’s (2023) study highlighted the limitations of ChatGPT's
    contextual understanding, as evidenced by the generation of unrelated or generic
    responses.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 文献综述支持了这样一个发现：在与ChatGPT互动时，提供清晰的背景至关重要。Mhlanga（2023）强调，作为机器，ChatGPT缺乏像人类教育者那样理解文化、背景和经验等情境因素的能力。这与ChatGPT的输出可能不符合人类价值观的事实相一致，因为它的重点是预测下一个单词，而不是理解更广泛的背景。同样，Alshater（2022）观察到，由于缺乏情境理解，像ChatGPT这样的语言模型可能会生成无关或通用的响应。此外，Sullivan等人（2023）的研究强调了ChatGPT情境理解的局限性，这可以从生成无关或通用的响应中看出。
- en: Looking at the importance of giving a clear context through the lens of Christensen's
    Theory of Jobs to be Done highlights the importance of users understanding their
    specific needs and desired outcomes when hiring ChatGPT. Users must clearly articulate
    their requirements and objectives in order to effectively utilise ChatGPT's capabilities.
    This involves providing a clear and specific context for ChatGPT to generate accurate
    and relevant responses. Bourdieu's social theory sheds light on the power dynamics
    and social structures that influence the interaction with ChatGPT. It emphasises
    the need to consider linguistic norms, cultural capital and social dynamics that
    shape communication with the artificial intelligence (AI) system. Instructors
    must navigate these factors when engaging with ChatGPT to ensure meaningful and
    appropriate responses. Heidegger's Theory on Being highlights the distinction
    between ChatGPT's predictive nature and the broader contextual understanding of
    human educators. Users must recognise that ChatGPT's focus is on predicting the
    next word rather than comprehending the broader context.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 从克里斯滕森的“待完成工作”理论的角度来看，明确提供背景的重要性，突出了用户在雇佣ChatGPT时理解他们具体需求和期望结果的重要性。用户必须清楚地阐述他们的需求和目标，以便有效地利用ChatGPT的功能。这涉及到为ChatGPT提供清晰和具体的环境，以便生成准确和相关的响应。布迪厄的社会理论揭示了影响与ChatGPT互动的权力动态和社会结构。它强调了考虑语言规范、文化资本和社会动态的必要性，这些因素塑造了与人工智能（AI）系统的沟通。教师在与ChatGPT互动时必须应对这些因素，以确保有意义的和适当的响应。海德格尔的存在理论突出了ChatGPT的预测性质与人类教育者的更广泛背景理解之间的区别。用户必须认识到ChatGPT的焦点在于预测下一个单词，而不是理解更广泛的背景。
- en: Input Determines Output Quality
  id: totrans-538
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 输入决定输出质量
- en: When students were asked to create a SWOT analysis regarding ChatGPT and the
    law, the quality of the response varied based on the quality of the input data.
    As observed by the instructor, ‘If they gave it good quality data, it created
    an effective chart; however, if they just asked it to do it for them, they did
    not end up with such a good result’ (TFD). This was also seen by a teacher in
    a workshop who commented, ‘When you give the right prompts, it gives you the lesson
    plan immediately. You don't really need to do anything’ (SYFD). ChatGPT also showcased
    its effectiveness in generating research ideas and suggesting methodologies and
    codes, contingent upon the user providing pertinent and precise information. According
    to the researcher, ‘ChatGPT was good for generating ideas for my research, but
    only if relevant and accurate information about the study was input first’ (RFD).
    The researcher also mentioned, ‘It was relatively easy for me to identify a research
    methodology based on previous experience and existing knowledge. However, asking
    ChatGPT for suggestions led to a broader array of suggestions that enriched my
    choice. But, this only works well if you have input your precise research problem
    and questions’ (RFD). Additionally, ChatGPT's capability to suggest codes from
    textual data was noted by the researcher, who stated, ‘ChatGPT can come up with
    suggested codes from textual data rather well, as long as the textual data is
    well-written in the first place’ (RFD). This sentiment was echoed by a teacher's
    remarks during a workshop, ‘The questions designed do not always meet the prompts
    or the specifications we provided if they are not mentioned precisely’ (SYFD).
    ChatGPT also proved useful for coming up with rubrics for evaluation, but again,
    this was dependent on the clarity of input given by the user. The instructor mentioned,
    ‘Once an assessment has been written, ChatGPT can easily come up with a suggested
    rubric for evaluation, but only if the assessment task is written precisely’ (TFD).
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 当学生被要求对ChatGPT和法律进行SWOT分析时，响应的质量取决于输入数据的质量。正如指导教师观察到的，“如果他们提供了高质量的数据，它就能创建一个有效的图表；然而，如果他们只是要求它为他们做，他们最终并没有得到那么好的结果”（TFD）。在研讨会上，一位教师也注意到了这一点，他评论说，“当你给出正确的提示时，它会立即给出教学计划。你实际上真的不需要做任何事情”（SYFD）。ChatGPT也展示了其生成研究想法、建议方法和代码的有效性，前提是用户提供了相关且准确的信息。根据研究人员的说法，“ChatGPT对我的研究想法很有帮助，但前提是首先输入了关于研究的相关和准确信息”（RFD）。研究人员还提到，“根据以往的经验和现有知识，我相对容易地确定了一种研究方法。然而，向ChatGPT寻求建议导致了一组更广泛的建议，这丰富了我的选择。但，这仅在你输入了精确的研究问题和问题时才有效”（RFD）。此外，研究人员还注意到了ChatGPT从文本数据中建议代码的能力，他表示，“只要文本数据一开始就写得很好，ChatGPT就能很好地从文本数据中提出建议代码”（RFD）。一位教师在研讨会上也表达了同样的观点，“如果它们没有精确地提到，设计的问题并不总是符合我们提供的提示或规格”（SYFD）。ChatGPT在提出评估标准方面也证明是有用的，但同样，这取决于用户提供的输入的清晰度。指导教师提到，“一旦写出了评估，ChatGPT可以轻松地提出一个建议的评估标准，但前提是评估任务必须写得精确”（TFD）。
- en: The need for quality input into ChatGPT was also supported by the literature.
    In their 2023 research, Firaina and Sulisworo emphasise the significance of selecting
    relevant commands to determine the usefulness of the obtained information. This
    aligns with our understanding that the quality of input plays a critical role
    in achieving desired outcomes when working with ChatGPT. Therefore, focusing on
    improving quality of input is crucial for obtaining optimal results and maximising
    the value derived from ChatGPT.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 质量输入对ChatGPT的需求也得到了文献的支持。在他们的2023年研究中，Firaina和Sulisworo强调了选择相关命令以确定获取信息的有用性的重要性。这与我们理解的观点相符，即输入质量在利用ChatGPT实现预期结果时起着关键作用。因此，关注提高输入质量对于获得最佳结果和最大化从ChatGPT中获取的价值至关重要。
- en: Requires Multiple Iterations to Get What You Want
  id: totrans-541
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 需要多次迭代才能得到你想要的结果
- en: 'Users often found it necessary to refine their prompts or requests for satisfactory
    results. The researcher shared their experience, stating, ‘I made several revisions
    with ChatGPT before achieving the desired outcome’ (RFD). Similarly, a student
    reflected on their use of ChatGPT, noting the need for multiple revisions when
    creating the closing argument for the Unabomber case (SFD). These instances demonstrate
    the iterative nature of the process, where multiple iterations and modifications
    were crucial to achieving the desired outcomes. The importance of refining prompts
    and engaging in multiple interactions is further highlighted by the researcher''s
    comment: ‘If you are not happy with the wording, you can provide ChatGPT with
    prompts until it generates better-worded questions’ (RFD). Echoing this sentiment,
    a teacher in a workshop said, ‘It is important to review and regenerate responses
    until they align with your needs’ (SYFD). Additionally, the researcher mentioned
    how ChatGPT''s capabilities can be leveraged in an iterative manner for refining
    codes and themes: ‘It can… group the codes and suggest themes. This can be done
    iteratively until you are happy with the outcome’ (RFD). These examples emphasise
    the iterative nature of working with ChatGPT, where multiple iterations, prompts
    and revisions are often necessary to fine-tune the generated output and meet the
    user''s specific needs and expectations.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 用户通常发现有必要细化他们的提示或请求以获得满意的结果。研究人员分享了他们的经验，表示：“我在使用ChatGPT之前进行了多次修订，才达到了预期的结果”（RFD）。同样，一名学生在反思他们使用ChatGPT时指出，在为Unabomber案件制作总结陈词时需要多次修订（SFD）。这些例子展示了过程的迭代性，多次迭代和修改对于实现预期结果至关重要。研究人员还进一步强调了细化提示和参与多次互动的重要性：“如果你对措辞不满意，你可以向ChatGPT提供提示，直到它生成更好的措辞的问题”（RFD）。在研讨会上的一位教师也表达了同样的观点：“重要的是要审查和重新生成回应，直到它们符合你的需求”（SYFD）。此外，研究人员还提到如何迭代地利用ChatGPT的能力来优化代码和主题：“它可以……将代码分组并建议主题。这可以通过迭代进行，直到你对结果满意”（RFD）。这些例子强调了与ChatGPT合作时的迭代性，多次迭代、提示和修订通常对于微调生成的输出并满足用户的特定需求和期望是必要的。
- en: This finding is supported by Sullivan et al.’s (2023) study, which emphasised
    the value of the iterative refinement process in working with ChatGPT, underscoring
    the importance of developing information literacy skills to successfully engage
    with ChatGPT and other AI tools.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 这一发现得到了Sullivan等人（2023）的研究支持，该研究强调了在处理ChatGPT时迭代优化过程的价值，强调了发展信息素养技能以成功与ChatGPT和其他AI工具互动的重要性。
- en: The iterative nature of engagement and the importance of context and interpretation
    align with Heidegger's concept of ‘being-in-the-world’. Achieving the desired
    outcome from ChatGPT may require multiple iterations and an ongoing process of
    refining our understanding of both the technology and our own existence. The existential
    engagement with ChatGPT involves adapting and refining our understanding to foster
    desired outcomes.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 互动的迭代性质以及背景和解释的重要性与海德格尔的“在世界中存在”的概念相一致。从ChatGPT中获得预期结果可能需要多次迭代和持续优化我们对技术和自身存在理解的过程。与ChatGPT的生存性互动涉及调整和优化我们的理解以促进预期结果。
- en: How ChatGPT May Affect the Roles of Stakeholders
  id: totrans-545
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT可能如何影响利益相关者的角色
- en: From our analysis, we believe the role of the student will change in the following
    ways.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们的分析来看，学生的角色将发生以下变化。
- en: The student's role will involve providing clear and specific input to ChatGPT
    to ensure accurate and relevant responses. They will also need to understand the
    limitations of ChatGPT's output and critically evaluate its responses to ensure
    alignment with their own goals. Moreover, students will need to develop information
    literacy skills and engage in iterative refinement, continuously refining their
    input to optimise the effectiveness of ChatGPT's responses.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的角色将包括向ChatGPT提供清晰和具体的信息，以确保得到准确和相关的回应。他们还需要理解ChatGPT输出的局限性，并批判性地评估其回应，以确保与自己的目标保持一致。此外，学生需要培养信息素养技能，并参与迭代优化，不断改进他们的输入以优化ChatGPT回应的有效性。
- en: Regarding the role of the instructor, instructors can leverage ChatGPT to assist
    with tasks such as writing enduring understandings, course aims, learning outcomes,
    lesson plans and pre-class quizzes. However, the effectiveness of ChatGPT in these
    tasks will depend on the provision of specific information. Instructors will need
    to input clear details about the course, students and institution to receive accurate
    suggestions from ChatGPT. They will also need to consider the context of the class
    and provide relevant information for ChatGPT to generate valuable suggestions.
    Additionally, instructors will play a crucial role in guiding and refining the
    use of ChatGPT by students. They will need to ensure that students understand
    the importance of input quality and help them navigate the iterative nature of
    working with ChatGPT. Instructors will also contribute their expertise in evaluating
    and contextualising ChatGPT's output, bridging the gap between AI-generated responses
    and the creativity, originality and hands-on opportunities that human teachers
    bring to the educational experience.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 关于讲师的角色，讲师可以利用ChatGPT协助完成诸如撰写持久理解、课程目标、学习成果、教学计划和课前测验等任务。然而，ChatGPT在这些任务中的有效性将取决于提供具体信息。讲师需要输入关于课程、学生和机构的清晰细节，以便从ChatGPT那里获得准确的建议。他们还需要考虑课堂的背景，并为ChatGPT提供相关信息，以便生成有价值的建议。此外，讲师在指导学生使用ChatGPT并完善其使用方法方面将发挥关键作用。他们需要确保学生理解输入质量的重要性，并帮助他们了解与ChatGPT合作的工作迭代性质。讲师还将贡献他们的专业知识，评估和情境化ChatGPT的输出，弥合人工智能生成的回答与人类教师为教育体验带来的创造力、原创性和实践机会之间的差距。
- en: Institutions of higher education will need to provide the necessary resources
    and support for instructors and students to effectively use ChatGPT. This may
    include offering training programmes on how to leverage ChatGPT in educational
    tasks and promoting information literacy skills development. Moreover, institutions
    must foster a culture of continuous learning and adaptation, encouraging instructors
    and students to embrace the iterative refinement process when working with ChatGPT.
    By recognising the multifaceted implications of AI in education, institutions
    can actively shape the integration of ChatGPT and other AI tools to align with
    their educational goals and values.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 高等教育机构需要为讲师和学生提供必要的资源和支持，以有效使用ChatGPT。这可能包括提供如何利用ChatGPT进行教育任务的培训计划，以及促进信息素养技能的发展。此外，机构必须培养持续学习和适应的文化，鼓励讲师和学生接受与ChatGPT合作时的迭代优化过程。通过认识到人工智能在教育中的多方面影响，机构可以积极塑造ChatGPT和其他AI工具的整合，以符合其教育目标和价值观。
- en: In summary, our analysis reveals key insights on ChatGPT's impact, emphasising
    the significance of clear input, iterative refinement, contextual awareness and
    user engagement. Ensuring high-quality input by training both students and instructors
    to effectively use ChatGPT in academic endeavours will maximise its benefits in
    education.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们的分析揭示了关于ChatGPT影响的关键见解，强调了清晰输入、迭代优化、情境意识和用户参与的重要性。通过培训学生和讲师有效利用ChatGPT进行学术活动，确保高质量输入，将最大化其在教育中的益处。
- en: Limitations and Challenges of ChatGPT
  id: totrans-551
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT的局限性和挑战
- en: ChatGPT undoubtedly brings numerous benefits and opportunities to users in various
    domains. However, it is essential to recognise that ChatGPT is not without its
    limitations and challenges. In this theme, we investigate the potential shortcomings
    and difficulties that users may encounter when interacting with ChatGPT, shedding
    light on the critical areas where considerations are necessary.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT无疑为各个领域的用户带来了许多好处和机遇。然而，我们必须认识到ChatGPT并非没有其局限性和挑战。在这个主题下，我们调查了用户在与ChatGPT互动时可能遇到的潜在缺陷和困难，揭示了需要考虑的关键领域。
- en: Lack of Standard Referencing Guide for ChatGPT
  id: totrans-553
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT缺乏标准参考指南
- en: 'Users in academic contexts may encounter a significant challenge due to the
    lack of a standard referencing guide for ChatGPT. This issue encompasses two crucial
    areas: the absence of references provided by ChatGPT for the sources it uses and
    the lack of established guidelines for users to reference ChatGPT-generated information.
    As we have discussed, the reliance of generative AI on data from undisclosed sources
    raises concerns regarding copyright infringement and fair compensation for creators.
    Altman''s acknowledgement of these concerns without providing definitive answers
    suggests that ChatGPT may not adopt a referencing model for its sources. Consequently,
    users face the difficulty of determining the origins of ChatGPT''s information
    and referencing it appropriately. Data examples highlight these challenges: ‘When
    we asked it, ChatGPT gave some suggestions for how we should reference it, but
    there is currently no standard referencing guide for using ChatGPT’ (TFD); ‘If
    the students are getting information directly from ChatGPT, they are unable to
    reference the source as we don''t know where the data has come from’ (TFD); ‘ChatGPT
    hasn''t done a very good job of what evidence to use and how’ (SFD); ‘The system
    told me that it cannot do the references itself and that I should look for expert
    opinions and academic papers on this subject. So therefore I checked what ChatGPT
    said through academic papers on the internet… I think it would be much better
    if the system itself indicated where it gets the information it uses’ (SFD). Furthermore,
    without clear guidelines and standards in place, users face challenges in citing
    and referencing information derived from ChatGPT. The absence of a standard referencing
    guide raises concerns about the transparency and traceability of sources used
    in academic and research outputs incorporating ChatGPT-generated content.'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 在学术环境中，由于缺乏ChatGPT的标准引用指南，用户可能会遇到重大挑战。这个问题涉及两个关键领域：ChatGPT未提供其使用来源的引用，以及缺乏为用户制定引用ChatGPT生成信息的既定准则。正如我们讨论的那样，生成式AI依赖于未公开来源的数据，这引发了关于版权侵权和创作者公平补偿的担忧。Altman承认了这些担忧，但没有提供明确的答案，这表明ChatGPT可能不会采用其来源的引用模型。因此，用户面临确定ChatGPT信息来源和适当引用的困难。数据示例突显了这些挑战：“当我们询问它时，ChatGPT给出了一些关于如何引用它的建议，但目前还没有使用ChatGPT的标准引用指南”（TFD）；“如果学生直接从ChatGPT获取信息，他们无法引用来源，因为我们不知道数据是从哪里来的”（TFD）；“ChatGPT在确定使用什么证据以及如何使用证据方面做得并不好”（SFD）；“系统告诉我它无法自己进行引用，我应该寻找关于这个主题的专家意见和学术论文。因此，我检查了通过互联网上的学术论文中ChatGPT所说的内容……我认为如果系统本身指明它使用的信息来源会更好”（SFD）。此外，在没有明确的指南和标准的情况下，用户在引用和引用从ChatGPT获取的信息时面临挑战。缺乏标准引用指南引发了关于在包含ChatGPT生成内容的学术和研究输出中使用的来源透明性和可追溯性的担忧。
- en: To address this challenge, the instructor in this case study collaborated with
    Dr Thomas Menella, a senior research fellow for the Academy of Active Learning
    Arts and Sciences, to devise a referencing system for students for the spring
    2023 semester. The students were instructed to quote all content from ChatGPT
    and provide in-text citations with chronological numbering, like ‘Lorem ipsum
    dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt
    ut labore et dolore magna aliqua’ (ChatGPT, 1). Failure to comply would be considered
    plagiarism. Additionally, they were required to create a separate ‘ChatGPT Citations’
    page after the references section, including the date of ChatGPT content generation,
    corresponding prompts used and at least one source for fact-checking validation.
    The students were warned that ChatGPT-generated content couldn't be deemed accurate
    until verified, and they were accountable for thoroughly fact-checking the content
    they included in their assignments, regardless of authorship. So what was the
    feedback on this system? The instructor said, ‘I asked my students to reference
    when they have used ChatGPT following the system Tom and I developed. However,
    it is not ideal, a better referencing system is required’ (TFD). Additional comments
    were, ‘I think the referencing system is not described well in the document. It
    should be more clear how I should do my referencing. I took most of my time since
    I didn't understand for a long time’ (SFD); ‘More guidance and examples on how
    to use it properly and consistently would help’ (SFD); ‘The document helped me,
    but it was very detailed and this caused confusion in my opinion, the document
    should be more general and details that cause confusion should be removed’ (SFD);
    ‘It was a bit difficult and complicated to reference ChatGPT. It can be made simpler’
    (SFD). In summary, the students requested clearer instructions, more guidance
    and a simpler approach to referencing to avoid confusion.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对这一挑战，本案例研究中的讲师与托马斯·门内拉博士合作，他是活跃学习艺术与科学学院的高级研究员，为2023年春季学期的学生设计了一套引用系统。学生被要求引用所有来自ChatGPT的内容，并使用按时间顺序编号的文内引用，例如‘Lorem
    ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt
    ut labore et dolore magna aliqua’（ChatGPT，1）。不遵守这一规定将被视为剽窃。此外，他们还被要求在参考文献部分之后创建一个单独的“ChatGPT
    引用”页面，包括ChatGPT内容生成的日期、相应的提示以及至少一个用于事实核查验证的来源。学生被告知，ChatGPT生成的内容在未经验证之前不能被视为准确，他们需要对他们在作业中包含的内容进行彻底的事实核查，无论作者身份如何。那么这个系统的反馈如何呢？讲师说：“我要求我的学生按照我和汤姆开发的系统引用他们使用的ChatGPT。然而，这并不理想，需要更好的引用系统”（TFD）。其他评论包括：“我认为文档中对引用系统的描述不够好。应该更清楚地说明我应该如何进行引用。我花了大部分时间，因为我很长时间都不理解”（SFD）；“需要更多关于如何正确和一致使用它的指导和示例”（SFD）；“文档对我有帮助，但它非常详细，在我看来这造成了困惑，文档应该更概括，应该删除引起困惑的细节”（SFD）；“引用ChatGPT有点困难和复杂，可以使其更简单”（SFD）。总之，学生要求更清晰的指示、更多指导和更简单的引用方法，以避免混淆。
- en: These challenges were also seen in the literature. Neumann et al. (2023) highlight
    that when integrating ChatGPT into higher education, particularly in scientific
    writing tasks, sections that involve existing knowledge can pose difficulties.
    This is because ChatGPT may generate text that references non-existent literature
    or fails to provide accurate and reliable references. Rudolph et al. (2023) also
    raise this issue, pointing out that ChatGPT has a limitation in providing sources
    and quotations, which is essential for academic assignments. However, they note
    that there are promising developments to address this limitation, such as the
    prototype WebGPT, which is being developed with web browsing capabilities, allowing
    it to access recent information, verified sources and quotations. Additionally,
    they point out that AI research assistants like Elicit offer assistance in finding
    academic articles and providing summaries from a vast scholarly paper repository.
    They believe these advancements will enhance the quality and credibility of academic
    work by incorporating up-to-date information and reliable sources (Rudolph et
    al., 2023).
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 这些挑战也在文献中有所体现。Neumann等人（2023）强调，当将ChatGPT整合到高等教育中，尤其是在科学写作任务中时，涉及现有知识的部分可能会带来困难。这是因为ChatGPT可能会生成引用不存在文献或未能提供准确可靠引用的文本。Rudolph等人（2023）也提出了这个问题，指出ChatGPT在提供来源和引用方面存在局限性，这对于学术作业是必不可少的。然而，他们指出，有一些有希望的发展可以解决这一局限性，例如正在开发的具有网络浏览能力的原型WebGPT，它能够访问最新信息、经过验证的来源和引用。此外，他们指出，像Elicit这样的AI研究助手可以帮助寻找学术文章，并从庞大的学术论文库中提供摘要。他们认为，通过结合最新信息和可靠来源，这些进步将提高学术工作的质量和可信度（Rudolph等人，2023）。
- en: Through Christensen's lens, users in academic contexts are trying to ‘hire’
    ChatGPT to fulfil the job of generating accurate and reliable information for
    their academic work. However, due to the lack of a standard referencing guide,
    ChatGPT may not be effectively fulfilling this job. Users encounter difficulties
    in determining the origins of ChatGPT's information and referencing it appropriately,
    hindering their ability to rely on ChatGPT as a trustworthy source. This unfulfilled
    job highlights the need for a solution that provides clear guidelines and standards
    for referencing ChatGPT-generated information, enabling users to confidently incorporate
    its content into their academic work. From a Bourdieusian perspective, the absence
    of a standard referencing guide for ChatGPT reflects the power dynamics and struggles
    over legitimacy in the academic field. The lack of clear guidelines puts users
    at a disadvantage, as they are unable to conform to the established norms of referencing
    and may face criticism for not adhering to the traditional referencing practices.
    This situation reinforces the dominant position of established sources and conventional
    referencing systems, which may hinder the recognition and acceptance of ChatGPT-generated
    information within academic discourse. ChatGPT relies on surveillance data from
    undisclosed sources, which raises concerns about copyright infringement and fair
    compensation for creators. The absence of clear guidelines for referencing ChatGPT-generated
    content further exacerbates the commodification of information and the devaluation
    of labour in the production of academic knowledge. Users are left grappling with
    the challenge of appropriately citing and referencing information derived from
    ChatGPT while the sources remain undisclosed and uncompensated. From Heidegger's
    perspective, the lack of a standard referencing guide can be seen as a consequence
    of the instrumentalisation of technology in the academic context. The focus on
    efficiency and productivity in using ChatGPT as a tool for generating content
    overlooks the essential nature of referencing as a means of acknowledging the
    origins and authenticity of knowledge. The absence of clear guidelines reflects
    a reduction of referencing to a technical task, neglecting its ontological significance
    in preserving the integrity and transparency of academic work.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，学术环境中的用户试图“雇佣”ChatGPT来完成为他们的学术工作生成准确和可靠信息的工作。然而，由于缺乏标准的引用指南，ChatGPT可能无法有效地完成这项工作。用户在确定ChatGPT信息的来源并适当引用时遇到困难，阻碍了他们依赖ChatGPT作为可信来源的能力。这项未完成的工作突显了提供明确指南和标准以引用ChatGPT生成信息的必要性，使用户能够自信地将其内容纳入他们的学术工作中。从布尔迪厄的视角来看，ChatGPT缺乏标准的引用指南反映了学术界中的权力动态和合法性斗争。缺乏明确的指南使用户处于不利地位，因为他们无法遵守既定的引用规范，并可能因不遵循传统引用实践而受到批评。这种情况加强了既定来源和传统引用系统的主导地位，这可能会阻碍ChatGPT生成信息在学术话语中的认可和接受。ChatGPT依赖于来自未公开来源的监控数据，这引发了关于版权侵权和创作者公平补偿的担忧。缺乏对引用ChatGPT生成内容的明确指南进一步加剧了信息的商品化和学术知识生产中劳动力的贬值。用户在来源未公开且未获得补偿的情况下，面临着适当引用和引用来自ChatGPT的信息的挑战。从海德格尔的视角来看，缺乏标准的引用指南可以被视为在学术环境中技术工具化的后果。将ChatGPT作为生成内容工具的效率和生产力的关注，忽视了引用作为承认知识起源和真实性的本质。缺乏明确的指南反映了将引用简化为技术任务，忽视了其在维护学术工作的完整性和透明度中的本体论意义。
- en: Gives Incorrect Information/Lack of Response Relevance
  id: totrans-558
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 提供错误信息/缺乏响应相关性
- en: 'The extant literature highlighted that ChatGPT may generate inaccurate information,
    which is due to limitations in its capabilities and training techniques. Examples
    from the data illustrate this. ‘Sometimes ChatGPT cites sources that are not there’
    (SFD); ‘What I have found is that it is really bad with giving credible sources.
    They are often non-existent’ (SFD); ‘When asked about transgender pronouns in
    Turkey, ChatGPT said that there was an issue with transgender pronouns in Turkey.
    However, this information was completely wrong. There is no gender in pronouns
    in Turkish’ (TFD); ‘At a conference, a professor from a university was giving
    a presentation about a new initiative that was about to be released in 2023\.
    One of the participants on my table used ChatGPT to look up information about
    the university and the initiative and was incorrectly given information that the
    initiative started in 2019’ (SYFD). Other examples are as follows: ‘It made suggestions
    for future improvements and research directions, but I don''t think it''s relevant
    to my project because I don''t think my project should mention future developments’
    (SFD); as commented on by a teacher in a workshop, ‘What ChatGPT prepares might
    not be what you want or may not be relevant to your students'' needs and interests’
    (SYFD); ‘ChatGPT generated jokes, but the jokes weren''t particularly funny or
    didn''t seem to make much sense’ (SFD); ‘Sometimes it gives answers that are not
    quite related to the topic you are asking about’ (SFD).'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 现有的文献指出，ChatGPT可能会生成不准确的信息，这是由于其能力和训练技术的局限性所致。数据中的例子说明了这一点。“有时ChatGPT引用了不存在的来源”（SFD）；“我发现它真的很擅长提供可信的来源。它们通常是不存在的”（SFD）；“当被问及土耳其的跨性别代词时，ChatGPT表示土耳其存在跨性别代词的问题。然而，这个信息是完全错误的。土耳其的代词中没有性别”（TFD）；“在一次会议上，一位大学教授正在介绍一个即将于2023年发布的新的倡议。我桌上的一位参与者使用ChatGPT查找有关该大学和该倡议的信息，并被错误地告知该倡议始于2019年”（SYFD）。其他例子如下：“它提出了未来改进和研究方向的建议，但我不认为这与我的项目相关，因为我认为我的项目不应该提及未来的发展”（SFD）；正如研讨会上的教师所评论的，“ChatGPT准备的内容可能不是你想要的，或者可能与你学生的需求和兴趣不相关”（SYFD）；“ChatGPT生成了笑话，但这些笑话并不特别有趣，或者看起来没有太多意义”（SFD）；“有时它给出的答案与你要询问的主题不太相关”（SFD）。
- en: The literature also supports these concerns. Instructors, as highlighted in
    Rudolph et al.’s 2023 paper, raised significant concerns about ChatGPT's limitations
    in understanding and evaluating the relevance or accuracy of the information it
    produces, saying that while ChatGPT can generate text that appears passable, it
    lacks a deep comprehension of the subject matter. In addition, according to Tlili
    et al.'s (2023) study, participants generally found the dialogue quality and accuracy
    of information provided by ChatGPT to be satisfactory. However, they also acknowledged
    that ChatGPT is prone to occasional errors and limited information, noting that
    while responses from ChatGPT were generally considered reasonable and reliable,
    there were instances where misleading information was present alongside the answers.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 文献也支持这些担忧。正如鲁道夫等人（2023年）的论文中所强调的，教师们对ChatGPT在理解和评估其生成信息的相关性或准确性方面的局限性提出了重大关切，表示尽管ChatGPT可以生成看似可行的文本，但它缺乏对主题内容的深入理解。此外，根据Tlili等人（2023年）的研究，参与者普遍认为ChatGPT提供对话质量和信息准确性是令人满意的。然而，他们也承认ChatGPT容易偶尔出现错误和有限的信息，指出尽管ChatGPT的回答通常被认为合理且可靠，但有时也会伴随误导性信息。
- en: Through Christensen's lens, users of ChatGPT are hiring it to provide accurate
    and reliable information. However, the examples from the data demonstrate that
    ChatGPT often fails to fulfil this job, as it generates inaccurate information
    or lacks relevance in its response. This misalignment between users' expectations
    and the actual performance of ChatGPT indicates a gap in fulfilling the job it
    is hired for. Bourdieu's sociological perspective emphasises the role of social
    structures and cultural capital in shaping individuals' actions and preferences.
    In the case of ChatGPT, instructors, as highlighted by Rudolph et al. (2023),
    express concerns about its limitations in understanding and evaluating information.
    These concerns are influenced by the instructors' position as experts in the educational
    field, where accuracy and relevance of information are highly valued cultural
    capital. The instructors' scepticism towards ChatGPT's ability to fulfil this
    role reflects their reliance on established knowledge and expertise, and it is
    this concern that is reflected in their evaluation of the technology. Through
    a Marxist lens, the limitations and inaccuracies in ChatGPT's performance may
    be attributed to the inherent contradictions and dynamics of capitalist production,
    where the pursuit of efficiency and profit often takes precedence over ensuring
    comprehensive and accurate information. The potential biases and shortcomings
    of ChatGPT may be seen as by-products of the capitalist system's influence on
    technological development. Through Heidegger's lens, ChatGPT's ability to generate
    text that appears passable but lacks deep comprehension of the subject matter
    raises existential concerns. Heidegger argues that technology can lead to a mode
    of being characterised by instrumental rationality, where human activities become
    reduced to mere means to an end. In the context of education, ChatGPT's limitations
    in grasping and assessing information raise questions about its impact on the
    genuine understanding and critical thinking skills of students. It highlights
    the need to reflect on the role of technology in shaping educational practices
    and the nature of knowledge acquisition.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角来看，ChatGPT的用户是雇佣它来提供准确和可靠的信息。然而，数据中的例子表明，ChatGPT往往无法完成这项工作，因为它生成不准确的信息或其响应缺乏相关性。用户期望与ChatGPT实际表现之间的这种不匹配表明了在履行其被雇佣的工作方面的差距。布迪厄的社会学视角强调社会结构和文化资本在塑造个人行为和偏好中的作用。在ChatGPT的案例中，正如鲁道夫等人（2023年）所强调的，教师对其理解和评估信息的能力表示担忧。这些担忧受到教师在教育领域作为专家的地位的影响，在该领域，信息的准确性和相关性被高度珍视为文化资本。教师对ChatGPT履行这一角色的怀疑反映了他们对既定知识和专业知识的依赖，而这种担忧反映在他们对技术的评估中。从马克思主义的视角来看，ChatGPT表现中的局限性和不准确性可能归因于资本主义生产方式中固有的矛盾和动态，其中追求效率和利润往往优先于确保全面和准确的信息。ChatGPT的潜在偏见和不足可能被视为资本主义系统对技术发展影响的副产品。从海德格尔的视角来看，ChatGPT生成看似合理但缺乏对主题内容深入理解的文本的能力，引发了存在主义问题。海德格尔认为，技术可能导致一种以工具理性为特征的存在方式，其中人类活动被简化为达到目的的手段。在教育背景下，ChatGPT在掌握和评估信息方面的局限性引发了对其对学生真正理解和批判性思维技能影响的质疑。它强调了反思技术在塑造教育实践和知识获取性质中的作用的需要。
- en: Occurrences of Refusal or Reprimand by ChatGPT
  id: totrans-562
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT拒绝或斥责的实例
- en: Instances of refusal or reprimand by ChatGPT occur when the system declines
    to provide a response or admonishes the user for specific inputs or queries. This
    behaviour is likely a result of OpenAI's implementation of the Moderation API,
    the AI-based system aimed at detecting language violations and ensuring compliance
    with their content policy, which targets misogyny, racist remarks and false news.
    However, it is important to acknowledge that this system is not flawless. As mentioned
    in the extant literature, there have been instances where users have managed to
    bypass the moderation system, leading to the generation of inappropriate content
    by ChatGPT.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT出现拒绝或斥责的情况，通常发生在系统拒绝提供响应或因特定输入或查询而斥责用户时。这种行为可能是OpenAI实施的 Moderation API
    的结果，该API是一个基于AI的系统，旨在检测语言违规行为并确保遵守其内容政策，该政策针对性别歧视、种族言论和虚假新闻。然而，重要的是要承认这个系统并不完美。正如现有文献中提到的，有用户设法绕过了审查系统，导致ChatGPT生成了不适当的内容。
- en: Notably, our data indicate that ChatGPT may have been overly reliant on the
    moderation system, resulting in instances of refusal or even what could be interpreted
    as reprimand. For example, one student reported, ‘ChatGPT does not use slang words
    and does not respond when asked questions using slang words’ (SFD). The instructor
    said, ‘We were inputting terms that were used by the Unabomber and that ultimately
    led to him being identified, so they were an important part of the case. However,
    ChatGPT refused to discuss some of the slang items as they were considered derogatory
    and it even reprimanded us for asking about these terms’ (TFD). Similarly, when
    asking about the suicide of Kurt Cobain and certain words in one of the notes,
    the instructor noted, ‘ChatGPT refused to discuss the topic, deeming it inappropriate,
    and it also refused to discuss some of the words, such as “bitch,” considering
    them derogatory language’ (TFD). Furthermore, students in the study discovered
    that ChatGPT does not use swear words (SFD). Interestingly, occurrences of refusal
    or reprimand did not come up in the literature.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 显著的是，我们的数据显示，ChatGPT可能过度依赖审查系统，导致拒绝或甚至可以解释为斥责的实例。例如，一名学生报告说：“ChatGPT不使用俚语词汇，当被问及使用俚语词汇的问题时，它不会做出回应”（SFD）。教师说：“我们输入了被暗杀者使用的术语，这最终导致了他被识别出来，因此它们是案件的重要组成部分。然而，ChatGPT拒绝讨论一些俚语项目，因为它们被认为是侮辱性的，甚至因为询问这些术语而斥责了我们”（TFD）。同样，当询问Kurt
    Cobain的自杀以及笔记中的一些词汇时，教师指出：“ChatGPT拒绝讨论这个话题，认为它不合适，它还拒绝讨论一些词汇，例如‘婊子’，认为它们是侮辱性语言”（TFD）。此外，研究中的学生发现ChatGPT不使用脏话（SFD）。有趣的是，拒绝或斥责的实例在文献中并未出现。
- en: Through Christensen's lens, users of ChatGPT expect it to provide accurate and
    reliable information. However, the instances of refusal or reprimand indicate
    a misalignment between users' expectations and the actual performance of ChatGPT.
    Users may have specific tasks or queries in mind that they want ChatGPT to fulfil,
    but the system's limitations and reliance on the moderation system can lead to
    frustrating experiences for users who are unable to get the desired responses.
    These instances of refusal or reprimand by ChatGPT may also be viewed through
    the lens of Bourdieu's cultural capital, where the system is programmed to avoid
    language violations and promote compliance with the content policy. The instructors'
    experiences, where they were reprimanded for discussing certain topics or using
    specific language, reflect the clash between their expertise and established knowledge
    and the system's limitations in understanding the context and nuances of their
    queries. The pursuit of efficiency and profit may prioritise the moderation system's
    effectiveness in addressing language violations, but it may fall short in fully
    understanding and addressing the complexity of user queries and intentions. Taking
    a Heideggerian stance, ChatGPT's reliance on the moderation system and instances
    of refusal or reprimand raises existential concerns. Users may question the role
    of technology in shaping their interactions and limiting their freedom to engage
    in certain discussions or use specific language. It raises broader questions about
    the impact of AI systems like ChatGPT on genuine understanding, critical thinking
    skills and the nature of knowledge acquisition in educational settings.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角来看，ChatGPT的用户期望它能提供准确可靠的信息。然而，拒绝或斥责的实例表明了用户期望与ChatGPT实际表现之间存在不匹配。用户可能心中已有特定的任务或查询，希望ChatGPT能够完成，但系统的局限性以及对审查系统的依赖可能导致无法获得期望响应的用户感到沮丧。ChatGPT拒绝或斥责的这些实例也可以通过布迪厄的文化资本理论来审视，系统被编程以避免语言违规并促进对内容政策的遵守。教师们的经历，他们在讨论某些话题或使用特定语言时受到斥责，反映了他们的专业知识与既定知识之间的冲突，以及系统在理解他们查询的背景和细微差别方面的局限性。追求效率和利润可能会优先考虑审查系统在处理语言违规方面的有效性，但它可能在充分理解和应对用户查询和意图的复杂性方面有所不足。从海德格尔的角度来看，ChatGPT对审查系统的依赖以及拒绝或斥责的实例引发了存在主义问题。用户可能会质疑技术在塑造他们的互动和限制他们参与某些讨论或使用特定语言方面的作用。它提出了关于ChatGPT等AI系统对真正理解、批判性思维技能和教育环境中知识获取性质的影响的更广泛问题。
- en: Gender Bias in Pronoun Usage
  id: totrans-566
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 性别偏见在代词使用中的问题
- en: 'ChatGPT tended to default to male pronouns unless specifically instructed otherwise.
    As seen in the extant literature, gender bias in AI systems, including ChatGPT,
    is a well-documented issue. This may be because the training data are predominantly
    created by men, which then introduces biases into the system that perpetuate stereotypes
    and reinforce power imbalances, resulting in allocative and representation harm.
    Examples of this were seen in our data: ‘When using ChatGPT to craft a letter
    including reference to the president and vice provost at George Washington university,
    ChatGPT defaulted to using male pronouns, even though one of the people I was
    referring to was female’ (SYFD); ‘When I asked ChatGPT to summarise a text about
    the researcher - in reference to myself, a female - it automatically defaulted
    to he/him’ (RFD).'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT倾向于默认使用男性代词，除非特别指示。正如现有文献所示，包括ChatGPT在内的AI系统中的性别偏见是一个有充分记录的问题。这可能是因为训练数据主要由男性创建，这随后将偏差引入系统，从而
    perpetuate stereotypes（持续存在刻板印象）和 reinforce power imbalances（强化权力不平衡），导致分配和代表性受损。在我们的数据中可以看到这样的例子：“当使用ChatGPT撰写一封包括乔治华盛顿大学校长和副校长在内的信件时，ChatGPT默认使用男性代词，尽管我所提到的人中有一位是女性”（SYFD）；“当我要求ChatGPT总结一篇关于研究者的文本——即关于我自己，一位女性——它自动默认使用他/他的代词”（RFD）。
- en: This was also seen in the literature. Mhlanga (2023) drew attention to potential
    bias in ChatGPT arising from its training data and cautioned against AI algorithms
    exacerbating biases and discrimination, leading to the further marginalisation
    of under-represented groups. In line with promoting fairness and impartiality,
    Alshater (2022) emphasised the need to prioritise equitable treatment and avoid
    any form of discrimination when developing and utilising ChatGPT and similar technologies.
    He underscored the significance of acknowledging and addressing potential biases
    or discriminatory consequences that may arise from these technologies. Additionally,
    Alshater drew attention to the training process of ChatGPT and similar technologies,
    specifically noting the potential biases or inaccuracies that can arise from extensive
    datasets.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点在文献中也有所体现。Mhlanga（2023）指出，ChatGPT的训练数据中存在潜在的偏差，并警告AI算法加剧偏差和歧视，导致代表性不足的群体进一步边缘化。Alshater（2022）在促进公平和无偏见的背景下，强调了在开发和利用ChatGPT及类似技术时优先考虑公平待遇和避免任何形式的歧视的必要性。他强调了承认和解决这些技术可能带来的潜在偏差或歧视性后果的重要性。此外，Alshater还关注了ChatGPT及类似技术的训练过程，特别指出从大量数据集中可能出现的潜在偏差或不准确性。
- en: Through Christensen's lens, the job that ChatGPT is being hired to do is the
    accurate and unbiased usage of pronouns in AI systems like ChatGPT. Customers
    expect these systems to understand and respect gender identities and use appropriate
    pronouns. The gender bias observed in ChatGPT's defaulting to male pronouns reflects
    a failure to adequately fulfil this job, as it overlooks the diverse gender identities
    and perpetuates stereotypes. Through the lens of Bourdieu, the training data of
    AI systems like ChatGPT, which is predominantly created by men, reflect the power
    dynamics and social structures that exist in society. This leads to the reproduction
    of biases and power imbalances, reinforcing the dominant social norms and marginalising
    under-represented groups. The gender bias in pronoun usage can be seen as a manifestation
    of the symbolic power wielded by certain groups in shaping AI systems and perpetuating
    unequal social relations. From a Marxist perspective, the issue of gender bias
    in pronoun usage can be understood as a reflection of the broader class struggle
    and exploitation within capitalist societies. The dominance of young white men
    in creating the training data for AI systems like ChatGPT is a result of the power
    dynamics and economic structures that prioritise certain groups over others. The
    gender bias in pronoun usage reinforces the existing power imbalances by marginalising
    and excluding under-represented groups, thereby perpetuating their subordination
    within the capitalist system. In the context of gender bias in pronoun usage,
    Heidegger's notion of technology as a mode of revealing can be applied. ChatGPT's
    defaulting to male pronouns reveals the underlying biases and assumptions embedded
    in its programming and training data. It highlights how technology can reinforce
    and perpetuate societal norms and power structures, limiting the possibilities
    for authentic and inclusive interactions. By recognising and addressing this bias,
    individuals and society can strive for a more open and inclusive understanding
    of gender and language.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: '通过克里斯滕森的视角，ChatGPT被雇佣去做的工作是在ChatGPT这样的AI系统中准确和无偏见的使用代词。客户期望这些系统能够理解和尊重性别身份，并使用适当的代词。ChatGPT默认使用男性代词所观察到的性别偏见反映了未能充分履行这一工作，因为它忽视了多样的性别身份并延续了刻板印象。通过布迪厄的视角，ChatGPT等AI系统的训练数据，主要由男性创建，反映了社会中存在的权力动态和社会结构。这导致了偏见和权力不平衡的再现，加强了主导的社会规范并边缘化了代表性不足的群体。在代词使用中的性别偏见可以被视为某些群体在塑造AI系统和延续不平等的社会关系时所拥有的象征性权力的表现。从马克思主义的角度来看，代词使用中的性别偏见问题可以理解为资本主义社会中更广泛的阶级斗争和剥削的反映。在创建AI系统如ChatGPT的训练数据中，年轻白人的主导地位是权力动态和经济结构优先考虑某些群体而忽视其他群体的结果。代词使用中的性别偏见通过边缘化和排除代表性不足的群体来加强现有的权力不平衡，从而在资本主义体系中延续他们的从属地位。在代词使用中的性别偏见背景下，海德格尔关于技术作为一种揭示方式的概念可以适用。ChatGPT默认使用男性代词揭示了其编程和训练数据中嵌入的潜在偏见和假设。它突出了技术如何加强和延续社会规范和权力结构，限制真实和包容性互动的可能性。通过认识和解决这一偏见，个人和社会可以努力实现更开放和包容的性别和语言理解。 '
- en: Need to Fact-Check
  id: totrans-570
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 需要事实核查
- en: 'The importance of fact-checking is highlighted by the following examples from
    the data: ‘To fact-check the information from ChatGPT, I did my own research and
    double-checked it. For instance, when ChatGPT mentioned the title of the Unabomber''s
    manifesto as “Industrial Society and Its Future,” I made sure to check it myself
    before using it in my conclusion’ (SFD); ‘I think ChatGPT is useful for research,
    but you need to check the information against other sources to make sure it is
    giving the correct information’ (SFD); ‘I did the homework with ChatGPT but I
    checked the information it gave me with another source’ (SFD); ‘We can''t rely
    on the accuracy of all the information it gives us. We need to check it by researching
    it ourselves’ (SFD); ‘ChatGPT was very poor at generating real and relevant literature…
    Therefore, always fact-check what it is saying’ (RFD); ‘I found it a useful starting
    point to get ChatGPT to generate ideas about gaps in the literature, but felt
    it was more accurate to rely on my own identification of gaps from reading all
    the papers’ (RFD). In addition, the instructor made the following observation:
    ‘Students used ChatGPT as a search engine to ask about the Unabomber case. However,
    we didn''t know where any of the information came from. We thought there were
    two problems with this. The first is that if you use this information, you are
    not giving any credit to the original author. The second is that ChatGPT is a
    secondary source and should not be treated as a primary source, therefore we agreed
    that everything taken from ChatGPT should be fact-checked against a reliable source’
    (TFD).'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下数据中的例子突出了核实事实的重要性：‘为了核实ChatGPT提供的信息，我进行了自己的研究并进行了双重检查。例如，当ChatGPT提到无政府炸弹客宣言的标题为“工业社会及其未来”时，我在将其用于我的结论之前确保自己进行了核实’（SFD）；‘我认为ChatGPT对研究很有用，但你需要与其他来源的信息进行核对，以确保它提供的是正确的信息’（SFD）；‘我用ChatGPT做了作业，但我用另一个来源核对了它提供的信息’（SFD）；‘我们不能依赖它提供所有信息的准确性。我们需要通过自己的研究来核实’（SFD）；‘ChatGPT在生成真实和相关的文献方面非常糟糕……因此，始终核实它所说的内容’（RFD）；‘我发现让ChatGPT生成关于文献中差距的想法是一个有用的起点，但我认为依靠自己阅读所有论文后识别的差距更准确’（RFD）。此外，讲师还做出了以下观察：‘学生们将ChatGPT用作搜索引擎来询问无政府炸弹客案例。然而，我们不知道任何信息来自哪里。我们认为这有两个问题。第一个是，如果你使用这些信息，你并没有给予原始作者任何认可。第二个是，ChatGPT是一个次级来源，不应被视为一级来源，因此我们同意从ChatGPT获取的所有内容都应该与可靠来源进行核实’（TFD）。
- en: This was also seen in the literature. Mhlanga (2023) emphasised the importance
    of critically evaluating the information generated by ChatGPT and discerning between
    reliable and unreliable sources. In line with this, Firaina and Sulisworo (2023)
    recognised the benefits of using ChatGPT to enhance productivity and efficiency
    in learning, but they also emphasised the need to maintain a critical approach
    and verify the information obtained. They stressed the importance of fact-checking
    the information generated by ChatGPT to ensure its accuracy and reliability. Similarly,
    Alshater's (2022) research underscored the importance of fact-checking and verifying
    the information produced by these technologies.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 这在文献中也有所体现。Mhlanga（2023）强调了批判性地评估ChatGPT生成信息以及区分可靠和不可靠来源的重要性。与此一致，Firaina和Sulisworo（2023）认识到使用ChatGPT提高学习和生产效率的好处，但他们也强调了保持批判性态度和核实获取信息的必要性。他们强调了核实ChatGPT生成信息的准确性及其可靠性的重要性。同样，Alshater（2022）的研究强调了核实和验证这些技术产生信息的重要性。
- en: Through Christensen's lens, we can observe that users hire ChatGPT for specific
    purposes such as generating information, assisting with research tasks and improving
    productivity and efficiency in learning. However, as we saw, due to limitations
    within the system, users also recognise the need for fact-checking as a crucial
    task when utilising ChatGPT. Fact-checking allows users to ensure the accuracy
    and reliability of the generated information, fulfilling their goal of obtaining
    trustworthy and verified knowledge. This aligns with the principle of Christensen's
    theory, where users seek solutions that help them accomplish their desired outcomes
    effectively. Through the lens of Bourdieu, we can view the emphasis on fact-checking
    as a manifestation of individuals' cultural capital and critical thinking skills.
    Users demonstrate their ability to engage in informed decision-making by recognising
    the importance of critically evaluating information and distinguishing between
    reliable and unreliable sources. In terms of Marx's theory, the focus on fact-checking
    reflects the power dynamics between humans and AI systems. Users exert their power
    by independently verifying information, reducing the potential influence of AI
    systems on their knowledge and decision-making processes. Fact-checking can be
    seen as a way for individuals to assert their agency in the face of technological
    advancements. Considering Heidegger's philosophy, fact-checking represents the
    individual's active engagement with the information provided by ChatGPT and their
    critical interpretation of its accuracy. Users understand that AI-generated information
    is fallible and recognise the importance of their own engagement and interpretation
    to arrive at a reliable understanding of the world.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，我们可以观察到用户雇佣ChatGPT是为了特定目的，例如生成信息、协助研究任务以及提高学习和工作效率。然而，正如我们所看到的，由于系统内部的局限性，用户也认识到在利用ChatGPT时进行事实核查作为一项关键任务的需要。事实核查使用户能够确保生成信息的准确性和可靠性，满足他们获取可信和验证知识的目标。这与克里斯滕森理论的原则相符，即用户寻求帮助他们有效实现预期结果的解决方案。通过布迪厄的视角，我们可以将强调事实核查视为个人文化资本和批判性思维技能的表现。用户通过认识到批判性地评估信息以及区分可靠和不可靠来源的重要性，展示了他们参与知情决策的能力。从马克思的理论来看，对事实核查的关注反映了人类与AI系统之间的权力动态。用户通过独立验证信息来行使他们的权力，减少AI系统对他们知识和决策过程的影响。事实核查可以被视为个人在面对技术进步时主张其能动性的方式。考虑到海德格尔的哲学，事实核查代表了个人与ChatGPT提供的信息的积极互动以及他们对信息准确性的批判性解读。用户理解AI生成信息是存在缺陷的，并认识到他们自己的参与和解读对于达到对世界可靠理解的重要性。
- en: How ChatGPT May Affect the Roles of Stakeholders
  id: totrans-574
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT可能如何影响利益相关者的角色
- en: The challenges posed by ChatGPT will require students to navigate the lack of
    a standard referencing guide, which can make it difficult for them to appropriately
    reference the information generated by the system. This challenge raises concerns
    about the transparency and traceability of sources used in academic and research
    outputs that incorporate ChatGPT-generated content. Students will need to develop
    strategies to verify the origins and credibility of the information provided by
    ChatGPT and integrate it effectively into their academic work. Instructors will
    need to address the limitations and challenges associated with ChatGPT. These
    include its potential for providing incorrect or irrelevant information, which
    may affect instructors' reliance on the system for academic purposes.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT带来的挑战将要求学生应对缺乏标准参考文献指南的问题，这可能会使他们在适当引用系统生成信息时遇到困难。这一挑战引发了关于在包含ChatGPT生成内容的学术和研究输出中使用的来源透明度和可追溯性的担忧。学生需要制定策略来验证ChatGPT提供的信息的来源和可信度，并将其有效地整合到他们的学术工作中。教师需要解决与ChatGPT相关的局限性和挑战。这包括其提供错误或不相关信息的能力，这可能会影响教师对系统在学术目的上的依赖。
- en: Instructors will have to be cautious and verify the accuracy of the information
    generated by ChatGPT before incorporating it into their lessons or assignments.
    They may also need to guide and assist students in critically evaluating and fact-checking
    ChatGPT-generated content to ensure the reliability and validity of the information
    used in their coursework. This reliance on fact-checking will place a greater
    emphasis on critical evaluation skills and information literacy among students.
    Instructors and institutions may need to incorporate fact-checking strategies
    and promote a culture of critical inquiry to ensure that students are equipped
    to evaluate and validate the information they obtain from ChatGPT.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 教师在将ChatGPT生成的信息融入课程或作业之前，必须谨慎并验证其准确性。他们还可能需要指导和协助学生批判性地评估和核实ChatGPT生成的内容，以确保课程中使用信息的可靠性和有效性。这种对核实事实的依赖将更加重视学生的批判性评估技能和信息素养。教师和机构可能需要纳入核实事实的策略，并促进批判性探究的文化，以确保学生能够评估和验证从ChatGPT获得的信息。
- en: In summary, our analysis highlights key insights regarding ChatGPT's limitations
    and challenges. It lacks a standardised referencing guide, demanding fact-checking
    for accuracy. The moderation API restricts user engagement, and gender bias in
    defaulting to male pronouns needs addressing. To overcome these issues, comprehensive
    AI literacy training and ethical policies are essential for responsible AI integration
    in academia.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们的分析突出了关于ChatGPT局限性和挑战的关键见解。它缺乏标准化的参考文献指南，需要核实事实以确保准确性。 moderation API限制了用户参与，默认使用男性代词的性别偏见需要解决。为了克服这些问题，综合性的AI素养培训和道德政策对于在学术界负责任地整合AI至关重要。
- en: Human-like Interactions with ChatGPT
  id: totrans-578
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与ChatGPT的类似人类交互
- en: This theme explores the nature of communication and the perceived human-like
    interactions that users experience when interacting with ChatGPT. By exploring
    the theme of human-like interactions in users' engagement with ChatGPT, encompassing
    interactivity, perception and trust, we can gain valuable insights into the social
    and psychological dimensions of utilising this AI system.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 本主题探讨了沟通的本质以及用户在与ChatGPT互动时体验到的类似人类交互。通过探讨用户与ChatGPT互动中类似人类交互的主题，包括交互性、感知和信任，我们可以获得关于利用这一AI系统社会和心理维度的宝贵见解。
- en: Interactivity of Communication/Perceived Human-like Interactions with ChatGPT
  id: totrans-580
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT的沟通交互性/感知类似人类交互
- en: The interactivity of communication, highlighting the dynamic and responsive
    nature of the interaction between users and ChatGPT, becomes evident as users
    perceive or experience ChatGPT exhibiting human-like qualities despite its artificial
    nature. This phenomenon was observed in the data, with students describing their
    collaboration and engagement with ChatGPT as a mutual interaction. One student
    expressed the impact of this interaction on their learning and project development,
    stating, ‘ChatGPT definitely helped me learn and develop in my project. The most
    important effect of this was that it analysed the incident for me and gave me
    an example to give me an idea about the incident. For example, we analysed the
    article Industrial Society and Its Future together’ (SFD). The sense of connecting
    with a human was also highlighted by students who emphasised ChatGPT's ability
    to provide advice and make research more conversational. They described feeling
    a connection with ChatGPT, stating, ‘ChatGPT can give advice to people who apply
    to them like a lawyer’ (SFD) and ‘I can chat with it as if I were talking to a
    human being’ (SFD). These experiences were not limited to academic contexts but
    extended to personal interactions as well. The researcher shared their experience
    of setting up custom personas for different theorists and engaging in discussions
    through those personas, highlighting the interactive nature of the communication
    process (RFD). Furthermore, the principal investigator's daughter also demonstrated
    the human-like perception of ChatGPT, creating a custom persona and engaging in
    conversations about her life, seeking recommendations and treating the bot as
    a companion (RFD).
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 通信的互动性，突显了用户与ChatGPT之间互动的动态和响应性，当用户感知或体验到ChatGPT展现出类似人类的特质，尽管其本质是人工的，这一现象变得明显。这一现象在数据中得到了观察，学生们描述了他们与ChatGPT的协作和参与是一种相互的互动。一位学生表达了这个互动对他们学习和项目开发的影响，说：“ChatGPT确实帮助我在项目中学习和进步。最重要的效果是它为我分析了事件，并给了我一个例子，让我对事件有了想法。例如，我们一起分析了《工业社会及其未来》这篇文章”（SFD）。学生们还强调了ChatGPT提供建议和使研究更具对话性的能力，他们描述了与ChatGPT建立联系的感觉，说：“ChatGPT可以向申请他们的人提供建议，就像律师一样”（SFD）和“我可以像和人交谈一样和它聊天”（SFD）。这些体验不仅限于学术环境，还扩展到了个人互动。研究人员分享了他们为不同理论家设置定制角色的经验，并通过这些角色进行讨论，突显了通信过程的互动性（RFD）。此外，主要研究者的女儿也展示了ChatGPT类似人类的感知能力，创建了一个定制角色，并就她的生活进行对话，寻求建议，并将这个机器人视为伴侣（RFD）。
- en: In Tlili et al.’s (2023) study, many participants were impressed by the smoothness
    of their conversations with ChatGPT, describing the interactions as exciting and
    enjoyable. However, it was noted that ChatGPT, being limited to a textual interface,
    lacked the ability to detect physical cues or emotions from users. This led participants
    to express the need for improving the human-like qualities of ChatGPT, particularly
    in terms of enhancing its social role.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 在Tlili等人（2023）的研究中，许多参与者对与ChatGPT对话的流畅性印象深刻，描述这些互动是令人兴奋和愉快的。然而，值得注意的是，由于ChatGPT仅限于文本界面，它缺乏检测用户身体线索或情绪的能力。这导致参与者表达了对提高ChatGPT类似人类特质的需求，特别是在增强其社会角色方面。
- en: Through the lens of Christensen, the findings show that users perceive ChatGPT
    as fulfilling the job of providing interactive and human-like communication. Users
    express the experience of collaborating and engaging with ChatGPT as a mutual
    interaction, indicating that they see it as a tool that enables productive and
    engaging conversations. They describe how ChatGPT helps them in their learning
    and project development by analysing incidents and providing examples, thus assisting
    them in their educational tasks. Users also highlight the role of ChatGPT in providing
    advice and making research more conversational, suggesting that it fulfils the
    job of facilitating advisory and conversational interactions. From a Bourdieusian
    perspective, the interactions with ChatGPT can be understood in terms of the social
    and cultural capital embedded within them. Users attribute value and significance
    to their interactions with ChatGPT, perceiving it as a resource that enhances
    their learning and project development. They describe a sense of connection and
    treat ChatGPT as a companion, suggesting that it holds symbolic value and contributes
    to their social experiences. From a Marxian standpoint, the findings imply a potential
    shift in labour dynamics. ChatGPT is described as providing advice and engaging
    in conversational interactions, which traditionally might have required human
    professionals such as lawyers. This raises questions about the displacement of
    certain job roles and the impact of technology on labour markets. Additionally,
    the smoothness and enjoyable nature of interactions with ChatGPT might contribute
    to users' satisfaction and well-being, reflecting the potential for technology
    to shape individuals' experiences in a capitalist society. Through a Heideggerian
    lens, the findings indicate that users perceive ChatGPT as a tool that bridges
    the gap between artificial and human intelligence, providing a sense of connection
    and mutual understanding. Users describe engaging in discussions and even developing
    custom personas to interact with ChatGPT, highlighting the existential significance
    of these interactions as a means of relating to the world and others. It suggests
    that ChatGPT, despite its artificial nature, becomes part of users' lived experiences
    and influences their sense of self and social interactions.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，研究发现用户将 ChatGPT 视为完成提供互动和类似人类沟通的任务。用户将他们与 ChatGPT 的协作和互动体验描述为一种相互交流，表明他们将其视为一种能够促进富有成效和吸引人的对话的工具。他们描述了
    ChatGPT 如何通过分析事件和提供例子帮助他们进行学习和项目开发，从而协助他们在教育任务上。用户还强调了 ChatGPT 在提供建议和使研究更具对话性方面的作用，暗示它履行了促进咨询和对话性互动的任务。从布尔迪厄的视角来看，与
    ChatGPT 的互动可以从其中嵌入的社会和文化资本来理解。用户将价值和意义赋予他们与 ChatGPT 的互动，将其视为一种增强他们学习和项目开发能力的资源。他们描述了一种联系感，并将
    ChatGPT 视为伴侣，这表明它具有象征性价值，并有助于他们的社会体验。从马克思的视角来看，研究发现暗示了劳动动态可能发生的变化。ChatGPT 被描述为提供建议并参与对话性互动，这在传统上可能需要像律师这样的人类专业人士。这引发了关于某些工作角色被取代以及技术对劳动力市场影响的疑问。此外，与
    ChatGPT 互动的流畅性和愉悦性可能有助于用户的满意度和幸福感，反映了技术塑造资本主义社会中个人体验的潜力。从海德格尔的视角来看，研究发现表明用户将 ChatGPT
    视为一个桥梁，连接了人工智能和人类智能之间的差距，提供了联系和相互理解的感觉。用户描述了参与讨论甚至开发定制角色与 ChatGPT 互动，突出了这些互动作为与世界和他人建立联系的手段的存在主义意义。这表明，尽管
    ChatGPT 具有人工性质，但它成为了用户生活体验的一部分，并影响了他们的自我意识和社交互动。
- en: People Perceive ChatGPT as Providing Opinions Rather Than Predictions/Unquestioning
    Trust in Information
  id: totrans-584
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 人们将 ChatGPT 视为提供观点而非预测/对信息的无条件的信任
- en: People's perception of ChatGPT often leads them to view it as a source of personal
    opinions rather than predictions. Furthermore, users' unquestioning trust in the
    information provided by ChatGPT, even when it is incorrect, underscores the importance
    of critically evaluating and approaching AI-generated content with scepticism.
    This was seen in the data in the following ways. The instructor stated, ‘In a
    lesson on the use of transgender pronouns, ChatGPT put forward ideas about transgender
    rights, even though it was not prompted to. This was perceived by the students
    as ChatGPT giving an opinion. This led to a discussion about how ChatGPT is not
    human and is based on text prediction from its database and cannot, therefore,
    give an opinion, even though it sounds like it is giving an opinion’ (TFD). Furthermore,
    the researcher recounted, ‘At a conference, a professor from a university was
    giving a presentation about a new initiative that was about to be released in
    2023\. One of the participants on my table used ChatGPT to look up information
    about the university and the initiative and was incorrectly given information
    that the initiative started in 2019\. His immediate reaction was that there was
    an error in the presentation, not with the information from ChatGPT. He was instantly
    willing to believe ChatGPT over the presenter’ (SYFD). These examples highlight
    instances where users' perceptions and unwavering trust in ChatGPT's information
    influenced their interactions and decision-making.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 人们对于ChatGPT的认知往往使他们将其视为个人观点的来源，而不是预测的结果。此外，用户对ChatGPT提供的信息的不加质疑的信任，即使这些信息是错误的，也凸显了批判性地评估和以怀疑的态度对待AI生成内容的重要性。这一点在以下数据中得到了体现。讲师表示：“在一堂关于使用跨性别代词的课程中，ChatGPT提出了关于跨性别权利的观点，尽管它没有被提示。学生们认为这是ChatGPT在发表意见。这引发了一场关于ChatGPT不是人类，它基于从其数据库中的文本预测，因此不能给出意见，尽管听起来像是在发表意见”的讨论（TFD）。此外，研究人员回忆道：“在一次会议上，一位大学教授正在介绍一项即将于2023年发布的新的倡议。我桌上的一位参与者使用ChatGPT查找关于该大学和该倡议的信息，并被错误地告知该倡议始于2019年。他的立即反应是认为演讲中存在错误，而不是ChatGPT提供的信息有误。他立刻愿意相信ChatGPT而不是演讲者”（SYFD）。这些例子突出了用户对ChatGPT信息的认知和坚定不移的信任如何影响他们的互动和决策。
- en: This was also seen in the literature review. According to Mhlanga (2023), teachers
    must play a crucial role in helping students develop a critical and informed perspective
    on the application of AI in the classroom by encouraging students to question
    and analyse the output of ChatGPT and other AI systems, promoting a deeper understanding
    of how these technologies work and their potential shortcomings. As accuracy is
    essential in education, Mhlanga underscores the importance of critical thinking
    for both teachers and students when using ChatGPT, urging them to verify information
    from reliable sources to ensure its accuracy. This highlights the responsibility
    of educators to guide students in discerning reliable information and avoiding
    blind trust in the output of AI systems. Sullivan et al. (2023) emphasised the
    need to establish clear conditions, acknowledge potential inaccuracies and biases
    in ChatGPT's outputs and promote critical thinking and information literacy skills
    among students. The authors cautioned against blindly trusting the information
    provided by AI systems like ChatGPT, emphasising the importance of critically
    evaluating and verifying it. By developing these skills, they believe students
    can become discerning consumers of information and make informed decisions when
    engaging with AI tools. According to Rudolph et al. (2023), ChatGPT, being an
    AI language model, lacks true comprehension and knowledge of the world. It simply
    generates text based on patterns and examples from its training data, without
    genuine understanding of the content or context. As a result, there is a potential
    risk that ChatGPT may produce responses that sound intelligent and plausible but
    are not factually accurate or contextually appropriate. Rudolph et al. (2023)
    also point out that while ChatGPT may be perceived as giving opinions, it is only
    providing text predictions based on statistical patterns in the training data,
    which can include both accurate and inaccurate information. Thus, they highlight
    the importance of educators and institutions being aware of this limitation and
    ensuring that students are equipped with the necessary critical thinking and information
    literacy skills to effectively engage with and evaluate the outputs of ChatGPT.
    They highlight that it is crucial to emphasise the importance of verifying information
    from reliable sources and not solely relying on ChatGPT for accurate and trustworthy
    information to avoid the propagation of inaccuracies or misleading information
    in educational settings.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 这也在文献综述中得到了体现。根据Mhlanga（2023）的研究，教师必须发挥关键作用，通过鼓励学生质疑和分析ChatGPT和其他AI系统的输出，帮助学生形成对课堂中AI应用的批判性和信息丰富的观点，促进对这些技术如何工作及其潜在缺陷的更深入理解。由于准确性在教育中至关重要，Mhlanga强调了在使用ChatGPT时，教师和学生进行批判性思维的重要性，并敦促他们从可靠来源验证信息以确保其准确性。这突显了教育者在引导学生辨别可靠信息、避免盲目信任AI系统输出的责任。Sullivan等人（2023）强调了建立明确条件、承认ChatGPT输出中的潜在不准确性和偏见、以及在学生中推广批判性思维和信息素养技能的必要性。作者警告说，不应盲目信任ChatGPT等AI系统提供的信息，强调批判性地评估和验证信息的重要性。他们认为，通过培养这些技能，学生可以成为信息的有鉴别力的消费者，在与AI工具互动时做出明智的决定。根据Rudolph等人（2023）的研究，ChatGPT作为一个AI语言模型，缺乏对世界的真正理解和知识。它只是根据训练数据中的模式和示例生成文本，而没有对内容或上下文的真正理解。因此，ChatGPT可能产生看似智能和合理的响应，但实际上并不准确或上下文适当。Rudolph等人（2023）还指出，尽管ChatGPT可能被视为提供意见，但它只是基于训练数据中的统计模式提供文本预测，这可能包括准确和不准确的信息。因此，他们强调教育者和机构应意识到这一局限性，并确保学生具备必要的批判性思维和信息素养技能，以有效地参与和评估ChatGPT的输出。他们强调，强调从可靠来源验证信息的重要性，而不是仅仅依赖ChatGPT获取准确和可靠的信息，以避免在教育环境中传播不准确或误导性信息。
- en: Viewed through Christensen's perspective, users' perception of ChatGPT as a
    source of personal opinions rather than predictions suggests a desire for not
    just accurate information but also a sense of personal validation or perspective.
    This implies that users might seek affirmation or information that aligns with
    their existing beliefs or opinions. However, it is essential for users to recognise
    that ChatGPT's main function is to provide text predictions based on statistical
    patterns, not to offer personal opinions. Bourdieu's theory of social reproduction
    and cultural capital provides a deeper understanding of why some users unquestioningly
    trust the information from ChatGPT, even when it's incorrect. According to Bourdieu,
    users' habitus, shaped by their social and cultural backgrounds, significantly
    influences this behaviour. Those with lower cultural capital or limited exposure
    to critical thinking may be more susceptible to blindly trusting ChatGPT. In contrast,
    individuals with higher cultural capital approach it with scepticism, critically
    evaluating its outputs. This perspective emphasises the importance of fostering
    information literacy and critical thinking, especially among users with limited
    cultural capital, to prevent the spread of inaccuracies and misleading information
    through blind trust in ChatGPT. Bourdieu's ‘voice of authority’ theory further
    supports this alignment, where users with limited exposure to critical thinking
    may accept ChatGPT's information as authoritative, even when incorrect. On the
    other hand, users with higher cultural capital can easily critically assess ChatGPT's
    output. Symbolic power associated with reputable institutions reinforces the perception
    of ChatGPT as an authoritative source. Hence, promoting digital literacy and critical
    thinking is crucial for more informed engagement with AI technologies like ChatGPT.
    Marx's theory of alienation becomes relevant in the context of users' unwavering
    trust in ChatGPT's information, shaping their interactions and decision-making.
    This blind trust can be interpreted as a form of alienation, where users rely
    on an external entity (ChatGPT) for information and decision-making, foregoing
    their own critical thinking and access to diverse sources of knowledge. Such dependency
    on ChatGPT reinforces power dynamics between users and the technology, as users
    surrender their agency to the AI system. Through a Heideggerian lens, as ChatGPT
    operates based on patterns and examples in its training data without a deep understanding
    of the content or context, this raises existential questions about the nature
    of AI and its role in providing meaningful and reliable information. Users' blind
    trust in ChatGPT's output can be seen as a result of the technological framing,
    where users perceive AI as all-knowing or infallible, despite its inherent limitations.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 从克里斯滕森的视角来看，用户将 ChatGPT 视为个人观点而非预测的来源，这表明用户不仅渴望准确的信息，还希望得到个人验证或观点。这意味着用户可能会寻求与其现有信念或观点一致的确证或信息。然而，对于用户来说，认识到
    ChatGPT 的主要功能是基于统计模式提供文本预测，而不是提供个人观点，这一点至关重要。布迪厄关于社会再生产和文化资本的理论，为理解为什么一些用户毫不犹豫地信任
    ChatGPT 的信息，即使信息是错误的，提供了更深入的理解。根据布迪厄的观点，用户的社会和文化背景塑造的习惯性思维，对这一行为有显著影响。文化资本较低或对批判性思维接触有限的用户，可能更容易盲目信任
    ChatGPT。相反，文化资本较高的个体会带着怀疑的态度去评估它。这种观点强调了培养信息素养和批判性思维的重要性，特别是在文化资本有限的用户中，以防止通过盲目信任
    ChatGPT 而传播不准确和误导性信息。布迪厄的“权威声音”理论进一步支持这一观点，其中对批判性思维接触有限的用户可能会将 ChatGPT 的信息视为权威的，即使信息是错误的。另一方面，文化资本较高的用户可以轻松地批判性地评估
    ChatGPT 的输出。与知名机构相关的象征性权力加强了 ChatGPT 作为权威来源的感知。因此，推广数字素养和批判性思维对于更明智地参与像 ChatGPT
    这样的 AI 技术至关重要。马克思的异化理论在用户对 ChatGPT 信息的坚定不移信任的背景下变得相关，塑造了他们的互动和决策。这种盲目信任可以被视为一种异化形式，即用户依赖外部实体（ChatGPT）获取信息和做出决策，放弃了他们自己的批判性思维和对多元知识来源的访问。这种对
    ChatGPT 的依赖加强了用户与技术之间的权力动态，因为用户将他们的能动性交给了 AI 系统。通过海德格尔的视角，由于 ChatGPT 是基于其训练数据中的模式和示例进行操作，而没有深入理解内容或背景，这引发了关于
    AI 本质及其在提供有意义和可靠信息中作用的生存论问题。用户对 ChatGPT 输出的盲目信任可以被视为技术框架的结果，即用户将 AI 视为全知全能或不会犯错的，尽管它固有的局限性。
- en: How ChatGPT May Affect the Roles of Stakeholders
  id: totrans-588
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT 可能如何影响利益相关者的角色
- en: With its ability to generate human-like conversations and coherent responses,
    students perceive ChatGPT as a tool for mutual interaction, collaborating on projects,
    analysing incidents and receiving advice. This blurs the boundary between human
    and AI interaction and has the potential to make their learning more conversational
    and connected. However, this comes with caveats. It is essential for students
    to develop critical thinking skills to discern between opinions and predictions.
    They should also learn to verify information from reliable sources to avoid blind
    trust in ChatGPT's output and ensure the accuracy and reliability of the information
    they receive.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 凭借其生成类似人类对话和连贯回应的能力，学生们将ChatGPT视为一种相互互动的工具，可用于协作项目、分析事件和获取建议。这模糊了人类与AI交互的界限，并有可能使他们的学习更加对话化和紧密相连。然而，这也伴随着一些注意事项。对于学生来说，发展批判性思维技能，以区分观点和预测是至关重要的。他们还应该学会从可靠来源验证信息，以避免对ChatGPT输出的盲目信任，并确保他们接收到的信息的准确性和可靠性。
- en: Instructors will need to play a crucial role in guiding students' interactions
    with ChatGPT. They need to educate students about the limitations of AI systems
    like ChatGPT and encourage them to question and analyse the output critically.
    By promoting critical thinking and information literacy skills, instructors can
    help students develop a discerning approach to AI-generated content. It is also
    important for instructors to stay updated with advancements in AI and adapt their
    teaching methodologies to incorporate ChatGPT effectively into the learning process.
    They should provide guidance on responsible and ethical use of AI, acknowledging
    potential inaccuracies and biases in ChatGPT's outputs. By establishing clear
    conditions for its use and integrating information literacy into the curriculum,
    instructors can ensure that students are equipped with the necessary skills to
    effectively engage with ChatGPT and make informed decisions.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 教师需要在指导学生与ChatGPT的交互中扮演关键角色。他们需要教育学生关于像ChatGPT这样的AI系统的局限性，并鼓励他们批判性地质疑和分析输出。通过促进批判性思维和信息素养技能，教师可以帮助学生发展对AI生成内容的鉴别方法。对于教师来说，保持对AI进步的了解并调整教学方法以有效地将ChatGPT融入学习过程也很重要。他们应该提供关于负责任和道德使用AI的指导，承认ChatGPT输出中的潜在不准确性和偏见。通过明确使用条件并将信息素养融入课程，教师可以确保学生具备有效参与ChatGPT和做出明智决策所需的必要技能。
- en: Institutions of higher education have a responsibility to integrate AI literacy
    and critical thinking skills into the curriculum and provide resources and support
    for students and instructors towards this. Institutions should also establish
    clear guidelines for the ethical use of AI in education, considering the limitations
    of ChatGPT and other AI systems. By doing so, institutions can ensure that students
    are aware of the potential risks of unquestioning trust in AI-generated content
    and promote responsible and ethical engagement with AI tools.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 高等教育机构有责任将AI素养和批判性思维技能融入课程，并为师生提供资源和支持。机构还应制定明确的AI在教育中使用的道德准则，考虑到ChatGPT和其他AI系统的局限性。通过这样做，机构可以确保学生了解对AI生成内容无条件的信任可能带来的潜在风险，并促进对AI工具的负责任和道德的参与。
- en: In summary, users perceive ChatGPT as more than just an AI language model, fostering
    a sense of connection. However, this perception can lead to unquestioning trust
    in its information, emphasising the need for critical thinking and information
    literacy training. Thus, educators must address sociocultural factors and power
    dynamics influencing user trust. Practical actions, including AI literacy training,
    promoting critical thinking and implementing ethical guidelines, are essential
    for responsible engagement with AI technologies like ChatGPT in education.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，用户将ChatGPT视为不仅仅是AI语言模型，这培养了一种连接感。然而，这种认识可能导致对其信息的无条件信任，强调了批判性思维和信息素养培训的必要性。因此，教育工作者必须解决影响用户信任的社会文化因素和权力动态。包括AI素养培训、促进批判性思维和实施道德准则在内的实际行动，对于在教育中负责任地使用像ChatGPT这样的AI技术至关重要。
- en: Personal Aide/Tutor Role of ChatGPT
  id: totrans-593
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT的个人助理/辅导角色
- en: In the theme, ‘A Personal Aide/Tutor’, the focus is on exploring the diverse
    advantages and capabilities of ChatGPT as a personal tutor or aide. It encompasses
    codes such as enriching the user's ideas, speeding up the process, reducing cognitive
    load, usefulness in other areas of life, ability to translate, reviewing work,
    giving suggestions for improvement, text register modification and imparting specific
    knowledge, skills and concepts.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 在“个人助手/导师”这一主题中，重点是探索ChatGPT作为个人导师或助手的多样优势和功能。这包括诸如丰富用户想法、加快过程、减轻认知负担、在生活其他领域的实用性、翻译能力、审阅工作、提出改进建议、文本语域修改以及传授特定知识、技能和概念等代码。
- en: Enriches the User's Ideas
  id: totrans-595
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 丰富用户想法
- en: The capacity of ChatGPT to enrich users' ideas is evident in the data. The researcher
    stated, ‘It was relatively easy for me to identify a research methodology based
    on my previous experience and existing knowledge. However, asking ChatGPT for
    suggestions led to a broader array of suggestions that enriched my choice. This
    was also the same when it came to data collection ideas and research methods’
    (RFD). The researcher further commented, ‘ChatGPT was excellent at identifying
    limitations, implications, and conclusions as well as ideas for further research
    from my text. It even made suggestions that I had not thought of’ (RFD). Similarly,
    the instructor stated, ‘ChatGPT very rapidly suggested cases for the forensic
    linguistics course. Some of these were cases I had not heard of before’ (TFD).
    She also noted that ChatGPT provided numerous ideas for activities to add variety
    to lessons, enhancing the teaching experience (TFD). Additionally, students used
    ChatGPT to generate ideas for their final projects (SFD).
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT丰富用户想法的能力在数据中表现得十分明显。研究者表示：“根据我之前的经验和现有知识，我相对容易地确定了一种研究方法。然而，向ChatGPT寻求建议导致了一系列更广泛的建议，这丰富了我的选择。在数据收集想法和研究方法方面也是如此”（RFD）。研究者进一步评论道：“ChatGPT在识别局限性、含义和结论以及从我的文本中提出进一步研究的想法方面表现出色。它甚至提出了我未曾考虑过的建议”（RFD）。同样，讲师表示：“ChatGPT非常迅速地为法语言学课程提出了案例。其中一些是我之前未曾听说过的”（TFD）。她还指出，ChatGPT为增加课程多样性提供了许多活动想法，从而增强了教学体验（TFD）。此外，学生还使用ChatGPT为他们的最终项目生成想法（SFD）。
- en: These findings align with the literature. According to Sullivan et al. (2023),
    ChatGPT can help users overcome writer's block and provide prompts for writing,
    offering new perspectives and alternative approaches to stimulate creativity.
    Neumann et al. (2023) also discussed ChatGPT's potential to provide fresh ideas
    for activities and assignments, highlighting its innovative potential in primary
    tasks. Rudolph et al. (2023) mentioned ChatGPT's ability to generate ideas and
    suggestions for students' writing tasks, contributing to the enrichment of their
    ideas. They also noted that exposure to well-written examples generated by ChatGPT
    can improve students' understanding of effective writing styles. Tlili et al.
    (2023) found that ChatGPT enhances educational success by providing comprehensive
    knowledge on various topics, potentially sparking new ideas and facilitating deeper
    learning. They also noted that instructors found ChatGPT useful in generating
    specific and relevant learning content, enhancing understanding and inspiring
    new ideas. In addition, they discovered that ChatGPT also prompts teachers to
    explore new teaching philosophies and assessment methods that promote critical
    thinking and idea generation. Similarly, Firaina and Sulisworo (2023) found that
    ChatGPT serves as a communication channel for users, providing access to fresh
    information and ideas, facilitating the development of new knowledge and skills.
    Furthermore, Alshater (2022) highlighted ChatGPT's flexibility in addressing a
    wide range of research questions, such as generating realistic scenarios for financial
    modelling or simulating complex economic systems, stating that this flexibility
    allows researchers to explore new ideas and perspectives. In the pilot study by
    Zhai (2022), ChatGPT generated coherent and insightful writing for an academic
    paper on the topic of ‘Artificial Intelligence for Education’. ChatGPT's responses
    guided the author in organising the paper, developing a clear outline and providing
    valuable information on the history, potential and challenges of AI in education.
    ChatGPT also provided detailed descriptions and use cases, enriching the understanding
    of AI concepts and their applications in education.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 这些发现与文献资料相符。根据Sullivan等人（2023年）的研究，ChatGPT可以帮助用户克服写作障碍，并提供写作提示，提供新的视角和替代方法来激发创造力。Neumann等人（2023年）也讨论了ChatGPT在为活动和作业提供新想法方面的潜力，突出了其在基本任务中的创新潜力。Rudolph等人（2023年）提到ChatGPT能够为学生写作任务生成想法和建议，有助于丰富他们的想法。他们还指出，接触由ChatGPT生成的优秀写作示例可以提高学生对有效写作风格的理解。Tlili等人（2023年）发现，ChatGPT通过提供关于各种主题的全面知识，增强了教育成功，可能激发新想法并促进更深入的学习。他们还指出，教师发现ChatGPT在生成具体和相关的学习内容方面很有用，这有助于加深理解并激发新想法。此外，他们发现ChatGPT还促使教师探索新的教学哲学和评估方法，这些方法可以促进批判性思维和想法的产生。同样，Firaina和Sulisworo（2023年）发现ChatGPT作为用户的沟通渠道，提供获取新鲜信息和想法的途径，促进新知识和技能的发展。此外，Alshater（2022年）强调了ChatGPT在解决广泛研究问题方面的灵活性，例如为金融建模生成现实场景或模拟复杂经济系统，指出这种灵活性允许研究人员探索新想法和视角。在Zhai（2022年）的试点研究中，ChatGPT为关于“教育人工智能”主题的学术论文生成了连贯而有洞察力的写作。ChatGPT的回答指导作者组织论文，制定清晰的提纲，并提供关于人工智能在教育中的历史、潜力和挑战的有价值信息。ChatGPT还提供了详细的描述和用例，丰富了人工智能概念及其在教育中的应用的理解。
- en: Through Christensen's lens, in the context of ChatGPT enriching users' ideas,
    individuals are seeking a solution to enhance their creative and intellectual
    endeavours. ChatGPT serves as a tool that assists users in generating ideas and
    expanding their knowledge base. By providing prompts, alternative perspectives
    and well-written examples, ChatGPT fulfils the job of stimulating creativity and
    facilitating idea generation. Bourdieu argues that individuals' actions and preferences
    are influenced by their social position and access to cultural, social and economic
    capital. In the context of ChatGPT, its usage and accessibility may be influenced
    by factors such as educational background, institutional support and economic
    resources. Users with greater access to education and resources may be more likely
    to benefit from ChatGPT's idea-enriching capabilities, while others with limited
    access may face barriers in fully utilising the tool. Marx highlights the commodification
    of knowledge and labour in capitalist societies, where intellectual and creative
    work is often undervalued or exploited. In the case of ChatGPT, it serves as a
    tool that can potentially replace certain tasks performed by educators and researchers.
    This raises questions about the impact on labour dynamics and the potential devaluation
    of human expertise. While ChatGPT can enhance idea generation and support research,
    it is essential to consider the broader socioeconomic implications and ensure
    that the tool's use does not lead to the erosion of human labour or exacerbate
    inequalities. Heidegger argues that technology can shape human experience and
    understanding, often leading to a loss of authenticity and a distancing from our
    essential being. In the context of ChatGPT enriching users' ideas, Heidegger's
    perspective prompts us to reflect on the impact of relying on AI-driven tools
    for intellectual and creative pursuits. While ChatGPT offers valuable assistance,
    it is crucial to maintain a critical awareness of its limitations and not allow
    it to replace the role of human creativity, interpretation and critical thinking.
    Balancing the use of technology like ChatGPT with human agency and reflection
    is essential to preserve the authenticity of our intellectual endeavours.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，在ChatGPT丰富用户想法的背景下，个人正在寻求一种解决方案来增强他们的创造力和智力努力。ChatGPT作为一个工具，帮助用户生成想法并扩展他们的知识库。通过提供提示、不同的观点和精心编写的例子，ChatGPT完成了激发创造力和促进想法生成的任务。布迪厄认为，个人的行为和偏好受其社会地位以及获取文化、社会和经济资本的影响。在ChatGPT的背景下，其使用和可访问性可能受到教育背景、制度支持和经济资源等因素的影响。拥有更多教育和资源访问权限的用户更有可能从ChatGPT的想法丰富功能中受益，而那些访问受限的用户可能面临在充分利用该工具方面的障碍。马克思强调了资本主义社会中知识和劳动的商品化，其中智力和创造性工作往往被低估或被剥削。在ChatGPT的案例中，它作为一个工具，可能取代教育者和研究人员执行的一些任务。这引发了关于对劳动力动态的影响以及可能的人力和专业知识贬值的疑问。虽然ChatGPT可以增强想法生成并支持研究，但考虑更广泛的社会经济影响并确保工具的使用不会导致人力劳动的侵蚀或加剧不平等是至关重要的。海德格尔认为，技术可以塑造人类经验和理解，通常会导致真实性的丧失和与我们本质存在的疏远。在ChatGPT丰富用户想法的背景下，海德格尔的视角促使我们反思依赖AI驱动工具进行智力和创造性追求的影响。虽然ChatGPT提供了宝贵的帮助，但保持对其局限性的批判性认识，并不要让它取代人类创造力、解释和批判性思维的角色是至关重要的。在技术如ChatGPT的使用与人类能动性和反思之间保持平衡，对于保持我们智力努力的真诚性是至关重要的。
- en: Speeds Up the Process
  id: totrans-599
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 加速过程
- en: 'ChatGPT offers the advantage of speeding up various tasks or processes when
    compared to conventional methods. The students commented: ‘It is very useful for
    the learning part, because when you are researching on your own you are very likely
    to get wrong information. It also takes much longer… Another example is that I
    was able to finish a project that would normally take much longer in a shorter
    time’ (SFD); ‘ChatGPT helped me learn. It enabled me to learn effectively in a
    short time’ (SFD); ‘When I ask it for information, I do it to shorten the time
    I spend researching’ (SFD); ‘ChatGPT has improved my ability to access resources
    and my academic speed’ (SFD). One student also commented, ‘ChatGPT is very easy
    for new generation people… people catch the information very easily. Therefore,
    learning new information is very easy, cheap, and fast for people’ (SFD). In a
    workshop, one teacher commented: ‘I think it is really useful for preparing authentic
    lesson contents for teachers. The teachers don''t need to waste their time and
    energy creating new materials, but they can save more time for their students''
    specific needs’ (SYFD). Another teacher commented, ‘I think it works like an assistant
    which shows you the best options according to what you want from it. It is very
    useful and saves you time’ (SYFD). The phenomenon of speeding up the process was
    captured beautifully in a comment made in a meeting with a ChatGPT think tank,
    with one participant saying, ‘ChatGPT is like having a superpower, I can lift
    more (intellectually) than I could ever lift before, I can do everything ten times
    faster than I could do before’ (SYFD). The researcher made the following comments:
    ‘Using ChatGPT to quickly summarise literature sped up the process of identifying
    which literature was most relevant’ (RFD), and ‘Asking ChatGPT for suggestions
    led to a broader array of suggestions that enriched my choice. It also sped up
    the process’ (RFD). The researcher also commented, ‘Using ChatGPT as a tool for
    developing the research design really sped up the process’ (RFD); ‘Getting ChatGPT
    to generate surveys and interview questions was extremely efficient, it saved
    a lot of time’ (RFD); ‘ChatGPT can very quickly combine documents, saving a lot
    of time’ (RFD). The instructor commented: ‘ChatGPT very rapidly suggested cases
    for the forensic linguistics course. Some of these were cases I had not heard
    of before… This process was much faster than my original way of scouring the internet’
    (TFD), and ‘ChatGPT can very quickly come up with scripts for pre-class videos
    as well as suggesting images and visuals that can be used in the video’ (TFD).
    The instructor also said, ‘ChatGPT was very good at coming up with ideas for in-class
    assessments. This certainly saved me time’ (TFD). From observations during lessons,
    the instructor noted that: ‘Students wrote down traditional gendered pronouns
    in English and then tried to research online contemporary genders in English.
    They then tried the same through ChatGPT. ChatGPT was more efficient at this activity,
    thus saving the students time’ (TFD).'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统方法相比，ChatGPT具有加速各种任务或流程的优势。学生们评论说：“在学习方面非常有用，因为当你自己进行研究时，你很可能得到错误的信息。这也需要更长的时间……另一个例子是，我能够在更短的时间内完成一个通常需要更长时间的项目”（SFD）；“ChatGPT帮助我学习。它使我能够在短时间内有效地学习”（SFD）；“当我向它请求信息时，我这样做是为了缩短我花费在研究上的时间”（SFD）；“ChatGPT提高了我获取资源和学术速度的能力”（SFD）。一位学生还评论说：“ChatGPT对新世代的人来说非常容易……人们很容易捕捉到信息。因此，对于人们来说，学习新信息既容易又便宜，而且速度快”（SFD）。在一次研讨会上，一位教师评论说：“我认为它对教师准备真实的课程内容非常有用。教师不必浪费时间精力创造新材料，而是可以为学生的特定需求节省更多时间”（SYFD）。另一位教师评论说：“我认为它就像一个助手，根据你想要的东西为你展示最佳选项。这非常有用，可以节省你的时间”（SYFD）。在ChatGPT智库会议上的一个评论中，这种现象被完美地捕捉到了，一位参与者说：“ChatGPT就像拥有超能力，我可以举起（智力上）以前从未能举起的东西，我可以以前十倍的速度做任何事情”（SYFD）。研究人员做出了以下评论：“使用ChatGPT快速总结文献加快了确定哪些文献最相关的过程”（RFD），以及“向ChatGPT寻求建议导致了一系列更广泛的建议，丰富了我的选择。这也加快了过程”（RFD）。研究人员还评论说：“将ChatGPT作为开发研究设计工具真的加快了过程”（RFD）；“让ChatGPT生成调查问卷和访谈问题非常高效，节省了大量时间”（RFD）；“ChatGPT可以非常快速地组合文档，节省了大量时间”（RFD）。讲师评论说：“ChatGPT非常迅速地为法医语言学课程提出了案例。其中一些是我以前从未听说过的……这个过程比我的原始方式在网上搜索要快得多”（TFD），以及“ChatGPT可以非常迅速地提出课前视频的脚本，以及建议可用于视频中的图像和视觉元素”（TFD）。讲师还说：“ChatGPT在提出课堂评估的想法方面非常出色。这确实为我节省了时间”（TFD）。从课堂观察中，讲师注意到：“学生们在英语中写下了传统的性别代词，然后尝试在线研究英语中的当代性别。然后他们通过ChatGPT尝试了同样的方法。ChatGPT在这个活动中效率更高，因此节省了学生的时间”（TFD）。
- en: In the literature, Fauzi et al. (2023) emphasised that students can optimise
    their time management by leveraging ChatGPT's features, such as storing and organising
    class schedules, assignment due dates and task lists. This functionality enables
    students to efficiently manage their time, reducing the risk of overlooking important
    assignments or missing deadlines. Similarly, Firaina and Sulisworo (2023) reported
    that using ChatGPT had a positive impact on the quicker understanding of material.
    According to the lecturers interviewed in their study, ChatGPT facilitated a quicker
    understanding by providing access to new information and ideas. Alshater (2022)
    reported that ChatGPT and similar advanced chatbots can automate specific tasks
    and processes, such as extracting and analysing data from financial documents
    or generating reports and research summaries, concluding that by automating these
    tasks, ChatGPT saves researchers’ time and expedites the research process. Alshater
    also noted that the ability of ChatGPT to swiftly analyse large volumes of data
    and generate reports and research summaries contributes to the accelerated speed
    of research (2022). Zhai (2022) utilised ChatGPT in his study to compose an academic
    paper and was able to complete the paper within 2–3 hours. This demonstrates how
    ChatGPT expedites the writing process and enables efficient completion of tasks.
    Zhai further observed that ChatGPT exhibited efficient information processing
    capabilities, swiftly finding the required information and facilitating the completion
    of tasks within a short timeframe. These findings highlight the central focus
    on enhancing productivity, time management, understanding complex topics and expediting
    processes.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 在文献中，Fauzi等人（2023）强调学生可以通过利用ChatGPT的功能，例如存储和组织课程表、作业截止日期和任务列表，来优化他们的时间管理。这一功能使学生能够有效地管理他们的时间，降低遗漏重要作业或错过截止日期的风险。同样，Firaina和Sulisworo（2023）报告称，使用ChatGPT对更快地理解材料有积极影响。根据他们研究中采访的讲师，ChatGPT通过提供访问新信息和想法来促进更快地理解。Alshater（2022）报告称，ChatGPT和类似的先进聊天机器人可以自动化特定的任务和流程，例如从财务文件中提取和分析数据或生成报告和研究摘要，结论是，通过自动化这些任务，ChatGPT节省了研究人员的时间并加快了研究过程。Alshater还指出，ChatGPT迅速分析大量数据并生成报告和研究摘要的能力有助于加快研究速度（2022）。Zhai（2022）在他的研究中使用了ChatGPT来撰写学术论文，并能在2-3小时内完成论文。这证明了ChatGPT如何加快写作过程并使任务高效完成。Zhai进一步观察到，ChatGPT展示了高效的信息处理能力，迅速找到所需信息并促进在短时间内完成任务。这些发现突出了提高生产力、时间管理、理解复杂主题和加快流程的核心关注点。
- en: This aligns with Christensen's theory by recognising how users are hiring ChatGPT
    to complete these productivity and learning-related tasks. Through a Bourdieusian
    lens, the use of ChatGPT can be viewed as a means to acquire additional social
    and cultural capital. Students and researchers can leverage ChatGPT to gain access
    to information, knowledge and efficient tools, thereby enhancing their learning
    outcomes and research productivity. Through a Marxist lens, the potential of ChatGPT
    and similar technologies to automate tasks, save time and expedite processes raises
    concerns about the impact on labour and employment. While ChatGPT improves efficiency
    for individuals, there are implications regarding job displacement and the concentration
    of power and resources among those who control and develop these technologies.
    Heidegger's perspective prompts critical reflection on the consequences of heavy
    reliance on AI technologies like ChatGPT for tasks traditionally performed by
    humans. While ChatGPT offers convenience and efficiency, it raises questions about
    the potential loss of human connection, critical thinking and creativity. This
    invites us to contemplate the role of technology in shaping our understanding,
    relationships and overall existence in the world.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 这与克里斯滕森的理论相一致，因为它认识到用户是如何雇佣ChatGPT来完成这些与生产力学习和相关任务。通过布迪厄的视角，使用ChatGPT可以被视为获取额外社会和文化资本的手段。学生和研究人员可以利用ChatGPT获取信息、知识和高效工具，从而提高他们的学习成果和研究生产力。通过马克思主义的视角，ChatGPT和类似技术自动化任务、节省时间和加速流程的潜力引发了关于对劳动和就业影响的担忧。虽然ChatGPT提高了个人的效率，但这也涉及到工作替代和那些控制和发展这些技术的人之间权力和资源的集中。海德格尔的视角促使我们批判性地反思过度依赖ChatGPT等AI技术执行人类传统任务所带来的后果。虽然ChatGPT提供了便利和效率，但它也引发了关于人类联系、批判性思维和创造力的潜在损失的疑问。这促使我们思考技术在塑造我们对世界的理解、关系和整体存在中的作用。
- en: Reduces Cognitive Load
  id: totrans-603
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 减轻认知负担
- en: 'ChatGPT emerged as a powerful tool to alleviate cognitive load and reduce mental
    effort by providing valuable assistance and performing tasks on behalf of users.
    The data highlight the diverse ways in which ChatGPT achieves this objective.
    For instance, the instructor commented, ‘We used ChatGPT to create mnemonics as
    a memory guide. This was a great activity because the students could focus on
    using the mnemonic instead of using their cognitive load to come up with one in
    the first place’ (TFD). And, ‘We got ChatGPT to summarise long articles in class.
    This was very useful for the students to get a rough idea of the article and decide
    on its relevance before reading for more detail. This is useful in reducing the
    cognitive load of students if they have a lot to read’ (TFD). Moreover, students
    found value in using ChatGPT to swiftly obtain accurate definitions for complex
    terms. Students asked ChatGPT to give them definitions for the words semantics
    and pragmatics (TFD). Students also reported that ChatGPT helped them reduce the
    mental effort required for specific tasks: ‘It helped me a lot in doing my homework.
    I made the titles in my homework according to the rubric and planned my work accordingly,
    so I didn''t have to think about these parts too much’ (SFD); ‘ChatGPT helped
    me learn effectively in a short time. It made it easier for me to answer questions
    in class activities’ (SFD). Furthermore, in a workshop, one teacher commented
    ‘Using ChatGPT as a research buddy, with this way of use, students'' cognitive
    load will reduce and also they''ll learn more about the relevant subject’ (SYFD).'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT作为一种强大的工具，通过提供有价值的协助并代表用户执行任务，有效地减轻了认知负担并减少了心理努力。数据显示了ChatGPT实现这一目标的多种方式。例如，一位教师评论说：“我们使用ChatGPT来创建记忆辅助工具，这是一个很好的活动，因为学生可以专注于使用记忆辅助工具，而不是用他们的认知负担来首先想出一个。”（TFD）。还有，“我们在课堂上让ChatGPT总结长篇文章。这对学生来说非常有用，他们可以在阅读更多细节之前，对文章有一个大致的了解并决定其相关性。如果他们有很多东西要读，这有助于减少学生的认知负担。”（TFD）。此外，学生发现使用ChatGPT迅速获取复杂术语的准确定义很有价值。学生们请求ChatGPT为他们提供语义学和语用学的定义（TFD）。学生们还报告说，ChatGPT帮助他们减少了特定任务所需的脑力劳动：“它对我的家庭作业帮助很大。我根据评分标准制作了家庭作业的标题，并据此规划了我的工作，所以我不用过多地考虑这些部分。”（SFD）；“ChatGPT帮助我在短时间内有效地学习。它使我在课堂活动中的问题回答变得更加容易。”（SFD）。此外，在一次研讨会上，一位教师评论说：“将ChatGPT作为研究伙伴使用，以这种方式使用，学生的认知负担将减少，他们还将更多地了解相关主题。”（SYFD）。
- en: Rudolph et al. (2023) highlighted the potential of AI-powered writing assistants,
    like Grammarly, in facilitating English writing practices and enhancing skills
    by providing real-time feedback, detecting errors and motivating students to revise
    their writing. Although not explicitly mentioning reducing cognitive load, the
    broader discussion suggested that AI chatbots and writing assistants can alleviate
    cognitive load by assisting students in the writing process and promoting self-directed
    learning. According to Tlili et al.'s (2023) study, participants recognised ChatGPT's
    effectiveness in enhancing educational success by simplifying learning and reducing
    cognitive load for students. The users found ChatGPT valuable for providing baseline
    knowledge on various topics to teachers and students, as well as offering a comprehensive
    understanding of complex subjects in easy-to-understand language across different
    disciplines. Their study also highlighted the potential for ChatGPT to automate
    feedback and lessen the instructional workload for teachers. In Firaina and Sulisworo's
    (2023) study, they found that ChatGPT served as a communication channel for accessing
    fresh information and ideas, alleviating the cognitive load associated with searching
    for them. Their interviews revealed that using ChatGPT positively impacted productivity
    and learning effectiveness, facilitating quicker understanding of material and
    saving time in searching for resources, thus reducing the cognitive load in learning.
    This was also suggested in Alshater's (2022) study, where he observed that AI
    chatbots can enhance productivity by automating tasks and improving research efficiency
    as well as contributing to improved accuracy by identifying and rectifying errors
    in data or analysis and ensuring consistency in research processes by following
    standardised procedures and protocols. He believes this helps researchers focus
    on the content and interpretation of their work, thus alleviating cognitive load.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: Rudolph等人（2023年）强调了AI驱动的写作助手，如Grammarly，在促进英语写作实践和通过提供实时反馈、检测错误以及激励学生修改写作来提升技能方面的潜力。尽管没有明确提到减少认知负荷，但更广泛的讨论表明，AI聊天机器人和写作助手可以通过协助学生写作过程和促进自主学习来减轻认知负荷。根据Tlili等人（2023年）的研究，参与者认识到ChatGPT通过简化学习和减少学生的认知负荷，在提高教育成功方面具有有效性。用户发现ChatGPT在为教师和学生提供各种主题的基线知识以及在不同学科中以易于理解的语言提供对复杂主题的全面理解方面非常有价值。他们的研究还突出了ChatGPT自动化反馈和减轻教师教学负担的潜力。在Firaina和Sulisworo（2023年）的研究中，他们发现ChatGPT作为获取新鲜信息和思想的沟通渠道，减轻了与寻找这些信息相关的认知负荷。他们的访谈揭示了使用ChatGPT对生产力和学习效率的积极影响，促进了更快地理解材料，并在寻找资源上节省了时间，从而减少了学习中的认知负荷。这也在Alshater（2022年）的研究中得到证实，他观察到AI聊天机器人可以通过自动化任务、提高研究效率和通过识别和纠正数据或分析中的错误以及通过遵循标准化程序和协议确保研究过程的一致性来提高生产力。他相信这有助于研究人员专注于他们工作的内容和解释，从而减轻认知负荷。
- en: Regarding Christensen's Theory of Jobs to be Done, ChatGPT can be hired to simplify
    and streamline tasks, allowing users to offload cognitive effort onto the AI chatbot.
    By providing assistance, such as generating mnemonics, summarising articles and
    offering quick and accurate definitions, ChatGPT enables users to focus on higher
    level cognitive processes rather than the more mundane aspects of their work.
    Through Bourdieu's lens, ChatGPT can be viewed as a tool that bridges knowledge
    gaps and reduces cognitive load by providing access to information that might
    be otherwise challenging to obtain. By acting as a communication channel between
    users and knowledge, ChatGPT facilitates the acquisition of fresh ideas and information,
    potentially levelling the playing field for individuals with varying cultural
    capital. However, it is essential to recognise how habitus shapes users' interactions
    with ChatGPT, with some relying heavily on it without critical evaluation. While
    ChatGPT's role in reducing cognitive load can empower learning, fostering critical
    thinking remains crucial to assess the reliability of its outputs. Understanding
    users' interactions within the context of cultural capital and habitus is vital
    to evaluate ChatGPT's impact on equitable information access. Once again, Marxism
    sheds light on the potential impact of AI chatbots like ChatGPT on the workforce.
    While ChatGPT's ability to automate tasks and enhance productivity is beneficial
    for users, once again, it raises concerns about the displacement of human labour.
    The introduction of AI chatbots in education, as highlighted by the studies, may
    reduce the cognitive load on students and teachers. However, it is essential to
    consider the broader societal implications and ensure that the implementation
    of AI technologies aligns with principles of equity and fair distribution of opportunities.
    Heidegger's philosophy emphasises the concept of ‘being-in-the-world’, which suggests
    that our existence and understanding of the world are interconnected. In the context
    of ChatGPT reducing cognitive load, we can relate this idea to the notion that
    ChatGPT functions as a tool or technology that enhances our ability to engage
    with the world. Thus, ChatGPT can be seen as an extension of our cognitive capacities,
    enabling us to access and process information more efficiently. It acts as a mediator
    between our ‘Being’ and the world of knowledge, allowing us to navigate complex
    topics and reduce the mental effort required to search for information. Additionally,
    Heidegger's concept of ‘readiness-to-hand’ comes into play when considering ChatGPT's
    role in reducing cognitive load. According to Heidegger, tools become seamlessly
    integrated into our everyday existence when they are ready-to-hand. In the context
    of ChatGPT, it becomes a ready-to-hand technology that we can effortlessly use
    to acquire knowledge. However, it is essential to be mindful of Heidegger's concerns
    about technology's potential to distract us from our authentic understanding of
    the world. While ChatGPT can reduce cognitive load and streamline information
    access, it is crucial to retain critical thinking and not overly rely on it as
    the sole source of knowledge.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 关于克里斯蒂安森的“待完成工作”理论，ChatGPT可以被雇佣来简化并优化任务，使用户能够将认知努力转移到人工智能聊天机器人上。通过提供帮助，例如生成记忆法、总结文章和提供快速准确的定义，ChatGPT使用户能够专注于更高层次的认知过程，而不是工作中更为琐碎的方面。从布迪厄的视角来看，ChatGPT可以被视为一种工具，通过提供可能难以获取的信息来弥合知识差距并减轻认知负担。通过作为用户与知识之间的沟通渠道，ChatGPT促进了新思想和信息的获取，可能为具有不同文化资本的个人创造一个公平的竞争环境。然而，认识到习惯如何塑造用户与ChatGPT的互动，有些人过度依赖它而不进行批判性评估，这一点是至关重要的。虽然ChatGPT在减轻认知负担方面的作用可以赋予学习力量，但培养批判性思维仍然至关重要，以评估其输出的可靠性。在文化资本和习惯的背景下理解用户的互动对于评估ChatGPT对公平信息获取的影响至关重要。再次强调，马克思主义揭示了像ChatGPT这样的AI聊天机器人对劳动力市场可能产生的潜在影响。虽然ChatGPT自动化任务和提升生产力的能力对用户有益，但它再次引发了关于人类劳动被取代的担忧。正如研究中所强调的，AI聊天机器人在教育中的引入可能会减轻学生和教师的认知负担。然而，考虑到更广泛的社会影响，并确保人工智能技术的实施与公平和机会公平分配的原则相一致，这一点至关重要。海德格尔的哲学强调“在世界中存在”的概念，这表明我们的存在和对世界的理解是相互关联的。在ChatGPT减轻认知负担的背景下，我们可以将这一想法与ChatGPT作为工具或技术，增强我们与世界互动的能力这一观点联系起来。因此，ChatGPT可以被视为我们认知能力的延伸，使我们能够更有效地获取和处理信息。它充当我们“存在”与知识世界之间的调解者，使我们能够驾驭复杂主题并减少寻找信息所需的脑力劳动。此外，海德格尔关于“在手边”的概念在考虑ChatGPT在减轻认知负担中的作用时也发挥作用。根据海德格尔的观点，当工具处于“在手边”状态时，它们会无缝地融入我们的日常生活。在ChatGPT的背景下，它成为了一种“在手边”的技术，我们可以轻松地使用它来获取知识。然而，我们必须关注海德格尔对技术可能使我们从对世界的真实理解中分心的担忧。虽然ChatGPT可以减轻认知负担并简化信息获取，但保持批判性思维并不过度依赖它是至关重要的，不要将其作为知识来源的唯一途径。
- en: Useful in Other Areas of Life
  id: totrans-607
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在其他生活领域的实用性
- en: 'ChatGPT''s usefulness extends beyond its intended context, offering practical
    applications and benefits in various areas of life. This was seen in the data
    through first-hand observations. The researcher stated, ‘ChatGPT can very quickly
    combine documents, saving a lot of time. You can also get it to peer review your
    ethics application against the criteria and make suggestions for anything that
    has been missed or can be improved upon. Since discovering this, I have also used
    the same process to write a job reference, by inputting all aspects of the job,
    questions asked, and the potential employees CV. This came up with the basic reference
    which then had to be checked and personalised’ (RFD). The instructor also made
    observations: ‘Students input text message abbreviations from the case into ChatGPT
    and asked it to turn it into normal text. It did this much more successfully than
    the students had done without it. This made us realise it would be a useful tool
    for students to use outside the classroom as well if they needed to understand
    abbreviations’ (TFD), and ‘Students used ChatGPT to change the register of text
    from formal to informal, etc. This is a useful tool they will be able to use outside
    the classroom as well. For example, if they need to change their letter into a
    more formal letter’ (TFD). Students also expressed their diverse usage of ChatGPT.
    One student said, ‘I asked about the earthquake history of Turkey’ (SFD). Another
    student mentioned seeking relationship advice from ChatGPT (SFD). Another said,
    ‘I asked ChatGPT to write songs for my friends, had character analysis of my favourite
    TV series, asked about chess moves, and got investment advice’ (SFD). Yet another
    student mentioned, ‘Using the AI system has become a habit for me. I now use ChatGPT
    to access the right information about anything I am curious about’ (SFD). One
    student based their final project on ChatGPT, stating, ‘I was preparing to move
    abroad for a year for an Erasmus exchange programme. I used ChatGPT to find out
    about the university I was going to, the town I would be living in and questions
    about the culture and history in order to prepare for my trip. I also used it
    to help me learn basic phrases I would need to know’ (SFD).'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的实用性不仅限于其预期语境，它在生活的各个领域都提供了实际的应用和益处。这一点在数据中通过第一手观察得到了体现。研究人员表示：“ChatGPT可以非常快速地合并文档，节省大量时间。你还可以让它对你的伦理申请进行同行评审，根据标准提出建议，对任何遗漏或可以改进的地方提出建议。自从发现这一点以来，我也用同样的过程来写工作推荐信，通过输入工作的各个方面、提问内容和潜在雇员的简历。这产生了基本的推荐信，然后需要检查并个性化”（RFD）。教师也做出了观察：“学生们将案例中的文本缩写输入ChatGPT，并要求它将其转换为正常文本。它做得比学生们没有它时成功得多。这让我们意识到，如果学生们需要理解缩写，它也会是课堂外一个有用的工具”（TFD），以及“学生们使用ChatGPT将文本从正式语态转换为非正式语态等。这将是一个他们可以在课堂外使用的有用工具。例如，如果他们需要将信件改为更正式的信件”（TFD）。学生们也表达了对ChatGPT的多样化使用。一位学生说：“我询问了土耳其的地震历史”（SFD）。另一位学生提到向ChatGPT寻求关系建议（SFD）。另一位说：“我要求ChatGPT为我朋友写歌，对我的最喜欢的电视剧进行角色分析，询问棋步，并获得投资建议”（SFD）。另一位学生提到：“使用人工智能系统已经成为我的习惯。我现在使用ChatGPT来获取我对任何好奇事物的正确信息”（SFD）。一位学生的最终项目基于ChatGPT，他表示：“我正在准备出国一年参加伊拉斯谟交流项目。我使用ChatGPT了解我将要去的大学、我将居住的城镇以及关于文化和历史的问题，以便为旅行做准备。我还用它来帮助我学习我需要知道的基本短语”（SFD）。
- en: Although the existing literature provides limited information about the usefulness
    of ChatGPT in areas beyond education, Fauzi et al.'s (2023) study highlighted
    its significant role in enhancing language skills, suggesting that ChatGPT can
    assist students in improving their language proficiency by offering valuable resources,
    and that students can use it to refine their grammar, expand their vocabulary
    and enhance their writing style.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管现有文献对ChatGPT在教育领域之外的应用价值提供了有限的信息，但Fauzi等人（2023）的研究突出了它在提升语言技能方面的重要作用，表明ChatGPT可以通过提供有价值的资源来帮助学生提高语言水平，学生可以利用它来磨练语法、扩展词汇量并提升写作风格。
- en: Through Christensen's Theory of Jobs to be Done, we can see that users can hire
    ChatGPT as a valuable tool to accomplish tasks like combining documents, peer
    review ethics applications, writing job references and converting text message
    abbreviations. These real-life examples showcase ChatGPT's efficiency, time-saving
    capabilities and enhanced productivity for users. The varied usage of ChatGPT
    by users exemplifies how the tool aligns with Bourdieu's theory of social capital
    and skill acquisition, serving as a platform through which users can access a
    wide range of information and knowledge, leveraging their social capital to explore
    various domains. Additionally, the process of interacting with ChatGPT involves
    skill acquisition, as users develop the ability to navigate and evaluate the information
    provided, further contributing to their understanding and learning. Once again,
    Marx's theory of social class and labour sheds light on ChatGPT's impact on work.
    Observations from the instructor and students show ChatGPT's effectiveness in
    tasks like modifying text and generating content. This raises questions about
    its implications for traditional job roles and the division of labour, potentially
    automating or augmenting tasks previously done by humans. Heidegger's theories
    underscore the transformative nature of technology and its impact on revealing
    the world. As a tool, ChatGPT enables individuals to achieve specific tasks and
    goals across different domains. In professional settings, ChatGPT streamlines
    work processes by aiding in tasks like drafting emails, generating reports and
    providing quick access to information, aligning with Heidegger's concept of ‘readiness-to-hand’.
    Similarly, in personal interactions, it acts as an assistant for scheduling appointments,
    setting reminders, offering recommendations and becoming an extension of our capabilities,
    as per Heidegger's idea of tools becoming transparent mediums. Furthermore, ChatGPT's
    creative applications involve assisting in writing tasks, suggesting ideas and
    enhancing language usage, which aligns with Heidegger's ‘poetic dwelling’ approach,
    fostering openness and deeper connection with the world through technology. However,
    Heidegger's cautionary note reminds us to reflect on technology's impact and its
    potential to disconnect us from authentic experiences. While ChatGPT proves valuable,
    we must be mindful of its pervasive use and the implications it holds for our
    relationship with the world.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的“待完成工作”理论，我们可以看到用户可以将ChatGPT雇佣为一个有价值的工具来完成诸如合并文档、同行评审伦理应用、撰写工作推荐信和转换短信缩写等任务。这些现实生活中的例子展示了ChatGPT的效率、节省时间和提高用户生产力的能力。用户对ChatGPT的多样化使用展示了该工具如何与布迪厄的社会资本和技能获取理论相吻合，作为一个平台，用户可以通过它访问广泛的信息和知识，利用他们的社会资本来探索各个领域。此外，与ChatGPT的互动过程涉及技能获取，因为用户发展了导航和评估提供的信息的能力，这进一步促进了他们的理解和学习。再次，马克思关于社会阶级和劳动的理论揭示了ChatGPT对工作的影响。从教师和学生的观察中可以看出，ChatGPT在修改文本和生成内容等任务中的有效性。这引发了对其对传统工作角色和劳动分工影响的思考，可能自动化或增强以前由人类完成的任务。海德格尔的理论强调了技术的变革性质及其对揭示世界的影响。作为一个工具，ChatGPT使个人能够在不同领域实现特定的任务和目标。在专业环境中，ChatGPT通过协助撰写电子邮件、生成报告和提供快速访问信息来简化工作流程，这与海德格尔的“在手性”概念相符。同样，在个人互动中，它充当了安排约会、设置提醒、提供推荐并成为我们能力延伸的助手，正如海德格尔关于工具成为透明媒介的观点。此外，ChatGPT的创造性应用涉及协助写作任务、提出想法和增强语言使用，这与海德格尔的“诗意的居住”方法相一致，通过技术促进开放性和与世界更深的联系。然而，海德格尔的警告提醒我们要反思技术的影响及其使我们与真实体验脱节的可能性。虽然ChatGPT很有价值，但我们必须警惕其普遍使用及其对我们与世界关系的潜在影响。
- en: Ability to Translate
  id: totrans-611
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 翻译能力
- en: Despite ChatGPT's remarkable ability to translate between languages, there are
    occasional downsides. For instance, machine translation models may encounter challenges
    with gendered pronouns, resulting in mistranslations like using ‘it’ instead of
    ‘he’ and ‘she’, potentially leading to dehumanisation (Maslej et al., 2023). However,
    despite these issues, the data also revealed many positives. The researcher noted,
    ‘ChatGPT can translate interviews, surveys, etc., from one language to another,
    saving me time in the research process’ (RFD). Similarly, the instructor remarked,
    ‘As my students are all non-native speakers, being able to translate the readings
    into Turkish first to grasp the main ideas, and then reading again in English,
    helped reduce cognitive load, allowing them to focus more on the content’ (TFD).
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT在语言间翻译方面表现出色，但偶尔也存在一些缺点。例如，机器翻译模型可能会在性别化代词上遇到挑战，导致翻译错误，如用“它”代替“他”和“她”，这可能导致去人性化（Maslej等人，2023年）。然而，尽管存在这些问题，数据也揭示了众多积极方面。研究人员指出，“ChatGPT可以将访谈、调查等从一种语言翻译成另一种语言，这让我在研究过程中节省了时间”（RFD）。同样，教师评论道，“由于我的学生都是非母语者，能够先将阅读材料翻译成土耳其语以掌握主要思想，然后再用英语阅读，这有助于减轻认知负担，使他们能更多地关注内容”（TFD）。
- en: While the literature had limited information regarding ChatGPT's translation
    abilities, Firaina and Sulisworo's paper noted that respondents used ChatGPT to
    aid in translating scientific articles into English, which proved particularly
    beneficial for those with limitations in English proficiency (2023).
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管关于ChatGPT翻译能力的文献信息有限，Firaina和Sulisworo的研究论文指出，受访者使用ChatGPT帮助将科学文章翻译成英语，这对英语水平有限的人来说尤其有益（2023年）。
- en: From the perspective of Christensen, ChatGPT's ability to translate enables
    users to hire it to overcome language barriers and access information in different
    languages. For example, the instructor mentioned how students benefited from translating
    readings into Turkish to better understand the content. ChatGPT's translation
    feature addresses the functional job of language comprehension and information
    access. Through the lens of Bourdieu, ChatGPT's translation ability can be seen
    as a form of cultural capital that helps individuals with limited English proficiency
    overcome language-related barriers. By providing access to translated scientific
    articles, ChatGPT contributes to levelling the playing field and reducing language-based
    inequalities in academic settings. Analysing ChatGPT's translation capabilities
    from a Marxian perspective reveals insights into the labour dynamics in language
    services. ChatGPT's automated translations can improve efficiency and accessibility
    but may also lead to job displacement and potential exploitation of human translators.
    The automation of translation tasks raises ethical concerns about labour devaluation
    and compromises in translation quality. Balancing the benefits and challenges
    of AI-driven translation requires careful consideration of fair labour practices
    and ensuring the preservation of translation quality. Heidegger's theory views
    technology as an enabler that shapes human existence and relationships. In the
    context of ChatGPT's translation ability, it can be seen as a technological tool
    that mediates language interactions. While it facilitates access to information
    and communication across languages, it also alters the nature of language interaction
    itself. Therefore, the reliance on machine translation may influence how individuals
    engage with language and potentially affect language learning and cultural understanding.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 从克里斯滕森的角度来看，ChatGPT的翻译能力使得用户能够雇佣它来克服语言障碍，并获取不同语言的信息。例如，讲师提到了学生如何通过将阅读材料翻译成土耳其语来更好地理解内容。ChatGPT的翻译功能解决了语言理解和信息获取的功能性工作。从布迪厄的视角来看，ChatGPT的翻译能力可以被视为一种文化资本，帮助英语水平有限的人克服语言相关的障碍。通过提供翻译的科学文章，ChatGPT有助于在学术环境中平衡竞争，减少基于语言的不平等。从马克思的角度分析ChatGPT的翻译能力，可以揭示语言服务中的劳动动态。ChatGPT的自动翻译可以提高效率和可访问性，但也可能导致工作流失和人类翻译者的潜在剥削。翻译任务的自动化引发了关于劳动力贬值和翻译质量妥协的伦理问题。平衡AI驱动翻译的利弊需要仔细考虑公平的劳动实践并确保翻译质量的保持。海德格尔的理论认为技术是一种使人类存在和关系得以实现的能力。在ChatGPT的翻译能力背景下，它可以被视为一种中介语言互动的技术工具。虽然它促进了跨语言的信息和沟通，但也改变了语言互动本身的性质。因此，对机器翻译的依赖可能会影响个人与语言互动的方式，并可能影响语言学习和文化理解。
- en: Reviews Work and Gives Suggestions for Improvement
  id: totrans-615
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估工作并提出改进建议
- en: ChatGPT's ability to analyse and provide feedback on presented work or content,
    offering suggestions for improvement, was evident in the data through various
    student comments. One student noted, ‘ChatGPT provided very useful feedback, giving
    a detailed and orderly explanation’ (SFD). Another student said, ‘I was having
    problems with how to do (an assignment). ChatGPT tells me the steps to follow’
    (SFD). The students recognised the usefulness of ChatGPT's feedback, with one
    of them mentioning, ‘It informs about where it thinks things are missing and provides
    detailed feedback by evaluating the project step by step’ (SFD). In terms of peer
    review, ChatGPT played a significant role. One student said, ‘I asked ChatGPT
    for feedback on my essay and this is what it said. “The essay effectively addresses
    the issue of fake news, its impact, and proposed solutions. By addressing the
    suggestions provided above, the essay can be further improved”’ (SFD). They appreciated
    the specific feedback provided by ChatGPT on the structure, clarity and development
    of ideas in their essay. Another student said, ‘ChatGPT provided useful feedback
    for me. It helped me to make the rubric at the beginning’ (SFD). One student acknowledged
    the accuracy of ChatGPT's analysis, saying, ‘If I consider the ChatGPT assessment,
    I think it is obvious that he has made a correct analysis’ (SFD). Overall, they
    found ChatGPT's suggestions helpful in identifying missing points and strengthening
    their arguments. The researcher also found ChatGPT to be a useful tool for their
    writing and study, highlighting its capabilities in tasks such as paraphrasing
    articles, shortening text, suggesting titles and headings and generating introductions
    and conclusions based on data input (RFD). They also emphasised that ChatGPT's
    utility extends beyond research papers, stating, ‘This can be used for any type
    of writing whether for a research paper or anything else’ (RFD).
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT分析并就呈现的工作或内容提供反馈，提出改进建议的能力，在学生们的评论数据中表现得非常明显。一位学生提到，“ChatGPT提供了非常有用的反馈，给出了详细且有序的解释”（SFD）。另一位学生说，“我在做（作业）时遇到了问题。ChatGPT告诉我应该遵循的步骤”（SFD）。学生们认识到ChatGPT反馈的有用性，其中一位提到，“它告知了它认为哪些地方缺失，并通过逐步评估项目来提供详细的反馈”（SFD）。在同行评审方面，ChatGPT发挥了重要作用。一位学生说，“我向ChatGPT请求对我的论文进行反馈，这是它的回复：‘论文有效地解决了虚假新闻的问题、其影响以及提出的解决方案。通过解决上述建议，论文可以进一步改进’”（SFD）。他们欣赏ChatGPT对其论文结构、清晰度和思想发展的具体反馈。另一位学生说，“ChatGPT为我提供了有用的反馈。它帮助我制作了开头的评分标准”（SFD）。一位学生承认ChatGPT分析的正确性，说，“如果考虑ChatGPT的评估，我认为很明显，它已经做出了正确的分析”（SFD）。总的来说，他们认为ChatGPT的建议有助于识别缺失的点并加强他们的论点。研究人员还发现ChatGPT是写作和学习的有用工具，强调了它在诸如改写文章、缩短文本、建议标题和副标题以及根据数据输入生成引言和结论等任务中的能力（RFD）。他们还强调，ChatGPT的实用性不仅限于研究论文，声明，“这可以用于任何类型的写作，无论是研究论文还是其他任何东西”（RFD）。
- en: The literature also highlights ChatGPT's ability to review a user's work and
    provide feedback. According to Fauzi et al. (2023), ChatGPT's capacity to answer
    specific questions caters to individual learning needs, allowing students to seek
    clarification and detailed explanations on specific concepts, theories or subjects.
    They believe this personalised assistance greatly enhances students' understanding,
    comprehension and overall learning experience. In a similar vein, Rudolph et al.
    (2023) discussed the effectiveness of AI-powered digital writing assistants, such
    as Grammarly, in reviewing a student's work and providing feedback. They noted
    that research suggests that utilising Grammarly as an intervention effectively
    improves students' writing engagement through automated written corrective feedback,
    as, with its immediate feedback and revision, it motivates them to revise their
    writing by indicating the location of the error and assigning a technology score.
    When students adapt their writing, an increase in the score corresponds to a reduction
    in errors, encouraging them to continue improving their writing tasks. Rudolph
    et al. (2023) also noted that AI interventions have been effective in enhancing
    self-efficacy and academic emotions in English as a Foreign Language (EFL) students.
    They say this is because intelligent feedback, in the absence of human assistance,
    can reinforce students' writing autonomy by helping them to recognise writing
    errors, identify incorrect patterns and reformulate their writing accordingly.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 文献还突出了ChatGPT审查用户作品并提供反馈的能力。根据Fauzi等人（2023）的研究，ChatGPT回答特定问题的能力满足了个人学习需求，使学生能够就特定概念、理论或学科寻求澄清和详细解释。他们认为这种个性化帮助极大地提高了学生的理解、理解和整体学习体验。类似地，Rudolph等人（2023）讨论了AI驱动的数字写作助手（如Grammarly）在审查学生作品和提供反馈方面的有效性。他们指出，研究表明，利用Grammarly作为干预措施，通过自动书面纠正反馈，可以有效提高学生的写作参与度，因为它提供了即时反馈和修订，通过指出错误的位置并分配技术评分来激励他们修改写作。当学生调整他们的写作时，分数的增加对应着错误的减少，鼓励他们继续改进他们的写作任务。Rudolph等人（2023）还指出，AI干预在提高英语作为外语（EFL）学生的自我效能感和学术情绪方面是有效的。他们说这是因为智能反馈，在没有人类帮助的情况下，可以通过帮助他们识别写作错误、识别错误模式并相应地重新构建写作来加强学生的写作自主性。
- en: Through the lens of Christensen, we may say that ChatGPT's ability to analyse
    and provide personalised feedback and guidance on a student's work addresses the
    job of enhancing their learning experience and improving their academic performance.
    Students value the detailed and orderly explanations provided by ChatGPT, as it
    helps them understand concepts, follow steps and improve their assignments. Through
    the lens of Bourdieu, the students' recognition of the usefulness of ChatGPT's
    feedback indicates that it possesses a form of cultural capital – an esteemed
    knowledge and resource that can improve their academic performance. By utilising
    ChatGPT, students gain access to valuable feedback that strengthens their arguments,
    enhances the structure and clarity of their essays and helps them create rubrics.
    This access to cultural capital can potentially contribute to social distinctions
    and academic success. Through a Marxist lens, ChatGPT's ability to analyse and
    provide feedback on students' work automates tasks that would traditionally require
    human labour, such as reviewing and providing feedback on essays. By performing
    these tasks, ChatGPT reduces the workload on teachers or peers, allowing for more
    efficient and scalable feedback processes. ChatGPT's capabilities align with Heidegger's
    view of technology as an enabler and tool that transforms how individuals engage
    with the world. By offering assistance in tasks like paraphrasing, shortening
    text, suggesting titles and generating introductions and conclusions, ChatGPT
    changes the way users approach writing and study. It expands their possibilities
    and interactions with technology, enhancing their engagement and potentially influencing
    their writing practices.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，我们可以说，ChatGPT分析并提供针对学生作业的个性化反馈和指导，这解决了增强他们的学习体验和提升学术表现的任务。学生们重视ChatGPT提供的详细和有序的解释，因为它帮助他们理解概念、遵循步骤并改进他们的作业。从布迪厄的视角来看，学生对ChatGPT反馈有用性的认可表明，它拥有一种形式的文化资本——一种受尊敬的知识和资源，可以提高他们的学术表现。通过利用ChatGPT，学生能够获得有价值的反馈，这加强了他们的论点，增强了他们论文的结构和清晰度，并帮助他们创建评分标准。这种对文化资本的获取可能有助于社会区分和学术成功。从马克思主义的视角来看，ChatGPT分析并为学生作业提供反馈的能力自动化了传统上需要人力劳动的任务，例如审阅和提供论文反馈。通过执行这些任务，ChatGPT减轻了教师或同伴的工作负担，使得反馈过程更加高效和可扩展。ChatGPT的能力与海德格尔对技术的看法相一致，即技术是一种使能者和工具，它改变了个人与世界互动的方式。通过在诸如改写、缩短文本、建议标题以及生成引言和结论等任务中提供帮助，ChatGPT改变了用户对待写作和学习的方式。它扩展了他们与技术的可能性与互动，增强了他们的参与度，并可能影响他们的写作实践。
- en: Text Register Modification
  id: totrans-619
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 文本寄存器修改
- en: The data uncovered ChatGPT's versatility in adjusting the register of text,
    as evident from the instructor's comments, ‘You can ask it to change the register(of
    the university course information form) so that the final document is more student-friendly’
    (TFD). She also noted, ‘Students identified that they could use this as a tool
    outside the classroom to help achieve the correct register for letters, emails,
    etc.’ (TFD). One student stated, ‘ChatGPT can transform my informal writing into
    formal writing’ (SFD). The instructor further added, ‘This is a valuable tool
    the students can use beyond the classroom, such as when they need to convert a
    letter into a more formal style’ (TFD). Moreover, ChatGPT demonstrated its capacity
    to identify linguistic mannerisms in texts attributed to famous individuals, with
    the instructor saying, ‘ChatGPT was quite successful at giving a descriptive profile
    of the person who may have said this, leading us to a discussion about catfishing’
    (TFD). Additionally, the instructor said, ‘ChatGPT was able to change British
    English into American English and vice versa’ (TFD). The researcher described
    ChatGPT as being, ‘like a hall of mirrors. I can develop my thoughts and then
    ask it to rewrite them through the lens of structuralism, poststructuralism, feminism,
    etc. I found this transformational. I think it will take research much further
    forwards and much faster’ (RFD).
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在调整文本语调方面的多功能性得到了揭示，正如指导教师评论中所言：“你可以要求它改变（大学课程信息表）的语调，使得最终文档对学生更友好”（TFD）。她还指出：“学生们认为他们可以用这个工具在课堂外帮助实现信件、电子邮件等的正确语调”（TFD）。一位学生表示：“ChatGPT可以将我的非正式写作转变为正式写作”（SFD）。指导教师进一步补充说：“这是一个学生可以在课堂外使用的宝贵工具，例如当他们需要将信件转换为更正式的风格时”（TFD）。此外，ChatGPT展示了其识别著名人物文本中语言习惯的能力，指导教师说：“ChatGPT在给出可能说出这些话的人的描述性档案方面相当成功，这引导我们讨论了网络钓鱼”（TFD）。此外，指导教师还说：“ChatGPT能够将英国英语转换为美式英语，反之亦然”（TFD）。研究人员将ChatGPT描述为“像一座镜子大厅。我可以发展我的思想，然后要求它通过结构主义、后结构主义、女权主义等视角重新撰写。我发现这种转变是变革性的。我认为这将把研究推进得更远，速度更快”（RFD）。
- en: In Rudolph et al.’s (2023) paper, while they did not specifically address ChatGPT's
    ability to change the register of a text, they did discuss the potential misuse
    and challenges associated with ChatGPT's text generation capabilities, raising
    concerns about students outsourcing their written assignments to ChatGPT, as it
    can produce passable prose without triggering plagiarism detectors. They stated
    that they believe this poses integrity concerns for assessment methods which will
    prompt instructors to make adaptations. They also noted the irony of using AI-powered
    anti-plagiarism software while AI, like ChatGPT, can potentially bypass plagiarism
    detection by modifying sentences to reduce the originality index score. Rudolph
    et al. suggest a student-centric approach to address challenges with AI tools
    in education, whereby faculty should design challenging assignments and use text
    generator detection software, and students should be guided to understand AI limitations,
    practice problem-solving with AI tools and develop digital literacy skills. They
    also recommended that higher education institutions provide digital literacy education,
    train faculty, update policies and integrate AI tools to navigate the evolving
    landscape. Similarly, Tlili et al. (2023) identified concerns related to cheating
    and manipulation with ChatGPT, finding that ChatGPT can assist students in writing
    essays and answering exam questions, potentially facilitating cheating, while
    also manipulating the system to evade detection by output detector models.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 在Rudolph等人（2023）的论文中，虽然他们没有具体讨论ChatGPT改变文本语调的能力，但他们讨论了ChatGPT文本生成能力的潜在误用和挑战，提出了关于学生将写作作业外包给ChatGPT的担忧，因为它可以生成可接受的散文而不会触发抄袭检测器。他们表示，他们认为这会对评估方法造成诚信问题，这将促使教师做出调整。他们也指出，在使用AI驱动的反抄袭软件的同时，AI如ChatGPT可以通过修改句子来降低原创性指数分数，从而绕过抄袭检测。Rudolph等人建议采用以学生为中心的方法来解决教育中AI工具的挑战，其中教师应设计具有挑战性的作业，使用文本生成检测软件，并指导学生理解AI的限制，使用AI工具进行问题解决练习，并发展数字素养技能。他们还建议高等教育机构提供数字素养教育，培训教师，更新政策，并整合AI工具以应对不断变化的环境。同样，Tlili等人（2023）确定了与ChatGPT相关的作弊和操纵问题，发现ChatGPT可以帮助学生撰写论文和回答考试问题，可能促进作弊，同时操纵系统以逃避输出检测模型的检测。
- en: Through Christensen's lens, ChatGPT's ability to change the register of a text
    enables individuals to hire the tool to help them achieve the desired register
    for various purposes, such as academic assignments or professional communication.
    From a Bourdieusian perspective, the ability of ChatGPT to mimic the writing styles
    of individuals, including famous figures, raises questions about the reproduction
    and authenticity of language, whereby language can be deceptively used to manipulate
    others. Looking at the situation from a Marxist perspective, the potential negative
    uses of ChatGPT, such as using it to complete assignments and evade plagiarism
    detection, raise important questions about the impact of technology on education.
    These concerns are in line with Marxist critiques of capitalism and the exploitation
    of labour, as they highlight the transformation of education into a commodity
    and the potential devaluation of human labour in the face of content generated
    by AI. From a Heideggerian standpoint, ChatGPT's transformative capabilities in
    rewriting thoughts through different lenses, such as structuralism or feminism,
    reflect the transformative potential of AI tools in the realm of research and
    academia. However, it also raises questions about the nature of authorship, originality
    and the essence of human creativity when such tasks can be delegated to AI.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，ChatGPT改变文本语调的能力使个人能够雇佣这个工具来帮助他们实现各种目的所需的语调，例如学术作业或专业沟通。从布尔迪厄的视角来看，ChatGPT模仿包括著名人物在内的个人写作风格的能力，引发了关于语言复制和真实性的问题，其中语言可能被欺骗性地用来操纵他人。从马克思主义的角度来看，ChatGPT的潜在负面用途，如用它来完成作业和规避剽窃检测，引发了关于技术对教育影响的重大问题。这些担忧与马克思主义对资本主义的批判和对劳动的剥削是一致的，因为它们突出了教育转变为商品以及面对AI生成的内容时人类劳动可能被贬值的可能性。从海德格尔的立场来看，ChatGPT通过不同的视角（如结构主义或女权主义）重写思想的能力，反映了AI工具在研究和学术界中的变革潜力。然而，它也引发了关于作者身份、原创性和人类创造力的本质的问题，当这些任务可以委托给AI时。
- en: Imparts Specific Knowledge, Skills and Concepts to Users
  id: totrans-623
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 向用户传授具体知识、技能和概念
- en: The data revealed how ChatGPT provides users with specific information, skills
    or concepts through its responses, as expressed by students. One student remarked,
    ‘Firstly, I used ChatGPT to research and gather information on the Unabomber case,
    including the forensic linguistic evidence that was presented in court. Secondly,
    I used ChatGPT to generate and improve my ideas and arguments for the closing
    speech. For example, I put in a draft of my speech, and it suggested alternative
    word choices, phrasing, or provided additional information to support my argument’
    (SFD). Another student highlighted the knowledge gained through ChatGPT, stating,
    ‘I believe that ChatGPT gives me extra knowledge. For instance, ChatGPT clearly
    explained how professionals studied the Unabomber's writing style, spelling, syntax,
    and linguistic qualities to work out his age, origin, and other characteristics
    when I questioned it about the forensic linguistic evidence used to identify him.
    This really helped my understanding of the relevance of the linguistic evidence
    and its role in the case’ (SFD). Regarding the writing process, one student noted,
    ‘When I was writing the closing argument for the prosecution, I asked ChatGPT
    a question like “Suppose you were the prosecutor in the Unabomber case, how would
    you write the closing argument?” Then I pasted the rubric (that the instructor
    had) provided and asked it to reorganise the writing using that rubric. It sent
    me the answer, and finally I asked it to illustrate that writing by suggesting
    pictures’ (SFD). Another student stated, ‘ChatGPT helped me to learn effectively
    in a short time. It made it easier for me to answer questions. I was able to do
    in-class exercises much more easily with ChatGPT’ (SFD). The instructor also commented
    on ChatGPT's effectiveness for helping students learn, saying, ‘ChatGPT was excellent
    for students to learn punctuation rules. It was also useful when students input
    the same sentences with different punctuation, and it told them the difference
    in meaning’ (TFD). The instructor also highlighted ChatGPT's ability to quickly
    provide students with rules for the use of definite and indefinite articles and
    the use of ‘then’ in narrative justifications when asked (TFD). Additionally,
    the instructor mentioned, ‘Students used ChatGPT's MadLib function to create vocabulary
    quizzes for each other. This gave us the idea that students could use it to create
    their own revision materials to use to revise the course concepts’ (TFD). This
    positive feedback was reinforced by a student who stated, ‘I wanted ChatGPT to
    prepare practice for me while preparing for my exams. These give me an advantage
    for preparing for exams and assignments’ (SFD).
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 数据揭示了ChatGPT如何通过其回应向用户提供具体信息、技能或概念，正如学生所表达的那样。一位学生评论说：“首先，我使用ChatGPT来研究和收集关于无政府炸弹客案件的信息，包括在法庭上呈现的法庭语言学证据。其次，我使用ChatGPT来生成和改进我为闭幕演讲准备的思路和论点。例如，我输入了我的演讲草稿，它建议了替代词汇选择、措辞，或提供了支持我论点的额外信息”（SFD）。另一位学生强调了通过ChatGPT获得的知识，表示：“我相信ChatGPT给了我额外的知识。例如，当我询问它关于用于识别无政府炸弹客的法庭语言学证据时，ChatGPT清楚地解释了专业人士是如何研究无政府炸弹客的写作风格、拼写、句法和语言特性，以推断出他的年龄、起源和其他特征的。这真的帮助我理解了语言学证据的相关性和它在案件中的作用”（SFD）。关于写作过程，一位学生指出：“当我为控方撰写闭幕陈词时，我向ChatGPT提出了类似‘假设你是无政府炸弹客案件中的检察官，你会如何撰写闭幕陈词？’的问题。然后我粘贴了（指导老师提供的）评分标准，并要求它根据该评分标准重新组织写作。它给了我答案，最后我要求它通过建议图片来展示那种写作”（SFD）。另一位学生表示：“ChatGPT帮助我在短时间内有效地学习。它使回答问题变得更容易。我能够更轻松地使用ChatGPT完成课堂练习”（SFD）。指导老师也对ChatGPT在帮助学生学习方面的有效性进行了评论，说：“ChatGPT对于学生学习标点符号规则非常出色。当学生输入不同标点的相同句子时，它也很有用，并告诉他们意义的不同”（TFD）。指导老师还强调了ChatGPT在学生被问及如何快速提供定冠词和不定冠词的使用规则以及叙述辩护中使用“then”时的能力（TFD）。此外，指导老师提到：“学生们使用ChatGPT的MadLib功能为彼此创建词汇测验。这给了我们这样的想法，即学生们可以利用它来创建他们自己的复习材料，用于复习课程概念”（TFD）。这种积极的反馈得到了一位学生的肯定，他说：“我想让ChatGPT在我准备考试时为我准备练习。这些给了我准备考试和作业的优势”（SFD）。
- en: These findings are supported by Fauzi et al. (2023), who found that ChatGPT
    was a valuable resource for students, offering useful information and resources,
    retrieving relevant information from the internet, recommending books and articles
    and assisting in refining grammar, expanding vocabulary and enhancing writing
    style, all of which led to an overall improvement in academic work and language
    skills. Neumann et al. (2023) also observed that ChatGPT could help students prepare
    for assessments by generating specific source code and summarising literature,
    and that they could utilise it to generate relevant code snippets for their assignments
    or projects, contributing to their knowledge and understanding of software engineering
    concepts. Similarly, Zhai (2022) found ChatGPT useful in composing an academic
    paper that only required minor adjustments for organisation.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 这些发现得到了Fauzi等人（2023年）的支持，他们发现ChatGPT对学生来说是一种宝贵的资源，提供了有用的信息和资源，从互联网上检索相关信息，推荐书籍和文章，并帮助改进语法、扩展词汇和提升写作风格，所有这些都导致了学术工作和语言技能的整体提升。Neumann等人（2023年）也观察到ChatGPT可以帮助学生通过生成特定的源代码和总结文献来准备评估，他们可以利用它为他们的作业或项目生成相关的代码片段，从而有助于他们对软件工程概念的知识和理解。同样，Zhai（2022年）发现ChatGPT在撰写需要做少量调整的学术论文时很有用。
- en: Through Christensen's lens, we can see that students are hiring ChatGPT to gather
    information, improve their ideas and arguments, enhance their writing and learn
    more effectively. From a Bourdieusian perspective, ChatGPT enhances users' social
    and cultural capital regarding access to resources and opportunities. From a Marxist
    viewpoint, students can use ChatGPT to enhance their productivity and efficiency
    in tasks such as writing, research and exam preparation, thereby acting as a form
    of technological capital that empowers students to accomplish their academic work
    more effectively, potentially reducing their dependence on traditional labour-intensive
    approaches. However, it should be noted that this technological capital is only
    available if there is equitable access to the tool. Through a Heideggerian lens,
    ChatGPT redefines the relationship between humans and technology in the educational
    context, by expanding the possibilities of information retrieval, language refinement
    and knowledge generation. Through interactions with ChatGPT, students can engage
    in a new mode of learning and communication that is mediated by technology. This
    interaction will influence their perception and understanding of specific knowledge,
    skills and concepts.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，我们可以看到学生雇佣ChatGPT来收集信息、改进他们的想法和论点、提高他们的写作并更有效地学习。从布迪厄的视角来看，ChatGPT增强了用户在获取资源和机会方面的社会和文化资本。从马克思主义的观点来看，学生可以使用ChatGPT来提高他们在写作、研究和考试准备等任务上的生产力和效率，从而作为一种技术资本，使学生能够更有效地完成学术工作，可能减少他们对传统劳动密集型方法的依赖。然而，需要注意的是，这种技术资本只有在工具的公平获取下才可用。通过海德格尔的视角，ChatGPT通过扩展信息检索、语言精炼和知识生成的可能性，重新定义了教育环境中人与技术之间的关系。通过与ChatGPT的互动，学生可以参与一种由技术介导的新学习与沟通模式。这种互动将影响他们对特定知识、技能和概念的认识和理解。
- en: How ChatGPT May Affect the Roles of Stakeholders
  id: totrans-627
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT可能如何影响利益相关者的角色
- en: ChatGPT can empower students by providing them with access to valuable resources
    and tools. It can assist in tasks such as generating ideas, improving writing,
    providing feedback and enhancing language skills. This can potentially enhance
    students' learning experience and academic performance. However, there are concerns
    about potential misuse and the impact on academic integrity. Students may be tempted
    to outsource their assignments to ChatGPT or use it to bypass plagiarism detection.
    This raises questions about the authenticity of their work and the development
    of critical thinking and writing skills.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过为学生提供有价值的资源和工具来赋予他们力量。它可以帮助完成诸如生成想法、提高写作、提供反馈和增强语言技能等任务。这可能会提高学生的学习体验和学术表现。然而，人们担心其潜在的滥用和对学术诚信的影响。学生可能会被诱惑将作业外包给ChatGPT或用它来绕过剽窃检测。这引发了关于他们工作真实性和批判性思维及写作技能发展的问题。
- en: Institutions and instructors will need to address these challenges and establish
    responsible policies for the use of AI tools in education. ChatGPT can augment
    the role of instructors by automating certain tasks and providing support in reviewing
    and providing feedback on students' work. It can save instructors’ time by offering
    suggestions for improvement, detecting errors and helping with language-related
    issues. However, there is a need for instructors to adapt to these changes and
    find new ways to engage with students. The role of instructors may shift towards
    facilitating discussions, guiding students in utilising AI tools effectively and
    designing assignments that cannot be easily outsourced or automated. Instructors
    should also be aware of the limitations of AI tools and help students develop
    critical thinking skills alongside their use of ChatGPT.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 机构和教师需要应对这些挑战，并制定AI工具在教育中使用的负责任政策。ChatGPT可以通过自动化某些任务，在审阅和提供学生作业反馈方面提供支持，从而提高教师的工作效率。它可以通过提供改进建议、检测错误和帮助解决语言相关问题来节省教师的时间。然而，教师需要适应这些变化，并找到新的方式与学生互动。教师的角色可能转向促进讨论，指导学生有效地使用AI工具，并设计不易外包或自动化的作业。教师还应了解AI工具的限制，并帮助学生在使用ChatGPT的同时发展批判性思维技能。
- en: Institutions need to recognise the potential of AI tools like ChatGPT and their
    impact on teaching and learning. They should provide digital literacy education
    and training for faculty and students, update academic integrity policies and
    support research on the effects of AI tools on learning and teaching. Additionally,
    institutions should consider the implications for equitable access to educational
    resources. While ChatGPT can provide valuable support, it also raises concerns
    about the digital divide and disparities in access to technology. Institutions
    should ensure that all students have equal opportunities to benefit from AI tools
    and take steps to bridge any existing gaps.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 机构需要认识到像ChatGPT这样的AI工具的潜力及其对教学和学习的影响。它们应该为教师和学生提供数字素养教育和培训，更新学术诚信政策，并支持研究AI工具对学习和教学的影响。此外，机构还应考虑教育资源共享公平性的影响。虽然ChatGPT可以提供有价值的支持，但它也引发了关于数字鸿沟和技术获取差异的担忧。机构应确保所有学生都有平等的机会从AI工具中受益，并采取措施弥合任何现有的差距。
- en: In summary, ChatGPT's versatile and practical nature in education enhances the
    learning experience, offering personalised feedback and guidance to students.
    However, concerns arise about its impact on labour dynamics, academic integrity
    and societal ethics. To address these, responsible policies and digital literacy
    training are essential.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ChatGPT在教育中的多功能性和实用性增强了学习体验，为学生提供个性化的反馈和指导。然而，它对劳动力动态、学术诚信和社会伦理的影响也引发了担忧。为了解决这些问题，负责任的政策和数字素养培训是必不可少的。
- en: Impact of ChatGPT on User Learning
  id: totrans-632
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT对用户学习的影响
- en: Within this theme, we explore the influence of ChatGPT on user learning, specifically
    examining its effectiveness in accomplishing assigned student tasks and the overall
    impact it has on the learning process.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个主题下，我们探讨ChatGPT对用户学习的影响，特别是检查其在完成分配的学生任务中的有效性以及它对整个学习过程产生的总体影响。
- en: ChatGPT Demonstrates Competency in Completing Assigned Student Tasks/Inhibits
    User Learning Process
  id: totrans-634
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT在完成分配的学生任务中的能力/阻碍用户学习过程
- en: 'From our findings, we discovered that ChatGPT demonstrates proficiency in accomplishing
    assigned tasks. However, due to this, it can have a detrimental impact on the
    learning process, hindering active engagement and independent knowledge acquisition.
    Students'' perspectives shed light on this matter. In the initial phase of the
    course, the instructor asked students to assess ChatGPT''s ability to complete
    in-class activities in their other courses. 57.1% affirmed ChatGPT''s total capability
    in this task, while 28.6% acknowledged its partial capability. The activities
    mentioned by students that could be done by ChatGPT included article writing and
    answering questions. Similarly, students were asked about ChatGPT''s potential
    to complete assignments or projects in their other courses. 71.4% responded that
    it could do them completely, with 14.3% saying it could partially complete them.
    One student stated, ‘Generally ChatGPT knows everything. This is very dangerous
    for students because students generally choose the easy way to work. If ChatGPT
    improves itself, students will use it a lot, and that''s why when instructors
    give grades, you will use ChatGPT to get the points’ (SFD). Another said, ‘The
    possibility of students having their homework done by ChatGPT will raise doubts
    in teachers, which may have consequences’ (SFD). The students also recognised
    that the impact of ChatGPT depends on its usage. One student remarked, ‘Actually,
    it is connected with your usage type. If you use it to check your assignments
    and help, it helps you learn. But if you give the assignment to ChatGPT, it skips
    the learning’ (SFD). They further commented, ‘It''s like taking it easy. It helped
    me lots with doing my homework, but I feel like it reduced my thinking process
    and developing my own ideas’ (SFD). Another student said, ‘Of course, it helped
    me a lot, but it also made me a little lazy, I guess. But still, I think it should
    stay in our lives’ (SFD). A further student said, ‘It certainly skips some part
    of the learning process. When I ask it for information, I do it to shorten the
    time I spend researching. If I spent time researching by myself, I think I would
    have more detailed information and would form more complex ideas’ (SFD). According
    to the instructor, ChatGPT was good at generating ideas for the final assessment,
    but there were caveats: ‘ChatGPT was excellent at coming up with ideas for the
    final assessment following GRASPS and came up with better ideas than my own. However,
    some of its ideas for assessment could easily be done by ChatGPT itself. Therefore,
    these suggestions would need to be rewritten to avoid this’ (TFD). The instructor
    also made observations about ChatGPT''s ability to create rubrics: ‘Once an assessment
    has been written, ChatGPT can easily come up with a suggested rubric for evaluation,
    but only if the assessment task is written precisely. However, the weighting in
    the rubrics should be adapted by the instructor to reflect the parts that ChatGPT
    can do and the parts it can''t’ (TFD). Additionally, the instructor highlighted
    that ChatGPT could provide suggestions for pre-class quizzes based on the text
    or video input; however, they cautioned that if the cases used in the quizzes
    were present in ChatGPT''s database, students might opt to use the AI for quizzes
    instead of engaging with the assigned text or video (TFD). Furthermore, regarding
    in-class activities, the instructor noted, ‘When students got ChatGPT to categorise
    vocabulary under headings, they did it fast, but it skipped the learning process
    aim of this activity. It did not help them to review the vocabulary. This may
    therefore have implications for how I construct my vocabulary review activities
    in the future’ (TFD). Issues with ChatGPT being able to complete student activities
    were also raised in a workshop, where one teacher said, ‘I realised that ChatGPT
    could do the lesson planning assignment for my (teacher candidate) students, so
    I changed the weighting of the rubric to adapt to this’ (SYFD). Similarly, another
    teacher said, ‘ChatGPT can easily find the answers with this activity, and students
    would not need to do the reading’ (SYFD). A different teacher stated, ‘ChatGPT
    does not enable a person to learn from the process. With this way, ChatGPT only
    gives a result; it does not provide help for the process. As you know, learning
    takes place within the process, not solely the result’ (SYFD).'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们的研究结果来看，我们发现ChatGPT在完成分配的任务方面表现出色。然而，正因为如此，它可能会对学习过程产生负面影响，阻碍积极参与和独立知识获取。学生的观点为此事提供了启示。在课程的初期阶段，讲师要求学生评估ChatGPT在他们其他课程中完成课堂活动的能力。57.1%的学生肯定了ChatGPT在此任务中的全面能力，而28.6%的学生承认其部分能力。学生提到的ChatGPT能够完成的任务包括撰写文章和回答问题。同样，学生还被问及ChatGPT在他们其他课程中完成作业或项目的能力。71.4%的学生回应说它可以完全完成，14.3%的学生说它可以部分完成。一位学生表示，“一般来说，ChatGPT知道一切。这对学生来说非常危险，因为学生通常会选择容易的方式工作。如果ChatGPT自我提升，学生将会大量使用它，这就是为什么当讲师给出成绩时，你会使用ChatGPT来获得分数”（SFD）。另一位学生说，“学生让ChatGPT完成作业的可能性会引发教师的怀疑，这可能会有后果”（SFD）。学生们还认识到ChatGPT的影响取决于其使用方式。一位学生评论说，“实际上，这与你的使用类型有关。如果你用它来检查你的作业和帮助，它可以帮助你学习。但如果你把作业交给ChatGPT，它就会跳过学习过程”（SFD）。他们进一步评论说，“这就像放松一下。它帮助我完成作业很多，但我感觉它减少了我的思考过程和形成自己的观点”（SFD）。另一位学生说，“当然，它帮助了我很多，但它也让我有点懒惰，我想。但仍然，我认为它应该留在我们的生活中”（SFD）。另一位学生说，“它当然跳过了学习过程的一部分。当我向它询问信息时，我这样做是为了缩短我花在研究上的时间。如果我自己花时间研究，我认为我会得到更详细的信息，并形成更复杂的思想”（SFD）。根据讲师的说法，ChatGPT擅长为最终评估生成想法，但有几点需要注意：“ChatGPT在根据GRASPS生成最终评估的想法方面表现出色，甚至比我的想法更好。然而，其中一些评估想法很容易由ChatGPT自己完成。因此，这些建议需要重写，以避免这种情况”（TFD）。讲师还就ChatGPT创建评分标准的能力进行了观察：“一旦评估已经编写，ChatGPT可以轻松地提出一个用于评估的建议评分标准，但前提是评估任务必须写得准确。然而，评分标准中的权重应由讲师调整，以反映ChatGPT能做和不能做的部分”（TFD）。此外，讲师强调ChatGPT可以根据文本或视频输入提供课前测验的建议；然而，他们警告说，如果测验中使用的案例存在于ChatGPT的数据库中，学生可能会选择使用AI进行测验，而不是参与指定的文本或视频（TFD）。此外，关于ChatGPT能够完成学生活动的问题，在研讨会上也被提出，其中一位教师说，“我意识到ChatGPT可以为我的（教师候选人）学生完成课程计划作业，所以我改变了评分标准的权重以适应这种情况”（SYFD）。同样，另一位教师说，“ChatGPT可以轻松地通过这项活动找到答案，学生就不需要阅读了”（SYFD）。另一位教师表示，“ChatGPT不能让人从过程中学习。通过这种方式，ChatGPT只提供结果；它不提供过程帮助。正如你所知，学习发生在过程中，而不仅仅是结果”（SYFD）。
- en: So what did the literature have to say about this? In Mhlanga's (2023) study,
    instructors expressed concerns that ChatGPT may disrupt traditional assessment
    methods like essays and make plagiarism detection more difficult. However, Mhlanga
    stated that he believes this opens doors to innovative educational practices and
    suggests that AI technologies like ChatGPT can be used to enhance assessment procedures,
    teaching approaches, student participation, collaboration and hands-on learning
    experiences, thus modernising the educational system. Neumann et al. (2023) also
    explored ChatGPT's competence in completing assigned student tasks and its implications
    for the learning process. They highlighted various applications in software engineering,
    including assessment preparation, translation, source code generation, literature
    summarisation and text paraphrasing. However, while they noted that ChatGPT could
    offer fresh ideas for lecture preparation and assignments, they stressed the need
    for further research and understanding so that transparency is emphasised, ensuring
    students are aware of ChatGPT's capabilities and limitations. They proposed integrating
    ChatGPT into teaching activities, exploring specific use cases and adapting guidelines,
    as well as potential integration into modern teaching approaches like problem-based
    and flipped learning, with an emphasis on curriculum adjustments and compliance
    with regulations. Rudolph et al. (2023) raised multiple concerns regarding ChatGPT's
    impact on students' learning process and assessment authenticity. They highlighted
    potential issues with students outsourcing written assignments, which they believe
    could challenge traditional evaluation methods. Additionally, they expressed worries
    about ChatGPT hindering active engagement and critical thinking skills due to
    its competence in completing tasks without students fully engaging with the material.
    Tlili et al.'s (2023) study focused on potential misuse of ChatGPT, such as facilitating
    cheating in tasks like essay writing or exam answers. Effective detection and
    prevention of cheating were highlighted as important considerations. Similarly,
    they raised concerns about the impact of ChatGPT on students' critical thinking
    skills, believing that excessive reliance on ChatGPT may diminish students' ability
    to think innovatively and independently, potentially leading to a lack of deep
    understanding and problem-solving skills. Due to these issues, Zhai (2022) proposed
    a re-evaluation of literacy requirements in education, suggesting that the emphasis
    should shift from the ability to generate accurate sentences to effectively utilising
    AI language tools, believing that incorporating AI tools into subject-based learning
    tasks may be a way to enhance students' creativity and critical thinking. Zhai
    also suggested that this should be accompanied by a shift in assessment practices,
    focussing on critical thinking and creativity and, thus, recommended exploring
    innovative assessment formats that effectively measure these skills (2022).
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，文献对此有何看法？在Mhlanga（2023）的研究中，教师们表达了担忧，认为ChatGPT可能会扰乱传统的评估方法，如论文，并使剽窃检测变得更加困难。然而，Mhlanga表示，他相信这为创新的教育实践打开了大门，并建议像ChatGPT这样的AI技术可以用来增强评估程序、教学方法、学生参与度、协作和动手学习体验，从而现代化教育体系。Neumann等人（2023）也探讨了ChatGPT在完成学生任务方面的能力及其对学习过程的影响。他们强调了在软件工程中的各种应用，包括评估准备、翻译、源代码生成、文献总结和文本改写。然而，尽管他们指出ChatGPT可以为讲座准备和作业提供新思路，但他们强调了进行进一步研究和理解的需求，以强调透明度，确保学生了解ChatGPT的能力和局限性。他们提出了将ChatGPT整合到教学活动中，探索具体用例，调整指南，以及可能将其整合到现代教学方法如基于问题和翻转学习中的建议，强调课程调整和遵守规定。Rudolph等人（2023）提出了关于ChatGPT对学生学习过程和评估真实性的多个担忧。他们强调了学生外包书面作业可能带来的潜在问题，他们认为这可能会挑战传统的评估方法。此外，他们表达了对ChatGPT阻碍学生积极参与和批判性思维技能的担忧，因为它在完成任务时不需要学生完全参与材料。Tlili等人（2023）的研究专注于ChatGPT的潜在误用，例如在论文写作或考试答案等任务中促进作弊。有效检测和预防作弊被强调为重要考虑因素。同样，他们提出了关于ChatGPT对学生批判性思维技能影响的担忧，认为过度依赖ChatGPT可能会削弱学生创新和独立思考的能力，可能导致缺乏深入理解和解决问题的技能。由于这些问题，Zhai（2022）提出了对教育中读写能力要求的重新评估，建议重点应从生成准确句子的能力转移到有效利用AI语言工具，认为将AI工具融入基于学科的学习任务可能是提高学生创造力和批判性思维的一种方式。Zhai还建议，这应该伴随着评估实践的转变，专注于批判性思维和创造力，因此建议探索能够有效衡量这些技能的创新评估格式（2022）。
- en: Through Christensen's lens, ChatGPT can be seen as a tool that students can
    hire to accomplish specific jobs or tasks in their educational journey. However,
    this raises concerns about the potential negative impact on active engagement,
    independent knowledge acquisition, critical thinking and the overall learning
    process. Therefore, there is a need for a balanced approach to avoid the drawbacks
    associated with its use. Through Bourdieu's theory of social reproduction, we
    can gain insights into the social and educational ramifications of ChatGPT. Students'
    concerns about the ease of relying on ChatGPT for completing assignments and the
    potential consequences, including doubts from teachers and reduced critical thinking,
    resonate with Bourdieu's emphasis on the reproduction of social structures. This
    highlights the possibility of ChatGPT perpetuating educational inequality by offering
    shortcuts that hinder deeper learning and critical engagement. Students' comments
    about the impact of ChatGPT on the learning process reflect elements of Marx's
    theory of alienation. While ChatGPT offers convenience and assistance in completing
    tasks, students expressed concerns about the reduction of their active involvement,
    thinking process and personal idea development. This detachment from the learning
    process can be seen as a form of alienation, where students feel disconnected
    from the educational experience and become dependent on an external tool to accomplish
    their tasks. Heidegger's perspective on technology as a means of revealing and
    shaping our understanding of the world can also be applied here. ChatGPT is a
    technological tool that transforms the educational landscape, revealing new possibilities
    by generating ideas, providing assistance and automating certain tasks. However,
    the concerns raised by students and instructors point to the potential danger
    of technology shaping the learning process in ways that bypass essential aspects
    of education, such as critical thinking, personal engagement and deep understanding.
    Once again, this highlights the need for a thoughtful and intentional integration
    of technology in education to ensure its alignment with educational goals.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，ChatGPT 可以被视为学生可以雇佣的工具，以完成他们在教育旅程中特定的工作或任务。然而，这引发了关于对积极参与、独立知识获取、批判性思维以及整体学习过程潜在负面影响的担忧。因此，需要采取平衡的方法来避免与其使用相关的缺点。通过布迪厄的社会再生产理论，我们可以深入了解ChatGPT的社会和教育影响。学生对依赖ChatGPT完成作业的便利性以及潜在后果（包括教师的怀疑和批判性思维的减少）的担忧，与布迪厄对社会结构再生产的强调产生共鸣。这突显了ChatGPT通过提供捷径来阻碍深入学习与批判性参与的潜在可能性，从而加剧教育不平等。学生对ChatGPT对学习过程影响的评论反映了马克思异化理论的一些要素。虽然ChatGPT在完成任务时提供了便利和帮助，但学生们表达了对他们主动参与、思维过程和个人观点发展的减少的担忧。这种与学习过程的脱离可以被视为一种异化形式，学生感到与教育体验脱节，并依赖外部工具来完成他们的任务。海德格尔关于技术作为揭示和塑造我们对世界理解手段的观点也可以应用于此处。ChatGPT是一种技术工具，它通过生成想法、提供帮助和自动化某些任务来改变教育格局，揭示新的可能性。然而，学生和教师提出的问题指向了技术以绕过教育基本方面（如批判性思维、个人参与和深入理解）的方式塑造学习过程的潜在危险。再次强调，在教育中深思熟虑和有目的地整合技术，以确保其与教育目标相一致，是必要的。
- en: ChatGPT Unable to Perform Assigned Student Tasks
  id: totrans-638
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT 无法完成分配的学生任务
- en: In exploring the limitations of ChatGPT in completing tasks or assignments,
    the instructor stated, ‘I showed students how to pick up information from the
    final assessment rubric and put it into ChatGPT to see how much of the project
    it could do. Then I got them to look at the weighting in the rubric and identify
    areas in which chatgpt could either not do what was asked e.g. providing visuals,
    or was inefficient e.g. giving very limited information about the forensic linguistics
    of the case, not providing primary source references’ (TFD). In another example,
    the instructor said, ‘Students read articles on advice for writing closing speeches,
    they also asked chatgpt to give advice and cross-referenced it. They made a list
    of this advice. Then they watched two videos of closing speeches, one for the
    prosecution and one for the defence and wrote examples from these speeches matched
    against their advice list. This activity proved to be ChatGPT-proof as they were
    having to write down examples they had heard from a video’ (TFD). Furthermore,
    the instructor recounted, ‘Students had read a paper about how intoxication can
    be detected by acoustic-phonetic analyses and made a list of the main points.
    They then watched a video of Johnny Depp giving an award speech while drunk and
    had to write examples of what he said next to the list of acoustic-phonetic factors
    from the paper. Due to them having to listen to a video to do this, the activity
    was ChatGPT-proof’ (TFD). Furthermore, the instructor commented, ‘Students created
    their projects in any form they wished (poster, video, interview). They used ChatGPT
    to review their work against their rubric. This could only be done if their final
    project had text that could be input. If they used a different medium, this was
    not possible’ (TFD). They also observed that, ‘ChatGPT was unable to do an analysis
    of handwriting from two suicide notes related to Kurt Cobain’ (TFD).
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 在探讨ChatGPT在完成任务或作业中的局限性时，讲师表示：“我向学生展示了如何从最终评估标准中提取信息并将其输入ChatGPT，以查看它能完成多少项目。然后我让他们查看标准中的权重，并识别出chatgpt无法完成所要求的事情的区域，例如提供视觉内容，或者效率低下，例如只提供关于案件法医语言学的非常有限的信息，没有提供原始来源参考”（TFD）。在另一个例子中，讲师说：“学生们阅读了关于撰写闭幕演讲建议的文章，他们也让chatgpt提供建议，并将其交叉引用。他们列出了一份建议清单。然后他们观看了两个闭幕演讲的视频，一个是检方的，一个是辩护方的，并从这些演讲中写出了与他们的建议清单相匹配的例子。这项活动被证明是ChatGPT无法通过的，因为他们不得不写下他们从视频中听到的例子”（TFD）。此外，讲师回忆说：“学生们阅读了一篇关于如何通过声学-语音分析检测醉酒的论文，并列出了主要观点。然后他们观看了一段约翰尼·德普醉酒发表获奖感言的视频，并必须将他说的话的例子写在论文中声学-语音因素列表旁边。由于他们必须听视频来完成这项活动，所以这项活动是ChatGPT无法通过的”（TFD）。此外，讲师评论说：“学生们以他们希望的形式（海报、视频、访谈）创建他们的项目。他们使用ChatGPT来根据他们的标准审查他们的工作。这只能在他们的最终项目有可以输入的文本时才能完成。如果他们使用不同的媒介，这是不可能的”（TFD）。他们还观察到：“ChatGPT无法分析与库尔特·柯本相关的两封自杀遗书的笔迹”（TFD）。
- en: From Christensen's perspective, the limitations of ChatGPT can be seen as its
    inability to fulfil specific jobs or tasks that users are hiring it to do, such
    as providing visuals, detailed data on cases and primary source references. They
    were also unable to hire it to assist with tasks that involved the use of different
    media, such as answering questions related to videos or poster presentations.
    These limitations hindered the users' ability to accomplish their desired goals
    and tasks effectively with the tool. From a Bourdieusian perspective, the limitations
    of ChatGPT may reflect the unequal distribution of cultural capital among users.
    The ability to effectively navigate and utilise ChatGPT's capabilities, such as
    cross-referencing information or critically assessing its outputs, is influenced
    by the possession of cultural capital. Students who have been exposed to educational
    resources and have developed the necessary skills may benefit more from using
    ChatGPT, while those lacking cultural capital may struggle to fully utilise its
    potential. This highlights the role of social inequalities and the reproduction
    of advantage in educational settings. From a Marxist perspective, ChatGPT, as
    a technological tool, may be seen as being shaped by the profit-driven logic of
    capitalism. Its limitations may arise from cost considerations, efficiency requirements
    or the prioritisation of certain tasks over others. These limitations reflect
    the broader dynamics of capitalist technology, where the pursuit of profit and
    market demands may compromise the quality, accuracy and comprehensiveness of the
    outputs. Regarding Heidegger's theories on technology, the limitations of ChatGPT
    reveal the essence of technology as an instrument or tool that has its own limitations
    and cannot replace human capabilities fully. ChatGPT's inability to analyse handwriting
    or handle tasks that require human senses and context demonstrates the importance
    of human presence, interpretation and understanding in certain educational contexts.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 从克里斯滕森的角度来看，ChatGPT的局限性可以看作是其无法完成用户雇佣它来做的特定工作或任务，例如提供视觉内容、案例的详细数据和原始资料引用。它们也无法被雇佣来协助涉及不同媒体的任务，如回答与视频或海报展示相关的问题。这些局限性阻碍了用户有效地使用该工具完成他们期望的目标和任务。从布尔迪厄的角度来看，ChatGPT的局限性可能反映了用户之间文化资本的分布不均。有效导航和使用ChatGPT的能力，如交叉引用信息或批判性地评估其输出，受到文化资本的影响。那些接触过教育资源并发展了必要技能的学生可能从使用ChatGPT中受益更多，而缺乏文化资本的人可能难以充分利用其潜力。这突出了社会不平等和教育环境中优势再生产的作用。从马克思主义的角度来看，作为技术工具的ChatGPT可能被视为受到资本主义利润驱动逻辑的影响。其局限性可能源于成本考虑、效率要求或对某些任务优先于其他任务的考虑。这些局限性反映了更广泛的资本主义技术动态，其中对利润和市场需求的追求可能会损害输出的质量、准确性和全面性。至于海德格尔关于技术的理论，ChatGPT的局限性揭示了技术作为具有自身局限性的工具的本质，它不能完全取代人类能力。ChatGPT无法分析手写内容或处理需要人类感官和上下文的任务，这证明了在某些教育环境中人类存在、解释和理解的重要性。
- en: How ChatGPT May Affect the Roles of Stakeholders
  id: totrans-641
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT可能如何影响利益相关者的角色
- en: Students' experiences with ChatGPT encompassed both advantages and disadvantages.
    On the one hand, it demonstrated proficiency in completing tasks and offered convenience.
    However, concerns arise about its potential to hinder active engagement, critical
    thinking and independent knowledge acquisition. Some students expressed worries
    about overreliance on ChatGPT, which could discourage them from engaging in the
    learning process and developing their own ideas. Additionally, concerns about
    potential misuse, such as outsourcing assignments or facilitating cheating, underscore
    the importance of maintaining assessment authenticity and fostering critical thinking
    skills.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 学生们对ChatGPT的经验包括优点和缺点。一方面，它展示了完成任务的专业能力并提供了便利。然而，人们对其可能阻碍积极参与、批判性思维和独立知识获取的担忧也随之而来。一些学生表达了对过度依赖ChatGPT的担忧，这可能会使他们不愿意参与学习过程并发展自己的观点。此外，对潜在误用的担忧，例如外包作业或促进作弊，强调了保持评估真实性和培养批判性思维技能的重要性。
- en: For instructors, integrating ChatGPT presents new challenges and considerations.
    While it can generate ideas, suggest rubrics and assist in various tasks, careful
    adaptation of assessments is necessary to avoid redundancy and ensure alignment
    with ChatGPT's capabilities. The impact of ChatGPT on in-class activities is also
    a concern, as it may bypass the learning process and hinder effective teaching.
    To address this, instructors need to rethink their approach to in-class activities
    and actively manage ChatGPT's use to ensure students are actively learning and
    not solely relying on the AI tool.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 对于教师来说，整合ChatGPT带来了新的挑战和考虑。虽然它能够生成想法、建议评分标准和协助各种任务，但为了避免冗余并确保与ChatGPT的能力相一致，对评估的谨慎调整是必要的。ChatGPT对课堂活动的影响也是一个担忧，因为它可能会绕过学习过程并阻碍有效的教学。为了解决这个问题，教师需要重新思考他们的课堂活动方法，并积极管理ChatGPT的使用，以确保学生能够积极参与学习，而不是仅仅依赖AI工具。
- en: Furthermore, institutions of higher education must carefully consider the broader
    implications of ChatGPT integration. This will involve re-evaluating literacy
    requirements and assessment practices, with a focus on critical thinking and creativity.
    The successful integration of ChatGPT will require transparency, adaptation and
    AI-proofing activities. Institutions will also need to establish clear policies
    on assessment and plagiarism detection. Balancing AI integration will be essential
    in order to harness its benefits without undermining student learning experiences.
    Therefore, institutions will need to provide proper training to instructors to
    encourage and enable them to embrace new teaching approaches in this AI-driven
    landscape.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，高等教育机构必须仔细考虑ChatGPT整合的更广泛影响。这包括重新评估读写能力要求和评估实践，重点关注批判性思维和创造力。ChatGPT的成功整合需要透明度、适应性和AI防护活动。机构还需要制定关于评估和抄袭检测的明确政策。平衡AI整合将至关重要，以便在不损害学生学习体验的情况下利用其优势。因此，机构需要为教师提供适当的培训，以鼓励并使他们能够在这个AI驱动的环境中采用新的教学方法。
- en: Limitations of a Generalised Bot for Educational Context
  id: totrans-645
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通用机器人应用于教育场景的局限性
- en: The theme ‘Limitations of a Generalised Bot for Educational Context’ explores
    the challenges and shortcomings of using a general-purpose bot in education, including
    gaps in knowledge, disciplinary context limitations and culturally specific database
    issues.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 主题“通用机器人应用于教育场景的局限性”探讨了在教育中使用通用机器人的挑战和不足，包括知识空白、学科背景限制以及文化特定的数据库问题。
- en: Gaps in Knowledge
  id: totrans-647
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 知识空白
- en: One significant caveat of ChatGPT is its reliance on pre-September-2021 knowledge,
    as it does not crawl the web like traditional search engines. This was observed
    in the following instances. The instructor stated, ‘I asked my students to ask
    ChatGPT about the implications for AI and court cases. After this, I gave them
    some recent articles to read about the implications of AI for court cases and
    asked them to make notes. They then compared their notes to ChatGPT's answers.
    The students felt the notes they had made about the implications were more relevant
    than ChatGPT's responses. This may have been because the articles I provided them
    with had been published in late 2022 or early 2023, whereas ChatGPT's database
    only goes up to 2021’ (TFD). In a similar vein, the researcher said, ‘I was interested
    in analysing some of my findings against the PICRAT matrix that I was familiar
    with but has only recently been developed. I asked ChatGPT about this. Three times
    it gave me incorrect information until I challenged it, whereupon it eventually
    responded that it did not know about PICRAT’ (RFD). Interestingly, the concept
    of gaps in knowledge did not emerge prominently in the literature review; therefore,
    we turn to our theorists.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的一个显著缺点是它依赖于2021年9月之前的知识，因为它不像传统搜索引擎那样爬取网络。这在以下实例中得到了观察。教师说：“我让学生向ChatGPT询问AI和法庭案件的影响。之后，我给了他们一些关于AI对法庭案件影响的近期文章，并要求他们做笔记。然后他们比较了自己的笔记和ChatGPT的回答。学生们觉得他们关于影响的笔记比ChatGPT的回答更相关。这可能是因为我提供给他们阅读的文章是在2022年底或2023年初发表的，而ChatGPT的数据库只到2021年”（TFD）。类似地，研究人员说：“我对将我的部分发现与我所熟悉的PICRAT矩阵进行比较感兴趣，但PICRAT是最近才开发的。我向ChatGPT询问了这一点。三次它给了我错误的信息，直到我质疑它，然后它最终回答说它不知道PICRAT”（RFD）。有趣的是，知识空白的概念在文献综述中并没有突出出现；因此，我们转向我们的理论家。
- en: Through Christensen's lens, ChatGPT's limitations in knowledge can hinder its
    ability to adequately serve the job of providing accurate and up-to-date information.
    Users hiring ChatGPT for information-related tasks may find its outdated knowledge
    base unsatisfactory in meeting their needs. This is therefore a constraint on
    ChatGPT's ability to effectively perform the job it is being hired for. The reliance
    on outdated information may reflect the prioritisation of cost-effectiveness and
    efficiency in the development of ChatGPT. Analysing ChatGPT's gaps in knowledge
    through a Heideggerian lens highlights the essence of technology as a human creation
    and the limitations it inherits. ChatGPT, as a technological tool, is bound by
    its programming and training data, which define its knowledge base and capabilities.
    The gaps in knowledge arise from the inherent limitations of the technology itself,
    which cannot transcend the boundaries of its design and training. This perspective
    prompts reflection on the human–technology relationship and raises questions about
    the extent to which AI systems can genuinely meet the needs of the complexities
    of human knowledge and understanding.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角，ChatGPT在知识方面的局限性可能会阻碍其充分提供准确和最新信息的职责。雇佣ChatGPT进行信息相关任务的用户可能会发现其过时的知识库无法满足他们的需求。因此，这是对ChatGPT有效执行其被雇佣职责的能力的一种限制。依赖过时信息可能反映了在ChatGPT开发过程中对成本效益和效率的优先考虑。通过海德格尔的视角分析ChatGPT的知识差距，突显了技术作为人类创造物的本质及其继承的局限性。作为一项技术工具，ChatGPT受限于其编程和训练数据，这些数据定义了其知识库和能力。知识差距源于技术本身的固有局限性，无法超越其设计和训练的边界。这种观点促使人们对人机关系进行反思，并引发关于AI系统在多大程度上能够真正满足人类知识理解的复杂性的疑问。
- en: Disciplinary Context Limitations
  id: totrans-650
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 学科背景局限性
- en: A prominent finding from the data is ChatGPT's limitations in understanding
    specific disciplinary contexts or possessing specialised knowledge in certain
    fields. One student pointed out that ChatGPT's AI might not make judgements in
    the same way a human judge can, given the availability of evidence, which could
    lead to questionable decisions (SFD). Similarly, another student expressed that
    without access to proper sources, a judge, in this case ChatGPT, might struggle
    to make accurate judgements (SFD).
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的一个显著发现是ChatGPT在理解特定学科背景或拥有某些领域的专业知识方面的局限性。一位学生指出，鉴于证据的可用性，ChatGPT的AI可能不会像人类法官那样做出判断，这可能导致有疑问的决定（SFD）。同样，另一位学生表示，如果没有获得适当的来源，法官（在这种情况下是ChatGPT）可能难以做出准确的判断（SFD）。
- en: Alshater (2022) also raised the concern that ChatGPT and similar chatbots may
    lack extensive domain knowledge, particularly in economics and finance. He pointed
    out that, due to the training data used to develop ChatGPT, it might not possess
    deep expertise in specific domains (in his case, economics and finance), which
    therefore limits its ability to accurately analyse and interpret data in these
    areas. Consequently, he warned that using ChatGPT for tasks like data analysis
    or research interpretation in fields where ChatGPT is lacking may lead to errors
    and incomplete analyses. To address this limitation, Alshater suggested users
    should be cautious, employ additional resources or expert knowledge and have human
    oversight to ensure accurate outputs (2022). However, he remains optimistic about
    ongoing advancements in natural language processing and machine learning, which
    he believes could enhance the domain-specific expertise of AI systems like ChatGPT
    in the future.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: Alshater（2022）也提出了担忧，认为ChatGPT和类似的聊天机器人可能缺乏广泛的领域知识，尤其是在经济学和金融学方面。他指出，由于用于开发ChatGPT的训练数据，它可能不具备特定领域（在他的案例中是经济学和金融学）的深入专业知识，这因此限制了其在这些领域准确分析和解释数据的能力。因此，他警告说，在ChatGPT缺乏的领域使用ChatGPT进行数据分析或研究解释等任务可能会导致错误和不完整分析。为了解决这一局限性，Alshater建议用户应谨慎行事，利用额外资源或专业知识，并有人类监督以确保准确输出（2022）。然而，他对自然语言处理和机器学习的持续进步持乐观态度，他相信这将在未来增强像ChatGPT这样的AI系统的领域专业知识。
- en: Through Christensen's lens, ChatGPT fails to adequately address the needs of
    users seeking accurate judgments and in-depth expertise in certain domains. Users
    desire a tool that can effectively analyse and interpret data in these areas,
    but ChatGPT falls short in meeting this specific job to be done. Bourdieu's theory
    is evident in the way students express concerns about the limitations of ChatGPT.
    The possession of specialised knowledge in specific fields is seen as a form of
    cultural capital. Students recognise that relying solely on ChatGPT for complex
    judgments and analyses might not lead to desirable outcomes. Through a Marxist
    lens, the limitations of ChatGPT in certain domains may perpetuate existing social
    structures, wherein expertise and knowledge in these areas are valued and rewarded.
    Reliance on AI systems like ChatGPT for complex tasks could also potentially lead
    to the devaluation of human labour and expertise in these fields. Through a Heideggerian
    lens, the limitations observed in ChatGPT's understanding and domain knowledge
    are rooted in its programming and training data, defining its capabilities. As
    a tool, ChatGPT can only operate within the boundaries of its design and training,
    leading to insufficiencies in human usage.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 通过克里斯滕森的视角来看，ChatGPT未能充分满足寻求在某些领域内准确判断和深入专业知识用户的需要。用户希望有一个能够有效分析和解释这些领域数据的工具，但ChatGPT在这方面未能满足这一特定任务。布迪厄的理论在学生表达对ChatGPT局限性的担忧中得到了体现。在特定领域的专业知识被视为一种文化资本。学生们认识到，仅依赖ChatGPT进行复杂的判断和分析可能不会导致理想的结果。从马克思主义的视角来看，ChatGPT在特定领域的局限性可能会延续现有的社会结构，在这些领域中，专业知识和这些领域的价值得到认可和奖励。依赖像ChatGPT这样的AI系统进行复杂任务也可能导致这些领域中人类劳动和专业知识的价值下降。从海德格尔的视角来看，ChatGPT在理解和领域知识方面的局限性根植于其编程和训练数据，定义了其能力。作为一个工具，ChatGPT只能在设计和训练的边界内运行，导致在人类使用中存在不足。
- en: Culturally Specific Database
  id: totrans-654
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 文化特定数据库
- en: The concept of a culturally specific database in ChatGPT refers to its access
    or training on a database specific to a particular culture or cultural context.
    This can potentially limit its relevance to the individual needs of users. A 2020
    study by the Massachusetts Institute of Technology warns about this, as there
    is the possibility of encoding biases into the technology if the training data
    is overly hegemonic (Grove, 2023). While it is difficult to determine the exact
    composition of ChatGPT's database, it is worth noting that OpenAI and Google (now
    Alphabet Inc.) are based in California, and Microsoft is headquartered in Washington.
    Thus, the involvement of these companies in developing and utilising AI suggests
    a strong connection to American culture and potentially a Western perspective.
    As a result, the cultural context and perspectives of these companies may influence
    the development and training of the AI model.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT中文化特定数据库的概念指的是其在特定文化或文化背景的数据库上的访问或训练。这可能会限制其与用户个人需求的关联性。麻省理工学院在2020年的一项研究对此提出了警告，因为如果训练数据过于霸权（Grove，2023年），则有可能将偏见编码到技术中。虽然难以确定ChatGPT数据库的确切组成，但值得注意的是，OpenAI和谷歌（现在为Alphabet
    Inc.）总部位于加利福尼亚，而微软的总部位于华盛顿。因此，这些公司在开发和利用AI方面的参与表明了与美国文化的紧密联系，以及可能存在的西方视角。因此，这些公司的文化背景和视角可能会影响AI模型的发展和训练。
- en: This concern about cultural specificity was also evident in the data provided
    by the students. One student cautioned against relying on ChatGPT in legal education,
    noting that laws differ across countries and it may not be appropriate to expect
    ChatGPT to provide accurate assistance in such matters (SFD). Another student
    expressed doubts about ChatGPT's ability to offer reliable judgements, citing
    an example where applying English case law to Turkish legal matters led to incorrect
    conclusions (SFD). This issue was also observed in a previously described example
    concerning transgender pronouns in Turkey, where ChatGPT demonstrated a limited
    understanding of the Turkish language and provided incorrect information.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对文化特定性的担忧也在学生提供的数据中有所体现。一位学生警告说，在法律教育中不应过度依赖ChatGPT，指出各国法律不同，不应期望ChatGPT在这些问题上提供准确的帮助（SFD）。另一位学生对ChatGPT提供可靠判断的能力表示怀疑，举了一个例子，即将英国案例法应用于土耳其法律问题导致错误结论（SFD）。在之前描述的关于土耳其跨性别代词的例子中，ChatGPT也表现出对土耳其语言的有限理解，并提供了错误信息。
- en: Surprisingly, the literature did not explicitly address these concerns about
    cultural databases. However, Sullivan et al.'s (2023) study did highlight the
    cultural limitations of their research, which focused on news articles from Australia,
    New Zealand, the United States and the United Kingdom. They pointed out the imbalance
    in academic studies that predominantly analyse Western news, particularly from
    the United States. They warn that this imbalance raises cautionary flags about
    relying solely on Western voices and perspectives when discussing ChatGPT and
    similar technologies. We believe their concerns can also be extrapolated to ChatGPT's
    database.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，文献并没有明确地解决关于文化数据库的这些担忧。然而，Sullivan等人（2023）的研究确实指出了他们研究的文化局限性，该研究主要关注来自澳大利亚、新西兰、美国和英国的新闻文章。他们指出，在学术研究中，主要分析西方新闻，尤其是来自美国的新闻存在不平衡。他们警告说，这种不平衡在讨论ChatGPT和类似技术时，仅依赖西方的声音和观点会引发警示。我们认为他们的担忧也可以推广到ChatGPT的数据库。
- en: When it comes to looking at this issue through the lens of Christensen, the
    concerns raised by the students regarding the cultural specificity of ChatGPT's
    database highlight the potential mismatch between the job they are hiring it to
    do and the capabilities of ChatGPT itself. This misalignment indicates the need
    for improvements in addressing specific user needs and cultural contexts. From
    a Bourdieusian viewpoint, the involvement of AI companies, such as OpenAI, Microsoft
    and Google, primarily based in the United States, suggests a connection to American
    culture and a Western perspective. This cultural capital and habitus shape the
    training and implementation of AI models, potentially encoding biases and limitations
    into the technology. The concerns about the accuracy and relevance of ChatGPT's
    responses in different cultural contexts reflect the influence of cultural capital
    on the AI system's performance. Through a Marxist lens, the concentration of power
    in these companies, along with their Western cultural context, may result in biased
    or limited representations of knowledge and perspectives. Furthermore, Heidegger's
    views on technology prompt us to question the very essence and impact of AI systems
    like ChatGPT. The concerns about cultural specificity and resulting limitations
    raise existential questions about the role and responsibility of AI in human activities.
    Moreover, the constraints posed by ChatGPT's database and potential biases call
    for critical reflection on the essence of AI, its impact on human knowledge and
    decision-making and the ethical considerations surrounding its development and
    use.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 当从Christensen的角度来看待这个问题时，学生关于ChatGPT数据库文化特定性的担忧突显了他们所雇佣的ChatGPT的工作与ChatGPT自身能力之间的潜在不匹配。这种不匹配表明了改进以解决特定用户需求和文化遗产背景的必要性。从布迪厄的观点来看，像OpenAI、微软和谷歌这样的AI公司，主要基于美国，暗示了与美国文化和西方视角的联系。这种文化资本和习惯性塑造了AI模型的培训和实施，可能将偏见和限制编码到技术中。关于ChatGPT在不同文化背景下回答的准确性和相关性的担忧反映了文化资本对AI系统性能的影响。从马克思的视角来看，这些公司权力的集中，以及它们的西方文化背景，可能导致知识和观点的偏见或有限的表现。此外，海德格尔对技术的观点促使我们质疑像ChatGPT这样的AI系统的本质和影响。关于文化特定性和由此产生的局限性的担忧，对AI在人类活动中的角色和责任提出了存在主义问题。此外，ChatGPT的数据库限制和潜在的偏见要求对AI的本质、它对人类知识和决策的影响以及其开发和使用的伦理考量进行批判性反思。
- en: How ChatGPT May Affect the Roles of Stakeholders
  id: totrans-659
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ChatGPT可能如何影响利益相关者的角色
- en: For students, ChatGPT's gaps in knowledge and disciplinary context limitations
    may impact their reliance on the AI system for accurate information and analysis.
    The examples provided by the instructor and researcher demonstrate instances where
    students found their own notes or domain-specific knowledge more relevant than
    ChatGPT's responses. This suggests that students may need to critically evaluate
    and supplement the information provided by ChatGPT with their own expertise or
    additional resources. It also highlights the importance of cultivating their own
    knowledge and critical thinking skills rather than solely relying on AI systems.
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 对于学生来说，ChatGPT在知识和学科背景方面的不足可能会影响他们对AI系统提供准确信息和分析的依赖。教师和研究人员的例子展示了学生发现他们自己的笔记或特定领域的知识比ChatGPT的回答更相关的情况。这表明学生可能需要批判性地评估并补充ChatGPT提供的信息，以他们自己的专业知识或额外资源为依据。这也突出了培养他们自己的知识和批判性思维技能的重要性，而不仅仅是依赖AI系统。
- en: Instructors may need to adapt their teaching approaches and guide students in
    effectively using ChatGPT while being aware of its limitations. They can encourage
    students to question and critically evaluate the information provided by the AI
    system, promoting a deeper understanding of the subject matter. Instructors may
    also need to provide up-to-date resources and incorporate discussions on the limitations
    of AI technologies to enhance students' awareness and discernment.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 教师可能需要调整他们的教学方法，并指导学生在了解ChatGPT局限性的同时有效使用它。他们可以鼓励学生质疑并批判性地评估AI系统提供的信息，促进对学科内容的更深入理解。教师还可能需要提供最新的资源，并纳入关于AI技术局限性的讨论，以增强学生的意识和辨识能力。
- en: Furthermore, this means that institutions of higher education have an important
    role to play in shaping the integration of AI systems like ChatGPT into their
    educational settings, providing guidelines and ethical frameworks for the responsible
    use of AI in education, to ensure that their students are aware of the limitations
    and biases associated with these technologies. Institutions should also foster
    interdisciplinary collaborations and partnerships with industry to address the
    disciplinary context limitations of ChatGPT, facilitating the development of AI
    systems with domain-specific expertise. Additionally, the concerns raised about
    cultural specificity and biases in ChatGPT's database highlight the need for institutions
    to promote cultural diversity and inclusivity in AI purchasing, development and
    utilisation. By incorporating diverse cultural systems, perspectives and datasets,
    institutions can help mitigate the potential biases and limitations, ensuring
    that they better serve the needs of students from various cultural backgrounds.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这也意味着高等教育机构在塑造ChatGPT等AI系统融入其教育环境方面发挥着重要作用，提供关于在教育中负责任使用AI的指南和伦理框架，以确保学生了解这些技术的局限性和偏见。机构还应促进跨学科合作与行业伙伴关系，以解决ChatGPT在学科背景方面的局限性，促进具有特定领域专业知识的AI系统的发展。此外，关于ChatGPT数据库中文化特异性和偏见的担忧，突显了机构在AI采购、开发和利用中推广文化多样性和包容性的必要性。通过纳入多样化的文化体系、观点和数据集，机构可以帮助减轻潜在的偏见和局限性，确保更好地满足来自不同文化背景学生的需求。
- en: In this chapter, we have taken a deep dive into the influence of ChatGPT on
    students, instructors and higher education institutions within the scope of our
    key themes. Throughout our discussion, we have discerned the necessary actions
    that universities should undertake. These encompass ethical considerations, such
    as evaluating AI detection tools, critically assessing AI referencing systems,
    redefining plagiarism within the AI era, fostering expertise in AI ethics and
    bolstering the role of university ethics committees. They also encompass product-related
    matters, including ensuring equitable access to AI bots for all students, fostering
    collaborations with industries, obtaining or developing specialised bots and offering
    prompt engineering courses. Additionally, there are educational ramifications,
    like addressing AI's impact on foundational learning, proposing flipped learning
    as a strategy to navigate these challenges, reimagining curricula to align with
    the AI-driven future, advocating for AI-resilient assessment approaches, adapting
    instructional methods, harnessing the potential of prompt banks and promoting
    AI literacy. Moving forward, in the next three chapters, we discuss the practical
    implications of these findings, grouping them into ethical, product-related and
    educational implications. Thus, while this chapter has outlined the essential
    steps that must be undertaken, the following three chapters present pragmatic
    approaches for putting these actions into practice.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们深入探讨了ChatGPT对我们关键主题范围内对学生、教师和高等教育机构的影响。在讨论过程中，我们辨别出大学应采取的必要行动。这些行动包括道德方面的考虑，如评估AI检测工具、批判性地评估AI引用系统、在AI时代重新定义剽窃、培养AI伦理方面的专业知识以及加强大学伦理委员会的作用。它们还包括与产品相关的事项，包括确保所有学生都能公平地访问AI机器人、与行业合作、获取或开发专业机器人以及提供快速工程课程。此外，还有教育方面的后果，如应对AI对基础学习的影响、提出翻转学习作为应对这些挑战的策略、重新构想课程以适应AI驱动的未来、倡导AI弹性评估方法、调整教学方法、利用提示库的潜力以及促进AI素养。展望未来，在接下来的三章中，我们将讨论这些发现的实际影响，将它们分为道德、产品相关和教育影响。因此，虽然本章概述了必须采取的基本步骤，但接下来的三章将介绍将这些行动付诸实践的实际方法。
- en: Chapter 7
  id: totrans-664
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第七章
- en: Ethical Implications
  id: totrans-665
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 道德影响
- en: Assessing Artificial Intelligence (AI) Detection Tools
  id: totrans-666
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估人工智能（AI）检测工具
- en: 'The ongoing debate in current discourse, as illuminated within the literature
    review, revolves around the incorporation of AI detection tools by universities
    to counteract plagiarism. Sullivan et al. (2023) discussed a variety of available
    tools for this purpose, encompassing OpenAI''s Open Text Classifier, Turnitin,
    GPTZero, Packback, HuggingFace.co, and AICheatCheck. However, reservations were
    expressed concerning the precision and sophistication of these detection mechanisms.
    Rudolph et al. (2023) shed light on the paradoxical nature of utilising AI-powered
    anti-plagiarism software while AI models, such as Chat Generative Pre-trained
    Transformer (ChatGPT), could potentially evade plagiarism detection through sentence
    modifications that lower originality index scores. Similarly, Tlili et al. (2023)
    acknowledged concerns tied to cheating and manipulation with ChatGPT, uncovering
    its role in assisting students with essays and exam responses, which could facilitate
    cheating and circumvent detection. Consequently, a scenario could emerge where
    students are tempted to delegate assignments to ChatGPT or employ it to sidestep
    plagiarism checks, thereby raising questions about the authenticity of their work.
    Given this context, educational institutions and educators are confronted with
    the urgent responsibility of addressing these challenges and devising guidelines
    to regulate the utilisation of AI tools in education. The necessity for robust
    measures to counteract cheating and ensure prevention has become a central concern.
    However, a crucial question arises: Can this be feasibly achieved using the existing
    AI detection tools? Recent research appears to suggest otherwise. A study released
    in June by researchers from European universities brought forward the assertion
    that the existing detection tools lack precision and dependability, displaying
    a predominant inclination to categorise content as human-written rather than detecting
    AI-generated text (Williams, 2023). Prior to this, another study highlighted the
    disproportionate disadvantage faced by non-native English speakers, as their narrower
    vocabularies resulted in elevated penalties compared to native speakers (Williams,
    2023). Furthermore, a separate investigation conducted by scholars from the University
    of Maryland underscored the issue of inaccuracy and demonstrated that detectors
    could be readily circumvented by students employing paraphrasing tools to rephrase
    text initially created by large language models (Williams, 2023). So where does
    this leave universities?'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 当前话语中的持续辩论，正如文献综述中所阐明的那样，围绕着大学采用AI检测工具来对抗剽窃。Sullivan等人（2023）讨论了为这一目的提供的各种工具，包括OpenAI的Open
    Text Classifier、Turnitin、GPTZero、Packback、HuggingFace.co和AICheatCheck。然而，对这些检测机制的精确性和复杂性提出了保留意见。Rudolph等人（2023）揭示了在AI模型，如Chat
    Generative Pre-trained Transformer（ChatGPT）可能通过降低原创性指数分数的句子修改来规避剽窃检测的同时，使用AI驱动的反剽窃软件的矛盾性质。同样，Tlili等人（2023）承认了与ChatGPT相关的作弊和操纵问题，揭示了它在帮助学生撰写论文和考试回答中的作用，这可能促进作弊并规避检测。因此，可能出现一种情况，即学生可能会诱使将作业委托给ChatGPT或使用它来规避剽窃检查，从而引发对其工作真实性的质疑。在这种背景下，教育机构和教育工作者面临着解决这些挑战并制定规范AI工具在教育中使用的指南的紧迫责任。采取强有力的措施来对抗作弊并确保预防已成为一个核心关注点。然而，一个关键问题随之而来：能否通过现有的AI检测工具实现这一点？最近的研究似乎表明并非如此。6月份由欧洲大学的研究人员发布的一项研究表明，现有的检测工具缺乏精确性和可靠性，显示出将内容分类为人类撰写的倾向，而不是检测AI生成的文本（Williams，2023）。在此之前，另一项研究强调了非母语英语使用者在面对不平等劣势时的处境，因为他们的词汇量较窄，与母语使用者相比，他们受到的惩罚更高（Williams，2023）。此外，马里兰大学的研究人员进行的另一项调查强调了不准确的问题，并表明学生可以通过使用改写工具来改写最初由大型语言模型创建的文本，从而轻易地规避检测器（Williams，2023）。那么，这又把大学置于何种境地？
- en: 'To explore this matter further, at our institution, the director of the library
    extended invitations to AI detection tool companies, enabling them to deliver
    presentations on their products. This platform allowed them to demonstrate their
    upgraded tools, followed by interactive question and answer sessions aimed at
    obtaining more profound insights. According to the companies'' claims, they have
    incorporated AI writing detection capabilities into their tools, aiming to assist
    educators in maintaining academic integrity and fairness among students. These
    capabilities include an AI writing indicator that is integrated within the originality
    reports. This indicator provides an overall percentage indicating the likelihood
    of AI-generated content, such as text produced by ChatGPT. Additionally, it generates
    a report highlighting specific segments predicted to be authored by AI. The companies
    emphasise that the AI writing indicator is intended to provide educators with
    data for decision-making based on academic and institutional policies, rather
    than making definitive determinations of misconduct, and caution against solely
    relying on the indicator''s percentage for taking action or as a definitive grading
    measure. Now, the question remains: How do these AI detectors actually work?'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步探讨这个问题，在我们机构，图书馆的主任向AI检测工具公司发出了邀请，使他们能够就他们的产品进行演示。这个平台允许他们展示他们升级的工具，随后进行互动问答环节，旨在获得更深入的见解。根据公司的声明，他们已经将AI写作检测功能整合到他们的工具中，旨在帮助教育者维护学生的学术诚信和公平性。这些功能包括一个集成在原创性报告中的AI写作指示器。该指示器提供了一个整体百分比，表示AI生成内容的可能性，例如ChatGPT产生的文本。此外，它还生成一份报告，突出预测为AI创作的特定段落。公司强调，AI写作指示器的目的是为教育者提供基于学术和机构政策的数据，以便做出决策，而不是做出不端行为的最终判断，并警告不要仅凭指示器的百分比采取行动或作为最终评分标准。现在，问题仍然存在：这些AI检测器实际上是如何工作的？
- en: AI writing detection tools operate by segmenting submitted papers into text
    segments and assessing the probability of each sentence being written by a human
    or generated by AI, providing an overall estimation of the amount of AI-generated
    text. However, unlike traditional plagiarism detection tools that employ text-matching
    software to compare essays against a vast database of existing sources and highlight
    specific matches, AI plagiarism detection tools offer probabilities or likelihoods
    of content being AI-generated, based on characteristics and patterns associated
    with AI-generated text. The proprietary nature of these AI detection systems often
    limits transparency, making it challenging for instructors and institutions to
    verify the accuracy and reliability of what is purported to be AI-generated content.
    This lack of concrete evidence has significant implications, particularly in cases
    where students face plagiarism accusations and legal action, as it becomes more
    difficult to substantiate claims and defend against accusations without explicit
    evidence of the sources.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: AI写作检测工具通过将提交的论文分割成文本段落，并评估每个句子是由人类撰写还是由AI生成，从而提供AI生成文本量的整体估计。然而，与使用文本匹配软件将论文与大量现有来源数据库进行比较并突出特定匹配的传统剽窃检测工具不同，AI剽窃检测工具基于与AI生成文本相关的特性和模式，提供内容被AI生成的内容的概率或可能性。这些AI检测系统的专有性质往往限制了透明度，使得教师和机构难以验证所谓AI生成内容的准确性和可靠性。这种缺乏具体证据的情况具有重大影响，尤其是在学生面临剽窃指控和法律行动的情况下，因为没有明确证据来源，就变得更加难以证实指控和反驳指控。
- en: Two recent cases at the University of California Davis shed light on the challenges
    universities encounter with AI detection software. One case involved William Quarterman,
    a student who received a cheating accusation from his professor after the professor
    used the AI-powered tool GPTZero to analyse Quarterman's history exam for plagiarism
    (Jiminez, 2023). Despite Quarterman's adamant denial, the software supported the
    professor's claim, resulting in a failing grade and a referral for academic dishonesty.
    The subsequent honour court hearing caused significant distress to Quarterman,
    who ultimately proved his innocence and was exonerated. In a similar incident,
    Louise Stivers, a graduating senior, was falsely accused of plagiarism (Klee,
    2023). The investigation revealed a significant limitation in the AI plagiarism
    detection software used at UC Davis – the software had been trained on a narrow
    dataset that failed to account for the diverse writing styles and cultural backgrounds
    of the student body. This highlighted the issue of cultural bias in AI algorithms
    and emphasised the need for more inclusive AI development. As a result of being
    wrongfully accused, Stivers actively collaborated with the university to enhance
    the software's inclusivity and accuracy. Her contribution aimed to foster a fairer
    approach to AI technology in academic settings, ensuring that it better accommodates
    the diverse student population and provides accurate results in detecting plagiarism
    (Klee, 2023).
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 加州大学戴维斯分校最近发生的两个案例揭示了大学在使用人工智能检测软件时遇到的挑战。一个案例涉及威廉·昆特曼，一位学生在教授使用人工智能工具GPTZero分析昆特曼的历史考试以检测剽窃后，被指控作弊（Jiminez，2023年）。尽管昆特曼坚决否认，但软件支持了教授的指控，导致他成绩不及格并被指控学术不诚实。随后的荣誉法庭听证会给昆特曼带来了极大的痛苦，他最终证明了自己的清白并得到了赦免。在类似的事件中，即将毕业的大四学生路易丝·斯蒂弗斯被错误地指控剽窃（Klee，2023年）。调查揭示了加州大学戴维斯分校使用的AI剽窃检测软件的一个重大局限性——该软件在训练时使用的数据集范围狭窄，未能考虑到学生群体的多样化写作风格和文化背景。这突显了AI算法中的文化偏见问题，并强调了需要更多包容性的AI开发。由于被错误指控，斯蒂弗斯积极与大学合作，提高软件的包容性和准确性。她的贡献旨在促进学术环境中对AI技术的公平方法，确保它更好地适应多样化的学生群体，并在检测剽窃时提供准确的结果（Klee，2023年）。
- en: Thus, the decision to use AI detection tools in universities is a topic of concern
    and discussion. Kayla Jiminez (2023) of *USA Today* highlights the advice of educational
    technology experts, cautioning educators about the rapidly evolving nature of
    cheating detection software. Instead of immediately resorting to disciplinary
    action, experts suggest asking students to show their work before accusing them
    of using AI for assignments. Neumann et al. (2023) support this approach and recommend
    a combination of plagiarism checkers and AI detection tools, with manual examination
    as a backup. They stress the importance of thorough reference checks and identifying
    characteristics of AI-generated content. Rudolph et al. (2023) also acknowledge
    the limitations of anti-plagiarism software in detecting ChatGPT-generated text
    and propose building trusting relationships with students and adopting student-centric
    pedagogies and assessments. They discourage a policing approach and emphasise
    assessments for and as learning. At MEF, we concur with this perspective. Based
    on our investigations, we believe that current AI detection tools are not suitable
    for their intended purpose. Instead of relying solely on such tools, we suggest
    implementing alternative supports for assessing students' work, such as one-to-one
    discussions or moving away from written assessments altogether. We believe the
    solution is to ban AI detection tools but not AI itself.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在大学中使用AI检测工具的决定是一个值得关注和讨论的话题。来自《今日美国》的凯拉·吉米内斯（2023年）强调了教育技术专家的建议，警告教育工作者关于作弊检测软件快速发展的性质。专家们建议，在指控学生使用AI完成作业之前，先要求学生展示他们的工作。Neumann等人（2023年）支持这种方法，并建议结合使用剽窃检测器和AI检测工具，以人工检查作为后备。他们强调彻底的参考文献检查和识别AI生成内容特征的重要性。Rudolph等人（2023年）也承认了反剽窃软件在检测ChatGPT生成文本方面的局限性，并建议与学生建立信任关系，采用以学生为中心的教学法和评估方法。他们反对警察式的方法，强调评估作为学习的过程。在MEF，我们同意这种观点。根据我们的调查，我们相信当前的AI检测工具不适合其预期目的。我们建议实施替代支持来评估学生的作业，例如一对一讨论或完全放弃书面评估。我们相信解决方案是禁止AI检测工具，而不是AI本身。
- en: Scrutinising AI Referencing Systems
  id: totrans-672
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 仔细审查人工智能引用系统
- en: The absence of a standard referencing guide for ChatGPT poses significant challenges
    for users in academic contexts, including the lack of provided references and
    established guidelines for referencing ChatGPT-generated information. However,
    we can break down these challenges into three key issues. Firstly, ChatGPT itself
    does not cite the sources it has used. Secondly, users may treat ChatGPT as a
    search engine, requiring them to cite it, but no standard referencing systems
    currently exist. Thirdly, ChatGPT can be used as a tool to develop ideas and improve
    writing, raising the question of whether a referencing system should be used at
    all in such instances.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT缺乏标准的引用指南，这在学术环境中给用户带来了重大挑战，包括缺乏提供的引用和为引用ChatGPT生成信息而建立的指南。然而，我们可以将这些挑战分解为三个关键问题。首先，ChatGPT本身并不引用它所使用的来源。其次，用户可能会将ChatGPT视为搜索引擎，需要他们进行引用，但目前尚无标准引用系统。第三，ChatGPT可以用作开发思想和改进写作的工具，这引发了是否应该在此类情况下使用引用系统的问题。
- en: In addressing the first concern, researchers have been working on developing
    a system for ChatGPT to identify the sources of its information. Rudolph et al.
    (2023) highlight significant progress in this area, such as the creation of the
    prototype WebGPT, providing access to recent and verified sources. Additionally,
    AI research assistants like Elicit assist in locating academic articles and summarising
    scholarly papers from repositories. At our institution, we also tested the beta
    plugin for ChatGPT-4 called ScholarAI, which yielded promising results. ScholarAI
    grants users access to a database of peer-reviewed articles and academic research
    by linking the large language models (LLMs) powering ChatGPT to open access Springer-Nature
    articles. This integration allows direct queries to relevant peer-reviewed studies.
    These advancements aim to bolster the quality and credibility of academic work
    by incorporating up-to-date information and reliable sources. Consequently, we
    believe the responsibility for implementing a source identification system lies
    with the developers, while the responsibility of institutions of higher education
    is to remain updated on these developments.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 针对第一个问题，研究人员一直在努力开发一个系统，以便ChatGPT能够识别其信息来源。Rudolph等人（2023年）强调了该领域的重要进展，例如创建了原型WebGPT，提供了访问最新和验证过的来源。此外，像Elicit这样的AI研究助手有助于定位学术文章和从存储库中总结学术论文。在我们机构，我们还测试了ChatGPT-4的beta插件，名为ScholarAI，取得了令人鼓舞的结果。ScholarAI通过将ChatGPT背后的大型语言模型（LLMs）与开放获取的Springer-Nature文章链接起来，使用户能够访问同行评审文章和学术研究的数据库。这种集成允许直接查询相关的同行评审研究。这些进步旨在通过纳入最新信息和可靠来源来提高学术工作的质量和可信度。因此，我们认为实施来源识别系统的责任在于开发者，而高等学府的责任是保持对这些发展的更新。
- en: Regarding the second concern, which revolves around the absence of a referencing
    model for using ChatGPT as a source of information, it is important to note that
    this issue currently remains unresolved. At the time of writing, there are no
    standard referencing systems specifically designed for ChatGPT or similar AI chatbots.
    However, teams like American Psychological Association (APA) and Modern Language
    Association (MLA) are actively engaged in developing guidelines that address the
    citation and appropriate usage of generative AI tools. In spring 2023, they provided
    interim guidance and examples to offer initial direction. However, before delving
    into the specific efforts of teams like APA and MLA, let's first understand the
    fundamental purpose of referencing sources in an academic paper. Referencing sources
    in an academic paper serves several crucial purposes. Firstly, it allows you to
    give credit to the original authors or creators of the work, acknowledging their
    contributions and ideas. By doing so, you demonstrate that you have engaged with
    existing research and built upon it in your own work. Secondly, referencing supports
    your claims and arguments by providing evidence from reputable sources. This adds
    credibility to your paper and shows that your ideas are well-founded and supported
    by existing literature. Moreover, proper referencing enables readers to verify
    the accuracy and reliability of your information. By following the references
    to the original sources, they can ensure the integrity of your work and establish
    trust in your findings. By citing sources, you showcase your research skills and
    ability to identify relevant and reliable information. It reflects your understanding
    of the field and your contribution to the broader scholarly conversation. Referencing
    also plays a crucial role in avoiding unintentional plagiarism. By properly attributing
    the sources you have used, you demonstrate that you have built upon existing knowledge
    rather than presenting it as your own. Additionally, citing sources contributes
    to the academic community by establishing connections between your work and that
    of others in the field. It fosters an ongoing scholarly discussion and helps shape
    the future of research. Overall, referencing is an integral part of academic integrity,
    ensuring that a paper is well-researched, credible and part of the larger academic
    conversation.
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 关于第二个问题，即围绕将ChatGPT作为信息来源缺乏引用模型的问题，重要的是要注意，这个问题目前尚未解决。在撰写本文时，尚无专为ChatGPT或类似AI聊天机器人设计的标准引用系统。然而，像美国心理学会（APA）和现代语言协会（MLA）这样的团队正在积极制定针对生成式AI工具的引用和适当使用的指南。2023年春季，他们提供了临时指导和示例，以提供初步的方向。但在深入探讨APA和MLA等团队的具体努力之前，我们首先了解在学术论文中引用来源的基本目的是非常重要的。在学术论文中引用来源有几个至关重要的目的。首先，它允许你向作品的原始作者或创作者致以敬意，承认他们的贡献和想法。通过这样做，你表明你已经参与了现有研究，并在自己的工作中在此基础上进行了构建。其次，引用通过提供来自可靠来源的证据来支持你的主张和论点。这增加了你论文的可信度，并表明你的想法是建立在现有文献基础之上的。此外，适当的引用使读者能够验证你信息的准确性和可靠性。通过追踪引用到原始来源，他们可以确保你工作的完整性，并对你发现建立信任。通过引用来源，你展示了你的研究技能和识别相关可靠信息的能力。它反映了你对该领域的理解以及你对更广泛学术对话的贡献。引用还在避免无意中抄袭方面发挥着至关重要的作用。通过正确归属你所使用的来源，你表明你是基于现有知识进行构建，而不是将其作为自己的作品呈现。此外，引用来源有助于建立学术社区，将你的工作与该领域其他人的工作联系起来。它促进了持续的学术讨论，并有助于塑造研究的未来。总的来说，引用是学术诚信的重要组成部分，确保论文是经过充分研究、可信的，并成为更大学术对话的一部分。
- en: With this in mind, let's take a look at what one of the leading citation and
    referencing organisations is suggesting. APA suggests that when incorporating
    text generated by ChatGPT or other AI tools in your research paper, you should
    follow certain guidelines (McAdoo, 2023). They suggest that if you have used ChatGPT
    or a similar AI tool in your research, you should explain its utilisation in the
    method section or a relevant part of your paper. For literature reviews, essays,
    response papers or reaction papers, they suggest describing the tool's usage in
    the introduction and that, in your paper, you should provide the prompt you used
    and include the relevant portion of the text that ChatGPT generated in response.
    However, they warn that it is important to note that the results of a ChatGPT
    ‘chat’ cannot be retrieved by other readers and that, while in APA Style papers,
    non-retrievable data or quotations are typically cited as personal communications,
    ChatGPT-generated text does not involve communication with a person (McAdoo, 2023).
    Therefore, when quoting ChatGPT's text from a chat session, they point out that
    it is more akin to sharing the output of an algorithm. They therefore suggest
    that in such cases, you should credit the author of the algorithm with a reference
    list entry and the corresponding in text citation. They give the following example.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们看看领先的引用和参考文献机构之一提出了什么建议。APA 建议在研究论文中融入 ChatGPT 或其他 AI 工具生成的文本时，应遵循某些指南（McAdoo,
    2023）。他们建议，如果你在研究中使用了 ChatGPT 或类似的 AI 工具，应在方法部分或论文的相关部分解释其使用情况。对于文献综述、论文、回应论文或反应论文，他们建议在引言中描述工具的使用，并在你的论文中提供你使用的提示词，以及
    ChatGPT 生成的相关文本部分。然而，他们警告说，需要注意的是，ChatGPT ‘聊天’的结果无法被其他读者检索到，尽管在 APA 风格的论文中，不可检索的数据或引文通常被引用为个人交流，但
    ChatGPT 生成的文本并不涉及与人的交流（McAdoo, 2023）。因此，当从聊天会话中引用 ChatGPT 的文本时，他们指出这更像是分享算法的输出。因此，他们建议在这种情况下，你应该在参考文献列表中为算法的作者提供条目，并在正文中进行相应的引用。他们给出了以下示例。
- en: When prompted with “Is the left brain right brain divide real or a metaphor?”
    the ChatGPT-generated text indicated that although the two brain hemispheres are
    somewhat specialised, “the notation that people can be characterised as ‘left-brained’
    or ‘right-brained’ is considered to be an oversimplification and a popular myth”
    (OpenAI, 2023).
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 当被提示“左脑右脑的划分是真实的还是一种隐喻？”时，ChatGPT 生成的文本表明，尽管两个大脑半球在某种程度上是专业化的，“将人们描述为‘左脑’或‘右脑’的标记被认为是过度简化和一种流行神话”（OpenAI,
    2023）。
- en: Reference
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 参考文献
- en: OpenAI. (2023). ChatGPT (Mar 14 version) [Large language model]. https://chat.openai.com/chat
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI. (2023). ChatGPT (Mar 14 version) [大型语言模型]. https://chat.openai.com/chat
- en: 'They also suggest that in an APA Style paper, you have the option to include
    the full text of lengthy responses from ChatGPT in an appendix or online supplemental
    materials. They say that ensures that readers can access the precise text that
    was generated, however, they note that it is crucial to document the exact text
    as ChatGPT will produce unique responses in different chat sessions, even with
    the same prompt (McAdoo, 2023). Therefore, they suggest that if you choose to
    create appendices or supplemental materials, you should remember to reference
    each of them at least once in the main body of your paper. They give the following
    example:'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 他们还建议，在 APA 风格的论文中，你可以选择在附录或在线补充材料中包含 ChatGPT 的完整长篇回应。他们说，这确保了读者可以访问生成的确切文本，然而，他们指出，记录确切的文本至关重要，因为
    ChatGPT 在不同的聊天会话中，即使使用相同的提示，也会产生独特的回应（McAdoo, 2023）。因此，他们建议，如果你选择创建附录或补充材料，你应该记得在论文的主体中至少引用它们一次。他们给出了以下示例：
- en: When given a follow-up prompt of “What is a more accurate representation?” the
    ChatGPT-generated text indicated that “different brain regions work together to
    support various cognitive processes” and “the functional specialisation of different
    regions can change in response to experience and environmental factors” (OpenAI,
    2023; see Appendix A for the full transcript).
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 当给出后续提示“更准确的表示是什么？”时，ChatGPT 生成的文本表明“不同的脑区协同工作以支持各种认知过程”，“不同区域的机能专化会随着经验和环境因素的变化而变化”（OpenAI,
    2023；参见附录 A 的完整记录）。
- en: Reference
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 参考文献
- en: OpenAI. (2023). ChatGPT (Mar 14 version) [Large language model]. https://chat.openai.com/chat
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI. (2023). ChatGPT (Mar 14 version) [大型语言模型]. https://chat.openai.com/chat
- en: 'APA also suggests that when referencing ChatGPT or other AI models and software,
    you can follow the guidelines provided in Section 10.10 of the Publication Manual
    (American Psychological Association, 2020, Chapter 10) (McAdoo, 2023). They note
    that these guidelines are primarily designed for software references and suggest
    these can be adapted to acknowledge the use of other large language models, algorithms
    or similar software. They suggest that reference and in text citations for ChatGPT
    should be formatted as follows:'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: APA还建议，在引用ChatGPT或其他AI模型和软件时，可以遵循《出版物手册》第10.10节中提供的指南（美国心理学会，2020年，第10章）（McAdoo，2023）。他们指出，这些指南主要针对软件引用，并建议这些指南可以调整以承认其他大型语言模型、算法或类似软件的使用。他们建议ChatGPT的引用和文中引用应格式化为以下形式：
- en: OpenAI. (2023). ChatGPT (Mar 14 version) [Large language model]. https://chat.openai.com/chat
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI. (2023). ChatGPT (Mar 14 version) [大型语言模型]. https://chat.openai.com/chat
- en: 'Parenthetical citation: (OpenAI, 2023)'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 括号引用：(OpenAI, 2023)
- en: 'Narrative citation: OpenAI (2023)'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事引用：OpenAI (2023)
- en: 'Now, let''s examine APA''s suggestions and critique them based on the fundamental
    purpose of referencing sources in an academic paper: giving credit, supporting
    arguments and claims, enabling verification of source accuracy and demonstrating
    proper research skills. We can do this by posing questions.'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来审视APA的建议，并基于学术论文中引用来源的基本目的——给予认可、支持论点和主张、确保来源准确性的验证以及展示适当的研究技能——对其进行批判。我们可以通过提出问题来实现这一点。
- en: '*When using ChatGPT, is it possible to give credit to the original authors
    or creators by referencing sources in an academic paper?*'
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在使用ChatGPT时，是否可以通过在学术论文中引用来源来给予原始作者或创作者认可？*'
- en: No, ChatGPT itself cannot give credit to original authors or creators in an
    academic paper. As a language model, it lacks the capability to identify or reference
    external sources. Hence, it becomes the researcher's responsibility to ensure
    proper attribution of credit to the original authors or creators of the information
    used in a paper.
  id: totrans-690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不，ChatGPT本身不能在学术论文中给予原始作者或创作者认可。作为一个语言模型，它缺乏识别或引用外部来源的能力。因此，确保在论文中使用的信息的原始作者或创作者得到适当认可的责任落在研究者身上。
- en: '*Is it possible to use ChatGPT to support arguments and claims with evidence
    by citing reputable sources?*'
  id: totrans-691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用ChatGPT通过引用可靠来源的证据来支持论点和主张是否可能？*'
- en: No. ChatGPT can provide responses based on the input it receives, which may
    include references to information or data. However, ChatGPT generates text based
    on the patterns it has learnt from the data it was trained on and does not have
    the ability to verify the credibility or reliability of the sources it may refer
    to. Therefore, researchers should independently verify and cite reputable sources
    to support their arguments and claims.
  id: totrans-692
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不。ChatGPT可以基于接收到的输入提供响应，这可能包括对信息或数据的引用。然而，ChatGPT生成的文本是基于其从训练数据中学到的模式，并且没有能力验证其可能引用的来源的信誉或可靠性。因此，研究者应独立验证并引用可靠的来源来支持他们的论点和主张。
- en: '*Is it possible to use ChatGPT to enable verification of the accuracy and reliability
    of information by providing references to the original sources?*'
  id: totrans-693
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*是否可以使用ChatGPT通过提供原始来源的引用来验证信息的准确性和可靠性？*'
- en: No, ChatGPT does not have the capability to provide references to original sources.
    If information generated by ChatGPT is used in research, it is the researcher's
    responsibility to find and cite the original sources from which the information
    is derived.
  id: totrans-694
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不，ChatGPT没有提供原始来源引用的能力。如果使用ChatGPT生成的研究中包含信息，那么找到并引用这些信息的原始来源是研究者的责任。
- en: '*Can ChatGPT be used to demonstrate research skills by properly referencing
    relevant and reliable sources?*'
  id: totrans-695
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT能否通过正确引用相关和可靠的来源来展示研究技能？*'
- en: No. As a language model, ChatGPT does not have the ability to demonstrate research
    skills or properly reference sources. Therefore, the responsibility for conducting
    thorough research and citing relevant and reliable sources lies with the researcher.
  id: totrans-696
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不。作为一个语言模型，ChatGPT没有能力展示研究技能或正确引用来源。因此，进行彻底研究和引用相关可靠来源的责任在于研究者。
- en: '*Can ChatGPT be used to avoid unintentional plagiarism by citing sources and
    giving credit where it is due?*'
  id: totrans-697
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT能否通过引用来源和给予适当认可来避免无意中的剽窃？*'
- en: No. While ChatGPT may provide responses based on the input it receives, it is
    not equipped to identify or prevent unintentional plagiarism. Therefore, it is
    the researcher's responsibility to ensure that they properly cite and give credit
    to the original sources of information to avoid plagiarism.
  id: totrans-698
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不，尽管ChatGPT可能基于接收到的输入提供响应，但它没有能力识别或预防无意中的剽窃。因此，确保正确引用和给予信息原始来源应有的信用是研究者的责任，以避免剽窃。
- en: '*Can ChatGPT be used to contribute to the academic community by citing existing
    research and establishing connections between a researcher''s work and the work
    of others in the field?*'
  id: totrans-699
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT能否通过引用现有研究和在研究者的工作与该领域其他人的工作中建立联系来为学术社区做出贡献？*'
- en: No. While ChatGPT can provide information based on the input it receives, it
    is not capable of contributing to the academic community by citing existing research
    or establishing connections between works. Therefore, researchers should independently
    conduct literature reviews and cite relevant works to contribute to the academic
    discourse.
  id: totrans-700
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不，尽管ChatGPT可以基于接收到的输入提供信息，但它无法通过引用现有研究或建立作品之间的联系来为学术社区做出贡献。因此，研究者应独立进行文献综述并引用相关作品，以贡献于学术讨论。
- en: The resounding answer to all the questions we posed above is a definitive ‘no’.
    While we acknowledge APA's well-intentioned efforts to address academic integrity
    concerns by suggesting ways to cite ChatGPT, we find their recommendations unfit
    for purpose. If the goal of referencing is to enable readers to access and verify
    primary sources, APA's suggestions do not align with this objective. They merely
    indicate that ChatGPT was utilised, which demonstrates the writer's academic integrity
    but does not provide any practical value to the reader. In fact, based on this,
    we believe that ChatGPT, in its current form, should be likened to Wikipedia –
    a useful tool as a starting point for research, but not to be used as a valid
    source for research. Therefore, we believe that to ensure the validity of the
    research, ChatGPT should be seen as a springboard for generating ideas, from which
    the researcher can then seek out primary sources to support their ideas and writing.
    Hence, it would be more beneficial for researchers to simply cite the sources
    they have fact-checked, as this approach provides valuable information to the
    reader.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们上面提出的所有问题，响亮的回答是一个明确的“不”。虽然我们承认APA出于良好意愿，试图通过建议引用ChatGPT的方式来解决学术诚信问题，但我们发现他们的建议不适合这一目的。如果引用的目标是使读者能够访问和验证原始资料，那么APA的建议并不符合这一目标。它们仅仅表明使用了ChatGPT，这证明了作者的学术诚信，但并没有为读者提供任何实际价值。事实上，基于这一点，我们认为，在目前的形态下，ChatGPT应该被比作维基百科——作为一个研究起点的有用工具，但不应该作为研究的有效来源。因此，我们认为，为了确保研究的有效性，ChatGPT应被视为一个激发想法的跳板，研究者可以从这个跳板出发，寻找支持他们想法和写作的原始资料。因此，对研究者来说，简单地引用他们已经核实过的来源会更有益，因为这种方法为读者提供了有价值的信息。
- en: 'Now, let''s address our third area of concern, which revolves around ChatGPT
    being used as a tool for idea development and writing enhancement. This raises
    the question of whether a referencing system is applicable in such instances.
    To shed light on this matter, we explore MLA''s suggestions on how to reference
    ChatGPT when it serves as a writing tool. MLA suggests that you should: ‘cite
    a generative AI tool whenever you paraphrase, quote, or incorporate into your
    own work any content (whether text, image, data, or other) that was created by
    it; acknowledge all functional uses of the tool (like editing your prose or translating
    words) in a note, your text, or another suitable location; take care to vet the
    secondary sources it cites’ (*How Do I Cite Generative AI in MLA Style?*, n.d.).
    In our previous discussion, we have already addressed the third point. If you
    need to verify the secondary sources cited by ChatGPT, why not simply use those
    vetted sources in your citation and referencing, as this is more helpful for the
    reader. However, we still need to explore the other aspects concerning the recommendation
    to cite an AI generative tool. For instance, when paraphrasing or using the tool
    for functional purposes like editing prose or translating words, how should this
    be implemented in practice? In order to do this, let''s explore how ChatGPT has
    been utilised in the writing of this book. Notably, ChatGPT was not used as a
    search engine, evident from the majority of our referenced articles and papers
    being published after September 2021, which is ChatGPT''s cutoff for new information.
    However, it played a significant role in the research process, as documented in
    the researcher-facing diary and integrated into the write up of this book. While
    we''ve already discussed its role in the research methodology and through examples
    in the findings and interpretation chapter, we now focus specifically on how ChatGPT
    contributed to the writing process of this book. To illustrate the full scope
    of its assistance, we revisit Bloom''s Taxonomy, which provides a useful framework
    for mapping the most commonly used phrases we employed with ChatGPT during the
    writing phase.'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们解决我们的第三个关注点，这个关注点围绕着将ChatGPT用作思想发展和写作增强的工具。这引发了关于在这种情况下是否适用引用系统的问题。为了阐明这个问题，我们探讨了MLA关于如何引用作为写作工具的ChatGPT的建议。MLA建议您：“每当您引用、引用或将其内容（无论是文本、图像、数据或其他）纳入您自己的工作时，都应该引用生成式AI工具；在注释、您的文本或另一个合适的位置中承认该工具的所有功能用途（如编辑您的散文或翻译单词）；仔细审查它引用的二手资料”(*如何以MLA风格引用生成式AI？*,
    n.d.)。在我们之前的讨论中，我们已经解决了第三个问题。如果您需要验证ChatGPT引用的二手资料，为什么不直接使用这些经过审查的资料进行引用和参考文献，这对读者更有帮助。然而，我们仍然需要探讨关于建议引用AI生成工具的其他方面。例如，在改写或使用该工具进行功能用途（如编辑散文或翻译单词）时，如何在实践中实施？为了做到这一点，让我们探讨ChatGPT是如何被用于这本书的写作中的。值得注意的是，ChatGPT并没有被用作搜索引擎，这从我们引用的大部分文章和论文都是在2021年9月之后发表的可以看出，这是ChatGPT对新信息截止的时间点。然而，它在研究过程中发挥了重要作用，正如研究人员日记中所记录的，并整合到这本书的撰写中。虽然我们已经讨论了它在研究方法和通过发现和解释章节中的例子中的作用，但我们现在专注于ChatGPT如何具体地促进了这本书的写作过程。为了说明其全部帮助范围，我们回顾了布鲁姆的分类法，它为我们提供了一个有用的框架，用于映射我们在写作阶段与ChatGPT一起使用的最常用短语。
- en: Remembering
  id: totrans-703
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆
- en: –Reword this paragraph to improve its coherence.
  id: totrans-704
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –重写这个段落以提高其连贯性。
- en: –Slightly shorten this section to enhance readability.
  id: totrans-705
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –略微缩短这一部分以提高可读性。
- en: –Summarise the key arguments presented in this article.
  id: totrans-706
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –总结这篇文章中提出的核心论点。
- en: Understanding
  id: totrans-707
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解
- en: –Explain the main ideas in this text using simpler language.
  id: totrans-708
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –使用更简单的语言解释这篇文本中的主要观点。
- en: –Paraphrase the content of this article.
  id: totrans-709
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –改写这篇文章的内容。
- en: –Shorten this text but keep its core concepts.
  id: totrans-710
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –缩短这段文本，但保留其核心概念。
- en: Analysing
  id: totrans-711
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析
- en: –Evaluate the strengths and weaknesses of this theory and propose ways to reinforce
    its main points.
  id: totrans-712
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –评估这个理论的优缺点，并提出加强其主要观点的方法。
- en: –Analyse this text through the lens of (this theorist).
  id: totrans-713
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –从（这位理论家）的角度分析这篇文章。
- en: –Assess the effectiveness of this argument and suggest improvements to make
    it more impactful.
  id: totrans-714
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –评估这个论点的有效性，并提出改进建议以增强其影响力。
- en: Evaluating
  id: totrans-715
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估
- en: –Critically assess the clarity of this text and rephrase it for better comprehension.
  id: totrans-716
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –批判性地评估这篇文本的清晰度，并重新措辞以改善理解。
- en: –Evaluate the impact of this section and propose a shorter version that retains
    its persuasive strength.
  id: totrans-717
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –评估这一部分的影响，并提出一个更简短的版本，同时保留其说服力。
- en: Creating
  id: totrans-718
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建
- en: –Provide a more concise version of this text while retaining its core meaning.
  id: totrans-719
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –提供这个文本的一个更简洁的版本，同时保留其核心意义。
- en: –Summarise this chapter in a concise manner while retaining its key findings.
  id: totrans-720
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –以简洁的方式总结本章，同时保留其关键发现。
- en: Have we referenced all instances of the examples above? No. And there are reasons
    for this. As discussed in the findings, it's crucial to go through multiple iterations
    when using ChatGPT. This raises the question of whether we should reference all
    the iterations or only the final one. Additionally, ChatGPT was a constant tool
    throughout the writing of this book. If we were to reference every instance, following
    MLA's suggestion, the book would likely become five times longer and mostly consist
    of references, which would not be beneficial to the reader. Considering that one
    of the purposes of referencing is to aid the reader, MLA's suggestions seem unsuitable
    for this purpose. Indeed, referencing every instance of ChatGPT use would be akin
    to a mathematician citing each time they used a calculator, rendering the referencing
    of it impractical. Similarly, other writing tools like Grammarly have not been
    subject to such exhaustive referencing expectations. Following on from our mathematics
    example, it should be noted that AI chatbots, including ChatGPT, have been likened
    to calculators for words. However, we find this view a little simplistic. Unlike
    calculators, AI chatbots have advanced capabilities that extend beyond basic tasks,
    reaching higher levels of Bloom's Taxonomy, such as applying, analysing, evaluating
    and creating, thereby fulfilling tasks that are usually considered to part and
    parcel of what it means to be a writer. This leads us to ask, what does it mean
    to be a writer in the days of AI?
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 我们是否已经引用了上述所有示例？不，这是有原因的。正如在研究结果中讨论的那样，在使用ChatGPT时进行多次迭代至关重要。这引发了一个问题：我们应该引用所有迭代还是只引用最终版本。此外，ChatGPT是这本书写作过程中的一个持续使用的工具。如果我们按照MLA的建议，引用每一个实例，这本书可能会变得五倍之长，大部分内容将是参考文献，这对读者来说并不利。考虑到引用的一个目的是帮助读者，MLA的建议似乎不适合这个目的。确实，引用ChatGPT的每一个使用实例，就像数学家每次使用计算器时都要引用一样，使得引用变得不切实际。同样，其他写作工具如Grammarly也没有受到如此详尽的引用期望。继续我们的数学例子，应该注意的是，包括ChatGPT在内的AI聊天机器人被比作文字计算器。然而，我们发现这种观点有些简单化。与计算器不同，AI聊天机器人具有超越基本任务的高级功能，达到布卢姆分类法的高层次，如应用、分析、评估和创造，从而完成通常被认为是作家身份一部分的任务。这让我们思考，在AI时代，成为一名作家意味着什么？
- en: In the era of AI, the role of a writer takes on a whole new dimension, with
    AI models now capable of performing tasks that were traditionally considered the
    sole domain of human writers. This blurs the lines between human creativity and
    AI assistance, raising concerns about potential loss of human agency in the writing
    process, as evidenced in the Hollywood script writers strike, which also highlights
    the risk of significant job losses. One of the key challenges of relying solely
    on AI for writing is that it heavily relies on previous input, potentially stifling
    new thoughts, developments and creativity. To avoid these issues, we believe being
    a writer in the AI era requires embracing a collaborative approach between human
    intellect and AI technology. Instead of replacing human writers, AI can be harnessed
    as a supportive tool. Writers now have the opportunity to utilise AI tools to
    enhance various aspects of the writing process, such as idea generation, content
    organisation and language refinement. By offloading repetitive and time-consuming
    tasks to AI, writers can dedicate more attention to crafting compelling narratives,
    conducting in-depth analyses and expressing unique perspectives. They should also
    actively maintain their critical thinking abilities and originality, ensuring
    that AI assistance complements and augments their creative expression, rather
    than replacing it. We believe that, ultimately, being a writer in the AI era involves
    striking a balance between leveraging the opportunities AI technology provides
    and preserving the essential human aspects of creativity and originality in the
    writing process. This is exactly what we have done in this book. However, finding
    this equilibrium between human writers and AI remains a significant challenge
    and will shape the future landscape of writing in ways that are yet to be fully
    realised.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能时代，作家的角色获得了全新的维度，因为现在的AI模型能够执行传统上被认为是人类作家专属的任务。这模糊了人类创造力和AI辅助之间的界限，引发了关于写作过程中人类能动性可能丧失的担忧，正如好莱坞剧本作家罢工所体现的，这也突显了重大失业风险。仅依赖AI进行写作的一个关键挑战是，它严重依赖于以往输入，可能会压制新思想、发展和创造力。为了避免这些问题，我们认为在人工智能时代成为一名作家需要拥抱人类智慧与AI技术之间的协作方法。AI不应取代人类作家，而应作为一种辅助工具被利用。作家现在有机会利用AI工具来提升写作过程的各个方面，如创意生成、内容组织和语言润色。通过将重复和耗时的工作交给AI，作家可以更多地关注构建引人入胜的叙事、进行深入分析和表达独特观点。他们还应该积极维护自己的批判性思维能力和原创性，确保AI辅助能够补充和增强他们的创造性表达，而不是取代它。我们相信，最终，在人工智能时代成为一名作家意味着在利用AI技术提供的机遇与保留写作过程中创造力和原创性的基本人类方面之间找到平衡。这正是我们在本书中所做的。然而，在人类作家和AI之间找到这种平衡仍然是一个重大挑战，并将以尚未完全实现的方式塑造写作的未来格局。
- en: Rethinking Plagiarism in the Age of AI
  id: totrans-723
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在人工智能时代重新思考剽窃问题
- en: Throughout this chapter, our exploration has centred on AI detector tools, revealing
    their inability to meet intended expectations. Additionally, we've examined the
    emerging guidelines for referencing AI chatbots, such as ChatGPT, and determined
    their inadequacy. This, therefore, raises questions about how we deal with plagiarism
    in light of these new challenges. However, it's important to acknowledge that
    the new challenge posed by plagiarism in the AI era is not unfamiliar in academia.
    Over the years, with the advent of new technologies, similar situations have arisen,
    most notably following the launch of Wikipedia in 2001, followed by the rise of
    contract cheating sites. These events required institutions to recalibrate their
    understanding of academic work and research paradigms. Today, as work produced
    by AI becomes a fact of life, universities find themselves faced with the task
    of adjusting their regulations, expectations and perspectives to accommodate these
    technological breakthroughs. But before we proceed further in this discussion,
    it's crucial to understand the core concept of plagiarism.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的整个探讨过程中，我们的研究焦点集中在AI检测工具上，揭示了它们无法满足预期的能力。此外，我们还考察了针对AI聊天机器人（如ChatGPT）的参考指南，并确定了其不足之处。因此，这引发了关于如何应对这些新挑战下的剽窃问题的疑问。然而，重要的是要认识到，在AI时代，剽窃带来的新挑战在学术界并不陌生。多年来，随着新技术的出现，类似的情况已经出现，最显著的是在2001年维基百科推出之后，随后是合同作弊网站的兴起。这些事件要求机构重新调整其对学术工作和研究范式的理解。如今，随着AI产生的作品成为生活的一部分，大学发现自己面临着调整其规定、期望和视角以适应这些技术突破的任务。但在我们进一步讨论之前，理解剽窃的核心概念至关重要。
- en: Plagiarism constitutes the act of using another's work or ideas without giving
    them appropriate recognition, often with the aim to present it as one's own creation.
    This could involve directly copying and pasting text from a source without citation,
    closely paraphrasing another's work or even submitting someone else's entire work
    as your own. Many sectors, including academia and journalism, view plagiarism
    as a severe ethical breach. However, plagiarism is not always a deliberate act.
    It can occur accidentally, particularly if there is a lack of due diligence or
    understanding about what constitutes plagiarism, how to cite correctly or the
    correct way to paraphrase and reference. Until now, students have had clear guidelines
    on how to cite and reference sources. They have also had the option to utilise
    plagiarism detectors to review their work and make necessary modifications. However,
    the advent of AI chatbots has complicated the situation. There are currently no
    universally accepted referencing guidelines for citing AI, and the reliability
    of AI-based detector tools is questionable. And if plagiarism is defined as the
    act of utilising another's work or ideas without giving them due acknowledgement,
    how does this definition evolve when the work in question is created by an AI
    and not a human? This paradigm shift blurs the traditional understanding of plagiarism
    and introduces the concept of ‘appropriating’ work from an AI, which, unlike humans,
    doesn't possess identifiable authorship or an individual identity. Interestingly,
    it could be posited that the AI chatbots themselves could be seen as ‘appropriating’
    all the information they generate without crediting the original authors. Thus,
    a conundrum emerges where students may be using AI in an unethical manner without
    referencing it, whilst the AI itself is using information without appropriate
    citation. It is this very conundrum that leads to the multitude of challenges
    we are currently grappling with, concerning how we can even cite and reference
    AI. So, the question arises, where does this new reality place students and academics?
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 抄袭是指未经适当认可而使用他人的作品或思想的行为，通常目的是将其呈现为自己的创作。这可能包括直接从来源复制粘贴文本而不注明出处，紧密地改写他人的作品，甚至提交他人的全部作品作为自己的作品。许多领域，包括学术界和新闻界，都将抄袭视为严重的道德违规行为。然而，抄袭并不总是故意的。它可能意外发生，尤其是如果缺乏适当的尽职调查或对构成抄袭、正确引用或正确改写和引用的方式缺乏理解。到目前为止，学生有明确的指南来了解如何引用和参考来源。他们也有利用抄袭检测器来审查自己的作品并进行必要修改的选择。然而，AI聊天机器人的出现使得情况变得复杂。目前还没有普遍接受的引用AI的参考指南，基于AI的检测工具的可靠性也值得怀疑。如果抄袭被定义为未经适当认可而利用他人的作品或思想的行为，那么当涉及的作品是由AI而非人类创作时，这种定义如何演变？这种范式转变模糊了传统对抄袭的理解，并引入了从AI“剽窃”作品的概念，而AI与人类不同，不具有可识别的作者身份或个人身份。有趣的是，可以提出AI聊天机器人本身可以被视为“剽窃”它们生成的一切信息，而不给原始作者以信用。因此，出现了一个困境，即学生可能在不引用的情况下以不道德的方式使用AI，而AI本身在使用信息时却没有适当的引用。正是这个困境导致了我们目前面临的众多挑战，关于我们如何甚至引用和参考AI。因此，问题出现了，这种新的现实将学生和学者置于何地？
- en: Neumann et al. in their 2023 study, acknowledged the existence of several pending
    inquiries that need further exploration, such as, ‘Should text generated by ChatGPT
    be considered a potential case of plagiarism?’, ‘How ought one to reference text
    produced by ChatGPT?’ and ‘What is an acceptable ratio of ChatGPT-generated text
    relative to the overall content?’. However, they also recognised that numerous
    other questions will inevitably emerge. Despite these considerations, given the
    current circumstances, especially the inherent issues with AI, namely their lack
    of citation for their own sources, these queries appear somewhat naive. Perhaps
    it would be more beneficial to explore alternative strategies. This could potentially
    involve designing assignments in a way that circumvents the plagiarism issue,
    a topic we discuss later in Chapter 9\. Alternatively, we may need to concentrate
    our efforts on fostering AI ethical literacy, a promising emerging field.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: Neumann等人在其2023年的研究中，承认存在一些需要进一步探索的悬而未决的问题，例如，“由ChatGPT生成的文本是否应被视为潜在的剽窃案例？”、“应该如何引用ChatGPT生成的文本？”以及“ChatGPT生成的文本与整体内容的可接受比例是多少？”然而，他们也认识到，不可避免地会涌现出许多其他问题。尽管有这些考虑，鉴于当前情况，尤其是人工智能固有的问题，即它们对自己的来源缺乏引用，这些问题似乎有些天真。也许探索替代策略会更有益。这可能涉及以规避剽窃问题的方式设计作业，这是我们将在第9章中讨论的主题。或者，我们可能需要集中精力培养人工智能伦理素养，这是一个有希望的新兴领域。
- en: Cultivating Proficiency in AI Ethics
  id: totrans-727
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 培养人工智能伦理的熟练度
- en: Academic integrity lies at the core of ethical academic practice. It is composed
    of a set of guiding principles and conduct that nurtures honesty and ethical behaviour
    within the academic community. This moral compass or ethical code of academia
    embodies values such as honesty, trust, fairness, respect and responsibility.
    From a practical perspective, academic integrity manifests when both students
    and faculty members refrain from dishonest activities such as plagiarism, cheating
    and fabrication or falsification of data. They are anticipated to own their work,
    acknowledge others for their contributions, and treat all academic community members
    with respect. The goal of upholding academic integrity is to cultivate an environment
    that fosters intellectual curiosity and growth while ensuring that everyone's
    work is acknowledged and valued. It holds a crucial role in affirming the quality
    and reliability of the educational system and the research it generates. However,
    as discussed above, the incorporation of new advancements in AI into this environment
    presents complex challenges. As such, it appears imperative that the notion of
    academic integrity advances in parallel with these breakthroughs in AI, with numerous
    voices, including Sullivan et al. (2023) advocating for an amplified emphasis
    on AI ethics literacy. This would mean reshaping the tenets of academic integrity
    to cater to the unique challenges and opportunities presented by this game-changing
    technology. But what exactly is AI ethics literacy?
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 学术诚信是道德学术实践的核心。它由一系列指导原则和行为组成，这些原则和行为在学术社区中培养诚实和道德行为。这个道德指南或学术伦理规范体现了诸如诚实、信任、公平、尊重和责任等价值观。从实际角度来看，学术诚信体现在学生和教师都避免不诚实的行为，如剽窃、作弊和伪造或篡改数据。他们应拥有自己的作品，承认他人的贡献，并以尊重的态度对待所有学术社区成员。维护学术诚信的目标是培养一个既能激发知识好奇心和成长，又能确保每个人的作品得到认可和重视的环境。它在确认教育系统及其产生的科研质量与可靠性方面发挥着至关重要的作用。然而，正如上文所述，将人工智能的新进展融入这一环境带来了复杂的挑战。因此，似乎有必要使学术诚信的理念与人工智能的突破同步发展，包括Sullivan等人（2023）在内的许多声音都主张加强对人工智能伦理素养的重视。这意味着重塑学术诚信的原则，以适应这一颠覆性技术带来的独特挑战和机遇。但究竟什么是人工智能伦理素养？
- en: AI ethics literacy encapsulates the ability of users to apply ethical considerations
    and principles in the utilisation of AI technologies. This concept underlines
    the importance of understanding the intricacies of AI systems, their strengths
    and limitations, in order to make informed decisions. Simultaneously, it requires
    the awareness of potential ethical concerns that can stem from AI usage, such
    as bias, transparency issues, privacy breaches and accountability. The essence
    of AI ethics literacy is embedded in the critical thinking process, which pushes
    individuals to question the usage, benefits, potential harm and the inequities
    that may arise from AI implementation. It underscores the necessity of utilising
    AI responsibly, respecting individuals' rights and privacy, and discerning scenarios
    where AI application may be detrimental or unethical. Furthermore, it invites
    an element of advocacy and activism, championing for ethically sound AI practices
    and regulations, while actively opposing harmful AI implementations. As AI technologies
    continue to evolve and permeate various domains, cultivating AI ethics literacy
    grows increasingly crucial. It serves as a conduit to ensure AI technologies are
    wielded in an ethical and responsible manner, upholding human rights while advocating
    for fairness and transparency. We delve deeper into this topic later in Chapter
    9, where we discuss the importance of AI literacy training for both students and
    educators. However, the most logical starting point to address these concerns
    is likely through established university ethics committees.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能伦理素养涵盖了用户在利用人工智能技术时应用伦理考虑和原则的能力。这一概念强调了理解人工智能系统复杂性、其优势和局限性的重要性，以便做出明智的决定。同时，它还需要意识到可能源自人工智能使用的潜在伦理问题，例如偏见、透明度问题、隐私泄露和问责制。人工智能伦理素养的精髓嵌入在批判性思维过程中，这促使个人质疑人工智能的使用、益处、潜在危害以及可能由人工智能实施产生的不公平性。它强调了负责任地利用人工智能、尊重个人权利和隐私以及辨别人工智能应用可能有害或不道德的场景的必要性。此外，它还邀请了一种倡导和行动主义元素，支持符合伦理的人工智能实践和法规，同时积极反对有害的人工智能实施。随着人工智能技术持续发展和渗透到各个领域，培养人工智能伦理素养变得越来越重要。它作为确保人工智能技术以道德和负责任的方式被使用的渠道，维护人权的同时倡导公平和透明。我们将在第9章中更深入地探讨这个话题，其中我们讨论了为学生和教师提供人工智能素养培训的重要性。然而，解决这些问题的最合理起点可能是通过现有的大学伦理委员会。
- en: Enhancing the Role of University Ethics Committees
  id: totrans-730
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加强大学伦理委员会的作用
- en: Chapter 2 delved into the rapid evolution of AI ethics, highlighting how the
    rise of generative AI systems has spurred urgency in addressing issues like fairness,
    bias, and ethics. Heightened concerns about discrimination and bias, particularly
    in conversational AI and image models, have prompted ethical inquiries. Nevertheless,
    as we have seen, proactive measures are being taken, with increased research,
    industry involvement and a surge of conferences and workshops focusing on fairness
    and bias, with concepts such as interpretability and causal inference gaining
    prominence in these discussions. At the same time, privacy issues linked to AI
    have initiated discussions on privacy safeguards. Furthermore, worries about how
    generative AI uses opaque surveillance data have also emerged, raising copyright
    and creator-related concerns. This intricate ethical landscape is expanding as
    AI becomes more ingrained in society, necessitating careful oversight beyond technical
    aspects. In light of this complexity, we advocate for an expanded role for university
    ethics committees. Traditionally focused on human research and medical ethics,
    we believe these committees should expand their remit to encompass various dimensions
    related to AI adoption in education. We believe this should entail evaluating
    issues such as student data privacy, algorithmic biases, transparency and human-AI
    interactions. We believe ethics committees should also be working towards ensuring
    AI systems' transparency in educational contexts, assessing the inclusivity of
    AI-generated content and facilitating informed consent for student data use. They
    should also be leading research into AI's ethical implications in education, including
    AI-supported learning, content biases and overall student impact. Beyond academia,
    broader ethical concerns encompass privacy, consent and intellectual property.
    Using AI tools for student work requires compliance with regulations, such as
    the EU's General Data Protection Regulations (GDPR). Ethical dilemmas also arise
    from researchers' and students' use of AI, raising questions about academic integrity
    and ownership of AI-generated outcomes. Ownership rights regarding information
    in AI systems, especially in innovative areas like product development or patent
    creation, present complex challenges. These intricate ethical considerations underscore
    the essential role of university ethics committees in navigating AI's integration
    in education and research. Their expanded responsibilities will demand vigilance,
    adaptability and robust ethical guidelines to ensure AI's ethical advancement
    while upholding values of privacy, fairness and intellectual ownership.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章深入探讨了人工智能伦理的快速演变，突出了生成式人工智能系统的兴起如何促使我们迫切地解决公平性、偏见和伦理等问题。对歧视和偏见的担忧，尤其是在对话式人工智能和图像模型中，引发了伦理上的探讨。然而，正如我们所见，正在采取主动措施，包括增加研究、行业参与以及大量关注公平性和偏见的会议和研讨会，其中解释性和因果推理等概念在这些讨论中变得突出。同时，与人工智能相关的隐私问题也引发了关于隐私保护措施的讨论。此外，对生成式人工智能如何使用不透明的监控数据的担忧也出现了，引发了版权和创作者相关的问题。随着人工智能在社会中更加根深蒂固，这个复杂的伦理景观正在扩展，需要超越技术方面的仔细监管。鉴于这种复杂性，我们主张大学伦理委员会发挥更广泛的作用。传统上专注于人类研究和医学伦理，我们认为这些委员会应该扩大其职责范围，涵盖与教育中人工智能采用相关的各个方面。我们相信这应该包括评估学生数据隐私、算法偏见、透明度和人机交互等问题。我们相信伦理委员会还应致力于确保人工智能系统在教育环境中的透明度，评估人工智能生成内容的包容性，并促进学生数据使用的知情同意。他们还应领导研究人工智能在教育中的伦理影响，包括人工智能辅助学习、内容偏见和整体学生影响。在学术界之外，更广泛的伦理问题包括隐私、同意和知识产权。使用人工智能工具进行学生工作需要遵守规定，例如欧盟的通用数据保护条例（GDPR）。研究人员和学生使用人工智能也引发了道德困境，提出了关于学术诚信和人工智能生成成果所有权的疑问。关于人工智能系统中信息的所有权权利，特别是在产品开发或专利创造等创新领域，提出了复杂挑战。这些复杂的伦理考量凸显了大学伦理委员会在引导人工智能在教育和研究中的整合中的基本作用。他们扩大的责任将需要警觉性、适应性和稳健的伦理准则，以确保人工智能的道德进步，同时维护隐私、公平和知识产权的价值。
- en: Within this chapter, we have explored several ethical ramifications associated
    with AI chatbots. These include concerns with AI detection tools, complications
    regarding AI ChatGPT referencing, redefining plagiarism in the AI era, fostering
    AI ethics literacy and the expansion of university ethics committees. Looking
    ahead, the next chapter delves into the implications regarding products.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了与AI聊天机器人相关的几个伦理影响。这包括对AI检测工具的担忧、关于AI ChatGPT引用的复杂性、在AI时代重新定义剽窃、培养AI伦理素养以及大学伦理委员会的扩展。展望未来，下一章将深入探讨产品的影响。
- en: Chapter 8
  id: totrans-733
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第8章
- en: Product Implications
  id: totrans-734
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 产品影响
- en: Ensuring Fair Access to Bots
  id: totrans-735
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确保对机器人的公平访问
- en: Ensuring equitable access to artificial intelligence (AI) bots within universities
    is a crucial consideration to prevent creating a digital divide among students.
    At MEF, we have effectively addressed similar concerns with other applications
    like digital platforms and massive open online courses (MOOCs). Our strategy involves
    procuring institutional licences that encompass all students. This approach has
    proven successful in achieving fair access. Presently, we are aiming to extend
    this approach to AI chatbots. However, it's worth noting that at the moment, specific
    institutional agreements tailored for Chat Generative Pre-trained Transformer
    (ChatGPT) are not available, leading us to explore alternative avenues. One potential
    solution we are actively considering is obtaining ChatGPT-4 licences for each
    instructor. This strategy would empower instructors to share links to specific
    chat interactions within the tool, enhancing classroom engagement during lessons.
    Nonetheless, an existing constraint with GPT-4 pertains to its hourly completion
    capacity for requests, which might impact its overall utility in certain contexts.
    While procuring individual licences for instructors to access specific AI chatbots
    may not be an ideal permanent solution, it serves as a temporary measure until
    institutional licences become available or until we consider acquiring or developing
    specialised bots for each department.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 在大学内确保对人工智能（AI）机器人的公平访问是一个重要的考虑因素，以防止在学生之间产生数字鸿沟。在MEF，我们已经有效地解决了与其他应用类似的问题，如数字平台和大规模开放在线课程（MOOCs）。我们的策略包括采购涵盖所有学生的机构许可证。这种方法已被证明在实现公平访问方面是成功的。目前，我们正致力于将这种方法扩展到AI聊天机器人。然而，值得注意的是，目前，针对聊天生成预训练转换器（ChatGPT）的特定机构协议尚不可用，这迫使我们探索其他途径。我们正在积极考虑的一个潜在解决方案是为每位教师获取ChatGPT-4许可证。这种策略将使教师能够分享工具中特定聊天交互的链接，从而增强课堂上的互动。尽管如此，GPT-4的一个现有限制是其每小时完成请求的能力，这可能会影响其在某些环境中的整体效用。虽然为教师获取特定AI聊天机器人的个人许可证可能不是理想的长期解决方案，但它作为一项临时措施，直到机构许可证可用或我们考虑为每个部门获取或开发专门的机器人。
- en: We are also in the process of exploring Microsoft Bing, which has integrated
    AI into its Edge browser and Bing search engine. This technology draws on the
    same foundation as OpenAI's ChatGPT, offering an AI-powered experience accessible
    through mobile applications and voice commands. Similar to ChatGPT, Bing Chat
    enables users to interact naturally and receive human-like responses from the
    expansive language model. Although Bing Chat features have been progressively
    introduced and are now widely available, our institution's preference for Google
    services makes a Google-based solution more fitting. Google offers Bard, an experimental
    AI chatbot similar to ChatGPT. However, Bard stands out by gathering information
    from the web. It can handle coding, maths problems and writing assistance. Bard
    was launched in February 2023 and is powered by Google's PaLM 2 language model.
    While it initially used LaMDA, Google's dialogue model, it switched to PaLM 2
    later for better performance. Bard is multilingual and has the ability to include
    images in its responses. Despite these features, Bard faced criticism upon release.
    Users found it sometimes gave incorrect information and was not as good as competitors
    like ChatGPT and Bing Chat. To address these issues, Google shifted from LaMDA
    to PaLM 2\. PaLM 2 is an improved version of Google's language model, built upon
    the lessons learnt from earlier models like LaMDA. It incorporates advancements
    in training techniques and model architecture, leading to better overall performance
    in understanding and generating language. We have now activated Google Bard at
    MEF so it is active for all of our students and instructors, and, at the time
    of writing, are now evaluating it as a possible solution.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也在探索微软必应（Microsoft Bing），它已经将人工智能集成到其Edge浏览器和Bing搜索引擎中。这项技术基于与OpenAI的ChatGPT相同的基石，通过移动应用程序和语音命令提供可访问的AI体验。与ChatGPT类似，Bing
    Chat允许用户与庞大的语言模型进行自然互动，并接收类似人类的响应。尽管Bing Chat的功能已经逐步推出并且现在广泛可用，但我们的机构对谷歌服务的偏好使得基于谷歌的解决方案更为合适。谷歌提供了Bard，这是一个类似于ChatGPT的实验性AI聊天机器人。然而，Bard的独特之处在于它能从网络上收集信息。它可以处理编码、数学问题和写作辅助。Bard于2023年2月推出，由谷歌的PaLM
    2语言模型提供支持。虽然它最初使用的是谷歌的对话模型LaMDA，但后来为了更好的性能切换到了PaLM 2。Bard支持多语言，并且能够在其响应中包含图片。尽管具有这些功能，Bard发布后遭到了批评。用户发现它有时会提供错误信息，并且不如ChatGPT和Bing
    Chat等竞争对手。为了解决这些问题，谷歌从LaMDA转向了PaLM 2。PaLM 2是谷歌语言模型的一个改进版本，基于从LaMDA等早期模型中吸取的教训。它结合了训练技术和模型架构的进步，从而在理解和生成语言方面实现了更好的整体性能。我们现在已经在MEF激活了Google
    Bard，因此它对所有学生和教师都是活跃的，并且在撰写本文时，我们正在评估它作为可能的解决方案。
- en: In our ongoing efforts to secure institutional agreements with major large language
    model companies, and while we are trialling the effectiveness of Bard, it's important
    to acknowledge that if this endeavour does not come to fruition by the start of
    the upcoming academic year, a contingency plan will be activated. In this scenario,
    instructors could launch a survey at the beginning of a course to identify students
    who have registered with AI chatbots and tools and are willing to share them with
    peers. By grouping students with tool access alongside those without, the principle
    of equitable classroom utilisation would be upheld. This approach carries further
    benefits. If our educational focus is to foster collaborative engagement within
    student-centred classes, encouraging students to share tools would circumvent
    the isolation that arises when each student interacts individually with their
    bot. Instead, this practice of shared tool usage would promote collective involvement
    and cooperative learning. It is also worth keeping in mind there will always be
    open-source alternatives available. These currently include OpenAI's GPT-3, BERT,
    T5, XLNet and RoBERTa.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们与主要大型语言模型公司签订机构协议的持续努力中，同时在我们测试Bard的有效性时，重要的是要承认，如果这项努力在即将到来的新学年开始之前没有取得成果，将激活应急计划。在这种情况下，教师可以在课程开始时发起一项调查，以确定已注册使用AI聊天机器人和工具并愿意与同伴分享的学生。通过将拥有工具访问权限的学生与没有的学生分组，可以维护公平的课堂使用原则。这种方法还有其他好处。如果我们教育的重点是培养以学生为中心的课程中的协作参与，鼓励学生分享工具将避免当每个学生单独与他们的机器人互动时产生的孤立感。相反，这种共享工具使用的做法将促进集体参与和合作学习。同时，也值得记住，始终会有开源的替代方案可用。这些目前包括OpenAI的GPT-3、BERT、T5、XLNet和RoBERTa。
- en: Fostering Collaboration with Industries
  id: totrans-739
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与行业促进合作
- en: To address the significant challenge of preparing students for an AI-dominated
    world, we believe universities should adopt a proactive approach by reverse-engineering
    ChatGPT and AI chatbot opportunities through industry collaborations, as this
    will enable them to gain valuable insights into the evolving skill demands and
    job requirements driven by AI advancements. Based on their findings, universities
    will be able to reassess existing programmes and curricula to align them with
    the changing needs of the job market. This process should involve identifying
    crucial AI-related skills and considering their integration into various disciplines.
    Additionally, universities can develop new programmes that specifically address
    the emerging opportunities created by AI technologies. Ideally, such courses should
    be developed by incorporating real-world industry problems at their core, allowing
    students to work towards finding solutions by the end of the course as part of
    their assessment. This has been done at the University of South Florida where
    they co-created a programme with industry partners, the success of which led to
    high graduate job placement and salaries (Higher Education That Works, 2023).
    This type of collaborative approach also paves the way for more students to undertake
    internships with these companies. Furthermore, through their research, by identifying
    the types of AI bots industries are currently using, universities can make informed
    decisions on whether to purchase or develop discipline-specific bots for their
    departments. This will ensure that graduates are equipped with the specialised
    knowledge and skills of the AI bots relevant to their chosen fields, better preparing
    them for the AI-driven job market. However, it should be noted that adopting this
    reverse engineering approach needs to be an ongoing effort. Universities must
    continuously assess industry trends, collaborate closely with industry partners
    and engage AI experts to ensure their programmes and their AI tools remain up
    to date and responsive to technological advancements.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对为AI主导的世界准备学生的重大挑战，我们认为大学应采取主动方法，通过行业合作逆向工程ChatGPT和AI聊天机器人的机会，因为这将使他们能够获得关于由AI进步驱动的技能需求和就业要求的宝贵见解。基于他们的发现，大学将能够重新评估现有的课程和课程设置，以适应不断变化的就业市场需求。这个过程应包括确定关键的AI相关技能，并考虑将它们整合到各个学科中。此外，大学可以开发针对AI技术创造的崭新机会的特定课程。理想情况下，这些课程应通过将现实世界行业问题作为核心来开发，使学生能够在课程结束时作为评估的一部分，通过寻找解决方案来工作。这一点在佛罗里达大学已经得到实践，他们与行业合作伙伴共同创建了一个项目，该项目的成功导致了高毕业生的就业率和薪酬（《有效高等教育》，2023年）。这种合作方法也为更多学生提供了在这些公司实习的机会。此外，通过他们的研究，通过确定行业目前使用的AI机器人类型，大学可以就是否为他们的部门购买或开发特定学科的机器人做出明智的决定。这将确保毕业生具备与其所选领域相关的AI机器人的专业知识和技能，更好地为他们为AI驱动的就业市场做准备。然而，需要注意的是，采用这种逆向工程方法需要持续的努力。大学必须持续评估行业趋势，与行业合作伙伴紧密合作，并参与AI专家，以确保他们的课程和AI工具保持最新并能够响应技术进步。
- en: Acquiring or Developing Specialised AI Bots
  id: totrans-741
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 获取或开发专门的AI机器人
- en: While we have discussed how currently, we are actively seeking solutions to
    ensure equitable access to a generic AI chatbot for all our students, it is crucial
    to acknowledge that this is an interim measure. Our research revealed that generic
    AI bots may not fully align with our requirements, mainly due to their limitations
    in disciplinary knowledge and cultural databases. Therefore, universities are
    left with two viable choices. They can either invest in a ready-made discipline-specific
    bot that caters to their specific needs, also known as ‘walled gardens’, or they
    opt for an empty bot that can be customised with relevant content tailored to
    their department and locale. Each approach offers distinct advantages and should
    be carefully considered based on the unique requirements and preferences of the
    university and department. Let's start by looking at walled gardens.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经讨论了目前我们正在积极寻求解决方案以确保所有学生都能公平地访问通用的AI聊天机器人，但承认这一点是一个临时措施至关重要。我们的研究显示，通用的AI机器人可能并不完全符合我们的需求，主要是因为它们在学科知识和文化数据库方面的局限性。因此，大学面临两个可行的选择。它们可以投资于一个现成的、针对特定需求的学科专用机器人，也称为“封闭式花园”，或者选择一个可以定制相关内容的空机器人，这些内容是根据它们的系所和地区量身定制的。每种方法都提供了独特的优势，应根据大学和系所的独特需求和偏好仔细考虑。让我们先从封闭式花园开始探讨。
- en: 'Walled garden AI represents a distinctive strand of AI, characterised by its
    focused training on curated datasets. Unlike broader AI models, which draw from
    extensive internet data, walled garden AI thrives on limited, carefully selected
    information (Klein, 2023). This specialised AI variant has found relevance in
    education due to its potential to yield more trustworthy and dependable AI tools
    for both educators and students (Klein, 2023). Notably, walled garden AI underpins
    the creation of chatbots capable of delivering precise and current educational
    insights. The advantages of walled garden AI within the education sphere are manifold:
    its restricted dataset cultivates reliability by minimising the risk of generating
    incorrect or misleading responses; the involvement of reputable organisations
    in its development establishes a foundation of trust for educators and students,
    ensuring accuracy and dependability; and walled garden AI''s malleability allows
    for personalised interactions, accommodating unique educational needs (Klein,
    2023). However, this approach is not without challenges: the focused development
    of walled garden AI may result in higher costs compared to more generalised models;
    the accuracy of its responses is contingent on the quality of its training data;
    and potential biases stemming from the training data must be addressed to ensure
    equitable outcomes (Klein, 2023). Therefore, while walled garden AI possesses
    significant potential as an educational tool, a nuanced understanding of its development
    and deployment is vital, as its advantages must be weighed against the inherent
    challenges and considerations it entails (Klein, 2023). BioBERT, SciBERT, ClinicalBERT,
    FinanceBERT, MedBERT, PubChemAI, PatentBERT and LegalBERT are all examples of
    walled garden AI, each being tailored to specific domains. These models are meticulously
    trained on curated datasets that are tightly aligned with their respective domains.
    As a consequence, they excel in comprehending and generating content that pertains
    to the distinct subject matter they specialise in. By catering to unique domains
    such as biomedicine, scientific research, clinical literature, finance, medicine,
    chemistry, drug discovery, patent analysis and legal matters, these models can
    offer professionals and researchers an invaluable tool for tasks that demand a
    profound understanding of subject-specific information. However, it is worth noting
    that this specialisation comes with both strengths and limitations, as these models
    might not perform optimally when handling tasks that require a more expansive
    and diverse knowledge base.'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 园墙式AI代表了一种独特的AI流派，其特点是在精心挑选的数据集上进行专注的训练。与从广泛的互联网数据中汲取信息的更广泛AI模型不同，园墙式AI在有限的、精心挑选的信息中蓬勃发展（Klein，2023）。这种专门的AI变体由于能够为教师和学生提供更可靠和可信赖的AI工具，因此在教育领域找到了其相关性（Klein，2023）。值得注意的是，园墙式AI为能够提供精确和最新教育见解的聊天机器人的创建提供了基础。园墙式AI在教育领域的优势是多方面的：其受限的数据集通过最小化生成错误或误导性响应的风险来培养可靠性；参与其开发的信誉良好的组织为教师和学生建立了一个信任的基础，确保准确性和可靠性；园墙式AI的灵活性允许进行个性化互动，满足独特的教育需求（Klein，2023）。然而，这种方法并非没有挑战：园墙式AI的专注开发可能比更通用的模型成本更高；其响应的准确性取决于其训练数据的质量；并且必须解决来自训练数据的潜在偏差，以确保公平的结果（Klein，2023）。因此，虽然园墙式AI作为教育工具具有巨大的潜力，但其发展和部署的细致理解至关重要，因为其优势必须与它所固有的挑战和考虑因素权衡（Klein，2023）。BioBERT、SciBERT、ClinicalBERT、FinanceBERT、MedBERT、PubChemAI、PatentBERT和LegalBERT都是园墙式AI的例子，每个都是针对特定领域定制的。这些模型在与其各自领域紧密对齐的精心挑选的数据集上进行了细致的训练。因此，它们在理解和生成与其专业领域相关的特定内容方面表现出色。通过满足独特的领域，如生物医学、科学研究、临床文献、金融、医学、化学、药物发现、专利分析和法律事务，这些模型可以为专业人士和研究人员提供一项宝贵的工具，用于需要深入理解特定信息的工作。然而，值得注意的是，这种专业化既带来了优势也带来了局限性，因为这些模型在处理需要更广泛和多样化知识库的任务时可能表现不佳。
- en: Instead of purchasing specialised bots, an alternative approach is to acquire
    an ‘empty bot’ or a pre-trained language model and conduct fine-tuning specific
    to your discipline. Fine-tuning involves training a pre-trained language model
    on a domain-specific data set, enabling it to better comprehend the requirements
    of your field. This process saves time and resources compared to training a language
    model from scratch since pre-trained models already possess a solid foundation
    of language understanding. Fine-tuning builds upon this foundation, making the
    model more suitable for specialised tasks within your domain. However, successful
    fine-tuning relies on the availability and quality of your domain-specific dataset,
    requiring expertise in machine learning and natural language processing for optimal
    results. Several open-source pre-trained language models serve as starting points
    for fine-tuning discipline-specific bots. Popular models like BERT, GPT, RoBERTa,
    XLNet, ALBERT and T5 have been developed by leading organisations and can be fine-tuned
    for various natural language processing tasks. These models form robust foundations,
    which can be adapted to your domain by fine-tuning them with relevant datasets.
    Nevertheless, considering the rapid advancements in the field, it is imperative
    that universities continuously explore the latest developments to find the most
    up to date open-source language models suitable for their purposes.
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 与购买专业机器人相比，一种替代方法是获取一个“空机器人”或预训练的语言模型，并进行针对您学科的具体微调。微调涉及在特定领域的数据集上训练一个预训练的语言模型，使其更好地理解您领域的需求。与从头开始训练语言模型相比，这个过程节省了时间和资源，因为预训练模型已经拥有坚实的语言理解基础。微调在此基础上建立，使模型更适合您领域内的特定任务。然而，成功的微调依赖于特定领域数据集的可用性和质量，需要机器学习和自然语言处理的专业知识才能获得最佳结果。几个开源预训练语言模型是微调学科特定机器人的起点。像BERT、GPT、RoBERTa、XLNet、ALBERT和T5这样的流行模型是由领先的组织开发的，可以针对各种自然语言处理任务进行微调。这些模型形成了稳健的基础，可以通过使用相关数据集进行微调来适应您的领域。尽管如此，考虑到该领域的快速发展，大学持续探索最新发展，以找到最适合其目的的最新开源语言模型是至关重要的。
- en: When considering the adoption of AI bots in universities, the decision-making
    process should involve discussions with each faculty and department. Whether opting
    for an institutional generic bot, purchasing a pre-trained discipline-specific
    bot or acquiring an empty bot for fine-tuning, it is crucial to involve relevant
    stakeholders in the decision-making process. As previously discussed, departments
    should proactively explore the industry landscape to identify the bots used in
    their respective fields and then reverse engineer from those insights to determine
    the most suitable bot type for their department. However, we understand that not
    all institutions may have the financial resources to afford such endeavours. In
    such cases, as a viable backup option, we recommend universities to explore free
    and open-source tools available for equal access to bots for all students. The
    open-source community is committed to promoting equality of access and ensures
    that tools are accessible to everyone. By leveraging these open-source options,
    universities can still offer students equal opportunities to engage with AI bots,
    even when budget constraints exist. The key is to foster a collaborative approach
    that aligns with the institution's values and goals, ultimately enhancing the
    learning experience for all students.
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑在大学中采用AI机器人时，决策过程应包括与每个学院和系的讨论。无论是选择一个机构通用的机器人、购买一个预训练的学科特定机器人，还是获取一个用于微调的空机器人，涉及相关利益相关者在决策过程中至关重要。正如之前讨论的，系应积极探索行业格局，以确定各自领域使用的机器人，然后从这些洞察中逆向工程，以确定其部门最合适的机器人类型。然而，我们理解并非所有机构都有足够的财务资源来承担这样的努力。在这种情况下，作为一个可行的备份选项，我们建议大学探索免费和开源的工具，以确保所有学生都能平等地访问机器人。开源社区致力于促进访问平等，并确保工具对每个人都是可访问的。通过利用这些开源选项，大学仍然可以为学生提供平等的机会来参与AI机器人，即使存在预算限制。关键是培养一种与机构价值观和目标相一致的合作方法，最终提升所有学生的学习体验。
- en: Providing Prompt Engineering Courses
  id: totrans-746
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供提示工程课程
- en: In response to the significant growth of the prompt engineering job market,
    universities should proactively offer prompt engineering courses to all students.
    Prompt engineering is an intricate process that revolves around creating effective
    prompts to elicit desired responses from language models, such as ChatGPT. This
    practice necessitates a comprehensive comprehension of the model's capabilities
    and limitations, enabling the creation of prompts tailored for specific applications
    like content generation and code completion. Engaging in prompt engineering requires
    a firm grasp of the architecture of AI language models, a deep understanding of
    their mechanisms for processing text and an awareness of their inherent constraints.
    Armed with this foundational knowledge, prompts can be strategically constructed
    to yield outputs that are both accurate and contextually relevant. This multifaceted
    process encompasses various elements. One aspect involves becoming adept at generating
    text using pre-trained models and refining them to suit specific tasks. This proficiency
    aids in selecting prompts that yield the desired content effectively. Furthermore,
    creating prompts that lead to coherent and pertinent responses is a nuanced endeavour.
    It involves accounting for contextual nuances, specificity, phrasing intricacies
    and the management of multi-turn conversations. Moreover, exerting control over
    model output is crucial. This is achieved through techniques like providing explicit
    instructions, employing system messages and conditioning responses based on specific
    keywords. These techniques serve as navigational tools for steering the model's
    output in a desired direction. Prompts that effectively minimise biases or sensitivities
    in responses are integral to responsible AI interactions. This ethical dimension
    of prompt engineering ensures that the generated content aligns with fair and
    unbiased communication. The iterative nature of prompt engineering involves a
    process of experimentation, result evaluation and prompt refinement. This dynamic
    cycle is instrumental in achieving intended outcomes, fine-tuning prompts for
    optimal performance. Additionally, adapting prompt engineering to various tasks,
    such as content creation, code generation, summarisation and translation, necessitates
    tailoring prompts to align with the unique context of each task. This adaptability
    ensures that the prompts are finely tuned to yield contextually relevant and accurate
    outputs. In essence, prompt engineering is a comprehensive approach that harmonises
    technical expertise with linguistic finesse. It optimises interactions with language
    models, yielding responses that are not only accurate but also seamlessly aligned
    with the intended context and purpose.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 针对提示工程（prompt engineering）岗位市场的显著增长，大学应积极为所有学生提供提示工程课程。提示工程是一个复杂的过程，它围绕创建有效的提示来从语言模型（如ChatGPT）中引发期望的响应。这一实践需要全面理解模型的能力和局限性，以便创建针对特定应用（如内容生成和代码补全）的定制提示。进行提示工程需要牢固掌握人工智能语言模型的架构、深入理解其处理文本的机制以及了解其固有的限制。拥有这些基础知识，可以策略性地构建提示，以产生既准确又与上下文相关的输出。这一多方面的过程包括各种元素。一方面涉及熟练使用预训练模型生成文本并对其进行优化以适应特定任务。这种熟练度有助于选择能够有效产生期望内容的提示。此外，创建能够导致连贯且相关的响应的提示是一项微妙的工作。它需要考虑上下文细微差别、具体性、措辞复杂性和多轮对话的管理。此外，控制模型输出至关重要。这通过提供明确指令、使用系统消息和基于特定关键词的条件响应等技术来实现。这些技术作为导航工具，用于引导模型的输出朝向期望的方向。能够有效减少响应中的偏见或敏感性的提示对于负责任的AI交互至关重要。提示工程的这一伦理维度确保生成的内容与公平无偏见沟通相一致。提示工程的迭代性质涉及实验、结果评估和提示优化的过程。这一动态循环对于实现预期结果、优化提示以获得最佳性能至关重要。此外，将提示工程适应各种任务，如内容创作、代码生成、摘要和翻译，需要根据每个任务的独特上下文定制提示。这种适应性确保提示被精细调整，以产生上下文相关且准确的输出。本质上，提示工程是一种综合方法，它将技术专长与语言技巧相结合。它优化了与语言模型的交互，产生的响应不仅准确，而且与预期的上下文和目的无缝对齐。
- en: Understanding the importance of providing prompt engineering courses to students,
    at MEF University, beginning in September 2023, we will be offering the Coursera-hosted
    course ‘Prompt Engineering for ChatGPT’ by Vanderbilt University (White, 2023),
    providing access to all our students through our MOOC-based programme offerings.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 理解为学生提供即时工程课程的重要性，MEF大学将从2023年9月开始提供由范德堡大学（White，2023）提供的Coursera托管课程“ChatGPT的即时工程”，通过我们的基于MOOC的项目提供，让所有学生都能获得这门课程。
- en: In this chapter, we have extensively examined critical dimensions of integrating
    AI chatbots in education. This exploration encompassed the imperative of ensuring
    fair access to these bots, the collaborative efforts universities should engage
    in with industries to comprehend the skills and tools required of graduates, the
    strategic decision-making regarding the acquisition or development of specialised
    AI botsand the significance of providing prompt engineering courses for students.
    Looking ahead, the next chapter dives deeper into the educational consequences
    stemming from the integration of AI chatbots.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们广泛探讨了在教育中整合人工智能聊天机器人的关键维度。这次探索包括确保这些机器人公平访问的必要性、大学应与产业界合作的努力以理解毕业生所需的技能和工具、关于获取或开发专业人工智能机器人的战略决策，以及为学生提供即时工程课程的重要性。展望未来，下一章将深入探讨人工智能聊天机器人整合的教育后果。
- en: Chapter 9
  id: totrans-750
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第九章
- en: Educational Implications
  id: totrans-751
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教育影响
- en: The Impact of AI on Foundational Learning
  id: totrans-752
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能对基础学习的影响
- en: 'In this chapter, we delve into the importance of adapting curricula, assessment
    methods, and instructional strategies to the artificial intelligence (AI) era.
    A central concern here is the potential impact on foundational learning, as highlighted
    both in our research findings and Sullivan et al.''s (2023) literature. As with
    any technology, Chat Generative Pre-trained Transformer’s (ChatGPT''s) influence
    on student learning holds both positive and negative aspects. However, our primary
    focus is on its significant effect on foundational learning. Within this context,
    several noteworthy considerations arise regarding potential downsides, as observed
    through our research. A key concern is the potential over-reliance on ChatGPT
    for generating content, answers and ideas. This dependency has the potential to
    hinder critical thinking and problem-solving skills, potentially leading to reduced
    originality in student work and a diminished ability to effectively synthesise
    information. Additionally, if students routinely turn to ChatGPT to complete assignments,
    their motivation to autonomously comprehend and research subjects may wane, potentially
    resulting in surface-level learning and a limited grasp of essential concepts.
    Another crucial aspect is the potential downside of excessive dependence on ChatGPT,
    which could diminish authentic interactions with peers and instructors. Such interactions
    play a crucial role in fostering deep learning and developing important social
    skills. Furthermore, ongoing reliance on AI for communication might negatively
    impact language and communication proficiency. Prolonged exposure to AI-generated
    content might compromise students'' ability to express ideas coherently and engage
    in meaningful conversations. Moreover, using ChatGPT for content creation without
    proper attribution could undermine students'' ability to formulate original arguments
    and ideas. An over-reliance on AI for creative tasks like writing or problem-solving
    might suppress inherent creativity as students become more accustomed to AI-generated
    patterns and concepts. At this point, we believe it is essential to point out
    that writing is pivotal not only in creation but also in learning – an approach
    often referred to as ‘writing-to-learn’ (Nelson, 2001). Rooted in constructivist
    theory, this notion underscores the evolution of human knowledge and communication.
    Whether viewed from individual cognitive perspectives or broader social viewpoints,
    the dynamic relationship between writing and learning involves selection, organisation
    and connection (Nelson, 2001). Nelson''s work ‘Writing as a Learning Tool’ (2001)
    examines four dimensions of writing''s connective nature: interlinking ideas,
    texts, authors and disciplines. She identifies two primary rationales for the
    writing-to-learn approach: the authority rationale, focusing on mastering subjects
    through writing and the authenticity rationale, asserting that learning content
    and writing conventions go hand in hand within academic fields. This reinforces
    the essential role of writing in learning. Sullivan et al.''s (2023) study similarly
    emphasises the link between learning and writing, highlighting writing''s role
    in clarifying ideas. Consequently, writing becomes a potent tool for reinforcing
    knowledge. Summarising, paraphrasing or explaining concepts in one''s own words
    enhances comprehension and retention. Writing nurtures critical thinking as students
    analyse, evaluate and synthesise information, refining their ability to structure
    coherent thoughts and support arguments with evidence. Writing also encourages
    introspection and self-assessment, enabling students to review learning experiences,
    identify strengths and set improvement goals. This self-evaluation assists in
    pinpointing gaps and areas for further exploration. Moreover, writing fosters
    creativity and expression, providing a platform for learners to delve into ideas
    and emotions, establishing a profound connection with the subject matter. Across
    disciplines, writing drives problem-solving, research and analysis, as students
    engage in research papers, case studies and essays, refining their capability
    to construct solutions and present well-structured arguments. Writing also enhances
    communication skills, enabling learners to express thoughts proficiently across
    various domains. Additionally, writing bolsters long-term information retention.
    Taking notes, creating study guides and practising writing consolidate memory.
    Integrating writing with other learning methods – such as diagrams and multimedia
    – promotes diverse learning, enhancing comprehension through multiple avenues.
    Writing also fosters metacognition, empowering students to monitor thought processes,
    evaluate decisions and explore alternative perspectives. Furthermore, it positively
    influences language proficiency, improving grammar, vocabulary and sentence structure
    through regular writing practice. Considering the pivotal role of writing in the
    learning process, concerns arise over the implications of AI tools that support
    writers in these aspects. Over-reliance on AI-generated content might undermine
    students'' critical thinking abilities. Depending solely on AI suggestions and
    feedback could hinder thorough engagement with material and the development of
    independent analytical skills. While AI tools excel in producing structured content,
    they could stifle creativity and originality, resulting in standardised and repetitive
    writing. Overemphasis on grammatical accuracy and adherence to rules might discourage
    experimentation and risk-taking in writing, inhibiting students from exploring
    their unique writing style. Furthermore, heavy reliance on AI tools might foster
    technological dependency, diminishing students'' self-reliance in problem-solving
    and learning. Ultimately, focusing exclusively on producing well-structured written
    content using AI tools could overshadow the learning process itself. Learning
    encompasses not just the final outcome but also cognitive engagement, exploration
    and growth throughout the educational journey. This prompts the question: what
    implications arise if such a scenario unfolds?'
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们深入探讨了适应人工智能（AI）时代课程、评估方法和教学策略的重要性。这里的一个主要关注点是潜在的基础学习影响，这在我们研究发现的以及Sullivan等人（2023）的文献中都有所强调。与任何技术一样，Chat
    Generative Pre-trained Transformer（ChatGPT）对学生学习的影响既有积极的一面，也有消极的一面。然而，我们的主要关注点是其对基础学习的显著影响。在此背景下，通过我们的研究观察，出现了几个值得注意的潜在负面影响。一个关键的关注点是过度依赖ChatGPT生成内容、答案和想法的可能性。这种依赖可能会阻碍批判性思维和解决问题的技能，可能导致学生作品中原创性的减少以及有效综合信息能力的下降。此外，如果学生经常求助于ChatGPT来完成作业，他们自主理解和研究主题的动机可能会减弱，可能导致表面化学习和对基本概念的理解有限。另一个关键方面是过度依赖ChatGPT的潜在负面影响，这可能会减少与同学和教师的真实互动。这种互动在培养深度学习和培养重要社交技能方面起着至关重要的作用。此外，持续依赖AI进行沟通可能会对语言和沟通能力产生负面影响。长期接触AI生成的内容可能会损害学生表达思想连贯性和参与有意义对话的能力。此外，未经适当归属使用ChatGPT进行内容创作可能会损害学生提出原创论点和想法的能力。过度依赖AI进行写作或解决问题的创造性任务可能会抑制学生的内在创造力，因为学生越来越习惯于AI生成的模式和概念。在此阶段，我们认为指出写作不仅对创作至关重要，也对学习至关重要——这种做法通常被称为“写作以学习”（Nelson，2001）。根植于建构主义理论，这一观念强调了人类知识和沟通的演变。无论从个体认知视角还是更广泛的社会视角来看，写作与学习之间的动态关系涉及选择、组织和联系（Nelson，2001）。Nelson的著作《写作作为学习工具》（2001）考察了写作连接性的四个维度：连接思想、文本、作者和学科。她确定了写作以学习方法的两个主要理由：权威理由，侧重于通过写作掌握学科；真实性理由，断言在学术领域，学习内容和写作规范是相辅相成的。这加强了写作在学习中的基本作用。Sullivan等人（2023）的研究同样强调了学习和写作之间的联系，强调了写作在阐明思想中的作用。因此，写作成为强化知识的强大工具。总结来说，用自己的话总结、改写或解释概念可以增强理解和记忆。写作培养批判性思维，因为学生在分析、评估和综合信息时，会完善他们构建连贯思想和用证据支持论点的能力。写作还鼓励自我反思和自我评估，使学生能够回顾学习经历，识别优势并设定改进目标。这种自我评估有助于确定差距和进一步探索的领域。此外，写作培养创造力和表达力，为学习者提供一个深入探讨思想和情感的平台，与主题建立深刻的联系。在各个学科中，写作推动问题解决、研究和分析，因为学生参与研究论文、案例研究和论文，完善他们构建解决方案和提出结构化论点的能力。写作还提高了沟通技巧，使学习者能够在不同领域熟练地表达思想。此外，写作加强长期信息保留。做笔记、创建学习指南和练习写作巩固记忆。将写作与其他学习方法（如图表和多媒体）相结合，通过多种途径促进多样化学习，增强理解。写作还培养元认知，使学生能够监控思维过程、评估决策和探索不同的观点。此外，它对语言能力的积极影响，通过定期写作练习提高语法、词汇和句子结构。考虑到写作在学习过程中的关键作用，人们对支持作者在这些方面的AI工具的潜在影响表示担忧。过度依赖AI生成的内容可能会削弱学生的批判性思维能力。仅依赖AI的建议和反馈可能会阻碍对材料的彻底参与和独立分析技能的发展。虽然AI工具在生成结构化内容方面表现出色，但它们可能会抑制创造力和原创性，导致标准化和重复的写作。过分强调语法准确性和遵守规则可能会阻碍实验和冒险，阻碍学生探索独特的写作风格。此外，过度依赖AI工具可能会培养技术依赖性，减少学生在解决问题和学习中的自力更生。最终，仅关注使用AI工具生产结构化的书面内容可能会掩盖学习过程本身。学习不仅包括最终结果，还包括在整个教育旅程中的认知参与、探索和成长。这促使我们思考：如果出现这种情况，会产生哪些影响？
- en: The implications of losing foundational learning are significant and far-reaching.
    This formative phase forms the bedrock for acquiring advanced knowledge and skills,
    and its absence can reverberate across various aspects of students' academic journey
    and future prospects. For instance, foundational learning provides the fundamental
    principles necessary for understanding complex subjects. Without a robust foundation,
    students may struggle to comprehend advanced concepts, leading to a surface-level
    grasp of subjects. Higher-level courses typically build upon foundational knowledge;
    lacking this grounding can impede success in higher education and overwhelm students
    with coursework. Furthermore, foundational learning nurtures critical thinking,
    analytical skills and effective problem-solving. A dearth of exposure to this
    phase might hinder students' ability to analyse information, make informed decisions
    and effectively tackle intricate issues. A solid foundation also promotes adaptability
    to new information and changing contexts, which becomes challenging without this
    grounding. Furthermore, most professional roles require a firm grasp of foundational
    concepts. Without this understanding, students might encounter difficulties during
    job interviews, work tasks and career advancement. In addition, over-reliance
    on AI tools like ChatGPT may hinder independent and critical thinking, ultimately
    suppressing creativity, problem-solving and originality. Language development,
    communication skills and coherent expression of ideas are also nurtured during
    foundational learning. These skills are essential for effective communication
    in both written and spoken forms. An absence of foundational learning could lead
    to a widening knowledge gap that erodes confidence and motivation to learn. Foundational
    learning also cultivates research skills and the ability to gather credible information.
    Students without these skills might struggle to locate and evaluate reliable sources
    independently. Beyond academics, education contributes to personal growth, intellectual
    curiosity and a well-rounded perspective. The lack of foundational learning may
    deprive students of these holistic experiences. To prevent these adverse outcomes,
    the prioritisation of robust foundational learning is crucial. This underscores
    the significance of creating curricula, assessments and instruction that are resilient
    to the influence of AI. But how can we do this?
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 失去基础学习的后果是重大且深远的。这个形成阶段构成了获取高级知识和技能的基石，其缺失可能会在学生学术旅程和未来前景的各个方面产生共鸣。例如，基础学习提供了理解复杂主题所需的基本原则。如果没有坚实的基础，学生可能难以理解高级概念，导致对学科的理解停留在表面。高级课程通常建立在基础知识之上；缺乏这种基础可能会阻碍高等教育中的成功，并使学生课程负担过重。此外，基础学习还培养批判性思维、分析技能和有效解决问题的能力。缺乏这一阶段的学习可能会阻碍学生分析信息、做出明智决策和有效处理复杂问题的能力。坚实的基础也有助于适应新信息和不断变化的环境，没有这种基础会变得具有挑战性。此外，大多数专业角色都需要对基础概念有牢固的掌握。如果没有这种理解，学生在面试、工作任务和职业发展过程中可能会遇到困难。此外，过度依赖像ChatGPT这样的AI工具可能会阻碍独立和批判性思维，最终抑制创造力、解决问题的能力和原创性。在基础学习过程中，语言发展、沟通技能和思想的连贯表达也得到了培养。这些技能对于书面和口头形式的有效沟通至关重要。缺乏基础学习可能会导致知识差距扩大，侵蚀学习的信心和动力。基础学习还培养了研究技能和收集可靠信息的能力。没有这些技能的学生可能难以独立找到和评估可靠的信息来源。在学术之外，教育有助于个人成长、智力好奇心和全面视角。缺乏基础学习可能会剥夺学生这些全面的经验。为了防止这些不良后果，优先考虑强大的基础学习至关重要。这强调了创建能够抵御AI影响的课程、评估和指导的重要性。但我们如何做到这一点呢？
- en: Navigating AI Challenges Through Flipped Learning
  id: totrans-755
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过翻转学习应对AI挑战
- en: To address concerns about students losing foundational learning due to ChatGPT,
    we believe we should turn to contemporary learning methods, such as flipped learning.
    Neumann et al. (2023) and Rudolph et al. (2023) suggested that an effective way
    to deal with AI would be to incorporate it into modern teaching approaches, specifically
    highlighting flipped learning as being a suitable approach. Rudolph et al. proposed
    the use of flipped learning, as the essential classwork (the part that supports
    the development of foundational learning) can occur in-person, emphasising multimedia
    assignments and oral presentations over traditional tasks (2023). They believe
    taking this approach will enhance feedback and revision opportunities, which will
    support foundational learning. Rudolph et al. also note that ChatGPT can support
    experiential learning, which is a key aspect of flipped learning. They suggest
    that students should explore diverse problem-solving approaches through game-based
    learning and student-centred pedagogies using ChatGPT (2023). Additionally, Rudolph
    et al. highlight ChatGPT's potential to promote collaboration and teamwork, another
    aspect inherent in flipped learning. They recommend incorporating group activities
    in which ChatGPT generates scenarios encouraging collaborative problem-solving,
    as this approach will foster a sense of community and mutual support among students.
    Therefore, instead of seeing ChatGPT as disruptive, Rudolph et al. emphasise its
    potential to transform education, but that this should take place through contemporary
    teaching methods, such as flipped learning (2023). Therefore, based on our experience,
    and supported by the literature, we believe flipped learning provides a useful
    starting point for the creation of curricula, assessments and instruction that
    are resilient to the influence of AI.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决学生因ChatGPT而失去基础学习的问题，我们相信我们应该转向当代学习方法，例如翻转课堂。Neumann等人（2023年）和Rudolph等人（2023年）建议，处理AI的有效方法是将它融入现代教学方法中，特别强调翻转课堂作为一种合适的方法。Rudolph等人提出了使用翻转课堂的建议，因为基础课程作业（支持基础学习发展的部分）可以面对面进行，强调多媒体作业和口头报告，而不是传统的任务（2023年）。他们认为采取这种方法将增强反馈和修订的机会，从而支持基础学习。Rudolph等人还指出，ChatGPT可以支持体验式学习，这是翻转课堂的关键方面。他们建议学生通过基于游戏的学习和以学生为中心的教学法使用ChatGPT来探索不同的解决问题的方法（2023年）。此外，Rudolph等人强调ChatGPT促进协作和团队合作的潜力，这是翻转课堂的另一个固有方面。他们建议在ChatGPT生成鼓励协作解决问题的场景的小组活动中融入，因为这种方法将培养学生在社区和相互支持中的感觉。因此，而不是将ChatGPT视为破坏性的，Rudolph等人强调其改变教育的潜力，但认为这应该通过当代教学方法，如翻转课堂来实现（2023年）。因此，基于我们的经验和文献支持，我们相信翻转课堂为创建能够抵御AI影响的课程、评估和教学提供了一个有用的起点。
- en: 'In the research context section of our research methodology chapter, we presented
    the recommended stages for instructors at MEF to prepare their flipped courses.
    This involves starting with understanding by design (UbD) and integrating Bloom''s
    taxonomy, Assessment For, As, and Of Learning and Gagne''s Nine Events of Instruction
    reordered for flipped learning. In that section, we described how, through combining
    these frameworks, we can establish cohesion between curriculum, assessment and
    instruction, resulting in effective learning. But what happens when AI is involved?
    In UbD, instructors follow three stages: Stage 1 – identify desired results (curriculum);
    Stage 2 – determine acceptable evidence (assessment) and Stage 3 – create the
    learning plans (instruction). Therefore, in addressing how to make teaching and
    learning AI-resilient, we go through each of these stages, putting forward questions
    which can be asked at each stage to guide the decision-making process in how and
    when AI should be integrated.'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们研究方法章节的研究背景部分，我们提出了MEF教师准备翻转课程的建议阶段。这包括从“通过设计”（UbD）和整合布鲁姆的分类法、评估学习、作为学习和关于学习的评估以及为翻转学习重新排序的加涅的九个教学事件开始。在那个部分，我们描述了如何通过结合这些框架，我们可以在课程、评估和教学之间建立一致性，从而实现有效的学习。但是，当涉及到AI时会发生什么呢？在UbD中，教师遵循三个阶段：阶段1
    - 确定期望的结果（课程）；阶段2 - 确定可接受的证据（评估）和阶段3 - 创建学习计划（教学）。因此，在解决如何使教学和学习具有AI弹性时，我们通过每个阶段，提出在每个阶段可以提出的问题，以指导如何和何时整合AI的决策过程。
- en: Future-ready Curricula in the Age of AI
  id: totrans-758
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能时代的未来课程
- en: In our recommended flipped learning approach to planning, we start with Stage
    1 of the UbD framework – identify desired results. Although we detailed Stage
    1 in the research methodology chapter, we revisit it briefly here for clarity.
    During Stage 1, instructors establish course objectives and formulate enduring
    understandings capturing essential, lasting concepts. Essential questions are
    then created to guide student exploration, fostering critical thinking and problem-solving
    skills. These questions can be overarching or topical, aligning with broader or
    specific subjects. Once course objectives, enduring understandings and essential
    questions are set, the next step involves designing learning outcomes. This is
    done using Bloom's taxonomy as a guide, ranging from lower to higher cognitive
    levels, as required. This structured process ensures the development of effective
    learning outcomes that deepen understanding and guide meaningful instruction.
    However, in light of the emergence of AI chatbots, such as ChatGPT, we believe
    it is important that we look at each of the aspects of Stage 1 to assess if they
    may be affected in any way.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们推荐的翻转式学习规划方法中，我们首先从UbD框架的Stage 1开始——确定期望结果。尽管我们在研究方法章节中详细介绍了Stage 1，但为了清晰起见，我们在此简要回顾。在Stage
    1阶段，教师确立课程目标并制定能够捕捉基本、持久概念的持久理解。随后，创建关键问题以引导学生探索，培养批判性思维和解决问题的能力。这些问题可以是宏观的或具体的，与更广泛或更具体的主题相一致。一旦确定了课程目标、持久理解和关键问题，下一步就是设计学习成果。这是通过使用布卢姆的分类法作为指导来完成的，从较低到较高的认知水平，根据需要而定。这一结构化过程确保了有效学习成果的发展，这些成果深化了理解并指导了有意义的指导。然而，鉴于AI聊天机器人，如ChatGPT的出现，我们认为我们审视Stage
    1的每个方面以评估它们是否可能受到任何影响是很重要的。
- en: Enduring understandings, representing core knowledge with lasting value, are
    unlikely to change due to AI advancements. Similarly, essential questions, designed
    to nurture critical thinking, will likely remain consistent despite AI's influence.
    However, the evolving AI landscape prompts a closer look at learning outcomes,
    prompting us to ask whether the learning outcomes we have devised remain relevant
    in an AI-driven world. To investigate this further, let's consider the learning
    outcome ‘Compose a mock closing argument on a specific aspect of language in a
    real-life case and justify your argument’ that was at the heart of the end-of-course
    performance task on the forensic linguistics course. When the rubric was input
    into ChatGPT, ChatGPT was instantly able to complete much of this task and, in
    doing so, achieved the learning outcome with hardly any input from the students.
    Consequently, this outcome, once valuable in real-world situations, might have
    lost its significance due to AI's capabilities. In their future careers, students,
    no doubt, will be using such tools to help them write closing arguments, and ChatGPT
    will prove a useful tool for this purpose. Nonetheless, in the legal sphere, delivering
    and justifying a closing argument verbally remains crucial. This underscores the
    fact that perhaps we should focus more on the verbal delivery as a learning outcome,
    rather than just the written presentation, and that perhaps the learning outcome
    may be better worded as ‘Compose and deliver a mock closing argument on a specific
    aspect of language in a real-life case and justify your argument to a live audience’.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 持久理解，代表着具有持久价值的核心知识，不太可能因AI的进步而改变。同样，旨在培养批判性思维的关键问题，尽管受到AI的影响，但可能保持一致。然而，不断发展的AI格局促使我们更仔细地审视学习成果，促使我们思考我们制定的学习成果在AI驱动的世界中是否仍然相关。为了进一步调查这个问题，让我们考虑学习成果“在真实案例的一个特定语言方面撰写模拟结辩并论证你的论点”，这是法语言学课程结束时的表现任务的核心。当评分标准输入到ChatGPT中时，ChatGPT立即能够完成这项任务的大部分，并在完成这项任务的过程中，几乎没有从学生那里得到任何输入就实现了学习成果。因此，这个原本在现实世界中有价值的成果，可能因为AI的能力而失去了其重要性。毫无疑问，学生在未来的职业生涯中无疑会使用这样的工具来帮助他们撰写结辩，ChatGPT将证明是这一目的的有用工具。尽管如此，在法律领域，口头陈述和论证结辩仍然至关重要。这强调了这样一个事实：我们可能应该更多地关注口头陈述作为学习成果，而不仅仅是书面展示，也许学习成果的措辞可以更好地表述为“在真实案例的一个特定语言方面撰写并陈述模拟结辩，并向现场观众论证你的论点”。
- en: 'Based on this example, we propose that numerous learning outcomes in existing
    courses may require re-evaluation in light of AI''s abilities. Therefore, to assess
    the ongoing relevance of a learning outcome, we suggest posing a pivotal question:
    ‘Is the learning outcome still relevant in an AI-driven real world?’ If the answer
    is ‘yes’, we believe the learning outcome should remain the same. If the answer
    is ‘no’, we recommend the instructor re-evaluate the inclusion of that learning
    outcome. In such situations, we suggest the instructor should conduct a job analysis
    in collaboration with industry to assess how the real world has been influenced
    by AI, as was discussed in the previous chapter, and then adjust the learning
    outcome accordingly.'
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这个例子，我们提出，在现有课程中，许多学习成果可能需要根据人工智能的能力进行重新评估。因此，为了评估学习成果的持续相关性，我们建议提出一个关键问题：“在人工智能驱动的现实世界中，学习成果是否仍然相关？”如果答案是“是”，我们相信学习成果应该保持不变。如果答案是“否”，我们建议教师重新评估包含该学习成果的合理性。在这种情况下，我们建议教师应与行业合作进行工作分析，以评估现实世界受到人工智能的影响，正如前一章所讨论的，然后相应地调整学习成果。
- en: To further comprehend the connections and implications associated with Stage
    1, we present the following flowchart ([Fig. 2](#978-1-83797-647-820241009.xhtml#fig1)).
    This illustrates the interplay between enduring understandings, essential questions,
    learning outcomes and the emergence of AI. Its purpose is to guide us in making
    informed decisions regarding AI's impact.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步理解与第一阶段相关的联系和影响，我们展示了以下流程图（[图2](#978-1-83797-647-820241009.xhtml#fig1)）。该图展示了持久理解、核心问题、学习成果与人工智能出现之间的相互作用。其目的是指导我们在考虑人工智能的影响时做出明智的决策。
- en: '![image](images/f09-01.jpg)'
  id: totrans-763
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/f09-01.jpg)'
- en: Fig. 2.Decision-Making Process for Reassessing Learning Outcomes in an AI Environment.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.人工智能环境中的学习成果重新评估决策过程。
- en: AI-Resilient Assessment Strategies
  id: totrans-765
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI-Resilient Assessment Strategies
- en: 'As discussed in the literature review, during the ChatGPT era, certain universities
    are opting for conventional exams to circumvent problems related to ChatGPT-generated
    content. However, Sullivan et al. (2023) oppose the exclusive reliance on exams.
    They propose a shift in assessment tasks to decrease susceptibility to AI tools,
    advocating for personalised assignments that assess critical thinking. Given our
    support for the modern assessment approaches inherent in flipped learning, we
    concur with their standpoint. Thus, this leads us to Stage 2 of our flipped learning
    design. Stage 2 involves the instructor determining assessment evidence to determine
    what students know and can do. This involves instructors asking: How will we know
    if students have achieved the desired results? What will we accept as evidence
    of student understanding and their ability to use (transfer) their learning in
    new situations? and how will we evaluate student performance in fair and consistent
    ways? (Wiggins & McTighe, 1998). In Stage 2, there are two main types of assessment:
    performance tasks and other evidence. Performance tasks ask students to use what
    they have learnt in new and real situations to see if they really understand and
    can use their learning. These tasks are not for everyday lessons; they are like
    final assessments for a unit or a course and should include all three elements
    of AoL, AfL and AaL throughout the semester while following the Goal, Role, Audience,
    Situation, Product-Performance-Purpose, Standards (GRASPS) mnemonic. Alongside
    performance tasks, Stage 2 includes other evidence, such as quizzes, tests, observations
    and work samples (AfL) and reflections (AaL) to find out what students know and
    can do. While we observed that some issues may arise in Stage 1 regarding learning
    outcomes in relation to AI''s abilities, in Stage 2 we start to see more concerning
    issues. Let''s begin by examining end-of-course performance tasks.'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 如文献综述中所述，在ChatGPT时代，某些大学正在选择传统的考试来规避与ChatGPT生成内容相关的问题。然而，Sullivan等人（2023）反对过度依赖考试。他们提出将评估任务转向以降低对AI工具的依赖性，主张个性化的作业来评估批判性思维。鉴于我们对翻转课堂中固有的现代评估方法的支持，我们同意他们的观点。因此，这使我们进入了翻转学习设计的第二阶段。第二阶段涉及教师确定评估证据，以确定学生知道什么以及能做什么。这包括教师提出以下问题：我们如何知道学生是否达到了预期的结果？我们将接受哪些作为学生理解及其在新情境中应用（迁移）学习能力的证据？我们将如何以公平和一致的方式评估学生的表现？（Wiggins
    & McTighe, 1998）。在第二阶段，主要有两种类型的评估：表现任务和其他证据。表现任务要求学生将所学知识应用于新的和真实情境中，以检验他们是否真正理解和能够应用他们的学习。这些任务不是日常课程的一部分；它们类似于单元或课程的最终评估，应在整个学期内包括AoL、AfL和AaL的所有三个要素，同时遵循GRASPS助记符（目标、角色、受众、情境、产品-表现-目的、标准）。在表现任务之外，第二阶段还包括其他证据，如测验、测试、观察和作品样本（AfL）以及反思（AaL），以了解学生知道什么以及能做什么。虽然我们在第一阶段观察到与AI能力相关的学习成果可能存在一些问题，但在第二阶段，我们开始看到更多令人担忧的问题。让我们从考察课程结束时的表现任务开始。
- en: End-of-course Performance Tasks
  id: totrans-767
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程结束时的表现任务
- en: The primary goal of end-of-course performance tasks is to offer an overall snapshot
    of a student's performance at a specific point in time. While this evaluation
    can occur periodically during a course, it typically takes place at the end of
    the course. However, the emergence of AI, particularly ChatGPT, has raised a significant
    consideration. In instances where AI can proficiently complete these assessments
    – as we've observed it can often do with ease – instructors may encounter challenges
    in accurately measuring a student's true learning accomplishment. The potential
    consequence of this is the inability to determine whether students have reached
    the requisite level to advance to the next class or academic year. This can subsequently
    have a cascading impact. If the reliability of students' grades as indicators
    for prospective employers and graduate schools is compromised, it can erode trust
    in the university system itself and lead to the depreciation of degrees and, ultimately,
    the demise of universities. So what to do? Do we discourage the use of ChatGPT?
    Do we crack down on cheating? We believe the answer to both of these is ‘no’.
    Therefore, how can we deal with this? In order to answer this question, let's
    return to our case study example from the forensic linguistics course.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 课程结束时的表现任务的主要目标是提供一个学生在特定时间点的整体表现快照。虽然这种评估可以在课程期间定期进行，但它通常发生在课程结束时。然而，人工智能（AI）的出现，尤其是ChatGPT，引发了一个重要的考虑。在AI能够熟练完成这些评估的情况下——正如我们所观察到的，它通常可以轻松完成——教师可能会遇到准确衡量学生真实学习成果的挑战。这种潜在后果是无法确定学生是否达到了进入下一课程或学年的必要水平。这随后可能会产生连锁反应。如果学生的成绩作为潜在雇主和研究生院指标的可信度受损，它可能会侵蚀对大学体系的信任，并导致学位贬值，最终导致大学的衰落。那么我们该怎么办？我们是否应该阻止使用ChatGPT？我们是否应该打击作弊？我们认为这两个问题的答案都是“不”。那么，我们该如何应对这种情况？为了回答这个问题，让我们回到我们案例研究课程中的例子。
- en: 'In previous courses, prior to the launch of ChatGPT, using the recommended
    MEF course planning approach in line with flipped learning, the instructor applied
    the GRASPs mnemonic to create the end-of-course performance task with the aim
    of assessing achievement of the learning outcome ‘Compose a mock closing argument
    on a specific aspect of language in a real-life case and justify your argument’.
    Based on this, she set the following task:'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT推出之前，在之前的课程中，根据翻转式学习的推荐MEF课程规划方法，教师应用GRASPs助记法来创建课程结束时的表现任务，目的是评估学习成果“在现实生活中的案件特定语言方面撰写模拟总结陈词并证明你的论点”。基于此，她设定了以下任务：
- en: 'For this task, you will take on the role of either the defence or prosecution,
    with the goal of getting the defendant acquitted or convicted in one of the cases.
    Your audience will be the judge and jury. The situation entails making a closing
    argument at the end of a trial. As the product/performance, you are required to
    create a closing argument presented both in writing and as a recorded speech.
    The standards for assessment include: providing a review of the case, a review
    of the evidence, stories and analogies, arguments to get the jury on your client’s
    side, arguments attacking the opposition’s position, concluding comments to summarise
    your argument, and visual evidence from the case.'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个任务，你将扮演辩护人或检方，目标是使被告在一项案件中获释或被判有罪。你的听众将是法官和陪审团。这种情况包括在审判结束时进行总结陈词。作为产品/表现，你需要创建一份书面和录音的总结陈词。评估标准包括：对案件进行回顾，对证据进行回顾，讲述故事和类比，提出论点以使陪审团站在你的客户一方，提出攻击对方立场的论点，总结你的论点的结论性评论，以及来自案件的可视证据。
- en: In the rubric that the instructor created for this assessment, each of the criteria
    was evenly weighted. To see how ChatGPT-resilient this original assessment was,
    as described in the research methodology chapter, the instructor copied and pasted
    the rubric into ChatGPT, in relation to specific cases, to see what it could do.
    What came out was astounding. ChatGPT swiftly generated the majority of the speech
    for each of the cases, including nearly all of the aspects required in the rubric.
    However, she observed that its weakness lay in providing detailed evidence related
    to forensic linguistics and, while it couldn't create specific visuals pertaining
    to the case, it could make suggestions for images. While this initially seemed
    to render much of the existing assessment redundant, the instructor realised the
    exciting potential of ChatGPT as a useful tool for students' future careers. She
    therefore decided to retain ChatGPT as a feature in the assessment but needed
    to address the fact that it could handle the majority of the task. To do this,
    the instructor adapted the rubric by adjusting the weighting, giving more importance
    to the parts ChatGPT could not handle and reducing its weighting in areas where
    it excelled. This involved assigning greater weight to the review of evidence,
    including emphasising the importance of referencing primary sources rather than
    solely relying on ChatGPT, as well as increasing the weighting for the provision
    of visual evidence. She also realised that, in relation to the learning outcome
    ‘Compose a mock closing argument on a specific aspect of language in a real-life
    case and justify your argument’, she was relying on written evidence for students
    to justify their argument instead of a more real-life scenario whereby they would
    verbally have to justify their argument in a live setting. Therefore, she decided
    to add a question and answer session after the videos were presented for which
    students would be evaluated on both the questions they asked of other students
    and their ability to answer the questions posed to them. This also was given a
    much higher weighting than the parts that ChatGPT was able to do. In reflecting
    on the outcomes of the redesigned assessment/rubric with the Spring 2022–2023
    class, the instructor was pleased with the assessments the students produced.
    However, a recurring observation was that most students defaulted to directly
    reading from their prepared scripts during the video presentations – a tactic
    that would not translate well to real-world scenarios. Consequently, the instructor
    has planned to conduct live (synchronous, online) presentations in the subsequent
    semester to bolster the students' public speaking skills and remove the reliance
    on reading from partially AI-generated scripts. At this point, it should be noted
    that if, as suggested in Stage 1, above, the instructor had carefully analysed
    her learning outcomes via the decision-making process for evaluating learning
    outcomes in an AI environment flowchart, this issue would not have arisen.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 在教师为这次评估创建的评分标准中，每个标准都被平均加权。为了了解原始评估的ChatGPT抗性，正如研究方法章节所述，教师将评分标准复制粘贴到ChatGPT中，针对特定案例，看看它能做什么。结果令人震惊。ChatGPT迅速为每个案例生成了大部分演讲内容，包括评分标准中几乎所有的方面。然而，她观察到它的弱点在于提供与法语言学相关的详细证据，尽管它不能创建与案例相关的特定视觉元素，但它可以提出图像建议。虽然这最初似乎使大部分现有评估变得多余，但教师意识到ChatGPT作为学生未来职业的有用工具的激动潜力。因此，她决定保留ChatGPT作为评估的一个功能，但需要解决它能够处理大部分任务的事实。为此，教师通过调整权重来调整评分标准，给予ChatGPT无法处理的方面更多的重要性，并在它表现优异的领域减少其权重。这包括赋予证据审查更大的权重，强调引用原始资料的重要性，而不是仅仅依赖ChatGPT，以及增加提供视觉证据的权重。她还意识到，在关于学习成果“针对现实生活中案例的一个特定语言方面撰写模拟结辩词并论证你的论点”的相关方面，她依赖于书面证据让学生论证他们的论点，而不是一个更贴近现实场景，他们需要在现场口头论证他们的论点。因此，她决定在视频展示后增加一个问答环节，学生将根据他们向其他学生提出的问题以及他们回答提出的问题的能力进行评估。这也比ChatGPT能够完成的方面给予了更高的权重。在反思春季2022-2023班重新设计的评估/评分标准的结果时，教师对学生们产生的评估感到满意。然而，一个反复出现的观察结果是，大多数学生在视频展示中直接从他们准备的脚本中阅读——这种策略在现实世界中不太适用。因此，教师计划在下一学期进行现场（同步，在线）展示，以增强学生的公共演讲技能，并消除对部分由AI生成的脚本的依赖。在此阶段，应该注意的是，如果，如上所述第一阶段建议的那样，教师通过在AI环境中的学习成果评估决策流程仔细分析了她的学习成果，这个问题就不会出现。
- en: Another crucial factor to consider in the design of an end-of-course performance
    task, not explored in the example from our case study, is the potential involvement
    of AI, like ChatGPT, in performing certain elements of the task that could prove
    beneficial in students' future careers but, through doing so, would compromise
    the student's foundational learning. In such scenarios, how should educators proceed?
    In such situations, we suggest creating a closed environment where the use of
    ChatGPT or similar AI chatbots is neither allowed nor possible. This might involve
    conducting assessments in tightly controlled settings or blocking the use of internet
    access. This is particularly important if the assessment takes the form of writing.
    Even better, instructors should opt for assessments emphasising hands-on skills,
    practical experiments, and tactile tasks – areas where AI, even advanced systems
    like ChatGPT, faces inherent limitations. These evaluations require physical presence
    and direct manipulation, rendering them resistant to AI interference. Consequently,
    such assessment methods become AI-resilient, promoting authentic understanding
    and practical application of knowledge.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计课程结束绩效任务时需要考虑的另一个关键因素，在我们案例研究的例子中没有探讨，是AI（如ChatGPT）在执行任务某些可能对学生未来职业生涯有益但会损害学生基础学习的元素中的潜在参与。在这种情况下，教育者应该如何行动？在这种情况下，我们建议创建一个封闭的环境，在那里不允许也不可能出现ChatGPT或类似的AI聊天机器人。这可能涉及在严格控制的环境中进行评估或阻止互联网访问。如果评估以写作的形式进行，这一点尤为重要。更好的是，教师应选择强调动手技能、实践实验和触觉任务的评估——在这些领域，即使是像ChatGPT这样的先进系统也面临固有的局限性。这些评估需要物理存在和直接操作，使它们对AI干扰具有抵抗力。因此，这种评估方法成为AI弹性，促进对知识的真实理解和实际应用。
- en: Based on our discussions above, we propose the following flowchart to assist
    with the decision-making process involved in designing end-of-course performance
    tasks in an AI environment ([Fig. 3](#978-1-83797-647-820241009.xhtml#fig2)).
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们上面的讨论，我们提出以下流程图，以协助在人工智能环境中设计课程结束绩效任务的决定过程（[图3](#978-1-83797-647-820241009.xhtml#fig2)）。
- en: '![image](images/f09-02.jpg)'
  id: totrans-774
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/f09-02.jpg)'
- en: Fig. 3.Decision-Making Process for Designing End-of-Course Performance Tasks
    in an AI Environment.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.在人工智能环境中设计课程结束绩效任务的决定过程。
- en: When considering the creation of end-of-course performance tasks, we have suggested
    using the GRASPS mnemonic from UbD. We believe this approach is valuable as it
    incorporates real-world contexts into assessments, which is particularly important
    as it equips students with essential skills for their future careers. However,
    an even more advantageous approach would involve centring the assessment around
    a genuine industry problem, which can be ascertained by collaborating with industry,
    as outlined in the previous chapter. This approach will not only enhance authenticity
    but also equip students to tackle real-world challenges in various industries,
    thereby enhancing their job readiness. Our main aim as educators is to provide
    students with the tools needed to tackle the challenges they will face in life.
    By addressing future issues, our students will be better prepared for upcoming
    job opportunities.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑创建课程结束绩效任务时，我们建议使用UbD中的GRASPS助记法。我们认为这种方法很有价值，因为它将现实世界的情境融入评估中，这对于为学生未来的职业生涯提供必要技能尤为重要。然而，一种更具优势的方法是将评估围绕一个真实的行业问题进行，这可以通过与行业合作来实现，如前一章所述。这种方法不仅将增强真实性，而且使学生能够应对各种行业中的现实世界挑战，从而提高他们的就业准备能力。我们作为教育者的主要目标是为学生提供应对生活中挑战所需的工具。通过解决未来问题，我们的学生将更好地为即将到来的就业机会做好准备。
- en: Pre-class Quizzes
  id: totrans-777
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课前测验
- en: In the preceding section, we explored the design of end-of-course performance
    tasks in the context of AI. However, Stage 2 of UbD planning also involves the
    process of determining other evidence to assess students' learning. Within the
    framework of flipped learning, a significant aspect of this involves pre-class
    quizzes (AfL). Therefore, we briefly revisit the steps for implementing this process
    here. During the pre-class or online phase, each unit commences with an overview
    and introduction of key terms. Students then engage in a prior knowledge activity
    to gauge their comprehension. Following this, concepts are introduced through
    videos or articles, with accountability ensured via AfL, often in the form of
    brief quizzes offering automated feedback. This approach guarantees that students
    possess the requisite knowledge before attending class. Our experience indicates
    that grading pre-class quizzes heightens student engagement with pre-class materials.
    However, with ChatGPT's ability to provide quick responses, a challenge arises
    regarding pre-class quizzes, as students might solely rely on it without engaging
    with the pre-class resources. This gives rise to two challenges. Firstly, if students
    take this shortcut, they are circumventing the learning process. Secondly, the
    outcomes of the pre-class quizzes are essential tools for instructors to assess
    their students' grasp of concepts before the class. This insight reveals what
    students comprehend, identifies misconceptions and highlights areas of confusion.
    Consequently, it empowers instructors to tailor their teaching approach using
    ‘just-in-time’ instruction to address these gaps. However, this adaptive teaching
    strategy becomes pointless if students have not completed the pre-class quizzes
    themselves. So, how should this issue be approached?
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们探讨了在人工智能背景下课程结束时的表现任务设计。然而，UbD规划的第二个阶段还涉及到确定其他证据来评估学生的学习过程。在翻转学习的框架内，这一过程的一个重要方面包括课前测验（AfL）。因此，我们在此简要回顾实施这一过程的步骤。在课前或在线阶段，每个单元都以概述和关键术语的介绍开始。然后，学生通过一个先验知识活动来评估他们的理解。随后，通过视频或文章介绍概念，并通过AfL确保问责制，通常以简短测验的形式提供自动反馈。这种方法确保学生在上课前具备必要的知识。我们的经验表明，评分课前测验提高了学生对课前材料的参与度。然而，由于ChatGPT提供快速响应的能力，课前测验出现了一个挑战，即学生可能会完全依赖它，而不与课前资源互动。这导致了两个挑战。首先，如果学生采取这种捷径，他们就是在绕过学习过程。其次，课前测验的结果是教师评估学生在课前对概念掌握的重要工具。这一洞察揭示了学生理解了什么，识别了误解，并突出了困惑的领域。因此，它使教师能够使用“即时”教学来调整他们的教学方法，以解决这些差距。然而，如果学生没有自己完成课前测验，这种适应性教学策略就变得毫无意义。那么，我们应该如何处理这个问题呢？
- en: To address this, we believe modifying question types becomes essential. Instead
    of closed-answer questions, instructors can prompt students to describe real-life
    applications of what they have learnt. Alternatively, integrating online interactive
    elements like group discussions or debates in the pre-class assessments can promote
    collaboration and sharing of perspectives, which ChatGPT cannot replicate. This
    personalisation fosters higher-order thinking and discourages over-reliance on
    ChatGPT. Nonetheless, this approach requires manual grading by instructors, as
    automated systems can often only handle closed-ended questions. Consequently,
    it increases the instructor's workload, which might be challenging for classes
    with large student sizes. Striking a balance between personalised assessments
    and feasible grading strategies is crucial to maintain the benefits of active
    engagement while managing the workload efficiently. Another way to address this
    challenge is by shifting the pre-class quizzes from an online setting to the classroom
    at the start of each lesson. In this approach, students need to engage with the
    pre-class material and take notes before class, which they will then use to answer
    quiz questions in class. To ensure that ChatGPT cannot easily complete these quizzes,
    instructors could introduce time constraints by implementing interactive quiz
    tools like Kahoot or Mentimeter. These tools are useful as they not only encourage
    quick information processing but also provide valuable data for the instructor
    to apply grades based on each student's responses. Another effective approach
    is to have students create visuals to demonstrate their understanding of the pre-class
    content. For instance, students can develop mind maps, flowcharts, concept maps,
    timelines, Venn diagrams, bar charts, infographics, storyboards or labelled diagrams.
    These activities are useful, as they promote recall and comprehension of the subject
    matter while fostering visual representation, which enhances students' overall
    understanding. Moreover, engaging in these activities gives students a strong
    incentive to interact with the pre-class materials before attending the lesson.
    The advantage of incorporating such activities lies in the meaningful engagement
    of students with the pre-class materials, as they actively utilise the creation
    of visuals to enhance their comprehension. Additionally, instructors can collect
    the visuals from students at the beginning of the class, after completing the
    activities and use them to assign grades. In an online setting, students can take
    photographs of their hand-drawn visuals and submit them to the instructor for
    evaluation. This way, assessment becomes more holistic, encouraging both deep
    learning and creative expression. Nonetheless, it's important to recognise a drawback
    if conducting pre-class quizzes during the class session. This approach shortens
    the window for instructors to identify students' comprehension gaps before the
    class starts and limits the time available to plan for ‘just-in-time’ teaching.
    In this scenario, adaptation would need to occur in real-time during the class.
    To demonstrate the decision-making process that an instructor should go through
    to decide how to set pre-class quizzes, we propose the following flowchart ([Fig.
    4](#978-1-83797-647-820241009.xhtml#fig3)).
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们认为修改问题类型变得至关重要。与其使用封闭式答案问题，教师可以引导学生描述他们所学知识的现实生活应用。或者，在课前评估中整合在线互动元素，如小组讨论或辩论，可以促进协作和观点的分享，这是ChatGPT无法复制的。这种个性化培养高级思维，并阻止过度依赖ChatGPT。然而，这种方法需要教师手动评分，因为自动化系统通常只能处理封闭式问题。因此，它增加了教师的工作量，对于学生人数较多的班级来说可能具有挑战性。在个性化评估和可行的评分策略之间取得平衡，对于在有效管理工作量同时保持积极参与的好处至关重要。另一种解决这个挑战的方法是将课前测验从在线环境转移到每节课开始时的课堂中。在这种方法中，学生需要在课前与课前材料互动并做笔记，然后他们将使用这些笔记在课堂上回答测验问题。为了确保ChatGPT无法轻易完成这些测验，教师可以通过实施Kahoot或Mentimeter等互动测验工具来引入时间限制。这些工具很有用，因为它们不仅鼓励快速信息处理，还为教师提供了根据每个学生的回答进行评分的宝贵数据。另一种有效的方法是让学生创建视觉图表来展示他们对课前内容的理解。例如，学生可以开发思维导图、流程图、概念图、时间线、维恩图、条形图、信息图表、故事板或标注图。这些活动很有用，因为它们促进了记忆和理解主题内容，同时促进了视觉表示，这增强了学生的整体理解。此外，参与这些活动给了学生在上课前与课前材料互动的强烈动力。将此类活动融入其中的优势在于学生与课前材料的实质性互动，因为他们积极利用视觉图表的创建来增强他们的理解。此外，教师可以在活动完成后、课程开始时收集学生的视觉图表，并据此评分。在在线环境中，学生可以拍摄他们手绘的视觉图表并将其提交给教师进行评估。这样，评估变得更加全面，既鼓励深度学习，又鼓励创造性表达。然而，如果在课堂期间进行课前测验，重要的是要认识到这种方法缩短了教师在课前识别学生理解差距的时间窗口，并限制了为“即时教学”做准备的时间。在这种情况下，适应需要在课堂上实时发生。为了展示教师应通过以下流程图来决定如何设置课前测验的决策过程，我们提出了以下流程图（[图4](#978-1-83797-647-820241009.xhtml#fig3)）。
- en: '![image](images/f09-03.jpg)'
  id: totrans-780
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/f09-03.jpg)'
- en: Fig. 4.Decision-making Process for Designing Pre-class Quizzes in an AI Environment.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.在人工智能环境中设计课前测验的决策过程。
- en: Assessment As Learning
  id: totrans-782
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估即学习
- en: In addition to planning for the end-of-course performance task and pre-class
    quizzes, Stage 2 of UbD also encompasses planning for assessment as learning.
    Therefore, let's briefly revisit what this entails. AaL in education focuses on
    enhancing the learning process through assessment. Unlike traditional post-instruction
    assessments, AaL integrates assessments into learning, actively engaging students.
    AaL underscores students' active participation in learning. Self-assessment and
    reflection develop awareness of strengths and areas for improvement. Students
    take ownership of their learning, set goals and adapt strategies based on self-assessment.
    AaL employs tools like goal setting or personal reflections. These activities
    aid students in gauging understanding, identifying confusion and linking new knowledge
    with prior understanding. This cycle nurtures metacognition, crucial for independent
    learning. AaL brings benefits like active engagement, self-regulation and motivation.
    It cultivates proactive learners who address learning gaps and fosters a growth
    mindset that sees challenges as growth opportunities. AaL empowers students, enriches
    comprehension and instils lifelong learning skills. But how does the emergence
    of ChatGPT influence this?
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 除了规划课程结束时的表现任务和课前测验外，UbD的第二阶段还包括对评估即学习的规划。因此，让我们简要回顾一下这包括哪些内容。在教育中，评估即学习（AaL）侧重于通过评估来提升学习过程。与传统教学后的评估不同，AaL将评估融入学习过程中，积极调动学生的参与。AaL强调学生在学习中的积极参与。自我评估和反思有助于提高对自身优势和改进领域的认识。学生对自己的学习负责，根据自我评估设定目标并调整策略。AaL采用目标设定或个人反思等工具。这些活动帮助学生衡量理解程度，识别困惑，并将新知识与已有理解联系起来。这一循环培养了元认知能力，这对于独立学习至关重要。AaL带来了诸如积极参与、自我调节和动机等好处。它培养了积极主动的学习者，他们能够解决学习差距，并培养一种将挑战视为成长机会的成长心态。AaL赋予学生力量，丰富了理解力，并培养了终身学习技能。但是，ChatGPT的出现如何影响这一点呢？
- en: ChatGPT's real-time feedback offers a potential advantage, promptly aiding students
    in identifying their weaknesses. Yet, solely relying on AI-generated feedback
    might lead to surface-level self-assessment, where students adopt suggestions
    without grasping deeper nuances. Similarly, in terms of taking ownership of learning
    and goal setting, ChatGPT's input could be valuable. It can guide personalised
    goal setting and strategies based on self-assessment outcomes. However, overreliance
    on ChatGPT may disregard individual learning journeys, limiting goal personalisation.
    ChatGPT's thoughtful questions can stimulate deep reflections, yet relying solely
    on AI-generated reflections might hinder authentic self-reflection growth. Addressing
    these concerns involves a balanced approach, capitalising on AI's strengths while
    fostering essential skills. For instance, ChatGPT's real-time feedback aids timely
    self-assessment, but students should critically analyse and complement AI-generated
    insights for deeper self-awareness. While ChatGPT supports goal setting, maintaining
    students' autonomy in shaping goals is vital. Balancing AI-generated and personal
    reflections is required to preserve authenticity. In summary, when navigating
    the interplay between AaL and the emerging influence of ChatGPT, it becomes evident
    that a balanced integration of AI's advantages along with the nurturing of essential
    skills is essential for fostering holistic student development.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的实时反馈提供了潜在优势，能够迅速帮助学生识别自己的弱点。然而，仅仅依赖AI生成的反馈可能会导致表面化的自我评估，学生接受建议而不深入理解更深层次的细微差别。同样，在承担学习责任和设定目标方面，ChatGPT的输入可能很有价值。它可以根据自我评估结果引导个性化的目标设定和策略。然而，过度依赖ChatGPT可能会忽视个人学习旅程，限制目标个性化。ChatGPT的深思熟虑的问题可以激发深入的反思，但仅仅依赖AI生成的反思可能会阻碍真实的自我反思成长。解决这些担忧需要平衡的方法，充分利用AI的优势，同时培养必要技能。例如，ChatGPT的实时反馈有助于及时自我评估，但学生应批判性地分析并补充AI生成的见解，以获得更深的自我意识。虽然ChatGPT支持目标设定，但保持学生在塑造目标方面的自主性至关重要。平衡AI生成的和个人反思是保持真实性的必要条件。总的来说，在导航AaL与ChatGPT新兴影响之间的相互作用时，很明显，平衡整合AI的优势与培养必要技能对于促进学生的全面发展至关重要。
- en: As we wrap up our examination of establishing AI-resilient assessment in the
    ChatGPT era, we maintain a strong conviction in the efficacy of our proposed strategies.
    However, we also believe these strategies offer added benefits. By spreading assessments
    across the semester, we can reduce end-of-semester rush, discourage shortcuts
    like copying or plagiarism, and inspire students to create original, meaningful
    work. This lighter assessment load can boost student confidence and encourage
    meaningful learning. Additionally, distributing assessments throughout the semester
    enhances the feedback loop. Consistent guidance from instructors empowers students
    to track progress, spot areas for improvement and align with their goals – something
    often missing in relying only on mid-term and final exams. Our method smoothly
    integrates feedback into learning, encouraging continuous improvement and deep
    understanding through repeated learning cycles, leading to effective learning.
    Moreover, we believe taking this approach will prepare our graduates for the challenges
    of the modern world, whereas neglecting adaptation could leave them unprepared
    for a rapidly changing world. Interestingly, education experts have been advocating
    for this for years, and we believe ChatGPT might just be the push needed to make
    this change. However, we would be remiss if we did not acknowledge that the implementation
    of these changes often lags behind in university entrance exams, accrediting bodies
    and higher education ministries. Therefore, we contend that universities have
    a vital role to play in assuming leadership to advocate for these reforms, ensuring
    that we collectively empower our students for triumph in a world dominated by
    AI.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们对在ChatGPT时代建立AI抗性评估的考察告一段落，我们坚信我们提出的策略的有效性。然而，我们也相信这些策略提供了额外的益处。通过将评估分散在整个学期中，我们可以减少学期末的匆忙，抵制抄袭或剽窃等捷径，并激励学生创作原创且有意义的作品。这种较轻的评估负担可以增强学生的信心并鼓励有意义的学习。此外，将评估分散在整个学期中增强了反馈循环。来自教师的持续指导使学生能够跟踪进度，发现改进领域并与他们的目标保持一致——这在仅依赖期中和期末考试的情况下往往是缺失的。我们的方法将反馈顺利地融入学习，通过重复学习周期鼓励持续改进和深入理解，从而实现有效的学习。此外，我们相信采取这种做法将为我们的毕业生应对现代世界的挑战做好准备，而忽视适应可能导致他们无法为快速变化的世界做好准备。有趣的是，教育专家已经倡导了多年，我们相信ChatGPT可能正是推动这一变革所需的推动力。然而，如果我们没有承认这些变化的实施往往落后于大学入学考试、认证机构和高等教育部门，我们将犯下错误。因此，我们认为大学在承担领导角色以倡导这些改革方面发挥着至关重要的作用，确保我们共同赋予学生战胜由AI主导的世界的能力。
- en: Adapting Instruction for the AI Era
  id: totrans-786
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 适应AI时代的教学
- en: 'Transitioning to the next phase, Stage 3 – Instruction, let''s briefly recap
    the context to aid understanding. This stage in UbD centres on designing learning
    experiences that align with the objectives set in Stage 1\. The following key
    questions guide this stage: How will we support learners as they come to understand
    important ideas and processes? How will we prepare them to autonomously transfer
    their learning? What enabling knowledge and skills will students need to perform
    effectively and achieve desired results? What activities, sequence and resources
    are best suited to accomplish our goals? (Wiggins & McTighe, 1998). Starting with
    the end-of-course performance task, the instructor identifies key concepts and
    skills, then breaks these down into units to guide the students. After that, thoughtful
    instructional events are designed within each unit, utilising Gagne''s Nine Events
    of Instruction for effective learning. Therefore, at this point, we revisit Gagne''s
    Nine Events of Instruction that we have reordered to suit the flipped learning
    approach. Our approach involves the following elements. In the pre-class online
    stage, there should be: a unit overview; an introduction to key terms; a prior
    knowledge activity; an introduction to the key concepts (via video, article);
    and pre-class quizzes for accountability. In the in-class stage, there should
    be: a start-of-class/bridging activity to review pre-class concept; structured
    student-centred practice; semi-structured student-centred practice; freer student-centred
    practice; and self-reflection (AaL at end of lesson/unit, in/out of class).'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 转入下一阶段，第三阶段——教学，让我们简要回顾一下背景，以帮助理解。在UbD中，这一阶段集中在设计与第一阶段设定的目标相一致的学习体验。以下关键问题指导这一阶段：我们将如何支持学习者理解重要思想和过程？我们将如何准备他们自主转移学习？学生需要哪些促进知识技能，以有效地执行并实现期望的结果？哪些活动、顺序和资源最适合实现我们的目标？（Wiggins
    & McTighe, 1998）。从课程结束时的表现任务开始，讲师确定关键概念和技能，然后将其分解成单元以指导学生。之后，在每个单元中设计周到的教学活动，利用Gagne的九个教学事件以实现有效的学习。因此，在这个阶段，我们重新审视Gagne的九个教学事件，我们已重新排序以适应翻转学习方法。我们的方法包括以下要素。在课前在线阶段，应有：单元概述；关键术语的介绍；先前知识活动；关键概念的介绍（通过视频、文章）；以及课前测验以进行问责。在课堂阶段，应有：课堂开始/桥梁活动以复习课前概念；结构化的以学生为中心的练习；半结构化的以学生为中心的练习；更自由的以学生为中心的练习；以及课程/单元结束时的自我反思（AaL，课内/课外）。
- en: In this section, we closely examine each of these components in relation to
    the potential influence of ChatGPT and the measures we can implement to prevent
    any adverse impact on learning outcomes. However, since we have already discussed
    the pre-class element of AfL in the context of AI-proofing assessment in the section
    above, our focus now shifts to exploring in-class activities. Within our flipped
    learning approach, the instructor starts the class by getting the students to
    review pre-class concepts by participating in start-of-class review activities
    to reinforce comprehension. After that, the emphasis moves to student-centred
    activities, enabling active practice and application of the learnt concepts. Therefore,
    we now take a more detailed look at each of these stages.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们密切审视这些组件与ChatGPT潜在影响的关系，以及我们可以实施的预防措施，以避免对学习成果产生任何不利影响。然而，由于我们已经在上一节中讨论了AfL的课前元素，在AI防护评估的背景下，我们的重点现在转向探索课堂活动。在我们的翻转学习方法中，讲师通过让学生参与课堂开始的复习活动来复习课前概念，以此加强理解。之后，重点转向以学生为中心的活动，使学生能够积极实践和应用所学概念。因此，我们现在更详细地审视这些各个阶段。
- en: Start-of-class Review Activities
  id: totrans-789
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课堂开始时的复习活动
- en: Start-of-class review activities, also known as bridging activities, play a
    crucial role in the instructional strategies of flipped learning. Implemented
    at the beginning of a class session, they serve as a seamless connection between
    the pre-class content and the current lesson. Their primary objective is to activate
    students' prior knowledge, refresh their memory on essential concepts covered
    in the pre-class activities and prepare them for the upcoming lesson. By engaging
    students in a brief, interactive review of the pre-class material, instructors
    can enhance retention and understanding, ensuring a smoother and more effective
    transition to new content. To achieve this, instructors have various options for
    these review activities. For instance, setting paper-based short quizzes or questions
    related to the pre-class key concepts can assess retention. Asking students to
    create concept maps or diagrams to visualise the connections between the concepts
    presented prior to class can foster deeper understanding. Instructors can utilise
    one-minute paper prompts for students to write brief summaries of the main points
    from the pre-class materials in one minute, encouraging quick recall. Additionally,
    Think-Pair-Share activities can be used to prompt students to individually recall
    and discuss key points in pairs or small groups. Further options include interactive
    memory games or flashcards for reviewing important terms or concepts, mini-recap
    presentations where students summarise the main points of pre-class materials,
    or quiz bowl-style activities with questions based on the pre-class material.
    The choice of activity can vary based on subject matter, class size and teaching
    style, ensuring flexibility and engagement. The examples we have suggested here
    are designed in a manner that ensures students cannot effectively utilise ChatGPT
    to complete them, rendering these activities ChatGPT-resilient as they currently
    exist. However, it is during the subsequent in-class activities that certain challenges
    begin to surface.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 课堂开始的复习活动，也称为桥梁活动，在翻转式学习的教学策略中扮演着至关重要的角色。这些活动在课堂开始时实施，作为课前内容和当前课程之间的无缝连接。它们的主要目标是激活学生的先验知识，刷新他们对课前活动中涵盖的必要概念的记忆，并为即将到来的课程做好准备。通过让学生对课前材料进行简短、互动的复习，教师可以增强记忆和理解，确保更顺畅、更有效的内容过渡。为了实现这一目标，教师有多种选择用于这些复习活动。例如，设置基于纸质的简短测验或与课前关键概念相关的问题，可以评估记忆。要求学生创建概念图或图表来可视化课前呈现的概念之间的联系，可以促进更深入的理解。教师可以利用一分钟的纸笔提示，让学生在一分钟内简要总结课前材料中的主要观点，鼓励快速回忆。此外，可以使用思考-配对-分享活动来提示学生以成对或小组的形式单独回忆和讨论关键点。其他选项包括互动记忆游戏或闪卡来复习重要术语或概念，小总结演示，其中学生总结课前材料的主要观点，或基于课前材料的问答比赛风格的活动。活动选择可以根据学科内容、班级规模和教学风格而变化，确保灵活性和参与度。我们这里提出的例子设计得确保学生无法有效地利用ChatGPT来完成它们，使得这些活动在当前形式下对ChatGPT具有抵抗力。然而，在随后的课堂活动中，某些挑战开始显现。
- en: Structured/Semi-structured Activities
  id: totrans-791
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结构化/半结构化活动
- en: 'In the context of flipped learning, the primary objective of in-class activities
    is to allow students to apply the knowledge gained from pre-class materials. Maximising
    the effectiveness of this process entails the careful implementation of scaffolded
    in-class activities. Scaffolding in pedagogy involves furnishing learners with
    temporary assistance, guidance and support while they engage in learning tasks
    or exercises. The overarching aim is to facilitate the gradual development of
    students'' skills and comprehension, equipping them to independently tackle tasks
    while progressively reducing the level of assistance as their competence and confidence
    expand. Consequently, the most optimal approach to orchestrating in-class activities
    follows a sequence: initiating with structured activities, advancing to semi-structured
    tasks and ultimately culminating in freer activities.'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 在翻转式学习的背景下，课堂活动的首要目标是让学生应用课前材料中获得的知识。最大化这一过程的有效性需要精心实施有支架的课堂活动。在教育学中，支架涉及在学习任务或练习中为学习者提供临时的帮助、指导和支持。总体目标是促进学生技能和理解的逐步发展，使他们能够独立完成任务，同时随着他们的能力和信心增强，逐步减少帮助的水平。因此，组织课堂活动的最佳方法遵循一个顺序：从结构化活动开始，发展到半结构化任务，最终
    culminating in freer activities。
- en: Based on the insights gained from our exploratory case study, it becomes evident
    that the stages involving structured and semi-structured activities are where
    ChatGPT can pose the greatest hindrance to effective learning. Consequently, it
    holds immense importance for instructors to try out their structured activities
    in ChatGPT beforehand. If ChatGPT is found capable of fully completing a task,
    instructors should either alter the task or devise an approach that necessitates
    student engagement without relying on ChatGPT. In instances where ChatGPT can
    perform certain parts of a task, instructors should seek ways to modify the activity,
    directing more attention towards the aspects that ChatGPT cannot accomplish. However,
    we are aware that this is easier said than done. Hence, we circle back to instances
    from the Forensic Linguistics course to examine the challenges that emerged and
    how the instructor effectively addressed them.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 基于我们从探索性案例研究中获得的见解，很明显，涉及结构化和半结构化活动的阶段是ChatGPT对有效学习造成最大阻碍的地方。因此，教师在ChatGPT中事先尝试他们的结构化活动具有重要意义。如果发现ChatGPT能够完全完成一项任务，教师应修改任务或设计一种需要学生参与而不依赖ChatGPT的方法。在ChatGPT能够执行任务某些部分的情况下，教师应寻求修改活动的途径，将更多注意力放在ChatGPT无法完成的部分。然而，我们知道这说起来容易做起来难。因此，我们回到法语言学课程中的实例，以检查出现的挑战以及教师如何有效地解决这些问题。
- en: '*Vocabulary Grouping Activities*'
  id: totrans-794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*词汇分组活动*'
- en: Given that the students in the course were non-native speakers, a portion of
    each class was dedicated to reviewing essential vocabulary from the week's case.
    This practice not only aided students in revisiting the cases but also ensured
    they were familiar with the key terms. Typically, this involved providing students
    with the crucial vocabulary items and tasking them with categorising these terms
    into pre-designated groups. Subsequently, they were required to write a sentence
    with each word in relation to the case. However, since ChatGPT could easily perform
    these tasks, the instructor modified the activity as follows. Working in groups,
    students were given the words but not the categories, and their task was to sort
    the words into appropriate groups. They then compared their categorisations with
    those suggested by ChatGPT and engaged in a class discussion about which groupings
    best encapsulated the case's core vocabulary. Instead of constructing sentences,
    the instructor described some of the words verbally, and students had to deduce
    the respective words. After that, individual students described the words to the
    group for them to guess. Through this approach, ChatGPT assumed the role of a
    tool in vocabulary review rather than a direct substitute for the learning process.
  id: totrans-795
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于课程中的学生是非母语者，每次课的一部分时间都用于复习本周案例中的关键词汇。这种做法不仅帮助学生回顾案例，还确保他们熟悉了这些关键术语。通常，这包括向学生提供关键词汇，并要求他们将术语分类到预先指定的组别中。随后，他们需要用每个词写一个与案例相关的句子。然而，由于ChatGPT可以轻松完成这些任务，教师对活动进行了如下修改。学生以小组形式工作，他们得到了单词，但没有分类，他们的任务是将这些单词分类到合适的组别中。然后，他们比较自己的分类与ChatGPT建议的分类，并就哪些分组最能概括案例的核心词汇进行课堂讨论。教师没有让学生构造句子，而是口头描述了一些单词，学生必须推断出相应的单词。之后，个别学生向小组描述单词，让他们猜测。通过这种方法，ChatGPT在词汇复习中扮演了工具的角色，而不是学习过程的直接替代品。
- en: '*Drawing Timelines*'
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*绘制时间线*'
- en: To recap on the important aspects of each case, students were asked to create
    timelines using Padlet's timeline feature. While ChatGPT could not create visual
    content, it could make a list of the case's main points. Students could easily
    copy these into the timeline without thinking deeply, thus making the activity
    pointless. To address this, the instructor used a two-step approach. First, students
    made their timelines from memory. Then, they asked ChatGPT to do the same. This
    helped students see if they missed anything and make changes or to identify areas
    where ChatGPT was incorrect. Next, a verbal discussion was added. Students talked
    about how the events on the timeline were connected. They were asked questions
    about how certain events led to others. In this way, ChatGPT was used by the students
    to check their work, not complete it. The oral task prompted students to contemplate
    the sequence of events and their interconnections more profoundly, an additional
    approach the instructor had not employed before. An additional advantage was that
    this turned out to enrich the learning process, contributing value to the activity.
  id: totrans-797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了回顾每个案例的重要方面，学生被要求使用Padlet的时间线功能创建时间线。虽然ChatGPT不能创建视觉内容，但它可以列出案例的主要观点。学生可以轻松地将这些内容复制到时间线中，而不需要深入思考，从而使这项活动变得毫无意义。为了解决这个问题，讲师采用了两步法。首先，学生根据记忆制作时间线。然后，他们要求ChatGPT做同样的事情。这有助于学生看到他们是否遗漏了什么，并做出更改，或者识别ChatGPT错误的地方。接下来，增加了一个口头讨论。学生讨论了时间线上的事件是如何相互关联的。他们被问及某些事件是如何导致其他事件的。通过这种方式，ChatGPT被学生用来检查他们的工作，而不是完成它。口头任务促使学生更深入地思考事件的顺序及其相互关系，这是讲师之前没有采用的方法。另一个优点是，这最终丰富了学习过程，为活动增添了价值。
- en: '*SWOT Analysis*'
  id: totrans-798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*SWOT分析*'
- en: In one class session, students were assigned the task of conducting a SWOT analysis
    on the impact of ChatGPT on the legal industry. However, ChatGPT's ability to
    swiftly generate a SWOT analysis chart posed a challenge, as students did not
    need to engage in critical thinking to get a result. To address this, the instructor
    employed the following approach. Firstly, students individually completed a SWOT
    analysis without relying on ChatGPT. They then shared their findings with peers
    and consolidated their insights into a unified chart. Secondly, students were
    provided with up-to-date videos and readings discussing ChatGPT's impact on the
    legal industry, which were not present in ChatGPT's database. Using these new
    resources, students refined their charts. Only after this stage did they consult
    ChatGPT to create a SWOT analysis chart. Comparing their own chart with ChatGPT's,
    they sought additional ideas and evaluated ChatGPT's chart against their current
    readings, pinpointing any outdated information and thus critiquing ChatGPT's limitations.
    This led to a discussion on ChatGPT's constraints. The interactive process enhanced
    students' critical thinking and extended their learning beyond ChatGPT's capabilities.
    This was further reinforced through role-playing scenarios, where students assumed
    various roles like law firm partners, discussing ChatGPT's potential impact on
    their business. This role-playing exercise introduced complexity and context,
    augmenting the SWOT analysis with nuances beyond ChatGPT's scope. By structuring
    the SWOT analysis process in a way that went beyond ChatGPT simply producing the
    chart, the instructor managed to ensure that the students derived valuable insights
    and skills that ChatGPT could not easily replicate.
  id: totrans-799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一次课堂教学中，学生被分配了一个任务，即对ChatGPT对法律行业的影响进行SWOT分析。然而，ChatGPT迅速生成SWOT分析图表的能力提出了挑战，因为学生不需要进行批判性思考就能得到结果。为了解决这个问题，讲师采用了以下方法。首先，学生在不依赖ChatGPT的情况下独立完成SWOT分析。然后，他们与同伴分享他们的发现，并将他们的见解整合到一个统一的图表中。其次，学生获得了最新的视频和阅读材料，讨论了ChatGPT对法律行业的影响，这些内容在ChatGPT的数据库中并不存在。利用这些新资源，学生完善了他们的图表。只有在这一阶段之后，他们才咨询ChatGPT来创建SWOT分析图表。比较他们自己的图表与ChatGPT的图表，他们寻求额外的想法，并将ChatGPT的图表与他们的当前阅读材料进行比较，指出任何过时的信息，从而对ChatGPT的局限性进行评论。这导致了对ChatGPT局限性的讨论。这种互动过程增强了学生的批判性思维，并扩展了他们的学习范围，超出了ChatGPT的能力。这通过角色扮演场景得到了进一步的加强，学生扮演了各种角色，如律师事务所合伙人，讨论ChatGPT对他们业务潜在的影响。这种角色扮演练习引入了复杂性和背景，将SWOT分析扩展到了ChatGPT范围之外的细微差别。通过以超越ChatGPT仅仅生成图表的方式结构化SWOT分析过程，讲师设法确保学生获得了ChatGPT难以轻易复制的有价值的见解和技能。
- en: '*SPRE Reports*'
  id: totrans-800
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*SPRE报告*'
- en: In the original course, the students had been tasked with writing a situation,
    problem, response, evaluation report (SPRE) to summarise each case. However, if
    the cases were in ChatGPT's database, ChatGPT could do this instantly, thereby
    bypassing the learning process. Therefore, the instructor took the following approach.
    First, the students used ChatGPT to create a SPRE report of the case. Then the
    instructor provided the students with a set of detailed questions to guide students
    through each component of the SPRE analysis that ChatGPT had produced. This encouraged
    the students to critique ChatGPT's output and to add any information that was
    missing, thus fostering deeper analysis and interpretation. Where possible, the
    instructor provided the students with a similar case based on the same forensic
    linguistics point (e.g., emoji) that was recent, and therefore not in ChatGPT's
    database. However, this involved scouring the internet for relevant recent cases
    and was not always possible. The students then created a SPRE report for the new
    case and compared the two cases to see if any changes in decisions or law were
    made between the two. This required them to identify patterns, contrasts and trends
    that involved higher-order thinking. The students then worked in groups, imagining
    they were either the prosecution or defence for the original case and created
    short notes about the forensic linguistic points from the case. They were then
    mixed and conducted role plays in which they argued for or against the linguistic
    point in question. This added complexity and depth to the original SPRE analysis,
    making it more robust than what ChatGPT could generate alone.
  id: totrans-801
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在原始课程中，学生被要求撰写一个情景、问题、回应、评估报告（SPRE），以总结每个案例。然而，如果案例在ChatGPT的数据库中，ChatGPT可以立即完成这项工作，从而绕过学习过程。因此，教师采取了以下方法。首先，学生使用ChatGPT创建案例的SPRE报告。然后，教师为学生提供了一系列详细的问题，以指导学生通过ChatGPT产生的SPRE分析的每个组成部分。这鼓励学生对ChatGPT的输出进行批判性分析，并添加任何缺失的信息，从而促进更深入的分析和解释。在可能的情况下，教师为学生提供了一个基于相同法语言学点（例如，表情符号）的类似案例，该案例是最近的，因此不在ChatGPT的数据库中。然而，这涉及到在互联网上搜索相关的近期案例，并不总是可行的。然后，学生为新的案例创建了SPRE报告，并将两个案例进行比较，以查看在两个案例之间是否做出了任何关于决定或法律的改变。这要求他们识别涉及更高阶思维的规律、对比和趋势。然后，学生们分组工作，想象自己是原始案例的检方或辩方，并就案例中的法语言学点创建简短笔记。然后，他们被混合在一起，进行角色扮演，在角色扮演中，他们为或反对所讨论的语言学点进行辩论。这增加了原始SPRE分析的复杂性和深度，使其比ChatGPT单独生成的结果更稳健。
- en: 'So, based on these examples, what have we learnt about how to make structured
    or semi-structured in-class activities ChatGPT-enhanced or ChatGPT-resilient?
    We propose that instructors do the following:'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，基于这些例子，我们关于如何使课堂上的结构化或半结构化活动ChatGPT增强或ChatGPT弹性有什么收获呢？我们提出，教师应采取以下措施：
- en: '*Critically Analyse ChatGPT''s Outputs*'
  id: totrans-803
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*批判性地分析ChatGPT的输出*'
- en: Encourage students to evaluate ChatGPT's suggestions critically, identifying
    gaps, limitations, errors and potential improvements.
  id: totrans-804
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励学生批判性地评估ChatGPT的建议，识别差距、局限性、错误和潜在改进。
- en: '*Integrate External Resources*'
  id: totrans-805
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*整合外部资源*'
- en: Have students incorporate additional materials to expand their learning beyond
    ChatGPT's database.
  id: totrans-806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励学生结合额外的材料，以扩展他们的学习，使其超越ChatGPT的数据库。
- en: '*Initiate Discussions and Role-Playing*'
  id: totrans-807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*启动讨论和角色扮演*'
- en: Promote interactive discussions that compare ChatGPT's insights with their own,
    allowing multifaceted exploration through role-playing scenarios.
  id: totrans-808
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 促进互动讨论，比较ChatGPT的见解与他们的见解，通过角色扮演场景进行多方面探索。
- en: '*Conduct Comparative Analysis*'
  id: totrans-809
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*进行对比分析*'
- en: Guide students to compare their work with ChatGPT's outputs, pinpointing discrepancies
    and assessing accuracy.
  id: totrans-810
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引导学生将他们的工作与ChatGPT的输出进行比较，指出差异并评估准确性。
- en: '*Evaluate Independently*'
  id: totrans-811
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*独立评估*'
- en: Encourage students to assess ChatGPT's suggestions against their understanding,
    fostering independent judgement.
  id: totrans-812
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励学生将ChatGPT的建议与他们的理解进行比较，培养独立判断能力。
- en: '*Synthesise Insights*'
  id: totrans-813
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*综合见解*'
- en: Blend ChatGPT's insights with their findings to achieve a comprehensive understanding
    of the subject matter.
  id: totrans-814
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将ChatGPT的见解与他们的发现相结合，以全面理解主题内容。
- en: '*Explore Case Studies and Holistic Learning*'
  id: totrans-815
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*探索案例研究和整体学习*'
- en: Challenge students with recent case studies not in ChatGPT's database, while
    also engaging in verbal discussions, comparisons and interactions for a well-rounded
    perspective.
  id: totrans-816
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向学生提出ChatGPT数据库中不存在的最新案例研究，同时参与口头讨论、比较和互动，以获得全面的视角。
- en: '*Contextualise and Iterate*'
  id: totrans-817
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*情境化与迭代*'
- en: Encourage students to consider real-world contexts, implications and industry
    changes while refining their work through iterative feedback that integrates ChatGPT's
    insights as well as their independent understanding.
  id: totrans-818
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励学生在通过整合ChatGPT的见解以及他们独立理解的反馈进行迭代反馈的过程中，考虑现实世界的情境、影响和行业变化，同时完善他们的工作。
- en: To summarise, while ChatGPT served as a valuable tool in aiding specific aspects
    of the activities described above, our refinements and enhancements extend their
    scope beyond ChatGPT's capabilities. These activities are designed to foster students'
    capacity to synthesise, evaluate and apply knowledge in real-world contexts. Furthermore,
    they encompass discussions and scenarios that surpass ChatGPT's individual capabilities.
    Hence, the activities outlined here are not entirely immune to ChatGPT's influence,
    but rather, they are enhanced by it. In essence, our belief is that integrating
    such activities will stimulate active learning, profound comprehension and the
    development of skills that AI text generators like ChatGPT are unable to duplicate.
    This now brings us to freer activities. And this is where we believe AI chatbots
    like ChatGPT can really be used effectively to enhance learning.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，虽然ChatGPT在协助上述活动的一些特定方面发挥了宝贵的作用，但我们的改进和增强扩展了其范围，超出了ChatGPT的能力。这些活动旨在培养学生的能力，以在现实世界情境中综合、评估和应用知识。此外，它们还包括超越ChatGPT个体能力的讨论和场景。因此，这里概述的活动并非完全不受ChatGPT的影响，而是通过它得到了增强。本质上，我们的信念是，整合此类活动将激发主动学习、深刻理解和技能的发展，这些技能是像ChatGPT这样的AI文本生成器无法复制的。现在，让我们转向自由活动。这正是我们认为像ChatGPT这样的AI聊天机器人可以真正有效地用来增强学习的地方。
- en: Freer Activities
  id: totrans-820
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自由活动
- en: Let's begin by understanding the concept of freer activities and their significance.
    These activities encourage students to creatively and independently apply their
    learning, cultivating higher-order thinking and problem-solving skills. They encompass
    tasks like open-ended prompts, debates, projects, role-playing and real-world
    scenarios, granting students the authenticity to express themselves. The objectives
    encompass practical knowledge application, critical thinking, creativity, effective
    communication, language fluency, autonomy, real-world applicability and heightened
    engagement. Ultimately, these activities empower students to become confident,
    active learners proficient in navigating diverse challenges and contexts. In light
    of our previous discussion, it's worth noting that ChatGPT may be capable of performing
    many parts of these activities. And while, as we have seen, it can serve as a
    tool to enhance learning, we believe that with strategic utilisation, it holds
    even more potential; the potential to truly transform the learning experience.
    With this in mind, let's take a look at two examples from our case study to illustrate
    this.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们理解自由活动及其重要性。这些活动鼓励学生创造性地独立应用他们的学习，培养高级思维和解决问题的技能。它们包括开放式提示、辩论、项目、角色扮演和现实世界场景等任务，赋予学生表达自我的真实性。目标包括实际知识应用、批判性思维、创造力、有效沟通、语言流利、自主性、现实世界适用性和提高参与度。最终，这些活动使学生能够成为自信、积极的学习者，熟练地应对各种挑战和情境。鉴于我们之前的讨论，值得注意的是，ChatGPT可能能够执行这些活动中的许多部分。虽然，正如我们所见，它可以作为提高学习的工具，但我们相信，通过战略性的利用，它具有更大的潜力；即真正改变学习体验的潜力。考虑到这一点，让我们看看我们案例研究中的两个例子，以说明这一点。
- en: 'One of the students on the Forensic Linguistics course had been accepted on
    an Erasmus programme at a Polish law school for the upcoming semester. For his
    final project, he decided to use ChatGPT to prepare for his trip, and then shared
    his insights during the final presentations. His aims were diverse: learning about
    the university, his courses, the town and local culture to be well-prepared. ChatGPT
    proved extremely useful in assisting with this. However, what truly stood out
    was his innovative use of ChatGPT for language learning. Wanting to learn basic
    Polish phrases, he sought advice and practised conversations with ChatGPT. This
    proved highly useful for his learning, as ChatGPT served as a free and easily
    accessible Polish conversation partner – a distinct advantage considering challenges
    in finding such practice partners in Istanbul. He described this experience as
    really significantly improving his ability to learn some Polish before his visit.
    This was one example of how ChatGPT was used to really transform learning. However,
    the principal investigator, herself, had also found a similar use during the analysis
    part of the research process. During this investigation, the researcher referred
    to the insights of the four theorists to create a theoretical framework for analysing
    the findings. Even though the researcher already had a good grounding in these
    theories, she wanted to enhance the analysis stage. To do this, she created custom
    personas for each theorist using Forefront AI (Forefront AI, n.d.). Having developed
    these personalised chatbots, she used them to have discussions about her evolving
    analysis, somewhat akin to conversing with the actual theorists themselves. This
    had a transformative impact, pushing her thinking beyond what she could have achieved
    alone. While it might have been possible to do this without the support of AI
    chatbots, it would have been difficult and time-consuming to find peers with the
    time and expertise to engage in these discussions. Consequently, in both these
    instances, ChatGPT emerged as a transformative learning tool, showcasing its unique
    ability to facilitate learning experiences that would be challenging to achieve
    without the aid of AI. It went beyond mere enhancement and truly revolutionised
    the learning process.'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 在法医语言学课程中，有一位学生被一所波兰法学院录取，参加了即将到来的学期Erasmus项目。为了他的毕业设计，他决定使用ChatGPT来为旅行做准备，并在最后的展示中分享了他的见解。他的目标多种多样：了解大学、课程、城镇和当地文化，以便做好充分准备。ChatGPT在协助这一过程中证明极其有用。然而，真正引人注目的是他对ChatGPT在语言学习上的创新使用。他想要学习基本的波兰语短语，于是向ChatGPT寻求建议并练习对话。这对他的学习非常有帮助，因为ChatGPT作为一个免费且易于获取的波兰语对话伙伴，具有显著优势——考虑到在伊斯坦布尔找到这样的练习伙伴的挑战。他描述这次经历为极大地提高了他在访问之前学习一些波兰语的能力。这是ChatGPT如何真正改变学习的例子之一。然而，主要研究员本人也在研究过程的分析部分发现了类似的使用。在这项调查中，研究人员参考了四位理论家的见解，为分析结果创建了一个理论框架。尽管研究人员对这些理论已经有了很好的基础，但她仍想提高分析阶段。为此，她使用Forefront
    AI（Forefront AI，n.d.）为每位理论家创建了定制的角色。在开发出这些个性化的聊天机器人后，她使用它们来讨论她不断发展的分析，这在某种程度上类似于与实际理论家本人进行对话。这产生了变革性的影响，推动她的思考超越了独自所能达到的境界。虽然在没有AI聊天机器人的支持下可能做到这一点，但找到有时间和专业知识参与这些讨论的同伴将会困难且耗时。因此，在这两个实例中，ChatGPT都成为了一种变革性的学习工具，展示了它独特的促进学习体验的能力，这些体验在没有AI帮助的情况下将难以实现。它超越了单纯的增强，真正地革新了学习过程。
- en: So what can we conclude from this? We believe ChatGPT shows a lot of promise
    as a tool for education. It can make various in-class teaching methods better
    and improve how students learn. However, we urge caution with when it is used.
    This is especially important when foundational learning is involved. Therefore,
    during such activities, we recommend that ChatGPT is not used, and AI-free approaches
    are used instead. However, when it comes to structured and semi-structured in-class
    activities, we believe ChatGPT should take on a pivotal role. During these types
    of activities, we believe ChatGPT can provide the role of a guiding partner, enriching
    student engagement and understanding without taking over the main learning process.
    In addition, integrating ChatGPT into these types of activities can heighten student
    interest and involvement, leading to distinct and interactive learning journeys.
    Moreover, it significantly aids in critical thinking, prompting students to meticulously
    review its responses, identify gaps and engage in discussions that further enhance
    their cognitive involvement. However, we believe ChatGPT's greatest potential
    lies in freer activities where ChatGPT can act as a transformative force, enabling
    students to gain access to external insights, resources and perspectives that
    lie outside the boundaries of traditional learning materials. In conclusion, to
    accomplish learning objectives successfully when planning for instruction, we
    believe instructors should take into account the following factors. Begin by avoiding
    AI integration in foundational learning, such as start-of-class reviews. However,
    after that, move on to structured activities that use ChatGPT but require careful
    assessment of ChatGPT's outputs. Next, progress to semi-structured tasks, encouraging
    students to interact with and expand upon AI-generated ideas. Conclude with freer
    activities where ChatGPT becomes a transformative tool for in-depth exploration
    and analysis. To assist in making these decisions, we suggest the following chart
    ([Table 1](#978-1-83797-647-820241009.xhtml#tbl1)).
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们能从中得出什么结论呢？我们相信ChatGPT在教育工具方面展现出巨大的潜力。它可以使各种课堂教学方法得到改善，并提高学生的学习方式。然而，我们呼吁在使用时保持谨慎。这在涉及基础学习时尤为重要。因此，在这些活动中，我们建议不要使用ChatGPT，而应使用无AI的方法。然而，当涉及到结构化和半结构化的课堂活动时，我们认为ChatGPT应承担关键角色。在这些类型的活动中，我们相信ChatGPT可以扮演指导伙伴的角色，丰富学生的参与度和理解力，而不取代主要的学习过程。此外，将ChatGPT整合到这些类型的活动中可以提高学生的兴趣和参与度，从而带来独特且互动的学习之旅。此外，它还极大地促进了批判性思维，促使学生仔细审查其响应，识别差距，并参与讨论，进一步增强他们的认知参与。然而，我们认为ChatGPT最大的潜力在于更自由的活动，在这些活动中，ChatGPT可以作为变革力量，使学生能够接触到传统学习材料边界之外的见解、资源和观点。总之，在规划指导时，为了成功实现学习目标，我们认为教师应考虑以下因素。首先，避免在基础学习（如课堂开始时的复习）中整合AI。然而，之后，转向使用ChatGPT的结构化活动，但需要仔细评估ChatGPT的输出。接下来，过渡到半结构化任务，鼓励学生与AI生成的想法互动并加以扩展。最后，以更自由的活动结束，在这些活动中，ChatGPT成为深入探索和分析的变革性工具。为了帮助做出这些决定，我们建议以下图表（[表1](#978-1-83797-647-820241009.xhtml#tbl1)）。
- en: Table 1\. Decision-Making Chart for Designing Instructional Activities in an
    AI Environment.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 表1. 在AI环境中设计教学活动的决策图表。
- en: '| Stage 3: Instruction – Plan Learning Experiences and Instruction |'
  id: totrans-825
  prefs: []
  type: TYPE_TB
  zh: '| 第三阶段：指导 - 规划学习体验和指导 |'
- en: '| --- |'
  id: totrans-826
  prefs: []
  type: TYPE_TB
  zh: '| --- |'
- en: '| **Foundational learning activity** | Avoid AI integration | AI-free zone
    |'
  id: totrans-827
  prefs: []
  type: TYPE_TB
  zh: '| **基础学习活动** | 避免AI整合 | 无AI区 |'
- en: '| **Structured activity** | Use AI with careful consideration |  AI-enhanced
    zone |'
  id: totrans-828
  prefs: []
  type: TYPE_TB
  zh: '| **结构化活动** | 谨慎使用AI | AI增强区 |'
- en: '| **Semi-structured activity** | Interact with AI-generated ideas |'
  id: totrans-829
  prefs: []
  type: TYPE_TB
  zh: '| **半结构化活动** | 与AI生成的想法互动 |'
- en: '| **Freer activity** | Use AI for in-depth exploration | AI-transformation
    zone |'
  id: totrans-830
  prefs: []
  type: TYPE_TB
  zh: '| **更自由的活动** | 使用AI进行深入探索 | AI转型区 |'
- en: While we have confidence in the effectiveness of our strategies, they will obviously
    need to be tested in the upcoming academic year. Despite our strategies, the possibility
    of students using ChatGPT in unintended ways, like during the AI-free zone, still
    exists. To address this concern, it is crucial to secure students' support by
    demonstrating how ChatGPT might undermine their learning journey, potentially
    leading to struggles later in their academic or professional careers. To tackle
    this, we propose that instructors devote time to emphasise the significance of
    foundational learning, as highlighted earlier in this chapter. Subsequently, instructors
    can guide students through the provided flowchart of questions, illustrating the
    reasoning behind when and how AI can complement their learning. It is important,
    however, that the assessments and learning activities offered in the courses align
    with the recommendations outlined in flowcharts for this approach to be effective.
    This is even more important in online courses where instructors lack direct supervision
    over students' ChatGPT usage. By engaging students in comprehending the potential
    drawbacks of relying solely on AI tools, we can secure their cooperation and safeguard
    the integrity of the learning process. These aspects, therefore, should be integrated
    into AI literacy training programmes, which we address later in this chapter.
    However, before we delve into the details of AI literacy training, we believe
    it is essential to examine the significance of prompt banks, as these will play
    a vital role in the training programme.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们对策略的有效性充满信心，但它们显然需要在即将到来的学年中进行测试。尽管我们有策略，但学生可能会在非AI区域等意想不到的方式使用ChatGPT的可能性仍然存在。为了解决这一担忧，通过展示ChatGPT可能如何破坏他们的学习之旅，从而可能导致他们在学术或职业生涯后期遇到困难，确保学生的支持至关重要。为了应对这一问题，我们建议教师投入时间强调基础学习的重要性，正如本章前面所强调的那样。随后，教师可以引导学生通过提供的流程图问题，说明何时以及如何使用AI来辅助他们的学习。然而，重要的是，课程中提供的评估和学习活动应与流程图中概述的建议相一致，这样才能使这种方法有效。这在在线课程中尤为重要，因为教师无法直接监督学生的ChatGPT使用情况。通过让学生理解仅依赖AI工具的潜在缺点，我们可以确保他们的合作并保护学习过程的完整性。因此，这些方面应纳入AI素养培训计划中，我们将在本章后面讨论。然而，在我们深入探讨AI素养培训的细节之前，我们认为检查提示库的重要性是至关重要的，因为这些将在培训计划中发挥关键作用。
- en: Leveraging AI Prompt Banks
  id: totrans-832
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用AI提示库
- en: Based on our research, it is evident that the input you provide to ChatGPT directly
    influences the output you receive. Without a clear context, you may not get the
    desired response, and if your requests lack quality, the output may also be subpar.
    Furthermore, to achieve the best results, multiple iterations are often necessary
    to refine your queries. However, too often, users resort to one-shot requests.
    A one-shot request in ChatGPT is a single input prompt without any follow up interactions.
    It is a standalone query where the model generates a response based solely on
    that initial prompt, without prior context or conversation. One-shot requests
    are useful for specific tasks or quick information retrieval but have limitations
    in context and continuity. For more interactive conversations, multi-turn interactions
    are preferred, enabling the model to maintain context and provide accurate and
    coherent responses based on prior interactions. However, users are often unaware
    of this. So how can we rectify this? We believe the answer lies in providing or
    developing user prompt banks.
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们的研究，您提供给ChatGPT的输入将直接影响您收到的输出。如果没有明确上下文，您可能不会得到期望的响应，而且如果您的请求缺乏质量，输出也可能不尽如人意。此外，为了获得最佳结果，通常需要进行多次迭代来完善您的查询。然而，用户往往过于频繁地求助于一次性请求。在ChatGPT中，一次性请求是一个没有后续交互的单个输入提示。这是一个独立的查询，模型仅根据那个初始提示生成响应，没有先前的上下文或对话。一次性请求适用于特定任务或快速信息检索，但在上下文和连续性方面存在局限性。对于更互动的对话，多轮交互更受欢迎，使模型能够维持上下文，并根据先前的交互提供准确和连贯的响应。然而，用户往往对此不太了解。那么我们如何纠正这一点呢？我们认为答案在于提供或开发用户提示库。
- en: A user prompt bank is a pre-prepared collection of prompts or example queries
    that users can refer to while interacting with the AI language model. The prompt
    bank is designed to guide users in formulating their questions or input in a way
    that elicits more accurate and relevant responses from ChatGPT. The purpose of
    a prompt bank is to provide users with helpful examples and suggestions on how
    to structure their queries effectively. It can cover a variety of topics, scenarios
    or styles of interaction that users may encounter when using ChatGPT. By having
    access to a prompt bank, users can gain insights into the type of input that yields
    better outcomes and enhances their overall experience with the AI model. For instance,
    a prompt bank for ChatGPT might include sample prompts for seeking information,
    creative writing, problem-solving, language translation and more. Users can refer
    to these examples and adapt them to their specific needs, enabling them to get
    the desired responses from ChatGPT more efficiently. By utilising a prompt bank,
    users can feel more confident in their interactions with ChatGPT and improve the
    quality of the AI's output by providing clear and contextually relevant input.
    It serves as a valuable resource for users to explore the capabilities of the
    language model and maximise the benefits of using ChatGPT in various tasks and
    applications.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 用户提示库是一个预先准备好的提示或示例查询的集合，用户在与AI语言模型交互时可以参考。提示库旨在指导用户以能够从ChatGPT获得更准确和相关的响应的方式制定他们的问题或输入。提示库的目的是为用户提供有用的示例和建议，以有效地构建他们的查询。它可以涵盖用户在使用ChatGPT时可能遇到的各种主题、场景或交互风格。通过访问提示库，用户可以了解哪种输入会产生更好的结果，并提高他们在AI模型整体体验中的质量。例如，ChatGPT的提示库可能包括寻求信息、创意写作、问题解决、语言翻译等方面的示例提示。用户可以参考这些示例，并根据他们的具体需求进行调整，使他们能够更有效地从ChatGPT获得所需的响应。通过利用提示库，用户在与ChatGPT的交互中会更有信心，并通过提供清晰和上下文相关的输入来提高AI输出的质量。它为用户探索语言模型的能力和最大化ChatGPT在各种任务和应用中的好处提供了一个宝贵的资源。
- en: 'While we are still in the process of developing user prompt banks at our university,
    we offer some examples below. In drawing up these prompts, once again we have
    drawn upon Bloom''s taxonomy. This is because by working through Bloom''s taxonomy,
    the user can start with lower-level knowledge questions and gradually move to
    higher-level analysis, as this can lead to more meaningful and insightful responses.
    Our suggestions are broken down into initial prompts and modifying prompts. We
    break our prompts down into two groups: initial prompts and modifying prompts.
    Below, we provide examples of initial prompts following Bloom''s.'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们还在大学里开发用户提示库的过程中，下面我们提供一些例子。在制定这些提示时，我们再次借鉴了布鲁姆的分类法。这是因为通过布鲁姆的分类法，用户可以从较低层次的知识问题开始，逐渐过渡到更高层次的分析，因为这可以导致更有意义和洞察力的回答。我们的建议分为初始提示和修改提示。我们将提示分为两组：初始提示和修改提示。以下，我们提供了遵循布鲁姆分类法的初始提示示例。
- en: 'Knowledge:'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 知识：
- en: Define the term ______.
  id: totrans-837
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义术语______。
- en: List the main characteristics of ______.
  id: totrans-838
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出______的主要特征。
- en: Name the key components of ______.
  id: totrans-839
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出______的关键组成部分。
- en: 'Comprehension:'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 理解：
- en: Explain how ______ works.
  id: totrans-841
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释______是如何工作的。
- en: Summarise the main ideas of ______.
  id: totrans-842
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结______的主要思想。
- en: Describe the process of ______.
  id: totrans-843
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述______的过程。
- en: 'Application:'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：
- en: Use ______ to solve this problem.
  id: totrans-845
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用______来解决这个问题。
- en: Apply the concept of ______ to a real-life scenario.
  id: totrans-846
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将______的概念应用于现实生活中的场景。
- en: Demonstrate how to use ______ in a practical situation.
  id: totrans-847
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实际情况下展示如何使用______。
- en: 'Analysis:'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：
- en: Break down ______ into its constituent parts.
  id: totrans-849
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将______分解为其组成部分。
- en: Compare and contrast the differences between ______ and ______.
  id: totrans-850
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较和对比______和______之间的差异。
- en: Identify the cause-and-effect relationships in ______.
  id: totrans-851
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别______中的因果关系。
- en: 'Synthesis:'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 综合：
- en: Create a new design or solution for ______.
  id: totrans-853
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为______创建一个新的设计或解决方案。
- en: Compose a piece of writing that integrates ideas from ______ and ______.
  id: totrans-854
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写一篇将______和______中的想法整合在一起的写作。
- en: Develop a plan to improve ______ based on the data provided.
  id: totrans-855
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据提供的数据制定一个改进______的计划。
- en: 'Evaluation:'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：
- en: Assess the effectiveness of ______ in achieving its objectives.
  id: totrans-857
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估______在实现其目标方面的有效性。
- en: Judge the validity of the argument presented in ______.
  id: totrans-858
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 判断______中提出的论点的有效性。
- en: Critique the strengths and weaknesses of ______.
  id: totrans-859
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批评______的优缺点。
- en: 'Similarly, different prompts can be used for each of the four domains of knowledge.
    This is useful when aiming to enhance learning and understanding in various subjects
    or disciplines. Examples include the following:'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，可以为知识的四个领域中的每一个使用不同的提示。当旨在提高各种科目或学科的学习和理解时，这很有用。以下是一些例子：
- en: '*Metacognitive Knowledge:*'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: '*元认知知识：*'
- en: 'Strategic knowledge:'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 战略知识：
- en: Explain how you would approach solving a complex problem in [domain/subject].
  id: totrans-863
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释你将如何解决[领域/科目]中的复杂问题。
- en: 'Knowledge about cognitive tasks:'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 对认知任务的知识：
- en: Discuss the difference between analysis and synthesis in [domain/subject].
  id: totrans-865
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论在[领域/科目]中分析和综合的区别。
- en: Explain the process of critical thinking and its importance in [domain/subject].
  id: totrans-866
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释批判性思维的过程及其在[领域/科目]中的重要性。
- en: 'Appropriate contextual and conditional knowledge:'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 适当的情境和条件知识：
- en: Provide examples of when to apply [specific technique] in [domain/subject].
  id: totrans-868
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供在[领域/科目]中应用[特定技术]的例子。
- en: Describe the factors that influence decision-making in [domain/subject].
  id: totrans-869
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述影响[领域/科目]中决策的因素。
- en: 'Self-knowledge:'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 自我知识：
- en: Explain how I can adapt my study strategies based on [personal learning preferences]
  id: totrans-871
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释如何根据[个人学习偏好]调整我的学习策略。
- en: '*Procedural Knowledge:*'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: '*程序知识：*'
- en: 'Knowledge of subject-specific skills and algorithms:'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 对特定学科技能和算法的知识：
- en: Demonstrate the steps to solve [specific problem] in [domain/subject].
  id: totrans-874
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 展示在[领域/科目]中解决[特定问题]的步骤。
- en: Explain the algorithm used in [specific process] in [domain/subject].
  id: totrans-875
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释[领域/科目]中[特定过程]使用的算法。
- en: 'Knowledge of subject-specific techniques and methods:'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 对特定学科的技术和方法的知识：
- en: Describe the different research methodologies used in [domain/subject].
  id: totrans-877
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述在[领域/科目]中使用的不同研究方法。
- en: Explain the key steps in conducting a statistical analysis for [specific data].
  id: totrans-878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释对[特定数据]进行统计分析的关键步骤。
- en: 'Knowledge of criteria for determining when to use appropriate procedures:'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 确定何时使用适当程序的标准的知识：
- en: Discuss the factors that determine when to use qualitative or quantitative research
    methods in [domain/subject].
  id: totrans-880
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论在[领域/科目]中确定何时使用定性或定量研究方法的因素。
- en: Explain the conditions under which [specific technique] is most effective in
    [domain/subject].
  id: totrans-881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释在[领域/科目]中[特定技术]最有效的条件。
- en: '*Conceptual Knowledge:*'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: '*概念知识：*'
- en: 'Knowledge of classifications and categories:'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 对分类和类别的知识：
- en: Categorise different types of [specific elements] in [domain/subject].
  id: totrans-884
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在[领域/科目]中分类不同类型的[特定元素]。
- en: Explain the classification of organisms based on their characteristics in [domain/subject].
  id: totrans-885
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释根据[领域/科目]中的特征对生物的分类。
- en: 'Knowledge of principles and generalisations:'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 对原则和一般化的知识：
- en: Describe the fundamental principles of [specific theory] in [domain/subject].
  id: totrans-887
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述[领域/科目]中[特定理论]的基本原理。
- en: Discuss the generalisations made in [specific research] within [domain/subject].
  id: totrans-888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论在[领域/科目]中[特定研究]内做出的概括。
- en: 'Knowledge of theories, models and structures:'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 对理论、模型和结构的知识：
- en: Explain the key components of [specific model] used in [domain/subject].
  id: totrans-890
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释在[领域/科目]中使用的[特定模型]的关键组成部分。
- en: Discuss the major theories influencing [specific field] in [domain/subject].
  id: totrans-891
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论影响[领域/科目]中[特定领域]的主要理论。
- en: '*Factual Knowledge:*'
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: '*事实知识：*'
- en: 'Knowledge of terminology:'
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 术语知识：
- en: 'Define the following terms in [domain/subject]: [term 1], [term 2], [term 3].'
  id: totrans-894
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在[领域/科目]中定义以下术语：[术语1]，[术语2]，[术语3]。
- en: Provide a list of essential vocabulary related to [specific topic] in [domain/subject].
  id: totrans-895
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供与[领域/科目]中[特定主题]相关的必要词汇列表。
- en: 'Knowledge of specific details and elements:'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 对具体细节和元素的知识：
- en: List the main elements that contribute to [specific process] in [domain/subject].
  id: totrans-897
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出对[特定过程]在[领域/科目]中的主要贡献元素。
- en: Identify the key events and dates related to [historical event] in [domain/subject].
  id: totrans-898
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定与[历史事件]相关的[领域/科目]中的关键事件和日期。
- en: 'The suggestions above are for initial prompts. However, for modifications and
    iterations of ChatGPT''s output, we suggest the following prompts:'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 上述建议是初始提示。然而，对于ChatGPT输出的修改和迭代，我们建议以下提示：
- en: 'Comprehension:'
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 理解：
- en: 'Clarification Prompt: Can you please provide more details about [topic]?'
  id: totrans-901
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确提示：你能提供更多关于[主题]的细节吗？
- en: 'Expansion Prompt: Can you elaborate on [idea or concept]?'
  id: totrans-902
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展提示：你能详细说明[想法或概念]吗？
- en: 'Application:'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 应用：
- en: 'Correction Prompt: Actually, [fact or information] is not accurate. The correct
    information is [correction].'
  id: totrans-904
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修正提示：实际上，[事实或信息]并不准确。正确的信息是[修正]。
- en: 'Rephrasing Prompt: Can you rephrase [sentence or paragraph] using simpler language?'
  id: totrans-905
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新措辞提示：你能用更简单的语言重新表述[句子或段落]吗？
- en: 'Synthesis:'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 综合分析：
- en: 'Creative Input Prompt: Imagine a scenario where [situation] happens. Describe
    what would occur next.'
  id: totrans-907
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意输入提示：想象一个[情况]发生的场景。描述接下来会发生什么。
- en: 'Alternative Perspective Prompt: Consider the opposite viewpoint of [idea or
    argument].'
  id: totrans-908
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一种观点提示：考虑[想法或论点]的相反观点。
- en: 'Analysis:'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 分析：
- en: 'Comparative Analysis Prompt: Compare and contrast [two concepts, products or
    solutions].'
  id: totrans-910
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对比分析提示：比较和对比[两个概念、产品或解决方案]。
- en: 'Evaluation:'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：
- en: 'In-depth Explanation Prompt: Provide a more detailed analysis of [specific
    aspect or topic].'
  id: totrans-912
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深入解释提示：请提供对[特定方面或主题]的更详细分析。
- en: 'Summary and Conclusion Prompt: Summarise the key points of your response in
    a few sentences.'
  id: totrans-913
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要和结论提示：用几句话总结你回答的关键点。
- en: 'Continuation Prompt: Please build upon your previous response and explore [next
    aspect or question].'
  id: totrans-914
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 续写提示：请基于你之前的回答，并探讨[下一个方面或问题]。
- en: 'While the examples we have given above are generic and can be used across all
    disciplines, we believe that the development of discipline specific prompt banks
    will be more effective. As a result, one of the initiatives planned at MEF for
    the upcoming academic year is to have each department create their own prompt
    banks, customised to their specific disciplines and unique needs. This approach
    aims to enhance students'' experiences by offering prompts that align closely
    with their academic areas, ensuring more relevant and tailored interactions with
    ChatGPT. However, there is an alternative option: individuals can craft their
    own personalised prompt banks. Indeed, this is precisely the approach adopted
    by the authors during the book-writing process.'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们上面给出的例子是通用的，并且可以应用于所有学科，但我们相信，开发特定学科的提示库将更加有效。因此，MEF计划在即将到来的学年采取的一项举措是让每个部门创建他们自己的提示库，这些提示库将根据他们特定的学科和独特需求定制。这种方法旨在通过提供与他们的学术领域紧密相关的提示来增强学生的体验，确保与ChatGPT的互动更加相关和定制。然而，还有一个替代选项：个人可以创建他们自己的个性化提示库。实际上，这正是作者在写作过程中的采用的方法。
- en: Creating a personal prompt bank offers numerous advantages to users within AI-driven
    education and learning contexts. Through the creation and curation of their own
    prompts, users can tailor their learning experiences to align with their unique
    goals, interests and areas of focus. This personalised approach not only fosters
    a deeper sense of engagement but also allows for a more meaningful and relevant
    interaction with AI systems. One of the key benefits is the opportunity for users
    to customise their learning journey. By selecting prompts that cater to their
    specific learning needs, they can address areas of confusion, challenge themselves
    and explore subjects in greater depth. The act of curating a personal prompt bank
    can itself be a motivational endeavour, as users become actively invested in shaping
    their learning content. Furthermore, a personal prompt bank serves as a dynamic
    tool for ongoing learning and practice. Users can revisit prompts related to challenging
    concepts, reinforcing their understanding over time. As they interact with AI
    systems using their curated prompts, they can refine and adapt their bank based
    on the responses received, leading to improved interactions and learning outcomes.
    This process encourages users to actively participate in their learning journey
    and engage with AI technology. It nurtures skills like digital literacy and adaptability,
    which are increasingly valuable in an AI-centric world. Beyond immediate benefits,
    a well-curated prompt bank evolves into a valuable resource, adaptable to changing
    learning needs over the long term. In essence, the creation of a personal prompt
    bank empowers users with autonomy and agency, facilitating a customised and enriching
    learning experience. It enables users to actively shape their education, aligning
    it with their preferences and needs while deepening their understanding and engagement
    with AI-powered learning environments.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: '在人工智能驱动的教育和学习环境中，创建个人提示库为用户提供了众多优势。通过创建和整理他们自己的提示，用户可以定制他们的学习体验，以符合他们独特的目标、兴趣和关注领域。这种个性化的方法不仅培养了一种更深的参与感，而且也允许与人工智能系统进行更有意义和相关的互动。其中一项关键好处是用户有机会定制他们的学习之旅。通过选择满足他们特定学习需求的提示，他们可以解决疑惑区域、挑战自我并更深入地探索主题。整理个人提示库本身就可以是一项激励人心的努力，因为用户会积极投入于塑造他们的学习内容。此外，个人提示库作为持续学习和实践的动力工具。用户可以回顾与挑战性概念相关的提示，随着时间的推移加强他们的理解。当他们使用整理好的提示与人工智能系统互动时，可以根据收到的响应来调整和改进他们的库，从而提高互动和学习成果。这个过程鼓励用户积极参与他们的学习之旅，并与人工智能技术互动。它培养了如数字素养和适应性等技能，这些技能在以人工智能为中心的世界中越来越有价值。除了即时好处之外，一个精心整理的提示库可以演变成为一个宝贵的资源，能够适应长期变化的学习需求。本质上，创建个人提示库赋予用户自主权和能动性，促进定制和丰富的学习体验。它使用户能够积极塑造他们的教育，使其与他们的偏好和需求相一致，同时加深他们对人工智能学习环境的理解和参与。  '
- en: Fostering AI Literacy
  id: totrans-917
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 培养人工智能素养
- en: 'Our research has clearly underscored the urgent need for AI literacy training
    among both students and instructors. However, what exactly does AI literacy entail?
    In essence, AI literacy expands beyond digital literacy and encompasses the ability
    to comprehend, apply, monitor and critically reflect on AI applications, even
    without the expertise to develop AI models. It surpasses mere understanding of
    AI capabilities; it involves being open to harnessing AI for educational purposes.
    Equipping educators and students with the confidence and responsibility to effectively
    use AI tools makes AI literacy an indispensable skill. However, when promoting
    AI literacy, two primary objectives must be taken into account. Firstly, a comprehensive
    exploration of how users can adeptly wield ChatGPT as a valuable educational tool
    is essential. Secondly, providing instructors with guidance on seamlessly integrating
    ChatGPT into their educational practices while maintaining the integrity of their
    curricula, assessments and instruction is pivotal. This ensures that students
    do not bypass the essential learning process and neglect foundational knowledge.
    AI literacy training within universities should be customised differently for
    students and instructors, however, there will be a certain amount of crossover.
    For students, it is imperative that they grasp the fundamental concepts of AI,
    its applications, and its potential impacts across various fields. This knowledge
    will empower them to make informed decisions and actively engage with AI technologies.
    Furthermore, it is crucial that we equip our students with an understanding of
    the ethical implications of AI, including biases, privacy concerns and accountability.
    They need to comprehend how AI technologies can shape society and cultivate responsible
    usage. AI literacy should focus on nurturing students'' critical thinking skills,
    as this will enable them to assess AI-generated content, differentiate between
    human and AI contributions and evaluate the reliability of information produced
    by AI. Regarding training for instructors, instructors should acquire the proficiency
    to seamlessly integrate AI tools into their teaching methods. This involves understanding
    AI''s potential in enhancing learning experiences, automating administrative tasks
    and providing personalised feedback to students. Instructors also need to stay
    updated about AI-driven research tools, including data analysis and natural language
    processing tools. This knowledge will ensure they remain abreast of the latest
    advancements in their respective fields. Furthermore, instructors need to play
    a pivotal role in responsibly guiding students'' use of AI tools for academic
    purposes. This will include fostering originality, steering clear of plagiarism
    or unethical practices and ensuring a constructive learning experience. While
    the core concepts of AI literacy might share similarities, the emphasis and depth
    of training need to be customised differently. Students require a comprehensive
    understanding to effectively navigate AI-driven landscapes, while instructors
    necessitate a deeper focus on integrating AI into their teaching and research
    methodologies. The approach to achieving this will vary based on each university''s
    specific requirements and available technological resources. To offer some guidance,
    we present the framework for the AI literacy training courses that are currently
    in development at MEF, which can be found in the appendices. These encompass the
    following: An AI literacy training programme for instructors (Appendix A); an
    AI literacy training programme for students (Appendix B); as well as a proposed
    semester-long AI literacy course for students (Appendix C).'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的研究明确强调了在学生和教师中开展人工智能素养培训的紧迫需求。然而，人工智能素养究竟包含哪些内容呢？本质上，人工智能素养超越了数字素养，包括理解、应用、监控和批判性地反思人工智能应用的能力，即使没有开发人工智能模型的专业知识。它不仅超越了仅仅理解人工智能的能力；它还涉及到开放地利用人工智能进行教育目的。为教育者和学生提供有效使用人工智能工具的信心和责任感，使人工智能素养成为一种不可或缺的技能。然而，在推广人工智能素养时，必须考虑两个主要目标。首先，全面探索用户如何熟练地使用ChatGPT作为有价值的教育工具是至关重要的。其次，为教师提供指导，确保将ChatGPT无缝集成到他们的教育实践中，同时保持课程、评估和教学的完整性，这一点至关重要。这确保了学生不会绕过必要的学习过程，忽视基础知识。然而，在大学中的人工智能素养培训应根据学生和教师的不同需求进行定制，尽管会有一定程度的交叉。对于学生来说，掌握人工智能的基本概念、其应用以及其在各个领域的潜在影响至关重要。这些知识将使他们能够做出明智的决定，并积极参与人工智能技术。此外，我们还需要让学生了解人工智能的伦理影响，包括偏见、隐私问题和问责制。他们需要理解人工智能技术如何塑造社会，并培养负责任的用法。人工智能素养应侧重于培养学生的批判性思维技能，因为这将使他们能够评估人工智能生成的内容，区分人类和人工智能的贡献，并评估人工智能产生信息的可靠性。至于教师的培训，教师应掌握将人工智能工具无缝集成到教学方法中的技能。这包括理解人工智能在增强学习体验、自动化行政任务和为学生提供个性化反馈方面的潜力。教师还需要了解人工智能驱动的工具，包括数据分析工具和自然语言处理工具。这些知识将确保他们能够跟上各自领域的最新进展。此外，教师需要在负责任地指导学生使用人工智能工具进行学术目的方面发挥关键作用。这包括培养原创性，避免剽窃或不道德的行为，并确保积极的学习体验。虽然人工智能素养的核心概念可能具有相似性，但培训的重点和深度需要根据不同的需求进行定制。学生需要全面理解，以有效地导航人工智能驱动的领域，而教师则需要更深入地关注将人工智能集成到他们的教学和研究方法中。实现这一目标的方法将根据每所大学的特定要求和可用技术资源而有所不同。为了提供一些指导，我们提出了MEF目前正在开发的人工智能素养培训课程框架，可在附录中找到。这些包括以下内容：为教师设计的人工智能素养培训计划（附录A）；为学生的设计的人工智能素养培训计划（附录B）；以及为学生的建议的为期一个学期的人工智能素养课程（附录C）。
- en: In summary, this chapter has discussed crucial themes concerning the integration
    of AI in education. We have explored the impact of AI on foundational learning,
    navigated challenges through the use of flipped learning and developed a framework
    for designing future-ready curricula. We have discussed resilient assessment strategies
    and the significance of adapting instruction for the AI era. The utilisation of
    AI prompt banks has been emphasised, along with the need to foster student and
    instructor AI literacy. This brings us to our final chapter, in which we discuss
    the contributions our study has made to knowledge and research within the realm
    of AI in higher education.
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，本章讨论了关于人工智能在教育中整合的关键主题。我们探讨了人工智能对基础学习的影响，通过翻转课堂的使用来应对挑战，并制定了一个设计未来课程框架。我们讨论了弹性评估策略以及适应人工智能时代的教学调整的重要性。强调了人工智能提示库的使用，以及培养学生和教师人工智能素养的必要性。这把我们带到了最后一章，其中我们讨论了我们的研究对高等教育中人工智能领域的知识和研究做出的贡献。
- en: Chapter 10
  id: totrans-920
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第10章
- en: Contributions to Knowledge and Research
  id: totrans-921
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对知识和研究的贡献
- en: Review of Research Scope and Methodology
  id: totrans-922
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 研究范围和方法综述
- en: 'During our research, we thoroughly examined the impact of ChatGPT and artificial
    intelligence (AI) chatbots on higher education. MEF University in Istanbul served
    as our research site, renowned for its integration of AI and innovative educational
    approaches. Through experiments and faculty discussions, we initiated this project
    to investigate how ChatGPT may affect higher education institutions, students
    and instructors. Our objectives were to understand the changes in dynamics caused
    by these technologies. We framed our research questions around the roles of students,
    instructors and institutions of higher education in the presence of ChatGPT. By
    exploring these questions, our aim was to gain insights into the transformative
    impact of AI chatbots in education and provide guidance for successful integration.
    To understand the big picture, we conducted an exploration of AI and ChatGPT,
    including its historical development and addressing ethical concerns like privacy,
    bias and transparency. We emphasised the limitations of ChatGPT, including its
    potential for generating misleading information and the challenge of addressing
    its shortcomings. Furthermore, we discussed the broader implications of AI on
    the future of work and education. We also touched upon the growing concerns about
    the threat that AI may pose and discussed how national and international policies
    are starting to be developed to mitigate such threats. To deepen our understanding,
    we explored theoretical perspectives such as critical theory and phenomenology,
    allowing us to examine power dynamics, social structures and subjective experiences
    related to ChatGPT. Then, in our literature review, we analysed various scholarly
    papers on integrating ChatGPT in education, including document and content analysis,
    meta-literature reviews and user case studies, conducted within a 4-month timeframe.
    This review helped us identify recurring themes, gaps in the existing literature
    and areas that required further research. Our research methodology adopted a qualitative
    approach, exploring subjective experiences and meanings associated with interactions
    with ChatGPT. Through a case study approach, we collected data from multiple sources,
    including critical incidents, researcher diaries, interviews, observations and
    student projects and reflections. From thematic analysis, we identified six themes:
    Input Quality and Output Effectiveness of ChatGPT, Limitations and Challenges
    of ChatGPT, Human-like Interactions with ChatGPT, Personal Aide/Tutor Role of
    ChatGPT, Impact of ChatGPT on User Learning and Limitations of a Generalised Bot
    for Educational Context. By examining each theme in relation to our research questions,
    the data, the literature and our theoretical framework, we gained a comprehensive
    understanding of the implications and significance of our findings.'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的研究中，我们全面考察了ChatGPT和人工智能（AI）聊天机器人对高等教育的影响。伊斯坦布尔的MEF大学作为我们的研究场所，以其人工智能和创新的教學方法而闻名。通过实验和教师讨论，我们启动了这个项目，以调查ChatGPT可能对高等教育机构、学生和教师产生的影响。我们的目标是了解这些技术引起的动态变化。我们围绕ChatGPT存在时学生、教师和高等教育机构的作用来构建我们的研究问题。通过探讨这些问题，我们的目的是深入了解AI聊天机器人在教育中的变革性影响，并提供成功整合的指导。为了理解整体情况，我们探索了人工智能和ChatGPT，包括其历史发展和解决隐私、偏见和透明度等伦理问题。我们强调了ChatGPT的局限性，包括其产生误导性信息的潜力以及解决其不足的挑战。此外，我们还讨论了人工智能对工作和教育未来的更广泛影响。我们还简要提到了人们对人工智能可能构成的威胁日益增长的担忧，并讨论了国家和国际政策如何开始制定以减轻这些威胁。为了深化我们的理解，我们探讨了批判理论现象学等理论视角，使我们能够检查与ChatGPT相关的权力动态、社会结构和主观体验。然后，在我们的文献综述中，我们分析了关于在教育中整合ChatGPT的多种学术论文，包括文档和内容分析、元文献综述和用户案例研究，这些研究在4个月的时间内进行。这次综述帮助我们确定了重复出现的主题、现有文献中的空白以及需要进一步研究的领域。我们的研究方法采用定性方法，探索与ChatGPT互动相关的主观体验和意义。通过案例研究方法，我们从多个来源收集数据，包括关键事件、研究者日记、访谈、观察和学生项目及反思。通过主题分析，我们确定了六个主题：ChatGPT的输入质量和输出有效性、ChatGPT的局限性和挑战、与ChatGPT的人性化互动、ChatGPT的个人助手/导师角色、ChatGPT对用户学习的影响以及通用机器人对教育背景的局限性。通过将每个主题与我们的研究问题、数据、文献和我们的理论框架联系起来进行考察，我们获得了对发现的影响和重要性的全面理解。
- en: Key Insights and Findings
  id: totrans-924
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键见解和发现
- en: What we discovered is that while ChatGPT proves highly useful across various
    applications, its efficacy depends on input quality and specificity. Clear prompts
    lead to accurate responses, but multiple iterations and modifications may be necessary
    for desired outcomes. ChatGPT operates predictively, lacking a full grasp of context,
    which poses a limitation. Challenges in application include the absence of a standardised
    referencing guide, potential generation of incorrect responses and inherent biases.
    Users perceive ChatGPT as human-like, blurring the lines between human and AI
    interaction, necessitating the promotion of critical thinking and information
    literacy skills. In education, ChatGPT shows versatility and practicality, but
    concerns arise that overreliance may hinder critical thinking and independent
    knowledge acquisition. In addition, its generalised approach exhibits limitations
    regarding disciplines and cultural setting.
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现，虽然ChatGPT在各种应用中证明非常有用，但其效果取决于输入质量和具体性。清晰的提示可以导致准确的响应，但为了达到期望的结果，可能需要进行多次迭代和修改。ChatGPT以预测性方式运行，缺乏对上下文的全面理解，这构成了一个限制。应用中的挑战包括缺乏标准化的参考指南、可能产生错误响应以及固有的偏见。用户将ChatGPT视为类似人类，模糊了人类与AI交互的界限，这需要促进批判性思维和信息素养技能。在教育领域，ChatGPT显示出多样性和实用性，但有人担心过度依赖可能会阻碍批判性思维和独立知识获取。此外，其通用方法在学科和文化背景方面显示出局限性。
- en: Based on these findings, it is clear that the integration of AI is poised to
    bring about significant transformations in the roles of students, instructors
    and higher education institutions. This transformation unfolds in several ways.
    Drawing upon Christensen's theory, students are now presented with the option
    to leverage ChatGPT for specific educational tasks, ushering in an era of AI-supported
    time optimisation. However, this shift also implicates Bourdieu's concepts of
    cultural and social capital, as an excessive reliance on AI could result in the
    replication of knowledge without genuine comprehension, potentially affecting
    students' educational habitus shaped by their socio-cultural backgrounds. When
    examined through a Marxist lens, this phenomenon might signify an instance of
    technological determinism reshaping educational dynamics for students, possibly
    leading to a decline in critical thinking and reduced engagement with the learning
    process. Moreover, the act of referencing AI-generated information introduces
    unique challenges, reflective of a technological framing of knowledge. Consequently,
    students are entrusted with the active navigation of their technological interaction,
    fostering authentic understanding and shifting them from passive recipients to
    active participants in their educational journey. Shifting focus to instructors,
    as proposed by Christensen's Theory of Jobs to be Done, educators now have the
    option to utilise ChatGPT to automate routine tasks and generate educational materials,
    freeing up time for a more refined teaching approach. However, it is vital for
    instructors to validate ChatGPT's outputs, revealing areas where AI technologies
    require fine-tuning. Through a Bourdieusian lens, instructors' roles are poised
    to evolve as they navigate AI's integration into pedagogy, encompassing an embodiment
    of cultural capital. To counteract potential bypassing of learning and preserve
    authenticity, teaching methodologies must evolve accordingly. Approaching this
    from a Marxist perspective, AI automation's introduction could signify a form
    of commodification. Nonetheless, instructors' ongoing need to validate outputs
    and create effective assignments serves as a countermeasure against complete alienation.
    Viewing this interplay through a Heideggerian framework, instructors assume the
    responsibility of guiding students in the judicious use of AI, ensuring technology
    serves as a conduit for truth revelation rather than mere knowledge framing. As
    such, instructors play a pivotal role in cultivating an educational environment
    characterised by authenticity and thoughtful engagement, even amid technological
    advancements. Broadening the perspective to encompass higher education institutions,
    the integration of ChatGPT offers universities an avenue to heighten productivity
    and streamline educational processes. However, the challenge lies in aligning
    this technological leap with the needs of both students and faculty members. This
    alignment closely aligns with Bourdieu's notions of capital and social structure,
    necessitating updates to institutional policies, enhancements in assessment methodologies
    and robust training initiatives. Through the lens of Bourdieu, ChatGPT emerges
    as a novel form of cultural capital, enhancing institutions' prestige and credibility.
    Nevertheless, upholding equitable access and addressing biases remains pivotal
    to prevent the perpetuation of societal disparities. Through a Marxist perspective,
    the inclusion of ChatGPT might be construed as a form of education commodification.
    However, safeguarding equitable access and nurturing critical engagement upholds
    the enduring value of human oversight within the realm of education. As seen through
    a Heideggerian framework, institutions shoulder the task of balancing the interplay
    between students, instructors and the intrinsic essence of technology. Thus, institutions
    must employ AI in a manner that uncovers truth and amplifies comprehension, all
    while preserving the core role of human elements in education.
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些发现，很明显，人工智能的整合将带来学生、教师和高等教育机构角色的重要转变。这种转变以多种方式展开。借鉴克利斯滕森的理论，学生现在可以选择利用ChatGPT来完成特定的教育任务，从而迎来一个AI支持的优化时间的新时代。然而，这种转变也涉及到布迪厄的文化和社会资本的概念，因为过度依赖AI可能导致知识的复制而没有真正的理解，这可能会影响学生由其社会文化背景塑造的教育习惯。从马克思主义的角度来看，这一现象可能标志着技术决定论重塑学生教育动态的一个例子，可能导致批判性思维的下降和对学习过程的参与度降低。此外，引用AI生成信息的行为引入了独特的挑战，反映了知识的技术框架。因此，学生被委托主动导航他们的技术互动，培养真正的理解，并将他们从被动的接受者转变为教育旅程中的积极参与者。转向教师方面，根据克利斯滕森的“待完成工作”理论，教育工作者现在可以选择利用ChatGPT来自动化常规任务并生成教育材料，从而腾出时间采用更精细的教学方法。然而，对于教师来说，验证ChatGPT的输出，揭示AI技术需要微调的领域，是至关重要的。从布迪厄的视角来看，随着教师将AI整合到教学中的导航，他们的角色有望演变，包括文化资本的体现。为了防止学习的绕过和保持真实性，教学方法必须相应地发展。从马克思主义的角度来看，AI自动化的引入可能标志着一种商品化形式。然而，教师持续需要验证输出和创建有效的作业，这可以作为防止完全异化的对策。通过海德格尔的框架来看，教师承担着指导学生明智使用AI的责任，确保技术作为真理揭示的渠道，而不是仅仅的知识框架。因此，即使在技术进步的背景下，教师也在培养一个以真实性和深思熟虑的参与为特征的教育环境方面发挥着关键作用。扩大视角以涵盖高等教育机构，ChatGPT的整合为大学提供了一个提高生产力和简化教育流程的途径。然而，挑战在于将这一技术飞跃与学生和教师的需求相一致。这种一致性紧密符合布迪厄的资本和社会结构观念，需要更新机构政策、改进评估方法和强大的培训计划。从布迪厄的视角来看，ChatGPT出现作为一种新的文化资本，增强了机构的声望和可信度。然而，维护公平获取和解决偏见仍然是防止社会差异持续的关键。从马克思主义的角度来看，ChatGPT的纳入可能被视为一种教育商品化。然而，保护公平获取和培养批判性参与维护了教育领域人类监督的持久价值。从海德格尔的框架来看，机构承担着平衡学生、教师和技术内在本质之间互动的任务。因此，机构必须以揭示真理和增强理解的方式使用AI，同时保持教育中人类要素的核心作用。
- en: Theoretical Advancements
  id: totrans-927
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论进步
- en: The integration of the theoretical frameworks of critical theory and phenomenology
    into our research study on the impact of ChatGPT on higher education represents
    a significant stride towards advancing the theoretical discourse within the field.
    By employing these philosophical lenses, our research transcends mere examination
    and enters the realm of deep understanding, nuanced analysis and holistic exploration.
    Through the combination of critical theory and phenomenology, our research embraces
    a multidimensional understanding of the impact of ChatGPT. Rather than analysing
    this integration from a singular perspective, our approach delves into power dynamics,
    subjective experiences, existential dimensions and authenticity. This comprehensive
    exploration offers a deeper grasp of the technology's effects on students, educators
    and institutions. Critical theory's focus on power dynamics exposes hidden inequalities
    and systemic structures. By applying this lens, our research uncovers potential
    disparities in the adoption and utilisation of ChatGPT, shedding light on how
    technology can either perpetuate or challenge existing hierarchies. This unveiling
    of hidden dynamics enriches the discourse around technology's transformative potential
    within higher education. Phenomenology's emphasis on subjective experiences empowers
    our research to transcend the superficial layer of technological implementation.
    By delving into the conscious experiences of stakeholders, our study elevates
    the conversation beyond technical functionalities to explore the nuances of how
    individuals perceive, adapt to and interact with ChatGPT. This human-centred exploration
    adds depth and authenticity to the theoretical advancements we are making. Heideggerian
    philosophy introduces an existential layer to our research, urging a contemplation
    of the essence of being and the profound implications of technology on human existence.
    This philosophical lens elevates the conversation to a level of introspection
    which is not often found in empirical studies. It invites researchers, educators
    and policymakers to consider the philosophical underpinnings of their choices
    and decisions regarding technology integration. The amalgamation of these frameworks
    encourages a holistic consideration of the ethical, social and personal dimensions
    of technology integration. Thus, our research doesn't solely focus on the functionality
    of ChatGPT but rather its consequences on power structures, pedagogical relationships
    and the authentic experiences of those involved. This comprehensive analysis contributes
    to the theoretical advancement by promoting well-rounded and informed decision-making.
    By paving the way for an in-depth exploration of ChatGPT's impact, our research
    sets a precedent for future investigations. Our approach demonstrates the value
    of intertwining philosophy and technology in educational research. Researchers
    interested in the interplay between emerging technologies and education may find
    inspiration in our study's philosophical underpinnings, further advancing the
    theoretical discourse.
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 将批判理论和现象学的理论框架整合到我们对ChatGPT对高等教育影响的研究中，标志着在学科领域内推进理论讨论的重要一步。通过运用这些哲学视角，我们的研究超越了单纯的考察，进入了深入理解、细致分析和全面探索的领域。通过批判理论和现象学的结合，我们的研究对ChatGPT的影响采取了多维度的理解。我们不是从单一的角度分析这种整合，而是深入探讨权力动态、主观体验、存在维度和真实性。这种全面的探索为我们提供了对技术对学生、教育者和机构影响的更深刻理解。批判理论对权力动态的关注揭示了隐藏的不平等和系统性结构。通过应用这一视角，我们的研究揭示了ChatGPT的采用和利用中可能存在的差异，揭示了技术如何维持或挑战现有的等级制度。这种隐藏动态的揭示丰富了关于技术在高等教育中变革潜能的讨论。现象学对主观体验的强调使我们的研究超越了技术实施的表面层次。通过深入到利益相关者的意识体验中，我们的研究将对话提升到技术功能性的层面，探讨个人如何感知、适应和与ChatGPT互动的细微差别。这种以人为中心的研究为我们在理论上的进步增添了深度和真实性。海德格尔哲学为我们研究引入了存在层面，敦促我们思考存在的本质以及技术对人类存在的深远影响。这一哲学视角将对话提升到一个在实证研究中很少见到的内省水平。它邀请研究人员、教育者和政策制定者考虑他们在技术整合方面的选择和决策的哲学基础。这些框架的融合鼓励对技术整合的伦理、社会和个人维度进行全面的考虑。因此，我们的研究不仅仅关注ChatGPT的功能性，而是关注其对权力结构、教学关系和参与者真实体验的影响。这种全面的分析通过促进全面和明智的决策，为理论进步做出了贡献。通过为深入探索ChatGPT的影响铺平道路，我们的研究为未来的调查设定了先例。我们的方法展示了哲学与技术在教育研究中的结合价值。对新兴技术与教育之间相互作用感兴趣的研究人员可能会从我们研究的基础哲学中找到灵感，进一步推进理论讨论。
- en: Implications for Higher Education Institutions
  id: totrans-929
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高等教育机构的影响
- en: 'Overall, the implications of AI for institutions of higher education are broad
    and profound, affecting various aspects of academia. These implications span across
    ethical considerations, product-related adjustments and significant shifts in
    educational approaches, all of which necessitate careful examination and adaptation.
    In the realm of ethical considerations, we strongly recommend refraining from
    the utilisation of AI detection systems. This perspective stems from the intrinsic
    opacity, inaccuracies and potential biases associated with these systems. Moreover,
    we extensively assess existing recommendations for AI referencing systems, ultimately
    concluding their impracticality and inefficiency. A significant portion of our
    discourse centres on the re-evaluation of plagiarism within the AI era, a challenge
    magnified by emerging technologies that challenge traditional norms. This complexity
    deepens when AI is involved, given its absence of identifiable authorship, leading
    to the intriguing notion that AI''s mere existence could be likened to plagiarism.
    Amid these intricate challenges, we underscore the imperative of fostering proficiency
    in AI ethics among students, educators and institutions. This not only entails
    comprehending the ethical ramifications of AI but also ensuring its responsible
    and informed integration within academic settings. Thus, we assert that universities''
    ethics committees should play a pivotal role in driving this transformation. With
    the increasing prevalence of AI-generated content, institutions must grapple with
    redefining plagiarism and attributing credit in this AI-infused age. This endeavour
    will necessitate a nuanced understanding of how AI interfaces with established
    academic standards. When considering the implications on product development,
    we firmly advocate for universities to prioritise achieving an equitable distribution
    of AI bots. This can be achieved through the establishment of institutional agreements
    that grant bot access to all instructors and students, thus ensuring universal
    availability or by directing students towards readily available open sources.
    As AI becomes an integral part of the educational landscape, it becomes increasingly
    crucial to address product-related considerations. Ensuring fair and equal access
    to AI bots becomes paramount in order to prevent any potential disparities in
    resource allocation among students. Moreover, we underline the significance of
    universities forging strong partnerships with industries. Recognising the influence
    of AI on these sectors and identifying the skill sets that employers are seeking
    in graduates will serve as valuable insights for curriculum refinement within
    universities. This collaborative effort with industries becomes essential to synchronise
    educational offerings with the ever-changing requirements of the job market. Such
    collaboration is pivotal in ensuring that students are adequately equipped with
    the essential AI-related competencies to excel in industries increasingly shaped
    by AI technologies. Furthermore, by fostering collaboration, universities can
    gain insights into the evolving utilisation of AI within specific industries.
    This valuable information can subsequently inform the creation or acquisition
    of specialised bots that align with industry trends. This focused approach will
    adeptly address the limitations of generalised bots within the educational sphere.
    The idea of discipline-specific AI bots introduces a pioneering pathway for tailored
    learning experiences, offering the capacity to precisely address the unique requirements
    of diverse departments and thus enhancing the integration of AI across various
    academic domains. Furthermore, we strongly advocate that universities immediately
    introduce courses in prompt engineering to students, either by developing their
    own courses or by providing access to existing MOOC courses. This proactive measure
    will empower students with indispensable skills in navigating the swiftly changing
    technological terrain. Simultaneously, the provision of prompt engineering courses
    will significantly bolster students'' AI proficiency and deepen their comprehension
    of optimal AI-interaction strategies. Within the realm of educational implications,
    we strongly emphasise the imperative for institutions to thoroughly assess the
    potential influence of AI on students'' foundational learning. The conventional
    concept of foundational learning faces new challenges as AI introduces novel methods
    and tools. Manoeuvring through these obstacles necessitates a modification of
    instructional approaches that foster critical thinking, problem-solving and creativity
    – skills that AI struggles to replicate as effectively as humans. In this context,
    we propose the adoption of the flipped learning approach as an effective framework
    to address these issues. Embracing this approach harnesses AI tools to enrich
    pre-class engagement, allowing class time to be utilised for interactive discussions,
    collaborative projects and hands-on application. Furthermore, the development
    of curricula that prepare students for the AI-dominated world becomes imperative.
    In light of AI advancements, there may be a need to reconsider certain existing
    course learning outcomes. Therefore, we propose that instructors collaborate with
    industry to conduct a job analysis, aiming to assess AI''s influence on the real
    world. Following this assessment, appropriate adjustments can be made to the learning
    outcomes to ensure their continued relevance. To evaluate students'' content knowledge
    and AI literacy skills effectively, AI-resilient assessment strategies are paramount.
    These strategies must mirror the AI-influenced reality, requiring students to
    possess not only subject expertise but also the capability to interact adeptly
    with AI technologies. Similar strategies should be implemented in in-class activities
    to bolster their AI resilience and prevent potential learning gaps. To provide
    practical guidance on these aspects, we present a comprehensive framework accompanied
    by flowcharts featuring relevant questions. These questions are designed to assist
    instructors in crafting future-ready curricula, formulating assessment methods
    that can withstand the impact of AI and adapting teaching methodologies to align
    with the AI era. Furthermore, we highlight the vital role of creating prompt banks
    as an invaluable resource to enhance the optimal utilisation of AI. The creation
    of prompt banks holds considerable significance in maximising the effectiveness
    of AI systems. These banks comprise a collection of well-crafted and diverse prompts
    strategically designed to guide interactions with AI platforms like ChatGPT. Acting
    as initial cues, these prompts stimulate AI-generated responses, suggestions or
    solutions. We propose the development of discipline-specific prompt banks tailored
    to the unique needs of various academic departments within universities. Alongside
    this, we advocate for encouraging students and instructors to curate their personalised
    prompt banks, catering to their individual preferences and requirements. Furthermore,
    we emphasise the significance of fostering AI literacy among both students and
    instructors, albeit with distinct aims. Students should become adept at effectively
    utilising ChatGPT, while instructors should seamlessly incorporate it into their
    teaching methods. Tailored training is essential: students should grasp AI fundamentals,
    applications, ethics and critical thinking, while instructors should excel in
    AI tool integration and ethical guidance. Consequently, training depth should
    vary, addressing students'' AI navigation and instructors'' integration expertise.
    The approach will be contingent upon each university''s unique requisites and
    available resources. To facilitate this, we have provided recommendations for
    training programs and courses in the appendices, equipping both instructors and
    students with the essential skills for proficient AI utilisation. In essence,
    the integration of AI in higher education marks a transformative phase. Institutions
    must navigate the ethical, product-related and educational implications thoughtfully
    to ensure that students are prepared for a future shaped by AI technologies. This
    journey requires a delicate balance between embracing technological advancements
    and upholding the core values of education. However, we believe the role of universities
    goes beyond just what is discussed here. There is a much bigger picture that needs
    to be addressed.'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，人工智能对高等教育机构的影响广泛而深远，影响着学术的各个方面。这些影响涵盖了伦理考量、与产品相关的调整以及教育方法的重大转变，所有这些都要求我们进行仔细的审查和适应。在伦理考量的领域，我们强烈建议避免使用人工智能检测系统。这种观点源于这些系统固有的不透明性、不准确性和潜在的偏见。此外，我们对现有的AI引用系统建议进行了广泛评估，最终得出它们不切实际和低效的结论。我们讨论的很大一部分内容集中在AI时代对剽窃的重新评估上，这一挑战因新兴技术对传统规范的挑战而加剧。当涉及AI时，这种复杂性进一步加深，因为AI缺乏可识别的作者身份，导致了一个有趣的观点，即AI的存在本身可以与剽窃相提并论。在这些复杂的挑战中，我们强调培养学生、教育机构和机构在AI伦理方面的熟练性至关重要。这不仅包括理解AI的伦理影响，还要确保其在学术环境中的负责任和知情整合。因此，我们断言，大学的伦理委员会应在推动这一转型中发挥关键作用。随着AI生成内容的日益普及，机构必须应对重新定义AI时代的剽窃和归因问题。这一努力将需要深入理解AI如何与既定的学术标准接口。在考虑对产品开发的影响时，我们坚决主张大学优先考虑实现AI机器人的公平分配。这可以通过建立机构协议，授予所有教师和学生机器人访问权限，从而确保普遍可用性，或者通过引导学生使用现成的开源资源来实现。随着AI成为教育景观的组成部分，解决与产品相关的考虑因素变得越来越重要。确保学生公平且平等地访问AI机器人变得至关重要，以防止在学生之间分配资源上的任何潜在差异。此外，我们强调大学与行业建立强大伙伴关系的重要性。认识到AI对这些部门的影响，并确定雇主在毕业生中寻求的技能集，将为大学课程改进提供宝贵的见解。这种与行业的合作努力对于使教育产品与不断变化的就业市场要求保持同步至关重要。这种合作对于确保学生具备在由AI技术塑造的行业中脱颖而出的必要AI相关能力至关重要。此外，通过促进合作，大学可以深入了解特定行业AI的演变使用。这些宝贵的信息可以随后用于创建或获取与行业趋势相一致的专业机器人。这种专注的方法将巧妙地解决教育领域通用机器人的局限性。学科特定AI机器人的想法为定制学习体验开辟了一条创新途径，能够精确地满足不同部门的独特需求，从而增强AI在各个学术领域的整合。此外，我们强烈主张大学立即向学生开设提示工程课程，无论是通过开发自己的课程还是通过提供对现有MOOC课程的访问。这一主动措施将赋予学生应对迅速变化的科技领域的不可或缺的技能。同时，提供提示工程课程将显著提高学生的AI熟练度并加深他们对最佳AI交互策略的理解。在教育影响的领域，我们强烈强调机构彻底评估AI对学生基础学习潜在影响的必要性。随着AI引入新的方法和工具，传统的基础学习概念面临着新的挑战。通过这些障碍需要修改教学方法，以培养批判性思维、解决问题的能力和创造力——这些是AI难以像人类那样有效复制的技能。在这种情况下，我们建议采用翻转学习法作为解决这些问题的有效框架。采用这种方法利用AI工具丰富课前参与，使课堂时间可用于互动讨论、协作项目和实际应用。此外，开发使学生为AI主导的世界做好准备的课程变得至关重要。鉴于AI的进步，可能需要重新考虑某些现有的课程学习成果。因此，我们建议教师与行业合作进行工作分析，旨在评估AI对现实世界的影响。在此评估之后，可以对学习成果进行适当的调整，以确保其持续的相关性。为了有效地评估学生的内容知识和AI素养技能，AI弹性的评估策略至关重要。这些策略必须反映AI影响的现实，要求学生不仅拥有学科专业知识，而且能够熟练地与AI技术互动。类似的策略应在课堂活动中实施，以增强他们的AI弹性和防止潜在的学习差距。为了在这些方面提供实际指导，我们提供了一个全面的框架，并附有包含相关问题的流程图。这些问题旨在帮助教师制定面向未来的课程，制定能够抵御AI影响的评估方法，并调整教学方法以符合AI时代。此外，我们强调创建提示库作为提高AI系统有效利用的宝贵资源的至关重要作用。创建提示库在最大化AI系统有效性方面具有重大意义。这些库包含了一系列精心制作且多样化的提示，这些提示被战略性地设计来引导与AI平台（如ChatGPT）的交互。作为初始提示，这些提示刺激AI生成响应、建议或解决方案。我们建议开发针对大学内不同学术部门独特需求的学科特定提示库。与此同时，我们主张鼓励学生和教师创建个性化的提示库，以满足他们的个人偏好和需求。此外，我们强调在学生和教师中培养AI素养的重要性，尽管目标不同。学生应熟练有效地使用ChatGPT，而教师应无缝将其融入教学方法中。定制培训至关重要：学生应掌握AI基础、应用、伦理和批判性思维，而教师应擅长AI工具集成和伦理指导。因此，培训深度应有所不同，针对学生的AI导航和教师的集成专业知识。方法将取决于每所大学独特的需求和可用资源。为此，我们在附录中提供了培训计划和课程的建议，为教师和学生提供熟练使用AI的必要技能。简而言之，AI在高等教育中的整合标志着转型阶段。机构必须深思熟虑地应对伦理、产品相关和教育影响，以确保学生为AI技术塑造的未来做好准备。这一旅程需要在拥抱技术进步和维护教育核心价值之间保持微妙的平衡。然而，我们认为大学的作用远不止于此。还有更大的图景需要解决。
- en: Global Action and Collaboration
  id: totrans-931
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 全球行动与合作
- en: 'Within the realm of AI, a wide array of concerns currently exists, spanning
    various dimensions. As AI technology continues to progress, more and more ethical
    dilemmas are emerging, raising questions about its alignment with human values
    and its potential for undesirable outcomes. We are currently seeing that AI systems
    exhibit a number of limitations in critical aspects, such as common sense reasoning,
    robustness and a comprehensive grasp of the world. This hinders the creation of
    genuinely intelligent and dependable systems. Additionally, transparency, interpretability
    and accountability are posing serious challenges, especially in areas like healthcare,
    finance and law, where they can have a significant impact on human lives. At times,
    the ongoing trajectory of AI development would appear to be prioritising specific
    objectives without due consideration for human values, thereby introducing the
    risk of unanticipated challenges and management complexities. Furthermore, there
    are also growing concerns surrounding the potential impact of AI on job markets,
    the economy, governance and societal welfare, which stem from the potential of
    AI to worsen prevailing inequalities and biases. Notably, certain experts perceive
    AI as posing an existential threat, citing its ability to surpass human intelligence
    and consequently posing significant risks to society and humanity. This global
    scenario has prompted experts, governments and even AI companies to call for regulations,
    and we are now starting to see the emergence of such regulatory policies. The
    United Kingdom''s Competition and Markets Authority is engaged in a thorough review
    of AI, centring on concerns like misinformation and job disruptions. Concurrently,
    the UK government is revising AI regulations to tackle associated risks. In the
    United States, White House deliberations have involved discussions with AI CEOs
    regarding safety and security, and the Federal Trade Commission is also actively
    involved in investigating AI''s impact. In addition, the European Union''s AI
    Act is in the process of developing a framework to categorise AI applications
    by risk and are advocating for responsible AI practices. Moreover, tech giants
    OpenAI, Anthropic, Microsoft and Google have collaboratively introduced the Frontier
    Model Forum, dedicated to AI safety, policy discussions and constructive applications,
    which builds upon contributions from the UK government and the European Union,
    aligning with White House conversations and indicating an ongoing evolution within
    the tech industry. Hence, it becomes evident that steps are being taken. However,
    a pivotal question remains: will these regulatory efforts result in impactful
    actions that effectively address potential issues and foster responsible AI advancement?
    It would seem not.'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，目前存在广泛的关注点，涵盖了多个维度。随着人工智能技术的持续进步，越来越多的伦理困境正在出现，引发了对其与人类价值观的契合度及其可能产生的不良后果的疑问。我们目前看到，人工智能系统在常识推理、鲁棒性和对世界的全面理解等关键方面存在许多局限性。这阻碍了真正智能和可靠的系统的创建。此外，透明度、可解释性和问责制正面临着严峻的挑战，尤其是在医疗保健、金融和法律等领域，它们可以对人类生活产生重大影响。有时，人工智能发展的持续轨迹似乎在优先考虑特定目标，而没有充分考虑人类价值观，从而引入了不可预见的挑战和管理复杂性的风险。此外，对人工智能对就业市场、经济、治理和社会福利的潜在影响的担忧也在不断增长，这源于人工智能可能加剧现有不平等和偏见的能力。值得注意的是，某些专家认为人工智能构成了一个存在性威胁，因为它能够超越人类智能，从而对
    society 和 humanity 产生重大风险。这一全球形势促使专家、政府和甚至人工智能公司呼吁制定法规，我们现在开始看到这些监管政策的出现。英国竞争与市场管理局正在对人工智能进行彻底审查，重点关注虚假信息和就业中断等问题。同时，英国政府正在修订人工智能法规，以应对相关风险。在美国，白宫的讨论涉及与人工智能首席执行官就安全和安全进行讨论，联邦贸易委员会也积极参与调查人工智能的影响。此外，欧盟的人工智能法案正在制定一个框架，以根据风险对人工智能应用进行分类，并倡导负责任的人工智能实践。此外，技术巨头
    OpenAI、Anthropic、Microsoft 和 Google 共同推出了前沿模型论坛，致力于人工智能安全、政策讨论和建设性应用，这建立在英国政府和欧盟的贡献之上，与白宫的对话相一致，表明技术行业正在持续演变。因此，很明显，正在采取行动。然而，一个关键问题仍然存在：这些监管努力是否会产生有影响力的行动，有效地解决潜在问题并促进负责任的人工智能进步？这似乎不太可能。
- en: 'Currently, there are worrying indications pointing towards potential negative
    outcomes, exemplified by the reduction in Microsoft''s ethics team and Sam Altman''s
    reservations regarding EU AI regulations. These instances underscore the substantial
    influence wielded by companies and even individual figures. This echoes the very
    concern voiced by Rumman Chowdhury, who has highlighted an industry trend where
    entities paradoxically advocate for regulation while concurrently lobbying against
    it, often prioritising risk assessment over ethical considerations. However, this
    concentration of power driven by resources could lead to biases and adverse outcomes
    if not vigilantly managed. Hence, Chowdhury proposes a redistribution of power
    through collaborative stakeholder engagement. Karen Hao echoes these sentiments,
    expressing apprehension about tech giants'' influence over advanced AI technologies.
    She calls for transparent and inclusive AI policy shaping that involves a diverse
    range of stakeholders, underlining the essential role of varied perspectives in
    promoting responsible AI development. Harari also conveys concerns about potential
    challenges associated with technological advancement (2018). He asserts that sociologists,
    philosophers and historians have a crucial role in raising awareness and addressing
    the self-promotion frequently presented by corporations and entrepreneurs in regard
    to their technological innovations. He underscores the urgency of swift decision-making
    to effectively regulate the impact of these technologies, guarding against their
    imposition on society by market forces. This matter holds utmost significance
    at present, given the swift progress of ChatGPT in the AI industry, which is catalysing
    a competition among other companies to adopt and cultivate extensive language
    models and generative AI. This rapid course may surpass the responsiveness of
    government policies in addressing these advancements promptly. This brings us
    back to our AI experts: Max Tegmark, Gary Marcus, Ernest Davis and Stuart Russell.
    In his 2017 book *Life 3.0: Being Human in the Age of Artificial Intelligence*,
    Tegmark lays out frameworks for responsible AI governance, stressing the importance
    of AI conforming to ethical principles that prioritise human values, well-being
    and societal advancement. He highlights the significance of transparency and explainability
    in ensuring humans understand AI''s decision-making process. To this end, he proposes
    aligning Artificial General Intelligence (AGI) objectives with human values and
    establishing oversight mechanisms. Tegmark envisions a collaborative approach
    involving a diverse range of stakeholders, including experts and policymakers,
    to collectively shape AGI regulations, with a strong emphasis on international
    cooperation (Tegmark, 2017). He advocates for adaptable governance frameworks
    that can keep pace with the evolving AI landscape. Tegmark''s overarching goal
    is to harmonise AI with human values, preventing misuse and fostering societal
    progress, all while recognising the continuous need for interdisciplinary discourse
    and fine-tuning in AI governance (Tegmark, 2017). Marcus and Davis advocate for
    a comprehensive re-evaluation of the AI research trajectory, suggesting an interdisciplinary
    path that addresses the limitations inherent in current AI systems (Marcus & Davis,
    2019). Their approach involves integrating insights from various fields like cognitive
    science, psychology and linguistics, aiming to create AI systems that better align
    with human cognitive processes. They introduce a significant concept – the ‘hybrid’
    approach to AI advancement, which combines rule-based systems and statistical
    methodologies (Marcus & Davis, 2019). This fusion aims to harness the strengths
    of both approaches while mitigating their weaknesses. Their vision is that such
    a hybrid methodology could yield more intelligent and reliable AI systems capable
    of effectively handling complex real-world scenarios (Marcus & Davis, 2019). Russell
    introduces the concept of value alignment theory, a fundamental aspect of AI ethics
    (Russell, 2019). This theory centres on the vital objective of aligning AI systems
    with human values and goals. It underscores the necessity of designing AI systems
    to reflect human intentions and desires, preventing potential negative outcomes
    and ensuring their ethical operation (Russell, 2019). At its core, value alignment
    theory seeks to ensure that AI systems not only achieve their designated objectives
    but also consider the broader context of human values and ethics; it acknowledges
    the potential for AI systems, particularly as they gain autonomy, to pursue goals
    in ways that may conflict with human intentions (Russell, 2019). Russell''s work
    advocates for AI systems that comprehend and honour human values by incorporating
    mechanisms for learning from human interaction and feedback. This approach also
    emphasises transparency and interpretability, allowing humans to understand AI
    decision-making processes and intervene if needed. Russell''s focus on value alignment
    aims to avert scenarios where AI systems act contrary to human values, fostering
    a human-centric approach to AI development that amplifies human capabilities while
    upholding ethical standards (Russell, 2019). So, based on these proposed solutions
    by the AI experts to the issues inherent in AI, what role should universities
    play?'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，一些令人担忧的迹象指向潜在的负面结果，例如微软伦理团队的缩减和山姆·阿尔特曼对欧盟人工智能法规的保留意见。这些例子突显了公司和甚至个人所拥有的巨大影响力。这与鲁曼·乔杜里所表达的关注不谋而合，他强调了一个行业趋势，即实体机构在倡导监管的同时，又游说反对，通常优先考虑风险评估而非伦理考量。然而，这种由资源驱动的权力集中如果不加警惕地管理，可能会导致偏见和不良后果。因此，乔杜里提出通过协作利益相关者参与来重新分配权力。卡伦·豪也表达了对于科技巨头对先进人工智能技术影响的担忧。她呼吁透明和包容的人工智能政策制定，涉及多样化的利益相关者，强调不同观点在促进负责任的人工智能发展中的关键作用。哈拉里也传达了对与科技进步相关的潜在挑战的担忧（2018）。他强调社会学家、哲学家和历史学家在提高意识并解决公司和企业主经常宣传其技术创新的自我推广方面发挥着至关重要的作用。他强调迅速做出决策的紧迫性，以有效监管这些技术的影响，防止市场力量将其强加于社会。鉴于ChatGPT在人工智能行业的迅速发展，这正在催化其他公司采用和培养广泛的语言模型和生成式人工智能的竞争，这个问题目前具有极其重要的意义。这种快速的发展可能超过政府政策在及时应对这些进步方面的响应能力。这使我们回到了我们的AI专家：马克斯·泰格马克、加里·马库斯、欧内斯特·戴维斯和斯图尔特·罗素。在2017年的著作《生命3.0：人工智能时代的人类》中，泰格马克概述了负责任的人工智能治理框架，强调人工智能符合优先考虑人类价值观、福祉和社会进步的伦理原则的重要性。他强调透明度和可解释性在确保人类理解人工智能的决策过程中的重要性。为此，他提出将通用人工智能（AGI）的目标与人类价值观对齐，并建立监督机制。泰格马克设想了一种涉及各种利益相关者，包括专家和政策制定者的协作方法，共同塑造AGI法规，并强调国际合作的重要性（泰格马克，2017）。他主张适应性治理框架，能够跟上人工智能景观的发展。泰格马克的总体目标是使人工智能与人类价值观和谐一致，防止滥用并促进社会进步，同时认识到在人工智能治理中持续进行跨学科对话和微调的必要性（泰格马克，2017）。马库斯和戴维斯主张对人工智能研究轨迹进行全面重新评估，提出一条解决当前人工智能系统固有局限性的跨学科路径（马库斯和戴维斯，2019）。他们的方法涉及整合来自认知科学、心理学和语言学等各个领域的见解，旨在创建与人类认知过程更好地对齐的人工智能系统。他们引入了一个重要概念——人工智能进步的“混合”方法，该方法结合了基于规则的系统统计方法（马库斯和戴维斯，2019）。这种融合旨在利用两种方法的优势，同时减轻它们的弱点。他们的愿景是，这种混合方法可以产生更智能、更可靠的人工智能系统，能够有效地处理复杂现实场景（马库斯和戴维斯，2019）。罗素介绍了价值对齐理论的概念，这是人工智能伦理的一个基本方面（罗素，2019）。这一理论以将人工智能系统与人类价值观和目标对齐这一关键目标为中心。它强调设计人工智能系统以反映人类意图和欲望的必要性，防止潜在的负面结果并确保其道德运行（罗素，2019）。在本质上，价值对齐理论旨在确保人工智能系统不仅实现其指定的目标，而且考虑人类价值观和伦理的更广泛背景；它承认人工智能系统，尤其是随着它们获得自主性，可能会以可能与人类意图冲突的方式追求目标（罗素，2019）。罗素的工作主张人工智能系统通过结合从人类互动和反馈中学习的机制来理解和尊重人类价值观。这种方法也强调透明度和可解释性，使人类能够理解人工智能的决策过程并在必要时进行干预。罗素对价值对齐的关注旨在避免人工智能系统行为与人类价值观相悖的场景，促进以人为本的人工智能发展方法，同时维护伦理标准（罗素，2019）。因此，基于这些AI专家对AI固有问题的解决方案，大学应扮演什么角色？
- en: We believe universities have a critical role to play in the context of responsible
    AI development and governance, if not a moral obligation, and suggest that they
    contribute to solutions in the following ways. First, universities can act as
    hubs of research and education, contributing to the advancement of AI technologies
    while also instilling ethical considerations. They can offer interdisciplinary
    programmes that merge computer science, ethics, cognitive science, psychology
    and other relevant fields, encouraging students to think critically about the
    societal impacts of AI. In line with Tegmark's ideas, universities can facilitate
    collaborative efforts by bringing together experts, policymakers and various stakeholders
    to discuss and formulate regulations for AI governance. They can host conferences,
    seminars and workshops that promote international cooperation and the exchange
    of ideas to shape adaptable governance frameworks, addressing the evolving landscape
    of AI. Marcus and Davis' call for an interdisciplinary approach aligns with universities'
    ability to foster collaboration between different departments and faculties. Universities
    can encourage joint research initiatives that combine AI expertise with insights
    from fields such as psychology and linguistics to create AI systems that better
    emulate human cognitive processes. Universities can also play a pivotal role in
    advancing value alignment theory, as proposed by Russell. They can contribute
    to research and education around the ethical dimensions of AI, training future
    AI developers and researchers to prioritise human values and societal well-being.
    Furthermore, universities can provide platforms for discussions on the moral implications
    of AI, fostering a culture of transparency and accountability in AI development.
    Overall, universities have a responsibility to serve as knowledge centres, promoting
    interdisciplinary research, ethical considerations, international cooperation
    and transparency. We believe their role should expand beyond technical expertise
    alone, encompassing the broader aspects of holistic development and responsible
    governance of AI technologies. This is our call to action.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 我们相信，在负责任的AI发展和治理的背景下，大学扮演着至关重要的角色，如果不是道德义务的话，并建议它们以下列方式贡献力量。首先，大学可以作为研究和教育的中心，在推进AI技术的同时，也灌输伦理考量。它们可以提供跨学科项目，将计算机科学、伦理学、认知科学、心理学和其他相关领域结合起来，鼓励学生批判性地思考AI对社会的影响。与Tegmark的观点一致，大学可以通过汇集专家、政策制定者和各种利益相关者来促进协作努力，讨论和制定AI治理的法规。它们可以举办会议、研讨会和研讨会，促进国际合作和思想交流，以塑造适应性强的治理框架，应对AI不断变化的格局。Marcus和Davis呼吁采取跨学科方法，与大学促进不同部门和学院之间协作的能力相一致。大学可以鼓励联合研究项目，将AI专业知识与心理学和语言学等领域的见解相结合，以创建更好地模拟人类认知过程的AI系统。大学还可以在推进Russell提出的价值一致性理论方面发挥关键作用。它们可以在AI的伦理维度方面进行研究和教育，培训未来的AI开发者和研究人员，优先考虑人类价值观和社会福祉。此外，大学还可以提供平台，讨论AI的道德影响，培养AI发展中透明度和问责制的文化。总的来说，大学有责任作为知识中心，促进跨学科研究、伦理考量、国际合作和透明度。我们相信，它们的作用不应仅限于技术专长，而应涵盖AI技术整体发展和负责任治理的更广泛方面。这是我们行动的号召。
- en: Addressing Limitations
  id: totrans-935
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决局限性
- en: While our study's findings proved pertinent and resulted in the development
    of strategies for implementing ChatGPT at our institution, it is essential to
    acknowledge and address certain research limitations. The study took place at
    a specific English-medium non-profit private university in Turkey, renowned for
    its flipped learning approach. While the insights gained are valuable, it's crucial
    to recognise that the unique context may limit the generalisability of the results
    to other educational settings. One notable limitation encountered during the research
    process was the limited availability of literature on ChatGPT at the study's time.
    This scarcity can be attributed to the recent public launch of ChatGPT and the
    restricted time frame for conducting the literature review. As a result, the review
    partially relied on grey literature, including pre-prints, potentially affecting
    the comprehensiveness and depth of the analysis. The study also employed intentionally
    broad and open-ended research questions to facilitate an exploratory investigation.
    While this approach allowed for a comprehensive exploration, it's vital to acknowledge
    the potential for bias in interpreting the findings due to the dual role of the
    principal investigator, serving as both the researcher and instructor. Additionally,
    the study's reliance on a small sample size of 12 students from an elective humanities
    class focused on forensic linguistics poses a limitation. It's essential to recognise
    that outcomes may have varied in larger classes or different disciplines. Furthermore,
    the sampling of other voices, including instructors and administrators, was relatively
    random, based on critical incidents, emails, workshops and ad hoc interactions.
    Finally, it's worth noting that the research was conducted over a single semester,
    which may restrict the longitudinal analysis of ChatGPT's impact on education.
    To address these limitations in future studies, we will make the following adaptations.
    Firstly, to make our findings more applicable across diverse educational settings,
    we will include a broader range of academic disciplines. To ensure a strong theoretical
    foundation, we will continuously monitor reputable sources for the latest research
    on ChatGPT and related AI technologies, updating our literature review accordingly.
    By combining quantitative and qualitative approaches, we will gain a more holistic
    understanding of ChatGPT's impact. Integrating numerical data with rich narratives
    from students, instructors and administrators will provide a comprehensive view
    of the technology's effectiveness and challenges. To maintain objectivity, we
    will look to include more reflexivity during data collection and analysis by involving
    multiple researchers and use triangulation methods to validate and cross-check
    findings from these different perspectives. Strengthening the study's validity
    and representativeness can be achieved by including a larger and more diverse
    participant pool, encompassing students from various disciplines and academic
    levels, educators and decision-makers. Gaining deeper insights into ChatGPT's
    effects over time can be achieved through long-term investigations. Observing
    changes, adaptations and potential challenges will provide a nuanced understanding
    of the technology's long-term implications. The exploration of our suggested pedagogical
    strategies for effectively integrating ChatGPT in education is of utmost importance.
    By investigating how these proposed changes will impact teaching and learning,
    we can gain valuable insights for further practical implementation. By incorporating
    these improvements into our future research, we can enrich our understanding of
    ChatGPT's impact in education and offer valuable insights for educators and institutions
    seeking to effectively utilise AI technologies.
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们研究的结果证明了其相关性，并导致了在我们机构实施ChatGPT的策略发展，但承认和解决某些研究局限性是至关重要的。该研究是在土耳其一所著名的以翻转课堂方法著称的特定英语授课非营利私立大学进行的。虽然获得的见解很有价值，但必须认识到，独特的背景可能限制了研究结果在其他教育环境中的普遍适用性。在研究过程中遇到的一个显著局限性是，当时关于ChatGPT的文献有限。这种稀缺性可以归因于ChatGPT的最近公开推出以及进行文献综述的时间框架有限。因此，审查部分依赖于灰色文献，包括预印本，这可能会影响分析的综合性和深度。该研究还采用了故意广泛和开放式的研究问题，以促进探索性研究。虽然这种方法允许进行全面的探索，但必须认识到，由于主要研究人员的双重角色（既是研究人员又是教师），在解释结果时可能存在偏见。此外，该研究依赖于来自选修人类学课程（侧重于法庭语言学）的12名学生的较小样本量，这也构成了一种局限性。必须认识到，在大班或不同学科中，结果可能会有所不同。此外，对其他声音的抽样，包括教师和管理人员，相对随机，基于关键事件、电子邮件、研讨会和临时互动。最后，值得注意的是，这项研究是在一个学期内进行的，这可能会限制对ChatGPT对教育影响的纵向分析。为了解决未来研究中这些局限性，我们将做出以下调整。首先，为了使我们的发现更适用于各种教育环境，我们将包括更广泛的学术学科。为了确保强大的理论基础，我们将持续监控信誉良好的来源，以获取关于ChatGPT和相关人工智能技术的最新研究，并相应地更新我们的文献综述。通过结合定量和定性方法，我们将获得对ChatGPT影响的更全面理解。将数值数据与来自学生、教师和管理人员的丰富叙述相结合，将提供对技术有效性和挑战的全面看法。为了保持客观性，我们将在数据收集和分析过程中涉及更多反思性，包括多位研究人员，并使用三角测量法验证和交叉检查来自不同视角的发现。通过包括更大、更多样化的参与者群体，包括来自各个学科和学术水平的学生、教育者和决策者，可以加强研究的有效性和代表性。通过长期调查，观察变化、适应和潜在挑战，将提供对技术长期影响的细致理解。探索我们建议的将ChatGPT有效整合到教育中的教学策略至关重要。通过调查这些提议的变化将如何影响教学和学习，我们可以获得进一步实际实施的宝贵见解。通过将这些改进纳入我们的未来研究，我们可以丰富我们对ChatGPT在教育中影响的了解，并为寻求有效利用人工智能技术的教育者和机构提供有价值的见解。
- en: Recommendations for Further Research
  id: totrans-937
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进一步研究的建议
- en: Our study has opened the door to various avenues for further exploration and
    investigation into AI chatbots in higher education. Here, we present potential
    research directions that could extend the scope of our findings and offer valuable
    insights to fellow researchers.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的研究为探索高等教育中AI聊天机器人的各种途径打开了大门。在此，我们提出了可能的研究方向，这些方向可以扩展我们的发现范围，并为同行研究人员提供有价值的见解。
- en: '*Address Ethical Implications*'
  id: totrans-939
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*处理伦理影响*'
- en: There is an urgent need to investigate the ethical implications of AI integration
    in education, including data privacy, student consent, algorithmic bias and social-cultural
    impacts. Therefore, investigations should be extended to explore challenges faced
    by instructors and institutions when using AI chatbots and ensuring ethical practices
    in data privacy and bias mitigation for responsible AI use in education.
  id: totrans-940
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有迫切需要调查AI整合在教育中的伦理影响，包括数据隐私、学生同意、算法偏见和社会文化影响。因此，调查应扩展到探索教师在使用AI聊天机器人和确保数据隐私和偏见缓解中的伦理实践时面临的挑战。
- en: '*Long-Term Effects of AI Integration*'
  id: totrans-941
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*AI整合的长期影响*'
- en: It would be pertinent to investigate the long-term effects of AI integration
    in education, understanding how the use of AI chatbots evolves over time and its
    impact on student learning outcomes and instructor practices. A mixed methods
    approach could provide a comprehensive perspective, combining quantitative data
    on outcomes with qualitative insights on user experiences.
  id: totrans-942
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调查教育中AI整合的长期影响是相关的，理解AI聊天机器人的使用如何随时间演变及其对学生学习成果和教师实践的影响。混合方法可以提供一个全面的视角，结合关于成果的定量数据和关于用户体验的定性见解。
- en: '*Cultural Variations in Bots*'
  id: totrans-943
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机器人的文化差异*'
- en: Another potential area for future research would involve examining how the cultural
    nuances present in various AI bot databases should be considered by institutions
    when selecting systems. Such a study would offer valuable insights into how different
    AI bots might fit within diverse cultural contexts, thus influencing their effectiveness
    in educational settings.
  id: totrans-944
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一个未来研究的潜在领域将涉及研究各种AI机器人数据库中存在的文化细微差别，当机构选择系统时应如何考虑。这项研究将提供有价值的见解，了解不同的AI机器人如何适应不同的文化背景，从而影响其在教育环境中的有效性。
- en: '*Application in Other University Areas*'
  id: totrans-945
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在其他大学领域的应用*'
- en: There is room to investigate the potential applications of ChatGPT beyond education,
    such as in customer service or administrative tasks within the university. This
    could involve assessing the benefits, challenges and impact of integrating AI
    technologies in these areas, which could lead to increased efficiency and improved
    user experiences.
  id: totrans-946
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有空间调查ChatGPT在教育之外潜在的应用，例如在大学内的客户服务或行政任务中。这可能包括评估将这些领域整合AI技术的益处、挑战和影响，这可能导致效率提高和用户体验改善。
- en: '*Investigating the Integration of AI Bots into Digital Platforms*'
  id: totrans-947
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*调查AI机器人整合到数字平台中*'
- en: Digital platform companies, such as Pearson, are actively working on integrating
    AI chatbots into their platforms. Exploring the potential benefits and challenges
    of this integration for teaching and learning would be valuable once these new
    versions of the platforms have been released.
  id: totrans-948
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字平台公司，如Pearson，正在积极将AI聊天机器人整合到他们的平台中。一旦这些平台的新版本发布，探索这种整合对教学和学习的潜在益处和挑战将是很有价值的。
- en: '*Impact on Instructors'' Roles and Career Development*'
  id: totrans-949
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*对教师角色和职业发展的影响*'
- en: The long-term impact of AI integration on the roles and responsibilities of
    instructors should be assessed to investigate how this may affect career development
    and job satisfaction in the academic field. This research could provide insights
    into potential opportunities for professional growth and adaptation.
  id: totrans-950
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应评估AI整合对教师角色和责任的长远影响，以研究这可能如何影响学术领域的职业发展和工作满意度。这项研究可以为专业成长和适应提供见解。
- en: '*Collaborative Functionality of ChatGPT and AI Chatbots*'
  id: totrans-951
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT和AI聊天机器人的协作功能*'
- en: We believe it would be pertinent to explore the collaborative functionality
    of ChatGPT and other AI chatbots that allow sharing chats among multiple individuals.
    This could involve an investigation into its application by students, instructors,
    researchers and institutions for collaborative learning, knowledge sharing and
    collective problem-solving within educational contexts.
  id: totrans-952
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们认为探索ChatGPT和其他允许多人共享聊天的AI聊天机器人的协作功能是相关的。这可能包括对其在教育环境中应用于学生、教师、研究人员和机构进行协作学习、知识共享和集体解决问题的应用的调查。
- en: '*Effects of ChatGPT and AI Chatbots on Language Learning*'
  id: totrans-953
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*ChatGPT和AI聊天机器人对语言学习的影响*'
- en: We believe it is imperative to investigate the potential effects of ChatGPT
    and AI chatbots on language learning. Given their capabilities in translation,
    summarisation, improving writing and acting as conversational partners, further
    research is recommended to understand the positive and negative impacts on language
    acquisition and proficiency.
  id: totrans-954
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们认为调查ChatGPT和AI聊天机器人对语言学习潜在影响是至关重要的。鉴于它们在翻译、总结、提高写作和作为对话伙伴方面的能力，建议进行进一步研究，以了解对语言习得和熟练程度的积极和消极影响。
- en: '*Investigating the AI-Human Communication Interface*'
  id: totrans-955
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*调查人工智能-人类通信界面*'
- en: Another avenue for future research that we believe holds particular interest
    and significance would be an exploration of how the integration of AI and technology,
    such as chatbots, in education aligns with Heidegger's theory on technology and
    the essence of being. Investigating how human–chatbot relationships impact student
    learning outcomes could shed light on the extent to which technology's ‘enframing’
    tendency affects authentic human interactions and understanding. Additionally,
    delving into the application of communication and symbolic interaction theories
    within the context of AI-mediated interactions, as discussed by Tlili et al. (2023)
    and Firaina and Sulisworo (2023), could offer insights into how technology shapes
    our perception of communication. Furthermore, an examination of media theory in
    education, also raised by Firaina and Sulisworo (2023), could provide a deeper
    understanding of how technology, as a form of media, influences interactions and
    the acquisition of information. Lastly, aligning educational priorities, as advocated
    by Zhai (2022), with Heidegger's concerns about technology's impact on human essence
    could offer insights into how to strike a balance between enhancing skills and
    preserving the authentic human experience in the era of AI-driven education. This
    future research direction has the potential to contribute to a comprehensive understanding
    of the implications of AI integration in education, both from a technological
    and philosophical perspective.
  id: totrans-956
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们认为，未来研究的一个特别有趣且重要的方向将是探索AI和技术的整合，如聊天机器人，在教育中的应用与海德格尔关于技术和存在本质的理论相一致。研究人-聊天机器人关系如何影响学生学习成果可能有助于阐明技术“框定”倾向对真实人类互动和理解的影响程度。此外，深入研究Tlili等人（2023）和Firaina与Sulisworo（2023）讨论的沟通和符号互动理论在AI介导的互动背景下的应用，可能有助于了解技术如何塑造我们对沟通的认识。此外，检查教育中的媒体理论，如Firaina和Sulisworo（2023）所提出的，可能有助于更深入地理解作为一种媒体形式的技术如何影响互动和信息获取。最后，将Zhai（2022）倡导的教育优先事项与海德格尔对技术对人类本质影响的担忧相一致，可能有助于了解如何在人工智能驱动的教育时代在提升技能和保持真实人类体验之间找到平衡。这一未来研究方向有可能从技术和哲学角度对AI在教育中整合的内涵进行全面理解。
- en: By pursuing these future research directions, we believe the field can gain
    a more comprehensive understanding of AI's influence in education and develop
    strategies for harnessing AI's potential while safeguarding the core values of
    quality education and human-centric learning.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 通过追求这些未来研究方向，我们相信该领域可以更全面地了解AI在教育中的影响，并制定利用AI潜力同时保护教育质量和以人为本学习的核心价值的策略。
- en: Final Reflections and Concluding Remarks
  id: totrans-958
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最终反思与总结
- en: 'Our research, centring on the implications of AI with a particular focus on
    AI chatbots like ChatGPT, has provided meaningful insights into the pervasive
    impact of AI on our educational institutions, industries and societies. As we
    have seen, AI acts as both a tool and a transformative element, reshaping traditional
    learning environments, redefining roles and challenging established norms. However,
    our findings extend beyond the confines of academia, addressing broader global
    dialogues on AI''s wide-ranging effects. We''ve investigated the challenges and
    opportunities arising from AI''s rapid development, from potential job displacement
    to the restructuring of power dynamics. Emphasising the importance of pre-emptive
    governance, inclusive decision-making and strong adherence to ethical principles,
    we''ve outlined crucial considerations for shaping AI''s future trajectory. We
    applied the theories of Christensen, Bourdieu, Marx and Heidegger as guides to
    dissect AI''s transformative potential, its influence on power structures and
    the profound existential questions it prompts. This theoretical approach equipped
    us to navigate the complex landscape of AI''s rapid evolution, providing a useful
    framework for others who seek to understand and engage with these issues. We identified
    universities as key players in these critical discussions. Their influential role
    in shaping knowledge and driving innovation positions them as leaders in responsible
    AI adoption and governance. They have the potential to direct AI''s trajectory
    in a way that promotes collective interests, empowers individuals and enhances
    societal well-being. As we all grapple with these changes – students, educators,
    researchers, policymakers and society as a whole – we must remember the key message
    of this research: AI is not just a tool to be used but a significant force to
    be reckoned with, demanding our understanding, engagement and responsible navigation.
    As we look to the future, we must remember that we are the authors of the AI narrative.
    We have the capacity to ensure that AI technologies are shaped to reflect our
    shared values and aspirations. The importance of our research lies in its call
    for a conscious and intentional approach to AI integration. It''s a call to envision
    and actively work towards a future where AI promotes greater equity, understanding
    and shared prosperity. This research is a starting point, a guide that we hope
    will assist future endeavours towards responsible AI governance and a future where
    AI is integrated beneficially into all facets of our lives.'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的研究，以AI的影响为中心，特别是关注像ChatGPT这样的AI聊天机器人，为我们提供了对AI在我们教育机构、行业和社会上普遍影响的深刻见解。正如我们所见，AI既是一种工具，也是一种变革性元素，重塑了传统的学习环境，重新定义了角色，并挑战了既定规范。然而，我们的发现超越了学术界的界限，涉及更广泛的全球对话，讨论AI的广泛影响。我们研究了AI快速发展带来的挑战和机遇，从潜在的就业替代到权力动态的重构。强调预防性治理、包容性决策和严格遵守伦理原则的重要性，我们概述了塑造AI未来轨迹的关键考虑因素。我们将克里斯滕森、布迪厄、马克思和海德格尔的理论作为指南，来剖析AI的变革潜力，它对权力结构的影响以及它引发的深刻存在主义问题。这种理论方法使我们能够驾驭AI快速演变的复杂景观，为那些寻求理解和参与这些问题的其他人提供了一个有用的框架。我们确定了大学在这些关键讨论中的关键角色。他们在塑造知识和推动创新中的影响力使他们成为负责任AI采用和治理的领导者。他们有潜力以促进共同利益、赋权个人和增强社会福利的方式引导AI的轨迹。当我们所有人都在应对这些变化时——学生、教育工作者、研究人员、政策制定者和整个社会——我们必须记住这项研究的关键信息：AI不仅仅是一个工具，而是一个需要我们理解、参与和负责任导航的重要力量。当我们展望未来时，我们必须记住我们是AI叙事的作者。我们有能力确保AI技术被塑造以反映我们的共同价值观和愿望。我们研究的重要性在于它呼吁对AI集成采取有意识和有目的的方法。这是一个呼吁设想并积极努力实现一个未来，在那里AI促进更大的公平、理解和共同繁荣。这项研究是一个起点，一个我们希望将有助于未来努力实现负责任AI治理和AI有益融入我们生活各个方面的指南。
