  id: totrans-978
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育工作者如何设计课程，以使学生为人工智能集成未来做好准备，并培养关键的AI素养？
- en: What strategies can educators employ to navigate AI-enhanced assessment methods
