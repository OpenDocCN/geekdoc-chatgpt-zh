  type: TYPE_NORMAL
  zh: 基于我们的研究，我们为教师建议以下AI素养课程。
- en: Course Name
  id: totrans-963
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程名称
- en: Mastering AI Literacy for Teaching and Learning
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握AI素养以教学和学习
- en: Overall Educational Objective
  id: totrans-965
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 整体教育目标
- en: By the end of the course, you will have gained the comprehensive knowledge and
    skills to effectively integrate AI chatbots into your educational setting for
    effective learning and teaching.
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 课程结束时，你将获得将人工智能聊天机器人有效整合到你的教育环境中的全面知识和技能，以实现有效的学习和教学。
- en: Course Format
  id: totrans-967
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程格式
- en: This course will be delivered as an asynchronous online programme, providing
    educators with the flexibility to engage with the content at their own pace. The
    course materials will be accessible through the university's learning management
    system, allowing participants to learn, reflect and practice in a self-directed
    manner. To enhance engagement and interaction, live workshops will be conducted
    throughout the semester, focusing on each aspect of the course content. These
    workshops will provide an opportunity for participants to ask questions, engage
    in discussions and receive real-time guidance.
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程将以异步在线课程的形式提供，为教育工作者提供灵活性，让他们根据自己的节奏参与内容。课程材料将通过大学的在线学习管理系统获取，使参与者能够以自我指导的方式学习、反思和实践。为了增强参与度和互动性，整个学期将进行现场研讨会，重点关注课程内容的各个方面。这些研讨会将为参与者提供提问、参与讨论和获得实时指导的机会。
- en: Course Description
  id: totrans-969
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程描述
- en: This is a dynamic and immersive course that equips educators with a deep understanding
    of AI chatbot technology and its ethical implications in educational contexts.
    From foundational concepts to advanced strategies, this course takes educators
    on a transformative journey through the world of AI chatbots. Participants will
    explore how AI chatbots are reshaping the education landscape, from personalised
    learning experiences to efficient administrative support. The course delves into
    the ethical dimensions of AI integration, addressing concerns like privacy, bias
    and accountability. Educators will gain practical insights into how AI can amplify
    teaching methodologies, enhance student engagement and revolutionise assessment
    strategies. This course is designed to empower educators to seamlessly integrate
    AI chatbots into their teaching practices while ensuring ethical considerations
    remain at the forefront. Participants will engage in interactive units that cover
    the emergence and growth of AI chatbots, their potential to enhance instructional
    efficiency and the ethical implications of AI-driven education. Real-world examples
    will illuminate the challenges and solutions associated with AI ethics. By the
    end of the course, educators will be equipped with the skills to foster responsible
    AI integration, design future-ready curricula and leverage AI tools for impactful
    instruction.
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一门动态且沉浸式的课程，为教育工作者提供了对人工智能聊天机器人技术和其在教育环境中道德影响的深入理解。从基础概念到高级策略，本课程带领教育工作者踏上一段通过人工智能聊天机器人的世界变革之旅。参与者将探索人工智能聊天机器人如何重塑教育格局，从个性化学习体验到高效的行政支持。课程深入探讨了人工智能整合的道德维度，解决诸如隐私、偏见和问责制等问题。教育工作者将获得关于如何通过人工智能增强教学方法、提高学生参与度和革新评估策略的实用见解。本课程旨在赋予教育工作者无缝整合人工智能聊天机器人到他们的教学实践中，同时确保道德考量始终处于前沿。参与者将参与互动单元，涵盖人工智能聊天机器人的出现和增长、其提高教学效率的潜力以及人工智能驱动教育的道德影响。现实世界的例子将阐明与人工智能伦理相关的挑战和解决方案。课程结束时，教育工作者将具备培养负责任的人工智能整合、设计面向未来的课程大纲和利用人工智能工具进行有影响力的教学的技能。
- en: Enduring Understanding
  id: totrans-971
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 持久理解
- en: Empowering educators with AI chatbots involves mastering their practical applications,
    understanding ethical implications and adapting teaching practices for an AI-enhanced
    educational landscape.
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 通过人工智能聊天机器人赋权教育工作者涉及掌握其实际应用、理解道德影响以及调整教学实践以适应人工智能增强的教育环境。
- en: Essential Questions
  id: totrans-973
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 核心问题
- en: How can educators effectively integrate AI chatbots into their instructional
    practices while upholding ethical considerations?
  id: totrans-974
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育工作者如何在维护道德考量的同时，有效地将人工智能聊天机器人整合到他们的教学实践中？
- en: What ethical dilemmas arise from AI chatbot usage in education, and how can
    educators navigate them?
  id: totrans-975
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育中使用人工智能聊天机器人引发了哪些道德困境，教育工作者如何应对它们？
- en: In what ways can AI chatbots enhance student engagement, feedback and support
    in the learning process?
  id: totrans-976
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能聊天机器人如何以何种方式增强学习过程中的学生参与度、反馈和支持？
- en: What opportunities and challenges does AI pose for teaching and learning, and
    how can educators harness its potential?
  id: totrans-977
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能对教学和学习提出了哪些机遇和挑战，教育工作者如何利用其潜力？
- en: How can educators design curricula that prepare students for an AI-integrated
