  type: TYPE_NORMAL
  zh: 附录C：学生人工智能素养课程
- en: Based on our research, we suggest the following AI literacy course for students.
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们的研究，我们建议以下人工智能素养课程供学生选择。
- en: Course Name
  id: totrans-1092
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程名称
- en: Mastering AI Chatbots
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握人工智能聊天机器人
- en: Overall Educational Objective
  id: totrans-1094
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 整体教育目标
- en: By the end of this course, you will attain a thorough mastery of AI chatbots,
    including a strong comprehension of their technological underpinning, issues related
    to their development and challenges regarding their societal impact as well as
    developing the ability to adapt and use these tools in a variety of contexts.
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程结束时，你将全面掌握人工智能聊天机器人，包括对其技术基础的深入了解，与其发展相关的问题以及它们对社会影响带来的挑战，同时培养在不同情境下适应和使用这些工具的能力。
- en: Course Format
  id: totrans-1096
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程格式
- en: The course is scheduled for one semester and will adopt the flipped learning
    approach. Classes can be conducted synchronously online.
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程计划为一学期，将采用翻转课堂模式。课程可以同步在线进行。
- en: Course Description
  id: totrans-1098
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程描述
- en: The primary goal of this course is for students to become adept with AI chatbots
    and learn how to effectively use and apply these tools in various situations.
    Throughout the course, students will become proficient in AI chatbots, from grasping
    their technology to using them strategically. On the course, students will explore
    the basics of chatbots while also assessing their impact on education, jobs and
    society. They will also delve into how AI is influencing them personally, as well
    as individuals and their relationships with learning, technology and society.
    Additionally, students will discover ways to practically enhance their AI user
    experience, all while considering ethical concerns. They will also investigate
    the limitations and challenges of AI chatbots and their role in learning. Ethical
    considerations and real-world examples will be discussed to provide insights into
    AI chatbot development. Moreover, students will examine AI threats, ethical guidelines,
    and the responsibilities that educators, schools and universities have in this
    context. They will also explore upcoming trends and innovations in AI chatbots,
    preparing them for the ever-changing landscape of AI technology. The course will
    emphasise hands-on experience, and by the end of it, students will have configured
    and trained an AI chatbot to meet their individual needs. Consequently, students
    will have acquired skills in AI comprehension, critical thinking, ethical considerations
    and practical application, enabling them to navigate the world of AI effectively.
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程的主要目标是使学生熟练掌握人工智能聊天机器人，并学习如何在各种情况下有效地使用和应用这些工具。在整个课程中，学生将精通人工智能聊天机器人，从掌握其技术到战略性地使用它们。在课程中，学生将探索聊天机器人基础知识，同时评估它们对教育、工作和社会的影响。他们还将深入研究人工智能如何影响他们个人，以及个人与学习、技术和社会的关系。此外，学生将发现实际提高他们人工智能用户体验的方法，同时考虑伦理问题。他们还将研究人工智能聊天机器人的局限性和挑战，以及它们在学习中的作用。将讨论伦理考量与现实世界的例子，以提供对人工智能聊天机器人开发的洞见。此外，学生将检查人工智能威胁、伦理指南以及教育工作者、学校和大学在此背景下的责任。他们还将探索人工智能聊天机器人即将到来的趋势和创新，为人工智能技术的不断变化做好准备。本课程将强调实践经验，到课程结束时，学生将配置和训练一个满足他们个人需求的人工智能聊天机器人。因此，学生将获得人工智能理解、批判性思维、伦理考量和实践应用方面的技能，使他们能够有效地应对人工智能的世界。
- en: Enduring Understanding
  id: totrans-1100
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 持久理解
- en: Mastering AI chatbots involves understanding their impact on people, societies
    and ethics, and grasping the broad effects of technology progress.
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 精通人工智能聊天机器人需要理解它们对个人、社会和伦理的影响，以及掌握技术进步的广泛影响。
- en: Essential Questions
  id: totrans-1102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 核心问题
- en: What trends shape AI chatbot advancements and their impact on various domains?
  id: totrans-1103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些趋势塑造了人工智能聊天机器人的进步及其对各个领域的影响？
- en: How can AI chatbots be used for effective interactions and high-quality responses?
  id: totrans-1104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使用人工智能聊天机器人进行有效的互动和高质量的响应？
- en: What ethical considerations arise from AI chatbot limitations and how can they
    be addressed?
  id: totrans-1105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能聊天机器人限制带来的伦理考量有哪些？如何解决这些问题？
- en: In what ways do AI chatbots imitate human-like interactions, and what sets apart
    opinions from predictions in their output?
  id: totrans-1106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能聊天机器人以何种方式模仿类似人类的互动，以及它们输出的意见和预测有何不同？
- en: How can AI chatbots enhance user efficiency, support and ideas across different
    contexts?
