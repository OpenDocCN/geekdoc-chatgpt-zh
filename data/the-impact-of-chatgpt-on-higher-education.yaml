  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能聊天机器人如何在不同环境中提高用户效率、支持和想法？
- en: What's the impact of AI on learning, and what are learners' responsibilities
    in this context?
  id: totrans-1108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能对学习有何影响，在这个背景下学习者有哪些责任？
- en: What's the scope of generalised and specialised AI chatbots, considering limitations
