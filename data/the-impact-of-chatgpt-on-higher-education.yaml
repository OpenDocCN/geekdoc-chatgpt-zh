  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育工作者如何培养所有学生对人工智能聊天机器人的包容性和公平获取？
- en: What collaborative opportunities exist between educational institutions and
    industries in the AI-enhanced education landscape?
  id: totrans-984
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在人工智能增强的教育领域中，教育机构和产业之间存在哪些协作机会？
