  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 课程结束后，学生将能够：
- en: Develop strategies for fostering a responsible learning approach that adapts
    to the influence of AI technology.
  id: totrans-1117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定培养适应AI技术影响的负责任学习方法的策略。
- en: Analyse the influence of AI on individuals, education, society, industries and
    the global landscape.
  id: totrans-1118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析AI对个人、教育、社会、行业和全球格局的影响。
- en: Critically evaluate real-world AI dilemmas and appraise current efforts to address
    these dilemmas.
  id: totrans-1119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批判性地评估现实世界的AI困境，并评估解决这些困境的当前努力。
- en: Configure and train a basic AI chatbot tailored to their specific needs using
    a variety of tools and platforms.
  id: totrans-1120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用各种工具和平台配置和训练一个针对其特定需求的初级AI聊天机器人。
- en: Demonstrate proficient use of AI chatbots through effective interaction strategies,
    ethical considerations and informed decision-making.
  id: totrans-1121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过有效的交互策略、道德考虑和明智的决策展示对AI聊天机器人的熟练使用。
- en: Assessment
  id: totrans-1122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估
- en: Pre-class Quizzes – Before Each Unit (20%)
  id: totrans-1123
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 课前测验 – 每个单元之前（20%）
- en: '(1)Participation Activities – throughout the course, to include:'
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: （1）参与活动 – 在整个课程中，包括：
- en: A critique of an AI detection tool (5%)
  id: totrans-1125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对AI检测工具的批判（5%）
- en: A personal reflection discussing how ChatGPT was used as a search engine, then
    fact-checked against primary sources (5%)
  id: totrans-1126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一篇个人反思，讨论如何将ChatGPT用作搜索引擎，然后与原始资料进行事实核查（5%）
- en: A reflection paper on the importance of foundational learning, how AI may affect
    this and what should be done to avoid this (5%)
  id: totrans-1127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一篇关于基础学习重要性的反思论文，探讨AI可能产生的影响以及如何避免这种情况（5%）
- en: A critique of flowchart for AI-resilient teaching and learning (5%)
  id: totrans-1128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对AI弹性教学和学习流程图的批判（5%）
- en: The development of a personalised prompt bank (5%)
  id: totrans-1129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发一个个性化的提示库（5%）
- en: A personal diary on how ChatGPT was used for other tasks outside the realm of
    education (5%)
  id: totrans-1130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一篇关于如何将ChatGPT用于教育领域之外的其他任务的个人日记（5%）
- en: A SWOT analysis of generalised versus specialised bots (5%)
  id: totrans-1131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对通用型与专用型聊天机器人的SWOT分析（5%）
- en: 'Participation in a debate on the ethical implications of a real-world AI dilemma,
    such as: Should self-driving cars be programmed to kill if it means saving the
    lives of more people? or Should facial recognition software be used to track people''s
    movements? (5%)'
  id: totrans-1132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与关于现实世界AI困境伦理影响的辩论，例如：如果这意味着拯救更多人的生命，自动驾驶汽车是否应该被编程去杀人？或者是否应该使用面部识别软件来追踪人们的行动？（5%）
- en: (2)End-of-Course Performance Task – Configuring an AI Chatbot for Personal Use
    (40%)
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: （2）课程结束时的表现任务 – 配置AI聊天机器人以供个人使用（40%）
- en: 'The objective of the end-of-course performance task is to personalise an existing
    AI chatbot to your specific needs. You will step into the role of an AI enthusiast,
    customising an existing AI chatbot to work for you. By adjusting interactions,
    responses and functionalities, you will demonstrate your ability to adapt AI technology
    effectively. This task embodies the course''s key concepts, providing a hands-on
    opportunity to apply acquired knowledge in a practical scenario. Ultimately, you
    will create a personalised AI assistant aligned with your interests and requirements.
    The assessment standards are as follows:'
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 课程结束时的表现任务目标是根据您的特定需求个性化现有的AI聊天机器人。您将扮演一个AI爱好者的角色，定制现有的AI聊天机器人以满足您的需求。通过调整交互、响应和功能，您将展示您有效适应AI技术的能力。这项任务体现了课程的核心概念，提供了在实际场景中应用所学知识的实践机会。最终，您将创建一个符合您兴趣和需求的个性化AI助手。评估标准如下：
- en: '*Functionality and Customisation*'
  id: totrans-1135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*功能性和定制*'
- en: The configured AI chatbot demonstrates a clear understanding of the chosen scenario
    or context. The interactions and responses of the chatbot are relevant and aligned
    with the specific needs of the scenario. The chatbot effectively handles a variety
    of user inputs and provides appropriate responses.
  id: totrans-1136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置的AI聊天机器人对所选场景或背景有清晰的理解。聊天机器人的交互和响应与场景的具体需求相关且一致。聊天机器人能够有效地处理各种用户输入并提供适当的响应。
- en: '*Tools and Platforms Proficiency*'
  id: totrans-1137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*工具和平台熟练度*'
- en: The student has effectively utilised a variety of tools and platforms to configure
    the chatbot. There is evidence of technical proficiency in setting up and integrating
    the chatbot with relevant technologies.
  id: totrans-1138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生有效地利用了各种工具和平台来配置聊天机器人。有证据表明，他们在设置和将聊天机器人与相关技术集成方面具有技术熟练度。
- en: '*Rationale for Design Decisions*'
  id: totrans-1139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*设计决策的合理性*'
- en: The design decisions made in configuring the chatbot are clearly explained.
    The student justifies the choice of chatbot functionalities, responses and interactions
    based on the scenario's requirements.
  id: totrans-1140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在配置聊天机器人时所做的设计决策得到了清晰的解释。学生根据场景需求，对聊天机器人的功能、响应和交互的选择进行论证。
- en: '*Consideration of User Experience*'
  id: totrans-1141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*用户体验的考虑*'
- en: The chatbot provides a user-friendly and seamless experience for interacting
    with users. Provisions are made for handling user queries effectively, maintaining
    context and providing appropriate assistance.
  id: totrans-1142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聊天机器人为与用户互动提供了用户友好且无缝的体验。提供了有效处理用户查询、保持上下文并提供适当帮助的措施。
- en: '*Ethical Considerations*'
  id: totrans-1143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*伦理考量*'
- en: Potential ethical concerns related to the chatbot's interactions and responses
    are addressed. Safeguards are in place to prevent the chatbot from providing misleading,
    harmful or biased information.
  id: totrans-1144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与聊天机器人的交互和响应相关的潜在伦理问题得到解决。有措施防止聊天机器人提供误导性、有害或偏见的信息。
- en: '*Adaptability and Future Improvements*'
  id: totrans-1145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*适应性和未来改进*'
- en: The student discusses how the chatbot could be further improved or adapted in
    the future. Suggestions are provided for refining the chatbot's functionalities
    based on potential user feedback or changing requirements.
  id: totrans-1146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生讨论了聊天机器人未来如何进一步改进或适应。根据潜在用户反馈或变化的需求，提供了改进聊天机器人功能的建议。
- en: '*Documentation and Explanation*'
  id: totrans-1147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*文档和解释*'
- en: Clear documentation of the chatbot's configuration process, including tools
    used and setup steps, is provided. An informative explanation of the chatbot's
    functionalities, purpose and intended user experience is included.
  id: totrans-1148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供了聊天机器人配置过程的清晰文档，包括使用的工具和设置步骤。包括对聊天机器人功能、目的和预期用户体验的说明性解释。
