  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程名称
- en: Mastering AI Literacy for Learning
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握AI素养学习
- en: Overall Educational Objective
  id: totrans-1032
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 整体教育目标
- en: By the end of this course, you will have gained the skills to engage effectively
    with AI, evaluate its ethical implications, enhance learning through AI strategies
    and critically assess its limitations. You will be able to implement AI as a tool
    for creativity and efficiency, while also recognising and addressing potential
    instances of bypassing learning, fostering responsible learning practices in the
    AI era.
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 在本课程结束时，你将获得与AI有效互动、评估其伦理影响、通过AI策略提升学习以及批判性地评估其局限性的技能。你将能够将AI作为创造力和效率的工具来实施，同时识别并解决绕过学习的潜在情况，培养AI时代的负责任学习实践。
- en: Course Format
  id: totrans-1034
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程格式
- en: This course will be delivered as an asynchronous online programme, providing
    students with the flexibility to engage with the content at their own pace in
    accordance with their schedules. The course materials will be accessible through
    the university's learning management system, allowing students to learn, reflect
    and practice in a self-directed manner.
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程将以异步在线课程的形式提供，为学生提供灵活性，使他们能够根据自己的时间表以自己的节奏参与内容。课程材料将通过大学的学业管理系统提供，使学生能够以自我指导的方式学习、反思和实践。
- en: Course Description
  id: totrans-1036
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程描述
- en: The primary goal of this course is for students to develop essential skills
    that enable effective engagement with AI, ethical evaluation and strategic enhancement
    of learning through AI strategies. By the end of this course, students will have
    gained the ability to critically assess AI's limitations, leverage its potential
    for creativity and efficiency and ensure responsible learning practices that guard
    against potential shortcuts. Through a flexible online format, students will explore
    the transformative role of AI in education, its impact on learning strategies,
    and how to navigate its ethical considerations, empowering them to harness the
    power of AI while promoting responsible learning practices in the AI era.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程的主要目标是让学生发展必要的技能，使他们能够有效地与AI互动，进行道德评估，并通过AI策略战略性地提升学习。在本课程结束时，学生将能够批判性地评估AI的局限性，利用其创造力和效率的潜力，并确保负责任的学习实践，以防止潜在的捷径。通过灵活的在线格式，学生将探索AI在教育中的变革性作用，其对学习策略的影响，以及如何导航其伦理考量，使他们能够利用AI的力量，同时在AI时代促进负责任的学习实践。
- en: Enduring Understanding
  id: totrans-1038
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 持久理解
- en: In the AI era, mastering AI literacy equips learners with skills to engage,
    collaborate with and effectively adapt to AI, enhancing learning strategies in
    a rapidly evolving technological landscape while safeguarding against potential
    learning shortcuts.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI时代，掌握AI素养使学习者具备与AI互动、协作和有效适应AI的技能，在快速发展的技术环境中提升学习策略，同时防范潜在的学习捷径。
- en: Essential Questions
  id: totrans-1040
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 核心问题
- en: How does mastering AI literacy empower learners to engage with and collaborate
    effectively alongside AI in various contexts?
  id: totrans-1041
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掌握人工智能素养如何使学习者能够有效地与人工智能在各种情境中互动和协作？
- en: What specific skills are essential for learners to effectively adapt to the
    evolving AI landscape while ensuring the integrity of their learning journey?
  id: totrans-1042
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于学习者来说，哪些具体技能是适应不断发展的人工智能领域并确保学习旅程完整性的关键？
- en: How can AI literacy enhance learning strategies to meet the demands of a rapidly
    changing technological environment?
  id: totrans-1043
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何通过人工智能素养提升学习策略以适应快速变化的技术环境的需求？
- en: What potential shortcuts in learning could arise in the presence of AI, and
    how can learners guard against them?
  id: totrans-1044
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在人工智能存在的情况下，学习过程中可能出现的潜在学习捷径有哪些，以及学习者如何防范它们？
- en: In what ways does AI literacy contribute to learners' ability to critically
    evaluate and utilise AI tools for educational purposes?
  id: totrans-1045
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能素养如何帮助学习者批判性地评估和利用人工智能工具进行教育目的？
- en: How can learners strike a balance between leveraging AI's benefits and maintaining
    the depth and quality of their learning experiences?
  id: totrans-1046
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习者如何平衡利用人工智能的益处和维护学习体验的深度和质量？
- en: What ethical considerations should learners keep in mind while collaborating
    with AI in their learning processes?
  id: totrans-1047
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在学习过程中与人工智能协作时，学习者应考虑哪些伦理考量？
- en: How can AI literacy foster a sense of responsibility and active participation
    among learners in shaping the future of education within an AI-driven era?
  id: totrans-1048
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何通过人工智能素养在人工智能驱动时代塑造教育未来的过程中培养学习者的责任感与积极参与感？
- en: What strategies can learners employ to effectively navigate the ever-evolving
    landscape of AI technologies in their learning endeavours?
  id: totrans-1049
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习者可以采用哪些策略来有效地在他们的学习努力中导航不断变化的人工智能技术领域？
- en: Course Learning Outcomes and Competences
  id: totrans-1050
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 课程学习成果和能力
- en: 'Upon completing the course, students will be able to:'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 完成课程后，学生将能够：
- en: Identify and assess the specific skills required to effectively engage with
    and adapt to AI, fostering collaboration and informed decision-making.
  id: totrans-1052
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别和评估有效参与和适应人工智能所需的具体技能，以促进合作和明智的决策。
- en: Evaluate the ethical implications of utilising AI in learning processes, demonstrating
    an awareness of responsible AI usage and potential challenges.
  id: totrans-1053
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估在学习过程中利用人工智能的伦理影响，展示对负责任人工智能使用和潜在挑战的认识。
- en: Develop strategies to enhance learning experiences through AI, including optimising
    input quality, output effectiveness and personalised interactions.
  id: totrans-1054
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定通过人工智能提升学习体验的策略，包括优化输入质量、输出效果和个性化交互。
- en: Critically appraise the limitations and challenges associated with AI technologies,
    recognising the importance of reliability and ethical considerations.
  id: totrans-1055
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批判性地评估与人工智能技术相关的局限性和挑战，认识到可靠性和伦理考量的重要性。
- en: Implement AI as a personal aide and tutor, applying AI tools to enhance creativity,
    efficiency and knowledge acquisition.
  id: totrans-1056
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将人工智能作为个人助手和导师实施，应用人工智能工具来提升创造力、效率和知识获取。
- en: Identify instances where the use of AI could lead to bypassing learning and
    formulate strategies to mitigate them, thereby fostering responsible learning
    practices in the AI era.
  id: totrans-1057
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别使用人工智能可能导致绕过学习的情况，并制定缓解策略，从而在人工智能时代培养负责任的学习实践。
