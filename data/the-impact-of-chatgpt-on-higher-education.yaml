  id: totrans-1112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大学如何负责任地参与人工智能聊天机器人的开发和伦理讨论？
- en: What tools, platforms and practices can be used to develop AI chatbots?
  id: totrans-1113
  prefs:
