    to protect."'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 目的：为了保护能够改变现实的历史知识。成员们在阴影中行动，使用密码和隐藏的文字进行交流。他们的标志是一条吞噬自己尾巴的蛇，象征着他们誓言要保护的创造与毁灭的循环。"
- en: 96\. Invent a Mythical Disease
