  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 症状：受害者会经历关于他们从未经历过的生活的生动梦境，逐渐忘记他们的真实身份。几周后，他们失去所有记忆，变成了空洞的自我。传说这种疾病通过诅咒的遗物传播。"
- en: 97\. Write a Speech for a Rebel Leader
