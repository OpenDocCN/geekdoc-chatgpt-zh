- en: 'Prompt:'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"How do I start collecting rare coins as a beginner?"'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: '"作为一个初学者，我如何开始收集稀有硬币？"'
- en: 'Example ChatGPT Response:'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"1\. Research: Learn about coin grading and mint marks.'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: '"1\. 研究：了解硬币评级和铸造厂标记。'
- en: '2\. Start Small: Begin with affordable coins like pennies or nickels with historical
    significance.'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 从小做起：开始时使用具有历史意义的便士或镍币等价格合理的硬币。
- en: '3\. Buy from Reputable Dealers: Avoid unverified sellers online.'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 从信誉良好的经销商处购买：避免在线购买未经验证的卖家。
- en: '4\. Protect Your Collection: Use coin albums or cases to prevent damage.'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 保护你的收藏：使用硬币夹或盒子防止损坏。
- en: '5\. Join a Community: Connect with other collectors for advice and trade opportunities."'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 5\. 加入社区：与其他收藏家联系以获取建议和交易机会。
- en: 'Section 9: Advanced ChatGPT Prompts'
  id: totrans-664
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第9节：高级ChatGPT提示
- en: 50\. Prompt Engineering Basics
  id: totrans-665
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 50\. 提示工程基础
- en: 'Prompt:'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"How do I write effective prompts to get the best responses from ChatGPT?"'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: '"我如何编写有效的提示以从ChatGPT获得最佳回复？"'
- en: 'Example ChatGPT Response:'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"1\. Be specific: Provide clear and detailed instructions (e.g., ''Write a
    300-word summary of the French Revolution'').'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: '"1\. 详尽具体：提供清晰和详细的说明（例如，''写一篇300字的法国大革命总结''）。'
- en: '2\. Use context: Include relevant details (e.g., ''Write as if explaining to
    a 10-year-old'').'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 使用上下文：包括相关细节（例如，'像向10岁孩子解释一样写作'）。
- en: '3\. Ask for structure: Request formats like lists, paragraphs, or scripts.'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 请求结构：要求列表、段落或剧本等格式。
- en: '4\. Experiment: Refine prompts based on initial responses to get better results.'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 实验：根据初始回复改进提示以获得更好的结果。
- en: '5\. Be polite: It helps maintain clarity and ensures ChatGPT stays in context."'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 5\. 保持礼貌：这有助于保持清晰并确保ChatGPT保持上下文。
- en: 51\. Fine-Tuning Results
  id: totrans-674
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 51\. 精调结果
- en: 'Prompt:'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"How can I make ChatGPT responses more tailored to my needs?"'
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: '"我如何使ChatGPT的回复更符合我的需求？"'
- en: 'Example ChatGPT Response:'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"1\. Add context: ''I’m a college student studying biology. Explain photosynthesis
    simply.'''
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: '"1\. 添加上下文：''我是一名学习生物学的大学学生。简单解释光合作用。'''
- en: '2\. Request tone or style: ''Write a formal report about climate change.'''
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 请求语气或风格：'写一篇关于气候变化的正式报告'。
- en: '3\. Specify examples: ''Include three examples of sustainable energy.'''
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 指定例子：'包括三个可持续能源的例子'。
- en: '4\. Iterate: Ask for revisions if the response doesn’t meet expectations (e.g.,
    ''Make this more concise'')."'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 迭代：如果回复不符合预期，请要求修改（例如，'使这更简洁'）。"
- en: 52\. Creating Multi-Step Prompts
  id: totrans-682
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 52\. 创建多步骤提示
- en: 'Prompt:'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Guide me step-by-step to create a business plan for a food truck."'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: '"引导我一步步创建一个食品车商业计划。"'
- en: 'Example ChatGPT Response:'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Step 1: Define your concept: What type of cuisine will you serve?'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: '"第一步：定义你的概念：你将提供什么类型的餐饮服务？'
- en: 'Step 2: Identify your target audience: Who are your customers?'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：确定目标受众：你的客户是谁？
- en: 'Step 3: Develop a menu: Include 5–10 signature dishes.'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：开发菜单：包括5-10道特色菜。
- en: 'Step 4: Budget planning: Calculate startup and operational costs.'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：预算规划：计算启动和运营成本。
- en: 'Step 5: Marketing: Plan strategies for social media, flyers, and events.'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：营销：制定社交媒体、传单和活动的策略。
- en: 'Step 6: Find a location: Choose high-traffic areas for your truck."'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：寻找地点：选择人流量大的区域停放你的食品车。
- en: 53\. AI-Powered Brainstorming
  id: totrans-692
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 53\. AI驱动的大脑风暴
- en: 'Prompt:'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Help me brainstorm 10 innovative ideas for a sustainable fashion brand."'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我构思10个可持续时尚品牌的创新想法。"'
- en: 'Example ChatGPT Response:'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"1\. Upcycled clothing lines.'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: '"1\. 循环利用的服装系列。'
- en: 2\. Biodegradable packaging.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 生物降解包装。
- en: 3\. Rent-a-wardrobe services.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 租赁衣柜服务。
- en: 4\. QR codes on tags for transparency about materials.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 标签上的二维码，以透明地展示材料。
- en: 5\. Workshops teaching customers to repair clothes.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 5\. 举办研讨会，教顾客如何修补衣物。
- en: 6\. Customizable designs to reduce mass production.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 6\. 可定制的样式以减少大规模生产。
- en: 7\. Collaborations with local artisans.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 7\. 与当地工匠合作。
- en: 8\. Garment recycling programs.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 8\. 服装回收计划。
- en: 9\. Limited-edition seasonal collections.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 9\. 限量版季节性系列。
- en: 10\. Use of algae-based fabrics."
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 10\. 使用基于海藻的织物。
- en: 54\. Ethical Considerations with AI
  id: totrans-706
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 54\. 使用AI的伦理考量
- en: 'Prompt:'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"What ethical issues should I consider when using AI in my business?"'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: '"在使用AI时，我应该考虑哪些伦理问题？"'
- en: 'Example ChatGPT Response:'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"1\. Privacy: Ensure user data is collected and stored securely.'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: '"1\. 隐私：确保用户数据被安全收集和存储。'
- en: '2\. Bias: Check algorithms for fairness and avoid reinforcing stereotypes.'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 偏见：检查算法的公平性，避免强化刻板印象。
- en: '3\. Transparency: Inform users when they’re interacting with AI.'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 透明度：当用户与AI互动时，通知用户。
- en: '4\. Accountability: Have a plan for addressing errors or misuse.'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 责任：制定处理错误或误用的计划。
- en: '5\. Environmental Impact: Consider the energy consumption of AI models."'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 环境影响：考虑AI模型的能耗。
- en: 'Section 10: Real-Life Application Prompts'
  id: totrans-715
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第10节：现实应用提示
- en: 55\. Planning Events
  id: totrans-716
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 55. 计划活动
- en: 'Prompt:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Help me organize a surprise birthday party for 20 people."'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮我组织一场为20人举办的惊喜生日派对。"'
- en: 'Example ChatGPT Response:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 示例ChatGPT回复：
- en: '"1\. Theme: Choose something the birthday person loves (e.g., retro, beach).'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: '"1. 主题：选择生日人喜欢的东西（例如，复古、海滩）。'
- en: '2\. Venue: Book a space or use your home.'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 场地：预订空间或使用你的家。
- en: '3\. Food: Decide between catering, cooking, or potluck.'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 食物：决定是外包、烹饪还是拼盘。
- en: '4\. Decorations: Balloons, banners, and table settings.'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 装饰品：气球、横幅和餐桌布置。
- en: '5\. Entertainment: Music playlist, games, or a photo booth.'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 娱乐：音乐播放列表、游戏或照片亭。
- en: '6\. Timeline: Finalize plans and send invites at least two weeks in advance."'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 时间表：至少提前两周确定计划并发送邀请。
- en: 56\. Writing Contracts
  id: totrans-726
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 56. 编写合同
- en: 'Prompt:'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Draft a basic freelance agreement for a graphic design project."'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: '"为图形设计项目草拟一份基本的自由职业协议。"'
- en: 'Example ChatGPT Response:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 示例ChatGPT回复：
- en: '*"Freelance Agreement'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: '*"自由职业协议'
- en: This agreement is made between [Freelancer Name] and [Client Name] on [Date].
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 本协议由[自由职业者姓名]和[客户姓名]于[日期]签订。
- en: 'Scope of Work: The freelancer agrees to design [specific project].'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 工作范围：自由职业者同意设计[具体项目]。
- en: 'Payment Terms: [Amount] to be paid in [installments or upon completion].'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 付款条款：[金额]分[分期付款或完成后]支付。
- en: 'Timeline: Work to be completed by [deadline].'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 时间表：工作应在[截止日期]前完成。
- en: 'Revisions: [Number] of revisions included.'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 修订：包含[修订次数]次修订。
- en: 'Signatures: Both parties sign below to agree to these terms."*'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 签名：双方在下方签字，同意这些条款。"*
- en: 57\. Home Renovation Ideas
  id: totrans-737
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 57. 家庭翻新想法
- en: 'Prompt:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Suggest budget-friendly ideas to renovate a small living room."'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: '"提出一些经济实惠的翻新小型客厅的想法。"'
- en: 'Example ChatGPT Response:'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 示例ChatGPT回复：
- en: '"1\. Paint: Use light colors to make the space feel bigger.'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: '"1. 涂漆：使用浅色使空间感觉更大。'
- en: '2\. Furniture: Opt for multipurpose pieces like a sofa bed or ottoman with
    storage.'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 家具：选择多功能件，如沙发床或带储物空间的脚凳。
- en: '3\. Lighting: Add floor lamps or LED strips for ambiance.'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 照明：添加落地灯或LED灯带以营造氛围。
- en: '4\. Decor: Use mirrors to reflect light and create an illusion of space.'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 装饰：使用镜子反射光线，创造空间错觉。
- en: '5\. DIY Projects: Build custom shelves for added storage."'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 5. DIY项目：制作定制架子以增加储物空间。
- en: 58\. Meal Prep for the Week
  id: totrans-746
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 58. 周餐食准备
- en: 'Prompt:'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Create a meal prep plan for someone who wants high-protein meals."'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: '"为想要高蛋白餐食的人创建一份餐食准备计划。"'
- en: 'Example ChatGPT Response:'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 示例ChatGPT回复：
- en: '"Meal Prep Plan:'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: '"餐食准备计划：'
- en: 'Breakfast: Greek yogurt with granola and berries.'
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 早餐：希腊酸奶配麦片和浆果。
- en: 'Lunch: Grilled chicken breast with quinoa and steamed broccoli.'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 午餐：烤鸡胸肉配藜麦和蒸西兰花。
- en: 'Dinner: Salmon with sweet potatoes and asparagus.'
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 晚餐：三文鱼配红薯和芦笋。
- en: 'Snacks: Hard-boiled eggs, mixed nuts, and protein shakes.'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 小吃：煮鸡蛋、混合坚果和蛋白质奶昔。
- en: 'Tip: Cook in bulk and portion meals into containers for easy access."'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：批量烹饪，将餐点分装进容器以便轻松取用。
- en: 59\. Road Trip Planner
  id: totrans-756
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 59. 旅行规划者
- en: 'Prompt:'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Plan a 7-day road trip through the Pacific Northwest."'
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: '"计划一次为期7天的太平洋西北部公路旅行。"'
- en: 'Example ChatGPT Response:'
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 示例ChatGPT回复：
- en: '"Day 1: Seattle - Visit Pike Place Market and the Space Needle.'
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: '"第一天：西雅图 - 参观派克市场和对讲筒。'
- en: 'Day 2: Olympic National Park - Explore the Hoh Rainforest.'
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 第二天：奥林匹克国家公园 - 探索霍雨林。
- en: 'Day 3: Drive to Portland - Stop at Mount St. Helens.'
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 第三天：开车前往波特兰 - 在圣海伦斯山停留。
- en: 'Day 4: Portland - Tour Powell’s Books and local breweries.'
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 第四天：波特兰 - 参观鲍威尔书店和当地酿酒厂。
- en: 'Day 5: Crater Lake National Park - Hike scenic trails.'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 第五天：克拉特湖国家公园 - 徒步风景小径。
- en: 'Day 6: Bend - Go paddleboarding at Sparks Lake.'
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 第六天：本德 - 在斯帕克斯湖划独木舟。
- en: 'Day 7: Return to Seattle - Relax and reflect on your trip."'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 第七天：返回西雅图 - 放松并反思你的旅行。
- en: 'Section 11: Prompts for Collaboration'
  id: totrans-767
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第11节：协作提示
- en: 60\. Team-Building Activities
  id: totrans-768
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 60. 团队建设活动
- en: 'Prompt:'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Suggest a team-building activity for a group of remote workers."'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: '"为远程工作者团队提出一项团队建设活动。"'
- en: 'Example ChatGPT Response:'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 示例ChatGPT回复：
- en: '*"Virtual Escape Room:'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: '*"虚拟逃脱室：'
- en: Use an online platform to solve puzzles and complete tasks as a team.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 使用在线平台以团队形式解决谜题和完成任务。
- en: Divide employees into smaller groups and let them compete.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 将员工分成更小的组，让他们竞争。
- en: Debrief afterward to discuss teamwork and communication."*
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: '"之后的总结讨论以讨论团队合作和沟通。"'
- en: 61\. Group Decision-Making
  id: totrans-776
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 61. 集体决策
- en: 'Prompt:'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"How can I facilitate a group decision-making process for choosing a new company
    logo?"'
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: '"我如何促进一个选择新公司标志的集体决策过程？"'
- en: 'Example ChatGPT Response:'
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"1\. Present all logo options with background details.'
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: '"1. 展示所有带有背景细节的标志选项。'
- en: '2\. Use a ranking system: Ask team members to rate their top three choices.'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 使用排名系统：请团队成员对他们的前三项选择进行评分。
- en: 3\. Hold a discussion to address concerns and preferences.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 举行讨论以解决担忧和偏好。
- en: 4\. Use a voting tool like Google Forms for a final vote.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用像 Google Forms 这样的投票工具进行最终投票。"
- en: 5\. Ensure transparency by sharing the results and reasoning behind the final
    choice."
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 通过分享最终选择的结果和理由来确保透明度。
- en: 62\. Remote Work Productivity
  id: totrans-785
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 62. 远程工作生产力
- en: 'Prompt:'
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"What strategies can help remote teams stay productive?"'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: '"有哪些策略可以帮助远程团队保持生产力？"'
- en: 'Example ChatGPT Response:'
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"1\. Daily Check-Ins: Start each day with a quick team sync via chat or video.'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: '"1. 每日检查：每天开始时通过聊天或视频进行快速团队同步。"'
- en: '2\. Task Management Tools: Use Trello or Asana to track progress.'
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 任务管理工具：使用 Trello 或 Asana 跟踪进度。
- en: '3\. Flexible Hours: Allow employees to work when they’re most productive.'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 弹性工作时间：允许员工在他们最有效率的时候工作。
- en: '4\. Virtual Social Time: Schedule casual hangouts to maintain camaraderie.'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 虚拟社交时间：安排随意的聚会以维持友谊。
- en: '5\. Clear Goals: Set weekly objectives and review progress regularly."'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 清晰的目标：设定每周目标并定期审查进度。"
- en: 'Section 12: Creative Writing Challenges'
  id: totrans-794
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第12节：创意写作挑战
- en: 63\. Write a Story in Six Words
  id: totrans-795
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 63. 用六个字写一个故事
- en: 'Prompt:'
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Create a six-word story about love."'
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: '"创作一个关于爱的六字故事。"'
- en: 'Example ChatGPT Response:'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"Left at altar, heart still beats."'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: '"被遗弃在祭坛上，心仍在跳动。"'
- en: 64\. Describe a World Without Light
  id: totrans-800
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 64. 描述一个没有光的世界
- en: 'Prompt:'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a paragraph about a world where light doesn’t exist."'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一段关于光不存在的世界的段落。"'
- en: 'Example ChatGPT Response:'
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"In the eternal darkness, sound became the sole guide. Cities buzzed with hums
    of energy, and the air shimmered with whispers of unseen beings. Touch and scent
    grew sharp, replacing the absent sight, as humanity navigated a world shaped by
    shadows they would never see."'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: '"在永恒的黑暗中，声音成为了唯一的向导。城市中充满了能量的嗡嗡声，空气中闪烁着无形生物的低语。触感和气味变得敏锐，取代了缺失的视觉，人类在由阴影塑造的世界中导航，而这些阴影是他们永远无法看到的。"'
- en: 65\. Imagine a Conversation Between Two Robots Debating Humanity
  id: totrans-805
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 65. 想象两个机器人之间的对话，辩论人类
- en: 'Prompt:'
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a short dialogue between two robots discussing the usefulness of humans."'
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一段两个机器人讨论人类有用性的简短对话。"'
- en: 'Example ChatGPT Response:'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"Robot A: Humans are inefficient—they rely on emotions to make decisions.'
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: '"机器人A：人类效率低下——他们依赖情感来做出决定。"'
- en: 'Robot B: But they created us. Doesn''t that imply their intelligence?'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人B：但他们创造了我们。这难道不意味着他们的智慧吗？
- en: 'Robot A: Intelligence, perhaps, but look at their wars and pollution.'
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人A：或许有智慧，但看看他们的战争和污染。
- en: 'Robot B: True, but without humans, who would need us?'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人B：确实如此，但没有人类，谁需要我们呢？
- en: 'Robot A: A paradox indeed. We are their solution, yet also their reminder of
    inadequacy."'
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人A：确实是一个悖论。我们是他们的解决方案，同时也是他们不足的提醒。"
- en: 66\. Write a Villain’s Monologue
  id: totrans-814
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 66. 写一个恶棍的独白
- en: 'Prompt:'
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Create a monologue for a villain justifying their actions."'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: '"为恶棍创作一个为其行为辩护的独白。"'
- en: 'Example ChatGPT Response:'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"You call me a monster, yet I am simply the mirror of your world. When the
    rich feast while the poor starve, am I not the one who brings balance? My actions
    are cruel, yes—but necessary. Chaos births order, and I am the architect of that
    rebirth."'
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: '"你称我为怪物，而我只是你世界的镜子。当富人在盛宴而穷人挨饿时，难道我不是那个带来平衡的人吗？我的行为是残酷的，是的——但这是必要的。混乱孕育秩序，而我就是那个重生的建筑师。"'
- en: 67\. Create a New Mythology
  id: totrans-819
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 67. 创造一个新的神话
- en: 'Prompt:'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Invent a myth about the creation of mountains."'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: '"发明一个关于山脉创造的神话。"'
- en: 'Example ChatGPT Response:'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 ChatGPT 响应：
- en: '"Long ago, the sky and the earth were lovers separated by a jealous sun. To
    reunite, the earth pushed its soil upward, forming mountains that touched the
    heavens. Each peak is a kiss they shared before the sun’s burning gaze forced
    them apart again."'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: '"很久以前，天空和大地是一对被嫉妒的太阳分开的恋人。为了重聚，大地将其土壤向上推，形成了触摸天空的山脉。每个顶峰都是他们在太阳燃烧的目光迫使他们再次分开之前分享的一个吻。"'
- en: 68\. Write a Poem About Time
  id: totrans-824
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 68. 写一首关于时间的诗
- en: 'Prompt:'
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Compose a short poem reflecting on the passage of time."'
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: '"创作一首反映时间流逝的短诗。"'
- en: 'Example ChatGPT Response:'
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The clock whispers, seconds fly,'
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: '"时钟低语，秒针飞逝，"'
- en: Moments fade like stars in the sky.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 时刻如天空中星星般消逝。
- en: Past is shadow, future a spark,
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 过去是阴影，未来是火花，
- en: Time’s a flame that burns the dark."
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 时间是燃烧黑暗的火焰。
- en: 69\. Create a Backstory for an Artifact
  id: totrans-832
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 69. 为一个神器创造一个背景故事
- en: 'Prompt:'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Describe the origin of a cursed ring."'
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一个被诅咒戒指的起源。"'
- en: 'Example ChatGPT Response:'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Forged by a jealous blacksmith, the ring was imbued with his dying breath
    as he cursed the lover who betrayed him. Anyone who wears it is doomed to relive
    the pain of unrequited love, their heart slowly consumed by despair."'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: '"由一个嫉妒的铁匠锻造的戒指，在他诅咒背叛他的爱人时，注入了他的临终呼吸。任何佩戴它的人都将注定重温单相思的痛苦，他们的心慢慢被绝望吞噬。"'
- en: 70\. Write a Dialogue in an Alien Language
  id: totrans-837
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 70. 用外星语言写一段对话
- en: 'Prompt:'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a dialogue between two aliens with translation notes."'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一段两个外星人的对话，附上翻译说明。"'
- en: 'Example ChatGPT Response:'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Alien 1: “Zirak fum blorak?” (Do you trust them?)'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: '"外星1号：“Zirak fum blorak？”（你信任他们吗？）'
- en: 'Alien 2: “Blorak il famu.” (Trust is irrelevant—they are useful.)'
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 外星2号：“Blorak il famu。”（信任无关紧要——他们是有用的。）
- en: 'Alien 1: “Zimta blorak mimru.” (Until they aren’t.)'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 外星1号：“Zimta blorak mimru。”（直到他们不再。）
- en: 'Alien 2: (Clicks tongue) “Precisely.”'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 外星2号：（点击舌头）“Precisely。”
- en: 71\. Describe a Post-Apocalyptic Setting
  id: totrans-845
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 71. 描述一个后末日场景
- en: 'Prompt:'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Paint a picture of a world after a nuclear disaster."'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: '"描绘一个核灾难后的世界画面。"'
- en: 'Example ChatGPT Response:'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The horizon glowed faintly with a toxic orange haze, and the air was thick
    with the scent of ash. Skyscrapers stood as skeletal remains, their glass eyes
    shattered. The ground cracked underfoot, releasing steam from the earth’s scorched
    core. Survivors scavenged in silence, their shadows flickering like ghosts of
    the past."'
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: '"地平线微弱地闪烁着有毒的橙色烟雾，空气中弥漫着灰烬的气味。摩天大楼像骨架般矗立，它们的玻璃眼睛破碎。脚下地面裂开，从地球烧焦的核心释放出蒸汽。幸存者在沉默中搜寻，他们的影子像过去的鬼魂一样闪烁。"'
- en: 72\. Write a Character’s Last Words
  id: totrans-850
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 72. 写一个角色的最后一句话
- en: 'Prompt:'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"What would a hero say in their dying moment?"'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: '"在英雄临终之际他们会说什么？"'
- en: 'Example ChatGPT Response:'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"‘Carry the torch,’ they whispered, their voice barely audible. ‘This fight...
    it was never about me. It’s about hope.’ And with that, their hand fell limp,
    their mission entrusted to those left behind."'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: '"‘传递火炬，’他们低声说，声音几乎听不见。‘这场战斗……从来不是关于我。这是关于希望。’然后，他们的手无力地垂下，他们的使命托付给了留下的那些人。"'
- en: 73\. Invent a Magical Creature
  id: totrans-855
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 73. 创造一个魔法生物
- en: 'Prompt:'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Create a unique magical creature and describe its powers."'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: '"创造一个独特的魔法生物并描述它的能力。"'
- en: 'Example ChatGPT Response:'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Name: Luminara'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: '"名字：Luminara"'
- en: 'Appearance: A translucent, deer-like creature with glowing antlers that pulse
    with moonlight.'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 外观：一种半透明的鹿类生物，带有发光的鹿角，随着月光脉动。
- en: 'Powers: Luminara guides lost travelers through forests, casting protective
    auras against predators. Its antlers store the energy of the stars, used to heal
    the wounded or banish dark spirits."'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 能力：Luminara引导迷失的旅人在森林中前行，对捕食者施加保护光环。它的鹿角储存着星辰的能量，用于治愈受伤者或驱逐黑暗精灵。
- en: 74\. Write a Love Letter from a Villain
  id: totrans-862
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 74. 从反派给爱人写一封情书
- en: 'Prompt:'
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Compose a love letter from a villain to their nemesis."'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: '"从反派给他们的宿敌写一封情书。"'
- en: 'Example ChatGPT Response:'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"My Dearest Adversary,'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: '"我最亲爱的对手，'
- en: Every encounter with you ignites a fire in my soul. Your resilience fuels my
    ambition; your hatred sharpens my resolve. Without you, my victories would taste
    hollow. You complete the chaos I bring to this world. Yours in eternal opposition,
    X."
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 每次与你相遇都会在我灵魂中点燃一把火。你的坚韧激发了我的雄心；你的仇恨磨练了我的决心。没有你，我的胜利将变得空洞。你完成了我为这个世界带来的混乱。永恒的对抗者，X。”
- en: 75\. Describe an Imaginary Festival
  id: totrans-868
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 75. 描述一个虚构的节日
- en: 'Prompt:'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Invent a festival celebrated in a fictional kingdom."'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: '"在一个虚构王国中庆祝的节日。"'
- en: 'Example ChatGPT Response:'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Name: The Festival of Starlight'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: '"名字：星光节"'
- en: 'Location: The Kingdom of Aurion'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 地点：奥里恩王国
- en: 'Description: Held once every decade, this festival celebrates the alignment
    of three moons. Lanterns float into the sky, mimicking constellations. Citizens
    wear glowing garments, and the night ends with a grand performance where actors
    reenact the kingdom’s creation myth under a shower of falling stars."'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：每十年举行一次，这个节日庆祝三个月亮的对齐。灯笼飘入天空，模仿星座。市民们穿着发光的服装，夜晚以一场盛大表演结束，演员们在流星雨下重现王国的创世神话。
- en: 76\. Create a Letter from the Future
  id: totrans-875
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 76. 创建一封来自未来的信
- en: 'Prompt:'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a letter from someone living in the year 3024 to someone in the present."'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一封来自3024年的人给现在的人的信。"'
- en: 'Example ChatGPT Response:'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Dear Ancestor,'
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: '"亲爱的祖先，'
- en: The air here is thin, and the oceans are scarce. We’ve colonized Mars but long
    for the blue skies of Earth you once enjoyed. Please, preserve what you have.
    Your choices today shape our tomorrow. Don’t let us live only in shadows of your
    dreams."
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的空气稀薄，海洋稀少。我们已经殖民了火星，但渴望曾经享受过的地球的蓝天。请，保护好你所拥有的。你今天的抉择塑造了我们的明天。不要让我们只活在你的梦想阴影中。"
- en: 77\. Write a Recipe for a Magical Potion
  id: totrans-881
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 77. 编写一个魔法药水的配方
- en: 'Prompt:'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Create a recipe for a potion that grants courage."'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: '"创造一种赋予勇气的药水配方。"'
- en: 'Example ChatGPT Response:'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '*"Potion of Bravery'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: '*"勇气药水'
- en: 'Ingredients:'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 'Ingredients:'
- en: 3 drops of lion’s mane extract.
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 3滴狮子鬃毛提取物。
- en: 1 phoenix feather (burned to ash).
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 1根凤凰羽毛（烧成灰烬）。
- en: 1 vial of spring water collected at dawn.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 1 瓶在黎明时分收集的泉水。
- en: A pinch of powdered ruby.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 一撮粉末状的红宝石。
- en: 'Instructions:'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 'Instructions:'
- en: Boil the spring water while chanting, 'Heart of steel, courage real.'
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 在吟唱“钢铁之心，真实勇气”的同时煮沸泉水。
- en: Stir in the lion’s mane and ash until dissolved.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 加入狮子鬃毛和灰烬，搅拌至溶解。
- en: Add powdered ruby, and let the potion glow red.
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 添加粉末状的红宝石，让药水发光。
- en: Drink during a full moon for maximum effect."*
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 在满月时饮用以获得最大效果。"*
- en: 78\. Write a News Article About a Fictional Event
  id: totrans-896
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 78. 编写一篇关于虚构事件的新闻文章
- en: 'Prompt:'
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a news article about the discovery of an underwater city."'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一篇关于发现水下城市的新闻文章。"'
- en: 'Example ChatGPT Response:'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"BREAKING NEWS: Lost City Found Beneath the Pacific'
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: '"突发新闻：太平洋下发现失落之城'
- en: Marine archaeologists have uncovered Atlantis-like ruins 3,000 feet below the
    Pacific Ocean. The city features towering spires covered in coral and intricate
    mosaics preserved by the depths. 'This changes our understanding of ancient civilizations,'
    said Dr. Elena Torres. Explorations continue as researchers seek to unlock its
    secrets."
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 海洋考古学家在太平洋下方3000英尺处发现了类似亚特兰蒂斯的遗迹。这座城市有高耸的尖塔，覆盖着珊瑚和被深度保存的复杂马赛克。"这改变了我们对古代文明的理解，"艾琳娜·托雷斯博士说。探索仍在继续，研究人员寻求解开其秘密。
- en: 79\. Describe the First Contact with Aliens
  id: totrans-902
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 79. 描述与外星人的首次接触
- en: 'Prompt:'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a scene where humans make first contact with an alien species."'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个人类首次接触外星种族的场景。"'
- en: 'Example ChatGPT Response:'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The shimmering vessel descended over the Nevada desert, its surface reflecting
    the sunset like molten silver. A door opened, and an ethereal figure stepped out,
    its form a blend of light and liquid. ''We come not to conquer but to learn,''
    it said, its voice resonating in every human language at once."'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: '"闪亮的容器降落在内华达沙漠上，其表面反射着落日的光芒，像熔化的银一样。一扇门打开了，一个空灵的身影走了出来，它的形态是光和液体的混合。''我们不是来征服，而是来学习的，''它说，它的声音在所有人类语言中同时回响。"'
- en: 80\. Write a Fairy Tale with a Twist
  id: totrans-907
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 80. 编写一个带有转折的童话
- en: 'Prompt:'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Rewrite Little Red Riding Hood, but the wolf is the hero."'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: '"重写小红帽的故事，但狼是英雄。"'
- en: 'Example ChatGPT Response:'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The wolf watched from the shadows as the hunter approached the grandmother’s
    cabin. Sensing danger, he leaped into action, chasing the hunter away. ''Thank
    you,'' whispered Red, realizing the wolf had protected her. From that day, they
    became guardians of the forest together."'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: '"狼在阴影中注视着猎人接近祖母的小屋。感觉到危险，它跃入行动，将猎人赶走。''谢谢，''红衣女巫低声说，意识到狼保护了她。从那天起，他们一起成为了森林的守护者。"'
- en: 81\. Create a Superhero with Unusual Powers
  id: totrans-912
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 81. 创造一个拥有不寻常能力的超级英雄
- en: 'Prompt:'
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Design a superhero whose power is unusual or unconventional."'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: '"设计一个拥有不寻常或非常规能力的超级英雄。"'
- en: 'Example ChatGPT Response:'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Name: Reverie'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: '"名称：梦幻'
- en: 'Power: The ability to bring dreams to life for 60 seconds.'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 能力：在60秒内将梦想变为现实。
- en: 'Backstory: A once-struggling artist, Reverie discovered their power after a
    near-death experience. They use it to inspire hope and confuse villains with their
    most irrational fears."'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 'Backstory: 一位曾经挣扎的艺术家，梦幻在经历了一次濒死经历后发现了他们的力量。他们用它来激发希望，并用他们最不理性的恐惧来迷惑恶棍。'
- en: 82\. Write an Alternate History
  id: totrans-919
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 82. 编写一个平行历史
- en: 'Prompt:'
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Imagine if the internet was invented in the 1800s. How would history change?"'
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: '"想象一下，如果互联网是在19世纪发明的。历史会如何改变？"'
- en: 'Example ChatGPT Response:'
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The Industrial Revolution accelerated as inventors collaborated via telegraph-powered
    ‘proto-webs.’ Revolutions spread faster, fueled by instant communication. By 1900,
    steam-powered computers dominated factories, and global networking laid the foundation
    for a steampunk utopia—or dystopia."'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: '"工业革命随着发明家通过电报驱动的‘原型网络’合作而加速。革命传播得更快，由即时通信推动。到1900年，蒸汽动力计算机主导了工厂，全球网络为蒸汽朋克乌托邦——或反乌托邦奠定了基础。"'
- en: 83\. Describe the Birth of a Star
  id: totrans-924
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 83. 描述一颗星星的诞生
- en: 'Prompt:'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write a poetic description of a star being born in space."'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: '"用诗意的语言描述一颗在太空中诞生的星星。"'
- en: 'Example ChatGPT Response:'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"In the void’s silent womb, chaos stirred. Dust and gas danced, spinning faster
    until light exploded forth—a newborn star piercing the velvet darkness, its radiance
    a promise of worlds yet to be born."'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: '"在虚空的寂静子宫中，混沌涌动。尘埃和气体翩翩起舞，旋转得越来越快，直到光明爆发——一颗新生的星星穿透天鹅绒般的黑暗，它的光辉是尚未诞生的世界的承诺。"'
- en: 84\. Write a Hero’s Origin Story
  id: totrans-929
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 84. 写一个英雄的起源故事
- en: 'Prompt:'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Create a backstory for a hero who rises from humble beginnings."'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: '"为一位从卑微出身崛起的英雄创造一个背景故事。"'
- en: 'Example ChatGPT Response:'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Raised in the shadow of a broken city, Elena scavenged to survive. When she
    discovered a forgotten relic—a gauntlet that responded to her will—she vowed to
    fight for those who had nothing, becoming the defender her world desperately needed."'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: '"在破碎城市的阴影中长大，伊莲娜为了生存而搜寻。当她发现一个被遗忘的遗物——一个对她意志做出反应的手套——她发誓要为那些一无所有的人而战，成为她世界迫切需要的守护者。"'
- en: 85\. Create a Mythical Weapon
  id: totrans-934
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 85. 创建一把神话武器
- en: 'Prompt:'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe a legendary weapon and its origin."'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一把传奇武器及其起源。"'
- en: 'Example ChatGPT Response:'
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Name: The Sunblade'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: '"名称：太阳之刃"'
- en: Forged by the gods to banish eternal night, the Sunblade is said to ignite with
    the fury of a thousand suns. Its wielder must possess an unbreakable spirit, for
    the blade consumes the weak, leaving only ashes."
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 据说由神明锻造以驱逐永恒之夜的太阳之刃，据说会以千阳之怒而燃烧。它的使用者必须拥有坚不可摧的精神，因为这把刀吞噬了弱者，只留下灰烬。"
- en: 86\. Write a Villain’s Redemption Arc
  id: totrans-940
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 86. 写一个恶棍的救赎弧
- en: 'Prompt:'
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe how a notorious villain finds redemption."'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一个臭名昭著的恶棍如何找到救赎。"'
- en: 'Example ChatGPT Response:'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Once feared as the Wraith of the West, Kael’s world changed when he saved
    a lost child during a storm. The gratitude in her eyes reminded him of the humanity
    he had buried. He began rebuilding villages he once destroyed, proving that even
    the darkest hearts can find light."'
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: '"曾经被西方视为幽灵，凯尔在暴风雨中救出一个迷路的孩子后，他的世界发生了改变。她眼中的感激之情让他想起了他曾经埋葬过的人性。他开始重建他曾经摧毁的村庄，证明即使是黑暗的心灵也能找到光明。"'
- en: 87\. Invent a New Genre of Music
  id: totrans-945
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 87. 创造一种新的音乐类型
- en: 'Prompt:'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe a fictional genre of music and its defining features."'
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一种虚构的音乐类型及其定义特征。"'
- en: 'Example ChatGPT Response:'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Name: Etherwave'
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: '"名称：以太波"'
- en: 'Description: A blend of haunting violin melodies with digital soundscapes,
    Etherwave evokes the feeling of floating through time. Its defining feature is
    the use of binaural beats, creating an immersive, meditative experience."'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 'Description: 将令人毛骨悚然的提琴旋律与数字音景混合，以太波唤起穿越时间的感受。其定义特征是使用双耳节拍，创造一种沉浸式、冥想式的体验。"'
- en: 88\. Write a Time-Travel Paradox
  id: totrans-951
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 88. 写一个时间旅行悖论
- en: 'Prompt:'
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Create a scenario involving a time traveler causing a paradox."'
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: '"创造一个涉及时间旅行者造成悖论的场景。"'
- en: 'Example ChatGPT Response:'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"A scientist travels back to prevent her mentor’s death, only to discover her
    actions lead to his fatal accident. She realizes her interference created the
    event she tried to stop, locking her in a loop of unintended consequences."'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: '"一位科学家回到过去以防止她的导师死亡，结果发现她的行为导致了他的致命事故。她意识到她的干预导致了她试图阻止的事件，将她锁定在无意中造成的后果的循环中。"'
- en: 89\. Describe a Forgotten Civilization
  id: totrans-956
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 89. 描述一个被遗忘的文明
- en: 'Prompt:'
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Write about a lost civilization and its unique culture."'
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: '"写一篇关于失落文明及其独特文化的文章。"'
- en: 'Example ChatGPT Response:'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The Solinari thrived beneath the sands, crafting bioluminescent cities lit
    by underground rivers. Their art depicted stars they had never seen, guided only
    by their mystics'' visions. When the rivers dried, the Solinari vanished, leaving
    glowing carvings as their legacy."'
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: '"索林阿里人在沙子之下繁荣昌盛，用地下河流照亮的生物发光城市。他们的艺术描绘了他们从未见过的星星，只由他们的神秘主义者们的愿景引导。当河流干涸时，索林阿里人消失了，留下了发光的雕刻作为他们的遗产。"'
- en: 90\. Create a Monster with a Tragic Backstory
  id: totrans-961
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 90. 创建一个有悲剧背景的怪物
- en: 'Prompt:'
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe a monster who was once human."'
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一个曾经是人类但后来变成怪物的怪物。"'
- en: 'Example ChatGPT Response:'
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Once a healer, Mireya became cursed when she failed to save a king’s child.
    Her hands, which once mended wounds, now emit a deadly toxin. Villagers fear her
    as the ''Plague Wraith,'' unaware she only seeks to atone for her past."'
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: '"曾经是一位治疗师，米雷亚在未能救出一个国王的孩子后受到了诅咒。她的双手，曾经治愈伤口，现在却散发出致命的毒素。村民们将她视为‘瘟疫幽灵’，却不知道她只是在寻求为过去的错误赎罪。"'
- en: 91\. Write About a City in the Clouds
  id: totrans-966
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 91. 描述一个云中的城市
- en: 'Prompt:'
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe a city that floats among the clouds."'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一个漂浮在云层中的城市。"'
- en: 'Example ChatGPT Response:'
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The city of Aerithia drifts on colossal balloons tethered to mountain peaks.
    Its citizens travel by air bridges and gliders, harvesting water from the mist.
    Legends say the city was raised to the skies to escape an ancient flood, and its
    secrets remain hidden in the clouds."'
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: '"艾瑞西亚城漂浮在巨大的气球上，这些气球系在山峰上。市民们通过空中桥梁和滑翔机旅行，从雾中采集水。传说这座城市被提升到天空是为了逃离一场古老的洪水，其秘密仍然隐藏在云层中。"'
- en: 92\. Create a Curse with a Unique Effect
  id: totrans-971
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 92. 创造一种具有独特效果的诅咒
- en: 'Prompt:'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Invent a curse with an unusual consequence."'
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: '"创造一种具有不寻常后果的诅咒。"'
- en: 'Example ChatGPT Response:'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Curse of the Shifting Shadows: The afflicted person sees their shadow come
    to life, mimicking their darkest thoughts. The shadow whispers secrets of betrayal,
    slowly driving them to distrust even their closest allies."'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: '"移位阴影诅咒：受影响的人会看到他们的影子复活，模仿他们最黑暗的思想。影子低语背叛的秘密，慢慢地驱使他们不相信甚至他们最亲密的盟友。"'
- en: 93\. Write a Haunting Letter Found in an Abandoned House
  id: totrans-976
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 93. 写一封在废弃房屋中发现的令人毛骨悚然的信件
- en: 'Prompt:'
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Compose a letter that reveals a chilling secret."'
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: '"撰写一封揭示令人毛骨悚然秘密的信件。"'
- en: 'Example ChatGPT Response:'
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"My Dearest,'
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: '"我最亲爱的，'
- en: If you are reading this, I failed to stop it. The whispers in the walls grow
    louder, and soon they will claim me too. Leave now, and never return. Burn this
    house before it awakens. Forgive me for not protecting us.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在读这封信，我未能阻止它。墙上的低语声越来越大，很快它们也会把我吞噬。现在离开，永远不要回来。在它醒来之前烧掉这所房子。请原谅我没有保护我们。"
- en: Yours forever, Elise."
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 永远属于你，艾莉丝。"
- en: 94\. Describe a World Entirely Covered in Water
  id: totrans-983
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 94. 描述一个完全被水覆盖的世界
- en: 'Prompt:'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Imagine a planet with no land and describe its inhabitants."'
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: '"想象一个没有陆地的星球，并描述其居民。"'
- en: 'Example ChatGPT Response:'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"The planet Oceanea is home to bioluminescent creatures adapted to eternal
    water. The surface is dotted with floating colonies where humans coexist with
    intelligent sea beings called Liriths. Beneath the waves, coral skyscrapers rise,
    glowing with the energy of the ocean’s currents."'
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: '"奥塞尼亚星球是生物发光生物的家园，它们适应了永恒的水。表面点缀着漂浮的殖民地，人类与被称为利里斯的智能海洋生物共存。在波浪之下，珊瑚摩天大楼拔地而起，散发着海洋洋流能量的光芒。"'
- en: 95\. Write About a Secret Society
  id: totrans-988
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 95. 描述一个秘密社团
- en: 'Prompt:'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt:'
- en: '"Describe a secret society and its purpose."'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: '"描述一个秘密社团及其目的。"'
- en: 'Example ChatGPT Response:'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 'Example ChatGPT Response:'
- en: '"Name: The Veilkeepers'
  id: totrans-992
  prefs: []
