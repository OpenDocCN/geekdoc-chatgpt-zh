  zh: 2. 将学习时间分成25分钟的块，中间有短暂的休息（番茄工作法）。
- en: 3\. Use colorful notes or flashcards to make learning engaging.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用彩色笔记或闪卡使学习更有趣。
- en: 4\. Encourage consistency by setting a daily study time.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 通过设定每日学习时间来鼓励一致性。
- en: 5\. Reward effort, not just results, to build confidence."
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 奖励努力，而不仅仅是结果，以建立自信。”
